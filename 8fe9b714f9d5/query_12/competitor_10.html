</span><h2 data-dcnode-id="4191"><span data-dcnode-id="4201" id="1939.E2.80.931945"></span><span class="mw-headline" data-dcnode-id="4199" id="1939–1945"><span data-dcnode-id="4200" instrument_node="">1939–1945</span></span><span class="mw-editsection" data-dcnode-id="4192"><span class="mw-editsection-bracket" data-dcnode-id="4197"><span data-dcnode-id="4198" instrument_node="">[</span></span><a data-dcnode-id="4195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_history_of_Australia%26action%3Dedit%26section%3D9" title="Edit section: 1939–1945"><span data-dcnode-id="4196" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4193"><span data-dcnode-id="4194" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4190" instrument_node="">
</span><link data-dcnode-id="4189" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4185" role="note"><span data-dcnode-id="4188" instrument_node="">Main article: </span><a data-dcnode-id="4186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_home_front_during_World_War_II" title="Australian home front during World War II"><span data-dcnode-id="4187" instrument_node="">Australian home front during World War II</span></a></div><span data-dcnode-id="4184" instrument_node="">
</span><p data-dcnode-id="4169"><span data-dcnode-id="4183" instrument_node="">World War II had a profound impact on the Australian economy and permanently changed how the economy was run. Prior to 1939, the Commonwealth Government had little role in the management of the Australian economy. The state governments levied most of the income tax, and Australia's international trade was dictated by its relationship with the </span><a data-dcnode-id="4181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Empire" title="British Empire"><span data-dcnode-id="4182" instrument_node="">British Empire</span></a><span data-dcnode-id="4180" instrument_node="">. The Japanese attack on Australia in 1942 led the Australian Government to adopt an "All In" war policy, which dictated the full mobilisation of the Australian economy and workforce. To that end, a range of economic and industrial controls were adopted: rationing, production controls, military and industrial conscription. The new powers were generally administered by the Commonwealth Government assisted by government appointed boards of control. The best and the most successful example was the Commonwealth Munitions Board (CMB) which directed the expansion of the Australian munitions industry. Chaired by </span><a data-dcnode-id="4178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Essington_Lewis" title="Essington Lewis"><span data-dcnode-id="4179" instrument_node="">Essington Lewis</span></a><span data-dcnode-id="4177" instrument_node="">, the General Manager of </span><a data-dcnode-id="4175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BHP" title="BHP"><span data-dcnode-id="4176" instrument_node="">BHP</span></a><span data-dcnode-id="4174" instrument_node="">, the CMB was by the end of the war indirectly managing some of the largest manufacturing concerns in the country.</span><sup class="reference" data-dcnode-id="4171" id="cite_ref-15"><a data-dcnode-id="4172" href="#cite_note-15"><span data-dcnode-id="4173" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4170" instrument_node="">
</span></p><p data-dcnode-id="4156"><span data-dcnode-id="4168" instrument_node="">The economic policies of the Labor government of </span><a data-dcnode-id="4166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Curtin" title="John Curtin"><span data-dcnode-id="4167" instrument_node="">John Curtin</span></a><span data-dcnode-id="4165" instrument_node=""> greatly stimulated the economy by increasing production and ending unemployment.  Labor relations were good and strikes were avoided.</span><sup class="reference" data-dcnode-id="4162" id="cite_ref-16"><a data-dcnode-id="4163" href="#cite_note-16"><span data-dcnode-id="4164" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4161" instrument_node=""> A wide range of industries, including motor vehicles, metal processing, TCF (textiles, clothing and footwear) and chemicals, all benefitted from government contracts and regulations, but by 1943, a severe manpower shortage limited further industrial expansion. High profits, and the strict rationing of consumables led to a rapid increase in national savings and profits, which generated a surplus of domestic capital. To fund the war effort, in 1942, the Australian Government instituted the Uniform Taxation Act and removed the ability of the state governments to levy income tax. Higher taxation and successive bond drives meant that by 1945, the Australian Government had largely funded the war effort from domestic sources. In the immediate postwar period, Australia was able even to extend economic assistance to Britain, and the Curtin government could start planning for a comprehensive plan of postwar reconstruction.</span><sup class="reference" data-dcnode-id="4158" id="cite_ref-17"><a data-dcnode-id="4159" href="#cite_note-17"><span data-dcnode-id="4160" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4157" instrument_node="">
</span></p><span data-dcnode-id="4155" instrument_node="">
</span><h2 data-dcnode-id="4145"><span class="mw-headline" data-dcnode-id="4153" id="1945-1972"><span data-dcnode-id="4154" instrument_node="">1945-1972</span></span><span class="mw-editsection" data-dcnode-id="4146"><span class="mw-editsection-bracket" data-dcnode-id="4151"><span data-dcnode-id="4152" instrument_node="">[</span></span><a data-dcnode-id="4149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_history_of_Australia%26action%3Dedit%26section%3D10" title="Edit section: 1945-1972"><span data-dcnode-id="4150" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4144" instrument_node="">
</span><p data-dcnode-id="4132"><span data-dcnode-id="4143" instrument_node="">Wartime measures and the expanded wartime economy provided the basis for rapid economic growth in the period after 1945.</span><sup class="reference" data-dcnode-id="4140" id="cite_ref-18"><a data-dcnode-id="4141" href="#cite_note-18"><span data-dcnode-id="4142" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4139" instrument_node="">  Postwar economic reconstruction was also aided by a policy of national development pursued by the </span><a data-dcnode-id="4137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Labor_Party" title="Australian Labor Party"><span data-dcnode-id="4138" instrument_node="">Australian Labor Party</span></a><span data-dcnode-id="4136" instrument_node=""> (ALP), which formed the government from 1941 to 1949. That policy was in line with the general </span><a class="mw-redirect" data-dcnode-id="4134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist" title="Socialist"><span data-dcnode-id="4135" instrument_node="">socialist</span></a><span data-dcnode-id="4133" instrument_node=""> ideals that the ALP held and were then widely supported within the broader labour movement.
</span></p><p data-dcnode-id="4127"><span data-dcnode-id="4131" instrument_node="">International conditions also favoured the policy as after the war Australia enjoyed favourable terms of trade and an increase in the amount of foreign (largely US) investment into the economy. However, it was assumed that the agricultural and mining sectors would be geared towards international markets, and manufacturing would serve the domestic "consumer" market. This continued into the 1950s and 1960s, and led government policy makers to implement </span><a data-dcnode-id="4129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Import_replacement" title="Import replacement"><span data-dcnode-id="4130" instrument_node="">import replacement</span></a><span data-dcnode-id="4128" instrument_node=""> strategies.
</span></p><p data-dcnode-id="4113"><span data-dcnode-id="4126" instrument_node="">During the war, Australia's international trade and investment position began to change. In 1944, Australia became a part of the </span><a data-dcnode-id="4124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bretton_Woods_system" title="Bretton Woods system"><span data-dcnode-id="4125" instrument_node="">Bretton Woods system</span></a><span data-dcnode-id="4123" instrument_node="">, with major world currencies maintaining </span><a class="mw-redirect" data-dcnode-id="4121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fixed_exchange_rate" title="Fixed exchange rate"><span data-dcnode-id="4122" instrument_node="">fixed exchange rates</span></a><span data-dcnode-id="4120" instrument_node=""> relative to each other and with the US dollar being pegged to gold. Australia maintained a fixed exchange rate which was effectively pegged to sterling until 1967. The exchange rate between the Australian and British pounds was set at 0.8 GBP (16 shillings sterling; A£1 5s = £1 sterling). However, those new developments did not entirely supplant the traditional relationship with Britain, and Australia remained a part of the "</span><a class="mw-redirect" data-dcnode-id="4118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sterling_Zone" title="Sterling Zone"><span data-dcnode-id="4119" instrument_node="">Sterling Zone</span></a><span data-dcnode-id="4117" instrument_node="">" until 1967. That reflected Australia's historical ties as well as a view about the stability in value of the British pound. After a brief period of disruption caused by the Second World War, the </span><a data-dcnode-id="4115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="4116" instrument_node="">United Kingdom</span></a><span data-dcnode-id="4114" instrument_node=""> returned to its position as Australia's main trading partner.
</span></p><p data-dcnode-id="4101"><span data-dcnode-id="4112" instrument_node="">In 1949, the United Kingdom devalued the pound sterling against the </span><a class="mw-redirect" data-dcnode-id="4110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/US_dollar" title="US dollar"><span data-dcnode-id="4111" instrument_node="">US dollar</span></a><span data-dcnode-id="4109" instrument_node=""> by 30%, and Australia followed suit so that the Australian pound would not become overvalued in </span><a class="mw-redirect" data-dcnode-id="4107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sterling_zone" title="Sterling zone"><span data-dcnode-id="4108" instrument_node="">sterling zone</span></a><span data-dcnode-id="4106" instrument_node=""> countries with which Australia did most of its external trade. As the pound sterling went from US$4.03 to US$2.80, the Australian pound went from US$3.224 to US$2.24.</span><sup class="reference" data-dcnode-id="4103" id="cite_ref-19"><a data-dcnode-id="4104" href="#cite_note-19"><span data-dcnode-id="4105" instrument_node="">[19]</span></a></sup><span data-dcnode-id="4102" instrument_node=""> Relative to the pound sterling, the Australian pound remained the same at A£1 5s = £1 sterling.
</span></p><p data-dcnode-id="4089"><span data-dcnode-id="4100" instrument_node="">With the breakdown of the Bretton Woods system in 1971, Australia converted the traditional peg to a fluctuating rate against the US dollar. In September 1974, Australia valued the dollar against a basket of currencies called the </span><a class="mw-redirect" data-dcnode-id="4098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trade_weighted_index" title="Trade weighted index"><span data-dcnode-id="4099" instrument_node="">trade weighted index</span></a><span data-dcnode-id="4097" instrument_node=""> (TWI) in an effort to reduce the fluctuations associated with its tie to the US dollar.</span><sup class="reference" data-dcnode-id="4094" id="cite_ref-20"><a data-dcnode-id="4095" href="#cite_note-20"><span data-dcnode-id="4096" instrument_node="">[20]</span></a></sup><span data-dcnode-id="4093" instrument_node=""> The daily TWI valuation was changed in November 1976 to a periodically adjusted valuation. On 12 December 1983, Australia </span><a data-dcnode-id="4091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Floating_exchange_rate" title="Floating exchange rate"><span data-dcnode-id="4092" instrument_node="">floated</span></a><span data-dcnode-id="4090" instrument_node=""> the Australian dollar, with the exchange rate reflecting the balance of payments and other market drivers.
</span></p><p data-dcnode-id="4073"><span data-dcnode-id="4088" instrument_node="">Immediately after 1945 Australia continued to be governed by the ALP, which adopted a policy of reconstruction based on the principles of "nationalisation and rationalisation".</span><sup class="reference" data-dcnode-id="4085" id="cite_ref-21"><a data-dcnode-id="4086" href="#cite_note-21"><span data-dcnode-id="4087" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4084" instrument_node="">  This dictated that the government maintain control over the "commanding heights" of the economy in order to continue economic growth, restrain inflation and institute full employment. A number of Australian companies such as QANTAS were nationalised in this period, while a range of government run enterprises such as TAA and the ANL were set up to expand the government sector. In 1948 the </span><a class="mw-redirect" data-dcnode-id="4082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Snowy_Mountain_River_Project" title="Snowy Mountain River Project"><span data-dcnode-id="4083" instrument_node="">Snowy Mountain River Project</span></a><span data-dcnode-id="4081" instrument_node=""> was commenced. This policy achieved high economic growth, but led to growing political opposition, especially after the failure of the government to nationalise the banking sector in 1948. Political opponents also capitalized on the retention of rationing of food and petrol. As a result, in 1949 the government was replaced at national elections with a more conservative government committed to supporting a "</span><a data-dcnode-id="4079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mixed_economy" title="Mixed economy"><span data-dcnode-id="4080" instrument_node="">mixed economy</span></a><span data-dcnode-id="4078" instrument_node="">."</span><sup class="reference" data-dcnode-id="4075" id="cite_ref-22"><a data-dcnode-id="4076" href="#cite_note-22"><span data-dcnode-id="4077" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4074" instrument_node="">
</span></p><p data-dcnode-id="4058"><span data-dcnode-id="4072" instrument_node="">The new Australian Government, led by Liberal leader </span><a data-dcnode-id="4070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Menzies" title="Robert Menzies"><span data-dcnode-id="4071" instrument_node="">Robert Menzies</span></a><span data-dcnode-id="4069" instrument_node="">, continued to regulate economic activity, but preferred to manage the economy "indirectly" where possible. More encouragement was given to private industry, but where public enterprise was deemed "necessary" it was retained, and in some cases expanded. The pragmatic approach of the conservative Menzies Government was underlined with the establishment of the </span><a data-dcnode-id="4067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reserve_Bank_of_Australia" title="Reserve Bank of Australia"><span data-dcnode-id="4068" instrument_node="">Reserve Bank of Australia</span></a><span data-dcnode-id="4066" instrument_node="">, the continuance of the mass immigration policy began in 1946, and the signing of a range of new trade agreements with nations outside the British Empire, including West Germany (1955), Japan (1957) and the USSR (1965). In 1955 Australia began exporting coal to Japan, and by 1967 Japan had surpassed Britain as Australia's main market. In 1966 Australia abandoned the pound and adopted the </span><a class="mw-redirect" data-dcnode-id="4064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Dollar" title="Australian Dollar"><span data-dcnode-id="4065" instrument_node="">Australian Dollar</span></a><span data-dcnode-id="4063" instrument_node="">.</span><sup class="reference" data-dcnode-id="4060" id="cite_ref-23"><a data-dcnode-id="4061" href="#cite_note-23"><span data-dcnode-id="4062" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4059" instrument_node="">
</span></p><p data-dcnode-id="4047"><span data-dcnode-id="4057" instrument_node="">Economic growth, high employment levels, growing foreign investment and the development of new markets led Australia to enjoy a high level of economic prosperity in the post-war period. Rationing was abolished in 1950. High population growth, high government spending, the introduction of </span><a data-dcnode-id="4055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Television" title="Television"><span data-dcnode-id="4056" instrument_node="">television</span></a><span data-dcnode-id="4054" instrument_node=""> (1956) and the gradual relaxation of government controls over "hire purchase" helped Australia to develop into an affluent society in the 1950s and 1960s. Rising income from taxation receipts eventually allowing the Australian Government to fund a large expansion in higher education, the development of </span><a data-dcnode-id="4052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canberra" title="Canberra"><span data-dcnode-id="4053" instrument_node="">Canberra</span></a><span data-dcnode-id="4051" instrument_node="">, the national capital, and the host the 1956 Melbourne Olympics. By the time of Sir Robert Menzies's retirement in 1966, the Australian economy seemed stronger and wealthier than ever before. The Australian governments of this period, dominated by the conservative </span><a data-dcnode-id="4049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_Party_of_Australia" title="Liberal Party of Australia"><span data-dcnode-id="4050" instrument_node="">Liberal Party of Australia</span></a><span data-dcnode-id="4048" instrument_node="">, were broadly successful in maintaining economic growth and unemployment, but were criticised by opponents for failing to effectively control inflation, instituting periodic "credit squeezes" (1952 and 1961), and rejecting national economic planning. During the 1960s an increase in tariff protection for new industries protected jobs and profits, but lowered the need for productivity and innovation, and by 1966 foreign investment was shifting to the less heavily regulated mining and pastoral sectors.
</span></p><p data-dcnode-id="4029"><span data-dcnode-id="4046" instrument_node="">After 1967 the favourable conditions that Australia had enjoyed in the international economy began to change. From 1962 Britain progressively abandoned the system of </span><a data-dcnode-id="4044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Imperial_Preference" title="Imperial Preference"><span data-dcnode-id="4045" instrument_node="">Imperial Preference</span></a><span data-dcnode-id="4043" instrument_node=""> adopted in 1932 and moved towards membership of the </span><a data-dcnode-id="4041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Economic_Community" title="European Economic Community"><span data-dcnode-id="4042" instrument_node="">European Economic Community</span></a><span data-dcnode-id="4040" instrument_node="">. Australia's privileged access to the British market was drawing to a close. In the era of the </span><a data-dcnode-id="4038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_War" title="Vietnam War"><span data-dcnode-id="4039" instrument_node="">Vietnam War</span></a><span data-dcnode-id="4037" instrument_node=""> the U.S. Economy began to enter into a difficult period, and the rate of U.S. investment into Australia began to decline. Even more ominously, Australia began to face greater economic competition and a steady decline in her terms of trade. In this context the governments that followed the Menzies government in the period 1966–1972 increasingly found it hard to manage the rising expectations of consumers and industry. In the period 1972–1973 Australia began to experience the beginnings of "</span><a data-dcnode-id="4035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stagflation" title="Stagflation"><span data-dcnode-id="4036" instrument_node="">stagflation</span></a><span data-dcnode-id="4034" instrument_node="">" as unemployment and inflation began to rise simultaneously for the first time.</span><sup class="reference" data-dcnode-id="4031" id="cite_ref-24"><a data-dcnode-id="4032" href="#cite_note-24"><span data-dcnode-id="4033" instrument_node="">[24]</span></a></sup><span data-dcnode-id="4030" instrument_node="">
</span></p><span data-dcnode-id="4028" instrument_node="">
</span><h2 data-dcnode-id="4017"><span data-dcnode-id="4027" id="1972.E2.80.931982"></span><span class="mw-headline" data-dcnode-id="4025" id="1972–1982"><span data-dcnode-id="4026" instrument_node="">1972–1982</span></span><span class="mw-editsection" data-dcnode-id="4018"><span class="mw-editsection-bracket" data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">[</span></span><a data-dcnode-id="4021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_history_of_Australia%26action%3Dedit%26section%3D11" title="Edit section: 1972–1982"><span data-dcnode-id="4022" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4016" instrument_node="">
</span><link data-dcnode-id="4015" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4011" role="note"><span data-dcnode-id="4014" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="4012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1973%25E2%2580%259375_recession" title="1973–75 recession"><span data-dcnode-id="4013" instrument_node="">1973–75 recession</span></a></div><span data-dcnode-id="4010" instrument_node="">
</span><p data-dcnode-id="3957"><span data-dcnode-id="4009" instrument_node="">The post-war economic boom ended with "</span><a data-dcnode-id="4007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stagflation" title="Stagflation"><span data-dcnode-id="4008" instrument_node="">stagflation</span></a><span data-dcnode-id="4006" instrument_node="">" in the early 1970s.</span><sup class="reference" data-dcnode-id="4003" id="cite_ref-25"><a data-dcnode-id="4004" href="#cite_note-25"><span data-dcnode-id="4005" instrument_node="">[25]</span></a></sup><span data-dcnode-id="4002" instrument_node=""> This was primarily caused by developments in the international economy; the </span><a data-dcnode-id="4000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1973_oil_crisis" title="1973 oil crisis"><span data-dcnode-id="4001" instrument_node="">Oil Crisis</span></a><span data-dcnode-id="3999" instrument_node="">, Britain's entry into the </span><a class="mw-redirect" data-dcnode-id="3997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/E.E.C." title="E.E.C."><span data-dcnode-id="3998" instrument_node="">E.E.C.</span></a><span data-dcnode-id="3996" instrument_node="">, and growing economic competition in Australia's traditional export markets. However, the economic policies of the ALP </span><a class="mw-redirect" data-dcnode-id="3994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Whitlam_Government" title="Whitlam Government"><span data-dcnode-id="3995" instrument_node="">Whitlam Government</span></a><span data-dcnode-id="3993" instrument_node=""> did not prove effective at dealing with stagflation.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3986" style="white-space:nowrap;"><span data-dcnode-id="3992" instrument_node="">[</span><i data-dcnode-id="3988"><a data-dcnode-id="3989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3990" title="This claim needs references to reliable sources. (April 2020)"><span data-dcnode-id="3991" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3987" instrument_node="">]</span></sup><span data-dcnode-id="3985" instrument_node=""> Gough Whitlam had been elected on a platform that included the rapid expansion of government funded health and education programs.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3978" style="white-space:nowrap;"><span data-dcnode-id="3984" instrument_node="">[</span><i data-dcnode-id="3980"><a data-dcnode-id="3981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3982" title="This claim needs references to reliable sources. (April 2020)"><span data-dcnode-id="3983" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3979" instrument_node="">]</span></sup><span data-dcnode-id="3977" instrument_node=""> At the same time the labour movement, of which the Labor Party was a part, were opposed to both </span><a data-dcnode-id="3975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Incomes_policy" title="Incomes policy"><span data-dcnode-id="3976" instrument_node="">wage restraint</span></a><span data-dcnode-id="3974" instrument_node=""> and economic restructuring.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3967" style="white-space:nowrap;"><span data-dcnode-id="3973" instrument_node="">[</span><i data-dcnode-id="3969"><a data-dcnode-id="3970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3971" title="This claim needs references to reliable sources. (April 2020)"><span data-dcnode-id="3972" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3968" instrument_node="">]</span></sup><span data-dcnode-id="3966" instrument_node=""> Higher government spending coupled with higher wages, but not linked to higher productivity, created strong inflationary pressure. Whitlam's lack of a majority in the Australian Senate, and the hostility of the conservative state governments made it difficult to effectively manage the economy.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3959" style="white-space:nowrap;"><span data-dcnode-id="3965" instrument_node="">[</span><i data-dcnode-id="3961"><a data-dcnode-id="3962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3963" title="This claim needs references to reliable sources. (April 2020)"><span data-dcnode-id="3964" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3960" instrument_node="">]</span></sup><span data-dcnode-id="3958" instrument_node="">
</span></p><p data-dcnode-id="3912"><span data-dcnode-id="3956" instrument_node="">In 1973, with Australia experiencing sharply rising </span><a data-dcnode-id="3954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inflation" title="Inflation"><span data-dcnode-id="3955" instrument_node="">inflation</span></a><span data-dcnode-id="3953" instrument_node="">, </span><a data-dcnode-id="3951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fred_Gruen" title="Fred Gruen"><span data-dcnode-id="3952" instrument_node="">Fred Gruen</span></a><span data-dcnode-id="3950" instrument_node="">, special consultant to the Whitlam Government, proposed a 25% across the board tariff cut, which was adopted by the government.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3943" style="white-space:nowrap;"><span data-dcnode-id="3949" instrument_node="">[</span><i data-dcnode-id="3945"><a data-dcnode-id="3946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3947" title="This claim needs references to reliable sources. (April 2020)"><span data-dcnode-id="3948" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3944" instrument_node="">]</span></sup><span data-dcnode-id="3942" instrument_node=""> The </span><a data-dcnode-id="3940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1973_oil_crisis" title="1973 oil crisis"><span data-dcnode-id="3941" instrument_node="">1973 oil crisis</span></a><span data-dcnode-id="3939" instrument_node=""> had caused prices to spike and, according to government figures, inflation topped 13% for the year 1973-1974.</span><sup class="reference" data-dcnode-id="3936" id="cite_ref-oy_26-0"><a data-dcnode-id="3937" href="#cite_note-oy-26"><span data-dcnode-id="3938" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3935" instrument_node=""> By mid-1974, Australia was in an economic recession. The rapid change in economic conditions was not countered by a change in government policy. In particular Whitlam's desire to increase the wages and conditions of the federal public service was not checked.</span><sup class="reference" data-dcnode-id="3932" id="cite_ref-high_27-0"><a data-dcnode-id="3933" href="#cite_note-high-27"><span data-dcnode-id="3934" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3931" instrument_node=""> This fed into a 30% increase in imports and a $1.5&nbsp;billion increase in the </span><a class="mw-redirect" data-dcnode-id="3929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trade_deficit" title="Trade deficit"><span data-dcnode-id="3930" instrument_node="">trade deficit</span></a><span data-dcnode-id="3928" instrument_node=""> by the end of 1974.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3921" style="white-space:nowrap;"><span data-dcnode-id="3927" instrument_node="">[</span><i data-dcnode-id="3923"><a data-dcnode-id="3924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3925" title="This claim needs references to reliable sources. (April 2020)"><span data-dcnode-id="3926" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3922" instrument_node="">]</span></sup><span data-dcnode-id="3920" instrument_node=""> Primary producers of commodities such as beef were caught in a </span><a class="mw-redirect" data-dcnode-id="3918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Credit_squeeze" title="Credit squeeze"><span data-dcnode-id="3919" instrument_node="">credit squeeze</span></a><span data-dcnode-id="3917" instrument_node=""> as short-term interest rates rose to extremely high levels.</span><sup class="reference" data-dcnode-id="3914" id="cite_ref-oy_26-1"><a data-dcnode-id="3915" href="#cite_note-oy-26"><span data-dcnode-id="3916" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3913" instrument_node=""> Unemployment also rose significantly despite continuing government spending.
</span></p><p data-dcnode-id="3885"><span data-dcnode-id="3911" instrument_node="">The failure of the Whitlam Government to effectively manage the Australian economy was a factor in the crisis that ended that government's term in office at the end of 1975.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3904" style="white-space:nowrap;"><span data-dcnode-id="3910" instrument_node="">[</span><i data-dcnode-id="3906"><a data-dcnode-id="3907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3908" title="This claim needs references to reliable sources. (April 2020)"><span data-dcnode-id="3909" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3905" instrument_node="">]</span></sup><span data-dcnode-id="3903" instrument_node="">  The government of </span><a data-dcnode-id="3901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malcolm_Fraser" title="Malcolm Fraser"><span data-dcnode-id="3902" instrument_node="">Malcolm Fraser</span></a><span data-dcnode-id="3900" instrument_node=""> that succeeded Whitlam promised greater control of government spending, and an end to inflationary pay increases in the public sector. However, its close links with industry and commerce made it reluctant to institute economic reform. While a growing number of economists and business leaders began to call for economic deregulation the </span><a class="mw-redirect" data-dcnode-id="3898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fraser_Government" title="Fraser Government"><span data-dcnode-id="3899" instrument_node="">Fraser Government</span></a><span data-dcnode-id="3897" instrument_node=""> preferred to promote policies similar to those adopted in the earlier post-war period; chiefly wage and credit restraint, and tighter government economic regulation of the economy. This was symbolised in 1982 when Fraser dismissed the findings of the </span><a class="new" data-dcnode-id="3895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCampbell_Commission_into_Banking%26action%3Dedit%26redlink%3D1" title="Campbell Commission into Banking (page does not exist)"><span data-dcnode-id="3896" instrument_node="">Campbell Commission into Banking</span></a><span data-dcnode-id="3894" instrument_node=""> (which his government had put in place) that had recommended deregulation of the banking industry.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3887" style="white-space:nowrap;"><span data-dcnode-id="3893" instrument_node="">[</span><i data-dcnode-id="3889"><a data-dcnode-id="3890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3891" title="This claim needs references to reliable sources. (April 2020)"><span data-dcnode-id="3892" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3888" instrument_node="">]</span></sup><span data-dcnode-id="3886" instrument_node="">
</span></p><span data-dcnode-id="3884" instrument_node="">
</span><h2 data-dcnode-id="3873"><span data-dcnode-id="3883" id="1983.E2.80.932020.2C2020-Present."></span><span class="mw-headline" data-dcnode-id="3881" id="1983–2020,2020-Present."><span data-dcnode-id="3882" instrument_node="">1983–2020,2020-Present.</span></span><span class="mw-editsection" data-dcnode-id="3874"><span class="mw-editsection-bracket" data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node="">[</span></span><a data-dcnode-id="3877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_history_of_Australia%26action%3Dedit%26section%3D12" title="Edit section: 1983–2020,2020-Present."><span data-dcnode-id="3878" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3875"><span data-dcnode-id="3876" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3872" instrument_node="">
</span><link data-dcnode-id="3871" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3855" role="note"><span data-dcnode-id="3870" instrument_node="">See also: </span><a data-dcnode-id="3868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neoliberalism%23Australia" title="Neoliberalism"><span data-dcnode-id="3869" instrument_node="">Neoliberalism §&nbsp;Australia</span></a><span data-dcnode-id="3867" instrument_node="">, </span><a data-dcnode-id="3865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Early_1980s_recession" title="Early 1980s recession"><span data-dcnode-id="3866" instrument_node="">Early 1980s recession</span></a><span data-dcnode-id="3864" instrument_node="">, </span><a data-dcnode-id="3862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Early_1990s_recession" title="Early 1990s recession"><span data-dcnode-id="3863" instrument_node="">Early 1990s recession</span></a><span data-dcnode-id="3861" instrument_node="">, </span><a data-dcnode-id="3859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Early_2000s_recession" title="Early 2000s recession"><span data-dcnode-id="3860" instrument_node="">Early 2000s recession</span></a><span data-dcnode-id="3858" instrument_node="">, and </span><a data-dcnode-id="3856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Recession" title="Great Recession"><span data-dcnode-id="3857" instrument_node="">Great Recession</span></a></div><span data-dcnode-id="3854" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3842"><div class="thumbinner" data-dcnode-id="3843" style="width:222px;"><a class="image" data-dcnode-id="3852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABusy_Sydney_downtown_%28Unsplash%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="3853" data-file-height="3035" data-file-width="4047" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/84/Busy_Sydney_downtown_%2528Unsplash%2529.jpg/220px-Busy_Sydney_downtown_%2528Unsplash%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/84/Busy_Sydney_downtown_%28Unsplash%29.jpg/330px-Busy_Sydney_downtown_%28Unsplash%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/84/Busy_Sydney_downtown_%28Unsplash%29.jpg/440px-Busy_Sydney_downtown_%28Unsplash%29.jpg 2x" width="220"></a><span data-dcnode-id="3851" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3844"><div class="magnify" data-dcnode-id="3849"><a class="internal" data-dcnode-id="3850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABusy_Sydney_downtown_%28Unsplash%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="3848" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="3846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sydney_CBD" title="Sydney CBD"><span data-dcnode-id="3847" instrument_node="">Sydney CBD</span></a><span data-dcnode-id="3845" instrument_node="">, the financial heart of Australia</span></div></div></div><span data-dcnode-id="3841" instrument_node="">
</span><p data-dcnode-id="3799"><span data-dcnode-id="3840" instrument_node="">Despite similarities in history, law and culture, Australia and Canada followed quite different macroeconomic histories. Australia's GDP per capita was well above those of Britain and the United States in 1870, and more than twice the Canadian level. By the 1980s, however, Canada's GDP almost matched the United States, and was well above that of Australia and Britain.</span><sup class="reference" data-dcnode-id="3837" id="cite_ref-28"><a data-dcnode-id="3838" href="#cite_note-28"><span data-dcnode-id="3839" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3836" instrument_node="">
</span><a class="mw-redirect" data-dcnode-id="3834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_liberalisation" title="Economic liberalisation"><span data-dcnode-id="3835" instrument_node="">Economic liberalisation</span></a><span data-dcnode-id="3833" instrument_node=""> and </span><a data-dcnode-id="3831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deregulation" title="Deregulation"><span data-dcnode-id="3832" instrument_node="">deregulation</span></a><span data-dcnode-id="3830" instrument_node=""> of the Australian economy began in the early 1980s under the </span><a class="mw-redirect" data-dcnode-id="3828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hawke_Government" title="Hawke Government"><span data-dcnode-id="3829" instrument_node="">Hawke Labor Government</span></a><span data-dcnode-id="3827" instrument_node="">, which commenced the process of economic reform by concluding a </span><a data-dcnode-id="3825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prices_and_Incomes_Accord" title="Prices and Incomes Accord"><span data-dcnode-id="3826" instrument_node="">wages accord with the trade union movement</span></a><span data-dcnode-id="3824" instrument_node="">. In exchange for wage restraint and an increase in the "</span><a class="mw-redirect" data-dcnode-id="3822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_wage" title="Social wage"><span data-dcnode-id="3823" instrument_node="">social wage</span></a><span data-dcnode-id="3821" instrument_node="">" the trade union movement agreed to support economic reform and oppose industrial conflict (i.e. strikes). The success of the "Accord" allowed a Labor Government to implement economic reforms that in other nations had been implemented by conservative political parties; tariffs were progressively cut, the Australian dollar was floated (1983), and the financial system deregulated. Hawke was also able to </span><a class="mw-redirect" data-dcnode-id="3819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Privatisation" title="Privatisation"><span data-dcnode-id="3820" instrument_node="">privatise</span></a><span data-dcnode-id="3818" instrument_node=""> several large government enterprises. Sector wide 'Industry Plans' for economic reform were introduced in telecommunications and manufacturing. The </span><a class="mw-redirect" data-dcnode-id="3816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commonwealth_Bank_of_Australia" title="Commonwealth Bank of Australia"><span data-dcnode-id="3817" instrument_node="">Commonwealth Bank</span></a><span data-dcnode-id="3815" instrument_node=""> was sold in three parcels between 1991 and 1996. </span><a data-dcnode-id="3813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qantas" title="Qantas"><span data-dcnode-id="3814" instrument_node="">Qantas</span></a><span data-dcnode-id="3812" instrument_node=""> was sold in two parcels, one in 1993 and the other in 1995, and the </span><a data-dcnode-id="3810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CSL_Limited" title="CSL Limited"><span data-dcnode-id="3811" instrument_node="">Commonwealth Serum Laboratories</span></a><span data-dcnode-id="3809" instrument_node=""> was floated in 1994. </span><a data-dcnode-id="3807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telstra" title="Telstra"><span data-dcnode-id="3808" instrument_node="">Telstra</span></a><span data-dcnode-id="3806" instrument_node=""> was sold off in three parcels in 1997, 1999 and 2006. One result of these reforms was a marked increase labor productivity, and a reduction in government spending as a proportion of </span><a class="mw-redirect" data-dcnode-id="3804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GDP" title="GDP"><span data-dcnode-id="3805" instrument_node="">GDP</span></a><span data-dcnode-id="3803" instrument_node="">. The </span><a data-dcnode-id="3801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Securities_Exchange" title="Australian Securities Exchange"><span data-dcnode-id="3802" instrument_node="">Australian Stock Exchange Limited</span></a><span data-dcnode-id="3800" instrument_node=""> (ASX) was formed in 1987 through the amalgamation of six independent stock exchanges that formerly operated in the state capitals. Each of those exchanges had a history of share trading dating back to the 19th century.
</span></p><p data-dcnode-id="3750"><span data-dcnode-id="3798" instrument_node="">The global </span><a data-dcnode-id="3796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Early_1990s_recession" title="Early 1990s recession"><span data-dcnode-id="3797" instrument_node="">early 1990s recession</span></a><span data-dcnode-id="3795" instrument_node=""> came swiftly after the </span><a data-dcnode-id="3793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_Monday_%281987%29" title="Black Monday (1987)"><span data-dcnode-id="3794" instrument_node="">Black Monday of October 1987</span></a><span data-dcnode-id="3792" instrument_node="">, resulting from a stock collapse of unprecedented size which saw the </span><a data-dcnode-id="3790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dow_Jones_Industrial_Average" title="Dow Jones Industrial Average"><span data-dcnode-id="3791" instrument_node="">Dow Jones Industrial Average</span></a><span data-dcnode-id="3789" instrument_node=""> fall by 22.6%. This collapse, larger than the </span><a class="mw-redirect" data-dcnode-id="3787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stock_market_crash_of_1929" title="Stock market crash of 1929"><span data-dcnode-id="3788" instrument_node="">stock market crash of 1929</span></a><span data-dcnode-id="3786" instrument_node="">, was handled effectively by the global </span><a data-dcnode-id="3784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_system" title="Economic system"><span data-dcnode-id="3785" instrument_node="">economy</span></a><span data-dcnode-id="3783" instrument_node="">, and the </span><a data-dcnode-id="3781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stock_market" title="Stock market"><span data-dcnode-id="3782" instrument_node="">stock market</span></a><span data-dcnode-id="3780" instrument_node=""> began to quickly recover. However, in </span><a data-dcnode-id="3778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_America" title="North America"><span data-dcnode-id="3779" instrument_node="">North America</span></a><span data-dcnode-id="3777" instrument_node="">, the lumbering </span><a class="mw-redirect" data-dcnode-id="3775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Savings_and_loan" title="Savings and loan"><span data-dcnode-id="3776" instrument_node="">savings and loans</span></a><span data-dcnode-id="3774" instrument_node=""> industry was facing decline which eventually led to a </span><a data-dcnode-id="3772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Savings_and_loan_crisis" title="Savings and loan crisis"><span data-dcnode-id="3773" instrument_node="">savings and loan crisis</span></a><span data-dcnode-id="3771" instrument_node=""> which compromised the wellbeing of millions of Americans. The following recession thus impacted the many countries closely linked to the United States, including Australia. </span><a data-dcnode-id="3769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Keating" title="Paul Keating"><span data-dcnode-id="3770" instrument_node="">Paul Keating</span></a><span data-dcnode-id="3768" instrument_node="">, who was </span><a data-dcnode-id="3766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treasurer_of_Australia" title="Treasurer of Australia"><span data-dcnode-id="3767" instrument_node="">Treasurer</span></a><span data-dcnode-id="3765" instrument_node=""> at the time, famously referred to it as "the recession that Australia had to have."</span><sup class="reference" data-dcnode-id="3762" id="cite_ref-29"><a data-dcnode-id="3763" href="#cite_note-29"><span data-dcnode-id="3764" instrument_node="">[29]</span></a></sup><span data-dcnode-id="3761" instrument_node=""> During the recession, </span><a class="mw-redirect" data-dcnode-id="3759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GDP" title="GDP"><span data-dcnode-id="3760" instrument_node="">GDP</span></a><span data-dcnode-id="3758" instrument_node=""> fell by 1.7%, employment by 3.4% and the unemployment rate rose to 10.8%.</span><sup class="reference" data-dcnode-id="3755" id="cite_ref-30"><a data-dcnode-id="3756" href="#cite_note-30"><span data-dcnode-id="3757" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3754" instrument_node=""> However, as is typical during recessions, there was a beneficial reduction in </span><a data-dcnode-id="3752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inflation" title="Inflation"><span data-dcnode-id="3753" instrument_node="">inflation</span></a><span data-dcnode-id="3751" instrument_node="">.
</span></p><p data-dcnode-id="3733"><span data-dcnode-id="3749" instrument_node="">This process of economic reform and restructuring continued under the Coalition Government led by </span><a data-dcnode-id="3747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Howard" title="John Howard"><span data-dcnode-id="3748" instrument_node="">John Howard</span></a><span data-dcnode-id="3746" instrument_node=""> which took power in 1996. The </span><a class="mw-redirect" data-dcnode-id="3744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Howard_Government" title="Howard Government"><span data-dcnode-id="3745" instrument_node="">Howard Government</span></a><span data-dcnode-id="3743" instrument_node=""> established a </span><a class="mw-redirect" data-dcnode-id="3741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Goods_and_Services_Tax_%28Australia%29" title="Goods and Services Tax (Australia)"><span data-dcnode-id="3742" instrument_node="">goods and services tax</span></a><span data-dcnode-id="3740" instrument_node=""> from 2000, established a national </span><a data-dcnode-id="3738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Productivity_Commission" title="Productivity Commission"><span data-dcnode-id="3739" instrument_node="">Productivity Commission</span></a><span data-dcnode-id="3737" instrument_node=""> and further deregulated labor markets under </span><a data-dcnode-id="3735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/WorkChoices" title="WorkChoices"><span data-dcnode-id="3736" instrument_node="">WorkChoices</span></a><span data-dcnode-id="3734" instrument_node=""> in 2006.
</span></p><p data-dcnode-id="3728"><span data-dcnode-id="3732" instrument_node="">WorkChoices took away an employee's right to sue for unfair dismissal if their former employer employed less than 100 people. WorkChoices was extremely unpopular, it contributed to Howard government losing the 2007 election. The new Labor government under Kevin Rudd completely repealed WorkChoices in 2008 and then passed the </span><a data-dcnode-id="3730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fair_Work_Act_2009" title="Fair Work Act 2009"><span data-dcnode-id="3731" instrument_node="">Fair Work Act 2009</span></a><span data-dcnode-id="3729" instrument_node="">.
</span></p><p data-dcnode-id="3716"><span data-dcnode-id="3727" instrument_node="">The result of the process of economic reform is that Australia is now one of the most open economies in the world, Which has led to polarising debate regarding it's long term success and gradual effects on domestic workers. It enjoyed over two decades of economic growth, coupled with low inflation and relatively low unemployment - until 2020 when the country entered into a brief recession and unemployed skyrocketed amid the global </span><a data-dcnode-id="3725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/COVID-19_pandemic" title="COVID-19 pandemic"><span data-dcnode-id="3726" instrument_node="">COVID-19 pandemic</span></a><span data-dcnode-id="3724" instrument_node="">. Due to the outbreak of COVID-19, The trade dispute with China and the war in Ukraine there has been a shifted focus towards National security and a renewed interest in Australia's manufacturing industry. Although free trade continues to take place the importance of a thriving local industry has become considered an important consensus. The economic reforms implemented since the 1980s lead to a large contraction of the manufacturing sector in Australia and trade union membership, with over 50% of the workforce unionised in the 1970s compared to 14% presently.</span><sup class="reference" data-dcnode-id="3721" id="cite_ref-31"><a data-dcnode-id="3722" href="#cite_note-31"><span data-dcnode-id="3723" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="3718" id="cite_ref-32"><a data-dcnode-id="3719" href="#cite_note-32"><span data-dcnode-id="3720" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3717" instrument_node="">
</span></p><p data-dcnode-id="3700"><span data-dcnode-id="3715" instrument_node="">The 1980s economic reforms, intended to diversify the national economy and make it more resilient, were introduced after the </span><a class="mw-redirect" data-dcnode-id="3713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Commodities_Depression" title="Great Commodities Depression"><span data-dcnode-id="3714" instrument_node="">mid-1980s decline</span></a><span data-dcnode-id="3712" instrument_node=""> in the </span><a data-dcnode-id="3710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terms_of_trade" title="Terms of trade"><span data-dcnode-id="3711" instrument_node="">terms of trade</span></a><span data-dcnode-id="3709" instrument_node="">.</span><sup class="reference" data-dcnode-id="3706" id="cite_ref-33"><a data-dcnode-id="3707" href="#cite_note-33"><span data-dcnode-id="3708" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3705" instrument_node=""> The trend of Australia's gross domestic product at market prices estimated by the International Monetary Fund</span><sup class="reference" data-dcnode-id="3702" id="cite_ref-34"><a data-dcnode-id="3703" href="#cite_note-34"><span data-dcnode-id="3704" instrument_node="">[34]</span></a></sup><span data-dcnode-id="3701" instrument_node=""> is as follows:

</span><h3 data-dcnode-id="3559"><span class="mw-headline" data-dcnode-id="3567" id="Automobiles"><span data-dcnode-id="3568" instrument_node="">Automobiles</span></span><span class="mw-editsection" data-dcnode-id="3560"><span class="mw-editsection-bracket" data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">[</span></span><a data-dcnode-id="3563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_history_of_Australia%26action%3Dedit%26section%3D13" title="Edit section: Automobiles"><span data-dcnode-id="3564" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3558" instrument_node="">
</span><p data-dcnode-id="3536"><span data-dcnode-id="3557" instrument_node="">On 2008, four companies mass-produced cars in Australia.</span><sup class="reference" data-dcnode-id="3554" id="cite_ref-goauto.com.au_36-0"><a data-dcnode-id="3555" href="#cite_note-goauto.com.au-36"><span data-dcnode-id="3556" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3553" instrument_node=""> </span><a data-dcnode-id="3551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mitsubishi_Motors_Australia" title="Mitsubishi Motors Australia"><span data-dcnode-id="3552" instrument_node="">Mitsubishi</span></a><span data-dcnode-id="3550" instrument_node=""> ceased production in March 2008, followed by </span><a data-dcnode-id="3548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ford_Australia" title="Ford Australia"><span data-dcnode-id="3549" instrument_node="">Ford</span></a><span data-dcnode-id="3547" instrument_node=""> in 2016, and </span><a data-dcnode-id="3545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holden" title="Holden"><span data-dcnode-id="3546" instrument_node="">Holden</span></a><span data-dcnode-id="3544" instrument_node=""> and </span><a data-dcnode-id="3542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Toyota_Australia" title="Toyota Australia"><span data-dcnode-id="3543" instrument_node="">Toyota</span></a><span data-dcnode-id="3541" instrument_node=""> in 2017.</span><sup class="reference" data-dcnode-id="3538" id="cite_ref-37"><a data-dcnode-id="3539" href="#cite_note-37"><span data-dcnode-id="3540" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3537" instrument_node="">
</span></p><p data-dcnode-id="3530"><span data-dcnode-id="3535" instrument_node="">Holden announced on 11 December 2013 that Holden cars would no longer be manufactured in Australia from the end of 2017.</span><sup class="reference" data-dcnode-id="3532" id="cite_ref-Holden-exits-Oz_38-0"><a data-dcnode-id="3533" href="#cite_note-Holden-exits-Oz-38"><span data-dcnode-id="3534" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3531" instrument_node="">
</span></p><p data-dcnode-id="3516"><span data-dcnode-id="3529" instrument_node="">Ford had two main factories, both in </span><a class="mw-redirect" data-dcnode-id="3527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victoria%2C_Australia" title="Victoria, Australia"><span data-dcnode-id="3528" instrument_node="">Victoria</span></a><span data-dcnode-id="3526" instrument_node="">: located in the </span><a data-dcnode-id="3524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geelong" title="Geelong"><span data-dcnode-id="3525" instrument_node="">Geelong</span></a><span data-dcnode-id="3523" instrument_node=""> suburb of </span><a data-dcnode-id="3521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norlane%2C_Victoria" title="Norlane, Victoria"><span data-dcnode-id="3522" instrument_node="">Norlane</span></a><span data-dcnode-id="3520" instrument_node=""> and the northern Melbourne suburb of </span><a data-dcnode-id="3518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Broadmeadows%2C_Victoria" title="Broadmeadows, Victoria"><span data-dcnode-id="3519" instrument_node="">Broadmeadows</span></a><span data-dcnode-id="3517" instrument_node="">. Both plants were closed down in October 2016.
</span></p><p data-dcnode-id="3496"><span data-dcnode-id="3515" instrument_node="">Until 2006, Toyota had factories in </span><a class="mw-redirect" data-dcnode-id="3513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Port_Melbourne" title="Port Melbourne"><span data-dcnode-id="3514" instrument_node="">Port Melbourne</span></a><span data-dcnode-id="3512" instrument_node=""> and </span><a data-dcnode-id="3510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Altona%2C_Victoria" title="Altona, Victoria"><span data-dcnode-id="3511" instrument_node="">Altona, Victoria</span></a><span data-dcnode-id="3509" instrument_node="">. Since then, all manufacturing has been at Altona. In 2008, Toyota exported 101,668 vehicles worth $1,900&nbsp;million.</span><sup class="reference" data-dcnode-id="3506" id="cite_ref-ToyotaExports-2008_39-0"><a data-dcnode-id="3507" href="#cite_note-ToyotaExports-2008-39"><span data-dcnode-id="3508" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3505" instrument_node=""> In 2011 the figures were "59,949 units worth $1,004&nbsp;million".</span><sup class="reference" data-dcnode-id="3502" id="cite_ref-ToyotaExports-2011_40-0"><a data-dcnode-id="3503" href="#cite_note-ToyotaExports-2011-40"><span data-dcnode-id="3504" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3501" instrument_node=""> On 10 February 2014 it was announced that by the end of 2017 Toyota would cease manufacturing vehicles and engines in Australia.</span><sup class="reference" data-dcnode-id="3498" id="cite_ref-toyota-exit_41-0"><a data-dcnode-id="3499" href="#cite_note-toyota-exit-41"><span data-dcnode-id="3500" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3497" instrument_node="">
Whilst we've seen the closure of Holden, Ford and Toyota there has been an increase in Australia's Electric Vehicle potential with the introduction of ACE EV and Australian electric vehicle company.
</span></p><p data-dcnode-id="3493"><br data-dcnode-id="3495"><span data-dcnode-id="3494" instrument_node="">

</span><h3 data-dcnode-id="3482"><span class="mw-headline" data-dcnode-id="3490" id="Textiles"><span data-dcnode-id="3491" instrument_node="">Textiles</span></span><span class="mw-editsection" data-dcnode-id="3483"><span class="mw-editsection-bracket" data-dcnode-id="3488"><span data-dcnode-id="3489" instrument_node="">[</span></span><a data-dcnode-id="3486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_history_of_Australia%26action%3Dedit%26section%3D14" title="Edit section: Textiles"><span data-dcnode-id="3487" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3481" instrument_node="">
