</span><h2 data-dcnode-id="4862"><span data-dcnode-id="4872" id="1788.E2.80.931821"></span><span class="mw-headline" data-dcnode-id="4870" id="1788–1821"><span data-dcnode-id="4871" instrument_node="">1788–1821</span></span><span class="mw-editsection" data-dcnode-id="4863"><span class="mw-editsection-bracket" data-dcnode-id="4868"><span data-dcnode-id="4869" instrument_node="">[</span></span><a data-dcnode-id="4866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_history_of_Australia%26action%3Dedit%26section%3D1" title="Edit section: 1788–1821"><span data-dcnode-id="4867" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4864"><span data-dcnode-id="4865" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4861" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4851"><div class="thumbinner" data-dcnode-id="4852" style="width:222px;"><a class="image" data-dcnode-id="4859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AView_in_Port_Jackson.jpg"><img alt="Port Jackson" class="thumbimage" data-dcnode-id="4860" data-file-height="364" data-file-width="500" decoding="async" height="160" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/71/View_in_Port_Jackson.jpg/220px-View_in_Port_Jackson.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/71/View_in_Port_Jackson.jpg/330px-View_in_Port_Jackson.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/71/View_in_Port_Jackson.jpg/440px-View_in_Port_Jackson.jpg 2x" width="220"></a><span data-dcnode-id="4858" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4853"><div class="magnify" data-dcnode-id="4856"><a class="internal" data-dcnode-id="4857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AView_in_Port_Jackson.jpg" title="Enlarge"></a></div><a data-dcnode-id="4854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Port_Jackson" title="Port Jackson"><span data-dcnode-id="4855" instrument_node="">Port Jackson</span></a></div></div></div><span data-dcnode-id="4850" instrument_node="">
</span><p data-dcnode-id="4811"><span data-dcnode-id="4849" instrument_node="">The European settlement of </span><a data-dcnode-id="4847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australia" title="Australia"><span data-dcnode-id="4848" instrument_node="">Australia</span></a><span data-dcnode-id="4846" instrument_node=""> began on 26 January 1788 at </span><a data-dcnode-id="4844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Port_Jackson" title="Port Jackson"><span data-dcnode-id="4845" instrument_node="">Port Jackson</span></a><span data-dcnode-id="4843" instrument_node=""> (modern Sydney, </span><a data-dcnode-id="4841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_South_Wales" title="New South Wales"><span data-dcnode-id="4842" instrument_node="">New South Wales</span></a><span data-dcnode-id="4840" instrument_node="">), when the </span><a data-dcnode-id="4838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Fleet" title="First Fleet"><span data-dcnode-id="4839" instrument_node="">First Fleet</span></a><span data-dcnode-id="4837" instrument_node=""> arrived with more than 1,000 convicts, marines and a few free settlers, plus a vast quantity of stores to establish a </span><a data-dcnode-id="4835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Penal_colony" title="Penal colony"><span data-dcnode-id="4836" instrument_node="">penal colony</span></a><span data-dcnode-id="4834" instrument_node=""> in New South Wales. The </span><a data-dcnode-id="4832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="4833" instrument_node="">United Kingdom</span></a><span data-dcnode-id="4831" instrument_node=""> claimed all of eastern Australian as its territory on the basis of </span><a data-dcnode-id="4829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terra_nullius" title="Terra nullius"><span data-dcnode-id="4830" instrument_node="">terra nullius</span></a><span data-dcnode-id="4828" instrument_node="">, though the actual landing and consequent settlement was initially confined to the Port Jackson area. According to the first census of 1788, as reported by </span><a data-dcnode-id="4826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arthur_Phillip" title="Arthur Phillip"><span data-dcnode-id="4827" instrument_node="">Governor Phillip</span></a><span data-dcnode-id="4825" instrument_node=""> to </span><a data-dcnode-id="4823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Townshend%2C_1st_Viscount_Sydney" title="Thomas Townshend, 1st Viscount Sydney"><span data-dcnode-id="4824" instrument_node="">Lord Sydney</span></a><span data-dcnode-id="4822" instrument_node="">, the Home Secretary, the white population in the colony was 1,030, of which 753 were convicts and their children; the colony also had 7 horses, 2903 sheep, 749 swine, 6 rabbits, and 754 cattle.</span><sup class="reference" data-dcnode-id="4819" id="cite_ref-1"><a data-dcnode-id="4820" href="#cite_note-1"><span data-dcnode-id="4821" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4818" instrument_node=""> The Indigenous population was not counted or estimated, nor reported at that point. More settlers came with the arrival of the </span><a data-dcnode-id="4816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Fleet_%28Australia%29" title="Second Fleet (Australia)"><span data-dcnode-id="4817" instrument_node="">Second Fleet</span></a><span data-dcnode-id="4815" instrument_node=""> in 1789, and the </span><a data-dcnode-id="4813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_Fleet_%28Australia%29" title="Third Fleet (Australia)"><span data-dcnode-id="4814" instrument_node="">Third Fleet</span></a><span data-dcnode-id="4812" instrument_node=""> in 1791, with other convict transports in the years that followed.
</span></p><p data-dcnode-id="4776"><span data-dcnode-id="4810" instrument_node="">Governors of New South Wales had authority to make land grants to free settlers, emancipists (former convicts) and non-commissioned officers. Land grants were often subject to conditions, such as a </span><a class="mw-redirect" data-dcnode-id="4808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quit_rent" title="Quit rent"><span data-dcnode-id="4809" instrument_node="">quit rent</span></a><span data-dcnode-id="4807" instrument_node=""> (one shilling per 50 acres (200,000 m2) to be paid after five years) and a requirement for the grantee to reside on and cultivate the land. </span><a data-dcnode-id="4805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Whaling_in_Australia" title="Whaling in Australia"><span data-dcnode-id="4806" instrument_node="">Whaling in Australia</span></a><span data-dcnode-id="4804" instrument_node=""> commenced in 1791, when Captain Thomas Melvill, commanding the </span><a data-dcnode-id="4801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Britannia_%281783_whaler%29" title="Britannia (1783 whaler)"><i data-dcnode-id="4802"><span data-dcnode-id="4803" instrument_node="">Britannia</span></i></a><span data-dcnode-id="4800" instrument_node="">, one of 11 ships of the </span><a data-dcnode-id="4798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_Fleet_%28Australia%29" title="Third Fleet (Australia)"><span data-dcnode-id="4799" instrument_node="">Third Fleet</span></a><span data-dcnode-id="4797" instrument_node="">, and Captain </span><a data-dcnode-id="4795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eber_Bunker" title="Eber Bunker"><span data-dcnode-id="4796" instrument_node="">Eber Bunker</span></a><span data-dcnode-id="4794" instrument_node=""> of the </span><i data-dcnode-id="4791"><a data-dcnode-id="4792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_and_Ann_%281759%29" title="William and Ann (1759)"><span data-dcnode-id="4793" instrument_node="">William and Ann</span></a></i><span data-dcnode-id="4790" instrument_node="">, after landing their passengers and cargo then went whaling and sealing in </span><a data-dcnode-id="4788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australasia" title="Australasia"><span data-dcnode-id="4789" instrument_node="">Australasian</span></a><span data-dcnode-id="4787" instrument_node=""> waters. Seal skins, </span><a data-dcnode-id="4785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Whale_oil" title="Whale oil"><span data-dcnode-id="4786" instrument_node="">Whale oil</span></a><span data-dcnode-id="4784" instrument_node=""> and </span><a data-dcnode-id="4782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baleen" title="Baleen"><span data-dcnode-id="4783" instrument_node="">baleen</span></a><span data-dcnode-id="4781" instrument_node=""> (whalebone) were valuable commodities and provided Australia with its first major export industries. Sealing and whaling contributed more to the colonial economy than land produce until the 1830s.</span><sup class="reference" data-dcnode-id="4778" id="cite_ref-Macintyre_2-0"><a data-dcnode-id="4779" href="#cite_note-Macintyre-2"><span data-dcnode-id="4780" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4777" instrument_node=""> When Governor Phillip left the colony in December 1792, the European population was 4,221, of whom 3,099 were convicts.
</span></p><p data-dcnode-id="4769"><a data-dcnode-id="4774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hobart" title="Hobart"><span data-dcnode-id="4775" instrument_node="">Hobart</span></a><span data-dcnode-id="4773" instrument_node=""> in what was then called Van Diemen's Land (modern </span><a data-dcnode-id="4771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tasmania" title="Tasmania"><span data-dcnode-id="4772" instrument_node="">Tasmania</span></a><span data-dcnode-id="4770" instrument_node="">) was established in 1804 as a penal settlement. It was founded more to forestall a possible French claim to that part of Australia than for any immediate economic benefit to the Sydney settlement.
</span></p><p data-dcnode-id="4752"><span data-dcnode-id="4768" instrument_node="">The colony of New South Wales barely survived its first years and was largely neglected for much of the following quarter-century while the </span><a class="mw-redirect" data-dcnode-id="4766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_government" title="British government"><span data-dcnode-id="4767" instrument_node="">British government</span></a><span data-dcnode-id="4765" instrument_node=""> was preoccupied until 1815 with the </span><a data-dcnode-id="4763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Napoleonic_Wars" title="Napoleonic Wars"><span data-dcnode-id="4764" instrument_node="">Napoleonic Wars</span></a><span data-dcnode-id="4762" instrument_node="">. One very important British oversight was the provision of adequate coinage for the new colony and, because of the shortage of any sort of money, the real </span><a class="mw-redirect" data-dcnode-id="4760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Means_of_exchange" title="Means of exchange"><span data-dcnode-id="4761" instrument_node="">means of exchange</span></a><span data-dcnode-id="4759" instrument_node=""> during the first 25 years of settlement was rum. Though it did not solve the problem arising from the lack of coins, but in an attempt to put some order into the economy, in 1800, Governor </span><a data-dcnode-id="4757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philip_Gidley_King" title="Philip Gidley King"><span data-dcnode-id="4758" instrument_node="">Philip Gidley King</span></a><span data-dcnode-id="4756" instrument_node=""> set the value of a variety of foreign coins circulating in New South Wales. During this period the </span><a data-dcnode-id="4754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_South_Wales_Corps" title="New South Wales Corps"><span data-dcnode-id="4755" instrument_node="">New South Wales Corps</span></a><span data-dcnode-id="4753" instrument_node="">, whose officers had benefited most from access to land and imported goods (thus hopelessly entangling public and private interests), defied the authority of the governors. The New South Wales Corps was recalled in 1808.
</span></p><p data-dcnode-id="4745"><a data-dcnode-id="4750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lachlan_Macquarie" title="Lachlan Macquarie"><span data-dcnode-id="4751" instrument_node="">Governor Macquarie</span></a><span data-dcnode-id="4749" instrument_node=""> was appointed in the following year. There was a change of policy under his administration towards the promotion of a private economy to support the penal regime, separate from the activities and interests of the colonial government. There was a significant increase in </span><a data-dcnode-id="4747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Penal_transportation" title="Penal transportation"><span data-dcnode-id="4748" instrument_node="">transportation</span></a><span data-dcnode-id="4746" instrument_node=""> after 1810, which provided cheap and skilled labour for the colony. As laborers, craftsmen, clerks and tradesmen, many convicts possessed the skills required in the new settlements. As their terms expired, they also added permanently to the free population.
</span></p><p data-dcnode-id="4703"><span data-dcnode-id="4744" instrument_node="">The </span><a data-dcnode-id="4742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blue_Mountains_%28New_South_Wales%29" title="Blue Mountains (New South Wales)"><span data-dcnode-id="4743" instrument_node="">Blue Mountains</span></a><span data-dcnode-id="4741" instrument_node=""> were a barrier to the expansion of the colony. The </span><a class="mw-redirect" data-dcnode-id="4739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crossing_of_the_Blue_Mountains" title="Crossing of the Blue Mountains"><span data-dcnode-id="4740" instrument_node="">crossing of the Blue Mountains</span></a><span data-dcnode-id="4738" instrument_node=""> in 1813 enabled the settlers to access and use the wealthy land west of the mountains for farming. </span><a data-dcnode-id="4736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bathurst%2C_New_South_Wales" title="Bathurst, New South Wales"><span data-dcnode-id="4737" instrument_node="">Bathurst</span></a><span data-dcnode-id="4735" instrument_node=""> was established as Australia's first inland settlement.</span><sup class="reference" data-dcnode-id="4732" id="cite_ref-BMCB-genhist_3-0"><a data-dcnode-id="4733" href="#cite_note-BMCB-genhist-3"><span data-dcnode-id="4734" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4731" instrument_node=""> The first bank in Sydney, the </span><a data-dcnode-id="4729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bank_of_New_South_Wales" title="Bank of New South Wales"><span data-dcnode-id="4730" instrument_node="">Bank of New South Wales</span></a><span data-dcnode-id="4728" instrument_node="">, was established in 1817. The Bank, and each private bank established afterwards, could issue its own paper money. During the 19th and early 20th century, the Bank of New South Wales opened branches, first throughout Australia and Oceania, including branches at </span><a data-dcnode-id="4726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moreton_Bay" title="Moreton Bay"><span data-dcnode-id="4727" instrument_node="">Moreton Bay</span></a><span data-dcnode-id="4725" instrument_node=""> (</span><a data-dcnode-id="4723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brisbane" title="Brisbane"><span data-dcnode-id="4724" instrument_node="">Brisbane</span></a><span data-dcnode-id="4722" instrument_node="">) in 1850, then in </span><a data-dcnode-id="4720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victoria_%28Australia%29" title="Victoria (Australia)"><span data-dcnode-id="4721" instrument_node="">Victoria</span></a><span data-dcnode-id="4719" instrument_node=""> (1851), New Zealand (1861), </span><a data-dcnode-id="4717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Australia" title="South Australia"><span data-dcnode-id="4718" instrument_node="">South Australia</span></a><span data-dcnode-id="4716" instrument_node=""> (1877), </span><a data-dcnode-id="4714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Australia" title="Western Australia"><span data-dcnode-id="4715" instrument_node="">Western Australia</span></a><span data-dcnode-id="4713" instrument_node=""> (1883), </span><a data-dcnode-id="4711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fiji" title="Fiji"><span data-dcnode-id="4712" instrument_node="">Fiji</span></a><span data-dcnode-id="4710" instrument_node=""> (1901), Papua (now part of </span><a data-dcnode-id="4708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Papua_New_Guinea" title="Papua New Guinea"><span data-dcnode-id="4709" instrument_node="">Papua New Guinea</span></a><span data-dcnode-id="4707" instrument_node="">) (1910) and </span><a data-dcnode-id="4705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tasmania" title="Tasmania"><span data-dcnode-id="4706" instrument_node="">Tasmania</span></a><span data-dcnode-id="4704" instrument_node=""> (1910).
</span></p><p data-dcnode-id="4701"><span data-dcnode-id="4702" instrument_node="">In line with the United Kingdom's i.e. the British government's policy of concentrated land settlement for the colony, Governors of New South Wales tended to be conservative in making land grants. By the end of Macquarie's tenure in 1821, less than 1,000 square miles (3,000 km2) of land had been granted in the colony. Above all, agriculture was established on the basis of land grants to senior officials and emancipated convicts, and limited freedoms were allowed to convicts to supply a range of goods and services. Although economic life depended heavily on the government Commissariat as a supplier of goods, money and foreign exchange, individual rights in property and labour were recognised, and private markets for both started to function.
</span></p><span data-dcnode-id="4700" instrument_node="">
</span><h2 data-dcnode-id="4689"><span data-dcnode-id="4699" id="1821.E2.80.931840s"></span><span class="mw-headline" data-dcnode-id="4697" id="1821–1840s"><span data-dcnode-id="4698" instrument_node="">1821–1840s</span></span><span class="mw-editsection" data-dcnode-id="4690"><span class="mw-editsection-bracket" data-dcnode-id="4695"><span data-dcnode-id="4696" instrument_node="">[</span></span><a data-dcnode-id="4693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_history_of_Australia%26action%3Dedit%26section%3D2" title="Edit section: 1821–1840s"><span data-dcnode-id="4694" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4691"><span data-dcnode-id="4692" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4688" instrument_node="">
</span><p data-dcnode-id="4675"><span data-dcnode-id="4687" instrument_node="">According to a 2018 study in the </span><i data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">Economic History Review</span></i><span data-dcnode-id="4684" instrument_node="">, "Australian GDP per worker grew exceptionally quickly from the 1820s to the 1870s, at a rate about twice that of the US and three times that of Britain."</span><sup class="reference" data-dcnode-id="4681" id="cite_ref-:0_4-0"><a data-dcnode-id="4682" href="#cite_note-:0-4"><span data-dcnode-id="4683" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4680" instrument_node=""> This rapid growth in GDP per worker did not however lead to rising inequality (as has been the case in similar scenarios in other countries) but rather a "revolutionary levelling in incomes up to the 1870s".</span><sup class="reference" data-dcnode-id="4677" id="cite_ref-:0_4-1"><a data-dcnode-id="4678" href="#cite_note-:0-4"><span data-dcnode-id="4679" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4676" instrument_node="">
</span></p><p data-dcnode-id="4666"><span data-dcnode-id="4674" instrument_node="">During </span><a data-dcnode-id="4672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Brisbane" title="Thomas Brisbane"><span data-dcnode-id="4673" instrument_node="">Governor Brisbane's</span></a><span data-dcnode-id="4671" instrument_node=""> 4-year term (1821–1825) land grants were more readily made. In addition, regulations introduced during Brisbane's term enabled settlers to purchase (with his permission) up to 4,000 acres (16&nbsp;km²) at 5s an acre (with superior quality land priced at 7s 6d). During his term, the total amount of land in private hands virtually doubled.</span><sup class="reference" data-dcnode-id="4668" id="cite_ref-5"><a data-dcnode-id="4669" href="#cite_note-5"><span data-dcnode-id="4670" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4667" instrument_node="">
</span></p><p data-dcnode-id="4658"><span data-dcnode-id="4665" instrument_node="">Those known as 'free settlers' were only permitted to take up land within the approved areas, which from 1826 was confined to the </span><a data-dcnode-id="4663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nineteen_Counties" title="Nineteen Counties"><span data-dcnode-id="4664" instrument_node="">Nineteen Counties</span></a><span data-dcnode-id="4662" instrument_node=""> of the Sydney settlement. From 1831 the granting of free land ceased and the only land that was to be available for sale was to be within the Nineteen Counties. Despite the uncertainty of land tenure, </span><a class="mw-redirect" data-dcnode-id="4660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Squatting_%28pastoral%29" title="Squatting (pastoral)"><span data-dcnode-id="4661" instrument_node="">squatters</span></a><span data-dcnode-id="4659" instrument_node=""> ran large numbers of sheep and cattle beyond the boundaries. From 1836 they could legally do so, paying ten pounds per year for the right.
</span></p><p data-dcnode-id="4646"><span data-dcnode-id="4657" instrument_node="">From the 1820s economic growth was based increasingly upon the production of fine wool and other rural commodities for markets in Britain and the industrializing economies of Northwestern Europe. To finance this trade a number of banks set up in London in the 1830s, including the </span><a data-dcnode-id="4655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bank_of_Australasia" title="Bank of Australasia"><span data-dcnode-id="4656" instrument_node="">Bank of Australasia</span></a><span data-dcnode-id="4654" instrument_node=""> in 1835</span><sup class="reference" data-dcnode-id="4651" id="cite_ref-6"><a data-dcnode-id="4652" href="#cite_note-6"><span data-dcnode-id="4653" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4650" instrument_node=""> and the </span><a data-dcnode-id="4648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Union_Bank_of_Australia" title="Union Bank of Australia"><span data-dcnode-id="4649" instrument_node="">Union Bank of Australia</span></a><span data-dcnode-id="4647" instrument_node=""> established in 1837. This growth was interrupted by two major depressions during the 1840s and 1890s and stimulated in complex ways by the rich gold discoveries in Victoria in 1851, but the underlying dynamics were essentially unchanged.
</span></p><p data-dcnode-id="4644"><span data-dcnode-id="4645" instrument_node="">At different times, the extraction of natural resources, whether maritime before the 1840s or later gold and other minerals, was also important. Agriculture, local manufacturing and construction industries expanded to meet the immediate needs of growing populations, which concentrated increasingly in the main urban centers.
</span></p><p data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">The opportunities for large profits in pastoralism and mining attracted considerable amounts of British capital, while expansion generally was supported by enormous government outlays for transport, communication and urban infrastructures, which also depended heavily on British finance. As the economy expanded, large-scale immigration became necessary to satisfy the growing demand for workers, especially after the end of convict transportation to the eastern mainland in 1840.
</span></p><p data-dcnode-id="4640"><span data-dcnode-id="4641" instrument_node="">The costs of immigration were subsidized by colonial governments, with settlers coming predominantly from the United Kingdom and bringing skills that contributed enormously to the economy's growth. All this provided the foundation for the establishment of free colonial societies. In turn, the institutions associated with these – including the rule of law, secure property rights, and stable and democratic political systems – created conditions that, on balance, fostered growth.
</span></p><p data-dcnode-id="4638"><span data-dcnode-id="4639" instrument_node="">In addition to New South Wales, four other British colonies were established on the mainland: Western Australia (1829), South Australia (1836), Victoria (1851) and Queensland (1859). Van Diemen's Land (Tasmania after 1856) became a separate colony in 1825. From the 1850s, these colonies acquired responsible government. In 1901, they federated, creating the Commonwealth of Australia.
</span></p><p data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">The process of colonial growth began with two related developments. First, in 1820, Macquarie responded to land pressure in the districts immediately surrounding Sydney by relaxing restrictions on settlement. Soon the outward movement of herdsmen seeking new pastures became uncontrollable. From the 1820s, the British authorities also encouraged private enterprise by the wholesale assignment of convicts to private employers and easy access to land.
</span></p><p data-dcnode-id="4634"><span data-dcnode-id="4635" instrument_node="">In 1831, the principles of systematic colonization popularized by Edward Gibbon Wakefield (1796–1862) were put into practice in New South Wales with the substitution of land sales for grants in order to finance immigration. This, however, did not affect the continued outward movement of pastoralists who simply occupied land where they could find it beyond the official limits of settlement, usually in disregard for any rights of indigenous peoples.
</span></p><p data-dcnode-id="4632"><span data-dcnode-id="4633" instrument_node="">By 1840, they had claimed a vast swathe of territory two hundred miles in depth running from Moreton Bay in the north (the site of modern Brisbane) to the Port Phillip District (the future colony of Victoria, whose capital Melbourne was marked out in 1837) to Adelaide in South Australia. The absence of any legal title meant that these intruders became known as 'squatters' and the terms of their tenure were not finally settled until 1846 after a prolonged political struggle with the Governor of New South Wales, Sir George Gipps.
</span></p><p data-dcnode-id="4630"><span data-dcnode-id="4631" instrument_node="">The impact of the original penal settlements on the indigenous population had been enormous. The consequences of squatting after 1820 were equally devastating as the land and natural resources upon which indigenous hunter-gathering activities and environmental management depended were appropriated on a massive scale. Aboriginal populations collapsed in the face of disease, violence and forced removal until they survived only on the margins of the new pastoral economy, on government reserves, or in the arid parts of the continent least touched by white settlement. The process would be repeated in northern Australia during the second half of the century.
</span></p><p data-dcnode-id="4628"><span data-dcnode-id="4629" instrument_node="">For the colonists this could happen because Australia was considered terra nullius, vacant land freely available for occupation and exploitation. The encouragement of private enterprise, the reception of Wakefieldian ideas, and the wholesale spread of white settlement were all part of a profound transformation in official and private perceptions of Australia's prospects and economic value as a British colony. Millennia of fire-stick management to assist hunter-gathering had created inland grasslands in the southeast that were ideally suited to the production of fine wool.
</span></p><p data-dcnode-id="4623"><span data-dcnode-id="4627" instrument_node="">Both the physical environment and the official incentives just described raised expectations of considerable profits to be made in pastoral enterprise and attracted a growing stream of British capital in the form of organizations like the </span><a data-dcnode-id="4625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Agricultural_Company" title="Australian Agricultural Company"><span data-dcnode-id="4626" instrument_node="">Australian Agricultural Company</span></a><span data-dcnode-id="4624" instrument_node=""> (1824), which was granted the right to select 1,000,000 acres (4,047 km2) in New South Wales for agricultural development; and new corporate settlements were established in Western Australia (1829) and South Australia (1836). By the 1830s, wool had overtaken whale oil as the colony's most important export, and by 1850 New South Wales had displaced Germany as the main overseas supplier to British industry.
</span></p><p data-dcnode-id="4621"><span data-dcnode-id="4622" instrument_node="">Allowing for the colonial economy's growing complexity, the cycle of growth based upon land settlement, exports and British capital would be repeated twice. The first pastoral boom ended in a depression which was at its worst during 1842–43. Although output continued to grow during the 1840s, the best land had been occupied in the absence of substantial investment in fencing and water supplies. Without further geographical expansion, opportunities for high profits were reduced and the flow of British capital dried up, contributing to a wider downturn caused by drought and mercantile failure.
</span></p><p data-dcnode-id="4606"><span data-dcnode-id="4620" instrument_node="">A number of London-based banks and mortgage companies were established during this period to operate in the colonies, including the </span><a data-dcnode-id="4618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bank_of_Australasia" title="Bank of Australasia"><span data-dcnode-id="4619" instrument_node="">Bank of Australasia</span></a><span data-dcnode-id="4617" instrument_node=""> (1835),</span><sup class="reference" data-dcnode-id="4614" id="cite_ref-7"><a data-dcnode-id="4615" href="#cite_note-7"><span data-dcnode-id="4616" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4613" instrument_node=""> the </span><a data-dcnode-id="4611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Union_Bank_of_Australia" title="Union Bank of Australia"><span data-dcnode-id="4612" instrument_node="">Union Bank of Australia</span></a><span data-dcnode-id="4610" instrument_node=""> (1837), and the </span><a class="mw-redirect" data-dcnode-id="4608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/English%2C_Scottish_and_Australian_Bank" title="English, Scottish and Australian Bank"><span data-dcnode-id="4609" instrument_node="">English, Scottish and Australian Bank</span></a><span data-dcnode-id="4607" instrument_node=""> (1852).
</span></p><span data-dcnode-id="4605" instrument_node="">
</span><h3 data-dcnode-id="4594"><span data-dcnode-id="4604" id="1850.E2.80.9360"></span><span class="mw-headline" data-dcnode-id="4602" id="1850–60"><span data-dcnode-id="4603" instrument_node="">1850–60</span></span><span class="mw-editsection" data-dcnode-id="4595"><span class="mw-editsection-bracket" data-dcnode-id="4600"><span data-dcnode-id="4601" instrument_node="">[</span></span><a data-dcnode-id="4598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_history_of_Australia%26action%3Dedit%26section%3D3" title="Edit section: 1850–60"><span data-dcnode-id="4599" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4593" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4581"><div class="thumbinner" data-dcnode-id="4582" style="width:182px;"><a class="image" data-dcnode-id="4591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFederal_Coffee_Palace%2C_Melbourne%2C_Australia.jpg"><img alt="" class="thumbimage" data-dcnode-id="4592" data-file-height="802" data-file-width="600" decoding="async" height="241" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/14/Federal_Coffee_Palace%252C_Melbourne%252C_Australia.jpg/180px-Federal_Coffee_Palace%252C_Melbourne%252C_Australia.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/14/Federal_Coffee_Palace%2C_Melbourne%2C_Australia.jpg/270px-Federal_Coffee_Palace%2C_Melbourne%2C_Australia.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/14/Federal_Coffee_Palace%2C_Melbourne%2C_Australia.jpg/360px-Federal_Coffee_Palace%2C_Melbourne%2C_Australia.jpg 2x" width="180"></a><span data-dcnode-id="4590" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4583"><div class="magnify" data-dcnode-id="4588"><a class="internal" data-dcnode-id="4589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFederal_Coffee_Palace%2C_Melbourne%2C_Australia.jpg" title="Enlarge"></a></div><span data-dcnode-id="4587" instrument_node="">Melbourne's </span><a data-dcnode-id="4585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_Coffee_Palace" title="Federal Coffee Palace"><span data-dcnode-id="4586" instrument_node="">Federal Coffee Palace</span></a><span data-dcnode-id="4584" instrument_node="">. A boom period in the 1870s due to the discovery of gold led to the construction of many grand edifices and public buildings in the city.</span></div></div></div><span data-dcnode-id="4580" instrument_node="">
</span><p data-dcnode-id="4571"><span data-dcnode-id="4579" instrument_node="">The discovery of gold in 1851 led to </span><a data-dcnode-id="4577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_gold_rushes" title="Australian gold rushes"><span data-dcnode-id="4578" instrument_node="">gold rushes</span></a><span data-dcnode-id="4576" instrument_node=""> in many parts of Australia and changed the direction of the Australian economy. The discovery led to many workers leaving their employment and heading for the goldfields. The gold rushes caused a huge influx of people from overseas, including from many non-British sources. In the 1850s Victoria was Australia's gold mining centre, its population increasing from 76,000 in 1851 to 540,000 in 1861. Australia's total population more than tripled from 430,000 in 1851 to 1.7 million in 1871.</span><sup class="reference" data-dcnode-id="4573" id="cite_ref-Aust_population_8-0"><a data-dcnode-id="4574" href="#cite_note-Aust_population-8"><span data-dcnode-id="4575" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4572" instrument_node=""> There was a resumption of wool as the principal provider of economic growth by 1860.
</span></p><p data-dcnode-id="4569"><span data-dcnode-id="4570" instrument_node="">The colonial governments started a "development strategy" by issuing bonds to the London market, selling public land and using this to fund infrastructure.
</span></p><p data-dcnode-id="4564"><span data-dcnode-id="4568" instrument_node="">As the easy gold ran out in Victoria many people flooded into Melbourne or became a pool of unemployed in cities around Ballarat and Bendigo. The accelerated population growth and the enormous wealth of the goldfields fuelled a </span><a class="mw-redirect" data-dcnode-id="4566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boom_and_bust" title="Boom and bust"><span data-dcnode-id="4567" instrument_node="">boom</span></a><span data-dcnode-id="4565" instrument_node=""> which lasted for forty years. Melbourne spread eastwards and northwards over the surrounding flat grasslands, and southwards down the eastern shore of Port Phillip. Wealthy new suburbs grew up, while the working classes settled in the inner suburbs.
</span></p><p data-dcnode-id="4549"><span data-dcnode-id="4563" instrument_node="">The influx of educated gold seekers from England led to rapid growth of schools, churches, learned societies, libraries and art galleries. On the back of the wealth derived from gold, there was a burst in building activity especially in Melbourne. </span><a data-dcnode-id="4561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_telegraphy_in_Australia" title="History of telegraphy in Australia"><span data-dcnode-id="4562" instrument_node="">Australia's first telegraph line</span></a><span data-dcnode-id="4560" instrument_node=""> was erected between Melbourne and Williamstown in 1853. The first railway in Australia was built in Melbourne in 1854. Following incorporation in 1853,</span><sup class="reference" data-dcnode-id="4557" id="cite_ref-9"><a data-dcnode-id="4558" href="#cite_note-9"><span data-dcnode-id="4559" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4556" instrument_node=""> the </span><a data-dcnode-id="4554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Melbourne" title="University of Melbourne"><span data-dcnode-id="4555" instrument_node="">University of Melbourne</span></a><span data-dcnode-id="4553" instrument_node=""> was built in 1855, and the </span><a class="mw-redirect" data-dcnode-id="4551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_Library_of_Victoria" title="State Library of Victoria"><span data-dcnode-id="4552" instrument_node="">State Library of Victoria</span></a><span data-dcnode-id="4550" instrument_node=""> in 1856. There were many other building works.
</span></p><span data-dcnode-id="4548" instrument_node="">
</span><h3 data-dcnode-id="4537"><span data-dcnode-id="4547" id="1860.E2.80.9375"></span><span class="mw-headline" data-dcnode-id="4545" id="1860–75"><span data-dcnode-id="4546" instrument_node="">1860–75</span></span><span class="mw-editsection" data-dcnode-id="4538"><span class="mw-editsection-bracket" data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">[</span></span><a data-dcnode-id="4541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_history_of_Australia%26action%3Dedit%26section%3D4" title="Edit section: 1860–75"><span data-dcnode-id="4542" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4536" instrument_node="">
</span><p data-dcnode-id="4525"><span data-dcnode-id="4535" instrument_node="">Due to the increases in income attributable to the gold rush, manufacturing and construction sectors of the economy fared very well. The boom fuelled by gold and wool lasted through the 1860s and the 1870s. Victoria suffered from an acute labour shortage despite its steady influx of migrants, and this pushed up wages until they were the highest in the world. Victoria was known as "the working man's paradise" in these years. The Stonemasons Union won the </span><a data-dcnode-id="4533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eight-hour_day" title="Eight-hour day"><span data-dcnode-id="4534" instrument_node="">eight-hour day</span></a><span data-dcnode-id="4532" instrument_node=""> in 1856 and celebrated by building the enormous </span><a class="mw-redirect" data-dcnode-id="4530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Melbourne_Trades_Hall" title="Melbourne Trades Hall"><span data-dcnode-id="4531" instrument_node="">Melbourne Trades Hall</span></a><span data-dcnode-id="4529" instrument_node=""> in </span><a data-dcnode-id="4527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carlton%2C_Victoria" title="Carlton, Victoria"><span data-dcnode-id="4528" instrument_node="">Carlton</span></a><span data-dcnode-id="4526" instrument_node="">.
</span></p><p data-dcnode-id="4517"><a data-dcnode-id="4523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Securities_Exchange" title="Australian Securities Exchange"><span data-dcnode-id="4524" instrument_node="">Australia's first stock exchange</span></a><span data-dcnode-id="4522" instrument_node=""> was opened in Melbourne in 1861.</span><sup class="reference" data-dcnode-id="4519" id="cite_ref-caslon_10-0"><a data-dcnode-id="4520" href="#cite_note-caslon-10"><span data-dcnode-id="4521" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4518" instrument_node="">
</span></p><p data-dcnode-id="4499"><span data-dcnode-id="4516" instrument_node="">In 1861, the </span><i data-dcnode-id="4513"><a data-dcnode-id="4514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robertson_Land_Acts" title="Robertson Land Acts"><span data-dcnode-id="4515" instrument_node="">Crown Lands Acts 1861 (NSW)</span></a></i><span data-dcnode-id="4512" instrument_node=""> reformed land holdings in New South Wales in an attempt to break the </span><a class="mw-redirect" data-dcnode-id="4510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Squatting_%28pastoral%29" title="Squatting (pastoral)"><span data-dcnode-id="4511" instrument_node="">squatters'</span></a><span data-dcnode-id="4509" instrument_node=""> domination of </span><a data-dcnode-id="4507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Land_tenure" title="Land tenure"><span data-dcnode-id="4508" instrument_node="">land tenure</span></a><span data-dcnode-id="4506" instrument_node="">. The Acts allowed unlimited selection of agricultural </span><a data-dcnode-id="4504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crown_land" title="Crown land"><span data-dcnode-id="4505" instrument_node="">crown land</span></a><span data-dcnode-id="4503" instrument_node=""> in designated areas and made redundant the limits of location, which had limited sale of land to the </span><a data-dcnode-id="4501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nineteen_Counties" title="Nineteen Counties"><span data-dcnode-id="4502" instrument_node="">Nineteen Counties</span></a><span data-dcnode-id="4500" instrument_node=""> which had applied since 1826.
</span></p><span data-dcnode-id="4498" instrument_node="">
</span><h3 data-dcnode-id="4487"><span data-dcnode-id="4497" id="1875.E2.80.9380"></span><span class="mw-headline" data-dcnode-id="4495" id="1875–80"><span data-dcnode-id="4496" instrument_node="">1875–80</span></span><span class="mw-editsection" data-dcnode-id="4488"><span class="mw-editsection-bracket" data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">[</span></span><a data-dcnode-id="4491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_history_of_Australia%26action%3Dedit%26section%3D5" title="Edit section: 1875–80"><span data-dcnode-id="4492" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4486" instrument_node="">
</span><p data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">As fertile land became less available to settlers, pastoral industries continued to increase their land holdings for the use of wool production. This caused a retraction in returns on investment by pastoral companies. Even when poorer land was utilized for the purpose of wool production there was continued investment both from private backers, and governments (in the form of transportation infrastructure).
</span></p><p data-dcnode-id="4456"><a class="mw-redirect" data-dcnode-id="4482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Melbourne_Trades_Hall" title="Melbourne Trades Hall"><span data-dcnode-id="4483" instrument_node="">Melbourne Trades Hall</span></a><span data-dcnode-id="4481" instrument_node=""> was opened in 1859 with </span><a data-dcnode-id="4479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_council" title="Labour council"><span data-dcnode-id="4480" instrument_node="">Trades and Labour Councils</span></a><span data-dcnode-id="4478" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="4476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trades_Hall" title="Trades Hall"><span data-dcnode-id="4477" instrument_node="">Trades Halls</span></a><span data-dcnode-id="4475" instrument_node=""> opening in all cities and most regional towns in the following forty years. During the 1880s </span><a class="mw-redirect" data-dcnode-id="4473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trade_unions" title="Trade unions"><span data-dcnode-id="4474" instrument_node="">Trade unions</span></a><span data-dcnode-id="4472" instrument_node=""> developed among </span><a data-dcnode-id="4470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sheep_shearer" title="Sheep shearer"><span data-dcnode-id="4471" instrument_node="">shearers</span></a><span data-dcnode-id="4469" instrument_node="">, </span><a data-dcnode-id="4467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Miner" title="Miner"><span data-dcnode-id="4468" instrument_node="">miners</span></a><span data-dcnode-id="4466" instrument_node="">, and </span><a data-dcnode-id="4464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stevedore" title="Stevedore"><span data-dcnode-id="4465" instrument_node="">stevedores</span></a><span data-dcnode-id="4463" instrument_node=""> (wharf workers), but soon spread to cover almost all </span><a class="mw-redirect" data-dcnode-id="4461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blue-collar" title="Blue-collar"><span data-dcnode-id="4462" instrument_node="">blue-collar</span></a><span data-dcnode-id="4460" instrument_node=""> jobs. Shortages of labour led to high wages for a prosperous skilled working class, whose unions demanded and got an </span><a data-dcnode-id="4458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eight-hour_day" title="Eight-hour day"><span data-dcnode-id="4459" instrument_node="">eight-hour day</span></a><span data-dcnode-id="4457" instrument_node=""> and other benefits unheard of in Europe.
</span></p><span data-dcnode-id="4455" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4441"><div class="thumbinner" data-dcnode-id="4442" style="width:222px;"><a class="image" data-dcnode-id="4453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMelbourne_eight_hour_day_march-c1900.jpg"><img alt="" class="thumbimage" data-dcnode-id="4454" data-file-height="750" data-file-width="1200" decoding="async" height="138" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Melbourne_eight_hour_day_march-c1900.jpg/220px-Melbourne_eight_hour_day_march-c1900.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Melbourne_eight_hour_day_march-c1900.jpg/330px-Melbourne_eight_hour_day_march-c1900.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Melbourne_eight_hour_day_march-c1900.jpg/440px-Melbourne_eight_hour_day_march-c1900.jpg 2x" width="220"></a><span data-dcnode-id="4452" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4443"><div class="magnify" data-dcnode-id="4450"><a class="internal" data-dcnode-id="4451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMelbourne_eight_hour_day_march-c1900.jpg" title="Enlarge"></a></div><a data-dcnode-id="4448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eight-hour_day" title="Eight-hour day"><span data-dcnode-id="4449" instrument_node="">Eight-hour day</span></a><span data-dcnode-id="4447" instrument_node=""> march circa 1900, outside Parliament House in Spring Street, </span><a data-dcnode-id="4445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Melbourne" title="Melbourne"><span data-dcnode-id="4446" instrument_node="">Melbourne</span></a><span data-dcnode-id="4444" instrument_node="">.</span></div></div></div><span data-dcnode-id="4440" instrument_node="">
</span><p data-dcnode-id="4435"><span data-dcnode-id="4439" instrument_node="">Australia gained a reputation as "the working man's paradise." Some employers tried to undercut the unions by importing Chinese labour. This produced a reaction which led to all the colonies restricting Chinese and other Asian immigration. This was the foundation of the </span><a class="mw-redirect" data-dcnode-id="4437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_Australia_Policy" title="White Australia Policy"><span data-dcnode-id="4438" instrument_node="">White Australia Policy</span></a><span data-dcnode-id="4436" instrument_node="">. The "Australian compact", based around centralised industrial arbitration, a degree of government assistance particularly for primary industries, and White Australia, was to continue for many years before gradually dissolving in the second half of the 20th century.
</span></p><span data-dcnode-id="4434" instrument_node="">
</span><h2 data-dcnode-id="4423"><span data-dcnode-id="4433" id="1880.E2.80.931890"></span><span class="mw-headline" data-dcnode-id="4431" id="1880–1890"><span data-dcnode-id="4432" instrument_node="">1880–1890</span></span><span class="mw-editsection" data-dcnode-id="4424"><span class="mw-editsection-bracket" data-dcnode-id="4429"><span data-dcnode-id="4430" instrument_node="">[</span></span><a data-dcnode-id="4427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_history_of_Australia%26action%3Dedit%26section%3D6" title="Edit section: 1880–1890"><span data-dcnode-id="4428" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4425"><span data-dcnode-id="4426" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4422" instrument_node="">
</span><p data-dcnode-id="4420"><span data-dcnode-id="4421" instrument_node="">An investment boom in Australia in the 1880s saw increased economic expansion although the investments were providing less of a return. That can be attributed to foreign funds' becoming more available to Australia. The influx of capital led to Australians' experiencing the highest per capita incomes in the world during the late 19th century.
</span></p><p data-dcnode-id="4390"><span data-dcnode-id="4419" instrument_node="">However, by the end of the 1880s, overseas investors became more concerned with the difference between </span><a data-dcnode-id="4417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Expected_return" title="Expected return"><span data-dcnode-id="4418" instrument_node="">expected returns</span></a><span data-dcnode-id="4416" instrument_node=""> and actual returns on Australian investment. The </span><a class="mw-redirect" data-dcnode-id="4414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barings_Crisis" title="Barings Crisis"><span data-dcnode-id="4415" instrument_node="">Barings Crisis</span></a><span data-dcnode-id="4413" instrument_node=""> of 1890, although focused on </span><a data-dcnode-id="4411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Argentina" title="Argentina"><span data-dcnode-id="4412" instrument_node="">Argentina</span></a><span data-dcnode-id="4410" instrument_node="">, led to a reassessment of the exposure of investors to regions of declining return, and consequently British investors began to withdraw from providing further funding to the Australian market. This caused a banking crisis in </span><a data-dcnode-id="4408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victoria_%28Australia%29" title="Victoria (Australia)"><span data-dcnode-id="4409" instrument_node="">Victoria</span></a><span data-dcnode-id="4407" instrument_node="">, </span><a data-dcnode-id="4405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Australia" title="South Australia"><span data-dcnode-id="4406" instrument_node="">South Australia</span></a><span data-dcnode-id="4404" instrument_node="">, </span><a data-dcnode-id="4402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_South_Wales" title="New South Wales"><span data-dcnode-id="4403" instrument_node="">New South Wales</span></a><span data-dcnode-id="4401" instrument_node=""> and </span><a data-dcnode-id="4399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tasmania" title="Tasmania"><span data-dcnode-id="4400" instrument_node="">Tasmania</span></a><span data-dcnode-id="4398" instrument_node="">. In 1891, </span><a data-dcnode-id="4396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bank_of_Van_Diemen%2527s_Land" title="Bank of Van Diemen's Land"><span data-dcnode-id="4397" instrument_node="">The Bank of Van Diemen's Land</span></a><span data-dcnode-id="4395" instrument_node=""> was the first major bank to fail, with 13 more to follow. By the end of the year it is estimated that half of Australian bank customers had been debarred from their bank.</span><sup class="reference" data-dcnode-id="4392" id="cite_ref-11"><a data-dcnode-id="4393" href="#cite_note-11"><span data-dcnode-id="4394" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4391" instrument_node=""> Consequently, the eastern Australian colonies saw the start of a severe depression in 1890-91. Australian economic historian Noel Butlin would later argue that the history of Australian settlement has been one of growth financed by foreign capital, punctuated by depression caused by balance of payment crises after a collapse in property prices and exacerbated by the imprudent use of capital.
</span></p><p data-dcnode-id="4373"><span data-dcnode-id="4389" instrument_node="">The impact of the end of the long boom and the collapse of the property market in Melbourne did not impact as greatly the economy of the colony of Western Australia, where substantial reserves of gold were discovered at </span><a data-dcnode-id="4387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kalgoorlie" title="Kalgoorlie"><span data-dcnode-id="4388" instrument_node="">Kalgoorlie</span></a><span data-dcnode-id="4386" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="4384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coolgardie" title="Coolgardie"><span data-dcnode-id="4385" instrument_node="">Coolgardie</span></a><span data-dcnode-id="4383" instrument_node=""> in a region of Western Australia that subsequently became known as the 'Goldfields'. This prompted a '</span><a class="mw-redirect" data-dcnode-id="4381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gold_Rush" title="Gold Rush"><span data-dcnode-id="4382" instrument_node="">Gold Rush</span></a><span data-dcnode-id="4380" instrument_node="">' in Western Australia characterized by a sustained, rapid expansion of the colony that would continue up to the </span><a class="mw-redirect" data-dcnode-id="4378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_World_War" title="First World War"><span data-dcnode-id="4379" instrument_node="">First World War</span></a><span data-dcnode-id="4377" instrument_node="">. This expansion allowed the development of the port of </span><a data-dcnode-id="4375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fremantle" title="Fremantle"><span data-dcnode-id="4376" instrument_node="">Fremantle</span></a><span data-dcnode-id="4374" instrument_node="">, the opening up of the south-west corner of the colony for agricultural development and the rapid expansion of the colonial rail network.
</span></p><p data-dcnode-id="4368"><span data-dcnode-id="4372" instrument_node="">In the 1880s, the long boom culminated in a frenzy of speculation and rapid inflation of land prices known as the Land Boom and centred on the city of </span><a data-dcnode-id="4370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Melbourne" title="Melbourne"><span data-dcnode-id="4371" instrument_node="">Melbourne</span></a><span data-dcnode-id="4369" instrument_node="">. Governments shared in the wealth and ploughed money into urban infrastructure, particularly railways. Huge fortunes were built on speculation, and Victorian business and politics became notorious for corruption. English banks lent freely to colonial speculators, adding to the mountain of debt on which the boom was built. Following the collapse of the Land Boom, property values in central Melbourne would not return to the level of the 1880s until the late 1950s (in real terms).
</span></p><span data-dcnode-id="4367" instrument_node="">
</span><h2 data-dcnode-id="4356"><span data-dcnode-id="4366" id="1890.E2.80.931900"></span><span class="mw-headline" data-dcnode-id="4364" id="1890–1900"><span data-dcnode-id="4365" instrument_node="">1890–1900</span></span><span class="mw-editsection" data-dcnode-id="4357"><span class="mw-editsection-bracket" data-dcnode-id="4362"><span data-dcnode-id="4363" instrument_node="">[</span></span><a data-dcnode-id="4360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_history_of_Australia%26action%3Dedit%26section%3D7" title="Edit section: 1890–1900"><span data-dcnode-id="4361" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4355" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4340"><div class="thumbinner" data-dcnode-id="4341" style="width:222px;"><a class="image" data-dcnode-id="4353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMine_-_panoramio_%286%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="4354" data-file-height="900" data-file-width="1200" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/74/Mine_-_panoramio_%25286%2529.jpg/220px-Mine_-_panoramio_%25286%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/74/Mine_-_panoramio_%286%29.jpg/330px-Mine_-_panoramio_%286%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/74/Mine_-_panoramio_%286%29.jpg/440px-Mine_-_panoramio_%286%29.jpg 2x" width="220"></a><span data-dcnode-id="4352" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4342"><div class="magnify" data-dcnode-id="4350"><a class="internal" data-dcnode-id="4351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMine_-_panoramio_%286%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="4349" instrument_node="">A mine in the </span><a data-dcnode-id="4347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boomtown" title="Boomtown"><span data-dcnode-id="4348" instrument_node="">mining boom town</span></a><span data-dcnode-id="4346" instrument_node=""> of </span><a data-dcnode-id="4344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Broken_Hill" title="Broken Hill"><span data-dcnode-id="4345" instrument_node="">Broken Hill</span></a><span data-dcnode-id="4343" instrument_node="">, where a miner's strike occurred in 1892. Broken Hill endured significant prosperity on the back of its mining industry throughout the 20th century.</span></div></div></div><span data-dcnode-id="4339" instrument_node="">
</span><ul data-dcnode-id="4285"><li data-dcnode-id="4335"><span data-dcnode-id="4338" instrument_node="">1890: the </span><a data-dcnode-id="4336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1890_Australian_maritime_dispute" title="1890 Australian maritime dispute"><span data-dcnode-id="4337" instrument_node="">Great maritime strike</span></a></li><span data-dcnode-id="4334" instrument_node="">
</span><li data-dcnode-id="4330"><span data-dcnode-id="4333" instrument_node="">1891: the </span><a data-dcnode-id="4331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1891_Australian_shearers%2527_strike" title="1891 Australian shearers' strike"><span data-dcnode-id="4332" instrument_node="">Australian shearers' strike</span></a></li><span data-dcnode-id="4329" instrument_node="">
</span><li data-dcnode-id="4324"><span data-dcnode-id="4328" instrument_node="">1891: 16 small banks and building societies collapsed in Melbourne</span><sup class="reference" data-dcnode-id="4325" id="cite_ref-timeline_12-0"><a data-dcnode-id="4326" href="#cite_note-timeline-12"><span data-dcnode-id="4327" instrument_node="">[12]</span></a></sup></li><span data-dcnode-id="4323" instrument_node="">
</span><li data-dcnode-id="4319"><span data-dcnode-id="4322" instrument_node="">1892: a strike occurs at the mines in </span><a data-dcnode-id="4320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Broken_Hill" title="Broken Hill"><span data-dcnode-id="4321" instrument_node="">Broken Hill</span></a></li><span data-dcnode-id="4318" instrument_node="">
</span><li data-dcnode-id="4313"><span data-dcnode-id="4317" instrument_node="">1892: 133 limited companies went into liquidation in Victoria alone</span><sup class="reference" data-dcnode-id="4314" id="cite_ref-timeline_12-1"><a data-dcnode-id="4315" href="#cite_note-timeline-12"><span data-dcnode-id="4316" instrument_node="">[12]</span></a></sup></li><span data-dcnode-id="4312" instrument_node="">
</span><li data-dcnode-id="4292"><span data-dcnode-id="4311" instrument_node="">1893: a major international depression and the speculative property boom of the 1880s, led to the </span><a data-dcnode-id="4309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_banking_crisis_of_1893" title="Australian banking crisis of 1893"><span data-dcnode-id="4310" instrument_node="">Australian banking crisis of 1893</span></a><span data-dcnode-id="4308" instrument_node=""> and a serious economic depression. 11 commercial banks failed or temporarily closed to avoid a </span><a data-dcnode-id="4306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bank_run" title="Bank run"><span data-dcnode-id="4307" instrument_node="">run</span></a><span data-dcnode-id="4305" instrument_node="">, including the </span><a data-dcnode-id="4303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Bank_of_Australasia" title="National Bank of Australasia"><span data-dcnode-id="4304" instrument_node="">National Bank of Australasia</span></a><span data-dcnode-id="4302" instrument_node=""> and the </span><a data-dcnode-id="4300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commercial_Bank_of_Australia" title="Commercial Bank of Australia"><span data-dcnode-id="4301" instrument_node="">Commercial Bank of Australia</span></a><span data-dcnode-id="4299" instrument_node="">. On 1 May, the Victoria government implemented a five-day </span><a data-dcnode-id="4297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bank_holiday" title="Bank holiday"><span data-dcnode-id="4298" instrument_node="">bank holiday</span></a><span data-dcnode-id="4296" instrument_node=""> to ameliorate the panic.</span><sup class="reference" data-dcnode-id="4293" id="cite_ref-timeline_12-2"><a data-dcnode-id="4294" href="#cite_note-timeline-12"><span data-dcnode-id="4295" instrument_node="">[12]</span></a></sup></li><span data-dcnode-id="4291" instrument_node="">
</span><li data-dcnode-id="4286"><span data-dcnode-id="4290" instrument_node="">1894: recovery from the crisis began. Some reforms to regulations and laws were made to try to prevent future financial abuses.</span><sup class="reference" data-dcnode-id="4287" id="cite_ref-13"><a data-dcnode-id="4288" href="#cite_note-13"><span data-dcnode-id="4289" instrument_node="">[13]</span></a></sup></li></ul><span data-dcnode-id="4284" instrument_node="">
</span><h2 data-dcnode-id="4273"><span data-dcnode-id="4283" id="1900.E2.80.931939"></span><span class="mw-headline" data-dcnode-id="4281" id="1900–1939"><span data-dcnode-id="4282" instrument_node="">1900–1939</span></span><span class="mw-editsection" data-dcnode-id="4274"><span class="mw-editsection-bracket" data-dcnode-id="4279"><span data-dcnode-id="4280" instrument_node="">[</span></span><a data-dcnode-id="4277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_history_of_Australia%26action%3Dedit%26section%3D8" title="Edit section: 1900–1939"><span data-dcnode-id="4278" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4275"><span data-dcnode-id="4276" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4272" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="4266" role="note"><span data-dcnode-id="4269" instrument_node="">Main article: </span><a data-dcnode-id="4267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_settlement" title="Australian settlement"><span data-dcnode-id="4268" instrument_node="">Australian settlement</span></a></div><span data-dcnode-id="4265" instrument_node="">
</span><p data-dcnode-id="4254"><span data-dcnode-id="4264" instrument_node="">In 1901, the </span><a class="mw-redirect" data-dcnode-id="4262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Prime_Ministers_of_Australia" title="List of Prime Ministers of Australia"><span data-dcnode-id="4263" instrument_node="">first</span></a><span data-dcnode-id="4261" instrument_node=""> federal government formed by the </span><a data-dcnode-id="4259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protectionist_Party" title="Protectionist Party"><span data-dcnode-id="4260" instrument_node="">Protectionist Party</span></a><span data-dcnode-id="4258" instrument_node="">.
In 1904, the </span><a data-dcnode-id="4256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Labor_Party" title="Australian Labor Party"><span data-dcnode-id="4257" instrument_node="">Australian Labor Party</span></a><span data-dcnode-id="4255" instrument_node=""> forms the Commonwealth government, the first labour movement in the world to attain government.
</span></p><span data-dcnode-id="4253" instrument_node="">
</span><ul data-dcnode-id="4247"><li data-dcnode-id="4248"><span data-dcnode-id="4252" instrument_node="">In 1907, the </span><a data-dcnode-id="4250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harvester_case" title="Harvester case"><span data-dcnode-id="4251" instrument_node="">Harvester case</span></a><span data-dcnode-id="4249" instrument_node=""> ruling that established the right to a basic wage, a 'fair and reasonable' minimum wage for unskilled workers of 7 shillings.</span></li></ul><span data-dcnode-id="4246" instrument_node="">
</span><p data-dcnode-id="4223"><span data-dcnode-id="4245" instrument_node="">In 1910, the federal government introduced a national currency, the </span><a data-dcnode-id="4243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_pound" title="Australian pound"><span data-dcnode-id="4244" instrument_node="">Australian pound</span></a><span data-dcnode-id="4242" instrument_node="">. Monetary policy ensured that the Australian pound was fixed in value to the </span><a data-dcnode-id="4240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pound_sterling" title="Pound sterling"><span data-dcnode-id="4241" instrument_node="">pound sterling</span></a><span data-dcnode-id="4239" instrument_node="">, and as long as Britain was on the </span><a data-dcnode-id="4237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gold_standard" title="Gold standard"><span data-dcnode-id="4238" instrument_node="">gold standard</span></a><span data-dcnode-id="4236" instrument_node="">, so was Australia. In 1914, the pound sterling was removed from the gold standard, but when it was returned to the gold standard in 1925, the sudden increase in its value, imposed by the nominal gold price, unleashed crushing </span><a data-dcnode-id="4234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deflation" title="Deflation"><span data-dcnode-id="4235" instrument_node="">deflation</span></a><span data-dcnode-id="4233" instrument_node="">. Both the initial 1914 </span><a data-dcnode-id="4231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inflation" title="Inflation"><span data-dcnode-id="4232" instrument_node="">inflation</span></a><span data-dcnode-id="4230" instrument_node=""> and the subsequent 1926 deflation had far-reaching economic effects throughout the </span><a data-dcnode-id="4228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Empire" title="British Empire"><span data-dcnode-id="4229" instrument_node="">British Empire</span></a><span data-dcnode-id="4227" instrument_node="">, including Australia, and the rest of the world. In 1929, as an emergency measure during the </span><a data-dcnode-id="4225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Depression" title="Great Depression"><span data-dcnode-id="4226" instrument_node="">Great Depression</span></a><span data-dcnode-id="4224" instrument_node="">, Australia left the gold standard, resulting in a devaluation relative to sterling. A variety of pegs to sterling applied until December 1931, when the government set a rate of £1 Australian = 16 shillings sterling (£1·5s Australian = £1 sterling; A£1.25 = £1 sterling).
</span></p><p data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">While wool-growing remained at the centre of economic activity, a variety of new goods, such as wheat, dairy and other agriculturally-based produce, became part of Australian exports. It was in then that the latter started contributing more to economic growth than wool production. Part of thar emergence of other sources of economic expansion came from technological progress, such as disease-resistant wheat and refrigerated shipping. The development of these technologies also renewed large-scale foreign investment.
</span></p><p data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">That injection of foreign investment led to increases in construction, particularly in the private residential sector. That injection of foreign cash was the main contributor to economic expansion, which was again troublesome for Australia's economy. Returns on investments, as before, were immensely different from the expected returns.
</span></p><p data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">By the 1920s, agricultural producers were experiencing profit troubles and governments, which invested heavily on transportation infrastructure, were not getting the returns that they had expected. Cutbacks in borrowing, government and private expenditure in the late 1920s led to a recession. The recession itself became worse as other nations fell into depressions. They not only cut back on foreign investments to Australia but also led to a lower demand for Australian exports. That culminated into the biggest recession in Australia's history, which peaked in 1931-1932.
</span></p><p data-dcnode-id="4209"><span data-dcnode-id="4216" instrument_node="">The worldwide depression of the 1930s was not felt as badly in Australia than in to international counterparts because of increases in productivity from the manufacturing sector. (In William Sinclair </span><a class="external autonumber" data-dcnode-id="4214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20060319001954/http%3A//www.assa.edu.au/Directory/listall.asp%3Fid%3D296" rel="nofollow"><span data-dcnode-id="4215" instrument_node="">[1]</span></a><span data-dcnode-id="4213" instrument_node="">'s terms </span><a class="external autonumber" data-dcnode-id="4211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//isbndb.com/d/book/australian_economic_development.html" rel="nofollow"><span data-dcnode-id="4212" instrument_node="">[2]</span></a><span data-dcnode-id="4210" instrument_node="">, that is when Australia moved from the old model to the new model.) Trade protection, particularly from tariffs implemented by governments at the time, were instrumental to the prosperity of the manufacturing sector.
</span></p><p data-dcnode-id="4203"><span data-dcnode-id="4208" instrument_node="">A major labour strike took place at the State Coalfields in Wonthaggi, Victoria in 1934. Conditions were hard on the strikers over a five month episode. Their resilience, cohesion, and significant community support accounted for their persistence. Winning the strike revitalized the Victorian labour movement and enhanced its political power.</span><sup class="reference" data-dcnode-id="4205" id="cite_ref-14"><a data-dcnode-id="4206" href="#cite_note-14"><span data-dcnode-id="4207" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4204" instrument_node="">
</span></p><span data-dcnode-id="4202" instrument_node="">
