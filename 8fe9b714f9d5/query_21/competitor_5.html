 refers to case work, counselling and psychotherapy as three distinct independent forms of helping. According to him counselling is and could be practised by social workers. But it is different from both case work and psychotherapy. Case work is geared to the provision of a concrete service such as financial relief, adoption and foster placement. Psychological knowledge and skills may be necessary for administering a concrete service. But it is different from counselling which is discussion of personal or interpersonal problems of individuals. On the other hand, psychotherapy which is also a form of psychological service, and has personality 2 change as its goal. Rogers who propounded 'non-directive counselling', does not make any distinction between psychotherapy and</span><p data-dcnode-id="2784"></p><p data-dcnode-id="2783"></p><h2 data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">fCounselling In The Indian Culture</span></h2><p data-dcnode-id="2780"></p><p data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">253</span></p><p data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">counselling, and uses these two terms synonymously. He considers environmental help as outside the scope of counselling and thus takes the same position as Aptekar.3 It is generally accepted that counselling requires psychological knowledge and skills. Depending on one's preference,a counsellor may choose anyone of the major psychological theories: Freudian, Neo-Freudian, Adlerian, Jungian, Rankian etc. or he may be an eclectic choosing concepts and skills useful from any of these. In addition, a counsellor needs knowledge pertaining to the problems characteristic of a field e.g. educational problems, problems of employees in industry, vocational problems, marital problems etc. There are two broad types of counselling- directive and non-directive counselling. A prominent advocate of non-directive counselling is Carl Rogers. Most Freudians and other psychoanalytically oriented counsellors also believe in non- directive counselling. The objective of counselling is stated variously as personality growth, developing self-knowledge and self-awareness, strengthening the capacity to perceive the problem realistically and deal with it, enabling the person to learn to exercise the choice wisely etc. This is to be achieved by discussion between the person and the counsellor. The discussion is focussed on the feelings and attitudes of the person. There is greater emphasis on emotions and comparatively less attention to the need for providing knowledge through information and explanation. The establishment of rapport or relationship is considered as an essential and vital element. Self-determination is a cardinal principle for most writers on counselling. The counsellee should be left free to select his own goal in relation to the solution of the problem. The non-directive group takes an extreme position on this point. In fact, if we have to select one single characteristic that distinguishes non-directive counselling from directive counselling, it is the great value attached to this principle. Other distinctive features of non-directive counselling include: the emphasis on minimal activity by the counsellor; authority as incompatible with counsel-</span></p><p data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">fChapter-16</span></p><p data-dcnode-id="2773"></p><h2 data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">Helping Process In The Bhagawadgita</span></h2><br data-dcnode-id="2770"><span data-dcnode-id="2769" instrument_node="">It should be made very clear at the beginning that this paper does not deal with the religious issues raised in Bhagavadgita. I am not competent to do it nor am I interested in that exercise. There is a vast literature published in English and most Indian languages, which should be referred to by those interested in Bhagavadgita as a religious text. My purpose is non-religious and limited to exploring the model of the helping process in the Bhagavadgita. In other words, I take the problem faced by Arjuna at the battlefront as an eternal human problem  what is ones duty when faced with a critical situation? Self-interest? Interest of others? Who are these others? What are the guiding principles to make the correct or the right choice? The Context Most people in India know the story of Mahabharata in some form or the other. While the details may vary, the main features of the context, the dilemma faced by Arjuna while both the armies of Kauravas and Pandavas are facing each other, ready to fight to the finish at the battlefield of Kurukshetra would be the same. At that time a short while before the actual beginning of the war, Srikrishna, the charioteer of Arjuna (Parthasarathy) takes the chariot in the</span><p data-dcnode-id="2768"></p><p data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">f262</span></p><p data-dcnode-id="2765"></p><h2 data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">SOCIAL WORK AND SOCIAL WELFARE</span></h2><p data-dcnode-id="2762"></p><p data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">middle of the battlefield between the two army formations and asks Arjuna to look in front of him, the Kauravas  the enemy. Shriranga states that Krishna did this deliberately. He asks Arjuna to look in front and not at the back-his own army and then in front-the Kauravas. Why? Perhaps Krishna is aware with his superior knowledge and ability to look ahead in future, what might happen. He does not want that to happen which would be a catastrophe i.e after the war has begun Arjuna to say that he did not wish to fight and in the process kill his own people (swajana) and commit a serious sin which would surely drive him to hell after his death. He wants Arjuna to face it now and deal with it, get it over with, so that he is fully determined to fight the Kauravas  without wavering in his mind by the feelings of swajana (my people). So, Krishna says take a look in front of you and see all the people ranged against you-the patriarch of the Kuru dynasty, highly revered Bheeshma Pitamaha, the great teacher Drona, who taught archery to both Kauravas and Pandavas, the other teacher before him Kripacharya, and then his cousin Duryodhana and his brothers, hundred of them. When Arjuna looks at all of them, suddenly there is a panic reaction. The feelings of swajana is so overpowering that his reasoning faculty fails. And he reacts by saying I will not fight and kill these people, they are my own kith and kin. It is at this crucial point that Krishna intervenes and his exposition of the great message follows, at the end of which Arjuna with his emotions in control, retrieving his sense of reasoning, knowing what is right and wrong in a proper perspective, unhesitatingly decides to fight and lead his army to victory. Rest is history. Shreeranga says Arjuna had faced a similar situation before, at the time of Gograhana battle (seizure of cattle) as Brihannale (neither man nor woman) as part of forest-dwelling incognito (Ajnatawasa). But, he was then in the employment of the king Virata as the chief of the army (Senapati), fighting for his employer, the king. His mind was</span></p><p data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">fChapter-17</span></p><p data-dcnode-id="2757"></p><h2 data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">Sarvodaya Methods Of Social Work</span></h2><br data-dcnode-id="2754"><span data-dcnode-id="2753" instrument_node="">In September 1964 the Gandhian Institute of Studies, Varanasi, appointed a Working Group consisting of Gandhian constructive workers and professional social workers with the purpose of developing a bridge between the two which might ultimately lead to the "fusion of the traditional concepts of social work as visualised by Mahatma Gandhi and the professional concepts of social work developed in the Western countries". The Report of the Working Group has already been published. The Gandhian Institute organised another seminar at Varanasi from March 20 to 22, 1967, to continue the dialogue between the two groups of social workers. The purpose of this seminar was to develop a greater insight in the sarvodaya methods of social work by making "a comparative analysis of some of the important techniques as practiced by a few outstanding leaders of the sarvodaya field". During the seminar a sentence in Prof. Dasgupta's paper led to a lively discussion. He had said that "the end of social work is the end of social work". This, Shri Dhirendra Mazumdar queried. Is it possible, he asked, to conceive of a society at any point of time where there will be no need for social work? He felt that whereas there could be an "end" of social workers in a particular community, he believed that in any society, however wellorganised and developed, there would always be a need for social work. Acharya Ram Murti addressed a question to the professional</span><p data-dcnode-id="2752"></p><p data-dcnode-id="2751"></p><h2 data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">fSarvodaya Methods Of Social Work</span></h2><p data-dcnode-id="2748"></p><p data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">271</span></p><p data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">group. He explained that the Sarvodaya group makes a difference between welfare work and liberation work. Welfare work is in the nature of providing relief to people suffering from various problems. Liberation work refers to the total, fundamental change in social relationship and the institutional structure of society; it implies mobilising the people's power and leading a movement to break deadlocks created by powerful vested interests in a community. The Acharya asked: Are the professional social workers willing to lead or participate in such a people's movement? In reply, some pointed out that social action is a method of social work and the professional social worker is supposed to participate in a programme of social action. Dr. Ruby Pernell answered the question: Theoretically a professional social worker believes in participating and leading a movement or direct action programme. However, in practice, professional social workers are unable to do this because they are employees of government or government-aided organisations The service rules and their own concern for job security prevent them from participating. in such direct action programmes. Dr. Chatterjee's paper attempted to analyse the Gandhian concept of change of heart by comparing it with the theories of different schools of psychology. He pointed out that "to Gandhian logic, the change of heart was a total, revolutionary, cataclysmic event, encompassing the entire 'philosophy of life', so that all actions subsequent to the change of heart are in conformity with the radical change that has taken place at the core", Like professional social workers, Gandhians also believe that "mere intellectual acceptance, on grounds of logic, is not enough; the change has to be at the levels of emotions and feelings too-the involvement has to be total, at the cognitive, conative as well as the affective levels." According to Dr. Chaterjee, there is one essential difference between the Gandhian and the Freudian concept of personality change. In Gandhian technique, change of heart is sought through strengthening the" control of the super-ego.</span></p><p data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">fChapter-18</span></p><p data-dcnode-id="2741"></p><h2 data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">Developmental Perspective Of Social Welfare</span></h2><br data-dcnode-id="2738"><span data-dcnode-id="2737" instrument_node="">Two models of social welfare are usually mentioned in historical reviews of social welfare. The dominant and popular model is usually referred to as the remedial or residual model which is contrasted with the other model described variously as the institutional-redistributive or developmental model of social welfare. It is frequently argued by some wellknown western and Indian writers that the latter model is more suited to the developing countries which include India. Social work education in India has been based on the traditional model of social welfare and social work practice with some modifications to suit the Indian situation. At the beginning of the decade of 1970's a few social work educators in India (including this writer) began to advocate developmental orientation to social welfare and social work education which was also the emerging new trend both regionally and internationally. The factors responsible for this have been discussed elsewhere. An official committee endorsed this new orientation to social work practice and education by recommending that social work education should be in tune with social reality and it should have a rural bias in contrast to the prevalent urban-industrialmetropolis model (UGC 1980). While almost all social work educators publicly seem to be committed to the developmental model of social welfare and social work education, there is very little evidence of the implementation of this commitment either in social work</span><p data-dcnode-id="2736"></p><p data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">f276</span></p><p data-dcnode-id="2733"></p><h2 data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">SOCIAL WORK AND SOCIAL WELFARE</span></h2><p data-dcnode-id="2730"></p><p data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">practice or social work education. We need not go into the reasons for this here. A brief explanation of developmental social welfare, a convenient shorthand term for the new model, will be made before illustrating some of its features in a few selected areas of social work practice. The term development' and 'social development' are frequently used in the literature dealing with this model. There are no widely accepted definitions of these concepts in the disciplines concerned such as economics, sociology and social welfare. The economist's perception of development is based on his own discipline's bias and expansiveness which has been described as economism by Nieuwenhuize, a wellknown Dutch sociologist. Conceptually the economists have moved from economic growth and later economic development as the central objective of planned nation-building by the newly independent countries of the world to a broader but not significantly different concept of development. They include in it some non-economic variables which together are referred to in a residual meaning of the term social as social development. It may mean either or both of the following: social prerequisites to economic development and social consequences of development (considered as undesirable). In U.N literature it tends to be stated as economic development plus institutional change without clearly defining institutional change, but with occasional references to family planning and land reforms as programmes or to the objective of social justice, sometimes also referred to as redistribution or distributive justice. Gradual elimination of the mass problems of illiteracy, unemployment and poverty are included in this view of development. The sociologists tend to take a holistic view of the term social development which includes economic development as one of the many components rather than as the dominant feature of it. In a major treatise on development a western sociologist defines social</span></p><p data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">fChapter -19</span></p><p data-dcnode-id="2725"></p><h2 data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">Roles And Functions Of Social Welfare</span></h2><br data-dcnode-id="2722"><span data-dcnode-id="2721" instrument_node="">The historical evolution of social welfare, which was presented in the previous chapters pointed out the changing emphasis on social welfare at different periods of history. In India, the earliest conception of what has now come to be known as social welfare, was dana, and the philosophy underlying it was known as dana dharma or dhamma. Dana literally meant sharing, and Dharma had a variety of 1 meanings, ranging from duty or obligation to charity or equity. During the medieval period when Muslim kings ruled the country, charity was known as khairat. The goal of social welfare has been described at different times in Indian history as lokasangraha, loka sreya and sarvodaya.2 In the west, it was known as charity or philanthropy before the industrial revolution and even after, until about the second decade of the nineteenth century. After the middle of the nineteenth century, during the Charity Organisation Movement in England, the term 'scientific charity' gradually gained currency. As late as 1897 in the U.S.A., Mary Richmond was saying that the new profession had no name and for want of a better name she called it the profession of 3 applied philanthropy. The term 'social work' was introduced in the 4 U.K. by about the 1920s. We do not know when the term 'social welfare' came to be used.</span><p data-dcnode-id="2720"></p><p data-dcnode-id="2719"></p><h2 data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">fRoles And Functions Of Social Welfare</span></h2><p data-dcnode-id="2716"></p><p data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">281</span></p><p data-dcnode-id="2710"><span data-dcnode-id="2713" instrument_node="">Recently there have been several attempts in the west to identify the different conceptions of social welfare and sometimes these are also referred to as models of social welfare. Wilensky and Lebaux referred to the antithetical conceptions of social welfare:</span><br data-dcnode-id="2712"><span data-dcnode-id="2711" instrument_node="">Two conceptions of social welfare seem to be dominant in the United States today: the residual and the institutional. The first holds that social welfare institutions should come into play when the normal structures of supply, the family and the market break down. The second, in contrast, sees the welfare services as normal 'first line' functions of modern industrial society.5</span></p><p data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">Somewhat similar to the institutional view of social welfare is the developmental concept of social welfare which was defined as: 'Welfare activities as a frontline function of modern industrial society, in a positive collaborative role with other major social institutions working toward a better society.6 Later, Richard Titmuss formulated the wellknown three models of social policy which incorporated the two previously mentioned concepts of social welfare. The Residual Welfare Model is based on the premise that there are two 'natural' (or socially given) channels through which an individual's needs are properly met; the private market and the family. Only when these break down should social welfare institutions come into play and then only temporarily .... The Industrial Achievement Performance Model incorporates a significant role for social welfare institutions as adjuncts of economy. It holds that social needs should be met on the basis of merit, work performance and productivity .... 'The Institutional Redistributive Model sees social welfare as a major integrated institution in society, providing universalist services outside the market on the principle of need. It is based on theories about the multiple effects of social change and the economic system, and in part on the principle' of social equality ....7</span></p><p data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">fChapter -20</span></p><p data-dcnode-id="2705"></p><h2 data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">Bhakti- Concept, Ideology And Spread</span></h2><br data-dcnode-id="2702"><span data-dcnode-id="2701" instrument_node="">The title of this chapter has been carefully chosen, after much deliberation. Bhakti as a religious concept is said to be present in rudimentary form even during the vedic period, while it is widely believed to have its origin in the Agamas and post-Agamic religious literature, culminating as BhaktiYoga in Bhagavadgita. Here we are concerned with its manifestation during a period of almost thousand years from the seventh century, originating in Tamil territory' (Tamil Nadu) moving upwards to Kannada speaking territory (Karnataka) from there to Marathi (Maharashtra) and Gujarati (Gujarat) speaking territories. It also erupted in the north-eastern U.P., spread towards the eastern India (Assam, Bengal, Bihar and Odisha) and downwards to the central parts of the country (Rajasthan, M.P). A religious concept developing into a religious ideology, modifying in major respects the earlier version of Bhakti, with mass appeal, attracting in significant numbers the middle and lower strata of society, cutting across all barriers of jati (caste), gender, occupation, social status, and even religion. This phenomenon has been described, debated, eulogized and critically assessed by scholars from different parts of the country over a period of several decades. It has been labelled as an "event", socio-religious, socio-political and social protest movement, etc. Some writers have gone so far as to call it a</span><p data-dcnode-id="2700"></p><p data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">f302</span></p><p data-dcnode-id="2697"></p><h2 data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">SOCIAL WORK AND SOCIAL WELFARE</span></h2><p data-dcnode-id="2694"></p><p data-dcnode-id="2690"><span data-dcnode-id="2693" instrument_node="">revolution'.* So some preliminary clarifications and observations seem to be necessary on the choice of title, before proceeding further. Bhakti as a concept refers to devotees love for God, a personal God who may be formless, Nirguna or Saguna, a supreme reality or power to whom he surrenders himself, a total surrender based on unconditional and intense love. This may take the form of marital love as in the case of Andal for Krishna, Meera Bai for Girdhar Gopal and Mahadeviakka for Chennamallikarjuna (Shiva). These instances, incidentally illustrate the Saguna form of Bhakti. In Saguna Bhakti, the God may be one of the two- Shiva or Vishnu in human form as Rama or Krishna. Sometimes one may notice the blend of both Nirguna and Saguna Bhakti as witnessed in Narasimh Mehta and Kabir, though in Kabir Nirguna Bhakti is dominant. .Bhakti becomes an ideology when it attempts to convert the masses to the particular concept of Bhakti with prescribed rules of conduct and forms of worship. We notice this in the Warkari saints of Maharashtra and Veerashaiva saints of Karnataka. As a result sects emerge, forming their own community of fellow worshippers, providing mutual support, solidifying the bond of kinship among the followers. The emergence of sects may be a spontaneous process or a byproduct of the teachings of the leaders of the particular type of or form of devotion as in the case of Kabir and Warkari saints or a deliberately organised collective or group as in the case of Sikhs or Shivasharanas (Veerashaiva saints) of the medieval Karnataka. The word "movement" widely and popularly used to refer to the emergence of Bhakti ideology and the establishment of new sects or</span><br data-dcnode-id="2692"><span data-dcnode-id="2691" instrument_node="">*. D.P.Mukerji, my teacher at Lucknow University, was a great scholar and he was one of the founders of the discipline of sociology in India. He stated that their (Bhakti movements) larger number much about the same period would entitle us to include them in one broad movement and the movement had the spirit of a revolution. Later, he called it a mirror revolution. Indian Culture, 1946, reprint Roopa and Co. Delhi 2006.</span></p><p data-dcnode-id="2689"></p><h2 data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">fNotes and References</span></h2><br data-dcnode-id="2686"><span data-dcnode-id="2685" instrument_node="">CHAPTER -1 1. Cf. Romila Thapar's paper 'Interpretations of Ancient Indian History', in Ancient Indian Social History,1 (New Delhi: Orient Longman, 1978) in which she explains how historical writing on India was influenced by the dominant ideology of the period. For the problem of objectivity see E.H. Carr, What is History? (London: Penguin, 1976) (especially Chapter 1, The Historian and His Facts). See also Peter Leonard, 'Explanation and Education in Social Work', The British Journal of Social Work, Vol. 5 (Autumn 1975), p.325. 2. 3. 4. 5. 6. E.H. Carr, What is History?, p. 30. Louis Dumont, 'On the Comparative Understanding of Non-Modern Civilizations', Daedalus, Vol. 104, (Spring 1975), pp. 153-8. E.H. Carr, What is History?, p. 55. Clark A. Chambers (ed.), A Century of Concern, National Conference of Social Welfare, Columbus, n.d., pp. 1 and 2. E.J. Hobsbawm, 'From Social History to the History of Society', in Essays in Social History, (eds.) M.W. Flinn and T.C. Smout (Oxford: Clarendon Press, 1974), pp, 1 and 20. Ibid., p. 2. Ibid., p. 5. 'Much of our ancient source material refers comparatively more fully to the upper sections of society; the study of the lower sections has to be far more deductive.' Romila Thapar, Ancient Indian Social History, p.122. Ankie M.M. Hoogvelt, The Sociology of Developing Societies (London: Macmillan, 1976), p. 5.</span><p data-dcnode-id="2684"></p><p data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">7. 8. 9.</span></p><p data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">10.</span></p><p data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">CHAPTER -2 1. Among the few earlier attempts, mention must be made of Helen Witmer, Gordon Hearn and Harriett Bartlett in the U.S.A., and recently Zophia Buttrym, Peter Leonard, Robert Pinker and Ramesh Mishra in the U.K. M.S. Gore, Social Work and Social Work Education (Bombay: Asia Publishing House, 1965), p. 6. Peter M. Blau, Presidential Address: Parameters of Social Structure',</span></p><p data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">2. 3.</span></p><p data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">f344</span></p><p data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">SOCIAL WORK AND SOCIAL WELFARE American Sociological Review, Vol. 39 (October, 1974), pp. 615-35.</span></p><p data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">4. 5. 6.</span></p><p data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">Ibid. M.S. Gore, 'The Cultural Perspective in Social Work in India', International Social Work, Vol. 9 (July, 1966). p. 6. There is a vast amount of literature which critically examines the Parsonian theory of social system and social change. For a selection of these see Anthony D. Smith, The Concept of Social Change (London: Routledge and Kegan Paul. 1973) and P.S. Cohen, Modern Social Theory (London: Heinemann Educational Books, 1968). C. Wright Mills, The Sociological Imagination (New York: Oxford University Press, 1959). Charles A. Valentine, Culture and Poverty (Chicago: University of Chicago Press, 1968), p. 1. A comprehensive anthropological definition has been recently given by Edmund Leach: 'The sum of culture at a particular place and time is a totality, a way of living, a system'. According to Leach the key word is system and the most fundamental fact that we learn from anthropology is that 'our affairs are organised in systems, that our institutions hang together'. Cf. Edmund Leach, 'Anthropology', in The Social Sciences Today, (ed.) Paul Barker (London: Edward Arnold, 1975), p. 12. 'This social system encloses, besides the so-called economic factors, all noneconomic factors of relevance for the movement of the system, including, for instance, educational and health facilities, but also more fundamentally the distribution of power in society, more generally economic, social and political stratification, and broadly institutions and attitudes to which we have to add, as an exogenous set of factors, intentionally induced policy measures applied in order to change one or several of these endogenous factors.' Gunnar Myrdal, 'The Unity of the Social Sciences', Human Organization, Vol. 34 (Winter 1975), p. 328. As early as 1942, Helen Witmer in a classic study, Social Work (New York: Rinehart and Co., 1942) had defined social welfare as a social institution par excellence. For a critical discussion of these views, cf. G. van Benthem van den Bergh, 'Is a Marxist Theory of the State Possible?', Occasional Papers, No. 61 (The Hague: Institute of Social Studies, 1977); Paul Corrigan and Peter Leonard, Social Work Practice under Capitalism-A Marxist Approach (London: Macmillan, 1978). See especially Ch.9, 'The State'; and Anthony Giddens, The Class Structure of</span></p><p data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">7. 8. 9.</span></p><p data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">10.</span></p><p data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">11.</span></p><p data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">12.</span></p><p data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">fthe Advanced Societies (London: Hutchinson, 1973). 13. 14. R. M. MacIver and Charles H. Page, Society-An Introductory Analysis (New York: Rinehart and Co., 1957). Neil J. Smelser, 'Sociological History: The Industrial Revolution and the British Working-Class Family', in The Essays in Social History, (eds.) M.W. Flinn and T.C. Smout (Oxford: Clarendon Press, 1974), p.24. Ibid., p. 24. Ibid., p. 25. Anthony Smith criticises this concept of structural differentiation because it fails to explain what acts as a motivating force towards differentiation. In his view it is only a descriptive concept. But even he concedes some explanatory power to the concept. Cf. Anthony D. Smith, The Concept of Social Change. Cf. for example the concept of metropolitan and satellite relationship. Andre Gunder Frank, On Capitalist Underdevelopment (Bombay: Oxford University Press, 1975). Indian social anthropologists 'sometimes relabelled as sociologists' generally tend to view Indian society as homogeneous. This idea is more implicit than explicit. Cf. M.N. Srinivas, Social Change in Modern India (New Delhi: Orient Longman) [Indian Edition], 1966. Srinivas hardly takes note of the Muslim segment of the Indian society. An exception to this approach is Yogendra Singh, Modernization of Indian Tradition (New Delhi: Thomson Press, 1973). Singh also treats Indian society as homogeneous society, because of his reliance on the modernisation theory which does not permit recognition of the disruptive role of conflict and change. He tries to synthesise a number of theoretical approaches which are not easily reconcilable. As a result, what we find is, in the words of Mills, a paste-book eclecticism. Both Srinivas and Singh explicitly exclude from consideration the economic institutions and forces, which cause considerable problems for them in their analysis of Indian society and social change. Whereas Srinivas completely ignores the political institutions, Singh makes a perfunctory reference to this by discussing electoral behaviour. From our point of view, both these books are unsatisfactory for the study of Indian society and social change. For a lucid criticism of Srinivas's homogeneous view of Indian society cf. Imitiaz Ahmed, 'For a Sociology of India', Contributions to Indian Sociology (New Series), No. 6 (1972). P. 172. To quote briefly; 'Indian society comprises not only Hindus, who constitute the dominant majority, but also Muslims, Christians, Parsees, Jews and the adherents of the three major offshoots of Hinduism, namely, Buddhism, Jainism and Sikhism. Each of these groups</span></p><p data-dcnode-id="2657"></p><h2 data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">15. 16. 17.</span></h2><p data-dcnode-id="2654"></p><p data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">18.</span></p><p data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">19.</span></p><p data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">fclaims inheritance from a distinctive socio-cultural and religious tradition. Ideally, a sociology of India should encompass all these groups and their traditions. It is, however, one of the characteristics of the discipline today that it has tended to emphasise the study of Hindus and their religious tradition; the study of non-Hindus and of their traditions has been sadly neglected by both Indians and foreigners.' 20. 21. Harold S. Wilensky and C.N. Lebeaux, Industrial Society and Social Welfare (New York: The Free Press, 1965). Romila Thapar, 'Ethics, Religion, and Social Protest in the First Millenium B.C.' in Northern India', Daedalus, Vol. 104 (Spring 1975), p. 119; see also Raja Ram Shastri, Social Work Tradition in India (Varanasi: Welfare Forum and Research Organisation, 1966). Cf. Readings in Social Evolution and Development, (ed.) S.N. Eisenstadt (Oxford: Pergamon Press, 1970); also Industrialization and Society, (eds.) Bert F. Hoselitz and Wilbert E. Moore (Paris: Mouton, UNESCO, 1963). Daniel Bell, The Coming of Post-Industrial Society (Delhi: Arnold Heinemann) [Indian Edition], 1974. Cf. Smith, The Concept of Social Change; S. Chodak, Societal Development (New York: Oxford University Press, 1971); and Giddens, The Class Structure of the Advanced Societies. Bernice Q. Madison, Social Welfare in the Soviet Union (Stanford: Stanford University Press, 1968). Ibid. Some elements of professional social work such as employment and training of labour welfare workers are found in Czechoslovakia. Interestingly, the nature of labour welfare programmes and tasks performed by welfare workers in industry are in many respects similar to those found in the field of labour welfare in India, which is a developing country with a small but significant industrial sector. There are some important differences also and one of these is the influential role of the trade unions in the formulation of social policy for the welfare of industrial workers and in directly implementing some of the labour welfare programmes. This once again highlights the impact of the political-economic structure of the Czechoslovak society. See, Vladimir Tesar, 'Social Welfare Programmes in Czechoslovak Enterprises', International Labour Review, Vol. 117 (July-August, 1978), p. 441. 27. For this view cf. Roy Bailey and Mike Brake (eds.), Radical Social Work (London: Edward Arnold, 1975) and Ramesh Mishra, Society and Social Policy</span></p><p data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">22.</span></p><p data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">23. 24.</span></p><p data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">25. 26.</span></p><p data-dcnode-id="2641"></p><h2 data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">fNotes and References</span></h2><p data-dcnode-id="2638"></p><p data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">347</span></p><p data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">(London: Macmillan, 1977) for an excellent discussion of Marxist approach to social welfare. Even the functionalists like Smelser have stated that social welfare is part of the social control processes of society. Cf. Neil J. Smelser, Theory of Collective Behaviour (New York: Free Press, 1962). However, Corrigan and Leonard while presenting a Marxist approach take a different view of the nature of the state and the social control function of social welfare. They argue that the welfare state in advanced capitalist countries like U.K. contains an element of autonomy and so it reflects the class struggle and the contradictions of that society. According to them, it is possible for social workers to work for the radical transformation of the society, even when they are part of state apparatus. Cf. Corrigan and Leonard, Social Work Practice under Capitalism. 28. 29. 30. Paul Halmos, The Faith of the Counsellors (London: Constable, 1966). Cf. Alvin Gouldner, 'The Importance of Something for Nothing' in For Sociology (Hammondsworth: Penguin, 1975), p. 266. For a brief statement of Marxist theory of social change cf. Cohen, Modem Social Theory, pp. 180-6; and J.A. Banks, Marxist Sociology in Action (London: Faber and Faber, 1970). Peter Leonard, 'Towards a Paradigm for Radical Practice', in Radical Social Work, (eds.) Roy Bailey and Mike Brake, p. 46. Cf. for a similar criticism, book review by Arthur Maglin, 'Role of Radical Therapy', Monthly Review, Vol. 28 (April, 1977). He says: "the question of the active oppositional strategy that might build a movement is talked around in Radical Social Work, but is never directly confronted. The book recognizes the interface of therapy and politics, but ultimately leaves unresolved the problem of how they are to be combined. The vaguely implied solution is that psychotherapy has to be augmented by a more important 'social therapy', but this just serves to indicate the problem without solving the riddle" [p.55]Very recently Corrigan and Leonard in their book, Social Work Practice Under Capitalism, have made a further attempt to meet some of these criticisms by pointing out how to link up the Marxist practice of social work to the political movement. The authors acknowledge the limitations of their work. Cf. John Rawls, A Theory of Justice (London: Oxford University Press, 1972), pp. 48-50. My idea of reflective analysis is adapted from Rawls' concept of reflective equilibrium. Giddens, The Class Structure of the Advanced Societies; J.A. Banks, Marxist Sociology in Action; Irfan Habib, 'Problem of Marxist Historical Analysis in India' in India-State and Society, (ed.) K. Mathew Kurian (New Delhi: Orient Longman, 1975), p. 20.</span></p><p data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">31. 32.</span></p><p data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">33.</span></p><p data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">34.</span></p><p data-dcnode-id="2624"><span data-dcnode-id="2627" instrument_node="">f348</span><br data-dcnode-id="2626"><span data-dcnode-id="2625" instrument_node="">35. 36 36.</span></p><p data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">SOCIAL WORK AND SOCIAL WELFARE Paul D. Wiebe, Social Life in an Indian Slum (Delhi: Vikas Publishing House, 1975). J. H. Boeke, Economies and Economic Policy of Dual Societies (New York: Institute of Pacific Relations, 1953). Lloyd I. Rudolph and Susanne H. Rudolph, The Modernity of Tradition (Bombay: Orient Longman) [Indian Edition], 1969.</span></p><p data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">CHAPTER 3 1 Cf. S. Natarajan, A Century of Social Reform in India (Bombay: Asia Publishing House, 1962). In fairness to Natarajan, it should be stated that he was commissioned to write the history of social reform movement during the nineteenth and twentieth centuries in India, and so he was not concerned with reform movements before that period. 2. Cf. G.R. Banerjee, 'Social Welfare in Ancient India' in Papers on Social Work: An Indian Perspective (Bombay: Tata Institute of Social Sciences), n.d. (1972?), p.59; Sugata Dasgupta, 'Asoka's Concept of Social Welfare', The Indian Journal of Social Work, Vol. 19 (December, 1958), p. 197; and Raja Ram Shastri, Social Work Tradition in India (Varanasi: Welfare Forum and Research Organisation, 1966). Dasgupta gives a fairly detailed and accurate description of social welfare programmes during the period of Asoka, though at times he tends to exaggerate the positive aspects. The monograph by Shastri has several merits. Unlike most social welfare literature, it is not confined to the discussion of social work in Hindu tradition; he also uses, though in a loose and vague manner, the social structural approach; and what is more significant is his explicit recognition of the role of ideology in social work tradition in India. On the other hand, Shastri does not clearly spell out the chronology of the period he is discussing, which may create considerable confusion for the reader. Also the latter part of the monograph which deals with Islamic and Parsee traditions is very superficial and inadequate. Banerjee's account is essentially a glorification of the past and it has the same weakness as in the case of Shastri, namely, nonspecification of the period dealt with. None of these books gives the historical source material. 3. Romila Thapar, Ancient Indian Social History (New Delhi: Orient Longman, 1978), p. 22. For a recent comment on this point cf. Barun De, 'A Historiographical Critique of Renaissance Analogues for Nineteenth Century India', in</span></p><p data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">fPerspective in Social Sciences, l, (ed.) Barun De (Calcutta: Oxford University Press, 1977), p. 178. 4. 5. D.D. Kosambi, The Culture and Civilisation of Ancient India in Historical Outline (London: Routledge and Kegan Paul, 1965), p. 54. Georges Dumezil, quoted in Louis Dumont, 'On the Comparative Understanding of Non-Modern Civilizations', Daedalus, Vol. 104, (Spring 1975), p. 162. Raja Ram Shastri, Social Work Tradition in India, pp. 2-5. Ibid., p. 4. Romil n seek to have bestowed upon themselves by the public in order to enhance their own role dominance, honorific standing and market punch." Robert W. Habenstein has argued that, ' ''Profession' is basically an ideology, a set of rationalizations about the worth and necessity of certain areas of work which, when internalized, gives the practitioner a moral justification for privilege, if not licence and which, when recognised by society, legitimates their penetration into the personal or social relations of people who need or believe they need help." Quoted in Walter P. Metzger, "The American Academic Profession in Hard Times," Daedaulus, Winter, 1975. 2. 3. 4. 5. 6. 7. William Goode, 'Theoretical Limits of Professionalization' in A. Etzioni (Ed.) Semi-Professions, The Free Press, New York, 1969. William Goode, op. cit. J.M. Kumarappa, 'Education for Professional Social Work', Indian Journal of Social Work, June 1952. A. Etzioni, Ed. Semi-Professions, op. cit. Harold, L. Wilensky and Charles N. Lebaux, Industrial Society and Social Welfare, Free Press, New York, 1958. (i) William Goode, op. cit. (ii) Harriett. M. Bartlett, Common Base of Social Work Practice, National Association of Social Workers, New York, 1970. 8. 9. 10. 11. 12. 13. Clifford Manshardt, Pioneering on the Social Frontiers of India, Lalwani Publishing House, Bombay, 1967. M.C. Nanavatty, "Development of Social Work Profession in India', Indian Journal of Social Work, December, 1952. S.N. Ranade, 'Social Work as a Profession', Indian Journal of Social Work, December, 1954. N. Nanjan, 'Professional Social Work', Indian Journal of Social Work, September, 1955. This writer was one of the speakers at the Symposium. He then took an optimistic view. His view has changed since then as is evident from this chapter This writer was the first participant from India to go to U.S.A. under this programme.</span></p><p data-dcnode-id="2438"><span data-dcnode-id="2441" instrument_node="">f362</span><br data-dcnode-id=" orking outside social work. 27. cf. M.C. Nanavatty, 'Growth and Problems of the Profession of Social Work in India' Indian Journal of Social Work, April, 1967; K.N. Vaid, A Note from a Branch President, Social Work Forum, October, 1969; Editorial, Social Work Forum, January, 1968. 28. 29. P.D. Kulkarni, ibid. Richard.A. Cloward and Irwin Epstein, 'Private Social Welfare's Disengagement from the Poor' in Social Welfare Institutions, Mayer .N. Zald (Ed.) John Wiley &amp; Sons, New York, 1965.</span></p><p data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">30. P. Ramachandran, and A. Padmanabha, op. cit, 31. J.M. Kumarappa, op. cit. 32. Harry Specht, "The Deprofessionalization of Social Work," Social Work, Vol. 17, No.2 (March, 1972). Postscript: Professionalization of the client is the reverse side of the process of professionalization of an occupation or human activity. This neglected aspect of professionalization process has been discussed recently by Dewar. He states that the professionalization of the client is a form of voluntary socialization which is"typically undergone, willingly, gradually, and optimistically." It is a 'process whereby persons being helped take on as their own some of their helpers' theories, assumptions and explanations" and "it actually extends the dominance and control exercised by professionals ... in effect, the key to a successful help experience becomes the extent to which persons being helped come to understand themselves and their problems from the perspective of the helper. This is as true for personal helping as it is for technical helping, except that in the case of personal helping there is less to learn." cf. Thomas R. Dewar, 'The Professionalization of Client', Social Policy, January, 1978, p. 4.</span></p><p data-dcnode-id="2416"><span data-dcnode-id="2419" instrument_node="">f364</span><br data-dcnode-id="2418"><span data-dcnode-id="2417" instrument_node="">CHAPTER - 11 1. 2. 3. 4. 5. 6.</span></p><p data-dc ial 'Planning ' ? in S, D. Gokhale ed., Social Welfare-Legend and Legacy, Popular Prakashan, Bombay, 1975. 8. Thomas P.T. Has Social Work Education a Future in India, Samaja Karyada Hejjegalu, June 2012. 9. University Grants Commission, Review of Social Work Education: The Report of the Second Review Committee, U.G.C . New Delhi, 1980. 10. Van Nieuwenhuize, C.A.O., Development Begins At Home, Pergamon Press, London, 1982. CHAPTER-19 1. Romila Thapar, 'Dana and Daksina as Forms of Exchange', Ancient Indian Social History (New Delhi: Orient Longman, 1978), p. 105. 2. Lokasangraha which is mentioned in the Bhagwadgita literally means care and protection of the people. Loka Sreya was the term used by Rammohun Roy, which means 'welfare of collective humanity' (cf. B.N. ,Ganguli, Concept of Equality [Simla: Indian Institute of Advanced Study, 1975] p. 17). Ganguli says that Roy Indianised the Benthamite concept of the greatest good of the greatest number by using this Indian expression, Loka Sreya-people's welfare (cf. p. 73).</span></p><p data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">fGanguli has pointed out the distinctive character of Indian social consciousness in the ancient times as follows: In India, the exaggerated sense of social consciousness rooted in the narrow culture and community had always dimmed the political sense, the sense of political identity as a wider group. By separating society from the State, Indians sustained their narrow and artificial social autonomy at the cost of political servitude. Political consciousness, as distinct from social consciousness, was more or less undeveloped, prior to the contact with the west and the conflict with the British rulers, particularly in the arrogant phase of their hostility to the educated middle-class. According to our old tradition, it was society, not the nation, which mediated between the individual and the universal humanity. First came the welfare of the social group and its distinctiveness and exclusiveness, symbolized by the phrase Go-Brahmanahitayacha, the cow and the Brahmana being the emotional symbols of identity. Next came Jagaddhitaya, the welfare of universal humanity. The nation was missing in this configuration. Perhaps, the other extreme was found in the west, the nation not merely mediating as the intermediary, but actually engulfing society so that social consciousness lost its autonomous character and merged in national consciousness [pp. 10-11]. 3. Mary Richmond quoted in Ralph E. Pumphrey and Muriel W. Pumphrey (eds.), The Heritage of American Social Work (New York: Columbia University Press, 1961), p. 287. 4. Enid Harrison says that the term was perhaps invented during the early eighteennineties, but it was sparingly used until the 1920s. Cf. 'The Changing Meaning of Social Work', A.H. Halsey (ed.), Traditions of Social Policy (Oxford: Basil Blackwell, 1976), p. 83. 5. Harold L. Wilensky and Charles N. Lebeaux, Industrial Society and Social Welfare (New York: The Free Press, 1965), p. 138. 6. Quoted in John M. Romanyshyn, Social Welfare-Charity to Justice (New York: Random House, 1971), p. 4. 7. Richard Titmuss, Social Policy (London: George Allen and Unwin, 1974), pp. 30-1. 8. John M. Romanyshyn, Social Welfare-Charity to Justice, p. 33; see Chapter 2, 'Changing Concepts of Social Welfare', for a good summary and discussion of various concepts. 9. P.D. Kulkarni, 'Developmental Function and Interdisciplinary Nature of Social Welfare', Education for Social Change: Human Development and National Progress (New York: International Association of Schools of Social Work, 1975), p. 24. 10. For an example of cost-benefit analysis used in the traditional type of social</span></p><p data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">f370</span></p><p data-dcnode-id="2357"></p><h2 data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">SOCIAL WORK AND SOCIAL WELFARE</span></h2><p data-dcnode-id="2354"></p
