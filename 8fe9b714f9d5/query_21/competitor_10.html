fNdangwa Noyoo


needs fails to recognise higher non-food costs in urban areas,
especially for housing, utilities, transport, health-care and
education. This approach presupposes that Zambians can survive
without essential nutritional requirements (Chibuye, 2011).
    According to the Central Statistical Office (CSO) (2012) the
Living Conditions Monitoring Surveys conducted from 1991 to
2006 have shown that the incidence of poverty has reduced over
the years. The results show that the incidence of poverty declined
from 70 per cent in 1991 to 64 per cent in 2006. The gains of this
reduction can be noticed in rural areas, where the incidence of
poverty reduced from 88 per cent in 1991 to 78 per cent in 2006.
In contrast, the incidence of poverty in urban areas increased
from 49 per cent in 1991 to 53 per cent in 2006. The CSO also
reports that generally, the incidence of poverty reduced between

consistently emerged as the poorest province in all the six

reductions are minuscule, comparatively with other states in the

Poverty Reduction Strategy Papers (PRSPs)

The PRSP process also shaped poverty discourse in the country
as it was a pre-condition for adjustment lending from the IMF
and concessional lending from the World Bank. Imboela,
(2005:435) argues that the country’s PRSP process was largely
informed by mainstream thinking on poverty and livelihoods. It
also championed a neo-liberal programme which was constructed
on the sanctity of the market and sought to maintain the very
structural processes that engendered poverty. “Because it fails to
break conceptually and methodologically, from past programme
failures, the PRSP is likely to be just the latest instalment in the
ever changing fashionable semantics of the ‘development
community’.” Imboela (2005:436) cannot be farther from the
truth when he questions the credibility of the PRSP in the light of
their International Finance Institutions’ (IFIs’) credentials:
   The defining feature of PRSPs is the concept of “country ownership”.
   Country ownership of the PRSP is critical for several reasons, including the
   building of national consensus about poverty reduction. Furthermore,
   through a participatory process, country ownership guarantees the
   representation of a broader spectrum of views including those of civil
   society. Accordingly, the PRSP process is grounded in the need for broader
   participation of the general citizenry in the formulation of the poverty-
   reduction programmes. In fact, the principle of broader public participation
   has been heralded as one of distinctive features that separate PRSPs from
   previous programmes such as SAPs. However, the country-ownership
   credentials of the PRSP process are questionable. It must be understood that
   PRSPs are an initiative of IFIs (World Bank and IMF) and were
   subsequently made a precondition for concessional lending and adjustment
   to poor countries.

Imboela (2005:437) rightly concludes on this matter:

Economic Growth amidst Human Deprivation

Zambia has been consistently experiencing positive economic
growth for close to 10 years but the majority of Zambians
continue to wallow in grinding poverty. This is a situation which
is referred to as growth without well-being in this book. Despite

                              320
f                                                  Social welfare in zambia


Zambia’s successes on the economic front, there have not been
attendant gains on the social and human development sides. As
noted in other sections of the book, Zambia’s economic growth
has been inimical to human well-being. In this sense, the growth
that has been highly publicised is neither equitable nor inclusive.
Only a small segment of the Zambian population has benefitted
from and continues to enjoy this growth, because the generated
wealth has not been redistributed to the mass of the people. This
growth has not enhanced the economy’s labour absorption
capacity. Moreover, the jobs which have been created in the
country are mainly at lower skills levels. Such jobs have not been
informed by any decent work agenda. Despite Zambia having
many qualified people, a significant number of them are also
unemployed or underemployed. So it is not just a matter of
unemployment but bad policies which do not enable qualified
individuals to be gainfully employed in the country. Zambia’s
pervasive levels of human deprivation can be adequately tackled
if poverty and inequality are treated as complementarities.
Taking one of these problems in isolation and trying to find
solutions to it will always result in failed responses. There must
be a deeper analysis and appreciation of human deprivation in
the country. It should not be an “either or situation” where there
is a focus on poverty or inequality. Both poverty and inequality
have to be attacked at the same time in order for human
deprivation to be reduced or even eradicated in Zambia.

Child Poverty in Zambia

Child poverty in Zambia has been on the increase for decades
and has mainly been compounded by the HIV/AIDS pandemic.

government fell short on the implementation side. However, it
did make some changes especially in the approach to problem-
solving in the 1960s. Since the changes were not profound and
radical, the informal and peripheral status of indigenous systems
continued alongside the formalised Western types of social
welfare. Due to this anomaly, there remains a chasm between
indigenous systems and the formal social welfare in the country.

   state could not offer a lucid formula towards the realisation of an African
   nationhood. One route that could be taken is the redefining of national
   boundaries in the light of contested areas. For instance it is clear that Sudan
   is made up of two distinct and separate entities in terms of religion, physical
   landscape and culture. Regional self-government could be a viable
   alternative given the fact that the so-called unitary state of Sudan has been
   effective only in creating conditions for social dislocation (Noyoo, 2000:64-
   65).

    In ending this text, the author has come to the grim
conclusion that the general lack of seriousness in Zambia,
especially in the political sphere will continue to hobble the
country for decades. Things are not going to be well in the
country as the writer had optimistically and naively stated in
earlier works. Also, it is the view of the writer that in Africa and
countries like Zambia, the majority are not always right. They


                                        337
fNdangwa Noyoo


may have the numerical strength in order to vote for their
preferred candidates, but this does not make them right. Indeed,
where the majority remain ignorant and adhere to some unwritten
rule that only people from certain ethnic groups should be
leaders, no matter how incompetent they may be, is simply
absurd. It makes a mockery of democracy. Another formula
needs to be found so as to rectify this cancer in the country’s
politics. This issue is also discernible in the case of Barotseland.
It has become abundantly clear that the false foundation upon
which Zambia was built is slowly cracking. This is because the
issue of Barotseland cannot be crushed or wished away as
previous Zambian governments had tried to do. The reality is that
Barotseland is about a people’s legitimate cause and people’s
birth right: the right to self-determination. It is neither about
genocide akin to Rwanda (unless the Zambian government does
not want to see the light) nor is it about decentralisation of
power, but one of the independence of Barotseland. The truth of
the matter is that this country was in existence long before
Zambia and Northern Rhodesia, with its own institutions,
political system, economic activities, national anthem, flag and
coat of arms, among others. It is not about a “stale” history as it
is clear that those who are now fighting for the freedom of
Barotseland were not even born when the Barotseland
Agreement was signed in 1964 and abrogated in 1969, by the
Zambian government:
    Agitation and resentment over government actions regarding the abrogation
    of the Barotseland Agreement are not new. They were voiced in 1968, 1969
    and 1970 with some Lozi traditionalists led by Litunga Mbikusita Lewanika
    demanding restoration of the provisions of the Agreement or they would
    seek secession. In 1993, under the Frederick Chiluba Government demands
    were again made for the restoration of the Barotseland Agreement. But the
    authorities at the time dismissed the demands and even threatened to arrest
    and detain all those involved, including Litunga Ilute Yeta for high treason.
    President Chiluba declared then that Zambia was a unitary state and as such
    indivisible, therefore no part of it would be allowed to break away. The
    recent demands for the restoration of the Barotseland Agreement of 1964
    led by BFM, Linyungandambo, MOREBA and the BPF should be
    understood in their right context. They are just a continuation of the work of
    other similar organisations that suffered government reprisals and

                                        338
f                                                                Social welfare in zambia

     harassment. For example, the Barotse Patriotic Front (BPF) was banned and
     its leader placed in detention for advocating secession in the late 1990s.
     What is different about the new formations is that they are much more
     radical and demand immediate resolution of the impasse (Sishuwa in the
     Post, 2012).

    It is the youth who are fighting for Barotseland’s freedom and
not “a small and dying section of the traditional elements of the
nineteenth century” as Sikota Wina had reported to the Zambian
Parliament in the 1960s. Because most Barotse families pass
down their history from generation to generation, this seems to
have helped the youth of this territory not only to carry on the
fight for freedom but to do this from an informed basis.
Moreover, most Barotse are proud of their history, institutions
and customs. The young Barotse activists have vowed that the
deaths of their fellow comrades on 14 January 2011 shall not be
in vein and their blood that was spilt that day will nourish the
struggle for Barotseland’s liberation. They say that they are
fighting for a constitutional monarchy along the lines of Britain
or Lesotho and not an absolute monarchy such as Swaziland.
Because they love and respect the institution of Litunga (king),
the Barotse Royal Establishment (BRE) should in the same vein
be mindful of these aspirations and move with the modern times.
The BRE should not forget that Barotseland was lost in 1964
because of its rigidity and inability to modernise itself. In effect
the Barotse youths also want to see an overhaul of the BRE and
the transformation of the traditional Barotse system in line with
contemporary trends, where progressive monarchies exist
alongside democratic governments and systems.

portrayal was supposed to entrench a message to the audience that black life is not
worth as much as white life and in that sense the movie reinforced all the negative
stereotypes about black people. Hollywood has been churning out such absurdities
for generations and fully knowing how powerful cinema is - as imagery has lasting
impressions. In those days, there were few black “action” heroes and probably one
heroine on the screens in the names of Sydney Poitier, Jim Brown, Fred Williamson
and Pam Grier. The irony is that not much has changed in Hollywood since then.

Hollywood’s bigotry in the documentary on Martin Luther King. He observes that
American policy in relation to Africa is still about “Tarzan and Jane” and “Cowboys
and Indians”. He was really spot on as Hollywood has managed to cast in stone a
certain persona about non Europeans, black people in general and Africans in
particular. In the light of American politics, Reverend Jackson is also right in his
