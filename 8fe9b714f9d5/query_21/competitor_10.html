fNdangwa Noyoo


instrumental in sowing the seeds of dissent against the settlers as
they had also preached against colonial rule. The Watch Tower
Movement had gained prominence after the end of the First
World War, especially the period 1918-35. Its extreme religious
views and anti-establishment stance would place it, in most
instances, in the category of religious sects and regarded by the
colonial establishment as a “subversive element”. In 1923, the
first African Welfare Society was formed at Mwenzo, in the
northern part of the country and it was led by missionary
educated Africans namely: Donald Siwale, David Kaunda
(Kenneth Kaunda’s father), Hezekiya Kawosa and Peter Sinkala.
As will be explained shortly, these movements served as vehicles
against colonialism and also as incubators for nationalist politics
in Zambia. In 1929, the colonial administrators introduced
“Indirect Rule” in place of “Direct Rule”. Prior to this, the BSAC
had directly ruled the area except in the case of Barotseland
which had its own form of governance. In spite of the passing of
the famous Passifield Memorandum in 1930 - authored by Lord
Passifield, then Britain’s Secretary of State for the Colonies -
which acknowledged the “paramountcy of native interests over
those of the settlers”, the indigenous people’s livelihoods and
dignity continued to be stripped away by the colonial authorities
and the settlers.

had negatively impacted on the colonial economy in a significant
way. Inevitably, in May 1935, things boiled over when an
industrial strike erupted on the Copperbelt. This mass working
class action broke out when African miners demanded higher
wages, better working conditions and the abolishment of racial
discrimination. The strike which had begun at Mufulira mine
later spread to Nkana and Luanshya mines. It was quelled by
colonial troops. Twenty-eight strikers were either killed or
wounded during the strike, while many more were arrested. A
Commission of Inquiry which was appointed by the colonial
government immediately after the strike, in order to determine its
causal factors, observed that one of the triggers was the abrupt

The 1930s, the Second World War and Afterwards

From the mid-1930s major changes began to transpire in colonial
Zambia. For instance, it was during this period that the policy of
stabilisation became a colonial programme. Prior to this, an
urban African was considered a sojourner who would return to
the village once his employment was terminated. Therefore,
African workers were accommodated in temporal, make-shift or
barrack-type of housing. They were classified as:

   (a) bonafide natives in search of work;
   (b) bonafide seekers after work;
   (c) destitute and unemployed persons; and
   (d) Persons otherwise occupied than working for Europeans.

resident status of the African worker and delayed the stabilisation

Stephenson, 1936). Interestingly, the above-mentioned policy

racism could not overshadow the need for an efficient labour
force critical for higher productivity and ultimately, higher
profits. Here we start to see a new picture emerging whereby, just
as in the case of Katanga as discussed in the previous chapter, the
mining companies began to play a much bolder role, in regard to
the well-being of their African workers (than the colonial
government) purely for reasons of profit maximisation. Thus, the
second phase of social welfare activities in colonial Zambia was
necessitated by the stabilisation of labour, which also brought

    When the Second World War broke out in 1939, Northern
Rhodesia was firmly inserted into the global capitalist economy
through its mining ventures. It was also part of the British
Empire and thus its people were mobilised for the war effort
against Nazi Germany. Considerable efforts were made to
persuade the Africans to participate in the war whether by
volunteering for military service, by increasing production, or by
giving contributions to wartime funds in return for promises of
improvement in economic, social and political conditions after
the war. Africans were told by posters and over the radio,
through mobile cinema shows and information bureaux, that they
were partners with their colonial “masters” in the fight for
democracy and that a brave new post-war world awaited them
(Crowder, 1993). It can be noted from the foregoing that African
reactions during and after this war were influenced by such
actions. Thus, their expectations of a better life were not
misplaced as they were raised in the first place by the colonialists
themselves through false promises. More importantly in relation

fNdangwa Noyoo


to the foregoing, the new concept of obligation of the British
government for the economic and social welfare of the colonies
(itself a child of the Depression) was nurtured during the war.
That is why plans for the development of institutions of higher
education in the African colonies were drawn up during the war
as were those for the development of trade unions. The tentative
reforms were undertaken by Britain partly under pressure from
her American allies who were not prepared to fight a war on her
behalf merely to preserve her empire, partly in reform both
within and outside the Colonial Office, and partly to avoid a
repetition of the disturbances in the West Indies in 1940 caused
by the prevailing scandalous economic and social conditions
there (Crowder, 1993:97).

propaganda to which the African population was suddenly
exposed to hastened the emergence of an African political voice.

effort led the Northern Rhodesian government to pay more
attention to African public opinion than it had before the war.
Indirectly, the war stimulated some educated Africans to use the

materials from the British colonies, helped to sustain the British

and healthy working population was needed to continue mining
minerals from the ground. Thus, the mining and colonial
authorities made some concessions, such as changes in the social
welfare coverage of Africans and improvements in the labour

The Rise of Welfare Societies and Nationalist Politics

The first well-defined form of resistance to colonial rule emerged
with the formation of the Welfare Societies in the mid-1930s in
the mainly urban areas. These formations confronted the
exploitative nature of colonialism and the manner in which
Africans were abused by such a system. It is important to note
that even though Welfare Societies represented the embryonic
stage of nationalistic politics in Northern Rhodesia, they had
initially tackled welfare issues and mutely addressed hard
political questions in the colony. For instance:

    The African Welfare Societies were anxious about the social disorder in the
    towns. With the help of missionaries and social workers they organised
    football matches, started small libraries and run small clubs (Hall,
    1965:130).

    Though pragmatic, these attempts could not yield tangible
results against colonial subjugation. Efforts aimed at empowering
local people by Welfare Societies proved futile as the colonial
status quo remained intact and harsh. This was the first wave in
the rise of these organisations. There was a resurgence of these
organisations in the 1940s and this development would
fundamentally add momentum to Zambia’s drive towards self-

residing along the rail link between the Victoria Falls and the
Copperbelt were steadily beginning to interrogate the appalling
inequalities and inequities embedded in the colonial socio-
political and economic order. However, there was also another
dimension to the foregoing issues. It turned out that politics and
social welfare had a symbiotic relationship that would foster
fundamental changes in the colony.

Joseph Y. Mumba of Lusaka Welfare Society and George W.C.

amalgamated into the Federation of African Welfare Societies
with Yamba as President, Mumba as Assistant Secretary, and
Kaluwa, the Organising Secretary. The federation of these

were the two Vice Presidents of Congress: L. Mufana Lipalile
and Robinson M. Nabulyato; Mateyo Kakumbi - Treasurer; John
Richmond - Assistant Secretary; and George Kaluwa as Assistant

formation expected to “promote the educational, political,

boycotts of European shops. Congress took on more radical roles

exploitation and racism of the settlers. Notably, nationalist

unemployed or could not advance themselves in the colonial set-

masses around the question of self-rule. Many Africans hated
what the federation stood for and saw this arrangement as a
usurpation of power from the British Crown by racist and white
minority political elites. The resistance against the federation can
be said to have provided the building-blocks for Zambia’s
eventual independence. Indeed, calls of “one-man one vote” were
re-echoed across Zambia because the nationalist movement was
beginning to see that the African people’s move towards
independence had suddenly been jettisoned by the federation,
which regarded the needs of the settlers as paramount to those of
local people. Previously, the mood of defeat had prevailed in the
ranks of Congress and the country. Thus this was one way of re-
energising the party and the call for self-determination. Congress
also mobilised chiefs around the country to defy the federation.
There were a hundred and twenty chiefs in Northern Rhodesia
who had signed a petition opposing the federation. Despite a
spirited fight by Congress and the indigenous people, the
federation was a foregone conclusion.

those of Southern Rhodesia had managed to secure themselves a

delineated African and European social welfare service provision
in colonial Zambia.

light of social welfare service provision, was quite specific when
it came to the roles which had to be played by the different
territories of the British Empire. They not only had to provide
social welfare services to people in the various territories, but
also recruit personnel for such work. Suitable local candidates for

the first trained officials who were in-charge of social welfare
were from the British Probation Service. Not surprisingly, there
was a strong bias towards probation work during this period in
Northern Rhodesia. Furthermore, the Juvenile Ordinance which
was passed in 1953 entrenched such a tilt in social welfare
matters (Brooks and Nyirenda, 1987). At the time, Northern
Rhodesia did not have an approved reformatory school or place
of safety for other racial groups that were not African. Only in
1961 did these services extend to them. The colony had made use
of services in Southern Rhodesia and South Africa for only
European and bi-racial young people who were in conflict with
the law. The only place of safety for young Africans at
Katombora near Livingstone, and which had been operating since
1950, was fraught with challenges such as lack of trained staff
and training facilities as well as shortages in accommodation. In
1954, the department started casework and handed over group

recognition of the urban African family brought in its wake a
new emphasis in welfare services, especially, in mitigating social
change. Also, voluntary organisations increased including the
Young Women’s Christian Association (YWCA) although their
services were particularly directed towards expatriate needs
(Brooks and Nyirenda, 1987).

The Colour-Bar System

Colonial Zambia was premised on the racist ideology known as
the colour-bar system. In this classification, people’s life chances
were defined according to race:


                                213
fNdangwa Noyoo


    (a) People of mixed-race origin or “Coloureds” were a notch
         lower than Europeans;
    (b) Asians or Indians were below bi-racial people; and
    (c) Africans were at the bottom of this pyramid.

    Due to the foregoing, among others, social welfare initiatives
were underpinned by residual interventions and the bulk of such
services were available to mainly the white population. Thus, the
colonial social welfare policy was driven by racial
discrimination, social exclusion and elitism. The mining industry
was also instrumental in creating a comprehensive welfare
system for the white settler population as well. The settlers’
access to the formal labour market also came with social welfare
entitlements. The colour bar system was further reinforced by the
South African connection which was discernible especially on
the Copperbelt. Holleman and Bicsheuvel (1973) in their study
on the attitudes of the white labour force on the Copperbelt in the
late 1950s argue that the white community “had almost
inevitably adopted the essentially self-centred South African
attitude with regard to race and the division of labour and was
firmly transplanted to Northern Rhodesia.” The colour-bar
system created better conditions for the settlers. The two authors
further observe that in the boom years of the middle 1950s,
everyone had a large car, radiogram and refrigerator. European
workers fitted themselves out with expensive sports equipment,
took extensive coastal holidays and entertained lavishly.
    There were a range of social welfare services in colonial
Zambia for the European, Asian and mixed-raced populations,
but which had largely excluded Africans, namely:

    There were also specialised services for alcohol addicts which

oversaw a considerable amount of welfare related activities on
the Copperbelt due to the labour question. However, there were
other welfare services which were delivered by the
municipalities, religious bodies and voluntary associations.
Initially, social welfare on the Copperbelt, which was
spearheaded by the mining companies, was funded by profits
accrued from beer sales run by the same mining establishments.
As such, beer-halls became prominent features in mining
compounds and miners saw drinking as their only source of
recreation. Later on the Central Advisory Committee on Native
Welfare re-evaluated this arrangement and recommended that
welfare work be de-linked from beer due to increased
drunkenness in the mining compounds. The Northern Rhodesian
Christian Council was also opposed to the idea of beer proceeds
being used for social welfare work. The problem that was faced
by the mining companies was that they were unable to define
what actually constituted African social welfare in the first place.
For many years social welfare on the Copperbelt was to remain
nondescript with most welfare programmes centred on football
matches and film shows. The story about cinemas on the
Copperbelt is quite fascinating. By the late 1930s, film shows,
known locally as the bioscope were a well-established feature of
life in the copper-mining towns and company compounds.
Thousands of women, men, and children crowded into enclosed
open-air cinemas each week to watch film programmes that

mixed entertainment and current events; and many young town
dwellers were avid bioscope fans, valuing films above all other

had unintended consequences. Ambler (2001), reports that during
the 1940s and 1950s, no visitor to the copper mining cities of
colonial Northern Rhodesia could escape the visible marks of the
impact of American films. In the vast company compounds that
housed the African miners and their families on the Copperbelt,
groups of African boys, “dressed in home-made paper ‘chaps’
and cowboy hats, and carrying crudely carved wooden pistols,”
were a ubiquitous presence running through the streets and alleys
in endless games of cowboys and Indians.

1930s inspired many white residents of the Copperbelt and more
than a few prominent Africans to express similar concerns -
about what they saw as the negative and potentially dangerous
effects of the products of Hollywood on the impressionable
African youths who festooned themselves with cowboy gear.
Imperial propagandists likewise became convinced that films
invested with appropriate narrative messages could bolster
loyalty to the empire and promote colonial “development”
objectives. Ambler (2001) asserts that these rather feeble efforts
at propaganda films nevertheless attracted considerably more
interest from scholars than the Hollywood fare. Yet, in practice,
and notwithstanding the best efforts of paternalistic imperial
bureaucrats, African moviegoers generally had little patience for
films on postal savings banks, “better hides and skins”, and
proper teeth-brushing procedures. For them, movies meant the
bioscope - the high-action products of Hollywood dream
factories. In any case, censors had cut films shown on the
Copperbelt to ensure that African audiences were not exposed to
images or story lines that they imagined might inspire challenge
to the white supremacist colonial order - a tall order, given the
violent rituals that characterised the plot of a typical western.
Likewise, audiences on the Copperbelt in the 1930s, 1940s, and
1950s were by no means passive consumers of cinema. They

transforming the colonial landscape. For instance, it resulted in
numerous universities etc., thus fulfilling the colonial programme

       SOCIAL WELFARE IN POST-COLONIAL ZAMBIA

I. Social Welfare in the First Republic

This section focuses on the development of social welfare in
Zambia after the country gained independence from Britain on
24th October 1964.47 The chapter also highlights the manner in
which the new African government made choices in matters of
national development in general and social welfare in particular,
during the First Republic which spanned the period from 1964-
1972. It also casts light on the advances that were attained in
social welfare in the 1960s and early 1970s. This was just prior to
the institutionalisation of the one-party state in 1973. The section
also focuses on the broader macro and global dimensions, in so
far as they impacted on the country’s social welfare outcomes.
    Zambia emerged out of colonialism after agitations, riots,
strikes and other concerted actions against colonial rule, by
various political formations, had taken place in the country.
However, these disturbances were not protracted and Zambia’s
independence can be said to have been won via negotiations
rather than a libe</span><span data-dcnode-id="134" instrument_node="">ration struggle as in other parts of Africa. The
United National Independence Party (UNIP) seems to have
appealed to many Zambians and this party became the main
proponent against colonial rule in the country. Due to this
occurrence, the party was voted overwhelmingly by the African
majority in the elections of 1964. It also looks like the UNIP was
extremely sensitive to the question of African liberation,
economic empowerment and the general advancement of
Zambians. These were its clarion calls during the fight for
independence and it would remain committed to some of them
until it was voted out of power in 1991. However, in later years
such calls became more of a self-serving exercise than something
that the party truly espoused. From the beginning, the party’s
intention was to create an egalitarian society in order to achieve

                                223
fNdangwa Noyoo


the goals of African self-determination, economic empowerment,
self-reliance, self-worth and pride.
    Following its handsome victory in the January general
elections, UNIP formed its first cabinet under Kenneth Kaunda
as president, although the process was marred by considerable
tensions within the party over the composition of the cabinet.
Nevertheless, preparations began at once for the transition to
independence in a country of 3.5 million people, whose
population of less than 0.5 per cent had even full primary
education. The first urgent steps were then taken to prepare
Zambians for senior posts in the civil service. At the end of the
year and two months after independence, the first three
permanent secretary posts were Africanised, along with twenty-
seven other civil service positions (Tordoff and Molteno,
1974:11). The foregoing situation was a consequence of
colonialism which had deliberately withheld secondary education
from Africans until the 1940s and higher education within the
country for the whole of the colonial period.
    The foregoing scenario must be taken into consideration as
the civil service is the engine of modern governments and no
development efforts can transpire if it is not functioning. It may
not be able to perform adequately for a number of reasons, for
instance, the lack of capably trained officials or its over
politicisation. These may prove costly to its overall efficient and
effective performance. At independence, however, the problem
of lack of patriotism topped the list of the incapacities of civil
servants. This is because the civil service was seen as working in
contradiction to the expectations of the mass of the people and
also not being in tune with the vision and ideals of the ruling
party. British expatriates who had been recruited by the colonial
authorities, to implement colonial programmes, were still in the
majority at independence. Civil servants were also drawn from a
small settler population that had emigrated from Southern
Rhodesia and South Africa. Also, many European civil servants
did not identify themselves with the new government and began
to leave Zambia in droves, back to their respective countries of

origin, despite assurances from the government that their jobs
were not under any threat.

redress the imbalances in employment opportunities that had
been carved out by the colonial system for Europeans.
Zambianisation was to re-arrange the unequal structural forces,
designed by colonialism, in order to build a just and equitable
society. It also sought to create the greater sharing of wealth and
ending of exclusiveness and racial privilege; and the opening of
opportunities to Zambians who had been denied all elements of
good life - education, health, responsibility and fair return for
labour (Kaunda and Morris, 1966). Initially, the government’s
intention was to allow expatriates transfer skills to local people
for a certain period before the posts could be indigenised. But
many of the expatriates who remained were intransigent to the
new order and even proved to be detractors of new development

their rationales and outcomes were different. The colonial

fountains of knowledge from where the community could solicit
advice, especially during times of crises. They were venerated
and therefore had to participate in numerous community

in disputes and offered wise counsel. Whenever old persons
could no longer care for themselves, the extended family took
responsibility of looking after them. It was argued by politicians
and policy-makers alike that urbanisation had played a
significant role in loosening the ties of the extended family

Again, according to the colour bar system they were defined in
terms of four race groups, namely: White, Black, Coloured and
Indian. Elderly Africans were not supported by the colonial
government. However, other race groups were catered for, for
instance, they were entitled to care and accommodation in old
people’s homes, free medical care, spectacles and dentures. They

the European settlers. The wealth of the country was not in the

was not equitably redistributed in the country. Therefore, due to
its low economic status and inadequate infrastructure, Zambia
embarked upon a drive of self-determination that placed
emphasis on planned social and economic development.

    The new government promulgated policies and programmes
that attempted to erase the inherited legacy of colonialism which
was mainly defined by the inequities and inequalities of the
colonial era. Thus, there were efforts to abolish any remaining
vestiges of racial discrimination and segregation, the
maintenance of individual liberties, and the achievement of
African Democratic Socialism. The latter incorporated raising the

Ideology and Social Welfare

Zambia’s development trajectory was underpinned by an
ideology.48 This ideology was of the ruling party - UNIP or more
precisely of the president, Kenneth Kaunda. It was referred to as
Humanism. Humanism was used as a tool to mobilise the citizens
around the twin goals of nation-building and socio-economic
development. It was also very instrumental in harmonising the
disparate ethnic groups under one unitary state. The UNIP motto
of One Zambia-One Nation was also adopted by the government
for purposes of fostering national unity and keeping in check
ethnic rivalries. This is because the 1960s were characterised by
political violence that was primarily driven by ethnicity. Since
the country had inherited a Westminster constitutional model,
political pluralism and dissenting views were permitted through a
multi-party type of electoral system. Although there were a
number of opposition parties during this period, some of them
were constituted along ethnic lines. The ruling party itself was
not immune to ethnicity and did also fuel ethnic tensions in the
political arena as well as in the country. Humanism denoted a
way of life that was modelled along the lines of a mutual-aid
society, which found its basis in the ethnic community in which
human need was the supreme criterion of behaviour and social
harmony was a vital necessity, since every activity was a matter
of teamwork (Fortman, 1969).
    A crucial aspect of Zambian Humanism that had immediate
application to social welfare, planning and service delivery was
the “man-centred”49 ideal that was embodied in the principle of
recognising man as the centre of all activities. Thus, at the
ideological level Zambia was geared for a people-centred

                              231
fNdangwa Noyoo


approach to social welfare and social planning. The universal
access to medical and health-care, free education - from primary
to university - and a deliberate emphasis on rural development,
became the hallmarks of the Zambian welfare system under the
guidance of Humanism (Nyirenda, 1975). It was particularly
after independence that this guiding philosophy began to play a
major role in shaping the structure and content of services.
Emphasis was placed on services of a developmental nature -
moving away from the typical remedial type of services.
Communities were encouraged to once again, play a major role
in the improvement of their lives through self-help activities.
This change in policy led to the merging of the departments that
were involved in the provision of social welfare and community
development services into the Department of Social
Development (Brooks and Nyirenda, 1987:248).
    The state was supposed to care for man - the person. He in
turn, was expected to care for his neighbour and thereby care for
the state (Kaunda, 1969). Zambian Humanism rested on the
following values:

    1.    Man-centeredness;
    2.    Communalism;
    3.    Non-exploitation of man;
    4.    Respect for human dignity;
    5.    Self-reliance;
    6.    Hard work;
    7.    Respect for the aged and the infirm;
    8.    Co-operative effort;
    9.    Inclusiveness (egalitarianism);
    10.    The extended family system;
    11.   Patriotism and respect for authority;
    12.   Reciprocal obligation (Kaunda, 1975).

similar to the objectives of social welfare:

social and economic strategies, as well as social welfare service

Global and Geo-Political Variables

Social welfare initiatives in Zambia were heavily influenced by
external factors which also had impinged upon the country’s
political economy. It is also true that in this era, Zambia was
significantly swayed by the personality and thoughts of Kenneth
Kaunda. Many of the country’s actions in the social, economic
and political spheres were mainly contrived by one man: Kenneth
Kaunda. Many of the ill-conceived policies which were pursued
in Zambia at the time were of Kaunda’s making and more often
than not, the government in general. Some of the disastrous
courses of action he took had profoundly impacted on the lives of
ordinary Zambians in a negative way. Some of the ripple-effects
of such decisions are still being felt in Zambia even today. One
good example of this stance was the support Zambia gave to
liberation movements that were fighting white minority rule in
Southern Africa. Though noble, this cause had many a time, put
Zambians in danger and eventually wrecked the country’s
economy. At times this issue bordered on self-aggrandisement
and personal glory. This crusade was all about Kaunda and not
Zambians. Countries under white minority regimes in Southern
Africa were hostile towards Zambia because of her overt support
for these liberation movements. They waged military raids into
the country for decades with many Zambians’ lives being lost in

infrastructure which further retarded development pursuits in the
country. These white-ruled countries were militarily well
equipped because they were supported by major Western powers
notably: Britain, United States of America, West Germany and
France. Israel also supplied racist South Africa with modern
weaponry. Although claiming to be “non-aligned”, Zambia
gravitated towards countries in the former Eastern Bloc due to its
leftist political leanings.

created parastatal - the Industrial Development Corporation
(INDECO). A year later, on 11 August 1969, the Matero
Reforms were announced, and these resulted in the government
purchasing 51 per cent shares from the existing mining
companies: Anglo American Corporation (ACC) and Roan
Selection Trust (RST), leading to partial nationalisation of the
copper industry. Eighty per cent of the economy was now under
state control after this second phase of nationalisation which now
encompassed mining, energy, transport, tourism, finance,
agriculture, services and commerce, trade, manufacturing and
construction sectors. Further reforms were carried out on 10
November 1969. These were extended to the financial sector
including the insurance companies and building societies, but
excluding the banks, which successfully resisted being taken
over.
    When the country adopted nationalisation as economic
policy, the president of Zambia asserted: “Several times before, I
have declared in very clear terms that political independence
without matching economic independence is meaningless. It is

economic independence that brings in its wake social, cultural
and scientific progress of man. No doubt political independence
is the key, but only the key to the house we must build…If we
are true humanists then whatever institutions we create must be
geared towards fulfilling our commitments to the common man.
Basically this means providing adequate food, adequate clothing
and adequate shelter for all our people in Zambia and not just a
few of them. Today our society is being exploited very badly

very little capital into Zambia, but because of their know-how

short time” (Kaunda, 1968). The overall goal of nationalisation
was to increase local control over an economy which at
independence was completely dominated by foreigners at the
ownership and managerial levels. Even as late as 1968 only 15
per cent of bank credit was channelled to Zambian citizens. A
parallel aim was to ensure that a larger proportion of the Gross
National Product (GNP) remained in the country. Nationalisation
also rested upon the desire to improve the quality of life of the
majority of Zambians. The state felt obliged to serve the interests
of the ordinary workers and villagers and regarded the economic
system as primarily being there for the benefit of the citizens of
the country. In this respect, the role of the state was to limit
exploitation (Molteno and Tordoff, 1974).
    Nationalisation was far-reaching and as reported then, the
president put notice for “owners of certain firms to invite the
government to join their enterprise.” These firms had to sell at
least 51 per cent of their shares to the government. The first firms
mentioned were Anros Industries Ltd., Monarch (Zambia) Ltd.,
and Crittal-Hope (Zambia) Ltd. These three companies
dominated the field of window and door frame manufacturing.
The building industry was also targeted: Anglo-African Glass
Co. Ltd., P.G. Timbers, Baldwins Ltd., Steel Supplies of Zambia
Ltd., Zamtimba Ltd., May and Hassell (Zambia) Ltd., and

of the new parastatal company the Zambia Steel and Building

crushed stone in the Lusaka area were also earmarked. These
were Nicholas Quarries, Gerry’s Quarries and Greystone Quarry.

join in its activities was the brewing industry. Northern
Breweries Ltd., and its subsidiary the Heinrich’s Syndicate Ltd.,

Youngson Ltd., and Central African Road Services Ltd., were

O.K. Bazaars, Standard Trading, Solanki Brothers Ltd., and

the Zambia Newspapers Ltd., which published Zambia’s only
daily and Sunday newspapers fell under government control. In

well (Cited from Fortman, 1969).

On Compensation of Foreign Firms

This was to be done on the basis of book value of assets as
Kaunda (1968) noted: “I shall leave it to INDECO to negotiate
values and terms of payment but I want to make it clear that what
they will pay is a fair value represented by the book values.
There is no such thing as business goodwill or paying for future
profits as far as I am concerned. I cannot see any reason why we
should pay extra for the boom we have ourselves created.” It is
noteworthy that the mines were not initially nationalised in 1968
because as Kaunda put it: “The copper mines are big business -
too big for us.” But a year later, there was a change in attitude
from Kaunda. An article in the Time Magazine of August 22,
1969 aptly captures the nationalisation saga:

Implications of Nationalisation

It is important to note that at independence, Zambia inherited a
prosperous mining-based mono-economy. With her abundant
natural resources, prospects for social and human development
looked very bright. However, the government was faced with the
challenge of diversifying the economy in order to redress the
inherent inequalities that existed due to the rural-urban divide,
geographically isolated labour reserves, high unemployment
among indigenous Zambians, and discriminatory channels for the
provision of socio-economic services, such as health and
education. This was compounded by the UDI by the Smith
government in Rhodesia that unexpectedly cut off
communication and trade with Zambia in 1965 (United Nations
Development Programme, 2003). Nationalisation therefore, led
to significant changes from liberal policies to a more restrictive
policy environment that entailed increased government
involvement in national development. Policies also attempted to
diversify the economy from mining through industrialisation and
                                        247
fNdangwa Noyoo


import substitution. The main strategy for import substitution
was the introduction of various parastatal companies, through
which the local manufacturing sector was protected by high
tariffs and an over-valued exchange rate. Price controls for major
commodities were also put in place (United Nations
Development Programme, 2003). Crucially, parastatals were
supposed to be vehicles through which government could begin
to increase the scope of social welfare provision, increase
employment and re-orient economic activity in various ways.
Social welfare provision had earlier improved with the creation
of the Zambia National Provident Fund (ZNPF) in 1966, the
Workmen’s Compensation Board and the Zambia National
Commercial Bank in 1969. The bank became the first Zambian
owned commercial bank which was to provide services for the
lower income groups as well as to Zambian business men,
women and farmers (Turok, 1989).
    In regard to social welfare, the ZNPF also aimed among other
things to enable aged persons to enjoy some measure of financial
independence based on contributions made during their working
days (Department of Social Welfare, 1966). Although well
intended, the fund confined itself to those in formal employment
and did not cater for those in self-employment or the informal
sector. Thus there was more focus on social security and social
insurance measures as opposed to social assistance in Zambia.
Parastatals also heavily subsidised their services in the favour of
Zambia’s poor. For example, the United Bus Company of
Zambia (UBZ) offered cheap transport throughout the country -
even to the remotest parts, where private firms were not willing
to operate. Other companies like the Nitrogen Chemicals of
Zambia (NCZ) produced fertiliser and sold it at concessionary
rates to farmers, while the Zambia Electricity Supply Corporation
(ZESCO) took over from the private firms and began an
electrification programme that extended to all parts of the
country. Parastatals were engaged in crucial initiatives that the
private sector was not willing to pursue or which it deemed
“unprofitable”. These organisations were also central in the

                               248
f                                                   Social welfare in zambia


government’s employment creation and job security agenda.
Zambians were guaranteed jobs as a way of tackling poverty via
access to jobs and incomes. In the main, employment became a
key development imperative and an artery of social policy. The
policy of Zambianisation also reinforced the above-mentioned
(Noyoo, 2010).
    In pursuance of an egalitarian society that was guided by
Humanism, the government invested heavily in education and
health infrastructure, such as the University of Zambia (UNZA),
the University Teaching Hospital (UTH) and thousands of
schools, colleges, and district hospitals which did not exist in the
colonial era. These facilities opened up socio-economic
opportunities for many previously disadvantaged Zambians
(United Nations Development Programme, 2003). The mining
conglomerate - the Zambia Consolidated Copper Mines (ZCCM)
- which materialised from the nationalised Roan Selection Trust
and the Anglo-American Corporation mines - became a major
player in the country’s development. ZCCM mirrored the state’s
developmental philosophy and supplied social amenities much
wider in scope than those offered during the colonial period,
including free education for miners’ children, alongside
subsidised housing and food, electricity, water and transport.
ZCCM literally operated a “cradle to grave” welfare policy, even
subsidising burial arrangements for the dead (Fraser and Lungu,
2006). The mines did not only just look after their workers but
they also provided services to the whole community. They
managed the environment in the mine townships, maintained
roads and collected refuse as well as provided cafeterias, bars and
social clubs dotted over the mine townships. They encouraged
the growth of economic and social activities dependent on
miners’ incomes, such as shops, farms to supply food to the mine
areas and other industrial activities. Also, youth development
schemes helped youths in the compounds identify skills they
could pursue and formalise as careers. Women’s clubs
concentrated on home-craft. Social casework agencies were
charged with investigating social conditions in the townships.

ZCCM had one or two hospitals by the end of the 1990s at each
of its operating division. In towns like Nchanga and Konkola
there were no government hospitals and non-mine employees and
their dependants relied on mine hospitals for access to medical
services (Fraser and Lungu, 2006:8).

How Nationalisation was Blunted

Even though the intention was noble, Kaunda had nationalised
the mines without undertaking a broad consultative process (even
his cabinet was not aware of this move before it was announced).
Nationalisation was also used for political expediency. When
examining the 1967 Mulungushi UNIP internal elections, it can
be said that they were the first and biggest threat to Kaunda’s
leadership since independence in 1964. So it was not coincidental
that a year later nationalisation was implemented. Naturally he
had to secure himself politically through nationalisation.
Furthermore, in 1968, UNIP had suffered major losses at the
national polls as the opposition was gaining ground. Arguably,
nationalisation was Kaunda and UNIP’s secret weapon. There is
nothing inherently wrong with nationalisation if it is well-
mapped out, well-thought out, devoid of political machinations
or interference, nepotism, ethnic agendas, corruption or
clientelistic tendencies. But this has hardly been the case in
Africa. Politicians of all shades have advocated nationalisation -
communists, socialists, social democrats, liberals, conservatives
or fascists. Stalin nationalised, and so did Mussolini, Attlee, and
Edward Heath. Nationalisation has been done in peace and war,
boom and slump, depressions, recessions, reconstructions and
economic miracles (Coleman, 1991). Worldwide nationalisation
is embarked upon due to: (a) politics and ideology; (b) economic
reasoning - equitable distribution of wealth; (c) protecting
strategic interests. What is crucial however is that before any
government begins to nationalise, it must have clear reasons for
doing so (emphasis added). The broader and imprecise the aims
the less likely nationalisation is to succeed (Coleman, 1991).

Many good things came out of Zambia’s nationalisation process
such as universal and near free education and quality health-care.
However, it funded a whole lot of bad things such as patronage,
state repression and a blotted UNIP.

and UNIP to the Zambian people in matters of social welfare in
particular and development in general. However, one should also
not lose sight of the former’s undemocratic methods and sole
purpose of attempting to erase Barotseland. Thus, successes were
scored in the First Republic on the social and economic fronts,
and not so much in the political arena:

    Furthermore, the expansion of the country’s economic
infrastructure was a resounding success. In the first place,
Zambia responded to Rhodesia’s UDI by accelerating measures
to reduce the country’s inherited dependence on the white-ruled

expanded development into the rural areas away from the line of

undertaken and outlying urban centres were provided with piped

quite eventful for Zambia. Living standards of the majority of the
people were raised to unprecedented heights. After
independence, Zambians had enjoyed one of the highest
standards of living in sub-Saharan Africa, even though the state
had not focussed on expanding the economy so as to sustain
them. For instance, the United Nations (1968) cited in Rodney

II. Social Welfare in the Second Republic

This period under examination, which is referred to as the
Second Republic, begins with the imposition of the one-party
state on Zambia. The Second Republic was proclaimed in
December 1972 and followed on the back of public sector
reforms of 1968, where Kenneth Kaunda and UNIP expanded
their powers in order to have a tight grip on the government
bureaucracy. The one party-state now provided the UNIP
government the legal instruments to impose an unjust system on
the Zambian people. During this so-called one-party participatory
democracy, there was an extension of presidential powers and the
centralisation of power. The incumbent was no longer
accountable to other institutions and structures. Obviously, these
powers, as explained earlier, were inherited from the Governor of
Northern Rhodesia through mainly the Preservation of Public



                                     253
fNdangwa Noyoo


Security Act. In the same vein the president expanded the cabinet
in order to increase his patronage networks.
    Even though the Chona Commission (see Prologue) had been
used to rubber-stamp the one-party state, it nevertheless had
made certain positive recommendations. For instance, it had
endorsed the limitation of preventative detention; the curtailment
of both party and presidential powers; the division of the
presidential power and functions between an executive president
and prime minister with extensive power of his own, including
the appointment of ministers; and the restriction of party activity,
including the removal of party control over nomination for
parliamentary elections and responsibility for the electoral
campaign. The UNIP government, however, rejected all such
proposals, and the president retained all the powers his office had
previously enjoyed. Furthermore the new UNIP constitution of
1973 stipulated the supremacy of the party over the government,
and hence of the central committee over the cabinet. Both central
committee and cabinet were charged with the implementation of
the UNIP National Council decisions, and in the event of serious
disagreement between them, the decision of the former would
prevail (Gertzel, et al., 1984:9). Barotseland, in direct contrast to
other parts of Zambia, totally rejected the one-party state and it
became a key opposition area. In fact in the years of the multi-
party state, moreover, electoral politics were characterised by
declining polls, and in the general election of 1973, the
provincial poll of 21.8 per cent in Barotseland, was the lowest in
Zambia (Gertzel, 1984). In terms of the economy, after the
nationalisation of the economy in the late 1960s, the government
continued in the Second Republic to interfere with the pricing
and investment policies of the parastatal organisations, often to
the detriment of their commercial performance. It also tightened
financial control. For instance, in January 1975, Alexander
Chikwanda50 the Minister of Planning and Finance, announced
his decision to “form an inspectorate within my Ministry whose
duty will be to ensure that financial discipline and propriety are
strictly observed by these organisations” (Fry, 1980:23). The

country was not only facing political dictatorship but now had to
contend with imprudent economic management:

    With the above issues in mind, it must also be borne in mind
that during the early 1970s, Zambia established an economic
structure which was based on state ownership which displayed a
strong preference for heavy government intervention and controls
on prices. Given that the newly independent economy had little
progress on capital formation, there was a high degree of import
dependence on both capital and intermediate goods, and
consumer goods. Emphasis was also placed on import
substitution industrialisation and high protection of domestic
industries (Kalinda and Floro, 1992:7). In addition, the
macroeconomic policies during this period were directed at
maintaining consumption levels and living standards based on
the expectation that the fairly favourable world copper market
would continue for some time. The government’s development
plan was similar at the time to what was referred to as the Basic
Needs approach. The development plan included such measures
as price regulations on most consumer products and heavy
agricultural subsidies. There was however very little planning
with respect to the sustainability of these measures other than its
reliance on favourable copper earnings. For example, a sizeable
proportion of government outlays went not only to subsidies of
maize and fertiliser, but also towards non-essentials such as
cooking oil, salt, matches and soap (Kalinda and Floro, 1992:7).
An interventionist approach also percolated down to the social
welfare sector:

    Thus, it is not surprising that Zambia’s economy
haemorrhaged with the onset of the global financial meltdown
after the oil crisis of 1973. The world was thrown into a tailspin
when Arab countries of the Organisation of Petroleum Exporting
Countries (OPEC) decided to enforce an oil embargo against the
United States. This was in retaliation for that country’s military
support of Israel during the 1973 Arab-Israeli War. The embargo
which lasted from 1973 to 1974 had also been extended to other
countries with resultant dire consequences for the global
economic system. During this period, oil prices rose
exponentially high and increased production costs for various
countries’ industries. This also dampened the price of exports on
international markets, especially for raw materials such as
minerals and agricultural products. Zambia’s economic mainstay
copper also saw its prices fall drastically to unsustainable low
levels. The effects for the country’s economy were devastating as
Zambia had not been serious enough to diversify its economy.
Copper still accounted for 90 per cent of the country’s export
revenue. To offset the increasing economic woes and meet the
needs of its citizens, the UNIP government borrowed heavily. It
was in this atmosphere that the International Monetary Fund
(IMF) and World Bank decisively entered into Zambia’s
economic decision-making processes, through austerity
programmes. They compelled the heavily-indebted Zambian
government to liberalise the economy, cut down on social
spending and repeal interventionist policies (Noyoo, 2010). The

reduction. Under this programme, investment outlays were
restricted to the support of on-going projects (Mutukwa and

in continuous free-fall without any foreseeable signs of things
getting any better. For instance, the much talked about rural
development remained a pipe-dream. Brooks and Nyirenda
(1987) point out that the rural areas were largely left without
services. There were a few Rural Reconstruction Camps and a
few training centres, with most rural children and youths
receiving neither curative nor preventative services. This was
also the period when Zambia’s inequality patterns began to be
entrenched. Kalinda and Floro (1992) again report that the
International Labour Organisation (ILO) Mission to Zambia of
1977 had revealed that there was marked inequality not just
within the urban areas, but between the urban areas and rural
areas as well. This survey also showed that the richest 5 per cent
of Zambian households received 25 per cent of the total income,
which was more than the share received by the 60 per cent.
Income distribution in Zambia had become highly skewed in
favour of the elites from the mid-1970s onwards.

          POVERTY AND INEQUALITY IN ZAMBIA

This chapter closely examines the phenomena of poverty and
inequality in Zambia. It also takes cognisance of the question of
social exclusion in the country. Concepts and theoretical
constructs relating to the former are also put forward for
discussion.

What is Poverty and Inequality?

Poverty is one of the most contentious and controversial issues in
human history, both as a state of being and an area of study. In
many instances, an understanding or appreciation of poverty is
rarely objective as the phenomenon is subjected to varying
interpretations. Some views on poverty may not be value-free,
while others may even be harmful because studies’ conclusions
could be used to justify ill-conceived interventions, on the part of
those who wield power. Therefore, discussions relating to
poverty are also about power and power relations. Poverty can
also take on moral overtones in that it can be seen as an affront to
humanity and hence should not be allowed to continue or exist.
Poverty can also take on a pernicious form whereby those who
are not poor justify poverty by blaming it on the failings of those
who are poor by using race, disability, religion, gender and so on,
in order to justify the status quo which allows them unimpeded
access to wealth creating opportunities. Poverty is also about
lack of choices on the part of those who are poor. Poverty is as
old as humanity and perhaps what is unanimous across cultures
is that it is an unacceptable form of existence as it erodes
people’s dignity and self-worth. Its non-toleration is universal in
most societies and over generations there have been attempts by
different countries to arrest or eradicate this problem, with
varying degrees of success. The existence and prevalence of
poverty in different societies points to various shortcomings in

                                299
fNdangwa Noyoo


their systems. For instance, the inability of institutions to absorb
certain members of society so that they are productive and earn
an income may result in some of them becoming poor. If people
do not participate in an economy or the labour market, for
instance, they may be rendered poor. Due to certain structural
impediments, some people may have difficulties in accessing life
enhancing opportunities or may not acquire assets or skills which
they could turn into viable livelihoods.
     Social welfare interfaces with poverty in the manner in which
it is able to counteract its negative effects on society, especially
in the lives of individuals, families, groups and communities.
Social welfare comes into poverty discussions in so far as it is
able to help those who are fighting this trend to either prevent or
reduce it, by availing poor populations with concrete
opportunities to move out of poverty. For example, social
welfare, as a form of state assistance, provides different social
services to people that will ultimately help to reduce or stave off
poverty. Also, the type of welfare regimes that are in place in
particular countries will give rise to unique benefits which will
be accessed by citizens. These may either liberate them from
poverty or merely help to ameliorate their circumstances and not
help them to decisively break out of the poverty trap. For
instance, in colonial Zambia, poverty took on different meanings
as it was both structural and racial. In this vein, poverty was
constructed and then ascribed to the African people by the
colonial establishment. For example, racial discrimination gave
credence to all the policies and legislation of the colonialists
which had barred Africans from advancing themselves. In the
case of education for instance, there was a permanent ceiling
which ensured that Africans were only educated up to primary
school level. This meant that they were only suitable for menial
jobs and therefore could only earn meagre wages. More
importantly, the colonial policies shaped the post-colonial
poverty dimensions in Zambia, especially in the first two decades
after independence. However, after this period, poverty can
mostly be attributed to bad policy choices and lack of planning

f                                                   Social welfare in zambia


on the part of different political administrations. Furthermore, it
is rare that poverty is mentioned without the subject of inequality
being touched on. Even though poverty and inequality are not
synonymous, they reinforce each other. Inequality is used to refer
to the unequal distribution of income and wealth as well as of
status and power. It is a feature of all contemporary societies
irrespective of economic development, political system or
anything else. There may be legitimate debate about the extent of
inequality in different societies but not about its existence
(George, 1980).
    For many years, poverty was defined from a one-dimensional
perspective. One-dimensional approaches to poverty can be
applied when a well-defined single-dimensional resource
variable, such as income, has been selected as the basis for
poverty evaluation. This variable is typically assumed to be
cardinal; however, in some cases the variable may only have
ordinary significance (i.e., the direction of change is discernible,
but not its magnitude). Identification in a one-dimensional
environment usually proceeds by setting a poverty line
corresponding to a minimum level below which is considered
poor. Aggregation is usually achieved through the use of a
numerical poverty measure that determines the overall level of
poverty in a distribution given the poverty line (Alkire and
Foster, 2011:2). Such diagnoses of poverty were quite limited
and therefore the solutions that they had provided were not
comprehensive enough and also led to half measures in terms of
state interventions. Due to this, there arose a need for
multidimensional analyses of poverty. Multidimensional poverty
definitions provide richer information than simple monetary
estimates; they make it easier to identify priorities and to guide
the design and composition of social policy measures. The
development of a multidimensional poverty measure requires
decisions to be made, each subject to their own advantages and
disadvantages. Inherent to the construction of a multidimensional
poverty measure are choices related to domains and indicators
which are often based on value judgements and context-

fNdangwa Noyoo


specificity; making multidimensional poverty estimates
susceptible to misinterpretation and controversy (de Neubourg, et
al., 2009:37).

Theorising Poverty and Inequality

Any theory responsible for the analysis and interpretation of the
severity and prevalence of poverty must treat the following
elements at length:

    (a) the distribution of resources internally;
    (b) the spread of expectations (including job demands) placed
        on the citizens of each nation;
    (c) the style of living of national populations and the
        institutional infrastructure underlying these styles; and
    (d) the relative balance of national and transnational
        economic, political and military associations (Townsend,
        1984).

    The manner in which poverty is firstly defined and then
measured will significantly influence the way in which societies
respond to this problem, in terms of policies and strategies meant
to deal with it. Also, the manner in which poverty is understood
and the way it is measured will allow for the creation of certain
mechanisms to address it. Although in most cases the notion of
deprivation informs definitions of poverty, this problem has been
explained mainly in relative and absolute terms.

Relative and Absolute Poverty

Poverty in the relative sense is linked to some held threshold or
standard in society. People are deemed poor when their
circumstances are compared to those of others who are regarded
as well off. This way of defining poverty is subjective in that
those who define poverty will base this on their own experiences
and points of reference. The best way of describing poverty in

                               302
f                                                   Social welfare in zambia


relation to thresholds is through poverty datum lines whereby
people below this line are taken as being poor. The poverty
datum line is usually an estimate of income in relation to food as
well as consumption that an individual or household is supposed
to command in order to live an acceptable standard of living. It
refers to some kind of minimum standard which will allow
people to live a decent life. If one falls below this standard, then
the person is regarded as poor. As can be seen from the
foregoing, poverty datum lines are mainly calculations of an
average income and are monetary yardsticks. Poverty datum
lines were used in many countries to establish the minimum
wage on which workers could live. However, this approach had
flaws as it was narrow in perspective and could not capture the
totality of human well-being. Poverty datum lines were in vogue
in the 1960s and 1970s. On the other hand, absolute poverty
refers to a state of deprivation that is bereft of all human
necessities, for example access to adequate food or medical care.

Social Exclusion

In Chapter two, social exclusion was given some thought and
described as a determinant of social welfare. In this chapter, it is
argued further that poverty gives rise to social exclusion in
Zambia. In this regard, poverty is a consequence of social
processes where some people tend to be poorer than others.
Poverty from this perspective has to do with those social
processes and institutions that support or inhibit household
participation in economic, political and civic/cultural activities.
More specifically, it is exclusion from, or inclusion in society
that inhibits people from benefiting from the market as well as
available resources (Wagle, 2008). When examining the
economic growth of Zambia and the attendant increase in
household poverty, it can be speculated that many households as
well as individuals have been impeded from accessing different
life chances in the country. This is because processes of
exclusion seem to be perpetuated by the political establishment

in Zambia. Poverty and social exclusion can effectively be
tackled if redistributive mechanisms are institutionalised in the
country. Examples can be drawn from the Nordic or Cuban
models of social welfare which were discussed in Chapter two.
   Over time, there have been certain theories that have been put
across by different scholars in order to explain poverty. Some of
them are the following:

(a) Feminisation of Poverty

The feminisation of poverty may be defined as: (a) an increase in
the difference in the levels of poverty among women and among
men, and (b) an increase in the difference in the levels of poverty
among female-headed households and among male – and couple-
headed households. Feminisation of poverty has been understood
as a static phenomenon (or “end state”) as well as a dynamic
process. It has compared the gender composition of the poor and
the levels of poverty within and between gender groups, and has
also associated “feminine” with women and female-headed
households (Medeiro and Costa, 2010:95).

(b) Child Poverty

Disaggregating child poverty from that of adults is an important
policy approach which should be undertaken by policy-makers in
poor countries such as Zambia. Mitigating this idea should be the
fact that Zambia’s population is mainly comprised of young
people. It does not help to lump children together with adults
when defining poverty because it dilutes interventions when it
comes to children due to their powerlessness. Even so, it is
widely recognised that poverty rates are much higher among
children than adults in developed and developing countries.
Child poverty entails fundamental deprivations in which children
grow up for instance, lack of access to economic, social, cultural,
physical, environmental and/or political resources that are vital to
their development and well-being. Most childhood material

                                304
f                                                  Social welfare in zambia


deprivations may have lifelong irreversible consequences and
may contribute to rates of disability, illness and death. They also
affect the long-term physical growth and development of
children, and may lead to high levels of chronic illness and
disability in adult life. Some forms of deprivation may also
jeopardise future economic growth by reducing the intellectual
and physical potential of the entire population (Cockburn and
Kabubo-Mariara, 2010:1).

(c) Culture of Poverty

The theory of a culture of poverty is commonly associated with
the work of an anthropologist Oscar Lewis (1959, 1961, 1964,
and 1965). In various books and essays, Lewis provided detailed
accounts of families of Latin America and the United States with
the hope of illuminating the culture of poverty - defined as a
“design for living which is passed down from generation to
generation” of people living in poverty. With a list of nearly
interrelated traits that he found among studied families, Lewis
suggested various “universalistic characteristics” of culture of
poverty (Stein, 2004:xi). These included matriarchal family
structures, present-time orientations with limited deferred
gratification, frequent spending of small quantities of money
with an absence of savings, and a general mistrust of government
politicians. During the 1960s, the culture of poverty thesis
became a common reference point of politicians and scholars in
the United States during policy debates both as a call to action
and a way to blame poverty for the poor’s circumstances (Stein,
2004:xi).

(d) Functionalist and Conflict Theories of Poverty and
    Inequality

According to George (1980:4), the two main schools of thought
attempting to explain the causes of inequality and poverty are the
functional and conflict explanations of social stratification. The

                               305
fNdangwa Noyoo


former author is of the view that the functional school is the
more coherent of the two. It is to be found in the works of Talcott
Parsons, Kingsley Davies and Wilbert Moore. The functional
explanation of stratification encompasses income inequality and
hence poverty, though it does not specifically refer to poverty. Its
premise is that all societies are stratified even though the forms
that stratification takes may differ. Inequality of income, status
and prestige is therefore a universal phenomenon. The
fundamental reason for this is that in every society there are
certain positions which are more functional to the survival of that
society than other positions. Society must, therefore, ensure both
that the most able fill those positions and that once so filled the
proper incentives are provided for their adequate functioning
(George and Lawson, 1980). The conflict school has no generally
acknowledged leaders, largely because there is no generally
agreed conflict theory. All conflict theory writers of social
stratification, however, adopt, in varying degrees, a Marxist
perspective, and it is a composite semi-Marxist explanation. If
functional explanations stress consensus and functionalism,
conflict explanations stress conflict and power in society. While
functional explanations assume general consensus in society as
regards values and interests, conflict explanations see conflict at
both the social class level and the group. The concept of power
raises as many problems as the concept of functionality. What
exactly is power, how do we ascertain its existence, and how do
we measure it? Clearly, the definition of power one uses will
influence and it may predetermine the outcome of research. In
this case inequality and poverty are seen as the inevitable result
of the maldistribution of power. They are not an unconscious
device of benefitting all in society (George and Lawson, 1980:7).

Summary of Poverty Theories

Bradshaw (2006:6-14) distils five theories of poverty and shows
how these theories place its origin. Some of these have already
been touched on above. He looks at the following:

   (1) Individual deficiencies: this is a large and multifaceted
       set of explanations that focus on the individual as
       responsible for his/her poverty situation. Typically,
       politically conservative theoreticians blame individuals in
       poverty for creating their own problems and argue that
       with harder work and better choices the poor could have
       avoided (and now remedy) their problems.
   (2) Poverty caused by cultural belief systems that support
       sub-cultures of poverty: As noted above this finds its
       roots in the “culture of poverty” and is sometimes linked
       with the individual theory of poverty or other theories. It
       suggests that poverty is created by the transmission over
       generations of a set of beliefs, values and skills that are
       socially generated but individually held. Individuals are
       not necessarily to blame because they are victims of their
       dysfunctional subculture or culture.
   (3) Poverty caused by economic, political and social
       distortions or discrimination: Whereas the first
       “individualistic” theory of poverty is advocated by
       conservative thinkers and the second is a culturally
       liberal approach, the third is a progressive social theory.
       Theorists in this tradition look not to the individual as a
       source of poverty, but to the economic, political and
       social system which causes people to have limited
       opportunities and resources with which to achieve
       income and well-being.
   (4) Poverty caused by geographic disparities: Rural poverty,
       ghetto poverty, urban disinvestment, southern poverty,
       “third world” poverty and other framings of the problem
       represent spatial characterisation of poverty that exists

                              307
fNdangwa Noyoo


        separate from other theories. While these geographically
        based theories of poverty build on other theories, this
        theory calls attention to the fact that people, institutions
        and cultures in certain areas lack objective resources to
        generate well-being and income, and that they lack the
        power to claim redistribution.
    (5) Poverty caused by cumulative and cyclical
        interdependencies: This looks at the individual and his or
        her community as caught in a spiral of opportunity and
        problems, and that once problems dominate they close
        other opportunities and create a cumulative set of
        problems. The cyclical explanation explicitly looks at
        individual situations and community resources as
        mutually dependent, with a faltering economy, for
        example, creating individuals who lack resources to
        participate (Bradshaw, 2006:6-14).

    All of the above are applicable to the Zambian situation, for
example poverty can be captured from individual failings
whereby a good number of citizens are just idle as was explained
in the Prologue. But there are also fundamental structural barriers
which create obstacles for people to access opportunities that
would enhance their livelihoods. There are also geographical
barriers whereby poverty is located in mostly rural areas and
shanty towns. Furthermore, out of all the areas in the country,
Barotseland emerges as the most impoverished because of the
political establishment’s attitude towards this territory. There are
also cultural factors which show that certain traditions and
customs hinder progress and ultimately give rise to poverty in
Zambia. Some of these issues were again highlighted in the
Prologue.

Researching Poverty

Research evidence is critical to public policy-making in general
and social welfare responses in particular. Social problems

                                308
f                                                            Social welfare in zambia


cannot effectively be solved if their extent and prevalence,
among others, is not known. In the case of poverty, it is also
important to have an understanding where incidences of poverty
exist and where the poor are located. Thus, there would be a need
for geographic and spatial mapping of the poor in this regard. In
order to address poverty, policy-makers must have a clear
understanding of the nature, extent and occurrence of this
problem. Some thinking is needed around the setting up of
systems that will aid countries like Zambia to effectively fight
poverty. This is not to say that nothing is being done, however, a
new trajectory is needed. Examples from other countries are
instructive in this matter.

Lessons from Britain

Britain emerges as one of the first nations to systematically
examine and scientifically investigate the matter of poverty so as
to understand its origins and extent, as well as to identify
possible solutions to deal with the problem. As early as 1791-2
Thomas Paine was already interrogating poverty in his Rights of
Man Treatise. Paine is thought of as one crucial representative of
the thinking about welfare before the rise of the modern welfare
state. In this classical work, Paine remonstrates about poverty in
the following manner:
   When, in countries that are called civilised, we see age going to the work
   house and youth to the gallows, something must be wrong in the system of
   government. It would seem, by the exterior appearance of such countries,
   that all was happiness; but there lies hidden from the eye of common
   observation, a mass of wretchedness that has scarcely any other chance to
                                58
   expire in poverty or infamy.

   It is interesting to note that already in the 1700s a systematic
investigation of poverty was being undertaken by Paine in
Britain. He sought also to provide answers to this on-going
problem, but more importantly, he was able to link poverty to
social welfare measures. Others would build upo</span><span data-dcnode-id="131" instrument_node="">n this
foundation a hundred years later in a significant way. For

                                     309
fNdangwa Noyoo


instance, the early development of Fabian social policy thinking
also drew on new research evidence emerging from the earliest
empirical studies of social problems in the country by the likes of
Booth and Rowntree59 whose research revealed that the extent
and depth of poverty in Britain at the end of the nineteenth
century was both serious and widespread. The duo challenged
conservative political assumptions that economic markets could
not meet the welfare needs of all. The Fabians used this to argue
that policy intervention through the state was needed to provide
these forms of support and protection which the markets could
not (Alcock, 2003:4). Later, research was able to inform policies
on poverty in mid-twentieth century Britain through William
Beveridge’s two reports, which were alluded to in Chapter two.
The former are good examples of the early in-roads into poverty
analysis. This account signifies a tradition of not just “thumb-
sucking” but something which was clearly mapped-out.
Developed nations are steps ahead of other nations, especially
those in the developing world and Africa in particular, because of
this rigorous history. What is also important from this description
is that the development of social policy in Britain is attributable
to solving of societal problems. Thus, the Department of Social
Sciences and Administration at the London School of Economics
(LSE) was specifically established in 1912 for the study of social
policy.
    In order to understand poverty and attempting to devise
mechanisms of rooting out the problem in society, research is of
vital importance. Poverty has to be researched on a consistent
and systematic basis, for decades and generations. In this way,
the responses to poverty in terms of policy measures will be
more accurate. Such undertakings will also allow for a wide
array of options for governments to tackle particular dimensions
of poverty in a country. Understanding poverty as a problem may
be well for political intervention, but a deeper analysis is
required for a context such as Zambia. Early researches into
poverty and other living conditions in Zambia were undertaken
by mostly British and American scholars affiliated to the Rhodes

Livingstone Institute in colonial Zambia. It was mainly
anthropologists from this institute who wanted to find out what
was happening in the “native” quarters. Inevitably, a scientific
route had to be followed. The Rhodes Livingstone Institute was
set-up in 1937 and it was designed to promote a multidisciplinary
research agenda. Predominating here were the disciplines of
Anthropology and Sociology. When Zambia gained
independence, the United Nations Economic Commission for
Africa (ECA), and International Labour Organisation (ILO)
Report on Zambia of 1964 arrived at critical data and proffered
human development indicators which were hitherto not available
to the country due to colonialism. This study undertook a
situational analysis of the prevailing socio-economic conditions
in the newly independent nation. The Report of 1964, better
known as the Seers Report, because it was led by the
development expert Professor Dudley Seers from the University
of Sussex was able to accurately paint the poverty and
underdevelopment picture at independence. Later, data from the
National Development Plans and studies from the Central
Statistical Office (CSO) have been relied upon and have
provided levels of validity into the levels of poverty and other
social phenomena. However, there was a period when these
efforts had waned, especially during the era of structural
adjustment. Although the country’s Central Statistical Office
(CSO) has been collecting poverty-related data since the 1960s,
poverty data collection for monitoring the social dimensions of
adjustment programmes started in 1991 through the first Priority
Survey I (PS I) followed by PS II in 1993. The overall aim of
these surveys was to understand and highlight the social
dimensions of Zambia’s structural adjustment programme, and to
analyse how adjustment programmes affected different segments
of the country’s population. Among other data, the survey
collected information on demographic characteristics, health-
care, education, labour-force supply, household income and
assets, household expenditures, poverty, and household amenities
and facilities (Chibuye, 2011:3).

Conceptualising Poverty in Zambia

A Participatory Poverty Assessment Study (Milimo, 1994 in
Chisanga, et al., 1999) conceptualised poverty in Zambia in
terms of comparing the poor and non-poor at individual,
household and community levels in rural and urban areas. With
the former, the general understanding of rural poverty and
vulnerability is typically marked by insufficiencies in food,
health services, water supply, sanitation, education, credit and
agricultural supports such as grinding mills, transport and

                               312
f                                                   Social welfare in zambia


infrastructure. In addition to vulnerability factors in rural
communities, there are dramatic seasonal changes such as
aspects of declining fertility and overall lack of natural resource
endowment, as well as unpredictable epidemics of diseases in
livestock. For the urban poor, the study identified key
dimensions of poverty much like those experienced by the rural
poor, including a lack of control and ownership of assets, and
secure employment. In addition, at the urban community level
the main poverty characteristics identified by the community
representatives were a lack of access to food, health, education,
shelter, water and sanitation services, as well as lack of welfare
centres, legal tenancy, transport and accessible markets
(Chisanga, et al., 1999). It is crucial that poverty in Zambia is
expressed as multiple levels of human deprivation. Poverty is
multidimensional in nature as was inferred in the first part of this
chapter. Furthermore, Zambia’s poverty is historical and can be
traced back to the colonial period. At independence indigenous
Zambians were extremely poor and lacked in services such as
education, health, housing, clean water and sanitation.
    The official poverty line used in Zambia is based on data
from the Living Conditions Monitoring Survey published by the
government’s CSO. In 2006, the official food poverty line (also
known as the extreme poverty line) as reflected in the Draft
Living Conditions Survey was set at 295,696 Zambian Kwacha
per month for a household of six persons (equivalent to US$82.1
and equivalent to US$0.45 per person per day). The official
poverty line was K473,114 (equivalent to US$131.4 or around
US$0.73 per person per day) (Chibuye, 2011). Measurements
relating to poverty are still not comprehensive and holistic
enough, and thus capture human well-being from a limited
perspective. In this regard they do not allow for meaningful
responses against poverty in the country. For instance, the
official food poverty line includes no provision at all for bread,
meat or sugar; even though official surveys show these to be
among the top five foods in terms of share of food expenditure.
In addition, the official poverty line that incorporates non-food
