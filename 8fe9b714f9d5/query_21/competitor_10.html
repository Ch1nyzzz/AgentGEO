                              xiv
f                               Prologue

I was motivated to write the first edition of this book after
presenting lectures for an introductory course in Social Welfare
and Social Work at the University of Zambia in 1995. During
these sessions it dawned on me that a lot of material relevant to
the course was scattered in various places such as libraries,
archives or even personal bookshelves. It also became apparent
to me that there was no single text in the country that specifically
addressed the whole question of social welfare in Zambia and/or
its origins. Even though several studies had already been
conducted on the topic, a good number still remained
unpublished as masters or doctoral theses. The first version of
this text was indeed a labour of love as it had sought to establish
a scholarly foundation on which social welfare in Zambia could
be placed. However, this undertaking was fraught with
challenges such as minimal resources at my disposal and poor
workmanship in regard to the publishers of the text. When I was
organising material for the book, Zambia was perilously bogged
down in an economic limbo, which was mainly typified by social
decay. The country’s economic challenges had also affected all
facets of the Zambian society. In this regard, research and
scholarship were also severely curtailed by the country’s
economic meltdown and social malaise, and this had also
impacted on the quality of my earlier work. Nonetheless, the
second edition of this work seeks to correct a lot of the
deficiencies in my first book and I dare say my idealism,
especially in relation to life in general and humanity in particular.
I do feel that over the years my earlier views regarding a whole
range of issues have been tempered with a heavy dose of realism.
    In this edition I have relied upon a lot of archival, historical
and anthropological accounts which have provided me with
invaluable insights into the historical and socio-political
evolution of the territory now called Zambia. Given the time
span, some of these works are clearly racist and condescending
in content and orientation, in so far as African people are


                                 15
fNdangwa Noyoo


concerned. Despite this, I managed to glean what was useful to
this endeavour. I also recalled some of the oral Lozi historical
accounts, especially in reference to the military expeditions of
the Lozis, which were narrated to me by the older generation
when I was a child. I have actually managed to corroborate such
oral accounts with an independent source which I have cited in
this section. Crucially, this is not merely an academic exercise,
but work that derives its essence from some of the struggles I
was part of, against ill-fare, political misrule and the fight for
social justice in my country.
    Social welfare activities in Zambia are intertwined with the
emergence of nationalist politics and the struggle for
independence as well as the birth of the Zambian nation. Thus, at
the outset, social welfare initiatives were linked to nation-
building endeavours and the fight for independence. In fact, the
social welfare societies, which were created by enlightened
Africans, gave birth to the first organised political party in
colonial Zambia. This was after these bodies were merged into a
Federation of Welfare Societies and soon after the Northern
Rhodesia Congress (NRC) was formed in order to challenge
colonial rule. Thus from the beginning, social welfare initiatives,
by Africans, in colonial Zambia were transformative in outlook
and content. Eventually, when Zambia became independent,
some of the features of this social welfare thrust were to some
extent endorsed by the first African government, headed by the
United National Independence Party (UNIP) and its president
Kenneth Kaunda. However, over the decades, this progressive
approach to social welfare seems to have been ignored by
successive governments. This book seeks to re-examine the
historical and political context from which the Zambian welfare
system materialised and developed, and attempts to ascertain its
value in present times.
    More importantly, this book is also about setting the record
straight in the light of the damages which were inflicted by one-
party rule, after Kenneth Kaunda and UNIP took Zambia down a
dangerous and unproductive course of political dictatorship from


                                16
f                                                    Social welfare in zambia


1973 to 1991. This is done in order to correct the official,
distorted historical narrative of the country, in so far as it tried to
obliterate, enfeeble, distort, denigrate and vilify those segments
of the Zambian society which were opposed to one-party rule,
UNIP and Kaunda. Barotseland comes to the fore as one part of
Zambia which had suffered untold misery and still continues to
bear the brunt of the past machinations of Kaunda and UNIP.
There was indeed, a well-orchestrated demonization of this
area’s history and its people’s prowess. This is because
Barotseland was more advanced than most parts of pre-colonial
Zambia and this fact had even astounded Europeans, when they
had stumbled upon this civilisation in their colonial incursions.
Unfortunately, what Kaunda and UNIP had set out to accomplish
in regard to this area and its people, became almost self-
perpetuating in different political administrations. Also, it looks
as if the rest of Zambia did not need much prodding from
Kaunda and the UNIP government, as the majority in the country
seemed to have little regard for the plight of the people of
Barotseland, fuelled perhaps by petty jealousy of their illustrious
past. Due to this distortion of history, mainly by partisan pro-
government commentators, I have used independent sources
even for issues which should pass as common knowledge in
Zambia, just to underscore the truth about Barotseland and its
people.
    This book also seeks to challenge the emerging falsification
of the description of Zambia’s transition to multi-party
democracy. This is because the one-party state syndrome of
distorting history is still intact in the national dialogue. That is
why even the politics at play, in Zambia today, is one of deceit
and guile, and not one that genuinely wants to emancipate
Zambians from their misery, characterised by poverty, disease,
ignorance, and hunger, among others. In the last two decades, the
struggle for multi-party democracy has been watered down by
both politicians and the citizenry through irresponsible acts,
which seem to suggest that Zambia effortlessly moved from one-
party state dictatorship to multi-party democracy. The dangers,


                                  17
fNdangwa Noyoo


sacrifices and steadfastness on the part of those who had fought
for freedom (or even died for it) are now being seen as
inconvenient truths, because of sectarian interests and narrow-
mindedness. Thus, in challenging this misrepresentation of facts,
I have used a personal account as I was one of the many activists
fighting for freedom, democracy and the rule of law, during the
one-party state era. Indeed, I challenge anyone, body or
organisation both at home and abroad, to counteract the narrative
I have put forth, which places the students of the University of
Zambia (UNZA) at the centre of the transition to multi-party
democracy and pluralism. There are just too many simplified
accounts about how Kenneth Kaunda was dislodged from power.
This is a serious omission of historical accounts as many
commentators have chosen to either ignore or overlook those
who had mobilised the masses as well as called for regime
change in Zambia, when the rest of the country was just waiting
on the side-lines. Of course it was the students who had called
for regime change and the re-introduction of multi-party
democracy and pluralism in the country by putting such calls into
action through protests. Zambians did not just riot one morning
and then there were elections that brought to power the
Movement for Multi-party Democracy (MMD) - a couple of
months later. For decades this facile account has endured when
in fact it is false. Usually, in Zambia, especially in politics, there
is a propensity for certain sections of the country to hijack
processes or even structures which they never helped to create or
build. That is why things in many instances do not work in
Zambia as some people do not know how to build structures or
begin processes, but merely want to exploit opportunities created
by others. Consequently, once such individuals are at the helm of
organisations or even the state, they fail to chart a progressive
course of action, since they did not have original ideas in the first
place.
    When I wrote the initial account of this book, Zambia was
politically an oasis of misrule, maladministration and nepotism.
Presiding over a dysfunctional, corrupt1 and inept state was the


                                 18
f                                                  Social welfare in zambia


then president, the late Frederick Jacob Titus Chiluba. At the
time, poverty and unemployment levels were extremely high,
while other social problems such as infant and maternal mortality
rates; chronic hunger, endemic diseases, and malnutrition, were
worryingly very high. Apart from voting, there was not much
one could equate with democratic rule in the country.
Consultative and rational governance was a rarity during those
times (or even now for that matter). The country was beholden to
the whims of an erratic president. For example, out of the blue,
Frederick Chiluba one day announced that Zambia was
henceforth a Christian nation. Without prior consultation with his
cabinet, Parliament, churches or even the Zambian people,
Chiluba declared Zambia a Christian nation - as if it was in the
age of theocracy. I must stress here that Zambians had fought
and even died for a democratic and pluralist society and not a
theocracy. Even the Europeans who had brought Christianity to
Zambia in the late 1800s and which began to spread in the area in
the early twentieth century do not have a country that is referred
to as a Christian nation, in their part of the world. Europeans
have had Christianity, as a religion, much longer than Zambians -
spanning several centuries - but they have never made such
pretensions as Zambia did, in modern times. Even Israel, the
birth place of Jesus, never declared itself a Christian nation. In
Africa, Christianity has been a religion in Ethiopia since the first
century A.D. But to my knowledge, Ethiopia was never declared
a Christian nation. Now who are the ruling elite trying to
impress? Although the majority of Zambians are known as
Christians, this is also a nation where almost three quarters of its
citizens have a love-hate relationship with modernity and by
association, Christianity. At the slightest excuse, they revert
back to parochial ways of dealing with the forces of nature and
general social interaction, such as witchcraft and sorcery,2
ancestral worshipping, polygamy, gender-based violence and the
demeaning of women in the name of so-called tradition, to name
just a few. I am of the firm belief that there is nothing wrong
with the positive attributes of some of our cultures such as

courage, order, honesty, respect for other people’s property,
respect for the elderly, women and nature; decorum, etiquette
and hard work, among others, which can be valuable ingredients
in our development pursuits. But in Zambia, a good number of
people love to cling to the retrogressive aspects of our seventy
plus cultures. That for me is a problem.
    After Chiluba declared Zambia a Christian nation, the
president and some of his colleagues in government went on to
plunder the country’s resources whilst most of the citizens
thrived on idle gossip, superstitions, character assassinations,
slander, petty jealousies, hatred and so forth. Zambia can be

change if citizens do not rise to the occasion and chart their
destinies by discarding backward and ancient cultural practices.
Certain facets of our cultures and traditions are simply outmoded
and must not be condoned in modern times. This is not to say
that there is something wrong with the aforementioned, but we
need to move with the times in Zambia and do away with archaic
beliefs and rituals, for example the “cleansing of widows”, which
has no place in a modern world.3 Moreover, in the light of the

supplanted by religious doctrine, no matter how good the

religion, if democratic rule is to take root in the country.

decade ago, there has not been any attendant elevation of

adherence to the aforesaid by ordinary people in the same period.
Whilst the former have gone about with their business of having
concubines or pillaging national resources, and never even
bothering to love their neighbours as they loved themselves, the
latter have carried on with consulting witchdoctors, diviners or
mediums, even when they are suffering from diseases which can
only be cured by modern medicine. If people want to be
Christians, they should look no farther than the example of Jesus

    A lot of water has passed under the proverbial bridge, since
my first book was published in 2000. To some extent there have

significantly dropped from double digits to a single number and

exhibiting positive growth, with a record high of 7.6 per cent in

world economic crisis did the economy register 5.7 per cent
growth. In previous two years in a roll, before the onset of the

copper output peaking at eight hundred thousand tonnes in 2010
and the price of the commodity soaring on international markets;
an inflation rate of 7.2 per cent in 2011, prospects looked good
for the country. However, in most cases things have continued to
be depressingly the same or even taken a dramatic turn for the
worse. For instance, in the said period, institutions and the state
consistently remained weak and incapable. Also, poverty,
destitution and squalor epitomised most of Zambia’s citizen’s
living conditions - despite growth in the economy. Health-care
continued to be in a deplorable state with all the political elites
flocking to South African, European or other hospitals abroad on
tax payers’ money, whilst the majority of Zambians could not
access quality health-care. There were acute shortages of doctors
and other health professionals as well as medicine in hospitals
and clinics. Lack of planning and general incompetence by state
actors remained a key feature in Zambia. For instance, the
soaking of agricultural produce such as maize, after a successful
harvest continued unabated.4

leadership of Rupiah Banda and the former government of the

Movement for Multi-party Democracy (MMD). There has also

copper boom flounders again, as it had in the 1970s and 1980s.
Without a diversified economy, the fortunes of most Zambians
are still locked into a mono economy, which can be held hostage
by international financial volatilities.

    This work also picks up on some of the key issues raised in
the first edition, for example the centrality of politics, culture and
pro-poor economic policies in matters of social welfare. Linked
to politics is also how the absence or existence of political will in
a country can either hamper or advance social welfare, especially
when it comes to the implementation of government policies. In
line with the issues raised in the first edition, this work also
recognises the unique nature of developing countries, in so far as
social welfare endeavours are concerned. Developing countries
are exemplified by financial constraints on the part of the state,
endemic poverty, acute shortages of social services and high
population growth that outstrips available resources. In the light
of the foregoing, population growth has much bearing on a
country’s social welfare system in that the state must be able to
meet the needs of its citizens within its productive capacities.
When the first edition of this book was written, the country’s
population was about 9.5 million people. It has now increased to
13 million. But what is worrying is that this population growth is
one which can be described as of low quality, because most of
the children who are born are either stunted or malnourished.
Thus, their future prospects are already blunted by both their
negative anthropometric indicators and the deplorable socio-
economic conditions in which they are born. These twin factors
will surely close off future prospects for such children to
contribute positively to Zambia’s development as they are more
likely to end up as a burden to the country. This is because they
may have not accessed high quality education, advanced health-
care and a stimulating environment, necessary for optimum
cognitive development. What is equally disconcerting is that the
majority of Zambian women have about six children - a number
which has barely shifted in decades and which when contrasted
with global trends shows that fertility around the world has fallen
from five to two and a half children since 1950. Due to this, the
Zambian population is projected to triple by 2050 according to
the United Nations Population Division. This is because close to
five hundred thousand babies are born in Zambia annually. In

f                                                    Social welfare in zambia


Lusaka alone, about fifty babies are delivered every day at the
University Teaching Hospital (UTH) - sometimes seventy or
more. It is indeed prudent to ask the question: if Zambia can
barely feed 13 million people so how will it cope in the future?
(Walsh, 2011).
    Upon closer scrutiny, it can also be speculated that the
majority of the Zambian women with six or more children are
poor, illiterate and with less likelihood of raising their children in
environments that will nurture and stimulate them to become
future productive citizens. By and large, these women (and
obviously their partners, if they have not abdicated their parental
responsibilities) do not have the means to feed or educate their
children. In the end, many of the children born from such
mothers will swell the legions of street children and urchins,
uneducated and unemployable youths, and orphans and
vulnerable children. Zambia will not, like in other parts of the
world, benefit from a youth dividend. Large numbers of young
people in any economy are first and foremost consumers and not
producers, and remain dependent on societal systems, for
example, the family or government agencies. However, if they
are in school or tertiary institutions or engaged in productive
activities, then they could offer the country a youth dividend. But
this can only be attained if they contribute substantially to the
economy through skills, innovation and productive work. In the
Zambian case, the situation is opposite, as young people are not
productive due to lack of education or skills, among others. They
only contribute towards the country’s high dependency ratio. The
other striking feature and one which is demoralising is that these
parents are much younger than my generation. These are young
people who should have planned better for their children. They
should have been equipped by the government and other role
players of civil society, with social skills, so as to empower them
to negotiate better around myths, taboos and retrogressive
cultural practices. It is frightening that what obtained in the
generation of my parents (born in the 1940s), where an average
family numbered eight children is still replicated by Zambians

who are much younger than my generation (of the 1960s), in this
day and age. When taking the above into consideration, it means

and health. What remains clear in this matter is that large

those which create vulnerable children in the country - whether
orphans, street children or those affected and/or infected by

being charismatic (which in Zambia basically means being a loud
mouth), would put Zambia on a firm footing in regard to matters
of national development and prosperity. Under Mwanawasa the
standards of living of most Zambians had begun to significantly
improve. Foreign Direct Investment (FDI) had also picked up
and trickled into Zambia at a steady rate. Mwanawasa also
relentlessly    tackled    corruption     and    fought     against
maladministration and made sure that his predecessor Frederick

Probably, due to the simple-like life and backwardness in the

individuals play similar roles within society. People feel bonded
to the group in less complex societies because everyone in the
group is so similar. On the other hand, in societies (such as
industrial societies) where organic solidarity (also called
contractual solidarity) exists, individuals play a great variety of
different roles, and unity is based on role differentiation and not
just similarity. A society built on organic solidarity is cohesive
because of its differentiation. Roles are no longer necessarily
interlinked (Andersen and Taylor, 2008:130). From what is

themselves with people who think like they do (usually not

    As I have stated on different occasions, it was the students of
the University of Zambia (UNZA) who had ignited the uprising
which shook Kaunda’s one-party system to its very foundation.
This revolution was the first of its kind since Zambia’s
independence in 1964. The initial food riots of 1986 were just
what they were: food riots and they had been confined to the
Copperbelt region of Zambia. The 1990 revolution was not just
about high food prices, but a spirited challenge against Kaunda’s
rule. For the first time, the students of UNZA demanded regime
change. On 27th June 1990 (a day before my birthday) I was
detained together with thirty other students - one of them was my
immediate elder brother.15 At the time, Zambia had been under a
state of emergency since independence. Our detention was
specifically executed under the oppressive Preservation of Public
Security Act, which enabled the security forces to detain
Zambians for a period of ninety-days without any formal charges
being laid by the state. The right to Habeas Corpus would only
come into effect after the ninety-days. Therefore, the
Preservation of Public Security Act was a vital deterrent to any
would be champion of freedom and democracy. After three
months, an individual would have effectively been “sorted out”
by the one-party state security apparatus. I was a young man of
21 years when these events took place and I turned 22 years in
detention. Most of my colleagues were also in their twenties and
our years of study ranged from second to fourth year. We were a
mixed group in regard to the disciplines of study, but one
commonality was that the majority of us were children of mostly
civil servants and officials of parastatal organisations, or those
who had retired from the former.

detention, the late General Christon Tembo and other alleged
coup plotters of 1988 were also detained at the same facility,
though we were never brought into contact. What had led us to
this prison were indeed the riots that the students had triggered
and which had been brought about by the increased price of the

on administrative and military personnel who were responsible
only to the ruler. Neo-patrimonialism, which is a modern form of
the traditional patrimonial form of rule, is a mixed system. Here,

elements of patrimonial and rational-bureaucratic rule co-exist
and are sometimes interwoven. In a patrimonial system, all ruling
relationships, both political and administrative, are personal
relationships. There is no difference between the private and
public spheres (Erdman, 2002).
    By contrast, under a neo-patrimonial system, the
differentiation of private and public is recognised (at least
formally), and therefore it can be referred to publicly. In practice,
however, the private and public spheres, often, are not separated.
That means two systems, the patrimonial system of personal
relationships and the legal-rational one of the bureaucracy, exist
side-by-side (Erdman, 2002). De facto, however, that is not so
because the patrimonial system penetrates the legal-rational one
and deforms the logic of its functions. Part of the patrimonial
side of neo-patrimonialism is clientelism, which develops into
extended networks of political clients. Political clientelism is
about exchanging or arranging certain services and/or resources
in return for political support, such as votes. Unlike patrimonial-
type clientelism, neo-patrimonialism focuses less on direct
exchanges between patron and client, and more on the
“arrangement” of services and resources (Erdman, 2002). All
these events which have taken place since Sata became president

                        INTRODUCTION

Social welfare is a crucial vehicle for any country’s progress and
prosperity. It guarantees some form of protection to those
vulnerable members of society, who cannot care for themselves
and through no fault of their own, by establishing mechanisms
that support them and allow them to address their problems with
the aid of the state. A country’s social welfare system will in
most cases mirror its social milieu which also encompasses,
among other things, the following: social and economic
institutions, cultural and political forces, and the physical
environment. Social welfare has emerged in modern times as a
society’s way of mitigating the dire circumstances that render
people vulnerable in a short space of time, for instance, the loss
of employment or livelihoods. It also has a long-term approach to
social maladies by paying attention to individuals who face life-
long challenges due to their weak standing such as those afflicted
by chronic conditions of ill-health or severe disabilities. Modern
societies have also made governments the foundation of public
social welfare for citizens. Indeed, one of the expectations of tax
paying citizens (and those who are not able to pay taxes through
no fault of their own) is that the state assumes the role of social
protector if so required. Therefore, nation-states around the
world are duty bound to ensure the maintenance of minimum
acceptable conditions of living for their citizens and which
reduce situations that give rise to social stress and human
deprivation. Thus, democratic, effective, functioning and caring
states will be preoccupied with the task of guaranteeing an
acceptable threshold of human existence for their citizens.
Usually, this duty entails providing basic social services such as
clean water, sanitation, housing, health-care and education - at
least, at the barest minimum to the citizenry.
    Notably, states cannot do this alone and require partnerships
from other critical role-players such as the private sector, civil
                                99
fNdangwa Noyoo


society organisations, religious bodies, and organised labour.
Nowadays, an integrated and holistic social welfare approach
that seeks to meet people’s needs is favoured, due to its
comprehensiveness in tackling human want and deprivation. The
foreground to the above is the evolution and eventual
harmonisation of various efforts aimed at raising the quality of
life of the people around the world. In past eras, governments,
voluntary associations and charitable organisations dominated
this sphere as they were perceived as the main actors in social
welfare provision, for example, in the post-Second World War
context of Europe and post-colonial Africa, especially during the
1960s. Yet, in contemporary times, international Non-
Governmental Organisations (NGOs) and local NGOs are also
regarded as crucial players in this arena. What is irrefutable,
however, is the fact that societies which value their citizens, have
sought from time immemorial, ways and means of looking after
their less advantaged members. The notion of looking after the
chronically sick, the poor or people with disabilities, was at the
heart of the social mores of pre-industrial societies, however
imperfectly this may have actually been achieved in practice. In
effect, the origins of modern social welfare systems have their
historical roots in such arrangements. Though some societies
made dramatic transitions from communalism to industrialism,
many still continue to be subsumed under traditional modes of
existence. For centuries, social welfare in the developing world
or in Least Developed Countries (LDCs), has maintained its
communal and informal character, whereas in developed
countries, social welfare became more formalised with the
passage of time. In the northern hemisphere, especially from the
mid-eighteenth to the nineteenth centuries, social welfare rapidly
changed into a more formalised institution. Thus, there was a
clear shift from the family to the state in matters of care for the
disadvantaged.
    In order to appreciate the development of social welfare, it is
equally important to take cognisance of the different social and
political contexts where it had taken root. For instance, it is

                                100
f                                                  Social welfare in zambia


pertinent to recognise the unique challenges of African countries
where governments are confronted with huge financial
constraints, minimal social amenities, high population growth
rates which outstrip available resources, and above all, endemic
poverty. Here, social welfare is presented with multiple
dilemmas. The former underlines the precarious environment in
which social welfare interventions are located. In Africa, scarcity
defines every aspect of life. Thus, the need for innovative,
unorthodox and indigenous-based types of interventions that are
relevant to such environs is ever present. In this context, social
welfare may erroneously be thought of as not being an arm of
development, for example, but it could be seen as impeding other
national development priorities, such as economic growth.
However, a fixation on just economic growth may lead to growth
without well-being, whereby, despite scoring high rates in the
Growth Domestic Product (GDP) and accruing high balance of
payments, among others, a country may be dogged by extreme
incidences of poverty and inequality; unemployment,
malnutrition, ill-health and illiteracy. Such growth is inimical to
human and social development, and will also impede
advancements in the area of social welfare.
    It must be borne in mind that Zambia is in Africa - which is
also the poorest continent on earth. Africa faces huge challenges
in meeting the needs of its people and what this means is that
African states do not have the luxury of a laissez faire approach.
Rather, they should consciously seek after modalities that raise
the quality of life of the people, whilst being driven by a strong
commitment and zeal to liberate their people from penury and
human deprivation. It must also be pointed out that social
welfare’s efficacy hinges on the nature and character of the state
in which it is functioning. In Africa, where certain states qualify
as failed states, for example Somalia (which has not had a
functioning central government since 1991), social welfare
becomes an informal and survivalist initiative. Such a situation
not only poses huge challenges to the development of and the
provision of social welfare services, but also creates extremely

                               101
fNdangwa Noyoo


negative conditions which in turn exacerbate social problems.
Policies and legislation that should be used as instruments to
raise the quality of life of ordinary people may be ineffectual or
in extreme cases, not there at all. The outcomes of dysfunctional
or inexistent states in Africa are manifested in negative living
conditions for example, high maternal and infant mortality rates,
stunted growth, social dislocation, chronic poverty, and so forth.
In most instances, people in Africa have only been able to
survive, through their sheer will and tenacity. For this discussion,
the point of departure is what is referred to as a caring state and
the levels to which it can entrench social welfare in society.
    A caring state is one that is receptive to the idea of meeting
the needs of its citizens as its primary objective. In this case,
citizens come first in all its endeavours. It is only a caring state
that will support citizens by creating conditions that will enable
social welfare to play its preventative, ameliorative, restorative
and developmental roles. Caring states are thus distinguished by
their legitimateness, which is also dependent on the people’s
popular will. Caring states have governments which are chosen
by the people and which enable citizens to ensure that their
governments respond to their plight, by being democratically
accountable. Governments will thus be compelled to act
accordingly because they owe their existence to the people. This
is not the same for an uncaring state. An uncaring state is one
that is characterised by its illegitimacy and lack of democratic
accountability. It is a state which has a government which has
not been constituted by the popular will of the people, through a
free and fair election for example. An uncaring state would have
been usurped by few elite individuals or hijacked by an elite
segment of the population, whilst claiming to represent the
majority. In cases where change of government is only through
military coup d’états, civil wars and other forms of insurrection
(which seem to be the main mechanisms in most of Africa),
social welfare responses may be doomed to failure. Rulers of
such states may not see the need to serve the people, but see
themselves as demi-gods who need to be served by the people.

                                102
f                                                   Social welfare in zambia


Invariably, social problems flourish in such settings because
leaders do not represent the aspirations of the people, as they
have imposed themselves on the masses. Thus, instead of
championing better ways of meeting the needs of the people, for
instance, they will be prone to pillaging state assets for personal
use. There is no accountability in an uncaring state and
institutions are personalised by a small group of individuals who
champion the interests of the ruling class. Since these regimes
usually have corrupt leaders at their helm, they are not supportive
of the concept of social welfare because it diametrically differs
with their self-serving philosophical orientation. Since social
welfare’s philosophical leanings are of an altruistic nature, an
uncaring state will definitely eschew its mission. This discussion
contends that Zambia seems to fall in between a caring and
uncaring state, where attributes of the two remain intertwined.
    Social welfare resonates with Africa’s traditional past and
epitomises the communal and reciprocal ties that bound various
African communities together before the advent of colonial rule.
Africans were, in many cases, attached to each other through
reciprocal relations of social support embedded in cultural norms
and practices. Africans were thus widely renowned for their
historic generosity in regard to those who faced difficulties.
Many African values, customs, idioms, poems, songs and riddles
attest to this. In these times, it was considered taboo to ridicule
the infirm, elders or people with disabilities. Mendicants were
quite rare in the village environment due to the fact that families
were obliged to look after their less fortunate members. In such
circumstances, widows, orphans and the aged were cared for by
their relatives. The family was the first form of defence against
want and deprivation as it provided for the emotional, material
and spiritual support of its members. Mutual-help reinforced
family solidarity as adults provided for the needs of children
whilst the elderly socialised them. Children supplied labour and
companionship to parents and grandparents (Boon, 2007). A
family was distinguishable from the presented Western model of
a nuclear family consisting of a father, mother and children. In its

                                103
fNdangwa Noyoo


African form it consisted of grandparents, uncles, aunts, cousins,
nephews and nieces. This is known as the extended family and it
acted as an organic social security system that provided
protection to its members. It was and still is (in the case of
informal social welfare) based on the principles of solidarity and
reciprocity, and dependent on members supporting each other in
difficult circumstances.
    In the past, people lived in closely-knit groups usually linked
by kinship ties and </span><span data-dcnode-id="138" instrument_node="">accepted obligations of mutual support. The
arrangement of families into clans was the most common feature
of the period and clan members were all kinsmen as they
believed that they were all descended from a common ancestor
(Roberts, 1976). The traditional society did not encourage
individualistic tendencies. Traditional life was inclusive and had
a web of relationships of mutual responsibility that were widely
spread (Kaunda and Morris, 1966). It is important to point out,
however, that this situation was not unique to Africa alone at the
time, but was widespread in Europe, Asia and the Middle East.
The difference is that some of these areas later industrialised and
eroded their kinship systems, while as in Africa they remained
almost intact even during the first wave of colonisation.
Likewise, social roles in the traditional society were very distinct
in terms of age and sex. In this way, social problems were not
individualised, but seen as emanating from the inability of a
person to perform his or her prescribed roles in the society.
Special emphasis was therefore placed on these roles in so far as
they defined one’s status in society, for instance, the way
teenagers were initiated into adulthood via initiation ceremonies.
However, it must be understood that the traditional society was
neither utopia nor an ideal state. This discussion does not seek an
idealised re-invention of the past, but merely intends to shed
some light on the socio-political and economic conditions that
existed in pre-colonial Africa and Zambia.
    Africa presents a unique case in so far as social welfare issues
are concerned. In many parts of the continent, traditional social
welfare systems still exist alongside modern institutions. This

                                104
f                                                   Social welfare in zambia


can be partly explained by the state’s inability to secure people’s
well-being, due to the continent’s underdeveloped nature - a
chief feature of its colonial inheritance. The former also
contributes towards weakened social welfare systems on the
continent - even though these came into being due to colonial
rule. However, post-colonial Africa’s inability to break out of the
mould of colonial institutions and its failure to recalibrate them,
so that they could adequately tackle the development deficits on
the continent, continues to render many Africans powerless in
matters of development. Because African countries were unable
to discard the colonial social, economic and political templates
that were crafted for them by the colonialists, independence did
not translate into a process of sustained social and economic
development. Zambia, like most of post-colonial Africa, used the
colonial frameworks as building-blocks for a new social welfare
dispensation, after the attainment of independence. Naturally,
Zambian social welfare was modelled on the British system as it
was colonised by this country. In the early years of
independence, former colonial officials and other expatriates
reinforced the colonial legacy through Eurocentric social welfare
models and intervention strategies. Also, since social welfare
services in the colonial era were geared towards safeguarding the
needs of the colonisers and not of the local people, this led to ill-
informed interventions that were mostly not attuned to local
conditions, especially in the first decade after independence.
    Despite the fact that formalised social welfare systems were
inherited from the previous colonial “masters” (in many
instances without much alteration); this form of social
intervention, in a re-fashioned form, has a critical role to play in
resuscitating and sustaining Africa’s development prospects. The
key however, lies in the way social welfare can be reshaped in
order to suit African conditions and thereafter appropriately
respond to the needs of the people. The African family has been
playing decisive roles in lessening the effects of deplorable
conditions in which people find themselves. For example, during
the adverse effects of the Structural Adjustment Programme

fNdangwa Noyoo


(SAP) of the International Monetary Fund (IMF) and World
Bank, from the 1970s onwards, the family stepped into the void
of state inaction. But the family could not adequately play its
traditional and historical roles. This was due to the unfortunate
fact that modernity and urbanisation had already eroded this
institution over the years and also helped to dismantle most of its
value system. The transition from communal life to so-called
modernity was not gradual in Africa, but extremely violent and
dislocating. In most cases, its purported outcomes destabilised
family life and underdeveloped communities. The brutal form
which modernity often took under colonialism uprooted Africans
from their cultures and alienated them from their livelihoods and
ways of existence. The type of colonisation associated with this
type of modernity sometimes obliterated indigenous systems of
knowledge, governance and social organisation, and denuded the
overall consciousness of Africans. Since many post-colonial
governments were caricatures of colonial administrative systems,
they did not attempt to totally transform themselves into motors
of development. In certain cases, they sought to maintain the
status quo. Many governments in post-colonial Africa were
disabled from the beginning, as some of their neo-colonial
functionaries maintained the existing state of affairs. It will only
take a revolutionary and anti-imperialist generation, to effect
fundamental social change on the continent and liberate the
masses from poverty, ignorance, disease and other social
afflictions. If not, then ideas, theories and approaches related to
development and human well-being will continue to be derived
from the former colonisers and their allies. As there was no total
severance with the old colonial order, some African governments
have for many decades remained in a state of paralysis.

The Context

Zambia is a landlocked country situated in south-central Africa,
with an area of 752, 614 km². Zambia’s neighbours are Angola in
the west, Botswana in the south, Namibia to the south-west, the

                                106
f                                                  Social welfare in zambia


Democratic Republic of the Congo (DRC) to the north, Malawi
towards the east, Mozambique to the south-east and Tanzania is
in the north-eastern direction, while Zimbabwe is directly south
of the country. According to preliminary results of the country’s
2010 census, its population stands at 13,046,508, with 49 per
cent males and 51 per cent females. Regional distribution of the
population shows that 7,978,274 people (61 per cent) reside in
rural areas and 5,068,234 (39 per cent) live in urban areas. At the
provincial level, Lusaka, the capital city, has the largest
population of 2,198,996 followed by the Copperbelt at
1,958,623. The Northern Province is the third largest with
1,759,600 followed by the Eastern and Southern provinces at
1,707,731 and 1,606,793 respectively. Exhibiting the lowest
population numbers are Luapula Province, Western Province and
the North-Western Province with 958,976; 881,524 and 706,462
in that order (Central Statistical Office, 2011). The country now
known as Zambia was comprised of two territories of North-
Western Rhodesia and North-Eastern Rhodesia before 1911.
Afterwards, the former territories were amalgamated to form the
colony of Northern Rhodesia in 1924. Before this merging of
territories, the British South Africa Company (BSAC) ruled the
area. At the helm was Cecil Rhodes who was an ardent
proponent of British imperialism. The BSAC was preoccupied
with the exploitation of natural resources and specifically
minerals for export to Britain. It was not concerned with the
development of the area and built only basic infrastructure during
its rule, so as to facilitate the export of the territory’s natural
resources to Britain.
    Zambia was not a homogenous society prior to colonial rule,
but a heterogeneous spread of polities with autonomous
boundaries. Pre-colonial Zambia was initially inhabited by the
San people. Later on, immigrations from the Luba-Lunda
Kingdom resulted in many Bantu ethnic groups settling in
present-day Zambia. Eventually these groups drove out the San
people. Pre-colonial Zambia was always in a state of flux as
there were migrations, inter-ethnic wars and long distance trade

                               107
fNdangwa Noyoo


unfolding in the area. During these times, almost all the different
ethnic groups eked out a living by existing on a subsistence
basis. They gathered fruits, dug roots, hunted, cultivated crops or
in some cases, kept livestock. Land was the most important and
abundant resource that people could access as well as exploit for
their benefit. The main impediment to further commercial
development was among other things, low technological levels.
In the past, different ethnic groups rarely harmoniously co-
existed and usually the weaker ones were susceptible to pillage
from those that were powerful. In order to escape subjection and
plunder, some ethnic groups migrated while others sought
protection from powerful polities that would simply assimilate
them.
    On the eve of colonial rule there existed four well organised
kingdoms namely: the Lozi or Barotse in the west, Ngoni in the
east, and the Lunda and Bemba in the north. These territories
were quite advanced both militarily and politically and their
interactions with the new intruders would vary over the decades
before colonial rule was cemented. They were also powerful and
controlled vast areas of influence where they obtained tribute
from subject ethnic groups. They had fairly sophisticated forms
of political organisation and ruled via centralised and devolved
political systems, through kings, chiefs, headmen and indunas or
councillors. The rulers further played crucial roles in social and
political matters, and were perceived by their subjects as their
custodians because they also allocated land, grazing grounds, and
fishing sites in accordance with the customs of the community.
Furthermore, they arbitrated in disputes and organised the
defence of the group and were expected to be generous lords
(Gann, 1958). Religion also played vital roles in ordering the
lives of most communities during these times. Priests and
priestesses relied upon ancestors to mediate on behalf of the
people, between the spiritual world and life on earth. Descent in
many parts of pre-colonial Zambia was predominantly
matrilineal and was reckoned through the female line. In some
instances, it was patrilineal and determined through the male line

                               108
f                                                  Social welfare in zambia


and to a lesser extent, bilateral, whereby it was defined from both
the female and male lines (Roberts, 1976). In such simple
existence, life revolved around the village. Even though the
forces and relations of production were rudimentary, these
societies were able to harness natural resources for their common
good.
    Between the years 1830 and 1840, profound transformations
unfolded in the area later called Zambia. These were dependent
on three cardinal factors, namely: the migration of powerful
warrior groups from the south escaping the ravages of Shaka’s
wars of conquest; the coming of slave raiders from Zanzibar and,
the arrival of missionaries (Hall, 1965). These forces converged
on Zambia and re-shaped its historical course. Out of the
aforementioned, slave trade emerged as the most dislocating and
debilitating force. The trade in humans claimed countless
victims, leaving many areas bereft of human beings. Payments
for slaves to the local chiefs were in the form of cloths, guns and
gun-powder. The proliferation of guns and gun-powder further
fuelled inter-ethnic wars and led to the demand for slaves by the
Arabs. The migration of ethnic groups from the south altered
both the cultural and linguistic patterns in the western and
eastern parts of the country. Eastern Zambia was occupied by an
Nguni speaking group known as the Ngoni, led by Zwangendaba
and the west was conquered by a Sotho group that was led by
Sebetwane. The arrival of European colonisers was the most
significant force to envelop pre-colonial Zambia. Colonial rule
was inadvertently aided by the penetration of the interior of
central Africa by missionaries such as David Livingstone.
Livingstone encouraged the subsequent immigration of other
missionaries, traders and administrators into central Africa. The
Paris Missionary Society (PMS) which gained a foothold in
Barotseland was the first organised body to settle in the country
and was followed by the London Missionary Society (LMS) -
that made an in-road into Zambia from the north. These Christian
organisations were Protestant groups and would convert Africans


                               109
fNdangwa Noyoo


into this form of Christianity. Church sermons and education
curricula served as vital avenues for this endeavour.
    Missionaries were also the initiators of social welfare
activities in colonial Zambia. Their motives were very different
from those of the colonialists, as religion (or Christianity) was
the major driving force behind their efforts. After colonial
occupation, the colonial authorities’ efforts in this arena were
piece-meal and were meant to maintain the colonial set-up where
Africans would remain subdued. They were not oriented towards
developing the locals. When Zambia attained independence in
1964, there were attempts to re-tailor social welfare approaches
to the needs of the Zambian people. The first African
government to take over from Britain embarked on an ambitious
and fast-paced programme of action that aimed to elevate the
standards of living of the majority of the people who were
confined at the time to illiteracy, disease and poverty. Due to the
colonial authorities’ neglect of the plight of Africans, through
their policies of racial segregation, the new post-colonial
government was faced with a monumental task. It took up the
challenge and even managed to make huge strides in developing
health-care and education infrastructure, and heavily invested in
social development. However, the economy was heavily
dependent on copper as the main export commodity.
Development programmes - at least in the decade after
independence - could be financed from the profits of copper
sales. At the time, the ideology of the ruling party, the United
National Independence Party (UNIP) dictated the pace as well as
the content of development. Major policies in the social and
economic arenas were brought in line with the ideology of
Humanism. This ideology sought to establish an egalitarian and
non-racial society based on its principle of “man” being the
centre of all human activities. It was for this reason that social
services were free and universal to all citizens in the decades of
the 1960s, 1970s and early 1980s. The government also placed
great emphasis on community development in the same decades
as an important arm of social welfare.

f                                                  Social welfare in zambia


    From the mid-1980s to the 1990s, the living conditions in the
country plummeted to low levels, thus making the lives of many
Zambians extremely difficult. Even though standards of living
had been slowly declining from the 1970s, this period witnessed
an immediate sharp declining in the living standards of most
Zambians. By the end of the twentieth century things were
simply deplorable. As the country’s economy continued to
plunge further downhill, Zambia’s politics also changed. A new
political and economic order, which was neo-liberal in content
dawned on Zambia. This situation came to pass after the UNIP
government and the first president of Zambia, Kenneth Kaunda,
were defeated at the polls in 1991 by the Movement for
Multiparty Democracy (MMD) of Frederick Chiluba. From
thereon, the new government would strictly implement economic
reforms as prescribed by the World Bank and the International
Monetary Fund (IMF). Unfortunately, the MMD government did
not effectively deal with the social costs of adjustment and hence
such economic reforms only translated into heightened social
dislocation exemplified by huge job losses through
retrenchments, and high levels of poverty and chronic hunger.
There was also less accountability on the part of the government
and its officials as corruption was left unchecked. From 1991 to
about 1996, the ruling MMD rushed through the liberalisation of
the economy and abolished subsidies in key areas of health-care,
food, transport and education without providing sufficient safety-
nets for the casualties of the economic restructuring programme.
The attendant privatisation of state firms was also riddled with
serious anomalies and lacked critical ethics.
    The SAP was the key policy imperative during the 1990s. In
spite of this, social ills were amplified exponentially in the said
period. By the beginning of the new millennium, Zambia’s
economic prospects were beginning to brighten once more after a
grim period of almost 30 years. The copper prices were on the
upswing and the government began to take concrete steps to
arrest the extreme poverty levels in the country. New social
welfare measures such as the cash transfer scheme were

                               111
fNdangwa Noyoo


instituted, (albeit under the patronage and guidance of donors).
Discussions were also underway for the introduction of broader
social security measures in the country. By 2005, when the
country was ruled by a new president, Levy Mwanawasa, the
country’s economic growth hovered around 6 per cent per annum
and inflation had drastically reduced to single digit levels.
Mwanawasa’s administration also began to approach the
restructuring of the economy in a more sober manner. Despite
this, the economic fortunes began to dim with the onset of the
global financial crisis towards the end of 2008. The resulting
effects of this global downturn were extremely dire: the price of
copper again plummeted, mines and factories shut down and
retrenched workers and people were again struggling to make
ends meet. Notwithstanding, it seemed Zambia weathered the
financial storm. After Levy Mwanawasa passed away in 2008,
Rupiah Banda was elected as the new president of the country on
an MMD ticket. He would sign significant bilateral co-operative
agreements with China which led to the resuscitation of the
mines, which had been abandoned by certain investors during the
global economic crisis. In the process, some jobs were
reactivated whilst others were created, thus at least guaranteeing
some Zambians steady income vital for sustaining their
livelihoods. But the problem in Zambia still remains that of
economic growth without human well-being. Only a minority of
political elites seem to be benefitting from the growth in the
economy, whilst the majority of Zambians continue to wallow in
abject poverty.
    Given the foregoing, it can be argued that the social welfare
system and all the relevant players in the welfare arena are at a
cross-roads. The international global recession has again
reminded some Zambians of the economic crisis of the 1970s
which was triggered by external factors and accentuated by
internal bad planning. It also places under the spotlight the
continued dependence of the country on copper, whose revenue
is critical for Zambia’s social welfare initiatives. The reality is
that copper prices will continue to be unstable and therefore the

f                                                  Social welfare in zambia


call for the diversification away from copper needs to be
embraced by all Zambians. There is a need to bolster the
economy through sound investments in agriculture, tourism and
manufacturing so that the country generates revenues in non-
mining areas. This will lead to a sustainable way of funding
social welfare endeavours. Over and above these moves, the
international financial crisis has also shown the need for both the
government and civil society to arrive at potent and
developmentally-oriented social welfare efforts. Such measures
have to be innovative in order to effectively respond to the off-
shoots of the harsh economic austerity measures of the past and
the just ended global economic downturn, and even future
economic shocks.

Scope of the Book

This book explores the genesis of social welfare in Zambia, and
traces its origins from the pre-colonial period, the colonial era,
and throughout the post-colonial period. The first chapter
introduces social welfare and the context for discussion. Chapter
two brings to light theoretical issues that generally relate to
social welfare. It pays attention to concepts that are used in the
book and shows how social welfare emerged in other societies,
primarily Britain - given the fact that Zambia was also a British
colony and that this country was a pioneer in this area. Chapter
three traces the development of social welfare in colonial Africa.
Chapter four then discusses the historical roots of social welfare
in Zambia. It highlights early social welfare activities in the
colonial set-up that were propelled by the missionaries, mining
companies and the colonial authorities. Chapter five then
examines social welfare in post-colonial Zambia after the
country had gained independence from Britain in 1964. It shows
how social welfare concerns have evolved in the four decades
Zambia has been independent and under different political
administrations. Chapter six examines poverty and inequality in
Zambia. It also examines the phenomenon of social exclusion in

fNdangwa Noyoo


the country. Concepts and theoretical constructs relating to the
former are also put forward. Chapter seven concludes the book’s
discussions and reflects on future prospects for social welfare in
the country.

f                     CHAPTER TWO
            UNDERSTANDING SOCIAL WELFARE

The purpose of this chapter is to provide greater conceptual
clarity on the subject matter of this work as well as anchor the
book in a theoretical framework. The chapter does this by
critically interrogating the concept of social welfare. It also
highlights state, private and non-state interventions, which are
closely associated with social welfare, in order to illustrate their
role in the forms of social provision in a country.

Pre-Colonial Africa and the Genesis of Social Welfare

As noted in the previous chapter, every society has certain
mechanisms of protecting its disadvantaged members from
adversities. However, societies are not only concerned with
meeting the needs of disadvantaged individuals. They also have
an interest in the general well-being of all their members,
including those who are not experiencing social problems.
Various societies, especially in the pre-industrial era, had
attended to the plight of individuals through family structures.
Due to this, indigenous systems of social welfare and social
protection existed in Africa before the advent of colonial rule.
Evidently, colonialism had led to the usurpation of indigenous
systems by those of Europeans. In certain instances, the
indigenous systems were wiped out altogether. Even though
social welfare systems existed in pre-colonial Africa, the
institutional arrangements for such were informal, partly
continuing to endure in this form in contemporary times. As will
be shown in the next chapter, social welfare that was exported
from Europe - by different colonial administrations - was formal
and Eurocentric. In Zambia, the British experience was imposed
upon the local people and their indigenous systems. In another
light, it is important to mention that poverty, like in other
societies, existed in pre-colonial Africa. The poor were thus a

                                115
fNdangwa Noyoo


population of concern to pre-colonial African communities. In
the main, social welfare actions in pre-colonial Africa arose out
of the need to tackle poverty, vulnerability and human
deprivation.
    It is important to note that even though pre-colonial African
polities were mostly egalitarian, they were not in all cases
classless societies. Some were even hierarchical as well as
stratified. For instance, there was the ruling class which
controlled the political and economic institutions of certain areas.
In kingdoms,28 these elites were mainly in the form of royal
establishments and/or aristocracies. People with certain skills or
trade such as iron-makers, farmers, crafts-men, herbalists,
miners, mid-wives, priests, priestesses and diviners were
accorded special statuses in pre-colonial Africa. Opportunities
for wealth accumulation varied according to one’s place in the
social hierarchy. Therefore, wealth was a common feature in pre-
colonial Africa. Although it was not monetary by definition,
wealth signified an individual’s influence in such societies.
Mainly, wealth was measured in terms of land, livestock,
prestigious titles, skills, wisdom, talent, or the number of serfs,
servants or slaves one had; wives and even children. Wealth was
acquired through birth, talent or as reward for individual bravery
or dexterity. For example, warriors who had exceptionally
proved themselves in battle were rewarded with land or livestock
or elevated to chieftaincy or other high-ranking positions by their
rulers. Conversely, individuals who did not have the above
attributes would surely end up as paupers or nonentities in pre-
colonial Africa. Individuals who were born in certain families
such as those of serfs or slaves, or those who were considered
outcasts would inevitably end up poor. Another category of the
poor was that of people with disabilities or those who were born
with debilitating diseases such as leprosy. In this context, the
extended family or the kinship system looked after the poor.
Commercial transactions or trade at the time were mainly via the
barter system. In certain parts of pre-colonial Africa cowries and
copper crosses were used as currencies in the exchange of goods.

The Evolution of Social Welfare in Europe

The industrial age in Europe threatened existing institutions such
as the family and the landed aristocracy. With industrialisation
also came the rise of the working class and the emergence of new
social needs such as mass housing for this new urban group and
attendant health-care. This placed demands on the state to secure
these people’s livelihoods. It was during this period when
European feudal societies began to be transformed into industrial
cities, that traditional forms of social welfare became ineffectual.
In Europe, the industrial revolution resulted in the
institutionalisation of the residual welfare process that saw a shift
from the family and kin to religious bodies, voluntary
organisations and ultimately to the state. Therefore, social
welfare coverage in Europe developed from punitive measures to
humane responses in regard to human deprivation. Despite this, it
needs to be borne in mind that regulated approaches to human
need preceded the advent of industrialisation and widespread
urbanisation. For example, the English Poor Laws30 which
embodied official attitudes to welfare were instituted in Britain
as series of individual acts between 1572 and 1600, and formally
codified (in what was expected to be temporary legislation) in
1601. These laws nominally extended to every part of Britain and
aimed at a complete and systematic maintenance of the parishes
to which they belonged for all sections of the indigent needing
relief (King, 2000). The Poor Laws were fortified by four central
principles:

   1.   That each parish (and from 1662 some individual townships in large
        parishes) had a duty to provide outdoor relief for those who were
        “impotent” (the so-called “deserving poor” comprising the old, the sick
        and children), work for those who could not find it and punishment for
        those who were able bodied and unwilling to work - the so-called
        “vagabonds” (collectively the “undeserving poor”).

    2.   That local relief needs were to be met by the local tax called the poor
         rate, based upon property.
    3.   That since poverty was a local phenomenon; its relief should be largely
         unfettered by national and regional government.
    4.   That community relief was to be the last court of resort, to be applied
         for and dispensed only where private philanthropies, help from kin and
         individual self-help had been exhausted (King, 2000:20).

    Initially, the state was not the key player in social welfare
matters in Europe but it encouraged efforts from the family,
religious bodies and voluntary associations. The philosophy
informing social welfare was mainly residual and responded to
people’s needs in a pathological way. This meant that those who
were in need were seen as the problem and not casualties of
systemic failures of the economy - or products of social
exclusion - because of lack of opportunities stemming from an
extremely hierarchical society. After enduring for centuries the
residual approach was effectively challenged by the forces of
social change, which brought about a reconfiguration of the
British society. This scenario would later have implications for
social welfare in the British colonies, including Zambia. After
many years of citizens fighting for their rights and after two
World Wars, a good number of European states had to make
crucial compromises to the working class. In Britain, the state’s
response to the needs of the working class and ordinary Britons
gave birth to the welfare state. The welfare state emerged after
the Second World War31 in the wake of the Beveridge Report on
Social Insurance and Allied Services of 1942.32 The Beveridge
Report proposed a mix of universal and comprehensive policies
through which the government became positively responsible for
the promotion of individual welfare.
    The core principles of the welfare state have been
conventionally equated with the “five giants”, on the road to
reconstruction, identified in the Beveridge Report, namely: want,
disease, ignorance, squalor and idleness. This report also hinged
on the following pillars: social security and the personal social
services, the health service, education, housing and employment
policy (Jones and Lowe, 2002). Therefore, a welfare state is a

   2.   By narrowing the extent of insecurity by enabling individuals and

   3.   By ensuring that all citizens without distinction of status or class are

welfare was imposed on its people by European missionaries and
colonial administrators as already mentioned. Secondly, it can
also be discerned that the welfare state is located within the
capitalist economic and state paradigm. It is a response to the
socially negative consequences of the capitalist system. However
and more importantly, the centrality of the role of the state in
social welfare has been a dominant feature in Europe for
decades. Despite the neo-liberal attempt in the 1970s to roll back

located a consistent role for the state to mediate the worst effects

welfare state is at the heart of the capitalist system - with its neo-

for the removal of the state from this equation, since the end of
the Second World War. This can be contrasted with sub-Saharan
Africa or the rest of the developing world, where states were

Unpacking Social Welfare

There are many definitions of social welfare underlined by the
ideology and intellectual tradition of those who are defining the
concept. The historical and institutional context in which social
welfare emerged is paramount to the task of defining what social
welfare is. Social welfare is also shaped by cultural, political and
economic processes. An extensive literature review revealed that
the bulk of definitions of the term are from a Western perspective
- this, in reference to the formalised version of social welfare.
Such conceptualisations of social welfare are also a direct
product of colonialism. Even in Zambia, the formalised version
of social welfare remains a legacy of colonialism.

Three aspects seem to permeate definitions of social welfare:

    1.   Social welfare includes a variety of programmes and services that
         result in some type of client-specific benefit.
    2.   Social welfare, defined as a system of programmes and services, is
         designed to meet the needs of the people. The needs to be addressed
         can be all-encompassing, including economic and social well-being,
         health, education, and overall quality of life, or they may be restricted,
         targeting one issue.
    3.   The outcome of social welfare policy is to improve the well-being of
         individuals, groups and communities (Colby, 2008:116).

    The term social welfare, then, refers to the full range of
organised activities and voluntary agencies that seek to prevent,
alleviate or contribute to solving a selected set of social problems
(Ambrosino, et al., 2008). The operative word here is
“organised” and thus this makes social welfare take on its formal
character. For this text, social welfare is taken in its holistic form
which denotes cultural, economic, social, political and
psychological well-being of a nation.

Classifications of Social Welfare

Given its complexity, social welfare has generated much debate
within numerous scholars and international organisations. Some
of the understandings about this issue have been classified as
welfare regimes, approaches, ideologies or models. It must be
noted that these are merely representations of ideal-type
taxonomies which involve developing ways of classifying a
country’s welfare processes, comparing quantitative aggregate
data relating to the timing of national legislation and welfare
expenditure. They are also frameworks that specify key features
of different kinds of welfare systems (May, 2003). Also, they are
useful heuristic devises through which the impact of
characteristic “bundlings” of institutions and behaviour may be
assessed. Although the foci of regime typologies will vary, all of
these approaches share the assumption that institutions may be
seen as “intervening variables” that mediate between assumed
causal factors and their effects (Crompton, 2006). There is need
for caution though, in that typologies may be problematic
because parsimony is brought at the expense of nuance, but
especially due to the fact they are inherently static. They provide
a snapshot of the world at one point in time and do not easily
capture change or the birth of new institutional forms of welfare
provision. Typologies of welfare regimes are therefore context
and history specific (Esping-Andersen, 1999).33

fNdangwa Noyoo


    Although differing typologies can be found in the literature,
until recently the most influential were variants that were
advanced by the American writers Wilensky and Lebeaux in
Industrial Society and Social Welfare. Writing in the wake of the
post-Second World War settlements in 1958, they distinguished
two “models of welfare”: the “residual”, based on the principles
of economic individualism and free enterprise, and
“institutional”, based on the notions of security, equality and
humanitarianism (May, 2003:21). For Wilensky and Lebeaux,
the residual formulation is based on the premise that there are
two “natural” channels through which an individual’s needs are
properly met, namely the family and the market economy. The
authors go on to point out that the two institutions are the
preferred structures of supply, but sometimes they do not always
function adequately. When this situation takes place, the idea is
that a third mechanism of need fulfilment is instituted, namely,
the social welfare structure. The notion behind the residual
model is that, although society should help in emergencies,
people in need are responsible for their own problems and should
solve them with minimal state intervention. The residual
perspective prescribes short-term, stop-gap welfare measures that
last only until the family or market economy can resume their
functions. A major criterion is whether people earn more than a
set level of income and possess assets valued above a certain
amount. Therefore, in order to access a certain service they will
be obliged to undertake a means test that will establish whether
they are eligible or not, based on their income levels. The means
test aims to ensure that applicants do not get more help than they
should (Wilensky and Lebeaux, 1958).
    The foregoing view of social welfare is set within a wider
model of society and state which seeks to explain the formation
of social structures in all societies and is often referred to as a
convergence theory. It is a functionalist approach which proposes
that the most important factor influencing the development of
social structures and social institutions is neither political
consensus nor political conflict. Rather, it is the development of

to a moral level stressing their role in motivating altruistic

argued that social welfare was much more than aid to the poor
and in fact represented a broad system of support to the middle
and upper classes. In his model, social welfare includes three
separate but very distinct facets: (i) fiscal welfare - tax benefits
and supports for the middle classes; (ii) corporate welfare - tax
benefits and supports for businesses; and (iii) public welfare -
assistance to the poor. He argued that social welfare reflects an
institutional perspective (Midgley, 2003; Colby, 2008). T.H.
Marshall also made certain propositions regarding social welfare.
Marshall’s seminal approach to citizenship sees state
involvement in social welfare as developing from a consensus

state provision of welfare between the middle class and the

Karl Marx on Capitalism and the Welfare State

Pierson’s (2006:12-14) examination of capitalism and the
welfare state is instructive. He notes that the radical divergence
between Marx and classical political economy lies not in his
view of the relationship between capitalism and the welfare-
securing state, but in his account of the (ever more acute)
inability of capitalist economic organisation to secure “genuine”
individual and social welfare. At the heart of Marx’s critiques of
capitalism were the basic claims drawn from classical political
economy: first that capitalism is an economic system based on
the production and exchange of privately owned commodities
with an unconstrained market; and secondly, that the value of
any commodity is an expression of the amount of labour
expanded on its production. Pierson (2006) further observes that
on these premises, Marx develops an account of capitalism as a
necessarily exploitative and class-based system, one in which
unpaid labour is extracted from the sellers of labour power by the
owners of capital under the form of a “free and equal exchange”
in the market place. The third element that Marx derives from
classical political economy is the claim that capitalism is a
dynamic system in which the competitive search for profit and
responses to the long-term tendency for the rate of profit to fall
lead to intensification of exploitation and the heightening of class
conflict. In summary, Pierson (2006) notes that the state under
capitalism might intervene in the reproduction of social relations,
but it could not (1) intervene in such a way as to undermine the

logic of the capitalist market economy; or (2) act against the long
term interests of the capitalist class.

Social Welfare as a Motor of Development

The idea that that social welfare has a crucial role to play in
overall development goes back to the first International
Conference of Ministers for Social Welfare at the United Nations
in 1968. According to this concept, social welfare shares the
equal status with other sectors of the economy in the march
towards social progress and development. It is predicated on the
maximisation of human potential and based on the mobilisation
of all segments of the population for the resolution of social
problems and the attainment of social progress (United Nations,
1986). As an organising framework for people-oriented
development, developmental social welfare is under propped by
such development objectives as: enhancing the well-being of
people by raising their level of living; ensuring social justice and
the equitable distribution of national wealth; and strengthening
the capacity of all people to reach their peak as healthy, educated
citizens, participating in and contributing to development (United
Nations, 1986). In addition social welfare plays developmental,
preventive and remedial functions. The developmental function
embodies fundamental recognition for the development of human
resources. This includes strengthening family life and preparing
people, especially children and the youth, to improve their own
lives as they contribute to national development. Through the
preventive function, social problems are anticipated and
provisions made to deal with them, thereby reducing the need for
remedial investment. Lastly, the remedial function makes
provision for those who, through such dislocation or other
pressures, have been made dependent on the community (United
Nations, 1986).

Examples of Different Models of Social Welfare

For purposes of this book, the Cuban and Nordic models of
social welfare will be examined. This selective appraisal is
undertaken in regard to these models’ potential lessons for
Zambia.

1. Cuba’s Social Welfare System

Cuba has a socialist centralised social welfare system where all
activities fall within the ambit of state control.34 Cuba had
already laid the foundation for a welfare state in the 1930s which
was consolidated and significantly expanded in the 1960s and
onwards. It was a pioneer in the development of social insurance
