fNdangwa Noyoo


(respectively in the 1920s and 1930s) in Latin America (Mesa-
Lago, 2004). Following the revolution of 1959, the government
of Fidel Castro centralised every facet of the Cuban economy
under state ownership and stewardship. Since the revolution,
Cuba has staunchly advocated an ideological stance broadly
characterised by collectivism in the ownership of the means of
production, centralism in the decision-making process,
egalitarianism in the distribution of goods and services, moralism
in the use of conduct of foreign policy. In addition, Cuba’s
commitment to social justice produced a distributive equality
with few parallels (Mesa-Lago and Roca, 1990).
    Several years later, after the revolution of 1959, among the
crucial tasks that were undertaken were:

    the formation of a communist attitude towards work and social property,
    which required constant struggle against selfishness, individualism,
    personal ambition, ostentation and other remnants of the past. In contrast,
    the new socialist values to be affirmed and fostered included co-operation,
    sacrifice, modesty and above all conscience. The model citizen was to be
    patterned after Enersto “Che” Guevara whose life of voluntary work,
    ascetic habits and internationalist activity is eulogised in the political
    education of students in Cuba (Mesa-Lago and Roca, 1990:101).

    All social services are universal in Cuba and they have
remained so for the past 50 years. Cuba boasts of a
comprehensive and extensive social welfare system with
universal coverage in education, health-care, social security
pensions, social assistance and housing. The education system is
owned, managed and financed by the government, which trains
and hires all personnel (private teaching is banned). In 1989,
university professors and physicians were at the top of the salary
scale and teachers earned adequate salaries (Mesa-Lago and
Vidal-Alejandro, 2010). The state owns and operates all health
through a nationally integrated public system that employs all
personnel and bans private practice. During the first three
revolutionary decades there was an impressive expansion in
physicians, half of whom were family doctors in
neighbourhoods, as well as in hospital beds and real expenditure

per capita (Mesa-Lago and Vidal-Alejandro, 2010). In the early
years of the revolution, a new unified and state-managed pension
was established, increasing labour force coverage from 63 per
cent to 91 per cent. In 1989 the Cuban pension system had wide
coverage and generous entitlements, with very low retirement
ages (55 for women and 60 for men). Although meagre, pensions
were supplemented by social protection networks: subsidised
prices for rationed goods, free health-care services, free or low-
rent housing and inexpensive utilities (Mesa-Lago and Vidal-
Alejandro, 2010).
    State-provided social assistance protects the elderly, people
with disabilities, single mothers, and parents of deceased workers
and pensioners who receive low benefits. Cuba has not
performed well in the housing sector. Ill-conceived housing
policies, combined with population growth in the early years of
the revolution as well as damage from hurricanes provoked a
growing housing deficit. The problems were exacerbated by
virtual state monopoly on building dwellings and associated
activities. In 2008, Cuba had the highest allocations for social
services within Latin America totalling 34.7 per cent of GDP and
52.6 per cent of obtaining budgetary expenditures, the latter
having grown from 29.9 per cent in 1989 (Mesa-Lago and Vidal-
Alejandro, 2010). Although the Cuban social welfare system
registered significant successes, the country also suffered serious
setbacks. This can be attributed to the heavy reliance of Cuba on
subsidies from the former Soviet Union. This is because the
question of sustainability was not addressed earlier on and when
the Soviet Union and former Eastern Bloc collapsed, Cuba was
left in a lurch and suffered economic hardships. From 1991, after
the collapse of the Soviet Union (also known as the special
period), Cubans experienced extreme hardships and had to queue
for every essential commodity as everything was rationed. The
economic crisis deepened in the mid-1990s and almost eroded
the social and human development gains which were achieved in
preceding decades.

Example of a Cuban Social Welfare Programme: Early

In order to illustrate the reach of the state’s coverage and also to
illuminate the scope, and content of social welfare, Early
Childhood Development (ECD) is going to be used as an
example. Cuba provides an excellent example of a population-
wide programme that takes a preventative approach to foster
health, education and development of children from the earliest
stages. A critical player in the country’s successful approach to
maternal health and early childhood development is what Cubans
call Polyclinics. These establishments ensure the integration of
science, knowledge transfer, parent education, primary health-
care and community mobilisation. They are multidisciplinary and
focus on prevention; regularly undertake universal screening
initiatives and strongly encourage immunisation (Senate Sub-
committee, 2008:2).
    Once a Cuban woman becomes pregnant, a number of
specialised services are drawn upon, such as medical genetic
services, the partograme, and maternal homes, as needed. All
pregnant women and new-borns must be evaluated by this
service. In Cuba, the healthy development of all children claims
such high priority that actions are taken from the moment of
conception through to the child entering primary school. Cuba
provides     three     non-compulsory       pre-school    education
programmes. The Cirrculos infantiles are child-care centres for
children between 6 months and 5 years and whose mothers are
working (Senate Sub-committee, 2008). The Educa a Tu Hijo
(Educate Your Child) Programme provides non-institutional pre-
school education for children who do not attend care centres; it is
based on household education (from 0-2 years of age) or is
delivered through informal groups in parks or other nearby sites
for children aged 2-4. Children with special needs receive
individualised attention through the local polyclinic and, with the
support from the Ministry of Education (Senate Sub-committee,
2008).

2. The Nordic Model

Social welfare in the Scandinavian countries should present an
interesting case and valuable lessons for Zambia. Despite being
capitalist countries and following free market enterprise, the
Nordic countries have managed to create egalitarian societies
which are underpinned by strong bonds of social solidarity and
social cohesion. Indeed, what this model does is to debunk the
myth of profiteering and show that the pursuit of profits is not
necessarily incongruent with human well-being, if the generated
wealth is redistributed in a manner that also serves social
purposes and not only personal aggrandisement. In fact, it clearly
demonstrates how both can successfully be pursued concurrently.
Furthermore, this model shows clearly why there is a need for
the state to be at the centre of economic development initiatives
as well as activities that are geared towards social and human
development. The Nordic welfare states are said to be
characterised by full employment, high degree of equality, a high
level of taxes and a high level of public spending on welfare. It
focuses on human-capital formation and high labour-force
participation in regimes with high levels of public intervention.
Universalism has also been argued as a central aspect of the
Nordic countries and universal welfare policies are often
contrasted with selective policies of the residual, means-tested
kind, targeted at the poor (Greve, 2007). What is enlightening
about this system is that it is dependent on high taxes, which the
citizens are willing to pay because the state in the end guarantees
high quality social welfare services and other citizenry
entitlements. This is the unique character of the Scandinavian
model of “social solidarity”.
    In this sense, the provision of high quality social services as
an entitlement of social citizenship has become the main function
of the social democratic state. This contrasts sharply with most
parts of Africa where services are provided as discretionary
benefaction of the state rather than as a right of citizenship. That
is why government services are held hostage by patronage as

those who expect to access such services are often connected to
the ruling elite, whereas the constitution should in the first place
provide for these entitlements for all citizens. The Nordic
countries are able to generate support from various interest

instance in the case of Finland, Vartiainen (2004:212) makes the
point that the Finnish political system was able to generate an
historic class compromise in which a powerful working class, as
represented by the trade union movement and two mass-based
political parties, accepted a concession which protected basic
mechanisms of property rights, capitalist wealth creation and
participation in the internal economy, in return for a reciprocal
arrangement in which the state would use a large part of the
economic surplus to undertake direct productive investment and

The Nordic model is:

    Extremely decentralised and at the same time complex structure regarding
    both regulations as well as financing; high degree of equality; active labour
    market policy with high level of employment (also for women) and low
    level of wage differentiation; high level of taxes; family friendly in the
    sense that the public has been actively involved in delivery of day care for
    children, leave schemes for parents and a high level compared to other
    welfare states of economic support for families with children. The Nordic
    welfare states have further also been described as service welfare states.
    This is especially due to service delivery with regard to delivery of social
    care (children and elderly) and health care service by the public sector.
    Especially family policy has been high on the agenda in the Nordic
    countries (Greve, 2007:45).

Scandinavian countries are renowned for their extensive family

Female employment in these countries is characterised by very

The Determinants of Social Welfare

Social welfare is closely associated with certain social conditions
or states of being. These are elucidated below in order to further
clarify the terrain under discussion.

A. Social Problems

Social problems are the main determinants of both informal and
formal social welfare interventions. They trigger responses from
either the family or state due to their capacity to enfeeble or even
paralyse people’s capabilities. When people are incapacitated by
social problems, they cease to look after themselves as well as
fail to make any meaningful contributions towards the betterment
of society. That is why societies over the years addressed
debilitating social conditions using various mechanisms, for
instance, social welfare. There is no universal, constant or
absolute definition of what constitutes a social problem. Rather,
social problems are defined by a combination of objective and
subjective criteria that vary across societies, among individuals
and groups within society, and across historical time periods.
Although social problems take many forms, they all share two
important elements: an objective social condition and a
subjective interpretation of that social condition (Mooney, et al.,
2010). The objective elements of a social problem refer to the
existence of a social condition. People become aware of social

                                144
f                                                   Social welfare in zambia


conditions, inter alia, through their own life experiences, the
media and education. The subjective element of a social problem
refers to the belief that a particular social condition is harmful to
society or to a segment of society and that it should and can be
changed. By combining these objective and subjective elements,
the following definition can be adduced: A social problem is a
social condition that a segment views as harmful to members of
society and in need of remedy (Mooney, et al., 2010:3). In
traditional Zambian society, social problems were largely seen as
the inability of people to play their requisite roles in society.
Parents were supposed to guide or nurture their children,
husbands were supposed to provide for their wives and children,
whilst children were supposed to obey their parents. When there
was a breakdown in role functions and role specificity, in a
particular household, then it was regarded as experiencing a
social problem or problems.

B. Social Exclusion

Social exclusion can be taken as both a process and an outcome.
It is a process that pushes certain individuals to the margins of
society and prevents their full participation in relevant social,
economic, cultural and political processes. As an outcome, it
represents the status and characteristics of the excluded
individual. Social exclusion status has many dimensions, for
instance, poverty, lack of basic competencies, limited
employment and educational opportunities as well as inadequate
access to social and community networks (United Nations
Development Programme, 2011). Social exclusion is not only
characterised by material deprivation, but by feelings of
inferiority, alienation, loss and shame. Being socially excluded is
both about status and self-perception. Social exclusion reflects
the status of an individual vis-à-vis mainstream society. This
makes it much more relative than income poverty. However,
similar to poverty monitoring, the relative nature of social


                                145
fNdangwa Noyoo


exclusion does not preclude its measurement both in relative and
absolute terms (United Nations Development Programme, 2011).

C. Vulnerability

Vulnerability can be taken as the universal human condition of
being intact but fragile. It is associated with the notion of
“susceptibility” which is the condition of being biologically
weak or diseased, with an increased predisposition towards
additional harm. Vulnerability falls under the principle of justice,
which affords equal protection to all members of society whereas
susceptibility is a determined state of destitution and must be
specifically designated in order to apply to social systems of
targeted palliative treatment (Kottow, 2002). The definition of
vulnerable groups varies between countries, but amongst the
most important defining characteristics are age, sex, ethnicity
and location. But also important are people with disabilities and
those with stigmatised illnesses, such as mental ill-health. In
areas facing war or civil conflicts, displaced people and refugees
form an important vulnerable group (Eldis, 2010).

Associated Interventions

Social welfare intersects or overlaps with other areas of
intervention. These are usually informed by similar philosophies
as can be seen below.

I. Social Policy

Social welfare in this work is seen as being intrinsic to social
policy imperatives and outcomes, as the two are taken as not
being mutually exclusive. Rather, and critically, it is the role that
the two play in harnessing and sustaining human progress that is
of essence to this work. In effect, social welfare reinforces the
agenda of social policy. The activities of social policy are
overarching and superimpose those of social welfare. Broadly,

                                146
f                                                   Social welfare in zambia


social policy is concerned with social welfare provision. Social
policies address welfare needs and service provision in a social
context. While social welfare is fundamentally about the needs of
people, the policy level focuses on collective needs and well-
being, as well as the collective response to them, rather than
individual cases. For example, in practice, social policies aim to
promote and improve collective human well-being by targeting
welfare services and interventions on communities and settings
in which people live their lives (Walsh, et al., 2000:2). Also,
social policy is a state intervention that directly affects social
welfare, social institutions and social relations. It involves
overarching concerns with redistribution, production,
reproduction and protection, and works in tandem with economic
policy in pursuit of national, social and economic goals. Social
policy does not merely deal with the “casualties” of social
changes and processes; it is also a contribution to the welfare of
society (Mkandawire, 2006:1).
    The term social policy has two possible meanings. It is used
to refer to the academic subject called Social Policy or, it means
social policies themselves, that is to say, the intentions and
activities that are broadly social in their nature. Social policies
are examined in terms of:

   (a) Social policy as intentions and objectives;
   (b) Social policy as administrative and financial
       arrangements;
   (c) Social policy as outcomes: winners and losers (Baldock,
       et al., 2007).

    Social policy is different to other areas of the social sciences
because it is based upon a distinct empirical focus - support for
the well-being of citizens provided through social action. Thus, it
also refers to the activity of policy-making to promote well-being
and to the academic study of such actions. It is an
interdisciplinary field, drawing on and developing links with


                                147
fNdangwa Noyoo


other cognate disciplines (Alcock, 2003). Social policy is deeply
rooted in the British tradition:

    The development of social policy can be traced back to the end of the
    nineteenth century. This is because it is closely linked to the development
    of the Fabian Society and the influence of Fabian politics on policy
    development in Britain. The Fabian Society was established in 1884, and
    was strongly influenced by the work of Sidney Webb, a civil servant who
    later became a labour MP. It developed critical analysis of the social and
    economic problems found in late-nineteenth century British capitalism and
    campaigned for the introduction of social protection through the state to
    combat these (Alcock, 2003:4).

    Poverty and destitution are certainly compelling arguments
for strengthening social policy. However, social policy is NOT a
humanitarian question. It is rather a question of the kind of
society we want to live in, and about our aspirations for future
generations. In any society, social policy fulfils three main
functions: social, political and an economic (Economic and
Social Commission for Western Asia, 2009). The social function
lies in reducing the life cycle risks through social insurance and
alleviating poverty through social assistance. The political
function of social policy lies in stabilising effects. Social justice
and greater equality are vital factors for building trust and social
cohesion and to contribute to political stability. The economic
factor lies, among others, in widening the productive capacities
of society through the inclusion of marginalised areas and social
groups in the growth process, and through investments in
improved health and education of the population (Economic and
Social Commission for Western Asia, 2009:1-2).

II. Social Protection and Social Security

The terms social protection and social security are used in
various ways and not always consistently, differing widely across
countries and international organisations, and across time. The
term social protection is used in institutions across the world
with a wider variety of meaning than social security. It is often

                                       148
f                                                                Social welfare in zambia


interpreted as having a broader character than social security
(including, in particular, protection provided between members
of the family or members of a local community), but it is also
used in some contexts with a narrower meaning (understood as
comprising only measures addressed to the poorest, most
vulnerable or excluded members of society). Therefore social
protection is: (1) interchangeable with “social security” or (2)
“protection” provided by social security in case of social risks
and needs (International Labour Organisation, 2010:13).

In addition:

    Social security covers all measures providing benefits, whether in cash or in
    kind, to secure protection, inter alia, from:

(a) lack of work-related income (or insufficient income) caused by sickness,
    disability, maternity, employment injury, unemployment, old age, or death
    of a family member;
(b) lack of access or unaffordable access to health care;
(c) insufficient family support, particularly for children and adult dependants;
(d) General poverty and social exclusion (International Labour Organisation,
    2010:13).

    To elaborate further, social protection can also denote a
broader overarching framework within which social security,
social insurance and social assistance are subsumed. Social
insurance would refer to measures that have been put in place in
order to protect people against shocks and other risks that may
affect their livelihoods for instance, injury at work or other
accidents or disability. Such benefits may be linked to a worker’s
employment and may be contributory or non-contributory.
Provisions are made by the state for income to be disbursed to
individuals upon losing their livelihoods through different kinds
of mishaps, for example employee compensation funds or
provident funds. On the other hand, social assistance
programmes are targeted interventions which respond to
particular vulnerable groups. Such individuals are not likely to
have any form of sustenance and the state or non-state actors
intervene to support their social needs. In most cases, social
                                        149
fNdangwa Noyoo


assistance programmes are based on certain eligibility criteria
such as means-tests or group targeting. Cash transfers are an
example of a social assistance measure.

III. Social Security Floor

This refers to a set of four essential social security guarantees:

    (1) Universal guarantee of access to basic health benefits,
        through a pluralistic set of sub-systems linked together:
        basically a public health service funded by taxes, social
        and private insurance and micro-insurance systems;
    (2) Guaranteed income security for all children through
        family/child benefits aimed to facilitate access to basic
        social services: education, health, and housing;
    (3) Guaranteed access to basic means-tested/self-targeting
        social assistance for the poor; and
    (4) Guaranteed income security for people in old age,
        invalidity and survivors through basic pensions
        (International Labour Organisation, 2008).

IV. Social Work

Social work grew out of humanitarian and democratic ideals, and
its values are based on respect for the equality, worth, and
dignity of all people. Since its beginnings social work practice
has focused on meeting human needs and developing human
potential. Human rights and social justice serve as the motivation
and justification for social work action. In solidarity with those
who are disadvantaged, the profession strives to alleviate poverty
and to liberate vulnerable and oppressed people in order to
promote social inclusion. The social work profession promotes
social change, problem-solving in human relationships and the
empowerment and liberation of people to enhance well-being
(International Association of Schools of Social Work/
International Federation of Social Workers, 2001). Utilising

                                150
f                                                   Social welfare in zambia


theories of human behaviour and social systems, social work
intervenes at the points where people interact with their
environments. Social work addresses the barriers, inequities and
injustices that exist in society. It responds to crises and
emergencies as well as to everyday personal and social problems.
Social work utilises a variety of skills, techniques, and activities
consistent with its holistic focus on persons and their
environments. Social work interventions range from primarily
person-focused psychosocial processes to involvement in social
policy, planning and development (International Association of
Schools of Social Work/International Federation of Social
Workers, 2001).
    In spite of its colonial origins social work has relevance and
significance in Zambia. The central issue still remains whether
the profession can effectively respond to Zambia’s needs or if it
can tackle the country’s challenges. After it was introduced in the
country, first via missionary work and then later formalised by
the British colonial administration, social work has been part of
the social, economic and political landscapes of Zambia for
decades. In fact, the organic Welfare Societies in colonial
Zambia can be said to have offered a localised form of social
work to the African populace. However, professionalization of
social work needs to take centre stage in these times as Zambia
has undergone major shifts and transformations since
independence. In the last two decades, there has also been a
proliferation of colleges offering social work qualifications, in
addition to the University of Zambia. This in itself is not
something bad as it shows that there is a growing need for social
work services in the country. However, being a human service
profession that draws its meaning from ethics, values and
principles, social work needs to be regulated by a Professional
Council. This should also apply to other social service
practitioners. Indeed, it is high time that Zambia has a
Professional Council that among other things will: register and
guide practitioners, and regulate professional conduct, enforce
disciplinary codes and enhance professional development of

                                151
fNdangwa Noyoo


social service practitioners in Zambia. Such a body would also
interface with training institutions and set norms and standards in
the training and education of the social service practitioners so as
to have uniform and high standard training. Due to the fact that
social service practitioners are in constant interaction with the
vulnerable and marginalised: the poor, children, women, the aged
and people with disabilities - when intervening in the living
circumstances of these individuals, they must be guided by a
professional code of conduct. Otherwise, unprofessional conduct
will leave such persons worse off than before the intervention.
This observation is in reference to the fact that apart from
training institutions, there must be a body that enforces
professionalism in this sector.

perspectives, the next chapter looks at the context in which
imperial and colonial social welfare activities emerged and
shows how various colonial regimes created different social
welfare systems in Africa.

This chapter traces the origins of formalised social welfare
systems in colonial Africa. It also provides the context in which
social welfare initiatives emerged during this epoch.

The Nature of Colonialism and Imperialism

The creation of social welfare systems in the colonies was at the
behest of colonial administrations in these parts of the world.
Hence, colonial territories did not have any choice in this issue,
or even in anything else, for that matter, during those times.
Territories were simply incorporated into the colonial enterprise
for the sole purpose of making the colonisers rich and powerful.
The formalised social welfare systems which were imposed on
the colonies arose out of this context. Since colonialism was
premised on not preserving the local people’s ways of life, social
welfare to a larger extent, also mirrored this intent. During this
time, Britain was a colonial power that had expansive territorial
claims to many parts of the world. Many countries that today
make up the developing world, especially in the present-day
commonwealth fraternity, were part of the British Colonial
Empire. Again echoing earlier assertions, the fact and reality of
British colonial rule meant that many of the indigenous systems
of governance were supplanted by those of Britain. Due to the
foregoing, Britain bequeathed its social and political mores to
different parts of the world. Zambia was not an exemption and
the influence of British rule continues to endure in present times.
Zambia was officially a colony of Britain from 1924-1964.
Before that, the British South Africa Company (BSAC) had ruled
the country from 1911-1924 on behalf of the British Crown. The
end result of this occupation is that Zambia’s formal institutions
are derivatives of those of Britain. Even Zambia’s official

fNdangwa Noyoo


language is English, in spite of its seventy-three indigenous
languages.
    Just like other major European powers at the time, Britain had
also significantly benefitted from slavery and colonialism.36
Rodney (1972) lucidly explains the connection between slavery
and capitalism in the growth of England. For example, David and
Alexander Barclay, who were engaged in the slave trade in 1756,
would later use the loot to set up Barclays Bank. There was a
similar progression in the case of Lloyds - from being a small
London coffee house to ending up as one of the world’s largest
banking and insurance houses, after dipping into profits from the
slave trade. Then there was James Watt, expressing gratitude to
the West Indian slave owners who directly financed his famous
steam engine, and took it from the drawing-board to the factory.
Slave trade was also profitable to the British royal family.
Rodney (1972) contends that a Briton by the name John Hawkins
had made three trips to West Africa in the 1560s and stole
Africans whom he had then sold to the Spanish in America. On
returning to England after the first trip, his profits were so
handsome that Queen Elizabeth I became interested in directly
participating in his next venture and had provided for that
purpose a ship named the Jesus. Hawkins left with the Jesus to
steal more Africans, and he had returned to England with such
dividends that Queen Elizabeth I made him a knight. Hawkins
chose as his coat of arms the representation of an African in
chains. Atrocities were also committed against Zambians by the
agents of British imperialism such as John Cecil Rhodes in their
drive for the colonisation of Zambia.
    For all its intents and purposes, colonial domination in Africa
implied an exclusive capitalism which was based on race right
from the beginning. As a consequence, Africans were reduced to
marginal participants in the new economic system. Initially,
colonialism hinged on the incorporation of Africans as cheap
labour with limited rights of residence in formal enclaves, which
were principally geared towards production of primary products
for export (Mhone, 2001). In the same vein, British colonial rule

also centred on minimal investment in the colonies and
maximum extraction of the mineral wealth, and other natural
resources in the new found lands. Colonialism was also bound up
with imperialism. All European nations that colonised countries
in the developing world were driven by imperialistic motives.
Imperialism and colonialism are synonymous with conquest,
primitive accumulation and the dispossession of the lands of
indigenous peoples. There are two distinct interpretations of
imperialism. First, the traditional or old meaning of
imperialism37 was tied to mercantile capitalism and the early
phase of industrial capitalism. Imperialism under early
mercantilism was based, from 1500 to 1800, on the dominance of
Spain, with its control of precious metals in Latin America, and
to a lesser extent, Portugal, through its commercial points of
contact, in Africa, Asia and Latin America, and its trade in
spices, slaves and ivory. The Portuguese hegemony succumbed
largely to Spain during the sixteenth and early seventeenth
centuries (Chilcote, 2000). Later on, as Spain and Portugal lost
control over maritime traffic, the Dutch, then the English and
finally the French expanded their influences. Second, this old
imperialism was replaced by the new imperialism that refers to
the intense rivalry of European nations, symbolised in the
scramble for Africa and the Berlin Conference of 1885,38 but
more conspicuous at the turn of the twentieth century (Chilcote,
2000). Imperialism also typified the expansion of capitalism
world-wide through industrial capital accumulation and the
establishment of colonies as dependent territories. Capitalists in
Britain, as the first industrial power, had a competitive advantage
over the other capitalist groups and could use “free trade” to
break down resistance to British goods and capital (Brown,
2000).
    Southern Africa, with its vast mineral deposits had a large
European population that eventually took its own form of
occupation by diluting ties with the imperial countries and
carving out a niche for itself in the colonies. In this part of
Africa, capitalism emerged as a racial type of capitalism, which

fNdangwa Noyoo


was superimposed over pre-capitalist social relations, entailing
unequal relations of domination and subjugation (Mhone, 2001).
In British West Africa, colonial rule was premised upon the
notion of divide and rule, which was conceptualised and
perfected by Frederick Lugard in Nigeria. This form of rule
required a centrally controlled government which was overseen
by a Governor from Britain with local administration and

to, for instance, French rule that placed the whole of West Africa
under one administration which was overseen by a Governor-

colonial Zambia and a good example of this was the creation of
the Council of Tribal Elders in the municipal and mining
compounds on the Copperbelt region in the 1930s. This structure
had presided over the interests of miners from different ethnic
groups.

The Genesis of Social Welfare in the African Colonies

Social welfare in Africa can be traced back to the colonial order
which was legitimised by the philosophy of race superiority and
enforced through a highly hierarchical socio-political system. At
the apex of this order were the Europeans who were also
accorded all the social, economic and political advantages. On
the other hand, Africans always occupied the lowest rung of the
colonial social ladder, whilst Asians or the mixed-race
population had certain privileges. The colonial society was also
extremely patriarchal and was not open to the advancement of
women. Women, just as the “natives”, had to know their place in
this society and were not expected to aspire any higher than the
colonial socio-political and economic ceiling. In instances that
social welfare services were provided to women, they sought to
maintain the “good native wife”, in her place, so that she catered
to her husband’s needs. The husband was, in turn, expected to
provide cheap labour to various commercial ventures in the

colony. Women were not schooled to think beyond the domestic

   government-sponsored educational and social welfare programme. Foyers
   sociaux, or social homes, were Belgian domestic training institutions for
   African women, founded for married women living in colonial urban
   centres. Some women were learning to cook, mend, iron, and wash clothes,
   and how to wean their infants and decorate their homes, and a select few
   were trained to work (for pay) as auxiliary aids or monitors in the
   classrooms (Hunt, 1990:447).

    The creation of welfare systems in the colonies was heavily
dependent on certain global developments. Significantly, the
Great Depression of the 1920s and 1930s, and the Second World
War stand out as main catalysts.39 These two dislocating forces
inadvertently triggered positive reactions from European states in
the form of comprehensive and high quality social welfare
systems for their citizens. In the first place, governments began
to provide better social welfare services to their citizens and
secondly, they were compelled by circumstances, to respond
humanely to their colonial subjects. This changed attitude was
tempered by two realities: economic and security. The Great
Depression had led to a fall of prices of many commodities of the
colonies on European markets. This resulted in dwindling
revenues which were critical to both the imperial countries’ and
the colonies’ social and economic development pursuits. Social
problems were also increasing in the colonies and burdening
their already politically volatile urban environment. Colonial
subjects were getting disgruntled and beginning to demand for
better living conditions. Therefore, the provision of social
welfare services was beginning to be seen as crucial to the lives
of colonial subjects by the colonial authorities. On the other
hand, the Second World War had fundamentally transformed
imperialism and led to a re-think of the European countries’
imperial desires. Against Nazi and fascist threats, Western
Europe had galvanised its colonial subjects towards the war

fNdangwa Noyoo


effort under the banner of justice and freedom. This had the
unintended consequence of raising African people’s desire to
search for and demand self-rule.
    Britain and France were able to mobilise millions of Africans
and Asians to fight against Nazi Germany and its allies. Africans
were agreeable to fighting this “common enemy” and were even
beguiled into believing that their sacrifices were for the good of
all humanity. When the war was over, veterans returned to their
homes with high expectations. The war experiences had also
served to raise political consciousness amongst the Africans and
enabled them to realise that racial superiority was fallacious and
could be challenged. In fact some colonial subjects had valiantly
proved themselves on the battlefield than their European
counterparts. Others had even earned themselves medals of
valour, despite the racist conditions to which they were subjected
by their colonial armies. Later, some of these individuals would
become fierce opponents of colonial rule and add momentum to
the drive for independence. Their ability to use modern weapons
was an important factor for armed insurrection and guerrilla war-
fare in certain colonial territories. For example, in Kenya, Dedan
Kimathi, who had fought in the Second World War for the
British Empire would later lead the famous Mau-Mau rebellion.
This uprising was very instrumental in sowing the seeds against
British rule in that country and also helped to galvanise the
nationalists around the call for independence, which was
eventually achieved in 1963.
    Meanwhile, after the war, there was a need to reconstruct
Europe. During this process, there arose dissenting voices against
the status quo in Europe as well as the continued colonial
occupation of African and Asian territories. This was because
post-war Europe was experiencing critical changes that
threatened the old ways of life. There were strident demands
made by many sections in European nations, for the state to
entrench the notion of inclusive citizenry, with people’s rights
being upheld by states. In the same vein, progressive Europeans
also challenged their governments over their colonial agendas

called on their governments to make provisions for better

seen as a relic of the past. This period was also characterised by
the establishment of welfare states in Europe. It was in this
atmosphere that the African people’s call for self-determination
resonated with some of these progressive circles in Europe and
the United States. Increasingly, many imperial governments
found themselves with no choice but to undertake reforms in
their colonial territories and in some cases earnestly prepare the
indigenous peoples for self-government. Again, one instrument
that was seen as critical to the advancement of the colonial

Different Colonial Regimes in Africa and Their Social
Welfare Agendas

(a) The British Experience

Initial efforts by the British Empire in its colonies, as regards
social welfare activities, can be traced back to the Colonial
Development Act of 1929. In the British colonial sphere, social
welfare interventions were predicated on an understanding that
only urban Africans in the “detribalised” areas could qualify for
such assistance. The British authorities had always believed that
the extended family was the safety-net which was crucial to
those Africans who were in need. By the 1930s, the Colonial
Office had made concerted efforts to avail social welfare services
to the indigenous people. This period was characterised by the
gradual abandonment of the principle of passive colonial
trusteeship in favour of a more active one. Some officials at the
Colonial Office had begun to identify themselves with ordinary
local people and also to regard themselves as true guardians of
their humanitarian interests (Lewis, 2000). The Colonial Office’s
role had hitherto been largely reactive, shaped by ad hoc
responses to local developments, cemented by the idea of

                               161
fNdangwa Noyoo


trusteeship, and limited by a concern to respect the substantial
autonomy enjoyed by the colonial governments under devolved
British rule (Butler, 1997). In later years, the Colonial Office was
compelled to lay stress on “development” which then
necessitated the need for a combined approach to problems of
development.
    The educational sector had generally paid attention to this
approach before than other fields. For example, an official
statement of policy issued by the Colonial Office in 1925 insisted
that every department of government concerned the people’s
welfare or vocational teaching - including, especially the
departments of Health, Public Works, Railways, and Agriculture
to co-operate closely with educational policy. By 1940, most of
the African colonies, a good number of those in the West Indies
and Fiji had either nutrition committees or development
committees (Mair, 1944). Therefore, the intervening war years
had also added momentum to these initiatives and hence, the
Colonial Development and Welfare Act got passed in 1940. As a
consequence, the number of colonial civil servants increased
after the war - known as the “Second Colonial Occupation” - and
guidelines were issued on the establishment of social welfare
departments (Lewis, 2000). Thus, social services and community
development activities became the hallmarks of social welfare
interventions in British colonial Africa. For the first time, social
welfare was taken as a means to address the increasing social ills
in the colonies.40 Though paternalistic or at times misplaced, this
attitude was nonetheless crucial to changing the social and
economic atmosphere in the colonies.41
    The Colonial Office’s changed attitude towards the colonies
was informed by two critical factors. First, against a background
of wartime mobilisation of the Empire’s resources, metropolitan
discussions on post-war reconstruction and the advent of a
Labour Government, the colonial state took on new
responsibilities in directing local economies, mirroring the
growth of collectivism in Britain, and prompting discussions on
the state’s role in future economic development. Secondly,

during the 1940s, the Colonial Office increasingly, if
temporarily, became the driving force in colonial policy
initiatives, disturbing the traditional balance of power between
London and the colonial governments and further exposing
weaknesses in local development machinery (Butler, 1997:3). In
this regard, the vagaries of indirect rule finally had to make way
for the rhetoric of welfare and development in order to show that
the imperial mission was neither finished nor a failure. The
dialectical relationship between war and welfare in metropolitan
Britain began a new phase in empire state-building in Africa
(Lewis, 2000).

more assertive and above all, to anticipate local developments
and devise new policies, methods and machinery centred on the
goal of achieving controlled decolonisation at the time deemed
appropriate by London. This was a period when Britain was
under increasing pressure to justify its colonial role to domestic,
colonial and international opinion (Butler, 1997). The agitation
against colonial rule by the indigenous peoples through
protestations, civil unrest and war-fare contributed to the general
uncertainty in the metropolitan countries. The drive for self-rule
was gaining momentum during this period and it was not
coincidental that countries like Britain were ready to make
concessions. However, some African nationalist organisations
had not wholly rejected the colonial set-up and they had only
sought to reform and not radically transform it. Negotiated
independence was usually the route taken by a good number of
nationalist parties and there would be an almost transplant of
metropolitan institutions through entrenched constitutional
provisions and a Westminster type of democracy, once self-rule
was achieved. Encouraged to modernise trusteeship, but enjoying
little in the way of an extensive state structure or easy access to
civil society, empire administrators looked to improve African
welfare as the metropolitan launched its welfare state. Conditions
overseas were very different however. Colonies had fewer
resources, no single moral authority and little in the form of a

waged labour force that could afford to contribute to a national

(b) The French Example

While the British were more concerned with protecting the
African extended family, the French essentially applauded its
dissolution, viewing the demise of the “traditional” collectivity
as the liberation of the individual. Due to this and among other
things, the French metropole subsidised social service provision
in the colonies through the Fonds d’Investissement pour le
Development Economique et Sociale (Investment Funds for
Economic and Social Development) as early as 1928 (MacLean,
2010). Yet social service delivery was only one branch of French
social policy. The other was social security, namely, retirement
and invalidity pensions, accidents and sickness benefits, family
and maternity allowances. The French and British practices
diverged sharply here. In most British colonies, the only benefit
available at independence covered occupational injury - a
provision instituted in the 1940s at the employers’ expense
(Iliffe, 1987). Most French colonies, by contrast, legislated
provisions during the “compassionate” 1950s for sickness,
maternity, employment injury, family and sometimes retirement
benefits - generally financed from contributions by employers
and workers. The benefits covered only a relatively small group -
urban workers in large enterprises, rarely more than 10 per cent
of the economically active - and therefore did little to alleviate
poverty directly, although their “trickle down” effects may have
been considerable (Iliffe, 1987:208). The French had in addition
to a more expansive provision of social services, discussed the
need for a broader social insurance system as early as 1910
(MacLean, 2010).
    As in the case of Britain, significant reforms took place in the
French colonies during and after the Second World War.
Inevitably, developments in France had implications for the
colonies. For instance, the establishment of the French social

both the British and German Bismarckian models. It was
characterised by state-funded social services as well as a
compulsory insurance system. Thus, social welfare in the French
colonies focused more on the provision of health and social
security programmes. As noted above, although there were a
number of nationalist parties that challenged colonial rule in the
African French colonies, some colonial subjects in these areas
were not keen on independence, but sought after citizenship
rights within the French state. They wanted to be citizens of
France and their demands were not for severance of ties with
their colonial “master”. Nonetheless, the demands for self-
government only received favourable attention from the
government of the Free French which replaced the Vichy
administration.42

(c) The Belgian Case

After the Berlin Conference of 1884-1885 also dubbed the
“scramble for Africa”, King Leopold II of Belgium was granted
the area known as the Congo by other European nations. He
named it the “Congo Free State” as he wanted to keep this place
as a “free-trade zone”. Initially, the Congo was the only territory
falling under the Belgian sphere and as a private estate of
Leopold II (he essentially regarded the Congo as his investment).
Due to this and other issues, the Congo had experienced the
worst forms of brutal oppression under Leopold II who
committed atrocious acts against the indigenous people such as
decapitating their limbs if they did not “work hard enough” in the
rubber plantations. The local population was decimated by
Leopold almost to half its size. By 1908 the Belgian government
had forced him to surrender the territory (after a huge outcry
from some of the civilised quarters of Europe) and it was re-
named the Belgian Congo. The Belgian government and the
Catholic missionaries began to provide social services such as

fNdangwa Noyoo


education to the local people. Later, Rwanda and Burundi, which
had been colonised by the Germans as Ruanda-Urundi, were
added to the Belgian colonies after the defeat of Germany in the
First World War.
    The extension of Belgium political and social struggles, after
the Second World War, promoted speedier reforms in the
colonies and created sharp shifts in colonial policy. Between
1945 and 1947, the Belgians put through various improvement
schemes. From 1947 to about 1954, the Belgians attempted to
meet the new challenges by a policy of “cautious assimilation”
whereby “advanced” Africans received privileges. At the same
time the Belgians vainly tried to force Africans into the Western
way of life (Okoth, 2006). After the Belgian elections of 1954, a
liberal-Socialist coalition was brought into power. Thereafter, the
Belgians allowed more freedom of speech and publications in
their colonies and Africans obtained a greater share in local
government. In the Congo, there was a new social welfare
dispensation that was coupled with the building of two
universities in the country. The Belgians would aim for gradual
emancipation, but they were overtaken by events as Africans
stepped up the fight for self-rule (Okoth, 2006). It has been
observed that an elaborate system was established in the Belgian
Congo without significance to trade union pressure as part of the
general policy of paternalism and the attempt to stabilise
Katanga’s labour force.43 Union Minière du Haut Katanga
instituted an accident compensation scheme as early as 1928.
Most other forms of social security followed in the 1950s, while
in 1957 the Belgian authorities also created the first extensive old
age pensions in tropical Africa. By 1959 it covered nearly a
million workers (Iliffe, 1987). The Belgian thrust was more
towards social security, as in the case of the French, rather than
towards social welfare as in the British case. It is interesting to
note that the Congo example has in some ways, similarities with
that of Northern Rhodesia which later became Zambia. Due to

(d) The Portuguese Example

Portuguese territories were regarded as provinces by the Lisbon
government and freedom came late in these parts of Africa. It
was only after long and bitter wars were waged in Angola,
Guinea Bissau and Mozambique, by various liberation
movements of these territories that independence was finally
granted to them. With an authoritarian regime in Portugal and
with no democratic atmosphere existing in this country, the
Portuguese made no moves to reform conditions in the colonies.
Even after the onset of the liberation struggle, Portugal would
steadfastly hold on to its prized possessions in the form of
colonies. There were also no demands placed on the regime in
Portugal by its citizens due to its undemocratic nature. Hence,
social welfare initiatives were not pronounced even in the mother
country and were not as elaborate as in Britain, for example.
Portugal also had a weak economy and was generally poor in
comparison to other European powers. Portugal was also
notorious for the brutal suppression of the political and civil
liberties of the indigenous populace in its colonies. In many
respects, Portuguese colonial rule was considered backward by
European standards with forced labour only being abolished in
the early 1960s.
    The Portuguese colonies had covered an area of about two
million square kilometres (about five per cent of the entire
continent and larger than the combined areas of Spain, France,
Germany, Italy and England). According to Amilcar Cabral, the
charismatic leader of the armed struggle against Portuguese rule
in Guinea Bissau, the African population of these colonies had

fNdangwa Noyoo


been enslaved by a small country, the “most backward in
Europe”. Racial discrimination was openly practised whilst
Africans were driven from the fertile regions so that European
farms could be built there (Vambe and Zegeye, 2008). Political,
social or trade union organisation was forbidden to the Africans,
who did not enjoy even the most elementary human rights.
Thousands of workers from Angola, Mozambique and the Cape
Verde Islands worked twelve hours on the settlers’ farms of São
Tomé, the heart of the equatorial zone. There was forced labour
for public works in Guinea Bissau, Angola and Mozambique; but
in the latter two, it extended as well to privately owned
companies. Every year, two hundred and fifty thousand
Angolans were rented out to agricultural, mining and
construction concerns. Every year four hundred thousand
Mozambicans were subjected to forced labour, a hundred
thousand of whom were exported to the mines of South Africa
and Rhodesia (Vambe and Zegeye, 2008).
    Up until the 1950s, the Portuguese did not invest in education
and other social services. While they believed that education was
necessary to “civilise” Africans, they were afraid that educated
Africans would endanger Portuguese interests. Even in Portugal
itself, the government was not spending enough to educate its
own citizens with the result that the rate of illiteracy in 1960 was
40 per cent - the highest in Europe. In Africa, progress in this
area was slow. In Angola (the most developed colony as far as
education was concerned) in 1950, there were only thirteen
thousand children in elementary schools, about three thousand in
secondary schools, and less than two thousand in technical

(e) Colonial-Apartheid Social Welfare in South Africa

Social welfare in apartheid South Africa was residual and
informed by racist values of white supremacy. Mainly, social
welfare services were remedial in focus and were not attuned to
the development of human capacities of all South Africans, but
rather only came into play - for the European populations - when
the normal structures of supply, such as the family and the
economic system broke down. The colonial-apartheid social
welfare system was founded upon four principles, namely: racial
division in the provision of welfare services; a rejection of
socialism; partnership between state and community; and
movement from residential and therapeutic services towards
community-based and preventative facilities (McKendrick and
Dudas, 1987 in McKendrick, 1987). State social welfare services
were not only residual but also fragmented:

   As the senior partner in a joint enterprise, the state assumes responsibility
   on a national basis for the countrywide planning and co-ordination of social
   welfare programmes and for the formulation and administration of social
   legislation. Although organised at the national level, state-sponsored social
   welfare services are delivered regionally and locally. State welfare
   provision is not centred in any single government department, and major
   welfare functions are shared by four different departments each of which
   serve the needs of different groups in the population. Thus, in the case of
   most statutory social services, White persons would receive service from
   the Department of Social Welfare and Pensions, Coloured (i.e., mixed-race)
   persons from the Department of Coloured Affairs, and Black persons from
   the Department of Bantu Administration and Development. The nature of
   services offered by these four departments is generally similar and falls into
   the two categories of social welfare: security provision and the delivery of
   service programmes (Hare and McKendrick, 1976:78).

   Two important factors contributed to the formation of the
colonial-apartheid social welfare system: the discovery of rich
mineral deposits of diamonds and gold, which then created
conditions which fostered the industrial development of South
Africa, from the 1870s onwards and the Anglo-Boer war
between 1899 and 1902. With industrialisation, the African
peasantry was uprooted from its subsistent agricultural base. This
                                       169
fNdangwa Noyoo


led to many African communities losing their land and
precipitating an exodus to the cities where mining was taking
place. However, white Afrikaner populations had also lost out in
the industrialisation process as they had been mainly agricultural
producers:

    With the industrialisation of the Rand, commercial farmers across the
    country began to utilise fully the land they owned so as to supply the
    expanding urban markets. Landless Afrikaners found their rural options
    narrowed as landowners began to evict unprofitable tenants, and the volk’s
    drift to the cities began, as individual families felt the broad shifting
    structures of economic development impinging upon their lives (Lester,
    1996:68).

    The depression of the late 1920s further exacerbated the
already dire situation of the Afrikaners. Initial responses to
Afrikaner poverty were mainly from the voluntary and religious
sectors. Thus in 1928, at the instigation of the Dutch Reformed
Church, the Carnegie Corporation of New York was persuaded
to fund a new approach to white indigence: “a scientific
investigation into the causes of White poverty, its extent, and the
means by which it could be reduced” (McKendrick, 1987).
    When the National Party came to power and established its
policy of apartheid in 1948, racial segregation and injustice were
not novel to South Africa. Apartheid, which the National Party
introduced, only legalised and institutionalised racial
discrimination through policies and legislation. In spite this, by
1947, moves had already been underway to formalise the welfare
sector. Thus, the Welfare Organisations Act (No.9 of 1947) and
amended (No.3 of 1949) provided a foundation for future
interventions by the apartheid state into the welfare sector. The
Act of 1947 required all welfare and other fund-raising
organisations to register with a National Welfare Board, in order
to prevent the duplication of services - albeit in the European
sector only. An amendment was then passed in 1949 which made
provision for the appointment of regional welfare boards to
oversee the co-ordination of welfare services. In 1937, a state
Department of Social Welfare had been formed.

   The Department’s functions were as follows:

   To assist towards proper adjustment, persons and families who are socially
   maladjusted (the rehabilitation aim). To study and take appropriate steps to
   deal with the conditions that may cause or contribute towards
   maladjustment (the preventative approach). To co-ordinate the activities of

   nature with those of the Department (the co-ordination of government

   (co-ordination of voluntary welfare work) (Department of Social Welfare
   and Pensions, 1962:33).

    Social welfare also mirrored the wider ideology of apartheid
through its responses to human needs:

   In line with the Republic’s policy of separate development for the different
   national groups, separate departments of State provide social amenities and
   services for each group. Thus, there are the Departments of Social Welfare
   and Pensions, for the White Nation, Bantu Administration, and
   Development, for the various Bantu nations, Indian Affairs for the Indian
   population groups and Coloured Affairs for the Coloured nation. Not only
   is this a logical development of the policy; it is the most practical way of
   ensuring efficiency and success, as it allows for welfare measures to be
   designed to take into account the diverse circumstances and needs of South
   Africa’s diverse peoples (Department of Information, 1968:4).

   Apartheid policies and legislation heavily impacted upon the
social welfare system of the country, which in turn influenced
social work education and social work practice. For instance, the
Republic of South Africa Constitution Act, 1983, which enabled
social welfare to be organised on the basis of race meant that
social workers could only operate in areas where the clients were
from their own racial or ethnic groups.

endurance on the African continent. This is not to say that there
had not been other colonial forays from the Italians, Germans,
and Spanish. Overall, the scope of social welfare services in
colonial Africa, as elsewhere, varied from one country to another
and was determined by the needs and problems of each particular
country. Also, the formulation of social welfare services was

This chapter describes the manner in which social welfare
activities arose in Zambia, by firstly identifying early formalised
interventions by the Western missionaries and then shedding
light on the interventions by the colonial authorities and the
mining companies in this arena.

Early Social Welfare Interventions by Missionaries in
Zambia

Even though the missionary and explorer, David Livingstone44
had criss-crossed pre-colonial Zambia, and died in 1873 in the
area at Chitambo, Frederick Stanley Arnot, a young Scots
Plymouth Brethren missionary, was the first European to have
established a permanent residence in the country, in Barotseland
in 1882. Historical accounts cite George Westbeech, an earthy
ivory hunter and trader, as having helped Arnot to make his way
into Barotseland. Arnot left the area in 1884 without converting
anyone and settled around Katanga in today’s Democratic
Republic of the Congo (DRC). From there, the Plymouth
Brethrens made in-roads into the northern parts of Zambia in the
early 1900s. François Coillard, a French missionary of the Paris
Evangelical Missionary Society (PMS) would be the next
European to set up a permanent settlement in Barotseland in
1885 and actually convert some of the local people to
Christianity. Coillard and his wife had previously worked for a
considerable period amongst the Basotho people of present day
Lesotho. They also had acquainted themselves with the
Bamangwato in today’s Botswana and their ruler, Khama, so
their choice of Barotseland may have been influenced by the
linguistic factor, as they could easily communicate with the
Lozis, who spoke a language that was a mixture of Sesotho and
Setswana. In 1887, the London Missionary Society (LMS)

opened a mission station on the southern end of Lake
Tanganyika among the Mambwe people. The Primitive
Methodists were also active in the area where the Ila people
resided and had arrived at Kazungula in September 1890.
However, the Lozi king or Litunga, Lewanika, had kept them
waiting there for three years, until he finally permitted them to
enter and settle near N’goma. The White Fathers, a Catholic
group, began their work amongst the Bemba from 1891. Then

from the then Orange Free State in South Africa set up a mission

    In this part of Africa, it is safe to state that the missionaries
were the first Europeans to establish permanent bases in the pre-
colonial period: before the hunters, traders, miners and
administrators. Intermittently, there had been contacts between
the indigenous people and the Europeans, especially, the

the country, the Bemba ethnic group was notorious for raiding
weaker ethnic groups for slaves who were then sold to the Arabs.
The conditions were indeed wretched and deplorable. In most
instances, the missionaries were motivated by a belief in their
need to “civilise” the local people. Arguably, even though this

missionary school under the auspices of the PMS. Soon after the

Luapula in northern Zambia by Miss Mabel Shaw of the LMS.

Zambia was ruled by the BSAC until 1911, when the territories

merged to form Northern Rhodesia, with the town of Livingstone
in the south serving as the administrative and commercial centre.

territories which had previously been administered under the
Barotseland-North-Western Rhodesia Order-in-Council, 1899
and the North-Eastern Rhodesia Order-in-Council, 1900. On 1
April 1924, Northern Rhodesia became a British Protectorate and
its dependency via the Northern Rhodesia Order-in-Council,
1924, which repealed the Northern Rhodesia Order-in-Council,
1911. The Order-in-Council of 1924 also provided for the
administration of the colony by transferring jurisdiction or
authority which was vested in the High Commissioner in South
Africa to Northern Rhodesia. Previously, the Royal Instructions
of February 26, 1924, had directed that there be an Executive
Council consisting of the following members of the Colonial
Service: Chief Secretary to the Government, Attorney General,
Treasurer, Secretary for Native Affairs, and a Principal Medical
Officer as an ex-officio Member of the Executive Council. The
territory was now governed by a Governor with executive power
and who served as Commander-in-Chief. A Legislative Council
made up of a minority of Europeans as elected members came
into being following recommendations of the Buxton
Committee.46 From 1889 to 1924, as far as from making any
profits in the territory, the BSAC had suffered heavy annual
deficits. Thus, after the BSAC negotiated with the British
government, an agreement was reached between the two parties,
which resulted in the British government recompensing the
Company £3¾ million for its losses over the administration of

Northern Rhodesia, which then passed to the Colonial Office as

    Zambia’s colonisation was accelerated when rich deposits of
copper were discovered in 1902 in Chief Chipepo’s area, at
Kabwe. A European, T.G. Davey, operating for the Davis group
stumbled across outcrops of lead, zinc and vanadium on a rocky
hillock which he named “Broken Hill” on account of its
resemblance to a similar formation of that name in Australia.
Later on, in the areas of present day Ndola and Luanshya,
another European named Collier, discovered copper deposits,
after shooting a Roan antelope, and to his amazement, found that
it had fallen on an outcrop of pure malachite, which the local
people had been using as treatment for tropical ulcers. Hence, the
name of the mine, which later operated in the area - Roan
antelope. Many of the mines on the Copperbelt were discovered
by randomly stumbling upon ancient workings or mineralised
outcrops - or on the goodwill of locals (Coleman, 1971). When
other mineral deposits were discovered in the area that came to
be known as the Copperbelt, Europeans had begun to arrive in
large numbers. Many of these were petty merchants, traders and
farmers who came from South Africa and had left that country
after the Anglo-Boer War (1899-1902). In order for the minerals
to be exploited, infrastructure such as roads and a rail line had to
be built. The erection of a rail line from Victoria Falls to the
Copperbelt, also led to an expansion of European settlements
along its course. Fertile land was allocated to Europeans for
agricultural purposes as well. In these early years of colonial
rule, colonial administrators and European commercial
enterprises in the territory were in dire need of labour, in order to
carry out construction works. Labour recruitment was not easy in

these times and the former had to use unconventional means to

nascent money economy so as to provide cheap labour for the
colony in the mining and emerging agricultural sectors. Orde-
Brown (1933:8) in his crude assessment justifies the coercion,
which was liberally resorted to by almost all the colonial
administrators: “money was scarce, communications bad,
conditions primitive, and natives were entirely unaccustomed to
wage-earning; thus a proportion of compulsion was inevitable.”
   Although the mining operations had not required a lot of
labour in the initial phases, demand grew with the subsequent
discovery of other sites where there were rich mineral deposits.
Nonetheless, labour had to be imported from other parts of the
country because the communities around the copper mines could
not satisfy labour demands. Initially, Northern Rhodesia had
been largely a labour exporting country to the mines of South
Africa, Belgium Congo (Katanga) and Southern Rhodesia. Since
Africans were used to a subsistent-type of lifestyle and were not
willing to work in the new mines or other commercial
enterprises, the colonial authorities worked out a tax system
which forcefully incorporated them into the colonial economy:

   One of the obvious means of obtaining more money was the imposition of
   an African Tax. The question of taxation in turn was closely linked with the
   labour question, for the need to earn tax money was the most important
   incentive to induce Africans to take up paid employment (Gann, 1958:77).

    Thus in 1901, the BSAC introduced the hut and poll tax
(collectively known as the African tax) which coerced Africans
into wage employment. The hut tax was also a form of poll tax
which was based on the number of huts an African owned. Later,
there was an exclusive focus, by the colonial authorities, on
taxing the wages earned in the money economy. Tax defaulters
or evaders were severely punished. Some were even imprisoned
or forcibly recruited into labour gangs. Since most Africans did
not participate in the modern economy, they could only pay this
tax in kind, for example through grain, fowls, fruit or livestock.

fNdangwa Noyoo


But in the end, when these agricultural products were depleted,
they had no choice but to sell their labour. Later on, a decree was
passed in 1905 by the colonialists that compelled Africans not to
pay tax by any means other than money. Following these
developments, Africans migrated in large numbers to the urban
areas in order to work in the mines and factories. Thus a new
phenomenon arose in colonial Zambia where able-bodied young
men were uprooted from their villages to the mining towns.
These times can be regarded as the initial stages of the twin
processes of migratory labour and rural-urban migrations.
Colonial rule had deliberately created a reserve army of labourers
in the rural areas and turned villagers into wage seekers. In the
same vein, urban settlements became wholly dependent on cheap
labour from the hinterland. There was always abundant labour
and due to this, the employment contracts were short, with
duration of usually up to six months. Once the contracts were
over, the labourers would be “offloaded” in the rural areas and
new ones would be recruited. The migration of predominantly
males to the urban areas posed serious threats to the stability of
the extended family and the traditional mutual-aid system, which
had safeguarded the livelihoods of its members. Migrations had
also resulted in distorted demographic patterns in African
communities in that only women, children, the old and infirm
remained behind in the villages. Women, in adapting, had to take
on new roles and responsibilities which had previously been the
domains of men. This was at times a blessing in disguise in so far
as African gender relations were concerned.
    Urbanisation further threatened the old order in the way that
the new and young “urbanites” quickly discarded their traditional
values for modernity and also assumed new social roles in the
towns. Labourers, who returned from the urban centres to their
respective villages, also challenged the traditional authorities and
the traditional value system. Urbanisation had also helped to
spread the money economy to the previously and hitherto,
traditional sector. Previously, people had bartered and co-
operated in wealth creating activities. By and large, Africans

                                186
f                                                                Social welfare in zambia


were being drawn into the consumer-oriented and individualistic
culture of the modern economy through the process of
urbanisation. The money economy also spurred on radical
changes in the emerging colonial setting, as traditional communal
goals of the extended kinship group were relegated for those of
personal achievement and individual careers (Powdermaker,
1962). In addition, kinship relationships had a tendency to take
on new meanings in urban areas and in a sense largely became
“destructured” (Mitchell, 1969). Urbanisation also brought into
close proximity people of different ethnic groups and cultures
who never interacted with each other. This changing social order
was significantly altering the lifestyles of Africans as Epstein
(1958: xi-xii) notes:

   In his village the African was a subsistence cultivator, a hunter and, in some
   tribes a herdsman. Now in the towns, he earns his livelihood as a labourer
   in a copper mine, as a brick layer or carpenter, a tradesman or owner of
   transport service. In his social relations he is no longer confined largely to
   members of his own tribe; he works for, and enters into social intercourse
   with his fellow Africans of other tribes, and Europeans and Indians.

    From the above-mentioned it can be argued that social change
in colonial Zambia was mainly given impetus by colonialism,
which in turn had negative ramifications for the indigenous
people’s way of life. More importantly, the discovery of minerals
and their extraction further contributed to the transformation of
the social relations and conditions in the colony. However, many
local communities had faced difficulties in adapting to the
conditions of the emerging colonial society and its socio-political
and economic system. Indeed, during these times, the indigenous
people had not evolved towards modernity, but had been
catapulted from communalism to colonial capitalism, by the
forces of social change:

   As in mediaeval Europe the influence of the Church and State were
   supplemented by the rise of the Third Estate, so in modern Africa a third
   major influence has been added to that of missions and government. It is
   this Third Estate, represented by great industrial enterprises, which has

    introduced sweeping changes in the position of modern missions in Central

    As interaction between Africans and European settlers
increased, there arose tensions in the emerging colony. The main
factor that heightened discontentment was the African tax.
Africans openly rebelled against this tax system which they
considered as draconian and because of this they faced the wrath
of colonial administrators. The second source of grievance was
the dispossession of African people’s land, by the colonialists.
Most of the arable and productive land along the line of rail was
annexed by the Europeans as well as the lands of Chipata and
Abercon (present day Mbala). Then the colonial administration
went on to undermine African agriculture by introducing various
restrictions, whilst at the same time subsidising European
farmers. Some of the indigenous communities were quite adept at
agricultural production and the colonial government made sure
that these local producers were enfeebled so that European
farmers did not face competition on one hand and that Africans
went to work in the European enclave as cheap labour, on the
other. The rest of the local populations were shepherded into
what were known as Native Reserves, where the land was not
fertile and which eventually became overcrowded. Furthermore,
those Africans who were good at trading and had business
acumen were thwarted from earning income from such ventures
in order to, again, make them go and sell their labour. In the
process, different mechanisms were used to weaken the wealth
creating capabilities of Africans. Due to this, there were feelings
of resentment against the Europeans from the Africans in the
colony. Contrary to popular accounts, the first organised form of
resistance from the indigenous people actually started in
Barotseland:

    In Barotseland, which was geographically remote from the labour centres, it
    was among the mission evangelists that the first organised strike of Africans
    broke out in Northern Rhodesia in 1900. It was thus the “white collar”
    workers rather than the “raw” labour migrants on the mines who were the
    first to use the weapon of combination. The Barotse evangelists were also

The First World War and After

Already, as shown above, there was an awakening of African
political consciousness, which was beginning to take root in early
colonial Zambia. This would be raised to another level with the
outbreak of the First World War. The Northern Rhodesian
Regiment founded in 1891 had conducted military campaigns in
East Africa during this war. Thousands of Africans were
mobilised for the war effort by the British government, with
close to fifty thousand as porters and three thousand five hundred
more as askaris for military action. Many Africans from the
colony died in this war and not necessarily from the fighting, but
from diseases and malnutrition due to lack of proper diet. Upon
return, there was nothing in store for the African ex-service men,
but their world-view had been dramatically changed due to the
war experiences. Between 1918 - when the war ended in
Northern Rhodesia at Mbala - and 1939, when the Second World
War broke out, there were sprouts of resistance in colonial
Zambia which can be attributed to the political awakening of the
Africans, which in the main were influenced by events such as
the First World War. In the same period, there was also an influx
of Europeans and a heightened alienation of African people’s
land by the former. Even though Northern Rhodesia was not
considered a “white man’s country” as in the case of Southern
Rhodesia, the small numbers of settlers had nonetheless
demanded for a bigger role in Northern Rhodesia’s political
space. The settlers had even constituted an Advisory Council
during the war and called for more settler political representation
in the territory. After the BSAC had extended taxation to
Europeans, the settlers made representations to the British Crown
challenging the BSAC’s right to tax them.
    The Watch Tower Movement, which emerged in 1913 in
Zambia and other independent African churches were also quite
