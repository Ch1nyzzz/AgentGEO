</span><h2 class="title" data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">            The End of Democracy in America          </span></h2><span data-dcnode-id="1591" instrument_node="">
</span><span class="subtitle" data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Tocqueville foresaw how it would come.</span></span><span data-dcnode-id="1588" instrument_node="">
</span><div class="authors" data-dcnode-id="1582"><span data-dcnode-id="1587" instrument_node="">
</span><a class="author" data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.city-journal.org/contributor/myron-magnet_123"><span class="name" data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Myron Magnet</span></span></a><span data-dcnode-id="1583" instrument_node="">
</span></div><span data-dcnode-id="1581" instrument_node="">
</span><span class="magazine" data-dcnode-id="1578"><a class="source-link" data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.city-journal.org/magazine%3Fissue%3D304"><span data-dcnode-id="1580" instrument_node="">Spring 2016</span></a></span><span data-dcnode-id="1577" instrument_node="">
</span><div class="topics" data-dcnode-id="1570"><div class="topic" data-dcnode-id="1574"><span class="main-topic" data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Politics and law</span></span></div><div class="topic" data-dcnode-id="1571"><span class="main-topic" data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Arts and Culture</span></span></div></div><span data-dcnode-id="1569" instrument_node=""> </span></div><span data-dcnode-id="1567" instrument_node="">
</span></div><span data-dcnode-id="1565" instrument_node="">
</span></div><span data-dcnode-id="1563" instrument_node="">
</span></header><span data-dcnode-id="1561" instrument_node="">
</span><div class="l_ipage-container" data-dcnode-id="739"><span data-dcnode-id="1560" instrument_node="">
</span><div class="l_ipage-content" data-dcnode-id="786" id="wallit-pop"><span data-dcnode-id="1559" instrument_node="">
</span><span data-dcnode-id="1557" instrument_node="">
</span><span data-dcnode-id="1555" instrument_node="">
</span><div class="content-wrapper" data-dcnode-id="788"><span data-dcnode-id="1554" instrument_node=""> </span><span data-dcnode-id="1552" instrument_node="">
</span><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1546"><span class="cap" data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">A</span></span><span data-dcnode-id="1547" instrument_node="">lexis de Tocqueville was a more prophetic observer of American democracy than even his most ardent admirers appreciate. True, readers have seen clearly what makes his account of American exceptionalism so luminously accurate, and they have grasped the profundity of his critique of American democracy’s shortcomings. What they have missed is his startling clairvoyance about how democracy in America could evolve into what he called “democratic despotism.” That transformation has been in process for decades now, and reversing it is the principal political challenge of our own moment in history. It is implicitly, and should be explicitly, at the center of our upcoming presidential election.</span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1544" instrument_node="">Readers don’t fully credit Tocqueville with being the seer he was for the same reason that, though volume 1 of </span><i data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Democracy in America</span></i><span data-dcnode-id="1541" instrument_node=""> set cash registers jingling as merrily as Santa’s sleigh bells at its 1835 publication, volume 2, five years later, met a much cooler reception. The falloff, I think, stems from the author’s failure to make plain a key step in his argument between the two tomes—an omission he righted two decades later with the publication of </span><i data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">The Old Regime and the French Revolution</span></i><span data-dcnode-id="1538" instrument_node=""> in 1856. Reading the two books together makes Tocqueville’s argument—and its urgent timeliness—snap into focus with the clarity of revelation.</span></p><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1531"></p><figure class="m_article-picture m_article-picture__ noalign" data-dcnode-id="1532"><img alt="Alexis de Tocqueville in 1850 (RMN-GRAND PALAIS/ART RESOURCE, NY)" class="media-element file-default" data-dcnode-id="1535" data-delta="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media4.manhattan-institute.org/sites/cj/files/26_2-mm1.jpg&amp;raw" style="float: none;" title="Alexis de Tocqueville in 1850 (RMN-GRAND PALAIS/ART RESOURCE, NY)"><figcaption data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Alexis de Tocqueville in 1850 (RMN-GRAND PALAIS/ART RESOURCE, NY)</span></figcaption></figure><p></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1525"><span data-dcnode-id="1529" instrument_node="">What’s missing in volume 2 of </span><i data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Democracy </span></i><span data-dcnode-id="1526" instrument_node="">is concrete, illustrative detail. Volume 1 mines nine months of indefatigable travel that began in May 1831 in Newport, Rhode Island—“an array of houses no bigger than chicken coops”—when the aristocratic French lawyer was still two months shy of his 26th birthday. Tocqueville’s epic journey extended from New York City through the virgin forests of Michigan to Lake Superior, from Montreal through New England, Pennsylvania, Ohio, Kentucky, and Tennessee by coach, steamboat, and even on foot through snow-choked woods, until he and his traveling companion, Gustave de Beaumont, boarded a steamer for New Orleans. From there, they crossed the Carolinas into Virginia, visited Washington, and returned to New York to embark for home with a trunkful of notes and American histories. Tocqueville had watched both houses of Congress in action and interviewed 200-odd people, ranging from President Andrew Jackson, ex-president John Quincy Adams, Secretary of State Edward Livingston, Senator Daniel Webster, Supreme Court Justice John McLean, and future chief justice Salmon Chase to Sam Houston, a band of Choctaw Indians, and “the last of the Iroquois: they begged for alms.”</span></p><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1523" instrument_node="">Only by the time </span><i data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">The Old Regime</span></i><span data-dcnode-id="1520" instrument_node=""> came out, though, three years before Tocqueville’s untimely death from tuberculosis at 53 in 1859, had he amassed the wealth of practical political experience needed to flesh out the argument of </span><i data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Democracy in America</span></i><span data-dcnode-id="1517" instrument_node="">’s second volume. After three terms in the Chamber of Deputies during Louis Philippe’s bourgeois monarchy, he had served in the Constituent Assembly following the 1848 revolution, helping to write the Second Republic’s constitution and serving as foreign minister, until president Louis Napoleon made himself emperor. He had researched </span><i data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">The Old Regime</span></i><span data-dcnode-id="1514" instrument_node=""> by reading mountains of official reports and correspondence from the 1750s onward in the archives, chiefly of Tours and Paris. All this allowed him to document what had been inspired but mostly theoretical speculation in volume 2 of </span><i data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Democracy in America</span></i><span data-dcnode-id="1511" instrument_node="">.</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Tocqueville didn’t go to America out of blind democratic enthusiasm. “It is very difficult to decide whether democracy governs better, or aristocracy,” he mused: but the question is merely academic, because anyone who pays attention to swiftly shifting French affairs—from the Revolution, the Directory, and Napoleon to the Restoration and the constitutional monarchy of 1830—can’t deny that “sooner or later we will come, as the Americans have come, to an almost complete equality of conditions.” In that case, “[w]ould it not then become necessary to consider the gradual development of democratic institutions and mores not as the best way to be free but as the only way left to us?”</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1505" instrument_node="">So he went to America in search of “lessons from which we might profit”—negative lessons as well as positive ones. And just after the publication of volume 1 of </span><i data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">Democracy in America</span></i><span data-dcnode-id="1502" instrument_node="">, he cast his own lot with democracy, marrying, to his family’s horror, a beautiful middle-class English Protestant, Mary Mottley, whom he considered “the only person in the world who knows the bottom of my soul”—but who never shed her middle-class outrage at “the least deviation on my part,” he complained. After all, who can stop his “blood boiling at the sight of a woman”? (And, already at 17, he had fathered a child, whose fate is unknown, with a servant girl.) Still, he at least remained faithful to democracy: when he inherited the title Comte de Tocqueville in 1836, he never used it.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1487"><span class="cap" data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">I</span></span><span data-dcnode-id="1497" instrument_node="">n America, he believed, he’d find democracy in its purest form—morally pure but also unmixed with any vestiges of a hierarchical regime from which it had had to revolt, unlike any other modern democracy. The earliest Anglo-American settlers had crossed the sea to begin the political world afresh. This band of equals had “braved the inevitable miseries of exile because they wished to ensure the victory of </span><i data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">an idea</span></i><span data-dcnode-id="1494" instrument_node="">,” he wrote—the Puritan idea that “was not just a religious doctrine” but that “coincided with the most absolute democratic and republican theories,” inseparably intertwining “the </span><i data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">spirit of religion</span></i><span data-dcnode-id="1491" instrument_node=""> and the </span><i data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">spirit of liberty</span></i><span data-dcnode-id="1488" instrument_node="">.” For the Pilgrims, Tocqueville explained, “Religion looks upon civil liberty as a noble exercise of man’s faculties, and on the world of politics as a realm intended by the Creator for the application of man’s intelligence. . . . Liberty looks upon religion as its comrade in battle and victory, as the cradle of its infancy and divine source of its rights.” As the settlers believed, “religion subjects the truths of the other world to individual reason, just as politics leaves the interest of this world to the good sense of all, and it allows each man free choice of the path that is to lead him to heaven, just as the law grants each citizen the right to choose his government.”</span></p><span data-dcnode-id="1486" instrument_node="">
</span><blockquote class="m_article-quote m_article-quote__small" data-dcnode-id="1468"><span class="quote-content" data-dcnode-id="1483"><p data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Nongovernmental associations spring up for furthering ‘public security, commerce and industry, morality and religion.’</span></p></span><span data-dcnode-id="1482" instrument_node="">
</span><div class="share-links" data-dcnode-id="1469"><a class="share-facebook" data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.city-journal.org/html/end-democracy-america-14332.html%3Fwallit_nosession%3D1"><svg data-dcnode-id="1479" enable-background="new 0 0 500 500" version="1.1" viewBox="0 0 500 500" x="0px" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" y="0px"><g data-dcnode-id="1480" id="fb"><path clip-rule="evenodd" d="M367.9,106.7l-42.3,0c-33.2,0-39.4,15-39.4,37.1v48.7h78.9l-10.3,76h-68.6v195.9h-82.8V268.5h-69.3v-76h69.3v-56.3c0-65.3,41.7-100.6,102.8-100.6c29.2,0,54.3,1.9,61.7,2.8V106.7z" data-dcnode-id="1481" fill-rule="evenodd"></path></g></svg><span data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Share on Facebook</span></span></a><a class="share-twitter" data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.city-journal.org/html/end-democracy-america-14332.html%3Fwallit_nosession%3D1"><svg data-dcnode-id="1473" version="1.1" viewBox="0 0 500 500" x="0px" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" y="0px"><g data-dcnode-id="1474" id="tw"><path clip-rule="evenodd" d="M437,152.3c0.2,4.2,0.3,8.5,0.3,12.7c0,129.9-96.5,279.7-273,279.7c-54.2,0-104.6-16.3-147.1-44.2c7.5,0.9,15.1,1.4,22.9,1.4c45,0,86.3-15.7,119.1-42.1c-42-0.8-77.5-29.2-89.8-68.3c5.9,1.1,11.6,1.8,17.8,1.8c8.7,0,16.7-1.2,24.7-3.4c-43.9-9-78-48.8-78-96.4c0-0.4,0-0.8,0-1.2c16.7,7.3,28.8,11.8,44.5,12.3c-25.7-17.6-41.6-47.7-41.6-81.8c0-18,4.7-34.9,13-49.4c47.3,59.5,118,98.6,197.8,102.7c-1.6-7.2-2.5-14.7-2.5-22.4c0-54.3,43-98.3,96-98.3c27.6,0,52.5,11.9,70,31.1c21.9-4.4,42.4-12.6,60.9-23.8c-7.2,23-22.4,42.2-42.2,54.4c19.4-2.4,37.9-7.6,55.1-15.5C472,121.1,455.7,138.5,437,152.3z" data-dcnode-id="1475" fill-rule="evenodd"></path></g></svg><span data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Share on Twitter</span></span></a></div></blockquote><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1466" instrument_node="">So Puritanism was the wellspring of American mores—a key term for Tocqueville that refers not just to “what one might call habits of the heart, but also to the various notions that men possess, to the diverse opinions that are current among them, and to the whole range of ideas that shape habits of mind.” In French, the word is </span><i data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">moeurs</span></i><span data-dcnode-id="1463" instrument_node="">, meaning manners, morals, core beliefs, and customs—what we would call </span><i data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">culture</span></i><span data-dcnode-id="1460" instrument_node="">. There are “three major factors that have governed and shaped American democracy,” Tocqueville argued, “but if I were asked to rank them, I would say that physical causes matter less than laws and laws less than mores.”</span></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">From the seventeenth-century Puritan acorn grew American culture’s fundamentally libertarian creed. Universal reason (which reveals Jefferson’s self-evident truths, for example) is the source of moral authority, “just as the source of political power lies in the universality of citizens.” Most Americans believe that “consensus is the only guide to what is permitted or prohibited, true or false,” and that “the man who properly understands his own self-interest has all the guidance he needs to act justly and honestly. They believe that every person is born with the faculty to govern himself and that no one has the right to force happiness on his fellow man.” And they believe in human perfectibility, the usefulness of the spread of enlightenment, and the certainty of progress, so that what seems good today will give way tomorrow to something better but as yet unimagined.</span></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Why are your ships not built to last? Tocqueville once asked an American sailor. Naval architecture improves so quickly, the sailor replied, that the finest ship would be obsolete before it wore out. A Silicon Valley engineer would sound the same today.</span></p><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1448"><span class="cap" data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">N</span></span><span data-dcnode-id="1449" instrument_node="">ot surprisingly, a culture that leaves men free to judge for themselves in religion and politics nurtures independent self-reliance from childhood on. Even in the schoolyard, American children make up their own rules and punish infractions themselves. As adults, they never think of waiting for government to solve everyday problems. If a road gets blocked, they organize themselves to fix it. If they want to celebrate something, they spontaneously join together to make the festivities as fun and grand as possible. Spontaneous nongovernmental associations spring up for furthering “public security, commerce and industry, morality and religion,” Tocqueville marvels, pointing to the temperance movement and the founding of seminaries and hospitals as just a few examples. “There is nothing the human will despairs of achieving through the free action of the collective power of individuals.” Free and collaborative: that’s the mainspring of American mores.</span></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">With such an emphasis on self-reliance, it’s also no surprise to see American trade and industry booming. The typical American is “ardent in his desires, enterprising, adventurous, and above all innovative,” Tocqueville writes. Focused on material gratifications, and seeing idleness as shameful, Americans “think only of ways to change or improve their fortunes,” so that “any new method that shortens the road to wealth, any machine that saves labor, any instrument that reduces the cost of production, any discovery that facilitates or increases pleasure seems the most magnificent achievement of the human mind.” If one scheme fails, an American doesn’t quit: “picking himself up again, often disappointed, never discouraged, he marches indefatigably on toward the immense grandeur that he can but dimly make out at the end of the long road that mankind has yet to travel.” No wonder Tocqueville judges (as Arthur Goldhammer deftly translates him for the Library of America) that “there is something heroic about the way Americans do business.” These traits will soon enough make Americans “one of the greatest peoples of the world. Their offspring will blanket all of North America. . . . Wealth, power, and glory will inevitably be theirs some day, yet they hasten after this immense fortune as though they had but a moment left to lay hold of it.”</span></p><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">And note, Tocqueville emphasizes, that all this is the product of culture and institutions. With the same natural advantages, but different mores, the Spaniards of South America have created some of the most “miserable” nations on earth. Similarly, with a vast wilderness stretching from their doorstep, French settlers in Canada have chosen to “squeeze themselves into a space too small to hold them.”</span></p><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1436"></p><figure class="m_article-picture m_article-picture__ noalign" data-dcnode-id="1437"><img alt="Tocqueville’s friend Gustave de Beaumont made this sketch of Frenchman Island in New York State’s Lake Oneida when the two travelers (doubtless depicted in the lower left corner) explored it in July 1831. (YALE TOCQUEVILLE MANUSCRIPTS. GENERAL COLLECTION, BEINECKE RARE BOOK AND MANUSCRIPT LIBRARY, YALE UNIVERSITY)" class="media-element file-default" data-dcnode-id="1440" data-delta="2" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media4.manhattan-institute.org/sites/cj/files/26_2-mm2.jpg&amp;raw" style="float: none;" title="Tocqueville’s friend Gustave de Beaumont made this sketch of Frenchman Island in New York State’s Lake Oneida when the two travelers (doubtless depicted in the lower left corner) explored it in July 1831. (YALE TOCQUEVILLE MANUSCRIPTS. GENERAL COLLECTION, BEINECKE RARE BOOK AND MANUSCRIPT LIBRARY, YALE UNIVERSITY)"><figcaption data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Tocqueville’s friend Gustave de Beaumont made this sketch of Frenchman Island in New York State’s Lake Oneida when the two travelers (doubtless depicted in the lower left corner) explored it in July 1831. (YALE TOCQUEVILLE MANUSCRIPTS. GENERAL COLLECTION, BEINECKE RARE BOOK AND MANUSCRIPT LIBRARY, YALE UNIVERSITY)</span></figcaption></figure><p></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1431"><span class="cap" data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">A</span></span><span data-dcnode-id="1432" instrument_node="">merica’s unique history also powerfully shaped its political culture. The Mother Country was only too pleased to see its turbulent Puritans slip over the horizon, and it ignored them for well over a century. So America developed from the village up, rather than from a metropolis down. Colonial politics were resolutely local. “One might almost say that, in the beginning, each town was an independent nation,” Tocqueville notes. Local citizens elected their magistrates, levied and collected their own taxes, raised their own militias, maintained their own roads, provided for their own poor, and, in New England at least, established their own schools and made their children attend them. In New England, too, they did this directly, not through representatives, so, despite their Puritan individualism, they learned from the start how to cooperate. “As in Athens, matters affecting everyone’s interests were discussed in public places and in general assemblies of citizens.” These local institutions, Tocqueville judges, “foster a taste for liberty among the people and teach them the art of being free.” In a self-reinforcing cycle, an “American learns about the law by participating in the making of it. He teaches himself about the forms of government by governing. He watches the great work of society being done every day before his eyes and, in a sense, by his hand.” He becomes a free citizen by practicing the duties of citizenship.</span></p><span data-dcnode-id="1430" instrument_node="">
</span><blockquote class="m_article-quote m_article-quote__small" data-dcnode-id="1412"><span class="quote-content" data-dcnode-id="1427"><p data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Tocqueville saw that the Puritans’ religiosity remained, two centuries later, an undiminished force in American life.</span></p></span><span data-dcnode-id="1426" instrument_node="">
</span><div class="share-links" data-dcnode-id="1413"><a class="share-facebook" data-dcnode-id="1420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.city-journal.org/html/end-democracy-america-14332.html%3Fwallit_nosession%3D1"><svg data-dcnode-id="1423" enable-background="new 0 0 500 500" version="1.1" viewBox="0 0 500 500" x="0px" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" y="0px"><g data-dcnode-id="1424" id="fb"><path clip-rule="evenodd" d="M367.9,106.7l-42.3,0c-33.2,0-39.4,15-39.4,37.1v48.7h78.9l-10.3,76h-68.6v195.9h-82.8V268.5h-69.3v-76h69.3v-56.3c0-65.3,41.7-100.6,102.8-100.6c29.2,0,54.3,1.9,61.7,2.8V106.7z" data-dcnode-id="1425" fill-rule="evenodd"></path></g></svg><span data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Share on Facebook</span></span></a><a class="share-twitter" data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.city-journal.org/html/end-democracy-america-14332.html%3Fwallit_nosession%3D1"><svg data-dcnode-id="1417" version="1.1" viewBox="0 0 500 500" x="0px" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" y="0px"><g data-dcnode-id="1418" id="tw"><path clip-rule="evenodd" d="M437,152.3c0.2,4.2,0.3,8.5,0.3,12.7c0,129.9-96.5,279.7-273,279.7c-54.2,0-104.6-16.3-147.1-44.2c7.5,0.9,15.1,1.4,22.9,1.4c45,0,86.3-15.7,119.1-42.1c-42-0.8-77.5-29.2-89.8-68.3c5.9,1.1,11.6,1.8,17.8,1.8c8.7,0,16.7-1.2,24.7-3.4c-43.9-9-78-48.8-78-96.4c0-0.4,0-0.8,0-1.2c16.7,7.3,28.8,11.8,44.5,12.3c-25.7-17.6-41.6-47.7-41.6-81.8c0-18,4.7-34.9,13-49.4c47.3,59.5,118,98.6,197.8,102.7c-1.6-7.2-2.5-14.7-2.5-22.4c0-54.3,43-98.3,96-98.3c27.6,0,52.5,11.9,70,31.1c21.9-4.4,42.4-12.6,60.9-23.8c-7.2,23-22.4,42.2-42.2,54.4c19.4-2.4,37.9-7.6,55.1-15.5C472,121.1,455.7,138.5,437,152.3z" data-dcnode-id="1419" fill-rule="evenodd"></path></g></svg><span data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Share on Twitter</span></span></a></div></blockquote><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">One of those duties is jury service, which shapes the national character by giving citizens firsthand respect for equity and the rule of law. Since most people won’t be criminals but everybody can be sued, civil jury duty especially highlights the idea of responsibility for one’s actions and teaches everyone to think like a magistrate. And a jury, notes Tocqueville, is “above all a political institution . . . a form of popular sovereignty.” Going back to Magna Carta and beyond, as the Founding Fathers liked to say (though Tocqueville does not mention), juries are the last defense of the citizen’s rights against the sovereign’s power. As “the most energetic form of popular rule,” says Tocqueville, the jury “is also the most effective means of teaching the people how to rule.” Moreover, because lawyers, who play so large a role in politics, compose a respected, quasi-corporate body, they also form a mediating buffer between the citizen and the state, with their essentially conservative love of order and formalities.</span></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">A century and a half after the Puritan settlers established the little republics of New England, the Constitution carefully preserved the spirit of localism in its federal structure. Congress takes charge of such national matters as foreign relations, war, and international trade, but, lacking any means of knowing the innumerable details of local needs and customs, as Friedrich Hayek later argued about the inevitable failings of centralization, it leaves local matters to the state legislatures and the town meetings. “So feeble and limited is the share of government left to the administration, and so much does the latter reflect its popular origins and obey the power from which it emanates,” Tocqueville concludes, “that it is fair to say that the people govern themselves.”</span></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Tocqueville also saw that the Puritans’ religiosity remained, two centuries later, an undiminished force in American life. It still kept the spiritual realm and its values vibrantly present in minds otherwise materialistic. When an American strikes out into the wilderness to make his fortune, his Bible always goes with him, along with the religious habit of his heart, with its “moral truths.” Tocqueville stresses that religion retains its vitality in America because it has “remained entirely distinct from the political order.” For when religions meddle in politics and take political stands, theirs is but one more mere opinion, subject to disagreement and derision. Thus if clerics make political pronouncements, “they run the risk of not being believed about anything”—as has happened to mainstream Protestantism in our post–William Sloane Coffin era and, much more tragically, to the black church when it embraced social justice instead of salvation, depriving its community of an indispensable moral guide. Because religion’s moral teaching is so critical to democracies in the age of enlightenment, and its moral authority is so potentially precarious, Tocqueville says, “I would rather chain priests inside their sanctuaries than allow them to venture out.”</span></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1398"><span class="cap" data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">A</span></span><span data-dcnode-id="1399" instrument_node="">s nothing is perfect in human affairs, Tocqueville of course paints the inevitable shadows into his otherwise sunny panorama. Powering the frenzy of American activity is a high-voltage charge of anxiety. After the Revolution, most states outlawed entail, the inheritance rule that the owner of an estate must leave it to his eldest male heir, with pittances to the other children. Henceforth property got divided and redivided more or less equally, with the result now that “the families of the great landowners have almost all been absorbed into the common mass,” Tocqueville observes, and even fallen “into the uttermost depths of obscurity.” America thus has almost no permanently rich families: “wealth circulates there with incredible rapidity, and . . . it is rare for two successive generations to garner its favors.” This leveling force generates “that restlessness of the heart which is natural to men when, all conditions being almost equal, each person sees the same chance of rising.” With everyone feverishly striving, though, whenever some individual manages to shoot up out of the mass to wealth and power, his fellows respond with envy and wonder if he’s a crook. The result is an “odious mingling of the ideas of baseness and power, unworthiness and success, utility and dishonor.”</span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">So while democracy often gives rise to “a manly and legitimate passion for equality that spurs all men to wish to be strong and esteemed,” it can also lead weak men “to want to bring the strong down to their level”—with such base fervor as ultimately to defeat democracy’s purpose by “preferring equality in servitude to inequality in freedom.”</span></p><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">In any event, all the striving intensifies Puritan individualism to an extreme where it “disposes each citizen to cut himself off from the mass of his fellow men,” leaving “the larger society to take care of itself,” Tocqueville writes. “These people owe nothing to anyone. . . . Thus not only does democracy cause each man to forget his forebears, but it makes it difficult to see his offspring and cuts him off from his contemporaries. Again and again it leads him back to himself and threatens ultimately to imprison him altogether in the loneliness of his own heart.”</span></p><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">American equality and materialism don’t provide fertile ground for deep thought, either. As people increasingly resemble one another, each man intellectually “feels weaker vis-à-vis all the others” and “loses confidence in himself when they combat him.” He finds it “very difficult to believe what the masses reject and to profess what they condemn,” and usually he ends up “admitting he is wrong when most people say he is.” Public opinion bears all before it in America; its power is one of Tocqueville’s prime examples in a chapter he heads with James Madison’s epithet “the tyranny of the majority.” So irresistible is its force that Tocqueville can think of “no country where there is in general less independence of mind and true freedom of discussion than in America.”</span></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1384"><span class="cap" data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">S</span></span><span data-dcnode-id="1385" instrument_node="">uch intellectual tyranny weighs most heavily on writers and politicians. With no need for the racks and chains of old, democracy’s very mild tyranny “ignores the body and goes straight for the soul,” Tocqueville laments. It leaves the dissident his life, liberty, property, and civic privileges, but it makes them useless to him by making him a pariah, unable to gain the votes or the esteem of his fellow citizens, who will shun him for fear of being shunned themselves. Little wonder, therefore, that America has produced no great writers. And if you want a refutation of the wisdom of crowds—the “theory of equality applied to intelligence,” Tocqueville scoffs—look no further. As someone who believes that “freedom of the intellect is a sacred thing,” as Tocqueville does, “when I feel the hand of power weigh upon my brow, it scarcely matters who my oppressor is, and I am not more inclined to submit to the yoke because a million arms are prepared to place it around my neck.”</span></p><span data-dcnode-id="1383" instrument_node="">
</span><blockquote class="m_article-quote m_article-quote__small" data-dcnode-id="1365"><span class="quote-content" data-dcnode-id="1380"><p data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Given the threat of majoritarian tyranny, . . . a centralized administration would pose a fearful danger.</span></p></span><span data-dcnode-id="1379" instrument_node="">
</span><div class="share-links" data-dcnode-id="1366"><a class="share-facebook" data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.city-journal.org/html/end-democracy-america-14332.html%3Fwallit_nosession%3D1"><svg data-dcnode-id="1376" enable-background="new 0 0 500 500" version="1.1" viewBox="0 0 500 500" x="0px" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" y="0px"><g data-dcnode-id="1377" id="fb"><path clip-rule="evenodd" d="M367.9,106.7l-42.3,0c-33.2,0-39.4,15-39.4,37.1v48.7h78.9l-10.3,76h-68.6v195.9h-82.8V268.5h-69.3v-76h69.3v-56.3c0-65.3,41.7-100.6,102.8-100.6c29.2,0,54.3,1.9,61.7,2.8V106.7z" data-dcnode-id="1378" fill-rule="evenodd"></path></g></svg><span data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Share on Facebook</span></span></a><a class="share-twitter" data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.city-journal.org/html/end-democracy-america-14332.html%3Fwallit_nosession%3D1"><svg data-dcnode-id="1370" version="1.1" viewBox="0 0 500 500" x="0px" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" y="0px"><g data-dcnode-id="1371" id="tw"><path clip-rule="evenodd" d="M437,152.3c0.2,4.2,0.3,8.5,0.3,12.7c0,129.9-96.5,279.7-273,279.7c-54.2,0-104.6-16.3-147.1-44.2c7.5,0.9,15.1,1.4,22.9,1.4c45,0,86.3-15.7,119.1-42.1c-42-0.8-77.5-29.2-89.8-68.3c5.9,1.1,11.6,1.8,17.8,1.8c8.7,0,16.7-1.2,24.7-3.4c-43.9-9-78-48.8-78-96.4c0-0.4,0-0.8,0-1.2c16.7,7.3,28.8,11.8,44.5,12.3c-25.7-17.6-41.6-47.7-41.6-81.8c0-18,4.7-34.9,13-49.4c47.3,59.5,118,98.6,197.8,102.7c-1.6-7.2-2.5-14.7-2.5-22.4c0-54.3,43-98.3,96-98.3c27.6,0,52.5,11.9,70,31.1c21.9-4.4,42.4-12.6,60.9-23.8c-7.2,23-22.4,42.2-42.2,54.4c19.4-2.4,37.9-7.6,55.1-15.5C472,121.1,455.7,138.5,437,152.3z" data-dcnode-id="1372" fill-rule="evenodd"></path></g></svg><span data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Share on Twitter</span></span></a></div></blockquote><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">That same majoritarian tyranny explains why America’s elected officials are so mediocre. To win votes, they have to flatter public opinion with the obsequiousness of Louis XIV’s most sycophantic courtiers. Andrew Jackson is Tocqueville’s Exhibit A. He “is the slave of the majority,” Tocqueville sneers; “he obeys its wishes and desires and heeds its half-divulged instincts; or rather, he divines what the majority wants, anticipating its desires before it knows what they are in order to place himself at its head.” Like most politicians, he cares only about reelection, so that “his own individual interest supplants the general interest in his mind.” His (ultimately successful) vendetta against the Second Bank of the United States is a perfect example. Even though it inestimably benefits the nation by ensuring its monetary stability, Jackson happily attacks it, accusing its directors of being an aristocracy in the making, opposed to the democratic majority—and, incidentally, to Jackson as well. But of course, Jackson’s Democrats, the party that stands for the infinite expansion of the power of the people, have a permanent majority over the rival Federalists, who could win election only when the country needed to navigate the perils of the Founding, a unique emergency that prompted the Federalist Party’s superior men to accept public office.</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">However, the modest scrap of elitism that remains in America does the country much good, Tocqueville judges. By contrast with the House of Representatives, where you see local lawyers or businessmen “of vulgar appearance”—or even Tennessee congressman “David Crockett, who had received no education, could read only with difficulty,” and “spent his time hunting, selling his game for a living, and spending his whole life in the woods”—the Senate throngs with “eloquent attorneys, distinguished generals, clever magistrates, and well-known statesmen. Every word uttered in this assembly would do honor to Europe’s greatest parliamentary debates.” Why the difference? The people directly elect their congressmen, while the popularly elected state legislatures elect the senators, a two-step process that refines and ennobles the choice and that Tocqueville recommends for democracies everywhere. But note, he remarks, that even the best democracy will give you a broadly prosperous nation, with little real misery, rather than a brilliant one.</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1354"><span class="cap" data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">P</span></span><span data-dcnode-id="1355" instrument_node="">art of the genius of the U.S. Constitution, Tocqueville thinks, is that it not only prevents Congress from making laws for localities but also provides no central administrative system that could carry them out if they existed. Given the threat of majoritarian tyranny, such as reigns over U.S. public opinion, such a centralized administration would pose a fearful danger. If the central power could not only issue orders and frame general principles but also carry them out in detail, if it could reach down and seize the individual by the collar, “then liberty would soon be banished from the New World,” Tocqueville asserts.</span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1345"><span data-dcnode-id="1352" instrument_node="">But hang on! From a glowing panorama, to some gathering shadows, to </span><i data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">this</span></i><span data-dcnode-id="1349" instrument_node="">? What makes him say this—and then harp on it as the keynote of volume 2 of </span><i data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Democracy</span></i><span data-dcnode-id="1346" instrument_node="">? After all, as he himself observes, even no past European sovereign was ever powerful or absolute enough “to subject all his people indiscriminately to the minute details of a uniform code, or . . . to dictate and manage the lives of each and every one of them.” Such an idea “never occurred to the mind of man.” So why bring it up?</span></p><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1343" instrument_node="">Yet, as Tocqueville discovered in his researches for </span><i data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">The Old Regime and the French Revolution</span></i><span data-dcnode-id="1340" instrument_node="">, not only did such an idea arise under many a royal crown, but a long progression of sovereigns gradually made it a reality.</span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1333"></p><figure class="m_article-picture m_article-picture__ noalign" data-dcnode-id="1334"><img alt="By no means a democrat by birth, Tocqueville lived in this chateâu in Normandy. (1CLIC / PHOTO12 / THE IMAGE WORKS)" class="media-element file-default" data-dcnode-id="1337" data-delta="3" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media4.manhattan-institute.org/sites/cj/files/26_2-mm3.jpg&amp;raw" style="float: none;" title="By no means a democrat by birth, Tocqueville lived in this chateâu in Normandy. (1CLIC / PHOTO12 / THE IMAGE WORKS)"><figcaption data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">By no means a democrat by birth, Tocqueville lived in this chateâu in Normandy. (1CLIC / PHOTO12 / THE IMAGE WORKS)</span></figcaption></figure><p></p><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1322"><span class="cap" data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">H</span></span><span data-dcnode-id="1329" instrument_node="">ere, briefly, is how. During the fourteenth century, no taxation without consent was as firm a principle in France as in England. But around 1440, Charles VII sweet-talked the nobles into pushing the Estates-General to let him levy a new tax, the </span><i data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">taille</span></i><span data-dcnode-id="1326" instrument_node="">, at his pleasure—a tax from which the nobles would be exempt. As the </span><i data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">taille</span></i><span data-dcnode-id="1323" instrument_node=""> increased, amplifying the injustice of taxing the poor rather than the rich, so did the people’s resentment of the exempt aristocrats, who had hitherto been their protectors and patrons, especially in times of dearth. And as the nobles gradually sold off their land, tied their fates to the central government by investing the proceeds in its bonds, and moved to Paris, they ceased to feel any obligation or concern for their former tenants, ceding their role as a revered corporate body that once had mediated between the people and the sovereign. An analogous process occurred in the towns over the same period, as municipal corporations became petty oligarchies, uninterested in ordinary citizens, who, in turn, stopped caring about their town’s welfare and didn’t bother to turn up at the rigged elections—where elections still existed.</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1320" instrument_node="">What filled the power vacuum was the Royal Council, an ancient body that, by the eighteenth century, had become supreme, with a Controller General as its executive officer, and faceless bureaucrats, who shunned publicity and beavered away silently in the shadow of the throne, as its members. The Controller General administered the entire nation through 30 intendants, one per province. Obscure middle-class functionaries like the Royal Councilors, they and their subdelegates apportioned and collected the </span><i data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">taille</span></i><span data-dcnode-id="1317" instrument_node=""> in every parish, managed poor relief in every town and village, and, as the eighteenth century progressed, tried to teach peasants scientific agriculture, told them where they could plant this or that crop, and built and maintained roads and canals. Says Tocqueville, “There was in France no township, borough, village, or hamlet, however small, no hospital, factory, convent, or college which had a right to manage its own affairs as it thought fit or administer its possessions without interference.” Moreover, each intendant had brigades of mounted police to keep order, arrest vagrants and beggars, and quell riots. Scots-born John Law, named Controller General in 1720, marveled that until he took office, “I could hardly believe such a state of affairs existed. Believe it or not, the French kingdom is ruled by thirty Intendants.”</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">True, the old, independent legal system still stood protectively between the sovereign and the citizen, even after he had lost the aegis of the lord and the town corporation. Kings couldn’t fire or transfer judges; instead, they found a way simply to bypass them. They set up special courts, dependent on royal favor, to try any case involving the king’s authority or interest. Throughout the eighteenth century, moreover, royal decrees and orders from the Royal Council declared that any disputes that resulted from them would be heard by the intendant, with a right of appeal to . . . the Royal Council. And any case concerning the administration not covered by such a council order could be summarily snatched out of the ordinary courts and transferred to the intendant’s jurisdiction by a so-called evocation. The intendants and their subdelegates were exempt from personal lawsuits, making them untouchable.</span></p><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Even private property lost its sanctity, when Louis XIV promulgated the long-held but judicially rejected feudal belief that all landed estates were held conditionally and that their true owner was the state. So the highway department never hesitated as it extended France’s highway system in the eighteenth century to use eminent domain with gay abandon to drive roads straight and true through anybody’s parkland. And the state gradually swept into its coffers donations willed to charitable institutions over centuries, until in 1780 the king seized the ancient endowments of the hospitals, in return for a government annuity. “It never seemed to cross anyone’s mind,” Tocqueville drily remarks, “that the surest way of training people to violate the rights of the living is to set at nought the wishes of the dead.”</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">The result was that the “former ruling class retained their rank and titles, but all effective authority was gradually withdrawn from them,” as the kings built up “a massive, four-square structure rising from the wreckage of the half-demolished institutions of the past,” creating “modern institutions . . . within the shattered framework of the feudal system.” And to most Frenchmen, the sweeping transformation—a real French revolution—long remained invisible, even though the functionaries had ensnared the country in a net of regulations and smothered it with forms to be filled out.</span></p><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1302"><span class="cap" data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">B</span></span><span data-dcnode-id="1303" instrument_node="">y the mid-eighteenth century, some of France’s most advanced thinkers—the Physiocrats, whom we remember today as laissez-faire economists—clearly perceived this gigantic governmental machinery and began speculating about the social uses to which it could be put, anticipating not only the whole program of the French Revolution, Tocqueville notes, but also “the subversive theories of what is today known as socialism” and anticipating as well (as he could not know) an almost Leninist totalitarianism. For “socialism and centralization thrive on the same soil; they stand to each other as the cultivated to the wild species of a fruit,” Tocqueville presciently observed.</span></p><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">The Physiocrats were opposed “to deliberative assemblies, to secondary organizations vested with local powers,” and indeed to all mediating institutions, “however venerable and well-founded,” used “by free peoples . . . to curb the domination of a central authority,” Tocqueville writes. Similarly, theories of the separation of governmental powers, one Physiocrat wrote, were “the merest moonshine.” They liked their state power straight.</span></p><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">They would use it to abolish “all class distinctions, all differences of rank.” The “nation was to be composed of individuals almost exactly alike and unconditionally equal,” writes Tocqueville, “even if equality spelled servitude.” They would do away with private property, prescribing life imprisonment for anyone trying to reintroduce it. Everything would be produced under state supervision, placed in state warehouses, and distributed to citizens according to need. All towns would be identically laid out, and all houses the same (for architectural totalitarianism is totalitarianism’s handmaiden). “At the age of five,” wrote one Physiocrat in 1755, “children shall be taken from their parents and educated communally at government expense and on uniform lines.” For, wrote another, as if predicting the advent of New Soviet Man, “The state makes men exactly what it wishes them to be.” And what it wants, wrote the most famous of the Physiocrats, Anne Robert Jacques Turgot, who rose from intendant to Controller General in 1774, is “young men trained to do their duty by the State; patriotic and law-abiding.”</span></p><span data-dcnode-id="1295" instrument_node="">
</span><blockquote class="m_article-quote m_article-quote__small" data-dcnode-id="1277"><span class="quote-content" data-dcnode-id="1292"><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">That giant state machinery was there for Napoleon to create his million-man army and seek to conquer all Europe.</span></p></span><span data-dcnode-id="1291" instrument_node="">
</span><div class="share-links" data-dcnode-id="1278"><a class="share-facebook" data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.city-journal.org/html/end-democracy-america-14332.html%3Fwallit_nosession%3D1"><svg data-dcnode-id="1288" enable-background="new 0 0 500 500" version="1.1" viewBox="0 0 500 500" x="0px" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" y="0px"><g data-dcnode-id="1289" id="fb"><path clip-rule="evenodd" d="M367.9,106.7l-42.3,0c-33.2,0-39.4,15-39.4,37.1v48.7h78.9l-10.3,76h-68.6v195.9h-82.8V268.5h-69.3v-76h69.3v-56.3c0-65.3,41.7-100.6,102.8-100.6c29.2,0,54.3,1.9,61.7,2.8V106.7z" data-dcnode-id="1290" fill-rule="evenodd"></path></g></svg><span data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Share on Facebook</span></span></a><a class="share-twitter" data-dcnode-id="1279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.city-journal.org/html/end-democracy-america-14332.html%3Fwallit_nosession%3D1"><svg data-dcnode-id="1282" version="1.1" viewBox="0 0 500 500" x="0px" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" y="0px"><g data-dcnode-id="1283" id="tw"><path clip-rule="evenodd" d="M437,152.3c0.2,4.2,0.3,8.5,0.3,12.7c0,129.9-96.5,279.7-273,279.7c-54.2,0-104.6-16.3-147.1-44.2c7.5,0.9,15.1,1.4,22.9,1.4c45,0,86.3-15.7,119.1-42.1c-42-0.8-77.5-29.2-89.8-68.3c5.9,1.1,11.6,1.8,17.8,1.8c8.7,0,16.7-1.2,24.7-3.4c-43.9-9-78-48.8-78-96.4c0-0.4,0-0.8,0-1.2c16.7,7.3,28.8,11.8,44.5,12.3c-25.7-17.6-41.6-47.7-41.6-81.8c0-18,4.7-34.9,13-49.4c47.3,59.5,118,98.6,197.8,102.7c-1.6-7.2-2.5-14.7-2.5-22.4c0-54.3,43-98.3,96-98.3c27.6,0,52.5,11.9,70,31.1c21.9-4.4,42.4-12.6,60.9-23.8c-7.2,23-22.4,42.2-42.2,54.4c19.4-2.4,37.9-7.6,55.1-15.5C472,121.1,455.7,138.5,437,152.3z" data-dcnode-id="1284" fill-rule="evenodd"></path></g></svg><span data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Share on Twitter</span></span></a></div></blockquote><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">By 1789, France was a “servile state” that had lost its understanding of liberty. Even Turgot’s friend Voltaire, who so admired English freedom of speech and the press during his London exile from 1726 to 1728, didn’t realize that the freedom he praised depended on the political freedom that “left him indifferent,” Tocqueville writes—even though he was in London because of despotism at home. Another Frenchman in London, Tocqueville wryly reports, spluttered in amazement, “It is the literal truth that the average Englishman consoles himself for having been robbed with the reflection that at any rate his country has no mounted police!” Remarks Tocqueville, “It never occurred to him that these ‘eccentricities’ were bound up with the whole British concept of freedom.” So when the 1789 revolutionaries, constitutional monarchists whom Tocqueville thinks patriotic, unselfish, magnanimous, but woefully inexperienced, set about “transforming the social system, root and branch, and regenerating the whole human race,” they had no idea that since Louis XII, French kings had been “dividing men so as the better to rule them” and that by the end of the eighteenth century, “it would have been impossible to find . . . even ten men used to acting in concert and defending their interests without appealing to the central power for aid.” Nor was there even any personal affection to support the king and aristocracy against the overwhelming, all-devouring resentment of the people. So the ancient monarchy came crashing down, and there was nothing to stop the demons “who carried audacity to the point of sheer insanity” and “acted with unprecedented ruthlessness.”</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1272" instrument_node="">And they could do so because the centralized machinery was in place to carry the reign of terror throughout the nation. “The same conditions which had precipitated the fall of the monarchy made for the absolutism of its successor.” That giant state machinery was there for Napoleon in turn to create his million-man army and set forth to conquer all Europe. And it was still there in 1856, when </span><i data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">The Old Regime</span></i><span data-dcnode-id="1269" instrument_node=""> appeared, and when “the French nation [was] prepared to tolerate in a government that favors and flatters its desire for equality practices and principles that are, in fact, the tools of despotism.”</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1260"><span class="cap" data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">A</span></span><span data-dcnode-id="1264" instrument_node="">s he wrote volume 2 of </span><i data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Democracy</span></i><span data-dcnode-id="1261" instrument_node="">, and especially as he struggled with its conclusion during his first few months in the Chamber of Deputies, Tocqueville perceived the outlines of this French reality and intuited its inextricable connection with the rise of democratic equality, but he hadn’t yet reached a systematic understanding of it. But his were the intuitions of genius, and what he foresaw came to pass not only in Europe but also in the United States, starting half a century after his death.</span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">He liked America’s administrative decentralization—in the 1830s, there were only 12,000-odd U.S. officials, as against France’s 138,000—for its political and cultural effects: “People care about their country’s interests as though they were their own,” he noted. “In its successes they see their own work and are exalted by it.” Matters are different today, now that the federal government has more than 2.7 million employees, state and local governments have 14.3 million, and college students don’t know who won the Civil War or who the U.S. vice president is, and don’t care. Americans have come to resemble the French of Tocqueville’s day, who don’t know what’s happening in their country, are “indifferent to the fate of the place they live in,” and think that the fate of their town and the safety of their streets “have nothing to do with them, that they belong to some powerful stranger called ‘the government.’ ”</span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">As happened in France, a gigantic modern state grew up inside the shell of America’s Founding-era institutions, with few Americans even noticing and most unaware of the magnitude of the revolution even today. We created a giant administrative regime, just as Tocqueville feared, composed of such executive-branch agencies as the Interstate Commerce Commission, the Federal Trade Commission, the Environmental Protection Agency, the Federal Elections Commission, and on and on.</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">As the Physiocrats would have wanted, these agencies don’t bother with the “moonshine” of the separation of powers or due process of law that Tocqueville ranked so high among America’s political virtues and that Woodrow Wilson classed among the “great deal of nonsense” that the Founding Fathers put forth as “the inalienable rights of the individual.” These executive-branch agencies legislate by making binding rules for individuals and corporations, and they then adjudicate and punish infractions of them through juryless administrative courts indistinguishable from those run by the French intendants and the Royal Council, lacking due process and usually with no appeal to the real court system. They provide, to use Tocqueville’s words, “an image of justice rather than justice itself.” Nor, as in the ancien régime, can the victims of these agencies’ absolutism sue them or their functionaries. As for the congress whose legislation gave life to these bodies, it is as much a sham as the old French town corporations or magnificently titled nobles. It does little but seek exemptions from the agencies’ rules for corporate donors—whose companies the agencies’ original rationale was to control. And the Constitution that gave life to the government Tocqueville so cherished is, if not dead, then dying.</span></p><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1246"><span class="cap" data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">W</span></span><span data-dcnode-id="1247" instrument_node="">hat’s more, this Second American Revolution occurred under just the rationale that Tocqueville predicted. Democratic citizens, he wrote, “are willing enough to grant that the power that represents society possesses far more enlightenment and wisdom than any of the men who compose it and that its duty as well as its right is to take each citizen by the hand and guide him.” Accordingly, President Wilson set the administrative state in motion in the name of disinterested government by nonpolitical experts, armed with science, statistics, and professionalism, who, laboring away quietly and selflessly, would advance the common good so much more efficiently than the free action of the collective power of individuals.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">And when the New Deal took administrative government to new depths of unconstitutionality, Franklin Roosevelt and his brain trust used almost Tocquevillian language in explaining why, in the age of giant corporations more powerful than any individual citizen or mediating institution, only an equally mighty government could protect the wee, timorous, cowering individual. “Thus the industrial class needs to be regulated, supervised, and restrained,” wrote Tocqueville, “and it is natural for the prerogatives of government to grow along with it.” The argument will be, Tocqueville predicted, that “as citizens become weaker and less capable, government must be made more skillful and active, so that society can take upon itself what individuals are no longer capable of doing on their own”—a sentiment that could have come from one of FDR’s fireside chats. “Entrenched greed,” charged FDR in 1936, “will take the course of every autocracy of the past—power for themselves, enslavement for the public.”</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Tocqueville couldn’t find a precise enough name for the new oppressiveness that he saw coming into being—saw with a shiver, like those who witness, wondering and secretly afraid, the demonic power of an atom bomb explosion, or like astronauts watching the Earth become an ever smaller blue ball as they hurtle into the silent void, seeing what hitherto only God has seen. “ ‘Despotism’ and ‘tyranny’ will not do.” He groped for a description that would adequately convey the almost otherworldly force he glimpsed in outline, a presence like something out of science fiction, human and yet inhuman.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Over today’s swarming millions of equal, materialistic, utterly isolated individuals, he wrote, “stands an immense tutelary power, which assumes sole responsibility for securing their pleasure and watching over their fate.” This new kind of sovereign, “after taking individuals one by one in his powerful hands and kneading them to his liking,” will spread over society “a fine mesh of uniform, minute, and complex rules,” which constrain even the best and brightest. “He does not break men’s wills but softens, bends, and guides them. He seldom forces anyone to act but consistently opposes action. He does not destroy things but rather prevents them from coming into being. Rather than tyrannize, he inhibits, represses, saps, stultifies, and in the end reduces each nation to nothing but a timid and industrious flock of animals, with the government as its shepherd.”</span></p><span data-dcnode-id="1236" instrument_node="">
</span><blockquote class="m_article-quote m_article-quote__small" data-dcnode-id="1218"><span class="quote-content" data-dcnode-id="1233"><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Today the iron cage of administrative rules prevents new businesses from opening, and old ones from hiring.</span></p></span><span data-dcnode-id="1232" instrument_node="">
</span><div class="share-links" data-dcnode-id="1219"><a class="share-facebook" data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.city-journal.org/html/end-democracy-america-14332.html%3Fwallit_nosession%3D1"><svg data-dcnode-id="1229" enable-background="new 0 0 500 500" version="1.1" viewBox="0 0 500 500" x="0px" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" y="0px"><g data-dcnode-id="1230" id="fb"><path clip-rule="evenodd" d="M367.9,106.7l-42.3,0c-33.2,0-39.4,15-39.4,37.1v48.7h78.9l-10.3,76h-68.6v195.9h-82.8V268.5h-69.3v-76h69.3v-56.3c0-65.3,41.7-100.6,102.8-100.6c29.2,0,54.3,1.9,61.7,2.8V106.7z" data-dcnode-id="1231" fill-rule="evenodd"></path></g></svg><span data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Share on Facebook</span></span></a><a class="share-twitter" data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.city-journal.org/html/end-democracy-america-14332.html%3Fwallit_nosession%3D1"><svg data-dcnode-id="1223" version="1.1" viewBox="0 0 500 500" x="0px" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" y="0px"><g data-dcnode-id="1224" id="tw"><path clip-rule="evenodd" d="M437,152.3c0.2,4.2,0.3,8.5,0.3,12.7c0,129.9-96.5,279.7-273,279.7c-54.2,0-104.6-16.3-147.1-44.2c7.5,0.9,15.1,1.4,22.9,1.4c45,0,86.3-15.7,119.1-42.1c-42-0.8-77.5-29.2-89.8-68.3c5.9,1.1,11.6,1.8,17.8,1.8c8.7,0,16.7-1.2,24.7-3.4c-43.9-9-78-48.8-78-96.4c0-0.4,0-0.8,0-1.2c16.7,7.3,28.8,11.8,44.5,12.3c-25.7-17.6-41.6-47.7-41.6-81.8c0-18,4.7-34.9,13-49.4c47.3,59.5,118,98.6,197.8,102.7c-1.6-7.2-2.5-14.7-2.5-22.4c0-54.3,43-98.3,96-98.3c27.6,0,52.5,11.9,70,31.1c21.9-4.4,42.4-12.6,60.9-23.8c-7.2,23-22.4,42.2-42.2,54.4c19.4-2.4,37.9-7.6,55.1-15.5C472,121.1,455.7,138.5,437,152.3z" data-dcnode-id="1225" fill-rule="evenodd"></path></g></svg><span data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Share on Twitter</span></span></a></div></blockquote><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Under the New Deal’s mesh of minute and complex rules, the sovereign—with the Supreme Court’s blessing—punished a farmer in 1942 for growing grain in excess of his allotted quota, to feed to his own livestock. Today the iron cage of administrative rules prevents new businesses from opening, old ones from hiring, doctors from treating patients as they think best, groups of citizens from uttering political speech, even a landowner from moving a pile of sand from one spot to another on his property, purportedly because it could affect a navigable waterway 50 miles away. It slows projects to a crawl, so that building a bridge, a skyscraper, a power plant takes years—whereas in the old America, the Empire State Building rose in 11 months.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1213" instrument_node="">And today’s sovereign </span><i data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">does</span></i><span data-dcnode-id="1210" instrument_node=""> force men to act as well as suppressing action, so that nuns must provide their employees with birth control that their religion holds to be sinful, bakers must make cakes celebrating homosexual marriages that their religious beliefs abominate, private colleges must regulate their students’ sex lives, banks must lend to deadbeats. The immense tutelary power has turned private charities into government contractors, so that Catholic Charities or Jewish Social Services are neither Catholic nor Jewish—though most public welfare comes direct from the state, from babies’ milk to old people’s health care and pensions, for which only a minority has paid. As Tocqueville observed, “It is the state that has undertaken virtually alone to give bread to the hungry, aid and shelter to the sick, and work to the idle.” In New York State, where even in the 1830s Tocqueville saw administrative centralization taking form, the sovereign has commanded strictly private clubs to change their admissions criteria, so that even the realm of private association is subject to government power. And whatever traditional American mores defined as good and bad, moral and immoral, base and praiseworthy, the sovereign has redefined and redefined until all such ideas have lost their meaning. Is it any wonder that today’s Americans feel that they have no say in how they are governed—or that they don’t understand how that came about?</span></p><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1204"><span class="cap" data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">S</span></span><span data-dcnode-id="1205" instrument_node="">uch oppression is “less degrading” in democracies because, since the citizens elect the sovereign, “each citizen, hobbled and reduced to impotence though he may be, can still imagine that in obeying he is only submitting to himself.” Moreover, democratic citizens love equality more than liberty, and the love of equality grows as equality itself expands. Don’t let him have or be more than me. “The only necessary condition for centralizing public power in a democratic society is to love equality or to make a show of loving it. Thus the science of despotism,” Tocqueville despairingly concluded, “can be reduced . . . to a single principle.”</span></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">But, wonders Tocqueville, is this what human life is for?</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p class="byline" data-dcnode-id="1189"><i data-dcnode-id="1196"><a data-dcnode-id="1198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//city-journal.org/contributor/myron-magnet_123" target="new"><span data-dcnode-id="1199" instrument_node="">Myron Magnet</span></a><span data-dcnode-id="1197" instrument_node="">, </span></i><span data-dcnode-id="1195" instrument_node="">City Journal</span><i data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">’s editor-at-large and its editor from 1994 through 2006, is a recipient of the National Humanities Medal. His latest book is </span></i><a data-dcnode-id="1191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/exec/obidos/ASIN/0393240215/manhattaninstitu/" target="new"><span data-dcnode-id="1192" instrument_node="">The Founders at Home</span></a><span data-dcnode-id="1190" instrument_node="">.</span></p><span data-dcnode-id="1188" instrument_node="">
