e 6 main principles on which the Constitution is based?</span></a></li><li data-dcnode-id="3528"><a data-dcnode-id="3529" href="#What_are_the_5_main_points_of_the_Constitution"><span class="toc_number toc_depth_1" data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">30</span></span><span data-dcnode-id="3530" instrument_node=""> What are the 5 main points of the Constitution?</span></a></li><li data-dcnode-id="3523"><a data-dcnode-id="3524" href="#Is_China_a_democratic_country"><span class="toc_number toc_depth_1" data-dcnode-id="3526"><span data-dcnode-id="3527" instrument_node="">31</span></span><span data-dcnode-id="3525" instrument_node=""> Is China a democratic country?</span></a></li><li data-dcnode-id="3518"><a data-dcnode-id="3519" href="#Is_Russia_a_democracy"><span class="toc_number toc_depth_1" data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">32</span></span><span data-dcnode-id="3520" instrument_node=""> Is Russia a democracy?</span></a></li><li data-dcnode-id="3513"><a data-dcnode-id="3514" href="#What_kind_of_government_is_the_US_under"><span class="toc_number toc_depth_1" data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node="">33</span></span><span data-dcnode-id="3515" instrument_node=""> What kind of government is the US under?</span></a></li><li data-dcnode-id="3508"><a data-dcnode-id="3509" href="#What_is_a_democratic_society_in_education"><span class="toc_number toc_depth_1" data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">34</span></span><span data-dcnode-id="3510" instrument_node=""> What is a democratic society in education?</span></a></li><li data-dcnode-id="3503"><a data-dcnode-id="3504" href="#Core_Democratic_Values_Song"><span class="toc_number toc_depth_1" data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">35</span></span><span data-dcnode-id="3505" instrument_node=""> Core Democratic Values Song</span></a></li><li data-dcnode-id="3498"><a data-dcnode-id="3499" href="#Core_Democratic_Values"><span class="toc_number toc_depth_1" data-dcnode-id="3501"><span data-dcnode-id="3502" instrument_node="">36</span></span><span data-dcnode-id="3500" instrument_node=""> Core Democratic Values</span></a></li><li data-dcnode-id="3493"><a data-dcnode-id="3494" href="#Core_Democratic_Values-2"><span class="toc_number toc_depth_1" data-dcnode-id="3496"><span data-dcnode-id="3497" instrument_node="">37</span></span><span data-dcnode-id="3495" instrument_node=""> Core Democratic Values</span></a></li><li data-dcnode-id="3488"><a data-dcnode-id="3489" href="#Core_Democratic_Values_Overview"><span class="toc_number toc_depth_1" data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">38</span></span><span data-dcnode-id="3490" instrument_node=""> Core Democratic Values Overview</span></a></li></ul></div><span data-dcnode-id="3485" instrument_node="">
</span><h2 data-dcnode-id="3481"><span data-dcnode-id="3482" id="What_Are_Core_Democratic_Values"><span data-dcnode-id="3483" id="What Are Core Democratic Values?"><span data-dcnode-id="3484" instrument_node="">What Are Core Democratic Values?</span></span></span></h2><span data-dcnode-id="3480" instrument_node="">
</span><p data-dcnode-id="3473"><span class="ILfuVd" data-dcnode-id="3474"><span class="hgKElc" data-dcnode-id="3475"><span data-dcnode-id="3479" instrument_node="">Core democratic values are </span><b data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">the fundamental beliefs and Constitutional principles of American society</span></b><span data-dcnode-id="3476" instrument_node="">, which unite all Americans. These values are expressed in the Declaration of Independence, the United States Constitution and other significant documents, speeches and writings of the nation.</span></span></span></p><span data-dcnode-id="3472" instrument_node="">
</span><h2 data-dcnode-id="3468"><span data-dcnode-id="3469" id="What_are_the_5_core_democratic_values"><span data-dcnode-id="3470" id="What are the 5 core democratic values?"><span data-dcnode-id="3471" instrument_node="">What are the 5 core democratic values?</span></span></span></h2><span data-dcnode-id="3467" instrument_node="">
</span><p data-dcnode-id="3461"><span class="hgKElc" data-dcnode-id="3462"><span data-dcnode-id="3466" instrument_node="">Definition of Core Democratic Values? Fundamental beliefs and constitutional principles of our society, which unite all Americans. They include the ideas </span><b data-dcnode-id="3464"><span data-dcnode-id="3465" instrument_node="">of life, liberty, the pursuit of happiness, justice, equality, diversity, truth, popular sovereignty, patriotism, and the rule of law</span></b><span data-dcnode-id="3463" instrument_node="">.</span></span></p><span data-dcnode-id="3460" instrument_node="">
</span><h2 data-dcnode-id="3456"><span data-dcnode-id="3457" id="What_are_the_4_democratic_values"><span data-dcnode-id="3458" id="What are the 4 democratic values?"><span data-dcnode-id="3459" instrument_node="">What are the 4 democratic values?</span></span></span></h2><span data-dcnode-id="3455" instrument_node="">
</span><p data-dcnode-id="3452"><span class="hgKElc" data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">Democratic Values The ideas or beliefs that make a society fair, including: democratic decision-making, freedom of speech, equality before the law, social justice, equality, social justice.</span></span></p><span data-dcnode-id="3451" instrument_node="">
</span><h2 data-dcnode-id="3447"><span data-dcnode-id="3448" id="What_are_the_3_core_democratic_values"><span data-dcnode-id="3449" id="What are the 3 core democratic values?"><span data-dcnode-id="3450" instrument_node="">What are the 3 core democratic values?</span></span></span></h2><span data-dcnode-id="3446" instrument_node="">
</span><p data-dcnode-id="3443"><span class="hgKElc" data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">“Life, liberty and the pursuit of happiness.” This is the most quoted phrase from the Declaration of Independence. The words are important to Americans. … You know these words because of your social studies lessons. In Michigan, these are part of what we call the Core Democratic Values.</span></span></p><span data-dcnode-id="3442" instrument_node="">
</span><h2 data-dcnode-id="3438"><span data-dcnode-id="3439" id="What_are_the_core_values_of_American_democracy"><span data-dcnode-id="3440" id="What are the core values of American democracy?"><span data-dcnode-id="3441" instrument_node="">What are the core values of American democracy?</span></span></span></h2><span data-dcnode-id="3437" instrument_node="">
</span><p data-dcnode-id="3432"><span class="hgKElc" data-dcnode-id="3433"><b data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">Liberty and equality</span></b><span data-dcnode-id="3434" instrument_node="">. These words represent basic values of democratic political systems, including that of the United States. Rule by absolute monarchs and emperors has often brought peace and order, but at the cost of personal freedoms.</span></span></p><span data-dcnode-id="3431" instrument_node="">
</span><h2 data-dcnode-id="3427"><span data-dcnode-id="3428" id="What_are_the_main_democratic_ideals"><span data-dcnode-id="3429" id="What are the main democratic ideals?"><span data-dcnode-id="3430" instrument_node="">What are the main democratic ideals?</span></span></span></h2><span data-dcnode-id="3426" instrument_node="">
</span><p data-dcnode-id="3423"><span class="hgKElc" data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">These individual freedoms include freedom of speech, freedom of assembly, freedom of religion and the right to a fair trial. Voter enfranchisement and political participation are two key democratic ideals that ensure the engagement of citizens in the political sphere.</span></span></p><span data-dcnode-id="3422" instrument_node="">
</span><h2 data-dcnode-id="3418"><span data-dcnode-id="3419" id="What_are_the_7_democratic_principles_of_the_US_Constitution"><span data-dcnode-id="3420" id="What are the 7 democratic principles of the US Constitution?"><span data-dcnode-id="3421" instrument_node="">What are the 7 democratic principles of the US Constitution?</span></span></span></h2><span data-dcnode-id="3417" instrument_node="">
</span><p data-dcnode-id="3411"><span class="hgKElc" data-dcnode-id="3412"><span data-dcnode-id="3416" instrument_node="">The Constitution rests on seven basic principles. They are </span><b data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">popular sovereignty, limited government, separation of powers, federalism, checks and balances, republicanism, and individual rights</span></b><span data-dcnode-id="3413" instrument_node="">.</span></span></p><span data-dcnode-id="3410" instrument_node="">
</span><h2 data-dcnode-id="3406"><span data-dcnode-id="3407" id="What_are_the_main_principles_of_democracy"><span data-dcnode-id="3408" id="What are the main principles of democracy?"><span data-dcnode-id="3409" instrument_node="">What are the main principles of democracy?</span></span></span></h2><span data-dcnode-id="3405" instrument_node="">

</span><div class="wDYxhc" data-dcnode-id="810" data-md="61" style="clear:none"><span data-dcnode-id="3094" instrument_node="">
</span><div aria-level="3" class="LGOjhe" data-attrid="wa:/description" data-dcnode-id="811" data-hveid="CAgQAA" role="heading"><span class="ILfuVd" data-dcnode-id="3088"><span class="hgKElc" data-dcnode-id="3089"><span data-dcnode-id="3093" instrument_node="">In a pure democracy, laws are made directly by the voting majority leaving the rights of the minority largely unprotected. In a republic, </span><b data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">laws are made by representatives chosen by the people and must comply with a constitution that</span></b><span data-dcnode-id="3090" instrument_node=""> specifically protects the rights of the minority from the will of the majority.</span></span></span><p data-dcnode-id="3087"></p><span data-dcnode-id="3086" instrument_node="">
</span><h2 data-dcnode-id="3082"><span data-dcnode-id="3083" id="What_are_the_6_main_principles_on_which_the_Constitution_is_based"><span data-dcnode-id="3084" id="What are the 6 main principles on which the Constitution is based?"><span data-dcnode-id="3085" instrument_node="">What are the 6 main principles on which the Constitution is based?</span></span></span></h2><span data-dcnode-id="3081" instrument_node="">
</span><p data-dcnode-id="3075"><span class="hgKElc" data-dcnode-id="3076"><span data-dcnode-id="3080" instrument_node="">The six underlying principles of the Constitution are </span><b data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">popular sovereignty, federalism, separation of powers, checks and balances, judicial review, and limited government</span></b><span data-dcnode-id="3077" instrument_node="">.</span></span></p><span data-dcnode-id="3074" instrument_node="">
</span><h2 data-dcnode-id="3070"><span data-dcnode-id="3071" id="What_are_the_5_main_points_of_the_Constitution"><span data-dcnode-id="3072" id="What are the 5 main points of the Constitution?"><span data-dcnode-id="3073" instrument_node="">What are the 5 main points of the Constitution?</span></span></span></h2><span data-dcnode-id="3069" instrument_node="">
</span><div class="di3YZe" data-dcnode-id="812"><span data-dcnode-id="3068" instrument_node="">
</span><div aria-level="3" class="co8aDb" data-dcnode-id="3065" role="heading"><b data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">5 Basic Principles of the US Constitution</span></b></div><span data-dcnode-id="3064" instrument_node="">
</span><div class="RqBzHd" data-dcnode-id="813"><span data-dcnode-id="3063" instrument_node="">
</span><ul class="i8Z77e" data-dcnode-id="3046"><span data-dcnode-id="3062" instrument_node="">
</span><li class="TrT0Xe" data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node=""> Popular sovereignty.</span></li><span data-dcnode-id="3059" instrument_node="">
</span><li class="TrT0Xe" data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node=""> Limited government.</span></li><span data-dcnode-id="3056" instrument_node="">
</span><li class="TrT0Xe" data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node=""> Separation of powers.</span></li><span data-dcnode-id="3053" instrument_node="">
</span><li class="TrT0Xe" data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node=""> Checks and balances.</span></li><span data-dcnode-id="3050" instrument_node="">
</span><li class="TrT0Xe" data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node=""> Federalism.</span></li><span data-dcnode-id="3047" instrument_node="">
</span></ul><span data-dcnode-id="3045" instrument_node="">
</span><div data-dcnode-id="3035" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="uaba7968dac9f140e20bf76737580ee0b" data-dcnode-id="3036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lisbdnet.com/what-is-the-climate-of-the-boreal-forest/" rel="dofollow" target="_blank"><div data-dcnode-id="3037" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">See also</span></span><span data-dcnode-id="3040" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">what is the climate of the boreal forest</span></span></div></a></div><h2 data-dcnode-id="3031"><span data-dcnode-id="3032" id="Is_China_a_democratic_country"><span data-dcnode-id="3033" id="Is China a democratic country?"><span data-dcnode-id="3034" instrument_node="">Is China a democratic country?</span></span></span></h2><span data-dcnode-id="3030" instrument_node="">
</span><p data-dcnode-id="3027"><span class="hgKElc" data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">China is not a democracy. It is an authoritarian state which has been characterized as totalitarian surveillance state, and a dictatorship. During a visit to Europe in 2014, Chinese Communist Party general secretary Xi Jinping said that a multi-party system would not work for China.</span></span></p><span data-dcnode-id="3026" instrument_node="">
</span><h2 data-dcnode-id="3022"><span data-dcnode-id="3023" id="Is_Russia_a_democracy"><span data-dcnode-id="3024" id="Is Russia a democracy?"><span data-dcnode-id="3025" instrument_node="">Is Russia a democracy?</span></span></span></h2><span data-dcnode-id="3021" instrument_node="">
</span><p data-dcnode-id="3018"><span class="hgKElc" data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">The 1993 constitution declares Russia a democratic, federative, law-based state with a republican form of government. State power is divided among the legislative, executive, and judicial branches. Diversity of ideologies and religions is sanctioned, and a state or compulsory ideology may not be adopted.</span></span></p><span data-dcnode-id="3017" instrument_node="">
</span><h2 data-dcnode-id="3013"><span data-dcnode-id="3014" id="What_kind_of_government_is_the_US_under"><span data-dcnode-id="3015" id="What kind of government is the US under?"><span data-dcnode-id="3016" instrument_node="">What kind of government is the US under?</span></span></span></h2><span data-dcnode-id="3012" instrument_node="">
</span><p data-dcnode-id="3006"><span class="hgKElc" data-dcnode-id="3007"><span data-dcnode-id="3011" instrument_node="">The Constitution establishes </span><b data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">a federal democratic republic form</span></b><span data-dcnode-id="3008" instrument_node=""> of government. That is, we have an indivisible union of 50 sovereign States. It is a democracy because people govern themselves. It is representative because people choose elected officials by free and secret ballot.</span></span></p><span data-dcnode-id="3005" instrument_node="">
</span><h2 data-dcnode-id="3001"><span data-dcnode-id="3002" id="What_is_a_democratic_society_in_education"><span data-dcnode-id="3003" id="What is a democratic society in education?"><span data-dcnode-id="3004" instrument_node="">What is a democratic society in education?</span></span></span></h2><span data-dcnode-id="3000" instrument_node="">
</span><div class="wDYxhc" data-dcnode-id="814" data-md="61" style="clear:none"><span data-dcnode-id="2999" instrument_node="">
</span><div aria-level="3" class="LGOjhe" data-attrid="wa:/description" data-dcnode-id="859" data-hveid="CAcQAA" role="heading"><span class="ILfuVd" data-dcnode-id="2993"><span class="hgKElc" data-dcnode-id="2994"><span data-dcnode-id="2998" instrument_node="">The purpose of education in a democratic society is </span><b data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">to instill the values of cooperation, fairness and justice into the hearts of our students</span></b><span data-dcnode-id="2995" instrument_node="">. I want my students to have a voice in how they can demonstrate their knowledge as well as how they are assessed academically. …</span></span></span><p data-dcnode-id="2992"></p><span data-dcnode-id="2991" instrument_node="">
</span><h2 data-dcnode-id="2987"><span data-dcnode-id="2988" id="Core_Democratic_Values_Song"><span data-dcnode-id="2989" id="Core Democratic Values Song"><span data-dcnode-id="2990" instrument_node="">Core Democratic Values Song</span></span></span></h2><span data-dcnode-id="2986" instrument_node="">
