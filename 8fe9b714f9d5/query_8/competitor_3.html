</span><meta content="This paper introduces the importance of Democratic Values and place the role of teachers in the present democratic world. India is the solitary country in the world where greater importance is attached to the teacher. Schools are places where democratic ideals such as equality, freedom, justice are instilled in individuals. Teachers are the ultimate instruments of change. For democracy to continue to thrive, children must be taught to value it as a way of life. The necessary skills for building democracy do not develop automatically in children. Teaching democracy means preparing children to become citizens who will preserve and shape democracy in the future. Therefore democracy should be a key aspect in every form of education at the earliest age possible. Children should learn about taking responsibility for their action. These educational outcomes are only possible through action. While key concepts of democracy should be understood by children, living and acting in a democratic environment is the only and the best exercise. Schools, institutions, children’s clubs and organizations and even families that respect democratic principles and have real democratic structures function as the best models to help children learn what democracy is about. The qualities like tolerance, acceptance, a wider view, global awareness, reflection and equal justice rests within the teachers to shape the child in all possible ways to face this competitive world of today. Teachers' beliefs, thoughts and decisions on educational matters occupy the major part of the psychological context of teaching process. Teacher educators should democratize their pedagogy so that their trainees learn understandings and skills of democratic practice throughout their training experience. The appropriate balance between critical components skills, knowledge and dispositions, on one hand, and an open, dynamic and critically engaged curriculum, and teaching and learning conceptual framework, on the other hand has not yet been attained." data-dcnode-id="1345" name="Description"><span data-dcnode-id="1344" instrument_node="">

</span></p><h3 data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">
                                            Abstract</span></h3><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="945"></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">
                                        This paper introduces the importance of Democratic Values and place the role of teachers in the present democratic world. India is the solitary country in the world where greater importance is attached to the teacher. Schools are places where democratic ideals such as equality, freedom, justice are instilled in individuals. Teachers are the ultimate instruments of change. For democracy to continue to thrive, children must be taught to value it as a way of life. The necessary skills for building democracy do not develop automatically in children. Teaching democracy means preparing children to become citizens who will preserve and shape democracy in the future. Therefore democracy should be a key aspect in every form of education at the earliest age possible. Children should learn about taking responsibility for their action. These educational outcomes are only possible through action. While key concepts of democracy should be understood by children, living and acting in a democratic environment is the only and the best exercise. Schools, institutions, children’s clubs and organizations and even families that respect democratic principles and have real democratic structures function as the best models to help children learn what democracy is about. The qualities like tolerance, acceptance, a wider view, global awareness, reflection and equal justice rests within the teachers to shape the child in all possible ways to face this competitive world of today. Teachers' beliefs, thoughts and decisions on educational matters occupy the major part of the psychological context of teaching process. Teacher educators should democratize their pedagogy so that their trainees learn understandings and skills of democratic practice throughout their training experience. The appropriate balance between critical components skills, knowledge and dispositions, on one hand, and an open, dynamic and critically engaged curriculum, and teaching and learning conceptual framework, on the other hand has not yet been attained.</span></p><span data-dcnode-id="941" instrument_node="">

</span><a data-dcnode-id="817" name="Sec1"></a><h3 data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">1. Introduction</span></h3><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">India’s political and social life is passing through a phase which poses the danger of erosion to long accepted values. Increasingly, there is an explicit, as well as an implicit, need to stress democratic values and engagement in education in order to bolster democracy. The goals of secularism, socialism and professional ethics are coming under increasing strain. To make teachers aware of this menace, teacher education needs to devise new strategies for enabling teachers to address this task. India is the solitary country in the world where greater importance is attached to the teacher. The founding fathers of Indian Constitution solemnly resolved ‘to constitute India into a sovereign, socialist, secular and democratic republic and to secure to all its citizens: justice-social, economic and political; liberty of thought, expression, faith, belief and worship, equality of status and opportunity; and to promote among them all fraternity assuring the dignity of the individual and the integrity of the nation’. The National Curriculum Framework (NCF, 2005), strongly advocates values like cooperation, respect for human rights, tolerance, justice, responsible citizenship, diversity, reverence towards democracy and peaceful conflict resolution. It also delineates education for peace as a significant national and global issue if teachers are to make positive contribution to the realization of the constitutional goals, pre-service and in-service education of teachers needs to give up its neutral stance and commit itself to attaining these goals. The primary purpose of this study is to put into place the role of teachers in the past and in the present democratic world.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">The success and the achievements of an educational system depend to a great extent on the ideals that animate the teacher and the student. The changes that took place in schools have changed the role of teachers, too. In the past teachers used to be the major source of knowledge, the leader and educator of their students’ school life. Teachers would organize after-school activities. Nowadays teachers provide information and show their students how to tackle them. Teachers are the ultimate instruments of change. The qualities like tolerance, acceptance, a wider view, global awareness, reflection and equal justice rests within the teachers to shape the child in all possible ways to face this competitive world of today. Teaching is democratic and noblest of all the professions as the teacher’s role is highly significant in shaping and molding the future of a nation by tending the youth minds as the architects of the future generation. The National Policy of Education (1986) also highlighted the need of education for values in removing intolerance, violence, superstition and upholding social, cultural and scientific principles to make India a secular, democratic and progressive nation taking pride in its cultural heritage</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="808" instrument_node="">The teacher is the pivot in Education. Besides knowledgeable information, a teacher imparts emotional and moral moorings, volatization of approach, deep sense of understanding, student psyche, communication skill and interaction with students and above all the sense of humor to make the classroom lively. An ideal teacher should be fair, should motivate the students and should have a passion for teaching. In a country like India, democratic values are reflected in all walks of life and in all aspects of society. How young people experience classroom practice is directly linked to the teaching-learning experiences they encounter. Teacher education programs are considered as gatekeepers to the teaching profession. Classroom practice in contemporary India is largely seen to be determined by “what is taught” and “how it is taught.” A growing body of research shows that teachers’ sense of efficacy is connected to their commitment to teaching </span><sup data-dcnode-id="803"><span data-dcnode-id="807" instrument_node="">[</span><a data-dcnode-id="805" href="#Reference1" name="BRef1" title="Coladarci, T. (1992). Teachers' Sense of Efficacy and Commitment to Teaching. Journal of Experimental Education, Vol. 60, 1992. Retrieved May 20, 2010, from http://www.questia.com/."><span data-dcnode-id="806" instrument_node="">1</span></a><span data-dcnode-id="804" instrument_node="">]</span></sup><span data-dcnode-id="802" instrument_node="">, their attitudes towards using innovative instructional strategies </span><sup data-dcnode-id="794"><span data-dcnode-id="801" instrument_node="">[</span><a data-dcnode-id="799" href="#Reference2" name="BRef2" title="Swars, S.L. (2005). Examining perceptions of mathematics teaching effectiveness among elementary preservice teachers with differing levels of mathematics teacher efficacy. Journal of Instructional Psychology, 32 (2), 139-147."><span data-dcnode-id="800" instrument_node="">2</span></a><span data-dcnode-id="798" instrument_node="">, </span><a data-dcnode-id="796" href="#Reference3" name="BRef3" title="Eslami, Z. R. and Fatahi, A. (2008). Teachers’ Sense of Self-Efficacy, English Proficiency,and Instructional Strategies: A Study of Nonnative EFL Teachers in Iran. TESL-EJ, 11 (4) (March). Retrieved May 13, 2010, from http://tesl-ej.org/ej44/a1.pdf."><span data-dcnode-id="797" instrument_node="">3</span></a><span data-dcnode-id="795" instrument_node="">]</span></sup><span data-dcnode-id="793" instrument_node="">, students’ academic achievement </span><sup data-dcnode-id="788"><span data-dcnode-id="792" instrument_node="">[</span><a data-dcnode-id="790" href="#Reference4" name="BRef4" title="Caprara, G.V., Barbranelli, C., Steca, P., Malone, P.S. (2006). Teachers' Self-Efficacy Beliefs as Determinants of Job Satisfaction and Students' Academic Achievement: A Study at the School Level. Journal of School Psychology, 44 (6), 473-490."><span data-dcnode-id="791" instrument_node="">4</span></a><span data-dcnode-id="789" instrument_node="">]</span></sup><span data-dcnode-id="787" instrument_node="">, and motivation </span><sup data-dcnode-id="782"><span data-dcnode-id="786" instrument_node="">[</span><a data-dcnode-id="784" href="#Reference5" name="BRef5" title="Guskey, T.R and Passaro, P.D. (1994). Teacher Efficacy: A study of Construct Dimensions.American Educational Research Journal, 31 (3). (Autumn), 627-643."><span data-dcnode-id="785" instrument_node="">5</span></a><span data-dcnode-id="783" instrument_node="">]</span></sup><span data-dcnode-id="781" instrument_node="">. In addition, it has also been found to be related to teachers’ behavior in the classroom, their attitudes to teaching, stress and burn-out and their willingness to implement innovation </span><sup data-dcnode-id="776"><span data-dcnode-id="780" instrument_node="">[</span><a data-dcnode-id="778" href="#Reference6" name="BRef6" title="Tschanen-Moran, M., Woolfolk Hoy, A., Woolfolk Hoy, K. (1998). Teacher efficacy: Its meaning and measure. Review of Educational Research, 68, 202-248."><span data-dcnode-id="779" instrument_node="">6</span></a><span data-dcnode-id="777" instrument_node="">]</span></sup><span data-dcnode-id="775" instrument_node="">. Similarly, the literature shows that teacher effectiveness is supported by democratic values and beliefs of teachers </span><sup data-dcnode-id="770"><span data-dcnode-id="774" instrument_node="">[</span><a data-dcnode-id="772" href="#Reference7" name="BRef7" title="Shechtman, Z. (2002). Validation of the Democratic Teacher Belief Scale (DTBS).Assessment in Education: Principles, Policy &amp; Practice, 9, 363-377."><span data-dcnode-id="773" instrument_node="">7</span></a><span data-dcnode-id="771" instrument_node="">]</span></sup><span data-dcnode-id="769" instrument_node="">.</span></p><span data-dcnode-id="767" instrument_node="">
</span><a data-dcnode-id="766" name="Sec2"></a><h3 data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">2. Concept of Democracy</span></h3><p data-dcnode-id="756"><span data-dcnode-id="763" instrument_node="">Democracy is regarded as a ‘way of life’ interrelated with the perceptions and assumptions, common experiences of individuals and it is about living together </span><sup data-dcnode-id="758"><span data-dcnode-id="762" instrument_node="">[</span><a data-dcnode-id="760" href="#Reference8" name="BRef8" title="Dewey, J. (1916). Democracy and Education, An Introduction to the Philosophy of Education. New York, Macmillan."><span data-dcnode-id="761" instrument_node="">8</span></a><span data-dcnode-id="759" instrument_node="">]</span></sup><span data-dcnode-id="757" instrument_node="">. So, it can be state that democracy is not a static concept but a dynamic, active and changing process.</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="754" instrument_node="">Democracy is based on faith in the dignity and worth of every single individual as a human being. … The object of a democratic education is, therefore, the full, all-round development of every individual’s personality. … i.e. an education to initiate the students into the many-sided art of living in a community. It is obvious, however, that an individual cannot live and develop alone. … No education is worth the name which does not inculcate the qualities necessary for living graciously, harmoniously and efficiently with one’s fellow men </span><sup data-dcnode-id="749"><span data-dcnode-id="753" instrument_node="">[</span><a data-dcnode-id="751" href="#Reference9" name="BRef9" title="Secondary Education Commission, 1952-53."><span data-dcnode-id="752" instrument_node="">9</span></a><span data-dcnode-id="750" instrument_node="">]</span></sup><span data-dcnode-id="748" instrument_node="">.</span></p><span data-dcnode-id="746" instrument_node="">
</span><a data-dcnode-id="745" name="Sec3"></a><h3 data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">3. Concept of Democratic Values</span></h3><p data-dcnode-id="714"><span data-dcnode-id="742" instrument_node="">Shechtman </span><sup data-dcnode-id="737"><span data-dcnode-id="741" instrument_node="">[</span><a data-dcnode-id="739" href="#Reference7" name="BRef7" title="Shechtman, Z. (2002). Validation of the Democratic Teacher Belief Scale (DTBS).Assessment in Education: Principles, Policy &amp; Practice, 9, 363-377."><span data-dcnode-id="740" instrument_node="">7</span></a><span data-dcnode-id="738" instrument_node="">]</span></sup><span data-dcnode-id="736" instrument_node=""> stated the democratic values or beliefs that a teacher should have are freedom, equality, and justice. Winfield and Manning </span><sup data-dcnode-id="731"><span data-dcnode-id="735" instrument_node="">[</span><a data-dcnode-id="733" href="#Reference10" name="BRef10" title="Winfield, L. F. &amp; Manning, J. B. (1992) Changing school culture to accommodate student Difference, in: M. E. Dilworth (Ed.) Difference in Teacher Education: new expectations (San Francisco, CA, Jossey-Bass)."><span data-dcnode-id="734" instrument_node="">10</span></a><span data-dcnode-id="732" instrument_node="">]</span></sup><span data-dcnode-id="730" instrument_node=""> enumerated democratic values or principles as autonomy, cooperation, shared decision-making, and a sense of community. Kincal and Isik </span><sup data-dcnode-id="725"><span data-dcnode-id="729" instrument_node="">[</span><a data-dcnode-id="727" href="#Reference11" name="BRef11" title="Kincal, R., &amp; Isik, H. (2003) Demokratik egitim ve demokratik degerler. [Democratic education and democratic values] Egitim Arastirmalari [Eurasian Journal of Educational Research]. 11, 54-58."><span data-dcnode-id="728" instrument_node="">11</span></a><span data-dcnode-id="726" instrument_node="">]</span></sup><span data-dcnode-id="724" instrument_node=""> numerated the democratic values that take place in literature as equality, respect life, justice, freedom, honesty, the search for goodness, cooperation, self-esteem, tolerance, sensibility, responsibility, acceptance of difference, safety, peace, development, perfection, and effectiveness. Establishing democracy mostly depends on the understanding, skills and attitudes of people which would be the primary responsibility of education. Education is not the only source for establishing a democratic culture; family, media and other institutions contribute to this process as well. However, schools have the essential role in this process as they maintain structured and formal educational programmes </span><sup data-dcnode-id="719"><span data-dcnode-id="723" instrument_node="">[</span><a data-dcnode-id="721" href="#Reference12" name="BRef12" title="Doğ anay, A. (1997). Türk politik kültürü ve gençligin eğ itimi. Çukurova Üniversitesi Egitim Fakültesi Dergisi, 2 (16), 51-61."><span data-dcnode-id="722" instrument_node="">12</span></a><span data-dcnode-id="720" instrument_node="">]</span></sup><span data-dcnode-id="718" instrument_node="">. Howe and Covell</span><b data-dcnode-id="716"><span data-dcnode-id="717" instrument_node=""> </span></b><span data-dcnode-id="715" instrument_node="">claim that "democratic values must be reflected in both the formal curricula, through explicit teaching, and throughout the hidden curriculum codes of conduct, mission statements and classroom interactions that model democracy and respect for the rights of all." Democratic citizenship can emerge by reflecting education through democratic values in both curricula. In this direction, we are responsible for helping children develop an appreciation of core democratic values and we must help them develop a sense of commitment and attachment to those values.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="712" instrument_node="">Mere knowledge of democratic processes is not deemed sufficient for ensuring that the student will grow up to become an active participant in the democratic processes. What is important is that the students understand the meaning of democracy in terms of social justice and equality. It is also important that they understand the real world issues to meaningfully participate in discussions and decision making. But most importantly the students should learn to respect democratic values. Therefore NCF 2005 emphasizes not on merely learning democracy as a political system but adopting democracy as a way of life. Teacher has to play an important role in ensuring that the students understand not merely the form but spirit of democracy. Teaching democracy in the classroom means incorporating the values of democracy, using a democratic approach to teaching that enables students to practice democracy, and providing a safe environment where students can take risks and where they can actively participate in the learning process. Kesici also suggests that teachers who want to practice democracy should demonstrate their beliefs by giving importance to democratic values in their classrooms. He feels that a democratic teacher should hold democratic values in high esteem and adopt appropriate teaching methods in accordance with those values. Shechtman </span><sup data-dcnode-id="707"><span data-dcnode-id="711" instrument_node="">[</span><a data-dcnode-id="709" href="#Reference7" name="BRef7" title="Shechtman, Z. (2002). Validation of the Democratic Teacher Belief Scale (DTBS).Assessment in Education: Principles, Policy &amp; Practice, 9, 363-377."><span data-dcnode-id="710" instrument_node="">7</span></a><span data-dcnode-id="708" instrument_node="">]</span></sup><span data-dcnode-id="706" instrument_node=""> sums up this line of thought by stating that, “If democracy is to become a way of life in western societies, we certainly need teachers with a strong commitment to democratic education.”</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="703" instrument_node="">Democratic education and citizenship understanding will not develop without strong democratic leadership (Knight). According to Gutmann, it takes effective teachers to convey the importance and substance of the skills and virtues of citizenship (McDonnell). The more a teacher understands democracy and incorporates it in the classroom the more it will be understood by students. Kesici states, “The teacher is the key factor in the process of building a democratic classroom”. Citing Hepburn and Selvi </span><sup data-dcnode-id="698"><span data-dcnode-id="702" instrument_node="">[</span><a data-dcnode-id="700" href="#Reference13" name="BRef13" title="Selvi, K. (2006). Developing a teacher trainees' democratic values scale: validity and reliability analyses. Social Behavior and Personality, 34 (9), 1171-1178."><span data-dcnode-id="701" instrument_node="">13</span></a><span data-dcnode-id="699" instrument_node="">]</span></sup><span data-dcnode-id="697" instrument_node="">, he suggests that teachers should use appropriate teaching methods so that students can easily express themselves and their thoughts and ideas. A democratic teacher also needs to be fair, applying rules uniformly and listening to student explanations for misbehavior before making decisions.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="694" instrument_node="">With respect to rights, Kesici in stating that teachers should help students understand about their right to make a choice for themselves and teach them how to use this right. Kesici explains that one of the duties of the teacher in a democratic classroom is to develop a positive education process, which includes creating a cooperative learning environment, respecting students, and motivating them to develop their social relations sufficiently Kesici states that students must feel free to think and be creative and be comfortable enough to conduct discussions openly. In other words, the environment must be safe enough for students to take risks. A democratic classroom provides a safe and active learning environment where student rights are guaranteed. Kıncal and Iş ıık </span><sup data-dcnode-id="689"><span data-dcnode-id="693" instrument_node="">[</span><a data-dcnode-id="691" href="#Reference11" name="BRef11" title="Kincal, R., &amp; Isik, H. (2003) Demokratik egitim ve demokratik degerler. [Democratic education and democratic values] Egitim Arastirmalari [Eurasian Journal of Educational Research]. 11, 54-58."><span data-dcnode-id="692" instrument_node="">11</span></a><span data-dcnode-id="690" instrument_node="">]</span></sup><span data-dcnode-id="688" instrument_node=""> identify the democratic values as justice, equality, freedom, respect for life, collaboration, self efficacy, honesty, tolerance, sensitivity, searching for effectiveness, responsibility, respect for differences, security, improvement and perfection. Kepenekçi </span><sup data-dcnode-id="683"><span data-dcnode-id="687" instrument_node="">[</span><a data-dcnode-id="685" href="#Reference14" name="BRef14" title="Kepenekçi (2003) Demokratik Okul. Eğ itim Araș tıırmalarıı Dergisi, 11, 44-53."><span data-dcnode-id="686" instrument_node="">14</span></a><span data-dcnode-id="684" instrument_node="">]</span></sup><span data-dcnode-id="682" instrument_node=""> discussed the relationship between democratic values and democratic education. They suggest that democratic values need to be a part of family and school for democratic education. Özpolat (2010) identifies human and student centered education, civil rights, skill teaching, self development, value education, and respecting social rules as the basic components of democratic education. He also argues that the focus needs to be on democratic education rather than democracy education and therefore teachers need to not only believe in these values and components but also practice them in their classrooms </span><sup data-dcnode-id="677"><span data-dcnode-id="681" instrument_node="">[</span><a data-dcnode-id="679" href="#Reference15" name="BRef15" title="Özpolat, A. (2010). Bir Toplumsal Değ iș me Paradigmasıı Olarak Demokrasinin Eğ itime Yansımaları: Demokratik Eğ itim. Milli Eğ itim, 185 (kış), 365-380."><span data-dcnode-id="680" instrument_node="">15</span></a><span data-dcnode-id="678" instrument_node="">]</span></sup><span data-dcnode-id="676" instrument_node="">.</span></p><span data-dcnode-id="674" instrument_node="">
</span><a data-dcnode-id="673" name="Sec4"></a><h3 data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">4. Teacher and Democratic Teaching</span></h3><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">The teacher's role should be transformed from a traditional didactic, authoritarian one to a facilitating, personal role. Schools can and should play a major role in preparing citizens to play their democratic roles in adult life. For democratic teaching to succeed in schools it must be conceptualized and practiced as a dialogue between students and the teacher. It is not sufficient that teaching is organized democratically, what is taught and how it is taught must be negotiated and subsequently evaluated. It is clear that teacher education and teacher development is central in any process of educational change. If teachers are, for example, to teach democratically, then they are better placed to do this if they have experienced a democratic teacher education for themselves.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="667" instrument_node="">Schools are places where democratic ideals such as equality, freedom, justice are instilled in individuals. In this challenging endeavor teachers have a key role to play no matter what their subject area is, for they determine what will be taught and how it will be taught regarding democracy education. Teachers' beliefs, thoughts and decisions on educational matters occupy the major part of the psychological context of teaching process. Educators should demonstrate respect for children by establishing children’s decision making bodies and peer mediation, trusting children to organize their events and empowering children to explore issues, to discuss, to formulate opinion, to debate and to propose strategies to deal with conflict and achieve reasonable goals. Such experiences of participation are especially empowering for children, helping them to understand that participation is a worthwhile effort Teachers reflect on their behavior towards their pupils and on their teaching decisions and actions in general.</span><b data-dcnode-id="665"><span data-dcnode-id="666" instrument_node=""> </span></b><span data-dcnode-id="664" instrument_node="">Parker, writes “schools play such a pivotal role since citizens of a democracy are created, not born. Liston &amp; Zeichner</span><b data-dcnode-id="662"><span data-dcnode-id="663" instrument_node=""> </span></b><span data-dcnode-id="661" instrument_node="">suggest that "teacher educators must enable prospective teachers not only to formulate good reasons for their educational plans but also to identify those social beliefs and conditions of schooling that are obstacles to a democratic education."Surely, the most important component of the formal educational programmes is the teacher. Therefore, teachers need to have not only an understanding of democratic society, values, behavior and attitudes but also need to practice this knowledge and understanding in the classroom otherwise pure information about democracy would not work out in the long term (Ravitc). Democratic management within Teacher Education Institutions (TEIs) would seem essential because it cultivates within these institutions an environment which produces lecturers and students who are not just skilled and knowledgeable but also politically wise, dedicated to democratic ideals and 'who are prepared to acknowledge their future responsibility for the rights of others' (Davies).</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Teacher educators should democratize their pedagogy so that their trainees learn understandings and skills of democratic practice throughout their training experience. This involves critical questioning as well as establishing the 'rules' of democratic interchange in classes and lectures. The role of teachers is to provide a safe space for children to express themselves, and simultaneously to build in certain forms of interactions. They need to step out of the role of ‘moral authority’ and learn to listen with empathy and without judgment, and to enable children to listen to each other. An atmosphere of trust would make the classroom a safe space, where children can share experiences, where conflict can be acknowledged and constructively questioned, and where resolutions, however tentative, can be mutually worked out. In particular, for girls and children from under-privileged social groups, schools and classrooms should be spaces for discussing processes of decision making, for questioning the basis of their decisions, and for making informed choices. While teaching in the class the posture, responses and the way of dealing with the students should be democratic and it can be ensured by exercising certain precautions like the teacher should give freedom to every student in the class to learn on their individual pace as far as possible. She should ensure while moving on that no child is left behind. It is important to create an environment in the class in which every student in the class is able to participate freely and this can be done by encouraging students when they respond in the class. Teacher should always encourage the students who seldom respond in the class. Encourage students to self evaluate their work or adopt the strategies of peer evaluation in the class. In this way they will feel responsible for their own studies. The teacher should keep in mind that there should not be any discrimination in the class between back benchers and front benchers. The teacher can eliminate the differences by continuously rotating the seating arrangement so that every student gets to sit in the front once in a week. Instead of standing at one place only, the teacher can move around in the class while teaching so that every student gets the attention of the teacher. The teacher should be friendly enough so that the students are not afraid of making mistakes. If they are afraid of making mistakes, they might become wary of even trying. The teacher should not show priority to any student over others in any matter nor should she be discriminatory when dealing with students. Students from diverse backgrounds should be given ample opportunity to participate actively in class activities and discussions. Having students from diverse backgrounds enriches the learning experience of the class. Teacher should not be the sole authority of knowledge but mere facilitator who encourages the children to learn and facilitates such learning in diverse ways. Howe and Covell claim that "democratic values must be reflected in both the formal curricula, through explicit teaching, and throughout the hidden curriculum codes of conduct, mission statements and classroom interactions that model democracy and respect for the rights of all."</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">The lack of teacher and teacher educator voices in decision-making processes in India is an important factor in a striking gap between the expectations of and about teachers articulated in policy discourses (e.g. the National Policy on Education). Teaching democracy places different demands on teachers, particularly in relation to personal attitudes and engagement. Creating a democratic school culture also means that the relationship between students and teachers/leaders must be on a more equal basis, must be governed by mutual respect and must be committed to enhancing democratic processes. The need to craft new, more inclusive and inherently democratic approaches to teacher education in India is evident. To teach about democracy and social justice, educators need to have authentic experiences with/in the subject-area, and be able to cultivate arguments, positions and activities that will enhance the learning experience (Gandin &amp; Apple; Schugarensky; Hess). Parker (2006) builds on Dewey's (1997) seminal work in arguing that teacher-education should involve three strategies humility, caution and reciprocity to effectively engage students in the workings of democracy. Galston feels is supportive of more enhanced democratic values, political participation, changing legislation, better integration of immigrants and others, and less mistrust of politicians it is critical to develop and sustain explicit linkages with communities and local institutions, increase focused professional development, emphasize clear and specific objectives and activities in the curriculum related to civic education, focus on "real-life" experiences, and significantly enhance the culture of the school, including extra-curricular activities (Glaston).</span></p><span data-dcnode-id="653" instrument_node="">
</span><a data-dcnode-id="652" name="Sec5"></a><h3 data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">5. Conclusion</span></h3><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Teacher’s role is highly significant in shaping and molding the future of a nation by tending the young minds as the architects of the future generation. Teachers should be successful in producing men and women of good moral character, dedication, lifelong learning spirit and teaching as a mission for shaping the humanity for all times to come (Hamilton). John Dewey, Ivan Illich, bell hooks, Paulo Freire, and many others have all critiqued the authoritative, essentially anti-democratic mode of education that has become a pervasive mainstay of the modern educational system. These progressive educators have posited, in turn, alternative ways of understanding and practicing progressive pedagogy. Popular education, collaborative learning, problem-posing education, and many other alternative approaches to education draw upon the assumption that learners learn best when they take on a responsibility for their own learning. One such pedagogical approach that requires such a responsibility and seeks to link participatory forms of learning to life beyond the narrow confines of the classroom is "service-learning." </span></p><span data-dcnode-id="647" instrument_node="">
