cratic Values</span></a></li><li data-dcnode-id="3001"><a data-dcnode-id="3002" href="#Core_Democratic_Values-2"><span class="toc_number toc_depth_1" data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">37</span></span><span data-dcnode-id="3003" instrument_node=""> Core Democratic Values</span></a></li><li data-dcnode-id="2996"><a data-dcnode-id="2997" href="#Core_Democratic_Values_Overview"><span class="toc_number toc_depth_1" data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">38</span></span><span data-dcnode-id="2998" instrument_node=""> Core Democratic Values Overview</span></a></li></ul></div><span data-dcnode-id="2993" instrument_node="">
</span><h2 data-dcnode-id="2989"><span data-dcnode-id="2990" id="What_Are_The_Core_Democratic_Values"><span data-dcnode-id="2991" id="What Are The Core Democratic Values?"><span data-dcnode-id="2992" instrument_node="">What Are The Core Democratic Values?</span></span></span></h2><span data-dcnode-id="2988" instrument_node="">
</span><p data-dcnode-id="2982"><span class="ILfuVd" data-dcnode-id="2983"><span class="hgKElc" data-dcnode-id="2984"><b data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">Common Good</span></b><span data-dcnode-id="2985" instrument_node="">: Citizens should work together for the good of all. The government should make laws that are good for everyone. Equality: Everyone should get the same treatment regardless of where their parents or grandparents were born, their race, their religion or how much money they have.</span></span></span></p><span data-dcnode-id="2981" instrument_node="">
</span><h2 data-dcnode-id="2977"><span data-dcnode-id="2978" id="What_are_the_4_democratic_values"><span data-dcnode-id="2979" id="What are the 4 democratic values?"><span data-dcnode-id="2980" instrument_node="">What are the 4 democratic values?</span></span></span></h2><span data-dcnode-id="2976" instrument_node="">
</span><p data-dcnode-id="2973"><span class="hgKElc" data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">Democratic Values The ideas or beliefs that make a society fair, including: democratic decision-making, freedom of speech, equality before the law, social justice, equality, social justice.</span></span></p><span data-dcnode-id="2972" instrument_node="">
</span><h2 data-dcnode-id="2968"><span data-dcnode-id="2969" id="What_are_core_democratic_values_for_kids"><span data-dcnode-id="2970" id="What are core democratic values for kids?"><span data-dcnode-id="2971" instrument_node="">What are core democratic values for kids?</span></span></span></h2><span data-dcnode-id="2967" instrument_node="">
</span><p data-dcnode-id="2964"><span class="hgKElc" data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">Common Good: Help others at home and school Justice: Take turns and be fair to others Liberty: Follow your beliefs and let others follow theirs Popular sovereignty: Power comes from authority Life: Rules are written to keep you safe, follow them Equality: Give everyone an equal chance Diversity: Work and play with …</span></span></p><span data-dcnode-id="2963" instrument_node="">
</span><h2 data-dcnode-id="2959"><span data-dcnode-id="2960" id="What_are_5_basic_concepts_of_democracy"><span data-dcnode-id="2961" id="What are 5 basic concepts of democracy?"><span data-dcnode-id="2962" instrument_node="">What are 5 basic concepts of democracy?</span></span></span></h2><span data-dcnode-id="2958" instrument_node="">
</span><p data-dcnode-id="2952"><span class="hgKElc" data-dcnode-id="2953"><span data-dcnode-id="2957" instrument_node="">The American concept of democracy rests on these basic notions: (1) A recognition of the fundamental worth and dignity of every person; (2) A respect for the equality of all persons; (3) A faith in majority rule and an insistence upon minority rights; (4) An acceptance of the necessity of compromise; and </span><b data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">(5) An</span></b><span data-dcnode-id="2954" instrument_node=""> …</span></span></p><span data-dcnode-id="2951" instrument_node="">
</span><h2 data-dcnode-id="2947"><span data-dcnode-id="2948" id="What_are_examples_of_democratic_ideals"><span data-dcnode-id="2949" id="What are examples of democratic ideals?"><span data-dcnode-id="2950" instrument_node="">What are examples of democratic ideals?</span></span></span></h2><span data-dcnode-id="2946" instrument_node="">
</span><p data-dcnode-id="2943"><span class="hgKElc" data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">These individual freedoms include freedom of speech, freedom of assembly, freedom of religion and the right to a fair trial. Voter enfranchisement and political participation are two key democratic ideals that ensure the engagement of citizens in the political sphere.</span></span></p><span data-dcnode-id="2942" instrument_node="">
</span><h2 data-dcnode-id="2938"><span data-dcnode-id="2939" id="What_are_the_3_characteristics_of_a_democracy"><span data-dcnode-id="2940" id="What are the 3 characteristics of a democracy?"><span data-dcnode-id="2941" instrument_node="">What are the 3 characteristics of a democracy?</span></span></span></h2><span data-dcnode-id="2937" instrument_node="">
</span><p data-dcnode-id="2934"><span class="hgKElc" data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">He describes democracy as a system of government with four key elements: i) A system for choosing and replacing the government through free and fair elections; ii) Active participation of the people, as citizens, in politics and civic life; iii) Protection of the human rights of all citizens; and iv) A rule of law in …</span></span></p><span data-dcnode-id="2933" instrument_node="">
</span><h2 data-dcnode-id="2929"><span data-dcnode-id="2930" id="What_are_the_pillars_of_democracy"><span data-dcnode-id="2931" id="What are the pillars of democracy?"><span data-dcnode-id="2932" instrument_node="">What are the pillars of democracy?</span></span></span></h2><span data-dcnode-id="2928" instrument_node="">
</span><p data-dcnode-id="2925"><span class="hgKElc" data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">Mentioning the four pillars of democracy- the Legislature, Executive, Judiciary and the Media, Shri Naidu said that each pillar must act within its domain but not lose sight of the larger picture. “The strength of a democracy depends upon the strength of each pillar and the way pillars complement each other.</span></span></p><span data-dcnode-id="2924" instrument_node="">
</span><h2 data-dcnode-id="2920"><span data-dcnode-id="2921" id="What_is_the_main_concept_of_democracy"><span data-dcnode-id="2922" id="What is the main concept of democracy?"><span data-dcnode-id="2923" instrument_node="">What is the main concept of democracy?</span></span></span></h2><span data-dcnode-id="2919" instrument_node="">
</span><p data-dcnode-id="2916"><span class="hgKElc" data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">Democracy is government in which power and civic responsibility are exercised by all adult citi- zens, directly, or through their freely elected rep- resentatives. Democracy rests upon the principles of majority rule and individual rights. … Fair, frequent, and well-managed elections are essential in a democracy.</span></span></p><span data-dcnode-id="2915" instrument_node="">

</span><p data-dcnode-id="2589"><span class="hgKElc" data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">The United States is a representative democracy. This means that our government is elected by citizens. Here, citizens vote for their government officials. These officials represent the citizens’ ideas and concerns in government.</span></span></p><span data-dcnode-id="2588" instrument_node="">
</span><h2 data-dcnode-id="2584"><span data-dcnode-id="2585" id="What_are_the_2_main_types_of_democracy"><span data-dcnode-id="2586" id="What are the 2 main types of democracy?"><span data-dcnode-id="2587" instrument_node="">What are the 2 main types of democracy?</span></span></span></h2><span data-dcnode-id="2583" instrument_node="">
</span><p data-dcnode-id="2580"><span class="hgKElc" data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">Consensus democracy – rule based on consensus rather than traditional majority rule. Constitutional democracy – governed by a constitution. Deliberative democracy – in which authentic deliberation, not only voting, is central to legitimate decision making.</span></span></p><span data-dcnode-id="2579" instrument_node="">
</span><h2 data-dcnode-id="2575"><span data-dcnode-id="2576" id="Which_is_most_common_form_of_democracy_in_today8217s_world"><span data-dcnode-id="2577" id="Which is most common form of democracy in today's world?"><span data-dcnode-id="2578" instrument_node="">Which is most common form of democracy in today’s world?</span></span></span></h2><span data-dcnode-id="2574" instrument_node="">
</span><p data-dcnode-id="2568"><span class="hgKElc" data-dcnode-id="2569"><span data-dcnode-id="2573" instrument_node="">The most common form of democracy in today ‘s world is </span><b data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">represntative democracy</span></b><span data-dcnode-id="2570" instrument_node="">. Representative democracy or indirect democracy is when people choose to vote for who will represent them in a parliament. This is the most common form of democracy found across the world.</span></span></p><span data-dcnode-id="2567" instrument_node="">
