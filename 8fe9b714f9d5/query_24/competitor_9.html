                           24(1), 143–173."><span data-dcnode-id="4277" instrument_node="">2016</span></a><span data-dcnode-id="4275" instrument_node="">), the development of the non-market strategy field requires for any analyses to be conducted in tandem with </span><i data-dcnode-id="4273"><span data-dcnode-id="4274" instrument_node="">other disciplines</span></i><span data-dcnode-id="4272" instrument_node=""> such as philosophy, sociology, and the political sciences. Consequently, we examine the non-market strategy literature alongside its broader sociological and philosophical counterparts. This enables the role played by the processual, micro and ‘everyday’ (De Certeau </span><a aria-label="Reference 1984" data-dcnode-id="4270" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d266781703e1018" title="De Certeau, M. (1984). The practice of everyday life. Berkeley: University of California Press."><span data-dcnode-id="4271" instrument_node="">1984</span></a><span data-dcnode-id="4269" instrument_node="">) dimensions of non-market strategies in business-state relations to surface in the empirical context of Ukraine.</span></p><p data-dcnode-id="4254"><span data-dcnode-id="4267" instrument_node="">De Certeau (</span><a aria-label="Reference 1984" data-dcnode-id="4265" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d266781703e1024" title="De Certeau, M. (1984). The practice of everyday life. Berkeley: University of California Press."><span data-dcnode-id="4266" instrument_node="">1984</span></a><span data-dcnode-id="4264" instrument_node="">) argued that institutions and their frameworks are the </span><i data-dcnode-id="4262"><span data-dcnode-id="4263" instrument_node="">prima facie</span></i><span data-dcnode-id="4261" instrument_node=""> ‘producer’ of order and structure and of their resultant actions in society. De Certeau termed these structural and functionalist actions as ‘strategies’ that are exercised through the central repository of hegemonic institutional power (even, in relative terms, in weak institutional environments). The aim of such ‘strategies’, within De Certeau’s casting, is the control of individual actions. In response, individuals meet these institutional-strategic power structures by developing ‘tactics’, which are about “</span><i data-dcnode-id="4259"><span data-dcnode-id="4260" instrument_node="">constantly manipulating events in order to turn them into opportunities</span></i><span data-dcnode-id="4258" instrument_node="">”—where said opportunities, in this case, relate to benefits to the firm (De Certeau </span><a aria-label="Reference 1984" data-dcnode-id="4256" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d266781703e1033" title="De Certeau, M. (1984). The practice of everyday life. Berkeley: University of California Press."><span data-dcnode-id="4257" instrument_node="">1984</span></a><span data-dcnode-id="4255" instrument_node="">, p. xix). When strategies fail to provide the necessary conditions—i.e., in the present case, if the formal practices for business-state mediation in Ukraine alone are not sufficient—tactics provide intelligent responses to dealing with the ‘everyday’.</span></p><p data-dcnode-id="4246"><span data-dcnode-id="4253" instrument_node="">The ‘opaque reality of local tactics’ suited to navigate and mediate the overarching strategies outlined by the state, to which De Certeau referred (De Certeau </span><a aria-label="Reference 1984" data-dcnode-id="4251" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d266781703e1039" title="De Certeau, M. (1984). The practice of everyday life. Berkeley: University of California Press."><span data-dcnode-id="4252" instrument_node="">1984</span></a><span data-dcnode-id="4250" instrument_node="">, p. xxiii), can be evidenced in the CPA practices enacted in emerging economy contexts (Marquis and Raynard </span><a aria-label="Reference 2015" data-dcnode-id="4248" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d266781703e1042" title="Marquis, C., &amp; Raynard, M. (2015). Institutional strategies in emerging markets. Academy of Management Annals,
                           9(1), 291–335."><span data-dcnode-id="4249" instrument_node="">2015</span></a><span data-dcnode-id="4247" instrument_node="">). Tactics do not necessarily comply with the strategies put in place by the system. Indeed, individual actions may well develop alternative ways of engaging with the purported extant system and, in so doing, contravene and subvert it.</span></p><p data-dcnode-id="4238"><span data-dcnode-id="4245" instrument_node="">In applying the thinking outlined above to non-market strategies, we recognise how the latter emerge in varying institutional contexts. These forms of micro-foundational assertions suggest that, within an overall institutional framework, various institutions and bodies employ ‘strategies’ aimed at directing and controlling firm behaviours (Cooper et al. </span><a aria-label="Reference 2017" data-dcnode-id="4243" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d266781703e1048" title="Cooper, S. C. L., Stokes, P., Liu, Y., &amp; Tarba, S. Y. (2017). Sustainability and organizational behavior: A microfoundational perspective. Journal of Organizational Behavior,
                           38(9), 1297–1301."><span data-dcnode-id="4244" instrument_node="">2017</span></a><span data-dcnode-id="4242" instrument_node="">; Felin et al. </span><a aria-label="Reference 2015" data-dcnode-id="4240" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d266781703e1051" title="Felin, T., Foss, N. J., &amp; Ployhart, R. E. (2015). The microfoundations movement in strategy and organization theory. The Academy of Management Annals,
                           9(1), 575–632."><span data-dcnode-id="4241" instrument_node="">2015</span></a><span data-dcnode-id="4239" instrument_node="">). However, individuals and firms are likely to develop and utilise ‘tactics’ in order to work alongside, by-pass, and even replace parts of the intended institutional measures and mechanisms. On an everyday basis, these actions are operationalised by individuals employing tactics suited to counter and subvert the perceived constraints and oppression imposed by the strategies adopted by the institutional system. This dynamic raises an important issue in regard to the competing legitimacies of the formal institutional structures and strategies, which are normatively deployed, and the everyday tactics adopted by individuals. As such, there is a clear need for more granular, critical, individual-focused and micro-orientated studies of the CPA and CSR domains. The article continues with a discussion of the research context of Ukraine and the methodologies employed within this study.</span></p></div></div></section><section data-dcnode-id="4080" data-title="Research Context"><div class="c-article-section" data-dcnode-id="4081" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4233" id="Sec6"><span data-dcnode-id="4234" instrument_node="">Research Context</span></h2><div class="c-article-section__content" data-dcnode-id="4082" id="Sec6-content"><p data-dcnode-id="4219"><span data-dcnode-id="4232" instrument_node="">Context remains a key issue in management and organization studies (Child </span><a aria-label="Reference 2009" data-dcnode-id="4230" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d266781703e1063" title="Child, J. (2009). Context, comparison, and methodology in Chinese management research. Management and Organization Review,
                           5(1), 57–73."><span data-dcnode-id="4231" instrument_node="">2009</span></a><span data-dcnode-id="4229" instrument_node="">; Meyer and Peng </span><a aria-label="Reference 2016" data-dcnode-id="4227" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d266781703e1066" title="Meyer, K. E., &amp; Peng, M. W. (2016). Theoretical foundations of emerging economy business research. Journal of International Business Studies,
                           47(1), 3–22."><span data-dcnode-id="4228" instrument_node="">2016</span></a><span data-dcnode-id="4226" instrument_node="">). As Liu and Vrontis (</span><a aria-label="Reference 2017" data-dcnode-id="4224" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d266781703e1069" title="Liu, Y., &amp; Vrontis, D. (2017). Emerging market firms venturing into advanced economies: The role of context. Thunderbird International Business Review,
                           59(3), 255–261."><span data-dcnode-id="4225" instrument_node="">2017</span></a><span data-dcnode-id="4223" instrument_node="">) argued, it is essential that scholars, business practitioners, and policy-makers take into consideration the ‘context’ of sociocultural, economic, political, and institutional differences, especially within the context of emerging economies. As Liu and Vrontis (</span><a aria-label="Reference 2017" data-dcnode-id="4221" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d266781703e1072" title="Liu, Y., &amp; Vrontis, D. (2017). Emerging market firms venturing into advanced economies: The role of context. Thunderbird International Business Review,
                           59(3), 255–261."><span data-dcnode-id="4222" instrument_node="">2017</span></a><span data-dcnode-id="4220" instrument_node="">) argued, it is important that scholars recognise that the existing assumptions and boundary conditions of the existing theories within business and management studies may need to be critically challenged and then potentially modified when the topic of examination may exist within specific and often new contexts. We now provide some necessary context to this article.</span></p><p data-dcnode-id="4202"><span data-dcnode-id="4218" instrument_node="">Ukraine often scores poorly in global measures of corruption; Transparency International (</span><a aria-label="Reference 2015" data-dcnode-id="4216" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR117" id="ref-link-section-d266781703e1078" title="Transparency International. (2015). Corruption perceptions index 2015. Berlin: Transparency International."><span data-dcnode-id="4217" instrument_node="">2015</span></a><span data-dcnode-id="4215" instrument_node="">) ranks the country 130th out of 167 in its ‘corruption perception index’. The rapid privatisation of state assets following the collapse of socialism led not to the embedding of real market relations in the country but, rather, to the appropriation of state assets by those who had connections to government (Williams et al. </span><a aria-label="Reference 2013" data-dcnode-id="4213" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR121" id="ref-link-section-d266781703e1081" title="Williams, C. C., Round, J., &amp; Rodgers, P. (2013). The role of informal economies in the post-Soviet world: The end of transition?. London: Routledge."><span data-dcnode-id="4214" instrument_node="">2013</span></a><span data-dcnode-id="4212" instrument_node="">), leading to Ukraine resembling a ‘predatory’ state (Grzymala-Busse </span><a aria-label="Reference 2008" data-dcnode-id="4210" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d266781703e1084" title="Grzymala-Busse, A. (2008). Beyond clientelism: Incumbent state capture and state formation. Comparative Political Studies,
                           41(4–5), 638–673."><span data-dcnode-id="4211" instrument_node="">2008</span></a><span data-dcnode-id="4209" instrument_node="">). The country’s institutional environment is evolving, which presents significant challenges to MNEs; thus, in such contexts, non-market strategies take centre stage in developing competitive advantages in emerging markets and in dealing with evolving business environments (Li et al. </span><a aria-label="Reference 2013" data-dcnode-id="4207" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d266781703e1087" title="Li, Y., Peng, M., &amp; Macaulay, C. (2013). Market-political ambidexterity during institutional transitions. Strategic Organization,
                           11(2), 205–213."><span data-dcnode-id="4208" instrument_node="">2013</span></a><span data-dcnode-id="4206" instrument_node="">; Puck et al. </span><a aria-label="Reference 2013" data-dcnode-id="4204" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR98" id="ref-link-section-d266781703e1090" title="Puck, J. F., Rogers, H., &amp; Mohr, A. T. (2013). Flying under the radar: Foreign firm visibility and the efficacy of political strategies in emerging economies. International Business Review,
                           22(6), 1021–1033."><span data-dcnode-id="4205" instrument_node="">2013</span></a><span data-dcnode-id="4203" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4200" id="Sec7"><span data-dcnode-id="4201" instrument_node="">Methodological Approach</span></h3><p data-dcnode-id="4171"><span data-dcnode-id="4199" instrument_node="">To explore the nature of the non-market strategies utilised by foreign owned SMNEs operating in Ukraine, we adopted a qualitative design. Our approach was in line with the highlighting, by recent research, of the need for qualitative studies in the field of IB (Birkinshaw et al. </span><a aria-label="Reference 2011" data-dcnode-id="4197" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d266781703e1100" title="Birkinshaw, J., Brannen, M. Y., &amp; Tung, R. L. (2011). From a distance and generalizable to up close and grounded: Reclaiming a place for qualitative methods in international business research. Journal of International Business Studies,
                           42(5), 573–581."><span data-dcnode-id="4198" instrument_node="">2011</span></a><span data-dcnode-id="4196" instrument_node="">; Doz </span><a aria-label="Reference 2011" data-dcnode-id="4194" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d266781703e1103" title="Doz, Y. (2011). Qualitative research for international business. Journal of International Business Studies,
                           42(5), 582–590."><span data-dcnode-id="4195" instrument_node="">2011</span></a><span data-dcnode-id="4193" instrument_node="">; Welch and Piekkari </span><a aria-label="Reference 2017" data-dcnode-id="4191" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d266781703e1106" title="Welch, C., &amp; Piekkari, R. (2017). How should we (not) judge the ‘quality’ of qualitative research? A re-assessment of current evaluative criteria in International Business. Journal of World Business,
                           52(5), 714–725."><span data-dcnode-id="4192" instrument_node="">2017</span></a><span data-dcnode-id="4190" instrument_node="">). Engaging in an inductive research methodology enabled the generation of rich, in-depth exploratory data (Bryman and Bell </span><a aria-label="Reference 2015" data-dcnode-id="4188" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d266781703e1109" title="Bryman, A., &amp; Bell, E. (2015). Business research methods. Oxford: Oxford University Press."><span data-dcnode-id="4189" instrument_node="">2015</span></a><span data-dcnode-id="4187" instrument_node="">; Ghauri </span><a aria-label="Reference 2004" data-dcnode-id="4185" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d266781703e1112" title="Ghauri, P. (2004). Designing and conducting case studies in international business research. In R. Marschan-Piekkari &amp; C. Welch (Eds.), Handbook of qualitative research methods for international business (pp. 109–124). Cheltenham: Edward Elgar."><span data-dcnode-id="4186" instrument_node="">2004</span></a><span data-dcnode-id="4184" instrument_node="">; Ghauri and Firth </span><a aria-label="Reference 2009" data-dcnode-id="4182" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d266781703e1116" title="Ghauri, P. N., &amp; Firth, R. (2009). The formalization of case study research in international business. der markt,
                           48(1–2), 29–40."><span data-dcnode-id="4183" instrument_node="">2009</span></a><span data-dcnode-id="4181" instrument_node="">; Ghauri and Grønhaug </span><a aria-label="Reference 2010" data-dcnode-id="4179" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d266781703e1119" title="Ghauri, P. N., &amp; Grønhaug, K. (2010). Research methods in business studies: A practical guide. London: Pearson Education."><span data-dcnode-id="4180" instrument_node="">2010</span></a><span data-dcnode-id="4178" instrument_node="">) on how foreign owned SMNEs engage in non-market strategies as a means to develop sustainable market positions within Ukraine. In order to avoid ‘regional bias’ in a country with a strong regional diversity (Rodgers </span><a aria-label="Reference 2006" data-dcnode-id="4176" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d266781703e1122" title="Rodgers, P. (2006). Understanding regionalism and the politics of identity in Ukraine’s Eastern Borderlands. Nationalities Papers,
                           34(2), 157–174."><span data-dcnode-id="4177" instrument_node="">2006</span></a><span data-dcnode-id="4175" instrument_node="">), our data were generated in three key regional administrative centres: Kharkiv in the east, L’viv in the west. and in Kyiv, in the centre. Kharkiv is a predominantly Russian-speaking city (Rodgers </span><a aria-label="Reference 2006" data-dcnode-id="4173" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d266781703e1125" title="Rodgers, P. (2006). Understanding regionalism and the politics of identity in Ukraine’s Eastern Borderlands. Nationalities Papers,
                           34(2), 157–174."><span data-dcnode-id="4174" instrument_node="">2006</span></a><span data-dcnode-id="4172" instrument_node="">) and, to this day, remains a leading centre of heavy engineering. L’viv, which is close to the Polish border, remains a hotbed of Ukrainian nationalism and European leaning. Finally, Kyiv is the capital and the governmental and commercial centre of Ukraine.</span></p><p data-dcnode-id="4163"><span data-dcnode-id="4170" instrument_node="">In order to overcome any difficulties in regard to sampling bias, we engaged in a referral-driven sampling method. The lead author, who had lived and worked in Ukraine for several years, generated a list of potential firms through Internet searches and by contacting the Chambers of Commerce and other business associations in the three cities. Taking into account our overarching aim of exploring how foreign-owned SMNEs operated in Ukraine, domestically owned firms were excluded from the search. The list was based on existing known ‘warm’ contacts (access is notoriously difficult in Ukraine) and on a smaller number of possible contacts provided by referral (Stokes and Wall </span><a aria-label="Reference 2014" data-dcnode-id="4168" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR115" id="ref-link-section-d266781703e1131" title="Stokes, P., &amp; Wall, T. (2014). Research methods. Basingstoke: Palgrave-Macmillan."><span data-dcnode-id="4169" instrument_node="">2014</span></a><span data-dcnode-id="4167" instrument_node="">). By following this rigorous process, we sought to overcome any potential risks associated with reliance on a narrow set of social contacts and to avoid any issues regarding sampling bias. As a result, 24 in-depth qualitative interviews lasting between 45 and 90&nbsp;min were conducted in 2013 with the business-managers and business owners of nine foreign-owned SMNEs operating in Ukraine. These interviews were conducted in the Russian and Ukrainian languages with the consent of each respondent. The lead author is fluent in both languages, which enabled the establishment of a rapport with the respondents and ensured consistency in the translation of the interviews into the English language. The interviewee profiles are mapped in Table&nbsp;</span><a data-dcnode-id="4165" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="4166" instrument_node="">1</span></a><span data-dcnode-id="4164" instrument_node="">.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4148" data-test="inline-table" id="table-1"><figure data-dcnode-id="4149"><figcaption class="c-article-table__figcaption" data-dcnode-id="4160"><b data-dcnode-id="4161" data-test="table-caption" id="Tab1"><span data-dcnode-id="4162" instrument_node="">Table&nbsp;1 List of interviewees</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4150"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="4151" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11575-019-00385-8/tables/1" rel="nofollow"><span data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4152" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4153" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4154" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4157" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4156" fill-rule="evenodd"></path><span data-dcnode-id="4155" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="4143"><span data-dcnode-id="4147" instrument_node="">The interviews were semi-structured, meaning that some respondents were able to raise a number of issues, not on the interview schedule, that were relevant and were subsequently explored further (Silverman </span><a aria-label="Reference 2013" data-dcnode-id="4145" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR112" id="ref-link-section-d266781703e1379" title="Silverman, D. (2013). Doing qualitative research: A practical handbook. London: Sage Publications."><span data-dcnode-id="4146" instrument_node="">2013</span></a><span data-dcnode-id="4144" instrument_node="">). The interviews were recorded with the respondents’ consent and then transcribed and translated. The interviews revolved around Ukraine’s general business environment, the constraints affecting the undertaking of business in the country in general and as a foreign firm in particular, the relations with state bureaucrats, and the tactics employed to generate sustainable market positions for firms.</span></p><p data-dcnode-id="4108"><span data-dcnode-id="4142" instrument_node="">We thematically analysed and coded the interview data in order to explore the emergent themes (Braun and Clarke </span><a aria-label="Reference 2006" data-dcnode-id="4140" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d266781703e1385" title="Braun, V., &amp; Clarke, V. (2006). Using thematic analysis in psychology. Qualitative Research in Psychology,
                           3(2), 77–101."><span data-dcnode-id="4141" instrument_node="">2006</span></a><span data-dcnode-id="4139" instrument_node="">; Gaur and Kumar </span><a aria-label="Reference 2018" data-dcnode-id="4137" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d266781703e1388" title="Gaur, A., &amp; Kumar, M. (2018). A systematic approach to conducting review studies: An assessment of content analysis in 25&nbsp;years of IB research. Journal of World Business,
                           53(2), 280–289."><span data-dcnode-id="4138" instrument_node="">2018</span></a><span data-dcnode-id="4136" instrument_node="">; Ghauri </span><a aria-label="Reference 2004" data-dcnode-id="4134" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d266781703e1391" title="Ghauri, P. (2004). Designing and conducting case studies in international business research. In R. Marschan-Piekkari &amp; C. Welch (Eds.), Handbook of qualitative research methods for international business (pp. 109–124). Cheltenham: Edward Elgar."><span data-dcnode-id="4135" instrument_node="">2004</span></a><span data-dcnode-id="4133" instrument_node="">; Ghauri and Firth </span><a aria-label="Reference 2009" data-dcnode-id="4131" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d266781703e1394" title="Ghauri, P. N., &amp; Firth, R. (2009). The formalization of case study research in international business. der markt,
                           48(1–2), 29–40."><span data-dcnode-id="4132" instrument_node="">2009</span></a><span data-dcnode-id="4130" instrument_node="">; Ghauri and Grønhaug </span><a aria-label="Reference 2010" data-dcnode-id="4128" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d266781703e1397" title="Ghauri, P. N., &amp; Grønhaug, K. (2010). Research methods in business studies: A practical guide. London: Pearson Education."><span data-dcnode-id="4129" instrument_node="">2010</span></a><span data-dcnode-id="4127" instrument_node="">). In keeping with Bryman (</span><a aria-label="Reference 2012" data-dcnode-id="4125" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d266781703e1401" title="Bryman, A. (2012). Social research methods. New York: Oxford University Press."><span data-dcnode-id="4126" instrument_node="">2012</span></a><span data-dcnode-id="4124" instrument_node="">), the reliability of the coding was structured in order to prevent coder bias. The coding process was conducted independently by each author, with the overarching thematic categories identified to develop a coding scheme based on key themes to ensure consistent intra-coder reliability (King and Brooks </span><a aria-label="Reference 2016" data-dcnode-id="4122" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d266781703e1404" title="King, N., &amp; Brooks, J. M. (2016). Template analysis for business and management students. Croydon: Sage Publications."><span data-dcnode-id="4123" instrument_node="">2016</span></a><span data-dcnode-id="4121" instrument_node="">). The authors then applied this coding scheme, and the results were compared to ensure inter-coder reliability by identifying and addressing any discrepancies between the coders. This constant comparative method involved the continuous identification of emergent themes against the interview data and the use of analytic induction, whereby a researcher identifies the nature of a relationship and develops the narrative (Silverman </span><a aria-label="Reference 2013" data-dcnode-id="4119" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR112" id="ref-link-section-d266781703e1407" title="Silverman, D. (2013). Doing qualitative research: A practical handbook. London: Sage Publications."><span data-dcnode-id="4120" instrument_node="">2013</span></a><span data-dcnode-id="4118" instrument_node="">; Ghauri </span><a aria-label="Reference 2004" data-dcnode-id="4116" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d266781703e1410" title="Ghauri, P. (2004). Designing and conducting case studies in international business research. In R. Marschan-Piekkari &amp; C. Welch (Eds.), Handbook of qualitative research methods for international business (pp. 109–124). Cheltenham: Edward Elgar."><span data-dcnode-id="4117" instrument_node="">2004</span></a><span data-dcnode-id="4115" instrument_node="">; Ghauri and Firth </span><a aria-label="Reference 2009" data-dcnode-id="4113" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d266781703e1413" title="Ghauri, P. N., &amp; Firth, R. (2009). The formalization of case study research in international business. der markt,
                           48(1–2), 29–40."><span data-dcnode-id="4114" instrument_node="">2009</span></a><span data-dcnode-id="4112" instrument_node="">; Gaur and Kumar </span><a aria-label="Reference 2018" data-dcnode-id="4110" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d266781703e1416" title="Gaur, A., &amp; Kumar, M. (2018). A systematic approach to conducting review studies: An assessment of content analysis in 25&nbsp;years of IB research. Journal of World Business,
                           53(2), 280–289."><span data-dcnode-id="4111" instrument_node="">2018</span></a><span data-dcnode-id="4109" instrument_node="">).</span></p><p data-dcnode-id="4103"><span data-dcnode-id="4107" instrument_node="">The qualitative approach was particularly appropriate in enabling managers to articulate how they perceived the institutional environment and their firms’ reliance on non-market strategies to deal with institutional challenges. Quotes from the interviews are used to provide enhancement and to add voice to the study. Table&nbsp;</span><a data-dcnode-id="4105" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="4106" instrument_node="">2</span></a><span data-dcnode-id="4104" instrument_node=""> presents a summary of the responses to the key emerging issues and of the frequency of those responses. In many cases, consensus was found regarding the key areas of exploration; these responses could therefore be considered to be representative of the views of the majority of the respondents.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4088" data-test="inline-table" id="table-2"><figure data-dcnode-id="4089"><figcaption class="c-article-table__figcaption" data-dcnode-id="4100"><b data-dcnode-id="4101" data-test="table-caption" id="Tab2"><span data-dcnode-id="4102" instrument_node="">Table&nbsp;2 Interview questionnaire, frequency and summary of responses</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4090"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="4091" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11575-019-00385-8/tables/2" rel="nofollow"><span data-dcnode-id="4098"><span data-dcnode-id="4099" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4092" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4093" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4094" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4097" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4096" fill-rule="evenodd"></path><span data-dcnode-id="4095" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="4083"><span data-dcnode-id="4087" instrument_node="">Our second and third order themes were derived by means of an iterative and comparative method (Silverman </span><a aria-label="Reference 2013" data-dcnode-id="4085" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR112" id="ref-link-section-d266781703e1595" title="Silverman, D. (2013). Doing qualitative research: A practical handbook. London: Sage Publications."><span data-dcnode-id="4086" instrument_node="">2013</span></a><span data-dcnode-id="4084" instrument_node="">). The final set of core categories emerged from our analysis of the interview data. The several themes we distilled are theorised in our discussion: formal and informal CPA, individual and institutional dynamics, outsourcing of blurred CPA activities, Aligning and blurring of CPA/CSR activities and coerced complementarity and isomorphic legitimation. We discuss each of these in turn in the following section, to which we now move to present our findings.</span></p></div></div></section><section data-dcnode-id="3909" data-title="Findings and Discussion"><div class="c-article-section" data-dcnode-id="3910" id="Sec8-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4078" id="Sec8"><span data-dcnode-id="4079" instrument_node="">Findings and Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="3911" id="Sec8-content"><h3 class="c-article__sub-heading" data-dcnode-id="4076" id="Sec9"><span data-dcnode-id="4077" instrument_node="">Formal and Informal CPA: Individual and Institutional Dynamics</span></h3><p data-dcnode-id="4068"><span data-dcnode-id="4075" instrument_node="">During the fieldwork, most of the managers interviewed spoke about the consequences of the difficulties linked to Ukraine’s transformation from a command- to a market-based economy (Williams et al. </span><a aria-label="Reference 2013" data-dcnode-id="4073" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR121" id="ref-link-section-d266781703e1611" title="Williams, C. C., Round, J., &amp; Rodgers, P. (2013). The role of informal economies in the post-Soviet world: The end of transition?. London: Routledge."><span data-dcnode-id="4074" instrument_node="">2013</span></a><span data-dcnode-id="4072" instrument_node="">). The managers highlighted that, besides ‘formal’ CPA activities such as lobbying (“We are a Russian firm and use our Chambers here in Ukraine to lobby interests through meetings with the various Ministries”, INT 10), the existing ‘rules of the game’ in Ukraine’s institutional milieu force firms to engage in explicitly corrupt activities to survive in the marketplace. Several managers outlined how they had been </span><i data-dcnode-id="4070"><span data-dcnode-id="4071" instrument_node="">subjected to</span></i><span data-dcnode-id="4069" instrument_node=""> corruption, forced to adhere not only to the formal rules of business engagement but also to the informal rules of the game.</span></p><blockquote class="c-blockquote" data-dcnode-id="4064"><div class="c-blockquote__body" data-dcnode-id="4065"><p data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">“We are an American owned firm. The state regulatory organs constantly check our systems. In order to gain approval, we need to pay these state officials. We’ve found out that it works like that here” (INT 14).</span></p></div></blockquote><p data-dcnode-id="4056"><span data-dcnode-id="4063" instrument_node="">The institutional voids stemming from the weaknesses and or/lack of state capacity in Ukraine (Khanna and Palepu </span><a aria-label="Reference 2010" data-dcnode-id="4061" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d266781703e1623" title="Khanna, T., &amp; Palepu, K. G. (2010). Winning in emerging markets: A road map for strategy and execution. Boston: Harvard Business Press."><span data-dcnode-id="4062" instrument_node="">2010</span></a><span data-dcnode-id="4060" instrument_node="">; Puffer et al. </span><a aria-label="Reference 2010" data-dcnode-id="4058" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d266781703e1626" title="Puffer, S., McCarthy, D., &amp; Boisot, M. (2010). Entrepreneurship in Russia and China: The impact of formal institutional voids. Entrepreneurship Theory and Practice,
                           34(3), 441–467."><span data-dcnode-id="4059" instrument_node="">2010</span></a><span data-dcnode-id="4057" instrument_node="">) were commonly mentioned by managers:</span></p><blockquote class="c-blockquote" data-dcnode-id="4052"><div class="c-blockquote__body" data-dcnode-id="4053"><p data-dcnode-id="4054"><span data-dcnode-id="4055" instrument_node="">“We are a large multinational business. We have a competent tax department, which rarely makes mistakes. Here the tax administration tries, often shamelessly, to make out that we’re not paying our way correctly” (INT 24).</span></p></div></blockquote><p data-dcnode-id="4044"><span data-dcnode-id="4051" instrument_node="">Individuals also spoke about the continuing legacies from Soviet times, with state bureaucrats constantly seeking to wield their ‘power’. Post-Soviet Ukraine’s chaotic attempts at economic transformation, which had been overseen by state bureaucrats (Williams et al. </span><a aria-label="Reference 2013" data-dcnode-id="4049" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR121" id="ref-link-section-d266781703e1635" title="Williams, C. C., Round, J., &amp; Rodgers, P. (2013). The role of informal economies in the post-Soviet world: The end of transition?. London: Routledge."><span data-dcnode-id="4050" instrument_node="">2013</span></a><span data-dcnode-id="4048" instrument_node="">), had led to insignificant economic reforms, but had enabled a minority elite to enrich themselves greatly (Åslund </span><a aria-label="Reference 2014" data-dcnode-id="4046" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR130" id="ref-link-section-d266781703e1638" title="Åslund, A. (2014). Why Ukraine is so poor, and what could be done to make it richer. Eurasian Geography and Economics, 55(3), 236–246."><span data-dcnode-id="4047" instrument_node="">2014</span></a><span data-dcnode-id="4045" instrument_node="">), leaving the bureaucrats with pitifully low formal wages. In response, state actors have sought to ‘privatise’ their power, seeking to enrich themselves by often semi-legal or illegal means. Various non-market strategies have formed an integral part of this process. The respondents highlighted how state officials used different tactics—such as changing regulatory rules, refusing to give out and renew any necessary permits, and constantly postponing regulatory visits. As a manager of a large logistics chain summed up, “They know they have some power over us and use it for their advantage […] they make sure that we end up paying them in the end” (INT 15).</span></p><p data-dcnode-id="4036"><span data-dcnode-id="4043" instrument_node="">Indeed, the majority of our respondents saw the articulation of such a variety of tactics aimed at mediating, circumventing, and navigating Ukraine’s institutional milieu as something to be expected—“It’s just the way they do things here” (INT 8)—which confirmed Lawton et al. </span><a aria-label="Reference (2013a)" data-dcnode-id="4041" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d266781703e1644" title="Lawton, T., McGuire, S., &amp; Rajwani, T. (2013a). Corporate political activity: A literature review and research agenda. International Journal of Management Reviews,
                           15(1), 86–105."><span data-dcnode-id="4042" instrument_node="">(2013a)</span></a><span data-dcnode-id="4040" instrument_node=""> argument that, in a weak institutional environment, informal or illegal CPA activities may become normalized within the everyday context. Several managers spoke about the importance of ‘</span><i data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">razpil</span></i><span data-dcnode-id="4037" instrument_node="">’—siphoning off—as a tactic aimed at protecting and buffering business interests by means of a network of trusted contacts:</span></p><blockquote class="c-blockquote" data-dcnode-id="4032"><div class="c-blockquote__body" data-dcnode-id="4033"><p data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">“We have an IT business in Ukraine and across Central and Eastern Europe. The state officials constantly try to change the rules to catch us out and gain more monies for themselves. We’ve set up some ‘affiliate’ firms based in Ukraine and elsewhere. We pay these firms for services rendered and it keeps things ticking over there” (INT 18).</span></p></div></blockquote><p data-dcnode-id="4024"><span data-dcnode-id="4031" instrument_node="">Such embedded networks involving ‘</span><i data-dcnode-id="4029"><span data-dcnode-id="4030" instrument_node="">lubi druzi’</span></i><span data-dcnode-id="4028" instrument_node="">—one’s own people—emerged during the late Soviet period as a means and a ‘tactic’ employed by individuals to navigate the intricacies of the Soviet deficit-ridden economy. Today, in Ukraine’s fluid institutional environment, they are being refashioned on monetarist terms—the obtainment of economic assets having replaced the former desire to source nearly unobtainable goods. Moreover, such findings lend weight to Rajwani and Liedong’s (</span><a aria-label="Reference 2015" data-dcnode-id="4026" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d266781703e1660" title="Rajwani, T., &amp; Liedong, T. (2015). Political activity and firm performance within non-market research: A review and international comparative assessment. Journal of World Business,
                           50(2), 273–283."><span data-dcnode-id="4027" instrument_node="">2015</span></a><span data-dcnode-id="4025" instrument_node="">) argument that, in some emerging economies, social capital ties can lead to manifestations of corrupt practices. Here, the contacts are ‘enabling’, in that they enable firms to avoid interaction with rapacious state actors. In many respects, our research affirms that the MNEs operating in Ukraine certainly expected, anticipated, and even embraced the use of informal practices in their engagement with state institutions.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4022" id="Sec10"><span data-dcnode-id="4023" instrument_node="">The Outsourcing of ‘Blurred’ CPA Activities</span></h3><p data-dcnode-id="4014"><span data-dcnode-id="4021" instrument_node="">While the respondents highlighted how managers were compelled to develop and variously enact an “opaque reality of local tactics” (De Certeau </span><a aria-label="Reference 1984" data-dcnode-id="4019" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d266781703e1671" title="De Certeau, M. (1984). The practice of everyday life. Berkeley: University of California Press."><span data-dcnode-id="4020" instrument_node="">1984</span></a><span data-dcnode-id="4018" instrument_node="">, p. xxiii) in order to mediate the lack of institutional capacity in Ukraine—with the payment of ‘informal taxes’ clearly being one tactic </span><i data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">inter alia</span></i><span data-dcnode-id="4015" instrument_node="">—several managers also spoke about the difficulties they encountered, from a corporate culture perspective, in engaging in such behaviours. As a manager of an Austrian-owned IT business stated, “We know how paying a bribe gets things done quickly here, but we cannot just use our resources in this way; our bosses back home wouldn’t be pleased, let alone our shareholders” (INT 3).</span></p><p data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">In response to the need to adhere and align firm behaviours to the formal and informal rules of the game in Ukraine, often coupled with the need to simultaneously adhere to firm-level rules and policies in relation to ‘good practice and transparency’, several of the MNE managers highlighted how their firms had developed a tactic that involved the outsourcing of informal/illegal forms of CPA activities. To bypass the internal scrutiny of company bosses in the home countries and also, no less significantly, of shareholders, several firms were employing domestically-owned Ukrainian firms in ‘consultancy’ roles, charging them with the task of dealing with institutional actors. As a manager of an Austrian logistics firm stated:</span></p><blockquote class="c-blockquote" data-dcnode-id="4008"><div class="c-blockquote__body" data-dcnode-id="4009"><p data-dcnode-id="4010"><span data-dcnode-id="4011" instrument_node="">“We’ve been working in Ukraine for over eight years. Things have been tough, especially at the start. Everything here seems to be ‘political’. We employ a consulting firm that provides the necessary services to smooth over issues with local bureaucrats” (INT 1).</span></p></div></blockquote><p data-dcnode-id="4000"><span data-dcnode-id="4007" instrument_node="">Other respondents highlighted how local consultancy firms were paid in order “To make sure that there were no delays with import and export of our products” (INT 18); while other firms employed ‘consultants’ to ensure that government regulatory checks would all be passed smoothly (“We pay a firm who deals with all the regulatory work. Without them, we would have constant problems with the state officials”, INT 20). This ‘professionalization’ of outsourced services reflects the changing environment in which business-state and non-market relations take place in the Ukrainian context. While informal practices may have been the outcome of the ‘opportunistic’ tactics (De Certeau) adopted by firms to ‘get ahead’ and survive during the chaotic times of the 1990s, today, they have become increasingly culturally normalised and embedded practices. Moreover, several business managers explained how they employed ‘liaison officers’ whose roles were essentially those of fixers. Whilst ‘</span><i data-dcnode-id="4005"><span data-dcnode-id="4006" instrument_node="">tolkachi</span></i><span data-dcnode-id="4004" instrument_node="">’—a Soviet term used to identify ‘fixers’ (Rehn and Taalas </span><a aria-label="Reference 2004" data-dcnode-id="4002" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR138" id="ref-link-section-d266781703e1689" title="Rehn, A., &amp; Taalas, S. (2004). ‘Znakomstva I Svyazi’(Acquaintances and connections)–Blat, the Soviet Union, and mundane entrepreneurship. Entrepreneurship &amp; Regional Development, 16(3), 235–250."><span data-dcnode-id="4003" instrument_node="">2004</span></a><span data-dcnode-id="4001" instrument_node="">)—were employed by Soviet enterprises to navigate the maze of (post-) Soviet bureaucracies, today, we witness the formalization of these roles as a way for firms—particularly foreign owned MNEs—to navigate the predatory business and institutional environment Ukraine.</span></p><blockquote class="c-blockquote" data-dcnode-id="3996"><div class="c-blockquote__body" data-dcnode-id="3997"><p data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">“In Ukraine, we employ a group of ‘security specialists’ to find out not only what our competitors are doing but also if they are breaking the law. This is useful as it gives us leverage. We need to stay focused, though, and remember that there will also be people watching us” (INT 8).</span></p></div></blockquote><p data-dcnode-id="3988"><span data-dcnode-id="3995" instrument_node="">Several interviewees spoke about the dangers of ‘</span><i data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">raiderstvo</span></i><span data-dcnode-id="3992" instrument_node="">’—corporate raiding or asset grabbing—which involves the illicit acquisition of part of or the whole of a business (Hanson </span><a aria-label="Reference 2014" data-dcnode-id="3990" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR135" id="ref-link-section-d266781703e1701" title="Hanson, P. (2014). Reiderstvo: asset-grabbing in Russia. London: Chatham House."><span data-dcnode-id="3991" instrument_node="">2014</span></a><span data-dcnode-id="3989" instrument_node="">). Such ‘asset grabbing’ involved private firms working alongside and in cahoots with a variety of institutional actors (law enforcement, tax authorities, and the judiciary), often exploiting loopholes in Ukraine’s legal system to seize private assets. Managers outlined how fixers were also being used to “keep check on what the government is thinking” (INT 17), and deal with any reputation issues related to their firms in Ukraine and protect them from any potential unwelcome interest from the state and/or other competitors.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3986" id="Sec11"><span data-dcnode-id="3987" instrument_node="">The Aligning/Blurring of CPA/CSR Activities</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="3984" id="Sec12"><span data-dcnode-id="3985" instrument_node="">Seeking Legitimacy</span></h4><p data-dcnode-id="3979"><span data-dcnode-id="3983" instrument_node="">The findings suggest that most of the firms were engaged, to varying degrees, in aligning forms of CPA/CSR activities. The examples below illustrates how, upon developing their business operations in Ukraine, foreign-owned firms had chosen to engage in philanthropic activities as a way to seek legitimacy (Elg et al. </span><a aria-label="Reference 2017" data-dcnode-id="3981" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d266781703e1716" title="Elg, U., Ghauri, P. N., Child, J., &amp; Collinson, S. (2017). MNE microfoundations and routines for building a legitimate and sustainable position in emerging markets. Journal of Organizational Behavior,
                           38(9), 1320–1337."><span data-dcnode-id="3982" instrument_node="">2017</span></a><span data-dcnode-id="3980" instrument_node="">) across a wide range of stakeholders.</span></p><blockquote class="c-blockquote" data-dcnode-id="3975"><div class="c-blockquote__body" data-dcnode-id="3976"><p data-dcnode-id="3977"><span data-dcnode-id="3978" instrument_node="">“Our firm purchased a large installation and we soon realised its importance to the city in which we work. In Soviet times, the installation had been part of a complex that had hosted social provisions for the city; nursery schools and health clinics. We have continued in that tradition and we think it’s been well appreciated” (INT 12).</span></p></div></blockquote><p data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">As highlighted by the above example, there is a legacy of vertical paternalism originating from Soviet times, one that some firms have chosen to perpetuate as a corporate strategy in Ukraine. Moreover, our interviewed managers also noted how their CSR activities often provided social services, substituting for the state’s lack of capacity in the field. As a manager of a Polish-owned fashion retail firm stated,</span></p><blockquote class="c-blockquote" data-dcnode-id="3969"><div class="c-blockquote__body" data-dcnode-id="3970"><p data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">“When we started our business here, we became aware that the local sports fields had become derelict. The city council was responsible for their upkeep but didn’t have any money. We stepped in and we now make sure the local people have good facilities” (INT 7).</span></p></div></blockquote><p data-dcnode-id="3964"><span data-dcnode-id="3968" instrument_node="">Other managers also outlined how their firms were engaging in such ‘voluntary’ forms of CSR (Davis </span><a aria-label="Reference 1973" data-dcnode-id="3966" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d266781703e1731" title="Davis, K. (1973). The case for and against business assumption of social responsibilities. Academy of Management journal, 16(2), 312–322."><span data-dcnode-id="3967" instrument_node="">1973</span></a><span data-dcnode-id="3965" instrument_node="">), providing services, such as childcare, related to corporate philanthropy and social responsibility.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="3962" id="Sec13"><span data-dcnode-id="3963" instrument_node="">Coerced Complementarity and Isomorphic Legitimation</span></h4><p data-dcnode-id="3957"><span data-dcnode-id="3961" instrument_node="">Traditional approaches to CSR in Western contexts assume that, when a firm engages in CSR activities, motivated by an instrumental or normative bias, it does so voluntarily (Crotty </span><a aria-label="Reference 2016" data-dcnode-id="3959" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d266781703e1742" title="Crotty, J. (2016). Corporate social responsibility in the Russian federation: A contextualized approach. Business and Society,
                           55(6), 825–853."><span data-dcnode-id="3960" instrument_node="">2016</span></a><span data-dcnode-id="3958" instrument_node="">). However, several business managers outlined how, since developing their business in Ukraine, their firms had increasingly been coerced into becoming engaged in CSR activities. A manager of a Turkish-owned transportation firm asserted:</span></p><blockquote class="c-blockquote" data-dcnode-id="3953"><div class="c-blockquote__body" data-dcnode-id="3954"><p data-dcnode-id="3955"><span data-dcnode-id="3956" instrument_node="">“We know the rules and how things work here. When we arrived, we invested time and money in getting to know the local state elites. It was clear that there was an expectation for us to deliver not only jobs for local people and pay our taxes but to do more. We were shown some social projects in the city that needed funding. Since then, we have made strategic decisions to fund them. It works like that” (INT 23).</span></p></div></blockquote><p data-dcnode-id="3945"><span data-dcnode-id="3952" instrument_node="">These sentiments were echoed by several respondents, highlighting how, in Ukraine’s weak institutional environment, in which the state actors were either unwilling or lacked the capacity to fulfil their social obligations to the citizenry, large firms, particularly foreign MNEs, were ‘asked’ and ‘expected’ to provide assistance. The ‘coerced’ nature of such CSR activities echoes similar findings reported by Crotty (</span><a aria-label="Reference 2016" data-dcnode-id="3950" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d266781703e1751" title="Crotty, J. (2016). Corporate social responsibility in the Russian federation: A contextualized approach. Business and Society,
                           55(6), 825–853."><span data-dcnode-id="3951" instrument_node="">2016</span></a><span data-dcnode-id="3949" instrument_node="">) in her study of provincial Russia. Moreover, it theoretically highlights how, in specific institutional contexts, firms may ‘substitute’ for the state (Matten and Crane </span><a aria-label="Reference 2005" data-dcnode-id="3947" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d266781703e1754" title="Matten, D., &amp; Crane, A. (2005). Corporate citizenship: Toward an extended theoretical conceptualization. Academy of Management Review,
                           30(1), 166–179."><span data-dcnode-id="3948" instrument_node="">2005</span></a><span data-dcnode-id="3946" instrument_node="">). While such substituting effects were evident—“We have been asked by the state to make sure that the health centre in our district remains fully stocked with medicines” (INT 4)—they did not occur solely in Ukraine. In fact, several managers highlighted the implicit linkages between a firm’s CPA and CSR activities. A manager of a large Russian-owned IT firm stated.</span></p><blockquote class="c-blockquote" data-dcnode-id="3941"><div class="c-blockquote__body" data-dcnode-id="3942"><p data-dcnode-id="3943"><span data-dcnode-id="3944" instrument_node="">“It’s like a see-saw. In theory, firms have a choice, but they don’t really. We can either engage in social projects, assisting the local government, or we’ll end up paying lots in terms of lobbying and consultancy fees. The only constant is that we’ll end up paying” (INT 11).</span></p></div></blockquote><p data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">Here, we witness how engaging in CSR activities not only means substituting for the state in terms of its responsibilities to society at large, it also leads to substituting or ‘offsetting’ effects in terms of lobbying (CPA) costs. While we witnessed the interplay of CPA and CSR activities, complementary effects also surfaced between CPA and CSR policies. Some of our interviewed managers highlighted how, in some instances, their firms were expected to engage in both informal/illegal CPA activities and simultaneously invest resources into CSR policies.</span></p><blockquote class="c-blockquote" data-dcnode-id="3935"><div class="c-blockquote__body" data-dcnode-id="3936"><p data-dcnode-id="3937"><span data-dcnode-id="3938" instrument_node="">“Where we’ve worked before, to be honest, you pay the right people and you are allowed to get on with your business. Here, things are different. We pay the right people and employ consultants to keep the state officials off our backs. However, they want more. They want us to invest in lots of social programmes too” (INT 5).</span></p></div></blockquote><p data-dcnode-id="3924"><span data-dcnode-id="3934" instrument_node="">Other managers highlighted how CPA and CSR activities often “</span><i data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">go hand in hand</span></i><span data-dcnode-id="3931" instrument_node="">” (INT 10) and demonstrated how the increase in ‘artificial trust’ between business and the polity generated by the alignment of CPA and CSR activities (Liedong et al. </span><a aria-label="Reference 2015" data-dcnode-id="3929" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d266781703e1772" title="Liedong, T. A., Ghobadian, A., Rajwani, T., &amp; O’Regan, N. (2015). Toward a view of complementarity: Trust and policy influence effects of corporate social responsibility and corporate political activity. Group and Organization Management,
                           40(3), 405–427."><span data-dcnode-id="3930" instrument_node="">2015</span></a><span data-dcnode-id="3928" instrument_node="">), coerced complementarity between CPA and CSR as a product of the ‘weak-strong’ nature of institutions within Ukraine’s institutional space. Moreover, both the CPA and CSR activities—in which the firms were engaging in order to adhere to the rules of the game predicated by the state—aided both firms and state alike in increasing their legitimacy across society (Kostova and Zaheer </span><a aria-label="Reference 1999" data-dcnode-id="3926" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR137" id="ref-link-section-d266781703e1775" title="Kostova, T., &amp; Zaheer, S. (1999). Organizational legitimacy under conditions of complexity: The case of the multinational enterprise. Academy of Management review, 24(1), 64–81."><span data-dcnode-id="3927" instrument_node="">1999</span></a><span data-dcnode-id="3925" instrument_node="">) and were thus necessarily mutually reinforcing.</span></p><blockquote class="c-blockquote" data-dcnode-id="3920"><div class="c-blockquote__body" data-dcnode-id="3921"><p data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">“We understand the rules of the political game now. We need to pay some informal taxes and also we need to fund some social programmes. We benefit from improving our reputation as a foreign business interested in local issues. For the state officials, it’s is a ‘win–win’ too. They manage to receive some monies and also show to the local population how they’ve attracted international business to the region” (INT 22).</span></p></div></blockquote><p data-dcnode-id="3912"><span data-dcnode-id="3919" instrument_node="">Such sentiments represent a form of emerging organizational isomorphism in which the ‘rules of the game’ are driving the alignment and homogeneity of firm behaviours in Ukraine (Keig et al. </span><a aria-label="Reference 2015" data-dcnode-id="3917" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d266781703e1785" title="Keig, D. L., Brouthers, L. E., &amp; Marshall, V. B. (2015). Formal and informal corruption environments and multinational enterprise social irresponsibility. Journal of Management Studies,
                           52(1), 89–116."><span data-dcnode-id="3918" instrument_node="">2015</span></a><span data-dcnode-id="3916" instrument_node="">) in order to improve firm/state mutual legitimacy. However, what is significant is that, instead of driving corporate social irresponsibility (Keig et al. </span><a aria-label="Reference 2015" data-dcnode-id="3914" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d266781703e1788" title="Keig, D. L., Brouthers, L. E., &amp; Marshall, V. B. (2015). Formal and informal corruption environments and multinational enterprise social irresponsibility. Journal of Management Studies,
                           52(1), 89–116."><span data-dcnode-id="3915" instrument_node="">2015</span></a><span data-dcnode-id="3913" instrument_node="">), as might be expected, Ukraine’s corrupt institutional environment in fact drives socially responsible behaviours in conjunction with more informal/illegal corporate political activities.</span></p></div></div></section><section data-dcnode-id="3726" data-title="Conclusions"><div class="c-article-section" data-dcnode-id="3727" id="Sec14-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3907" id="Sec14"><span data-dcnode-id="3908" instrument_node="">Conclusions</span></h2><div class="c-article-section__content" data-dcnode-id="3728" id="Sec14-content"><p data-dcnode-id="3866"><span data-dcnode-id="3906" instrument_node="">This study responds to the core objectives of the </span><i data-dcnode-id="3904"><span data-dcnode-id="3905" instrument_node="">Call for Articles</span></i><span data-dcnode-id="3903" instrument_node=""> aimed at examining how SMNEs engage in internationalisation activities; in particular, it underscores the mechanisms through which SMNEs seek to develop legitimate market positions within emerging economies (Elg et al. </span><a aria-label="Reference 2015" data-dcnode-id="3901" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d266781703e1804" title="Elg, U., Ghauri, P. N., &amp; Schaumann, J. (2015). Internationalization through sociopolitical relationships: MNEs in India. Long Range Planning,
                           48(5), 334–345."><span data-dcnode-id="3902" instrument_node="">2015</span></a><span data-dcnode-id="3900" instrument_node="">, </span><a aria-label="Reference 2017" data-dcnode-id="3898" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d266781703e1807" title="Elg, U., Ghauri, P. N., Child, J., &amp; Collinson, S. (2017). MNE microfoundations and routines for building a legitimate and sustainable position in emerging markets. Journal of Organizational Behavior,
                           38(9), 1320–1337."><span data-dcnode-id="3899" instrument_node="">2017</span></a><span data-dcnode-id="3897" instrument_node="">). The article addresses the overlapping of CPA and CSR across international contexts by exploring the tactics enacted by foreign-owned SMNEs operating in Ukraine. In doing so, it contributes to the extant literature relating to how firms use non-market strategies across different institutional contexts (e.g., Ghauri et al. </span><a aria-label="Reference 2014" data-dcnode-id="3895" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d266781703e1810" title="Ghauri, P., Tasavori, M., &amp; Zaefarian, R. (2014). Internationalisation of service firms through corporate social entrepreneurship and networking. International Marketing Review,
                           31(6), 576–600."><span data-dcnode-id="3896" instrument_node="">2014</span></a><span data-dcnode-id="3894" instrument_node="">; Lawton et al. </span><a aria-label="Reference 2013a" data-dcnode-id="3892" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d266781703e1813" title="Lawton, T., McGuire, S., &amp; Rajwani, T. (2013a). Corporate political activity: A literature review and research agenda. International Journal of Management Reviews,
                           15(1), 86–105."><span data-dcnode-id="3893" instrument_node="">2013a</span></a><span data-dcnode-id="3891" instrument_node="">; Lawton et al. </span><a aria-label="Reference b" data-dcnode-id="3889" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d266781703e1817" title="Lawton, T., Rajwani, T., &amp; Doh, J. (2013b). The antecedents of political capabilities: A study of ownership, cross-border activity and organization at legacy airlines in a deregulatory context. International Business Review,
                           22(1), 228–242."><span data-dcnode-id="3890" instrument_node="">b</span></a><span data-dcnode-id="3888" instrument_node="">; Meznar and Nigh </span><a aria-label="Reference 1995" data-dcnode-id="3886" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d266781703e1820" title="Meznar, M., &amp; Nigh, D. (1995). Buffer or bridge? Environmental and organizational determinants of public affairs activities in American firms. The Academy of Management Journal,
                           38(4), 975–996."><span data-dcnode-id="3887" instrument_node="">1995</span></a><span data-dcnode-id="3885" instrument_node="">); in the context of emerging economies in particular (Doh et al. </span><a aria-label="Reference 2012" data-dcnode-id="3883" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d266781703e1823" title="Doh, J., Lawton, T., &amp; Rajwani, T. (2012). Advancing non-market strategy research: Institutional perspectives in a changing world. The Academy of Management Perspectives,
                           26(3), 22–39."><span data-dcnode-id="3884" instrument_node="">2012</span></a><span data-dcnode-id="3882" instrument_node="">; Elsahn and Benson-Rea </span><a aria-label="Reference 2018" data-dcnode-id="3880" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d266781703e1826" title="Elsahn, Z. F., &amp; Benson-Rea, M. (2018). Political schemas and corporate political activities during foreign market entry: A micro-process perspective. Management International Review,
                           58(5), 771–811."><span data-dcnode-id="3881" instrument_node="">2018</span></a><span data-dcnode-id="3879" instrument_node="">). Furthermore, the article responds to calls to integrate the two dominant domains of non-market strategy of CPA and CSR (Baron </span><a aria-label="Reference 2001" data-dcnode-id="3877" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR131" id="ref-link-section-d266781703e1829" title="Baron, D. P. (2001). Private politics, corporate social responsibility, and integrated strategy. Journal of Economics &amp; Management Strategy, 10(1), 7–45."><span data-dcnode-id="3878" instrument_node="">2001</span></a><span data-dcnode-id="3876" instrument_node="">; Frynas and Stephens </span><a aria-label="Reference 2014" data-dcnode-id="3874" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d266781703e1832" title="Frynas, J., &amp; Stephens, S. (2014). Political corporate social responsibility: Reviewing theories and setting new agendas. International Journal of Management Reviews,

                           38(2), 341–363."><span data-dcnode-id="3804" instrument_node="">1995</span></a><span data-dcnode-id="3802" instrument_node="">).</span></p><p data-dcnode-id="3775"><span data-dcnode-id="3800" instrument_node="">This study contributes to the extant understandings of strategic firm responses within IB research (Doh et al. </span><a aria-label="Reference 2012" data-dcnode-id="3798" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d266781703e1914" title="Doh, J., Lawton, T., &amp; Rajwani, T. (2012). Advancing non-market strategy research: Institutional perspectives in a changing world. The Academy of Management Perspectives,

                           45(3), 275–302."><span data-dcnode-id="3796" instrument_node="">2014</span></a><span data-dcnode-id="3794" instrument_node="">) by showcasing how context and agency (MNE strategies and institutional actors) are inherently interdependent within international business settings and how they have the power to constitute each other in distinct ways (McGaughey et al. </span><a aria-label="Reference 2016" data-dcnode-id="3792" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d266781703e1920" title="McGaughey, S. L., Kumaraswamy, A., &amp; Liesch, P. W. (2016). Institutions, entrepreneurship and co-evolution in international business. Journal of World Business,
