</span><meta content="In this article, we examine the mechanisms of the corporate political activities of service multinational enterprises (SMNEs) operating in an emerging economy. Reporting the findings of qualitative interviews with key decision-makers in Ukraine, the article illuminates how SMNEs operating in turbulent institutional contexts can enact various corporate political strategies, including social responsibility activities, to mitigate market costs and develop legitimacy. The findings elucidate how government agencies and institutions may also invoke corporate social responsibility (CSR) as a strategy. The article makes key contributions; firstly, it underscores the complementary dynamics that exist between CPA and CSR strategies in host markets characterised by weak and incomplete institutions. Secondly, the article contributes to the relatively under-explored nature of service sector MNEs operating in such institutional contexts." data-dcnode-id="5604" name="dc.description"><span data-dcnode-id="5603" instrument_node="">

</span><meta content="The Role of Non-market Strategies in Establishing Legitimacy: The Case of Service MNEs in Emerging Economies - Management International Review" data-dcnode-id="5244" property="og:title"><span data-dcnode-id="5243" instrument_node="">
</span><meta content="In this article, we examine the mechanisms of the corporate political activities of service multinational enterprises (SMNEs) operating in an emerging economy. Reporting the findings of qualitative interviews with key decision-makers in Ukraine, the article illuminates how SMNEs operating in turbulent institutional contexts can enact various corporate political strategies, including social responsibility activities, to mitigate market costs and develop legitimacy. The findings elucidate how government agencies and institutions may also invoke corporate social responsibility (CSR) as a strategy. The article makes key contributions; firstly, it underscores the complementary dynamics that exist between CPA and CSR strategies in host markets characterised by weak and incomplete institutions. Secondly, the article contributes to the relatively under-explored nature of service sector MNEs operating in such institutional contexts." data-dcnode-id="5242" property="og:description"><span data-dcnode-id="5241" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="4771" data-gtm-vis-first-on-screen-50443292_562="980" data-gtm-vis-first-on-screen-50443292_563="980" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="980" data-gtm-vis-recent-on-screen-50443292_563="980" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="4772" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4776" id="Abs1"><span data-dcnode-id="4777" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="4773" id="Abs1-content"><p data-dcnode-id="4774"><span data-dcnode-id="4775" instrument_node="">In this article, we examine the mechanisms of the corporate political activities of service multinational enterprises (SMNEs) operating in an emerging economy. Reporting the findings of qualitative interviews with key decision-makers in Ukraine, the article illuminates how SMNEs operating in turbulent institutional contexts can enact various corporate political strategies, including social responsibility activities, to mitigate market costs and develop legitimacy. The findings elucidate how government agencies and institutions may also invoke corporate social responsibility (CSR) as a strategy. The article makes key contributions; firstly, it underscores the complementary dynamics that exist between CPA and CSR strategies in host markets characterised by weak and incomplete institutions. Secondly, the article contributes to the relatively under-explored nature of service sector MNEs operating in such institutional contexts.</span></p></div></div></section><span data-dcnode-id="4770" instrument_node="">
</span><section data-dcnode-id="4541" data-gtm-vis-first-on-screen-50443292_562="980" data-gtm-vis-first-on-screen-50443292_563="981" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="980" data-gtm-vis-recent-on-screen-50443292_563="981" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="4542" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4768" id="Sec1"><span data-dcnode-id="4769" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="4543" id="Sec1-content"><p data-dcnode-id="4736"><span data-dcnode-id="4767" instrument_node="">Academic debates on how multinational enterprises (MNEs) internationalise their operations (Cuervo-Cazurra </span><a aria-label="Reference 2016" data-dcnode-id="4765" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d266781703e479" title="Cuervo-Cazurra, A. (2016). Multilatinas as sources of new research insights: The learning and escape drivers of international expansion. Journal of Business Research,
                           69(6), 1963–1972."><span data-dcnode-id="4766" instrument_node="">2016</span></a><span data-dcnode-id="4764" instrument_node="">; Fortwengel </span><a aria-label="Reference 2017" data-dcnode-id="4762" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d266781703e482" title="Fortwengel, J. (2017). Understanding when MNCs can overcome institutional distance: A research agenda. Management International Review,
                           57(6), 793–814."><span data-dcnode-id="4763" instrument_node="">2017</span></a><span data-dcnode-id="4761" instrument_node="">; Regnér and Edman </span><a aria-label="Reference 2014" data-dcnode-id="4759" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR104" id="ref-link-section-d266781703e485" title="Regnér, P., &amp; Edman, J. (2014). MNE institutional advantage: How subunits shape, transpose and evade host country institutions. Journal of International Business Studies,
                           45(3), 275–302."><span data-dcnode-id="4760" instrument_node="">2014</span></a><span data-dcnode-id="4758" instrument_node="">), through foreign direct investment (FDI) and non-market strategies have focused predominantly on manufacturing and natural resource extraction firms. This is surprising given the fact that, comparing the 1990–1992 and 2010–2012 periods, global inward FDI within the service sector had grown by almost 908%, compared to 491% in the manufacturing sector (UNCTAD </span><a aria-label="Reference 2014" data-dcnode-id="4756" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR118" id="ref-link-section-d266781703e488" title="UNCTAD (2014). World Investment Report, Annex Table&nbsp;26—Estimated World Inward FDI Flows, by Sector and Industry, 1990–1992 and 2010–2012."><span data-dcnode-id="4757" instrument_node="">2014</span></a><span data-dcnode-id="4755" instrument_node="">). In general, MNEs are considered important players given their global influence and the activities in which they are confronted with a range of issues, stakeholders and institutional contexts, in both home and host countries (Kolk and Van Tulder </span><a aria-label="Reference 2010" data-dcnode-id="4753" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d266781703e491" title="Kolk, A., &amp; Van Tulder, R. (2010). International business, corporate social responsibility and sustainable development. International Business Review,
                           19(2), 119–125."><span data-dcnode-id="4754" instrument_node="">2010</span></a><span data-dcnode-id="4752" instrument_node="">). Furthermore, recently, scholars have increasingly recognised the potential for MNEs to be not only part of the problem, but also perhaps part of the solution, with corporate social responsibility (CSR) activities being seen as having long-term implications for the international business (IB) realm (Fetscherin et al. </span><a aria-label="Reference 2010" data-dcnode-id="4750" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR133" id="ref-link-section-d266781703e495" title="Fetscherin, M., Voss, H., &amp; Gugler, P. (2010). 30 Years of foreign direct investment to China: An interdisciplinary literature review. International business review, 19(3), 235–246."><span data-dcnode-id="4751" instrument_node="">2010</span></a><span data-dcnode-id="4749" instrument_node="">; Jamali et al. </span><a aria-label="Reference 2017" data-dcnode-id="4747" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d266781703e498" title="Jamali, D., Karam, C., Yin, J., &amp; Soundararajan, V. (2017). CSR logics in developing countries: Translation, adaptation and stalled development. Journal of World Business,
                           52(3), 343–359."><span data-dcnode-id="4748" instrument_node="">2017</span></a><span data-dcnode-id="4746" instrument_node="">; Park et al. </span><a aria-label="Reference 2014" data-dcnode-id="4744" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR94" id="ref-link-section-d266781703e501" title="Park, B. I., Chidlow, A., &amp; Choi, J. (2014). Corporate social responsibility: Stakeholders influence on MNEs’ activities. International Business Review,
                           23(5), 966–980."><span data-dcnode-id="4745" instrument_node="">2014</span></a><span data-dcnode-id="4743" instrument_node="">; Pisani et al. </span><a aria-label="Reference 2017" data-dcnode-id="4741" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR96" id="ref-link-section-d266781703e504" title="Pisani, N., Kourula, A., Kolk, A., &amp; Meijer, R. (2017). How global is international CSR research? Insights and recommendations from a systematic review. Journal of World Business,
                           52(5), 591–614."><span data-dcnode-id="4742" instrument_node="">2017</span></a><span data-dcnode-id="4740" instrument_node="">; Preuss et al. </span><a aria-label="Reference 2016" data-dcnode-id="4738" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR97" id="ref-link-section-d266781703e507" title="Preuss, L., Barkemeyer, R., &amp; Glavas, A. (2016). Corporate social responsibility in developing country multinationals: Identifying company and country-level influences. Business Ethics Quarterly,
                           26(3), 347–378."><span data-dcnode-id="4739" instrument_node="">2016</span></a><span data-dcnode-id="4737" instrument_node="">).</span></p><p data-dcnode-id="4686"><span data-dcnode-id="4735" instrument_node="">While a stream of studies on MNEs based on the service sector has emerged (Gleich et al. </span><a aria-label="Reference 2017" data-dcnode-id="4733" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d266781703e513" title="Gleich, W., Schmeisser, B., &amp; Zschoche, M. (2017). The influence of competition on international sourcing strategies in the service sector. International Business Review,
                           26(2), 279–287."><span data-dcnode-id="4734" instrument_node="">2017</span></a><span data-dcnode-id="4732" instrument_node="">; Kundu and Lahiri </span><a aria-label="Reference 2015" data-dcnode-id="4730" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d266781703e516" title="Kundu, S. K., &amp; Lahiri, S. (2015). Turning the spotlight on service multinationals: New theoretical insights and empirical evidence. Journal of International Management,
                           21(3), 215–219."><span data-dcnode-id="4731" instrument_node="">2015</span></a><span data-dcnode-id="4729" instrument_node="">; Kundu and Merchant </span><a aria-label="Reference 2008" data-dcnode-id="4727" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d266781703e519" title="Kundu, S. K., &amp; Merchant, H. (2008). Service multinationals: Their past, present, and future. Management International Review,
                           48(4), 371–377."><span data-dcnode-id="4728" instrument_node="">2008</span></a><span data-dcnode-id="4726" instrument_node="">; Stevens et al. </span><a aria-label="Reference 2015" data-dcnode-id="4724" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR113" id="ref-link-section-d266781703e522" title="Stevens, C. E., Makarius, E. E., &amp; Mukherjee, D. (2015). It takes two to tango: Signaling behavioral intent in service multinationals’ foreign entry strategies. Journal of International Management,
                           21(3), 235–248."><span data-dcnode-id="4725" instrument_node="">2015</span></a><span data-dcnode-id="4723" instrument_node="">), the extant IB literature has failed to keep pace with the growth of the service industries (Jaklič et al. </span><a aria-label="Reference 2012" data-dcnode-id="4721" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d266781703e525" title="Jaklič, A., Ćirjaković, J., &amp; Chidlow, A. (2012). Exploring the effects of international sourcing on manufacturing versus service firms. The Service Industries Journal,
                           32(7), 1193–1207."><span data-dcnode-id="4722" instrument_node="">2012</span></a><span data-dcnode-id="4720" instrument_node="">) and their associated processes of internationalisation over recent years. A decade ago, Kundu and Merchant (</span><a aria-label="Reference 2008" data-dcnode-id="4718" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d266781703e529" title="Kundu, S. K., &amp; Merchant, H. (2008). Service multinationals: Their past, present, and future. Management International Review,
                           48(4), 371–377."><span data-dcnode-id="4719" instrument_node="">2008</span></a><span data-dcnode-id="4717" instrument_node="">, p. 376), noted that “the challenge lies ahead in the development of theories of service multinational enterprise to explain the intricacies of service firms”. This challenge remains. There has been a dearth of research examining the ways in which service MNEs use non-market strategies (Contractor and Kundu </span><a aria-label="Reference 1998" data-dcnode-id="4715" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d266781703e532" title="Contractor, F. J., &amp; Kundu, S. K. (1998). Modal choice in a world of alliances: Analyzing organizational forms in the international hotel sector. Journal of International Business Studies,
                           29(2), 325–356."><span data-dcnode-id="4716" instrument_node="">1998</span></a><span data-dcnode-id="4714" instrument_node="">; Ghauri et al. </span><a aria-label="Reference 2014" data-dcnode-id="4712" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d266781703e535" title="Ghauri, P., Tasavori, M., &amp; Zaefarian, R. (2014). Internationalisation of service firms through corporate social entrepreneurship and networking. International Marketing Review,
                           31(6), 576–600."><span data-dcnode-id="4713" instrument_node="">2014</span></a><span data-dcnode-id="4711" instrument_node="">) in order to navigate the constraints placed on their business activities by turbulent and often uncertain institutional contexts (De Villa et al. </span><a aria-label="Reference 2018" data-dcnode-id="4709" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d266781703e538" title="De Villa, M. A., Rajwani, T. S., Lawton, T., &amp; Mellahi, K. (2018). To engage or not to engage with host governments: Corporate political activity and host-country political risk. Global Strategy Journal, 9(2), 208–242."><span data-dcnode-id="4710" instrument_node="">2018</span></a><span data-dcnode-id="4708" instrument_node="">). This encompasses how they sustain the business micro-aspects of the corporate political activities (CPA) connected with corporate social responsibility (CSR) actions in their host countries (Saka-Helmhout and Geppert </span><a aria-label="Reference 2011" data-dcnode-id="4706" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR107" id="ref-link-section-d266781703e541" title="Saka-Helmhout, A., &amp; Geppert, M. (2011). Different forms of agency and institutional influences within multinational enterprises. Management International Review,

                           36(3), 322–340."><span data-dcnode-id="4580" instrument_node="">2005</span></a><span data-dcnode-id="4578" instrument_node="">; Rodriguez et al. </span><a aria-label="Reference 2006" data-dcnode-id="4576" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR106" id="ref-link-section-d266781703e679" title="Rodriguez, P., Siegel, D. S., Hillman, A., &amp; Eden, L. (2006). Three lenses on the multinational enterprise: Politics, corruption, and corporate social responsibility. Journal of International Business Studies,
                           37(6), 733–746."><span data-dcnode-id="4577" instrument_node="">2006</span></a><span data-dcnode-id="4575" instrument_node="">; Tasavori et al. </span><a aria-label="Reference 2015" data-dcnode-id="4573" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR116" id="ref-link-section-d266781703e682" title="Tasavori, M., Zaefarian, R., &amp; Ghauri, P. N. (2015). The creation view of opportunities at the base of the pyramid. Entrepreneurship and Regional Development,
                           27(1–2), 106–126."><span data-dcnode-id="4574" instrument_node="">2015</span></a><span data-dcnode-id="4572" instrument_node="">). Thus, this article provides novel insights in relation to the latter and directly responds to the objective of this </span><i data-dcnode-id="4570"><span data-dcnode-id="4571" instrument_node="">Call for Articles</span></i><span data-dcnode-id="4569" instrument_node=""> to examine how in situ Service MNEs use CPA, connected with embedded CSR, to drive forward their business operations in different market contexts.</span></p><p data-dcnode-id="4548"><span data-dcnode-id="4567" instrument_node="">This article extends our understanding of mechanisms in organizational research (Anderson et al. </span><a aria-label="Reference 2006" data-dcnode-id="4565" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d266781703e692" title="Anderson, P. J. J., Blatt, R., Christianson, M. K., Grant, A. M., Marquis, C., &amp; Neuman, E. J. (2006). Understanding mechanisms in organizational research: Reflections from a collective journey. Journal of Management Inquiry,
                           15(2), 102–113."><span data-dcnode-id="4566" instrument_node="">2006</span></a><span data-dcnode-id="4564" instrument_node="">) by arguing that the corporate political activities of in situ Service MNEs are the product of entwined </span><i data-dcnode-id="4562"><span data-dcnode-id="4563" instrument_node="">micro</span></i><span data-dcnode-id="4561" instrument_node="">-</span><i data-dcnode-id="4559"><span data-dcnode-id="4560" instrument_node="">level</span></i><span data-dcnode-id="4558" instrument_node=""> business-state relations. From a theoretical standpoint, our article argues for the need to move beyond focusing too heavily on macro-orientated market competition perspectives (Whittington </span><a aria-label="Reference 2012" data-dcnode-id="4556" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR120" id="ref-link-section-d266781703e701" title="Whittington, R. (2012). Big strategy/small strategy. Strategic Organization,
                           10(3), 263–268."><span data-dcnode-id="4557" instrument_node="">2012</span></a><span data-dcnode-id="4555" instrument_node="">), providing, instead, theoretical frameworks that embrace and engage with how state capacity, in a variety of different contexts, impacts on firms’ strategic (micro-) choices. Rather than government influences being in decline (Khanna and Yafeh </span><a aria-label="Reference 2007" data-dcnode-id="4553" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d266781703e704" title="Khanna, T., &amp; Yafeh, Y. (2007). Business groups in emerging markets: Paragons or parasites? Journal of Economic Literature,
                           45(2), 331–372."><span data-dcnode-id="4554" instrument_node="">2007</span></a><span data-dcnode-id="4552" instrument_node="">; Puffer and McCarthy </span><a aria-label="Reference 2011" data-dcnode-id="4550" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR99" id="ref-link-section-d266781703e708" title="Puffer, S., &amp; McCarthy, D. (2011). Two decades of Russian business and management research: An institutional theory perspective. Academy of Management Perspectives,
                           25(2), 21–36."><span data-dcnode-id="4551" instrument_node="">2011</span></a><span data-dcnode-id="4549" instrument_node="">), our findings demonstrate how, in the case of Ukraine, state capacity continues, in divergent ways, to influence specific non-market behaviours, and necessarily impacts upon the lived experiences of MNEs in such contexts. Against the backdrop of the above gaps, this article addresses the following research question:</span></p><p data-dcnode-id="4546"><span data-dcnode-id="4547" instrument_node="">How do mechanisms of in situ/post-entry Service MNEs CPA and CSR activities interact at the micro-level, and with what implications, contextualised in the non-Western European emerging economic context of the Ukraine?</span></p><p data-dcnode-id="4544"><span data-dcnode-id="4545" instrument_node="">This article is structured as follows. Firstly, we discuss the theoretical and contextual background to the study, bringing together Service MNC CPA, non-market and CSR literature within the business and management discipline. We then briefly outline the state-business relations in Ukraine. Next, the article outlines the methodology developed and employed by the study, which is followed by the presentation of our data and findings. We conclude the article with a discussion of the resultant insights, and of the implications and limitations of the findings.</span></p></div></div></section><section data-dcnode-id="4235" data-gtm-vis-first-on-screen-50443292_562="980" data-gtm-vis-first-on-screen-50443292_563="981" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="980" data-gtm-vis-recent-on-screen-50443292_563="981" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Conceptual Background"><div class="c-article-section" data-dcnode-id="4236" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4539" id="Sec2"><span data-dcnode-id="4540" instrument_node="">Conceptual Background</span></h2><div class="c-article-section__content" data-dcnode-id="4237" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="4537" id="Sec3"><span data-dcnode-id="4538" instrument_node="">Non-market and CSR Strategies</span></h3><p data-dcnode-id="4514"><span data-dcnode-id="4536" instrument_node="">The study of strategy has focused primarily on the supra level of the competitive aspects of firm activities and behaviours (Bartlett and Ghoshal </span><a aria-label="Reference 2002" data-dcnode-id="4534" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d266781703e729" title="Bartlett, C., &amp; Ghoshal, S. (2002). Building competitive advantage through people. Sloan Management Review,
                           43(2), 34–41."><span data-dcnode-id="4535" instrument_node="">2002</span></a><span data-dcnode-id="4533" instrument_node="">). In consequence, the strategic literature has dedicated less attention to micro-practices (Jarzabkowski </span><a aria-label="Reference 2005" data-dcnode-id="4531" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d266781703e732" title="Jarzabkowski, P. (2005). Strategy as practice. London: Sage Publications."><span data-dcnode-id="4532" instrument_node="">2005</span></a><span data-dcnode-id="4530" instrument_node="">) or to the institutional environment that shapes competitive strategy (Marquis and Raynard </span><a aria-label="Reference 2015" data-dcnode-id="4528" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d266781703e735" title="Marquis, C., &amp; Raynard, M. (2015). Institutional strategies in emerging markets. Academy of Management Annals,
                           9(1), 291–335."><span data-dcnode-id="4529" instrument_node="">2015</span></a><span data-dcnode-id="4527" instrument_node="">). Thus, the development of an understanding of </span><i data-dcnode-id="4525"><span data-dcnode-id="4526" instrument_node="">firm interaction</span></i><span data-dcnode-id="4524" instrument_node=""> in relation to institutional context(s) has formed the primary unit of analysis and shaped the burgeoning literature on ‘non-market’ strategies (Lux et al. </span><a aria-label="Reference 2011" data-dcnode-id="4522" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d266781703e741" title="Lux, S., Crook, T., &amp; Woehr, D. (2011). Mixing business with politics: A meta-analysis of the antecedents and outcomes of corporate political activity. Journal of Management,
                           37(1), 223–247."><span data-dcnode-id="4523" instrument_node="">2011</span></a><span data-dcnode-id="4521" instrument_node="">). The navigation of differing institutional and cultural contexts and non-market aspects constitutes an increasingly critical aspect of firm behaviours. Lawton et al. (</span><a aria-label="Reference 2013a" data-dcnode-id="4519" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d266781703e745" title="Lawton, T., McGuire, S., &amp; Rajwani, T. (2013a). Corporate political activity: A literature review and research agenda. International Journal of Management Reviews,
                           15(1), 86–105."><span data-dcnode-id="4520" instrument_node="">2013a</span></a><span data-dcnode-id="4518" instrument_node="">) signalled that the work on CPA that adopts a functionalist perspective tends to cast the firm’s environment as “apolitical” and “primarily concerned with regulatory compliance”, thus neglecting a multi-faceted, fine-grained, culturally contextual or more granular study of the domain (Demirbag et al. </span><a aria-label="Reference 2017" data-dcnode-id="4516" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d266781703e748" title="Demirbag, M., Wood, G., Makhmadshoev, D., &amp; Rymkevich, O. (2017). Varieties of CSR: Institutions and socially responsible behaviour. International Business Review,
                           26(6), 1064–1074."><span data-dcnode-id="4517" instrument_node="">2017</span></a><span data-dcnode-id="4515" instrument_node="">).</span></p><p data-dcnode-id="4491"><span data-dcnode-id="4513" instrument_node="">At the broad level, the aim of non-market strategies and associated firm behaviours is generally to improve firm performance by “managing the firm’s institutional context” (Lux et al. </span><a aria-label="Reference 2011" data-dcnode-id="4511" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d266781703e754" title="Lux, S., Crook, T., &amp; Woehr, D. (2011). Mixing business with politics: A meta-analysis of the antecedents and outcomes of corporate political activity. Journal of Management,
                           37(1), 223–247."><span data-dcnode-id="4512" instrument_node="">2011</span></a><span data-dcnode-id="4510" instrument_node="">, p. 225). Thus, non-market strategies influence firm behaviours such as market entry choices (Elsahn and Benson-Rea </span><a aria-label="Reference 2018" data-dcnode-id="4508" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d266781703e757" title="Elsahn, Z. F., &amp; Benson-Rea, M. (2018). Political schemas and corporate political activities during foreign market entry: A micro-process perspective. Management International Review,
                           58(5), 771–811."><span data-dcnode-id="4509" instrument_node="">2018</span></a><span data-dcnode-id="4507" instrument_node="">;&nbsp;Mellahi et al. </span><a aria-label="Reference 2016" data-dcnode-id="4505" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d266781703e760" title="Mellahi, K., Frynas, J., Sun, P., &amp; Siegel, D. (2016). A review of the non-market strategy literature: Towards a multitheoretical integration. Journal of Management,
                           24(1), 143–173."><span data-dcnode-id="4506" instrument_node="">2016</span></a><span data-dcnode-id="4504" instrument_node="">; Tasavori et al. </span><a aria-label="Reference 2015" data-dcnode-id="4502" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR116" id="ref-link-section-d266781703e763" title="Tasavori, M., Zaefarian, R., &amp; Ghauri, P. N. (2015). The creation view of opportunities at the base of the pyramid. Entrepreneurship and Regional Development,
                           27(1–2), 106–126."><span data-dcnode-id="4503" instrument_node="">2015</span></a><span data-dcnode-id="4501" instrument_node="">). Research on non-market activities tends to assume that firms are able to make choices about how, when, and why to engage in non-market strategic activities (Holburn and Vanden Bergh </span><a aria-label="Reference 2008" data-dcnode-id="4499" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d266781703e766" title="Holburn, G., &amp; Vanden Bergh, R. (2008). Making friends in hostile environments: Political strategy in regulated industries. Academy of Management Review,
                           33(2), 521–540."><span data-dcnode-id="4500" instrument_node="">2008</span></a><span data-dcnode-id="4498" instrument_node="">). However, this may not be applicable to all context as activities such as, for example, CSR have been signalled as highly contextual (Crotty </span><a aria-label="Reference 2016" data-dcnode-id="4496" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d266781703e770" title="Crotty, J. (2016). Corporate social responsibility in the Russian federation: A contextualized approach. Business and Society,
                           55(6), 825–853."><span data-dcnode-id="4497" instrument_node="">2016</span></a><span data-dcnode-id="4495" instrument_node="">; Demirbag et al. </span><a aria-label="Reference 2017" data-dcnode-id="4493" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d266781703e773" title="Demirbag, M., Wood, G., Makhmadshoev, D., &amp; Rymkevich, O. (2017). Varieties of CSR: Institutions and socially responsible behaviour. International Business Review,
                           26(6), 1064–1074."><span data-dcnode-id="4494" instrument_node="">2017</span></a><span data-dcnode-id="4492" instrument_node="">). It is thus important to conduct studies that develop such contextualisation.</span></p><p data-dcnode-id="4456"><span data-dcnode-id="4490" instrument_node="">Furthermore, the functional perspectives of non-market strategies argue that CPA activities targeted at formal institutions generally work to ensure the mitigation of unfavourable policy changes (Henisz and Zelner </span><a aria-label="Reference 2012" data-dcnode-id="4488" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d266781703e779" title="Henisz, W., &amp; Zelner, B. (2012). Strategy and competition in the market and non-market arenas. Academy of Management Perspectives,
                           26(3), 40–51."><span data-dcnode-id="4489" instrument_node="">2012</span></a><span data-dcnode-id="4487" instrument_node="">) and, with informal institutions, the imposition of restrictions of acceptable non-market practices (Biggart and Guillén </span><a aria-label="Reference 1999" data-dcnode-id="4485" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d266781703e782" title="Biggart, N., &amp; Guillén, M. (1999). Developing difference: Social organization and the rise of the auto industries of South Korea, Taiwan, Spain, and Argentina. American Sociological Review,
                           64(5), 722–747."><span data-dcnode-id="4486" instrument_node="">1999</span></a><span data-dcnode-id="4484" instrument_node="">; Khan et al. </span><a aria-label="Reference 2015" data-dcnode-id="4482" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d266781703e785" title="Khan, Z., Lew, Y. K., &amp; Park, B. I. (2015). Institutional legitimacy and norms-based CSR marketing practices: Insights from MNCs operating in a developing economy. International Marketing Review,
                           32(5), 463–491."><span data-dcnode-id="4483" instrument_node="">2015</span></a><span data-dcnode-id="4481" instrument_node="">). Hence, in functionalist approaches, firms need to target non-market strategy activities at the key individuals who can affect policy making (Holburn and Vanden Bergh </span><a aria-label="Reference 2008" data-dcnode-id="4479" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d266781703e788" title="Holburn, G., &amp; Vanden Bergh, R. (2008). Making friends in hostile environments: Political strategy in regulated industries. Academy of Management Review,
                           33(2), 521–540."><span data-dcnode-id="4480" instrument_node="">2008</span></a><span data-dcnode-id="4478" instrument_node="">), which forms the basis for CPA (Hillman et al. </span><a aria-label="Reference 2004" data-dcnode-id="4476" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d266781703e791" title="Hillman, A., Keim, G., &amp; Schuler, D. (2004). Corporate political activity: A review and research agenda. Journal of Management,
                           30(6), 837–857."><span data-dcnode-id="4477" instrument_node="">2004</span></a><span data-dcnode-id="4475" instrument_node="">). Thus, research on non-market strategies extends to aspects of lobbying or corruptive firm behaviours (Mauro </span><a aria-label="Reference 1995" data-dcnode-id="4473" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d266781703e795" title="Mauro, P. (1995). Corruption and growth. The Quarterly Journal of Economics,
                           110(3), 681–712."><span data-dcnode-id="4474" instrument_node="">1995</span></a><span data-dcnode-id="4472" instrument_node="">). Although this perspective on non-market strategies provides some indication of the rationale by which firms to engage in such activities, it neglects firm-level attributes such as the amalgam of CPA and CSR non-market resources and capabilities (e.g., Frynas et al. </span><a aria-label="Reference 2017" data-dcnode-id="4470" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d266781703e798" title="Frynas, J. G., Child, J., &amp; Tarba, S. Y. (2017). Non-market social and political strategies—new integrative approaches and interdisciplinary borrowings. British Journal of Management,
                           28(4), 559–574."><span data-dcnode-id="4471" instrument_node="">2017</span></a><span data-dcnode-id="4469" instrument_node="">). For example, a firm’s ties with specific individuals (Biggart and Guillén </span><a aria-label="Reference 1999" data-dcnode-id="4467" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d266781703e801" title="Biggart, N., &amp; Guillén, M. (1999). Developing difference: Social organization and the rise of the auto industries of South Korea, Taiwan, Spain, and Argentina. American Sociological Review,
                           64(5), 722–747."><span data-dcnode-id="4468" instrument_node="">1999</span></a><span data-dcnode-id="4466" instrument_node="">; Dieleman and Boddewyn </span><a aria-label="Reference 2011" data-dcnode-id="4464" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d266781703e804" title="Dieleman, M., &amp; Boddewyn, J. (2011). Using organization structure to buffer political ties in emerging markets: A case study. Organization Studies,
                           33(1), 71–95."><span data-dcnode-id="4465" instrument_node="">2011</span></a><span data-dcnode-id="4463" instrument_node="">) may provide an organization with access to resources unavailable to others. Therefore, a firm can use such partial ties to not only engage in non-market strategies, but to also mitigate political risks, with such ties forming a buffer against arbitrary institutional behaviours (Dieleman and Boddewyn </span><a aria-label="Reference 2011" data-dcnode-id="4461" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d266781703e807" title="Dieleman, M., &amp; Boddewyn, J. (2011). Using organization structure to buffer political ties in emerging markets: A case study. Organization Studies,
                           33(1), 71–95."><span data-dcnode-id="4462" instrument_node="">2011</span></a><span data-dcnode-id="4460" instrument_node="">). However, the value of each of these ties may differ across organizations (Okhmatovskiy </span><a aria-label="Reference 2010" data-dcnode-id="4458" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR92" id="ref-link-section-d266781703e810" title="Okhmatovskiy, I. (2010). Performance implications of ties to the government and SOEs: A political embeddedness perspective. Journal of Management Studies,
                           47(6), 1020–1047."><span data-dcnode-id="4459" instrument_node="">2010</span></a><span data-dcnode-id="4457" instrument_node="">); hence, some may enable pro-active non-market strategies while others may serve as reactive risk management of resources.</span></p><p data-dcnode-id="4442"><span data-dcnode-id="4455" instrument_node="">In addition to the functional perspective of non-market strategies, a more dynamic institutional theory, inspired by a deeper understanding of non-market strategies, is emerging. In this understanding, firms use non-market strategies to seek legitimacy (Reast et al. </span><a aria-label="Reference 2013" data-dcnode-id="4453" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR103" id="ref-link-section-d266781703e816" title="Reast, J., Maon, F., Lindgreen, A., &amp; Vanhamme, J. (2013). Legitimacy-Seeking organizational strategies in controversial industries: A case study analysis and a bidimensional model. Journal of Business Ethics,
                           118(1), 139–153."><span data-dcnode-id="4454" instrument_node="">2013</span></a><span data-dcnode-id="4452" instrument_node="">) and overcome their liability of foreignness (e.g., Zaheer </span><a aria-label="Reference 1995" data-dcnode-id="4450" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR124" id="ref-link-section-d266781703e819" title="Zaheer, S. (1995). Overcoming the liability of foreignness. Academy of Management Journal,
                           38(2), 341–363."><span data-dcnode-id="4451" instrument_node="">1995</span></a><span data-dcnode-id="4449" instrument_node="">) by, for example, aiming to influence the setting of agendas with relevant regulators or by finding access points that enable the forecasting of any changes to the non-market environment. In a review of non-market literature, Mellahi et al. (</span><a aria-label="Reference 2016" data-dcnode-id="4447" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d266781703e822" title="Mellahi, K., Frynas, J., Sun, P., &amp; Siegel, D. (2016). A review of the non-market strategy literature: Towards a multitheoretical integration. Journal of Management,
                           24(1), 143–173."><span data-dcnode-id="4448" instrument_node="">2016</span></a><span data-dcnode-id="4446" instrument_node="">) found that stakeholder theory, agency theory, institutional theory, resource-based views, and resource dependency theory are often employed as theoretical lenses to examine non-market strategies. Each of these theoretical foci concentrates on different analytical levels, providing insights into how firms use non-market strategies in host markets. These underline how non-market strategic activities are used to attain legitimacy, access resources, garner support from stakeholders and develop resources and capabilities suited to navigate the competitive market environment (McWilliams and Siegel </span><a aria-label="Reference 2001" data-dcnode-id="4444" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d266781703e825" title="McWilliams, A., &amp; Siegel, D. (2001). Corporate social responsibility: A theory of the firm perspective. Academy of Management Review,
                           26(1), 117–127."><span data-dcnode-id="4445" instrument_node="">2001</span></a><span data-dcnode-id="4443" instrument_node="">).</span></p><p data-dcnode-id="4407"><span data-dcnode-id="4441" instrument_node="">Further important drivers of non-market literature are CSR (Aguinies and Glavas </span><a aria-label="Reference 2012" data-dcnode-id="4439" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d266781703e832" title="Aguinies, H., &amp; Glavas, A. (2012). What we know and don’t know about corporate social responsibility: A review and research agenda. Journal of Management,
                           38(4), 932–968."><span data-dcnode-id="4440" instrument_node="">2012</span></a><span data-dcnode-id="4438" instrument_node="">; Demirbag et al. </span><a aria-label="Reference 2017" data-dcnode-id="4436" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d266781703e835" title="Demirbag, M., Wood, G., Makhmadshoev, D., &amp; Rymkevich, O. (2017). Varieties of CSR: Institutions and socially responsible behaviour. International Business Review,
                           26(6), 1064–1074."><span data-dcnode-id="4437" instrument_node="">2017</span></a><span data-dcnode-id="4435" instrument_node="">) and corporate political strategy/CPA (Lawton et al. </span><a aria-label="Reference 2013a" data-dcnode-id="4433" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d266781703e838" title="Lawton, T., McGuire, S., &amp; Rajwani, T. (2013a). Corporate political activity: A literature review and research agenda. International Journal of Management Reviews,
                           15(1), 86–105."><span data-dcnode-id="4434" instrument_node="">2013a</span></a><span data-dcnode-id="4432" instrument_node="">). In particular, CPA is a core aspect of non-market strategies because success in political markets facilitates success in competitive ones (Rajwani and Liedong </span><a aria-label="Reference 2015" data-dcnode-id="4430" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d266781703e841" title="Rajwani, T., &amp; Liedong, T. (2015). Political activity and firm performance within non-market research: A review and international comparative assessment. Journal of World Business,
                           50(2), 273–283."><span data-dcnode-id="4431" instrument_node="">2015</span></a><span data-dcnode-id="4429" instrument_node="">). Even more pertinent for the present argument, CPA is common to organizational activities in emerging and transition countries (Rajwani and Liedong </span><a aria-label="Reference 2015" data-dcnode-id="4427" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d266781703e844" title="Rajwani, T., &amp; Liedong, T. (2015). Political activity and firm performance within non-market research: A review and international comparative assessment. Journal of World Business,
                           50(2), 273–283."><span data-dcnode-id="4428" instrument_node="">2015</span></a><span data-dcnode-id="4426" instrument_node="">). Therein, CPA is often associated with issues of corruption, lobbying, and other activities aimed at influencing the ‘formal’ institutional environment (Lawton et al. </span><a aria-label="Reference 2013a" data-dcnode-id="4424" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d266781703e848" title="Lawton, T., McGuire, S., &amp; Rajwani, T. (2013a). Corporate political activity: A literature review and research agenda. International Journal of Management Reviews,
                           15(1), 86–105."><span data-dcnode-id="4425" instrument_node="">2013a</span></a><span data-dcnode-id="4423" instrument_node="">). Within developed market economies, CPA focuses primarily on influencing, shaping, preventing, or gaining an early understanding of the regulatory developments affecting a firm’s market (and particularly entry) strategies (Doh et al. </span><a aria-label="Reference 2012" data-dcnode-id="4421" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d266781703e851" title="Doh, J., Lawton, T., &amp; Rajwani, T. (2012). Advancing non-market strategy research: Institutional perspectives in a changing world. The Academy of Management Perspectives,
                           26(3), 22–39."><span data-dcnode-id="4422" instrument_node="">2012</span></a><span data-dcnode-id="4420" instrument_node="">; Lawton et al. </span><a aria-label="Reference 2013a" data-dcnode-id="4418" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d266781703e854" title="Lawton, T., McGuire, S., &amp; Rajwani, T. (2013a). Corporate political activity: A literature review and research agenda. International Journal of Management Reviews,
                           15(1), 86–105."><span data-dcnode-id="4419" instrument_node="">2013a</span></a><span data-dcnode-id="4417" instrument_node="">). By contrast, where institutional contexts are unstable or missing, firms use CPA to offset institutional voids. This can often lead to exchange relationships between firms and the state, which can provide the former with legitimacy or, in some cases, result in them engaging in illicit and corrupt behaviours (Doh et al. </span><a aria-label="Reference 2012" data-dcnode-id="4415" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d266781703e857" title="Doh, J., Lawton, T., &amp; Rajwani, T. (2012). Advancing non-market strategy research: Institutional perspectives in a changing world. The Academy of Management Perspectives,
                           26(3), 22–39."><span data-dcnode-id="4416" instrument_node="">2012</span></a><span data-dcnode-id="4414" instrument_node="">; Lawton et al. </span><a aria-label="Reference 2013a" data-dcnode-id="4412" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d266781703e860" title="Lawton, T., McGuire, S., &amp; Rajwani, T. (2013a). Corporate political activity: A literature review and research agenda. International Journal of Management Reviews,
                           15(1), 86–105."><span data-dcnode-id="4413" instrument_node="">2013a</span></a><span data-dcnode-id="4411" instrument_node="">). Therein, Petrou (</span><a aria-label="Reference 2015" data-dcnode-id="4409" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d266781703e863" title="Petrou, A. (2015). Arbitrariness of corruption and foreign affiliate performance: A resource dependence perspective. Journal of World Business,
                           50(4), 826–837."><span data-dcnode-id="4410" instrument_node="">2015</span></a><span data-dcnode-id="4408" instrument_node="">) noted that foreign firms might find themselves at a particular disadvantage, as they are not indigenous to established networks and therefore lack integration at both the individual and social group levels.</span></p><p data-dcnode-id="4390"><span data-dcnode-id="4406" instrument_node="">However, the non-market literature has hitherto focused on institutional context as a </span><i data-dcnode-id="4404"><span data-dcnode-id="4405" instrument_node="">moderator</span></i><span data-dcnode-id="4403" instrument_node=""> of non-market strategies, with firms being able to shape and manage their contexts by engaging in such behaviours. There is less awareness of how the institutional context </span><i data-dcnode-id="4401"><span data-dcnode-id="4402" instrument_node="">predicates</span></i><span data-dcnode-id="4400" instrument_node=""> specific firm non-market behaviours and strategies and the myriad individuals within and surrounding them. Therefore, Lawton et al. (</span><a aria-label="Reference 2013a" data-dcnode-id="4398" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d266781703e875" title="Lawton, T., McGuire, S., &amp; Rajwani, T. (2013a). Corporate political activity: A literature review and research agenda. International Journal of Management Reviews,
                           15(1), 86–105."><span data-dcnode-id="4399" instrument_node="">2013a</span></a><span data-dcnode-id="4397" instrument_node="">) and Frynas and Stephens (</span><a aria-label="Reference 2014" data-dcnode-id="4395" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d266781703e878" title="Frynas, J., &amp; Stephens, S. (2014). Political corporate social responsibility: Reviewing theories and setting new agendas. International Journal of Management Reviews,
                           17(4), 483–509."><span data-dcnode-id="4396" instrument_node="">2014</span></a><span data-dcnode-id="4394" instrument_node="">) issued a call to re-examine the role played by </span><i data-dcnode-id="4392"><span data-dcnode-id="4393" instrument_node="">the state</span></i><span data-dcnode-id="4391" instrument_node=""> in the mechanics and mechanisms of non-market strategies.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4388" id="Sec4"><span data-dcnode-id="4389" instrument_node="">Contextualising and Politicizing CSR as Part of CPA</span></h3><p data-dcnode-id="4341"><span data-dcnode-id="4387" instrument_node="">CSR has traditionally been based upon the implicit understanding that firms voluntarily (Carroll and Shabana </span><a aria-label="Reference 2010" data-dcnode-id="4385" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d266781703e892" title="Carroll, A. B., &amp; Shabana, K. M. (2010). The business case for corporate social responsibility: A review of concepts, research and practice. International Journal of Management Reviews,
                           12(1), 85–105."><span data-dcnode-id="4386" instrument_node="">2010</span></a><span data-dcnode-id="4384" instrument_node="">) engage in responsible activities to which they are not legally obliged. Nevertheless, scholars have recently underscored the importance to fully understand CSR of the context within which business activities take place (Demirbag et al. </span><a aria-label="Reference 2017" data-dcnode-id="4382" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d266781703e895" title="Demirbag, M., Wood, G., Makhmadshoev, D., &amp; Rymkevich, O. (2017). Varieties of CSR: Institutions and socially responsible behaviour. International Business Review,
                           26(6), 1064–1074."><span data-dcnode-id="4383" instrument_node="">2017</span></a><span data-dcnode-id="4381" instrument_node="">; Halme et al. </span><a aria-label="Reference 2009" data-dcnode-id="4379" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d266781703e898" title="Halme, M., Roome, N., &amp; Dobers, P. (2009). Corporate responsibility: Reflections on contexts and consequences. Scandinavian Journal of Management,
                           25(1), 1–9."><span data-dcnode-id="4380" instrument_node="">2009</span></a><span data-dcnode-id="4378" instrument_node="">). Barkemeyer (</span><a aria-label="Reference 2009" data-dcnode-id="4376" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d266781703e901" title="Barkemeyer, R. (2009). Beyond compliance—below expectations? CSR in the con-text of international development. Business Ethics: A European Review,
                           18(3), 273–288."><span data-dcnode-id="4377" instrument_node="">2009</span></a><span data-dcnode-id="4375" instrument_node="">) argued that Western approaches to CSR have limited relevance in non-Western institutional environments, especially in transitional countries. Moreover, Dobers and Halme (</span><a aria-label="Reference 2009" data-dcnode-id="4373" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d266781703e904" title="Dobers, P., &amp; Halme, M. (2009). Corporate social responsibility and developing countries. Corporate Social Responsibility and Environmental Management,
                           16(5), 237–259."><span data-dcnode-id="4374" instrument_node="">2009</span></a><span data-dcnode-id="4372" instrument_node="">) argued that, in specific institutional environments in which institutions are weak, CSR may be understood and enacted in alternative ways, giving it a different ‘twist’. As a result, traditional assumptions about CSR have increasingly been challenged, with a corpus of scholars (Blasco and Zølner </span><a aria-label="Reference 2010" data-dcnode-id="4370" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d266781703e908" title="Blasco, M., &amp; Zølner, M. (2010). Corporate social responsibility in Mexico and France: Exploring the role of normative institutions. Business and Society,
                           49(2), 216–251."><span data-dcnode-id="4371" instrument_node="">2010</span></a><span data-dcnode-id="4369" instrument_node="">; Chapple and Moon </span><a aria-label="Reference 2005" data-dcnode-id="4367" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d266781703e911" title="Chapple, W., &amp; Moon, J. (2005). Corporate social responsibility in Asia: A seven country study of CSR web site reporting. Business and Society,
                           44(4), 415–441."><span data-dcnode-id="4368" instrument_node="">2005</span></a><span data-dcnode-id="4366" instrument_node="">) arguing the need for more contextualized research on CSR, one that appreciates the importance of varieties of institutional, legal, and cultural contexts (Halme et al. </span><a aria-label="Reference 2009" data-dcnode-id="4364" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d266781703e914" title="Halme, M., Roome, N., &amp; Dobers, P. (2009). Corporate responsibility: Reflections on contexts and consequences. Scandinavian Journal of Management,
                           25(1), 1–9."><span data-dcnode-id="4365" instrument_node="">2009</span></a><span data-dcnode-id="4363" instrument_node="">). Recently, there has been an increase in studies on CSR in emerging and developing countries (Khan et al. </span><a aria-label="Reference 2015" data-dcnode-id="4361" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d266781703e917" title="Khan, Z., Lew, Y. K., &amp; Park, B. I. (2015). Institutional legitimacy and norms-based CSR marketing practices: Insights from MNCs operating in a developing economy. International Marketing Review,
                           32(5), 463–491."><span data-dcnode-id="4362" instrument_node="">2015</span></a><span data-dcnode-id="4360" instrument_node="">; Kolk and Van Tulder </span><a aria-label="Reference 2010" data-dcnode-id="4358" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d266781703e920" title="Kolk, A., &amp; Van Tulder, R. (2010). International business, corporate social responsibility and sustainable development. International Business Review,
                           19(2), 119–125."><span data-dcnode-id="4359" instrument_node="">2010</span></a><span data-dcnode-id="4357" instrument_node="">; Park et al. </span><a aria-label="Reference 2014" data-dcnode-id="4355" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR94" id="ref-link-section-d266781703e923" title="Park, B. I., Chidlow, A., &amp; Choi, J. (2014). Corporate social responsibility: Stakeholders influence on MNEs’ activities. International Business Review,
                           23(5), 966–980."><span data-dcnode-id="4356" instrument_node="">2014</span></a><span data-dcnode-id="4354" instrument_node="">), including China (Li and Zhang </span><a aria-label="Reference 2010" data-dcnode-id="4352" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d266781703e927" title="Li, W., &amp; Zhang, R. (2010). Corporate social responsibility, ownership structure and political interference: Evidence from China. Journal of Business Ethics,
                           96(4), 631–645."><span data-dcnode-id="4353" instrument_node="">2010</span></a><span data-dcnode-id="4351" instrument_node="">; Xu and Yang </span><a aria-label="Reference 2010" data-dcnode-id="4349" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR123" id="ref-link-section-d266781703e930" title="Xu, S., &amp; Yang, R. (2010). Indigenous characteristics of Chinese corporate social responsibility conceptual paradigm. Journal of Business Ethics,
                           93(2), 321–333."><span data-dcnode-id="4350" instrument_node="">2010</span></a><span data-dcnode-id="4348" instrument_node="">). Nevertheless, within the former socialist regions of the former Soviet Union and Eastern Europe, research has predominantly placed Russia as its empirical focus (Crotty </span><a aria-label="Reference 2016" data-dcnode-id="4346" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d266781703e933" title="Crotty, J. (2016). Corporate social responsibility in the Russian federation: A contextualized approach. Business and Society,
                           55(6), 825–853."><span data-dcnode-id="4347" instrument_node="">2016</span></a><span data-dcnode-id="4345" instrument_node="">; Ray </span><a aria-label="Reference 2008" data-dcnode-id="4343" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d266781703e936" title="Ray, S. (2008). A case study of Shell at Sakhalin: Having a whale of a time? Corporate Social Responsibility and Environmental Management,
                           15(3), 173–185."><span data-dcnode-id="4344" instrument_node="">2008</span></a><span data-dcnode-id="4342" instrument_node="">).</span></p><p data-dcnode-id="4318"><span data-dcnode-id="4340" instrument_node="">Alongside the increased interest in how CSR is operationalized across different institutional contexts, there has been an increasingly ‘political’ turn (Scherer et al. </span><a aria-label="Reference 2016" data-dcnode-id="4338" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR110" id="ref-link-section-d266781703e942" title="Scherer, A. G., Rasche, A., Palazzo, G., &amp; Spicer, A. (2016). Managing for political corporate social responsibility: New challenges and directions for PCSR 2.0. Journal of Management Studies,
                           53(3), 273–298."><span data-dcnode-id="4339" instrument_node="">2016</span></a><span data-dcnode-id="4337" instrument_node="">) with the emergence of the concept of ‘political CSR’ (Hadjikhani et al. </span><a aria-label="Reference 2008" data-dcnode-id="4335" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d266781703e945" title="Hadjikhani, A., Lee, J. W., &amp; Ghauri, P. N. (2008). Network view of MNCs’ socio-political behavior. Journal of Business Research,
                           61(9), 912–924."><span data-dcnode-id="4336" instrument_node="">2008</span></a><span data-dcnode-id="4334" instrument_node="">;&nbsp;Matten and Crane </span><a aria-label="Reference 2005" data-dcnode-id="4332" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d266781703e948" title="Matten, D., &amp; Crane, A. (2005). Corporate citizenship: Toward an extended theoretical conceptualization. Academy of Management Review,
                           30(1), 166–179."><span data-dcnode-id="4333" instrument_node="">2005</span></a><span data-dcnode-id="4331" instrument_node="">; Scherer et al. </span><a aria-label="Reference 2016" data-dcnode-id="4329" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR110" id="ref-link-section-d266781703e951" title="Scherer, A. G., Rasche, A., Palazzo, G., &amp; Spicer, A. (2016). Managing for political corporate social responsibility: New challenges and directions for PCSR 2.0. Journal of Management Studies,
                           53(3), 273–298."><span data-dcnode-id="4330" instrument_node="">2016</span></a><span data-dcnode-id="4328" instrument_node="">; Scherer and Palazzo </span><a aria-label="Reference 2011" data-dcnode-id="4326" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d266781703e954" title="Scherer, A. G., &amp; Palazzo, G. (2011). The new political role of business in a globalized world: A review of a new perspective on CSR and its implications for the firm, governance, and democracy. Journal of Management Studies,
                           48(4), 899–931."><span data-dcnode-id="4327" instrument_node="">2011</span></a><span data-dcnode-id="4325" instrument_node="">), which pays attention to how firms increasingly adopt governmental responsibilities beyond their economic, ethical, legal, and philanthropic ones. The firm often emerges as a ‘political actor’ in response to the regulatory vacuum, which exists around the activities of MNEs (Matten and Crane </span><a aria-label="Reference 2005" data-dcnode-id="4323" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d266781703e958" title="Matten, D., &amp; Crane, A. (2005). Corporate citizenship: Toward an extended theoretical conceptualization. Academy of Management Review,
                           30(1), 166–179."><span data-dcnode-id="4324" instrument_node="">2005</span></a><span data-dcnode-id="4322" instrument_node="">; Palazzo and Scherer </span><a aria-label="Reference 2006" data-dcnode-id="4320" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d266781703e961" title="Palazzo, G., &amp; Scherer, A. G. (2006). Corporate legitimacy as deliberation: A communicative framework. Journal of Business Ethics,
                           66(1), 71–88."><span data-dcnode-id="4321" instrument_node="">2006</span></a><span data-dcnode-id="4319" instrument_node="">).</span></p><p data-dcnode-id="4289"><span data-dcnode-id="4317" instrument_node="">As Scherer et al. (</span><a aria-label="Reference 2016" data-dcnode-id="4315" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR110" id="ref-link-section-d266781703e967" title="Scherer, A. G., Rasche, A., Palazzo, G., &amp; Spicer, A. (2016). Managing for political corporate social responsibility: New challenges and directions for PCSR 2.0. Journal of Management Studies,
                           53(3), 273–298."><span data-dcnode-id="4316" instrument_node="">2016</span></a><span data-dcnode-id="4314" instrument_node="">) argued, political CSR has emerged in response to limitations across three academic discourses. Firstly, within the international business (IB) literature—with some notable exceptions (Doh et al. </span><a aria-label="Reference 2012" data-dcnode-id="4312" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d266781703e970" title="Doh, J., Lawton, T., &amp; Rajwani, T. (2012). Advancing non-market strategy research: Institutional perspectives in a changing world. The Academy of Management Perspectives,
                           26(3), 22–39."><span data-dcnode-id="4313" instrument_node="">2012</span></a><span data-dcnode-id="4311" instrument_node="">; Rodriguez et al. </span><a aria-label="Reference 2006" data-dcnode-id="4309" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR106" id="ref-link-section-d266781703e973" title="Rodriguez, P., Siegel, D. S., Hillman, A., &amp; Eden, L. (2006). Three lenses on the multinational enterprise: Politics, corruption, and corporate social responsibility. Journal of International Business Studies,
                           37(6), 733–746."><span data-dcnode-id="4310" instrument_node="">2006</span></a><span data-dcnode-id="4308" instrument_node="">)—much research has failed to fully explore the responsibilities of MNEs as a consequence of phenomena such as global sourcing and different forms of internationalization. Secondly, the continued ‘instrumental’ framing of CSR (Carroll and Shabana </span><a aria-label="Reference 2010" data-dcnode-id="4306" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d266781703e976" title="Carroll, A. B., &amp; Shabana, K. M. (2010). The business case for corporate social responsibility: A review of concepts, research and practice. International Journal of Management Reviews,
                           12(1), 85–105."><span data-dcnode-id="4307" instrument_node="">2010</span></a><span data-dcnode-id="4305" instrument_node="">) has assumed the existence of a demarcation between the economic and political realms and has hence failed to illuminate how, in response to the rapid forces of globalization, firms increasingly take on the provision of public goods within blurred political and economic domains. Finally, and holding particular pertinence to this article’s underlying argument, political CSR challenges the extant literature on CPA that, while explaining the conditions and the success of political strategies of firms (Hillman et al. </span><a aria-label="Reference 2004" data-dcnode-id="4303" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d266781703e979" title="Hillman, A., Keim, G., &amp; Schuler, D. (2004). Corporate political activity: A review and research agenda. Journal of Management,
                           30(6), 837–857."><span data-dcnode-id="4304" instrument_node="">2004</span></a><span data-dcnode-id="4302" instrument_node="">; Lawton et al. </span><a aria-label="Reference 2013" data-dcnode-id="4300" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d266781703e983" title="Lawton, T., McGuire, S., &amp; Rajwani, T. (2013a). Corporate political activity: A literature review and research agenda. International Journal of Management Reviews,
                           15(1), 86–105."><span data-dcnode-id="4301" instrument_node="">2013</span></a><span data-dcnode-id="4299" instrument_node="">; Lux et al. </span><a aria-label="Reference 2011" data-dcnode-id="4297" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d266781703e986" title="Lux, S., Crook, T., &amp; Woehr, D. (2011). Mixing business with politics: A meta-analysis of the antecedents and outcomes of corporate political activity. Journal of Management,
                           37(1), 223–247."><span data-dcnode-id="4298" instrument_node="">2011</span></a><span data-dcnode-id="4296" instrument_node="">), has remained too focused on an instrumental view of corporate politics, often taking no account of CSR research (Hillman et al. </span><a aria-label="Reference 2004" data-dcnode-id="4294" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d266781703e989" title="Hillman, A., Keim, G., &amp; Schuler, D. (2004). Corporate political activity: A review and research agenda. Journal of Management,
                           30(6), 837–857."><span data-dcnode-id="4295" instrument_node="">2004</span></a><span data-dcnode-id="4293" instrument_node="">). Rather than businesses simply influencing political environments in order to maximise their economic interests, political CSR sees firms becoming political actors, thus co-producing the specific institutional environments in which they operate (Scherer and Palazzo </span><a aria-label="Reference 2011" data-dcnode-id="4291" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d266781703e992" title="Scherer, A. G., &amp; Palazzo, G. (2011). The new political role of business in a globalized world: A review of a new perspective on CSR and its implications for the firm, governance, and democracy. Journal of Management Studies,
                           48(4), 899–931."><span data-dcnode-id="4292" instrument_node="">2011</span></a><span data-dcnode-id="4290" instrument_node="">).</span></p><p data-dcnode-id="4281"><span data-dcnode-id="4288" instrument_node="">As outlined above, we have witnessed the development of more contextualized CSR approaches and the rise of a CPA literature within business and management studies. Nevertheless, the linkages between CSR and CPA remain a neglected area of research that has the potential to contribute to the existing understanding of firm non-market strategies. This article seeks to address this gap in the extant literature not by exploring how firms jointly mediate CSR and CPA policies but, rather, by examining the relationships between CSR and CPA in SMNC contexts (Ghauri et al. </span><a aria-label="Reference 2014" data-dcnode-id="4286" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d266781703e998" title="Ghauri, P., Tasavori, M., &amp; Zaefarian, R. (2014). Internationalisation of service firms through corporate social entrepreneurship and networking. International Marketing Review,
                           31(6), 576–600."><span data-dcnode-id="4287" instrument_node="">2014</span></a><span data-dcnode-id="4285" instrument_node="">), exploring to what extent firms seek an alignment (Birkinshaw </span><a aria-label="Reference 2011" data-dcnode-id="4283" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d266781703e1001" title="Birkinshaw, J. (2011). Do you really know where you are going? Business Strategy Review,
                           22(1), 41–45."><span data-dcnode-id="4284" instrument_node="">2011</span></a><span data-dcnode-id="4282" instrument_node="">) between these two concepts.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4279" id="Sec5"><span data-dcnode-id="4280" instrument_node="">Non-market Strategies: The Role Played by the Everyday in Emerging Market Contexts</span></h3><p data-dcnode-id="4268"><span data-dcnode-id="4278" instrument_node="">While the existing non-market literature has focused on the notional unit of the ‘firm’, it has failed to examine the critical importance of the processes at the micro-level of non-market strategies. Within this article, we respond by developing a micro-level focus to complement the macro-level work already undertaken. Furthermore, for Mellahi et al. (</span><a aria-label="Reference 2016" data-dcnode-id="4276" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d266781703e1012" title="Mellahi, K., Frynas, J., Sun, P., &amp; Siegel, D. (2016). A review of the non-market strategy literature: Towards a multitheoretical integration. Journal of Management,
