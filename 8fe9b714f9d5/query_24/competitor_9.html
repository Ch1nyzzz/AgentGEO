                           15(2), 102–113."><span data-dcnode-id="3787" instrument_node="">2006</span></a><span data-dcnode-id="3785" instrument_node="">). We argue that the corporate political activities of SMNEs in the specific emerging market setting of Ukraine are the product of </span><i data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">entwined micro</span></i><span data-dcnode-id="3782" instrument_node="">-</span><i data-dcnode-id="3780"><span data-dcnode-id="3781" instrument_node="">level</span></i><span data-dcnode-id="3779" instrument_node=""> business-state relations (e.g., Felin et al. </span><a aria-label="Reference 2015" data-dcnode-id="3777" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d266781703e1936" title="Felin, T., Foss, N. J., &amp; Ployhart, R. E. (2015). The microfoundations movement in strategy and organization theory. The Academy of Management Annals,
                           9(1), 575–632."><span data-dcnode-id="3778" instrument_node="">2015</span></a><span data-dcnode-id="3776" instrument_node="">). The findings demonstrate that SMNEs not only have to engage in political activities with the state upon entering the Ukrainian market, but also need to maintain such political activities during the post-entry stage in order to survive in contexts in which institutions are in a state of flux.</span></p><p data-dcnode-id="3764"><span data-dcnode-id="3774" instrument_node="">We find that SMNEs engage in a variety of CPA tactics across formal and informal spheres in order to navigate the institutional milieu in Ukraine. Our findings demonstrate how SMNEs also often tactically employ domestic Ukrainian firms to mediate and engage with the often rapacious and incoherent state bureaucracies. Moreover, in a further contribution, we find that SMNEs also engage in CSR activities—in concert with government agencies—as a device through which to execute CPA, although the institutional actors often coerce these activities. SMNEs are forced to undertake a variety of ‘social’ obligations that necessarily have a substituting effect. While the engagement in such activities clearly involves organizational and economic costs for the firm, SMNEs profit from them by improving their legitimacy (Elg et al. </span><a aria-label="Reference 2017" data-dcnode-id="3772" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d266781703e1942" title="Elg, U., Ghauri, P. N., Child, J., &amp; Collinson, S. (2017). MNE microfoundations and routines for building a legitimate and sustainable position in emerging markets. Journal of Organizational Behavior,
                           38(9), 1320–1337."><span data-dcnode-id="3773" instrument_node="">2017</span></a><span data-dcnode-id="3771" instrument_node="">) not only in the eyes of predatory and corrupt state officials (Lawton et al. </span><a aria-label="Reference 2013a" data-dcnode-id="3769" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d266781703e1945" title="Lawton, T., McGuire, S., &amp; Rajwani, T. (2013a). Corporate political activity: A literature review and research agenda. International Journal of Management Reviews,
                           15(1), 86–105."><span data-dcnode-id="3770" instrument_node="">2013a</span></a><span data-dcnode-id="3768" instrument_node="">) but also in terms of society at large and of gaining access to an attractive market (Brouthers et al. </span><a aria-label="Reference 2008" data-dcnode-id="3766" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d266781703e1948" title="Brouthers, L. E., Gao, Y., &amp; McNicol, J. P. (2008). Corruption and market attractiveness influences on different types of FDI. Strategic Management Journal,
                           29(6), 673–680."><span data-dcnode-id="3767" instrument_node="">2008</span></a><span data-dcnode-id="3765" instrument_node="">).</span></p><p data-dcnode-id="3729"><span data-dcnode-id="3763" instrument_node="">In responding to calls to integrate approaches from different academic disciplines to extend our understanding of the nature of non-market strategies (cf. Frynas et al. </span><a aria-label="Reference 2017" data-dcnode-id="3761" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d266781703e1955" title="Frynas, J. G., Child, J., &amp; Tarba, S. Y. (2017). Non-market social and political strategies—new integrative approaches and interdisciplinary borrowings. British Journal of Management,
                           28(4), 559–574."><span data-dcnode-id="3762" instrument_node="">2017</span></a><span data-dcnode-id="3760" instrument_node="">), this study makes the theoretical contribution of employing De Certeau’s (De Certeau </span><a aria-label="Reference 1984" data-dcnode-id="3758" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d266781703e1958" title="De Certeau, M. (1984). The practice of everyday life. Berkeley: University of California Press."><span data-dcnode-id="3759" instrument_node="">1984</span></a><span data-dcnode-id="3757" instrument_node="">) framework of ‘strategies’ and ‘tactics’. By doing so, the article demonstrates how, in the specific institutional ‘rules of the game’ of Ukraine, SMNEs are forced not only to maintain strong market capabilities but also to engage in proactive CPA and CSR activities. Theoretically, our findings extend the scant attention given to the linkages between the two dominant domains within the non-market strategy literature (Frynas and Stephens </span><a aria-label="Reference 2014" data-dcnode-id="3755" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d266781703e1961" title="Frynas, J., &amp; Stephens, S. (2014). Political corporate social responsibility: Reviewing theories and setting new agendas. International Journal of Management Reviews,
                           17(4), 483–509."><span data-dcnode-id="3756" instrument_node="">2014</span></a><span data-dcnode-id="3754" instrument_node="">; Frynas et al. </span><a aria-label="Reference 2017" data-dcnode-id="3752" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d266781703e1964" title="Frynas, J. G., Child, J., &amp; Tarba, S. Y. (2017). Non-market social and political strategies—new integrative approaches and interdisciplinary borrowings. British Journal of Management,
                           28(4), 559–574."><span data-dcnode-id="3753" instrument_node="">2017</span></a><span data-dcnode-id="3751" instrument_node="">; Rodriguez et al. </span><a aria-label="Reference 2006" data-dcnode-id="3749" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR106" id="ref-link-section-d266781703e1967" title="Rodriguez, P., Siegel, D. S., Hillman, A., &amp; Eden, L. (2006). Three lenses on the multinational enterprise: Politics, corruption, and corporate social responsibility. Journal of International Business Studies,
                           37(6), 733–746."><span data-dcnode-id="3750" instrument_node="">2006</span></a><span data-dcnode-id="3748" instrument_node="">) by demonstrating how, in Ukraine, SMNEs are forced to align their CPA and CSR activities in the face of predatory state strategies. Seeking to move beyond the normative claims that CPA and CSR </span><i data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">should</span></i><span data-dcnode-id="3745" instrument_node=""> be aligned, as a theoretical concept and contribution, our article’s findings show how, under specific institutional conditions, </span><i data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">coerced complementarity</span></i><span data-dcnode-id="3742" instrument_node=""> (CSR modulating and moderating CPA) emerges as a clear tactic among SMNEs in order for them to prosper against the backdrop of evolving institutions. By engaging in CSR activities, which substitute for state inefficiencies and incapacities, SMNEs are able to also substitute these costs for reduced ‘informal taxes’ to different institutional actors. The findings highlight not only the importance of the institutional context in seeking to further examine the linkages between CPA and CSR activities, but also how an alignment between CPA and CSR activities does not necessarily lead to increased trust between firms and the polity (Liedong et al. </span><a aria-label="Reference 2015" data-dcnode-id="3740" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d266781703e1977" title="Liedong, T. A., Ghobadian, A., Rajwani, T., &amp; O’Regan, N. (2015). Toward a view of complementarity: Trust and policy influence effects of corporate social responsibility and corporate political activity. Group and Organization Management,
                           40(3), 405–427."><span data-dcnode-id="3741" instrument_node="">2015</span></a><span data-dcnode-id="3739" instrument_node="">). Instead, SMNEs engage in tactics involving the alignment of their CPA and CSR activities in response to the predatory and coercive behaviours of the state. As such, in response to calls for a re-examination, at a granular level, of the function of the state with regard to the market (Frynas and Stephens </span><a aria-label="Reference 2014" data-dcnode-id="3737" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d266781703e1980" title="Frynas, J., &amp; Stephens, S. (2014). Political corporate social responsibility: Reviewing theories and setting new agendas. International Journal of Management Reviews,
                           17(4), 483–509."><span data-dcnode-id="3738" instrument_node="">2014</span></a><span data-dcnode-id="3736" instrument_node="">), our article highlights and makes managerial implications in relation to how state capacity (or incapacity) predicates specific non-market behaviours and necessarily impacts upon the lived experiences of SMNEs. Contrary to the existing literature, which states that any corrupt behaviours enacted by its competitors may impact upon an SMNE’s decision to also engage in corporate social irresponsible (CSiR) activities to maintain its market position (Keig et al. </span><a aria-label="Reference 2015" data-dcnode-id="3734" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d266781703e1983" title="Keig, D. L., Brouthers, L. E., &amp; Marshall, V. B. (2015). Formal and informal corruption environments and multinational enterprise social irresponsibility. Journal of Management Studies,
                           52(1), 89–116."><span data-dcnode-id="3735" instrument_node="">2015</span></a><span data-dcnode-id="3733" instrument_node="">), our empirical study finds that SMNEs, and the individuals within them, can simultaneously engage in pseudo-legal and informal/corrupt activities (CPA activities) and formal CSR ones. Thus, these findings offer very fine-grained micro level insights into the deployment of non-market strategies by SMNEs in emerging markets (Felin et al. </span><a aria-label="Reference 2015" data-dcnode-id="3731" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d266781703e1986" title="Felin, T., Foss, N. J., &amp; Ployhart, R. E. (2015). The microfoundations movement in strategy and organization theory. The Academy of Management Annals,
                           9(1), 575–632."><span data-dcnode-id="3732" instrument_node="">2015</span></a><span data-dcnode-id="3730" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="3717" data-title="Implications for Practice"><div class="c-article-section" data-dcnode-id="3718" id="Sec15-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3724" id="Sec15"><span data-dcnode-id="3725" instrument_node="">Implications for Practice</span></h2><div class="c-article-section__content" data-dcnode-id="3719" id="Sec15-content"><p data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">The empirical findings outlined in this article also have implications for business practitioners and policy-makers. Firstly, they highlight the importance of recognising the specific challenges faced by business managers of SMNEs based in developed economies when seeking to enter and, crucially, remain within often uncertain and politically risky emerging market ones. Nonetheless, firms can exploit the experience gained by operating in such ‘risky’ environments as an opportunity to develop wider in-house management learning and training, particularly in terms of strategic thinking related to entering other foreign markets by means of non-market strategies.</span></p><p data-dcnode-id="3720"><span data-dcnode-id="3721" instrument_node="">However, while our findings have encapsulated the dynamics and tactics that have emerged as a result of the entwined business-state relations within Ukraine, it is important to take account of the fact that a ‘one size fits all’ approach may not prove effective for SMNEs operating across diverse institutional contexts. Furthermore, when considering their strategic choices while operating within such institutional settings, business managers may also need to reflect not only on questions pertaining to their firms’ legitimacy within the host countries, but also on the views of wider firm stakeholders, including their shareholders within their home country environment and further afield. Secondly, while, in this article, we have underscored how context and agency are interdependent, it is also important to recognise that their multiple embeddedness may enable SMNEs to play proactive roles in enabling processes of institutional dynamics and change within emerging market contexts. When operating in emerging markets, managers need to carefully align both CPA and CSR in order to develop competitive advantages and survive during the post-entry stage.</span></p></div></div></section><section data-dcnode-id="3707" data-title="Limitations and Future Research"><div class="c-article-section" data-dcnode-id="3708" id="Sec16-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3715" id="Sec16"><span data-dcnode-id="3716" instrument_node="">Limitations and Future Research</span></h2><div class="c-article-section__content" data-dcnode-id="3709" id="Sec16-content"><p data-dcnode-id="3710"><span data-dcnode-id="3714" instrument_node="">In terms of limitations, this study was localized geographically within several cities in Ukraine and necessarily involved, by dint of geography, time, and political access, only a limited number of interviewees. While the views expressed by the interviewees cannot be considered to be representative of those of all business managers in Ukraine—which limits the generalizability of the findings—the value of this research lies in the rich contextual insights it provides. Further research could adopt a mixed-methods approach and expand the study topic both geographically and in terms of sample size and diversity by including other specific business sectors. Also, the study was confined to foreign-owned SMNEs operating in Ukraine. A potential avenue for future research may involve an examination of the extent to which domestically owned firms in Ukraine are similarly forced to negotiate with state structures and the extent to which SMNEs in Ukraine may gain strategic advantages by developing joint ventures with domestic firms aimed at offsetting the predatory strategies of the state. Future studies could also focus on managerial practices—by adopting a strategy as a practice lens (e.g., Jarzabkowski </span><a aria-label="Reference 2005" data-dcnode-id="3712" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d266781703e2009" title="Jarzabkowski, P. (2005). Strategy as practice. London: Sage Publications."><span data-dcnode-id="3713" instrument_node="">2005</span></a><span data-dcnode-id="3711" instrument_node="">)—on the processes behind CSR/CPA in different markets, and on the perceptions of the state actors operating in such challenging institutional environments.</span></p></div></div></section><span data-dcnode-id="3706" instrument_node="">
