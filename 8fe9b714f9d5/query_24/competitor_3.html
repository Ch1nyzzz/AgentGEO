</span><h3 class="chaptertitle" data-dcnode-id="7579"><strong data-dcnode-id="7583"><span data-dcnode-id="7584" instrument_node="">11</span></strong><br data-dcnode-id="7582"><strong data-dcnode-id="7580"><span data-dcnode-id="7581" instrument_node="">Social Policy Challenges and Dilemmas in Ex-Socialist Systems</span></strong></h3><span data-dcnode-id="7578" instrument_node="">
</span></div><span data-dcnode-id="7576" instrument_node="">
</span><p class="bodytextfp" data-dcnode-id="7573"><em data-dcnode-id="7574"><span data-dcnode-id="7575" instrument_node="">Zsuzsa Ferge</span></em></p><a data-dcnode-id="7572" id="p2000634e9970299002"></a><span data-dcnode-id="7571" instrument_node="">
</span><div class="aaheadtitlegroup" data-dcnode-id="7565"><span data-dcnode-id="7570" instrument_node="">
</span><h4 class="aahead" data-dcnode-id="7567"><strong data-dcnode-id="7568"><span data-dcnode-id="7569" instrument_node="">THE NEED FOR SOCIAL POLICY REFORMS: THE GLOBAL SCENE</span></strong></h4><span data-dcnode-id="7566" instrument_node="">
</span></div><span data-dcnode-id="7564" instrument_node="">
</span><p class="bodytextfp" data-dcnode-id="7562"><span data-dcnode-id="7563" instrument_node="">The reform of social policy is on the agenda everywhere, in the industrialized West, the developing countries, and the transition economies of Central and Eastern Europe and the former Soviet Union. The reasons and arguments for this are manifold. However, it should be recognized that there is also a neoliberal agenda that, in its extreme form, would like to put an end to the welfare state that evolved in Western Europe in the twentieth century (e.g., Marsland, 1996). A milder and more widespread variant of this agenda continues to emphasize the role of the individual, accepting the state's responsibility only with regard to care for the destitute.</span></p><span data-dcnode-id="7561" instrument_node="">
</span><p class="bodytext" data-dcnode-id="7559"><span data-dcnode-id="7560" instrument_node="">Beliefs and values, like tastes, are difficult to dispute. In one of his many contributions to this debate, Barr (1994) helps us distinguish between values and rational reasoning by suggesting that we separate the issue of the scale from that of the structure of welfare spending. He argues that the scale of spending—the quantity spent—will depend not only on the resources available, but also on the values endorsed by a society, such as the weight accorded to social solidarity. In contrast, the structure of spending—the relative shares between the state and the market—should be seen as a technical issue that turns on questions of efficiency. Where markets are efficient, they should allocate resources, whereas in instances of grave market failure, state interven-</span></p><span data-dcnode-id="7558" instrument_node="">
</span><div class="sourceblock" data-dcnode-id="7553"><span data-dcnode-id="7557" instrument_node="">
</span><p class="bodytext1fp" data-dcnode-id="7555"><span data-dcnode-id="7556" instrument_node="">I would like to thank Dorothy and Adrian Sinfield for their many helpful comments.</span></p><span data-dcnode-id="7554" instrument_node="">
</span></div><span data-dcnode-id="7552" instrument_node="">
</span></div><span data-dcnode-id="7550" instrument_node="">

</span><div class="page-html" data-dcnode-id="7418" style="font-size: 17.3714px;"><span data-dcnode-id="7461" instrument_node="">
</span><a data-dcnode-id="7460" id="page_300"></a><span data-dcnode-id="7459" instrument_node="">
</span><p class="bodytextfp" data-dcnode-id="7457"><span data-dcnode-id="7458" instrument_node="">tion may be justified. Barr's argument is useful, but the dividing line between scale and structure is not always clear, as illustrated, for instance, by the case of top-up vouchers (Glennerster, 1996). The argument also fails to deal with issues such as the techniques used in providing social benefits, which may matter a great deal.</span></p><span data-dcnode-id="7456" instrument_node="">
</span><p class="bodytext" data-dcnode-id="7454"><span data-dcnode-id="7455" instrument_node="">Of course, changing conditions demand social-sector reform everywhere. Although the reasons for this may seem self-evident, they should be recapitulated briefly here because of their relevance to transition countries:</span></p><span data-dcnode-id="7453" instrument_node="">
</span><ul data-dcnode-id="7428" type="disc"><li data-dcnode-id="7446"><span data-dcnode-id="7452" instrument_node="">
</span><p class="listterm" data-dcnode-id="7448"><strong data-dcnode-id="7450"><span data-dcnode-id="7451" instrument_node="">Globalization.</span></strong><span data-dcnode-id="7449" instrument_node=""> Globalization demands (1) open and competitive economies, which can initiate an upward spiral in efficiency and a downward spiral in labor costs, and (2) basic changes in labor markets, the effects of which range from deindustrialization to large-scale, long-term unemployment. In countries undergoing transformation, the challenges posed by globalization are especially great, because they are undertaken in conditions of sharply reduced gross domestic products (GDPs) and abrupt increases in prices, unemployment, and black market activity (Standing, 1996).</span></p><span data-dcnode-id="7447" instrument_node="">
</span></li><span data-dcnode-id="7445" instrument_node="">
</span><li data-dcnode-id="7438"><span data-dcnode-id="7444" instrument_node="">
</span><p class="listterm" data-dcnode-id="7440"><strong data-dcnode-id="7442"><span data-dcnode-id="7443" instrument_node="">Demographic trends.</span></strong><span data-dcnode-id="7441" instrument_node=""> Demographic trends include (1) increasing longevity; (2) declines in fertility; and (3) changing family patterns, particularly the multiplication of single-parent families. In many transition countries, these problems are being aggravated by a general health crisis, including increasing mortality and the spread of infectious diseases (Cornia et al., 1996; Nauck and Joos, 1995).</span></p><span data-dcnode-id="7439" instrument_node="">
</span></li><span data-dcnode-id="7437" instrument_node="">
</span><li data-dcnode-id="7430"><span data-dcnode-id="7436" instrument_node="">
</span><p class="listterm" data-dcnode-id="7432"><strong data-dcnode-id="7434"><span data-dcnode-id="7435" instrument_node="">Tendencies that weaken solidarity and increase individualism.</span></strong><span data-dcnode-id="7433" instrument_node=""> Many of the relatively better off now espouse "postmodern" attitudes toward former social policy arrangements. They demand better value for their money, including more individually tailored services and more choices. They are also less willing to share the collective costs of change. All these phenomena are appearing in transition countries, perhaps in an accentuated form as a socio-psychological reaction to the sudden lifting of former oppressive controls.</span></p><span data-dcnode-id="7431" instrument_node="">
</span></li><span data-dcnode-id="7429" instrument_node="">
</span></ul><p class="bodytextfp" data-dcnode-id="7426"><span data-dcnode-id="7427" instrument_node="">The modern welfare state has not coped well with the consequences of these trends, even in the West. Hence we have seen the emergence, even in many of the most developed and relatively affluent societies, of social fragmentation and threats of massive social exclusion and disaffiliation.</span></p><span data-dcnode-id="7425" instrument_node="">
</span><p class="bodytext" data-dcnode-id="7423"><span data-dcnode-id="7424" instrument_node="">These developments may not be inevitable, however. Resources in developed countries remain plentiful; it is only their distribution that has become more unequal (World Bank, 1996a; Atkinson et al., 1995). Many analysts are searching for new insights, arguments, and instruments to address these trends. In an interesting sign of this new thinking, the eminent capitalist and financier George Soros (1997) recently warned about the potentially dangerous social consequences of unconstrained market domination.</span></p><span data-dcnode-id="7422" instrument_node="">
</span><p class="bodytext" data-dcnode-id="7420"><span data-dcnode-id="7421" instrument_node="">Civil society's increasing resistance to attempts to scale back the welfare state-as indicated by demonstrations in several Western European countries</span></p><span data-dcnode-id="7419" instrument_node="">
</span></div><span data-dcnode-id="7417" instrument_node="">
</span></div><span data-dcnode-id="7415" instrument_node=""> </span><div class="page" data-dcnode-id="7311" data-display="301" data-format="html" data-page="301"><div class="page-tools scotchified" data-dcnode-id="7332"><div class="scotch-panel-wrapper" data-dcnode-id="7333" style="position: relative; overflow: hidden; width: 100%;"><div class="scotch-panel-canvas" data-dcnode-id="7334" style="position: relative; height: 100%; width: 100%; transform: translate3d(0px, 0px, 0px); backface-visibility: hidden; transition: all 300ms cubic-bezier(0.16, 0.68, 0.43, 0.99) 0s;"><span data-dcnode-id="7414" instrument_node="">

</span><a data-dcnode-id="7327" id="page_301"></a><span data-dcnode-id="7326" instrument_node="">
</span><p class="bodytextfp" data-dcnode-id="7324"><span data-dcnode-id="7325" instrument_node="">in the spring of 1997—provides important evidence of democratic efforts to rebuff attempts at curtailing the welfare state. Many supranational agencies have also adopted new or stronger stances in opposition to this trend. The Council of Europe, in its recent revision of the European Social Charter, attempted to strengthen the safeguards for fundamental economic and social rights, while the United Nations declared the coming decade, 1997-2006, the International Decade for the Eradication of Poverty. The European Commission's "Comité des Sages," established in 1995, emphasized the importance of the social dimension in an integrated Europe. The committee's chair stated that "civic rights and social rights are becoming interdependent. . . . In the European tradition they are inseparable. . . . 'Freedom and the conditions of freedom' are the mirror image of 'democracy and development'" (European Commission, 1996:5).</span></p><span data-dcnode-id="7323" instrument_node="">
</span><p class="bodytext" data-dcnode-id="7321"><span data-dcnode-id="7322" instrument_node="">There are, of course, additional reasons for welfare reform in the formerly state socialist countries of Central and Eastern Europe. Over and above what might be considered aggravated forms of the general Western problems enumerated above, there are the endemic flaws of the former welfare system to be corrected. Profound social transformation also has produced new problems that require new solutions.</span></p><span data-dcnode-id="7320" instrument_node="">
</span><p class="bodytext" data-dcnode-id="7318"><span data-dcnode-id="7319" instrument_node="">The most basic flaw in the former welfare system is not that it was somehow premature or overly lavish, as some have suggested. The main defect of social policy in these states was that it was permeated with the totalitarian logic of the former political system. To mention just a few corollaries, because the legal system was arbitrarily dominated by politics, (1) rights remained illusory; (2) social policy, like everything else, was ideologically loaded; and (3) all measures were developed without citizens' participation or control or any attempts at consensus building. As but one example, inconvenient facts, such as poverty or unemployment, that did not correspond with official ideology were ignored and went unaddressed. Because of the domination of politics, all subsystems were deprived of autonomy. Instead of an interplay and compromise between social and economic rationality, the distinction was blurred in a fusion that was detrimental to both.</span></p><span data-dcnode-id="7317" instrument_node="">
</span><p class="bodytext" data-dcnode-id="7315"><span data-dcnode-id="7316" instrument_node="">It is interesting to note that the current reform discourse seldom addresses the need for the democratization of (central) state welfare policy. Many recommend efforts to enhance the development of civil society and the non-governmental organization (NGO) movement, but they seldom recognize that civil society plays a dual function: a service function and a "voice" function. In the former, as a provider of welfare services, civil society can play a useful role, although it can not replace the state. Yet it is in the "voice" function—acting as an advocate for society's needs—that civil society plays its paramount democratizing role. Civil society may change state institutions through citizen participation, criticism, and supervision, although this contribution is</span></p><span data-dcnode-id="7314" instrument_node="">
</span></div><span data-dcnode-id="7312" instrument_node="">
</span></div><span data-dcnode-id="7310" instrument_node=""> </span><div class="page" data-dcnode-id="7203" data-display="302" data-format="html" data-page="302"><div class="page-tools scotchified" data-dcnode-id="7227"><div class="scotch-panel-wrapper" data-dcnode-id="7228" style="position: relative; overflow: hidden; width: 100%;"><div class="scotch-panel-canvas" data-dcnode-id="7229" style="position: relative; height: 100%; width: 100%; transform: translate3d(0px, 0px, 0px); backface-visibility: hidden; transition: all 300ms cubic-bezier(0.16, 0.68, 0.43, 0.99) 0s;"><span data-dcnode-id="7309" instrument_node="">
</span><div class="page-tools-inner" data-dcnode-id="7281"><span data-dcnode-id="7308" instrument_node="">
</span><span class="page-number" data-dcnode-id="7305"><span data-dcnode-id="7307" instrument_node="">Page 302 </span><span class="page-status-text" data-dcnode-id="7306"></span></span><span data-dcnode-id="7304" instrument_node="">
</span><span class="page-actions" data-dcnode-id="7283"><span data-dcnode-id="7303" instrument_node="">
</span><span class="page-actions-inner" data-dcnode-id="7285"><span data-dcnode-id="7302" instrument_node="">

</span><p class="bodytextfp" data-dcnode-id="7219"><span data-dcnode-id="7220" instrument_node="">rarely evaluated positively by elites unused to criticism and countervailing pressures.</span></p><span data-dcnode-id="7218" instrument_node="">
</span><p class="bodytext" data-dcnode-id="7216"><span data-dcnode-id="7217" instrument_node="">Another shortcoming of the reform debate is that whereas the existence of an autonomous economic logic is generally acknowledged, such recognition is denied to social processes and policy. This means social policy is once again subordinated to external requisites, this time to the logic of the economy, that is, the market.</span></p><span data-dcnode-id="7215" instrument_node="">
</span><p class="bodytext" data-dcnode-id="7213"><span data-dcnode-id="7214" instrument_node="">With regard to new problems requiring new solutions, many of these—such as increasing poverty and the gap between world prices and local wages—are discussed in the next section. However, one factor connected with globalization deserves consideration here. Global pressures for adjustment to the newly emerging international community, and particularly to the "new economic order," have become very strong. This undoubtedly plays a greater role in the post-communist states and in Latin America than it does in the West, but no region is immune. Pressures for adjustment curtail the margin of freedom within which new democracies can develop relatively autonomously. While these pressures are very different from the political dictates of the former Soviet Union, which operated through duress and command, they preclude genuine national independence. Although less direct and less threatening, the new pressures coming from multinational organizations and supranational agencies also require compliance with rules and institutions that may be at odds with more organic trends in these countries, as well as with popular expectations, preferences, and values.</span></p><span data-dcnode-id="7212" instrument_node="">
</span><p class="bodytext" data-dcnode-id="7210"><span data-dcnode-id="7211" instrument_node="">In response to this array of new and old problems, most countries in the region have begun the process of reforming their social policies. To summarize what might be called the changes in instruments, universalism has practically disappeared, while the risks covered by insurance have been both expanded (e.g., unemployment) and restricted (e.g., child benefits and death grants). Conditions relating to access are generally becoming more stringent, while standards are becoming lower, and targeted social assistance is gaining ground.</span></p><span data-dcnode-id="7209" instrument_node="">
</span><p class="bodytext" data-dcnode-id="7207"><span data-dcnode-id="7208" instrument_node="">The changes in the number of actors involved in the provision of social services have meant rapid pluralization. This entails less responsibility in the hands of central state authorities (and state enterprises) and an increasing role for local authorities, civil society, families, and the market. This pluralization of social functions is important, but there may also be unforeseen drawbacks. The withdrawal of the state may escalate more rapidly in the post-communist states than in the West given the general weakness of civil society, and the consequences may prove to be more detrimental as a result of the prevailing atmosphere of economic and moral crisis.</span></p><span data-dcnode-id="7206" instrument_node="">
</span></div><span data-dcnode-id="7204" instrument_node="">

</span><div class="aaheadtitlegroup" data-dcnode-id="7106"><span data-dcnode-id="7111" instrument_node="">
</span><h4 class="aahead" data-dcnode-id="7108"><strong data-dcnode-id="7109"><span data-dcnode-id="7110" instrument_node="">CHALLENGES AND DILEMMAS FOR THE FUTURE</span></strong></h4><span data-dcnode-id="7107" instrument_node="">
</span></div><span data-dcnode-id="7105" instrument_node="">
</span><p class="bodytextfp" data-dcnode-id="7103"><span data-dcnode-id="7104" instrument_node="">It is difficult to reflect on the future without distinguishing between the short and the long run, although the two can never be completely separated. In the formerly state socialist states, past fiascos cause everyone to shy away from attempts to plan the future. In no country is there any sort of project or outline for the society that is being created. Similarly, there have been few attempts to build consensus, even on partial issues such as whether there should be more or less integration, more or less inequality, or more or less social fragmentation. Slogans of "market" and "democracy," with no specification of their content, cannot fill this void. As there is no consensus about the future, there are no long-term commitments that can bind future governments. Reforms introduced by one government today can easily be revoked by the next tomorrow. We can only speculate about the future, taking the present as a starting point. This section examines, if only briefly the following issues:</span></p><span data-dcnode-id="7102" instrument_node="">
</span><ul data-dcnode-id="7077" type="disc"><li data-dcnode-id="7097"><span data-dcnode-id="7101" instrument_node="">
</span><p class="listterm" data-dcnode-id="7099"><span data-dcnode-id="7100" instrument_node="">The possible long-term consequences of the current mismatch between needs and resources</span></p><span data-dcnode-id="7098" instrument_node="">
</span></li><span data-dcnode-id="7096" instrument_node="">
</span><li data-dcnode-id="7091"><span data-dcnode-id="7095" instrument_node="">
</span><p class="listterm" data-dcnode-id="7093"><span data-dcnode-id="7094" instrument_node="">The possible impact of nation building based on full citizenship, if and when the social is individualized</span></p><span data-dcnode-id="7092" instrument_node="">
</span></li><span data-dcnode-id="7090" instrument_node="">
</span><li data-dcnode-id="7085"><span data-dcnode-id="7089" instrument_node="">
</span><p class="listterm" data-dcnode-id="7087"><span data-dcnode-id="7088" instrument_node="">Increased investment in human resources as the best means to ensure individual and collective "salvation," and the probability of this course of action</span></p><span data-dcnode-id="7086" instrument_node="">
</span></li><span data-dcnode-id="7084" instrument_node="">
</span><li data-dcnode-id="7079"><span data-dcnode-id="7083" instrument_node="">
</span><p class="listterm" data-dcnode-id="7081"><span data-dcnode-id="7082" instrument_node="">The controversial issue of existential security: a test case for democracy?</span></p><span data-dcnode-id="7080" instrument_node="">
</span></li><span data-dcnode-id="7078" instrument_node="">
</span></ul><a data-dcnode-id="7076" id="p2000634e9970303002"></a><span data-dcnode-id="7075" instrument_node="">
</span><div class="aheadtitlegroup" data-dcnode-id="7069"><span data-dcnode-id="7074" instrument_node="">
</span><h5 class="ahead" data-dcnode-id="7071"><strong data-dcnode-id="7072"><span data-dcnode-id="7073" instrument_node="">The Possible Long-Term Consequences of the Current Mismatch Between Needs and Resources</span></strong></h5><span data-dcnode-id="7070" instrument_node="">
</span></div><span data-dcnode-id="7068" instrument_node="">
</span><p class="bodytextfp" data-dcnode-id="7063"><span data-dcnode-id="7067" instrument_node="">Needs are clearly escalating. Poverty in all its forms (absolute and relative, total and partial, lasting and temporary, objective and subjective) has increased throughout the region as a result of mass unemployment, the need to pay world prices for consumer goods, the increasing gap between foreign and domestic wage levels, increasing inequalities in income and wealth, deteriorating health services; and what many see as a deliberate decline in the real value of most social transfers.</span><sup data-dcnode-id="7064"><a data-dcnode-id="7065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nap.nationalacademies.org/read/5852/chapter/17%23p2000634e8960303001"><span data-dcnode-id="7066" instrument_node="">1</span></a></sup></p><span data-dcnode-id="7062" instrument_node="">
</span><p class="bodytext" data-dcnode-id="7060"><span data-dcnode-id="7061" instrument_node="">There is, of course, a great deal of variation in current trends in the region. In some countries (e.g., the Czech Republic and Slovenia), the increase in</span></p><span data-dcnode-id="7059" instrument_node="">
</span><div class="list1" data-dcnode-id="7038"><span data-dcnode-id="7058" instrument_node="">
</span><span data-dcnode-id="7048" instrument_node="">
</span><span data-dcnode-id="7042" instrument_node="">
</span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="7039"><tbody data-dcnode-id="7040"><tr data-dcnode-id="7041"><td class="listnum" data-dcnode-id="7049"><span data-dcnode-id="7057" instrument_node="">
</span><a data-dcnode-id="7056" id="p2000634e8960303001"></a><span data-dcnode-id="7055" instrument_node="">
</span><p class="endnotenumtext" data-dcnode-id="7051"><sup data-dcnode-id="7053"><span data-dcnode-id="7054" instrument_node="">1</span></sup><span data-dcnode-id="7052" instrument_node="">&nbsp;&nbsp;</span></p><span data-dcnode-id="7050" instrument_node="">
</span></td><td data-dcnode-id="7043" valign="top"><span data-dcnode-id="7047" instrument_node="">
</span><p class="footnote" data-dcnode-id="7045"><span data-dcnode-id="7046" instrument_node="">The figures may be debated at length. For instance, the most recent World Development Report gives data about income inequality in the transition countries that are at variance both with other data in the same volume and with the results of other surveys. But there is agreement on the main trends.</span></p><span data-dcnode-id="7044" instrument_node="">
</span></td></tr></tbody></table></div><span data-dcnode-id="7037" instrument_node="">
</span></div><span data-dcnode-id="7035" instrument_node="">

</span><p class="bodytextfp" data-dcnode-id="6942"><span data-dcnode-id="6943" instrument_node="">poverty has probably ceased (although projected price increases may produce unknown results). In others, poverty continues to escalate or deepen or both. Countervailing trends, such as a reduction in poverty, have yet to be evidenced even in countries such as Poland, where economic growth has resumed.</span></p><span data-dcnode-id="6941" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6939"><span data-dcnode-id="6940" instrument_node="">Meanwhile the redistributive capacity of these states is diminishing. States have fewer resources because of the overall decline in production and GDP; the privatization of the most profitable industries and activities first, with control of the "losing propositions" being retained; the declining capacity of the state to collect taxes and contributions; frequent reductions in taxes in order not to discourage capital, especially foreign capital; the growth of the black economy; incestuous relations between new economic and political elites; and the fact that people are less willing to pay taxes or make contributions for deteriorating services. In countries that are heavily indebted, the burden of debt servicing intensifies these difficulties.</span></p><span data-dcnode-id="6938" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6936"><span data-dcnode-id="6937" instrument_node="">The potential consequences of this gap between needs and means are unclear and varied. Until late 1993 or 1994, the inertia of prior commitments, especially pensions, and the pressure of new needs pushed states to continue transfers at relatively high levels. As a result, the share of social transfers in declining GDPs actually increased. However, such figures are seriously misleading. On the one hand, a higher proportion of a shrinking GDP could still mean lower levels in absolute terms. On the other hand, if the unregistered black economy is indeed producing 15 to 40 percent of GDP and going unrecorded, the real figures for the share of social outlays will be considerably reduced.</span></p><span data-dcnode-id="6935" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6930"><span data-dcnode-id="6934" instrument_node="">More radical measures to lower family benefits, pensions, and sick pay have been initiated since 1993, and the results are already visible, both in terms of diminishing the proportion of social transfers relative to overall GDP and their real value (see </span><a data-dcnode-id="6932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nap.nationalacademies.org/read/5852/chapter/310.html%23p2000634e9960310001"><span data-dcnode-id="6933" instrument_node="">Table 11-1</span></a><span data-dcnode-id="6931" instrument_node=""> for Hungary). It should be recognized, however, that stringent measures in some fields increase the need for social assistance.</span></p><span data-dcnode-id="6929" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6927"><span data-dcnode-id="6928" instrument_node="">It seems almost impossible to devise a system of social assistance that will be both efficient and effective. This is because there is insufficient money to fund a decent safety net and insufficient administrative capacity to target the truly needy. This issue is so crucial that it merits a slightly more systematic discussion. The main difficulties hampering the implementation of an efficient and effective social assistance scheme are discussed below.</span></p><span data-dcnode-id="6926" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6924"><span data-dcnode-id="6925" instrument_node="">The average official wage is so low that recipients barely manage to stay above even a modest poverty line. If the poverty line is maintained at a decent level, there will be substantial disincentives to work. This clearly presents an unemployment trap, one that may be impossible to overcome as long as wages remain low.</span></p><span data-dcnode-id="6923" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6921"><span data-dcnode-id="6922" instrument_node="">It is impossible to determine the truly needy because of both the widespread resort to subsistence agricultural production and the prevalence of the</span></p><span data-dcnode-id="6920" instrument_node="">
</span></div><span data-dcnode-id="6918" instrument_node="">
</span></div><span data-dcnode-id="6916" instrument_node=""> </span><div class="page" data-dcnode-id="6809" data-display="305" data-format="html" data-page="305"><div class="page-tools scotchified" data-dcnode-id="6833"><div class="scotch-panel-wrapper" data-dcnode-id="6834" style="position: relative; overflow: hidden; width: 100%;"><div class="scotch-panel-canvas" data-dcnode-id="6835" style="position: relative; height: 100%; width: 100%; transform: translate3d(0px, 0px, 0px); backface-visibility: hidden; transition: all 300ms cubic-bezier(0.16, 0.68, 0.43, 0.99) 0s;"><span data-dcnode-id="6915" instrument_node="">

</span><p class="bodytextfp" data-dcnode-id="6825"><span data-dcnode-id="6826" instrument_node="">black economy. Production and incomes from household plots are difficult to calculate, while the black market is ubiquitous. The well-to-do use it to avoid taxes and perpetrate various fraudulent practices (for example, the self-employed and small-scale ventures can declare incomes that are sufficiently low to qualify for means-tested benefits). The poor use the black market to survive by accepting risky, dangerous, unprotected, and low-paid jobs (old forms of exploitation are indeed coming back). They also apply for assistance on the basis of their official, low incomes. However, the fraudulent poor are more visible than the cheating rich and invite closer scrutiny. As local authorities take on a greater role, the applications of the poor may be more frequently rejected, not only because of greater local knowledge, but also because discretion favors those who are closer to the administrators making the decisions.</span></p><span data-dcnode-id="6824" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6822"><span data-dcnode-id="6823" instrument_node="">There is an increasing reliance on workfare—making assistance after the expiration of unemployment insurance conditional on work (e.g., 5 days of communal work paid at the minimum wage or less). The poor may not take this ''opportunity." After all, the wage is less than they can earn in the black economy, and if they take time off from their unofficial work to qualify for government assistance, they may lose their black employment. No one should count on the poor's undertaking complex calculations of the long-term opportunity costs of this behavior. Rather, it should be anticipated that large numbers will lose their entitlements.</span></p><span data-dcnode-id="6821" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6819"><span data-dcnode-id="6820" instrument_node="">It is also worth noting that a culture of social rights is generally lacking in Central and Eastern Europe. Such a culture scarcely existed under the former system. It is interesting to note, however, that the "clients" are learning about claim rights more rapidly than the administrators. The latter love their discretionary power and are afraid of being accused of squandering money by helping those who are not "truly needy." This has led to a strong resistance to right-based assistance. The administrators also prefer behavior tests and home visits, which make them feel more secure in their decisions. Such intrusive measures, however, are detrimental to the development of a self-assured citizenry.</span></p><span data-dcnode-id="6818" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6816"><span data-dcnode-id="6817" instrument_node="">There is also a general lack of administrative capacity and know-how: social policy and social work became acknowledged disciplines only after the transition; budget cuts have hit local authorities hard, and they are unable to engage enough qualified people to administer complex assistance schemes. This has meant the emergence of extremely debatable solutions, such as contracting out home visits. Administrators also sometimes appeal to the populace to denounce frauds and encourage anonymous informants.</span></p><span data-dcnode-id="6815" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6813"><span data-dcnode-id="6814" instrument_node="">There are also widespread shortages of funds at the local level. Responsibility for some types of assistance may be shared with central authorities, but very often the locality is solely responsible, and its activities are funded by a block grant. Since there are many competing claims for</span></p><span data-dcnode-id="6812" instrument_node="">
</span></div><span data-dcnode-id="6810" instrument_node="">
</span></div><span data-dcnode-id="6808" instrument_node=""> </span><div class="page" data-dcnode-id="6693" data-display="306" data-format="html" data-page="306"><div class="page-tools scotchified" data-dcnode-id="6725"><div class="scotch-panel-wrapper" data-dcnode-id="6726" style="position: relative; overflow: hidden; width: 100%;"><div class="scotch-panel-canvas" data-dcnode-id="6727" style="position: relative; height: 100%; width: 100%; transform: translate3d(0px, 0px, 0px); backface-visibility: hidden; transition: all 300ms cubic-bezier(0.16, 0.68, 0.43, 0.99) 0s;"><span data-dcnode-id="6807" instrument_node="">

</span><div class="page-html" data-dcnode-id="6695" style="font-size: 17.3714px;"><span data-dcnode-id="6721" instrument_node="">
</span><a data-dcnode-id="6720" id="page_306"></a><span data-dcnode-id="6719" instrument_node="">
</span><p class="bodytextfp" data-dcnode-id="6717"><span data-dcnode-id="6718" instrument_node="">these funds, the locality may not be able to provide for all the needy. According to some evidence (World Bank, 1996b; Ferge et al., 1995), as many as 50 to 60 percent of the eligible poor are not receiving assistance, and many are refused assistance because of a lack of local funds. Of course, this is not meant as an indictment of local autonomy. The regaining of local autonomy after decades of stifling overcentralization is a fundamental achievement, and it is revitalizing localities. However, its success is contingent on adequate funding.</span></p><span data-dcnode-id="6716" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6714"><span data-dcnode-id="6715" instrument_node="">In sum, because of a whole series of problems, the level of poverty assistance is generally too low, and the procedures being developed for administering it are too often demeaning. The proud shy away from applying. Both client awareness of opportunities and the authorities' willingness to offer genuine help may be deficient. In the old system, poverty was taboo and therefore unaddressed; now it is seen as "natural" and perennial, making efforts to eradicate it seem futile. As a result, few if any officials, at the level of either discourse or institution building, are paying attention to issues of poverty or exclusion, albeit there were some positive changes in 1997..</span></p><span data-dcnode-id="6713" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6711"><span data-dcnode-id="6712" instrument_node="">This does not mean there are no efforts to discover alternatives. Many NGOs, particularly Western foundations, are dedicated to finding innovative solutions that will abolish long-term unemployment and reduce the worst aspects of workfare. However, these efforts reach only a tiny minority. The dominant political tendency is described by Standing (1996)—harsh workfare with many disincentives.</span></p><span data-dcnode-id="6710" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6708"><span data-dcnode-id="6709" instrument_node="">The foreseeable if not necessary or inevitable consequence of the gap between means and needs is lasting poverty and various forms of disaffiliation or exclusion. Although this may not necessarily produce a distinct underclass, the processes outlined above deeply harm social integration. In countries with a large deprived minority, such as the Romanis in Hungary or Slovakia, exclusion is already well advanced, strengthening racial prejudices.</span></p><a data-dcnode-id="6707" id="p2000634e9970306001"></a><span data-dcnode-id="6706" instrument_node="">
</span><div class="aheadtitlegroup" data-dcnode-id="6700"><span data-dcnode-id="6705" instrument_node="">
</span><h5 class="ahead" data-dcnode-id="6702"><strong data-dcnode-id="6703"><span data-dcnode-id="6704" instrument_node="">The Possible Impact of Nation Building Based on Full Citizenship, If and When the Social Is Individualized</span></strong></h5><span data-dcnode-id="6701" instrument_node="">
</span></div><span data-dcnode-id="6699" instrument_node="">
</span><p class="bodytextfp" data-dcnode-id="6697"><span data-dcnode-id="6698" instrument_node="">One objective of the European welfare states was to forge a more integrated society, to induce a general sense of belonging based on full citizenship, and to recognize the equal dignity of all. The reduction of inequalities in individuals' physical and social life chances was also an objective. Hence importance was attached not only to negative (freedom from), but also to positive (freedom to) freedoms, that is, to civil, political, economic, and social rights (Sen, 1990; Dasgupta, 1995). Public instruments to accomplish these goals included such nondiscriminatory transfers as social insurance and universal health benefits. These objectives were never fully attained anywhere, but headway was certainly made. It is also worth emphasizing that this project</span></p><span data-dcnode-id="6696" instrument_node="">
</span></div><span data-dcnode-id="6694" instrument_node="">

</span><p class="bodytextfp" data-dcnode-id="6601"><span data-dcnode-id="6602" instrument_node="">was started in relatively poor countries (Sweden in the early 1930s, Britain after World War II), with the intent of overcoming deep social cleavages.</span></p><span data-dcnode-id="6600" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6594"><span data-dcnode-id="6599" instrument_node="">The importance of nation building or community building is not out of place in this discussion of trends in the "new democracies." People in these countries have undergone the alienating and atomizing experience of totalitarianism.</span><sup data-dcnode-id="6596"><a data-dcnode-id="6597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nap.nationalacademies.org/read/5852/chapter/17%23p2000634e8960307001"><span data-dcnode-id="6598" instrument_node="">2</span></a></sup><span data-dcnode-id="6595" instrument_node=""> In addition, current societal processes are producing a number of divisive tendencies, such as the spontaneous emergence of new social classes and groups with divergent or opposed interests, increases in inequalities of wealth and income, and the great divide between those with a job and the unemployed. Although social policy will never eliminate these new cleavages, appropriate measures can soften the edges. However, current trends in social policy reform neither endorse nor promote such efforts. Some of the reforms may accelerate these divisive processes, and it appears likely that a two-tier health and educational system will emerge in the post-communist states.</span></p><span data-dcnode-id="6593" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6591"><span data-dcnode-id="6592" instrument_node="">A particularly divisive strategy seems to be the rejection of the former unwritten contract between generations. While many deny the legitimacy or rationale for such a contract, which they largely deem fictive, there are many rational reasons to maintain it (Kohli, 1993; Walker, 1996). Judging from a recent Eurobarometer survey, the majority of citizens in Western countries have no intention of reneging on this obligation. When asked whether they agreed with the statement "Those in employment have a duty to ensure, through contributions or taxes, that older people have a decent standard of living," 85 percent of the respondents in 12 countries agreed, either strongly or slightly. Only 15 percent disagreed slightly or strongly (reproduced in Walker, 1996:4).</span></p><span data-dcnode-id="6590" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6585"><span data-dcnode-id="6589" instrument_node="">In the Central and Eastern European countries, however, changes in family benefit schemes and pension reforms (both those that have been adopted and those still under consideration) tend to undermine the intergenerational contract. This contract implies a continuity between generations and a common stake in the process of social reproduction. The abolition of universal family benefits has already damaged one side of this contract. Providing help only to the truly needy involves an institutionalized differentiation among children. It also makes it clear that the community does not see all children as potentially equal future social actors.</span><sup data-dcnode-id="6586"><a data-dcnode-id="6587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nap.nationalacademies.org/read/5852/chapter/17%23p2000634e8960307002"><span data-dcnode-id="6588" instrument_node="">3</span></a></sup></p><span data-dcnode-id="6584" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6582"><span data-dcnode-id="6583" instrument_node="">The other side of the contract is even more problematic. Space here does not permit discussion of the intricacies of the two- and three-pillar schemes that are now on the agenda everywhere (one of the most elaborate versions is to be found in World Bank, 1994). The relative merits and demerits of pay-as-you-go versus funded schemes are also not particularly relevant from the</span></p><span data-dcnode-id="6581" instrument_node="">
</span><div class="list1" data-dcnode-id="6543"><span data-dcnode-id="6580" instrument_node="">
</span><span data-dcnode-id="6570" instrument_node="">
</span><span data-dcnode-id="6564" instrument_node="">
</span><span data-dcnode-id="6553" instrument_node="">
</span><span data-dcnode-id="6547" instrument_node="">
</span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="6544"><tbody data-dcnode-id="6545"><tr data-dcnode-id="6563"><td class="listnum" data-dcnode-id="6571"><span data-dcnode-id="6579" instrument_node="">
</span><a data-dcnode-id="6578" id="p2000634e8960307001"></a><span data-dcnode-id="6577" instrument_node="">
</span><p class="endnotenumtext" data-dcnode-id="6573"><sup data-dcnode-id="6575"><span data-dcnode-id="6576" instrument_node="">2</span></sup><span data-dcnode-id="6574" instrument_node="">&nbsp;&nbsp;</span></p><span data-dcnode-id="6572" instrument_node="">
</span></td><td data-dcnode-id="6565" valign="top"><span data-dcnode-id="6569" instrument_node="">
</span><p class="footnote" data-dcnode-id="6567"><span data-dcnode-id="6568" instrument_node="">There has been relatively little attention to how adversely totalitarianism affected spontaneous microsolidarities and how it atomized society by confining freedom to the narrowest private sphere (if it was permitted at all).</span></p><span data-dcnode-id="6566" instrument_node="">
</span></td></tr><tr data-dcnode-id="6546"><td class="listnum" data-dcnode-id="6554"><span data-dcnode-id="6562" instrument_node="">
</span><a data-dcnode-id="6561" id="p2000634e8960307002"></a><span data-dcnode-id="6560" instrument_node="">
</span><p class="endnotenumtext" data-dcnode-id="6556"><sup data-dcnode-id="6558"><span data-dcnode-id="6559" instrument_node="">3</span></sup><span data-dcnode-id="6557" instrument_node="">&nbsp;&nbsp;</span></p><span data-dcnode-id="6555" instrument_node="">
</span></td><td data-dcnode-id="6548" valign="top"><span data-dcnode-id="6552" instrument_node="">
</span><p class="footnote" data-dcnode-id="6550"><span data-dcnode-id="6551" instrument_node="">Not all forms of lowering family benefits would have harmed the generational contract (see World Bank, 1996b, proposals for group targeting and benefit taxing).</span></p><span data-dcnode-id="6549" instrument_node="">
</span></td></tr></tbody></table></div><span data-dcnode-id="6542" instrument_node="">

</span><p class="bodytextfp" data-dcnode-id="6447"><span data-dcnode-id="6448" instrument_node="">perspective of social integration, since even funded schemes may include elements of solidarity.</span></p><span data-dcnode-id="6446" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6444"><span data-dcnode-id="6445" instrument_node="">It is the so-called mandatory privately managed pillar that embodies the most disturbing elements. Optionally elected private saving contracts represent a positive development and enhance individuals' free choice in determining the use of their savings. This picture changes, however, when these contracts become mandatory and an integral part of retirement security, as is currently being proposed not only by the private banking and insurance sector, but by many supranational agencies as well. There are problems associated with money markets, and these are exacerbated in countries with fragile and inflation-prone economies, as well as underdeveloped banking systems. Slow economic growth and public commitments to those already on pensions may make the transition extremely expensive for both taxpayers and pensioners.</span></p><span data-dcnode-id="6443" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6441"><span data-dcnode-id="6442" instrument_node="">Summarizing the experiences with privately funded schemes, it is often observed that they have low potential coverage (never more than two-thirds of the population and often less); that the risk of noncoverage is particularly high for the chronically sick and disabled, as well as the long-term unemployed; and that, especially in the take-off period, but even beyond, they are much more costly than public schemes (Townsend and Walker, 1996; Myers, 1995; Kritzer, 1996). From the perspective of solidarity and integration, certain further elements should be mentioned. First, the benefit that will be received, particularly if it takes the form of an annuity, may suffer from the absence of solidarity. Annuities are actuarially calculated. Hence, women and men with exactly the same working careers will receive different benefits. A further divisive characteristic is the fact that the benefits one receives can potentially be related to prices, but they can never be related to wages. Thus the gap between the incomes of active and retired people may fluctuate or increase depending on prevailing economic trends.</span></p><span data-dcnode-id="6440" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6438"><span data-dcnode-id="6439" instrument_node="">Many different means are being used to bring home to people the message that the intergenerational contract should be abolished. The potential for conflict between the old and the young was noted by the demographer Samuel Preston over a decade ago when he suggested that "the social security system was becoming increasingly generous to the elderly while adopting a more severe attitude towards . . . welfare payments for children." He was, however, "careful in his address to avoid any explicit suggestion that children and the elderly were direct competitors for a fixed sum of public resources" (see Johnson and Falkingham, 1992:131-132).</span></p><span data-dcnode-id="6437" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6435"><span data-dcnode-id="6436" instrument_node="">In quite a few Organization for Economic Cooperation and Development (OECD) countries, at least some pensioners have indeed fared comparatively well recently because of relatively generous earnings related to pensions, but some of these advantages may not be sustainable over the long run. The poverty of children may have increased recently as well as a result of increased unemployment and parsimonious child benefits. Increasingly, the idea is being ad-</span></p><span data-dcnode-id="6434" instrument_node="">
</span></div><span data-dcnode-id="6432" instrument_node="">
</span></div><span data-dcnode-id="6430" instrument_node=""> </span><div class="page" data-dcnode-id="6298" data-display="309" data-format="html" data-page="309"><div class="page-tools scotchified" data-dcnode-id="6347"><div class="scotch-panel-wrapper" data-dcnode-id="6348" style="position: relative; overflow: hidden; width: 100%;"><div class="scotch-panel-canvas" data-dcnode-id="6349" style="position: relative; height: 100%; width: 100%; transform: translate3d(0px, 0px, 0px); backface-visibility: hidden; transition: all 300ms cubic-bezier(0.16, 0.68, 0.43, 0.99) 0s;"><span data-dcnode-id="6429" instrument_node="">
</span><div class="page-tools-inner" data-dcnode-id="6401"><span data-dcnode-id="6428" instrument_node="">
</span><span class="page-number" data-dcnode-id="6425"><span data-dcnode-id="6427" instrument_node="">Page 309 </span><span class="page-status-text" data-dcnode-id="6426"></span></span><span data-dcnode-id="6424" instrument_node="">

</span><p class="bodytextfp" data-dcnode-id="6339"><span data-dcnode-id="6340" instrument_node="">vanced that there could be a trade-off in the competition for scarce resources between the two groups—a proposition that is less than self-evident. This logic would hold that the elderly must be worse off for children to be better off, or that the problem is not that children are doing too badly, but that the aged are treated too well. A second disturbing aspect of this argument is that it has returned 10 years later, in the debate in the transition countries. Commenting on the poverty of children in Central and Eastern Europe, a World Bank expert declared: "I tell people in Eastern Europe that their pension policy is impoverishing their children. The demands of pensioners are taking food out of the mouths of working people's children" (Murphy, 1995:50).</span></p><span data-dcnode-id="6338" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6330"><span data-dcnode-id="6337" instrument_node="">No doubt the situation of children is deteriorating, partly because of the destruction of the former family benefit system. However, the data must be analyzed in more detail. In the less turbulent countries of Central and Eastern Europe, pensioners are better off, in terms of equivalent income, than households where the head is unemployed; however, they are worse off than families where the head is an active earner. The gap is large (15-35%) if there are no children. The income difference is lower if there are children: the equivalent income of pensioners is about 20 percent less, even if there are children. In other words, pensioners may not be among the main losers, but they are among the losers. The majority of pensioners are on the verge of poverty, and they are largely unrepresented in the top quintile of the population (see </span><a data-dcnode-id="6335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nap.nationalacademies.org/read/5852/chapter/310.html%23p2000634e9960310001"><span data-dcnode-id="6336" instrument_node="">Table 11-1</span></a><span data-dcnode-id="6334" instrument_node="">, and Ferge et al., 1995).</span><sup data-dcnode-id="6331"><a data-dcnode-id="6332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nap.nationalacademies.org/read/5852/chapter/17%23p2000634e8960309001"><span data-dcnode-id="6333" instrument_node="">4</span></a></sup></p><span data-dcnode-id="6329" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6327"><span data-dcnode-id="6328" instrument_node="">Evidence abounds regarding the hardships faced by the majority of pensioners. The solution so often recommended—to lower pensions further or to target the relatively higher pensions for reductions—not only undermines the relative security of those involved, but also damages the contractual element that was enforced through earnings-related contributions. These recommendations also ignore the fact that citizens in Central and Eastern Europe are still very much in favor of maintaining solidarity with the elderly, as is clear from many surveys.</span></p><span data-dcnode-id="6326" instrument_node="">
</span><p class="bodytext" data-dcnode-id="6324"><span data-dcnode-id="6325" instrument_node="">The foreseeable, if not necessary or inevitable, consequences of the individualization of the social are manifold. Differentiated and divisive health, pension, and other social systems may evolve. The poverty of children or discrimination against them may increase (even the positive discrimination entailed by sharpened targeting is divisive in that it accentuates the differences among children.) The coverage of the elderly by social insurance may easily shrink if access to pensions becomes much more restrictive. This in turn may entail large inequalities among the elderly and the poverty of all those with</span></p><span data-dcnode-id="6323" instrument_node="">
</span><div class="list1" data-dcnode-id="6302"><span data-dcnode-id="6322" instrument_node="">
</span><span data-dcnode-id="6312" instrument_node="">

</span></td><td data-dcnode-id="6307" valign="top"><span data-dcnode-id="6311" instrument_node="">
</span><p class="footnote" data-dcnode-id="6309"><span data-dcnode-id="6310" instrument_node="">The survey furnishing these data was carried out as part of the Social Costs of Economic Transformation in Central Europe (SOCO) project, initiated and coordinated by the Institute for Human Studies, Vienna. The countries covered were the Czech Republic, former East Germany, Hungary, Poland, and Slovakia. The initial results are presented in Ferge et al. (1995).</span></p><span data-dcnode-id="6308" instrument_node="">

</span><div class="aheadtitlegroup" data-dcnode-id="5816"><span data-dcnode-id="5821" instrument_node="">
</span><h5 class="ahead" data-dcnode-id="5818"><strong data-dcnode-id="5819"><span data-dcnode-id="5820" instrument_node="">Increased Investment in Human Resources as a Means of Individual and Collective "Salvation"</span></strong></h5><span data-dcnode-id="5817" instrument_node="">
</span></div><span data-dcnode-id="5815" instrument_node="">
</span><p class="bodytextfp" data-dcnode-id="5813"><span data-dcnode-id="5814" instrument_node="">It is widely recognized that the educational legacy of the countries of Central and Eastern Europe is largely positive. They had well-developed preschool networks and nearly universal and relatively good-quality basic educational institutions, and their students exhibited high levels of achievement in many fields. The weaknesses in this inheritance flow from the same source as do the weaknesses in social policy and the economy in general: the system was antidemocratic; overcentralized; overregulated; rife with inefficiencies; and, as a result of demands to meet the immediate "needs" of the economy, overspecialized (Barr, 1994).</span></p><span data-dcnode-id="5812" instrument_node="">
</span><p class="bodytext" data-dcnode-id="5810"><span data-dcnode-id="5811" instrument_node="">The importance of education and training, both in promoting wealth formation on the national level and in improving each individual's opportunities, is too well known to be addressed here. In fact, some of the most rapidly developing countries (e.g., Singapore) achieved their amazing economic records by investing almost disproportionately in education.</span></p><span data-dcnode-id="5809" instrument_node="">

</span><a data-dcnode-id="5717" id="page_311"></a><span data-dcnode-id="5716" instrument_node="">
</span><p class="bodytextfp" data-dcnode-id="5711"><span data-dcnode-id="5715" instrument_node="">The evidence regarding the current situation in education in the region is somewhat controversial. On the one hand, the share of GDP spent on public education is by and large on a par with expenditures in Western countries (between 3 and 7 percent, averaging around 5 percent). In some countries, Hungary for instance, this share even increased between 1986 and 1996—from 7.0 to 7.7 percent (see </span><a data-dcnode-id="5713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nap.nationalacademies.org/read/5852/chapter/310.html%23p2000634e9960310001"><span data-dcnode-id="5714" instrument_node="">Table 11-1</span></a><span data-dcnode-id="5712" instrument_node="">). This increased share is somewhat misleading, however. The real value of educational expenditures has declined everywhere, although the decrease may not have been proportional to the decline in GDP as a whole. On the other hand, many indicators show that similar shares of GDP may be yielding very different results, largely because the absolute levels may be much lower. Thus the secondary and tertiary enrollment ratios lag behind those of the OECD countries, although they remain very high if compared with those of the developing countries (Esping-Andersen, 1996:12; World Bank, 1996a:201).</span></p><span data-dcnode-id="5710" instrument_node="">
</span><p class="bodytext" data-dcnode-id="5708"><span data-dcnode-id="5709" instrument_node="">Adult education and training are considered part of the package of social investment policies being used against unemployment, but they do not correspond very well to the needs of economic restructuring. Rates of enrollment appear not to be significantly different than those in the West, but if they are compared with the needs for retraining that flow from the previously distorted structure of skills, they are rather low.</span></p><span data-dcnode-id="5707" instrument_node="">
</span><p class="bodytext" data-dcnode-id="5705"><span data-dcnode-id="5706" instrument_node="">Among recent developments in the field of education, some merit special attention:</span></p><span data-dcnode-id="5704" instrument_node="">
</span><ul data-dcnode-id="5685" type="disc"><li data-dcnode-id="5699"><span data-dcnode-id="5703" instrument_node="">
</span><p class="listterm" data-dcnode-id="5701"><span data-dcnode-id="5702" instrument_node="">In most countries, there has been a huge decline in preschool facilities, nurseries, and kindergartens. This is detrimental to both the current wellbeing and the future opportunities of children from the most deprived strata. It also constrains women's opportunities to pursue gainful occupations, albeit many (probably the culturally better endowed) have found ways of combining household responsibilities with work by initiating or participating in home-based ventures.</span></p><span data-dcnode-id="5700" instrument_node="">
</span></li><span data-dcnode-id="5698" instrument_node="">
</span><li data-dcnode-id="5693"><span data-dcnode-id="5697" instrument_node="">
</span><p class="listterm" data-dcnode-id="5695"><span data-dcnode-id="5696" instrument_node="">Scarce resources and the decentralization of financing have made it difficult to maintain the existing stock of educational institutions, and have rendered new investments or the expansion of the existing infrastructure practically impossible.</span></p><span data-dcnode-id="5694" instrument_node="">
</span></li><span data-dcnode-id="5692" instrument_node="">
</span><li data-dcnode-id="5687"><span data-dcnode-id="5691" instrument_node="">
</span><p class="listterm" data-dcnode-id="5689"><span data-dcnode-id="5690" instrument_node="">The wages of those working in the care-giving and teaching professions—doctors and nurses, teachers, and professors—were always low, but not dramatically lower than other wages. Over the course of the transition, significant differentiations have occurred between the private and public spheres and within the public sphere among various sectors. Those working in the care-giving and teaching professions in the public sector are now among the worst paid. Low wages and the threat of becoming redundant have driven many professionals out of these fields. The resulting brain drain has lowered standards and dampened the enthusiasm of those remaining.</span></p><span data-dcnode-id="5688" instrument_node="">
</span></li><span data-dcnode-id="5686" instrument_node="">
</span></ul><span data-dcnode-id="5684" instrument_node="">
</span></div><span data-dcnode-id="5682" instrument_node="">
</span></div><span data-dcnode-id="5680" instrument_node=""> </span><div class="page" data-dcnode-id="5537" data-display="312" data-format="html" data-page="312"><div class="page-tools scotchified" data-dcnode-id="5597"><div class="scotch-panel-wrapper" data-dcnode-id="5598" style="position: relative; overflow: hidden; width: 100%;"><div class="scotch-panel-canvas" data-dcnode-id="5599" style="position: relative; height: 100%; width: 100%; transform: translate3d(0px, 0px, 0px); backface-visibility: hidden; transition: all 300ms cubic-bezier(0.16, 0.68, 0.43, 0.99) 0s;"><span data-dcnode-id="5679" instrument_node="">

</span><a data-dcnode-id="5592" id="page_312"></a><span data-dcnode-id="5591" instrument_node="">
</span><ul data-dcnode-id="5572" type="disc"><li data-dcnode-id="5586"><span data-dcnode-id="5590" instrument_node="">
</span><p class="listterm" data-dcnode-id="5588"><span data-dcnode-id="5589" instrument_node="">The introduction of relatively high fees for school meals and so-called extracurricular activities with a high educational value (e.g., second languages and sports), as well as the extraordinary price increases for schoolbooks and other school equipment, may entail one of two consequences for public education (at the elementary and secondary levels): either children will be deprived of access to certain facilities, or they will have to receive means-tested help. Since children know everything about their peers, it will be difficult for those receiving assistance to overcome its stigmatizing effects. A more serious consequence may be increasing drop-out rates for the most deprived children, such as Romany children in Hungary. The increasing need for the money these children can earn—the opportunity cost to parents of keeping their children in school—will only aggravate this problem.</span></p><span data-dcnode-id="5587" instrument_node="">
</span></li><span data-dcnode-id="5585" instrument_node="">
</span><li data-dcnode-id="5580"><span data-dcnode-id="5584" instrument_node="">
</span><p class="listterm" data-dcnode-id="5582"><span data-dcnode-id="5583" instrument_node="">The introduction of fees in higher education, combined with price increases for all school-related equipment and facilities, will most probably increase the already existing inequalities in access.</span></p><span data-dcnode-id="5581" instrument_node="">
</span></li><span data-dcnode-id="5579" instrument_node="">
</span><li data-dcnode-id="5574"><span data-dcnode-id="5578" instrument_node="">
</span><p class="listterm" data-dcnode-id="5576"><span data-dcnode-id="5577" instrument_node="">Private or nonstate educational institutions and training courses are cropping up relatively quickly at all levels. A temporary problem stems from the lack of methods and institutions for accreditation: many of these courses represent quick profit-making ventures that provide no real benefit to their clients. However, the issue of increasing inequality of educational opportunity represents a much more serious and probably lasting problem. For-profit schools may offer better opportunities for success in later life.</span></p><span data-dcnode-id="5575" instrument_node="">
</span></li><span data-dcnode-id="5573" instrument_node="">
</span></ul><p class="bodytextfp" data-dcnode-id="5566"><span data-dcnode-id="5571" instrument_node="">To prepare for the future, these countries must not only overcome the inherited backwardness of their populations' skills, but also encourage new abilities and innovative thinking among the next generation of students. This is a must if the growing economic and social gaps among different parts of Europe are to be overcome. The basis for acceptably high growth—particularly in countries with scant natural resources—is a healthy and well-educated work force. Hence the soundest possible investments are in education, training, and health.</span><sup data-dcnode-id="5568"><a data-dcnode-id="5569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nap.nationalacademies.org/read/5852/chapter/17%23p2000634e8960312001"><span data-dcnode-id="5570" instrument_node="">5</span></a></sup><span data-dcnode-id="5567" instrument_node=""> It is perhaps understandable that the urgency of immediate needs pushed this concern into the background at the beginning of the transition. That is no longer the case. If there is continued deterioration in public education (which is likely to remain dominant even if the private tier grows rapidly), the deleterious effects may be incalculable. The opportunities missed now will be very difficult to overcome later.</span></p><span data-dcnode-id="5565" instrument_node="">
</span><p class="bodytext" data-dcnode-id="5563"><span data-dcnode-id="5564" instrument_node="">There are foreseeable, if not necessary or inevitable, consequences of the increased costs to the individual of procuring a quality education, the neglect</span></p><span data-dcnode-id="5562" instrument_node="">
</span><div class="list1" data-dcnode-id="5541"><span data-dcnode-id="5561" instrument_node="">
</span><span data-dcnode-id="5551" instrument_node="">
</span><span data-dcnode-id="5545" instrument_node="">
</span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="5542"><tbody data-dcnode-id="5543"><tr data-dcnode-id="5544"><td class="listnum" data-dcnode-id="5552"><span data-dcnode-id="5560" instrument_node="">
</span><a data-dcnode-id="5559" id="p2000634e8960312001"></a><span data-dcnode-id="5558" instrument_node="">
</span><p class="endnotenumtext" data-dcnode-id="5554"><sup data-dcnode-id="5556"><span data-dcnode-id="5557" instrument_node="">5</span></sup><span data-dcnode-id="5555" instrument_node="">&nbsp;&nbsp;</span></p><span data-dcnode-id="5553" instrument_node="">
</span></td><td data-dcnode-id="5546" valign="top"><span data-dcnode-id="5550" instrument_node="">
</span><p class="footnote" data-dcnode-id="5548"><span data-dcnode-id="5549" instrument_node="">Both the education and health systems are discussed in detail in several chapters in this volume. From the perspective of the future, the two have similar implications. I have singled out education because it has more direct connections with both the immediate plight of children and the structuring forces of the future.</span></p><span data-dcnode-id="5547" instrument_node="">
</span></td></tr></tbody></table></div><span data-dcnode-id="5540" instrument_node="">

</span><div class="page-html" data-dcnode-id="5420" style="font-size: 17.3714px;"><span data-dcnode-id="5449" instrument_node="">
</span><a data-dcnode-id="5448" id="page_313"></a><span data-dcnode-id="5447" instrument_node="">
</span><p class="bodytextfp" data-dcnode-id="5445"><span data-dcnode-id="5446" instrument_node="">of the public educational system, and the emergence of a two-tier educational system. One of the consequences on the macro level is that the full potential of the children of the less well off will remain untapped and therefore effectively be wasted. At the individual level, the consequence will be the further differentiation of opportunities.</span></p><a data-dcnode-id="5444" id="p2000634e9970313001"></a><span data-dcnode-id="5443" instrument_node="">
</span><div class="aheadtitlegroup" data-dcnode-id="5437"><span data-dcnode-id="5442" instrument_node="">
</span><h5 class="ahead" data-dcnode-id="5439"><strong data-dcnode-id="5440"><span data-dcnode-id="5441" instrument_node="">The Controversial Issue of Existential Security: A Test-Case for Democracy?</span></strong></h5><span data-dcnode-id="5438" instrument_node="">
</span></div><span data-dcnode-id="5436" instrument_node="">
</span><p class="bodytextfp" data-dcnode-id="5434"><span data-dcnode-id="5435" instrument_node="">According to Marris (1996), uncertainty is a fundamental condition of human life. But uncertainty also breeds anxiety, which can produce real suffering (Ferge, 1996a, 1996b). Some anxious feelings can be termed "essential anxieties" in that they arise from our biological or mortal nature, while others can be considered "existential anxieties" since they stem from social conditions. Both, it should be noted, are, in Freud's terms, "real" anxieties, not pathological or neurotic symptoms. One of the consequences of anxiety may be a paralysis of action. If one cannot be sure of being able to make the payments on one's home or tuition fees for one's children, one may forego attempting to maintain the home or to encourage the children to study.</span></p><span data-dcnode-id="5433" instrument_node="">
</span><p class="bodytext" data-dcnode-id="5431"><span data-dcnode-id="5432" instrument_node="">Another consequence of anxiety may be actions to reduce it. When (with the advent of capitalism) risks multiplied and the former agents of existential security weakened, new institutions emerged. The most important of these were insurance companies. The market failures of the insurance market (Barr, 1994), coupled with the financial weakness of individuals and small communities, made imperative the creation of larger institutions, in which the state assumed some role in defraying the risks. Indeed, social insurance has been an appropriate societal response to the anxieties associated with industrialization and an increasingly dominant market.</span></p><span data-dcnode-id="5430" instrument_node="">
</span><p class="bodytext" data-dcnode-id="5425"><span data-dcnode-id="5429" instrument_node="">These new institutions, collectively called social security, developed to a rather high level in the West European welfare states. They also made important headway in the totalitarian state socialist systems of the post-communist states, which started to implement these systems early in the twentieth century. Inasmuch as the former system of social security is still valued, this is precisely because of the existential security it offered to its "subjects" (they were not genuine citizens as they were deprived of civil rights) </span><em data-dcnode-id="5427"><span data-dcnode-id="5428" instrument_node="">without stigma.</span></em><span data-dcnode-id="5426" instrument_node=""> People value their new freedoms, particularly the liberation from political oppression. But if they are unable to build up their defenses against uncertainty, they will not be able to enjoy or fully utilize these new freedoms.</span></p><span data-dcnode-id="5424" instrument_node="">
</span><p class="bodytext" data-dcnode-id="5422"><span data-dcnode-id="5423" instrument_node="">When the transition was first initiated, freedom (which previously had been jeopardized or curtailed) was deemed at least as important as existential securities. Since then, however, freedom seems to have become an accepted part of social reality, and according to the SOCO results, people now feel it is securely established. In sharp contrast, there is a pervasive sentiment in all</span></p><span data-dcnode-id="5421" instrument_node="">

</span><p class="bodytextfp" data-dcnode-id="5323"><span data-dcnode-id="5327" instrument_node="">these countries that basic securities—concerning income, employment, housing, and children's futures—are being threatened or undermined. In fact, the SOCO results show a significant deficit in desired securities. This deficit is most pronounced with regard to public safety, but is also strong with regard to incomes and children's futures (see </span><a data-dcnode-id="5325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nap.nationalacademies.org/read/5852/chapter/17%23p2000634e9960314001"><span data-dcnode-id="5326" instrument_node="">Table 11-2</span></a><span data-dcnode-id="5324" instrument_node="">).</span></p><span data-dcnode-id="5322" instrument_node="">
</span><p class="bodytext" data-dcnode-id="5320"><span data-dcnode-id="5321" instrument_node="">The "security gap" is visible with respect to the full range of securities. When the difference between the importance attached to freedoms and to securities is calculated for each individual, it turns out that security is never treated lightly: it is of utmost importance even to those who value freedom above all. It also appears that the high value attached to existential security is not confined to Central and Eastern Europe; it is pervasive throughout Europe.</span></p><span data-dcnode-id="5319" instrument_node="">
</span><p class="bodytext" data-dcnode-id="5317"><span data-dcnode-id="5318" instrument_node="">It may be surmised that the need for existential security is historically and culturally constructed and may therefore be "deconstructed," that is, that people can be resocialized to accord greater value to self-reliance and the absence of state intervention (see Green, 1993; Marsland, 1996). However, the success of such a project is doubtful. We can use the case of freedom as an analogy. Societies endured peacefully for millennia with individuals not experiencing freedom in its modern sense, but once freedom was discovered and tasted, people's desire for it could not be eradicated.</span></p><span data-dcnode-id="5316" instrument_node="">
</span><p class="bodytext" data-dcnode-id="5314"><span data-dcnode-id="5315" instrument_node="">If this analogy is valid, the debate over existential security becomes a matter of form, not of content; the debate can only be about how it will be ensured. One school of thought contends that collectivist solutions that rely on a substantial measure of state responsibility should be maintained, with the proviso that they be better adjusted to the new economic and social environment. Many reform plans for existing public pay-as-you-go schemes fall into</span></p><a data-dcnode-id="5313" id="p2000634e9960314001"></a><span data-dcnode-id="5312" instrument_node="">

</span><p class="bodytextfp" data-dcnode-id="4759"><span data-dcnode-id="4760" instrument_node="">this category (Townsend and Walker, 1995; Augusztinovics, 1993), as do numerous proposals by the Hungarian Autonomous Pension Insurance Fund and the revived interest in basic income schemes in France, Germany, England, and elsewhere (Caillé and Laville, 1996; Mückenberger, 1994; Offe, 1994; Jordan, 1994). It should be added that at the beginning of the transition, Atkinson (1991) suggested that a basic income scheme in the Central and Eastern European countries would help overcome the major difficulties of social dislocation, prevent the worst forms of poverty, and facilitate small-scale entrepreneurship. Others reject these arguments, advocating individualized and privatized solutions.</span></p><span data-dcnode-id="4758" instrument_node="">
</span><p class="bodytext" data-dcnode-id="4756"><span data-dcnode-id="4757" instrument_node="">All parties to the debate recognize that security is important, but the question remains whether it will be available to all or only to those who can afford it. A different question concerns the most appropriate role for the state in providing or ensuring security.</span></p><span data-dcnode-id="4755" instrument_node="">
</span><p class="bodytext" data-dcnode-id="4747"><span data-dcnode-id="4754" instrument_node="">One would expect that people in the region, having experienced hated and oppressive party-states for decades, would reject any hint of state interference. It seems, however, that while people hated the party-state, they are willing to empower a democratic state. The SOCO data suggest that in all five countries, people would turn more willingly to public authorities when in need than to churches, nongovernmental organizations, or charitable institutions (see </span><a data-dcnode-id="4752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nap.nationalacademies.org/read/5852/chapter/316.html%23p2000634e9960316001"><span data-dcnode-id="4753" instrument_node="">Figure 11-1</span></a><span data-dcnode-id="4751" instrument_node="">). Undoubtedly, the populations of different countries and those within each country will differ in their expectations, and the anticipated role for the state will vary depending on the issue involved. Yet in all five countries, the populations expect the state to be least involved in the provision of day care for preschool children, the defraying of expenses associated with child rearing and with secondary and tertiary education, and the purchase of first homes. Similarly, in all of these countries a major role is accorded the state with respect to care for the handicapped, pensions, health care, primary education, and jobs, with pensions and care for the handicapped almost invariably ranking highest (see </span><a data-dcnode-id="4749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nap.nationalacademies.org/read/5852/chapter/317.html%23p2000634e9960317001"><span data-dcnode-id="4750" instrument_node="">Table 11-3</span></a><span data-dcnode-id="4748" instrument_node="">).</span></p><span data-dcnode-id="4746" instrument_node="">
</span><p class="bodytext" data-dcnode-id="4744"><span data-dcnode-id="4745" instrument_node="">Citizens in Western Europe also accord great importance to the state's role in the provision of health, education, and pensions. This enthusiasm is maintained even where people are fully aware that they must pay more to receive better services or benefits. Recent evidence from Hungary demonstrates that despite very high rates of taxation, only a minority would opt for decreasing taxation at the expense of declining services. This proportion is higher than one would find today in England, but approximates figures obtained in Britain a decade ago.</span></p><span data-dcnode-id="4743" instrument_node="">
</span><p class="bodytext" data-dcnode-id="4739"><a data-dcnode-id="4741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nap.nationalacademies.org/read/5852/chapter/317.html%23p2000634e9960317002"><span data-dcnode-id="4742" instrument_node="">Table 11-4</span></a><span data-dcnode-id="4740" instrument_node=""> shows that there is very strong support, in both Eastern and Western Europe, for a substantial public role in protecting the population against major risks. Some condemn this as evidence of a ''dependency culture" that undermines people's moral fiber (Marsland, 1996) or breeds "learned</span></p><span data-dcnode-id="4738" instrument_node="">
