</span><p class="bodytextfp" data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">dous amount of unpredictability, include the further deterioration of mental and physical health as a result of stress and anxiety. Since overwhelming majorities believe certain basic securities should be the concern of the community and not left entirely to the individual, consensus building around this issue may well become a major test case for democracy. If governments ignore popular expectations, tensions may increase, and left- or right-wing populism may gain ground. Populism has rarely proved a fertile soil for democracy or for the strengthening of active citizenship.</span></p><a data-dcnode-id="3869" id="p2000634e9970318001"></a><span data-dcnode-id="3868" instrument_node="">
</span><div class="aaheadtitlegroup" data-dcnode-id="3862"><span data-dcnode-id="3867" instrument_node="">
</span><h4 class="aahead" data-dcnode-id="3864"><strong data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">CONCLUSION</span></strong></h4><span data-dcnode-id="3863" instrument_node="">
</span></div><span data-dcnode-id="3861" instrument_node="">
</span><p class="bodytextfp" data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">Social policy reform is badly needed in Central and Eastern Europe and the New Independent States, not only to ensure the relative independence of the market, but also to safeguard democracy, genuine citizens' rights, state accountability, transparency, and adequate welfare arrangements. If the current level of resources does not permit the state to provide adequately for all needs, it is still possible for it to build a consensus in favor of short-term stringency measures. To achieve this consensus, the burdens of societal transformation should be shared more equitably, and people should be assured that any withdrawal from public responsibility does not represent a long-term strategy, but a response to overwhelming short-term necessity. They should further be assured that social rights and benefits will improve with increasing resources.</span></p><span data-dcnode-id="3858" instrument_node="">
</span><p class="bodytext" data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">The costs of societal transformation have proven to be more formidable than was originally anticipated, and have fallen disproportionately on the shoulders of those who are the least able to bear them. It is neither new nor unusual that the most vulnerable bear the brunt of the costs of economic and social change. However, in the case of the transition in the formerly state socialist countries, these costs appear to have been unusually high.</span></p><span data-dcnode-id="3855" instrument_node="">
</span><p class="bodytext" data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">If governments continue to neglect the short- and long-term consequences of present trends in impoverishment and diminished security, large-scale poverty, social disintegration, marginalization, and social exclusion may result. Such consequences would threaten both economic modernization and democratization. Governments' freedom of action may be restricted by economic scarcity, but there are always alternative places to make the necessary cuts. It should be remembered that social policies play a positive role in safeguarding the cohesion of societies experiencing transition, can assist in avoiding or minimizing the potential negative consequences enumerated above, and may thereby offer a more solid basis for long-term economic growth.</span></p><span data-dcnode-id="3852" instrument_node="">
</span><p class="bodytext" data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">Our objectives should not be limited to finding better ways to meet various short-term needs or attempting to compensate for market failures. The elaboration and implementation of effective social policy must entail the cooperation between the state and an increasingly strong civil society. Both</span></p><span data-dcnode-id="3849" instrument_node="">
</span></div><span data-dcnode-id="3847" instrument_node="">

</span><div class="info-description" data-dcnode-id="1040"><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">This ground-breaking new volume focuses on the interaction between political, social, and economic change in Central and Eastern Europe and the New Independent States. It includes a wide selection of analytic papers, thought-provoking essays by leading scholars in diverse fields, and an agenda for future research. It integrates work on the micro and macro levels of the economy and provides a broad overview of the transition process.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">This volume broadens the current intellectual and policy debate concerning the historic transition now taking place from a narrow concern with purely economic factors to the dynamics of political and social change. It questions the assumption that the post-communist economies are all following the same path and that they will inevitably develop into replicas of economies in the advanced industrial West. It challenges accepted thinking and promotes the utilization of new methods and perspectives.</span></p><span data-dcnode-id="1041" instrument_node="">
