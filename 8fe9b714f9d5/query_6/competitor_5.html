trument_node=""> </span><div class="thumbcaption" data-dcnode-id="3896"><div class="magnify" data-dcnode-id="3901"><a class="internal" data-dcnode-id="3902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25D0%25A1%25D1%2582%25D1%2580%25D0%25BE%25D0%25B8%25D1%2582%25D0%25B5%25D0%25BB%25D1%258C%25D1%2581%25D1%2582%25D0%25B2%25D0%25BE_%25D0%2594%25D0%25BD%25D0%25B5%25D0%25BF%25D1%2580%25D0%25BE%25D0%25B3%25D1%258D%25D1%2581%25D0%25B0.jpg" title="Enlarge"></a></div><span data-dcnode-id="3900" instrument_node="">Construction of the </span><a data-dcnode-id="3898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dnieper_Hydroelectric_Station" title="Dnieper Hydroelectric Station"><span data-dcnode-id="3899" instrument_node="">Dnepr Hydroelectric Station</span></a><span data-dcnode-id="3897" instrument_node="">. 1931</span></div></div></div><span data-dcnode-id="3893" instrument_node="">
</span><p data-dcnode-id="3877"><b data-dcnode-id="3891"><span data-dcnode-id="3892" instrument_node="">Industrialisation in the Soviet Union</span></b><span data-dcnode-id="3890" instrument_node=""> was a process of accelerated building-up of the </span><a class="mw-redirect" data-dcnode-id="3888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_sector" title="Industrial sector"><span data-dcnode-id="3889" instrument_node="">industrial potential</span></a><span data-dcnode-id="3887" instrument_node=""> of the </span><a data-dcnode-id="3885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="3886" instrument_node="">Soviet Union</span></a><span data-dcnode-id="3884" instrument_node=""> to reduce the </span><a data-dcnode-id="3882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economy_of_the_Soviet_Union" title="Economy of the Soviet Union"><span data-dcnode-id="3883" instrument_node="">economy</span></a><span data-dcnode-id="3881" instrument_node="">'s lag behind the developed </span><a data-dcnode-id="3879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capitalist_state" title="Capitalist state"><span data-dcnode-id="3880" instrument_node="">capitalist states</span></a><span data-dcnode-id="3878" instrument_node="">, which was carried out from May 1929 to June 1941.
</span></p><p data-dcnode-id="3851"><span data-dcnode-id="3876" instrument_node="">The official task of </span><a data-dcnode-id="3874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrialisation" title="Industrialisation"><span data-dcnode-id="3875" instrument_node="">industrialisation</span></a><span data-dcnode-id="3873" instrument_node=""> was the transformation of the Soviet Union from a predominantly </span><a data-dcnode-id="3871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agrarian_society" title="Agrarian society"><span data-dcnode-id="3872" instrument_node="">agrarian state</span></a><span data-dcnode-id="3870" instrument_node=""> into a leading industrial one. The beginning of socialist industrialisation as an integral part of the "triple task of a radical reorganisation of society" (</span><a data-dcnode-id="3868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economy_of_the_Soviet_Union%23Stalinism" title="Economy of the Soviet Union"><span data-dcnode-id="3869" instrument_node="">industrialisation</span></a><span data-dcnode-id="3867" instrument_node="">, </span><a data-dcnode-id="3865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Break_%28USSR%29" title="Great Break (USSR)"><span data-dcnode-id="3866" instrument_node="">economic centralisation</span></a><span data-dcnode-id="3864" instrument_node="">, </span><a data-dcnode-id="3862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collectivization_in_the_Soviet_Union" title="Collectivization in the Soviet Union"><span data-dcnode-id="3863" instrument_node="">collectivisation</span></a><span data-dcnode-id="3861" instrument_node=""> of </span><a data-dcnode-id="3859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agriculture_in_the_Soviet_Union" title="Agriculture in the Soviet Union"><span data-dcnode-id="3860" instrument_node="">agriculture</span></a><span data-dcnode-id="3858" instrument_node=""> and a </span><a class="mw-redirect" data-dcnode-id="3856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_Revolution_%28USSR%29" title="Cultural Revolution (USSR)"><span data-dcnode-id="3857" instrument_node="">cultural revolution</span></a><span data-dcnode-id="3855" instrument_node="">) was laid down by the </span><a data-dcnode-id="3853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_five-year_plan" title="First five-year plan"><span data-dcnode-id="3854" instrument_node="">first five-year plan</span></a><span data-dcnode-id="3852" instrument_node=""> for the development of the national economy lasting from 1928 until 1932.
</span></p><p data-dcnode-id="3823"><span data-dcnode-id="3850" instrument_node="">In Soviet times, industrialisation was considered a great feat.</span><sup class="reference" data-dcnode-id="3847" id="cite_ref-Program_CPSS_1-0"><a data-dcnode-id="3848" href="#cite_note-Program_CPSS-1"><span data-dcnode-id="3849" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3846" instrument_node=""> The rapid growth of production capacity and the volume of production of </span><a data-dcnode-id="3844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heavy_industry" title="Heavy industry"><span data-dcnode-id="3845" instrument_node="">heavy industry</span></a><span data-dcnode-id="3843" instrument_node=""> (4 times) was of great importance for ensuring economic independence from capitalist countries and strengthening the country's defense capability.</span><sup class="reference" data-dcnode-id="3840" id="cite_ref-Program_CPSS_1-1"><a data-dcnode-id="3841" href="#cite_note-Program_CPSS-1"><span data-dcnode-id="3842" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3839" instrument_node=""> At this time, the Soviet Union made the transition from an agrarian country to an industrial one. During the </span><a data-dcnode-id="3837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Front_%28World_War_II%29" title="Eastern Front (World War II)"><span data-dcnode-id="3838" instrument_node="">Great Patriotic War</span></a><span data-dcnode-id="3836" instrument_node="">, the Soviet industry proved its superiority over the industry of Nazi Germany.</span><sup class="reference" data-dcnode-id="3833" id="cite_ref-GSE_2-0"><a data-dcnode-id="3834" href="#cite_note-GSE-2"><span data-dcnode-id="3835" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3832" instrument_node=""> Since the late 1980s, discussions on the price of industrialisation have been held in the Soviet Union and Russia, which also questioned its results and long-term consequences for the Soviet economy and society. However, the economies of all post–Soviet states still function at the expense of the industrial base that was created in the Soviet period.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3825" style="white-space:nowrap;"><span data-dcnode-id="3831" instrument_node="">[</span><i data-dcnode-id="3827"><a data-dcnode-id="3828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3829" title="This claim needs references to reliable sources. (November 2021)"><span data-dcnode-id="3830" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3826" instrument_node="">]</span></sup><span data-dcnode-id="3824" instrument_node="">
</span></p><span data-dcnode-id="3822" instrument_node="">

</span><h2 data-dcnode-id="3696"><span class="mw-headline" data-dcnode-id="3704" id="GOELRO"><span data-dcnode-id="3705" instrument_node="">GOELRO</span></span><span class="mw-editsection" data-dcnode-id="3697"><span class="mw-editsection-bracket" data-dcnode-id="3702"><span data-dcnode-id="3703" instrument_node="">[</span></span><a data-dcnode-id="3700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DIndustrialization_in_the_Soviet_Union%26action%3Dedit%26section%3D1" title="Edit section: GOELRO"><span data-dcnode-id="3701" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3695" instrument_node="">
</span><p data-dcnode-id="3687"><span data-dcnode-id="3694" instrument_node="">Already during the </span><a data-dcnode-id="3692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Civil_War" title="Russian Civil War"><span data-dcnode-id="3693" instrument_node="">Civil War</span></a><span data-dcnode-id="3691" instrument_node="">, the Soviet government began to develop a long-term plan for the electrification of the country. In December 1920, the </span><a class="mw-redirect" data-dcnode-id="3689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GOELRO_plan" title="GOELRO plan"><span data-dcnode-id="3690" instrument_node="">GOELRO plan</span></a><span data-dcnode-id="3688" instrument_node=""> was approved by the 8th All-Russian Congress of Soviets, and a year later it was approved by the 9th All-Russian Congress of Soviets.
</span></p><p data-dcnode-id="3679"><span data-dcnode-id="3686" instrument_node="">The plan provided for the priority development of the electric power industry, tied to the plans for the development of territories. The GOELRO plan, designed for 10–15 years, provided for the construction of 30 district power plants (20 </span><a data-dcnode-id="3684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thermal_power_station" title="Thermal power station"><span data-dcnode-id="3685" instrument_node="">thermal power plants</span></a><span data-dcnode-id="3683" instrument_node=""> and 10 hydroelectric power plants) with a total capacity of 1.75 gigawatts. The project covered eight major economic regions (Northern, Central Industrial, Southern, Volga, Ural, West Siberian, Caucasian and Turkestan). At the same time, the development of the country's transport system was carried out (reconstruction of old and construction of new railway lines, construction of the </span><a data-dcnode-id="3681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Volga%25E2%2580%2593Don_Canal" title="Volga–Don Canal"><span data-dcnode-id="3682" instrument_node="">Volga–Don Canal</span></a><span data-dcnode-id="3680" instrument_node="">).
</span></p><p data-dcnode-id="3670"><span data-dcnode-id="3678" instrument_node="">The GOELRO project made possible the industrialisation in the Soviet Union: electricity generation in 1932 compared with 1913 increased almost 7 times, from 2 to 13.5 billion </span><a class="mw-redirect" data-dcnode-id="3676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/KWh" title="KWh"><span data-dcnode-id="3677" instrument_node="">kWh</span></a><span data-dcnode-id="3675" instrument_node="">.</span><sup class="reference" data-dcnode-id="3672" id="cite_ref-Electr1932vs1913_3-0"><a data-dcnode-id="3673" href="#cite_note-Electr1932vs1913-3"><span data-dcnode-id="3674" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3671" instrument_node="">
</span></p><span data-dcnode-id="3669" instrument_node="">
</span><h2 data-dcnode-id="3659"><span class="mw-headline" data-dcnode-id="3667" id="Features_of_industrialisation"><span data-dcnode-id="3668" instrument_node="">Features of industrialisation</span></span><span class="mw-editsection" data-dcnode-id="3660"><span class="mw-editsection-bracket" data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">[</span></span><a data-dcnode-id="3663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DIndustrialization_in_the_Soviet_Union%26action%3Dedit%26section%3D2" title="Edit section: Features of industrialisation"><span data-dcnode-id="3664" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3658" instrument_node="">
</span><p data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">Researchers highlight the following features of industrialisation:
</span></p><span data-dcnode-id="3655" instrument_node="">
</span><ul data-dcnode-id="3631"><li data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">As the main link were selected investment sectors: metallurgy, engineering, industrial construction;</span></li><span data-dcnode-id="3652" instrument_node="">
</span><li data-dcnode-id="3650"><span data-dcnode-id="3651" instrument_node="">Pumping funds from agriculture to industry using price scissors;</span></li><span data-dcnode-id="3649" instrument_node="">
</span><li data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">The special role of the state in the centralisation of funds for industrialisation;</span></li><span data-dcnode-id="3646" instrument_node="">
</span><li data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">The creation of a single form of ownership—socialist—in two forms: state and cooperative-collective farm;</span></li><span data-dcnode-id="3643" instrument_node="">
</span><li data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">Industrialisation planning;</span></li><span data-dcnode-id="3640" instrument_node="">
</span><li data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">Lack of private capital (cooperative entrepreneurship in that period was legal);</span></li><span data-dcnode-id="3637" instrument_node="">
</span><li data-dcnode-id="3635"><span data-dcnode-id="3636" instrument_node="">Relying on own resources (it was impossible to attract private capital in the existing external and internal conditions);</span></li><span data-dcnode-id="3634" instrument_node="">
</span><li data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node="">Over-centralised resources.</span></li></ul><span data-dcnode-id="3630" instrument_node="">
</span><h2 data-dcnode-id="3620"><span class="mw-headline" data-dcnode-id="3628" id="Discussions_in_the_period_of_the_New_Economic_Policy"><span data-dcnode-id="3629" instrument_node="">Discussions in the period of the New Economic Policy</span></span><span class="mw-editsection" data-dcnode-id="3621"><span class="mw-editsection-bracket" data-dcnode-id="3626"><span data-dcnode-id="3627" instrument_node="">[</span></span><a data-dcnode-id="3624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DIndustrialization_in_the_Soviet_Union%26action%3Dedit%26section%3D3" title="Edit section: Discussions in the period of the New Economic Policy"><span data-dcnode-id="3625" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3619" instrument_node="">
</span><p data-dcnode-id="3590"><span data-dcnode-id="3618" instrument_node="">Until 1928, the Soviet Union conducted the "</span><a data-dcnode-id="3616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Economic_Policy" title="New Economic Policy"><span data-dcnode-id="3617" instrument_node="">New Economic Policy</span></a><span data-dcnode-id="3615" instrument_node="">". While </span><a data-dcnode-id="3613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agriculture" title="Agriculture"><span data-dcnode-id="3614" instrument_node="">agriculture</span></a><span data-dcnode-id="3612" instrument_node="">, </span><a data-dcnode-id="3610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trade" title="Trade"><span data-dcnode-id="3611" instrument_node="">retail</span></a><span data-dcnode-id="3609" instrument_node="">, services, </span><a data-dcnode-id="3607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Food_industry" title="Food industry"><span data-dcnode-id="3608" instrument_node="">food</span></a><span data-dcnode-id="3606" instrument_node=""> and </span><a data-dcnode-id="3604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light_industry" title="Light industry"><span data-dcnode-id="3605" instrument_node="">light industries</span></a><span data-dcnode-id="3603" instrument_node=""> were mostly in private hands, the state retained control of heavy industry, </span><a data-dcnode-id="3601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transport" title="Transport"><span data-dcnode-id="3602" instrument_node="">transport</span></a><span data-dcnode-id="3600" instrument_node="">, </span><a data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bank" title="Bank"><span data-dcnode-id="3599" instrument_node="">banks</span></a><span data-dcnode-id="3597" instrument_node="">, wholesale and international trade ("commanding heights"). State-owned enterprises competed with each other, the role of the </span><a data-dcnode-id="3595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gosplan" title="Gosplan"><span data-dcnode-id="3596" instrument_node="">Gosplan</span></a><span data-dcnode-id="3594" instrument_node=""> of the Soviet Union was limited to forecasts that determined the direction and size of public </span><a data-dcnode-id="3592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Investment" title="Investment"><span data-dcnode-id="3593" instrument_node="">investment</span></a><span data-dcnode-id="3591" instrument_node="">.
</span></p><p data-dcnode-id="3588"><span data-dcnode-id="3589" instrument_node="">One of the fundamental contradictions of Bolshevism was the fact that the party that called itself "workers" and its rule the "dictatorship of the proletariat" came to power in an agrarian country where factory workers constituted only a few percent of the population, and most of them were recent immigrants from the village who have not yet completely broken ties with her. Forced industrialisation was designed to eliminate this contradiction.
</span></p><p data-dcnode-id="3576"><span data-dcnode-id="3587" instrument_node="">From a foreign policy point of view, the country was in hostile conditions. According to the leadership of the </span><a data-dcnode-id="3585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_the_Soviet_Union" title="Communist Party of the Soviet Union"><span data-dcnode-id="3586" instrument_node="">All-Union Communist Party (Bolsheviks)</span></a><span data-dcnode-id="3584" instrument_node="">, there was a high probability of a new war with capitalist states. It is significant that even at the 10th congress of the Russian Communist Party (Bolsheviks) in 1921, </span><a data-dcnode-id="3582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lev_Kamenev" title="Lev Kamenev"><span data-dcnode-id="3583" instrument_node="">Lev Kamenev</span></a><span data-dcnode-id="3581" instrument_node="">, the author of the report "About the Soviet Republic Surrounded", stated that preparations for the Second World War, which had begun in Europe:</span><sup class="reference" data-dcnode-id="3578" id="cite_ref-Kamenev_X_4-0"><a data-dcnode-id="3579" href="#cite_note-Kamenev_X-4"><span data-dcnode-id="3580" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3577" instrument_node="">
</span></p><span data-dcnode-id="3575" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="3570"><p data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">What we see every day in Europe ...testifies that the war is not over, armies move, combat orders are given, garrisons are sent to one or the other area, no borders can be considered firmly established. ...one can expect from hour to hour that the old finished imperialist slaughter will generate, as its natural continuation, some new, even more monstrous, even more disastrous imperialist war.</span></p></blockquote><span data-dcnode-id="3569" instrument_node="">
</span><p data-dcnode-id="3559"><span data-dcnode-id="3568" instrument_node="">Preparation for war required a thorough rearmament. The military schools of the Russian Empire, destroyed by the revolution and the civil war, were rebuilt: military academies, schools, institutes and military courses began training for the Red Army.</span><sup class="reference" data-dcnode-id="3565" id="cite_ref-5"><a data-dcnode-id="3566" href="#cite_note-5"><span data-dcnode-id="3567" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3564" instrument_node=""> However, it was impossible to immediately begin technical re-equipment of the Red Army due to the backwardness of heavy industry. At the same time, the existing rates of industrialisation seemed insufficient,</span><sup class="reference" data-dcnode-id="3561" id="cite_ref-XVI_6-0"><a data-dcnode-id="3562" href="#cite_note-XVI-6"><span data-dcnode-id="3563" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3560" instrument_node=""> as the lag behind the capitalist countries, which had an economic upswing in the 1920s, was increasing.
</span></p><p data-dcnode-id="3551"><span data-dcnode-id="3558" instrument_node="">One of the first such plans for rearmament was laid out as early as 1921, in the draft reorganisation of the Red Army prepared for the 10th congress by </span><a data-dcnode-id="3556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sergey_Ivanovich_Gusev" title="Sergey Ivanovich Gusev"><span data-dcnode-id="3557" instrument_node="">Sergey Gusev</span></a><span data-dcnode-id="3555" instrument_node=""> and </span><a data-dcnode-id="3553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Frunze" title="Mikhail Frunze"><span data-dcnode-id="3554" instrument_node="">Mikhail Frunze</span></a><span data-dcnode-id="3552" instrument_node="">. The draft stated both the inevitability of a new big war and the unpreparedness of the Red Army for it. Gusev and Frunze suggested organizing mass production of tanks, artillery, "armored cars, armored trains, airplanes" in a "shock" order. A separate point was also suggested to carefully study the combat experience of the Civil War, including the units that opposed the Red Army (officer units of the White Guards, Makhnovists carts, Wrangel "bombing airplanes", etc. In addition, the authors also urged to urgently organise the publication in Russia of foreign "Marxist" works on military issues.
</span></p><p data-dcnode-id="3536"><span data-dcnode-id="3550" instrument_node="">After the end of the Civil War, Russia again faced the pre-revolutionary problem of agrarian overpopulation (the "</span><a class="mw-redirect" data-dcnode-id="3548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malthusian_trap" title="Malthusian trap"><span data-dcnode-id="3549" instrument_node="">Malthusian-Marxist trap</span></a><span data-dcnode-id="3547" instrument_node="">"). In the reign of Nicholas II, overpopulation caused a gradual decrease in the average allotments of land, the surplus of workers in the village was not absorbed by the outflow to the cities (amounting to about 300,000 people per year, with an average increase of up to 1 million people per year), nor by emigration Stolypin government program of resettling colonists in the Urals. In the 1920s, overpopulation took the form of urban </span><a data-dcnode-id="3545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unemployment" title="Unemployment"><span data-dcnode-id="3546" instrument_node="">unemployment</span></a><span data-dcnode-id="3544" instrument_node="">. It has become a serious social problem that has grown throughout the New Economic Policy, and by the end of it was more than 2 million people, or about 10% of the urban population.</span><sup class="reference" data-dcnode-id="3541" id="cite_ref-Kamynin_7-0"><a data-dcnode-id="3542" href="#cite_note-Kamynin-7"><span data-dcnode-id="3543" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3540" instrument_node=""> The government believed that one of the factors hindering the development of industry in the cities was the lack of food and the unwillingness of the village to provide the city with </span><a data-dcnode-id="3538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bread" title="Bread"><span data-dcnode-id="3539" instrument_node="">bread</span></a><span data-dcnode-id="3537" instrument_node=""> at low prices.
</span></p><p data-dcnode-id="3525"><span data-dcnode-id="3535" instrument_node="">The party leadership intended to solve these problems by the </span><a data-dcnode-id="3533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planned_economy" title="Planned economy"><span data-dcnode-id="3534" instrument_node="">planned</span></a><span data-dcnode-id="3532" instrument_node=""> redistribution of resources between agriculture and industry, in accordance with the concept of </span><a data-dcnode-id="3530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialism" title="Socialism"><span data-dcnode-id="3531" instrument_node="">socialism</span></a><span data-dcnode-id="3529" instrument_node="">, which was announced at the </span><a data-dcnode-id="3527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/14th_Congress_of_the_All-Union_Communist_Party_%28Bolsheviks%29" title="14th Congress of the All-Union Communist Party (Bolsheviks)"><span data-dcnode-id="3528" instrument_node="">14th Congress of the All-Union Communist Party (Bolsheviks)</span></a><span data-dcnode-id="3526" instrument_node=""> and the 3rd All-Union Congress of Soviets in 1925. In the Stalinist historiography, the 14th congress was called the "industrialisation congress", but it made only a general decision about the need to transform the Soviet Union from an agrarian country into an industrial one, without determining the specific forms and rates of industrialisation.
</span></p><p data-dcnode-id="3492"><span data-dcnode-id="3524" instrument_node="">The choice of a specific implementation of central planning was vigorously discussed in 1926–1928. Proponents of the genetic approach (</span><a data-dcnode-id="3522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Bazarov" title="Vladimir Bazarov"><span data-dcnode-id="3523" instrument_node="">Vladimir Bazarov</span></a><span data-dcnode-id="3521" instrument_node="">, </span><a data-dcnode-id="3519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Groman" title="Vladimir Groman"><span data-dcnode-id="3520" instrument_node="">Vladimir Groman</span></a><span data-dcnode-id="3518" instrument_node="">, </span><a data-dcnode-id="3516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikolai_Kondratiev" title="Nikolai Kondratiev"><span data-dcnode-id="3517" instrument_node="">Nikolai Kondratiev</span></a><span data-dcnode-id="3515" instrument_node="">) believed that the plan should be based on objective regularities of economic development, identified as a result of an analysis of existing trends. Proponents of the teleological approach (</span><a data-dcnode-id="3513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gleb_Krzhizhanovsky" title="Gleb Krzhizhanovsky"><span data-dcnode-id="3514" instrument_node="">Gleb Krzhizhanovsky</span></a><span data-dcnode-id="3512" instrument_node="">, </span><a data-dcnode-id="3510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Valerian_Kuybyshev" title="Valerian Kuybyshev"><span data-dcnode-id="3511" instrument_node="">Valerian Kuybyshev</span></a><span data-dcnode-id="3509" instrument_node="">, </span><a data-dcnode-id="3507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stanislav_Strumilin" title="Stanislav Strumilin"><span data-dcnode-id="3508" instrument_node="">Stanislav Strumilin</span></a><span data-dcnode-id="3506" instrument_node="">) believed that the plan should transform the economy and proceed from future structural changes, production opportunities and rigid discipline. Among the party functionaries, the former were supported by a supporter of the evolutionary path to socialism, </span><a data-dcnode-id="3504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikolai_Bukharin" title="Nikolai Bukharin"><span data-dcnode-id="3505" instrument_node="">Nikolai Bukharin</span></a><span data-dcnode-id="3503" instrument_node="">, and the latter by </span><a data-dcnode-id="3501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leon_Trotsky" title="Leon Trotsky"><span data-dcnode-id="3502" instrument_node="">Leon Trotsky</span></a><span data-dcnode-id="3500" instrument_node="">, who insisted on an accelerated pace of industrialisation.</span><sup class="reference" data-dcnode-id="3497" id="cite_ref-8"><a data-dcnode-id="3498" href="#cite_note-8"><span data-dcnode-id="3499" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="3494" id="cite_ref-9"><a data-dcnode-id="3495" href="#cite_note-9"><span data-dcnode-id="3496" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3493" instrument_node="">
</span></p><p data-dcnode-id="3487"><span data-dcnode-id="3491" instrument_node="">One of the first ideologues of industrialisation was </span><a data-dcnode-id="3489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yevgeni_Preobrazhensky" title="Yevgeni Preobrazhensky"><span data-dcnode-id="3490" instrument_node="">Evgeny Preobrazhensky</span></a><span data-dcnode-id="3488" instrument_node="">, an economist close to Trotsky, who in 1924–25 developed the concept of forced "superindustrialisation" at the expense of funds from the countryside ("initial socialist accumulation", according to Preobrazhensky). For his part, Bukharin accused Preobrazhensky and his "left opposition" who supported him in imposing "feudal military exploitation of the peasantry" and "internal colonialism".
</span></p><p data-dcnode-id="3475"><span data-dcnode-id="3486" instrument_node="">The general secretary of the Central Committee of the All-Union Communist Party (Bolsheviks), </span><a data-dcnode-id="3484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Stalin" title="Joseph Stalin"><span data-dcnode-id="3485" instrument_node="">Joseph Stalin</span></a><span data-dcnode-id="3483" instrument_node="">, initially supported Bukharin's point of view, but after Trotsky's exclusion from the Party's Central Committee in late 1927, he changed his position to the opposite.</span><sup class="reference" data-dcnode-id="3480" id="cite_ref-Nov_10-0"><a data-dcnode-id="3481" href="#cite_note-Nov-10"><span data-dcnode-id="3482" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3479" instrument_node=""> This led to a decisive victory for the teleological school and a radical turn from the New Economic Policy. Researcher </span><a data-dcnode-id="3477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vadim_Rogovin" title="Vadim Rogovin"><span data-dcnode-id="3478" instrument_node="">Vadim Rogovin</span></a><span data-dcnode-id="3476" instrument_node=""> believes that the cause of Stalin's "left turn" was the grain harvest crisis of 1927; the peasantry, especially the well-to-do, massively refused to sell the bread, considering the purchase prices set by the state to be low.
</span></p><p data-dcnode-id="3466"><span data-dcnode-id="3474" instrument_node="">The internal economic crisis of 1927 intertwined with a sharp exacerbation of the foreign policy situation. On February 23, 1927, the British Foreign Secretary sent a note to the Soviet Union demanding that it stop supporting the Kuomintang–Communist government in China. After the refusal, the United Kingdom on May 24–27 broke off diplomatic relations with the Soviet Union.</span><sup class="reference" data-dcnode-id="3471" id="cite_ref-11"><a data-dcnode-id="3472" href="#cite_note-11"><span data-dcnode-id="3473" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3470" instrument_node=""> However, at the same time, the alliance of the Kuomintang and the Chinese Communists fell apart; on April 12, Chiang Kai-shek and his allies </span><a data-dcnode-id="3468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shanghai_massacre" title="Shanghai massacre"><span data-dcnode-id="3469" instrument_node="">massacred the Shanghai Communists</span></a><span data-dcnode-id="3467" instrument_node="">. This incident was widely used by the "united opposition" (the "Trotsky-Zinoviev bloc") to criticise the official Stalinist diplomacy as deliberately a failure.
</span></p><p data-dcnode-id="3452"><span data-dcnode-id="3465" instrument_node="">In the same period, a raid on the Soviet embassy in Beijing (April 6) took place; British police searched the Soviet-British joint-stock company Arcos in London (May 12). In June 1927, representatives of the </span><a data-dcnode-id="3463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_All-Military_Union" title="Russian All-Military Union"><span data-dcnode-id="3464" instrument_node="">Russian All-Military Union</span></a><span data-dcnode-id="3462" instrument_node=""> conducted a series of terrorist attacks against the Soviet Union. In particular, on June 7, White émigré </span><a class="mw-redirect" data-dcnode-id="3460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Koverda" title="Koverda"><span data-dcnode-id="3461" instrument_node="">Koverda</span></a><span data-dcnode-id="3459" instrument_node=""> killed the Soviet Plenipotentiary in Warsaw, </span><a class="mw-redirect" data-dcnode-id="3457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voykov" title="Voykov"><span data-dcnode-id="3458" instrument_node="">Voykov</span></a><span data-dcnode-id="3456" instrument_node="">, on the same day in Minsk, the head of the Belarusian Joint State Political Directorate, Iosif Opansky, was killed, the day before, the </span><a data-dcnode-id="3454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_All-Military_Union" title="Russian All-Military Union"><span data-dcnode-id="3455" instrument_node="">Russian All-Military Union</span></a><span data-dcnode-id="3453" instrument_node=""> terrorist threw a bomb at the Joint State Political Directorate in Moscow. All these incidents contributed to the creation of a "military psychosis" environment, the emergence of expectations of a new foreign intervention ("crusade against Bolshevism").
</span></p><p data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">By January 1928, only two-thirds of the grain was harvested compared to last year's level, as the peasants massively held the bread, considering the purchase prices to be low. The disruptions in the supply of cities and the army that had begun were aggravated by the exacerbation of the foreign policy situation, which even reached the point of trial mobilisation. In August 1927, a panic began among the population, which resulted in the wholesale purchase of food for the future. At the 15th Congress of the All-Union Communist Party (Bolsheviks) (December 1927), Mikoyan admitted that the country had experienced the difficulties of "the eve of war without having a war".
</span></p><span data-dcnode-id="3449" instrument_node="">
</span><h2 data-dcnode-id="3439"><span class="mw-headline" data-dcnode-id="3447" id="First_five-year_plan"><span data-dcnode-id="3448" instrument_node="">First five-year plan</span></span><span class="mw-editsection" data-dcnode-id="3440"><span class="mw-editsection-bracket" data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">[</span></span><a data-dcnode-id="3443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DIndustrialization_in_the_Soviet_Union%26action%3Dedit%26section%3D4" title="Edit section: First five-year plan"><span data-dcnode-id="3444" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3438" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3432" role="note"><span data-dcnode-id="3435" instrument_node="">Main article: </span><a data-dcnode-id="3433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_five-year_plan" title="First five-year plan"><span data-dcnode-id="3434" instrument_node="">First five-year plan</span></a></div><span data-dcnode-id="3431" instrument_node="">
</span><p data-dcnode-id="3413"><span data-dcnode-id="3430" instrument_node="">The main task of the introduced </span><a class="mw-redirect" data-dcnode-id="3428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Command_economy" title="Command economy"><span data-dcnode-id="3429" instrument_node="">command economy</span></a><span data-dcnode-id="3427" instrument_node=""> was to build up the economic and military power of the state at the highest possible rates, accompanied with the near complete elimination of private industry that had allowed under the </span><a data-dcnode-id="3425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Economic_Policy" title="New Economic Policy"><span data-dcnode-id="3426" instrument_node="">NEP</span></a><span data-dcnode-id="3424" instrument_node="">. At the initial stage, it was reduced to the redistribution of the maximum possible amount of resources for the needs of state-owned industrialisation. In December 1927, at the </span><a data-dcnode-id="3422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/15th_Congress_of_the_All-Union_Communist_Party_%28Bolsheviks%29" title="15th Congress of the All-Union Communist Party (Bolsheviks)"><span data-dcnode-id="3423" instrument_node="">15th Congress of the All-Union Communist Party (Bolsheviks)</span></a><span data-dcnode-id="3421" instrument_node="">, "Directives for drafting the first five-year national economic development plan of the Soviet Union" were adopted, in which the congress spoke out against super-industrialisation: the growth rates should not be maximal and should be planned so that failures do not occur.</span><sup class="reference" data-dcnode-id="3418" id="cite_ref-Rogachevskaya_12-0"><a data-dcnode-id="3419" href="#cite_note-Rogachevskaya-12"><span data-dcnode-id="3420" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3417" instrument_node=""> Developed on the basis of directives, the draft of the first five-year plan (October 1, 1928 – October 1, 1933) was approved at the 16th Conference of the All-Union Communist Party (Bolsheviks) (April 1929) as a complex of carefully thought-out and real tasks. This plan, in reality, is much more stressful than previous projects, immediately after it was approved by the 5th Congress of Soviets of the Soviet Union in May 1929, gave grounds for the state to carry out a number of economic, political, organisational and ideological measures, which elevated industrialisation in status of the concept, the era of the "</span><a data-dcnode-id="3415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Break_%28USSR%29" title="Great Break (USSR)"><span data-dcnode-id="3416" instrument_node="">Great Turn</span></a><span data-dcnode-id="3414" instrument_node="">". The country had to expand the construction of new industries, increase the production of all types of products and start producing new equipment.
</span></p><span data-dcnode-id="3412" instrument_node="">
</span><link data-dcnode-id="3411" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="3401"><p data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">We are 50–100 years behind the advanced countries. We must make good this distance in ten years. Either we do it, or they crush us.</span></p><div class="templatequotecite" data-dcnode-id="3402"><span data-dcnode-id="3408" instrument_node="">— </span><cite data-dcnode-id="3403"><span data-dcnode-id="3407" instrument_node="">Joseph Stalin</span><sup class="reference" data-dcnode-id="3404" id="cite_ref-13"><a data-dcnode-id="3405" href="#cite_note-13"><span data-dcnode-id="3406" instrument_node="">[13]</span></a></sup></cite></div></blockquote><span data-dcnode-id="3400" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3391"><div class="thumbinner" data-dcnode-id="3392" style="width:252px;"><a class="image" data-dcnode-id="3398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWladimir_Gawriilowitsch_Krikhatzkij_-_The_First_Tractor.jpg"><img alt="" class="thumbimage" data-dcnode-id="3399" data-file-height="400" data-file-width="601" decoding="async" height="166" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/85/Wladimir_Gawriilowitsch_Krikhatzkij_-_The_First_Tractor.jpg/250px-Wladimir_Gawriilowitsch_Krikhatzkij_-_The_First_Tractor.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/85/Wladimir_Gawriilowitsch_Krikhatzkij_-_The_First_Tractor.jpg/375px-Wladimir_Gawriilowitsch_Krikhatzkij_-_The_First_Tractor.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/85/Wladimir_Gawriilowitsch_Krikhatzkij_-_The_First_Tractor.jpg/500px-Wladimir_Gawriilowitsch_Krikhatzkij_-_The_First_Tractor.jpg 2x" width="250"></a><span data-dcnode-id="3397" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3393"><div class="magnify" data-dcnode-id="3395"><a class="internal" data-dcnode-id="3396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWladimir_Gawriilowitsch_Krikhatzkij_-_The_First_Tractor.jpg" title="Enlarge"></a></div><span data-dcnode-id="3394" instrument_node="">Vladimir Krihatsky. "First Tractor"</span></div></div></div><span data-dcnode-id="3390" instrument_node="">
</span><p data-dcnode-id="3319"><span data-dcnode-id="3389" instrument_node="">First of all, using </span><a class="mw-redirect" data-dcnode-id="3387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Propaganda_in_the_USSR" title="Propaganda in the USSR"><span data-dcnode-id="3388" instrument_node="">propaganda</span></a><span data-dcnode-id="3386" instrument_node="">, the party leadership mobilised the population in support of industrialisation.</span><sup class="reference" data-dcnode-id="3383" id="cite_ref-Kenez_14-0"><a data-dcnode-id="3384" href="#cite_note-Kenez-14"><span data-dcnode-id="3385" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3382" instrument_node=""> </span><a data-dcnode-id="3380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Komsomol" title="Komsomol"><span data-dcnode-id="3381" instrument_node="">Komsomol</span></a><span data-dcnode-id="3379" instrument_node=""> members, in particular, took it with enthusiasm. There was no shortage of cheap labor, because after </span><a data-dcnode-id="3377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collectivization_in_the_Soviet_Union" title="Collectivization in the Soviet Union"><span data-dcnode-id="3378" instrument_node="">collectivisation</span></a><span data-dcnode-id="3376" instrument_node="">, a large number of yesterday's rural inhabitants moved from rural areas to cities from poverty, hunger and the arbitrariness of the authorities.</span><sup class="reference" data-dcnode-id="3373" id="cite_ref-Kessler_15-0"><a data-dcnode-id="3374" href="#cite_note-Kessler-15"><span data-dcnode-id="3375" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3372" instrument_node=""> Millions of people selflessly,</span><sup class="reference" data-dcnode-id="3369" id="cite_ref-RogovinII_16-0"><a data-dcnode-id="3370" href="#cite_note-RogovinII-16"><span data-dcnode-id="3371" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3368" instrument_node=""> almost by hand, built hundreds of </span><a class="mw-redirect" data-dcnode-id="3366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Factories" title="Factories"><span data-dcnode-id="3367" instrument_node="">factories</span></a><span data-dcnode-id="3365" instrument_node="">, </span><a data-dcnode-id="3363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Power_station" title="Power station"><span data-dcnode-id="3364" instrument_node="">power stations</span></a><span data-dcnode-id="3362" instrument_node="">, laid </span><a data-dcnode-id="3360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rail_transport" title="Rail transport"><span data-dcnode-id="3361" instrument_node="">railways</span></a><span data-dcnode-id="3359" instrument_node="">, </span><a data-dcnode-id="3357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moscow_Metro" title="Moscow Metro"><span data-dcnode-id="3358" instrument_node="">subways</span></a><span data-dcnode-id="3356" instrument_node="">. Often had to work in three shifts. In 1930, around 1,500 facilities were launched, of which 50 absorbed almost half of all investments. With the assistance of foreign specialists, a number of giant industrial buildings were erected: </span><a class="mw-redirect" data-dcnode-id="3354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DneproGES" title="DneproGES"><span data-dcnode-id="3355" instrument_node="">DneproGES</span></a><span data-dcnode-id="3353" instrument_node="">, metallurgical plants in </span><a data-dcnode-id="3351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnitogorsk_Iron_and_Steel_Works" title="Magnitogorsk Iron and Steel Works"><span data-dcnode-id="3352" instrument_node="">Magnitogorsk</span></a><span data-dcnode-id="3350" instrument_node="">, Lipetsk and Chelyabinsk, </span><a data-dcnode-id="3348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Novokuznetsk_Iron_and_Steel_Plant" title="Novokuznetsk Iron and Steel Plant"><span data-dcnode-id="3349" instrument_node="">Novokuznetsk</span></a><span data-dcnode-id="3347" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nornickel" title="Nornickel"><span data-dcnode-id="3346" instrument_node="">Norilsk</span></a><span data-dcnode-id="3344" instrument_node=""> and </span><a data-dcnode-id="3342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uralmash" title="Uralmash"><span data-dcnode-id="3343" instrument_node="">Uralmash</span></a><span data-dcnode-id="3341" instrument_node="">, tractor plants in </span><a data-dcnode-id="3339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Volgograd_Tractor_Plant" title="Volgograd Tractor Plant"><span data-dcnode-id="3340" instrument_node="">Stalingrad</span></a><span data-dcnode-id="3338" instrument_node="">, </span><a data-dcnode-id="3336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chelyabinsk_Tractor_Plant" title="Chelyabinsk Tractor Plant"><span data-dcnode-id="3337" instrument_node="">Chelyabinsk</span></a><span data-dcnode-id="3335" instrument_node="">, </span><a data-dcnode-id="3333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kharkiv_Tractor_Plant" title="Kharkiv Tractor Plant"><span data-dcnode-id="3334" instrument_node="">Kharkov</span></a><span data-dcnode-id="3332" instrument_node="">, </span><a data-dcnode-id="3330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uralvagonzavod" title="Uralvagonzavod"><span data-dcnode-id="3331" instrument_node="">Uralvagonzavod</span></a><span data-dcnode-id="3329" instrument_node="">, </span><a data-dcnode-id="3327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GAZ" title="GAZ"><span data-dcnode-id="3328" instrument_node="">GAZ</span></a><span data-dcnode-id="3326" instrument_node="">, ZIS (modern </span><a data-dcnode-id="3324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ZiL" title="ZiL"><span data-dcnode-id="3325" instrument_node="">ZiL</span></a><span data-dcnode-id="3323" instrument_node="">) and others. In 1935, the first line of the </span><a data-dcnode-id="3321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moscow_Metro" title="Moscow Metro"><span data-dcnode-id="3322" instrument_node="">Moscow Metro</span></a><span data-dcnode-id="3320" instrument_node=""> opened with a total length of 11.2&nbsp;km (7&nbsp;mi).
</span></p><span data-dcnode-id="3318" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3307"><div class="thumbinner" data-dcnode-id="3308" style="width:252px;"><a class="image" data-dcnode-id="3316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATelegram_Stalin_STZ.jpg"><img alt="" class="thumbimage" data-dcnode-id="3317" data-file-height="433" data-file-width="1024" decoding="async" height="106" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/2d/Telegram_Stalin_STZ.jpg/250px-Telegram_Stalin_STZ.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/2d/Telegram_Stalin_STZ.jpg/375px-Telegram_Stalin_STZ.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/2d/Telegram_Stalin_STZ.jpg/500px-Telegram_Stalin_STZ.jpg 2x" width="250"></a><span data-dcnode-id="3315" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3309"><div class="magnify" data-dcnode-id="3313"><a class="internal" data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATelegram_Stalin_STZ.jpg" title="Enlarge"></a></div><span data-dcnode-id="3312" instrument_node="">Congratulations by Stalin on the opening of the </span><a data-dcnode-id="3310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Volgograd_Tractor_Plant" title="Volgograd Tractor Plant"><span data-dcnode-id="3311" instrument_node="">Stalingrad Tractor Plant</span></a></div></div></div><span data-dcnode-id="3306" instrument_node="">
</span><p data-dcnode-id="3294"><span data-dcnode-id="3305" instrument_node="">Attention was paid to the destruction of private agriculture and its replacement by state-run large farms. Due to the emergence of domestic </span><a data-dcnode-id="3303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tractor" title="Tractor"><span data-dcnode-id="3304" instrument_node="">tractor</span></a><span data-dcnode-id="3302" instrument_node=""> construction, in 1932, the Soviet Union refused to import tractors from abroad, and in 1934 the </span><a data-dcnode-id="3300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kirov_Plant" title="Kirov Plant"><span data-dcnode-id="3301" instrument_node="">Kirov Plant</span></a><span data-dcnode-id="3299" instrument_node=""> in Leningrad began to produce a tilled tractor "Universal", which became the first domestic tractor exported abroad. In the ten years before the war, about 700,000 tractors were produced, which accounted for 40% of their world production.</span><sup class="reference" data-dcnode-id="3296" id="cite_ref-rodichev_17-0"><a data-dcnode-id="3297" href="#cite_note-rodichev-17"><span data-dcnode-id="3298" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3295" instrument_node="">
</span></p><p data-dcnode-id="3282"><span data-dcnode-id="3293" instrument_node="">In order to create its own engineering base, the </span><a data-dcnode-id="3291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Education_in_the_Soviet_Union" title="Education in the Soviet Union"><span data-dcnode-id="3292" instrument_node="">domestic system of higher technical education</span></a><span data-dcnode-id="3290" instrument_node=""> was urgently created.</span><sup class="reference" data-dcnode-id="3287" id="cite_ref-PetrovskyII_18-0"><a data-dcnode-id="3288" href="#cite_note-PetrovskyII-18"><span data-dcnode-id="3289" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3286" instrument_node=""> In 1930, universal primary </span><a data-dcnode-id="3284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Education" title="Education"><span data-dcnode-id="3285" instrument_node="">education</span></a><span data-dcnode-id="3283" instrument_node=""> was introduced in the Soviet Union, and seven-year compulsory education in the cities.
</span></p><p data-dcnode-id="3267"><span data-dcnode-id="3281" instrument_node="">In 1930, speaking at the </span><a data-dcnode-id="3279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/16th_Congress_of_the_All-Union_Communist_Party_%28Bolsheviks%29" title="16th Congress of the All-Union Communist Party (Bolsheviks)"><span data-dcnode-id="3280" instrument_node="">16th Congress of the All-Union Communist Party (Bolsheviks)</span></a><span data-dcnode-id="3278" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stalin" title="Stalin"><span data-dcnode-id="3277" instrument_node="">Stalin</span></a><span data-dcnode-id="3275" instrument_node=""> admitted that an industrial breakthrough was possible only when building "</span><a data-dcnode-id="3273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialism_in_one_country" title="Socialism in one country"><span data-dcnode-id="3274" instrument_node="">socialism in one country</span></a><span data-dcnode-id="3272" instrument_node="">" and demanded a multiple increase in the tasks of the five-year plan, arguing be exceeded.</span><sup class="reference" data-dcnode-id="3269" id="cite_ref-Ratkovsky_19-0"><a data-dcnode-id="3270" href="#cite_note-Ratkovsky-19"><span data-dcnode-id="3271" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3268" instrument_node="">
</span></p><p data-dcnode-id="3252"><span data-dcnode-id="3266" instrument_node="">In order to increase incentives to work, payment has become more tightly attached to </span><a data-dcnode-id="3264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Workforce_productivity" title="Workforce productivity"><span data-dcnode-id="3265" instrument_node="">performance</span></a><span data-dcnode-id="3263" instrument_node="">. Actively developed centers for the development and implementation of the principles of the </span><a data-dcnode-id="3261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scientific_management" title="Scientific management"><span data-dcnode-id="3262" instrument_node="">scientific organisation of labor</span></a><span data-dcnode-id="3260" instrument_node="">. One of the largest centers of this kind, the </span><a data-dcnode-id="3258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_Institute_of_Labour" title="Central Institute of Labour"><span data-dcnode-id="3259" instrument_node="">Central Institute of Labour</span></a><span data-dcnode-id="3257" instrument_node="">, created about 1,700 training points with 2,000 of the most qualified instructors of the Central Labor Institute in different parts of the country. They operated in all leading sectors of the national economy—in engineering, metallurgy, construction, light and timber industries, on railways and motor vehicles, in agriculture and even in the navy.</span><sup class="reference" data-dcnode-id="3254" id="cite_ref-expert_20-0"><a data-dcnode-id="3255" href="#cite_note-expert-20"><span data-dcnode-id="3256" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3253" instrument_node="">
</span></p><p data-dcnode-id="3246"><span data-dcnode-id="3251" instrument_node="">In 1933, at the joint plenum of the Central Committee and the Central Control Commission of the All-Union Communist Party (Bolsheviks), Stalin said in his report that according to the results of the first five-year plan, consumer goods produced less than needed, but the policy of moving industrialisation to the background would have that we would not have a tractor and automobile industry, ferrous metallurgy, metal for the production of machines. The country would sit without bread. Capitalist elements in the country would incredibly increase the chances for the restoration of capitalism. Our position would become similar to that of China, which at that time did not have its own heavy and military industry, and became the object of aggression. We would not have non-aggression pacts with other countries, but military intervention and war. A dangerous and deadly war, a bloody and unequal war, for in this war we would be almost unarmed before the enemies, having at our disposal all modern means of attack.</span><sup class="reference" data-dcnode-id="3248" id="cite_ref-21"><a data-dcnode-id="3249" href="#cite_note-21"><span data-dcnode-id="3250" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3247" instrument_node="">
</span></p><p data-dcnode-id="3218"><span data-dcnode-id="3245" instrument_node="">Since capital </span><a data-dcnode-id="3243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Investment" title="Investment"><span data-dcnode-id="3244" instrument_node="">investments</span></a><span data-dcnode-id="3242" instrument_node=""> in heavy industry almost immediately exceeded the previously planned amount and continued to grow, money emission was sharply increased (that is, printing of paper </span><a data-dcnode-id="3240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Money" title="Money"><span data-dcnode-id="3241" instrument_node="">money</span></a><span data-dcnode-id="3239" instrument_node="">), and during the entire first five-year period </span><a data-dcnode-id="3237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Money_supply" title="Money supply"><span data-dcnode-id="3238" instrument_node="">money supply</span></a><span data-dcnode-id="3236" instrument_node=""> growth in circulation more than doubled than production of </span><a data-dcnode-id="3234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Need" title="Need"><span data-dcnode-id="3235" instrument_node="">consumer goods</span></a><span data-dcnode-id="3233" instrument_node="">, which led to </span><a data-dcnode-id="3231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inflation" title="Inflation"><span data-dcnode-id="3232" instrument_node="">higher prices</span></a><span data-dcnode-id="3230" instrument_node=""> and a </span><a data-dcnode-id="3228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shortage" title="Shortage"><span data-dcnode-id="3229" instrument_node="">shortage</span></a><span data-dcnode-id="3227" instrument_node=""> of consumer goods.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3220" style="white-space:nowrap;"><span data-dcnode-id="3226" instrument_node="">[</span><i data-dcnode-id="3222"><a data-dcnode-id="3223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3224" title="This claim needs references to reliable sources. (July 2021)"><span data-dcnode-id="3225" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3221" instrument_node="">]</span></sup><span data-dcnode-id="3219" instrument_node="">
</span></p><p data-dcnode-id="3210"><span data-dcnode-id="3217" instrument_node="">In 1935, the "</span><a data-dcnode-id="3215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stakhanovite_movement" title="Stakhanovite movement"><span data-dcnode-id="3216" instrument_node="">Stakhanovist movement</span></a><span data-dcnode-id="3214" instrument_node="">" appeared, in honor of the mine worker </span><a data-dcnode-id="3212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexey_Stakhanov" title="Alexey Stakhanov"><span data-dcnode-id="3213" instrument_node="">Alexey Stakhanov</span></a><span data-dcnode-id="3211" instrument_node="">, who, according to official information of that time, performed 14.5 norms for a shift on the night of August 30, 1935.
</span></p><p data-dcnode-id="3205"><span data-dcnode-id="3209" instrument_node="">Since after the nationalisation of foreign concessions for gold mining against the Soviet Union, a "golden boycott" was declared, such methods as </span><a data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_sale_of_Hermitage_paintings" title="Soviet sale of Hermitage paintings"><span data-dcnode-id="3208" instrument_node="">selling paintings from the Hermitage collection</span></a><span data-dcnode-id="3206" instrument_node=""> were used to obtain the foreign currency needed to finance industrialisation.
</span></p><p data-dcnode-id="3191"><span data-dcnode-id="3204" instrument_node="">At the same time, the state shifted to the centralised distribution of the means of production and consumer goods belonging to it, the introduction of command-administrative methods of management and the </span><a data-dcnode-id="3202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nationalization" title="Nationalization"><span data-dcnode-id="3203" instrument_node="">nationalisation</span></a><span data-dcnode-id="3201" instrument_node=""> of private property were carried out. A political system emerged based on the leading role of the All-Union Communist Party (Bolsheviks), state ownership of the means of production and a minimum of private initiative. Also began the widespread use of forced labor by prisoners of the </span><a data-dcnode-id="3199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gulag" title="Gulag"><span data-dcnode-id="3200" instrument_node="">Gulag</span></a><span data-dcnode-id="3198" instrument_node="">, </span><a data-dcnode-id="3196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dekulakization" title="Dekulakization"><span data-dcnode-id="3197" instrument_node="">special settlers</span></a><span data-dcnode-id="3195" instrument_node=""> and </span><a data-dcnode-id="3193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rear_militia" title="Rear militia"><span data-dcnode-id="3194" instrument_node="">rear militia</span></a><span data-dcnode-id="3192" instrument_node="">.
</span></p><p data-dcnode-id="3183"><span data-dcnode-id="3190" instrument_node="">The first five-year plan was associated with rapid </span><a data-dcnode-id="3188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Urbanization" title="Urbanization"><span data-dcnode-id="3189" instrument_node="">urbanisation</span></a><span data-dcnode-id="3187" instrument_node="">. The urban </span><a data-dcnode-id="3185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_power" title="Labour power"><span data-dcnode-id="3186" instrument_node="">labor force</span></a><span data-dcnode-id="3184" instrument_node=""> increased by 12.5 million people, of whom 8.5 million were migrants from rural areas. However, the Soviet Union reached a share in 50% of the urban population only in the early 1960s.
</span></p><span data-dcnode-id="3182" instrument_node="">
</span><h2 data-dcnode-id="3172"><span class="mw-headline" data-dcnode-id="3180" id="Use_of_foreign_specialists"><span data-dcnode-id="3181" instrument_node="">Use of foreign specialists</span></span><span class="mw-editsection" data-dcnode-id="3173"><span class="mw-editsection-bracket" data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">[</span></span><a data-dcnode-id="3176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DIndustrialization_in_the_Soviet_Union%26action%3Dedit%26section%3D5" title="Edit section: Use of foreign specialists"><span data-dcnode-id="3177" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3171" instrument_node="">
</span><p data-dcnode-id="3157"><span data-dcnode-id="3170" instrument_node="">Engineers were invited from abroad, many well-known companies, such as </span><a data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Siemens-Schuckert" title="Siemens-Schuckert"><span data-dcnode-id="3169" instrument_node="">Siemens-Schuckertwerke</span></a><span data-dcnode-id="3167" instrument_node=""> AG and </span><a data-dcnode-id="3165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Electric" title="General Electric"><span data-dcnode-id="3166" instrument_node="">General Electric</span></a><span data-dcnode-id="3164" instrument_node="">, were involved in the work and carried out deliveries of modern equipment, a significant part of the equipment models produced in those years at Soviet factories, were copies or modifications of foreign analogues (for example, a </span><a data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fordson" title="Fordson"><span data-dcnode-id="3163" instrument_node="">Fordson</span></a><span data-dcnode-id="3161" instrument_node=""> tractor assembled at the </span><a class="mw-redirect" data-dcnode-id="3159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stalingrad_Tractor_Plant" title="Stalingrad Tractor Plant"><span data-dcnode-id="3160" instrument_node="">Stalingrad Tractor Plant</span></a><span data-dcnode-id="3158" instrument_node="">).
</span></p><p data-dcnode-id="3139"><span data-dcnode-id="3156" instrument_node="">In February 1930, between </span><a data-dcnode-id="3154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amtorg_Trading_Corporation" title="Amtorg Trading Corporation"><span data-dcnode-id="3155" instrument_node="">Amtorg</span></a><span data-dcnode-id="3153" instrument_node=""> and Albert Kahn, Inc., a firm of American architect </span><a data-dcnode-id="3151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albert_Kahn_%28architect%29" title="Albert Kahn (architect)"><span data-dcnode-id="3152" instrument_node="">Albert Kahn</span></a><span data-dcnode-id="3150" instrument_node="">, an agreement was signed, according to which Kahn's firm became the chief consultant of the Soviet government on industrial construction and received a package of orders for the construction of industrial enterprises worth $2 billion (about $250 billion in prices of our time). This company has provided construction of more than 500 industrial facilities in the Soviet Union.</span><sup class="reference" data-dcnode-id="3147" id="cite_ref-Rubchenko_22-0"><a data-dcnode-id="3148" href="#cite_note-Rubchenko-22"><span data-dcnode-id="3149" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="3144" id="cite_ref-Meerovich_23-0"><a data-dcnode-id="3145" href="#cite_note-Meerovich-23"><span data-dcnode-id="3146" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="3141" id="cite_ref-Trabsky_24-0"><a data-dcnode-id="3142" href="#cite_note-Trabsky-24"><span data-dcnode-id="3143" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3140" instrument_node="">
</span></p><p data-dcnode-id="3131"><span data-dcnode-id="3138" instrument_node="">A branch of Albert Kahn, Inc. was opened in Moscow under the name "</span><a data-dcnode-id="3136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gosproektstroi" title="Gosproektstroi"><span data-dcnode-id="3137" instrument_node="">Gosproektstroy</span></a><span data-dcnode-id="3135" instrument_node="">". Its leader was Moritz Kahn, brother of the head of the company. It employed 25 leading American engineers and about 2,500 Soviet employees. At that time it was the largest architectural bureau in the world. During the three years of the existence of Gosproektroy, more than 4,000 Soviet architects, engineers and technicians who have studied the American experience passed through it. The Moscow Office of Heavy Machinery, a branch of the German company </span><a data-dcnode-id="3133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Konecranes" title="Konecranes"><span data-dcnode-id="3134" instrument_node="">Demag</span></a><span data-dcnode-id="3132" instrument_node="">, also worked in Moscow.
</span></p><p data-dcnode-id="3120"><span data-dcnode-id="3130" instrument_node="">The firm of Albert Kahn played the role of coordinator between the Soviet customer and hundreds of Western companies that supplied equipment and advised the construction of individual objects. Thus, the technological project of the </span><a data-dcnode-id="3128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GAZ" title="GAZ"><span data-dcnode-id="3129" instrument_node="">Nizhny Novgorod Automobile Plant</span></a><span data-dcnode-id="3127" instrument_node=""> was completed by </span><a data-dcnode-id="3125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ford_Motor_Company" title="Ford Motor Company"><span data-dcnode-id="3126" instrument_node="">Ford</span></a><span data-dcnode-id="3124" instrument_node="">, the construction project by the American company </span><a data-dcnode-id="3122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austin_Motor_Company" title="Austin Motor Company"><span data-dcnode-id="3123" instrument_node="">Austin Motor Company</span></a><span data-dcnode-id="3121" instrument_node="">. Construction of the 1st State Bearing Plant in Moscow, which was designed by Kahn, was carried out with the technical assistance of the Italian company RIV.
</span></p><p data-dcnode-id="3115"><span data-dcnode-id="3119" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="3117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stalingrad_Tractor_Plant" title="Stalingrad Tractor Plant"><span data-dcnode-id="3118" instrument_node="">Stalingrad Tractor Plant</span></a><span data-dcnode-id="3116" instrument_node="">, designed by Kahn in 1930, was originally built in the United States, and then was unmounted, transported to the Soviet Union and assembled under the supervision of American engineers. It was equipped with the equipment of more than 80 American engineering companies and several German firms.
</span></p><p data-dcnode-id="3103"><span data-dcnode-id="3114" instrument_node="">American hydrobuilder Hugh Cooper became the chief consultant for the construction of the </span><a class="mw-redirect" data-dcnode-id="3112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DneproGES" title="DneproGES"><span data-dcnode-id="3113" instrument_node="">DneproGES</span></a><span data-dcnode-id="3111" instrument_node="">, hydro turbines for which were purchased from </span><a data-dcnode-id="3109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Electric" title="General Electric"><span data-dcnode-id="3110" instrument_node="">General Electric</span></a><span data-dcnode-id="3108" instrument_node=""> and Newport News Shipbuilding.</span><sup class="reference" data-dcnode-id="3105" id="cite_ref-25"><a data-dcnode-id="3106" href="#cite_note-25"><span data-dcnode-id="3107" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3104" instrument_node="">
</span></p><p data-dcnode-id="3091"><span data-dcnode-id="3102" instrument_node="">The </span><a data-dcnode-id="3100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnitogorsk_Iron_and_Steel_Works" title="Magnitogorsk Iron and Steel Works"><span data-dcnode-id="3101" instrument_node="">Magnitogorsk Metallurgical Plant</span></a><span data-dcnode-id="3099" instrument_node=""> was designed by the American firm Arthur G. McKee and Co., which also supervised its construction. A standard </span><a data-dcnode-id="3097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blast_furnace" title="Blast furnace"><span data-dcnode-id="3098" instrument_node="">blast furnace</span></a><span data-dcnode-id="3096" instrument_node=""> for this and all other steel mills of the industrialisation period was developed by the Chicago-based Freyn Engineering Co.</span><sup class="reference" data-dcnode-id="3093" id="cite_ref-26"><a data-dcnode-id="3094" href="#cite_note-26"><span data-dcnode-id="3095" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3092" instrument_node="">
</span></p><span data-dcnode-id="3090" instrument_node="">

</span><p data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">At the end of 1932, the successful and early implementation of the first five-year plan for four years and three months was announced. Summarizing its results, Stalin announced that heavy industry had fulfilled the plan by 108%. During the period between October 1, 1928 and January 1, 1933, the production fixed assets of heavy industry increased by 2.7 times.
