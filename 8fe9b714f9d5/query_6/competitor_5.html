</span><p data-dcnode-id="2704"><span data-dcnode-id="2708" instrument_node="">Following the first five-year plan, the second five-year plan followed, with a somewhat lower emphasis on industrialisation, and then the third five-year plan, which was thwarted by the outbreak of </span><a data-dcnode-id="2706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="2707" instrument_node="">World War II</span></a><span data-dcnode-id="2705" instrument_node="">.
</span></p><p data-dcnode-id="2677"><span data-dcnode-id="2703" instrument_node="">The result of the first five-year plans was the development of heavy industry, thanks to which the increase in </span><a data-dcnode-id="2701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gross_domestic_product" title="Gross domestic product"><span data-dcnode-id="2702" instrument_node="">gross domestic product</span></a><span data-dcnode-id="2700" instrument_node=""> during 1928–40, according to Vitaly Melyantsev, was about 4.6% per year (according to other, earlier estimates, from 3% to 6.3%).</span><sup class="reference" data-dcnode-id="2697" id="cite_ref-Meliyantsev_29-0"><a data-dcnode-id="2698" href="#cite_note-Meliyantsev-29"><span data-dcnode-id="2699" instrument_node="">[29]</span></a></sup><sup class="reference" data-dcnode-id="2694" id="cite_ref-GDP_CRU_30-0"><a data-dcnode-id="2695" href="#cite_note-GDP_CRU-30"><span data-dcnode-id="2696" instrument_node="">[30]</span></a></sup><span data-dcnode-id="2693" instrument_node=""> Industrial production in the period 1928–1937 increased 2.5–3.5 times, that is, 10.5–16% per year.</span><sup class="reference" data-dcnode-id="2690" id="cite_ref-Wheatcroft_31-0"><a data-dcnode-id="2691" href="#cite_note-Wheatcroft-31"><span data-dcnode-id="2692" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2689" instrument_node=""> In particular, the release of machinery in the period 1928–1937 grew on average 27.4% per year.</span><sup class="reference" data-dcnode-id="2686" id="cite_ref-Moorsteen_32-0"><a data-dcnode-id="2687" href="#cite_note-Moorsteen-32"><span data-dcnode-id="2688" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2685" instrument_node=""> From 1930 to 1940, the number of higher and secondary technical educational institutions in the Soviet Union increased 4 times and exceeded 150.</span><sup class="reference" data-dcnode-id="2682" id="cite_ref-PetrovskyII_18-1"><a data-dcnode-id="2683" href="#cite_note-PetrovskyII-18"><span data-dcnode-id="2684" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="2679" id="cite_ref-33"><a data-dcnode-id="2680" href="#cite_note-33"><span data-dcnode-id="2681" instrument_node="">[33]</span></a></sup><span data-dcnode-id="2678" instrument_node="">
</span></p><p data-dcnode-id="2646"><span data-dcnode-id="2676" instrument_node="">By 1941, about 9,000 new plants were built.</span><sup class="reference" data-dcnode-id="2673" id="cite_ref-Lelchuk_34-0"><a data-dcnode-id="2674" href="#cite_note-Lelchuk-34"><span data-dcnode-id="2675" instrument_node="">[34]</span></a></sup><span data-dcnode-id="2672" instrument_node=""> By the end of the second five-year plan, the Soviet Union took the second place in the world in industrial output, second only to the United States.</span><sup class="reference" data-dcnode-id="2669" id="cite_ref-Lelchuk_34-1"><a data-dcnode-id="2670" href="#cite_note-Lelchuk-34"><span data-dcnode-id="2671" instrument_node="">[34]</span></a></sup><span data-dcnode-id="2668" instrument_node=""> Imports fell sharply, which was viewed as the country's gaining economic independence. Open </span><a data-dcnode-id="2666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unemployment" title="Unemployment"><span data-dcnode-id="2667" instrument_node="">unemployment</span></a><span data-dcnode-id="2665" instrument_node=""> had been eliminated. Employment (at full rates) increased from one third of the population in 1928 to 45% in 1940, which provided about half of the growth of the </span><a data-dcnode-id="2663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gross_national_income" title="Gross national income"><span data-dcnode-id="2664" instrument_node="">gross national product</span></a><span data-dcnode-id="2662" instrument_node="">.</span><sup class="reference" data-dcnode-id="2659" id="cite_ref-Harrison-98_35-0"><a data-dcnode-id="2660" href="#cite_note-Harrison-98-35"><span data-dcnode-id="2661" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2658" instrument_node=""> For the period 1928–1937 universities and colleges prepared about two million specialists. Many new technologies were mastered. Thus, it was only during the first five-year period that the production of synthetic rubber, motorcycles, watches, cameras, excavators, high-quality cement and high-quality steel grades was adjusted.</span><sup class="reference" data-dcnode-id="2655" id="cite_ref-Wheatcroft_31-1"><a data-dcnode-id="2656" href="#cite_note-Wheatcroft-31"><span data-dcnode-id="2657" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2654" instrument_node=""> The foundation was also laid for Soviet </span><a data-dcnode-id="2652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Science" title="Science"><span data-dcnode-id="2653" instrument_node="">science</span></a><span data-dcnode-id="2651" instrument_node="">, which in certain areas eventually became world-leading. On the basis of the established industrial base, it became possible to conduct a large-scale re-equipment of the army; during the first five-year plan, defense spending rose to 10.8% of the budget.</span><sup class="reference" data-dcnode-id="2648" id="cite_ref-Harrison_36-0"><a data-dcnode-id="2649" href="#cite_note-Harrison-36"><span data-dcnode-id="2650" instrument_node="">[36]</span></a></sup><span data-dcnode-id="2647" instrument_node="">
</span></p><p data-dcnode-id="2626"><span data-dcnode-id="2645" instrument_node="">With the onset of industrialisation, the consumption fund, and as a result, the </span><a data-dcnode-id="2643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standard_of_living" title="Standard of living"><span data-dcnode-id="2644" instrument_node="">standard of living</span></a><span data-dcnode-id="2642" instrument_node=""> of the population, has sharply decreased.</span><sup class="reference" data-dcnode-id="2639" id="cite_ref-Allen-97_37-0"><a data-dcnode-id="2640" href="#cite_note-Allen-97-37"><span data-dcnode-id="2641" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2638" instrument_node=""> By the end of 1929, the </span><a data-dcnode-id="2636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ration_stamp" title="Ration stamp"><span data-dcnode-id="2637" instrument_node="">rationing system</span></a><span data-dcnode-id="2635" instrument_node=""> was extended to almost all food products, but the shortage of rations was still there, and there were long queues to buy them. In the future, the standard of living began to improve. In 1936, the cards were canceled, which was accompanied by an increase in wages in the industrial sector and an even greater increase in state rations prices for all goods. The average level of per capita consumption in 1938 was 22% higher than in 1928.</span><sup class="reference" data-dcnode-id="2632" id="cite_ref-Allen-97_37-1"><a data-dcnode-id="2633" href="#cite_note-Allen-97-37"><span data-dcnode-id="2634" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2631" instrument_node=""> However, the greatest growth was among the party and labor elite and did not at all touch the overwhelming majority of the rural population, or more than half of the country's population.</span><sup class="reference" data-dcnode-id="2628" id="cite_ref-Allen-97_37-2"><a data-dcnode-id="2629" href="#cite_note-Allen-97-37"><span data-dcnode-id="2630" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2627" instrument_node="">

</span></caption><thead data-dcnode-id="2602"><tr data-dcnode-id="2603"><th class="headerSort" data-dcnode-id="2613" role="columnheader button" tabindex="0" title="Sort ascending"><span data-dcnode-id="2614" instrument_node="">Products</span></th><th class="headerSort" data-dcnode-id="2610" role="columnheader button" tabindex="0" title="Sort ascending"><span data-dcnode-id="2611" instrument_node="">1913</span></th><th class="headerSort" data-dcnode-id="2607" role="columnheader button" tabindex="0" title="Sort ascending"><span data-dcnode-id="2608" instrument_node="">1940</span></th><th class="headerSort" data-dcnode-id="2604" role="columnheader button" tabindex="0" title="Sort ascending"><span data-dcnode-id="2605" instrument_node="">1940 to 1913 (%)

</span><p data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">The end date of industrialisation is determined by different historians in different ways. From the point of view of the conceptual aspiration to raise heavy industry in record time, the first five-year plan was the most pronounced period. Most often, the end of industrialisation is understood as the last pre-war year (1940), less often the year before Stalin's death (1952). If industrialisation is understood as a process whose goal is the share of industry in the gross domestic product, characteristic of industrialised countries, then the economy of the Soviet Union reached such a state only in the 1960s. One should also take into account the social aspect of industrialisation, since it was only in the early 1960s urban population exceeded rural.
</span></p><p data-dcnode-id="2562"><span data-dcnode-id="2567" instrument_node="">Professor Nikolai Kolesov believes that without the implementation of the industrialisation policy, the political and economic independence of the country would not have been ensured.</span><sup class="reference" data-dcnode-id="2564" id="cite_ref-Kolesov_38-0"><a data-dcnode-id="2565" href="#cite_note-Kolesov-38"><span data-dcnode-id="2566" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2563" instrument_node=""> Sources of funds for industrialisation and its pace were predetermined by economic backwardness and too short a period allowed for its liquidation. According to Kolesov, the Soviet Union managed to eliminate the backwardness in just 13 years.
</span></p><span data-dcnode-id="2561" instrument_node="">
</span><h2 data-dcnode-id="2551"><span class="mw-headline" data-dcnode-id="2559" id="Criticism"><span data-dcnode-id="2560" instrument_node="">Criticism</span></span><span class="mw-editsection" data-dcnode-id="2552"><span class="mw-editsection-bracket" data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">[</span></span><a data-dcnode-id="2555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DIndustrialization_in_the_Soviet_Union%26action%3Dedit%26section%3D7" title="Edit section: Criticism"><span data-dcnode-id="2556" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2550" instrument_node="">
</span><p data-dcnode-id="2516"><span data-dcnode-id="2549" instrument_node="">During the years of Soviet power, the Communists argued that the basis of industrialisation was a rational and achievable plan.</span><sup class="reference" data-dcnode-id="2546" id="cite_ref-EB_39-0"><a data-dcnode-id="2547" href="#cite_note-EB-39"><span data-dcnode-id="2548" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2545" instrument_node=""> Meanwhile, it was supposed that the first five-year plan would come into effect at the end of 1928, but even by the time of its announcement in April–May 1929, the work on its compilation was not completed. The initial form of the plan included goals for 50 industries and agriculture, as well as the relationship between resources and opportunities. Over time, the achievement of predetermined indicators began to play a major role. If the growth rates of industrial production originally set in terms of were 18–20%, by the end of the year they were doubled. Western and Russian researchers argue that despite the report on the successful implementation of the first five-year plan, the </span><a data-dcnode-id="2543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Statistics" title="Statistics"><span data-dcnode-id="2544" instrument_node="">statistics</span></a><span data-dcnode-id="2542" instrument_node=""> were falsified,</span><sup class="reference" data-dcnode-id="2539" id="cite_ref-Lelchuk_34-2"><a data-dcnode-id="2540" href="#cite_note-Lelchuk-34"><span data-dcnode-id="2541" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="2536" id="cite_ref-EB_39-1"><a data-dcnode-id="2537" href="#cite_note-EB-39"><span data-dcnode-id="2538" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2535" instrument_node=""> and none of the goals were achieved even closely.</span><sup class="reference" data-dcnode-id="2532" id="cite_ref-failure_40-0"><a data-dcnode-id="2533" href="#cite_note-failure-40"><span data-dcnode-id="2534" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2531" instrument_node=""> Moreover, in agriculture and in industries dependent on agriculture, there was a sharp decline.</span><sup class="reference" data-dcnode-id="2528" id="cite_ref-Wheatcroft_31-2"><a data-dcnode-id="2529" href="#cite_note-Wheatcroft-31"><span data-dcnode-id="2530" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="2525" id="cite_ref-Lelchuk_34-3"><a data-dcnode-id="2526" href="#cite_note-Lelchuk-34"><span data-dcnode-id="2527" instrument_node="">[34]</span></a></sup><span data-dcnode-id="2524" instrument_node=""> Part of the party nomenclature was extremely outraged by this, for example, </span><a data-dcnode-id="2522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sergey_Syrtsov_%28politician%29" title="Sergey Syrtsov (politician)"><span data-dcnode-id="2523" instrument_node="">Sergey Syrtsov</span></a><span data-dcnode-id="2521" instrument_node=""> described the reports on the achievements as "fraud".</span><sup class="reference" data-dcnode-id="2518" id="cite_ref-EB_39-2"><a data-dcnode-id="2519" href="#cite_note-EB-39"><span data-dcnode-id="2520" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2517" instrument_node="">
</span></p><p data-dcnode-id="2471"><span data-dcnode-id="2515" instrument_node="">On the contrary, according to </span><a data-dcnode-id="2513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Brutskus" title="Boris Brutskus"><span data-dcnode-id="2514" instrument_node="">Boris Brutskus</span></a><span data-dcnode-id="2512" instrument_node="">, it was poorly thought out, which manifested itself in a series of announced "fractures" (April–May 1929, January–February 1930, June 1931). A grandiose and thoroughly politicised system emerged, the characteristic features of which were economic "gigantomania", chronic commodity hunger, organisational problems, wastefulness, and loss-making enterprises.</span><sup class="reference" data-dcnode-id="2509" id="cite_ref-Bruzkus_41-0"><a data-dcnode-id="2510" href="#cite_note-Bruzkus-41"><span data-dcnode-id="2511" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2508" instrument_node=""> The goal (that is, the plan) began to determine the means for its implementation. According to the findings of other historians (</span><a data-dcnode-id="2506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Conquest" title="Robert Conquest"><span data-dcnode-id="2507" instrument_node="">Robert Conquest</span></a><span data-dcnode-id="2505" instrument_node="">, </span><a data-dcnode-id="2503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Pipes" title="Richard Pipes"><span data-dcnode-id="2504" instrument_node="">Richard Pipes</span></a><span data-dcnode-id="2502" instrument_node="">, etc.), the neglect of material support and the development of infrastructure over time began to cause significant economic damage.</span><sup class="reference" data-dcnode-id="2499" id="cite_ref-EB_39-3"><a data-dcnode-id="2500" href="#cite_note-EB-39"><span data-dcnode-id="2501" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2498" instrument_node=""> Some of the industrialisation endeavors are considered by critics to have been poorly thought out from the start. </span><a data-dcnode-id="2496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacques_Rossi" title="Jacques Rossi"><span data-dcnode-id="2497" instrument_node="">Jacques Rossi</span></a><span data-dcnode-id="2495" instrument_node=""> argues that the </span><a data-dcnode-id="2493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_Sea%25E2%2580%2593Baltic_Canal" title="White Sea–Baltic Canal"><span data-dcnode-id="2494" instrument_node="">White Sea–Baltic Canal</span></a><span data-dcnode-id="2492" instrument_node=""> was unnecessary.</span><sup class="reference" data-dcnode-id="2489" id="cite_ref-42"><a data-dcnode-id="2490" href="#cite_note-42"><span data-dcnode-id="2491" instrument_node="">[42]</span></a></sup><span data-dcnode-id="2488" instrument_node=""> At the same time, according to Soviet statistics, already in 1933, 1.143 million tons of cargo and 27,000 passengers were transported along the canal;</span><sup class="reference" data-dcnode-id="2485" id="cite_ref-43"><a data-dcnode-id="2486" href="#cite_note-43"><span data-dcnode-id="2487" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2484" instrument_node=""> in 1940, about one million tons,</span><sup class="reference" data-dcnode-id="2481" id="cite_ref-44"><a data-dcnode-id="2482" href="#cite_note-44"><span data-dcnode-id="2483" instrument_node="">[44]</span></a></sup><span data-dcnode-id="2480" instrument_node=""> and in 1985, 7.3 million tons of cargo.</span><sup class="reference" data-dcnode-id="2477" id="cite_ref-45"><a data-dcnode-id="2478" href="#cite_note-45"><span data-dcnode-id="2479" instrument_node="">[45]</span></a></sup><span data-dcnode-id="2476" instrument_node=""> However, the incredibly brutal conditions in the building of the canal resulted in the death of up to 25,000 able-bodied working-age Soviet citizens.</span><sup class="reference" data-dcnode-id="2473" id="cite_ref-Anne_Applebaum_Gulag_2003_p79_46-0"><a data-dcnode-id="2474" href="#cite_note-Anne_Applebaum_Gulag_2003_p79-46"><span data-dcnode-id="2475" instrument_node="">[46]</span></a></sup><span data-dcnode-id="2472" instrument_node=""> This not only deprived the Soviet Union of their labor but reduced the pool of manpower for military service to counter Nazi German aggression only eight years later. when Hitler broke the Stalin-Hitler alliance.  
</span></p><p data-dcnode-id="2399"><span data-dcnode-id="2470" instrument_node="">Despite the development of output, industrialisation was carried out mainly by extensive methods: </span><a data-dcnode-id="2468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_growth" title="Economic growth"><span data-dcnode-id="2469" instrument_node="">economic growth</span></a><span data-dcnode-id="2467" instrument_node=""> was ensured by an increase in the gross capital formation rate in </span><a data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fixed_capital" title="Fixed capital"><span data-dcnode-id="2466" instrument_node="">fixed capital</span></a><span data-dcnode-id="2464" instrument_node="">, a savings rate (due to a fall in the </span><a data-dcnode-id="2462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consumption_%28economics%29" title="Consumption (economics)"><span data-dcnode-id="2463" instrument_node="">consumption</span></a><span data-dcnode-id="2461" instrument_node=""> rate), employment rates and the exploitation of </span><a data-dcnode-id="2459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_resource" title="Natural resource"><span data-dcnode-id="2460" instrument_node="">natural resources</span></a><span data-dcnode-id="2458" instrument_node="">.</span><sup class="reference" data-dcnode-id="2455" id="cite_ref-Fischer_47-0"><a data-dcnode-id="2456" href="#cite_note-Fischer-47"><span data-dcnode-id="2457" instrument_node="">[47]</span></a></sup><span data-dcnode-id="2454" instrument_node=""> British scientist Don Filzer believes that this was due to the fact that as a result of </span><a data-dcnode-id="2452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collectivization_in_the_Soviet_Union" title="Collectivization in the Soviet Union"><span data-dcnode-id="2453" instrument_node="">collectivisation</span></a><span data-dcnode-id="2451" instrument_node=""> and a sharp decline in the standard of living of the rural population, human labor was greatly devalued.</span><sup class="reference" data-dcnode-id="2448" id="cite_ref-Filtzer_48-0"><a data-dcnode-id="2449" href="#cite_note-Filtzer-48"><span data-dcnode-id="2450" instrument_node="">[48]</span></a></sup><span data-dcnode-id="2447" instrument_node=""> </span><a data-dcnode-id="2445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vadim_Rogovin" title="Vadim Rogovin"><span data-dcnode-id="2446" instrument_node="">Vadim Rogovin</span></a><span data-dcnode-id="2444" instrument_node=""> notes that the desire to fulfill the plan led to a situation of overstretching forces and a permanent search for reasons to justify the non-fulfillment of excessive tasks.</span><sup class="reference" data-dcnode-id="2441" id="cite_ref-Rogovin_Alternativa_49-0"><a data-dcnode-id="2442" href="#cite_note-Rogovin_Alternativa-49"><span data-dcnode-id="2443" instrument_node="">[49]</span></a></sup><span data-dcnode-id="2440" instrument_node=""> Because of this, industrialisation could not feed solely on enthusiasm and demanded a series of compulsory measures.</span><sup class="reference" data-dcnode-id="2437" id="cite_ref-EB_39-4"><a data-dcnode-id="2438" href="#cite_note-EB-39"><span data-dcnode-id="2439" instrument_node="">[39]</span></a></sup><sup class="reference" data-dcnode-id="2434" id="cite_ref-Rogovin_Alternativa_49-1"><a data-dcnode-id="2435" href="#cite_note-Rogovin_Alternativa-49"><span data-dcnode-id="2436" instrument_node="">[49]</span></a></sup><span data-dcnode-id="2433" instrument_node=""> Since October 1930, the free movement of </span><a data-dcnode-id="2431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_power" title="Labour power"><span data-dcnode-id="2432" instrument_node="">labor</span></a><span data-dcnode-id="2430" instrument_node=""> was prohibited and criminal penalties were imposed for violations of labor discipline and negligence. Since 1931, workers had become responsible for damage to equipment.</span><sup class="reference" data-dcnode-id="2427" id="cite_ref-EB_39-5"><a data-dcnode-id="2428" href="#cite_note-EB-39"><span data-dcnode-id="2429" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2426" instrument_node=""> In 1932 the forced transfer of labor between enterprises became possible and the </span><a data-dcnode-id="2424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_punishment" title="Capital punishment"><span data-dcnode-id="2425" instrument_node="">death penalty</span></a><span data-dcnode-id="2423" instrument_node=""> was introduced for the theft of state property. On December 27, 1932, an internal </span><a data-dcnode-id="2421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Passport" title="Passport"><span data-dcnode-id="2422" instrument_node="">passport</span></a><span data-dcnode-id="2420" instrument_node=""> was restored, which </span><a class="mw-redirect" data-dcnode-id="2418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lenin" title="Lenin"><span data-dcnode-id="2419" instrument_node="">Lenin</span></a><span data-dcnode-id="2417" instrument_node=""> at one time condemned as "czarist backwardness and despotism". The seven-day week was replaced by a full working week, the days of which, without names, were numbered from 1 to 5. On every sixth day, there was a day off for work shifts, so that factories could work without interruption. Prisoners' labor was actively used (see </span><a data-dcnode-id="2415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gulag" title="Gulag"><span data-dcnode-id="2416" instrument_node="">Gulag</span></a><span data-dcnode-id="2414" instrument_node="">). In fact, during the first five-year plan the communists laid the foundations of forced labor for the Soviet population.</span><sup class="reference" data-dcnode-id="2411" id="cite_ref-Alexandrov_50-0"><a data-dcnode-id="2412" href="#cite_note-Alexandrov-50"><span data-dcnode-id="2413" instrument_node="">[50]</span></a></sup><span data-dcnode-id="2410" instrument_node=""> All this became the subject of sharp criticism in democratic countries, and not only by the </span><a data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberalism" title="Liberalism"><span data-dcnode-id="2409" instrument_node="">liberals</span></a><span data-dcnode-id="2407" instrument_node="">, but also by the </span><a data-dcnode-id="2405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_democracy" title="Social democracy"><span data-dcnode-id="2406" instrument_node="">social democrats</span></a><span data-dcnode-id="2404" instrument_node="">.</span><sup class="reference" data-dcnode-id="2401" id="cite_ref-51"><a data-dcnode-id="2402" href="#cite_note-51"><span data-dcnode-id="2403" instrument_node="">[51]</span></a></sup><span data-dcnode-id="2400" instrument_node="">
</span></p><p data-dcnode-id="2387"><span data-dcnode-id="2398" instrument_node="">Workers' discontent from time to time turned into strikes:</span><sup class="reference" data-dcnode-id="2395" id="cite_ref-52"><a data-dcnode-id="2396" href="#cite_note-52"><span data-dcnode-id="2397" instrument_node="">[52]</span></a></sup><sup class="reference" data-dcnode-id="2392" id="cite_ref-53"><a data-dcnode-id="2393" href="#cite_note-53"><span data-dcnode-id="2394" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="2389" id="cite_ref-54"><a data-dcnode-id="2390" href="#cite_note-54"><span data-dcnode-id="2391" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2388" instrument_node=""> at the Stalin plant, the Voroshilov plant, the Shosten plant in Ukraine, at the Krasnoye Sormovo plant near Nizhny Novgorod, at the Serp and Molot plant of Mashinootrest in Moscow, at the Chelyabinsk Traktorstroy and other enterprises.
</span></p><p data-dcnode-id="2368"><span data-dcnode-id="2386" instrument_node="">Industrialisation also entailed the </span><a data-dcnode-id="2384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collectivization_in_the_Soviet_Union" title="Collectivization in the Soviet Union"><span data-dcnode-id="2385" instrument_node="">collectivisation</span></a><span data-dcnode-id="2383" instrument_node=""> of agriculture. First of all, </span><a data-dcnode-id="2381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agriculture" title="Agriculture"><span data-dcnode-id="2382" instrument_node="">agriculture</span></a><span data-dcnode-id="2380" instrument_node=""> had become a source of primary accumulation, due to low purchase prices for grain and subsequent export at higher prices, as well as due to the so-called "super tax in the form of overpayments for manufactured goods".</span><sup class="reference" data-dcnode-id="2377" id="cite_ref-Gregory_03_55-0"><a data-dcnode-id="2378" href="#cite_note-Gregory_03-55"><span data-dcnode-id="2379" instrument_node="">[55]</span></a></sup><span data-dcnode-id="2376" instrument_node=""> In the future, the peasantry also ensured the growth of heavy industry by labor. The short-term result of this collectivisation policy was a temporary drop in agricultural production. The consequence of this was the deterioration of the economic situation of the peasantry,</span><sup class="reference" data-dcnode-id="2373" id="cite_ref-Wheatcroft_31-3"><a data-dcnode-id="2374" href="#cite_note-Wheatcroft-31"><span data-dcnode-id="2375" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2372" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_famine_of_1932%25E2%2580%25931933" title="Soviet famine of 1932–1933"><span data-dcnode-id="2371" instrument_node="">famine in the Soviet Union of 1932–33</span></a><span data-dcnode-id="2369" instrument_node="">. To compensate for the losses of the village required additional costs. In 1932–1936, the collective farms received about 500,000 tractors from the state, not only for mechanizing the cultivation of the land, but also to compensate for the damage from the reduction in the number of horses by 51% (77 million) in 1929–1933. The mechanisation of labor in agriculture and the unification of separate land plots ensured a significant increase in labor productivity.
</span></p><p data-dcnode-id="2342"><span data-dcnode-id="2367" instrument_node="">Trotsky and foreign critics argued that, despite efforts to increase labor productivity, in practice, average labor productivity fell.</span><sup class="reference" data-dcnode-id="2364" id="cite_ref-Trotsky_56-0"><a data-dcnode-id="2365" href="#cite_note-Trotsky-56"><span data-dcnode-id="2366" instrument_node="">[56]</span></a></sup><span data-dcnode-id="2363" instrument_node=""> This is stated in a number of modern publications,</span><sup class="reference" data-dcnode-id="2360" id="cite_ref-Harrison-98_35-1"><a data-dcnode-id="2361" href="#cite_note-Harrison-98-35"><span data-dcnode-id="2362" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2359" instrument_node=""> according to which for the period 1929–1932 </span><a data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Added_value" title="Added value"><span data-dcnode-id="2358" instrument_node="">value added</span></a><span data-dcnode-id="2356" instrument_node=""> per hour of work in industry fell by 60% and returned to the level of 1929 only in 1952. This is explained by the emergence in the economy of chronic commodity </span><a data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shortage" title="Shortage"><span data-dcnode-id="2355" instrument_node="">shortages</span></a><span data-dcnode-id="2353" instrument_node="">, collectivisation, </span><a class="mw-redirect" data-dcnode-id="2351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_famine_of_1932%25E2%2580%259333" title="Soviet famine of 1932–33"><span data-dcnode-id="2352" instrument_node="">mass hunger</span></a><span data-dcnode-id="2350" instrument_node="">, a massive influx of untrained workforce from the countryside and an increase in their labor resources by enterprises. At the same time, the specific </span><a data-dcnode-id="2348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gross_national_income" title="Gross national income"><span data-dcnode-id="2349" instrument_node="">gross national product</span></a><span data-dcnode-id="2347" instrument_node=""> per worker in the first 10 years of industrialisation grew by 30%.</span><sup class="reference" data-dcnode-id="2344" id="cite_ref-Harrison-98_35-2"><a data-dcnode-id="2345" href="#cite_note-Harrison-98-35"><span data-dcnode-id="2346" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2343" instrument_node="">
</span></p><p data-dcnode-id="2315"><span data-dcnode-id="2341" instrument_node="">As for the records of the Stakhanovists, a number of historians note that their methods were a continuous method of increasing productivity,</span><sup class="reference" data-dcnode-id="2338" id="cite_ref-Wren_57-0"><a data-dcnode-id="2339" href="#cite_note-Wren-57"><span data-dcnode-id="2340" instrument_node="">[57]</span></a></sup><span data-dcnode-id="2337" instrument_node=""> previously popularised by </span><a data-dcnode-id="2335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frederick_Winslow_Taylor" title="Frederick Winslow Taylor"><span data-dcnode-id="2336" instrument_node="">Frederick Taylor</span></a><span data-dcnode-id="2334" instrument_node=""> and </span><a data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Ford" title="Henry Ford"><span data-dcnode-id="2333" instrument_node="">Henry Ford</span></a><span data-dcnode-id="2331" instrument_node="">, which Lenin called the "sweatshop system". In addition, records were largely staged and were the result of the efforts of their assistants,</span><sup class="reference" data-dcnode-id="2328" id="cite_ref-Katerina_Clark_58-0"><a data-dcnode-id="2329" href="#cite_note-Katerina_Clark-58"><span data-dcnode-id="2330" instrument_node="">[58]</span></a></sup><sup class="reference" data-dcnode-id="2325" id="cite_ref-59"><a data-dcnode-id="2326" href="#cite_note-59"><span data-dcnode-id="2327" instrument_node="">[59]</span></a></sup><span data-dcnode-id="2324" instrument_node=""> and in practice turned the pursuit of quantity at the expense of product quality. Due to the fact that wages were proportional to productivity, the wages of Stakhanovists were several times higher than the average wages in industry. This caused a hostile attitude towards the Stakhanovists from the "backward" workers, who reproached them with the fact that their records lead to higher standards and lower prices.</span><sup class="reference" data-dcnode-id="2321" id="cite_ref-Rogovin_Neonep_60-0"><a data-dcnode-id="2322" href="#cite_note-Rogovin_Neonep-60"><span data-dcnode-id="2323" instrument_node="">[60]</span></a></sup><span data-dcnode-id="2320" instrument_node=""> Newspapers talked about the "unprecedented and blatant sabotage" of the Stakhanov movement by masters, shop managers, trade union organisations.</span><sup class="reference" data-dcnode-id="2317" id="cite_ref-Rogovin_Neonep_60-1"><a data-dcnode-id="2318" href="#cite_note-Rogovin_Neonep-60"><span data-dcnode-id="2319" instrument_node="">[60]</span></a></sup><span data-dcnode-id="2316" instrument_node="">
</span></p><p data-dcnode-id="2296"><span data-dcnode-id="2314" instrument_node="">The exclusion of Trotsky, Kamenev and Zinoviev from the party at the 15th Congress of the All-Union Communist Party (Bolsheviks) gave rise to a wave of repressions in the party</span><sup class="reference" data-dcnode-id="2311" id="cite_ref-61"><a data-dcnode-id="2312" href="#cite_note-61"><span data-dcnode-id="2313" instrument_node="">[61]</span></a></sup><span data-dcnode-id="2310" instrument_node=""> that spread to the technical intelligentsia and foreign technical specialists. At the July plenum of the Central Committee of the All-Union Communist Party (Bolsheviks) of 1928, Stalin advanced the thesis that "as we move forward, the resistance of the capitalist elements will increase, the class struggle will escalate". In the same year, the campaign against </span><a data-dcnode-id="2308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wrecking_%28Soviet_Union%29" title="Wrecking (Soviet Union)"><span data-dcnode-id="2309" instrument_node="">sabotage</span></a><span data-dcnode-id="2307" instrument_node=""> began. The "pests" were blamed for failing to achieve the targets of the plan. The first high-profile trial of the "pest" case was the </span><a data-dcnode-id="2305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shakhty_Trial" title="Shakhty Trial"><span data-dcnode-id="2306" instrument_node="">Shakhty Trial</span></a><span data-dcnode-id="2304" instrument_node="">, after which charges of sabotage could follow the company's failure to comply with the plan.</span><sup class="reference" data-dcnode-id="2301" id="cite_ref-Igolkin_62-0"><a data-dcnode-id="2302" href="#cite_note-Igolkin-62"><span data-dcnode-id="2303" instrument_node="">[62]</span></a></sup><sup class="reference" data-dcnode-id="2298" id="cite_ref-63"><a data-dcnode-id="2299" href="#cite_note-63"><span data-dcnode-id="2300" instrument_node="">[63]</span></a></sup><span data-dcnode-id="2297" instrument_node="">
</span></p><p data-dcnode-id="2275"><span data-dcnode-id="2295" instrument_node="">One of the main goals of forced industrialisation was to overcome the backlog from the developed capitalist countries. Some critics argue that this lag was in itself primarily a consequence of the </span><a data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/October_Revolution" title="October Revolution"><span data-dcnode-id="2294" instrument_node="">October Revolution</span></a><span data-dcnode-id="2292" instrument_node="">.</span><sup class="reference" data-dcnode-id="2289" id="cite_ref-Alexandrov_50-1"><a data-dcnode-id="2290" href="#cite_note-Alexandrov-50"><span data-dcnode-id="2291" instrument_node="">[50]</span></a></sup><span data-dcnode-id="2288" instrument_node=""> They draw attention to the fact that in 1913 Russia ranked fifth in world industrial production</span><sup class="reference" data-dcnode-id="2285" id="cite_ref-Gregory_82_64-0"><a data-dcnode-id="2286" href="#cite_note-Gregory_82-64"><span data-dcnode-id="2287" instrument_node="">[64]</span></a></sup><span data-dcnode-id="2284" instrument_node=""> and was the world leader in industrial growth with an indicator of 6.1% per year for the period 1888–1913.</span><sup class="reference" data-dcnode-id="2281" id="cite_ref-Suhara_05_65-0"><a data-dcnode-id="2282" href="#cite_note-Suhara_05-65"><span data-dcnode-id="2283" instrument_node="">[65]</span></a></sup><span data-dcnode-id="2280" instrument_node=""> However, by 1920, the level of production fell ninefold compared with 1916.</span><sup class="reference" data-dcnode-id="2277" id="cite_ref-Davies_66-0"><a data-dcnode-id="2278" href="#cite_note-Davies-66"><span data-dcnode-id="2279" instrument_node="">[66]</span></a></sup><span data-dcnode-id="2276" instrument_node="">
</span></p><p data-dcnode-id="2243"><span data-dcnode-id="2274" instrument_node="">Soviet propaganda claimed that economic growth was unprecedented.</span><sup class="reference" data-dcnode-id="2271" id="cite_ref-67"><a data-dcnode-id="2272" href="#cite_note-67"><span data-dcnode-id="2273" instrument_node="">[67]</span></a></sup><span data-dcnode-id="2270" instrument_node=""> On the other hand, in a number of modern studies, it is proved that the growth rate of gross domestic product in the Soviet Union (the above-mentioned</span><sup class="reference" data-dcnode-id="2267" id="cite_ref-Meliyantsev_29-1"><a data-dcnode-id="2268" href="#cite_note-Meliyantsev-29"><span data-dcnode-id="2269" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2266" instrument_node=""> 3–6.3%) were comparable with the similar figures in </span><a data-dcnode-id="2264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi_Germany" title="Nazi Germany"><span data-dcnode-id="2265" instrument_node="">Germany</span></a><span data-dcnode-id="2263" instrument_node=""> in 1930–38 (4.4%) and </span><a data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japan" title="Japan"><span data-dcnode-id="2262" instrument_node="">Japan</span></a><span data-dcnode-id="2260" instrument_node=""> (6.3%), although they were significantly superior to those of countries such as </span><a data-dcnode-id="2258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="2259" instrument_node="">United Kingdom</span></a><span data-dcnode-id="2257" instrument_node="">, </span><a data-dcnode-id="2255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Third_Republic" title="French Third Republic"><span data-dcnode-id="2256" instrument_node="">France</span></a><span data-dcnode-id="2254" instrument_node=""> and the </span><a data-dcnode-id="2252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="2253" instrument_node="">United States</span></a><span data-dcnode-id="2251" instrument_node=""> that were experiencing the </span><a data-dcnode-id="2249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Depression" title="Great Depression"><span data-dcnode-id="2250" instrument_node="">Great Depression</span></a><span data-dcnode-id="2248" instrument_node=""> at that time.</span><sup class="reference" data-dcnode-id="2245" id="cite_ref-Maddison_68-0"><a data-dcnode-id="2246" href="#cite_note-Maddison-68"><span data-dcnode-id="2247" instrument_node="">[68]</span></a></sup><span data-dcnode-id="2244" instrument_node="">
</span></p><p data-dcnode-id="2226"><span data-dcnode-id="2242" instrument_node="">For the Soviet Union of that period, </span><a data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Authoritarianism" title="Authoritarianism"><span data-dcnode-id="2241" instrument_node="">authoritarianism</span></a><span data-dcnode-id="2239" instrument_node=""> and central planning in the economy were characteristic. At first glance, this gives weight to the popular belief that the high rates of increasing industrial output of the Soviet Union were obliged to the authoritarian regime and planned economy. However, a number of economists believe that the growth of the Soviet economy was achieved only due to its extensive nature.</span><sup class="reference" data-dcnode-id="2236" id="cite_ref-Fischer_47-1"><a data-dcnode-id="2237" href="#cite_note-Fischer-47"><span data-dcnode-id="2238" instrument_node="">[47]</span></a></sup><span data-dcnode-id="2235" instrument_node=""> As part of counterfactual historical studies, or so-called "virtual scenarios",</span><sup class="reference" data-dcnode-id="2232" id="cite_ref-69"><a data-dcnode-id="2233" href="#cite_note-69"><span data-dcnode-id="2234" instrument_node="">[69]</span></a></sup><span data-dcnode-id="2231" instrument_node=""> it was suggested that, if the New Economic Policy were preserved, industrialisation and rapid economic growth would also be possible.</span><sup class="reference" data-dcnode-id="2228" id="cite_ref-Allen_70-0"><a data-dcnode-id="2229" href="#cite_note-Allen-70"><span data-dcnode-id="2230" instrument_node="">[70]</span></a></sup><span data-dcnode-id="2227" instrument_node="">
</span></p><p data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">During the years of industrialisation in the Soviet Union there was an average population growth of 1% per year, while in England it was 0.36%, the USA was 0.6%, and in France it was 0.11%.
</span></p><span data-dcnode-id="2223" instrument_node="">
</span><h2 data-dcnode-id="2213"><span class="mw-headline" data-dcnode-id="2221" id="Industrialisation_and_the_Great_Patriotic_War"><span data-dcnode-id="2222" instrument_node="">Industrialisation and the Great Patriotic War</span></span><span class="mw-editsection" data-dcnode-id="2214"><span class="mw-editsection-bracket" data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">[</span></span><a data-dcnode-id="2217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DIndustrialization_in_the_Soviet_Union%26action%3Dedit%26section%3D8" title="Edit section: Industrialisation and the Great Patriotic War"><span data-dcnode-id="2218" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2212" instrument_node="">
</span><p data-dcnode-id="2194"><span data-dcnode-id="2211" instrument_node="">One of the main goals of industrialisation was building up the military potential of the Soviet Union. So, if as of January 1, 1932, there were 1,446 tanks and 213 armored vehicles in the </span><a data-dcnode-id="2209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Army" title="Red Army"><span data-dcnode-id="2210" instrument_node="">Red Army</span></a><span data-dcnode-id="2208" instrument_node="">, then as of January 1, 1934—7574 tanks and 326 armored vehicles—more than in the armies of </span><a data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="2207" instrument_node="">United Kingdom</span></a><span data-dcnode-id="2205" instrument_node="">, </span><a data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Third_Republic" title="French Third Republic"><span data-dcnode-id="2204" instrument_node="">France</span></a><span data-dcnode-id="2202" instrument_node=""> and </span><a data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi_Germany" title="Nazi Germany"><span data-dcnode-id="2201" instrument_node="">Nazi Germany</span></a><span data-dcnode-id="2199" instrument_node=""> combined.</span><sup class="reference" data-dcnode-id="2196" id="cite_ref-Alexandrov_50-2"><a data-dcnode-id="2197" href="#cite_note-Alexandrov-50"><span data-dcnode-id="2198" instrument_node="">[50]</span></a></sup><span data-dcnode-id="2195" instrument_node="">
</span></p><p data-dcnode-id="2185"><span data-dcnode-id="2193" instrument_node="">The relationship between industrialisation and the victory of the Soviet Union over Nazi Germany in the "</span><a data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Front_%28World_War_II%29" title="Eastern Front (World War II)"><span data-dcnode-id="2192" instrument_node="">Great Patriotic War</span></a><span data-dcnode-id="2190" instrument_node="">" is a matter of debate. In Soviet times, the view was adopted that industrialisation and pre-war rearmament played a decisive role in the victory. However, the superiority of Soviet technology over the German one on the western border of the country on the eve of the war</span><sup class="reference" data-dcnode-id="2187" id="cite_ref-Meltyuhov_71-0"><a data-dcnode-id="2188" href="#cite_note-Meltyuhov-71"><span data-dcnode-id="2189" instrument_node="">[71]</span></a></sup><span data-dcnode-id="2186" instrument_node=""> could not stop the enemy.
</span></p><p data-dcnode-id="2169"><span data-dcnode-id="2184" instrument_node="">According to the historian Konstantin Nikitenko,</span><sup class="reference" data-dcnode-id="2181" id="cite_ref-Nikitenko_72-0"><a data-dcnode-id="2182" href="#cite_note-Nikitenko-72"><span data-dcnode-id="2183" instrument_node="">[72]</span></a></sup><span data-dcnode-id="2180" instrument_node=""> the command-administrative system that was built up nullified the economic contribution of industrialisation to the country's defense capability. Vitaly Lelchuk also draws attention to the fact that by the beginning of the winter of 1941 the territory was occupied, where before the war 42% of the population of the Soviet Union lived, 63% of coal were mined, 68% of pig iron smelted, etc.</span><sup class="reference" data-dcnode-id="2177" id="cite_ref-Lelchuk_34-4"><a data-dcnode-id="2178" href="#cite_note-Lelchuk-34"><span data-dcnode-id="2179" instrument_node="">[34]</span></a></sup><span data-dcnode-id="2176" instrument_node=""> Lelchuk notes that "Victory had to be forged not with the help of the powerful potential that was created during the years of accelerated industrialisation". The material and technical base of such giants built during the years of industrialisation, such as </span><a data-dcnode-id="2174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Kramatorsk_Machinebuilding_Factory" title="New Kramatorsk Machinebuilding Factory"><span data-dcnode-id="2175" instrument_node="">Novokramatorsk</span></a><span data-dcnode-id="2173" instrument_node=""> and Makeevka metallurgical plants, </span><a class="mw-redirect" data-dcnode-id="2171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DneproGES" title="DneproGES"><span data-dcnode-id="2172" instrument_node="">DneproGES</span></a><span data-dcnode-id="2170" instrument_node="">, etc., was at the disposal of the invaders.
</span></p><p data-dcnode-id="2163"><span data-dcnode-id="2168" instrument_node="">But supporters of the Soviet point of view object that industrialisation most affected the Urals and Siberia, while pre-revolutionary industry turned out to be in the occupied territories. They also indicate that the prepared evacuation of industrial equipment to the regions of the Urals, the Volga region, Siberia and Central Asia played a significant role. In the first three months of the war alone, 1,360 large (mostly military) enterprises were displaced.</span><sup class="reference" data-dcnode-id="2165" id="cite_ref-mil.ru_73-0"><a data-dcnode-id="2166" href="#cite_note-mil.ru-73"><span data-dcnode-id="2167" instrument_node="">[73]</span></a></sup><span data-dcnode-id="2164" instrument_node="">
</span></p><span data-dcnode-id="2162" instrument_node="">
</span><h2 data-dcnode-id="2152"><span class="mw-headline" data-dcnode-id="2160" id="Quality_of_goods"><span data-dcnode-id="2161" instrument_node="">Quality of goods</span></span><span class="mw-editsection" data-dcnode-id="2153"><span class="mw-editsection-bracket" data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">[</span></span><a data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DIndustrialization_in_the_Soviet_Union%26action%3Dedit%26section%3D9" title="Edit section: Quality of goods"><span data-dcnode-id="2157" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2151" instrument_node="">
</span><p data-dcnode-id="2143"><a data-dcnode-id="2149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andr%25C3%25A9_Gide" title="André Gide"><span data-dcnode-id="2150" instrument_node="">André Gide</span></a><span data-dcnode-id="2148" instrument_node="">, who visited the Soviet Union in 1936, recalled that before opening stores lined up hundreds of people in length.</span><sup class="reference" data-dcnode-id="2145" id="cite_ref-Gide_74-0"><a data-dcnode-id="2146" href="#cite_note-Gide-74"><span data-dcnode-id="2147" instrument_node="">[74]</span></a></sup><span data-dcnode-id="2144" instrument_node=""> At the same time, the goods, with rare exceptions, were "completely unfit".
