itle="Discuss this template"><span data-dcnode-id="4890" instrument_node="">t</span></abbr></a></li><li class="nv-edit" data-dcnode-id="4883"><a class="external text" data-dcnode-id="4884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3ACulture_of_the_Soviet_Union%26action%3Dedit"><abbr data-dcnode-id="4885" title="Edit this template"><span data-dcnode-id="4886" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table><span data-dcnode-id="4876" instrument_node="">
</span><p data-dcnode-id="4833"><span data-dcnode-id="4875" instrument_node="">The </span><a data-dcnode-id="4873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="4874" instrument_node="">Soviet Union</span></a><span data-dcnode-id="4872" instrument_node=""> was established by the </span><a data-dcnode-id="4870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bolsheviks" title="Bolsheviks"><span data-dcnode-id="4871" instrument_node="">Bolsheviks</span></a><span data-dcnode-id="4869" instrument_node=""> in 1922, in place of the </span><a data-dcnode-id="4867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Empire" title="Russian Empire"><span data-dcnode-id="4868" instrument_node="">Russian Empire</span></a><span data-dcnode-id="4866" instrument_node="">. At the time of the </span><a class="mw-redirect" data-dcnode-id="4864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_revolution" title="Russian revolution"><span data-dcnode-id="4865" instrument_node="">1917 Revolution</span></a><span data-dcnode-id="4863" instrument_node="">, the </span><a data-dcnode-id="4861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Orthodox_Church" title="Russian Orthodox Church"><span data-dcnode-id="4862" instrument_node="">Russian Orthodox Church</span></a><span data-dcnode-id="4860" instrument_node=""> was deeply integrated into the </span><a data-dcnode-id="4858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autocracy" title="Autocracy"><span data-dcnode-id="4859" instrument_node="">autocratic state</span></a><span data-dcnode-id="4857" instrument_node="">, enjoying official status. This was a significant factor that contributed to the Bolshevik attitude to religion and the steps they took to control it.</span><sup class="reference" data-dcnode-id="4854" id="cite_ref-PoU_1-0"><a data-dcnode-id="4855" href="#cite_note-PoU-1"><span data-dcnode-id="4856" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4853" instrument_node="">
Thus the USSR became the first state to have as one objective of its official ideology the elimination of existing religion, and the prevention of future implanting of religious belief, with the goal of establishing </span><a data-dcnode-id="4851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_atheism" title="State atheism"><span data-dcnode-id="4852" instrument_node="">state atheism</span></a><span data-dcnode-id="4850" instrument_node=""> (</span><i data-dcnode-id="4848"><span data-dcnode-id="4849" instrument_node="">gosateizm</span></i><span data-dcnode-id="4847" instrument_node="">).</span><sup class="reference" data-dcnode-id="4844" id="cite_ref-USGOV1_2-0"><a data-dcnode-id="4845" href="#cite_note-USGOV1-2"><span data-dcnode-id="4846" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="4841" id="cite_ref-Kowalewski_3-0"><a data-dcnode-id="4842" href="#cite_note-Kowalewski-3"><span data-dcnode-id="4843" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="4838" id="cite_ref-4"><a data-dcnode-id="4839" href="#cite_note-4"><span data-dcnode-id="4840" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="4835" id="cite_ref-5"><a data-dcnode-id="4836" href="#cite_note-5"><span data-dcnode-id="4837" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4834" instrument_node="">
</span></p><p data-dcnode-id="4804"><span data-dcnode-id="4832" instrument_node="">Under the doctrine of state atheism in the Soviet Union, there was a "government-sponsored program of conversion to </span><a class="mw-redirect" data-dcnode-id="4830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxist-Leninist_atheism" title="Marxist-Leninist atheism"><span data-dcnode-id="4831" instrument_node="">atheism</span></a><span data-dcnode-id="4829" instrument_node="">" conducted by Communists.</span><sup class="reference" data-dcnode-id="4826" id="cite_ref-6"><a data-dcnode-id="4827" href="#cite_note-6"><span data-dcnode-id="4828" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="4823" id="cite_ref-7"><a data-dcnode-id="4824" href="#cite_note-7"><span data-dcnode-id="4825" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="4820" id="cite_ref-Adappur2000_8-0"><a data-dcnode-id="4821" href="#cite_note-Adappur2000-8"><span data-dcnode-id="4822" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4819" instrument_node=""> The </span><a data-dcnode-id="4817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communism" title="Communism"><span data-dcnode-id="4818" instrument_node="">Communist</span></a><span data-dcnode-id="4816" instrument_node=""> government targeted religions based on State interests, and while most organized religions were never outlawed, religious property was confiscated, believers were harassed, and religion was ridiculed while atheism was propagated in schools.</span><sup class="reference" data-dcnode-id="4813" id="cite_ref-USGOV1_2-1"><a data-dcnode-id="4814" href="#cite_note-USGOV1-2"><span data-dcnode-id="4815" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4812" instrument_node=""> In 1925 the government founded the </span><a data-dcnode-id="4810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Militant_Atheists" title="League of Militant Atheists"><span data-dcnode-id="4811" instrument_node="">League of Militant Atheists</span></a><span data-dcnode-id="4809" instrument_node=""> to intensify the persecution.</span><sup class="reference" data-dcnode-id="4806" id="cite_ref-9"><a data-dcnode-id="4807" href="#cite_note-9"><span data-dcnode-id="4808" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4805" instrument_node=""> Accordingly, personal expressions of religious faith were not in any way privately banned, but a strong sense of social stigma was imposed on them by the official government structures and secular mass media, and it was generally considered unacceptable for members of certain government professions (teachers, state bureaucrats, soldiers) to be openly religious and anti-secular.
</span></p><p data-dcnode-id="4802"><span data-dcnode-id="4803" instrument_node="">The vast majority of people in the Russian Empire were, at the time of the revolution, religious believers, whereas the communists aimed to break the power of all religious institutions and eventually replace religious belief with atheism. "Science" was counterposed to "religious superstition" in the media and in academic writing. The main religions of pre-revolutionary Russia persisted throughout the entire Soviet period, but they were only tolerated within certain limits. Generally, this meant that believers were free to worship in private and in their respective religious buildings (churches, mosques, synagogues etc.), but public displays of religion outside of such designations were prohibited. In addition, religious institutions were not allowed to express their views in any type of mass media, and many religious buildings were demolished or used for other purposes. In the long run, state atheism failed to convert many people. Religion strengthened underground and was revived to help fight the Second World War. It flourished after the fall of Communism.
</span></p><p data-dcnode-id="4764"><span data-dcnode-id="4801" instrument_node="">Christians belonged to various </span><a data-dcnode-id="4799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian_denomination" title="Christian denomination"><span data-dcnode-id="4800" instrument_node="">denominations</span></a><span data-dcnode-id="4798" instrument_node="">: </span><a data-dcnode-id="4796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Orthodox_Church" title="Eastern Orthodox Church"><span data-dcnode-id="4797" instrument_node="">Orthodox</span></a><span data-dcnode-id="4795" instrument_node=""> (which had the largest number of followers), </span><a class="mw-redirect" data-dcnode-id="4793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholicism" title="Catholicism"><span data-dcnode-id="4794" instrument_node="">Catholic</span></a><span data-dcnode-id="4792" instrument_node="">, </span><a data-dcnode-id="4790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baptists" title="Baptists"><span data-dcnode-id="4791" instrument_node="">Baptist</span></a><span data-dcnode-id="4789" instrument_node=""> and various other </span><a data-dcnode-id="4787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protestantism" title="Protestantism"><span data-dcnode-id="4788" instrument_node="">Protestant</span></a><span data-dcnode-id="4786" instrument_node=""> denominations. The majority of the </span><a data-dcnode-id="4784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islam_in_the_Soviet_Union" title="Islam in the Soviet Union"><span data-dcnode-id="4785" instrument_node="">Muslims in the Soviet Union</span></a><span data-dcnode-id="4783" instrument_node=""> were </span><a class="mw-redirect" data-dcnode-id="4781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sunni" title="Sunni"><span data-dcnode-id="4782" instrument_node="">Sunni</span></a><span data-dcnode-id="4780" instrument_node="">, with the notable exception of </span><a class="mw-redirect" data-dcnode-id="4778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Azerbaijan_SSR" title="Azerbaijan SSR"><span data-dcnode-id="4779" instrument_node="">Azerbaijan</span></a><span data-dcnode-id="4777" instrument_node="">, which was majority </span><a class="mw-redirect" data-dcnode-id="4775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shia" title="Shia"><span data-dcnode-id="4776" instrument_node="">Shia</span></a><span data-dcnode-id="4774" instrument_node="">. </span><a data-dcnode-id="4772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judaism" title="Judaism"><span data-dcnode-id="4773" instrument_node="">Judaism</span></a><span data-dcnode-id="4771" instrument_node=""> also had many followers. Other religions, practiced by a small number of believers, included </span><a data-dcnode-id="4769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buddhism" title="Buddhism"><span data-dcnode-id="4770" instrument_node="">Buddhism</span></a><span data-dcnode-id="4768" instrument_node=""> and </span><a data-dcnode-id="4766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shamanism" title="Shamanism"><span data-dcnode-id="4767" instrument_node="">Shamanism</span></a><span data-dcnode-id="4765" instrument_node="">.
