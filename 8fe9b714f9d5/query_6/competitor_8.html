</span><p data-dcnode-id="3641"><span data-dcnode-id="3652" instrument_node="">Soviet policy toward religion was based on the ideology of </span><a class="mw-redirect" data-dcnode-id="3650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxism-Leninism" title="Marxism-Leninism"><span data-dcnode-id="3651" instrument_node="">Marxism-Leninism</span></a><span data-dcnode-id="3649" instrument_node="">, which made atheism the official doctrine of the Communist Party. However, "the Soviet law and administrative practice through most of the 1920s extended some tolerance to religion and forbade the arbitrary closing or destruction of some functioning churches",</span><sup class="reference" data-dcnode-id="3646" id="cite_ref-24"><a data-dcnode-id="3647" href="#cite_note-24"><span data-dcnode-id="3648" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3645" instrument_node=""> and each successive Soviet constitution granted freedom of belief. As the founder of the Soviet state, </span><a class="mw-redirect" data-dcnode-id="3643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lenin" title="Lenin"><span data-dcnode-id="3644" instrument_node="">Lenin</span></a><span data-dcnode-id="3642" instrument_node="">, put it:
</span></p><span data-dcnode-id="3640" instrument_node="">
</span><blockquote data-dcnode-id="3633"><p data-dcnode-id="3634"><span data-dcnode-id="3639" instrument_node="">Religion is the opium of the people: this saying of Marx is the cornerstone of the entire ideology of Marxism about religion. All modern religions and churches, all and of every kind of religious organizations are always considered by Marxism as the organs of bourgeois reaction, used for the protection of the exploitation and the stupefaction of the working class.</span><sup class="reference" data-dcnode-id="3636" id="cite_ref-Lenin_10-1"><a data-dcnode-id="3637" href="#cite_note-Lenin-10"><span data-dcnode-id="3638" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3635" instrument_node="">
</span></p></blockquote><span data-dcnode-id="3632" instrument_node="">
</span><p data-dcnode-id="3624"><span data-dcnode-id="3631" instrument_node="">Marxism-Leninism advocates the suppression and ultimately the disappearance of religious beliefs, considering them to be "unscientific" and "superstitious". In the 1920s and 1930s, such organizations as the </span><a class="mw-redirect" data-dcnode-id="3629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Society_of_the_Godless" title="Society of the Godless"><span data-dcnode-id="3630" instrument_node="">League of the Militant Godless</span></a><span data-dcnode-id="3628" instrument_node=""> were active in anti-religious propaganda. Atheism was the norm in schools, communist organizations (such as the </span><a class="mw-redirect" data-dcnode-id="3626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Young_Pioneer_organization_of_the_Soviet_Union" title="Young Pioneer organization of the Soviet Union"><span data-dcnode-id="3627" instrument_node="">Young Pioneer Organization</span></a><span data-dcnode-id="3625" instrument_node="">), and the media.
</span></p><p data-dcnode-id="3615"><span data-dcnode-id="3623" instrument_node="">The state's efforts to eradicate religion in the Soviet Union, however, varied over the years with respect to particular religions and were affected by higher state interests. In 1923, a </span><a class="mw-redirect" data-dcnode-id="3621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_York_Times" title="New York Times"><span data-dcnode-id="3622" instrument_node="">New York Times</span></a><span data-dcnode-id="3620" instrument_node=""> correspondent saw Christians observing Easter peacefully in Moscow despite violent anti-religious actions in previous years.</span><sup class="reference" data-dcnode-id="3617" id="cite_ref-25"><a data-dcnode-id="3618" href="#cite_note-25"><span data-dcnode-id="3619" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3616" instrument_node=""> Official policies and practices not only varied with time, but also differed in their application from one nationality to another and from one religion to another.
</span></p><span data-dcnode-id="3614" instrument_node="">
</span><blockquote data-dcnode-id="3602"><p data-dcnode-id="3603"><span data-dcnode-id="3613" instrument_node="">In 1929, with the onset of the Cultural Revolution in the Soviet Union and an upsurge of radical militancy in the Party and </span><a data-dcnode-id="3611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Komsomol" title="Komsomol"><span data-dcnode-id="3612" instrument_node="">Komsomol</span></a><span data-dcnode-id="3610" instrument_node="">, a powerful "hard line" in favor of mass closing of churches and arrests of priests became dominant and evidently won Stalin's approval. Secret "hard line" instructions were issued to local party organizations, but not published. When the anti-religious drive inflamed the anger of the rural population, not to mention that of the Pope and other Western church spokesmen, the state was able to back off from a policy that it had never publicly endorsed anyway.</span><sup class="reference" data-dcnode-id="3607" id="cite_ref-26"><a data-dcnode-id="3608" href="#cite_note-26"><span data-dcnode-id="3609" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="3604" id="cite_ref-27"><a data-dcnode-id="3605" href="#cite_note-27"><span data-dcnode-id="3606" instrument_node="">[27]</span></a></sup></p></blockquote><span data-dcnode-id="3601" instrument_node="">
</span><p data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">Although all Soviet leaders had the same long-range goal of developing a cohesive Soviet people, they pursued different policies to achieve it. For the Soviet government, questions of nationality and religion were always closely linked. Therefore, their attitude toward religion also varied from a total ban on some religions to official support of others.
</span></p><span data-dcnode-id="3598" instrument_node="">
</span><h3 data-dcnode-id="3588"><span class="mw-headline" data-dcnode-id="3596" id="Policy_towards_nationalities_and_religion"><span data-dcnode-id="3597" instrument_node="">Policy towards nationalities and religion</span></span><span class="mw-editsection" data-dcnode-id="3589"><span class="mw-editsection-bracket" data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">[</span></span><a data-dcnode-id="3592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D19" title="Edit section: Policy towards nationalities and religion"><span data-dcnode-id="3593" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3587" instrument_node="">
</span><table class="box-Unreferenced_section plainlinks metadata ambox ambox-content ambox-Unreferenced" data-dcnode-id="3544" role="presentation"><tbody data-dcnode-id="3545"><tr data-dcnode-id="3546"><td class="mbox-image" data-dcnode-id="3583"><div data-dcnode-id="3584" style="width:52px"><a class="image" data-dcnode-id="3585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="3586" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="3547"><div class="mbox-text-span" data-dcnode-id="3548"><span data-dcnode-id="3582" instrument_node="">This section </span><b data-dcnode-id="3575"><span data-dcnode-id="3581" instrument_node="">does not </span><a data-dcnode-id="3579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="3580" instrument_node="">cite</span></a><span data-dcnode-id="3578" instrument_node=""> any </span><a data-dcnode-id="3576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="3577" instrument_node="">sources</span></a></b><span data-dcnode-id="3574" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="3563"><span data-dcnode-id="3573" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="3571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit"><span data-dcnode-id="3572" instrument_node="">improve this section</span></a><span data-dcnode-id="3570" instrument_node=""> by </span><a data-dcnode-id="3568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="3569" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="3567" instrument_node="">. Unsourced material may be challenged and </span><a data-dcnode-id="3565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability%23Burden_of_evidence" title="Wikipedia:Verifiability"><span data-dcnode-id="3566" instrument_node="">removed</span></a><span data-dcnode-id="3564" instrument_node="">.</span></span><span data-dcnode-id="3562" instrument_node=""> </span><span class="date-container" data-dcnode-id="3556"><i data-dcnode-id="3557"><span data-dcnode-id="3561" instrument_node="">(</span><span class="date" data-dcnode-id="3559"><span data-dcnode-id="3560" instrument_node="">November 2011</span></span><span data-dcnode-id="3558" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="3549"><i data-dcnode-id="3550"><span data-dcnode-id="3555" instrument_node=""> (</span><small data-dcnode-id="3552"><a data-dcnode-id="3553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="3554" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="3551" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="3543" instrument_node="">
</span><p data-dcnode-id="3538"><span data-dcnode-id="3542" instrument_node="">In theory, the </span><a class="mw-redirect" data-dcnode-id="3540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Constitution" title="Soviet Constitution"><span data-dcnode-id="3541" instrument_node="">Soviet Constitution</span></a><span data-dcnode-id="3539" instrument_node=""> described the state's position regarding nationalities and religions. It stated that every Soviet citizen also had a particular nationality, and every Soviet passport carried these two entries. The constitution granted a large degree of local autonomy, but this autonomy was subordinated to central authority. In addition, because local and central administrative structures were often not clearly divided, local autonomy was further weakened. Although under the Constitution all nationalities were equal, in practice they were not treated so. Only fifteen nationalities had union republic status, which granted them, in principle, many rights, including the right to secede from the union.
</span></p><p data-dcnode-id="3519"><span data-dcnode-id="3537" instrument_node="">Twenty-two nationalities lived in autonomous republics with a degree of local self-government and representation in the Council of Nationalities in the Supreme Soviet. Eighteen more nationalities had territorial enclaves (autonomous </span><a data-dcnode-id="3535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oblast" title="Oblast"><span data-dcnode-id="3536" instrument_node="">oblasts</span></a><span data-dcnode-id="3534" instrument_node=""> and autonomous </span><a data-dcnode-id="3532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Okrug" title="Okrug"><span data-dcnode-id="3533" instrument_node="">okrugs</span></a><span data-dcnode-id="3531" instrument_node="">) but had very few powers of self-government. The remaining nationalities had no right of self-government at all. </span><a data-dcnode-id="3529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Stalin" title="Joseph Stalin"><span data-dcnode-id="3530" instrument_node="">Joseph Stalin</span></a><span data-dcnode-id="3528" instrument_node="">'s 1913 definition of a nation as "a historically constituted and stable community of people formed on the basis of common language, territory, economic life, and psychological makeup revealed in a common culture" was retained by Soviet authorities throughout the 1980s.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3521" style="white-space:nowrap;"><span data-dcnode-id="3527" instrument_node="">[</span><i data-dcnode-id="3523"><a data-dcnode-id="3524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3525" title="This claim needs references to reliable sources. (September 2008)"><span data-dcnode-id="3526" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3522" instrument_node="">]</span></sup><span data-dcnode-id="3520" instrument_node=""> However, in granting nationalities union republic status, three additional factors were considered: a population of at least 1 million, territorial compactness, and location on the borders of the Soviet Union.
</span></p><p data-dcnode-id="3517"><span data-dcnode-id="3518" instrument_node="">Although Lenin believed that eventually all nationalities would merge into one, he insisted that the Soviet Union be established as a federation of formally equal nations. In the 1920s, genuine cultural concessions were granted to the nationalities. Communist elites of various nationalities were permitted to flourish and to have considerable self-government. National cultures, religions, and languages were not merely tolerated but, in areas with Muslim populations, encouraged.
</span></p><p data-dcnode-id="3500"><span data-dcnode-id="3516" instrument_node="">Demographic changes in the 1960s and 1970s whittled down the overall Russian majority, but they also caused two nationalities (the Kazakhs and Kirgiz) to become minorities in their own republics at the time of the 1979 census, and considerably reduced the majority of the titular nationalities in other republics. This situation led </span><a data-dcnode-id="3514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonid_Brezhnev" title="Leonid Brezhnev"><span data-dcnode-id="3515" instrument_node="">Leonid Brezhnev</span></a><span data-dcnode-id="3513" instrument_node=""> to declare at the </span><a data-dcnode-id="3511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/24th_Congress_of_the_Communist_Party_of_the_Soviet_Union" title="24th Congress of the Communist Party of the Soviet Union"><span data-dcnode-id="3512" instrument_node="">24th Communist Party Congress</span></a><span data-dcnode-id="3510" instrument_node=""> in 1971 that the process of creating a unified Soviet people had been completed, and proposals were made to abolish the federative system and replace it with a single state. In the 1970s, however, a broad movement of national dissent began to spread throughout the Soviet Union. It manifestated itself in many ways: Jews insisted on their right to emigrate to Israel; </span><a data-dcnode-id="3508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crimean_Tatars" title="Crimean Tatars"><span data-dcnode-id="3509" instrument_node="">Crimean Tatars</span></a><span data-dcnode-id="3507" instrument_node=""> demanded to be allowed to return to Crimea; Lithuanians called for the restoration of the rights of the Catholic Church; and </span><a data-dcnode-id="3505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Helsinki_Watch" title="Helsinki Watch"><span data-dcnode-id="3506" instrument_node="">Helsinki Watch</span></a><span data-dcnode-id="3504" instrument_node=""> groups were established in the Georgian, Lithuanian, and Ukrainian republics. Petitions, literature, and occasional public demonstrations voiced public demands for the human rights of all nationalities. By the end of the 1970s, however, massive and concerted efforts by the </span><a data-dcnode-id="3502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/KGB" title="KGB"><span data-dcnode-id="3503" instrument_node="">KGB</span></a><span data-dcnode-id="3501" instrument_node=""> had largely suppressed the national dissent movement. Nevertheless, Brezhnev had learned his lesson. Proposals to dismantle the federative system were abandoned in favour of a policy of drawing the nationalities together more gradually.
</span></p><p data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node="">Soviet officials identified religion closely with nationality. The implementation of policy toward a particular religion, therefore, depended on the state's perception of the bond between that religion and the nationality practicing it, the size of the religious community, the extent to which the religion accepted outside authority, and the nationality's willingness to subordinate itself to political authority. Thus the smaller the religious community and the more closely it identified with a particular nationality, the tighter were the state's policies, especially if the religion also recognized a foreign authority such as the pope.
</span></p><span data-dcnode-id="3497" instrument_node="">
</span><h3 data-dcnode-id="3487"><span class="mw-headline" data-dcnode-id="3495" id="Policy_towards_Orthodoxy"><span data-dcnode-id="3496" instrument_node="">Policy towards Orthodoxy</span></span><span class="mw-editsection" data-dcnode-id="3488"><span class="mw-editsection-bracket" data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">[</span></span><a data-dcnode-id="3491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D20" title="Edit section: Policy towards Orthodoxy"><span data-dcnode-id="3492" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3486" instrument_node="">
</span><table class="box-Unreferenced_section plainlinks metadata ambox ambox-content ambox-Unreferenced" data-dcnode-id="3443" role="presentation"><tbody data-dcnode-id="3444"><tr data-dcnode-id="3445"><td class="mbox-image" data-dcnode-id="3482"><div data-dcnode-id="3483" style="width:52px"><a class="image" data-dcnode-id="3484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="3485" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="3446"><div class="mbox-text-span" data-dcnode-id="3447"><span data-dcnode-id="3481" instrument_node="">This section </span><b data-dcnode-id="3474"><span data-dcnode-id="3480" instrument_node="">does not </span><a data-dcnode-id="3478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="3479" instrument_node="">cite</span></a><span data-dcnode-id="3477" instrument_node=""> any </span><a data-dcnode-id="3475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="3476" instrument_node="">sources</span></a></b><span data-dcnode-id="3473" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="3462"><span data-dcnode-id="3472" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="3470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit"><span data-dcnode-id="3471" instrument_node="">improve this section</span></a><span data-dcnode-id="3469" instrument_node=""> by </span><a data-dcnode-id="3467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="3468" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="3466" instrument_node="">. Unsourced material may be challenged and </span><a data-dcnode-id="3464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability%23Burden_of_evidence" title="Wikipedia:Verifiability"><span data-dcnode-id="3465" instrument_node="">removed</span></a><span data-dcnode-id="3463" instrument_node="">.</span></span><span data-dcnode-id="3461" instrument_node=""> </span><span class="date-container" data-dcnode-id="3455"><i data-dcnode-id="3456"><span data-dcnode-id="3460" instrument_node="">(</span><span class="date" data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">November 2011</span></span><span data-dcnode-id="3457" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="3448"><i data-dcnode-id="3449"><span data-dcnode-id="3454" instrument_node=""> (</span><small data-dcnode-id="3451"><a data-dcnode-id="3452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="3453" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="3450" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="3442" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3430"><div class="thumbinner" data-dcnode-id="3431" style="width:222px;"><a class="image" data-dcnode-id="3440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAlexander_Nevsky_Cathedral%2C_Baku.jpg"><img alt="" class="thumbimage" data-dcnode-id="3441" data-file-height="750" data-file-width="557" decoding="async" height="296" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/35/Alexander_Nevsky_Cathedral%252C_Baku.jpg/220px-Alexander_Nevsky_Cathedral%252C_Baku.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/35/Alexander_Nevsky_Cathedral%2C_Baku.jpg/330px-Alexander_Nevsky_Cathedral%2C_Baku.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/35/Alexander_Nevsky_Cathedral%2C_Baku.jpg/440px-Alexander_Nevsky_Cathedral%2C_Baku.jpg 2x" width="220"></a><span data-dcnode-id="3439" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3432"><div class="magnify" data-dcnode-id="3437"><a class="internal" data-dcnode-id="3438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAlexander_Nevsky_Cathedral%2C_Baku.jpg" title="Enlarge"></a></div><span data-dcnode-id="3436" instrument_node="">The Russian Orthodox Cathedral, once the most dominant landmark in </span><a data-dcnode-id="3434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baku" title="Baku"><span data-dcnode-id="3435" instrument_node="">Baku</span></a><span data-dcnode-id="3433" instrument_node="">, was demolished in the 1930s under Stalin.</span></div></div></div><span data-dcnode-id="3429" instrument_node="">
</span><p data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">As for the Russian Orthodox Church, Soviet authorities sought to control it and, in times of national crisis, to exploit it for the state's own purposes; but their ultimate goal was to eliminate it. During the first five years of Soviet power, the Bolsheviks executed 28 Russian Orthodox bishops and over 1,200 Russian Orthodox priests. Many others were imprisoned or exiled. Believers were harassed and persecuted. Most seminaries were closed, and the publication of most religious material was prohibited. By 1941 only 500 churches remained open out of about 54,000 in existence prior to World War I.
</span></p><p data-dcnode-id="3416"><span data-dcnode-id="3426" instrument_node="">Such crackdowns related to many people's dissatisfaction with the church in pre-revolutionary Russia. The close ties between the church and the state led to the perception of the church as corrupt and greedy by many members of the </span><a data-dcnode-id="3424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intelligentsia" title="Intelligentsia"><span data-dcnode-id="3425" instrument_node="">intelligentsia</span></a><span data-dcnode-id="3423" instrument_node="">. Many </span><a data-dcnode-id="3421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peasant" title="Peasant"><span data-dcnode-id="3422" instrument_node="">peasants</span></a><span data-dcnode-id="3420" instrument_node="">, while highly religious, also viewed the church unfavorably. Respect for religion did not extend to the local priests. The church owned a significant portion of Russia's land, and this was a bone of contention&nbsp;– land ownership was a big factor in the </span><a class="mw-redirect" data-dcnode-id="3418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Revolution_of_1917" title="Russian Revolution of 1917"><span data-dcnode-id="3419" instrument_node="">Russian Revolution of 1917</span></a><span data-dcnode-id="3417" instrument_node="">.
</span></p><p data-dcnode-id="3400"><span data-dcnode-id="3415" instrument_node="">The </span><a data-dcnode-id="3413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi_Germany" title="Nazi Germany"><span data-dcnode-id="3414" instrument_node="">Nazi</span></a><span data-dcnode-id="3412" instrument_node=""> attack on the Soviet Union in 1941 induced Stalin to enlist the Russian Orthodox Church as an ally to arouse Russian patriotism against foreign aggression. Russian Orthodox religious life experienced a revival: thousands of churches were reopened; there were 22,000 by the time </span><a data-dcnode-id="3410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikita_Khrushchev" title="Nikita Khrushchev"><span data-dcnode-id="3411" instrument_node="">Nikita Khrushchev</span></a><span data-dcnode-id="3409" instrument_node=""> came to power. The state permitted religious publications, and church membership grew. During the final years of Joseph Stalin's rule, there was once again a tightening of anti-religious measurements.</span><sup class="reference" data-dcnode-id="3406" id="cite_ref-28"><a data-dcnode-id="3407" href="#cite_note-28"><span data-dcnode-id="3408" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3405" instrument_node=""> In April 1948, Council for Religious Affairs sent out an instruction to its local commissioners to halt the registration of new religious communities and from that point churches were no longer opened.</span><sup class="reference" data-dcnode-id="3402" id="cite_ref-29"><a data-dcnode-id="3403" href="#cite_note-29"><span data-dcnode-id="3404" instrument_node="">[29]</span></a></sup><span data-dcnode-id="3401" instrument_node=""> The "Knowledge Society", which was established a year earlier, was engaged in educational activities and again began to publish anti-religious literature.
</span></p><p data-dcnode-id="3395"><span data-dcnode-id="3399" instrument_node="">Khrushchev reversed the government's policy of cooperation with the Russian Orthodox Church. Although it remained officially sanctioned, in 1959 Khrushchev launched an </span><a data-dcnode-id="3397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antireligion" title="Antireligion"><span data-dcnode-id="3398" instrument_node="">antireligious</span></a><span data-dcnode-id="3396" instrument_node=""> campaign that was continued in a less stringent manner by his successor, Brezhnev. By 1975 the number of active Russian Orthodox churches was reduced to 7,000. Some of the most prominent members of the Russian Orthodox hierarchy and some activists were jailed or forced to leave the church. Their place was taken by docile clergy who were obedient to the state and who were sometimes infiltrated by KGB agents, making the Russian Orthodox Church useful to the government. It espoused and propagated Soviet foreign policy and furthered the russification of non-Russian Christians, such as Orthodox Ukrainians and Belarusians.
</span></p><p data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">The state applied a different policy toward the Ukrainian Autocephalous Orthodox Church and the Belarusian Autocephalous Orthodox Church. Viewed by the government as very nationalistic, both were suppressed, first at the end of the 1920s and again in 1944 after they had renewed themselves under German occupation. The leadership of both churches was decimated; large numbers of priests were shot or sent to labor camps, and members of their congregations were harassed and persecuted.
</span></p><p data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">The Georgian Orthodox Church was subject to a somewhat different policy and fared far worse than the Russian Orthodox Church. During World War II, however, it was allowed greater autonomy in running its affairs in return for calling its members to support the war effort, although it did not achieve the kind of accommodation with the authorities that the Russian Orthodox Church had. The government reimposed tight control over it after the war. Out of some 2,100 churches in 1917, only 200 were still open in the 1980s, and it was forbidden to serve its adherents outside the Georgian Republic. In many cases, the government forced the Georgian Orthodox Church to conduct services in Old Church Slavonic instead of in the Georgian language.
</span></p><span data-dcnode-id="3390" instrument_node="">
</span><h3 data-dcnode-id="3380"><span class="mw-headline" data-dcnode-id="3388" id="Policy_towards_Catholicism_and_Protestantism"><span data-dcnode-id="3389" instrument_node="">Policy towards Catholicism and Protestantism</span></span><span class="mw-editsection" data-dcnode-id="3381"><span class="mw-editsection-bracket" data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">[</span></span><a data-dcnode-id="3384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D21" title="Edit section: Policy towards Catholicism and Protestantism"><span data-dcnode-id="3385" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3379" instrument_node="">
</span><p data-dcnode-id="3360"><span data-dcnode-id="3378" instrument_node="">The Soviet government's policies toward the Catholic Church were strongly influenced by Soviet Catholics' recognition of an outside authority as head of their church. As a result of World War II, millions of Catholics (including Greco-Catholics) became Soviet citizens and were subjected to new repression. Also, in the three republics where most of the Catholics lived, the </span><a class="mw-redirect" data-dcnode-id="3376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithuanian_SSR" title="Lithuanian SSR"><span data-dcnode-id="3377" instrument_node="">Lithuanian SSR</span></a><span data-dcnode-id="3375" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="3373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Byelorussian_SSR" title="Byelorussian SSR"><span data-dcnode-id="3374" instrument_node="">Byelorussian SSR</span></a><span data-dcnode-id="3372" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="3370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukrainian_SSR" title="Ukrainian SSR"><span data-dcnode-id="3371" instrument_node="">Ukrainian SSR</span></a><span data-dcnode-id="3369" instrument_node="">, Catholicism and nationalism were closely linked. Although the Roman Catholic Church was tolerated in Lithuania, large numbers of the clergy were imprisoned, many seminaries were closed, and police agents infiltrated the remainder. The anti-Catholic campaign in Lithuania abated after Stalin's death, but harsh measures against the church were resumed in 1957 and continued through the Brezhnev era.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3362" style="white-space:nowrap;"><span data-dcnode-id="3368" instrument_node="">[</span><i data-dcnode-id="3364"><a data-dcnode-id="3365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3366" title="This claim needs references to reliable sources. (March 2008)"><span data-dcnode-id="3367" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3363" instrument_node="">]</span></sup><span data-dcnode-id="3361" instrument_node="">
</span></p><p data-dcnode-id="3340"><span data-dcnode-id="3359" instrument_node="">Soviet policy was particularly harsh toward the </span><a class="mw-redirect" data-dcnode-id="3357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukrainian_Greek-Catholic_Church" title="Ukrainian Greek-Catholic Church"><span data-dcnode-id="3358" instrument_node="">Ukrainian Greek-Catholic Church</span></a><span data-dcnode-id="3356" instrument_node="">. Ukrainian Greek-Catholics came under Soviet rule in 1939, when western Ukraine was incorporated into the Soviet Union as part of the </span><a class="mw-redirect" data-dcnode-id="3354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi-Soviet_Nonaggression_Pact" title="Nazi-Soviet Nonaggression Pact"><span data-dcnode-id="3355" instrument_node="">Nazi-Soviet Nonaggression Pact</span></a><span data-dcnode-id="3353" instrument_node="">. Although the Ukrainian Greek Catholic Church was permitted to function, it was almost immediately subjected to intense harassment.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3346" style="white-space:nowrap;"><span data-dcnode-id="3352" instrument_node="">[</span><i data-dcnode-id="3348"><a data-dcnode-id="3349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3350" title="This claim needs references to reliable sources. (March 2008)"><span data-dcnode-id="3351" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3347" instrument_node="">]</span></sup><span data-dcnode-id="3345" instrument_node=""> Retreating before the German army in 1941, Soviet authorities arrested large numbers of Ukrainian Greek Catholic priests, who were either killed or deported to Siberia.</span><sup class="reference" data-dcnode-id="3342" id="cite_ref-ugcc_14-4"><a data-dcnode-id="3343" href="#cite_note-ugcc-14"><span data-dcnode-id="3344" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3341" instrument_node=""> After the Red Army reoccupied western Ukraine in 1944, the Soviet state liquidated the Ukrainian Greek-Catholic Church by arresting its metropolitan, all of its bishops, hundreds of clergy, and the more active church members, killing some and sending the rest to labor camps. At the same time, Soviet authorities forced the remaining clergy to abrogate the union with Rome and subordinate themselves to the Russian Orthodox Church.
</span></p><p data-dcnode-id="3332"><span data-dcnode-id="3339" instrument_node="">Before World War II, there were fewer Protestants in the Soviet Union than adherents of other faiths, but they showed remarkable growth since then. In 1944 the Soviet government established the </span><a class="new" data-dcnode-id="3337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAll-Union_Council_of_Evangelical_Christian_Baptists%26action%3Dedit%26redlink%3D1" title="All-Union Council of Evangelical Christian Baptists (page does not exist)"><span data-dcnode-id="3338" instrument_node="">All-Union Council of Evangelical Christian Baptists</span></a><span data-dcnode-id="3336" instrument_node=""> (now the </span><a class="mw-redirect" data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Union_of_Evangelical_Christians-Baptists_of_Russia" title="Union of Evangelical Christians-Baptists of Russia"><span data-dcnode-id="3335" instrument_node="">Union of Evangelical Christians-Baptists of Russia</span></a><span data-dcnode-id="3333" instrument_node="">) to gain some control over the various Protestant sects. Many congregations refused to join this body, however, and others that initially joined it subsequently left. All found that the state, through the council, was interfering in church life.
</span></p><span data-dcnode-id="3331" instrument_node="">
</span><h3 data-dcnode-id="3321"><span class="mw-headline" data-dcnode-id="3329" id="Policy_toward_other_Christian_groups"><span data-dcnode-id="3330" instrument_node="">Policy toward other Christian groups</span></span><span class="mw-editsection" data-dcnode-id="3322"><span class="mw-editsection-bracket" data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">[</span></span><a data-dcnode-id="3325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D22" title="Edit section: Policy toward other Christian groups"><span data-dcnode-id="3326" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3320" instrument_node="">
</span><table class="box-Unreferenced_section plainlinks metadata ambox ambox-content ambox-Unreferenced" data-dcnode-id="3277" role="presentation"><tbody data-dcnode-id="3278"><tr data-dcnode-id="3279"><td class="mbox-image" data-dcnode-id="3316"><div data-dcnode-id="3317" style="width:52px"><a class="image" data-dcnode-id="3318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="3319" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="3280"><div class="mbox-text-span" data-dcnode-id="3281"><span data-dcnode-id="3315" instrument_node="">This section </span><b data-dcnode-id="3308"><span data-dcnode-id="3314" instrument_node="">does not </span><a data-dcnode-id="3312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="3313" instrument_node="">cite</span></a><span data-dcnode-id="3311" instrument_node=""> any </span><a data-dcnode-id="3309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="3310" instrument_node="">sources</span></a></b><span data-dcnode-id="3307" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="3296"><span data-dcnode-id="3306" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="3304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit"><span data-dcnode-id="3305" instrument_node="">improve this section</span></a><span data-dcnode-id="3303" instrument_node=""> by </span><a data-dcnode-id="3301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="3302" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="3300" instrument_node="">. Unsourced material may be challenged and </span><a data-dcnode-id="3298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability%23Burden_of_evidence" title="Wikipedia:Verifiability"><span data-dcnode-id="3299" instrument_node="">removed</span></a><span data-dcnode-id="3297" instrument_node="">.</span></span><span data-dcnode-id="3295" instrument_node=""> </span><span class="date-container" data-dcnode-id="3289"><i data-dcnode-id="3290"><span data-dcnode-id="3294" instrument_node="">(</span><span class="date" data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">June 2011</span></span><span data-dcnode-id="3291" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="3282"><i data-dcnode-id="3283"><span data-dcnode-id="3288" instrument_node=""> (</span><small data-dcnode-id="3285"><a data-dcnode-id="3286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="3287" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="3284" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="3276" instrument_node="">
</span><p data-dcnode-id="3268"><span data-dcnode-id="3275" instrument_node="">A number of congregations of </span><a data-dcnode-id="3273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Mennonite" title="Russian Mennonite"><span data-dcnode-id="3274" instrument_node="">Russian Mennonites</span></a><span data-dcnode-id="3272" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jehovah%2527s_Witness" title="Jehovah's Witness"><span data-dcnode-id="3271" instrument_node="">Jehovah's Witnesses</span></a><span data-dcnode-id="3269" instrument_node="">, and other Christian groups faced varying levels of persecution under Soviet rule.
</span></p><p data-dcnode-id="3246"><span data-dcnode-id="3267" instrument_node="">Jehovah's Witnesses were banned from practicing their religion. Under </span><a data-dcnode-id="3265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_North" title="Operation North"><span data-dcnode-id="3266" instrument_node="">Operation North</span></a><span data-dcnode-id="3264" instrument_node="">, the personal property of over eight-thousand members was confiscated, and they (along with underage children) were exiled to Siberia from 1951 until repeal in 1965. All were asked to sign a declaration of resignation as a Jehovah's Witness in order to not be deported. There is no existing record of any having signed this declaration. While in Siberia, some men, women, and children were forced to work as lumberjacks for a fixed wage. Victims reported living conditions to be very poor. From 1951 to 1991, Jehovah's Witnesses within and outside Siberia were incarcerated&nbsp;– and then rearrested after serving their terms. Some were forced to work in concentration camps, others forcibly enrolled in Marxist </span><a class="mw-redirect" data-dcnode-id="3262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reeducation_through_labor" title="Reeducation through labor"><span data-dcnode-id="3263" instrument_node="">reeducation</span></a><span data-dcnode-id="3261" instrument_node=""> programs.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3254" style="white-space:nowrap;"><span data-dcnode-id="3260" instrument_node="">[</span><i data-dcnode-id="3256"><a data-dcnode-id="3257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3258" title="Source for this (January 2018)"><span data-dcnode-id="3259" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3255" instrument_node="">]</span></sup><span data-dcnode-id="3253" instrument_node=""> KGB officials infiltrated the Jehovah's Witnesses organization in the Soviet Union, mostly to seek out hidden caches of theological literature. Soviet propaganda films depicted Jehovah's Witnesses as a </span><a data-dcnode-id="3251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cult" title="Cult"><span data-dcnode-id="3252" instrument_node="">cult</span></a><span data-dcnode-id="3250" instrument_node="">, extremist, and engaging in </span><a class="mw-redirect" data-dcnode-id="3248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mind_control" title="Mind control"><span data-dcnode-id="3249" instrument_node="">mind control</span></a><span data-dcnode-id="3247" instrument_node="">. Jehovah's Witnesses were legalized in the Soviet Union in 1991; victims were given social benefits equivalent to those of war veterans.
</span></p><p data-dcnode-id="3221"><span data-dcnode-id="3245" instrument_node="">Early in the Bolshevik period, predominantly before the end of the </span><a data-dcnode-id="3243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Civil_War" title="Russian Civil War"><span data-dcnode-id="3244" instrument_node="">Russian Civil War</span></a><span data-dcnode-id="3242" instrument_node=""> and the emergence of the Soviet Union, Russian Mennonite communities were harassed; several Mennonites were killed or imprisoned, and women were raped. </span><a class="mw-redirect" data-dcnode-id="3240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anarcho-Communist" title="Anarcho-Communist"><span data-dcnode-id="3241" instrument_node="">Anarcho-Communist</span></a><span data-dcnode-id="3239" instrument_node=""> </span><a data-dcnode-id="3237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nestor_Makhno" title="Nestor Makhno"><span data-dcnode-id="3238" instrument_node="">Nestor Makhno</span></a><span data-dcnode-id="3236" instrument_node=""> was responsible for most of the bloodshed, which caused the normally </span><a class="mw-redirect" data-dcnode-id="3234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pacifist" title="Pacifist"><span data-dcnode-id="3235" instrument_node="">pacifist</span></a><span data-dcnode-id="3233" instrument_node=""> Mennonites to take up arms in defensive militia units. This marked the beginning of a mass exodus of Mennonites to Germany, the United States, and elsewhere. Mennonites were branded as </span><i data-dcnode-id="3230"><a class="mw-redirect" data-dcnode-id="3231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kulaks" title="Kulaks"><span data-dcnode-id="3232" instrument_node="">kulaks</span></a></i><span data-dcnode-id="3229" instrument_node=""> by the Soviets. Their colonies' farms were collectivized under the Soviet Union's </span><a class="mw-redirect" data-dcnode-id="3227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communal_farming" title="Communal farming"><span data-dcnode-id="3228" instrument_node="">communal farming</span></a><span data-dcnode-id="3226" instrument_node=""> policy. Being predominantly German settlers, the Russian Mennonites in World War II saw the German forces invading Russia as liberators. Many were allowed passage to Germany as </span><i data-dcnode-id="3223"><a data-dcnode-id="3224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Volksdeutsche" title="Volksdeutsche"><span data-dcnode-id="3225" instrument_node="">Volksdeutsche</span></a></i><span data-dcnode-id="3222" instrument_node="">. Soviet officials began exiling Mennonite settlers in the eastern part of Russia to Siberia. After the war, the remaining Russian Mennonites were branded as Nazi conspirators and exiled to Kazakhstan and Siberia, sometimes being imprisoned or forced to work in concentration camps. In the 1990s the Russian government gave the Mennonites in Kazakhstan and Siberia the opportunity to emigrate.
</span></p><span data-dcnode-id="3220" instrument_node="">
</span><h3 data-dcnode-id="3210"><span class="mw-headline" data-dcnode-id="3218" id="Policy_towards_Islam"><span data-dcnode-id="3219" instrument_node="">Policy towards Islam</span></span><span class="mw-editsection" data-dcnode-id="3211"><span class="mw-editsection-bracket" data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">[</span></span><a data-dcnode-id="3214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D23" title="Edit section: Policy towards Islam"><span data-dcnode-id="3215" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3209" instrument_node="">
</span><link data-dcnode-id="3208" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3204" role="note"><span data-dcnode-id="3207" instrument_node="">Main article: </span><a data-dcnode-id="3205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islam_in_the_Soviet_Union" title="Islam in the Soviet Union"><span data-dcnode-id="3206" instrument_node="">Islam in the Soviet Union</span></a></div><span data-dcnode-id="3203" instrument_node="">
</span><p data-dcnode-id="3167"><span data-dcnode-id="3202" instrument_node="">Soviet policy toward Islam was affected, on the one hand by the large Muslim population, its close ties to national cultures, and its tendency to accept Soviet authority, and on the other hand by its susceptibility to foreign influence. Although actively encouraging atheism, Soviet authorities permitted some limited religious activity in all the Muslim republics, under the auspices of the regional branches of the </span><a data-dcnode-id="3200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spiritual_Administration_of_the_Muslims_of_Central_Asia_and_Kazakhstan" title="Spiritual Administration of the Muslims of Central Asia and Kazakhstan"><span data-dcnode-id="3201" instrument_node="">Spiritual Administration of the Muslims of Central Asia and Kazakhstan</span></a><span data-dcnode-id="3199" instrument_node="">. Mosques functioned in most large cities of the </span><a data-dcnode-id="3197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Central_Asia" title="Soviet Central Asia"><span data-dcnode-id="3198" instrument_node="">Central Asian republics</span></a><span data-dcnode-id="3196" instrument_node="">, the </span><a data-dcnode-id="3194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caucasus" title="Caucasus"><span data-dcnode-id="3195" instrument_node="">Caucasus</span></a><span data-dcnode-id="3193" instrument_node="">, </span><a data-dcnode-id="3191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tatarstan" title="Tatarstan"><span data-dcnode-id="3192" instrument_node="">Tatarstan</span></a><span data-dcnode-id="3190" instrument_node="">, </span><a data-dcnode-id="3188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bashkortostan" title="Bashkortostan"><span data-dcnode-id="3189" instrument_node="">Bashkortostan</span></a><span data-dcnode-id="3187" instrument_node="">, </span><a data-dcnode-id="3185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crimea" title="Crimea"><span data-dcnode-id="3186" instrument_node="">Crimea</span></a><span data-dcnode-id="3184" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="3182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Azerbaijan_SSR" title="Azerbaijan SSR"><span data-dcnode-id="3183" instrument_node="">Azerbaijan Republic</span></a><span data-dcnode-id="3181" instrument_node="">, and elsewhere, but their number decreased from 25,000 in 1917 to 500 in the 1970s. Under </span><a class="mw-redirect" data-dcnode-id="3179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stalinist" title="Stalinist"><span data-dcnode-id="3180" instrument_node="">Stalinist</span></a><span data-dcnode-id="3178" instrument_node=""> rule, Soviet authorities cracked down on Muslim clergy, closing many mosques or turning them into warehouses.</span><sup class="reference" data-dcnode-id="3175" id="cite_ref-30"><a data-dcnode-id="3176" href="#cite_note-30"><span data-dcnode-id="3177" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3174" instrument_node=""> In 1989, as part of the general relaxation of restrictions on religions, some additional Muslim religious associations were registered, and some of the mosques that had been closed by the government were returned to Muslim communities. The government also announced plans to permit the training of limited numbers of Muslim religious leaders in two- and five-year courses in </span><a data-dcnode-id="3172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ufa" title="Ufa"><span data-dcnode-id="3173" instrument_node="">Ufa</span></a><span data-dcnode-id="3171" instrument_node=""> and </span><a data-dcnode-id="3169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baku" title="Baku"><span data-dcnode-id="3170" instrument_node="">Baku</span></a><span data-dcnode-id="3168" instrument_node="">, respectively.
</span></p><span data-dcnode-id="3166" instrument_node="">
</span><h3 data-dcnode-id="3156"><span class="mw-headline" data-dcnode-id="3164" id="Policy_towards_Judaism"><span data-dcnode-id="3165" instrument_node="">Policy towards Judaism</span></span><span class="mw-editsection" data-dcnode-id="3157"><span class="mw-editsection-bracket" data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">[</span></span><a data-dcnode-id="3160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D24" title="Edit section: Policy towards Judaism"><span data-dcnode-id="3161" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3155" instrument_node="">
</span><link data-dcnode-id="3154" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3150" role="note"><span data-dcnode-id="3153" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="3151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_Jews_in_Russia_and_the_Soviet_Union" title="History of the Jews in Russia and the Soviet Union"><span data-dcnode-id="3152" instrument_node="">History of the Jews in Russia and the Soviet Union</span></a></div><span data-dcnode-id="3149" instrument_node="">
</span><p data-dcnode-id="3125"><span data-dcnode-id="3148" instrument_node="">Lenin publicly condemned </span><a class="mw-redirect" data-dcnode-id="3146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-Semitism" title="Anti-Semitism"><span data-dcnode-id="3147" instrument_node="">anti-Semitism</span></a><span data-dcnode-id="3145" instrument_node="">, the government however was hostile toward </span><a data-dcnode-id="3143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Judaism" title="Judaism"><span data-dcnode-id="3144" instrument_node="">Judaism</span></a><span data-dcnode-id="3142" instrument_node=""> from the beginning.</span><sup class="reference" data-dcnode-id="3139" id="cite_ref-31"><a data-dcnode-id="3140" href="#cite_note-31"><span data-dcnode-id="3141" instrument_node="">[31]</span></a></sup><span data-dcnode-id="3138" instrument_node=""> In 1919 the Soviet authorities abolished Jewish community councils, which were traditionally responsible for maintaining synagogues. They created a special </span><a data-dcnode-id="3136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yevsektsiya" title="Yevsektsiya"><span data-dcnode-id="3137" instrument_node="">Jewish section of the party</span></a><span data-dcnode-id="3135" instrument_node="">, whose tasks included propaganda against Jewish clergy and religion. To offset Jewish national and religious aspirations, and to reflect the Jewish national movement's role in the socialist movement of the Russian Empire (for example, Trotsky was first a member of the </span><a class="mw-redirect" data-dcnode-id="3133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jewish_Bund" title="Jewish Bund"><span data-dcnode-id="3134" instrument_node="">Jewish Bund</span></a><span data-dcnode-id="3132" instrument_node="">, not the </span><a data-dcnode-id="3130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Social_Democratic_Labour_Party" title="Russian Social Democratic Labour Party"><span data-dcnode-id="3131" instrument_node="">Social Democratic Labour Party</span></a><span data-dcnode-id="3129" instrument_node="">), an alternative to the </span><a data-dcnode-id="3127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Land_of_Israel" title="Land of Israel"><span data-dcnode-id="3128" instrument_node="">Land of Israel</span></a><span data-dcnode-id="3126" instrument_node=""> was established in 1934.
</span></p><p data-dcnode-id="3101"><span data-dcnode-id="3124" instrument_node="">The </span><a data-dcnode-id="3122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jewish_Autonomous_Oblast" title="Jewish Autonomous Oblast"><span data-dcnode-id="3123" instrument_node="">Jewish Autonomous Oblast</span></a><span data-dcnode-id="3121" instrument_node="">, created in 1928 by Stalin, with </span><a data-dcnode-id="3119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Birobidzhan" title="Birobidzhan"><span data-dcnode-id="3120" instrument_node="">Birobidzhan</span></a><span data-dcnode-id="3118" instrument_node=""> in the </span><a data-dcnode-id="3116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Far_East" title="Russian Far East"><span data-dcnode-id="3117" instrument_node="">Russian Far East</span></a><span data-dcnode-id="3115" instrument_node=""> as its administrative center, was to become a "Soviet Zion". </span><a class="mw-redirect" data-dcnode-id="3113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yiddish_language" title="Yiddish language"><span data-dcnode-id="3114" instrument_node="">Yiddish</span></a><span data-dcnode-id="3112" instrument_node="">, rather than "reactionary" </span><a data-dcnode-id="3110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hebrew_language" title="Hebrew language"><span data-dcnode-id="3111" instrument_node="">Hebrew</span></a><span data-dcnode-id="3109" instrument_node="">, would be the national language, and </span><a data-dcnode-id="3107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_realism" title="Socialist realism"><span data-dcnode-id="3108" instrument_node="">proletarian socialist literature and arts</span></a><span data-dcnode-id="3106" instrument_node=""> would replace Judaism as the quintessence of its culture. Despite a massive domestic and international state propaganda campaign, the Jewish population there never reached 30% (as of 2003 it was only about 1.2%). The experiment ended in the mid-1930s, during Stalin's first campaign of purges. Jewish leaders were arrested and executed, and Yiddish schools were shut down. Further persecutions and purges followed.</span><sup class="reference" data-dcnode-id="3103" id="cite_ref-Montefiore_32-0"><a data-dcnode-id="3104" href="#cite_note-Montefiore-32"><span data-dcnode-id="3105" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3102" instrument_node="">
</span></p><p data-dcnode-id="3095"><span data-dcnode-id="3100" instrument_node="">The training of rabbis became impossible until the early 1940s, and until the late 1980s only one Yiddish periodical was published. Because of its identification with Zionism, Hebrew was taught only in schools for diplomats. Most of the 5,000 synagogues functioning prior to the Bolshevik Revolution were closed under Stalin, and others were closed under Khrushchev. The practice of Judaism became very difficult, intensifying the desire of Jews to leave the Soviet Union.</span><sup class="reference" data-dcnode-id="3097" id="cite_ref-Montefiore_32-1"><a data-dcnode-id="3098" href="#cite_note-Montefiore-32"><span data-dcnode-id="3099" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3096" instrument_node="">
</span></p><span data-dcnode-id="3094" instrument_node="">
