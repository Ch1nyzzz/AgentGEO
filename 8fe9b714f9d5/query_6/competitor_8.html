</span><h2 data-dcnode-id="4513"><span class="mw-headline" data-dcnode-id="4521" id="Marxism-Leninism_and_Religion"><span data-dcnode-id="4522" instrument_node="">Marxism-Leninism and Religion</span></span><span class="mw-editsection" data-dcnode-id="4514"><span class="mw-editsection-bracket" data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">[</span></span><a data-dcnode-id="4517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D1" title="Edit section: Marxism-Leninism and Religion"><span data-dcnode-id="4518" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4512" instrument_node="">
</span><p data-dcnode-id="4507"><span data-dcnode-id="4511" instrument_node="">As the founder of the Soviet state, </span><a data-dcnode-id="4509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Lenin" title="Vladimir Lenin"><span data-dcnode-id="4510" instrument_node="">Vladimir Lenin</span></a><span data-dcnode-id="4508" instrument_node="">, put it:
</span></p><p data-dcnode-id="4492"><span data-dcnode-id="4506" instrument_node="">Religion is the </span><a data-dcnode-id="4504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Opium_of_the_people" title="Opium of the people"><span data-dcnode-id="4505" instrument_node="">opium of the people</span></a><span data-dcnode-id="4503" instrument_node="">: this saying of </span><a data-dcnode-id="4501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Marx" title="Karl Marx"><span data-dcnode-id="4502" instrument_node="">Marx</span></a><span data-dcnode-id="4500" instrument_node=""> is the cornerstone of the entire ideology of </span><a data-dcnode-id="4498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxism" title="Marxism"><span data-dcnode-id="4499" instrument_node="">Marxism</span></a><span data-dcnode-id="4497" instrument_node=""> about religion. All modern religions and churches, all and of every kind of religious organizations are always considered by Marxism as the organs of bourgeois reaction, used for the protection of the exploitation and the stupefaction of the working class.</span><sup class="reference" data-dcnode-id="4494" id="cite_ref-Lenin_10-0"><a data-dcnode-id="4495" href="#cite_note-Lenin-10"><span data-dcnode-id="4496" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4493" instrument_node="">
</span></p><p data-dcnode-id="4478"><a data-dcnode-id="4490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxist%25E2%2580%2593Leninist_atheism" title="Marxist–Leninist atheism"><span data-dcnode-id="4491" instrument_node="">Marxist–Leninist atheism</span></a><span data-dcnode-id="4489" instrument_node=""> has consistently advocated the control, suppression, and elimination of religion. Within about a year of the revolution, the state </span><a data-dcnode-id="4487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eminent_domain" title="Eminent domain"><span data-dcnode-id="4488" instrument_node="">expropriated</span></a><span data-dcnode-id="4486" instrument_node=""> all church property, including the churches themselves, and in the period from 1922 to 1926, 28 Russian Orthodox bishops and more than 1,200 priests were killed. Many more were persecuted.</span><sup class="reference" data-dcnode-id="4483" id="cite_ref-autogenerated1_11-0"><a data-dcnode-id="4484" href="#cite_note-autogenerated1-11"><span data-dcnode-id="4485" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="4480" id="cite_ref-12"><a data-dcnode-id="4481" href="#cite_note-12"><span data-dcnode-id="4482" instrument_node="">[12]</span></a></sup><span data-dcnode-id="4479" instrument_node="">
</span></p><span data-dcnode-id="4477" instrument_node="">
</span><h2 data-dcnode-id="4467"><span class="mw-headline" data-dcnode-id="4475" id="Christianity"><span data-dcnode-id="4476" instrument_node="">Christianity</span></span><span class="mw-editsection" data-dcnode-id="4468"><span class="mw-editsection-bracket" data-dcnode-id="4473"><span data-dcnode-id="4474" instrument_node="">[</span></span><a data-dcnode-id="4471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D2" title="Edit section: Christianity"><span data-dcnode-id="4472" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4469"><span data-dcnode-id="4470" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4466" instrument_node="">
</span><h3 data-dcnode-id="4456"><span class="mw-headline" data-dcnode-id="4464" id="Orthodox"><span data-dcnode-id="4465" instrument_node="">Orthodox</span></span><span class="mw-editsection" data-dcnode-id="4457"><span class="mw-editsection-bracket" data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node="">[</span></span><a data-dcnode-id="4460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D3" title="Edit section: Orthodox"><span data-dcnode-id="4461" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4455" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4440"><div class="thumbinner" data-dcnode-id="4441" style="width:252px;"><a class="image" data-dcnode-id="4453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A22-cathedral.jpg"><img alt="" class="thumbimage" data-dcnode-id="4454" data-file-height="598" data-file-width="974" decoding="async" height="153" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/af/22-cathedral.jpg/250px-22-cathedral.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/af/22-cathedral.jpg/375px-22-cathedral.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/af/22-cathedral.jpg/500px-22-cathedral.jpg 2x" width="250"></a><span data-dcnode-id="4452" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4442"><div class="magnify" data-dcnode-id="4450"><a class="internal" data-dcnode-id="4451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A22-cathedral.jpg" title="Enlarge"></a></div><span data-dcnode-id="4449" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="4447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cathedral_of_Christ_the_Savior_%28Moscow%29" title="Cathedral of Christ the Savior (Moscow)"><span data-dcnode-id="4448" instrument_node="">Cathedral of Christ the Savior</span></a><span data-dcnode-id="4446" instrument_node=""> in Moscow was demolished by the Soviet authorities in 1931 to make way for the </span><a class="mw-redirect" data-dcnode-id="4444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palace_of_Soviets" title="Palace of Soviets"><span data-dcnode-id="4445" instrument_node="">Palace of Soviets</span></a><span data-dcnode-id="4443" instrument_node="">. The palace was never finished, and the cathedral was rebuilt in 2000.</span></div></div></div><span data-dcnode-id="4439" instrument_node="">
</span><p data-dcnode-id="4409"><span data-dcnode-id="4438" instrument_node="">Orthodox Christians constituted a majority of believers in the Soviet Union. In the late 1980s, three Orthodox churches claimed substantial memberships there: the </span><a data-dcnode-id="4436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Orthodox_Church" title="Russian Orthodox Church"><span data-dcnode-id="4437" instrument_node="">Russian Orthodox Church</span></a><span data-dcnode-id="4435" instrument_node="">, the </span><a data-dcnode-id="4433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georgian_Orthodox_Church" title="Georgian Orthodox Church"><span data-dcnode-id="4434" instrument_node="">Georgian Orthodox Church</span></a><span data-dcnode-id="4432" instrument_node="">, and the </span><a data-dcnode-id="4430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukrainian_Autocephalous_Orthodox_Church" title="Ukrainian Autocephalous Orthodox Church"><span data-dcnode-id="4431" instrument_node="">Ukrainian Autocephalous Orthodox Church</span></a><span data-dcnode-id="4429" instrument_node=""> (AOC). They were members of the major confederation of Orthodox churches in the world, generally referred to as the Eastern Orthodox Church. The first two functioned openly and were tolerated by the state, but the Ukrainian AOC was not permitted to function openly. Parishes of the </span><a data-dcnode-id="4427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belarusian_Autocephalous_Orthodox_Church" title="Belarusian Autocephalous Orthodox Church"><span data-dcnode-id="4428" instrument_node="">Belarusian Autocephalous Orthodox Church</span></a><span data-dcnode-id="4426" instrument_node=""> reappeared in Belarus only after the </span><a data-dcnode-id="4424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="4425" instrument_node="">dissolution of the Soviet Union</span></a><span data-dcnode-id="4423" instrument_node="">, but they did not receive recognition from the Belarusian </span><a data-dcnode-id="4421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exarchate" title="Exarchate"><span data-dcnode-id="4422" instrument_node="">Exarchate</span></a><span data-dcnode-id="4420" instrument_node=""> of the </span><a data-dcnode-id="4418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Orthodox_Church" title="Russian Orthodox Church"><span data-dcnode-id="4419" instrument_node="">Russian Orthodox Church</span></a><span data-dcnode-id="4417" instrument_node="">, which controls Belarusian </span><a class="mw-redirect" data-dcnode-id="4415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eparchies" title="Eparchies"><span data-dcnode-id="4416" instrument_node="">eparchies</span></a><span data-dcnode-id="4414" instrument_node="">.</span><sup class="reference" data-dcnode-id="4411" id="cite_ref-13"><a data-dcnode-id="4412" href="#cite_note-13"><span data-dcnode-id="4413" instrument_node="">[13]</span></a></sup><span data-dcnode-id="4410" instrument_node="">
</span></p><span data-dcnode-id="4408" instrument_node="">
</span><h4 data-dcnode-id="4398"><span class="mw-headline" data-dcnode-id="4406" id="Russian_Orthodox_Church"><span data-dcnode-id="4407" instrument_node="">Russian Orthodox Church</span></span><span class="mw-editsection" data-dcnode-id="4399"><span class="mw-editsection-bracket" data-dcnode-id="4404"><span data-dcnode-id="4405" instrument_node="">[</span></span><a data-dcnode-id="4402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D4" title="Edit section: Russian Orthodox Church"><span data-dcnode-id="4403" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4397" instrument_node="">
</span><p data-dcnode-id="4359"><span data-dcnode-id="4396" instrument_node="">According to both Soviet and Western sources</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4389" style="white-space:nowrap;"><span data-dcnode-id="4395" instrument_node="">[</span><i data-dcnode-id="4391"><a data-dcnode-id="4392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4393" title="This claim needs references to reliable sources. (February 2017)"><span data-dcnode-id="4394" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4390" instrument_node="">]</span></sup><sup class="noprint Inline-Template" data-dcnode-id="4382" style="white-space:nowrap;"><span data-dcnode-id="4388" instrument_node="">[</span><i data-dcnode-id="4384"><a class="mw-redirect" data-dcnode-id="4385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAvoid_weasel_words" title="Wikipedia:Avoid weasel words"><span data-dcnode-id="4386" title="The material near this tag possibly uses too vague attribution or weasel words. (November 2011)"><span data-dcnode-id="4387" instrument_node="">which?</span></span></a></i><span data-dcnode-id="4383" instrument_node="">]</span></sup><span data-dcnode-id="4381" instrument_node="">, in the late 1980s the Russian Orthodox Church had over 50 million believers but only about 7,000 registered active churches. Over 4,000 of these churches were located in the Ukrainian Republic (almost half of them in western </span><a data-dcnode-id="4379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="4380" instrument_node="">Ukraine</span></a><span data-dcnode-id="4378" instrument_node="">). The distribution of the six monasteries and ten convents of the Russian Orthodox Church was equally disproportionate: only two of the monasteries were located in the </span><a data-dcnode-id="4376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Soviet_Federative_Socialist_Republic" title="Russian Soviet Federative Socialist Republic"><span data-dcnode-id="4377" instrument_node="">Russian Soviet Federative Socialist Republic</span></a><span data-dcnode-id="4375" instrument_node="">, with another two in Ukraine and one each in </span><a data-dcnode-id="4373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belarus" title="Belarus"><span data-dcnode-id="4374" instrument_node="">Belarus</span></a><span data-dcnode-id="4372" instrument_node=""> and </span><a data-dcnode-id="4370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithuania" title="Lithuania"><span data-dcnode-id="4371" instrument_node="">Lithuania</span></a><span data-dcnode-id="4369" instrument_node="">. Seven convents were located in Ukraine and one each in </span><a data-dcnode-id="4367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moldova" title="Moldova"><span data-dcnode-id="4368" instrument_node="">Moldova</span></a><span data-dcnode-id="4366" instrument_node="">, </span><a data-dcnode-id="4364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estonia" title="Estonia"><span data-dcnode-id="4365" instrument_node="">Estonia</span></a><span data-dcnode-id="4363" instrument_node="">, and </span><a data-dcnode-id="4361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latvia" title="Latvia"><span data-dcnode-id="4362" instrument_node="">Latvia</span></a><span data-dcnode-id="4360" instrument_node="">.
</span></p><span data-dcnode-id="4358" instrument_node="">
</span><h4 data-dcnode-id="4348"><span class="mw-headline" data-dcnode-id="4356" id="Georgian_Orthodox_Church"><span data-dcnode-id="4357" instrument_node="">Georgian Orthodox Church</span></span><span class="mw-editsection" data-dcnode-id="4349"><span class="mw-editsection-bracket" data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">[</span></span><a data-dcnode-id="4352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D5" title="Edit section: Georgian Orthodox Church"><span data-dcnode-id="4353" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4350"><span data-dcnode-id="4351" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4347" instrument_node="">
</span><p data-dcnode-id="4339"><span data-dcnode-id="4346" instrument_node="">The Georgian Orthodox Church, another </span><a class="mw-redirect" data-dcnode-id="4344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autocephalous" title="Autocephalous"><span data-dcnode-id="4345" instrument_node="">autocephalous</span></a><span data-dcnode-id="4343" instrument_node=""> member of Eastern Orthodoxy, was headed by a Georgian patriarch.  In the late 1980s it had 15 bishops, 180 priests, 200 parishes, and an estimated 2.5&nbsp;million followers.  In 1811 the Georgian Orthodox Church was incorporated into the Russian Orthodox Church, but it regained its independence in 1917, after the fall of the </span><a data-dcnode-id="4341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tsar" title="Tsar"><span data-dcnode-id="4342" instrument_node="">Tsar</span></a><span data-dcnode-id="4340" instrument_node="">.  Nevertheless, the Russian Orthodox Church did not officially recognize its independence until 1943.
</span></p><span data-dcnode-id="4338" instrument_node="">
</span><h4 data-dcnode-id="4328"><span class="mw-headline" data-dcnode-id="4336" id="Ukrainian_Autocephalous_Orthodox_Church"><span data-dcnode-id="4337" instrument_node="">Ukrainian Autocephalous Orthodox Church</span></span><span class="mw-editsection" data-dcnode-id="4329"><span class="mw-editsection-bracket" data-dcnode-id="4334"><span data-dcnode-id="4335" instrument_node="">[</span></span><a data-dcnode-id="4332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D6" title="Edit section: Ukrainian Autocephalous Orthodox Church"><span data-dcnode-id="4333" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4330"><span data-dcnode-id="4331" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4327" instrument_node="">
</span><p data-dcnode-id="4313"><span data-dcnode-id="4326" instrument_node="">The Ukrainian AOC separated from the Russian Orthodox Church in 1919, when the short-lived Ukrainian state adopted a decree declaring autocephaly from the Ukrainian Orthodox Church.</span><sup class="noprint Inline-Template" data-dcnode-id="4318" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="4325" instrument_node="">[</span><i data-dcnode-id="4320"><a data-dcnode-id="4322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="4323" title="The text near this tag may need clarification or removal of jargon. (November 2011)"><span data-dcnode-id="4324" instrument_node="">clarification needed</span></span></a><span data-dcnode-id="4321" instrument_node=""> (from it or for it?)</span></i><span data-dcnode-id="4319" instrument_node="">]</span></sup><span data-dcnode-id="4317" instrument_node=""> Its independence was reaffirmed by the </span><a data-dcnode-id="4315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bolsheviks" title="Bolsheviks"><span data-dcnode-id="4316" instrument_node="">Bolsheviks</span></a><span data-dcnode-id="4314" instrument_node=""> in the Ukrainian Republic, and by 1924 it had 30 bishops, almost 1,500 priests, nearly 1,100 parishes, and between 4 and 6 million members.
</span></p><p data-dcnode-id="4299"><span data-dcnode-id="4312" instrument_node="">From its inception, the Ukrainian AOC faced the hostility of the Russian Orthodox Church in the Ukrainian Republic.  In the late 1920s, Soviet authorities accused it of nationalist tendencies.  In 1930 the government forced the church to reorganize as the "Ukrainian Orthodox Church", and few of its parishes survived until 1936. Nevertheless, the Ukrainian AOC continued to function outside the borders of the Soviet Union, and it was revived on Ukrainian territory under the German occupation during </span><a data-dcnode-id="4310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="4311" instrument_node="">World War II</span></a><span data-dcnode-id="4309" instrument_node="">.  In the late 1980s, some of the Orthodox faithful in the Ukrainian Republic appealed to the Soviet government to reestablish the Ukrainian AOC.</span><sup class="noprint Inline-Template" data-dcnode-id="4301" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="4308" instrument_node="">[</span><i data-dcnode-id="4303"><a data-dcnode-id="4305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="4306" title="The text near this tag may need clarification or removal of jargon. (November 2011)"><span data-dcnode-id="4307" instrument_node="">clarification needed</span></span></a><span data-dcnode-id="4304" instrument_node=""> (with what result?)</span></i><span data-dcnode-id="4302" instrument_node="">]</span></sup><span data-dcnode-id="4300" instrument_node="">
</span></p><span data-dcnode-id="4298" instrument_node="">
</span><h4 data-dcnode-id="4288"><span class="mw-headline" data-dcnode-id="4296" id="Armenian_Apostolic"><span data-dcnode-id="4297" instrument_node="">Armenian Apostolic</span></span><span class="mw-editsection" data-dcnode-id="4289"><span class="mw-editsection-bracket" data-dcnode-id="4294"><span data-dcnode-id="4295" instrument_node="">[</span></span><a data-dcnode-id="4292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D7" title="Edit section: Armenian Apostolic"><span data-dcnode-id="4293" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4290"><span data-dcnode-id="4291" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4287" instrument_node="">
</span><p data-dcnode-id="4279"><span data-dcnode-id="4286" instrument_node="">The </span><a data-dcnode-id="4284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Armenian_Apostolic_Church" title="Armenian Apostolic Church"><span data-dcnode-id="4285" instrument_node="">Armenian Apostolic Church</span></a><span data-dcnode-id="4283" instrument_node=""> is an independent </span><a class="mw-redirect" data-dcnode-id="4281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oriental_Orthodox" title="Oriental Orthodox"><span data-dcnode-id="4282" instrument_node="">Oriental Orthodox</span></a><span data-dcnode-id="4280" instrument_node=""> church. In the 1980s it had about 4 million adherents&nbsp;– almost the entire population of Armenia. It was permitted 6 bishops, between 50 and 100 priests, and between 20 and 30 churches, and it had one theological seminary and six monasteries.
</span></p><span data-dcnode-id="4278" instrument_node="">
</span><h3 data-dcnode-id="4268"><span class="mw-headline" data-dcnode-id="4276" id="Catholics"><span data-dcnode-id="4277" instrument_node="">Catholics</span></span><span class="mw-editsection" data-dcnode-id="4269"><span class="mw-editsection-bracket" data-dcnode-id="4274"><span data-dcnode-id="4275" instrument_node="">[</span></span><a data-dcnode-id="4272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D8" title="Edit section: Catholics"><span data-dcnode-id="4273" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4270"><span data-dcnode-id="4271" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4267" instrument_node="">
</span><p data-dcnode-id="4256"><span data-dcnode-id="4266" instrument_node="">Catholics formed a substantial and active religious constituency in the Soviet Union. Their number increased dramatically with the annexation of </span><a class="mw-redirect" data-dcnode-id="4264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polish_areas_annexed_by_the_Soviet_Union" title="Polish areas annexed by the Soviet Union"><span data-dcnode-id="4265" instrument_node="">territories of the Second Polish Republic</span></a><span data-dcnode-id="4263" instrument_node=""> in 1939 and the Baltic republics in 1940. Catholics in the Soviet Union were divided between those belonging to the </span><a class="mw-redirect" data-dcnode-id="4261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roman_Catholic_Church" title="Roman Catholic Church"><span data-dcnode-id="4262" instrument_node="">Roman Catholic Church</span></a><span data-dcnode-id="4260" instrument_node="">, which was recognized by the government, and those remaining loyal to the </span><a data-dcnode-id="4258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukrainian_Greek_Catholic_Church" title="Ukrainian Greek Catholic Church"><span data-dcnode-id="4259" instrument_node="">Ukrainian Greek Catholic Church</span></a><span data-dcnode-id="4257" instrument_node="">, banned since 1946.
</span></p><span data-dcnode-id="4255" instrument_node="">
</span><h4 data-dcnode-id="4245"><span class="mw-headline" data-dcnode-id="4253" id="Roman_Catholic_Church"><span data-dcnode-id="4254" instrument_node="">Roman Catholic Church</span></span><span class="mw-editsection" data-dcnode-id="4246"><span class="mw-editsection-bracket" data-dcnode-id="4251"><span data-dcnode-id="4252" instrument_node="">[</span></span><a data-dcnode-id="4249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D9" title="Edit section: Roman Catholic Church"><span data-dcnode-id="4250" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4247"><span data-dcnode-id="4248" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4244" instrument_node="">
</span><p data-dcnode-id="4235"><span data-dcnode-id="4243" instrument_node="">The majority of the 5.5&nbsp;million Roman Catholics in the Soviet Union lived in the Lithuanian, Belarusian, and Latvian republics, with a sprinkling in the Moldavian, Ukrainian, and Russian republics. Since World War II, the most active </span><a class="mw-redirect" data-dcnode-id="4241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roman_Catholic_Church" title="Roman Catholic Church"><span data-dcnode-id="4242" instrument_node="">Roman Catholic Church</span></a><span data-dcnode-id="4240" instrument_node=""> in the Soviet Union was in the Lithuanian Republic, where the majority of people are Catholics. The Roman Catholic Church there has been viewed as an institution that both fosters and defends Lithuanian national interests and values. Since 1972 a Catholic underground publication, </span><i data-dcnode-id="4237"><a class="mw-redirect" data-dcnode-id="4238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Chronicle_of_the_Catholic_Church_in_Lithuania" title="The Chronicle of the Catholic Church in Lithuania"><span data-dcnode-id="4239" instrument_node="">The Chronicle of the Catholic Church in Lithuania</span></a></i><span data-dcnode-id="4236" instrument_node="">, supported not only Lithuanians' religious rights but also their national rights.
</span></p><span data-dcnode-id="4234" instrument_node="">
</span><h4 data-dcnode-id="4224"><span class="mw-headline" data-dcnode-id="4232" id="Ukrainian_Greek_Catholic_Church"><span data-dcnode-id="4233" instrument_node="">Ukrainian Greek Catholic Church</span></span><span class="mw-editsection" data-dcnode-id="4225"><span class="mw-editsection-bracket" data-dcnode-id="4230"><span data-dcnode-id="4231" instrument_node="">[</span></span><a data-dcnode-id="4228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D10" title="Edit section: Ukrainian Greek Catholic Church"><span data-dcnode-id="4229" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4223" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="4217" role="note"><span data-dcnode-id="4220" instrument_node="">See also: </span><a data-dcnode-id="4218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_Christianity_in_Ukraine" title="History of Christianity in Ukraine"><span data-dcnode-id="4219" instrument_node="">History of Christianity in Ukraine</span></a></div><span data-dcnode-id="4216" instrument_node="">
</span><p data-dcnode-id="4185"><span data-dcnode-id="4215" instrument_node="">Western Ukraine, which included largely the historic region of </span><a data-dcnode-id="4213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galicia_%28Eastern_Europe%29" title="Galicia (Eastern Europe)"><span data-dcnode-id="4214" instrument_node="">Galicia</span></a><span data-dcnode-id="4212" instrument_node="">, became part of the Soviet Union in 1939. Although Ukrainian, its population was never part of the </span><a data-dcnode-id="4210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Empire" title="Russian Empire"><span data-dcnode-id="4211" instrument_node="">Russian Empire</span></a><span data-dcnode-id="4209" instrument_node="">, but was </span><a data-dcnode-id="4207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Catholic_Churches" title="Eastern Catholic Churches"><span data-dcnode-id="4208" instrument_node="">Eastern Rite</span></a><span data-dcnode-id="4206" instrument_node=""> Catholic. After the Second World War, the </span><a data-dcnode-id="4204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukrainian_Greek_Catholic_Church" title="Ukrainian Greek Catholic Church"><span data-dcnode-id="4205" instrument_node="">Ukrainian Greek Catholic Church</span></a><span data-dcnode-id="4203" instrument_node=""> identified closely with the nationalist aspirations of the region, arousing the hostility of the Soviet government, which was in combat with </span><a data-dcnode-id="4201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukrainian_Insurgent_Army" title="Ukrainian Insurgent Army"><span data-dcnode-id="4202" instrument_node="">Ukrainian Insurgency</span></a><span data-dcnode-id="4200" instrument_node="">. In 1945, Soviet authorities arrested the church's Metropolitan </span><a data-dcnode-id="4198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Josyf_Slipyj" title="Josyf Slipyj"><span data-dcnode-id="4199" instrument_node="">Josyf Slipyj</span></a><span data-dcnode-id="4197" instrument_node="">, nine bishops and hundreds of clergy and leading lay activists, and deported them to forced labor camps in Siberia and elsewhere. The nine bishops and many of the clergy died in prisons, concentration camps, internal exile, or soon after their release during the post-Stalin thaw,</span><sup class="reference" data-dcnode-id="4194" id="cite_ref-ugcc_14-0"><a data-dcnode-id="4195" href="#cite_note-ugcc-14"><span data-dcnode-id="4196" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4193" instrument_node=""> but after 18 years of imprisonment and persecution, Metropolitan Slipyj was released when </span><a data-dcnode-id="4191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pope_John_XXIII" title="Pope John XXIII"><span data-dcnode-id="4192" instrument_node="">Pope John XXIII</span></a><span data-dcnode-id="4190" instrument_node=""> intervened on his behalf. Slipyj went to Rome, where he received the title of Major Archbishop of Lviv, and became a cardinal in 1965.</span><sup class="reference" data-dcnode-id="4187" id="cite_ref-ugcc_14-1"><a data-dcnode-id="4188" href="#cite_note-ugcc-14"><span data-dcnode-id="4189" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4186" instrument_node="">
</span></p><p data-dcnode-id="4170"><span data-dcnode-id="4184" instrument_node="">In 1946 a synod was called in </span><a data-dcnode-id="4182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lviv" title="Lviv"><span data-dcnode-id="4183" instrument_node="">Lviv</span></a><span data-dcnode-id="4181" instrument_node="">, where, despite being uncanonical in both Catholic and Orthodox understanding, the </span><a data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Union_of_Brest" title="Union of Brest"><span data-dcnode-id="4180" instrument_node="">Union of Brest</span></a><span data-dcnode-id="4178" instrument_node=""> was annulled, and the Ukrainian Greek Catholic Church was officially annexed to the Russian Orthodox Church. </span><a data-dcnode-id="4176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St._George%2527s_Cathedral%2C_Lviv" title="St. George's Cathedral, Lviv"><span data-dcnode-id="4177" instrument_node="">St. George's Cathedral</span></a><span data-dcnode-id="4175" instrument_node=""> in Lviv became the throne of Russian Orthodox Archbishop Makariy.</span><sup class="reference" data-dcnode-id="4172" id="cite_ref-ugcc_14-2"><a data-dcnode-id="4173" href="#cite_note-ugcc-14"><span data-dcnode-id="4174" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4171" instrument_node="">
</span></p><p data-dcnode-id="4160"><span data-dcnode-id="4169" instrument_node="">For the clergy that joined the Russian Orthodox Church, the Soviet authorities refrained from the large-scale persecution seen elsewhere. In Lviv only one church was closed.  In fact, the western dioceses of Lviv-Ternopil and Ivano-Frankivsk were the largest in the USSR.  Canon law was also relaxed, allowing the clergy to shave their beards (a practice uncommon in Orthodoxy) and to conduct services in Ukrainian instead of Slavonic.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4162" style="white-space:nowrap;"><span data-dcnode-id="4168" instrument_node="">[</span><i data-dcnode-id="4164"><a data-dcnode-id="4165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4166" title="This claim needs references to reliable sources. (October 2020)"><span data-dcnode-id="4167" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4163" instrument_node="">]</span></sup><span data-dcnode-id="4161" instrument_node="">
</span></p><p data-dcnode-id="4151"><span data-dcnode-id="4159" instrument_node="">In 1989 the Ukrainian Greek Catholic Church was officially re-established after a catacomb period of more than 40 years.</span><sup class="reference" data-dcnode-id="4156" id="cite_ref-ugcc_14-3"><a data-dcnode-id="4157" href="#cite_note-ugcc-14"><span data-dcnode-id="4158" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4155" instrument_node=""> There followed conflicts between Orthodox and Catholic Christians regarding the ownership of church buildings, conflicts which continued into the 1990s, after the </span><a class="mw-redirect" data-dcnode-id="4153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Independence_of_Ukraine" title="Independence of Ukraine"><span data-dcnode-id="4154" instrument_node="">Independence of Ukraine</span></a><span data-dcnode-id="4152" instrument_node="">.
</span></p><span data-dcnode-id="4150" instrument_node="">
</span><h3 data-dcnode-id="4140"><span class="mw-headline" data-dcnode-id="4148" id="Protestants"><span data-dcnode-id="4149" instrument_node="">Protestants</span></span><span class="mw-editsection" data-dcnode-id="4141"><span class="mw-editsection-bracket" data-dcnode-id="4146"><span data-dcnode-id="4147" instrument_node="">[</span></span><a data-dcnode-id="4144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D11" title="Edit section: Protestants"><span data-dcnode-id="4145" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4139" instrument_node="">
</span><p data-dcnode-id="4101"><span data-dcnode-id="4138" instrument_node="">Protestant communities (particularly </span><a data-dcnode-id="4136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lutheranism" title="Lutheranism"><span data-dcnode-id="4137" instrument_node="">Lutherans</span></a><span data-dcnode-id="4135" instrument_node="">) first appeared in the Russian Empire in the 16th and 17th centuries in connection with expatriate communities from western Europe. In the 18th century, under </span><a data-dcnode-id="4133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catherine_the_Great" title="Catherine the Great"><span data-dcnode-id="4134" instrument_node="">Catherine II</span></a><span data-dcnode-id="4132" instrument_node=""> (the Great), large numbers of </span><a class="mw-redirect" data-dcnode-id="4130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germans_in_Russia" title="Germans in Russia"><span data-dcnode-id="4131" instrument_node="">German settlers</span></a><span data-dcnode-id="4129" instrument_node=""> were invited to the Russian Empire, including </span><a class="mw-redirect" data-dcnode-id="4127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mennonite" title="Mennonite"><span data-dcnode-id="4128" instrument_node="">Mennonites</span></a><span data-dcnode-id="4126" instrument_node="">, Lutherans, Reformed and also Roman Catholics. From the 17th to the 19th centuries, various new religious movements emerged from the Russian Orthodox Church (including </span><a data-dcnode-id="4124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Molokan" title="Molokan"><span data-dcnode-id="4125" instrument_node="">Molokans</span></a><span data-dcnode-id="4123" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dukhobor" title="Dukhobor"><span data-dcnode-id="4122" instrument_node="">Dukhobors</span></a><span data-dcnode-id="4120" instrument_node="">, </span><a data-dcnode-id="4118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Khlysts" title="Khlysts"><span data-dcnode-id="4119" instrument_node="">Khlysts</span></a><span data-dcnode-id="4117" instrument_node="">, and to some extent, </span><a data-dcnode-id="4115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Subbotniks" title="Subbotniks"><span data-dcnode-id="4116" instrument_node="">Subbotniks</span></a><span data-dcnode-id="4114" instrument_node="">, and in 19th century </span><a class="mw-redirect" data-dcnode-id="4112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tolstoyan" title="Tolstoyan"><span data-dcnode-id="4113" instrument_node="">Tolstoyan</span></a><span data-dcnode-id="4111" instrument_node=""> rural communes), and their existence prepared the ground for Protestantism's future spread. The first </span><a class="mw-redirect" data-dcnode-id="4109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baptist" title="Baptist"><span data-dcnode-id="4110" instrument_node="">Baptist</span></a><span data-dcnode-id="4108" instrument_node=""> communities within the Russian Empire arose in unrelated strains in three widely separated regions of the Russian Empire (Transcaucasia, Ukraine, and St. Petersburg) in the 1860s and 1870s. In the early twentieth century, </span><a data-dcnode-id="4106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pentecostalism" title="Pentecostalism"><span data-dcnode-id="4107" instrument_node="">Pentecostal</span></a><span data-dcnode-id="4105" instrument_node=""> groups also formed. In the very early years of Soviet power, the Bolsheviks focused their anti-religious efforts on the Russian Orthodox Church and it appeared to take a less hostile position towards the 'sectarians'. Already before Stalin's rise to power, the situation changed, however. And from the start of the 1930s, Protestants - like other religious groups - experienced the full force of Soviet repression. Churches were shut and religious leaders were arrested and convicted, often charged with anti-Soviet activity. One of the leaders of the Pentecostals movement, </span><a data-dcnode-id="4103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ivan_Voronaev" title="Ivan Voronaev"><span data-dcnode-id="4104" instrument_node="">Ivan Voronaev</span></a><span data-dcnode-id="4102" instrument_node="">, was sentenced to death in 1937, for example.
</span></p><span data-dcnode-id="4100" instrument_node="">
</span><h4 data-dcnode-id="4089"><span data-dcnode-id="4099" id="Baptists.2C_Evangelical_Christians.2C_and_Pentecostals"></span><span class="mw-headline" data-dcnode-id="4097" id="Baptists,_Evangelical_Christians,_and_Pentecostals"><span data-dcnode-id="4098" instrument_node="">Baptists, Evangelical Christians, and Pentecostals</span></span><span class="mw-editsection" data-dcnode-id="4090"><span class="mw-editsection-bracket" data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">[</span></span><a data-dcnode-id="4093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D12" title="Edit section: Baptists, Evangelical Christians, and Pentecostals"><span data-dcnode-id="4094" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4088" instrument_node="">
</span><p data-dcnode-id="4059"><span data-dcnode-id="4087" instrument_node="">The Second World War saw a relaxation of church-state relations in the Soviet Union and the Protestant community benefited alongside their </span><a data-dcnode-id="4085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1943_Bishops%2527_Council_of_the_Russian_Orthodox_Church" title="1943 Bishops' Council of the Russian Orthodox Church"><span data-dcnode-id="4086" instrument_node="">Russian Orthodox counterparts</span></a><span data-dcnode-id="4084" instrument_node="">. In 1944, the All-Union Council of Evangelical Christians-Baptists was formed, bringing together the two main strands within Soviet Protestantism. Over the following two years, the leaders of the two main </span><a class="external text" data-dcnode-id="4082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dhi.ac.uk/protestantizm/section/%3Fsection%3Dpentecostals" rel="nofollow"><span data-dcnode-id="4083" instrument_node="">Pentecostal branches</span></a><span data-dcnode-id="4081" instrument_node=""> within the Soviet Union also agreed to join. The immediate post-war period saw the growth of Baptist and Pentecostal congregations and there was a </span><a class="external text" data-dcnode-id="4079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dhi.ac.uk/protestantizm/section/%3Fsection%3Dawakening" rel="nofollow"><span data-dcnode-id="4080" instrument_node="">religious revival</span></a><span data-dcnode-id="4078" instrument_node=""> in these years. Statistics provided by the leaders of the registered church suggest 250,000 baptised members in 1946 rising to 540,000 by 1958.</span><sup class="reference" data-dcnode-id="4075" id="cite_ref-15"><a data-dcnode-id="4076" href="#cite_note-15"><span data-dcnode-id="4077" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4074" instrument_node=""> In fact the influence of the Protestantism was much wider than these figures suggest: in addition to the existence of unregistered Baptist and Pentecostal groups, there were also thousands who attended worship without taking baptism. Many Baptist and Pentecostal congregations were in </span><a data-dcnode-id="4072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukrainian_Soviet_Socialist_Republic" title="Ukrainian Soviet Socialist Republic"><span data-dcnode-id="4073" instrument_node="">Ukraine</span></a><span data-dcnode-id="4071" instrument_node="">. Women significantly outnumbered men in these congregations, though the pastors were male.</span><sup class="reference" data-dcnode-id="4068" id="cite_ref-16"><a data-dcnode-id="4069" href="#cite_note-16"><span data-dcnode-id="4070" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4067" instrument_node=""> By 1991, </span><a data-dcnode-id="4065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="4066" instrument_node="">Ukraine</span></a><span data-dcnode-id="4064" instrument_node=""> had the second largest Baptist community in the world, behind only the United States.</span><sup class="reference" data-dcnode-id="4061" id="cite_ref-NCEEER_17-0"><a data-dcnode-id="4062" href="#cite_note-NCEEER-17"><span data-dcnode-id="4063" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4060" instrument_node="">
</span></p><p data-dcnode-id="4054"><span data-dcnode-id="4058" instrument_node="">Although the Soviet state had established the All-Union Council of Evangelical Christians-Baptists in 1944, and encouraged congregations to register, this did not signal the end to the persecution of Christians. Many leaders and ordinary believers of different Protestant communities fell victims to the persecution by Communist government, including </span><a class="external text" data-dcnode-id="4056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dhi.ac.uk/protestantizm/section/%3Fsection%3Dgulag" rel="nofollow"><span data-dcnode-id="4057" instrument_node="">imprisonment.</span></a><span data-dcnode-id="4055" instrument_node=""> Persecution was particularly vicious in the years 1948-53 and again in the early 1960s.
</span></p><p data-dcnode-id="4043"><span data-dcnode-id="4053" instrument_node="">Despite the Soviet state's attempt to create a single, unified church movement, there were many </span><a class="external text" data-dcnode-id="4051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dhi.ac.uk/protestantizm/section/%3Fsection%3Dchurch" rel="nofollow"><span data-dcnode-id="4052" instrument_node="">divisions within the evangelical church</span></a><span data-dcnode-id="4050" instrument_node="">. In the early 1960s, a break-away group formed a new movement which called for a spiritual awakening and greater independence from the Soviet state. Leaders of this group (eventually known as the </span><a class="new" data-dcnode-id="4048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCouncil_of_the_Church_of_Evangelical_Christians-Baptists%26action%3Dedit%26redlink%3D1" title="Council of the Church of Evangelical Christians-Baptists (page does not exist)"><span data-dcnode-id="4049" instrument_node="">Council of the Church of Evangelical Christians-Baptists</span></a><span data-dcnode-id="4047" instrument_node="">) faced particularly persecution. </span><a class="external text" data-dcnode-id="4045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dhi.ac.uk/protestantizm/section/%3Fsection%3Dpentecostals" rel="nofollow"><span data-dcnode-id="4046" instrument_node="">Pentecostals</span></a><span data-dcnode-id="4044" instrument_node="">, too, formed their own, underground organisation and were targeted by the state as a result.
</span></p><span data-dcnode-id="4042" instrument_node="">
</span><h4 data-dcnode-id="4032"><span class="mw-headline" data-dcnode-id="4040" id="Lutherans"><span data-dcnode-id="4041" instrument_node="">Lutherans</span></span><span class="mw-editsection" data-dcnode-id="4033"><span class="mw-editsection-bracket" data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">[</span></span><a data-dcnode-id="4036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D13" title="Edit section: Lutherans"><span data-dcnode-id="4037" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4031" instrument_node="">
</span><p data-dcnode-id="4002"><span data-dcnode-id="4030" instrument_node="">Lutherans, the second largest Protestant group, lived for the most part in the Latvian and Estonian republics. In the 1980s, Lutheran churches in these republics identified to some extent with nationality issues</span><sup class="noprint Inline-Template" data-dcnode-id="4023" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="4029" instrument_node="">[</span><i data-dcnode-id="4025"><a data-dcnode-id="4026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="4027" title="The text near this tag may need clarification or removal of jargon. (November 2011)"><span data-dcnode-id="4028" instrument_node="">clarification needed</span></span></a></i><span data-dcnode-id="4024" instrument_node="">]</span></sup><span data-dcnode-id="4022" instrument_node=""> in the two republics. The state's attitude toward Lutherans was generally benign.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4015" style="white-space:nowrap;"><span data-dcnode-id="4021" instrument_node="">[</span><i data-dcnode-id="4017"><a data-dcnode-id="4018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4019" title="This claim needs references to reliable sources. (April 2017)"><span data-dcnode-id="4020" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4016" instrument_node="">]</span></sup><span data-dcnode-id="4014" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="4012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lutheran_Church" title="Lutheran Church"><span data-dcnode-id="4013" instrument_node="">Lutheran Church</span></a><span data-dcnode-id="4011" instrument_node=""> in different regions of the country was persecuted during the Soviet era, and church property was confiscated.</span><sup class="reference" data-dcnode-id="4008" id="cite_ref-RISU_18-0"><a data-dcnode-id="4009" href="#cite_note-RISU-18"><span data-dcnode-id="4010" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4007" instrument_node=""> Many of its members and pastors were oppressed, and some were forced to emigrate.</span><sup class="reference" data-dcnode-id="4004" id="cite_ref-Keston_19-0"><a data-dcnode-id="4005" href="#cite_note-Keston-19"><span data-dcnode-id="4006" instrument_node="">[19]</span></a></sup><span data-dcnode-id="4003" instrument_node="">
</span></p><span data-dcnode-id="4001" instrument_node="">
</span><h4 data-dcnode-id="3991"><span class="mw-headline" data-dcnode-id="3999" id="Other_Protestants"><span data-dcnode-id="4000" instrument_node="">Other Protestants</span></span><span class="mw-editsection" data-dcnode-id="3992"><span class="mw-editsection-bracket" data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">[</span></span><a data-dcnode-id="3995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D14" title="Edit section: Other Protestants"><span data-dcnode-id="3996" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3990" instrument_node="">
</span><p data-dcnode-id="3982"><span data-dcnode-id="3989" instrument_node="">A number of other Protestant groups were present, including </span><a class="mw-redirect" data-dcnode-id="3987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adventists" title="Adventists"><span data-dcnode-id="3988" instrument_node="">Adventists</span></a><span data-dcnode-id="3986" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reformed_tradition" title="Reformed tradition"><span data-dcnode-id="3985" instrument_node="">Reformed</span></a><span data-dcnode-id="3983" instrument_node="">.
</span></p><span data-dcnode-id="3981" instrument_node="">
</span><h3 data-dcnode-id="3971"><span class="mw-headline" data-dcnode-id="3979" id="Other_Christian_groups"><span data-dcnode-id="3980" instrument_node="">Other Christian groups</span></span><span class="mw-editsection" data-dcnode-id="3972"><span class="mw-editsection-bracket" data-dcnode-id="3977"><span data-dcnode-id="3978" instrument_node="">[</span></span><a data-dcnode-id="3975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D15" title="Edit section: Other Christian groups"><span data-dcnode-id="3976" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3970" instrument_node="">
</span><p data-dcnode-id="3955"><span data-dcnode-id="3969" instrument_node="">The March 1961 instruction on religious cults explained for the first time, that 
"sects, the teaching and character of activities of which has anti-state and savagely extremist [изуверский] character: </span><a data-dcnode-id="3967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jehovah%2527s_Witnesses" title="Jehovah's Witnesses"><span data-dcnode-id="3968" instrument_node="">Jehovah's Witnesses</span></a><span data-dcnode-id="3966" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pentecostalists" title="Pentecostalists"><span data-dcnode-id="3965" instrument_node="">Pentecostalists</span></a><span data-dcnode-id="3963" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adventists" title="Adventists"><span data-dcnode-id="3962" instrument_node="">Adventists</span></a><span data-dcnode-id="3960" instrument_node="">-reformists" are not to be registered</span><sup class="reference" data-dcnode-id="3957" id="cite_ref-20"><a data-dcnode-id="3958" href="#cite_note-20"><span data-dcnode-id="3959" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3956" instrument_node=""> and were thus banned.
</span></p><p data-dcnode-id="3944"><span data-dcnode-id="3954" instrument_node="">A number of congregations of </span><a data-dcnode-id="3952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Mennonite" title="Russian Mennonite"><span data-dcnode-id="3953" instrument_node="">Russian Mennonites</span></a><span data-dcnode-id="3951" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jehovah%2527s_Witness" title="Jehovah's Witness"><span data-dcnode-id="3950" instrument_node="">Jehovah's Witnesses</span></a><span data-dcnode-id="3948" instrument_node="">, and other Christian groups existed in the Soviet Union. Nearly 9,000 Jehovah's Witnesses were deported to Siberia in 1951; the numbers of those who were not deported is unknown. The number of Jehovah's Witnesses increased greatly over this period, with a KGB estimate of around 20,000 in 1968. Russian Mennonites began to emigrate from the Soviet Union in the face of increasing violence and persecution, state restrictions on freedom of religion, and biased allotments of </span><a class="mw-redirect" data-dcnode-id="3946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communal_farming" title="Communal farming"><span data-dcnode-id="3947" instrument_node="">communal farmland</span></a><span data-dcnode-id="3945" instrument_node="">. They emigrated to Germany, Britain, the United States, parts of South America, and other regions.
</span></p><span data-dcnode-id="3943" instrument_node="">
</span><h2 data-dcnode-id="3933"><span class="mw-headline" data-dcnode-id="3941" id="Judaism"><span data-dcnode-id="3942" instrument_node="">Judaism</span></span><span class="mw-editsection" data-dcnode-id="3934"><span class="mw-editsection-bracket" data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">[</span></span><a data-dcnode-id="3937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D16" title="Edit section: Judaism"><span data-dcnode-id="3938" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3932" instrument_node="">
</span><p data-dcnode-id="3927"><span data-dcnode-id="3931" instrument_node="">See </span><a data-dcnode-id="3929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_Jews_in_the_Soviet_Union" title="History of the Jews in the Soviet Union"><span data-dcnode-id="3930" instrument_node="">History of the Jews in the Soviet Union</span></a><span data-dcnode-id="3928" instrument_node="">.
</span></p><span data-dcnode-id="3926" instrument_node="">
</span><h2 data-dcnode-id="3916"><span class="mw-headline" data-dcnode-id="3924" id="Islam"><span data-dcnode-id="3925" instrument_node="">Islam</span></span><span class="mw-editsection" data-dcnode-id="3917"><span class="mw-editsection-bracket" data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">[</span></span><a data-dcnode-id="3920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReligion_in_the_Soviet_Union%26action%3Dedit%26section%3D17" title="Edit section: Islam"><span data-dcnode-id="3921" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3915" instrument_node="">
</span><link data-dcnode-id="3914" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3910" role="note"><span data-dcnode-id="3913" instrument_node="">Main article: </span><a data-dcnode-id="3911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islam_in_the_Soviet_Union" title="Islam in the Soviet Union"><span data-dcnode-id="3912" instrument_node="">Islam in the Soviet Union</span></a></div><span data-dcnode-id="3909" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3900"><div class="thumbinner" data-dcnode-id="3901" style="width:302px;"><a class="image" data-dcnode-id="3907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASoviet_Union_Muslim_Population_1979.jpg"><img alt="" class="thumbimage" data-dcnode-id="3908" data-file-height="1238" data-file-width="1035" decoding="async" height="359" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Soviet_Union_Muslim_Population_1979.jpg/300px-Soviet_Union_Muslim_Population_1979.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Soviet_Union_Muslim_Population_1979.jpg/450px-Soviet_Union_Muslim_Population_1979.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Soviet_Union_Muslim_Population_1979.jpg/600px-Soviet_Union_Muslim_Population_1979.jpg 2x" width="300"></a><span data-dcnode-id="3906" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3902"><div class="magnify" data-dcnode-id="3904"><a class="internal" data-dcnode-id="3905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASoviet_Union_Muslim_Population_1979.jpg" title="Enlarge"></a></div><span data-dcnode-id="3903" instrument_node="">Map showing the distribution of Muslims within the Soviet Union in 1979 as a percentage of the population by administrative division.</span></div></div></div><span data-dcnode-id="3899" instrument_node="">
</span><p data-dcnode-id="3890"><span data-dcnode-id="3898" instrument_node="">After the Bolshevik revolution, Islam was for some time (until 1929) treated better than the Russian Orthodox Church, which Bolsheviks regarded as a center of the "reaction", and other religions. In the declaration "Ко всем трудящимся мусульманам России и Востока" (</span><i data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">To All Working Muslims in Russia and the Orient</span></i><span data-dcnode-id="3895" instrument_node="">) of November 1917, the Bolshevik government declared the freedom to exercise their religion and customs for Muslims "whose beliefs and customs had been suppressed by the Czars and the Russian oppressors".</span><sup class="reference" data-dcnode-id="3892" id="cite_ref-21"><a data-dcnode-id="3893" href="#cite_note-21"><span data-dcnode-id="3894" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3891" instrument_node="">
</span></p><p data-dcnode-id="3884"><span data-dcnode-id="3889" instrument_node="">In the second half of 1920s and in 1930s, state repressions, suppression and atheist propaganda against all religions increased. E.g. in 1930, out of the 12,000 mosques in Tatarstan, more than 10,000 were closed, from 90 to 97% mullahs and muezzins were deprived of the right to exercise their profession.</span><sup class="reference" data-dcnode-id="3886" id="cite_ref-22"><a data-dcnode-id="3887" href="#cite_note-22"><span data-dcnode-id="3888" instrument_node="">[22]</span></a></sup><span data-dcnode-id="3885" instrument_node="">
</span></p><p data-dcnode-id="3872"><span data-dcnode-id="3883" instrument_node="">During the </span><a data-dcnode-id="3881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Patriotic_War_%28term%29" title="Great Patriotic War (term)"><span data-dcnode-id="3882" instrument_node="">Great Patriotic War</span></a><span data-dcnode-id="3880" instrument_node="">, the restrictions on religion were erased somewhat. In 1943 the </span><a data-dcnode-id="3878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spiritual_Administration_of_the_Muslims_of_Central_Asia_and_Kazakhstan" title="Spiritual Administration of the Muslims of Central Asia and Kazakhstan"><span data-dcnode-id="3879" instrument_node="">Spiritual Administration of the Muslims of Central Asia and Kazakhstan</span></a><span data-dcnode-id="3877" instrument_node=""> was established. In 1949, 415 registered mosques functioned in the Soviet Union.</span><sup class="reference" data-dcnode-id="3874" id="cite_ref-23"><a data-dcnode-id="3875" href="#cite_note-23"><span data-dcnode-id="3876" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3873" instrument_node="">
</span></p><p data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">In the late 1980s, Islam had the second largest following in the Soviet Union: between 45 and 50 million people identified themselves as Muslims. But the Soviet Union had only about 500 working mosques, a fraction of the number in prerevolutionary Russia, and Soviet law forbade Islamic religious activity outside working mosques and Islamic schools.
</span></p><p data-dcnode-id="3856"><span data-dcnode-id="3869" instrument_node="">All working mosques, religious schools, and Islamic publications were supervised by four "spiritual directorates" established by Soviet authorities to provide government control.  The </span><a data-dcnode-id="3867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spiritual_Administration_of_the_Muslims_of_Central_Asia_and_Kazakhstan" title="Spiritual Administration of the Muslims of Central Asia and Kazakhstan"><span data-dcnode-id="3868" instrument_node="">Spiritual Directorate for Central Asia and Kazakhstan</span></a><span data-dcnode-id="3866" instrument_node="">, the Spiritual Directorate for the European Soviet Union and Siberia, and the Spiritual Directorate for the Northern Caucasus and </span><a data-dcnode-id="3864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dagestan" title="Dagestan"><span data-dcnode-id="3865" instrument_node="">Dagestan</span></a><span data-dcnode-id="3863" instrument_node=""> oversaw the religious life of Sunni Muslims.  The Spiritual Directorate for Transcaucasia dealt with both </span><a class="mw-redirect" data-dcnode-id="3861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sunni_Muslims" title="Sunni Muslims"><span data-dcnode-id="3862" instrument_node="">Sunni Muslims</span></a><span data-dcnode-id="3860" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shia" title="Shia"><span data-dcnode-id="3859" instrument_node="">Shia</span></a><span data-dcnode-id="3857" instrument_node=""> Muslims.  The overwhelming majority of the Muslims were Sunnis.
</span></p><p data-dcnode-id="3845"><span data-dcnode-id="3855" instrument_node="">Soviet Muslims differed linguistically and culturally from each other, speaking about fifteen </span><a data-dcnode-id="3853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkic_languages" title="Turkic languages"><span data-dcnode-id="3854" instrument_node="">Turkic languages</span></a><span data-dcnode-id="3852" instrument_node="">, ten </span><a data-dcnode-id="3850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iranian_languages" title="Iranian languages"><span data-dcnode-id="3851" instrument_node="">Iranian languages</span></a><span data-dcnode-id="3849" instrument_node="">, and thirty </span><a class="mw-redirect" data-dcnode-id="3847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caucasian_languages" title="Caucasian languages"><span data-dcnode-id="3848" instrument_node="">Caucasian languages</span></a><span data-dcnode-id="3846" instrument_node="">.  Hence, communication between different Muslim groups was difficult. In 1989 Russian often served as a lingua franca among some educated Muslims.
</span></p><p data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">Culturally, some Muslim groups had highly developed urban traditions, whereas others were recently nomadic.  Some lived in industrialized environments, others in isolated mountainous regions.  In sum, Muslims were not a homogeneous group with a common national identity and heritage, although they shared the same religion and the same country.
</span></p><p data-dcnode-id="3835"><span data-dcnode-id="3842" instrument_node="">In the late 1980s, unofficial Muslim congregations, meeting in tea houses and private homes with their own </span><a data-dcnode-id="3840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mullah" title="Mullah"><span data-dcnode-id="3841" instrument_node="">mullahs</span></a><span data-dcnode-id="3839" instrument_node="">, greatly outnumbered those in the officially sanctioned mosques. The unofficial mullahs were either self-taught or informally trained by other mullahs. In the late 1980s, unofficial Islam appeared to split into fundamentalist congregations and groups that emphasized </span><a data-dcnode-id="3837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sufism" title="Sufism"><span data-dcnode-id="3838" instrument_node="">Sufism</span></a><span data-dcnode-id="3836" instrument_node="">.
</span></p><span data-dcnode-id="3834" instrument_node="">
