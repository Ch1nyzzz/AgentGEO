be constructive after all.”</span></em></p><p data-dcnode-id="1374"><em data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">“There were such strong attacks on him after his visit to Moscow just because we explained what we thought about [Alexey] Navalny and everything else, and about the role of Germany and Europe in general in fanning these lies, and the inability to present any facts and answer elementary questions,”</span></em><span data-dcnode-id="1375" instrument_node=""> Lavrov said.&nbsp;</span></p><div class="read-more" data-dcnode-id="1346" data-has-alias=""><span data-dcnode-id="1373" instrument_node="">

                    &lt;img src="https://cdni.russiatoday.com/files/2021.12/xxs/61bca5cd85f5401a7e4688a0.JPG" alt="EU threatens to cut Russia off SWIFT"/&gt;

</span><span class="read-more__footer_small" data-dcnode-id="1350"><b data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">READ MORE: </span></b><span data-dcnode-id="1351" instrument_node="">EU threatens to cut Russia off SWIFT</span></span><span data-dcnode-id="1349" instrument_node="">
</span></a><span data-dcnode-id="1347" instrument_node="">
</span></div><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1344" instrument_node="">He recalled that the EU’s former high representative for foreign affairs, Federica Mogherini, had invented five core areas for relations with Russia, with one of the main principles focusing on normalization as long as Moscow complies with the Minsk agreements on Donbass. According to him, anyone who has read the protocols </span><em data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">“will understand that this is political schizophrenia.”</span></em></p><p data-dcnode-id="1331"><span data-dcnode-id="1340" instrument_node="">Moscow’s foreign minister slammed Brussels’ </span><em data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">“choreography”</span></em><span data-dcnode-id="1337" instrument_node=""> of the </span><em data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">“push-back, constraint and engage”</span></em><span data-dcnode-id="1334" instrument_node=""> strategy, stating that it was </span><em data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">“political Kama sutra.”</span></em></p><p data-dcnode-id="1327"><span data-dcnode-id="1330" instrument_node="">The broadside from Lavrov comes after the European Parliament said in a resolution that Moscow runs the risk of being completely shut out of the major global payment system SWIFT if Russian troops launch an invasion of Ukraine. In the text, Brussels said the bloc must be ready to send </span><em data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">“a very stark warning that military hostilities will not only be unacceptable, but also come at a high economic and political price.”</span></em></p><p data-dcnode-id="1323"><span data-dcnode-id="1326" instrument_node="">In June, the European Commission and Borrell prepared a report on relations with Moscow. He said that </span><em data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">“under present circumstances, a renewed partnership between the European Union and Russia, allowing for closer cooperation, seems a distant prospect. Our ambition should be to explore paths that could help change the current dynamics gradually into a more predictable and stable relationship.”</span></em></p><p data-dcnode-id="1318"><span data-dcnode-id="1322" instrument_node="">According to the handout, the EU </span><em data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">“will continue to push back against human rights violations and will speak up for democratic values,”</span></em><span data-dcnode-id="1319" instrument_node=""> as well as Moscow’s alleged breaches of international law in Ukraine, Georgia, and elsewhere. While Brussels will attempt to constrain Russia’s attempts to undermine the bloc’s interests, it will attempt to engage with the world’s largest country on key issues, such as the Covid-19 pandemic, climate change, and counterterrorism.&nbsp;</span></p><p data-dcnode-id="1308"><span data-dcnode-id="1317" instrument_node="">Earlier this year, the EU put forward a draft report demanding that the bloc take a more confrontational approach to Moscow. The paper said Brussels should</span><em data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node=""> “convey the potential benefits that it is willing to offer in return for a democratic transformation”</span></em><span data-dcnode-id="1314" instrument_node=""> of the country, and also suggested targeting </span><em data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">“propaganda”</span></em><span data-dcnode-id="1311" instrument_node=""> with the establishment of a </span><em data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">“Free Russia Television with 24/7 airtime.”</span></em></p><p data-dcnode-id="1307"></p></div><div class="article__share article__share_bottom" data-dcnode-id="1270"><div class="article__invitation" data-dcnode-id="1304"><span d
