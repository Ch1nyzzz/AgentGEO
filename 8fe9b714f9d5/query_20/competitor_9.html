</span><div class="content-main" data-dcnode-id="708"><span data-dcnode-id="729" instrument_node="">
</span><div class="paragraph type-text" data-dcnode-id="710"><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">We believe that human beings are essentially individuals endowed with reason and should be afforded the maximum possible freedom consistent with freedom for all. However, equality and equal opportunities should be accompanied with responsibility and hard work. These principles are articulated in the core values of liberalism that include the following:</span></p><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">• Individualism – the belief in the importance of the individual over any social group or collective body.</span></p><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">• Rationalism – the belief that the world has a rational structure, and that this can be disclosed through the exercise of human reason and critical inquiry.</span></p><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">• Freedom – the ability to think or act as one wishes in accordance with self-determination.</span></p><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">• Responsibility – being responsible for oneself and one’s own economic and social circumstance.</span></p><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">• Justice - morally justifiable distribution of rewards and punishment.</span></p><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">• Tolerance - forbearance, a willingness to accept views or actions that one disagrees or of which one disapproves.</span></p><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Source: Liberalism – a primer BY JULIO C. TEEHANKEE, Ph.D. 2005</span></p><span data-dcnode-id="711" instrument_node="">
