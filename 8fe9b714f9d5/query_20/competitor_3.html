</span><h2 data-dcnode-id="63"><span data-dcnode-id="64" instrument_node="">What Are Democratic Values?</span></h2><span data-dcnode-id="62" instrument_node="">
</span><p data-dcnode-id="60"><span data-dcnode-id="61" instrument_node="">Democracy is all about being able to make  informed choices. For example, if there are three political parties in an  election, you make a choice from the individual candidates, and/or from the  programmes and positions of the parties they represent.</span></p><span data-dcnode-id="59" instrument_node="">
</span><p data-dcnode-id="57"><span data-dcnode-id="58" instrument_node="">In order for you to make genuinely informed  choices, you need to be able to:</span></p><span data-dcnode-id="56" instrument_node="">
</span><ul data-dcnode-id="39"><span data-dcnode-id="55" instrument_node="">
</span><li data-dcnode-id="53"><span data-dcnode-id="54" instrument_node="">engage  meaningfully in open dialogue and debate</span></li><span data-dcnode-id="52" instrument_node="">
</span><li data-dcnode-id="50"><span data-dcnode-id="51" instrument_node="">access  relevant and objective information so that your views are informed</span></li><span data-dcnode-id="49" instrument_node="">
</span><li data-dcnode-id="47"><span data-dcnode-id="48" instrument_node="">perceive  that your participation in the debate and subsequent decision-making has value</span></li><span data-dcnode-id="46" instrument_node="">
</span><li data-dcnode-id="44"><span data-dcnode-id="45" instrument_node="">feel  safe</span></li><span data-dcnode-id="43" instrument_node="">
</span><li data-dcnode-id="41"><span data-dcnode-id="42" instrument_node="">make  a free decision without suffering or fearing harm to yourself or your family.</span></li><span data-dcnode-id="40" instrument_node="">
</span></ul><span data-dcnode-id="38" instrument_node="">
</span><p data-dcnode-id="36"><span data-dcnode-id="37" instrument_node="">Amartya Sen, a Nobel Prize-winning economist  from India, provides this view of how these elements combine:</span></p><span data-dcnode-id="35" instrument_node="">
</span><blockquote data-dcnode-id="30"><span data-dcnode-id="34" instrument_node="">
</span><p data-dcnode-id="32"><span data-dcnode-id="33" instrument_node="">We must not identify democracy with majority  rule. Democracy has complex demands, which certainly include voting and respect  for election results, but it also requires the protection of liberties and  freedoms, respect for legal entitlements and the guaranteeing of free and  uncensored distribution of news and fair comment. Even elections can be deeply  defective if they occur without the different sides getting an adequate  opportunity to present their respective cases, or without the electorate enjoying  the freedom to obtain news and to consider the views of competing  protagonists. (Sen, 1999, pp.9–10)</span></p><span data-dcnode-id="31" instrument_node="">
</span></blockquote><span data-dcnode-id="29" instrument_node="">
</span><p data-dcnode-id="27"><span data-dcnode-id="28" instrument_node="">Based on what we have read so far, in the next  section we are going on to look in some detail at the principles that underpin  our ideas of democracy.</span></p><span data-dcnode-id="26" instrument_node="">
