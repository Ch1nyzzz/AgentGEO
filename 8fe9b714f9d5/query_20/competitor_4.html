Democratic Party on Principles &amp; Values
</span></h1></center><span data-dcnode-id="695" instrument_node="">
</span><h2 data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Party Platform</span></h2><span data-dcnode-id="692" instrument_node="">
</span></td></tr><tr data-dcnode-id="686"><td data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">

</span></td></tr></tbody></table><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="676"><br data-dcnode-id="682"><span data-dcnode-id="681" instrument_node="">
</span><span data-dcnode-id="679" instrument_node="">
</span><a data-dcnode-id="678" name="27"></a><span data-dcnode-id="677" instrument_node="">
</span></p><h3 data-dcnode-id="673"><center data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">
For religious pluralism, not exemptions for discrimination
</span></center></h3><span data-dcnode-id="672" instrument_node="">
Democrats celebrate America's history of religious pluralism and tolerance, and recognize the countless acts of service of our faith communities, as well as the paramount importance of maintaining the separation between
church and state enshrined in our Constitution. We will reject the Trump Administration's use of broad religious exemptions to allow businesses, medical providers, social service agencies, and others to discriminate.
</span><center data-dcnode-id="669"><font data-dcnode-id="670" face="Arial" size="1"><span data-dcnode-id="671" instrument_node="">
Source: Democratic Party Platform adopted at 2020 Convention
, Jul 27, 2020
</span></font></center><p data-dcnode-id="665"><span data-dcnode-id="668" instrument_node="">
</span><a data-dcnode-id="667" name="28"></a><span data-dcnode-id="666" instrument_node="">
</span></p><h3 data-dcnode-id="662"><center data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">
Free press essential; look at antitrust impact of mergers
</span></center></h3><span data-dcnode-id="661" instrument_node="">
The free press is essential to our free democracy. Democrats roundly reject President Trump's denigration of the free and independent press, which has endangered reporters' lives, helped fuel conspiracy theories, and deepened distrust between
Americans and their government. Democrats are concerned about the potentially harmful effects of corporate consolidation and will direct federal antitrust agencies to investigate the economic impacts of mergers in the media industry.
</span><center data-dcnode-id="658"><font data-dcnode-id="659" face="Arial" size="1"><span data-dcnode-id="660" instrument_node="">
Source: Democratic Party Platform adopted at 2020 Convention
, Jul 27, 2020
</span></font></center><p data-dcnode-id="654"><span data-dcnode-id="657" instrument_node="">
</span><a data-dcnode-id="656" name="29"></a><span data-dcnode-id="655" instrument_node="">
</span></p><h3 data-dcnode-id="651"><center data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">
Planned 12 Democratic 2020 presidential primary debates
</span></center></h3><span data-dcnode-id="650" instrument_node="">
In an interview with Politico regarding the March 15 debate, a DNC official confirmed a twelfth debate was still being planned. Two candidates (Gabbard and Sanders) suspended their campaigns between the eleventh and twelfth debates, leaving
Biden as the only remaining major candidate. Prior to suspending his campaign, Sanders stated that he planned to participate in the debate. Biden dismissed the idea, however: "My focus is just dealing with this crisis right now.
I haven't thought about any more debates. I think we've had enough debates. I think we should get on with this." It is likely that the debate would have been hosted in an East Coast location, such as New York City. On April 8, 2020,
Sanders dropped out of the Democratic primary, leaving Joe Biden as the presumptive Democratic nominee. In early June 2020, Biden passed the threshold of 1,991 delegates to gain the nomination at the 2020 Democratic National Convention.
</span><center data-dcnode-id="644"><font data-dcnode-id="645" face="Arial" size="1"><span data-dcnode-id="649" instrument_node="">
Source: </span><a data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/2020_Dems_12.htm"><span data-dcnode-id="648" instrument_node="">Wikipedia denouement of 12th Democratic primary debate</span></a><span data-dcnode-id="646" instrument_node="">
, Mar 26, 2020
</span></font></center><p data-dcnode-id="640"><span data-dcnode-id="643" instrument_node="">
</span><a data-dcnode-id="642" name="25"></a><span data-dcnode-id="641" instrument_node="">
</span></p><h3 data-dcnode-id="637"><center data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">
Russia hacked into Party computers &amp; released via WikiLeaks
</span></center></h3><span data-dcnode-id="636" instrument_node="">
Starting in April 2016, units of the Russian Federation's Main Intelligence Directorate of the General Staff (GRU) hacked into the computer networks of the Democratic Congressional Campaign Committee (DCCC) and the Democratic National Committee (DNC),
targeting email accounts used by the Clinton Campaign. In total, the GRU stole hundreds of thousands of documents from the compromised email accounts and networks.</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Military Units 26165, a cyber-unit of the GRU, carried out the computer intrusions.
Unit 26165 was sub-divided into departments with different specialties. One department, for example, developed specialized malicious software ("malware") while another department conducted large-scale spearphishing campaigns.</span></p><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">On April 18, 2016, GRU
officers gained access to the DNC network via a virtual private network (VPN) connection between the DCCC and DNC networks. Unit 26165 compromised more than 30 computers on the DNC network, including the DNC mail server and shared file server.
</span></p><center data-dcnode-id="626"><font data-dcnode-id="627" face="Arial" size="1"><span data-dcnode-id="631" instrument_node="">
Source: </span><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/Mueller_Report.htm"><span data-dcnode-id="630" instrument_node="">The Mueller Report, Vol. i, pp. 36-8</span></a><span data-dcnode-id="628" instrument_node="">
, Apr 23, 2019
</span></font></center><p data-dcnode-id="622"><span data-dcnode-id="625" instrument_node="">
</span><a data-dcnode-id="624" name="16"></a><span data-dcnode-id="623" instrument_node="">
</span></p><h3 data-dcnode-id="619"><center data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">
Sue Trump for conspiracy with Russia to win 2016 election
</span></center></h3><span data-dcnode-id="618" instrument_node="">
The Democratic Party sued President Trump's presidential campaign, the Russian government and the Wikileaks group, claiming a broad conspiracy to help Trump win the 2016 election.</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">The multi-million-dollar lawsuit filed in Manhattan federal court says
that "In the Trump campaign, Russia found a willing and active partner in this effort" to mount "a brazen attack on American Democracy" based on "preexisting relationships with Russia and Russian oligarchs" with Trump.</span></p><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">The common purpose of the
scheme, according to the Democratic National Committee, was to "bolster Trump and denigrate the Democratic Party nominee," Hillary Clinton, while boosting the candidate of Trump, "whose policies would benefit the Kremlin."</span></p><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">The DNC said that while it
would be impossible "to fully repair the harm caused by the defendants, the DNC has filed this civil complaint to hold the defendants accountable for their misconduct and to ensure transparency."</span></p><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">"No one is above the law," the suit says.
</span></p><center data-dcnode-id="604"><font data-dcnode-id="605" face="Arial" size="1"><span data-dcnode-id="609" instrument_node="">
Source: </span><a data-dcnode-id="607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/Trump_Impeachment.htm"><span data-dcnode-id="608" instrument_node="">CNBC's coverage of 2018 impeaching Trump</span></a><span data-dcnode-id="606" instrument_node="">
, Apr 20, 2018
</span></font></center><p data-dcnode-id="600"><span data-dcnode-id="603" instrument_node="">
</span><span data-dcnode-id="601" instrument_node="">
</span></p><center data-dcnode-id="589"><span data-dcnode-id="599" instrument_node="">
</span><span data-dcnode-id="597" instrument_node="">
</span><span data-dcnode-id="595" instrument_node="">
</span><span data-dcnode-id="593" instrument_node="">
</span><span data-dcnode-id="590" instrument_node="">
</span></center><span data-dcnode-id="588" instrument_node="">
</span><span data-dcnode-id="586" instrument_node="">
</span><a data-dcnode-id="585" name="18"></a><span data-dcnode-id="584" instrument_node="">
</span><h3 data-dcnode-id="581"><center data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">
2016: GOP obstructed Russia election interference probe
</span></center></h3><span data-dcnode-id="580" instrument_node="">
The House's Russia investigation [disagrees with key aspects of] the intelligence community's findings,  enshrined in its January 2017 assessment that Russia and Putin "developed a clear preference for President-elect Trump."</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Some Republicans on the
House panel agreed that the evidence failed to support the intel agencies' conclusions. </span></p><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Democrats issued a 22-page report charging that Republicans abdicated their responsibility to conduct a thorough Russia probe, instead cutting off avenues of
investigation and refusing to call dozens of potential witnesses.</span></p><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">"The decision to shut down the investigation before key witnesses could be interviewed and vital documentary evidence obtained will prevent us from fully
discharging our duty to the House and to the American people," the Democrats said in their report, which identifies 30 witnesses Democrats wanted to call.
</span></p><center data-dcnode-id="568"><font data-dcnode-id="569" face="Arial" size="1"><span data-dcnode-id="573" instrument_node="">
Source: </span><a data-dcnode-id="571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/Trump_Impeachment.htm"><span data-dcnode-id="572" instrument_node="">Politico.com on Russia investigation &amp; impeachment of Trump</span></a><span data-dcnode-id="570" instrument_node="">
, Mar 13, 2018
</span></font></center><p data-dcnode-id="564"><span data-dcnode-id="567" instrument_node="">
</span><a data-dcnode-id="566" name="20"></a><span data-dcnode-id="565" instrument_node="">
</span></p><h3 data-dcnode-id="561"><center data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">
196 Congressional Dems sue Trump over Emoluments Clause
</span></center></h3><span data-dcnode-id="560" instrument_node="">
Democratic investigators asked to see proof that the Trump Organization donated $151,470 to the Treasury Department, as lawmakers try to determine whether President Donald Trump has profited off of foreign governments.</span><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Rep. Elijah Cummings (D-MD,
ranking member of the House Oversight and Government Reform Committee, requested all documents related to the donation, in a letter to Treasury Secretary Steven Mnuchin. In a separate letter, Cummings also pressed the Trump Organization for details on
how the amount was calculated, including an accounting of which governments did business with the Trump Organization. Cummings also asked whether the company plans to claim the Treasury donation as a gift for tax-deduction purposes.</span></p><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Cummings is one of
196 members of the House &amp; Senate, all Democrats, who have sued Trump claiming violations of the Constitution's Emoluments Clause, which was designed to prevent corruption by foreign influence. Blumenthal v. Trump is pending in US district court.
</span></p><center data-dcnode-id="550"><font data-dcnode-id="551" face="Arial" size="1"><span data-dcnode-id="555" instrument_node="">
Source: </span><a data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/Trump_Impeachment.htm"><span data-dcnode-id="554" instrument_node="">Politico.com on Emoluments Clause &amp; impeachment of Trump</span></a><span data-dcnode-id="552" instrument_node="">
, Mar 12, 2018
</span></font></center><p data-dcnode-id="546"><span data-dcnode-id="549" instrument_node="">
</span><a data-dcnode-id="548" name="22"></a><span data-dcnode-id="547" instrument_node="">
</span></p><h3 data-dcnode-id="543"><center data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">
Congressional Dems 80% Christian; plus Jews, Hindus, Muslims
</span></center></h3><span data-dcnode-id="542" instrument_node="">
Of the 293 Republican members in the House and Senate, 291 are Christians. The remaining two--Reps. Lee Zeldin (R-N.Y.) and David Kustoff (R-Tenn.)--are Jewish.</span><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">The Democratic side is also overwhelmingly Christian, at 80 percent.
But of the 242 Democrats in both chambers, there are also 28 Jews, three Buddhists, three Hindus, two Muslims, one Unitarian Universalist and one representative--Kyrsten Sinema (D-Ariz.)--who is religiously unaffiliated.
</span></p><center data-dcnode-id="537"><font data-dcnode-id="538" face="Arial" size="1"><span data-dcnode-id="539" instrument_node="">
Source: The Hill FactCheck on 2017-2018 Congress' religion
, Jan 3, 2017
</span></font></center><p data-dcnode-id="533"><span data-dcnode-id="536" instrument_node="">
</span><a data-dcnode-id="535" name="23"></a><span data-dcnode-id="534" instrument_node="">
</span></p><h3 data-dcnode-id="530"><center data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">
OpEd: DNC tilted primary in favor of Hillary Clinton
</span></center></h3><span data-dcnode-id="529" instrument_node="">
On July 26, 2016, in a prime-time speech at the Democratic National Convention in Philadelphia, I endorsed Hillary Clinton and urged my supporters and the American people to elect her as president. </span><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">The now-famous DNC emails that we later learned
were stolen by hackers working for a Russian intelligence agency had been released at the start of the convention. The content of these emails, which were not a shock to me, showed that the leadership of the
DNC had tilted the playing field during the primary in favor of Hillary Clinton's campaign. As a result, the chair of the DNC,
Debbie Wasserman Schultz, was forced to resign. Many of my delegate, who were not great fans of Hillary Clinton or the democratic establishment to begin with, were further enraged.
</span></p><center data-dcnode-id="521"><font data-dcnode-id="522" face="Arial" size="1"><span data-dcnode-id="526" instrument_node="">
Source: </span><a data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/2016_DNC.htm"><span data-dcnode-id="525" instrument_node="">Where We Go From Here, by B.Sanders, p. 19-20, on 2016 DNC</span></a><span data-dcnode-id="523" instrument_node="">
, Jul 26, 2016
</span></font></center><p data-dcnode-id="517"><span data-dcnode-id="520" instrument_node="">
</span><a data-dcnode-id="519" name="6"></a><span data-dcnode-id="518" instrument_node="">
</span></p><h3 data-dcnode-id="514"><center data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">
FactCheck: "God" removed from DNC platform
</span></center></h3><span data-dcnode-id="513" instrument_node="">
Guess what? God's name has been removed from the Democratic platform. This is the paragraph that was in the 2008 platform:</span><p data-dcnode-id="510"><i data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">"We need a government that stands up for the hopes, values, &amp; interests of working people, and gives everyone willing to work
hard the chance to make the most of their God-given potential."</span></i></p><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Now the words "God-given" have been removed. The paragraph has been restructured to say this:</span></p><p data-dcnode-id="505"><i data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">"We gather to reclaim the basic bargain that built the largest middle class and the
most prosperous nation on Earth--the simple principle that in America, hard work should pay off, responsibility should be rewarded, and each one of us should be able to go as far as our talent and drive take us."</span></i></p><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">[Note: As a result of this report,
the DNC voted to re-insert the term 'God' into the Platform. A voice vote was taken on Sept. 5th; the NAY vote was greater than the YEA vote, but the chairman called for YEA].
</span></p><center data-dcnode-id="497"><font data-dcnode-id="498" face="Arial" size="1"><span data-dcnode-id="502" instrument_node="">
Source: </span><a data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/2012_DNC_Platform.htm"><span data-dcnode-id="501" instrument_node="">Fact-check by CBN.com on 2012 Democratic Party Platform</span></a><span data-dcnode-id="499" instrument_node="">
, Sep 5, 2012
</span></font></center><p data-dcnode-id="493"><span data-dcnode-id="496" instrument_node="">
</span><a data-dcnode-id="495" name="8"></a><span data-dcnode-id="494" instrument_node="">
</span></p><h3 data-dcnode-id="490"><center data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">
There is more we need to do; let's continue what we started
</span></center></h3><span data-dcnode-id="489" instrument_node="">
Four years ago, Democrats, independents, and many Republicans came together as Americans to move our country forward. We were in the midst of the greatest economic crisis since the Great Depression, the previous administration had put two wars on our
nation's credit card, and the American Dream had slipped out of reach for too many.</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Today, our economy is growing again, al-Qaeda is weaker than at any point since 9/11, and our manufacturing sector is growing for the first time in more than a decade.
But there is more we need to do, and so we come together again to continue what we started.</span></p><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Democrats see a young country continually made stronger by the greatest diversity of talent and ingenuity in the world, and a nation of people drawn to our
shores from every corner of the globe. We believe America can succeed because the American people have never failed and there is nothing that together we cannot accomplish.
</span></p><center data-dcnode-id="479"><font data-dcnode-id="480" face="Arial" size="1"><span data-dcnode-id="484" instrument_node="">
Source: </span><a data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/2012_DNC_Platform.htm"><span data-dcnode-id="483" instrument_node="">2012 Democratic Party Platform</span></a><span data-dcnode-id="481" instrument_node="">
, Sep 4, 2012
</span></font></center><p data-dcnode-id="475"><span data-dcnode-id="478" instrument_node="">
</span><a data-dcnode-id="477" name="12"></a><span data-dcnode-id="476" instrument_node="">
</span></p><h3 data-dcnode-id="472"><center data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">
Trout Fishers: 1990s generation of foreign policy wonks
</span></center></h3><span data-dcnode-id="471" instrument_node="">
Every August, America's leading foreign policy experts gathered together in Colorado for meetings of the Aspen Strategy group. Several attendees from the Clinton administration liked to go off fishing together. They were dubbed "the Trout Fishers."</span><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">
The Trout Fishers were the Democrats' up-and-coming foreign policy team. They were in their 40s and 50s, in the vanguard of figuring out what the Democrats should do in foreign policy once they returned to office.</span></p><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">The Trout Fishers represented the
generation of Democrats who learned how to run foreign policy during the 1990s. They were eager to show that the Democrats were not a bunch of pacifists, that they understood national security issues and were willing to use American force where necessary
 --though sometimes in different ways and for different purposes than the Republicans. Among other things, the Trout Fishers believed in the use of military action for humanitarian purposes, such as to stop genocide or ethnic cleansing.
</span></p><center data-dcnode-id="461"><font data-dcnode-id="462" face="Arial" size="1"><span data-dcnode-id="466" instrument_node="">
Source: </span><a data-dcnode-id="464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/The_Obamians.htm"><span data-dcnode-id="465" instrument_node="">The Obamians, by James Mann, p. 56-58</span></a><span data-dcnode-id="463" instrument_node="">
, Jun 14, 2012
</span></font></center><p data-dcnode-id="457"><span data-dcnode-id="460" instrument_node="">
</span><a data-dcnode-id="459" name="5"></a><span data-dcnode-id="458" instrument_node="">
</span></p><h3 data-dcnode-id="454"><center data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">

</span></center></h3><span data-dcnode-id="453" instrument_node="">
In 2006, the Democratic Party promised to address six important issues in Congress. Now that Democrats are back in charge in the US House and Senate, you can keep up with the Democrats as they follow through on their promise for a new direction. </span><ol data-dcnode-id="440"><li data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">
Honest Government &amp; Open Government </span></li><li data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Real Security </span></li><li data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Energy Independence </span></li><li data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Economic Prosperity and Educational Excellence </span></li><li data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">A Healthcare System that Works for Everyone </span></li><li data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Secure Retirement </span></li></ol><span data-dcnode-id="439" instrument_node="">
</span><center data-dcnode-id="436"><font data-dcnode-id="437" face="Arial" size="1"><span data-dcnode-id="438" instrument_node="">
Source: 2006 Democratic Party Congressional Promise
, Nov 1, 2006
</span></font></center><p data-dcnode-id="432"><span data-dcnode-id="435" instrument_node="">
</span><a data-dcnode-id="434" name="3"></a><span data-dcnode-id="433" instrument_node="">
</span></p><h3 data-dcnode-id="429"><center data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">
New vision for America: strong at home, respected abroad
</span></center></h3><span data-dcnode-id="428" instrument_node="">
We are mindful that the challenges of our times are new and profound. For the first time in generations, we have been attacked on our own shores. Our brave men and women in uniform are still in harm’s way in Iraq, Afghanistan, and the war against terror.
Our alliances are frayed, our credibility in doubt. Our great middle class is hard-pressed. Millions of Americans have lost their jobs, and millions more are struggling under the mounting burden of life’s everyday costs.
In Washington, the President and his allies stubbornly press on, without regard to the needs of our people or the challenges of our times. It is time for a new direction.
John Kerry, John Edwards and the Democratic Party bring a new vision for America - strong at home, respected abroad. An America that offers opportunity, rewards responsibility, and rejoices in diversity.
</span><center data-dcnode-id="422"><font data-dcnode-id="423" face="Arial" size="1"><span data-dcnode-id="427" instrument_node="">
Source: </span><a data-dcnode-id="425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/Dem_Platform_2004.htm"><span data-dcnode-id="426" instrument_node="">The Democratic Platform for America, p. 1</span></a><span data-dcnode-id="424" instrument_node="">
, Jul 10, 2004
</span></font></center><p data-dcnode-id="418"><span data-dcnode-id="421" instrument_node="">
</span><a data-dcnode-id="420" name="10"></a><span data-dcnode-id="419" instrument_node="">
</span></p><h3 data-dcnode-id="415"><center data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">
Democrats need bold, innovative ideas, not ideology
</span></center></h3><span data-dcnode-id="414" instrument_node="">
[Al From and Bruce Reed, two pundits from the centrist Democratic Leadership Council, write]: The party's problem on Election Day 2002 wasn't ideology; it was ideas. Few voters said Democrats had a clear plan to cure the nation's ills.
Here are 5 lessons Democrats can learn from this election:</span><ol data-dcnode-id="403"><li data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Democrats need to appeal to all Americans, not just narrow interests. The Democratic message was a tired appeal to groups.</span></li><li data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Democrats need to expand their base, not just to energize it.
The Democratic base just isn't big enough to win. Moving left is counter-productive.</span></li><li data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Democrats need to get the big things right. That means national security and the economy.</span></li><li data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Democrats need to offer bold, innovative reforms, not incremental change.
A bold tax overhaul would be a good start.</span></li><li data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Democrats need to look outside Washington for answers. We have a great opportunity to do this with the increased number of Democratic governors.</span></li></ol><span data-dcnode-id="402" instrument_node="">
</span><center data-dcnode-id="396"><font data-dcnode-id="397" face="Arial" size="1"><span data-dcnode-id="401" instrument_node="">
Source: </span><a data-dcnode-id="399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/Crossroads_Cuomo.htm"><span data-dcnode-id="400" instrument_node="">Crossroads, by Andrew Cuomo, p.124-126</span></a><span data-dcnode-id="398" instrument_node="">
, Oct 14, 2003
</span></font></center><p data-dcnode-id="392"><span data-dcnode-id="395" instrument_node="">
</span><a data-dcnode-id="394" name="14"></a><span data-dcnode-id="393" instrument_node="">
</span></p><h3 data-dcnode-id="389"><center data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">
Safety net for no poverty &amp; no discrimination
</span></center></h3><span data-dcnode-id="388" instrument_node="">
The Democratic agenda has gone through a process of "moderation," "reinvention," and "triangulation." But the core Democratic principles are fundamentally different from Republican principles.</span><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Historically, the Democratic Party has been responsible for
our greatest national advancements, and a common philosophical framework drove these initiatives. These are the principles that allowed Franklin Roosevelt to create Social Security in the 1930's and that led the major progressive movements in this
nation's history--civil rights, women's rights, the New Deal, the Fair Deal, the Marshall Plan, the war on poverty, disability rights, and the race to the moon.</span></p><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Democratic success means a country where no child sleeps in poverty, where there are no
victims of discrimination, where everyone has clean, decent and affordable housing, where each child receives a high-quality public education, where there is a safety net for people who require assistance.
</span></p><center data-dcnode-id="378"><font data-dcnode-id="379" face="Arial" size="1"><span data-dcnode-id="383" instrument_node="">

, Oct 14, 2003
</span></font></center><p data-dcnode-id="374"><span data-dcnode-id="377" instrument_node="">

affecting workers, immigrants, veterans and others of access to justice. Gore will appoint justices to the Supreme Court who have a demonstrated commitment to the individual rights protected by our Constitution.
