ner padding-resp-hor-m u-padding-l-ver" data-dcnode-id="96"><div class="snippets-divider hor-line-top u-remove-if-not-print" data-dcnode-id="1810"></div><div class="u-clearfix" data-dcnode-id="97" id="snippets-wrapper"><article class="snippet column" data-dcnode-id="1643" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="1658"><h2 class="u-font-serif u-text-light" data-dcnode-id="1806" id="tp-snippet-chp-title-B9780080448947016985"><a class="anchor" data-aa-name="Early Childhood Education and Care in the People’s Republic of China" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780080448947016985"><span class="anchor-text" data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">Early Childhood Education and Care in the People’s Republic of China</span></span></a></h2><div class="size-l" data-dcnode-id="1659"><cite data-dcnode-id="1792"><p data-dcnode-id="1793"><span data-dcnode-id="1798"><span data-dcnode-id="1805" instrument_node="">Zeng </span><span data-dcnode-id="1803" instrument_node="">Xiaodong</span><span data-dcnode-id="1801" instrument_node="">, in</span><span data-dcnode-id="1799" instrument_node=""> </span></span><a class="anchor" data-aa-name="International Encyclopedia of Education (Third Edition)" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="1795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/referencework/9780080448947/international-encyclopedia-of-education"><span class="anchor-text" data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">International Encyclopedia of Education (Third Edition)</span></span></a><span data-dcnode-id="1794" instrument_node="">, 2010</span></p></cite><section data-dcnode-id="1660" id="B9780080448947016985-s0020"><h3 data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">From 1993 to 2002: Market Economy Weakened the Funding Basis of China's ECEC</span></h3><p data-dcnode-id="1781" id="B9780080448947016985-p0045"><span data-dcnode-id="1785"><span data-dcnode-id="1789" instrument_node="">Under the </span><span class="topic-highlight" data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">planned economy</span></span><span data-dcnode-id="1786" instrument_node="">, till 1993 when the government initiated the reform toward modern enterprise system, the public fund was channeled into </span></span><a class="topic-link" data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/early-childhood-education" title="Learn more about ECEC from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1784" instrument_node="">ECEC</span></a><span data-dcnode-id="1782" instrument_node=""> in three ways. First, for ECEC services run by the government and army agencies, and by the public institutions, their operating cost was incorporated into the overall budget scheme in line with the total staffing quotas and service standards pre-approved by the government. Second, for those ECEC services run by the businesses, the funding of their operation was supported by part of its business profit that is allowed to be kept by that business for its own expense, while the majority of the business profit was taken by the government as public revenue. Such self-kept profit practice was featured in the planned economy as an incentive for a business to sustain its welfare services, including ECEC. Third, for ECEC services run by the urban communities and rural villages, their operation relied on the funding by the local communities drawn from the community-owned businesses. Their ECEC staffs are cost and paid at the level equivalent to the similar jobs.</span></p><p data-dcnode-id="1755" id="B9780080448947016985-p0050"><span data-dcnode-id="1772"><span data-dcnode-id="1779" instrument_node="">In 1993 when the government started to build up the </span><a class="topic-link" data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/market-economy" title="Learn more about market economy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1778" instrument_node="">market economy</span></a><span data-dcnode-id="1776" instrument_node=""> system in China, all businesses were compelled to launch their transition toward the modern enterprise system by realigning their relations with the governments, easing off some </span><a class="topic-link" data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/social-welfare-function" title="Learn more about social welfare functions from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1775" instrument_node="">social welfare functions</span></a><span data-dcnode-id="1773" instrument_node=""> so as to reveal real operation expense. Given this, the route to channel public funds to enterprise staff for welfare benefit was blocked and the funding base for business-run ECEC removed. Many enterprise-run kindergartens were compelled to close their businesses or operate at their own cost. It is estimated that a total of 10</span></span><span data-dcnode-id="1771" instrument_node="">&nbsp;</span><span data-dcnode-id="1756"><span data-dcnode-id="1769" instrument_node="">800, or around 80%, of enterprise-run kindergartens were closed during 1995–2005, and most remaining enterprises-run kindergartens were transformed into kindergartens with other, sometimes uncertain, funding nature. That’s why currently some ECEC institutions in China are referred to as kindergartens in transition, by which it implies that they are yet to come into a final classification. Probably these kindergartens ought to be transformed into not-for-profit organizations; but respective laws are necessary to regulate them in </span><a class="topic-link" data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/governance" title="Learn more about governance from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1768" instrument_node="">governance</span></a><span data-dcnode-id="1766" instrument_node="">, funding, operation, and </span><a class="topic-link" data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/quality-management" title="Learn more about quality assurance from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1765" instrument_node="">quality assurance</span></a><span data-dcnode-id="1763" instrument_node="">. Under the planned economy, the urban communities and rural villages ran their collective-owned enterprises and pay for their own welfare. These collective enterprises, most of which were small, welfare-based businesses, had also to face the fierce competition of the market economy, and many drowned in the ocean of the market economy, owing to their lack of </span><a class="topic-link" data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/competitiveness" title="Learn more about competitiveness from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1762" instrument_node="">competitiveness</span></a><span data-dcnode-id="1760" instrument_node=""> and/or ineffective governance. The land reform in the rural areas is another reason for the fading of the </span><a class="topic-link" data-dcnode-id="1758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/collective-economy" title="Learn more about collective economy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1759" instrument_node="">collective economy</span></a><span data-dcnode-id="1757" instrument_node="">. Hence, the funding basis for ECEC services run by the urban communities and rural villages collapsed along with the collective economy. Only the ECEC services run by the governments, army agencies, and public institutions are still receiving steady public funding through government budgets. Not only did they survive the funding crisis, but also gradually evolved as the high-quality ones, by availing of the resources to which they are entitled.</span></span></p><div data-dcnode-id="1661"><p data-dcnode-id="1750" id="B9780080448947016985-p0055"><span data-dcnode-id="1754" instrument_node="">In summary, the transition to the market economy has in some ways removed two out of the three funding sources for China’s ECEC services. This is how we have come to the present pattern where the public funding is only made available to the ECEC operated by the governments and army units, public institutions, which is under frequent criticism. </span><span data-dcnode-id="1751"><strong data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Table 1</span></strong></span></p><div class="tables frame-topbot" data-dcnode-id="1662" id="B9780080448947016985-t0005"><span class="captions" data-dcnode-id="1742"><span data-dcnode-id="1743"><p data-dcnode-id="1744" id="B9780080448947016985-mc0001"><span class="label" data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Table 1</span></span><span data-dcnode-id="1747" instrument_node="">. </span><span data-dcnode-id="1745" instrument_node="">China’s ECEC provision under the planned economy and at present</span></p></span></span><div class="groups" data-dcnode-id="1663"><table data-dcnode-id="1664"><thead data-dcnode-id="1731"><tr data-dcnode-id="1732"><th data-dcnode-id="1739" scope="col"><em data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">ECEC providers</span></em></th><th data-dcnode-id="1736" scope="col"><em data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Funding source in the planned economy</span></em></th><th data-dcnode-id="1733" scope="col"><em data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Funding sources at present</span></em></th></tr></thead><tbody data-dcnode-id="1665"><tr data-dcnode-id="1725"><td data-dcnode-id="1728"><em data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Run by working institutions</span></em></td><td data-dcnode-id="1727"></td><td data-dcnode-id="1726"></td></tr><tr data-dcnode-id="1716"><td data-dcnode-id="1721"><span data-dcnode-id="1724" instrument_node="">&nbsp;</span><span data-dcnode-id="1722" instrument_node="">by Government and army agencies</span></td><td data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Government budget</span></td><td data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Government budget</span></td></tr><tr data-dcnode-id="1707"><td data-dcnode-id="1712"><span data-dcnode-id="1715" instrument_node="">&nbsp;</span><span data-dcnode-id="1713" instrument_node="">by public institutions (academies, hospitals, universities, etc.)</span></td><td data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Government budget</span></td><td data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Government budget</span></td></tr><tr data-dcnode-id="1698"><td data-dcnode-id="1703"><span data-dcnode-id="1706" instrument_node="">&nbsp;</span><span data-dcnode-id="1704" instrument_node="">by businesses/enterprises</span></td><td data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Self-kept profit</span></td><td data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Removed</span></td></tr><tr data-dcnode-id="1692"><td data-dcnode-id="1695"><em data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Run by collective economy</span></em></td><td data-dcnode-id="1694"></td><td data-dcnode-id="1693"></td></tr><tr data-dcnode-id="1683"><td data-dcnode-id="1688"><span data-dcnode-id="1691" instrument_node="">&nbsp;</span><span data-dcnode-id="1689" instrument_node="">by urban communities</span></td><td data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Profit by its business</span></td><td data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Removed</span></td></tr><tr data-dcnode-id="1674"><td data-dcnode-id="1679"><span data-dcnode-id="1682" instrument_node="">&nbsp;</span><span data-dcnode-id="1680" instrument_node="">by rural villages</span></td><td data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Profit by its business</span></td><td data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Removed</span></td></tr><tr data-dcnode-id="1666"><td data-dcnode-id="1671"><em data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Private</span></em></td><td data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Nonexistent</span></td><td data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Private</span></td></tr></tbody></table></div></div></div></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="1651"><a aria-describedby="tp-snippet-chp-title-B9780080448947016985" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="1655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780080448947016985" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780080448947" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="1644"><a class="read-full-chapter-print" data-dcnode-id="1649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780080448947016985" rel="noopener" target="_blank"><span data-dcnode-id="1650" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="1645"><span data-dcnode-id="1648" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="1646" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9780080448947016985</span></div></div></article><article class="snippet column" data-dcnode-id="1558" style="padding-right: 0px; padding-left: 40px; float: right;"><div class="snippet-content" data-dcnode-id="1573"><h2 class="u-font-serif u-text-light" data-dcnode-id="1639" id="tp-snippet-chp-title-B978184334223650002X"><a class="anchor" data-aa-name="Employee resourcing" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="1640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B978184334223650002X"><span class="anchor-text" data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Employee resourcing</span></span></a></h2><div class="size-l" data-dcnode-id="1574"><cite data-dcnode-id="1619"><p data-dcnode-id="1620"><span data-dcnode-id="1625"><span data-dcnode-id="1638" instrument_node="">Chris </span><span data-dcnode-id="1636" instrument_node="">Rowley</span><span data-dcnode-id="1634" instrument_node="">, </span><span data-dcnode-id="1632" instrument_node="">Wes </span><span data-dcnode-id="1630" instrument_node="">Harry</span><span data-dcnode-id="1628" instrument_node="">, in</span><span data-dcnode-id="1626" instrument_node=""> </span></span><a class="anchor" data-aa-name="Managing People Globally" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/book/9781843342236/managing-people-globally"><span class="anchor-text" data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Managing People Globally</span></span></a><span data-dcnode-id="1621" instrument_node="">, 2011</span></p></cite><section data-dcnode-id="1575" id="B978184334223650002X-s0010"><h3 data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">HRP in China</span></h3><p data-dcnode-id="1590" id="B978184334223650002X-p0380"><span data-dcnode-id="1612"><span data-dcnode-id="1616" instrument_node="">Under the </span><span class="topic-highlight" data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">planned economy</span></span><span data-dcnode-id="1613" instrument_node="">, China had a centrally established personnel planning system carried out at the government level, not that of the enterprise (</span></span><span data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Warner, 1992</span></span><span data-dcnode-id="1609" instrument_node="">). Conceptually, under central planning the national economic system was run as a large enterprise. The central government set the rules regulating enterprise personnel activities and determined the staffing levels of Chinese enterprises. Each year the government calculated the employment quota and assigned it to SOEs and COEs via local labour bureaux. Production, sales, salary and welfare were all decided by the central government and the enterprises exercised none of the selection, payment or workforce size functions that are standard practice in Western enterprises (</span><span data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Zhu and Warner, 2005</span></span><span data-dcnode-id="1606" instrument_node="">). The senior management and personnel departments did not have to worry about the number of employees as this had no financial implications. They implemented solely the quota assigned by the government. As </span><span data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Child (1994)</span></span><span data-dcnode-id="1603" instrument_node=""> noted, social and political discipline was used as an effective method for controlling the Chinese people. This approach to personnel management often resulted in a mismatch of skills with enterprise needs and meant that enterprises could not use their workforce in order to obtain a strategic or competitive advantage (</span><span data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Child, 1994</span></span><span data-dcnode-id="1600" instrument_node="">; </span><span data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Chen, 1995</span></span><span data-dcnode-id="1597" instrument_node="">; </span><span data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Warner, 2004</span></span><span data-dcnode-id="1594" instrument_node="">). This created low morale for the professionally qualified, and for many years labour mobility remained virtually non-existent (</span><span data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Granick, 1991</span></span><span data-dcnode-id="1591" instrument_node="">).</span></p><p data-dcnode-id="1576" id="B978184334223650002X-p0385"><span data-dcnode-id="1585"><span data-dcnode-id="1589" instrument_node="">Since the economic reform, the responsibility for utilising the workforce has shifted from a centralised planning authority to </span><a class="topic-link" data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/forecasting" title="Learn more about forecasting from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1588" instrument_node="">forecasting</span></a><span data-dcnode-id="1586" instrument_node=""> and planning departments within enterprises (</span></span><span data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Zhu and Dowling, 1994</span></span><span data-dcnode-id="1582" instrument_node="">). Enterprises have been asked to be responsible for their employees, including the number and types of employees, and issues of hiring, firing and pay. Enterprises have been given freedom to increase or reduce their workforce. Human resource planning still remains at a fairly low level within enterprises due to the shortage of sufficiently trained personnel and intervention from all levels of governments, although such intervention is now diminishing. Labour is increasingly viewed as a human resource that has strategic and financial implications </span><span data-dcnode-id="1581" id="B978184334223650002X-p39"></span><span data-dcnode-id="1580" instrument_node="">(</span><span data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Benson and Zhu, 1999</span></span><span data-dcnode-id="1577" instrument_node="">) and labour costs have become a major part of operational costs that enterprises have to take great pains to control. New management strategies emphasising profits and competition have put controlling the workforce at the top of management’s agenda and Chinese workers now constantly face the danger of being made redundant in the over-staffed SOEs.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="1566"><a aria-describedby="tp-snippet-chp-title-B978184334223650002X" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B978184334223650002X" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9781843342236" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="1559"><a class="read-full-chapter-print" data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B978184334223650002X" rel="noopener" target="_blank"><span data-dcnode-id="1565" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="1560"><span data-dcnode-id="1563" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="1561" instrument_node="">https://www.sciencedirect.com/science/article/pii/B978184334223650002X</span></div></div></article><article class="snippet column" data-dcnode-id="1481" style="padding-right: 0px; padding-left: 40px; float: right;"><div class="snippet-content" data-dcnode-id="1496"><h2 class="u-font-serif u-text-light" data-dcnode-id="1554" id="tp-snippet-chp-title-B9781843342236500043"><a class="anchor" data-aa-name="Employee development" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="1555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781843342236500043"><span class="anchor-text" data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Employee development</span></span></a></h2><div class="size-l" data-dcnode-id="1497"><cite data-dcnode-id="1534"><p data-dcnode-id="1535"><span data-dcnode-id="1540"><span data-dcnode-id="1553" instrument_node="">Chris </span><span data-dcnode-id="1551" instrument_node="">Rowley</span><span data-dcnode-id="1549" instrument_node="">, </span><span data-dcnode-id="1547" instrument_node="">Wes </span><span data-dcnode-id="1545" instrument_node="">Harry</span><span data-dcnode-id="1543" instrument_node="">, in</span><span data-dcnode-id="1541" instrument_node=""> </span></span><a class="anchor" data-aa-name="Managing People Globally" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/book/9781843342236/managing-people-globally"><span class="anchor-text" data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Managing People Globally</span></span></a><span data-dcnode-id="1536" instrument_node="">, 2011</span></p></cite><section data-dcnode-id="1498" id="B9781843342236500043-s0025"><h3 data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Low satisfaction with training in China</span></h3><p data-dcnode-id="1507" id="B9781843342236500043-p1360"><span data-dcnode-id="1527"><span data-dcnode-id="1531" instrument_node="">Under the </span><span class="topic-highlight" data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">planned economy</span></span><span data-dcnode-id="1528" instrument_node="">, Chinese urban employees were classified into two groups: </span></span><em data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">workers</span></em><span data-dcnode-id="1524" instrument_node=""> and </span><em data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">cadres.</span></em><span data-dcnode-id="1517"><span data-dcnode-id="1521" instrument_node=""> Workers were blue-collar employees who were administered by the Ministry of Labour. Cadres were white-collar staff administered by the Ministry of Personnel. Training for workers was primarily in the form of post-employment </span><a class="topic-link" data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/apprenticeship" title="Learn more about apprenticeships from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1520" instrument_node="">apprenticeships</span></a><span data-dcnode-id="1518" instrument_node=""> and such training was compulsory. The supervisor was also called ‘master’ who actually was a lifelong mentor as well. Training programmes for blue-collar workers focused on improving working skills. Training for cadres was conducted by Communist Party-sponsored schools at different levels. Only those who had promotion potential were selected for training at Party political schools. Although training for cadres was not compulsory, nobody could afford to miss out, as it was considered critical and sometimes a prerequisite for promotion. </span></span><span data-dcnode-id="1516" id="B9781843342236500043-p193"></span><span data-dcnode-id="1515" instrument_node="">Taking training in schools of the Communist Party was a good networking opportunity for trainees as well and networking assisted in developing </span><span data-dcnode-id="1509"><em data-dcnode-id="1512"><a class="topic-link" data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/guanxi" title="Learn more about guanxi from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1514" instrument_node="">guanxi</span></a></em><em data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">.</span></em></span><span data-dcnode-id="1508" instrument_node=""> Political studies were the focus of training for cadres. Training costs for both workers and cadres were met by the enterprises.</span></p><p data-dcnode-id="1499" id="B9781843342236500043-p1365"><span data-dcnode-id="1506" instrument_node="">Since the economic reform, the training system for workers has been changed from compulsory apprenticeships to on-the-job training and optional part-time education. On-the-job training is limited and usually focused on briefings for new recruits and training on new regulations on products. Even less training is provided in POEs as enterprise managements usually regard training for new workers as a necessity, but on-the-job training is costly and causes disruption to production. The inadequate training provision is also due to the fact that firms do not have enough resources and time to implement systematic training when rapid economic expansion occurs, and a lack of commitment to employee development (</span><span data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Shen and Darby, 2006; Verburg, 1999; Warner, 1996</span></span><span data-dcnode-id="1503" instrument_node="">). When training is provided, firms typically give priority to technical issues rather than management skills (</span><span data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Child, 1994; Shen and Darby, 2006; Wilhelm and Xia, 1993</span></span><span data-dcnode-id="1500" instrument_node="">). Normally, employees in successful SOEs and COEs are free and encouraged to take up part-time education. Some generous enterprises even pay education expenses. However, encouragement for study is usually rare in POEs. There is also usually no training analysis or training audit. Limited training provisions have resulted in a lack of high-calibre employees and been a source of discontent for many Chinese workers.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="1489"><a aria-describedby="tp-snippet-chp-title-B9781843342236500043" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781843342236500043" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="1490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9781843342236" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="1482"><a class="read-full-chapter-print" data-dcnode-id="1487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781843342236500043" rel="noopener" target="_blank"><span data-dcnode-id="1488" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="1483"><span data-dcnode-id="1486" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="1484" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9781843342236500043</span></div></div></article><article class="snippet column" data-dcnode-id="882" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="897"><h2 class="u-font-serif u-text-light" data-dcnode-id="1477" id="tp-snippet-chp-title-B9781843341581500025"><a class="anchor" data-aa-name="China: a PESTEL analysis" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781843341581500025"><span class="anchor-text" data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">China: a PESTEL analysis</span></span></a></h2><div class="size-l" data-dcnode-id="898"><cite data-dcnode-id="1457"><p data-dcnode-id="1458"><span data-dcnode-id="1463"><span data-dcnode-id="1476" instrument_node="">JOHN </span><span data-dcnode-id="1474" instrument_node="">MCMANUS</span><span data-dcnode-id="1472" instrument_node="">, ... </span><span data-dcnode-id="1470" instrument_node="">DEEPENDRA </span><span data-dcnode-id="1468" instrument_node="">MOITRA</span><span data-dcnode-id="1466" instrument_node="">, in</span><span data-dcnode-id="1464" instrument_node=""> </span></span><a class="anchor" data-aa-name="China and India" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="1460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/book/9781843341581/china-and-india"><span class="anchor-text" data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">China and India</span></span></a><span data-dcnode-id="1459" instrument_node="">, 2007</span></p></cite><section data-dcnode-id="899" id="B9781843341581500025-cesec2"><h3 data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Overview of China's software industry</span></h3><p data-dcnode-id="1445" id="B9781843341581500025-para10"><span data-dcnode-id="1454" id="B9781843341581500025-p21"></span><span data-dcnode-id="1449"><span data-dcnode-id="1453" instrument_node="">In the era of </span><span class="topic-highlight" data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">planned economy</span></span><span data-dcnode-id="1450" instrument_node="">, the software industry barely existed in China. The government devoted most of its financial resources and limited pool of skilled labour to reverse engineering key hardware, such as integrated circuits and technologies, with mixed military and civilian importance. There were scattered software development projects in state-owned research institutes, but commercial research and development was largely non-existent because of the organisational and institutional barriers separating these research institutes from the market. In some sense, the genesis of China's software industry can be traced back to the early 1980s with the creation of some spin-offs from government research institutes such as the Academy of Science.</span></span><span data-dcnode-id="1446"><sup data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">6</span></sup></span></p><div data-dcnode-id="1294"><p data-dcnode-id="1437" id="B9781843341581500025-para11"><span data-dcnode-id="1444" instrument_node="">Software has been the weakest sector in China's ICT industry. Among all the reasons, the relatively favourable investment policy towards hardware could be an important factor. From 1993 to 2001, the major share of China's ICT investment went to the telecommunications industry, with the information consultation and computer service industry (software industry included) receiving a very small proportion (</span><span data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Table 2.1</span></span><span data-dcnode-id="1441" instrument_node=""> and </span><span data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Figure 2.1</span></span><span data-dcnode-id="1438" instrument_node="">).</span></p><div class="tables colsep-0 rowsep-0 frame-topbot" data-dcnode-id="1312" id="B9781843341581500025-cetable1"><span class="captions" data-dcnode-id="1429"><span data-dcnode-id="1430" id="B9781843341581500025-cecap2"><p data-dcnode-id="1431" id="B9781843341581500025-spara2"><span class="label" data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Table 2.1</span></span nk-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9781843341581" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="883"><a class="read-full-chapter-print" data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781843341581500025" rel="noopener" target="_blank"><span data-dcnode-id="889" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="884"><span data-dcnode-id="887" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="885" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9781843341581500025</span></div></div></article><article class="snippet column" data-dcnode-id="829" style="padding-right: 0px; padding-left: 40px; float: right;"><div class="snippet-content" data-dcnode-id="844"><h2 class="u-font-serif u-text-light" data-dcnode-id="878" id="tp-snippet-chp-title-B9781843346289500028"><a class="anchor" data-aa-name="Social security" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781843346289500028"><span class="anchor-text" data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Social security</span></span></a></h2><div class="size-l" data-dcnode-id="845"><cite data-dcnode-id="858"><p data-dcnode-id="859"><span data-dcnode-id="864"><span data-dcnode-id="877" instrument_node="">Ferdinand A. </span><span data-dcnode-id="875" instrument_node="">Gul</span><span data-dcnode-id="873" instrument_node="">, </span><span data-dcnode-id="871" instrument_node="">Haitian </span><span data-dcnode-id="869" instrument_node="">Lu</span><span data-dcnode-id="867" instrument_node="">, in</span><span data-dcnode-id="865" instrument_node=""> </span></span><a class="anchor" data-aa-name="Truths and Half Truths" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/book/9781843346289/truths-and-half-truths"><span class="anchor-text" data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Truths and Half Truths</span></span></a><span data-dcnode-id="860" instrument_node="">, 2011</span></p></cite><section data-dcnode-id="846"><h3 data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Abstract:</span></h3><p data-dcnode-id="847" id="B9781843346289500028-sp0010"><span data-dcnode-id="851"><span data-dcnode-id="855" instrument_node="">When China had a centrally </span><span class="topic-highlight" data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">planned economy</span></span><span data-dcnode-id="852" instrument_node="">, the role of the state may have been best described as a socialist welfare provider. However, since the economic reforms this role has changed; the state’s role is now more to administer a modern social security system that demands sustainability and adaptability to the ever-changing socio-economic environment. Consequently, pensions, housing, healthcare, and other social security services closely related to people’s livelihoods, which used to be fully subsidized by the state, have now become ‘commodities’ and part of the individual’s responsibility. Given the size of China’s population and the welfare expectations of the population under the old system, it is easy to understand why such reform must be a gradual, carefully controlled and monitored process to avoid the abrupt removal of all ‘social safety nets’ that could trigger social and political unrest. This chapter discusses the motivations and processes of China’s social security reforms in terms of pension, housing, and healthcare, and also evaluates the effectiveness of these </span></span><a class="topic-link" data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/social-reform" title="Learn more about social reforms from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="850" instrument_node="">social reforms</span></a><span data-dcnode-id="848" instrument_node="">.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="837"><a aria-describedby="tp-snippet-chp-title-B9781843346289500028" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781843346289500028" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9781843346289" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="830"><a class="read-full-chapter-print" data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781843346289500028" rel="noopener" target="_blank"><span data-dcnode-id="836" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="831"><span data-dcnode-id="834" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="832" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9781843346289500028</span></div></div></article><article class="snippet column" data-dcnode-id="599" style="padding-right: 0px; padding-left: 40px; float: right;"><div class="snippet-content" data-dcnode-id="614"><h2 class="u-font-serif u-text-light" data-dcnode-id="825" id="tp-snippet-chp-title-B0080430767026401"><a class="anchor" data-aa-name="Economic History" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B0080430767026401"><span class="anchor-text" data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Economic History</span></span></a></h2><div class="size-l" data-dcnode-id="615"><cite data-dcnode-id="805"><p data-dcnode-id="806"><span data-dcnode-id="811"><span data-dcnode-id="824" instrument_node="">E. </span><span data-dcnode-id="822" instrument_node="">Aerts</span><span data-dcnode-id="820" instrument_node="">, </span><span data-dcnode-id="818" instrument_node="">H. </span><span data-dcnode-id="816" instrument_node="">Van der Wee</span><span data-dcnode-id="814" instrument_node="">, in</span><span data-dcnode-id="812" instrument_node=""> </span></span><a class="anchor" data-aa-name="International Encyclopedia of the Social &amp;amp; Behavioral Sciences" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/referencework/9780080430768/international-encyclopedia-of-the-social-and-behavioral-sciences"><span class="anchor-text" data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">International Encyclopedia of the Social &amp; Behavioral Sciences</span></span></a><span data-dcnode-id="807" instrument_node="">, 2001</span></p></cite><section data-dcnode-id="616" id="B0080430767026401-s0015"><h3 data-dcnode-id="798"><span data-dcnode-id="804" instrument_node="">3</span><span data-dcnode-id="802" instrument_node=""> </span><span data-dcnode-id="800" instrument_node="">The Heyday (1950–1980)</span><span data-dcnode-id="799" id="B0080430767026401-p0070"></span></h3><p data-dcnode-id="787" id="B0080430767026401-mc0081"><span data-dcnode-id="797" instrument_node="">No doubt, the pre-war initiatives, mentioned above, were crucial for the postwar expansion of economic history to become one of the main disciplines of the economic and historical sciences, but several new initiatives taken after World War II by economists and economic historians alike were as decisive. During the immediate postwar decades, the Anglo-Saxons clearly dominated the scene of innovation. </span><a class="topic-link" data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/keynesian-economics" title="Learn more about Keynesianism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="796" instrument_node="">Keynesianism</span></a><span data-dcnode-id="794" instrument_node=""> became the great fashion in economics, but it was soon complemented by theories of economic growth. The more dynamic approach of the growth theories stimulated the interest of the American economists, such as Moses Abramovitz and Colin Clark, in long-term economic-historical development. In 1950, during the Paris world conference of historical sciences, Clark incited the economic historians to join the economists in taking up research on long-term economic growth. The appeal was heard. At the end of the 1950s, the American Economic History Association and the National Bureau </span><a class="topic-link" data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/economics-of-science" title="Learn more about of Economic Research from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="793" instrument_node="">of Economic Research</span></a><span data-dcnode-id="791" instrument_node=""> were joining efforts in studying the evolution of income and wealth in the United States during the nineteenth century. During the first international economic history conference in Stockholm in 1960, themes on industrialization, human capital, and technology as factors of economic growth became predominant in the </span><a class="topic-link" data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/modern-history" title="Learn more about modern history from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="790" instrument_node="">modern history</span></a><span data-dcnode-id="788" instrument_node=""> sessions. Based on historical experience, concepts and theories on the ‘take-off’ (Walt W. Rostow), on the ‘great spurt’ (Alexander Gerschenkron), and on capital formation and capital utilization (Evsey Domar) were formulated.</span></p><p data-dcnode-id="782" id="B0080430767026401-p0075"><span data-dcnode-id="786" instrument_node="">Soon the scope of the discussions widened, leading, </span><em data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">inter alia</span></em><span data-dcnode-id="783" instrument_node="">, the following new questions.</span></p><div data-dcnode-id="760"><dl class="article-list" data-dcnode-id="761"><dt data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">(a)</span></dt><dd data-dcnode-id="777"><p data-dcnode-id="778" id="B0080430767026401-mc0083"><span data-dcnode-id="779" instrument_node="">Had planned economies a comparative advantage or disadvantage vis-à-vis the free-market economies in promoting economic growth?</span></p></dd><dt data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">(b)</span></dt><dd data-dcnode-id="772"><p data-dcnode-id="773" id="B0080430767026401-mc0084"><span data-dcnode-id="774" instrument_node="">How to explain regional growth disparities in the West from a historical point of view?</span></p></dd><dt data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">(c)</span></dt><dd data-dcnode-id="767"><p data-dcnode-id="768" id="B0080430767026401-mc0085"><span data-dcnode-id="769" instrument_node="">How to explain uneven economic development in the world?</span></p></dd><dt data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">(d)</span></dt><dd data-dcnode-id="762"><p data-dcnode-id="763" id="B0080430767026401-mc0086"><span data-dcnode-id="764" instrument_node="">Finally, how to specify the links between growth and income?</span></p></dd></dl></div><p data-dcnode-id="751" id="B0080430767026401-p0080"><span data-dcnode-id="755"><span data-dcnode-id="759" instrument_node="">The last question would be analyzed in depth by Nobel Prize winner, Simon Kuznets (1901–1985), who started to use reconstructed historical series of </span><a class="topic-link" data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/national-accounts" title="Learn more about national accounts from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="758" instrument_node="">national accounts</span></a><span data-dcnode-id="756" instrument_node=""> for that purpose, emphasizing that economic growth could only be studied scientifically if it was based on trustworthy macroeconomic statistics. Kuznets' appeal would generate a large-scale research movement of reconstructing national accounts. Phyllis Deane and W. A. Cole's successful book </span></span><em data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">British Economic Growth, 1688–1959</span></em><span data-dcnode-id="752" instrument_node="">, first published in 1962, used such statistics, and encouraged the movement still further. Scholars in the United States, France, Germany, Belgium, the Netherlands, Spain, Switzerland, Sweden, Finland, and Portugal were launching projects to reconstruct historical national accounts of their own countries. In the United Kingdom, Charles Feinstein, Nicholas F. R. Crafts and others soon would start working on correcting and improving the estimates of Deane and Cole. Research on the links between growth and income, on the other hand, increased interest in the social aspects of growth and development. Marxist and non-Marxist economic historians in the following years would expand this field of research very much, emphasizing the importance of socio-institutional factors in the process of growth and development.</span></p><p data-dcnode-id="746" id="B0080430767026401-p0085"><span data-dcnode-id="750" instrument_node="">As far as the economic history of the </span><em data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Ancien Régime</span></em><span data-dcnode-id="747" instrument_node=""> was concerned, the influence of Michael M. Postan (1899–1981) was prominent during the immediate postwar years. His long-term Malthusian demographical approach would become a model of interpretation for European economic development during the Middle Ages as well as during the early modern period. The Postan model would lead to the creation of the Cambridge Group for the History of Population and Social Structure under the directorship of Edward A. Wrigley, Roger S. Schofield and Peter Laslett. The French would join the English Malthusian demographical approach, although Michel Fleury, Louis Henry, Jean Meuvret and Pierre Goubert analyzed short- and medium-term demographical fluctuations in particular. For that purpose, Fleury and Henry would introduce the prosopographical method into historical demography and develop a method for family reconstitution based on the information in the parish registers. Emmanuel Le Roy Ladurie, on his part, would integrate, somewhat later, Postan's long-term model into his own research on French and European agricultural history in the early modern period.</span></p><p data-dcnode-id="737" id="B0080430767026401-p0090"><span data-dcnode-id="745" instrument_node="">During the same period the </span><em data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Annales</span></em><span data-dcnode-id="738"><span data-dcnode-id="742" instrument_node=""> School, now firmly dominated by Fernand Braudel, was extending its influence via the Ecole Pratique des Hautes Etudes de la Sorbonne, not only among the French economic historians, but also in the whole of Europe and soon beyond. From the late 1950s onwards until the early 1980s, the School would inspire a large part of </span><a class="topic-link" data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/cliometrics" title="Learn more about economic historical from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="741" instrument_node="">economic historical</span></a><span data-dcnode-id="739" instrument_node=""> research on:</span></span></p><div data-dcnode-id="717"><dl class="article-list" data-dcnode-id="718"><dt data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">(a)</span></dt><dd data-dcnode-id="729"><p data-dcnode-id="730" id="B0080430767026401-mc0088"><span data-dcnode-id="734" instrument_node="">The </span><a class="topic-link" data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/late-middle-ages" title="Learn more about late Middle Ages from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="733" instrument_node="">late Middle Ages</span></a><span data-dcnode-id="731" instrument_node=""> (for example Georges Duby and Jacques Le Goff).</span></p></dd><dt data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">(b)</span></dt><dd data-dcnode-id="724"><p data-dcnode-id="725" id="B0080430767026401-mc0089"><span data-dcnode-id="726" instrument_node="">The early modern times (for example Pierre Jeannin, Jean-François Bergier, Pierre Deyon, Bernard H. Slicher van Bath, Jerzy Topolski, Pierre Chaunu, Felipe Ruiz Martin and Herman Van der Wee).</span></p></dd><dt data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">(c)</span></dt><dd data-dcnode-id="719"><p data-dcnode-id="720" id="B0080430767026401-mc0090"><span data-dcnode-id="721" instrument_node="">The French Revolution period (for example François Furet and Denis Richet).</span></p></dd></dl></div><p data-dcnode-id="705" id="B0080430767026401-p0095"><span data-dcnode-id="709"><span data-dcnode-id="716" instrument_node="">Originally, research was often focused on geographical studies </span><a class="topic-link" data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/development-of-economics" title="Learn more about of economic development from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="715" instrument_node="">of economic development</span></a><span data-dcnode-id="713" instrument_node="">, following the example of Braudel's pioneering study on the Mediterranean, but, in contrast to Braudel, most of these studies combined qualitative approach with quantitative analysis. Gradually, the qualitative ‘global history’ approach became predominant. Within this framework, under the influence of </span><a class="topic-link" data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/marxist-economics" title="Learn more about Marxist economic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="712" instrument_node="">Marxist economic</span></a><span data-dcnode-id="710" instrument_node=""> historians such as Immanuel Wallerstein, the socio-institutional aspects were getting increasingly more attention in the analysis of the agricultural, commercial, industrial, and financial development of Europe during the </span></span><em data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Ancien Régime</span></em><span data-dcnode-id="706" instrument_node="">.</span></p><p data-dcnode-id="697" id="B0080430767026401-p0100"><span data-dcnode-id="704" instrument_node="">While the methodological trend in the </span><em data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Annales</span></em><span data-dcnode-id="701" instrument_node=""> School from the 1950s onwards was moving in the direction of a more qualitative approach to economic history, in the United States the trend during that period moved clearly in the opposite direction. In 1954, at Purdue University in Lafayette (Indiana), economists and economic historians already used primitive computers for the processing of statistical data. Three years later, during a conference of the American Economic History Association in 1957, Alfred H. Conrad and John R. Meyer launched the idea of a ‘New Economic History,’ aiming at integrating economic theory, quantitative methods, and history into one discipline. They illustrated the relevance of their idea by applying a microeconomic input–output method when analyzing the profitability of slavery in the American South during the nineteenth century. Nobel Prize winner Robert Fogel and Stanley L. Engerman later took up the theme. This led to a large-scale research project, its conclusions being published in </span><em data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Time on the Cross</span></em><span data-dcnode-id="698" instrument_node="">, 1974.</span></p><p data-dcnode-id="695" id="B0080430767026401-p0105"><span data-dcnode-id="696" instrument_node="">Some young economic historians received Conrad and Meijer's idea with enthusiasm. It gave birth to ‘Cliometrics,’ soon a well-established subdiscipline of American economic history. In the early 1960s, Robert P. Thomas had already applied the cost–benefit analysis method to explore the effects of the British Navigation Laws on the economy of the American colonies. More spectacular was the research undertaken by Robert Fogel and Albert Fishlow on the contribution of the railroads to American economic growth. To measure their impact, Fogel constructed a hypothetical world and used a counterfactual proposition: what would have happened to an economy if, contrary to the facts, one or more important features of that economy had never existed? Or applied to his research: if a railway system had not been introduced in the United States during the second half of the nineteenth century, could an alternative transport system, such as a system of existing and new canals, have generated as many social gains and dynamic effects as the railways did? The results of Fogel's cliometric test were fascinating: the difference would have been minimal since the ‘social savings’ would have represented less than 5 percent of national income in 1890. The cliometricians, now organized in an autonomous association, the Cliometric Society, and holding their own yearly meetings, began revisiting all major themes of American economic history, hoping that their methodology would lead to a complete reinterpretation of that history. Major themes studied by the cliometricians were:</span></p><div data-dcnode-id="655"><dl class="article-list" data-dcnode-id="656"><dt data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">(a)</span></dt><dd data-dcnode-id="690"><p data-dcnode-id="691" id="B0080430767026401-mc0092"><span data-dcnode-id="692" instrument_node="">the economic reconstruction of the South after the Secession War;</span></p></dd><dt data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">(b)</span></dt><dd data-dcnode-id="685"><p data-dcnode-id="686" id="B0080430767026401-mc0093"><span data-dcnode-id="687" instrument_node="">the impact of labor and migration on American growth at the end of the nineteenth century (cf. the model of Jeffrey Williamson, applying macroeconomic equilibrium theories);</span></p></dd><dt data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">(c)</span></dt><dd data-dcnode-id="680"><p data-dcnode-id="681" id="B0080430767026401-mc0094"><span data-dcnode-id="682" instrument_node="">money markets and banking systems as factors of growth in the United States in the nineteenth century;</span></p></dd><dt data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">(d)</span></dt><dd data-dcnode-id="675"><p data-dcnode-id="676" id="B0080430767026401-mc0095"><span data-dcnode-id="677" instrument_node="">the American Industrial Revolution;</span></p></dd><dt data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">(e)</span></dt><dd data-dcnode-id="667"><p data-dcnode-id="668" id="B0080430767026401-mc0096"><span data-dcnode-id="672" instrument_node="">the </span><a class="topic-link" data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/global-economic-crisis" title="Learn more about Great Depression from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="671" instrument_node="">Great Depression</span></a><span data-dcnode-id="669" instrument_node=""> of the 1880s;</span></p></dd><dt data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">(f)</span></dt><dd data-dcnode-id="662"><p data-dcnode-id="663" id="B0080430767026401-mc0097"><span data-dcnode-id="664" instrument_node="">the World Crisis of the 1930s; and</span></p></dd><dt data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">(g)</span></dt><dd data-dcnode-id="657"><p data-dcnode-id="658" id="B0080430767026401-mc0098"><span data-dcnode-id="659" instrument_node="">the role of the residual factor in American productivity growth.</span></p></dd></dl></div><p data-dcnode-id="644" id="B0080430767026401-p0110"><span data-dcnode-id="654" instrument_node="">The methodological innovation, introduced by the American </span><a class="topic-link" data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/cliometrics" title="Learn more about New Economic History from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="653" instrument_node="">New Economic History</span></a><span data-dcnode-id="651" instrument_node="">, would spill over to the rest of the world, in particular to Canada, Australia, and some European countries, particularly the United Kingdom, Germany, France, and Sweden. Moreover, from 1970 onwards each world congress of the International Economic History Association would have a session on methodology, dominated from the beginning by the American cliometricians. However, the impact of the New Economic History outside the United States remained limited and certainly did not gain widespread recognition. F. Redlich, for example, described the counterfactual deduction in 1968 as ‘fictitious history’ and ‘not history at all.’ Was it because </span><a class="topic-link" data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/neoclassical-theory" title="Learn more about neoclassical theory from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="650" instrument_node="">neoclassical theory</span></a><span data-dcnode-id="648" instrument_node=""> was found to be less applicable to the European pre-industrial period than to the nineteenth-century American economy? Alternatively, were institutional factors, such as the separation between economists and economic historians who are normally active in the arts faculties, responsible for the emotional aversion towards the blend of history, economic theory, and econometrics? Even in the United States itself, </span><a class="topic-link" data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/dissident" title="Learn more about dissidents from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="647" instrument_node="">dissidents</span></a><span data-dcnode-id="645" instrument_node=""> soon emerged. Nobel Prize winner Douglass North, who had been applying the New Economic History methods in his studies on American growth, withdrew from cliometrics and reoriented his research to the institutional aspects of growth, using the historical experience to construct and verify his hypotheses. In his view, the protection of ‘property rights’ and the lowering of ‘transactions costs’ were the decisive factors in the history of economic growth. In the same vein as North's New Institutional History, but more innovating and with a much larger impact in and outside the United States, was Alfred D. Chandler Jr's founding of the ‘New Business History.’</span></p><p data-dcnode-id="626" id="B0080430767026401-p0115"><span data-dcnode-id="643" instrument_node="">When creating the Center of Entrepreneurial Studies at Harvard in the late 1930s, Joseph Schumpeter and Arthur Cole had hoped to replace the hagiographical tradition of prewar and interwar business history by a more scientific approach. However, it was Chandler who, from the 1960s onwards, realized that ambition fully with his books </span><em data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Strategy and Structure</span></em><span data-dcnode-id="640" instrument_node=""> (1962), </span><em data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">The Visible Hand</span></em><span data-dcnode-id="637" instrument_node=""> (1977), </span><em data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Scale and Scope</span></em><span data-dcnode-id="634" instrument_node=""> (1990) and </span><em data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Inventing the Electronic Century</span></em><span data-dcnode-id="627"><span data-dcnode-id="631" instrument_node=""> (2001). Careful historical investigation, combined with in-depth institutional economic analysis, revealed the crucial role of business management and business organization in the successful rise of American </span><a class="topic-link" data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/capitalism" title="Learn more about capitalism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="630" instrument_node="">capitalism</span></a><span data-dcnode-id="628" instrument_node="">. This was soon completed by studies on the rise and development of European and Japanese capitalism. Chandler's hypotheses and methodology became standard all over the world and are still so. Up to the present day, they are the main source of inspiration to the ‘New Business History.’ A last new economic history group, emerging after World War II, should be mentioned: the ‘New Urban History,’ integrating sociological, geographical, and economic theories and quantitative methods into the historical analysis of towns and urbanization. In 1962, an interdisciplinary Urban History Group was established, followed three years later by the ‘Commission Internationale pour l'histoire des villes’ directed by scholars such as Henri Aubin, Hektor Ammann, and Philippe Wolff. However, the Anglo-Saxon historians, once again, were pioneers in the field, H. J. Dyos, Jan de Vries, Paul M. Hohenberg, Lynn Hollen Lees, Peter Clark and many others.</span></span></p><p data-dcnode-id="617" id="B0080430767026401-p0120"><span data-dcnode-id="621"><span data-dcnode-id="625" instrument_node="">Postwar economic history was also influenced by the social effects and economic problems generated by the spectacular expansion of the Western economy during the postwar period. Indeed, research was much inspired by the increasing number of publications, such as the report of the Club of Rome (1972), revealing the problems caused by economic growth, or by movements protesting against the negative effects of growth in the West, such as the activist policies, formulated by the UNCTAD in the course of the 1960s and 1970s. Responding to these reactions, new themes emerged in the programs of the world conferences of the International Association of Economic History. These included, from the 1970s onwards, in particular: ‘Natural Resources and Economic Development in History,’ ‘Oil in the World Economy,’ ‘Environment and Urbanization in History,’ ‘Ecological History,’ ‘The Economic History of Leisure and Recreation,’ ‘Typology of Colonial Economic Development,’ ‘The Economic History of the </span><a class="topic-link" data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/third-world" title="Learn more about Third World from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="624" instrument_node="">Third World</span></a><span data-dcnode-id="622" instrument_node="">,’ ‘Loans, Debts and Economic Development in the Nineteenth and Twentieth Centuries,’ </span></span><em data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">inter alia</span></em><span data-dcnode-id="618" instrument_node="">. The Cold War and its ideological conflicts would lead to a number of studies comparing the efficiency of the two economic systems in an historical perspective.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="607"><a aria-describedby="tp-snippet-chp-title-B0080430767026401" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B0080430767026401" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780080430768" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="600"><a class="read-full-chapter-print" data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B0080430767026401" rel="noopener" target="_blank"><span data-dcnode-id="606" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="601"><span data-dcnode-id="604" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="602" instrument_node="">https://www.sciencedirect.com/science/article/pii/B0080430767026401</span></div></div></article><article class="snippet column" data-dcnode-id="468" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="483"><h2 class="u-font-serif u-text-light" data-dcnode-id="595" id="tp-snippet-chp-title-B9780128176887000045"><a class="anchor" data-aa-name="Energy consumption and income distribution. International policies for mitigating social exclusion" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128176887000045"><span class="anchor-text" data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Energy consumption and income distribution. International policies for mitigating social exclusion</span></span></a></h2><div class="size-l" data-dcnode-id="484"><cite data-dcnode-id="581"><p data-dcnode-id="582"><span data-dcnode-id="587"><span data-dcnode-id="594" instrument_node="">Dainius </span><span data-dcnode-id="592" instrument_node="">Genys</span><span data-dcnode-id="590" instrument_node="">, in</span><span data-dcnode-id="588" instrument_node=""> </span></span><a class="anchor" data-aa-name="Energy Transformation Towards Sustainability" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/book/9780128176887/energy-transformation-towards-sustainability"><span class="anchor-text" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Energy Transformation Towards Sustainability</span></span></a><span data-dcnode-id="583" instrument_node="">, 2020</span></p></cite><section data-dcnode-id="485" id="B9780128176887000045-s0015"><h3 data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Peculiarities of Post-Soviet society</span></h3><p data-dcnode-id="564" id="B9780128176887000045-p0070"><span data-dcnode-id="578" instrument_node="">Usually, energy is one of the most important pillars of modern economy, and society is interested that it would be efficient and work smoothly; these were the main concerns in the development of energy sectors for many years in many countries. However, energy security is not a simple “reliable supply of energy resources at affordable prices” (</span><span data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Yergin, 1988</span></span><span data-dcnode-id="575" instrument_node="">, p. 111) problem in Lithuania. It does face some extra challenges due to its historical and geopolitical aspects (</span><span data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Augutis et&nbsp;al., 2013, 2014, 2015</span></span><span data-dcnode-id="572" instrument_node="">). Lithuania inherited an energy sector that was neither efficient nor developed to respond to an independent country's needs (for more than 2</span><span data-dcnode-id="570" instrument_node="">&nbsp;</span><span data-dcnode-id="568" instrument_node="">decades it was totally dependent on Russian energy). Lithuania had to fundamentally restructure its energy sector; therefore energy security became a huge and expensive challenge that was laid on the shoulders of a relatively poor society (</span><span data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Genys, Krikštolaitis, 2015</span></span><span data-dcnode-id="565" instrument_node="">).</span></p><p data-dcnode-id="548" id="B9780128176887000045-p0075"><span data-dcnode-id="559"><span data-dcnode-id="563" instrument_node="">Like all modern industrial societies, the Soviet state inevitably had parallel ways to develop various closely related sectors of society (industrialization, urbanization, </span><a class="topic-link" data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/bureaucratization" title="Learn more about bureaucratization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="562" instrument_node="">bureaucratization</span></a><span data-dcnode-id="560" instrument_node="">, public education, and health care systems, etc.). The energy subsystem had to be one of the basic areas of state development. Typologically, they were the necessary conditions of all modern industrial societies' development, so we can talk about Western-type society's modernization, which took place during the Soviet period (</span></span><span data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Castells, 2007</span></span><span data-dcnode-id="552"><span data-dcnode-id="556" instrument_node="">, pp. 18–70). The construction of communist society was accompanied by industrialization, </span><a class="topic-link" data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/homogenisation" title="Learn more about homogenization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="555" instrument_node="">homogenization</span></a><span data-dcnode-id="553" instrument_node="">, and urbanization, therefore energy infrastructure became an important part of Soviet modernization. Soviet modernization was framed by totalitarian politics and ideology, and most of modernization's negative aspects (environmental, bureaucratic, economic, energy, etc.) as well as the aspects of risk for society were more expressed than in Western democratic industrial societies, where it was possible to discuss the risks produced by modernization (</span></span><span data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Leonavičius and Genys 2012, Leonavičius and Genys 2014a</span></span><span data-dcnode-id="549" instrument_node="">).</span></p><p data-dcnode-id="525" id="B9780128176887000045-p0080"><span data-dcnode-id="539"><span data-dcnode-id="543"><span data-dcnode-id="547" instrument_node="">After the transition from </span><span class="topic-highlight" data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">planned economy</span></span><span data-dcnode-id="544" instrument_node=""> to liberal </span></span><a class="topic-link" data-dcnode-id="541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/market-economy" title="Learn more about market economy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="542" instrument_node="">market economy</span></a><span data-dcnode-id="540" instrument_node="">, the post-Soviet societies faced the challenge to switch their understanding about the energy sector and adapt to </span></span><span data-dcnode-id="538" id="B9780128176887000045-p89"></span><span data-dcnode-id="537" instrument_node="">the current situation. A few decades ago, energy was cheap, provided by the state and the former Soviet Union, was understood as a guarantee of safe and cheap energy supply. Today, energy has become quite an expensive challenge; the Lithuanians have to pay the price dictated by Gazprom, and Russia has become the biggest threat.</span><span data-dcnode-id="534"><sup data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">1</span></sup></span><span data-dcnode-id="529"><span data-dcnode-id="533" instrument_node=""> After its </span><a class="topic-link" data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/declaration-of-independence" title="Learn more about declaration of independence from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="532" instrument_node="">declaration of independence</span></a><span data-dcnode-id="530" instrument_node="">, Lithuanian society was confronted not only by the change of political and economic systems but by the new balance of geopolitical powers in the region, and also by the change of symbolic meaning of energy sector—due to its inevitable structural modernization, it became an expansible challenge, an anchor of the young country's economy, which finally lay down on the shoulders of taxpayers (</span></span><span data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Leonavičius et&nbsp;al., 2015</span></span><span data-dcnode-id="526" instrument_node="">).</span></p><p d
