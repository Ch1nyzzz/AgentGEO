ata-dcnode-id="523" id="B9780128176887000045-p0085"><span data-dcnode-id="524" instrument_node="">Even just a few years ago Lithuania (along with other Baltic states) used to be deservedly referred to as an “energy island”. Drastic but positive change happened in 2015, when the LNG terminal “Independence” was launched at the end of the year and successful completion of electricity links with Poland and Sweden have helped to dispose of the “island” status. Figuratively speaking, persistent efforts, careful planning, and smart politics have helped Lithuania to emerge as a new bright energy security star among many Eastern European countries. However, this change was accompanied with lots of worries and anxiety from a public perception point of view.</span></p><p data-dcnode-id="515" id="B9780128176887000045-p0090"><span data-dcnode-id="522" instrument_node="">The research showed that for years the most important aspect of energy security for Lithuanians was price (</span><span data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Leonavicius et&nbsp;al., 2015, 2018</span></span><span data-dcnode-id="519" instrument_node="">). Such perception is quite understandable in a post-Soviet country where residents of the former Soviet empire were used to cheap energy prices. However, sometimes public will might be inadequate or contradict the strategic interests of the country (i.e., when government wants to invest and society—strive for cheap energy). Even though the majority of Lithuanian society agrees that energy independency from other countries is an important (important or very important; 71.8% agreed) aspect of energy security, 68.7% mentioned that “the state should be concern[ed] with and do more about cheap energy instead of energy security,” and only 30.8% agreed that “the state should be concern[ed] with energy independence despite the requirement for bigger investments” (</span><span data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Augutis et&nbsp;al., 2015</span></span><span data-dcnode-id="516" instrument_node="">, p. 23). Even though it is almost impossible to ensure the supply of cheap energy without achieving independence of the energy sector from a monopolistic system, the society does not intend to support this goal at the expense of personal wealth. The implementation of energy policy is based on the rationality of society and its trust in the public interest.</span></p><p data-dcnode-id="503" id="B9780128176887000045-p0095"><span data-dcnode-id="514" instrument_node="">Economic differentiation is quite vivid in Lithuania (</span><span data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Lisauskaitė, 2010;</span></span><span data-dcnode-id="511" instrument_node=""> </span><span data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Zabarauskaitė, Blažienė, 2012</span></span><span data-dcnode-id="508" instrument_node="">), therefore energy prices have different effects on different social groups. The welfare of a large part of Lithuanian society depends on centralized supply of energy resources (gas, electricity, district heating), poor quality of energy infrastructure, inability to make individual decisions, and especially prices (</span><span data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Leonavičius and Genys, 2014b</span></span><span data-dcnode-id="505" instrument_node="">). It is obvious that the part of society with lower income is particularly vulnerable not only because of increasing energy prices, disruption in supply, or other risks of the energy system but also because of the growing financial burden that occurs due to the quest for energy security. Therefore, the cost for energy security (the same as labor market, low income, unemployment, health care, etc.) might become the reason for increase of social exclusion.</span><span data-dcnode-id="504" id="B9780128176887000045-p90"></span></p><p data-dcnode-id="486" id="B9780128176887000045-p0100"><span data-dcnode-id="498"><span data-dcnode-id="502" instrument_node="">The energy system is important for the economy of every country because its efficiency or inefficiency, respectively, has a positive or negative impact on country's economy and creates (or not) conditions for sustainable </span><a class="topic-link" data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/development-of-society" title="Learn more about development of society from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="501" instrument_node="">development of society</span></a><span data-dcnode-id="499" instrument_node=""> (</span></span><span data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Blum, Legey, 2012</span></span><span data-dcnode-id="495" instrument_node="">). Comparative research</span><span data-dcnode-id="492"><sup data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">2</span></sup></span><span data-dcnode-id="487"><span data-dcnode-id="491" instrument_node=""> shows that those societies that are cohesive and mobilized usually overcome challenges faster and more successfully. And in contrast, fragmented and unorganized societies face some extra challenges. If a vivid </span><a class="topic-link" data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/inequality" title="Learn more about inequality from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="490" instrument_node="">inequality</span></a><span data-dcnode-id="488" instrument_node=""> is present in society and the burden of prices is experienced unequally, opportunity appears to manipulate the public attitude toward particular projects or even foster fragmentation in society. That is why the implementation of any reform or specific energy infrastructure projects should be based not only on economic benefit but also on the potential impact on social cohesion.</span></span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="476"><a aria-describedby="tp-snippet-chp-title-B9780128176887000045" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128176887000045" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780128176887" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="469"><a class="read-full-chapter-print" data-dcnode-id="474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128176887000045" rel="noopener" target="_blank"><span data-dcnode-id="475" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="470"><span data-dcnode-id="473" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="471" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9780128176887000045</span></div></div></article><article class="snippet column" data-dcnode-id="391" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="406"><h2 class="u-font-serif u-text-light" data-dcnode-id="464" id="tp-snippet-chp-title-B9780444529442000082"><a class="anchor" data-aa-name="Handbooks in Economics" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780444529442000082"><span class="anchor-text" data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Handbooks in Economics</span></span></a></h2><div class="size-l" data-dcnode-id="407"><cite data-dcnode-id="450"><p data-dcnode-id="451"><span data-dcnode-id="456"><span data-dcnode-id="463" instrument_node="">Richard B. </span><span data-dcnode-id="461" instrument_node="">Freeman</span><span data-dcnode-id="459" instrument_node="">, in</span><span data-dcnode-id="457" instrument_node=""> </span></span><a class="anchor" data-aa-name="Handbook of Development Economics" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/handbook/handbook-of-development-economics"><span class="anchor-text" data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Handbook of Development Economics</span></span></a><span data-dcnode-id="452" instrument_node="">, 2010</span></p></cite><section data-dcnode-id="408" id="B9780444529442000082-s0055"><h3 data-dcnode-id="444"><span data-dcnode-id="449" instrument_node="">8.1</span><span data-dcnode-id="447" instrument_node=""> </span><span data-dcnode-id="445" instrument_node="">China</span></h3><p data-dcnode-id="435" id="B9780444529442000082-p0530"><span data-dcnode-id="439"><span data-dcnode-id="443" instrument_node="">China's transformation from communist </span><span class="topic-highlight" data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">planned economy</span></span><span data-dcnode-id="440" instrument_node=""> to a market economy and entry to the global trading system is one of the most important developments in recent economic history. As part of this shift, the country radically changed its labor market institutions. From the 1960s through the late 1980s, China did not have a working labor market. The state/party controlled the demand and supply of labor (</span></span><span data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Walder, 1986</span></span><span data-dcnode-id="436" instrument_node="">). The state was the primary employer. It set pay through a national pay grid and mandated benefits such as health care, retirement, and housing. It controlled hiring and firing and assigned workers to jobs. It limited migration through Hukou residency restrictions. Fearing that unemployed urban youth might create a social problem in the 1980s, the state encouraged older workers to retire by promising to assign their jobs to their offspring.</span></p><p data-dcnode-id="433" id="B9780444529442000082-p0535"><span data-dcnode-id="434" instrument_node="">Shifting from communist planning to markets in the mid-1980s through the 1990s, China freed firms and workers to make demand and supply decisions. It gave management of state-owned enterprises authority to hire and fire and introduce performance-linked wages. It allowed greater private employment. In the 1990s it privatized many small and medium state-owned enterprises and laid off several million workers from state enterprises. It weakened the Hukou system. With opportunity to find work, buy food, and obtain housing in the market, upward of 100–150 million workers moved from rural to urban areas—the largest internal migration in history. Workers and firms matched themselves in the job market rather than relying on state assignment.</span></p><p data-dcnode-id="424" id="B9780444529442000082-p0540"><span data-dcnode-id="428"><span data-dcnode-id="432" instrument_node="">Could China have successfully transitioned to a market economy with its prelabor market institutions? Studies of wages, employment, and productivity during China's growth spurt suggest that the </span><a class="topic-link" data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/labour-market-reform" title="Learn more about Labour Market Reform from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="431" instrument_node="">labor market reforms</span></a><span data-dcnode-id="429" instrument_node=""> were an essential part of China's success (</span></span><span data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Knight &amp; Song, 2005; Meng, 2000</span></span><span data-dcnode-id="425" instrument_node="">). Wages for skilled work increased, raising the return to education. Tens of millions found work in the private sector. Productivity rose in state-owned enterprises. It is hard to imagine these changes occurring with the state setting pay and assigning workers to jobs, though it is hard to imagine a counterfactual test for this assertion.</span></p><p data-dcnode-id="409" id="B9780444529442000082-p0545"><span data-dcnode-id="416"><span data-dcnode-id="423" instrument_node="">The new Chinese labor market produced a huge income gap between rich and poor, evinced in a </span><a class="topic-link" data-dcnode-id="421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/gini-coefficient" title="Learn more about Gini Coefficient from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="422" instrument_node="">Gini coefficient</span></a><span data-dcnode-id="420" instrument_node=""> that reached US levels by 2005, disturbing Party leaders, who worried about “mounting public anger over </span><a class="topic-link" data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/economics-econometrics-and-finance/inequality" title="Learn more about Inequality from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="419" instrument_node="">inequality</span></a><span data-dcnode-id="417" instrument_node=""> and corruption” (</span></span><span data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Eckholm, 2001</span></span><span data-dcnode-id="413" instrument_node="">). To deal with these concerns, China enacted a new labor code in 2007 that required employers give written contracts to workers, restricted use of temporary laborers, made layoffs more difficult, and strengthened the power of the All China Federation of Trade Unions to organize and to bargain for wages and benefits. With </span><span data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">World Bank (2006b)</span></span><span data-dcnode-id="410" instrument_node=""> advice, the government sought to establish a national pension system. China's effort to develop labor institutions to reduce income inequality and insure against social disorder reflects a very different perspective on the role that institutions play in development than the fear that institutions are inimical to growth that motivates many economic studies.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="399"><a aria-describedby="tp-snippet-chp-title-B9780444529442000082" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780444529442000082" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780444529442" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="392"><a class="read-full-chapter-print" data-dcnode-id="397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780444529442000082" rel="noopener" target="_blank"><span data-dcnode-id="398" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="393"><span data-dcnode-id="396" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="394" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9780444529442000082</span></div></div></article><article class="snippet column" data-dcnode-id="257" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="272"><h2 class="u-font-serif u-text-light" data-dcnode-id="387" id="tp-snippet-chp-title-B9781843346562500016"><a class="anchor" data-aa-name="Introduction to strategy, corporate governance and corporate reform" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781843346562500016"><span class="anchor-text" data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Introduction to strategy, corporate governance and corporate reform</span></span></a></h2><div class="size-l" data-dcnode-id="273"><cite data-dcnode-id="367"><p data-dcnode-id="368"><span data-dcnode-id="373"><span data-dcnode-id="386" instrument_node="">Hailan </span><span data-dcnode-id="384" instrument_node="">Yang</span><span data-dcnode-id="382" instrument_node="">, </span><span data-dcnode-id="380" instrument_node="">Stephen L. </span><span data-dcnode-id="378" instrument_node="">Morgan</span><span data-dcnode-id="376" instrument_node="">, in</span><span data-dcnode-id="374" instrument_node=""> </span></span><a class="anchor" data-aa-name="Business Strategy and Corporate Governance in the Chinese Consumer Electronics Sector" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/book/9781843346562/business-strategy-and-corporate-governance-in-the-chinese-consumer-electronics-sector"><span class="anchor-text" data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Business Strategy and Corporate Governance in the Chinese Consumer Electronics Sector</span></span></a><span data-dcnode-id="369" instrument_node="">, 2011</span></p></cite><section data-dcnode-id="274" id="B9781843346562500016-s0010"><h3 data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Overview</span></h3><p data-dcnode-id="341" id="B9781843346562500016-p0020"><span data-dcnode-id="364" id="B9781843346562500016-p2"></span><span data-dcnode-id="359"><span data-dcnode-id="363" instrument_node="">The Chinese transition from a </span><span class="topic-highlight" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">planned economy</span></span><span data-dcnode-id="360" instrument_node=""> to a market-oriented economy over the past three decades has seen considerable research focused on the reform of firms.</span></span><span data-dcnode-id="356"><sup data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">1</span></sup></span><span data-dcnode-id="348"><span data-dcnode-id="355" instrument_node=""> Research has examined questions such as: how do the Chinese firms improve their competitive advantage using internal resources to meet the challenges of the reforms? What is the respective role of new rules of the </span><a class="topic-link" data-dcnode-id="353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/market-economy" title="Learn more about market economy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="354" instrument_node="">market economy</span></a><span data-dcnode-id="352" instrument_node=""> and remaining legacy of the planned economy on Chinese firms? And how have managers sought to develop organizational structures to compete more effectively in the emerging market? This book aims to analyse how Chinese firms in the consumer electronics (CE) sector have developed their business strategy and </span><a class="topic-link" data-dcnode-id="350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/corporate-governance" title="Learn more about corporate governance from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="351" instrument_node="">corporate governance</span></a><span data-dcnode-id="349" instrument_node=""> – two aspects of their internal organization crucial for competitive advantage – during the reform process. Chinese transition to an increasingly market-oriented economy has given birth to a new diversity in firm ownership types. The book focuses on three broad ownership forms: the State-owned, collectively-owned and domestic privately-owned firms. As will become apparent, there is frequently difficulty in clearly classifying firm ownership structure in China. These three firm types best enable a comparative analysis of business strategy and corporate governance in this industry sector, which has been one of the leading sectors in the growth of Chinese-produced consumer manufactured products for domestic and export markets (</span></span><span data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">OECD, 2002</span></span><span data-dcnode-id="345" instrument_node="">; </span><span data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">CCIDConsulting, 2007</span></span><span data-dcnode-id="342" instrument_node="">).</span></p><p data-dcnode-id="298" id="B9781843346562500016-p0025"><span data-dcnode-id="336"><span data-dcnode-id="340" instrument_node="">Development of business strategy and the appropriate form of corporate </span><a class="topic-link" data-dcnode-id="338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/governance" title="Learn more about governance from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="339" instrument_node="">governance</span></a><span data-dcnode-id="337" instrument_node=""> are two of the major internal means to achieve the competitive advantage of the firms (</span></span><span data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Child and Pleister, 2003</span></span><span data-dcnode-id="333" instrument_node="">; </span><span data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Filatotchev and Toms, 2003</span></span><span data-dcnode-id="330" instrument_node="">). Competitive advantage comes from either lowering costs relative to competitors (doing the same better or more efficiently) or differentiation (do something different that provides more value to the user than the competitor), which enables the firm to outperform others in the sector (</span><span data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Porter, 1985</span></span><span data-dcnode-id="323"><span data-dcnode-id="327" instrument_node="">). The transition from a central planned to a market-oriented economy in China has increased the </span><a class="topic-link" data-dcnode-id="325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/autonomy" title="Learn more about autonomy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="326" instrument_node="">autonomy</span></a><span data-dcnode-id="324" instrument_node=""> of managerial decision-making in strategies that represents a genuine transformation of the business (</span></span><span data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Tan, 2002</span></span><span data-dcnode-id="320" instrument_node="">; </span><span data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Tan and Tan, 2003</span></span><span data-dcnode-id="317" instrument_node="">). Chinese firms in general have become more market responsive and in turn competitive. The strategic decision-making capability of managers should further be analysed with reference to the firm’s governance arrangements (</span><span data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Dalton et al., 1999</span></span><span data-dcnode-id="314" instrument_node="">; </span><span data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Filatotchev and Toms, 2003</span></span><span data-dcnode-id="311" instrument_node="">; </span><span data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Thomsen and Pedersen, 2000</span></span><span data-dcnode-id="308" instrument_node="">), which are related to the abilities of managers, their incentives to develop effective strategies and their accountability to stakeholders. Driven by the fierce market competition in the sector, firms have strived to reform their corporate governance (</span><span data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Liu and Woo, 2001</span></span><span data-dcnode-id="305" instrument_node="">). Improved corporate governance, and greater rewards for managers, are seen as the means to better enable the managers first to exploit strategically the internal resources of the firm, and second to position the firm to better explore external resources, thus to improve the competitive advantage of the firm (</span><span data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Jefferson and Su, 2006</span></span><span data-dcnode-id="302" instrument_node="">; </span><span data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Thomsen and Pedersen, 2000</span></span><span data-dcnode-id="299" instrument_node="">).</span></p><p data-dcnode-id="293" id="B9781843346562500016-p0030"><span data-dcnode-id="297" instrument_node="">Past empirical studies of Chinese firms have largely neglected the link between the three elements of business strategy, corporate governance, and performance in a transition economy such as that of China. These elements are related in a series of cause–effect interactions that start with the transition of the business environment and the response of firms in allocating resources. Changes in these elements may cause a fit or misfit between the strategic choices of firms and the external environment (</span><span data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Grant, 1999</span></span><span data-dcnode-id="294" instrument_node="">). Analysing the interaction between various internal and external elements helps enrich our understanding of the different processes that influence firm growth in the CE sector in China during the transition period.</span></p><p data-dcnode-id="279" id="B9781843346562500016-p0035"><span data-dcnode-id="292" id="B9781843346562500016-p3"></span><span data-dcnode-id="287"><span data-dcnode-id="291" instrument_node="">We examine the CE sector in particular because it is one of the country’s most important and dynamic </span><a class="topic-link" data-dcnode-id="289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/manufacturing-sector" title="Learn more about manufacturing sectors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="290" instrument_node="">manufacturing sectors</span></a><span data-dcnode-id="288" instrument_node="">; it was also one of the earliest market-oriented sectors. Thirty years ago the sector did not exist. China is now one of the world’s biggest producers and exporters of CE products (</span></span><span data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">CCID Consulting Report, 2008</span></span><span data-dcnode-id="280"><span data-dcnode-id="284" instrument_node="">). The sector is therefore useful for examining how firms develop their business strategy and corporate governance in China, which is undergoing the transition to a market-oriented economy domestically in which firms face challenges from multi-national corporations (MNCs) globally. Many Chinese firms in this sector over the past decade have also been pioneers in venturing abroad, setting up subsidiaries in both advanced </span><a class="topic-link" data-dcnode-id="282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/market-economy" title="Learn more about market economies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="283" instrument_node="">market economies</span></a><span data-dcnode-id="281" instrument_node=""> and developing economies.</span></span></p><p data-dcnode-id="275" id="B9781843346562500016-p0040"><span data-dcnode-id="278" instrument_node="">For Chinese managers who have been so enthusiastic to embrace Western theories and practices for the past 30 years, the challenge is how to adopt and implement approaches to management in a very different institutional and political context to that in which they were developed. </span><span data-dcnode-id="277" id="B9781843346562500016-p4"></span><span data-dcnode-id="276" instrument_node="">This book investigates the generalizability of the Western model of management in China. The transfer, adaptation and implementation of Western management practice is not only important for Chinese firms, which are eager to integrate themselves with the world, but also important for MNCs, which have tremendous incentives to succeed in the Chinese domestic market as local consumers acquire increasing levels of discretionary income.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="265"><a aria-describedby="tp-snippet-chp-title-B9781843346562500016" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781843346562500016" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9781843346562" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="258"><a class="read-full-chapter-print" data-dcnode-id="263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781843346562500016" rel="noopener" target="_blank"><span data-dcnode-id="264" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="259"><span data-dcnode-id="262" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="260" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9781843346562500016</span></div></div></article><article class="snippet column" data-dcnode-id="162" style="padding-right: 0px; padding-left: 40px; float: right;"><div class="snippet-content" data-dcnode-id="177"><h2 class="u-font-serif u-text-light" data-dcnode-id="253" id="tp-snippet-chp-title-B9781843345473500060"><a class="anchor" data-aa-name="Trend and Pattern of Foreign Direct Investment in China’s Economic Boom" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781843345473500060"><span class="anchor-text" data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Trend and Pattern of Foreign Direct Investment in China’s Economic Boom</span></span></a></h2><div class="size-l" data-dcnode-id="178"><cite data-dcnode-id="233"><p data-dcnode-id="234"><span data-dcnode-id="239"><span data-dcnode-id="252" instrument_node="">Nihau </span><span data-dcnode-id="250" instrument_node="">Jiang</span><span data-dcnode-id="248" instrument_node="">, ... </span><span data-dcnode-id="246" instrument_node="">Kishor </span><span data-dcnode-id="244" instrument_node="">Sharma</span><span data-dcnode-id="242" instrument_node="">, in</span><span data-dcnode-id="240" instrument_node=""> </span></span><a class="anchor" data-aa-name="WTO Accession and Socio-Economic Development in China" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/book/9781843345473/wto-accession-and-socio-economic-development-in-china"><span class="anchor-text" data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">WTO Accession and Socio-Economic Development in China</span></span></a><span data-dcnode-id="235" instrument_node="">, 2009</span></p></cite><section data-dcnode-id="179" id="B9781843345473500060-s0020"><h3 data-dcnode-id="227"><span data-dcnode-id="232" instrument_node="">2.1</span><span data-dcnode-id="230" instrument_node=""> </span><span data-dcnode-id="228" instrument_node="">FDI policy</span></h3><p data-dcnode-id="196" id="B9781843345473500060-p0015"><span data-dcnode-id="222"><span data-dcnode-id="226" instrument_node="">Under the Soviet-style </span><span class="topic-highlight" data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">planned economy</span></span><span data-dcnode-id="223" instrument_node=""> foreign-owned firms did not exist on Chinese soil until the mid 1970s and foreign trade was regulated by government-owned enterprises. It was only after 1978 that foreign firms began to invest in China when </span></span><span data-dcnode-id="221" id="B9781843345473500060-p101"></span><span data-dcnode-id="220" instrument_node="">Deng Xiaoping opened up the economy for export-oriented firms, a response following the shortage of foreign currency brought about by the relaxation of import restrictions for domestic firms. To facilitate the development of export-oriented foreign firms, four Special Economic Zones (SEZs) were created along the southeast coast - Shenzhen, Zhuhai, Xiamen and Shantou - in 1980. In 1984, another fourteen SEZs were established as they became increasingly attractive for export-oriented foreign firms</span><span data-dcnode-id="217"><sup data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">1</span></sup></span><span data-dcnode-id="216" instrument_node="">. The 1982 Constitution committed to protect property rights of foreign firms. By the mid 1980s, export subsidies were introduced and the Chinese currency (RMB) was significantly devalued - from RMB 1.7 to the US dollar in 1981 to RMB 2.9 to the US dollar in 1985 (</span><span data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Dwight 1994</span></span><span data-dcnode-id="213" instrument_node="">)</span><span data-dcnode-id="210"><sup data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">2</span></sup></span><span data-dcnode-id="204"><span data-dcnode-id="208" instrument_node="">. In the early 1980s and early 1990s, SEZs were extended to three deltas—the Pearl River Delta, the Minnan Delta and Yangzi River Delta - and the Hainan province and the Pudong New Area in Shanghai. Foreign firms located in SEZs were granted preferential tax treatment (income tax-holiday for two years and thereafter 50 per cent discount on income tax for another three years). In addition to this, a number of provinces offered additional tax incentives and lower land-use fees for foreign firms. By the early 1990s, the central government permitted 100 per cent ownership for foreign enterprises and amended the </span><a class="topic-link" data-dcnode-id="206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/joint-ventures" title="Learn more about joint venture from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="207" instrument_node="">joint venture</span></a><span data-dcnode-id="205" instrument_node=""> (JV) law which permitted a JV agreement beyond 50</span></span><span data-dcnode-id="203" instrument_node="">&nbsp;</span><span data-dcnode-id="201" instrument_node="">years. Furthermore, foreign firms were allowed to operate in more sectors than domestic private firms</span><span data-dcnode-id="198"><sup data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">3</span></sup></span><span data-dcnode-id="197" instrument_node="">.</span></p><p data-dcnode-id="180" id="B9781843345473500060-p0020"><span data-dcnode-id="191"><span data-dcnode-id="195" instrument_node="">In 1992 the government relaxed a number of sectoral and regional barriers relating to foreign investment, decentralized approval authority from the central government to local governments and entered into agreements with the United States to open up its market and protect </span><a class="topic-link" data-dcnode-id="193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/intellectual-property-right" title="Learn more about intellectual property rights from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="194" instrument_node="">intellectual property rights</span></a><span data-dcnode-id="192" instrument_node=""> vigorously (</span></span><span data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Lardy 1992</span></span><span data-dcnode-id="188" instrument_node=""> &amp; </span><span data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">1994</span></span><span data-dcnode-id="181"><span data-dcnode-id="185" instrument_node="">). Tax and </span><a class="topic-link" data-dcnode-id="183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/tariff-policy" title="Learn more about tariff policy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="184" instrument_node="">tariff policy</span></a><span data-dcnode-id="182" instrument_node=""> favoured FDI firms over the private sector efficient firms and SOEs, which is why a significant amount of round trip FDI took place.</span></span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="170"><a aria-describedby="tp-snippet-chp-title-B9781843345473500060" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781843345473500060" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.else
