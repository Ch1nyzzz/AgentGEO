</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="2268" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/4e89be654363295436a4a3382f13da63%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/4e89be654363295436a4a3382f13da63?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="2267" instrument_node=""> </span><a class="reply-link" data-dcnode-id="2265" data-parent-id="53596" href="#"><span data-dcnode-id="2266" instrument_node="">Reply</span></a><span data-dcnode-id="2264" instrument_node="">

</span><p data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">Persons who don’t like persons who are stronger than they will often try to rise against said person who has an ambition in an attempt to knock them down so they can walk on they.</span></p><span data-dcnode-id="2255" instrument_node="">
</span><p data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">I been building my company since I was 7. I’m still not even walking yet. I receive no help despite my pleas. I only receive retort, disapproval, mocks and maybe some who lightly “encourage” me “Oh, that’s a great idea! keep it up, you’ll get there!”</span></p><span data-dcnode-id="2252" instrument_node="">
</span><p data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">People will follow only when you appear to have Power. But, when you are simply stronger than they… with the strength to chase a dream.. to make it a reality.. They envy that. Likely because they haven’t found their dream yet. Or maybe because they can’t follow their dream.</span></p><span data-dcnode-id="2249" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="2239" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/4f07c1fb34df4f964f61f4816a8df857%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/4f07c1fb34df4f964f61f4816a8df857?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="2238" instrument_node=""> </span><a class="reply-link" data-dcnode-id="2236" data-parent-id="53595" href="#"><span data-dcnode-id="2237" instrument_node="">Reply</span></a><span data-dcnode-id="2235" instrument_node="">

</span><p data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">I think people feel left out when someone goes after what they want. I have certainly felt that way in the past, “how come they are doing all this awesome stuff and I am sitting here in the dust”.</span></p><span data-dcnode-id="2226" instrument_node="">

</span><div class="col-xs-2 avatar-col" data-dcnode-id="2211"><span data-dcnode-id="2217" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="2216" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/9b63a77a2edb22bb040b3aae0c272ad0%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/9b63a77a2edb22bb040b3aae0c272ad0?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="2215" instrument_node=""> </span><a class="reply-link" data-dcnode-id="2213" data-parent-id="53594" href="#"><span data-dcnode-id="2214" instrument_node="">Reply</span></a><span data-dcnode-id="2212" instrument_node="">

</span><div class="col-xs-10" data-dcnode-id="2181"><span data-dcnode-id="2209" instrument_node="">
</span><b class="comment-author" data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">David</span></b><span data-dcnode-id="2206" instrument_node="">
</span><p data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">For me, it really came down to the simple idea of “know thyself.”</span></p><span data-dcnode-id="2203" instrument_node="">
</span><p data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">I walked away from two companies that I started and went back to corporate America. Why? Because I had to find a way to pay back the $250K hole I created being an entrepreneur. I wasn’t always in the hole–had in fact been up by eight figures at one point (eight after the .00). Long story. </span></p><span data-dcnode-id="2200" instrument_node="">
</span><p data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">After the bills were paid, what did I do?</span></p><span data-dcnode-id="2197" instrument_node="">
</span><p data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">At 50, my partners and I starting two more companies… in our spare time… while we work the stressful corporate gigs. Just like we did when were in our 30s. </span></p><span data-dcnode-id="2194" instrument_node="">
</span><p data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Why? </span></p><span data-dcnode-id="2191" instrument_node="">
</span><p data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">Know thyself: I am an entrepreneur. I have ambition. I have to be what God made me to be. I work from 4 am- 10 pm 5-6 days a week. And I LOVE it. We’re building something out of nothing once again and I LOVE it. I’m working with people that I dearly LOVE. </span></p><span data-dcnode-id="2188" instrument_node="">
</span><p data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">Are there millions waiting for us a little bit down the road? If that’s what’s driving me, frankly, I’m a monkey. That’s not the payout I’m looking for. We’re building two companies that will serve two industries with major pain points and we will let the market decide how relevant we are. Of course, we did our research and we really believe we’re gonna be the bomb! ;0) </span></p><span data-dcnode-id="2185" instrument_node="">
</span><p data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">But only time will tell. In the meantime, paraphrased, “Release the dogs of ambition!”</span></p><span data-dcnode-id="2182" instrument_node="">
</span></div><span data-dcnode-id="2180" instrument_node="">
</span></div><span data-dcnode-id="2178" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="2172" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/bc7ed535e74cb45e240220db08f82dff%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/bc7ed535e74cb45e240220db08f82dff?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="2171" instrument_node=""> </span><a class="reply-link" data-dcnode-id="2169" data-parent-id="53593" href="#"><span data-dcnode-id="2170" instrument_node="">Reply</span></a><span data-dcnode-id="2168" instrument_node="">

</span><div class="col-xs-10" data-dcnode-id="2158"><span data-dcnode-id="2165" instrument_node="">
</span><b class="comment-author" data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Jamie Oxenham</span></b><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">It comes down to the basic fear and lack. Most peoples thoughts and beliefs aren’t even their own. They have adopted the beliefs of every person they hold as being in an authoritative position. IE parents, teachers etc. Somehow, it seems, we’ve all been taught that there isn’t enough to go around. If ‘you’ have more, then by my ingrained, and mis-taught belief system, it means the only possible outcome is that I will have less. There fore, you are taking from me. However, millionaires are created every day, so that clearly isn’t true. I think people confuse someone who has ambition, with someone who stop at nothing to get what they want.</span></p><span data-dcnode-id="2159" instrument_node="">

</span><b class="comment-author" data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Brian</span></b><span data-dcnode-id="2139" instrument_node="">
</span><p data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">Many people think that in order to get something, they have to give up something else in return, i.e., you can’t have it all. So they try to justify their current choices and habits. It’s a mental state commonly referred to as “seeing only validation”. </span></p><span data-dcnode-id="2136" instrument_node="">
</span><p data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">I think people get overwhelmed with the idea of starting their own business and all you have to do and learn… so they create mental justifications to remain unambitious.</span></p><span data-dcnode-id="2133" instrument_node="">

</span><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">What irks me are the assumptions inherent in people saying “There’s more to life than just…”</span></p><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2079"><span data-dcnode-id="2084" instrument_node="">-What have I said that makes you think I’m excluding other ‘important’ things?</span><br data-dcnode-id="2083"><span data-dcnode-id="2082" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="2065" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/b7bf141529b812fcdb7fa8862a8ad4bf%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/b7bf141529b812fcdb7fa8862a8ad4bf?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="2064" instrument_node=""> </span><a class="reply-link" data-dcnode-id="2062" data-parent-id="53586" href="#"><span data-dcnode-id="2063" instrument_node="">Reply</span></a><span data-dcnode-id="2061" instrument_node="">

</span><div class="col-xs-10" data-dcnode-id="2045"><span data-dcnode-id="2058" instrument_node="">
</span><b class="comment-author" data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Andrew S.</span></b><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">People hate ambition because on a fundamental level it triggers the “I should be doing more” thought. Everyone has something that has been sitting on their to-do list for longer than it should, or the dream that is just out of reach because they can’t get motivated (for whatever reason) to start taking the steps towards it. When we see someone who is going after it, making things happen, it reminds up of our own failures or lack of effort. </span></p><span data-dcnode-id="2052" instrument_node="">
</span><p data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">I think this is the same reason why people love trash TV. It makes us feel better about our situation with out expending any effort at all. Our situation is better, so we feel good about all of our accomplishments. There is nothing like an episode of hoarders where they find a mummified cat to make your room look cleaner – and it’s easier than actually cleaning anything up. </span></p><span data-dcnode-id="2049" instrument_node="">
</span><p data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">A smaller portion of this resentment, I think, stems from people believing there is only so much to the pie, and if he wants a bigger slice what is left for me.</span></p><span data-dcnode-id="2046" instrument_node="">

</span><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Whenever I think about people’s reaction to ambition, I think about a bucket of crabs (there are plenty of these in Maryland). If you ever look at a bucket of live crabs, the ones at the top are always trying to get out. </span></p><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">They claw at the sides, maybe they crab one of the metal hooks holding the bucket together, and eventually they start to pull themselves out.</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Then the crab below them sees a little freedom. He tastes the fresh salty air and he thinks there’s more to life than being jammed in a bucket with all these other crabby dudes. </span></p><span data-dcnode-id="1878" instrument_node="">
</span><p data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">But instead of trying to get out on his own, he grabs the guy who is almost out… and pulls him back in. </span></p><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">If he can’t get out, neither can the first guy.</span></p><span data-dcnode-id="1872" instrument_node="">

</span><b class="comment-author" data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Rivka Kawano</span></b><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">There are probably as many answers to this question as people having the conversation. Definitely I think some of the comments above are right on that some people feel their lifestyle is being challenged when you are pursuing a different path. They are afraid of what is possible/impossible and just don’t want to go there mentally. </span></p><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">But I think sometimes it is about the stories we are telling. If we have the tendency to complain about how hard our path is, people may perceive that we don’t really like what we are doing and be trying to help. </span></p><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">It seems to me that whatever the case we need to make some kind of adjustment. Either find better friends who understand and are supportive and will help push us to our potential. Or start telling better stories about our life and showing the positive side of our ambition.</span></p><span data-dcnode-id="1765" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="1729" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/f32692a81cdde0a31e2b4c558df0b3cd%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/f32692a81cdde0a31e2b4c558df0b3cd?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="1728" instrument_node=""> </span><a class="reply-link" data-dcnode-id="1726" data-parent-id="53577" href="#"><span data-dcnode-id="1727" instrument_node="">Reply</span></a><span data-dcnode-id="1725" instrument_node="">

</span><b class="comment-author" data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Jen Gresham</span></b><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Wow. This is a big question, Derek. As someone who works with overachievers, this is very related to what I’m writing an entire book about, so I clearly have a lot to say. Here are just a few thoughts to get the conversation started:</span></p><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">– I really like Christina’s question about who is in the driver’s seat. Many people use ambition as a means for feeling good about themselves. They feel they are only as good as their next achievement. They don’t say this out loud of course, not even to themselves. I think this accounts for a large portion of ambition–take it apart, and we are trying to impress people and earn their love. It’s what Alain de Botton was talking about in the book Status Anxiety. Those who suffer from this are probably more likely to *assume* everyone else is doing the same thing. However, there is healthy ambition–ambition driven by curiosity or challenge or simple joy. The difference is actually more evident in how people view failure than success.</span></p><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">– If you’re curious, I created a video called The Achievement Addiction that talks about this. I hate putting links to my own stuff on other people’s blogs, so if you want to see it, let me know and I’ll send you the link.</span></p><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">– It is worth noting that capitalism benefits from a populace with a lack of self-esteem. Advertisers can’t say that directly, but they can make you feel bad about not being ambitious enough. Some react to that by being more ambitious, some react by scorning ambition. Neither reaction is healthy.</span></p><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Again, lots more to say on this. I’ll jump back in as others comment.</span></p><span data-dcnode-id="1704" instrument_node="">

</span><p data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">The simple reason some disapprove of ambition is that they aren’t themselves ambitious. And that’s ok because not everyone is alike. People typically relate with people like themselves</span></p><span data-dcnode-id="1681" instrument_node="">

</span><p data-dcnode-id="1651"><span data-dcnode-id="1654" instrument_node="">Hey Derek, I think the term “ambition” feels icky to some people. I think people associate ambition to people who will do whatever it takes even if it’s sleazy to get ahead in life (usually in career). Kind of gives the rest of the ambitious bunch a bad rap. In most cases, ambitious people are the ones who have the fame and power and that perhaps may spark jealousy – the “whatever, I’m fine with what I have” feeling when they secretly want more but don’t want to put the extra work in. However when we talk about successes in family life or personal goals, the word ambition never even comes up. Not sure why – the word ambition means to have a strong desire or eager to accomplish something.</span><br data-dcnode-id="1653"><span data-dcnode-id="1652" instrument_node="">

</span><p data-dcnode-id="1603"><span data-dcnode-id="1606" instrument_node="">In my experience – being wildly ambitious, then allowing myself to temper it to suit those around me, then to allowing it to flourish again:</span><br data-dcnode-id="1605"><span data-dcnode-id="1604" instrument_node="">
People almost always take action to minimise, downplay or caution someone who vocalises ambition. I believe it has little to do with the ambitious person, and everything to do with the person needing to justify and support their own inaction – a survival instinct to justify their own resistance to change, to not do more, to accept less than they might have wanted. They can’t allow that feeling of unease and dissatisfaction without going slightly crazy, so they release it on someone who is still striving. Based on the notion that if everyone accepts the middle ground, then it must be OK to accept things as they are.</span></p><span data-dcnode-id="1602" instrument_node="">

</span><p data-dcnode-id="1572"><span data-dcnode-id="1575" instrument_node="">Ambition also changes over an individual’s lifetime. In my early thirties I was a high up corporate bod. Now in my fifties and having been self employed for about 13 years I do wonder why I had such shallow, naive ambitions back then which were all career centred.</span><br data-dcnode-id="1574"><span data-dcnode-id="1573" instrument_node="">

</span><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">To me it comes down to the point of people who question it in the way of, as you state, “There is more to life than…”, yes there is, and that is why you find balance.</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Not many know how to find balance. in Leo Baubuta’s book, “Zen To Done” (a simpler more practical guide in comparison to David Allen’s works), he states to take each aspect in your life you wish to improve on one at a time rather than all at once.</span></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">I believe people try to tackle every life aspect at once which they know they need improvement on and then get discouraged when it all comes crashing down because they cannot handle the load. </span></p><span data-dcnode-id="1116" instrument_node="">

</span><b class="comment-author" data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Jim Wang</span></b><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">I’m always surprised when people take advice that has worked for their life and believe it should be applied to everyone else, without regard to their situation.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">I have a family and it’s wonderful. However, I would tell anyone looking to start or grow their own business that they should wait to start a family. You only have 24 hours a day and you don’t need more things competing for your attention and enthusiasm, you need fewer things.</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">(just think of the small increase in responsibility whenever you got a dog, the little guy needs to pee when he needs to pee… it doesn’t matter if you’re in the middle of filming something!)</span></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">A spouse is awesome. Kids are awesome. But it’s like having another business, one that should matter far more and requires a lot more time.</span></p><span data-dcnode-id="906" instrument_node="">
</span></div><span data-dcnode-id="904" instrument_node="">
</span></div><span data-dcnode-id="902" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="867" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/c49af78d2f07702daeafa71454a3a675%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/c49af78d2f07702daeafa71454a3a675?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="866" instrument_node=""> </span><a class="reply-link" data-dcnode-id="864" data-parent-id="53647" href="#"><span data-dcnode-id="865" instrument_node="">Reply</span></a><span data-dcnode-id="863" instrument_node="">

</span><div class="col-xs-10 col-md-6" data-dcnode-id="850"><span data-dcnode-id="860" instrument_node="">
</span><b class="comment-author" data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Barbara Saunders</span></b><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">The automatic leap to “longer, harder hours” may be part of the problem. All too often, people judge other people not by their results or even their goals but by what amounts to social display. Face time.</span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">I, too, am skeptical of the person who is *always* out by 4:59 and never misses a happy hour or a Judge Judy episode. But the notion that *looking like you’re working* is the same as actually doing anything has more to do with the snob game than with actual ambition.</span></p><span data-dcnode-id="851" instrument_node="">
</span></div><span data-dcnode-id="849" instrument_node="">

</span><div class="col-xs-2 col-md-offset-4 avatar-col" data-dcnode-id="836"><span data-dcnode-id="842" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="841" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/c7099d7bfb6b63f9ac6df11d8414750f%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/c7099d7bfb6b63f9ac6df11d8414750f?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="840" instrument_node=""> </span><a class="reply-link" data-dcnode-id="838" data-parent-id="53614" href="#"><span data-dcnode-id="839" instrument_node="">Reply</span></a><span data-dcnode-id="837" instrument_node="">

</span><div class="col-xs-10 col-md-6" data-dcnode-id="818"><span data-dcnode-id="834" instrument_node="">
</span><b class="comment-author" data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">George</span></b><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Ryan, I too know people with little ambition who have been successful in their careers; or they’re successful for a while. There are those that do the minimum and yet are able to advance, but that is usually because of politics or being in the clique of the boss. </span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">I actually had a discussion one time with a senior manager about a similar topic. He literally told me “those who do the minimum are worth more than those who do the most.” I learned a lot about him during that conversation. He too was what you call successful. But that philosophy ended up being his undoing. And that culture almost ruined a company. </span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">I believe ambition is important. It should be a natural drive. Most probably are ambitious, just in things we don’t necessarily see. Some are ambitious in their careers, some with their families, some with sports or hunting, some with trying to see how long they can continue to get away with doing as little as possible at work. </span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">So, I don’t know what the real answer to the question is.</span></p><span data-dcnode-id="819" instrument_node="">

</span><b class="comment-author" data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Madeline</span></b><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">I agree with Brain, many people don’t realize what they really want in life or find their inner passion in what makes them happy. Most people are so busy living in a rat race they stop thinking. They do what everyone tells them to do or needs to do. They forget about themselves and what they really want out of life. So when they come across someone who knows exactly what they want in life they feel unbalanced in their own lives. This makes them reflect on their current situation and realize they haven’t lived fully. This makes them feel uncomfortable making them envious on others that know what they want and most importantly have a plan on how to get it. </span></p><span data-dcnode-id="695" instrument_node="">

</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Another here to agree with Brian. It’s all a matter of jealousy. Every time, in my experience, the negative comment comes from persons who ‘have less’ than I do, or who ‘do less’ than I do. IMHO, those kind of people are just not worth even knowing.</span></p><span data-dcnode-id="668" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="657" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/3627d78e2eff81f85cd8226e1a51c0e2%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/3627d78e2eff81f85cd8226e1a51c0e2?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="656" instrument_node=""> </span><a class="reply-link" data-dcnode-id="654" data-parent-id="57860" href="#"><span data-dcnode-id="655" instrument_node="">Reply</span></a><span data-dcnode-id="653" instrument_node="">

</span><b class="comment-author" data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Jason</span></b><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">I say it not because I’m jealous, or envious. Why would I be? I enjoy every aspect of my life and do the things that I enjoy not what others enjoy.</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">I lost my my grandad when I was 16. I then lost my mum to cancer when I was 18 and then my other granddad passed away when I was 22.</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">This made me completely refocus and ask the question: Would I rather spend 12 hours a day infront of a computer trying to make money or spend the time I have with the people I love? </span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">It fucking disgusts me when people assume that I’m envious of them because they have more money than me. If monetary values are so important to you, thats fine. Thats your life and if that gives you a thrill then so be it. Don’t get me wrong, I’d like to be a millionaire but am I going to waste away a life chasing that dream? Not very likely, there are more important things in my life than money. </span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">For the last 3 years I started a business that went on to turn over 8K+ per month. For a freelancer, I was happy with that but I worked 12 hours a day, 7 days a week. The stress was beyond what I wanted. I was ambitious and money drove me forward, but for what gain? To brag and show off? I barely saw friends and I was losing relationships. But hey, I’m ambitious and awesome and amazing so who needs them and they’re all just shit and jealous!?!</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Life is what you make of it. If you want to chase fictitious 0’s on a screen or get out there and live a life that was meant to be lived, do it. I’m not judging but just because you want to spend your time in an office doesn’t make me less ambitious. I drive an audi, live in a city and have an extremely comfortable lifestyle and once I’m out the office, the world is my own. There is more to life than work.</span></p><span data-dcnode-id="629" instrument_node="">
</span></div><span data-dcnode-id="627" instrument_node="">
</span></div><span data-dcnode-id="625" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="615" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/fc5f481f945992797c3580f5357521fb%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/fc5f481f945992797c3580f5357521fb?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="614" instrument_node=""> </span><a class="reply-link" data-dcnode-id="612" data-parent-id="53599" href="#"><span data-dcnode-id="613" instrument_node="">Reply</span></a><span data-dcnode-id="611" instrument_node="">

</span><div class="col-xs-10 col-md-6" data-dcnode-id="601"><span data-dcnode-id="608" instrument_node="">
</span><b class="comment-author" data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Alicia Bostic</span></b><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">I agree with Brian. People are envious of those that *know what they want* I think ambition is fantastic, and there’s nothing more frustrating then watching people you care about underachieve. That said, I still believe we have to learn to be satisfied with the now, while still pushing ourselves to become bigger and better people. For example, I always wanted to make more money so that I could travel and control my time. Then I realized, I didn’t have to be rich to do that. I just started investing my time in learning skills that would allow me to work independently (online)…ie: read social triggers, take blog that converts course, etc. By pursuing those things, I ended up landing a dream job that I’m way underqualified for (or was). The in-between was a series of deliberate actions that would take me one step closer to what I wanted. I once complained to a friend that I couldn’t write down my goals because they were constantly changing. She replied, “That’s why you haven’t achieved them. You have to know what you want.” And it’s true. Making a mistake is OK. Not taking action isn’t OK.</span></p><span data-dcnode-id="602" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="588" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/f4ffb923441402b788aa4002f71ca086%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/f4ffb923441402b788aa4002f71ca086?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="587" instrument_node=""> </span><a class="reply-link" data-dcnode-id="585" data-parent-id="53552" href="#"><span data-dcnode-id="586" instrument_node="">Reply</span></a><span data-dcnode-id="584" instrument_node="">

</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">First, I think that some people do take ambition to the extent that it does exclude important aspects of life.</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Second, I don’t think it has to do that. I think we can live a great life that is enhanced by ambition. </span></p><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Maybe the question is are you driving your ambition or is your ambition driving you?</span></p><span data-dcnode-id="569" instrument_node="">

</span><p data-dcnode-id="516"><span data-dcnode-id="521" instrument_node="">Ambition is a biological function, which makes it an oddity when people debate it. Your heart has an ambition to beat. Your neurons have an ambition to connect. Your lungs have an ambition to inhale. How is it that modeling basic biological functions and replicating them in the exterior world a bad thing?</span><br data-dcnode-id="520"><span data-dcnode-id="519" instrument_node="">
Remember in order “to see the light” the eye must have an ambition to collect photons.</span><br data-dcnode-id="518"><span data-dcnode-id="517" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="505" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/9b7c3e340837d228b286750a0fdf66b2%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/9b7c3e340837d228b286750a0fdf66b2?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="504" instrument_node=""> </span><a class="reply-link" data-dcnode-id="502" data-parent-id="53553" href="#"><span data-dcnode-id="503" instrument_node="">Reply</span></a><span data-dcnode-id="501" instrument_node="">

</span><b class="comment-author" data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Derek Halpern</span></b><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Hey Christina, this is a good comment. The source – or the why as Simon Sinek would say – is a good place to start.</span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">This isn’t self reflection for me, but instead my attempt to understand the ‘why’ behind the way people feel about ambition. </span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Consider this a crowd-sourced research project ;-D</span></p><span data-dcnode-id="486" instrument_node="">

</span><div class="comment re-reply" data-dcnode-id="439"><span data-dcnode-id="478" instrument_node="">

</span><div class="col-xs-2 col-md-offset-4 avatar-col" data-dcnode-id="470"><span data-dcnode-id="476" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="475" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/5c02743ea5aa0c8c3facf3931bd1bce2%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/5c02743ea5aa0c8c3facf3931bd1bce2?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="474" instrument_node=""> </span><a class="reply-link" data-dcnode-id="472" data-parent-id="80355" href="#"><span data-dcnode-id="473" instrument_node="">Reply</span></a><span data-dcnode-id="471" instrument_node="">
</span></div><span data-dcnode-id="469" instrument_node="">
</span><div class="col-xs-10 col-md-6" data-dcnode-id="443"><span data-dcnode-id="468" instrument_node="">
</span><b class="comment-author" data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Liz Hancock</span></b><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Hey Derek,</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">I think it is because most people don’t have much ambition or motivation in life in general. I’ve found that there are two categories of people (I know I’m oversimplifying but stay with me,…)</span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">There are those that set goals, get motivated, stay disciplined, and work through the difficulties to delay gratification and realize success. These people (and you know who you are) follow a formula that works for them. </span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Then there are others that truly struggle to realize who they really are or what makes them happy. They flounder and flit, reacting to life instead of proactively making things happen. </span></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">So, when someone from category A encounters someone from category B, the latter reacts with insecurity and feels the need to make A feel as if their ambition is ‘wrong’, when in fact they are really reacting to their own internal voice reminding them that they are lost and not following a path.</span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Everyone wants to be happy. What makes someone happy is different for everyone,…so knowing what makes you happy and actively seeking to make that happen consistently in your life is what is really being discussed here.</span></p><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Just my .02. You can tell I’ve pondered this one a lot too…… 😉</span></p><span data-dcnode-id="444" instrument_node="">
</span></div><span data-dcnode-id="442" instrument_node="">
</span></div><span data-dcnode-id="440" instrument_node="">

</span><div class="comment re-reply" data-dcnode-id="415"><span data-dcnode-id="436" instrument_node="">

</span><div class="col-xs-2 col-md-offset-4 avatar-col" data-dcnode-id="428"><span data-dcnode-id="434" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="433" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/07ed88553eba0adc17dcbdc100fb6d57%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/07ed88553eba0adc17dcbdc100fb6d57?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="432" instrument_node=""> </span><a class="reply-link" data-dcnode-id="430" data-parent-id="356988" href="#"><span data-dcnode-id="431" instrument_node="">Reply</span></a><span data-dcnode-id="429" instrument_node="">
</span></div><span data-dcnode-id="427" instrument_node="">
</span><div class="col-xs-10 col-md-6" data-dcnode-id="419"><span data-dcnode-id="426" instrument_node="">
</span><b class="comment-author" data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Joanna</span></b><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">I think there is a third kind of person. This sector will often say they are ‘just not ambitious’ but in fact are just bone idle. They actually work very hard at getting others to take on the responsibilities of life for them. Oh I can’t do that, I don’t know how. They are sooo good at putting others on a guilt trip -oh you are so lucky – I wish I could be like you. I’m not talking about great ambition here, just getting from A to B or organizing a trip THEY so desperately need. The word ambition, or the lack of it, is often misused.</span></p><span data-dcnode-id="420" instrument_node="">
</span></div><span data-dcnode-id="418" instrument_node="">
</span></div><span data-dcnode-id="416" instrument_node="">
</span></div><span data-dcnode-id="414" instrument_node="">
</span><div class="comment re-reply" data-dcnode-id="383"><span data-dcnode-id="413" instrument_node="">
</span><div class="row" data-dcnode-id="385"><span data-dcnode-id="412" instrument_node="">
</span><div class="col-xs-2 col-md-offset-4 avatar-col" data-dcnode-id="405"><span data-dcnode-id="411" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="410" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/17cc3b3dc9376f80220b7fe73f9469d1%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/17cc3b3dc9376f80220b7fe73f9469d1?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="409" instrument_node=""> </span><a class="reply-link" data-dcnode-id="407" data-parent-id="141972" href="#"><span data-dcnode-id="408" instrument_node="">Reply</span></a><span data-dcnode-id="406" instrument_node="">
</span></div><span data-dcnode-id="404" instrument_node="">
</span><div class="col-xs-10 col-md-6" data-dcnode-id="387"><span data-dcnode-id="403" instrument_node="">
</span><b class="comment-author" data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Jim</span></b><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">I think you were right to point out and recognize that you were generalizing, and that it’s hard to keep someone’s attention when you’re generalizing. There are many different factors that make people behave and respond to life differently, at least more factors than what you described. I don’t know about anyone else, but I can’t read your mind.</span></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">There are many different personality types, and some of those types literally want to question life, and see no value in the representation of one particular thing. They have no “ambition” by definition because they aren’t trying to be anything in particular, because they don’t see where they fit in in the world.</span></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">In a perfect world the meaning and definition of ambition would be applicable to everyone, but it’s not. Ambition is a product of society, a society that we are born into and don’t necessarily have a choice to not participate in. Regardless of how you feel about society if you’re not productive, or ambitious, you’re usually left behind. The people that don’t fit into this model feel left out. They feel betrayed. They feel like there is something wrong with them. </span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">So in short, I believe someone’s frustration with ambition, is really frustration with their own culture or society they feel they’ve been subjected to.</span></p><span data-dcnode-id="388" instrument_node="">
</span></div><span data-dcnode-id="386" instrument_node="">
</span></div><span data-dcnode-id="384" instrument_node="">

</span><div class="col-xs-2 col-md-offset-4 avatar-col" data-dcnode-id="372"><span data-dcnode-id="378" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="377" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/a1b2b583033552afcdc125050f10ca91%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/a1b2b583033552afcdc125050f10ca91?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="376" instrument_node=""> </span><a class="reply-link" data-dcnode-id="374" data-parent-id="355628" href="#"><span data-dcnode-id="375" instrument_node="">Reply</span></a><span data-dcnode-id="373" instrument_node="">

</span><div class="col-xs-10 col-md-6" data-dcnode-id="363"><span data-dcnode-id="370" instrument_node="">
</span><b class="comment-author" data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">marlo</span></b><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Well said! It’s not only the society we are born into, it is the brain structure we are born with. Those with more dopamine in a specific area of the frontal cortex will have more motivation. Frustration with ambition is felt by those who lack it and intuitively know that those who have it have an unfair advantage.</span></p><span data-dcnode-id="364" instrument_node="">
</span></div><span data-dcnode-id="362" instrument_node="">
