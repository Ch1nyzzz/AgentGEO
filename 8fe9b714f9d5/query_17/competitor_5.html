</span><b class="comment-author" data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">Vicki Aubin, The Rockin' Career Coach</span></b><span data-dcnode-id="3931" instrument_node="">
</span><p data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">Hi Derek! GREAT question and conversation. </span></p><span data-dcnode-id="3928" instrument_node="">
</span><p data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">If you look at the actual definition of AMBITION, it’s “a strong desire to do or to achieve something, typically requiring determination and hard work”. </span></p><span data-dcnode-id="3925" instrument_node="">
</span><p data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">So, in essence, Ambition can apply to ANY part of life. It’s that “fire”, “spark”, etc., that motivates and energizes you within to set out to actually reach or attain a specific goal, etc. You could have ambition to become an expert in something, to become skilled in an art form, and of course, in career.</span></p><span data-dcnode-id="3922" instrument_node="">
</span><p data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">Many people have “ambitions”, and they may even talk about them, regularly, BUT…there’s a difference between passive THINKING and active DOING…</span></p><span data-dcnode-id="3919" instrument_node="">
</span><p data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">In other words, if someone has enough AMBITION, that it actually IS ‘firing’ them up inside, and motivating them SO MUCH, that they actually are determined and BELIEVE that they want what they want, and they are TAKING the actions and steps and hard work required to achieve that, then, that’s actually pretty incredible and powerful…and when you really do believe in your ambition THAT strongly, and you are taking deliberate, sequential ACTIONS that move you further in that direction , THOSE are the people are are MUCH more likely that not, to actually SEE and experience that they’re desiring. So, in a nutshell, you gotta ‘walk your talk’.</span></p><span data-dcnode-id="3916" instrument_node="">
</span><p data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">So, as I see it, ambition is the “fuel”, and your actions are the “fire” that build momentum and create the results you desire. </span></p><span data-dcnode-id="3913" instrument_node="">
</span><p data-dcnode-id="3911"><span data-dcnode-id="3912" instrument_node="">SO…what about business and life? Well, everyone will define “getting ahead” differently to some extent, but in general, in business and career, this means making good $, etc., so what’s wrong with THAT? Nothing in and of itself, but I think it comes down more to HOW are you acting on your ambitions to get ‘there’? and YES, at what ‘expense’? </span></p><span data-dcnode-id="3910" instrument_node="">
</span><p data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">But, is there really an ‘expense’? Well, if you get to the nitty gritty, I think of it more as an EXCHANGE; you’re exchanging your time and effort and energy in exchange for something else. And we all have the CHOICE whether we want to make that exchange or not. What are the implications of making that exchange?; HERE is where every one of us have to make that assessment and choice for ourselves. </span></p><span data-dcnode-id="3907" instrument_node="">
</span><p data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">Especially in CAREER- yes, we may have to work long, countless, exhausting hours for some time, put other things in life on the ‘back burner’ at times, etc., if we want to ‘get ahead’…but it’s all a matter of PERSPECTIVE. Do you believe that the exchange you’re making is worth it? Is that exchange lighting and FIRING you up inside because you KNOW and BELIEVE that it WILL get you where you desire? </span></p><span data-dcnode-id="3904" instrument_node="">
</span><p data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">But, we also have the choice to NOT make an exchange, too. We can steer ourselves and our career in another direction. Just how STRONGLY do we hold the ambition that we have? and is our PERSPECTIVE that whatever exchanges are necessary are worth it? It’s up to you and your ‘gutt’.</span></p><span data-dcnode-id="3901" instrument_node="">
</span><p data-dcnode-id="3899"><span data-dcnode-id="3900" instrument_node="">Countless people are in careers they don’t enjoy, or sadly, careers they downright DESPISE, because they have made the choice to make their AMBITION be earning a certain amount of money$, etc., more than HOW they are earning it. What EXCHANGE are they making for this? Do they feel like THIS is ‘getting ahead’? Only THEY can answer for themselves.</span></p><span data-dcnode-id="3898" instrument_node="">
</span><p data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">Many times such people started off with certain ambitions, but then over time, they ‘gave up’ on them, taking the PERSPECTIVE that they couldn’t do what they REALLY wanted to do, either a) in a certain amount of time, b) making a certain amount of $, and/or c) without a certain amount of temporarily ‘undesirable’ EXCHANGE and effort.</span></p><span data-dcnode-id="3895" instrument_node="">
</span><p data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">And while some things in life may come more quickly than others, does anything truly come EASY? There’s always a potential exchange of SOME kind, and choices to be made.</span></p><span data-dcnode-id="3892" instrument_node="">
</span><p data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">For those people who have careers that LIGHT them up and fire them up inside, then CONGRATS, and more power to you! It would be interesting to actually hear stories from some of these people, to hear their perspective of ‘getting ahead’ and HOW they creatively (the key word here) put their ambitions into action.</span></p><span data-dcnode-id="3889" instrument_node="">
</span><p data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">In the meantime, my closing thoughts are: people with ambition…kick ass! and people who ACTION on their ambitions…kick ass MORE (often)! </span></p><span data-dcnode-id="3886" instrument_node="">
</span><p data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">Derek, thanks for this topic! And for allowing me to share my thoughts. Sometimes when I get started, i just can’t stop!…especially if it’s something that fires ME up inside 😉</span></p><span data-dcnode-id="3883" instrument_node="">
</span><p data-dcnode-id="3879"><span data-dcnode-id="3882" instrument_node="">Keep Rockin’, Derek!</span><br data-dcnode-id="3881"><span data-dcnode-id="3880" instrument_node="">
Vicki 🙂</span></p><span data-dcnode-id="3878" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="3845" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/78bde3e489a49ff0834c500e257832ea%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/78bde3e489a49ff0834c500e257832ea?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="3844" instrument_node=""> </span><a class="reply-link" data-dcnode-id="3842" data-parent-id="53668" href="#"><span data-dcnode-id="3843" instrument_node="">Reply</span></a><span data-dcnode-id="3841" instrument_node="">

</span><div class="col-xs-10" data-dcnode-id="3831"><span data-dcnode-id="3838" instrument_node="">
</span><b class="comment-author" data-dcnode-id="3836"><span data-dcnode-id="3837" instrument_node="">Sandy</span></b><span data-dcnode-id="3835" instrument_node="">
</span><p data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">I think people say that to make themselves feel better about having no goals, no ambition, about being ships drifting upon the sea. Indeed, when people try to diminish my goals, passion, or dreams, when I think about it–it generally comes from those with no ambitions. Which makes me feel kind of sorry for those with no ambition. There are several people I know who have no clue what they want to do with their lives, they feel like they have no direction and no purpose. They’ve been robbed of whatever passions or dreams they had when they were young and they haven’t yet realized they can reconnect with the core of who they are and drive their lives forward from there. In any case, to answer the question of why people do that, I really think it is to validate their own lives, which are perfectly fine lives for those who like drifting, but I think it often comes from a place where passion and dreams have been lost somewhere in the past.</span></p><span data-dcnode-id="3832" instrument_node="">

</span><div class="col-xs-2 avatar-col" data-dcnode-id="3817"><span data-dcnode-id="3823" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="3822" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/59f9f0e7ad1b011f4b5488b8d66b4fdf%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/59f9f0e7ad1b011f4b5488b8d66b4fdf?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="3821" instrument_node=""> </span><a class="reply-link" data-dcnode-id="3819" data-parent-id="53666" href="#"><span data-dcnode-id="3820" instrument_node="">Reply</span></a><span data-dcnode-id="3818" instrument_node="">
</span></div><span data-dcnode-id="3816" instrument_node="">
</span><div class="col-xs-10" data-dcnode-id="3781"><span data-dcnode-id="3815" instrument_node="">
</span><b class="comment-author" data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">Alex</span></b><span data-dcnode-id="3812" instrument_node="">
</span><p data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">Derek, that is an interesting topic. From my experience, people don’t have a problem with ambition, but they do misinterpret the meaning of the term.</span></p><span data-dcnode-id="3809" instrument_node="">
</span><p data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">Ambition is defined as a desire to achieve something, but I believe most people mistakenly associate ambition with obsession and rarely consider it outside the scope of work/business. </span></p><span data-dcnode-id="3806" instrument_node="">
</span><p data-dcnode-id="3804"><span data-dcnode-id="3805" instrument_node="">From your example, when people say, “There’s more to life than [power/prestige/career/whatever…]” they most likely have a false image that ambitious people neglect other aspects of their life for the sake of their goals.</span></p><span data-dcnode-id="3803" instrument_node="">
</span><p data-dcnode-id="3801"><span data-dcnode-id="3802" instrument_node="">That interpretation is wrong because a workaholic is not an ambitious person. A workaholic does not work to achieve goals, but to fulfill the need to work for work’s sake or escape personal problems, so the process itself becomes the goal. An ambitious person can also work hard, but they usually have specific goals in mind, i.e. they know why they are working and know how to balance their efforts with other aspects of life (although not everybody is proficient at the latter, myself included…).</span></p><span data-dcnode-id="3800" instrument_node="">
</span><p data-dcnode-id="3798"><span data-dcnode-id="3799" instrument_node="">How I feel about ambition:</span></p><span data-dcnode-id="3797" instrument_node="">
</span><p data-dcnode-id="3795"><span data-dcnode-id="3796" instrument_node="">I believe there are two-sides to ambition, as with anything else.</span></p><span data-dcnode-id="3794" instrument_node="">
</span><p data-dcnode-id="3792"><span data-dcnode-id="3793" instrument_node="">Ambition can be misdirected if you aim to achieve something not because you believe in it or want it, but because you accept what society proposes people should do. This type of ambition is not productive I believe because you will more likely become repressed and find later that you have wasted your time chasing goals others set for you.</span></p><span data-dcnode-id="3791" instrument_node="">
</span><p data-dcnode-id="3789"><span data-dcnode-id="3790" instrument_node="">When you know what you want and work to achieve it, I believe you need ambition because a strong desire and an idea are at the beginning of every great achievement.</span></p><span data-dcnode-id="3788" instrument_node="">
</span><p data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">I also think people do need to make sacrifices for the sake of their ambition sometimes, but I also think drinking beer at the bar is an overrated activity and not much of a sacrifice.</span></p><span data-dcnode-id="3785" instrument_node="">
</span><p data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">As long as people regulate their ambition, I think it is a necessary step to self-realization. By regulating ambition I mean avoiding misdirections towards the goals of others, avoiding obsessive behavior, and actually taking action to fulfill those desires because those influences make ambition unproductive or useless.</span></p><span data-dcnode-id="3782" instrument_node="">

</span><p data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">I think there are just as many people who admire ambition as those who are intimidated or turned off by it. It is one of those things…you can either please yourself or them. My comment may not sound very intelligent as I go on…because I am debating myself while I am typing. I don’t think that distaste for ambition is exclusive to those who are not ambitious. I know successful people who still like the underdog and are intimidated by others ambition. I am not sure how that plays out in their own ambition, except that it has to be uncomfortable and it must develop severe character flaws. Then there are people, in any field, who are in the same field but consider themselves superior because they are not “doing it for money” (they are not successful)…what they don’t realize is that money may not be what drives the ambitious person and really isn’t the driving factor – the other person may be in it for the same altruistic reasons…their ambition is what has driven them to monetary success. LOL…okay, that is all my debating myself for the day. Good question.</span></p><span data-dcnode-id="3759" instrument_node="">

</span><p data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">My 2 cents –</span></p><span data-dcnode-id="3707" instrument_node="">
</span><p data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">Ambition is the first step to success, and since many appear to hate successful people, they try to prevent you to have success.</span></p><span data-dcnode-id="3704" instrument_node="">
</span><p data-dcnode-id="3702"><span data-dcnode-id="3703" instrument_node="">“Prevention is better than cure”, they say.</span></p><span data-dcnode-id="3701" instrument_node="">
</span><p data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">I don’t consider myself a very ambitious person, I just know where I’d like to get and what I am willing to sacrifice for it (and what NOT).</span></p><span data-dcnode-id="3698" instrument_node="">
</span><p data-dcnode-id="3696"><span data-dcnode-id="3697" instrument_node="">And anyway, I almost stopped speaking about my ambitions, because the average answers go from “there’s more to life than …” to “are you crazy? stay where you are, at least there will be no surprises, everything can go horribly wrong”.</span></p><span data-dcnode-id="3695" instrument_node="">
</span><p data-dcnode-id="3693"><span data-dcnode-id="3694" instrument_node="">I admit that I’ll be the first to criticize ambition, anyway, when I feel that the person I’m talking to is obsessed with that. But my critics always end with this bottom line: “it’s your life, do whatever makes you happy and good luck with that – tell me if there’s something I can do to help”</span></p><span data-dcnode-id="3692" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="3659" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/8aa2bffafe4763fe64d970ca09bbbb1d%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/8aa2bffafe4763fe64d970ca09bbbb1d?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="3658" instrument_node=""> </span><a class="reply-link" data-dcnode-id="3656" data-parent-id="53654" href="#"><span data-dcnode-id="3657" instrument_node="">Reply</span></a><span data-dcnode-id="3655" instrument_node="">

</span><b class="comment-author" data-dcnode-id="3650"><span data-dcnode-id="3651" instrument_node="">Tiffany</span></b><span data-dcnode-id="3649" instrument_node="">
</span><p data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">I think that if it’s right for you then you should do it. We all go through different stages in our lives where we value different things. People who disapprove are likely in a different stage in their lives. They’re saying what’s right for them, and you should do what’s right for you.</span></p><span data-dcnode-id="3646" instrument_node="">

</span><div class="col-xs-2 avatar-col" data-dcnode-id="3631"><span data-dcnode-id="3637" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="3636" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/3a105804e631bc92ee8932a41c01fd4c%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/3a105804e631bc92ee8932a41c01fd4c?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="3635" instrument_node=""> </span><a class="reply-link" data-dcnode-id="3633" data-parent-id="53653" href="#"><span data-dcnode-id="3634" instrument_node="">Reply</span></a><span data-dcnode-id="3632" instrument_node="">

</span><div class="col-xs-10" data-dcnode-id="3599"><span data-dcnode-id="3629" instrument_node="">
</span><b class="comment-author" data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">AJ</span></b><span data-dcnode-id="3626" instrument_node="">
</span><p data-dcnode-id="3624"><span data-dcnode-id="3625" instrument_node="">Personally I see nothing wrong with ambition. I think people should pursue their passions and what really interests them. In general, there will be people in life who encourage you and build you up. Not to mention people who will discourage and tear you down.</span></p><span data-dcnode-id="3623" instrument_node="">
</span><p data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">I remember years ago when I was a high school senior and I had in mind to go to college for pre med. Out of all friends and relatives, there was this uncle of mine who loved to challenge me and engage in pointless arguments.</span></p><span data-dcnode-id="3620" instrument_node="">
</span><p data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">I don’t want to take up too much space here, but in a nutshell he would try to tell me that there was more to life than going to college full time and working part time. That I should take a semester off to build up my savings account, go out, and have fun (he didn’t realize that managed my time just fine). Out of all friends and relatives, this uncle would discourage me the most and basically try to argue that I was wasting my time and money going to school.</span></p><span data-dcnode-id="3617" instrument_node="">
</span><p data-dcnode-id="3613"><span data-dcnode-id="3616" instrument_node="">Why do I think he tried to shoot down me and my ambitions?</span><br data-dcnode-id="3615"><span data-dcnode-id="3614" instrument_node="">
For one, he tried to impose his ambitions and interests onto me. He thought just because we have had military &amp; law enforcement personnel down the family line that I should get into law enforcement, join the military, and/or consider pre law. He thought there was something wrong with me for having my own interests and ambitions.</span></p><span data-dcnode-id="3612" instrument_node="">
</span><p data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">I think another reason why he (along with other cynics in general) was so critical was that he had his own insecurities. He has a physical disability where he has to rely on crutches and is blind in one eye. I guess he was jealous to see me get ahead – it may have reminded him of his inability to achieve his dreams and/or enjoy life in general.</span></p><span data-dcnode-id="3609" instrument_node="">
</span><p data-dcnode-id="3607"><span data-dcnode-id="3608" instrument_node="">Nowadays I firmly believe that people should go after what they want provided that they do not infringe on the rights of others and that there’s a healthy balance in place. If there is a friend/relative/neighbor/etc. that tries to discourage you or kill your dreams somehow, then that person needs to be phased out of your life. I know in my case I have had to phase out this uncle I’ve referred to (the only time I see him is briefly at family get-togethers which is only about 3 times a year on average).</span></p><span data-dcnode-id="3606" instrument_node="">
</span><p data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">I know one of my current ambitions is to build a thriving online business so that I can work from anywhere with an Internet connection and be my own boss. At the same time, I plan to run my online business in a legal, ethical manner while making sure it doesn’t take time away from my other duties. If anyone disapproves of me taking this route, I just take it with a grain of salt. If they keep on discouraging me and annoying me, then I just phase them out and find other more positive &amp; encouraging folks to associate with.</span></p><span data-dcnode-id="3603" instrument_node="">
</span><p data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">Sorry if I rambled on. Derek, I appreciate all the content and the value that you provide to us. I am also glad that there are plenty of other ambitious people on here that I can relate to and associate with.</span></p><span data-dcnode-id="3600" instrument_node="">
</span></div><span data-dcnode-id="3598" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="3538" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/8d51f48166f3a62e505e412fee61fc6f%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/8d51f48166f3a62e505e412fee61fc6f?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="3537" instrument_node=""> </span><a class="reply-link" data-dcnode-id="3535" data-parent-id="53651" href="#"><span data-dcnode-id="3536" instrument_node="">Reply</span></a><span data-dcnode-id="3534" instrument_node="">

</span><b class="comment-author" data-dcnode-id="3529"><span data-dcnode-id="3530" instrument_node="">Elizabeth MacNeill</span></b><span data-dcnode-id="3528" instrument_node="">
</span><p data-dcnode-id="3526"><span data-dcnode-id="3527" instrument_node="">While I don’t know the “why” behind negativity surrounding ambition, have you taken a look at these examples in movies?</span></p><span data-dcnode-id="3525" instrument_node="">
</span><p data-dcnode-id="3523"><span data-dcnode-id="3524" instrument_node="">Whenever characters are successful in movies, the character is also shown with no social or love life. I notice this example with women, but it hasn’t struck me as predominately with men. (I could be wrong, as a woman, I notice women examples first and foremost).</span></p><span data-dcnode-id="3522" instrument_node="">
</span><p data-dcnode-id="3520"><span data-dcnode-id="3521" instrument_node="">Films are constantly telling viewers that getting too far ahead will take a toll on you. There are some articles on the idea that this could stem from the Great Depression era where they started making movies that centered on work vs. success. Films that are work related will sometimes have mediocre moments of success (to keep people motivated), while balancing the idea that many people are “working towards the middle” as most people won’t become an Oscar winning actress or record breaking athlete. (I don’t mean that in a negative way). </span></p><span data-dcnode-id="3519" instrument_node="">
</span><p data-dcnode-id="3517"><span data-dcnode-id="3518" instrument_node="">I wonder if this is a reflection on the world around us or if we pull these ideas from movies. (Or is this a classic example of the chicken and the egg)?</span></p><span data-dcnode-id="3516" instrument_node="">
</span><p data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">I think ambition should be a strong driving force. Sorry if this is a little all over the place. I have the articles I wanted to touch upon somewhere on this computer of mine.</span></p><span data-dcnode-id="3513" instrument_node="">
</span><p data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">As a recent college graduate, I find all of your writing/videos insightful and attention grabbing. I wish we had used you in the classroom. I maybe binge watched your videos the other day.</span></p><span data-dcnode-id="3510" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="3500" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/cd7ac13758052be59f7d9f6cb424ce4e%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/cd7ac13758052be59f7d9f6cb424ce4e?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="3499" instrument_node=""> </span><a class="reply-link" data-dcnode-id="3497" data-parent-id="53649" href="#"><span data-dcnode-id="3498" instrument_node="">Reply</span></a><span data-dcnode-id="3496" instrument_node="">

</span><b class="comment-author" data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">Jake</span></b><span data-dcnode-id="3490" instrument_node="">
</span><p data-dcnode-id="3488"><span data-dcnode-id="3489" instrument_node="">Well, a few reasons. If you have ambition and you succeed they fear they won’t be at your level and won’t have the same friendship with you anymore. (fear of loss). If you have ambition and fail, they are afraid they will have to help you out. (fear of loss as well).</span></p><span data-dcnode-id="3487" instrument_node="">
</span><p data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">Society has also programmed a lot of people to believe that to have success you have to take something away from someone else, and that too much success is greedy. </span></p><span data-dcnode-id="3484" instrument_node="">
</span><p data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">But, to use a farming example… if you take 100 dollars worth of potatoes and an unused plot of land to grow 10,000 dollars worth of potatoes… who did you make more poor because of that?</span></p><span data-dcnode-id="3481" instrument_node="">

</span><p data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">Hi, I think the mindset of looking down at someone who is ambitious might be because when someone is “blinded” with ambition – deep desire to achieve – he/she might make a lot of mess around them !</span></p><span data-dcnode-id="3458" instrument_node="">
</span><p data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">You’ll find awful lot of such business people in almost all industries. Real estate, medicine, pharmaceutical etc. etc. There are going to be businessmen who are so ambitious about fulfilling their personal agendas ONLY that they deceive their customers, manipulate the system and corrupt the government ! </span></p><span data-dcnode-id="3455" instrument_node="">
</span><p data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">(I would recommend you watch a documentary on American food industry – Food Inc.)</span></p><span data-dcnode-id="3452" instrument_node="">
</span><p data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">But this, however, DOESN’T JUSTIFY having NO AMBITION. There is no growth, no comfort, no life without the ambition. All dead.</span></p><span data-dcnode-id="3449" instrument_node="">
</span><p data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">My understanding, </span></p><span data-dcnode-id="3446" instrument_node="">
</span><p data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">If an ambition is driven out of a feeling of “lack” in life, it may turn unhealthy ! But if it’s driven by enthusiasm to create something and passion to grow, it’ll be healthy for all !</span></p><span data-dcnode-id="3443" instrument_node="">

</span><p data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">I could’t function without ambition. It the force that drives me to be better. I’m also not doing well with people who aren’t very ambitious as all. I’m a Go-Getter and cannot understand how a person can have a “good enough” personality. Why is it good enough for them? Why don’t they want to strive for more (a better career, a cleaner house, a better paper for school)? And I don’t mean to spend all of your time on improvement but just the want to be better today than you were yesterday.</span></p><span data-dcnode-id="3417" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="3351" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/490bb0c40a27387d09a781cd7d979229%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/490bb0c40a27387d09a781cd7d979229?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="3350" instrument_node=""> </span><a class="reply-link" data-dcnode-id="3348" data-parent-id="53641" href="#"><span data-dcnode-id="3349" instrument_node="">Reply</span></a><span data-dcnode-id="3347" instrument_node="">

</span><b class="comment-author" data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">Kat</span></b><span data-dcnode-id="3341" instrument_node="">
</span><p data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">I face this all the time. I do a few creative endeavors. I’m very good at them and really enjoy them. Constantly I receive the jealous unproductive put downs. “Jack of all trades, master of none” I’m sure that is a saying spawn from envy. What if you are good at a few things and really enjoy doing them? Why choose? Maybe I’m too ambitious, but I keep them all pretty separate and it keeps me from burning out in any one area. If I get sick of one area, I don’t accept that many clients for a while and focus on the other. I find I always go back to each of my passions. Maybe that just works for me. Especially since I’m a creative person. </span></p><span data-dcnode-id="3338" instrument_node="">
</span><p data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">The root of the hate on ambition is just jealousy. People want to make themselves feel better so they put down your life choices. Say you make a lot of money doing something FUN. They are stuck with a lame 9-5 with commute to cry over. So look they look at what they have that you don’t, maybe more time with friends and family or even a family at all. Then they lay it into you…</span></p><span data-dcnode-id="3335" instrument_node="">
</span><p data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">“I could never risk my family’s livelihood with such an unpredictable career.”</span></p><span data-dcnode-id="3332" instrument_node="">
</span><p data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">“When are you going to get a real job? You’ll have a more stable life.”</span></p><span data-dcnode-id="3329" instrument_node="">
</span><p data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">“I could never miss out on having a family just to advance myself financially.”</span></p><span data-dcnode-id="3326" instrument_node="">
</span><p data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">“What if you couldn’t do this anymore, you have no fall back career.”</span></p><span data-dcnode-id="3323" instrument_node="">
</span><p data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">“I’d rather have a career that helps others, than just create cute unimportant things” </span></p><span data-dcnode-id="3320" instrument_node="">
</span><p data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">Parents and loved ones say it out of fear for you, but mostly it’s jealous people saying out of disappointment in themselves.</span></p><span data-dcnode-id="3317" instrument_node="">

</span><b class="comment-author" data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">Jason Mathes</span></b><span data-dcnode-id="3242" instrument_node="">
</span><p data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">Ambition is the driving force behind progress. If we didn’t have people who were ambitious? We wouldn’t have things like I dunno… the modern assembly line, the lightbulb or a billion other things we take for granted today.</span></p><span data-dcnode-id="3239" instrument_node="">
</span><p data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">And they weren’t done by people who were eating Ho-ho’s on their couches watching daytime TV! They were created by people who got off their ass, and made shit happen.</span></p><span data-dcnode-id="3236" instrument_node="">
</span><p data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">Although I have to say it is tough to find a good balance in life when it comes to family and business. On the one hand you want to build your business so you can better provide for your family. And that takes Time and Energy. Which of course can take you away from your family. For me I have to work hard at finding that magic “balance” between the two.</span></p><span data-dcnode-id="3233" instrument_node="">
</span><p data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">Bottom Line? Those who look down on people with Ambition? They are the same people who end up doing nothing in their lives. I tend to ignore them and move on.</span></p><span data-dcnode-id="3230" instrument_node="">

</span><b class="comment-author" data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">Jess Ryan</span></b><span data-dcnode-id="3210" instrument_node="">
</span><p data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">The ambition of Joe Schmoe evokes Bobby Bobsterton’s (nickname Bobster) frustration/regret/shame over not doing something he really wants to do in his own life. It’s emotionally easier for Bobby to explain away Joe’s success as him being greedy or a showoff or materialistic than for Bobster to face the fact that he is not fulfilling his own dreams.</span></p><span data-dcnode-id="3207" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="3197" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/f00f1251531f307f6f97819a5a781541%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/f00f1251531f307f6f97819a5a781541?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="3196" instrument_node=""> </span><a class="reply-link" data-dcnode-id="3194" data-parent-id="53634" href="#"><span data-dcnode-id="3195" instrument_node="">Reply</span></a><span data-dcnode-id="3193" instrument_node="">

</span><b class="comment-author" data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">Bill Nickerson</span></b><span data-dcnode-id="3187" instrument_node="">
</span><p data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">Perhaps they’ve experienced the effects of unchecked ambition. So rather than lacking it themselves, or fearing it, they’ve see the results of an imbalance in their own life or someone around them.</span></p><span data-dcnode-id="3184" instrument_node="">
</span><p data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">Ambition is a great motivation to achieve something, but it needs to be balanced with perspective and responsibility. Unbridled ambition can become greed, lust, totalitarianism, etc. Or it can be harnessed to produce great art, science, peace, etc.</span></p><span data-dcnode-id="3181" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="3171" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/d47cffbc8e1ba4b7ed2e8b96a4545da1%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/d47cffbc8e1ba4b7ed2e8b96a4545da1?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="3170" instrument_node=""> </span><a class="reply-link" data-dcnode-id="3168" data-parent-id="53633" href="#"><span data-dcnode-id="3169" instrument_node="">Reply</span></a><span data-dcnode-id="3167" instrument_node="">

</span><div class="col-xs-10" data-dcnode-id="3151"><span data-dcnode-id="3164" instrument_node="">
</span><b class="comment-author" data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">Tres Adames</span></b><span data-dcnode-id="3161" instrument_node="">
</span><p data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">I think most people who view ambition as selfish likely grew up in a church background where it was viewed as negative. If you go right to the book, you realize it’s more balanced than that:</span></p><span data-dcnode-id="3158" instrument_node="">
</span><p data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">“Do nothing out of selfish ambition or vain conceit. Rather, in humility value others above yourselves, not looking to your own interests but each of you to the interests of the others.” —Philippians 2:3-4</span></p><span data-dcnode-id="3155" instrument_node="">
</span><p data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">Ambition isn’t wrong. It’s SELFISH ambition (that ignores the good of others) that is wrong. A good entrepreneur is one who seeks to solve the pain of others through innovation and self-giving. He or she does reap financial compensation, but not at the expense of others. They benefit because they have given.</span></p><span data-dcnode-id="3152" instrument_node="">

</span></div><span data-dcnode-id="3136" instrument_node="">
</span><div class="col-xs-10" data-dcnode-id="3110"><span data-dcnode-id="3135" instrument_node="">
</span><b class="comment-author" data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">Laurel Cantu</span></b><span data-dcnode-id="3132" instrument_node="">
</span><p data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">I believe people that react that way have a blindfold over their eyes that they “can’t” do that because it’s too hard and they might fail.</span></p><span data-dcnode-id="3129" instrument_node="">
</span><p data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">I’m from Texas and competed in livestock shows where you won belt-buckles as awards. It is HARD to win a belt buckle and they are looked on upon with awe. </span></p><span data-dcnode-id="3126" instrument_node="">
</span><p data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">When I was in my mid-teens I was purchasing a belt and my only stipulation was it needed to have a removable belt-buckle so that WHEN not IF I won my awarded buckle, I would be able to wear it with pride. </span></p><span data-dcnode-id="3123" instrument_node="">
</span><p data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">A mom (who happened to be at the store I was shopping at) – whose daughter I competed against – mocked me saying that I could never win a belt-buckle. And when I asked her why – she said it was because it’s HARD. Which… in my mind… well DUH. That’s kinda the point.</span></p><span data-dcnode-id="3120" instrument_node="">
</span><p data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">Needless to say… her daughter never won a single belt buckle…. I moved on to win several buckles in my livestock showing career. </span></p><span data-dcnode-id="3117" instrument_node="">
</span><p data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">You can’t be scared to try or fail. I lost more than I won. But I never quit. I kept trying. And I succeeded in my goal. </span></p><span data-dcnode-id="3114" instrument_node="">
</span><p data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">Life lesson #6,358</span></p><span data-dcnode-id="3111" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="3101" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/8cb33934c33c839f97c5d69654df0dcc%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/8cb33934c33c839f97c5d69654df0dcc?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="3100" instrument_node=""> </span><a class="reply-link" data-dcnode-id="3098" data-parent-id="53631" href="#"><span data-dcnode-id="3099" instrument_node="">Reply</span></a><span data-dcnode-id="3097" instrument_node="">

</span><b class="comment-author" data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">Yoli</span></b><span data-dcnode-id="3091" instrument_node="">
</span><p data-dcnode-id="3089"><span data-dcnode-id="3090" instrument_node="">I love this, Derek – because I just posted an original quote for my subscribers and social media friends that talks about that very subject. Ambition.</span></p><span data-dcnode-id="3088" instrument_node="">
</span><p data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">I don’t want to make this too long and boring, but you DID ask. 🙂 So here goes.</span></p><span data-dcnode-id="3085" instrument_node="">
</span><p data-dcnode-id="3081"><span data-dcnode-id="3084" instrument_node="">First of all I think the people who tend to hate ambition don’t have any or are lacking in it for whatever reason.</span><br data-dcnode-id="3083"><span data-dcnode-id="3082" instrument_node="">
I also think people tend to hate ambition, because it is associated with people with incredible drive to get a certain something done, and it is usually born from passion for that certain something.</span></p><span data-dcnode-id="3080" instrument_node="">
</span><p data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">Intense passion can be overpowering and if not checked, obnoxious to some who don’t hold the same … ahem… vibration or thought form.</span></p><span data-dcnode-id="3077" instrument_node="">
</span><p data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">Ambition is just one component or characteristic of the bigger piece of the passion pie. Along with drive, focus, and heart. The spark of ambition comes from the heart – The master driver. </span></p><span data-dcnode-id="3074" instrument_node="">
</span><p data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">That’s my two cents! Here’s my quote:</span></p><span data-dcnode-id="3071" instrument_node="">
</span><p data-dcnode-id="3067"><span data-dcnode-id="3070" instrument_node="">Ambition is your heart talking to you, and telling you that you can do better…that your capable of more.</span><br data-dcnode-id="3069"><span data-dcnode-id="3068" instrument_node="">
So, when you hear that ever so slight whisper of a spark of light talking to you. Listen… Because it is always right.”</span></p><span data-dcnode-id="3066" instrument_node="">
</span><p data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">and there is my other two cents!</span></p><span data-dcnode-id="3063" instrument_node="">
</span><p data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">Thanks again Derek.. You continue to bring it, and it’s much appreciated.</span></p><span data-dcnode-id="3060" instrument_node="">
</span><p data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node="">Yoli</span></p><span data-dcnode-id="3057" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="3047" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/406e9ba3978c427983e116f82ceecd1f%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/406e9ba3978c427983e116f82ceecd1f?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="3046" instrument_node=""> </span><a class="reply-link" data-dcnode-id="3044" data-parent-id="53630" href="#"><span data-dcnode-id="3045" instrument_node="">Reply</span></a><span data-dcnode-id="3043" instrument_node="">

</span><div class="col-xs-10" data-dcnode-id="3024"><span data-dcnode-id="3040" instrument_node="">
</span><b class="comment-author" data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">Rado</span></b><span data-dcnode-id="3037" instrument_node="">
</span><p data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">Hello Derek,</span></p><span data-dcnode-id="3034" instrument_node="">
</span><p data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">I try to see the big picture at most of the things I discuss. In this case, people who say “There’s more to life than…” may say that for 2 major reasons:</span></p><span data-dcnode-id="3031" instrument_node="">
</span><p data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">1) They are concerned about the amount of stress and hardwork you spend in your daily life. They are genuinely worried about you being too harsh to your body or mentality. We have all been in situations where we’ve spent sleepless nights working onto something and we need a break. (Ambition is directly linked to the hours you spend working). Moreover, not matching goals with ambitions could sometimes be hurtful so these people may be trying to protect us from our own ambition failures. </span></p><span data-dcnode-id="3028" instrument_node="">
</span><p data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">2) The second and in my opinion more likely version is just because they are scared of what they see. They see great desire for success which goes over the 9000 power level. This high ambition, passion and determination are qualities they are lacking, they may be lazy, they may be not ambitious etc but they see this energy and drive in you and they think “I should have been like that, I had to be that driven but I’m not”. They secretly admire you and are afraid of you, your will. This is why they are trying to demotivate you saying crap like “There’s more to life than…”. Of course there are things more important than me reaching 10,000 customers, 100k in funding, 10,000 hit on the website or whatever goal you have but being ambitious is not saying the opposite. When people say that ambition should not play that major role in my life, what I actually hear is: “Don’t be so ambitious because I have inferiority complex and you really intimidate me.”</span></p><span data-dcnode-id="3025" instrument_node="">
</span></div><span data-dcnode-id="3023" instrument_node="">
</span></div><span data-dcnode-id="3021" instrument_node="">

</span><div class="col-xs-2 avatar-col" data-dcnode-id="3010"><span data-dcnode-id="3016" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="3015" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/39752a153dbc477955cc7cd4758a938e%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/39752a153dbc477955cc7cd4758a938e?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="3014" instrument_node=""> </span><a class="reply-link" data-dcnode-id="3012" data-parent-id="53629" href="#"><span data-dcnode-id="3013" instrument_node="">Reply</span></a><span data-dcnode-id="3011" instrument_node="">

</span><div class="col-xs-10" data-dcnode-id="2995"><span data-dcnode-id="3008" instrument_node="">
</span><b class="comment-author" data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">Morgan</span></b><span data-dcnode-id="3005" instrument_node="">
</span><p data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">Ouch, good question, Derek. Actually, I often ask myself, “Why are you so ambitious?”, and I give myself that disapproving look. My husband has a decent job, why do I feel the need to be an entrepreneur? Shouldn’t I just be happy staying home with the kids? </span></p><span data-dcnode-id="3002" instrument_node="">
</span><p data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">I think when we feel hesitant of our own ambition, it’s because of self-doubt. We’re unsure that all of the upfront risks (loss of money, less time with family, opportunity costs in the traditional work force) will not be worth the pay off in the end.</span></p><span data-dcnode-id="2999" instrument_node="">
</span><p data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">I think when others accuse us of having too much ambition, it’s because they feel that WE are judging THEM for not taking greater risks. They’re doubting their own path, and in the face of our judgement, they provide rationalizations for their safer, more traditional career.</span></p><span data-dcnode-id="2996" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="2963" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/9e99132d2fe7d766dc5260420e19303d%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/9e99132d2fe7d766dc5260420e19303d?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="2962" instrument_node=""> </span><a class="reply-link" data-dcnode-id="2960" data-parent-id="53627" href="#"><span data-dcnode-id="2961" instrument_node="">Reply</span></a><span data-dcnode-id="2959" instrument_node="">

</span><b class="comment-author" data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">tom</span></b><span data-dcnode-id="2953" instrument_node="">
</span><p data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">People who ‘diss’ ambition aren’t trying to be mean. In fact, they believe they have your best interests at heart. They’re realists and want to protect you from future potential disappointments. Like a parent who nurtures (protects) a child … as opposed to encouraging the lad to play out in traffic (life) dodging cars.</span></p><span data-dcnode-id="2950" instrument_node="">
</span><p data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">I think Ambition is a great thing to have. It should be taught in school. It should be encouraged verses discouraged. Too much of society is trying to ‘mold’ people into robots. </span></p><span data-dcnode-id="2947" instrument_node="">
</span><p data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">People must be creative. People must think outside the box. To challenge themselves and to dream bigger.</span></p><span data-dcnode-id="2944" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="2933" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/9e99132d2fe7d766dc5260420e19303d%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/9e99132d2fe7d766dc5260420e19303d?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="2932" instrument_node=""> </span><a class="reply-link" data-dcnode-id="2930" data-parent-id="53682" href="#"><span data-dcnode-id="2931" instrument_node="">Reply</span></a><span data-dcnode-id="2929" instrument_node="">

</span><p data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">Of course, most people would admit that they don’t follow through enough with their own ambition. </span></p><span data-dcnode-id="2920" instrument_node="">
</span><p data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">So there’s probably something to be said about why a person projects a ‘less than ambitious’ image of themselves … which correlates to that person pointing out the obvious.</span></p><span data-dcnode-id="2917" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="2905" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/4fd56911a104ca739f39a03e61c6e7e7%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/4fd56911a104ca739f39a03e61c6e7e7?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="2904" instrument_node=""> </span><a class="reply-link" data-dcnode-id="2902" data-parent-id="53624" href="#"><span data-dcnode-id="2903" instrument_node="">Reply</span></a><span data-dcnode-id="2901" instrument_node="">

</span><b class="comment-author" data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">Glauber M Rodrigues</span></b><span data-dcnode-id="2895" instrument_node="">
</span><p data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">My favorite explanation is that ambition may vary from person to person, and we may find that people with higher ambitions than ours are too ambitious, and people with lower ambitions are fools.</span></p><span data-dcnode-id="2892" instrument_node="">
</span><p data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">That explains why in some countries it is relatively easy to accept some level of ambition, and its harder to take ourselves into a higher level without seem too ambitious. It may seem rational to convince ourselves that being less ambitious will bring happiness. One man’s trash is another man’s treasure.</span></p><span data-dcnode-id="2889" instrument_node="">
</span><p data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">Another explanation is that is necessary for the current state of global economy that some people are satisfied with less than others. So guilty also is inputted as a way of social control.</span></p><span data-dcnode-id="2886" instrument_node="">
</span></div><span data-dcnode-id="2884" instrument_node="">

</span><div class="col-xs-2 avatar-col" data-dcnode-id="2871"><span data-dcnode-id="2877" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="2876" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/e7c24db93d3d6e61c6ae1228221a3241%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/e7c24db93d3d6e61c6ae1228221a3241?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="2875" instrument_node=""> </span><a class="reply-link" data-dcnode-id="2873" data-parent-id="53623" href="#"><span data-dcnode-id="2874" instrument_node="">Reply</span></a><span data-dcnode-id="2872" instrument_node="">

</span><div class="col-xs-10" data-dcnode-id="2850"><span data-dcnode-id="2869" instrument_node="">
</span><b class="comment-author" data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">Sarah Newman</span></b><span data-dcnode-id="2866" instrument_node="">
</span><p data-dcnode-id="2864"><span data-dcnode-id="2865" instrument_node="">Judging someone doesn’t define who THEY are; it defines who WE are.</span></p><span data-dcnode-id="2863" instrument_node="">
</span><p data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">When someone judges you because of your big ambitions, it’s because they either consciously or unconsciously have judgments about their own ambitions. For example, maybe they have tried to create a successful business in the past and “failed;” or maybe they would love for nothing more than to magnificently embody their own dreams, but have tremendous fear around doing so, and thus defensively knock others down who are bravely stepping into their ambitions; or perhaps their parents were super ambitious and thus as a child they felt neglected if their parents put the business first and didn’t spend quality time with them.</span></p><span data-dcnode-id="2860" instrument_node="">
</span><p data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">Regardless of the reason behind it, rarely does someone’s judgment of us ever have anything to actually do with us. </span></p><span data-dcnode-id="2857" instrument_node="">
</span><p data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">Interestingly, judging is a natural human tendency that can be quite healthy. A fascinating exploration when I find myself in judgment is to reflect that thought back to me and ask, “What judgments do I have about myself in this area?” It’s a great exercise in self-growth when we can see everyone we encounter as our own mirror.</span></p><span data-dcnode-id="2854" instrument_node="">
</span><p data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">Thank you Derek for all you do! I watch all of your videos. I just launched my first website and blog on Tuesday and am so excited for this journey!</span></p><span data-dcnode-id="2851" instrument_node="">
</span></div><span data-dcnode-id="2849" instrument_node="">

</span><p data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">Ambition, like just about anything in life, can have either a negative or positive connotation–it is truly all perspective. Do you find yourself judging others because of your view or their view of ambition? At that point, it becomes about you–it becomes your problem. Why does it matter what someone else considers ambitious? What if the simple act of getting out of bed, or putting on clothes is “ambitious” for one person, expecially considering the ebb and flow of energy in the life of each individual. How about focusing on using the gifts that we were blessed with because, really, we don’t own any of those gifts (ambition being a gift)–we can either waste them or we can use them to glorify our true leader and inspire others. Don’t let any one try to convince you to dim your light because in the end it won’t make theirs any brighter. So I say shine in your unique way Derek!!! (Use the gifts you were blessed with–including your ambition! It inspires others to shine too 🙂</span></p><span data-dcnode-id="2828" instrument_node="">

</span><p data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">Interesting question Derek. </span></p><span data-dcnode-id="2805" instrument_node="">
</span><p data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">I don’t believe that people hate ambition per se, instead they hate ambition that does not fit with their world view or is outside of their comfort zone. </span></p><span data-dcnode-id="2802" instrument_node="">
</span><p data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">Their objection comes from transference of their beliefs onto you.</span></p><span data-dcnode-id="2799" instrument_node="">
</span><p data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">I’ve yet to meet anyone that has no ambition even if it’s as simple as getting a bigger television.</span></p><span data-dcnode-id="2796" instrument_node="">
</span><p data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">We all operate at different levels as to what we want/expect from life and invariably those with lesser expectations struggle to understand those who want more.</span></p><span data-dcnode-id="2793" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="2760" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/8d0514d1670f561b649bfb3064caff90%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/8d0514d1670f561b649bfb3064caff90?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="2759" instrument_node=""> </span><a class="reply-link" data-dcnode-id="2757" data-parent-id="53616" href="#"><span data-dcnode-id="2758" instrument_node="">Reply</span></a><span data-dcnode-id="2756" instrument_node="">

</span><b class="comment-author" data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">Kirsty</span></b><span data-dcnode-id="2750" instrument_node="">
</span><p data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">Just as an introduction: I am a very ambitious person, I know this, and many others describe me that way. But I don’t think ambition is a good thing. </span></p><span data-dcnode-id="2747" instrument_node="">
</span><p data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">I don’t think it’s a bad thing either. But it isn’t the be all and end all of life. I used to think it was, and got myself into a lot of stress. </span></p><span data-dcnode-id="2744" instrument_node="">
</span><p data-dcnode-id="2740"><span data-dcnode-id="2743" instrument_node="">Buddhist (or non religious mindful) practice has a lot to offer in this debate.</span><br data-dcnode-id="2742"><span data-dcnode-id="2741" instrument_node="">
A lot of Depression, Anxiety, Stress and suffering is caused by people living their mental lives in the past or the future. Ambition, by it’s nature, encourages the brain to live in the future. </span></p><span data-dcnode-id="2739" instrument_node="">
</span><p data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">I think some people say this, because there is more to life than the future. In fact, life isn’t the future, it’s the present, the here and now. So not only is there more to life than ambition, when you are being ambitious, you are not truly living. </span></p><span data-dcnode-id="2736" instrument_node="">
</span><p data-dcnode-id="2732"><span data-dcnode-id="2735" instrument_node="">Unless… you are mindful of the journey in which you are taking! With ambition, it’s not really about the end result, but the journey, the challenge.</span><br data-dcnode-id="2734"><span data-dcnode-id="2733" instrument_node="">
So, if you have ambition, just remember to not spend every second DOING, but sometime just BEING. </span></p><span data-dcnode-id="2731" instrument_node="">
</span><p data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">And finally, think about why you have that ambition. When it is achieved, will you look back on your life and think “I missed it”. Instead, were you chasing fame, glory, excessive fortune, did your ego lead you all the way? </span></p><span data-dcnode-id="2728" instrument_node="">
</span><p data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">A happy balance, I think, is key 🙂 ambition to create something that genuinely helps others, whilst truly LIVING the process and the people around, I think that’s the answer. But that’s just my view point. </span></p><span data-dcnode-id="2725" instrument_node="">
</span><p data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">Great topic! Thank you Derek.</span></p><span data-dcnode-id="2722" instrument_node="">

</span><p data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">GREAT subject and awesome comments, all!</span></p><span data-dcnode-id="2619" instrument_node="">
</span><p data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">Years ago, I was in an MLM and our leg emphasized personal development to a large extent. One day, one of my higher-ups told a story about crab fishing.</span></p><span data-dcnode-id="2616" instrument_node="">
</span><p data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">When you catch one crab, you’d better tie that basket down tight or else he’ll do everything in his power to climb out for his freedom. But get two or more? Just toss that lid into the sea for all the use it’ll be because every crab that tries to pull itself out to freedom will find the other crabs desperately pulling it back down.</span></p><span data-dcnode-id="2613" instrument_node="">
</span><p data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">Perhaps it’s a case of misery loving company. Or maybe people hate change so much, they don’t even wish to see it in others. Either way, since I heard that story, I’ve encountered so many people who seemed to live to tell me (and other dreamers) that “it can’t be done” or “you’re wasting your time” or “are you THAT ashamed of us?”</span></p><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">Me, I’m pulling myself towards the light and shaking off anyone who isn’t cheering me on. And when I reach the top, I’m holding out MY hand to help whoever wants my help</span></p><span data-dcnode-id="2607" instrument_node="">

</span><p data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">Sometimes, when we see ambition in others, it forces us to take a good look at ourselves and address our own ambition, lack thereof, or imbalance of ambition with other areas of life. That sense of being unsettled is actually a good thing, because it is stirring up an acknowledgement of the need to change. People of character and integrity let it become a motivator and forge ahead. People who can’t be happy for the success of others and are intimidated by success will continue to wallow in their own vices and misery until they honestly face change. This blog is a great example of a forum where the truly successful people will land for ideas, motivation, and support. Thanks, Derek.</span></p><span data-dcnode-id="2535" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="2525" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/f63f2d27bf22ff3a414f1be89becc2a3%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/f63f2d27bf22ff3a414f1be89becc2a3?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="2524" instrument_node=""> </span><a class="reply-link" data-dcnode-id="2522" data-parent-id="53607" href="#"><span data-dcnode-id="2523" instrument_node="">Reply</span></a><span data-dcnode-id="2521" instrument_node="">

</span><b class="comment-author" data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">Nick Kizirnis</span></b><span data-dcnode-id="2515" instrument_node="">
</span><p data-dcnode-id="2511"><span data-dcnode-id="2514" instrument_node="">Hi Derek,</span><br data-dcnode-id="2513"><span data-dcnode-id="2512" instrument_node="">
I think these well-intentioned people either are expressing concern for you, projecting their fears on you, or not understanding the word ambition. If “there’s more to life …” what do they mean? That you turn off your ambition when we go home to the family? Maybe I do, but I don’t turn off my creativity, my desire to be a good husband and parent and the work that takes. Even in my “older” age I’m still trying to make music, and that takes ambition. </span></p><span data-dcnode-id="2510" instrument_node="">
</span><p data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">When a friend or family member tells me “there’s more to life” I know they can see that I might be getting a little carried away with one thing or another, because they know me. That’s a reminder, and I appreciate it. I don’t appreciate people pushing “there’s more to life” like it’s a remedy for corporate life, running our own business, or even playing in a club late at night. </span></p><span data-dcnode-id="2507" instrument_node="">
</span><p data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Yup, there’s more to life, more every time we reach out to be better at our job or business, to help our kids stand up, to stand in warrior pose a little longer, to hit that high note, or to see that last bit of the sunset.</span></p><span data-dcnode-id="2504" instrument_node="">
</span><p data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">Hope that helps … great topic, thanks!</span></p><span data-dcnode-id="2501" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="2468" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/c906df7dc92d7b76d4788db515f83518%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/c906df7dc92d7b76d4788db515f83518?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="2467" instrument_node=""> </span><a class="reply-link" data-dcnode-id="2465" data-parent-id="53605" href="#"><span data-dcnode-id="2466" instrument_node="">Reply</span></a><span data-dcnode-id="2464" instrument_node="">

</span><b class="comment-author" data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">Jennifer</span></b><span data-dcnode-id="2458" instrument_node="">
</span><p data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">Ambition elicits a knee-jerk response in some people because it’s related to money, success, and power. And while we can scoff at negative reactions, science is beginning to back up what philosophers and the average Joe think about money/power — it corrupts. Have you seen any of these? Basically people “care less” as they gain access to money. They are less likely to ask for help, but also less likely to offer it, even when asked. They take more, even though they already have more. And so on. </span></p><span data-dcnode-id="2455" instrument_node="">
</span><p data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">So we’re presented with a conundrum, eh? </span></p><span data-dcnode-id="2452" instrument_node="">
</span><p data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">* Personally, if we have ambition, how do we integrate this with integrity? How do we convey to others that our ambition has its own intelligence? Its own necessity? Money is necessary to do good, but how do we make sure that’s our intention, and that we hold onto it as we move up? </span></p><span data-dcnode-id="2449" instrument_node="">
</span><p data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">* Culturally, how do we ensure that we maintain economic health and progress while keeping in check the “corruption” that seems to accompany money and power? </span></p><span data-dcnode-id="2446" instrument_node="">
</span><p data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">If you’re not familiar with recent studies, just google some terms like, “studies show money makes people care less” and other variants.</span></p><span data-dcnode-id="2443" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="2410" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/371dce54245ea5efa4431693af16d533%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/371dce54245ea5efa4431693af16d533?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="2409" instrument_node=""> </span><a class="reply-link" data-dcnode-id="2407" data-parent-id="53603" href="#"><span data-dcnode-id="2408" instrument_node="">Reply</span></a><span data-dcnode-id="2406" instrument_node="">

</span><b class="comment-author" data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">Sofia</span></b><span data-dcnode-id="2400" instrument_node="">
</span><p data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">Good question, Derek! I think that for some people ambition means earning (or striving to earn) a lot of money or “getting ahead”. For those whose values are entirely different, ambition takes on a different meaning. When people discuss topics around ambition I think that they often misunderstand each other. Assuming that everyone else shares your values in life is what I think leads to the disapproval. The disapproval goes both ways – people are often criticized as lazy and unambitious simply because they’re choosing a less lucrative path that leads to realizing their own values.</span></p><span data-dcnode-id="2397" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="2387" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/3a97ff95880d6183b2258ae982a537f4%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/3a97ff95880d6183b2258ae982a537f4?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="2386" instrument_node=""> </span><a class="reply-link" data-dcnode-id="2384" data-parent-id="53602" href="#"><span data-dcnode-id="2385" instrument_node="">Reply</span></a><span data-dcnode-id="2383" instrument_node="">

</span><b class="comment-author" data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">Dawn</span></b><span data-dcnode-id="2377" instrument_node="">
</span><p data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">Because they don’t understand it.</span></p><span data-dcnode-id="2374" instrument_node="">
</span><p data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">I have 6 children, 3 are 3 and under. A full time job and a business. I often work from 8 to 5, spend 5 to 9 with my family work again from 9 to midnight or 1 and them do it all again.</span></p><span data-dcnode-id="2371" instrument_node="">
</span><p data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">I get poked at daily but it’s no different than the person who decides o watch tv for 5 hours a night.</span></p><span data-dcnode-id="2368" instrument_node="">
</span><p data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">Big ambition is just not the norm. Steve Jobs was amazing and until people realized it he worked the night shift because he stunk. Until your ambition turns into something everyone needs or understands it’s just too odd to deal with. I see grease balls everyday that could care less and work on the front line. They are there because it’s easy to stereo type and say there’s a grease ball who doesn’t care and look away.</span></p><span data-dcnode-id="2365" instrument_node="">
</span><p data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">I can promise you if Atari could go back in time things would be different. Ambition makes us odd, which clearly creates discomfort for others. If others tried to understand it, it would cause them to step outside of their daily box which is the reason for the discussion anyway.</span></p><span data-dcnode-id="2362" instrument_node="">
</span><p data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">Just a crazy cycle that will never end.</span></p><span data-dcnode-id="2359" instrument_node="">
</span><p data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">I can also say that I hate ( hate is a strong word) lazy people that won’t get up and try….because I just don’t understand it.</span></p><span data-dcnode-id="2356" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="2346" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/a5750917b9452a07533c0ac15d8808b2%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/a5750917b9452a07533c0ac15d8808b2?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="2345" instrument_node=""> </span><a class="reply-link" data-dcnode-id="2343" data-parent-id="53601" href="#"><span data-dcnode-id="2344" instrument_node="">Reply</span></a><span data-dcnode-id="2342" instrument_node="">

</span><p data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">In my own personal opinion, I believe it’s an inward fear that they project onto someone else. It’s also an insecurity of their own. Ambition in itself isn’t a trait that everyone has. And some people who have it, don’t have as much than others. </span></p><span data-dcnode-id="2333" instrument_node="">
</span><p data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Have you ever tried explaining your dream/vision to someone and in return given a “I-secretly-feel-sorry-for-you cause I don’t believe it can happen” kind of look? I think that’s why people are afraid of ambition. They don’t dream big or believe in endless possibilities and to top it all off, make no attempt at hiding their beliefs.</span></p><span data-dcnode-id="2330" instrument_node="">

</span><b class="comment-author" data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">Peter</span></b><span data-dcnode-id="2310" instrument_node="">
</span><p data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">Excellent topic of discussion Derek. I find that the mention of the word ‘ambition’ has a different reaction with people depending on their perspective and approach to life. If your are an ambitious go-getter, you can see opportunities to align yourself with other ambitious people (even if they feel inferior in some way). But if you feel not as successful or ambitious, these people tend to feel inferior which leads to envy, jealousy and sometimes even hate. It’s really a matter of perspective and how you view the world, which is why it is so important to hang around people who think the same way as you – because it is very hard to change minds!!</span></p><span data-dcnode-id="2307" instrument_node="">

</span><b class="comment-author" data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Gemma Regalado</span></b><span data-dcnode-id="2287" instrument_node="">
</span><p data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">Ambition means different things to different people, and in the same way some people want to watch football on the tv every weekend, or eat a strict vegan diet, my ambition is a unique choice I’ve made because I feel it is important to me. For others, it’s something that comes waaaay down the charts, and that’s fine too.</span></p><span data-dcnode-id="2284" instrument_node="">
</span><p data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">And because it is my personal choice, I avoid sharing my ambitions with people who cannot understand or support that. </span></p><span data-dcnode-id="2281" instrument_node="">
</span><p data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">Personally, I find ambitiousness a really attractive trait and actively seek out like-minded individuals to share with and support that aspect of my personality.</span></p><span data-dcnode-id="2278" instrument_node="">
