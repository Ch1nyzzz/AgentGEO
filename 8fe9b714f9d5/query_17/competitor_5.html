</span><div class="col-xs-10" data-dcnode-id="5428"><span data-dcnode-id="5435" instrument_node="">
</span><b class="comment-author" data-dcnode-id="5433"><span data-dcnode-id="5434" instrument_node="">marquita herald</span></b><span data-dcnode-id="5432" instrument_node="">
</span><p data-dcnode-id="5430"><span data-dcnode-id="5431" instrument_node="">Hum … ambition is not a popular topic where I live (Maui). I remember how thrilled I was when I began moving up in my career in hotel sales and marketing and my “friends” didn’t wanted to hear a word about it. Things went from bad to worse when I was promoted to international sales – here I am living my dream traveling all over the world and I couldn’t even share it with those near and dear – although they never complained about all the great gifts I brought back after each trip. For better or worse, I’ve learned to effectively separate my personal and professional life to keep the peace.</span></p><span data-dcnode-id="5429" instrument_node="">
</span></div><span data-dcnode-id="5427" instrument_node="">
</span></div><span data-dcnode-id="5425" instrument_node="">
</span></div><span data-dcnode-id="5423" instrument_node="">
</span><div class="comment" data-dcnode-id="5386"><span data-dcnode-id="5422" instrument_node="">
</span><div class="row" data-dcnode-id="5388"><span data-dcnode-id="5421" instrument_node="">
</span><div class="col-xs-2 avatar-col" data-dcnode-id="5414"><span data-dcnode-id="5420" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="5419" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/920b199fa09804001b34aa06f3d2ce9f%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/920b199fa09804001b34aa06f3d2ce9f?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="5418" instrument_node=""> </span><a class="reply-link" data-dcnode-id="5416" data-parent-id="53761" href="#"><span data-dcnode-id="5417" instrument_node="">Reply</span></a><span data-dcnode-id="5415" instrument_node="">
</span></div><span data-dcnode-id="5413" instrument_node="">
</span><div class="col-xs-10" data-dcnode-id="5390"><span data-dcnode-id="5412" instrument_node="">
</span><b class="comment-author" data-dcnode-id="5410"><span data-dcnode-id="5411" instrument_node="">David</span></b><span data-dcnode-id="5409" instrument_node="">
</span><p data-dcnode-id="5407"><span data-dcnode-id="5408" instrument_node="">This may be an unpopular response, but I thought it might be worthwhile putting it out there to see what everyone thought.</span></p><span data-dcnode-id="5406" instrument_node="">
</span><p data-dcnode-id="5404"><span data-dcnode-id="5405" instrument_node="">I think the answer is two-fold. People seem to dislike others who are successful, because it makes them seem like a lesser person if they’re not as successful. Tim Ferriss is a good example, he is good at pretty much everything he does and he markets himself well and people seem to hate him for it. </span></p><span data-dcnode-id="5403" instrument_node="">
</span><p data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">Generally I also think people dislike anything that conflicts with their ideological world view. If someone has a different opinion to you then it subtly undermines your values or puts them in doubt, and so the tendency is to attack the other person’s values and defend your own. So I think you could equally ask why do you dislike people who think there is more to life than ambition?</span></p><span data-dcnode-id="5400" instrument_node="">
</span><p data-dcnode-id="5398"><span data-dcnode-id="5399" instrument_node="">Personally I feel there are much more important things in life than having a lot of money and being successful. Where does ambition get you? Nice car, big house, might make you popular, and then what? You get old, sick and die, or some life event happens that leaves you an emotional wreck and then what does all of the stuff and prestige matter? Is the big house going to console you? Will your network give you what you need to get through the difficult times? After our basic needs are met having more stuff will not make us happier or more fulfilled. Those sorts of things in my experience come from within.</span></p><span data-dcnode-id="5397" instrument_node="">
</span><p data-dcnode-id="5395"><span data-dcnode-id="5396" instrument_node="">As far as I can tell ambition is a hangover from the process of evolution. Animals need to fight and compete with others to survive. We don’t, but we still have the same drives and instincts as we’re basically more complex animals. </span></p><span data-dcnode-id="5394" instrument_node="">
</span><p data-dcnode-id="5392"><span data-dcnode-id="5393" instrument_node="">I don’t think drive or a solid work ethic are bad things at all, but I think it’s important to see where we focus them, and what the underlying psychological causes for our actions are.</span></p><span data-dcnode-id="5391" instrument_node="">
</span></div><span data-dcnode-id="5389" instrument_node="">
</span></div><span data-dcnode-id="5387" instrument_node="">
</span></div><span data-dcnode-id="5385" instrument_node="">
</span><div class="comment" data-dcnode-id="5342"><span data-dcnode-id="5384" instrument_node="">
</span><div class="row" data-dcnode-id="5344"><span data-dcnode-id="5383" instrument_node="">
</span><div class="col-xs-2 avatar-col" data-dcnode-id="5376"><span data-dcnode-id="5382" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="5381" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/82fb84ffb8402aa8205acf71dba86121%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/82fb84ffb8402aa8205acf71dba86121?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="5380" instrument_node=""> </span><a class="reply-link" data-dcnode-id="5378" data-parent-id="53759" href="#"><span data-dcnode-id="5379" instrument_node="">Reply</span></a><span data-dcnode-id="5377" instrument_node="">
</span></div><span data-dcnode-id="5375" instrument_node="">
</span><div class="col-xs-10" data-dcnode-id="5346"><span data-dcnode-id="5374" instrument_node="">
</span><b class="comment-author" data-dcnode-id="5372"><span data-dcnode-id="5373" instrument_node="">Cora Foerstner</span></b><span data-dcnode-id="5371" instrument_node="">
</span><p data-dcnode-id="5369"><span data-dcnode-id="5370" instrument_node="">Defining ambition would be helpful. </span></p><span data-dcnode-id="5368" instrument_node="">
</span><p data-dcnode-id="5366"><span data-dcnode-id="5367" instrument_node="">The above definition by Steven Pressfield is interesting, but I’m not certain it fits all people. For example, I don’t think there is a grand “reason for our existence.” A flower grows because a seed fell into fertile ground and thrived. I was born because my parents had sex and sperm and egg met. I was poor but loved and have followed my heart. Other are born into wealth and privilege and never learn to follow their heart. Others are born into poverty so great their grand reason for existence is simply to survive.</span></p><span data-dcnode-id="5365" instrument_node="">
</span><p data-dcnode-id="5363"><span data-dcnode-id="5364" instrument_node="">As many of the comments suggest, people reacting negatively to the word ambition might be defining it differently. A son or daughter neglected or abused by an “ambitious” parent, might see ambition differently from a person encouraged to follow his or her dreams, to make a plan, get help, and to realize their ambition. Some of us are not so fortunate and have to fight for our ambitions to become reality.</span></p><span data-dcnode-id="5362" instrument_node="">
</span><p data-dcnode-id="5360"><span data-dcnode-id="5361" instrument_node="">I really like Steve Currie, Samar, and Sylvia Masser’s answers. I’ve lived abroad for a good part of my adult life and ambition in the U.S.A. is often focused on work rather than other things. It’s possible to have ambitions that don’t sound all that wonderful to some of us.</span></p><span data-dcnode-id="5359" instrument_node="">
</span><p data-dcnode-id="5357"><span data-dcnode-id="5358" instrument_node="">What if you’re a photographer and want to take the perfect picture? What if it takes you a life time to accomplished that to your satisfaction? Is that ambition less valuable than someone who wants to be a billionaire and accomplishes her/his ambition by age 30? How about someone whose ambition is not to work and travel the world…might seem crazy to some people, but I’ve met some folks who do that and they are very happy. Or someone who wants to grow organic food in their backyard to eat healthy and provide for his family?</span></p><span data-dcnode-id="5356" instrument_node="">
</span><p data-dcnode-id="5354"><span data-dcnode-id="5355" instrument_node="">Many of the answers here take negative shots at people who have a negative view of ambition. My question is: how is calling someone who doesn’t have your sense of ambition lazy or some other negative term different from someone who views ambition as negative? different sides of the same coin?</span></p><span data-dcnode-id="5353" instrument_node="">
</span><p data-dcnode-id="5351"><span data-dcnode-id="5352" instrument_node="">A better strategy might be to find out where the other person is coming from and find common ground. My experiences is that we are often more alike than different. You might have more in common with someone who has a negative view of ambition than you imagine. </span></p><span data-dcnode-id="5350" instrument_node="">
</span><p data-dcnode-id="5348"><span data-dcnode-id="5349" instrument_node="">My ambitions are modest, but they suit me, and they satisfy me. The world is diverse, and there is plenty of room for diversity of ambition.</span></p><span data-dcnode-id="5347" instrument_node="">
</span></div><span data-dcnode-id="5345" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="5337" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/9b068857c83ff5a626138ac564dce9b9%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/9b068857c83ff5a626138ac564dce9b9?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="5336" instrument_node=""> </span><a class="reply-link" data-dcnode-id="5334" data-parent-id="53757" href="#"><span data-dcnode-id="5335" instrument_node="">Reply</span></a><span data-dcnode-id="5333" instrument_node="">

</span><b class="comment-author" data-dcnode-id="5328"><span data-dcnode-id="5329" instrument_node="">Natalie Jean</span></b><span data-dcnode-id="5327" instrument_node="">
</span><p data-dcnode-id="5325"><span data-dcnode-id="5326" instrument_node="">I have to I think ambition gets a bad wrap. Heck, guys and gals get dumped over ambition every day. I’ve had way too many conversations where I hear of girlfriends of mine dumping a guy for a LACK of ambition. </span></p><span data-dcnode-id="5324" instrument_node="">
</span><p data-dcnode-id="5322"><span data-dcnode-id="5323" instrument_node="">I think the reason that ambition gets a bad wrap is how you demonstrate it. If you brag in all the wrong ways (great video on that by the way!) then it’s going to get you negative attention instead of gaining a captivated audience that’s rooting for you to go bigger and conquer more.</span></p><span data-dcnode-id="5321" instrument_node="">

</span><b class="comment-author" data-dcnode-id="5302"><span data-dcnode-id="5303" instrument_node="">The get in shape girl</span></b><span data-dcnode-id="5301" instrument_node="">
</span><p data-dcnode-id="5299"><span data-dcnode-id="5300" instrument_node="">I’m totally ambitious, but I want an awesome life, amazing experiences and tons of friends to share them with. I never say I want money. My boyfriend always talks in terms of dollars. He says that I don’t talk about wanting money bc I don’t have enough! Haha. I disagree- his idea of wealth is just different than mine. So I guess if you’re talking about money I may not SOUND ambitious, but in reality I am very ambitious!</span></p><span data-dcnode-id="5298" instrument_node="">

</span><b class="comment-author" data-dcnode-id="5279"><span data-dcnode-id="5280" instrument_node="">Leslie L Denning</span></b><span data-dcnode-id="5278" instrument_node="">
</span><p data-dcnode-id="5276"><span data-dcnode-id="5277" instrument_node="">Hi Derek:</span></p><span data-dcnode-id="5275" instrument_node="">
</span><p data-dcnode-id="5273"><span data-dcnode-id="5274" instrument_node="">I think that it is a holdover from the ’60’s/70’s era. When I was child, everyone wanted my generation to do better than the former. By the time I was a young adult then, it was very cool to look down our noses at people who wanted to achieve, who wanted money, who lived in the suburbs, blah, blah, blah. We just wanted to be free of all those trappings of materialism, dance at Woodstock, get stoned, and maybe grow a little food in our commune. Talk about your unsustainable lifestyle!</span></p><span data-dcnode-id="5272" instrument_node="">
</span><p data-dcnode-id="5270"><span data-dcnode-id="5271" instrument_node="">Unfortunately, a lot of my peers have never outgrown kum-bah-yah and are now in positions in high power in education and government. They want everything to be ‘fair’ and think people who want to become wealthy as greedy, and they have set about brainwashing us. I’m still a rebel, though, and won’t let those ‘grownups’ tell me how to be. I’m ambitious as heck – and I’m going to be a millionaire in 5 years, no matter who looks down their holier-than-thou noses at me!</span></p><span data-dcnode-id="5269" instrument_node="">
</span><p data-dcnode-id="5265"><span data-dcnode-id="5268" instrument_node="">All the best,</span><br data-dcnode-id="5267"><span data-dcnode-id="5266" instrument_node="">
Leslie</span></p><span data-dcnode-id="5264" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="5254" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/d11400df6586e45d305895228d68dc53%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/d11400df6586e45d305895228d68dc53?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="5253" instrument_node=""> </span><a class="reply-link" data-dcnode-id="5251" data-parent-id="53747" href="#"><span data-dcnode-id="5252" instrument_node="">Reply</span></a><span data-dcnode-id="5250" instrument_node="">

</span><b class="comment-author" data-dcnode-id="5245"><span data-dcnode-id="5246" instrument_node="">Danika Jane</span></b><span data-dcnode-id="5244" instrument_node="">
</span><p data-dcnode-id="5242"><span data-dcnode-id="5243" instrument_node="">I believe ambition is a beautiful gift. We do have goals, desires and things we want in our lives and this is completely natural and okay. </span></p><span data-dcnode-id="5241" instrument_node="">
</span><p data-dcnode-id="5239"><span data-dcnode-id="5240" instrument_node="">Everyone has their own unique gifts that are bursting with colours to be shared with the world. I believe you owe it to yourself and the world to make the contribution you were born to make. Ambition to me is to embrace that fire-in-the-belly passionate feeling to go after your hearts desires. </span></p><span data-dcnode-id="5238" instrument_node="">
</span><p data-dcnode-id="5234"><span data-dcnode-id="5237" instrument_node="">Steven Pressfield wrote…</span><br data-dcnode-id="5236"><span data-dcnode-id="5235" instrument_node="">
“Ambition is the most primal and sacred fundament of our being. To feel ambition and to act upon it is to embrace the unique calling of our souls. Not to act upon that ambition is to turn our back on ourselves and on the reason for our existence.”</span></p><span data-dcnode-id="5233" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="5223" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/06b3e4ca604a2393c3811c4a249b8e30%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/06b3e4ca604a2393c3811c4a249b8e30?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="5222" instrument_node=""> </span><a class="reply-link" data-dcnode-id="5220" data-parent-id="53746" href="#"><span data-dcnode-id="5221" instrument_node="">Reply</span></a><span data-dcnode-id="5219" instrument_node="">

</span><b class="comment-author" data-dcnode-id="5214"><span data-dcnode-id="5215" instrument_node="">Missy Cooke</span></b><span data-dcnode-id="5213" instrument_node="">
</span><p data-dcnode-id="5211"><span data-dcnode-id="5212" instrument_node="">Sometimes I think that disapproving look comes because of the thing you are ambitious about, not because you are ambitious.</span></p><span data-dcnode-id="5210" instrument_node="">
</span><p data-dcnode-id="5208"><span data-dcnode-id="5209" instrument_node="">Everyone is ambitious about something…some about sitting on the couch all day but that’s still an ambition to be lazy, I guess. </span></p><span data-dcnode-id="5207" instrument_node="">
</span><p data-dcnode-id="5205"><span data-dcnode-id="5206" instrument_node="">Either way, when you are out doing something that someone else doesn’t want to do, or thinks is impossible then they automatically see your ambition as negative. But, if you asked them to do something that was equally as hard but fun for them, they would be all over it.</span></p><span data-dcnode-id="5204" instrument_node="">
</span><p data-dcnode-id="5202"><span data-dcnode-id="5203" instrument_node="">I have found there is no point discussing why I’m doing anything if it is in an attempt to convince someone else that it’s a worthwhile endeavor. If their only reason for not is that ‘it’s hard’, well, I already knew that – I just don’t see it as an immediate reason not to try.</span></p><span data-dcnode-id="5201" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="5191" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/c2cfd63446b06ec2d4ac41ef457da645%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/c2cfd63446b06ec2d4ac41ef457da645?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="5190" instrument_node=""> </span><a class="reply-link" data-dcnode-id="5188" data-parent-id="53744" href="#"><span data-dcnode-id="5189" instrument_node="">Reply</span></a><span data-dcnode-id="5187" instrument_node="">

</span><div class="col-xs-10" data-dcnode-id="5177"><span data-dcnode-id="5184" instrument_node="">
</span><b class="comment-author" data-dcnode-id="5182"><span data-dcnode-id="5183" instrument_node="">Allison</span></b><span data-dcnode-id="5181" instrument_node="">
</span><p data-dcnode-id="5179"><span data-dcnode-id="5180" instrument_node="">I think that reaction is due to the perpetuated idea that you have to “all in” in order to win big. My personal belief is that this only part of the equation. Our health, mind, wealth, and family life overlap and need balance to be truly happy, and balance doesn’t mean mediocre success. We really can “have it all”, and those who scoff at us uber ambitious types simply don’t believe in themselves enough to go after life like we are 🙂</span></p><span data-dcnode-id="5178" instrument_node="">

</span><div class="col-xs-2 avatar-col" data-dcnode-id="5163"><span data-dcnode-id="5169" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="5168" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/28b0cbc95a1767be38d52b7eaa496830%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/28b0cbc95a1767be38d52b7eaa496830?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="5167" instrument_node=""> </span><a class="reply-link" data-dcnode-id="5165" data-parent-id="53743" href="#"><span data-dcnode-id="5166" instrument_node="">Reply</span></a><span data-dcnode-id="5164" instrument_node="">

</span><p data-dcnode-id="5152"><span data-dcnode-id="5157" instrument_node="">ambition [æmˈbɪʃən] n</span><br data-dcnode-id="5156"><span data-dcnode-id="5155" instrument_node="">
1. strong desire for success, achievement, or distinction</span><br data-dcnode-id="5154"><span data-dcnode-id="5153" instrument_node="">
2. something so desired; goal; aim</span></p><span data-dcnode-id="5151" instrument_node="">
</span><p data-dcnode-id="5149"><span data-dcnode-id="5150" instrument_node="">[from Old French, from Latin ambitiō a going round (of candidates), a striving to please, from ambīre to go round; see ambit]</span></p><span data-dcnode-id="5148" instrument_node="">
</span><p data-dcnode-id="5146"><span data-dcnode-id="5147" instrument_node="">###</span></p><span data-dcnode-id="5145" instrument_node="">
</span><p data-dcnode-id="5143"><span data-dcnode-id="5144" instrument_node="">At the core, humans are instinctive, like our animal cousins; we go towards pleasure and away from pain. Having a siesta on a beach, in the gulf of Mexico is pleasure – an end goal for most. Getting to Mexico requires some effort – and if you need money to do it and more money to do it the way they sell it to you in advertising – then it takes even MORE effort! And effort translates into PAIN for some folks. Probably for most! Effort requires risk, takes (you) out of certainty and into a state of UNcertainty = PAIN. </span></p><span data-dcnode-id="5142" instrument_node="">
</span><p data-dcnode-id="5140"><span data-dcnode-id="5141" instrument_node="">So, its back to the XBOX, innit?</span></p><span data-dcnode-id="5139" instrument_node="">
</span><p data-dcnode-id="5137"><span data-dcnode-id="5138" instrument_node="">My main #meta man, Tony Robbins sums it up quite nicely (paraphrasing): People want things easy – they don’t want effort! They don’t see the verdant, peaceful valley beyond the mountain – they’re too distracted by the mountain! And the PAIN they’ll experience during the climb! </span></p><span data-dcnode-id="5136" instrument_node="">
</span><p data-dcnode-id="5134"><span data-dcnode-id="5135" instrument_node="">Many people want an excuse NOT to go for it. Hence, they will shoot holes in all your lamebrain schemes. And DAMN you if you succeed … cos then, you just got LUCKY, innit?</span></p><span data-dcnode-id="5133" instrument_node="">
</span><p data-dcnode-id="5131"><span data-dcnode-id="5132" instrument_node="">###</span></p><span data-dcnode-id="5130" instrument_node="">

</span><div class="col-xs-2 avatar-col" data-dcnode-id="5115"><span data-dcnode-id="5121" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="5120" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/55678df70881dc397d8c5058bb8aa0d4%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/55678df70881dc397d8c5058bb8aa0d4?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="5119" instrument_node=""> </span><a class="reply-link" data-dcnode-id="5117" data-parent-id="53742" href="#"><span data-dcnode-id="5118" instrument_node="">Reply</span></a><span data-dcnode-id="5116" instrument_node="">
</span></div><span data-dcnode-id="5114" instrument_node="">
</span><div class="col-xs-10" data-dcnode-id="5100"><span data-dcnode-id="5113" instrument_node="">
</span><b class="comment-author" data-dcnode-id="5111"><span data-dcnode-id="5112" instrument_node="">Jed</span></b><span data-dcnode-id="5110" instrument_node="">
</span><p data-dcnode-id="5108"><span data-dcnode-id="5109" instrument_node="">This will likely open a can of worms, but I am going to say it. There is a general movement in the country to vilify success. It started with the meltdown in Wall Street and was perpetuated by the Occupy protests and the current administration. Love him or hate him, he has definitely shined a light on the negativity of success. </span></p><span data-dcnode-id="5107" instrument_node="">
</span><p data-dcnode-id="5105"><span data-dcnode-id="5106" instrument_node="">There are plenty of bad folks on Wall Street and in the upper crust of big corporations, but there are also plenty of honest, hard working folks that worked their asses off to get there. Unfortunately, as the saying goes, a few bad apples… Now, people tend to look down on the person whether consciously or subconsciously driving down the street in a $80K BMW. Where as 40 – 50 years ago, those people were admired and celebrated for their success in life.</span></p><span data-dcnode-id="5104" instrument_node="">
</span><p data-dcnode-id="5102"><span data-dcnode-id="5103" instrument_node="">What I always say to people is that money does not buy happiness, but a person without stability and security is not happy either.</span></p><span data-dcnode-id="5101" instrument_node="">
</span></div><span data-dcnode-id="5099" instrument_node="">
</span></div><span data-dcnode-id="5097" instrument_node="">
</span></div><span data-dcnode-id="5095" instrument_node="">
</span><ul class="children" data-dcnode-id="5035"><span data-dcnode-id="5094" instrument_node="">
</span><div class="comment reply" data-dcnode-id="5066"><span data-dcnode-id="5093" instrument_node="">
</span><div class="row" data-dcnode-id="5068"><span data-dcnode-id="5092" instrument_node="">
</span><div class="col-xs-2 col-md-offset-2 avatar-col" data-dcnode-id="5085"><span data-dcnode-id="5091" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="5090" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/5426e57369a995f9ea32be873992b394%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/5426e57369a995f9ea32be873992b394?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="5089" instrument_node=""> </span><a class="reply-link" data-dcnode-id="5087" data-parent-id="53772" href="#"><span data-dcnode-id="5088" instrument_node="">Reply</span></a><span data-dcnode-id="5086" instrument_node="">
</span></div><span data-dcnode-id="5084" instrument_node="">
</span><div class="col-xs-10 col-md-8" data-dcnode-id="5070"><span data-dcnode-id="5083" instrument_node="">
</span><b class="comment-author" data-dcnode-id="5081"><span data-dcnode-id="5082" instrument_node="">David R. Herz</span></b><span data-dcnode-id="5080" instrument_node="">
</span><p data-dcnode-id="5078"><span data-dcnode-id="5079" instrument_node="">I don’t think we vilify success. I think what bothers us is people not giving credit for the source of their success where it is due, which is not to say that their hard work was not a factor, but it was not the only one. And when we acknowledge that our success may have been influenced by factors outside of ourselves, it may suggest that we have a responsibility to those who did not have the same advantages.</span></p><span data-dcnode-id="5077" instrument_node="">
</span><p data-dcnode-id="5075"><span data-dcnode-id="5076" instrument_node="">Also, if you look at trends, the executive of 40-50 years ago made a much smaller multiple of what the guy at the bottom made. He might have driven a nicer car and lived in a nicer house, but was less likely than today to live in a my-house-is-bigger-than-yours subdivision of McMansions as far away as possible from the more common folk.</span></p><span data-dcnode-id="5074" instrument_node="">
</span><p data-dcnode-id="5072"><span data-dcnode-id="5073" instrument_node="">Just my two cents.</span></p><span data-dcnode-id="5071" instrument_node="">
</span></div><span data-dcnode-id="5069" instrument_node="">
</span></div><span data-dcnode-id="5067" instrument_node="">
</span></div><span data-dcnode-id="5065" instrument_node="">
</span><ul class="children" data-dcnode-id="5037"><span data-dcnode-id="5064" instrument_node="">
</span><div class="comment re-reply" data-dcnode-id="5039"><span data-dcnode-id="5063" instrument_node="">
</span><div class="row" data-dcnode-id="5041"><span data-dcnode-id="5062" instrument_node="">
</span><div class="col-xs-2 col-md-offset-4 avatar-col" data-dcnode-id="5055"><span data-dcnode-id="5061" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="5060" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/b9a265c63b40a7c8d32633e67fd97de8%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/b9a265c63b40a7c8d32633e67fd97de8?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="5059" instrument_node=""> </span><a class="reply-link" data-dcnode-id="5057" data-parent-id="54029" href="#"><span data-dcnode-id="5058" instrument_node="">Reply</span></a><span data-dcnode-id="5056" instrument_node="">
</span></div><span data-dcnode-id="5054" instrument_node="">
</span><div class="col-xs-10 col-md-6" data-dcnode-id="5043"><span data-dcnode-id="5053" instrument_node="">
</span><b class="comment-author" data-dcnode-id="5051"><span data-dcnode-id="5052" instrument_node="">Jed</span></b><span data-dcnode-id="5050" instrument_node="">
</span><p data-dcnode-id="5048"><span data-dcnode-id="5049" instrument_node="">I guess we can agree to disagree. The reason I disagree is because you kind of crossed 2 bridges at once there. The first bridge was people not giving credit to the people that helped them be successful. The second bridge was successful people having “a responsibility” to those that did not have the same advantages. I agree with your first bridge just out of good manners. Cite your sources, give credit where credit is due, and help those that helped you. In contrast, I believe a person does not have any”responsibility” to folks with less advantages. I DO believe that any person that is well off should do what they can to help people that are not well off, but not out of a feeling of “responsibility for their success.” They should do it because they are good people or because they want to help or because they feel bad for those people or because their faith requires it.</span></p><span data-dcnode-id="5047" instrument_node="">
</span><p data-dcnode-id="5045"><span data-dcnode-id="5046" instrument_node="">I think the responsibility you reference translates into “entitlement” for the taker. It is that sense of entitlement that makes those folks resent success and ambition. John Successful Guy is giving $10K year charity A, but he isn’t helping charity B. Why doesn’t he feel a responsibility to help charity B? John is doing what he can or what he feels is right, but he is now viewed negatively by Charity B because he isn’t fulfilling his responsibility. I believe this is the root of alot of problems in this country and problems we will see more prevalent in the coming of our younger generations. We cannot raise people to think that the wealthy have a responsibility to support anyone or that the non-wealthy are entitled to anything. Make your own opportunities, help your fellow man if you are able, and don’t rely on anyone for your own personal growth, welfare, or success.</span></p><span data-dcnode-id="5044" instrument_node="">
</span></div><span data-dcnode-id="5042" instrument_node="">
</span></div><span data-dcnode-id="5040" instrument_node="">
</span></div><span data-dcnode-id="5038" instrument_node="">

</span><div class="comment" data-dcnode-id="5012"><span data-dcnode-id="5033" instrument_node="">

</span><div class="col-xs-2 avatar-col" data-dcnode-id="5025"><span data-dcnode-id="5031" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="5030" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/52d4b04641ba4be9ccef1b324113b0f3%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/52d4b04641ba4be9ccef1b324113b0f3?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="5029" instrument_node=""> </span><a class="reply-link" data-dcnode-id="5027" data-parent-id="53741" href="#"><span data-dcnode-id="5028" instrument_node="">Reply</span></a><span data-dcnode-id="5026" instrument_node="">
</span></div><span data-dcnode-id="5024" instrument_node="">
</span><div class="col-xs-10" data-dcnode-id="5016"><span data-dcnode-id="5023" instrument_node="">
</span><b class="comment-author" data-dcnode-id="5021"><span data-dcnode-id="5022" instrument_node="">David</span></b><span data-dcnode-id="5020" instrument_node="">
</span><p data-dcnode-id="5018"><span data-dcnode-id="5019" instrument_node="">I honestly do not think that people hate ambition. I just think that they are scared of trying to do something that might fail. It easier to play safe and stay firmly in their comfort zone, and then they never have to experience failure. However, if they were guaranteed that everything they tried would work, then it would be full speed ahead and ambition with a capital A. So my view is that it is a defence mechanism against doing the difficult stuff in life.</span></p><span data-dcnode-id="5017" instrument_node="">
</span></div><span data-dcnode-id="5015" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="5006" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/5426e57369a995f9ea32be873992b394%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/5426e57369a995f9ea32be873992b394?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="5005" instrument_node=""> </span><a class="reply-link" data-dcnode-id="5003" data-parent-id="53770" href="#"><span data-dcnode-id="5004" instrument_node="">Reply</span></a><span data-dcnode-id="5002" instrument_node="">

</span><div class="col-xs-10 col-md-8" data-dcnode-id="4983"><span data-dcnode-id="4999" instrument_node="">
</span><b class="comment-author" data-dcnode-id="4997"><span data-dcnode-id="4998" instrument_node="">David R. Herz</span></b><span data-dcnode-id="4996" instrument_node="">
</span><p data-dcnode-id="4994"><span data-dcnode-id="4995" instrument_node="">You took the words right out of my mouth. I agree with jealous comments as well. We’re scared, but deep down we want what others have as well. Whenever we see someone going for something – and usually when it is something we could see ourselves doing but . . . – we want to enroll them in our view of the world to justify our own inaction. I think this is also why it’s so important to hang out with people who are similarly ambitious; we too often allow ourselves to be influenced by the decisions of others.</span></p><span data-dcnode-id="4993" instrument_node="">
</span><p data-dcnode-id="4991"><span data-dcnode-id="4992" instrument_node="">For example, when I was first married, I spent quite a bit of time looking at real estate; I found a number of buildings I was totally in love with. I consulted with a friend of mine who was in the business, but twenty years ahead of where I was. He suggested these weren’t good plays because of the neighborhood, etc.; so I backed off.</span></p><span data-dcnode-id="4990" instrument_node="">
</span><p data-dcnode-id="4988"><span data-dcnode-id="4989" instrument_node="">What I didn’t do is put myself in his position twenty years earlier. The stuff he owned in a nice neighborhood at that time had been in a much more dicey neighborhood when he got into it, back when he was a lot more hungry and ambitious.</span></p><span data-dcnode-id="4987" instrument_node="">
</span><p data-dcnode-id="4985"><span data-dcnode-id="4986" instrument_node="">I guess what I am noticing is that even with successful people, we need to look at what they did when they were playing the games that got them where they are, and choose as our cohort those who are still playing those big games in life.</span></p><span data-dcnode-id="4984" instrument_node="">
</span></div><span data-dcnode-id="4982" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="4972" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/e2c9dc3b417876316a7b6d6a3366d311%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/e2c9dc3b417876316a7b6d6a3366d311?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="4971" instrument_node=""> </span><a class="reply-link" data-dcnode-id="4969" data-parent-id="53740" href="#"><span data-dcnode-id="4970" instrument_node="">Reply</span></a><span data-dcnode-id="4968" instrument_node="">

</span><div class="col-xs-10" data-dcnode-id="4956"><span data-dcnode-id="4965" instrument_node="">
</span><b class="comment-author" data-dcnode-id="4963"><span data-dcnode-id="4964" instrument_node="">Penny McConnell</span></b><span data-dcnode-id="4962" instrument_node="">
</span><p data-dcnode-id="4958"><span data-dcnode-id="4961" instrument_node="">Ambition has a lot of energy associated with it based on the way we were raised. In some communities if you were not seen as ambitious then often time you were accused of being lazy. However, if someone decided you were “overly ambitious” that presented a problem as well and marked you as competitive, single-minded, selfish, etc. In short, ambition is associated with a lot of judgment.</span><br data-dcnode-id="4960"><span data-dcnode-id="4959" instrument_node="">
Which is unfortunate. Because in its purest sense ambition is needed to reach desired outcomes and make the largest contribution.</span></p><span data-dcnode-id="4957" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="4947" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/4b4d3685e44f77a1373517ffec31f662%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/4b4d3685e44f77a1373517ffec31f662?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="4946" instrument_node=""> </span><a class="reply-link" data-dcnode-id="4944" data-parent-id="53738" href="#"><span data-dcnode-id="4945" instrument_node="">Reply</span></a><span data-dcnode-id="4943" instrument_node="">

</span><div class="col-xs-10" data-dcnode-id="4928"><span data-dcnode-id="4940" instrument_node="">
</span><b class="comment-author" data-dcnode-id="4938"><span data-dcnode-id="4939" instrument_node="">Jasmine</span></b><span data-dcnode-id="4937" instrument_node="">
</span><p data-dcnode-id="4935"><span data-dcnode-id="4936" instrument_node="">Is’t ambition that motivation spark within ? Believing in something not because we have an ego or want to put people down but because we want it more than anything? I have always been ambitious &amp; encouraged people in my life or even random strangers to believe in themselves. My why is because I wanted a better life for my family, i wanted to give back to my mum. I had the career &amp; the degrees but you find people get insecure that you may be better than them so they try to bring you down, few people like a tall poppy. </span></p><span data-dcnode-id="4934" instrument_node="">
</span><p data-dcnode-id="4930"><span data-dcnode-id="4933" instrument_node="">Or some just don’t understand, when I started my first company my grandfather told me I was wasting my time &amp; should go get a job at woolworths, simply because he didn’t have ambition and believed having any work was better than taking a chance.</span><br data-dcnode-id="4932"><span data-dcnode-id="4931" instrument_node="">
Ambition is what drives us.</span></p><span data-dcnode-id="4929" instrument_node="">
</span></div><span data-dcnode-id="4927" instrument_node="">
</span></div><span data-dcnode-id="4925" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="4919" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/223644cbc57d717a6c0047f86d1e3e3f%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/223644cbc57d717a6c0047f86d1e3e3f?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="4918" instrument_node=""> </span><a class="reply-link" data-dcnode-id="4916" data-parent-id="53737" href="#"><span data-dcnode-id="4917" instrument_node="">Reply</span></a><span data-dcnode-id="4915" instrument_node="">

</span><div class="col-xs-10" data-dcnode-id="4892"><span data-dcnode-id="4912" instrument_node="">
</span><b class="comment-author" data-dcnode-id="4910"><span data-dcnode-id="4911" instrument_node="">Kevin</span></b><span data-dcnode-id="4909" instrument_node="">
</span><p data-dcnode-id="4901"><span data-dcnode-id="4908" instrument_node="">The problem is people are going to always tell you that you can’t do something, that you’re not capable of that. And of course they are going to say no, or that you can’t do it because you are making them uncomfortable because you are trying to do more with your life. People who say you can’t do something do not recognize that unconsciously their mind is weak and sad that they themselves are not trying anything to better themselves. So in fact it is their own minds tricking them to put up a defensive wall because you are shining the light on their own weakness. The weakness of them lacking to stand up for what is yours, the weakness of not producing more of their lives.</span><br data-dcnode-id="4907"><span data-dcnode-id="4906" instrument_node="">
Because life has A LOT more meaning than just working a day job, going home and doing nothing.</span><br data-dcnode-id="4905"><span data-dcnode-id="4904" instrument_node="">
Life is hard, it pushes people around, that’s rough. But that’s just one of the hoops you have to flip through to achieve what is yours. (Haha sorry, that’s my motivational side speaking.)</span><br data-dcnode-id="4903"><span data-dcnode-id="4902" instrument_node="">
But seriously, look at people, they are like a boiling crab pot. If you have ever watched a boiling crab pot, you know what they do? When one crab tries to escape the others pull them back in, and that is what I see people who are holding me back. They themselves are sitting in boiling water, and do not realize it. But I am the only one who sees that we are boiling away, dying. So how do you overcome this? You must have the strength, and faith in yourself. You have to believe in yourself! </span></p><span data-dcnode-id="4900" instrument_node="">
</span><p data-dcnode-id="4894"><span data-dcnode-id="4899" instrument_node="">Anyways, haha I go off on random motivational tangents because I am working on my motivation website.</span><br data-dcnode-id="4898"><span data-dcnode-id="4897" instrument_node="">
Either way, thanks for your time Derek!</span><br data-dcnode-id="4896"><span data-dcnode-id="4895" instrument_node="">
You rock!</span></p><span data-dcnode-id="4893" instrument_node="">

</span><div class="col-xs-2 avatar-col" data-dcnode-id="4878"><span data-dcnode-id="4884" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="4883" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/036e906324459ac865917ec6701c48c7%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/036e906324459ac865917ec6701c48c7?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="4882" instrument_node=""> </span><a class="reply-link" data-dcnode-id="4880" data-parent-id="53736" href="#"><span data-dcnode-id="4881" instrument_node="">Reply</span></a><span data-dcnode-id="4879" instrument_node="">
</span></div><span data-dcnode-id="4877" instrument_node="">
</span><div class="col-xs-10" data-dcnode-id="4845"><span data-dcnode-id="4876" instrument_node="">
</span><b class="comment-author" data-dcnode-id="4874"><span data-dcnode-id="4875" instrument_node="">Kimberly</span></b><span data-dcnode-id="4873" instrument_node="">
</span><p data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">Without ambition people would still be dying of freakin’ polio. </span></p><span data-dcnode-id="4870" instrument_node="">
</span><p data-dcnode-id="4868"><span data-dcnode-id="4869" instrument_node="">“Why do people do that?” It might be jealousy. But I think it shows a lack of depth of knowledge – they need more information about you to make that statement. Seems to be an implied “selfishness” here. Ambition alone can’t be a bad thing.</span></p><span data-dcnode-id="4867" instrument_node="">
</span><p data-dcnode-id="4865"><span data-dcnode-id="4866" instrument_node="">However, it is simply very acceptable to say “there is something wrong with wanting to get ahead in business and life.” An entire movement occurred around it – Occupy Wall Street. Such great branding. Also, the current president of the US says it so much that I now regularly hear people ape him with “profit is bad.” “Did you see their huge profits?” It means nothing. The person is uneducated. Profit margins, operating margins, etc, matter.</span></p><span data-dcnode-id="4864" instrument_node="">
</span><p data-dcnode-id="4862"><span data-dcnode-id="4863" instrument_node="">In any case, that person needed to know your goals in life, Derek. Where are you headed? Profit is essential to every business (unless not-for-profit). You upped your production quality, for example, providing more value to your audience and enabling you to grow. That took profit and you employ or hire some other now too, yes? Fantastic!</span></p><span data-dcnode-id="4861" instrument_node="">
</span><p data-dcnode-id="4859"><span data-dcnode-id="4860" instrument_node="">And growing your personal wealth is also essential, if say you want to support a family one day or start a foundation that feeds and schools children in African nations! Does anyone get mad at Oprah?</span></p><span data-dcnode-id="4858" instrument_node="">
</span><p data-dcnode-id="4856"><span data-dcnode-id="4857" instrument_node="">“And am I the only one who wants to stare disapprovingly back at them?” No. But why bother. They seem ignorant. Better to educate them from the heart with what business is to you and your goals. Such real, solid thinking might make them feel a bit superficial though. So be nice. You are in the power position when you come from a place of knowledge and not defensive attitude.</span></p><span data-dcnode-id="4855" instrument_node="">
</span><p data-dcnode-id="4853"><span data-dcnode-id="4854" instrument_node="">“And who says that ambition-realized is at the expense of something else?” The US President, government, media and lots of Hollywood movies. Sorry, but striving for profit has been made to be a bad thing. It has been massively distorted. And with that goes ambition. “Big bad greedy business.” “Their profit means less for you.” “They take too much of the pie.” All lumped together and untrue.</span></p><span data-dcnode-id="4852" instrument_node="">
</span><p data-dcnode-id="4850"><span data-dcnode-id="4851" instrument_node="">People, in general, allow these statements to go unchallenged, so the uneducated media perpetuates these misconceptions. </span></p><span data-dcnode-id="4849" instrument_node="">
</span><p data-dcnode-id="4847"><span data-dcnode-id="4848" instrument_node="">Thankfully, Derek, you question these things. You are a thinker and a doer. Awesome and interesting!</span></p><span data-dcnode-id="4846" instrument_node="">

</span><p data-dcnode-id="4824"><span data-dcnode-id="4825" instrument_node="">In life and in business not everyone will always like what you do, your choice is to promote the people who do.</span></p><span data-dcnode-id="4823" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="4813" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/660f578f847818ca67a9f6d44544e782%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/660f578f847818ca67a9f6d44544e782?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="4812" instrument_node=""> </span><a class="reply-link" data-dcnode-id="4810" data-parent-id="53734" href="#"><span data-dcnode-id="4811" instrument_node="">Reply</span></a><span data-dcnode-id="4809" instrument_node="">

</span><b class="comment-author" data-dcnode-id="4804"><span data-dcnode-id="4805" instrument_node="">Pretty Fish</span></b><span data-dcnode-id="4803" instrument_node="">
</span><p data-dcnode-id="4801"><span data-dcnode-id="4802" instrument_node="">Wow there have been so many intelligent comments here already! </span></p><span data-dcnode-id="4800" instrument_node="">
</span><p data-dcnode-id="4798"><span data-dcnode-id="4799" instrument_node="">The word ‘ambition’ gives very mixed feelings, like the word ‘money’.</span></p><span data-dcnode-id="4797" instrument_node="">
</span><p data-dcnode-id="4795"><span data-dcnode-id="4796" instrument_node="">When people hate it, it is because it brings up feelings of fear, that there is not enough for everyone, that you have to cut others down to succeed. </span></p><span data-dcnode-id="4794" instrument_node="">
</span><p data-dcnode-id="4792"><span data-dcnode-id="4793" instrument_node="">To succeed, I believe it is to be your best self, and really believe in your own abilities and what you are about, and share it (art, or teaching people how to be fitter, or get more blog followers)… and people who have achieved it have faced a lot of their own fears and used them to learn more about what makes them feels good.</span></p><span data-dcnode-id="4791" instrument_node="">
</span><p data-dcnode-id="4789"><span data-dcnode-id="4790" instrument_node="">The ones who are afraid and hate ambition are the ones who are still feeling like someone owes them their success, or maybe are on the verge of recognizing that ambition is about striving and growing and expanding and improving and sharing AND caring…and that at times it does take a leap of faith.</span></p><span data-dcnode-id="4788" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="4778" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/462a3c26e0c9ecc0714429a2d1df2b8a%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/462a3c26e0c9ecc0714429a2d1df2b8a?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="4777" instrument_node=""> </span><a class="reply-link" data-dcnode-id="4775" data-parent-id="53732" href="#"><span data-dcnode-id="4776" instrument_node="">Reply</span></a><span data-dcnode-id="4774" instrument_node="">

</span><b class="comment-author" data-dcnode-id="4769"><span data-dcnode-id="4770" instrument_node="">Tavis Bucklin</span></b><span data-dcnode-id="4768" instrument_node="">
</span><p data-dcnode-id="4764"><span data-dcnode-id="4767" instrument_node="">I think there may be two parts to this.</span><br data-dcnode-id="4766"><span data-dcnode-id="4765" instrument_node="">
1. people who don’t “have” will often associate gain with greed. If your success brings you money, then your ambition must be driven by greed some how. This type of person will probably tell you that “money is the root of all evil”. How many time have you herd this miss quoted version of “The LOVE of money is the root of all evil”? ……..big difference in my opinion.</span></p><span data-dcnode-id="4763" instrument_node="">
</span><p data-dcnode-id="4759"><span data-dcnode-id="4762" instrument_node="">2. When someone shows ambition and drive to succeed, where does that leave the non-ambitions types? These people are the ones saying its not worth the effort. Of course they are….when you succeed they look like lazy fools. Ambition can bring accomplishment, fortune, happiness and a number of other great things. Things the nay-sayer feels are unreachable for them.</span><br data-dcnode-id="4761"><span data-dcnode-id="4760" instrument_node="">
It’s the simple principle of positive and negative energy. negative will always try to drag you down with it! Surround yourself with like minded positive individuals and you wont get those negative comments. 🙂</span></p><span data-dcnode-id="4758" instrument_node="">
</span><p data-dcnode-id="4754"><span data-dcnode-id="4757" instrument_node="">Regard,</span><br data-dcnode-id="4756"><span data-dcnode-id="4755" instrument_node="">
Tavis Bucklin</span></p><span data-dcnode-id="4753" instrument_node="">

</span><b class="comment-author" data-dcnode-id="4483"><span data-dcnode-id="4484" instrument_node="">James</span></b><span data-dcnode-id="4482" instrument_node="">
</span><p data-dcnode-id="4480"><span data-dcnode-id="4481" instrument_node="">I think some people are instantly intimidated by ambitious people. It is almost like they are afraid that it is “contagious”. The intimidated person instantly gets intimidated of the thought of becoming ambitious because it would not fit in their schedule. </span></p><span data-dcnode-id="4479" instrument_node="">
</span><p data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">Usually, when someone is ambitious they have to do many uncomfortable things at first. Most people do not like to do uncomfortable things. </span></p><span data-dcnode-id="4476" instrument_node="">
</span><p data-dcnode-id="4474"><span data-dcnode-id="4475" instrument_node="">Complacency with one’s life is the equivalent of putting your life in a puddle of quicksand, and this scares people.</span></p><span data-dcnode-id="4473" instrument_node="">
</span><p data-dcnode-id="4471"><span data-dcnode-id="4472" instrument_node="">People that are complacent know they should be doing more but they don’t want to be reminded by an “ambitious” person. Complacent people say that they often view ambitious people as “snooty.” But it really does not have anything to do with that at all. It is not even a culture shock to the ambitious person. </span></p><span data-dcnode-id="4470" instrument_node="">
</span><p data-dcnode-id="4468"><span data-dcnode-id="4469" instrument_node="">The ambitious person is just stirring a fire within the complacent person and the complacent person really does not have a desire to change.</span></p><span data-dcnode-id="4467" instrument_node="">

</span><p data-dcnode-id="4332"><span data-dcnode-id="4333" instrument_node="">I once commented on FB about something going right in my business (I can’t remember what it was now). Anyway, someone commented that “all I need is love” … I think that was pretty disapproving of ambition. I didn’t know what to say … ??</span></p><span data-dcnode-id="4331" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="4321" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/b952ffc8c88bd29e63bd24dbd4cf2583%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/b952ffc8c88bd29e63bd24dbd4cf2583?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="4320" instrument_node=""> </span><a class="reply-link" data-dcnode-id="4318" data-parent-id="53694" href="#"><span data-dcnode-id="4319" instrument_node="">Reply</span></a><span data-dcnode-id="4317" instrument_node="">

</span><b class="comment-author" data-dcnode-id="4312"><span data-dcnode-id="4313" instrument_node="">Tatiana</span></b><span data-dcnode-id="4311" instrument_node="">
</span><p data-dcnode-id="4309"><span data-dcnode-id="4310" instrument_node="">I feel a bit odd because there’s no definition for ambition given so I can make sure we’re all talking about the same thing. To me, ambition is the drive to do more with your life than whatever it is you’re doing now. Ambition is the opposite of complacency – you realize that there’s more to your world than what you deal with every single day. </span></p><span data-dcnode-id="4308" instrument_node="">
</span><p data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node="">So, in this context, I don’t think people *hate* ambition, anymore than they *hate* success. I think when you’re trying to better yourself and your life, people are regurgitating the same stories they’re told (and have been told since forever) about the possibilities in life. In fact, just last night my friend was telling me about how her mom encouraged her to put her dreams on the back burner (“like everyone else”) and just focus on getting a job so she can pay bills. </span></p><span data-dcnode-id="4305" instrument_node="">
</span><p data-dcnode-id="4303"><span data-dcnode-id="4304" instrument_node="">Ambition says that you’re unwilling to accept your life. That you’re angry and want to change it. Most people find ways to justify and explain their complacency.</span></p><span data-dcnode-id="4302" instrument_node="">
</span></div><span data-dcnode-id="4300" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="4292" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/a0a828f01fa43c61733f5f28f84f35d6%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/a0a828f01fa43c61733f5f28f84f35d6?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="4291" instrument_node=""> </span><a class="reply-link" data-dcnode-id="4289" data-parent-id="53693" href="#"><span data-dcnode-id="4290" instrument_node="">Reply</span></a><span data-dcnode-id="4288" instrument_node="">

</span><b class="comment-author" data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">Joel Alain</span></b><span data-dcnode-id="4282" instrument_node="">
</span><p data-dcnode-id="4280"><span data-dcnode-id="4281" instrument_node="">Urg. This happened to me just a week ago. I don’t know why i still bother to talk about my projects and ambition since almost 99% of people ask me “what’s wrong with me”. </span></p><span data-dcnode-id="4279" instrument_node="">
</span><p data-dcnode-id="4277"><span data-dcnode-id="4278" instrument_node="">When i say that i want to live the 4 hour work week and be millionaire in 12 months people always tell me that i won’t be more happy, etc and it drives me nuts because i then defend my point and say there is a LOT of thought process about my life and what i want and that im ALREADY happy &amp; money is just a goal. what motivate me is having goals pushing. If i wouldnt have crazy goals, then i might as well die because nothing else drives me. I need to push boundaries, and when i do so i am the happiest person on earth.</span></p><span data-dcnode-id="4276" instrument_node="">
</span><p data-dcnode-id="4274"><span data-dcnode-id="4275" instrument_node="">I wrote an article last week about that (why the lack of ambition is just plain stupid, not the reverse) and shared it with my friends and only 2 replied and the 4 others probably were mad about it (it’s a pretty direct text). Most people live their live with their head in the sand and taking it out and seeing what they’re missing is just too painful for them. They’d rather ignore it and wait to die since it’s easier and much less scary.</span></p><span data-dcnode-id="4273" instrument_node="">
</span><p data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">Anyway. For entrepreneurs, this is a subject that sucks since unless you have the immense chance of being surrounded by like-minded people and other crazy entrepreneurs, you’re pretty much alone and have to go toward your goals with zero encouraging.</span></p><span data-dcnode-id="4270" instrument_node="">
</span><p data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">joel</span></p><span data-dcnode-id="4267" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="4257" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/acb1e6a57793a9163bb9fd1483de141d%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/acb1e6a57793a9163bb9fd1483de141d?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="4256" instrument_node=""> </span><a class="reply-link" data-dcnode-id="4254" data-parent-id="53691" href="#"><span data-dcnode-id="4255" instrument_node="">Reply</span></a><span data-dcnode-id="4253" instrument_node="">

</span><b class="comment-author" data-dcnode-id="4248"><span data-dcnode-id="4249" instrument_node="">Mary Catherine George</span></b><span data-dcnode-id="4247" instrument_node="">
</span><p data-dcnode-id="4245"><span data-dcnode-id="4246" instrument_node="">Hey Derek! </span></p><span data-dcnode-id="4244" instrument_node="">
</span><p data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">Love that you are sharing about the topic of ambition!! For me, ambition can be the willingness to imagine ourselves as someone at a higher level in the future. Whatever it is, perceiving myself as thinner, healthier, richer, happier and on and on! Often I am derailed from this vision because the picture seems un-achievable (is that a word?) or I am not certain where to start – so the pursuit of my ambition/aspiration is left in the invisibility of my mind without an actionable date or plan. Fortunately, I have changed it with two simple steps 1) what can I easily measure that will move me in the direction of what I desire? 2) what is the smallest step that I can take today? I used to think I needed chunks of time, or money or whatever!! Now, I realize it really is in the small stuff, I can get a lot done. Also, seeking out helpers along the way who can keep you accountable or moving forward definitely is key. I started a master mind group with 3 other women, and listed the 4 most important creative projects I wanted to have legs. I am so, so happy that the app is in development, the book is on the third chapter AND the podcast will be launched in the first quarter of 2014. PLUS, I am finishing my PhD in June of 2014. ALL of these aspirations/ambitious ideas and desires are happening slowly, small step by small step and I am tracking each one with a simple spreadsheet with time windows. Thank you so much for continuing to inspire and move us all forward toward our ambitious dreams and desires. </span></p><span data-dcnode-id="4241" instrument_node="">
</span><p data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">MC</span></p><span data-dcnode-id="4238" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="4228" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/94dca9a0fcaa806ff6a31ab8da762926%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/94dca9a0fcaa806ff6a31ab8da762926?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="4227" instrument_node=""> </span><a class="reply-link" data-dcnode-id="4225" data-parent-id="53689" href="#"><span data-dcnode-id="4226" instrument_node="">Reply</span></a><span data-dcnode-id="4224" instrument_node="">

</span><b class="comment-author" data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">Peg McMahan</span></b><span data-dcnode-id="4218" instrument_node="">
</span><p data-dcnode-id="4216"><span data-dcnode-id="4217" instrument_node="">Why do people hate ambition? </span></p><span data-dcnode-id="4215" instrument_node="">
</span><p data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">Some people are born to lead. They are born to be masterful business people. They are born to be exceptionally good at coaching and mentoring. They are driven to succeed because that’s what’s on their master plan.</span></p><span data-dcnode-id="4212" instrument_node="">
</span><p data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node="">People who hate ambition could be the ones who were set up to be super successful on the master path, but are still plodding along on the student path. Jealousy and envy come into play when they see someone who has what they want. </span></p><span data-dcnode-id="4209" instrument_node="">
</span><p data-dcnode-id="4207"><span data-dcnode-id="4208" instrument_node="">People who hate ambition may be those whose main focus is family and community life. If the ambitious one is working solely for self, the group feels uncared for. For example, Jim says, “My dad’s focus was on his job. He brought in lots of money and we had a nice lifestyle, but I sure would have liked playing ball with him on weekends instead of him going to work.” </span></p><span data-dcnode-id="4206" instrument_node="">
</span><p data-dcnode-id="4204"><span data-dcnode-id="4205" instrument_node="">Sometimes people just want to hate something. Ambition as a character trait is handy to hate.</span></p><span data-dcnode-id="4203" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="4193" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/0469aab806282ee538488480de914de9%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/0469aab806282ee538488480de914de9?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="4192" instrument_node=""> </span><a class="reply-link" data-dcnode-id="4190" data-parent-id="53688" href="#"><span data-dcnode-id="4191" instrument_node="">Reply</span></a><span data-dcnode-id="4189" instrument_node="">

</span><b class="comment-author" data-dcnode-id="4184"><span data-dcnode-id="4185" instrument_node="">Mike</span></b><span data-dcnode-id="4183" instrument_node="">
</span><p data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">I’ve experienced envy and even hatred towards me when I’ve shown other people my ambition, and it’s tended to be the people who have none themselves.</span></p><span data-dcnode-id="4180" instrument_node="">
</span><p data-dcnode-id="4178"><span data-dcnode-id="4179" instrument_node="">I have since learnt to mostly keep my ambitions to myself and simply get on with it and only tell people who I know are at least a little bit ambitious themselves.</span></p><span data-dcnode-id="4177" instrument_node="">
</span><p data-dcnode-id="4175"><span data-dcnode-id="4176" instrument_node="">A current and ongoing example is that I really enjoy weight lifting, and specifically heavy weights at that. My goal is to get as close to being a top ‘professional’ powerlifter as I can, without actually going professional.</span></p><span data-dcnode-id="4174" instrument_node="">
</span><p data-dcnode-id="4172"><span data-dcnode-id="4173" instrument_node="">This means that I spend a lot of time exercising, which has to be fitted in around my day job (on a farm) and a small business I run in the evenings and weekends. </span></p><span data-dcnode-id="4171" instrument_node="">
</span><p data-dcnode-id="4169"><span data-dcnode-id="4170" instrument_node="">I eat healthy, and I am constantly doing things to enhance my health – all with the aim of reaching my goal/ambition, which btw I am probably about 2-3 years away from, having been lifting for about 6-7 years now.</span></p><span data-dcnode-id="4168" instrument_node="">
</span><p data-dcnode-id="4166"><span data-dcnode-id="4167" instrument_node="">I constantly get envious and hate-filled remarks about my appearance or dedication/ambition from friends, friends of friends, and sometimes even family too.</span></p><span data-dcnode-id="4165" instrument_node="">
</span><p data-dcnode-id="4163"><span data-dcnode-id="4164" instrument_node="">I get comments about the way I look – which is pretty muscly for my size, and this is from fat or skinny people.</span></p><span data-dcnode-id="4162" instrument_node="">
</span><p data-dcnode-id="4160"><span data-dcnode-id="4161" instrument_node="">I also get comments about exercising on friday nights or weekends, instead of going down the pub or club with friends – the same friends who look like shit on a Monday morning, and rest of the week come to think of it, and don’t seem to care about their current or future health.</span></p><span data-dcnode-id="4159" instrument_node="">
</span><p data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">The list goes on and on, and it has done for pretty much the entire 6-7 years I have been lifting weights.</span></p><span data-dcnode-id="4156" instrument_node="">
</span><p data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">I’ve gotten used to it now, and most times I laugh it off. It does help that the last year especially I have been able to find a couple of other people who are as ambitious/dedicated to lifting weights as I am, but we are certainly in the minority.</span></p><span data-dcnode-id="4153" instrument_node="">
</span><p data-dcnode-id="4151"><span data-dcnode-id="4152" instrument_node="">What annoys me the most is that all I am doing is keeping myself fit and healthy, working towards a long time goal/ambition of mine, and most of all enjoying myself along the way.</span></p><span data-dcnode-id="4150" instrument_node="">
</span><p data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">I just don’t get why people feel the need to knock others for doing things that they aren’t willing to do themselves.</span></p><span data-dcnode-id="4147" instrument_node="">
</span><p data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">—-</span></p><span data-dcnode-id="4144" instrument_node="">
</span><p data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node="">Sorry about that, turned out a tad longer than I thought it would, kind of just fell out of my mouth!</span></p><span data-dcnode-id="4141" instrument_node="">
</span><p data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node="">Cheers</span></p><span data-dcnode-id="4138" instrument_node="">
</span><p data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">Mike</span></p><span data-dcnode-id="4135" instrument_node="">

</span><b class="comment-author" data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">Taleen</span></b><span data-dcnode-id="3966" instrument_node="">
</span><p data-dcnode-id="3964"><span data-dcnode-id="3965" instrument_node="">I genuinely agree with slit of the respondents.</span></p><span data-dcnode-id="3963" instrument_node="">
</span><p data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">Ambition is something people envy because they don’t have it themselves. It’s derived from many things, the environment you grew up in, people who surround you and even things that inspire you. Some people are content with the bare minimum, and that’s ok! Others like to give 1000% and that’s the ambition that kicks in.</span></p><span data-dcnode-id="3960" instrument_node="">
</span><p data-dcnode-id="3958"><span data-dcnode-id="3959" instrument_node="">I’ve had first hand experience with this. I moved to LA from Sydney Australia and launched my own business here. It was important to start fresh because the friends and family that surrounded me looked at me as if I were an alien because I was so ambitious at a young age. </span></p><span data-dcnode-id="3957" instrument_node="">
</span><p data-dcnode-id="3955"><span data-dcnode-id="3956" instrument_node="">Was I driving the ambition or was it driving me? Who knows!! But I wasn’t delirious about my goals. I’ve lived a well balanced life and been able to do so whilst securing a future for myself and I can thank ambition for that.</span></p><span data-dcnode-id="3954" instrument_node="">
</span><p data-dcnode-id="3952"><span data-dcnode-id="3953" instrument_node="">Do we “ambitious people” sometimes stare disapprovingly at the “non ambitious”??? Absolutely!! Because we are quick to disapprove of things we don’t understand. I’ve been taught to be ambition and settle for nothing less, maybe others have not been so fortunate?</span></p><span data-dcnode-id="3951" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="3941" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/a91d5ce7c85afb21dd54bae21f4d14f3%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/a91d5ce7c85afb21dd54bae21f4d14f3?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="3940" instrument_node=""> </span><a class="reply-link" data-dcnode-id="3938" data-parent-id="53670" href="#"><span data-dcnode-id="3939" instrument_node="">Reply</span></a><span data-dcnode-id="3937" instrument_node="">
