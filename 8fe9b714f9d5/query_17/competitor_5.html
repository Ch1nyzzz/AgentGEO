</span><h1 class="title" data-dcnode-id="7829"><span data-dcnode-id="7834" instrument_node="">Why do people hate ambition?</span><br data-dcnode-id="7833"><span data-dcnode-id="7832" instrument_node="">
</span><span data-dcnode-id="7830" style="font-size:30%;"><span data-dcnode-id="7831" instrument_node="">Last Updated November 14th, 2013</span></span></h1><span data-dcnode-id="7828" instrument_node="">
</span><div class="article-content" data-dcnode-id="7784"><span data-dcnode-id="7827" instrument_node="">
</span><div class="content" data-dcnode-id="7786"><span data-dcnode-id="7826" instrument_node="">
</span><div class="at-above-post addthis_tool" data-dcnode-id="7825" data-url="https://socialtriggers.com/why-do-people-hate-ambition/"></div><p data-dcnode-id="7823"><span data-dcnode-id="7824" instrument_node="">Whenever you talk about ambition, there are always some people who will look upon you disapprovingly and say, “There’s more to life than…”</span></p><span data-dcnode-id="7822" instrument_node="">
</span><p data-dcnode-id="7820"><span data-dcnode-id="7821" instrument_node="">Why do people do that? </span></p><span data-dcnode-id="7819" instrument_node="">
</span><p data-dcnode-id="7817"><span data-dcnode-id="7818" instrument_node="">And am I the only one who wants to stare disapprovingly back at them?</span></p><span data-dcnode-id="7816" instrument_node="">
</span><p data-dcnode-id="7814"><span data-dcnode-id="7815" instrument_node="">Is there anything wrong with wanting to get ahead in business and life?</span></p><span data-dcnode-id="7813" instrument_node="">
</span><p data-dcnode-id="7811"><span data-dcnode-id="7812" instrument_node="">And who says that ambition-realized is at the expense of something else?</span></p><span data-dcnode-id="7810" instrument_node="">
</span><p data-dcnode-id="7808"><span data-dcnode-id="7809" id="more-4844"></span></p><span data-dcnode-id="7807" instrument_node="">
</span><p data-dcnode-id="7805"><span data-dcnode-id="7806" instrument_node="">I’d love to hear what you think. </span></p><span data-dcnode-id="7804" instrument_node="">
</span><p data-dcnode-id="7802"><span data-dcnode-id="7803" instrument_node="">Leave a comment right here.</span></p><span data-dcnode-id="7801" instrument_node="">
</span><p data-dcnode-id="7796"><span data-dcnode-id="7800" instrument_node="">Or </span><a data-dcnode-id="7798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//socialtriggers.com/contact/" target="_blank" title="Send me an email"><span data-dcnode-id="7799" instrument_node="">send me an email</span></a><span data-dcnode-id="7797" instrument_node="">. </span></p><span data-dcnode-id="7795" instrument_node="">
</span><p data-dcnode-id="7793"><span data-dcnode-id="7794" instrument_node="">Today I ask this question because I’m curious how YOU feel about ambition. I know how I feel, but I’m curious about you.</span></p><span data-dcnode-id="7792" instrument_node="">

</span><p data-dcnode-id="7631"><span data-dcnode-id="7632" instrument_node="">Because people are all a bunch of scared, whining, moaning little bitches. It seems to be human nature to be miserable, the brain cannot accept happiness. Hence we kill, maim, burn at the stake, torture, and do our best to control our shitty environment. Even though control is a joke, and we as a species, inherently know that. There is no advanced alien race that is coming to visit us for at least another 1,000 years. We are still barely out of the jungle as a species. A hundred years from now society is going to look back and be aghast at how primitive our current society is, much like we look at medieval reality and think they lived in the dark ages. Just think…in our current society people still die from cancer. Especially if they can’t afford the treatment. Can you believe that future human? People actually died from cancer because they didn’t have money? We can just take a pill for that now. Wow future human…can you believe that in the early 2000’s they had to physically transport themselves places? Can you imagine how long it would have taken to get to your destination? Thank god for the teleporter. I’m going to Europe tomorrow, it’s going to take like 5 whole minutes to get there, but I will still be back before lunch. Wow….future human…can you believe they in the early 2000’s most people still had to drive into a job every morning and go home every night? Regardless of the weather conditions? Was that the best system they could think of? Thank god we don’t have to live like that! </span></p><span data-dcnode-id="7630" instrument_node="">
</span><p data-dcnode-id="7628"><span data-dcnode-id="7629" instrument_node="">And so on and so forth….</span></p><span data-dcnode-id="7627" instrument_node="">
</span><p data-dcnode-id="7625"><span data-dcnode-id="7626" instrument_node="">Wake up present humans…stop being so afraid of progress and change…the world isn’t going to slow down because you are scared. And there are so many better ways of doing things. Our current systems suck to the extreme.</span></p><span data-dcnode-id="7624" instrument_node="">

</span><p data-dcnode-id="7602"><span data-dcnode-id="7603" instrument_node="">I can honestly say that growing up I was one of those people using “there’s more to life then” as an excuse to hide behind not going for what I want. This article is a great eye opener. ✨</span></p><span data-dcnode-id="7601" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="7591" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/dab9adc92b0d396d01cd875209166670%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/dab9adc92b0d396d01cd875209166670?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="7590" instrument_node=""> </span><a class="reply-link" data-dcnode-id="7588" data-parent-id="361329" href="#"><span data-dcnode-id="7589" instrument_node="">Reply</span></a><span data-dcnode-id="7587" instrument_node="">

</span><b class="comment-author" data-dcnode-id="7582"><span data-dcnode-id="7583" instrument_node="">Robert</span></b><span data-dcnode-id="7581" instrument_node="">
</span><p data-dcnode-id="7579"><span data-dcnode-id="7580" instrument_node="">Stop thinking of things as being absolutely ‘right’ or ‘wrong’. You need to do what is right for you. The key is to know who to share your ambitions with and who not to. For example, if you are planning to start a business in your 50’s, don’t share your plans with someone who hates working and is counting the days to retirement, and expect them to encourage you. Surround yourself with like-minded people, and be supportive. Also, don’t rely on validation for your ambitions and your choices in life. They are yours, so only you need to approve them. What you ‘give up’ along the way may be something of great importance to someone else. For example, some people choose not to marry or have kids, in order to pursue a career. Others might not be willing to do that. Good for them, and as long as they are happy, that’s all that matters. It isn’t for you or anyone else to judge. Success and fulfillment is about achieving YOUR ambitions, not someone else’s.</span></p><span data-dcnode-id="7578" instrument_node="">

</span><b class="comment-author" data-dcnode-id="7509"><span data-dcnode-id="7510" instrument_node="">angela</span></b><span data-dcnode-id="7508" instrument_node="">
</span><p data-dcnode-id="7506"><span data-dcnode-id="7507" instrument_node="">Ambitious. Reminds me of 2 kinds of scenarios. The one where people cringe saying,”Well that’s an ambitious undertaking!” and the other where it conveys approval and support for the ‘undertaker’. I think in the latter, it is simple, in that these people are energized by the example of industriousness, ingenuity, and productivity. This may seem positive, by the satisfying feedback received, however they may just be leeching off of your momentum, which is fine if it inspires them somehow, but be careful they don’t assume they will coat tail. The prior seem to be people who think they have a better grasp at the ‘resource to endeavor requirement’ ratio than the ambitious one, but remember that only you can be you and while they may be pessimistic about how realistic the endeavor is, they probably don’t mean to be a stumbling block. Still there are others who absolutely do mean to disway others from successes. Use your own discernment to size up their motive. Before you share your ambitions, it is important to let people know whether you seek encouragement, support, and/or advice. Also know your audience’s tendency. Some people are just inclined to weigh in as if you’ve asked for their permission to set these goals, but they aren’t necessarily superior. NOW, on the other end of the spectrum, I found your question looking up reasons for why people become so angry and sometimes bully or make demands and requests (often unrealistic expectations), when someone else is relaxing or has some ‘time off’ which may not be from their employment per se, but from whatever their personal goals, struggles and life demands are. As though others feel that everyone’s time and effort is at their disposal, unless an employer has dibs right that minute. My OPINION is that no one should be shunned for being ambitious in their endeavors nor for taking time to breathe and rest and look upon life to appreciate and enjoy accomplishments and set new ones or just depart that harbor completely to go enjoy the works of others and of the Creator.</span></p><span data-dcnode-id="7505" instrument_node="">

Ambition is like a mirror of your soul. What you feed it, it gives it you back ten folds. Having a selfish ambition makes you suffer from vanity and emptiness. Having a benevolent and charitiesque ambition makes you happy and alive.</span><br data-dcnode-id="7479"><span data-dcnode-id="7478" instrument_node="">
Besides, some people have ambitions that other people fail to notice and call them unambitious (or usually lazy).</span></p><span data-dcnode-id="7476" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="7466" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/7e9d37153f8c5c0ebc155ed6bfbf61b0%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/7e9d37153f8c5c0ebc155ed6bfbf61b0?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="7465" instrument_node=""> </span><a class="reply-link" data-dcnode-id="7463" data-parent-id="360233" href="#"><span data-dcnode-id="7464" instrument_node="">Reply</span></a><span data-dcnode-id="7462" instrument_node="">

</span><b class="comment-author" data-dcnode-id="7457"><span data-dcnode-id="7458" instrument_node="">Wade</span></b><span data-dcnode-id="7456" instrument_node="">
</span><p data-dcnode-id="7454"><span data-dcnode-id="7455" instrument_node="">I have always worked long hours. For some reason the slackers hate me for it. I can’t help it. It is just the way I am wired. I enjoy what I do and I do it well. </span></p><span data-dcnode-id="7453" instrument_node="">
</span><p data-dcnode-id="7451"><span data-dcnode-id="7452" instrument_node="">I used to work as an employee in a small company. I took up most of the slack and did the dirty jobs that no one else wanted to do. The other employees didn’t like it but the worst part was when the owners of the company took notice of my work ethic and started comparing the manager to me. That is where the problem started. The manager then started bullying me and I finally left the company and started my own business in competition to theirs. </span></p><span data-dcnode-id="7450" instrument_node="">
</span><p data-dcnode-id="7448"><span data-dcnode-id="7449" instrument_node="">This past year I was approached by another competitor and they hired me to run their business. I still have my competing business in a different location. My problem is now my employees. My main employee is starting to resent me for my work ethic. I don’t expect him to work weekends or a lot of overtime but when I work the weekend he gets upset. I’m the boss. I should be able to work as I feel fit. </span></p><span data-dcnode-id="7447" instrument_node="">
</span><p data-dcnode-id="7445"><span data-dcnode-id="7446" instrument_node="">It has taken me 25 years but I am finally starting to figure out that people in general don’t want anyone else to outdo them.</span></p><span data-dcnode-id="7444" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="7225" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/7515f3f23c684cad6ad88fed44aeb3bd%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/7515f3f23c684cad6ad88fed44aeb3bd?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="7224" instrument_node=""> </span><a class="reply-link" data-dcnode-id="7222" data-parent-id="355447" href="#"><span data-dcnode-id="7223" instrument_node="">Reply</span></a><span data-dcnode-id="7221" instrument_node="">

</span><b class="comment-author" data-dcnode-id="7216"><span data-dcnode-id="7217" instrument_node="">Meesha West</span></b><span data-dcnode-id="7215" instrument_node="">
</span><p data-dcnode-id="7213"><span data-dcnode-id="7214" instrument_node="">People can be petty and jealous. </span></p><span data-dcnode-id="7212" instrument_node="">
</span><p data-dcnode-id="7210"><span data-dcnode-id="7211" instrument_node="">I’m not an ambitious person — although I have a white collar job that provides sufficiently. But my whole life I have enjoyed making things as awesome as possible, haha. I just like taking things to the next level. Growing up my teachers would always put my work on display, or show the other kids and tell them that ‘This is what an A looks like.’ In my career, I have had some bumpy times due to older men who were threatened by my work (I am a relatively young woman). That was hard, feeling like I had to fight to get the more interesting work. I finally “settled” for a very small company. My boss loves my work and it is a decent life. I do remember people along the way, even siblings and friends, who told me to my face that I made it look so easy they often hoped I would fail. That was hard to digest as well, especially since I wasn’t after the grade or the status or the money. I just enjoyed making stuff as well as I could. I am not successful by any means, and it really is too bad that there were people in my life actively working against me, who were also the people who said they loved me. I was surprised when they told me this because I always thought my friends and family were so physically beautiful and I assumed I was the nerdy not-so-attractive black sheep of the group. I suppose that’s why I liked school and work so much.</span></p><span data-dcnode-id="7209" instrument_node="">
</span><p data-dcnode-id="7205"><span data-dcnode-id="7208" instrument_node="">But I can understand the saying “Ambition isn’t everything.” Or “Money isn’t everything.” I think when people say that ambition isn’t everything, what they mean to say is that status isn’t everything. Someone can have high status and salaries, but be terrible for society. For example, the inventor of Doom, a successful violent shooting computer game. Compare his income and success to a successful teacher. A really good teacher will RARELY make much money or end up on the cover of “Youngest Millionaires of 2015.” But an amazing teacher can positively influence countless lives.</span><br data-dcnode-id="7207"><span data-dcnode-id="7206" instrument_node="">
Nothing wrong with ambition. What people mean is that status isn’t everything. Our capatilist culture can’t effectively put a price tag on everything. For example, love is free and effectively status free, but without love we would be robots.</span></p><span data-dcnode-id="7204" instrument_node="">

</span><p data-dcnode-id="7157"><span data-dcnode-id="7158" instrument_node="">I think ambition is awesome IF it’s to 1) Create value for others and 2) Fulfill your purpose in life.</span></p><span data-dcnode-id="7156" instrument_node="">
</span><p data-dcnode-id="7151"><span data-dcnode-id="7155" instrument_node="">Ambition challenges the comfort zones of an individual’s association. I’m reminded of a Darren Hardy article “Entrepreneurs Are Not Normal” and his crab analogy </span><a data-dcnode-id="7153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.success.com/article/entrepreneurs-are-not-normal" rel="nofollow"><span data-dcnode-id="7154" instrument_node="">http://www.success.com/article/entrepreneurs-are-not-normal</span></a><span data-dcnode-id="7152" instrument_node="">. In my experience, whenever I’ve decided to change or transform some aspect of my life, I’ve found that people are either negative naysayers, supporters, or inspired and moved to action. I would much rather spend time with the latter.</span></p><span data-dcnode-id="7150" instrument_node="">
</span><p data-dcnode-id="7148"><span data-dcnode-id="7149" instrument_node="">What drives ambition is relative. But it can be AWESOME.</span></p><span data-dcnode-id="7147" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="7091" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/113529dd69ef0ee921c060841d4fc459%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/113529dd69ef0ee921c060841d4fc459?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="7090" instrument_node=""> </span><a class="reply-link" data-dcnode-id="7088" data-parent-id="267468" href="#"><span data-dcnode-id="7089" instrument_node="">Reply</span></a><span data-dcnode-id="7087" instrument_node="">

</span><b class="comment-author" data-dcnode-id="7082"><span data-dcnode-id="7083" instrument_node="">J</span></b><span data-dcnode-id="7081" instrument_node="">
</span><p data-dcnode-id="7079"><span data-dcnode-id="7080" instrument_node="">I feel that there are two different types of ambitious people in the world:</span></p><span data-dcnode-id="7078" instrument_node="">
</span><p data-dcnode-id="7076"><span data-dcnode-id="7077" instrument_node="">A) Those who strive for a vain superiority over others e.g. the person who kisses ass to get a job promotion</span></p><span data-dcnode-id="7075" instrument_node="">
</span><p data-dcnode-id="7073"><span data-dcnode-id="7074" instrument_node="">B) Those who want to fulfil a dream, those who want to improve themselves or improve the world. e.g. the person who works really hard at a job he is passionate about and sets hard challenges for himself to complete.</span></p><span data-dcnode-id="7072" instrument_node="">
</span><p data-dcnode-id="7070"><span data-dcnode-id="7071" instrument_node="">Category A people are supercilious, sycophantic, self centred, jealous, arrogant and generally nasty people.</span></p><span data-dcnode-id="7069" instrument_node="">
</span><p data-dcnode-id="7067"><span data-dcnode-id="7068" instrument_node="">Category B people are self aware, self centred, respectful of others, humble and generally nice people.</span></p><span data-dcnode-id="7066" instrument_node="">
</span><p data-dcnode-id="7064"><span data-dcnode-id="7065" instrument_node="">Unfortunately the world tends to reward category A people with attention, rewards, money etc while the category B person is accused as having no ambition, or as just being very stupid.</span></p><span data-dcnode-id="7063" instrument_node="">
</span><p data-dcnode-id="7061"><span data-dcnode-id="7062" instrument_node="">The main difference between A and B is that B has an internal sense of what matters to them. They are self assured. I’m not saying that cat B people are stoic islands that need no reassurance, but they do not NEED reassurance. </span></p><span data-dcnode-id="7060" instrument_node="">
</span><p data-dcnode-id="7058"><span data-dcnode-id="7059" instrument_node="">To be more cat B, find out where you want to deevlop in your life, work, social, passions whatever, and go and do what is most important to you. You will have a happier more fulfilling life. That is all</span></p><span data-dcnode-id="7057" instrument_node="">
</span></div><span data-dcnode-id="7055" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="6947" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/04e9b602460bc3a8f09af5d582a356d4%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/04e9b602460bc3a8f09af5d582a356d4?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="6946" instrument_node=""> </span><a class="reply-link" data-dcnode-id="6944" data-parent-id="74752" href="#"><span data-dcnode-id="6945" instrument_node="">Reply</span></a><span data-dcnode-id="6943" instrument_node="">

</span><b class="comment-author" data-dcnode-id="6938"><span data-dcnode-id="6939" instrument_node="">Megan Carter</span></b><span data-dcnode-id="6937" instrument_node="">
</span><p data-dcnode-id="6935"><span data-dcnode-id="6936" instrument_node="">Ambition; it is what pushes us to chase our dreams, it is the reason we get out of bed in the morning, it is the driving force propelling us toward success and productivity. Ambition is that fire inside of us, fueling us to fulfill a purposeful life and driving us to make and reach goals. Ambition is a great contributor to society. Without it, there would be no advancement in any field of study, no personal accomplishment, and certainly no purposeful life to live. With this being said, ambition is necessary for a fulfilling and accomplished life.</span></p><span data-dcnode-id="6934" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="6923" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/a01fcf4e670369aa1e07ca55584a2724%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/a01fcf4e670369aa1e07ca55584a2724?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="6922" instrument_node=""> </span><a class="reply-link" data-dcnode-id="6920" data-parent-id="88316" href="#"><span data-dcnode-id="6921" instrument_node="">Reply</span></a><span data-dcnode-id="6919" instrument_node="">

</span><div class="col-xs-10 col-md-8" data-dcnode-id="6897"><span data-dcnode-id="6916" instrument_node="">
</span><b class="comment-author" data-dcnode-id="6914"><span data-dcnode-id="6915" instrument_node="">C West</span></b><span data-dcnode-id="6913" instrument_node="">
</span><p data-dcnode-id="6911"><span data-dcnode-id="6912" instrument_node="">As somebody who doesn’t have much ambition other than to be a good friend, partner, family member and decent human being (not bad as far as ambitions go), I find the way Western society is *far* more geared to reward the ambitious. Someone who “lack’s ambition”, usually to work or make money, is almost always seen negatively, whereas the “just do it” “no pain, no gain” “go for it” mentality has, for probably economic reasons, become pitched as ‘desirable’. </span></p><span data-dcnode-id="6910" instrument_node="">
</span><p data-dcnode-id="6908"><span data-dcnode-id="6909" instrument_node="">Some people without (work/money) ambition can be comfortable, at ease with themselves and have a balanced, fulfilling perspective with what constitutes health and happiness just as some “ambitious” people can just be filling their lives up with distraction, clutter and noise — anything to stop them just really being with themselves.</span></p><span data-dcnode-id="6907" instrument_node="">
</span><p data-dcnode-id="6905"><span data-dcnode-id="6906" instrument_node="">My partner is a teacher and loves nothing more than to teach — I respect that completely. I’m an intelligent, compassionate human who has no interest in work, jobs or money. He respects that completely. </span></p><span data-dcnode-id="6904" instrument_node="">
</span><p data-dcnode-id="6902"><span data-dcnode-id="6903" instrument_node="">People are different, we’re all dots running round a planet living beautiful, complex, ridiculous lives, probably for no reason — and that’s okay.</span></p><span data-dcnode-id="6901" instrument_node="">
</span><p data-dcnode-id="6899"><span data-dcnode-id="6900" instrument_node="">To quote RuPaul: “We were born naked — the rest is just drag”.</span></p><span data-dcnode-id="6898" instrument_node="">

</span><p data-dcnode-id="6875"><span data-dcnode-id="6876" instrument_node="">I think you did have an ambition and you achieved it didn’t you? Not to work, not to have to be bothered with anything other than being a ‘nice person’. But, and its a big but, you had to find a hard working nice person to keep you, feed you and allow you to opt out of responsibilities. You are not unambitious. You are basicly lazy.</span></p><span data-dcnode-id="6874" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="6860" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/d30364dc3a15cfd02698b7f34bd74282%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/d30364dc3a15cfd02698b7f34bd74282?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="6859" instrument_node=""> </span><a class="reply-link" data-dcnode-id="6857" data-parent-id="59844" href="#"><span data-dcnode-id="6858" instrument_node="">Reply</span></a><span data-dcnode-id="6856" instrument_node="">

</span><div class="col-xs-10" data-dcnode-id="6837"><span data-dcnode-id="6853" instrument_node="">
</span><b class="comment-author" data-dcnode-id="6851"><span data-dcnode-id="6852" instrument_node="">Greg Vinson</span></b><span data-dcnode-id="6850" instrument_node="">
</span><p data-dcnode-id="6848"><span data-dcnode-id="6849" instrument_node="">Ambition can mean many different things, and if people hate it (I’m not convinced most people do, as a general concept), it is probably because they are thinking of negative examples of what ambitious people do. The upside is amazing and wonderful, but the downside is horrible beyond our wildest nightmares. </span></p><span data-dcnode-id="6847" instrument_node="">
</span><p data-dcnode-id="6845"><span data-dcnode-id="6846" instrument_node=""> I don’t think ambition is any better or worse than ego. Everyone needs an ego to survive, and ambition to accomplish anything noteworthy, but some egos and some ambitions create very serious problems. </span></p><span data-dcnode-id="6844" instrument_node="">
</span><p data-dcnode-id="6842"><span data-dcnode-id="6843" instrument_node=""> Ambition, combined with energy, makes all human activity possible. Which means all great works of art, and all great humanitarians were fueled by it. So is the arms race, terrorism, greenhouse gases. </span></p><span data-dcnode-id="6841" instrument_node="">
</span><p data-dcnode-id="6839"><span data-dcnode-id="6840" instrument_node=""> The fact that we have modern conveniences is a result of ambition. So is the fact that everybody walks around with toxic chemicals in their bodies that didn’t exist 100 years ago, and kelp in California now is heavily contaminated with radioactive contamination from Fukushima, which is still not under control. It’s a mixed bag, we need it, but we are victims of our own cleverness and ambition. Our species probably won’t survive through the century, as painful as that is to face. But if we start being ambitious enough on behalf of future people, rather than in the service of our own greed, perhaps we can find a way.</span></p><span data-dcnode-id="6838" instrument_node="">
</span></div><span data-dcnode-id="6836" instrument_node="">
</span></div><span data-dcnode-id="6834" instrument_node="">

</span><div class="col-xs-2 avatar-col" data-dcnode-id="6823"><span data-dcnode-id="6829" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="6828" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/6028b0b476e5b14623a4e76e56132f67%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/6028b0b476e5b14623a4e76e56132f67?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="6827" instrument_node=""> </span><a class="reply-link" data-dcnode-id="6825" data-parent-id="59758" href="#"><span data-dcnode-id="6826" instrument_node="">Reply</span></a><span data-dcnode-id="6824" instrument_node="">

</span><div class="col-xs-10" data-dcnode-id="6805"><span data-dcnode-id="6821" instrument_node="">
</span><b class="comment-author" data-dcnode-id="6819"><span data-dcnode-id="6820" instrument_node="">Darren</span></b><span data-dcnode-id="6818" instrument_node="">
</span><p data-dcnode-id="6816"><span data-dcnode-id="6817" instrument_node="">When I was unemployed the welfare officers always rolled their eyes or made sarcastic remarks when I described my business ambitions. They would say things like “why don’t you get a job, what is the point in starting a business, how much have you made so far?”.</span></p><span data-dcnode-id="6815" instrument_node="">
</span><p data-dcnode-id="6813"><span data-dcnode-id="6814" instrument_node="">Those individuals were clearly not happy working their mediocre bureaucratic office job. It got to a point where the conversation became hostile and confrontational. I believe people like that are depressed because they do not have the guts to try anything worth while themselves. </span></p><span data-dcnode-id="6812" instrument_node="">
</span><p data-dcnode-id="6810"><span data-dcnode-id="6811" instrument_node="">They have allowed themselves to get their hopes up in the past and have failed, but the failure has made them BITTER instead of BETTER. People like this love to see others die trying because it reassures them that their own stationary position in the world is justified. People who do not move at all are in fact going backwards because the rest of society flows past them, like a river and a trapped log.</span></p><span data-dcnode-id="6809" instrument_node="">
</span><p data-dcnode-id="6807"><span data-dcnode-id="6808" instrument_node="">I have tolerated many types like this and it is all jealousy and bitterness. By succeeding you are holding a mirror to their failures. If only they would realise a certain amount of failure is a given perhaps they would face their fears and do something worthwhile too?</span></p><span data-dcnode-id="6806" instrument_node="">
</span></div><span data-dcnode-id="6804" instrument_node="">

</span><p data-dcnode-id="6784"><span data-dcnode-id="6785" instrument_node="">I would say, it is more of understanding. The level of understanding differ from people to people. When you are operating at a higher level of thoughts and dreams and the other person is still struggling with knowing what they really want out of life, there is bound to be a ‘disapproval’ of your visions, until they are at par with you thought wise.</span></p><span data-dcnode-id="6783" instrument_node="">

</span><p data-dcnode-id="6753"><span data-dcnode-id="6762" instrument_node="">I think people hate being asked about ambition is that they haven’t thought, discussed or really defined an “answer” about it seriously/maturely like I had not until now.</span><br data-dcnode-id="6761"><span data-dcnode-id="6760" instrument_node="">
Ambition is desire which if attained can lead to a blissful, peaceful and relaxing state of mind of the person. Its like feeling of drinking hard found water in hot summer in a desert.</span><br data-dcnode-id="6759"><span data-dcnode-id="6758" instrument_node="">
Ambition is different for different persons. Example of these different persons can be taken form extreme personalities in scientists, social workers, artists , business persons.</span><br data-dcnode-id="6757"><span data-dcnode-id="6756" instrument_node="">
There are three groups in ideal sense which are cause of “An Ambition” which is actually mine. These are Myself, My family or the other common people.</span><br data-dcnode-id="6755"><span data-dcnode-id="6754" instrument_node="">
Example of Ambition for other people is Mother Teresa, Mahatma Gandhi. Example of Ambition from family is, of a child lived in a poor family pledges to eradicate miseries of his home. Ambition from self is by, say curious researcher wanting to explore the mysteries of nature. So Ambition is not just the successful career, its beyond this. Its the happiness we get from our Ambition. The happiness which can stay with us for a longer amount of time without any fear. One can not decide his/her Ambition. It has to be recognized.</span></p><span data-dcnode-id="6752" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="6742" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/2f5fd77326ce35c34119a536a119c245%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/2f5fd77326ce35c34119a536a119c245?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="6741" instrument_node=""> </span><a class="reply-link" data-dcnode-id="6739" data-parent-id="56680" href="#"><span data-dcnode-id="6740" instrument_node="">Reply</span></a><span data-dcnode-id="6738" instrument_node="">

</span><div class="col-xs-10" data-dcnode-id="6728"><span data-dcnode-id="6735" instrument_node="">
</span><b class="comment-author" data-dcnode-id="6733"><span data-dcnode-id="6734" instrument_node="">Jeff Goins</span></b><span data-dcnode-id="6732" instrument_node="">
</span><p data-dcnode-id="6730"><span data-dcnode-id="6731" instrument_node="">The question is ambition for what? It’s not enough to have drive or desire. There must be an object at the end, something to work for. In other words, I believe ambition is a means to an end, and as Covey says, we must begin with the end in mind.</span></p><span data-dcnode-id="6729" instrument_node="">
</span></div><span data-dcnode-id="6727" instrument_node="">

</span><div class="comment" data-dcnode-id="6683"><span data-dcnode-id="6722" instrument_node="">
</span><div class="row" data-dcnode-id="6685"><span data-dcnode-id="6721" instrument_node="">
</span><div class="col-xs-2 avatar-col" data-dcnode-id="6714"><span data-dcnode-id="6720" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="6719" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/295c1ce2f41b6dfbc6a0aa98e3aebc61%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/295c1ce2f41b6dfbc6a0aa98e3aebc61?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="6718" instrument_node=""> </span><a class="reply-link" data-dcnode-id="6716" data-parent-id="55564" href="#"><span data-dcnode-id="6717" instrument_node="">Reply</span></a><span data-dcnode-id="6715" instrument_node="">
</span></div><span data-dcnode-id="6713" instrument_node="">
</span><div class="col-xs-10" data-dcnode-id="6687"><span data-dcnode-id="6712" instrument_node="">
</span><b class="comment-author" data-dcnode-id="6710"><span data-dcnode-id="6711" instrument_node="">Margot</span></b><span data-dcnode-id="6709" instrument_node="">
</span><p data-dcnode-id="6707"><span data-dcnode-id="6708" instrument_node="">I found myself here by typing a question into Google: “Why are we taught that ambition is bad?”</span></p><span data-dcnode-id="6706" instrument_node="">
</span><p data-dcnode-id="6704"><span data-dcnode-id="6705" instrument_node="">I’m a freshman in a small-town American high school and have been told time and time again to wait until I’m more mature or until I have experienced things to voice my opinions and make changes to what I don’t find reasonable. I know my frontal lobe isn’t developed enough to make fully conscious and reasonable decisions. I know I haven’t had a lot of experience in the “real world.” I know that I don’t know everything yet (but who does?)</span></p><span data-dcnode-id="6703" instrument_node="">
</span><p data-dcnode-id="6701"><span data-dcnode-id="6702" instrument_node="">Sure I don’t have the full knowledge of other peoples’ realities, but that doesn’t mean I don’t find problems in the banal life that I live. I’m just a kid, so that means I just have to spend the first 18 years of my life listening to someone drone on and on about something just simply don’t care about and absolutely know I can’t substantially benefit from, as well as sit there asking fairly meaningful questions about the worth of this so-called “education.” And all that on top of other teenage social and intrapersonal struggles, of course. Being forced to comply with something you find yourself constantly questioning in order to “have a future” is an incredibly torturous experience. I find myself stuck in this situation daily, and expect to for the next four years (at least.)</span></p><span data-dcnode-id="6700" instrument_node="">
</span><p data-dcnode-id="6698"><span data-dcnode-id="6699" instrument_node="">My point is, maybe I haven’t experienced the hellish life it is as an adult in the real world, maybe I haven’t learned just how simply impossible it is to ever have your opinions heard, maybe I haven’t had other experiences that weigh the lives of other people and deem my problems meaningless, but should I have my ambitions crushed because someone in power has experienced more than I have? We are told we have control over our own education, yet any ambition I have to make a change for student benefit is seen as naïve or some crazy idea brought on by raging hormones. Because I’m a kid, I shouldn’t have ambition for the immediate future, I just have to wait it out. “If you don’t like something, change it!” Something I hear teachers and principals and parents say all the time. It’s so encouraging. Unfortunately they forget to mention the second part: “…but only after you’ve gone through all of it to assess every bit of damage so then at the end, when you can change it, it won’t be of much worth to you anyway!”</span></p><span data-dcnode-id="6697" instrument_node="">
</span><p data-dcnode-id="6695"><span data-dcnode-id="6696" instrument_node="">“Follow your dreams” but not that one, that’s unrealistic. Instead please glue these popsicle sticks together, it’ll give you a future.</span></p><span data-dcnode-id="6694" instrument_node="">
</span><p data-dcnode-id="6692"><span data-dcnode-id="6693" instrument_node="">I’ve come to generally distrust the encouragement from adults in my life due to the fact that more often than not they will eventually contradict themselves, and then refuse to recognize the contradiction.</span></p><span data-dcnode-id="6691" instrument_node="">
</span><p data-dcnode-id="6689"><span data-dcnode-id="6690" instrument_node="">Uh… a bit rambly, sorry. Just another rebellious, naïve teenager’s opinion. Feel free to ignore.</span></p><span data-dcnode-id="6688" instrument_node="">
</span></div><span data-dcnode-id="6686" instrument_node="">
</span></div><span data-dcnode-id="6684" instrument_node="">

</span><div class="comment reply" data-dcnode-id="6647"><span data-dcnode-id="6680" instrument_node="">

</span><div class="col-xs-2 col-md-offset-2 avatar-col" data-dcnode-id="6672"><span data-dcnode-id="6678" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="6677" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/5426e57369a995f9ea32be873992b394%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/5426e57369a995f9ea32be873992b394?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="6676" instrument_node=""> </span><a class="reply-link" data-dcnode-id="6674" data-parent-id="56553" href="#"><span data-dcnode-id="6675" instrument_node="">Reply</span></a><span data-dcnode-id="6673" instrument_node="">
</span></div><span data-dcnode-id="6671" instrument_node="">
</span><div class="col-xs-10 col-md-8" data-dcnode-id="6651"><span data-dcnode-id="6670" instrument_node="">
</span><b class="comment-author" data-dcnode-id="6668"><span data-dcnode-id="6669" instrument_node="">David Herz</span></b><span data-dcnode-id="6667" instrument_node="">
</span><p data-dcnode-id="6665"><span data-dcnode-id="6666" instrument_node="">Here’s the thing. You are threatening to those who have squelched their own ambition to survive in this world. Don’t buy into their crap. Be ambitious, be proud, be yourself; don’t let anyone tell you that you must settle for less.</span></p><span data-dcnode-id="6664" instrument_node="">
</span><p data-dcnode-id="6662"><span data-dcnode-id="6663" instrument_node="">And yes, maybe your idea is crazy, but maybe it’s the one that will change the world. Don’t be afraid to experiment. Feel free to ask your teachers and elders to let you fail. I am sure if you probe a little bit, you will find that they all have some experience where they failed from which they learned a heck of a lot. While they might want to protect you, it just might be keeping you from growing. There are some things best learned firsthand.</span></p><span data-dcnode-id="6661" instrument_node="">
</span><p data-dcnode-id="6659"><span data-dcnode-id="6660" instrument_node="">That said, feel free to thank these people and listen. Maybe there are pearls in what they say that are of value.</span></p><span data-dcnode-id="6658" instrument_node="">
</span><p data-dcnode-id="6656"><span data-dcnode-id="6657" instrument_node="">In the end however, you must make your own way, and they know it. There might be hurt and disappointment along the way, but if there weren’t you wouldn’t be putting yourself out there and living.</span></p><span data-dcnode-id="6655" instrument_node="">
</span><p data-dcnode-id="6653"><span data-dcnode-id="6654" instrument_node="">So whatever it is, I suggest you go for it. Do your best to prepare, ask advice where you can get it, but mostly just be in action. And have fun; always have fun.</span></p><span data-dcnode-id="6652" instrument_node="">
</span></div><span data-dcnode-id="6650" instrument_node="">
</span></div><span data-dcnode-id="6648" instrument_node="">

</span><p data-dcnode-id="6628"><span data-dcnode-id="6629" instrument_node="">I think the problem here might be how the other person defines ambition. They automatically assume that ambition entails devaluing other parts of our lives. That’s not the case, however; ambition goes hand-in-hand with family, friends, charity, etc. and in many cases can drive those factors. Ambition to me just means striving for something greater than what we have. Everyone does that in some respect.</span></p><span data-dcnode-id="6627" instrument_node="">
</span><p data-dcnode-id="6625"><span data-dcnode-id="6626" instrument_node="">Additionally, ambition is important because it breeds innovation; we would never innovate if we weren’t aspiring toward something greater. Cars, computers, and cell phones would never have existed without the ambitious people who orchestrated their creation. People who knock ambition should keep that in mind.</span></p><span data-dcnode-id="6624" instrument_node="">

</span><p data-dcnode-id="6373"><span data-dcnode-id="6374" instrument_node="">I had great fun reading all the comments here. Of course you set them up, Derek, leading a great majority of the comments to the dark, negative side! But you certainly hit a nerve here, didn’t you.</span></p><span data-dcnode-id="6372" instrument_node="">
</span><p data-dcnode-id="6370"><span data-dcnode-id="6371" instrument_node="">I doubt you’ll ever get to read as far as my comment but, as Bill said way back at the beginning of the comments, passion and ambition go together. Nearly everyone has had a passion at one time or another, but traded that in for something else. If they question or bash others acting on their passion, it’s because it reminds them of what might have been for their own life. </span></p><span data-dcnode-id="6369" instrument_node="">
</span><p data-dcnode-id="6361"><span data-dcnode-id="6368" instrument_node="">My personal experience has been that</span><br data-dcnode-id="6367"><span data-dcnode-id="6366" instrument_node="">
* reminding a young person to remember there are bills to be paid, or</span><br data-dcnode-id="6365"><span data-dcnode-id="6364" instrument_node="">

</span><p data-dcnode-id="6229"><span data-dcnode-id="6230" instrument_node="">I don’t think that people hate ambition per se. I’d say that suspicion creeps in until the primary goal is known. If the primary goal is fame, power, wealth or rank, then people generally dislike that ambition. The direct pursuit of those things raises resistance. However, if those things happen as byproducts of ambition to help, entertain, etc. people, then there is less resistance.</span></p><span data-dcnode-id="6228" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="6218" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/d7b443138c4d022572d2c5a0cdbb501a%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/d7b443138c4d022572d2c5a0cdbb501a?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="6217" instrument_node=""> </span><a class="reply-link" data-dcnode-id="6215" data-parent-id="53840" href="#"><span data-dcnode-id="6216" instrument_node="">Reply</span></a><span data-dcnode-id="6214" instrument_node="">

</span><b class="comment-author" data-dcnode-id="6209"><span data-dcnode-id="6210" instrument_node="">Matthew Jeschke</span></b><span data-dcnode-id="6208" instrument_node="">
</span><p data-dcnode-id="6206"><span data-dcnode-id="6207" instrument_node="">Hey Derek, great question. I have similar experiences. In the beginning of becoming an entrepreneur people just looked at my dumbfounded and told me leaving my job for some pipe dream was the worst thing I could do. </span></p><span data-dcnode-id="6205" instrument_node="">
</span><p data-dcnode-id="6203"><span data-dcnode-id="6204" instrument_node="">One of my fellow entrepreneur friends put it best when I asked him about why people react that way… He said people have a similar instinct / behavior to crabs. What happens when a crab fisherman goes to pickup his pots is, one crab will try to escape the pot / fishing crate. The rest of the crabs grab the escaping crab and pull it back into the crate, despite their ultimate demise becoming my tasty treat at dinner. Apparently there’s a subconscious behavior in people to do the same. When you have ambition or choose a different path than others, the group feels compromised and pulls you back in by trying to squash your ambition.</span></p><span data-dcnode-id="6202" instrument_node="">
</span><p data-dcnode-id="6200"><span data-dcnode-id="6201" instrument_node="">The only way I found to deal with this was to be so set in my plans that nobody could dissuade me. I think after continuing on your own path eventually you create a new one and people start to follow you. I’m starting to see that now that I’m a few years into this.</span></p><span data-dcnode-id="6199" instrument_node="">
</span><p data-dcnode-id="6197"><span data-dcnode-id="6198" instrument_node="">Anyways, I have a tendency to ramble on these comments. Thought the crab analogy was great one though and I’d share it with you 😉</span></p><span data-dcnode-id="6196" instrument_node="">

</span><div class="col-xs-2 avatar-col" data-dcnode-id="6181"><span data-dcnode-id="6187" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="6186" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/cb9416c8e59e170c607a0dcdc5fe0f0a%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/cb9416c8e59e170c607a0dcdc5fe0f0a?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="6185" instrument_node=""> </span><a class="reply-link" data-dcnode-id="6183" data-parent-id="53839" href="#"><span data-dcnode-id="6184" instrument_node="">Reply</span></a><span data-dcnode-id="6182" instrument_node="">
</span></div><span data-dcnode-id="6180" instrument_node="">
</span><div class="col-xs-10" data-dcnode-id="6172"><span data-dcnode-id="6179" instrument_node="">
</span><b class="comment-author" data-dcnode-id="6177"><span data-dcnode-id="6178" instrument_node="">Brian Lau</span></b><span data-dcnode-id="6176" instrument_node="">
</span><p data-dcnode-id="6174"><span data-dcnode-id="6175" instrument_node="">There can be lots of things that are wrong with ambition. However I think much of that is how a person goes about their ambitions and what their ambitions are. Hitler was ambitious and not exactly a role model. Then there are stories of people who sacrifice their significant others and their families to get their goals. This begins the gray area. Also, how far would you take your ambitions? Would you take advantage of people and pay them less than living costs just to make another million? Plenty of stories of that too. Are you gonna murder anyone to get what you want? Would you lie, cheat or steal? Would you bribe governments and build over sacred land like Walmart? Nothing wrong with going after your goals as long as you aren’t hurting people in the process. What that hurt threshold is depends on each individual.</span></p><span data-dcnode-id="6173" instrument_node="">
</span></div><span data-dcnode-id="6171" instrument_node="">
</span></div><span data-dcnode-id="6169" instrument_node="">
</span></div><span data-dcnode-id="6167" instrument_node="">
</span><div class="comment" data-dcnode-id="6125"><span data-dcnode-id="6166" instrument_node="">
</span><div class="row" data-dcnode-id="6127"><span data-dcnode-id="6165" instrument_node="">
</span><div class="col-xs-2 avatar-col" data-dcnode-id="6158"><span data-dcnode-id="6164" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="6163" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/132f3453fe205747863123824eacdc60%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/132f3453fe205747863123824eacdc60?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="6162" instrument_node=""> </span><a class="reply-link" data-dcnode-id="6160" data-parent-id="53838" href="#"><span data-dcnode-id="6161" instrument_node="">Reply</span></a><span data-dcnode-id="6159" instrument_node="">
</span></div><span data-dcnode-id="6157" instrument_node="">
</span><div class="col-xs-10" data-dcnode-id="6129"><span data-dcnode-id="6156" instrument_node="">
</span><b class="comment-author" data-dcnode-id="6154"><span data-dcnode-id="6155" instrument_node="">Mackenzie</span></b><span data-dcnode-id="6153" instrument_node="">
</span><p data-dcnode-id="6151"><span data-dcnode-id="6152" instrument_node="">Derek, </span></p><span data-dcnode-id="6150" instrument_node="">
</span><p data-dcnode-id="6148"><span data-dcnode-id="6149" instrument_node="">Ambition needs to be clearly defined for the sake of this discussion. If we stick to the denotative meaning of ambition: “a strong desire to do or to achieve something, typically requiring determination and hard work.” No one really has a problem with this (that I know of). People everywhere praise the idea of reaching for the stars and believing in yourself. Society respects and praises people who work hard.</span></p><span data-dcnode-id="6147" instrument_node="">
</span><p data-dcnode-id="6145"><span data-dcnode-id="6146" instrument_node="">However, ambition has a connotative meaning that is not so well received. Ambition often means “pursuing one specific financial goal at the expense of everything else.” This idea of ambition is disliked for numerous reasons. I believe the most common reason is a low self-esteem. Person A wants XYZ but is not willing to give up TUV to get it. Person B has given up T and V and has gotten XYZ as a result. Person B is deemed very ambitious. Person A feels bad about not having received XYZ out of life, but rationalizes that TUV is more important. Person A rationalizes that Person B is too ambitious and is, “missing out on the finer points of life.” in this case, the rage agains’t ambition is more about a denial of lost opportunities and a refusal to undergo deep introspection, than it is an altruistic attempt to ensure that people don’t lose sight of what is important. </span></p><span data-dcnode-id="6144" instrument_node="">
</span><p data-dcnode-id="6142"><span data-dcnode-id="6143" instrument_node="">It’s important to note that for some people, the “TUV” can be things like self respect, moral values, and valuable friendships. In this case, the connotative ambition really is a bad thing. Material wealth should not drive you to be a bad person, but for some people it does. This is where ambition gets it’s bad name. This type of ambition is the poster child or “false positive” that represents all types of ambitions in the eyes of many. </span></p><span data-dcnode-id="6141" instrument_node="">
</span><p data-dcnode-id="6139"><span data-dcnode-id="6140" instrument_node="">For other people, Ambition represents futility and effort spent on the wrong things. These are people who work really really really hard and have gotten nothing for it. These are people who have worked too hard and never took the time to figure out a better strategy. They see their effort spent on “ambitious” things to have received the smallest gain per work put in. From this perspective, ambition is a misplaced effort. </span></p><span data-dcnode-id="6138" instrument_node="">
</span><p data-dcnode-id="6136"><span data-dcnode-id="6137" instrument_node="">Finally, ambition is linked to the idea of the elite class. The people of the world are not strangers to the reality that moving up in socio-economic status is a statistical anomaly. This drives a fierce distaste for the higher echelons of society amongst those who are the most needy. Ambition is a trait found amongst those who have more than those who do not. A member of the lower class cannot display ambition without announcing to the community they are a part of that they want to become something that is disliked by the community they are a part of. Its like walking into a Tea Party convention and telling your Tea Party friends that you have decide to become a progressive liberal. </span></p><span data-dcnode-id="6135" instrument_node="">
</span><p data-dcnode-id="6131"><span data-dcnode-id="6134" instrument_node="">Just my thoughts.</span><br data-dcnode-id="6133"><span data-dcnode-id="6132" instrument_node="">
-Mackenzie</span></p><span data-dcnode-id="6130" instrument_node="">
</span></div><span data-dcnode-id="6128" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="6120" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/914c2abecde38752a4f97c8aae4ed09a%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/914c2abecde38752a4f97c8aae4ed09a?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="6119" instrument_node=""> </span><a class="reply-link" data-dcnode-id="6117" data-parent-id="53831" href="#"><span data-dcnode-id="6118" instrument_node="">Reply</span></a><span data-dcnode-id="6116" instrument_node="">

</span><b class="comment-author" data-dcnode-id="6111"><span data-dcnode-id="6112" instrument_node="">Bree</span></b><span data-dcnode-id="6110" instrument_node="">
</span><p data-dcnode-id="6108"><span data-dcnode-id="6109" instrument_node="">I actually get the opposite. Instead of people telling me “there’s more to life than…,” I usually have people all around me being super-ambitious (freelancers, content creators, media producers, etc.), trying to beat out all their competitors and score the highest-paying gig. </span></p><span data-dcnode-id="6107" instrument_node="">
</span><p data-dcnode-id="6105"><span data-dcnode-id="6106" instrument_node="">They look at me like I’m NOT ambitious for pursuing niches that I enjoy but won’t be lucrative until I’ve established a reputation. But really, aren’t both camps ambitious in our own ways?</span></p><span data-dcnode-id="6104" instrument_node="">

</span><p data-dcnode-id="5948"><span data-dcnode-id="5959" instrument_node="">I won’t be reading all the comments.</span><br data-dcnode-id="5958"><span data-dcnode-id="5957" instrument_node="">

They are used to us, they like to ‘flock together’ and when someone among them takes steps to follow their dreams other people may find that they no longer know the old you.</span><br data-dcnode-id="5954"><span data-dcnode-id="5953" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="5937" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/4c9c4947e1da697b4f01806b4a949b5c%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/4c9c4947e1da697b4f01806b4a949b5c?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="5936" instrument_node=""> </span><a class="reply-link" data-dcnode-id="5934" data-parent-id="53813" href="#"><span data-dcnode-id="5935" instrument_node="">Reply</span></a><span data-dcnode-id="5933" instrument_node="">
</span></div><span data-dcnode-id="5931" instrument_node="">
</span><div class="col-xs-10" data-dcnode-id="5905"><span data-dcnode-id="5930" instrument_node="">
</span><b class="comment-author" data-dcnode-id="5928"><span data-dcnode-id="5929" instrument_node="">Seth Chong</span></b><span data-dcnode-id="5927" instrument_node="">
</span><p data-dcnode-id="5925"><span data-dcnode-id="5926" instrument_node="">Hi Derek,</span></p><span data-dcnode-id="5924" instrument_node="">
</span><p data-dcnode-id="5922"><span data-dcnode-id="5923" instrument_node="">Sometimes, it depends on who’s saying it. For one, they may be motivated to disapprove it in a way, because of negative reasons. For another, they have said so because they may be wise. For the latter, sometimes the person they’re talking to might be too hard-headed, so they could only disapprove in order to make their stance stronger. It’s like what Anthony Robbins said as, an answer to break a pattern.</span></p><span data-dcnode-id="5921" instrument_node="">
</span><p data-dcnode-id="5919"><span data-dcnode-id="5920" instrument_node="">In my opinion, ambition is never bad. However, I believe it must be fueled by positive motivations. If someone’s ambition is to be a billionaire, for example, and they want to be a billionaire because by being one they can have the resource to further better the world – it’s something that… in my opinion, can’t be disapproved at all.</span></p><span data-dcnode-id="5918" instrument_node="">
</span><p data-dcnode-id="5916"><span data-dcnode-id="5917" instrument_node="">It’s true that to be perfectly strong, one needs balance. Hence, ambition must always be accompanied by groundedness as well. This can mean being aware, being conscious, of what matters in life. Such things can range from: Family, a healthy lifestyle, being kind. Moral teachings that should always be remembered, and kept close to heart.</span></p><span data-dcnode-id="5915" instrument_node="">
</span><p data-dcnode-id="5913"><span data-dcnode-id="5914" instrument_node="">When ambition is driven purely by the urge to prove oneself, chased for one’s own selfishness, it can be a very blind rush. This can lead nowhere. And in this case, disapproving the ambition, is actually a disapproving of its motivations. If a selfish person wants to be a billionaire, chances are they would waste a lot of time, and can ruin a lot of people, and missing what matters in life.</span></p><span data-dcnode-id="5912" instrument_node="">
</span><p data-dcnode-id="5910"><span data-dcnode-id="5911" instrument_node="">Looking back from when one is eighty years of age, and is lying on the death bed – I believe ambition can only satisfy someone, if it has impacted others positively, and further be more fulfilling, if it has transformed something, someone, or people in general deeply – for the better.</span></p><span data-dcnode-id="5909" instrument_node="">
</span><p data-dcnode-id="5907"><span data-dcnode-id="5908" instrument_node="">I hope my answer here has been of service. Thanks.</span></p><span data-dcnode-id="5906" instrument_node="">

</span><b class="comment-author" data-dcnode-id="5887"><span data-dcnode-id="5888" instrument_node="">Anan</span></b><span data-dcnode-id="5886" instrument_node="">
</span><p data-dcnode-id="5884"><span data-dcnode-id="5885" instrument_node="">Human brains like binary ways of explaining the world, hence the ever popular phrase “there are 2 kinds of people…”. Ambition is so commonly linked with negative personality traits like selfishness, power hunger, etc, that being seen in this way almost immediately puts a picture in other peoples minds about the kind of person you are. It’s the social draw backs of thin slicing. People very quickly assume a lot about you using very little information.</span></p><span data-dcnode-id="5883" instrument_node="">

</span><b class="comment-author" data-dcnode-id="5772"><span data-dcnode-id="5773" instrument_node="">Jana</span></b><span data-dcnode-id="5771" instrument_node="">
</span><p data-dcnode-id="5769"><span data-dcnode-id="5770" instrument_node="">Ambition in someone else can make them feel bad about their own life. </span></p><span data-dcnode-id="5768" instrument_node="">
</span><p data-dcnode-id="5766"><span data-dcnode-id="5767" instrument_node="">Some people just except their demographics, situation and life. Thinking that’s all there will ever be, there’s no point trying to get ahead or get success because that’s just for the movies. </span></p><span data-dcnode-id="5765" instrument_node="">
</span><p data-dcnode-id="5763"><span data-dcnode-id="5764" instrument_node="">I’m around a lot of people like that, I’m the odd one out. They always see me pursuing my dreams, always ambitious, taking on challenges, never sitting on idle…. </span></p><span data-dcnode-id="5762" instrument_node="">
</span><p data-dcnode-id="5760"><span data-dcnode-id="5761" instrument_node="">If someone said to me, like they said to you ‘there’s more to life than ____” I would reply with this </span></p><span data-dcnode-id="5759" instrument_node="">
</span><p data-dcnode-id="5757"><span data-dcnode-id="5758" instrument_node="">“damn right there’s more to life than just passively sitting around watching TV and waiting for life to happen to you and being restricted financially to doing the things you want to do in life.”</span></p><span data-dcnode-id="5756" instrument_node="">
</span><p data-dcnode-id="5754"><span data-dcnode-id="5755" instrument_node="">You can either sit around, have extra time but no money to do anything in that time (p.s it’s costs money to do so called ‘free’ stuff – i.e. fuel and food when going to the beach for example). Or you can work your ass off and hustle your little heart out, keeping your mind fit, focused and always learning/doing/trying/making/creating and earning so you can afford to enjoy your time off. I can afford to provide a roof over my families head, I can afford to pay for nice food and clean crisp sheets for my kids. </span></p><span data-dcnode-id="5753" instrument_node="">
</span><p data-dcnode-id="5751"><span data-dcnode-id="5752" instrument_node="">To me ambition and drive is the essence of ‘getting more out of life’ it gives me the ability to enjoy life more, because there is nothing more fulfilling in life than loving, learning, sharing and making a difference. </span></p><span data-dcnode-id="5750" instrument_node="">
</span><p data-dcnode-id="5748"><span data-dcnode-id="5749" instrument_node="">I’ve never commented here, but I share your view, extremely strongly. </span></p><span data-dcnode-id="5747" instrument_node="">
</span><p data-dcnode-id="5745"><span data-dcnode-id="5746" instrument_node="">Anyone around me knows, this is one topic that gets my hackles up if they give me a hard time about my ambition and drive in life. </span></p><span data-dcnode-id="5744" instrument_node="">
</span><p data-dcnode-id="5742"><span data-dcnode-id="5743" instrument_node="">Jana</span></p><span data-dcnode-id="5741" instrument_node="">

</span><p data-dcnode-id="5638"><span data-dcnode-id="5639" instrument_node="">Great topic! It is VERY possible to play BIG and serve as many people as possible with your expertise and services while giving even MORE or your time and love to your family and friends. Ambition is wanting to give your gifts to the world. Making money…lots of it…can allow you to do great things for this world and the people in it who might need assistance. </span></p><span data-dcnode-id="5637" instrument_node="">
</span><p data-dcnode-id="5635"><span data-dcnode-id="5636" instrument_node="">Yet sometimes as you are advancing, those in your life who are not feel threatened somehow. They see the lack in themselves and so it’s easier to criticize you for working towards being the best at what you do. That makes them feel big for a little while. It is painful, but it is also important that you surround yourself with like- minded advancing people. </span></p><span data-dcnode-id="5634" instrument_node="">
</span><p data-dcnode-id="5632"><span data-dcnode-id="5633" instrument_node="">Never apologize for wanting to be the best version of you by hard work and ambition. The world needs people who want to share their gifts freely. And they should be paid for it.</span></p><span data-dcnode-id="5631" instrument_node="">

</span><p data-dcnode-id="5563"><span data-dcnode-id="5564" instrument_node="">Ambition is the fuel that drives human achievement. It should not be confused with greed which is a purely selfish sentiment. I had the misfortune of working in an environment where the bar was set very low and there was a strong bias against those considered to be overly ambitious. In this case, the resentment was mainly based on fear of change If you find yourself in this scenario, it’s best to get out as it is impossible to change the prevailing culture.</span></p><span data-dcnode-id="5562" instrument_node="">

</span><p data-dcnode-id="5540"><span data-dcnode-id="5541" instrument_node="">Hey Derek,</span></p><span data-dcnode-id="5539" instrument_node="">
</span><p data-dcnode-id="5537"><span data-dcnode-id="5538" instrument_node="">I think that there are people out there to whom ambition is a dirty word. But there are also people who don’t have ambition that don’t necessarily hate on those of us that do.</span></p><span data-dcnode-id="5536" instrument_node="">
</span><p data-dcnode-id="5534"><span data-dcnode-id="5535" instrument_node="">My thoughts are that I’m glad there are people that don’t have ambition because it leaves more opportunities on the table for us to action.</span></p><span data-dcnode-id="5533" instrument_node="">
</span><p data-dcnode-id="5531"><span data-dcnode-id="5532" instrument_node="">Let’s all just get along, and they can have their lives of mediocrity.</span></p><span data-dcnode-id="5530" instrument_node="">

</span><p data-dcnode-id="5508"><span data-dcnode-id="5509" instrument_node="">I absolutely agree with you, Derek. I’ve always found myself to be highly ambitious, intellectually- and business-driven. I love getting ahead and it IS what makes me happy. Sure, there are ALSO other things that are beautiful and amazing about life, ambition isn’t the only thing, but for me personally it is certainly one of the main things. I don’t understand people without ambitions. I simply don’t get it. Why WOULDN’T you want to strive to be better? To get ahead? To make more money? Striving is what makes us feel pride, achievement, satisfaction. I love it and I put it at a high priority for me ALONG with family, spirituality, and other things in life. Life isn’t black and white – it isn’t just ONE thing that makes it go round.</span></p><span data-dcnode-id="5507" instrument_node="">

</span><p data-dcnode-id="5485"><span data-dcnode-id="5486" instrument_node="">Hi Derek,</span></p><span data-dcnode-id="5484" instrument_node="">
</span><p data-dcnode-id="5478"><span data-dcnode-id="5483" instrument_node="">Of course one must have ambitions to proceed in life. I think there are many kind of ambitions though. The arrogant one, the more subtle one, the clever one, etc. The word ambition is just a vehicle to get to a destination in your life. People who are stating that ambition is an abusive kind of thing to do are partially right because some of us use it as an excuse to push everything and everyone out of the way to achieve ones own selfish interest. However ambitions, when used in the correct way, is a must for us to achieve goals and dreams. If there wouldn’t be any ambitions life would be numb and dull.</span><br data-dcnode-id="5482"><span data-dcnode-id="5481" instrument_node="">
Just use it in the correct way so that nobody else gets hurt!</span><br data-dcnode-id="5480"><span data-dcnode-id="5479" instrument_node="">
With friendly greetings, Hans</span></p><span data-dcnode-id="5477" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="5467" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/7a1cfb8f05366bbd31eec87b5a736da8%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/7a1cfb8f05366bbd31eec87b5a736da8?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="5466" instrument_node=""> </span><a class="reply-link" data-dcnode-id="5464" data-parent-id="53764" href="#"><span data-dcnode-id="5465" instrument_node="">Reply</span></a><span data-dcnode-id="5463" instrument_node="">

</span><b class="comment-author" data-dcnode-id="5458"><span data-dcnode-id="5459" instrument_node="">Josephine Lee</span></b><span data-dcnode-id="5457" instrument_node="">
</span><p data-dcnode-id="5453"><span data-dcnode-id="5456" instrument_node="">Honestly, I don’t run into this problem. Maybe it’s because I’m a 25-year-old Asian female. It doesn’t exactly scream out intimidating or threatening (which I believe ultimately triggers ambition-hatred). I own a dance boutique, which is also not intimidating or threatening. Although it takes just as much ambition to run as any business, I don’t think it’s perceived as so.</span><br data-dcnode-id="5455"><span data-dcnode-id="5454" instrument_node="">
And I do sacrifice my dating life to my business (I work 7 days a week). But no one really gives me any grief about it. Maybe I just have awesome, supportive people around me.</span></p><span data-dcnode-id="5452" instrument_node="">

</span><div class="col-xs-2 avatar-col" data-dcnode-id="5437"><span data-dcnode-id="5443" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="5442" height="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/42799591bee2be03dd88f93b4be5c429%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/42799591bee2be03dd88f93b4be5c429?s=192&amp;d=mm&amp;r=g 2x" width="96"><span data-dcnode-id="5441" instrument_node=""> </span><a class="reply-link" data-dcnode-id="5439" data-parent-id="53763" href="#"><span data-dcnode-id="5440" instrument_node="">Reply</span></a><span data-dcnode-id="5438" instrument_node="">
