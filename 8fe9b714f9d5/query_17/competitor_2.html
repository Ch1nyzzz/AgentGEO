</span><h1 class="article-title" data-dcnode-id="1451" itemprop="headline"><span data-dcnode-id="1454" instrument_node="">
					Why has capitalism failed?			</span><meta content="https://university.marxist.com/en/why-capitalism-failed" data-dcnode-id="1453" itemprop="url"><span data-dcnode-id="1452" instrument_node="">
</span></h1><span data-dcnode-id="1450" instrument_node="">
</span></header><span data-dcnode-id="1448" instrument_node="">
</span><span data-dcnode-id="1446" instrument_node="">
</span><span data-dcnode-id="1444" instrument_node="">
</span><span data-dcnode-id="1442" instrument_node="">
</span><span data-dcnode-id="1440" instrument_node="">
</span><span data-dcnode-id="1438" instrument_node="">
</span><span data-dcnode-id="1436" instrument_node="">
</span><span data-dcnode-id="1434" instrument_node="">
</span><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1423"><strong data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Date:</span></strong><span data-dcnode-id="1428" instrument_node=""> Sunday 26th July</span><br data-dcnode-id="1427"><strong data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Time:&nbsp;</span></strong><span data-dcnode-id="1424" instrument_node="">13:00 - 16:30 BST</span></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Apologists for capitalism argue that it is the best, most-efficient system that could ever possibly exist. But the current period of crisis and chaos prove otherwise. Today, the COVID-19 pandemic has triggered an economic collapse that threatens to throw society back to the 1930s, sending the world into a full-blown depression. Clearly, something is rotten at the heart of the system. The advocates of Keynesian ideas - or modern varieties like Modern Monetary Theory - cannot provide a real solution to this crisis. Only the Marxist method can explain why capitalism has failed, and what the way forward is for humanity. Our speaker, Adam Booth, is a leading activist of Socialist Appeal, the British section of the IMT.</span></p><span data-dcnode-id="1419" instrument_node="">
