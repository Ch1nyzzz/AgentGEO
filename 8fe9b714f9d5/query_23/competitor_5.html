</span><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="3320" style="display:none"><span data-dcnode-id="3321" instrument_node="">Political and economic system</span></div><span data-dcnode-id="3319" instrument_node="">
</span><p data-dcnode-id="3289"><b data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">Democratic capitalism</span></b><span data-dcnode-id="3316" instrument_node="">, also referred to as </span><b data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node="">market democracy</span></b><span data-dcnode-id="3313" instrument_node="">, is a </span><a class="mw-redirect" data-dcnode-id="3311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political" title="Political"><span data-dcnode-id="3312" instrument_node="">political</span></a><span data-dcnode-id="3310" instrument_node=""> and </span><a data-dcnode-id="3308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_system" title="Economic system"><span data-dcnode-id="3309" instrument_node="">economic system</span></a><span data-dcnode-id="3307" instrument_node="">. It integrates </span><a data-dcnode-id="3305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Resource_allocation" title="Resource allocation"><span data-dcnode-id="3306" instrument_node="">resource allocation</span></a><span data-dcnode-id="3304" instrument_node=""> by </span><a data-dcnode-id="3302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marginal_product" title="Marginal product"><span data-dcnode-id="3303" instrument_node="">marginal productivity</span></a><span data-dcnode-id="3301" instrument_node=""> (synonymous with free-market capitalism), with policies of resource allocation by social entitlement.</span><sup class="reference" data-dcnode-id="3298" id="cite_ref-:0_1-0"><a data-dcnode-id="3299" href="#cite_note-:0-1"><span data-dcnode-id="3300" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3297" instrument_node=""> The policies which characterise the system are enacted by </span><a data-dcnode-id="3295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy" title="Democracy"><span data-dcnode-id="3296" instrument_node="">democratic</span></a><span data-dcnode-id="3294" instrument_node=""> governments.</span><sup class="reference" data-dcnode-id="3291" id="cite_ref-:0_1-1"><a data-dcnode-id="3292" href="#cite_note-:0-1"><span data-dcnode-id="3293" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3290" instrument_node="">
</span></p><p data-dcnode-id="3256"><span data-dcnode-id="3288" instrument_node="">Democratic capitalism was implemented widely in the 20th century, particularly in </span><a data-dcnode-id="3286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Europe" title="Europe"><span data-dcnode-id="3287" instrument_node="">Europe</span></a><span data-dcnode-id="3285" instrument_node=""> and the </span><a data-dcnode-id="3283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_world" title="Western world"><span data-dcnode-id="3284" instrument_node="">Western world</span></a><span data-dcnode-id="3282" instrument_node=""> after the </span><a data-dcnode-id="3280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="3281" instrument_node="">Second World War</span></a><span data-dcnode-id="3279" instrument_node="">. The coexistence of capitalism and democracy, particularly in Europe, was supported by the creation of the modern </span><a data-dcnode-id="3277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Welfare_state" title="Welfare state"><span data-dcnode-id="3278" instrument_node="">welfare state</span></a><span data-dcnode-id="3276" instrument_node=""> in the </span><a class="mw-redirect" data-dcnode-id="3274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-war_period" title="Post-war period"><span data-dcnode-id="3275" instrument_node="">post-war period</span></a><span data-dcnode-id="3273" instrument_node="">.</span><sup class="reference" data-dcnode-id="3270" id="cite_ref-Capitalism_and_Inequality,_2013_2-0"><a data-dcnode-id="3271" href="#cite_note-Capitalism_and_Inequality,_2013-2"><span data-dcnode-id="3272" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3269" instrument_node=""> The implementation of democratic capitalism typically involves the enactment of policies expanding the welfare state, strengthening the </span><a data-dcnode-id="3267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collective_bargaining" title="Collective bargaining"><span data-dcnode-id="3268" instrument_node="">collective bargaining</span></a><span data-dcnode-id="3266" instrument_node=""> rights of employees, or strengthening </span><a data-dcnode-id="3264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Competition_law" title="Competition law"><span data-dcnode-id="3265" instrument_node="">competition laws</span></a><span data-dcnode-id="3263" instrument_node="">. These policies are enacted in a capitalist economy characterized by the right to </span><a class="mw-redirect" data-dcnode-id="3261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Private_ownership" title="Private ownership"><span data-dcnode-id="3262" instrument_node="">private ownership</span></a><span data-dcnode-id="3260" instrument_node=""> of </span><a class="mw-redirect" data-dcnode-id="3258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Productive_property" title="Productive property"><span data-dcnode-id="3259" instrument_node="">productive property</span></a><span data-dcnode-id="3257" instrument_node="">.
</span></p><p data-dcnode-id="3246"><a data-dcnode-id="3254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_social_teaching" title="Catholic social teaching"><span data-dcnode-id="3255" instrument_node="">Catholic social teaching</span></a><span data-dcnode-id="3253" instrument_node=""> offers support for a </span><a class="mw-redirect" data-dcnode-id="3251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communitarian" title="Communitarian"><span data-dcnode-id="3252" instrument_node="">communitarian</span></a><span data-dcnode-id="3250" instrument_node=""> form of democratic capitalism with an emphasis on the preservation of human </span><a data-dcnode-id="3248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dignity" title="Dignity"><span data-dcnode-id="3249" instrument_node="">dignity</span></a><span data-dcnode-id="3247" instrument_node="">.
</span></p><span data-dcnode-id="3245" instrument_node="">

</span><h2 data-dcnode-id="3067"><span class="mw-headline" data-dcnode-id="3075" id="Definition"><span data-dcnode-id="3076" instrument_node="">Definition</span></span><span class="mw-editsection" data-dcnode-id="3068"><span class="mw-editsection-bracket" data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">[</span></span><a data-dcnode-id="3071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratic_capitalism%26action%3Dedit%26section%3D1" title="Edit section: Definition"><span data-dcnode-id="3072" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3066" instrument_node="">
</span><p data-dcnode-id="3030"><span data-dcnode-id="3065" instrument_node="">Democratic capitalism is a type of political and economic system</span><sup class="reference" data-dcnode-id="3062" id="cite_ref-3"><a data-dcnode-id="3063" href="#cite_note-3"><span data-dcnode-id="3064" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3061" instrument_node=""> characterised by resource allocation according to both marginal productivity and social need, as determined by decisions reached through democratic politics.</span><sup class="reference" data-dcnode-id="3058" id="cite_ref-:0_1-2"><a data-dcnode-id="3059" href="#cite_note-:0-1"><span data-dcnode-id="3060" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3057" instrument_node=""> It is marked by democratic </span><a data-dcnode-id="3055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Election" title="Election"><span data-dcnode-id="3056" instrument_node="">elections</span></a><span data-dcnode-id="3054" instrument_node="">, </span><a data-dcnode-id="3052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_freedom" title="Political freedom"><span data-dcnode-id="3053" instrument_node="">freedom</span></a><span data-dcnode-id="3051" instrument_node="">, and </span><a data-dcnode-id="3049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rule_of_law" title="Rule of law"><span data-dcnode-id="3050" instrument_node="">rule of law</span></a><span data-dcnode-id="3048" instrument_node="">, characteristics typically associated with democracy.</span><sup class="reference" data-dcnode-id="3045" id="cite_ref-:1_4-0"><a data-dcnode-id="3046" href="#cite_note-:1-4"><span data-dcnode-id="3047" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="3042" id="cite_ref-:7_5-0"><a data-dcnode-id="3043" href="#cite_note-:7-5"><span data-dcnode-id="3044" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3041" instrument_node=""> It retains a free-market economic system with an emphasis on </span><a data-dcnode-id="3039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Privately_held_company" title="Privately held company"><span data-dcnode-id="3040" instrument_node="">private enterprise</span></a><span data-dcnode-id="3038" instrument_node="">.</span><sup class="reference" data-dcnode-id="3035" id="cite_ref-:1_4-1"><a data-dcnode-id="3036" href="#cite_note-:1-4"><span data-dcnode-id="3037" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="3032" id="cite_ref-:7_5-1"><a data-dcnode-id="3033" href="#cite_note-:7-5"><span data-dcnode-id="3034" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3031" instrument_node="">
</span></p><p data-dcnode-id="3012"><span data-dcnode-id="3029" instrument_node="">Professor of Entrepreneurship </span><a data-dcnode-id="3027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elias_G._Carayannis" title="Elias G. Carayannis"><span data-dcnode-id="3028" instrument_node="">Elias G. Carayannis</span></a><span data-dcnode-id="3026" instrument_node=""> and Arisitidis Kaloudis, Economics Professor at the Norwegian University of Science and Technology (NTNU), describe democratic capitalism as an economic system which combines robust </span><a class="mw-redirect" data-dcnode-id="3024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Competition_%28companies%29" title="Competition (companies)"><span data-dcnode-id="3025" instrument_node="">competitiveness</span></a><span data-dcnode-id="3023" instrument_node=""> with </span><a data-dcnode-id="3021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sustainable_business" title="Sustainable business"><span data-dcnode-id="3022" instrument_node="">sustainable entrepreneurship</span></a><span data-dcnode-id="3020" instrument_node="">, with the aim of </span><a data-dcnode-id="3018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Innovation" title="Innovation"><span data-dcnode-id="3019" instrument_node="">innovation</span></a><span data-dcnode-id="3017" instrument_node=""> and providing opportunities for economic prosperity to all citizens.</span><sup class="reference" data-dcnode-id="3014" id="cite_ref-:2_6-0"><a data-dcnode-id="3015" href="#cite_note-:2-6"><span data-dcnode-id="3016" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3013" instrument_node="">
</span></p><p data-dcnode-id="2990"><span data-dcnode-id="3011" instrument_node="">Dr Edward Younkins, professor at </span><a data-dcnode-id="3009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wheeling_University" title="Wheeling University"><span data-dcnode-id="3010" instrument_node="">Wheeling Jesuit University</span></a><span data-dcnode-id="3008" instrument_node="">, described democratic capitalism as a “dynamic complex of economic, political, moral-cultural, ideological, and institutional forces”, which serves to maximize </span><a data-dcnode-id="3006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Welfare" title="Welfare"><span data-dcnode-id="3007" instrument_node="">social welfare</span></a><span data-dcnode-id="3005" instrument_node=""> within a free market economy.</span><sup class="reference" data-dcnode-id="3002" id="cite_ref-:3_7-0"><a data-dcnode-id="3003" href="#cite_note-:3-7"><span data-dcnode-id="3004" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3001" instrument_node=""> Youkins states that the system of individual liberty inherent within democratic capitalism supports the creation of </span><a data-dcnode-id="2999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voluntary_association" title="Voluntary association"><span data-dcnode-id="3000" instrument_node="">voluntary associations</span></a><span data-dcnode-id="2998" instrument_node="">, such as </span><a data-dcnode-id="2996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trade_union" title="Trade union"><span data-dcnode-id="2997" instrument_node="">labour unions</span></a><span data-dcnode-id="2995" instrument_node="">.</span><sup class="reference" data-dcnode-id="2992" id="cite_ref-:3_7-1"><a data-dcnode-id="2993" href="#cite_note-:3-7"><span data-dcnode-id="2994" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2991" instrument_node="">
</span></p><p data-dcnode-id="2973"><span data-dcnode-id="2989" instrument_node="">Philosopher and writer </span><a data-dcnode-id="2987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Novak" title="Michael Novak"><span data-dcnode-id="2988" instrument_node="">Michael Novak</span></a><span data-dcnode-id="2986" instrument_node=""> characterised democratic capitalism as a blend of a free-market economy, a limited democratic government, and moral-cultural system with an emphasis on personal freedom.</span><sup class="reference" data-dcnode-id="2983" id="cite_ref-:4_8-0"><a data-dcnode-id="2984" href="#cite_note-:4-8"><span data-dcnode-id="2985" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2982" instrument_node=""> Novak comments that capitalism is a necessary, but not a sufficient condition of democracy.</span><sup class="reference" data-dcnode-id="2979" id="cite_ref-:4_8-1"><a data-dcnode-id="2980" href="#cite_note-:4-8"><span data-dcnode-id="2981" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2978" instrument_node=""> He also proposes that the prominence of democratic capitalism in a society is strongly determined by the religious concepts which drive its customs, institutions, and leaders.</span><sup class="reference" data-dcnode-id="2975" id="cite_ref-9"><a data-dcnode-id="2976" href="#cite_note-9"><span data-dcnode-id="2977" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2974" instrument_node="">
</span></p><span data-dcnode-id="2972" instrument_node="">
</span><h2 data-dcnode-id="2962"><span class="mw-headline" data-dcnode-id="2970" id="History"><span data-dcnode-id="2971" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="2963"><span class="mw-editsection-bracket" data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">[</span></span><a data-dcnode-id="2966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratic_capitalism%26action%3Dedit%26section%3D2" title="Edit section: History"><span data-dcnode-id="2967" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2961" instrument_node="">
</span><h3 data-dcnode-id="2951"><span class="mw-headline" data-dcnode-id="2959" id="Early_to_mid-20th_century"><span data-dcnode-id="2960" instrument_node="">Early to mid-20th century</span></span><span class="mw-editsection" data-dcnode-id="2952"><span class="mw-editsection-bracket" data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">[</span></span><a data-dcnode-id="2955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratic_capitalism%26action%3Dedit%26section%3D3" title="Edit section: Early to mid-20th century"><span data-dcnode-id="2956" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2950" instrument_node="">
</span><p data-dcnode-id="2922"><span data-dcnode-id="2949" instrument_node="">The development of democratic capitalism was influenced by several historical factors, including the rapid </span><a data-dcnode-id="2947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_growth" title="Economic growth"><span data-dcnode-id="2948" instrument_node="">economic growth</span></a><span data-dcnode-id="2946" instrument_node=""> following </span><a data-dcnode-id="2944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I" title="World War I"><span data-dcnode-id="2945" instrument_node="">World War One</span></a><span data-dcnode-id="2943" instrument_node="">, the </span><a data-dcnode-id="2941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Depression" title="Great Depression"><span data-dcnode-id="2942" instrument_node="">Great Depression</span></a><span data-dcnode-id="2940" instrument_node="">, and the political and economic ramifications of </span><a data-dcnode-id="2938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="2939" instrument_node="">World War Two</span></a><span data-dcnode-id="2937" instrument_node="">.</span><sup class="reference" data-dcnode-id="2934" id="cite_ref-:5_10-0"><a data-dcnode-id="2935" href="#cite_note-:5-10"><span data-dcnode-id="2936" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="2931" id="cite_ref-:8_11-0"><a data-dcnode-id="2932" href="#cite_note-:8-11"><span data-dcnode-id="2933" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2930" instrument_node=""> The growing critique of free-market capitalism and the rise of the notion of </span><a data-dcnode-id="2928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_justice" title="Social justice"><span data-dcnode-id="2929" instrument_node="">social justice</span></a><span data-dcnode-id="2927" instrument_node=""> in political debate contributed to the adoption of democratic capitalist policies.</span><sup class="reference" data-dcnode-id="2924" id="cite_ref-:5_10-1"><a data-dcnode-id="2925" href="#cite_note-:5-10"><span data-dcnode-id="2926" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2923" instrument_node="">
</span></p><span data-dcnode-id="2921" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2907"><div class="thumbinner" data-dcnode-id="2908" style="width:222px;"><a class="image" data-dcnode-id="2919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABretton_Woods.jpg"><img alt="" class="thumbimage" data-dcnode-id="2920" data-file-height="1523" data-file-width="2267" decoding="async" height="148" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/52/Bretton_Woods.jpg/220px-Bretton_Woods.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/52/Bretton_Woods.jpg/330px-Bretton_Woods.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/52/Bretton_Woods.jpg/440px-Bretton_Woods.jpg 2x" width="220"></a><span data-dcnode-id="2918" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2909"><div class="magnify" data-dcnode-id="2916"><a class="internal" data-dcnode-id="2917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABretton_Woods.jpg" title="Enlarge"></a></div><a data-dcnode-id="2914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mount_Washington_Hotel" title="Mount Washington Hotel"><span data-dcnode-id="2915" instrument_node="">Mount Washington Hotel</span></a><span data-dcnode-id="2913" instrument_node=""> in </span><a data-dcnode-id="2911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bretton_Woods%2C_New_Hampshire" title="Bretton Woods, New Hampshire"><span data-dcnode-id="2912" instrument_node="">Bretton Woods, New Hampshire</span></a><span data-dcnode-id="2910" instrument_node="">, the location of the Bretton Woods Conference</span></div></div></div><span data-dcnode-id="2906" instrument_node="">
</span><p data-dcnode-id="2869"><span data-dcnode-id="2905" instrument_node="">At the </span><a data-dcnode-id="2903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bretton_Woods_Conference" title="Bretton Woods Conference"><span data-dcnode-id="2904" instrument_node="">Bretton Woods Conference</span></a><span data-dcnode-id="2902" instrument_node=""> of 1944, officials from the United States and the United Kingdom and forty-two other nations committed to </span><a data-dcnode-id="2900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_trade" title="Free trade"><span data-dcnode-id="2901" instrument_node="">trade openness</span></a><span data-dcnode-id="2899" instrument_node="">.</span><sup class="reference" data-dcnode-id="2896" id="cite_ref-:8_11-1"><a data-dcnode-id="2897" href="#cite_note-:8-11"><span data-dcnode-id="2898" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2895" instrument_node=""> This commitment was made in conjunction with international guidelines which guaranteed autonomy for each country in responding to economic and social demands of its voters.</span><sup class="reference" data-dcnode-id="2892" id="cite_ref-:8_11-2"><a data-dcnode-id="2893" href="#cite_note-:8-11"><span data-dcnode-id="2894" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2891" instrument_node=""> Officials requested international </span><a data-dcnode-id="2889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_control" title="Capital control"><span data-dcnode-id="2890" instrument_node="">capital controls</span></a><span data-dcnode-id="2888" instrument_node=""> which would allow governments to regulate their economies while remaining committed to the goals of </span><a data-dcnode-id="2886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Full_employment" title="Full employment"><span data-dcnode-id="2887" instrument_node="">full employment</span></a><span data-dcnode-id="2885" instrument_node=""> and economic growth.</span><sup class="reference" data-dcnode-id="2882" id="cite_ref-:8_11-3"><a data-dcnode-id="2883" href="#cite_note-:8-11"><span data-dcnode-id="2884" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2881" instrument_node=""> The adoption of the </span><a data-dcnode-id="2879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Agreement_on_Tariffs_and_Trade" title="General Agreement on Tariffs and Trade"><span data-dcnode-id="2880" instrument_node="">General Agreement on Tariffs and Trade</span></a><span data-dcnode-id="2878" instrument_node=""> supported free trade, while allowing national governments to retain veto power over trade policy.</span><sup class="reference" data-dcnode-id="2875" id="cite_ref-:8_11-4"><a data-dcnode-id="2876" href="#cite_note-:8-11"><span data-dcnode-id="2877" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2874" instrument_node=""> Such developments saw the incorporation of democratic demands into policies based on capitalist economic logic.</span><sup class="reference" data-dcnode-id="2871" id="cite_ref-:8_11-5"><a data-dcnode-id="2872" href="#cite_note-:8-11"><span data-dcnode-id="2873" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2870" instrument_node="">
</span></p><span data-dcnode-id="2868" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2859"><div class="thumbinner" data-dcnode-id="2860" style="width:222px;"><a class="image" data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGold_Room_Bretton_Woods_Participating_Nations_Display_Case.jpg"><img alt="" class="thumbimage" data-dcnode-id="2867" data-file-height="1344" data-file-width="2240" decoding="async" height="132" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Gold_Room_Bretton_Woods_Participating_Nations_Display_Case.jpg/220px-Gold_Room_Bretton_Woods_Participating_Nations_Display_Case.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Gold_Room_Bretton_Woods_Participating_Nations_Display_Case.jpg/330px-Gold_Room_Bretton_Woods_Participating_Nations_Display_Case.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Gold_Room_Bretton_Woods_Participating_Nations_Display_Case.jpg/440px-Gold_Room_Bretton_Woods_Participating_Nations_Display_Case.jpg 2x" width="220"></a><span data-dcnode-id="2865" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2861"><div class="magnify" data-dcnode-id="2863"><a class="internal" data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGold_Room_Bretton_Woods_Participating_Nations_Display_Case.jpg" title="Enlarge"></a></div><span data-dcnode-id="2862" instrument_node="">A display of the flags of the nations which participated in the Bretton Woods Conference, located in the Gold Room at Mount Washington Hotel</span></div></div></div><span data-dcnode-id="2858" instrument_node="">
</span><p data-dcnode-id="2815"><span data-dcnode-id="2857" instrument_node="">Democratic capitalism was first widely implemented after the Second World War in the Western world, particularly in </span><a data-dcnode-id="2855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_America" title="North America"><span data-dcnode-id="2856" instrument_node="">North America</span></a><span data-dcnode-id="2854" instrument_node=""> and </span><a data-dcnode-id="2852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Europe" title="Western Europe"><span data-dcnode-id="2853" instrument_node="">Western Europe</span></a><span data-dcnode-id="2851" instrument_node="">.</span><sup class="reference" data-dcnode-id="2848" id="cite_ref-:0_1-3"><a data-dcnode-id="2849" href="#cite_note-:0-1"><span data-dcnode-id="2850" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2847" instrument_node=""> Following the severe economic impacts of the war, </span><a data-dcnode-id="2845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Working_class" title="Working class"><span data-dcnode-id="2846" instrument_node="">working classes</span></a><span data-dcnode-id="2844" instrument_node=""> in the Western world were more inclined to accept capitalist markets in conjunction with political democracy, which enabled a level of social security and improved </span><a data-dcnode-id="2842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standard_of_living" title="Standard of living"><span data-dcnode-id="2843" instrument_node="">living standards</span></a><span data-dcnode-id="2841" instrument_node="">.</span><sup class="reference" data-dcnode-id="2838" id="cite_ref-:0_1-4"><a data-dcnode-id="2839" href="#cite_note-:0-1"><span data-dcnode-id="2840" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2837" instrument_node=""> In the post-war decades, democratic capitalist policies saw reduced levels of </span><a data-dcnode-id="2835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_inequality" title="Economic inequality"><span data-dcnode-id="2836" instrument_node="">socioeconomic inequality</span></a><span data-dcnode-id="2834" instrument_node="">.</span><sup class="reference" data-dcnode-id="2831" id="cite_ref-:5_10-2"><a data-dcnode-id="2832" href="#cite_note-:5-10"><span data-dcnode-id="2833" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2830" instrument_node=""> This was synonymous with the expansion of welfare states, more highly regulated </span><a data-dcnode-id="2828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_market" title="Financial market"><span data-dcnode-id="2829" instrument_node="">financial</span></a><span data-dcnode-id="2827" instrument_node=""> and </span><a data-dcnode-id="2825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_economics" title="Labour economics"><span data-dcnode-id="2826" instrument_node="">labour markets</span></a><span data-dcnode-id="2824" instrument_node="">, and increased political power of labour unions.</span><sup class="reference" data-dcnode-id="2821" id="cite_ref-:5_10-3"><a data-dcnode-id="2822" href="#cite_note-:5-10"><span data-dcnode-id="2823" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2820" instrument_node=""> According to political scientist Wolfgang Merkel,&nbsp;democracy and capitalism coexisted with more complementarity at this time than at any other point in history.</span><sup class="reference" data-dcnode-id="2817" id="cite_ref-:5_10-4"><a data-dcnode-id="2818" href="#cite_note-:5-10"><span data-dcnode-id="2819" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2816" instrument_node="">
</span></p><p data-dcnode-id="2763"><span data-dcnode-id="2814" instrument_node="">Policy makers in Europe and </span><a data-dcnode-id="2812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asia" title="Asia"><span data-dcnode-id="2813" instrument_node="">Asia</span></a><span data-dcnode-id="2811" instrument_node=""> adopted democratic capitalist policies in an attempt to satisfy the social needs of their voters and respond to the challenge of </span><a data-dcnode-id="2809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communism" title="Communism"><span data-dcnode-id="2810" instrument_node="">communism</span></a><span data-dcnode-id="2808" instrument_node="">.</span><sup class="reference" data-dcnode-id="2805" id="cite_ref-:7_5-2"><a data-dcnode-id="2806" href="#cite_note-:7-5"><span data-dcnode-id="2807" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2804" instrument_node=""> The policies implemented supported the public provision of </span><a data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Health_care" title="Health care"><span data-dcnode-id="2803" instrument_node="">medical care</span></a><span data-dcnode-id="2801" instrument_node="">, improved </span><a data-dcnode-id="2799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_housing" title="Public housing"><span data-dcnode-id="2800" instrument_node="">public housing</span></a><span data-dcnode-id="2798" instrument_node="">, aged care, and more accessible education.</span><sup class="reference" data-dcnode-id="2795" id="cite_ref-:7_5-3"><a data-dcnode-id="2796" href="#cite_note-:7-5"><span data-dcnode-id="2797" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2794" instrument_node=""> Guarantees of full employment and the support of private research and innovation became priorities of policy makers.</span><sup class="reference" data-dcnode-id="2791" id="cite_ref-:7_5-4"><a data-dcnode-id="2792" href="#cite_note-:7-5"><span data-dcnode-id="2793" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2790" instrument_node=""> Policy developments were based on the rising notion that free markets required some state intervention to maintain them, provide structure, and address social inequities caused by them.</span><sup class="reference" data-dcnode-id="2787" id="cite_ref-:7_5-5"><a data-dcnode-id="2788" href="#cite_note-:7-5"><span data-dcnode-id="2789" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2786" instrument_node=""> Governments around the world regulated existing markets in an attempt to increase their equity and effectiveness.</span><sup class="reference" data-dcnode-id="2783" id="cite_ref-:7_5-6"><a data-dcnode-id="2784" href="#cite_note-:7-5"><span data-dcnode-id="2785" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2782" instrument_node=""> In order to stabilise the </span><a data-dcnode-id="2780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Business_cycle" title="Business cycle"><span data-dcnode-id="2781" instrument_node="">business cycle</span></a><span data-dcnode-id="2779" instrument_node="">, the role of government was reconceived by anticommunist leaders in Britain, France, Italy, Germany, Scandinavia, and Japan.</span><sup class="reference" data-dcnode-id="2776" id="cite_ref-:7_5-7"><a data-dcnode-id="2777" href="#cite_note-:7-5"><span data-dcnode-id="2778" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2775" instrument_node=""> An emphasis was placed on supporting economic growth, promoting innovation, and enhancing living standards.</span><sup class="reference" data-dcnode-id="2772" id="cite_ref-:7_5-8"><a data-dcnode-id="2773" href="#cite_note-:7-5"><span data-dcnode-id="2774" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2771" instrument_node=""> This saw the expansion of educational opportunities and public </span><a data-dcnode-id="2769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Insurance" title="Insurance"><span data-dcnode-id="2770" instrument_node="">insurance</span></a><span data-dcnode-id="2768" instrument_node=""> of basic health and aged benefits.</span><sup class="reference" data-dcnode-id="2765" id="cite_ref-:7_5-9"><a data-dcnode-id="2766" href="#cite_note-:7-5"><span data-dcnode-id="2767" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2764" instrument_node="">
</span></p><span data-dcnode-id="2762" instrument_node="">
</span><h4 data-dcnode-id="2752"><span class="mw-headline" data-dcnode-id="2760" id="United_States"><span data-dcnode-id="2761" instrument_node="">United States</span></span><span class="mw-editsection" data-dcnode-id="2753"><span class="mw-editsection-bracket" data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">[</span></span><a data-dcnode-id="2756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratic_capitalism%26action%3Dedit%26section%3D4" title="Edit section: United States"><span data-dcnode-id="2757" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2751" instrument_node="">
</span><p data-dcnode-id="2727"><span data-dcnode-id="2750" instrument_node="">As automated production expanded in the United States, demand for semi skilled workers increased.</span><sup class="reference" data-dcnode-id="2747" id="cite_ref-:8_11-6"><a data-dcnode-id="2748" href="#cite_note-:8-11"><span data-dcnode-id="2749" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2746" instrument_node=""> Combined with the expansion of </span><a data-dcnode-id="2744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secondary_education" title="Secondary education"><span data-dcnode-id="2745" instrument_node="">secondary education</span></a><span data-dcnode-id="2743" instrument_node="">, this saw the development of a large </span><a data-dcnode-id="2741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Working_class" title="Working class"><span data-dcnode-id="2742" instrument_node="">working class</span></a><span data-dcnode-id="2740" instrument_node="">.</span><sup class="reference" data-dcnode-id="2737" id="cite_ref-:8_11-7"><a data-dcnode-id="2738" href="#cite_note-:8-11"><span data-dcnode-id="2739" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2736" instrument_node=""> The resulting strong economic growth and improved income equality allowed for greater social peace and universal suffrage.</span><sup class="reference" data-dcnode-id="2733" id="cite_ref-:8_11-8"><a data-dcnode-id="2734" href="#cite_note-:8-11"><span data-dcnode-id="2735" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2732" instrument_node=""> Capitalism was viewed as a means of producing the wealth which maintained political freedom, while a democratic government ensured accountable political institutions and an educated labour force with its basic rights fulfilled.</span><sup class="reference" data-dcnode-id="2729" id="cite_ref-:8_11-9"><a data-dcnode-id="2730" href="#cite_note-:8-11"><span data-dcnode-id="2731" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2728" instrument_node="">
</span></p><span data-dcnode-id="2726" instrument_node="">
</span><h4 data-dcnode-id="2716"><span class="mw-headline" data-dcnode-id="2724" id="Europe"><span data-dcnode-id="2725" instrument_node="">Europe</span></span><span class="mw-editsection" data-dcnode-id="2717"><span class="mw-editsection-bracket" data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">[</span></span><a data-dcnode-id="2720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratic_capitalism%26action%3Dedit%26section%3D5" title="Edit section: Europe"><span data-dcnode-id="2721" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2715" instrument_node="">
</span><p data-dcnode-id="2699"><span data-dcnode-id="2714" instrument_node="">In the postwar period, free market economic systems with political systems of democracy and welfare states were established in France and Germany.</span><sup class="reference" data-dcnode-id="2711" id="cite_ref-:8_11-10"><a data-dcnode-id="2712" href="#cite_note-:8-11"><span data-dcnode-id="2713" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2710" instrument_node=""> This occurred under the leadership of the </span><a data-dcnode-id="2708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Popular_Republican_Movement" title="Popular Republican Movement"><span data-dcnode-id="2709" instrument_node="">Popular Republican Movement</span></a><span data-dcnode-id="2707" instrument_node=""> in France and the </span><a data-dcnode-id="2705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian_Democratic_Union_of_Germany" title="Christian Democratic Union of Germany"><span data-dcnode-id="2706" instrument_node="">Christian Democratic Union</span></a><span data-dcnode-id="2704" instrument_node=""> in Germany.</span><sup class="reference" data-dcnode-id="2701" id="cite_ref-:8_11-11"><a data-dcnode-id="2702" href="#cite_note-:8-11"><span data-dcnode-id="2703" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2700" instrument_node="">
</span></p><span data-dcnode-id="2698" instrument_node="">
</span><h3 data-dcnode-id="2688"><span class="mw-headline" data-dcnode-id="2696" id="Late_20th_century"><span data-dcnode-id="2697" instrument_node="">Late 20th century</span></span><span class="mw-editsection" data-dcnode-id="2689"><span class="mw-editsection-bracket" data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">[</span></span><a data-dcnode-id="2692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratic_capitalism%26action%3Dedit%26section%3D6" title="Edit section: Late 20th century"><span data-dcnode-id="2693" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2687" instrument_node="">
</span><p data-dcnode-id="2655"><span data-dcnode-id="2686" instrument_node="">Following the </span><a data-dcnode-id="2684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1970s_energy_crisis" title="1970s energy crisis"><span data-dcnode-id="2685" instrument_node="">oil shocks of the 1970s</span></a><span data-dcnode-id="2683" instrument_node=""> and the </span><a data-dcnode-id="2681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Productivity_paradox" title="Productivity paradox"><span data-dcnode-id="2682" instrument_node="">productivity slowdown</span></a><span data-dcnode-id="2680" instrument_node=""> in the United States in the 1980s, politicians and voters maintained strong support for democratic capitalist policies and free markets.</span><sup class="reference" data-dcnode-id="2677" id="cite_ref-:8_11-12"><a data-dcnode-id="2678" href="#cite_note-:8-11"><span data-dcnode-id="2679" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2676" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="2674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globalisation" title="Globalisation"><span data-dcnode-id="2675" instrument_node="">Globalisation</span></a><span data-dcnode-id="2673" instrument_node=""> and free trade were promoted as a means of boosting economic growth, and this saw the formation of the </span><a data-dcnode-id="2671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_American_Free_Trade_Agreement" title="North American Free Trade Agreement"><span data-dcnode-id="2672" instrument_node="">North American Free Trade Agreement</span></a><span data-dcnode-id="2670" instrument_node=""> and the </span><a data-dcnode-id="2668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="2669" instrument_node="">European Union</span></a><span data-dcnode-id="2667" instrument_node="">.</span><sup class="reference" data-dcnode-id="2664" id="cite_ref-:8_11-13"><a data-dcnode-id="2665" href="#cite_note-:8-11"><span data-dcnode-id="2666" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2663" instrument_node=""> Labour market and competition regulations were eased in existing free-market economies, particularly in </span><a data-dcnode-id="2661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglo-America" title="Anglo-America"><span data-dcnode-id="2662" instrument_node="">Anglo-America</span></a><span data-dcnode-id="2660" instrument_node="">.</span><sup class="reference" data-dcnode-id="2657" id="cite_ref-:8_11-14"><a data-dcnode-id="2658" href="#cite_note-:8-11"><span data-dcnode-id="2659" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2656" instrument_node="">
</span></p><p data-dcnode-id="2605"><span data-dcnode-id="2654" instrument_node="">Rapid technological innovation and globalisation brought widespread international economic change.</span><sup class="reference" data-dcnode-id="2651" id="cite_ref-:8_11-15"><a data-dcnode-id="2652" href="#cite_note-:8-11"><span data-dcnode-id="2653" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2650" instrument_node=""> Publicly funded democratic capitalist policies were designed and implemented to compensate individuals negatively affected by major, structural economic change.</span><sup class="reference" data-dcnode-id="2647" id="cite_ref-:8_11-16"><a data-dcnode-id="2648" href="#cite_note-:8-11"><span data-dcnode-id="2649" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2646" instrument_node=""> Implemented beginning in the early years of the </span><a data-dcnode-id="2644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="2645" instrument_node="">Cold War</span></a><span data-dcnode-id="2643" instrument_node="">, such policies included </span><a data-dcnode-id="2641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unemployment_benefits" title="Unemployment benefits"><span data-dcnode-id="2642" instrument_node="">unemployment benefits</span></a><span data-dcnode-id="2640" instrument_node="">, universal or partially </span><a data-dcnode-id="2638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_health_care" title="Universal health care"><span data-dcnode-id="2639" instrument_node="">universal healthcare</span></a><span data-dcnode-id="2637" instrument_node="">, and aged pensions.</span><sup class="reference" data-dcnode-id="2634" id="cite_ref-:8_11-17"><a data-dcnode-id="2635" href="#cite_note-:8-11"><span data-dcnode-id="2636" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2633" instrument_node=""> Post-1970s, the number of public sector jobs available expanded.</span><sup class="reference" data-dcnode-id="2630" id="cite_ref-:8_11-18"><a data-dcnode-id="2631" href="#cite_note-:8-11"><span data-dcnode-id="2632" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2629" instrument_node=""> Ageing populations in Europe, Japan and North America saw large increases in public spending on </span><a data-dcnode-id="2627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pension" title="Pension"><span data-dcnode-id="2628" instrument_node="">pensions</span></a><span data-dcnode-id="2626" instrument_node=""> and healthcare.</span><sup class="reference" data-dcnode-id="2623" id="cite_ref-:8_11-19"><a data-dcnode-id="2624" href="#cite_note-:8-11"><span data-dcnode-id="2625" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2622" instrument_node=""> In the 1980s, </span><a data-dcnode-id="2620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/OECD" title="OECD"><span data-dcnode-id="2621" instrument_node="">Organisation for Economic Co-operation and Development</span></a><span data-dcnode-id="2619" instrument_node=""> economies began reducing </span><a data-dcnode-id="2617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corporate_tax" title="Corporate tax"><span data-dcnode-id="2618" instrument_node="">corporate taxation</span></a><span data-dcnode-id="2616" instrument_node="">, though personal </span><a data-dcnode-id="2614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Income_tax" title="Income tax"><span data-dcnode-id="2615" instrument_node="">income taxes</span></a><span data-dcnode-id="2613" instrument_node=""> and public spending on </span><a class="mw-redirect" data-dcnode-id="2611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_security" title="Social security"><span data-dcnode-id="2612" instrument_node="">social security</span></a><span data-dcnode-id="2610" instrument_node=""> programs generally remained stable.</span><sup class="reference" data-dcnode-id="2607" id="cite_ref-:8_11-20"><a data-dcnode-id="2608" href="#cite_note-:8-11"><span data-dcnode-id="2609" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2606" instrument_node="">
</span></p><p data-dcnode-id="2595"><span data-dcnode-id="2604" instrument_node="">Large-scale innovation in production technology throughout the 20th century had widespread economic benefits in many capitalist economies.</span><sup class="reference" data-dcnode-id="2601" id="cite_ref-:8_11-21"><a data-dcnode-id="2602" href="#cite_note-:8-11"><span data-dcnode-id="2603" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2600" instrument_node=""> These benefits contributed to the conciliation of democratic politics and free markets and the widespread acceptance of democratic capitalist policies by voters.</span><sup class="reference" data-dcnode-id="2597" id="cite_ref-:8_11-22"><a data-dcnode-id="2598" href="#cite_note-:8-11"><span data-dcnode-id="2599" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2596" instrument_node="">
</span></p><p data-dcnode-id="2589"><span data-dcnode-id="2594" instrument_node="">From the late 20th century, the tenets of democratic capitalism expanded more broadly beyond North America and Western Europe.</span><sup class="reference" data-dcnode-id="2591" id="cite_ref-:9_12-0"><a data-dcnode-id="2592" href="#cite_note-:9-12"><span data-dcnode-id="2593" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2590" instrument_node="">
</span></p><span data-dcnode-id="2588" instrument_node="">
</span><h4 data-dcnode-id="2578"><span class="mw-headline" data-dcnode-id="2586" id="United_States_2"><span data-dcnode-id="2587" instrument_node="">United States</span></span><span class="mw-editsection" data-dcnode-id="2579"><span class="mw-editsection-bracket" data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">[</span></span><a data-dcnode-id="2582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratic_capitalism%26action%3Dedit%26section%3D7" title="Edit section: United States"><span data-dcnode-id="2583" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2577" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2568"><div class="thumbinner" data-dcnode-id="2569" style="width:222px;"><a class="image" data-dcnode-id="2575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOfficial_Portrait_of_President_Reagan_1981.jpg"><img alt="" class="thumbimage" data-dcnode-id="2576" data-file-height="3000" data-file-width="2399" decoding="async" height="275" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/16/Official_Portrait_of_President_Reagan_1981.jpg/220px-Official_Portrait_of_President_Reagan_1981.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/16/Official_Portrait_of_President_Reagan_1981.jpg/330px-Official_Portrait_of_President_Reagan_1981.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/16/Official_Portrait_of_President_Reagan_1981.jpg/440px-Official_Portrait_of_President_Reagan_1981.jpg 2x" width="220"></a><span data-dcnode-id="2574" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2570"><div class="magnify" data-dcnode-id="2572"><a class="internal" data-dcnode-id="2573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOfficial_Portrait_of_President_Reagan_1981.jpg" title="Enlarge"></a></div><span data-dcnode-id="2571" instrument_node="">Ronald Reagan, 40th president of the United States</span></div></div></div><span data-dcnode-id="2567" instrument_node="">
</span><p data-dcnode-id="2531"><span data-dcnode-id="2566" instrument_node="">After taking office as president in 1981, </span><a data-dcnode-id="2564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Reagan" title="Ronald Reagan"><span data-dcnode-id="2565" instrument_node="">Ronald Reagan</span></a><span data-dcnode-id="2563" instrument_node=""> advocated for a reduced role of government in the economy, while responding to voters’ skepticism of liberal capitalism by maintaining strong public sector spending.</span><sup class="reference" data-dcnode-id="2560" id="cite_ref-:7_5-10"><a data-dcnode-id="2561" href="#cite_note-:7-5"><span data-dcnode-id="2562" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2559" instrument_node=""> Many voters doubted the ability of free market capitalism to provide consistent peace, security and opportunity, and sought improved living standards, </span><a data-dcnode-id="2557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elderly_care" title="Elderly care"><span data-dcnode-id="2558" instrument_node="">aged care</span></a><span data-dcnode-id="2556" instrument_node="">, and educational opportunities for youth.</span><sup class="reference" data-dcnode-id="2553" id="cite_ref-:7_5-11"><a data-dcnode-id="2554" href="#cite_note-:7-5"><span data-dcnode-id="2555" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2552" instrument_node=""> The Reagan administration maintained previous levels of government expenditure on </span><a data-dcnode-id="2550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_Security_%28United_States%29" title="Social Security (United States)"><span data-dcnode-id="2551" instrument_node="">Social Security</span></a><span data-dcnode-id="2549" instrument_node=""> and </span><a data-dcnode-id="2547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medicare_%28United_States%29" title="Medicare (United States)"><span data-dcnode-id="2548" instrument_node="">Medicare</span></a><span data-dcnode-id="2546" instrument_node=""> as a proportion of </span><a data-dcnode-id="2544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gross_domestic_product" title="Gross domestic product"><span data-dcnode-id="2545" instrument_node="">gross domestic product</span></a><span data-dcnode-id="2543" instrument_node=""> (GDP).</span><sup class="reference" data-dcnode-id="2540" id="cite_ref-:7_5-12"><a data-dcnode-id="2541" href="#cite_note-:7-5"><span data-dcnode-id="2542" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2539" instrument_node=""> Total government expenditure levels as a percentage of GDP also remained stable under the </span><a data-dcnode-id="2537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Presidency_of_Ronald_Reagan" title="Presidency of Ronald Reagan"><span data-dcnode-id="2538" instrument_node="">Reagan administration</span></a><span data-dcnode-id="2536" instrument_node="">.</span><sup class="reference" data-dcnode-id="2533" id="cite_ref-:7_5-13"><a data-dcnode-id="2534" href="#cite_note-:7-5"><span data-dcnode-id="2535" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2532" instrument_node="">
</span></p><span data-dcnode-id="2530" instrument_node="">
</span><h4 data-dcnode-id="2520"><span class="mw-headline" data-dcnode-id="2528" id="Europe_2"><span data-dcnode-id="2529" instrument_node="">Europe</span></span><span class="mw-editsection" data-dcnode-id="2521"><span class="mw-editsection-bracket" data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">[</span></span><a data-dcnode-id="2524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratic_capitalism%26action%3Dedit%26section%3D8" title="Edit section: Europe"><span data-dcnode-id="2525" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2519" instrument_node="">
</span><p data-dcnode-id="2496"><span data-dcnode-id="2518" instrument_node="">From the mid-1980s, European leaders began endorsing </span><a class="mw-redirect" data-dcnode-id="2516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neoliberal" title="Neoliberal"><span data-dcnode-id="2517" instrument_node="">neoliberal</span></a><span data-dcnode-id="2515" instrument_node=""> ideas, such as those associated with </span><a data-dcnode-id="2513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reaganomics" title="Reaganomics"><span data-dcnode-id="2514" instrument_node="">Reaganomics</span></a><span data-dcnode-id="2512" instrument_node=""> and </span><a data-dcnode-id="2510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thatcherism" title="Thatcherism"><span data-dcnode-id="2511" instrument_node="">Thatcherism</span></a><span data-dcnode-id="2509" instrument_node="">, based on the notion of the interdependence of economic and social policy.</span><sup class="reference" data-dcnode-id="2506" id="cite_ref-:9_12-1"><a data-dcnode-id="2507" href="#cite_note-:9-12"><span data-dcnode-id="2508" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2505" instrument_node=""> In this context, European competition law policy developed as a method of curbing the excesses of capitalism, while aligning the economy of the European Union with the existing democratic ideals of European society.</span><sup class="reference" data-dcnode-id="2502" id="cite_ref-:9_12-2"><a data-dcnode-id="2503" href="#cite_note-:9-12"><span data-dcnode-id="2504" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2501" instrument_node=""> This saw the advancement of democratic capitalism throughout the European region.</span><sup class="reference" data-dcnode-id="2498" id="cite_ref-:9_12-3"><a data-dcnode-id="2499" href="#cite_note-:9-12"><span data-dcnode-id="2500" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2497" instrument_node="">
</span></p><span data-dcnode-id="2495" instrument_node="">
</span><h4 data-dcnode-id="2485"><span class="mw-headline" data-dcnode-id="2493" id="South_Africa"><span data-dcnode-id="2494" instrument_node="">South Africa</span></span><span class="mw-editsection" data-dcnode-id="2486"><span class="mw-editsection-bracket" data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">[</span></span><a data-dcnode-id="2489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratic_capitalism%26action%3Dedit%26section%3D9" title="Edit section: South Africa"><span data-dcnode-id="2490" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2484" instrument_node="">
</span><p data-dcnode-id="2475"><span data-dcnode-id="2483" instrument_node="">The South African Competition Act of 1998 prioritised the eradication of </span><a data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-competitive_practices" title="Anti-competitive practices"><span data-dcnode-id="2482" instrument_node="">anticompetitive</span></a><span data-dcnode-id="2480" instrument_node=""> business practices and the free participation in the economy of all citizens, while maintaining a pro-free-market economy.</span><sup class="reference" data-dcnode-id="2477" id="cite_ref-:1_4-2"><a data-dcnode-id="2478" href="#cite_note-:1-4"><span data-dcnode-id="2479" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2476" instrument_node="">
</span></p><span data-dcnode-id="2474" instrument_node="">
</span><h3 data-dcnode-id="2464"><span class="mw-headline" data-dcnode-id="2472" id="Early_21st_century"><span data-dcnode-id="2473" instrument_node="">Early 21st century</span></span><span class="mw-editsection" data-dcnode-id="2465"><span class="mw-editsection-bracket" data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">[</span></span><a data-dcnode-id="2468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratic_capitalism%26action%3Dedit%26section%3D10" title="Edit section: Early 21st century"><span data-dcnode-id="2469" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2463" instrument_node="">
</span><h4 data-dcnode-id="2453"><span class="mw-headline" data-dcnode-id="2461" id="India"><span data-dcnode-id="2462" instrument_node="">India</span></span><span class="mw-editsection" data-dcnode-id="2454"><span class="mw-editsection-bracket" data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">[</span></span><a data-dcnode-id="2457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratic_capitalism%26action%3Dedit%26section%3D11" title="Edit section: India"><span data-dcnode-id="2458" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2452" instrument_node="">
</span><p data-dcnode-id="2440"><span data-dcnode-id="2451" instrument_node="">India enacted the </span><a data-dcnode-id="2449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Competition_Act%2C_2002" title="The Competition Act, 2002"><span data-dcnode-id="2450" instrument_node="">Competition Act, 2002</span></a><span data-dcnode-id="2448" instrument_node=""> to promote and sustain competition and protect the </span><a data-dcnode-id="2446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Welfare" title="Welfare"><span data-dcnode-id="2447" instrument_node="">welfare</span></a><span data-dcnode-id="2445" instrument_node=""> of market participants, goals synonymous with democratic capitalism.</span><sup class="reference" data-dcnode-id="2442" id="cite_ref-:1_4-3"><a data-dcnode-id="2443" href="#cite_note-:1-4"><span data-dcnode-id="2444" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2441" instrument_node="">
</span></p><span data-dcnode-id="2439" instrument_node="">
</span><h2 data-dcnode-id="2429"><span class="mw-headline" data-dcnode-id="2437" id="Implementation"><span data-dcnode-id="2438" instrument_node="">Implementation</span></span><span class="mw-editsection" data-dcnode-id="2430"><span class="mw-editsection-bracket" data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">[</span></span><a data-dcnode-id="2433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratic_capitalism%26action%3Dedit%26section%3D12" title="Edit section: Implementation"><span data-dcnode-id="2434" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2428" instrument_node="">
</span><p data-dcnode-id="2422"><span data-dcnode-id="2427" instrument_node="">The post-war implementation of democratic capitalism saw the expansion of welfare states and the free collective bargaining rights of employees, alongside market policies designed to ensure full employment.</span><sup class="reference" data-dcnode-id="2424" id="cite_ref-:0_1-5"><a data-dcnode-id="2425" href="#cite_note-:0-1"><span data-dcnode-id="2426" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2423" instrument_node="">
</span></p><p data-dcnode-id="2409"><span data-dcnode-id="2421" instrument_node="">Under democratic capitalism, an autonomous democratic state enacts of policies which in effect create a compromise between upper and lower classes, while remaining compatible with free-market capitalism.</span><sup class="reference" data-dcnode-id="2418" id="cite_ref-:10_13-0"><a data-dcnode-id="2419" href="#cite_note-:10-13"><span data-dcnode-id="2420" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2417" instrument_node=""> Such policies include the establishment or expansion of a welfare state, as a method of mediating </span><a data-dcnode-id="2415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Class_conflict" title="Class conflict"><span data-dcnode-id="2416" instrument_node="">social class conflict</span></a><span data-dcnode-id="2414" instrument_node=""> and catering to the demands of workers.</span><sup class="reference" data-dcnode-id="2411" id="cite_ref-:10_13-1"><a data-dcnode-id="2412" href="#cite_note-:10-13"><span data-dcnode-id="2413" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2410" instrument_node="">
</span></p><p data-dcnode-id="2389"><span data-dcnode-id="2408" instrument_node="">The system is characterised by the establishment of </span><a class="mw-redirect" data-dcnode-id="2406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cooperative_economic" title="Cooperative economic"><span data-dcnode-id="2407" instrument_node="">cooperative economic</span></a><span data-dcnode-id="2405" instrument_node=""> institutions.</span><sup class="reference" data-dcnode-id="2402" id="cite_ref-:11_14-0"><a data-dcnode-id="2403" href="#cite_note-:11-14"><span data-dcnode-id="2404" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2401" instrument_node=""> This includes institutions which facilitate bargaining between government bodies and business and labour organisations such as unions, and those which regulate the relationships between employees and management within private firms.</span><sup class="reference" data-dcnode-id="2398" id="cite_ref-:11_14-1"><a data-dcnode-id="2399" href="#cite_note-:11-14"><span data-dcnode-id="2400" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2397" instrument_node=""> The development of institutions to promote cooperation among public and private economic entities acknowledges the benefits of market competition, while attempting to address the social problems of </span><a data-dcnode-id="2395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laissez-faire" title="Laissez-faire"><span data-dcnode-id="2396" instrument_node="">unrestrained capitalism</span></a><span data-dcnode-id="2394" instrument_node="">.</span><sup class="reference" data-dcnode-id="2391" id="cite_ref-:11_14-2"><a data-dcnode-id="2392" href="#cite_note-:11-14"><span data-dcnode-id="2393" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2390" instrument_node="">
</span></p><p data-dcnode-id="2370"><a data-dcnode-id="2387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_security" title="Economic security"><span data-dcnode-id="2388" instrument_node="">Economic security</span></a><span data-dcnode-id="2386" instrument_node=""> concerns of citizens are addressed through redistributive policies.</span><sup class="reference" data-dcnode-id="2383" id="cite_ref-:11_14-3"><a data-dcnode-id="2384" href="#cite_note-:11-14"><span data-dcnode-id="2385" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2382" instrument_node=""> Such policies include income transfers, such as welfare payment programs and pensions, to support the financial needs of the elderly and the poor.</span><sup class="reference" data-dcnode-id="2379" id="cite_ref-:11_14-4"><a data-dcnode-id="2380" href="#cite_note-:11-14"><span data-dcnode-id="2381" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2378" instrument_node=""> Other policies which promote economic security include </span><a data-dcnode-id="2376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_insurance" title="Social insurance"><span data-dcnode-id="2377" instrument_node="">social insurance</span></a><span data-dcnode-id="2375" instrument_node="">, and the fiscal financing of education and job training programs to stimulate employment.</span><sup class="reference" data-dcnode-id="2372" id="cite_ref-:11_14-5"><a data-dcnode-id="2373" href="#cite_note-:11-14"><span data-dcnode-id="2374" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2371" instrument_node="">
</span></p><p data-dcnode-id="2357"><span data-dcnode-id="2369" instrument_node="">The right to private ownership of productive property is a central tenet of democratic capitalism, and is recognized as a basic liberty of all democratic citizens, as in a regular free-market capitalist economy.</span><sup class="reference" data-dcnode-id="2366" id="cite_ref-:6_15-0"><a data-dcnode-id="2367" href="#cite_note-:6-15"><span data-dcnode-id="2368" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2365" instrument_node=""> According to political philosopher John Tomasi, democratic capitalism addresses social entitlement and justice concerns through the preservation of citizens’ private </span><a data-dcnode-id="2363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Property_rights_%28economics%29" title="Property rights (economics)"><span data-dcnode-id="2364" instrument_node="">property rights</span></a><span data-dcnode-id="2362" instrument_node="">, allowing citizens to be “free, equal, and self-governing”.</span><sup class="reference" data-dcnode-id="2359" id="cite_ref-:6_15-1"><a data-dcnode-id="2360" href="#cite_note-:6-15"><span data-dcnode-id="2361" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2358" instrument_node="">
</span></p><p data-dcnode-id="2330"><span data-dcnode-id="2356" instrument_node="">The robust competitiveness and sustainable entrepreneurship which define democratic capitalism are characterised by </span><a data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Top-down_and_bottom-up_design" title="Top-down and bottom-up design"><span data-dcnode-id="2355" instrument_node="">top-down policies and bottom-up initiatives</span></a><span data-dcnode-id="2353" instrument_node=""> implemented by democratic governments.</span><sup class="reference" data-dcnode-id="2350" id="cite_ref-:2_6-1"><a data-dcnode-id="2351" href="#cite_note-:2-6"><span data-dcnode-id="2352" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2349" instrument_node=""> Top-down policies are planned and implemented by formal leaders in an organisation, while bottom-up policies involve gradual change initiated and sustained by lower-level members of organisations.</span><sup class="reference" data-dcnode-id="2346" id="cite_ref-16"><a data-dcnode-id="2347" href="#cite_note-16"><span data-dcnode-id="2348" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2345" instrument_node=""> Policies implemented are designed to incentivise public and private sector innovation.</span><sup class="reference" data-dcnode-id="2342" id="cite_ref-:2_6-2"><a data-dcnode-id="2343" href="#cite_note-:2-6"><span data-dcnode-id="2344" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2341" instrument_node=""> Examples include strong </span><a data-dcnode-id="2339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Research_and_development" title="Research and development"><span data-dcnode-id="2340" instrument_node="">research and development</span></a><span data-dcnode-id="2338" instrument_node=""> funding, and policies which protect </span><a data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intellectual_property" title="Intellectual property"><span data-dcnode-id="2337" instrument_node="">intellectual property</span></a><span data-dcnode-id="2335" instrument_node=""> rights.</span><sup class="reference" data-dcnode-id="2332" id="cite_ref-:2_6-3"><a data-dcnode-id="2333" href="#cite_note-:2-6"><span data-dcnode-id="2334" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2331" instrument_node="">
</span></p><span data-dcnode-id="2329" instrument_node="">
</span><h3 data-dcnode-id="2319"><span class="mw-headline" data-dcnode-id="2327" id="Competition_law"><span data-dcnode-id="2328" instrument_node="">Competition law</span></span><span class="mw-editsection" data-dcnode-id="2320"><span class="mw-editsection-bracket" data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">[</span></span><a data-dcnode-id="2323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratic_capitalism%26action%3Dedit%26section%3D13" title="Edit section: Competition law"><span data-dcnode-id="2324" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2318" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="2312" role="note"><span data-dcnode-id="2315" instrument_node="">See also: </span><a data-dcnode-id="2313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_antitrust_law" title="United States antitrust law"><span data-dcnode-id="2314" instrument_node="">United States antitrust law</span></a></div><span data-dcnode-id="2311" instrument_node="">
</span><link data-dcnode-id="2310" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2306" role="note"><span data-dcnode-id="2309" instrument_node="">Further information: </span><a data-dcnode-id="2307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Competition_law" title="Competition law"><span data-dcnode-id="2308" instrument_node="">Competition law</span></a></div><span data-dcnode-id="2305" instrument_node="">
</span><p data-dcnode-id="2286"><span data-dcnode-id="2304" instrument_node="">A characteristic of democratic capitalist economies is the democratic enactment of laws and </span><a data-dcnode-id="2302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regulation" title="Regulation"><span data-dcnode-id="2303" instrument_node="">regulations</span></a><span data-dcnode-id="2301" instrument_node=""> to support competition. Such laws include United States antitrust laws.</span><sup class="reference" data-dcnode-id="2298" id="cite_ref-:1_4-4"><a data-dcnode-id="2299" href="#cite_note-:1-4"><span data-dcnode-id="2300" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2297" instrument_node=""> Competition laws are designed to regulate </span><a data-dcnode-id="2295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Private_sector" title="Private sector"><span data-dcnode-id="2296" instrument_node="">private sector</span></a><span data-dcnode-id="2294" instrument_node=""> activities, including the actions of </span><a data-dcnode-id="2292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_asset" title="Capital asset"><span data-dcnode-id="2293" instrument_node="">capital asset</span></a><span data-dcnode-id="2291" instrument_node=""> owners and managers, in order to prevent outcomes which are socially undesirable according to the democratic majority.</span><sup class="reference" data-dcnode-id="2288" id="cite_ref-:1_4-5"><a data-dcnode-id="2289" href="#cite_note-:1-4"><span data-dcnode-id="2290" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2287" instrument_node="">
</span></p><p data-dcnode-id="2276"><span data-dcnode-id="2285" instrument_node="">The implementation of competition law is intended to prevent anti-competitive behaviour that is harmful to the welfare of consumers, while maintaining a free market economy.</span><sup class="reference" data-dcnode-id="2282" id="cite_ref-:1_4-6"><a data-dcnode-id="2283" href="#cite_note-:1-4"><span data-dcnode-id="2284" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2281" instrument_node=""> The implementation of antitrust laws was found to be a characteristic of democratic capitalism specifically, and not regular free-market capitalism.</span><sup class="reference" data-dcnode-id="2278" id="cite_ref-:1_4-7"><a data-dcnode-id="2279" href="#cite_note-:1-4"><span data-dcnode-id="2280" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2277" instrument_node="">
</span></p><span data-dcnode-id="2275" instrument_node="">
