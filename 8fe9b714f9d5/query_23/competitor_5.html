</span><h2 data-dcnode-id="2265"><span class="mw-headline" data-dcnode-id="2273" id="Conflicts_between_notions_of_resource_allocation"><span data-dcnode-id="2274" instrument_node="">Conflicts between notions of resource allocation</span></span><span class="mw-editsection" data-dcnode-id="2266"><span class="mw-editsection-bracket" data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">[</span></span><a data-dcnode-id="2269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratic_capitalism%26action%3Dedit%26section%3D14" title="Edit section: Conflicts between notions of resource allocation"><span data-dcnode-id="2270" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2264" instrument_node="">
</span><p data-dcnode-id="2244"><span data-dcnode-id="2263" instrument_node="">According to economic sociologist </span><a data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wolfgang_Streeck" title="Wolfgang Streeck"><span data-dcnode-id="2262" instrument_node="">Wolfgang Streeck</span></a><span data-dcnode-id="2260" instrument_node="">, the capitalist markets and democratic policies that characterise democratic capitalism are inherently conflicting.</span><sup class="reference" data-dcnode-id="2257" id="cite_ref-:0_1-6"><a data-dcnode-id="2258" href="#cite_note-:0-1"><span data-dcnode-id="2259" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2256" instrument_node=""> Streeck suggests that under democratic capitalism, governments tend to neglect policies of resource allocation by marginal productivity in favour of those of resource allocation by social entitlement, or vice versa.</span><sup class="reference" data-dcnode-id="2253" id="cite_ref-:0_1-7"><a data-dcnode-id="2254" href="#cite_note-:0-1"><span data-dcnode-id="2255" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2252" instrument_node=""> In particular, he comments that the accelerating </span><a data-dcnode-id="2250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inflation" title="Inflation"><span data-dcnode-id="2251" instrument_node="">inflation</span></a><span data-dcnode-id="2249" instrument_node=""> of the 1970s in the Western world can be attributed to rising trade-union wage pressure in labour markets and the political priority of full employment, both of which are synonymous with democratic capitalism.</span><sup class="reference" data-dcnode-id="2246" id="cite_ref-:0_1-8"><a data-dcnode-id="2247" href="#cite_note-:0-1"><span data-dcnode-id="2248" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2245" instrument_node="">
</span></p><span data-dcnode-id="2243" instrument_node="">
</span><h2 data-dcnode-id="2233"><span class="mw-headline" data-dcnode-id="2241" id="In_Catholic_social_teaching"><span data-dcnode-id="2242" instrument_node="">In Catholic social teaching</span></span><span class="mw-editsection" data-dcnode-id="2234"><span class="mw-editsection-bracket" data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">[</span></span><a data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocratic_capitalism%26action%3Dedit%26section%3D15" title="Edit section: In Catholic social teaching"><span data-dcnode-id="2238" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2232" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2221"><div class="thumbinner" data-dcnode-id="2222" style="width:222px;"><a class="image" data-dcnode-id="2230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APope_John_Paul_II.jpg"><img alt="" class="thumbimage" data-dcnode-id="2231" data-file-height="520" data-file-width="800" decoding="async" height="143" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/90/Pope_John_Paul_II.jpg/220px-Pope_John_Paul_II.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/90/Pope_John_Paul_II.jpg/330px-Pope_John_Paul_II.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/90/Pope_John_Paul_II.jpg/440px-Pope_John_Paul_II.jpg 2x" width="220"></a><span data-dcnode-id="2229" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2223"><div class="magnify" data-dcnode-id="2227"><a class="internal" data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APope_John_Paul_II.jpg" title="Enlarge"></a></div><span data-dcnode-id="2226" instrument_node="">Pope John Paul II, author of </span><i data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Centesimus annus</span></i></div></div></div><span data-dcnode-id="2220" instrument_node="">
</span><p data-dcnode-id="2167"><span data-dcnode-id="2219" instrument_node="">Catholic texts offer support for a form of socially regulated democratic capitalism.</span><sup class="reference" data-dcnode-id="2216" id="cite_ref-:12_17-0"><a data-dcnode-id="2217" href="#cite_note-:12-17"><span data-dcnode-id="2218" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2215" instrument_node=""> The papal </span><a data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Encyclical" title="Encyclical"><span data-dcnode-id="2214" instrument_node="">encyclical</span></a><span data-dcnode-id="2212" instrument_node=""> </span><i data-dcnode-id="2209"><a data-dcnode-id="2210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Centesimus_annus" title="Centesimus annus"><span data-dcnode-id="2211" instrument_node="">Centesimus annus</span></a></i><span data-dcnode-id="2208" instrument_node="">, written by </span><a data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pope_John_Paul_II" title="Pope John Paul II"><span data-dcnode-id="2207" instrument_node="">Pope John Paul II</span></a><span data-dcnode-id="2205" instrument_node="">, emphasizes a vision of a communitarian form of democratic capitalism.</span><sup class="reference" data-dcnode-id="2202" id="cite_ref-:12_17-1"><a data-dcnode-id="2203" href="#cite_note-:12-17"><span data-dcnode-id="2204" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2201" instrument_node=""> The communitarian system of democratic capitalism described promotes respect for individual rights and basic </span><a data-dcnode-id="2199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labor_rights" title="Labor rights"><span data-dcnode-id="2200" instrument_node="">workers’ rights</span></a><span data-dcnode-id="2198" instrument_node="">, a virtuous community, and a limited role for the state and the market.</span><sup class="reference" data-dcnode-id="2195" id="cite_ref-:12_17-2"><a data-dcnode-id="2196" href="#cite_note-:12-17"><span data-dcnode-id="2197" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2194" instrument_node=""> According to the encyclical, these characteristics should be combined with a conscious effort to promote institutions which develop character in individuals.</span><sup class="reference" data-dcnode-id="2191" id="cite_ref-:12_17-3"><a data-dcnode-id="2192" href="#cite_note-:12-17"><span data-dcnode-id="2193" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2190" instrument_node=""> The encyclical stressed to decision makers the importance of the dignity of the person and a concern for the poor, while acknowledging the need to balance economic efficiency with social equity.</span><sup class="reference" data-dcnode-id="2187" id="cite_ref-:12_17-4"><a data-dcnode-id="2188" href="#cite_note-:12-17"><span data-dcnode-id="2189" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2186" instrument_node=""> The </span><a data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_Justice_for_All" title="Economic Justice for All"><span data-dcnode-id="2185" instrument_node="">US Bishops’ 1986 Pastoral Letter Economic Justice for All</span></a><span data-dcnode-id="2183" instrument_node=""> suggested that specific institutional arrangements be developed to support this form of democratic capitalism.</span><sup class="reference" data-dcnode-id="2180" id="cite_ref-:12_17-5"><a data-dcnode-id="2181" href="#cite_note-:12-17"><span data-dcnode-id="2182" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2179" instrument_node=""> Arrangements proposed included structures of accountability designed to involve all </span><a data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stakeholder_%28corporate%29" title="Stakeholder (corporate)"><span data-dcnode-id="2178" instrument_node="">stakeholders</span></a><span data-dcnode-id="2176" instrument_node="">, such as employees, customers, local communities, and wider society, in the corporate decision making process, as opposed to stockholders only.</span><sup class="reference" data-dcnode-id="2173" id="cite_ref-:12_17-6"><a data-dcnode-id="2174" href="#cite_note-:12-17"><span data-dcnode-id="2175" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2172" instrument_node=""> The letter offered acceptance for the market economy under the condition that the state intervene where necessary to preserve human dignity.</span><sup class="reference" data-dcnode-id="2169" id="cite_ref-:12_17-7"><a data-dcnode-id="2170" href="#cite_note-:12-17"><span data-dcnode-id="2171" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2168" instrument_node="">
