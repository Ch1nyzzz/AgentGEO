</span><ul data-dcnode-id="1105"><li data-dcnode-id="1113"><a class="image" data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACapitalismlogo.svg"><img alt="Capitalismlogo.svg" class="noviewer" data-dcnode-id="1118" data-file-height="912" data-file-width="959" decoding="async" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Capitalismlogo.svg/16px-Capitalismlogo.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Capitalismlogo.svg/24px-Capitalismlogo.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Capitalismlogo.svg/32px-Capitalismlogo.svg.png 2x" width="16"></a><span data-dcnode-id="1116" instrument_node="">&nbsp;</span><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Portal%3ACapitalism" title="Portal:Capitalism"><span data-dcnode-id="1115" instrument_node="">Capitalism portal</span></a></li><span data-dcnode-id="1112" instrument_node="">
</span><li data-dcnode-id="1106"><a class="image" data-dcnode-id="1110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEmblem-money.svg"><img alt="Emblem-money.svg" class="noviewer" data-dcnode-id="1111" data-file-height="48" data-file-width="48" decoding="async" height="16" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Emblem-money.svg/16px-Emblem-money.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Emblem-money.svg/24px-Emblem-money.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Emblem-money.svg/32px-Emblem-money.svg.png 2x" width="16"></a><span data-dcnode-id="1109" instrument_node="">&nbsp;</span><a data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Portal%3ABusiness" title="Portal:Business"><span data-dcnode-id="1108" instrument_node="">Business portal</span></a></li></ul></td></tr><tr data-dcnode-id="1086"><td class="sidebar-navbar" data-dcnode-id="1087"><link data-dcnode-id="1102" href="mw-data:TemplateStyles:r1063604349" rel="mw-deduplicated-inline-style"><div class="navbar plainlinks hlist navbar-mini" data-dcnode-id="1088"><ul data-dcnode-id="1089"><li class="nv-view" data-dcnode-id="1098"><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template%3ACapitalism_sidebar" title="Template:Capitalism sidebar"><abbr data-dcnode-id="1100" title="View this template"><span data-dcnode-id="1101" instrument_node="">v</span></abbr></a></li><li class="nv-talk" data-dcnode-id="1094"><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template_talk%3ACapitalism_sidebar" title="Template talk:Capitalism sidebar"><abbr data-dcnode-id="1096" title="Discuss this template"><span data-dcnode-id="1097" instrument_node="">t</span></abbr></a></li><li class="nv-edit" data-dcnode-id="1090"><a class="external text" data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3ACapitalism_sidebar%26action%3Dedit"><abbr data-dcnode-id="1092" title="Edit this template"><span data-dcnode-id="1093" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1069"><b data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Rentier capitalism</span></b><span data-dcnode-id="1080" instrument_node=""> is a term currently used to describe the belief in economic practices of monopolization of access to any kind of property (physical, financial, intellectual, etc.) and gaining significant amounts of profit without contribution to society.</span><sup class="reference" data-dcnode-id="1077" id="cite_ref-1"><a data-dcnode-id="1078" href="#cite_note-1"><span data-dcnode-id="1079" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="1074" id="cite_ref-2"><a data-dcnode-id="1075" href="#cite_note-2"><span data-dcnode-id="1076" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="1071" id="cite_ref-3"><a data-dcnode-id="1072" href="#cite_note-3"><span data-dcnode-id="1073" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1070" instrument_node="">
</span></p><p data-dcnode-id="1052"><span data-dcnode-id="1068" instrument_node="">The origins of the term are unclear; it is compatible with </span><a data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxism" title="Marxism"><span data-dcnode-id="1067" instrument_node="">Marxist</span></a><span data-dcnode-id="1065" instrument_node=""> conceptions of </span><a data-dcnode-id="1063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Surplus_value" title="Surplus value"><span data-dcnode-id="1064" instrument_node="">surplus value</span></a><span data-dcnode-id="1062" instrument_node=""> extraction, yet the combination of words "</span><a class="extiw" data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wiktionary.org/wiki/rentier" title="wikt:rentier"><span data-dcnode-id="1061" instrument_node="">rentier</span></a><span data-dcnode-id="1059" instrument_node=""> </span><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capitalism" title="Capitalism"><span data-dcnode-id="1058" instrument_node="">capitalism</span></a><span data-dcnode-id="1056" instrument_node="">" were never used by </span><a data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Marx" title="Karl Marx"><span data-dcnode-id="1055" instrument_node="">Karl Marx</span></a><span data-dcnode-id="1053" instrument_node=""> himself.
</span></p><p data-dcnode-id="1027"><span data-dcnode-id="1051" instrument_node="">Modern economists agree that the power dynamics of the rentier-tenant relationship are oppressive,</span><sup class="reference" data-dcnode-id="1048" id="cite_ref-4"><a data-dcnode-id="1049" href="#cite_note-4"><span data-dcnode-id="1050" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="1045" id="cite_ref-5"><a data-dcnode-id="1046" href="#cite_note-5"><span data-dcnode-id="1047" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1044" instrument_node=""> but capitalist theories such as the natural "euthanasia of the rentier" famously put forth by </span><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Maynard_Keynes" title="John Maynard Keynes"><span data-dcnode-id="1043" instrument_node="">John Maynard Keynes</span></a><span data-dcnode-id="1041" instrument_node=""> have been abandoned in light of the increase in </span><a class="mw-redirect" data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rent-seeking_behavior" title="Rent-seeking behavior"><span data-dcnode-id="1040" instrument_node="">rent-seeking behavior</span></a><span data-dcnode-id="1038" instrument_node=""> seen over the past century.</span><sup class="reference" data-dcnode-id="1035" id="cite_ref-6"><a data-dcnode-id="1036" href="#cite_note-6"><span data-dcnode-id="1037" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="1032" id="cite_ref-7"><a data-dcnode-id="1033" href="#cite_note-7"><span data-dcnode-id="1034" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="1029" id="cite_ref-8"><a data-dcnode-id="1030" href="#cite_note-8"><span data-dcnode-id="1031" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1028" instrument_node="">
</span></p><span data-dcnode-id="1026" instrument_node="">
</span><div aria-labelledby="mw-toc-heading" class="toc" data-dcnode-id="975" id="toc" role="navigation"><input class="toctogglecheckbox" data-dcnode-id="1025" id="toctogglecheckbox" role="button" style="display:none" type="checkbox"><div class="toctitle" data-dcnode-id="1020" dir="ltr" lang="en"><h2 data-dcnode-id="1023" id="mw-toc-heading"><span data-dcnode-id="1024" instrument_node="">Contents</span></h2><span class="toctogglespan" data-dcnode-id="1021"><label class="toctogglelabel" data-dcnode-id="1022" for="toctogglecheckbox"></label></span></div><span data-dcnode-id="1019" instrument_node="">

</span><li class="toclevel-1 tocsection-1" data-dcnode-id="1011"><a data-dcnode-id="1012" href="#Usage_by_Marxists"><span class="tocnumber" data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">1</span></span><span data-dcnode-id="1015" instrument_node=""> </span><span class="toctext" data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Usage by Marxists</span></span></a></li><span data-dcnode-id="1010" instrument_node="">
</span><li class="toclevel-1 tocsection-2" data-dcnode-id="1003"><a data-dcnode-id="1004" href="#Current_usage"><span class="tocnumber" data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">2</span></span><span data-dcnode-id="1007" instrument_node=""> </span><span class="toctext" data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Current usage</span></span></a></li><span data-dcnode-id="1002" instrument_node="">
</span><li class="toclevel-1 tocsection-3" data-dcnode-id="995"><a data-dcnode-id="996" href="#See_also"><span class="tocnumber" data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">3</span></span><span data-dcnode-id="999" instrument_node=""> </span><span class="toctext" data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">See also</span></span></a></li><span data-dcnode-id="994" instrument_node="">
</span><li class="toclevel-1 tocsection-4" data-dcnode-id="987"><a data-dcnode-id="988" href="#References"><span class="tocnumber" data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">4</span></span><span data-dcnode-id="991" instrument_node=""> </span><span class="toctext" data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">References</span></span></a></li><span data-dcnode-id="986" instrument_node="">
</span><li class="toclevel-1 tocsection-5" data-dcnode-id="979"><a data-dcnode-id="980" href="#Bibliography"><span class="tocnumber" data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">5</span></span><span data-dcnode-id="983" instrument_node=""> </span><span class="toctext" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Bibliography</span></span></a></li><span data-dcnode-id="978" instrument_node="">

</span></div><span data-dcnode-id="974" instrument_node="">
</span><h2 data-dcnode-id="964"><span class="mw-headline" data-dcnode-id="972" id="Usage_by_Marxists"><span data-dcnode-id="973" instrument_node="">Usage by Marxists</span></span><span class="mw-editsection" data-dcnode-id="965"><span class="mw-editsection-bracket" data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">[</span></span><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRentier_capitalism%26action%3Dedit%26section%3D1" title="Edit section: Usage by Marxists"><span data-dcnode-id="969" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">]</span></span></span></h2><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="962" instrument_node="">In his early works, </span><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Marx" title="Karl Marx"><span data-dcnode-id="961" instrument_node="">Karl Marx</span></a><span data-dcnode-id="959" instrument_node=""> juxtaposed the terms "rentier" and "capitalist" to argue that a rentier tends to exhaust his profits, whereas a capitalist must perforce re-invest most of the surplus value in order to survive competition. He wrote, "Therefore, the means of the extravagant rentier diminish daily in inverse proportion to the growing possibilities and temptations of pleasure. He must, therefore, either consume his capital himself, and in doing so bring about his own ruin, or become an industrial capitalist...."</span><sup class="reference" data-dcnode-id="956" id="cite_ref-9"><a data-dcnode-id="957" href="#cite_note-9"><span data-dcnode-id="958" instrument_node="">[9]</span></a></sup><span data-dcnode-id="955" instrument_node="">
However, Marx believed that capitalism was inherently built upon practices of </span><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Usury" title="Usury"><span data-dcnode-id="954" instrument_node="">usury</span></a><span data-dcnode-id="952" instrument_node=""> and thus inevitably leading to the separation of society into two classes: one composed of those who produce value and the other, which feeds upon the first one. In "Theories of Surplus Value" (written 1862–1863), he states "...that interest (in contrast to industrial profit) and rent (that is the form of landed property created by capitalist production itself) are superfetations (i.e., excessive accumulations) which are not essential to capitalist production and of which it can rid itself.  If this bourgeois ideal were actually realisable, the only result would be that the whole of the surplus-value would go to the industrial capitalist directly, and society would be reduced (economically) to the simple contradiction between capital and wage-labour, a simplification which would indeed accelerate the dissolution of this mode of production."</span><sup class="reference" data-dcnode-id="949" id="cite_ref-10"><a data-dcnode-id="950" href="#cite_note-10"><span data-dcnode-id="951" instrument_node="">[10]</span></a></sup><span data-dcnode-id="948" instrument_node="">
</span></p><p data-dcnode-id="943"><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Lenin" title="Vladimir Lenin"><span data-dcnode-id="946" instrument_node="">Vladimir Lenin</span></a><span data-dcnode-id="944" instrument_node=""> asserted that the growth of a stratum of idle rentiers under capitalism was inevitable and accelerated due to imperialism:
</span></p><span data-dcnode-id="942" instrument_node="">
</span><blockquote data-dcnode-id="933"><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="940" instrument_node="">Hence the extraordinary growth of a class, or rather, of a stratum of rentiers, i.e., people who live by 'clipping coupons' [in the sense of collecting interest payments on bonds], who take no part in any enterprise whatever, whose profession is idleness. The export of capital, one of the most essential economic bases of imperialism, still more completely isolates the rentiers from production and sets the seal of parasitism on the whole country that lives by exploiting the labour of several overseas countries and colonies.</span><sup class="reference" data-dcnode-id="937" id="cite_ref-11"><a data-dcnode-id="938" href="#cite_note-11"><span data-dcnode-id="939" instrument_node="">[11]</span></a></sup><span data-dcnode-id="936" instrument_node="">
</span></p><span data-dcnode-id="934" instrument_node="">
</span></blockquote><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">It therefore becomes clear that the term "rentier capitalism" could not be coined by Marxists simply because of redundancy of the words composing it. Marxist thought perceives capitalism as inherently "rentier", or usury-based, which would lead eventually to its demise precisely because of this inner deficiency in its organization.
</span></p><span data-dcnode-id="929" instrument_node="">
</span><h2 data-dcnode-id="919"><span class="mw-headline" data-dcnode-id="927" id="Current_usage"><span data-dcnode-id="928" instrument_node="">Current usage</span></span><span class="mw-editsection" data-dcnode-id="920"><span class="mw-editsection-bracket" data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">[</span></span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRentier_capitalism%26action%3Dedit%26section%3D2" title="Edit section: Current usage"><span data-dcnode-id="924" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">]</span></span></span></h2><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="917" instrument_node="">Current usage of the term 'rentier capitalism' describes the gaining of 'rentier' income from ownership or control of assets that generate </span><a data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_rent" title="Economic rent"><span data-dcnode-id="916" instrument_node="">economic rents</span></a><span data-dcnode-id="914" instrument_node=""> rather than from capital or labour used for production in a free competitive market.</span><sup class="reference" data-dcnode-id="911" id="cite_ref-12"><a data-dcnode-id="912" href="#cite_note-12"><span data-dcnode-id="913" instrument_node="">[12]</span></a></sup><span data-dcnode-id="910" instrument_node="">  The term </span><a data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rentier_state" title="Rentier state"><span data-dcnode-id="909" instrument_node="">rentier state</span></a><span data-dcnode-id="907" instrument_node=""> is mainly used not in its original meaning, as an imperialistic state thriving on labor of other countries and colonies, but as a state which derives all or a substantial portion of its national revenues from the rent of indigenous resources to external clients.
</span></p><p data-dcnode-id="888"><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guy_Standing_%28economist%29" title="Guy Standing (economist)"><span data-dcnode-id="905" instrument_node="">Guy Standing</span></a><span data-dcnode-id="903" instrument_node=""> has claimed rentier capitalism has become predominant in capitalistic economies since the 1980s.</span><sup class="reference" data-dcnode-id="900" id="cite_ref-13"><a data-dcnode-id="901" href="#cite_note-13"><span data-dcnode-id="902" instrument_node="">[13]</span></a></sup><span data-dcnode-id="899" instrument_node=""> Brett Christophers of </span><a data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uppsala_University" title="Uppsala University"><span data-dcnode-id="898" instrument_node="">Uppsala University</span></a><span data-dcnode-id="896" instrument_node="">, Sweden has asserted that rentier capitalism has been the foundation of the </span><a data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="895" instrument_node="">United Kingdom's</span></a><span data-dcnode-id="893" instrument_node=""> economic policy from the 1970s onwards.</span><sup class="reference" data-dcnode-id="890" id="cite_ref-christophers-2020_14-0"><a data-dcnode-id="891" href="#cite_note-christophers-2020-14"><span data-dcnode-id="892" instrument_node="">[14]</span></a></sup><span data-dcnode-id="889" instrument_node="">
</span></p><span data-dcnode-id="887" instrument_node="">
