</span><div class="hlFld-Abstract" data-dcnode-id="3772"><a data-dcnode-id="3779" name="abstract"></a><div class="sectionInfo abstractSectionHeading" data-dcnode-id="3776"><h2 class="sectionHeading" data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">Abstract</span></h2></div><div class="abstractSection abstractInFull" data-dcnode-id="3773"><p data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">Under the influence of groundbreaking work by John Meyer and Brian Rowen, as well as Paul DiMaggio and Walter Powell, over the last 30 years research in the new sociological institutionalism has focused on processes of isomorphism. I argue that this is a one-sided focus that leaves out many insights from other institutional and macrosociological approaches and does not do justice to actual social change because it overlooks the role played by divergent institutional development. While the suggestion of divergent trends is not new, there have been few attempts to integrate divergence into the theoretical premises of the new sociological institutionalism. Based on the typology proposed by DiMaggio and Powell, I show that the mechanisms identified by them as sources of isomorphic change can support processes of divergent change as well. The theoretical challenge is to identify conditions under which these mechanisms push institutional change toward homogenization or divergence.</span></p></div></div><div class="abstractKeywords" data-dcnode-id="3771"></div><a data-dcnode-id="3770" name="_i1"></a><div class="sectionInfo" data-dcnode-id="3767"><h2 class="sectionHeading" data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">References</span></h2></div><a class="anchor" data-dcnode-id="3766" id="references"></a><table border="0" class="references" data-dcnode-id="1800"><tbody data-dcnode-id="1801"><tr data-dcnode-id="3736" id="bibr1-j.1467-9558.2010.01369.x"><td class="refnumber" data-dcnode-id="3764"><span data-dcnode-id="3765" instr
