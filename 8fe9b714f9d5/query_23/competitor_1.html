</span><li data-dcnode-id="1607"><span data-dcnode-id="1614" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">3/</span></span><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Patrimonialism (“feudalism,” vassal compensated by fief)</span></p><span data-dcnode-id="1608" instrument_node="">
</span></li><span data-dcnode-id="1606" instrument_node="">
</span></ol><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1603" instrument_node="">“Under patrimonial authority … the administrative staff appropriates particular powers.… Domination of estate type thus involves (i) … limitation of the lord’s discretion in selecting his administrative staff and (ii) … often … appropriation by … staff of α) the positions … β) the material means of administration … γ) the governing power.” </span><sup data-dcnode-id="1598"><a data-dcnode-id="1599" href="#Fn25"><span class="u-visually-hidden" data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Footnote </span></span><span data-dcnode-id="1600" instrument_node="">25</span></a></sup><span data-dcnode-id="1597" instrument_node="">
</span></p><p data-dcnode-id="1588"><span data-dcnode-id="1595" instrument_node="">How the “material means of administration” are appropriated is crucial. Under patrimonial rule narrowly defined, the staff is rewarded by “fief”: “[T]he fief is the vassal’s personal property for the duration of the feudatory relationship, however, it remains inalienable, since it is intended to preserve the vassal’s service capacity.”</span><sup data-dcnode-id="1590"><a data-dcnode-id="1591" href="#Fn26"><span class="u-visually-hidden" data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Footnote </span></span><span data-dcnode-id="1592" instrument_node="">26</span></a></sup><span data-dcnode-id="1589" instrument_node=""> The property that has been granted as “fief” typically can even be inherited; hence patrimonialism with fief offers quite secure property rights (and also security of office). In patrimonialism, both office and property is relatively secure, though the rights of disposal with property by comparison to private property are still limited. Property is usually inalienable; it usually cannot even be mortgaged. It is only given in order to preserve the vassal’s capacity to serve.</span></p><p data-dcnode-id="1583"><span data-dcnode-id="1587" instrument_node="">Historically speaking Sultanism was the form of domination characteristic of the Ottoman Empire. The best approximation of prebendalism in the modern Western world is the Russian service nobility (or </span><i data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Pomeshchiki</span></i><span data-dcnode-id="1584" instrument_node="">). The ideal type of patrimonialism is West European feudalism. In Russia, boyars owned property and office in a patrimonial way and they were turned into a service nobility after centuries of struggle by Czars from Ivan the Terrible to Peter the Great. In the following sections, I demonstrate the applicability of the concepts of patrimonialism and prebendalism to post-communist capitalisms.</span></p></div></div></section><section data-dcnode-id="1458" data-title="Types of legitimation under communism and post-communism"><div class="c-article-section" data-dcnode-id="1459" id="Sec9-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1578" id="Sec9"><span data-dcnode-id="1579" instrument_node="">Types of legitimation under communism and post-communism</span></h2><div class="c-article-section__content" data-dcnode-id="1460" id="Sec9-content"><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">My main aim now is to pose the question: were communist and are post-communist social orders legitimate and, if so, what is the foundation of their legitimacy?</span></p><ol class="u-list-style-none" data-dcnode-id="1565"><span data-dcnode-id="1575" instrument_node="">
</span><li data-dcnode-id="1567"><span data-dcnode-id="1574" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">1/</span></span><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Can one ever call a communist regime legitimate? If so what kind of legitimation regimes describes such communist rule?</span></p><span data-dcnode-id="1568" instrument_node="">
</span></li><span data-dcnode-id="1566" instrument_node="">
</span></ol><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1563" instrument_node="">I start this with a brief reference to the question: were communist societies’ legitimate orders at all? From the point of view of liberal democracy, it would be easy to dismiss communist societies as “illegitimate,” but such a position could be hardly attributed to Weber. If we can find instances of communist social order where there is sufficient “voluntary compliance” by the </span><i data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">“Beherrschten,</span></i><span data-dcnode-id="1560" instrument_node="">” Weber would not hesitate to see that order as legitimate and will ask the question what is the foundation of this legitimacy.</span></p><p data-dcnode-id="1554"><span data-dcnode-id="1558" instrument_node="">In some communist regimes there was not much “voluntary compliance” and order was maintained by systematic coercion. The most extreme example being Cambodia under Pol Pot (though Pol Pot before he became the supreme leader of Cambodia was seen by many as a charismatic figure, see David Chandler </span><a aria-label="Reference 1999" data-dcnode-id="1556" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d100297324e1244" title="Chandler, D. (1999). Brother number one. Boulder: Westview Press."><span data-dcnode-id="1557" instrument_node="">1999</span></a><span data-dcnode-id="1555" instrument_node="">) and arguably certain epochs of Stalinism and Maoism were illegitimate, despotic.</span></p><p data-dcnode-id="1534"><span data-dcnode-id="1553" instrument_node="">But there are long epochs of communism when order was maintained without coercion, where some kind of communist </span><i data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Herrschaft</span></i><span data-dcnode-id="1550" instrument_node=""> was established. But what kind of </span><i data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Herrschaft</span></i><span data-dcnode-id="1547" instrument_node="">? Commentators gave various answers. Some communist leaders at least at certain points in time established a charismatic order (most eminent example would be Fidel Castro, but arguably Lenin and following him for certain epochs even figures such as Stalin could establish themselves as charismatic leaders. The same can be argued for Mao). Whether that was real charisma or just pseudo-charisma can be debated (Bensman and Givant </span><a aria-label="Reference 1975" data-dcnode-id="1545" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d100297324e1256" title="Bensman, J., &amp; Givant, M. (1975). Charisma and modernity: the use and abuse of the concept. Social Research, 42(4), 570–614."><span data-dcnode-id="1546" instrument_node="">1975</span></a><span data-dcnode-id="1544" instrument_node="">). Some described communism as traditional (Heller et al. </span><a aria-label="Reference 1983" data-dcnode-id="1542" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d100297324e1259" title="Heller, A., Fehér, F., &amp; Markus, G. (1983). Dictatorship over needs. London: Palgrave Macmillan."><span data-dcnode-id="1543" instrument_node="">1983</span></a><span data-dcnode-id="1541" instrument_node="">) or neo-traditional authority (Andrew Walder </span><a aria-label="Reference 1988" data-dcnode-id="1539" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d100297324e1262" title="Walder, A. (1988). Communist neo-traditionalism. Berkeley: University of California Press."><span data-dcnode-id="1540" instrument_node="">1988</span></a><span data-dcnode-id="1538" instrument_node="">), Fehér and Rigby (</span><a aria-label="Reference 1992" data-dcnode-id="1536" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d100297324e1266" title="Rigby, T. H., &amp; Fehér, F. (Eds.). (1992). Political legitimacy and communist states. New York: S. Martin Press."><span data-dcnode-id="1537" instrument_node="">1992</span></a><span data-dcnode-id="1535" instrument_node="">) coined the intriguing term “goal rational authority.”</span></p><p data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">All these theories offer insights and are useful tools to explore empirically various cases at various points in the history of communist societies. Arguably some communist orders had a strong charismatic appeal. The propaganda machine, the “personality cult” obviously was important in manufacturing such charisma, in generating enthusiasm and dedication to the leaders who promised to deliver “miracles” through “revolutionary change.”</span></p><p data-dcnode-id="1524"><span data-dcnode-id="1531" instrument_node="">As the leaders failed to deliver miracles or passed away, the system faced the difficult task of institutionalizing charisma or passing it on to another leader. Some communist systems degenerated into illegitimate system, using massive, systemic coercion (as arguably happened in Cambodia, or during the mid-1930s in the USSR, possibly during the Great Leap Forward or Cultural Revolution in China). On some occasions successors made a bid for carrying on the charisma of the predecessor. The best example may be Stalin during the 1920s, when he faked a “last will” of Lenin that supposedly appointed Stalin as successor. He put the propaganda machine into operation and created a personality cult around himself that did deliver some degree of charisma to the young Stalin. Nevertheless, usually after the passing of the original charismatic leader, communist societies struggled for some other type of legitimacy. In some cases, it is indeed an attempt to create some version of a rather classical traditional authority: such is the establishment of the Kim dynasty in North Korea or an attempt to create some neo-traditional authority, based on elaborate patron-client relationships. In this case, the rulers tried to legitimate the system by claims that the party leadership or the individual leader of the party take better care of things than anybody else could. There were also attempts, and for a while rather successful ones, to claim that communist order—in contrast with the “instrumental rationality, or irrationality of the market”—offers a higher level of legitimacy. The communist system, according to this claim, was based on rationality of the goals rather than rationality of means. Communism in other word is “substantive rationality,” compared to market capitalism, which is an inferior type of rationality—it is only formal rationality. Rigby and Fehér formulated it this way originally, but in </span><i data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">The Intellectuals on the Road to Class Power</span></i><span data-dcnode-id="1528" instrument_node=""> we also tried to conceptualize the legitimacy of the post-Stalinist USSR and Central Europe in similar terms. “Rational redistributors” claim legitimacy referring to their monopoly on “teleological knowledge” (Konrad and Szelenyi </span><a aria-label="Reference 1979" data-dcnode-id="1526" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d100297324e1279" title="Konrad, G., &amp; Szelenyi, I. (1979). The intellectuals on the road to class power. New York: Harcourt, Brace and Jovanovich."><span data-dcnode-id="1527" instrument_node="">1979</span></a><span data-dcnode-id="1525" instrument_node="">).</span></p><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Hence the investigation of the kind of legitimacy (or illegitimacy) required historically specific empirical investigation. Actually existing socialist societies combined various elements of all of Weberian ideal types. In a concluding remark on the subject, let me make a provocative statement. Communism appeared to be the opposite of legal-rational authority, by its own aspiration the essence of the Marxian project was to overcome the instrumental formal rationality of market capitalism, the “anarchy of the market.” Nevertheless, there were elements of legal-rational authority in most phases and forms of communisms. Communist societies felt obliged to draft constitutions. Curiously, often they pretended they operated under the “rule of law”: they tortured prisoners, in the worse times, to confess to crimes punishable by laws, though everyone knew they never committed those crimes. Unlike the Nazis who usually just shot enemies, or sent them to gas chambers and did not bother with complicated legal procedures Stalinism, even at times when it arguably was illegitimate, created “show trials.” The best known was the trial against Bukharin. Unlike the Jesuit inquisitors who probably mostly believed the accused had actually committed crimes and who tortured the prisoners to “find the truth,” Stalinist prosecutors typically knew the prisoners were innocent, so they tortured them to confess invented crimes that could “justify” the prisoners being executed, since execution was what the law prescribed for the confessed crime.</span></p><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">During the despotic rule of Stalin, this was mainly “fake legal-rational authority,” people often were murdered without any legal procedure. It is hard to detect any element of legal-rationality, or rule of law under Maoism, especially during the Cultural Revolution. During that time Maoists prosecuted enemies in a way similar to the Nazis. But all communists systems were by definition “illiberal” (hence never genuinely legal-rational). Under post-Stalinist reform communism, the legal-rational component was strengthened, but no communist regime was either liberal or democratic in any meaningful sense of those terms. Those in authority may have been formally elected by some body, but de facto they were appointed as members of the “nomenclature” under the control of the executive, be it the Central Committee, the Politburo, or some lower level party organization. None of these systems subscribed to any of the key principles of liberalism: separation of legislative, executive, and juridical power, and security/sanctity of individual property rights. But it is sensible to suggest that such “fake” legal-rational authority was complementing legitimation beyond charisma, traditional authority, or goal rationality, especially in the reform communist epoch.</span></p><p data-dcnode-id="1515"><span data-dcnode-id="1519" instrument_node="">And now we are ready to face the question of legitimacy under post-communist regimes. Typically, though there are some substantial country-by-country variations, the first stage of transition from communism to post-communism was a transition from some sort of traditional/neo-traditional/goal rational authority to legal rational authority combined with the “fourth system of legitimation”—hence with a system that is legitimated by the “</span><i data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Wille der Beherrschten,</span></i><span data-dcnode-id="1516" instrument_node="">” hence it was at least to some extent democratic.</span></p><ol class="u-list-style-none" data-dcnode-id="1504"><span data-dcnode-id="1514" instrument_node="">
</span><li data-dcnode-id="1506"><span data-dcnode-id="1513" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">2/</span></span><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Early democracy/liberalism. Legal rational authority in Central Europe (with a patrimonial twist)</span></p><span data-dcnode-id="1507" instrument_node="">
</span></li><span data-dcnode-id="1505" instrument_node="">
</span></ol><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Between 1989 and 1991 in most of the formerly socialist countries of Central Europe and in some of the countries of the former USSR, in the Baltic States, and even in Russia, desperate efforts were made to turn these states into liberal democracies with neo-liberal capitalist institutions. Half-hearted reforms were implemented at least during the first few years in war- torn Yugoslavia, Albania, Bulgaria, Romania, Moldova, Ukraine, and the Caucasian republics. Belorussia, the Central Asian former Soviet republics, and certainly the Asian former or still socialist countries, like China and Vietnam are even clearer cases, where no liberal democratic reform took place. But in Central Europe and the Baltic states arguably the dominant form of legitimation was indeed legal rational authority (liberalism) with some form of a democratic polity. The rule of law was accepted, the legislative, executive and juridical powers and the media became reasonably separated from each other. Security of private ownership was acknowledged by the law. Reasonably free multi-party elections were held to constitute the legislative branch.</span></p><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">The most critical challenge all these societies faced in the early years was the conversion of public property into private wealth. According to the neo-liberal doctrine, all problems of transition from a redistributive to market economics will be resolved as soon as identifiable private owners are found for the public assets.</span></p><p data-dcnode-id="1491"><span data-dcnode-id="1498" instrument_node="">The purpose was to “close the commons” in 500&nbsp;days (as the Russians tried to do it) or in 5 to 10&nbsp;years, as the Central European countries attempted. That was difficult or impossible to achieve with purely legal-rational and democratic means. In the democratically elected legislatures, elections were free; there was multi-party competition; but voter turn-out was underwhelming, hence the newly elected governments had a somewhat questionable democratic legitimacy. During the electoral campaigns, ideological issues were more often discussed than the crucial question of who will become the private proprietor of assets formerly under public ownership and what will happen with the welfare state.</span><sup data-dcnode-id="1493"><a data-dcnode-id="1494" href="#Fn27"><span class="u-visually-hidden" data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Footnote </span></span><span data-dcnode-id="1495" instrument_node="">27</span></a></sup><span data-dcnode-id="1492" instrument_node=""> Hence during the early 1990s liberal democracy, even in the countries that were the closest to the “ideal type,” like the Czech Republic and Hungary, there was an inevitable patrimonial component in the system of domination. The privatization legislations—especially those that relied heavily on vouchers—gave a great deal of discretion to the executive branch. In countries that tried to use citizenship vouchers, like in the Czech Republic or Russia, or compensation vouchers, like in Hungary, still needed massively subsidized government credits or grossly undervalued property prices to obtain ownership of large corporations without market-tested creditworthiness. So who was creditworthy was decided by an official in governmental and semi-governmental agencies or by banks—in every case through “personal networks.” Even when public property was put up for “auction” and the bidders were international, multi-national firms the buyers needed inside information about the “real value” of the firms up for sale. This again could be obtained by privatization agencies or management of those firms but there was just no way to accomplish this by purely market means. And that deviation from legal-rational authority is what I propose calling a secondary “patrimonial principle” of legitimation.</span></p><p data-dcnode-id="1486"><span data-dcnode-id="1490" instrument_node="">In the most post-communist liberal-democratic regimes this happened by offering special privileged to management or former knowledgeable and trusted government-party officials. Such a patrimonial element was the weakest in Central Europe. The emergent Central European post-communist capitalism basically could have been described with a legal-rational authority, which operated within a reasonably democratic institution. They were as close to “liberal democracy” as one could expect in societies with making a fast transition from communism to liberal capitalism. Nevertheless many commentators tend to over-idealize the 1990s in Central Europe. In comparison with communism, of course, there was a great leap forward to separation of powers, freedom of the media, the “fourth branch of power,” and recognition of the legitimacy of private ownership. In most countries there were reasonably free, multi-party elections. The most vulnerable component of this liberal-democracy was the legitimacy of private ownership and the usually miserable voter turnout at elections. The notions of “theft,” and “corruption” were attached to the emergent new private property of the nomenclature-bourgeoisie from day one. Hence private ownership was not as legitimate as one would have hoped. Bálint Magyar coined the term “mafia-state” much later (Magyar </span><a aria-label="Reference 2013" data-dcnode-id="1488" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d100297324e1333" title="Bálint, M. (2013). A magyar polip. A poszt-kommunista maffia állam. [The Hungarian Octopus. The post-communist mafia state). Budapest: Noran Libro."><span data-dcnode-id="1489" instrument_node="">2013</span></a><span data-dcnode-id="1487" instrument_node="">), but many ordinary people in Central Europe thought about their new rich as Mafiosi anyway from the very early days of the transition. The separation of power, especially the independence of public media from the government, was also challenged from day one. With this somewhat skeptical note I do accept the fundamentally legal-rational authority and democratic nature of most Central European countries.</span></p><ol class="u-list-style-none" data-dcnode-id="1475"><span data-dcnode-id="1485" instrument_node="">
</span><li data-dcnode-id="1477"><span data-dcnode-id="1484" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">3/</span></span><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Patrimonialism in Russia during the first decade of transition (with some elements of legal-rational authority)</span></p><span data-dcnode-id="1478" instrument_node="">
</span></li><span data-dcnode-id="1476" instrument_node="">
</span></ol><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1466"><span data-dcnode-id="1473" instrument_node="">Russia started to diverge from this trajectory very early on. Already in 1998 (Eyal et al </span><a aria-label="Reference 1998" data-dcnode-id="1471" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d100297324e1353" title="Eyal, G., Szelenyi, I., &amp; Townsley, E. (1998). Making Capitalism without Capitalists. London: Verso."><span data-dcnode-id="1472" instrument_node="">1998</span></a><span data-dcnode-id="1470" instrument_node="">), I called Russia “capitalism from above,” a sort of patrimonial order. There may be many reasons for this divergence. Russia has long historical experience with autocratic governments. In addition the new post-communist elites were often recruited from Soviet nomenclature—it was a nomenclature-bourgeoisie. Yeltsin clashed with legal-rational-authority and democratic policy early on. His stated aim was to establish capitalism in Russia in 500&nbsp;days and the mechanism to achieve this was supposed to be voucher privatization, namely to give a fair share of Russia’s “commons” in “vouchers” to every citizen and create millions of owners rather than a few millionaires. But this did not work. Ordinary Russians of course did not know what to do with their vouchers. They were starving, so they sold their vouchers under value to investors/speculators who used them in privatization. What happened next was a classic case of patrimonialism. Yeltsin, the new “czar” had to decide who among the bidders, all with little capital and no credit rating, would acquire the property. He often relied on the advice is his beloved daughter, Tatyana, and she picked the “best people” for the “job.” Yeltsin in this way appointed the new grand bourgeoisie. There were “auctions” where property was transformed from public to private, but the Yeltsin regime grossly manipulated these auctions. With these manipulations Yeltsin and his inner circle made sure the people who were defined as “good people” by Tatyana became the new owners (for a colorful and persuasive description of these practices, see Klebnikov </span><a aria-label="Reference 2000" data-dcnode-id="1468" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d100297324e1356" title="Klebnikov, P. (2000). Godfather of the Kremlin. New York: Harcourt."><span data-dcnode-id="1469" instrument_node="">2000</span></a><span data-dcnode-id="1467" instrument_node="">). I call the first decade of Russian transition from communism a patrimonial (with some legal-rational components) regime since property was allocated by the “grace” of the ruler. The executive branch had a great deal of autonomy to decide who the new owners would be. The aim of such patrimonial rule, within the framework of a democratic system, was to create a grand bourgeoisie that could be expected to be reasonably loyal to political powers. When the chips were falling, it did work. In 1996 Yeltsin faced re-election as president and he was running behind Zyuganov, the candidate of the Communist Party. The new grand bourgeoisie, the seven largest financiers with the leadership of Berezovsky rallied behind Yeltsin. They hated his opponent, Zyuganov, even more than Yeltsin and since they controlled the media they played a critical role in Yeltsin’s re-election. Incidentally the BIG SEVEN claimed just 5&nbsp;years after the collapse of the USSR that they owned half of the wealth in Russia!</span></p><p data-dcnode-id="1461"><span data-dcnode-id="1465" instrument_node="">So I call Russia under Yeltsin a patrimonial system. Yeltsin on a few occasions tried to challenge the powers of the new grand bourgeoisie. He had an intense conflict for instance with Gusinsky, but Yeltsin eventually backed down (for the story, see again Klebnikov </span><a aria-label="Reference 2000" data-dcnode-id="1463" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d100297324e1362" title="Klebnikov, P. (2000). Godfather of the Kremlin. New York: Harcourt."><span data-dcnode-id="1464" instrument_node="">2000</span></a><span data-dcnode-id="1462" instrument_node="">). Let me just summarize: Russia under Yeltsin was a patrimonial order (property was allocated by the political ruler, but with relatively secure property rights) with some legal-rational authority. It was not quite a liberal system, while private property was defended by law, Yeltsin sent tanks against the legislature, when they went against his will. He operated a somewhat managed democratic system. Elections with stakes were held, but the media was controlled by Yeltsin friendly private owners, so it was hardly a “free media”. In contrast most Central –European countries were liberal, legal rational authorities, property was allocated by market mechanism (with some patrimonial management though), with substantial separation of powers. A struggle to bring the media under the control of the executive started very early. This was mostly unsuccessful. Elections were free and to the extent the messy campaign financing law allowed it quite fair, but democracies were not “consolidated.” It took a long time for parties which can rotate in power were formed and this process is still under way in every Central European post-communist country.</span></p></div></div></section><section data-dcnode-id="1407" data-title="Putin’s revolution: a turn to prebendalism with illiberal managed democracy"><div class="c-article-section" data-dcnode-id="1408" id="Sec10-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1456" id="Sec10"><span data-dcnode-id="1457" instrument_node="">Putin’s revolution: a turn to prebendalism with illiberal managed democracy</span></h2><div class="c-article-section__content" data-dcnode-id="1409" id="Sec10-content"><h3 class="c-article__sub-heading" data-dcnode-id="1454" id="Sec11"><span data-dcnode-id="1455" instrument_node="">The key characteristics of Putinism</span></h3><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Putin’s raise to power represented a major shift in the system of legitimation in post-communist Russia. By the end of the Yeltsin’s years, the new Russian grand bourgeoisie began to “privatize” the state itself; big money wanted political power. For a while Berezovsky was national security adviser to Yeltsin. For Putin, an ambitious, energetic, able, young, former KGB man, this was totally unacceptable. He wanted to bring big money under political control, to put a leash on the new grand bourgeoisie. He put the new rich under a loyalty test: those who pass the test can stay and get richer, those who fail have an option to emigrate to London or Tel Aviv, or end up in jail in Siberia. The smart ones, like Berezovsky or Gusinsky went to Sheremetyevo airport; the overly ambitious ones, like Khodorkovsky ended up in long jail terms in Siberia. Those who gave up political ambitions and swore loyalty to the new “czar” became “serving nobility” (like Abramovich and Deripaska). They could stay on and become even richer. Even the fact that they belonged to the Yeltsin “family” was forgotten.</span></p><p data-dcnode-id="1447"><span data-dcnode-id="1451" instrument_node="">But what mechanism is used to redistribute property already allocated? I would call it the process of selective criminalization. No enemies are prosecuted on political, on ideological grounds: they all are accused of having committed economic crimes, such as tax evasion or corruption. Khodorkovsky was not jailed since he had political ambitions, but because he was found guilty money laundering…. Since the enclosure of the commons took place so fast and usually in a legal vacuum, virtually everyone who is in the class of the nouveau riche has skeletons in his or her closet. Hence the only question is who controls the prosecuting authority and what skeleton the prosecutor will find in whose closet. This is why I call the system selective criminalization. Those who are found guilty are probably guilty all right, but who is not? The question of who will hold private property was still decided by the political authority, but property rights became less secure. To put it in Weber’s terms, “fief” was transformed into “benefices”, the boyars of Yeltsin became the </span><i data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Pomeshchiki</span></i><span data-dcnode-id="1448" instrument_node=""> of Putin. The Russian system of legitimation shifted from patrimonialism to prebendalism. Intriguingly this was driven by the apparently democratic nature of policy and the inevitable shift to illiberalism in the system of legitimation.</span></p><p data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Even in Putin’s Russia, the claim that the system is based on majoritarian rule remains important. The regime needs legitimacy in reasonably free and somewhat fair multi-party elections. Those in positions of authority have to win those elections so they need a constituency that will support them. Big money is an important constituency. But how to create or sustain a loyal big money constituency once all the public property was privatized, all the “commons were enclosed?” Since the property that could be used to create or sustain loyal followers was already allocated during the Yeltsin’s years, the only way to keep the system going required that property already allocated be redistributed from the non-loyal ones to those Putin hoped would be loyal.</span></p><p data-dcnode-id="1440"><span data-dcnode-id="1444" instrument_node="">This cannot be achieved in a liberal, legal-rational system of authority where property right are secure, the powers of the executive are checked by the legislature and judiciary, and the media are free. The redistribution of property from the first generation of owners, from the boyars to the </span><i data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Pomeshchiki</span></i><span data-dcnode-id="1441" instrument_node=""> and the corresponding softening of property rights, requires a strengthening of executive power. This can only be achieved with the limitations of powers of the judiciary, legislative powers and the reduction of the independence of the media, hence a shift from legal-rational authority to an illiberal system of powers. It is important to notice the irony of this process: the shift to the prebendal system of illiberal order is driven by the pressure on those who rule to legitimate themselves with the majoritarian principle, hence by their desires to win elections, which at least appears to be free and fair.</span></p><p data-dcnode-id="1435"><span data-dcnode-id="1439" instrument_node="">This democratic process under Putin is substantially “managed.” It needs to retain the appearance of multi-party democracy. As Perry Anderson (</span><a aria-label="Reference 2007" data-dcnode-id="1437" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d100297324e1396" title="Anderson, P. (2007). “Russia’s managed democracy”, London Review of Books, No. 2, 2–12."><span data-dcnode-id="1438" instrument_node="">2007</span></a><span data-dcnode-id="1436" instrument_node="">) noted, such an illiberal democracy—my term not Anderson’s—requires “opposition” parties. Hence it is conceivable that in Putin’s Russia the Communist Party is kept alive by Putin himself. At some point such a management goes “too” far and turns managed democracy into autocracy, if there is a chance that at elections the ruling party could lose power. Putin created his own party, the United Russia, in 2001 that has dominated the legislature, the Duma, ever since. It won a super majority, which enabled the Duma to change even the constitution in 2007. In 2011, however, it received merely 51&nbsp;% of the votes. Would he continue electoral democracy once he faces loss or would he turn his system into an autocracy, with no elections or a Soviet type of fake elections where he would again win 99&nbsp;% of the votes?</span></p><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Re-convergence of Russian and Central European ways: the move away from liberalism, toward manage democracy and prebendalism in Central Europe. Is China heading in this direction?</span></p><p data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Arguably the Putin “virus” is in the system in most if not in all of the Central European systems. Structurally this stems from the system that operates in a democratic framework, where elections at least have to appear to be competitive and fair. Since the “commons were already enclosed,” the only mechanism to “buy” votes is through a redistribution of property already allocated.</span></p><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Undoubtedly Hungary is the vanguard in “Putinization” of post-communism. The Hungarian Prime Minister, Viktor Orbán, astutely called the system he is trying to establish in Hungary “illiberal democracy.” I only would add the term “managed” to this, the best description of the emergent system of legitimation in Hungary is “managed illiberal democracy.”</span></p><p data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Much like United Russia in 2007, the Hungarian ruling party, FIDESZ, achieved a supermajority in parliament in 2010. Having the powers to change the constitution, it passed a new constitution. It can change the composition and rights of the constitutional courts—did both—and manage the electoral system for its advantages. For my argument though, the most important development is the “softening” of property rights. Mr. Orbán’s party was briefly in government between 1998 and 2002. When they lost in a close electoral competition, Mr. Orbán acknowledged one mistake he made while prime minister: he did not create his own bourgeoisie. This is a mistake one does not make twice. As he won election comfortably in 2010 and 2014, he made an effort to create and maintain a loyal base and its core had to be a propertied bourgeoisie. During the second term of the FIDESZ government (2010–2014), he reallocated petty property rights. A smart move was to create a retail trade monopoly for tobacco shops. Small grocery stores and gas stations made a great deal of their profits from selling tobacco: now only special stores with tobacco licenses had the monopoly of tobacco retail trade. Obtaining such a license did not make anybody into a billionaire but it was a source of nice profit, so one could anticipate that the recipients of such licenses would reward the ruling party by voting for them and they in fact did so in 2014.</span></p><p data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">After FIDESZ won the 2014 elections in a rather “managed way” with a new qualified, two-thirds majority, it went one step further and is trying now to put big money “on the leash.” As the prime minister said, no tree can grow into the skies. Now the attempt is to limit the power of a few oligarchs and replace them with a whole set of smaller and presumably more loyal oligarchs. This is the classical example what I call prebendalism, the making of a class of “serving nobility.” In two by-elections in 2015, FIDESZ lost its two-thirds majority and therefore somewhat limits its illiberal ambitions. The government, for instance, cannot any longer change the electoral rules or the power of the presidency, but it still has absolute majority, so in most legislation the parliament is still just rubber stamping the will of the executive branch.</span></p><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">What we see emerging in post-communism is a novel combination of legal-rational authority operating with a rather or even excessively managed democratic framework combined with some aspects of patrimonialism and, more recently, prebendalism.</span></p><p data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Let me be as clear as I can: I am, not writing about any policy error or about a power-grab by one or a few evil individuals. We do see a historically unusual, though not unprecedented, combination of legal-rational authority with some legitimacy claims typically existing under traditional authority. Indeed the managed, illiberal, democratic prebendal states use a substantial dose of “traditionalism” or “conservatism” such as the centrality of religion, patriotism, the traditional family, or the sacredness of life in their ideology. It is illiberal, traditionalistic, conservative, or if you want to put it this way: neo-conservative, or even paleo-conservative. But these practices “inevitably”—if anything is “inevitable” in human history—stem from the accelerated transition from socialism to market capitalism within a democratic framework. Putin and United Russia, Orbán and FIDESZ are reasonably close to being the “pure types” of what I am trying to describe, but the “virus”—no value judgment is meant here to be implied by the term—is in all post-communist democratic societies.</span></p><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Russian and Hungarian liberal intellectuals tend to demonize Putin or Orbán and these intellectuals do not notice that these politicians have their “twin soul brothers” in virtually all post-communist societies. The Lech and Jarosław Kaczyński in Poland, Vladimir Mećiar and Robert Fico in Slovakia, in some respects Boyko Borisov in Bulgaria, Andrej Babiš in the Czech Republic … and many others represent the same or similar politics and ideology. What the real aim is of Johannis’s anti-corruption campaign in Romania is an intriguing question. Klaus Johannis himself was accused of corruption. Is he “cleansing” Romania or is he involved in selective criminalization? In foreign policy they often are very different. Orbán is the most supportive of Putin, even in the Ukrainian crisis; Kaczyński, while a Euro-skeptic like Orbán, is vehemently opposed to Russia.</span></p><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">What is unique about Putin and Orbán is not so much what they are standing for, but who they are: they have a dose of charisma. Whether this is “genuine charisma” or just “fake charisma” can be debated, but it is hard to doubt that, unlike the other traditionalist leaders I mentioned, they can win and re-win election. They both have an enthusiastic and loyal following, though we know their charisma can be withdrawn as soon as the leaders stop delivering “miracles.”</span></p><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">The most intriguing, China, seem to be conversing with Putinism as well. President Xi is making a bid to become a “charismatic leader”; he allows the official media to call him “father Xi.” He gives long addresses to scientists and writers about what they should do and his campaign against “corruption” sounds very much like the selective criminalization of the “illiberal democracies” of post-communist European countries. Bo Xilai was a Maoist challenger of the current leadership of the Communist Party. Was he convicted for life imprisonment because he was corrupt, or was it a case of selective criminalization? Former Prime minister Wen’s family was reported to own billions of dollars; Bo Xilai was accused of corruption for only a couple of million dollars. The Wen family was not investigated; Bo Xilai got a life sentence. The anti-corruption campaign is suspiciously similar to Putinism. Is China on its way to prebendalism? I do not have enough evidence to tell, but the attack against Bo Xilai and his supporters looks rather similar. Bo Xilai’s wife, Gu Kailai, was sentenced also for a life imprisonment for the murder of an English associate (lover? business partner?), Neil Heywood, in a suspiciously short trial, which lasted only for a few days. So who knows what the truth is. But what is certain is that China is moving toward a one-man rule, unknown since the fall of Mao, and the judiciary is being used to catch political enemies. Post-communism from China to Russia to Eastern Europe may be converging on an illiberal prebendal system.</span></p><p data-dcnode-id="1410"><span data-dcnode-id="1414" instrument_node="">The transition from communism has been guided by the principles of legal-rational authority, what I call liberalism and democracy, what I identify as majoritarian selection of the leaders, </span><i data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Wille der Beherrschten</span></i><span data-dcnode-id="1411" instrument_node="">. Given the challenges of fast pace of transition, especially of the conversion of public ownership to private wealth, liberal democracy was not consolidated in most—or any?—of these countries. All of these countries—or most of them—are pregnant with a dose of patrimonialism, prebendalism, and illiberalism, and such potentialities come to fruition as long as their charismatic leaders deliver miracles by providing at least the impression of security and improving welfare.</span></p></div></div></section><span data-dcnode-id="1406" instrument_node="">
</span><section data-dcnode-id="1145" data-title="Notes"><div class="c-article-section" data-dcnode-id="1146" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1404" id="notes"><span data-dcnode-id="1405" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="1147" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="1148"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="1385" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="1386"><p data-dcnode-id="1387"><span data-dcnode-id="1403" instrument_node="">There is a gigantic literature on this matter, mainly debating whether countries like Russia, Belarus, and Hungary still can be called democracy, or did they turn into “managed democracy” (P. Anderson </span><a aria-label="Reference 2007" data-dcnode-id="1401" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d100297324e288" title="Anderson, P. (2007). “Russia’s managed democracy”, London Review of Books, No. 2, 2–12."><span data-dcnode-id="1402" instrument_node="">2007</span></a><span data-dcnode-id="1400" instrument_node="">) or are they already “autocracies” (Kormai </span><a aria-label="Reference 2014" data-dcnode-id="1398" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d100297324e291" title="Kormai, J. (2014).”Fenyegető veszélyek” (Threatening Dangers), Élet és Irodalom, May 23."><span data-dcnode-id="1399" instrument_node="">2014</span></a><span data-dcnode-id="1397" instrument_node="">), “illiberal democracies” (Zakaria </span><a aria-label="Reference 1997" data-dcnode-id="1395" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d100297324e294" title="Zakaria, F. (1997). The rise of illiberal democracy. Foreign Affairs, 76(8), 22–43."><span data-dcnode-id="1396" instrument_node="">1997</span></a><span data-dcnode-id="1394" instrument_node="">). Some even call those regimes neo-fascist or neo-communist. Nevertheless, the question of legitimacy is relatively rarely posed, which may have a lot to do with the absence of analytical clarity of the concept of legitimacy. After Putin’s election to the presidency in 2012, Russian journalists suggested Putin is “illegitimate” (Russian journalists </span><a aria-label="Reference 2012" data-dcnode-id="1392" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d100297324e297" title="“Russian Journalists: Putin’s Regime is Illegitimate” (2012). Columbia University Press, Institute of Modern Russia 
                    www.mrussia.org/en/news/213-russian-journaliszs-putins-regime-is-illegitimate
                    
                  ."><span data-dcnode-id="1393" instrument_node="">2012</span></a><span data-dcnode-id="1391" instrument_node="">). The former liberal mayor of Budapest, Gábor Demszky, called the Orbán regime illegitimate (See Rádai Eszter 2014). There are also some attempts though to see new types of legitimacy emerging in post-communist “managed democracies” or “autocracies.” Daniel Bell saw Confucianism as a new legitimating principle of post-Maoist China (Bell 2008), Ossinovski, in an intriguing MSc dissertation, sees Putin’s Russia as a combination of charismatic and legal-rational authority (Ossinovski </span><a aria-label="Reference 2010" data-dcnode-id="1389" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d100297324e300" title="Ossinovski, J. (2010). Legitimacy of political power in Putin’s Russia. London: London School of Economics, MSc dissertation."><span data-dcnode-id="1390" instrument_node="">2010</span></a><span data-dcnode-id="1388" instrument_node="">)</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="1366" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="1367"><p data-dcnode-id="1368"><span data-dcnode-id="1384" instrument_node="">Astonishingly, Parsons does not translate the term “</span><i data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Herrschaft</span></i><span data-dcnode-id="1381" instrument_node="">” even ONCE as “domination.” He is in pain when he has to translate “</span><i data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Herrschaf</span></i><span data-dcnode-id="1378" instrument_node="">t” from the German original—see </span><i data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">MWG,</span></i><span data-dcnode-id="1375" instrument_node=""> Band 23, 2013, p. 210—where </span><i data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Herrschaft</span></i><span data-dcnode-id="1372" instrument_node=""> is so obviously not simply authority—a respectable exercise of power—so he invents the difficult concept,”imperative control” (Weber </span><a aria-label="Reference 1947" data-dcnode-id="1370" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d100297324e340" title="Weber, M. (1947). The theory of social and economic organization. From Wirtschaft und Gesellschaft translated by Talcott Parsons. New York: Then Free Press."><span data-dcnode-id="1371" instrument_node="">1947</span></a><span data-dcnode-id="1369" instrument_node="">, p. 152). This notion captures the tone of the concept better than authority, but still misses the idea of “subordination” found in “domination.”</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="3." data-dcnode-id="1359" id="Fn3"><div class="c-article-footnote--listed__content" data-dcnode-id="1360"><p data-dcnode-id="1361"><span data-dcnode-id="1365" instrument_node="">Max Weber, </span><i data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">The Theory of Social and Economic Organization</span></i><span data-dcnode-id="1362" instrument_node="">, 1947.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="4." data-dcnode-id="1352" id="Fn4"><div class="c-article-footnote--listed__content" data-dcnode-id="1353"><p data-dcnode-id="1354"><span data-dcnode-id="1358" instrument_node="">Gerth and Mills, from Max Weber, (</span><a aria-label="Reference 1946" data-dcnode-id="1356" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d100297324e364" title="Gerth, H. H., &amp; Wright Mills, C. (1946). From Max Weber: Essays in sociology. New York: Oxford University Press."><span data-dcnode-id="1357" instrument_node="">1946</span></a><span data-dcnode-id="1355" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="5." data-dcnode-id="1342" id="Fn5"><div class="c-article-footnote--listed__content" data-dcnode-id="1343"><p data-dcnode-id="1344"><span data-dcnode-id="1351" instrument_node="">The question how to translate </span><i data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Herrschaft</span></i><span data-dcnode-id="1348" instrument_node=""> into English has been debated for some time. Mommsen (</span><a aria-label="Reference 1974" data-dcnode-id="1346" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d100297324e376" title="Mommsen, W. (1974). The age of bureaucracy. Oxford: Blackwell Publishers."><span data-dcnode-id="1347" instrument_node="">1974</span></a><span data-dcnode-id="1345" instrument_node="">, p. 74) among others pointed out the difficulties of translation, but in the end he also concluded domination is the most appropriate term.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="6." data-dcnode-id="1335" id="Fn6"><div class="c-article-footnote--listed__content" data-dcnode-id="1336"><p data-dcnode-id="1337"><span data-dcnode-id="1341" instrument_node="">Edith Hanke is uncertain how to date the first formulation, but believes it has to be dated before WWI, </span><i data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">MWG,</span></i><span data-dcnode-id="1338" instrument_node=""> Vol. 22-4, 2005, p.118.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="7." data-dcnode-id="1310" id="Fn7"><div class="c-article-footnote--listed__content" data-dcnode-id="1311"><p data-dcnode-id="1312"><span data-dcnode-id="1334" instrument_node="">Contrast </span><i data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">MWG,</span></i><span data-dcnode-id="1331" instrument_node=""> Band 22-4, Teilband 4 (written in 1914 or before) and </span><i data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">MWG,</span></i><span data-dcnode-id="1328" instrument_node=""> Band 23 (written in 1919/1920) where the term authority hardly appears. When in the first published version of </span><i data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Economy and Society</span></i><span data-dcnode-id="1325" instrument_node=""> he defined </span><i data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Herrschaft</span></i><span data-dcnode-id="1322" instrument_node=""> he put behind the term </span><i data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Herrschaft</span></i><span data-dcnode-id="1319" instrument_node=""> in brackets and quotation marks “authority” this way: Herrschaft (“Autorität”), see Weber </span><a aria-label="Reference 1978" data-dcnode-id="1317" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d100297324e420" title="Weber, M. (1978). Economy and society. Berkeley: University of California Press."><span data-dcnode-id="1318" instrument_node="">1978</span></a><span data-dcnode-id="1316" instrument_node="">, Vol. I. p.212 or </span><i data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">MWG</span></i><span data-dcnode-id="1313" instrument_node=""> 2013, Band 23, p. 449.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="8." data-dcnode-id="1297" id="Fn8"><div class="c-article-footnote--listed__content" data-dcnode-id="1298"><p data-dcnode-id="1299"><span data-dcnode-id="1309" instrument_node="">Already in the draft he wrote before the war, Weber tried to emphasize that </span><i data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Herrschaft</span></i><span data-dcnode-id="1306" instrument_node=""> implies obedience to command: “… in our terminology domination shall be identical with authoritarian power of command” (Weber </span><a aria-label="Reference 1978" data-dcnode-id="1304" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d100297324e450" title="Weber, M. (1978). Economy and society. Berkeley: University of California Press."><span data-dcnode-id="1305" instrument_node="">1978</span></a><span data-dcnode-id="1303" instrument_node="">, p. 946; Weber </span><a aria-label="Reference 2005" data-dcnode-id="1301" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d100297324e453" title="Weber, M. (2005). Max Weber Gesamtausgabe. Band 22-4. Tübingen: Mohr und Siebeck."><span data-dcnode-id="1302" instrument_node="">2005</span></a><span data-dcnode-id="1300" instrument_node="">, p, 135)</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="9." data-dcnode-id="1287" id="Fn9"><div class="c-article-footnote--listed__content" data-dcnode-id="1288"><p data-dcnode-id="1289"><span data-dcnode-id="1296" instrument_node="">Roth and Schluchter suggests that Weber has no theory of “evolution,” he rather conceived “development” over time, see Roth and Schluchter </span><a aria-label="Reference 1979" data-dcnode-id="1294" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d100297324e510" title="Roth, G., &amp; Schluchter, W. (1979). Max Weber’s vision of history. Berkeley: University of California Press."><span data-dcnode-id="1295" instrument_node="">1979</span></a><span data-dcnode-id="1293" instrument_node="">, pp. 195–206; Schluchter </span><a aria-label="Reference 1981" data-dcnode-id="1291" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d100297324e513" title="Schluchter, W. (1981). The rise of Western rationalism. Berkeley: University of California Press."><span data-dcnode-id="1292" instrument_node="">1981</span></a><span data-dcnode-id="1290" instrument_node="">, pp. 1–5.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="10." data-dcnode-id="1277" id="Fn10"><div class="c-article-footnote--listed__content" data-dcnode-id="1278"><p data-dcnode-id="1279"><span data-dcnode-id="1286" instrument_node="">See the review of his lecture in October 25, 1917 in </span><i data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Neue Freie Press</span></i><span data-dcnode-id="1283" instrument_node="">, reproduced in Weber </span><a aria-label="Reference 2005" data-dcnode-id="1281" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d100297324e579" title="Weber, M. (2005). Max Weber Gesamtausgabe. Band 22-4. Tübingen: Mohr und Siebeck."><span data-dcnode-id="1282" instrument_node="">2005</span></a><span data-dcnode-id="1280" instrument_node="">, Band 22-4, pp. 752–756).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="11." data-dcnode-id="1270" id="Fn11"><div class="c-article-footnote--listed__content" data-dcnode-id="1271"><p data-dcnode-id="1272"><span data-dcnode-id="1276" instrument_node="">All citations are from Weber </span><a aria-label="Reference 1978" data-dcnode-id="1274" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d100297324e710" title="Weber, M. (1978). Economy and society. Berkeley: University of California Press."><span data-dcnode-id="1275" instrument_node="">1978</span></a><span data-dcnode-id="1273" instrument_node="">.</span></p></div></li><li cla ). Charisma, order and status. American Sociological Review, 30(2), 199–213."><span data-dcnode-id="1254" instrument_node="">1965</span></a><span data-dcnode-id="1252" instrument_node="">) “Charisma, Order and Status” takes off from Weber and tries to adopt it as a broader concept to be applicable to modernity—one may say even to the mundane word; others took a different direction and suggested in modernity charisma can be abused, faked, as, for example, by what Hitler or Stalin did, or it can be abused for commercial purposes, see Bensman and Givant </span><a aria-label="Reference 1975" data-dcnode-id="1250" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d100297324e789" title="Bensman, J., &amp; Givant, M. (1975). Charisma and modernity: the use and abuse of the concept. Social Research, 42(4), 570–614."><span data-dcnode-id="1251" instrument_node="">1975</span></a><span data-dcnode-id="1249" instrument_node="">; more recently Costa Pinto et al. </span><a aria-label="Reference 2007" data-dcnode-id="1247" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d100297324e792" title="Costa Pinto, A., Eatwell, R., &amp; Larson, S. U. (Eds.). (2007). Charisma and fascism in interwar Europe. New York: Routledge."><span data-dcnode-id="1248" instrument_node="">2007</span></a><span data-dcnode-id="1246" instrument_node="">
