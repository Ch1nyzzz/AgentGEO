</span><meta content="This article has four main objectives. First, it introduces the ideal types of domination of Weber. Contrary to the received wisdom, which knows only “three ideal types” (traditional, charismatic and legal rational) I present the “fourth” type of domination, Weber called “Wille der Beherrschten” as an important correction of his ideal type of legal-rational authority. Next I make a novel, critical distinction between patrimonial and prebendal types of traditional authority. Third, I discuss various ways that communist regimes tried to legitimate themselves and how they entered eventually a legitimation crisis, leading to the collapse of communism. In the next section, I explore the different ways post-communist capitalisms seek legitimacy (with various combinations of legal rational authority and patrimonialism), and finally I conclude with a trend of re-convergence of some post-communist systems (especially Russia and Hungary, but with signs for similar trends elsewhere) into an illiberal, prebendal quasi-democratic system." data-dcnode-id="2885" name="dc.description"><span data-dcnode-id="2884" instrument_node="">

</span><meta content="This article has four main objectives. First, it introduces the ideal types of domination of Weber. Contrary to the received wisdom, which knows only “three ideal types” (traditional, charismatic and legal rational) I present the “fourth” type of domination, Weber called “Wille der Beherrschten” as an important correction of his ideal type of legal-rational authority. Next I make a novel, critical distinction between patrimonial and prebendal types of traditional authority. Third, I discuss various ways that communist regimes tried to legitimate themselves and how they entered eventually a legitimation crisis, leading to the collapse of communism. In the next section, I explore the different ways post-communist capitalisms seek legitimacy (with various combinations of legal rational authority and patrimonialism), and finally I conclude with a trend of re-convergence of some post-communist systems (especially Russia and Hungary, but with signs for similar trends elsewhere) into an illiberal, prebendal quasi-democratic system." data-dcnode-id="2731" property="og:description"><span data-dcnode-id="2730" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="682" data-track-component="article body"><span data-dcnode-id="2302" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="2292" data-gtm-vis-first-on-screen-50443292_562="864" data-gtm-vis-first-on-screen-50443292_563="874" data-gtm-vis-polling-id-50443292_562="103" data-gtm-vis-polling-id-50443292_563="105" data-gtm-vis-recent-on-screen-50443292_562="864" data-gtm-vis-recent-on-screen-50443292_563="874" data-gtm-vis-total-visible-time-50443292_562="9700" data-gtm-vis-total-visible-time-50443292_563="9700" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2293" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2300" id="Abs1"><span data-dcnode-id="2301" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2294" id="Abs1-content"><p data-dcnode-id="2295"><span data-dcnode-id="2299" instrument_node="">This article has four main objectives. First, it introduces the ideal types of domination of Weber. Contrary to the received wisdom, which knows only “three ideal types” (traditional, charismatic and legal rational) I present the “fourth” type of domination, Weber called “</span><i data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">Wille der Beherrschten</span></i><span data-dcnode-id="2296" instrument_node="">” as an important correction of his ideal type of legal-rational authority. Next I make a novel, critical distinction between patrimonial and prebendal types of traditional authority. Third, I discuss various ways that communist regimes tried to legitimate themselves and how they entered eventually a legitimation crisis, leading to the collapse of communism. In the next section, I explore the different ways post-communist capitalisms seek legitimacy (with various combinations of legal rational authority and patrimonialism), and finally I conclude with a trend of re-convergence of some post-communist systems (especially Russia and Hungary, but with signs for similar trends elsewhere) into an illiberal, prebendal quasi-democratic system.</span></p></div></div></section><span data-dcnode-id="2291" instrument_node="">
</span><section data-dcnode-id="2106" data-gtm-vis-first-on-screen-50443292_562="874" data-gtm-vis-first-on-screen-50443292_563="891" data-gtm-vis-polling-id-50443292_562="104" data-gtm-vis-polling-id-50443292_563="106" data-gtm-vis-recent-on-screen-50443292_562="874" data-gtm-vis-recent-on-screen-50443292_563="891" data-gtm-vis-total-visible-time-50443292_562="9700" data-gtm-vis-total-visible-time-50443292_563="9700" data-title="Introductory notes on Weber’s theory of power, domination, and legitimacy"><div class="c-article-section" data-dcnode-id="2107" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2289" id="Sec1"><span data-dcnode-id="2290" instrument_node="">Introductory notes on Weber’s theory of power, domination, and legitimacy</span></h2><div class="c-article-section__content" data-dcnode-id="2108" id="Sec1-content"><p data-dcnode-id="2281"><span data-dcnode-id="2288" instrument_node="">The main purpose of this article is to explore whether post-communist capitalism, at least some versions of it, can be regarded as legitimate authority. The nature of political regimes of certain post-communist regimes, especially the rule by Presidents Putin and Xi and since 2010 that of Hungarian Prime Minister Orbán’s government, is often hotly debated, nevertheless the question whether these regimes are legitimate at all and if so on what ground do they claim legitimacy is rarely posed.</span><sup data-dcnode-id="2283"><a data-dcnode-id="2284" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Footnote </span></span><span data-dcnode-id="2285" instrument_node="">1</span></a></sup><span data-dcnode-id="2282" instrument_node="">
</span></p><p data-dcnode-id="2213"><span data-dcnode-id="2280" instrument_node="">When a system can be called “legitimate” can be debated and the answers to these questions depend to a large extent on our definition of terms. The aim of my article is rather limited. My point of departure is Max Weber’s theory of legitimacy and the only question I pose is: Were communist and are post-communist regimes of Putin, Xi, or Orbán legitimate in terms of Weber’s theory, and if they are, what are the bases of their claim for legitimacy? Weber’s distinction between power (</span><i data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">Macht</span></i><span data-dcnode-id="2277" instrument_node="">) and domination/authority (</span><i data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">Herrschaf</span></i><span data-dcnode-id="2274" instrument_node="">t) is crucial to answer this question. The dispute how to translate </span><i data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Herrschaft</span></i><span data-dcnode-id="2271" instrument_node=""> into English is indicative of the controversy about some of the issues of legitimacy. Talcott Parsons offered one of the first—at that time still incomplete—translations of </span><i data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">Economy and Society</span></i><span data-dcnode-id="2268" instrument_node=""> into English. He translated </span><i data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">Herrschaft</span></i><span data-dcnode-id="2265" instrument_node=""> in a very American way as “authority.”</span><sup data-dcnode-id="2260"><a data-dcnode-id="2261" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">Footnote </span></span><span data-dcnode-id="2262" instrument_node="">2</span></a></sup><span data-dcnode-id="2259" instrument_node=""> The term—which is occasionally also used by Weber—implying the respectability of those who issue commands, rather than emphasizing the asymmetry of power relationships between those who dominate and those who are subordinated to domination.</span><sup data-dcnode-id="2254"><a data-dcnode-id="2255" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">Footnote </span></span><span data-dcnode-id="2256" instrument_node="">3</span></a></sup><span data-dcnode-id="2253" instrument_node=""> Gerth and Mills just about the same time (Parson was a political conservative, while Mills was on the political left, and Gerth as a native German speaker had an arguably deeper understanding of what “</span><i data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">Herrschaft</span></i><span data-dcnode-id="2250" instrument_node="">” meant) both translated </span><i data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">Herrschaft</span></i><span data-dcnode-id="2247" instrument_node=""> as “domination.”</span><sup data-dcnode-id="2242"><a data-dcnode-id="2243" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">Footnote </span></span><span data-dcnode-id="2244" instrument_node="">4</span></a></sup><span data-dcnode-id="2241" instrument_node=""> Whether Herrschaft means authority or domination is of some importance to understanding Weber’s work and especially the theory of legitimation.</span><sup data-dcnode-id="2236"><a data-dcnode-id="2237" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Footnote </span></span><span data-dcnode-id="2238" instrument_node="">5</span></a></sup><span data-dcnode-id="2235" instrument_node=""> Weber himself was hesitant in his terminology. In the earlier drafts of </span><i data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">Economy and Society,</span></i><span data-dcnode-id="2232" instrument_node=""> he used the term “authority” quite often, but as he was redrafting the work for what was eventually published as chapters 1-4 in the version of the book edited by Marianna Weber (Weber </span><a aria-label="Reference 1978" data-dcnode-id="2230" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d100297324e385" title="Weber, M. (1978). Economy and society. Berkeley: University of California Press."><span data-dcnode-id="2231" instrument_node="">1978</span></a><span data-dcnode-id="2229" instrument_node="">), in the chapters written sometimes between 1919 and 1920, while the earlier versions were written in 1914 or before,</span><sup data-dcnode-id="2224"><a data-dcnode-id="2225" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">Footnote </span></span><span data-dcnode-id="2226" instrument_node="">6</span></a></sup><span data-dcnode-id="2223" instrument_node=""> suddenly the word authority almost completely disappears and </span><i data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">Herrschaft</span></i><span data-dcnode-id="2220" instrument_node=""> is used almost exclusively.</span><sup data-dcnode-id="2215"><a data-dcnode-id="2216" href="#Fn7"><span class="u-visually-hidden" data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">Footnote </span></span><span data-dcnode-id="2217" instrument_node="">7</span></a></sup><span data-dcnode-id="2214" instrument_node="">
</span></p><p data-dcnode-id="2181"><span data-dcnode-id="2212" instrument_node="">In order to understand why this is important we need to go back to the distinction between </span><i data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Macht</span></i><span data-dcnode-id="2209" instrument_node=""> and </span><i data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Herrschaft.</span></i><span data-dcnode-id="2206" instrument_node=""> In the later work (1919–1920) Weber defines clearly the difference between the two forms of exercising influence on others. As he puts it so eloquently in the last version of the book: power (</span><i data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Macht</span></i><span data-dcnode-id="2203" instrument_node="">) is the probability that one actor within the social relationship will be in a position to carry out his own will despite resistance (Weber </span><a aria-label="Reference 2013" data-dcnode-id="2201" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d100297324e440" title="Weber, M. (2013). Max Weber Gesamtausgabe. Band 23. Tübingen: Mohr und Siebeck."><span data-dcnode-id="2202" instrument_node="">2013</span></a><span data-dcnode-id="2200" instrument_node=""> Band 23, p. 210).</span><sup data-dcnode-id="2195"><a data-dcnode-id="2196" href="#Fn8"><span class="u-visually-hidden" data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">Footnote </span></span><span data-dcnode-id="2197" instrument_node="">8</span></a></sup><span data-dcnode-id="2194" instrument_node=""> Weber now has a clear definition of </span><i data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Herrschaft</span></i><span data-dcnode-id="2191" instrument_node=""> as well: “Domination (</span><i data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">Herrschaft</span></i><span data-dcnode-id="2188" instrument_node="">) is the probability that a command … will be obeyed.” This is about as clear as it can get. Hence </span><i data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">Macht</span></i><span data-dcnode-id="2185" instrument_node=""> (power) + legitimacy = </span><i data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">Herrschaft</span></i><span data-dcnode-id="2182" instrument_node=""> (domination).</span></p><p data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Weber’s theory of domination assumes that those subjected to domination do have some degree of “belief” in the system. Those who obey order do so—at least to some extent— “voluntarily.” No system of domination can sustain itself if it is just driven by customs, personal advantage or even effectual or idealistic attachment by those subordinated to authority:</span></p><blockquote class="c-blockquote" data-dcnode-id="2170"><div class="c-blockquote__body" data-dcnode-id="2171"><span data-dcnode-id="2178" instrument_node="">
</span><p data-dcnode-id="2173"><span data-dcnode-id="2177" instrument_node="">… [E]very genuine form of domination implies a minimum of voluntary compliance, that is, an interest … in obedience…. [C]ustoms, personal advantage, purely effectual or ideal motives of solidarity do not form a sufficiently reliable basis for a given domination. In addition there is ….a further element, the belief in legitimacy.… [E]very system attempts to establish … the belief in its legitimacy (Weber </span><a aria-label="Reference 1978" data-dcnode-id="2175" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d100297324e478" title="Weber, M. (1978). Economy and society. Berkeley: University of California Press."><span data-dcnode-id="2176" instrument_node="">1978</span></a><span data-dcnode-id="2174" instrument_node="">, pp. 212–213).</span></p><span data-dcnode-id="2172" instrument_node="">
</span></div></blockquote><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Many important questions stem from this definition. For me, the crucial question is how to interpret the notion of belief. What kind of, how strong a belief of those subordinated to authority need there be in order to acknowledge domination as legitimate, and who should hold such “beliefs”?</span></p><p data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">In order to appreciate Weber’s sophistication, one has to understand his claim that the privileged groups are not actually “superior.” They merely base their claim for obedience in the myth of their superiority. In Weber’s words: “Every highly privileged group develops a myth of its … superiority. Under the conditions of stable distribution of power that myth is accepted by the negatively privileged strata” (p. 953).</span></p><p data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Hence those who obey orders typically suspect those who dominate justify their superiority by a “myth,” therefore their belief is likely to be rather “passive.” In other words, the “masses” (my term, not Weber’s) are unlikely to have a positive, or affirmative belief in their masters, rulers, leaders, or bosses. They will believe that the domination imposed on them is justified since at this point in time they cannot find a realistic alternative. I do not have to love my master, king, husband, prime minister, CEO, Dean, department chair, or whatever: that person will exercise authority as long as I believe this person is better than any of his or her alternatives. If the masses begin to consider a possible alternative ruler/master the system is facing only a “legitimation problem.”</span></p><p data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Arguably that is a different story for the “staff.” In every complex society domination is exercised through a staff and unlike ordinary people (or the masses) the staff is supposed to have a positive, affirmative belief in the myths that justify/legitimate authority. If the staff loses its positive belief in the myth of domination the legitimacy of the system may be in a crisis.</span></p><p data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">The Shah of Iran was never particularly loved by the people of Iran. They eventually began to hear the message of Khomeini from radical Islamic preachers during the Friday sermons and many Iranians might have believed this to be a better alternative to the rule of the Shah. That created a legitimation problem. But the Shan only fell, when his security apparatus abandoned him. As his staff lost faith in him the legitimation problem turned into a legitimation crisis.</span></p><p data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">But the road from legitimation problem to legitimation crisis and eventual collapse of the regime is certainly not a one-way street. Most Western liberal capitalist societies faced during the 1960s a serious legitimation problem. As student movements—on rare occasions with some support from labor—began to formulate an alternative to liberal democratic capitalism hence the system faced a legitimation problem—especially around 1968—but history teaches us liberal capitalism has an extraordinary capacity to survive, not only economically, but also ideologically. Capitalist systems often incorporate “subversive ideologies” into its own world view (for instance, affirmative action for minorities and women and gay rights, which appeared irreconcilable with the world views of liberal capitalism, the “bourgeois social order” before the 1960s are reasonably acceptable now for the middle classes).</span></p><p data-dcnode-id="2149"><span data-dcnode-id="2156" instrument_node="">As I pointed out before the relationship between “staff” and “ruler” (by ruler I simply mean that person/office that issues command to be obeyed), is quite critical for Weber’ theory of history. As history unfolds or “develops”</span><sup data-dcnode-id="2151"><a data-dcnode-id="2152" href="#Fn9"><span class="u-visually-hidden" data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">Footnote </span></span><span data-dcnode-id="2153" instrument_node="">9</span></a></sup><span data-dcnode-id="2150" instrument_node=""> the relationship between the “ruler” and the “staff” changes. Indeed in the most elementary form of social organization (still existent in the family), namely under patriarchal authority the “ruler” has no “staff.” In more complex forms, let’s call it prebendalism—though Weber’ terminology is not carved into stone—the staff has only rather limited claims to appropriate the means of administration (and property). Those are at the discretion of the ruler. In contrast under patrimonialism at least some of the means of administration (and let’s foreshadow some of the property rights) are appropriated (though with some limitations) by the staff. In what he calls bureaucratic or legal rational authority no individual (neither the person in authority nor his/her staff) has the rights of coercion, coercive rights are the monopoly of the state (but let us add: the private property rights of all individuals and incumbency of office are secure). I elaborate more about this later in this article.</span></p><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">It is crucial to see: for Weber’s interpretative sociology the purpose of the concept of legitimacy is to interpret the various ways domination was operating over human history, to write a genealogy of human history. Much like with the theory of rationality Weber resisted the idea to call a certain type of human action “rational” and others as “irrational”. Nothing could have been further from Weber than to limit the uses of legitimate order only to social organization that had existed only during the past hundreds or 200&nbsp;years, hence was “legitimated” by the rule of law or had majoritarian approval, and to designate the rest of human history as “illegitimate.” In Weber’s theory “irrational” action and “illegitimate” social order were marginal or exceptional cases. The good question was not to ask: is this action rational, or is this social order legitimate, but rather to explore what is the rationality of this action, what is the ground of legitimacy of this order.</span></p><p data-dcnode-id="2139"><span data-dcnode-id="2146" instrument_node="">Let me try to give examples of illegitimate rule. Illegitimate rule for Weber means the unsustainable system where those in command can obtain compliance only by systematic and actual use of coercion. I put the term “actual” in bold because East European dissidents in the 1980—who wanted to question the legitimacy of late communist regimes—suggested they are illegitimate since they promise coercion in cases of non-compliance though do not exercise such coercion. In my view this would be unacceptable for Weber. All systems of domination promise coercion: even in a democratically constituted legal-rational authority those who do not comply with the rules/laws will be coerced. In many—if not most—countries people can even be executed. The modern state merely “monopolizes” the power of coercion, but it can never abandon it. Hence a system is illegitimate when those in command have to rely actually on massive coercion, like the mid-to-late 1930 Gulag in the USSR and the Nazi network of concentration camp during the war, arguably even the Kádár regime between 1957 and 1963, with several hundred political prisoners being executed and thousands imprisoned or deported. In an illegitimate system those who issue commands use </span><i data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Macht</span></i><span data-dcnode-id="2143" instrument_node="">, they are unable to sustain or have lost </span><i data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Herrschaft,</span></i><span data-dcnode-id="2140" instrument_node=""> hence voluntary compliance by those subjected to their command.</span></p><p data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">In his work on legitimacy Weber also writes about “non-legitimate” types of actions/systems, which is critically different from “illegitimate rule.” If I may use here the Gramscian terminology, “non-legitimate authority” is similar to an emerging “counter-hegemony.”</span></p><p data-dcnode-id="2111"><span data-dcnode-id="2136" instrument_node="">The prime example of non-legitimate authority is the Western city. Interestingly enough in the German original—posthumously published text—Weber did not use the term “non-legitimate authority” (Weber </span><a aria-label="Reference 1999" data-dcnode-id="2134" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d100297324e536" title="Weber, M. (1999). Max Weber Gesamtausgabe. Band 22-5. Tübingen: Mohr und Siebeck."><span data-dcnode-id="2135" instrument_node="">1999</span></a><span data-dcnode-id="2133" instrument_node="">, Band 22-5, p. 59). I assume the term non-legitimate domination was added as a subtitle for Chapter XVI “The City” (Weber </span><a aria-label="Reference 1978" data-dcnode-id="2131" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d100297324e539" title="Weber, M. (1978). Economy and society. Berkeley: University of California Press."><span data-dcnode-id="2132" instrument_node="">1978</span></a><span data-dcnode-id="2130" instrument_node="">, p. 1212) by Marianna Weber, who edited the whole work for publication. Nevertheless the term “non-legitimate authority” (following the logic of non-rational as distinct from irrational) is a sensible one. What is the bottom line in the manuscript </span><i data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Die Stadt</span></i><span data-dcnode-id="2127" instrument_node="">? My short take on this is: the city that emerges in the West has one exceptional feature: it is an island in the ocean of traditional authority, which introduces a new principle, the principle of </span><i data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Jus soli</span></i><span data-dcnode-id="2124" instrument_node=""> by offering </span><i data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Bürgertum,</span></i><span data-dcnode-id="2121" instrument_node=""> or “citizenship” (and freedom from the master) for all those who spent a certain amount of time in the city. It introduces a new principle of legitimacy—territoriality—that is not accepted as legitimate in the surrounding ocean of traditional authority where everyone’s identity is decided </span><i data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">by Jus sanguinis,</span></i><span data-dcnode-id="2118" instrument_node=""> by ancestry. “Stadfluft macht frei” (the city air makes you free) is the “non-legitimate” principle of the Western city not known in other cities of history (Weber </span><a aria-label="Reference 1999" data-dcnode-id="2116" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d100297324e555" title="Weber, M. (1999). Max Weber Gesamtausgabe. Band 22-5. Tübingen: Mohr und Siebeck."><span data-dcnode-id="2117" instrument_node="">1999</span></a><span data-dcnode-id="2115" instrument_node="">, Band 22-5: 105). If a serf spent a relatively short period of time in the city and swore allegiance to the city, he became its “</span><i data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">Bürger,</span></i><span data-dcnode-id="2112" instrument_node="">” or “citizen” and his master could not reclaim him or her any longer. Non-legitimate authority implies an embryo that begins to grow within the wombs of a previous system of domination. It is not legitimate yet, but has a reasonable chance to become legitimate. No determination is implied: non-legitimate authority does not necessarily become legitimate: members of communes of the 1960 might have believed the way they live—which might have involved promiscuity—could eventually become the norm, would become the legitimate way to live. It did not happen—so far—but that does not mean it was not a potentiality.</span></p><p data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">Let’s summarize what we have said so far: systems are legitimate if those subordinated to authority accept their subordination, since they cannot define a better alternative and the staff of the person who issues commands has a firm belief that the master’s claims (myths for his superiority) are valid. Those systems are illegitimate that have to coerce the ones subjected to authority to obey orders; hence they have to jail, kill, and torture masses of people in a rather unpredictable way to obtain obedience. Illegitimate authority is unlikely to sustain itself in the long run. Legitimate order always assumes some degree (even if a weak one) of belief and voluntariness. People obey orders from an illegitimate authority merely if they are afraid of what will happen to them if they do not comply; they are concerned about their life and livelihood.</span></p></div></div></section><section data-dcnode-id="2025" data-title="The three (and the fourth) ideal types of legitimate authority"><div class="c-article-section" data-dcnode-id="2026" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2104" id="Sec2"><span data-dcnode-id="2105" instrument_node="">The three (and the fourth) ideal types of legitimate authority</span></h2><div class="c-article-section__content" data-dcnode-id="2027" id="Sec2-content"><p data-dcnode-id="2096"><span data-dcnode-id="2103" instrument_node="">Weber makes distinction between three “ideal types of dominations/authority”: traditional, charismatic and legal/rational. Nevertheless, in a lecture delivered in Vienna in the fall of 1917 he considered a fourth possible type of authority, and I will briefly deliberate on this.</span><sup data-dcnode-id="2098"><a data-dcnode-id="2099" href="#Fn10"><span class="u-visually-hidden" data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Footnote </span></span><span data-dcnode-id="2100" instrument_node="">10</span></a></sup><span data-dcnode-id="2097" instrument_node=""> The distinction between the initial three types serves dual purposes: 1) it is part of his philosophy of history. To put it brutally simple: history develops from earlier stages. It is not “evolution,” since a) it is not inevitable, societies can be “stuck” at earlier phases of “development,” and b) an interpretative social scientist has no way to claim that later phases are superior to earlier stages. In addition 2) while the typology is mainly historical it is also “trans-organizational.” Every actually existing society can be interpreted as a mix of the three types of domination. All actually existing systems have some elements from all three—and as I try to show: indeed four—ideal types. We may live in a legal-rational social order, but occasionally political leaders may have charismatic appeal and in the family—or in our universities—we may be subjected to patriarchal authority, while fundamentally universities are governed by laws and rules. And to continue with the fourth type of authority: we may live in a legal-rational order where the executive is not in its place by the will of those subordinated to authority (this is the case for instance when a king rules in a constitutional monarchy) or those who exercise political authority may have majoritarian approval but may violate the principles of the rule of law (think of Vladimir Putin).</span></p><p data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">This is very much the essence of the Weberian approach. Our task is to explore the nature of legitimacy in any society: to what extent is a society governed by legal-rational authority? Are there some elements of charismatic or traditional authority present in this social system? It is never either/or, the right question is: what is the empirical mix in any particular concrete empirical case.</span></p><p data-dcnode-id="2089"><span data-dcnode-id="2093" instrument_node="">First, let me briefly review the three ideal types Weber presents to us in </span><i data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">Economy and Society</span></i><span data-dcnode-id="2090" instrument_node=""> and amend it with the “fourth type” at the end of this section of the article. In this article my main task is to explore what is the mix we can find in a communist and post-communist society and how different it is from other societies we are familiar with. The basis of this classification is to whom obedience is due on what grounds in the various systems of domination.</span></p><p data-dcnode-id="2078"><span data-dcnode-id="2088" instrument_node="">It is important to note that the ontological status of the four types of authority is not quite the same (see Fig.&nbsp;</span><a data-dcnode-id="2086" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2087" instrument_node="">1</span></a><span data-dcnode-id="2085" instrument_node="">). While traditional authority, legal rational authority, and authority based on the “</span><i data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Wille der Beherrschten</span></i><span data-dcnode-id="2082" instrument_node="">” are stable forms, charismatic authority is a “revolutionary force.” Hence I begin the discussion with a brief review of the type of domination with traditional authority (Fig.&nbsp;</span><a data-dcnode-id="2080" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2081" instrument_node="">2</span></a><span data-dcnode-id="2079" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2054" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="2055"><figcaption data-dcnode-id="2075"><b class="c-article-section__figure-caption" data-dcnode-id="2076" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="2077" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2066"><div class="c-article-section__figure-item" data-dcnode-id="2070"><a class="c-article-section__figure-link" data-dcnode-id="2071" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11186-015-9263-6/figures/1" rel="nofollow"><picture data-dcnode-id="2072"><source data-dcnode-id="2074" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11186-015-9263-6/MediaObjects/11186_2015_9263_Fig1_HTML.gif?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="2073" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11186-015-9263-6/MediaObjects/11186_2015_9263_Fig1_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2067" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Obedience and four types of authority</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2056"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="2057" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11186-015-9263-6/figures/1" rel="nofollow"><span data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2058" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2059" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2060" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2063" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2062" fill-rule="evenodd"></path><span data-dcnode-id="2061" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2053" instrument_node="">
</span><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2029" data-test="figure" data-title="Fig. 2" id="figure-2"><figure data-dcnode-id="2030"><figcaption data-dcnode-id="2050"><b class="c-article-section__figure-caption" data-dcnode-id="2051" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="2052" instrument_node="">Fig. 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2041"><div class="c-article-section__figure-item" data-dcnode-id="2045"><a class="c-article-section__figure-link" data-dcnode-id="2046" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11186-015-9263-6/figures/2" rel="nofollow"><picture data-dcnode-id="2047"><source data-dcnode-id="2049" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11186-015-9263-6/MediaObjects/11186_2015_9263_Fig2_HTML.gif?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="2048" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11186-015-9263-6/MediaObjects/11186_2015_9263_Fig2_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2042" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">Types of traditional authority</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2031"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="2032" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11186-015-9263-6/figures/2" rel="nofollow"><span data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2033" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2034" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2035" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2038" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2037" fill-rule="evenodd"></path><span data-dcnode-id="2036" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2028" instrument_node="">
</span></div></div></section><section data-dcnode-id="1959" data-title="Traditional authority"><div class="c-article-section" data-dcnode-id="1960" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2023" id="Sec3"><span data-dcnode-id="2024" instrument_node="">Traditional authority</span></h2><div class="c-article-section__content" data-dcnode-id="1961" id="Sec3-content"><p data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">Let us begin with Weber’s mature definition of traditional authority:</span></p><ol class="u-list-style-none" data-dcnode-id="1965"><span data-dcnode-id="2020" instrument_node="">
</span><li data-dcnode-id="2012"><span data-dcnode-id="2019" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">1)</span></span><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">“Legitimacy is claimed for and believed in by virtue of the sanctity of age-old rules …” (p. 226).</span></p><span data-dcnode-id="2013" instrument_node="">
</span></li><span data-dcnode-id="2011" instrument_node="">
</span><li data-dcnode-id="2000"><span data-dcnode-id="2010" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">2)</span></span><span data-dcnode-id="2007" instrument_node="">
</span><p data-dcnode-id="2002"><span data-dcnode-id="2006" instrument_node="">“The masters are designated according to traditional rule and are obeyed because of their “</span><i data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">Eigenwürde</span></i><span data-dcnode-id="2003" instrument_node="">” (traditional status)” (p. 226).</span></p><span data-dcnode-id="2001" instrument_node="">
</span></li><span data-dcnode-id="1999" instrument_node="">
</span><li data-dcnode-id="1991"><span data-dcnode-id="1998" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">3)</span></span><span data-dcnode-id="1995" instrument_node="">
</span><p data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">“This … rule is … primarily based on personal loyalty” (p. 227).</span></p><span data-dcnode-id="1992" instrument_node="">
</span></li><span data-dcnode-id="1990" instrument_node="">
</span><li data-dcnode-id="1982"><span data-dcnode-id="1989" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">4)</span></span><span data-dcnode-id="1986" instrument_node="">
</span><p data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">“The person exercising authority is not a superior, but a “personal master” (p. 227).</span></p><span data-dcnode-id="1983" instrument_node="">
</span></li><span data-dcnode-id="1981" instrument_node="">
</span><li data-dcnode-id="1967"><span data-dcnode-id="1980" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">5)</span></span><span data-dcnode-id="1977" instrument_node="">
</span><p data-dcnode-id="1969"><span data-dcnode-id="1976" instrument_node="">“Obedience is owed not to enacted rules, but to the person …” (p. 227)</span><sup data-dcnode-id="1971"><a data-dcnode-id="1972" href="#Fn11"><span class="u-visually-hidden" data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Footnote </span></span><span data-dcnode-id="1973" instrument_node="">11</span></a></sup><span data-dcnode-id="1970" instrument_node=""> (emphases are mine).</span></p><span data-dcnode-id="1968" instrument_node="">
</span></li><span data-dcnode-id="1966" instrument_node="">
</span></ol><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">This seems to be clear enough as an attempt to describe “pre-modern” or “traditional” societies. Weber goes a great deal further and characterizes various types/phases—given his dedication to “developmentalism.” I try to avoid terms like “stages” in discussing traditional authority.</span></p></div></div></section><section data-dcnode-id="1899" data-title="Charismatic authority"><div class="c-article-section" data-dcnode-id="1900" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1957" id="Sec4"><span data-dcnode-id="1958" instrument_node="">Charismatic authority</span></h2><div class="c-article-section__content" data-dcnode-id="1901" id="Sec4-content"><p data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">Not much remains to be said about the second, transitional form of authority: charismatic domination. Its nature is straight forward and it is quite obvious that in some form or degree the charismatic domination concept is applicable not only to archaic societies, but to the world of the twentieth or twenty-first centuries. Weber’s definition is clear:</span></p><blockquote class="c-blockquote" data-dcnode-id="1949"><div class="c-blockquote__body" data-dcnode-id="1950"><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">The term ‘charisma’ will be applied to a certain quality of an individual personality by virtue of which he is considered extraordinary and treated as endowed with supernatural, superhuman, or at least exceptional powers or qualities. These … are not accessible to the ordinary person, but regarded as of divine origin or as exemplary … (p. 241) (emphases are mine).</span></p><span data-dcnode-id="1951" instrument_node="">
</span></div></blockquote><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">People who subject themselves to charismatic authority consider that person “extraordinary” (almost superhuman, or divine), so charisma is not an innate characteristic of individuals, but it is attributed to them by the followers. But why would they do this? Why would they consider another ordinary person as extraordinary, divine, or exemplary? Weber has a good answer. People “create” charismatic leaders in times of great transformation and crises, when there is a great need for a leader who can deliver miracles and resolve the problems that look almost unresolvable. A Charismatic leader offers hope for the hopeless, promises paradise on Earth. And when they cannot deliver? They lose their charisma:</span></p><blockquote class="c-blockquote" data-dcnode-id="1919"><div class="c-blockquote__body" data-dcnode-id="1920"><span data-dcnode-id="1945" instrument_node="">
</span><p data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">“If proof and success elude the leader for long … it is likely that his charismatic authority will disappear” (p. 242) (emphases are mine).</span></p><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">“[The charismatic leader gains and retains his authority] … solely by proving his powers in practice. He must work miracles…. If the people withdraw their recognition, the master becomes a mere private person …” (pp. 1114–1115).</span></p><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">No wonder, charisma is the “revolutionary force”:</span></p><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">“In traditionalist periods, charisma is the great revolutionary force …” (p. 245).</span></p><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">“[B]ureaucratic rationalization, too, often has been a major revolutionary force.… But it revolutionizes with technical means … “from without” … Charismatic belief revolutionizes men ‘from within’ …” (pp. 1116).</span></p><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1922"><span data-dcnode-id="1929" instrument_node="">“In pre-rationalistic periods, tradition and charisma between them have almost exhausted the whole of orientation of action” (p. 245).</span><sup data-dcnode-id="1924"><a data-dcnode-id="1925" href="#Fn12"><span class="u-visually-hidden" data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Footnote </span></span><span data-dcnode-id="1926" instrument_node="">12</span></a></sup><span data-dcnode-id="1923" instrument_node="">
</span></p><span data-dcnode-id="1921" instrument_node="">
</span></div></blockquote><span data-dcnode-id="1918" instrument_node="">
</span><p data-dcnode-id="1904"><span data-dcnode-id="1917" instrument_node="">Charisma hence is in the “eye of the beholder,” not a characteristic of the person who is regarded to be charismatic. The term is borrowed from theology</span><sup data-dcnode-id="1912"><a data-dcnode-id="1913" href="#Fn13"><span class="u-visually-hidden" data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Footnote </span></span><span data-dcnode-id="1914" instrument_node="">13</span></a></sup><span data-dcnode-id="1911" instrument_node=""> and indeed the “pure types” of charismatic leaders are the founders of great religious movements. Nevertheless there are leaders who strive for and acquire the status of being “charismatic” even in modernity or even under legal-rational authority. Weber considered exceptional individuals in sciences or art to be “charismatic.” The question whether they carry “real charisma” or they are pseudo charismatic leaders or they just carry “fake” charisma is debated..</span><sup data-dcnode-id="1906"><a data-dcnode-id="1907" href="#Fn14"><span class="u-visually-hidden" data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">Footnote </span></span><span data-dcnode-id="1908" instrument_node="">14</span></a></sup><span data-dcnode-id="1905" instrument_node=""> I take an eclectic position here—Weber’s theory of charisma is an ideal type; it does not actually exist in pure form therefore it is reasonable to look for signs of charisma in non-traditional settings as well.</span></p><p data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">It should be crystal clear: charisma is the type of domination that is transitory; basically it is between one of the forms of traditional authority and another form of traditional authority. Hence it is hard or impossible to pass charisma on from one leader to the next. Arguably one exception is the Roman Catholic Church, but transmission of charisma is rather difficult even in the Church. When one charismatic leader lost his or her charisma or the leader passed away, it is likely that a certain kind of traditional authority will replace that leader. On rare occasions charismatic authority may be turned into legal-rational authority.</span></p></div></div></section><section data-dcnode-id="1764" data-title="Legal-rational authority"><div class="c-article-section" data-dcnode-id="1765" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1897" id="Sec5"><span data-dcnode-id="1898" instrument_node="">Legal-rational authority</span></h2><div class="c-article-section__content" data-dcnode-id="1766" id="Sec5-content"><p data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">At first glance it appears to be simple and clear what legal-rational domination is and only as we dig deeper do we see that it is a little more complicated.</span></p><p data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">So how is “obedience” attained under this form?</span></p><ol class="u-list-style-none" data-dcnode-id="1858"><span data-dcnode-id="1892" instrument_node="">
</span><li data-dcnode-id="1884"><span data-dcnode-id="1891" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">i.</span></span><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">“… person in authority, the “superior,” is himself subject to an impersonal order …</span></p><span data-dcnode-id="1885" instrument_node="">
</span></li><span data-dcnode-id="1883" instrument_node="">
</span><li data-dcnode-id="1875"><span data-dcnode-id="1882" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">ii.</span></span><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">… the person who obeys authority … obeys only the law …</span></p><span data-dcnode-id="1876" instrument_node="">
</span></li><span data-dcnode-id="1874" instrument_node="">
</span><li data-dcnode-id="1860"><span data-dcnode-id="1873" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">iii.</span></span><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1862"><span data-dcnode-id="1869" instrument_node="">… members do not owe obedience to [superior] as an individual, but to the impersonal order …” (pp. 217–128) (all emphases are mine).</span><sup data-dcnode-id="1864"><a data-dcnode-id="1865" href="#Fn15"><span class="u-visually-hidden" data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Footnote </span></span><span data-dcnode-id="1866" instrument_node="">15</span></a></sup><span data-dcnode-id="1863" instrument_node="">
</span></p><span data-dcnode-id="1861" instrument_node="">
</span></li><span data-dcnode-id="1859" instrument_node="">
</span></ol><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">What is clear that obedience is not due to a personal master but to pre-established laws and rules and the person in authority is subject to the same laws and rules as anyone else. Hence it is legal rather than personal authority. What makes it rational? The fact that it allows rational calculation: the rules have to be pre-established, they cannot change at the discretion of the person in authority and it would follow that legislation can never be retroactive (that would make rational calculation impossible).</span></p><p data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">Rational calculation is critical for Weber: he goes on at great length to explain why traditional or charismatic authority is inconsistent with modern market capitalism. So traditional authority is not conducive to capitalist development, because:</span></p><p data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">“[T]he general character of the administrative practices [of traditional authority] … restrict the development of rational economic activity … [in the following ways]:</span></p><ol class="u-list-style-none" data-dcnode-id="1813"><span data-dcnode-id="1850" instrument_node="">
</span><li data-dcnode-id="1842"><span data-dcnode-id="1849" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">1)</span></span><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Traditionalism places … obstacles in the way of formally rational regulations, which can depended upon to remain stable and hence calculable …</span></p><span data-dcnode-id="1843" instrument_node="">
</span></li><span data-dcnode-id="1841" instrument_node="">
</span><li data-dcnode-id="1833"><span data-dcnode-id="1840" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">2)</span></span><span data-dcnode-id="1837" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">A staff …with formal technical training … is typically absent.</span></p><span data-dcnode-id="1834" instrument_node="">
</span></li><span data-dcnode-id="1832" instrument_node="">
</span><li data-dcnode-id="1824"><span data-dcnode-id="1831" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">3)</span></span><span data-dcnode-id="1828" instrument_node="">
</span><p data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">There is a wide scope for actual arbitrariness …</span></p><span data-dcnode-id="1825" instrument_node="">
</span></li><span data-dcnode-id="1823" instrument_node="">
</span><li data-dcnode-id="1815"><span data-dcnode-id="1822" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">4)</span></span><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">[It had] an inherent tendency to regulate economic activity in terms of utilitarian, welfare or absolute value” (pp. 239–240) (emphasis is mine).</span></p><span data-dcnode-id="1816" instrument_node="">
</span></li><span data-dcnode-id="1814" instrument_node="">
</span></ol><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Charismatic authority is not conducive to capitalist development either. It is actually “anti-economic force”:</span></p><p data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">Since it is ‘extraordinary,’ charismatic authority is sharply opposed to rational and particularly bureaucratic authority.… Bureaucratic authority is … rational … [by] being bound to intellectually analyzable rules; while charismatic authority is specifically irrational in the sense of being foreign to all rules” (p. 244)…. [C]harismatic want-satisfaction is a typical anti-economic force … [it constitutes] an irregular, unsystematic acquisitive act (p. 245) (all emphases are mine).</span></p><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Hence the only form of domination what is consistent with the requirement of market capitalism is legal-rational authority. It actually could be called a system of “liberalism.”But what is the relationship between liberalism and democracy? Weber was called by Mommsen a “liberal in despair.” He does not have a clear answer. What matters is that this is a system of rule of law and regulations, which apply equally to all members including the persons in authority. But where do the laws or rules come from? Weber as late as in 1920 does not have a definite answer to this question:</span></p><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">“Legal authority rests on the acceptance of the validity of the following … ideas:</span></p><ol class="u-list-style-none" data-dcnode-id="1778"><span data-dcnode-id="1803" instrument_node="">
</span><li data-dcnode-id="1795"><span data-dcnode-id="1802" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">1.</span></span><span data-dcnode-id="1799" instrument_node="">
</span><p data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">…. norms [laws] may be established by agreement or by imposition, on grounds of expediency or value rationality or both …</span></p><span data-dcnode-id="1796" instrument_node="">
</span></li><span data-dcnode-id="1794" instrument_node="">
</span><li data-dcnode-id="1780"><span data-dcnode-id="1793" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">2.</span></span><span data-dcnode-id="1790" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1789" instrument_node="">…. law … [is] … a consistent system of abstract rules which … [was] … intentionally established …” (p. 217)</span><sup data-dcnode-id="1784"><a data-dcnode-id="1785" href="#Fn16"><span class="u-visually-hidden" data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Footnote </span></span><span data-dcnode-id="1786" instrument_node="">16</span></a></sup><span data-dcnode-id="1783" instrument_node=""> (all emphases are mine).</span></p><span data-dcnode-id="1781" instrument_node="">
</span></li><span data-dcnode-id="1779" instrument_node="">
</span></ol><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Hence rules or laws can be established by “imposition” or they can be attained by agreement, though Weber is silent with regard to by whom and how such an agreement has to be reached.</span></p><p data-dcnode-id="1767"><span data-dcnode-id="1774" instrument_node="">To conclude: legal-rational authority MAY be a democratic polity or it may not. The question that haunted political science since the seventeenth century, since Hobbes and Locke (namely the question: who is the source of law?) is not addressed in Weber’s typology of domination. For him the critical question is: what is the most suitable political system for capitalist development? It has to be liberal, but—by implication—it does not have to be necessarily democratic. Liberal autocratic or authoritarian regimes have a reasonable record in achieving capitalistic aims. Or do they have to turn eventually to democracy? Is the future of China liberal democracy? We can have a strong political commitment to such a project, but as social scientists: we do not know. Some political theorists have argued (contested by others) democracy is by far the best shell of capitalism (as Lenin put it</span><sup data-dcnode-id="1769"><a data-dcnode-id="1770" href="#Fn17"><span class="u-visually-hidden" data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Footnote </span></span><span data-dcnode-id="1771" instrument_node="">17</span></a></sup><span data-dcnode-id="1768" instrument_node="">), it was actually achieved by the anti-capitalist struggles of the working class, which forced capitalists to political compromises, such as the welfare state and universal suffrage. Whether capitalism needs democracy or not, whether democracy was forced upon capital by labor or it also the most efficient political tool for private gains: Weber is agnostic. But he is certain: there is no capitalist economy without liberalism. This liberalism implies: rule and stability of laws (and inevitably a separation of executive power from legislative power, no matter how legislative bodies are constituted), equality before the law (what requires an independent judiciary) and security of private property rights. Weber is not as specific about these issues as I am now, but this all logically follows from his theory.</span></p></div></div></section><section data-dcnode-id="1726" data-title="The fourth type of domination"><div class="c-article-section" data-dcnode-id="1727" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1762" id="Sec6"><span data-dcnode-id="1763" instrument_node="">The fourth type of domination</span></h2><div class="c-article-section__content" data-dcnode-id="1728" id="Sec6-content"><p data-dcnode-id="1739"><span data-dcnode-id="1761" instrument_node="">But the question of how liberalism is related to democracy—nevertheless was on Weber’s mind and this is why in 1917 in his lecture in Vienna he considers a fourth type of domination. (This is rarely noticed in scholarship on Weber</span><sup data-dcnode-id="1756"><a data-dcnode-id="1757" href="#Fn18"><span class="u-visually-hidden" data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Footnote </span></span><span data-dcnode-id="1758" instrument_node="">18</span></a></sup><span data-dcnode-id="1755" instrument_node="">). The Neue Freie Press reports on his October 1917 lecture in Vienna this way: </span><i data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">“Schließlich ging er [meaning the lecturer, hence Max Weber] zu der Darlegung über, wie die modern Entwicklung der okzidentalen Staatswesen durch das allmähliche Entstehen eines vierten Legitimationsgendankens charakterisiert war, derjenigen Herrschaft, welche wenigstens offiziell ihre eigene Legitimität aus dem Willen der Beherrschten ableitet”</span></i><span data-dcnode-id="1752" instrument_node=""> (Weber </span><a aria-label="Reference 2005" data-dcnode-id="1750" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d100297324e999" title="Weber, M. (2005). Max Weber Gesamtausgabe. Band 22-4. Tübingen: Mohr und Siebeck."><span data-dcnode-id="1751" instrument_node="">2005</span></a><span data-dcnode-id="1749" instrument_node="">, Band 22-4, p. 755, my emphasis). Wow. What a sentence! Unlike in his theory of legal-rational authority now legitimacy may stem from the “will” of the people. But Weber cannot help: he is a liberal in despair. After all these people are the “</span><i data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Beherrschten</span></i><span data-dcnode-id="1746" instrument_node="">” (they are subjected to domination), the resulting system is still a system of “</span><i data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Herrschaft</span></i><span data-dcnode-id="1743" instrument_node="">” rather than the realm of freedom and on top of this is “</span><i data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">wenigstens offiziell</span></i><span data-dcnode-id="1740" instrument_node="">” (at least officially) the ground for the fourth type of legitimacy. To conclude: Weber takes no stand about the question what is the best “shell” for capitalism: liberal autocracy or liberal democracy.</span></p><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">In my reading, the fourth system of legitimation is a somewhat ironic definition of democratic legitimacy (after all this is the will of those “subjected to authority, not the will of “free citizens”—hence this is a kind of foucauldian ironic comment about what “will” can be). Nevertheless this is articulated before the collapse of the German largely illiberal monarchical autocracy and before the Weimar experiment with liberal democracy. Let me also add: Weber speaks about “will of those subordinated to authority” before he can see the illiberal autocracy that will emerge as a result of the communist revolution in Russia, hence on October 1917 he might have hoped that in post-revolutionary Russia and post-imperial Germany liberal “democracy” might emerge.</span></p><p data-dcnode-id="1729"><span data-dcnode-id="1736" instrument_node="">It is telling though that when in 1919–1920 Weber re-writes his theory of legitimacy the “fourth type of legitimacy” disappears. Given the mess that the November 7, 1917 revolution in Russia produced and chaotic nature of the Weimar Republic, Weber—probably wrongly—expected the solution would come from Charismatic leaders, rather than “</span><i data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Wille der Beherrschten</span></i><span data-dcnode-id="1733" instrument_node="">.” What a tragic mistake: charismatic leadership led to disasters, while at least after the Second World War in the Euro-Atlantic region the dominant form of domination became “liberal democracy,” hence a combination of legal-rational authority with “</span><i data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Wille der Beherrschten</span></i><span data-dcnode-id="1730" instrument_node="">.” This arguably is not a perfect, but still the best system of governance—to put it as Churchill did—that humankind has invented so far.</span></p></div></div></section><section data-dcnode-id="1580" data-title="Various types of traditional authority"><div class="c-article-section" data-dcnode-id="1581" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1724" id="Sec7"><span data-dcnode-id="1725" instrument_node="">Various types of traditional authority</span></h2><div class="c-article-section__content" data-dcnode-id="1582" id="Sec7-content"><p data-dcnode-id="1719"><span data-dcnode-id="1723" instrument_node="">Let us return to the various types of “traditional authority.” This is important for this article. As I pointed out before Weber’ distinction among the various types of authority has two purposes: 1/ it aims to offer a typology of social formation over time. In a way it is a substitute for what Marx offered as a history of “modes of production;” 2/ but at the same time it can be used also as an analytic tool to dissect the ways domination operates in any social formation, including “modern” societies. While “modern” societies are primarily legal-rational authorities they may maintain some traditional elements. It is rather uncontroversial to suggest that patriarchal authority exists in “modern societies,” even under legal-rational authority. Nevertheless the most provocative hypothesis of this article is to claim that other forms of traditional authority, such as prebendalism or patrimonialism may co-exist with a usually deformed system of legal-rational and democratic authority (hence with the “</span><i data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Wille der Beherschten</span></i><span data-dcnode-id="1720" instrument_node="">”).</span></p><p data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Now let me turn to the four “pure” types of traditional authority: patriarchy, Sultanism, prebendalism, and patrimonialism. Then I offer a hypothesis as to how these types can be applicable to the analysis of contemporary societies.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1715" id="Sec8"><span data-dcnode-id="1716" instrument_node="">Types of traditional authority</span></h3><span data-dcnode-id="1714" instrument_node="">
</span><ol class="u-list-style-none" data-dcnode-id="1703"><span data-dcnode-id="1713" instrument_node="">
</span><li data-dcnode-id="1705"><span data-dcnode-id="1712" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">1/</span></span><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Patriarchy</span></p><span data-dcnode-id="1706" instrument_node="">
</span></li><span data-dcnode-id="1704" instrument_node="">
</span></ol><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">The concept of patriarchy is fairly simple:</span></p><blockquote class="c-blockquote" data-dcnode-id="1679"><div class="c-blockquote__body" data-dcnode-id="1680"><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1691"><span data-dcnode-id="1698" instrument_node="">[Patriarchalism is] “… the most elementary form of traditional domination where the master has no personal administrative staff.” </span><sup data-dcnode-id="1693"><a data-dcnode-id="1694" href="#Fn19"><span class="u-visually-hidden" data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Footnote </span></span><span data-dcnode-id="1695" instrument_node="">19</span></a></sup><span data-dcnode-id="1692" instrument_node="">
</span></p><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1682"><span data-dcnode-id="1689" instrument_node="">“… The decisive characteristic [of Patriarchalism] is the belief of the members that domination, even though it is an inherent traditional right of the master, must definitely be exercised as a joint right … of all members. Hence the master is still largely dependent on the willingness of the members to comply with his orders…. Therefore the members (Genossen) are not yet really subjects (Untertanen).”</span><sup data-dcnode-id="1684"><a data-dcnode-id="1685" href="#Fn20"><span class="u-visually-hidden" data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Footnote </span></span><span data-dcnode-id="1686" instrument_node="">20</span></a></sup><span data-dcnode-id="1683" instrument_node="">
</span></p><span data-dcnode-id="1681" instrument_node="">
</span></div></blockquote><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">This sounds like a good description of tribal societies or, incidentally, the families we happened to live in. And indeed he elaborates it further to make sure it is clear enough the elementary form of patriarchy can be understood as “domestic authority”:</span></p><blockquote class="c-blockquote" data-dcnode-id="1658"><div class="c-blockquote__body" data-dcnode-id="1659"><span data-dcnode-id="1675" instrument_node="">
</span><p data-dcnode-id="1661"><span data-dcnode-id="1674" instrument_node="">“[Under] … elementary Patriarchalism…the patriarch’s authority carries strict obligations to obedience only within his own household.… [I]t has only exemplary effect … or must resort to advice or similar means of influence.” </span><sup data-dcnode-id="1669"><a data-dcnode-id="1670" href="#Fn21"><span class="u-visually-hidden" data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Footnote </span></span><span data-dcnode-id="1671" instrument_node="">21</span></a></sup><span data-dcnode-id="1668" instrument_node=""> This is a sort of “domestic authority (my emphasis) … [Taking its point of departure from] … the belief in authority [that] is based on personal relations that are perceived as natural. This belief is rooted in filial piety…. The woman is dependent because of the normal superiority … of the male.… Paternal power … [is] not primarily based on actual blood relations.… [It] is … power of disposition over property even after the … recognition that procreation and birth are connected.” </span><sup data-dcnode-id="1663"><a data-dcnode-id="1664" href="#Fn22"><span class="u-visually-hidden" data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">Footnote </span></span><span data-dcnode-id="1665" instrument_node="">22</span></a></sup><span data-dcnode-id="1662" instrument_node="">
</span></p><span data-dcnode-id="1660" instrument_node="">
</span></div></blockquote><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Patriarchy is not merely an “archaic” form from the distant past, the concept—much like almost all other concepts of Weber—is equally applicable for historical analysis or the analysis of contemporary institutional arrangements.</span></p><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">The other forms of traditional authority operate with a staff. He distinguishes three types of traditional domination with staff. His terminology can be somewhat confusing (especially his uses of the term “patrimonialism,” which often means all three types, by distinguishing primary patrimonialism from patrimonial state and the prebendal form of patrimonialism based on benefices, rather than fief. Let me offer the following simplification of Weber’s complex analysis of the three forms of traditional domination. I hope this will bring some clarity in the conceptualization:</span></p><ol class="u-list-style-none" data-dcnode-id="1642"><span data-dcnode-id="1652" instrument_node="">
</span><li data-dcnode-id="1644"><span data-dcnode-id="1651" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">2/</span></span><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Sultanism (a pure case of prebendalism)</span></p><span data-dcnode-id="1645" instrument_node="">
</span></li><span data-dcnode-id="1643" instrument_node="">
</span></ol><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1633"><span data-dcnode-id="1640" instrument_node="">In some cases the members of administrative staff “are purely personal instruments of the master.… [When authority] operates primarily on the basis of discretion [of the ruler], it will be called Sultanism…. Sometimes it appears that Sultanism is completely unrestrained by tradition, but this is never in fact the case. The non-traditional element is not, however, rationalized in impersonal terms, but consists in an extreme development of the ruler’s discretion.” </span><sup data-dcnode-id="1635"><a data-dcnode-id="1636" href="#Fn23"><span class="u-visually-hidden" data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Footnote </span></span><span data-dcnode-id="1637" instrument_node="">23</span></a></sup><span data-dcnode-id="1634" instrument_node=""> Under this system the staff possesses the means of administration at the grace of the master and has no security of property rights. Property is not inherited, cannot be alienated, and can be reallocated at any moment at the unilateral decision of the ruler.</span></p><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Prebendalism is narrowly defined. Under prebendalism the staff appropriates the means of administration of material property only partially. The staff (vassals) receive benefices:</span></p><blockquote class="c-blockquote" data-dcnode-id="1619"><div class="c-blockquote__body" data-dcnode-id="1620"><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1629" instrument_node="">“We shall speak of benefices insofar as the forms of maintenance … are always newly granted in a traditional fashion … they can be appropriated by the individual, although not in hereditary fashion…. When an administrative staff is … supported … in this form, we shall speak of prebendalism”</span><sup data-dcnode-id="1624"><a data-dcnode-id="1625" href="#Fn24"><span class="u-visually-hidden" data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Footnote </span></span><span data-dcnode-id="1626" instrument_node="">24</span></a></sup><span data-dcnode-id="1623" instrument_node=""> (my emphases).</span></p><span data-dcnode-id="1621" instrument_node="">
</span></div></blockquote><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">While Sultanism offers no security whatsoever, under prebendalism the incumbent of the office can expect to remain in office and retain property as long as he or she assures the master of loyalty and offers valuable services to the master.</span></p><ol class="u-list-style-none" data-dcnode-id="1605"><span data-dcnode-id="1615" instrument_node="">
