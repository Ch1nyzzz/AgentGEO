ot;:&quot;ChunkedArticleContent&quot;}" data-in-view="{&quot;pattern&quot;:&quot;ChunkedArticleContent&quot;}" data-include-experiments="true"><div class="ArticlePageChunks-lglntq dEYrZE" data-dcnode-id="219" data-testid="ArticlePageChunks"><div class="GridWrapper-vNBSO bKMgMh grid grid-margins grid-items-0 ArticlePageChunksGrid-kRgPDq kCzkjB" data-dcnode-id="271"><div class="GridItem-buSdEM kFFJpN grid--item" data-dcnode-id="272"><div class="BodyWrapper-ctnerm cneCLK body body__container article__body" data-dcnode-id="273" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="274"><p data-dcnode-id="349"><span data-dcnode-id="359" instrument_node="">The 2018 midterms are November 6, and the </span><a class="external-link" data-dcnode-id="357" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.washingtonpost.com/politics/women-and-young-voters-will-decide-the-2018-elections-if-they-actually-vote/2018/03/03/3e3c614c-1f06-11e8-b2d9-08e748f892c0_story.html?utm_term=.3c6193c3028c&quot;}" data-offer-url="https://www.washingtonpost.com/politics/women-and-young-voters-will-decide-the-2018-elections-if-they-actually-vote/2018/03/03/3e3c614c-1f06-11e8-b2d9-08e748f892c0_story.html?utm_term=.3c6193c3028c" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/politics/women-and-young-voters-will-decide-the-2018-elections-if-they-actually-vote/2018/03/03/3e3c614c-1f06-11e8-b2d9-08e748f892c0_story.html%3Futm_term%3D.3c6193c3028c" rel="nofollow noopener" target="_blank"><span data-dcnode-id="358" instrument_node="">this election</span></a><span data-dcnode-id="356" instrument_node=""> may be in the hands of youth voters. With the Pew Research Center finding there is roughly </span><a class="external-link" data-dcnode-id="354" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.npr.org/2016/05/16/478237882/millennials-now-rival-boomers-as-a-political-force-but-will-they-actually-vote&quot;}" data-offer-url="https://www.npr.org/2016/05/16/478237882/millennials-now-rival-boomers-as-a-political-force-but-will-they-actually-vote" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2016/05/16/478237882/millennials-now-rival-boomers-as-a-political-force-but-will-they-actually-vote" rel="nofollow noopener" target="_blank"><span data-dcnode-id="355" instrument_node="">the same amount of eligible voters 35 and under as there are  Baby Boomers</span></a><span data-dcnode-id="353" instrument_node="">, young people may have the opportunity to become the most influential demographic in the </span><a data-dcnode-id="351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/tag/2018-elections"><span data-dcnode-id="352" instrument_node="">upcoming election</span></a><span data-dcnode-id="350" instrument_node="">.</span></p><p data-dcnode-id="344"><span data-dcnode-id="348" instrument_node="">Historically, youth voter turnout has been incredibly low. During the 2014 midterm election, youth voter turnout was the </span><a class="external-link" data-dcnode-id="346" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://civicyouth.org/2014-youth-turnout-and-youth-registration-rates-lowest-ever-recorded-changes-essential-in-2016/&quot;}" data-offer-url="https://civicyouth.org/2014-youth-turnout-and-youth-registration-rates-lowest-ever-recorded-changes-essential-in-2016/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//civicyouth.org/2014-youth-turnout-and-youth-registration-rates-lowest-ever-recorded-changes-essential-in-2016/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="347" instrument_node="">lowest recorded in 40 years</span></a><span data-dcnode-id="345" instrument_node="">, with only 19.9% of voters between the ages of 18 and 29 exercising their civic duty.</span></p><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--article-mid-content" data-dcnode-id="341" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--article-mid-content consumer-marketing-unit__slot--in-content" data-dcnode-id="343"></div><div class="journey-unit" data-dcnode-id="342"></div></div><p data-dcnode-id="333"><span data-dcnode-id="340" instrument_node="">“In 2016, millennials </span><a class="external-link" data-dcnode-id="338" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://www.pewresearch.org/fact-tank/2018/04/03/millennials-approach-baby-boomers-as-largest-generation-in-u-s-electorate/&quot;}" data-offer-url="http://www.pewresearch.org/fact-tank/2018/04/03/millennials-approach-baby-boomers-as-largest-generation-in-u-s-electorate/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pewresearch.org/fact-tank/2018/04/03/millennials-approach-baby-boomers-as-largest-generation-in-u-s-electorate/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="339" instrument_node="">made up 27%</span></a><span data-dcnode-id="337" instrument_node=""> of the eligible voting population, but only 51% of this voting bloc ended up voting,” Georgia Democratic gubernatorial candidate Stacey Abrams tells </span><em data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Teen Vogue</span></em><span data-dcnode-id="334" instrument_node="">. “I am certain that energized young voters can make a difference this November, but only if they vote their values at the ballot box.”</span></p><div class="Container-imGeBO ftlPuP" data-dcnode-id="321" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-include-experiments="true"><figure class="VideoFigure-hZUgyy hUbqMV" data-dcnode-id="322" data-testid="cne-interlude-container"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt InterludeHeader-bqgsPm eTiIvU byjIhE ehWxpw" data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Trending Now</span></p><a class="BaseWrap-sc-TURhJ BaseText-fFzBQt BaseLink-gZQqBA InterludeTitleLink-bfxTQh eTiIvU gRUVAY dhOqoy csoDwQ" data-dcnode-id="328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/video/watch/riverdale-s-cole-sprouse-kj-apa-compete-in-a-compliment-battle" rel="noopener noreferrer" target="_blank"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt InterludeTitle-bLsuTB eTiIvU bXdgOl edSzje" data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Riverdale's Cole Sprouse &amp; KJ Apa Compete in a Compliment Battle</span></p></a><figure class="CneVideoEmbedFigure-bJIZil iOHMUe cne-video-embed" data-dcnode-id="323"><div data-dcnode-id="324" data-testid="script-container"><div class="cne-player-container" data-dcnode-id="326" id="61e7770d-52a3-ef7a-c61f-eb9c7a175033" style="box-sizing:content-box;display:inline-block;height:0px;padding-top:56.25%;position:relative;transition:height 300ms ease-in-out;vertical-align:top;width:100%;"><iframe allowfullscreen="true" allowtransparency="true" data-dcnode-id="327" frameborder="0" msallowfullscreen="true" scrolling="no" style="height:1px !important;left:0px;min-height:100%;min-width:100%;position:absolute;top:0px;width:1px !important;" title="Video Player"></iframe></div></div></figure></figure></div><p data-dcnode-id="304"><span data-dcnode-id="320" instrument_node="">While youth voters seem to show up </span><a class="external-link" data-dcnode-id="318" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://civicyouth.org/2014-youth-turnout-and-youth-registration-rates-lowest-ever-recorded-changes-essential-in-2016/&quot;}" data-offer-url="https://civicyouth.org/2014-youth-turnout-and-youth-registration-rates-lowest-ever-recorded-changes-essential-in-2016/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//civicyouth.org/2014-youth-turnout-and-youth-registration-rates-lowest-ever-recorded-changes-essential-in-2016/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="319" instrument_node="">in higher numbers</span></a><span data-dcnode-id="317" instrument_node=""> for presidential elections, these 29-and-under voters are </span><a class="external-link" data-dcnode-id="315" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://civicyouth.org/2014-youth-turnout-and-youth-registration-rates-lowest-ever-recorded-changes-essential-in-2016/&quot;}" data-offer-url="https://civicyouth.org/2014-youth-turnout-and-youth-registration-rates-lowest-ever-recorded-changes-essential-in-2016/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//civicyouth.org/2014-youth-turnout-and-youth-registration-rates-lowest-ever-recorded-changes-essential-in-2016/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="316" instrument_node="">under-mobilized</span></a><span data-dcnode-id="314" instrument_node=""> during midterms. A national poll last April by Harvard’s Institute of Politics (IOP) projected that </span><a data-dcnode-id="312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//iop.harvard.edu/spring-2018-poll"><span data-dcnode-id="313" instrument_node="">37% of eligible voters under age 30</span></a><span data-dcnode-id="311" instrument_node=""> will turn out at the polls on November 6. Meanwhile, a </span><em data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Washington Post</span></em><span data-dcnode-id="308" instrument_node=""> analysis of the IOP poll from April noted that in every election since 1992, </span><a class="external-link" data-dcnode-id="306" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.washingtonpost.com/news/politics/wp/2018/04/10/young-people-say-they-plan-on-voting-in-november-but-they-usually-dont/?utm_term=.94dd5a8f46b9&quot;}" data-offer-url="https://www.washingtonpost.com/news/politics/wp/2018/04/10/young-people-say-they-plan-on-voting-in-november-but-they-usually-dont/?utm_term=.94dd5a8f46b9" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/news/politics/wp/2018/04/10/young-people-say-they-plan-on-voting-in-november-but-they-usually-dont/%3Futm_term%3D.94dd5a8f46b9" rel="nofollow noopener" target="_blank"><span data-dcnode-id="307" instrument_node="">over half of the electorate is over the age of 45</span></a><span data-dcnode-id="305" instrument_node="">, meaning older generations are defining elections, giving bigger sway to election results.</span></p><div class="AdWrapper-fFweuL dIvDeZ ad ad--in-content" data-dcnode-id="302"><div class="ad__slot ad__slot--in-content" data-dcnode-id="303" data-node-id="4ijef3"></div></div><p data-dcnode-id="297"><span data-dcnode-id="301" instrument_node="">Youth voters can offset this difference by showing up at the polls. A surge in voters could sway the 2018 midterms </span><a class="external-link" data-dcnode-id="299" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.washingtonpost.com/politics/women-and-young-voters-will-decide-the-2018-elections-if-they-actually-vote/2018/03/03/3e3c614c-1f06-11e8-b2d9-08e748f892c0_story.html?utm_term=.3c6193c3028c&quot;}" data-offer-url="https://www.washingtonpost.com/politics/women-and-young-voters-will-decide-the-2018-elections-if-they-actually-vote/2018/03/03/3e3c614c-1f06-11e8-b2d9-08e748f892c0_story.html?utm_term=.3c6193c3028c" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/politics/women-and-young-voters-will-decide-the-2018-elections-if-they-actually-vote/2018/03/03/3e3c614c-1f06-11e8-b2d9-08e748f892c0_story.html%3Futm_term%3D.3c6193c3028c" rel="nofollow noopener" target="_blank"><span data-dcnode-id="300" instrument_node="">toward the left</span></a><span data-dcnode-id="298" instrument_node="">, providing a significant fighting ground for Democrats under a Republican president.</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-1 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="296" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p data-dcnode-id="285"><span data-dcnode-id="295" instrument_node="">The power of youth voters was evident during the 2016 election. Democratic candidate Hillary Clinton won Nevada by </span><a class="external-link" data-dcnode-id="293" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://civicyouth.org/an-estimated-24-million-young-people-vote-in-2016-election/&quot;}" data-offer-url="https://civicyouth.org/an-estimated-24-million-young-people-vote-in-2016-election/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//civicyouth.org/an-estimated-24-million-young-people-vote-in-2016-election/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="294" instrument_node="">26,000 votes</span></a><span data-dcnode-id="292" instrument_node="">, with youths in the state favoring her by 52%, compared to Republican candidate Donald Trump’s 35%. This youth vote was the equivalent of 35,000 votes. Young people were a major deciding factor in that win during the presidential election. Youth voters also helped Clinton win New Hampshire, where the state was won by </span><a class="external-link" data-dcnode-id="290" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.politico.com/2016-election/results/map/president/new-hampshire/&quot;}" data-offer-url="https://www.politico.com/2016-election/results/map/president/new-hampshire/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.com/2016-election/results/map/president/new-hampshire/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="291" instrument_node="">less than 3,000 votes</span></a><span data-dcnode-id="289" instrument_node="">. In this state, young voters gave Clinton an edge over her competitor </span><a class="external-link" data-dcnode-id="287" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://civicyouth.org/an-estimated-24-million-young-people-vote-in-2016-election/&quot;}" data-offer-url="https://civicyouth.org/an-estimated-24-million-young-people-vote-in-2016-election/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//civicyouth.org/an-estimated-24-million-young-people-vote-in-2016-election/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="288" instrument_node="">with 12,000 votes</span></a><span data-dcnode-id="286" instrument_node="">.</span></p><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">“Young voters have the power to alter our political future for the better,” Abrams says. “Between now and election day, young people can make calls, knock on doors, and mobilize their peers on college campuses and in digital spaces. I feel tremendous hope and optimism that young voters will help move Georgia and our nation forward.”</span></p><p data-dcnode-id="275"><span data-dcnode-id="282" instrument_node="">Youth have changed the political outlook of a country by voting, even recently. In 2017, Britain’s </span><a class="external-link" data-dcnode-id="280" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.vox.com/world/2017/6/13/15771640/bernie-corbyn-melenchon-uk-election-young-voters-youth-vote&quot;}" data-offer-url="https://www.vox.com/world/2017/6/13/15771640/bernie-corbyn-melenchon-uk-election-young-voters-youth-vote" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/world/2017/6/13/15771640/bernie-corbyn-melenchon-uk-election-young-voters-youth-vote" rel="nofollow noopener" target="_blank"><span data-dcnode-id="281" instrument_node="">“youthquake”</span></a><span data-dcnode-id="279" instrument_node=""> saw a surge in voters between the ages of 18 and 24, which greatly impacted that year’s general election’s final results, leading to the demise of the country’s Conservative Party. </span><a class="external-link" data-dcnode-id="277" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.vox.com/world/2017/6/13/15771640/bernie-corbyn-melenchon-uk-election-young-voters-youth-vote&quot;}" data-offer-url="https://www.vox.com/world/2017/6/13/15771640/bernie-corbyn-melenchon-uk-election-young-voters-youth-vote" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/world/2017/6/13/15771640/bernie-corbyn-melenchon-uk-election-young-voters-youth-vote" rel="nofollow noopener" target="_blank"><span data-dcnode-id="278" instrument_node="">With a youth voter turnout estimated to be as high as 72%</span></a><span data-dcnode-id="276" instrument_node="">, this example of an election upset proves how important it is for younger voters to show up at the polls.</span></p></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="268"><div class="AdWrapper-fFweuL dIvDeZ ad ad--mid-content" data-dcnode-id="269"><div class="ad__slot ad__slot--mid-content" data-dcnode-id="270" data-node-id="91moq7"></div></div></div><div class="GridWrapper-vNBSO bKMgMh grid grid-margins grid-items-0 ArticlePageChunksGrid-kRgPDq kCzkjB" data-dcnode-id="220"><div class="GridItem-buSdEM kFFJpN grid--item" data-dcnode-id="221"><div class="BodyWrapper-ctnerm cneCLK body body__container article__body" data-dcnode-id="222" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="223"><p data-dcnode-id="260"><span data-dcnode-id="267" instrument_node="">Back in the U.S., with the older generations’ voter turnout remaining stagnant at about </span><a class="external-link" data-dcnode-id="265" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://www.pewresearch.org/fact-tank/2017/05/12/black-voter-turnout-fell-in-2016-even-as-a-record-number-of-americans-cast-ballots/&quot;}" data-offer-url="http://www.pewresearch.org/fact-tank/2017/05/12/black-voter-turnout-fell-in-2016-even-as-a-record-number-of-americans-cast-ballots/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pewresearch.org/fact-tank/2017/05/12/black-voter-turnout-fell-in-2016-even-as-a-record-number-of-americans-cast-ballots/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="266" instrument_node="">68.9%</span></a><span data-dcnode-id="264" instrument_node=""> in 2016, and Baby Boomers having reached their </span><a class="external-link" data-dcnode-id="262" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://www.pewresearch.org/fact-tank/2018/04/03/millennials-approach-baby-boomers-as-largest-generation-in-u-s-electorate/&quot;}" data-offer-url="http://www.pewresearch.org/fact-tank/2018/04/03/millennials-approach-baby-boomers-as-largest-generation-in-u-s-electorate/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pewresearch.org/fact-tank/2018/04/03/millennials-approach-baby-boomers-as-largest-generation-in-u-s-electorate/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="263" instrument_node="">peak voting power in 2004</span></a><span data-dcnode-id="261" instrument_node="">, according to a Pew Research Center report in April, young voters have the opportunity to radically change the outcome of the 2018 midterm elections — if they show up on November 6.</span></p><p data-dcnode-id="249"><span data-dcnode-id="259" instrument_node="">But, it’s not just the election that the youth hold in their power, it’s the conceptual power over the future policies and shape of the government. With bills on </span><a class="external-link" data-dcnode-id="257" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.govtrack.us/congress/bills/&quot;}" data-offer-url="https://www.govtrack.us/congress/bills/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govtrack.us/congress/bills/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="258" instrument_node="">terminating the Environmental Protection Agency and defunding Planned Parenthood</span></a><span data-dcnode-id="256" instrument_node=""> coming up in Congress, youths voting for politicians who represent their interests can heavily impact the resulting legislation. Youth energy proved vital during the </span><a class="external-link" data-dcnode-id="254" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://civilrights.jfklibrary.org/utilities/download.aspx?guid=%7B22035C2E-7FDA-4D27-B9AC-3AF0698FF714%7D&quot;}" data-offer-url="https://civilrights.jfklibrary.org/utilities/download.aspx?guid=%7B22035C2E-7FDA-4D27-B9AC-3AF0698FF714%7D" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//civilrights.jfklibrary.org/utilities/download.aspx%3Fguid%3D%257B22035C2E-7FDA-4D27-B9AC-3AF0698FF714%257D" rel="nofollow noopener" target="_blank"><span data-dcnode-id="255" instrument_node="">civil rights movement</span></a><span data-dcnode-id="253" instrument_node=""> in the 1960s, and again during the </span><a class="external-link" data-dcnode-id="251" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://news.nationalgeographic.com/2018/03/youth-activism-young-protesters-historic-movements/&quot;}" data-offer-url="https://news.nationalgeographic.com/2018/03/youth-activism-young-protesters-historic-movements/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.nationalgeographic.com/2018/03/youth-activism-young-protesters-historic-movements/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="252" instrument_node="">Vietnam War</span></a><span data-dcnode-id="250" instrument_node="">. I that energy is matched by today’s young people at the polls and in the streets, it can change politics again. Youth casting votes for politicians who represent their interests can radically alter the future of the U.S. government.</span></p><p data-dcnode-id="239"><strong data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Get the Teen Vogue Take.</span></strong><span data-dcnode-id="246" instrument_node=""> </span><a data-dcnode-id="241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/newsletter/subscribe%3FnewsletterId%3D248815%26sourceCode%3Darticlelink"><span data-dcnode-id="245" instrument_node="">Sign up for the </span><em data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Teen Vogue</span></em><span data-dcnode-id="242" instrument_node=""> weekly email</span></a><span data-dcnode-id="240" instrument_node="">.</span></p><p data-dcnode-id="233"><strong data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Related:</span></strong><span data-dcnode-id="236" instrument_node=""> </span><a data-dcnode-id="234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/story/teen-guide-for-voting-i
