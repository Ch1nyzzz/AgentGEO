</span><h1 data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Young People Should Practice the Core Socialist Values</span></h1><span data-dcnode-id="867" instrument_node=""> </span><div class="info2" data-dcnode-id="789"><span data-dcnode-id="866" instrument_node=""> </span><div class="info2_l" data-dcnode-id="856"><span data-dcnode-id="865" instrument_node=""> </span><span data-dcnode-id="861"><span data-dcnode-id="864" instrument_node="">Source: </span><em data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Xi Jinping The Governance of China I</span></em></span><span data-dcnode-id="860" instrument_node=""> </span><span class="br0" data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Updated: 2020-11-18</span></span><span data-dcnode-id="857" instrument_node=""> </span></div><span data-dcnode-id="855" instrument_node=""> </span><div class="share" data-dcnode-id="793"><span data-dcnode-id="853" instrument_node=""> </span><b class="wap_box" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Share</span></b><span data-dcnode-id="850" instrument_node=""> </span><ul data-dcnode-id="795"><span data-dcnode-id="849" instrument_node=""> </span><li data-dcnode-id="846"><a class="twitter" data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.qstheory.cn/2020-11/18/c_607604.htm"><img data-dcnode-id="848" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//subsites.chinadaily.com.cn/Qiushi/att/3953.files/i/0921/s1.png&amp;raw"></a></li><span data-dcnode-id="845" instrument_node=""> </span><li data-dcnode-id="842"><a class="facebook" data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.qstheory.cn/2020-11/18/c_607604.htm"><img data-dcnode-id="844" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//subsites.chinadaily.com.cn/Qiushi/att/3953.files/i/0921/s2.png&amp;raw"></a></li><span data-dcnode-id="841" instrument_node=""> </span><li data-dcnode-id="838"><a class="collection" data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.qstheory.cn/2020-11/18/c_607604.htm"><img data-dcnode-id="840" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//subsites.chinadaily.com.cn/Qiushi/att/3953.files/i/0921/s3.png&amp;raw"></a></li><span data-dcnode-id="837" instrument_node=""> </span><li class="shIco" data-dcnode-id="797"><a data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.qstheory.cn/2020-11/18/c_607604.htm"><img data-dcnode-id="836" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//subsites.chinadaily.com.cn/Qiushi/att/3953.files/i/0921/s4.png&amp;raw"></a><span data-dcnode-id="834" instrument_node=""> </span><span class="shBox" data-dcnode-id="799"><span data-dcnode-id="833" instrument_node=""> </span><b data-dcnode-id="831"><img data-dcnode-id="832" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//subsites.chinadaily.com.cn/Qiushi/att/3953.files/i/0921/shArr.png&amp;raw"></b><span data-dcnode-id="830" instrument_node=""> </span><dl class="shCont" data-dcnode-id="801"><span data-dcnode-id="829" instrument_node=""> </span><dt class="pc_box" data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Share</span></dt><span data-dcnode-id="826" instrument_node=""> </span><dd data-dcnode-id="823"><a class="weixinqrcode" data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.qstheory.cn/2020-11/18/c_607604.htm" id="weixinqrcode" title="分享到微信"><img data-dcnode-id="825" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//subsites.chinadaily.com.cn/Qiushi/att/3953.files/i/0921/ss1.png&amp;raw"></a></dd><span data-dcnode-id="822" instrument_node=""> </span><dd data-dcnode-id="819"><a class="weibo" data-dcnode-id="820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.qstheory.cn/2020-11/18/c_607604.htm"><img data-dcnode-id="821" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//subsites.chinadaily.com.cn/Qiushi/att/3953.files/i/0921/ss2.png&amp;raw"></a></dd><span data-dcnode-id="818" instrument_node=""> </span><dd data-dcnode-id="815"><a class="linkedin" data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.qstheory.cn/2020-11/18/c_607604.htm"><img data-dcnode-id="817" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//subsites.chinadaily.com.cn/Qiushi/att/3953.files/i/0921/ss3.png&amp;raw"></a></dd><span data-dcnode-id="814" instrument_node=""> </span><dd data-dcnode-id="811"><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/" target="_blank"><img data-dcnode-id="813" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//subsites.chinadaily.com.cn/Qiushi/att/3953.files/i/0921/ss4.png&amp;raw"></a></dd><span data-dcnode-id="810" instrument_node=""> </span><dd data-dcnode-id="807"><a data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/accounts/login/" target="_blank"><img data-dcnode-id="809" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//subsites.chinadaily.com.cn/Qiushi/att/3953.files/i/0921/ss5.png&amp;raw"></a></dd><span data-dcnode-id="806" instrument_node=""> </span><dd data-dcnode-id="803"><a class="reddit" data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.qstheory.cn/2020-11/18/c_607604.htm"><img data-dcnode-id="805" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//subsites.chinadaily.com.cn/Qiushi/att/3953.files/i/0921/ss6.png&amp;raw"></a></dd><span data-dcnode-id="802" instrument_node=""> </span></dl><span data-dcnode-id="800" instrument_node=""> </span></span><span data-dcnode-id="798" instrument_node=""> </span></li><span data-dcnode-id="796" instrument_node=""> </span></ul><span data-dcnode-id="794" instrument_node=""> </span></div><span data-dcnode-id="792" instrument_node=""> </span><div class="clear" data-dcnode-id="791"></div><span data-dcnode-id="790" instrument_node=""> </span></div><span data-dcnode-id="788" instrument_node=""> </span><div class="arcCont2" data-dcnode-id="596"><span data-dcnode-id="787" instrument_node=""> </span><p data-dcnode-id="783" style="text-align: center;"><strong data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Young People Should Practice the Core Socialist Values*&nbsp;</span></strong></p><p data-dcnode-id="781"><br data-dcnode-id="782"></p><p data-dcnode-id="778" style="text-align: center;"><em data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">May 4, 2014&nbsp;</span></em></p><p data-dcnode-id="776"><br data-dcnode-id="777"></p><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Dear students, teachers and friends,&nbsp;</span></p><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Today, as we celebrate China's Youth Day I'm glad to be here with you, honoring the 95th anniversary of the May 4th Movement. First of all, I'd like to extend, on behalf of the Party Central Committee, my festival greetings to the teachers, staff and students at Peking University and young people of all ethnic groups across the country. Also, I want to express my deepest respects to those who work in the fields of education and youth work throughout the country!&nbsp;</span></p><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">This is my fifth visit to Peking University since I started to serve on the Party Central Committee, and each time I am here I find something new that impresses me. My feelings soar whenever I walk on this campus full of vigor and vitality, and I can't help but sigh: The current generation of college students is just adorable, trustworthy and reliable, and you are bound to have a bright future.&nbsp;</span></p><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">The May 4th Movement gave founding to the May 4th spirit of patriotism, progress, democracy and science, kicking off the New Democratic Revolution in China, promoting the dissemination of Marxism in the country and laying the groundwork for the founding of the CPC.&nbsp;</span></p><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Since the May 4th Movement, under the leadership of the Party, generations of highly motivated young men and women have written inspiring chapters in the struggles to save the country and rejuvenate the Chinese nation, with the motto "Devoting my youth to creating a family of youth, a country of youth, a nation of youth, a mankind of youth, a planet of youth and a universe of youth."</span></p><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Peking University was the base of the New Culture Movement as well as a cradle of the May 4th Movement, witnessing this glorious period in modern history. For a long time, teachers and students here have shared a common destiny with the country and the people, and advanced with the times and society, making remarkable contributions to our country's revolution, construction and reform in all respects.&nbsp;</span></p><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">The Two Centenary Goals were put forward at the 18th CPC National Congress. As I have said before, we have never been so close as now to reaching the goal of the great renewal of the Chinese nation, and we are more confident and more capable than ever of fulfiling this goal.&nbsp;</span></p><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Nevertheless, "A thing is yet to be done until it is done," as an old saying goes. The closer we approach the goal the more we should redouble our efforts. We can afford no slackening. More importantly, we should encourage more young people to join the great cause of making the dream come true.&nbsp;</span></p><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">The river of time flows nonstop day and night, and things change as the seasons change. Every generation of young people is offered the opportunities of the era for drawing a picture of life and creating history. Young people, the most sensitive weatherglass of an era, are entrusted with the responsibilities of the times and share the glory of their days.&nbsp;</span></p><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Today, we are here to honor the May 4th Movement. The best way for us to have the May 4th spirit display widely is to join the team of builders, pioneers and dedicators, and together with the people of all ethnic groups shoulder our historic responsibilities with firm beliefs, high morality, a wealth of knowledge and competent skills.&nbsp;</span></p><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Students and teachers,</span></p><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">University is a place not just for academic studies but for seeking truth. Today, I'd like to take this opportunity to share with you my insights into the core socialist values.&nbsp;</span></p><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">I was inspired by the spirit of the May 4th Movement, which embodies the values the Chinese people and nation have pursued in modern history. Today, we should still adhere to and carry out these core values, highlighted by patriotism, progress, democracy and science. Young people, as well as everyone else in the country, should uphold and carry out these core values.&nbsp;</span></p><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Looking at human history and social development, we find that the most lasting and profound power for a nation and country is the core values acknowledged by all. Core values carry the spiritual aspiration of a nation and country, and represent the standard for judging right and wrong.&nbsp;</span></p><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">An ancient proverb goes, "The way to great learning is to manifest bright virtue and to treat the people as one's own family, thereby arriving at supreme goodness." Core values are in fact individual virtues, as well as public, social and national virtues. A country cannot prosper without virtues, nor can anyone succeed without virtues. Without shared core values, a nation and country will be at a loss to know what is right and what is wrong, and its people will have no code of conduct to follow, the result being that the nation and country can never progress. It has commonly occurred in our history, and still happens across the globe.&nbsp;</span></p><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">China is a big country with 1.3 billion people and 56 ethnic groups. Upon the recognition of the values with the "greatest common denominator" by the people of all ethnic groups, they work with one heart and one mind to strive in unity. This concerns our nation's future and destiny, as well as our people's happiness and well-being.&nbsp;</span></p><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Every era has its spirit, and likewise its values. In ancient China our ancestors developed core values highlighted by "propriety, righteousness, honesty and a sense of shame – the four anchors of our moral foundation, and a question of life and death for the country." This was our ancestors' understanding of their core values.&nbsp;</span></p><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">What are the core values for our people and country today? This is both a theoretical and a practical question. We should eventually agree upon this after sorting out opinions and understandings from all walks of life. The core socialist values that we should cultivate and practice are prosperity, democracy, civility, harmony, freedom, equality, justice, the rule of law, patriotism, dedication, integrity and friendship.&nbsp;</span></p><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">The values of prosperity, democracy, civility and harmony are for the country; those of freedom, equality, justice and the rule of law for the society; and those of patriotism, dedication, integrity and friendship for citizens. They explain what sort of country and society we are striving for, and what kind of citizens we are cultivating.&nbsp;</span></p><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Since ancient times the Chinese people have developed their country through studying the nature of things to acquire knowledge, correcting thoughts with sincerity, cultivating the moral self, managing the family, governing the state and safeguarding peace under Heaven. As we see it today, the principles of "studying the nature of things, correcting thoughts with sincerity and cultivating the moral self" are for individuals; the principle of "managing the family" is for the society; and those of "governing the state and safeguarding peace under Heaven" are for the country.&nbsp;</span></p><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">What we put forward for the core socialist values is a combination of requirements for the country, society and citizens, which represent the nature of socialism, carry forward the fine traditional Chinese culture, draw on the best of world civilization and reflect the spirit of the times.&nbsp;</span></p><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Prosperity, democracy, civility, harmony, freedom, equality, justice, the rule of law, patriotism, dedication, integrity and friendship are all ideas that inherit the essence of the outstanding traditional Chinese culture, embody the ideals and faith formed by modern Chinese people through unremitting and painstaking efforts, and reflect the wishes and vision of every Chinese citizen.&nbsp;</span></p><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">We should foster the core socialist values throughout society. The people should join hands and work persistently to make China richer and stronger, more democratic, more harmonious and more beautiful, so that our country can be confident enough to stand proudly among all other nations.&nbsp;</span></p><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Since the Opium War of the 1840s the Chinese people have long cherished a dream of realizing a great national rejuvenation and building China into a strong, democratic and harmonious modern socialist country – the highest and most fundamental interests of the nation. And that's what our 1.3 billion people are striving for.&nbsp;</span></p><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">China used to be a world economic power. However, it missed its chance in the wake of the Industrial Revolution and the consequent dramatic changes, and thus was left behind and suffered humiliation under foreign invasion. Things got worse especially after the Opium War, when the nation was plagued by poverty and weakness, allowing others to trample upon and manipulate us. We must not let this tragic history repeat itself.&nbsp;</span></p><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">The construction of a strong, democratic and harmonious modern socialist country is our goal and responsibility – for the nation, for our forefathers and for our future generations. Therefore, we should maintain our willpower, intensify our faith, and walk unswervingly along the road towards our destination.&nbsp;</span></p><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">China has stood up. It will never again tolerate being bullied by any nation. Yet it will never follow in the footsteps of the big powers, which seek hegemony once they grow strong. Our country is following a path of peaceful development.&nbsp;</span></p><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Why are we so confident? Because we have developed and become stronger. China has won worldwide respect with its century-long efforts. Its prestige keeps rising, and its influence keeps expanding. Today's China forms a sharp contrast to China in the 19th century when the country was humiliated, its sovereignty was infringed upon, and its people were bullied by foreigners.&nbsp;</span></p><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Chinese civilization has formed a unique value system over several millennia. The brilliant traditional Chinese culture is the essence of the nation and has deep roots in the Chinese people's mentality, influencing their way of thinking and behavior unconsciously.&nbsp;</span></p><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Today, we advocate and carry forward the core socialist values through absorbing the rich nourishment of Chinese culture, so as to invigorate its vitality and broaden its influence.&nbsp;</span></p><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Here are some quotations from ancient classics that I'd like to share with you today:&nbsp;</span></p><p data-dcnode-id="674"><span data-dcnode-id="713" instrument_node="">"The people are the foundation of a state,"</span><br data-dcnode-id="712"><span data-dcnode-id="711" instrument_node="">"The harmony of Nature and man,"</span><br data-dcnode-id="710"><span data-dcnode-id="709" instrument_node="">"Harmony without uniformity,"</span><br data-dcnode-id="708"><span data-dcnode-id="707" instrument_node="">"As Heaven changes through movement, a gentleman makes unremitting efforts to perfect himself,"</span><br data-dcnode-id="706"><span data-dcnode-id="705" instrument_node="">"When the Great Way prevailed, a public spirit ruled all under Heaven,"</span><br data-dcnode-id="704"><span data-dcnode-id="703" instrument_node="">"Everyone is responsible for his country's rise or fall,"</span><br data-dcnode-id="702"><span data-dcnode-id="701" instrument_node="">"Govern the country with virtue and educate the people with culture,"</span><br data-dcnode-id="700"><span data-dcnode-id="699" instrument_node="">"A gentleman has a good knowledge of righteousness,"</span><br data-dcnode-id="698"><span data-dcnode-id="697" instrument_node="">"A gentleman is broad-minded,"</span><br data-dcnode-id="696"><span data-dcnode-id="695" instrument_node="">"A gentleman takes morality as his bedrock,"</span><br data-dcnode-id="694"><span data-dcnode-id="693" instrument_node="">"Be true in word and resolute in deed,"</span><br data-dcnode-id="692"><span data-dcnode-id="691" instrument_node="">"If a man does not keep his word, what is he good for?"</span><br data-dcnode-id="690"><span data-dcnode-id="689" instrument_node="">"A man of high moral quality will never feel lonely,"</span><br data-dcnode-id="688"><span data-dcnode-id="687" instrument_node="">"The benevolent man loves others,"</span><br data-dcnode-id="686"><span data-dcnode-id="685" instrument_node="">"Do things for the good of others,"</span><br data-dcnode-id="684"><span data-dcnode-id="683" instrument_node="">"Don't do unto others what you don't want others to do unto you,"</span><br data-dcnode-id="682"><span data-dcnode-id="681" instrument_node="">"Care for each other and help one another,"</span><br data-dcnode-id="680"><span data-dcnode-id="679" instrument_node="">"Respect others' elders as one respects one's own, and care for others’ children as one cares for one's own,"</span><br data-dcnode-id="678"><span data-dcnode-id="677" instrument_node="">"Help the poor and assist those in difficulty,"</span><br data-dcnode-id="676"><span data-dcnode-id="675" instrument_node="">"Care less about quantity and more about quality."</span></p><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">These thoughts and ideas all displayed and still demonstrate distinctive national features, and have the indelible values of the times. We have updated them in keeping abreast of the times, while carrying them forward in an unbroken line.&nbsp;</span></p><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">As Chinese, we should always keep our own unique inner-world spirit, uphold values that we practice every day without noticing. The core socialist values we advocate today represent the inheritance and upgrading of outstanding traditional Chinese culture.&nbsp;</span></p><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Values appear and develop in the process of human beings getting to know and shape nature and society. Core values vary in different nations and countries due to different natural conditions and courses of development. The core values of a nation and country are closely related to its history and culture, as well as to what its people are striving for and to the present issues it needs to resolve.&nbsp;</span></p><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">There are no two leaves exactly alike on earth. A nation, or people of a country, must know who they are, where they came from and where they are heading. Keep on going when you have made your choice.&nbsp;</span></p><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">On December 26 last year, I said at the meeting commemorating the 120th birthday of Mao Zedong:&nbsp;</span></p><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Boasting a vast land of 9.6 million sq km, a rich cultural heritage and a strong bond among the 1.3 billion Chinese people, we are resolved to go our own way. We have a big stage to display our advantages on, a long and rich history to draw benefit from, and a powerful impetus to push us ahead. We Chinese people – every single one of us – should draw confidence from this.&nbsp;</span></p><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">We should modestly learn from the best of other civilizations, but never forget our own origin. We must not blindly copy the development models of other countries nor accept their dictation.&nbsp;</span></p><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">What I mean here is that we should enhance our confidence in the path we have chosen, in the theories we have devised and in the system we have established to reach our goal of development and make the Chinese Dream come true. "In the face of all blows, not bending low, it still stands fast. Whether from east, west, south or north the wind doth blast." Our confidence is supported by our core values.&nbsp;</span></p><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Why am I talking about the core socialist values with you young people? Because your value orientation will decide the values of the whole of society in the years to come. Besides, young people are at the time of life when they form and establish their values. It is therefore very important to offer some guidance. That reminds me of something that happens in our daily life. When we button up our coat, we may inadvertently put the first button in the wrong button hole, and that will result in all the other buttons being put in the wrong holes. That's why we say that young people should "button right" in the early days of their life. "A deep well is dug starting with a shallow pit." Every young person should learn about the core socialist values starting right now, take them as his basic rules and disseminate them throughout society.&nbsp;</span></p><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">When young people adopt the core socialist values they should emphasize the following points:&nbsp;</span></p><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">First, work diligently to acquire true knowledge. Knowledge is an important cornerstone for the cultivation of the core values. The great philosophers of ancient Greece believed that knowledge was a virtue. Our ancestors also asserted, "One cannot enhance one's ability and wisdom if one does not work hard; neither can one succeed without ambition."&nbsp;</span></p><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">A person enjoys only once the youthful days at college, so you should cherish them. To acquire knowledge, one has to study diligently, intensively and persistently. Lu Xun once said, "Who said I'm a genius? I spent all my time working when others were sipping coffee." In college days, "Young we were, schoolmates, at life's full flowering." One can totally throw oneself into seeking knowledge without any distractions, learning from teachers, exchanging views with classmates and rummaging through piles of books. So there is no reason not to study hard. Work hard, acquire more knowledge and turn what you have learned into your own views and ideas. I hope that you will not only concentrate on book knowledge but also care about the people, the country and the world, and assume your responsibility for society.&nbsp;</span></p><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Second, cultivate morality and virtue, and pay attention to them in practice. "Virtue is the root." Mr Cai Yuanpei believed, "He who is strong physically and talented but has no virtue will end up on the side of vice." Virtues are fundamental for both individuals and society. What is most important is to cultivate morality. This explains why we select those who are both talented and morally cultivated for our work, with morality as priority. One can be placed in the right position only if one recognizes virtue, follows social ethics and restricts personal desires.&nbsp;</span></p><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">When talking about cultivating morality, one needs to have high ambitions as well as pragmatic plans. To devote oneself to one's country and serve one's people, this is the great virtue with which one is able to accomplish the great cause. In the meantime, one needs to start to do small things well and be self-disciplined even in small matters. "Learning from fine things that may appear and correcting any mistakes that may occur," one needs to cultivate public and personal virtues, learn to work, to be thrifty, to be grateful, to help others, to be modest, to be tolerant, to examine oneself and to exercise self-restraint.</span></p><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Third, learn to tell right from wrong and make correct decisions. As our ancestors believed, "Reading without thinking makes one muddled; thinking without reading makes one flighty." Knowing what is right or wrong, what is the correct direction and what is the proper way to follow, one is bound to reap the reward of one's work.&nbsp;</span></p><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Facing a complex and fast-changing world, an information era with the surge of various schools of thought, a multifaceted society of genuine and false ideas, and the pressure associated with one's academic pursuit, relationships and employment, you may feel somewhat confused, hesitant or frustrated. This is a normal experience everybody will go through. The key is to learn to think about and analyze situations before making decisions in order to arrive at correct decisions. You should be sturdy, confident and self-reliant. You must form a correct world outlook, view of life and values, then you will see – crystal-clear – the true nature of society and have a better understanding of your life's experience, and be able to tell what is right and what is wrong, what is primary and what is secondary, what is true and what is false, what is good and what is evil, and what is beautiful and what is ugly before making judgments and decisions. As a Tang verse goes, "Gold glitters only after countless washings and sievings."</span></p><p data-dcnode-id="637"><span data-dcnode-id="641" instrument_node="">Fourth, be honest and sincere; do solid work and be an upright person. The correct way needs to be pursued in practice, while morality requires no empty talk. One should be more pragmatic. Knowledge and action should go hand in hand, and the core values should be turned into moral pursuits as well as a drive to make people engage in conscious action. </span><em data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">The Book of Rites</span></em><span data-dcnode-id="638" instrument_node=""> says, "Learn extensively, inquire earnestly, think profoundly, discriminate clearly and practice sincerely."</span></p><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Some people believe that "sages are mediocre people who work hard, while mediocre people are sages who refuse to work hard." With more opportunities, young people should make their steps steady, lay a solid foundation and make unremitting efforts. It is no good for study or running a business if one works intermittently, or chops and changes. "Difficult things are done starting from easy ones; a great undertaking begins with minor work."&nbsp;</span></p><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">No matter what you opt to do, success always favors hard workers. Young people should take a difficult environment as a challenge or test. "Little strokes fell great oaks." Success awaits those who work doggedly and unyieldingly, and those who are never daunted by repeated setbacks.&nbsp;</span></p><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">The cultivation of the core values can't be done overnight. It requires efforts from the easy to the difficult, from close-up to faraway until it becomes a faith and idea that we follow conscientiously. When things are smooth, you may be confident; when there are frustrations, you may have doubts and waver. In all circumstances we should always uphold the core socialist values which have been formed and developed here in our country, make contributions to the great cause in the modern era and fulfill our lifetime expectations.&nbsp;</span></p><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Students and teachers,&nbsp;</span></p><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">The Party Central Committee has decided to build world-class colleges and universities – a strategic policy that we should follow without hesitation. To make them world-class, they must feature Chinese characteristics. It won't do to copy others mechanically, because we always believe that "the more national the more international."&nbsp;</span></p><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">In this world there is only one Harvard University, University of Oxford, Stanford University, Massachusetts Institute of Technology and University of Cambridge; likewise, there is only one Peking University, Tsinghua University, Zhejiang University, Fudan University and Nanjing University in China. We should draw on the world's best experience in running institutions of higher learning, follow the rules of education, and establish more excellent colleges and universities on Chinese soil.&nbsp;</span></p><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Lu Xun asserted, "Peking University is always innovative and plays a pioneering role in reforming movements, leading China along an upward path towards a better future."&nbsp;</span></p><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">The decision on advancing the reform in an all-round way was made at the Third Plenary Session of the 18th CPC Central Committee, defining the demands for the further reform of higher education in China. What we must do now is to turn this blueprint into reality.&nbsp;</span></p><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Institutions of higher learning should take the lead in educational reform throughout the country, centering on the fundamental tasks of building virtues and morality, and moving faster in establishing an educational system and mechanism that is full of vigor and vitality, efficient, more open and favoring educational development in a balanced and coordinated way. I do hope that Peking University can realize its long-cherished dream as soon as possible of advancing into the ranks of world-class universities through painstaking efforts, reform and innovation.&nbsp;</span></p><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Teachers are entrusted with the noblest mission in this world. Mr Mei Yiqi opined that the key to the success of a university lies in having a lot of highly accomplished gurus rather than imposing buildings. What he meant by "highly-accomplished gurus," as I see it, are people most knowledgeable in their academic fields and who are also virtuous. Always bearing in mind their responsibilities, teachers should be ready to serve as human ladders, inspiring the souls of the students whom they are teaching with the help of their personal charisma and scholarly attainments.&nbsp;</span></p><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Party committees and governments at all levels should pay closer attention to colleges and universities, show more concern for the students and erect a platform for them to dream upon and make their dreams come true. We should accelerate the reform in an all-round way, create a fair and just social environment, promote social mobility and inspire the vigor and creativity of young people. We should improve the system of employment and business startups so as to assist graduates at the beginning of their life-long careers. Leading officials at all levels should keep in communication with the students, make friends with them and listen to what they have to say.&nbsp;</span></p><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Today, the majority of college students are around the age of 20; and they will be under the age of 30 by 2020, when we complete the building of a moderately prosperous society in all respects. They will be around 60 by the mid-21st century, when we basically realize our country's modernization. That is to say, you will participate in the cause of reaching the Two Centenary Goals along with myriads of other young people.&nbsp;</span></p><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">I believe that life is meaningless for anyone without faith, without dreams, without concerted endeavors and without contributions. I hope that you can create your own wonderful life while making the Chinese Dream come true since you have never been given a platform as spacious as this or as promising as this.&nbsp;</span></p><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">I believe that young Chinese people today are more than capable of undertaking the historic mission entrusted to them by the Party and the people, and will go on to write a brilliant chapter worthy of our times in their efforts to take advantage of their youthful vigor, explore life and contribute to society!&nbsp;</span></p><p data-dcnode-id="607"><br data-dcnode-id="608"></p><p data-dcnode-id="603"><strong data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">* </span></strong><span data-dcnode-id="604" instrument_node="">Speech at the seminar with teachers and students of Peking University.&nbsp;</span></p><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">(Not to be republished for any commercial or other purposes.)</span></p><p data-dcnode-id="599"><br data-dcnode-id="600"></p><span data-dcnode-id="597" instrument_node=""> </span></div><span data-dcnode-id="595" instrument_node="">
