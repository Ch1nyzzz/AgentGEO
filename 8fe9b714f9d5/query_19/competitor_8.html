</span><h1 class="main_tit" data-dcnode-id="666" style=""><span data-dcnode-id="667" instrument_node="">Young People Should Practice the Core Socialist Values</span></h1><span data-dcnode-id="665" instrument_node="">
</span><p class="art_info" data-dcnode-id="663"><span data-dcnode-id="664" instrument_node=""> 
                 2020-11-26 13:03:00                   
                 | Author：Xi Jinping
                
                 | Source：en.qstheory.cn
            </span></p><span data-dcnode-id="662" instrument_node="">
</span><div class="body" data-dcnode-id="288"><span data-dcnode-id="661" instrument_node="">
</span><div data-dcnode-id="297" id="font_area"><span data-dcnode-id="660" instrument_node="">
</span><div class="Custom_UnionStyle" data-dcnode-id="299"><span data-dcnode-id="659" instrument_node="">
</span><div class="Custom_UnionStyle" data-dcnode-id="301"><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="655" style="text-align: justify;"><font data-dcnode-id="656" size="3" style="line-height: 175%;"><span data-dcnode-id="657" instrument_node="">　　Young People Should Practice the Core Socialist Values*&nbsp;</span></font></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="651" style="text-align: justify;"><font data-dcnode-id="652" size="3" style="line-height: 175%;"><span data-dcnode-id="653" instrument_node="">　　May 4, 2014&nbsp;</span></font></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="647" style="text-align: justify;"><font data-dcnode-id="648" size="3" style="line-height: 175%;"><span data-dcnode-id="649" instrument_node="">　　Dear students, teachers and friends,&nbsp;</span></font></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="643" style="text-align: justify;"><font data-dcnode-id="644" size="3" style="line-height: 175%;"><span data-dcnode-id="645" instrument_node="">　　Today,  as we celebrate China's Youth Day I'm glad to be here with you,  honoring the 95th anniversary of the May 4th Movement. First of all, I'd  like to extend, on behalf of the Party Central Committee, my festival  greetings to the teachers, staff and students at Peking University and  young people of all ethnic groups across the country. Also, I want to  express my deepest respects to those who work in the fields of education  and youth work throughout the country!&nbsp;</span></font></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="639" style="text-align: justify;"><font data-dcnode-id="640" size="3" style="line-height: 175%;"><span data-dcnode-id="641" instrument_node="">　　This is my fifth visit to  Peking University since I started to serve on the Party Central  Committee, and each time I am here I find something new that impresses  me. My feelings soar whenever I walk on this campus full of vigor and  vitality, and I can't help but sigh: The current generation of college  students is just adorable, trustworthy and reliable, and you are bound  to have a bright future.&nbsp;</span></font></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="635" style="text-align: justify;"><font data-dcnode-id="636" size="3" style="line-height: 175%;"><span data-dcnode-id="637" instrument_node="">　　The May 4th Movement gave founding to  the May 4th spirit of patriotism, progress, democracy and science,  kicking off the New Democratic Revolution in China, promoting the  dissemination of Marxism in the country and laying the groundwork for  the founding of the CPC.&nbsp;</span></font></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="631" style="text-align: justify;"><font data-dcnode-id="632" size="3" style="line-height: 175%;"><span data-dcnode-id="633" instrument_node="">　　Since the May 4th Movement, under the  leadership of the Party, generations of highly motivated young men and  women have written inspiring chapters in the struggles to save the  country and rejuvenate the Chinese nation, with the motto "Devoting my  youth to creating a family of youth, a country of youth, a nation of  youth, a mankind of youth, a planet of youth and a universe of youth."</span></font></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="627" style="text-align: justify;"><font data-dcnode-id="628" size="3" style="line-height: 175%;"><span data-dcnode-id="629" instrument_node="">　　Peking  University was the base of the New Culture Movement as well as a cradle  of the May 4th Movement, witnessing this glorious period in modern  history. For a long time, teachers and students here have shared a  common destiny with the country and the people, and advanced with the  times and society, making remarkable contributions to our country's  revolution, construction and reform in all respects.&nbsp;</span></font></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="623" style="text-align: justify;"><font data-dcnode-id="624" size="3" style="line-height: 175%;"><span data-dcnode-id="625" instrument_node="">　　The Two  Centenary Goals were put forward at the 18th CPC National Congress. As I  have said before, we have never been so close as now to reaching the  goal of the great renewal of the Chinese nation, and we are more  confident and more capable than ever of fulfiling this goal.&nbsp;</span></font></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="619" style="text-align: justify;"><font data-dcnode-id="620" size="3" style="line-height: 175%;"><span data-dcnode-id="621" instrument_node="">　　Nevertheless,  "A thing is yet to be done until it is done," as an old saying goes.  The closer we approach the goal the more we should redouble our efforts.  We can afford no slackening. More importantly, we should encourage more  young people to join the great cause of making the dream come true.&nbsp;</span></font></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="615" style="text-align: justify;"><font data-dcnode-id="616" size="3" style="line-height: 175%;"><span data-dcnode-id="617" instrument_node="">　　The  river of time flows nonstop day and night, and things change as the  seasons change. Every generation of young people is offered the  opportunities of the era for drawing a picture of life and creating  history. Young people, the most sensitive weatherglass of an era, are  entrusted with the responsibilities of the times and share the glory of  their days.&nbsp;</span></font></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="611" style="text-align: justify;"><font data-dcnode-id="612" size="3" style="line-height: 175%;"><span data-dcnode-id="613" instrument_node="">　　Today, we are here to honor the May 4th Movement. The  best way for us to have the May 4th spirit display widely is to join  the team of builders, pioneers and dedicators, and together with the  people of all ethnic groups shoulder our historic responsibilities with  firm beliefs, high morality, a wealth of knowledge and competent  skills.&nbsp;</span></font></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="607" style="text-align: justify;"><font data-dcnode-id="608" size="3" style="line-height: 175%;"><span data-dcnode-id="609" instrument_node="">　　Students and teachers,</span></font></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="603" style="text-align: justify;"><font data-dcnode-id="604" size="3" style="line-height: 175%;"><span data-dcnode-id="605" instrument_node="">　　University is a place not  just for academic studies but for seeking truth. Today, I'd like to take  this opportunity to share with you my insights into the core socialist  values.&nbsp;</span></font></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="599" style="text-align: justify;"><font data-dcnode-id="600" size="3" style="line-height: 175%;"><span data-dcnode-id="601" instrument_node="">　　I was inspired by the spirit of the May 4th Movement,  which embodies the values the Chinese people and nation have pursued in  modern history. Today, we should still adhere to and carry out these  core values, highlighted by patriotism, progress, democracy and science.  Young people, as well as everyone else in the country, should uphold  and carry out these core values.&nbsp;</span></font></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="595" style="text-align: justify;"><font data-dcnode-id="596" size="3" style="line-height: 175%;"><span data-dcnode-id="597" instrument_node="">　　Looking at human history and  social development, we find that the most lasting and profound power for  a nation and country is the core values acknowledged by all. Core  values carry the spiritual aspiration of a nation and country, and  represent the standard for judging right and wrong.&nbsp;</span></font></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="591" style="text-align: justify;"><font data-dcnode-id="592" size="3" style="line-height: 175%;"><span data-dcnode-id="593" instrument_node="">　　An ancient  proverb goes, "The way to great learning is to manifest bright virtue  and to treat the people as one's own family, thereby arriving at supreme  goodness." Core values are in fact individual virtues, as well as  public, social and national virtues. A country cannot prosper without  virtues, nor can anyone succeed without virtues. Without shared core  values, a nation and country will be at a loss to know what is right and  what is wrong, and its people will have no code of conduct to follow,  the result being that the nation and country can never progress. It has  commonly occurred in our history, and still happens across the globe.&nbsp;</span></font></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="587" style="text-align: justify;"><font data-dcnode-id="588" size="3" style="line-height: 175%;"><span data-dcnode-id="589" instrument_node="">　　China  is a big country with 1.3 billion people and 56 ethnic groups. Upon the  recognition of the values with the "greatest common denominator" by the  people of all ethnic groups, they work with one heart and one mind to  strive in unity. This concerns our nation's future and destiny, as well  as our people's happiness and well-being.&nbsp;</span></font></p><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="583" style="text-align: justify;"><font data-dcnode-id="584" size="3" style="line-height: 175%;"><span data-dcnode-id="585" instrument_node="">　　Every era has its  spirit, and likewise its values. In ancient China our ancestors  developed core values highlighted by "propriety, righteousness, honesty  and a sense of shame – the four anchors of our moral foundation, and a  question of life and death for the country." This was our ancestors'  understanding of their core values.&nbsp;</span></font></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="579" style="text-align: justify;"><font data-dcnode-id="580" size="3" style="line-height: 175%;"><span data-dcnode-id="581" instrument_node="">　　What are the core values for  our people and country today? This is both a theoretical and a practical  question. We should eventually agree upon this after sorting out  opinions and understandings from all walks of life. The core socialist  values that we should cultivate and practice are prosperity, democracy,  civility, harmony, freedom, equality, justice, the rule of law,  patriotism, dedication, integrity and friendship.&nbsp;</span></font></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="575" style="text-align: justify;"><font data-dcnode-id="576" size="3" style="line-height: 175%;"><span data-dcnode-id="577" instrument_node="">　　The values of  prosperity, democracy, civility and harmony are for the country; those  of freedom, equality, justice and the rule of law for the society; and  those of patriotism, dedication, integrity and friendship for citizens.  They explain what sort of country and society we are striving for, and  what kind of citizens we are cultivating.&nbsp;</span></font></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="571" style="text-align: justify;"><font data-dcnode-id="572" size="3" style="line-height: 175%;"><span data-dcnode-id="573" instrument_node="">　　Since ancient times the  Chinese people have developed their country through studying the nature  of things to acquire knowledge, correcting thoughts with sincerity,  cultivating the moral self, managing the family, governing the state and  safeguarding peace under Heaven. As we see it today, the principles of  "studying the nature of things, correcting thoughts with sincerity and  cultivating the moral self" are for individuals; the principle of  "managing the family" is for the society; and those of "governing the  state and safeguarding peace under Heaven" are for the country.&nbsp;</span></font></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="567" style="text-align: justify;"><font data-dcnode-id="568" size="3" style="line-height: 175%;"><span data-dcnode-id="569" instrument_node="">　　What  we put forward for the core socialist values is a combination of  requirements for the country, society and citizens, which represent the  nature of socialism, carry forward the fine traditional Chinese culture,  draw on the best of world civilization and reflect the spirit of the  times.&nbsp;</span></font></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="563" style="text-align: justify;"><font data-dcnode-id="564" size="3" style="line-height: 175%;"><span data-dcnode-id="565" instrument_node="">　　Prosperity, democracy, civility, harmony, freedom,  equality, justice, the rule of law, patriotism, dedication, integrity  and friendship are all ideas that inherit the essence of the outstanding  traditional Chinese culture, embody the ideals and faith formed by  modern Chinese people through unremitting and painstaking efforts, and  reflect the wishes and vision of every Chinese citizen.&nbsp;</span></font></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="559" style="text-align: justify;"><font data-dcnode-id="560" size="3" style="line-height: 175%;"><span data-dcnode-id="561" instrument_node="">　　We should  foster the core socialist values throughout society. The people should  join hands and work persistently to make China richer and stronger, more  democratic, more harmonious and more beautiful, so that our country can  be confident enough to stand proudly among all other nations.&nbsp;</span></font></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="555" style="text-align: justify;"><font data-dcnode-id="556" size="3" style="line-height: 175%;"><span data-dcnode-id="557" instrument_node="">　　Since  the Opium War of the 1840s the Chinese people have long cherished a  dream of realizing a great national rejuvenation and building China into  a strong, democratic and harmonious modern socialist country – the  highest and most fundamental interests of the nation. And that's what  our 1.3 billion people are striving for.&nbsp;</span></font></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="551" style="text-align: justify;"><font data-dcnode-id="552" size="3" style="line-height: 175%;"><span data-dcnode-id="553" instrument_node="">　　China used to be a world  economic power. However, it missed its chance in the wake of the  Industrial Revolution and the consequent dramatic changes, and thus was  left behind and suffered humiliation under foreign invasion. Things got  worse especially after the Opium War, when the nation was plagued by  poverty and weakness, allowing others to trample upon and manipulate us.  We must not let this tragic history repeat itself.&nbsp;</span></font></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="547" style="text-align: justify;"><font data-dcnode-id="548" size="3" style="line-height: 175%;"><span data-dcnode-id="549" instrument_node="">　　The  construction of a strong, democratic and harmonious modern socialist  country is our goal and responsibility – for the nation, for our  forefathers and for our future generations. Therefore, we should  maintain our willpower, intensify our faith, and walk unswervingly along  the road towards our destination.&nbsp;</span></font></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="543" style="text-align: justify;"><font data-dcnode-id="544" size="3" style="line-height: 175%;"><span data-dcnode-id="545" instrument_node="">　　China has stood up. It will  never again tolerate being bullied by any nation. Yet it will never  follow in the footsteps of the big powers, which seek hegemony once they  grow strong. Our country is following a path of peaceful development.&nbsp;</span></font></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="539" style="text-align: justify;"><font data-dcnode-id="540" size="3" style="line-height: 175%;"><span data-dcnode-id="541" instrument_node="">　　Why  are we so confident? Because we have developed and become stronger.  China has won worldwide respect with its century-long efforts. Its  prestige keeps rising, and its influence keeps expanding. Today's China  forms a sharp contrast to China in the 19th century when the country was  humiliated, its sovereignty was infringed upon, and its people were  bullied by foreigners.&nbsp;</span></font></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="535" style="text-align: justify;"><font data-dcnode-id="536" size="3" style="line-height: 175%;"><span data-dcnode-id="537" instrument_node="">　　Chinese civilization has formed a unique  value system over several millennia. The brilliant traditional Chinese  culture is the essence of the nation and has deep roots in the Chinese  people's mentality, influencing their way of thinking and behavior  unconsciously.&nbsp;</span></font></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="531" style="text-align: justify;"><font data-dcnode-id="532" size="3" style="line-height: 175%;"><span data-dcnode-id="533" instrument_node="">　　Today, we advocate and carry forward the core  socialist values through absorbing the rich nourishment of Chinese  culture, so as to invigorate its vitality and broaden its influence.&nbsp;</span></font></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="527" style="text-align: justify;"><font data-dcnode-id="528" size="3" style="line-height: 175%;"><span data-dcnode-id="529" instrument_node="">　　Here are some quotations from ancient classics that I'd like to share with you today:&nbsp;</span></font></p><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="523" style="text-align: justify;"><font data-dcnode-id="524" size="3" style="line-height: 175%;"><span data-dcnode-id="525" instrument_node="">　　"The people are the foundation of a state,"</span></font></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="519" style="text-align: justify;"><font data-dcnode-id="520" size="3" style="line-height: 175%;"><span data-dcnode-id="521" instrument_node="">　　"The harmony of Nature and man,"</span></font></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="515" style="text-align: justify;"><font data-dcnode-id="516" size="3" style="line-height: 175%;"><span data-dcnode-id="517" instrument_node="">　　"Harmony without uniformity,"</span></font></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="511" style="text-align: justify;"><font data-dcnode-id="512" size="3" style="line-height: 175%;"><span data-dcnode-id="513" instrument_node="">　　"As Heaven changes through movement, a gentleman makes unremitting efforts to perfect himself,"</span></font></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="507" style="text-align: justify;"><font data-dcnode-id="508" size="3" style="line-height: 175%;"><span data-dcnode-id="509" instrument_node="">　　"When the Great Way prevailed, a public spirit ruled all under Heaven,"</span></font></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="503" style="text-align: justify;"><font data-dcnode-id="504" size="3" style="line-height: 175%;"><span data-dcnode-id="505" instrument_node="">　　"Everyone is responsible for his country's rise or fall,"</span></font></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="499" style="text-align: justify;"><font data-dcnode-id="500" size="3" style="line-height: 175%;"><span data-dcnode-id="501" instrument_node="">　　"Govern the country with virtue and educate the people with culture,"</span></font></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="495" style="text-align: justify;"><font data-dcnode-id="496" size="3" style="line-height: 175%;"><span data-dcnode-id="497" instrument_node="">　　"A gentleman has a good knowledge of righteousness,"</span></font></p><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="491" style="text-align: justify;"><font data-dcnode-id="492" size="3" style="line-height: 175%;"><span data-dcnode-id="493" instrument_node="">　　"A gentleman is broad-minded,"</span></font></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="487" style="text-align: justify;"><font data-dcnode-id="488" size="3" style="line-height: 175%;"><span data-dcnode-id="489" instrument_node="">　　"A gentleman takes morality as his bedrock,"</span></font></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="483" style="text-align: justify;"><font data-dcnode-id="484" size="3" style="line-height: 175%;"><span data-dcnode-id="485" instrument_node="">　　"Be true in word and resolute in deed,"</span></font></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="479" style="text-align: justify;"><font data-dcnode-id="480" size="3" style="line-height: 175%;"><span data-dcnode-id="481" instrument_node="">　　"If a man does not keep his word, what is he good for?"</span></font></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="475" style="text-align: justify;"><font data-dcnode-id="476" size="3" style="line-height: 175%;"><span data-dcnode-id="477" instrument_node="">　　"A man of high moral quality will never feel lonely,"</span></font></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="471" style="text-align: justify;"><font data-dcnode-id="472" size="3" style="line-height: 175%;"><span data-dcnode-id="473" instrument_node="">　　"The benevolent man loves others,"</span></font></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="467" style="text-align: justify;"><font data-dcnode-id="468" size="3" style="line-height: 175%;"><span data-dcnode-id="469" instrument_node="">　　"Do things for the good of others,"</span></font></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="463" style="text-align: justify;"><font data-dcnode-id="464" size="3" style="line-height: 175%;"><span data-dcnode-id="465" instrument_node="">　　"Don't do unto others what you don't want others to do unto you,"</span></font></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="459" style="text-align: justify;"><font data-dcnode-id="460" size="3" style="line-height: 175%;"><span data-dcnode-id="461" instrument_node="">　　"Care for each other and help one another,"</span></font></p><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="455" style="text-align: justify;"><font data-dcnode-id="456" size="3" style="line-height: 175%;"><span data-dcnode-id="457" instrument_node="">　　"Respect others' elders as one respects one's own, and care for others’ children as one cares for one's own,"</span></font></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="451" style="text-align: justify;"><font data-dcnode-id="452" size="3" style="line-height: 175%;"><span data-dcnode-id="453" instrument_node="">　　"Help the poor and assist those in difficulty,"</span></font></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="447" style="text-align: justify;"><font data-dcnode-id="448" size="3" style="line-height: 175%;"><span data-dcnode-id="449" instrument_node="">　　"Care less about quantity and more about quality."</span></font></p><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="443" style="text-align: justify;"><font data-dcnode-id="444" size="3" style="line-height: 175%;"><span data-dcnode-id="445" instrument_node="">　　These  thoughts and ideas all displayed and still demonstrate distinctive  national features, and have the indelible values of the times. We have  updated them in keeping abreast of the times, while carrying them  forward in an unbroken line.&nbsp;</span></font></p><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="439" style="text-align: justify;"><font data-dcnode-id="440" size="3" style="line-height: 175%;"><span data-dcnode-id="441" instrument_node="">　　As Chinese, we should always keep  our own unique inner-world spirit, uphold values that we practice every  day without noticing. The core socialist values we advocate today  represent the inheritance and upgrading of outstanding traditional  Chinese culture.&nbsp;</span></font></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="435" style="text-align: justify;"><font data-dcnode-id="436" size="3" style="line-height: 175%;"><span data-dcnode-id="437" instrument_node="">　　Values appear and develop in the process of  human beings getting to know and shape nature and society. Core values  vary in different nations and countries due to different natural  conditions and courses of development. The core values of a nation and  country are closely related to its history and culture, as well as to  what its people are striving for and to the present issues it needs to  resolve.&nbsp;</span></font></p><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="431" style="text-align: justify;"><font data-dcnode-id="432" size="3" style="line-height: 175%;"><span data-dcnode-id="433" instrument_node="">　　There are no two leaves exactly alike on earth. A  nation, or people of a country, must know who they are, where they came  from and where they are heading. Keep on going when you have made your  choice.&nbsp;</span></font></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="427" style="text-align: justify;"><font data-dcnode-id="428" size="3" style="line-height: 175%;"><span data-dcnode-id="429" instrument_node="">　　On December 26 last year, I said at the meeting commemorating the 120th birthday of Mao Zedong:&nbsp;</span></font></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="423" style="text-align: justify;"><font data-dcnode-id="424" size="3" style="line-height: 175%;"><span data-dcnode-id="425" instrument_node="">　　Boasting  a vast land of 9.6 million sq km, a rich cultural heritage and a strong  bond among the 1.3 billion Chinese people, we are resolved to go our  own way. We have a big stage to display our advantages on, a long and  rich history to draw benefit from, and a powerful impetus to push us  ahead. We Chinese people – every single one of us – should draw  confidence from this.&nbsp;</span></font></p><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="419" style="text-align: justify;"><font data-dcnode-id="420" size="3" style="line-height: 175%;"><span data-dcnode-id="421" instrument_node="">　　We should modestly learn from the best of  other civilizations, but never forget our own origin. We must not  blindly copy the development models of other countries nor accept their  dictation.&nbsp;</span></font></p><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="415" style="text-align: justify;"><font data-dcnode-id="416" size="3" style="line-height: 175%;"><span data-dcnode-id="417" instrument_node="">　　What I mean here is that we should enhance our  confidence in the path we have chosen, in the theories we have devised  and in the system we have established to reach our goal of development  and make the Chinese Dream come true. "In the face of all blows, not  bending low, it still stands fast. Whether from east, west, south or  north the wind doth blast." Our confidence is supported by our core  values.&nbsp;</span></font></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="411" style="text-align: justify;"><font data-dcnode-id="412" size="3" style="line-height: 175%;"><span data-dcnode-id="413" instrument_node="">　　Why am I talking about the core socialist values with you  young people? Because your value orientation will decide the values of  the whole of society in the years to come. Besides, young people are at  the time of life when they form and establish their values. It is  therefore very important to offer some guidance. That reminds me of  something that happens in our daily life. When we button up our coat, we  may inadvertently put the first button in the wrong button hole, and  that will result in all the other buttons being put in the wrong holes.  That's why we say that young people should "button right" in the early  days of their life. "A deep well is dug starting with a shallow pit."  Every young person should learn about the core socialist values starting  right now, take them as his basic rules and disseminate them throughout  society.&nbsp;</span></font></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="407" style="text-align: justify;"><font data-dcnode-id="408" size="3" style="line-height: 175%;"><span data-dcnode-id="409" instrument_node="">　　When young people adopt the core socialist values they should emphasize the following points:&nbsp;</span></font></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="403" style="text-align: justify;"><font data-dcnode-id="404" size="3" style="line-height: 175%;"><span data-dcnode-id="405" instrument_node="">　　First,  work diligently to acquire true knowledge. Knowledge is an important  cornerstone for the cultivation of the core values. The great  philosophers of ancient Greece believed that knowledge was a virtue. Our  ancestors also asserted, "One cannot enhance one's ability and wisdom  if one does not work hard; neither can one succeed without ambition."&nbsp;</span></font></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="399" style="text-align: justify;"><font data-dcnode-id="400" size="3" style="line-height: 175%;"><span data-dcnode-id="401" instrument_node="">　　A  person enjoys only once the youthful days at college, so you should  cherish them. To acquire knowledge, one has to study diligently,  intensively and persistently. Lu Xun once said, "Who said I'm a genius? I  spent all my time working when others were sipping coffee." In college  days, "Young we were, schoolmates, at life's full flowering." One can  totally throw oneself into seeking knowledge without any distractions,  learning from teachers, exchanging views with classmates and rummaging  through piles of books. So there is no reason not to study hard. Work  hard, acquire more knowledge and turn what you have learned into your  own views and ideas. I hope that you will not only concentrate on book  knowledge but also care about the people, the country and the world, and  assume your responsibility for society.&nbsp;</span></font></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="395" style="text-align: justify;"><font data-dcnode-id="396" size="3" style="line-height: 175%;"><span data-dcnode-id="397" instrument_node="">　　Second, cultivate  morality and virtue, and pay attention to them in practice. "Virtue is  the root." Mr Cai Yuanpei believed, "He who is strong physically and  talented but has no virtue will end up on the side of vice." Virtues are  fundamental for both individuals and society. What is most important is  to cultivate morality. This explains why we select those who are both  talented and morally cultivated for our work, with morality as priority.  One can be placed in the right position only if one recognizes virtue,  follows social ethics and restricts personal desires.&nbsp;</span></font></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="391" style="text-align: justify;"><font data-dcnode-id="392" size="3" style="line-height: 175%;"><span data-dcnode-id="393" instrument_node="">　　When  talking about cultivating morality, one needs to have high ambitions as  well as pragmatic plans. To devote oneself to one's country and serve  one's people, this is the great virtue with which one is able to  accomplish the great cause. In the meantime, one needs to start to do  small things well and be self-disciplined even in small matters.  "Learning from fine things that may appear and correcting any mistakes  that may occur," one needs to cultivate public and personal virtues,  learn to work, to be thrifty, to be grateful, to help others, to be  modest, to be tolerant, to examine oneself and to exercise  self-restraint.</span></font></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="387" style="text-align: justify;"><font data-dcnode-id="388" size="3" style="line-height: 175%;"><span data-dcnode-id="389" instrument_node="">　　Third, learn to tell right from wrong and make  correct decisions. As our ancestors believed, "Reading without thinking  makes one muddled; thinking without reading makes one flighty." Knowing  what is right or wrong, what is the correct direction and what is the  proper way to follow, one is bound to reap the reward of one's work.&nbsp;</span></font></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="383" style="text-align: justify;"><font data-dcnode-id="384" size="3" style="line-height: 175%;"><span data-dcnode-id="385" instrument_node="">　　Facing  a complex and fast-changing world, an information era with the surge of  various schools of thought, a multifaceted society of genuine and false  ideas, and the pressure associated with one's academic pursuit,  relationships and employment, you may feel somewhat confused, hesitant  or frustrated. This is a normal experience everybody will go through.  The key is to learn to think about and analyze situations before making  decisions in order to arrive at correct decisions. You should be sturdy,  confident and self-reliant. You must form a correct world outlook, view  of life and values, then you will see – crystal-clear – the true nature  of society and have a better understanding of your life's experience,  and be able to tell what is right and what is wrong, what is primary and  what is secondary, what is true and what is false, what is good and  what is evil, and what is beautiful and what is ugly before making  judgments and decisions. As a Tang verse goes, "Gold glitters only after  countless washings and sievings."</span></font></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="379" style="text-align: justify;"><font data-dcnode-id="380" size="3" style="line-height: 175%;"><span data-dcnode-id="381" instrument_node="">　　Fourth, be honest and sincere;  do solid work and be an upright person. The correct way needs to be  pursued in practice, while morality requires no empty talk. One should  be more pragmatic. Knowledge and action should go hand in hand, and the  core values should be turned into moral pursuits as well as a drive to  make people engage in conscious action. The Book of Rites says, "Learn extensively, inquire earnestly, think profoundly, discriminate clearly and practice sincerely."</span></font></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="375" style="text-align: justify;"><font data-dcnode-id="376" size="3" style="line-height: 175%;"><span data-dcnode-id="377" instrument_node="">　　Some  people believe that "sages are mediocre people who work hard, while  mediocre people are sages who refuse to work hard." With more  opportunities, young people should make their steps steady, lay a solid  foundation and make unremitting efforts. It is no good for study or  running a business if one works intermittently, or chops and changes.  "Difficult things are done starting from easy ones; a great undertaking  begins with minor work."&nbsp;</span></font></p><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="371" style="text-align: justify;"><font data-dcnode-id="372" size="3" style="line-height: 175%;"><span data-dcnode-id="373" instrument_node="">　　No matter what you opt to do, success  always favors hard workers. Young people should take a difficult  environment as a challenge or test. "Little strokes fell great oaks."  Success awaits those who work doggedly and unyieldingly, and those who  are never daunted by repeated setbacks.&nbsp;</span></font></p><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="367" style="text-align: justify;"><font data-dcnode-id="368" size="3" style="line-height: 175%;"><span data-dcnode-id="369" instrument_node="">　　The cultivation of the  core values can't be done overnight. It requires efforts from the easy  to the difficult, from close-up to faraway until it becomes a faith and  idea that we follow conscientiously. When things are smooth, you may be  confident; when there are frustrations, you may have doubts and waver.  In all circumstances we should always uphold the core socialist values  which have been formed and developed here in our country, make  contributions to the great cause in the modern era and fulfill our  lifetime expectations.&nbsp;</span></font></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="363" style="text-align: justify;"><font data-dcnode-id="364" size="3" style="line-height: 175%;"><span data-dcnode-id="365" instrument_node="">　　Students and teachers,&nbsp;</span></font></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="359" style="text-align: justify;"><font data-dcnode-id="360" size="3" style="line-height: 175%;"><span data-dcnode-id="361" instrument_node="">　　The Party  Central Committee has decided to build world-class colleges and  universities – a strategic policy that we should follow without  hesitation. To make them world-class, they must feature Chinese  characteristics. It won't do to copy others mechanically, because we  always believe that "the more national the more international."&nbsp;</span></font></p><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="355" style="text-align: justify;"><font data-dcnode-id="356" size="3" style="line-height: 175%;"><span data-dcnode-id="357" instrument_node="">　　In  this world there is only one Harvard University, University of Oxford,  Stanford University, Massachusetts Institute of Technology and  University of Cambridge; likewise, there is only one Peking University,  Tsinghua University, Zhejiang University, Fudan University and Nanjing  University in China. We should draw on the world's best experience in  running institutions of higher learning, follow the rules of education,  and establish more excellent colleges and universities on Chinese soil.&nbsp;</span></font></p><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="351" style="text-align: justify;"><font data-dcnode-id="352" size="3" style="line-height: 175%;"><span data-dcnode-id="353" instrument_node="">　　Lu  Xun asserted, "Peking University is always innovative and plays a  pioneering role in reforming movements, leading China along an upward  path towards a better future."&nbsp;</span></font></p><span data-dcnode-id="350" instrument_node="">
</span><p data-dcnode-id="347" style="text-align: justify;"><font data-dcnode-id="348" size="3" style="line-height: 175%;"><span data-dcnode-id="349" instrument_node="">　　The decision on advancing the  reform in an all-round way was made at the Third Plenary Session of the  18th CPC Central Committee, defining the demands for the further reform  of higher education in China. What we must do now is to turn this  blueprint into reality.&nbsp;</span></font></p><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="343" style="text-align: justify;"><font data-dcnode-id="344" size="3" style="line-height: 175%;"><span data-dcnode-id="345" instrument_node="">　　Institutions of higher learning should  take the lead in educational reform throughout the country, centering on  the fundamental tasks of building virtues and morality, and moving  faster in establishing an educational system and mechanism that is full  of vigor and vitality, efficient, more open and favoring educational  development in a balanced and coordinated way. I do hope that Peking  University can realize its long-cherished dream as soon as possible of  advancing into the ranks of world-class universities through painstaking  efforts, reform and innovation.&nbsp;</span></font></p><span data-dcnode-id="342" instrument_node="">
</span><p data-dcnode-id="339" style="text-align: justify;"><font data-dcnode-id="340" size="3" style="line-height: 175%;"><span data-dcnode-id="341" instrument_node="">　　Teachers are entrusted with the  noblest mission in this world. Mr Mei Yiqi opined that the key to the  success of a university lies in having a lot of highly accomplished  gurus rather than imposing buildings. What he meant by  "highly-accomplished gurus," as I see it, are people most knowledgeable  in their academic fields and who are also virtuous. Always bearing in  mind their responsibilities, teachers should be ready to serve as human  ladders, inspiring the souls of the students whom they are teaching with  the help of their personal charisma and scholarly attainments.&nbsp;</span></font></p><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="335" style="text-align: justify;"><font data-dcnode-id="336" size="3" style="line-height: 175%;"><span data-dcnode-id="337" instrument_node="">　　Party  committees and governments at all levels should pay closer attention to  colleges and universities, show more concern for the students and erect  a platform for them to dream upon and make their dreams come true. We  should accelerate the reform in an all-round way, create a fair and just  social environment, promote social mobility and inspire the vigor and  creativity of young people. We should improve the system of employment  and business startups so as to assist graduates at the beginning of  their life-long careers. Leading officials at all levels should keep in  communication with the students, make friends with them and listen to  what they have to say.&nbsp;</span></font></p><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="331" style="text-align: justify;"><font data-dcnode-id="332" size="3" style="line-height: 175%;"><span data-dcnode-id="333" instrument_node="">　　Today, the majority of college students  are around the age of 20; and they will be under the age of 30 by 2020,  when we complete the building of a moderately prosperous society in all  respects. They will be around 60 by the mid-21st century, when we  basically realize our country's modernization. That is to say, you will  participate in the cause of reaching the Two Centenary Goals along with  myriads of other young people.&nbsp;</span></font></p><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="327" style="text-align: justify;"><font data-dcnode-id="328" size="3" style="line-height: 175%;"><span data-dcnode-id="329" instrument_node="">　　I believe that life is meaningless  for anyone without faith, without dreams, without concerted endeavors  and without contributions. I hope that you can create your own wonderful  life while making the Chinese Dream come true since you have never been  given a platform as spacious as this or as promising as this.&nbsp;</span></font></p><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="323" style="text-align: justify;"><font data-dcnode-id="324" size="3" style="line-height: 175%;"><span data-dcnode-id="325" instrument_node="">　　I  believe that young Chinese people today are more than capable of  undertaking the historic mission entrusted to them by the Party and the  people, and will go on to write a brilliant chapter worthy of our times  in their efforts to take advantage of their youthful vigor, explore life  and contribute to society!&nbsp;</span></font></p><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="319" style="text-align: justify;"><font data-dcnode-id="320" size="3" style="line-height: 175%;"><span data-dcnode-id="321" instrument_node="">　　* Speech at the seminar with teachers and students of Peking University.&nbsp;</span></font></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="315" style="text-align: justify;"><font data-dcnode-id="316" size="3" style="line-height: 175%;"><span data-dcnode-id="317" instrument_node="">　　(Not to be republished for any commercial or other purposes.)</span></font></p><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="309" style="text-align:justify;text-justify:inter-ideograph"><font data-dcnode-id="310" size="3" style="line-height: 175%;"><span data-dcnode-id="313" instrument_node="">　　</span><span data-dcnode-id="311" lang="EN-US" style="line-height: 175%;"><span data-dcnode-id="312" instrument_node="">Source:&nbsp;Xi Jinping The Governance of China</span></span></font></p><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="303" style="text-align:justify;text-justify:inter-ideograph"><font data-dcnode-id="304" size="3" style="line-height: 175%;"><span data-dcnode-id="307" instrument_node="">　　</span><span data-dcnode-id="305" lang="EN-US" style="line-height: 175%;"><span data-dcnode-id="306" instrument_node="">From:&nbsp; http://en.qstheory.cn</span></span></font></p><span data-dcnode-id="302" instrument_node="">
