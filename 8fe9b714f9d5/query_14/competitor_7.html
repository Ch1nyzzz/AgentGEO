</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0005&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as0005&quot;><p id=&quot;sp0020&quot;>This article aims to position postsocialist cities in Central and Eastern Europe in the broader debate on urban environmental justice. The article crosscuts through all three dimensions of justice (distributive/distributional, procedural/participatory, and interactional/recognition) in the context of urban green and blue space provision. Environmental justice is still an emerging topic in postsocialist cities, constrained by market-orientation and neoliberal trends within society, privatization, and the primacy of private interests. The respective situation in postsocialist cities provides insights into the international debate on environmental justice, by highlighting some extremes related to neoliberal and populist governments and very rapid processes that lack long-term democratic consensus within societies. The findings of this study are discussed in the context of a postsocialist legacy, which includes broad tolerance for inequalities, a lack of solidarity in society, a lack of responsibility for the public interest, and extreme individualization and disregard for social interests. This has gradually led to the corporatization of local authorities and various business–government coalitions. This setting is more likely to favor business models related to the use and management of urban green and blue spaces than the environmental justice discourse.</p></div></div></div>" data-dcnode-id="8403" lang="en" name="citation_abstract"><span data-dcnode-id="8402" instrument_node="">

 id="ab0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7615"><span data-dcnode-id="7616" instrument_node="">Highlights</span></h2><div data-dcnode-id="7587" id="as0010"><p data-dcnode-id="7588" id="sp0025"></p><dl class="list" data-dcnode-id="7589"><dt class="list-label" data-dcnode-id="7613"><span data-dcnode-id="7614" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7610"><p data-dcnode-id="7611" id="p0135"><span data-dcnode-id="7612" instrument_node="">Broad tolerance for inequalities, lack of solidarity in society, lack of responsibility for the public interest</span></p></dd><dt class="list-label" data-dcnode-id="7608"><span data-dcnode-id="7609" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7605"><p data-dcnode-id="7606" id="p0140"><span data-dcnode-id="7607" instrument_node="">Extreme individualisation and disregard for the social interest</span></p></dd><dt class="list-label" data-dcnode-id="7603"><span data-dcnode-id="7604" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7600"><p data-dcnode-id="7601" id="p0145"><span data-dcnode-id="7602" instrument_node="">Corporatisation of local authorities and various business–government coalitions</span></p></dd><dt class="list-label" data-dcnode-id="7598"><span data-dcnode-id="7599" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7595"><p data-dcnode-id="7596" id="p0150"><span data-dcnode-id="7597" instrument_node="">Urban green and blue spaces poorly considered in planning</span></p></dd><dt class="list-label" data-dcnode-id="7593"><span data-dcnode-id="7594" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7590"><p data-dcnode-id="7591" id="p0155"><span data-dcnode-id="7592" instrument_node="">Justice consideration far from being accepted as guiding principles for urban greening</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="7580" id="ab0005" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7584"><span data-dcnode-id="7585" instrument_node="">Abstract</span></h2><div data-dcnode-id="7581" id="as0005"><p data-dcnode-id="7582" id="sp0020"><span data-dcnode-id="7583" instrument_node="">This article aims to position postsocialist cities in Central and Eastern Europe in the broader debate on urban environmental justice. The article crosscuts through all three dimensions of justice (distributive/distributional, procedural/participatory, and interactional/recognition) in the context of urban green and blue space provision. Environmental justice is still an emerging topic in postsocialist cities, constrained by market-orientation and neoliberal trends within society, privatization, and the primacy of private interests. The respective situation in postsocialist cities provides insights into the international debate on environmental justice, by highlighting some extremes related to neoliberal and populist governments and very rapid processes that lack long-term democratic consensus within societies. The findings of this study are discussed in the context of a postsocialist legacy, which includes broad tolerance for inequalities, a lack of solidarity in society, a lack of responsibility for the public interest, and extreme individualization and disregard for social interests. This has gradually led to the corporatization of local authorities and various business–government coalitions. This setting is more likely to favor business models related to the use and management of urban green and blue spaces than the environmental justice discourse.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="7556" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="7568"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="7569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0264275120312099"><svg class="icon icon-navigate-left" data-dcnode-id="7577" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="7578"></path></svg><span class="button-alternative-text" data-dcnode-id="7570"><strong data-dcnode-id="7575"><span data-dcnode-id="7576" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="7573"><span data-dcnode-id="7574" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="7571"><span data-dcnode-id="7572" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="7557"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="7558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0264275120312087"><span class="button-alternative-text" data-dcnode-id="7561"><strong data-dcnode-id="7566"><span data-dcnode-id="7567" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="7564"><span data-dcnode-id="7565" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="7562"><span data-dcnode-id="7563" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="7559" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="7560"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="7534"><div class="keywords-section" data-dcnode-id="7535" id="ks0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7554"><span data-dcnode-id="7555" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="7551" id="kw0005"><span data-dcnode-id="7552" id="tx0010"><span data-dcnode-id="7553" instrument_node="">Central and Eastern Europe</span></span></div><div class="keyword" data-dcnode-id="7548" id="kw0010"><span data-dcnode-id="7549" id="tx0015"><span data-dcnode-id="7550" instrument_node="">Green and blue infrastructure</span></span></div><div class="keyword" data-dcnode-id="7545" id="kw0015"><span data-dcnode-id="7546" id="tx0020"><span data-dcnode-id="7547" instrument_node="">Transition economies</span></span></div><div class="keyword" data-dcnode-id="7542" id="kw0020"><span data-dcnode-id="7543" id="tx0025"><span data-dcnode-id="7544" instrument_node="">Environmental planning</span></span></div><div class="keyword" data-dcnode-id="7539" id="kw0025"><span data-dcnode-id="7540" id="tx0030"><span data-dcnode-id="7541" instrument_node="">Environmental governance</span></span></div><div class="keyword" data-dcnode-id="7536" id="kw0030"><span data-dcnode-id="7537" id="tx0035"><span data-dcnode-id="7538" instrument_node="">Neoliberalism</span></span></div></div></div><span data-dcnode-id="7533" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="6383" id="body"><div data-dcnode-id="6440"><section data-dcnode-id="7442" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7527" id="st0020"><span data-dcnode-id="7532" instrument_node="">1</span><span data-dcnode-id="7530" instrument_node="">. </span><span data-dcnode-id="7528" instrument_node="">Introduction</span></h2><p data-dcnode-id="7510" id="p0160"><span data-dcnode-id="7526" instrument_node="">The socialist system claimed to promote an egalitarian social mix, with a strong focus on society and social needs. After the fall of socialism, researchers were concerned that there was no alternative “comprehensive progressive vision of a just social order (…) to take socialism's place” (</span><a class="workspace-trigger" data-dcnode-id="7524" href="#bb0120" name="bbb0120"><span data-dcnode-id="7525" instrument_node="">Fraser, 1997, p. 2</span></a><span data-dcnode-id="7523" instrument_node="">). Environmental justice (EJ) – a concept that highlights the differential exposure to environmental burdens (bads) and access to environmental goods experienced by different socioeconomic groups (</span><a class="workspace-trigger" data-dcnode-id="7521" href="#bb0380" name="bbb0380"><span data-dcnode-id="7522" instrument_node="">Schweitzer &amp; Stephenson, 2007</span></a><span data-dcnode-id="7520" instrument_node="">) – provides an example of such an alternative vision. The understanding of EJ is clearly broader than the above – most highlighted – distributive/distributional approach that focuses on fair allocation of/access to benefits for all social groups. It also encompasses procedural/participatory justice (fair integration of all affected groups into decision-making processes), and interactional/recognition justice (recognizing the needs, values, and preferences of all stakeholders in a safe, fair, and non-discriminatory environment) (</span><a class="workspace-trigger" data-dcnode-id="7518" href="#bb0300" name="bbb0300"><span data-dcnode-id="7519" instrument_node="">Low, 2013</span></a><span data-dcnode-id="7517" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7515" href="#bb0375" name="bbb0375"><span data-dcnode-id="7516" instrument_node="">Schlosberg, 2003</span></a><span data-dcnode-id="7514" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7512" href="#bb0440" name="bbb0440"><span data-dcnode-id="7513" instrument_node="">Walker, 2012</span></a><span data-dcnode-id="7511" instrument_node="">).</span></p><p data-dcnode-id="7499" id="p0165"><span data-dcnode-id="7509" instrument_node="">The importance of EJ research is growing worldwide, with increasing attention paid to this topic in key international documents (such as the UN Sustainable Development Goals or Habitat Agenda), international research projects, and publications. Most recently, a particularly important strand of research in this context has focused on the availability, accessibility, and attractiveness of urban green and blue spaces (UGBS) to different socioeconomic groups of inhabitants. UGBS are understood here as all those parts of urban land which are covered by vegetation and water. This broad interpretation is supported by the fact that a large share of such spaces in postsocialist cities is actually not protected as parks, forests or other forms of formal green spaces (</span><a class="workspace-trigger" data-dcnode-id="7507" href="#bb0105" name="bbb0105"><span data-dcnode-id="7508" instrument_node="">Feltynowski et al., 2018</span></a><span data-dcnode-id="7506" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7504" href="#bb0390" name="bbb0390"><span data-dcnode-id="7505" instrument_node="">Sikorska, Łaszkiewicz, Krauze, &amp; Sikorski, 2020</span></a><span data-dcnode-id="7503" instrument_node="">), and yet all of such spaces and their functional connections and interrelations provide a broad range of services to urban residents (</span><a class="workspace-trigger" data-dcnode-id="7501" href="#bb0015" name="bbb0015"><span data-dcnode-id="7502" instrument_node="">Andersson et al., 2019</span></a><span data-dcnode-id="7500" instrument_node="">).</span></p><p data-dcnode-id="7488" id="p0170"><span data-dcnode-id="7498" instrument_node="">Postsocialist cities, which have undergone a significant socioeconomic transition since the beginning of the 1990s – from socialism to free-market capitalism – are poorly represented in this new wave of research, with little attention paid to the social equity and inclusion contexts of urban greening. Examples from postsocialist countries have been mentioned in few overview publications that refer to the topic of EJ (</span><a class="workspace-trigger" data-dcnode-id="7496" href="#bb0155" name="bbb0155"><span data-dcnode-id="7497" instrument_node="">Haase et al., 2017</span></a><span data-dcnode-id="7495" instrument_node="">), while proper case studies from the region have been omitted from large scale comparisons that focused on equity and inclusion in the context of UGBS (</span><a class="workspace-trigger" data-dcnode-id="7493" href="#bb0065" name="bbb0065"><span data-dcnode-id="7494" instrument_node="">Connolly, Trebic, Anguelovski, Wood, &amp; Thery, 2018</span></a><span data-dcnode-id="7492" instrument_node="">). It is highly relevant to study how postsocialist cities fare in terms of ensuring EJ in this context, as when it comes to UGBS planning and management in more general terms, postsocialist countries represent a distinct family, in most cases different from other groups of countries in Europe (</span><a class="workspace-trigger" data-dcnode-id="7490" href="#bb0070" name="bbb0070"><span data-dcnode-id="7491" instrument_node="">Davies et al., 2015</span></a><span data-dcnode-id="7489" instrument_node="">). With this article, we wish to position postsocialist cities in the broader debate on urban EJ.</span></p><p data-dcnode-id="7470" id="p0175"><span data-dcnode-id="7487" instrument_node="">Our main research questions are the following:</span></p><dl class="list" data-dcnode-id="7471"><dt class="list-label" data-dcnode-id="7485"><span data-dcnode-id="7486" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="7482"><p data-dcnode-id="7483" id="p0180"><span data-dcnode-id="7484" instrument_node="">What crosscutting insights with respect to EJ can we observe in postsocialist cities?</span></p></dd><dt class="list-label" data-dcnode-id="7480"><span data-dcnode-id="7481" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="7477"><p data-dcnode-id="7478" id="p0185"><span data-dcnode-id="7479" instrument_node="">How are EJ issues related to general urban debates in the postsocialist realm?</span></p></dd><dt class="list-label" data-dcnode-id="7475"><span data-dcnode-id="7476" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="7472"><p data-dcnode-id="7473" id="p0190"><span data-dcnode-id="7474" instrument_node="">How does the postsocialist condition influence the debate on EJ?</span></p></dd></dl><p></p><p data-dcnode-id="7468"><span data-dcnode-id="7469" instrument_node="">We respond to these questions based on the different types of evidence cumulated through an iterative and deliberative research process through which we aimed to elicit, systematize, and synthesize emerging knowledge on EJ in postsocialist cities. We link evidence related to research on EJ and UGBS in postsocialist countries, and to the practice of UGBS management observed in these countries. In particular, we refer to Central and Eastern Europe, and countries such as Belarus, Hungary, Poland, Romania, Russia, Slovak Republic, Ukraine, and eastern Germany, which formerly constituted the German Democratic Republic. We have rich evidence from these countries that represents the challenges encountered by postsocialist countries in general.</span></p><p data-dcnode-id="7463" id="p0195"><span data-dcnode-id="7467" instrument_node="">We see the added value of this article in collecting and synthesizing EJ evidence from postsocialist cities. In this way, we contribute both to the ongoing discussion on urban EJ, which so far has largely neglected the postsocialist context (</span><a class="workspace-trigger" data-dcnode-id="7465" href="#bb0220" name="bbb0220"><span data-dcnode-id="7466" instrument_node="">Koprowska, 2019</span></a><span data-dcnode-id="7464" instrument_node="">), and to the ongoing debate on postsocialist cities, which has provided scattered information pertaining to EJ issues. Indeed, we argue that the specific postsocialist realm has a specific connection with EJ and can bring new insights to the broader discussion.</span></p><p data-dcnode-id="7443" id="p0200"><span data-dcnode-id="7462" instrument_node="">After this introduction, we describe the evidence used in this article and how it was elicited (</span><a class="workspace-trigger" data-dcnode-id="7460" href="#bb0220" name="bbb0220"><span data-dcnode-id="7461" instrument_node="">Section 2</span></a><span data-dcnode-id="7459" instrument_node="">); in </span><a class="workspace-trigger" data-dcnode-id="7457" href="#s0015" name="bs0015"><span data-dcnode-id="7458" instrument_node="">Section 3</span></a><span data-dcnode-id="7456" instrument_node="">, we provide an overview of the ongoing debate on EJ in postsocialist countries, showing that although still very small, the number of studies and discussions referring to this topic has grown in recent years and that scholars from postsocialist countries increasingly contribute to international debates on this topic. This largely sets the context for answering our first research question. In </span><a class="workspace-trigger" data-dcnode-id="7454" href="#s0020" name="bs0020"><span data-dcnode-id="7455" instrument_node="">Section 4</span></a><span data-dcnode-id="7453" instrument_node="">, we present insights into EJ from the UGBS provision perspective, divided into availability (whether UGBS exist close to where people live), accessibility (whether they are physically and psychologically accessible), and attractiveness (whether they meet the prospective users' expectations and needs). It is here that the key EJ issues related to general urban debates in the postsocialist realm are reviewed, in light of our second research question. In </span><a class="workspace-trigger" data-dcnode-id="7451" href="#s0040" name="bs0040"><span data-dcnode-id="7452" instrument_node="">Section 5</span></a><span data-dcnode-id="7450" instrument_node="">, we interpret the different aspects of UGBS provision in postsocialist cities in the context of people-based dimensions of EJ, referring to: distributive/distributional justice; procedural/participatory justice; and interactional/recognition justice. This section provides most insight into the third research question regarding the postsocialist condition and its influence on the debate on EJ. The Discussion in </span><a class="workspace-trigger" data-dcnode-id="7448" href="#s0060" name="bs0060"><span data-dcnode-id="7449" instrument_node="">Section 6</span></a><span data-dcnode-id="7447" instrument_node=""> is divided into subsections specifically responding to our research questions in light of the material presented in the previous sections. </span><a class="workspace-trigger" data-dcnode-id="7445" href="#s0085" name="bs0085"><span data-dcnode-id="7446" instrument_node="">Section 7</span></a><span data-dcnode-id="7444" instrument_node=""> offers the final concluding remarks.</span></p></section><section data-dcnode-id="7382" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7436" id="st0025"><span data-dcnode-id="7441" instrument_node="">2</span><span data-dcnode-id="7439" instrument_node="">. </span><span data-dcnode-id="7437" instrument_node="">Methods and materials</span></h2><div data-dcnode-id="7405"><p data-dcnode-id="7431" id="p0210"><span data-dcnode-id="7435" instrument_node="">This paper builds on comprehensive evidence that includes our previous and ongoing research, a deliberative process that brought all of us together in April and May 2019, and different sources of additional material (</span><a class="workspace-trigger" data-dcnode-id="7433" href="#f0005" name="bf0005"><span data-dcnode-id="7434" instrument_node="">Fig. 1</span></a><span data-dcnode-id="7432" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="7406" id="f0005"><span data-dcnode-id="7415"><img alt="Fig. 1" aria-describedby="ca0005" data-dcnode-id="7430" height="199" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0264275120312105-gr1.jpg&amp;raw"><span data-dcnode-id="7429" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7416"><li data-dcnode-id="7423"><a class="anchor download-link u-font-sans" data-dcnode-id="7424" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0264275120312105-gr1_lrg.jpg" target="_blank" title="Download high-res image (125KB)"><span class="anchor-text" data-dcnode-id="7425"><span data-dcnode-id="7428" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7426"><span data-dcnode-id="7427" instrument_node="">Download high-res image (125KB)</span></span></span></a></li><li data-dcnode-id="7417"><a class="anchor download-link u-font-sans" data-dcnode-id="7418" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0264275120312105-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7419"><span data-dcnode-id="7422" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7420"><span data-dcnode-id="7421" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7407"><span data-dcnode-id="7408" id="ca0005"><p data-dcnode-id="7409" id="sp0005"><span class="label" data-dcnode-id="7413"><span data-dcnode-id="7414" instrument_node="">Fig. 1</span></span><span data-dcnode-id="7412" instrument_node="">. </span><span data-dcnode-id="7410" instrument_node="">Schematic representation of the research process and material, along with the analytical frameworks.</span></p></span></span></figure></div><p data-dcnode-id="7403" id="p0215"><span data-dcnode-id="7404" instrument_node="">The deliberative process included two rounds of questions, to which all thirteen of us responded remotely (for the full list of questions, see the Electronic Supplementary Material accompanying this article), and a workshop held at the University of Lodz, Poland, on 24 May 2019. The authors were selected based on their experience with the topics of UGBS and EJ in their relevant countries. The selection was intended to ensure a broad representation of postsocialist countries, especially in Central and Eastern Europe. In this way, we attempted to cover various political and geographical contexts within the region and to identify commonalities and differences between different countries. The broad spectrum of countries represented allowed us to make some generalizations based on the aggregated empirical knowledge.</span></p><p data-dcnode-id="7401" id="p0220"><span data-dcnode-id="7402" instrument_node="">The process was designed not only to elicit information pertaining to different national and urban settings but also to ensure a common understanding of the issues we discussed. The workshop in Lodz was moderated to clarify the issues that emerged during the remote phase of the discussion and to elicit additional information. The workshop discussion helped us to synthesize the findings and reflect on the commonalities and contradictions between postsocialist countries. Additionally, the workshop provided an opportunity to discuss the specific content of the draft manuscript. Following the workshop, all authors were asked to provide representative case studies to illustrate various EJ issues in postsocialist cities and to provide additional research material. The criteria for the selection of case studies included representativeness for the broader issues observed in postsocialist countries but also including the specific local context. The case studies serve as confirmation of our earlier generalizations and are used for additional illustration only. They mostly represent our own ongoing research, most of which has not been published yet.</span></p><p data-dcnode-id="7399" id="p0225"><span data-dcnode-id="7400" instrument_node="">Beyond the authors' own work and knowledge, this article builds on a comprehensive and qualitative literature review, including academic literature, grey literature, and mass-media reports. The latter made it possible to cover areas and topics which we did not study ourselves and for which no other evidence was available. The analyzed literature covered various national and local contexts and included not only what has been published in English but also in many other native languages of the studied Central and Eastern European countries.</span></p><p data-dcnode-id="7394" id="p0230"><span data-dcnode-id="7398" instrument_node="">We studied the collected material using two analytical frameworks. The first focused on UGBS availability, accessibility, and attractiveness, which was first proposed and tested in the postsocialist context by </span><a class="workspace-trigger" data-dcnode-id="7396" href="#bb0030" name="bbb0030"><span data-dcnode-id="7397" instrument_node="">Biernacka and Kronenberg (2018)</span></a><span data-dcnode-id="7395" instrument_node="">. The framework helps to disentangle the differently interpreted concepts of UGBS availability and accessibility, adding the dimension of attractiveness to obtain a comprehensive picture of UGBS provision. It provides insight into discussions on EJ and political ecology by making it possible to clearly connect the different aspects of UGBS provision with the location of urban inhabitants or their share in UGBS governance.</span></p><p data-dcnode-id="7383" id="p0235"><span data-dcnode-id="7393" instrument_node="">The second framework explicitly involved EJ. When looking at EJ from the perspective of potential UGBS users or urban residents in general, we follow the approaches introduced by </span><a class="workspace-trigger" data-dcnode-id="7391" href="#bb0375" name="bbb0375"><span data-dcnode-id="7392" instrument_node="">Schlosberg (2003)</span></a><span data-dcnode-id="7390" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7388" href="#bb0440" name="bbb0440"><span data-dcnode-id="7389" instrument_node="">Walker (2012)</span></a><span data-dcnode-id="7387" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="7385" href="#bb0300" name="bbb0300"><span data-dcnode-id="7386" instrument_node="">Low (2013)</span></a><span data-dcnode-id="7384" instrument_node="">, which we combine into three distinct EJ dimensions: distributive/distributional, procedural/participatory and interactional/recognition.</span></p></section><section data-dcnode-id="7285" id="s0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7376" id="st0030"><span data-dcnode-id="7381" instrument_node="">3</span><span data-dcnode-id="7379" instrument_node="">. </span><span data-dcnode-id="7377" instrument_node="">Environmental justice in postsocialist countries – general insights from the literature</span></h2><p data-dcnode-id="7359" id="p0240"><span data-dcnode-id="7375" instrument_node="">There are clear differences in the prominence of EJ in different postsocialist countries. In Germany, in the east as much as in the west, EJ has become an important topic and part of the national-scale debate driven by scientific deliberation (</span><a class="workspace-trigger" data-dcnode-id="7373" href="#bb0200" name="bbb0200"><span data-dcnode-id="7374" instrument_node="">Kabisch &amp; Haase, 2014</span></a><span data-dcnode-id="7372" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7370" href="#bb0210" name="bbb0210"><span data-dcnode-id="7371" instrument_node="">Kindler, Klimeczek, &amp; Franck, 2018</span></a><span data-dcnode-id="7369" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7367" href="#bb0320" name="bbb0320"><span data-dcnode-id="7368" instrument_node="">Maschewsky, 2004</span></a><span data-dcnode-id="7366" instrument_node="">) and the government's strategic policy formulations (</span><a class="workspace-trigger" data-dcnode-id="7364" href="#bb0045" name="bbb0045"><span data-dcnode-id="7365" instrument_node="">BMUB, 2017</span></a><span data-dcnode-id="7363" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7361" href="#bb0425" name="bbb0425"><span data-dcnode-id="7362" instrument_node="">UBA, 2016</span></a><span data-dcnode-id="7360" instrument_node="">). Interestingly, the urban context is one of the two key EJ topics in Germany, along with areas that are subject to the location of controversial investments, such as wind energy and power distribution lines. Still, justice issues are not necessarily addressed in terms of segregation or unequal housing conditions, and the EJ debate is not embedded in power or political contexts.</span></p><p data-dcnode-id="7312" id="p0245"><span data-dcnode-id="7358" instrument_node="">Meanwhile, in other postsocialist countries, EJ is barely addressed or known outside narrow academic circles and environmental NGOs, although clearly, as in other parts of the world, some environmental conflicts in postsocialist countries have been discussed through the lens of EJ (</span><a class="workspace-trigger" data-dcnode-id="7356" href="#bb0005" name="bbb0005"><span data-dcnode-id="7357" instrument_node="">Agyeman &amp; Ogneva-Himmelberger, 2009</span></a><span data-dcnode-id="7355" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7353" href="#bb0095" name="bbb0095"><span data-dcnode-id="7354" instrument_node="">Dushkova, Krasovskaya, &amp; Evseev, 2017</span></a><span data-dcnode-id="7352" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7350" href="#bb0110" name="bbb0110"><span data-dcnode-id="7351" instrument_node="">Filčák &amp; Steger, 2014</span></a><span data-dcnode-id="7349" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7347" href="#bb0115" name="bbb0115"><span data-dcnode-id="7348" instrument_node="">Filčák, Szilvasi, &amp; Škobla, 2018</span></a><span data-dcnode-id="7346" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7344" href="#bb0165" name="bbb0165"><span data-dcnode-id="7345" instrument_node="">Harper, Steger, &amp; Filčák, 2009</span></a><span data-dcnode-id="7343" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7341" href="#bb0370" name="bbb0370"><span data-dcnode-id="7342" instrument_node="">Sabadash, 2013</span></a><span data-dcnode-id="7340" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7338" href="#bb0400" name="bbb0400"><span data-dcnode-id="7339" instrument_node="">Špirić, 2018</span></a><span data-dcnode-id="7337" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7335" href="#bb0405" name="bbb0405"><span data-dcnode-id="7336" instrument_node="">Steger, 2007</span></a><span data-dcnode-id="7334" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7332" href="#bb0430" name="bbb0430"><span data-dcnode-id="7333" instrument_node="">Velicu, 2019</span></a><span data-dcnode-id="7331" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7329" href="#bb0435" name="bbb0435"><span data-dcnode-id="7330" instrument_node="">Velicu &amp; Kaika, 2017</span></a><span data-dcnode-id="7328" instrument_node="">). In a similar vein, occasional studies focused on socio-environmental vulnerability and the exposure of minorities to environmental bads, either based on ethnic background (</span><a class="workspace-trigger" data-dcnode-id="7326" href="#bb0115" name="bbb0115"><span data-dcnode-id="7327" instrument_node="">Filčák et al., 2018</span></a><span data-dcnode-id="7325" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7323" href="#bb0110" name="bbb0110"><span data-dcnode-id="7324" instrument_node="">Filčák &amp; Steger, 2014</span></a><span data-dcnode-id="7322" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7320" href="#bb0405" name="bbb0405"><span data-dcnode-id="7321" instrument_node="">Steger, 2007</span></a><span data-dcnode-id="7319" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7317" href="#bb0410" name="bbb0410"><span data-dcnode-id="7318" instrument_node="">Steger &amp; Filčák, 2008</span></a><span data-dcnode-id="7316" instrument_node="">) or age and economic status (</span><a class="workspace-trigger" data-dcnode-id="7314" href="#bb0420" name="bbb0420"><span data-dcnode-id="7315" instrument_node="">Szewrański, Świąder, Kazak, Tokarczyk-Dorociak, &amp; van Hoof, 2018</span></a><span data-dcnode-id="7313" instrument_node="">).</span></p><p data-dcnode-id="7298" id="p0250"><span data-dcnode-id="7311" instrument_node="">Other publications that refer to EJ in postsocialist countries are fairly general and explain the origins of the concept or the linkages between the concepts of EJ and sustainable development (e.g., </span><a class="workspace-trigger" data-dcnode-id="7309" href="#bb0250" name="bbb0250"><span data-dcnode-id="7310" instrument_node="">Krajewski, 2012</span></a><span data-dcnode-id="7308" instrument_node="">) – these discussions are typically carried out by lawyers and philosophers. Interestingly, this discussion is quite often isolated from broader theoretical debates, for example, there are no references to international sources, and there is a lack of translations of the most relevant international publications on this topic. As a result, the term EJ sometimes appears in publications that argue – again in quite general terms – for the need to raise environmental consciousness and lower environmental impacts (</span><a class="workspace-trigger" data-dcnode-id="7306" href="#bb0050" name="bbb0050"><span data-dcnode-id="7307" instrument_node="">Bojar-Fiałkowski, 2016</span></a><span data-dcnode-id="7305" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7303" href="#bb0385" name="bbb0385"><span data-dcnode-id="7304" instrument_node="">Sidorenko, Abroskina, &amp; Sidorenko, 2012</span></a><span data-dcnode-id="7302" instrument_node="">). When specific EJ case studies are discussed in publications originating from postsocialist countries, the cases tend to be from abroad, especially from the USA, as if these issues were not relevant to the postsocialist context (</span><a class="workspace-trigger" data-dcnode-id="7300" href="#bb0160" name="bbb0160"><span data-dcnode-id="7301" instrument_node="">Hardashuk, 2005</span></a><span data-dcnode-id="7299" instrument_node="">).</span></p><p data-dcnode-id="7293" id="p0255"><span data-dcnode-id="7297" instrument_node="">Civil society is relatively the most active actor in the scene, and many international and local NGOs have embraced the theoretical and practical notions of environmental and social justice. NGOs and other community groups often write official letters of complaint and petitions. They boycott products of selected companies, organize protests and demonstrations, and also carry out research, as in the case of Védegyelet, which has played a crucial role in Hungarian EJ research. However, quite often, even when NGOs and political movements/parties, such as the Greens, refer to the issues of EJ in postsocialist countries, again, they usually only repeat general information from Western pamphlets (e.g., </span><a class="workspace-trigger" data-dcnode-id="7295" href="#bb0305" name="bbb0305"><span data-dcnode-id="7296" instrument_node="">Maciejewska &amp; Szwed, 2010</span></a><span data-dcnode-id="7294" instrument_node="">).</span></p><p data-dcnode-id="7288" id="p0260"><span data-dcnode-id="7292" instrument_node="">The topic of EJ is not necessarily associated with political movements that represent the left. In Romania, both the NGOs and right-wing parties have a common enemy in the public local and national administration, which is dominated by a left-wing party. Hence, rather unusually, the political right advocates for the consideration of EJ, while the political left basically ignores the topic. Paradoxically, gentrification is very often discussed positively in postsocialist countries (especially by local authorities) with the focus on making cities more attractive, and thus attracting wealthier residents. The negative effects of gentrification are usually downplayed as being outweighed by the economic benefits for the city in general (</span><a class="workspace-trigger" data-dcnode-id="7290" href="#bb0125" name="bbb0125"><span data-dcnode-id="7291" instrument_node="">Golubchikov &amp; Badyina, 2006</span></a><span data-dcnode-id="7289" instrument_node="">). Interestingly, even in Germany, city authorities and planners usually deny the effects of eco-gentrification.</span></p><p data-dcnode-id="7286" id="p0265"><span data-dcnode-id="7287" instrument_node="">In general, EJ is rarely invoked in public debates regarding environmental conflicts, even when it concerns redistribution issues related to transportation, energy taxes, the elimination of individual coal-fired heating in city centers, air and water pollution, waste management and disposal, the regime of protected species (especially large carnivores), and the like. Of course, it is sometimes mentioned that without proper redistribution mechanisms, the poor will most likely suffer the consequences, but the term EJ does not appear in these discussions. In this way, policymaking seems to be removed from the broader declarations. After all, postsocialist countries have been part of international conventions regarding sustainable development, and many have developed national strategies to reach the United Nations' Sustainable Development Goals, including those regarding social equity, minimizing economic inequalities between regions and countries, and environmental protection. Similarly, national legal systems, including national constitutions, do recognize that access to a safe environment is a basic human right. Still, if they cover it at all, local urban development strategies usually only include the theoretical basis of problems without offering solutions suitable for the local conditions.</span></p></section><section data-dcnode-id="6958" id="s0020"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7279" id="st0035"><span data-dcnode-id="7284" instrument_node="">4</span><span data-dcnode-id="7282" instrument_node="">. </span><span data-dcnode-id="7280" instrument_node="">Environmental justice in the context of urban green and blue space availability, accessibility, and attractiveness</span></h2><section data-dcnode-id="7150" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7273" id="st0040"><span data-dcnode-id="7278" instrument_node="">4.1</span><span data-dcnode-id="7276" instrument_node="">. </span><span data-dcnode-id="7274" instrument_node="">Availability</span></h3><p data-dcnode-id="7256" id="p0270"><span data-dcnode-id="7272" instrument_node="">Availability is the simplest indicator of whether people have access to UGBS, i.e., whether these spaces exist close to where people live. European comparisons indicate that UGBS availability in postsocialist countries (Central and Eastern Europe) is relatively good (</span><a class="workspace-trigger" data-dcnode-id="7270" href="#bb0205" name="bbb0205"><span data-dcnode-id="7271" instrument_node="">Kabisch, Strohbach, Haase, &amp; Kronenberg, 2016</span></a><span data-dcnode-id="7269" instrument_node="">), which has also been confirmed by smaller-scale assessments (</span><a class="workspace-trigger" data-dcnode-id="7267" href="#bb0075" name="bbb0075"><span data-dcnode-id="7268" instrument_node="">De Sousa Silva, Viegas, Panagopoulos, &amp; Bell, 2018</span></a><span data-dcnode-id="7266" instrument_node="">). Still, we may observe that UGBS availability differs among inhabitants in a way that high socioeconomic status groups have better UGBS availability than others, which can be interpreted as environmental injustice. For example, </span><a class="workspace-trigger" data-dcnode-id="7264" href="#bb0295" name="bbb0295"><span data-dcnode-id="7265" instrument_node="">Łaszkiewicz, Kronenberg, and Marcińczak (2018)</span></a><span data-dcnode-id="7263" instrument_node=""> investigated the ability to develop place attachment thanks to UGBS by the different socioeconomic groups of inhabitants in the Polish city of Lodz. It turned out that inhabitants with lower socioeconomic status have fewer opportunities to develop place attachment via the use of UGBS. (</span><a class="workspace-trigger" data-dcnode-id="7261" href="#bb1455" name="bbb1455"><span data-dcnode-id="7262" instrument_node="">Łaszkiewicz &amp; Sikorska, 2020</span></a><span data-dcnode-id="7260" instrument_node="">) studied green space availability along children's home–school routes in Lodz. Meanwhile, </span><a class="workspace-trigger" data-dcnode-id="7258" href="#bb0200" name="bbb0200"><span data-dcnode-id="7259" instrument_node="">Kabisch and Haase (2014)</span></a><span data-dcnode-id="7257" instrument_node=""> indicated several studies on the availability of green spaces to different social groups carried out in eastern German cities.</span></p><p data-dcnode-id="7249" id="p0275"><a class="workspace-trigger" data-dcnode-id="7254" href="#bb0290" name="bbb0290"><span data-dcnode-id="7255" instrument_node="">Łaszkiewicz, Czembrowski, and Kronenberg (2019)</span></a><span data-dcnode-id="7253" instrument_node=""> investigated these issues further with the use of hedonic pricing, a non-market valuation method that indicates the monetary value of UGBS based on real estate prices. They found that not all parks and forests in Lodz act as desired amenities from the perspective of real estate buyers, but also that preferences for these UGBS differ among price sub-segments in the real estate market. Most notably, amenity parks are increasingly desired by subsequent price segments, which the authors interpreted as a sign of apartment buyers appreciating the luxury of having those parks in the neighborhood, which is clearly an amenity that not all socioeconomic groups can afford. This is what can explain small-scale segregation occurring specifically around such amenity parks (</span><a class="workspace-trigger" data-dcnode-id="7251" href="#bb1454" name="bbb1454"><span data-dcnode-id="7252" instrument_node="">Łaszkiewicz, Kronenberg, &amp; Marcińczak, 2020b</span></a><span data-dcnode-id="7250" instrument_node="">).</span></p><p data-dcnode-id="7232" id="p0280"><span data-dcnode-id="7248" instrument_node="">Further studies illustrate the social segregation context of urban greening in postsocialist cities, such as gated communities and the elites occupying areas in the Green Belt of Moscow (</span><a class="workspace-trigger" data-dcnode-id="7246" href="#bb0040" name="bbb0040"><span data-dcnode-id="7247" instrument_node="">Blinnikov, Shanin, Sobolev, &amp; Volkova, 2006</span></a><span data-dcnode-id="7245" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7243" href="#bb0085" name="bbb0085"><span data-dcnode-id="7244" instrument_node="">Dushkova, Ignatieva, &amp; Melnichuk, 2020</span></a><span data-dcnode-id="7242" instrument_node="">). Indeed, the development of gated communities in postsocialist cities has been primarily associated with environmental issues and green spaces in particular, rather than the alleged security, which was their driving factor in many other regions (</span><a class="workspace-trigger" data-dcnode-id="7240" href="#bb0245" name="bbb0245"><span data-dcnode-id="7241" instrument_node="">Kovács &amp; Hegedűs, 2014</span></a><span data-dcnode-id="7239" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7237" href="#bb0285" name="bbb0285"><span data-dcnode-id="7238" instrument_node="">Krupickaitė, Pociūtė, &amp; Peciukonytė, 2014</span></a><span data-dcnode-id="7236" instrument_node="">). A similar pattern can be observed in the case of the better-off moving towards the outskirts of cities to benefit from better UGBS availability (</span><a class="workspace-trigger" data-dcnode-id="7234" href="#bb0230" name="bbb0230"><span data-dcnode-id="7235" instrument_node="">Koprowska, Łaszkiewicz, &amp; Kronenberg, 2020</span></a><span data-dcnode-id="7233" instrument_node="">).</span></p><p data-dcnode-id="7224" id="p0285"><span data-dcnode-id="7231" instrument_node="">Even in places where local authorities seem to be aware of the differences in the availability of UGBS for different social groups, and where upgrading and greening for the better-off is denied, such as in large cities in eastern Germany, it still happens due to increased competition for urban space and land use (</span><a class="workspace-trigger" data-dcnode-id="7229" href="#bb0010" name="bbb0010"><span data-dcnode-id="7230" instrument_node="">Ali, 2017</span></a><span data-dcnode-id="7228" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7226" href="#bb0140" name="bbb0140"><span data-dcnode-id="7227" instrument_node="">Haase, 2019</span></a><span data-dcnode-id="7225" instrument_node="">). In Berlin, there are examples of so-called green gentrification, including the privatization of whole streets with the adjacent UGBS and playgrounds. At the same time, there are local initiatives which provide opportunities for the improvement of neighborhoods in a more inclusive way, with examples such as neighborhood management systems in Berlin or the Freiimfelde network in Halle, both of which deliberately avoid ‘luxury greening’ when improving the environmental quality of neglected neighborhoods and strongly count on co-creation and co-management.</span></p><p data-dcnode-id="7195" id="p0290"><span data-dcnode-id="7223" instrument_node="">There have been other studies that addressed the issue of ensuring UGBS availability to all inhabitants in simpler terms – without addressing the EJ context (</span><a class="workspace-trigger" data-dcnode-id="7221" href="#bb0055" name="bbb0055"><span data-dcnode-id="7222" instrument_node="">Borowska-Stefańska &amp; Wiśniewski, 2017</span></a><span data-dcnode-id="7220" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7218" href="#bb0240" name="bbb0240"><span data-dcnode-id="7219" instrument_node="">Korwel-Lejkowska &amp; Topa, 2017</span></a><span data-dcnode-id="7217" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7215" href="#bb0365" name="bbb0365"><span data-dcnode-id="7216" instrument_node="">Połom, Beger, &amp; Topa, 2017</span></a><span data-dcnode-id="7214" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7212" href="#bb1451" name="bbb1451"><span data-dcnode-id="7213" instrument_node="">Biernacka, Kronenberg, &amp; Łaszkiewicz, 2020</span></a><span data-dcnode-id="7211" instrument_node="">). The approach adopted in such studies is sometimes also reflected in planning documents that attempt to ensure UGBS availability for most inhabitants. A qualitative document analysis carried out by </span><a class="workspace-trigger" data-dcnode-id="7209" href="#bb0340" name="bbb0340"><span data-dcnode-id="7210" instrument_node="">Niță, Anghel, et al. (2018)</span></a><span data-dcnode-id="7208" instrument_node=""> indicated that the majority of urban strategies in Romania take into account UGBS. However, their objectives are only related to protecting existing UGBS and, at most, increasing the green surface in cities. They rarely provide quantitative indicators, targets, or explicit actions aimed at achieving those objectives in terms of UGBS availability for urban inhabitants. Still, indicators prescribing the amount of public green space per capita or minimum UGBS size for different types of urban settlements do exist in some postsocialist countries, both at the national and local levels (e.g., </span><a class="workspace-trigger" data-dcnode-id="7206" href="#bb0335" name="bbb0335"><span data-dcnode-id="7207" instrument_node="">MPU, 2018</span></a><span data-dcnode-id="7205" instrument_node="">), but often only on paper. Interestingly, many of them were already in place in the socialist period, but at the beginning of the transition, most were either formally repealed or ignored (</span><a class="workspace-trigger" data-dcnode-id="7203" href="#bb0025" name="bbb0025"><span data-dcnode-id="7204" instrument_node="">Badiu, Onose, Niță, &amp; Lafortezza, 2019</span></a><span data-dcnode-id="7202" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7200" href="#bb0080" name="bbb0080"><span data-dcnode-id="7201" instrument_node="">Dushkova, Haase, &amp; Haase, 2016</span></a><span data-dcnode-id="7199" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7197" href="#bb0275" name="bbb0275"><span data-dcnode-id="7198" instrument_node="">Kronenberg, Krauze, &amp; Wagner, 2017</span></a><span data-dcnode-id="7196" instrument_node="">).</span></p><p data-dcnode-id="7151" id="p0295"><span data-dcnode-id="7194" instrument_node="">The reasons for the limited availability of UGBS have also been studied in postsocialist countries (</span><a class="workspace-trigger" data-dcnode-id="7192" href="#bb0260" name="bbb0260"><span data-dcnode-id="7193" instrument_node="">Kronenberg, 2015</span></a><span data-dcnode-id="7191" instrument_node="">), and the most prominent one is development pressure. UGBS, especially informal ones, are often treated as reserve land in cities (</span><a class="workspace-trigger" data-dcnode-id="7189" href="#bb0390" name="bbb0390"><span data-dcnode-id="7190" instrument_node="">Sikorska, Łaszkiewicz, Krauze, &amp; Sikorski, 2020</span></a><span data-dcnode-id="7188" instrument_node="">). Indeed, many UGBS in postsocialist cities were lost due to so-called construction terrorism – the aggressive building-up of land, based on exploiting the neoliberal economic system, poor legal protection, and the abuse of numerous legal loopholes (</span><a class="workspace-trigger" data-dcnode-id="7186" href="#bb0080" name="bbb0080"><span data-dcnode-id="7187" instrument_node="">Dushkova et al., 2016</span></a><span data-dcnode-id="7185" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7183" href="#bb0170" name="bbb0170"><span data-dcnode-id="7184" instrument_node="">Hirt, 2012</span></a><span data-dcnode-id="7182" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7180" href="#bb0350" name="bbb0350"><span data-dcnode-id="7181" instrument_node="">Onose, Iojă, Niță, Badiu, &amp; Hossu, 2020</span></a><span data-dcnode-id="7179" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7177" href="#bb0450" name="bbb0450"><span data-dcnode-id="7178" instrument_node="">Zupan &amp; Büdenbender, 2019</span></a><span data-dcnode-id="7176" instrument_node="">). For example, in Sofia (Bulgaria), about one-third of the green spaces were lost in the first 15&nbsp;years of the postsocialist transformation (</span><a class="workspace-trigger" data-dcnode-id="7174" href="#bb0170" name="bbb0170"><span data-dcnode-id="7175" instrument_node="">Hirt, 2012</span></a><span data-dcnode-id="7173" instrument_node="">). Such a building-up of land often leads to social conflicts and public outrage (</span><a class="workspace-trigger" data-dcnode-id="7171" href="#bb0080" name="bbb0080"><span data-dcnode-id="7172" instrument_node="">Dushkova et al., 2016</span></a><span data-dcnode-id="7170" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7168" href="#bb0350" name="bbb0350"><span data-dcnode-id="7169" instrument_node="">Onose et al., 2020</span></a><span data-dcnode-id="7167" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7165" href="#bb0450" name="bbb0450"><span data-dcnode-id="7166" instrument_node="">Zupan &amp; Büdenbender, 2019</span></a><span data-dcnode-id="7164" instrument_node="">). Some UGBS categories, such as allotment gardens, are under pressure because they are seen as relics of the socialist past. Moreover, as allotments are often used by underprivileged social groups, their interests are rarely voiced in public discussions (</span><a class="workspace-trigger" data-dcnode-id="7162" href="#bb0035" name="bbb0035"><span data-dcnode-id="7163" instrument_node="">Biernacka &amp; Kronenberg, 2019</span></a><span data-dcnode-id="7161" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7159" href="#bb0150" name="bbb0150"><span data-dcnode-id="7160" instrument_node="">Haase, Dushkova, Haase, &amp; Kronenberg, 2019</span></a><span data-dcnode-id="7158" instrument_node="">). However, it should be noted that even the existence of flagship and cherished UGBS may be threatened by neoliberal models of governance (</span><a class="workspace-trigger" data-dcnode-id="7156" href="#bb0450" name="bbb0450"><span data-dcnode-id="7157" instrument_node="">Zupan &amp; Büdenbender, 2019</span></a><span data-dcnode-id="7155" instrument_node="">). These challenges are related to broader power issues and whoever's interests are prioritized. One example where these issues are particularly relevant in postsocialist countries is the restitution of privately-owned land nationalized during the socialist period (see </span><a class="workspace-trigger" data-dcnode-id="7153" href="#s0050" name="bs0050"><span data-dcnode-id="7154" instrument_node="">Subsection 5.2</span></a><span data-dcnode-id="7152" instrument_node=""> on procedural/participatory justice).</span></p></section><section data-dcnode-id="6994" id="s0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7144" id="st0045"><span data-dcnode-id="7149" instrument_node="">4.2</span><span data-dcnode-id="7147" instrument_node="">. </span><span data-dcnode-id="7145" instrument_node="">Accessibility</span></h3><p data-dcnode-id="7142" id="p0300"><span data-dcnode-id="7143" instrument_node="">Accessibility refers to whether people can freely reach and enter UGBS, considering both physical and psychological barriers. This is the least addressed issue in postsocialist cities.</span></p><p data-dcnode-id="7137" id="p0305"><span data-dcnode-id="7141" instrument_node="">There is one exception which focused on EJ in the context of a historical and literary analysis of parks in the past – analyzing how the public accessibility of Ogród Saski (Saxon Garden), a well-known park in the center of Warsaw (Poland), has changed since the 17th century, when it was established (</span><a class="workspace-trigger" data-dcnode-id="7139" href="#bb0255" name="bbb0255"><span data-dcnode-id="7140" instrument_node="">Kronenberg, 2019</span></a><span data-dcnode-id="7138" instrument_node="">). This is a story of how different social groups were discriminated against, and how the changing elites kept the park for themselves with the use of various measures – including guards, and rules regarding access and expected behavior.</span></p><div data-dcnode-id="7034"><p data-dcnode-id="7129" id="p0310"><span data-dcnode-id="7136" instrument_node="">One of the most visible examples of barriers preventing access to UGBS in postsocialist cities are newly-developed and fenced residential or corporate buildings. Again, this links to construction terrorism – not necessarily within UGBS, but mostly on their border (see an example from Lodz in </span><a class="workspace-trigger" data-dcnode-id="7134" href="#t0005" name="bt0005"><span data-dcnode-id="7135" instrument_node="">Table 1</span></a><span data-dcnode-id="7133" instrument_node="">). This is related to ongoing gentrification, but also the privatization and commodification of UGBS, partly by new developments (real estate) and partly by new uses (cafes and events) (</span><a class="workspace-trigger" data-dcnode-id="7131" href="#bb0450" name="bbb0450"><span data-dcnode-id="7132" instrument_node="">Zupan &amp; Büdenbender, 2019</span></a><span data-dcnode-id="7130" instrument_node="">).</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="7035" id="t0005"><span class="captions" data-dcnode-id="7121"><span data-dcnode-id="7122" id="ca0010"><p data-dcnode-id="7123" id="sp0010"><span class="label" data-dcnode-id="7127"><span data-dcnode-id="7128" instrument_node="">Table 1</span></span><span data-dcnode-id="7126" instrument_node="">. </span><span data-dcnode-id="7124" instrument_node="">Case studies illustrating environmental justice issues emerging in postsocialist cities regarding different dimensions of UGBS provision (see the Electronic Supplementary Material for further information on these case studies).</span></p></span></span><div class="groups" data-dcnode-id="7036"><table data-dcnode-id="7037"><thead data-dcnode-id="7111"><tr class="rowsep-1 valign-top" data-dcnode-id="7112"><th data-dcnode-id="7119" scope="col"><span data-dcnode-id="7120" instrument_node="">Case study, country, city</span></th><th data-dcnode-id="7117" scope="col"><span data-dcnode-id="7118" instrument_node="">The relevant justice dimension</span></th><th data-dcnode-id="7115" scope="col"><span data-dcnode-id="7116" instrument_node="">The relevant aspect of UGBS provision</span></th><th data-dcnode-id="7113" scope="col"><span data-dcnode-id="7114" instrument_node="">Brief description</span></th></tr></thead><tbody data-dcnode-id="7038"><tr data-dcnode-id="7102"><td data-dcnode-id="7109"><span data-dcnode-id="7110" instrument_node="">Solaris Park in Lodz, Poland (dominance of private interests, the dominance of the interests of elites)</span></td><td data-dcnode-id="7107"><span data-dcnode-id="7108" instrument_node="">Distributive, recognition</span></td><td data-dcnode-id="7105"><span data-dcnode-id="7106" instrument_node="">Availability, accessibility, attractiveness</span></td><td data-dcnode-id="7103"><span data-dcnode-id="7104" instrument_node="">The most luxurious residential building in Lodz dwarfs Sienkiewicz Park in the city center, and its construction directly affected the park. Only a few can afford to live that close to a park in the city center. Currently, the park is being renovated as part of the city's urban revival program. The building's inhabitants protested against extending the playground in the direction of their building and sued the City Office, demanding compensation for the lost value of their apartments due to the expected noise from the playground.</span></td></tr><tr data-dcnode-id="7093"><td data-dcnode-id="7100"><span data-dcnode-id="7101" instrument_node="">Luník IX district in Košice, Slovakia (social segregation)</span></td><td data-dcnode-id="7098"><span data-dcnode-id="7099" instrument_node="">Distributive, procedural, recognition</span></td><td data-dcnode-id="7096"><span data-dcnode-id="7097" instrument_node="">Availability, attractiveness</span></td><td data-dcnode-id="7094"><span data-dcnode-id="7095" instrument_node="">Luník IX is the biggest urban space in Slovakia; it is an ‘urban ghetto,’ occupied overwhelmingly by the Roma ethnic minority. Although the district is surrounded by a forest, it is affected by the proximity of a landfill. Although Luník IX was not officially or originally designed as a ghetto, there were structural, social, and environmental factors that led to its development. Once the space became inhabited predominantly by Roma, it became a place (in the eyes of the majority, i.e., decision-makers) unsuitable for green investment, as seen in other parts of the city.</span></td></tr><tr data-dcnode-id="7084"><td data-dcnode-id="7091"><span data-dcnode-id="7092" instrument_node="">Lene-Voigt-Park and Parkbogen East, Leipzig, Germany (eco-gentrification)</span></td><td data-dcnode-id="7089"><span data-dcnode-id="7090" instrument_node="">Distributive, recognition</span></td><td data-dcnode-id="7087"><span data-dcnode-id="7088" instrument_node="">Accessibility, attractiveness</span></td><td data-dcnode-id="7085"><span data-dcnode-id="7086" instrument_node="">A former railway brownfield to the east of the city center, it opened to the public in 2004. It serves as an example of increasing social-spatial segregation to which greening – unintendedly – contributes. The main aim of the park was to offer more green space for dense and poor housing. The park became popular and led to the opening of cafés and local shops. Now, the park is the heart of an increasingly expensive housing area with young and educated residents pushing the former inhabitants out of the area due to rising housing costs.</span></td></tr><tr data-dcnode-id="7075"><td data-dcnode-id="7082"><span data-dcnode-id="7083" instrument_node="">Kamyennaya Horka in Minsk, Belarus (new district devoid of green spaces)</span></td><td data-dcnode-id="7080"><span data-dcnode-id="7081" instrument_node="">Distributive, recognition</span></td><td data-dcnode-id="7078"><span data-dcnode-id="7079" instrument_node="">Availability</span></td><td data-dcnode-id="7076"><span data-dcnode-id="7077" instrument_node="">Under construction since 2008, this district has one of the highest population densities (with 120,000 residents) and one of the lowest amounts of green space in the city. The creation of new parks in Minsk is totally dependent on the initiative of private investors, as there is no money for this in the city budget. It comes as no surprise, then, that no green spaces have been created in this district: a large portion of its housing stock is social housing inhabited by low-income families and/or those with many children.</span></td></tr><tr data-dcnode-id="7066"><td data-dcnode-id="7073"><span data-dcnode-id="7074" instrument_node="">Criminalizing homelessness, Hungary (excluding a social group from access to UGBS)</span></td><td data-dcnode-id="7071"><span data-dcnode-id="7072" instrument_node="">Procedural, recognition</span></td><td data-dcnode-id="7069"><span data-dcnode-id="7070" instrument_node="">Accessibility</span></td><td data-dcnode-id="7067"><span data-dcnode-id="7068" instrument_node="">In 2012, the government first attempted to criminalize homelessness, which was deemed unconstitutional by the Constitutional Court. After winning the next election, the Fidesz–KDNP governing parties overruled the decision of the Constitutional Court and put the unconstitutional resolutions into the Fundamental Law in 2018. Orbán's regime initiated a hate campaign against people experiencing homelessness. The new regulation stated that using a public space as a habitual dwelling shall be illegal. As a result, people experiencing homelessness had to adapt to the regulations, and they disappeared from frequented public spaces.</span></td></tr><tr data-dcnode-id="7057"><td data-dcnode-id="7064"><span data-dcnode-id="7065" instrument_node="">Restitution of Titan Park in Bucharest, Romania (restitution of private property)</span></td><td data-dcnode-id="7062"><span data-dcnode-id="7063" instrument_node="">Procedural, recognition</span></td><td data-dcnode-id="7060"><span data-dcnode-id="7061" instrument_node="">Availability, accessibility, attractiveness</span></td><td data-dcnode-id="7058"><span data-dcnode-id="7059" instrument_node="">Of the 790&nbsp;ha of parks in Bucharest, 53&nbsp;ha (6.7%) were still in restitution processes in 2018. In the case of Titan Park, 12&nbsp;ha of its area has been in litigation since 2006, and the new owners want to transform it into a shopping mall. The area in litigation is currently abandoned, not administrated by the city hall (a lack of legal right to intervene) nor by the private owner since the court decision is not final. Therefore, it represents a security risk, with problems such as waste and stray animals.</span></td></tr><tr data-dcnode-id="7048"><td data-dcnode-id="7055"><span data-dcnode-id="7056" instrument_node="">Park Znesinnia in Lviv, Ukraine (illegal construction in a park, regulatory failures)</span></td><td data-dcnode-id="7053"><span data-dcnode-id="7054" instrument_node="">Procedural, recognition</span></td><td data-dcnode-id="7051"><span data-dcnode-id="7052" instrument_node="">Availability, accessibility, attractiveness</span></td><td data-dcnode-id="7049"><span data-dcnode-id="7050" instrument_node="">Znesinnia is a 312&nbsp;ha regional landscape park that belongs to the UNESCO World Heritage site. 159&nbsp;ha of the Park also belongs to the Ukrainian national reserve fund. Despite this, since 2006, part of the park has been threatened with illegal construction. The case illustrates multiple regulatory failures, such as the local government issuing a land lease agreement, although it did not have the right to dispose of state land, and interrelated interests of political and business elites. It also illustrates multiple cases of abuse, such as building without the necessary permits and despite social protests.</span></td></tr><tr data-dcnode-id="7039"><td data-dcnode-id="7046"><span data-dcnode-id="7047" instrument_node="">Fencing green spaces in Russian cities (creating explicit barriers)</span></td><td data-dcnode-id="7044"><span data-dcnode-id="7045" instrument_node="">Procedural, recognition</span></td><td data-dcnode-id="7042"><span data-dcnode-id="7043" instrument_node="">Accessibility</span></td><td data-dcnode-id="7040"><span data-dcnode-id="7041" instrument_node="">As stated by city administrations, fences help to define and protect schools, kindergartens, and other categories of urban facilities. Fences can be found almost everywhere – in residential backyards (restricting the access of non-residents), in recreational zones, and along roads. Very often, fences block pedestrian pathways and turn the whole UGBS into a mosaic of fragmented, disconnected, and inaccessible spaces. There are examples of fences constructed in urban parks and gardens where visitors are directed to follow specially defined walking trails, which are also fenced to avoid vandalism and to protect particularly sensitive natural habitats.</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="7011" id="p0315"><span data-dcnode-id="7033" instrument_node="">The relevant conflicts are perhaps most prominent in Russia, with numerous cases of waterfront areas being illegally acquired by officials and the super-rich who privatize, build up, and put fences around land that is supposed to be a national reserve or areas for public use (see an example from Russia in </span><a class="workspace-trigger" data-dcnode-id="7031" href="#t0005" name="bt0005"><span data-dcnode-id="7032" instrument_node="">Table 1</span></a><span data-dcnode-id="7030" instrument_node="">). This has been investigated by, among others, the Russian Anti-corruption Foundation (</span><a data-dcnode-id="7028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fbk.info/voda/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7029" instrument_node="">https://fbk.info/voda/</span></a><span data-dcnode-id="7027" instrument_node="">) (cf. </span><a class="workspace-trigger" data-dcnode-id="7025" href="#bb0060" name="bbb0060"><span data-dcnode-id="7026" instrument_node="">Büdenbender &amp; Zupan, 2017</span></a><span data-dcnode-id="7024" instrument_node="">). The problem could partly be explained by the insufficient legal base. Punishment and penalties for illegal construction are too low to discourage powerful companies (</span><a class="workspace-trigger" data-dcnode-id="7022" href="#bb0060" name="bbb0060"><span data-dcnode-id="7023" instrument_node="">Büdenbender &amp; Zupan, 2017</span></a><span data-dcnode-id="7021" instrument_node="">). At the same time, in Moscow and St. Petersburg, new programs are being developed to open the riverbanks to the public. While this work is ongoing, it has put accessibility in the public debate (as revealed in these cities' official websites) (</span><a class="workspace-trigger" data-dcnode-id="7019" href="#bb0085" name="bbb0085"><span data-dcnode-id="7020" instrument_node="">Dushkova et al., 2020</span></a><span data-dcnode-id="7018" instrument_node="">). This further links to conflicts regarding the use of UGBS or trade-offs between satisfying the needs of their different users (</span><a class="workspace-trigger" data-dcnode-id="7016" href="#bb0035" name="bbb0035"><span data-dcnode-id="7017" instrument_node="">Biernacka &amp; Kronenberg, 2019</span></a><span data-dcnode-id="7015" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7013" href="#bb0195" name="bbb0195"><span data-dcnode-id="7014" instrument_node="">Iojă, Rozylowicz, Pătroescu, Niţă, &amp; Vânau, 2011</span></a><span data-dcnode-id="7012" instrument_node="">).</span></p><p data-dcnode-id="7006" id="p0320"><span data-dcnode-id="7010" instrument_node="">The only group which has recently attracted interest in postsocialist countries in this context is the disabled, and relevant references can be found even in Russian (</span><a class="workspace-trigger" data-dcnode-id="7008" href="#bb0445" name="bbb0445"><span data-dcnode-id="7009" instrument_node="">Yarskaya-Smirnova &amp; Yarskaya-Smirnova, 2018</span></a><span data-dcnode-id="7007" instrument_node="">). The disabled may be excluded from access for many reasons, including the poor quality of roads around and paths within UGBS. Furthermore, insufficient or a lack of public transport, along with the insufficient adaptation of transport infrastructure for people with special needs, may prevent access to UGBS. These issues have started to penetrate public discussions in postsocialist countries.</span></p><p data-dcnode-id="6995" id="p0325"><span data-dcnode-id="7005" instrument_node="">Finally, with regard to accessibility, but excluding the EJ context, several studies – in particular, those carried out in Romania – have considered social connectivity between UGBS, e.g., with the use of bicycle paths (</span><a class="workspace-trigger" data-dcnode-id="7003" href="#bb0345" name="bbb0345"><span data-dcnode-id="7004" instrument_node="">Niță, Badiu, et al., 2018</span></a><span data-dcnode-id="7002" instrument_node="">) or in the context of proper urban planning connecting residential areas and the interconnected system of UGBS (</span><a class="workspace-trigger" data-dcnode-id="7000" href="#bb1458" name="bbb1458"><span data-dcnode-id="7001" instrument_node="">Gavrilidis, Niță, Onose, Badiu, &amp; Năstase, 2019</span></a><span data-dcnode-id="6999" instrument_node="">). Another study focused on the connectivity of green spaces of reduced accessibility – school gardens – as part of broader urban green infrastructure (</span><a class="workspace-trigger" data-dcnode-id="6997" href="#bb0190" name="bbb0190"><span data-dcnode-id="6998" instrument_node="">Iojă, Grădinaru, Onose, Vânău, &amp; Tudor, 2014</span></a><span data-dcnode-id="6996" instrument_node="">).</span></p></section><section data-dcnode-id="6959" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6988" id="st0050"><span data-dcnode-id="6993" instrument_node="">4.3</span><span data-dcnode-id="6991" instrument_node="">. </span><span data-dcnode-id="6989" instrument_node="">Attractiveness</span></h3><p data-dcnode-id="6983" id="p0330"><span data-dcnode-id="6987" instrument_node="">Attractiveness refers to whether UGBS meet the expectations of their users, for example, regarding the available amenities and activities, landscape metrics, or biodiversity. This issue is frequently addressed in UGBS planning and management, including from the perspective of different groups of potential users, including potentially vulnerable groups, such as the disabled, children, and the elderly. Attractiveness is often mentioned as a desired feature of UGBS in different planning documents and strategies – cities intend to ensure the availability of high-quality UGBS to all inhabitants. In some cases, this is linked to urban marketing, especially with regard to elegant upgrades, as in the case of Moscow's rebranding strategy that featured an attempt to create “world-class parks to compete with cities like London, Paris or New York” (</span><a class="workspace-trigger" data-dcnode-id="6985" href="#bb0450" name="bbb0450"><span data-dcnode-id="6986" instrument_node="">Zupan &amp; Büdenbender, 2019, p. 130</span></a><span data-dcnode-id="6984" instrument_node="">).</span></p><p data-dcnode-id="6960" id="p0335"><span data-dcnode-id="6982" instrument_node="">There are multiple studies that focus on whether UGBS correspond with the needs of certain groups of users, such as children (</span><a class="workspace-trigger" data-dcnode-id="6980" href="#bb0355" name="bbb0355"><span data-dcnode-id="6981" instrument_node="">Onose et al., 2016</span></a><span data-dcnode-id="6979" instrument_node="">); some studies also deal with potential or emerging conflicts of uses or between user groups (</span><a class="workspace-trigger" data-dcnode-id="6977" href="#bb0035" name="bbb0035"><span data-dcnode-id="6978" instrument_node="">Biernacka &amp; Kronenberg, 2019</span></a><span data-dcnode-id="6976" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6974" href="#bb0200" name="bbb0200"><span data-dcnode-id="6975" instrument_node="">Kabisch &amp; Haase, 2014</span></a><span data-dcnode-id="6973" instrument_node="">). Different tools have been tested to assess the attractiveness of UGBS in postsocialist countries, including participatory GIS (</span><a class="workspace-trigger" data-dcnode-id="6971" href="#bb0360" name="bbb0360"><span data-dcnode-id="6972" instrument_node="">Pietrzyk-Kaszyńska, Czepkiewicz, &amp; Kronenberg, 2017</span></a><span data-dcnode-id="6970" instrument_node="">) and sociotope mapping (</span><a class="workspace-trigger" data-dcnode-id="6968" href="#bb1453" name="bbb1453"><span data-dcnode-id="6969" instrument_node="">Łaszkiewicz, Czembrowski, &amp; Kronenberg, 2020a</span></a><span data-dcnode-id="6967" instrument_node="">). However, there seem to be very few studies that discuss the inequalities in the availability of attractive UGBS in the spatial context (spatial distribution of inequalities for the whole population) and in the context of different socioeconomic groups. For example, </span><a class="workspace-trigger" data-dcnode-id="6965" href="#bb0200" name="bbb0200"><span data-dcnode-id="6966" instrument_node="">Kabisch and Haase (2014)</span></a><span data-dcnode-id="6964" instrument_node=""> showed for Berlin that the shape and type of vegetation of some UGBS more or less correspond with the wants and needs of different groups of users. Similarly, </span><a class="workspace-trigger" data-dcnode-id="6962" href="#bb0035" name="bbb0035"><span data-dcnode-id="6963" instrument_node="">Biernacka and Kronenberg (2019)</span></a><span data-dcnode-id="6961" instrument_node=""> investigated conflicting needs of different socioeconomic groups of users of a municipal forest in Lodz in the context of organizing loud entertainment events there.</span></p></section></section><section data-dcnode-id="6810" id="s0040"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6952" id="st0055"><span data-dcnode-id="6957" instrument_node="">5</span><span data-dcnode-id="6955" instrument_node="">. </span><span data-dcnode-id="6953" instrument_node="">Distributive, procedural, and interactional environmental justice</span></h2><section data-dcnode-id="6916" id="s0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6946" id="st0060"><span data-dcnode-id="6951" instrument_node="">5.1</span><span data-dcnode-id="6949" instrument_node="">. </span><span data-dcnode-id="6947" instrument_node="">Distributive/distributional justice</span></h3><p data-dcnode-id="6938" id="p0340"><span data-dcnode-id="6945" instrument_node="">Distributive justice refers to whether different population groups enjoy equal UGBS availability, accessibility, or attractiveness where they live. In the most general terms, the groups suffering from limited UGBS provision in postsocialist cities are similar to those identified in other countries (</span><a class="workspace-trigger" data-dcnode-id="6943" href="#bb0155" name="bbb0155"><span data-dcnode-id="6944" instrument_node="">Haase et al., 2017</span></a><span data-dcnode-id="6942" instrument_node="">). These groups include disabled people, migrants, ethnic minorities, and people with precarious educational, job, and housing situations. Although they may differ from country to country, income/economic position is a major driver of their potential exclusion from living close to UGBS (or pushing them away from more accessible and attractive UGBS). Indeed, even in the case of social housing, UGBS availability is typically very limited because of cost reductions (see an example from Minsk in </span><a class="workspace-trigger" data-dcnode-id="6940" href="#t0005" name="bt0005"><span data-dcnode-id="6941" instrument_node="">Table 1</span></a><span data-dcnode-id="6939" instrument_node="">).</span></p><p data-dcnode-id="6927" id="p0345"><span data-dcnode-id="6937" instrument_node="">The uneven distribution of UGBS seems to be an important precondition for potential distributive environmental injustice, and it may determine the marginalization of certain groups of inhabitants in terms of UGBS availability. In addition, other, usually case-specific factors may determine distributive injustice. They feature a combination of social mix (existing segregation patterns), the evolution of housing stock (its age and ownership structure), the historical background of the UGBS (e.g., some might have evolved together with neighboring prestigious locations, but others might have become neglected following the degradation of neighboring locations), etc. This is particularly well demonstrated by the difficult situation of the Roma community in those countries where they constitute a signifi
