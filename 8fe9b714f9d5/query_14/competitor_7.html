cant percentage of the population, Slovakia and Hungary, in particular (</span><a class="workspace-trigger" data-dcnode-id="6935" href="#bb0110" name="bbb0110"><span data-dcnode-id="6936" instrument_node="">Filčák &amp; Steger, 2014</span></a><span data-dcnode-id="6934" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6932" href="#bb0315" name="bbb0315"><span data-dcnode-id="6933" instrument_node="">Málovics, Creţan, Méreine-Berki, &amp; Tóth, 2019</span></a><span data-dcnode-id="6931" instrument_node="">). Similar to Western countries, refugees from non-EU countries are also exposed to additional discrimination with regard to environmental conditions (</span><a class="workspace-trigger" data-dcnode-id="6929" href="#bb0145" name="bbb0145"><span data-dcnode-id="6930" instrument_node="">Haase, Budnik, et al., 2019</span></a><span data-dcnode-id="6928" instrument_node="">).</span></p><p data-dcnode-id="6922" id="p0350"><span data-dcnode-id="6926" instrument_node="">As indicated above, the availability and accessibility of UGBS are often reduced by new construction, which is related to conflicts of interest between land users. This clearly shows that distributive justice is closely related to procedural/participatory justice. It is common to observe that different socioeconomic groups represent different visions of how land should be managed, especially whether UGBS should be created or eliminated. By observing whose visions are implemented in reality, we may conclude whose interests are given prominence. Most typically, it is the interests of the more powerful actors, especially when combined with the neoliberal urban management models, dominant in postsocialist cities. Such conflicts have different spatial scales – from local to national – and involve various groups, from small and rather homogenous communities, such as allotment gardeners or most prominent citizens, through larger business groups, such as developers, to the government or national-scale authorities and churches. Indeed, some of the megaprojects that translate to the reduced availability of UGBS are promoted by national governments, such as Project Liget – a new museum quarter which has destroyed the biggest and oldest park in Budapest (</span><a class="workspace-trigger" data-dcnode-id="6924" href="#bb0395" name="bbb0395"><span data-dcnode-id="6925" instrument_node="">Smith, Sziva, &amp; Olt, 2019</span></a><span data-dcnode-id="6923" instrument_node="">).</span></p><p data-dcnode-id="6917" id="p0355"><span data-dcnode-id="6921" instrument_node="">A recent study of environmental conflicts involving urban green areas in Bucharest indicated that parks in the city are mainly affected by conflicts related to the competition between land uses (land restitution, illegal construction, clearing, and other urban projects), which mostly affect distributive justice, but with links to the other two dimensions (</span><a class="workspace-trigger" data-dcnode-id="6919" href="#bb0350" name="bbb0350"><span data-dcnode-id="6920" instrument_node="">Onose et al., 2020</span></a><span data-dcnode-id="6918" instrument_node="">). In extreme situations, a whole park or another public UGBS may fall into private hands. One specific example is the Lower Park in Zalishchyky, Ukraine, the total size of which is 5&nbsp;ha, and part of which now belongs to a famous Ukrainian oligarch family. The decision to sell public land to an individual was taken in a non-transparent way, which again links to the issue of procedural/participatory justice. Similar concerns have been raised in the context of the abovementioned privatization of whole streets in eastern Germany.</span></p></section><section data-dcnode-id="6845" id="s0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6910" id="st0065"><span data-dcnode-id="6915" instrument_node="">5.2</span><span data-dcnode-id="6913" instrument_node="">. </span><span data-dcnode-id="6911" instrument_node="">Procedural/participatory justice</span></h3><p data-dcnode-id="6908" id="p0360"><span data-dcnode-id="6909" instrument_node="">Procedural/participatory justice refers to whether all relevant groups are included in decision-making processes. Most typically, in postsocialist cities, local policymakers and planners make decisions regarding UGBS, and these decisions are mostly made in a top-down manner. There is a large group of people whose voices are completely missing in any greening project/strategy, in particular, those of underprivileged groups. The marginalized groups mentioned in the previous subsection have fewer opportunities to introduce their views, ideas, and preferences in the same way the privileged can – including in the form of written opinion-making using online newspapers, blogs, and other fora. Society at large rarely demands the location of new UGBS. There are very few advocate groups and even fewer community groups that would argue for such issues (although the number of such groups is increasing).</span></p><p data-dcnode-id="6897" id="p0365"><span data-dcnode-id="6907" instrument_node="">Belarus provides an extreme case where the civil society has nothing to say about what is available in the public space. It is closely followed by Russia, while eastern Germany provides another extreme example, with increased focus on disadvantaged groups, including – most recently – migrants and refugees (e.g., through projects such as KoopLab, which focuses on improving social cohesion through cooperative UGBS development in neighborhoods inhabited by a heterogeneous population, including migrants and refugees; see </span><a data-dcnode-id="6905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kooplab.de/project/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6906" instrument_node="">https://www.kooplab.de/project/</span></a><span data-dcnode-id="6904" instrument_node="">). In those eastern German cities which are regrowing after a long period of shrinkage, there may be procedural injustice in cases where cooperative UGBS development was applied in a time of shrinkage to improve quality of life and make people stay, and which have now become more attractive. Displacement then becomes an issue – displacing those people from the green spaces for whom, and with the help of whom, they had once been developed (</span><a class="workspace-trigger" data-dcnode-id="6902" href="#bb0140" name="bbb0140"><span data-dcnode-id="6903" instrument_node="">Haase, 2019</span></a><span data-dcnode-id="6901" instrument_node="">) (see an example from Leipzig in </span><a class="workspace-trigger" data-dcnode-id="6899" href="#t0005" name="bt0005"><span data-dcnode-id="6900" instrument_node="">Table 1</span></a><span data-dcnode-id="6898" instrument_node="">).</span></p><p data-dcnode-id="6892" id="p0370"><span data-dcnode-id="6896" instrument_node="">Even in countries where public participation has become a legally binding part of most planning processes, there is a bias of whose interests and perceptions lead or guide the process of UGBS development and management. It usually involves well-educated people with middle or better income who know how to make their voices heard. Also, planners are sometimes aided by various groups of ‘cosmopolitan experts,’ including lobbyists, consultants, or scientists with expertise, and those who are able to invest or to buy (developers). Developers' influence is most often negative in that they invest in greenfields, which results in the loss of informal UGBS (</span><a class="workspace-trigger" data-dcnode-id="6894" href="#bb0390" name="bbb0390"><span data-dcnode-id="6895" instrument_node="">Sikorska, Łaszkiewicz, Krauze, &amp; Sikorski, 2020</span></a><span data-dcnode-id="6893" instrument_node="">). Sometimes, planners adopt ideas put forward by local environmental activists (if these ideas fit into their overall planning objectives and if they seem to fit the respective political marketing purposes). A very relevant example is the Green Polesie program in Lodz – where the planners accepted and implemented activists' ideas.</span></p><p data-dcnode-id="6878" id="p0375"><span data-dcnode-id="6891" instrument_node="">There are cases when public consultations were organized in a way that specifically favored one option, e.g., by organizing online voting concerning the replacement of allotment gardens with a public beach in Lodz, Poland (</span><a class="workspace-trigger" data-dcnode-id="6889" href="#bb0035" name="bbb0035"><span data-dcnode-id="6890" instrument_node="">Biernacka &amp; Kronenberg, 2019</span></a><span data-dcnode-id="6888" instrument_node="">). At the same time, the authorities of many postsocialist cities declare that they prioritize the interests of particularly vulnerable groups, such as the disabled, children, and the elderly. However, although such people are sometimes invited to participate in planning, most typically, their preferences are only interpreted by the planners and other ‘experts.’ New participatory processes are also being introduced in Russia, but so far, it has mostly been limited to the largest cities, such as Moscow and St. Petersburg. For example, the recent federal program, “Comfortable City Environment,” encourages citizens to express their opinion on the locations of new parks and other amenities (</span><a class="workspace-trigger" data-dcnode-id="6886" href="#bb0450" name="bbb0450"><span data-dcnode-id="6887" instrument_node="">Zupan &amp; Büdenbender, 2019</span></a><span data-dcnode-id="6885" instrument_node="">). However, even these new attempts have been criticized for misinformation and public opinion manipulation. Similar concerns have arisen regarding non-transparent decision making concerning environmental issues at different levels of government in many postsocialist countries, including Ukraine (see an example from Lviv in </span><a class="workspace-trigger" data-dcnode-id="6883" href="#t0005" name="bt0005"><span data-dcnode-id="6884" instrument_node="">Table 1</span></a><span data-dcnode-id="6882" instrument_node="">). When the opportunities to take part in planning are limited, and public interest is low, citizens usually do not even try to stay informed and often find themselves surprised by the implementation of some projects which have passed through official public consultations (see the example from Lodz in </span><a class="workspace-trigger" data-dcnode-id="6880" href="#t0005" name="bt0005"><span data-dcnode-id="6881" instrument_node="">Table 1</span></a><span data-dcnode-id="6879" instrument_node="">).</span></p><p data-dcnode-id="6867" id="p0380"><span data-dcnode-id="6877" instrument_node="">The injustices mentioned above may result from existing regulations, which do not enforce a more comprehensive approach to public participation. All of the above are also related to the postponed development of civil society, partly to other priorities of society (basic issues, such as jobs, permanent income, accommodation, and social security), and partly to the authoritarian approach to local planning and neglecting collaboration potential, especially with the civil society (</span><a class="workspace-trigger" data-dcnode-id="6875" href="#bb0260" name="bbb0260"><span data-dcnode-id="6876" instrument_node="">Kronenberg, 2015</span></a><span data-dcnode-id="6874" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6872" href="#bb0280" name="bbb0280"><span data-dcnode-id="6873" instrument_node="">Kronenberg, Pietrzyk-Kaszyńska, Zbieg, &amp; Żak, 2016</span></a><span data-dcnode-id="6871" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6869" href="#bb1456" name="bbb1456"><span data-dcnode-id="6870" instrument_node="">Mabelis &amp; Maksymiuk, 2009</span></a><span data-dcnode-id="6868" instrument_node="">). The regulations – or lack thereof – sometimes lead to paradoxical situations when dubious private interests are given priority over public interests, as is particularly evident in the case of the abovementioned restitution of land confiscated during the socialist period.</span></p><p data-dcnode-id="6862" id="p0385"><span data-dcnode-id="6866" instrument_node="">Restitution affected both small green areas and urban parks, even if legally there were alternatives to the restitution of UGBS. In some countries, such as the Czech Republic, Slovakia, and Romania, this issue has already been solved, and previous owners had a deadline to claim their property, which often resulted in losses in UGBS. Nevertheless, even in these countries, some restitutions are still being judged (see an example from Romania in </span><a class="workspace-trigger" data-dcnode-id="6864" href="#t0005" name="bt0005"><span data-dcnode-id="6865" instrument_node="">Table 1</span></a><span data-dcnode-id="6863" instrument_node="">). These conflicts illustrate clashing interests, power, and ownership, and they also indicate the conflicts between the rich (private owners or their supposed legal representatives, churches, etc.) and the ordinary – with examples of incredible abuse and fraud.</span></p><p data-dcnode-id="6854" id="p0390"><span data-dcnode-id="6861" instrument_node="">Perhaps one of the most extreme cases of environmental and social injustice emerged in Hungary in 2013, when the Orbán regime adopted an amendment to the Fundamental Law, making it possible for municipal councils to declare living in public areas illegal and punishable. Although this amendment was repealed by Hungary's Constitutional Court, in 2018, the National Assembly adopted another amendment to the Fundamental Law stating that “the habitation of public spaces is prohibited” (</span><a class="workspace-trigger" data-dcnode-id="6859" href="#bb0100" name="bbb0100"><span data-dcnode-id="6860" instrument_node="">Evangelista, 2019</span></a><span data-dcnode-id="6858" instrument_node="">) (see an example from Hungary in </span><a class="workspace-trigger" data-dcnode-id="6856" href="#t0005" name="bt0005"><span data-dcnode-id="6857" instrument_node="">Table 1</span></a><span data-dcnode-id="6855" instrument_node="">).</span></p><p data-dcnode-id="6846" id="p0395"><span data-dcnode-id="6853" instrument_node="">On the positive side, there has been an increasing number of civic initiatives indicating interest in enhancing UGBS provision that spans the whole spectrum of postsocialist cities. These ranged from protests against the removal of UGBS, through local initiatives creating community gardens or other informal UGBS, to local initiatives focused on maintaining UGBS. The latter include subbotniks (which take place on Saturdays in spring) and voskresniks (on Sundays), whereby local inhabitants take care of the courtyards/backyards and parks. This used to take place primarily during the socialist period, but it still thrives in some post-soviet countries (</span><a class="workspace-trigger" data-dcnode-id="6851" href="#bb0080" name="bbb0080"><span data-dcnode-id="6852" instrument_node="">Dushkova et al., 2016</span></a><span data-dcnode-id="6850" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6848" href="#bb0150" name="bbb0150"><span data-dcnode-id="6849" instrument_node="">Haase, Dushkova, et al., 2019</span></a><span data-dcnode-id="6847" instrument_node="">).</span></p></section><section data-dcnode-id="6811" id="s0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6839" id="st0070"><span data-dcnode-id="6844" instrument_node="">5.3</span><span data-dcnode-id="6842" instrument_node="">. </span><span data-dcnode-id="6840" instrument_node="">Interactional/recognition justice</span></h3><p data-dcnode-id="6837" id="p0400"><span data-dcnode-id="6838" instrument_node="">The terms interactional and recognition justice refer to recognizing the needs, values, and preferences of all stakeholders in a safe, fair, and non-discriminatory environment. We see the recognition of different behaviors, attitudes, perceptions, and values as a pre-condition for interactional justice, meaning that people representing those different behaviors, attitudes, perceptions, and values may use UGBS free of discrimination. Emerging conflicts are subject to negotiation and compromise, and they should not lead to exclusion. Hence interactional/recognition justice refers to issues ranging from the interactions between the different users within UGBS to whether the needs of the different users are considered in UGBS planning and management.</span></p><p data-dcnode-id="6835" id="p0405"><span data-dcnode-id="6836" instrument_node="">Even if a UGBS is available and accessible, it does not mean that it fulfills the needs of its users. However, when it comes to postsocialist cities, instead of accounting for a variety of needs, a more basic question arises regarding whether having UGBS in the vicinity matters for urban inhabitants. Interestingly, as already indicated above, in many cases, it seems that inhabitants do not care about whether they have access to UGBS or not (availability, not to mention accessibility). At least, this is not something that most people would indicate as a priority, which is often indicated by local decision-makers as one of the challenges to urban greening. Furthermore, for the most marginalized groups, proximity to UGBS plays a minor role compared to other urgent and basic needs, such as access to healthcare. Even among inhabitants characterized by high income, access to UGBS is not always a priority. For example, new residential developments are in high demand, regardless of whether they have UGBS close by. This vicious circle is partly related to deficiencies in public participation and a feeling that people's needs are not considered anyway (see the previous subsection), and partly as a result of a general apathy in postsocialist societies.</span></p><p data-dcnode-id="6830" id="p0410"><span data-dcnode-id="6834" instrument_node="">In general, one may have the impression that community needs are relatively well-considered when designing UGBS. There are special places for children (playgrounds), the elderly (chess tables), people with pets, and people wanting to practice sports. However, in many cities, we may observe the tendency in UGBS design for younger groups, in particular, favoring active people who require physical facilities or equipment. Other needs, such as those of quietness, biodiversity observation, or spiritual contact with nature would come in second (if they were considered at all). Besides, when one studies the perception of the available facilities by their users, it often turns out that they are considered to be unsatisfactory (</span><a class="workspace-trigger" data-dcnode-id="6832" href="#bb0195" name="bbb0195"><span data-dcnode-id="6833" instrument_node="">Iojă et al., 2011</span></a><span data-dcnode-id="6831" instrument_node="">).</span></p><p data-dcnode-id="6822" id="p0415"><span data-dcnode-id="6829" instrument_node="">When it comes to more specific cases, serious examples of neglect may be found. The Roma minority faces visible and strong discrimination (especially in countries such as Slovakia, the Czech Republic, Hungary, or Romania – see an example from Košice in </span><a class="workspace-trigger" data-dcnode-id="6827" href="#t0005" name="bt0005"><span data-dcnode-id="6828" instrument_node="">Table 1</span></a><span data-dcnode-id="6826" instrument_node="">). Another evident example of a group whose needs are ignored in UGBS management is the people experiencing homelessness. Although UGBS may be more important for them than for other social groups, given that, by definition, they do not have homes, their potential needs and preferences are not included in UGBS design (</span><a class="workspace-trigger" data-dcnode-id="6824" href="#bb1457" name="bbb1457"><span data-dcnode-id="6825" instrument_node="">Koprowska, Kronenberg, Kuźma, &amp; Łaszkiewicz, 2020</span></a><span data-dcnode-id="6823" instrument_node="">). Quite the opposite. As illustrated by the extreme case from Hungary and more subtle examples from most other countries, people experiencing homelessness represent a group which is pushed out of UGBS. Both in the case of people experiencing homelessness and the Roma, environmental injustice is just one of many forms of discrimination. This complex issue is often part of public debates on UGBS. In the case of the recent proposal to create a new Central Park in Warsaw, the question of how to ensure that this place would not be accessible for those experiencing homeless was one of the most important problems, on a par with the issues of costs and foregone economic opportunities.</span></p><p data-dcnode-id="6820" id="p0420"><span data-dcnode-id="6821" instrument_node="">The above clearly indicates the neoliberal approach to UGBS management that favors the interest of some groups over those of the others. In addition to the abovementioned extreme example of Project Liget from Budapest, another specific case of a large-scale intervention where the needs of the local residents have been neglected is the International Horticultural Exposition 2024 in Lodz promoted by the local authorities as ‘the Green Expo.’ The event (the aim of which is mostly related to making the city more famous) will strongly influence the Baden-Powell and May 3rd Parks. The event is planned in a top-down manner by the city, assisted by a global consulting company. This neoliberal model neglects local expertise and the preferences of nearby inhabitants, even though it will strongly and permanently affect the functions of the above two parks.</span></p><p data-dcnode-id="6812" id="p0425"><span data-dcnode-id="6819" instrument_node="">Interactional justice also involves conflicts between the different users of UGBS. In some cases, the presence of specific groups in a park (e.g., groups of drug dealers, young male immigrants, drinkers) prevents others from going there (e.g., women with children). In other cases, not all groups of people feel comfortable in certain UGBS. Indeed, some studies report on the appropriation of UGBS by some groups leading to the relative exclusion of others (</span><a class="workspace-trigger" data-dcnode-id="6817" href="#bb0200" name="bbb0200"><span data-dcnode-id="6818" instrument_node="">Kabisch &amp; Haase, 2014</span></a><span data-dcnode-id="6816" instrument_node="">), and the fears that some people cannot visit public parks due to the way they dress, e.g., wearing clothes typical for Muslim or African countries, or wearing a veil/chador. At the same time, people representing the host society may avoid UGBS where many migrants are present, or UGBS which have been appropriated by groups of drunkards are avoided by everyone. Here, clearly, various processes of exclusion overlap or impact each other (i.e., excluded people appropriate a space, and in doing so, they prevent others from going there) – the UGBS becomes the “battlefield” of societal exclusion. It is linked to eco-gentrification, among others, and indeed, preliminary evidence from postsocialist countries indicates the importance of UGBS for gentrifiers (</span><a class="workspace-trigger" data-dcnode-id="6814" href="#bb0130" name="bbb0130"><span data-dcnode-id="6815" instrument_node="">Górczyńska, 2017</span></a><span data-dcnode-id="6813" instrument_node="">).</span></p></section></section><section data-dcnode-id="6467" id="s0060"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6804" id="st0075"><span data-dcnode-id="6809" instrument_node="">6</span><span data-dcnode-id="6807" instrument_node="">. </span><span data-dcnode-id="6805" instrument_node="">Discussion</span></h2><section data-dcnode-id="6606" id="s0065"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6798" id="st0080"><span data-dcnode-id="6803" instrument_node="">6.1</span><span data-dcnode-id="6801" instrument_node="">. </span><span data-dcnode-id="6799" instrument_node="">Crosscutting insights on EJ in postsocialist cities</span></h3><div data-dcnode-id="6614"><p data-dcnode-id="6790" id="p0430"><span data-dcnode-id="6797" instrument_node="">In </span><a class="workspace-trigger" data-dcnode-id="6795" href="#t0010" name="bt0010"><span data-dcnode-id="6796" instrument_node="">Table 2</span></a><span data-dcnode-id="6794" instrument_node="">, we show how the three dimensions of UGBS provision and the three dimensions of EJ interact or operate together for the topics/issues that are addressed in the scholarly and public debate in postsocialist cities. In this way, </span><a class="workspace-trigger" data-dcnode-id="6792" href="#t0010" name="bt0010"><span data-dcnode-id="6793" instrument_node="">Table 2</span></a><span data-dcnode-id="6791" instrument_node=""> features a synthesis of the results of our analysis.</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="6615" id="t0010"><span class="captions" data-dcnode-id="6782"><span data-dcnode-id="6783" id="ca0015"><p data-dcnode-id="6784" id="sp0015"><span class="label" data-dcnode-id="6788"><span data-dcnode-id="6789" instrument_node="">Table 2</span></span><span data-dcnode-id="6787" instrument_node="">. </span><span data-dcnode-id="6785" instrument_node="">Interaction of topics related to UGBS provision and EJ that are discussed in postsocialist cities (those marked with (+) represent emerging positive trends).</span></p></span></span><div class="groups" data-dcnode-id="6616"><table data-dcnode-id="6617"><thead data-dcnode-id="6773"><tr class="rowsep-1 valign-top" data-dcnode-id="6774"><th data-dcnode-id="6781" scope="col"></th><th data-dcnode-id="6779" scope="col"><span data-dcnode-id="6780" instrument_node="">Distributive justice</span></th><th data-dcnode-id="6777" scope="col"><span data-dcnode-id="6778" instrument_node="">Procedural justice</span></th><th data-dcnode-id="6775" scope="col"><span data-dcnode-id="6776" instrument_node="">Interactional/recognition justice</span></th></tr></thead><tbody data-dcnode-id="6618"><tr data-dcnode-id="6717"><th data-dcnode-id="6771" scope="row"><span data-dcnode-id="6772" instrument_node="">Availability</span></th><td data-dcnode-id="6752"><dl class="list" data-dcnode-id="6753"><dt class="list-label" data-dcnode-id="6769"><span data-dcnode-id="6770" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6766"><p data-dcnode-id="6767" id="p0005"><span data-dcnode-id="6768" instrument_node="">Social segregation</span></p></dd><dt class="list-label" data-dcnode-id="6764"><span data-dcnode-id="6765" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6761"><p data-dcnode-id="6762" id="p0010"><span data-dcnode-id="6763" instrument_node="">Discrimination of certain social groups (Roma in particular, but also allotment gardeners, migrants, very poor people, drunkards, etc.) – an extreme form of poverty and exclusion, where environmental issues are part of a general condition</span></p></dd><dt class="list-label" data-dcnode-id="6759"><span data-dcnode-id="6760" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6754"><p data-dcnode-id="6757" id="p0015"><span data-dcnode-id="6758" instrument_node="">Improvement of UGBS in certain undersupplied areas which may imply undesired effects</span></p><p data-dcnode-id="6755" id="p0020"><span data-dcnode-id="6756" instrument_node="">(eco-gentrification)</span></p></dd></dl></td><td data-dcnode-id="6735"><dl class="list" data-dcnode-id="6736"><dt class="list-label" data-dcnode-id="6750"><span data-dcnode-id="6751" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6747"><p data-dcnode-id="6748" id="p0025"><span data-dcnode-id="6749" instrument_node="">Privatization, reprivatization, appropriation of land by developers</span></p></dd><dt class="list-label" data-dcnode-id="6745"><span data-dcnode-id="6746" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6742"><p data-dcnode-id="6743" id="p0030"><span data-dcnode-id="6744" instrument_node="">Downplaying the importance of UGBS in the legal system</span></p></dd><dt class="list-label" data-dcnode-id="6740"><span data-dcnode-id="6741" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6737"><p data-dcnode-id="6738" id="p0035"><span data-dcnode-id="6739" instrument_node="">(+) Raising the awareness and activity of civil society (especially with regard to the overlooked needs of certain social groups)</span></p></dd></dl></td><td data-dcnode-id="6718"><dl class="list" data-dcnode-id="6719"><dt class="list-label" data-dcnode-id="6733"><span data-dcnode-id="6734" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6730"><p data-dcnode-id="6731" id="p0040"><span data-dcnode-id="6732" instrument_node="">The low perceived value of UGBS, higher priorities related to the construction/development and commercial potential of UGBS</span></p></dd><dt class="list-label" data-dcnode-id="6728"><span data-dcnode-id="6729" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6725"><p data-dcnode-id="6726" id="p0045"><span data-dcnode-id="6727" instrument_node="">The needs of some social groups are not recognized at all – extreme marginalization and/or discrimination</span></p></dd><dt class="list-label" data-dcnode-id="6723"><span data-dcnode-id="6724" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6720"><p data-dcnode-id="6721" id="p0050"><span data-dcnode-id="6722" instrument_node="">(+) Raising awareness and activity of civil society (especially with regard to the overlooked needs of certain social groups)</span></p></dd></dl></td></tr><tr data-dcnode-id="6653"><th data-dcnode-id="6715" scope="row"><span data-dcnode-id="6716" instrument_node="">Accessibility</span></th><td data-dcnode-id="6698"><dl class="list" data-dcnode-id="6699"><dt class="list-label" data-dcnode-id="6713"><span data-dcnode-id="6714" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6710"><p data-dcnode-id="6711" id="p0055"><span data-dcnode-id="6712" instrument_node="">Access restrictions affecting many UGBS (e.g., allotment gardens, private green spaces)</span></p></dd><dt class="list-label" data-dcnode-id="6708"><span data-dcnode-id="6709" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6705"><p data-dcnode-id="6706" id="p0060"><span data-dcnode-id="6707" instrument_node="">Discrimination of certain social groups (Roma and people experiencing homelessness in particular)</span></p></dd><dt class="list-label" data-dcnode-id="6703"><span data-dcnode-id="6704" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6700"><p data-dcnode-id="6701" id="p0065"><span data-dcnode-id="6702" instrument_node="">Neglected needs of specific groups, e.g., disabled people</span></p></dd></dl></td><td data-dcnode-id="6681"><dl class="list" data-dcnode-id="6682"><dt class="list-label" data-dcnode-id="6696"><span data-dcnode-id="6697" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6693"><p data-dcnode-id="6694" id="p0070"><span data-dcnode-id="6695" instrument_node="">Control, monitoring, municipal police</span></p></dd><dt class="list-label" data-dcnode-id="6691"><span data-dcnode-id="6692" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6688"><p data-dcnode-id="6689" id="p0075"><span data-dcnode-id="6690" instrument_node="">Formally publicly accessible spaces become closed and inaccessible</span></p></dd><dt class="list-label" data-dcnode-id="6686"><span data-dcnode-id="6687" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6683"><p data-dcnode-id="6684" id="p0080"><span data-dcnode-id="6685" instrument_node="">Fencing waterfronts – formally illegal but still tolerated by the authorities</span></p></dd></dl></td><td data-dcnode-id="6654"><dl class="list" data-dcnode-id="6655"><dt class="list-label" data-dcnode-id="6679"><span data-dcnode-id="6680" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6676"><p data-dcnode-id="6677" id="p0085"><span data-dcnode-id="6678" instrument_node="">Congestion, conflicting uses (e.g., dog users releasing dogs in public spaces), restricting access to nearby inhabitants in the case of particularly popular UGBS – especially in previously socially homogenous areas</span></p></dd><dt class="list-label" data-dcnode-id="6674"><span data-dcnode-id="6675" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6671"><p data-dcnode-id="6672" id="p0090"><span data-dcnode-id="6673" instrument_node="">Being afraid of violence in society (a new issue in postsocialist societies, after feeling generally safe previously), perception of crime, feeling unsafe – omnipresent fencing and monitoring</span></p></dd><dt class="list-label" data-dcnode-id="6669"><span data-dcnode-id="6670" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6666"><p data-dcnode-id="6667" id="p0095"><span data-dcnode-id="6668" instrument_node="">Gender issues (e.g., safety)</span></p></dd><dt class="list-label" data-dcnode-id="6664"><span data-dcnode-id="6665" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6661"><p data-dcnode-id="6662" id="p0100"><span data-dcnode-id="6663" instrument_node="">Discrimination of certain social groups (Roma in particular)</span></p></dd><dt class="list-label" data-dcnode-id="6659"><span data-dcnode-id="6660" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6656"><p data-dcnode-id="6657" id="p0105"><span data-dcnode-id="6658" instrument_node="">(+) The slowly changing recognition of the needs of the disabled</span></p></dd></dl></td></tr><tr data-dcnode-id="6619"><th data-dcnode-id="6651" scope="row"><span data-dcnode-id="6652" instrument_node="">Attractiveness</span></th><td data-dcnode-id="6644"><dl class="list" data-dcnode-id="6645"><dt class="list-label" data-dcnode-id="6649"><span data-dcnode-id="6650" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6646"><p data-dcnode-id="6647" id="p0110"><span data-dcnode-id="6648" instrument_node="">UGBS characteristics not adjusted to the needs of local residents (not attractive for the majority who live nearby)</span></p></dd></dl></td><td data-dcnode-id="6637"><dl class="list" data-dcnode-id="6638"><dt class="list-label" data-dcnode-id="6642"><span data-dcnode-id="6643" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6639"><p data-dcnode-id="6640" id="p0115"><span data-dcnode-id="6641" instrument_node="">Insufficient inclusion of different social groups in UGBS design and management</span></p></dd></dl></td><td data-dcnode-id="6620"><dl class="list" data-dcnode-id="6621"><dt class="list-label" data-dcnode-id="6635"><span data-dcnode-id="6636" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6632"><p data-dcnode-id="6633" id="p0120"><span data-dcnode-id="6634" instrument_node="">Poor social cohesion; more tolerance for injustices as they are considered ‘natural’ under capitalist rule</span></p></dd><dt class="list-label" data-dcnode-id="6630"><span data-dcnode-id="6631" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6627"><p data-dcnode-id="6628" id="p0125"><span data-dcnode-id="6629" instrument_node="">Insufficient recognition of the needs of all inhabitants</span></p></dd><dt class="list-label" data-dcnode-id="6625"><span data-dcnode-id="6626" instrument_node="">-</span></dt><dd class="list-description" data-dcnode-id="6622"><p data-dcnode-id="6623" id="p0130"><span data-dcnode-id="6624" instrument_node="">(+) Eastern Germany: UGBS as meeting places and strengthening social cohesion</span></p></dd></dl></td></tr></tbody></table></div></div></div><p data-dcnode-id="6612" id="p0435"><span data-dcnode-id="6613" instrument_node="">Some aspects of environmental injustice have already emerged, and others can be observed but have not been broadly discussed. Some problems of exclusion/marginalization/discrimination are addressed by research, but there is a lack of awareness of those issues in societies and the public debate. Interestingly, while social cohesion and a sense of community and brotherhood, along with collectivism, were the conceptual ideas of socialism, these ideals were largely lost during the postsocialist transition.</span></p><p data-dcnode-id="6607" id="p0440"><span data-dcnode-id="6611" instrument_node="">There are insufficiencies that affect all urban dwellers and injustices that affect only parts of society or specific groups of people, their wants and needs, or their values and perceptions. Issues of discrimination/exclusion are often linked to a lack of accessibility; availability increasingly relates to housing segregation; wants and needs regarding different aspects of UGBS provision are considered more often in the case of some groups than of others. Nevertheless, the conflicts between the different uses of UGBS and user groups are increasingly recognized (cf. </span><a class="workspace-trigger" data-dcnode-id="6609" href="#bb0350" name="bbb0350"><span data-dcnode-id="6610" instrument_node="">Onose et al., 2020</span></a><span data-dcnode-id="6608" instrument_node="">). The emerging EJ debate is constrained by the market-orientation of society, privatization, and the primacy of private interests. The slowly growing importance of EJ is probably related to the impact of EU and western experiences, funding programs, and other international projects.</span></p></section><section data-dcnode-id="6530" id="s0070"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6600" id="st0085"><span data-dcnode-id="6605" instrument_node="">6.2</span><span data-dcnode-id="6603" instrument_node="">. </span><span data-dcnode-id="6601" instrument_node="">EJ as part of UGBS and other urban debates in postsocialist cities</span></h3><p data-dcnode-id="6586" id="p0445"><span data-dcnode-id="6599" instrument_node="">Although very neglected in the first two decades of the political change, UGBS have recently started to attract increasing attention in postsocialist countries. This is partly because of a catch-up effect, related to a kind of environmental Kuznets curve (</span><a class="workspace-trigger" data-dcnode-id="6597" href="#bb0415" name="bbb0415"><span data-dcnode-id="6598" instrument_node="">Stern, 2004</span></a><span data-dcnode-id="6596" instrument_node="">), with the societal demand for UGBS (as part of broader urban quality of life) increasing after some level of wealth has been achieved. This can also reflect the higher needs in </span><a class="workspace-trigger" data-dcnode-id="6594" href="#bb0325" name="bbb0325"><span data-dcnode-id="6595" instrument_node="">Maslow, 1943</span></a><span data-dcnode-id="6593" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6591" href="#bb0330" name="bbb0330"><span data-dcnode-id="6592" instrument_node="">Maslow, 1970</span></a><span data-dcnode-id="6590" instrument_node=""> hierarchy being met. Among the three UGBS provision levels distinguished by </span><a class="workspace-trigger" data-dcnode-id="6588" href="#bb0030" name="bbb0030"><span data-dcnode-id="6589" instrument_node="">Biernacka and Kronenberg (2018)</span></a><span data-dcnode-id="6587" instrument_node="">, availability is the most often used, both by researchers and practitioners in local authorities and NGOs. Often, this is the only aspect considered, even though it does not necessarily consider for which socioeconomic groups UGBS are available. Attractiveness tends to be addressed in planning as well; however, again, it is not necessarily considered in the context of EJ. Accessibility is the aspect least often considered, and the only marginalized group that is considered in this context is the disabled – if they are considered at all. Note that UGBS issues are mostly discussed in the largest cities, where issues such as gentrification or smog alarm situations have increasingly raised concern in recent years. Nevertheless, it is remarkable that EJ does not play an important role in the analysis of these problems.</span></p><p data-dcnode-id="6566" id="p0450"><span data-dcnode-id="6585" instrument_node="">The neglect of the EJ context resembles similar problems with other useful frameworks for analyzing and planning UGBS. For example, the ecosystem services framework is used to a very limited extent, and only among experts involved in planning (</span><a class="workspace-trigger" data-dcnode-id="6583" href="#bb0310" name="bbb0310"><span data-dcnode-id="6584" instrument_node="">Maczka et al., 2016</span></a><span data-dcnode-id="6582" instrument_node="">). In short, the lack of availability prevents all ecosystem services, while reduced accessibility only prevents some, and attractiveness refers primarily to trade-offs between different ecosystem services. This is particularly the case in the context of issues such as climate change adaptation. </span><a class="workspace-trigger" data-dcnode-id="6580" href="#bb0035" name="bbb0035"><span data-dcnode-id="6581" instrument_node="">Biernacka and Kronenberg (2019)</span></a><span data-dcnode-id="6579" instrument_node=""> studied how the different barriers that prevent UGBS provisioning at the three levels affect the delivery of ecosystem services. A few more nuanced studies linked the availability of UGBS with specific ecosystem services, such as noise mitigation (</span><a class="workspace-trigger" data-dcnode-id="6577" href="#bb0235" name="bbb0235"><span data-dcnode-id="6578" instrument_node="">Koprowska, Łaszkiewicz, Kronenberg, &amp; Marcińczak, 2018</span></a><span data-dcnode-id="6576" instrument_node="">), and they discussed the findings in the context of EJ. However, although the problems mentioned in </span><a class="workspace-trigger" data-dcnode-id="6574" href="#s0020" name="bs0020"><span data-dcnode-id="6575" instrument_node="">Section 4</span></a><span data-dcnode-id="6573" instrument_node=""> clearly translate into the reduced ability of urban ecosystems to provide their services, this has not been part of the public debate in postsocialist countries. Again, the prioritization of private, commercial, and business activities, and ongoing construction, are the most prominent challenges. Meanwhile, the most relevant ecosystem services to be considered in this context include recreation, along with physical and mental health, climate adaptation, water overflow regulation, and local microclimate regulation, including the heat island effect. In Russia, in particular, another important ecosystem service that is affected by new developments is food provisioning. It is related to dachas, which first appeared in pre-revolutionary Russia but which remained important during the socialist period, primarily for the purpose of growing vegetables and fruit to supplement poor diets (</span><a class="workspace-trigger" data-dcnode-id="6571" href="#bb0090" name="bbb0090"><span data-dcnode-id="6572" instrument_node="">Dushkova &amp; Krasovskaya, 2018</span></a><span data-dcnode-id="6570" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6568" href="#bb0180" name="bbb0180"><span data-dcnode-id="6569" instrument_node="">Ignatieva, Konechnaya, &amp; Stewart, 2011</span></a><span data-dcnode-id="6567" instrument_node="">).</span></p><p data-dcnode-id="6561" id="p0455"><span data-dcnode-id="6565" instrument_node="">UGBS provision, and in particular, their attractiveness, has also started to be used by local policymakers and planners as an element of political marketing and to improve the image of cities. As such, the location of UGBS is used as a tool to improve the attractiveness of neglected districts in urban revival projects. In the case of both society at large and experts, the uptake of UGBS issues is also partly related to the exchange of experience related to increased travel and work abroad, along with the available funding mechanisms for urban renewal. All of the above are related to the activities of the European Union (EU), which seems to be the main driver of the sustainability debate in Central and Eastern Europe (</span><a class="workspace-trigger" data-dcnode-id="6563" href="#bb0265" name="bbb0265"><span data-dcnode-id="6564" instrument_node="">Kronenberg &amp; Bergier, 2012</span></a><span data-dcnode-id="6562" instrument_node="">). Interestingly, the impact of the EU extends beyond its member countries thanks to various pre-accession measures, migration between postsocialist countries within and outside of the EU, and other forms of exchange of experience.</span></p><p data-dcnode-id="6544" id="p0460"><span data-dcnode-id="6560" instrument_node="">Still, urban greening is very much an issue of interest for better-off and well-educated people, which makes it so relevant from the point of view of EJ. Indeed, in some cases, justice issues arise due to the increasing polarization of society. This is increasingly evident in the case of UGBS provision, which is – at least in some postsocialist countries (most notably in eastern Germany) – increasingly connected with housing, social segregation and displacement, and the so-called middle class bias in urban planning (</span><a class="workspace-trigger" data-dcnode-id="6558" href="#bb0010" name="bbb0010"><span data-dcnode-id="6559" instrument_node="">Ali, 2017</span></a><span data-dcnode-id="6557" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6555" href="#bb0135" name="bbb0135"><span data-dcnode-id="6556" instrument_node="">Haase, 2017</span></a><span data-dcnode-id="6554" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6552" href="#bb0175" name="bbb0175"><span data-dcnode-id="6553" instrument_node="">Holm, 2011</span></a><span data-dcnode-id="6551" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6549" href="#bb0215" name="bbb0215"><span data-dcnode-id="6550" instrument_node="">Konzack, 2017</span></a><span data-dcnode-id="6548" instrument_node="">). Moreover, initial results for Lodz showed that inequalities in UGBS availability and potential environmental injustice might appear even if residential segregation is not intense. This is because, in low segregated spaces, one can still observe some micro-scale segregation (for example, in urban blocks or neighborhoods) (</span><a class="workspace-trigger" data-dcnode-id="6546" href="#bb1454" name="bbb1454"><span data-dcnode-id="6547" instrument_node="">Łaszkiewicz, Kronenberg, &amp; Marcińczak, 2020b</span></a><span data-dcnode-id="6545" instrument_node="">). These issues are further connected with increasing individualization and people's interest in optimizing their own health and well-being, and limited attention paid to the public interest.</span></p><p data-dcnode-id="6536" id="p0465"><span data-dcnode-id="6543" instrument_node="">EJ, as a term, is not spoken about or written down in public documents regarding urban planning – at least not officially. However, it is indirectly mentioned in various strategic planning documents in some eastern German, Polish, Romanian, and Russian cities, with general declarations that the authorities aim at providing a better balance of UGBS provision for all inhabitants. Instead of EJ, general inequalities in UGBS availability, and the limitation of their accessibility by middle and low-income people, tend to be indicated in postsocialist cities. Clearly, gentrification does occur, as in the case of waterfront cafes and similar amenities targeted at middle to higher income groups; in the case of Russia, this would refer to domestic households with an upper intermediate income, as well as expats and tourists. However, throughout postsocialist countries, this gentrification is most often seen as a positive urban development (</span><a class="workspace-trigger" data-dcnode-id="6541" href="#bb0125" name="bbb0125"><span data-dcnode-id="6542" instrument_node="">Golubchikov &amp; Badyina, 2006</span></a><span data-dcnode-id="6540" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6538" href="#bb0450" name="bbb0450"><span data-dcnode-id="6539" instrument_node="">Zupan &amp; Büdenbender, 2019</span></a><span data-dcnode-id="6537" instrument_node="">).</span></p><p data-dcnode-id="6531" id="p0470"><span data-dcnode-id="6535" instrument_node="">One reason for the relative absence of debate on EJ in postsocialist cities may be that inequalities have not reached levels similar to those in countries where EJ has been part of the public debate for decades, such as the USA. There are other extreme examples of injustice, especially in post-Soviet countries, where the division is often made between ‘people’ and ‘oligarchs.’ Furthermore, UGBS provision is probably not a key driver of segregation, at least not yet, as so far it only appears on a small scale in places where segregation linked to UGBS results from a broader historical context. Indeed, in postsocialist Europe, most basic issues (e.g., having a good job, a steady income, a house/flat, and social security) have been solved for the more affluent part of societies, and those people are now becoming interested in new issues, e.g., green cities, quality of life, and possibly also justice issues. In general, this also refers to younger people. Still, the fact that the development of UGBS in postsocialist cities is often oriented at the interests of those who already expressed an interest in this topic (as indicated above) might be mainly due to the fact that many planners or decision-makers share those interested citizens' educational, income, and lifestyle background and share their expectations of what central parts of the city should look like, reproducing very much western or even global ideas of UGBS (</span><a class="workspace-trigger" data-dcnode-id="6533" href="#bb0185" name="bbb0185"><span data-dcnode-id="6534" instrument_node="">Ignatieva &amp; Smertin, 2007</span></a><span data-dcnode-id="6532" instrument_node="">).</span></p></section><section data-dcnode-id="6485" id="s0075"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6524" id="st0090"><span data-dcnode-id="6529" instrument_node="">6.3</span><span data-dcnode-id="6527" instrument_node="">. </span><span data-dcnode-id="6525" instrument_node="">How does the postsocialist condition influence the debate on EJ?</span></h3><p data-dcnode-id="6522" id="p0475"><span data-dcnode-id="6523" instrument_node="">Justice, as a basic concept, has been dwarfed by market logics in postsocialist societies. This is despite the fact that in the socialist period, the fair distribution of goods and resources was one of the fundamental pillars of the official rhetoric. A reason for this might be that due to its function as a fundamental principle of state socialist ideology, justice was rejected after 1989 as a “thing of the past.” The newly emerging injustices were seen as “natural outcomes” of the new, capitalist reality. It is not clear whether this is primarily because of social values and perceptions or because of the specific institutions and legal systems which developed during the transition. The vacuum in the 1990s was filled by the market, massive privatization, the commercialization of public space, individualization, and hence the enormous power of developers and other businesses. Postsocialist countries suddenly turned from state regulation towards an extremely liberal economy, which resulted in changes in both power relations as well as priorities of how to plan and develop cities. UGBS became one of the evident victims of this transformation. Parks replaced with parking spaces may be one of the symptoms of the problem – public transportation systems in postsocialist countries collapsed and private cars became yet another symbol of the same problems. At the same time, cars became yet another issue related to justice – the transportation exclusion of those who cannot afford a private car or who are not able to drive.</span></p><p data-dcnode-id="6502" id="p0480"><span data-dcnode-id="6521" instrument_node="">In most postsocialist countries, private property is seen as a sacrosanct value in itself, and hence, the absolute dominance of private interests over public interests. Again, eastern Germany represents an exception here, due to its strong public sector and urban housing markets, which are characterized to a great extent by rental contracts instead of owning property. Anything that is intended for common, shared use, including public space, has become secondary to private interests, which can be interpreted as a part of a backlash from socialism. After decades of the primacy of public ownership, the situation after 1990 can be seen as a complete swing of the pendulum in the other direction. Expenses related to UGBS were typically considered unjustified in the face of many other needs, and the potential savings related to urban greening – or at least to not destroying existing UGBS – were ignored (</span><a class="workspace-trigger" data-dcnode-id="6519" href="#bb0270" name="bbb0270"><span data-dcnode-id="6520" instrument_node="">Kronenberg, Bergier, &amp; Maliszewska, 2017</span></a><span data-dcnode-id="6518" instrument_node="">). Meanwhile, as indicated above, UGBS seem to have been more prominent, and definitely more comprehensively considered in urban planning in the socialist period than after the transition (</span><a class="workspace-trigger" data-dcnode-id="6516" href="#bb0025" name="bbb0025"><span data-dcnode-id="6517" instrument_node="">Badiu et al., 2019</span></a><span data-dcnode-id="6515" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6513" href="#bb0150" name="bbb0150"><span data-dcnode-id="6514" instrument_node="">Haase, Dushkova, et al., 2019</span></a><span data-dcnode-id="6512" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6510" href="#bb0275" name="bbb0275"><span data-dcnode-id="6511" instrument_node="">Kronenberg, Krauze, &amp; Wagner, 2017</span></a><span data-dcnode-id="6509" instrument_node="">). In particular, in the Soviet Union, the policy of increasing UGBS and providing an even distribution of UGBS in all parts of a city, especially in the formally working-class neighborhoods, had a strong political foundation. It was seen as the socialistic approach (and opposite to the old capitalistic view of the city), based on a planned economy and common property rights. The greening policy was the way to create truly green cities for everyone and not only for the privileged groups (</span><a class="workspace-trigger" data-dcnode-id="6507" href="#bb0085" name="bbb0085"><span data-dcnode-id="6508" instrument_node="">Dushkova et al., 2020</span></a><span data-dcnode-id="6506" instrument_node="">). Unfortunately, most of these achievements were lost during the transition period, and only recently has this topic started to attract public attention (</span><a class="workspace-trigger" data-dcnode-id="6504" href="#bb0150" name="bbb0150"><span data-dcnode-id="6505" instrument_node="">Haase, Dushkova, et al., 2019</span></a><span data-dcnode-id="6503" instrument_node="">).</span></p><p data-dcnode-id="6488" id="p0485"><span data-dcnode-id="6501" instrument_node="">Although legal systems guarantee access to a safe environment to all (e.g., through constitutional provisions), it seems that these norms exist only on paper as there are no effective mechanisms to implement them in real life. This discrepancy between broad declarations and the everyday reality may be seen as typical for both the socialist and the postsocialist period. Other relevant problems, typical of postsocialist countries, include high levels of corruption in public institutions, poor collaboration between different actors involved in UGBS management (</span><a class="workspace-trigger" data-dcnode-id="6499" href="#bb0280" name="bbb0280"><span data-dcnode-id="6500" instrument_node="">Kronenberg et al., 2016</span></a><span data-dcnode-id="6498" instrument_node="">), and problems with data availability regarding UGBS (</span><a class="workspace-trigger" data-dcnode-id="6496" href="#bb0020" name="bbb0020"><span data-dcnode-id="6497" instrument_node="">Badiu et al., 2016</span></a><span data-dcnode-id="6495" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6493" href="#bb0105" name="bbb0105"><span data-dcnode-id="6494" instrument_node="">Feltynowski et al., 2018</span></a><span data-dcnode-id="6492" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="6490" href="#bb0340" name="bbb0340"><span data-dcnode-id="6491" instrument_node="">Niță, Anghel, et al., 2018</span></a><span data-dcnode-id="6489" instrument_node="">).</span></p><p data-dcnode-id="6486" id="p0490"><span data-dcnode-id="6487" instrument_node="">Not surprisingly, there has been relatively little interest in UGBS provision, including EJ issues, within the academic community in postsocialist countries or the international scholarly community researching postsocialist cities. For example, the Cities After Transition network, which brings together scholars dealing with postsocialist cities and has organized bi-annual conferences since 2005, has put little emphasis on UGBS, even though it considers social segregation and housing some of its key topics of interest. Here, we see future avenues of research and networking, and considerable gaps to be filled.</span></p></section><section data-dcnode-id="6468" id="s0080"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6479" id="st0095"><span data-dcnode-id="6484" instrument_node="">6.4</span><span data-dcnode-id="6482" instrument_node="">. </span><span data-dcnode-id="6480" instrument_node="">Implications for further research and planning</span></h3><p data-dcnode-id="6474" id="p0495"><span data-dcnode-id="6478" instrument_node="">The most basic research need is to diagnose the level of UGBS provision in postsocialist cities regarding where the different socioeconomic groups reside. Postsocialist social and environmental studies tend not to be interdisciplinary and are still poorly integrated with the global academic debate, and it would be interesting and relevant to study the legal/planning/institutional context to recognize the main drivers and obstacles for EJ in postsocialist cities. One step in that direction might be to analyze for each country the legal documents which could ‘support’ or allow for environmental injustice and those which could promote EJ but are missing in national/local legal systems. Our article highlights some of the main trends, but more specific studies are necessary regarding regional differences and to discover how our findings would be relevant, for example, to Caucasus and Central Asia, i.e., other postsocialist countries which are exposed to different challenges. In particular, it would be interesting to study specific postsocialist stakeholder hierarchies and power relations that are relevant from the point of view of urban EJ and UGBS in particular </span><a class="workspace-trigger" data-dcnode-id="6476" href="#bb1452" name="bbb1452"><span data-dcnode-id="6477" instrument_node="">Ernstson, 2013</span></a><span data-dcnode-id="6475" instrument_node="">. These may be very different in different groups of countries, and definitely different in postsocialist and western countries.</span></p><p data-dcnode-id="6469" id="p0500"><span data-dcnode-id="6473" instrument_node="">While public participation is poorly developed in postsocialist countries, it is relevant to note that in western countries, there is an ongoing debate on the lack of knowledge among urban planners about the needs and perceptions of those who are not reached by ordinary participation methods and events. Such groups represent an even larger part of society in postsocialist countries, and they need to be identified, studied, and considered. With regard to governance, it would also be relevant to study how the ecosystem services framework can enhance the debate on social and environmental justice in the postsocialist context, a topic that has received increased attention in western contexts within the last few years (</span><a class="workspace-trigger" data-dcnode-id="6471" href="#bb0155" name="bbb0155"><span data-dcnode-id="6472" instrument_node="">Haase et al., 2017</span></a><span data-dcnode-id="6470" instrument_node="">).</span></p></section></section><section data-dcnode-id="6448" id="s0085"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6461" id="st0100"><span data-dcnode-id="6466" instrument_node="">7</span><span data-dcnode-id="6464" instrument_node="">. </span><span data-dcnode-id="6462" instrument_node="">Conclusions</span></h2><p data-dcnode-id="6459" id="p0505"><span data-dcnode-id="6460" instrument_node="">While postsocialist countries differ – in relation to how the issues of EJ have been addressed in the context of UGBS provision, among others – they also share many similarities. Interestingly, the respective situation in postsocialist cities provides interesting insights into the international debate on EJ by highlighting extremes related to neoliberal and populist governments. Note that eastern Germany is an outstanding case compared to the rest of postsocialist Europe due to German reunification and funding. Thus, it had a different development trajectory after 1990, which greatly resembles the debates carried out in western Europe.</span></p><p data-dcnode-id="6457" id="p0510"><span data-dcnode-id="6458" instrument_node="">The broad tolerance for inequalities in postsocialist countries, the lack of solidarity in society, and the lack of responsibility for the public interest result from the extreme individualization and disregard for the social interest that appeared after the breakdown of socialism and the establishment of neoliberal market-capitalism. The extreme rejection of socialist ideas, including equality and social fairness, was particularly evident in the 1990s. While privatization took over, public planning was completely disregarded, as if it was part of the rejected socialist legacy. Economic interests were prioritized as if private capital owners were going to repair all the flaws of the previously centrally planned economies. This gradually led to the corporatization of local authorities and various business–government coalitions. This setting is more likely to welcome business models related to the use and management of UGBS, rather than the EJ discourse. The perception of what capitalism is and a broader acceptance of the rule of the market without any state intervention has been observed in postsocialist societies since the beginning of the transition, which distinguishes them from most types of western capitalist societies.</span></p><p data-dcnode-id="6455" id="p0515"><span data-dcnode-id="6456" instrument_node="">In spite of factors pushing the ideas of green and fair cities, such as EU pressure (policies, debates, capacity building, funding, experience, and exchange), UGBS availability, accessibility, and attractiveness are still far from being a priority topic in postsocialist countries. The importance of UGBS is not (yet) widely acknowledged or understood, and their importance is downplayed in the legal documents and in governance (while in the socialist period it was acknowledged). The availability, accessibility, and attractiveness of UGBS still largely must be discussed through the lens of market logic, as otherwise, UGBS are synonymous with losing money. Following this logic, only those who voice their opinions in the public debate are likely to ensure better UGBS provision for themselves. Public participation still has a long way to go before it is rooted in the prevailing way of decision making. The general belief in decisions made by the experts (on the side of decision-makers) and simultaneous lack of trust that one's own opinion will be heard (on the side of the society) have made participation an empty institution.</span></p><p data-dcnode-id="6453" id="p0520"><span data-dcnode-id="6454" instrument_node="">Apart from the conflicts between land uses (commercial or residential vs. green/blue), conflicts between different users of UGBS, which affect not only the attractiveness but even the accessibility of UGBS, also reflect the increasing polarization and segregation in postsocialist societies. While misbehavior was neither socially accepted in the socialist period, the transition weakened all social control mechanisms, resulting in a situation where the stronger feel even more important and take over space. This is reflected, for example, in the behavior of dog walkers who let their dogs off the leash in UGBS despite regulations, or car drivers using UGBS as informal parking places.</span></p><p data-dcnode-id="6451" id="p0525"><span data-dcnode-id="6452" instrument_node="">There is still a long way to go before distributive/distributional, procedural/participatory, and interactional/recognition justice are accepted as guiding principles for shaping and managing UGBS in most postsocialist countries (less so than in the case of many western countries). This is closely linked to the abovementioned lack of solidarity and responsibility, which is still inherent in postsocialist societies, an issue that also affects expert and decision-making spheres. Nevertheless, the scientific discourse has slowly started to address those issues and to relate empirical evidence to EJ theory. Meanwhile, civil societies show an increased general interest in equity and justice issues. The new generation of planners in postsocialist countries may not only draw on good examples from western countries, but also on the legacy of the relatively high weight that evenly distributed UGBS had in the socialist planning agenda, and seek to recuperate some of these planning practices.</span></p><p data-dcnode-id="6449" id="p0530"><span data-dcnode-id="6450" instrument_node="">It is increasingly understood in postsocialist countries that UGBS are important for the quality of life and that all urban inhabitants need to be able to enjoy the benefits of a society that gets better off in general. This might even influence how injustices are seen in postsocialist societies and support all those in postsocialist countries who are concerned with creating cleaner, healthier, and more inclusive cities. Urban greening and blueing could provide more social justice as well. However, the contrary is also possible, with the emerging evidence of eco-gentrification in postsocialist cities. Nevertheless, in postsocialist countries, and their urban social environments, in particular, the awareness of EJ is slowly permeating the public debate. It is, therefore, worthwhile paying more attention to this topic in the coming years.</span></p></section><section data-dcnode-id="6441" id="s0090"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6446" id="st0105"><span data-dcnode-id="6447" instrument_node="">Author statement</span></h2><p data-dcnode-id="6444" id="p0535"><span data-dcnode-id="6445" instrument_node="">Jakub Kronenberg, Annegret Haase, and Edyta Łaszkiewicz: Conceptualization, Methodology, Investigation, Resources, Writing – Original Draft, Writing – Review &amp; Editing.</span></p><p data-dcnode-id="6442" id="p0540"><span data-dcnode-id="6443" instrument_node="">Attila Antal, Aliaksandra Baravikova, Magdalena Biernacka, Diana Dushkova, Richard Filčak, Dagmar Haase, Maria Ignatieva, Yaryna Khmara, Mihai Razvan Niţă, and Diana Andreea Onose: Investigation, Resources, Writing – Review &amp; Editing.</span></p></section></div><section data-dcnode-id="6408" id="ac0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6438" id="st0110"><span data-dcnode-id="6439" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="6409" id="p0545"><span data-dcnode-id="6437" instrument_node="">JK, EŁ, MB and DH acknowledge support within the project ENABLE, funded through the 2015–2016 BiodivERsA COFUND call for research proposals, with the national funders The </span><span data-dcnode-id="6435" id="gts0005"><span data-dcnode-id="6436" instrument_node="">Swedish Research Council for Environment, Agricultural Sciences and Spatial Planning</span></span><span data-dcnode-id="6434" instrument_node="">, </span><span data-dcnode-id="6432" id="gts0010"><span data-dcnode-id="6433" instrument_node="">Swedish Environmental Protection Agency</span></span><span data-dcnode-id="6431" instrument_node="">, German Aeronautics and Space Research Centre, </span><span data-dcnode-id="6429" id="gts0015"><span data-dcnode-id="6430" instrument_node="">National Science Centre</span></span><span data-dcnode-id="6428" instrument_node=""> (Poland – grant no. </span><a data-dcnode-id="6426" href="#gts0015"><span data-dcnode-id="6427" instrument_node="">2016/22/Z/NZ8/00003</span></a><span data-dcnode-id="6425" instrument_node="">), The </span><span data-dcnode-id="6423" id="gts0020"><span data-dcnode-id="6424" instrument_node="">Research Council of Norway</span></span><span data-dcnode-id="6422" instrument_node=""> and the Spanish </span><span data-dcnode-id="6420" id="gts0025"><span data-dcnode-id="6421" instrument_node="">Ministry of Economy and Competitiveness</span></span><span data-dcnode-id="6419" instrument_node="">. AH acknowledges support from the EKSOC Fellowship Progra
