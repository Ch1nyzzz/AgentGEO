n></h3></a><div class="article-source ellipsis" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">2022, Energy Research and Social Science</span></div></div><div class="buttons" data-dcnode-id="346"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="347" type="button"><span class="button-link-text" data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="348" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="349"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="341"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="342" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="343"><p data-dcnode-id="344" id="sp0055"><span data-dcnode-id="345" instrument_node="">The annual renovation rate of the existing housing stock must increase rapidly to reach climate neutrality by 2050. This transition will require major investments but will also need to be affordable for everyone. Affordability is especially relevant for vulnerable and low-income households, many of which live in social housing in the Netherlands. Previous studies show that such a transition faces justice issues but this paper argues that a more pluralistic justice approach is needed, which also studies the interrelations between the justice dimensions. A multidimensional perspective is used based on five interrelated justice dimensions: distribution, recognition, participation, capability, and responsibility. Empirical data were collected by interviewing members of tenant associations and employees from social housing associations in the Netherlands on their experiences with, and views on, justice aspects in the energy renovation process. The data analysis shows that the multidimensional justice perspective can be applied to implement a broader and more pluralistic perspective on justice principles. These insights can be a starting point for achieving a more just energy renovation process in social housing, especially for addressing the needs of vulnerable households. Moreover, the results point out that all five dimensions are important to take into account in all stages of the energy renovation process, that they are strongly interlinked, and should not be addressed separately. The developed recommendations can be used by policymakers, and tenant and social housing associations.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="322"><div class="sub-heading" data-dcnode-id="334"><a data-dcnode-id="337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2210670722000476" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="338" id="citing-articles-article1-title"><span data-dcnode-id="339" instrument_node="">Influence of land cover change on spatio-temporal distribution of urban heat island —a case in Wuhan main urban area</span></h3></a><div class="article-source ellipsis" data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">2022, Sustainable Cities and Society</span></div></div><div class="buttons" data-dcnode-id="328"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="329" type="button"><span class="button-link-text" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="330" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="331"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="323"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="324" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="325"><p data-dcnode-id="326" id="spara024"><span data-dcnode-id="327" instrument_node="">In this study, the relationship between land cover (LC) characteristics and urban heat island (UHI) intensity in the main urban area of Wuhan City are investigated. The effects of LC change on green space and land surface temperature (LST) was investigated, along with the relationship among LST, LC, and normalised differential vegetation index (NDVI). The land was divided into five categories, namely, built-up area, agricultural land, water, forest, and bare land. LST was determined using the infrared band image from the same period. The area of built-up areas accounted for only 32.81% in 2007, and it increased to 46.01% in 2020, while agricultural land decreased by 12.14%, which is the primary reason for the increase in built-up areas. The average LST in the study area increased from 25.92℃ to 31.71℃, and the range of LST moved forward to high-temperature range. The high-temperature areas (&gt;32℃) expanded from point distribution to plane distribution and its expansion direction was consistent with the urbanisation direction. The water and forest have the strongest mitigation capacity for UHI and should be protected. Urban managers should avoid the increase of bare land due to the degradation of agricultural land and forest because the increase in LST caused by this type of LC change is obvious. LST was negatively correlated with NDVI, indicating that fewer vegetation resulted in higher LST.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="304"><div class="sub-heading" data-dcnode-id="316"><a data-dcnode-id="319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0261517721001655" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="320" id="citing-articles-article2-title"><span data-dcnode-id="321" instrument_node="">Pursuing justice and quality of life: Supporting tourism</span></h3></a><div class="article-source ellipsis" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">2022, Tourism Management</span></div></div><div class="buttons" data-dcnode-id="310"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="311" type="button"><span class="button-link-text" data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="312" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="313"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="305"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="306" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="307"><p data-dcnode-id="308" id="abspara0010"><span data-dcnode-id="309" instrument_node="">The importance of examining perceived justice has grown in both practice and academic research. However, limited attention has been given to its application in the destination context. Drawing on justice and Weber's theory of rationality, this study investigated how residents' perceived justice interacts with their quality of life and support for tourism and whether personal economic benefits moderate these relationships. Results from 412 respondents from rural destinations suggest that three justice dimensions positively impact locals' quality of life and support for tourism. Furthermore, the moderation effect of personal economic benefits on the relationship between justice and supportive behavior was confirmed.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="286"><div class="sub-heading" data-dcnode-id="298"><a data-dcnode-id="301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1618866722000413" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="302" id="citing-articles-article3-title"><span data-dcnode-id="303" instrument_node="">A novel index for assessing perceived availability and public demand for urban green space: Application in a Mediterranean island</span></h3></a><div class="article-source ellipsis" data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">2022, Urban Forestry and Urban Greening</span></div></div><div class="buttons" data-dcnode-id="292"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="293" type="button"><span class="button-link-text" data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="294" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="295"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="287"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="288" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="289"><p data-dcnode-id="290" id="spar0080"><span data-dcnode-id="291" instrument_node="">The objective benefits that humans derive from natural ecosystems and their enduring manifestation in urban green spaces (UGS) is well-know. Nevertheless, citizens’ preference, and perceived necessity of UGS is not always evident and therefore often not accounted for, especially in the context of urban planning decisions, where it could positively influence the effectiveness of greening strategies. This information is especially important in the Mediterranean islands, due to their unique character. Here we address these aspects, including the way they are affected by UGS perceived adequacy, accessibility, maintenance, distance, and other self-reported obstacles using a questionnaire completed by 703 residents of the Island of Crete, Greece. To integrate results, main covariates are compiled into the newly developed public UGS approval index. Survey results show that, 87.82 % of the participants consider public UGS highly necessary for their wellbeing, while only 69.22 % consider private UGS equally necessary. Nevertheless, private UGS were the most frequently visited green at 16.3 ± 0.7 days/month. Public UGS is considered more necessary for female respondents, under 35 years, living in an apartment in the city. However, it emerged that despite the significantly higher need for public UGS in the urban centers of the island, residents consider UGS inadequate and often inaccessible for people with mobility problems. Integration of the results in the new approval index, shows that citizens of Crete, are on average neutral or disapprove of local public UGS. The outcomes can be used for targeted interventions at existing and strategic planning in new UGS.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="268"><div class="sub-heading" data-dcnode-id="280"><a data-dcnode-id="283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0264275121004133" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="284" id="citing-articles-article4-title"><span data-dcnode-id="285" instrument_node="">Urban gentrification, social vulnerability, and environmental (in) justice: Perspectives from gentrifying metropolitan cities in Korea</span></h3></a><div class="article-source ellipsis" data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">2022, Cities</span></div></div><div class="buttons" data-dcnode-id="274"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="275" type="button"><span class="button-link-text" data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="276" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="277"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="269"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="270" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="271"><p data-dcnode-id="272" id="sp0055"><span data-dcnode-id="273" instrument_node="">By integrating urban gentrification dynamics with nexus of social vulnerability and environmental (in)justice, this study explores gentrification processes and community perceptions of gentrification outcomes across gentrifying areas within metropolitan areas corresponding to seven selected cities within South Korea. Combined with redefined urban gentrification drivers, mediators (or control variables), and outcomes, correlation analysis was undertaken using longitudinal secondary data and cross-sectional survey data. Such case study-based empirical approaches in a non-western context were applied to measure social vulnerability and environmental (in)justice index, map spatial distribution of the index, and address the relationships among the gentrification processes in the context of social vulnerability and environmental (in)justice. Our results suggest that a positive correlation between social vulnerability to gentrification and environmental (in)justice exists particularly in urban core areas. Gentrification outcomes by community perceptions exhibited increases in house sale price and household displacement. Our attempts can provide policymakers, planners, practitioners, and residents with a better understanding of social and environmental constraints or benefits of gentrification along with the important concepts of social vulnerability and environmental justice as solutions to urban regeneration challenges.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="250"><div class="sub-heading" data-dcnode-id="262"><a data-dcnode-id="265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0301479721018405" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="266" id="citing-articles-article5-title"><span data-dcnode-id="267" instrument_node="">Spatial-temporal evolution of coupling relationship between land development intensity and resources environment carrying capacity in China</span></h3></a><div class="article-source ellipsis" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">2022, Journal of Environmental Management</span></div></div><div class="buttons" data-dcnode-id="256"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="257" type="button"><span class="button-link-text" data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="258" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="259"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="251"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="252" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="253"><p data-dcnode-id="254" id="abspara0010"><span data-dcnode-id="255" instrument_node="">Land development poses challenges to the sustainable use of resources and environmental health in regions. This study explores the coupling relationship and its spatial-temporal evolution trend between land development intensity and resources environment carrying capacity of 31 provinces in China from 2005 to 2017. The information entropy method, coupling degree model, and coupling coordination degree model are used to calculate the index weight, coupling degree, and coupling coordination degree. The results show that: (1) Three change types of resources environment carrying capacity are presented with land development intensity increasing: first decrease and then increase; first increase and then decrease; and alternating fluctuations. (2) The proportion of construction land, GDP per land, and population density are dominate determinants of land development intensity, while the water resources per capita, energy consumption per unit of GDP, and per capita cultivated land area are that of resources environment carrying capacity. (3) From the perspective of temporal evolution, both coupling and coordination relationship were found to have continuously strengthened. (4) In terms of spatial evolution, the coupling level presented a constantly narrowing inter-regional gap, and the coordination level has changed from initial two-level differentiation to final regional gap narrowing. These findings can provide evidence in support for integrating land development with resources environmental protection to promote regional coordinated development.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85079210040%26md5%3Dcc273a9ca76ef0bc2c4f3d4e477ff4f" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="247" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="248"></path></svg><span class="button-alternative-text" data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2020 The Author(s). Published by Elsevier Ltd.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id=
