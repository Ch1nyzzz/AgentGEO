</span></header><div class="entry-content" data-dcnode-id="11091" itemprop="text"><div class="share-before share-filled share-medium" data-dcnode-id="11568" id="share-before-1114"><div class="facebook sharrre" data-count="%s shares on Facebook" data-dcnode-id="11585" data-reader="Share on Facebook" data-text="98 Reasons To Stay In The EU: Benefits Of Membership For The UK" data-title="Share" data-url="https://smallbusinessprices.co.uk/remain-eu/" data-urlalt="https://smallbusinessprices.co.uk/?p=1114" id="facebook-before-1114"><div class="box no-count" data-dcnode-id="11588"><a class="count" data-dcnode-id="11592" href="#"></a><a aria-labelledby="facebook-before-1114-label" class="share" data-dcnode-id="11589" href="#" onclick="return false;"><span aria-hidden="true" data-dcnode-id="11590"><span data-dcnode-id="11591" instrument_node="">Share</span></span></a></div><span class="hidden" data-dcnode-id="11586" id="facebook-before-1114-label"><span data-dcnode-id="11587" instrument_node="">Share on Facebook</span></span></div><div class="linkedin sharrre" data-count="%s shares on LinkedIn" data-dcnode-id="11577" data-reader="Share on LinkedIn" data-text="98 Reasons To Stay In The EU: Benefits Of Membership For The UK" data-title="Share" data-url="https://smallbusinessprices.co.uk/remain-eu/" data-urlalt="https://smallbusinessprices.co.uk/?p=1114" id="linkedin-before-1114"><div class="box no-count" data-dcnode-id="11580"><a class="count" data-dcnode-id="11584" href="#"></a><a aria-labelledby="linkedin-before-1114-label" class="share" data-dcnode-id="11581" href="#" onclick="return false;"><span aria-hidden="true" data-dcnode-id="11582"><span data-dcnode-id="11583" instrument_node="">Share</span></span></a></div><span class="hidden" data-dcnode-id="11578" id="linkedin-before-1114-label"><span data-dcnode-id="11579" instrument_node="">Share on LinkedIn</span></span></div><div class="twitter sharrre" data-count="%s Tweets" data-dcnode-id="11569" data-reader="Tweet this" data-text="98 Reasons To Stay In The EU: Benefits Of Membership For The UK" data-title="Tweet" data-url="https://smallbusinessprices.co.uk/remain-eu/" data-urlalt="https://smallbusinessprices.co.uk/?p=1114" id="twitter-before-1114"><div class="box no-count" data-dcnode-id="11572"><a class="count" data-dcnode-id="11576" href="#"></a><a aria-labelledby="twitter-before-1114-label" class="share" data-dcnode-id="11573" href="#" onclick="return false;"><span aria-hidden="true" data-dcnode-id="11574"><span data-dcnode-id="11575" instrument_node="">Tweet</span></span></a></div><span class="hidden" data-dcnode-id="11570" id="twitter-before-1114-label"><span data-dcnode-id="11571" instrument_node="">Tweet this</span></span></div></div><span data-dcnode-id="11567" instrument_node="">
</span><p data-dcnode-id="11563"><img alt="98 Reasons To Stay In The EU: Benefits Of Membership For The UK" class="aligncenter size-full wp-image-1116" data-dcnode-id="11564" data-wp-pid="1116" height="540" sizes="(max-width: 810px) 100vw, 810px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//smallbusinessprices.co.uk/wp-content/uploads/98-reasons-to-remain.png&amp;raw" srcset="https://smallbusinessprices.co.uk/wp-content/uploads/98-reasons-to-remain.png 810w, https://smallbusinessprices.co.uk/wp-content/uploads/98-reasons-to-remain-300x200.png 300w, https://smallbusinessprices.co.uk/wp-content/uploads/98-reasons-to-remain-768x512.png 768w, https://smallbusinessprices.co.uk/wp-content/uploads/98-reasons-to-remain-800x533.png 800w, https://smallbusinessprices.co.uk/wp-content/uploads/98-reasons-to-remain-600x400.png 600w" width="810"></p><span data-dcnode-id="11562" instrument_node="">
</span><p data-dcnode-id="11560"><span data-dcnode-id="11561" instrument_node="">With the Brexit deadline fast approaching and no deal in sight, we thought now might be a good time to take a look at 98 benefits of EU membership for the UK. </span></p><span data-dcnode-id="11559" instrument_node="">
</span><p data-dcnode-id="11554"><span data-dcnode-id="11558" instrument_node="">The Bank of England estimates </span><a data-dcnode-id="11556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2018/nov/28/bank-of-england-says-no-deal-brexit-would-be-worse-than-2008-crisis" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="11557" instrument_node="">that the fallout</span></a><span data-dcnode-id="11555" instrument_node=""> of a No Deal Brexit will be worse than the 2008 financial crisis. Needless to say this will likely be very bad for UK small businesses.</span></p><span data-dcnode-id="11553" instrument_node="">
</span><p data-dcnode-id="11548"><span data-dcnode-id="11552" instrument_node="">However, the UK can </span><a data-dcnode-id="11550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.co.uk/news/uk/politics/brexit-court-case-ecj-ruling-article-50-theresa-may-deal-uk-european-court-justice-latest-a8675541.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="11551" instrument_node="">unilaterally revoke article 50</span></a><span data-dcnode-id="11549" instrument_node=""> at any time to stop this madness. </span></p><span data-dcnode-id="11547" instrument_node="">
</span><p data-dcnode-id="11545"><span data-dcnode-id="11546" instrument_node="">Here 98 reasons why we should:</span></p><span data-dcnode-id="11544" instrument_node="">
</span><p data-dcnode-id="11542"><span data-dcnode-id="11543" id="more-1114"></span></p><span data-dcnode-id="11541" instrument_node="">
</span><ol data-dcnode-id="11196"><span data-dcnode-id="11540" instrument_node="">
</span><li data-dcnode-id="11532"><span data-dcnode-id="11539" instrument_node="">Membership of the world’s largest trading bloc with over </span><strong data-dcnode-id="11537"><span data-dcnode-id="11538" instrument_node="">500 million</span></strong><span data-dcnode-id="11536" instrument_node=""> consumers, representing </span><strong data-dcnode-id="11534"><span data-dcnode-id="11535" instrument_node="">23%</span></strong><span data-dcnode-id="11533" instrument_node=""> of global GDP</span></li><span data-dcnode-id="11531" instrument_node="">
</span><li data-dcnode-id="11529"><span data-dcnode-id="11530" instrument_node="">The UK has greater global influence as a member of the EU </span></li><span data-dcnode-id="11528" instrument_node="">
</span><li data-dcnode-id="11526"><span data-dcnode-id="11527" instrument_node="">The EU provides a counterweight to the global power of the US, Russia and China</span></li><span data-dcnode-id="11525" instrument_node="">
</span><li data-dcnode-id="11523"><span data-dcnode-id="11524" instrument_node="">With Trump in the White House the UK’s strongest natural allies are France, Germany and our other West European neighbours</span></li><span data-dcnode-id="11522" instrument_node="">
</span><li data-dcnode-id="11520"><span data-dcnode-id="11521" instrument_node="">Tariff-free trade within the EU</span></li><span data-dcnode-id="11519" instrument_node="">
</span><li data-dcnode-id="11517"><span data-dcnode-id="11518" instrument_node="">The abolition of non-tariff barriers (quotas, subsidies, administrative rules etc.) among members</span></li><span data-dcnode-id="11516" instrument_node="">
</span><li data-dcnode-id="11514"><span data-dcnode-id="11515" instrument_node="">Participation in free trade agreements with Japan and Canada as an EU member</span></li><span data-dcnode-id="11513" instrument_node="">
</span><li data-dcnode-id="11508"><span data-dcnode-id="11512" instrument_node="">The EU accounts for </span><strong data-dcnode-id="11510"><span data-dcnode-id="11511" instrument_node="">44% of all UK exports</span></strong><span data-dcnode-id="11509" instrument_node=""> of goods and services</span></li><span data-dcnode-id="11507" instrument_node="">
</span><li data-dcnode-id="11502"><span data-dcnode-id="11506" instrument_node="">The EU accounts for </span><strong data-dcnode-id="11504"><span data-dcnode-id="11505" instrument_node="">53% of all UK imports</span></strong><span data-dcnode-id="11503" instrument_node=""> of goods and services</span></li><span data-dcnode-id="11501" instrument_node="">
</span><li data-dcnode-id="11496"><span data-dcnode-id="11500" instrument_node="">Cheaper </span><strong data-dcnode-id="11498"><span data-dcnode-id="11499" instrument_node="">food and alcohol</span></strong><span data-dcnode-id="11497" instrument_node=""> imports from continental Europe</span></li><span data-dcnode-id="11495" instrument_node="">
</span><li data-dcnode-id="11493"><span data-dcnode-id="11494" instrument_node="">As a member of the EU the UK maintains a say in the shaping of the rules governing its trade with its European partners</span></li><span data-dcnode-id="11492" instrument_node="">
</span><li data-dcnode-id="11488"><strong data-dcnode-id="11490"><span data-dcnode-id="11491" instrument_node="">3.1 million jobs</span></strong><span data-dcnode-id="11489" instrument_node=""> in the UK are directly linked to exports to the EU</span></li><span data-dcnode-id="11487" instrument_node="">
</span><li data-dcnode-id="11485"><span data-dcnode-id="11486" instrument_node="">Free movement of labour has helped UK firms plug skills gaps (translators, doctors, plumbers)</span></li><span data-dcnode-id="11484" instrument_node="">
</span><li data-dcnode-id="11482"><span data-dcnode-id="11483" instrument_node="">Free movement of labour has helped address shortages of unskilled workers (fruit picking, catering)</span></li><span data-dcnode-id="11481" instrument_node="">
</span><li data-dcnode-id="11479"><span data-dcnode-id="11480" instrument_node="">The Single Market has brought the best continental footballers to the Premier League</span></li><span data-dcnode-id="11478" instrument_node="">
</span><li data-dcnode-id="11471"><span data-dcnode-id="11477" instrument_node="">The EU accounts for </span><strong data-dcnode-id="11475"><span data-dcnode-id="11476" instrument_node="">47% of the UK’s stock</span></strong><span data-dcnode-id="11474" instrument_node=""> of inward Foreign Direct Investment (FDI), worth over </span><strong data-dcnode-id="11472"><span data-dcnode-id="11473" instrument_node="">$1.2 trillion</span></strong></li><span data-dcnode-id="11470" instrument_node="">
</span><li data-dcnode-id="11468"><span data-dcnode-id="11469" instrument_node="">Access to the EU Single Market has helped attract investment into the UK from outside the EU</span></li><span data-dcnode-id="11467" instrument_node="">
</span><li data-dcnode-id="11465"><span data-dcnode-id="11466" instrument_node="">No paperwork or customs for UK exports throughout the single market</span></li><span data-dcnode-id="11464" instrument_node="">
</span><li data-dcnode-id="11462"><span data-dcnode-id="11463" instrument_node="">Price transparency and removal of commissions on currency transactions across the Eurozone</span></li><span data-dcnode-id="11461" instrument_node="">
</span><li data-dcnode-id="11459"><span data-dcnode-id="11460" instrument_node="">FDI into the UK has effectively doubled since the creation of the EU Single Market</span></li><span data-dcnode-id="11458" instrument_node="">
</span><li data-dcnode-id="11453"><span data-dcnode-id="11457" instrument_node="">The UK’s net contribution to the EU budget is around </span><strong data-dcnode-id="11455"><span data-dcnode-id="11456" instrument_node="">€7.3bn, or 0.4% of GDP</span></strong><span data-dcnode-id="11454" instrument_node=""> (less than an eighth of the UK’s defence spending)</span></li><span data-dcnode-id="11452" instrument_node="">
</span><li data-dcnode-id="11450"><span data-dcnode-id="11451" instrument_node="">No time consuming border checks for travellers (apart from in the UK)</span></li><span data-dcnode-id="11449" instrument_node="">
</span><li data-dcnode-id="11447"><span data-dcnode-id="11448" instrument_node="">The City of London, as a global financial hub, has acted as a bridge between foreign business and the EU</span></li><span data-dcnode-id="11446" instrument_node="">
</span><li data-dcnode-id="11444"><span data-dcnode-id="11445" instrument_node="">British banks and insurance companies have been able to operate freely across the EU </span></li><span data-dcnode-id="11443" instrument_node="">
</span><li data-dcnode-id="11438"><span data-dcnode-id="11442" instrument_node="">Cornwall receives up to </span><strong data-dcnode-id="11440"><span data-dcnode-id="11441" instrument_node="">£750 million per year</span></strong><span data-dcnode-id="11439" instrument_node=""> from the EU Social Fund (ESF)</span></li><span data-dcnode-id="11437" instrument_node="">
</span><li data-dcnode-id="11435"><span data-dcnode-id="11436" instrument_node="">Structural funding for areas of the UK hit by industrial decline (South Wales, Yorkshire)</span></li><span data-dcnode-id="11434" instrument_node="">
</span><li data-dcnode-id="11432"><span data-dcnode-id="11433" instrument_node="">Support for rural areas under the European Agricultural Fund for Regional Development (EAFRD)</span></li><span data-dcnode-id="11431" instrument_node="">
</span><li data-dcnode-id="11426"><span data-dcnode-id="11430" instrument_node="">EU funding for infrastructure projects in the UK including </span><strong data-dcnode-id="11428"><span data-dcnode-id="11429" instrument_node="">£122 million</span></strong><span data-dcnode-id="11427" instrument_node=""> for the “Midlands engine” project</span></li><span data-dcnode-id="11425" instrument_node="">
</span><li data-dcnode-id="11420"><span data-dcnode-id="11424" instrument_node="">Financial support from the EU for </span><strong data-dcnode-id="11422"><span data-dcnode-id="11423" instrument_node="">over 3,000</span></strong><span data-dcnode-id="11421" instrument_node=""> small and medium enterprises (SMEs) in the UK</span></li><span data-dcnode-id="11419" instrument_node="">
</span><li data-dcnode-id="11417"><span data-dcnode-id="11418" instrument_node="">EU funding for the British film industry</span></li><span data-dcnode-id="11416" instrument_node="">
</span><li data-dcnode-id="11414"><span data-dcnode-id="11415" instrument_node="">EU funding for British theatre, music and dance</span></li><span data-dcnode-id="11413" instrument_node="">
</span><li data-dcnode-id="11411"><span data-dcnode-id="11412" instrument_node="">EU funding for British sport, including football apprenticeships, tennis and rugby league</span></li><span data-dcnode-id="11410" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="9461"><time class="comment-time" data-dcnode-id="9462" datetime="2019-05-16T19:51:15+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="9463" href="#comment-2128" itemprop="url"><span data-dcnode-id="9464" instrument_node="">May 16, 2019 at 7:51 pm</span></a></time></p><span data-dcnode-id="9460" instrument_node=""> </span></header><span data-dcnode-id="9458" instrument_node="">

</span><p data-dcnode-id="9451"><span data-dcnode-id="9456" instrument_node="">Sadly you are wrong.  The unelected EU Commission propose (issue) the rules – they are the only ones allowed to.  The EU Council (also unelected) review these and – if they agree – then they send them to the EU Parliament to ratify them.  The EU Parliament hums and ha’s and tweaks here and there (if they read them and get a consensus) and then they pass them.  So the EU Parliament is just a rubber stamp group really. And where are the UK Parliament – well they will be only a rubber stamp group too, once the EU Commission remove all the member states Vetos and Opt-Outs as they promise to do “to streamline processes” (see page 3 of the EU “Vision” document.  So we will all be joining the Euro soon, and handing control of our armed services over to the EU Commission to give the orders.</span><br data-dcnode-id="9455"><span data-dcnode-id="9454" instrument_node="">
It’s all there in black and white, and there are videos on youtube of Juncker, Verhofstadt, Tusk etc all confirming this.  So be careful what you wish for.   </span><a data-dcnode-id="9452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.europarl.europa.eu/resources/library/media/20171023RES86651/20171023RES86651.pdf" rel="nofollow ugc"><span data-dcnode-id="9453" instrument_node="">http://www.europarl.europa.eu/resources/library/media/20171023RES86651/20171023RES86651.pdf</span></a></p><span data-dcnode-id="9450" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="9163"><time class="comment-time" data-dcnode-id="9164" datetime="2019-04-05T13:54:53+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="9165" href="#comment-1773" itemprop="url"><span data-dcnode-id="9166" instrument_node="">April 5, 2019 at 1:54 pm</span></a></time></p><span data-dcnode-id="9162" instrument_node=""> </span></header><span data-dcnode-id="9160" instrument_node="">
</span><div class="comment-content" data-dcnode-id="9155" itemprop="text"><span data-dcnode-id="9159" instrument_node="">
</span><p data-dcnode-id="9157"><span data-dcnode-id="9158" instrument_node="">Its the old “chestnut” of the sovereignty debate yet again…….?.If we were totally self-sufficient ( not trade with anyone; able to defend ourselves against attack, etc) then that polemic would suffice. However, we are not self-sufficient and need to trade with others, either to import goods we need to survive or produce wealth by exporting goods to others. If we were totally self-sufficient, we would not have a seat in the UN to discuss and make international laws. We would not be a member of NATO ( where we have clear representation and input). In fact we would isolate ourselves so much from the rest of the world that they would treat us much like North Korea. ( we would be a closed society). We are not ruled by foreign countries at the moment ( although the Americans have come close to it since the end of the second world war, under their guise of the “special relationship”);-we elect our own government and have our own legal system. Many argue that EU law supersedes UK law. In a way they are right, in that international law supersedes  all domestic law irrespective of nation. The EU is a coalition of the willing, whereby shared common interests are mutually supported. Each nation elects its representatives to the Parliament. The Council of Europe is a talking shop for head of nation states who send their commissioners to do all the heavy lifting ( effectively a civil service/much like we have in Britain). We do not lose sovereignty by being a member of the EU, rather we extend it and influence other member states. That is why so many Brexiiteers do not like TM’s deal. To accept it would destroy our sovereignty as we would become ” a vassal state” . So those that would like a no-deal WTO situation, would trash our economy because tariffs for example on British food would be 60%. Many farmers would be bankrupt as cheap food ( often with questionable food ethics) would flood the market. This would be detrimental to our public health and in turn create food shortages. But hey…this is the cost of 19th century capitalism .</span></p><span data-dcnode-id="9156" instrument_node="">
</span></div><span data-dcnode-id="9154" instrument_node="">

</span><p data-dcnode-id="8831"><span data-dcnode-id="8832" instrument_node="">We can already trade with 127 countries and being a member if the EU has made that easier. </span></p><span data-dcnode-id="8830" instrument_node="">

</span><p data-dcnode-id="8746"><span data-dcnode-id="8753" instrument_node="">In answer to Trevor Mills.</span><br data-dcnode-id="8752"><span data-dcnode-id="8751" instrument_node="">
If you buy a toy for your daughter and it explodes in her face and blinds her it matters a great deal more than you beating your British chest and saying, “No foreigner is going to tell us what to do!” Even more so when people have been totally misled about this country “being run by another country.”</span><br data-dcnode-id="8750"><span data-dcnode-id="8749" instrument_node="">
The reality is that we live in a world where we have benefited enormously from technological and scientific advances. When we buy some device or use some service we the public often have little or no idea how it works or is done. To protect us from exploitation we need regulations. Lots of them.</span><br data-dcnode-id="8748"><span data-dcnode-id="8747" instrument_node="">
If representatives from 28 countries sit down and ask if there is agreement that food-producing companies above a certain size should have to list ingredients, especially substances that can be harmful to people with allergies, there is a good chance that the answer will be yes. If the assembled representatives listen to expert advice and decide that one regulation applied throughout the 28 countries is better than 28 regulations all saying much the same thing, that is common sense in action, not one country ruling another. It means the consumer has the same rights and protection throughout the 28 countries, and businesses have one set of rules to follow instead of 28.</span></p><span data-dcnode-id="8745" instrument_node="">

</span><p data-dcnode-id="8711"><span data-dcnode-id="8712" instrument_node="">For example, the EU now has a Department for Finance and wants to “harmonise” all taxes across the EU.  Are you  happy for someone in Brussels who you did not appoint and have no power to remove can decide what taxes you should pay, including any increases in tax?  </span></p><span data-dcnode-id="8710" instrument_node="">
</span><p data-dcnode-id="8708"><span data-dcnode-id="8709" instrument_node="">And when the vetoes and opt-outs are removed shortly to “make processes more efficient” (page 3 of the EU “Vision” document) will you be happy for Brussels to decide that the UK should join the Euro after all, despite the ERM debacle showing our economy is not suitable?</span></p><span data-dcnode-id="8707" instrument_node="">

</span><p data-dcnode-id="8493"><span data-dcnode-id="8494" instrument_node="">the UK will lose the ability to “agree” new laws with May’s Withdrawal Agreement AND when the Commission replace our Vetos and Opt-outs with QMV (see page 3 of the EU “Vision” document on the EU Parliament website).  If our Government makes a hash of things we can replace them.  However, we cannot replace the EU bodies at all – Commission, Council, or Parliament – so we have lost constrol of our own destiny and our power entirely.  Happy with that?  WTO do have tariffs but there are options to suspend them and change them – it’s up to us and the other countries we are trading with, not the EU.</span></p><span data-dcnode-id="8492" instrument_node="">

</span><p data-dcnode-id="8387"><span data-dcnode-id="8388" instrument_node="">Ken Clarke made the same comment but Andre Neill destroyed his argument, because the EU has no obligation to protect the UK.  So for example the EU could agree for the USA to sell its goods to the EU but not enforce a reciprocal agreement allowing the UK to sell goods to the USA.  And the UK can do nothing to stop this if the other member states out-vote us (which they might do this excluding the UK from the reciprocal agreements would improve their member state’s sales to to the USA).</span></p><span data-dcnode-id="8386" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="8319"><time class="comment-time" data-dcnode-id="8320" datetime="2019-05-10T14:23:31+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="8321" href="#comment-2086" itemprop="url"><span data-dcnode-id="8322" instrument_node="">May 10, 2019 at 2:23 pm</span></a></time></p><span data-dcnode-id="8318" instrument_node=""> </span></header><span data-dcnode-id="8316" instrument_node="">
</span><div class="comment-content" data-dcnode-id="8311" itemprop="text"><span data-dcnode-id="8315" instrument_node="">
</span><p data-dcnode-id="8313"><span data-dcnode-id="8314" instrument_node="">Trevor, most of what I was going to say has been covered by Martin’s reply to you.  In addition, it will be ages before we can secure 127 trade deals as we only have about 8 trade deals, separately from the EU, at the moment!  I think that following some well-thought out EU rules is not being governed by another country.  Unfortunately it seems, as Martin has already said, that the rich will get richer and the poor get poorer whether we are in the EU or not.</span></p><span data-dcnode-id="8312" instrument_node="">

</span><span class="comment-author-name" data-dcnode-id="8295" itemprop="name"><span data-dcnode-id="8296" instrument_node="">steve jones</span></span><span data-dcnode-id="8294" instrument_node=""> </span><span class="says" data-dcnode-id="8292"><span data-dcnode-id="8293" instrument_node="">says</span></span><span data-dcnode-id="8291" instrument_node=""> </span></p><span data-dcnode-id="8289" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="8285"><time class="comment-time" data-dcnode-id="8286" datetime="2019-05-11T09:00:39+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="8287" href="#comment-2095" itemprop="url"><span data-dcnode-id="8288" instrument_node="">May 11, 2019 at 9:00 am</span></a></time></p><span data-dcnode-id="8284" instrument_node=""> </span></header><span data-dcnode-id="8282" instrument_node="">
</span><div class="comment-content" data-dcnode-id="8274" itemprop="text"><span data-dcnode-id="8281" instrument_node="">
</span><p data-dcnode-id="8279"><span data-dcnode-id="8280" instrument_node="">It does seem odd, that those who seek to leave the EU, are convinced that the UK, on its own, can strike better bilateral trade deals than the combined might of 28 member states working together. Do they realistically think that the UK will have the economic muscle to stand up to the big bully boys of international trade? Some of them even think that erecting trade barriers between the UK and the EU, is going to increase our prosperity, which goes against all the accepted norms of free marketeers and the constant drive to reduce tariffs, to make trade easier. Utterly bizarre that Leavers are adamant that this approach will be good for the country. I am still waiting for a rational explanation of these ‘benefits’ of leaving the club.</span></p><span data-dcnode-id="8278" instrument_node="">
</span><p data-dcnode-id="8276"><span data-dcnode-id="8277" instrument_node="">I don’t think many people remember what happened in the Suez crisis in ’56. It’s a salutary lesson in how larger economies use their economic muscle to achieve the policy aims. In Egypt, in ’56, Nasser nationalised the Suez Canal. We told him he couldn’t do that, he told us to bog off, we with our French allies, took military action against him, but left in 7 days, after the USA sold billions of dollars worth of pounds on the financial markets. Our PM, Eden rang President Ike, and asked him, ‘why?’. He replied, as soon as you piss off from Egypt, we’ll buy pounds. So we left! you see, on your own, you have to do what the big boys tell you to do, otherwise it’s painful. It’s the way of the world. No sovereignty from ’56 onwards. Toe the line or else!</span></p><span data-dcnode-id="8275" instrument_node="">
</span></div><span data-dcnode-id="8273" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="8270"><a aria-label="Reply to steve jones" class="comment-reply-link" data-belowelement="article-comment-2095" data-commentid="2095" data-dcnode-id="8271" data-postid="1114" data-replyto="Reply to steve jones" data-respondelement="respond" href="#comment-2095" rel="nofollow"><span data-dcnode-id="8272" instrument_node="">Reply</span></a></div><span data-dcnode-id="8269" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="7504"><time class="comment-time" data-dcnode-id="7505" datetime="2019-04-03T21:44:06+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="7506" href="#comment-1751" itemprop="url"><span data-dcnode-id="7507" instrument_node="">April 3, 2019 at 9:44 pm</span></a></time></p><span data-dcnode-id="7503" instrument_node=""> </span></header><span data-dcnode-id="7501" instrument_node="">
</span><div class="comment-content" data-dcnode-id="7475" itemprop="text"><span data-dcnode-id="7500" instrument_node="">
</span><p data-dcnode-id="7477"><span data-dcnode-id="7499" instrument_node="">Wendy, dyou really think we pay too much? As number 21 in the ‘98 Reasons To Stay In The EU’ list states, we send the EU ‘less than an eighth of the UK’s defence spending’. Here’s a good and easily relatable analogy – If we all thought of our contribution to the EU on a personal level, it actually “costs citizens less than half a cup of coffee daily — and as little as a tenth of a cup — in most of the 28 member countries”. Yes, that’s right. Each. You couldn’t buy half a pint in a Father Jack’s (Tim Martin’s) Wetherspoon for the same amount either. </span><img alt="😜" class="emoji" data-dcnode-id="7498" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f61c.svg&amp;raw"><span data-dcnode-id="7497" instrument_node=""> </span><a data-dcnode-id="7495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.eu/article/the-eu-membership-value-post-brexit-budget-coffee-index/" rel="nofollow ugc"><span data-dcnode-id="7496" instrument_node="">https://www.politico.eu/article/the-eu-membership-value-post-brexit-budget-coffee-index/</span></a><br data-dcnode-id="7494"><span data-dcnode-id="7493" instrument_node="">
Personally, I don’t mind paying that amount for us to have access to the world’s largest trading bloc, for the ability to work, live and retire in an EU country, for the UK to have a say in the EU and be a part in shaping its future, and for a safer country due to access to the EU’s crime-fighting database. The pros far, far outweigh the cons. Type your postcode into here to see how the EU has benefitted your area —&gt; </span><a data-dcnode-id="7491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.myeu.uk/" rel="nofollow ugc"><span data-dcnode-id="7492" instrument_node="">https://www.myeu.uk</span></a><br data-dcnode-id="7490"><span data-dcnode-id="7489" instrument_node="">
Barack Obama said, “Having the UK in the European Union gives us much greater confidence about the strength of the transatlantic union and is part of the cornerstone of institutions built after the second world war that has made the world safer and more prosperous.” I don’t think you’d catch the current Trumpet president saying anything similar, he can’t wait to get his chlorinated chicken onto the UK’s dinner plates, and as this article reveals, it “may be the least of our worries when it comes to signing a trade deal with Trump”. </span><a data-dcnode-id="7487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.co.uk/voices/chlorinated-chicken-usa-trade-deal-donald-trump-brexit-a8295141.html" rel="nofollow ugc"><span data-dcnode-id="7488" instrument_node="">https://www.independent.co.uk/voices/chlorinated-chicken-usa-trade-deal-donald-trump-brexit-a8295141.html</span></a><span data-dcnode-id="7486" instrument_node="">. Say goodbye to the health and food and other safety standards along with all the other benefits of being in the EU. And anyone who believes, “Leave means Leave, no deal, no problem, let’s go WTO”, please watch this, it’s a podcast hosted by three men who give their expert opinion, firmly based on facts </span><a data-dcnode-id="7484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/Sx4AF-3Rd44" rel="nofollow ugc"><span data-dcnode-id="7485" instrument_node="">https://youtu.be/Sx4AF-3Rd44</span></a><br data-dcnode-id="7483"><span data-dcnode-id="7482" instrument_node="">
Leaving the EU won’t make us great again. All it’ll do is confirm that we’re better off within than without.</span><br data-dcnode-id="7481"><span data-dcnode-id="7480" instrument_node="">
As far as slogans go, don’t you think ‘Remain and Reform’ has a much more hopeful and positive ring to it than ‘Leave Means Leave?’</span><br data-dcnode-id="7479"><span data-dcnode-id="7478" instrument_node="">
#RemainAndReform #BinBrexit</span></p><span data-dcnode-id="7476" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="4216"><time class="comment-time" data-dcnode-id="4217" datetime="2019-04-06T22:59:48+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="4218" href="#comment-1801" itemprop="url"><span data-dcnode-id="4219" instrument_node="">April 6, 2019 at 10:59 pm</span></a></time></p><span data-dcnode-id="4215" instrument_node=""> </span></header><span data-dcnode-id="4213" instrument_node="">

</span><p data-dcnode-id="4208"><span data-dcnode-id="4211" instrument_node="">Not to mention the minor diversion from the Russians which cost them 27 million dead both military and civilian, whilst the USA was setting up camp in the UK to save it. The brexiter schmucks who never even got into an argument face to face, much less got into sniffing distance of a war continue to spout garbage about WWII and and THEY beat Hitler. It makes me sick to my stomach. Of course we were in it but as part of an allied (that means with others you dummies) effort that ultimately prevailed.</span><br data-dcnode-id="4210"><span data-dcnode-id="4209" instrument_node="">
There was a bloke called Churchill ( no doubt a hero of yours) whom I believe had a passing involvement in this skirmish and also the fracas 2 decades earlier. As such a person would you say after a period of reflection on these two distractions he might have something useful, indeed enlightening to say about them both. Well he certainly did and as one of the greatest orators of the 20th century it is worth a read. I suspect you have no clue what he said so I reproduce here part of one of his greatest speeches ever (amongst many) given in Zurich on September 19th 1946. Read it and steel yourself against the content because you won’t like it. There is a lot more but you will hate that so I have spared you.</span></p><span data-dcnode-id="4207" instrument_node="">
</span><p data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">“I wish to speak about the tragedy of Europe, this noble continent, the home of all the great parent races of the Western world, the foundation of Christian faith and ethics, the origin of most of the culture, arts, philosophy and science both of ancient and modern times. If Europe were once united in the sharing of its common inheritance there would be no limit to the happiness, prosperity and glory which its 300 million or 400 million people would enjoy. Yet it is from Europe that has sprung that series of frightful nationalistic quarrels, originated by the Teutonic nations in their rise to power, which we have seen in this 20th century and in our own lifetime wreck the peace and mar the prospects of all mankind.</span></p><span data-dcnode-id="4204" instrument_node="">
</span><p data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">What is this plight to which Europe has been reduced? Some of the smaller states have indeed made a good recovery, but over wide areas are a vast, quivering mass of tormented, hungry, careworn and bewildered human beings, who wait in the ruins of their cities and homes and scan the dark horizons for the approach of some new form of tyranny or terror. Among the victors there is a Babel of voices, among the vanquished the sullen silence of despair. That is all that Europeans, grouped in so many ancient states and nations, and that is all that the Germanic races have got by tearing each other to pieces and spreading havoc far and wide. Indeed, but for the fact that the great republic across the Atlantic realised that the ruin or enslavement of Europe would involve her own fate as well, and stretched out hands of succour and guidance, the Dark Ages would have returned in all their cruelty and squalor. They may still return.</span></p><span data-dcnode-id="4201" instrument_node="">
</span><p data-dcnode-id="4199"><span data-dcnode-id="4200" instrument_node="">Yet all the while there is a remedy which, if it were generally and spontaneously adopted by the great majority of people in many lands, would as by a miracle transform the whole scene and would in a few years make all Europe, or the greater part of it, as free and happy as Switzerland is today. What is this sovereign remedy? It is to recreate the European fabric, or as much of it as we can, and to provide it with a structure under which it can dwell in peace, safety and freedom. We must build a kind of United States of Europe. In this way only will hundreds of millions of toilers be able to regain the simple joys and hopes which make life worth living. The process is simple. All that is needed is the resolve of hundreds of millions of men and women to do right instead of wrong and to gain as their reward blessing instead of cursing.</span></p><span data-dcnode-id="4198" instrument_node="">
</span><p data-dcnode-id="4196"><span data-dcnode-id="4197" instrument_node="">Therefore I say to you “Let Europe arise!”</span></p><span data-dcnode-id="4195" instrument_node="">
</span><p data-dcnode-id="4193"><span data-dcnode-id="4194" instrument_node="">Bu***r me, Who’d have thought he would say that and get it right, only to see his own People do their damndest to destroy his dream. He will be spinning in his grave.</span></p><span data-dcnode-id="4192" instrument_node="">
</span></div><span data-dcnode-id="4190" instrument_node="">

</span><p data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">May be it should! I have recent experience of both UK and Spanish state health services and give me a well organised, extremely thorough and efficient service with single rooms, personal en suite, unlimited visiting times and visitor’s sofa bed (visitor bed clothes provided) to an impersonal ward of 6 or 8 people ( my father in law listened to two people die in beds adjacent to his in a recent two week stay. Victorian) with a curtain as ones only means of privacy anyday. And as for transport! Don’t get me started on the train service compared with the Spanish service and prices. Road network, vastly superior. Police &amp; judicial services, no messing here. No political correctness worries. OK education leaves a lot to be desired but, having taught in both countries, I wouldn’t wish a career in teaching in Britain on anyone. Britain is a dying country unless you are wealthy enough to financially self sufficient to rise above it. And Don’t tell me that it is because of the immigration, I live in a multicultural area with a large European, South American and North African population. No racial tensions unlike the major intolerances of UK society. Britain can learn so much from the European mainland.</span></p><span data-dcnode-id="3752" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="3087"><time class="comment-time" data-dcnode-id="3088" datetime="2019-03-29T12:08:52+00:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="3089" href="#comment-1637" itemprop="url"><span data-dcnode-id="3090" instrument_node="">March 29, 2019 at 12:08 pm</span></a></time></p><span data-dcnode-id="3086" instrument_node=""> </span></header><span data-dcnode-id="3084" instrument_node="">

</span><p data-dcnode-id="3077"><span data-dcnode-id="3082" instrument_node="">I do not have the time to go through all your 98 reasons to stay, rather than leave, the EU. However, as small businesses are concerned, have you ever tried to set up a business in France for example? My friend and I came up with a idea of selling ice cream and cold drinks on the canal from cap d’agde. He speaks fluent French so we thought that this idea might work. However, we gave up the idea due to the amount of red tape that is in place. I would also like to point out the protectionism of the French when it comes to ski instructors. The next time you go skiing there tell me how many British ski instructors you can find. I have been told that there are so many loops you have to jump that it makes it neigh on impossible to get a permit.</span><br data-dcnode-id="3081"><span data-dcnode-id="3080" instrument_node="">
Please let me know if you think I have got this wrong and starting a small business in the EU is really simple. I would love to know.</span><br data-dcnode-id="3079"><span data-dcnode-id="3078" instrument_node="">
P.S. If you want to use my idea of selling ice cream then dig out. I wish you luck.</span></p><span data-dcnode-id="3076" instrument_node="">

</span><p data-dcnode-id="2455"><span data-dcnode-id="2464" instrument_node="">Since it is the EU policy to welcome Immigrants/Refugees from outside the EU, would it be possible for the EU to pay for this out of the contributions the member states make at least for the first 5 years.</span><br data-dcnode-id="2463"><span data-dcnode-id="2462" instrument_node="">

                                                Or is it a fact that the UK is not diligent in enforcing such a rule because we have borders that are open to allowing movement without checks.  This freedom of movement thing allows theft and lawlessness to occur. Everyone who transits between EU countries should stop at borders or before they transit and register their passport or ID this includes children and could be done days before travelling</span><br data-dcnode-id="2459"><span data-dcnode-id="2458" instrument_node="">
                               There are computer systems which could automatically pass the information to the exit/entry country and x reference the records. Payments could automatically stop/start iaw the information on file.</span><br data-dcnode-id="2457"><span data-dcnode-id="2456" instrument_node="">

</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Having lived in Germany for 12 years, since the Lisbon treaty came to fruition ,I think the  member states have made a mistake. Germany who at the centre of the EU have benefitted immensely, however  I have seen a decline in the living standards of working class Germans in this period. freedom of movement has pushed wages down on newer contracts for some German workers , IMHO freedom of movement has only benefitted the Rich businesses, also the bail outs of the poorer countrys (which was not allowed in the Maastrict treaty ) has again had an effect on the German Economy. German Big Business will always push for the EU and  bank rolling various EU bureaucrats to make sure the gravy train keeps rolling. The UK has never been fully accepted by the EU, the British are a different culture however the EU welcomed the money from the British Tax payer. I think the EU has gone to far in its ideas but will never be able to turn back , the poorer countrys love it because they get more money from the EU than they put in   , France and Germany love it because they get more money from it as exports are cheaper  because of cheaper logistic costs  as they are geographically at the centre of EU , That leaves the UK, The UK is the third largest when it comes to how much money it puts in , its  exports cost more because of logistics costs etc  so in effect when it comes to the EU the UK is  running at a loss. Trade will always carry on between the European countrys as it has done for over 2000 years including the UK.  </span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">I used to pay for SKY TV  its a good service but I can manage without it , one day I might go back Im sure they will be happy to have my subscription back. I think the UK should give it a go and leave and see if it can manage without the EU,  trade will carry on , science will carry on ,the arts will carry on. One day if the UK wants to go back im sure the Greed of the EU and the greed of mainland  European big business will welcome the UK back.   I just hope that the UK leaves other wise UK Democracy will be permanently affected, One citizen One Vote will mean nothing. The list above does not benefit the poor of the UK it benefits  the middle classes and the richer parts of the UK. The list is propaganda  ask any citizen who lives on the streets of any country in the EU how the list above helps them- it doesn’t please  WAKE UP REMAINERS and smell the coffee or pack your bags and come and live in mainland Europe and see the truth its not so rosy.</span></p><span data-dcnode-id="498" instrument_node="">

</span><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">wow every single one of those 98 are just complete and utter nonsense! the eu is a tin pot dictatorship that is self serving the uk, and almost all of the other countries are weaker in every which way. Trade has decimated jobs in the uk with the subsidising of imports over uk based production, farming has been subsidised for years not to farm, cheap imports have destroyed all uk manufacturing companies. fishing has been near enough destroyed. we have suffered mass immigration having a knock on social cohesion, jobs, suppression of wages, increased violent crime, increased disease, destruction of our green belt land through home building that wasn’t and still isn’t needed (plenty of derelict housing and obviously old commercial land from the destruction of our once great manufacturing base!). freedom of movement was the biggest scam going, only approved by those who cant remember that we moved very freely before the eec and the eu. I work and holiday outside the eu no problems. the eu laws are suppressive. the accountability of our own government has disappeared as they are all in cahoots with the eu dictators and can just say well we tried, not one single vote the uk has made during our membership has made a difference, 72 occasions the uk (of which we where never made aware of which I find worrying as it effects us all) has objected and haven’t won a single time! so the uk is stopped from doing what it wants. another scary point is this unelected dictatorship decides on the laws before they are even voted on and a lot of the time the vote is just a formality the law will always be passed if the unelected eu council want it to. in short the eu is a continuation of what hitter set out to do over 80 years ago, just this time the proof is the power of the pen is greater than the sword. with the eu using the left wings empathy and paper thin reasoning against them shrouding the ultimate goal of complete control in left wing agenda of caring and freedoms when in fact it has removed more freedoms away from hard earning British (as well as other People in their own countries!) I am still amazed that so many people haven’t the ability to use the most basic of critical thinking, also actually step back park their well meaning morals and virtues and look at something subjectively.</span></p><span data-dcnode-id="356" instrument_node="">

</span><div class="comment-content" data-dcnode-id="178" itemprop="text"><span data-dcnode-id="182" instrument_node="">
</span><p data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">As a nation, when individually asked if we trust our politicians,  we generally respond with “No”.   However,  like lambs when it comes to election times we listen to debates and points of view publicised by all ambitious political persuasions and we depend informed balanced argument from the not impartial media.  The public were never prepared for BREXIT.  We went to the ballot box trusting in our politicians as usual.  How many of us could name an European MP.   These people have for years failed to represent our views and now failed to put over to the electorate the bigger picture.  If we have left the EC due to dissatisfaction with how it is run and affecting our daily lives.  Then we have been poorly represented and deceived.  The European Parliament could have been run tighter and better.  Our home politics too is suffering.  Successive weak and indecisive leadership has and is letting the dependent voter down.  I wish the EC a better future with out us but I don’t feel that is their answer either.</span></p><span data-dcnode-id="179" instrument_node="">
