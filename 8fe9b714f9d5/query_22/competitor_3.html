            <template shadowrootmode="closed"><html data-dcnode-id="1"><head data-dcnode-id="276"><meta name="robots" content="noindex, nofollow"><meta charset="utf-8"></head><body data-dcnode-id="2"><span data-dcnode-id="284" instrument_node="">
</span><meta content="" data-dcnode-id="283" name="Author"><span data-dcnode-id="282" instrument_node="">
</span><meta content="Microsoft FrontPage 3.0" data-dcnode-id="281" name="GENERATOR"><span data-dcnode-id="280" instrument_node="">
</span><title data-dcnode-id="278">HOW NATO HAS CHANGED IN THE POST COLD WAR ERA</title><span data-dcnode-id="277" instrument_node="">
</span><span data-dcnode-id="275" instrument_node="">
</span><span data-dcnode-id="274" instrument_node="">
</span><p data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">*97032101.WWE </span></p><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">FACT SHEET: HOW NATO HAS CHANGED IN THE POST COLD WAR ERA</span></p><span data-dcnode-id="268" instrument_node="">
</span><p data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">(Prepared and compiled by the Bureau of European and Canadian Affairs, State
Department) (1960) March 21, 1997 Posted by the United States Information Service</span></p><span data-dcnode-id="265" instrument_node="">
</span><hr data-dcnode-id="264"><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Washington -- The military system of the North Atlantic Treaty Organization today is
fundamentally different from the system that existed before the end of the Cold War.
Alliance doctrine has changed and NATO's standing military forces have been reduced
radically because the alliance is no longer postured against an extended military threat
or enemy to the East.</span></p><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Allied nuclear forces no longer are targeted on any nation nor poised on alert, and
nuclear readiness levels have been substantially reduced. In addition, NATO pledged in
December 1996 that it has "no intention, no plans, and no reason" to deploy
nuclear weapons on the territory of any new alliance member who joins as part of the
forthcoming alliance enlargement process.</span></p><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">As NATO Secretary General Javier Solana pointed out earlier this year, "NATO has
changed beyond recognition" as it has adopted a new security approach which embraces
the principle of cooperation with non-member countries and other institutions.</span></p><span data-dcnode-id="254" instrument_node="">
</span><p data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">A new European security architecture is evolving through the interlocking efforts of a
number of major European international organizations:</span></p><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">-- OSCE (Organization for Security and Cooperation in Europe) discussions on a security
model for the 21st century are developing the modalities for a wider security community
based on shared values;</span></p><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">-- The European Union is evolving its own role in European security into the next
century in the context of the Intergovernmental Conference; and</span></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">-- The Western European Union (WEU) is gaining new capacities to act.</span></p><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">In the context of developing this new European security architecture -- one that
provides a full role for Russia -- NATO is undergoing fundamental changes as it prepares
for a major summit in Spain in July. In addition, adaptation of the treaty on Conventional
Forces in Europe (CFE) is under way.</span></p><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">All of these initiatives reflect the fundamentally changed nature of European security;
the historic shift from confrontation to cooperation, from suspicion to transparency, from
blocs to inclusiveness -- for Russia as for all other European states.</span></p><span data-dcnode-id="236" instrument_node="">
</span><p data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">THE NATURE OF THE ALLIANCE</span></p><span data-dcnode-id="233" instrument_node="">
</span><p data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Since the end of the Cold War the alliance has been shifting direction. For example:</span></p><span data-dcnode-id="230" instrument_node="">
</span><p data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">-- NATO no longer considers the former Soviet Union to be an adversary;</span></p><span data-dcnode-id="227" instrument_node="">
</span><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">-- All former Eastern-bloc communist states are welcome to cooperate with NATO through
programs such as Partnership for Peace (PFP);</span></p><span data-dcnode-id="224" instrument_node="">
</span><p data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">-- NATO does not seek to isolate any country in the former Eastern bloc; and</span></p><span data-dcnode-id="221" instrument_node="">
</span><p data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">-- The alliance seeks to erase divisions on the European continent.</span></p><span data-dcnode-id="218" instrument_node="">
</span><p data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">NATO also seeks to pursue a broad approach to stability and security in Europe through
its new Strategic Concept which:</span></p><span data-dcnode-id="215" instrument_node="">
</span><p data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">-- Identifies the changing European security landscape, seeks to encourage changes
already under way in the East, and stresses dialogue and partnership with the emerging
democracies in the former Warsaw Pact;</span></p><span data-dcnode-id="212" instrument_node="">
</span><p data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">-- Notes the importance of addressing, for the first time, security threats beyond the
NATO area, and establishes the basis for peacekeeping and coalition crisis management
operations as important NATO missions;</span></p><span data-dcnode-id="209" instrument_node="">
</span><p data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">-- Restructures the forces and missions of NATO's integrated military commands to
better deal with Europe's new security environment by focusing on peacekeeping and
cooperative military efforts open to all European states willing to participate;</span></p><span data-dcnode-id="206" instrument_node="">
</span><p data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">-- Stresses that the fundamental purpose of nuclear weapons is to preserve the peace.</span></p><span data-dcnode-id="203" instrument_node="">
</span><p data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">NATO's commitment to an inclusive Europe is manifest through:</span></p><span data-dcnode-id="200" instrument_node="">
</span><p data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">-- The creation of the North Atlantic Cooperation Council (NACC) in November 1991
establishing a new institutional framework for political security consultation and
cooperation between NATO and the former communist states of the East (See footnote +), and</span></p><span data-dcnode-id="197" instrument_node="">
</span><p data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">-- An expressed willingness, beginning in 1993, to lend its available resources and
expertise on a case-by-case basis for peacekeeping activities outside NATO territory under
the responsibility of the OSCE (formerly the Conference on Security and Cooperation in
Europe) and the United Nations. NATO's peacekeeping force in Bosnia became the first
example of this -- drawing on the support of Russia and other partners.</span></p><span data-dcnode-id="194" instrument_node="">
</span><p data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">FORCE STRUCTURE</span></p><span data-dcnode-id="191" instrument_node="">
</span><p data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">NATO has initiated significant changes in policy, procedure and structure while
reducing and restructuring headquarters and staffs to achieve a streamlined and efficient
alliance command structure. Elimination of between 1,200 and 2,600 military positions is
being considered.</span></p><span data-dcnode-id="188" instrument_node="">
</span><p data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">The following changes have occurred since 1991:</span></p><span data-dcnode-id="185" instrument_node="">
</span><p data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">-- Defense budgets have decreased by 30 percent;</span></p><span data-dcnode-id="182" instrument_node="">
</span><p data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">-- Armed forces have decreased in size by 28 to 40 percent for most countries;</span></p><span data-dcnode-id="179" instrument_node="">
</span><p data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">-- Land forces are down 25 percent; major warships by 20 percent; and combat aircraft
by 30 percent;</span></p><span data-dcnode-id="176" instrument_node="">
</span><p data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">-- U.S. forces in Europe are down 66 percent from a total of 300,000 to 100,000
military personnel; air wings reduced from 4 to 2; and brigades from 17 to 4 since 1989;</span></p><span data-dcnode-id="173" instrument_node="">
</span><p data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">-- NATO has shifted its emphasis from high-readiness, forward-deployed heavy units to
lower-readiness forces and a rapid reaction corps oriented toward the new missions;</span></p><span data-dcnode-id="170" instrument_node="">
</span><p data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">-- All chemical weapons have been withdrawn; and</span></p><span data-dcnode-id="167" instrument_node="">
</span><p data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">-- Eighty percent of nuclear weapons have been withdrawn.</span></p><span data-dcnode-id="164" instrument_node="">
</span><p data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">NATO's integrated command structure has been reduced or streamlined since 1990 in the
following ways:</span></p><span data-dcnode-id="161" instrument_node="">
</span><p data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">-- Major NATO commands have been reduced from 3 to 2;</span></p><span data-dcnode-id="158" instrument_node="">
</span><p data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">-- Major subordinate commands have dropped from 4 to 3;</span></p><span data-dcnode-id="155" instrument_node="">
</span><p data-dcnode-id="153"><span data-dcnode-id="154" instrument_node="">-- AFNORTHWEST (Allied Forces Northwest, Europe) has been reduced in size; and</span></p><span data-dcnode-id="152" instrument_node="">
</span><p data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">-- Two elements of AFCENT (Allied Forces Central Europe) -- CENTAG (Army Group, Central
Europe) and NORTHAG (Northern Army Group, Central Europe) -- were dismantled.</span></p><span data-dcnode-id="149" instrument_node="">
</span><p data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">EUROPEANIZATION OF THE ALLIANCE</span></p><span data-dcnode-id="146" instrument_node="">
</span><p data-dcnode-id="144"><span data-dcnode-id="145" instrument_node="">NATO is working to develop a visible European security arrangement within the alliance
structure, which could be used for WEU-led operations. In a reorganized, slimmed-down
structure the number of NATO commands will be reduced from 65 to about 22 to 23, with
European officers playing a proportionately greater role.</span></p><span data-dcnode-id="143" instrument_node="">
</span><p data-dcnode-id="141"><span data-dcnode-id="142" instrument_node="">NATO is also supporting the development of the European Security and Defense identity
(ESDI) within the framework of the alliance by:</span></p><span data-dcnode-id="140" instrument_node="">
</span><p data-dcnode-id="138"><span data-dcnode-id="139" instrument_node="">-- Conducting, in cooperation with the WEU, military planning and exercises, in
accordance with NATO procedures and standards, for WEU missions identified by the WEU;</span></p><span data-dcnode-id="137" instrument_node="">
</span><p data-dcnode-id="135"><span data-dcnode-id="136" instrument_node="">-- Developing mechanisms for the identification of NATO capabilities, assets and
headquarters and headquarter elements for WEU-led operations;</span></p><span data-dcnode-id="134" instrument_node="">
</span><p data-dcnode-id="132"><span data-dcnode-id="133" instrument_node="">-- Making arrangements for the release of these assets for WEU-led operations; and</span></p><span data-dcnode-id="131" instrument_node="">
</span><p data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">-- Redefining European command arrangements within NATO that could prepare and conduct
WEU-led missions.</span></p><span data-dcnode-id="128" instrument_node="">
</span><p data-dcnode-id="126"><span data-dcnode-id="127" instrument_node="">The goal of having European allies shoulder greater responsibility for European
security includes the following changes at SHAPE (Supreme Headquarters Allied Powers
Europe):</span></p><span data-dcnode-id="125" instrument_node="">
</span><p data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">-- The position of Chief of Staff (a four-star general) is now filled by a European
rather than an American;</span></p><span data-dcnode-id="122" instrument_node="">
</span><p data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">-- There is a single European Deputy SACEUR (Supreme Allied Commander, Europe);</span></p><span data-dcnode-id="119" instrument_node="">
</span><p data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">-- The Deputy Chief of Staff for Intelligence has been shifted from a U.S. position to
a European post; and</span></p><span data-dcnode-id="116" instrument_node="">
</span><p data-dcnode-id="114"><span data-dcnode-id="115" instrument_node="">-- There are more German and British generals than American now serving in SHAPE.</span></p><span data-dcnode-id="113" instrument_node="">
</span><p data-dcnode-id="111"><span data-dcnode-id="112" instrument_node="">PARTNERSHIP FOR PEACE (PFP)</span></p><span data-dcnode-id="110" instrument_node="">
</span><p data-dcnode-id="108"><span data-dcnode-id="109" instrument_node="">PFP seeks to forge a real partnership with the new democracies as well as other
European states who are willing and able to participate. Participants work within PFP to
promote transparency in defense planning, democratic control of the military, and joint
planning and training with NATO military forces.</span></p><span data-dcnode-id="107" instrument_node="">
</span><p data-dcnode-id="105"><span data-dcnode-id="106" instrument_node="">PFP's main focus is on practical security cooperation such as developing the capacity
to work together in crisis management, peacekeeping, and humanitarian assistance.</span></p><span data-dcnode-id="104" instrument_node="">
</span><p data-dcnode-id="102"><span data-dcnode-id="103" instrument_node="">At NATO headquarters:</span></p><span data-dcnode-id="101" instrument_node="">
</span><p data-dcnode-id="99"><span data-dcnode-id="100" instrument_node="">-- A Military Cooperation and Regional Security Division (headed by a French general)
has been created; and</span></p><span data-dcnode-id="98" instrument_node="">
</span><p data-dcnode-id="96"><span data-dcnode-id="97" instrument_node="">-- Partnership Branches have been created in the Political Affairs and Defense Planning
and Policy Divisions of the International Staff.</span></p><span data-dcnode-id="95" instrument_node="">
</span><p data-dcnode-id="93"><span data-dcnode-id="94" instrument_node="">In an effort to enhance PFP, the alliance has:</span></p><span data-dcnode-id="92" instrument_node="">
</span><p data-dcnode-id="90"><span data-dcnode-id="91" instrument_node="">-- Established the Atlantic Partnership Council (APC) to provide a new single framework
for enhanced political and military consultative and cooperative functions. The APC is
designed to enhance the ability of all Partners to consult, cooperate and make decisions
with NATO.</span></p><span data-dcnode-id="89" instrument_node="">
</span><p data-dcnode-id="87"><span data-dcnode-id="88" instrument_node="">COMBINED JOINT TASK FORCES (CJTF)</span></p><span data-dcnode-id="86" instrument_node="">
</span><p data-dcnode-id="84"><span data-dcnode-id="85" instrument_node="">The Combined Joint Task Forces is designed to be a way for the Europeans to address
security concerns under their own banner and allow non-NATO partners to participate in
NATO-led contingencies such as peacekeeping in Bosnia.</span></p><span data-dcnode-id="83" instrument_node="">
</span><p data-dcnode-id="81"><span data-dcnode-id="82" instrument_node="">It also provides "separable, but not separate" military structures and
supports a strengthened European pillar of the alliance through WEU.</span></p><span data-dcnode-id="80" instrument_node="">
</span><p data-dcnode-id="78"><span data-dcnode-id="79" instrument_node="">Large-scale CJTFs are expected to be created at NATO's regional commands, offering the
prospect of major Partner (including Russian) involvement.</span></p><span data-dcnode-id="77" instrument_node="">
</span><p data-dcnode-id="75"><span data-dcnode-id="76" instrument_node="">THE CFE TREATY</span></p><span data-dcnode-id="74" instrument_node="">
</span><p data-dcnode-id="72"><span data-dcnode-id="73" instrument_node="">As CFE is adapted and modernized, NATO is making serious efforts to address Russian
concerns about the Treaty:</span></p><span data-dcnode-id="71" instrument_node="">
</span><p data-dcnode-id="69"><span data-dcnode-id="70" instrument_node="">-- In its adaptation proposal NATO is trying to respond to Russian security concerns
(especially over possible future concentrations of forces in the territory of new NATO
members); and</span></p><span data-dcnode-id="68" instrument_node="">
</span><p data-dcnode-id="66"><span data-dcnode-id="67" instrument_node="">-- NATO consultations and seminars are ongoing with NACC-PFP partners on conventional
arms control implementation.</span></p><span data-dcnode-id="65" instrument_node="">
</span><p data-dcnode-id="63"><span data-dcnode-id="64" instrument_node="">COUNTERING PROLIFERATION OF WEAPONS OF MASS DESTRUCTION</span></p><span data-dcnode-id="62" instrument_node="">
</span><p data-dcnode-id="60"><span data-dcnode-id="61" instrument_node="">NATO has expanded its consultations with NACC-PFP Partners on disarmament and issues
related to countering proliferation of weapons of mass destruction, with Russia as an
active participant in the regular meetings of experts. Key to this is assistance to the
NIS (Newly Independent States) for nuclear weapons dismantlement/safe storage (with NATO
compiling data on and seeking to coordinate allied financial and technical contributions).</span></p><span data-dcnode-id="59" instrument_node="">
</span><p data-dcnode-id="57"><span data-dcnode-id="58" instrument_node="">In May 1994, NATO approved two milestone documents: a political framework paper
structuring the broad political-military approach of the Alliance to proliferation and a
three-phase work plan for the newly created Senior Defense Group on Proliferation (DGP) to
address the defense implications of proliferation. NATO works with Russia and a number of
other Partners in this important area.</span></p><span data-dcnode-id="56" instrument_node="">
</span><p data-dcnode-id="54"><span data-dcnode-id="55" instrument_node="">TRANSPARENCY</span></p><span data-dcnode-id="53" instrument_node="">
</span><p data-dcnode-id="51"><span data-dcnode-id="52" instrument_node="">The goal of transparency is not simply for Partners to be transparent to NATO, but to
each other and for NATO to be transparent in return. The theme of transparency permeates
all of the NATO's outreach efforts, including NACC and PFP.</span></p><span data-dcnode-id="50" instrument_node="">
</span><p data-dcnode-id="48"><span data-dcnode-id="49" instrument_node="">NACC activities involve nations and NATO on topics such as science, peacekeeping,
challenges of modern society, information, and defense planning. PFP activities go into
greater depth into military-to-military contacts, civil-military relations,
defense-to-defense exchanges and political cooperation and consultation.</span></p><span data-dcnode-id="47" instrument_node="">
</span><p data-dcnode-id="45"><span data-dcnode-id="46" instrument_node="">The aim of transparency is to promote mutual trust and the breakdown of old,
out-of-date stereotypes, and to provide the opportunity for nations to continue reducing
force levels to reflect a new strategic environment, enabling them to focus resources,
instead, on internal, societal requirements.</span></p><span data-dcnode-id="44" instrument_node="">
</span><p data-dcnode-id="42"><span data-dcnode-id="43" instrument_node="">These benefits, in turn, lead to settling old disputes, building new partnerships based
on common interests, cooperating to solve transnational problems, crafting mutually
beneficial and interdependent business arrangements, and, in total, building the same kind
of prosperous, normalized relations that Allies have built and shared for 50 years.</span></p><span data-dcnode-id="41" instrument_node="">
</span><p data-dcnode-id="39"><span data-dcnode-id="40" instrument_node="">In this context, the Alliance has proposed to Russia the establishment of military
liaison missions, placing Russian officers at NATO headquarters, SHAPE, and SACLANT
(Supreme Allied Commander Atlantic). In addition, some Russian SFOR (Stabilization Force)
liaison officers are already at SHAPE and NATO officers are at the Russian General Staff
and Ministry of Defense.</span></p><span data-dcnode-id="38" instrument_node="">
</span><p data-dcnode-id="36"><span data-dcnode-id="37" instrument_node="">NATO has opened many committees to Partners' participation: the Conference of National
Armaments Directors Committee on European Airspace Cooperation, the Senior Civil Emergency
Planning Committee, the Senior NATO Logisticians Conference, the NATO Air Defense
Committee, and others.</span></p><span data-dcnode-id="35" instrument_node="">
</span><p data-dcnode-id="33"><span data-dcnode-id="34" instrument_node="">NATO'S FUTURE</span></p><span data-dcnode-id="32" instrument_node="">
</span><p data-dcnode-id="30"><span data-dcnode-id="31" instrument_node="">The future of NATO remains tied to its ability to work with Allies and Partners to
strengthen stability and security throughout Europe. In this respect, IFOR (Implementation
Force) and SFOR in Bosnia represent a major element of NATO's new work, a peacekeeping
effort that involves all those European (and even other) states that wish to participate.
The successful Russian involvement in IFOR and SFOR -- and the Russian army cell operating
full-time at SHAPE -- support the premise of meaningful and effective cooperation in the
future.</span></p><span data-dcnode-id="29" instrument_node="">
</span><p data-dcnode-id="27"><span data-dcnode-id="28" instrument_node="">(+)16 NATO members, plus Albania, Armenia, Azerbaijan, Belarus, Bulgaria, the Czech
Republic, Estonia, Georgia, Hungary, Kazakhstan, Kyrgyzstan, Latvia, Lithuania, Moldova,
Poland, Romania, Russia, Slovakia, Slovenia, Tajikistan, Turkmenistan, Ukraine, Uzbekistan
and the former Yugoslav Republic of Macedonia; observer nations: Austria, Finland, Malta
