node-id="2517"><a class="external text" data-dcnode-id="2518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3ADemocracy_sidebar%26action%3Dedit"><abbr data-dcnode-id="2519" title="Edit this template"><span data-dcnode-id="2520" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table><span data-dcnode-id="2510" instrument_node="">
</span><p data-dcnode-id="2481"><b data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">Soviet democracy</span></b><span data-dcnode-id="2507" instrument_node="">, or </span><b data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">council democracy</span></b><span data-dcnode-id="2504" instrument_node="">, is a </span><a data-dcnode-id="2502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_system" title="Political system"><span data-dcnode-id="2503" instrument_node="">political system</span></a><span data-dcnode-id="2501" instrument_node=""> in which the </span><a data-dcnode-id="2499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Authority" title="Authority"><span data-dcnode-id="2500" instrument_node="">rule</span></a><span data-dcnode-id="2498" instrument_node=""> of the population by directly elected </span><i data-dcnode-id="2495"><a data-dcnode-id="2496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_%28council%29" title="Soviet (council)"><span data-dcnode-id="2497" instrument_node="">soviets</span></a></i><span data-dcnode-id="2494" instrument_node=""> (Russian for "council") is exercised. The councils are directly responsible to their electors and bound by their instructions using a </span><a data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Delegate_model_of_representation" title="Delegate model of representation"><span data-dcnode-id="2493" instrument_node="">delegate model of representation</span></a><span data-dcnode-id="2491" instrument_node="">. Such an </span><a data-dcnode-id="2489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Imperative_mandate" title="Imperative mandate"><span data-dcnode-id="2490" instrument_node="">imperative mandate</span></a><span data-dcnode-id="2488" instrument_node=""> is in contrast to a free mandate, in which the elected delegates are </span><a data-dcnode-id="2486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trustee_model_of_representation" title="Trustee model of representation"><span data-dcnode-id="2487" instrument_node="">only responsible to their conscience</span></a><span data-dcnode-id="2485" instrument_node="">. Delegates may accordingly be dismissed from their post at any time or be voted out (</span><a data-dcnode-id="2483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recall_election" title="Recall election"><span data-dcnode-id="2484" instrument_node="">recall</span></a><span data-dcnode-id="2482" instrument_node="">).
</span></p><p data-dcnode-id="2459"><span data-dcnode-id="2480" instrument_node="">In a Soviet democracy, voters are organized in basic units, for example the workers of a company, the inhabitants of a district, or the soldiers of a barracks. They directly send the delegates as public functionaries, which act as legislators, government and courts in one. In contrast to earlier democracy models according to </span><a data-dcnode-id="2478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Locke" title="John Locke"><span data-dcnode-id="2479" instrument_node="">John Locke</span></a><span data-dcnode-id="2477" instrument_node=""> and </span><a data-dcnode-id="2475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Montesquieu" title="Montesquieu"><span data-dcnode-id="2476" instrument_node="">Montesquieu</span></a><span data-dcnode-id="2474" instrument_node="">, there is no </span><a data-dcnode-id="2472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Separation_of_powers" title="Separation of powers"><span data-dcnode-id="2473" instrument_node="">separation of powers</span></a><span data-dcnode-id="2471" instrument_node="">. The councils are elected on several levels: At the residential and business level, delegates are sent to the local councils in plenary assemblies. In turn, these can delegate members to the next level. The system of delegation continues to the </span><a data-dcnode-id="2469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Congress_of_Soviets" title="Congress of Soviets"><span data-dcnode-id="2470" instrument_node="">Congress of Soviets</span></a><span data-dcnode-id="2468" instrument_node=""> at the state level.</span><sup class="reference" data-dcnode-id="2465" id="cite_ref-1"><a data-dcnode-id="2466" href="#cite_note-1"><span data-dcnode-id="2467" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2464" instrument_node=""> The electoral processes thus take place from the bottom upwards. The levels are usually tied to administrative levels.</span><sup class="reference" data-dcnode-id="2461" id="cite_ref-2"><a data-dcnode-id="2462" href="#cite_note-2"><span data-dcnode-id="2463" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2460" instrument_node="">
</span></p><span data-dcnode-id="2458" instrument_node="">

</span><h2 data-dcnode-id="2356"><span class="mw-headline" data-dcnode-id="2364" id="Definition"><span data-dcnode-id="2365" instrument_node="">Definition</span></span><span class="mw-editsection" data-dcnode-id="2357"><span class="mw-editsection-bracket" data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">[</span></span><a data-dcnode-id="2360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_democracy%26action%3Dedit%26section%3D1" title="Edit section: Definition"><span data-dcnode-id="2361" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2355" instrument_node="">
</span><p data-dcnode-id="2349"><span data-dcnode-id="2354" instrument_node="">Kazuko Kawamoto writes that Soviet democracy "may sound odd to many, especially in the younger generation, while to others in the older generation they may bring back memories of the 'good old' Cold War years, when they supported liberal democracy against Soviet socialist democracy, or vice versa. Many Cold War contemporaries thought that there was such a thing as Soviet democratic theory, despite not believing the Soviet government's claim of the superiority of Soviet democracy over liberal democracy."</span><sup class="reference" data-dcnode-id="2351" id="cite_ref-Kazuko_2014_3-0"><a data-dcnode-id="2352" href="#cite_note-Kazuko_2014-3"><span data-dcnode-id="2353" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2350" instrument_node="">
</span></p><p data-dcnode-id="2312"><span data-dcnode-id="2348" instrument_node="">The "totalitarian model" of </span><a data-dcnode-id="2346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_and_Communist_studies" title="Soviet and Communist studies"><span data-dcnode-id="2347" instrument_node="">Soviet and Communist studies</span></a><span data-dcnode-id="2345" instrument_node=""> historiography, which was dominant during the </span><a data-dcnode-id="2343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="2344" instrument_node="">Cold War</span></a><span data-dcnode-id="2342" instrument_node="">,</span><sup class="reference" data-dcnode-id="2339" id="cite_ref-4"><a data-dcnode-id="2340" href="#cite_note-4"><span data-dcnode-id="2341" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2338" instrument_node=""> follows the view that Soviet democracy was a farce and that "the Soviet regime was simply oppressive and totalitarian, and not democratic at all."</span><sup class="reference" data-dcnode-id="2335" id="cite_ref-Kazuko_2014_3-1"><a data-dcnode-id="2336" href="#cite_note-Kazuko_2014-3"><span data-dcnode-id="2337" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2334" instrument_node=""> Critics such as </span><a data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zbigniew_Brzezinski" title="Zbigniew Brzezinski"><span data-dcnode-id="2333" instrument_node="">Zbigniew Brzezinski</span></a><span data-dcnode-id="2331" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carl_Friedrich" title="Carl Friedrich"><span data-dcnode-id="2330" instrument_node="">Carl Friedrich</span></a><sup class="reference" data-dcnode-id="2326" id="cite_ref-5"><a data-dcnode-id="2327" href="#cite_note-5"><span data-dcnode-id="2328" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2325" instrument_node=""> often blamed the Soviet regime for "lacking liberty, which undermined the meaning of political participation."</span><sup class="reference" data-dcnode-id="2322" id="cite_ref-Kazuko_2014_3-2"><a data-dcnode-id="2323" href="#cite_note-Kazuko_2014-3"><span data-dcnode-id="2324" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2321" instrument_node=""> Nonetheless, "revisionist school" historians focused on the relatively autonomous institutions which might influence policy at the higher level,</span><sup class="reference" data-dcnode-id="2318" id="cite_ref-6"><a data-dcnode-id="2319" href="#cite_note-6"><span data-dcnode-id="2320" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2317" instrument_node=""> representing those who "insisted that the old image of the Soviet Union as a totalitarian state bent on world domination was oversimplified or just plain wrong. They tended to be interested in social history and to argue that the Communist Party leadership had had to adjust to social forces."</span><sup class="reference" data-dcnode-id="2314" id="cite_ref-7"><a data-dcnode-id="2315" href="#cite_note-7"><span data-dcnode-id="2316" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2313" instrument_node="">
</span></p><p data-dcnode-id="2295"><span data-dcnode-id="2311" instrument_node="">Kazuko writes that "the Soviet government did encourage the working people to speak out. As numerous studies have shown, Soviet citizens responded by writing letters and visiting government offices to address the authorities, even if there were limits to the realization of their demands and the effectiveness of their entreaties."</span><sup class="reference" data-dcnode-id="2308" id="cite_ref-Kazuko_2014_3-3"><a data-dcnode-id="2309" href="#cite_note-Kazuko_2014-3"><span data-dcnode-id="2310" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2307" instrument_node=""> According to Kazuko, these studies showed that "people demanded to be heard and the authorities responded, however insufficiently, because the ideas of democracy obligated them to do so."</span><sup class="reference" data-dcnode-id="2304" id="cite_ref-Kazuko_2014_3-4"><a data-dcnode-id="2305" href="#cite_note-Kazuko_2014-3"><span data-dcnode-id="2306" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2303" instrument_node=""> The reason why the process leading to the </span><a class="mw-redirect" data-dcnode-id="2301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Constitution_of_1936" title="Soviet Constitution of 1936"><span data-dcnode-id="2302" instrument_node="">Soviet Constitution of 1936</span></a><span data-dcnode-id="2300" instrument_node=""> took so long, about twenty years according to Kazuko, was "deeply rooted in the ideas of Soviet democracy. The Soviet regime was democratic in its own sense of the word and this article gives it a more democratic face than what is usually imagined, especially among Western people. However, the regime's unique democratic character seemed to make it rather difficult to function adequately."</span><sup class="reference" data-dcnode-id="2297" id="cite_ref-Kazuko_2014_3-5"><a data-dcnode-id="2298" href="#cite_note-Kazuko_2014-3"><span data-dcnode-id="2299" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2296" instrument_node="">
</span></p><span data-dcnode-id="2294" instrument_node="">

</span><h3 data-dcnode-id="1883"><span class="mw-headline" data-dcnode-id="1891" id="In_Russia_and_the_Soviet_Union"><span data-dcnode-id="1892" instrument_node="">In Russia and the Soviet Union</span></span><span class="mw-editsection" data-dcnode-id="1884"><span class="mw-editsection-bracket" data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">[</span></span><a data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_democracy%26action%3Dedit%26section%3D3" title="Edit section: In Russia and the Soviet Union"><span data-dcnode-id="1888" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1881" instrument_node="">The first soviets, also called workers' councils, were formed after the </span><a class="mw-redirect" data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Revolution_of_1905" title="Russian Revolution of 1905"><span data-dcnode-id="1880" instrument_node="">Russian Revolution of 1905</span></a><span data-dcnode-id="1878" instrument_node="">. </span><a data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Lenin" title="Vladimir Lenin"><span data-dcnode-id="1877" instrument_node="">Vladimir Lenin</span></a><span data-dcnode-id="1875" instrument_node=""> and the </span><a data-dcnode-id="1873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bolsheviks" title="Bolsheviks"><span data-dcnode-id="1874" instrument_node="">Bolsheviks</span></a><span data-dcnode-id="1872" instrument_node=""> saw the soviet as the basic organizing unit of society in a socialist system and at first supported this form of democracy. The soviets also played a considerable role in the </span><a data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/February_Revolution" title="February Revolution"><span data-dcnode-id="1871" instrument_node="">February</span></a><span data-dcnode-id="1869" instrument_node=""> and </span><a data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/October_Revolution" title="October Revolution"><span data-dcnode-id="1868" instrument_node="">October Revolutions</span></a><span data-dcnode-id="1866" instrument_node="">. At that time, they represented a variety of socialist parties in addition to Bolsheviks. According to the official </span><a class="mw-redirect" data-dcnode-id="1864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_historiography" title="Soviet historiography"><span data-dcnode-id="1865" instrument_node="">Soviet historiography</span></a><span data-dcnode-id="1863" instrument_node="">, the first soviet was formed in May 1905 in </span><a data-dcnode-id="1861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ivanovo" title="Ivanovo"><span data-dcnode-id="1862" instrument_node="">Ivanovo</span></a><span data-dcnode-id="1860" instrument_node=""> (north-east of Moscow) during the </span><a data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1905_Russian_Revolution" title="1905 Russian Revolution"><span data-dcnode-id="1859" instrument_node="">1905 Russian Revolution</span></a><span data-dcnode-id="1857" instrument_node=""> (</span><i data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Ivanovsky Soviet</span></i><span data-dcnode-id="1854" instrument_node="">). In his memoirs, the Russian anarchist </span><a data-dcnode-id="1852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Volin" title="Volin"><span data-dcnode-id="1853" instrument_node="">Volin</span></a><span data-dcnode-id="1851" instrument_node=""> claims that he witnessed the beginnings of the </span><a class="mw-redirect" data-dcnode-id="1849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St_Petersburg_Soviet" title="St Petersburg Soviet"><span data-dcnode-id="1850" instrument_node="">St Petersburg Soviet</span></a><span data-dcnode-id="1848" instrument_node=""> in January 1905. The Russian workers were largely organized at the turn of the 20th century, leading to a government-sponsored </span><a data-dcnode-id="1846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trade_union" title="Trade union"><span data-dcnode-id="1847" instrument_node="">trade union</span></a><span data-dcnode-id="1845" instrument_node=""> leadership. In 1905, as the </span><a data-dcnode-id="1843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russo-Japanese_War" title="Russo-Japanese War"><span data-dcnode-id="1844" instrument_node="">Russo-Japanese War</span></a><span data-dcnode-id="1842" instrument_node=""> (1904-1905) increased the strain on Russian industrial production, the workers began to strike and rebel. The soviets represented an autonomous workers' movement, one that broke free from the government's oversight of workers' unions. Soviets sprang up throughout the industrial centers of </span><a data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia" title="Russia"><span data-dcnode-id="1841" instrument_node="">Russia</span></a><span data-dcnode-id="1839" instrument_node="">, usually organized at the factory level. The soviets disappeared after the Revolution of 1905, but re-emerged under </span><a class="mw-redirect" data-dcnode-id="1837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist" title="Socialist"><span data-dcnode-id="1838" instrument_node="">socialist</span></a><span data-dcnode-id="1836" instrument_node=""> leadership during the </span><a data-dcnode-id="1834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Revolution" title="Russian Revolution"><span data-dcnode-id="1835" instrument_node="">Russian Revolution</span></a><span data-dcnode-id="1833" instrument_node="">. Lenin argued for the destruction of the foundations of the </span><a class="mw-redirect" data-dcnode-id="1831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bourgeois_state" title="Bourgeois state"><span data-dcnode-id="1832" instrument_node="">bourgeois state</span></a><span data-dcnode-id="1830" instrument_node=""> and its replacement with what </span><a data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Priestland" title="David Priestland"><span data-dcnode-id="1829" instrument_node="">David Priestland</span></a><span data-dcnode-id="1827" instrument_node=""> described as an "ultra-democratic" </span><a data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dictatorship_of_the_proletariat" title="Dictatorship of the proletariat"><span data-dcnode-id="1826" instrument_node="">dictatorship of the proletariat</span></a><span data-dcnode-id="1824" instrument_node=""> based on the </span><a data-dcnode-id="1822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Commune" title="Paris Commune"><span data-dcnode-id="1823" instrument_node="">Paris Commune</span></a><span data-dcnode-id="1821" instrument_node="">'s system.</span><sup class="reference" data-dcnode-id="1818" id="cite_ref-Priestland_8-0"><a data-dcnode-id="1819" href="#cite_note-Priestland-8"><span data-dcnode-id="1820" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1817" instrument_node="">
</span></p><p data-dcnode-id="1792"><span data-dcnode-id="1815" instrument_node="">In post-revolutionary Russia local workers' soviets would elect representatives that go on to form regional soviets, which in turn elect representatives that form higher soviets, and so on up to the Congress of Soviets. Later the </span><a data-dcnode-id="1813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Soviet_of_the_Soviet_Union" title="Supreme Soviet of the Soviet Union"><span data-dcnode-id="1814" instrument_node="">Supreme Soviet of the Soviet Union</span></a><span data-dcnode-id="1812" instrument_node=""> would become the highest legislative body of the entire country. After Lenin's party, the Bolsheviks, only got a minority of the votes in the election to the </span><a data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Constituent_Assembly" title="Russian Constituent Assembly"><span data-dcnode-id="1811" instrument_node="">Russian Constituent Assembly</span></a><span data-dcnode-id="1809" instrument_node="">, he disbanded it by force after its first meeting, citing the refusal of the Right Soviet Revolutionaries and Mensheviks to honor the sovereignty of soviet democracy, arguing that a system in which </span><a class="mw-redirect" data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliamentary_democracy" title="Parliamentary democracy"><span data-dcnode-id="1808" instrument_node="">parliamentary democracy</span></a><span data-dcnode-id="1806" instrument_node=""> was sovereign could not fairly represent the workers since it was in practice dominated by the </span><a data-dcnode-id="1804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bourgeoisie" title="Bourgeoisie"><span data-dcnode-id="1805" instrument_node="">bourgeoisie</span></a><span data-dcnode-id="1803" instrument_node="">, that the proportional representation did not take into account the </span><a data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Left_Socialist-Revolutionaries%23Split_with_the_Socialist_Revolutionary_Party" title="Left Socialist-Revolutionaries"><span data-dcnode-id="1802" instrument_node="">SR split</span></a><span data-dcnode-id="1800" instrument_node="">, and that the soviets (where the Bolsheviks </span><i data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">did</span></i><span data-dcnode-id="1797" instrument_node=""> get a majority) more accurately represented the opinion of the people, which had changed as shown in the elections to the soviets between the time of the elections to the Assembly and the first meeting of the Assembly. He also explicitly stated that democracy did not include those considered bourgeois.</span><sup class="reference" data-dcnode-id="1794" id="cite_ref-9"><a data-dcnode-id="1795" href="#cite_note-9"><span data-dcnode-id="1796" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1793" instrument_node="">
</span></p><p data-dcnode-id="1763"><span data-dcnode-id="1791" instrument_node="">After the revolution, the Bolsheviks had to defend the newly formed government in </span><a data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I" title="World War I"><span data-dcnode-id="1790" instrument_node="">World War I</span></a><span data-dcnode-id="1788" instrument_node=""> and the </span><a data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Civil_War" title="Russian Civil War"><span data-dcnode-id="1787" instrument_node="">Russian Civil War</span></a><span data-dcnode-id="1785" instrument_node="">. According to some critics, many of the effects of the wars on the new </span><a data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Politics_of_the_Soviet_Union" title="Politics of the Soviet Union"><span data-dcnode-id="1784" instrument_node="">Soviet government</span></a><span data-dcnode-id="1782" instrument_node=""> may be part of what led to the decline of soviet democracy in Russia (due to the authority the state took on in war time) and to the emergence of the bureaucratic structure that maintained much control throughout the </span><a data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_Soviet_Union" title="History of the Soviet Union"><span data-dcnode-id="1781" instrument_node="">history of the Soviet Union</span></a><span data-dcnode-id="1779" instrument_node="">.</span><sup class="reference" data-dcnode-id="1776" id="cite_ref-10"><a data-dcnode-id="1777" href="#cite_note-10"><span data-dcnode-id="1778" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1775" instrument_node=""> Some believe that one key blow against soviet democracy occurred as early as March 1918, when all nineteen city soviets that were elected during the spring were disbanded in a series of Bolshevik coups d'etat because workers returned Menshevik-SR majorities, or non-Bolshevik socialist majorities.</span><sup class="reference" data-dcnode-id="1772" id="cite_ref-11"><a data-dcnode-id="1773" href="#cite_note-11"><span data-dcnode-id="1774" instrument_node="">[11]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="1765" style="white-space:nowrap;"><span data-dcnode-id="1771" instrument_node="">[</span><i data-dcnode-id="1767"><a data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="1769" title="The material near this tag failed verification of its source citation(s). (March 2018)"><span data-dcnode-id="1770" instrument_node="">failed verification</span></span></a></i><span data-dcnode-id="1766" instrument_node="">]</span></sup><span data-dcnode-id="1764" instrument_node="">
</span></p><p data-dcnode-id="1691"><span data-dcnode-id="1762" instrument_node="">However, a key development in the course of soviet democracy in Russia occurred in March, 1921, with the </span><a data-dcnode-id="1760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kronstadt_rebellion" title="Kronstadt rebellion"><span data-dcnode-id="1761" instrument_node="">Kronstadt rebellion</span></a><span data-dcnode-id="1759" instrument_node="">. The outset of the year was marked by strikes and demonstrations - in both Moscow and Petrograd, as well as the countryside - due to discontent with the results of policies that made up </span><a data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_communism" title="War communism"><span data-dcnode-id="1758" instrument_node="">war communism</span></a><span data-dcnode-id="1756" instrument_node="">.</span><sup class="reference" data-dcnode-id="1753" id="cite_ref-FOOTNOTEDaniels1951241_12-0"><a data-dcnode-id="1754" href="#cite_note-FOOTNOTEDaniels1951241-12"><span data-dcnode-id="1755" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="1750" id="cite_ref-FOOTNOTEAvrich200441_13-0"><a data-dcnode-id="1751" href="#cite_note-FOOTNOTEAvrich200441-13"><span data-dcnode-id="1752" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1749" instrument_node=""> The Bolsheviks, in response to the protests, enacted martial law and sent the Red Army to disperse the workers.</span><sup class="reference" data-dcnode-id="1746" id="cite_ref-FOOTNOTEChamberlin1965440_14-0"><a data-dcnode-id="1747" href="#cite_note-FOOTNOTEChamberlin1965440-14"><span data-dcnode-id="1748" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="1743" id="cite_ref-FOOTNOTEFiges1997760_15-0"><a data-dcnode-id="1744" href="#cite_note-FOOTNOTEFiges1997760-15"><span data-dcnode-id="1745" instrument_node="">[15]</span></a></sup><span data-dcnode-id="1742" instrument_node=""> This was followed up by mass arrests executed by the </span><a data-dcnode-id="1740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cheka" title="Cheka"><span data-dcnode-id="1741" instrument_node="">Cheka</span></a><span data-dcnode-id="1739" instrument_node="">.</span><sup class="reference" data-dcnode-id="1736" id="cite_ref-FOOTNOTEAvrich200452_16-0"><a data-dcnode-id="1737" href="#cite_note-FOOTNOTEAvrich200452-16"><span data-dcnode-id="1738" instrument_node="">[16]</span></a></sup><span data-dcnode-id="1735" instrument_node=""> Repression and minor concessions only temporarily quelled the discontent as Petrograd protests continued that year in March. This time the factory workers were joined by sailors stationed on the nearby island-fort of Kronstadt.</span><sup class="reference" data-dcnode-id="1732" id="cite_ref-FOOTNOTEAvrich200473_17-0"><a data-dcnode-id="1733" href="#cite_note-FOOTNOTEAvrich200473-17"><span data-dcnode-id="1734" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1731" instrument_node=""> Disappointed in the direction of the Bolshevik government, the rebels demanded a series of reforms including: reduction in Bolshevik privileges, newly elected </span><a data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_%28council%29" title="Soviet (council)"><span data-dcnode-id="1730" instrument_node="">soviet councils</span></a><span data-dcnode-id="1728" instrument_node=""> to include </span><a data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Libertarian_socialism" title="Libertarian socialism"><span data-dcnode-id="1727" instrument_node="">socialist and anarchist groups</span></a><span data-dcnode-id="1725" instrument_node="">, economic freedom for peasants and workers, dissolution of the bureaucratic governmental organs created during the civil war, and the restoration of worker rights for the working class.</span><sup class="reference" data-dcnode-id="1722" id="cite_ref-18"><a data-dcnode-id="1723" href="#cite_note-18"><span data-dcnode-id="1724" instrument_node="">[18]</span></a></sup><span data-dcnode-id="1721" instrument_node=""> The workers and sailors of the Kronstadt rebellion were promptly crushed by Red Army forces, with a thousand rebels killed in battle and another thousand executed the following weeks, with many more fleeing abroad and to the countryside.</span><sup class="reference" data-dcnode-id="1718" id="cite_ref-FOOTNOTEFiges1997767_19-0"><a data-dcnode-id="1719" href="#cite_note-FOOTNOTEFiges1997767-19"><span data-dcnode-id="1720" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="1715" id="cite_ref-FOOTNOTEAvrich1970215_20-0"><a data-dcnode-id="1716" href="#cite_note-FOOTNOTEAvrich1970215-20"><span data-dcnode-id="1717" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="1712" id="cite_ref-FOOTNOTEAvrich1970210–211_21-0"><a data-dcnode-id="1713" href="#cite_note-FOOTNOTEAvrich1970210%E2%80%93211-21"><span data-dcnode-id="1714" instrument_node="">[21]</span></a></sup><span data-dcnode-id="1711" instrument_node=""> These events coincided with the </span><a data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/10th_Congress_of_the_Russian_Communist_Party_%28Bolsheviks%29" title="10th Congress of the Russian Communist Party (Bolsheviks)"><span data-dcnode-id="1710" instrument_node="">10th Congress of the Russian Communist Party (Bolsheviks)</span></a><span data-dcnode-id="1708" instrument_node="">. There, Lenin argued that the soviets and the principle of </span><a data-dcnode-id="1706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_centralism" title="Democratic centralism"><span data-dcnode-id="1707" instrument_node="">democratic centralism</span></a><span data-dcnode-id="1705" instrument_node=""> within the Bolshevik party still assured democracy. However, faced with support for Kronstadt within Bolshevik ranks, Lenin also issued a "temporary" </span><a class="mw-redirect" data-dcnode-id="1703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ban_on_factions_in_the_Russian_Communist_Party" title="Ban on factions in the Russian Communist Party"><span data-dcnode-id="1704" instrument_node="">ban on factions in the Russian Communist Party</span></a><span data-dcnode-id="1702" instrument_node="">. This ban remained until the </span><a data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revolutions_of_1989" title="Revolutions of 1989"><span data-dcnode-id="1701" instrument_node="">revolutions of 1989</span></a><span data-dcnode-id="1699" instrument_node=""> and, according to some critics, made the democratic procedures within the party an empty formality, and helped Stalin to consolidate much more authority under the party. Soviets were transformed into the bureaucratic structure that existed for the rest of the history of the Soviet Union and were completely under the control of party officials and the </span><a class="mw-redirect" data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Politburo_of_the_CPSU_Central_Committee" title="Politburo of the CPSU Central Committee"><span data-dcnode-id="1698" instrument_node="">politburo</span></a><span data-dcnode-id="1696" instrument_node="">.</span><sup class="reference" data-dcnode-id="1693" id="cite_ref-22"><a data-dcnode-id="1694" href="#cite_note-22"><span data-dcnode-id="1695" instrument_node="">[22]</span></a></sup><span data-dcnode-id="1692" instrument_node="">
</span></p><p data-dcnode-id="1678"><span data-dcnode-id="1690" instrument_node="">Other historians like </span><a data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_W._Thurston" title="Robert W. Thurston"><span data-dcnode-id="1689" instrument_node="">Robert W. Thurston</span></a><span data-dcnode-id="1687" instrument_node=""> argue, while the top of the soviet system became largely bureaucratic, the local levels of society remained largely participatory.</span><sup class="reference" data-dcnode-id="1684" id="cite_ref-:1_23-0"><a data-dcnode-id="1685" href="#cite_note-:1-23"><span data-dcnode-id="1686" instrument_node="">[23]</span></a></sup><span data-dcnode-id="1683" instrument_node=""> He writes "while sane, calm, and sober, no worker would have dared to say that socialism was a poor system or that Stalin was an idiot" but then goes on to argue that these bounds still allowed for citizens to have meaningful participation on their immediate situation and this local participation meant "ultimately relatively little was controlled by the government or party decree".</span><sup class="reference" data-dcnode-id="1680" id="cite_ref-:1_23-1"><a data-dcnode-id="1681" href="#cite_note-:1-23"><span data-dcnode-id="1682" instrument_node="">[23]</span></a></sup><span data-dcnode-id="1679" instrument_node="">
</span></p><span data-dcnode-id="1677" instrument_node="">
</span><h3 data-dcnode-id="1667"><span class="mw-headline" data-dcnode-id="1675" id="In_Germany_and_the_Weimar_Republic"><span data-dcnode-id="1676" instrument_node="">In Germany and the Weimar Republic</span></span><span class="mw-editsection" data-dcnode-id="1668"><span class="mw-editsection-bracket" data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">[</span></span><a data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_democracy%26action%3Dedit%26section%3D4" title="Edit section: In Germany and the Weimar Republic"><span data-dcnode-id="1672" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1666" instrument_node="">
</span><table class="box-Unreferenced_section plainlinks metadata ambox ambox-content ambox-Unreferenced" data-dcnode-id="1623" role="presentation"><tbody data-dcnode-id="1624"><tr data-dcnode-id="1625"><td class="mbox-image" data-dcnode-id="1662"><div data-dcnode-id="1663" style="width:52px"><a class="image" data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="1665" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="1626"><div class="mbox-text-span" data-dcnode-id="1627"><span data-dcnode-id="1661" instrument_node="">This section </span><b data-dcnode-id="1654"><span data-dcnode-id="1660" instrument_node="">does not </span><a data-dcnode-id="1658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="1659" instrument_node="">cite</span></a><span data-dcnode-id="1657" instrument_node=""> any </span><a data-dcnode-id="1655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="1656" instrument_node="">sources</span></a></b><span data-dcnode-id="1653" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="1642"><span data-dcnode-id="1652" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet_democracy%26action%3Dedit"><span data-dcnode-id="1651" instrument_node="">improve this section</span></a><span data-dcnode-id="1649" instrument_node=""> by </span><a data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="1648" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="1646" instrument_node="">. Unsourced material may be challenged and </span><a data-dcnode-id="1644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability%23Burden_of_evidence" title="Wikipedia:Verifiability"><span data-dcnode-id="1645" instrument_node="">removed</span></a><span data-dcnode-id="1643" instrument_node="">.</span></span><span data-dcnode-id="1641" instrument_node=""> </span><span class="date-container" data-dcnode-id="1635"><i data-dcnode-id="1636"><span data-dcnode-id="1640" instrument_node="">(</span><span class="date" data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">December 2020</span></span><span data-dcnode-id="1637" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="1628"><i data-dcnode-id="1629"><span data-dcnode-id="1634" instrument_node=""> (</span><small data-dcnode-id="1631"><a data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="1633" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="1630" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1621" instrument_node="">In October 1918, the constitution of the German Empire was reformed to give more powers to the elected parliament. On 29 October, </span><a data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kiel_mutiny" title="Kiel mutiny"><span data-dcnode-id="1620" instrument_node="">rebellion</span></a><span data-dcnode-id="1618" instrument_node=""> broke out in </span><a data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kiel" title="Kiel"><span data-dcnode-id="1617" instrument_node="">Kiel</span></a><span data-dcnode-id="1615" instrument_node=""> among sailors. There, sailors, soldiers, and workers began electing workers' and soldiers' councils (</span><i data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Arbeiter und Soldatenräte</span></i><span data-dcnode-id="1612" instrument_node="">) modeled after the soviets of the </span><a class="mw-redirect" data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Revolution_of_1917" title="Russian Revolution of 1917"><span data-dcnode-id="1611" instrument_node="">Russian Revolution of 1917</span></a><span data-dcnode-id="1609" instrument_node="">. The revolution spread throughout Germany, and participants seized military and civil powers in individual cities.
</span></p><p data-dcnode-id="1594"><span data-dcnode-id="1607" instrument_node="">At the time, the Socialist movement which represented mostly laborers was split among two major left-wing parties: the </span><a data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Independent_Social_Democratic_Party_of_Germany" title="Independent Social Democratic Party of Germany"><span data-dcnode-id="1606" instrument_node="">Independent Social Democratic Party of Germany</span></a><span data-dcnode-id="1604" instrument_node=""> (USPD), which called for immediate peace </span><a class="mw-redirect" data-dcnode-id="1602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Negotiations" title="Negotiations"><span data-dcnode-id="1603" instrument_node="">negotiations</span></a><span data-dcnode-id="1601" instrument_node=""> and favored a soviet-style command economy, and the </span><a data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_Democratic_Party_of_Germany" title="Social Democratic Party of Germany"><span data-dcnode-id="1600" instrument_node="">Social Democratic Party of Germany</span></a><span data-dcnode-id="1598" instrument_node=""> (SPD) also known as "Majority" Social Democratic Party of Germany (MSPD), which supported the war effort and favoured a </span><a data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parliamentary_system" title="Parliamentary system"><span data-dcnode-id="1597" instrument_node="">parliamentary system</span></a><span data-dcnode-id="1595" instrument_node="">. The rebellion caused great fear in the establishment and in the middle classes because of the revolutionary aspirations of the councils. It terrified the well off classes as the country was on the brink of a working class revolution.
</span></p><p data-dcnode-id="1577"><span data-dcnode-id="1593" instrument_node="">The Spartacus League, originally part of the USPD, split as a more radical group which advocated for violent proletarian revolution to establish communism. After the failed </span><a data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spartacist_uprising" title="Spartacist uprising"><span data-dcnode-id="1592" instrument_node="">Spartacist Uprising</span></a><span data-dcnode-id="1590" instrument_node="">, the Spartacist League became the </span><a data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_Germany" title="Communist Party of Germany"><span data-dcnode-id="1589" instrument_node="">Communist Party of Germany</span></a><span data-dcnode-id="1587" instrument_node=""> (KPD). The </span><a data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Workers%2527_Party_of_Germany" title="Communist Workers' Party of Germany"><span data-dcnode-id="1586" instrument_node="">Communist Workers' Party of Germany</span></a><span data-dcnode-id="1584" instrument_node=""> (KAPD) split from the KPD as a distinct council communist tendency. Their main goal was an immediate abolition of bourgeois democracy and the constitution of a </span><a data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dictatorship_of_the_proletariat" title="Dictatorship of the proletariat"><span data-dcnode-id="1583" instrument_node="">dictatorship of the proletariat</span></a><span data-dcnode-id="1581" instrument_node=""> through the seizure of power by the workers' councils. Communists in the KAPD formed the </span><a data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Workers%2527_Union_of_Germany" title="General Workers' Union of Germany"><span data-dcnode-id="1580" instrument_node="">General Workers' Union of Germany</span></a><span data-dcnode-id="1578" instrument_node=""> (AAUD), who sought to form factory organizations as the basis of region wide workers' councils.
</span></p><p data-dcnode-id="1560"><span data-dcnode-id="1576" instrument_node="">In view of the mass support for more radical reforms among the workers' councils, a </span><a data-dcnode-id="1574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coalition" title="Coalition"><span data-dcnode-id="1575" instrument_node="">coalition</span></a><span data-dcnode-id="1573" instrument_node=""> government called "</span><a data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Council_of_the_People%2527s_Deputies" title="Council of the People's Deputies"><span data-dcnode-id="1572" instrument_node="">Council of the People's Deputies</span></a><span data-dcnode-id="1570" instrument_node="">" (</span><i data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Rat der Volksbeauftragten</span></i><span data-dcnode-id="1567" instrument_node="">) was established, consisting of three MSPD and three USPD members. Led by Ebert for the MSPD and </span><a data-dcnode-id="1565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hugo_Haase" title="Hugo Haase"><span data-dcnode-id="1566" instrument_node="">Hugo Haase</span></a><span data-dcnode-id="1564" instrument_node=""> for the USPD it sought to act as a provisional cabinet of ministers. But the power question was unanswered. Although the new government was confirmed by the Berlin worker and soldier council, it was opposed by the Spartacist League. Ebert called for a "National Congress of Councils" (</span><i data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Reichsrätekongress</span></i><span data-dcnode-id="1561" instrument_node="">), which took place from 16 to 20 December 1918, and in which the MSPD had the majority. Thus, Ebert was able to institute elections for a provisional National Assembly that would be given the task of writing a democratic constitution for parliamentary government, marginalizing the movement that called for a socialist republic.
</span></p><p data-dcnode-id="1545"><span data-dcnode-id="1559" instrument_node="">In January, the Spartacus League and others in the streets of Berlin made more armed attempts to establish communism, known as the Spartacist uprising. Those attempts were put down by paramilitary </span><i data-dcnode-id="1556"><a data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freikorps" title="Freikorps"><span data-dcnode-id="1558" instrument_node="">Freikorps</span></a></i><span data-dcnode-id="1555" instrument_node=""> units consisting of volunteer soldiers. Bloody street fights culminated in the beating and shooting deaths of </span><a data-dcnode-id="1553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rosa_Luxemburg" title="Rosa Luxemburg"><span data-dcnode-id="1554" instrument_node="">Rosa Luxemburg</span></a><span data-dcnode-id="1552" instrument_node=""> and </span><a data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Liebknecht" title="Karl Liebknecht"><span data-dcnode-id="1551" instrument_node="">Karl Liebknecht</span></a><span data-dcnode-id="1549" instrument_node=""> after their arrests on 15 January. With the affirmation of Ebert, those responsible were not tried before a </span><a class="mw-redirect" data-dcnode-id="1547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Court_martial" title="Court martial"><span data-dcnode-id="1548" instrument_node="">court martial</span></a><span data-dcnode-id="1546" instrument_node="">, leading to lenient sentences, which made Ebert unpopular among radical leftists.
</span></p><p data-dcnode-id="1528"><span data-dcnode-id="1544" instrument_node="">The National Assembly elections took place on 19 January 1919. In this time, the radical left-wing parties, including the USPD and KPD, were barely able to get themselves organised, leading to a solid majority of seats for the MSPD moderate forces. To avoid the ongoing fights in Berlin, the National Assembly convened in the city of </span><a class="mw-redirect" data-dcnode-id="1542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Weimar%2C_Germany" title="Weimar, Germany"><span data-dcnode-id="1543" instrument_node="">Weimar</span></a><span data-dcnode-id="1541" instrument_node="">, giving the future Republic its unofficial name. The </span><a data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Weimar_Constitution" title="Weimar Constitution"><span data-dcnode-id="1540" instrument_node="">Weimar Constitution</span></a><span data-dcnode-id="1538" instrument_node=""> created a republic under a </span><a class="mw-redirect" data-dcnode-id="1536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Semi-presidential_republic" title="Semi-presidential republic"><span data-dcnode-id="1537" instrument_node="">semi-presidential system</span></a><span data-dcnode-id="1535" instrument_node=""> with the </span><i data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Reichstag</span></i><span data-dcnode-id="1532" instrument_node=""> elected by </span><a data-dcnode-id="1530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proportional_representation" title="Proportional representation"><span data-dcnode-id="1531" instrument_node="">proportional representation</span></a><span data-dcnode-id="1529" instrument_node="">. The parliamentary parties obtained a solid 80% of the vote.
</span></p><p data-dcnode-id="1493"><span data-dcnode-id="1527" instrument_node="">During the debates in Weimar, fighting continued. The </span><a data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bavarian_Soviet_Republic" title="Bavarian Soviet Republic"><span data-dcnode-id="1526" instrument_node="">Bavarian Soviet Republic</span></a><span data-dcnode-id="1524" instrument_node=""> was declared in </span><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Munich" title="Munich"><span data-dcnode-id="1523" instrument_node="">Munich</span></a><span data-dcnode-id="1521" instrument_node="">, but was quickly put down by </span><i data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Freikorps</span></i><span data-dcnode-id="1518" instrument_node=""> and remnants of the regular army. The fall of the </span><a class="mw-redirect" data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Munich_Soviet_Republic" title="Munich Soviet Republic"><span data-dcnode-id="1517" instrument_node="">Munich Soviet Republic</span></a><span data-dcnode-id="1515" instrument_node=""> to these units, many of which were situated on the extreme right, resulted in the growth of far-right movements and organisations in </span><a data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bavaria" title="Bavaria"><span data-dcnode-id="1514" instrument_node="">Bavaria</span></a><span data-dcnode-id="1512" instrument_node="">, including </span><a data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organisation_Consul" title="Organisation Consul"><span data-dcnode-id="1511" instrument_node="">Organisation Consul</span></a><span data-dcnode-id="1509" instrument_node="">, the </span><a data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi_Party" title="Nazi Party"><span data-dcnode-id="1508" instrument_node="">Nazi Party</span></a><span data-dcnode-id="1506" instrument_node="">, and societies of exiled Russian Monarchists. Sporadic fighting continued to flare up around the country. In eastern provinces, forces loyal to Germany's fallen Monarchy fought the republic, while militias of Polish nationalists fought for independence: </span><a class="mw-redirect" data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greater_Poland_Uprising_%281918%25E2%2580%25931919%29" title="Greater Poland Uprising (1918–1919)"><span data-dcnode-id="1505" instrument_node="">Great Poland Uprising</span></a><span data-dcnode-id="1503" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Provinz_Posen" title="Provinz Posen"><span data-dcnode-id="1502" instrument_node="">Provinz Posen</span></a><span data-dcnode-id="1500" instrument_node=""> and three </span><a data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silesian_Uprisings" title="Silesian Uprisings"><span data-dcnode-id="1499" instrument_node="">Silesian Uprisings</span></a><span data-dcnode-id="1497" instrument_node=""> in </span><a data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Upper_Silesia" title="Upper Silesia"><span data-dcnode-id="1496" instrument_node="">Upper Silesia</span></a><span data-dcnode-id="1494" instrument_node="">.
</span></p><span data-dcnode-id="1492" instrument_node="">

3Akev%3Amtx%3Abook&amp;rft.genre=bookitem&amp;rft.atitle=Joseph+Stalin%3A+Power+and+Ideas&amp;rft.btitle=Stalin%3A+A+New+History&amp;rft.pages=3&amp;rft.pub=Cambridge+University+Press&amp;rft.date=2005&amp;rft.isbn=978-1-139-44663-1&amp;rft.au=Sarah+Davies&amp;rft.au=James+Harris&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3ASoviet+democracy"></span></span><span data-dcnode-id="1152" instrument_node="">

</span><li data-dcnode-id="1126" id="cite_note-5"><span class="mw-cite-backlink" data-dcnode-id="1146"><b data-dcnode-id="1147"><a aria-label="Jump up" data-dcnode-id="1148" href="#cite_ref-5" title="Jump up"><span data-dcnode-id="1149" instrument_node="">^</span></a></b></span><span data-dcnode-id="1145" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1128"><link data-dcnode-id="1144" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation book cs1" data-dcnode-id="1130" id="CITEREFDaviesHarris2005"><span data-dcnode-id="1143" instrument_node="">Davies, Sarah; Harris, James (2005). "Joseph Stalin: Power and Ideas". </span><i data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Stalin: A New History</span></i><span data-dcnode-id="1140" instrument_node="">. Cambridge: Cambridge University Press. pp.&nbsp;3–4. </span><a class="mw-redirect" data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ISBN_%28identifier%29" title="ISBN (identifier)"><span data-dcnode-id="1139" instrument_node="">ISBN</span></a><span data-dcnode-id="1137" instrument_node="">&nbsp;</span><a data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special%3ABookSources/978-1-139-44663-1" title="Special:BookSources/978-1-139-44663-1"><bdi data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">978-1-139-44663-1</span></bdi></a><span data-dcnode-id="1133" instrument_node="">. </span><q data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">In 1953, Carl Friedrich characterised totalitarian systems in terms of five points: an official ideology, control of weapons and of media, use of terror, and a single mass party, 'usually under a single leader.' There was of course an assumption that the leader was critical to the workings of totalitarianism: at the apex of a monolithic, centralised, and hierarchical system, it was he who issued the orders which were fulfilled unquestioningly by his subordinates.</span></q></cite><span class="Z3988" data-dcnode-id="1129" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=bookitem&amp;rft.atitle=Joseph+Stalin%3A+Power+and+Ideas&amp;rft.btitle=Stalin%3A+A+New+History&amp;rft.place=Cambridge&amp;rft.pages=3-4&amp;rft.pub=Cambridge+University+Press&amp;rft.date=2005&amp;rft.isbn=978-1-139-44663-1&amp;rft.aulast=Davies&amp;rft.aufirst=Sarah&amp;rft.au=Harris%2C+James&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3ASoviet+democracy"></span></span><span data-dcnode-id="1127" instrument_node="">
</span></li><span data-dcnode-id="1125" instrument_node="">
</span><li data-dcnode-id="1098" id="cite_note-6"><span class="mw-cite-backlink" data-dcnode-id="1121"><b data-dcnode-id="1122"><a aria-label="Jump up" data-dcnode-id="1123" href="#cite_ref-6" title="Jump up"><span data-dcnode-id="1124" instrument_node="">^</span></a></b></span><span data-dcnode-id="1120" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1100"><link data-dcnode-id="1119" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation book cs1" data-dcnode-id="1102" id="CITEREFDaviesHarris2005"><span data-dcnode-id="1118" instrument_node="">Davies, Sarah; Harris, James (2005). "Joseph Stalin: Power and Ideas". </span><i data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Stalin: A New History</span></i><span data-dcnode-id="1115" instrument_node="">. Cambridge: Cambridge University Press. pp.&nbsp;4–5. </span><a class="mw-redirect" data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ISBN_%28identifier%29" title="ISBN (identifier)"><span data-dcnode-id="1114" instrument_node="">ISBN</span></a><span data-dcnode-id="1112" instrument_node="">&nbsp;</span><a data-dcnode-id="1109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special%3ABookSources/978-1-139-44663-1" title="Special:BookSources/978-1-139-44663-1"><bdi data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">978-1-139-44663-1</span></bdi></a><span data-dcnode-id="1108" instrument_node="">. </span><q data-dcnode-id="1103"><span data-dcnode-id="1107" instrument_node="">Tucker's work stressed the absolute nature of Stalin's power, an assumption which was increasingly challenged by later revisionist historians. In his </span><i data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Origins of the Great Purges</span></i><span data-dcnode-id="1104" instrument_node="">, Arch Getty argued that the Soviet political system was chaotic, that institutions often escaped the control of the centre, and that Stalin's leadership consisted to a considerable extent in responding, on an ad hoc basis, to political crises as they arose. Getty's work was influenced by political science of the 1960s onwards, which, in a critique of the totalitarian model, began to consider the possibility that relatively autonomous bureaucratic institutions might have had some influence on policy-making at the highest level.</span></q></cite><span class="Z3988" data-dcnode-id="1101" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=bookitem&amp;rft.atitle=Joseph+Stalin%3A+Power+and+Ideas&amp;rft.btitle=Stalin%3A+A+New+History&amp;rft.place=Cambridge&amp;rft.pages=4-5&amp;rft.pub=Cambridge+University+Press&amp;rft.date=2005&amp;rft.isbn=978-1-139-44663-1&amp;rft.aulast=Davies&amp;rft.aufirst=Sarah&amp;rft.au=Harris%2C+James&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3ASoviet+democracy"></span></span><span data-dcnode-id="1099" instrument_node="">

</span><li data-dcnode-id="1061" id="cite_note-7"><span class="mw-cite-backlink" data-dcnode-id="1093"><b data-dcnode-id="1094"><a aria-label="Jump up" data-dcnode-id="1095" href="#cite_ref-7" title="Jump up"><span data-dcnode-id="1096" instrument_node="">^</span></a></b></span><span data-dcnode-id="1092" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1063"><link data-dcnode-id="1091" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation journal cs1" data-dcnode-id="1065" id="CITEREFLenoe2002"><span data-dcnode-id="1090" instrument_node="">Lenoe, Matt (June 2002). "Did Stalin Kill Kirov and Does It Matter?". </span><i data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">The Journal of Modern History</span></i><span data-dcnode-id="1087" instrument_node="">. </span><b data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">74</span></b><span data-dcnode-id="1084" instrument_node=""> (2): 352–380. </span><a class="mw-redirect" data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doi_%28identifier%29" title="Doi (identifier)"><span data-dcnode-id="1083" instrument_node="">doi</span></a><span data-dcnode-id="1081" instrument_node="">:</span><a class="external text" data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1086/343411" rel="nofollow"><span data-dcnode-id="1080" instrument_node="">10.1086/343411</span></a><span data-dcnode-id="1078" instrument_node="">. </span><a class="mw-redirect" data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ISSN_%28identifier%29" title="ISSN (identifier)"><span data-dcnode-id="1077" instrument_node="">ISSN</span></a><span data-dcnode-id="1075" instrument_node="">&nbsp;</span><a class="external text" data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldcat.org/issn/0022-2801" rel="nofollow"><span data-dcnode-id="1074" instrument_node="">0022-2801</span></a><span data-dcnode-id="1072" instrument_node="">. </span><a class="mw-redirect" data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/S2CID_%28identifier%29" title="S2CID (identifier)"><span data-dcnode-id="1071" instrument_node="">S2CID</span></a><span data-dcnode-id="1069" instrument_node="">&nbsp;</span><a class="external text" data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//api.semanticscholar.org/CorpusID%3A142829949" rel="nofollow"><span data-dcnode-id="1068" instrument_node="">142829949</span></a><span data-dcnode-id="1066" instrument_node="">.</span></cite><span class="Z3988" data-dcnode-id="1064" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;rft.genre=article&amp;rft.jtitle=The+Journal+of+Modern+History&amp;rft.atitle=Did+Stalin+Kill+Kirov+and+Does+It+Matter%3F&amp;rft.volume=74&amp;rft.issue=2&amp;rft.pages=352-380&amp;rft.date=2002-06&amp;rft_id=https%3A%2F%2Fapi.semanticscholar.org%2FCorpusID%3A142829949%23id-name%3DS2CID&amp;rft.issn=0022-2801&amp;rft_id=info%3Adoi%2F10.1086%2F343411&amp;rft.aulast=Lenoe&amp;rft.aufirst=Matt&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3ASoviet+democracy"></span></span><span data-dcnode-id="1062" instrument_node="">

</span><li data-dcnode-id="1032" id="cite_note-Priestland-8"><span class="mw-cite-backlink" data-dcnode-id="1056"><b data-dcnode-id="1057"><a aria-label="Jump up" data-dcnode-id="1058" href="#cite_ref-Priestland_8-0" title="Jump up"><span data-dcnode-id="1059" instrument_node="">^</span></a></b></span><span data-dcnode-id="1055" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1034"><link data-dcnode-id="1054" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation web cs1" data-dcnode-id="1036" id="CITEREFPriestland"><a data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Priestland" title="David Priestland"><span data-dcnode-id="1053" instrument_node="">Priestland, David</span></a><span data-dcnode-id="1051" instrument_node="">. </span><a class="external text" data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//library.fes.de/libalt/journals/swetsfulltext/13937520.pdf" rel="nofollow"><span data-dcnode-id="1050" instrument_node="">"Soviet Democracy, 1917–91"</span></a><span data-dcnode-id="1048" instrument_node=""> </span><span class="cs1-format" data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">(PDF)</span></span><span data-dcnode-id="1045" instrument_node="">. </span><i data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Bibliothek der Friedrich-Ebert-Stiftung</span></i><span data-dcnode-id="1042" instrument_node="">. </span><q data-dcnode-id="1037"><span data-dcnode-id="1041" instrument_node="">Lenin  defended all four elements of Soviet democracy in his seminal theoretical work of 1917, </span><i data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">State and Revolution</span></i><span data-dcnode-id="1038" instrument_node="">. The time had come, Lenin argued, for the destruction of the foundations of the bourgeois state, and its replacement with an ultra-democratic 'Dictatorship of the Proletariat' based on the model of democracy followed by the communards of Paris in 1871. Much of the work was theoretical, designed, by means of quotations from Marx and Engels, to win battles within the international Social Democratic movement against Lenin's arch-enemy Kautsky. However, Lenin was not operating only in the realm of theory. He took encouragement from the rise of a whole range of institutions that seemed to  embody  class-based,  direct  democracy,  and  in  particular  the soviets and the factory committees, which demanded the right to 'supervise' (kontrolirovat') (although  not  to  take  the  place  of) factory management.</span></q></cite><span class="Z3988" data-dcnode-id="1035" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;rft.genre=unknown&amp;rft.jtitle=Bibliothek+der+Friedrich-Ebert-Stiftung&amp;rft.atitle=Soviet+Democracy%2C+1917%E2%80%9391&amp;rft.aulast=Priestland&amp;rft.aufirst=David&amp;rft_id=https%3A%2F%2Flibrary.fes.de%2Flibalt%2Fjournals%2Fswetsfulltext%2F13937520.pdf&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3ASoviet+democracy"></span></span><span data-dcnode-id="1033" instrument_node="">
