</span><p data-dcnode-id="987"><span data-dcnode-id="988"><span data-dcnode-id="989"><span data-dcnode-id="990"><span data-dcnode-id="991"><span data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">While liberal state officials had been attempting to implement liberal economic reforms in France – often against the will of merchant-industrialists – since at least the second half of the eighteenth century (efforts had intensified in the wake of the Seven Years’ War defeat to England), a successful capitalist transition finally began under the Second Empire and continued under the Third Republic. The combination of the instituting of a new regime in France, on the one hand, and of the emergence of a new international context, on the other hand, allowed and compelled the French state to initiate this capitalist transition. State actors and French elite remained deeply divided on the need and desirability to support the transition, but pro-capitalist forces finally held sway.</span></span></span></span></span></span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980"><span data-dcnode-id="981"><span data-dcnode-id="982"><span data-dcnode-id="983"><span data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">The consolidation of industrial capitalism during the second third of the nineteenth century had allowed the British state to raise unmatched revenues to fund its military without undermining its economic base, while technical innovations also allowed for the mechanisation of warfare. This transformed the international context, precipitating state unification and restructuring processes while ruling classes were compelled to modernise their economies by emulating the English model. Germany, the United States and Japan’s power grew rapidly, and France also had to adapt to this new context in order to maintain its geopolitical standing.</span></span></span></span></span></span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972"><span data-dcnode-id="973"><span data-dcnode-id="974"><span data-dcnode-id="975"><span data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">The rise of the Second Empire after the 1851 coup, imposed a personalised quasi-dictatorship that was freer of parliamentary control compared to previous regimes. Under the influence of liberal Saint-Simonian high-ranking public servants, Napoleon III rapidly asserted that an industrial revolution was necessary to consolidate the new regime. Rapid industrial growth would provide means to preserve the nation’s greatness – by successfully keeping at bay the growing military power of foreign ruling classes and their states – and to co-opt the working class – by reducing unemployment and increasing popular consumption.</span></span></span></span></span></span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="964"><span data-dcnode-id="965"><span data-dcnode-id="966"><span data-dcnode-id="967"><span data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">The Emperor’s government rapidly liberalised the financial sector and actively supported to development investment banking. Yet, even as capital supply improved, capital demand remained limited in the absence of market imperatives that would make profit-maximisation a matter of economic survival and would compel French firms to systematically invest in labour-productivity enhancing technologies. The state consequently committed to building a competitive market by actively directing capital investments toward railroad building. The rapid development of railways, the construction of a national telegraph network, and the concomitant emergence of new commercial and marketing practices, led to the formation of an integrated and competitive economic space over the 1860s and 1870s, which wiped out whole regional industries as guaranteed profits derived from monopolies evaporated.</span></span></span></span></span></span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953"><span data-dcnode-id="954"><span data-dcnode-id="955"><span data-dcnode-id="956"><span data-dcnode-id="957"><span data-dcnode-id="961" instrument_node="">In parallel, the Emperor’s government used its unrestricted power regarding international trade policies to stimulate the modernisation of the economy by signing a commercial treaty with Britain in 1860 – against strident opposition from French industrialists who denounced a “</span><em data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">coup d’État douanier</span></em><span data-dcnode-id="958" instrument_node="">”. This and subsequent commercial treaties with numerous European states exposed French industrial firms to foreign competition. A unified national market was now integrated to, and exposed to the competitive imperatives of, an emerging global capitalist market.</span></span></span></span></span></span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936"><span data-dcnode-id="937"><span data-dcnode-id="938"><span data-dcnode-id="939"><span data-dcnode-id="940"><span data-dcnode-id="950" instrument_node="">Within this new competitive context, French firms were compelled to seize control over labour processes so as to improve productivity. From the late 1860s, the </span><em data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Cour de cassation</span></em><span data-dcnode-id="947" instrument_node=""> – France’s highest court of justice – began, with the Senate’s backing and against occasional opposition from the </span><em data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Chambre des députés</span></em><span data-dcnode-id="944" instrument_node="">, to invalidate rulings by </span><em data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">prud’hommes</span></em><span data-dcnode-id="941" instrument_node=""> council, with the consequence of rapidly eroding customary regulation of artisan and industrial trades. The upshot was the gradual imposition of a new industrial and time discipline across the country. </span></span></span></span></span></span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928"><span data-dcnode-id="929"><span data-dcnode-id="930"><span data-dcnode-id="931"><span data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Using Marx’s concepts, we can say that the subsumption of labour by capital was taking not only a formal but also increasingly a real form in core industrial sectors, as investments and mechanisation increased at an unprecedented pace. This happened because of tighter price competition in the context of the (so-called) long depression of the last third of the nineteenth century, as international integration was growing apace. The average annual growth of horsepower in use in French industry went from 9500 from 1839 to 1869, up to 32,800 from 1871 to 1894, before reaching 73,350 from 1883 to 1903 and 141,800 from 1903 to 1913. Accordingly, the share of industrial investments in total investments reached 38 percent from 1905 to 1913, up from 13 percent from the mid-1840s to the mid-1850s.</span></span></span></span></span></span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920"><span data-dcnode-id="921"><span data-dcnode-id="922"><span data-dcnode-id="923"><span data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">This unprecedented acceleration of industrial investments took place at a time when internal consumer demand stagnated. Consequently, these new “capitalistic” (to use François Caron’s phrase) patterns of investments cannot be explained by the pull of market demand. They were in fact fuelled by a qualitative transformation of social property relations. </span></span></span></span></span></span></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912"><span data-dcnode-id="913"><span data-dcnode-id="914"><span data-dcnode-id="915"><span data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">While growing international demand contributed to the acceleration of French industrialisation from the second half of the 1890s and until World War I, the absence of agrarian capitalism in France implied that the country’s consumer market remained limited, and this considerably slowed down its process of capitalist industrialisation. Exposure to international price competition (and national competition in a newly integrated French market) did have the effect of rapidly eliminating cottage textile production and other forms of ancillary sources of income over the period. This forced growing numbers of poorer peasants that were unable to buy land and that had relied on proto-industrial activities to move to urban centres and to engage exclusively in industrial labour. The process of urbanisation, however, remained slow and limited. This was because, international competition also had the effect of devaluating land and this led many large landlords to shed part of their domains (as they began to increasingly invest in industrial firms), which allowed peasants that could afford it to buy new land and to secure plots that allowed them to be self-sufficient. The upshot was a seclusion of the French peasantry from ongoing economic changes for the rest of the century and well into the twentieth.</span></span></span></span></span></span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894"><span data-dcnode-id="895"><span data-dcnode-id="896"><span data-dcnode-id="904"><span data-dcnode-id="905"><span data-dcnode-id="909" instrument_node="">The French state and ruling class did not challenge this entrenchment of a large peasantry. The latter class had formed the basis of successive regimes and had often (though not always!) acted as a buffer against a radicalising urban working class. Political leaders, many still attached to a traditional rural France, delayed the transition to agrarian capitalism. Accordingly, they made sure to re-establish relatively higher tariffs on foreign agricultural products from the 1880s and 1890s. A massive French peasantry remained in place well into the twentieth century, and a capitalist transformation of the country’s agriculture induced by purposeful state policies was necessary before France could experience the economic boom of the so-called </span><em data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Trente Glorieuses</span></em><span data-dcnode-id="906" instrument_node="">.</span></span></span><span data-dcnode-id="898"><span data-dcnode-id="899"><span data-dcnode-id="900"><span data-dcnode-id="901"><a class="see-footnote" data-dcnode-id="902" href="#footnote17_n795tsg" id="footnoteref17_n795tsg" title="Isett, Christopher, and Stephen Miller 2017, The Social History of Agriculture: From the Origins to the Current Crisis, London/New York: Rowman &amp; Littlefield. "><span data-dcnode-id="903" instrument_node="">17</span></a></span></span></span></span><span data-dcnode-id="897" instrument_node=""> </span></span></span></span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880"><span data-dcnode-id="881"><span data-dcnode-id="882"><em data-dcnode-id="888"><span data-dcnode-id="889"><span data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Your book concentrates particularly on the period 1750-1914 but slavery and colonialism don’t seem to play a major role in the changes you discuss. In </span></span></span></em><span data-dcnode-id="883"><span data-dcnode-id="884"><span data-dcnode-id="887" instrument_node="">How The West Came to Rule</span><em data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">, Alexander Anievas and Kerem Nisancioglu criticise “Political Marxism” for its Eurocentrism – notably by minimising the importance of extra-European sources of wealth in the formation of European capitalism. Does this criticism seem valid to you?</span></em></span></span></span></span></span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="863"><span data-dcnode-id="864"><span data-dcnode-id="865"><span data-dcnode-id="875"><span data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Political Marxism has been accused of Eurocentrism by some but, following Ellen Wood,</span></span></span><span data-dcnode-id="869"><span data-dcnode-id="870"><span data-dcnode-id="871"><span data-dcnode-id="872"><a class="see-footnote" data-dcnode-id="873" href="#footnote18_5x122ob" id="footnoteref18_5x122ob" title="This has been brilliantly explained by Ellen Wood&nbsp;: https://solidarity-us.org/atc/92/p993/"><span data-dcnode-id="874" instrument_node="">18</span></a></span></span></span></span><span data-dcnode-id="866"><span data-dcnode-id="867"><span data-dcnode-id="868" instrument_node=""> I would argue that it actually offers a deeply powerful response to Western chauvinism while, paradoxically, most anti-Eurocentric theories are based on Eurocentric assumptions. Eurocentrists explains the transition to capitalism in Western Europe by its capacity to remove obstacles to the maturation of commercial activities into modern industrial capitalism; obstacles that remain in place and consequently stall the development of non-Western civilisations. Most anti-Eurocentric responses reverse the argument while sticking to a similar conception of capitalism, claiming that the failure of non-European societies that had reached high level of commercial development – in many cases superior to European societies – to transit toward mature industrial capitalism derives from impediments stemming from Western imperialism. This line of argument assumes that non-Western societies ought to be judged according to their capacity to follow the capitalist path of development trailed before them by Westerners, as if capitalism was the natural order of things. As Wood puts it, there is “no more effective way to puncture the Western sense of superiority than to challenge the triumphalist conviction that the Western path of historical development is the natural and inevitable way of things”, and doing this implies stressing the historical specificity of capitalism.</span></span></span></span></span></span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846"><span data-dcnode-id="847"><span data-dcnode-id="848"><span data-dcnode-id="858"><span data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Anievas and Nisancioglu refuse to work from a clearly defined conception of capitalism as a historically specifically social form and prefer to approach it as “assemblages” or “bundles” of social relations and processes. While their book is stimulating in many ways, this indeterminacy leads to serious theoretical and empirical flaws.</span></span></span><span data-dcnode-id="852"><span data-dcnode-id="853"><span data-dcnode-id="854"><span data-dcnode-id="855"><a class="see-footnote" data-dcnode-id="856" href="#footnote19_mrqfrbc" id="footnoteref19_mrqfrbc" title="See the excellent review of How the West Came to Rule by Spencer Dimmock for a discussion of these flaws&nbsp;: http://www.historicalmaterialism.org/book-review/eastern-origins-capitalism"><span data-dcnode-id="857" instrument_node="">19</span></a></span></span></span></span><span data-dcnode-id="849"><span data-dcnode-id="850"><span data-dcnode-id="851" instrument_node=""> These authors fault political Marxism for its “internalist” perspective, which, they claim, does not allow to factor-in “inter-societal” relations and the contribution of colonial plunder to the emergence of European capitalism. Anevias and Nisancioglu put forth an alternative explanation of the origins of capitalism using the notion of uneven and combined development as their central explanatory concept. </span></span></span></span></span></span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829"><span data-dcnode-id="830"><span data-dcnode-id="831"><span data-dcnode-id="841"><span data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">As first major problem with this perspective is that it is anachronistic.</span></span></span><span data-dcnode-id="835"><span data-dcnode-id="836"><span data-dcnode-id="837"><span data-dcnode-id="838"><a class="see-footnote" data-dcnode-id="839" href="#footnote20_lsr6u9l" id="footnoteref20_lsr6u9l" title="Post, Charles, 2018, «&nbsp;The Use and Misuse of Uneven and Combined Development&nbsp;: A Critique of Anevias and Nişancıoğlu&nbsp;», Historical Materialism, Vol. 26 (3); Rioux, Sébastien, 2015, «&nbsp;Mind the (Theoretical) Gap: On the Poverty of International Relations Theorising of Uneven and Combined Development&nbsp;», Global Society, Vol. 29 (4), p. 481-509. "><span data-dcnode-id="840" instrument_node="">20</span></a></span></span></span></span><span data-dcnode-id="832"><span data-dcnode-id="833"><span data-dcnode-id="834" instrument_node=""> While states did try to emulate the best military and administrative practices of other states, geopolitical interaction before capitalism reproduced and deepened uneven development – there was no combined development of sustained economic growth because such economic dynamics where nowhere to be found. It was the consolidation of industrial capitalism in England that initiated uneven and combined patterns of global development, as non-capitalist ruling classes were forced to adopt capitalist social relations and patterns of industrialisation, and did so with uneven success.</span></span></span></span></span></span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818"><span data-dcnode-id="819"><span data-dcnode-id="820"><span data-dcnode-id="821"><span data-dcnode-id="822"><span data-dcnode-id="826" instrument_node="">Moreover, the accusation of “internalism” placed against political Marxists is unwarranted. Recall that our conception of historical materialism revolves around the concept of social property relation (or mode of exploitive production) that always encompasses vertical relations of class exploitation between exploiters and direct producers and </span><em data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">horizontal</span></em><span data-dcnode-id="823" instrument_node=""> relations (of competition or cooperation) between members of social classes. Both dimensions of class relations are given equal explanatory weight, and horizontal relations always involve a given logic of inter-societal interaction and competition between ruling classes and their states, including war, trade, and colonial efforts. </span></span></span></span></span></span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810"><span data-dcnode-id="811"><span data-dcnode-id="812"><span data-dcnode-id="813"><span data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">This means that dynamics deriving from the rules of reproduction of a set of social property relations (or, to put it differently, the “laws of motion” of a mode of exploitative production) within a given state (or several states) can transform the logic of international relations – and the logic of colonisation/imperialism – in a given historical period.&nbsp; Conversely, it also means that the effects on international relations are always “filtered” by the social property relations and balances of power between and within classes in a given society.</span></span></span></span></span></span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796"><span data-dcnode-id="797"><span data-dcnode-id="798"><span data-dcnode-id="805"><span data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Whether or not slave labour exploited in colonies contributed to the development of capitalism in different European states depends on the dialectics between international dynamics and the social property relations in place within given countries. European colonial ventures followed distinct logics. The English colonial Empire was the product of the dynamics of agrarian capitalism, which fuelled rapid population growth and thus settler colonialism aimed at reproducing capitalist property tenure abroad, while also creating a mass domestic market serving as an outlet for exotic goods like coffee, tobacco and sugar. Rapid industrialisation subsequently fuelled cotton production in the colonies. While the exploitation of these resources did not cause the emergence of capitalism in England, it did greatly contribute to its development, just like the industrial revolution of the metropolitan economy also stimulated the rise of cotton production in the American South. Colonial planters benefited from metropolitan demand, and profits derived from slave labour were reinvested “productively” in England were capitalist social property relations compelled firms to maximise profits, increase productivity, and develop productive forces to stay afloat.</span></span></span><span data-dcnode-id="799"><span data-dcnode-id="800"><span data-dcnode-id="801"><span data-dcnode-id="802"><a class="see-footnote" data-dcnode-id="803" href="#footnote21_zokwlii" id="footnoteref21_zokwlii" title="Blackburn, Robin, 2010 [1997], The Making of New World Slavery: From the Baroque to the Modern, Verso, 1997&nbsp;; Post, Charles, 2017, «&nbsp;Slavery and the New History of Capitalism&nbsp;», Vol. 1 (1). "><span data-dcnode-id="804" instrument_node="">21</span></a></span></span></span></span></span></span></span></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770"><span data-dcnode-id="771"><span data-dcnode-id="772"><span data-dcnode-id="791"><span data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">The colonial empires of Spain, Portugal, Holland and France, however, were variations of a continuity of a feudal-absolutist logic of expansion.</span></span></span><span data-dcnode-id="785"><span data-dcnode-id="786"><span data-dcnode-id="787"><span data-dcnode-id="788"><a class="see-footnote" data-dcnode-id="789" href="#footnote22_l81m2hq" id="footnoteref22_l81m2hq" title="Wood, Ellen Meiksins, 2003, The Empire of Capital, Verso. "><span data-dcnode-id="790" instrument_node="">22</span></a></span></span></span></span><span data-dcnode-id="782"><span data-dcnode-id="783"><span data-dcnode-id="784" instrument_node=""> Monarchs sponsored colonial ventures to secure economic resources they could not amass at home thus projecting on the Atlantic world (and beyond) the international political-military competition that persisted among the non-capitalist ruling classes of the European continent.</span></span></span><span data-dcnode-id="776"><span data-dcnode-id="777"><span data-dcnode-id="778"><span data-dcnode-id="779"><a class="see-footnote" data-dcnode-id="780" href="#footnote23_ub5iwrn" id="footnoteref23_ub5iwrn" title="Post 2017, p. 181. "><span data-dcnode-id="781" instrument_node="">23</span></a></span></span></span></span><span data-dcnode-id="773"><span data-dcnode-id="774"><span data-dcnode-id="775" instrument_node=""> Much of the trade and colonisation was undertaken by state-sanctioned merchant companies that enjoyed monopolies over slave trade and other imports and exports. As a rule, the wealth violently extracted from colonies was spent on feudal-absolutist pursuits, mostly on war, empire building and the conspicuous consumption of ruling classes, not as capitalist investments.</span></span></span></span></span></span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744"><span data-dcnode-id="745"><span data-dcnode-id="746"><span data-dcnode-id="765"><span data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">The colonisation of the English Caribbean and North America was undertaken by “new merchants”, as opposed “company merchants”.</span></span></span><span data-dcnode-id="759"><span data-dcnode-id="760"><span data-dcnode-id="761"><span data-dcnode-id="762"><a class="see-footnote" data-dcnode-id="763" href="#footnote24_hf209cp" id="footnoteref24_hf209cp" title="Brenner, Robert, 2003, Merchants and Revolution, Verso. "><span data-dcnode-id="764" instrument_node="">24</span></a></span></span></span></span><span data-dcnode-id="756"><span data-dcnode-id="757"><span data-dcnode-id="758" instrument_node=""> Because merchants could seize land from planters, the latter were market dependent and subjected to competitive imperatives. The French colonisation of Caribbean islands was actually also largely assumed by independent entrepreneur that partially escaped royal monopolies. Yet, laws forbade the seizure of the planters’ land and slaves to cover debts and competitive constraints remained absent in this case.</span></span></span><span data-dcnode-id="750"><span data-dcnode-id="751"><span data-dcnode-id="752"><span data-dcnode-id="753"><a class="see-footnote" data-dcnode-id="754" href="#footnote25_620hrcq" id="footnoteref25_620hrcq" title="Blackburn 2010, p. 444-445. "><span data-dcnode-id="755" instrument_node="">25</span></a></span></span></span></span><span data-dcnode-id="747"><span data-dcnode-id="748"><span data-dcnode-id="749" instrument_node=""> Consequently, while French planters violently extracted great wealth exploiting slave labour in Saint-Domingue, Martinique and Guadeloupe their enterprises do not appear to have been capitalist.</span></span></span></span></span></span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736"><span data-dcnode-id="737"><span data-dcnode-id="738"><span data-dcnode-id="739"><span data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">In any case, it is clear that the great wealth extracted by French planters committing atrocities in Caribbean colonies did not contribute to capitalist industrialisation in France. France did not have a mass consumer market, and French Caribbean sugar plantations and mills produced the finest white sugar, which was for the most part re-exported by French merchants as luxury products on European markets, where it was consumed by members of upper classes. There was no price competition, and profits were largely canalised toward the conspicuous consumption of notables. </span></span></span></span></span></span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="727"><span data-dcnode-id="728"><span data-dcnode-id="729"><span data-dcnode-id="730"><span data-dcnode-id="731"><span data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">A substantial portion of French economic growth over the eighteenth century was due to rising foreign trade, which quadrupled from 1716 to 1788, in good part due to the development Atlantic commerce, especially with Saint-Domingue. This trade, however, scarcely contributed to industrial modernisation, and involved mainly foodstuffs. France mostly traded wheat and wine with its Antillean colonies in exchange for sugar and coffee, 60 to 80 percent of which was re-exported. </span></span></span></span></span></span></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693"><span data-dcnode-id="694"><span data-dcnode-id="695"><span data-dcnode-id="723"><span data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Colonial trade did propel the swift development of proto-industrial enclaves around port cities such as Bordeaux and Nantes, but France’s external and domestic economies remained very poorly integrated and only a very limited portion of commercial capital engaged in colonial ventures was rechannelled as investments into the metropolitan economy.</span></span></span><span data-dcnode-id="717"><span data-dcnode-id="718"><span data-dcnode-id="719"><span data-dcnode-id="720"><a class="see-footnote" data-dcnode-id="721" href="#footnote26_2bo1t6w" id="footnoteref26_2bo1t6w" title="Tarrade, Jean 1972, Le commerce colonial de la France à la fin de l’Ancien Régime: l’évolution du régime de l’exclusif de 1763 à 1789, Paris: Presses universitaires de France. "><span data-dcnode-id="722" instrument_node="">26</span></a></span></span></span></span><span data-dcnode-id="714"><span data-dcnode-id="715"><span data-dcnode-id="716" instrument_node=""> The percentage of manufactured goods in total French exports scarcely altered across the eighteenth century whereas the percentage of manufacturing import rose significantly. Meanwhile, Britain mainly imported raw materials and the rising productivity of its industrial sector allowed for rising manufacturing exports.</span></span></span><span data-dcnode-id="708"><span data-dcnode-id="709"><span data-dcnode-id="710"><span data-dcnode-id="711"><a class="see-footnote" data-dcnode-id="712" href="#footnote27_aq2lizq" id="footnoteref27_aq2lizq" title="Jones, P. M. 1995, Reform and Revolution in France. The Politics of Transition, 1774–1791, Cambridge: Cambridge University Press, p. 99-100. "><span data-dcnode-id="713" instrument_node="">27</span></a></span></span></span></span><span data-dcnode-id="705"><span data-dcnode-id="706"><span data-dcnode-id="707" instrument_node=""> Silvia Marzagalli explains that “colonial imports only gave modest stimulus to the French economy as a whole, in contrast to the British economy characterized by the importance of exporting manufactures. The growth of French overseas trade, with its strong colonial component, did not on the whole benefit the rest of the French economy, and was a sort of “bubble” depending on special conditions laid down for a time by the French state”.</span></span></span><span data-dcnode-id="699"><span data-dcnode-id="700"><span data-dcnode-id="701"><span data-dcnode-id="702"><a class="see-footnote" data-dcnode-id="703" href="#footnote28_8h0fclc" id="footnoteref28_8h0fclc" title="Marzagalli, Silvia 2012, ‘Commerce’, in The Oxford Handbook of the Ancien Régime, edited by William Doyle, Oxford: Oxford University Press, p. 262. "><span data-dcnode-id="704" instrument_node="">28</span></a></span></span></span></span><span data-dcnode-id="696"><span data-dcnode-id="697"><span data-dcnode-id="698" instrument_node=""> The loss of Saint-Domingue and British hegemony over the Atlantic from the early 1790s led to the collapse of France’s trade with its colonies and of much of the industrial activities that depended on it, and the overwhelming superiority of British trade with the Americas continued during the nineteenth century.</span></span></span></span></span></span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679"><span data-dcnode-id="680"><span data-dcnode-id="681"><span data-dcnode-id="688"><span data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">As summarised by Crouzet, the expansion of the French economy over the eighteenth century – during which the development of its slave colonies reached its apex – “took place in a framework that, in its organisational aspects and in terms of methods, remained very much traditional […] On the eve of the Revolution, the French economy was not fundamentally different than what it had been under Louis XIV: it only produced more.”</span></span></span><span data-dcnode-id="682"><span data-dcnode-id="683"><span data-dcnode-id="684"><span data-dcnode-id="685"><a class="see-footnote" data-dcnode-id="686" href="#footnote29_09ee0e2" id="footnoteref29_09ee0e2" title="Crouzet, François 1966, ‘Angleterre et France au XVIIIe siècle : essai d’analyse comparée de deux croissances économiques’, Annales. Économies, Sociétés, Civilisations, 21 (2): 254–91, p. 271-272 (my translation). "><span data-dcnode-id="687" instrument_node="">29</span></a></span></span></span></span></span></span></span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="671"><span data-dcnode-id="672"><span data-dcnode-id="673"><span data-dcnode-id="674"><span data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">During the Second Empire, as I explained earlier, the French industrial sector began a capitalist transformation. This transition began just before the rapid growth and consolidation of much of the French colonial empire in Africa and Indochina. Protected colonial markets like the Algerian market, where colonisation began in 1830 and was completed by the end of the 1850s, actually served for a while as a rampart against international competition – and thus against the constraints of capitalist restructuring – for French industrial firms, even after the signature of commercial treaties from 1860.</span></span></span></span></span></span></p><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636"><span data-dcnode-id="637"><span data-dcnode-id="638"><span data-dcnode-id="666"><span data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Having said this, it is also crucial to underline that, during the last third of the nineteenth century, the emergence of capitalism in France transformed the nature of its colonial endeavours, as has been shown by works such as Martin J. Murray’s on capitalist development in French Indochina from the 1870s.</span></span></span><span data-dcnode-id="660"><span data-dcnode-id="661"><span data-dcnode-id="662"><span data-dcnode-id="663"><a class="see-footnote" data-dcnode-id="664" href="#footnote30_ok3c7ex" id="footnoteref30_ok3c7ex" title="Murray, Martin J. 1980, The Development of Capitalism in Colonial Indochina (1870-1940), University of California Press. "><span data-dcnode-id="665" instrument_node="">30</span></a></span></span></span></span><span data-dcnode-id="657"><span data-dcnode-id="658"><span data-dcnode-id="659" instrument_node=""> Murray exposes the way in which French capitalist firms, supported by the colonial administration, engaged in efforts of “outward expansion of the capitalist production and circulation processes”.</span></span></span><span data-dcnode-id="651"><span data-dcnode-id="652"><span data-dcnode-id="653"><span data-dcnode-id="654"><a class="see-footnote" data-dcnode-id="655" href="#footnote31_qzn7n2w" id="footnoteref31_qzn7n2w" title="Murray 1980, p. 5. "><span data-dcnode-id="656" instrument_node="">31</span></a></span></span></span></span><span data-dcnode-id="648"><span data-dcnode-id="649"><span data-dcnode-id="650" instrument_node=""> These efforts led to differentiated patterns of development in different regions of French Indochina, and lead to processes of “primitive accumulation” at the initiative of French capital, which put in place rubber plantations exploiting dispossessed wage-labour in Cochinchina and South Annam. The aim of metropolitan capitalist enterprises was to extract natural resources out of the colonies while “organizing the capitalist labor process in such a manner that unit costs remained sufficiently lower than the prices which could be obtained on the world market, thereby guaranteeing at least normal rates of proft”.</span></span></span><span data-dcnode-id="642"><span data-dcnode-id="643"><span data-dcnode-id="644"><span data-dcnode-id="645"><a class="see-footnote" data-dcnode-id="646" href="#footnote32_9a85yih" id="footnoteref32_9a85yih" title="Murray 1980, p. 256. "><span data-dcnode-id="647" instrument_node="">32</span></a></span></span></span></span><span data-dcnode-id="639"><span data-dcnode-id="640"><span data-dcnode-id="641" instrument_node=""> The dynamics of market competition and of labour subsumption that had taken root in the metropolitan France were now operating within colonies.</span></span></span></span></span></span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628"><span data-dcnode-id="629"><span data-dcnode-id="630"><span data-dcnode-id="631"><span data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">We need to rethink the history of the French colonial Empire that was consolidated around the turn of the twentieth century in a way that will allow us to assess the impact of the transition to industrial capitalism on colonising processes and to reconsider the impact of these processes on French capitalist development into the twentieth century.</span></span></span></span></span></span></p><span data-dcnode-id="626" instrument_node="">
