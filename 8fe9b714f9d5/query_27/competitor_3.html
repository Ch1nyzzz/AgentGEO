</span><div class="clearfix text-formatted field field--name-body field--type-text-with-summary field--label-hidden field__item" data-dcnode-id="106"><p data-dcnode-id="1684"><span data-dcnode-id="1685"><span data-dcnode-id="1686"><span data-dcnode-id="1687"><em data-dcnode-id="1744"><span data-dcnode-id="1745" lang="FR" xml:lang="FR"><span data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">Xavier Lafrance </span></span></span></em><em data-dcnode-id="1740"><span data-dcnode-id="1741"><span data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">teaches political science at the </span></span></span></em><em data-dcnode-id="1736"><span data-dcnode-id="1737" lang="FR" xml:lang="FR"><span data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Université du Québec à Montréal. </span></span></span></em><em data-dcnode-id="1732"><span data-dcnode-id="1733"><span data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">With</span></span></span></em><em data-dcnode-id="1728"><span data-dcnode-id="1729" lang="FR" xml:lang="FR"><span data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node=""> Charles Post, </span></span></span></em><em data-dcnode-id="1724"><span data-dcnode-id="1725"><span data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">he co-edited the book </span></span></span></em><span data-dcnode-id="1721" lang="FR" xml:lang="FR"><span data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Case Studies in the Origins of Capitalism</span></span></span><em data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node=""> </span></em><em data-dcnode-id="1715"><span data-dcnode-id="1716" lang="FR" xml:lang="FR"><span data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">(Palgrave 2018) </span></span></span></em><em data-dcnode-id="1711"><span data-dcnode-id="1712"><span data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">and he is the author of </span></span></span></em><span data-dcnode-id="1706" lang="FR" xml:lang="FR"><span data-dcnode-id="1707"><span data-dcnode-id="1710" instrument_node="">The Making of Capitalism in France. Class Structures, Economic Development, the State and the Formation of the French Working Class, 1750-1914&nbsp;</span><em data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">(Brill, «&nbsp;Historical Materialism&nbsp;</span></em></span></span><em data-dcnode-id="1702"><span data-dcnode-id="1703"><span data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Book Series</span></span></span></em><em data-dcnode-id="1698"><span data-dcnode-id="1699" lang="FR" xml:lang="FR"><span data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">, 2019)</span></span></span></em><em data-dcnode-id="1694"><span data-dcnode-id="1695"><span data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node=""> – now out in paperback </span></span></span></em><span data-dcnode-id="1688"><span data-dcnode-id="1689"><a data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.haymarketbooks.org/books/1462-the-making-of-capitalism-in-france"><em data-dcnode-id="1691"><span data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">https://www.haymarketbooks.org/books/1462-the-making-of-capitalism-in-france</span></span></em></a></span></span></span></span></span></p><span data-dcnode-id="1683" instrument_node="">
</span><p data-dcnode-id="1669"><span data-dcnode-id="1670"><span data-dcnode-id="1671"><span data-dcnode-id="1672"><em data-dcnode-id="1679"><span data-dcnode-id="1680"><span data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">This interview first appeared at </span></span></span></em><span data-dcnode-id="1673"><span data-dcnode-id="1674"><a data-dcnode-id="1675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.contretemps.eu/construction-capitalisme-france-entretien/"><em data-dcnode-id="1676"><span data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">https://www.contretemps.eu/construction-capitalisme-france-entretien/</span></span></em></a></span></span></span></span></span></p><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1653"><span data-dcnode-id="1654"><span data-dcnode-id="1655"><em data-dcnode-id="1664"><span data-dcnode-id="1665"><span data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">Could you tell us about your political and intellectual background&nbsp;? In the introduction to </span></span></span></em><span data-dcnode-id="1656"><span data-dcnode-id="1657"><span data-dcnode-id="1663" instrument_node="">The Making of Capitalism in France</span><em data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">, you write that the theoretical framework you are inclined towards is the one you call “political Marxism” (which you prefer to call </span></em><span data-dcnode-id="1660" instrument_node="">Capital</span><em data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">-centric Marxism): could you say more about your relationship to this theoretical tradition? </span></em></span></span></span></span></span></p><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1638"><span data-dcnode-id="1639"><span data-dcnode-id="1640"><span data-dcnode-id="1641"><span data-dcnode-id="1642"><span data-dcnode-id="1643"><span data-dcnode-id="1650" instrument_node="">In the book, I’m using the “Political Marxist” framework developed by Robert Brenner and Ellen Meiksins Wood from the late 1970s and early 1980s, building on Marx’s mature critique of political economy. In his early works – especially in </span><em data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">The German Ideology</span></em><span data-dcnode-id="1647" instrument_node=""> and </span><em data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">The Communist Manifesto</span></em><span data-dcnode-id="1644" instrument_node=""> – Marx was still under the influence of Adam Smith’s classical presentation of the “commercial model”, in which the expansion of market exchanges drove an ongoing division of labour and development of productive forces that culminated with the rise of capitalism (or what Smith called “commercial society”).</span></span></span></span></span></span></p><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1618"><span data-dcnode-id="1619"><span data-dcnode-id="1620"><span data-dcnode-id="1621"><span data-dcnode-id="1622"><span data-dcnode-id="1623"><span data-dcnode-id="1636" instrument_node="">Marx broke with these Smithian assumptions in the </span><em data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">Grundrisse</span></em><span data-dcnode-id="1633" instrument_node=""> and in his masterpiece, </span><em data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Capital</span></em><span data-dcnode-id="1630" instrument_node=""> (hence the phrase “</span><em data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Capital</span></em><span data-dcnode-id="1627" instrument_node="">-centric Marxism). In these works, Marx rejected the classical political economists’ notion of a “so called primitive accumulation” initiating the emergence of capitalism. He stressed that no amount of commercial expansion or accumulation of monetary wealth could ever by themselves explain the transition to capitalism. Capital is not a thing but a “social relation” and the emergence of capitalism required a radical transformation of class relations – a qualitative reconfiguration of social power, not a mere quantitative accumulation of wealth. To explain this transformation of class relations, Marx devoted most of the last section of the first volume of </span><em data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Capital</span></em><span data-dcnode-id="1624" instrument_node=""> to an analysis of the mass and violent expropriation of peasants from their land that took place in the English countryside during the early modern period.</span></span></span></span></span></span></p><span data-dcnode-id="1617" instrument_node="">
</span><p data-dcnode-id="1601"><span data-dcnode-id="1602"><span data-dcnode-id="1603"><span data-dcnode-id="1604"><span data-dcnode-id="1614"><span data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Building upon and developing Marx’s argument, Brenner published landmark articles</span></span></span><span data-dcnode-id="1608"><span data-dcnode-id="1609"><span data-dcnode-id="1610"><span data-dcnode-id="1611"><a class="see-footnote" data-dcnode-id="1612" href="#footnote1_sloiqcq" id="footnoteref1_sloiqcq" title="Brenner, Robert (1976) ”Agrarian Class Structure and Economic Development in Pre-Industrial Europe”, Past &amp; Present, no. 79 pp. 30-75;&nbsp; Brenner, Robert 1977, ‘The Origins of Capitalist Development: A Critique of Neo-Smithian Marxism’, New Left Review, I, no. 104: 25–92. "><span data-dcnode-id="1613" instrument_node="">1</span></a></span></span></span></span><span data-dcnode-id="1605"><span data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node=""> in the late 1970s on the agrarian and English origins of capitalism. In these articles, he breaks with analyses of the emergence of capitalism that assume the very thing that need to be explained. Most historical explanations of the origins of capitalism have been circular, suggesting that capitalism emerged out of pre-existing, if embryonic, capitalist dynamics. Ancient profit-taking commercial practices, typically involving buying cheap in one region and selling dear in another, thus tend to be equated with capitalism. We are left with historical explanations that revolve around the removal of obstacles to timeless (proto) capitalist processes, an endeavour often attributed to urban merchants, sometimes involving violent revolutions. Historical lines of demarcation are blurred, and the unique imperatives of capitalism are naturalised. This is precisely the kind of framework that was rejected by Brenner. </span></span></span></span></span></span></p><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1584"><span data-dcnode-id="1585"><span data-dcnode-id="1586"><span data-dcnode-id="1587"><span data-dcnode-id="1597"><span data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">An earlier Marxist “transition debate” had taken place in the 1950s, around the exchange between Maurice Dobb and Paul Sweezy.</span></span></span><span data-dcnode-id="1591"><span data-dcnode-id="1592"><span data-dcnode-id="1593"><span data-dcnode-id="1594"><a class="see-footnote" data-dcnode-id="1595" href="#footnote2_fpb6kzk" id="footnoteref2_fpb6kzk" title="Hilton, Rodney (ed.) (1985), The Transition from Feudalism to Capitalism, Verso. "><span data-dcnode-id="1596" instrument_node="">2</span></a></span></span></span></span><span data-dcnode-id="1588"><span data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node=""> Whereas Sweezy related the rise of capitalism to the growth of trade and urbanisation, Dobb maintained that the latter were not a threat but in fact fully compatible with feudalism. For Dobb, the critical factor behind the transition was class struggle between lords and peasants, which freed the later from feudal impediments and allowed them to engage in petty commodity production and to eventually become full-fledged capitalists. Brenner retained Dobb’s focus on class struggles in the countryside while getting rid of his Smithian assumptions.</span></span></span></span></span></span></p><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1577"><span data-dcnode-id="1578"><span data-dcnode-id="1579"><span data-dcnode-id="1580"><span data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Launching a new transition debate that came to bear his name, Brenner engaged the dominant non-Marxist explanations of the emergence of capitalism, explaining that both the “commercialisation model” and the “demographic model” assumed that the early modern agrarian economy responded to changes in supply and demand of land on the market. Doing this, these models presumed that specifically capitalist dynamics propelling producers to specialise, innovate and accumulate existed transhistorically, and they were consequently unable to account for the divergent paths of development that emerged across Europe in the wake of the spread of trade from the eleventh century and the demographic collapse of the fourteenth. </span></span></span></span></span></span></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1569"><span data-dcnode-id="1570"><span data-dcnode-id="1571"><span data-dcnode-id="1572"><span data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Brenner explained how, under feudalism, the possession of land by peasants outside of market competition, and the consequent use of extra-economic coercion to extract rents in labour, while fuelling the accumulation of military means and trade of luxury goods as part of state building projects led by feudal ruling class, ruled out the systematic development of productivity through improved methods of labour-saving techniques. As population rose, the tendency toward the parcellisation of landholdings through partible inheritance lead to declining yields per acre and labour input and, eventually, to demographic collapse. While they were universal across European feudal societies, Brenner showed how the impact of commercial and demographic trends diverged following the balance of power within and between classes in a given region. </span></span></span></span></span></span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561"><span data-dcnode-id="1562"><span data-dcnode-id="1563"><span data-dcnode-id="1564"><span data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">In Eastern Europe, where peasant had not developed strong communal village organisation, landlords where able to impose a “second serfdom”. In Western Europe, stronger solidarity allowed peasant to freed themselves from serfdom while preserving effective possession of their plots through stable, customary rents. Lordly attempts to consolidate leaseholds and to raise rents were checked by peasant resistance and short circuited by the consolidation of Absolutist monarchies – in France and elsewhere – whose main source of revenue was taxes. Extra-economic surplus appropriation was thus preserved partially via a new form of state-mediated exploitation (though rent remained a major source of revenue). </span></span></span></span></span></span></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1550"><span data-dcnode-id="1551"><span data-dcnode-id="1552"><span data-dcnode-id="1553"><span data-dcnode-id="1554"><span data-dcnode-id="1558" instrument_node="">In England, however, an epoch-making transformation of class relations took place allowing for the rise of a historically new form of economic exploitation. There, the unintended consequence of the ruling class strategy of reproduction in face of the feudal crisis was a transition to agrarian capitalism as lords reacted to the peasants’ ability to gain their legal freedom by imposing commercial, capitalist leases on tenant farmers. This process was backed by a relatively more centralised English state and led to specifically capitalist social property relations in which the tenant farmers’ access to their land became market dependent. This market dependence </span><em data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">compelled</span></em><span data-dcnode-id="1555" instrument_node=""> producers to specialise, innovate and accumulate in order to pay rising rents set by market competition. The upshot was unprecedented sustained economic growth and a breakaway from Malthusian demographic cycles.&nbsp; </span></span></span></span></span></span></p><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1542"><span data-dcnode-id="1543"><span data-dcnode-id="1544"><span data-dcnode-id="1545"><span data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">In short, while most historians and social scientists assume, in Smithian fashion, that growing market opportunities will automatically lead producers to adopt capitalist behaviours, Brenner showed how the latter only ensued from specific social property relations that were at first confined to England and that compelled economic actors to reproduce through market competition and profit maximisation. As Wood puts it, capitalism emerges precisely when markets are no longer sets of market opportunities but become coercive forces. This, of course, has important implications for our theorisation of historical materialism.</span></span></span></span></span></span></p><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1532"><span data-dcnode-id="1533"><span data-dcnode-id="1534"><span data-dcnode-id="1535"><span data-dcnode-id="1536"><span data-dcnode-id="1539" instrument_node="">&nbsp;</span><em data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Your problematisation of capitalism plays a key role in your approach to the development of capitalism in France: in what sense is analysing capitalism as a social system rather than a “purely” economic phenomenon crucial to you as a Marxist scholar?</span></em></span></span></span></span></span></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1523"><span data-dcnode-id="1524"><span data-dcnode-id="1525"><span data-dcnode-id="1526"><span data-dcnode-id="1527"><span data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">The historical analysis discussed above reveals that capitalism is not simply “more of the same”; it is not a mere expansion of “economic” phenomena, be it trade, as Smithian believes, or productive forces, as many Marxists suggest. Its advent requires a reconfiguration of social power and is the result of class struggles. </span></span></span></span></span></span></p><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1515"><span data-dcnode-id="1516"><span data-dcnode-id="1517"><span data-dcnode-id="1518"><span data-dcnode-id="1519"><span data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">As part of the “Brenner Debate”, launched by the work discussed above, the French historian Guy Bois accused Brenner of “political Marxism” – thus coining the name by which this approach came to be known –&nbsp; for giving to much weight to political factors, namely class struggles, at the expense of economic factors, especially the contradictions between forces and relations of production. Bois’s critique, however, was well beside the point, since it took for granted a separation of the “political” and the “economic” that is specific to capitalism. Under feudalism and other non-capitalist social forms, surplus was extracted through “extra-economic” means, namely political, juridical and military power. Feudal lords used their personal political power directly in the process of surplus appropriation, which led Brenner to speak of “politically-constituted property” in reference to non-capitalist modes of production. Consequently, in these non-capitalist societies, class struggles tended to be overtly and directly political in nature, and the balance of power between classes as well as the level of solidarity within classes played a greater role in shaping the evolution of feudal societies and economies. </span></span></span></span></span></span></p><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508"><span data-dcnode-id="1509"><span data-dcnode-id="1510"><span data-dcnode-id="1511"><span data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">While class relations and struggles remain central under capitalism, this system is radically distinct in the way it makes both producers and exploiters dependent upon successful market competition for their reproduction. This system’s unique laws of motions, or rules of reproduction – the law of value which compels producers to economise labour-time through specialisation, the use of labour-saving innovations and the ongoing accumulation of surplus-value – operate via the mechanism of price competition. In other words, though it always preserves forms of unfree labour, capitalism is uniquely reproduced through the “dull compulsion of the market place” rather than prominently through forms of extra-economic coercion. Capitalism allows for a separation of the “political” and the “economic” as the state can become – though this has always been the result of struggles from below – a public sphere of impersonal power. This public character of the state does not fundamentally threaten the reproduction of class divisions and exploitation since the latter is now privatised in individual units of production. </span></span></span></span></span></span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1499"><span data-dcnode-id="1500"><span data-dcnode-id="1501"><span data-dcnode-id="1502"><span data-dcnode-id="1503"><span data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">The separation of “economic” and “political” spheres is thus in fact a reconfiguration of social power through which some political functions and powers (over production and distribution) are apparently depoliticised and confined to an “economic” sphere where they fall under the logic of “self-regulated” markets. Moreover, the unique dynamism of capitalism, the constant drive to develop productive forces, operates much more independently of the desires and goals of either individual capitalists or the state. This systematic development of productive forces – and their determinant impact on broader social, political and cultural processes – is actually something that is specific to capitalism, and, contrary to Bois’s (and many Marxists’) belief, is not a transhistorical motor of development.</span></span></span></span></span></span></p><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1489"><span data-dcnode-id="1490"><span data-dcnode-id="1491"><span data-dcnode-id="1492"><span data-dcnode-id="1493"><span data-dcnode-id="1497" instrument_node="">To get a better grasp of these issues, consider the fact that Brenner speaks of “social property relations” and not simply of social relations of production. He does this to avoid the notion that technical change in the immediate process of production would mechanically lead to a new social division of labour, new class configurations, and, ultimately, a new form of state and ideological “superstructure”. Doing this, Brenner, and Wood, remain in the track of Marx’s mature critique of political economy and his crucial insight that each historical mode of production functions according to its own distinctive internal logic. This logic, according to Marx, is determined by the way in which “unpaid labour is pumped out of direct producers” by an exploiting class. In other words, in class societies, modes of production are always simultaneously modes of </span><em data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">exploitation</span></em><span data-dcnode-id="1494" instrument_node=""> – i.e. sets of social property relations. </span></span></span></span></span></span></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463"><span data-dcnode-id="1464"><span data-dcnode-id="1465"><span data-dcnode-id="1484"><span data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Hence, as I put it in the book, analyses informed by a historical materialist framework must “begin with the multi-layered and complex configuration of social power that shapes how societies reproduce themselves</span></span></span><span data-dcnode-id="1478"><span data-dcnode-id="1479"><span data-dcnode-id="1480"><span data-dcnode-id="1481"><a class="see-footnote" data-dcnode-id="1482" href="#footnote3_mrt675a" id="footnoteref3_mrt675a" title="It should be mentioned that this social reproduction involves not only class, but also gender relations. For a sympathetic, yet critical, discussion of «&nbsp;political Marxism&nbsp;» from a social reproduction theory standpoint, see Nicole Leach (2016) «&nbsp;Rethinking the Rules of Reproduction and the Transition to Capitalism&nbsp;: Reading Federici and Brenner Together&nbsp;», in Xavier Lafrance and Charlie Post (eds.), Case Studies in the Origins of Capitalism, Palgrave, pp. 317-342. "><span data-dcnode-id="1483" instrument_node="">3</span></a></span></span></span></span><span data-dcnode-id="1466"><span data-dcnode-id="1467"><span data-dcnode-id="1477" instrument_node=""> while allowing one class to appropriate a surplus at the expense of another (or several others). Put another way, we begin with an assessment of social property relations – which always involve </span><em data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">horizontal</span></em><span data-dcnode-id="1474" instrument_node=""> relationships of competition and collaboration </span><em data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">within</span></em><span data-dcnode-id="1471" instrument_node=""> classes as well as vertical conflicts </span><em data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">between</span></em><span data-dcnode-id="1468" instrument_node=""> classes – that impose ‘rules of reproduction’ on social agents and consequently orient macro-level social and economic phenomena.”</span></span></span></span></span></span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1452"><span data-dcnode-id="1453"><span data-dcnode-id="1454"><span data-dcnode-id="1455"><span data-dcnode-id="1456"><span data-dcnode-id="1460" instrument_node="">Historical materialism looks at the ways in which humans establish social relations of reproduction with nature and how these fundamental social relations structure other sets of social, political, and cultural experiences. As Wood explains, “the forms of [social] interaction [with nature] produced by human beings, themselves become material forces, no less than are natural forces”. Now, in </span><em data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">class</span></em><span data-dcnode-id="1457" instrument_node=""> societies, the focus moves to the ways in which classes reproduce themselves – in relation with each other and with nature – and how this affects social and political reality. The nexus of class exploitation patterns other forms of social relations and is consequently not an epiphenomenon responding to the development of forces of production. On the contrary, the configuration of class relations of exploitation orients the development (or non-development) of productive forces within a given mode of production. That is, social property relations shape the behaviour that individuals and class must adopt to reproduce themselves, and thus establish patterns of economic development and social conflict at a macro level. Whereas, in feudal society, surplus appropriation by a class at the expense of another took an extra-economic form that tended to stall economic development and made class conflicts overtly political, in capitalist societies exploitation is mediated by market relations that compel economic actors to adopt profit-maximising behaviours and that tend to depoliticise class conflicts.</span></span></span></span></span></span></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444"><span data-dcnode-id="1445"><span data-dcnode-id="1446"><span data-dcnode-id="1447"><span data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">All of this is useful to conduct research, because it provides a clear understanding of what capitalism is and allows us to observe the emergence of capitalism and the ways it re-orients social relations and unfolds in actual historical processes. Without this clear understanding of distinctive capitalist dynamics, it would not make much sense to attempt to explain and describe the transition to capitalism in France or any other country/region. Beyond these academic endeavours, the historical materialist framework and the conception of capitalism presented here have important political consequences. In order to think and act strategically as anti-capitalists and socialists, we need to have some sort of understanding of the capitalist terrain on which we are fighting; we need to have some grasp of the forms of power that we are confronting and of their specific dynamics. Moreover, Marx’s point that capitalism is a historical – as opposed to a natural or transhistorical – phenomenon is a fundamental precondition for all socialist politics because it signals that this system had a beginning and will have an end – just how it will end (leading to “barbarism or socialism”) depends on our collective struggles.</span></span></span></span></span></span></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1429"><span data-dcnode-id="1430"><span data-dcnode-id="1431"><span data-dcnode-id="1432"><em data-dcnode-id="1438"><span data-dcnode-id="1439"><span data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Contrary to other Marxists, such as &nbsp;Perry Anderson for example – who, in </span></span></span></em><span data-dcnode-id="1433"><span data-dcnode-id="1434"><span data-dcnode-id="1437" instrument_node="">Lineages of the Absolutist State</span><em data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node=""> (1974), argues that French absolutism facilitated the capitalist transformation of the economic structures – you write that the formation of the absolutist state was rather an alternative path out of the crisis of feudalism. Could you expand on this? In what sense is a comparison with England in the same epoch relevant? </span></em></span></span></span></span></span></p><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1411"><span data-dcnode-id="1412"><span data-dcnode-id="1413"><span data-dcnode-id="1414"><span data-dcnode-id="1425"><span data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Anderson suggests that the absolutist state was a “redeployed and recharged apparatus of feudal domination” – the way through which a challenged old noble class established a new form of state-constituted surplus appropriation.</span></span></span><span data-dcnode-id="1419"><span data-dcnode-id="1420"><span data-dcnode-id="1421"><span data-dcnode-id="1422"><a class="see-footnote" data-dcnode-id="1423" href="#footnote4_m5jeyog" id="footnoteref4_m5jeyog" title="Anderson, Perry, 1974, Lineages of the Absolutist State, Verso. "><span data-dcnode-id="1424" instrument_node="">4</span></a></span></span></span></span><span data-dcnode-id="1418" instrument_node=""> </span><span data-dcnode-id="1415"><span data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Yet, he also maintains that the dissolution of feudalism severed the unity of politics and economics at the level of villages, while the emerging state reactivated Roman law, thus enacting new forms of exclusive property conducive to a progressive establishment of capitalist agriculture and supporting the interests of a nascent manufacturing class.</span></span></span></span></span></span></p><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1395"><span data-dcnode-id="1396"><span data-dcnode-id="1397"><span data-dcnode-id="1407"><span data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">While Anderson’s account offers important insights, it does not allow to grasp how absolutism actually took France away from the capitalist path taken by England in the wake of the fourteenth-century feudal crisis.</span></span></span><span data-dcnode-id="1401"><span data-dcnode-id="1402"><span data-dcnode-id="1403"><span data-dcnode-id="1404"><a class="see-footnote" data-dcnode-id="1405" href="#footnote5_0x9lxoc" id="footnoteref5_0x9lxoc" title="One of best critiques of Perry Anderson’s important book is offered by Benno Teschke, 2003, The Myth of 1648. Class, Geopolitics and the Making of Modern International Relations, New York: Verso. "><span data-dcnode-id="1406" instrument_node="">5</span></a></span></span></span></span><span data-dcnode-id="1398"><span data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node=""> In France, peasants gained their freedom and secured possession of the land and fixed rents during the late medieval period. These gains were allowed by relatively strong solidarities embedded in village communities, but also by intense competition for land and peasants among landlords, which was inefficiently mitigated by unstable bonds of vassalage. Resistance from below, lack of intra-class cohesion, and competition from a monarchical state seeking to both safeguard and tax small peasant property severely threatened the nobles’ interests. While political, and often military, conflicts with the crown remained endemic, many nobles were compelled to turn to the concentrated monarchical state apparatus, supplementing rent with tax revenues. The incorporation of sectors of the old nobility and, increasingly, of the high bourgeoisie to the state, was realised through the granting or sale of venal offices. Accumulating wealth through tax/office structures, interests on loans to the Crown, commercial monopolies, and, still to a large extent, rent, a parasitic class of financiers and tax-farmer aristocrats formed the social basis of the new state.</span></span></span></span></span></span></p><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387"><span data-dcnode-id="1388"><span data-dcnode-id="1389"><span data-dcnode-id="1390"><span data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">The formation of this new mode of exploitive production had consequences of critical importance for the country’s political and economic development. The selling of venal offices amounted to a privatisation of state power, which was pulverised by the very process that was meant to consolidate it. Together with the reproduction of a myriad of competing feudal local and regional jurisdictions within the state, this made the development of a modern administrative apparatus impossible, as state officials used their offices as patrimonial means of enrichment. </span></span></span></span></span></span></p><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1372"><span data-dcnode-id="1373"><span data-dcnode-id="1374"><span data-dcnode-id="1375"><span data-dcnode-id="1382"><span data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">This renewed mode of extra-economic class exploitation was also not conducive to sustained economic growth. France did experience substantial agricultural and manufacturing growth from the end of the late seventeenth century slowdown to the Revolution, as growing urban demand and colonial trade fuelled commercial production. Commercial agriculture, however, was nothing new and neither landlords nor peasants faced incentives nor imperatives to specialise, adopt new farming techniques or consolidate plots and estates. Landlords had no thought of expropriating peasant and, on the contrary, pursued the practice of pinning down ever more of the peasants’ labour to the soil. Even in the Paris basin, where commercialisation was most widespread, systematic calculation of labour costs was unheard of, the number of small peasant farms remained important and continuously grew, while traditional, quasi-feudal leases remained the rule. Outputs grew because more plots were put under cultivation and large reserves of rural labour were exploited by landlords on the land and merchants in proto-industrial production. Light years away from a process of capitalist transition, as Steve Miller explains, this increase of output took place “through the intensification of labour and stagnating or declining returns to each additional hour of work”.</span></span></span><span data-dcnode-id="1376"><span data-dcnode-id="1377"><span data-dcnode-id="1378"><span data-dcnode-id="1379"><a class="see-footnote" data-dcnode-id="1380" href="#footnote6_7ie1y6l" id="footnoteref6_7ie1y6l" title="Miller, Stephen, 2009, ‘The Economy of France in the Eighteenth and Nineteenth Centuries: Market Opportunity and Labor Productivity in Languedoc’, Rural History, 20 (1), p. 6. "><span data-dcnode-id="1381" instrument_node="">6</span></a></span></span></span></span></span></span></span></p><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1364"><span data-dcnode-id="1365"><span data-dcnode-id="1366"><span data-dcnode-id="1367"><span data-dcnode-id="1368"><span data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Things took a radically different turn in England. Put simply, agrarian capitalism emerged as an alternative to absolutism. Centralised state power and greater class cooperation allowed landlords to enforce “economic” leases. Landed property and economic rent rather than politically constituted property became the cornerstone of English ruling class reproduction and absolutist temptations were definitely put to bed with the so-called “Glorious Revolution” of 1688, which allowed landlords to assert their parliamentary power over the crown. Economic leases established rents through market competition, thus compelling tenants to specialise, increase labour productivity, innovate, and to reinvest surpluses to preserve access to their land. The upshot was sustained economic growth in the countryside that caused ongoing dispossession of customary tenants, and fuelled rapid demographic growth and urbanisation leading to the rise of competitive, mass labour and consumer markets – all of which lifted the Malthusian cap on industrial development in England.</span></span></span></span></span></span></p><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1347"><span data-dcnode-id="1348"><span data-dcnode-id="1349"><span data-dcnode-id="1350"><span data-dcnode-id="1360"><span data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Moreover, the reliance on economic rent as opposed to politically constituted property made possible the development of a modern state apparatus.</span></span></span><span data-dcnode-id="1354"><span data-dcnode-id="1355"><span data-dcnode-id="1356"><span data-dcnode-id="1357"><a class="see-footnote" data-dcnode-id="1358" href="#footnote7_hl47zws" id="footnoteref7_hl47zws" title="Brewer, John 1989, The Sinews of Power: War, Money, and the English State, 1688–1783, Cambridge: Harvard University Press. "><span data-dcnode-id="1359" instrument_node="">7</span></a></span></span></span></span><span data-dcnode-id="1351"><span data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node=""> Because its economy was much more productive and its administrative apparatus more efficient, the English state was also able to borrow at advantageous rates to finance its military efforts. All of this provided a decisive geopolitical advantage to England.</span></span></span></span></span></span></p><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340"><span data-dcnode-id="1341"><span data-dcnode-id="1342"><span data-dcnode-id="1343"><span data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">In France, in the absence of agrarian capitalism, the expansion of state revenues was dependent on ongoing “geopolitical accumulation”, so as to acquire a larger tax-base. Sectors of French state elite sought to reform and liberalise the country’s agrarian and manufacturing sectors, but these attempts tended to threaten the extra-economic strategy of reproduction of the ruling class and were consequently often rolled back, and overall unsuccessful. </span></span></span></span></span></span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332"><span data-dcnode-id="1333"><span data-dcnode-id="1334"><span data-dcnode-id="1335"><span data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Unable to emulate English intensive economic development, the French state had to continue to rely on an extensive strategy. Yet, territorial conquest on the Continent was difficult and costly, while colonial expansion was increasingly checked by growing English power. Entrapped in successive military conflicts with its neighbour, the French state had to impose punitive taxes on its peasantry, to resort to the sale of offices that intensified the Byzantine character of its administrative apparatus, and to contract mounting debts. This created a catastrophic fiscal situation and widespread discontent among elite and popular classes – the background of the revolutionary explosion of 1789.&nbsp;&nbsp;&nbsp; </span></span></span></span></span></span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1323"><span data-dcnode-id="1324"><span data-dcnode-id="1325"><em data-dcnode-id="1326"><span data-dcnode-id="1327"><span data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">According to you, the French Revolution was a bourgeois but non-capitalist revolution. In what way did the French Revolution not herald the rise of a capitalist economy?</span></span></span></em></span></span></span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315"><span data-dcnode-id="1316"><span data-dcnode-id="1317"><span data-dcnode-id="1318"><span data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">The classical “social interpretation”, outlined by Georges Lefebvre, Albert Mathiez or Albert Soboul, remained dominant until the 1960s and depicted the Revolution as the act of a capitalist bourgeoisie liberating itself from the shackle of feudalism, thus allowing capitalism to fully blossom in France. They took their cue from the early work of Marx, who was himself following liberal thinkers such as Turgot. This interpretation faced a severe challenge from “revisionist” historians such as Alfred Cobban in the 1950s and François Furet from the early 1970s. Revisionists unmistakably showed how the bourgeois that led the Revolution were not capitalists but rather landowners, state officials or lawyers. Some Marxists reacted to this devastating challenge with a “consequentialist” interpretation that maintained that, notwithstanding the motives of its agents, the Revolution had established a new political and legal context – with measures such as the abolition of privileges, intermediary bodies and guilds, or the suppression of internal custom barriers and the standardisation of weights and measure – that were conducive to an eventual emergence of capitalism.</span></span></span></span></span></span></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298"><span data-dcnode-id="1299"><span data-dcnode-id="1300"><span data-dcnode-id="1310"><span data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">“Consequentialism” is an attempt to rescue the notion of capitalist bourgeois revolution by emptying it of much of its content. It leaves us without a satisfactory causal explanation of Revolution and its empirical assessment of the impact of revolutionary transformations are flawed. Political Marxists</span></span></span><span data-dcnode-id="1304"><span data-dcnode-id="1305"><span data-dcnode-id="1306"><span data-dcnode-id="1307"><a class="see-footnote" data-dcnode-id="1308" href="#footnote8_7l0bjor" id="footnoteref8_7l0bjor" title="Brenner, Robert, 1989, ‘Bourgeois Revolution and Transition to Capitalism’, in The First Modern Society: Essays in English History in Honour of Lawrence Stone, edited by A. L. Beier, David Cannadine, and James M. Rosenheim, 271–304, Cambridge: Cambridge University Press; Comninel, George C. 1987, Rethinking the French Revolution: Marxism and the Revisionist Challenge, London: Verso; Teschke, Benno, 2005, ‘Bourgeois Revolution, State Formation and the Absence of the&nbsp; International’, Historical Materialism, 13 (2): 3–26. "><span data-dcnode-id="1309" instrument_node="">8</span></a></span></span></span></span><span data-dcnode-id="1301"><span data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node=""> have put forth a new interpretation that disentangle the notions of “bourgeoisie” and “capitalist class” while retaining a class analysis of the Revolution. </span></span></span></span></span></span></p><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290"><span data-dcnode-id="1291"><span data-dcnode-id="1292"><span data-dcnode-id="1293"><span data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Simply put, while the bourgeoisie and aristocracy both reproduced themselves on the basis of non-capitalist land-tenure and politically constituted property, they had differentiated access to state offices and privileges. Bourgeois and many lesser nobles remained excluded from special privileges of noble status, and the aristocracy, as the highest and exclusive inner circle of the nobility, monopolised the most prestigious and lucrative positions in the state apparatus. Calling for state positions to be “open to talent” and for liberal reforms of the state administration, the bourgeoisie did not attempt overthrow the existing mode of exploitation but actually to improve its position in its midst. The Revolution was an intra-ruling class conflict opposing bourgeois and aristocrats over the access to politically-constituted property, flanked by a popular movement of exploited artisans and peasants, in a context of intensifying geopolitical pressures experienced by the French state that contributed to an intense politicisation of fiscal issues.</span></span></span></span></span></span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1282"><span data-dcnode-id="1283"><span data-dcnode-id="1284"><span data-dcnode-id="1285"><span data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">The partial rationalisation of the state – the continuation of a longstanding project pursued by old regime reformers now taken over by an enlightened bourgeoisie – that took place during the Revolution and under the First Empire was limited by the reproduction of politically-constituted forms of appropriation across the revolutionary divide. Nepotism and quasi-patrimonialist practices remained ubiquitous within the administration. As is also universally recognised, the Revolution consolidated and contributed to the spreading of petty peasant property for decades to come. This ruled out the apparition of agrarian capitalism in France.</span></span></span></span></span></span></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268"><span data-dcnode-id="1269"><span data-dcnode-id="1270"><span data-dcnode-id="1271"><span data-dcnode-id="1272"><span data-dcnode-id="1279" instrument_node="">What was less well known, but has now been demonstrated by important historical works since around the late 1980s, is that revolutionary struggles waged by artisan and industrial workers led to major gains that gave a definitely non-capitalist character to their economic sector. Guilds had been abolished in practice by workers already in 1789, after decades of resistance against their subordination to their masters. The legislators that formally abolished guilds in 1791 acted largely after the fact, were informed by political rather than economic liberalism, and had plans to implement local regulations of trades. These legislative plans were not enacted for contingent historical reasons but local customary regulations were kept alive and thrived in following decades as workers applied the emancipatory spirit of the Revolution to their trades. Labour contracts ruling out subordination to employers became the rule, while a </span><em data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">bon droit</span></em><span data-dcnode-id="1276" instrument_node=""> – a kind of “moral economy” in the sense given to this phrase by E.P. Thompson – came to regulate artisanal and industrial work and was enforced by new judicial institutions such as justices of the peace and </span><em data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">prud’hommes</span></em><span data-dcnode-id="1273" instrument_node=""> councils. The latter overturned all attempt by employers to impose unilateral rules within workshops and factory, thus making impossible the subsumption of labour by capital.</span></span></span></span></span></span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260"><span data-dcnode-id="1261"><span data-dcnode-id="1262"><span data-dcnode-id="1263"><span data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">In brief, the French Revolution amounted to a partial emancipation of labour – right a time when English workers experienced enhanced subordination to employers that were benefiting from the active legal support of the state in the context an of industrial revolution. The point, however, is not that this partial emancipation of French labour amounted to an obstacle to a latent capitalist industrialisation.&nbsp; This emancipation was in fact tolerated for decades by French industrial employers who were not subjected to competitive market imperatives.</span></span></span></span></span></span></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251"><span data-dcnode-id="1252"><span data-dcnode-id="1253"><em data-dcnode-id="1254"><span data-dcnode-id="1255"><span data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">You write that, whilst industrialisation arrived quite early in France, capitalism by contrast arrived late. A key argument in your book is that the birth of capitalism in France did not happens endogenously. Could you explain why, on the one hand, capitalism developed late in France and, on the other, what external factors can explain the development of capitalism in France?</span></span></span></em></span></span></span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1243"><span data-dcnode-id="1244"><span data-dcnode-id="1245"><span data-dcnode-id="1246"><span data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Industrial production took place under the old regime, but investment and mechanisation remained very limited, in spite of efforts by the state to stimulate industrialisation. On the eve of the Revolution, in its cotton trade, England had 260 spindles per 1000 inhabitants, against 2 in France, while there were 900 spinning-jennies in France against 20,000 in Britain, and no more than a dozen mule-jennies in the former country against 9000 in the latter. English superiority was overwhelming, and much of France’s industrial sector collapsed in the wake of the signature of a trade treaty by the two states in 1786. Instead of investing so as to make manufacturing facilities more productive French textile merchants simply bought English yarn to sell it in France.</span></span></span></span></span></span></p><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235"><span data-dcnode-id="1236"><span data-dcnode-id="1237"><span data-dcnode-id="1238"><span data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Industrial investments accelerated in an unprecedented way over the decades that followed the Revolution, in the context of a protected national market, but industrial labour productivity remained much lower in France compared to Britain. This was because a much slower pace of mechanisation of production could be witnessed in France at the time. To illustrate this, consider that, in 1830, 3000 steam engines could be found in France, producing 15,000 horsepower, while Britain numbered 15,000, with an overall capacity of 250,000 horsepower. In 1840, France, with a population of 35 million, possessed steam engines producing 34,000 horsepower, while Britain, with a population of 19 million, had steam engines producing 350,000 horsepower. By 1850, these figures had respectively increased to 67,000 horsepower against 544,000 in Britain, and France had by then fallen behind Prussia.</span></span></span></span></span></span></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227"><span data-dcnode-id="1228"><span data-dcnode-id="1229"><span data-dcnode-id="1230"><span data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">A comparative analysis of processes of industrialisation in France and England raises pressing questions. For instance: how do explain that France had only 10 percent of England’s horsepower in 1840, even with a much larger population and plenty of financial resources? To begin to answer this question, we must accept that the transition to capitalism was not a Western European phenomenon – it began in England and was later imported on the European continent. Simply suggesting that France and Britain have followed distinct paths of industrialisation, as many historians have done, is insufficient at best. We must be very clear that different paths were taken because one country was capitalist while the other was not.</span></span></span></span></span></span></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209"><span data-dcnode-id="1210"><span data-dcnode-id="1211"><span data-dcnode-id="1219"><span data-dcnode-id="1220"><span data-dcnode-id="1224" instrument_node="">With this general framework in mind, an important first factor to consider is that, because agrarian capitalism was absent in France, the country’s internal consumer market remained limited and this necessarily slowed down industrial growth. But, beyond the extent and depth of the market, we must also consider its nature. Until the last third of the nineteenth century, there was no integrated and competitive market in France. In spite of the abolition of internal tariffs during the Revolution, the absence of adequate transport infrastructures implied that the French national economic space remained intensely fragmented and constituted of a series of local and regional markets. These local and regional spaces were not organised through the mechanism of price competition and remained regulated by customary trades usages enforced by institutions such as </span><em data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">prud’hommes</span></em><span data-dcnode-id="1221" instrument_node="">, commercial tribunals, and local governments. French merchant-industrialists made much of their profits as mediators between these disconnected economic spaces. As Jean-Pierre Hirsch explains, “the logic of an ongoing decompartimentalisation of circulation, of a levelling of costs and prices did not exist in the attitudes of the vast majority of merchants, or even in the declarations of their representatives. Above all, as years passed, nothing indicated an evolution toward a less ‘imperfect’ market, nor a will to reduce the number of filters through which supply and demand were at play.”</span></span></span><span data-dcnode-id="1213"><span data-dcnode-id="1214"><span data-dcnode-id="1215"><span data-dcnode-id="1216"><a class="see-footnote" data-dcnode-id="1217" href="#footnote9_0tawfdz" id="footnoteref9_0tawfdz" title="Hirsch, Jean-Pierre, 1991, Les deux rêves du commerce. Entreprise et institution dans la région lilloise (1780–1860), Paris: Éditions de l’École des hautes études en sciences sociales, p. 392. "><span data-dcnode-id="1218" instrument_node="">9</span></a></span></span></span></span><span data-dcnode-id="1212" instrument_node=""> </span></span></span></span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1200"><span data-dcnode-id="1201"><span data-dcnode-id="1202"><span data-dcnode-id="1203"><span data-dcnode-id="1204"><span data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">The other important factor that explained the absence of competitive imperatives in France was the strongly protectionist policies – including prohibitive tariffs on different items and outright prohibition of cotton good imports – adopted by the Restauration in 1816 and 1817, at the end of the Napoleonic Wars and of the Continental Blockade. This protectionism insulated French manufacturers from English competition.</span></span></span></span></span></span></p><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184"><span data-dcnode-id="1185"><span data-dcnode-id="1186"><span data-dcnode-id="1193"><span data-dcnode-id="1194"><span data-dcnode-id="1198" instrument_node="">As I explain in the book, because of all this, capitalist social property relations remained absent in France, where industrial firms where not compelled by price competition to systematically mechanise production, innovate, improve, and discipline labour processes so as to maximise profits and beat competitors. Consequently, until the Second Empire, the mechanisation of French industrial production was fuelled by market </span><em data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">opportunities</span></em><span data-dcnode-id="1195" instrument_node=""> rather than by market compulsion. Assessing French industrialisation over this period, William Reddy stresses “just how weak the force of competition” remained, and explains that firms were not evolving on “price-forming markets” and were consequently not compelled to engage in “cost-conscious management”. At the same time, the “twenty-fold advantage in productivity, and the attendant profit boosting potential that English machines provided to their owners did not escape French merchant-industrialists.</span></span></span><span data-dcnode-id="1187"><span data-dcnode-id="1188"><span data-dcnode-id="1189"><span data-dcnode-id="1190"><a class="see-footnote" data-dcnode-id="1191" href="#footnote10_6qwkdc0" id="footnoteref10_6qwkdc0" title="Reddy, William, 1984, The Rise of Market Culture: The Textile Trade and French Society, 1750–1900, Cambridge: Cambridge University Press, p. 74, 100. "><span data-dcnode-id="1192" instrument_node="">10</span></a></span></span></span></span></span></span></span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1176"><span data-dcnode-id="1177"><span data-dcnode-id="1178"><span data-dcnode-id="1179"><span data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">French industrialists were strongly attached to protectionist policies and fought intensely to preserve them – they were not interested in being exposed to English competition, knowing that this would threaten their easy profits. The importation of capitalist social property relations – the building of an integrated and competitive market – was left to the French state, which finally decided to act resolutely so as to activate a capitalist transition in the face of intensifying international geopolitical competition stemming out of ongoing state restructuring processes and capitalist industrialisation emerging in different countries around the mid-nineteenth century.&nbsp;&nbsp; </span></span></span></span></span></span></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1167"><span data-dcnode-id="1168"><span data-dcnode-id="1169"><em data-dcnode-id="1170"><span data-dcnode-id="1171"><span data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Could you say something about the development of the French working class? In the fourth chapter of your book, you cite the paradox highlighted by Ernest Labrousse in the 1950s that, whilst industrial development was quite slow in France, the working class was extremely combative throughout the nineteenth century. How do you explain this apparent paradox?</span></span></span></em></span></span></span></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141"><span data-dcnode-id="1142"><span data-dcnode-id="1143"><span data-dcnode-id="1162"><span data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">This paradox has been puzzling historians for a long time and two main types of explanations of the making of the French working class have been dominant over the last few decades. A first explanatory strategy, whose most influential exponent is William Sewell,</span></span></span><span data-dcnode-id="1156"><span data-dcnode-id="1157"><span data-dcnode-id="1158"><span data-dcnode-id="1159"><a class="see-footnote" data-dcnode-id="1160" href="#footnote11_j93xutk" id="footnoteref11_j93xutk" title="Sewell, William H. 1980, Work and Revolution in France: The Language of Labor from the Old Regime to 1848, Cambridge: Cambridge University Press. "><span data-dcnode-id="1161" instrument_node="">11</span></a></span></span></span></span><span data-dcnode-id="1153"><span data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node=""> has been to assert that, even though largescale factory production remained sparse in France, the country’s artisanal sector experienced a capitalist transition in the wake of the 1791 abolition of guilds. For reasons already discussed, I reject this thesis. The other important type of explanation, systematised among others by Tony Judt,</span></span></span><span data-dcnode-id="1147"><span data-dcnode-id="1148"><span data-dcnode-id="1149"><span data-dcnode-id="1150"><a class="see-footnote" data-dcnode-id="1151" href="#footnote12_5x5myd6" id="footnoteref12_5x5myd6" title="Judt, Tony 2011 [1986], Marxism and the French Left: Studies in labour and politics in France, 1830–1981, New York: New York University Press. "><span data-dcnode-id="1152" instrument_node="">12</span></a></span></span></span></span><span data-dcnode-id="1144"><span data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node=""> stresses the irrelevance of economic transformations while focusing on the effect of a new political culture emerging in the wake of the Revolution. While recognising the importance of the “political culture” and institutions developed by French workers before, during, and after the revolutionary period, I offer an alternative materialist analysis in order to answer the paradox identified by Labrousse and others.</span></span></span></span></span></span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133"><span data-dcnode-id="1134"><span data-dcnode-id="1135"><span data-dcnode-id="1136"><span data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Simply put, I argue that French workers made themselves into a self-conscious class in a non-capitalist context, in the wake of the 1830 Revolution, and during the intense period of resistance that culminated with the 1848 Revolution. The working class was formed in opposition to a ruling class of notables that monopolised state power as a mean of exploitation, and through struggles seeking to consolidate gains made in the wake of 1789. French workers developed a republican-socialist agenda fighting for a democratic and social republic.</span></span></span></span></span></span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1125"><span data-dcnode-id="1126"><span data-dcnode-id="1127"><span data-dcnode-id="1128"><span data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">As I mentioned earlier, under the Restoration and the Orleanist monarchy, non-capitalist channels of surplus appropriation remained in place. The notability, mingling together nobles and great bourgeois, largely favoured “proprietary” or rentier forms of wealth – they prioritised the acquisition of land and buildings, secured lucrative interests on state and private loans, while investing only around 3.7 percent of its overall wealth in private firms during this period. As a rule, successful merchants and industrialists sought to join the notability by acquiring a mansion in the country side or private hotel in the city, and attempting to secure prestigious administrative or political careers for their sons. Notables remained attached to state offices as means of enrichment and markers of social standing.</span></span></span></span></span></span></p><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1116"><span data-dcnode-id="1117"><span data-dcnode-id="1118"><span data-dcnode-id="1119"><span data-dcnode-id="1120"><span data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">It was against this ruling class that monopolised state power and revenues that French workers developed their class consciousness, constantly denouncing and collectively mobilising against state parasitism, the use of lucrative offices to serve private interests and the indirect taxes that burdened them. Workers fought against the parasitic monarchy and for a republic that would implement universal male suffrage as a way to take the state away from the ruling class. </span></span></span></span></span></span></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094"><span data-dcnode-id="1095"><span data-dcnode-id="1096"><span data-dcnode-id="1097"><span data-dcnode-id="1098"><span data-dcnode-id="1114" instrument_node="">But workers were also demanding a </span><em data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">social</span></em><span data-dcnode-id="1111" instrument_node=""> republic that could consolidate and expand </span><em data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">bon droit</span></em><span data-dcnode-id="1108" instrument_node=""> – the customary regulations of their trades. Conflicts that opposed workers to merchant-industrialists or workshop owners were not infrequent and revolved around attempts to circumvent customary regulations or to charge high interests on loans taken out by workers to pay for tools, for instance. These encroachments by “dishonest” employers were nothing new and had been taken place for centuries. They were repressed and contained by </span><em data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">prud’hommes</span></em><span data-dcnode-id="1105" instrument_node=""> councils and justices of the peace – proximity judicial institutions that played a key role in preserving and extending </span><em data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">bon droit</span></em><span data-dcnode-id="1102" instrument_node=""> in trade communities – with considerable success, but loopholes remained and workers had to stay on guard and to mobilise to close them. What </span><em data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">was</span></em><span data-dcnode-id="1099" instrument_node=""> new, however, and explains much of the rising working-class resistance of the time – was the absence guilds since 1791; that is, of state-backed regulatory institutions and of formal injunctions compelling artisans to associate and to regulate trades. In the absence of regulatory institutions officially and actively backed by the central state, French workers mobilised to close regulatory loopholes in their trades by consolidating their rights and customary regulations, and this represented an inextricably political struggle.</span></span></span></span></span></span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086"><span data-dcnode-id="1087"><span data-dcnode-id="1088"><span data-dcnode-id="1089"><span data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">At the time, French socialists decried the dangers of “competition” and “individualism”, but constantly did so by pointing to English developments. Many socialists developed their doctrines in an ongoing debate with British political economists and with liberal intellectuals that relayed their ideas in France. They were concerned that France might adopt the English economic system and wanted to avoid such a scenario.</span></span></span></span></span></span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063"><span data-dcnode-id="1064"><span data-dcnode-id="1065"><span data-dcnode-id="1081"><span data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">At a more fundamental level, socialists were attempting to develop new principles that would hold French society together, after the evaporation of the corporatist paradigm in the wake of 1789 (the broader context in which the abolition of guilds took place and was justified in 1791). This is the reason why Jonathan Beecher presents them as “romantic socialists” who “were writing out of a broader sense of social and moral disintegration”. Their fundamental concerns were social and political, rather the economic: “their ideas were presented as a remedy for the collapse of community rather than for any specifically economic problem”.</span></span></span><span data-dcnode-id="1075"><span data-dcnode-id="1076"><span data-dcnode-id="1077"><span data-dcnode-id="1078"><a class="see-footnote" data-dcnode-id="1079" href="#footnote13_3i2mcqo" id="footnoteref13_3i2mcqo" title="Beecher, Jonathan 2001, Victor Considerant and the Rise and Fall of French Romantic Socialism, Berkeley: University of California Press, p. 2. "><span data-dcnode-id="1080" instrument_node="">13</span></a></span></span></span></span><span data-dcnode-id="1072"><span data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node=""> In this respect, their thought was rooted in a long-standing debate in French political thought. As Ellen Wood explains, this debate had evolved for centuries under the old regime, and revolved around the challenge of integrating “a fragmented social order … a network of corporate entities”, and was informed by “a conception of society in which the totality of social relations, including economic transactions, was subsumed in the political community”.</span></span></span><span data-dcnode-id="1066"><span data-dcnode-id="1067"><span data-dcnode-id="1068"><span data-dcnode-id="1069"><a class="see-footnote" data-dcnode-id="1070" href="#footnote14_3hxjaee" id="footnoteref14_3hxjaee" title="Wood, Ellen Meiksins, 2012, Liberty and Property: A Social History of Western Political Thought from Renaissance to Enlightenment, New York: Verso, p. 170. "><span data-dcnode-id="1071" instrument_node="">14</span></a></span></span></span></span></span></span></span></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046"><span data-dcnode-id="1047"><span data-dcnode-id="1048"><span data-dcnode-id="1058"><span data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Socialists were deeply concerned by the fact that, in the new post-revolutionary French society, “individuals were becoming increasingly detached from any kind of corporate structure, and that society as a whole was becoming increasingly fragmented and individualistic”.</span></span></span><span data-dcnode-id="1052"><span data-dcnode-id="1053"><span data-dcnode-id="1054"><span data-dcnode-id="1055"><a class="see-footnote" data-dcnode-id="1056" href="#footnote15_lww2l2z" id="footnoteref15_lww2l2z" title="Beecher, 2001, p. 2. "><span data-dcnode-id="1057" instrument_node="">15</span></a></span></span></span></span><span data-dcnode-id="1049"><span data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node=""> Simply put, as corporatism was fading as the formal, state-backed way of integrating society, they put forth socialism as an alternative to a capitalist form of social integration and regulation.</span></span></span></span></span></span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035"><span data-dcnode-id="1036"><span data-dcnode-id="1037"><span data-dcnode-id="1038"><span data-dcnode-id="1039"><span data-dcnode-id="1043" instrument_node="">Struggling to serve their material interests and improve their living and working conditions by closing regulatory loopholes and to continue to consolidate and develop their customary rights and trade regulations, and taking their cue in part from socialist intellectuals, French workers also came to frame a new model of political governance and socio-economic organisation: a revolutionary democratic and socialist republic as a federation of organised trades. The rise of socialist republicanism became increasingly clear, for instance, with the </span><em data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">canuts</span></em><span data-dcnode-id="1040" instrument_node=""> insurrection of the 1830s in Lyon, the great Parisian strikes of 1840, and, of course, during the 1848 Revolution.</span></span></span></span></span></span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1027"><span data-dcnode-id="1028"><span data-dcnode-id="1029"><span data-dcnode-id="1030"><span data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">In 1848, the government was compelled by popular mobilisations to create the Luxembourg Commission, which gathered representatives from all Parisian trades. As contemporary commentators claimed at the time the Commission rapidly became something like a “high court of prud'hommes” acting as sort of moral government of trades reflecting the free wish and express appeal of workers and heads workshops.&nbsp; The Commission itself declared that it was “transformed incontinently, by the logic of things, into a high court of arbitration and exercises a sort of moral government by the free will and the express call of labourers and heads of establishments”.&nbsp; Delegates determined the wages and usages that they considered most equitable, and new ones were elaborated, thus consolidating and expanding gains made by workers over previous decades. </span></span></span></span></span></span></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019"><span data-dcnode-id="1020"><span data-dcnode-id="1021"><span data-dcnode-id="1022"><span data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Through the activities of the Luxembourg Commission, republican principles penetrated trades more concretely and more deeply than ever before. In the spring of 1848, work was becoming a “public activity”. Workers approached their trade organisations as public institutions and referred to their delegates, whose mandate they democratically controlled, as functionaries.&nbsp; These developments had the potential to powerfully extend the democratisation of social relations of production initiated in 1789-1791, with the abolition of authoritarian guilds and their replacement by new and more democratic regulatory institutions. While republicanism permeated trades, the federation of trades –where, socialists hoped, cooperative workshops would become the rule – was also foreshadowing a potentially radical reshaping of the republic.</span></span></span></span></span></span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005"><span data-dcnode-id="1006"><span data-dcnode-id="1007"><span data-dcnode-id="1014"><span data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">The Second Republic, and its socialist currents, of course, were violently repressed and overthrown. The Second Empire and Third Republic initiated a capitalist transition that led to a re-formation of the French working-class. This re-formation process was accomplished through an intense and unprecedented wave of strikes aimed at preserving and restoring customary regulations of trades and entailed the rise of an increasingly (though never completely) autonomous socialist movement vis-a-vis mainstream republican government parties. The re-formation of the working-class also took place at a time when nationalism and xenophobia were thriving and when the rise of industrial capitalism had a profound impact of social reproduction and gender relations. The latter issues deserve further investigation that should take its cue from the important work of Johanna Brenner and Maria Ramas on capitalism and the oppression of women.</span></span></span><span data-dcnode-id="1008"><span data-dcnode-id="1009"><span data-dcnode-id="1010"><span data-dcnode-id="1011"><a class="see-footnote" data-dcnode-id="1012" href="#footnote16_wcbinb6" id="footnoteref16_wcbinb6" title="Brenner Johanna and Maria Ramas, 1984, «&nbsp;Rethinking Women’s Oppression&nbsp;», New Left Review, I/144. "><span data-dcnode-id="1013" instrument_node="">16</span></a></span></span></span></span></span></span></span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="996"><span data-dcnode-id="997"><span data-dcnode-id="998"><em data-dcnode-id="999"><span data-dcnode-id="1000"><span data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">In your book, you argue that capitalism was imported into France by the state. What role did the consolidation of British industrial capitalism in this importation? How did this importation play itself out?</span></span></span></em></span></span></span></p><span data-dcnode-id="994" instrument_node="">
