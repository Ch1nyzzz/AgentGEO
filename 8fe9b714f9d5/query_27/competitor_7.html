an data-dcnode-id="901" instrument_node="">Set alert</span></span></button></div><div class="popover u-show-from-md text-m move-right" data-dcnode-id="891" id="about-this-page"><div data-dcnode-id="892" id="popover-trigger-about-this-page"><button aria-expanded="false" aria-haspopup="true" class="button-link action-buttons u-padding-s-bottom button-link-primary" data-dcnode-id="893" type="button"><svg aria-hidden="true" class="icon icon-info" data-dcnode-id="896" focusable="false" height="24" viewBox="0 0 100 128" width="18.75"><path d="m5e1 14c-13.08 0-25.4 5.1-34.64 14.36-9.26 9.24-14.36 21.56-14.36 34.64 0 27.02 21.98 49 49 49 13.1 0 25.4-5.1 34.66-14.36 9.24-9.24 14.34-21.56 14.34-34.64 0-27.02-21.98-49-49-49zm0 9.6c21.72 0 39.4 17.68 39.4 39.4 0 10.52-4.1 20.42-11.54 27.86s-17.34 11.52-27.86 11.52c-21.72 0-39.4-17.66-39.4-39.38 0-10.52 4.1-20.42 11.54-27.86s17.34-11.54 27.86-11.54zm-5 14.4v1e1h1e1v-1e1h-1e1zm0 16v34h1e1v-34h-1e1z" data-dcnode-id="897"></path></svg><span class="button-link-text" data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">About this page</span></span></button></div></div></div></div></section><section class="snippets-container screen" data-dcnode-id="92" id="snippets-container"><div class="snippets-container-inner padding-resp-hor-m u-padding-l-ver" data-dcnode-id="93"><div class="snippets-divider hor-line-top u-remove-if-not-print" data-dcnode-id="887"></div><div class="u-clearfix" data-dcnode-id="94" id="snippets-wrapper"><article class="snippet column" data-dcnode-id="815" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="830"><h2 class="u-font-serif u-text-light" data-dcnode-id="883" id="tp-snippet-chp-title-B9780081006399000062"><a class="anchor" data-aa-name="Business Networks and the Emergence of Guanxi Capitalism in China" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780081006399000062"><span class="anchor-text" data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Business Networks and the Emergence of Guanxi Capitalism in China</span></span></a></h2><div class="size-l" data-dcnode-id="831"><cite data-dcnode-id="863"><p data-dcnode-id="864"><span data-dcnode-id="869"><span data-dcnode-id="882" instrument_node="">B.X. </span><span data-dcnode-id="880" instrument_node="">Wang</span><span data-dcnode-id="878" instrument_node="">, </span><span data-dcnode-id="876" instrument_node="">C. </span><span data-dcnode-id="874" instrument_node="">Rowley</span><span data-dcnode-id="872" instrument_node="">, in</span><span data-dcnode-id="870" instrument_node=""> </span></span><a class="anchor" data-aa-name="Business Networks in East Asian Capitalisms" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/book/9780081006399/business-networks-in-east-asian-capitalisms"><span class="anchor-text" data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Business Networks in East Asian Capitalisms</span></span></a><span data-dcnode-id="865" instrument_node="">, 2017</span></p></cite><section data-dcnode-id="832" id="B9780081006399000062-s0050"><h3 data-dcnode-id="857"><span data-dcnode-id="862" instrument_node="">5.9</span><span data-dcnode-id="860" instrument_node=""> </span><span data-dcnode-id="858" instrument_node="">Central Managed Capitalism</span></h3><p data-dcnode-id="843" id="B9780081006399000062-p0345"><span data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Mcnally (2013)</span></span><span data-dcnode-id="850"><span data-dcnode-id="854" instrument_node=""> argued that China’s remodelled </span><span class="topic-highlight" data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">state capitalism</span></span><span data-dcnode-id="851" instrument_node=""> represents a complex fusion of Western, Asian, socialist and Chinese historical and modern elements, because China’s historical background as both imperial and socialist frames its state-centric approach to economic management. Most fundamentally, China’s emergent capitalism encompasses a unique duality of state-led capitalism juxtaposed with entrepreneurial </span></span><em data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">guanxi</span></em><span data-dcnode-id="847" instrument_node=""> capitalism. Top-down, state-guided development dominates, but bottom-up, a myriad of medium- and small-sized private firms have used entrepreneurial strategies to create highly flexible production and knowledge networks with global reach (</span><span data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Mcnally, 2013</span></span><span data-dcnode-id="844" instrument_node="">).</span></p><p data-dcnode-id="833" id="B9780081006399000062-p0350"><span data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Lin (2010)</span></span><span data-dcnode-id="840" instrument_node=""> noted that China exhibited two unique features which are not usually identified with capitalism. First, the state itself acts as a capitalist, and second, economic activities are heavily embedded in </span><em data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">guanxi</span></em><span data-dcnode-id="837" instrument_node="">. He then coined the term CMC for the continuously emerging economy in which China continues to develop capitalistic capacities, and the party-state increasingly tightens control of the economy and synchronised political and economic stratification. The combination of state guidance with informal </span><em data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">guanxi</span></em><span data-dcnode-id="834" instrument_node=""> enables Chinese businesses to connect with each other and with officialdom at various levels and build trust and harmony for long-term mutual benefit and stability in both business and social aspects.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="823"><a aria-describedby="tp-snippet-chp-title-B9780081006399000062" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780081006399000062" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780081006399" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="816"><a class="read-full-chapter-print" data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780081006399000062" rel="noopener" target="_blank"><span data-dcnode-id="822" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="817"><span data-dcnode-id="820" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="818" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9780081006399000062</span></div></div></article><article class="snippet column" data-dcnode-id="705" style="padding-right: 0px; padding-left: 40px; float: right;"><div class="snippet-content" data-dcnode-id="720"><h2 class="u-font-serif u-text-light" data-dcnode-id="811" id="tp-snippet-chp-title-B9781843342441500082"><a class="anchor" data-aa-name="Business groups in India" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781843342441500082"><span class="anchor-text" data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Business groups in India</span></span></a></h2><div class="size-l" data-dcnode-id="721"><cite data-dcnode-id="797"><p data-dcnode-id="798"><span data-dcnode-id="803"><span data-dcnode-id="810" instrument_node="">Michael </span><span data-dcnode-id="808" instrument_node="">Carney</span><span data-dcnode-id="806" instrument_node="">, in</span><span data-dcnode-id="804" instrument_node=""> </span></span><a class="anchor" data-aa-name="Asian Business Groups" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/book/9781843342441/asian-business-groups"><span class="anchor-text" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Asian Business Groups</span></span></a><span data-dcnode-id="799" instrument_node="">, 2008</span></p></cite><section data-dcnode-id="722" id="B9781843342441500082-s0020"><h3 data-dcnode-id="794"><span data-dcnode-id="796" id="B9781843342441500082-p218"></span><span data-dcnode-id="795" instrument_node="">Bureaucratic state capitalism</span></h3><div data-dcnode-id="779"><p data-dcnode-id="788"><span data-dcnode-id="789"><span data-dcnode-id="793" instrument_node="">The policy of self-reliance produced inward-looking economic development and planning processes that might be best described as bureaucratic </span><span class="topic-highlight" data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">state capitalism</span></span><span data-dcnode-id="790" instrument_node="">. Following independence, an industrial policy regime was created by numerous acts of parliament between 1951 an 1973, giving state institutions substantial powers to direct private enterprise. Such was the extent of these powers that nearly every decision an entrepreneur or manager could make was governed by a rule, regulation and statute. Moreover, bureaucrats at various levels of government had substantial discretion in interpreting the rules. Before an entrepreneur could perform any productive activity, they would be required to run a circuitous gauntlet of obstacles to obtain the necessary permissions. The industrial regime became know as the ‘licence-permit-quota raj’. One analyst describes the regime in the following terms:</span></span></p><blockquote data-dcnode-id="782"><p data-dcnode-id="783" id="B9781843342441500082-sp0010"><span data-dcnode-id="787" instrument_node="">few outside India can appreciate in full measure the extent and nature of India’s controls … Indian planners and bureaucrats sought to regulate both domestic entry and export competition, to eliminate product diversification beyond what was licensed, to penalize unauthorized expansion of capacity, to allocate and prevent the reallocation of imported inputs, and indeed to define and eliminate virtually all aspects of investments and production through a maze of kafkaesque controls. This all encompassing bureaucratic intrusiveness and omnipotence had no rational economic or social logic… (Bhagwati, 1993, cited in </span><span data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Chibber and Majumdar, 1999</span></span><span data-dcnode-id="784" instrument_node="">: 228)</span></p></blockquote><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">The industrial policy environment was characterised by two tiers. The macro policy environment was comprised of larger overriding policy goals, such as self-reliance, state intervention and socialist economic policy, about which there was much consensus in the government. The micro policy environments focused on regulations pertaining to particular industries and firms. Whereas business groups could have no impact over macro policy, they found it much easier to influence micro policies on issues particular to their interests.</span></p></div><div data-dcnode-id="762"><p data-dcnode-id="775"><span data-dcnode-id="778" instrument_node="">While the licence-permit-quota raj was highly restrictive and apparently hostile to business interests, the highly protectionist regime it created proved very attractive to entrepreneurs who had established themselves. Indeed, India’s bureaucratic state capitalism worked favourably for business groups as the state protected domestic firms from </span><span data-dcnode-id="777" id="B9781843342441500082-p219"></span><span data-dcnode-id="776" instrument_node="">foreign competition and established infrastructure industries that provided them with cheap inputs, especially subsidised loans. Eventually, the state monopolised financial institutions and became the sole source of external credit and finance. As the industrial policy regime required permissions for nearly every commercial decision, entrepreneurs established special government relation offices, called ‘industrial embassies’ where they cultivated social capital with elected officials and civil servants to advance their own interests through the complex bureaucracy. The industrial embassies of the major business groups each devised their own strategies to maximise the chances of success. For example, the Tata group submitted fewer applications for licences and quotas but applied all its power to gain their acceptance. In contrast, Birla inundated government regulators with numerous applications for licences, many of which were rejected. Encarnation suggests that there were economies of scale to political strategy:</span></p><blockquote data-dcnode-id="769"><p data-dcnode-id="770" id="B9781843342441500082-sp0015"><span data-dcnode-id="774" instrument_node="">To secure government licenses and equally important to block competitors from obtaining such licenses both required some exercise of political skills. So the larger business houses maintained specialized industrial embassies in New Delhi. Often run by former civil servants or military officers … in contrast those enterprises with fewer financial and managerial resources and located far from the capital found it more difficult to conduct lengthy and repeated negotiations requiring reams of data and correspondence with a dozen or more regulatory agencies in the central government… (</span><span data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Encarnation 1989</span></span><span data-dcnode-id="771" instrument_node="">: 134)</span></p></blockquote><p data-dcnode-id="763"><span data-dcnode-id="768" instrument_node="">The two largest business houses illustrate the extent of economies of scale in industrial lobbying. Together, Tata and Birla attained 10</span><span data-dcnode-id="766" instrument_node="">&nbsp;</span><span data-dcnode-id="764" instrument_node="">per cent of all applications approved by the government during a 10-year period between 1956 and 1966. Attaining licences was often used as a strategic deterrent to new entry. Many firms did not utilise their production licences or build the industrial capacity for which they had been granted permission.</span></p></div><p data-dcnode-id="758" id="B9781843342441500082-p0050"><span data-dcnode-id="761" instrument_node="">Unlike the developmental states of Japan and Korea, which closely monitored the performance of the beneficiaries of state credit by measuring their performance on criteria such as technology development and export achievements, the Indian state rarely concerned itself with the outcome of the licensing process. Once applicants had secured their licences, government officials rarely made inspections to guarantee compliance with the terms of the original agreements. Indeed, while business houses </span><span data-dcnode-id="760" id="B9781843342441500082-p220"></span><span data-dcnode-id="759" instrument_node="">engaged in strategies to achieve their licences and permits, top ministers and senior bureaucrats generously reciprocated, actively competing for the work of progressing the applications of specific business houses. In these conditions, rent-seeking activity became the normal course of action and some houses were better able to play the game better than others.</span></p><p data-dcnode-id="753" id="B9781843342441500082-p0055"><span data-dcnode-id="757" instrument_node="">Indeed, by the mid-1960s it became evident that the licence granting and state capital allocation process had been fully captured by a small number of large business houses, producing a concentration of economic power that was to prefigure similar outcomes in other state-led economic regimes in Asia in the 1980s and 1990s. At this point, the Indian government became concerned about the extent of industrial concentration in the hands of the top four family-owned business houses and began to investigate their restrictive practices. The government’s response was to pass the Monopolies and Restrictive Trade Practices Act (MRTP) in 1969, a significant piece of legislation that stimulated further diversification by business houses. The MRTP severely limited large companies’ ability to expand their production lines. To continue growing, firms sought to diversify outside of their major areas of business through the establishment of new businesses. Just as the strict enforcement of the 1890 Sherman Anti-Trust Act by President Roosevelt and Chief Justice Taft in the USA precipitated the growth of conglomerate enterprises (</span><span data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Davis, Diekman and Tinsley, 1994</span></span><span data-dcnode-id="754" instrument_node="">) so did the MRTP stimulate a new wave of conglomerate diversification among Indian business houses, especially into industries deemed important to the Indian government.</span></p><div data-dcnode-id="730"><p data-dcnode-id="748"><span data-dcnode-id="752" instrument_node="">Rather than restricting the power of large business houses, the MRTP seems to further promote their growth as diversified business houses became increasingly organised into pyramids to circumvent MRTP restrictions. According to </span><span data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Encarnation (1989)</span></span><span data-dcnode-id="749" instrument_node="">, independent firms were typically less successful in the labyrinthine licence-granting process under MRTP legislation and responded to the MRTP by seeking to invest abroad. However, many business houses showed little proclivity to invest outside of the Indian market, as Encarnation puts it:</span></p><blockquote data-dcnode-id="742"><p data-dcnode-id="743" id="B9781843342441500082-sp0020"><span data-dcnode-id="747" instrument_node="">direct investments abroad remain notably absent from the portfolios of three of India’s ten largest conglomerates with the important exception of Birla … Indian business houses did not have the regulatory incentive or technology to invest aggressively overseas. (</span><span data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Encarnation, 1989</span></span><span data-dcnode-id="744" instrument_node="">: 148)</span></p></blockquote><p data-dcnode-id="731"><span data-dcnode-id="741" instrument_node="">The 1969 MRTP legislation, accompanied by other legislation including corporate income taxes that were raised to nearly 100</span><span data-dcnode-id="739" instrument_node="">&nbsp;</span><span data-dcnode-id="737" instrument_node="">per cent, marks </span><span data-dcnode-id="736" id="B9781843342441500082-p221"></span><span data-dcnode-id="735" instrument_node="">a high point in anti-private business legislation. However, this nadir of aggressive and protectionist bureaucratic state capitalism hindered external trade, inward investment, and retarded the development of financial markets. These conditions only served to cement the position of family business groups, which came to dominate the economy. Moreover, regressive tax policies fortified the household character of business groups. Extremely high levels of income tax created strong incentives for family members to join and remain in company positions to protect their standard of living by using tax-deductible company resources for housing and personal expenses (</span><span data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Ward, 2000</span></span><span data-dcnode-id="732" instrument_node="">: 274).</span></p></div><p data-dcnode-id="725" id="B9781843342441500082-p0065"><span data-dcnode-id="729" instrument_node="">The political environment of India shifted considerably in the mid-1970s. Prior to that the Congress Party had controlled both federal and state governments did not face any serious threats to its rule. Such political stability facilitated firm rent-seeking and political deal-making. Since the Janata Party took control of the federal government in 1977, the political situation became more fragmented and unstable. Now that politicians’ tenure is less secure, it is less likely that they will be able to pay back political favours, which makes rent-seeking more difficult (</span><span data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Kang, 2002</span></span><span data-dcnode-id="726" instrument_node="">). India’s industrial policy was gradually liberalised throughout the 1980s, with the de-licensing of specific industries in 1983.</span></p><p data-dcnode-id="723" id="B9781843342441500082-p0070"><span data-dcnode-id="724" instrument_node="">Through the early 1980s, political leaders made strong statements against capitalist enterprises but continued to support established enterprises with protectionist policies. In turn, business houses were careful to the frame their demands in terms that were acceptable to political leaders. Business was not in a position to much influence the macro-environment and was forced to take direction from the government. However, this strategy of state-led capitalism was in no way comparable with that found in Japan or in Korea during the period 1950–80. While the state influenced the rules of the game by controlling finance and mediated access to foreign technology, the state’s overriding goals of self-reliance did not produce sustained economic performance in the form of export-oriented growth or capital accumulation. Instead the licence-permits-quota raj created numerous impediments to productive investment and economic activity. In contrast with Japan, Taiwan and Korea, which had successfully cultivated domestic competitive industries, the Indian state overestimated its capacity to influence economic activity and overextended itself by failing to selectively focus on clear economic goals or achievable tasks. That strategy became unsustainable and imposed heavy burdens on a stagnant economy. By the mid-1980s, both state and business recognised the need for rationalisation and liberalisation in the industry regime.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="713"><a aria-describedby="tp-snippet-chp-title-B9781843342441500082" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781843342441500082" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9781843342441" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="706"><a class="read-full-chapter-print" data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781843342441500082" rel="noopener" target="_blank"><span data-dcnode-id="712" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="707"><span data-dcnode-id="710" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="708" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9781843342441500082</span></div></div></article><article class="snippet column" data-dcnode-id="636" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="651"><h2 class="u-font-serif u-text-light" data-dcnode-id="701" id="tp-snippet-chp-title-B9780080970868720836"><a class="anchor" data-aa-name="Cities: Internal Structure" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780080970868720836"><span class="anchor-text" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Cities: Internal Structure</span></span></a></h2><div class="size-l" data-dcnode-id="652"><cite data-dcnode-id="687"><p data-dcnode-id="688"><span data-dcnode-id="693"><span data-dcnode-id="700" instrument_node="">Elisabeth </span><span data-dcnode-id="698" instrument_node="">Lichtenberger</span><span data-dcnode-id="696" instrument_node="">, in</span><span data-dcnode-id="694" instrument_node=""> </span></span><a class="anchor" data-aa-name="International Encyclopedia of the Social &amp;amp; Behavioral Sciences (Second Edition)" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/referencework/9780080970875/international-encyclopedia-of-the-social-and-behavioral-sciences"><span class="anchor-text" data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">International Encyclopedia of the Social &amp; Behavioral Sciences (Second Edition)</span></span></a><span data-dcnode-id="689" instrument_node="">, 2015</span></p></cite><section data-dcnode-id="653" id="B9780080970868720836-s0070"><h3 data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Development of Urban Fringes</span></h3><div data-dcnode-id="654"><p data-dcnode-id="679"><span data-dcnode-id="680"><span data-dcnode-id="684" instrument_node="">The development of urban fringes differs materially depending on whether it takes place under private capitalism, in welfare states or, in retrospect, under </span><span class="topic-highlight" data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">state capitalism</span></span><span data-dcnode-id="681" instrument_node="">.</span></span></p><dl class="article-list" data-dcnode-id="655"><dt data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">1.</span></dt><dd data-dcnode-id="671"><p data-dcnode-id="672" id="B9780080970868720836-p0240"><span data-dcnode-id="676" instrument_node="">Under US private capitalism, cities grow as profits from land speculation and rising land prices are invested in land development and in technical improvements. This starts an upward spiral of development and rising prices. North American cities show two wide zones of speculation. The inner one, around the CBD, is marked by decay and slum areas at present. Far more impressive, at least because of its extent, is the peripheral zone of vacant land around core cities and suburbs, which, even in the 1950s amounted to&nbsp;20–60% of core areas (</span><span data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Bartholomew, 1955</span></span><span data-dcnode-id="673" instrument_node="">). Anglo-American urban geography textbooks completely ignore those huge tracts of vacant land – implying that nonutilization of these spaces is taken for granted rather than considered a problem.</span></p></dd><dt data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">2.</span></dt><dd data-dcnode-id="666"><p data-dcnode-id="667" id="B9780080970868720836-p0245"><span data-dcnode-id="668" instrument_node="">In continental Europe, too, urban fringes attracted speculation. During World War I, they were occupied by so-called ‘emergency gardening plots,’ and later turned into allotment gardens. Frequently, these became temporary settlements, partly forerunners of a second-home periphery. All over post-World War I continental Europe, spontaneous settlements typically marked city fringes – a consequence of fundamental political changes. The absence of government checks on land use made for temporary settlements, among them the pavilions of ‘chaotic urbanization’ in France as well as the often illegal occupation of land around big central European cities (Belgrade, Budapest, Bucharest, Sofia, Vienna, and Warsaw). The succession states were less successful than the Austro–Hungarian monarchy in repelling indigent illegal immigrants. Those postwar squatters were comparable to today's squatter settlements on the fringes of Third World cities beyond the reach of state or municipal authorities.</span></p></dd><dt data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">3.</span></dt><dd data-dcnode-id="661"><p data-dcnode-id="662" id="B9780080970868720836-p0250"><span data-dcnode-id="663" instrument_node="">As to planning and regulating the growth of agglomerations, Great Britain set the standard in the early twentieth century, with the two important concepts of the New Town (referred to above) and the ‘Green Belt.’ The creation of a Green Belt presupposes government control of land use, replacing the market mechanism of the liberal age. Originating in London, Green Belts have also become constituent features of zoning plans in other cities of the former British Empire. The urban development plan of Ottawa shows a Green Belt several miles wide. Persistent urban sprawl caused a characteristic overspill. In the United States too, Green-Belt concepts were introduced into various urban development plans; but in contrast to Europe, the enormous extent of suburbanization could not be contained to fulfill the original purpose of separating urban space from the periphery.</span></p></dd><dt data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">4.</span></dt><dd data-dcnode-id="656"><p data-dcnode-id="657" id="B9780080970868720836-p0255"><span data-dcnode-id="658" instrument_node="">In the former Socialist countries, extensive public recreation areas and large private second-home districts exist (neither of these important elements of the periphery of urban regions is to be found in the USA). The public recreation area of Moscow goes back to a Green Belt idea already incorporated in the city development plan of 1935. It is 20–40&nbsp;km wide and includes major sports and cultural facilities. In most of the big cities of the former USSR, the Green Belt was an integral part of development planning.</span></p></dd></dl></div></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="644"><a aria-describedby="tp-snippet-chp-title-B9780080970868720836" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780080970868720836" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780080970875" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="637"><a class="read-full-chapter-print" data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780080970868720836" rel="noopener" target="_blank"><span data-dcnode-id="643" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="638"><span data-dcnode-id="641" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="639" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9780080970868720836</span></div></div></article><article class="snippet column" data-dcnode-id="572" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="587"><h2 class="u-font-serif u-text-light" data-dcnode-id="632" id="tp-snippet-chp-title-B978184334631950003X"><a class="anchor" data-aa-name="The Chinese economy in the next decade" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B978184334631950003X"><span class="anchor-text" data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">The Chinese economy in the next decade</span></span></a></h2><div class="size-l" data-dcnode-id="588"><cite data-dcnode-id="618"><p data-dcnode-id="619"><span data-dcnode-id="624"><span data-dcnode-id="631" instrument_node="">Peter </span><span data-dcnode-id="629" instrument_node="">Wood</span><span data-dcnode-id="627" instrument_node="">, in</span><span data-dcnode-id="625" instrument_node=""> </span></span><a class="anchor" data-aa-name="China 2020" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/book/9781843346319/china-2020"><span class="anchor-text" data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">China 2020</span></span></a><span data-dcnode-id="620" instrument_node="">, 2011</span></p></cite><section data-dcnode-id="589" id="B978184334631950003X-s0015"><h3 data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">The Chinese state</span></h3><p data-dcnode-id="606" id="B978184334631950003X-p0065"><span data-dcnode-id="611"><span data-dcnode-id="615" instrument_node="">Politics matters because where China will be in 2020 depends on where we think China is now. To call the current structure of power in China ‘</span><span class="topic-highlight" data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">state capitalism</span></span><span data-dcnode-id="612" instrument_node="">’ does not take us very far. France and China may both pursue policies that favour industrial champions, and both may reject some aspects of Anglo-Saxon capitalism, but they are, of course, very different. One way to look at this is to contrast the development of capitalism in the West and in East Asia. In the former, capitalists dominated the state, while in the latter market exchange was promoted by the state but large-scale capital was held in check. Japan created a mixed system by grafting elements of the western capitalist model onto its own economy. Arguments about whether the Chinese political system will become more ‘western’, therefore, are as much about whether the Chinese economy will become not so much more capitalist but whether control of its commanding heights will be handed over to globalised capital.</span></span><span data-dcnode-id="608"><sup data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">11</span></sup></span><span data-dcnode-id="607" instrument_node=""> Phrased in this way, the answer to the question is of course a clear negative. It is not on the agenda of the Chinese Communist Party (CCP) to hand power over to another institution in China, let alone foreign capital. The first step, therefore, is to remember that the Chinese leadership is focused on Chinese interests, as defined domestically, including in this the maintenance of control over the key levers of power.</span></p><p data-dcnode-id="598" id="B978184334631950003X-p0070"><span data-dcnode-id="605" instrument_node="">This is not the place to undertake a full-scale discussion of prospects for China’s political system but again this matters in economic terms because these debates in turn influence decision making. Scenarios tend to offer three possible outcomes: the emergence of a democratic China; prolonged chaos; or a resilient, authoritarian China.</span><span data-dcnode-id="602"><sup data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">12</span></sup></span><span data-dcnode-id="601" instrument_node=""> The impact of the middle scenario on the rest of the world, economically and politically, would be enormous. Every other forecast about the nature of the global economy in 2020 would have to be thrown out of the window. On the </span><span data-dcnode-id="600" id="B978184334631950003X-p51"></span><span data-dcnode-id="599" instrument_node="">less apocalyptic forecasts the nature of economic growth would be different during what has been dubbed a democratic transition from that under the so-called resilient and authoritarian leadership.</span></p><p data-dcnode-id="596" id="B978184334631950003X-p0075"><span data-dcnode-id="597" instrument_node="">In the democratic transition argument it is the weight of a growing Chinese middle class, finding its voice and defending its economic and property interests, which pushes the leadership to change. In the resilient authoritarian scenario it is the leadership, and the CCP, which defends its own economic interests and maintains its position, if not necessarily its legitimacy, as the sole institution capable of defending China’s national sovereignty overseas and maintaining stability at home.</span></p><p data-dcnode-id="590" id="B978184334631950003X-p0080"><span data-dcnode-id="595" instrument_node="">These scenarios assume that it is only China that will, or has to, change, while western states will remain as they are, but there is no reason to treat China as the sole independent variable. Inequality has increased and middle-class living standards have stagnated in the US for more than twenty years. In listing what the new Chinese middle class can apparently look forward to – ‘The middle class usually enjoy stable housing, healthcare and educational opportunities (including college) for their children, reasonable retirement and job security, and discretionary income that can be spent on vacation and leisure pursuits’</span><span data-dcnode-id="592"><sup data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">13</span></sup></span><span data-dcnode-id="591" instrument_node=""> – Homi Kharas has merely set out the very items increasingly problematic in western societies. This, of course, is without discussing issues of chronic poverty. The irony is, therefore, that the very class expected to generate demands for shifts to an ill-defined liberal political system in China is itself beleaguered in the west.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="580"><a aria-describedby="tp-snippet-chp-title-B978184334631950003X" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B978184334631950003X" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9781843346319" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="573"><a class="read-full-chapter-print" data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B978184334631950003X" rel="noopener" target="_blank"><span data-dcnode-id="579" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="574"><span data-dcnode-id="577" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="575" instrument_node="">https://www.sciencedirect.com/science/article/pii/B978184334631950003X</span></div></div></article><article class="snippet column" data-dcnode-id="518" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="533"><h2 class="u-font-serif u-text-light" data-dcnode-id="568" id="tp-snippet-chp-title-B0080430767009256"><a class="anchor" data-aa-name="Occidentalism" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B0080430767009256"><span class="anchor-text" data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Occidentalism</span></span></a></h2><div class="size-l" data-dcnode-id="534"><cite data-dcnode-id="554"><p data-dcnode-id="555"><span data-dcnode-id="560"><span data-dcnode-id="567" instrument_node="">F. </span><span data-dcnode-id="565" instrument_node="">Coronil</span><span data-dcnode-id="563" instrument_node="">, in</span><span data-dcnode-id="561" instrument_node=""> </span></span><a class="anchor" data-aa-name="International Encyclopedia of the Social &amp;amp; Behavioral Sciences" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/referencework/9780080430768/international-encyclopedia-of-the-social-and-behavioral-sciences"><span class="anchor-text" data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">International Encyclopedia of the Social &amp; Behavioral Sciences</span></span></a><span data-dcnode-id="556" instrument_node="">, 2001</span></p></cite><section data-dcnode-id="535" id="B0080430767009256-s0035"><h3 data-dcnode-id="548"><span data-dcnode-id="553" instrument_node="">2.3</span><span data-dcnode-id="551" instrument_node=""> </span><span data-dcnode-id="549" instrument_node="">Occidentalism and Globalization</span></h3><p data-dcnode-id="541" id="B0080430767009256-p0075"><span data-dcnode-id="547" instrument_node="">The conditions that have enabled Western representations of cultural difference in the modern world in terms of radical alterity, subordination, and exoticism include colonialism and imperialism, a hierarchical system of nation-states, capitalism as a global mode of production of regions, persons, and things, a division of the person into private individual and public citizen, faith in secular science, and an expansive </span><em data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">universalism</span></em><span data-dcnode-id="544" instrument_node=""> supported by the sciences and by ideologies of progress. At the onset of a new millennium these conditions are being modified by transformations epitomized by the hegemony of neoliberal globalization. The intensified commodification of social life and the breakdown of commodities into bundles of risk spread across space and time have heightened the significance of the market as an organizing principle of geopolitical and cultural differences. </span><span data-dcnode-id="543" id="B0080430767009256-p0080"></span><span data-dcnode-id="542" instrument_node="">Critical accounts of globalization treat it as both a unifying and divisive process that involves a dialectic of globalization and localization, universalization and particularization, spatialization and temporalization, and cultural homogenization and ethnic diversification. In contrast, hegemonic discourses of globalization emphasize unity over difference and produce an image of an increasingly integrated globe no longer radically divided between the West and its others, thus masking persisting operations of othering that continue to take place through various forms of naturalization, such as the racialization of class distinctions and the essentialization of cultural differences.</span></p><p data-dcnode-id="536" id="B0080430767009256-p0085"><span data-dcnode-id="540" instrument_node="">Insofar as discourses of neoliberal globalization emphasize the potential equality and universality of humankind through the market, they imply a shift of focus in the representation of cultural difference from alien subjects located outside Western centers to subordinated populations dispersed across the globe. As the West seems to dissolve into the market and westernization appears as globalization, political projects to civilize alien others are being recast as self-induced processes of incorporation by willing citizens-consumers. In contrast to Occidentalist modalities of representation based upon a binary opposition between a superior Western self and its subordinate others, prevailing discourses of globalization appear as a compelling but circuitous form of Occidentalism whose power derives from its capacity to obscure the presence of the West and the operations through which it constitutes itself in opposition to others. Its mode of constructing cultural difference through subalterity rather than alterity reflects conditions that continue to contradict ideals of equality and universality, and yet open up the possibility for their fuller realization (Coronil </span><span data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">2000</span></span><span data-dcnode-id="537" instrument_node="">).</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="526"><a aria-describedby="tp-snippet-chp-title-B0080430767009256" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B0080430767009256" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780080430768" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="519"><a class="read-full-chapter-print" data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B0080430767009256" rel="noopener" target="_blank"><span data-dcnode-id="525" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="520"><span data-dcnode-id="523" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="521" instrument_node="">https://www.sciencedirect.com/science/article/pii/B0080430767009256</span></div></div></article><article class="snippet column" data-dcnode-id="413" style="padding-right: 0px; padding-left: 40px; float: right;"><div class="snippet-content" data-dcnode-id="428"><h2 class="u-font-serif u-text-light" data-dcnode-id="514" id="tp-snippet-chp-title-B9780081009833000095"><a class="anchor" data-aa-name="Conclusion" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780081009833000095"><span class="anchor-text" data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Conclusion</span></span></a></h2><div class="size-l" data-dcnode-id="429"><cite data-dcnode-id="494"><p data-dcnode-id="495"><span data-dcnode-id="500"><span data-dcnode-id="513" instrument_node="">J. </span><span data-dcnode-id="511" instrument_node="">Hong</span><span data-dcnode-id="509" instrument_node="">, ... </span><span data-dcnode-id="507" instrument_node="">C. </span><span data-dcnode-id="505" instrument_node="">Rowley</span><span data-dcnode-id="503" instrument_node="">, in</span><span data-dcnode-id="501" instrument_node=""> </span></span><a class="anchor" data-aa-name="Organizational Learning in Asia" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/book/9780081009833/organizational-learning-in-asia"><span class="anchor-text" data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Organizational Learning in Asia</span></span></a><span data-dcnode-id="496" instrument_node="">, 2017</span></p></cite><section data-dcnode-id="430" id="B9780081009833000095-s0010"><h3 data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Introduction</span></h3><p data-dcnode-id="483" id="B9780081009833000095-p0010"><span data-dcnode-id="491" id="B9780081009833000095-p187"></span><span data-dcnode-id="490" instrument_node="">Organizational learning as a topic remains as interesting and contested as ever (</span><span data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Rowley &amp; Poon, 2011</span></span><span data-dcnode-id="487" instrument_node="">). While organizational learning in Asia appears to be a challenging issue for both foreign and domestic multinational corporations (MNCs) (</span><span data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Snell &amp; Hong, 2011</span></span><span data-dcnode-id="484" instrument_node="">), it is notable that there have been relatively few studies conducted in the field to understand the issues that need to be tackled and resolved. Accordingly, we see ourselves and our fellow Asian and foreign researchers in this book as voyagers at the initial stages of mapping hitherto-uncharted waters.</span></p><p data-dcnode-id="476" id="B9780081009833000095-p0015"><span data-dcnode-id="482" instrument_node="">In this book, we have looked at organizational learning from a variety of perspectives and foci. Different methods (such as case studies and surveys) and conceptual approaches were brought to bear on numerous aspects of organizational learning. These included: cultural and institutional contexts, adaptation, and learning in networks; knowledge sharing, unlearning, experimentation, and boundary objects; personalization, codification, imitation, innovation, and knowledge management; entrepreneurial learning, learning by experience, and reverse knowledge transfer; learning capability, orientation, and mechanisms; knowledge transfer, tacit knowledge, and cooperative learning; context and universalism. Context-sensitivity is a crucial, overarching viewpoint not only for organizational learning but also for much business and management literature, where </span><span data-dcnode-id="481" id="B9780081009833000095-p188"></span><span data-dcnode-id="480" instrument_node="">there is too often the overweening dominance of naïve, simplistic universalism at the cost of diverse approaches recognizing the complexity of the ‘real world’ globally (</span><span data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Rowley &amp; Benson, 2002; Rowley, Bae, Horak, &amp; Bacouel-Jenjens, 2016</span></span><span data-dcnode-id="477" instrument_node="">).</span></p><p data-dcnode-id="455" id="B9780081009833000095-p0020"><span data-dcnode-id="475" instrument_node="">Contributors to our volume have, between them, identified three major organizational-learning-related challenges facing both foreign and domestic firms operating in Asia. The first challenge relates to poorly developed institutional contexts. In </span><span data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Chapter 2</span></span><span data-dcnode-id="472" instrument_node="">, Organizational Learning in the Context of Institutional Voids: Government Interventionism and Business Networks in Asia Zhao’s review of the nature of institutional voids (</span><span data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Khanna &amp; Palepu, 2010</span></span><span data-dcnode-id="465"><span data-dcnode-id="469" instrument_node="">) and of the workings of </span><span class="topic-highlight" data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">state capitalism</span></span><span data-dcnode-id="466" instrument_node=""> in Asian countries (</span></span><span data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Amsden, 1989</span></span><span data-dcnode-id="462" instrument_node="">) serves as a reminder that foreign MNCs face the ‘liability of foreignness’ (</span><span data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Zaheer, 1995</span></span><span data-dcnode-id="459" instrument_node="">), and may need to form learning alliances with local firms as sources of local adaptation. Getting close to foreign firms through such alliances can also benefit domestic firms. Tuan and Thang show, in </span><span data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Chapter 4</span></span><span data-dcnode-id="456" instrument_node="">, Knowledge Management Strategies, Imitation, and Innovation: An Empirical Study of Vietnamese Firms that Vietnamese firms typically adopt imitation strategies as a step toward innovation and tend to rely on personalization as a means to create new knowledge, and it is not difficult to imagine how this may happen in the context of alliances with more ‘advanced’ firms.</span></p><p data-dcnode-id="439" id="B9780081009833000095-p0025"><span data-dcnode-id="454" instrument_node="">The second challenge concerns the need to establish ways through which knowledge, whether originating overseas or locally, can be captured, shared, combined, and developed across borders or other boundaries. Mac and Evangelista, in </span><span data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Chapter 6</span></span><span data-dcnode-id="451" instrument_node="">, How Chinese Exporters Acquire Learning Capability: Empirical Evidence from an Emerging Economy identify several learning mechanisms that Asia-based exporting firms adopt for acquiring knowledge about particular overseas markets, in order to enhance their export performance. </span><span data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Chapter 3</span></span><span data-dcnode-id="448" instrument_node="">, Lose it to Gain it! Unlearning by Individuals and Relearning as a Team by Yeo and Dopson, illustrates how reflective dialog about ‘wicked’ problems can help in unlearning dysfunctional routines and in generating new and potentially more effective ones. Antonio and Feng point out, in </span><span data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Chapter 7</span></span><span data-dcnode-id="445" instrument_node="">, Public–Private Partnerships in Chinese Hospitals and Knowledge Transfer that in the context of cross-border partnerships, local employees in the junior or ‘less-advanced’ partner entity should be empowered to take on new initiatives, with help from representatives of the senior partner, in order to facilitate the interorganizational transfer of expert knowledge. They find that the senior partner does not always recognize the need to make this </span><span data-dcnode-id="444" id="B9780081009833000095-p189"></span><span data-dcnode-id="443" instrument_node="">happen. Focusing on the management of MNCs’ foreign subsidiaries in Asia, Cuervo, in </span><span data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Chapter 5</span></span><span data-dcnode-id="440" instrument_node="">, An Entrepreneurial Perspective on Developed Economy Firms’ Learning from Asia explains the value of the knowledge generated by local managers in foreign markets and the benefits that ensue from capturing and reverse-transferring such locally developed knowledge back to the headquarters in developed markets.</span></p><p data-dcnode-id="431" id="B9780081009833000095-p0030"><span data-dcnode-id="438" instrument_node="">The third challenge entails removing universalist ‘blinkers’ (</span><span data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Rowley &amp; Benson, 2002; Rowley &amp; Oh, 2016; Rowley &amp; Yukongdi, 2016; Rowley et al., 2016; Rowley, 1997</span></span><span data-dcnode-id="435" instrument_node="">) and adopting a contextualized approach to organizational learning. Accordingly, in </span><span data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Chapter 8, A</span></span><span data-dcnode-id="432" instrument_node=""> Contextual Perspective on Organizational Learning Örtenblad sets out to demolish universalist assumptions about organizational learning. Although contexts matter greatly, this does not mean that ‘anything goes’, so he also explains how researchers should go about adopting a modular approach, in constructing purpose-built models for particular types of institutional-cum–cultural-cum–industrial-cum–economic-cum-political contexts. Such an approach may be especially appropriate in Asia, given such rich organ-izational diversity across this vast continent, ranging, for example, from resource abundance in Saudi Arabia to resource scarcity in Vietnam.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="421"><a aria-describedby="tp-snippet-chp-title-B9780081009833000095" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780081009833000095" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780081009833" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="414"><a class="read-full-chapter-print" data-dcnode-id="419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780081009833000095" rel="noopener" target="_blank"><span data-dcnode-id="420" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="415"><span data-dcnode-id="418" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="416" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9780081009833000095</span></div></div></article><article class="snippet column" data-dcnode-id="358" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="373"><h2 class="u-font-serif u-text-light" data-dcnode-id="409" id="tp-snippet-chp-title-B9780081022955108698"><a class="anchor" data-aa-name="Subjectivity" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780081022955108698"><span class="anchor-text" data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Subjectivity</span></span></a></h2><div class="size-l" data-dcnode-id="374"><cite data-dcnode-id="395"><p data-dcnode-id="396"><span data-dcnode-id="401"><span data-dcnode-id="408" instrument_node="">Joanne </span><span data-dcnode-id="406" instrument_node="">Sharp</span><span data-dcnode-id="404" instrument_node="">, in</span><span data-dcnode-id="402" instrument_node=""> </span></span><a class="anchor" data-aa-name="International Encyclopedia of Human Geography (Second Edition)" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/referencework/9780081022962/international-encyclopedia-of-human-geography"><span class="anchor-text" data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">International Encyclopedia of Human Geography (Second Edition)</span></span></a><span data-dcnode-id="397" instrument_node="">, 2020</span></p></cite><section data-dcnode-id="375" id="B9780081022955108698-s0015"><h3 data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Subjective Knowledge</span></h3><p data-dcnode-id="391" id="B9780081022955108698-p0040"><span data-dcnode-id="392" instrument_node="">In the last 50 years, the scientific method has faced serious challenges, in geography and elsewhere. The rise of humanistic geography in the 1970s sought to foreground the human experience of place over the analysis of spatial form and thus could not be objective. This put human experience and understanding of the world at the center of geography. Such an approach negated the possibility of objectivity, replacing scientific methods of analysis and prediction with one based on interpretation (hermeneutics), empathy, and understanding.</span></p><p data-dcnode-id="389" id="B9780081022955108698-p9000"><span data-dcnode-id="390" instrument_node="">In addition to drawing the human as the subject of geography, humanists focused on the subjectivity of the geographer. Humanistic geography's emphasis on interpretation and intersubjectivity meant that the researcher could not be seen as standing outside the research process. Instead, the researcher had to acknowledge their role in the process of interpretation and the production of knowledge. This necessitated the adoption of ethnographic and participatory research methodologies. Humanistic geography, rather than trying to erase the influence of the subject in the creation of knowledge, recognized subjectivity as part of the research process, even viewing the subject of the researcher as a tool in the research process. Scholars sought to insert themselves into the outcomes of their work. Rather than using the detached scientific writing of positivism, postpositivistic writers: abandoned the passive voice and located agency; wrote in the first person; provided extended quotations from research participants; and experimented with literary devices drawn from the arts.</span></p><p data-dcnode-id="384" id="B9780081022955108698-p9005"><span data-dcnode-id="388" instrument_node="">The recovery of subjectivity also had political motivations to restore subaltern knowledge that had been hidden from bourgeois history and geography. Marxist and radical theorists were critical of the implicit support by social science of </span><span class="topic-highlight" data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">state capitalism</span></span><span data-dcnode-id="385" instrument_node="">, pointing instead to the need to construct alternative working-class histories and geographies. Such approaches still often presented an objective knowledge, but one where objectivity was grounded in the class position of the subject.</span></p><p data-dcnode-id="382" id="B9780081022955108698-p9010"><span data-dcnode-id="383" instrument_node="">Feminists argued that there is more than one subject of knowledge. Women have been excluded because of the masculinism of Enlightenment knowledge privileging objectivity over subjectivity and dismissing women as incapable of true reason. Some feminists challenged this distinction as being based in untenable stereotypes; others accepted the binary distinction but inverted the values, arguing that there always already existed specifically women's ways of knowing that were based on distinctive “feminine” characteristics (collaboration, empathy, and intersubjective understanding). This latter position insisted that women were incapable of objectivity due to their embeddedness within networks of care and dependence. This challenged the binary division of subject and object and highlighted the necessity of ontological and methodological subjectivity but was open to critique for accepting the binary distinction of essentially masculine and feminine characteristics.</span></p><p data-dcnode-id="380" id="B9780081022955108698-p9015"><span data-dcnode-id="381" instrument_node="">This celebration of the duality of knowledge sometimes suggested that the subaltern view was more objective. Dominant views were supported by power structures within society (whether based on class, race, or patriarchal power), and so such views would lack critical rigor. On the other hand, subaltern views could see how power worked, and their views would be free of the ideological distortions of social power and therefore more objective. Others were wary of romanticizing the subaltern. From views that recognized the entangled and pervasive nature of power relations, there could never be a simple binary of dominant–subaltern. Class, race, gender, sexuality, and other social identities would be cross-cutting. The rise of interest in identity politics based on these aspects of cultural identity offered a model of subjectivity that went against simple binary models. This caused some Marxist and feminist theorists to fear a concomitant loss of political efficacy.</span></p><p data-dcnode-id="378" id="B9780081022955108698-p9020"><span data-dcnode-id="379" instrument_node="">Various attempts have been made to produce situated knowledge, arguing for the veracity (and, sometimes, even objectivity) of knowledge—but only from one perspective (rather than being totalizing). These partial perspectives (including approaches such as feminist standpoint theory and situated knowledge) sought to avoid the relativism that might arise from suggesting that all views were necessarily incomplete by arguing for the situated and partial nature of all knowledge.</span></p><p data-dcnode-id="376" id="B9780081022955108698-p9025"><span data-dcnode-id="377" instrument_node="">Postcolonial theory has further complicated attempts to recover subaltern subjectivity. The notion of hybridity is central to postcolonialism, challenging any effort to divide knowledge into discrete categories. Such a viewpoint clearly challenges any notion of a distinct subject and object. However, postcolonial critics are attuned to the power relations involved in how this intersubjectivity operates. Most prominently, Gayatri Spivak has examined the ways in which the voice and knowledge of the subaltern have been heard by those who are dominant. Even when apparently expressing their own views, however, the subaltern cannot speak; this is because they must use the words, phrases, and cadences of Western thought in order for it to be heard. In order to be taken seriously—to be seen as knowledge and not opinion or folklore—the knowledge of the subaltern is to be translated into the language of science, development, or philosophy, and as such is to be dominated by Western concepts and Western languages. Thus, the subaltern must always be caught in translation, never truly expressing themself, but always already interpreted through Western ways of knowing. Decolonial approaches have sought to challenge the ways in which geography (and other disciplines) have excluded certain racialised bodies from knowledge production.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="366"><a aria-describedby="tp-snippet-chp-title-B9780081022955108698" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780081022955108698" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780081022962" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="359"><a class="read-full-chapter-print" data-dcnode-id="364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780081022955108698" rel="noopener" target="_blank"><span data-dcnode-id="365" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="360"><span data-dcnode-id="363" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="361" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9780081022955108698</span></div></div></article><article class="snippet column" data-dcnode-id="271" style="padding-right: 0px; padding-left: 40px; float: right;"><div class="snippet-content" data-dcnode-id="286"><h2 class="u-font-serif u-text-light" data-dcnode-id="354" id="tp-snippet-chp-title-B9780081020593000150"><a class="anchor" data-aa-name="Vancouver Youthspaces" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780081020593000150"><span class="anchor-text" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Vancouver Youthspaces</span></span></a></h2><div class="size-l" data-dcnode-id="287"><cite data-dcnode-id="340"><p data-dcnode-id="341"><span data-dcnode-id="346"><span data-dcnode-id="353" instrument_node="">Stuart R. </span><span data-dcnode-id="351" instrument_node="">Poyntz</span><span data-dcnode-id="349" instrument_node="">, in</span><span data-dcnode-id="347" instrument_node=""> </span></span><a class="anchor" data-aa-name="Digital Participation through Social Living Labs" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/book/9780081020593/digital-participation-through-social-living-labs"><span class="anchor-text" data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Digital Participation through Social Living Labs</span></span></a><span data-dcnode-id="342" instrument_node="">, 2018</span></p></cite><section data-dcnode-id="288" id="B9780081020593000150-s0015"><h3 data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">A Precarious Incubator of Creative Expression</span></h3><p data-dcnode-id="327" id="B9780081020593000150-p0060"><span data-dcnode-id="337" instrument_node="">Against this backdrop, a sense of vulnerability and precariousness remain structural features of digital media learning in Vancouver. Capturing this dimension of the political economy of the sector is complicated by the fact that the structures of cultural sectors in Canada can be difficult to see. </span><span data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Murray (2005)</span></span><span data-dcnode-id="334" instrument_node=""> tells us that conflicting policy paradigms across the cultural field mean that the boundaries of any one cultural sector are rarely clear. They intersect and blur and in general make for an ambiguous object of analysis. </span><span data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Bellavance (2011)</span></span><span data-dcnode-id="331" instrument_node=""> notes further that visual and media arts are often addressed as part of various sectors, including education and economic development, meaning the impact of media learning communities can be unclear across jurisdictions. Added to this, the broader context of neoliberalism confounds our work. Neoliberal policy orientations tend to focus attention on the role of innovation and individual entrepreneurial leadership over and above the setting or structural conditions where these practices emerge. This is a function of the narrow lens neoliberalism casts over social life. By prioritizing markets, individual actors and business models of development, neoliberalism obscures the social life of communities, blurring the structural forces and drivers shaping spaces of social living like youth media communities even as non-governmental organizations and struggles within civil society have grown in significance in a neoliberal era (</span><span data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Harvey, 2005</span></span><span data-dcnode-id="328" instrument_node="">).</span></p><p data-dcnode-id="310" id="B9780081020593000150-p0070"><span data-dcnode-id="326" instrument_node="">In response, in what follows, I build on research from the YDME project and work with a concept of neoliberal governmentality to situate the structural conditions undergirding youth media in Canada’s third </span><span data-dcnode-id="325" id="B9780081020593000150-p283"></span><span data-dcnode-id="320"><span data-dcnode-id="324" instrument_node="">largest city. As is widely known, neoliberalism is associated with a shift and sometimes a contraction in the role of the state in social relations as compared to the era of Keynesian welfare </span><span class="topic-highlight" data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">state capitalism</span></span><span data-dcnode-id="321" instrument_node=""> that preceded the contemporary period. By privileging private life over public accommodation, everyday life has increasingly been recruited for market activity and regulation for socially sanctioned ends. In the process, neoliberalism has emerged as a system of governance that operates through a governing rationality of ‘regulated choices’ for individual citizens (</span></span><span data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Rose, 1993</span></span><span data-dcnode-id="317" instrument_node="">, p. 285). Neoliberal subjects are expected to become self-governing in ways that support and extend the interests of the state. An increasing sense of individuation and self-reliance thus come to be hallmarks of neoliberal governance, and institutions that exist at arms-length from the state, including youth media groups, become key players in the development of ‘individuals who do not need to be governed by others, but will govern themselves, master themselves, care for themselves’ (</span><span data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Rose, 1993</span></span><span data-dcnode-id="314" instrument_node="">, p. 285). The resulting social imaginary prioritizes the interests of markets and economics over public life, with the consequence that matters of public concern are increasingly come to be subsumed by a governing rationality of individualism, entrepreneurialism and social enterprise (</span><span data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Brown, 2015; Hertz, 2001</span></span><span data-dcnode-id="311" instrument_node="">).</span></p><p data-dcnode-id="294" id="B9780081020593000150-p0075"><span data-dcnode-id="309" instrument_node="">In Vancouver, a neoliberal governing rationality began to take hold following a period of significant economic, social and political upheaval in the 1980s. In the aftermath of a brutal commodity recession in the early 1980s, Vancouver’s cultural and economic orientation turned outwards, shifting from a focus on regional resource development and economic services, to a focus on global networks linked to international migration, foreign direct investment in Vancouver’s property market, new opportunities for technology and information-led growth, and the development of international global fairs (including Expo ’86). In the 1990s, Vancouver’s global embrace led to increased migration, the development of new employment clusters, the expansion of centres of higher education and the rezoning of the inner city to support the development of new media industries (</span><span data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Murray &amp; Hutton, 2012</span></span><span data-dcnode-id="306" instrument_node="">). Much of this work took place under the auspices of the </span><span data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">City Planning Department (1991)</span></span><span data-dcnode-id="303" instrument_node="">, the most important strategic policy initiative in the postwar era in Vancouver. By the 2000s a distinct and pervasive knowledge-intensive orientation came to dominate economic development alongside real estate and ‘the growing ascendancy of creative industries and of information-based, contract-intensive industries’ (</span><span data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Murray &amp; Hutton, 2012</span></span><span data-dcnode-id="300" instrument_node="">, p. 313). From </span><span data-dcnode-id="299" id="B9780081020593000150-p284"></span><span data-dcnode-id="298" instrument_node="">2010 onwards, an identifiable cultural economy emerged organized around new sites of media and information production, opportunities for spectacle (including the 2010 Winter Olympics), and new housing options in the downtown core, following a road map of neoliberal development common in cities around the world (i.e., London, Toronto, Brisbane and San Francisco) (</span><span data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Murray &amp; Hutton, 2012</span></span><span data-dcnode-id="295" instrument_node="">, p. 313).</span></p><p data-dcnode-id="289" id="B9780081020593000150-p0080"><span data-dcnode-id="293" instrument_node="">The digital learning community in Vancouver emerged in this context and would be fueled by a broad interest in information and digital literacy training in formal schooling (</span><span data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Goldfarb, 2002; Poyntz, 2008</span></span><span data-dcnode-id="290" instrumen
