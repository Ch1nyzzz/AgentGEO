t_node="">). The call to learn and equip oneself with digital media skills has been linked to the development of information societies and the resourcing of creative industries to develop a globally competitive work force. Alongside these forces, however, new funding structures, an emphasis on social enterprise, new labour practices and audit cultures have combined to shape the growth of digital learning in Vancouver. Drawing on anonymized interviews with youth media program directors and key policy shifts, I address these drivers in turn, link them with the emergence of neoliberal governance, and conclude by speculating on how they impact the role of community media learning in shaping social stratification and opportunity for youth.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="279"><a aria-describedby="tp-snippet-chp-title-B9780081020593000150" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780081020593000150" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780081020593" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="272"><a class="read-full-chapter-print" data-dcnode-id="277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780081020593000150" rel="noopener" target="_blank"><span data-dcnode-id="278" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="273"><span data-dcnode-id="276" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="274" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9780081020593000150</span></div></div></article><article class="snippet column" data-dcnode-id="218" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="233"><h2 class="u-font-serif u-text-light" data-dcnode-id="267" id="tp-snippet-chp-title-B9780081022955100757"><a class="anchor" data-aa-name="Governance, Corporate" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780081022955100757"><span class="anchor-text" data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Governance, Corporate</span></span></a></h2><div class="size-l" data-dcnode-id="234"><cite data-dcnode-id="253"><p data-dcnode-id="254"><span data-dcnode-id="259"><span data-dcnode-id="266" instrument_node="">Dariusz </span><span data-dcnode-id="264" instrument_node="">Wójcik</span><span data-dcnode-id="262" instrument_node="">, in</span><span data-dcnode-id="260" instrument_node=""> </span></span><a class="anchor" data-aa-name="International Encyclopedia of Human Geography (Second Edition)" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/referencework/9780081022962/international-encyclopedia-of-human-geography"><span class="anchor-text" data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">International Encyclopedia of Human Geography (Second Edition)</span></span></a><span data-dcnode-id="255" instrument_node="">, 2009</span></p></cite><section data-dcnode-id="235" id="B9780081022955100757-s0015"><h3 data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">The Context of Contemporary Corporate Governance Debate</span></h3><p data-dcnode-id="249" id="B9780081022955100757-p0080"><span data-dcnode-id="250" instrument_node="">A number of developments contributed to the rise of corporate governance policy, research, and media debate in 1990s and early 2000s.</span></p><p data-dcnode-id="247" id="B9780081022955100757-p0085"><span data-dcnode-id="248" instrument_node="">The privatizations of public assets, starting in the United Kingdom in 1980s and later unfolding in Western Europe, Asia, Latin America, and the former Soviet block, could be seen as an experiment in corporate governance on a mass scale, opening up questions of who the owners of companies should be and how they should relate to other stakeholders. In some cases it was seen as desirable to find large strategic investors for the newly privatized companies. In other cases, the preferred option was to sell shares to thousands of small investors on public stock markets. Both routes encountered problems and failures. Some companies were sold at low prices to strategic investors that turned out to be controlled by former managements, leaving nobody able to undertake the painful process of restructuring the company. In other companies managements were able to exploit the inability of small investors to act collectively. In addition to highlighting difficulties in establishing appropriate ownership and control structures in companies, privatizations also contributed to the creation of a large class of small shareholders – millions of individuals relying on the corporate sector as a source of investment income.</span></p><p data-dcnode-id="242" id="B9780081022955100757-p0090"><span data-dcnode-id="246" instrument_node="">Another event that fueled the debate was the economic turmoil in East Asia, led by speculation in 1997 against the Thai and Malaysian currencies. For some, this was caused by the flaws of international financial markets, including harmful speculation and the lack of coordination between foreign investors withdrawing their money from East Asia. For others, a major reason behind the crisis was the failure of the East Asian corporate sectors to create shareholder value. A spectacular version of the latter view appeared in the Western financial press under the heading “crony </span><span class="topic-highlight" data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">state capitalism</span></span><span data-dcnode-id="243" instrument_node="">”—a phrase that invokes the existence of strong and often-hidden reciprocal relationships among industry leaders, their government patrons, and complicit bankers aimed at circumventing market mechanisms. Later events, however, demonstrated that the United States and Western Europe are not immune to severe corporate governance problems. In 2001, one of the largest US companies, Enron, until then considered a model of corporate governance, admitted to fraudulent activity by concealing gigantic losses and went bankrupt bringing demise also to their fraud-assisting auditors Arthur Andersen. In 2003, the Dutch corporation Ahold, the third largest food retailer in the world, also announced huge previously concealed losses and found themselves on the verge of bankruptcy. During the periods preceding fraud detection, in both Enron and Ahold top managers' and directors' salaries were spiraling upward.</span></p><p data-dcnode-id="240" id="B9780081022955100757-p0095"><span data-dcnode-id="241" instrument_node="">Corporate governance problems around the world have necessitated responses by national governments and international organizations. In the United States, the Sarbanes-Oxley Act of 2002 has introduced stricter requirements with regard to corporate accounting, internal control systems, directors' responsibilities, and investor protection. At the international level the most influential initiative was the 1999 publication of Principles of Corporate Governance by the Organization for Economic Co-operation and Development (OECD), promoting the protection and equitable treatment of shareholders, responsible boards of directors, timely and accurate disclosure, and recognition of the rights of other stakeholders. Both the Sarbanes–Oxley Act and the OECD Principles have influenced the development of corporate governance codes and standards in many countries. The interest of national governments and international economic organizations in corporate governance can be seen as a part of a shift from national and international economic coordination by monetary and fiscal policy, to a greater emphasis on institutional development, including the rule of law. By undermining investors' confidence, corporate governance problems can unsettle the financial systems of whole countries.</span></p><p data-dcnode-id="238" id="B9780081022955100757-p0100"><span data-dcnode-id="239" instrument_node="">Another set of interests shaping the development of corporate governance has been institutional portfolio investors, mainly pension funds, mutual funds, and insurance companies, which gained prominence in international finance in the 1990s largely as a result of a shift from pay-as-you-go to funded pension systems. This began in high-income countries but has spread to the rest of the world. These investors are large, but aim to hold highly diversified portfolios, so that their individual investments typically do not exceed several percent of any company's equity. Institutional portfolio investors are therefore corporate outsiders, but larger and more powerful than individual shareholders. Those skeptical of the positive influence of institutional portfolio investors argue that, managing other people's money, they struggle with their own internal governance problems, and may collude with corporate managers at the expense of small shareholders and other stakeholders. On the other hand, they have demonstrated a growing interest in the corporate governance of companies and even whole countries, and have thus sustained private sector corporate governance services.</span></p><p data-dcnode-id="236" id="B9780081022955100757-p0105"><span data-dcnode-id="237" instrument_node="">Such services range from legal assistance for shareholders trying to influence corporate decision making or intending to sue a company for governance misconduct; through advice to companies on investor relations or on the design of internal control procedures and systems; to corporate governance ratings, whereby individual companies are rated according to standards of good governance. They include law firms, management consulting companies, large accountancy firms, credit rating agencies, as well as specialized corporate governance service providers. In addition, stock exchanges have responded to the prominence of corporate governance debate by creating stock market indices based on the stock prices of companies that satisfy certain standards of corporate governance. This gives qualifying companies additional visibility in the market, and promotes the stock market as a place for trustworthy investment by individual and institutional investors. In summary, there is a growing market for corporate governance services and standards, as corporate governance is seen as an important source of risk by investors and a significant risk category for managers trying to attract external finance.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="226"><a aria-describedby="tp-snippet-chp-title-B9780081022955100757" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780081022955100757" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780081022962" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="219"><a class="read-full-chapter-print" data-dcnode-id="224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780081022955100757" rel="noopener" target="_blank"><span data-dcnode-id="225" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="220"><span data-dcnode-id="223" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="221" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9780081022955100757</span></div></div></article><article class="snippet column" data-dcnode-id="161" style="padding-right: 0px; padding-left: 40px; float: right;"><div class="snippet-content" data-dcnode-id="176"><h2 class="u-font-serif u-text-light" data-dcnode-id="214" id="tp-snippet-chp-title-B9780080449104005435"><a class="anchor" data-aa-name="Subjectivity" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780080449104005435"><span class="anchor-text" data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">Subjectivity</span></span></a></h2><div class="size-l" data-dcnode-id="177"><cite data-dcnode-id="200"><p data-dcnode-id="201"><span data-dcnode-id="206"><span data-dcnode-id="213" instrument_node="">J.P. </span><span data-dcnode-id="211" instrument_node="">Sharp</span><span data-dcnode-id="209" instrument_node="">, in</span><span data-dcnode-id="207" instrument_node=""> </span></span><a class="anchor" data-aa-name="International Encyclopedia of Human Geography" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/referencework/9780080449104/international-encyclopedia-of-human-geography"><span class="anchor-text" data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">International Encyclopedia of Human Geography</span></span></a><span data-dcnode-id="202" instrument_node="">, 2009</span></p></cite><section data-dcnode-id="178" id="B9780080449104005435-s0015"><h3 data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">Subjective Knowledge</span></h3><p data-dcnode-id="196" id="B9780080449104005435-p0035"><span data-dcnode-id="197" instrument_node="">However, in the last 30 or 40 years, the scientific method has faced serious challenge, in geography and elsewhere. The rise of humanistic geography sought to foreground the human experience of place over the analysis of spatial form and thus could not be objective. This put human experience and understanding of the world at the center of geography. Such an approach negated the possibility of objectivity, replacing scientific methods of analysis and prediction with one based around interpretation (hermeneutics), empathy, and understanding.</span></p><p data-dcnode-id="194" id="B9780080449104005435-p0040"><span data-dcnode-id="195" instrument_node="">In addition to drawing the human as the subject of geography, humanists also turned to examine the subjectivity of the geographer. Humanistic geography's emphasis on interpretation and intersubjectivity meant that the researcher could not be seen as standing outside the research process but instead the researcher had to acknowledge her or his role in the process of interpretation and the production of knowledge. This necessitated the adoption of ethnographic and participatory research methodologies. Rather than trying to erase the influence of the subject in the creation of knowledge, humanistic geography recognized subjectivity as part of the research process, even viewing the subject of the researcher as a tool in the research process. Scholars sought to insert themselves into the outcomes of their work. Rather than using the detached scientific writing of positivism, post-positivistic writers abandoned the passive voice and located agency, wrote in the first person, offered extended quotation from research participants, and experimented with literary devices drawn from the arts.</span></p><p data-dcnode-id="189" id="B9780080449104005435-p0045"><span data-dcnode-id="193" instrument_node="">The recovery of subjectivity also had more political motivations to restore subaltern knowledges that had been hidden from bourgeois history and geography. Marxist and radical theorists are critical of the implicit support by social science of </span><span class="topic-highlight" data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">state capitalism</span></span><span data-dcnode-id="190" instrument_node="">, pointing instead to the need to construct alternative working-class histories and geographies. Such approaches still often presented an objective knowledge, but one where objectivity was grounded in the class position of the subject.</span></p><p data-dcnode-id="187" id="B9780080449104005435-p0050"><span data-dcnode-id="188" instrument_node="">Feminists argued that there is more than one subject of knowledge. Women have been excluded because of the masculinism of Enlightenment knowledge privileging objectivity over subjectivity, and dismissing women as incapable of true reason. While some feminists challenged this distinction as being based in untenable stereotypes, others accepted the binary distinction but inverted the values, arguing that there exist specifically women's ways of knowing that were based on distinctive ‘feminine’ characteristics (collaboration, empathy, and intersubjective understanding). This latter position insisted that women were incapable of objectivity due to their embeddedness within networks of care and dependence. This challenged the binary division of subject and object and highlighted the necessity of ontological and methodological subjectivity, but was often critiqued for accepting the binary distinction of essentially masculine and feminine characteristics.</span></p><p data-dcnode-id="185" id="B9780080449104005435-p0055"><span data-dcnode-id="186" instrument_node="">This celebration of the duality of knowledge sometimes suggested that the subaltern view was more objective. Dominant views were supported by power structures within society (whether based around class, race or patriarchal power) and so such views would lack critical rigor. On the other hand, subaltern views could see how power worked and their views would be free of the ideological distortions of social power and therefore more objective. Others were wary of romanticizing the subaltern. From views that recognized the entangled and pervasive nature of power relations, there could never be a simple binary of dominant–subaltern. Class, race, gender, sexuality, and other social identities would be cross-cutting. The rise of interest in identity politics based around these aspects of cultural identity offered a model of subjectivity that went against simple binary models, causing some Marxist and feminist theorists to fear a concomitant loss of political efficacy.</span></p><p data-dcnode-id="183" id="B9780080449104005435-p0060"><span data-dcnode-id="184" instrument_node="">Various attempts have been made to produce situated knowledges, arguing for the veracity (and, sometimes, even objectivity) of knowledge but only from one perspective (rather than being totalizing). These partial perspectives (including approaches such as feminist standpoint theory and situated knowledge) sought to avoid the relativism that might arise from suggesting that all views were necessarily incomplete by arguing for the situated and partial nature of all knowledge.</span></p><p data-dcnode-id="181" id="B9780080449104005435-p0065"><span data-dcnode-id="182" instrument_node="">Postcolonial theory makes attempts to recover subaltern subjectivity more complex still. The notion of hybridity is central to postcolonialism, challenging any attempt to divide up knowledge into discrete categories. Such a viewpoint clearly challenges any notion of a distinct subject and object. However, postcolonial critics are attuned to the power relations involved in how this intersubjectivity operates. Most prominently, Gayatri Spivak has examined the ways in which the voice and knowledge of the subaltern has been heard by those who are dominant. Even when apparently expressing their own views however, the subaltern cannot speak, because she/he must use the words, phrases, and cadences of Western thought in order for it to be heard. In order to be taken seriously – to be seen as knowledge and not opinion or folklore – the knowledge of the subaltern is to be translated into the language of science, development, or philosophy, dominated by Western concepts and Western languages. Thus, the subaltern must always be caught in translation, never truly expressing her/himself, but always already interpreted.</span></p><p data-dcnode-id="179" id="B9780080449104005435-p0070"><span data-dcnode-id="180" instrument_node="">This recognition of the influence of subjectivity in academic work required the adoption of methods which recognized how the positionality of the author would inevitably effect the research from the initial conceptualization of the project (and the motivations behind this), through the response of the research participants to the researcher, methods in which information is analyzed, to what is done with the research outputs. Various strategies have been adopted, to varying degrees of success, to foreground this process, including writing the author into the research narrative, collaboration with research participants in terms of formulating, conducting and disseminating the research, and various writing strategies to emphasize the partial nature of the representation.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="169"><a aria-describedby="tp-snippet-chp-title-B9780080449104005435" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780080449104005435" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780080449104" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="162"><a class="read-full-chapter-print" data-dcnode-id="167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780080449104005435" rel="noopener" target="_blank"><span data-dcnode-id="168" instrument_node="">Read full chapter</span></a><div class="chapter-ur
