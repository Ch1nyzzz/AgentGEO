-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Italy" title="Italy"><span data-dcnode-id="3208" instrument_node="">Italy</span></a><span data-dcnode-id="3206" instrument_node=""> were seen as a result of high national per-capita income, although U.S. protection was seen as a key to stabilization and important for encouraging the transition to democracy. Steven Krasner agreed that there was a link between wealth and democracy; when per-capita incomes of $6,000 were achieved in a democracy, there was little chance of that country ever reverting to an </span><a data-dcnode-id="3204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autocracy" title="Autocracy"><span data-dcnode-id="3205" instrument_node="">autocracy</span></a><span data-dcnode-id="3203" instrument_node="">, according to an analysis of his research in the </span><i data-dcnode-id="3200"><a data-dcnode-id="3201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Los_Angeles_Times" title="Los Angeles Times"><span data-dcnode-id="3202" instrument_node="">Los Angeles Times</span></a></i><span data-dcnode-id="3199" instrument_node="">.</span><sup class="reference" data-dcnode-id="3196" id="cite_ref-LA2_66-0"><a data-dcnode-id="3197" href="#cite_note-LA2-66"><span data-dcnode-id="3198" instrument_node="">[66]</span></a></sup><span data-dcnode-id="3195" instrument_node="">
</span></p><span data-dcnode-id="3193" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3179"><div class="thumbinner" data-dcnode-id="3180" style="width:222px;"><a class="image" data-dcnode-id="3191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUS_Army_Rangers_parachute_into_Grenada_during_Operation_Urgent_Fury.jpg"><img alt="" class="thumbimage" data-dcnode-id="3192" data-file-height="459" data-file-width="598" decoding="async" height="169" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/14/US_Army_Rangers_parachute_into_Grenada_during_Operation_Urgent_Fury.jpg/220px-US_Army_Rangers_parachute_into_Grenada_during_Operation_Urgent_Fury.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/14/US_Army_Rangers_parachute_into_Grenada_during_Operation_Urgent_Fury.jpg/330px-US_Army_Rangers_parachute_into_Grenada_during_Operation_Urgent_Fury.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/14/US_Army_Rangers_parachute_into_Grenada_during_Operation_Urgent_Fury.jpg/440px-US_Army_Rangers_parachute_into_Grenada_during_Operation_Urgent_Fury.jpg 2x" width="220"></a><span data-dcnode-id="3190" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3181"><div class="magnify" data-dcnode-id="3188"><a class="internal" data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUS_Army_Rangers_parachute_into_Grenada_during_Operation_Urgent_Fury.jpg" title="Enlarge"></a></div><a class="mw-redirect" data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._Army_Rangers" title="U.S. Army Rangers"><span data-dcnode-id="3187" instrument_node="">U.S. Army Rangers</span></a><span data-dcnode-id="3185" instrument_node=""> during the </span><a data-dcnode-id="3183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_invasion_of_Grenada" title="United States invasion of Grenada"><span data-dcnode-id="3184" instrument_node="">1983 invasion of Grenada</span></a><span data-dcnode-id="3182" instrument_node="">. The invasion established an interim government and democratic elections were held in 1984.</span></div></div></div><span data-dcnode-id="3178" instrument_node="">
</span><h3 data-dcnode-id="3168"><span class="mw-headline" data-dcnode-id="3176" id="Opinion_that_U.S._intervention_has_mixed_results"><span data-dcnode-id="3177" instrument_node="">Opinion that U.S. intervention has mixed results</span></span><span class="mw-editsection" data-dcnode-id="3169"><span class="mw-editsection-bracket" data-dcnode-id="3174"><span data-dcnode-id="3175" instrument_node="">[</span></span><a data-dcnode-id="3172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D15" title="Edit section: Opinion that U.S. intervention has mixed results"><span data-dcnode-id="3173" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3167" instrument_node="">
</span><p data-dcnode-id="3158"><span data-dcnode-id="3166" instrument_node="">Tures examined 228 cases of American intervention from 1973 to 2005, using </span><a data-dcnode-id="3164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_House" title="Freedom House"><span data-dcnode-id="3165" instrument_node="">Freedom House</span></a><span data-dcnode-id="3163" instrument_node=""> data. A plurality of interventions, 96, caused no change in the country's democracy. In 69 instances, the country became less democratic after the intervention. In the remaining 63 cases, a country became more democratic.</span><sup class="reference" data-dcnode-id="3160" id="cite_ref-operation_53-2"><a data-dcnode-id="3161" href="#cite_note-operation-53"><span data-dcnode-id="3162" instrument_node="">[53]</span></a></sup><span data-dcnode-id="3159" instrument_node=""> However this does not take into account the direction the country would have gone with no U.S. intervention.
</span></p><span data-dcnode-id="3157" instrument_node="">
</span><h3 data-dcnode-id="3147"><span class="mw-headline" data-dcnode-id="3155" id="Opinion_that_U.S._intervention_effectively_exports_democracy"><span data-dcnode-id="3156" instrument_node="">Opinion that U.S. intervention effectively exports democracy</span></span><span class="mw-editsection" data-dcnode-id="3148"><span class="mw-editsection-bracket" data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">[</span></span><a data-dcnode-id="3151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D16" title="Edit section: Opinion that U.S. intervention effectively exports democracy"><span data-dcnode-id="3152" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3146" instrument_node="">
</span><p data-dcnode-id="3127"><span data-dcnode-id="3145" instrument_node="">Hermann and Kegley said American military interventions designed to protect or promote democracy increased freedom in those countries, however Peceny argued that the democracies created after military intervention are still closer to an </span><a data-dcnode-id="3143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Autocracy" title="Autocracy"><span data-dcnode-id="3144" instrument_node="">autocracy</span></a><span data-dcnode-id="3142" instrument_node=""> than a </span><a data-dcnode-id="3140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy" title="Democracy"><span data-dcnode-id="3141" instrument_node="">democracy</span></a><span data-dcnode-id="3139" instrument_node="">, quoting Przeworski "while some democracies are more democratic than others, unless offices are contested, no regime should be considered democratic."</span><sup class="reference" data-dcnode-id="3136" id="cite_ref-promote_56-1"><a data-dcnode-id="3137" href="#cite_note-promote-56"><span data-dcnode-id="3138" instrument_node="">[56]</span></a></sup><sup class="reference" data-dcnode-id="3133" id="cite_ref-67"><a data-dcnode-id="3134" href="#cite_note-67"><span data-dcnode-id="3135" instrument_node="">[67]</span></a></sup><span data-dcnode-id="3132" instrument_node=""> Therefore, Peceny concludes, it is difficult to know from the Hermann and Kegley study whether U.S. intervention has only produced less repressive autocratic governments.</span><sup class="reference" data-dcnode-id="3129" id="cite_ref-68"><a data-dcnode-id="3130" href="#cite_note-68"><span data-dcnode-id="3131" instrument_node="">[68]</span></a></sup><span data-dcnode-id="3128" instrument_node="">
</span></p><p data-dcnode-id="3121"><span data-dcnode-id="3126" instrument_node="">Peceny stated that the United States attempted to export democracy in 33 of its 93 20th-century military interventions.</span><sup class="reference" data-dcnode-id="3123" id="cite_ref-mark6_69-0"><a data-dcnode-id="3124" href="#cite_note-mark6-69"><span data-dcnode-id="3125" instrument_node="">[69]</span></a></sup><span data-dcnode-id="3122" instrument_node="">
</span></p><span data-dcnode-id="3120" instrument_node="">
</span><h2 data-dcnode-id="3110"><span class="mw-headline" data-dcnode-id="3118" id="American_DG_priorities"><span data-dcnode-id="3119" instrument_node="">American DG priorities</span></span><span class="mw-editsection" data-dcnode-id="3111"><span class="mw-editsection-bracket" data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">[</span></span><a data-dcnode-id="3114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D17" title="Edit section: American DG priorities"><span data-dcnode-id="3115" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3109" instrument_node="">
</span><p data-dcnode-id="3086"><span data-dcnode-id="3108" instrument_node="">American democracy promotion priorities are outlined in specific terms by U.S. government bodies tasked with funding projects, as well as government-established, private granting institutions. Among these are </span><a class="mw-redirect" data-dcnode-id="3106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/USAID" title="USAID"><span data-dcnode-id="3107" instrument_node="">USAID</span></a><span data-dcnode-id="3105" instrument_node="">,</span><sup class="reference" data-dcnode-id="3102" id="cite_ref-autogenerated1_15-1"><a data-dcnode-id="3103" href="#cite_note-autogenerated1-15"><span data-dcnode-id="3104" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3101" instrument_node=""> the Department of State </span><a data-dcnode-id="3099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_East_Partnership_Initiative" title="Middle East Partnership Initiative"><span data-dcnode-id="3100" instrument_node="">Middle East Partnership Initiative</span></a><span data-dcnode-id="3098" instrument_node=""> (MEPI),</span><sup class="reference" data-dcnode-id="3095" id="cite_ref-70"><a data-dcnode-id="3096" href="#cite_note-70"><span data-dcnode-id="3097" instrument_node="">[70]</span></a></sup><span data-dcnode-id="3094" instrument_node=""> and the </span><a data-dcnode-id="3092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Endowment_for_Democracy" title="National Endowment for Democracy"><span data-dcnode-id="3093" instrument_node="">National Endowment for Democracy</span></a><span data-dcnode-id="3091" instrument_node=""> (NED).</span><sup class="reference" data-dcnode-id="3088" id="cite_ref-71"><a data-dcnode-id="3089" href="#cite_note-71"><span data-dcnode-id="3090" instrument_node="">[71]</span></a></sup><span data-dcnod </span></p><p data-dcnode-id="2760"><span data-dcnode-id="2768" instrument_node="">In 2017, </span><a data-dcnode-id="2766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Economist" title="The Economist"><span data-dcnode-id="2767" instrument_node="">The Economist</span></a><span data-dcnode-id="2765" instrument_node=""> reported that the Near East Regional Democracy programme had allocated about $30 million per year for promoting democracy and human rights in Iran.</span><sup class="reference" data-dcnode-id="2762" id="cite_ref-economist-20171116_73-0"><a data-dcnode-id="2763" href="#cite_note-economist-20171116-73"><span data-dcnode-id="2764" instrument_node="">[73]</span></a></sup><span data-dcnode-id="2761" instrument_node="">

</span></p><span data-dcnode-id="2745" instrument_node="">
</span><h3 data-dcnode-id="2735"><span class="mw-headline" data-dcnode-id="2743" id="Effectiveness"><span data-dcnode-id="2744" instrument_node="">Effectiveness</span></span><span class="mw-editsection" data-dcnode-id="2736"><span class="mw-editsection-bracket" data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">[</span></span><a data-dcnode-id="2739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D29" title="Edit section: Effectiveness"><span data-dcnode-id="2740" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2734" instrument_node="">
</span><p data-dcnode-id="2709"><span data-dcnode-id="2733" instrument_node="">Critical perspectives on U.S. democracy promotion often stress that praise heaped on projects funded by the American government tends to be exaggerated.</span><sup class="reference" data-dcnode-id="2730" id="cite_ref-74"><a data-dcnode-id="2731" href="#cite_note-74"><span data-dcnode-id="2732" instrument_node="">[74]</span></a></sup><span data-dcnode-id="2729" instrument_node=""> This criticism is rooted in democracy and governance indicators that show illiberalism in the Arab world has actually increased in some cases, due in part to short-term stability considerations that trump top-down democracy promotion and the failure of bottom-up projects to address the ability of Arab regimes to act as "veto-players".</span><sup class="reference" data-dcnode-id="2726" id="cite_ref-75"><a data-dcnode-id="2727" href="#cite_note-75"><span data-dcnode-id="2728" instrument_node="">[75]</span></a></sup><span data-dcnode-id="2725" instrument_node=""> Although American democracy promotion efforts in the MENA region take a more balanced top-down/bottom-up strategy than those of the </span><a data-dcnode-id="2723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="2724" instrument_node="">European Union</span></a><span data-dcnode-id="2722" instrument_node=""> and engage in more politically sensitive areas such as state institution building,</span><sup class="reference" data-dcnode-id="2719" id="cite_ref-76"><a data-dcnode-id="2720" href="#cite_note-76"><span data-dcnode-id="2721" instrument_node="">[76]</span></a></sup><span data-dcnode-id="2718" instrument_node=""> some question the assumption that pushing for liberalizing reforms is a worthwhile endeavor given that regimes can easily de-liberalize and reforms are often cosmetic and do not alter the real balance of effective governing power.</span><sup class="reference" data-dcnode-id="2715" id="cite_ref-77"><a data-dcnode-id="2716" href="#cite_note-77"><span data-dcnode-id="2717" instrument_node="">[77]</span></a></sup><span data-dcnode-id="2714" instrument_node="">  Furthermore, promoting DG in the MENA region operating on the assumption that proper counsel and expert advice can guide a government to reform ignores the possibility that regimes are not necessarily "neutral apparatus representing public interests" and may be resistant to relinquishing power.</span><sup class="reference" data-dcnode-id="2711" id="cite_ref-78"><a data-dcnode-id="2712" href="#cite_note-78"><span data-dcnode-id="2713" instrument_node="">[78]</span></a></sup><span data-dcnode-id="2710" instrument_node="">
</span></p><p data-dcnode-id="2695"><span data-dcnode-id="2708" instrument_node="">The more serious criticism of American DG work in the region is that it can lead to more harm than good. "Dishonest" democratization involving superficial political liberalization can serve as a facade for continued authoritarianism and repression of civil society,</span><sup class="reference" data-dcnode-id="2705" id="cite_ref-79"><a data-dcnode-id="2706" href="#cite_note-79"><span data-dcnode-id="2707" instrument_node="">[79]</span></a></sup><span data-dcnode-id="2704" instrument_node=""> and even help reinforce and stabilize autocratic regimes.</span><sup class="reference" data-dcnode-id="2701" id="cite_ref-80"><a data-dcnode-id="2702" href="#cite_note-80"><span data-dcnode-id="2703" instrument_node="">[80]</span></a></sup><span data-dcnode-id="2700" instrument_node=""> By praising disingenuous reforms, the United States runs the risk of further entrenching authoritarianism in the region.</span><sup class="reference" data-dcnode-id="2697" id="cite_ref-81"><a data-dcnode-id="2698" href="#cite_note-81"><span data-dcnode-id="2699" instrument_node="">[81]</span></a></sup><span data-dcnode-id="2696" instrument_node="">
</span></p><p data-dcnode-id="2679"><span data-dcnode-id="2694" instrument_node="">By focusing on funding civil society organizations, foreign donors can create dependency "at the expense of building a domestic democratic movement" and open NGOs up to criticism from their compatriots, not least from the state, which can use foreign funding as justification for cracking down on activists and democracy proponents, such as </span><a data-dcnode-id="2692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saad_Eddin_Ibrahim" title="Saad Eddin Ibrahim"><span data-dcnode-id="2693" instrument_node="">Saad Eddin Ibrahim</span></a><span data-dcnode-id="2691" instrument_node=""> and </span><a data-dcnode-id="2689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ayman_Nour" title="Ayman Nour"><span data-dcnode-id="2690" instrument_node="">Ayman Nour</span></a><span data-dcnode-id="2688" instrument_node=""> in Egypt.</span><sup class="reference" data-dcnode-id="2685" id="cite_ref-82"><a data-dcnode-id="2686" href="#cite_note-82"><span data-dcnode-id="2687" instrument_node="">[82]</span></a></sup><span data-dcnode-id="2684" instrument_node=""> Furthermore, regimes have proven adept at co-opting and neutralizing many civil society organizations, which calls into question the assumption that support for civil society should "be equated with support for democratization, given that civil society has also played a role in normalizing  authoritarianism in the postindependence period."</span><sup class="reference" data-dcnode-id="2681" id="cite_ref-83"><a data-dcnode-id="2682" href="#cite_note-83"><span data-dcnode-id="2683" instrument_node="">[83]</span></a></sup><span data-dcnode-id="2680" instrument_node="">
</span></p><p data-dcnode-id="2673"><span data-dcnode-id="2678" instrument_node="">The same logic is applied to women's political participation. Heba Raouf Ezzat questions the utility of promoting women's involvement and normalization of authoritarian regimes: 
"In Egypt, Morocco, Bahrain, Qatar and other countries the official support of women as ministers or executives or even judges serves only to obscure the rising authoritarianism of the regimes that is veiled by soft democratic rhetoric limited to the vocal level or reduced to trivial changes that are curbed by logistic and legal details. No power-sharing is taking place and political elites are well determined to monopolize authority."</span><sup class="reference" data-dcnode-id="2675" id="cite_ref-84"><a data-dcnode-id="2676" href="#cite_note-84"><span data-dcnode-id="2677" instrument_node="">[84]</span></a></sup><span data-dcnode-id="2674" instrument_node="">
</span></p><span data-dcnode-id="2672" instrument_node="">
</span><h3 data-dcnode-id="2662"><span class="mw-headline" data-dcnode-id="2670" id="Aid_prioritization:_military_v._DG"><span data-dcnode-id="2671" instrument_node="">Aid prioritization: military v. DG</span></span><span class="mw-editsection" data-dcnode-id="2663"><span class="mw-editsection-bracket" data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">[</span></span><a data-dcnode-id="2666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D30" title="Edit section: Aid prioritization: military v. DG"><span data-dcnode-id="2667" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2661" instrument_node="">
</span><p data-dcnode-id="2651"><span data-dcnode-id="2660" instrument_node="">A second dilemma for U.S. democracy promotion is aid prioritization. Critics say the priorities of Western aid must be viewed as a whole, and therefore question the vastly greater amounts spent on military aid than democracy aid. Massive foreign aid to countries like Jordan and Egypt, for example, gives regimes the ability to both co-opt and repress their populations by supporting state job and economic infrastructures and funding state security apparatuses.</span><sup class="reference" data-dcnode-id="2657" id="cite_ref-85"><a data-dcnode-id="2658" href="#cite_note-85"><span data-dcnode-id="2659" instrument_node="">[85]</span></a></sup><span data-dcnode-id="2656" instrument_node=""> This results in often contradictory U.S. positions on democracy, with officials praising Arab security structures that are used to crack down on activists and civil society while simultaneously funding technical assistance aimed at promoting democracy in Egypt and Palestine for example.</span><sup class="reference" data-dcnode-id="2653" id="cite_ref-86"><a data-dcnode-id="2654" href="#cite_note-86"><span data-dcnode-id="2655" instrument_node="">[86]</span></a></sup><span data-dcnode-id="2652" instrument_node="">
</span></p><p data-dcnode-id="2645"><span data-dcnode-id="2650" instrument_node="">While some U.S. policymakers, including Condoleezza Rice, have linked democracy promotion to achieving peace and security, the relationship may not be so clear, some scholars maintain, given that a level of instability is inherent in the democratization process in the short-run, even if a politically reformed Middle East in the long-term could be an asset for international security.</span><sup class="reference" data-dcnode-id="2647" id="cite_ref-87"><a data-dcnode-id="2648" href="#cite_note-87"><span data-dcnode-id="2649" instrument_node="">[87]</span></a></sup><span data-dcnode-id="2646" instrument_node="">
</span></p><span data-dcnode-id="2644" instrument_node="">
</span><h3 data-dcnode-id="2634"><span class="mw-headline" data-dcnode-id="2642" id="Selectivity_in_engaging_civil_society"><span data-dcnode-id="2643" instrument_node="">Selectivity in engaging civil society</span></span><span class="mw-editsection" data-dcnode-id="2635"><span class="mw-editsection-bracket" data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">[</span></span><a data-dcnode-id="2638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D31" title="Edit section: Selectivity in engaging civil society"><span data-dcnode-id="2639" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2633" instrument_node="">
</span><p data-dcnode-id="2627"><span data-dcnode-id="2632" instrument_node="">Another dilemma for democracy promotion projects aimed at engaging civil society is that they often end up selectively working with NGOs that are seen as non-threatening to regimes and not in opposition to the donor's policy in the region – thus largely ruling out work with Islamist civil society groups for U.S.–funded projects.</span><sup class="reference" data-dcnode-id="2629" id="cite_ref-88"><a data-dcnode-id="2630" href="#cite_note-88"><span data-dcnode-id="2631" instrument_node="">[88]</span></a></sup><span data-dcnode-id="2628" instrument_node="">
</span></p><p data-dcnode-id="2621"><span data-dcnode-id="2626" instrument_node="">The possibility of an Islamist rise to power via democratic means (and potential opposition to Israel and/or overthrow of democracy in favor of Islamic government) is an enduring concern for American democracy promotion. It may also be a matter of U.S. credibility in the MENA region, where America was sharply criticized for seemingly applying a double standard in the 2006 Palestinian parliamentary elections – encouraging free and fair elections, only to withdraw aid and diplomatically boycott the new government when Hamas emerged the victor.</span><sup class="reference" data-dcnode-id="2623" id="cite_ref-89"><a data-dcnode-id="2624" href="#cite_note-89"><span data-dcnode-id="2625" instrument_node="">[89]</span></a></sup><span data-dcnode-id="2622" instrument_node="">
</span></p><p data-dcnode-id="2605"><span data-dcnode-id="2620" instrument_node="">Some, such as Laurie Mylroie, suggest that democracy and Islamic tradition are incompatible, and illiberal Islamists may be worse than the current authoritarian regimes (although she suggests it may be useful for the United States to promote human rights and democracy in certain parts of the Middle East to oppose dictators such as </span><a data-dcnode-id="2618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saddam_Hussein" title="Saddam Hussein"><span data-dcnode-id="2619" instrument_node="">Saddam Hussein</span></a><span data-dcnode-id="2617" instrument_node="">).</span><sup class="reference" data-dcnode-id="2614" id="cite_ref-90"><a data-dcnode-id="2615" href="#cite_note-90"><span data-dcnode-id="2616" instrument_node="">[90]</span></a></sup><span data-dcnode-id="2613" instrument_node=""> Others stress the compatibility of democracy and the Islamic notion of </span><a class="mw-redirect" data-dcnode-id="2611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shura_Council" title="Shura Council"><span data-dcnode-id="2612" instrument_node="">shura</span></a><span data-dcnode-id="2610" instrument_node="">, or consultation, and say that Western and international donors should not hesitate to promote democracy as a means of encouraging Arab democrats and responsible governance practices.</span><sup class="reference" data-dcnode-id="2607" id="cite_ref-91"><a data-dcnode-id="2608" href="#cite_note-91"><span data-dcnode-id="2609" instrument_node="">[91]</span></a></sup><span data-dcnode-id="2606" instrument_node="">
</span></p><p data-dcnode-id="2585"><span data-dcnode-id="2604" instrument_node="">While it may be impossible to come to a reliable conclusion on Islamist moderation through democratic participation while political freedom is absent,</span><sup class="reference" data-dcnode-id="2601" id="cite_ref-92"><a data-dcnode-id="2602" href="#cite_note-92"><span data-dcnode-id="2603" instrument_node="">[92]</span></a></sup><span data-dcnode-id="2600" instrument_node=""> Amr Hamzawy and Nathan Brown point out that despite ambiguity on commitment to democracy, the political experience of Islamist movements across the Arab world suggest three rising trends: "respect for the institutional framework of the state in which they operate; acceptance of plurality as a legitimate mode of political existence; and a gradual retreat from ideological debates in favor of a growing concentration on pragmatic agendas that are primarily concerned with influencing public policies."</span><sup class="reference" data-dcnode-id="2597" id="cite_ref-93"><a data-dcnode-id="2598" href="#cite_note-93"><span data-dcnode-id="2599" instrument_node="">[93]</span></a></sup><span data-dcnode-id="2596" instrument_node=""> Likewise, in their analysis of the Egyptian </span><a data-dcnode-id="2594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muslim_Brotherhood" title="Muslim Brotherhood"><span data-dcnode-id="2595" instrument_node="">Muslim Brotherhood</span></a><span data-dcnode-id="2593" instrument_node="">'s parliamentary experience, Samer Shehata and Joshua Stacher point to the Brotherhood's reformist agenda and conclude that "the bloc's political practice—its proactive study of political issues and use of parliamentary procedure to hold the government's feet to the fire—has the potential to strengthen permanently the institution of Parliament vis-à-vis the executive led by President </span><a class="mw-redirect" data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Husni_Mubarak" title="Husni Mubarak"><span data-dcnode-id="2592" instrument_node="">Husni Mubarak</span></a><span data-dcnode-id="2590" instrument_node="">."</span><sup class="reference" data-dcnode-id="2587" id="cite_ref-94"><a data-dcnode-id="2588" href="#cite_note-94"><span data-dcnode-id="2589" instrument_node="">[94]</span></a></sup><span data-dcnode-id="2586" instrument_node="">
</span></p><p data-dcnode-id="2579"><span data-dcnode-id="2584" instrument_node="">Larry Diamond lists American and European dialogue with moderate Islamists as key to democracy promotion, suggesting a bargain in which Western powers would press for Islamist parties' right to participate in free and fair elections in exchange for an unambiguous commitment to democracy and equal rights for women and religious minorities, in addition to recognition of Israel.</span><sup class="reference" data-dcnode-id="2581" id="cite_ref-95"><a data-dcnode-id="2582" href="#cite_note-95"><span data-dcnode-id="2583" instrument_node="">[95]</span></a></sup><span data-dcnode-id="2580" instrument_node="">
</span></p><span data-dcnode-id="2578" instrument_node="">
</span><h3 data-dcnode-id="2567"><span data-dcnode-id="2577" id="Financing_an_.22industry.22"></span><span class="mw-headline" data-dcnode-id="2575" id="Financing_an_&quot;industry&quot;"><span data-dcnode-id="2576" instrument_node="">Financing an "industry"</span></span><span class="mw-editsection" data-dcnode-id="2568"><span class="mw-editsection-bracket" data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">[</span></span><a data-dcnode-id="2571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D32" title="Edit section: Financing an &quot;industry&quot;"><span data-dcnode-id="2572" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2566" instrument_node="">
</span><p data-dcnode-id="2552"><span data-dcnode-id="2565" instrument_node="">The funding aspect of American democracy promotion leads some to question the "industry" that emerged as post-Soviet American politics led to increased democracy promotion and "older development-oriented companies and organizations quickly added democratization to their repertoire in order to expand their work and benefit from the new stream of funding."</span><sup class="reference" data-dcnode-id="2562" id="cite_ref-96"><a data-dcnode-id="2563" href="#cite_note-96"><span data-dcnode-id="2564" instrument_node="">[96]</span></a></sup><span data-dcnode-id="2561" instrument_node=""> The emergence of a focus on governance as a means of promoting open markets</span><sup class="reference" data-dcnode-id="2558" id="cite_ref-97"><a data-dcnode-id="2559" href="#cite_note-97"><span data-dcnode-id="2560" instrument_node="">[97]</span></a></sup><span data-dcnode-id="2557" instrument_node=""> had reverberations in the Middle East and North Africa. Critics of aid aimed at stimulating free market enterprise and thereby creating a middle class which would push for democracy assert that it can result in transforming local NGOs into a business sector framed as an example of entrepreneurship but dependent on aid from the West.</span><sup class="reference" data-dcnode-id="2554" id="cite_ref-98"><a data-dcnode-id="2555" href="#cite_note-98"><span data-dcnode-id="2556" instrument_node="">[98]</span></a></sup><span data-dcnode-id="2553" instrument_node="">
</span></p><span data-dcnode-id="2551" instrument_node="">
</span><h3 data-dcnode-id="2541"><span class="mw-headline" data-dcnode-id="2549" id="U.S._support_of_undemocratic_regimes"><span data-dcnode-id="2550" instrument_node="">U.S. support of undemocratic regimes</span></span><span class="mw-editsection" data-dcnode-id="2542"><span class="mw-editsection-bracket" data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">[</span></span><a data-dcnode-id="2545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D33" title="Edit section: U.S. support of undemocratic regimes"><span data-dcnode-id="2546" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2540" instrument_node="">

s</span></a><span data-dcnode-id="2523" instrument_node="">, </span><a data-dcnode-id="2521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Arab_Emirates%25E2%2580%2593United_States_relations" title="United Arab Emirates–United States relations"><span data-dcnode-id="2522" instrument_node="">United Arab Emirates–United States relations</span></a><span data-dcnode-id="2520" instrument_node="">, </span><a data-dcnode-id="2518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jordan%25E2%2580%2593United_States_relations" title="Jordan–United States relations"><span data-dcnode-id="2519" instrument_node="">Jordan–United States relations</span></a><span data-dcnode-id="2517" instrument_node="">, </span><a data-dcnode-id="2515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkey%25E2%2580%2593United_States_relations" title="Turkey–United States relations"><span data-dcnode-id="2516" instrument_node="">Turkey–United States relations</span></a><span data-dcnode-id="2514" instrument_node="">, and </span><a data-dcnode-id="2512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Egypt%25E2%2580%2593United_States_relations" title="Egypt–United States relations"><span data-dcnode-id="2513" instrument_node="">Egypt–United States relations</span></a></div><span data-dcnode-id="2510" instrument_node="">

</span><p data-dcnode-id="2460"><span data-dcnode-id="2471" instrument_node="">According to </span><i data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">The Huffington Post</span></i><span data-dcnode-id="2468" instrument_node="">, "The 45 nations and territories with little or no democratic rule represent more than half of the roughly 80 countries now hosting U.S. bases. ...  Research by political scientist </span><a data-dcnode-id="2466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kent_E._Calder" title="Kent E. Calder"><span data-dcnode-id="2467" instrument_node="">Kent Calder</span></a><span data-dcnode-id="2465" instrument_node=""> confirms what’s come to be known as the “dictatorship hypothesis”: The United States tends to support dictators [and other undemocratic regimes] in nations where it enjoys basing facilities."</span><sup class="reference" data-dcnode-id="2462" id="cite_ref-99"><a data-dcnode-id="2463" href="#cite_note-99"><span data-dcnode-id="2464" instrument_node="">[99]</span></a></sup><span data-dcnode-id="2461" instrument_node="">
</span></p><span data-dcnode-id="2459" instrument_node="">
</span><h3 data-dcnode-id="2449"><span class="mw-headline" data-dcnode-id="2457" id="Discourse_and_objectivity"><span data-dcnode-id="2458" instrument_node="">Discourse and objectivity</span></span><span class="mw-editsection" data-dcnode-id="2450"><span class="mw-editsection-bracket" data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">[</span></span><a data-dcnode-id="2453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D34" title="Edit section: Discourse and objectivity"><span data-dcnode-id="2454" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2448" instrument_node="">
</span><p data-dcnode-id="2438"><span data-dcnode-id="2447" instrument_node="">Although international development work has evolved in terms of its vision, the assumption that those offering assistance from the outside know how to best serve the interests and needs of people inside a country persists in the field, according to some,</span><sup class="reference" data-dcnode-id="2444" id="cite_ref-100"><a data-dcnode-id="2445" href="#cite_note-100"><span data-dcnode-id="2446" instrument_node="">[100]</span></a></sup><span data-dcnode-id="2443" instrument_node=""> and is reflected in the Arab world in development rhetoric "rooted in a colonial discourse about native backwardness."</span><sup class="reference" data-dcnode-id="2440" id="cite_ref-101"><a data-dcnode-id="2441" href="#cite_note-101"><span data-dcnode-id="2442" instrument_node="">[101]</span></a></sup><span data-dcnode-id="2439" instrument_node="">
</span></p><p data-dcnode-id="2417"><span data-dcnode-id="2437" instrument_node="">Polling data in the Arab world suggests that Arab public opinion largely rejects the assertion that U.S. democracy assistance is helpful.</span><sup class="reference" data-dcnode-id="2434" id="cite_ref-102"><a data-dcnode-id="2435" href="#cite_note-102"><span data-dcnode-id="2436" instrument_node="">[102]</span></a></sup><span data-dcnode-id="2433" instrument_node=""> This skepticism of democracy promotion and view of aid as a form of domination is prevalent, according to some analysts, because of the perceived subjection of democracy support to American interests in the region.</span><sup class="reference" data-dcnode-id="2430" id="cite_ref-103"><a data-dcnode-id="2431" href="#cite_note-103"><span data-dcnode-id="2432" instrument_node="">[103]</span></a></sup><span data-dcnode-id="2429" instrument_node=""> </span><a data-dcnode-id="2427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Noam_Chomsky" title="Noam Chomsky"><span data-dcnode-id="2428" instrument_node="">Noam Chomsky</span></a><span data-dcnode-id="2426" instrument_node=""> argues that "U.S. democratic rhetoric and undemocratic substance have a long history,"</span><sup class="reference" data-dcnode-id="2423" id="cite_ref-104"><a data-dcnode-id="2424" href="#cite_note-104"><span data-dcnode-id="2425" instrument_node="">[104]</span></a></sup><span data-dcnode-id="2422" instrument_node=""> and the United States only supports democracy "if and only if it conforms to U.S. economic and strategic objectives."</span><sup class="reference" data-dcnode-id="2419" id="cite_ref-105"><a data-dcnode-id="2420" href="#cite_note-105"><span data-dcnode-id="2421" instrument_node="">[105]</span></a></sup><span data-dcnode-id="2418" instrument_node="">
</span></p><p data-dcnode-id="2407"><span data-dcnode-id="2416" instrument_node="">Such power dynamics associated with democracy discourse can be influential. Walid Kazziha argues that despite the fact that Arab intellectual debate on democracy had been lively in the twentieth century and home-grown demands for political opening had been placed on regimes, Western discourse on democracy grew in influence in the region from the 1980s onwards, and by the beginning of the 21st century, the "Arab drive for democratization, which emerged after the 1967 Arab defeat, had been diverted from its national course, due to the intervention of the West."</span><sup class="reference" data-dcnode-id="2413" id="cite_ref-106"><a data-dcnode-id="2414" href="#cite_note-106"><span data-dcnode-id="2415" instrument_node="">[106]</span></a></sup><span data-dcnode-id="2412" instrument_node=""> Likewise, Sari Hanafi's analysis of the relationship between international donors and Palestinian NGOs reveals that an increasingly globalized Palestinian elite heading NGOs "perceive and internalize the donor agenda not only as global but also as universal and self-evident."</span><sup class="reference" data-dcnode-id="2409" id="cite_ref-107"><a data-dcnode-id="2410" href="#cite_note-107"><span data-dcnode-id="2411" instrument_node="">[107]</span></a></sup><span data-dcnode-id="2408" instrument_node="">
</span></p><p data-dcnode-id="2393"><span data-dcnode-id="2406" instrument_node="">Indeed, development discourse and the categories it creates can have severe power implications, in the view of some scholars, who say such discourse is an extension of the "coercive power of Western-dominated global institutions."</span><sup class="reference" data-dcnode-id="2403" id="cite_ref-108"><a data-dcnode-id="2404" href="#cite_note-108"><span data-dcnode-id="2405" instrument_node="">[108]</span></a></sup><span data-dcnode-id="2402" instrument_node=""> In his analysis of the American offer of technical aid to develop Egypt's largely agrarian economy after World War II, Timothy Mitchell analyzes USAID rhetoric, pointing to the "model answers" that supposedly objective experts bring to Egypt. What is often ignored in the discussion of a development scheme based on providing technical knowledge, Mitchell argues, is that an organization like USAID is hardly "a rational consciousness standing outside the country" as it imagines itself to be, but "is in fact a central element in configurations of power within the country."</span><sup class="reference" data-dcnode-id="2399" id="cite_ref-109"><a data-dcnode-id="2400" href="#cite_note-109"><span data-dcnode-id="2401" instrument_node="">[109]</span></a></sup><span data-dcnode-id="2398" instrument_node=""> According to Mitchell, the projects USAID pursues are built on a discourse subservient to American political and economic interests and can potentially do more harm than good for Egyptians. He maintains that democracy rhetoric is also employed according to American-defined categories such as promoting economic liberalization, citing a 1989 USAID report's calls for political decentralization and encouraging "democracy and pluralism" as a means of empowering rural landlords who would support free market economy at the expense of local peasants.</span><sup class="reference" data-dcnode-id="2395" id="cite_ref-110"><a data-dcnode-id="2396" href="#cite_note-110"><span data-dcnode-id="2397" instrument_node="">[110]</span></a></sup><span data-dcnode-id="2394" instrument_node="">
</span></p><p data-dcnode-id="2378"><span data-dcnode-id="2392" instrument_node="">Some critics have also argued that the U.S. has used democracy to justify </span><a data-dcnode-id="2390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timeline_of_United_States_military_operations" title="Timeline of United States military operations"><span data-dcnode-id="2391" instrument_node="">military intervention</span></a><span data-dcnode-id="2389" instrument_node=""> abroad.</span><sup class="reference" data-dcnode-id="2386" id="cite_ref-Why_57-1"><a data-dcnode-id="2387" href="#cite_note-Why-57"><span data-dcnode-id="2388" instrument_node="">[57]</span></a></sup><sup class="reference" data-dcnode-id="2383" id="cite_ref-111"><a data-dcnode-id="2384" href="#cite_note-111"><span data-dcnode-id="2385" instrument_node="">[111]</span></a></sup><sup class="reference" data-dcnode-id="2380" id="cite_ref-Meernik_1996_391_58-1"><a data-dcnode-id="2381" href="#cite_note-Meernik_1996_391-58"><span data-dcnode-id="2382" instrument_node="">[58]</span></a></sup><span data-dcnode-id="2379" instrument_node="">
</span></p><span data-dcnode-id="2377" instrument_node="">
