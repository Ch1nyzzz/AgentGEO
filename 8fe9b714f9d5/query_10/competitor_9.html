</span><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="4301" style="display:none"><span data-dcnode-id="4302" instrument_node="">Overview of democracy promotion by the United States of America</span></div><span data-dcnode-id="4300" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4289"><div class="thumbinner" data-dcnode-id="4290" style="width:222px;"><a class="image" data-dcnode-id="4298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIraqi_voters_inked_fingers.jpg"><img alt="" class="thumbimage" data-dcnode-id="4299" data-file-height="996" data-file-width="1500" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Iraqi_voters_inked_fingers.jpg/220px-Iraqi_voters_inked_fingers.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Iraqi_voters_inked_fingers.jpg/330px-Iraqi_voters_inked_fingers.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Iraqi_voters_inked_fingers.jpg/440px-Iraqi_voters_inked_fingers.jpg 2x" width="220"></a><span data-dcnode-id="4297" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4291"><div class="magnify" data-dcnode-id="4295"><a class="internal" data-dcnode-id="4296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIraqi_voters_inked_fingers.jpg" title="Enlarge"></a></div><span data-dcnode-id="4294" instrument_node="">Voters in the </span><a class="mw-redirect" data-dcnode-id="4292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iraqi_legislative_election%2C_January_2005" title="Iraqi legislative election, January 2005"><span data-dcnode-id="4293" instrument_node="">2005 Iraqi legislative election</span></a></div></div></div><span data-dcnode-id="4288" instrument_node="">
</span><p data-dcnode-id="4278"><b data-dcnode-id="4286"><span data-dcnode-id="4287" instrument_node="">American democracy promotion</span></b><span data-dcnode-id="4285" instrument_node=""> aims to encourage governmental and non-governmental actors to pursue political reforms that will lead ultimately to </span><a data-dcnode-id="4283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy" title="Democracy"><span data-dcnode-id="4284" instrument_node="">democratic</span></a><span data-dcnode-id="4282" instrument_node=""> </span><a data-dcnode-id="4280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Governance" title="Governance"><span data-dcnode-id="4281" instrument_node="">governance</span></a><span data-dcnode-id="4279" instrument_node="">.
</span></p><p data-dcnode-id="4240"><span data-dcnode-id="4277" instrument_node="">As the Middle East and North Africa (MENA) is an area of the world vital to American interests</span><sup class="reference" data-dcnode-id="4274" id="cite_ref-1"><a data-dcnode-id="4275" href="#cite_note-1"><span data-dcnode-id="4276" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4273" instrument_node=""> yet generally entrenched in non-democratic, </span><a data-dcnode-id="4271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Authoritarianism" title="Authoritarianism"><span data-dcnode-id="4272" instrument_node="">authoritarian</span></a><span data-dcnode-id="4270" instrument_node=""> rule</span><sup class="reference" data-dcnode-id="4267" id="cite_ref-2"><a data-dcnode-id="4268" href="#cite_note-2"><span data-dcnode-id="4269" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4266" instrument_node=""> (with the exceptions of </span><a data-dcnode-id="4264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tunisia" title="Tunisia"><span data-dcnode-id="4265" instrument_node="">Tunisia</span></a><span data-dcnode-id="4263" instrument_node="">, </span><a data-dcnode-id="4261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel" title="Israel"><span data-dcnode-id="4262" instrument_node="">Israel</span></a><span data-dcnode-id="4260" instrument_node="">, and semi-democratic </span><a data-dcnode-id="4258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lebanon" title="Lebanon"><span data-dcnode-id="4259" instrument_node="">Lebanon</span></a><span data-dcnode-id="4257" instrument_node="">, </span><a data-dcnode-id="4255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iraq" title="Iraq"><span data-dcnode-id="4256" instrument_node="">Iraq</span></a><span data-dcnode-id="4254" instrument_node="">, </span><a data-dcnode-id="4252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palestinian_National_Authority" title="Palestinian National Authority"><span data-dcnode-id="4253" instrument_node="">Palestinian National Authority</span></a><span data-dcnode-id="4251" instrument_node=""> and </span><a data-dcnode-id="4249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkey" title="Turkey"><span data-dcnode-id="4250" instrument_node="">Turkey</span></a><span data-dcnode-id="4248" instrument_node="">), it has been the subject of increasing interest on the part of the American government and democracy promoters, particularly after the terrorist attacks of </span><a data-dcnode-id="4246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/September_11_attacks" title="September 11 attacks"><span data-dcnode-id="4247" instrument_node="">September 11, 2001</span></a><span data-dcnode-id="4245" instrument_node="">, with many viewing democratic transition as essential to regional stability and international security.</span><sup class="reference" data-dcnode-id="4242" id="cite_ref-3"><a data-dcnode-id="4243" href="#cite_note-3"><span data-dcnode-id="4244" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4241" instrument_node="">
</span></p><p data-dcnode-id="4214"><span data-dcnode-id="4239" instrument_node="">American efforts to promote </span><a class="mw-redirect" data-dcnode-id="4237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy_in_the_Middle_East" title="Democracy in the Middle East"><span data-dcnode-id="4238" instrument_node="">democracy in the Middle East</span></a><span data-dcnode-id="4236" instrument_node=""> are generally characterized by top-down and bottom-up </span><a data-dcnode-id="4234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratization" title="Democratization"><span data-dcnode-id="4235" instrument_node="">democratization</span></a><span data-dcnode-id="4233" instrument_node=""> strategies, which can be pursued simultaneously.</span><sup class="reference" data-dcnode-id="4230" id="cite_ref-4"><a data-dcnode-id="4231" href="#cite_note-4"><span data-dcnode-id="4232" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4229" instrument_node=""> The former top-down approach involves putting rhetorical and diplomatic pressure on regimes to reform and can go so far as to involve direct American military engagement installing democratic government (as is the case in Iraq following the </span><a data-dcnode-id="4227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2003_invasion_of_Iraq" title="2003 invasion of Iraq"><span data-dcnode-id="4228" instrument_node="">2003 invasion</span></a><span data-dcnode-id="4226" instrument_node="">). The U.S. government generally pursues the latter bottom-up approach by funding international organizations that help strengthen the bases for gradual democratic transition (the rule of law, accountable government institutions and expanded political competition) by offering technical assistance and training to political parties and electoral management bodies, engaging with civil society, producing assessments and polls, and promoting female political participation.</span><sup class="reference" data-dcnode-id="4223" id="cite_ref-5"><a data-dcnode-id="4224" href="#cite_note-5"><span data-dcnode-id="4225" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4222" instrument_node=""> Some have criticized American </span><a data-dcnode-id="4220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy_promotion" title="Democracy promotion"><span data-dcnode-id="4221" instrument_node="">democracy promotion</span></a><span data-dcnode-id="4219" instrument_node=""> for ineffectiveness, a lack of consistency, taking a one-size-fits-all approach and using democracy to justify military intervention abroad. Moreover, it's said that US democracy promotion had been accompanied by heavy costs for the US and considerable damage to the target countries.</span><sup class="reference" data-dcnode-id="4216" id="cite_ref-6"><a data-dcnode-id="4217" href="#cite_note-6"><span data-dcnode-id="4218" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4215" instrument_node="">
</span></p><span data-dcnode-id="4213" instrument_node="">

</span><h2 data-dcnode-id="3867"><span class="mw-headline" data-dcnode-id="3875" id="Background:_democracy_as_development"><span data-dcnode-id="3876" instrument_node="">Background: democracy as development</span></span><span class="mw-editsection" data-dcnode-id="3868"><span class="mw-editsection-bracket" data-dcnode-id="3873"><span data-dcnode-id="3874" instrument_node="">[</span></span><a data-dcnode-id="3871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D1" title="Edit section: Background: democracy as development"><span data-dcnode-id="3872" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3869"><span data-dcnode-id="3870" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3866" instrument_node="">
</span><p data-dcnode-id="3840"><span data-dcnode-id="3865" instrument_node="">American promotion of democracy should be seen in the broader context of the </span><a data-dcnode-id="3863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_development" title="International development"><span data-dcnode-id="3864" instrument_node="">international development</span></a><span data-dcnode-id="3862" instrument_node=""> field, in which there has been an increasing recognition of a relationship between governance and broad development challenges such as poverty.</span><sup class="reference" data-dcnode-id="3859" id="cite_ref-7"><a data-dcnode-id="3860" href="#cite_note-7"><span data-dcnode-id="3861" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3858" instrument_node=""> The </span><a data-dcnode-id="3856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Development_Programme" title="United Nations Development Programme"><span data-dcnode-id="3857" instrument_node="">United Nations Development Programme</span></a><span data-dcnode-id="3855" instrument_node=""> (UNDP) identifies democracy and governance (DG) as essential to achieving overall UN development objectives and the </span><a data-dcnode-id="3853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Millennium_Development_Goals" title="Millennium Development Goals"><span data-dcnode-id="3854" instrument_node="">Millennium Development Goals</span></a><span data-dcnode-id="3852" instrument_node="">, because DG work is part of "expanding capabilities and enlarging the choices people have of fulfilling their lives."</span><sup class="reference" data-dcnode-id="3849" id="cite_ref-8"><a data-dcnode-id="3850" href="#cite_note-8"><span data-dcnode-id="3851" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3848" instrument_node=""> The UNDP highlights three overall DG goals: fostering inclusive participation, strengthening responsive governing institutions, and basing democratic governance on international principles. The </span><a data-dcnode-id="3846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Agency_for_International_Development" title="United States Agency for International Development"><span data-dcnode-id="3847" instrument_node="">United States Agency for International Development</span></a><span data-dcnode-id="3845" instrument_node=""> (USAID) also places a priority on promoting democratic transition and good governance in accordance with overall U.S. foreign policy objectives.</span><sup class="reference" data-dcnode-id="3842" id="cite_ref-9"><a data-dcnode-id="3843" href="#cite_note-9"><span data-dcnode-id="3844" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3841" instrument_node="">
</span></p><p data-dcnode-id="3821"><span data-dcnode-id="3839" instrument_node="">Generally, DG work can be seen as taking two approaches: one views democratization as a political struggle between democrats and non-democrats and directs aid toward political processes and institutions such as elections, political parties, and civil society; and the second views democratization as a slower, longer-term process and directs aid at a wide range of political and socioeconomic sectors.</span><sup class="reference" data-dcnode-id="3836" id="cite_ref-10"><a data-dcnode-id="3837" href="#cite_note-10"><span data-dcnode-id="3838" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3835" instrument_node=""> In terms of implementation, donor country development agencies, such as USAID, UK </span><a data-dcnode-id="3833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Department_for_International_Development" title="Department for International Development"><span data-dcnode-id="3834" instrument_node="">Department for International Development</span></a><span data-dcnode-id="3832" instrument_node=""> (DFID) and the </span><a data-dcnode-id="3830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canadian_International_Development_Agency" title="Canadian International Development Agency"><span data-dcnode-id="3831" instrument_node="">Canadian International Development Agency</span></a><span data-dcnode-id="3829" instrument_node=""> (CIDA), design and fund programs (according to donor country interests and local needs) that are often carried out by </span><a data-dcnode-id="3827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_non-governmental_organization" title="International non-governmental organization"><span data-dcnode-id="3828" instrument_node="">international non-governmental organizations</span></a><span data-dcnode-id="3826" instrument_node=""> (NGOs) in coordination with local and international groups.</span><sup class="reference" data-dcnode-id="3823" id="cite_ref-11"><a data-dcnode-id="3824" href="#cite_note-11"><span data-dcnode-id="3825" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3822" instrument_node="">
</span></p><span data-dcnode-id="3820" instrument_node="">
</span><h3 data-dcnode-id="3810"><span class="mw-headline" data-dcnode-id="3818" id="MENA_context"><span data-dcnode-id="3819" instrument_node="">MENA context</span></span><span class="mw-editsection" data-dcnode-id="3811"><span class="mw-editsection-bracket" data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">[</span></span><a data-dcnode-id="3814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D2" title="Edit section: MENA context"><span data-dcnode-id="3815" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3812"><span data-dcnode-id="3813" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3809" instrument_node="">
</span><p data-dcnode-id="3769"><span data-dcnode-id="3808" instrument_node="">Although the definition of the "Middle East" is contested among international relations scholars, some have concluded that it encompasses an Arab core with a non-Arab periphery including Israel, Iran and Turkey.</span><sup class="reference" data-dcnode-id="3805" id="cite_ref-12"><a data-dcnode-id="3806" href="#cite_note-12"><span data-dcnode-id="3807" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3804" instrument_node=""> While others argue that the Arab states of North Africa "are better seen as their own, separate, regional system,"</span><sup class="reference" data-dcnode-id="3801" id="cite_ref-13"><a data-dcnode-id="3802" href="#cite_note-13"><span data-dcnode-id="3803" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3800" instrument_node=""> the term "Middle East and North Africa" is used predominantly in American, international, and </span><a data-dcnode-id="3798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="3799" instrument_node="">United Nations</span></a><span data-dcnode-id="3797" instrument_node=""> DG development literature to refer to this area of the world. In the context of the MENA region, the impetus to direct American democracy promotion through international non-governmental NGOs stems from suspicion of the motives of the U.S. government.</span><sup class="reference" data-dcnode-id="3794" id="cite_ref-14"><a data-dcnode-id="3795" href="#cite_note-14"><span data-dcnode-id="3796" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3793" instrument_node=""> Overall American DG priorities in MENA – including building accountable government institutions, promoting the rule of law, and expanding political competition</span><sup class="reference" data-dcnode-id="3790" id="cite_ref-autogenerated1_15-0"><a data-dcnode-id="3791" href="#cite_note-autogenerated1-15"><span data-dcnode-id="3792" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3789" instrument_node=""> – have been shaped in part by UN assessments of the region such as the </span><a data-dcnode-id="3787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arab_Human_Development_Report" title="Arab Human Development Report"><span data-dcnode-id="3788" instrument_node="">Arab Human Development Report</span></a><span data-dcnode-id="3786" instrument_node="">, installments of which have been released since 2002,</span><sup class="reference" data-dcnode-id="3783" id="cite_ref-16"><a data-dcnode-id="3784" href="#cite_note-16"><span data-dcnode-id="3785" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3782" instrument_node=""> in spite of American efforts generally to limit the UN's political role in the region.</span><sup class="reference" data-dcnode-id="3779" id="cite_ref-17"><a data-dcnode-id="3780" href="#cite_note-17"><span data-dcnode-id="3781" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3778" instrument_node=""> The UN Arab Human Development Report on freedom in the Arab world, which was written by Arab intellectuals and released in 2004, conceives of freedom and democratic governance as essential to development in Arab countries: "No Arab thinker today doubts that freedom is a vital and necessary condition, though not the only one, for a new Arab renaissance, or that the Arab world's capacity to face up to its internal and external challenges, depends on ending tyranny and securing fundamental rights and freedoms."</span><sup class="reference" data-dcnode-id="3775" id="cite_ref-18"><a data-dcnode-id="3776" href="#cite_note-18"><span data-dcnode-id="3777" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3774" instrument_node=""> The report envisions the role of the international community, and particularly the UN, as strengthening internally driven transformation by encouraging legal reforms that give civil society organizations freedom to operate and guaranteeing conditions to hold free and fair elections.</span><sup class="reference" data-dcnode-id="3771" id="cite_ref-19"><a data-dcnode-id="3772" href="#cite_note-19"><span data-dcnode-id="3773" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3770" instrument_node="">
</span></p><span data-dcnode-id="3768" instrument_node="">
</span><h3 data-dcnode-id="3758"><span class="mw-headline" data-dcnode-id="3766" id="Rationale_for_external_support"><span data-dcnode-id="3767" instrument_node="">Rationale for external support</span></span><span class="mw-editsection" data-dcnode-id="3759"><span class="mw-editsection-bracket" data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">[</span></span><a data-dcnode-id="3762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D3" title="Edit section: Rationale for external support"><span data-dcnode-id="3763" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3757" instrument_node="">
</span><p data-dcnode-id="3747"><span data-dcnode-id="3756" instrument_node="">The rationale for outside support for democratization in the Middle East is outlined by Albrecht Schnabel, who says that the Middle East is a region with strong authoritarian regimes and weak civil society and identifies the democratization dilemma in the region as the following: a strong civil society is required to produce leaders and mobilize the public around democratic duties, but in order for such a civil society to flourish, a democratic environment and process allowing freedom of expression and order is required in the first place. "If domestic capacities are lacking, external support may be required. Externally supported creation of fragile, yet somewhat functioning institutions is meant to trigger the momentum needed to encourage the evolution of a functioning civil society. The latter will, after a few years of consolidation and post-conflict stability, produce the first wholly internally crafted government. At that time, external involvement, if still provided at that point, can cede."</span><sup class="reference" data-dcnode-id="3753" id="cite_ref-20"><a data-dcnode-id="3754" href="#cite_note-20"><span data-dcnode-id="3755" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3752" instrument_node=""> Schnabel argues that democratization in the Middle East must come from both below and above, given that pressure from below will be pointless if the political leadership is opposed to reform, while top-down reform (which has been the norm in the Middle East) is not a fruitful endeavor if the political culture in society is not developed.</span><sup class="reference" data-dcnode-id="3749" id="cite_ref-21"><a data-dcnode-id="3750" href="#cite_note-21"><span data-dcnode-id="3751" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3748" instrument_node="">
</span></p><p data-dcnode-id="3737"><span data-dcnode-id="3746" instrument_node="">Others challenge the assumption that civil society in the Arab world is weak, pointing to the flourishing of civil society activity visible when regimes permit a degree of liberalization, which in turn permits civil society to make further demands for political opening.</span><sup class="reference" data-dcnode-id="3743" id="cite_ref-22"><a data-dcnode-id="3744" href="#cite_note-22"><span data-dcnode-id="3745" instrument_node="">[22]</span></a></sup><span data-dcnode-id="3742" instrument_node=""> Western donors should therefore not focus solely on creating demand for democracy on a societal level, but also on encouraging policy reform that would expand political competition by "putting a stop to legislative manipulation aimed at maintaining state and government control over NGOs" and "allowing a revival of politics in a society where a correct political life has been stifled by the state."</span><sup class="reference" data-dcnode-id="3739" id="cite_ref-23"><a data-dcnode-id="3740" href="#cite_note-23"><span data-dcnode-id="3741" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3738" instrument_node="">
</span></p><p data-dcnode-id="3731"><span data-dcnode-id="3736" instrument_node="">Still others assert that the conflation of promoting civil society and promoting democracy in development rhetoric is flawed. Whereas civil society is a tool for developing democracy, it is not democracy itself and indeed does not always result in democratic behavior or values.</span><sup class="reference" data-dcnode-id="3733" id="cite_ref-24"><a data-dcnode-id="3734" href="#cite_note-24"><span data-dcnode-id="3735" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3732" instrument_node="">
</span></p><span data-dcnode-id="3730" instrument_node="">
</span><h3 data-dcnode-id="3720"><span class="mw-headline" data-dcnode-id="3728" id="American_Public_Support_for_Democracy_Promotion"><span data-dcnode-id="3729" instrument_node="">American Public Support for Democracy Promotion</span></span><span class="mw-editsection" data-dcnode-id="3721"><span class="mw-editsection-bracket" data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">[</span></span><a data-dcnode-id="3724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D4" title="Edit section: American Public Support for Democracy Promotion"><span data-dcnode-id="3725" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3719" instrument_node="">
</span><p data-dcnode-id="3709"><span data-dcnode-id="3718" instrument_node="">In general, public support for democracy promotion is low. Public opinion polls since the 1990s consistently show that only about a quarter of Americans support democracy promotion.</span><sup class="reference" data-dcnode-id="3715" id="cite_ref-25"><a data-dcnode-id="3716" href="#cite_note-25"><span data-dcnode-id="3717" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3714" instrument_node=""> Academic research further suggests that Americans are not persuaded to support international democracy promotion either to spread American values abroad or to promote US national interest.</span><sup class="reference" data-dcnode-id="3711" id="cite_ref-26"><a data-dcnode-id="3712" href="#cite_note-26"><span data-dcnode-id="3713" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3710" instrument_node="">
</span></p><span data-dcnode-id="3708" instrument_node="">
</span><h2 data-dcnode-id="3698"><span class="mw-headline" data-dcnode-id="3706" id="History_of_American_democracy_promotion"><span data-dcnode-id="3707" instrument_node="">History of American democracy promotion</span></span><span class="mw-editsection" data-dcnode-id="3699"><span class="mw-editsection-bracket" data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">[</span></span><a data-dcnode-id="3702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D5" title="Edit section: History of American democracy promotion"><span data-dcnode-id="3703" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3697" instrument_node="">
</span><p data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">American foreign policy attitudes toward democracy promotion in the Middle East and North Africa have changed significantly from the twentieth to the twenty-first centuries, with the former largely dominated by nominal commitment to democratic change in the region and the latter witnessing intensified, even forceful, efforts at democratization.
</span></p><span data-dcnode-id="3694" instrument_node="">
</span><h3 data-dcnode-id="3684"><span class="mw-headline" data-dcnode-id="3692" id="Post-WWII"><span data-dcnode-id="3693" instrument_node="">Post-WWII</span></span><span class="mw-editsection" data-dcnode-id="3685"><span class="mw-editsection-bracket" data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">[</span></span><a data-dcnode-id="3688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D6" title="Edit section: Post-WWII"><span data-dcnode-id="3689" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3683" instrument_node="">
</span><p data-dcnode-id="3645"><span data-dcnode-id="3682" instrument_node="">The notion of development emerged in the 1940s and 1950s out of the post-</span><a data-dcnode-id="3680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="3681" instrument_node="">World War II</span></a><span data-dcnode-id="3679" instrument_node=""> context in which a new international economic order was established, the United States made contributions to European reconstruction, and attention to the post-colonial Third World increased.</span><sup class="reference" data-dcnode-id="3676" id="cite_ref-27"><a data-dcnode-id="3677" href="#cite_note-27"><span data-dcnode-id="3678" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3675" instrument_node=""> The United States included among its aims in World War I the defense of democracies, and after WWII attempted to institutionalize democratic systems in countries that had lost the war (such as Germany and Japan); meanwhile during the </span><a data-dcnode-id="3673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="3674" instrument_node="">Cold War</span></a><span data-dcnode-id="3672" instrument_node="">, democracy promotion was a distant goal, with security concerns and a centering of policy against </span><a class="mw-redirect" data-dcnode-id="3670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet" title="Soviet"><span data-dcnode-id="3671" instrument_node="">Soviet</span></a><span data-dcnode-id="3669" instrument_node=""> expansion dominating.</span><sup class="reference" data-dcnode-id="3666" id="cite_ref-28"><a data-dcnode-id="3667" href="#cite_note-28"><span data-dcnode-id="3668" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3665" instrument_node=""> President </span><a data-dcnode-id="3663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jimmy_Carter" title="Jimmy Carter"><span data-dcnode-id="3664" instrument_node="">Jimmy Carter</span></a><span data-dcnode-id="3662" instrument_node=""> applied limited diplomatic pressure, which resulted in a conservative backlash resistant to criticism of authoritarian allies, while President </span><a data-dcnode-id="3660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Reagan" title="Ronald Reagan"><span data-dcnode-id="3661" instrument_node="">Reagan</span></a><span data-dcnode-id="3659" instrument_node=""> selectively supported anti-communist democratic transition in countries such as </span><a data-dcnode-id="3657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/El_Salvador" title="El Salvador"><span data-dcnode-id="3658" instrument_node="">El Salvador</span></a><span data-dcnode-id="3656" instrument_node="">, the </span><a data-dcnode-id="3654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philippines" title="Philippines"><span data-dcnode-id="3655" instrument_node="">Philippines</span></a><span data-dcnode-id="3653" instrument_node="">, and </span><a data-dcnode-id="3651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Korea" title="South Korea"><span data-dcnode-id="3652" instrument_node="">South Korea</span></a><span data-dcnode-id="3650" instrument_node="">.</span><sup class="reference" data-dcnode-id="3647" id="cite_ref-29"><a data-dcnode-id="3648" href="#cite_note-29"><span data-dcnode-id="3649" instrument_node="">[29]</span></a></sup><span data-dcnode-id="3646" instrument_node="">
</span></p><p data-dcnode-id="3632"><span data-dcnode-id="3644" instrument_node="">In the MENA region, however, the United States did little to rupture relations with authoritarian regimes and largely avoided paying significant attention to human rights and democratization.</span><sup class="reference" data-dcnode-id="3641" id="cite_ref-30"><a data-dcnode-id="3642" href="#cite_note-30"><span data-dcnode-id="3643" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3640" instrument_node=""> Indeed, at times the United States found itself opposed to democratic governance in the MENA region when it conflicted with American interests – participating in the overthrow of a democratically elected government in </span><a data-dcnode-id="3638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1953_Iranian_coup_d%27%25C3%25A9tat" title="1953 Iranian coup d'état"><span data-dcnode-id="3639" instrument_node="">Iran in 1953</span></a><span data-dcnode-id="3637" instrument_node="">, for example, due to oil interests and alleged fear of any leftist move toward the Soviets.</span><sup class="reference" data-dcnode-id="3634" id="cite_ref-31"><a data-dcnode-id="3635" href="#cite_note-31"><span data-dcnode-id="3636" instrument_node="">[31]</span></a></sup><span data-dcnode-id="3633" instrument_node="">
</span></p><span data-dcnode-id="3631" instrument_node="">
</span><h3 data-dcnode-id="3621"><span class="mw-headline" data-dcnode-id="3629" id="Post-Soviet_era"><span data-dcnode-id="3630" instrument_node="">Post-Soviet era</span></span><span class="mw-editsection" data-dcnode-id="3622"><span class="mw-editsection-bracket" data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">[</span></span><a data-dcnode-id="3625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D7" title="Edit section: Post-Soviet era"><span data-dcnode-id="3626" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3620" instrument_node="">
</span><p data-dcnode-id="3601"><span data-dcnode-id="3619" instrument_node="">Toward the end of the Cold War, an American political consensus began to emerge suggesting that democratic transition should be actively supported – a consensus only more firmly established following the </span><a data-dcnode-id="3617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="3618" instrument_node="">dissolution of the Soviet Union</span></a><span data-dcnode-id="3616" instrument_node=""> when the United States found itself in less of a difficult position balancing security concerns and promotion of its ideals. This was based in part on </span><a data-dcnode-id="3614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_peace_theory" title="Democratic peace theory"><span data-dcnode-id="3615" instrument_node="">democratic peace theory</span></a><span data-dcnode-id="3613" instrument_node="">, which added a security element to democracy promotion. The Middle East was not excluded from this discussion, with some</span><sup class="reference" data-dcnode-id="3610" id="cite_ref-32"><a data-dcnode-id="3611" href="#cite_note-32"><span data-dcnode-id="3612" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3609" instrument_node=""> calling for increased American democracy promotion as a means of encouraging more peaceful relations with Israel and moderating extremists, while not going so far as to destabilize friendly autocratic regimes. The assumption that a positive relationship exists between democratic governance and peace which was prominent in the 1990s faced some inconsistency in the Middle East, however, because regimes that engaged to some extent in the peace process with Israel (and in the case of </span><a data-dcnode-id="3607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jordan" title="Jordan"><span data-dcnode-id="3608" instrument_node="">Jordan</span></a><span data-dcnode-id="3606" instrument_node=""> successfully reached a peace agreement) at the same time slowly and half-heartedly pursued democratization and allowed little opening to opposition movements who resisted negotiation with Israel.</span><sup class="reference" data-dcnode-id="3603" id="cite_ref-33"><a data-dcnode-id="3604" href="#cite_note-33"><span data-dcnode-id="3605" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3602" instrument_node="">
</span></p><p data-dcnode-id="3574"><span data-dcnode-id="3600" instrument_node="">Traditional promotion of </span><a data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_market" title="Free market"><span data-dcnode-id="3599" instrument_node="">free market</span></a><span data-dcnode-id="3597" instrument_node=""> economics also spurred new calls for democratization in the MENA region. The first democracy aid programs in the Arab world, including the creation of a modest $3 million Middle East Democracy Fund, were introduced by the </span><a class="mw-redirect" data-dcnode-id="3595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_H.W._Bush" title="George H.W. Bush"><span data-dcnode-id="3596" instrument_node="">George H.W. Bush</span></a><span data-dcnode-id="3594" instrument_node=""> administration as a means of encouraging economic liberalization via political liberalization, though the projects were primarily focused on improving management and efficiency in government institutions, as opposed to addressing contentious issues such as human rights abuses, government structures preserving authoritarian power, and laws and practices suppressive of democracy.</span><sup class="reference" data-dcnode-id="3591" id="cite_ref-34"><a data-dcnode-id="3592" href="#cite_note-34"><span data-dcnode-id="3593" instrument_node="">[34]</span></a></sup><span data-dcnode-id="3590" instrument_node=""> While the </span><a class="mw-redirect" data-dcnode-id="3588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clinton_administration" title="Clinton administration"><span data-dcnode-id="3589" instrument_node="">Clinton administration</span></a><span data-dcnode-id="3587" instrument_node=""> broke with the Reagan and Bush administrations in its willingness to work with civil society organizations and promote democratic transition beyond formerly Soviet countries,</span><sup class="reference" data-dcnode-id="3584" id="cite_ref-35"><a data-dcnode-id="3585" href="#cite_note-35"><span data-dcnode-id="3586" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3583" instrument_node=""> democracy promotion still remained a relatively low priority and Arab regimes were largely able to resist increased pressure from foreign-funded international NGOs in the 1990s.</span><sup class="reference" data-dcnode-id="3580" id="cite_ref-36"><a data-dcnode-id="3581" href="#cite_note-36"><span data-dcnode-id="3582" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3579" instrument_node=""> Nonetheless, the United States spent $250 million on democracy programs in the region from 1991 to 2001, and political reform appeared as a goal in State Department and USAID literature, even if it did not figure prominently in high-level diplomatic discussions.</span><sup class="reference" data-dcnode-id="3576" id="cite_ref-37"><a data-dcnode-id="3577" href="#cite_note-37"><span data-dcnode-id="3578" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3575" instrument_node="">
</span></p><span data-dcnode-id="3573" instrument_node="">
</span><h3 data-dcnode-id="3562"><span data-dcnode-id="3572" id="September_11.2C_2001_and_the_George_W._Bush_administration"></span><span class="mw-headline" data-dcnode-id="3570" id="September_11,_2001_and_the_George_W._Bush_administration"><span data-dcnode-id="3571" instrument_node="">September 11, 2001 and the George W. Bush administration</span></span><span class="mw-editsection" data-dcnode-id="3563"><span class="mw-editsection-bracket" data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">[</span></span><a data-dcnode-id="3566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D8" title="Edit section: September 11, 2001 and the George W. Bush administration"><span data-dcnode-id="3567" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3564"><span data-dcnode-id="3565" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3561" instrument_node="">
</span><p data-dcnode-id="3546"><span data-dcnode-id="3560" instrument_node="">After the </span><a class="mw-redirect" data-dcnode-id="3558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terrorist_attacks_of_September_11%2C_2001" title="Terrorist attacks of September 11, 2001"><span data-dcnode-id="3559" instrument_node="">terrorist attacks of September 11, 2001</span></a><span data-dcnode-id="3557" instrument_node="">, U.S. government officials questioned the lack of large-scale American democracy promotion mechanisms in the MENA region, viewing democracy as a means of promoting moderation and stability and preventing terrorism.</span><sup class="reference" data-dcnode-id="3554" id="cite_ref-38"><a data-dcnode-id="3555" href="#cite_note-38"><span data-dcnode-id="3556" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3553" instrument_node=""> This resulted in a ramping-up of diplomatic rhetoric on the necessity of democratization and political reform in the Middle East and an increase in funding for democracy promotion in the region. Spreading democracy was also one rationalization used by </span><a data-dcnode-id="3551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neoconservatism" title="Neoconservatism"><span data-dcnode-id="3552" instrument_node="">neo-conservatives</span></a><span data-dcnode-id="3550" instrument_node=""> and the Bush administration for undertaking the </span><a class="mw-redirect" data-dcnode-id="3548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_in_Iraq" title="War in Iraq"><span data-dcnode-id="3549" instrument_node="">War in Iraq</span></a><span data-dcnode-id="3547" instrument_node="">.
</span></p><span data-dcnode-id="3545" instrument_node="">
</span><h4 data-dcnode-id="3535"><span class="mw-headline" data-dcnode-id="3543" id="Bottom-up_initiatives"><span data-dcnode-id="3544" instrument_node="">Bottom-up initiatives</span></span><span class="mw-editsection" data-dcnode-id="3536"><span class="mw-editsection-bracket" data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">[</span></span><a data-dcnode-id="3539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D9" title="Edit section: Bottom-up initiatives"><span data-dcnode-id="3540" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3534" instrument_node="">
</span><p data-dcnode-id="3522"><span data-dcnode-id="3533" instrument_node="">The Bush administration initiated several large-scale DG projects, including the </span><a data-dcnode-id="3531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_East_Partnership_Initiative" title="Middle East Partnership Initiative"><span data-dcnode-id="3532" instrument_node="">Middle East Partnership Initiative</span></a><span data-dcnode-id="3530" instrument_node=""> (MEPI) in 2002 and the Broader Middle East and North Africa Initiative (BMENA) in partnership with the </span><a data-dcnode-id="3528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Group_of_Eight" title="Group of Eight"><span data-dcnode-id="3529" instrument_node="">Group of Eight</span></a><span data-dcnode-id="3527" instrument_node=""> in 2004. Different U.S.-funded projects focused on engaging civil society, political party training, and other "bottom-up" strategies, despite resistance on the part of regimes.</span><sup class="reference" data-dcnode-id="3524" id="cite_ref-39"><a data-dcnode-id="3525" href="#cite_note-39"><span data-dcnode-id="3526" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3523" instrument_node="">
</span></p><p data-dcnode-id="3513"><span data-dcnode-id="3521" instrument_node="">The emphasis on engagement with civil society was based in part on the belief that emerged after 9/11 that the absence of good governance allows "uncivil" society to thrive and frustrations that would be otherwise addressed non-violently in a democratic system show themselves in the form of </span><a data-dcnode-id="3519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terrorism" title="Terrorism"><span data-dcnode-id="3520" instrument_node="">terrorism</span></a><span data-dcnode-id="3518" instrument_node="">.</span><sup class="reference" data-dcnode-id="3515" id="cite_ref-40"><a data-dcnode-id="3516" href="#cite_note-40"><span data-dcnode-id="3517" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3514" instrument_node="">
</span></p><span data-dcnode-id="3512" instrument_node="">
</span><h4 data-dcnode-id="3502"><span class="mw-headline" data-dcnode-id="3510" id="Top-down_diplomatic_pressure"><span data-dcnode-id="3511" instrument_node="">Top-down diplomatic pressure</span></span><span class="mw-editsection" data-dcnode-id="3503"><span class="mw-editsection-bracket" data-dcnode-id="3508"><span data-dcnode-id="3509" instrument_node="">[</span></span><a data-dcnode-id="3506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D10" title="Edit section: Top-down diplomatic pressure"><span data-dcnode-id="3507" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3501" instrument_node="">
</span><p data-dcnode-id="3493"><a data-dcnode-id="3499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_W._Bush" title="George W. Bush"><span data-dcnode-id="3500" instrument_node="">President Bush</span></a><span data-dcnode-id="3498" instrument_node=""> presented U.S. involvement in Iraq as an element of promoting democratization across the MENA region,</span><sup class="reference" data-dcnode-id="3495" id="cite_ref-41"><a data-dcnode-id="3496" href="#cite_note-41"><span data-dcnode-id="3497" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3494" instrument_node=""> and his "agenda for freedom" would entail not only more funding for democracy promotion projects, but increased pressure on Arab governments to liberalize.
</span></p><p data-dcnode-id="3485"><span data-dcnode-id="3492" instrument_node="">In a speech at the </span><a class="mw-redirect" data-dcnode-id="3490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_University_in_Cairo" title="American University in Cairo"><span data-dcnode-id="3491" instrument_node="">American University in Cairo</span></a><span data-dcnode-id="3489" instrument_node=""> in July 2005, Secretary of State </span><a data-dcnode-id="3487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Condoleezza_Rice" title="Condoleezza Rice"><span data-dcnode-id="3488" instrument_node="">Condoleezza Rice</span></a><span data-dcnode-id="3486" instrument_node=""> claimed that American intervention in Iraq had resulted in millions of Iraqis resisting terror and participating in democracy, and she pointed to developments in Jordan, Syria, Lebanon, Iran, and Egypt as indicators of democracy's trajectory in the region. In one segment of her speech she outlined several aspects of the Bush administration's view of democratization in the region, including denying that democracy is being imposed from the outside, stressing that democracy would bring peace rather than chaos, pressing leaders in the region to commit to the democratization process, and asserting the incompatibility of terrorism and democracy:
</span></p><span data-dcnode-id="3484" instrument_node="">
</span><dl data-dcnode-id="3478"><dd data-dcnode-id="3479"><span data-dcnode-id="3483" instrument_node="">"Throughout the Middle East, the fear of free choices can no longer justify the denial of liberty. It is time to abandon the excuses that are made to avoid the hard work of democracy. There are those who say that democracy is being imposed. It is tyranny that must be imposed. People choose democracy freely. And successful reform is always homegrown. Just look around the world today. For the first time in history, more people are citizens of democracies than of any other form of government. This is the result of choice, not of coercion. There are those who say that democracy leads to chaos, or conflict, or terror. In fact, the opposite is true: Freedom and democracy are the only ideas powerful enough to overcome hatred, and division, and violence. For people of diverse races and religions, the inclusive nature of democracy can lift the fear of difference that some believe is a license to kill. But people of goodwill must choose to embrace the challenge of listening, and debating, and cooperating with one another. For neighboring countries with turbulent histories, democracy can help to build trust and settle old disputes with dignity. But leaders of vision and character must commit themselves to the difficult work that nurtures the hope of peace. And for all citizens with grievances, democracy can be a path to lasting justice. But the democratic system cannot function if certain groups have one foot in the realm of politics and one foot in the camp of terror."</span><sup class="reference" data-dcnode-id="3480" id="cite_ref-42"><a data-dcnode-id="3481" href="#cite_note-42"><span data-dcnode-id="3482" instrument_node="">[42]</span></a></sup></dd></dl><span data-dcnode-id="3477" instrument_node="">
</span><p data-dcnode-id="3465"><span data-dcnode-id="3476" instrument_node="">A significant democratic stirring in the MENA region ensued from 2004 to 2006, marked by demonstrations, open calls for reform, and enhanced activity on the part of pro-democracy activists, yet U.S. pressure on regimes to implement top-down political reform had declined significantly by mid-2006 following strong parliamentary gains by the Egyptian </span><a data-dcnode-id="3474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muslim_Brotherhood" title="Muslim Brotherhood"><span data-dcnode-id="3475" instrument_node="">Muslim Brotherhood</span></a><span data-dcnode-id="3473" instrument_node=""> in 2005 elections and a </span><a data-dcnode-id="3471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hamas" title="Hamas"><span data-dcnode-id="3472" instrument_node="">Hamas</span></a><span data-dcnode-id="3470" instrument_node=""> victory in the 2006 Palestinian elections. This receding of U.S. diplomatic pressure was criticized by Arab pro-democracy advocates and was followed by an increase in authoritarian crackdowns on political opposition.</span><sup class="reference" data-dcnode-id="3467" id="cite_ref-43"><a data-dcnode-id="3468" href="#cite_note-43"><span data-dcnode-id="3469" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3466" instrument_node="">
</span></p><span data-dcnode-id="3464" instrument_node="">
</span><h4 data-dcnode-id="3454"><span class="mw-headline" data-dcnode-id="3462" id="Criticism_of_the_Bush_administration"><span data-dcnode-id="3463" instrument_node="">Criticism of the Bush administration</span></span><span class="mw-editsection" data-dcnode-id="3455"><span class="mw-editsection-bracket" data-dcnode-id="3460"><span data-dcnode-id="3461" instrument_node="">[</span></span><a data-dcnode-id="3458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D11" title="Edit section: Criticism of the Bush administration"><span data-dcnode-id="3459" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3453" instrument_node="">
</span><p data-dcnode-id="3440"><span data-dcnode-id="3452" instrument_node="">One criticism leveled at the Bush administration's democracy agenda is that short-term strategic and diplomatic imperatives such as cooperation on counter-terrorism, assistance in creating stability in Iraq, and support for the peace process ultimately trumped or diluted the push for reform.</span><sup class="reference" data-dcnode-id="3449" id="cite_ref-44"><a data-dcnode-id="3450" href="#cite_note-44"><span data-dcnode-id="3451" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3448" instrument_node=""> Other critics, such as retired general and former presidential candidate </span><a data-dcnode-id="3446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wesley_Clark" title="Wesley Clark"><span data-dcnode-id="3447" instrument_node="">Wesley Clark</span></a><span data-dcnode-id="3445" instrument_node="">, doubted the effectiveness of American military engagement as a tactic for democracy promotion given that reformers in the region "don't want to have their own hopes and dreams subordinated to the political agenda of the United States," and he attributed signs of progress in the MENA region to the National Endowment for Democracy and international organizations who "have been working with and strengthening reform-minded elements in these countries for years."</span><sup class="reference" data-dcnode-id="3442" id="cite_ref-45"><a data-dcnode-id="3443" href="#cite_note-45"><span data-dcnode-id="3444" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3441" instrument_node="">
</span></p><span data-dcnode-id="3439" instrument_node="">
</span><h3 data-dcnode-id="3429"><span class="mw-headline" data-dcnode-id="3437" id="Obama_administration"><span data-dcnode-id="3438" instrument_node="">Obama administration</span></span><span class="mw-editsection" data-dcnode-id="3430"><span class="mw-editsection-bracket" data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">[</span></span><a data-dcnode-id="3433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D12" title="Edit section: Obama administration"><span data-dcnode-id="3434" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3428" instrument_node="">
</span><p data-dcnode-id="3409"><span data-dcnode-id="3427" instrument_node="">President </span><a data-dcnode-id="3425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barack_Obama" title="Barack Obama"><span data-dcnode-id="3426" instrument_node="">Barack Obama</span></a><span data-dcnode-id="3424" instrument_node=""> attempted to make a distinction between his administration's stance on democracy promotion and that of his predecessors in his June 2009 </span><a data-dcnode-id="3422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A_New_Beginning_%28speech%29" title="A New Beginning (speech)"><span data-dcnode-id="3423" instrument_node="">speech in Cairo</span></a><span data-dcnode-id="3421" instrument_node="">, claiming that "no system of government can or should be imposed upon one nation by any other," while still maintaining his commitment to "governments that reflect the will of the people."</span><sup class="reference" data-dcnode-id="3418" id="cite_ref-46"><a data-dcnode-id="3419" href="#cite_note-46"><span data-dcnode-id="3420" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3417" instrument_node=""> In his September 2010 address to the </span><a class="mw-redirect" data-dcnode-id="3415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UN_General_Assembly" title="UN General Assembly"><span data-dcnode-id="3416" instrument_node="">UN General Assembly</span></a><span data-dcnode-id="3414" instrument_node="">, Obama expressed a commitment to engaging with civil society, yet said: "The ultimate success of democracy in the world won't come because the United States dictates it; it will come because individual citizens demand a say in how they are governed."</span><sup class="reference" data-dcnode-id="3411" id="cite_ref-47"><a data-dcnode-id="3412" href="#cite_note-47"><span data-dcnode-id="3413" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3410" instrument_node="">
</span></p><p data-dcnode-id="3399"><span data-dcnode-id="3408" instrument_node="">There is some indication that the Obama administration may be pursuing a new approach to development, one moving away from military-led development projects</span><sup class="reference" data-dcnode-id="3405" id="cite_ref-48"><a data-dcnode-id="3406" href="#cite_note-48"><span data-dcnode-id="3407" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3404" instrument_node=""> and toward a more independent USAID that will include in its new strategy an effort to reduce poor governance.</span><sup class="reference" data-dcnode-id="3401" id="cite_ref-49"><a data-dcnode-id="3402" href="#cite_note-49"><span data-dcnode-id="3403" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3400" instrument_node="">
</span></p><p data-dcnode-id="3382"><span data-dcnode-id="3398" instrument_node="">Some analysts stress that the Arab regimes have shown themselves to be increasingly intransigent with regards to reform in recent years,</span><sup class="reference" data-dcnode-id="3395" id="cite_ref-50"><a data-dcnode-id="3396" href="#cite_note-50"><span data-dcnode-id="3397" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3394" instrument_node=""> a trend that could require a re-evaluation of U.S. policy and strategy.</span><sup class="reference" data-dcnode-id="3391" id="cite_ref-51"><a data-dcnode-id="3392" href="#cite_note-51"><span data-dcnode-id="3393" instrument_node="">[51]</span></a></sup><span data-dcnode-id="3390" instrument_node=""> Others suggest that the United States should more earnestly push for reforms, including electoral reform, judicial independence, and expansion of freedom of the press and civil society, as well as engage </span><a class="mw-redirect" data-dcnode-id="3388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamist" title="Islamist"><span data-dcnode-id="3389" instrument_node="">Islamist</span></a><span data-dcnode-id="3387" instrument_node=""> political actors.</span><sup class="reference" data-dcnode-id="3384" id="cite_ref-52"><a data-dcnode-id="3385" href="#cite_note-52"><span data-dcnode-id="3386" instrument_node="">[52]</span></a></sup><span data-dcnode-id="3383" instrument_node="">
</span></p><span data-dcnode-id="3381" instrument_node="">
</span><h2 data-dcnode-id="3371"><span class="mw-headline" data-dcnode-id="3379" id="Effectiveness_of_military_intervention"><span data-dcnode-id="3380" instrument_node="">Effectiveness of military intervention</span></span><span class="mw-editsection" data-dcnode-id="3372"><span class="mw-editsection-bracket" data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">[</span></span><a data-dcnode-id="3375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D13" title="Edit section: Effectiveness of military intervention"><span data-dcnode-id="3376" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3373"><span data-dcnode-id="3374" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3370" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3352"><div class="thumbinner" data-dcnode-id="3353" style="width:222px;"><a class="image" data-dcnode-id="3368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKissinger%2C_Ford%2C_Suharto_and_Malik_%28cropped%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="3369" data-file-height="2553" data-file-width="4370" decoding="async" height="129" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Kissinger%252C_Ford%252C_Suharto_and_Malik_%2528cropped%2529.jpg/220px-Kissinger%252C_Ford%252C_Suharto_and_Malik_%2528cropped%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Kissinger%2C_Ford%2C_Suharto_and_Malik_%28cropped%29.jpg/330px-Kissinger%2C_Ford%2C_Suharto_and_Malik_%28cropped%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Kissinger%2C_Ford%2C_Suharto_and_Malik_%28cropped%29.jpg/440px-Kissinger%2C_Ford%2C_Suharto_and_Malik_%28cropped%29.jpg 2x" width="220"></a><span data-dcnode-id="3367" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3354"><div class="magnify" data-dcnode-id="3365"><a class="internal" data-dcnode-id="3366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKissinger%2C_Ford%2C_Suharto_and_Malik_%28cropped%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="3364" instrument_node="">Indonesian President </span><a data-dcnode-id="3362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suharto" title="Suharto"><span data-dcnode-id="3363" instrument_node="">Suharto</span></a><span data-dcnode-id="3361" instrument_node=""> with U.S. President </span><a data-dcnode-id="3359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gerald_Ford" title="Gerald Ford"><span data-dcnode-id="3360" instrument_node="">Gerald Ford</span></a><span data-dcnode-id="3358" instrument_node=""> in Jakarta on 6 December 1975, one day before the </span><a data-dcnode-id="3356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indonesian_invasion_of_East_Timor" title="Indonesian invasion of East Timor"><span data-dcnode-id="3357" instrument_node="">Indonesian invasion of East Timor</span></a><span data-dcnode-id="3355" instrument_node="">.</span></div></div></div><span data-dcnode-id="3351" instrument_node="">
</span><p data-dcnode-id="3327"><span data-dcnode-id="3350" instrument_node="">Studies have been devoted to the historical success rate of the U.S. in exporting democracy abroad. Some studies of American intervention have been pessimistic about the overall effectiveness of U.S. efforts to encourage democracy in foreign nations.</span><sup class="reference" data-dcnode-id="3347" id="cite_ref-operation_53-0"><a data-dcnode-id="3348" href="#cite_note-operation-53"><span data-dcnode-id="3349" instrument_node="">[53]</span></a></sup><span data-dcnode-id="3346" instrument_node=""> Until recently, scholars have generally agreed with international relations professor Abraham Lowenthal that U.S. attempts to export democracy have been "negligible, often counterproductive, and only occasionally positive".</span><sup class="reference" data-dcnode-id="3343" id="cite_ref-Abraham_54-0"><a data-dcnode-id="3344" href="#cite_note-Abraham-54"><span data-dcnode-id="3345" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="3340" id="cite_ref-mark7_55-0"><a data-dcnode-id="3341" href="#cite_note-mark7-55"><span data-dcnode-id="3342" instrument_node="">[55]</span></a></sup><span data-dcnode-id="3339" instrument_node=""> Other studies find </span><a data-dcnode-id="3337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timeline_of_United_States_military_operations" title="Timeline of United States military operations"><span data-dcnode-id="3338" instrument_node="">U.S. intervention</span></a><span data-dcnode-id="3336" instrument_node=""> has had mixed results,</span><sup class="reference" data-dcnode-id="3333" id="cite_ref-operation_53-1"><a data-dcnode-id="3334" href="#cite_note-operation-53"><span data-dcnode-id="3335" instrument_node="">[53]</span></a></sup><span data-dcnode-id="3332" instrument_node=""> and another by Hermann and Kegley has found that military interventions have improved democracy in other countries.</span><sup class="reference" data-dcnode-id="3329" id="cite_ref-promote_56-0"><a data-dcnode-id="3330" href="#cite_note-promote-56"><span data-dcnode-id="3331" instrument_node="">[56]</span></a></sup><span data-dcnode-id="3328" instrument_node="">
</span></p><span data-dcnode-id="3326" instrument_node="">
</span><h3 data-dcnode-id="3316"><span class="mw-headline" data-dcnode-id="3324" id="Opinion_that_U.S._intervention_does_not_export_democracy"><span data-dcnode-id="3325" instrument_node="">Opinion that U.S. intervention does not export democracy</span></span><span class="mw-editsection" data-dcnode-id="3317"><span class="mw-editsection-bracket" data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node="">[</span></span><a data-dcnode-id="3320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDemocracy_promotion_by_the_United_States%26action%3Dedit%26section%3D14" title="Edit section: Opinion that U.S. intervention does not export democracy"><span data-dcnode-id="3321" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3315" instrument_node="">
</span><p data-dcnode-id="3280"><span data-dcnode-id="3314" instrument_node="">In </span><a data-dcnode-id="3312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="3313" instrument_node="">United States</span></a><span data-dcnode-id="3311" instrument_node=""> history, critics have charged that </span><a data-dcnode-id="3309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_the_United_States" title="President of the United States"><span data-dcnode-id="3310" instrument_node="">presidents</span></a><span data-dcnode-id="3308" instrument_node=""> have used </span><a data-dcnode-id="3306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy" title="Democracy"><span data-dcnode-id="3307" instrument_node="">democracy</span></a><span data-dcnode-id="3305" instrument_node=""> to justify </span><a data-dcnode-id="3303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timeline_of_United_States_military_operations" title="Timeline of United States military operations"><span data-dcnode-id="3304" instrument_node="">military intervention</span></a><span data-dcnode-id="3302" instrument_node=""> abroad.</span><sup class="reference" data-dcnode-id="3299" id="cite_ref-Why_57-0"><a data-dcnode-id="3300" href="#cite_note-Why-57"><span data-dcnode-id="3301" instrument_node="">[57]</span></a></sup><sup class="reference" data-dcnode-id="3296" id="cite_ref-Meernik_1996_391_58-0"><a data-dcnode-id="3297" href="#cite_note-Meernik_1996_391-58"><span data-dcnode-id="3298" instrument_node="">[58]</span></a></sup><span data-dcnode-id="3295" instrument_node=""> Critics have also charged that the U.S. helped local militaries overthrow democratically elected governments in </span><a data-dcnode-id="3293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1953_Iranian_coup_d%27%25C3%25A9tat" title="1953 Iranian coup d'état"><span data-dcnode-id="3294" instrument_node="">Iran</span></a><span data-dcnode-id="3292" instrument_node="">, </span><a data-dcnode-id="3290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1954_Guatemalan_coup_d%27%25C3%25A9tat" title="1954 Guatemalan coup d'état"><span data-dcnode-id="3291" instrument_node="">Guatemala</span></a><span data-dcnode-id="3289" instrument_node="">, and in other instances.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3282" style="white-space:nowrap;"><span data-dcnode-id="3288" instrument_node="">[</span><i data-dcnode-id="3284"><a data-dcnode-id="3285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3286" title="This claim needs references to reliable sources. (July 2021)"><span data-dcnode-id="3287" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3283" instrument_node="">]</span></sup><span data-dcnode-id="3281" instrument_node="">
</span></p><p data-dcnode-id="3251"><span data-dcnode-id="3279" instrument_node="">Professor Paul W. Drake argued that the U.S. first attempted to export </span><a data-dcnode-id="3277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy" title="Democracy"><span data-dcnode-id="3278" instrument_node="">democracy</span></a><span data-dcnode-id="3276" instrument_node=""> in </span><a data-dcnode-id="3274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latin_America" title="Latin America"><span data-dcnode-id="3275" instrument_node="">Latin America</span></a><span data-dcnode-id="3273" instrument_node=""> through intervention from 1912 to 1932. Drake argued that this was contradictory because international law defines </span><a data-dcnode-id="3271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Invasion" title="Invasion"><span data-dcnode-id="3272" instrument_node="">intervention</span></a><span data-dcnode-id="3270" instrument_node=""> as "dictatorial interference in the affairs of another state for the purpose of altering the condition of things". The study suggested that efforts to promote democracy failed because democracy needs to develop out of internal conditions, and can not be forcibly imposed. There was disagreement about what constituted </span><i data-dcnode-id="3267"><a data-dcnode-id="3268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy" title="Democracy"><span data-dcnode-id="3269" instrument_node="">democracy</span></a></i><span data-dcnode-id="3266" instrument_node="">; Drake suggested American leaders sometimes defined democracy in a narrow sense of a nation having elections; Drake suggested a broader understanding was needed. Further, there was disagreement about what constituted a "rebellion"; Drake saw a pattern in which the </span><a data-dcnode-id="3264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Department_of_State" title="United States Department of State"><span data-dcnode-id="3265" instrument_node="">U.S. State Department</span></a><span data-dcnode-id="3263" instrument_node=""> disapproved of any type of rebellion, even so-called "revolutions", and in some instances rebellions against dictatorships.</span><sup class="reference" data-dcnode-id="3260" id="cite_ref-LA1_59-0"><a data-dcnode-id="3261" href="#cite_note-LA1-59"><span data-dcnode-id="3262" instrument_node="">[59]</span></a></sup><span data-dcnode-id="3259" instrument_node=""> Historian </span><a data-dcnode-id="3257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walter_LaFeber" title="Walter LaFeber"><span data-dcnode-id="3258" instrument_node="">Walter LaFeber</span></a><span data-dcnode-id="3256" instrument_node=""> stated, "The world's leading revolutionary nation (the U.S.) in the eighteenth century became the leading protector of the status quo in the twentieth century."</span><sup class="reference" data-dcnode-id="3253" id="cite_ref-Walter_60-0"><a data-dcnode-id="3254" href="#cite_note-Walter-60"><span data-dcnode-id="3255" instrument_node="">[60]</span></a></sup><span data-dcnode-id="3252" instrument_node="">
</span></p><p data-dcnode-id="3229"><a data-dcnode-id="3249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bruce_Bueno_de_Mesquita" title="Bruce Bueno de Mesquita"><span data-dcnode-id="3250" instrument_node="">Mesquita</span></a><span data-dcnode-id="3248" instrument_node=""> and Downs evaluated 35 U.S. interventions from 1945 to 2004 and concluded that in only one case, </span><a data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colombia" title="Colombia"><span data-dcnode-id="3247" instrument_node="">Colombia</span></a><span data-dcnode-id="3245" instrument_node="">, did a "full fledged, stable democracy" develop within ten years following the intervention.</span><sup class="reference" data-dcnode-id="3242" id="cite_ref-Why2_61-0"><a data-dcnode-id="3243" href="#cite_note-Why2-61"><span data-dcnode-id="3244" instrument_node="">[61]</span></a></sup><sup class="reference" data-dcnode-id="3239" id="cite_ref-62"><a data-dcnode-id="3240" href="#cite_note-62"><span data-dcnode-id="3241" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3238" instrument_node=""> Samia Amin Pei argued that nation building in developed countries usually unravelled four to six years after American intervention ended. Pei, based on study of a database on worldwide democracies called </span><i data-dcnode-id="3235"><a data-dcnode-id="3236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polity" title="Polity"><span data-dcnode-id="3237" instrument_node="">Polity</span></a></i><span data-dcnode-id="3234" instrument_node="">, agreed with Mesquita and Downs that U.S. intervention efforts usually don't produce real democracies, and that most cases result in greater authoritarianism after ten years.</span><sup class="reference" data-dcnode-id="3231" id="cite_ref-63"><a data-dcnode-id="3232" href="#cite_note-63"><span data-dcnode-id="3233" instrument_node="">[63]</span></a></sup><span data-dcnode-id="3230" instrument_node="">
</span></p><p data-dcnode-id="3194"><span data-dcnode-id="3228" instrument_node="">Professor </span><a data-dcnode-id="3226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joshua_Muravchik" title="Joshua Muravchik"><span data-dcnode-id="3227" instrument_node="">Joshua Muravchik</span></a><span data-dcnode-id="3225" instrument_node=""> argued U.S. occupation was critical for </span><a data-dcnode-id="3223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Axis_powers" title="Axis powers"><span data-dcnode-id="3224" instrument_node="">Axis power</span></a><span data-dcnode-id="3222" instrument_node=""> democratization after </span><a data-dcnode-id="3220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="3221" instrument_node="">World War II</span></a><span data-dcnode-id="3219" instrument_node="">, but America's failure to encourage democracy in the </span><a data-dcnode-id="3217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_World" title="Third World"><span data-dcnode-id="3218" instrument_node="">third world</span></a><span data-dcnode-id="3216" instrument_node=""> "prove&nbsp;... that U.S. military occupation is not a sufficient condition to make a country democratic".</span><sup class="reference" data-dcnode-id="3213" id="cite_ref-Mark4_64-0"><a data-dcnode-id="3214" href="#cite_note-Mark4-64"><span data-dcnode-id="3215" instrument_node="">[64]</span></a></sup><sup class="reference" data-dcnode-id="3210" id="cite_ref-joshua_65-0"><a data-dcnode-id="3211" href="#cite_note-joshua-65"><span data-dcnode-id="3212" instrument_node="">[65]</span></a></sup><span data-dcnode-id="3209" instrument_node=""> The success of democracy in former Axis countries such as </span><a data-dcnode-id="3207" href="https://chatnoir
