-id="365"><span data-dcnode-id="366" instrument_node="">professor</span></span></h6></div><div class="_1Q9if" data-dcnode-id="358" data-testid="richTextElement" id="comp-ksuzlwbz"><p class="font_9" data-dcnode-id="359" style="font-size:14px;"><span class="color_11" data-dcnode-id="360"><span data-dcnode-id="361" style="font-size:14px;"><span data-dcnode-id="362" instrument_node="">Andre Kamenshikov is a civil society activist in the field of peacebuilding, with both a US and Russian background. He graduated Moscow State University majoring in sociology in 1991 as well as studied various subjects in Carroll College, Waukesha, Wisconsin and undertook courses in human rights and other relevant topics. He is the representative of a US-based NGO Nonviolence International and the regional coordinator of an international civil society network - the Global Partnership for the Prevention of Armed Conflict (GPPAC) in the Eastern Europe region. He has over 28 years of experience as a civil peacebuilding activist in conflict areas of the ex-USSR and was a founder of a few civil society organizations in those countries. For 22 years he was based in Russia, till the political climate forced him to move to Kyiv, Ukraine, where he continues working with the local civil society sector on enhancing its capacities to contribute to peace and democratic development of the country.&nbsp; He is an author of a number of publications about the role of civil society in post-soviet conflicts, including “International experience of civilian peacebuilding in the post-soviet space” (2016), the “Strategic framework for the development of civil peacebuilding activities in Ukraine” (2017).</span></span></span></p></div></div></div></div></div></section><section class="_3d64y" data-dcnode-id="296" id="comp-ksusk9ir"><div class="_3wnIc" data-dcnode-id="350" data-hook="bgLayers" id="bgLayers_comp-ksusk9ir"><div class="_3KzuS _3SQN-" data-dcnode-id="352" data-testid="colorUnderlay"></div><div class="_2
