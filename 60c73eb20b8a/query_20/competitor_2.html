</span><p data-dcnode-id="1391"><strong data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">It Starts With the Plan</span></strong></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Basically writing up a business plan for your decorating business should be the first step. Determine whether you will be a product-driven designer who conceptualizes the design and sells necessary products to the client, or simply a consultant who does not sell products. Mainly designers with less experience usually begin as product-driven designers.</span></p><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1384"><strong data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Research the Competition</span></strong></p><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Always research other decorating companies in your area to see what they specialize in, how much they charge, and what their designs look like. </span></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Always try to consider how you can mainly set yourself apart from other design companies by offering a different style of design, specializing in certain types of design, mainly as Colonial, always offering lower prices, or by specializing in specific areas such as window treatments or use of color and light.</span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1374"><strong data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Determine What You Need to Get Started</span></strong></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Make a list of equipment you’ll need to get started and determine how much capital you will need.</span></p><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1367"><strong data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Licenses and Registration</span></strong></p><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Apply for a business license by going to your local city hall or county clerk’s office to fill out an application, or do it online if that’s an available option in your jurisdiction. </span></p><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1358"><span data-dcnode-id="1362" instrument_node="">If you plan or hope to employ others, subcontract to a builder, or build credit under the </span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebrandboy.com/2001-creative-cool-business-name-ideas/"><span data-dcnode-id="1361" instrument_node="">business name</span></a><span data-dcnode-id="1359" instrument_node=""> rather than your own, you’ll also need to apply for mainly an Employer Identification Number or EIN from the Internal Revenue Service.</span></p><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1354"><strong data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Making Industry Contacts</span></strong></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">You’ll also need to connect with suppliers. So, research companies who manufacture flooring, fabrics, carpet, wall coverings, and furniture, or distributors who represent multiple lines. </span></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Mainly interior decorators can get discounts of up to 50 percent from certain manufacturers, so shop around to find out who will give you the best deals. This way you can pass savings on to your clients.</span></p><span data-dcnode-id="1347" instrument_node="">
