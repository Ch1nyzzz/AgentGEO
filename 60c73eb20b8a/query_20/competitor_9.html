</span><article class="readmore-js-section" data-dcnode-id="242" style="height: 150px;"><span data-dcnode-id="315" instrument_node="">
</span><h2 data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Our Mantra</span></h2><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">The Southeast has always been proud of its heritage and hospitality; we at Decor South are no exception. We'd like to spread a little bit of our Southern charm to your "neck of the woods" -- be it Seattle or South Beach.</span></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Since 1994, we've offered our customers quality home furniture and furnishings at prices below retail. With a distinctive taste and an eye for quality, we understand the importance of being surrounded by things we love. Design and decoration is our passion and we'd like to share it with you.</span></p><span data-dcnode-id="306" instrument_node="">
</span><h2 data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Your Style, Your Taste, Delivered…</span></h2><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">There’s no place like home – especially when that home is decorated
      to showcase your individual style and taste. Transforming your home into
      a showcase that perfectly displays your personality means finding just the
      right pieces at just the right prices -- that’s where we can help.</span></p><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Whether you live in a cozy apartment or an expansive estate, a major part
      of what makes your house a home is what you put inside its walls. The furnishings
      you choose, the colors you select, and your choice of accessories will all
      be a reflection of you.&nbsp; What does your home say about you?</span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">We want to help you make your home a haven for you and your family. Décor
      South showcases home furnishings selections and lets you in on interior design
      secrets you can use to give a room distinctive flair and a signature style
      that makes it unique and your own.</span></p><span data-dcnode-id="294" instrument_node="">
</span><h2 data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Great. But What’s My Style?</span></h2><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">It’s difficult to choose a direction for your home’s interior
      if you’re unsure of your style. So, take some time to discover what “speaks” to
      you by studying home décor magazines, visiting online decorating sites,
      watching home improvement or design TV shows, and visiting friends and neighborhood
      homes. Before long, you’ll start seeing a pattern. Do you find yourself
      drawn to darker hues or to colorful prints? Do rich woods charm you or are
      you more attracted to lighter, airy pieces fashioned from glass or metal?
      Do you like frills and florals, or do you prefer a simpler design with straight,
      sleek lines and monochromatic color schemes? Would you rather sit on leather
      or chintz?</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">It’s not necessary to hire an interior designer. Though a designer
      can help you put a name to your style, and show you many things you would
      have never uncovered on your own, there’s no rule that says you must
      be able to differentiate between mid-century modern, art deco, or urban chic.
      You do, however, need to know what makes you feel good.</span></p><span data-dcnode-id="285" instrument_node="">
</span><h2 data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Room Choices. Color Helps Set the Mood</span></h2><span data-dcnode-id="282" instrument_node="">
</span><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Your decorating decisions create a room’s ambience. The way you plan
      to use that space should guide your design choices. Ask yourself if this
      is a space that you want to feel formal, or if a more casual atmosphere your
      goal? Is this a room where you work, play, or rest?</span></p><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Color plays a big role in setting the mood. Reds tend to whet the appetite
      and increase energy so are often a good choice for dining rooms, while cooler
      shades of blue create more tranquil atmospheres and work well in bedrooms
      and baths. Shades of orange are cheerful and welcoming&nbsp; and yellow is
      a happy color for play rooms or a home office. Greens relieve stress and
      are considered neutrals so they work well in any room. Browns are sophisticated
      and warm and shades of purple inspire creativity.</span></p><span data-dcnode-id="276" instrument_node="">
</span><p data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">If you prefer to minimize the use bold colors opt for neutral shades in the
      main areas but add pinches of color to keep the room feeling engaging and
      fresh. For instance pick a brightly hued lamp, let an area rug make a splash
      of color on the floor, or add colorful pillows to a sofa to brighten up an
      otherwise monochrome room.</span></p><span data-dcnode-id="273" instrument_node="">
</span><h2 data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Choose Furniture for Function as well as Style</span></h2><span data-dcnode-id="270" instrument_node="">
</span><p data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">We all want our furniture to look stylish and be comfortable but it’s
      also there to do a job. Sometimes furniture can even perform multiple functions.
      For instance, if space is an issue choosing an ottoman that can also be used
      for storage and fill in as extra seating makes the area more functional without
      taking away from the style.</span></p><span data-dcnode-id="267" instrument_node="">
</span><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Other dual purpose pieces include lift-top cocktail tables, a chair that
      flips into a bed for guests, or a bed with storage drawers beneath it. You’ll
      find furniture that can solve a variety of challenges.</span></p><span data-dcnode-id="264" instrument_node="">
</span><h2 data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">Make a Statement with Accessories</span></h2><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">After you’ve chosen your functional furnishings like sofas, chairs,
      tables and bedroom furniture, accessories are a good way to further personalize
      your room and place your unique stamp on it. They pull a room together and
      give it a finished look. They’re also the ideal way to show off the
      interests and activities of your family members. Souvenirs from your travels,
      tastefully framed candid photos of special events, or handcrafted artworks
      are all tantalizing ways to add interest and breathe life into a room.</span></p><span data-dcnode-id="258" instrument_node="">
</span><h2 data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">Décor South Brings the Furniture Store to You</span></h2><span data-dcnode-id="255" instrument_node="">
</span><p data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Creating the right interior doesn’t usually happen overnight. It takes
      time to find just the right sofa, dining table, and bedroom furniture and
      to select the ideal accessories for your rooms. It’s continuous work
      in progress as your tastes change and develop and the needs of your family
      evolve.</span></p><span data-dcnode-id="252" instrument_node="">
</span><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Yet you don’t have a lot of time to spend flitting from store to store
      during business hours; that’s why shopping online makes so much sense.
      It allows you to sit back and relax in your favorite chair and shop at your
      leisure. No fighting traffic, no going out in inclement weather, no dragging
      the kids along to stores filled with breakables, and no dealing with pushy
      salespeople. When you shop online at Décor South &nbsp;you can truly
      focus on what suits you best.</span></p><span data-dcnode-id="249" instrument_node="">
</span><p data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">At Décor South you’ll find a vast selection of quality furniture
      at surprisingly low prices. There are styles to suit everyone. You’ll
      find elegant armoires, sophisticated side tables, complete bedroom sets,
      and many other types of furniture as well. Whether you’re in the market
      for budget conscious ready-to-assemble furniture, or heirloom quality pieces,
      it’s all here for you.</span></p><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Decorating your home is easy with Décor South. Shop our online store,
      make your selections, and get a price that will make you smile and delivery
      right to your door. It’s simple to start creating the home of your
      dreams. You’ll soon be saying there’s no place like home…especially
      with a little help from Décor South.</span></p><span data-dcnode-id="243" instrument_node="">
