</span><div class="entry-wrap" data-dcnode-id="2906"><span data-dcnode-id="3402" instrument_node="">
</span><div class="ezoic-ai-restricted-element" data-dcnode-id="3069"><span data-dcnode-id="3401" instrument_node="">
</span><p data-dcnode-id="3396"><span data-dcnode-id="3400" instrument_node="">Family businesses account for 64 percent of U.S. gross domestic product and generate 62 percent of the country’s employment, </span><a data-dcnode-id="3398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.familybusinesscenter.com/resources/family-business-facts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3399" instrument_node="">according to</span></a><span data-dcnode-id="3397" instrument_node=""> the Conway Center for Family Business. So starting a family business can be a popular way to make a living. If you’re interested in starting your own family business, take a look at the potential list of family business opportunities below.</span></p><span data-dcnode-id="3395" instrument_node="">
</span><hr class="clear" data-dcnode-id="3394"><span data-dcnode-id="3393" instrument_node="">
</span><div class="content-ad-wrap" data-dcnode-id="3388"><span data-dcnode-id="3392" instrument_node="">
</span><div data-dcnode-id="3390" id="ezoic-pub-ad-placeholder-115"><span data-dcnode-id="3391" instrument_node="">
</span></div><span data-dcnode-id="3389" instrument_node="">
</span></div><hr class="clear" data-dcnode-id="3387"><h2 data-dcnode-id="3385"><span data-dcnode-id="3386" instrument_node="">Family Business Ideas</span></h2><span data-dcnode-id="3384" instrument_node="">
</span><h3 data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">Family Restaurant</span></h3><span data-dcnode-id="3381" instrument_node="">
</span><p data-dcnode-id="3379"><img alt="50 Family Business Ideas - Family Restaurant" class="aligncenter wp-image-422299 size-general_850w_image" data-dcnode-id="3380" height="567" sizes="(max-width: 850px) 100vw, 850px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.smallbiztrends.com/2016/11/shutterstock_243416983-850x567.jpg&amp;raw" srcset="https://media.smallbiztrends.com/2016/11/shutterstock_243416983-150x100.jpg 150w, https://media.smallbiztrends.com/2016/11/shutterstock_243416983-300x200.jpg 300w, https://media.smallbiztrends.com/2016/11/shutterstock_243416983-620x414.jpg 620w, https://media.smallbiztrends.com/2016/11/shutterstock_243416983-660x440.jpg 660w, https://media.smallbiztrends.com/2016/11/shutterstock_243416983-768x512.jpg 768w, https://media.smallbiztrends.com/2016/11/shutterstock_243416983-850x567.jpg 850w" width="850"></p><span data-dcnode-id="3378" instrument_node="">
</span><p data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">Starting a restaurant as a family can be a great business opportunity, since it’s a business that requires multiple people and different skill sets. And family restaurants can really appeal to people in the local community.</span></p><span data-dcnode-id="3375" instrument_node="">
</span><h3 data-dcnode-id="3373"><span data-dcnode-id="3374" instrument_node="">Family Band</span></h3><span data-dcnode-id="3372" instrument_node="">
</span><p data-dcnode-id="3370"><span data-dcnode-id="3371" instrument_node="">If the members of your family are musically inclined, you can start a band together and play at local venues or events or even go on tours.</span></p><span data-dcnode-id="3369" instrument_node="">
</span><h3 data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">Family Blog</span></h3><span data-dcnode-id="3366" instrument_node="">
</span><p data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">Blogging is a great business opportunity for people in all kinds of different niches. So you can start a blog with your family about different family activities or other things that interest you.</span></p><span data-dcnode-id="3363" instrument_node="">
</span><h3 data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">Local Newspaper</span></h3><span data-dcnode-id="3360" instrument_node="">
</span><p data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">Or you could start a newspaper or other print publication aimed at people in your local area that all the members of your family can contribute to.</span></p><span data-dcnode-id="3357" instrument_node="">
</span><div class="quads-location quads-ad9" data-dcnode-id="3350" id="quads-ad9" style="float:none;margin:3px;"><span data-dcnode-id="3356" instrument_node="">
</span><hr class="clear" data-dcnode-id="3355"><div data-dcnode-id="3353" id="ezoic-pub-ad-placeholder-106"><span data-dcnode-id="3354" instrument_node=""> </span></div><hr class="clear" data-dcnode-id="3352"><span data-dcnode-id="3351" instrument_node="">
</span></div><span data-dcnode-id="3349" instrument_node="">
</span><h3 data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">Niche Website</span></h3><span data-dcnode-id="3346" instrument_node="">
</span><p data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">You can also start a website in a specific niche that offers information or provides a forum for people to communicate with one another. And you can charge a membership fee or make money through ads or affiliate links.</span></p><span data-dcnode-id="3343" instrument_node="">
</span><h3 data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">Farm</span></h3><span data-dcnode-id="3340" instrument_node="">
</span><p data-dcnode-id="3338"><img alt="50 Family Business Ideas - Farm" class="aligncenter wp-image-422300 size-general_850w_image" data-dcnode-id="3339" height="566" sizes="(max-width: 850px) 100vw, 850px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.smallbiztrends.com/2016/11/shutterstock_146767445-850x566.jpg&amp;raw" srcset="https://media.smallbiztrends.com/2016/11/shutterstock_146767445-150x100.jpg 150w, https://media.smallbiztrends.com/2016/11/shutterstock_146767445-300x200.jpg 300w, https://media.smallbiztrends.com/2016/11/shutterstock_146767445-620x413.jpg 620w, https://media.smallbiztrends.com/2016/11/shutterstock_146767445-660x440.jpg 660w, https://media.smallbiztrends.com/2016/11/shutterstock_146767445-768x511.jpg 768w, https://media.smallbiztrends.com/2016/11/shutterstock_146767445-850x566.jpg 850w" width="850"></p><span data-dcnode-id="3337" instrument_node="">
</span><p data-dcnode-id="3332"><span data-dcnode-id="3336" instrument_node="">If you have access to land and other resources, </span><a data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//smallbiztrends.com/2014/08/tech-run-small-farming-business.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3335" instrument_node="">family farming</span></a><span data-dcnode-id="3333" instrument_node=""> can be a very viable business opportunity.</span></p><span data-dcnode-id="3331" instrument_node="">
</span><h3 data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">Contracting Business</span></h3><span data-dcnode-id="3328" instrument_node="">
</span><p data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">You can also start a general contracting business where you do home repairs and remodeling projects with family members. Or you can even have some family members run the business side while others focus on the actual contracting work.</span></p><span data-dcnode-id="3325" instrument_node="">
</span><div class="quads-location quads-ad1" data-dcnode-id="3319" id="quads-ad1" style="float:none;margin:3px 0 3px 0;text-align:center;"><span data-dcnode-id="3324" instrument_node="">

</span><p data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">You can also offer to run various errands for clients in your area, including laundry, grocery shopping and more. And you can even have different family members that specialize in different areas.</span></p><span data-dcnode-id="3020" instrument_node="">
</span><h3 data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">Interior Design Service</span></h3><span data-dcnode-id="3017" instrument_node="">
</span><p data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">Design savvy families can also start a business offering interior design services, which can require people with several different skill sets.</span></p><span data-dcnode-id="3014" instrument_node="">
</span><h3 data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">Home Staging Business</span></h3><span data-dcnode-id="3011" instrument_node="">
</span><p data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">You can also start a business that offers home staging services for consumers who are getting ready to sell or rent their homes.</span></p><span data-dcnode-id="3008" instrument_node="">
</span><h3 data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">Seasonal Decorating Business</span></h3><span data-dcnode-id="3005" instrument_node="">
</span><p data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">Or you could focus on helping homeowners or even local business owners decorate their spaces for the holidays.</span></p><span data-dcnode-id="3002" instrument_node="">
</span><h3 data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">Alterations Service</span></h3><span data-dcnode-id="2999" instrument_node="">
</span><p data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">You could also start a tailoring or clothing alterations business where customers bring in their clothing and other garments to be altered.</span></p><span data-dcnode-id="2996" instrument_node="">
</span><h3 data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">Antique Store</span></h3><span data-dcnode-id="2993" instrument_node="">
</span><p data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">If you want to open a brick and mortar store, you can open an antique store or mall in your community and have your family help you operate all the different aspects of the business.</span></p><span data-dcnode-id="2990" instrument_node="">
</span><h3 data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">Heating and Cooling Business</span></h3><span data-dcnode-id="2987" instrument_node="">
</span><p data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">For those who have the education and training, you can start a business where you offer repair services for people’s heating and cooling units.</span></p><span data-dcnode-id="2984" instrument_node="">
</span><h3 data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">Car Wash</span></h3><span data-dcnode-id="2981" instrument_node="">
</span><p data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">You can also start a car wash business in your community either by opening your own location or traveling to customers to provide detailing services.</span></p><span data-dcnode-id="2978" instrument_node="">
</span><h3 data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">House Flipping Business</span></h3><span data-dcnode-id="2975" instrument_node="">
</span><p data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">If you have the resources to purchase and fix up properties, you can start a business flipping and selling homes in your area.</span></p><span data-dcnode-id="2972" instrument_node="">
</span><h3 data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">Pool Cleaning Service</span></h3><span data-dcnode-id="2969" instrument_node="">
</span><p data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">You can also provide pool cleaning services for local homeowners during the summer months.</span></p><span data-dcnode-id="2966" instrument_node="">
</span><h3 data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">Moving Service</span></h3><span data-dcnode-id="2963" instrument_node="">
</span><p data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">Or you could start a packing and moving service. You can have the whole family actually help with the moving, or some can run the business aspects while others provide the services.</span></p><span data-dcnode-id="2960" instrument_node="">

</span></div><div class="acsb-popup acsb-statement-popup" data-acsb-popup="acsb-statement-popup" data-dcnode-id="105" tabindex="0"><span data-dcnode-id="285" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="284"></div><span data-dcnode-id="283" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="107" role="dialog"><span data-dcnode-id="282" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="278" role="button" tabindex="0"><span data-dcnode-id="281" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="280"></i><span data-dcnode-id="279" instrument_node=""> </span></span><span data-dcnode-id="277" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="109"><span data-dcnode-id="276" instrument_node=""> </span><div class="acsb-statement" data-dcnode-id="111"><strong class="acsb-title-main" data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Accessibility Statement</span></strong><strong class="acsb-title" data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Compliance status</span></strong><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">We firmly believe that the internet should be available and accessible to anyone and are committed to providing a website that is accessible to the broadest possible audience, regardless of ability.</span></p><span data-dcnode-id="268" instrument_node="">
</span><p data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">To fulfill this, we aim to adhere as strictly as possible to the World Wide Web Consortium’s (W3C) Web Content Accessibility Guidelines 2.1 (WCAG 2.1) at the AA level. These guidelines explain how to make web content accessible to people with a wide array of disabilities. Complying with those guidelines helps us ensure that the website is accessible to blind people, people with motor impairments, visual impairment, cognitive disabilities, and more.</span></p><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">This website utilizes various technologies that are meant to make it as accessible as possible at all times. We utilize an accessibility interface that allows persons with specific disabilities to adjust the website’s UI (user interface) and design it to their personal needs.</span></p><span data-dcnode-id="262" instrument_node="">
</span><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Additionally, the website utilizes an AI-based application that runs in the background and optimizes its accessibility level constantly. This application remediates the website’s HTML, adapts its functionality and behavior for screen-readers used by blind users, and for keyboard functions used by individuals with motor impairments.</span></p><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">If you wish to contact the website’s owner please use the website's form</span></p><span data-dcnode-id="256" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Screen-reader and keyboard navigation</span></strong><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Our website implements the ARIA attributes (Accessible Rich Internet Applications) technique, alongside various behavioral changes, to ensure blind users visiting with screen-readers can read, comprehend, and enjoy the website’s functions. As soon as a user with a screen-reader enters your site, they immediately receive a prompt to enter the Screen-Reader Profile so they can browse and operate your site effectively. Here’s how our website covers some of the most important screen-reader requirements:</span></p><span data-dcnode-id="250" instrument_node="">
</span><ol data-dcnode-id="224"><span data-dcnode-id="249" instrument_node="">
</span><li data-dcnode-id="237"><strong class="acsb-title" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Screen-reader optimization:&nbsp;</span></strong><span data-dcnode-id="246" instrument_node="">we run a process that learns the website’s components from top to bottom, to ensure ongoing compliance even when updating the website. In this process, we provide screen-readers with meaningful data using the ARIA set of attributes. For example, we provide accurate form labels; descriptions for actionable icons (social media icons, search icons, cart icons, etc.); validation guidance for form inputs; element roles such as buttons, menus, modal dialogues (popups), and others.&nbsp;</span><br data-dcnode-id="245"><br data-dcnode-id="244"><span data-dcnode-id="243" instrument_node="">Additionally, the background process scans all of the website’s images. It provides an accurate and meaningful image-object-recognition-based description as an ALT (alternate text) tag for images that are not described. It will also extract texts embedded within the image using an OCR (optical character recognition) technology. To turn on screen-reader adjustments at any time, users need only to press the Alt+1 keyboard combination. Screen-reader users also get automatic announcements to turn the Screen-reader mode on as soon as they enter the website.</span><br data-dcnode-id="242"><br data-dcnode-id="241"><span data-dcnode-id="240" instrument_node="">These adjustments are compatible with popular screen readers such as JAWS, NVDA, VoiceOver, and TalkBack.</span><br data-dcnode-id="239"><br data-dcnode-id="238"></li><span data-dcnode-id="236" instrument_node="">
</span><li data-dcnode-id="226"><strong class="acsb-title" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Keyboard navigation optimization:&nbsp;</span></strong><span data-dcnode-id="233" instrument_node="">The background process also adjusts the website’s HTML and adds various behaviors using JavaScript code to make the website operable by the keyboard. This includes the ability to navigate the website using the Tab and Shift+Tab keys, operate dropdowns with the arrow keys, close them with Esc, trigger buttons and links using the Enter key, navigate between radio and checkbox elements using the arrow keys, and fill them in with the Spacebar or Enter key.</span><br data-dcnode-id="232"><br data-dcnode-id="231"><span data-dcnode-id="230" instrument_node="">Additionally, keyboard users will find content-skip menus available at any time by clicking Alt+2, or as the first element of the site while navigating with the keyboard. The background process also handles triggered popups by moving the keyboard focus towards them as soon as they appear, not allowing the focus to drift outside.</span><br data-dcnode-id="229"><br data-dcnode-id="228"><span data-dcnode-id="227" instrument_node="">Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="225" instrument_node="">
</span></ol><span data-dcnode-id="223" instrument_node="">
</span><strong data-dcnode-id="220" style="border-color: var(--mce-guidelines);"><span data-dcnode-id="221" lang="EN-US"><span data-dcnode-id="222" instrument_node="">Disability profiles supported on our website</span></span></strong><span data-dcnode-id="219" instrument_node="">
</span><ul data-dcnode-id="187"><span data-dcnode-id="218" instrument_node="">
</span><li data-dcnode-id="214"><strong class="acsb-title" data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">Epilepsy Safe Profile:</span></strong><span data-dcnode-id="215" instrument_node=""> this profile enables people with epilepsy to safely use the website by eliminating the risk of seizures resulting from flashing or blinking animations and risky color combinations.</span></li><span data-dcnode-id="213" instrument_node="">
</span><li data-dcnode-id="209"><strong class="acsb-title" data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Vision Impaired Profile:</span></strong><span data-dcnode-id="210" instrument_node=""> this profile adjusts the website so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others.</span></li><span data-dcnode-id="208" instrument_node="">
</span><li data-dcnode-id="204"><strong class="acsb-title" data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">Cognitive Disability Profile:</span></strong><span data-dcnode-id="205" instrument_node=""> this profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements more easily.</span></li><span data-dcnode-id="203" instrument_node="">
</span><li data-dcnode-id="199"><strong class="acsb-title" data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">ADHD Friendly Profile</span></strong><span data-dcnode-id="200" instrument_node="">: this profile significantly reduces distractions and noise to help people with ADHD, and Neurodevelopmental disorders browse, read, and focus on the essential elements more easily.</span></li><span data-dcnode-id="198" instrument_node="">
</span><li data-dcnode-id="194"><strong class="acsb-title" data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Blind Users Profile (Screen-readers):</span></strong><span data-dcnode-id="195" instrument_node=""> this profile adjusts the website to be compatible with screen-readers such as JAWS, NVDA, VoiceOver, and TalkBack. A screen-reader is installed on the blind user’s computer, and this site is compatible with it.</span></li><span data-dcnode-id="193" instrument_node="">
</span><li data-dcnode-id="189"><strong class="acsb-title" data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Keyboard Navigation Profile (Motor-Impaired):</span></strong><span data-dcnode-id="190" instrument_node=""> this profile enables motor-impaired persons to operate the website using the keyboard Tab, Shift+Tab, and the Enter keys. Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="188" instrument_node="">
</span></ul><span data-dcnode-id="186" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="183"><span data-dcnode-id="184" lang="EN-US"><span data-dcnode-id="185" instrument_node="">Additional UI, design, and readability adjustments</span></span></strong><span data-dcnode-id="182" instrument_node="">
</span><ol data-dcnode-id="124"><span data-dcnode-id="181" instrument_node="">
</span><li data-dcnode-id="174"><strong class="acsb-title" data-dcnode-id="177"><span data-dcnode-id="179" lang="EN-US"><span data-dcnode-id="180" instrument_node="">Font&nbsp;adjustments </span></span><span data-dcnode-id="178" instrument_node="">–</span></strong><span data-dcnode-id="175" lang="EN-US"><span data-dcnode-id="176" instrument_node="">&nbsp;users can increase and decrease its size, change its family (type), adjust the spacing,&nbsp;alignment, line height,&nbsp;and more.</span></span></li><span data-dcnode-id="173" instrument_node="">
</span><li data-dcnode-id="166"><span data-dcnode-id="169" lang="EN-US"><strong class="acsb-title" data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">Color&nbsp;adjustments –</span></strong><span data-dcnode-id="170" instrument_node="">&nbsp;</span></span><span data-dcnode-id="167" lang="EN-US"><span data-dcnode-id="168" instrument_node="">users can select various color contrast profiles such as light, dark, inverted, and monochrome. Additionally, users can swap color schemes of titles, texts, and backgrounds with over seven different coloring options.</span></span></li><span data-dcnode-id="165" instrument_node="">
</span><li data-dcnode-id="159"><span data-dcnode-id="161" lang="EN-US"><strong class="acsb-title" data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">Animations –</span></strong><span data-dcnode-id="162" instrument_node="">&nbsp;</span></span><span data-dcnode-id="160" instrument_node="">epileptic users can stop all running animations with the click of a button. Animations controlled by the interface include videos, GIFs, and CSS flashing transitions.</span></li><span data-dcnode-id="158" instrument_node="">
</span><li data-dcnode-id="151"><span data-dcnode-id="154" lang="EN-US"><strong class="acsb-title" data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">Content&nbsp;highlighting –</span></strong><span data-dcnode-id="155" instrument_node="">&nbsp;</span></span><span data-dcnode-id="152" lang="EN-US"><span data-dcnode-id="153" instrument_node="">users can choose to emphasize essential elements such as links and titles. They can also choose to highlight focused or hovered elements only.</span></span></li><span data-dcnode-id="150" instrument_node="">
</span><li data-dcnode-id="143"><span data-dcnode-id="146" lang="EN-US"><strong class="acsb-title" data-dcnode-id="148"><span data-dcnode-id="149" instrument_node="">Audio muting&nbsp;–</span></strong><span data-dcnode-id="147" instrument_node="">&nbsp;</span></span><span data-dcnode-id="144" lang="EN-US"><span data-dcnode-id="145" instrument_node="">users with hearing devices may experience headaches or other issues due to automatic audio playing. This option lets users mute the entire website instantly.</span></span></li><span data-dcnode-id="142" instrument_node="">
</span><li data-dcnode-id="135"><span data-dcnode-id="138" lang="EN-US"><strong class="acsb-title" data-dcnode-id="140"><span data-dcnode-id="141" instrument_node="">Cognitive&nbsp;disorders –</span></strong><span data-dcnode-id="139" instrument_node="">&nbsp;</span></span><span data-dcnode-id="136" lang="EN-US"><span data-dcnode-id="137" instrument_node="">we utilize a search engine linked to Wikipedia and Wiktionary, allowing people with cognitive disorders to decipher meanings of phrases, initials, slang, and others.</span></span></li><span data-dcnode-id="134" instrument_node="">
</span><li data-dcnode-id="126"><strong class="acsb-title" data-dcnode-id="131"><span data-dcnode-id="132" lang="EN-US"><span data-dcnode-id="133" instrument_node="">Additional functions&nbsp;</span></span></strong><span data-dcnode-id="127" lang="EN-US"><strong class="acsb-title" data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">–</span></strong><span data-dcnode-id="128" instrument_node=""> we allow users to change cursor color and size, use a printing mode, enable a virtual keyboard, and many other functions.</span></span></li><span data-dcnode-id="125" instrument_node="">
</span></ol><span data-dcnode-id="123" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">Assistive technology and browser compatibility</span></strong><span data-dcnode-id="120" instrument_node="">
</span><p data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">We aim to support as many browsers and assistive technologies as possible, so our users can choose the best fitting tools for them, with as few limitations as possible. Therefore, we have worked very hard to be able to support all major systems that comprise over 95% of the user market share, including Google Chrome, Mozilla Firefox, Apple Safari, Opera and Microsoft Edge, JAWS, and NVDA (screen readers), both for Windows and MAC users.</span></p><span data-dcnode-id="117" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="115"><span data-dcnode-id="116" instrument_node="">Notes, comments, and feedback</span></strong><span data-dcnode-id="114" instrument_node="">
</span><p data-dcnode-id="112"><span data-dcnode-id="113" instrument_node="">Despite our very best efforts to allow anybody to adjust the website to their needs, there may still be pages or sections that are not fully accessible, are in the process of becoming accessible, or are lacking an adequate technological solution to make them accessible. Still, we are continually improving our accessibility, adding, updating, improving its options and features, and developing and adopting new technologies. All this is meant to reach the optimal level of accessibility following technological advancements. If you wish to contact the website’s owner, please use the website's form</span></p></div><span data-dcnode-id="110" instrument_node=""> </span></div><span data-dcnode-id="108" instrument_node=""> </span></div><span data-dcnode-id="106" instrument_node="">
