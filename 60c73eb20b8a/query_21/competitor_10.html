"">Catering Business Plan</span></a><span data-dcnode-id="1569" instrument_node=""> » </span></span></span></span></span></span></span></p><div class="main-content col-md-8 col-lg-8" data-dcnode-id="118"><article class="post-128 post type-post status-publish format-standard hentry category-c-plan category-food-industry" data-dcnode-id="122" id="post-128"><header class="page-header" data-dcnode-id="1559"><h1 class="page-title entry-title" data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">How to Write a Catering Business Plan [Sample Template]</span></h1></header><div class="entry-content-main" data-dcnode-id="124"><div class="entry-content" data-dcnode-id="125"><p data-dcnode-id="1552"><strong data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Do you want to start a catering company and need to write a business plan? If YES, here is a sample catering business plan template &amp; feasibility report.</span></strong><span data-dcnode-id="1556" instrument_node=""> You see, planning to cater for guests doesn’t come easy. It is one thing to plan for a party or want to host some guests in the comfort of your home; and it is yet another to have them well catered for</span><strong data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">.</span></strong><span data-dcnode-id="1553" instrument_node=""> This is where adequate organization and projections come to fore.</span></p><p data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">This means that if you were planning for a party for instance, you have got to be sure about the number of guests you are expecting, the type of food that appeals to them, as well as how you intend going about the preparation. Indeed having to go through all these steps, might be a bit tasking, however, good news is that there are folks who can take away the burden.</span></p><p data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">You will need to do plenty of research work, so as to arrive at the best of templates that can help guide you through the type of business that you are into. Below is a sample catering business plan template which you can use to get started with your own business plan.</span></p><h2 data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">A Sample Catering Service Business Plan Template</span></h2><div class="toc_white no_bullets contracted" data-dcnode-id="1487" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="1538"><span data-dcnode-id="1545" instrument_node="">Table of Content</span><span data-dcnode-id="1544" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="1539"><span data-dcnode-id="1543" instrument_node="">[</span><a data-dcnode-id="1541" href="#"><span data-dcnode-id="1542" instrument_node="">show</span></a><span data-dcnode-id="1540" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="1488" style="display: none;"><ul data-dcnode-id="1534"><li data-dcnode-id="1535"><a data-dcnode-id="1536" href="#1_Industry_Overview"><span data-dcnode-id="1537" instrument_node="">1. Industry Overview</span></a></li></ul><li data-dcnode-id="1524"><a data-dcnode-id="1532" href="#2_Executive_Summary"><span data-dcnode-id="1533" instrument_node="">2. Executive Summary</span></a><ul data-dcnode-id="1525"><li data-dcnode-id="1529"><a data-dcnode-id="1530" href="#3_Our_Products_and_Services"><span data-dcnode-id="1531" instrument_node="">3. Our Products and Services</span></a></li><li data-dcnode-id="1526"><a data-dcnode-id="1527" href="#4_Our_Mission_and_Vision_Statement"><span data-dcnode-id="1528" instrument_node="">4. Our Mission and Vision Statement</span></a></li></ul></li><li data-dcnode-id="1521"><a data-dcnode-id="1522" href="#5_Job_Roles_and_Responsibilities"><span data-dcnode-id="1523" instrument_node="">5. Job Roles and Responsibilities</span></a></li><li data-dcnode-id="1518"><a data-dcnode-id="1519" href="#6_SWOT_Analysis"><span data-dcnode-id="1520" instrument_node="">6. SWOT Analysis</span></a></li><li data-dcnode-id="1499"><a data-dcnode-id="1516" href="#7_MARKET_ANALYSIS"><span data-dcnode-id="1517" instrument_node="">7. MARKET ANALYSIS</span></a><ul data-dcnode-id="1500"><li data-dcnode-id="1513"><a data-dcnode-id="1514" href="#8_Our_Target_Market"><span data-dcnode-id="1515" instrument_node="">8. Our Target Market</span></a></li><li data-dcnode-id="1510"><a data-dcnode-id="1511" href="#9_SALES_AND_MARKETING_STRATEGY"><span data-dcnode-id="1512" instrument_node="">9. SALES AND MARKETING STRATEGY</span></a></li><li data-dcnode-id="1507"><a data-dcnode-id="1508" href="#10_Sales_Forecast"><span data-dcnode-id="1509" instrument_node="">10. Sales Forecast</span></a></li><li data-dcnode-id="1504"><a data-dcnode-id="1505" href="#11_Publicity_and_Advertising_Strategy"><span data-dcnode-id="1506" instrument_node="">11. Publicity and Advertising Strategy</span></a></li><li data-dcnode-id="1501"><a data-dcnode-id="1502" href="#12_Our_Pricing_Strategy"><span data-dcnode-id="1503" instrument_node="">12. Our Pricing Strategy</span></a></li></ul></li><li data-dcnode-id="1489"><a data-dcnode-id="1497" href="#13_Startup_Expenditure_Budget"><span data-dcnode-id="1498" instrument_node="">13. Startup Expenditure (Budget)</span></a><ul data-dcnode-id="1490"><li data-dcnode-id="1494"><a data-dcnode-id="1495" href="#Generating_Funding_Startup_Capital_for_Delicious_Delight_Catering_Services_Company"><span data-dcnode-id="1496" instrument_node="">Generating Funding / Startup Capital for Delicious Delight® Catering Services Company</span></a></li><li data-dcnode-id="1491"><a data-dcnode-id="1492" href="#14_Sustainability_and_Expansion_Strategy"><span data-dcnode-id="1493" instrument_node="">14. Sustainability and Expansion Strategy</span></a></li></ul></li></ul></div><h4 data-dcnode-id="1483"><span data-dcnode-id="1484" id="1_Industry_Overview"><strong data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">1. Industry Overview</span></strong></span></h4><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Have you ever wondered how difficult it really gets for people who host parties to cope when they have to cook all the meals that the guests get to eat? Without a doubt, it is quite a difficult task to accomplish this, especially if the number of guests attending the event is much.</span></p><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">As such, if the host attempts to personally cook the meals for her guests; particularly when the number is on the high side, chances are that they may likely breakdown due to fatigue. It is for this reason that caterers are in hot demand.</span></p><div class="code-block code-block-1" data-dcnode-id="1469" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="1470"><span data-dcnode-id="1477" instrument_node="">
</span><span data-dcnode-id="1475" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2552847123501338" data-ad-format="auto" data-ad-slot="4731700007" data-dcnode-id="1474" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1473" instrument_node="">
</span></div></div><p data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">There is hardly any country in the world where one may not find caterers who are into full – time catering businesses. Professional caterers do not only cater for big organizations, government agencies, institutions and parties, but they can also be contacted to handle home catering services for people who can the luxury. This means that people who host a huge number of visitors per time in their houses can relax and allow the burden of cooking to be taken off them.</span></p><p data-dcnode-id="1462"><span data-dcnode-id="1466" instrument_node="">In the united states of America alone, there are well over 10,000 registered catering businesses that employ about 150,000 people (</span><em data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">both contract and full time employees</span></em><span data-dcnode-id="1463" instrument_node="">), and most of them are thriving pretty well in the business because there are loads of business opportunities available to caterers in the United States of America, as well as in other parts of the world.</span></p><p data-dcnode-id="1454"><span data-dcnode-id="1461" instrument_node="">The United States of America’s Catering Industry generates well over 7 Billion US Dollars annually through events such as; </span><strong data-dcnode-id="1456"><span data-dcnode-id="1460" instrument_node="">weddings, holiday parties, corporate functions (</span><em data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Annual General Meetings and Anniversary</span></em><span data-dcnode-id="1457" instrument_node=""> et al), funerals and birthday parties</span></strong><span data-dcnode-id="1455" instrument_node=""> amongst others, and the figure is still on the increase.</span></p><p data-dcnode-id="1450"><a data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ideaflight.com/start-catering-business/"><span data-dcnode-id="1453" instrument_node="">Catering business</span></a><span data-dcnode-id="1451" instrument_node=""> is considered to be amongst the delicate industries, this is because they are involved in cooking food for consumption for a large number of guests per time. It is the reason why this business is subjected to regular inspection by relevant health officials from different local health departments.</span></p><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">As one who runs a catering business in the United States of America, you are expected by law to comply with the laid down rules and regulations for the industry.</span></p><div class="code-block code-block-2" data-dcnode-id="1438" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="1439"><span data-dcnode-id="1446" instrument_node="">

</span></div></div><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">There is ample room for any entrepreneur who is interested in running a catering business in the United States of America to start in any capacity and still maximize profit in the business. You can start by catering for 20 people or less, conversely, you can as well start your catering business by catering for a large crowd.</span></p><p data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">The bottom line is that catering business is known to be a very lucrative business in all parts of the world, and not just in the United States of America.</span></p><h3 data-dcnode-id="1431"><span data-dcnode-id="1432" id="2_Executive_Summary"><span data-dcnode-id="1433" instrument_node="">2. Executive Summary</span></span></h3><p data-dcnode-id="1426"><span data-dcnode-id="1430" instrument_node="">Appealing Delight® Catering Services Company is a catering business that will be based in Chicago, Illinois, USA. Our intention of </span><a data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/starting-a-catering-business/"><span data-dcnode-id="1429" instrument_node="">starting a catering business</span></a><span data-dcnode-id="1427" instrument_node=""> in Chicago is to deliver the best quality catering services at an affordable price to a wide range of customers.</span></p><p data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Our services will involve catering for parties, outdoor events, weddings, holiday parties, birthday parties, corporate events, picnics, anniversaries and special events et al.</span></p><p data-dcnode-id="1419"><span data-dcnode-id="1423" instrument_node="">Work will always be on going when it comes to </span><a data-dcnode-id="1421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/event-planning-price-quote/" rel=" </span></div></div><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">As part of our plans to make our customers our number one priority, we have perfected plans to work with our clients to provide customized services based on their budget. We will be involved in delivery services for our clients, rentals services, event management and consultancy services.</span></p><p data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">At Appealing Delight® Catering Services Company, we will go the extra mile to give our esteemed customers value for their money irrespective of the size of their budget. As such, we do not intend to turn any one down, because of the meager amount of cash they may have.</span></p><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Appealing Delight® Catering Services Company is own and managed by Mrs. Sharon Miller, a notable and award winning cook in the United States of America. She will be bringing her experience to fore, to help Appealing Delight® Catering Services Company grow to become the number one choice in the whole of Chicago and environs and also a one – stop – shop when it is about catering services.</span></p><h4 data-dcnode-id="1399"><span data-dcnode-id="1400" id="3_Our_Products_and_Services"><strong data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">3. Our Products and Services</span></strong></span></h4><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">At Appealing Delight® Catering Services, we will be involved in cooking both local foods and intercontinental foods for our clients. Our intention is not to restrict our services to only cooking of foods, but we are also going to be involved in spreading our tentacles to cover all aspects of the ideal catering business.</span></p><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">In as much as cooking meals will be our number one priority as a catering business, we wi _Vision_Statement"><strong data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">4. Our Mission and Vision Statement</span></strong></span></h4><ul data-dcnode-id="1340"><li data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">To become the number one catering service provider in the whole of Chicago, Illinois.</span></li><li data-dcnode-id="1341"><span data-dcnode-id="1345" instrument_node="">To establish a standard catering business that will meet all the catering needs (cooking, </span><a data-dcnode-id="1343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/starting-an-event-planning-business/" rel="noopener" target="_blank"><span data-dcnode-id="1344" instrument_node="">event planning</span></a><span data-dcnode-id="1342" instrument_node="">, rentals, trainings and consultancy services) of people in Chicago and neighboring states.</span></li></ul><p data-dcnode-id="1337"><strong data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Our Business Structure</span></strong></p><p data-dcnode-id="1329"><span data-dcnode-id="1336" instrument_node="">Our catering business will be structured in such a way to accommodate all the aspects of our business offering. We are setting up a catering business that will not only be involved in cooking and serving foods on behalf of our clients, but a business that will also be involved in rental services (</span><em data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">renting of cooking wares, table cloths, tables, chairs, marquee tents et al</span></em><span data-dcnode-id="1333" instrument_node="">), consultancy services and trainings (</span><em data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">run a catering school</span></em><span data-dcnode-id="1330" instrument_node="">).</span></p><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">So, in setting up the structure for Appealing Delight Catering Company, our business structure will be slightly different from what is obtainable in an ideal catering business that majors in cooking and serving foods on behalf of their clients.</span></p><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">We are going to run a full-fledged office in Chicago, a place where people can come in and make inquiries. In view of the above, we have made provision for the following position in our organization;</span></p><ul data-dcnode-id="1306"><li data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Chief Executive Officer</span></li><li data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Chief Cook</span></li><li data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Cooking Assistants</span></li><li data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Admin and Personnel Manager</span></li><li data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Front Desk Officer</span></li><li data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Sales and Marketing Officer</span></li><li data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Driver</span></li><li data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Servers (Contract Staff)</span></li><li data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Cleaners / Dish Washers</span></li></ul><h3 data-dcnode-id="1302"><span data-dcnode-id="1303" id="5_Job_Roles_and_Responsibilities"><strong data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">5. Job Roles and Responsibilities</span></strong></span></h3><p data-dcnode-id="1299"><strong data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Chief Executive Officer – CEO:</span></strong></p><div class="code-block code-block-8" data-dcnode-id="1289" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="1290"><span data-d </span></div></div><ul data-dcnode-id="1170"><li data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Sources for clients for the company</span></li><li data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Responsible for promoting the company’s image</span></li><li data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Responsible for creating marketing and sales strategies, etc.</span></li><li data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Represents the organization in some strategic business meetings</span></li><li data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Any other duty as assigned by the Chief Operating Officer / Bakery manager</span></li></ul><p data-dcnode-id="1167"><strong data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Driver:</span></strong></p><ul data-dcnode-id="1156"><li data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Delivers customers’ orders promptly</span></li><li data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Runs errand for the organization</span></li><li data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Transports employees and goods to and fro event venues</span></li><li data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Assists in setting up cooking and serving stands during events</span></li><li data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Any other duty as assigned by the personnel manager</span></li></ul><p data-dcnode-id="1153"><strong data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Servers (Contract Staff)</span></strong></p><ul data-dcnode-id="1140"><li data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Take orders from guests</span></li><li data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Serves guest during events / parties</span></li><li data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Assists in cleaning dishes after events / parties</span></li><li data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Assists in the movement of cooking utensils, plates, spoons and other relevant wares</span></li><li data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Assists in setting up cooking and serving stands during events</span></li><li data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Any other duty as assigned by the personnel manager</span></li></ul><p data-dcnode-id="1137"><strong data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Cleaners / Dish Washers:</span></strong></p><ul data-dcnode-id="1126"><li data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Responsible for cleaning the office facility and kitchen at all times</span></li><li data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Ensure that toiletries and supplies don’t run out of stock</span></li><li data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Responsible for washing dishes before and after events</span></li><li data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Cleans both the interior and exterior of the building</span></li><li data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Any other duty as assigned by the personnel manager</span></li></ul><h3 data-dcnode-id="1123"><span data-dcnode-id="1124" id="6_SWOT_Analysis"><span data-dcnode-id="1125" instrument_node="">6. SWOT Analysis</span></span></h3><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">We are quite aware that is a stiffer competition when it comes to the catering trade in Chicago, which is why we decided to take our time to perfect our strategies before launching out. Our goal is to become a leading all – round catering services company in the whole of Chicago and the only way to achieve that is to out – perform our competitors. In order to outperform our competitors in Chicago, we hired a business consultant to help us conduct SWOT analysis.</span></p><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">In view of that, we were able to take stock of our strengths, our weakness, our opportunities and also the threats that we are likely going to be exposed to in establishing our catering business in Chicago, IL. Here is a summary from the result of the SWOT analysis that was conducted on behalf of Delicious Delight® Catering Services.</span></p><div class="code-block code-block-10" data-dcnode-id="1117" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="1118"></div></div><ul data-dcnode-id="1113"><li data-dcnode-id="1114"><strong data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Strength</span></strong></li></ul><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">We are a complete catering business that does not offer outdoor catering services alone, but offer consultancy services, rental services and trainings. The truth is that, people will prefer to engage a client that can provide them with all they would need to make their events a memory one.</span></p><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">It means that the need to sign different contracts with different providers (vendors) will not arise once they engage our services. Another positive for us is that we will be working with the best of caterers in the US; they are going to be guest lecturers in our Catering School and our CEO is an award winning caterer in Chicago who is widely celebrated.</span></p><ul data-dcnode-id="1105"><li data-dcnode-id="1106"><strong data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Weakness</span></strong></li></ul><p data-dcnode-id="1100"><span data-dcnode-id="1104" instrument_node="">Our weakness could be the challenge of hiring and keeping the best cooks / chefs in our payroll since most of them may want to work for themselves. This challenge applies to almost all </span><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/traits-of-successful-caterers/" rel="noopener" target="_blank"><span data-dcnode-id="1103" instrument_node="">catering business owners</span></a><span data-dcnode-id="1101" instrument_node="">. Yet another weakness is that we are new in Chicago, IL.</span></p><ul data-dcnode-id="1096"><li data-dcnode-id="1097"><strong data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Opportunities</span></strong></li></ul><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">When it comes to catering services, the opportunities that are available cannot be quantified. Any entrepreneur can start his or her own outdoor catering business anywhere in the world and still make huge returns on his or her investment.</span></p><p data-dcnode-id="1089"><span data-dcnode-id="1093" instrument_node="">At Appealing Delight Catering Company, we take pride in the fact that we are one of the few catering services companies in Chicago that offer a wide range of related catering services; hence we are likely going to </span><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/lucrative-catering-business-ideas/" rel="noopener" target="_blank"><span data-dcnode-id="1092" instrument_node="">maximize the opportunities available for catering business</span></a><span data-dcnode-id="1090" instrument_node=""> in Chicago, IL.</span></p><div class="code-block code-block-11" data-dcnode-id="1087" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="1088"></div></div><ul data-dcnode-id="1083"><li data-dcnode-id="1084"><strong data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Threat</span></strong></li></ul><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">There are a couple of first class catering services companies in Chicago IL, and they are a huge threat to us. They pose a threat to us because they are already established, and their brand is well accepted. Also, most of them can boast of a have huge clientele base. Our competitors are able to develop expensive new marketing and sales campaigns and that will mean that we will have to struggle to catch – up.</span></p><h3 data-dcnode-id="1078"><span data-dcnode-id="1079" id="7_MARKET_ANALYSIS"><span data-dcnode-id="1080" instrument_node="">7. MARKET ANALYSIS</span></span></h3><ul data-dcnode-id="1074"><li data-dcnode-id="1075"><strong data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Market Trends</span></strong></li></ul><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">There is hardly any organization or individual who intends organizing any party or event that will not engage the services of caterers. One of the high points of parties, weddings and events generally is the time for refreshments with foods. Most people who attend parties look forward to when food is served, that is to tell you that a party will not be complete if there is nothing to eat and drink.</span></p><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">It is the norm for most corporate organizations to also give out the management of their canteens to vendors (caterers) because they know that it will be a distraction if they decided to handle it themselves. This is one of the major areas catering companies leverage on in building their businesses to generate steady income.</span></p><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Outdoor catering services is supposed to be the core offering of catering businesses, but outdoor events don’t happen every day these days. As a matter of fact, caterers compete for the available weddings and parties that are organized during the weekends because weekends and holidays appear to be the busiest periods for catering business.</span></p><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">In order to compete with the big wigs in the catering industry in Chicago, we have decided to create a niche, which is why we want to run an all – round catering business; a catering business that is not just restricted to cooking and serving of foods, but a catering business that will offer rental services, consultancy services, as well as run a standard, government approved / licensed catering school in Chicago IL. Appealing Delight® Catering Company will adopt the following marketing and sales strategies;</span></p><div class="code-block code-block-12" data-dcnode-id="1064" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="1065"></div></div><ul data-dcnode-id="1045"><li data-dcnode-id="1060"><a data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/write-letter-introduce-product/" rel="noopener" target="_blank"><span data-dcnode-id="1063" instrument_node="">Introduce our business by sending introductory letters</span></a><span data-dcnode-id="1061" instrument_node=""> alongside our brochure to all the corporate organizations in Illinois</span></li><li data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Neighborhood, door to door and mouth to ear mode of adverts to introduce our business in our community</span></li><li data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Engage in road shows ( make some open air noise) to introduce our business</span></li><li data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Create different packages for different category of clients in order to work with their budgets and still deliver quality foods and services</span></li><li data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Encourage and reward referral marketing.</span></li><li data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Leverage on the internet to promote our business</span></li><li data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Start a TV show in line with our business goal and objectives</span></li><li data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Sponsor relevant community events, such as cooking competitions and cooking reality shows on TV et al.</span></li></ul><h4 data-dcnode-id="1041"><span data-dcnode-id="1042" id="8_Our_Target_Market"><strong data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">8. Our Target Market</span></strong></span></h4><p data-dcnode-id="1036"><span data-dcnode-id="1040" instrument_node="">No doubt, the </span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/writing-catering-marketing-plan/" rel="noopener" target="_blank"><span data-dcnode-id="1039" instrument_node="">target market for catering businesses</span></a><span data-dcnode-id="1037" instrument_node=""> cut across people of all walks of life and organizations. The need to celebrate and call for a party will always arise and it is not restricted to only a group of people or organization, it cuts across people of all walks of life.</span></p><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Yes, our catering services is within the reach of everybody and we intend serving available clients, but in order to effectively make plans and take actions towards meeting our sales and marketing goals, we have been able to pencil down the category of people and organizations that will be our main target market. Below is a list of the people and organizations that we have specifically designed our products and services for;</span></p><ul data-dcnode-id="1012"><li data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Families (Homes)</span></li><li data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Schools (boarding house and campus et al)</span></li><li data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Wedding Ceremonies</span></li><li data-dcnode-id="1025"><a data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/become-certified-event-planner/" rel="noopener" target="_blank"><span data-dcnode-id="1027" instrument_node="">Event Planners</span></a></li><li data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Sport Centers</span></li><li data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Corporate Organizations</span></li><li data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Aspiring Entrepreneurs (Those who want to learn how to cook and run their own catering businesses)</span></li><li data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Managers of public facilities</span></li><li data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Carnival Organizers</span></li><li data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Caterers ( for our consultancy services and perhaps renting of our catering wares)</span></li></ul><p data-dcnode-id="1007"><strong data-dcnode-id="1008"><span data-dcnode-id="1011" instrument_node="">Our </span><a class="wpil_keyword_link" data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/example-companies-competitive-advantage/" rel="noopener noreferrer" target="_blank" title="competitive advantage"><span data-dcnode-id="1010" instrument_node="">competitive advantage</span></a></strong></p><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Appealing Delight® Catering Services is coming into the catering industry knowing completely well that there are other competent and well established catering companies in Chicago. However, we have decided to critically study the industry and have realized that in order to have a competitive advantage over our competitors; we must do what they are not doing.</span></p><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">In view of the above stated fact, we have decided to offer a wide range of catering services that will meet the needs of a wide range of clientele base. We want to be the one stop shop when it comes to catering services in the whole of Illinois.</span></p><div class="code-block code-block-13" data-dcnode-id="1001" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="1002"></div></div><p data-dcnode-id="996"><span data-dcnode-id="1000" instrument_node="">Our clients should be able to sign just one contract with us and we will deliver nearly all they would need to make their events a memorable one. This is the </span><a data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/business-plan-competitive-analysis/" rel="noopener" target="_blank"><span data-dcnode-id="999" instrument_node="">competitive advantage that we are bringing to the market</span></a><span data-dcnode-id="997" instrument_node=""> in Chicago, IL.</span></p><h4 data-dcnode-id="992"><span data-dcnode-id="993" id="9_SALES_AND_MARKETING_STRATEGY"><strong data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">9. SALES AND MARKETING STRATEGY</span></strong></span></h4><ul data-dcnode-id="988"><li data-dcnode-id="989"><strong data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Sources of Income</span></strong></li></ul><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Appealing Delight® Catering Services Company is established with the aim of maximizing the catering business, hence our service offerings. With the nature with which we intend building our business, we are not going to lack continuous inflow of cash.</span></p><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">There are several sources of income for our business and we will ensure that we do all we can to maximize them. Below are the sources of revenue generation for Delicious Delight® Catering Services Company;</span></p><ul data-dcnode-id="966"><li data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Offering outdoor catering services to a wide range of clients</span></li><li data-dcnode-id="977"><span data-dcnode-id="981" instrument_node="">Engage in </span><a data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/party-rental-business-plan/" rel="noopener" target="_blank"><span data-dcnode-id="980" instrument_node="">Party rental services</span></a><span data-dcnode-id="978" instrument_node=""> (renting of catering wares, chairs, tables and tents et al.)</span></li><li data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Manage Canteens for corporate organizations.</span></li><li data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Running a top notch government approved catering school in Chicago, Illinois</span></li><li data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Offering consultancy services in line with our business offerings</span></li><li data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Event Management</span></li><li data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Sales of Cakes</span></li></ul><h4 data-dcnode-id="962"><span data-dcnode-id="963" id="10_Sales_Forecast"><strong data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">10. Sales Forecast</span></strong></span></h4><p data-dcnode-id="957"><span data-dcnode-id="961" instrument_node="">It is important to state that our sales forecast is based on the data gathered during our </span><a data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/steps-write-feasibility-study-report/" rel="noopener" target="_blank"><span data-dcnode-id="960" instrument_node="">feasibility studies</span></a><span data-dcnode-id="958" instrument_node=""> and also some of the assumptions readily available on the field. This sales projection is based on our business offerings which involve outdoor catering services, rental services, event management, canteen management, our catering school and consultancy services et al. On the Average, we look forward to;</span></p><ul data-dcnode-id="941"><li data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Handle about 4 Outdoor Catering Events in a Month</span></li><li data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Secure contract to manage 5 canteens for corporate organizations within the first 3 months of launching the business</span></li><li data-dcnode-id="950"><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/%3Fp%3D48570%26%3Dtrue%26_id%3D48570" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="952" instrument_node="">Sell a minimum of 20 Standard Cakes in a Month</span></a></li><li data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Manage a minimum of 2 Events a Month</span></li><li data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Consult for a minimum of 4 clients in a month</span></li><li data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Train a minimum of 50 caterers within the first 6 months of launching the catering school</span></li><li data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Rent our catering wares / party stuffs to a minimum of 4 clients per month</span></li></ul><p data-dcnode-id="936"><strong data-dcnode-id="938"><em data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">N.B-:</span></em></strong><span data-dcnode-id="937" instrument_node=""> Please note that we could not put a specific amount to the projection above because the prices may differ for different services and for different clients. Part of our business strategy is to work within the budget of our clients as stated earlier.</span></p><div class="code-block code-block-14" data-dcnode-id="934" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="935"></div></div><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Also, to deliver quality catering services hence it will be difficult to project what we are likely going to make from such deals. But, the bottom line is that we are definitely going to make reasonable profits from any business deal that we execute.</span></p><ul data-dcnode-id="928"><li data-dcnode-id="929"><strong data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Marketing Strategy and Sales Strategy</span></strong></li></ul><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Appealing Delight Catering Services Company intends to become the number one catering services company in the whole of Chicago and the only way for us to achieve this is to engage in guerilla marketing. Our plan is to ensure that we get our own fair of the existing market in Illinois.</span></p><p data-dcnode-id="921"><span data-dcnode-id="925" instrument_node="">Our </span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/manage-sales-team-remotely/" rel="noopener" target="_blank"><span data-dcnode-id="924" instrument_node="">sales and marketing team</span></a><span data-dcnode-id="922" instrument_node=""> will be recruited based on their vast experience in the industry and they will be trained on a regular basis, so as to be well equipped to meet their targets and the overall goal of the organization.</span></p><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Our goal is to become a one-size-fits- all kind of service people when it comes to catering services in Chicago, Illinois and its environs. This is why we must explore all the marketing tactics available to us if indeed we want to fulfill our mandate. In nut a shell, we will explore the following marketing and sales strategies to promote our catering business;</span></p><ul data-dcnode-id="904"><li data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Direct Marketing</span></li><li data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Marketing via Our Sponsored TV Programs and Community Based Events</span></li><li data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Erect Our Billboards in Strategic locations around the city</span></li><li data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Sales Reps</span></li><li data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Online Marketing (via our official website, social media platforms and blog et al)</span></li><li data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Referral Marketing</span></li><li data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Promotion of our products during our training sessions in our catering school</span></li></ul><h4 data-dcnode-id="900"><span data-dcnode-id="901" id="11_Publicity_and_Advertising_Strategy"><strong data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">11. Publicity and Advertising Strategy</span></strong></span></h4><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">We have been able to work with our consultants to help us map out publicity and advertising strategies that will help us walk our way into the heart of our target market. First and foremost, we want our brand to visible and well communicated which is why we have created a logo with attractive colors.</span></p><div class="code-block code-block-15" data-dcnode-id="896" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="897"></div></div><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">All our publicity materials and jingles are done by some of the best hands in the industry. We have created a budget to take care of our publicity and advertising need and here are the platforms we intend making use of to promote and advertise our business;</span></p><ul data-dcnode-id="879"><li data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Place adverts on both print and electronic media platforms</span></li><li data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Sponsor relevant community programs</span></li><li data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Sponsor relevant TV shows</span></li><li data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Leverage on the internet and social media platforms like; Instagram, Facebook ,Twitter, LinkedIn, Badoo, Google+ et al</span></li><li data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Install our Bill Boards on strategic locations</span></li><li data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Engage in road shows from time to time</span></li><li data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Distribute our fliers and handbills in targeted areas from time to time</span></li></ul><h4 data-dcnode-id="873"><span data-dcnode-id="874" id="12_Our_Pricing_Strategy"><strong data-dcnode-id="875"><span data-dcnode-id="878" instrument_node="">12. Our </span><a class="wpil_keyword_link" data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/factors-product-pricing-strategy/" rel="noopener noreferrer" target="_blank" title="Pricing Strategy"><span data-dcnode-id="877" instrument_node="">Pricing Strategy</span></a></strong></span></h4><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Launching a new business is not an easy task especially if you are launching a business / idea that is not entirely new from what is obtainable in the location you intend launching it. So, part of our strategy for entering the market is to leverage on pricing to gain a good percentage of the available market.</span></p><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Of course we will attract clients by offering quality catering services for rock – bottom price. A price that probably will be the lowest in the industry.</span></p><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Although prices for our catering services and other related services will be lower than what is obtainable in the industry, but it wouldn’t remain so for a long time. As a matter of fact, we intend jacking up the prices gradually until it falls at par with what is obtainable in the industry. We aim to achieve this within a year of launching the business.</span></p><ul data-dcnode-id="863"><li data-dcnode-id="864"><strong data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Payment Options</span></strong></li></ul><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Our payment policy is all inclusive because we are quite aware that different people prefer different payment options as it suits them. Here are the payment options that we will make available to our clients;</span></p><div class="code-block code-block-16" data-dcnode-id="859" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="860"></div></div><ul data-dcnode-id="847"><li data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Payment by cash</span></li><li data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Payment via Point of Sale (POS) Machine</span></li><li data-dcnode-id="852"><a data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/accept-credit-card-payments-online/" rel="noopener" target="_blank"><span data-dcnode-id="854" instrument_node="">Payment via online bank transfer</span></a></li><li data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Payment via</span></li><li data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Payment via Mobile money</span></li></ul><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">In view of the above, we have chosen banking platforms that will help us achieve our plans without any itches.</span></p><h3 data-dcnode-id="841"><span data-dcnode-id="842" id="13_Startup_Expenditure_Budget"><strong data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">13. Startup Expenditure (Budget)</span></strong></span></h3><ul data-dcnode-id="799"><li data-dcnode-id="837"><span data-dcnode-id="840" instrument_node="">The Total Fee for Registering the Business in Florida: </span><strong data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">$750.</span></strong></li><li data-dcnode-id="830"><span data-dcnode-id="836" instrument_node="">The </span><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/catering-liability-insurance/" rel="noopener" target="_blank"><span data-dcnode-id="835" instrument_node="">budget for Liability insurance</span></a><span data-dcnode-id="833" instrument_node="">, permits and license: </span><strong data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">$5,000 </span></strong></li><li data-dcnode-id="826"><span data-dcnode-id="829" instrument_node="">The Amount needed to acquire a suitable Facility with storage space for 6 months in Chicago, Illinois (Re – Construction of the facility inclusive): </span><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">$70,000.</span></strong></li><li data-dcnode-id="822"><span data-dcnode-id="825" instrument_node="">The Cost for the purchase of furniture and gadgets (fridges, TVs, Sound System, tables and chairs et al): </span><strong data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">$15,000</span></strong></li><li data-dcnode-id="815"><span data-dcnode-id="821" instrument_node="">The </span><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/cost-start-a-catering-business/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="820" instrument_node="">Cost for Catering</span></a><span data-dcnode-id="818" instrument_node=""> Equipment (Standard commercial oven, Industrial Gas Cooker, Baking Sheets and Racks, Mixers, Work Tables, Sinks, Slicers, Scales, Cake decorating Tools, Ingredient Bins and kitchen utensils et al) : </span><strong data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">$15,000</span></strong></li><li data-dcnode-id="811"><span data-dcnode-id="814" instrument_node="">The Cost of Launching a Website: </span><strong data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">$600</span></strong></li><li data-dcnode-id="807"><span data-dcnode-id="810" instrument_node="">The cost for our opening party: </span><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">$5,000</span></strong></li><li data-dcnode-id="800"><span data-dcnode-id="806" instrument_node="">Additional Expenditure (</span><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/promote-corporate-cards/" rel="noopener" target="_blank"><span data-dcnode-id="805" instrument_node="">Business cards</span></a><span data-dcnode-id="803" instrument_node="">, Signage, Adverts and Promotions et al): </span><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">$5,000</span></strong></li></ul><p data-dcnode-id="794"><span data-dcnode-id="798" instrument_node="">Going by the report from our research and feasibility studies, we will need an average </span><strong data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">$150,000</span></strong><span data-dcnode-id="795" instrument_node=""> to set a catering business in Chicago, IL.</span></p><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">One good thing about catering business and perhaps other related services that we render, is that you are definitely going to make profits from any business deal that you handle. You are expected to submit quotations that will be enough to cover your expenses and profits as well.</span></p><h4 data-dcnode-id="789"><span data-dcnode-id="790" id="Generating_Funding_Startup_Capital_for_Delicious_Delight_Catering_Services_Company"><span data-dcnode-id="791" instrument_node="">Generating Funding / Startup Capital for Delicious Delight® Catering Services Company</span></span></h4><ul data-dcnode-id="782"><li data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">The CEO Mrs. Sharon Miller will generate 40 percent of the start – up capital from her personal savings</span></li><li data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">She will source for soft loans from family members and friends</span></li><li data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Her bankers are willing to give her loan facility to the tune of 80,000 US Dollars</span></li></ul><h4 data-dcnode-id="778"><span data-dcnode-id="779" id="14_Sustainability_and_Expansion_Strategy"><strong data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">14. Sustainability and Expansion Strategy</span></strong></span></h4><p data-dcnode-id="773"><span data-dcnode-id="777" instrument_node="">Our CEO Sharon Miller has plans to implement succession plans hence the introduction of her daughter Ms. Stacy Miller to join her in </span><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/build-brand-from-scratch/" rel="noopener" target="_blank"><span data-dcnode-id="776" instrument_node="">building the business from the scratch</span></a><span data-dcnode-id="774" instrument_node="">. She has made plans to train her on the job and also attend training courses. Ms. Stacy Miller will be understudying her mother with the sole aim of taking over the business once she retires.</span></p><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">As part of the plans to sustain the business and also to expand the business, we will continue to invest in the training of our employees and also continue to explore new opportunities to generate income for the business. We are certain that if we get things right and we work hard; we are likely going to triple our income in the second year of our operations.</span></p><p data-dcnode-id="768"><strong data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Check List / Milestone</span></strong></p><ul data-dcnode-id="640"><li data-dcnode-id="764"><span data-dcnode-id="767" instrument_node="">Business Name Availability Check: </span><strong data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Completed</span></strong></li><li data-dcnode-id="760"><span data-dcnode-id="763" instrument_node="">Business Registration: </span><strong data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Completed</span></strong></li><li data-dcnode-id="756"><span data-dcnode-id="759" instrument_node="">Opening of Corporate Bank Accounts: </span><strong data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Completed</span></strong></li><li data-dcnode-id="752"><span data-dcnode-id="755" instrument_node="">Securing Point of Sales (POS) Machines: </span><strong data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Completed</span></strong></li><li data-dcnode-id="748"><span data-dcnode-id="751" instrument_node="">Opening Mobile Money Accounts: </span><strong data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Completed</span></strong></li><li data-dcnode-id="744"><span data-dcnode-id="747" instrument_node="">Opening Online Payment Platforms: </span><strong data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Completed</span></strong></li><li data-dcnode-id="740"><span data-dcnode-id="743" instrument_node="">Application and Obtaining Tax Payer’s ID: </span><strong data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="736"><span data-dcnode-id="739" instrument_node="">Application for business license and permit: </span><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Completed</span></strong></li><li data-dcnode-id="732"><span data-dcnode-id="735" instrument_node="">Purchase of Insurance for the Business: </span><strong data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Completed</span></strong></li><li data-dcnode-id="728"><span data-dcnode-id="731" instrument_node="">Renting of Facility and Construction of our Commercial Kitchen: </span><strong data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="724"><span data-dcnode-id="727"
