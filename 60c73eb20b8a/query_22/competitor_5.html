14"><strong data-dcnode-id="916"><span data-dcnode-id="920" instrument_node="">Are you about </span><a data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/starting-an-interior-design-business/"><span data-dcnode-id="919" instrument_node="">starting an interior decoration business</span></a><span data-dcnode-id="917" instrument_node="">? If YES, here’s a complete sample interior design business plan template &amp; feasibility report you can use for FREE to raise money</span></strong><span data-dcnode-id="915" instrument_node="">. If you have ever entered a tastefully furnished house, then you will agree that those who are skilled in the interior décor trade know sure knows what it takes to make a place really beautiful.</span></p><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">It is no wonder that hiring an interior décor sometimes might be on the high side; this is because of the level of expertise that they bring to the table. If you think that the idea of being called an interior designer sounds good, then you may want to try your hands on the interior décor business. Truth is that the industry is a very competitive one, but truer is the fact that the sky is too big for two birds to collide.</span></p><h2 data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">A Sample Interior Design Business Plan Template</span></h2><div class="toc_white no_bullets contracted" data-dcnode-id="854" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="902"><span data-dcnode-id="909" instrument_node="">Table of Content</span><span data-dcnode-id="908" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="903"><span data-dcnode-id="907" instrument_node="">[</span><a data-dcnode-id="905" href="#"><span data-dcnode-id="906" instrument_node="">show</span></a><span data-dcnode-id="904" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="855" style="display: none;"><ul data-dcnode-id="898"><li data-dcnode-id="899"><a data-dcnode-id="900" href="#1_Industry_Overview"><span data-dcnode-id="901" instrument_node="">1. Industry Overview</span></a></li></ul><li data-dcnode-id="888"><a data-dcnode-id="896" href="#2_Executive_Summary"><span data-dcnode-id="897" instrument_node="">2. Executive Summary</span></a><ul data-dcnode-id="889"><li data-dcnode-id="893"><a data-dcnode-id="894" href="#3_Our_Products_and_Services"><span data-dcnode-id="895" instrument_node="">3. Our Products and Services</span></a></li><li data-dcnode-id="890"><a data-dcnode-id="891" href="#4_Our_Mission_and_Vision_Statement"><span data-dcnode-id="892" instrument_node="">4. Our Mission and Vision Statement</span></a></li></ul></li><li data-dcnode-id="885"><a data-dcnode-id="886" href="#5_Job_Roles_and_Responsibilities"><span data-dcnode-id="887" instrument_node="">5. Job Roles and Responsibilities</span></a></li><li data-dcnode-id="882"><a data-dcnode-id="883" href="#6_SWOT_Analysis"><span data-dcnode-id="884" instrument_node="">6. SWOT Analysis</span></a></li><li data-dcnode-id="863"><a data-dcnode-id="880" href="#7_MARKET_ANALYSIS"><span data-dcnode-id="881" instrument_node="">7. MARKET ANALYSIS</span></a><ul data-dcnode-id="864"><li data-dcnode-id="877"><a data-dcnode-id="878" href="#8_Our_Target_Market"><span data-dcnode-id="879" instrument_node="">8. Our Target Market</span></a></li><li data-dcnode-id="874"><a data-dcnode-id="875" href="#9_SALES_AND_MARKETING_STRATEGY"><span data-dcnode-id="876" instrument_node="">9. SALES AND MARKETING STRATEGY</span></a></li><li data-dcnode-id="871"><a data-dcnode-id="872" href="#10_Sales_Forecast"><span data-dcnode-id="873" instrument_node="">10. Sales Forecast</span></a></li><li data-dcnode-id="868"><a data-dcnode-id="869" href="#11_Publicity_and_Advertising_Strategy"><span data-dcnode-id="870" instrument_node="">11. Publicity and Advertising Strategy</span></a></li><li data-dcnode-id="865"><a data-dcnode-id="866" href="#12_Our_Pricing_Strategy"><span data-dcnode-id="867" instrument_node="">12. Our Pricing Strategy</span></a></li></ul></li><li data-dcnode-id="856"><a data-dcnode-id="861" href="#13_Startup_Expenditure_Budget"><span data-dcnode-id="862" instrument_node="">13. Startup Expenditure (Budget)</span></a><ul data-dcnode-id="857"><li data-dcnode-id="858"><a data-dcnode-id="859" href="#14_Sustainability_and_Expansion_Strategy"><span data-dcnode-id="860" instrument_node="">14. Sustainability and Expansion Strategy</span></a></li></ul></li></ul></div><h4 data-dcnode-id="850"><span data-dcnode-id="851" id="1_Industry_Overview"><strong data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">1. Industry Overview</span></strong></span></h4><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">When we talk about interior design or interior decoration, we are talking about the art or process of designing the interior and in some cases the exterior of a facility; it could be a room or building. An interior designer is a person whose job is to coordinate and manage executes such projects.</span></p><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">The truth is that, interior design is a multidimensional vocation that covers activities such as conceptual development, communicating with the stakeholders of a project and the management and of course the execution of the design (project as agreed).</span></p><div class="code-block code-block-1" data-dcnode-id="836" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="837"><span data-dcnode-id="844" instrument_node="">
</span><span data-dcnode-id="842" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2552847123501338" data-ad-format="auto" data-ad-slot="4731700007" data-dcnode-id="841" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="840" instrument_node="">
</span></div></div><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Interior designer companies are responsible for planning the design of both living and commercial facilities; they master the craft of tuning their ideas or concept into a reality. The projects that interior designers handle can be broad in scope. It could range from structural modifications to the selection of matching furniture, curtains or blind, wallpaper and lighting et al.</span></p><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">The Interior Designers industry is indeed a big industry that has experienced consistent growth and innovations over the last five years. However, the industry is projected to experience marginally better conditions over the next five years. As long as the housing market is expected to improve strongly, there will also be corresponding growth for residential interior designers as existing home sales and housing starts make up ground over the five-year period.</span></p><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">So also, increase in corporate profit, growth and expansion of corporate organization will open up business opportunities of interior design companies simply because there will be need for organizations to remodel their facilities to meet up with the changing trends.</span></p><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Statistics has it that the Interior Designers industry has a low level of market share concentration. For instance in 2016, the top four leading interior decoration design companies are projected to account for less than 10.0% of the industry’s total revenue. Furthermore, it is fact that market share concentration has not changed significantly in the last five years.</span></p><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">It is important to clearly state that the Interior Designers industry is a highly fragmented industry with thousands of players, of which only a small percentage of the players of the industry generating an annual revenue exceeding $1.0 million. A large numbers of players in interior designer industry are self-employed simply because of the nature of the job they do and of course the low start – up capital required to start the business.</span></p><div class="code-block code-block-2" data-dcnode-id="816" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="817"><span data-dcnode-id="824" instrument_node="">

</span></div></div><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">The interior design industry is indeed a very large industry and pretty much active in all the parts of the world. Statistics has it that in the united states of America alone, there are about 102,848 registered interior design companies responsible for employing about 127,467 and the industry rakes in a whooping sum of $13bn annually.</span></p><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">In 2014 alone, the federal government of the United States of America spent a total sum of $11,270,048 on Interior Designers. During the period in review, they awarded 437 interior design contracts to 77 interior design companies, averaging a value of $146,364 per company.</span></p><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">The industry is indeed a highly competitive industry and of course a growing industry with steady growth rate of 3.0 percent annually. The interior design industry is very open to any aspiring entrepreneur who has the required skills to start his or her own interior design business and of course make good money from the industry.</span></p><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">As a matter of fact, it was projected that over the next five years, new technology will continue to emerge that will make it easier for more players to come into the industry hence increasing the competition in the industry.</span></p><h3 data-dcnode-id="805"><span data-dcnode-id="806" id="2_Executive_Summary"><span data-dcnode-id="807" instrument_node="">2. Executive Summary</span></span></h3><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Taffy &amp; Tanya House of Decoration™, Inc. is a U.S based interior design company. We have been able to secure a standard and well – positioned office facility in a busy business district in Virginia Beach – Virginia. We are a world class interior design company that is set to compete in the highly competitive interior design industry not only in the United States market, but also in the global market.</span></p><div class="code-block code-block-3" data-dcnode-id="793" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="794"><span data-dcnode-id="801" instrument_node="">

</span></div></div><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Taffy &amp; Tanya House of Decoration™, Inc. will be involved in the all aspect of interior design services such as Residential interior design services, Commercial interior design services, Merchandise sales, Interior decorating services consulting services (consulting on interior decorating matters, consulting on residential design matters, consulting on institutional design matters) and other related services.</span></p><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Our business goal is to become one of the leading interior design companies in the United States and we will make sure that every graphic design jobs that leaves our studio can favorable compete with the best in the industry. Our workers are going to be selected from a pool of talented and highly creative interior designers in and around Huston – Texas and also from any part of the world especially from Milan and Paris as the business grows.</span></p><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">We will make sure that we take all the members of our workforce through the required trainings that will position them to meet the expectation of the company and to compete with leading interior designers in the United States and throughout the globe.</span></p><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">At Taffy &amp; Tanya House of Decoration™, Inc. our client’s best interest come first, and everything we do will be guided by our values and professional ethics. We will ensure that we hold ourselves accountable to the highest standards by meeting our client’s needs precisely and completely.</span></p><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">We will cultivate a working environment that provides a human, sustainable approach to earning a living, and living in our world, for our partners, employees and for our clients. Taffy &amp; Tanya House of Decoration™, Inc. is founded by Mrs. Taffy Sanders and her friend, course mate and business partner for many years Ms. Tanya Emerson.</span></p><div class="code-block code-block-7" data-dcnode-id="773" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="774"><span data-dcnode-id="781" instrument_node="">

</span></div></div><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">They are both graduates from The Interior Design School London. Mrs. Taffy Sanders has an MBA from London Schools of Economics. Mrs. Taffy Sanders and Ms. Tanya Emerson worked with one of the leading interior design company in Europe before coming back to The United States to set up Taffy &amp; Tanya House of Decoration™, Inc.</span></p><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">This duo is vast and well-read in the interior décor trade and so is sure to build the interior décor business from the scratch to an enviable position.</span></p><h4 data-dcnode-id="765"><span data-dcnode-id="766" id="3_Our_Products_and_Services"><strong data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">3. Our Products and Services</span></strong></span></h4><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Taffy &amp; Tanya House of Decoration™, Inc. was established with the aim of maximizing profits in the interior design cum real estate industry. We want to compete favorably with the leading interior design companies in the United States which is why we have but in place a competent quality assurance team that will ensure that all our interior designs and related services rendered meet and even surpass our customers’ expectations.</span></p><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">We will work hard to ensure that Taffy &amp; Tanya House of Decoration™, Inc. is not just accepted in Virginia Beach – Virginia but also nationally in the United States of America. Our products and services are listed below;</span></p><ul data-dcnode-id="750"><li data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Residential interior design services</span></li><li data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Commercial interior design services</span></li><li data-dcnode-id="755"><span data-dcnod </span></div></div><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Taffy &amp; Tanya House of Decoration™, Inc. is an interior design company that intend starting small in Virginia Beach, but hope to grow big in order to compete favorably with leading interior design companies in the industry both in the United States and on a global stage.</span></p><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">We are aware of the importance of building a solid business structure that can support the picture of the kind of world class business we want to own. This is why we are committed to only hire the best hands within our area of operations.</span></p><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">At Taffy &amp; Tanya House of Decoration™, Inc., we will ensure that we hire people that are qualified, hardworking, creative, customer centric and are ready to work to help us build a prosperous business that will benefit all the stake holders (the owners, workforce, and customers).</span></p><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">As a matter of fact, profit-sharing arrangement will be made available to all our senior management staff and it will be based on their performance for a period of five years or more as agreed by the board of trustees of the company. In view of the above, we have decided to hire qualified and competent hands to occupy the following positions;</span></p><ul data-dcnode-id="703"><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Chief Executive Officer</span></li><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Creative Director</span></li><li data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Human Resources and Admin Manager</span></li><li data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Sales and Marketing Executive</span></li><li data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Accountant</span></li><li data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Interior Designer</span></li><li data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Client Service Executive</span></li></ul><h3 data-dcnode-id="699"><span data-dcnode-id="700" id="5_Job_Roles_and_Responsibilities"><strong data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">5. Job Roles and Responsibilities</span></strong></span></h3><p data-dcnode-id="696"><strong data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Chief Executive Officer – CEO:</span></strong></p><div class="code-block code-block-9" data-dcnode-id="686" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="687"><span data-dcnode-id="694" instrument_node="">

ent and managing interviewing process</span></li><li data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Carries out staff induction for new team members</span></li><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Responsible for training, evaluation and assessment of employees</span></li><li data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Responsible for arranging travel, meetings and appointments</span></li><li data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Oversees the smooth running of the daily office and factory activities.</span></li></ul><p data-dcnode-id="632"><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Sales and Marketing Manager</span></strong></p><ul data-dcnode-id="613"><li data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Manage external research and coordinate all the internal sources of information to retain the organizations’ best customers and attract new ones</span></li><li data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Model demographic information and analyze the volumes of transactional data generated by customer</span></li><li data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Identifies development opportunities; follows up on development leads and contacts; participates in the structuring and financing of projects; assures the completion of development projects.</span></li><li data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Writing winning proposal documents, negotiate fees and rates in line with organizations’ policy</span></li><li data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Responsible for handling business research, market surveys and feasibility studies for clients</span></li><li data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Responsible for supervising implementation, advocate for the customer’s needs, and communicate e for developing detailed designs and choosing materials</span></li><li data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Responsible for supervising the work as it is carried out.</span></li><li data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Responsible for preparing drafts or material based on an agreement brief.</span></li><li data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Researches and advice the organization on style, genre and other trendy info as it relates to interior design.</span></li></ul><p data-dcnode-id="564"><strong data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Client Service Executive</span></strong></p><ul data-dcnode-id="553"><li data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Welcomes clients and visitors by greeting them in person or on the telephone; answering or directing inquiries.</span></li><li data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Ensures that all contacts with clients (e-mail, walk-In center, SMS or phone) provides the client with a personalized customer service experience of the highest level</span></li><li data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Through interaction with clients on the phone, uses every opportunity to build client’s interest in the company’s products and services</span></li><li data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Manages administrative duties assigned by the HR manager in an effective and timely manner</span></li><li data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Consistently stays abreast of any new information on the organizations’ products, promotional campaigns etc. to ensure accurate and helpful information is supplied to potential clients when they make enquiries</span></li></ul><h3 data-dcnode-id="550"><span data-dcnode-id="551" id="6_SWOT_Analysis"><span data-dcnode-id="552" instrument_node="">6. SWOT Analysis</span></span></h3><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Taffy &amp; Tanya House of Decoration™, Inc. hire the services of a core professional in the area of business consulting and structuring to assist our organization in building a well – structured interior design business that can favorably compete in the highly competitive interior design industry in the United States and the world at large.</span></p><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Part of what the team of business consultant did was to work with the management of our organization in conducting a SWOT analysis for Taffy &amp; Tanya House of Decoration™, Inc. One of the reasons why we did this was to make sure that core professionals take care of identifying our core areas strength and weakness.</span></p><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Here is a summary from the result of the SWOT analysis that was conducted on behalf of Taffy &amp; Tanya House of Decoration™, Inc.;</span></p><ul data-dcnode-id="540"><li data-dcnode-id="541"><strong data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Strength:</span></strong></li></ul><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Our core strength lies in the power of our team; our workforce. We have a team of creative and highly proficient interior designers, a team with excellent qualifications and experience in various niche areas in the interior design industry.</span></p><div class="code-block code-block-11" data-dcnode-id="536" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="537"></div></div><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Aside from the synergy that exists in our carefully selected interior designers, we have a robust relationship with key stake holders in the real estate industry and of course our designs and services will be guided by best practices in the industry.</span></p><ul data-dcnode-id="530"><li data-dcnode-id="531"><strong data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Weakness:</span></strong></li></ul><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">As a new interior design company in Virginia Beach – Virginia, it might take some time for our organization to break into the market and gain acceptance especially from the government and other top profile clients in the already saturated and highly competitive interior design industry; that is perhaps our major weakness. Another weakness is that we may not have the required cash to promote our business the way we would want to.</span></p><ul data-dcnode-id="524"><li data-dcnode-id="525"><strong data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Opportunities:</span></strong></li></ul><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">No doubt, the opportunities in the interior design industry is massive considering the number of individuals and corporate organizations acquiring new properties and would need the services of interior designers to give the facilities facelift. As a graphic design company, we are ready to take advantage of any opportunity that is available in the industry.</span></p><ul data-dcnode-id="518"><li data-dcnode-id="519"><strong data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Threat:</span></strong></li></ul><p data-dcnode-id="513"><span data-dcnode-id="517" instrument_node="">Just like any other business, one of the major threats that we are likely going to face is economic downturn. It is a fact that economic downturn affects purchasing / spending power. Another threat that may likely confront us is the arrival of a new interior design company in same location where our target market exist and who may want to </span><a data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/types-business-models-example/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="516" instrument_node="">adopt same Business model</span></a><span data-dcnode-id="514" instrument_node=""> like us.</span></p><h3 data-dcnode-id="510"><span data-dcnode-id="511" id="7_MARKET_ANALYSIS"><span data-dcnode-id="512" instrument_node="">7. MARKET ANALYSIS</span></span></h3><ul data-dcnode-id="506"><li data-dcnode-id="507"><strong data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Market Trends</span></strong></li></ul><p data-dcnode-id="501"><span data-dcnode-id="505" instrument_node="">Although there are top flight institutions where people go to study interior design, it is common to find people who don’t have formal training running their own interior design business. This is what accounts for the high numbers of </span><a data-dcnode-id="503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/types-sole-proprietorship-form/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="504" instrument_node="">sole proprietorship</span></a><span data-dcnode-id="502" instrument_node=""> in the interior design industry. Aside from on – the- job training, most interior design companies usually offer short training (could be in – house) in specific areas such as presentation skills and IT packages.</span></p><div class="code-block code-block-12" data-dcnode-id="499" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="500"></div></div><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">As an interior designer, you are expected to keep tab with new trends and products that are always coming up in the industry. It is a fact that most interior designers ensure that they follow the traditions or patterns that are synonymous to a region.</span></p><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">For instance, as an interior designer in the Arab world, your designs are expected to follow the traditions and pattern in the region so also as an interior designer operating in the Orient or in the Nordic Region or in the Caribbean or any region with strong culture, your designs are expected to conform to their traditions and patterns.</span></p><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">It is important to state that in recent time, for any interior design company to continue to stay in business, they must continue to come up with highly creative design and concepts.</span></p><h4 data-dcnode-id="489"><span data-dcnode-id="490" id="8_Our_Target_Market"><strong data-dcnode-id="491"><span data-d rior design services are well accepted in the market place.</span></p><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Below is a list of the people and organizations that we have specifically market our products and services to;</span></p><ul data-dcnode-id="446"><li data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Construction Companies</span></li><li data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Property Development Companies</span></li><li data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Home Owners</span></li><li data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Corporate Organizations</span></li><li data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Realtors —for their clients’ homes</span></li><li data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Home Improvement Companies</span></li><li data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Commercial builders of office and home complexes</span></li><li data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Home builders associations</span></li><li data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Furniture stores</span></li><li data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Paint and wall paper stores</span></li><li data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Flower shops</span></li><li data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Real Estate Owners, Developers, and Contractors</span></li><li data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">The Government (Public Sector)</span></li><li data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Hotels</span></li><li data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Religious Organizations (Church hall and other places of worship)</span></li><li data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Television Stations (studios and offices)</span></li></ul><p data-dcnode-id="441"><strong data-dcnode-id="442"><span data-dcnode-id="445" instrument_node="">Our </span><a class="wpil_keyword_link" data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/example-companies-competitive-advantage/" rel="noopener noreferrer" target="_blank" title="competitive advantage"><span data-dcnode-id="444" instrument_node="">competitive advantage</span></a></strong></p><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">No doubt the competition in the interior design industry is getting stiffer by the day-as such, you have to be highly creative and come up with appealing designs and concepts in order to survive in the industry.</span></p><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">The interior design industry is indeed a profitable and at the same time a highly competitive industry; it enjoys strong demand as people continue to purchase or move into new apartments and remodel old ones. Clients will only hire your services if they know that they can get nothing but the best from you.</span></p><div class="code-block code-block-14" data-dcnode-id="435" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3 instrument_node="">Every business has to identify the areas that it wants to source for the startup funds, and we are set to do same. it wants to Taffy &amp; Tanya House of Decoration™ Inc. is established with the aim of maximizing profits in the interior design cum real estate industry and we are going to go all the way to ensure that we do all it takes to meet and surpass the expectations of all our clients.</span></p><div class="code-block code-block-15" data-dcnode-id="415" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="416"></div></div><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Taffy &amp; Tanya House of Decoration™ Inc. will generate income by offering the following interior design services and other related services;</span></p><ul data-dcnode-id="402"><li data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Residential interior design services</span></li><li data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Commercial interior design services</span></li><li data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Merchandise sales</span></li><li data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Interior decorating services consulting services (Consulting on interior decorating matters, Consulting on residential design matters, Consulting on institutional design matters)</span></li><li data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Other related services like giving interior makeover to historic buildings, vehicles, such as ships and aircraft et al.</span></li></ul><h4 data-dcnode-id="398"><span data-dcnode-id="399" id="10_Sales_Forecast"><strong data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">10. Sales Forecast</span></strong></span></h4><p data-dcnode-id="393"><span data-dcnode-id="397" instrument_node="">One thing is certain, there would always be corporate organization and individual who would need the services of interior designers whenever they purchase new home, </span><a data-dcnode-id="395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/cost-move-office/" rel="noopener" target="_blank"><span data-dcnode-id="396" instrument_node="">office facilities or moving into a new facility</span></a><span data-dcnode-id="394" instrument_node="">.</span></p><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">We are well positioned to take on the available market in interior design / real estate industry and we are quite optimistic that we will meet our set target of generating enough income / profits from the first six month of operations and grow our interior design company to enviable heights.</span></p><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">We have been able to critically examine the interior design market and we have analyzed our chances in the industry and we have been able to come up with the following sales forecast. The sales projection is based on information gathered on the field and some assumptions that are peculiar to similar startups in Virginia Beach – Virginia.</span></p><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Below is the sales projection for Taffy &amp; Tanya House of Decoration™ Inc., it is based on the location of our business and of course the wide range of our services and target market;</span></p><div class="code-block code-block-16" data-dcnode-id="385" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="386"></div></div><ul data-dcnode-id="372"><li data-dcnode-id="381"><strong data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">First Year-: </span></strong><span data-dcnode-id="382" instrument_node="">$150,000</span></li><li data-dcnode-id="377"><strong data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Second Year-: </span></strong><span data-dcnode-id="378" instrument_node="">$400,000</span></li><li data-dcnode-id="373"><strong data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Third Year-: </span></strong><span data-dcnode-id="374" instrument_node="">$750,000</span></li></ul><p data-dcnode-id="368"><strong data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">N.B:</span></strong><span data-dcnode-id="369" instrument_node=""> This projection is done based on what is obtainable in the industry and with the assumption that there won’t be any major economic meltdown and there won’t be any major competitor offering same interior design services as we do within same location. Please note that the above projection might be lower and at the same time it might be higher.</span></p><ul data-dcnode-id="364"><li data-dcnode-id="365"><strong data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Marketing Strategy and Sales Strategy</span></strong></li></ul><p data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">We are not ignorant of the fact that there is stiffer competition in the interior design industry; there are loads of interior designers jostling for contracts which is why we have been able to hire some of the best marketing experts to handle our sales and marketing.</span></p><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Our sales and marketing team will be recruited based on their vast experience in the real estate market and they will be trained on a regular basis so as to be well equipped to meet their targets and the overall business goal of Taffy &amp; Tanya House of Decoration™, Inc.</span></p><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Our goal is to grow Taffy &amp; Tanya House of Decoration™, Inc. to become one of the leading interior design companies in the United States of America which is why we have mapped out strategies that will help us take advantage of the available market and grow to become a major force to reckon with not only in Virginia Beach – Virginia but also in other cities in the United States of America.</span></p><p data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Taffy &amp; Tanya House of Decoration™ Inch is set to make use of the following marketing and sales strategies to attract clients and win interior decoration contracts;</span></p><ul data-dcnode-id="337"><li data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Introduce our interior design company by sending introductory letters alongside our brochure to corporate organizations, realtors, religious organizations and key stake holders in the real estate industry.</span></li><li data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Promptness in bidding for interior design contracts from the government and other cooperate organizations</span></li><li data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Advertise our business in relevant business magazines, newspapers, TV stations, and radio station.</span></li><li data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">List our business on yellow pages ads (local directories)</span></li><li data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Attend relevant international and local expos, seminars, and business fairs et al</span></li><li data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Create different packages for different category of clients in order to work with their budgets and still deliver excellent design and services</span></li><li data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Leverage on the internet to promote our business</span></li><li data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Engage direct marketing approach</span></li><li data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Encourage word of mouth marketing from loyal and satisfied clients</span></li></ul><h4 data-dcnode-id="333"><span data-dcnode-id="334" id="11_Publicity_and_Advertising_Strategy"><strong data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">11. Publicity and Advertising Strategy</span></strong></span></h4><p data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">We have been able to work with brand and publicity consultants to help us map out publicity and advertising strategies that will help us walk our way into the heart of our target market. We are set to become the number one choice for both corporate clients and individual clients in the whole of the Virginia Beach and beyond which is why we have made provisions for effective publicity and advertisement of our Interior design company.</span></p><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Below are the platforms we intend to leverage on to promote and advertise Taffy &amp; Tanya House of Decoration™ Inc.;</span></p><ul data-dcnode-id="308"><li data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Place adverts on both print (newspapers and magazines) and electronic media platforms</span></li><li data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Sponsor relevant community based events / programs</span></li><li data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Leverage on the internet and social media platforms like; Instagram, Facebook , twitter, YouTube, Google + et al to promote our services</span></li><li data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Install our Bill Boards on strategic locations all around Virginia Beach – Virginia</span></li><li data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Engage in roadshow from time to time in targeted neighborhoods</span></li><li data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Distribute our fliers and handbills in target areas</span></li><li data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Contact corporate organizations and residence in our target areas by calling them up and informing them of Taffy &amp; Tanya House of Decoration™ Inc. and the services we offer</span></li><li data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">List our interior design company in local directories / yellow pages</span></li><li data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Advertise our interior design company in our official website and employ strategies that will help us pull traffic to the site.</span></li><li data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Ensure that all our staff members wear our branded shirts and all our vehicles and trucks are well branded with our company logo et al.</span></li></ul><h4 data-dcnode-id="302"><span data-dcnode-id="303" id="12_Our_Pricing_Strategy"><strong data-dcnode-id="304"><span data-dcnode-id="307" instrument_node="">12. Our </span><a class="wpil_keyword_link" data-dcnode-id="305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/factors-product-pricing-strategy/" rel="noopener noreferrer" target="_blank" title="Pricing Strategy"><span data-dcnode-id="306" instrument_node="">Pricing Strategy</span></a></strong></span></h4><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">If you are conversant with the interior design industry, you will realize that the pricing structure ranges from per hour billings to fixed fee to even per square foot billing. Most interior decoration companies adopt all the available pricing system as it applies to the nature of the job or project they are expected to execute.</span></p><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">At Taffy &amp; Tanya House of Decoration™ Inc. we will adopt all the pricing system as is obtainable in the industry but we will ensure that we keep the prices of our services a little below the average market rate for all of our customers by keeping our overhead low and by collecting payment in advance from corporate organizations who would hire our services.</span></p><p data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">In addition, we will also offer special discounted rates to all our customers at regular intervals. We are aware that there are some one-off jobs or government contracts which are always lucrative; we will ensure that we abide by the pricing model that is expected from contractors or organizations that bid for such contracts.</span></p><ul data-dcnode-id="292"><li data-dcnode-id="293"><strong data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Payment Options</span></strong></li></ul><p data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">At Taffy &amp; Tanya House of Decoration™ Inc., our payment policy will be all inclusive because we are quite aware that different people prefer different payment options as it suits them. Here are the payment options that we will make available to our clients;</span></p><ul data-dcnode-id="277"><li data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Payment by via bank transfer</span></li><li data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Payment via online bank transfer</span></li><li data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Payment via check</span></li><li data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Payment via bank draft</span></li><li data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Payment via mobile money</span></li><li data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Payment with cash</span></li></ul><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">In view of the above, we have chosen banking platforms that will help us achieve our plans with little or no itches.</span></p><h3 data-dcnode-id="271"><span data-dcnode-id="272" id="13_Startup_Expenditure_Budget"><strong data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">13. Startup Expenditure (Budget)</span></strong></span></h3><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">In setting up any business, the amount or cost will depend on the approach and scale you want to undertake. If you intend to go big by renting a place, then you would need a good amount of capital as you would need to ensure that your employees are well taken care of, and that your facility is conducive enough for workers to be creative and productive.</span></p><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">This means that the start-up can either be low or high depending on your goals, vision and aspirations for your business. The materials and equipment that will be used are nearly the same cost everywhere, and any difference in prices would be minimal and can be overlooked.</span></p><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">As for the detailed cost analysis for starting an interior design company; it might differ in other countries due to the value of their money. However, this is what it would cost us to setup Taffy &amp; Tanya House of Decoration™ Inc. in Virginia Beach – Virginia, U.S;</span></p><ul data-dcnode-id="248"><li data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Business incorporating fees in the United States of America will cost – $750.</span></li><li data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">The budget for Liability insurance, permits and license will cost – $3,500</span></li><li data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Acquiring an office space or warehouse that will accommodate the number of employees for at least 6 months (Re – Construction of the facility inclusive) will cost – $150,000.</span></li><li data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Equipping the office (computers, printers, projectors, markers, servers / internet facility, furniture, telephones, filing cabinets, and electronics) will cost – $10,000</span></li><li data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Amount required to purchase the needed software applications – $ 3,500</span></li><li data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Launching an official Website will cost – $500</span></li><li data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Amount need to pay bills and staff members for at least 2 to 3 months – $70,000</span></li><li data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Additional Expenditure such as Business cards, Signage, Adverts and Promotions will cost – $5,000</span></li></ul><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Going by the report from the market research and feasibility studies conducted, we will need about two hundred thousand (200,000) U.S. dollars to successfully set – up a medium scale but standard interior design company firm in the United States of America.</span></p><p data-dcnode-id="243"><strong data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Generating Funding / Startup Capital for Taffy &amp; Tanya House of Decoration™ Inc.</span></strong></p><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">Taffy &amp; Tanya House of Decoration™ Inc. is a business that will be owned by Mrs. Taffy Sanders and her friend, course mate and business partner for many years Ms. Tanya Emerson. They are the sole financial of the business which is why they decided to restrict the sourcing of the start – up capital for the business to just three major sources.</span></p><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">These are the areas we intend generating our start – up capital;</span></p><ul data-dcnode-id="232"><li data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Generate part of the start – up capital from personal savings and sale of his stocks</span></li><li data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Generate part of the start – up capital from friends and other extended family members</span></li><li data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Generate a larger chunk of the startup capital from the bank (loan facility).</span></li></ul><p data-dcnode-id="227"><strong data-dcnode-id="229"><em data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">N.B:</span></em></strong><span data-dcnode-id="228" instrument_node=""> We have been able to generate about $100,000 (Personal savings $85,000 and soft loan from family members $15,000) and we are at the final stages of obtaining a loan facility of $100,000 from our bank. All the papers and document has been duly signed and submitted, the loan has been approved and any moment from now our account will be credited.</span></p><h4 data-dcnode-id="223"><span data-dcnode-id="224" id="14_Sustainability_and_Expansion_Strategy"><strong data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">14. Sustainability and Expansion Strategy</span></strong></span></h4><p data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">It is easier for businesses to survive when they have steady flow of business deals / customers patronizing their products and services. We are aware of this which is why we have decided to develop a various mobile apps for different clients and for different purposes. We will also work with corporate clients to help them develop customized mobile apps for their business.</span></p><p data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">We know that if we continue to come up with highly creative and unique interior designs concept and excellent job delivery for corporate organizations, government agencies and household, there will be steady flow of income for the organization.</span></p><p data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">Our key sustainability and expansion strategy is to ensure that we only hire creative, competent and selfless interior designers, create a conducive working environment and employee benefits for our staff members. In the nearest future, we will give our most dedicated and prolific employees the opportunity to be part owner of the business.</span></p><p data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">We know that if we implement our business strategies, we will achieve our business goals and objectives in record time.</span></p><p data-dcnode-id="212"><strong data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">Check List / Milestone</span></strong></p><ul data-dcnode-id="121"><li data-dcnode-id="208"><span data-dcnode-id="211" instrument_node="">Business Name Availability Check: </span><strong data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">Completed</span></strong></li><li data-dcnode-id="204"><span data-dcnode-id="207" instrument_node="">Business Incorporation: </span><strong data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Completed</span></strong></li><li data-dcnode-id="200"><span data-dcnode-id="203" instrument_node="">Opening of Corporate Bank Accounts various banks in the United States: </span><strong data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">Completed</span></strong></li><li data-dcnode-id="196"><span data-dcnode-id="199" instrument_node="">Opening Online Payment Platforms: </span><strong data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Completed</span></strong></li><li data-dcnode-id="192"><span data-dcnode-id="195" instrument_node="">Application and Obtaining Tax Payer’s ID: </span><strong data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="188"><span data-dcnode-id="191" instrument_node="">Securing a standard office facility plus renovation of the facility: </span><strong data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Completed</span></strong></li><li data-dcnode-id="184"><span data-dcnode-id="187" instrument_node="">Application for business license and permit: </span><strong data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">Completed</span></strong></li><li data-dcnode-id="180"><span data-dcnode-id="183" instrument_node="">Purchase of All form of Insurance for the Business: </span><strong data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Completed</span></strong></li><li data-dcnode-id="176"><span data-dcnode-id="179" instrument_node="">Conductin
