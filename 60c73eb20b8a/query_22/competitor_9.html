class="grid-flex grid-valign-middle" data-dcnode-id="669"><div class="column expand" data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">What types of small businesses use Square?</span></div><div class="column" data-dcnode-id="670"><div class="h3 font-weight-regular color-gray" data-dcnode-id="671"><span class="caret no-wrap" data-dcnode-id="672"></span></div></div></div></a></h3><div class="collapse gap-none" data-dcnode-id="664" data-transition-state="on" data-transition-types="collapse fade" id="accordion-7hRQL7lOWkn33j7qxKgBE2"><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Square works with professional service businesses of all shapes and sizes, from the self-employed and small business owners to multi-location firms. Some types of professional services companies using Square include accounting firms, consulting firms, law firms, architecture firms, interior and web design businesses, tax management firms, marketing firms and more. You can choose the payment solution strategy that’s right for your professional services business, customise your point of sale to get paid faster and do more business with stronger insights.</span></p></div></li><li class="border-top pad-vert-small" data-dcnode-id="651" data-entry-id="1KPx5FqMYytul2Ua2hYh7r"><h3 class="h6 gap-none" data-dcnode-id="655"><a class="hotspot" data-dcnode-id="656" data-transition-state="on" data-transition-target="accordion-1KPx5FqMYytul2Ua2hYh7r" href="#"><div class="grid-flex grid-valign-middle" data-dcnode-id="657"><div class="column expand" data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">How do Square’s tools work together?</span></div><div class="column" data-dcnode-id="658"><div class="h3 font-weight-regular color-gray" data-dcnode-id="659"><span class="caret no-wrap" data-dcnode-id="660"></span></div></div></div></a></h3><div class="collapse gap-none" data-dcnode-id="652" data-transition-state="on" data-transition-types="collapse fade" id="accordion-1KPx5FqMYytul2Ua2hYh7r"><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">All of Square’s tools seamlessly sync to cover everything your professional services business needs. From payment processing to customer management to advanced analytics, Square’s best-in-class products serve different parts of your business – all with one system. Our payment solutions work with other tools, like invoices, team management and more, to help grow your business, keep costs down, manage your cash flow and accept payments anywhere. Square also syncs with the small business accounting and bookkeeping software you already use, like Freshbooks and Xero.</span></p></div></li><li class="border-top pad-vert-small" data-dcnode-id="639" data-entry-id="57Nh2KayIz9ARPVWDXvNFh"><h3 class="h6 gap-none" data-dcnode-id="643"><a class="hotspot" data-dcnode-id="644" data-transition-state="on" data-transition-target="accordion-57Nh2KayIz9ARPVWDXvNFh" href="#"><div class="grid-flex grid-valign-middle" data-dcnode-id="645"><div class="column expand" data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">What kinds of payment solutions does Square offer?</span></div><div class="column" data-dcnode-id="646"><div class="h3 font-weight-regular color-gray" data-dcnode-id="647"><span class="caret no-wrap" data-dcnode-id="648"></span></div></div></div></a></h3><div class="collapse gap-none" data-dcnode-id="640" data-transition-state="on" data-transition-types="collapse fade" id="accordion-57Nh2KayIz9ARPVWDXvNFh"><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">With Square, your professional services company can offer whatever payment method works best for you and your customers. It’s easy to create professional invoices for online payments, accept credit card payments on-site with your POS system, take card-not-present payments on your computer and sync them all up seamlessly with your accounting software. Square’s cloud-based software works seamlessly with our card readers and other hardware for contactless in-person credit card transactions. Whether you run your professional services business in an office or the field, Square payment solutions work wherever you do. There are no long-term commitments or hidden fees – simply pay the processing fee per transaction.</span></p></div></li><li class="border-top pad-vert-small" data-dcnode-id="627" data-entry-id="6P6WxZrm6D9Q8sC72iePn8"><h3 class="h6 gap-none" data-dcnode-id="631"><a class="hotspot" data-dcnode-id="632" data-transition-state="on" data-transition-target="accordion-6P6WxZrm6D9Q8sC72iePn8" href="#"><div class="grid-flex grid-valign-middle" data-dcnode-id="633"><div class="column expand" data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">How does Square save small business owners time? </span></div><div class="column" data-dcnode-id="634"><div class="h3 font-weight-regular color-gray" data-dcnode-id="635"><span class="caret no-wrap" data-dcnode-id="636"></span></div></div></div></a></h3><div class="collapse gap-none" data-dcnode-id="628" data-transition-state="on" data-transition-types="collapse fade" id="accordion-6P6WxZrm6D9Q8sC72iePn8"><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Square’s tools help small businesses like yours take care of payments and paperwork all in one system. Our payment processing tools are packed with automated features that let you create recurring charges for repeat projects, schedule online invoices, track payments and create auto-reminders for clients. You can manage every transaction easily and ensure you’re paid on time. Square payment systems include quick payment processing to give you faster access to funds. With Square it’s easy to create a single, organised workflow with built-in payment schedules to keep every project on track. Square syncs across your devices, so whether you’re using a mobile app or web browser, you can run your business from anywhere.</span></p></div></li><li class="border-top pad-vert-small" data-dcnode-id="615" data-entry-id="3zf0fa7vscDBqaq4fTjI7J"><h3 class="h6 gap-none" data-dcnode-id="619"><a class="hotspot" data-dcnode-id="620" data-transition-state="on" data-transition-target="accordion-3zf0fa7vscDBqaq4fTjI7J" href="#"><div class="grid-flex grid-valign-middle" data-dcnode-id="621"><div class="column expand" data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Does Square work with my accounting software?</span></div><div class="column" data-dcnode-id="622"><div class="h3 font-weight-regular color-gray" data-dcnode-id="623"><span class="caret no-wrap" data-dcnode-id="624"></span></div></div></div></a></h3><div class="collapse gap-none" data-dcnode-id="616" data-transition-state="on" data-transition-types="collapse fade" id="accordion-3zf0fa7vscDBqaq4fTjI7J"><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Yes, Square works with the leading accounting software apps, syncing your sales with companies like Freshbooks, Xero and many others that your small business or firm might use. For more information about compatible accounting software apps and accounting features made possible with Square, click here.</span></p></div></li><li class="border-top pad-vert-small" data-dcnode-id="603" data-entry-id="22hyJDsM7vr1ebeI4khieT"><h3 class="h6 gap-none" data-dcnode-id="607"><a class="hotspot" data-dcnode-id="608" data-transition-state="on" data-transition-target="accordion-22hyJDsM7vr1ebeI4khieT" href="#"><div class="grid-flex grid-valign-middle" data-dcnode-id="609"><div class="column expand" data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Is there a free trial for Square POS?</span></div><div class="column" data-dcnode-id="610"><div class="h3 font-weight-regular color-gray" data-dcnode-id="611"><span class="caret no-wrap" data-dcnode-id="612"></span></div></div></div></a></h3><div class="collapse gap-none" data-dcnode-id="604" data-transition-state="on" data-tra
