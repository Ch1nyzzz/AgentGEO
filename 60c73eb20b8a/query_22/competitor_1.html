</span><h3 data-dcnode-id="763"><span class="nowrap" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Features and Benefits</span></span></h3><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">EstiPC helps you keep control of the financial and administrative aspects of interior design projects. It's simple and efficient, leaving you more time for creative work.</span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">EstiPC handles all your project information including descriptions, images, confidential details, costings, markups and fees. It uses this information selectively to generate client estimates, invoices and statements, supplier orders, contractor listings, management reports and summaries.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">EstiPC saves you time and money by increasing efficiency, avoiding duplication, eliminating financial and administrative mistakes, monitoring project cash flow and analysing profitability.</span></p><span data-dcnode-id="753" instrument_node="">
</span><h3 data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Technology and Security</span></h3><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">EstiPC is designed, programmed and supported in the UK and used all around the world. It's an original, stable and secure product, based on over 20 years' experience of interior design business software.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">EstiPC is self-contained, stand-alone software. It's not based on other office or database software.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">EstiPC puts you in control of your projects and data. It runs directly and securely on your computer. It's not a cloud or web-based service so don't need to rely on internet connections or service providers. The risks of exposing your client's confidential information to cloud service security threats is minimised.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p class="gaptop" data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Got a Mac? You need...</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="733"><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.estimac.com/"><img alt="EstiMac - Interior Design Software for Mac" data-dcnode-id="737" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//estisoft.com/images/estimac.png&amp;raw" width="143"><br data-dcnode-id="736"><span data-dcnode-id="735" instrument_node="">www.estimac.com</span></a></p><span data-dcnode-id="732" instrument_node="">
</span><img alt="" class="floatleft gapright gaptop gapbottom featureimage" data-dcnode-id="731" id="image-more" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//estisoft.com/images/office-189811220.jpg&amp;raw"><span data-dcnode-id="730" instrument_node="">
</span><div data-dcnode-id="715" style="min-height: 260px;"><span data-dcnode-id="729" instrument_node="">
</span><h3 data-dcnode-id="726"><span class="nowrap" data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Networking and Sharing</span></span></h3><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">In larger companies EstiPC can be configured to share projects and data between many users.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Sharing can be implemented using a network server, shared network drive or a cloud service such as Dropbox or Google Drive.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">It's even possible to share using mixed networks of Macs and PCs as EstiMac and EstiPC projects and data are fully compatible.</span></p><span data-dcnode-id="716" instrument_node="">
</span></div><span data-dcnode-id="714" instrument_node="">
</span><h3 data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Licensing and Pricing</span></h3><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">EstiPC is sold as an annual licence. A separate licence is required for each computer on which you use the software.</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Charging in this way minimises your initial costs and enables us to continue to develop and enhance the software.</span></p><span data-dcnode-id="705" instrument_node="">
</span><div class="guides" data-dcnode-id="680" style="margin: 10px 0px 10px 0px; padding: 10px 20px 10px 20px;"><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Licences are priced at...</span></p><span data-dcnode-id="701" instrument_node="">
</span><ul data-dcnode-id="684"><span data-dcnode-id="700" instrument_node="">
</span><li data-dcnode-id="696"><b data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">£350</span></b><span data-dcnode-id="697" instrument_node=""> UK / €405 EU / $440 US - per year - single licence</span></li><span data-dcnode-id="695" instrument_node="">
</span><li data-dcnode-id="691"><b data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">£300</span></b><span data-dcnode-id="692" instrument_node=""> UK / €345 EU / $375 US - per licence per year - 2 to 5 licences</span></li><span data-dcnode-id="690" instrument_node="">
</span><li data-dcnode-id="686"><b data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">£250</span></b><span data-dcnode-id="687" instrument_node=""> UK / €290 EU / $315 US - per licence per year - 6 or more licences</span></li><span data-dcnode-id="685" instrument_node="">
</span></ul><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">This includes software updates and support via our online help centre and email. 
						</span></p></div><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">A further payment is required every year to renew the licence. If you ever decide not to renew your licences you'll still be able to view your existing projects and data.</span></p><span data-dcnode-id="676" instrument_node="">
</span><p class="small grey" data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">VAT is charged at 20% to UK users. The above prices are exclusive of VAT.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p class="small grey" data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">EU and US prices are aproximate. Payment is by credit card, debit card or direct bank transfer in UK pounds sterling at the current exchange rate.</span></p><span data-dcnode-id="670" instrument_node="">
</span><p class="small" data-dcnode-id="667"><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.estipc.com/start/terms.php"><span data-dcnode-id="669" instrument_node="">Licence Agreement</span></a></p><span data-dcnode-id="666" instrument_node="">

</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Just send us your details and let us know how many licences you require. We'll email you a quotation / pro forma including online payment details.</span></p><span data-dcnode-id="656" instrument_node="">

</span><div class="large" data-dcnode-id="554" id="features-list"><p class="padbottom" data-dcnode-id="569"><span data-dcnode-id="572" instrument_node="">EstiPC handles all your interior design project administration, including estimating, ordering, invoicing and reporting. It's rapidly becoming the industry standard for interior design business software.</span><br data-dcnode-id="571"><span data-dcnode-id="570" instrument_node="">•</span></p><p class="padbottom" data-dcnode-id="565"><span data-dcnode-id="568" instrument_node="">EstiPC is simple and efficient, leaving you more time for creative work. It avoids errors and duplication, saving you time, money and hassle.</span><br data-dcnode-id="567"><span data-dcnode-id="566" instrument_node="">•</span></p><p class="padbottom" data-dcnode-id="561"><span data-dcnode-id="564" instrument_node="">EstiPC gives you a complete overview of your projects, no matter how big or small. From multi-million developments to single room decoration projects, it keeps you in control.</span><br data-dcnode-id="563"><span data-dcnode-id="562" instrument_node="">•</span></p><p class="padbottom" data-dcnode-id="557"><span data-dcnode-id="560" instrument_node="">EstiPC is an original product based on over 20 years experience of interior design business software. It's safe and secure and doesn't rely on database software or cloud services.</span><br data-dcnode-id="559"><span data-dcnode-id="558" instrument_node="">•</span></p><p class="padbottom" data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">EstiPC and EstiMac has over 1000 users around the world, from small independent startups to major international design studios. It helps you make your business successful and profitable.</span></p></div><span data-dcnode-id="553" instrument_node="">
