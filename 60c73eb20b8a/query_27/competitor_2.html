</span><h1 data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Starting a Balloon Business: Tips from the Pros</span></h1><span data-dcnode-id="642" instrument_node="">
</span><span data-dcnode-id="640" instrument_node="">
</span><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="637" instrument_node="">Starting a balloon business is super exciting, but also a bit scary. What if your designs aren't good enough? What if your prices are too high or too low? What if you have no idea how to </span><a data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balloon-decoration-guide.com/market-your-balloon-business.html"><span data-dcnode-id="636" instrument_node="">market your balloon business</span></a><span data-dcnode-id="634" instrument_node="">?</span></p><span data-dcnode-id="632" instrument_node="">
</span><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Take a deep breath. Feeling anxious about a new business is normal. </span></p><p data-dcnode-id="622"><span data-dcnode-id="626" instrument_node="">I don't know about you, but I find it most helpful when I can look at examples, when I can talk to </span><b data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">people who have already done what I am about to do</span></b><span data-dcnode-id="623" instrument_node="">.</span></p><p data-dcnode-id="617"><span data-dcnode-id="621" instrument_node="">So I've reached out to </span><b data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">experienced balloon business owners</span></b><span data-dcnode-id="618" instrument_node=""> and asked them for their top tips. Click on the links below to jump directly to their answers:</span></p><p data-dcnode-id="614"><a data-dcnode-id="615" href="#GREG"><span data-dcnode-id="616" instrument_node="">Greg Brown from Balloon Market</span></a></p><p data-dcnode-id="611"><a data-dcnode-id="612" href="#CHRISTINE"><span data-dcnode-id="613" instrument_node="">Christine Maentz from Volunteer Balloons</span></a></p><span data-dcnode-id="610" instrument_node="">
</span><div class="CalloutBox" data-dcnode-id="603" style="box-sizing: border-box"><p data-dcnode-id="605"><span data-dcnode-id="609" instrument_node="">If you haven't done so yet, please&nbsp;</span><a data-dcnode-id="607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balloon-decoration-guide.com/newsletter-opt-in.html"><span data-dcnode-id="608" instrument_node="">subscribe to BloonsUp News</span></a><span data-dcnode-id="606" instrument_node="">. It's free and you'll be the first to hear when I am adding more tips and advice for starting your balloon business.&nbsp;</span></p><span data-dcnode-id="604" instrument_node="">
</span></div><span data-dcnode-id="602" instrument_node="">
</span><h2 data-dcnode-id="600" id="GREG"><span data-dcnode-id="601" instrument_node="">Tips for Starting a Balloon Business: Greg Brown, Balloon Market</span></h2><span data-dcnode-id="599" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="595"><img alt="Balloon Market TV Video Thumbnail" class="ss-lazy error" data-dcnode-id="598" data-pin-media="https://www.balloon-decoration-guide.com/images/balloon-market-bmtv_600px.jpg" data-src="https://www.balloon-decoration-guide.com/images/balloon-market-bmtv_600px.jpg" data-was-processed="true" height="339" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balloon-decoration-guide.com/images/balloon-market-bmtv_600px.jpg&amp;raw" style="width: 600px; height: auto" title="BMTV Video Interview with John and Sue Bowler" width="600"><span class="Caption CaptionCenter" data-dcnode-id="596" style="max-width:600px"><span data-dcnode-id="597" instrument_node="">Greg Brown (bottom left) interviewing Sue and John Bowler in one of their BMTV Video Episodes.</span></span></div><span data-dcnode-id="594" instrument_node="">
</span><h3 data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Please tell us your name and background in the balloon industry</span></h3><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="590" instrument_node="">Greg Brown, Director at </span><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balloonmarket.co.uk/" onclick="return FIX.track(this);" rel="noopener" target="_blank"><span data-dcnode-id="589" instrument_node="">Balloon Market</span></a><span data-dcnode-id="587" instrument_node=""> and Presenter of Balloon Market TV (BMTV) on YouTube. We started in the business in 2004 as a </span><a data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balloon-decoration-guide.com/balloon-in-a-box.html"><span data-dcnode-id="586" instrument_node="">balloon in a box</span></a><span data-dcnode-id="584" instrument_node=""> delivery business as well as doing some decoration. </span></p><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">We sold inflated balloons online that were delivered next day across the UK. Then when the recession hit in 2008 / 2009 we decided we needed customers who came back again and again rather than once a year. </span></p><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">That was when Balloon Market was born as our trade-only website to support the balloon decoration, retail and events industries.</span></p><span data-dcnode-id="578" instrument_node="">
</span><h3 data-dcnode-id="575"><span data-dcnode-id="577" instrument_node="">From your experience, what are the two biggest challenges for beginning balloon professionals?</span><br data-dcnode-id="576"></h3><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="573" instrument_node="">I would say the same as any business – </span><b data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">learning the business stuff</span></b><span data-dcnode-id="570" instrument_node="">! </span></p><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Learning the actual skills to create something with balloons is easily accessible with training courses online, YouTube videos (including BMTV), face to face training and supportive industry groups. </span></p><p data-dcnode-id="562"><span data-dcnode-id="566" instrument_node="">However the </span><b data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">business stuff is the stuff that will make you successful or not</span></b><span data-dcnode-id="563" instrument_node="">. This includes, finance, taxation, marketing, brand building, hiring people, managing people, process design, communication etc. </span></p><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">These things tend to end up on the “will get to it later” list as you are out creating with balloons.</span></p><p data-dcnode-id="556"><b data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">The second challenge is confidence, particularly when it comes to pricing.</span></b><span data-dcnode-id="557" instrument_node=""> People feel they are new so don’t have the skills to charge what they should or simply don’t believe they can do something so turn jobs down. </span></p><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">So pricing for profit is absolutely a skill that should be learned on day one!</span></p><span data-dcnode-id="553" instrument_node="">
</span><div class="CalloutBox" data-dcnode-id="546" style="box-sizing: border-box"><p data-dcnode-id="548"><span data-dcnode-id="552" instrument_node="">Do you struggle with pricing, too? I've put together a 5 minute video tutorial about </span><a data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balloon-decoration-guide.com/how-to-price-your-balloon-decor.html"><span data-dcnode-id="551" instrument_node="">how to price your balloon decor</span></a><span data-dcnode-id="549" instrument_node=""> the right way.</span></p><span data-dcnode-id="547" instrument_node="">
</span></div><span data-dcnode-id="545" instrument_node="">
</span><h3 data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">What are your top 3 tips for starting a balloon business?</span></h3><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="534"><b data-dcnode-id="539"><span data-dcnode-id="541" instrument_node="">Training</span><br data-dcnode-id="540"></b><span data-dcnode-id="538" instrument_node="">The one sure thing that will increase confidence is training. </span><b data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Go on as many training courses as you can afford whilst you build your business.</span></b><span data-dcnode-id="535" instrument_node=""> This gives you the confidence to go out and get the jobs that you really want. </span></p><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">You will be more profitable more quickly when you learn from people that have been doing it for years!</span></p><p data-dcnode-id="526"><b data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Challenge yourself!</span></b><span data-dcnode-id="529" instrument_node=""> </span><br data-dcnode-id="528"><span data-dcnode-id="527" instrument_node="">Take on the job you have never done before and then figure out how to do it! There is no greater motivator to learning than having to do it for a customer’s deadline! </span></p><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Don’t under-price yourself just because you are less experienced, particularly if you have been on training courses. Use our pricing tool!</span></p><p data-dcnode-id="518"><b data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Learn to be happy solving problems.</span></b><span data-dcnode-id="521" instrument_node=""> </span><br data-dcnode-id="520"><span data-dcnode-id="519" instrument_node="">You will have problems and you will need to find solutions, quite often, in some hotel an hour before the event! Remember the biggest part of running a business is running a business, not actually producing the pieces for the customer, although still a very important part! </span></p><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">You will need to be comfortable with business problems as well as balloon related problems.</span></p><span data-dcnode-id="515" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="504"><img alt="Starting a Balloon Business - Tips from the Pros" class="ss-lazy error" data-dcnode-id="514" data-pin-media="https://www.balloon-decoration-guide.com/images/starting-a-balloon-business-600px.jpg" data-src="https://www.balloon-decoration-guide.com/images/starting-a-balloon-business-600px.jpg" data-was-processed="true" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balloon-decoration-guide.com/images/starting-a-balloon-business-600px.jpg&amp;raw" style="width: 450px; height: auto" title="When you think about starting a balloon business, these tips can be helpful." width="450"><span class="Caption CaptionCenter" data-dcnode-id="512" style="max-width:450px"><span data-dcnode-id="513" instrument_node="">Like this page? Pin it for later!</span></span><div class="pinit" data-dcnode-id="505"><span data-dcnode-id="511" instrument_node="">
</span><a class="PIN_1651036324206_button_pin PIN_1651036324206_beside PIN_1651036324206_save PIN_1651036324206_padded" data-dcnode-id="507" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=XFUgEaCn59WP-1&amp;url=https%3A%2F%2Fwww.balloon-decoration-guide.com%2Fstarting-a-balloon-business.html&amp;media=https%3A%2F%2Fwww.balloon-decoration-guide.com%2Fimages%2Fstarting-a-balloon-business-600px.jpg&amp;description=Starting%20a%20balloon%20business%3F%20There's%20nothing%20more%20helpful%20than%20learning%20from%20experienced%20balloon%20business%20owners.%20They've%20been%20where%20you%20are%20now!%20They've%20dealt%20with%20the%20same%20challenges%20and%20worries.%20Click%20to%20read%20the%20top%20tips%20from%20the%20pros%20now.%0A%23balloonbusiness%20%23mompreneur%20%23startabusiness%20%23homebusinessideas%20%23balloonguide" data-pin-log="button_pinit" data-pin-x="131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Fguid%3DXFUgEaCn59WP-1%26url%3Dhttps%253A%252F%252Fwww.balloon-decoration-guide.com%252Fstarting-a-balloon-business.html%26media%3Dhttps%253A%252F%252Fwww.balloon-decoration-guide.com%252Fimages%252Fstarting-a-balloon-business-600px.jpg%26description%3DStarting%2520a%2520balloon%2520business%253F%2520There%27s%2520nothing%2520more%2520helpful%2520than%2520learning%2520from%2520experienced%2520balloon%2520business%2520owners.%2520They%27ve%2520been%2520where%2520you%2520are%2520now%21%2520They%27ve%2520dealt%2520with%2520the%2520same%2520challenges%2520and%2520worries.%2520Click%2520to%2520read%2520the%2520top%2520tips%2520from%2520the%2520pros%2520now.%250A%2523balloonbusiness%2520%2523mompreneur%2520%2523startabusiness%2520%2523homebusinessideas%2520%2523balloonguide"><span class="PIN_1651036324206_count" data-dcnode-id="509" data-pin-href="https://www.pinterest.com/pin/create/button/?guid=XFUgEaCn59WP-1&amp;url=https%3A%2F%2Fwww.balloon-decoration-guide.com%2Fstarting-a-balloon-business.html&amp;media=https%3A%2F%2Fwww.balloon-decoration-guide.com%2Fimages%2Fstarting-a-balloon-business-600px.jpg&amp;description=Starting%20a%20balloon%20business%3F%20There's%20nothing%20more%20helpful%20than%20learning%20from%20experienced%20balloon%20business%20owners.%20They've%20been%20where%20you%20are%20now!%20They've%20dealt%20with%20the%20same%20challenges%20and%20worries.%20Click%20to%20read%20the%20top%20tips%20from%20the%20pros%20now.%0A%23balloonbusiness%20%23mompreneur%20%23startabusiness%20%23homebusinessideas%20%23balloonguide" data-pin-log="button_pinit" data-pin-x="131"><span data-dcnode-id="510" instrument_node="">131</span></span><span data-dcnode-id="508" instrument_node="">Save</span></a><span data-dcnode-id="506" instrument_node="">
</span></div></div><span data-dcnode-id="503" instrument_node="">
</span><h3 data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Which learning resources would you recommend?&nbsp;</span></h3><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="492"><b data-dcnode-id="497"><span data-dcnode-id="499" instrument_node="">BMTV!&nbsp;</span><br data-dcnode-id="498"></b><span data-dcnode-id="496" instrument_node="">We built </span><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/c/BalloonMarket" onclick="return FIX.track(this);" rel="noopener" target="_blank"><span data-dcnode-id="495" instrument_node="">BMTV</span></a><span data-dcnode-id="493" instrument_node=""> as a form of communication and support for our customers and the balloon community worldwide. We speak to Industry professionals, discuss the issues of the day, show the basics and also designs by world renowned industry professionals. It is a really good starting point.</span></p><p data-dcnode-id="487"><b data-dcnode-id="489"><span data-dcnode-id="491" instrument_node="">Audible and Podcasts</span><br data-dcnode-id="490"></b><span data-dcnode-id="488" instrument_node="">I use Audible and get a new audio book every month. I also listen to a few podcasts on a regular basis. Audio books and podcasts are great as you can listen to them when you exercise, when you commute and maybe even when you are working (depending what you do!).</span></p><p data-dcnode-id="482"><span data-dcnode-id="486" instrument_node="">They give you access to the most successful people in the world telling you how they built their businesses. Why would you not want to know that? My favourite is </span><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.audible.co.uk/search%3Fkeywords%3Dgary%2Bvaynerchuk%26ref%3Da_hp_t1_header_search" onclick="return FIX.track(this);" rel="noopener" target="_blank"><span data-dcnode-id="485" instrument_node="">Gary Vaynerchuk</span></a><span data-dcnode-id="483" instrument_node=""> – if it wasn’t for him, BMTV wouldn’t exist!</span></p><p data-dcnode-id="474"><b data-dcnode-id="479"><span data-dcnode-id="481" instrument_node="">Training courses</span><br data-dcnode-id="480"></b><span data-dcnode-id="478" instrument_node="">Face to face is always best but if there aren’t any in your area, then online courses can be good also. We have our, relatively new, </span><a data-dcnode-id="476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vimeo.com/balloonschoolpro" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="477" instrument_node="">Balloon School Pro courses</span></a><span data-dcnode-id="475" instrument_node=""> on Vimeo. More will be added soon!</span></p><span data-dcnode-id="473" instrument_node="">
</span><div class="CalloutBox" data-dcnode-id="462" style="box-sizing: border-box"><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Note from Margit:</span></p><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Thank you so much Greg for sharing your advice and tips for beginning balloon professionals. </span></p><p data-dcnode-id="464"><span data-dcnode-id="468" instrument_node="">I can wholeheartedly recommend the </span><a data-dcnode-id="466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/c/BalloonMarket" onclick="return FIX.track(this);" rel="noopener" target="_blank"><span data-dcnode-id="467" instrument_node="">BMTV YouTube Channel</span></a><span data-dcnode-id="465" instrument_node="">. The videos are super professional (and entertaining, too!). Topics range from balloon decorating tutorials to presenting new products to interviews with experts about starting and running a balloon business.</span></p><span data-dcnode-id="463" instrument_node="">
</span></div><span data-dcnode-id="461" instrument_node="">
</span><h2 data-dcnode-id="459" id="CHRISTINE"><span data-dcnode-id="460" instrument_node="">Tips for Starting a Balloon Business: Christine Maentz, Volunteer Balloons</span></h2><span data-dcnode-id="458" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="453"><a data-dcnode-id="454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D4ESG_CbkboQ" onclick="return FIX.track(this);" rel="noopener" target="_blank"><img alt="Christine Maentz from Volunteer Balloons in a news interview." class="ss-lazy loaded" data-dcnode-id="457" data-pin-media="https://www.balloon-decoration-guide.com/images/christine-maentz_volunteer-balloons.jpg" data-src="https://www.balloon-decoration-guide.com/images/christine-maentz_volunteer-balloons.jpg" data-was-processed="true" height="484" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balloon-decoration-guide.com/images/christine-maentz_volunteer-balloons.jpg&amp;raw" style="width: 861px; height: auto" title="Christinge Maentz from Volunteer Balloons being interviewed by WBIR TV." width="861"><span class="Caption CaptionCenter" data-dcnode-id="455" style="max-width:861px"><span data-dcnode-id="456" instrument_node="">Christine Maentz was interviewed by local Tennessee TV channel WBIR. She talks about the balloon displays in her garden, part of the "One Million Bubbles of Joy" project. (Clicking the image takes you to YouTube where you can watch the interview.)</span></span></a></div><span data-dcnode-id="452" instrument_node="">
</span><h3 data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Please tell us your name and background in the balloon industry</span></h3><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="448" instrument_node="">My name is Christine Maentz and I started </span><a data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//knoxvilleballoondecor.com/" onclick="return FIX.track(this);" rel="noopener" target="_blank"><span data-dcnode-id="447" instrument_node="">Volunteer Balloons</span></a><span data-dcnode-id="445" instrument_node=""> in May of 2015. I had been professionally twisting balloons for special events since 2011 and was very content doing so.</span></p><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">At almost 60 years old I had no plans of starting a new career or business. However, I let myself be convinced by a local artist who was starting to offer balloon decor classes, that my talents could be put to better use and increased revenue! I took the 5 day class and aced it - working with balloons was already easy for me. </span></p><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">At this point, I was convinced I had to obtain my CBA (Certified Balloon Artist), and so dived into the Qualatex material to prepare to take this exam.</span></p><span data-dcnode-id="439" instrument_node="">
</span><h3 data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">From your experience, what are the two biggest challenges for beginning balloon professionals?</span></h3><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="429"><span data-dcnode-id="435" instrument_node="">There are many challenges when starting any business! I think the biggest is that as much as we love our balloons and the emotions that we can create with our arrangements </span><b data-dcnode-id="430"><span data-dcnode-id="434" instrument_node="">we forget the “business” side: sales, </span><a data-dcnode-id="432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balloon-decoration-guide.com/market-your-balloon-business.html"><span data-dcnode-id="433" instrument_node="">marketing</span></a><span data-dcnode-id="431" instrument_node="">, office work, accounting, inventory management, etc.&nbsp;</span></b></p><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Yes, we do have a very fun &amp; unique business but we mustn’t forget what makes it operate efficiently.</span></p><p data-dcnode-id="423"><b data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">The second biggest challenge I believe is pricing.</span></b><span data-dcnode-id="424" instrument_node=""> You need to be aware of all of your costs and labor and not be afraid to charge accordingly. Final cost to your client should contain all of your time, starting from the 1st correspondence to the final delivery. </span></p><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Use a job cost form correctly and make sure it includes the correct percentage of your operating expenses.&nbsp;</span></p><span data-dcnode-id="420" instrument_node="">
</span><h3 data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">What are your top 3 tips for starting a balloon business?</span></h3><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="403"><b data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Appear Professional</span></b><br data-dcnode-id="414"><span data-dcnode-id="413" instrument_node="">If available, </span><b data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">pick a business name that will easily come up with search engines</span></b><span data-dcnode-id="410" instrument_node="">. For instance,
</span><em data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">(your city) Balloon Works</span></em><span data-dcnode-id="407" instrument_node=""> or </span><em data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">(your city) Balloons Galore</span></em><span data-dcnode-id="404" instrument_node="">. Purchase your domain name and if
you can’t do it yourself, hire someone to help you set-up your online presence.</span></p><p data-dcnode-id="399"><b data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Have your email
address set up with your domain name.</span></b><span data-dcnode-id="400" instrument_node=""> Example, BalloonsbySarah@gmail.com is not
professional. It's so important to appear professional - even if you are working out of a
spare bedroom, you can look big. </span></p><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Use a name that you don’t have to spell to your customers.
Set up a website - even if it’s just one page. You can build as you go. Put up your best
pictures.
</span></p><p data-dcnode-id="388"><b data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Get the correct equipment.</span></b><span data-dcnode-id="394" instrument_node=""> </span><br data-dcnode-id="393"><span data-dcnode-id="392" instrument_node="">Forget about making an arch form using PVC and plywood.
Purchase an </span><a data-dcnode-id="390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aeropolesystem.com/" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="391" instrument_node="">AeroPole System</span></a><span data-dcnode-id="389" instrument_node="">. Your work will be outstanding and your clients will notice.
</span></p><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Purchase the best inflator you can afford that will inflate all sizes of balloons. You will save so
much time. And time is money.
</span></p><p data-dcnode-id="381"><b data-dcnode-id="383"><span data-dcnode-id="385" instrument_node="">Know your competition.</span><br data-dcnode-id="384"></b><span data-dcnode-id="382" instrument_node="">Know your competition and maintain a friendly and cordial relationship. You never know when
you’re going to need help - or they may need help one day and could call on you. </span></p><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Never, ever
talk down the competition no matter what. You are selling a product that relates to joy and
good times. Remember clients are shopping for a positive experience… not ugly gossip.</span></p><span data-dcnode-id="378" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="374"><img alt="Organic balloon arch by Christine Maentz, Volunteer Balloons" class="ss-lazy" data-dcnode-id="377" data-pin-media="https://www.balloon-decoration-guide.com/images/christine-maentz_organic-balloon-arch.jpg" data-src="https://www.balloon-decoration-guide.com/images/christine-maentz_organic-balloon-arch.jpg" height="450" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20450'%3E%3C/svg%3E" style="width: 600px; height: auto" title="Welcome Home Standard Knoxville: organic balloon arch decoration" width="600"><span class="Caption CaptionCenter" data-dcnode-id="375" style="max-width:600px"><span data-dcnode-id="376" instrument_node="">An example of Christine's skills as balloon decorator!</span></span></div><span data-dcnode-id="373" instrument_node="">
</span><h3 data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Which learning resources would you recommend?&nbsp;</span></h3><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="364"><b data-dcnode-id="367"><a data-dcnode-id="368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balloon-decoration-guide.com/balloon-business-start.html%23QBN" onclick="return FIX.track(this);"><span data-dcnode-id="369" instrument_node="">Qualatex Course and Certification</span></a></b><br data-dcnode-id="366"><span data-dcnode-id="365" instrument_node="">I would strongly recommend you contact the people at Qualatex and order the course they
provide (on DVD’s). You will learn everything there is to know and you will be preparing for your
eventual certification (CBA). </span></p><p data-dcnode-id="359"><span data-dcnode-id="363" instrument_node="">Although not essential to operating a legitimate balloon decor
business, being able to tell your clients that you </span><b data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">have been certified as a balloon artist certainly
adds credibility to your business</span></b><span data-dcnode-id="360" instrument_node="">.
</span></p><p data-dcnode-id="353"><b data-dcnode-id="356"><a data-dcnode-id="357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.balloon-decoration-guide.com/balloon-business-start.html%23DVDs" onclick="return FIX.track(this);"><span data-dcnode-id="358" instrument_node="">Online Resources and In-Person Classes</span></a></b><br data-dcnode-id="355"><span data-dcnode-id="354" instrument_node="">There are so many online resources to tap into! I still watch at least 1 hour per week of balloon
decorating by other professionals on Youtube. You’ll learn different technics from a variety of
artists and you will soon find some that you prefer to others.</span></p><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">If you’re able to attend hands-on classes or conventions, go and learn! You’ll make new friends
