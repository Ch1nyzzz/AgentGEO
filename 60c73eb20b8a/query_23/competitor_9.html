</span><p data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">A clear plan is essential for success as an entrepreneur. It will help you map out the specifics of your business and discover some unknowns. A few important topics to consider are:</span></p><span data-dcnode-id="2152" instrument_node="">
</span><ul data-dcnode-id="2134"><span data-dcnode-id="2151" instrument_node="">
</span><li data-dcnode-id="2148"><a data-dcnode-id="2149" href="#ongoning-costs"><span data-dcnode-id="2150" instrument_node="">What are the startup and ongoing costs?</span></a></li><span data-dcnode-id="2147" instrument_node="">
</span><li data-dcnode-id="2144"><a data-dcnode-id="2145" href="#target-market"><span data-dcnode-id="2146" instrument_node="">Who is your target market?</span></a></li><span data-dcnode-id="2143" instrument_node="">
</span><li data-dcnode-id="2140"><a data-dcnode-id="2141" href="#charge"><span data-dcnode-id="2142" instrument_node="">How much can you charge customers?</span></a></li><span data-dcnode-id="2139" instrument_node="">
</span><li data-dcnode-id="2136"><a data-dcnode-id="2137" href="#name-your-business"><span data-dcnode-id="2138" instrument_node="">What will you name your business?</span></a></li><span data-dcnode-id="2135" instrument_node="">
</span></ul><span data-dcnode-id="2133" instrument_node="">
</span><p data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Luckily we have done a lot of this research for you.</span></p><span data-dcnode-id="2130" instrument_node="">
</span><a class="anchor" data-dcnode-id="2129" id="ongoning-costs"></a><span data-dcnode-id="2128" instrument_node="">
</span><h4 data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">What are the costs involved in opening an interior design business?</span></h4><span data-dcnode-id="2125" instrument_node="">
</span><p data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">If you are going to be self-employed, this business can be started in a very modest way for a few thousand dollars by taking online home study courses to get your certification and then working from home until you build up a client base that can support the expenses of an office and additional staff.</span></p><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2117"><span data-dcnode-id="2121" instrument_node="">If you are considering working for a major design firm before beginning your own business, you will most likely need to pay for a </span><a data-dcnode-id="2119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asid.org/belong/advance-to-allied%23.WJjGEDsrLDc" target="_blank"><span data-dcnode-id="2120" instrument_node="">formal education to get a degree</span></a><span data-dcnode-id="2118" instrument_node="">. There are two-year and four-year programs at major universities, colleges, trade schools, community colleges, and art/design schools. These programs range from $4,000 to 25,000 per year.</span></p><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">The range in startup costs after you have a degree and are certified is what it takes to pay for an office for the time needed to find your first clients. Allow six months for the initial marketing efforts to attract the first clients and $2,000 to $5,000 per month budget ($12,000 to $30,000 total) to give you enough time to succeed.</span></p><span data-dcnode-id="2113" instrument_node=""> </span><h4 data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">What are the ongoing expenses for an interior design business?</span></h4><span data-dcnode-id="2110" instrument_node="">
</span><p data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">This is not a high overhead business. You will need to pay for marketing expenses, the cost of an office, insurance, staff (if you have any), and transportation costs to go to visit clients. A small interior design business, operating from home, might have expenses of around $2,000 to $3,000 per month. The next step up would be having a commercial office space and that runs around $2,000 per month more. As you add staff you will need to allow for $5,000 to $12,000 per month in additional expenses so your total monthly budget could rise to be about $20,000 per month.</span></p><span data-dcnode-id="2107" instrument_node=""> </span><a class="anchor" data-dcnode-id="2106" id="target-market"></a><span data-dcnode-id="2105" instrument_node="">
</span><h4 data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">Who is the target market?</span></h4><span data-dcnode-id="2102" instrument_node="">
</span><p data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">The best type of client is one that is easy to get along with, has good taste, enjoys the finer things in life, is open to suggestions, and has a project where “money is no object” with an almost unlimited budget. Of course, no one just starting out in this business will find clients like that.</span></p><span data-dcnode-id="2099" instrument_node="">
</span><p data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">The second best type of client is the “bread and butter” client. These clients have a reasonable budget to spend on the interior design work and ask the interior designer to work on a specific space. When they are pleased with the results, they give the same interior designer another project to work on. They also tell their friends how happy they are with the work and invite them over to see what was done.</span></p><span data-dcnode-id="2096" instrument_node="">
</span><p data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Most of the successful interior design firms have plenty of this second type of client. By making these clients happy, the business grows in an almost organic, automatic way. One successful project leads to another and then another.</span></p><span data-dcnode-id="2093" instrument_node=""> </span><h4 data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">How does an interior design business make money?</span></h4><span data-dcnode-id="2090" instrument_node="">
</span><p data-dcnode-id="2085"><span data-dcnode-id="2089" instrument_node="">Interior design firms can be paid in a variety of ways. </span><a data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mn.asid.org/costs" target="_blank"><span data-dcnode-id="2088" instrument_node="">The American Society of Interior Designers</span></a><span data-dcnode-id="2086" instrument_node=""> notes these are the most common ways to charge for interior design services:</span></p><span data-dcnode-id="2084" instrument_node="">
</span><ul data-dcnode-id="2052"><span data-dcnode-id="2083" instrument_node="">
</span><li data-dcnode-id="2079"><em data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">Charging a flat or fixed fee</span></em><span data-dcnode-id="2080" instrument_node=""> – After discussing the project with the client and agreeing on the detailed specifics of the project scope, the interior designer proposes a complete fee (expense reimbursement of actual out-of-pocket costs is additional) to take the project through all the stages from concept development, specifications, layout, and installation.</span></li><span data-dcnode-id="2078" instrument_node="">
</span><li data-dcnode-id="2074"><em data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Time-based fee</span></em><span data-dcnode-id="2075" instrument_node=""> – The interior designer proposes a compensation rate based on hours, weeks, or months of service.</span></li><span data-dcnode-id="2073" instrument_node="">
</span><li data-dcnode-id="2069"><em data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Project percentage fee</span></em><span data-dcnode-id="2070" instrument_node=""> – The interior designer earns a markup percentage of the cost of the total project including any items, artwork, furniture, or services purchased to complete the project for the client.</span></li><span data-dcnode-id="2068" instrument_node="">
</span><li data-dcnode-id="2064"><em data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Retainer with balance paid upon completion</span></em><span data-dcnode-id="2065" instrument_node=""> – An initial deposit is paid by the client, which is a portion of the interior designer’s fee that is agreed by signed written contract. The balance of this fee is paid upon successful completion of the project.</span></li><span data-dcnode-id="2063" instrument_node="">
</span><li data-dcnode-id="2059"><em data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">Cost plus</span></em><span data-dcnode-id="2060" instrument_node=""> – Using this method, the interior designer buys things at wholesale for the project and then charges the client the retail price or a slightly discounted price from regular retail.</span></li><span data-dcnode-id="2058" instrument_node="">
</span><li data-dcnode-id="2054"><em data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Cost per square foot</span></em><span data-dcnode-id="2055" instrument_node=""> – The fee for the interior designer is calculated based on the total square footage involved in the project.</span></li><span data-dcnode-id="2053" instrument_node="">
</span></ul><span data-dcnode-id="2051" instrument_node=""> </span><a class="anchor" data-dcnode-id="2050" id="charge"></a><span data-dcnode-id="2049" instrument_node="">
</span><h4 data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">How much can you charge customers?</span></h4><span data-dcnode-id="2046" instrument_node="">
</span><p data-dcnode-id="2041"><span data-dcnode-id="2045" instrument_node="">The self-employed interior designer can charge on average $75 per hour for their services. </span><a data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//freshome.com/2013/08/16/what-you-need-to-know-to-start-your-own-interior-design-firm/" target="_blank"><span data-dcnode-id="2044" instrument_node="">One interior designer on Fresh Home</span></a><span data-dcnode-id="2042" instrument_node=""> recommends using as a guide the rate that a plumber charges per hour in your local area.</span></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">The top interior designer firms in the world, are able to charge clients millions of dollars in fees. Partners in those firms make more than one million a year and regular staff designers make around $80,000 to $144,000 per year.</span></p><span data-dcnode-id="2037" instrument_node=""> </span><h4 data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">How much profit can an interior design business make?</span></h4><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">The total profit depends on the number of interior designers working for the firm and that there is enough work to keep them all busy. Each designer should generate enough billable hours at $75 per hour to bring in revenues of $80,000 to $144,000 per year. If the firm is a single designer, the expenses would be $24,000 to $60,000 per year, which creates a gross profit before taxes of $56,000 to $84,000 per year.</span></p><span data-dcnode-id="2031" instrument_node=""> </span><h4 data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">How can you make your business more profitable?</span></h4><span data-dcnode-id="2028" instrument_node="">
</span><p data-dcnode-id="2023"><span data-dcnode-id="2027" instrument_node="">It is not uncommon for an interior design firm to double as an architectural firm, combining the two through dual expertise or through a partnership between an interior designer and an architect. Several of the </span><a data-dcnode-id="2025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bestinteriordesigners.eu/the-worlds-top-10-interior-designers/" target="_blank"><span data-dcnode-id="2026" instrument_node="">world’s best interior design firms</span></a><span data-dcnode-id="2024" instrument_node=""> have an architectural component, which provides additional revenues.</span></p><span data-dcnode-id="2022" instrument_node="">
</span><p data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">Another source of additional income is designing products to sell (e.g. lamps, furniture, decorative items etc.) and then creating a popular and successful brand name for those products.</span></p><span data-dcnode-id="2019" instrument_node=""> </span><a class="anchor" data-dcnode-id="2018" id="name-your-business"></a><span data-dcnode-id="2017" instrument_node="">
</span><h4 data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">What will you name your business?</span></h4><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="2007"><span data-dcnode-id="2013" instrument_node="">Choosing the right name is important and challenging. If you don’t already have a name in mind, visit our </span><a data-dcnode-id="2011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/how-to-name-your-business"><span data-dcnode-id="2012" instrument_node="">How to Name a Business</span></a><span data-dcnode-id="2010" instrument_node=""> guide or get help brainstorming a name with our </span><a data-dcnode-id="2008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/business-name-generator/interior-design-business"><span data-dcnode-id="2009" instrument_node="">Interior Design Business Name Generator</span></a></p><span data-dcnode-id="2006" instrument_node="">
</span><p data-dcnode-id="1998"><span data-dcnode-id="2005" instrument_node="">If you operate a </span><a data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/definition/sole-proprietorship"><span data-dcnode-id="2004" instrument_node="">sole proprietorship</span></a><span data-dcnode-id="2002" instrument_node="">, you might want to operate under a business name other than your own name. Visit our </span><a data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/what-is-a-dba"><span data-dcnode-id="2001" instrument_node="">DBA</span></a><span data-dcnode-id="1999" instrument_node=""> guide to learn more.</span></p><span data-dcnode-id="1997" instrument_node="">
</span><p data-dcnode-id="1992"><span data-dcnode-id="1996" instrument_node="">When </span><a data-dcnode-id="1994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/how-to-register-business-name"><span data-dcnode-id="1995" instrument_node="">registering a business name</span></a><span data-dcnode-id="1993" instrument_node="">, we recommend researching your business name by checking:</span></p><span data-dcnode-id="1991" instrument_node="">

</span><p data-dcnode-id="1918"><span data-dcnode-id="1934" instrument_node="">The most common </span><a data-dcnode-id="1932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/choosing-a-business-structure"><span data-dcnode-id="1933" instrument_node="">business structure</span></a><span data-dcnode-id="1931" instrument_node=""> types are the </span><a data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/sole-proprietorship"><span data-dcnode-id="1930" instrument_node="">sole proprietorship</span></a><span data-dcnode-id="1928" instrument_node="">, </span><a data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/definition/partnership"><span data-dcnode-id="1927" instrument_node="">partnership</span></a><span data-dcnode-id="1925" instrument_node="">, </span><a data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/what-is-an-llc"><span data-dcnode-id="1924" instrument_node="">limited liability company (LLC)</span></a><span data-dcnode-id="1922" instrument_node="">, and </span><a data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/corporation/what-is-a-corporation"><span data-dcnode-id="1921" instrument_node="">corporation</span></a><span data-dcnode-id="1919" instrument_node="">.</span></p><span data-dcnode-id="1917" instrument_node="">
</span><p data-dcnode-id="1909"><span data-dcnode-id="1916" instrument_node="">Establishing a legal business entity such as an </span><strong data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">LLC</span></strong><span data-dcnode-id="1913" instrument_node=""> or </span><strong data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">corporation</span></strong><span data-dcnode-id="1910" instrument_node=""> protects you from being held personally liable if your interior design business is sued.</span></p><span data-dcnode-id="1908" instrument_node="">

</span><p data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Using dedicated business banking and credit accounts is essential for personal asset protection.</span></p><span data-dcnode-id="1613" instrument_node="">

</span><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">Failure to acquire necessary permits and licenses can result in hefty fines, or even cause your business to be shut down.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><h4 data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">State &amp; Local Business Licensing Requirements</span></h4><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1471"><span data-dcnode-id="1475" instrument_node="">Some states require the possession of interior design licenses to act as an interior designer. Other states only require licensing if you wish to formally adopt the title of “interior designer.” To qualify for licensure, you must pass the National Council for Interior Design Certification exam. In order to take this exam, you must have a bachelor’s degree in interior design and two years of work experience. A list of states requiring licensure can be found </span><a data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.allartschools.com/interior-design/interior-designer-license/" target="_blank"><span data-dcnode-id="1474" instrument_node="">here</span></a><span data-dcnode-id="1472" instrument_node="">.</span></p><span data-dcnode-id="1470" instrument_node=""> </span><div class="content-well well" data-dcnode-id="1460" style="text-align:left"><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1462"><strong data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Most businesses are required to collect sales tax on the goods or services they provide.</span></strong><span data-dcnode-id="1466" instrument_node=""> To learn more about how sales tax will affect your business, read our article, </span><a data-dcnode-id="1464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/taxes/sales-tax-guide%23register" target="_blank"><span data-dcnode-id="1465" instrument_node="">Sales Tax for Small Businesses</span></a><span data-dcnode-id="1463" instrument_node="">.</span></p><span data-dcnode-id="1461" instrument_node="">

</span><li data-dcnode-id="1447"><span data-dcnode-id="1451" instrument_node="">Get assistance from one of the local associations listed in </span><a data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sba.gov/tools/local-assistance" target="_blank" title="US Small Business Associations directory of local business resources"><span data-dcnode-id="1450" instrument_node="">US Small Business Associations directory of local business resources</span></a><span data-dcnode-id="1448" instrument_node="">.</span></li><span data-dcnode-id="1446" instrument_node="">

</span><p data-dcnode-id="1413"><span data-dcnode-id="1418" instrument_node="">Just as with licenses and permits, your business needs insurance in order to operate safely and lawfully. </span><strong data-dcnode-id="1414"><a data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/business-insurance" target="_blank" title="Business Insurance"><span data-dcnode-id="1417" instrument_node="">Business Insurance</span></a><span data-dcnode-id="1415" instrument_node=""> protects your company’s financial wellbeing in the event of a covered loss.</span></strong></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1411" instrument_node="">There are several types of insurance policies created for different types of businesses with different risks. If you’re unsure of the types of risks that your business may face, </span><strong data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">begin with General Liability Insurance</span></strong><span data-dcnode-id="1408" instrument_node="">. This is the most common coverage that small businesses need, so it’s a great place to start for your business.</span></p><span data-dcnode-id="1406" instrument_node="">

</span><p data-dcnode-id="1395"><span data-dcnode-id="1399" instrument_node="">Another notable insurance policy that many businesses need is </span><a data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/what-is-workers-compensation" target="_blank" title="Workers' Compensation Insurance"><span data-dcnode-id="1398" instrument_node="">Workers’ Compensation Insurance</span></a><span data-dcnode-id="1396" instrument_node="">. If your business will have employees, it’s a good chance that your state will require you to carry Workers' Compensation Coverage.</span></p><span data-dcnode-id="1394" instrument_node="">

</span><h4 data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">How to promote &amp; market an interior design business</span></h4><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Use the best practices for website search engine optimization (SEO) to get your website listed as high as possible on the search engine results page. Find your focus and market yourself locally. Write high quality content articles (or hire writers to do this) and build an email list by using information given out on your blog, such as e-books. Use free downloadable “how-to” guides to entice the web visitors to join your mailing list. Enter business competitions. Go to tradeshows. Network with architects, real estate brokers, property management companies, new home developers, custom home builders, and all the contacts you can make through the local chamber of commerce and other business organizations.</span></p><span data-dcnode-id="1320" instrument_node=""> </span><h4 data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">How to keep customers coming back</span></h4><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Things you can do to attract clients are to be gregarious and highly involved in the community because word-of-mouth is the most powerful form of advertising. Another way to attract clients is to do showcases. In many areas, they take a home and allow interior designers to decorate one room each and then let the public pass through the home to see the quality of the work. These are great promotional events. Even though this is hard work and requires an investment of time and money, it usually leads to an expanded client base.</span></p><span data-dcnode-id="1314" instrument_node="">

</span><p data-dcnode-id="1302" style="text-align:left;"><span data-dcnode-id="1306" instrument_node="">Still unsure about what kind of business you want to start? Check out the latest </span><a data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/small-business-trends"><span data-dcnode-id="1305" instrument_node="">Small ﻿Business Trends</span></a><span data-dcnode-id="1303" instrument_node=""> to help inspire you.</span></p><span data-dcnode-id="1301" instrument_node="">

</span><h3 data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">STEP 9: Create your business website</span></h3><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1291" instrument_node="">After defining your brand and creating your logo the next step is to </span><a data-dcnode-id="1289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/how-to-build-a-website" target="_blank" title="How to Build a Website"><span data-dcnode-id="1290" instrument_node="">create a website for your business</span></a><span data-dcnode-id="1288" instrument_node="">.</span></p><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">While creating a website is an essential step, some may fear that it’s out of their reach because they don’t have any website-building experience. While this may have been a reasonable fear back in 2015, web technology has seen huge advancements in the past few years that makes the lives of small business owners much simpler.</span></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Here are the main reasons why you shouldn’t delay building your website:</span></p><span data-dcnode-id="1280" instrument_node="">
</span><ul data-dcnode-id="1258"><span data-dcnode-id="1279" instrument_node="">
</span><li data-dcnode-id="1275"><strong data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">All legitimate businesses have websites</span></strong><span data-dcnode-id="1276" instrument_node=""> - full stop. The size or industry of your business does not matter when it comes to getting your business online.</span></li><span data-dcnode-id="1274" instrument_node="">
</span><li data-dcnode-id="1269"><span data-dcnode-id="1273" instrument_node="">Social media accounts like </span><strong data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Facebook pages or LinkedIn business profiles are not a replacement for a business website</span></strong><span data-dcnode-id="1270" instrument_node=""> that you own.</span></li><span data-dcnode-id="1268" instrument_node="">

</span><h2 data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Is this Business Right For You?</span></h2><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">The people who work as interior designers have an in-depth understanding of color usage, textures, furniture styles, artwork, lighting, fashion trends, eco-materials, indoor plants, and a whole range of other things that can be used as design elements for interior spaces. They need to be very good at dealing with people, including clients that can be quite difficult and workers that make mistakes on occasion. Their main talent is aligning their own view of what the interior space will be made to look like with the client’s preferences and needs, so that both are very satisfied with the results.</span></p><span data-dcnode-id="1020" instrument_node=""> </span><div class="well cta-well row" data-dcnode-id="999"><span data-dcnode-id="1019" instrument_node="">
</span><div class="col-2 col-sm-1" data-dcnode-id="1015"><span data-dcnode-id="1018" instrument_node="">

</span></div><span data-dcnode-id="1014" instrument_node="">
</span><div class="col-10 col-sm-11" data-dcnode-id="1001"><span data-dcnode-id="1013" instrument_node="">
</span><h4 data-dcnode-id="1010"><strong data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Want to know if you are cut out to be an entrepreneur?</span></strong></h4><span data-dcnode-id="1009" instrument_node="">
</span><p class="text-center" data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Take our Entrepreneurship Quiz to find out!</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p class="text-center" data-dcnode-id="1003"><a class="btn btn-lg text-uppercase btn-primary" data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/entrepreneurship-quiz"><span data-dcnode-id="1005" instrument_node="">Entrepreneurship Quiz</span></a></p><span data-dcnode-id="1002" instrument_node="">
</span></div><span data-dcnode-id="1000" instrument_node="">
</span></div><span data-dcnode-id="998" instrument_node="">
</span><h3 data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">What happens during a typical day at an interior design business?</span></h3><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">There are three main activities of an interior design firm owner. They are: 1) constantly learning about new elements of design and current trends, 2) seeking new clients to work for, and: 3) managing the ongoing projects and staff.</span></p><span data-dcnode-id="992" instrument_node="">
</span><h3 data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">What are some skills and experiences that will help you build a successful interior design business?</span></h3><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Having a flair for creative efforts, the ability to work hard, and an eye for aesthetics are the critical elements needed to succeed in this work. Most interior designers have a degree in interior design, but some are architects, and some have a degree in fine arts and supplement their knowledge by taking interior design classes for the necessary certification requirements.</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">If people walk into your home and are amazed by how it looks and ask how they can get similar results created for them, you are on the right track and may have found your first client.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="982" instrument_node="">The American Society of Interior Designers has a website with </span><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asid.org/belong/student/benefits%23.WJjEATsrLDc" target="_blank"><span data-dcnode-id="981" instrument_node="">information for students</span></a><span data-dcnode-id="979" instrument_node=""> and </span><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asid.org/belong/advance-to-allied" target="_blank"><span data-dcnode-id="978" instrument_node="">information for those who want to become interior designers</span></a><span data-dcnode-id="976" instrument_node="">. They also have a </span><a data-dcnode-id="974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asid-jobs.careerwebsite.com/" rel="nofollow" target="_blank" title="American Society of Interior Designers"><span data-dcnode-id="975" instrument_node="">job bank</span></a><span data-dcnode-id="973" instrument_node=""> and recommend </span><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.asid.org/career" target="_blank"><span data-dcnode-id="972" instrument_node="">taking an internship with a design firm</span></a><span data-dcnode-id="970" instrument_node=""> to learn more about this career path.</span></p><span data-dcnode-id="968" instrument_node="">
</span><h3 data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">What is the growth potential for an interior design business?</span></h3><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="964" instrument_node="">Interior Design publishes an annual list of the </span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.interiordesign.net/articles/11450-2016-top-100-giants-research-ranking/" target="_blank"><span data-dcnode-id="963" instrument_node="">100 top designs firms in the world</span></a><span data-dcnode-id="961" instrument_node="">.</span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">The list for 2016 shows these firms are the top ten with these earnings:</span></p><span data-dcnode-id="956" instrument_node="">
</span><ol data-dcnode-id="904"><span data-dcnode-id="955" instrument_node="">
</span><li data-dcnode-id="951"><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gensler.com/" target="_blank"><span data-dcnode-id="954" instrument_node="">Gensler</span></a><span data-dcnode-id="952" instrument_node=""> from San Francisco earned $527 million in design fees.</span></li><span data-dcnode-id="950" instrument_node="">

</span><h2 data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Take the Next Step</span></h2><span data-dcnode-id="822" instrument_node="">
</span><h3 data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Find a business mentor</span></h3><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="818" instrument_node="">One of the greatest resources an entrepreneur can have is quality mentorship. As you start planning your business, connect with a </span><a data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/local-resources"><span data-dcnode-id="817" instrument_node="">free business resource</span></a><span data-dcnode-id="815" instrument_node=""> near you to get the help you need.</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Having a support network in place to turn to during tough times is a major factor of success for new business owners.</span></p><span data-dcnode-id="810" instrument_node="">
</span><h3 data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Learn from other business owners</span></h3><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="806" instrument_node="">Want to learn more about starting a business from entrepreneurs themselves? Visit Startup Savant’s </span><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//startupsavant.com/startups" target="_blank"><span data-dcnode-id="805" instrument_node="">startup founder series</span></a><span data-dcnode-id="803" instrument_node=""> to gain entrepreneurial insights, lessons, and advice from founders themselves.</span></p><span data-dcnode-id="801" instrument_node="">
</span><h3 data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Resources to Help Women in Business</span></h3><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">There are many resources out there specifically for women entrepreneurs. We’ve gathered necessary and useful information to help you succeed both professionally and personally:</span></p><span data-dcnode-id="795" instrument_node="">
</span><ul data-dcnode-id="781"><span data-dcnode-id="794" instrument_node="">
</span><li data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Funding</span></li><span data-dcnode-id="791" instrument_node="">
</span><li data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Events</span></li><span data-dcnode-id="788" instrument_node="">
</span><li data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Guides</span></li><span data-dcnode-id="785" instrument_node="">
</span><li data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Support</span></li><span data-dcnode-id="782" instrument_node="">
</span></ul><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="779" instrument_node="">If you’re a woman looking for some guidance in entrepreneurship, check out this great new series </span><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//startupsavant.com/women-in-business" target="_blank"><span data-dcnode-id="778" instrument_node="">Women in Business</span></a><span data-dcnode-id="776" instrument_node=""> created by the women of our partner Startup Savant.</span></p><span data-dcnode-id="774" instrument_node="">
</span><h3 data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">What are some insider tips for jump starting an interior design business?</span></h3><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">It is best to have some experience by either interning at or working with a design firm. Alternatively, you can offer to help a successful interior designer that works on their own. While learning, build up a portfolio of your work. Take high-quality digital photographs of the work, make big glossy prints for your physical portfolio (11” x 17” size), and put them in a very attractive leather portfolio binder. Carry this physical portfolio with you everywhere you go and as often as possible show your work to other people.</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Use a “soft” sell approach, by not trying to sell anything at all. Just ask everyone, even someone you just met in a casual setting, to give you their opinion of your work. You will be surprised how this can lead to jobs. Also, put the photos on a website that shows the best of your work as well.</span></p><span data-dcnode-id="765" instrument_node="">
</span><h3 data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">How and when to build a team</span></h3><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">When there is so much design work that you have a client waiting list, it is time to consider adding staff to help you. However, it is imperative that you supervise your staff and exercise caution when hiring a new team members, as your business' reputation will rely on the quality of your staff and quality of the work that they do.&nbsp;</span></p><span data-dcnode-id="759" instrument_node=""> </span></div><span data-dcnode-id="757" instrument_node="">

</span><p data-dcnode-id="730"><span data-dcnode-id="734" instrument_node="">Sign up at the </span><a data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//howtostartanllc.com/business-center"><span data-dcnode-id="733" instrument_node="">Business Center</span></a><span data-dcnode-id="731" instrument_node=""> to access useful tools for your business.</span></p><span data-dcnode-id="729" instrument_node="">
