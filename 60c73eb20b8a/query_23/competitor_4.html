olor"></path></svg></span></button><div class="FmtbLQ TfRV3Q _252raA jAXz3w" data-dcnode-id="350"><p class="fFOiLQ _2xcaIA _5Ob-nQ I-IZwQ fM_HdA" data-dcnode-id="351"><a class="ovm4pQ qN-0PQ" data-dcnode-id="352" draggable="false" href="#__a11yId70"><span class="N00Reg" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Skip to start of list</span></span></a></p></div><div data-dcnode-id="349" id="__a11yId71" style="padding-top:120px;margin-top:-120px"></div></div></div></div></div></div></section></div></div></div><div data-dcnode-id="319" style="scroll-margin-top:184px"><div class="FG4T3w" data-dcnode-id="320"><h2 class="wp6-yg _2xcaIA _5Ob-nQ I-IZwQ fM_HdA" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Printable interior design business cards by Canva</span></h2><div class="LIUkcQ" data-dcnode-id="321"><div class="fFOiLQ _5Ob-nQ I-IZwQ fM_HdA" data-dcnode-id="322"><p class="fFOiLQ _2xcaIA _5Ob-nQ CCfw7w" data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">The way you present yourself through your website portfolio, resume, or interior designer business card matters a lot in the interior design industry. It should reflect the quality of the services you offer.</span></p><span data-dcnode-id="335" instrument_node="">
</span><p class="fFOiLQ _2xcaIA _5Ob-nQ CCfw7w" data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">You may already be using social media or portfolio websites to showcase your work and services, but that doesn’t mean old-school networking isn’t out of the picture. Business cards are still vital, especially when meeting new clients and building your connections in the industry. Never miss a chance to network whenever and wherever you are by having a supply of professional business cards at all times.</span></p><span data-dcnode-id="332" instrument_node="">
</span><p class="fFOiLQ _2xcaIA _5Ob-nQ CCfw7w" data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Find elegant and professionally-designed free interior design business card templates from Canva. Our collection of calling card ideas range from classy minimalist layouts to colorful abstract themes, guaranteed to match your design taste. Creating a business card that best represents your services is as simple as dragging and dropping design elements on the screen. Our stock library has millions of free images and illustrations that you can use to increase your design’s visual appeal.</span></p><span data-dcnode-id="329" instrument_node="">
</span><p class="fFOiLQ _2xcaIA _5Ob-nQ CCfw7w" data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Remember to complete the essential information of your interior decorator business card using our text editor. You can choose from our collection of fonts and ready-made font pairings so you can emphasize the relevant details more effectively. Don’t forget to add your logo if you have one.</span></p><span data-dcnode-id="326" instrument_node="">
</span><p class="fFOiLQ _2xcaIA _5Ob-nQ CCfw7w" data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">After personalizing your interior designer business card, download them for free in JPEG, PNG, or PDF formats. You can add crop marks and bleed marks to cut the edges correctly when you print them. Or simply order your business cards from Canva Print. Send us your design, set your preferred paper and printing options, and we’ll have it delivered in high-quality finishes straight to your address. You’re ready to distribute your newly-decorated DIY business cards to dashing prospects in no time.</span></p><span data-dcnode-id="323" instrument_node="">
