                </span><br data-dcnode-id="272"><a aria-label="More information about your privacy, opens in a new tab" class="privacy-notice-link" data-dcnode-id="270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toolstation.com/content/cookies" rel="noopener" target="_blank"><span data-dcnode-id="271" instrument_node="">More information</span></a></div><span data-dcnode-id="268" instrument_node=""> </span><br data-dcnode-id="267"><h3 data-dcnode-id="265" id="ot-category-title"><span data-dcnode-id="266" instrument_node=""> Manage Consent Preferences</span></h3><div class="ot-accordion-layout ot-cat-item" data-dcnode-id="247" data-optanongroupid="C0001"><button aria-controls="ot-desc-id-C0001" aria-expanded="false" aria-labelledby="ot-header-id-C0001" data-dcnode-id="264" ot-accordion="true"></button><div class="ot-acc-hdr ot-always-active-group" data-dcnode-id="255"><div class="ot-plus-minus" data-dcnode-id="260"><span data-dcnode-id="262"></span><span data-dcnode-id="261"></span></div><h4 class="ot-cat-header" data-dcnode-id="258" id="ot-header-id-C0001"><span data-dcnode-id="259" instrument_node="">Strictly Necessary Cookies</span></h4><div class="ot-always-active" data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">Always Active</span></div></div><div class="ot-acc-grpcntr ot-acc-txt" data-dcnode-id="248"><p class="ot-acc-grpdesc ot-category-desc" data-dcnode-id="252" id="ot-desc-id-C0001"><span data-dcnode-id="253" instrument_node="">These perform a variety of functions, such as keeping a visitor logged in to their account, retaining items in the shopping basket or if a quote is requested, ensuring information is displayed correctly on the website and recording whether visitors have accepted the use of cookies.Part of this includes security cookies which help prevent attacks on the website including attempts to steal the information a visitor enters on website forms. They also help identify fraudulent activity. nd device type. We use Analytics to assess how visitors use the website, to understand how visitors arrived at the site (e.g. using keyword searches), to monitor how long visitors remain on the website and when they return, and to control website traffic at busy times.</span></p><div class="ot-hlst-cntr" data-dcnode-id="224"><button class="ot-link-btn category-host-list-handler" data-dcnode-id="225" data-parent-id="C0002"><span data-dcnode-id="226" instrument_node="">Cookies Details‎</span></button></div></div></div><div class="ot-accordion-layout ot-cat-item" data-dcnode-id="197" data-optanongroupid="C0004"><button aria-controls="ot-desc-id-C0004" aria-expanded="false" aria-labelledby="ot-header-id-C0004" data-dcnode-id="221" ot-accordion="true"></button><div class="ot-acc-hdr" data-dcnode-id="205"><div class="ot-plus-minus" data-dcnode-id="217"><span data-dcnode-id="219"></span><span data-dcnode-id="218"></span></div><h4 class="ot-cat-header" data-dcnode-id="215" id="ot-header-id-C0004"><span data-dcnode-id="216" instrument_node="">Targeting Cookies</span></h4><div class="ot-tgl" data-dcnode-id="206"><input aria-checked="false" aria-labelledby="ot-header-id-C0004" class="category-switch-handler" data-dcnode-id="214" data-optanongroupid="C0004" id="ot-group-id-C0004" name="ot-group-id-C0004" role="switch" type="checkbox"><span data-dcnode-id="213" instrument_node=""> </span><label class="ot-switch" data-dcnode-id="208" for="ot-group-id-C0004"><span class="ot-switch-nob" data-dcnode-id="212"></span><span data-dcnode-id="211" instrument_node=""> </span><span class="ot-label-txt" data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">Targeting Cookies</span></span></label><span data-dcnode-id="207" instrument_node=""> </span></div></div><div class="ot-acc-grpcntr ot-acc-txt" data-dcnode-id="198"><p class="ot-acc-grpdesc ot-category-desc" data-dcnode-id="202" id="ot-desc-id-C0004"><span data-dcnode-id="203" instrument_node="">We use cookies to monitor how v
