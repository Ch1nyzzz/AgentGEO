</span><h1 data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">How To Start A Cake Decorating Business</span></h1><span data-dcnode-id="1399" instrument_node="">
</span><div class="author flex items-center" data-dcnode-id="1391"><span data-dcnode-id="1398" instrument_node="">
</span><div class="author__info flex flex-column justify-center" data-dcnode-id="1393"><span data-dcnode-id="1397" instrument_node="">
</span><span class="author__name" data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">By Sarah Donovan</span></span><span data-dcnode-id="1394" instrument_node="">
</span></div><span data-dcnode-id="1392" instrument_node="">
</span></div><span data-dcnode-id="1390" instrument_node="">
</span><div class="single-post__inner--intro" data-dcnode-id="1385"><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. </span></p><span data-dcnode-id="1386" instrument_node="">

</span></div><span data-dcnode-id="1380" instrument_node="">
</span><div class="single-post__inner--img" data-dcnode-id="1376"><span data-dcnode-id="1379" instrument_node="">
</span><img alt="how-to-start-a-cake-decorating-business" class="attachment-full size-full wp-post-image" data-dcnode-id="1378" height="588" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//startupjungle.com/wp-content/uploads/2016/01/how-to-start-a-cake-decorating-business-1-e1485329385187.jpg&amp;raw" srcset="https://startupjungle.com/wp-content/uploads/2016/01/how-to-start-a-cake-decorating-business-1-e1485329385187.jpg 750w, https://startupjungle.com/wp-content/uploads/2016/01/how-to-start-a-cake-decorating-business-1-e1485329385187-300x235.jpg 300w" width="750"><span data-dcnode-id="1377" instrument_node=""> </span></div><span data-dcnode-id="1375" instrument_node="">

</span><main data-dcnode-id="415"><span data-dcnode-id="1370" instrument_node="">
</span><div class="blog__content" data-dcnode-id="458"><span data-dcnode-id="1369" instrument_node="">
</span><div data-dcnode-id="1336" data-height="auto" data-quiz="169409" data-width="100%"><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">Mmmmm…. Cake.</span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">What’s not to love?</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Disagree?</span></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">Well, think of any birthday you’ve been to… Has there always been a cake? What about anniversaries? Weddings? Bar mitzvahs. Quinceaneras!</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Cakes are a staple at&nbsp;any celebration or party. And cake decorating has made my life so much more colorful!</span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Which is why cake decorating as a business can be so great for you, too!</span></p><span data-dcnode-id="1350" instrument_node="">
</span><h1 data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">12 Quick and Easy Steps to Starting a Cake Decorating Business</span></h1><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Starting a cake decorating business is a great way to turn a hobby into a bit of extra wiggle room for the bankbook.</span></p><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">It’s fun&nbsp;and it never gets boring. Each order is&nbsp;different, and people are always so happy and excited when they see the finished product!</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1338"><span data-dcnode-id="1340" instrument_node="">Plus, you get to lick the frosting </span><img alt="😉" class="emoji" data-dcnode-id="1339" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f609.svg&amp;raw"></p><span data-dcnode-id="1337" instrument_node="">
</span></div><span data-dcnode-id="1335" instrument_node="">
</span><div data-dcnode-id="1334" data-height="auto" data-quiz="169409" data-width="100%"></div><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">So, if you have a passion for baking with a penchant for decorating, sit back as I let you in on how to start a cake decorating business in 12 steps!</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1327"><strong data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">It’s time to turn your hobby into a full-fledged business!</span></strong></p><span data-dcnode-id="1326" instrument_node="">
</span><h2 data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Step 1: Learn How a Cake Decorating Business Works</span></h2><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1321"><img alt="" class="alignnone size-full wp-image-5026" data-dcnode-id="1322" height="386" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//startupjungle.com/wp-content/uploads/2019/05/cake-decorating-6-pb.jpg&amp;raw" width="625"></p><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">There are a lot of misconceptions about running a cake business.</span></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">People think it’s just a hobby, and you can bake or decorate a two tier wedding or birthday cake in an hour. Well, I don’t know about you, but I sure can’t.</span></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">While this may start out as a hobby for you, it’s definitely got the potential to become a full-fledged business.</span></p><span data-dcnode-id="1311" instrument_node="">
</span><h4 data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">To get there, you’d have to really understand how the industry works.</span></h4><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Passion and a talent for artistic culinary creations are a must if you’re starting a cake decorating business, but it’s not enough. You have to have the organizational and business acumen for success.</span></p><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Fortunately, these&nbsp;can be taught.</span></p><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Like any business, cake decorating takes hard work and long hours. But you can make those hours go by&nbsp;a little bit faster&nbsp;by learning the right way to run a cake decorating business.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">And the best way to do that is to go work for a cake decorator!</span></p><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Now, I’m not saying go take a full-time job working 9-5 for some corporate store. &nbsp;If you have a friend who’s been doing this for years, that’s a great place to start. Or go talk to the owner of your local&nbsp;bakery and ask for advice or suggestions.</span></p><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Look to understand how a cake decorating business can grow with more ovens and more help, and how that plays into your own vision for starting a cake decorating business.</span></p><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">It doesn’t need to be for long, but you have to understand what starting your business looks like.</span></p><span data-dcnode-id="1287" instrument_node="">
</span><h4 data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Learn secrets, tips, and techniques to make your business as efficient (and delicious) as possible!</span></h4><span data-dcnode-id="1284" instrument_node="">
</span><h4 data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Make sure you learn the requirements of running a cake decorating business from a legal point of view.</span></h4><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">What permits do you need? Many states require a food handler’s license. Is yours one of them?</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">On top of that, you should also talk to others within the event industry. Learn about how they pick their cakes, what they look for, and how to set yourself up in the best position to sell your services.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Remember, you’re making a decision as to if you can balance your business and family life, so make sure you’re as informed as possible before doing so.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><h2 data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Step 2: Create a Plan</span></h2><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><img alt="" class="alignnone size-full wp-image-5050" data-dcnode-id="1268" height="416" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//startupjungle.com/wp-content/uploads/2019/05/event-planning-4-pb.jpg&amp;raw" width="625"></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Why do cake decorating businesses fail?</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Truthfully, it’s for the same reason as any other business fails; lack of a plan.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Fortunately, that’s what I’m here for. And by&nbsp;the time you’re done reading this article, you’ll have an idea of everything you need to focus on to bring your cake decorating business to life.</span></p><span data-dcnode-id="1257" instrument_node="">
</span><h4 data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">If you’ve already done your research and have a better understanding of&nbsp;how the&nbsp;industry works, then it’s time to focus on your plan.</span></h4><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">When and where will you get your permits and licenses?</span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Do you need a store or will you work from home? Or will you start from home and scale up?</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">What about employees?</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Taxes?</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Marketing?</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">If you’re not sure where to start, Startup Jungle can help you create an expertly organized and professional business plan for your cake decorating business.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Just email bplan@startupjungle.com, and they’ll give you the help you need.</span></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">If you don’t think you need a business plan, you think wrong. It’s critical to your success and how a cake decorating business succeeds.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><h2 data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Step 3: Discover Earning Potential</span></h2><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1225"><img alt="" class="alignnone size-full wp-image-4941" data-dcnode-id="1226" height="416" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//startupjungle.com/wp-content/uploads/2014/01/money-4-pb.jpg&amp;raw" width="625"></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">How much money does a cake decorating business make?</span></p><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Well, according to the Small Business Development center, an average cake decorating business will generate about $24,000-$60,000 a year. However, it may take a few years to grow your business to that point. But once you do, you’re really only limited by how many customers you can bring in.</span></p><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">For example, there are about 2.5 million weddings in the U.S. every year. That breaks down to 6,850 weddings every day. And with a population of 320 million people in America, that’s 320 million birthdays in this country every year.</span></p><span data-dcnode-id="1215" instrument_node="">
</span><h4 data-dcnode-id="1213" style="text-align: left;"><span data-dcnode-id="1214" instrument_node="">The earning potential is there for you, it’s simply a matter of figuring out your costs and your prices.</span></h4><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1210" style="text-align: left;"><span data-dcnode-id="1211" instrument_node="">We’ll explore costs in the next section, but as far as prices go, you may be wondering:</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1207" style="text-align: left;"><span data-dcnode-id="1208" instrument_node="">“How much should I charge for cakes?”</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1204" style="text-align: left;"><span data-dcnode-id="1205" instrument_node="">Cake prices can be as much or as little as you want them to be, but remember that you’re creating a custom work of art, and your prices should reflect that.</span></p><span data-dcnode-id="1203" instrument_node="">
</span><h4 data-dcnode-id="1201" style="text-align: left;"><span data-dcnode-id="1202" instrument_node="">Here is an example price sheet found on Pinterest:</span></h4><span data-dcnode-id="1200" instrument_node="">
</span><h4 data-dcnode-id="1198" style="text-align: left;"><span data-dcnode-id="1199" instrument_node="">Figure out your earning potential.</span></h4><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195" style="text-align: left;"><span data-dcnode-id="1196" instrument_node="">Forecast&nbsp;your sales and subtract&nbsp;your costs. Then, you can adjust accordingly by adding or subtracting sales estimates.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192" style="text-align: left;"><span data-dcnode-id="1193" instrument_node="">For example, if you pick up a contract for a recurring monthly event, then you know every month you’ll have a little more profit from the cakes they order. In return, they may get a discount each month since they’ve locked into a contract.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189" style="text-align: left;"><span data-dcnode-id="1190" instrument_node="">But figure out your pricing structure ahead of time and stick to it. &nbsp;Unsure answers make customers think you’re not sure of your prices and try to&nbsp;haggle with you. And that can really hurt&nbsp;your earning potential.</span></p><span data-dcnode-id="1188" instrument_node="">
</span><h2 data-dcnode-id="1186" style="text-align: left;"><span data-dcnode-id="1187" instrument_node="">Step 4: Set a Budget</span></h2><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><img alt="" class="alignnone size-full wp-image-5024" data-dcnode-id="1184" height="416" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//startupjungle.com/wp-content/uploads/2019/05/cake-decorating-4-pb.jpg&amp;raw" width="625"></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">How much does it cost to open a cake decorating business?</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Well, that depends on your business.</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">If you’re wondering how to run a cake decorating business from home, then your costs will be lower than opening a bakery. You won’t have to rent space or equipment, but you may have remodeling costs depending on how your business grows.</span></p><span data-dcnode-id="1173" instrument_node="">
</span><h4 data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Your budget is a roadmap that tells you how much money you have available to spend on everything.</span></h4><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">It should include all your startup costs and recurring expenses. Having this&nbsp;will tell you how much money you have available to spend on marketing and how much money is profits which can be taken out of, or reinvested into, your business.</span></p><span data-dcnode-id="1167" instrument_node="">
</span><h4 data-dcnode-id="1165" style="text-align: left;"><span data-dcnode-id="1166" instrument_node="">&nbsp;Here are some costs to consider:</span></h4><span data-dcnode-id="1164" instrument_node="">
</span><ul data-dcnode-id="1103"><span data-dcnode-id="1163" instrument_node="">
</span><li data-dcnode-id="1156"><strong data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Training</span></strong><span data-dcnode-id="1160" instrument_node="">: This can include recipe books or live classes, ranging from </span><strong data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">$20 – $200</span></strong><span data-dcnode-id="1157" instrument_node="">.&nbsp;Check YouTube for free how-to videos.</span></li><span data-dcnode-id="1155" instrument_node="">
</span><li data-dcnode-id="1148"><strong data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Food handler’s license</span></strong><span data-dcnode-id="1152" instrument_node="">:Plan on a yearly cost of about</span><strong data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">$40-$90</span></strong><span data-dcnode-id="1149" instrument_node="">.</span></li><span data-dcnode-id="1147" instrument_node="">
</span><li data-dcnode-id="1140"><strong data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Permits</span></strong><span data-dcnode-id="1144" instrument_node="">: Check with your city’s clerk of courts. These can cost about </span><strong data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">$100</span></strong><span data-dcnode-id="1141" instrument_node="">.</span></li><span data-dcnode-id="1139" instrument_node="">
</span><li data-dcnode-id="1132"><strong data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Baking ingredients</span></strong><span data-dcnode-id="1136" instrument_node="">: If you’re running your business from home, you only need minimal ingredients&nbsp;and should budget </span><strong data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">$50-$100</span></strong><span data-dcnode-id="1133" instrument_node="">.</span></li><span data-dcnode-id="1131" instrument_node="">
</span><li data-dcnode-id="1121"><strong data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Baking supplies</span></strong><span data-dcnode-id="1128" instrument_node="">: Unless you already have these, expect&nbsp;</span><strong data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">$150</span></strong><span data-dcnode-id="1125" instrument_node=""> to start</span><strong data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">.&nbsp;</span></strong><span data-dcnode-id="1122" instrument_node="">These include mostly reusable supplies&nbsp;like pans, oven mitts, whisks, baking sheets, piping bags, fondant cutters, etc.</span></li><span data-dcnode-id="1120" instrument_node="">
</span><li data-dcnode-id="1113"><strong data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Packaging</span></strong><span data-dcnode-id="1117" instrument_node="">: Expect to spend </span><strong data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">$100</span></strong><span data-dcnode-id="1114" instrument_node=""> on packaging to start.</span></li><span data-dcnode-id="1112" instrument_node="">
</span><li data-dcnode-id="1105"><strong data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Insurance</span></strong><span data-dcnode-id="1109" instrument_node="">: Plan on a yearly cost of about </span><strong data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">$150</span></strong><span data-dcnode-id="1106" instrument_node="">.</span></li><span data-dcnode-id="1104" instrument_node="">
</span></ul><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1099"><strong data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Total: $550-$900.</span></strong></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096" style="text-align: left;"><span data-dcnode-id="1097" instrument_node="">This is assuming you want to have everything ready to go as soon as you start. You can lower that number by only buying what you need when you need it.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">There are also several things you can do for free to keep business costs down as your business grows.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1090" style="text-align: left;"><span data-dcnode-id="1091" instrument_node="">You can build your own website using some amazing free technology out there, though investing in a site professionally designed is always a good idea.</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1087" style="text-align: left;"><span data-dcnode-id="1088" instrument_node="">You can also &nbsp;build and run your own Facebook page.</span></p><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1084" style="text-align: left;"><span data-dcnode-id="1085" instrument_node="">And as far as equipment goes, you probably already have a lot of tins and trays you can re-purpose to your business, as well as beaters and your oven.</span></p><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1081" style="text-align: left;"><span data-dcnode-id="1082" instrument_node="">But the best way to keep costs down is to have an efficient kitchen. The faster and more efficiently you can create your goods, the more you can make of them and the less time and money it costs you to move forward.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078" style="text-align: left;"><span data-dcnode-id="1079" instrument_node="">Create a budget and stick with it to know how much money you have available to start your business and run it properly.</span></p><span data-dcnode-id="1077" instrument_node="">
</span><h2 data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Step 5: Decide Which Products/Services to Offer</span></h2><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><img alt="" class="alignnone size-full wp-image-5022" data-dcnode-id="1073" height="416" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//startupjungle.com/wp-content/uploads/2019/05/cake-decorating-2-pb.jpg&amp;raw" width="625"></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">As a new cake decorating business, you probably want to offer a little of everything. But while that sounds like a good idea, it’s in your best interest to focus on specific areas.</span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">If you have to buy supplies and ingredients to keep on hand so you can make one kind cake that “might” get ordered, that’s costing your business time and money.</span></p><span data-dcnode-id="1065" instrument_node="">
</span><h4 data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Having a little of everything.</span></h4><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Having a wide range of offerings can make you an appealing option for a broad range of people wanting different things, but specializing in specific areas makes you an authority and lets you charge more for your services.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">A quality product builds a better reputation and income over time than saying yes to every request that comes in. Don’t hesitate to refer specialty requests you can’t handle to someone who does. That referral can often come back to you.</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Figure out your niche and stick to it.</span></p><span data-dcnode-id="1053" instrument_node="">
</span><h4 data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Is your niche fondant cakes?</span></h4><span data-dcnode-id="1050" instrument_node="">
</span><h4 data-dcnode-id="1048" style="text-align: left;"><span data-dcnode-id="1049" instrument_node="">Or maybe you prefer working with Buttercream?</span></h4><span data-dcnode-id="1047" instrument_node="">
</span><h4 data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">You can even have a specialty gluten-free cake shop, which would attract quite a bit of business your way.</span></h4><span data-dcnode-id="1044" instrument_node="">
</span><h4 data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">What can you offer that nobody else can?</span></h4><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Maybe it’s your cake decorating style, or your service, or maybe it’s your experience. Figure it out, write it down, and make it a point to have one of your cake creations that showcases your unique style and skill on display at your store for customers to see.</span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Don’t be afraid to over deliver on customer service. &nbsp;Customers will appreciate&nbsp;the added options such as delivery or discounts with additional orders.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><h4 data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Here are some common offerings for a cake decorating business:</span></h4><span data-dcnode-id="1032" instrument_node="">
</span><h4 data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Filled Round Layer Cakes:</span></h4><span data-dcnode-id="1029" instrument_node="">
</span><ul data-dcnode-id="1018"><span data-dcnode-id="1028" instrument_node="">
</span><li data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">8” Round Cake (12 – 14 Servings) ….. $27.00</span></li><span data-dcnode-id="1025" instrument_node="">
</span><li data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">10” Round Cake (25 – 30 Servings) ….. $55.00</span></li><span data-dcnode-id="1022" instrument_node="">
</span><li data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">12″ Round Cake (50-60 servings)….$80.00</span></li><span data-dcnode-id="1019" instrument_node="">
</span></ul><span data-dcnode-id="1017" instrument_node="">
</span><h4 data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Filled Sheet Cakes:</span></h4><span data-dcnode-id="1014" instrument_node="">
</span><ul data-dcnode-id="1003"><span data-dcnode-id="1013" instrument_node="">

</span><li data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">48 Serving Half Sheet Cake ….. $84.00</span></li><span data-dcnode-id="1007" instrument_node="">
</span><li data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">96 Serving Full Sheet Cake ….. $168.00</span></li><span data-dcnode-id="1004" instrument_node="">
</span></ul><span data-dcnode-id="1002" instrument_node="">
</span><h4 data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Sheet Cakes with No Filling:</span></h4><span data-dcnode-id="999" instrument_node="">
</span><ul data-dcnode-id="988"><span data-dcnode-id="998" instrument_node="">
</span><li data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">24 Serving Quarter Sheet Cake….. $37.00</span></li><span data-dcnode-id="995" instrument_node="">
</span><li data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">48 Serving Half Sheet Cake ….. $79.00</span></li><span data-dcnode-id="992" instrument_node="">
</span><li data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">96 Serving Full Sheet Cake ….. $153.00</span></li><span data-dcnode-id="989" instrument_node="">
</span></ul><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="983"><strong data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Tiered Cakes</span></strong><span data-dcnode-id="984" instrument_node=""> starting at…. $3.95 per serving &nbsp;(serving size is Industry Standard)</span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="978"><strong data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Teeny Cakes</span></strong><span data-dcnode-id="979" instrument_node=""> starting at ….. $5.00</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="973"><strong data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Cupcakes</span></strong><span data-dcnode-id="974" instrument_node=""> starting at ….. $1.95</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="968"><strong data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Cakeballs</span></strong><span data-dcnode-id="969" instrument_node=""> starting at ….. $1.50</span></p><span data-dcnode-id="967" instrument_node="">

</span><h2 data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Step 6: Decide on a Location</span></h2><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><img alt="" class="alignnone size-full wp-image-5025" data-dcnode-id="776" height="412" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//startupjungle.com/wp-content/uploads/2019/05/cake-decorating-5-pb.jpg&amp;raw" width="625"></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Where should you open a cake decorating business?</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">If you’re working from home then you don’t need to worry about a location. But if you’re starting a storefront bakery cake decorating business, then you’ll want to choose your location carefully.</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">You’ll want to pick a location based on your customers.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">If you’re looking to specialize in cakes for children, then you’ll want to be in the suburbs around areas with lots of schools, meaning lots of children.</span></p><span data-dcnode-id="762" instrument_node="">
</span><h4 data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Make sure your location fits your budget and your needs.</span></h4><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Look for a well-lit area with lots of foot traffic and lighting, so people feel comfortable coming into your store.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Make sure your store is equipped with all the ovens and resources you need to produce your cakes at a fast rate while ensuring the quality of everything you make.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Finding the perfect location can take some time. But as long as&nbsp;you do it right, you’ll find a great location and that can&nbsp;really boost your business.</span></p><span data-dcnode-id="750" instrument_node="">
</span><h2 data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Step 7: Find Suppliers</span></h2><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">What equipment do you need to open a cake decorating business?</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Again, this depends on if you’re working from home or from a store.</span></p><span data-dcnode-id="741" instrument_node="">
</span><h4 data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">These are some supplies you may need to start.</span></h4><span data-dcnode-id="738" instrument_node="">
</span><ul data-dcnode-id="709"><span data-dcnode-id="737" instrument_node="">
</span><li data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Separate fridge</span></li><span data-dcnode-id="734" instrument_node="">
</span><li data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Ovens</span></li><span data-dcnode-id="731" instrument_node="">
</span><li data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Mixers</span></li><span data-dcnode-id="728" instrument_node="">
</span><li data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Bakery boxes and containers</span></li><span data-dcnode-id="725" instrument_node="">
</span><li data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Cases &amp; displays</span></li><span data-dcnode-id="722" instrument_node="">
</span><li data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Storage bins</span></li><span data-dcnode-id="719" instrument_node="">
</span><li data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Tables</span></li><span data-dcnode-id="716" instrument_node="">
</span><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Cake boards</span></li><span data-dcnode-id="713" instrument_node="">
</span><li data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Ingredients</span></li><span data-dcnode-id="710" instrument_node="">
</span></ul><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Planning what you need and where to get it all ahead of time should be part of your plan. This saves you time and money down the road.</span></p><span data-dcnode-id="705" instrument_node="">
</span><h4 data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Some good starting points are:</span></h4><span data-dcnode-id="702" instrument_node="">

</span><li data-dcnode-id="694"><a data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.papermart.com/"><span data-dcnode-id="696" instrument_node="">http://www.papermart.com/</span></a></li><span data-dcnode-id="693" instrument_node="">
</span><li data-dcnode-id="690"><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.missionrs.com/"><span data-dcnode-id="692" instrument_node="">https://www.missionrs.com</span></a></li><span data-dcnode-id="689" instrument_node="">
</span><li data-dcnode-id="686"><a data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pastrychef.com/"><span data-dcnode-id="688" instrument_node="">http://www.pastrychef.com/</span></a></li><span data-dcnode-id="685" instrument_node="">
</span></ul><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Between those links, you should have everything you need to get started!</span></p><span data-dcnode-id="680" instrument_node="">
</span><h2 data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Step 8: Promote Your Cake Decorating Business</span></h2><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Now that you’re ready to start a cake decorating business, it’s time to promote your business.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">The truth is that without customers, you have no business. So it’s important to make sure people know you’re there. And even more important to reach out to prospective customers.</span></p><span data-dcnode-id="671" instrument_node="">
</span><h4 data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">So make sure you have a plan to get your cake business and your products in front of them.</span></h4><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">According to Pinterest, food and desserts is the number one category shared on social media. So make sure you’re taking clean and clear pictures of your cakes to build your image. And remember to&nbsp;brand your images so people can find you.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Pay attention to your Yelp page, as many people search for a company and review ratings before selecting a vendor.</span></p><span data-dcnode-id="662" instrument_node="">
</span><h4 data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Use social media to promote your cake decorating business!</span></h4><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Use&nbsp;Facebook and Google for advertising if you’re willing to shell out the&nbsp;funds to run them. Maybe you&nbsp;can start by&nbsp;creating a Facebook page for your business to showcase your sweet creations on. But don’t limit&nbsp;your&nbsp;posts&nbsp;to offers, either. Share suggestions,recipes and videos of how you create your cakes. Either way, you want to have content that people can share.</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">But remember, one of the best ways to get new customers is by word of mouth. So, make sure you’re winning over your customers with great service and quality products.</span></p><span data-dcnode-id="653" instrument_node="">
</span><h2 data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Step 9: Create a Staffing Plan</span></h2><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">If you’re working from home by yourself, you might not&nbsp;need additional staff yet. But as you grow, you need to have a staffing plan in mind.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Figure out how much help you need with your business. Where will you find them? What kind of traits do they need to have? How will you schedule them?</span></p><span data-dcnode-id="644" instrument_node="">
</span><h4 data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">When starting a new business, a great resource is friends and family.</span></h4><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">So reach out to yours for help as you get started. And once you start growing even more, Craigslist and Indeed.com are great hiring channels.</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">As your cake business becomes bigger, you can’t continue to do everything by yourself. If you do, you’ll either slow down to the point that you can’t keep up with demand, losing business. Or your service will be so poor since you’ll be so rushed that you’ll lose business.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Regardless, your business can’t grow without help. And it’s important to have a plan to bring on that help.</span></p><span data-dcnode-id="632" instrument_node="">
</span><h2 data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Step 10: Decide on a Style/Design</span></h2><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><img alt="" class="alignnone size-full wp-image-5023" data-dcnode-id="628" height="416" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//startupjungle.com/wp-content/uploads/2019/05/cake-decorating-3-pb.jpg&amp;raw" width="625"></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="625" instrument_node="">As far as creating a logo and design, if you’re struggling there, a great option is </span><a data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//99designs.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="624" instrument_node="">99designs.com</span></a><span data-dcnode-id="622" instrument_node="">. Designers compete for your money and you have your choice of multiple designers for as little as $99.</span></p><span data-dcnode-id="620" instrument_node="">
</span><h4 data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">As far as what to name your business, here are a few ideas:</span></h4><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="614" style="text-align: left;"><em data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">A Slice of Heaven &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The Sweet Factory</span></em></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="610" style="text-align: left;"><em data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Cake House &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Ms. Cake</span></em></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="606" style="text-align: left;"><em data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">The Cupcakery &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Sweet Cakes</span></em></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="602" style="text-align: left;"><em data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Sweet Tooth Bakery &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;House of Sweets</span></em></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="598" style="text-align: left;"><em data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Flowers + Fondant &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;A Cake Affair</span></em></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="594" style="text-align: left;"><em data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Sweet Pea Cakes &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Sprinkles + Buttercream Bakery</span></em></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Your business needs to reflect you and your products&nbsp;and be clear that you serve cake.</span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">“Maude’s” may sound classy, but “Maude’s Cakes and Desserts” lets a potential customer know what your business is all about.</span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><img alt="How To Start A Cake Decorating Business" class="alignnone wp-image-4560 size-full" data-dcnode-id="586" height="6164" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//startupjungle.com/wp-content/uploads/2017/01/Cake-Decorating-Business-Infographics-e1491927069992.png&amp;raw" title="How To Start A Cake Decorating Business" width="700"></p><span data-dcnode-id="584" instrument_node="">
</span><h2 data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Step 11: Create an Accounting Plan</span></h2><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">An accounting plan helps you stick to your budget.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">If you’re not tracking every cent you spend and bring in, you may miss something and find yourself overdrafting and running out of money.</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Plus, when tax season rolls around, you’ll be happy you had a plan going for you.</span></p><span data-dcnode-id="572" instrument_node="">
</span><h4 data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Some accounting software for a cake decorating business options include:</span></h4><span data-dcnode-id="569" instrument_node="">
</span><ul data-dcnode-id="551"><span data-dcnode-id="568" instrument_node="">
</span><li data-dcnode-id="565"><a data-dcnode-id="566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//search2.quickbooks.com/t/qbks-9842/a/get-quickbooks%3Fcid%3Dppc_g_Exact_QBDT_US_B_QuickBooks_Exact_Tier1_G_S_quickbooks_txt%26cvosrc%3Dppc.google.quickbooks%26matchtype%3De%26adposition%3D1t1%26creative%3D106564566608%26content%3D%26cvo_search%3D1%26mobile%3D%26X1ID%3D~uk~%26gclid%3DCJet6YzdrdACFQWpaQodpQQF1Q%26s_kwcid%3DAL%212419%213%21106564566608%21e%21%21g%21%21quickbooks%26ef_id%3DWCdGRAAAAZzWA6Lj%3A20161116164647%3As"><span data-dcnode-id="567" instrument_node="">Quickbooks</span></a></li><span data-dcnode-id="564" instrument_node="">

</span></ul><span data-dcnode-id="550" instrument_node="">
</span><h2 data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Step 12: Get Into the Cake Decorating Business Community</span></h2><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><img alt="" class="alignnone size-full wp-image-5021" data-dcnode-id="546" height="417" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//startupjungle.com/wp-content/uploads/2019/05/cake-decorating-1-pb.jpg&amp;raw" width="625"></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Networking is so important to building a successful business. That’s why getting involved in the cake decorating business community is so critical.</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="537"><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ices.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="540" instrument_node="">The International Cake Exploration Society</span></a><span data-dcnode-id="538" instrument_node="">, for example, is a great online community which would let you network with others and learn new tips and techniques to improve your business.</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="535" instrument_node="">On top of that, you can find events and tradeshows around the country to visit. Facebook has a thriving cake decorating culture, so look for groups on there as well as Instagram, Twitter, Pinterest, and even </span><a data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//meetup.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="534" instrument_node="">meetup.com</span></a><span data-dcnode-id="532" instrument_node=""> for groups you can connect with.</span></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">You never know where your big break or referral may come from, so make sure to attend events either in person or virtually to benefit your business.</span></p><span data-dcnode-id="527" instrument_node="">
</span><h3 data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">The Bottom Line</span></h3><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Opening (and running) a cake decorating business is a lot of work!</span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">But if you do it right, it’s not only rewarding, it’s a lot of fun.</span></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">I love being my own boss and I love having a business which brightens people’s lives.</span></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Hopefully, you put this guide to use.</span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="511" instrument_node="">If this was helpful for you and you want to learn more about opening a cake decorating business, StartupJungle.com has a </span><a data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cf.startupjungle.com/optin" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="510" instrument_node="">21 point checklist </span></a><span data-dcnode-id="508" instrument_node="">for starting your new business. Remember&nbsp;to download your copy if you’re serious about getting started.</span></p><span data-dcnode-id="506" instrument_node="">
