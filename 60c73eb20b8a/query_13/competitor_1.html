</span><h1 class="title-xl" data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">How to Start an Interior Decorating Business</span></h1><span data-dcnode-id="614" instrument_node="">
</span><a class="zb-button title-xs button-coral button-primary" data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zenbusiness.com/r/registration-new/purchase-plan"><span data-dcnode-id="613" instrument_node="">

</span></div><span data-dcnode-id="609" instrument_node="">

</span></div><span data-dcnode-id="601" instrument_node="">
</span><p class="body-m" data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Do you have a special talent for making spaces feel exactly as intended? Are you able to transform four walls and a floor into an enchanting, inspiring environment? Can you be creative but also organized, forthright, and service-oriented? Then starting an interior design business could be the perfect route for you.</span></p><span data-dcnode-id="598" instrument_node="">
</span><p class="body-m" data-dcnode-id="590"><span data-dcnode-id="597" instrument_node="">Making spaces beautiful is not only an incredible talent, it’s a lucrative one. The interior design business&nbsp;</span><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ibisworld.com/industry-statistics/market-size/interior-designers-united-states/%23%3A~%3Atext%3DThe%2520market%2520size%252C%2520measured%2520by%2Cdecline%2520-7.4%2525%2520in%25202020."><span data-dcnode-id="596" instrument_node="">raked in $14.6 billion in 2020</span></a><span data-dcnode-id="594" instrument_node="">. While the industry&nbsp;</span><a data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ibisworld.com/industry-statistics/market-size/interior-designers-united-states/%23%3A~%3Atext%3DThe%2520market%2520size%252C%2520measured%2520by%2Cdecline%2520-7.4%2525%2520in%25202020."><span data-dcnode-id="593" instrument_node="">is declining a bit</span></a><span data-dcnode-id="591" instrument_node="">, someone with talent, skill and commitment to work can still make it. And knowing exactly how to start an interior decorating business will help you dodge critical mistakes.</span></p><span data-dcnode-id="589" instrument_node="">
</span><h2 class="title-m zb-default-margin" data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Benefits of Opening an Interior Decorating Business</span></h2><span data-dcnode-id="586" instrument_node="">
</span><p class="body-m" data-dcnode-id="581"><span data-dcnode-id="585" instrument_node="">The benefits to opening an interior decorating business are as thick as deep pile carpets. Chief among them is that you get paid for being your creative self! The&nbsp;</span><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bls.gov/oes/current/oes271025.htm"><span data-dcnode-id="584" instrument_node="">average interior designer salary is $69,990</span></a><span data-dcnode-id="582" instrument_node="">, though that number is impacted by your location and your client base.</span></p><span data-dcnode-id="580" instrument_node="">
</span><p class="body-m" data-dcnode-id="575"><span data-dcnode-id="579" instrument_node="">Owning your own business also lets you set your schedule, choose your clients, and build the professional community and life you desire. And, as a bonus, there are no educational requirements to interior design. However, you may benefit from some of the&nbsp;</span><a data-dcnode-id="577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.accreditedschoolsonline.org/art-schools/interior-design/%23%3A~%3Atext%3DA%2520Bachelor%2520of%2520Arts%2520in%2CInterior%2520Design%2520Accreditation%2520%28CIDA%29."><span data-dcnode-id="578" instrument_node="">higher-education opportunities in this field</span></a><span data-dcnode-id="576" instrument_node="">, and a few states do require licensing.</span></p><span data-dcnode-id="574" instrument_node="">
</span><h2 class="title-m zb-default-margin" data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">How to Start an Interior Decorating Business Checklist</span></h2><span data-dcnode-id="571" instrument_node="">
</span><p class="body-m" data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">You can get started with your interior decorating business by following these steps.</span></p><span data-dcnode-id="568" instrument_node="">
</span><div class="is-style-grid-medium" data-dcnode-id="540"><span data-dcnode-id="567" instrument_node="">
</span><div class="zb-styled-list is-style-compact" data-dcnode-id="542" id="zb_styled-list_block_603fc701969f7"><span data-dcnode-id="566" instrument_node="">
</span><h4 class="list-description title-xs" data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Checklist for How to Start Your Interior Decorating Business:</span></h4><span data-dcnode-id="563" instrument_node="">
</span><div class="list-wrap" data-dcnode-id="544"><span data-dcnode-id="562" instrument_node="">
</span><ol data-dcnode-id="546"><li class="" data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Create a Business Plan</span></li><li class="" data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Choose a Business Structure</span></li><li class="" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Determine Your Business Costs</span></li><li class="" data-dcnode-id="553"><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zenbusiness.com/reserve-business-name/"><span data-dcnode-id="555" instrument_node="">Name Your Business</span></a></li><li class="" data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Register Your Business and Open Financial Accounts</span></li><li class="" data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Purchase Equipment for Your Interior Decorating Business</span></li><li class="" data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Market Your Interior Decorating Business</span></li></ol><span data-dcnode-id="545" instrument_node=""> </span></div><span data-dcnode-id="543" instrument_node="">
</span></div><span data-dcnode-id="541" instrument_node="">
</span></div><span data-dcnode-id="539" instrument_node="">
</span><h3 class="title-s zb-default-margin" data-dcnode-id="537" id="h-1-create-a-business-plan"><span data-dcnode-id="538" instrument_node="">1. Create a Business Plan</span></h3><span data-dcnode-id="536" instrument_node="">
</span><p class="body-m" data-dcnode-id="531"><span data-dcnode-id="535" instrument_node="">Remember how we said you’ll need to be not only creative, but also organized and dedicated? Here’s your first chance to showcase those skills. Writing a business plan is your opportunity to put your dream on paper, figure out exactly how this adventure could play out successfully, and avoid common, costly business mistakes many small businesses make. To&nbsp;</span><a data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zenbusiness.com/info/a-guide-to-writing-your-first-business-plan/"><span data-dcnode-id="534" instrument_node="">write your small business plan</span></a><span data-dcnode-id="532" instrument_node="">:</span></p><span data-dcnode-id="530" instrument_node="">
</span><ul class="body-l" data-dcnode-id="500"><li data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Describe your business: Why are you creating it? What problem or issue does your interior decorator business address?&nbsp;</span></li><li data-dcnode-id="518"><span data-dcnode-id="527" instrument_node="">Set&nbsp;</span><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zenbusiness.com/blog/write-smart-goals-for-small-business/"><span data-dcnode-id="526" instrument_node="">SMART goals</span></a><span data-dcnode-id="524" instrument_node="">&nbsp;(Specific, Measurable, Attainable, Realistic, and Timely): As Shaun Smith, founder of Shaun Smith Home, told&nbsp;</span><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.architecturaldigest.com/story/19-tips-from-successful-pros-on-how-to-run-an-interior-design-business"><span data-dcnode-id="523" instrument_node="">Architectural Diges</span></a><span data-dcnode-id="521" instrument_node="">t, “A clear vision is so important. The goals that will define your business and brand should be long term goals.”</span><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.architecturaldigest.com/story/19-tips-from-successful-pros-on-how-to-run-an-interior-design-business"><span data-dcnode-id="520" instrument_node="">&nbsp;</span></a></li><li data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Consider what could go wrong and how you’ll manage it: Do you have a plan for bad Yelp reviews or an unhappy design client?</span></li><li data-dcnode-id="511"><span data-dcnode-id="515" instrument_node="">List the design projects and services you’ll offer: Home decor? Home staging? Both and more? Research what particular training and certifications you may need, like an&nbsp;</span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artinstitutes.edu/about/blog/3-steps-to-getting-your-interior-design-certification"><span data-dcnode-id="514" instrument_node="">NCIDQ</span></a><span data-dcnode-id="512" instrument_node="">.</span></li><li data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Identify your target market, as well as your ideal client: Do they live in upscale downtown townhouses, small apartments, or country farmhouses?</span></li><li data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Describe your team including other decorators, and consider vendor relationships. Don’t forget your attorney, accountant, and bookkeeper.&nbsp;</span></li><li data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Choose a pricing strategy: Will you charge a flat fee? By the square foot? A percentage of the entire project cost? Time-based fee?&nbsp;</span></li><li data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Lay out your interior design business costs.</span></li><li data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Create a services contract: This should clearly outline what is expected of both you and your new client.&nbsp;</span></li></ul><span data-dcnode-id="499" instrument_node="">
</span><p class="body-m" data-dcnode-id="494"><span data-dcnode-id="498" instrument_node="">Want more info? Check out this set of&nbsp;</span><a data-dcnode-id="496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.capellakincheloe.com/blog/simple-business-plans-for-interior-designers"><span data-dcnode-id="497" instrument_node="">interior decorating business plan templates</span></a><span data-dcnode-id="495" instrument_node="">.</span></p><span data-dcnode-id="493" instrument_node="">
</span><h3 class="title-s zb-default-margin" data-dcnode-id="491" id="h-2-choose-a-business-structure"><span data-dcnode-id="492" instrument_node="">2. Choose a Business Structure</span></h3><span data-dcnode-id="490" instrument_node="">
</span><p class="body-m" data-dcnode-id="479"><span data-dcnode-id="489" instrument_node="">You must register your business with the IRS.&nbsp;</span><a data-dcnode-id="487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/small-businesses-self-employed/business-structures"><span data-dcnode-id="488" instrument_node="">Multiple company structures</span></a><span data-dcnode-id="486" instrument_node="">&nbsp;are available, though most startups are either sole proprietorships or&nbsp;</span><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zenbusiness.com/llc/"><span data-dcnode-id="485" instrument_node="">limited liability companies</span></a><span data-dcnode-id="483" instrument_node="">&nbsp;(LLCs).&nbsp;</span><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zenbusiness.com/blog/business-taxes-and-structuring/"><span data-dcnode-id="482" instrument_node="">Choose the structure</span></a><span data-dcnode-id="480" instrument_node="">&nbsp;with the best legal and tax setup for your situation.&nbsp;</span></p><span data-dcnode-id="478" instrument_node="">
</span><p class="body-m" data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Since you’ll likely be in other people’s spaces and spending money on their behalf, the liability protection of an LLC is worth considering. Housing your business in an LLC structure shields your personal assets from the business’s liability. It also prevents the double taxation that corporate structures experience.&nbsp;</span></p><span data-dcnode-id="475" instrument_node="">
</span><p class="body-m" data-dcnode-id="467"><span data-dcnode-id="474" instrument_node="">You can&nbsp;</span><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zenbusiness.com/llc/"><span data-dcnode-id="473" instrument_node="">file for an LLC online</span></a><span data-dcnode-id="471" instrument_node="">. Research what business license you may need, too. Nevada, Florida, Louisiana, the District of Columbia, and Puerto Rico have&nbsp;</span><a data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.architecturaldigest.com/story/am-i-a-real-designer-if-im-not-licensed%23%3A~%3Atext%3DIn%2520the%2520U.S.%252C%2520only%2520three%2Clegislation%2520that%2520requires%2520mandatory%2520registration."><span data-dcnode-id="470" instrument_node="">registration requirements</span></a><span data-dcnode-id="468" instrument_node="">&nbsp;for interior design professionals.</span></p><span data-dcnode-id="466" instrument_node="">
</span><h3 class="title-s zb-default-margin" data-dcnode-id="464" id="h-3-determine-your-business-costs"><span data-dcnode-id="465" instrument_node="">3. Determine Your Business Costs</span></h3><span data-dcnode-id="463" instrument_node="">
</span><p class="body-m" data-dcnode-id="459"><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justbusiness.com/starting-a-small-business/how-to-calculate-startup-costs-for-small-business"><span data-dcnode-id="462" instrument_node="">What will it cost to start your interior design business</span></a><span data-dcnode-id="460" instrument_node="">? It can be helpful to think of costs in terms of one-time and ongoing expenses.&nbsp;</span></p><span data-dcnode-id="458" instrument_node="">
</span><p class="body-m" data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">One-time expenses include furniture, computer equipment, tools of the trade, logo design, and business registration fees. Consider what is truly necessary right now and what could wait until the business can afford it.</span></p><span data-dcnode-id="455" instrument_node="">
</span><p class="body-m" data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Ongoing expenses could be your salary, taxes, consultant fees, and office rent. Factor in skills and relationship development costs as those will be key to achieving success. This means travel to trade shows and meetings, meals, classes, and thank-you gifts.&nbsp;</span></p><span data-dcnode-id="452" instrument_node="">
</span><p class="body-m" data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">It can be tempting to take everything on yourself to keep costs low. Really consider the worth of your time, though.&nbsp;</span></p><span data-dcnode-id="449" instrument_node="">
</span><p class="body-m" data-dcnode-id="444"><span data-dcnode-id="448" instrument_node="">“The design industry is a very specific industry when it comes to fees and commissions, “</span><a data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.architecturaldigest.com/story/19-tips-from-successful-pros-on-how-to-run-an-interior-design-business"><span data-dcnode-id="447" instrument_node="">Ellie Cullman, cofounder, Cullman &amp; Kravis</span></a><span data-dcnode-id="445" instrument_node="">&nbsp;told Architectural Digest, “and so I would recommend that from the beginning you should bring on board an attorney and an accountant who has knowledge of the design industry.”</span></p><span data-dcnode-id="443" instrument_node="">
</span><p class="body-m" data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Cullman also recommends hiring a bookkeeper to handle the paperwork. Bookkeeping can be a very tedious process. You probably won’t want to waste time that would be better spent shopping for new clients.</span></p><span data-dcnode-id="440" instrument_node="">
</span><h4 class="title-xs zb-default-margin" data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">How do you fund your startup costs?</span></h4><span data-dcnode-id="437" instrument_node="">
</span><p class="body-m" data-dcnode-id="429"><span data-dcnode-id="436" instrument_node="">Check out these&nbsp;</span><a data-dcnode-id="434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sba.gov/funding-programs/grants"><span data-dcnode-id="435" instrument_node="">forms of government assistance</span></a><span data-dcnode-id="433" instrument_node="">&nbsp;for small business owners. Loan programs from the&nbsp;</span><a data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sba.gov/funding-programs/loans"><span data-dcnode-id="432" instrument_node="">Small Business Administration (SBA)</span></a><span data-dcnode-id="430" instrument_node="">&nbsp;may be available at your bank, or a personal loan could make sense.</span></p><span data-dcnode-id="428" instrument_node="">
</span><p class="body-m" data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Think about family and friends, too. They may be willing to loan or invest to help get your interior decorating business off the ground, but consider the impact on these relationships if things go wrong.</span></p><span data-dcnode-id="425" instrument_node="">
</span><p class="body-m" data-dcnode-id="421"><a data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zenbusiness.com/blog/businesscc/"><span data-dcnode-id="424" instrument_node="">Business credit cards</span></a><span data-dcnode-id="422" instrument_node="">&nbsp;are an option, just be cautious you don’t run up a big debt with no payback plan.</span></p><span data-dcnode-id="420" instrument_node="">
</span><h3 class="title-s zb-default-margin" data-dcnode-id="418" id="h-4-name-your-business"><span data-dcnode-id="419" instrument_node="">4. Name Your Business</span></h3><span data-dcnode-id="417" instrument_node="">
</span><p class="body-m" data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Your business name should be memorable, unique, and reflect the business brand. You could use your personal name if you’d like (e.g. “Sunny Travis Interiors”).&nbsp;</span></p><span data-dcnode-id="414" instrument_node="">
</span><p class="body-m" data-dcnode-id="409"><span data-dcnode-id="413" instrument_node="">Check to ensure the website&nbsp;</span><a data-dcnode-id="411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zenbusiness.com/domain-registration/"><span data-dcnode-id="412" instrument_node="">domain</span></a><span data-dcnode-id="410" instrument_node="">&nbsp;and social media profiles are available for your business name. You don’t want anyone confusing your business with another one of the same name, which could cost you clients and bring on legal repercussions.&nbsp;</span></p><span data-dcnode-id="408" instrument_node="">
</span><p class="body-m" data-dcnode-id="403"><span data-dcnode-id="407" instrument_node="">Be as creative as you’d like here, and don’t rush. Make a shortlist, and live with the names in your head for a few days. What resonates? Many interior decoration businesses choose a&nbsp;</span><a data-dcnode-id="405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zenbusiness.com/doing-business-as-definition/"><span data-dcnode-id="406" instrument_node="">doing business as (DBA)</span></a><span data-dcnode-id="404" instrument_node="">&nbsp;name for the books, and a more creative name for client-facing materials like websites and social media.</span></p><span data-dcnode-id="402" instrument_node="">
</span><h3 class="title-s zb-default-margin" data-dcnode-id="400" id="h-5-register-your-business-and-open-financial-accounts"><span data-dcnode-id="401" instrument_node="">5. Register Your Business and Open Financial Accounts</span></h3><span data-dcnode-id="399" instrument_node="">
</span><p class="body-m" data-dcnode-id="388"><span data-dcnode-id="398" instrument_node="">Using the structure you selected (LLC, sole proprietor, etc.), register your interior design firm with state and local agencies. Get an&nbsp;</span><a data-dcnode-id="396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/businesses/small-businesses-self-employed/apply-for-an-employer-identification-number-ein-online"><span data-dcnode-id="397" instrument_node="">employer identification number (EIN)</span></a><span data-dcnode-id="395" instrument_node="">&nbsp;from the IRS. You’ll need an EIN and business registration documents when you&nbsp;</span><a data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zenbusiness.com/pricing-banking/"><span data-dcnode-id="394" instrument_node="">open bank accounts</span></a><span data-dcnode-id="392" instrument_node="">. Don’t mix personal banking with the business. It “</span><a data-dcnode-id="390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/wex/piercing_the_corporate_veil"><span data-dcnode-id="391" instrument_node="">pierces the corporate veil</span></a><span data-dcnode-id="389" instrument_node="">” and can impact your liability protection.</span></p><span data-dcnode-id="387" instrument_node="">
</span><p class="body-m" data-dcnode-id="382"><span data-dcnode-id="386" instrument_node="">Check with your local municipality to see if there are licensing requirements for interior designers. In a handful of states, you must take the&nbsp;</span><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cidq.org/"><span data-dcnode-id="385" instrument_node="">National Council for Interior Design Qualification licensing exam</span></a><span data-dcnode-id="383" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="381" instrument_node="">
</span><p class="body-m" data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Finally, consult local insurance agents to determine what type(s) of general liability insurance are best for your interior decorating business.</span></p><span data-dcnode-id="378" instrument_node="">
</span><h3 class="title-s zb-default-margin" data-dcnode-id="376" id="h-6-purchase-equipment-for-your-interior-decorating-business"><span data-dcnode-id="377" instrument_node="">6. Purchase Equipment For Your Interior Decorating Business</span></h3><span data-dcnode-id="375" instrument_node="">
</span><p class="body-m" data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Much of your up-front spend will create the look and ecosystem for the business. It will set you up both virtually and in real life, and equip you to provide the services you promise.&nbsp;</span></p><span data-dcnode-id="372" instrument_node="">
</span><p class="body-m" data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">To create your business brand, a logo and website are crucial. If you can’t design them yourself, hire a professional. Business cards, letterhead, and thank you notes will be needed as well.</span></p><span data-dcnode-id="369" instrument_node="">
</span><p class="body-m" data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Also, create an office space that reflects your interior decorating business brand. Paint, lighting, furniture, rugs, desks — consider this your first job for your new business, whether you’re setting up shop in a coworking space or a home office.&nbsp;</span></p><span data-dcnode-id="366" instrument_node="">
</span><p class="body-m" data-dcnode-id="361"><span data-dcnode-id="365" instrument_node="">Now, to actually provide the services you promise, you’ll need a computer and a good printer, along with interior design software that helps communicate your vision to the client. Other tools of the trade include a measuring tape, paint swatches, color wheel, camera, fabric samples, and more.&nbsp;</span><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hunker.com/13412503/what-tools-do-interior-designers-use"><span data-dcnode-id="364" instrument_node="">Here’s a good list to get you started</span></a><span data-dcnode-id="362" instrument_node="">.</span></p><span data-dcnode-id="360" instrument_node="">
</span><h3 class="title-s zb-default-margin" data-dcnode-id="358" id="h-7-market-your-interior-decorating-business"><span data-dcnode-id="359" instrument_node="">7.&nbsp;Market Your &nbsp;Interior Decorating Business</span></h3><span data-dcnode-id="357" instrument_node="">
</span><p class="body-m" data-dcnode-id="352"><span data-dcnode-id="356" instrument_node="">In addition to your website, which is important to&nbsp;</span><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moz.com/beginners-guide-to-seo"><span data-dcnode-id="355" instrument_node="">optimize for search engines</span></a><span data-dcnode-id="353" instrument_node="">, social media plays a major part in marketing your interior decorating business. It gives you an opportunity to share visuals related to all your design work and even share free design tips to attract potential clients. Be consistent in both your timing and look across Twitter, Facebook, Pinterest, Instagram, LinkedIn, and whatever other social media sites you use.&nbsp;</span></p><span data-dcnode-id="351" instrument_node="">
</span><p class="body-m" data-dcnode-id="346"><span data-dcnode-id="350" instrument_node="">Also, register with&nbsp;</span><a data-dcnode-id="348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/intl/en_us/business/%3Fgmbsrc%3Dww-ww-ha-se-z-gmb-s-218-h~bk%26ppsrc%3DGMBS0%26utm_campaign%3Dww-ww-ha-se-z-gmb-s-218-h~z-z-u%26utm_source%3Dgmb%26utm_medium%3Dha%26%26gmbsrc%3Dus-en-ha-se-z-gmb-s-z-h~bk%3B%26ppsrc%3DGMBS0%26gclid%3DCj0KCQjwoJX8BRCZARIsAEWBFMLHGpHsoAohyvzhJRHPnrucarNlyMEmktYt0SRhWoc_7qI1Maz236gaAqmMEALw_wcB"><span data-dcnode-id="349" instrument_node="">Google My Business</span></a><span data-dcnode-id="347" instrument_node="">&nbsp;and get included in local business and telephone directories. Offline, attend networking events, join local business groups like the Chamber of Commerce, and hand out business cards liberally. Consider providing services free to a charity, which raises your community visibility.&nbsp;</span></p><span data-dcnode-id="345" instrument_node="">
</span><p class="body-m" data-dcnode-id="340"><span data-dcnode-id="344" instrument_node="">Need more? See this list of 14&nbsp;</span><a data-dcnode-id="342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//penji.co/interior-design-marketing/"><span data-dcnode-id="343" instrument_node="">interior design marketing strategies</span></a><span data-dcnode-id="341" instrument_node="">.</span></p><span data-dcnode-id="339" instrument_node="">
</span><h3 class="title-s zb-default-margin" data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Examples of Interior Decorating Businesses to Start</span></h3><span data-dcnode-id="336" instrument_node="">
</span><p class="body-m" data-dcnode-id="316"><span data-dcnode-id="335" instrument_node="">With over 60,000 interior designers operating in the United States, there are numerous&nbsp;</span><a data-dcnode-id="333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mymove.com/home-inspiration/decoration-design-ideas/how-successful-interior-designers-got-their-start-and-how-you-can-too/"><span data-dcnode-id="334" instrument_node="">examples of successes</span></a><span data-dcnode-id="332" instrument_node="">. They include&nbsp;</span><a data-dcnode-id="330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kellywearstler.com/"><span data-dcnode-id="331" instrument_node="">Kelly Wearstler</span></a><span data-dcnode-id="329" instrument_node="">&nbsp;(clients are Cameron Diaz, Ben Stiller, and Gwen Stefani),&nbsp;</span><a data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vicentewolf.com/"><span data-dcnode-id="328" instrument_node="">Vicente Wolf</span></a><span data-dcnode-id="326" instrument_node="">&nbsp;(clients are Prince and Princess Von Furstenburg, Julianna Margulies, Clive Davis, and Bryan Cranston),&nbsp;</span><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nateberkus.com/"><span data-dcnode-id="325" instrument_node="">Nate Berkus</span></a><span data-dcnode-id="323" instrument_node="">&nbsp;(of Oprah fame, and who has a line at Target), and&nbsp;</span><a data-dcnode-id="321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.justinablakeney.com/"><span data-dcnode-id="322" instrument_node="">Justina Blakeney</span></a><span data-dcnode-id="320" instrument_node="">&nbsp;(1.2M Instagram followers). These designers and more reveal there’s not just money to be made in interior decorating, there’s also&nbsp;</span><a data-dcnode-id="318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.architecturaldigest.com/story/most-famous-interior-designers-working-today"><span data-dcnode-id="319" instrument_node="">fame</span></a><span data-dcnode-id="317" instrument_node="">.</span></p><span data-dcnode-id="315" instrument_node="">
</span><h3 class="title-s zb-default-margin" data-dcnode-id="313" id="h-bottom-line"><span data-dcnode-id="314" instrument_node="">Bottom Line</span></h3><span data-dcnode-id="312" instrument_node="">
</span><p class="body-m" data-dcnode-id="307"><span data-dcnode-id="311" instrument_node="">Starting an interior decorating business is challenging right now, with the industry in a slight decline. However, with hard work, talent, and dedication to relationship-building, designers with talent can still find success in this industry. That’s true both for earned income and fame (if that’s your thing). Startup costs are low, too. And while certifications and higher education are available, they aren’t required in most states. Best of all, you get to be creative all the time&nbsp;</span><em data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">and get paid for it</span></em><span data-dcnode-id="308" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="306" instrument_node="">

</span><div class="list-wrap" data-dcnode-id="264"><span data-dcnode-id="300" instrument_node="">
</span><ol data-dcnode-id="266"><li class="" data-dcnode-id="293"><span class="title-s" data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Where should I incorporate my interior decorator business?</span></span><div class="hang" data-dcnode-id="294"><p data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Consider formation fees, franchise taxes, the legal and court system, investor relations, and the tax structure of states when determining the location for your business.</span></p><span data-dcnode-id="295" instrument_node="">
</span></div></li><li class="" data-dcnode-id="280"><span class="title-s" data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">How much should I capitalize my business with at the beginning?</span></span><div class="hang" data-dcnode-id="281"><p data-dcnode-id="283"><span data-dcnode-id="290" instrument_node="">Alycia Wicker, author of&nbsp;</span><i data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">The Cost to Start Your Own Interior Design Business</span></i><span data-dcnode-id="287" instrument_node="">, estimates start-up costs between $500 to “somewhere in the thousands.” She describes the costs on&nbsp;</span><a data-dcnode-id="285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//design.alyciawicker.com/blog/the-cost-to-start-your-own-interior-design-business%23%3A~%3Atext%3DThe%2520cost%2520to%2520start%2520your%2520own%2520interior%2520design%2520business%2520can%2Cinvestments%2520you%2520make%2520in%2520it."><span data-dcnode-id="286" instrument_node="">her blog</span></a><span data-dcnode-id="284" instrument_node="">.</span></p><span data-dcnode-id="282" instrument_node="">
</span></div></li><li class="" data-dcnode-id="267"><span class="title-s" data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Is an interior design business profitable?</span></span><div class="hang" data-dcnode-id="268"><p data-dcnode-id="270"><span data-dcnode-id="277" instrument_node="">Yes. The&nbsp;</span><a data-dcnode-id="275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bls.gov/oes/current/oes271025.htm"><span data-dcnode-id="276" instrument_node="">average interior designer salary is $60,990</span></a><span data-dcnode-id="274" instrument_node="">. Capella Kincheloe, an interior designer who helps other designers build their business, has identified several ways to be&nbsp;</span><a data-dcnode-id="272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.capellakincheloe.com/blog/profitable-interior-design"><span data-dcnode-id="273" instrument_node="">profitable in interior design</span></a><span data-dcnode-id="271" instrument_node="">.</span></p><span data-dcnode-id="269" instrument_node="">
