</span><h2 data-dcnode-id="8755" id="scroll-to-0"><span data-dcnode-id="8756" instrument_node="">Do you want to start candle making business?</span></h2><span data-dcnode-id="8754" instrument_node="">
</span><p data-dcnode-id="8749"><span data-dcnode-id="8753" instrument_node="">Are you planning to </span><strong data-dcnode-id="8751"><span data-dcnode-id="8752" instrument_node="">start candle business</span></strong><span data-dcnode-id="8750" instrument_node="">? What many people do not know is candles still remain popular even today despite the fact they were primarily introduced for illumination purposes. Candles have been there for centuries and used in different civilizations and cultures. Even with the introduction of electricity, the role of candles has been redefined and they still continue to be an important item in any home or business. In the U.S. 7 out of 10 households use candles meaning the market is still excellent. Uniquely branded candles are the most popular home décor items which are on very high demand. Fortunately, candle making is not a capital intensive business and with a good business plan, you can be successful.</span></p><span data-dcnode-id="8748" instrument_node="">

</span><p data-dcnode-id="8615"><span data-dcnode-id="8619" instrument_node="">Susan Cook is an experienced chandler with extensive skills and experience in candle making. Before thinking of </span><strong data-dcnode-id="8617"><span data-dcnode-id="8618" instrument_node="">starting a candle company</span></strong><span data-dcnode-id="8616" instrument_node="">, she worked for big brands across the United States such as Proctor &amp; Gamble as well as SC Johnson &amp; Sons among others. She took a major role in making key decisions for the various departments she worked for quickly rising to top managerial level because of her commitment and professional skills. After working for twenty years, she decided it was time to venture into entrepreneurship.</span></p><span data-dcnode-id="8614" instrument_node="">

</span><p data-dcnode-id="8606"><span data-dcnode-id="8610" instrument_node="">Even though candles have been there for centuries, they are still relevant to date meaning there is still rising demand from both households as well as businesses. Having been in the business with a clear understanding of how candles continue immensely influence the modern society, Susan Cook began to plan </span><strong data-dcnode-id="8608"><span data-dcnode-id="8609" instrument_node="">how to start a candle company</span></strong><span data-dcnode-id="8607" instrument_node=""> that would effectively address the needs of today’s society.</span></p><span data-dcnode-id="8605" instrument_node="">
