ass="page-title entry-title" data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">How to Write a Candle Making Business Plan [Sample Template]</span></h1></header><div class="entry-content-main" data-dcnode-id="154"><div class="entry-content" data-dcnode-id="155"><p data-dcnode-id="1189"><strong data-dcnode-id="1191"><span data-dcnode-id="1195" instrument_node="">Are you about </span><a data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/starting-a-candle-making-business/"><span data-dcnode-id="1194" instrument_node="">starting a candle making business</span></a><span data-dcnode-id="1192" instrument_node="">? If YES, here is a complete sample candle making business plan template &amp; feasibility report you can use for FREE</span></strong><span data-dcnode-id="1190" instrument_node="">. Candles are a great business to start as people buy candles for varying reasons and for this reason, you can go into it as an entrepreneur and make loads of money.</span></p><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">There are two ways candles can be made, which are container candles and mold candles. Deciding on what kind of candles you intend to go into is a decision you would have to make alone. Other decisions that you would need to make before starting your candle business is deciding what kind of wax you want to work with.</span></p><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">While there are several types of waxes available, each comes with pros and cons; so it’s best you know which wax would be best for your business in the long run. You can also find out from competitors that are far from you, what waxes are best for starting your business.</span></p><h2 data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">A Sample Candle Making Business Plan Template</span></h2><div class="toc_white no_bullets contracted" data-dcnode-id="1127" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="1175"><span data-dcnode-id="1182" instrument_node="">Table of Content</span><span data-dcnode-id="1181" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="1176"><span data-dcnode-id="1180" instrument_node="">[</span><a data-dcnode-id="1178" href="#"><span data-dcnode-id="1179" instrument_node="">show</span></a><span data-dcnode-id="1177" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="1128" style="display: none;"><ul data-dcnode-id="1171"><li data-dcnode-id="1172"><a data-dcnode-id="1173" href="#1_Industry_Overview"><span data-dcnode-id="1174" instrument_node="">1. Industry Overview</span></a></li></ul><li data-dcnode-id="1161"><a data-dcnode-id="1169" href="#2_Executive_Summary"><span data-dcnode-id="1170" instrument_node="">2. Executive Summary</span></a><ul data-dcnode-id="1162"><li data-dcnode-id="1166"><a data-dcnode-id="1167" href="#3_Our_Products_and_Services"><span data-dcnode-id="1168" instrument_node="">3. Our Products and Services</span></a></li><li data-dcnode-id="1163"><a data-dcnode-id="1164" href="#4_Our_Mission_and_Vision_Statement"><span data-dcnode-id="1165" instrument_node="">4. Our Mission and Vision Statement</span></a></li></ul></li><li data-dcnode-id="1158"><a data-dcnode-id="1159" href="#5_Job_Roles_and_Responsibilities"><span data-dcnode-id="1160" instrument_node="">5. Job Roles and Responsibilities</span></a></li><li data-dcnode-id="1155"><a data-dcnode-id="1156" href="#6_SWOT_Analysis"><span data-dcnode-id="1157" instrument_node="">6. SWOT Analysis</span></a></li><li data-dcnode-id="1136"><a data-dcnode-id="1153" href="#7_MARKET_ANALYSIS"><span data-dcnode-id="1154" instrument_node="">7. MARKET ANALYSIS</span></a><ul data-dcnode-id="1137"><li data-dcnode-id="1150"><a data-dcnode-id="1151" href="#8_Our_Target_Market"><span data-dcnode-id="1152" instrument_node="">8. Our Target Market</span></a></li><li data-dcnode-id="1147"><a data-dcnode-id="1148" href="#9_SALES_AND_MARKETING_STRATEGY"><span data-dcnode-id="1149" instrument_node="">9. SALES AND MARKETING STRATEGY</span></a></li><li data-dcnode-id="1144"><a data-dcnode-id="1145" href="#10_Sales_Forecast"><span data-dcnode-id="1146" instrument_node="">10. Sales Forecast</span></a></li><li data-dcnode-id="1141"><a data-dcnode-id="1142" href="#11_Publicity_and_Advertising_Strategy"><span data-dcnode-id="1143" instrument_node="">11. Publicity and Advertising Strategy</span></a></li><li data-dcnode-id="1138"><a data-dcnode-id="1139" href="#12_Our_Pricing_Strategy"><span data-dcnode-id="1140" instrument_node="">12. Our Pricing Strategy</span></a></li></ul></li><li data-dcnode-id="1129"><a data-dcnode-id="1134" href="#13_Startup_Expenditure_Budget"><span data-dcnode-id="1135" instrument_node="">13. Startup Expenditure (Budget)</span></a><ul data-dcnode-id="1130"><li data-dcnode-id="1131"><a data-dcnode-id="1132" href="#14_Sustainability_and_Expansion_Strategy"><span data-dcnode-id="1133" instrument_node="">14. Sustainability and Expansion Strategy</span></a></li></ul></li></ul></div><h4 data-dcnode-id="1123"><span data-dcnode-id="1124" id="1_Industry_Overview"><strong data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">1. Industry Overview</span></strong></span></h4><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Candle sales in the united states have improved especially as there is an increasing variety of colored and scented candles, with 7 out of 10 households in the United States making use of candles. More and more people are demanding for candles as an addition to their homes for various reasons both abroad and domestically. This is a $2 billion industry that has over 400 registered candle making businesses that employs 6,065 people.</span></p><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">While the sale of candles started in the 1990s, demand surged in the year 2000 and has been growing by at least 10% each year. The economic downturn however decreased demand from consumers with sales gradually picking up especially with the help of the social media which has ensured that more people become aware of why they would need a candle in their homes.</span></p><div class="code-block code-block-1" data-dcnode-id="1109" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="1110"><span data-dcnode-id="1117" instrument_node="">
</span><span data-dcnode-id="1115" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2552847123501338" data-ad-format="auto" data-ad-slot="4731700007" data-dcnode-id="1114" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1113" instrument_node="">
</span></div></div><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">The candle making business is a multi-billion dollar industry excluding sales of candle accessories with positive projections of 2.7% between 2010 and 2015 showing that the industry will grow some more. Consumers who go after scented candles do so because they want their homes to smell good. This is another niche for any innovative and focused entrepreneur as against those who make unscented candles.</span></p><p data-dcnode-id="1102"><span data-dcnode-id="1106" instrument_node="">One of the reasons why the candle business has boomed to this extent is the fact that inputs used for production such as wicks, fragrances, colorants and wax (soy wax, paraffin wax, gel wax, </span><a data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/%3Fp%3D51276%26%3Dtrue%26_id%3D51276" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1105" instrument_node="">beeswax and other natural based wax</span></a><span data-dcnode-id="1103" instrument_node="">) are not only cheap but easy to source.</span></p><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">This means any entrepreneur who is focused and intent on starting the candle business will make great margins especially during periods where there are high demands. The equipment and finances needed to start the candle making business is not only cheap but can be easily gotten by any focused entrepreneur.</span></p><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Regardless of this fact, new entrants into this industry might find it difficult to compete fairly with established operators due to the fact that there is rising concentration in the industry. Also, those already in the business will have leverage over new entrants especially in areas such as economies of scale as well as the target market.</span></p><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">According to research, candles are in variety of shapes and sizes, like outdoor candles, tapers, container candles, votives, pillars, floating candles, utility candles, liturgical candles as well as birthday candles where over 90% are purchased by women.</span></p><div class="code-block code-block-2" data-dcnode-id="1086" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="1087"><span data-dcnode-id="1094" instrument_node="">

lly those who are bored of regular fragrances.</span></p><div class="code-block code-block-12" data-dcnode-id="781" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="782"></div></div><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Another huge strength of ours is in the vast experience of the Chief Executive Officer, who has more than ten years experience in this industry. Also, the fact that our franchises are of high quality, coupled with our descriptive eBooks and consultancy services, also adds largely to our strengths.</span></p><ul data-dcnode-id="775"><li data-dcnode-id="776"><strong data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Weakness:</span></strong></li></ul><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Our weakness for now lies in the fact that we would have to operate regionally at first, thereby majorly limiting our business for the first few months of operations to a certain section of the United States of America.</span></p><ul data-dcnode-id="769"><li data-dcnode-id="770"><strong data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Opportunities:</span></strong></li></ul><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">There are various opportunities that abound in the candle making industry and the fact that we are continually working on bringing forth new fragrances with some of our productions offers limitless opportunities for us as a company.</span></p><ul data-dcnode-id="763"><li data-dcnode-id="764"><strong data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Threats:</span></strong></li></ul><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Knowing how every business faces threats every now and then, we are prepared for the threats that will occur during the course of running this business, and while some threats might not be so difficult to handle, like the arrival of a competitor, other threats lie a bad economy, which might affect consumers’ spending power might be difficult to handle.</span></p><h3 data-dcnode-id="758"><span data-dcnode-id="759" id="7_MARKET_ANALYSIS"><span data-dcnode-id="760" instrument_node="">7. MARKET ANALYSIS</span></span></h3><ul data-dcnode-id="754"><li data-dcnode-id="755"><strong data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Market Trends</span></strong></li></ul><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">The candle market is one where there will always be demands, albeit these demands will depend on the availability of disposable per capita income of the consumers which in turns depends on the health of the economy. Most consumers demand for scented candles has caused companies to constantly research on fragrances that will keep customers intrigued.</span></p><div class="code-block code-block-13" data-dcnode-id="750" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="751"></div></div><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Another trend is in looking at all the available avenues by which the candles can reach the customers in a way that is convenient for both the customer and the company. Candle sales these days are not limited to specialty stores and discount stores but can also be sold at fairs and outdoor events.</span></p><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Finally, technology has a huge role to play into how products are becoming visible to consumers. The internet especially has created an avenue for businesses to not only reach out to their loyal clients but also to potential clients as well.</span></p><h4 data-dcnode-id="742"><span data-dcnode-id="743" id="8_Our_Target_Market"><strong data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">8. Our Target Market</span></strong></span></h4><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Almost everybody – from young teens to adults – love candles and have purchased it at one time or the other. However, according to studies, a large percentage of those that purchase these candles are women. This is why most of our strategies revolve around the female folks, especially in Tulsa and in all locations we are looking to get our products to.</span></p><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Due to the above statistic from a reliable source in addition to our market research, we have been able to draft the right strategies for our target market. We would be engaging in a retail and wholesale distribution to the following groups of people and organizations;</span></p><ul data-dcnode-id="721"><li data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Households</span></li><li data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Single Women</span></li><li data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Churches</span></li><li data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Spa beauty salons</span></li><li data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Religious houses</span></li><li data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Students</span></li><li data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Business people</span></li><li data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Single males</span></li></ul><p data-dcnode-id="716"><strong data-dcnode-id="717"><span data-dcnode-id="720" instrument_node="">Our </span><a class="wpil_keyword_link" data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/example-companies-competitive-advantage/" rel="noopener noreferrer" target="_blank" title="competitive advantage"><span data-dcnode-id="719" instrument_node="">competitive advantage</span></a></strong></p><div class="code-block code-block-14" data-dcnode-id="714" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="715"></div></div><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Any business that is focused on making profit and intends to be amongst the leading brands in the United States of America will do well to draft strategies that will give it a competitive advantage over other same businesses in the industry.</span></p><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">One of the first competitive advantages we intend to have over other businesses is in offering excellent customer services that will remain unrivalled; this can be achieved by employing the required professionals to handle this aspect. We know that an excellent customer service is one of the most effective ways of retaining our clients.</span></p><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">We also have the finest professionals as regards mixing of different scents to produce unique flavors that will intrigue the sense of our customers.</span></p><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">We also intend to ensure that our employees work in a conducive environment where they can grow themselves and increase productivity for the company as well. We intend to create the best welfare packages for our employees and also share part of our profit with our management staff.</span></p><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Finally, we would ensure that our official website is responsive and user-friendly to clients who would prefer to purchase our products online.</span></p><div class="code-block code-block-15" data-dcnode-id="702" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="703"></div></div><h4 data-dcnode-id="698"><span data-dcnode-id="699" id="9_SALES_AND_MARKETING_STRATEGY"><strong data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">9. SALES AND MARKETING STRATEGY</span></strong></span></h4><ul data-dcnode-id="694"><li data-dcnode-id="695"><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Sources of Income</span></strong></li></ul><p data-dcnode-id="689"><span data-dcnode-id="693" instrument_node="">At Bright Light® LLC Candles, we know how important it is to ensure that our </span><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/income-candle-producers-make-margin/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="692" instrument_node="">business makes profit not only from sale of candles</span></a><span data-dcnode-id="690" instrument_node=""> but also from other sources as well so as to keep our bottom line very robust and healthy. Bright Light® LLC Candles will generate income by having these sources of income;</span></p><ul data-dcnode-id="676"><li data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Different kinds of candles such as outdoor candles, tapers, container candles, votives, pillars, floating candles, utility candles, liturgical candles and birthday candles</span></li><li data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Sale of fragrances</span></li><li data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Franchises</span></li><li data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Consultancy services</span></li><li data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Trainings</span></li><li data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Sale of eBooks</span></li></ul><h4 data-dcnode-id="672"><span data-dcnode-id="673" id="10_Sales_Forecast"><strong data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">10. Sales Forecast</span></strong></span></h4><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Due to a thorough research, we have been able to come up with an almost accurate sales forecast for our candles. Our strategies have ensured that we are in the position to become a leading brand in Tulsa City and the immediate environs. We are not only expecting to make massive profits in our first three months of business but also intend to expand within a year of operation.</span></p><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Our chances in this industry are based on pure facts and a critical examination of our strengths and what we intend to offer this market. Our sales projections are based on information that were gathered during the course of carrying out a through feasibility study.</span></p><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">We also took into considerations start-ups in Oklahoma especially those in Tulsa City.Below are the sales projection for Bright Light® LLC Candles, which is based on our location, the market and the industry at large.</span></p><ul data-dcnode-id="653"><li data-dcnode-id="662"><strong data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">First Fiscal Year-: </span></strong><span data-dcnode-id="663" instrument_node="">$200,000</span></li><li data-dcnode-id="658"><strong data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Second Fiscal Year-: </span></strong><span data-dcnode-id="659" instrument_node="">$650,000</span></li><li data-dcnode-id="654"><strong data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Third Fiscal Year-: </span></strong><span data-dcnode-id="655" instrument_node="">$1,300,000</span></li></ul><p data-dcnode-id="649"><strong data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">N.B:</span></strong><span data-dcnode-id="650" instrument_node=""> The above projection is based on the fact that all factors, such as a positive growth in the economy and lack of serious competitors – remain unchanged. This means that projections might become higher or lower due to changes at any time.</span></p><div class="code-block code-block-16" data-dcnode-id="647" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="648"></div></div><ul data-dcnode-id="643"><li data-dcnode-id="644"><strong data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Marketing Strategy and Sales Strategy</span></strong></li></ul><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Marketing is one very important aspect of any business as it serves a dual purpose in generating income for the business as well as creating publicity for the business. It is very vital that marketing strategies are drafted and fine tuned so that they can bring in the desired results. In view of this, we conducted a thorough research that will ensure that we have the best strategies in place to generate income for the business.</span></p><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">People get attracted to visuals and so this means that we would strive to put more effort in our visuals to ensure that we achieve attract customers to our brand. Candles are used for different purposes but mostly to calm people, and so we would ensure that our video adverts and images used are ones that will project serenity to potential customers.</span></p><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Because we know how important the business of marketing is, we have hired a business consultant that will help put our strategies in a better perspective, whilst also including important strategies that are deemed suitable for our kind of business. Our business consultant is an expert in this industry and his expertise would be to the benefit of the company.</span></p><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Our marketing and sales team will be carefully chosen as they will not only reflect the image of the company but must also understand what the goals of the company are and how it would best fit into their marketing and sales strategies. Some of the strategies that will be adopted at Bright Light® LLC Candles include;</span></p><ul data-dcnode-id="618"><li data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Visit religious houses, spas, and other businesses to introduce our candle making business</span></li><li data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Advertise our candle making business in relevant magazines, local newspapers, radio stations and television.</span></li><li data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Ensure that our business is listed in local directories as well as online directories</span></li><li data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Use our website as well as our social media platforms to vigorously promote our products and services</span></li><li data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Engage in direct marketing</span></li><li data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Encourage our loyal customers to help in referral marketing</span></li><li data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Pass out hand bills and business cards</span></li><li data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Create an attractive billboard and place in strategic locations.</span></li></ul><h4 data-dcnode-id="614"><span data-dcnode-id="615" id="11_Publicity_and_Advertising_Strategy"><strong data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">11. Publicity and Advertising Strategy</span></strong></span></h4><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Engaging in publicity is very important as it helps increases awareness for the product and in extension the company itself. There are various means by which a company can choose to publicize its products and services. At Bright Light® LLC Candles, we intend to use both conventional and unconventional means of creating awareness for our products and services.</span></p><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">However, we know how important it is for our brand to be accepted in Tulsa City – Oklahoma, which would then help boost our profile when expanding to other locations. Some of the platforms which we intend to leverage on to achieve the publicity of our products and services at Bright Light® LLC Candles include;</span></p><ul data-dcnode-id="597"><li data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Participate in trade fairs and craft shows so that more people can become aware of the company</span></li><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Make use of the official website to keep the audience engaged as regards the various products and services available</span></li><li data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Placing adverts in beauty and lifestyle magazines, local newspapers, radio stations and television</span></li><li data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Pass out handbills and paste fliers in conspicuous places</span></li><li data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Make use of social media platforms such as Pinterest, Instagram, Twitter, Facebook, and YouTube to promote the image of our candle making business</span></li><li data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Network with other candle makers in and outside Oklahoma</span></li></ul><h4 data-dcnode-id="591"><span data-dcnode-id="592" id="12_Our_Pricing_Strategy"><strong data-dcnode-id="593"><span data-dcnode-id="596" instrument_node="">12. Our </span><a class="wpil_keyword_link" data-dcnode-id="594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/factors-product-pricing-strategy/" rel="noopener noreferrer" target="_blank" title="Pricing Strategy"><span data-dcnode-id="595" instrument_node="">Pricing Strategy</span></a></strong></span></h4><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">The pricing for candles are very affordable for everyone. However, the pricing usually varies depending on factors such as varieties, shapes and packaging. However, whilst these factors might affect pricing to an extent, it will not result in steep pricing for the candles.</span></p><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">In choosing the right pricing for our candles, we would ensure that we rate our proposed pricing against what our competitors are offering, and then adjust accordingly. Also, while we would ensure that our prices are fair, we would not offer prices that are below our operational cost.</span></p><ul data-dcnode-id="583"><li data-dcnode-id="584"><strong data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Payment Options</span></strong></li></ul><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">At Bright Light® LLC Candles, we have a payment policy that caters to our numerous clients locally and internationally. Whatever payment option that is chosen by our client isn’t one that will stress them out as our payment options were carefully chosen for its convenience and security. Below are the payment options that will be available for our different clients;</span></p><ul data-dcnode-id="570"><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Cash payment</span></li><li data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Payment via Point of Sale (POS) Machine</span></li><li data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Payment via PayPal (for online and international clients)</span></li><li data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Payoneer (for online and international clients)</span></li><li data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Payment via check</span></li></ul><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">As earlier stated, our payment options were chosen because of the ease of convenience for our various clients.</span></p><h3 data-dcnode-id="564"><span data-dcnode-id="565" id="13_Startup_Expenditure_Budget"><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">13. Startup Expenditure (Budget)</span></strong></span></h3><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Any serious entrepreneur knows that in starting a business, part of the capital if not all must be available to buy standard equipment that will ensure the business runs smoothly. The candle business is no different; however, the equipment needed to start this business is something that can be easily gotten.</span></p><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Asides, equipment there are other areas where part of the capital is expected to be spent on. Some of the key areas that require finances from start-up capital;</span></p><ul data-dcnode-id="504"><li data-dcnode-id="556"><span data-dcnode-id="559" instrument_node="">Business incorporation fee in the United States of America – </span><strong data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">$500</span></strong></li><li data-dcnode-id="549"><span data-dcnode-id="555" instrument_node="">Expenses for legal requirements such as </span><a data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/license-sell-candles/" rel="noopener" target="_blank"><span data-dcnode-id="554" instrument_node="">licenses and permits</span></a><span data-dcnode-id="552" instrument_node=""> – </span><strong data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">$700 </span></strong></li><li data-dcnode-id="545"><span data-dcnode-id="548" instrument_node="">Acquisition of candle making equipment as well as POS machines –&nbsp; </span><strong data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">$35,000</span></strong></li><li data-dcnode-id="541"><span data-dcnode-id="544" instrument_node="">Start-up inventory cost (wax, wicks, fragrances, packaging materials) – </span><strong data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">$10,000</span></strong></li><li data-dcnode-id="537"><span data-dcnode-id="540" instrument_node="">Marketing promotion expenses for at least six months including the grand opening of Bright Light® LLC Candles – </span><strong data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">$3,800</span></strong></li><li data-dcnode-id="533"><span data-dcnode-id="536" instrument_node="">Insurance coverage – </span><strong data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">$1,500</span></strong></li><li data-dcnode-id="529"><span data-dcnode-id="532" instrument_node="">Cost of hiring business consultant – </span><strong data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">$1,500</span></strong></li><li data-dcnode-id="525"><span data-dcnode-id="528" instrument_node="">Running operation cost for the first six months (employee salaries, bill payments) – </span><strong data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">$200,000</span></strong></li><li data-dcnode-id="521"><span data-dcnode-id="524" instrument_node="">Storage facilities – </span><strong data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">$2,000</span></strong></li><li data-dcnode-id="517"><span data-dcnode-id="520" instrument_node="">Other start-up expenses (phone and utility, stationery) – </span><strong data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">$1,000</span></strong></li><li data-dcnode-id="513"><span data-dcnode-id="516" instrument_node="">Cost of launching an official website – </span><strong data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">$500</span></strong></li><li data-dcnode-id="509"><span data-dcnode-id="512" instrument_node="">Launching party – </span><strong data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">$5,000</span></strong></li><li data-dcnode-id="505"><span data-dcnode-id="508" instrument_node="">Miscellaneous – </span><strong data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">$3,000</span></strong></li></ul><p data-dcnode-id="499"><span data-dcnode-id="503" instrument_node="">From the above estimate, we would need at least </span><strong data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">$265,000</span></strong><span data-dcnode-id="500" instrument_node=""> in order to set up our candle making business successfully in Tulsa City, Oklahoma.</span></p><p data-dcnode-id="496"><strong data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Generating Funding / Startup Capital for Candle Making Business</span></strong></p><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Bright Light® LLC Candles is a business that is owned and run by Theresa Baker, and her immediate family. There has been no external partner and there are no plans to having any in the nearest future. This is why we have restricted sourcing for part of our equity from just few sources.</span></p><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Some of the areas where we intend to generate part of our equity from include;</span></p><ul data-dcnode-id="485"><li data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Sale of personal stock and properties to generate capital</span></li><li data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Applying for loans from banks</span></li><li data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Approaching wealthy friends and family members for soft loans</span></li></ul><p data-dcnode-id="481"><strong data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">N.B: </span></strong><span data-dcnode-id="482" instrument_node="">We have generated $100,000 from sale of personal stock. We also have gotten $70,000 from our family members and friends. We have applied for a $100,000 loan from the bank, and we are in the final stages for approval and so have met all the conditions stipulated by the bank.</span></p><h4 data-dcnode-id="477"><span data-dcnode-id="478" id="14_Sustainability_and_Expansion_Strategy"><strong data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">14. Sustainability and Expansion Strategy</span></strong></span></h4><p data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">We know that the future of sustaining our business lies in our loyal customers, the structure of our business, the competence of our employees, as well as our various and diverse business structures. These factors therefore affect our strategies drafted to ensure that we remain in business.</span></p><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">One of the dreams of our business is to ensure that we build a business that is able to pay itself in the long run and not depend on external sources to continually fund its operations except in areas where the business needs to expand. We now that this can be possible if we remain focused on our vision as well as company policies.</span></p><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Since we do not want to close shop anytime soon at Bright Light® LLC Candles, we will try to ensure that profit is shared among top performing management staff, with incentives for staff that put in a great performance as well over the course of a certain time period.</span></p><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">We now that to sustain and invariably grow and expand our business, we must make the right decisions especially in terms of the right recruitment, as well as have a management staff that is attuned to our company vision and policies.</span></p><p data-dcnode-id="466"><strong data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Check List / Milestone</span></strong></p><ul data-dcnode-id="369"><li data-dcnode-id="462"><span data-dcnode-id="465" instrument_node="">Business Name Availability Check: </span><strong data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Completed</span></strong></li><li data-dcnode-id="458"><span data-dcnode-id="461" instrument_node="">Business Registration: </span><strong data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Completed</span></strong></li><li data-dcnode-id="454"><span data-dcnode-id="457" instrument_node="">Opening of Corporate Bank Accounts: </span><strong data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Completed</span></strong></li><li data-dcnode-id="450"><span data-dcnode-id="453" instrument_node="">Securing Point of Sales (POS) Machines: </span><strong data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Completed</span></strong></li><li data-dcnode-id="446"><span data-dcnode-id="449" instrument_node="">Opening Mobile Money Accounts: </span><strong data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Completed</span></strong></li><li data-dcnode-id="442"><span data-dcnode-id="445" instrument_node="">Opening Online Payment Platforms: </span><strong data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Completed</span></strong></li><li data-dcnode-id="438"><span data-dcnode-id="441" instrument_node="">Application and Obtaining Tax Payer’s ID: </span><strong data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="434"><span data-dcnode-id="437" instrument_node="">Application for business license and permit: </span><strong data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Completed</span></strong></li><li data-dcnode-id="430"><span data-dcnode-id="433" instrument_node="">Purchase of Insurance for the Business: </span><strong data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Completed</span></strong></li><li data-dcnode-id="426"><span data-dcnode-id="429" instrument_node="">Conducting feasibility studies: </span><strong data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Completed</span></strong></li><li data-dcnode-id="422"><span data-dcnode-id="425" instrument_node="">Generating capital from family members: </span><strong data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Completed</span></strong></li><li data-dcnode-id="418"><span data-dcnode-id="421" instrument_node="">Applications for Loan from the bank: </span><strong data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="414"><span data-dcnode-id="417" instrument_node="">writing of business plan: </span><strong data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Completed</span></strong></li><li data-dcnode-id="410"><span data-dcnode-id="413" instrument_node="">Drafting of Employee’s Handbook: </span><strong data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Completed</span></strong></li><li data-dcnode-id="406"><span data-dcnode-id="409" instrument_node="">Drafting of Contract Documents and other relevant Legal Documents: </span><strong data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="402"><span data-dcnode-id="405" instrument_node="">Design of The Company’s Logo: </span><strong data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Completed</span></strong></li><li data-dcnode-id="398"><span data-dcnode-id="401" instrument_node="">Graphic Designs and Printing of Packaging Marketing / Promotional Materials: </span><strong data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="394"><span data-dcnode-id="397" instrument_node="">Recruitment of employees: </span><strong data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="390"><span data-dcnode-id="393" instrument_node="">Creating Official Website for the Company: </span><strong data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="386"><span data-dcnode-id="389" instrument_node="">Creating Awareness for the business both online and around the community: </span><strong data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="382"><span data-dcnode-id="385" instrument_node="">Health and Safety and Fire Safety Arrangement (License): </span><strong data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Secured</span></strong></li><li data-dcnode-id="378"><span data-dcnode-id="381" instrument_node="">Opening party / launching party planning: </span><strong data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="374"><span data-dcnode-id="377" instrument_node="">Establishing business relationship with vendors – wholesale suppliers / merchants: </span><strong data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="370"><span data-dcnode-id="373" instrument_node="">Purchase of candle supplies: </span><strong data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Completed</span></strong></li></ul><h2 data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Frequently Asked Questions</span></h2><div class="Clickable-sc-1avsu3g-0 dkQdrY SimpleListRow__RowWrapper-fb09jr-2 jYkGlr app__Row-sc-1ig5s0-2 iBuOQF mms--sl-row" data-dcnode-id="230"><div class="SimpleListItem__Wrapper-sc-1b5azjz-0 bWndTd app__Item-sc-1ig5s0-1 fZvFuX" data-dcnode-id="346" role="button"><h5 data-dcnode-id="364"><b data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">1. How Do You Start A Candle-making Business?</span></b></h5><p data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">When starting up a candle-making business, consider the following;</span></p><ul data-dcnode-id="347"><li data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Perfect your craft</span></li><li data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Create a business plan</span></li><li data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Find small business funding</span></li><li data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Start marketing your candles</span></li><li data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Find and manage candle supplies</span></li><li data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Decide where to sell your goods</span></li><li data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Get the necessary licenses, permits and insurance</span></li></ul></div><div class="SimpleListItem__Wrapper-sc-1b5azjz-0 bWndTd app__Item-sc-1ig5s0-1 fZvFuX" data-dcnode-id="267" role="button"><ol data-dcnode-id="341" start="2"><li data-dcnode-id="342"><h5 data-dcnode-id="343"><strong data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">What Is The Growth Potential For A Candle Making Business?</span></strong></h5></li></ol><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">A typical full-time (successful) candle-maker might gross $25,000-$50,000 per year. However, you could exceed this amount by selling to a major re-seller. Also, consider franchising your business once you have grown successful enough that others might wish to emulate your business model.</span></p><ol data-dcnode-id="334" start="3"><li data-dcnode-id="335"><h5 data-dcnode-id="336"><strong data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">What Are The Costs Involved In Opening A Candle Making Business?</span></strong></h5></li></ol><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">You can possibly start your business at home using your own kitchen heat source and utensils. A starters’ kit can be purchased online at many sites including Candle Science and Candle-chem. Your candle ingredients shouldn’t cost more than a couple hundred dollars to start. In addition, you need web development, which can cost zero to a couple hundred dollars, depending on your skills in the area, and at least a reasonably good camera. And if you plan to exhibit your products at various shows and festivals, a booth can cost $100 a day and you will have gasoline and related travel costs.</span></p><ol data-dcnode-id="327" start="4"><li data-dcnode-id="328"><h5 data-dcnode-id="329"><strong data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">How Much Can You Potentially Make Owning A Candle Making Business?</span></strong></h5></li></ol><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Potential earnings rate for candle making business is&nbsp; about $57,124 per year or $27 per hour. The top 10 percent makes over $150,000 per year, while the bottom 10 percent under $21,000 per year.</span></p><ol data-dcnode-id="320" start="5"><li data-dcnode-id="321"><h5 data-dcnode-id="322"><strong data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Where Can You Purchase An Instrument For Making Candles?</span></strong></h5></li></ol><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">You can buy an instrument for making candle from candle supply companies like Amaree Candle Making Supplier.</span></p><ol data-dcnode-id="313" start="6"><li data-dcnode-id="314"><h5 data-dcnode-id="315"><strong data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">What Are The Ongoing Expenses For A Candle Making Business?</span></strong></h5></li></ol><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">The business reflects around the various forms of wax mostly, and your containers, color and fragrance additives. Once you have started small and proven your business model will work, you can buy the products at lower per-unit costs in bulk. For instance, wax can be found for as little as a dollar a pound when bought in (25 to lb) quantities. Wicks can be bought by the (100-ft). Containers, which includes; glass jars, mason jars and tins, can also be found in large quantities.</span></p><ol data-dcnode-id="306" start="7"><li data-dcnode-id="307"><h5 data-dcnode-id="308"><strong data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Do You Need A Thermometer To Make Candles?</span></strong></h5></li></ol><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Yes! There’s need for thermometer, because when making candles you will need to get the wax to the correct temperature for the 4 stages. If you make candles without a thermometer you will not make good candles and can possibly risk personal injury as well.</span></p><ol data-dcnode-id="299" start="8"><li data-dcnode-id="300"><h5 data-dcnode-id="301"><strong data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">How Much Does It Cost To Start A Candle Business?</span></strong></h5></li></ol><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">To start up a candle business, estimate about $1,000 on a small scale business, while a larger-scale business can cost more than $10,000.</span></p><ol data-dcnode-id="292" start="9"><li data-dcnode-id="293"><h5 data-dcnode-id="294"><strong data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Where Will You Purchase Your Candle Supplies?</span></strong></h5></li></ol><p data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">You can buy candle supplies (equipment) from the candle supply company, Amaree Candle&nbsp; Making Supplier.</span></p><ol data-dcnode-id="285" start="10"><li data-dcnode-id="286"><h5 data-dcnode-id="287"><strong data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">What Happens During A Typical Day At A Candle Making Business?</span></strong></h5></li></ol><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">During a typical candle day at a candle making business, expect the following;</span></p><ul data-dcnode-id="268"><li data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Ordering and storing of raw products</span></li><li data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Constantly researching and reaching out to possible sales venues through online or in the physical world</span></li><li data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Creating and regularly updating your website and pages on the sites of arts and crafts dealers</span></li><li data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Meeting and making contact with your customers, whether online or in personal encounters</span></li><li data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Creating your candles and related products as needed</span></li><li data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Photographing your product line to maximum advantage so that your merchandise looks appealing online</span></li><li data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Promoting your business through Facebook, Instagram and other social media</span></li></ul></div><div class="SimpleListItem__Wrapper-sc-1b5azjz-0 bWndTd app__Item-sc-1ig5s0-1 fZvFuX" data-dcnode-id="248" role="button"><ol data-dcnode-id="263" start="11"><li data-dcnode-id="264"><h5 data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">You Are Planning To Start Making Candles In July, How Can You Print Labels For Your Company?</span></h5></li></ol><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">The best ways to print labels for your company are</span></p><ul data-dcnode-id="256"><li data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Through Candle Design Gallery&nbsp; (CDG)</span></li><li data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">By using Avery blank labels, whether the sheet or have them professionally printed by Avery Print</span></li></ul><ol data-dcnode-id="251" start="12"><li data-dcnode-id="252"><h5 data-dcnode-id="253"><strong data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">How Does A Candle Making Business Make Money?</span></strong></h5></li></ol><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">A candle making business makes money through the following ways;</span></p></div><ul data-dcnode-id="231"><li data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Instagram</span></li><li data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Snap-chat</span></li><li data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">Email Marketing</span></li><li data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Giveaways and contests</span></li><li data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Networking and inspiration</span></li><li data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Discovering wholesale opportunities</span></li><li data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Creating more selling opportunities</span></li><li data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Build your online following and email subscribers</span></li></ul></div><div class="Clickable-sc-1avsu3g-0 dkQdrY SimpleListRow__RowWrapper-fb09jr-2 jYkGlr app__Row-sc-1ig5s0-2 iBuOQF mms--sl-row" data-dcnode-id="173"><div class="SimpleListItem__Wrapper-sc-1b5azjz-0 bWndTd app__Item-sc-1ig5s0-1 fZvFuX" data-dcnode-id="200" role="button"><h5 data-dcnode-id="227"><strong data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">13. How Much Does It Cost To Start Making Candles?</span></strong></h5><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">You can possibly start a small candle-making business with between $700 to $1000.</span></p><h5 data-dcnode-id="222"><strong data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">14. What Are Some Skills And Experiences That Will Help You Build A Successful Candle Making Business?</span></strong></h5><p data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Firstly, you should love the aesthetics of making candles and related items and know how to brand your business. You should know the basics of eCommerce and how to establish an online presence. Display or presentation skills are so vital, both online and offline, like the quality of your photos and your written product descriptions and also in physical displays if you sell from booths at some shows.</span></p><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">Personal sales ability is very essential if you plan to sell your product line in person, either to customers directly or to re-sellers. You must believe in your product and be able to captivate the interest of others, to make them catch your enthusiasm.</span></p><h5 data-dcnode-id="215"><strong data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">15. Why Is Selling Candles From Home A Good Idea?</span></strong></h5><p data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">Selling candles from home is a very good idea because it is a simple way to diversify your income while satisfying your creative desires. Once you have established the craft of candle making, you can now turn your side hustle into a business.</span></p><h5 data-dcnode-id="210"><strong data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">16. Now That Your Candles Are Ready To Go, Where Should You Sell Them?</span></strong></h5><p data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">The best places to sell your candles are;</span></p><ul data-dcnode-id="201"><li data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">Your website or an online marketplace like Etsy</span></li><li data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">Wholesaling to gift shops and boutiques whether locally or beyond</span></li><li data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">To farmers markets, craft fairs, festivals or other local events</span></li></ul></div><div
