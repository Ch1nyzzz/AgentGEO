91" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/career/" title="Career"><span data-dcnode-id="992" instrument_node="">Career</span></a></li></ul></div></div></div></nav><div class="main-content" data-dcnode-id="66" id="main-content-area"><div class="container" data-dcnode-id="67" id="main-content-container"><div class="row" data-dcnode-id="68" id="main-content-row"><p data-dcnode-id="971" id="breadcrumbs"><span data-dcnode-id="972"><span data-dcnode-id="973"><a data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/"><span data-dcnode-id="984" instrument_node="">Home</span></a><span data-dcnode-id="982" instrument_node=""> » </span><span data-dcnode-id="974"><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/ideas/"><span data-dcnode-id="981" instrument_node="">Business ideas</span></a><span data-dcnode-id="979" instrument_node=""> » </span><span data-dcnode-id="975"><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/ideas/internet/"><span data-dcnode-id="978" instrument_node="">Internet Based Industry</span></a><span data-dcnode-id="976" instrument_node=""> » </span></span></span></span></span></p><div class="main-content col-md-8 col-lg-8" data-dcnode-id="148"><article class="post-73726 post type-post status-publish format-standard hentry category-internet" data-dcnode-id="152" id="post-73726"><header class="page-header" data-dcnode-id="968"><h1 class="page-title entry-title" data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">How to Write an Etsy Shop Business Plan [Sample Template]</span></h1></header><div class="entry-content-main" data-dcnode-id="154"><div class="entry-content" data-dcnode-id="155"><p data-dcnode-id="964"><strong data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Do you want to start an Etsy shop and need to write a plan? If YES, here is a sample Etsy shop business plan template &amp; feasibility report. </span></strong><span data-dcnode-id="965" instrument_node="">If you are into handmade or vintage items and craft supplies and you are considering taking your business to customers beyond your location, then one of your options is to open a shop in an Etsy online platform.</span></p><p data-dcnode-id="959"><span data-dcnode-id="963" instrument_node="">Etsy shops just like most </span><a data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/internet-business-ideas/" rel="noopener" target="_blank"><span data-dcnode-id="962" instrument_node="">online businesses</span></a><span data-dcnode-id="960" instrument_node="">, thrive on creativity, branding and good business skills. Any aspiring entrepreneur can open a shop on the Etsy platform, and as long as they are creative, they can get people to promote their brand. The starting size of this type of business doesn’t really matter as long as the business is built on the right foundation and with the right product supplies.</span></p><p data-dcnode-id="954"><span data-dcnode-id="958" instrument_node="">If you are truly serious about </span><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/starting-etsy-shop/"><span data-dcnode-id="957" instrument_node="">starting your own Esty business</span></a><span data-dcnode-id="955" instrument_node="">, then the best place to start is to draft a good business plan. A business plan is the blue print of your business; it is a business document that can aid you to successfully set up and manage the business.</span></p><p data-dcnode-id="949"><span data-dcnode-id="953" instrument_node="">It is not enough to just </span><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/business-plan-writing-app-android/" rel="noopener" target="_blank"><span data-dcnode-id="952" instrument_node="">write a business plan</span></a><span data-dcnode-id="950" instrument_node=""> for the sake of writing one, your business plan should be able to pass reality check; you must put relevant facts, figures, and statistics into consideration when writing your business plan. Below is a sample Esty shop business plan template that can help you to successfully write your own with little or no difficulty.</span></p><h2 data-dcnode-id="946"><strong data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">A Sample Etsy Shop Business Plan Template</span></strong></h2><div class="toc_white no_bullets contracted" data-dcnode-id="891" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="938"><span data-dcnode-id="945" instrument_node="">Table of Content</span><span data-dcnode-id="944" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="939"><span data-dcnode-id="943" instrument_node="">[</span><a data-dcnode-id="941" href="#"><span data-dcnode-id="942" instrument_node="">show</span></a><span data-dcnode-id="940" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="892" style="display: none;"><ul data-dcnode-id="934"><li data-dcnode-id="935"><a data-dcnode-id="936" href="#1_Industry_Overview"><span data-dcnode-id="937" instrument_node="">1. Industry Overview</span></a></li></ul><li data-dcnode-id="924"><a data-dcnode-id="932" href="#2_Executive_Summary"><span data-dcnode-id="933" instrument_node="">2. Executive Summary</span></a><ul data-dcnode-id="925"><li data-dcnode-id="929"><a data-dcnode-id="930" href="#3_Our_Products_and_Services"><span data-dcnode-id="931" instrument_node="">3. Our Products and Services</span></a></li><li data-dcnode-id="926"><a data-dcnode-id="927" href="#4_Our_Mission_and_Vision_Statement"><span data-dcnode-id="928" instrument_node="">4. Our Mission and Vision Statement</span></a></li></ul></li><li data-dcnode-id="921"><a data-dcnode-id="922" href="#5_Job_Roles_and_Responsibilities"><span data-dcnode-id="923" instrument_node="">5. Job Roles and Responsibilities</span></a></li><li data-dcnode-id="918"><a data-dcnode-id="919" href="#6_SWOT_Analysis"><span data-dcnode-id="920" instrument_node="">6. SWOT Analysis</span></a></li><li data-dcnode-id="899"><a data-dcnode-id="916" href="#7_MARKET_ANALYSIS"><span data-dcnode-id="917" instrument_node="">7. MARKET ANALYSIS</span></a><ul data-dcnode-id="900"><li data-dcnode-id="913"><a data-dcnode-id="914" href="#8_Our_Target_Market"><span data-dcnode-id="915" instrument_node="">8. Our Target Market</span></a></li><li data-dcnode-id="910"><a data-dcnode-id="911" href="#9_SALES_AND_MARKETING_STRATEGY"><span data-dcnode-id="912" instrument_node="">9. SALES AND MARKETING STRATEGY</span></a></li><li data-dcnode-id="907"><a data-dcnode-id="908" href="#10_Sales_Forecast"><span data-dcnode-id="909" instrument_node="">10. Sales Forecast</span></a></li><li data-dcnode-id="904"><a data-dcnode-id="905" href="#11_Publicity_and_Advertising_Strategy"><span data-dcnode-id="906" instrument_node="">11. Publicity and Advertising Strategy</span></a></li><li data-dcnode-id="901"><a data-dcnode-id="902" href="#12_Our_Pricing_Strategy"><span data-dcnode-id="903" instrument_node="">12. Our Pricing Strategy</span></a></li></ul></li><li data-dcnode-id="896"><a data-dcnode-id="897" href="#13_Startup_Expenditure_Budget"><span data-dcnode-id="898" instrument_node="">13. Startup Expenditure (Budget)</span></a></li><li data-dcnode-id="893"><a data-dcnode-id="894" href="#14_Sustainability_and_Expansion_Strategy"><span data-dcnode-id="895" instrument_node="">14. Sustainability and Expansion Strategy</span></a></li></ul></div><h4 data-dcnode-id="887"><span data-dcnode-id="888" id="1_Industry_Overview"><strong data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">1. Industry Overview</span></strong></span></h4><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Etsy is an American e-commerce website that is focused on handmade or vintage items and craft supplies. These items fall under a wide range of categories, including jewelry, bags, clothing, home décor and furniture, toys, art, as well as craft supplies and tools.</span></p><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">All vintage items must be at least 20 years old. The site follows in the tradition of open craft fairs, giving sellers personal storefronts where they list their goods for a fee of US$0.20 per item. It is important to state that creating a shop on Etsy is free; however, each listing that is posted in the shop costs $0.20. Each listing will remain on the shop’s page for a maximum of 4 months, or until someone buys the product.</span></p><div class="code-block code-block-1" data-dcnode-id="873" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="874"><span data-dcnode-id="881" instrument_node="">
</span><span data-dcnode-id="879" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2552847123501338" data-ad-format="auto" data-ad-slot="4731700007" data-dcnode-id="878" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="877" instrument_node="">
</span></div></div><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">The prices of products are set by the shop owner, but Etsy claims 5 percent of the final sale price of each listing. Shop owners are sent a bill at the end of every month detailing the fees Etsy has charged them, and they have until the 15th of the following month to pay the fees. Sellers can choose which payment options to offer buyers, including credit cards, debit cards, and PayPal, among others.</span></p><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Available statistics shows that as of December 31, 2018, Etsy had over 60 million items in its marketplace, and the online marketplace for handmade and vintage goods connected 2.1 million sellers with 39.4 million buyers. At the end of 2018, Etsy had 874 employees. In 2018, Etsy had total sales, or Gross Merchandise Sales (GMS), of US$3.93 billion on the platform. In 2018, Etsy garnered a revenue of US$603.7 million and registered a net income of US$41.25 million.</span></p><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">The platform generates revenue primarily from three streams: its Marketplace revenue includes a fee of 5 percent of final sale value, which an Etsy seller pays for each completed transaction, on top of a listing fee of 20 cents per item; Seller Services, Etsy’s fastest growing revenue stream, includes fees for services such as “Promoted Listings”, payment processing, and purchases of shipping labels through the platform; while Other revenue includes fees received from third-party payment processors.</span></p><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Opening a shop on Esty platform is indeed a profitable venture and they are always improvising on how to accommodate more shop owners under their platform. Which is why in November 2016, Etsy disclosed that it paid US$32.5 million to purchase Blackbird Technologies, a startup that developed AI software used for shopping context/search applications.</span></p><h3 data-dcnode-id="862"><span data-dcnode-id="863" id="2_Executive_Summary"><span data-dcnode-id="864" instrument_node="">2. Executive Summary</span></span></h3><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Edna Elverson® Vintage Shop, Inc. is an international ecommerce company that owns a shop under Esty platform. Our corporate head office will be located in Miramar Ranch North, San Diego – California. We have been able to secure a large warehouse in a strategic part of town that will be converted to our handmade crafts production factory.</span></p><div class="code-block code-block-2" data-dcnode-id="850" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="851"><span data-dcnode-id="858" instrument_node="">

</span></div></div><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">We were able to out rightly buy over the facility with the help of our bank and support from family and friends. Edna Elverson® Vintage Shop, Inc. is focused on retailing handmade or vintage items and craft supplies from our Esty shop.</span></p><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">These items fall under a wide range of categories, including jewelry, bags, clothing, home décor and furniture, toys, art, as well as craft supplies and tools. All our vintage items are at least 20 years old. Our clients can comfortably view our products in a 3 D rotational view.</span></p><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Our business goal is to become one of the leading and highest selling shop under the Esty brand in the United States and we will make sure that every product that are listed in our Esty shop can favorably compete with the best brands in the industry.</span></p><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Our workers are going to be selected from a pool of talented handmade craft makers and designers in and around San Diego – California and also from any part of the world as the business grows. We will make sure that we take all our workforce through the required training that will position them to meet the expectation of the company and to compete with leading online vintage brands in the United States.</span></p><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">We have put plans in place to build an interactive and user – friendly website and a state-of-the-art handmade crafts factory in San Diego – California, which is why we have plans to outsource production to third parties and to use shipping or fulfillment services. Our factory will be well equipped and we will ensure that we follow the trend in the industry.</span></p><div class="code-block code-block-3" data-dcnode-id="830" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="831"><span data-dcnode-id="838" instrument_node="">

</span></div></div><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Edna Elverson® Vintage Shop, Inc. will manufacture high quality customized handmade products and crafts for both high and low-income earners; we want to become the people’s choice. Edna Elverson® Vintage Shop, Inc. is owned by Edna Elverson and her immediate family members. She is an American vintage collector and crafts enthusiast with over two decades of experience in the arts and crafts industry.</span></p><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">She will occupy the position of chief executive officer (CEO)/President of the organization. Edna Elverson has a Degree in Arts and Crafts and also an MBA both from the University of California.</span></p><h4 data-dcnode-id="822"><span data-dcnode-id="823" id="3_Our_Products_and_Services"><strong data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">3. Our Products and Services</span></strong></span></h4><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Edna Elverson® Vintage Shop, Inc. is established with the aim of retailing handmade or vintage items and craft supplies. We know that quality is a key factor that will help us sell our brand which is why we have but in place a competent quality assurance team that will ensure that all our customized products meet and even surpass our customers’ expectations.</span></p><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">We will work hard to ensure that Edna Elverson® Vintage Shop, Inc. is not just accepted in our location but also nationally in the United States of America, and in other parts of the world. Here are our product offerings; Jewelry, Bags, Clothing, Home Décor and Furniture, Toys, Art, as well as Craft supplies and Tools.</span></p><h4 data-dcnode-id="814"><span data-dcnode-id="815" id="4_Our_Mission_and_Vision_Statement"><strong data-dcnode-id="816"><span data-dcnode-id="817" instrument_node=" </span></div></div><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Our mission is to establish a strong presence on Esty platform and the ecommerce industry with a wide range of customers buying our jewelry, bags, clothing, home décor and furniture, toys, art, as well as craft supplies and tools from all across the globe.</span></p><p data-dcnode-id="797"><strong data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Our Business Structure</span></strong></p><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Edna Elverson® Vintage Shop, Inc. is an online vintage and craft shop brand under Esty platform that intends to start small in San Diego – California, but looks to grow big in order to compete favorably with leading online vintage and craft shops both in the United States and on a global stage.</span></p><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">We are aware of the importance of building a solid business structure that can support the kind of world class online vintage and craft shop business we want to own. This is why we are committed to only hiring the best hands within our area of operations.</span></p><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">At Edna Elverson® Vintage Shop, Inc., we will ensure that we hire people that are qualified, hardworking, customer centric and are ready to work to help us build a prosperous business that will benefit all the stake holders (the owners, workforce, and customers).</span></p><div class="code-block code-block-8" data-dcnode-id="781" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="782"><span data-dcnode-id="789" instrument_node="">

</span></div></div><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">As a matter of fact, profit-sharing arrangement will be made available to all our senior management staff and it will be based on their performance for a period of five years or more as agreed by the board of trustees of the company.</span></p><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">In view of the above, we have decided to hire qualified and competent hands to occupy the following positions; Chief Executive Officer (Owner), Human Resources and Admin Manager, Sales and Marketing Executive, Accountant, Transport and Logistics Manager, IT Specialist, Quality Control Officer, Handmade and Craft Makers and Call Center Agent.</span></p><h3 data-dcnode-id="773"><span data-dcnode-id="774" id="5_Job_Roles_and_Responsibilities"><strong data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">5. Job Roles and Responsibilities</span></strong></span></h3><p data-dcnode-id="770"><strong data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Chief Executive Officer – CEO:</span></strong></p><ul data-dcnode-id="757"><li data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Increases management’s effectiveness by recruiting, selecting, orienting, training, coaching, counseling, and disciplining managers; communicating values, strategies, and objectives; assigning accountabilities; planning, monitoring, and appraising job results</span></li><li data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Creating, communicating, and implementing the organization’s vision, mission, and overall direction – i.e., leading the development and implementation of the overall organization’s strategy.</span></li><li data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Responsible for fixing prices and signing business deals</span></li><li data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Responsible for providing direction for the business</span></li><li data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Responsible for signing checks and documents on behalf of the company</span></li><li data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Evaluates the success of the organization</span></li></ul><ul data-dcnode-id="748"><li data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Responsible for managing the daily activities in the factory</span></li><li data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Responsible for supervising all the employees</span></li><li data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Responsible for planning sales, monitoring inventory, selecting the merchandise, and writing and pricing orders to vendors</span></li><li data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Ensures that the organization operates within stipulated budget.</span></li></ul><p data-dcnode-id="745"><strong data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Human Resources and Admin Manager</span></strong></p><ul data-dcnode-id="726"><li data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Responsible for overseeing the smooth running of HR and administrative tasks for the organization</span></li><li data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Regularly hold meetings with key stakeholders to review the effectiveness of HR Policies, Procedures and Processes</span></li><li data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Maintains office supplies by checking stocks; placing and expediting orders; evaluating new products.</span></li><li data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Ensures operation of equipment by completing preventive maintenance requirements; calling for repairs.</span></li><li data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Defining job positions for e-id="685"><span data-dcnode-id="686" instrument_node="">Responsible for administering payrolls</span></li><li data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Ensuring compliance with taxation legislation</span></li><li data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Handles all financial transactions for the organization</span></li><li data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Serves as internal auditor for the organization</span></li></ul><p data-dcnode-id="675"><strong data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Transport and Logistic Manager</span></strong></p><ul data-dcnode-id="668"><li data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Manages the shipping of goods from warehouse to customers</span></li><li data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Negotiate deals with shipping companies</span></li><li data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Collaborate with the Merchandize Manager in transporting goods from the manufacturer to our warehouses</span></li></ul><p data-dcnode-id="665"><strong data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Information Technologist</span></strong></p><ul data-dcnode-id="650"><li data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Manage the organization’s online shop in Esty and our official website</span></li><li data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Responsible for continuous update of our online store</span></li><li data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Ensure that our payment platform is secured 24 / 7</span></li><li data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Responsible for installing and maintenance of computer software and hardware for the organization</span></li><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Manage logistics and supply chain software, web servers, e-commerce software and POS (point of sale) systems</span></li><li data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Responsible for continuous upgrade and maintenance of IT systems</span></li><li data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Handles any other technological and IT related duties.</span></li></ul><p data-dcnode-id="647"><strong data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Quality Control Officer</span></strong></p><ul data-dcnode-id="634"><li data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Ensures that all the handmade or vintage items and craft supplies in our production line meets the required quality before they are delivered to our clients</span></li><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Make certain that production and manufacturing lines perform efficiently, coordinate employee efforts, and facilitate communications between management and production departments.</span></li><li data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Devise ways of improving the manufacturing process to ensure higher-quality and durable handmade or vintage items and craft supplies</span></li><li data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Ensure that manufacturing production lines run smoothly and generate a consistently suitable output for their employers</span></li><li data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Ensures that the organization work in line with international best practices</span></li><li data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Handles any other responsibility as assigned by the general manager</span></li></ul><p data-dcnode-id="631"><strong data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Handmade and Craft Makers</span></strong></p><div class="code-block code-block-10" data-dcnode-id="621" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="622"><span data-dcnode-id="629" instrument_node="">

</span></div></div><ul data-dcnode-id="616"><li data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Responsible for producing handmade items and craft supplies</span></li><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Handles any other duty as assigned by the general manager</span></li></ul><p data-dcnode-id="613"><strong data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Call Center Agents</span></strong></p><ul data-dcnode-id="608"><li data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Ensures that all contacts with clients (e-mail, walk-In center, SMS or phone) provides the client with a personalized customer service experience of the highest level</span></li><li data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Through interaction with clients on the phone, uses every opportunity to build client’s interest in the company’s products and services</span></li></ul><ul data-dcnode-id="605"><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Consistently stays abreast of any new information on the company’s products, promotional campaigns etc. to ensure accurate and helpful information is supplied to clients when they make enquiries</span></li></ul><ul data-dcnode-id="600"><li data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Handles enquiries via e-mail, chat and phone calls for the organization</span></li><li data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Distribute mails in the organization</span></li></ul><h3 data-dcnode-id="597"><span data-dcnode-id="598" id="6_SWOT_Analysis"><span data-dcnode-id="599" instrument_node="">6. SWOT Analysis</span></span></h3><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Edna Elverson® Vintage Shop, Inc. intends to build a world class vintage and craft shop business that will make and retail jewelry, bags, clothing, home décor and furniture, toys, art, as well as craft supplies and tools. We will be based in San Diego – California, but we will not restrict the sourcing of customers to the U.S market alone, we will source for customers from other parts of the world.</span></p><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">In other to achieve this in a highly competitive industry like the ecommerce industry, we must ensure that we critically look through our strength, our weaknesses, the opportunities available in the industry and the threats that we will are likely going to face.</span></p><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Because of the nature of the business we are involved in and the brand we want to build, we were able to hire the services of an HR and Business consultant with bias in vintage products and crafts and ecommerce to help us conduct a thorough SWOT analysis and to help us create a business model that will help us achieve our business goals and objectives.</span></p><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">This is the summary of the SWOT analysis that was conducted for Edna Elverson® Vintage Shop, Inc.;</span></p><div class="code-block code-block-11" data-dcnode-id="587" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="588"></div></div><ul data-dcnode-id="583"><li data-dcnode-id="584"><strong data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Strength:</span></strong></li></ul><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Perhaps one of our strongest strengths could be attributed to the quality of employees and the wide range of jewelry, bags, clothing, home décor and furniture, toys, art, as well as craft supplies and tools we have listed on our online shop and of course our uniquely designed interactive and user – friendly website. Our chief executive officer, Mrs. Edna Elverson will be bringing her vast wealth of experience to the table and that is indeed a huge positive for Edna Elverson® Vintage Shop, Inc.</span></p><ul data-dcnode-id="577"><li data-dcnode-id="578"><strong data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Weakness:</span></strong></li></ul><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">A major weakness that may count against us is the fact that we are operating from Esty platform and there might be restriction on what we can do on the platform; we are at the beck and call of the company’s policies.</span></p><ul data-dcnode-id="571"><li data-dcnode-id="572"><strong data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Opportunities:</span></strong></li></ul><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">The fact that people with means are looking for ways to buy unique handmade products, crafts and vintage products make an online vintage and craft shop business to boom. Interestingly, celebrities and public figures will give anything to have products that will help them stand out from the crowd. We are well positioned to take advantage of this trend.</span></p><ul data-dcnode-id="565"><li data-dcnode-id="566"><strong data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Threat:</span></strong></li></ul><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Just like any other business, one of the major threats that we are likely going to face is economic downturn. It is a fact that economic downturn affects purchasing power. Another threat that may likely confront us is the presence of big players in the industry such as Amazon and eBay, and Etsy also has a number of direct competitors.</span></p><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">DaWanda, based in Germany, closed in August 2018, ezebee.com based in Switzerland, is a global competitor, but also caters to freelancers and professionals Bonanza (formerly Bonanzle and 1000 Markets.</span></p><div class="code-block code-block-12" data-dcnode-id="559" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="560"></div></div><h3 data-dcnode-id="556"><span data-dcnode-id="557" id="7_MARKET_ANALYSIS"><span data-dcnode-id="558" instrument_node="">7. MARKET ANALYSIS</span></span></h3><ul data-dcnode-id="552"><li data-dcnode-id="553"><strong data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Market Trends</span></strong></li></ul><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Online vintage and craft shop business is a niche in the ecommerce industry that is experiencing upper trajectory in recent time. Vintage and craft shop involves creation of handmade products and crafts et al. With online vintage and craft shop, customers get freedom to choose everything from jewelry, bags, clothing, home décor and furniture, toys, art, as well as craft supplies and tools.</span></p><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">For example, in September 2015, Etsy made further changes to its manufacturing policy with the launch of Etsy Manufacturing, a marketplace allowing sellers to connect with outside manufacturers to fabricate their products. Manufacturers must be reviewed and approved by Etsy to ensure they adhere to certain criteria, although Etsy will not conduct visits or in-person inspections. Sellers must apply and be approved to work with any partners listed on Etsy Manufacturing and are required to disclose their use of outside manufacturers on their pages.</span></p><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Lastly, in February 2020, Etsy announced a new “risk free” product advertising program, replacing an existing system allowing sellers to purchase ads on platforms such as Google Shopping from within Etsy. The company will automatically purchase advertising for products on “high-traffic” websites, with sales generated by these leads subject to a 15% cut of revenue from the total of the order.</span></p><h4 data-dcnode-id="542"><span data-dcnode-id="543" id="8_Our_Target_Market"><strong data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">8. Our Target Market</span></strong></span></h4><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">When it comes to selling handmade or vintage products and crafts, there is indeed a wide range of available customers. In essence, our target market can’t be restricted to just a group of people, but all those who make use of the internet and are within our shipping locations.</span></p><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">We are in business to sell our products the following groups of people;</span></p><div class="code-block code-block-13" data-dcnode-id="536" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="537"></div></div><ul data-dcnode-id="525"><li data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Celebrities and Public Figures</span></li><li data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Movie Producers</span></li><li data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Theater Performing Organizations</span></li><li data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Household</span></li><li data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Every adult that resides in our location that have access to the internet</span></li></ul><p data-dcnode-id="522"><strong data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Our Competitive Advantage</span></strong></p><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">A close study of the ecommerce industry reveals that the market has become much more intensely competitive over the last decade. As a matter of fact, you have to be highly creative, customer centric and proactive if you must survive in this industry.</span></p><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">We are aware of the stiff competition and we are prepared to compete favorably with other online vintage and craft brands both in the United States of America and other part of the world. Another competitive advantage for Edna Elverson® Vintage Shop, Inc. is the wealth of experience of its management team. The management team comprises of professionals who have worked with some of the leading international brands in the ecommerce industry.</span></p><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Our highly interactive and easy to use website, shipping network and of course our unique handmade and crafts factory also count towards our advantage especially when it comes to competing with other online vintage and craft shop brands within the same category that we operate.</span></p><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Every customized crafts and handmade products that comes out of our production line must be certified ok before they are released to the market.</span></p><div class="code-block code-block-14" data-dcnode-id="512" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="513"></div></div><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Lastly, our employees will be well taken care of, and their welfare package will be among the best within our category (startups online vintage and craft shop brands) in the industry, meaning that they will be more than willing to build the business with us and help deliver our set goals and achieve all our aims and objectives We will also give good working conditions and commissions to freelance sales agents that we will recruit from time to time.</span></p><h4 data-dcnode-id="506"><span data-dcnode-id="507" id="9_SALES_AND_MARKETING_STRATEGY"><strong data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">9. SALES AND MARKETING STRATEGY</span></strong></span></h4><ul data-dcnode-id="502"><li data-dcnode-id="503"><strong data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Sources of Income</span></strong></li></ul><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Edna Elverson® Vintage Shop, Inc. is in business to operate an Esty shop and sell our products to customers both in the United States and other countries of the world. We are in the ecommerce industry to maximize profits and we are going to go all the way out to ensure that we achieve or business goals and objectives.</span></p><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">In essence, our source of income will be the retailing of a wide range of handmade or vintage products and crafts such as jewelry, bags, clothing, home décor and furniture, toys, art, as well as craft supplies and tools.</span></p><h4 data-dcnode-id="494"><span data-dcnode-id="495" id="10_Sales_Forecast"><strong data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">10. Sales Forecast</span></strong></span></h4><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">One thing is certain, when it comes to ecommerce shops especially online vintage and craft businesses operating under Esty shop, if you intend to sell a wide range of handmade and vintage products and crafts with good shipping network, you will always attract customers cum sales and that will sure translate to increase in revenue generation for the business.</span></p><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">We are well positioned to take on the available market in and around San Diego – California and the online community and we are quite optimistic that we will meet our set target of generating enough income/profits from the first six months of operation and grow the business and our clientele base.</span></p><div class="code-block code-block-15" data-dcnode-id="488" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="489"></div></div><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">We have been able to examine the ecommerce industry, we have analyzed our chances in the industry and we have been able to come up with the following sales forecast. The sales projections are based on information gathered on the field and some assumptions that are peculiar to startups in San Diego – California.</span></p><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Below are the sales projections for Edna Elverson® Vintage Shop, Inc., it is based on the location of our business and other factors as it relates to startups operating on Esty the platform in the United States;</span></p><ul data-dcnode-id="471"><li data-dcnode-id="480"><strong data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">First Fiscal Year (FY1): </span></strong><span data-dcnode-id="481" instrument_node="">$250,000</span></li><li data-dcnode-id="476"><strong data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Second Fiscal Year (FY2): </span></strong><span data-dcnode-id="477" instrument_node="">$350,000</span></li><li data-dcnode-id="472"><strong data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Third Fiscal Year (FY3): </span></strong><span data-dcnode-id="473" instrument_node="">$550,000</span></li></ul><p data-dcnode-id="467"><strong data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">N.B</span></strong><span data-dcnode-id="468" instrument_node="">: This projection was done based on what is obtainable in the industry and with the assumption that there won’t be any major economic meltdown and there won’t be any major competitor offering same products and customer care services as we do within same location. Please note that the above projection might be lower and at the same time it might be higher.</span></p><ul data-dcnode-id="463"><li data-dcnode-id="464"><strong data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Marketing Strategy and Sales Strategy</span></strong></li></ul><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Before choosing to settle for an Esty platform for Edna Elverson® Vintage Shop, Inc., we conducted a thorough market survey and feasibility studies in order for us to be able to penetrate the available market and become the preferred choice for residents of San Diego – California.</span></p><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">We have detailed information and data that we were able to utilize to structure our business to attract the number of customers we want to attract per time.</span></p><div class="code-block code-block-16" data-dcnode-id="457" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="458"></div></div><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">We hired experts who have good understanding of the ecommerce industry to help us develop marketing strategies that will help us achieve our business goal of winning a larger percentage of the available market in the online community.</span></p><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">In summary, Edna Elverson® Vintage Shop, Inc. will adopt the following sales and marketing approach to win customers over;</span></p><ul data-dcnode-id="434"><li data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Introduce our online vintage and craft shop brand by sending introductory letters to sport clubs, churches, schools, corporate organizations, political parties, groups, and other establishments that wears streetwear and casual clothes.</span></li><li data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Attend vintage and craft expos in the U.S and in other parts of the world</span></li><li data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Organize our own vintage and crafts shows in order for us to display our products</span></li><li data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Advertise our vintage products and crafts in newspapers, TV and radio stations</span></li><li data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Leverage on online forums and social media platforms, such as blogs, micro blogs, podcasts, photo, Instagram, Tumblr, WordPress, Facebook, twitter, YouTube and video sharing sites to promote our online store.</span></li><li data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">List our business on yellow pages ads / local directories</span></li><li data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Leverage on the internet to promote our brand</span></li><li data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Engage in direct marketing</span></li><li data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Leverage on word of mouth marketing (referrals).</span></li></ul><h4 data-dcnode-id="430"><span data-dcnode-id="431" id="11_Publicity_and_Advertising_Strategy"><strong data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">11. Publicity and Advertising Strategy</span></strong></span></h4><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Publicity and advertising as it relates to the ecommerce industry involves being in touch with the organizations target market and being very creative and proactive. Beyond every reasonable doubt the media plays a very big role when it comes to helping a vintage and craft shop gain international significance.</span></p><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">The social media also plays an important role in modern day publicity and advertisement; it gives an online shop the ability to reach out to a wide range of customers in a short period of time and of course at a very cheaper price when compared to other publicity and advertising platforms.</span></p><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Any player in the ecommerce industry that wants to take on the market must be deliberate when it comes to building brand awareness and credibility. Here are the platforms we intend leveraging on to promote and advertise Edna Elverson® Vintage Shop, Inc.;</span></p><ul data-dcnode-id="409"><li data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Place adverts on both print (newspapers and crafts and vintage related magazines) and electronic (radio and TV) media platforms</span></li><li data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Sponsor relevant community programs like school arts and crafts shows et al</span></li><li data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Leverage on the internet and social media platforms like; Instagram, Tumblr, WordPress, Facebook, twitter, YouTube and other sharing sites to promote our brand</span></li><li data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Attend local and intentional fashion expos</span></li><li data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Organize our own arts and crafts show</span></li><li data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Promote our online vintage and craft shop brand on our own official websites and online fashion community</span></li><li data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Build relationship with celebrities especially in the entertainment industry and sports to endorse of online vintage and craft shop brand.</span></li></ul><h4 data-dcnode-id="403"><span data-dcnode-id="404" id="12_Our_Pricing_Strategy"><strong data-dcnode-id="405"><span data-dcnode-id="408" instrument_node="">12. Our </span><a class="wpil_keyword_link" data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/factors-product-pricing-strategy/" rel="noopener noreferrer" target="_blank" title="Pricing Strategy"><span data-dcnode-id="407" instrument_node="">Pricing Strategy</span></a></strong></span></h4><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Edna Elverson® Vintage Shop, Inc. will make sure that we focus on retailing handmade or vintage items and craft supplies from our Esty shop. These items fall under a wide range of categories, including jewelry, bags, clothing, home décor and furniture, toys, art, as well as craft supplies and tools.</span></p><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">All our vintage items are at least 20 years old. We will make sure that the prices of our products are affordable and at the same time competitive with what is obtainable in the ecommerce industry.</span></p><ul data-dcnode-id="395"><li data-dcnode-id="396"><strong data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Payment Options</span></strong></li></ul><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">The payment policy adopted by Edna Elverson® Vintage Shop, Inc. is all inclusive because we are quite aware that different customers prefer different payment options as it suits them but at the same time, we will ensure that we abide by the financial rules and regulation of the United States of America.</span></p><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Here are the payment options that Edna Elverson® Vintage Shop, Inc. will make available to her clients;</span></p><ul data-dcnode-id="380"><li data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Payment with cash</span></li><li data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Payment via credit cards</span></li><li data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Payment via online bank transfer</span></li><li data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Payment via mobile money transfer</span></li><li data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Payment via bank draft</span></li></ul><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">In view of the above, we have chosen banking platforms that will enable our clients make payment for our products without any stress on their part. Our bank account numbers will be made available on our website and promotional materials.</span></p><h3 data-dcnode-id="374"><span data-dcnode-id="375" id="13_Startup_Expenditure_Budget"><strong data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">13. Startup Expenditure (Budget)</span></strong></span></h3><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">From our market survey and feasibility studies, we have been able to come up with a detailed budget for achieving our aim of establishing a standard Esty shop with a craft factory. Here are the key areas where we will spend our startup capital;</span></p><ul data-dcnode-id="302"><li data-dcnode-id="367"><span data-dcnode-id="371" instrument_node="">The total fee for registering the business in the United States of America – </span><strong data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">$750</span></strong><span data-dcnode-id="368" instrument_node="">.</span></li><li data-dcnode-id="362"><span data-dcnode-id="366" instrument_node="">Legal expenses for obtaining licenses and permits as well as the accounting services (software, P.O.S machines, custom apparel design software and other software) – </span><strong data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">$3,300</span></strong><span data-dcnode-id="363" instrument_node="">.</span></li><li data-dcnode-id="357"><span data-dcnode-id="361" instrument_node="">Marketing promotion expenses for the grand opening of Edna Elverson® Vintage Shop, Inc. in the amount of $3,500 and as well as flyer printing (2,000 flyers at $0.04 per copy) for the total amount of </span><strong data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">$3,580</span></strong><span data-dcnode-id="358" instrument_node="">.</span></li><li data-dcnode-id="353"><span data-dcnode-id="356" instrument_node="">The total cost for hiring business consultant – </span><strong data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">$2,500.</span></strong></li><li data-dcnode-id="348"><span data-dcnode-id="352" instrument_node="">The total cost for the purchase of insurance (general liability, workers’ compensation and property casualty) coverage at a total premium – </span><strong data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">$2,400</span></strong><span data-dcnode-id="349" instrument_node="">.</span></li><li data-dcnode-id="344"><span data-dcnode-id="347" instrument_node="">The cost for payment of lease for craft workshop (factory) for 24 months –</span><strong data-dcnode-id="345"><span data-dcnode-id="346" instrument_node=""> $350,000</span></strong></li><li data-dcnode-id="340"><span data-dcnode-id="343" instrument_node="">Factory remodeling (construction of racks and shelves) – </span><strong data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">$20,000</span></strong></li><li data-dcnode-id="336"><span data-dcnode-id="339" instrument_node="">The amount required for the purchase of machines and handmade products making tools – </span><strong data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">$200,000</span></strong></li><li data-dcnode-id="331"><span data-dcnode-id="335" instrument_node="">Other start-up expenses including stationery ($500) and phone and utility deposits </span><strong data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">($2,500)</span></strong><span data-dcnode-id="332" instrument_node="">.</span></li><li data-dcnode-id="327"><span data-dcnode-id="330" instrument_node="">Operational cost for the first 3 months (salaries of employees, payments of bills et al) – </span><strong data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">$250,000</span></strong></li><li data-dcnode-id="323"><span data-dcnode-id="326" instrument_node="">The cost for start-up inventory (stocking with a wide range of raw materials, accessories and other related merchandize) – </span><strong data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">$100,000</span></strong></li><li data-dcnode-id="319"><span data-dcnode-id="322" instrument_node="">The cost for store equipment (cash register, security, ventilation, signage) – </span><strong data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">$13,750</span></strong></li><li data-dcnode-id="315"><span data-dcnode-id="318" instrument_node="">The cost of purchase and installation of CCTVs – </span><strong data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">$5,000</span></strong></li><li data-dcnode-id="311"><span data-dcnode-id="314" instrument_node="">The cost for the purchase of furniture and gadgets (Computers, Printers, Telephone, TVs, Sound System, tables and chairs et al) – </span><strong data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">$4,000.</span></strong></li><li data-dcnode-id="307"><span data-dcnode-id="310" instrument_node="">The cost of launching a website – </span><strong data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">$600</span></strong></li><li data-dcnode-id="303"><span data-dcnode-id="306" instrument_node="">Miscellaneous (payment of each listing that is posted in the shop costs $0.20.) – </span><strong data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">$5,000</span></strong></li></ul><p data-dcnode-id="297"><span data-dcnode-id="301" instrument_node="">We need an estimate of three hundred and fifty thousand dollars (</span><strong data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">$350,000</span></strong><span data-dcnode-id="298" instrument_node="">) to successfully set up our online vintage and craft shop in San Diego – California. Please note that this amount includes the salaries of all the staff for the first month of operation.</span></p><p data-dcnode-id="294"><strong data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Generating Funds/Startup Capital for Edna Elverson® Vintage Shop, Inc.</span></strong></p><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Edna Elverson® Vintage Shop, Inc. is solely owned and financed by Edna Elverson and her immediate family members. They do not intend to welcome any external business partners which is why she has decided to restrict the sourcing of the startup capital to 3 major sources.</span></p><p data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">These are the areas we intend generating our startup capital;</span></p><ul data-dcnode-id="283"><li data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Generate part of the startup capital from personal savings</span></li><li data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Source for soft loans from family members and friends</span></li><li data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Apply for loan from the bank</span></li></ul><p data-dcnode-id="278"><strong data-dcnode-id="280"><em data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">N.B:</span></em></strong><span data-dcnode-id="279" instrument_node=""> We have been able to generate about $100,000 (Personal savings $80,000 and soft loan from family members $20,000) and we are at the final stages of obtaining a loan facility of $250,000 from our bank. All the papers and documents have been signed and submitted, the loan has been approved and any moment from now our account will be credited with the amount.</span></p><h3 data-dcnode-id="274"><span data-dcnode-id="275" id="14_Sustainability_and_Expansion_Strategy"><strong data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">14. Sustainability and Expansion Strategy</span></strong></span></h3><p data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">The future of a business lies in the number of loyal customers that they have, the capacity and competence of thir employees, their investment strategy and the business structure. If all these factors are missing from a business (company), then it won’t be too long before the business close shop.</span></p><p data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">One of our major goals of starting Edna Elverson® Vintage Shop, Inc. is to build a business that will survive off its own cash flow without injecting finance from external sources once the business is officially running.</span></p><p data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">We know that one of the ways of gaining approval and winning customers over is to retail our vintage products, handmade products and crafts a little bit cheaper than what is obtainable in the market and we are well prepared to survive on lower profit margin for a while.</span></p><p data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Edna Elverson® Vintage Shop, Inc. will make sure that the right foundation, structures and processes are put in place to ensure that our staff welfare are well taken of. Our company’s corporate culture is designed to drive our business to greater heights and training and retraining of our workforce is at the top burner.</span></p><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">We know that if that is put in place, we will be able to successfully hire and retain the best hands we can get in the industry; they will be more committed to help us build the business of our dreams.</span></p><p data-dcnode-id="261"><strong data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">Check List/Milestone</span></strong></p><ul data-dcnode-id="156"><li data-dcnode-id="257"><span data-dcnode-id="260" instrument_node="">Business Name Availability Check:</span><strong data-dcnode-id="258"><span data-dcnode-id="259" instrument_node=""> Completed</span></strong></li><li data-dcnode-id="253"><span data-dcnode-id="256" instrument_node="">Business Registration: </span><strong data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Completed</span></strong></li><li data-dcnode-id="249"><span data-dcnode-id="252" instrument_node="">Creating a Shop in Esty Platform: </span><strong data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Completed</span></strong></li><li data-dcnode-id="245"><span data-dcnode-id="248" instrument_node="">Opening of Corporate Bank Accounts: </span><strong data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Completed</span></strong></li><li data-dcnode-id="241"><span data-dcnode-id="244" instrument_node="">Securing Point of Sales (POS) Machines: </span><strong data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">Completed</span></strong></li><li data-dcnode-id="237"><span data-dcnode-id="240" instrument_node="">Opening Mobile Money Accounts: </span><strong data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Completed</span></strong></li><li data-dcnode-id="233"><span data-dcnode-id="236" instrument_node="">Opening Online Payment Platforms: </span><strong data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Completed</span></strong></li><li data-dcnode-id="229"><span data-dcnode-id="232" instrument_node="">Application and Obtaining Tax Payer’s ID: </span><strong data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="225"><span data-dcnode-id="228" instrument_node="">Application for business license and permit:</span><strong data-dcnode-id="226"><span data-dcnode-id="227" instrument_node=""> Completed</span></strong></li><li data-dcnode-id="221"><span data-dcnode-id="224" instrument_node="">Purchase of Insurance for the Business: </span><strong data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Completed</span></strong></li><li data-dcnode-id="217"><span data-dcnode-id="220" instrument_node="">Leasing of facility and remodeling the production facility:</span><strong data-dcnode-id="218"><span data-dcnode-id="219" instrument_node=""> In Progress</span></strong></li><li data-dcnode-id="213"><span data-dcnode-id="216" instrument_node="">Conducting Feasibility Studies:</span><strong data-dcnode-id="214"><span data-dcnode-id="215" instrument_node=""> Completed</span></strong></li><li data-dcnode-id="209"><span data-dcnode-id="212" instrument_node="">Generating capital from family members: </span><strong data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">Completed</span></strong></li><li data-dcnode-id="205"><span data-dcnode-id="208" instrument_node="">Applications for Loan from the bank:</span><strong data-dcnode-id="206"><span data-dcnode-id="207" instrument_node=""> In Progress</span></strong></li><li data-dcnode-id="201"><span data-dcnode-id="204" instrument_node="">Writing of Business Plan: </span><strong data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Completed</span></strong></li><li data-dcnode-id="197"><span data-dcnode-id="200" instrument_node="">Drafting of Employee’s Handbook: </span><strong data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">Completed</span></strong></li><li data-dcnode-id="193"><span data-dcnode-id="196" instrument_node="">Drafting of Contract Documents and other relevant Legal Documents: </span><strong data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="189"><span data-dcnode-id="192" instrument_node="">Design of The Company’s Logo:</span><strong data-dcnode-id="190"><span data-dcnode-id="191" instrument_node=""> Completed</span></strong></li><li data-dcnode-id="185"><span data-dcnode-id="188" instrument_node="">Printing of Packaging Marketing/Promotional Materials:</span><strong data-dcnode-id="186"><span data-dcnode-id="187" instrument_node=""> In Progress</span></strong></li><li data-dcnode-id="181"><span data-dcnode-id="184" instrument_node="">Recruitment of employees: </span><strong data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="177"><span data-dcnode-id="180" instrument_node="">Purchase of industrial sewing machines and sewing equipment/tools: </span><strong data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="173"><span data-dcnode-id="176" instrument_node="">Purchase of the needed furniture, racks, shelves, computers, electronic appliances, office appliances and CCTV: </span><strong data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">In progress</span></strong></li><li data-dcnode-id="169"><span data-dcnode-id="172" instrument_node="">Creating Official Website for the Company: </span><strong data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="165"><span data-dcnode-id="168" instrument_node="">Creating Awareness for the business both online and around the community: </span><strong data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="161"><span data-dcnode-id="164" instrument_node="">Health and Safety and Fire Safety Arrangement (License): </span><strong data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">Secured</span></strong></li><li data-dcnode-id="157"><span data-dcnode-id="160" instrument_node="">Establishing business relationship with vendors – suppliers of crafts making materials, accessories and related merchandize (vintage items) and other key stake holders: </span><strong data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">In Progress</span></strong></li></ul></div></div><footer class="entry-meta" data-dcn
