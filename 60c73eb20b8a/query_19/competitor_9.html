ofitableventure.com/career/" title="Career"><span data-dcnode-id="910" instrument_node="">Career</span></a></li></ul></div></div></div></nav><div class="main-content" data-dcnode-id="67" id="main-content-area"><div class="container" data-dcnode-id="68" id="main-content-container"><div class="row" data-dcnode-id="69" id="main-content-row"><p data-dcnode-id="885" id="breadcrumbs"><span data-dcnode-id="886"><span data-dcnode-id="887"><a data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/"><span data-dcnode-id="902" instrument_node="">Home</span></a><span data-dcnode-id="900" instrument_node=""> » </span><span data-dcnode-id="888"><a data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/ideas/"><span data-dcnode-id="899" instrument_node="">Business ideas</span></a><span data-dcnode-id="897" instrument_node=""> » </span><span data-dcnode-id="889"><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/ideas/food/"><span data-dcnode-id="896" instrument_node="">Food Industry</span></a><span data-dcnode-id="894" instrument_node=""> » </span><span data-dcnode-id="890"><a data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/ideas/food/wine/"><span data-dcnode-id="893" instrument_node="">Wine Business ideas</span></a><span data-dcnode-id="891" instrument_node=""> » </span></span></span></span></span></span></p><div class="main-content col-md-8 col-lg-8" data-dcnode-id="125"><article class="post-46699 post type-post status-publish format-standard hentry category-wine" data-dcnode-id="129" id="post-46699"><header class="page-header" data-dcnode-id="882"><h1 class="page-title entry-title" data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">How to Write a Wine Tasting Business Plan [Sample Template]</span></h1></header><div class="entry-content-main" data-dcnode-id="131"><div class="entry-content" data-dcnode-id="132"><p data-dcnode-id="878"><strong data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Do you want to start a wine tasting company and need to write a plan? If YES, here is a sample wine tasting business plan template &amp; FREE feasibility report. </span></strong><span data-dcnode-id="879" instrument_node="">A wine tasting business offers clients a comfortable environment to sample new flavors whilst meeting like minds. People with a variety of wine expertise are always on the lookout for new flavors, and they will return always to a place that offers informative and entertaining events.</span></p><p data-dcnode-id="873"><span data-dcnode-id="877" instrument_node="">The first thing you need to </span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ideaflight.com/start-wine-tasting-business/"><span data-dcnode-id="876" instrument_node="">start a wine tasting business</span></a><span data-dcnode-id="874" instrument_node="">, aside excellent interest in wine, is the wine itself. Note that a wine tasting host can offer two types of tasting. Varietal tasting represents samples of the same grape variety but from different areas.</span></p><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">This type of tasting helps teach wine tasters about each region’s distinctive character. Secondly, horizontal tasting which represents wines from a single category. Tasting the wines side by side gives guests an opportunity to experience the differences.</span></p><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">As part of the entertainment of the wine tasting business, ratings and reactions are recorded for the various categories on a scorecard. These scorecards help wine tasters keep track of the various wines they’ve tasted.</span></p><h2 data-dcnode-id="866"><strong data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">A Sample Wine Tasting Business Plan Template</span></strong></h2><div class="toc_white no_bullets contracted" data-dcnode-id="810" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="858"><span data-dcnode-id="865" instrument_node="">Table of Content</span><span data-dcnode-id="864" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="859"><span data-dcnode-id="863" instrument_node="">[</span><a data-dcnode-id="861" href="#"><span data-dcnode-id="862" instrument_node="">show</span></a><span data-dcnode-id="860" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="811" style="display: none;"><ul data-dcnode-id="854"><li data-dcnode-id="855"><a data-dcnode-id="856" href="#1_Industry_Overview"><span data-dcnode-id="857" instrument_node="">1. Industry Overview</span></a></li></ul><li data-dcnode-id="844"><a data-dcnode-id="852" href="#2_Executive_Summary"><span data-dcnode-id="853" instrument_node="">2. Executive Summary</span></a><ul data-dcnode-id="845"><li data-dcnode-id="849"><a data-dcnode-id="850" href="#3_Our_Products_and_Services"><span data-dcnode-id="851" instrument_node="">3. Our Products and Services</span></a></li><li data-dcnode-id="846"><a data-dcnode-id="847" href="#4_Our_Mission_and_Vision_Statement"><span data-dcnode-id="848" instrument_node="">4. Our Mission and Vision Statement</span></a></li></ul></li><li data-dcnode-id="841"><a data-dcnode-id="842" href="#5_Job_Roles_and_Responsibilities"><span data-dcnode-id="843" instrument_node="">5. Job Roles and Responsibilities</span></a></li><li data-dcnode-id="838"><a data-dcnode-id="839" href="#6_SWOT_Analysis"><span data-dcnode-id="840" instrument_node="">6. SWOT Analysis</span></a></li><li data-dcnode-id="819"><a data-dcnode-id="836" href="#7_MARKET_ANALYSIS"><span data-dcnode-id="837" instrument_node="">7. MARKET ANALYSIS</span></a><ul data-dcnode-id="820"><li data-dcnode-id="833"><a data-dcnode-id="834" href="#8_Our_Target_Market"><span data-dcnode-id="835" instrument_node="">8. Our Target Market</span></a></li><li data-dcnode-id="830"><a data-dcnode-id="831" href="#9_SALES_AND_MARKETING_STRATEGY"><span data-dcnode-id="832" instrument_node="">9. SALES AND MARKETING STRATEGY</span></a></li><li data-dcnode-id="827"><a data-dcnode-id="828" href="#10_Sales_Forecast"><span data-dcnode-id="829" instrument_node="">10. Sales Forecast</span></a></li><li data-dcnode-id="824"><a data-dcnode-id="825" href="#11_Publicity_and_Advertising_Strategy"><span data-dcnode-id="826" instrument_node="">11. Publicity and Advertising Strategy</span></a></li><li data-dcnode-id="821"><a data-dcnode-id="822" href="#12_Our_Pricing_Strategy"><span data-dcnode-id="823" instrument_node="">12. Our Pricing Strategy </span></a></li></ul></li><li data-dcnode-id="812"><a data-dcnode-id="817" href="#13_Startup_Expenditure_Budget"><span data-dcnode-id="818" instrument_node="">13. Startup Expenditure (Budget)</span></a><ul data-dcnode-id="813"><li data-dcnode-id="814"><a data-dcnode-id="815" href="#14_Sustainability_and_Expansion_Strategy"><span data-dcnode-id="816" instrument_node="">14. Sustainability and Expansion Strategy</span></a></li></ul></li></ul></div><h4 data-dcnode-id="806"><span data-dcnode-id="807" id="1_Industry_Overview"><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">1. Industry Overview</span></strong></span></h4><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">According to industry reports, the total U.S. wine market grew to more than $70 billion in total value and 408 million cases in total volume in 2018. Although sales growth, particularly in volume, has slowed as the total market has doubled since 2003, consumers are buying wine at higher price points.</span></p><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Suppliers have not been able to raise prices, however, and are also having to react to changes in how consumers buy wine. Americans remain willing to spend more on wine as the market’s total value increased by 5% over the previous year, while volume increased by just 1%.</span></p><div class="code-block code-block-1" data-dcnode-id="792" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="793"><span data-dcnode-id="800" instrument_node="">
</span><span data-dcnode-id="798" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2552847123501338" data-ad-format="auto" data-ad-slot="4731700007" data-dcnode-id="797" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="796" instrument_node="">
</span></div></div><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Experts suggest a series of reasons for the decrease in volume growth: 1) the aging Boomer generation who are taking less wine attributed to health reasons; 2) Millennial not adopting wine as much as had been predicted; 3) the rise of new substitute products, such as cider, cannabis, and creative entrants from craft beer and spirits; and 4) a growing focus on healthy food and less alcohol.</span></p><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Even with these obvious challenges, the US maintains the largest wine consuming country in the world, and therefore is a target for many foreign wine producers.</span></p><p data-dcnode-id="783"><span data-dcnode-id="787" instrument_node="">Notably, 26% of the wine volume sold in the US last year was imported, with Italy in the lead for overall sales, followed by </span><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/business-ideas-in-australia/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="786" instrument_node="">Australia</span></a><span data-dcnode-id="784" instrument_node="">, New Zealand, France, and Argentina. US wine exports fell slightly in 2018 to $1.47 billion, down 5% in value from the previous year. Case volume was also slightly down to 41.7 million cases, a 1.2% decrease.</span></p><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Part of this had to do with higher tariffs in China. The top export markets for US wine continue to be the European Union, including the uk, followed by Canada, Hong Kong, and Japan. Howbeit, the most popular wine varietals/styles in the US market based on volume continue to be:</span></p><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">1) Chardonnay, 2) Cabernet Sauvignon, 3) Red Blends, 4) Pinot Grigio, and 5) Pinot Noir. While this year, cabernet sauvignon ($2.595 billion) has just advanced past chardonnay ($2.549 billion) in dollar value. It is projected that cabernet sauvignon will be the number one varietal in volume as well in the next year or so.</span></p><div class="code-block code-block-2" data-dcnode-id="769" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="770"><span data-dcnode-id="777" instrument_node="">
</span><span data-dcnode-id="775" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2552847123501338" data-ad-format="auto" data-ad-slot="6182319196" data-dcnode-id="774" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="773" instrument_node="">
</span></div></div><h3 data-dcnode-id="766"><span data-dcnode-id="767" id="2_Executive_Summary"><span data-dcnode-id="768" instrument_node="">2. Executive Summary</span></span></h3><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">We at Vine Base® Tasting Services Inc. are seeking finance to open a unique and upscale group of wine tasting bar style dining and gaming establishments. The amount of funding we need is $170,000, and will be used to finance the lease, build-out, initial inventory and launch of the first proposed venue, which will be launched in spring/summer 2022.</span></p><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">At Vine Base® Tasting Services Inc., we are thoroughly equipped with the expertise to quickly develop this group of refined wine tasting and gaming venues, Jason and Natasha Brown expect the store development program to occur at a sufficiently brisk pace to build Vine Base® Tasting Services Inc. as a key player in the Las Vegas wine tasting/gaming industry before the market becomes more saturated, which current dining, drinking, and gambling preferences and trends indicate will soon happen.</span></p><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">All our start-up costs at Vine Base® Tasting Services Inc. are accurately calculated based on similar build-outs Jason and Natasha Brown have started in the wine consultancy industry.</span></p><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">The published data of other retail wine related businesses in the area shows that profitability can be attained within 2-3 months of “going live” with onsite video gaming terminals. A complete (100%) return of investor funds will likely occur in less than 24 months of first venue opening, based on investor participation in net location (gaming and retail) revenues at a one-third rate.</span></p><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Competitor gaming revenues are strong and growing and warrant the conclusion that $10,000 in net monthly revenue from the gaming side can comfortably be expected as a minimum, and that net monthly gaming revenue exceeding $40,000 is also attainable.</span></p><div class="code-block code-block-3" data-dcnode-id="746" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="747"><span data-dcnode-id="754" instrument_node="">
</span><span data-dcnode-id="752" instrument_node="">

</span></div></div><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">A significant part of these net gaming revenues will be allocated to the monthly return of investor capital, depending on the company’s ability to maintain required operating balances. When attainable, disbursements of net store retail and gaming revenues will be disbursed two-thirds to the founders/principals and one-third to the investor(s).</span></p><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">At Vine Base® Tasting Services Inc., our estimate entails that the monthly sales will increase from $20,800 in month 1 to$37,000 in month 12. Our operating profit will increase from $5,400 in month 1 to $8,720 in Month 12; while net profit will increase from loss of $1,027 in month 1 to profit of $3,650 in Month 12.</span></p><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">We expect to increase sales from $84,000 in year 1 to $967,600 in year 3; while operating profit will increase from $64,000 in year 1 to $231,000 in year 3. Net profit will improve from $34,000 in year 1 to $196,000 in year 3.</span></p><p data-dcnode-id="735"><span data-dcnode-id="739" instrument_node="">We hope to achieve positive operating cash flow from the first month 1; while achieving positive net cash flow by month 6. Our operating cash flow will increase from $650 in 1</span><sup data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">st</span></sup><span data-dcnode-id="736" instrument_node=""> month to $5,499 in month 12. The first year operating cash flow will be $23,000 increasing to $175,200 in year 3.</span></p><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">We at Vine Base® Tasting Services Inc. is requesting $170,000 in loan amount to be repaid over 2 years (max). We will also contribute $50,000 in equity bringing the total funding from all sources to $220,000. We intend to use $80,000 from these funds towards capital expenditure in year 1 and $30,000 for start-up inventory. The remaining amount of $110,000 will be used for working capital.</span></p><div class="code-block code-block-7" data-dcnode-id="723" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="724"><span data-dcnode-id="731" instrument_node="">

</span></div></div><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">We also plan to repay the entire $170,000 in debt over 2 years. From our detailed plan and cash forecast, we believe Vine Base® Tasting Services Inc. will have sufficient cash flow after taking care of operating expenses to service the debt. Assuming 10% fixed interest rate the total interest payment will be $17,549 over 2 years.</span></p><h4 data-dcnode-id="717"><span data-dcnode-id="718" id="3_Our_Products_and_Services"><strong data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">3. Our Products and Services</span></strong></span></h4><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Our aim at Vine Base® Tasting Services Inc. is to create the feel of a winery coupled with all the offerings typically available in such venues, but in a suburban setting with video slot and poker machines. Every of our store will offer a nice selection of wines and a limited offering of craft and bottled beers, accompanied by cheeses and other simple but quality food offerings that align well with wine and gaming. Liquor will not be offered.</span></p><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Our wines will be offered at $10 to $15 per glass and $35 to $90 per bottle. Food items will average $10 per plate. Average per-person sale is expected to be $40.</span></p><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">To leverage the benefits of this highly popular and traffic-getting entertainment feature, Vine Base® Tasting Services Inc. will offer video gaming in a unique and distinguished way—in an upscale wine-bar serene unlike other common gaming venues.</span></p><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Our customers can enjoy gaming in style and comfort along with a great selection of quality food and wine beverage. We plan to ensure that the gaming and quality consumables will complement each other, take advantage of higher-end dining and drinking trends, and combine to drive sales success.</span></p><div class="code-block code-block-8" data-dcnode-id="699" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="700"><span data-dcnode-id="707" instrument_node="">

</span></div></div><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Video poker and slots are added to complement the traditional wine-bar experience, making it more dynamic, and appealing enough of attract a broader mix of customers. For a maximum wager per hand of $2, customers can win up to $500 per hand. We believe that the right atmosphere and the excitement of video gaming will improve the customer experience, enticing them to visit the venue regularly, stay longer, and share the experience with friends.</span></p><h4 data-dcnode-id="693"><span data-dcnode-id="694" id="4_Our_Mission_and_Vision_Statement"><strong data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">4. Our Mission and Vision Statement</span></strong></span></h4><ul data-dcnode-id="684"><li data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Our vision at Vine Base® Tasting Services Inc. is to become the topmost meeting spot in Las Vegas where wine and game lovers come together to learn, enjoy and have fun over a nice glass of good wine.</span></li><li data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">We want to be the place that comes to people’s mind when they are thinking of relaxing with friends while enjoying wine and other quality food offerings.</span></li><li data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">The effective combination of video-gaming entertainment and a quality wine-tasting bar-style dining experience is not only creative, but explicitly takes advantage of two key consumer trends, which the owners believe will position Vine Base® Tasting Services Inc. as a necessary, well-liked, and welcome dining and entertainment addition.</span></li><li data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Our core mission is to deliver, through this combination, a brilliant consumer experience that yields significant positive “chatter,” reliable repeat business, quality community impact, higher profits, and strong growth.</span></li></ul><p data-dcnode-id="681"><strong data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Our Business Structure</span></strong></p><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Different experts will work in combination (through a partnership or joint venture agreement) to run Vine Base® Tasting Services Inc. Each entity will operate one retail store (running the wine tasting bar) and a second entity will function as the VGT Operator, which obtains, installs and maintains the gaming machines and generally operates the gaming side for all locations.</span></p><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Each entity will secure separate gaming-related licenses from the State Gaming Board Both entities work together, though providing separate functions, to maximize revenue to Vine Base® Tasting Services Inc. Entity names under consideration are “Cellar Wines, LLC” for the establishment entity(s), and “Novel Gaming Systems” for the VGT operating entity. The wine bar retail entity will be owned and operated by Natasha Brown.</span></p><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">The wine bar’s non-gaming net revenues, and its 35 percent share of Net Terminal Income (gaming revenues), will be distributed one-third to Natasha Brown, one-third to Jason Brown, and one-third to capital sources (investor(s)/lender(s)) under a management/revenue-sharing/partnership agreement.</span></p><div class="code-block code-block-9" data-dcnode-id="665" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="666"><span data-dcnode-id="673" instrument_node="">

</span></div></div><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">The gaming operator entity will be owned and operated by Jason Brown, due to his general business management experience and technical expertise. The operator’s 35 percent share of Net Terminal Income (gaming revenues) will be distributed one-third to Jason Brown, one-third to Natasha Brown, and one-third to capital sources (investor(s)/lender(s)) under a management/revenue sharing/partnership agreement.</span></p><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Investor(s) and lenders are not expected to hold an equity position, voting authority, or specific managerial roles in either of the operating entities. Governance and managerial decision making concerning each entity will be vested in the respective owners of each entity (Jason and Natasha).</span></p><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Any decision-making or voting authority granted to a financier will be provided for contractually in the management/revenue-sharing/partnership agreement. We are currently in the process of hiring a couple of key employees, including full-time manager who will be on board prior to the launch of our business. These roles include:</span></p><ul data-dcnode-id="646"><li data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Vine Base® Tasting Services Inc. Manager</span></li><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Business Development Manager</span></li><li data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Key Account Specialist</span></li><li data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Store manager</span></li><li data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Tasting Room Representative</span></li><li data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Cleaner</span></li></ul><h3 data-dcnode-id="642"><span data-dcnode-id="643" id="5_Job_Roles_and_Responsibilities"><strong data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">5. Job Roles and Responsibilities</span></strong></span></h3><p data-dcnode-id="639"><strong data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Vine Base® Tasting Services Inc. Manager </span></strong></p><ul data-dcnode-id="626"><li data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Increases management’s effectiveness by recruiting, selecting, orienting, training, coaching, counselling, and disciplining managers; communicating values, strategies, and objectives; assigning accountabilities; planning, monitoring, and appraising job results; developing incentives</span></li><li data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Creating, communicating, and implementing Vine Base® Tasting Services Inc.’s vision, mission, and overall direction – i.e. leading the development and implementation of the overall Vine Base® Tasting Services Inc.’s strategy.</span></li><li data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Tasked with fixing prices and signing business deals</span></li><li data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Tasked with providing direction for the business</span></li><li data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Tasked with signing checks and documents on behalf of Vine Base® Tasting Services Inc.</span></li><li data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Evaluates the success of Vine Base® Tasting Services Inc.</span></li></ul><p data-dcnode-id="623"><strong data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Business Development Manager</span></strong></p><div class="code-block code-block-10" data-dcnode-id="613" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="614"><span data-dcnode-id="621" instrument_node="">

</span></div></div><ul data-dcnode-id="590"><li data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Embraces innovation and demonstrates entrepreneurial mind set</span></li><li data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Assists sales specialists and cross functional partners with identification and activation of consumer engagement initiatives and event execution.</span></li><li data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Supports commercialization of digital marketing programs and leverages digital assets.</span></li><li data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Leverages technology (e.g., Account 360) and digital assets to monitor performance, identify opportunities, direct the action of distributor personnel, make decisions, conduct exception reporting, etc.</span></li><li data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Coordinates activities with other winery support areas within the market (e.g., Customer Development, Shopper Marketing, and Business Intelligence Managers).</span></li><li data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Strategically focuses time on the biggest opportunities to maximize sales and grow Gallo brands</span></li><li data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Recognizes changes in Winery direction and market dynamics and shifts time and resources accordingly</span></li><li data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Coordinates launches of new items.</span></li><li data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Manages POS ordering for assigned channel and/or geography</span></li><li data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Engages in consumer-facing events, including ability to work with fine wine retail accounts to sell luxury offerings and lead luxury events.</span></li><li data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Acts as a Vine Base Ambassador, advocating for our brands, including hosting events, leveraging social media and other tools to promote for Vine Base® Tasting Services Inc. sales within his/her community.</span></li></ul><p data-dcnode-id="587"><strong data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Key Account Specialist</span></strong></p><ul data-dcnode-id="572"><li data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Promote and demonstrate wine knowledge within a set geographic region to increase sales among high profile customers, restaurants and retail accounts.</span></li><li data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Make regular sales calls to designated accounts to cultivate customer relations and satisfaction with service provided.</span></li><li data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Partner with multiple sales divisions in the accounts to increase wine sales and act as a liaison with customers regarding selections and placements.</span></li><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Demonstrate consultative sales abilities through successful presentations of product, the promotion of new and existing portfolio items and the expansion of business.</span></li><li data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Exhibit discipline and resourcefulness to meet/exceed assigned monthly placement objectives.</span></li><li data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Participate in sales meetings and on-site training to remain educated in company policy and industry trends/developments.</span></li><li data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Create, coordinate, and attend on-site promotional functions at established customer accounts. (I.e. product launches, and tastings).</span></li></ul><p data-dcnode-id="569"><strong data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Store manager </span></strong></p><ul data-dcnode-id="550"><li data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Maintains receiving, warehousing, and distribution operations by initiating, coordinating, and enforcing program, operational, and personnel policies and procedures.</span></li><li data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Complies with federal, state, and local warehousing, material handling, and shipping requirements by studying existing and new legislation; enforcing adherence to requirements; advising management on needed actions.</span></li><li data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Safeguards store operations and contents by establishing and monitoring security procedures and protocols.</span></li><li data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Controls inventory levels by conducting physical counts; reconciling with data storage system.</span></li><li data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Maintains physical condition of store by planning and implementing new design layouts; inspecting equipment; issuing work orders for repair and requisitions for replacement.</span></li><li data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Achieves financial objectives by preparing an annual budget; scheduling expenditures; analysing variances; initiating corrective actions.</span></li><li data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Maintains store staff by recruiting, selecting, orienting, and training employees.</span></li><li data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Maintains store staff job results by coaching, counselling, and disciplining employees; planning, monitoring, and appraising job results.</span></li><li data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Maintains professional and technical knowledge by attending educational workshops; reviewing professional publications; establishing personal networks; participating in professional societies.</span></li></ul><p data-dcnode-id="547"><strong data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Tasting Room Representative</span></strong></p><ul data-dcnode-id="528"><li data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Prepares the tasting room for daily opening and closing.</span></li><li data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Promotes the sale of wine and non-wine products sold in the bar section; acts as informed resource for consumers regarding winemaking, winegrowing, and wine vintages</span></li><li data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Describes wines, winemaking techniques, and winery history; answers visitor’s questions about wines.</span></li><li data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Provides general tourist information.</span></li><li data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Handles routine purchasing transactions (includes operating cash register and accounting of daily sales).</span></li><li data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Supports display and stocking of retail items and wines; and hospitality special events; participates in inventories.</span></li><li data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Understands and effectively communicates the Brand message.</span></li><li data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Processes phone orders and wine shipping orders in compliance with federal and state regulations.</span></li><li data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Checks identification as required by state regulation for serving alcoholic beverages.</span></li></ul><p data-dcnode-id="525"><strong data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Cleaner </span></strong></p><ul data-dcnode-id="516"><li data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Tasked with cleaning Vine Base® Tasting Services Inc. floors at all times</span></li><li data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Makes sure that toiletries and supplies don’t run out of stock</span></li><li data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Cleans both the interior and exterior of Vine Base® Tasting Services Inc.</span></li><li data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Any other duty as assigned by the operator.</span></li></ul><h3 data-dcnode-id="513"><span data-dcnode-id="514" id="6_SWOT_Analysis"><span data-dcnode-id="515" instrument_node="">6. SWOT Analysis</span></span></h3><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Our goal is to provide a unique experience for our customers by creating a wine-tasting bar atmosphere, featuring a wide variety of wine selection. By offering a comfortable, high-quality and upscale gaming area, customers are enticed to stay a while longer (and buy a little more).</span></p><div class="code-block code-block-11" data-dcnode-id="509" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="510"></div></div><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">The décor, wine selection, food offerings and superior gaming experience will make each venue an appealing “destination” capable of generating fun, loyal customers, and repeat traffic. Since wine and gaming are both very popular pastimes today, we be the two can be rightly align into a perfect match.</span></p><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">With our led out plans and hunger to take the industry by storm, we have put plans in place and assessed our SWOT Analysis. Clearly summarized below is the result of our SWOT Analysis;</span></p><p data-dcnode-id="502"><strong data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Strengths</span></strong></p><ul data-dcnode-id="493"><li data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Unique concept that brings complementary businesses of wine and gaming together</span></li><li data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Good relationship with suppliers – Revenue and cost sharing reduces working capital needs.</span></li><li data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Community connections with wineries and game lovers.</span></li><li data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Knowledgeable staff that loves wine and is able to help with customers questions</span></li></ul><p data-dcnode-id="490"><strong data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Weaknesses</span></strong></p><ul data-dcnode-id="483"><li data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">High competition in the general wine business</span></li><li data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Established large businesses in the gaming industry</span></li><li data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Need to build and establish the brand in the community</span></li></ul><p data-dcnode-id="480"><strong data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Opportunities</span></strong></p><div class="code-block code-block-12" data-dcnode-id="478" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="479"></div></div><ul data-dcnode-id="469"><li data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Reduce working capital needs by pursuing unique revenue and cost sharing model with suppliers.</span></li><li data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Build a professional web site for additional revenue stream.</span></li><li data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Leverage social media sites such as Facebook, Twitter, and Blog to build stronger, ongoing relationship with customers.</span></li><li data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Explore other uses of Vine Base® Tasting Services Inc. resulting in additional revenue</span></li></ul><p data-dcnode-id="466"><strong data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Threats</span></strong></p><ul data-dcnode-id="459"><li data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Current health awareness on too much alcohol may have negative impact on sales due to customers desire to maintain health.</span></li><li data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Government regulations</span></li><li data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Potential new entrants in the location.</span></li></ul><h3 data-dcnode-id="456"><span data-dcnode-id="457" id="7_MARKET_ANALYSIS"><span data-dcnode-id="458" instrument_node="">7. MARKET ANALYSIS</span></span></h3><ul data-dcnode-id="452"><li data-dcnode-id="453"><strong data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Market Trends</span></strong></li></ul><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">At Vine Base® Tasting Services Inc., we understand that innovation is an important part of the industry. Fortunately, just like us at Vine Base® Tasting Services Inc., the industry isn’t afraid of that. The wine market is driven by increasing demand for wine, due to its health benefits and premiumization of wine products, coupled with innovation in flavor and more advanced distribution networks, globally.</span></p><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Altering taste and new preferences among consumers, along with growing demand for new and exotic flavors, such as Riesling wine and other tropical fruit wine are projected to fuel the growth of the wine market. The wine and gaming market are both separately fragmented, due to a large number of domestic businesses in various countries. These bigger fishes have a significant share in the market, owing to their established brand name.</span></p><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">As every region has a number of domestic players with a robust distribution channel in the country, global players seeking a higher market share prefer acquiring them, rather than starting fresh in the country. New product development is another strategy followed by companies, as product differentiation helps in increasing the consumer’s base.</span></p><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Macro wine trends have been stable albeit lackluster, where consumption has appeared to plateau. Going forward, however, experts expect both industries to pick up. By 2022, volume of wine sold is projected to rise to 281 million cases, worth $32.9 billion, for a CAGR of approximately 3%.</span></p><div class="code-block code-block-13" data-dcnode-id="442" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="443"></div></div><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">We understand perfectly at Vibe Base that cultures change slowly, but they do change. And sub-categories within the wine industry—such as rosé and organic wines—have been demonstrating fantastic growth, while other segments have lagged behind. Sparkling wine, especially Champagne, is considered as a status symbol.</span></p><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Wineries, across the world, are launching varieties of sparkling wines through their brands in an attempt to stay ahead of the competition and pull and sustain consumer interest. The sparkling wine segment is fragmented with the presence of several producers, wineries, and distributors. Also, new packaging offerings like cans and minis have made sparklers more viable as an every-day drink.</span></p><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Therefore, sparkling wine is becoming food-friendly at restaurants, bars, and households. Champagne brands, such as Veuve Clicquot and Moët &amp; Chandon lead the sparkling wine segment, in terms of the retail value of both domestic and import trade.</span></p><h4 data-dcnode-id="432"><span data-dcnode-id="433" id="8_Our_Target_Market"><strong data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">8. Our Target Market</span></strong></span></h4><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">According to an industry report, over 34 percent of Americans visited a casino in the past 12 months, while 32 percent of Americans say they gambled at a casino in 2012, an increase from 27 percent in 2011. Young adults age 21-35 had the highest rate of casino visitation, as nearly two out of five (39 percent) went to a casino. Also, consumer spending in Las Vegas on commercial casino gambling was increased by 11 percent in 2018.</span></p><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Consumers interested in visiting casinos, and thus in video gaming, are generally better educated than the general population—52 percent have completed college, compared to 46 percent of the overall population, and among young adult casino visitors 66 percent have completed college. Moreover, 49 percent of all casino visitors’ households have annual income of more than $60,000, while only 34 percent of all households have the same annual income.</span></p><div class="code-block code-block-14" data-dcnode-id="426" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="427"></div></div><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Also, more than 60 percent of casino-goers agree that their favorite casino games are electronic gaming machines like slot machines and video poker. Thus, the market for video gaming is broad based; large segments of the adult population enjoy and participate in casual gaming when it is available.</span></p><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">At Vine Base® Tasting Services Inc., we will target 35-65 year old men and women, those with disposable income and a regular interest in out-of-home entertainment, and who enjoy gaming, but prefer a more relaxed environment than a casino or bar.</span></p><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">We at Vine Base® Tasting Services Inc. will strive, in part, to create an atmosphere that is comfortable for women, as opposed to traditional bars and sports bars that skew marketing, service and atmosphere mainly around men. Wine bars are projected to thrive in the future by virtue of their simplicity and ability to quickly adapt to evolving consumer preferences and newly introduced products.</span></p><p data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Note that with limited food services, a defined product range, and a comparatively small footprint of space, operators control costs and maximize the high margins wines provide. Premium beverages and simple but high-quality and healthful food offerings in unique environments are increasingly popular, especially among younger consumers.</span></p><p data-dcnode-id="413"><strong data-dcnode-id="414"><span data-dcnode-id="417" instrument_node="">Our </span><a class="wpil_keyword_link" data-dcnode-id="415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/example-companies-competitive-advantage/" rel="noopener noreferrer" target="_blank" title="competitive advantage"><span data-dcnode-id="416" instrument_node="">competitive advantage</span></a></strong></p><div class="code-block code-block-15" data-dcnode-id="411" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="412"></div></div><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Our competition at Vine Base® Tasting Services Inc. includes all establishments offering VGTs as an entertainment value to their customers. Meanwhile, very few of these are what could be characterized as direct competitors because each retail establishment is unique, and draws customers by combining VGTs with its other (principal) offerings.</span></p><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">A good number of businesses in areas eligible for wine bars—and who may be competitors for dining, drinking, and entertainment dollars— offer video gaming in café-type settings, but none offer exactly the same mix of VGT and wine bar elements like we do at Vine Base® Tasting Services Inc.</span></p><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">At Vine Base® Tasting Services Inc., we expect to distinguish our tasting venues from comparable establishments by offering a unique product mix and style, but also anticipate learning from successful competitors running similar establishments in other areas.</span></p><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">In accord with the upscale posture of these venues, we expect to gain market share by offering higher VGT payouts (to customers). This, polished with carefully tailored marketing plan for the target demographic, should well position our venues competitively.</span></p><h4 data-dcnode-id="399"><span data-dcnode-id="400" id="9_SALES_AND_MARKETING_STRATEGY"><strong data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">9. SALES AND MARKETING STRATEGY</span></strong></span></h4><ul data-dcnode-id="395"><li data-dcnode-id="396"><strong data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Sources of Income </span></strong></li></ul><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">As mentioned earlier, our revenue model will look for multiple revenue streams that will complement one another. Our wines will be offered at $10 to $15 per glass and $35 to $90 per bottle. Food items will average $10 per plate. Average per-person sale is expected to be $40.</span></p><div class="code-block code-block-16" data-dcnode-id="391" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="392"></div></div><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">To leverage the benefits of this highly popular and traffic-getting entertainment feature, Vine Base® Tasting Services Inc. will offer video gaming in a unique and distinguished way—in an upscale wine-bar serene unlike other common gaming venues.</span></p><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">We plan to ensure that the gaming and quality consumables will complement each other, take advantage of higher-end dining and drinking trends to drive sales success. For a maximum wager per hand of $2, customers can win up to $500 per hand. We believe that the right atmosphere and the excitement of video gaming will improve the customer experience, enticing them to visit the venue regularly, stay longer, and share the experience with friends.</span></p><h4 data-dcnode-id="383"><span data-dcnode-id="384" id="10_Sales_Forecast"><strong data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">10. Sales Forecast</span></strong></span></h4><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">At Vine Base® Tasting Services Inc., we prefer to estimate a conservative sales figure of 75 patrons per day in the first year. With our detailed plans and unique services, we predict a sell-out for each day, beginning in the first month of operation, due to the prime location of Vine Base® Tasting Services Inc. and the small percentage of the population required producing a sell-out.</span></p><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Also, the proximity of the venue to potential customers in the city is a powerful influence. However, to be conservative, we are projecting 75-100 patrons per days for the first year.</span></p><ul data-dcnode-id="375"><li data-dcnode-id="376"><strong data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Marketing Strategy and Sales Strategy</span></strong></li></ul><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">To properly reach our target demographic, our advertising and promotion at Vine Base® Tasting Services Inc. will be mixed and highly localized for each establishment, with a strategic concentration on social-media mechanisms. Every of our venue will have a strong online presence to ensure customers are easily aware of location and specials, new offerings, and events.</span></p><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Since wine tasting bars mainly market to customers in the local area, local community support is very crucial —so involvement in the community is a critical component of our marketing strategy at Vine Base® Tasting Services Inc. Each venue staff will attend and participate in community functions, thus establishing a reinforcing “visual” and “hands-on” presence where appropriate.</span></p><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Also, each venue will regularly host wine- and cheese-tasting events, both in house and at other community venues and public events, with a special focus on local producers from Washington and California. This local focus and these activities will enhance each our reputation and community “buzz” among locals. If the locals have a positive impression, they will patronize us regularly.</span></p><h4 data-dcnode-id="365"><span data-dcnode-id="366" id="11_Publicity_and_Advertising_Strategy"><strong data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">11. Publicity and Advertising Strategy</span></strong></span></h4><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Vine Base® Tasting Services Inc., will develop a compelling logo for the wine-tasting business. Each location may have a distinctive twist on the core name and logo—but all locations will be linked through common logo attributes.</span></p><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">The logo and name, its design and &nbsp;color scheme, will be appealing and interesting, and instantly capture and convey a sense of style, uniqueness, comfort and sophisticated atmosphere. The logo and name identity must be unique and easily recognized… We also plan to do the following;</span></p><ul data-dcnode-id="346"><li data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Vine Base® Tasting Services Inc. will spend $1,238 per month on Public relations services for the next year intended to build awareness of editors and product information insertions, reviews, etc.</span></li><li data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Vine Base® Tasting Services Inc. will also spend $470 per month concentrating on drive time Radio advertising. We plan to experiment with different stations, keeping careful track of results. As with the school fundraising program, we expect the stand and signage to be a substantial portion of our advertising.</span></li><li data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">List our business on local directories</span></li><li data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Attend relevant international and local health, finance and business expos, seminars, and business fairs et al</span></li><li data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Leverage on the internet to promote our business</span></li><li data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Engage direct marketing approach</span></li><li data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Encourage word of mouth marketing from loyal and satisfied clients</span></li></ul><h4 data-dcnode-id="338"><span data-dcnode-id="339" id="12_Our_Pricing_Strategy"><strong data-dcnode-id="340"><span data-dcnode-id="345" instrument_node="">12. Our </span><a class="wpil_keyword_link" data-dcnode-id="343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/factors-product-pricing-strategy/" rel="noopener noreferrer" target="_blank" title="Pricing Strategy"><span data-dcnode-id="344" instrument_node="">Pricing Strategy</span></a><br data-dcnode-id="342"><span data-dcnode-id="341" instrument_node=""> </span></strong></span></h4><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">At Vine Base® Tasting Services Inc., pricing will be dictated by each location’s market and competition. To the extent possible, the owners will work hard to dictate/govern pricing by being discerning and unique in selection of product offerings.</span></p><p data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Premium pricing will be sought where attainable, given market tolerances (limitations) on pricing for a bottle of wine and a charcuterie plate. We expect that the mark up on some of the finer wines will be as high as 300%, while mark ups on house wines and beers will average between 50 and 75%, and 35% on food.</span></p><ul data-dcnode-id="330"><li data-dcnode-id="331"><strong data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Payment Options</span></strong></li></ul><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">The options we provide at Vine Base® Tasting Services Inc. will be all inclusive and acceptable because we understand greatly that different people prefer different payment options as it suits them. Here are the payment options that we will make available to our clients;</span></p><ul data-dcnode-id="319"><li data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Payment by cash</span></li><li data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Payment via Point of Sale (POS) Machine</span></li><li data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Payment via online bank transfer (online payment portal)</span></li><li data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Payment via Mobile money</span></li></ul><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">We have also chosen banking platforms that will help us achieve our plans with little or no issues. Our bank account numbers will be made available on our website and promotional materials.</span></p><h3 data-dcnode-id="313"><span data-dcnode-id="314" id="13_Startup_Expenditure_Budget"><strong data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">13. Startup Expenditure (Budget)</span></strong></span></h3><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Vine Base® Tasting Services Inc., we seek to offer the balance of gaming and good wine people seek by providing a comfortable suburban atmosphere to suit our target audience. We believe that our company will become profitable in its first year and quite profitable in its third. We have analyzed the market and have decided on how we plan to spend our startup fund.</span></p><ul data-dcnode-id="281"><li data-dcnode-id="306"><span data-dcnode-id="310" instrument_node="">The Total Fee for Registering the Business in the </span><a class="wpil_keyword_link" data-dcnode-id="308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/business-ideas-united-states/" rel="noopener noreferrer" target="_blank" title="united states"><span data-dcnode-id="309" instrument_node="">united states</span></a><span data-dcnode-id="307" instrument_node=""> – $750.</span></li><li data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Legal expenses for obtaining licenses and permits – $4,000</span></li><li data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Marketing promotion budget- $25,000</span></li><li data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Insurance (general liability, workers’ compensation and property casualty) coverage at a total premium – $2,000</span></li><li data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Cost for leasing and renovating our location – $47, 000.</span></li><li data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Other start-up expenses including stationery – $1000</span></li><li data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Phone and utility deposits – $3,500</span></li><li data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Operational cost for the first 3 months (salaries of staff, fuelling, maintenance, payments of bills et al) – $25, 000</span></li><li data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">The cost for Start-up inventory – $30,000</span></li><li data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Cost for store equipment (cash register, security, ventilation, signage) – $2,000</span></li><li data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">The cost for the purchase of props and equipment: $2700</span></li><li data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">The cost of Launching an official website: $600</span></li><li data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">The cost for our grand opening party: $5000</span></li></ul><p data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">From our detailed analysis above, we will need an estimated $220,000 to start the first Vine Base® Tasting Services Inc. location successfully.</span></p><p data-dcnode-id="276"><strong data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Generating Funding/Startup Capital for Vine Base® Tasting Services Inc.</span></strong></p><p data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">We at Vine Base® Tasting Services Inc. are seeking funding capital from potential investors in an amount sufficient to cover the startup expenses. Investor(s) will participate in net revenue distribution at a one-third level under terms to be addressed in a management/revenue sharing/partnership agreement.</span></p><p data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">We understand that prospective investors may find it appropriate for tax, contractual, or profit-maximization reasons to structure investment arrangements as a hybrid of equity, debt, or other arranged credit and financing mechanisms. Because prospective investors needs and interests vary, Vine Base® Tasting Services Inc. owners are flexible and invite dialog on financing/structural options.</span></p><h4 data-dcnode-id="268"><span data-dcnode-id="269" id="14_Sustainability_and_Expansion_Strategy"><strong data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">14. Sustainability and Expansion Strategy</span></strong></span></h4><p data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Our aim at Vine Base® Tasting Services Inc. is to create the feel of a winery coupled with all the offerings typically available in such venues, but in a suburban setting with video slot and poker machines. Every of our store will offer a nice selection of wines and a limited offering of craft and bottled beers, accompanied by cheeses and other simple but quality food offerings that align well with wine and gaming.</span></p><ul data-dcnode-id="262"><li data-dcnode-id="263"><strong data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Service</span></strong></li></ul><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Immediately any guest walks in they will feel like Vine Base® Tasting Services Inc. is a place they want to be—a very calm and comfortable, welcoming space, with staff well trained to meet their varying needs.</span></p><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Staff will be perfectly informed about the variety wines, beers, and cheeses and other consumables provided and able to speak clearly about it all. To reward customers the business will, to the extent possible, calibrate VGTs to maximize customer payouts—higher than the competition—thus encouraging players to return often.</span></p><ul data-dcnode-id="254"><li data-dcnode-id="255"><strong data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">Locations</span></strong></li></ul><p data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Being license dependent, all our stores at Vine Base® Tasting Services Inc. will be located within the state of California, ideally in suburban areas already populated by or drawing substantial traffic from the target demographic. Locations will be majorly analyzed by population density, income level, and proximity to shopping, other businesses and housing.</span></p><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Each location will be 1600-1800 sq. ft. in size, either in an existing strip mall, or near shopping, in a town with a high population density of customers in the 35-65 age groups with disposable income. Also, each location is expected to have a customer capacity capable of hosting from 50 to 100 guests at a time.</span></p><p data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">With investor approval, Vine Base® Tasting Services Inc. will seek the expertise of a market research company to identify and strategize regarding suitable areas and locations to open each store.</span></p><ul data-dcnode-id="244"><li data-dcnode-id="245"><strong data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Interior</span></strong></li></ul><p data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">We at Vine Base® Tasting Services Inc. have secured the services of an interior designer to help with all decorating selections, ensure the business establishes the right “feel,” and provide guidance and supervision in every area from paint, colors and flooring types to wine glasses and charcuterie serving boards.</span></p><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Build out of each venue will take between four and six months from Architect’s site measurement. This time frame allows for drawings to be completed and all review by the city building department and county health department for permit issuance.</span></p><ul data-dcnode-id="236"><li data-dcnode-id="237"><strong data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Hours of Operation</span></strong></li></ul><p data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">At Vine Base® Tasting Services Inc., hours of operation will be dictated by the liquor license in the municipality. Ideal hours of operation will be 10:00 a.m.-1:00 a.m. Sunday through Thursday, and open until 2:00 a.m. Friday and Saturday.</span></p><ul data-dcnode-id="230"><li data-dcnode-id="231"><strong data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Suppliers</span></strong></li></ul><p data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">At Vine Base® Tasting Services Inc., we plan to use various vendors on the retail side and will select those that best suit each venue specific needs. Each Vine Base® Tasting Services Inc. venue will also source local producers of wines and cheeses to show our customers how good their area can be.</span></p><p data-dcnode-id="225"><strong data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Checklist /Milestone </span></strong></p><ul data-dcnode-id="133"><li data-dcnode-id="221"><span data-dcnode-id="224" instrument_node="">Business Name Availability Check: </span><strong data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Completed</span></strong></li><li data-dcnode-id="217"><span data-dcnode-id="220" instrument_node="">Business Incorporation: </span><strong data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">Completed</span></strong></li><li data-dcnode-id="213"><span data-dcnode-id="216" instrument_node="">Opening of Corporate Bank Accounts: </span><strong data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Completed</span></strong></li><li data-dcnode-id="209"><span data-dcnode-id="212" instrument_node="">Opening Online Payment Platforms: </span><strong data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">Completed</span></strong></li><li data-dcnode-id="205"><span data-dcnode-id="208" instrument_node="">Application and Obtaining Tax Payer’s ID:</span><strong data-dcnode-id="206"><span data-dcnode-id="207" instrument_node=""> In Progress</span></strong></li><li data-dcnode-id="201"><span data-dcnode-id="204" instrument_node="">Application for business license and permit: </span><strong data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Completed</span></strong></li><li data-dcnode-id="197"><span data-dcnode-id="200" instrument_node="">Purchase of Insurance for the Business: </span><strong data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">Completed</span></strong></li><li data-dcnode-id="190"><span data-dcnode-id="196" instrument_node="">Conducting </span><a class="wpil_keyword_link" data-dcnode-id="194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/steps-write-feasibility-study-report/" rel="noopener noreferrer" target="_blank" title="feasibility studies"><span data-dcnode-id="195" instrument_node="">feasibility studies</span></a><span data-dcnode-id="193" instrument_node="">: </span><strong data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Completed</span></strong></li><li data-dcnode-id="186"><span data-dcnode-id="189" instrument_node="">Leasing, renovating and equipping our Vine Base® Tasting Services Inc.: </span><strong data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Completed</span></strong></li><li data-dcnode-id="182"><span data-dcnode-id="185" instrument_node="">Generating part of the start – up capital from the founder: </span><strong data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">Completed</span></strong></li><li data-dcnode-id="178"><span data-dcnode-id="181" instrument_node="">Applications for Loan from our Bankers:</span><strong data-dcnode-id="179"><span data-dcnode-id="180" instrument_node=""> In Progress</span></strong></li><li data-dcnode-id="174"><span data-dcnode-id="177" instrument_node="">writing of business plan: </span><strong data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">Completed</span></strong></li><li data-dcnode-id="170"><span data-dcnode-id="173" instrument_node="">Drafting of Employee’s Handbook: </span><strong data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">Completed</span></strong></li><li data-dcnode-id="166"><span data-dcnode-id="169" instrument_node="">Drafting of Contract Documents:</span><strong data-dcnode-id="167"><span data-dcnode-id="168" instrument_node=""> In Progress</span></strong></li><li data-dcnode-id="162"><span data-dcnode-id="165" instrument_node="">Design of The Company’s Logo: </span><strong data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">Completed</span></strong></li><li data-dcnode-id="158"><span data-dcnode-id="161" instrument_node="">Printing of Promotional Materials: </span><strong data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">Completed</span></strong></li><li data-dcnode-id="154"><span data-dcnode-id="157" instrument_node="">Recruitment of employees:</span><strong data-dcnode-id="155"><span data-dcnode-id="156" instrument_node=""> In Progress</span></strong></li><li data-dcnode-id="150"><span data-dcnode-id="153" instrument_node="">Purchase of software applications, furniture, office equipment, electronic appliances and Vine Base® Tasting Services Inc. facelift</span><strong data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">: In progress</span></strong></li><li data-dcnode-id="146"><span data-dcnode-id="149" instrument_node="">Creating Official Website for the Company: </span><strong data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">In Progress</span></strong></li><li data-dcnode-id="142"><span data-dcnode-id="145" instrument_node="">Creating Awareness for the business (Business PR):</span><strong data-dcnode-id="143"><span data-dcnode-id="144" instrument_node=""> In Progress</span></strong></li><li data-dcnode-id="138"><span data-dcnode-id="141" instrument_node="">Health and Safety and Fire Safety Arrangement:</span><strong data-dcnode-id="139"><span data-dcnode-id="140" instrument_node=""> In Progress</span></strong></li><li data-dcnode-id="134"><span data-dcnode-id="137" instrument_node="">Establishing business relationship with banks, financial lending institutions, vendors and key players in the industry: </span><strong data-dcnode-id="135"><span data-dcnode-id="136" instrument_node="">In Progress</span></strong></li></ul></div></div><footer class="entry-meta" data-dcnode-id="130"></footer></article><nav class="post-navigation" data-dcnode-id="128" id="nav-below" role="navigation"></nav><div class="code-block code-block-4" data-dcnode-id="126" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBNb2IgLS0+CjxpbnMgY2xhc3M9ImFkc2J5Z29vZ2xlIgogICAgIHN0eWxlPSJkaXNwbGF5OmJsb2NrIgogICAgIGRhdGEtYWQtY2xpZW50PSJjYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBkYXRhLWFkLXNsb3Q9IjkxMzgwNTcxOTEiCiAgICAgZGF0YS1hZC1mb3JtYXQ9ImF1dG8iCiAgICAgZGF0YS1mdWxsLXdpZHRoLXJlc3BvbnNpdmU9InR
