</span><h3 data-dcnode-id="6157" id="improve-your-email-marketing"><span data-dcnode-id="6158" instrument_node="">Improve Your Email Marketing</span></h3><span data-dcnode-id="6156" instrument_node="">
</span><p data-dcnode-id="6153"><strong data-dcnode-id="6154"><span data-dcnode-id="6155" instrument_node="">Different types of emails</span></strong></p><span data-dcnode-id="6152" instrument_node="">
</span><p data-dcnode-id="6150"><span data-dcnode-id="6151" instrument_node="">Here are the most common types of email campaigns you can send to your customers and their benefits: </span></p><span data-dcnode-id="6149" instrument_node="">
</span><ul data-dcnode-id="6127"><span data-dcnode-id="6148" instrument_node="">
</span><li data-dcnode-id="6143"><span data-dcnode-id="6147" instrument_node="">Welcome emails - the perfect way to provide information from the start with a clear CTA. Make sure to tell your customer </span><strong data-dcnode-id="6145"><span data-dcnode-id="6146" instrument_node="">everything</span></strong><span data-dcnode-id="6144" instrument_node=""> they need to know about your product or service.</span></li><span data-dcnode-id="6142" instrument_node="">
</span><li data-dcnode-id="6140"><span data-dcnode-id="6141" instrument_node="">Newsletters - a great way to give customers updates or send out your latest content</span></li><span data-dcnode-id="6139" instrument_node="">
</span><li data-dcnode-id="6137"><span data-dcnode-id="6138" instrument_node="">Product launch emails - the quickest (and easiest) way to increase sales is by selling to current customers. Make sure they're the first on the list to know about your new product</span></li><span data-dcnode-id="6136" instrument_node="">
</span><li data-dcnode-id="6132"><span data-dcnode-id="6135" instrument_node="">Promotional emails - promote discounts, deals coupons etc. Try and make this feel exclusive and for a </span><strong data-dcnode-id="6133"><span data-dcnode-id="6134" instrument_node="">limited time only</span></strong></li><span data-dcnode-id="6131" instrument_node="">
</span><li data-dcnode-id="6129"><span data-dcnode-id="6130" instrument_node="">Abandoned cart emails - give your customers a reason to complete their purchase! </span></li><span data-dcnode-id="6128" instrument_node="">
</span></ul><span data-dcnode-id="6126" instrument_node="">
</span><p data-dcnode-id="6122"><a data-dcnode-id="6124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reallygoodemails.com/" target="_blank"><span data-dcnode-id="6125" instrument_node="">Here's</span></a><span data-dcnode-id="6123" instrument_node=""> a great resource for finding curated email designs, for all types of email campaigns!</span></p><span data-dcnode-id="6121" instrument_node="">
</span><h4 data-dcnode-id="6119" id="abandonded-cart-flow"><span data-dcnode-id="6120" instrument_node="">Abandonded Cart Flow</span></h4><span data-dcnode-id="6118" instrument_node="">
</span><p data-dcnode-id="6113"><span data-dcnode-id="6117" instrument_node="">The </span><a data-dcnode-id="6115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klaviyo.com/blog/leveraging-the-abandoned-cart" target="_blank"><span data-dcnode-id="6116" instrument_node="">abandoned cart workflow</span></a><span data-dcnode-id="6114" instrument_node=""> is one of the most effective strategies for turning your lead into a customer, and a powerful tool to have if you're an e-commerce business.</span></p><span data-dcnode-id="6112" instrument_node="">
</span><p data-dcnode-id="6110"><span data-dcnode-id="6111" instrument_node="">Think about all the times that you went on a shopping frenzy only to add items to your cart and then either forget or realize nows not the right time to pull the trigger.</span></p><span data-dcnode-id="6109" instrument_node="">
</span><p data-dcnode-id="6107"><span data-dcnode-id="6108" instrument_node="">Then, minutes later you receive an email saying "Hurry up! Your cart is waiting - and we want to provide you with 20% off your order."</span></p><span data-dcnode-id="6106" instrument_node="">
</span><p data-dcnode-id="6104"><span data-dcnode-id="6105" instrument_node="">Maybe that's the special touch (and discount) you needed to pull that trigger.</span></p><span data-dcnode-id="6103" instrument_node="">
</span><p data-dcnode-id="6101"><span data-dcnode-id="6102" instrument_node="">Implementing this workflow can automatically trigger this for your business every time a customer abandons their cart.</span></p><span data-dcnode-id="6100" instrument_node="">
</span><p data-dcnode-id="6095"><span data-dcnode-id="6099" instrument_node="">Here's a great example of an abandoned cart email from </span><a data-dcnode-id="6097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brooklinen.com/" target="_blank"><span data-dcnode-id="6098" instrument_node="">Brooklinen</span></a><span data-dcnode-id="6096" instrument_node="">:</span></p><span data-dcnode-id="6094" instrument_node="">
</span><p data-dcnode-id="6093"></p><div class="content-image-wrapper" data-dcnode-id="6091"><img alt="article" data-dcnode-id="6092" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.imgur.com/qbqShba.png&amp;raw"></div><p data-dcnode-id="6090"></p><span data-dcnode-id="6089" instrument_node="">
</span><p data-dcnode-id="6087"><span data-dcnode-id="6088" instrument_node="">Things they do well:</span></p><span data-dcnode-id="6086" instrument_node="">
</span><ul data-dcnode-id="6075"><span data-dcnode-id="6085" instrument_node="">
</span><li data-dcnode-id="6083"><span data-dcnode-id="6084" instrument_node="">Showcase 5-star reviews from other customers</span></li><span data-dcnode-id="6082" instrument_node="">
</span><li data-dcnode-id="6080"><span data-dcnode-id="6081" instrument_node="">Offer a small discount + free shipping</span></li><span data-dcnode-id="6079" instrument_node="">
</span><li data-dcnode-id="6077"><span data-dcnode-id="6078" instrument_node="">Great design + clear call to actions!</span></li><span data-dcnode-id="6076" instrument_node="">
</span></ul><span data-dcnode-id="6074" instrument_node="">
</span><h3 data-dcnode-id="6072" id="social-media-advertising"><span data-dcnode-id="6073" instrument_node="">Social Media Advertising</span></h3><span data-dcnode-id="6071" instrument_node="">
</span><p data-dcnode-id="6067"><a data-dcnode-id="6069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starterstory.com/social-media-advertising" target="_blank"><span data-dcnode-id="6070" instrument_node="">Social Media Advertising</span></a><span data-dcnode-id="6068" instrument_node=""> is one of the leading ways to get the word out when it comes to balloon decor business.</span></p><span data-dcnode-id="6066" instrument_node="">
</span><p data-dcnode-id="6064"><span data-dcnode-id="6065" instrument_node="">There are various different Social Media platforms available to you. Some may be more critical for your marketing efforts than others, however, it's important to have an understanding of what's out there and available to you.</span></p><span data-dcnode-id="6063" instrument_node="">
</span><p data-dcnode-id="6061"><span data-dcnode-id="6062" instrument_node="">Let's talk about a few of the main platforms and what makes them unique:</span></p><span data-dcnode-id="6060" instrument_node="">
</span><ul data-dcnode-id="6033"><span data-dcnode-id="6059" instrument_node="">
</span><li data-dcnode-id="6055"><strong data-dcnode-id="6057"><span data-dcnode-id="6058" instrument_node="">Facebook Advertising</span></strong><span data-dcnode-id="6056" instrument_node=""> - more than 2 billion monthly users. Facebook is the best for lead generation + capturing email addresses for e-commerce businesses.</span></li><span data-dcnode-id="6054" instrument_node="">
</span><li data-dcnode-id="6050"><strong data-dcnode-id="6052"><span data-dcnode-id="6053" instrument_node="">Instagram Advertising</span></strong><span data-dcnode-id="6051" instrument_node=""> - approximately 500 million monthly users and has a higher audience engagement rate than any other platform. Instagram ads are best for linking to a product page or landing page and reaches the 18-29 age group most effectively.</span></li><span data-dcnode-id="6049" instrument_node="">
</span><li data-dcnode-id="6045"><strong data-dcnode-id="6047"><span data-dcnode-id="6048" instrument_node="">Twitter Advertising</span></strong><span data-dcnode-id="6046" instrument_node="">- Small businesses typically use twitter ads to drive brand awareness, but the platform is meant more for organic engagement (and is not as heavily used for paid advertising)</span></li><span data-dcnode-id="6044" instrument_node="">
</span><li data-dcnode-id="6040"><strong data-dcnode-id="6042"><span data-dcnode-id="6043" instrument_node="">Pinterest Advertising</span></strong><span data-dcnode-id="6041" instrument_node=""> - 175 million monthly users and most effectively reaches the female audience. Pinterest is great for promoting products without "promoted". The promoted pins have a way of blending right in.</span></li><span data-dcnode-id="6039" instrument_node="">
</span><li data-dcnode-id="6035"><strong data-dcnode-id="6037"><span data-dcnode-id="6038" instrument_node="">LinkedIn Advertising</span></strong><span data-dcnode-id="6036" instrument_node=""> - 227 million monthly users and is geared towards the B2B market and generates the highest quality leads. Great platform for recruiters, high-end products and services that will help businesses</span></li><span data-dcnode-id="6034" instrument_node="">
</span></ul><span data-dcnode-id="6032" instrument_node="">
</span><p data-dcnode-id="6030"><span data-dcnode-id="6031" instrument_node="">It's important to first define your goal/objective so that you don't waste time and money into the wrong platform: </span></p><span data-dcnode-id="6029" instrument_node="">
</span><p data-dcnode-id="6027"><span data-dcnode-id="6028" instrument_node="">Here are some different questions to ask yourself as it relates to your goals: </span></p><span data-dcnode-id="6026" instrument_node="">
</span><ul data-dcnode-id="6015"><span data-dcnode-id="6025" instrument_node="">
</span><li data-dcnode-id="6023"><span data-dcnode-id="6024" instrument_node="">Do I want to simply drive brand awareness?</span></li><span data-dcnode-id="6022" instrument_node="">
</span><li data-dcnode-id="6020"><span data-dcnode-id="6021" instrument_node="">Do I want to drive users to my website to gather information?</span></li><span data-dcnode-id="6019" instrument_node="">
</span><li data-dcnode-id="6017"><span data-dcnode-id="6018" instrument_node="">Do I want to increase sales and get my customer to take action?</span></li><span data-dcnode-id="6016" instrument_node="">
</span></ul><span data-dcnode-id="6014" instrument_node="">
</span><p data-dcnode-id="6012"><span data-dcnode-id="6013" instrument_node="">From there, choose the platform that targets your audience best and start experimenting!</span></p><span data-dcnode-id="6011" instrument_node="">
</span><p data-dcnode-id="6006"><span data-dcnode-id="6010" instrument_node="">Learn more about social media advertising ➜ </span><a data-dcnode-id="6008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starterstory.com/social-media-advertising" target="_blank"><span data-dcnode-id="6009" instrument_node="">here</span></a><span data-dcnode-id="6007" instrument_node="">.</span></p><span data-dcnode-id="6005" instrument_node="">
</span><div class="story-quote-container" data-dcnode-id="5959"><span data-dcnode-id="6004" instrument_node="">
</span><p data-dcnode-id="6001"><strong data-dcnode-id="6002"><span data-dcnode-id="6003" instrument_node="">Founder Andy Hayes talks about mastering FB ads and the pixel:</span></strong></p><span data-dcnode-id="6000" instrument_node="">
</span><blockquote data-dcnode-id="5983"><span data-dcnode-id="5999" instrument_node="">
</span><p data-dcnode-id="5997"><span data-dcnode-id="5998" instrument_node="">The biggest bang for your buck will likely be mastering Facebook and it’s platform - which we all know is pay for play, so you’ll have to come up with a small amount of budget to start for marketing. </span></p><span data-dcnode-id="5996" instrument_node="">
</span><div class="blockquote-share" data-dcnode-id="5984"><span data-dcnode-id="5995" instrument_node="">
</span><a data-dcnode-id="5993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3D%2522The%2520biggest%2520bang%2520for%2520your%2520buck%2520will%2520likely%2520be%2520mastering%2520Facebook%2520and%2520it%25E2%2580%2599s%2520platform%2520-%2520which%2520we%2520all%2520know%2520is%2520pay%2520for%2520play%2C%2520so%2520you%25E2%2580%2599ll%2520have%2520to%2520come%2520up%2520with%2520a%2520small%2520amount%2520of%2520budget%2520to%2520start%2520for%2520marketing.%2522%250A%250A%26url%3Dhttps%3A//www.starterstory.com/how-to-start-balloon-decor-business" target="_blank"><i class="fa fa-twitter" data-dcnode-id="5994"></i></a><span data-dcnode-id="5992" instrument_node="">
</span><a data-dcnode-id="5990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%3A//www.starterstory.com/how-to-start-balloon-decor-business" target="_blank"><i class="fa fa-facebook-square" data-dcnode-id="5991"></i></a><span data-dcnode-id="5989" instrument_node="">
</span><a data-dcnode-id="5987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/shareArticle%3Fmini%3Dtrue%26url%3Dhttps%3A//www.starterstory.com/how-to-start-balloon-decor-business" target="_blank"><i class="fa fa-linkedin-square" data-dcnode-id="5988"></i></a><span data-dcnode-id="5986" instrument_node="">
</span><div data-dcnode-id="5985"></div></div></blockquote><span data-dcnode-id="5982" instrument_node="">
</span><p data-dcnode-id="5980"><span data-dcnode-id="5981" instrument_node="">We’ve spent countless hours (and paid numerous coaches) before we cracked the code that works for us on Facebook, but it is working really well for us now. </span></p><span data-dcnode-id="5979" instrument_node="">
</span><p data-dcnode-id="5976"><strong data-dcnode-id="5977"><span data-dcnode-id="5978" instrument_node="">Some of the most important things to know when it comes to FB Ads:</span></strong></p><span data-dcnode-id="5975" instrument_node="">
</span><ul data-dcnode-id="5961"><span data-dcnode-id="5974" instrument_node="">
</span><li data-dcnode-id="5972"><span data-dcnode-id="5973" instrument_node="">Start with retargeting (that’s showing ads to people who already know you but did not purchase). Master this - and start building information on your Facebook Pixel - before you do anything else</span></li><span data-dcnode-id="5971" instrument_node="">
</span><li data-dcnode-id="5969"><span data-dcnode-id="5970" instrument_node="">Once you have that down, try working with the 1% “Lookalike” audience to prospect for new customers. This may take awhile because your pixel audience is small, so try layering on interests - 1% Lookalike and your largest competitor, for example. Don’t use interest-only targeting until you master this.</span></li><span data-dcnode-id="5968" instrument_node="">
</span><li data-dcnode-id="5966"><span data-dcnode-id="5967" instrument_node="">Great photography and videography is key, as is smart copy. Research what’s out there in your industry and constantly test - what works for one company may not work for other people.</span></li><span data-dcnode-id="5965" instrument_node="">
</span><li data-dcnode-id="5963"><span data-dcnode-id="5964" instrument_node="">Make sure you have good offers. For example, we have a $5 trial for our subscription, which converts affordably - if we promoted our subscription with the standard $30 front charge, it wouldn’t be as cost-effective.</span></li><span data-dcnode-id="5962" instrument_node="">
</span></ul><span data-dcnode-id="5960" instrument_node="">
</span></div><span data-dcnode-id="5958" instrument_node="">
</span><div class="testimonial-by" data-dcnode-id="5942"><span data-dcnode-id="5957" instrument_node="">
</span><div class="answer" data-dcnode-id="5944" style="display: flex;"><span data-dcnode-id="5956" instrument_node="">

</span><h3 data-dcnode-id="5939" id="host-a-social-media-giveaway"><span data-dcnode-id="5940" instrument_node="">Host A Social Media Giveaway</span></h3><span data-dcnode-id="5938" instrument_node="">
</span><p data-dcnode-id="5936"><span data-dcnode-id="5937" instrument_node="">People love free stuff and love competition. Giveaways and contests are a great way to create awareness for your brand, grow your email list, and eventually convert leads into customers.</span></p><span data-dcnode-id="5935" instrument_node="">
</span><p data-dcnode-id="5933"><span data-dcnode-id="5934" instrument_node="">If your goal is to gather email addresses, make sure the entry criteria is to "enter your email." You can do this by leading customers to your landing page where they can then enter their email to be in the giveaway.</span></p><span data-dcnode-id="5932" instrument_node="">
</span><p data-dcnode-id="5930"><span data-dcnode-id="5931" instrument_node="">One of the most important aspects of promoting a successful giveaway is having an amazing prize. The better the prize, the more engagement you'll get.</span></p><span data-dcnode-id="5929" instrument_node="">
</span><p data-dcnode-id="5927"><span data-dcnode-id="5928" instrument_node="">This doesn't necessarily mean choosing an iPad or an expensive/trendy watch, but instead a prize that is actually relevant to your brand/target audience.</span></p><span data-dcnode-id="5926" instrument_node="">
</span><div class="story-quote-container" data-dcnode-id="5801"><span data-dcnode-id="5925" instrument_node="">
</span><h4 data-dcnode-id="5923" id="giveaway-example-and-tips"><span data-dcnode-id="5924" instrument_node="">Giveaway Example and Tips</span></h4><span data-dcnode-id="5922" instrument_node="">
</span><p data-dcnode-id="5919"><em data-dcnode-id="5920"><span data-dcnode-id="5921" instrument_node="">Example from TJ Mapes, founder of RIPT Apparel</span></em></p><span data-dcnode-id="5918" instrument_node="">
</span><p data-dcnode-id="5916"><span data-dcnode-id="5917" instrument_node="">Our most recent successful giveaway was when we gave away a PS4 + the new Spiderman game.  I hosted the giveaway on our site and then let our audience know about it via email/social channels.  </span></p><span data-dcnode-id="5915" instrument_node="">
</span><p data-dcnode-id="5910"><span data-dcnode-id="5914" instrument_node="">Entrants earned different amounts of entries for entering in different ways (tongue twister!), for instance; enter via email, get 10 entries.  Follow us on Facebook, get 5 entries.  Subscribe on Messenger and </span><strong data-dcnode-id="5912"><span data-dcnode-id="5913" instrument_node="">get 25 entries</span></strong><span data-dcnode-id="5911" instrument_node="">.  </span></p><span data-dcnode-id="5909" instrument_node="">
</span><p data-dcnode-id="5908"></p><div class="content-image-wrapper" data-dcnode-id="5906"><img alt="how-three-friends-launched-2-4m-t-shirt-startup-ript-apparel" data-dcnode-id="5907" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.amazonaws.com/www.starterstory.com/story_images/images/000/001/092/original/open-uri20190216-4-1g1htjo%3F1550309101&amp;raw"></div><p data-dcnode-id="5905"></p><span data-dcnode-id="5904" instrument_node="">
</span><p data-dcnode-id="5902"><span data-dcnode-id="5903" instrument_node="">I also built out a drip sequence in Klaviyo that contained four emails to encourage entrants to take more action, like referring friends and liking us on social.</span></p><span data-dcnode-id="5901" instrument_node="">
</span><p data-dcnode-id="5898"><strong data-dcnode-id="5899"><span data-dcnode-id="5900" instrument_node="">Email #1: Thanks for entering!</span></strong></p><span data-dcnode-id="5897" instrument_node="">
</span><p data-dcnode-id="5896"></p><div class="content-image-wrapper" data-dcnode-id="5894"><img alt="how-three-friends-launched-2-4m-t-shirt-startup-ript-apparel" data-dcnode-id="5895" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.amazonaws.com/www.starterstory.com/story_images/images/000/001/093/original/open-uri20190216-4-1gd3yyh%3F1550309101&amp;raw"></div><p data-dcnode-id="5893"></p><span data-dcnode-id="5892" instrument_node="">
</span><p data-dcnode-id="5889"><strong data-dcnode-id="5890"><span data-dcnode-id="5891" instrument_node="">Email #2: Explained how to earn bonus entries:</span></strong></p><span data-dcnode-id="5888" instrument_node="">
</span><p data-dcnode-id="5887"></p><div class="content-image-wrapper" data-dcnode-id="5885"><img alt="how-three-friends-launched-2-4m-t-shirt-startup-ript-apparel" data-dcnode-id="5886" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.amazonaws.com/www.starterstory.com/story_images/images/000/001/094/original/open-uri20190216-4-136c85k%3F1550309101&amp;raw"></div><p data-dcnode-id="5884"></p><span data-dcnode-id="5883" instrument_node="">
</span><p data-dcnode-id="5880"><strong data-dcnode-id="5881"><span data-dcnode-id="5882" instrument_node="">Email #3: About us</span></strong></p><span data-dcnode-id="5879" instrument_node="">
</span><p data-dcnode-id="5878"></p><div class="content-image-wrapper" data-dcnode-id="5876"><img alt="how-three-friends-launched-2-4m-t-shirt-startup-ript-apparel" data-dcnode-id="5877" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.amazonaws.com/www.starterstory.com/story_images/images/000/001/095/original/open-uri20190216-4-s4gc5e%3F1550309102&amp;raw"></div><p data-dcnode-id="5875"></p><span data-dcnode-id="5874" instrument_node="">
</span><p data-dcnode-id="5871"><strong data-dcnode-id="5872"><span data-dcnode-id="5873" instrument_node="">Email #4: Coupon for entering</span></strong></p><span data-dcnode-id="5870" instrument_node="">
</span><p data-dcnode-id="5868"><span data-dcnode-id="5869" instrument_node="">This last email in the sequence just thanked them again for entering and also included a coupon to a specific (related) collection of designs with an expiration date on it to incentivize purchases.</span></p><span data-dcnode-id="5867" instrument_node="">
</span><p data-dcnode-id="5866"></p><div class="content-image-wrapper" data-dcnode-id="5864"><img alt="how-three-friends-launched-2-4m-t-shirt-startup-ript-apparel" data-dcnode-id="5865" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.amazonaws.com/www.starterstory.com/story_images/images/000/001/096/original/open-uri20190216-4-1t84g5f%3F1550309102&amp;raw"></div><p data-dcnode-id="5863"></p><span data-dcnode-id="5862" instrument_node="">

</span><p data-dcnode-id="5846"><span data-dcnode-id="5849" instrument_node="">We ran it for 2 weeks and recorded results in a meticulous spreadsheet to analyze the data.  </span><strong data-dcnode-id="5847"><span data-dcnode-id="5848" instrument_node="">Here are some of the highlights:</span></strong></p><span data-dcnode-id="5845" instrument_node="">

</span><h2 data-dcnode-id="5781" id="how-to-run-your-balloon-decor-business"><span data-dcnode-id="5782" instrument_node="">🏃🏼‍♀️ How To Run Your Balloon Decor Business</span></h2><span data-dcnode-id="5780" instrument_node="">
</span><p data-dcnode-id="5779"></p><div class="content-image-wrapper" data-dcnode-id="5777"><img alt="article" data-dcnode-id="5778" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//placid.app/u/mhpzkqpni%3F%26bg-img%3Dhttps%3A//i.imgur.com/hJ5Sm6V.jpg%26quote%3DHow%2520To%2520Run%2520Your%2520Balloon%2520Decor%2520Business&amp;raw"></div><p data-dcnode-id="5776"></p><span data-dcnode-id="5775" instrument_node="">
</span><h3 data-dcnode-id="5773" id="how-to-retain-customers-for-your-balloon-decor-business"><span data-dcnode-id="5774" instrument_node="">How To Retain Customers For Your Balloon Decor Business</span></h3><span data-dcnode-id="5772" instrument_node="">
</span><p data-dcnode-id="5770"><span data-dcnode-id="5771" instrument_node="">Retaining customers is one of the most effective ways to grow your balloon decor business.</span></p><span data-dcnode-id="5769" instrument_node="">
</span><p data-dcnode-id="5767"><span data-dcnode-id="5768" instrument_node="">Oftentimes, it's easy to find yourself focusing on generating new customers, vs retaining your current ones.</span></p><span data-dcnode-id="5766" instrument_node="">
</span><p data-dcnode-id="5764"><span data-dcnode-id="5765" instrument_node="">Look at it this way - you are 60-70% more likely to sell a new product to an existing customer than you are a new customer.</span></p><span data-dcnode-id="5763" instrument_node="">
</span><p data-dcnode-id="5761"><span data-dcnode-id="5762" instrument_node="">That's not to say that finding new customers and revenue streams is not important, however, the easiest (and most inexpensive) source of new revenue is right there in front of you.</span></p><span data-dcnode-id="5760" instrument_node="">
</span><p data-dcnode-id="5758"><span data-dcnode-id="5759" instrument_node="">Here are some ways you can retain customers for your balloon decor business: </span></p><span data-dcnode-id="5757" instrument_node="">
</span><ul data-dcnode-id="5740"><span data-dcnode-id="5756" instrument_node="">
</span><li data-dcnode-id="5754"><span data-dcnode-id="5755" instrument_node="">Responding to comments on social media</span></li><span data-dcnode-id="5753" instrument_node="">
</span><li data-dcnode-id="5751"><span data-dcnode-id="5752" instrument_node="">Send discounts (or freebies) to loyal customers</span></li><span data-dcnode-id="5750" instrument_node="">
</span><li data-dcnode-id="5748"><span data-dcnode-id="5749" instrument_node="">Provide valuable content, for free</span></li><span data-dcnode-id="5747" instrument_node="">
</span><li data-dcnode-id="5745"><span data-dcnode-id="5746" instrument_node="">Write a hand written thank you note</span></li><span data-dcnode-id="5744" instrument_node="">
</span><li data-dcnode-id="5742"><span data-dcnode-id="5743" instrument_node="">Provide awesome customer service and build relationships with customers</span></li><span data-dcnode-id="5741" instrument_node="">
</span></ul><span data-dcnode-id="5739" instrument_node="">
</span><p data-dcnode-id="5735"><span data-dcnode-id="5738" instrument_node="">To find out more tips and tricks on retaining customers, check out this article ➜ </span><a data-dcnode-id="5736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.hubspot.com/service/customer-retention-strategies" target="_blank"><span data-dcnode-id="5737" instrument_node="">here</span></a></p><span data-dcnode-id="5734" instrument_node="">
</span><p data-dcnode-id="5733"></p><p data-dcnode-id="5731"><span data-dcnode-id="5732" instrument_node="">Rilee Acrey, founder of BalloonWorks dives deep into the process of attracting and retaining customers:</span></p><span data-dcnode-id="5730" instrument_node="">
</span><div class="story-quote-container" data-dcnode-id="5713"><span data-dcnode-id="5729" instrument_node="">
</span><p data-dcnode-id="5727"><span data-dcnode-id="5728" instrument_node="">Early key to success? Smile and dial. I called every event planner I could find and explained BalloonWorks to anyone who would listen. I spoke as if I had been doing this for years when, in reality, I could count on one hand how many jobs I had done. It didn’t matter, my confidence was evident and my faith for what we were building was stirred up in a way that I had yet to experience in my professional life.</span></p><span data-dcnode-id="5726" instrument_node="">
</span><p data-dcnode-id="5724"><span data-dcnode-id="5725" instrument_node="">The work we do is arguably more visual than any other industry, which makes Instagram our biggest marketing channel and the tool where we get 90 percent of our work. The page grew organically for the first five months through word of mouth and well-placed giveaways alongside partnerships with companies like Pacific Organic Pops and the Picnic Collective. After seeing success with these natural integrations, we were able to take our reach to the next level and invest in promotional ads that target businesses in Southern California.</span></p><span data-dcnode-id="5723" instrument_node="">
</span><p data-dcnode-id="5721"><span data-dcnode-id="5722" instrument_node="">The best customers are returning customers. Good work and great reviews speak louder than any “about” page ever could. BalloonWorks thrives on repeat business, especially through corporate clients, event planners and retail locations that host events year-round. Customers come back because of your work AND because of the relationships you’ve built with them.</span></p><span data-dcnode-id="5720" instrument_node="">
</span><p data-dcnode-id="5718"><span data-dcnode-id="5719" instrument_node="">The culture of our company is to go above and beyond for the client and always say “yes” whenever possible. Our mindset and actions lead to trust, respect and excitement for what we’re building together – involving the client throughout the entire project. When you do great work and you treat people well, you’ll go further than most… especially in a city like Los Angeles.</span></p><span data-dcnode-id="5717" instrument_node="">
</span><p data-dcnode-id="5715"><span data-dcnode-id="5716" instrument_node="">The power of social media is no joke. If you’re consistent with your efforts and you post content people actually want to see, your community is going to want to follow you and engage with your business. We see success when we’re bringing out followers along with us, showcasing the behind-the-scenes look at how we get jobs done and the real-life realities of operating in this industry (like blowing up balloons from 11 p.m. – 5 a.m. for 28 storefronts on one of LA’s busiest streets).</span></p><span data-dcnode-id="5714" instrument_node="">
</span></div><span data-dcnode-id="5712" instrument_node="">
</span><div class="testimonial-by" data-dcnode-id="5696"><span data-dcnode-id="5711" instrument_node="">
</span><div class="answer" data-dcnode-id="5698" style="display: flex;"><span data-dcnode-id="5710" instrument_node="">

</span><h3 data-dcnode-id="5691" id="diversify-your-product-line"><span data-dcnode-id="5692" instrument_node="">Diversify Your Product Line</span></h3><span data-dcnode-id="5690" instrument_node="">
</span><p data-dcnode-id="5688"><span data-dcnode-id="5689" instrument_node="">Adding new products to your business is a great way to expand into new markets and grow your business.</span></p><span data-dcnode-id="5687" instrument_node="">
</span><p data-dcnode-id="5685"><span data-dcnode-id="5686" instrument_node="">It's important to note that adding new products and diversifying may not be in the cards for you right this moment, and that's okay. You can always consider it down the road.</span></p><span data-dcnode-id="5684" instrument_node="">
</span><p data-dcnode-id="5682"><span data-dcnode-id="5683" instrument_node="">Here are some reasons you may want to considering adding/diversifying your product</span></p><span data-dcnode-id="5681" instrument_node="">
</span><ul data-dcnode-id="5667"><span data-dcnode-id="5680" instrument_node="">
</span><li data-dcnode-id="5678"><span data-dcnode-id="5679" instrument_node="">Meeting the needs of your customers</span></li><span data-dcnode-id="5677" instrument_node="">
</span><li data-dcnode-id="5675"><span data-dcnode-id="5676" instrument_node="">Establish yourself as a top provider in your industry and stay ahead of the game with competition</span></li><span data-dcnode-id="5674" instrument_node="">
</span><li data-dcnode-id="5672"><span data-dcnode-id="5673" instrument_node="">Resistance to downturns/trends fading</span></li><span data-dcnode-id="5671" instrument_node="">
</span><li data-dcnode-id="5669"><span data-dcnode-id="5670" instrument_node="">Create new revenue streams</span></li><span data-dcnode-id="5668" instrument_node="">
</span></ul><span data-dcnode-id="5666" instrument_node="">
</span><h3 data-dcnode-id="5664" id="provide-great-customer-service"><span data-dcnode-id="5665" instrument_node="">Provide Great Customer Service</span></h3><span data-dcnode-id="5663" instrument_node="">
</span><p data-dcnode-id="5661"><span data-dcnode-id="5662" instrument_node="">Providing exceptional care and creating relationships with clients is a great way to build your reputation and retain customers. </span></p><span data-dcnode-id="5660" instrument_node="">
</span><p data-dcnode-id="5658"><span data-dcnode-id="5659" instrument_node="">Whether you are an online business or a physical business, it's highly important to communicate with customers and make them feel like they are the priority.</span></p><span data-dcnode-id="5657" instrument_node="">
</span><p data-dcnode-id="5655"><span data-dcnode-id="5656" instrument_node="">Just remember: customer service represents your brand, values, vision and YOU as a person.</span></p><span data-dcnode-id="5654" instrument_node="">
</span><h3 data-dcnode-id="5652" id="build-a-referral-program"><span data-dcnode-id="5653" instrument_node="">Build a Referral Program</span></h3><span data-dcnode-id="5651" instrument_node="">
</span><p data-dcnode-id="5649"><span data-dcnode-id="5650" instrument_node="">Word of mouth is one of the best ways to get the word out about your business and acquire new customers. Especially when you are starting out, it’s important to build a solid referral program to encourage existing customers to help you find new ones.</span></p><span data-dcnode-id="5648" instrument_node="">
</span><p data-dcnode-id="5646"><span data-dcnode-id="5647" instrument_node="">A great way to do that is by offering a reward (ie. credit on your service or cash) to customers that refer you to their friends and family. </span></p><span data-dcnode-id="5645" instrument_node="">
</span><p data-dcnode-id="5643"><span data-dcnode-id="5644" instrument_node="">A fantastic referral program will help with clout, credibility, and establishing yourself in the space.</span></p><span data-dcnode-id="5642" instrument_node="">
</span><h3 data-dcnode-id="5640" id="authenticity"><span data-dcnode-id="5641" instrument_node="">Authenticity</span></h3><span data-dcnode-id="5639" instrument_node="">
</span><p data-dcnode-id="5637"><span data-dcnode-id="5638" instrument_node="">As a brand, you want to deliver an experience that authentic, honest and transparent.</span></p><span data-dcnode-id="5636" instrument_node="">
</span><p data-dcnode-id="5634"><span data-dcnode-id="5635" instrument_node="">Don't make the mistake of giving your audience less credit than they deserve.</span></p><span data-dcnode-id="5633" instrument_node="">
</span><div class="story-quote-container" data-dcnode-id="5618"><span data-dcnode-id="5632" instrument_node="">
</span><p data-dcnode-id="5629"><strong data-dcnode-id="5630"><span data-dcnode-id="5631" instrument_node="">Be Authentic</span></strong></p><span data-dcnode-id="5628" instrument_node="">
</span><p data-dcnode-id="5626"><span data-dcnode-id="5627" instrument_node="">If you go around chasing every trend and only focused on yourself and money, you’re going to lose very quickly. </span></p><span data-dcnode-id="5625" instrument_node="">
</span><p data-dcnode-id="5623"><span data-dcnode-id="5624" instrument_node="">There have been many times where we have been tempted to do this but stayed true. </span></p><span data-dcnode-id="5622" instrument_node="">
</span><p data-dcnode-id="5620"><span data-dcnode-id="5621" instrument_node="">Sure we sacrificed sales, but we kept our integrity, played the long game and people saw and appreciated that, and really began emotionally investing in the brand.</span></p><span data-dcnode-id="5619" instrument_node="">
</span></div><span data-dcnode-id="5617" instrument_node="">
</span><div class="testimonial-by" data-dcnode-id="5601"><span data-dcnode-id="5616" instrument_node="">

</span><h3 data-dcnode-id="5598" id="word-of-mouth"><span data-dcnode-id="5599" instrument_node="">Word of Mouth</span></h3><span data-dcnode-id="5597" instrument_node="">
</span><p data-dcnode-id="5595"><span data-dcnode-id="5596" instrument_node="">The most tried and true way to grow a balloon decor business is through word of mouth - some entrepreneurs would say it's more important than all social media.</span></p><span data-dcnode-id="5594" instrument_node="">
</span><p data-dcnode-id="5592"><span data-dcnode-id="5593" instrument_node="">Why you should focus on word of mouth:</span></p><span data-dcnode-id="5591" instrument_node="">
</span><ul data-dcnode-id="5576"><span data-dcnode-id="5590" instrument_node="">
</span><li data-dcnode-id="5588"><span data-dcnode-id="5589" instrument_node="">Consumers trust word of mouth above all other forms of marketing</span></li><span data-dcnode-id="5587" instrument_node="">
</span><li data-dcnode-id="5583"><a data-dcnode-id="5585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/kimberlywhitler/2014/07/17/why-word-of-mouth-marketing-is-the-most-important-social-media/%23549cd1354a8c" target="_blank"><span data-dcnode-id="5586" instrument_node="">92% of consumers</span></a><span data-dcnode-id="5584" instrument_node=""> believe recommendations from friends and family over all forms of advertising</span></li><span data-dcnode-id="5582" instrument_node="">
</span><li data-dcnode-id="5578"><span data-dcnode-id="5581" instrument_node="">64% of marketing executives indicated that they believe it is </span><strong data-dcnode-id="5579"><span data-dcnode-id="5580" instrument_node="">the most effective form of marketing</span></strong></li><span data-dcnode-id="5577" instrument_node="">
</span></ul><span data-dcnode-id="5575" instrument_node="">
</span><p data-dcnode-id="5571"><span data-dcnode-id="5574" instrument_node="">Learn more about word of mouth in our guide: </span><a data-dcnode-id="5572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starterstory.com/grow-your-business" target="_blank"><span data-dcnode-id="5573" instrument_node="">30 Ways Founders Grow Their Business ➜</span></a></p><span data-dcnode-id="5570" instrument_node="">

</span><p data-dcnode-id="1024"><span data-dcnode-id="1028" instrument_node="">At Starter Story, we search the internet for the </span><em data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">doers</span></em><span data-dcnode-id="1025" instrument_node=""> (the people who act rather than merely talk).</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1022" instrument_node="">These hard-to-reach, low-key, founders are </span><strong data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">in the trenches building real businesses</span></strong><span data-dcnode-id="1019" instrument_node=""> right now. </span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">And we get the lowdown on the most essential, hard-hitting parts of building their business:</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1013" instrument_node="">(1) How exactly did you find this opportunity?</span><br data-dcnode-id="1012"><span data-dcnode-id="1011" instrument_node="">

(4) </span><strong data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">How much money are you making?</span></strong><span data-dcnode-id="1004" instrument_node=""> </span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="1001" instrument_node="">^ Yes, we asked </span><strong data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">2,970</span></strong><span data-dcnode-id="998" instrument_node=""> founders these questions. And we are asking more every day.</span></p><span data-dcnode-id="996" instrument_node="">

</span><p data-dcnode-id="981"><span data-dcnode-id="985" instrument_node="">You might get </span><em data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">too inspired</span></em><span data-dcnode-id="982" instrument_node=""> when you actually see the answers behind thousands of successful, ordinary entrepreneurs.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="979" instrument_node="">You'll realize there is no </span><em data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">“magic formula”</span></em><span data-dcnode-id="976" instrument_node="">, that building a successful business is actually quite straightforward.</span></p><span data-dcnode-id="974" instrument_node="">

</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">We collect and analyze the data from every case study and give you that data.</span></p><span data-dcnode-id="965" instrument_node="">

</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">When you join us, you’ll get access to over $50K in software savings - we’ve exclusively negotiated discounts on 192 tools that are proven to grow your business.</span></p><span data-dcnode-id="948" instrument_node="">

</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Based on data points from our 2,970 case studies, you'll find the 201 most effective ways that founders are growing their business right now.</span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="933" instrument_node="">Uncover the growth strategies that founders are </span><em data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">actually</span></em><span data-dcnode-id="930" instrument_node=""> using.</span></p><span data-dcnode-id="928" instrument_node="">

</span><h2 data-dcnode-id="921" id="why-starter-story-is-different"><span data-dcnode-id="922" instrument_node="">Why Starter Story Is Different</span></h2><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Our team of 15+ are working every day to find more entrepreneurs, uncover their secrets, and put them in front of you.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Right now, we have 2,970 case studies you can read, and we add new case studies every single morning.</span></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Every day, you’ll find new, interesting businesses that are taking off right now.</span></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="910" instrument_node="">Our goal is to show you that </span><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">building the business of your dreams is not only possible, but it’s quite straightforward once you see how others have done it.</span></strong><span data-dcnode-id="907" instrument_node=""> </span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">We have seen countless Starter Story readers join us, get inspired, and change their lives through the businesses they’ve built.</span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">After interviewing 2,970 founders, here’s my biggest takeaway:</span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="898" instrument_node="">Building a business is </span><strong data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">simple</span></strong><span data-dcnode-id="895" instrument_node="">, but it’s </span><strong data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">not easy</span></strong><span data-dcnode-id="892" instrument_node="">.</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">There are many bumps in the road that require many decisions, </span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="886" instrument_node="">But, founders do not fail because they make the wrong decisions, </span><strong data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">they fail because they don’t make a decision at all</span></strong><span data-dcnode-id="883" instrument_node="">.</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="880" instrument_node="">At Starter Story, our goal is to help you make these decisions by giving you the information and answers you need - </span><strong data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">from 2,970 successful founders that already went through it firsthand.</span></strong></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">At less than $3/week, Starter Story is a no-brainer investment in your business.</span></p><span data-dcnode-id="873" instrument_node="">
