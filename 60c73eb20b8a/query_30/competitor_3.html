</span><h3 data-dcnode-id="8315" id="write-a-business-plan"><span data-dcnode-id="8316" instrument_node="">Write a Business Plan</span></h3><span data-dcnode-id="8314" instrument_node="">
</span><p data-dcnode-id="8312"><span data-dcnode-id="8313" instrument_node="">Writing a business plan from the start is critical for the success of your balloon decor business.</span></p><span data-dcnode-id="8311" instrument_node="">
</span><p data-dcnode-id="8309"><span data-dcnode-id="8310" instrument_node="">Why?</span></p><span data-dcnode-id="8308" instrument_node="">
</span><p data-dcnode-id="8306"><span data-dcnode-id="8307" instrument_node="">Because this allows you to roadmap exactly what you do, what your overall structure will look like, and where you want to be in the future. </span></p><span data-dcnode-id="8305" instrument_node="">
</span><p data-dcnode-id="8303"><span data-dcnode-id="8304" instrument_node="">For many entrepreneurs, writing out the business plan helps validate their idea and decide whether or not they should move forward with starting the business.</span></p><span data-dcnode-id="8302" instrument_node="">
</span><p data-dcnode-id="8300"><span data-dcnode-id="8301" instrument_node="">You may want to consider expanding upon these sections in your business plan:</span></p><span data-dcnode-id="8299" instrument_node="">
</span><ul data-dcnode-id="8252"><span data-dcnode-id="8298" instrument_node="">
</span><li data-dcnode-id="8294"><strong data-dcnode-id="8296"><span data-dcnode-id="8297" instrument_node="">Executive Summary</span></strong><span data-dcnode-id="8295" instrument_node="">: Brief outline of your product, the market, and growth opportunities</span></li><span data-dcnode-id="8293" instrument_node="">
</span><li data-dcnode-id="8289"><strong data-dcnode-id="8291"><span data-dcnode-id="8292" instrument_node="">Overviews and Objectives</span></strong><span data-dcnode-id="8290" instrument_node="">: Overview of your business, target customers, and what you need to run your business</span></li><span data-dcnode-id="8288" instrument_node="">
</span><li data-dcnode-id="8284"><strong data-dcnode-id="8286"><span data-dcnode-id="8287" instrument_node="">Products and Services</span></strong><span data-dcnode-id="8285" instrument_node="">: Specifics on the products and services your business will provide</span></li><span data-dcnode-id="8283" instrument_node="">
</span><li data-dcnode-id="8279"><strong data-dcnode-id="8281"><span data-dcnode-id="8282" instrument_node="">Market Opportunities</span></strong><span data-dcnode-id="8280" instrument_node="">: Analysis of customer demographics, buyer habits and if your product is in demand</span></li><span data-dcnode-id="8278" instrument_node="">
</span><li data-dcnode-id="8274"><strong data-dcnode-id="8276"><span data-dcnode-id="8277" instrument_node="">Marketing</span></strong><span data-dcnode-id="8275" instrument_node="">: Outline of your marketing plan and how you plan to differentiate yourself from other customers</span></li><span data-dcnode-id="8273" instrument_node="">
</span><li data-dcnode-id="8269"><strong data-dcnode-id="8271"><span data-dcnode-id="8272" instrument_node="">Competitive analysis</span></strong><span data-dcnode-id="8270" instrument_node="">: Analysis of your competition and the strengths and weaknesses therein</span></li><span data-dcnode-id="8268" instrument_node="">
</span><li data-dcnode-id="8264"><strong data-dcnode-id="8266"><span data-dcnode-id="8267" instrument_node="">Operations</span></strong><span data-dcnode-id="8265" instrument_node="">: Hierarchal structure of the company and what it will take to run the business on the day-to-day</span></li><span data-dcnode-id="8263" instrument_node="">
</span><li data-dcnode-id="8259"><strong data-dcnode-id="8261"><span data-dcnode-id="8262" instrument_node="">Leadership Team</span></strong><span data-dcnode-id="8260" instrument_node="">: Detailing roles and responsibilities of each manager based on their specific skill-set</span></li><span data-dcnode-id="8258" instrument_node="">
</span><li data-dcnode-id="8254"><strong data-dcnode-id="8256"><span data-dcnode-id="8257" instrument_node="">Financial Analysis</span></strong><span data-dcnode-id="8255" instrument_node=""> Understanding of all expenses, operating budgets, and projections for the future.</span></li><span data-dcnode-id="8253" instrument_node="">
</span></ul><span data-dcnode-id="8251" instrument_node="">
</span><p data-dcnode-id="8247"><span data-dcnode-id="8250" instrument_node="">Learn more about how to write a business plan </span><a data-dcnode-id="8248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//articles.bplans.com/how-to-write-a-business-plan/" target="_blank"><span data-dcnode-id="8249" instrument_node="">here</span></a></p><span data-dcnode-id="8246" instrument_node="">
</span><h3 data-dcnode-id="8244" id="determine-which-business-bank-account-you-need"><span data-dcnode-id="8245" instrument_node="">Determine Which Business Bank Account You Need</span></h3><span data-dcnode-id="8243" instrument_node="">
</span><p data-dcnode-id="8241"><span data-dcnode-id="8242" instrument_node="">There are hundreds of banks out there, and it can be overwhelming to find one that's right for your business.</span></p><span data-dcnode-id="8240" instrument_node="">
</span><p data-dcnode-id="8238"><span data-dcnode-id="8239" instrument_node="">Here are some factors you may want to consider:</span></p><span data-dcnode-id="8237" instrument_node="">
</span><ul data-dcnode-id="8220"><span data-dcnode-id="8236" instrument_node="">
</span><li data-dcnode-id="8234"><span data-dcnode-id="8235" instrument_node="">Location - Is your bank close enough that you can easily make deposits or get cash?</span></li><span data-dcnode-id="8233" instrument_node="">
</span><li data-dcnode-id="8231"><span data-dcnode-id="8232" instrument_node="">Low Fees - Make sure to understand any and all fees associated with setting up and maintaining your bank account. Ask for a list - banks usually try to keep this hidden and in the fine print.</span></li><span data-dcnode-id="8230" instrument_node="">
</span><li data-dcnode-id="8228"><span data-dcnode-id="8229" instrument_node="">Online Banking Services - Make sure you can easily navigate through your online portal and you have easy access to everything you need.</span></li><span data-dcnode-id="8227" instrument_node="">
</span><li data-dcnode-id="8225"><span data-dcnode-id="8226" instrument_node="">Line of Credit - What do your options look like (even if you don't need this now, you may need this down the road).</span></li><span data-dcnode-id="8224" instrument_node="">
</span><li data-dcnode-id="8222"><span data-dcnode-id="8223" instrument_node="">Every bank has something that differentiates them from the rest, so make sure whatever that is applied to your needs and values.</span></li><span data-dcnode-id="8221" instrument_node="">
</span></ul><span data-dcnode-id="8219" instrument_node="">
</span><p data-dcnode-id="8214"><span data-dcnode-id="8218" instrument_node="">Check out this list of the </span><a data-dcnode-id="8216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fundera.com/blog/best-bank-for-small-business" target="_blank"><span data-dcnode-id="8217" instrument_node="">13 Best Banks for Small Business in 2020</span></a><span data-dcnode-id="8215" instrument_node=""> and what makes them so unique.</span></p><span data-dcnode-id="8213" instrument_node="">
</span><h3 data-dcnode-id="8211" id="setting-up-your-balloon-decor-business-formation-and-legal"><span data-dcnode-id="8212" instrument_node="">Setting Up Your Balloon Decor Business (Formation and Legal)</span></h3><span data-dcnode-id="8210" instrument_node="">
</span><p data-dcnode-id="8208"><span data-dcnode-id="8209" instrument_node="">When it comes to setting up your business, you may find yourself in a place where you have to make some financial and legal decisions.</span></p><span data-dcnode-id="8207" instrument_node="">
</span><p data-dcnode-id="8205"><span data-dcnode-id="8206" instrument_node="">The first thing you'll want to decide on is whether you want to be an LLC, S-Corp, or C-Corp.</span></p><span data-dcnode-id="8204" instrument_node="">
</span><p data-dcnode-id="8202"><span data-dcnode-id="8203" instrument_node="">These three options are found to be the most common when starting a small business, and all serve to protect your personal assets and also provide you with certain tax benefits.</span></p><span data-dcnode-id="8201" instrument_node="">
</span><ul data-dcnode-id="8184"><span data-dcnode-id="8200" instrument_node="">
</span><li data-dcnode-id="8196"><strong data-dcnode-id="8198"><span data-dcnode-id="8199" instrument_node="">LLC</span></strong><span data-dcnode-id="8197" instrument_node="">: All income and expenses from the business are reported on the LLC personal income tax return.</span></li><span data-dcnode-id="8195" instrument_node="">
</span><li data-dcnode-id="8191"><strong data-dcnode-id="8193"><span data-dcnode-id="8194" instrument_node="">S corp</span></strong><span data-dcnode-id="8192" instrument_node="">: Owners pay themselves salaries + receive dividends from profits.</span></li><span data-dcnode-id="8190" instrument_node="">
</span><li data-dcnode-id="8186"><strong data-dcnode-id="8188"><span data-dcnode-id="8189" instrument_node="">C Corp</span></strong><span data-dcnode-id="8187" instrument_node="">: C Corps are separately taxable entities that file a corporate tax return (Form 1120). No income tax is paid at the corporate level and any tax due is paid at the owners individual expense.</span></li><span data-dcnode-id="8185" instrument_node="">
</span></ul><span data-dcnode-id="8183" instrument_node="">
</span><p data-dcnode-id="8181"><span data-dcnode-id="8182" instrument_node="">Depending on where you're conducting business, you'll also want to consider securing the proper permits, licenses and liability insurance. </span></p><span data-dcnode-id="8180" instrument_node="">
</span><p data-dcnode-id="8177"><a data-dcnode-id="8178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starterstory.com/set-up-business%23secure-the-right-permits-and-licenses" target="_blank"><span data-dcnode-id="8179" instrument_node="">Learn more about securing the right permits and licenses ➜</span></a></p><span data-dcnode-id="8176" instrument_node="">
</span><p data-dcnode-id="8169"><span data-dcnode-id="8175" instrument_node="">Need to start an LLC? </span><strong data-dcnode-id="8170"><span data-dcnode-id="8174" instrument_node="">Create an LLC in minutes with </span><a data-dcnode-id="8172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//starterstory.com/go/zenbusiness" id="ss-not-verified-tool" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="8173" instrument_node="">ZenBusiness</span></a><span data-dcnode-id="8171" instrument_node="">.</span></strong></p><span data-dcnode-id="8168" instrument_node="">
</span><h3 data-dcnode-id="8166" id="how-do-i-pay-myself-as-a-small-business-owner"><span data-dcnode-id="8167" instrument_node="">How Do I Pay Myself As A Small Business Owner?</span></h3><span data-dcnode-id="8165" instrument_node="">
</span><p data-dcnode-id="8163"><span data-dcnode-id="8164" instrument_node="">Most entrepreneurs start a business to do something they love- but at the end of the day, you still have bills to pay (maybe now more than ever).</span></p><span data-dcnode-id="8162" instrument_node="">
</span><p data-dcnode-id="8160"><span data-dcnode-id="8161" instrument_node="">But it's important to strike the right balance - if you pay yourself too much, you could be putting your business at risk.</span></p><span data-dcnode-id="8159" instrument_node="">
</span><p data-dcnode-id="8157"><span data-dcnode-id="8158" instrument_node="">There are two common ways to pay yourself as a business owner:</span></p><span data-dcnode-id="8156" instrument_node="">
</span><p data-dcnode-id="8153"><strong data-dcnode-id="8154"><span data-dcnode-id="8155" instrument_node="">1. Owner's Draw</span></strong></p><span data-dcnode-id="8152" instrument_node="">
</span><p data-dcnode-id="8150"><span data-dcnode-id="8151" instrument_node="">Many entrepreneurs pay themselves through an owner's draw. This means that you are technically sean as "self-employed" through the eyes of the IRS and are not paid through regular wages. </span></p><span data-dcnode-id="8149" instrument_node="">
</span><p data-dcnode-id="8147"><span data-dcnode-id="8148" instrument_node="">At the point that you collect money from the draw, taxes typically are not taken out - so make sure you are prepared to pay these taxes once you file your individual return. </span></p><span data-dcnode-id="8146" instrument_node="">
</span><p data-dcnode-id="8144"><span data-dcnode-id="8145" instrument_node="">As an owner who takes a draw, you can legally take out as much as you want from your equity.</span></p><span data-dcnode-id="8143" instrument_node="">
</span><p data-dcnode-id="8141"><span data-dcnode-id="8142" instrument_node="">This type of compensation is suited for Sole props, LLCs, and partnerships. If you’re an S corp, you can pay yourself through both a salary and draw if you choose.</span></p><span data-dcnode-id="8140" instrument_node="">
</span><p data-dcnode-id="8137"><strong data-dcnode-id="8138"><span data-dcnode-id="8139" instrument_node="">2. Salary</span></strong></p><span data-dcnode-id="8136" instrument_node="">
</span><p data-dcnode-id="8134"><span data-dcnode-id="8135" instrument_node="">If you decide to pay yourself a salary, you will receive a set and recurring amount. This will be taxed by the federal government and the state you reside in.</span></p><span data-dcnode-id="8133" instrument_node="">
</span><p data-dcnode-id="8131"><span data-dcnode-id="8132" instrument_node="">The reality is that it can be really complicated to set your own salary, so we have some tips for you to consider: </span></p><span data-dcnode-id="8130" instrument_node="">
</span><ul data-dcnode-id="8100"><span data-dcnode-id="8129" instrument_node="">
</span><li data-dcnode-id="8124"><span data-dcnode-id="8128" instrument_node="">Take out a </span><strong data-dcnode-id="8126"><span data-dcnode-id="8127" instrument_node="">reasonable amount</span></strong><span data-dcnode-id="8125" instrument_node=""> that allows you to live comfortably but also sets your business up for success</span></li><span data-dcnode-id="8123" instrument_node="">
</span><li data-dcnode-id="8118"><span data-dcnode-id="8122" instrument_node="">Consider the </span><strong data-dcnode-id="8120"><span data-dcnode-id="8121" instrument_node="">number of hours</span></strong><span data-dcnode-id="8119" instrument_node=""> you are working weekly + the type of duties you are performing. </span></li><span data-dcnode-id="8117" instrument_node="">
</span><li data-dcnode-id="8113"><strong data-dcnode-id="8115"><span data-dcnode-id="8116" instrument_node="">Set your salary</span></strong><span data-dcnode-id="8114" instrument_node=""> based on your industry-standard, location, and profits (or projected profits)</span></li><span data-dcnode-id="8112" instrument_node="">
</span><li data-dcnode-id="8108"><strong data-dcnode-id="8110"><span data-dcnode-id="8111" instrument_node="">Look at your P&amp;L statement</span></strong><span data-dcnode-id="8109" instrument_node="">: Deduct your own pay from that amount. This is important so you can first tackle important business expenses, and then pay yourself from the amount leftover.</span></li><span data-dcnode-id="8107" instrument_node="">
</span><li data-dcnode-id="8102"><span data-dcnode-id="8106" instrument_node="">Pick a </span><strong data-dcnode-id="8104"><span data-dcnode-id="8105" instrument_node="">payroll schedule</span></strong><span data-dcnode-id="8103" instrument_node=""> (and stick to it)! In the US, it's most common to pay yourself and employees twice a month.</span></li><span data-dcnode-id="8101" instrument_node="">
</span></ul><span data-dcnode-id="8099" instrument_node="">
</span><p data-dcnode-id="8098"></p><div class="content-image-wrapper" data-dcnode-id="8096"><img alt="https://media.giphy.com/media/xT0xeLTRncS90ptpfi/giphy.gif" data-dcnode-id="8097" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.giphy.com/media/xT0xeLTRncS90ptpfi/giphy.gif&amp;raw"></div><p data-dcnode-id="8095"></p><span data-dcnode-id="8094" instrument_node="">
</span><p data-dcnode-id="8089"><span data-dcnode-id="8093" instrument_node="">To learn more about how to pay yourself and what is a reasonable amount, </span><a data-dcnode-id="8091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gusto.com/blog/payroll/how-much-pay-myself" target="_blank"><span data-dcnode-id="8092" instrument_node="">check out this article</span></a><span data-dcnode-id="8090" instrument_node="">.</span></p><span data-dcnode-id="8088" instrument_node="">
</span><h3 data-dcnode-id="8086" id="how-to-price-your-balloon-business"><span data-dcnode-id="8087" instrument_node="">How To Price Your Balloon Business</span></h3><span data-dcnode-id="8085" instrument_node="">
</span><p data-dcnode-id="8083"><span data-dcnode-id="8084" instrument_node="">One of the most challenging aspects to starting a balloon decor business is determining how much to charge for your balloon business.</span></p><span data-dcnode-id="8082" instrument_node="">
</span><p data-dcnode-id="8077"><span data-dcnode-id="8081" instrument_node="">When businesses </span><strong data-dcnode-id="8079"><span data-dcnode-id="8080" instrument_node="">under-price</span></strong><span data-dcnode-id="8078" instrument_node=""> their product, this can be extremely detrimental to their bottom line and reputation. </span></p><span data-dcnode-id="8076" instrument_node="">
</span><p data-dcnode-id="8074"><span data-dcnode-id="8075" instrument_node="">Often times, businesses under-price their products to drive demand and volume, but that last thing you want is for customers to view your product/service as "cheap." Additionally, this can have a big impact on the type of customer you attract, which can be difficult to recover from. </span></p><span data-dcnode-id="8073" instrument_node="">
</span><p data-dcnode-id="8068"><span data-dcnode-id="8072" instrument_node="">On the other hand, when businesses </span><strong data-dcnode-id="8070"><span data-dcnode-id="8071" instrument_node="">over-price</span></strong><span data-dcnode-id="8069" instrument_node="">, this tends to be just as damaging to the business. </span></p><span data-dcnode-id="8067" instrument_node="">
</span><p data-dcnode-id="8065"><span data-dcnode-id="8066" instrument_node="">When customers buy, it's likely that they will explore the internet and look at other competitors to ensure they're getting the best value + deal. This is why it's so important that you research your competition and understand where you land in the marketplace. </span></p><span data-dcnode-id="8064" instrument_node="">
</span><p data-dcnode-id="8059"><span data-dcnode-id="8063" instrument_node="">Here are some </span><strong data-dcnode-id="8061"><span data-dcnode-id="8062" instrument_node="">factors to consider</span></strong><span data-dcnode-id="8060" instrument_node=""> when pricing your product:</span></p><span data-dcnode-id="8058" instrument_node="">
</span><p data-dcnode-id="8055"><strong data-dcnode-id="8056"><span data-dcnode-id="8057" instrument_node="">Understand your customer</span></strong></p><span data-dcnode-id="8054" instrument_node="">
</span><p data-dcnode-id="8052"><span data-dcnode-id="8053" instrument_node="">It's important that out of the gates, you identify the type of customer you want to attract and how much they're willing to pay for your service. One great way to do this is by surveying your customers. Here are some important items you'll want to takeaway:</span></p><span data-dcnode-id="8051" instrument_node="">
</span><ul data-dcnode-id="8040"><span data-dcnode-id="8050" instrument_node="">
</span><li data-dcnode-id="8048"><span data-dcnode-id="8049" instrument_node="">Customer demographic: Age, gender, location, etc.</span></li><span data-dcnode-id="8047" instrument_node="">
</span><li data-dcnode-id="8045"><span data-dcnode-id="8046" instrument_node="">Buying habits of your customer: What they buy + when they buy</span></li><span data-dcnode-id="8044" instrument_node="">
</span><li data-dcnode-id="8042"><span data-dcnode-id="8043" instrument_node="">Level of price sensitivity with your customer</span></li><span data-dcnode-id="8041" instrument_node="">
</span></ul><span data-dcnode-id="8039" instrument_node="">
</span><p data-dcnode-id="8037"><span data-dcnode-id="8038" instrument_node="">All of these segments will help you identify the type of customer you're attracting and how to price your product accordingly.</span></p><span data-dcnode-id="8036" instrument_node="">
</span><p data-dcnode-id="8033"><strong data-dcnode-id="8034"><span data-dcnode-id="8035" instrument_node="">Understand your costs</span></strong></p><span data-dcnode-id="8032" instrument_node="">
</span><p data-dcnode-id="8027"><span data-dcnode-id="8031" instrument_node="">When pricing your balloon business, it's critical that you first identify </span><strong data-dcnode-id="8029"><span data-dcnode-id="8030" instrument_node="">all of your costs</span></strong><span data-dcnode-id="8028" instrument_node=""> and consequently mark up your balloon business so you can factor in a profit. </span></p><span data-dcnode-id="8026" instrument_node="">
</span><p data-dcnode-id="8021"><span data-dcnode-id="8025" instrument_node="">The </span><strong data-dcnode-id="8023"><span data-dcnode-id="8024" instrument_node="">actual cost</span></strong><span data-dcnode-id="8022" instrument_node=""> of your balloon business may include things like:</span></p><span data-dcnode-id="8020" instrument_node="">
</span><ul data-dcnode-id="8006"><span data-dcnode-id="8019" instrument_node="">
</span><li data-dcnode-id="8017"><span data-dcnode-id="8018" instrument_node="">The actual cost to make the product (ie. raw materials, supplies, manufacturer).</span></li><span data-dcnode-id="8016" instrument_node="">
</span><li data-dcnode-id="8014"><span data-dcnode-id="8015" instrument_node="">Shipping + overhead fees</span></li><span data-dcnode-id="8013" instrument_node="">
</span><li data-dcnode-id="8011"><span data-dcnode-id="8012" instrument_node="">Rent</span></li><span data-dcnode-id="8010" instrument_node="">
</span><li data-dcnode-id="8008"><span data-dcnode-id="8009" instrument_node="">Operating costs to run your business</span></li><span data-dcnode-id="8007" instrument_node="">
</span></ul><span data-dcnode-id="8005" instrument_node="">
</span><p data-dcnode-id="8003"><span data-dcnode-id="8004" instrument_node="">You may want to consider creating a spreadsheet with every single expense involved in operating/owning your business. This will give you an idea as to what you need to generate in order to at the very least, break-even and will help you price your products to factor in a profit.</span></p><span data-dcnode-id="8002" instrument_node="">
</span><p data-dcnode-id="7999"><strong data-dcnode-id="8000"><span data-dcnode-id="8001" instrument_node="">Create revenue goals</span></strong></p><span data-dcnode-id="7998" instrument_node="">
</span><p data-dcnode-id="7996"><span data-dcnode-id="7997" instrument_node="">When determining the price of your balloon business, you'll want to create goals for revenue + how much profit you want your balloon decor business to make.</span></p><span data-dcnode-id="7995" instrument_node="">
</span><p data-dcnode-id="7993"><span data-dcnode-id="7994" instrument_node="">This process is simpler than you may think:</span></p><span data-dcnode-id="7992" instrument_node="">
</span><ol data-dcnode-id="7978"><span data-dcnode-id="7991" instrument_node="">
</span><li data-dcnode-id="7989"><span data-dcnode-id="7990" instrument_node="">Think about your breakeven cost (by completing the above step).</span></li><span data-dcnode-id="7988" instrument_node="">
</span><li data-dcnode-id="7986"><span data-dcnode-id="7987" instrument_node="">Create a revenue goal based on your break-even cost</span></li><span data-dcnode-id="7985" instrument_node="">
</span><li data-dcnode-id="7983"><span data-dcnode-id="7984" instrument_node="">Evaluate the # of items you plan to sell in a given period (make sure this is a realistic number)</span></li><span data-dcnode-id="7982" instrument_node="">
</span><li data-dcnode-id="7980"><span data-dcnode-id="7981" instrument_node="">Divide your revenue goal by the number of items you plan to sell</span></li><span data-dcnode-id="7979" instrument_node="">
</span></ol><span data-dcnode-id="7977" instrument_node="">
</span><p data-dcnode-id="7972"><span data-dcnode-id="7976" instrument_node="">This figure will help determine your </span><strong data-dcnode-id="7974"><span data-dcnode-id="7975" instrument_node="">estimated price per product</span></strong><span data-dcnode-id="7973" instrument_node=""> in order to meet your revenue goals.</span></p><span data-dcnode-id="7971" instrument_node="">
</span><p data-dcnode-id="7968"><strong data-dcnode-id="7969"><span data-dcnode-id="7970" instrument_node="">Evaluate your competition</span></strong></p><span data-dcnode-id="7967" instrument_node="">
</span><p data-dcnode-id="7965"><span data-dcnode-id="7966" instrument_node="">The last piece in determining how to price your balloon business is by simply looking at your competition.</span></p><span data-dcnode-id="7964" instrument_node="">
</span><p data-dcnode-id="7962"><span data-dcnode-id="7963" instrument_node="">The best way to do this is by finding like-minded businesses that offer product(s) with similar perceived value. Then, you can compare prices of the different businesses and determine where your balloon business fits best in the marketplace. </span></p><span data-dcnode-id="7961" instrument_node="">
</span><p data-dcnode-id="7959"><span data-dcnode-id="7960" instrument_node="">All of these factors play an equal part in pricing your balloon business, so it's important you evaluate each one individually to come up with an accurate price that will help optimize your business from the start.</span></p><span data-dcnode-id="7958" instrument_node="">
</span><div class="story-quote-container" data-dcnode-id="7888"><span data-dcnode-id="7957" instrument_node="">
</span><h4 data-dcnode-id="7955" id="understanding-your-costs"><span data-dcnode-id="7956" instrument_node="">Understanding Your Costs</span></h4><span data-dcnode-id="7954" instrument_node="">
</span><p data-dcnode-id="7951"><em data-dcnode-id="7952"><span data-dcnode-id="7953" instrument_node="">Example from Ishan, founder of Ugly Duckling</span></em></p><span data-dcnode-id="7950" instrument_node="">
</span><p data-dcnode-id="7947"><strong data-dcnode-id="7948"><span data-dcnode-id="7949" instrument_node="">First objective: profitability</span></strong></p><span data-dcnode-id="7946" instrument_node="">
</span><p data-dcnode-id="7944"><span data-dcnode-id="7945" instrument_node="">Our profitability is OK at this point but definitely not where it should be yet. To this day I have not paid myself a regular salary yet...and it’s been 4 years!</span></p><span data-dcnode-id="7943" instrument_node="">
</span><p data-dcnode-id="7941"><span data-dcnode-id="7942" instrument_node="">The problem is not the cost of goods which are well under 20% of sales, which is good by any standard. The problem is fulfillment costs. In 2018 we transitioned from our first fulfillment company to a much bigger company. We did this because we wanted to provide faster shipment speeds and a better quality of packaging. In hindsight, we chose a company which would have been more suitable for a larger company with bigger volumes. We ended up being tied in with some pretty large minimum monthly payments. So currently fulfillment costs are currently around 45% of sales...way too high.</span></p><span data-dcnode-id="7940" instrument_node="">
</span><p data-dcnode-id="7938"><span data-dcnode-id="7939" instrument_node="">We are now looking to transit to another fulfillment center. Our target is to get our fulfillment costs down to around 30% of sales which I believe from what I have researched, is possible.</span></p><span data-dcnode-id="7937" instrument_node="">
</span><p data-dcnode-id="7935"><span data-dcnode-id="7936" instrument_node="">Just to be clear, when I say fulfillment that includes transportation costs also - FedEx, USPS, etc. Not just storage, picking, and packing. I am pretty sure that it is possible to get fulfillment costs down even lower, and I suspect that some large pro sellers on amazon.com work with around 20-25% of sales.</span></p><span data-dcnode-id="7934" instrument_node="">
</span><p data-dcnode-id="7931"><strong data-dcnode-id="7932"><span data-dcnode-id="7933" instrument_node="">So our target P+L for 2020 looks something like this:</span></strong></p><span data-dcnode-id="7930" instrument_node="">
</span><ul data-dcnode-id="7913"><span data-dcnode-id="7929" instrument_node="">
</span><li data-dcnode-id="7927"><span data-dcnode-id="7928" instrument_node="">Cost of goods, including inbound freight and clearance - around 22% of sales.</span></li><span data-dcnode-id="7926" instrument_node="">
</span><li data-dcnode-id="7924"><span data-dcnode-id="7925" instrument_node="">Fulfillment - around 30% of sales.</span></li><span data-dcnode-id="7923" instrument_node="">
</span><li data-dcnode-id="7921"><span data-dcnode-id="7922" instrument_node="">Digital Advertising &amp; Promotion - around 15% of sales.</span></li><span data-dcnode-id="7920" instrument_node="">
</span><li data-dcnode-id="7918"><span data-dcnode-id="7919" instrument_node="">Other marketing and office costs, including salary costs - around 10% of sales.</span></li><span data-dcnode-id="7917" instrument_node="">
</span><li data-dcnode-id="7915"><span data-dcnode-id="7916" instrument_node="">That would leave us around 23% of sales - enough to pay me a liveable salary and for the company to make a profit and finance future growth.</span></li><span data-dcnode-id="7914" instrument_node="">
</span></ul><span data-dcnode-id="7912" instrument_node="">
</span><blockquote data-dcnode-id="7895"><span data-dcnode-id="7911" instrument_node="">
</span><p data-dcnode-id="7909"><span data-dcnode-id="7910" instrument_node="">That's the first objective for 2020: to right-size the P+L so that we are profitable at our current sales level</span></p><span data-dcnode-id="7908" instrument_node="">
</span><div class="blockquote-share" data-dcnode-id="7896"><span data-dcnode-id="7907" instrument_node="">

</span><h3 data-dcnode-id="7868" id="price-calculator-how-to-calculate-the-price-for-your-balloon-business"><span data-dcnode-id="7869" instrument_node="">Price Calculator: How to Calculate The Price For Your Balloon Business</span></h3><span data-dcnode-id="7867" instrument_node="">
</span><p data-dcnode-id="7865"><span data-dcnode-id="7866" instrument_node="">Our calculator is designed to be simple and easy to use.</span></p><span data-dcnode-id="7864" instrument_node="">
</span><p data-dcnode-id="7862"><span data-dcnode-id="7863" instrument_node="">The goal is to help you set realistic expectations and understand the amount you should be charging to make your desired profit.</span></p><span data-dcnode-id="7861" instrument_node="">
</span><p data-dcnode-id="7859"><span data-dcnode-id="7860" instrument_node="">Please input below:</span></p><span data-dcnode-id="7858" instrument_node="">
</span><p data-dcnode-id="7857"></p><div class="calconic-calculator" data-calculatorid="5f4f9906591ad3001e157daa" data-dcnode-id="7856"></div><span data-dcnode-id="7855" instrument_node="">
</span><span data-dcnode-id="7852" instrument_node="">
</span><p data-dcnode-id="7851"></p><span data-dcnode-id="7850" instrument_node="">
</span><h3 data-dcnode-id="7848" id="what-type-of-customers-will-buy-your-balloon-business"><span data-dcnode-id="7849" instrument_node="">What Type Of Customers Will Buy Your Balloon Business</span></h3><span data-dcnode-id="7847" instrument_node="">
</span><p data-dcnode-id="7845"><span data-dcnode-id="7846" instrument_node="">It's important to first establish who you will be selling to, whether it's to businesses or consumers.</span></p><span data-dcnode-id="7844" instrument_node="">
</span><p data-dcnode-id="7839"><span data-dcnode-id="7843" instrument_node="">Typically, in this industry, products are sold to </span><strong data-dcnode-id="7841"><span data-dcnode-id="7842" instrument_node="">B2C markets</span></strong><span data-dcnode-id="7840" instrument_node=""> (business-to-consumer).</span></p><span data-dcnode-id="7838" instrument_node="">
</span><p data-dcnode-id="7836"><span data-dcnode-id="7837" instrument_node="">Let's take a look at what this means for your balloon decor business:</span></p><span data-dcnode-id="7835" instrument_node="">
</span><p data-dcnode-id="7833"><span data-dcnode-id="7834" instrument_node="">B2C (or business to consumer) is a transaction where businesses sell their products or services to the consumer directly.</span></p><span data-dcnode-id="7832" instrument_node="">
</span><p data-dcnode-id="7824"><span data-dcnode-id="7831" instrument_node="">In this market, </span><strong data-dcnode-id="7829"><span data-dcnode-id="7830" instrument_node="">consumer behavior is the primary driver</span></strong><span data-dcnode-id="7828" instrument_node=""> for your business decisions - so it's important that you truly identify </span><strong data-dcnode-id="7826"><span data-dcnode-id="7827" instrument_node="">who</span></strong><span data-dcnode-id="7825" instrument_node=""> your customer is, and what their buyer habits are when building your product/service.</span></p><span data-dcnode-id="7823" instrument_node="">
</span><p data-dcnode-id="7820"><strong data-dcnode-id="7821"><span data-dcnode-id="7822" instrument_node="">The advantage</span></strong></p><span data-dcnode-id="7819" instrument_node="">
</span><p data-dcnode-id="7817"><span data-dcnode-id="7818" instrument_node="">B2C is that you are able to cast a very wide net when targeting your customers. Your product may interest a large number of consumers or a specific niche. </span></p><span data-dcnode-id="7816" instrument_node="">
</span><p data-dcnode-id="7813"><strong data-dcnode-id="7814"><span data-dcnode-id="7815" instrument_node="">The disadvantage</span></strong></p><span data-dcnode-id="7812" instrument_node="">
</span><p data-dcnode-id="7810"><span data-dcnode-id="7811" instrument_node="">B2C is that consumers hold all the power - so if your website is not the most user friendly, or does not rank in the top search results on Google, chances are, your customer is going to shop elsewhere. </span></p><span data-dcnode-id="7809" instrument_node="">
</span><p data-dcnode-id="7801"><span data-dcnode-id="7808" instrument_node="">When building your balloon decor business, it's critical that you hone in on </span><strong data-dcnode-id="7806"><span data-dcnode-id="7807" instrument_node="">who</span></strong><span data-dcnode-id="7805" instrument_node=""> your target audience is, and why they </span><strong data-dcnode-id="7803"><span data-dcnode-id="7804" instrument_node="">need</span></strong><span data-dcnode-id="7802" instrument_node=""> your product over your competition.</span></p><span data-dcnode-id="7800" instrument_node="">
</span><p data-dcnode-id="7798"><span data-dcnode-id="7799" instrument_node="">Here are some items to consider when identifying your buyer persona:</span></p><span data-dcnode-id="7797" instrument_node="">
</span><p data-dcnode-id="7796"></p><div class="content-image-wrapper" data-dcnode-id="7794"><img alt="article" data-dcnode-id="7795" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.launchwithrika.com/wp-content/uploads/2019/09/how-to-find-your-target-audience-infographic.png&amp;raw"></div><span data-dcnode-id="7793" instrument_node="">
</span><em data-dcnode-id="7790"><a data-dcnode-id="7791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.launchwithrika.com/how-to-find-your-target-audience/" target="_blank"><span data-dcnode-id="7792" instrument_node="">Source</span></a></em><p data-dcnode-id="7789"></p><span data-dcnode-id="7788" instrument_node="">
</span><h3 data-dcnode-id="7786" id="design-a-prototype"><span data-dcnode-id="7787" instrument_node="">Design A Prototype</span></h3><span data-dcnode-id="7785" instrument_node="">
</span><p data-dcnode-id="7783"><span data-dcnode-id="7784" instrument_node="">Turning your idea into a reality can feel like a daunting task - but it's critical that you have an idea of what your product will look like (even if it's just a sketch) prior to finding a manufacturer.</span></p><span data-dcnode-id="7782" instrument_node="">
</span><p data-dcnode-id="7780"><span data-dcnode-id="7781" instrument_node="">Here are some common ways you can design your prototype:</span></p><span data-dcnode-id="7779" instrument_node="">
</span><ul data-dcnode-id="7762"><span data-dcnode-id="7778" instrument_node="">
</span><li data-dcnode-id="7776"><span data-dcnode-id="7777" instrument_node="">Draw Your Initial Design on Paper</span></li><span data-dcnode-id="7775" instrument_node="">
</span><li data-dcnode-id="7773"><span data-dcnode-id="7774" instrument_node="">Form pieces of fabric together</span></li><span data-dcnode-id="7772" instrument_node="">
</span><li data-dcnode-id="7770"><span data-dcnode-id="7771" instrument_node="">Consider Taking A Generic Product And Putting Your Own Brand On It</span></li><span data-dcnode-id="7769" instrument_node="">
</span><li data-dcnode-id="7767"><span data-dcnode-id="7768" instrument_node="">Try Making the Product Yourself</span></li><span data-dcnode-id="7766" instrument_node="">
</span><li data-dcnode-id="7764"><span data-dcnode-id="7765" instrument_node="">Consider Building A Prototype With A 3D Printer</span></li><span data-dcnode-id="7763" instrument_node="">
</span></ul><span data-dcnode-id="7761" instrument_node="">
</span><p data-dcnode-id="7756"><span data-dcnode-id="7760" instrument_node="">To learn more about how to design and prototype a product, check out our latest guide </span><a data-dcnode-id="7758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starterstory.com/prototyping-a-product" target="_blank"><span data-dcnode-id="7759" instrument_node="">here</span></a><span data-dcnode-id="7757" instrument_node="">.</span></p><span data-dcnode-id="7755" instrument_node="">
</span><p data-dcnode-id="7754"></p><p data-dcnode-id="7752"><span data-dcnode-id="7753" instrument_node="">Janeen Brown, founder of Balloon Haus LLC dives deep into the process of designing and prototyping their product:</span></p><span data-dcnode-id="7751" instrument_node="">
</span><div class="story-quote-container" data-dcnode-id="7733"><span data-dcnode-id="7750" instrument_node="">
</span><p data-dcnode-id="7748"><span data-dcnode-id="7749" instrument_node="">When I first started Balloon Haus, I was trying to take the cheap way out and blow all of the balloons up with my mouth for the balloon installations and that didn’t last for long. The process took too long and I realized in an industry like this, we must be efficient with our time. I then started using a hand pump thinking that would make a difference which ended up with my hand aching the following day and us missing out on clients. You can tell by looking at our first few installations the difference between then and now, and how we have become experts in the industry. Thankfully, our starter costs were minimal minus the cost of insurance, company registration, and contractor fees when we got too busy.</span></p><span data-dcnode-id="7747" instrument_node="">
</span><p data-dcnode-id="7744"><em data-dcnode-id="7745"><span data-dcnode-id="7746" instrument_node="">Meagan Ward x Essence Magazine - Detroit, MI May 2018 (one of our first Detroit installations)</span></em></p><span data-dcnode-id="7743" instrument_node="">
</span><p data-dcnode-id="7740"><em data-dcnode-id="7741"><span data-dcnode-id="7742" instrument_node="">Partnership with Lavelle, Toronto, Ca June 2018</span></em></p><span data-dcnode-id="7739" instrument_node="">
</span><p data-dcnode-id="7735"><em data-dcnode-id="7737"><span data-dcnode-id="7738" instrument_node="">April 2019 Birthday Party Installation, Fort Lauderdale, FL</span></em><span data-dcnode-id="7736" instrument_node=""> </span></p><span data-dcnode-id="7734" instrument_node="">
</span></div><span data-dcnode-id="7732" instrument_node="">
</span><div class="testimonial-by" data-dcnode-id="7716"><span data-dcnode-id="7731" instrument_node="">
</span><div class="answer" data-dcnode-id="7718" style="display: flex;"><span data-dcnode-id="7730" instrument_node="">

</span><div class="circular-image-bg" data-dcnode-id="7728" role="img" style="background-image: url(//s3.amazonaws.com/www.starterstory.com/starters/avatars/000/008/844/thumbnail/IMG_8575.JPG?1620868792);"></div><span data-dcnode-id="7727" instrument_node="">

</span><a data-dcnode-id="7722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starterstory.com/balloon-installations-business"><span data-dcnode-id="7723" instrument_node="">

</span><h3 data-dcnode-id="7711" id="how-to-find-a-supplier-for-your-balloon-decor-business"><span data-dcnode-id="7712" instrument_node="">How To Find A Supplier For Your Balloon Decor Business</span></h3><span data-dcnode-id="7710" instrument_node="">
</span><p data-dcnode-id="7708"><span data-dcnode-id="7709" instrument_node="">Here are the steps to consider when finding a supplier/manufacturer: </span></p><span data-dcnode-id="7707" instrument_node="">
</span><p data-dcnode-id="7704"><strong data-dcnode-id="7705"><span data-dcnode-id="7706" instrument_node="">Know your design</span></strong></p><span data-dcnode-id="7703" instrument_node="">
</span><p data-dcnode-id="7701"><span data-dcnode-id="7702" instrument_node="">One very critical step to finding the right supplier is having an initial idea of what your design/product will look like.</span></p><span data-dcnode-id="7700" instrument_node="">
</span><p data-dcnode-id="7698"><span data-dcnode-id="7699" instrument_node="">Sketching is one of the most simple ways to get started in the design phase.</span></p><span data-dcnode-id="7697" instrument_node="">
</span><p data-dcnode-id="7695"><span data-dcnode-id="7696" instrument_node="">What's great about sketching is that you can practically do this anytime, anywhere - even on the back of a napkin.</span></p><span data-dcnode-id="7694" instrument_node="">
</span><p data-dcnode-id="7692"><span data-dcnode-id="7693" instrument_node="">To get started, all you need to do is pick up a pen and paper and start drawing - or if you are working on a virtual/software product this can be a diagram that outlines the user interface or experience.</span></p><span data-dcnode-id="7691" instrument_node="">
</span><p data-dcnode-id="7688"><strong data-dcnode-id="7689"><span data-dcnode-id="7690" instrument_node="">Decide your supplier type</span></strong></p><span data-dcnode-id="7687" instrument_node="">
</span><p data-dcnode-id="7685"><span data-dcnode-id="7686" instrument_node="">You'll want to identify the type of supplier you are looking for.</span></p><span data-dcnode-id="7684" instrument_node="">
</span><p data-dcnode-id="7682"><span data-dcnode-id="7683" instrument_node="">Here are some questions you may want to ask yourself prior to searching for a supplier</span></p><span data-dcnode-id="7681" instrument_node="">
</span><ul data-dcnode-id="7652"><span data-dcnode-id="7680" instrument_node="">
</span><li data-dcnode-id="7675"><span data-dcnode-id="7679" instrument_node="">Are you looking for a manufacturer to </span><strong data-dcnode-id="7677"><span data-dcnode-id="7678" instrument_node="">produce your product idea</span></strong><span data-dcnode-id="7676" instrument_node="">? </span></li><span data-dcnode-id="7674" instrument_node="">
</span><li data-dcnode-id="7669"><span data-dcnode-id="7673" instrument_node="">Do you want to find a supplier that can simply </span><strong data-dcnode-id="7671"><span data-dcnode-id="7672" instrument_node="">purchase existing products for you</span></strong><span data-dcnode-id="7670" instrument_node="">?</span></li><span data-dcnode-id="7668" instrument_node="">
</span><li data-dcnode-id="7666"><span data-dcnode-id="7667" instrument_node="">Do you want a drop-shipper to supply and fulfill orders?</span></li><span data-dcnode-id="7665" instrument_node="">
</span><li data-dcnode-id="7654"><span data-dcnode-id="7664" instrument_node="">Do you want a </span><strong data-dcnode-id="7662"><span data-dcnode-id="7663" instrument_node="">domestic</span></strong><span data-dcnode-id="7661" instrument_node=""> supplier or an </span><strong data-dcnode-id="7659"><span data-dcnode-id="7660" instrument_node="">overseas</span></strong><span data-dcnode-id="7658" instrument_node=""> supplier? Read more about the pros and cons of each </span><a data-dcnode-id="7656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancesmb.com/choosing-between-domestic-and-foreign-manufacturers-3502283" target="_blank"><span data-dcnode-id="7657" instrument_node="">here</span></a><span data-dcnode-id="7655" instrument_node=""> </span></li><span data-dcnode-id="7653" instrument_node="">
</span></ul><span data-dcnode-id="7651" instrument_node="">
</span><p data-dcnode-id="7648"><strong data-dcnode-id="7649"><span data-dcnode-id="7650" instrument_node="">Where to start your search</span></strong></p><span data-dcnode-id="7647" instrument_node="">
</span><p data-dcnode-id="7645"><span data-dcnode-id="7646" instrument_node="">Once you have an understanding of what type of manufacturer/supplier will be best to bring your idea to life, there are several areas you can start your search:</span></p><span data-dcnode-id="7644" instrument_node="">
</span><p data-dcnode-id="7641"><strong data-dcnode-id="7642"><span data-dcnode-id="7643" instrument_node="">Domestic Suppliers</span></strong></p><span data-dcnode-id="7640" instrument_node="">
</span><ul data-dcnode-id="7626"><span data-dcnode-id="7639" instrument_node="">
</span><li data-dcnode-id="7636"><a data-dcnode-id="7637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//makersrow.com/" target="_blank"><span data-dcnode-id="7638" instrument_node="">Makers Row</span></a></li><span data-dcnode-id="7635" instrument_node="">
</span><li data-dcnode-id="7632"><a data-dcnode-id="7633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kompass.com/selectcountry/" target="_blank"><span data-dcnode-id="7634" instrument_node="">Kompass</span></a></li><span data-dcnode-id="7631" instrument_node="">
</span><li data-dcnode-id="7628"><a data-dcnode-id="7629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thomasnet.com/" target="_blank"><span data-dcnode-id="7630" instrument_node="">Thomas Net</span></a></li><span data-dcnode-id="7627" instrument_node="">
</span></ul><span data-dcnode-id="7625" instrument_node="">
</span><p data-dcnode-id="7622"><strong data-dcnode-id="7623"><span data-dcnode-id="7624" instrument_node="">Overseas Suppliers</span></strong></p><span data-dcnode-id="7621" instrument_node="">
</span><ul data-dcnode-id="7603"><span data-dcnode-id="7620" instrument_node="">
</span><li data-dcnode-id="7617"><a data-dcnode-id="7618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//starterstory.com/tools/alibaba" id="ss-not-verified-tool" target="_blank"><span data-dcnode-id="7619" instrument_node="">Alibaba</span></a></li><span data-dcnode-id="7616" instrument_node="">
</span><li data-dcnode-id="7613"><a data-dcnode-id="7614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indiamart.com/" target="_blank"><span data-dcnode-id="7615" instrument_node="">IndiaMart</span></a></li><span data-dcnode-id="7612" instrument_node="">
</span><li data-dcnode-id="7609"><a data-dcnode-id="7610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shopify.com/oberlo" target="_blank"><span data-dcnode-id="7611" instrument_node="">Oberlo</span></a></li><span data-dcnode-id="7608" instrument_node="">
</span><li data-dcnode-id="7605"><a data-dcnode-id="7606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aliexpress.com/" target="_blank"><span data-dcnode-id="7607" instrument_node="">AliExpress</span></a></li><span data-dcnode-id="7604" instrument_node="">
</span></ul><span data-dcnode-id="7602" instrument_node="">
</span><h4 data-dcnode-id="7600" id="manufacturing-your-product-in-house"><span data-dcnode-id="7601" instrument_node="">Manufacturing Your Product In House</span></h4><span data-dcnode-id="7599" instrument_node="">
</span><p data-dcnode-id="7597"><span data-dcnode-id="7598" instrument_node="">It's also very common to manufacture your balloon business on your own - either from your home or in a commercial space. </span></p><span data-dcnode-id="7596" instrument_node="">
</span><p data-dcnode-id="7594"><span data-dcnode-id="7595" instrument_node="">In order to get the product right, you may want to consider experimenting with different designs and recipes until you find the perfect one. </span></p><span data-dcnode-id="7593" instrument_node="">
</span><p data-dcnode-id="7591"><span data-dcnode-id="7592" instrument_node="">Some founders choose to manufacture their product in-house so that they can control quality, manage costs, and easily handle production/logistics. </span></p><span data-dcnode-id="7590" instrument_node="">
</span><p data-dcnode-id="7588"><span data-dcnode-id="7589" instrument_node="">Down the road, you can always choose to outsource your balloon business.</span></p><span data-dcnode-id="7587" instrument_node="">
</span><div class="story-quote-container" data-dcnode-id="7538"><span data-dcnode-id="7586" instrument_node="">
</span><p data-dcnode-id="7584"><span data-dcnode-id="7585" instrument_node="">Leslie Eisen, founder of AlmondClear discusses how to manufacture products in house</span></p><span data-dcnode-id="7583" instrument_node="">
</span><blockquote data-dcnode-id="7566"><span data-dcnode-id="7582" instrument_node="">
</span><p data-dcnode-id="7580"><span data-dcnode-id="7581" instrument_node="">If you want to start a line of unique products, then you have two basic options: you can make them yourself, or you can find a manufacturer to work with that creates custom formulations for their clients.</span></p><span data-dcnode-id="7579" instrument_node="">
</span><div class="blockquote-share" data-dcnode-id="7567"><span data-dcnode-id="7578" instrument_node="">
</span><a data-dcnode-id="7576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3D%2522If%2520you%2520want%2520to%2520start%2520a%2520line%2520of%2520unique%2520products%2C%2520then%2520you%2520have%2520two%2520basic%2520options%3A%2520you%2520can%2520make%2520them%2520yourself%2C%2520or%2520you%2520can%2520find%2520a%2520manufacturer%2520to%2520work%2520with%2520that%2520creates%2520custom%2520formulations%2520for%2520their%2520clients.%2522%250A%250A%26url%3Dhttps%3A//www.starterstory.com/how-to-start-balloon-decor-business" target="_blank"><i class="fa fa-twitter" data-dcnode-id="7577"></i></a><span data-dcnode-id="7575" instrument_node="">
</span><a data-dcnode-id="7573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%3A//www.starterstory.com/how-to-start-balloon-decor-business" target="_blank"><i class="fa fa-facebook-square" data-dcnode-id="7574"></i></a><span data-dcnode-id="7572" instrument_node="">
</span><a data-dcnode-id="7570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/shareArticle%3Fmini%3Dtrue%26url%3Dhttps%3A//www.starterstory.com/how-to-start-balloon-decor-business" target="_blank"><i class="fa fa-linkedin-square" data-dcnode-id="7571"></i></a><span data-dcnode-id="7569" instrument_node="">
</span><div data-dcnode-id="7568"></div></div></blockquote><span data-dcnode-id="7565" instrument_node="">
</span><p data-dcnode-id="7563"><span data-dcnode-id="7564" instrument_node="">I knew that I was trying to build a larger-scale business and that the home-made model wasn’t right for me, so I had to find the right manufacturing partner. It took a lot of research, phone calls, and emails before I found the laboratory that met my needs.</span></p><span data-dcnode-id="7562" instrument_node="">
</span><p data-dcnode-id="7560"><span data-dcnode-id="7561" instrument_node="">I wanted to create unique products (as opposed to private label), so I worked with the manufacturer’s chemist who specializes in skin care formulations. This process takes some time!</span></p><span data-dcnode-id="7559" instrument_node="">
</span><p data-dcnode-id="7555"><strong data-dcnode-id="7557"><span data-dcnode-id="7558" instrument_node="">First, you have to tell the chemist what kind of product you’re looking for</span></strong><span data-dcnode-id="7556" instrument_node="">, the ingredients that you want to include or leave out, and what you want the final product to look like/feel like/smell like, etc.</span></p><span data-dcnode-id="7554" instrument_node="">
</span><p data-dcnode-id="7549"><span data-dcnode-id="7553" instrument_node="">Then, the manufacturer </span><strong data-dcnode-id="7551"><span data-dcnode-id="7552" instrument_node="">sends you the first sample</span></strong><span data-dcnode-id="7550" instrument_node="">, you try it out or give it to others to try, and then provide feedback for revisions. In my case, the first two products came together fairly easily because I only needed to make small changes to stock formulations.</span></p><span data-dcnode-id="7548" instrument_node="">
</span><p data-dcnode-id="7546"><span data-dcnode-id="7547" instrument_node="">There are many, many rules and regulations around cosmetics and skin care products. If you want to sell products that contain FDA regulated ingredients then you have to register and get a permit.</span></p><span data-dcnode-id="7545" instrument_node="">
</span><p data-dcnode-id="7543"><span data-dcnode-id="7544" instrument_node="">My products aren’t FDA regulated, so I didn’t have to go through this step, but I did have to be aware of the many guidelines and standards around labeling and safety warnings. Some people hire a lawyer to help them through this process, but my manufacturer was able to guide me through the regulatory process.</span></p><span data-dcnode-id="7542" instrument_node="">
</span><p data-dcnode-id="7540"><span data-dcnode-id="7541" instrument_node="">The entire process, from researching labs to work with to having the first finished products shipped out to me, took around six months.</span></p><span data-dcnode-id="7539" instrument_node="">
</span></div><span data-dcnode-id="7537" instrument_node="">
</span><div class="testimonial-by" data-dcnode-id="7521"><span data-dcnode-id="7536" instrument_node="">
</span><div class="answer" data-dcnode-id="7523" style="display: flex;"><span data-dcnode-id="7535" instrument_node="">
-
&nbsp;
</span><div class="article-bio" data-dcnode-id="7531" style="margin-right: 6px;"><span data-dcnode-id="7534" instrument_node="">
</span><div class="circular-image-bg" data-dcnode-id="7533" role="img" style="background-image: url(//s3.amazonaws.com/www.starterstory.com/starters/avatars/000/000/587/thumbnail/_z9t6817.jpeg?1620918884);"></div><span data-dcnode-id="7532" instrument_node="">
</span></div><span data-dcnode-id="7530" instrument_node="">
Leslie Eisen, on starting AlmondClear ($15,000/month)
</span><span data-dcnode-id="7525" style="margin-top: 0px; margin-left: 4px;"><span data-dcnode-id="7529" instrument_node="">
</span><a data-dcnode-id="7527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starterstory.com/stories/starting-a-skin-care-product-business-as-a-middle-school-teacher"><span data-dcnode-id="7528" instrument_node="">
full story ➜
</span></a><span data-dcnode-id="7526" instrument_node="">
</span></span><span data-dcnode-id="7524" instrument_node="">
</span></div><span data-dcnode-id="7522" instrument_node="">
</span></div><span data-dcnode-id="7520" instrument_node="">
</span><h3 data-dcnode-id="7518" id="purchasing-inventory-for-your-balloon-decor-business"><span data-dcnode-id="7519" instrument_node="">Purchasing Inventory For Your Balloon Decor Business</span></h3><span data-dcnode-id="7517" instrument_node="">
</span><p data-dcnode-id="7515"><span data-dcnode-id="7516" instrument_node="">When first starting out, it's important to start small with your overhead to get a gauge for what people want.</span></p><span data-dcnode-id="7514" instrument_node="">
</span><p data-dcnode-id="7512"><span data-dcnode-id="7513" instrument_node="">Just remember - if you order a line of items that don't sell, it's nearly impossible to recoup the money lost. </span></p><span data-dcnode-id="7511" instrument_node="">
</span><p data-dcnode-id="7509"><span data-dcnode-id="7510" instrument_node="">Buying the right inventory takes research and planning in order to get it right.</span></p><span data-dcnode-id="7508" instrument_node="">
</span><ol data-dcnode-id="7481"><span data-dcnode-id="7507" instrument_node="">
</span><li data-dcnode-id="7503"><strong data-dcnode-id="7505"><span data-dcnode-id="7506" instrument_node="">Identify your target audience</span></strong><span data-dcnode-id="7504" instrument_node="">: Identify the age, gender, annual income that you will be selling to. This is a defining factor in ordering the right inventory that will sell.</span></li><span data-dcnode-id="7502" instrument_node="">
</span><li data-dcnode-id="7498"><strong data-dcnode-id="7500"><span data-dcnode-id="7501" instrument_node="">Research your competition</span></strong><span data-dcnode-id="7499" instrument_node="">: Conduct market research and identify the different types of styles, price points, and materials being used. This will help you see what's trending and ways that you can improve/stay ahead of the competition.</span></li><span data-dcnode-id="7497" instrument_node="">
</span><li data-dcnode-id="7493"><strong data-dcnode-id="7495"><span data-dcnode-id="7496" instrument_node="">Create an inventory wishlist</span></strong><span data-dcnode-id="7494" instrument_node="">: Identify what you need for the launch of your business and create a budget that you will stay within. Remember, it's okay to start small. </span></li><span data-dcnode-id="7492" instrument_node="">
</span><li data-dcnode-id="7488"><strong data-dcnode-id="7490"><span data-dcnode-id="7491" instrument_node="">Find a supplier</span></strong><span data-dcnode-id="7489" instrument_node=""> Make sure to first compare prices and analyze different options.</span></li><span data-dcnode-id="7487" instrument_node="">
</span><li data-dcnode-id="7483"><strong data-dcnode-id="7485"><span data-dcnode-id="7486" instrument_node="">Delivery timing</span></strong><span data-dcnode-id="7484" instrument_node="">: Schedule the inventory delivery to match with seasonality and trending buying seasons</span></li><span data-dcnode-id="7482" instrument_node="">
</span></ol><span data-dcnode-id="7480" instrument_node="">
</span><p data-dcnode-id="7478"><span data-dcnode-id="7479" instrument_node="">Pro-tip: It's easy to become biased based on your own fashion preferences on what types of shoes/apparel to purchase. This is where a lot of fashion businesses go wrong. It's important to base purchase decisions on current buyer behavior, trends in the market, and specific to your niche.</span></p><span data-dcnode-id="7477" instrument_node="">
</span><div class="story-quote-container" data-dcnode-id="7425"><span data-dcnode-id="7476" instrument_node="">
</span><p data-dcnode-id="7473"><strong data-dcnode-id="7474"><span data-dcnode-id="7475" instrument_node="">Erin Hooley, founder of Bailey's Blossoms tells us how poor inventory projections led her to lose over $2M</span></strong></p><span data-dcnode-id="7472" instrument_node="">
</span><p data-dcnode-id="7470"><span data-dcnode-id="7471" instrument_node="">When we first launched Peyton Bre we did so in a social or direct sales model.</span></p><span data-dcnode-id="7469" instrument_node="">
</span><p data-dcnode-id="7465"><span data-dcnode-id="7468" instrument_node="">Through poor inventory projections we were </span><strong data-dcnode-id="7466"><span data-dcnode-id="7467" instrument_node="">forced to change models but only after losing $2 million dollars.</span></strong></p><span data-dcnode-id="7464" instrument_node="">
</span><p data-dcnode-id="7462"><span data-dcnode-id="7463" instrument_node="">It was a devastating time for us and one we were not sure we could survive.</span></p><span data-dcnode-id="7461" instrument_node="">
</span><p data-dcnode-id="7459"><span data-dcnode-id="7460" instrument_node="">I have since become very intentional about the way that we project our inventory needs and we continue to refine that quarterly and even monthly. We have created a KPI for the cost of goods sold to help us hold ourselves accountable.</span></p><span data-dcnode-id="7458" instrument_node="">
</span><blockquote data-dcnode-id="7441"><span data-dcnode-id="7457" instrument_node="">
</span><p data-dcnode-id="7455"><span data-dcnode-id="7456" instrument_node="">Ultimately, the better we manage our inventory the less we have need to discount and the healthier our profit margin becomes. </span></p><span data-dcnode-id="7454" instrument_node="">
</span><div class="blockquote-share" data-dcnode-id="7442"><span data-dcnode-id="7453" instrument_node="">
</span><a data-dcnode-id="7451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3D%2522Ultimately%2C%2520the%2520better%2520we%2520manage%2520our%2520inventory%2520the%2520less%2520we%2520have%2520need%2520to%2520discount%2520and%2520the%2520healthier%2520our%2520profit%2520margin%2520becomes.%2522%250A%250A%26url%3Dhttps%3A//www.starterstory.com/how-to-start-balloon-decor-business" target="_blank"><i class="fa fa-twitter" data-dcnode-id="7452"></i></a><span data-dcnode-id="7450" instrument_node="">

</span><p data-dcnode-id="7438"><span data-dcnode-id="7439" instrument_node="">This is, of course, a very high-level overview of the importance of inventory control.</span></p><span data-dcnode-id="7437" instrument_node="">

</span><h2 data-dcnode-id="7405" id="how-to-launch-your-balloon-decor-business"><span data-dcnode-id="7406" instrument_node="">🚀 How To Launch Your Balloon Decor Business</span></h2><span data-dcnode-id="7404" instrument_node="">
</span><p data-dcnode-id="7403"></p><div class="content-image-wrapper" data-dcnode-id="7401"><img alt="article" data-dcnode-id="7402" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//placid.app/u/mhpzkqpni%3F%26bg-img%3Dhttps%3A//i.imgur.com/hJ5Sm6V.jpg%26quote%3DHow%2520To%2520Launch%2520Your%2520Balloon%2520Decor%2520Business&amp;raw"></div><p data-dcnode-id="7400"></p><span data-dcnode-id="7399" instrument_node="">
</span><h3 data-dcnode-id="7397" id="build-a-website"><span data-dcnode-id="7398" instrument_node="">Build A Website</span></h3><span data-dcnode-id="7396" instrument_node="">
</span><p data-dcnode-id="7394"><span data-dcnode-id="7395" instrument_node="">Building a website is imperative when launching your business, and with the right tools in place, this can be a simple task to check off the list (without having to hire someone).</span></p><span data-dcnode-id="7393" instrument_node="">
</span><ol data-dcnode-id="7379"><span data-dcnode-id="7392" instrument_node="">
</span><li data-dcnode-id="7390"><span data-dcnode-id="7391" instrument_node="">Pick a domain name that's easy to remember and easy to type</span></li><span data-dcnode-id="7389" instrument_node="">
</span><li data-dcnode-id="7387"><span data-dcnode-id="7388" instrument_node="">Choose a Web Hosting Plan (ie. Shopify, Squarespace)</span></li><span data-dcnode-id="7386" instrument_node="">
</span><li data-dcnode-id="7384"><span data-dcnode-id="7385" instrument_node="">Make sure you choose the right theme and design</span></li><span data-dcnode-id="7383" instrument_node="">
</span><li data-dcnode-id="7381"><span data-dcnode-id="7382" instrument_node="">Implement the proper page structure (ie. about page, contact page, pricing etc)</span></li><span data-dcnode-id="7380" instrument_node="">
</span></ol><span data-dcnode-id="7378" instrument_node="">
</span><p data-dcnode-id="7373"><span data-dcnode-id="7377" instrument_node="">To learn more about how to build a stellar website with little stress, we give you all the details </span><a data-dcnode-id="7375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starterstory.com/how-to-build-a-website" target="_blank"><span data-dcnode-id="7376" instrument_node="">on this step-by-step guide</span></a><span data-dcnode-id="7374" instrument_node="">.</span></p><span data-dcnode-id="7372" instrument_node="">
</span><h3 data-dcnode-id="7370" id="web-design"><span data-dcnode-id="7371" instrument_node="">Web Design</span></h3><span data-dcnode-id="7369" instrument_node="">
</span><p data-dcnode-id="7367"><span data-dcnode-id="7368" instrument_node="">Once you have chosen the domain, web hosting, and platform, it's time to get started with the design phase.</span></p><span data-dcnode-id="7366" instrument_node="">
</span><p data-dcnode-id="7364"><span data-dcnode-id="7365" instrument_node="">Themes are a great way to produce the fundamental style and identity of your website - this includes everything from your font design to your blog post styles.</span></p><span data-dcnode-id="7363" instrument_node="">
</span><p data-dcnode-id="7361"><span data-dcnode-id="7362" instrument_node="">One of the best ways to get started is to simply explore the various themes (free or paid depending on what you're looking for) and test them on your site.</span></p><span data-dcnode-id="7360" instrument_node="">
</span><p data-dcnode-id="7358"><span data-dcnode-id="7359" instrument_node="">If web-design really isn't in the cards for you, you may want to consider outsourcing a web designer to help bring your vision and brand to life.</span></p><span data-dcnode-id="7357" instrument_node="">
</span><h3 data-dcnode-id="7355" id="launch-strategies-for-your-balloon-decor-business"><span data-dcnode-id="7356" instrument_node="">Launch Strategies For Your Balloon Decor Business</span></h3><span data-dcnode-id="7354" instrument_node="">
</span><p data-dcnode-id="7349"><span data-dcnode-id="7353" instrument_node="">There are various different ways you can </span><a data-dcnode-id="7351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starterstory.com/launch-your-business" target="_blank"><span data-dcnode-id="7352" instrument_node="">launch</span></a><span data-dcnode-id="7350" instrument_node=""> your balloon decor business successfully. </span></p><span data-dcnode-id="7348" instrument_node="">
</span><p data-dcnode-id="7346"><span data-dcnode-id="7347" instrument_node="">Here are a few different strategies to get customers excited about your balloon decor business. </span></p><span data-dcnode-id="7345" instrument_node="">
</span><ul data-dcnode-id="7318"><span data-dcnode-id="7344" instrument_node="">
</span><li data-dcnode-id="7340"><strong data-dcnode-id="7342"><span data-dcnode-id="7343" instrument_node="">Build hype with a landing page</span></strong><span data-dcnode-id="7341" instrument_node="">: you can effectively do this through waiting lists, discounts, countdown timer etc</span></li><span data-dcnode-id="7339" instrument_node="">
</span><li data-dcnode-id="7335"><strong data-dcnode-id="7337"><span data-dcnode-id="7338" instrument_node="">Create a teaser video</span></strong><span data-dcnode-id="7336" instrument_node="">: even just a 30 second video is a great way to exposure for your balloon decor business, and possibly even go viral</span></li><span data-dcnode-id="7334" instrument_node="">
</span><li data-dcnode-id="7330"><strong data-dcnode-id="7332"><span data-dcnode-id="7333" instrument_node="">Reach out to influencers</span></strong><span data-dcnode-id="7331" instrument_node="">: The right influencer for your product has the ability to reach your audience with just one post, and because of their loyal following, this could lead to a big return for you.</span></li><span data-dcnode-id="7329" instrument_node="">
</span><li data-dcnode-id="7325"><strong data-dcnode-id="7327"><span data-dcnode-id="7328" instrument_node="">Get Press</span></strong><span data-dcnode-id="7326" instrument_node="">: Whether you plan a PR stunt or get exposure through a popular news outlet, this is a great way to attract initial customers</span></li><span data-dcnode-id="7324" instrument_node="">
</span><li data-dcnode-id="7320"><strong data-dcnode-id="7322"><span data-dcnode-id="7323" instrument_node="">Launch on popular sites</span></strong><span data-dcnode-id="7321" instrument_node="">: A great way to get buzz about your balloon decor business is to submit your launch to popular startup sites. </span></li><span data-dcnode-id="7319" instrument_node="">
</span></ul><span data-dcnode-id="7317" instrument_node="">
</span><p data-dcnode-id="7315"><span data-dcnode-id="7316" instrument_node="">Here are a few popular sites to launch on: </span></p><span data-dcnode-id="7314" instrument_node="">
</span><ul data-dcnode-id="7296"><span data-dcnode-id="7313" instrument_node="">
</span><li data-dcnode-id="7310"><a data-dcnode-id="7311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//starterstory.com/tools/reddit" id="ss-not-verified-tool" target="_blank"><span data-dcnode-id="7312" instrument_node="">Reddit</span></a></li><span data-dcnode-id="7309" instrument_node="">
</span><li data-dcnode-id="7306"><a data-dcnode-id="7307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//starterstory.com/tools/product-hunt" id="ss-not-verified-tool" target="_blank"><span data-dcnode-id="7308" instrument_node="">ProductHunt</span></a></li><span data-dcnode-id="7305" instrument_node="">
</span><li data-dcnode-id="7302"><a data-dcnode-id="7303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//starterstory.com/tools/quora" id="ss-not-verified-tool" target="_blank"><span data-dcnode-id="7304" instrument_node="">Quora</span></a></li><span data-dcnode-id="7301" instrument_node="">
</span><li data-dcnode-id="7298"><a data-dcnode-id="7299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hackernews.com/" target="_blank"><span data-dcnode-id="7300" instrument_node="">Hacker News</span></a></li><span data-dcnode-id="7297" instrument_node="">
</span></ul><span data-dcnode-id="7295" instrument_node="">
</span><p data-dcnode-id="7291"><span data-dcnode-id="7294" instrument_node="">Learn more about how to launch your business successfully ➜ </span><a data-dcnode-id="7292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starterstory.com/launch-your-business" target="_blank"><span data-dcnode-id="7293" instrument_node="">here</span></a></p><span data-dcnode-id="7290" instrument_node="">
</span><p data-dcnode-id="7289"></p><p data-dcnode-id="7287"><span data-dcnode-id="7288" instrument_node="">Janeen Brown, founder of Balloon Haus LLC dives deep into the process of launching the business:</span></p><span data-dcnode-id="7286" instrument_node="">
</span><div class="story-quote-container" data-dcnode-id="7253"><span data-dcnode-id="7285" instrument_node="">
</span><p data-dcnode-id="7283"><span data-dcnode-id="7284" instrument_node="">The first three months were definitely a learning experience for me as we were still perfecting our craft, we worked on a lot of sponsorship partnerships and pro bono to get our names out to the public. We had customers but it took some time before we snagged corporate clients and public figures.</span></p><span data-dcnode-id="7282" instrument_node="">
</span><p data-dcnode-id="7280"><span data-dcnode-id="7281" instrument_node="">We launched with our website done, insurance, and company registration however, pre-launch we started posting on Instagram to build up engagement and traffic.</span></p><span data-dcnode-id="7279" instrument_node="">
</span><p data-dcnode-id="7276"><em data-dcnode-id="7277"><span data-dcnode-id="7278" instrument_node="">Balloon Haus Photoshoot, 2018</span></em></p><span data-dcnode-id="7275" instrument_node="">
</span><p data-dcnode-id="7273"><span data-dcnode-id="7274" instrument_node="">Luckily, the balloon industry has very low start-up costs allowing you to purchase supplies beforehand and practice without losing any money. This is one of those industries that you don’t have to take any type of financing out as the markups are high, you can generate a decent amount of money to use towards equipment by the time your target market is introduced to your company.</span></p><span data-dcnode-id="7272" instrument_node="">
</span><p data-dcnode-id="7270"><span data-dcnode-id="7271" instrument_node="">One suggestion I would have for anyone starting up, be selective of the sponsorships you agree to as, in the beginning, the ROI may not be what you expect but you will get the needed experience. Do not agree to work with everyone!</span></p><span data-dcnode-id="7269" instrument_node="">
</span><p data-dcnode-id="7267"><span data-dcnode-id="7268" instrument_node="">When we launched, many of the balloon companies that existed were not up to date with how to’s on garlands, arches, balloon mosaics that we were able to have somewhat of an advantage. We also implemented a consulting program for any prospective clients to understand the needs they had to ensure they received exactly what they wanted. We were also open for 24 hours, which allowed us to take more orders than the majority of our competition (this helped us get our name out faster).</span></p><span data-dcnode-id="7266" instrument_node="">
</span><p data-dcnode-id="7263"><em data-dcnode-id="7264"><span data-dcnode-id="7265" instrument_node="">First balloon Haus online ad - (February 2018)</span></em></p><span data-dcnode-id="7262" instrument_node="">
</span><p data-dcnode-id="7259"><em data-dcnode-id="7260"><span data-dcnode-id="7261" instrument_node="">First Balloon Haus Website - February 2018</span></em></p><span data-dcnode-id="7258" instrument_node="">
</span><p data-dcnode-id="7255"><em data-dcnode-id="7256"><span data-dcnode-id="7257" instrument_node="">September 2019, Atlanta, GA</span></em></p><span data-dcnode-id="7254" instrument_node="">

</span><h3 data-dcnode-id="7231" id="make-sure-you-get-the-package-design-right"><span data-dcnode-id="7232" instrument_node="">Make Sure You Get The Package Design Right</span></h3><span data-dcnode-id="7230" instrument_node="">
</span><p data-dcnode-id="7228"><span data-dcnode-id="7229" instrument_node="">The way you package your balloon decor business is often the first impression your customer has - so it's important to get it right.</span></p><span data-dcnode-id="7227" instrument_node="">
</span><p data-dcnode-id="7225"><span data-dcnode-id="7226" instrument_node="">You may want to ask yourself these questions:</span></p><span data-dcnode-id="7224" instrument_node="">
</span><p data-dcnode-id="7222"><span data-dcnode-id="7223" instrument_node="">If my product is on a shelf next to hundreds of other similar products:</span></p><span data-dcnode-id="7221" instrument_node="">
</span><ul data-dcnode-id="7213"><span data-dcnode-id="7220" instrument_node="">
</span><li data-dcnode-id="7218"><span data-dcnode-id="7219" instrument_node="">Will my balloon decor business stand out?</span></li><span data-dcnode-id="7217" instrument_node="">
</span><li data-dcnode-id="7215"><span data-dcnode-id="7216" instrument_node="">Will the branding/packaging create a connection with my customer, and hence, lead them to buy?</span></li><span data-dcnode-id="7214" instrument_node="">
</span></ul><span data-dcnode-id="7212" instrument_node="">
</span><p data-dcnode-id="7210"><span data-dcnode-id="7211" instrument_node="">There are hundreds of tools you can use to help with packaging and design:</span></p><span data-dcnode-id="7209" instrument_node="">
</span><ul data-dcnode-id="7187"><span data-dcnode-id="7208" instrument_node="">
</span><li data-dcnode-id="7204"><a data-dcnode-id="7206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//starterstory.com/go/canva" target="_blank"><span data-dcnode-id="7207" instrument_node="">Canva</span></a><span data-dcnode-id="7205" instrument_node=""> - Allows non-designers to create beautiful Instagram/Pinterest posts, flyers, business cards, etc. </span></li><span data-dcnode-id="7203" instrument_node="">
</span><li data-dcnode-id="7199"><a data-dcnode-id="7201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//starterstory.com/tools/stickermule" target="_blank"><span data-dcnode-id="7202" instrument_node="">Stickermule</span></a><span data-dcnode-id="7200" instrument_node=""> - High quality custom stickers you can include on or in your packaging. </span></li><span data-dcnode-id="7198" instrument_node="">
</span><li data-dcnode-id="7194"><a data-dcnode-id="7196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//noissue.co/" target="_blank"><span data-dcnode-id="7197" instrument_node="">Noissue</span></a><span data-dcnode-id="7195" instrument_node=""> - Custom tissue paper and compostable mailers </span></li><span data-dcnode-id="7193" instrument_node="">
