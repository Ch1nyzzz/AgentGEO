</span><p data-dcnode-id="7183"><span data-dcnode-id="7184" instrument_node="">Sheets &amp; Giggles explains the motive behind their "Premium Unboxing Experience"</span></p><span data-dcnode-id="7182" instrument_node="">
</span><p data-dcnode-id="7178"><span data-dcnode-id="7181" instrument_node="">I had a particular vision for our packaging centered around one goal: because we were a DTC company and wouldn’t do physical retail in year 1, </span><strong data-dcnode-id="7179"><span data-dcnode-id="7180" instrument_node="">we needed to focus entirely on an incredible unboxing experience that made the product feel as premium as possible.</span></strong></p><span data-dcnode-id="7177" instrument_node="">
</span><p data-dcnode-id="7173"><strong data-dcnode-id="7175"><span data-dcnode-id="7176" instrument_node="">Outside:</span></strong><span data-dcnode-id="7174" instrument_node=""> a white box, nice wax coating, logo front and center with no other copy, easy to open, nice and sturdy.</span></p><span data-dcnode-id="7172" instrument_node="">
</span><p data-dcnode-id="7168"><strong data-dcnode-id="7170"><span data-dcnode-id="7171" instrument_node="">Inside:</span></strong><span data-dcnode-id="7169" instrument_node=""> make people smile from the get-go, have a social call-to-action, include free extra surprises (a knapsack that wraps the sheets and an eye mask), put funny copy all over the place, and add a donation bag that people could use to donate their now-defunct cotton sheets (sheets &amp; blankets are the #2-most-requested item at shelters behind socks).</span></p><span data-dcnode-id="7167" instrument_node="">

</span><ul data-dcnode-id="7098"><span data-dcnode-id="7133" instrument_node="">
</span><li data-dcnode-id="7128"><span data-dcnode-id="7132" instrument_node="">Your own website! </span><a data-dcnode-id="7130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//starterstory.com/go/shopify" id="ss-not-verified-tool" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="7131" instrument_node="">Shopify</span></a><span data-dcnode-id="7129" instrument_node=""> is known to be the best for e-commerce stores</span></li><span data-dcnode-id="7127" instrument_node="">

</span><h4 data-dcnode-id="7095" id="etsy-tips-from-founders"><span data-dcnode-id="7096" instrument_node="">Etsy Tips From Founders</span></h4><span data-dcnode-id="7094" instrument_node="">
</span><p data-dcnode-id="7090"><a data-dcnode-id="7092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//starterstory.com/tools/etsy" id="ss-not-verified-tool" target="_blank"><span data-dcnode-id="7093" instrument_node="">Etsy</span></a><span data-dcnode-id="7091" instrument_node=""> is one of the most common marketplaces for this business type, however, there are some tips and tricks from other founders you'll want to consider prior to listing:</span></p><span data-dcnode-id="7089" instrument_node="">
</span><div class="story-quote-container" data-dcnode-id="7067"><span data-dcnode-id="7088" instrument_node="">
</span><p data-dcnode-id="7086"><span data-dcnode-id="7087" instrument_node="">Financially speaking, Etsy is a really great way to start a business because it’s essentially free until you start selling. It cost nothing to launch besides my 20 cent listing fees.</span></p><span data-dcnode-id="7085" instrument_node="">
</span><p data-dcnode-id="7080"><span data-dcnode-id="7084" instrument_node="">Etsy has been encouraging free shipping with a lot of pushback from sellers, </span><strong data-dcnode-id="7082"><span data-dcnode-id="7083" instrument_node="">but I built everything into our prices about a month ago and introduced free shipping shopwide</span></strong><span data-dcnode-id="7081" instrument_node="">, which seems to have improved conversion rates and search visibility already.</span></p><span data-dcnode-id="7079" instrument_node="">
</span><p data-dcnode-id="7078"></p><div class="content-image-wrapper" data-dcnode-id="7076"><img alt="article" data-dcnode-id="7077" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.amazonaws.com/www.starterstory.com/story_images/images/000/002/716/original/open-uri20190825-4-yf0mjv%3F1566706927&amp;raw"></div><p data-dcnode-id="7075"></p><span data-dcnode-id="7074" instrument_node="">
</span><p data-dcnode-id="7072"><span data-dcnode-id="7073" instrument_node="">I honestly attribute the bulk of my success to photography. I was a photographer first so obviously very lucky to have no issues launching with great images and it’s something I consistently produce.</span></p><span data-dcnode-id="7071" instrument_node="">
</span><p data-dcnode-id="7069"><span data-dcnode-id="7070" instrument_node="">With Etsy especially, there are a ton of mediocre amateur photos so it was an easy way to set myself apart from the start, and I don’t think Etsy themselves would feature my products and market them so often otherwise. We’re also able to compete fairly well on price because 80% of customers are American, and our dollar is much weaker.</span></p><span data-dcnode-id="7068" instrument_node="">
</span></div><span data-dcnode-id="7066" instrument_node="">

</span><p data-dcnode-id="7046"><span data-dcnode-id="7047" instrument_node="">One big mistake I’m seeing from other people selling handcrafted items is regarding Etsy. I’m seeing people do one of two things:</span></p><span data-dcnode-id="7045" instrument_node="">
</span><ol data-dcnode-id="7037"><span data-dcnode-id="7044" instrument_node="">
</span><li data-dcnode-id="7042"><span data-dcnode-id="7043" instrument_node="">Under-utilize the platform</span></li><span data-dcnode-id="7041" instrument_node="">
</span><li data-dcnode-id="7039"><span data-dcnode-id="7040" instrument_node="">They are solely using the platform</span></li><span data-dcnode-id="7038" instrument_node="">
</span></ol><span data-dcnode-id="7036" instrument_node="">
</span><p data-dcnode-id="7034"><span data-dcnode-id="7035" instrument_node="">What I mean by this is that I’m seeing a whole lot of handcrafters that only use Etsy because it’s easy. But referring people to an Etsy page as your webpage isn’t as professional as a dot com webpage, plus, Etsy’s fees are much higher than Shopify. Also, when Etsy makes changes to its marketing structure, I’ve seen people who have no other website get absolutely screwed and their shops go under.</span></p><span data-dcnode-id="7033" instrument_node="">
</span><p data-dcnode-id="7031"><span data-dcnode-id="7032" instrument_node="">The other camp is those that refuse to use Etsy at all. Etsy is a marketplace, with a built-in audience that is often searching for exactly the product you make! Both camps are making the mistake of not diversifying their markets. Use Etsy, it’s an amazing sales tool, but don’t rely on it solely.</span></p><span data-dcnode-id="7030" instrument_node="">
</span></div><span data-dcnode-id="7028" instrument_node="">

</span><h3 data-dcnode-id="7009" id="get-press-coverage-for-your-balloon-decor-business"><span data-dcnode-id="7010" instrument_node="">Get Press Coverage For Your Balloon Decor Business</span></h3><span data-dcnode-id="7008" instrument_node="">
</span><p data-dcnode-id="7006"><span data-dcnode-id="7007" instrument_node="">The more buzz around your brand - the more the phones ring, the more traffic to your website, and the more customers as a result.</span></p><span data-dcnode-id="7005" instrument_node="">
</span><p data-dcnode-id="7003"><span data-dcnode-id="7004" instrument_node="">Here are a few ways you can get press for your business: </span></p><span data-dcnode-id="7002" instrument_node="">
</span><p data-dcnode-id="6998"><strong data-dcnode-id="7000"><span data-dcnode-id="7001" instrument_node="">Press releases:</span></strong><span data-dcnode-id="6999" instrument_node=""> </span></p><span data-dcnode-id="6997" instrument_node="">
</span><p data-dcnode-id="6995"><span data-dcnode-id="6996" instrument_node="">Press releases are a great way to share big announcements or news, but in order to get any traction, you'll need to find a way to make your press release stand out amongst others.</span></p><span data-dcnode-id="6994" instrument_node="">
</span><p data-dcnode-id="6992"><span data-dcnode-id="6993" instrument_node="">Try to convey a story that really matters, not just to you, but to the reporter and to their audience.</span></p><span data-dcnode-id="6991" instrument_node="">
</span><p data-dcnode-id="6989"><span data-dcnode-id="6990" instrument_node="">Here are some things to consider when submitting a press release:</span></p><span data-dcnode-id="6988" instrument_node="">
</span><ul data-dcnode-id="6965"><span data-dcnode-id="6987" instrument_node="">
</span><li data-dcnode-id="6985"><span data-dcnode-id="6986" instrument_node="">Craft a catchy subject (keep it short and sweet).</span></li><span data-dcnode-id="6984" instrument_node="">
</span><li data-dcnode-id="6982"><span data-dcnode-id="6983" instrument_node="">Acknowledge the journalist's past work and interests - this is key!</span></li><span data-dcnode-id="6981" instrument_node="">
</span><li data-dcnode-id="6979"><span data-dcnode-id="6980" instrument_node="">Include the main point of the story in the first paragraph, heck, even the first sentence. Reporters want to hear the juice first and foremost.</span></li><span data-dcnode-id="6978" instrument_node="">
</span><li data-dcnode-id="6976"><span data-dcnode-id="6977" instrument_node="">Focus on the facts and try to limit the amount of jargon used.</span></li><span data-dcnode-id="6975" instrument_node="">
</span><li data-dcnode-id="6973"><span data-dcnode-id="6974" instrument_node="">Pitch yourself! Help them put a face to the story.</span></li><span data-dcnode-id="6972" instrument_node="">
</span><li data-dcnode-id="6970"><span data-dcnode-id="6971" instrument_node="">Make sure your topic is newsworthy. If it's not, find a way to!</span></li><span data-dcnode-id="6969" instrument_node="">
</span><li data-dcnode-id="6967"><span data-dcnode-id="6968" instrument_node="">Try not to include any attachments of your release!</span></li><span data-dcnode-id="6966" instrument_node="">
</span></ul><span data-dcnode-id="6964" instrument_node="">
</span><p data-dcnode-id="6962"><span data-dcnode-id="6963" instrument_node="">Email is one of the most effective and preferred way to send your press release, so as long as you keep your pitch brief, interesting and personalized (no cold emails), you should stand a chance!</span></p><span data-dcnode-id="6961" instrument_node="">
</span><p data-dcnode-id="6958"><strong data-dcnode-id="6959"><span data-dcnode-id="6960" instrument_node="">Get Press Using HARO</span></strong></p><span data-dcnode-id="6957" instrument_node="">
</span><p data-dcnode-id="6955"><span data-dcnode-id="6956" instrument_node="">HARO, otherwise known as "Help a Reporter Out" is an outlet for journalists to source upcoming stories and opportunities for media coverage.</span></p><span data-dcnode-id="6954" instrument_node="">
</span><p data-dcnode-id="6952"><span data-dcnode-id="6953" instrument_node="">The best part is, HARO is free to use! There are, of course, premium versions you can purchase, but the free version is still an accessible way to get press.</span></p><span data-dcnode-id="6951" instrument_node="">
</span><p data-dcnode-id="6949"><span data-dcnode-id="6950" instrument_node="">Once you set up an account, HARO essentially will email you based on stories (that are relevant to you) that need to be covered where you will then have a chance to essentially "bid on the story."</span></p><span data-dcnode-id="6948" instrument_node="">
</span><p data-dcnode-id="6946"><span data-dcnode-id="6947" instrument_node="">Here are some tips when crafting your pitch:</span></p><span data-dcnode-id="6945" instrument_node="">
</span><ul data-dcnode-id="6934"><span data-dcnode-id="6944" instrument_node="">
</span><li data-dcnode-id="6942"><span data-dcnode-id="6943" instrument_node="">Discuss your experience and expertise in the space. Make sure it's obvious why you're relevant to this story.</span></li><span data-dcnode-id="6941" instrument_node="">
</span><li data-dcnode-id="6939"><span data-dcnode-id="6940" instrument_node="">Answer the question in 3-4 sentences. Try and be as direct as possible</span></li><span data-dcnode-id="6938" instrument_node="">
</span><li data-dcnode-id="6936"><span data-dcnode-id="6937" instrument_node="">Offer to provide the reporter with more information and make sure to give them your contact info</span></li><span data-dcnode-id="6935" instrument_node="">
</span></ul><span data-dcnode-id="6933" instrument_node="">
</span><p data-dcnode-id="6930"><strong data-dcnode-id="6931"><span data-dcnode-id="6932" instrument_node="">Plan a Publicity Stunt</span></strong></p><span data-dcnode-id="6929" instrument_node="">
</span><p data-dcnode-id="6927"><span data-dcnode-id="6928" instrument_node="">Planning a publicity stunt is an effective and quick way to raise awareness for your brand and gain some traction from the press.</span></p><span data-dcnode-id="6926" instrument_node="">
</span><p data-dcnode-id="6924"><span data-dcnode-id="6925" instrument_node="">If you're looking to plan a stunt, the objective should be to be bold and create something memorable</span></p><span data-dcnode-id="6923" instrument_node="">
</span><p data-dcnode-id="6921"><span data-dcnode-id="6922" instrument_node="">However, being bold has a fine line - it's important that you consider the timing of your stunt to ensure you don't come off insensitive or unethical. For example, timing may not be in your favor if you plan something during the general election, or in most recent cases, a global pandemic.</span></p><span data-dcnode-id="6920" instrument_node="">
</span><p data-dcnode-id="6918"><span data-dcnode-id="6919" instrument_node="">In order to measure the success of your stunt, it's important that you first determine your end goal, for example:</span></p><span data-dcnode-id="6917" instrument_node="">
</span><ul data-dcnode-id="6906"><span data-dcnode-id="6916" instrument_node="">
</span><li data-dcnode-id="6914"><span data-dcnode-id="6915" instrument_node="">Is the stunt aimed to raise money for your business or a particular organization?</span></li><span data-dcnode-id="6913" instrument_node="">
</span><li data-dcnode-id="6911"><span data-dcnode-id="6912" instrument_node="">Is the stunt aimed to drive more traffic to your website?</span></li><span data-dcnode-id="6910" instrument_node="">
</span><li data-dcnode-id="6908"><span data-dcnode-id="6909" instrument_node="">Is the stunt aimed to get more followers and engagement on Instagram?</span></li><span data-dcnode-id="6907" instrument_node="">
</span></ul><span data-dcnode-id="6905" instrument_node="">
</span><p data-dcnode-id="6903"><span data-dcnode-id="6904" instrument_node="">Here are a few tips for creating a great publicity stunt:</span></p><span data-dcnode-id="6902" instrument_node="">
</span><ul data-dcnode-id="6885"><span data-dcnode-id="6901" instrument_node="">
</span><li data-dcnode-id="6899"><span data-dcnode-id="6900" instrument_node="">Research to ensure that there haven't been similar stunts done in the past by other businesses - this could easily turn off journalists and your audience.</span></li><span data-dcnode-id="6898" instrument_node="">
</span><li data-dcnode-id="6896"><span data-dcnode-id="6897" instrument_node="">Make sure you can explain the stunt in one headline - this will help grab the media's attention. In other words, simplify!</span></li><span data-dcnode-id="6895" instrument_node="">
</span><li data-dcnode-id="6893"><span data-dcnode-id="6894" instrument_node="">The stunt should be related to the product you are promoting. Even if the stunt is a success in terms of viewers, but it doesn't tie back to your original goal, then it's not useful.</span></li><span data-dcnode-id="6892" instrument_node="">
</span><li data-dcnode-id="6890"><span data-dcnode-id="6891" instrument_node="">Keep the stunt visual with videos/images.</span></li><span data-dcnode-id="6889" instrument_node="">
</span><li data-dcnode-id="6887"><span data-dcnode-id="6888" instrument_node="">Leverage the internet and social media platforms for your stunt by sharing your message across a variety of audiences. This will help with word of mouth and the overall success of your event.</span></li><span data-dcnode-id="6886" instrument_node="">
</span></ul><span data-dcnode-id="6884" instrument_node="">
</span><p data-dcnode-id="6879"><span data-dcnode-id="6883" instrument_node="">To learn other strategies on how to get press, check out our full guide </span><a data-dcnode-id="6881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starterstory.com/how-to-get-press-coverage" target="_blank"><span data-dcnode-id="6882" instrument_node="">here</span></a><span data-dcnode-id="6880" instrument_node="">.</span></p><span data-dcnode-id="6878" instrument_node="">
</span><h2 data-dcnode-id="6876" id="how-to-grow-your-balloon-decor-business"><span data-dcnode-id="6877" instrument_node="">🌱 How To Grow Your Balloon Decor Business</span></h2><span data-dcnode-id="6875" instrument_node="">
</span><p data-dcnode-id="6874"></p><div class="content-image-wrapper" data-dcnode-id="6872"><img alt="article" data-dcnode-id="6873" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//placid.app/u/mhpzkqpni%3F%26bg-img%3Dhttps%3A//i.imgur.com/hJ5Sm6V.jpg%26quote%3DHow%2520To%2520Grow%2520Your%2520Balloon%2520Decor%2520Business&amp;raw"></div><p data-dcnode-id="6871"></p><span data-dcnode-id="6870" instrument_node="">
</span><h3 data-dcnode-id="6868" id="consider-selling-on-amazon"><span data-dcnode-id="6869" instrument_node="">Consider Selling On Amazon</span></h3><span data-dcnode-id="6867" instrument_node="">
</span><p data-dcnode-id="6865"><span data-dcnode-id="6866" instrument_node="">In addition to selling your products directly on your site, you may want to consider selling on Amazon to reach a wider audience and attract new customers. </span></p><span data-dcnode-id="6864" instrument_node="">
</span><p data-dcnode-id="6862"><span data-dcnode-id="6863" instrument_node="">Here are some pros and cons of selling on amazon:</span></p><span data-dcnode-id="6861" instrument_node="">
</span><p data-dcnode-id="6858"><strong data-dcnode-id="6859"><span data-dcnode-id="6860" instrument_node="">Pros</span></strong></p><span data-dcnode-id="6857" instrument_node="">
</span><ul data-dcnode-id="6846"><span data-dcnode-id="6856" instrument_node="">
</span><li data-dcnode-id="6854"><span data-dcnode-id="6855" instrument_node="">Easy and seamless process to get your product listed on Amazon</span></li><span data-dcnode-id="6853" instrument_node="">
</span><li data-dcnode-id="6851"><span data-dcnode-id="6852" instrument_node="">There are roughly 100 million thoroughly committed prime customers, so you're bound to tap into new business</span></li><span data-dcnode-id="6850" instrument_node="">
</span><li data-dcnode-id="6848"><span data-dcnode-id="6849" instrument_node="">Can help grow your business exponentially and reach new audiences</span></li><span data-dcnode-id="6847" instrument_node="">
</span></ul><span data-dcnode-id="6845" instrument_node="">
</span><p data-dcnode-id="6842"><strong data-dcnode-id="6843"><span data-dcnode-id="6844" instrument_node="">Cons</span></strong></p><span data-dcnode-id="6841" instrument_node="">
</span><ul data-dcnode-id="6827"><span data-dcnode-id="6840" instrument_node="">
</span><li data-dcnode-id="6838"><span data-dcnode-id="6839" instrument_node="">You may encounter some "copycats" and counterfeit products</span></li><span data-dcnode-id="6837" instrument_node="">
</span><li data-dcnode-id="6835"><span data-dcnode-id="6836" instrument_node="">Amazon owns the relationship with the customer (you lose control over product reviews + customer service)</span></li><span data-dcnode-id="6834" instrument_node="">
</span><li data-dcnode-id="6832"><span data-dcnode-id="6833" instrument_node="">If you already have a low-markup, amazon may not wrth your while and you could end up losing money</span></li><span data-dcnode-id="6831" instrument_node="">
</span><li data-dcnode-id="6829"><span data-dcnode-id="6830" instrument_node="">Commissions and listing fees are high - it's easy to lose control of your offering</span></li><span data-dcnode-id="6828" instrument_node="">
</span></ul><span data-dcnode-id="6826" instrument_node="">
</span><p data-dcnode-id="6821"><span data-dcnode-id="6825" instrument_node="">Follow </span><a data-dcnode-id="6823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sell.amazon.com/sell.html" target="_blank"><span data-dcnode-id="6824" instrument_node="">these instructions</span></a><span data-dcnode-id="6822" instrument_node=""> to get your product listed on Amazon or check out the video below on how to get started:</span></p><span data-dcnode-id="6820" instrument_node="">
</span><p data-dcnode-id="6819"></p><div class="video_wrapper youtube-scroll-579" data-dcnode-id="6815"><span data-dcnode-id="6818" instrument_node="">
</span><iframe class="video-311" data-dcnode-id="6817" data-src="https://www.youtube.com/embed/uKunnxaNAsU" height="349" width="560"></iframe><span data-dcnode-id="6816" instrument_node="">
</span></div><span data-dcnode-id="6814" instrument_node="">
</span><span data-dcnode-id="6811" instrument_node="">
</span><p data-dcnode-id="6810"></p><span data-dcnode-id="6809" instrument_node="">
</span><div class="story-quote-container" data-dcnode-id="6712"><span data-dcnode-id="6808" instrument_node="">
</span><p data-dcnode-id="6805"><strong data-dcnode-id="6806"><span data-dcnode-id="6807" instrument_node="">Cory Stout, founder of Woodies ($250K/mo) provides us with specifics on how to rank better on amazon:</span></strong></p><span data-dcnode-id="6804" instrument_node="">
</span><p data-dcnode-id="6802"><span data-dcnode-id="6803" instrument_node="">Our main product is walnut wood sunglasses that I sell for $25 on Amazon and Woodies.com.</span></p><span data-dcnode-id="6801" instrument_node="">
</span><p data-dcnode-id="6794"><span data-dcnode-id="6800" instrument_node="">I dedicated myself to becoming an Amazon expert. I listened to all the podcasts and read all the blog posts I could find. </span><em data-dcnode-id="6796"><span data-dcnode-id="6799" instrument_node="">Shoutout </span><a data-dcnode-id="6797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecomcrew.com/" target="_blank"><span data-dcnode-id="6798" instrument_node="">EcomCrew</span></a></em><span data-dcnode-id="6795" instrument_node=""> I took the basic fundamentals that are out there and I added a couple of my own twists.</span></p><span data-dcnode-id="6793" instrument_node="">
</span><p data-dcnode-id="6791"><span data-dcnode-id="6792" instrument_node="">Amazon brings me, 100 brand new customers, every day for very little acquisition cost. If I tried that on my own, it would take a TON of work and it wouldn’t be nearly as effective as Amazon, so I took the easy road on this one.</span></p><span data-dcnode-id="6790" instrument_node="">
</span><p data-dcnode-id="6785"><span data-dcnode-id="6789" instrument_node="">Here's an </span><a data-dcnode-id="6787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddit.com/r/Entrepreneur/comments/7hi027/how_to_rank_better_on_amazon_30_tips/" target="_blank"><span data-dcnode-id="6788" instrument_node="">article</span></a><span data-dcnode-id="6786" instrument_node=""> I wrote on how to rank better on amazon (30+ Tips):</span></p><span data-dcnode-id="6784" instrument_node="">
</span><p data-dcnode-id="6781"><strong data-dcnode-id="6782"><span data-dcnode-id="6783" instrument_node="">5/5: ESSENTIAL</span></strong></p><span data-dcnode-id="6780" instrument_node="">
</span><ul data-dcnode-id="6754"><span data-dcnode-id="6779" instrument_node="">
</span><li data-dcnode-id="6774"><span data-dcnode-id="6778" instrument_node="">Beautiful images (minimum 5 images) especially lifestyle images I use </span><a data-dcnode-id="6776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upgradedimages.com/" target="_blank"><span data-dcnode-id="6777" instrument_node="">UpgradedImages.com</span></a><span data-dcnode-id="6775" instrument_node=""> for product photography (hey Ken!)</span></li><span data-dcnode-id="6773" instrument_node="">
</span><li data-dcnode-id="6771"><span data-dcnode-id="6772" instrument_node="">Keywords in your title (but it still needs to sound human)</span></li><span data-dcnode-id="6770" instrument_node="">
</span><li data-dcnode-id="6768"><span data-dcnode-id="6769" instrument_node="">Competitive price (contributes to high conversion rate)</span></li><span data-dcnode-id="6767" instrument_node="">
</span><li data-dcnode-id="6765"><span data-dcnode-id="6766" instrument_node="">NOT having 1-star reviews</span></li><span data-dcnode-id="6764" instrument_node="">
</span><li data-dcnode-id="6762"><span data-dcnode-id="6763" instrument_node="">DON'T STOCKOUT: it's such a killer and if you DO stockout, definitely DON'T raise your price right before you do, if anything LOWER your price for the last 10-20 units before you stockout, each ASIN has a 'memory' for when you do get back in stock so that will help you regain ranking quickly</span></li><span data-dcnode-id="6761" instrument_node="">
</span><li data-dcnode-id="6759"><span data-dcnode-id="6760" instrument_node="">DON'T VIOLATE AMAZON TOS: just don't</span></li><span data-dcnode-id="6758" instrument_node="">
</span><li data-dcnode-id="6756"><span data-dcnode-id="6757" instrument_node="">Perform QC on your stock before you send it in (I sent in a wrong box once and I had to 'remove' over 3,000 pieces so I could sift through them and remove the 150 contaminated pieces 0/7 would not recommend</span></li><span data-dcnode-id="6755" instrument_node="">
</span></ul><span data-dcnode-id="6753" instrument_node="">
</span><p data-dcnode-id="6750"><strong data-dcnode-id="6751"><span data-dcnode-id="6752" instrument_node="">4/5: Pretty Friggin Important</span></strong></p><span data-dcnode-id="6749" instrument_node="">
</span><ul data-dcnode-id="6720"><span data-dcnode-id="6748" instrument_node="">
</span><li data-dcnode-id="6746"><span data-dcnode-id="6747" instrument_node="">Minimum 10 5-star reviews (do this before you do anything below this)</span></li><span data-dcnode-id="6745" instrument_node="">
</span><li data-dcnode-id="6740"><span data-dcnode-id="6744" instrument_node="">Well optimized PPC campaigns (could do a whole post on this, keep ACOS under 40%) </span><a data-dcnode-id="6742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imgur.com/a/8RYTK" target="_blank"><span data-dcnode-id="6743" instrument_node="">here's a screenshot</span></a><span data-dcnode-id="6741" instrument_node=""> of some of my campaigns I use a combination of manual campaigns with exact phrases and high bids...and auto campaigns with a broad range of products and very low bids</span></li><span data-dcnode-id="6739" instrument_node="">
</span><li data-dcnode-id="6737"><span data-dcnode-id="6738" instrument_node="">Turning on FeedbackGenius for auto review requests (it's not as good as it used to be, but it's still worth it)</span></li><span data-dcnode-id="6736" instrument_node="">
</span><li data-dcnode-id="6734"><span data-dcnode-id="6735" instrument_node="">Get a trademark and get Brand Registry, this protects you from hijackers and other unscrupulous sellers</span></li><span data-dcnode-id="6733" instrument_node="">
</span><li data-dcnode-id="6728"><span data-dcnode-id="6732" instrument_node="">Quick response to customer messages (under 12 hours) </span><a data-dcnode-id="6730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imgur.com/a/ER95J" target="_blank"><span data-dcnode-id="6731" instrument_node="">here are my stats</span></a><span data-dcnode-id="6729" instrument_node=""> my mom does all my customer service "Employee of the Year" status</span></li><span data-dcnode-id="6727" instrument_node="">
</span><li data-dcnode-id="6725"><span data-dcnode-id="6726" instrument_node="">Drive outside traffic (amazon loves outside traffic because they don't have to spend so much to acquire customers) Facebook, Instagram, and Google Adwords are the usual suspects</span></li><span data-dcnode-id="6724" instrument_node="">
</span><li data-dcnode-id="6722"><span data-dcnode-id="6723" instrument_node="">Use ocean shipping to save mucho $$$ on unit costs (use flexport)</span></li><span data-dcnode-id="6721" instrument_node="">
</span></ul><span data-dcnode-id="6719" instrument_node="">
</span><p data-dcnode-id="6714"><span data-dcnode-id="6718" instrument_node="">Read more about amazon tips </span><a data-dcnode-id="6716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddit.com/r/Entrepreneur/comments/7hi027/how_to_rank_better_on_amazon_30_tips/" target="_blank"><span data-dcnode-id="6717" instrument_node="">here</span></a><span data-dcnode-id="6715" instrument_node="">.</span></p><span data-dcnode-id="6713" instrument_node="">
</span></div><span data-dcnode-id="6711" instrument_node="">
</span><div class="testimonial-by" data-dcnode-id="6695"><span data-dcnode-id="6710" instrument_node="">
</span><div class="answer" data-dcnode-id="6697" style="display: flex;"><span data-dcnode-id="6709" instrument_node="">

</span><h3 data-dcnode-id="6692" id="consider-working-with-instagram-influencers"><span data-dcnode-id="6693" instrument_node="">Consider Working With Instagram Influencers</span></h3><span data-dcnode-id="6691" instrument_node="">
</span><p data-dcnode-id="6689"><span data-dcnode-id="6690" instrument_node="">Partnering with like-minded influencers (within your industry) is one of the most effective ways to grow your social media organically.</span></p><span data-dcnode-id="6688" instrument_node="">
</span><p data-dcnode-id="6686"><span data-dcnode-id="6687" instrument_node="">Industry influencers already have an established and loyal following. With one post, your product immediately establishes a connection with a brand new audience. It's that powerful.</span></p><span data-dcnode-id="6685" instrument_node="">
</span><p data-dcnode-id="6683"><span data-dcnode-id="6684" instrument_node="">When finding influencers to promote your product, do your research and make sure that their following will actually be interested in your product.</span></p><span data-dcnode-id="6682" instrument_node="">
</span><p data-dcnode-id="6680"><span data-dcnode-id="6681" instrument_node="">It's easy to be blinded by any influencer with a huge following, but if those followers don't resonate with your product, there may not be any value there... so make sure you do your research!</span></p><span data-dcnode-id="6679" instrument_node="">
</span><div class="story-quote-container" data-dcnode-id="6643"><span data-dcnode-id="6678" instrument_node="">
</span><p data-dcnode-id="6675"><strong data-dcnode-id="6676"><span data-dcnode-id="6677" instrument_node="">Evan Marshall, founder of Plain Jane discusses how "micro-influencers" have impacted his business:</span></strong></p><span data-dcnode-id="6674" instrument_node="">
</span><p data-dcnode-id="6672"><span data-dcnode-id="6673" instrument_node="">Influencer marketing has been huge for us. Our approach is pretty simple. We give out samples of our products and ask people to post about us on social media aka a micro-influencer strategy.</span></p><span data-dcnode-id="6671" instrument_node="">
</span><p data-dcnode-id="6669"><span data-dcnode-id="6670" instrument_node="">We really like this approach because we get authentic stories and content. We cannot really control the messaging so the product has to speak for itself. We don’t really take product photos at all. Our customers take the photos and we ask to reuse them.</span></p><span data-dcnode-id="6668" instrument_node="">
</span><blockquote data-dcnode-id="6651"><span data-dcnode-id="6667" instrument_node="">
</span><p data-dcnode-id="6665"><span data-dcnode-id="6666" instrument_node="">With any influencer strategy, you have to be very sure you’re targeting the right people and engaging with them. You can make sure you’re targeting the right influencers by looking through their posts and then looking through the profiles of their engaged followers.</span></p><span data-dcnode-id="6664" instrument_node="">
</span><div class="blockquote-share" data-dcnode-id="6652"><span data-dcnode-id="6663" instrument_node="">
</span><a data-dcnode-id="6661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3D%2522With%2520any%2520influencer%2520strategy%2C%2520you%2520have%2520to%2520be%2520very%2520sure%2520you%25E2%2580%2599re%2520targeting%2520the%2520right%2520people%2520and%2520engaging%2520with%2520them.%2520You%2520can%2520make%2520sure%2520you%25E2%2580%2599re%2520targeting%2520the%2520right%2520influencers%2520by%2520looking%2520through%2520their%2520posts%2520and%2520then%2520looking%2520through%2520the%2520profiles%2520of%2520their%2520engaged%2520followers.%2522%250A%250A%26url%3Dhttps%3A//www.starterstory.com/how-to-start-balloon-decor-business" target="_blank"><i class="fa fa-twitter" data-dcnode-id="6662"></i></a><span data-dcnode-id="6660" instrument_node="">
</span><a data-dcnode-id="6658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%3A//www.starterstory.com/how-to-start-balloon-decor-business" target="_blank"><i class="fa fa-facebook-square" data-dcnode-id="6659"></i></a><span data-dcnode-id="6657" instrument_node="">
</span><a data-dcnode-id="6655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/shareArticle%3Fmini%3Dtrue%26url%3Dhttps%3A//www.starterstory.com/how-to-start-balloon-decor-business" target="_blank"><i class="fa fa-linkedin-square" data-dcnode-id="6656"></i></a><span data-dcnode-id="6654" instrument_node="">
</span><div data-dcnode-id="6653"></div></div></blockquote><span data-dcnode-id="6650" instrument_node="">
</span><p data-dcnode-id="6648"><span data-dcnode-id="6649" instrument_node="">It takes more time per influencer but the payoff is certainly worth it. Make sure their followers look like your existing customers.</span></p><span data-dcnode-id="6647" instrument_node="">
</span><p data-dcnode-id="6645"><span data-dcnode-id="6646" instrument_node="">It takes a ton of time and work to grow a social media following this way but it’s worth it. Other accounts have tried to grow themselves through botting or other manipulations. As a CBD company, we didn’t want to give Instagram any reason to shutdown our account so we’ve done everything through content and real engagement. It’s not magic to make this happen. You just have to post consistently and then reply or like every single comment you get. It takes months but it works</span></p><span data-dcnode-id="6644" instrument_node="">
</span></div><span data-dcnode-id="6642" instrument_node="">
</span><div class="testimonial-by" data-dcnode-id="6626"><span data-dcnode-id="6641" instrument_node="">
</span><div class="answer" data-dcnode-id="6628" style="display: flex;"><span data-dcnode-id="6640" instrument_node="">

</span><h3 data-dcnode-id="6623" id="experiment-with-pay-per-click-ads-ppc"><span data-dcnode-id="6624" instrument_node="">Experiment With Pay Per Click Ads (PPC)</span></h3><span data-dcnode-id="6622" instrument_node="">
</span><p data-dcnode-id="6620"><span data-dcnode-id="6621" instrument_node="">Pay-per-click (PPC) is a performance-based marketing method that allows you to show specific ads for services or products oriented to a very defined target, with the goal that the user visits your website or landing page.</span></p><span data-dcnode-id="6619" instrument_node="">
</span><p data-dcnode-id="6617"><span data-dcnode-id="6618" instrument_node="">Here are some tips to consider:</span></p><span data-dcnode-id="6616" instrument_node="">
</span><ul data-dcnode-id="6605"><span data-dcnode-id="6615" instrument_node="">
</span><li data-dcnode-id="6613"><span data-dcnode-id="6614" instrument_node="">Consider connecting the ad to your corresponding landing page so that the audience receives the necessary information after clicking on the ad.</span></li><span data-dcnode-id="6612" instrument_node="">
</span><li data-dcnode-id="6610"><span data-dcnode-id="6611" instrument_node="">Conversion Tracking: When running PPC campaigns, be sure to run the ads with conversion tracking.</span></li><span data-dcnode-id="6609" instrument_node="">
</span><li data-dcnode-id="6607"><span data-dcnode-id="6608" instrument_node="">Focus on quality keywords, even if there are few as this will save you time and money. When assessing the performance of a keyword, it's important to track the expense, conversion, and cost per conversion, as well as the ROI. </span></li><span data-dcnode-id="6606" instrument_node="">
</span></ul><span data-dcnode-id="6604" instrument_node="">
</span><p data-dcnode-id="6602"><span data-dcnode-id="6603" instrument_node="">PPC advertising can be a very important lead generator as long as it's done properly. Your PPC campaign is intended to drive traffic to your website and help the business scale.</span></p><span data-dcnode-id="6601" instrument_node="">
</span><p data-dcnode-id="6599"><span data-dcnode-id="6600" instrument_node="">Additionally, if the campaign is not having the desired results, you can make the necessary changes immediately to improve them.</span></p><span data-dcnode-id="6598" instrument_node="">
</span><div class="story-quote-container" data-dcnode-id="6556"><span data-dcnode-id="6597" instrument_node="">
</span><p data-dcnode-id="6594"><strong data-dcnode-id="6595"><span data-dcnode-id="6596" instrument_node="">Ryan Schortmann, founder of Display Pros talks about their investment in PPC Ads:</span></strong></p><span data-dcnode-id="6593" instrument_node="">
</span><p data-dcnode-id="6591"><span data-dcnode-id="6592" instrument_node="">My name is Ryan Schortmann and I’m the founder of Display Pros. We are a custom trade show display booth company offering easy to use portable display “kits” for small and medium businesses wanting to get into the trade show game.</span></p><span data-dcnode-id="6590" instrument_node="">
</span><p data-dcnode-id="6588"><span data-dcnode-id="6589" instrument_node="">It did not take long to come to the realization that to compete at any reasonable level, we were going to need to take the plunge and invest in Pay Per Click ads and display. </span></p><span data-dcnode-id="6587" instrument_node="">
</span><p data-dcnode-id="6585"><span data-dcnode-id="6586" instrument_node="">From experience, I know that it is important to give Google’s hivemind some time to settle in before each campaign starts seeing consistent results (this is largely dependent on budget). </span></p><span data-dcnode-id="6584" instrument_node="">
</span><blockquote data-dcnode-id="6567"><span data-dcnode-id="6583" instrument_node="">
</span><p data-dcnode-id="6581"><span data-dcnode-id="6582" instrument_node="">A certain amount of PPC budget must be viewed as a “marketing research” expense and then you can look at the analytics data and make informed decisions on where to refine, tweak or plain scrap an idea.</span></p><span data-dcnode-id="6580" instrument_node="">
</span><div class="blockquote-share" data-dcnode-id="6568"><span data-dcnode-id="6579" instrument_node="">
</span><a data-dcnode-id="6577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3D%2522A%2520certain%2520amount%2520of%2520PPC%2520budget%2520must%2520be%2520viewed%2520as%2520a%2520%25E2%2580%259Cmarketing%2520research%25E2%2580%259D%2520expense%2520and%2520then%2520you%2520can%2520look%2520at%2520the%2520analytics%2520data%2520and%2520make%2520informed%2520decisions%2520on%2520where%2520to%2520refine%2C%2520tweak%2520or%2520plain%2520scrap%2520an%2520idea.%2522%250A%250A%26url%3Dhttps%3A//www.starterstory.com/how-to-start-balloon-decor-business" target="_blank"><i class="fa fa-twitter" data-dcnode-id="6578"></i></a><span data-dcnode-id="6576" instrument_node="">
</span><a data-dcnode-id="6574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%3A//www.starterstory.com/how-to-start-balloon-decor-business" target="_blank"><i class="fa fa-facebook-square" data-dcnode-id="6575"></i></a><span data-dcnode-id="6573" instrument_node="">
</span><a data-dcnode-id="6571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/shareArticle%3Fmini%3Dtrue%26url%3Dhttps%3A//www.starterstory.com/how-to-start-balloon-decor-business" target="_blank"><i class="fa fa-linkedin-square" data-dcnode-id="6572"></i></a><span data-dcnode-id="6570" instrument_node="">
</span><div data-dcnode-id="6569"></div></div></blockquote><span data-dcnode-id="6566" instrument_node="">
</span><p data-dcnode-id="6564"><span data-dcnode-id="6565" instrument_node="">Google Shopping was an entirely new concept for me. You can’t assign keywords to products so at first, I was asking myself “How the hell do you refine these?”. Then I found some good reading material and courses and learned of some advanced methods that the pros are using. It turns out you can utilize negative keyword lists combined with the priority setting on each shopping campaign to “shape” the keywords that are coming in and how much you are spending on them.</span></p><span data-dcnode-id="6563" instrument_node="">
</span><p data-dcnode-id="6558"><span data-dcnode-id="6562" instrument_node="">To learn more about PPC Ads and Google Shopping, check out </span><a data-dcnode-id="6560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/exEGUJYN6Uw" target="_blank"><span data-dcnode-id="6561" instrument_node="">this video</span></a><span data-dcnode-id="6559" instrument_node=""> to learn everything you need to know!</span></p><span data-dcnode-id="6557" instrument_node="">

</span><h3 data-dcnode-id="6536" id="improve-your-seo"><span data-dcnode-id="6537" instrument_node="">Improve your SEO</span></h3><span data-dcnode-id="6535" instrument_node="">
</span><p data-dcnode-id="6530"><span data-dcnode-id="6534" instrument_node="">SEO is not just about driving traffic to your site, it's about </span><a data-dcnode-id="6532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starterstory.com/seo" target="_blank"><span data-dcnode-id="6533" instrument_node="">driving the RIGHT traffic to your site</span></a><span data-dcnode-id="6531" instrument_node="">, and ultimately, converting leads into customers.</span></p><span data-dcnode-id="6529" instrument_node="">
</span><p data-dcnode-id="6527"><span data-dcnode-id="6528" instrument_node="">One of the most important aspects of SEO is understanding what your customers are searching for, otherwise known as "keyword research."</span></p><span data-dcnode-id="6526" instrument_node="">
</span><p data-dcnode-id="6524"><span data-dcnode-id="6525" instrument_node="">Here are some tools that can help you choose the right keywords for your balloon decor business. </span></p><span data-dcnode-id="6523" instrument_node="">
</span><ul data-dcnode-id="6503"><span data-dcnode-id="6522" instrument_node="">
</span><li data-dcnode-id="6518"><a data-dcnode-id="6520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ads.google.com/intl/en_au/home/tools/keyword-planner/" target="_blank"><span data-dcnode-id="6521" instrument_node="">Google Ads Keyword Planner</span></a><span data-dcnode-id="6519" instrument_node=""> invaluable for discovering search trends.</span></li><span data-dcnode-id="6517" instrument_node="">
</span><li data-dcnode-id="6513"><a data-dcnode-id="6515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//search.google.com/search-console/about" target="_blank"><span data-dcnode-id="6516" instrument_node="">Google Search Console</span></a><span data-dcnode-id="6514" instrument_node=""> is very helpful once your website is up as it shows you what words/phrases are generating traffic.</span></li><span data-dcnode-id="6512" instrument_node="">
</span><li data-dcnode-id="6505"><a data-dcnode-id="6510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//starterstory.com/tools/ahrefs" id="ss-not-verified-tool" target="_blank"><span data-dcnode-id="6511" instrument_node="">Ahrefs</span></a><span data-dcnode-id="6509" instrument_node=""> and </span><a data-dcnode-id="6507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//starterstory.com/go/sem-rush" id="ss-not-verified-tool" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="6508" instrument_node="">SEMRush</span></a><span data-dcnode-id="6506" instrument_node=""> are paid tools that allow you to look at results of your competitor's website.</span></li><span data-dcnode-id="6504" instrument_node="">
</span></ul><span data-dcnode-id="6502" instrument_node="">
</span><p data-dcnode-id="6499"><strong data-dcnode-id="6500"><span data-dcnode-id="6501" instrument_node="">Publish Great Content</span></strong></p><span data-dcnode-id="6498" instrument_node="">
</span><p data-dcnode-id="6496"><span data-dcnode-id="6497" instrument_node="">Finding keywords is an important piece of the puzzle, but Google also ranks your site based on the actual content you produce, as this is what your customers are reading and engaging with.</span></p><span data-dcnode-id="6495" instrument_node="">
</span><p data-dcnode-id="6493"><span data-dcnode-id="6494" instrument_node="">There are various different "forms" of content that you may want to consider diversifying on your sites, such as blog posts, articles, studies, and videos.</span></p><span data-dcnode-id="6492" instrument_node="">
</span><p data-dcnode-id="6490"><span data-dcnode-id="6491" instrument_node="">So let's discuss what google considers "good content:"</span></p><span data-dcnode-id="6489" instrument_node="">
</span><ul data-dcnode-id="6472"><span data-dcnode-id="6488" instrument_node="">
</span><li data-dcnode-id="6486"><span data-dcnode-id="6487" instrument_node="">Length - This will vary depending on the page, however, generally having a sufficient amount of content helps search engines recognize that your site is a good source for a specific topic</span></li><span data-dcnode-id="6485" instrument_node="">
</span><li data-dcnode-id="6483"><span data-dcnode-id="6484" instrument_node="">Engagement - The longer people stay on your website to read your content, the higher Google will rank your website. It's important to have informative and "thick" content that keeps people reading</span></li><span data-dcnode-id="6482" instrument_node="">
</span><li data-dcnode-id="6480"><span data-dcnode-id="6481" instrument_node="">Avoid Duplicating Content - Google will recognize this and may consider your content to have low value</span></li><span data-dcnode-id="6479" instrument_node="">
</span><li data-dcnode-id="6477"><span data-dcnode-id="6478" instrument_node="">Ensure pages load quickly - This will also help with engagement and time spent on your website</span></li><span data-dcnode-id="6476" instrument_node="">
</span><li data-dcnode-id="6474"><span data-dcnode-id="6475" instrument_node="">Shareability - Create content that people want to share, and is easy for them to share, especially to their social media accounts (ie. "click to tweet" is a great example of this).</span></li><span data-dcnode-id="6473" instrument_node="">
</span></ul><span data-dcnode-id="6471" instrument_node="">
</span><p data-dcnode-id="6467"><span data-dcnode-id="6470" instrument_node="">Another element of creating good content is creating </span><strong data-dcnode-id="6468"><span data-dcnode-id="6469" instrument_node="">consistent content.</span></strong></p><span data-dcnode-id="6466" instrument_node="">
</span><p data-dcnode-id="6464"><span data-dcnode-id="6465" instrument_node="">If (and hopefully you are) publishing content frequently, it's important to stick to a schedule - this helps build brand trust and easy user experience with your customers.</span></p><span data-dcnode-id="6463" instrument_node="">
</span><p data-dcnode-id="6461"><span data-dcnode-id="6462" instrument_node="">Planning out your content with a content calendar is key to staying consistent.</span></p><span data-dcnode-id="6460" instrument_node="">
</span><p data-dcnode-id="6458"><span data-dcnode-id="6459" instrument_node="">Here are a few great content calendar tools that can help you:</span></p><span data-dcnode-id="6457" instrument_node="">
</span><ul data-dcnode-id="6444"><span data-dcnode-id="6456" instrument_node="">
</span><li data-dcnode-id="6453"><a data-dcnode-id="6454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//starterstory.com/tools/trello" id="ss-not-verified-tool" target="_blank"><span data-dcnode-id="6455" instrument_node="">Trello</span></a></li><span data-dcnode-id="6452" instrument_node="">
</span><li data-dcnode-id="6449"><a data-dcnode-id="6450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//starterstory.com/tools/airtable-3f9a7acf-cad6-4fe1-b7d7-1bc8417ad6cf" id="ss-not-verified-tool" target="_blank"><span data-dcnode-id="6451" instrument_node="">Airtable</span></a></li><span data-dcnode-id="6448" instrument_node="">
</span><li data-dcnode-id="6446"><span data-dcnode-id="6447" instrument_node="">If you prefer to keep it simple, your average spreadsheet is just as useful!</span></li><span data-dcnode-id="6445" instrument_node="">
</span></ul><span data-dcnode-id="6443" instrument_node="">
</span><p data-dcnode-id="6440"><strong data-dcnode-id="6441"><span data-dcnode-id="6442" instrument_node="">Backlinks</span></strong></p><span data-dcnode-id="6439" instrument_node="">
</span><p data-dcnode-id="6437"><span data-dcnode-id="6438" instrument_node="">Backlinks are an important piece to SEO, as they allow for other websites to link to your content.</span></p><span data-dcnode-id="6436" instrument_node="">
</span><p data-dcnode-id="6434"><span data-dcnode-id="6435" instrument_node="">Search engines recognize that other sites are essentially "verifying" your content and essentially rank you higher because of this.</span></p><span data-dcnode-id="6433" instrument_node="">
</span><p data-dcnode-id="6431"><span data-dcnode-id="6432" instrument_node="">Of course, some links are more valuable than others and can affect your site in different ways.</span></p><span data-dcnode-id="6430" instrument_node="">
</span><p data-dcnode-id="6428"><span data-dcnode-id="6429" instrument_node="">For example, if a highly valuable and credible site like the New York Times links to a page on your website, this could be remarkable from an SEO perspective.</span></p><span data-dcnode-id="6427" instrument_node="">
</span><p data-dcnode-id="6425"><span data-dcnode-id="6426" instrument_node="">Aside from organically getting mentioned from other sites, there are other ways that you can increase and earn backlinks:</span></p><span data-dcnode-id="6424" instrument_node="">
</span><ul data-dcnode-id="6407"><span data-dcnode-id="6423" instrument_node="">
</span><li data-dcnode-id="6421"><span data-dcnode-id="6422" instrument_node="">Create infographics with relevant data that people want to share</span></li><span data-dcnode-id="6420" instrument_node="">
</span><li data-dcnode-id="6418"><span data-dcnode-id="6419" instrument_node="">Promote your content on different sites/look into "guest blogging"</span></li><span data-dcnode-id="6417" instrument_node="">
</span><li data-dcnode-id="6415"><span data-dcnode-id="6416" instrument_node="">Contact influencers/journalists/bloggers and ask them to mention you!</span></li><span data-dcnode-id="6414" instrument_node="">
</span><li data-dcnode-id="6412"><span data-dcnode-id="6413" instrument_node="">Write testimonials for other sites in exchange for a backlink</span></li><span data-dcnode-id="6411" instrument_node="">
</span><li data-dcnode-id="6409"><span data-dcnode-id="6410" instrument_node="">Leverage existing business relationships</span></li><span data-dcnode-id="6408" instrument_node="">
</span></ul><span data-dcnode-id="6406" instrument_node="">
</span><p data-dcnode-id="6399"><span data-dcnode-id="6405" instrument_node="">Learn more about the fundamentals of SEO ➜ </span><a data-dcnode-id="6403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starterstory.com/seo" target="_blank"><span data-dcnode-id="6404" instrument_node="">here</span></a><span data-dcnode-id="6402" instrument_node=""> and check out </span><a data-dcnode-id="6400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DgmB_TC92I8w" target="_blank"><span data-dcnode-id="6401" instrument_node="">Neil Patel's 3 Powerful SEO Tips below</span></a></p><span data-dcnode-id="6398" instrument_node="">
</span><p data-dcnode-id="6397"></p><div class="video_wrapper youtube-scroll-369" data-dcnode-id="6393"><span data-dcnode-id="6396" instrument_node="">
</span><iframe class="video-163" data-dcnode-id="6395" data-src="https://www.youtube.com/embed/gmB_TC92I8w" height="349" width="560"></iframe><span data-dcnode-id="6394" instrument_node="">
</span></div><span data-dcnode-id="6392" instrument_node="">
</span><span data-dcnode-id="6389" instrument_node="">
</span><p data-dcnode-id="6388"></p><span data-dcnode-id="6387" instrument_node="">
</span><h4 data-dcnode-id="6385" id="build-a-blog"><span data-dcnode-id="6386" instrument_node="">Build A Blog</span></h4><span data-dcnode-id="6384" instrument_node="">
</span><p data-dcnode-id="6382"><span data-dcnode-id="6383" instrument_node="">One of the most effective ways to build brand awareness and grow your business is through consistently blogging. </span></p><span data-dcnode-id="6381" instrument_node="">
</span><p data-dcnode-id="6379"><span data-dcnode-id="6380" instrument_node="">We've outlined some useful tips for you to consider when creating content:</span></p><span data-dcnode-id="6378" instrument_node="">
</span><p data-dcnode-id="6375"><strong data-dcnode-id="6376"><span data-dcnode-id="6377" instrument_node="">Consistency and Quantity</span></strong></p><span data-dcnode-id="6374" instrument_node="">
</span><p data-dcnode-id="6372"><span data-dcnode-id="6373" instrument_node="">Quality is important, but it should be the standard for any content you publish.</span></p><span data-dcnode-id="6371" instrument_node="">
</span><p data-dcnode-id="6369"><span data-dcnode-id="6370" instrument_node="">What’s more important is consistency and quantity.</span></p><span data-dcnode-id="6368" instrument_node="">
</span><p data-dcnode-id="6366"><span data-dcnode-id="6367" instrument_node="">Consistency is as simple as committing to publishing and sharing a certain number of posts per week. For me, that’s three per week right now.</span></p><span data-dcnode-id="6365" instrument_node="">
</span><p data-dcnode-id="6363"><span data-dcnode-id="6364" instrument_node="">This kind of commitment is key, because one day, a random post will blow up, and you will have never expected it.</span></p><span data-dcnode-id="6362" instrument_node="">
</span><p data-dcnode-id="6359"><strong data-dcnode-id="6360"><span data-dcnode-id="6361" instrument_node="">Oversaturation</span></strong></p><span data-dcnode-id="6358" instrument_node="">
</span><p data-dcnode-id="6356"><span data-dcnode-id="6357" instrument_node="">The easiest mind trap is to think "I’m posting too much", and “I need to give my readers/audience/this platform a break”.</span></p><span data-dcnode-id="6355" instrument_node="">
</span><p data-dcnode-id="6353"><span data-dcnode-id="6354" instrument_node="">This is nonsense.</span></p><span data-dcnode-id="6352" instrument_node="">
</span><p data-dcnode-id="6350"><span data-dcnode-id="6351" instrument_node="">There is no such thing as oversaturation. Well, there is, but it is just someone else’s opinion.</span></p><span data-dcnode-id="6349" instrument_node="">
</span><p data-dcnode-id="6347"><span data-dcnode-id="6348" instrument_node="">For every person that tells you you are posting too much, there is another person that wants even more of your content.</span></p><span data-dcnode-id="6346" instrument_node="">
</span><p data-dcnode-id="6344"><span data-dcnode-id="6345" instrument_node="">You should ignore people’s opinions on how much you post.</span></p><span data-dcnode-id="6343" instrument_node="">
</span><p data-dcnode-id="6340"><strong data-dcnode-id="6341"><span data-dcnode-id="6342" instrument_node="">Patience &amp; Persistence</span></strong></p><span data-dcnode-id="6339" instrument_node="">
</span><p data-dcnode-id="6337"><span data-dcnode-id="6338" instrument_node="">Keep posting, keep trying, and keep putting out good content on the regular. Your time will come, and when it does, it will change everything.</span></p><span data-dcnode-id="6336" instrument_node="">
</span><p data-dcnode-id="6334"><span data-dcnode-id="6335" instrument_node="">The only thing you have control over is your content.</span></p><span data-dcnode-id="6333" instrument_node="">
</span><p data-dcnode-id="6331"><span data-dcnode-id="6332" instrument_node="">You can’t control how people will react to it. You can’t control pageviews, likes, or shares.</span></p><span data-dcnode-id="6330" instrument_node="">
</span><p data-dcnode-id="6328"><span data-dcnode-id="6329" instrument_node="">So the only metric you should focus on is how much content you can put out in a week, month, etc.</span></p><span data-dcnode-id="6327" instrument_node="">
</span><h4 data-dcnode-id="6325" id="where-to-share-your-blog-content"><span data-dcnode-id="6326" instrument_node="">Where to share your blog content</span></h4><span data-dcnode-id="6324" instrument_node="">
</span><p data-dcnode-id="6321"><strong data-dcnode-id="6322"><span data-dcnode-id="6323" instrument_node="">Mailing List</span></strong></p><span data-dcnode-id="6320" instrument_node="">
</span><p data-dcnode-id="6318"><span data-dcnode-id="6319" instrument_node="">I know it sounds obvious, but the best places to share your content is on your mailing list. It is guaranteed traffic and it is a great way to get rapid feedback from your most loyal readers.</span></p><span data-dcnode-id="6317" instrument_node="">
</span><p data-dcnode-id="6315"><span data-dcnode-id="6316" instrument_node="">Send newsletters often. I have done once a week since starting, and I’m moving to twice a week soon.</span></p><span data-dcnode-id="6314" instrument_node="">
</span><p data-dcnode-id="6312"><span data-dcnode-id="6313" instrument_node="">Work on increasing your mailing list as well. Look into ways to increase your conversion rate to your mailing list. I added a flyout popup thing to my site and now I’m collecting ~30 emails per day.</span></p><span data-dcnode-id="6311" instrument_node="">
</span><p data-dcnode-id="6309"><span data-dcnode-id="6310" instrument_node="">An email newsletter is one of the most powerful assets you can have and it is worth its weight in gold.</span></p><span data-dcnode-id="6308" instrument_node="">
</span><p data-dcnode-id="6305"><strong data-dcnode-id="6306"><span data-dcnode-id="6307" instrument_node="">Reddit</span></strong></p><span data-dcnode-id="6304" instrument_node="">
</span><p data-dcnode-id="6302"><span data-dcnode-id="6303" instrument_node="">Reddit is one of my favorite places to promote content.</span></p><span data-dcnode-id="6301" instrument_node="">
</span><p data-dcnode-id="6299"><span data-dcnode-id="6300" instrument_node="">It is a very scary place because you will often get banned or heckled, but it can really pay off.</span></p><span data-dcnode-id="6298" instrument_node="">
</span><p data-dcnode-id="6296"><span data-dcnode-id="6297" instrument_node="">Create social media accounts for your blog, the main ones I use:</span></p><span data-dcnode-id="6295" instrument_node="">
</span><p data-dcnode-id="6293"><span data-dcnode-id="6294" instrument_node="">Twitter
Facebook
Instagram
LinkedIn</span></p><span data-dcnode-id="6292" instrument_node="">
</span><p data-dcnode-id="6290"><span data-dcnode-id="6291" instrument_node="">Set up Buffer and share all of your blog posts to all of your accounts. All of these little shares really do add up.</span></p><span data-dcnode-id="6289" instrument_node="">
</span><p data-dcnode-id="6287"><span data-dcnode-id="6288" instrument_node="">Automate this as much as possible. I automated all of my social media for Starter Story.</span></p><span data-dcnode-id="6286" instrument_node="">
</span><p data-dcnode-id="6283"><strong data-dcnode-id="6284"><span data-dcnode-id="6285" instrument_node="">Facebook Groups</span></strong></p><span data-dcnode-id="6282" instrument_node="">
</span><p data-dcnode-id="6280"><span data-dcnode-id="6281" instrument_node="">When I started out, I put together a spreadsheet of relevant Facebook groups for my niche, and I would post to these groups whenever I had a big story I wanted to share.</span></p><span data-dcnode-id="6279" instrument_node="">
</span><h3 data-dcnode-id="6277" id="grow-your-email-list"><span data-dcnode-id="6278" instrument_node="">Grow Your Email List</span></h3><span data-dcnode-id="6276" instrument_node="">
</span><p data-dcnode-id="6274"><span data-dcnode-id="6275" instrument_node="">The more engaged list of emails, the more engaged customers, which ultimately leads to more sales.</span></p><span data-dcnode-id="6273" instrument_node="">
</span><p data-dcnode-id="6268"><span data-dcnode-id="6272" instrument_node="">One of the best ways to start </span><a data-dcnode-id="6270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starterstory.com/how-to-grow-email-list" target="_blank"><span data-dcnode-id="6271" instrument_node="">growing your list</span></a><span data-dcnode-id="6269" instrument_node=""> is by providing your customer with something free (or discounted) in return.</span></p><span data-dcnode-id="6267" instrument_node="">
</span><p data-dcnode-id="6265"><span data-dcnode-id="6266" instrument_node="">This could also be anything from:</span></p><span data-dcnode-id="6264" instrument_node="">
</span><ul data-dcnode-id="6247"><span data-dcnode-id="6263" instrument_node="">
</span><li data-dcnode-id="6261"><span data-dcnode-id="6262" instrument_node="">Ebook</span></li><span data-dcnode-id="6260" instrument_node="">
</span><li data-dcnode-id="6258"><span data-dcnode-id="6259" instrument_node="">Fascinating case study</span></li><span data-dcnode-id="6257" instrument_node="">
</span><li data-dcnode-id="6255"><span data-dcnode-id="6256" instrument_node="">Video series</span></li><span data-dcnode-id="6254" instrument_node="">
</span><li data-dcnode-id="6252"><span data-dcnode-id="6253" instrument_node="">Free week of the product</span></li><span data-dcnode-id="6251" instrument_node="">
</span><li data-dcnode-id="6249"><span data-dcnode-id="6250" instrument_node="">Discount on the product</span></li><span data-dcnode-id="6248" instrument_node="">
</span></ul><span data-dcnode-id="6246" instrument_node="">
</span><p data-dcnode-id="6241"><span data-dcnode-id="6245" instrument_node="">Learn more about how to grow your email list and improve email marketing ➜ </span><a data-dcnode-id="6243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starterstory.com/how-to-grow-email-list" target="_blank"><span data-dcnode-id="6244" instrument_node="">here</span></a><span data-dcnode-id="6242" instrument_node="">.</span></p><span data-dcnode-id="6240" instrument_node="">
</span><div class="story-quote-container" data-dcnode-id="6218"><span data-dcnode-id="6239" instrument_node="">
</span><p data-dcnode-id="6234"><span data-dcnode-id="6238" instrument_node="">Dylan Jacob, founder of </span><a data-dcnode-id="6236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starterstory.com/stories/brumate" target="_blank"><span data-dcnode-id="6237" instrument_node="">Brumate</span></a><span data-dcnode-id="6235" instrument_node=""> states their email collection tactic that is proven to work:  </span></p><span data-dcnode-id="6233" instrument_node="">
</span><p data-dcnode-id="6231"><span data-dcnode-id="6232" instrument_node="">We use Spin-a-Sale for this (you spin a wheel for a discount code in exchange for subscribing to our email list). This has been the best email-collecting tool we have found because the customer truly feels like they won a prize rather than just a coupon code.</span></p><span data-dcnode-id="6230" instrument_node="">
</span><p data-dcnode-id="6228"><span data-dcnode-id="6229" instrument_node="">Even if a customer doesn’t convert right away, if we have their email we have a 19% chance of converting them into a future customer whether that is through future promotions, new releases, or simply just sending an email at the right time for a purchase to finally make sense for them. </span></p><span data-dcnode-id="6227" instrument_node="">
</span><p data-dcnode-id="6225"><span data-dcnode-id="6226" instrument_node="">We also have a return customer rate of over 14%, so one out of every 6 people we convert will end up buying from us again with an average order value of over $60.00.</span></p><span data-dcnode-id="6224" instrument_node="">
</span><p data-dcnode-id="6223"></p><div class="content-image-wrapper" data-dcnode-id="6221"><img alt="article" data-dcnode-id="6222" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.imgur.com/YSrPzz4.png&amp;raw"></div><p data-dcnode-id="6220"></p><span data-dcnode-id="6219" instrument_node="">

</span><h3 data-dcnode-id="6198" id="add-an-exit-intent-popup-to-your-online-store"><span data-dcnode-id="6199" instrument_node="">Add an exit-intent popup to your online store</span></h3><span data-dcnode-id="6197" instrument_node="">
</span><p data-dcnode-id="6195"><span data-dcnode-id="6196" instrument_node="">A great way to double, or even triple, your email opt-in rate and to grow your list is to add an exit-intent popup to your site, and offering a discount or content upgrade for subscribers.</span></p><span data-dcnode-id="6194" instrument_node="">
</span><p data-dcnode-id="6192"><span data-dcnode-id="6193" instrument_node="">Here's an example of what that might look like:</span></p><span data-dcnode-id="6191" instrument_node="">
</span><p data-dcnode-id="6190"></p><div class="content-image-wrapper" data-dcnode-id="6188"><img alt="article" data-dcnode-id="6189" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.imgur.com/eaOy867.png&amp;raw"></div><p data-dcnode-id="6187"></p><span data-dcnode-id="6186" instrument_node="">
</span><div class="story-quote-container" data-dcnode-id="6177"><span data-dcnode-id="6185" instrument_node="">
</span><p data-dcnode-id="6183"><span data-dcnode-id="6184" instrument_node="">One thing that I spent years NOT doing, that I now kick myself about, is adding an "exit intent pop-up" to our site, which lets people enter a sweepstakes to win a Xero Shoes gift certificate. </span></p><span data-dcnode-id="6182" instrument_node="">
</span><p data-dcnode-id="6179"><strong data-dcnode-id="6180"><span data-dcnode-id="6181" instrument_node="">That one idea has added over 100,000 subscribers to our email list, which is one of our most effective marketing channels.</span></strong></p><span data-dcnode-id="6178" instrument_node="">
