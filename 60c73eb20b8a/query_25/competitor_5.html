</span><h3 data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Diletto client guarantee</span></h3><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">At Diletto Interior Design, we understand that a major reason people don’t employ Interior Design services is due to the notoriety of how long the planning stage can take, and the unreliability of timeframes in the design and decoration world.</span></p><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">We understand that you, the customer, are busy, that’s why we guarantee you that any agreed dates will be met. If these timeframes are not met, for any reason, we will discount your overall bill by 5% per working day of delays.</span></p><span data-dcnode-id="368" instrument_node=""> </span></div><div class="tItem-text tItemId-7" data-dcnode-id="354"><span data-dcnode-id="366" instrument_node="">
</span><h3 data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Payment terms and conditions</span></h3><span data-dcnode-id="363" instrument_node="">
</span><ul data-dcnode-id="356"><li data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Payment in full is required by the 20th of the month following invoice date.</span></li><li data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">All major credit and debit cards, or online funds transfer are accepted as payment.</span></li><li data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">All designs remain the property of Diletto Interior Designs until full payment is received.</span></li></ul><span data-dcnode-id="355" instrument_node=""> </span></div><div class="tItem-text tItemId-8" data-dcnode-id="344"><span data-dcnode-id="353" instrument_node="">
</span><h3 data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">About us</span></h3><span data-dcnode-id="350" instrument_node="">
</span><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Diletto Interior Design has been sourcing stylish interior solutions for homes state-wide for 15 years. Our purpose built, city center, master design office houses a staff of twelve experienced designers and consultants, who are well-versed in spacious rural lifestyle residences, and compact inner-city dwellings alike.</span></p><p data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Our contacts in the design and homeware industries provide the best resources for custom made products, made to order at an unbeatable turnaround time, as well as access to region-wide warehouses filled with homewares ready for your home.</span></p><span data-dcnode-id="345" instrument_node=""> </span></div></div><span data-dcnode-id="342" instrument_node="">
