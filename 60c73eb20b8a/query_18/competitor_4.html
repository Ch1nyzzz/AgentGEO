a-v-618cb24b=""><div class="hamburger-inner" data-dcnode-id="443" data-v-618cb24b=""></div></div></div></div></div></div></header><span data-dcnode-id="436" instrument_node=""> </span><div class="panels" data-dcnode-id="428" data-v-14946639=""><span data-dcnode-id="434" instrument_node=""> </span><span data-dcnode-id="432" instrument_node=""> </span><span data-dcnode-id="430" instrument_node=""> </span></div><span data-dcnode-id="427" instrument_node=""> </span></section><span data-dcnode-id="424" instrument_node=""> </span><div class="page single single-di-details" data-dcnode-id="212"><section class="component-5fa32e91acde5" component-key="5fa32e91acde5" component-name="hero-banner" data-dcnode-id="418" data-v-967782d4=""><div class="poster" data-dcnode-id="419" data-v-967782d4="" style="background-image: url(&quot;/wp-content/themes/disd/images/hero-di-details-single.jpg&quot;);"><div class="vertical-banner" data-dcnode-id="420" data-v-967782d4=""><figure data-dcnode-id="421" data-v-967782d4=""><a data-dcnode-id="422" data-v-967782d4="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disd.edu/blog"><img alt="di details blog" class="img-fluid" data-dcnode-id="423" data-v-967782d4="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disd.edu/wp-content/themes/disd/images/di-details-lockup.svg&amp;raw"></a></figure></div></div></section><span data-dcnode-id="417" instrument_node=""> </span><span data-dcnode-id="415" instrument_node=""> </span><section class="side-navigation --back" data-dcnode-id="411"><div class="wrapper" data-dcnode-id="412"><a class="p-3 m-0 btn font-size--xx-small color--dark-gray icon-position--left icon-name--chevron-left-black" data-dcnode-id="413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disd.edu/blog/"><span data-dcnode-id="414" instrument_node="">Back to All Posts</span></a></div></section><span data-dcnode-id="410" instrument_node=""> </span><section class="gutenberg pt-6 pb-4" data-dcnode-id="236"><div class="container mx-auto" data-dcnode-id="237" style="max-width: 920px;"><h1 data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">10 Skills Needed for a Career in Interior Design</span></h1><span data-dcnode-id="407" instrument_node=""> </span><div class="metadata" data-dcnode-id="400"><p class="mb-1 date font--work-sans-medium color--gray font-size--small" data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">September 14, 2021</span></p><span data-dcnode-id="404" instrument_node=""> </span><ul class="d-flex list-style-none p-0 mb-4" data-dcnode-id="401" style="list-style: none;"><li class="text-uppercase color--dark-gray opacity-04 font--work-sans-semibold font-size--xx-small p-0 m-0 mr-2" data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Interior Design Career</span></li></ul></div><span data-dcnode-id="399" instrument_node=""> </span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">You might think a good interior designer is someone who’s artistic and detail-oriented, who understands the principles of balance and harmony, color theory, and has spatial awareness. You wouldn’t be wrong–but you wouldn’t be entirely right, either.</span></p><span data-dcnode-id="396" instrument_node=""> </span><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">“People who are both right and left-brained–creative and logical–do well [in interior design],” according to Britta Bielak. But if you really want a successful interior design career, you should start focusing on your soft skills.&nbsp;</span></p><span data-dcnode-id="393" instrument_node=""> </span><p data-dcnode-id="385"><span data-dcnode-id="392" instrument_node="">A full-time faculty member at </span><a data-dcnode-id="390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disd.edu/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="391" instrument_node="">Design Institute of San Diego,</span></a><span data-dcnode-id="389" instrument_node=""> Bielak started her career as an artist and after graduate school transitioned to interior design while working as a project manager for commercial architecture firms. She says that the hard skills of design are things you can learn in an </span><a data-dcnode-id="387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disd.edu/academics/bfa/program-goals/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="388" instrument_node="">interior design program</span></a><span data-dcnode-id="386" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="384" instrument_node=""> </span><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">“You don’t have to have an art background or a design background to pursue a career in interior design. It’s fine if you’ve never drawn or used a scale before. You may have always felt like a creative person, but never practiced being creative. We teach you those things.” But to make those hard skills really flourish, you’ll need to hone these 10 skills for a career in interior design.&nbsp;</span></p><span data-dcnode-id="381" instrument_node=""> </span><figure class="wp-block-image" data-dcnode-id="379"><img alt="Skills Needed for a Career in Interior Design" data-dcnode-id="380" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh5.googleusercontent.com/Ed8yV7mQAzQ3MKb_a78u9brD5tGjLuYAHw3Y63uBWuUIXTHdGH7I8uKEtadSeV4pSLTwpmC5-T6j7uc7o1EYzIL9pMi8fII63AW450A0TD7OM-KBuDeq49F9wNOPMA%3Ds0&amp;raw"></figure><span data-dcnode-id="378" instrument_node=""> </span><h2 class="has-text-align-center" data-dcnode-id="375"><strong data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">10 Skills Needed for a Career in Interior Design</span></strong></h2><span data-dcnode-id="374" instrument_node=""> </span><h3 data-dcnode-id="371"><strong data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Being an excellent listener</span></strong></h3><span data-dcnode-id="370" instrument_node=""> </span><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">It’s so important to listen without expectation, Bielak advises. Being an excellent listener means really listening to your clients, even if you think you know what they’re going to say. When asked what they do, many designers will say they problem-solve: they listen to clients to find the ways an interior space can work better for the people who use it. Art and design both draw from the same well of inspiration. Interior designers tap into that source to make people’s environments – and their lives – better. Skillful listening also means you should be able to reiterate back in your own words what you’ve heard to reassure clients you were listening, and to give them the opportunity to clarify if something they said wasn’t exactly what they meant. Speaking of communication…</span></p><span data-dcnode-id="367" instrument_node=""> </span><h3 data-dcnode-id="364"><strong data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Being a good communicator</span></strong></h3><span data-dcnode-id="363" instrument_node=""> </span><p data-dcnode-id="358"><span data-dcnode-id="362" instrument_node="">Bielak notes that one of the ways to advance your career as </span><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zippia.com/interior-designer-project-manager-jobs/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="361" instrument_node="">an interior designer is to become a project manager</span></a><span data-dcnode-id="359" instrument_node="">, which means you need to develop really strong communication skills. As a project manager, you’ll have to communicate not only with your clients, but also with a team of architects, designers, engineers, vendors, and more, depending on the project. Can you craft a really good email? Can you clearly and succinctly communicate project needs, timelines, feedback on design plans, and expectations? </span></p><span data-dcnode-id="357" instrument_node=""> </span><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Another way to advance your career in interior design is to follow the “designer path” – first as a project designer and then as a senior interior designer. Skillful designers cultivate a fluency in design styles that comes with an understanding of origins in global cultures, or they may transcend style with contemporary solutions based in function. Honing the ability to communicate well is critical to growing in your career whether working for a firm or for yourself.</span></p><span data-dcnode-id="354" instrument_node=""> </span><h3 data-dcnode-id="351"><strong data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Being both detail-oriented, and big-picture&nbsp;</span></strong></h3><span data-dcnode-id="350" instrument_node=""> </span><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">A good interior designer can focus on the details, but also be able to assess the big picture at the same time. “This isn’t interior decorating; it’s not just about the furnishings. It’s really about being able to build and shape space, and also select the finishes, materials, colors, and furnishings,” says Bielak.&nbsp;</span></p><span data-dcnode-id="347" instrument_node=""> </span><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Knowing how to manage the space between pieces of furniture in a single room is important, but you should also be able to think about how the furniture relates to the size of the room, or even how that room relates to the other rooms in a house. Computer-aided design helps the designer manage those relationships between spaces. The latest CAD software is intuitive and builds skills while you are creating. You can draw plans and render them in 3D, selecting styles ranging from realistic to artistic. You can even create “fly-throughs” that present the client a room-to-room sequence of the experience before it is built.&nbsp;&nbsp;</span></p><span data-dcnode-id="344" instrument_node=""> </span><figure class="wp-block-image" data-dcnode-id="342"><img alt="interior design students working on a project " data-dcnode-id="343" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disd.edu/wp-content/uploads/2021/09/Stocksy_txpa45322741Wr200_Medium_1221270-3-1-1-1-960x641.jpg&amp;raw"></figure><span data-dcnode-id="341" instrument_node=""> </span><h3 data-dcnode-id="338"><strong data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Learning to think 5 steps ahead</span></strong></h3><span data-dcnode-id="337" instrument_node=""> </span><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">An interior designer should not only understand the design implications of the pieces they’re considering in a space, they should also be able to anticipate the impact those choices could have when you move from one material or space to the next. The same goes for managing a project. Can you anticipate the downstream effects on your team or the project of the decisions you make? Shortsightedness will not serve you well in interior design.</span></p><span data-dcnode-id="334" instrument_node=""> </span><h3 data-dcnode-id="331"><strong data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Being able to admit you’ve made a mistake</span></strong></h3><span data-dcnode-id="330" instrument_node=""> </span><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">“It feels awful to make a mistake,” Britta admits. “But that makes it easy to learn from.” When things go wrong and people start to point fingers, that can dissolve the trust on a team, and even erode trust with your clients. Admitting mistakes maintains both the integrity of your team and the business.&nbsp;</span></p><span data-dcnode-id="327" instrument_node=""> </span><h3 data-dcnode-id="324"><strong data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Learning not to take feedback too personally&nbsp;</span></strong></h3><span data-dcnode-id="323" instrument_node=""> </span><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">“Art is incredibly personal, and it can be incredibly difficult to not take feedback or criticism personally.” Bielak knows this feeling well as both an artist and interior designer. “Just remember that a collection of diverse perspectives and input often create the best projects.” You don’t always have to take the feedback, but it should teach you something or give you another perspective you can take to another project.&nbsp;</span></p><span data-dcnode-id="320" instrument_node=""> </span><h3 data-dcnode-id="317"><strong data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Knowing yourself</span></strong></h3><span data-dcnode-id="316" instrument_node=""> </span><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">This is more than knowing whether you’re an introvert or extrovert, or whether you want to work in small design firms or larger firms. It’s also about knowing your values.&nbsp;</span></p><span data-dcnode-id="313" instrument_node=""> </span><p data-dcnode-id="308"><span data-dcnode-id="312" instrument_node="">Is sustainability important to you? Are you concerned about designing in a way that’s culturally sensitive? Do you only want to use </span><a data-dcnode-id="310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/living/humane-home/vegan-home-interior-design-tips/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="311" instrument_node="">vegan or cruelty-free materials</span></a><span data-dcnode-id="309" instrument_node="">? Know your values so you can carve a career path that aligns with those values.</span></p><span data-dcnode-id="307" instrument_node=""> </span><h3 data-dcnode-id="304"><strong data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Getting really comfortable with the code&nbsp;</span></strong></h3><span data-dcnode-id="303" instrument_node=""> </span><p data-dcnode-id="298"><span data-dcnode-id="302" instrument_node="">Interior design isn’t just about assembling and decorating with beautiful things. Interior designers have to follow </span><a data-dcnode-id="300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2020/07/20/arts/disabilities-architecture-design.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="301" instrument_node="">building and accessibility codes</span></a><span data-dcnode-id="299" instrument_node=""> for the health and safety of people inhabiting the spaces they work with. You’ll need to know the codes, or at least know where to look. Bielak says it’s normal for this part to feel really intimidating when you’re starting out, but empowering yourself with that knowledge is important.&nbsp;</span></p><span data-dcnode-id="297" instrument_node=""> </span><h3 data-dcnode-id="294"><strong data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Having excitement for iteration</span></strong></h3><span data-dcnode-id="293" instrument_node=""> </span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Translation: Get comfortable with doing things more than once. Especially if you’re a perfectionist, it’ll take the pressure off of feeling like you have to get things perfectly your first go-around. Be comfortable, and find joy in experimenting.&nbsp;</span></p><span data-dcnode-id="290" instrument_node=""> </span><h3 data-dcnode-id="287"><strong data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Cultivating your curiosity</span></strong></h3><span data-dcnode-id="286" instrument_node=""> </span><p data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Be curious and open to trying new things. “It’s a big mistake for designers to only look at interior design to enrich their interior design experience,” Bielak says. “Bring in inspiration from other fields or areas that you care about. For example, if you love spending time in nature or If you’ve worked in restaurants you can bring that first-hand experience into what you’re learning about in design.” Use your curiosity to bring innovation and creativity to your process.&nbsp;</span></p><span data-dcnode-id="283" instrument_node=""> </span><figure class="wp-block-image" data-dcnode-id="281"><img alt="interior design professionals working on a project" data-dcnode-id="282" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disd.edu/wp-content/uploads/2021/09/Stocksy_txp4f14bc1d3Wr200_OriginalDelivery_1695186-2-1-1-1-1-960x914.jpg&amp;raw"></figure><span data-dcnode-id="280" instrument_node=""> </span><p data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">&nbsp;These 10 skills provide a glimpse of the interior designer’s experience. You may see yourself in many of them and want to know how you can improve in others.</span></p><span data-dcnode-id="277" instrument_node=""> </span><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">“It’s okay if you struggle with some of these things,” Bielak says. “This goes back to knowing yourself. If you struggle with the bigger picture but love just being zoomed in on the details, maybe that means you could go into product design. If you notice you get excited when we’re talking about pattern and color, but zone out when we’re talking about space, maybe you go into textiles later.”&nbsp; There are innumerable ways you can channel what you are good at into a successful interior design career.&nbsp;</span></p><span data-dcnode-id="274" instrument_node=""> </span><h4 data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Ready to learn some hard skills while you strengthen those soft skills?</span></h4><span data-dcnode-id="271" instrument_node=""> </span><p data-dcnode-id="260"><span data-dcnode-id="270" instrument_node="">&nbsp;The interior design programs at Design Institute of San Diego will expose you to faculty of practicing interior designers from day one – and let you experience the profession first-hand as an “extern” at an interior design firm. With a Bachelor of Fine Arts </span><a data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disd.edu/academics/bfa/bfa-overview/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="269" instrument_node="">(BFA)&nbsp; in Interior Design Degree Program</span></a><span data-dcnode-id="267" instrument_node=""> and a </span><a data-dcnode-id="265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disd.edu/academics/mid/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="266" instrument_node="">Master of Interior Design (MID)</span></a><span data-dcnode-id="264" instrument_node=""> in two and three-year tracks, a degree from Design Institute of San Diego will prepare you to pursue interior design jobs. </span><a data-dcnode-id="262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disd.edu/academics/interior-design-as-a-career/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="263" instrument_node="">Learn more</span></a><span data-dcnode-id="261" instrument_node="">.</span></p><span data-dcnode-id="259" instrument_node=""> </span><p data-dcnode-id="258"></p><span data-dcnode-id="257" instrument_node=""> </span><p data-dcnode-id="253"><span data-dcnode-id="256" instrument_node="">By: Britta Bielak, NCIDQ</span><br data-dcnode-id="255"><span data-dcnode-id="254" instrument_node="">Full-time Faculty</span></p><span data-dcnode-id="252" instrument_node=""> </span><p data-dcnode-id="251"></p><span data-dcnode-id="250" instrument_node=""> </span><hr class="mt-4 mb-3" data-dcnode-id="249"><span data-dcnode-id="248" instrument_node=""> </span><div class="d-flex align-items-center justify-content-between" data-dcnode-id="238"><div class="addthis fade-in" data-dcnode-id="242" style=""><div class="d-flex align-items-center" data-dcnode-id="243"><h3 class="text-uppercase font-size--small font--work-sans-semibold my-0 mr-3 opacity-07" data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Share this post</span></h3><span data-dcnode-id="245" instrument_node=""> </span><div class="addthis_inline_share_toolbox" data-dcnode-id="244"></div></div></div><span data-dcnode-id="241" instrument_node=""> </span><a class="btn color--dark-gray icon-position--left icon-name--chevron-left-black" data-dcnode-id="239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disd.edu/blog/"><span data-dcnode-id="240" instrument_node="">Back to All Posts</span></a></div></div></section><span data-dcnode-id="235" instrument_node=""> </span><section class="component-5fa4769648fe8 py-4" component-key="5fa4769648fe8" component-name="time-to-start-is-now" data-dcnode-id="213" data-v-71b80b48=""><div class="container text-center" data-dcnode-id="214" data-v-71b80b48=""><h2 class="like-h3 mb-4 color--white font-size--x-large font--work-sans-semibold" data-dcnode-id="233" data-v-71b80b48=""><span data-dcnode-id="234" instrument_node="">The Time to Start is Now</span></h2><span data-dcnode-id="232" instrument_node=""> </span><ul class="font-size--x-small text-uppercase lenght-4" data-dcnode-id="215" data-v-71b80b48=""><li class="mb-4 mb-md-0" data-dcnode-id="227" data-v-71b80b48=""><a data-dcnode-id="228" data-v-71b80b48="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disd.edu/schedule-an-appointment/" style="background-image: url(&quot;https://www.disd.edu/wp-content/uploads/2021/02/icon-appointment-black.svg&quot;);" target=""><span data-dcnode-id="231" instrument_node="">Schedule a virtual</span><br class="d-none d-sm-block" data-dcnode-id="230"><span data-dcnode-id="229" instrument_node=""> introduction</span></a></li><li class="mb-4 mb-md-0" data-dcnode-id="222" data-v-71b80b48=""><a data-dcnode-id="223" data-v-71b80b48="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disd.edu/catalog/" style="background-image: url(&quot;https://www.disd.edu/wp-content/uploads/2021/02/icon-catalog-black.svg&quot;);" target="_blank"><span data-dcnode-id="226" instrument_node="">Download our</span><br class="d-none d-sm-block" data-dcnode-id="225"><span data-dcnode-id="224" instrument_node=""> catalog</span></a></li><li class="mb-4 mb-md-0" data-dcnode-id="219" data-v-71b80b48=""><a data-dcnode-id="220" data-v-71b80b48="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disd.edu/request-information/" style="background-image: url(&quot;https://www.disd.edu/wp-content/uploads/2021/02/icon-info-black.svg&quot;);" target=""><span data-dcnode-id="221" instrument_node="">Request information</span></a></li><li class="mb-4 mb-md-0" data-dcnode-id="216" data-v-71b80b48=""><a data-dcnode-id="217" data-v-71b80b48="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disd.edu/admissions/apply/" style="background-image: url(&quot;https://www.disd.edu/wp-content/uploads/2021/02/icon-apply-black.svg&quot;);" target=""><span data-dcnode-id="218" instrument_node="">Apply</span></a></li></ul></div></section></div><span data-dcnode-id="211" instrument_node=""> </span><footer data-dcnode-id="49"><nav class="py-5" data-dcnode-id="98"><div class="container" data-dcnode-id="99"><div class="row" data-dcnode-id="100"><div class="col-md-12 col-lg-12 col-xl-3 mb-4 mb-xl-0 d-md-flex justify-content-md-start d-xl-block" data-dcnode-id="198"><figure class="mb-4 mr-md-4 mr-lg-r" data-dcnode-i
