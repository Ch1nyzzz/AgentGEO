</span><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Interior decorators may work with private clients or design firms, and can sometimes enjoy flexible schedules if they are self-employed. Even if you work for yourself, it is to your benefit to have a resume and portfolio you can show to prospective clients (this is especially relevant with high-end demanding customers).</span></p><p data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">So brush off that antique resume and keep reading to set yourself up for career advancement!</span></p><h3 data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Profile Sample</span></h3><p data-dcnode-id="1443"><span data-dcnode-id="1447" instrument_node="">As an interior decorator, you need to understand your clients, their tastes, needs, and budget. Your profile section is your best opportunity aside from your </span><a data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resume.io/app/create-cover-letter"><span data-dcnode-id="1446" instrument_node="">cover letter</span></a><span data-dcnode-id="1444" instrument_node="">
to make your personality the focal point of your job application. In about 100-150 words (200 in some rare cases), you should highlight your most successful design project and your creative style as well as your people skills. Remember to show off your ability to work closely with architects and other building professionals to achieve client goals.</span></p><p data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">You are a design professional who draws and implements decorating plans and designs, which requires space planning and computer design programs. Describe how you work to make spaces functional, safe, and aesthetically pleasing.</span></p><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">See resume example content below.</span></p><div class="copyable" data-dcnode-id="1418"><span data-dcnode-id="1438" instrument_node="">
</span><div class="copyable__label" data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">
Example </span></div><span data-dcnode-id="1435" instrument_node="">
</span><div class="copyable__text" data-dcnode-id="1429"><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1431"><i data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Passionate and experienced Certified Interior Decorator with several years of experience working with clients to fulfill their decorating and design goals. Bringing forth a passion for décor and an eye for achieving the ultimate “wow” factor for interior spaces. Committed to combining functionality with aesthetically pleasing décor. Adept in handling all aspects of planning and decorating from conception to completion.</span></i></p><span data-dcnode-id="1430" instrument_node=""> </span></div><span data-dcnode-id="1428" instrument_node="">

</span></div><h3 data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Employment History Example</span></h3><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Just as you tell a story with furnishings and color, you must tell a story here with job descriptions. Think of each progressive job as a stepping stone in which you learned new skills and took on new challenges. Hiring managers want to know what you will add to the firm, so show them that you are talented, have the necessary skills, and have a firm understanding of design concepts.&nbsp;</span></p><p data-dcnode-id="1334"><span data-dcnode-id="1338" instrument_node="">Then, using </span><a data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resume.io/how-to-write-a-resume/chronological-resume-format"><span data-dcnode-id="1337" instrument_node="">reverse chronological order</span></a><span data-dcnode-id="1335" instrument_node="">
, tell the tale of your career by using each bullet item in your work experience section to highlight a project, what challenges you faced, the problem-solving skills you used, and the results. If you have data, such as money you saved clients with your creative solutions or customer service satisfaction surveys, make sure you include that here. Detailed examples are always better than vague descriptions.</span></p><p data-dcnode-id="1329"><span data-dcnode-id="1333" instrument_node="">Consider that your role as an interior designer is physically demanding and typically requires lifting and standing for long periods of time. You may want to include an item here that shows you are up to the job. If you have expertise in specific aspects of interior design such as decorative items, furniture, colors, lighting fixtures, or flooring, make that obvious. Use strong </span><a data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resume.io/blog/300-powerful-resume-action-verbs"><span data-dcnode-id="1332" instrument_node="">action verbs</span></a><span data-dcnode-id="1330" instrument_node="">
and detailed descriptions that give a clear image of who you are as an employee and a decorator.</span></p><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">See example content below.</span></p><div class="copyable" data-dcnode-id="1283"><span data-dcnode-id="1326" instrument_node="">

</span><div class="copyable__text" data-dcnode-id="1294"><span data-dcnode-id="1322" instrument_node="">

</span><li data-dcnode-id="1318"><i data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Worked with clients to understand needs and desires related to interior decoration.</span></i></li><span data-dcnode-id="1317" instrument_node="">
</span><li data-dcnode-id="1314"><i data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Formulated design plans that were functional and aesthetically pleasing.</span></i></li><span data-dcnode-id="1313" instrument_node="">
</span><li data-dcnode-id="1310"><i data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Achieved budget goals and kept careful documentation of plans and orders.</span></i></li><span data-dcnode-id="1309" instrument_node="">
</span><li data-dcnode-id="1306"><i data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Presented clients with a variety of design concepts for color schemes, lighting design, decorative accessories, furniture placement and more.</span></i></li><span data-dcnode-id="1305" instrument_node="">
</span><li data-dcnode-id="1302"><i data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Managed all client billing and accounts.</span></i></li><span data-dcnode-id="1301" instrument_node="">

</span><h3 data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Education Section Sample</span></h3><p data-dcnode-id="1272"><span data-dcnode-id="1279" instrument_node="">An ideal candidate holds a bachelor’s degree in interior design or a related field. Only three states — Florida, Louisiana, and Nevada plus Washington, D.C. — require </span><a data-dcnode-id="1277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.architecturaldigest.com/story/am-i-a-real-designer-if-im-not-licensed"><span data-dcnode-id="1278" instrument_node="">interior designers to be registered</span></a><span data-dcnode-id="1276" instrument_node="">, but an interior decorator certificate is a valuable resume asset. The most common certification is earned by taking an exam from the </span><a data-dcnode-id="1274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cidq.org/"><span data-dcnode-id="1275" instrument_node="">Council for Interior Design Qualification</span></a><span data-dcnode-id="1273" instrument_node="">, although California residents must take a different version of the exam.</span></p><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">List all your degrees and certifications in your education section. Any honors or distinctions should be noted here as well. If you hold a degree higher than a bachelor’s degree, you may leave out your high school. If you have many certifications, memberships, or awards, you should consider creating a separate section highlighting them.&nbsp;</span></p><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">See interior designer resume sample content below.</span></p><div class="copyable" data-dcnode-id="1240"><span data-dcnode-id="1267" instrument_node="">

</span><h3 data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Layout and Formatting</span></h3><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">You’re a design professional, so your layout really has to pop. But as you know, it’s better to keep it clean and create a focal point than to create a space where eyes don’t know where to fall. The same is true for your resume. Your design is an important visual representation of your talents.</span></p><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Apply the same design principles here that you do in your design projects:</span></p><ul data-dcnode-id="1219"><span data-dcnode-id="1232" instrument_node="">
</span><li data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Don’t overstuff: Here’s your chance to show off your space planning ability</span></li><span data-dcnode-id="1229" instrument_node="">
</span><li data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Use color appropriately and sparingly</span></li><span data-dcnode-id="1226" instrument_node="">
</span><li data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Highlight the areas you want people (or recruiters) to notice — such as your section headings and contact information</span></li><span data-dcnode-id="1223" instrument_node="">
</span><li data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Create an obvious line for the eye to follow</span></li><span data-dcnode-id="1220" instrument_node="">
</span></ul><p data-dcnode-id="1211"><span data-dcnode-id="1218" instrument_node="">We recommend our </span><a data-dcnode-id="1216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resume.io/resume-templates/creative"><span data-dcnode-id="1217" instrument_node="">Creative design templates</span></a><span data-dcnode-id="1215" instrument_node="">
to get you started. Then, try our </span><a data-dcnode-id="1213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resume.io/app/create-resume/templates"><span data-dcnode-id="1214" instrument_node="">resume builder tool</span></a><span data-dcnode-id="1212" instrument_node=""> for stress-free formatting. As a design professional, you probably have a portfolio or your work. Resume.io allows you to link that portfolio to your resume.</span></p></div><div class="post-banner-cta post-banner-cta--wide" data-dcnode-id="1191"><div class="post-banner-cta__main" data-dcnode-id="1197"><div class="post-banner-cta__title post-banner-cta__title--top" data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Build your resume in 15 minutes</span></div><div class="post-banner-cta__animation" data-dcnode-id="1203"><div class="post-banner-cta__animation-frame" data-dcnode-id="1207"></div><div class="post-banner-cta__animation-frame" data-dcnode-id="1206"></div><div class="post-banner-cta__animation-frame" data-dcnode-id="1205"></div><div class="post-banner-cta__animation-frame" data-dcnode-id="1204"></div></div><div class="post-banner-cta__text" data-dcnode-id="1198"><div class="post-banner-cta__title" data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Build your resume in 15 minutes</span></div><div class="post-banner-cta__caption" data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Use professional field-tested resume templates that follow the exact ‘resume rules’ employers look for.</span></div></div></div><a class="post-banner-cta__button" data-dcnode-id="1192" data-internal-event="{&quot;name&quot;:&quot;click_create_resume&quot;,&quot;label&quot;:&quot;example_resume&quot;}" data-marketing-event="{&quot;category&quot;:&quot;Example Page&quot;,&quot;action&quot;:&quot;Click Bottom CTA Banner&quot;}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resume.io/app/create-resume"><s
