</span><h2 class="block__title" data-dcnode-id="1940" id="overview"><span data-dcnode-id="1941" instrument_node="">Overview</span></h2><span data-dcnode-id="1939" instrument_node="">
</span><article about="/programs/itd1-interior-decorating" class="node node--type-program node--view-mode-program-overview" data-dcnode-id="1214" role="article" typeof="sioc:Item foaf:Document"><span data-dcnode-id="1938" instrument_node="">
</span><div class="node__content" data-dcnode-id="1216"><span data-dcnode-id="1937" instrument_node="">
</span><div class="clearfix text-formatted field field--name-body field--type-text-with-summary field--label-hidden field__item" data-dcnode-id="1218" property="content:encoded"><p data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">Fanshawe's Interior Decorating program combines in-class studies that will inspire your creativity with an array of practical experiences where you will apply your knowledge. Graduate career-ready with an innovative creativity and knowledge of decorating techniques and products valued by employers in many segments of the home decor industry.</span></p><span data-dcnode-id="1934" instrument_node="">
</span><p data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Study space planning, colour theory, material selection, design fundamentals, presentation techniques and illustration and visual merchandising. You’ll also learn critical business skills like professional communication, personal marketing and sales. Courses are delivered in lecture, studio and lab formats, as well as in the hands-on studio environment where you’ll work on 2- and 3-dimensional projects with our industry-trained professional faculty. During two paid co-op work terms, you'll gain the hands-on industry experience employers are looking for, further developing your professional portfolio.&nbsp;</span></p><span data-dcnode-id="1931" instrument_node="">
</span><h3 data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">Program Overview</span></h3><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">Interior Decorating is a two-year Ontario College Diploma program designed to develop the skills and knowledge necessary for a career in one of the many segments of the residential interior decorating field. Students will study the fundamentals of interior decorating, including space planning, colour theory, material selection, kitchen and bath design and visual merchandising. Students will build interpersonal, communication, sales, business and marketing skills. Drawing, presentation and drafting techniques (both manual and computer-aided) will be developed. Courses are delivered in lecture, studio and lab formats; the hands-on studio environment allows the student to work on 2D and 3D projects in close contact with their professor.&nbsp;</span></p><span data-dcnode-id="1925" instrument_node="">
</span><p data-dcnode-id="1920"><span data-dcnode-id="1924" instrument_node="">The Interior Decorating program is recognized by </span><a data-dcnode-id="1922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ddacanada.com/" target="_blank"><span data-dcnode-id="1923" instrument_node="">The Designers Association of Canada</span></a><span data-dcnode-id="1921" instrument_node="">&nbsp;(CDECA), the national organization of professional interior decorators and designers.</span></p><span data-dcnode-id="1919" instrument_node="">
</span><p data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1916" instrument_node="">
</span><details class="collapse-processed" data-dcnode-id="1838"><summary data-dcnode-id="1909" tabindex="-1"><a class="details-title" data-dcnode-id="1910" href="#undefined"><span class="details-summary-prefix visually-hidden" data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">Show</span></span><span data-dcnode-id="1913" instrument_node=""> </span><span data-dcnode-id="1912" instrument_node="">Co-op Opportunities &amp; Career Information</span><span class="summary" data-dcnode-id="1911"></span></a></summary><h4 data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Co-op Opportunities&nbsp;</span></h4><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">The Interior Decorating program offers a cooperative education component, which provides students the opportunity to gain invaluable first-hand workplace experience in their chosen field. Here are some of the co-op jobs that have kick-started the careers of Interior Decorating students before even graduating!&nbsp;</span></p><span data-dcnode-id="1903" instrument_node="">
</span><p data-dcnode-id="1898"><strong data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Staging and Design Assistant</span></strong><br data-dcnode-id="1900"><span data-dcnode-id="1899" instrument_node="">
Creating attractive and functional spaces designed to increase market value of residential or commercial properties.</span></p><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1892"><strong data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">Colour Specialist </span></strong><br data-dcnode-id="1894"><span data-dcnode-id="1893" instrument_node="">
Creating paint, window treatment and flooring colour solutions to meet a client’s goals.</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1886"><strong data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Décor Consultant </span></strong><br data-dcnode-id="1888"><span data-dcnode-id="1887" instrument_node="">
Draw on product knowledge and decor theory to help clients select individual items such as furniture, accessories and lighting to meet their decorating goals.</span></p><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1877"><span data-dcnode-id="1884" instrument_node="">For more information regarding co-op, please check out our </span><a data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fanshawec.ca/student-life/campus-services/employment/info-about-co-op-programs"><span data-dcnode-id="1883" instrument_node="">co-op site</span></a><span data-dcnode-id="1881" instrument_node=""> or contact the Co-op Office at </span><a data-dcnode-id="1879" href="mailto:coop@fanshawec.ca"><span data-dcnode-id="1880" instrument_node="">coop@fanshawec.ca</span></a><span data-dcnode-id="1878" instrument_node=""> to connect with a consultant.</span></p><span data-dcnode-id="1876" instrument_node="">
</span><p data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1873" instrument_node="">
</span><h4 data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">Career Information</span></h4><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Graduates of Fanshawe’s Interior Decorating program may find employment in retail sales of furniture, drapery, lighting, flooring, paint and other related products or as a decor consultant in a retail or showroom setting. Other opportunities include kitchen and bath design and sales, home staging, visual merchandising, product representation and decorating specification for new home construction. Many graduates have plans to open their own retail or consulting business.</span></p><span data-dcnode-id="1867" instrument_node="">
</span><p data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1864" instrument_node="">
</span><p data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">Did you know Fanshawe consistently ranks high in graduation employment rates among large colleges in Ontario?&nbsp;</span></p><span data-dcnode-id="1861" instrument_node="">
</span><p data-dcnode-id="1858"><em data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">Here are some examples of career opportunities for graduates of Fanshawe’s Interior Decorating program:</span></em></p><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1852"><strong data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Interior Decorator</span></strong><br data-dcnode-id="1854"><span data-dcnode-id="1853" instrument_node="">
Help customers choose the right furniture and accessories for their home or cottage.</span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1846"><strong data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">Design Consultant</span></strong><br data-dcnode-id="1848"><span data-dcnode-id="1847" instrument_node="">
Create inviting showroom displays and assist residential and commercial clients by recommending functional and aesthetic home finishing selections that are suited to their tastes and needs.</span></p><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1840"><strong data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Design Drafter</span></strong><br data-dcnode-id="1842"><span data-dcnode-id="1841" instrument_node="">
Create and revise floor plans, 3D drawings and elevation drawings for cabinet design.</span></p><span data-dcnode-id="1839" instrument_node="">
</span></details><details class="collapse-processed" data-dcnode-id="1744"><summary data-dcnode-id="1831" tabindex="-1"><a class="details-title" data-dcnode-id="1832" href="#undefined"><span class="details-summary-prefix visually-hidden" data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">Show</span></span><span data-dcnode-id="1835" instrument_node=""> </span><span data-dcnode-id="1834" instrument_node="">Program Progression</span><span class="summary" data-dcnode-id="1833"></span></a></summary><h4 data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Fall Intake</span></h4><span data-dcnode-id="1828" instrument_node="">

</span><div class="field field--name-field-learning-outcomes-next field--type-text-long field--label-hidden field__item" data-dcnode-id="1165"><details class="collapse-processed" data-dcnode-id="1169"><summary data-dcnode-id="1203" tabindex="-1"><a class="details-title" data-dcnode-id="1204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/dYcvE16epDI%3Fautoplay%3D0%26start%3D0%26rel%3D0%23undefined"><span class="details-summary-prefix visually-hidden" data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Show</span></span><span data-dcnode-id="1207" instrument_node=""> </span><span data-dcnode-id="1206" instrument_node="">Learning Outcomes</span><span class="summary" data-dcnode-id="1205"></span></a></summary><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">The graduate has reliably demonstrated the ability to</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">1.Analyze the client’s needs and goals using research techniques and taking psychological, sociological and physiological needs into consideration.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">2. Collaborate in the preparation of a design proposal/contract to define the scope of services for the decorating project.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">3. Analyze existing space conditions and decorating components in order to determine what modifications are required to meet the client’s needs.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">4. Prepare a design concept which meets all the criteria (i.e.: historical context, accessibility) of a given decorating project using the creative process.</span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">5. Communicate the design concept to the client in visual and written formats.</span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">6. Use a variety of media and rendering techniques to communicate the character of the space.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">7. Prepare technical documents (i.e. plans, elevations) needed for the implementation of the decorating solution.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">8. Collaborate with a variety of design and decoration professionals for the implementation of the decoration solution.</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">9. Evaluate the effectiveness of the final decoration solution.</span></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">10. Develop strategies and plans to implement and maintain a decorating business.</span></p><span data-dcnode-id="1170" instrument_node="">

</span><div class="clearfix text-formatted field field--name-field-english-requirements-xmln field--type-text-long field--label-hidden field__item" data-dcnode-id="881"><details class="collapse-processed" data-dcnode-id="882"><summary data-dcnode-id="916" tabindex="-1"><a class="details-title" data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/dYcvE16epDI%3Fautoplay%3D0%26start%3D0%26rel%3D0%23undefined"><span class="details-summary-prefix visually-hidden" data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Show</span></span><span data-dcnode-id="920" instrument_node=""> </span><span data-dcnode-id="919" instrument_node="">English Language Requirements</span><span class="summary" data-dcnode-id="918"></span></a></summary><h3 data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">English Language Requirements</span></h3><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Applicants whose first language is not English will be required
to demonstrate proficiency in English by one of the following
methods:</span></p><span data-dcnode-id="911" instrument_node="">
</span><ul data-dcnode-id="883"><li data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">A Grade 12 College Stream or University Stream English credit
from an Ontario Secondary School, or equivalent, depending on the
program's Admission Requirements</span></li><span data-dcnode-id="908" instrument_node="">
</span><li data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Test of English as a Foreign Language (TOEFL) test with a
minimum score of&nbsp;79 for the Internet-based test (iBT), with
test results within the last two years</span></li><span data-dcnode-id="905" instrument_node="">
</span><li data-dcnode-id="900"><span data-dcnode-id="904" instrument_node="">International English Language Testing System (IELTS) Academic
test with an overall score of 6.0 with no score less than 5.5 in
any of the four bands, with test results within the last two
years.&nbsp;</span><a data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fanshawec.ca/admissions/applying/admission-requirements/english-language-requirements%23exceptions1"><span data-dcnode-id="903" instrument_node="">SDS
Program Requirements.</span></a><span data-dcnode-id="901" instrument_node="">&nbsp;</span></li><span data-dcnode-id="899" instrument_node="">
</span><li data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Canadian Academic English Language (CAEL) test with an overall
score of 60 with no score less than 50 in any of the four bands,
with test results within the last two years</span></li><span data-dcnode-id="896" instrument_node="">
</span><li data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Pearson Test of English Academic (PTE) with a minimum score of
53, with test results within the last two years</span></li><span data-dcnode-id="893" instrument_node="">
</span><li data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">A Cambridge English Test (FCE/CAE/CPE) with an overall score on
the Cambridge English Scale of 169 with no language skill less than
162, with test results within the last two years</span></li><span data-dcnode-id="890" instrument_node="">
</span><li data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">An English Language Evaluation (ELE) at Fanshawe College with a
minimum score of 70% in all sections of the test, with test results
within the last two years</span></li><span data-dcnode-id="887" instrument_node="">
</span><li data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Fanshawe College ESL4/GAP5 students: Minimum grade of 80% in
ESL4/GAP5 Level 8, 75% in ESL4/GAP5 Level 9, or 70% in ESL4/GAP5
Level 10</span></li><span data-dcnode-id="884" instrument_node="">
</span></ul></details></div><span data-dcnode-id="880" instrument_node="">

</span><h2 class="block__title" data-dcnode-id="742" id="courses"><span data-dcnode-id="743" instrument_node="">Courses</span></h2><div class="course_listing" data-dcnode-id="644"><div class="table-responsive" data-dcnode-id="645"><table cellspacing="0" data-dcnode-id="646"><tbody data-dcnode-id="647"><tr class="level-heading" data-dcnode-id="739"><td class="level-number" colspan="5" data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Level 1</span></td></tr><tr class="course-message" data-dcnode-id="736"><td colspan="5" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Take all of the following Mandatory Courses:</span></td></tr><tr data-dcnode-id="729"><td class="course-code-details" data-dcnode-id="734" id="course-WRIT-1036"><span data-dcnode-id="735" instrument_node="">WRIT-1036</span></td><td class="course-name-details" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Reason &amp; Writing 1-Art &amp; Design</span></td><td class="course-credit-details" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">3</span></td></tr><tr data-dcnode-id="725"><td class="course-description CID-WRIT-1036" colspan="5" data-dcnode-id="726"><div class="desc-wrapper" data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">This course introduces students to essential principles of reading, writing, and reasoning at the postsecondary level. Students will identify, summarize, analyze, and evaluate multiple short readings and write persuasive response essays to develop their vocabulary, comprehension, grammar, and critical thinking.</span></div></td></tr><tr data-dcnode-id="718"><td class="course-code-details" data-dcnode-id="723" id="course-DESG-1054"><span data-dcnode-id="724" instrument_node="">DESG-1054</span></td><td class="course-name-details" data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Decorating Studio 1</span></td><td class="course-credit-details" data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">5</span></td></tr><tr data-dcnode-id="714"><td class="course-description CID-DESG-1054" colspan="5" data-dcnode-id="715"><div class="desc-wrapper" data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">This one semester course is delivered on-campus in face to face classes. In a project-oriented format, the student is first introduced to residential interior space, furnishings, style and finishes. Emphasis is placed on basic design elements and principles as they relate to interior decorating. This course will draw upon skills learned in concurrent courses and apply them to real-life projects. Basic planning and presentation techniques will be introduced and reinforced.</span></div></td></tr><tr data-dcnode-id="707"><td class="course-code-details" data-dcnode-id="712" id="course-DRAF-1054"><span data-dcnode-id="713" instrument_node="">DRAF-1054</span></td><td class="course-name-details" data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Working Drawings</span></td><td class="course-credit-details" data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">2.5</span></td></tr><tr data-dcnode-id="703"><td class="course-description CID-DRAF-1054" colspan="5" data-dcnode-id="704"><div class="desc-wrapper" data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">This one semester course is designed to develop the basic drafting and drawing interpretation skills needed by the Interior Decorator. It will introduce all drawing views and techniques required to present a decorating concept, with emphasis placed on precision and accuracy. Students will learn to read and extract information from working drawing packages produced by other professionals.</span></div></td></tr><tr data-dcnode-id="696"><td class="course-code-details" data-dcnode-id="701" id="course-GRAF-1046"><span data-dcnode-id="702" instrument_node="">GRAF-1046</span></td><td class="course-name-details" data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Graphic Presentation Techniques 1</span></td><td class="course-credit-details" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">2</span></td></tr><tr data-dcnode-id="692"><td class="course-description CID-GRAF-1046" colspan="5" data-dcnode-id="693"><div class="desc-wrapper" data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">This one semester course is designed to develop the basic drawing communication skills needed by the Interior Decorator. A variety of projects will focus on basic sketch and drawing techniques with emphasis on promoting client understanding of the decorator's concept. Students' aesthetic appreciation will be fostered through exercises in observing and understanding composition, scale, line, form, proportion and texture.</span></div></td></tr><tr data-dcnode-id="685"><td class="course-code-details" data-dcnode-id="690" id="course-DESG-1022"><span data-dcnode-id="691" instrument_node="">DESG-1022</span></td><td class="course-name-details" data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Design Fundamentals</span></td><td class="course-credit-details" data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">1.5</span></td></tr><tr data-dcnode-id="681"><td class="course-description CID-DESG-1022" colspan="5" data-dcnode-id="682"><div class="desc-wrapper" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">This course covers basic design theory. Students are introduced to a variety of design fundamentals through lectures and 'hands-on' 2D and 3D assignments. Students will expand their visual perception by analyzing the fundamental principles and elements of design and their relationship to interior design and interior decorating.</span></div></td></tr><tr data-dcnode-id="674"><td class="course-code-details" data-dcnode-id="679" id="course-MATS-1022"><span data-dcnode-id="680" instrument_node="">MATS-1022</span></td><td class="course-name-details" data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Materials 1</span></td><td class="course-credit-details" data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">3</span></td></tr><tr data-dcnode-id="670"><td class="course-description CID-MATS-1022" colspan="5" data-dcnode-id="671"><div class="desc-wrapper" data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">This one semester course combines online delivery with on-campus evaluation (quizzes and tests).  The course teaches the basic math &amp; dimensioning principles required to measure, estimate and cost interior decorating materials. Accurate site dimensioning, measurement conversion and calculation methods for a wide variety of material applications are learned and practiced. Both Imperial and Metric systems will be used, including conversion between systems.</span></div></td></tr><tr data-dcnode-id="663"><td class="course-code-details" data-dcnode-id="668" id="course-DESG-1082"><span data-dcnode-id="669" instrument_node="">DESG-1082</span></td><td class="course-name-details" data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Professional Practice 1</span></td><td class="course-credit-details" data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">2</span></td></tr><tr data-dcnode-id="659"><td class="course-description CID-DESG-1082" colspan="5" data-dcnode-id="660"><div class="desc-wrapper" data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Professional Practice 1 introduces students to the many aspects of the Interior Decorating industry. Wide variety of career employment directions and related professional organizations will be discussed. Students will also prepare for the employment process by identifying skills, researching and presenting their findings to the class. Microsoft Office will be demonstrated as an option for preparation of professional reports, presentations and communications.</span></div></td></tr><tr data-dcnode-id="652"><td class="course-code-details" data-dcnode-id="657" id="course-COOP-1020"><span data-dcnode-id="658" instrument_node="">COOP-1020</span></td><td class="course-name-details" data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Co-operative Education Employment Prep</span></td><td class="course-credit-details" data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">1</span></td></tr><tr data-dcnode-id="648"><td class="course-description CID-COOP-1020" colspan="5" data-dcnode-id="649"><div class="desc-wrapper" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">This workshop will provide an overview of the Co-operative Education consultants and students' roles and responsibilities as well as the Co-operative Education Policy.  It will provide students with employment preparatory skills specifically related to co-operative education work assignments and will prepare students for their work term.</span></div></td></tr></tbody></table></div></div><a class="btn-primary" data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/node/3977/courses-next/"><span data-dcnode-id="643" instrument_node="">View all courses</span></a><span data-dcnode-id="641" instrument_node="">
