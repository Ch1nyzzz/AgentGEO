</span><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">For a lot of people setting up online can be the first step without too much cost to set up their own craft business. It doesn’t matter whether you set up online or offline there are a few important considerations, to begin with:</span></p><span data-dcnode-id="1240" instrument_node="">
</span><ul data-dcnode-id="1193"><span data-dcnode-id="1239" instrument_node="">
</span><li data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Have a plan</span></li><span data-dcnode-id="1236" instrument_node="">
</span><li data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Figure out your costs</span></li><span data-dcnode-id="1233" instrument_node="">
</span><li data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Legalities</span></li><span data-dcnode-id="1230" instrument_node="">
</span><li data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Identify your customers so you can target what you make to an ideal audience eg. young new moms – this will help you decide what to make that will actually sell not what you necessarily love to make.</span></li><span data-dcnode-id="1227" instrument_node="">
</span><li data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Have gorgeous photos of your products to show people both on or offline</span></li><span data-dcnode-id="1224" instrument_node="">
</span><li data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Don’t spread yourself to wide only make a few items</span></li><span data-dcnode-id="1221" instrument_node="">
</span><li data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Make items that are reproducible</span></li><span data-dcnode-id="1218" instrument_node="">
</span><li data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Check out the competition</span></li><span data-dcnode-id="1215" instrument_node="">
</span><li data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Decide if you want to go for the offline or online route</span></li><span data-dcnode-id="1212" instrument_node="">
</span><li data-dcnode-id="1207"><span data-dcnode-id="1211" instrument_node="">Online means you need to choose a domain name and </span><a data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//smartpennieslife.com/siteground" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1210" instrument_node="">hosting my preference has been using Siteground for hosting</span></a><span data-dcnode-id="1208" instrument_node=""> as I have had no issues with this company my site speed is fast and they can answer queries quickly plus if you already have a site they can migrate you over for FREE. You will need to add a shop to your Website and one of the main options is Shopify which also allows you to sell products directly through Instagram.</span></li><span data-dcnode-id="1206" instrument_node="">
</span><li data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">You can use social media for driving traffic on and offline too</span></li><span data-dcnode-id="1203" instrument_node="">
</span><li data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Contact magazines</span></li><span data-dcnode-id="1200" instrument_node="">

</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Social media is great for getting the word out.</span></p><span data-dcnode-id="876" instrument_node="">

</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">What I would say is avoid spreading yourself too thin on social media try one avenue master it rather than two or three.</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">If you have a website/ blog and sell things directly via your site you may want to consider using Pinterest as its currently free for business users and can drive potentially hundreds of visitors to your website every day whereas Instagram prefers to keep people on their website rather than send them across to your blog so be aware of this if you are planning to have your own site.</span></p><span data-dcnode-id="867" instrument_node="">
