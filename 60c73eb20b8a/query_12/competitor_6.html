</span><p data-dcnode-id="1143"><span data-dcnode-id="1144" style="font-weight: 400;"><span data-dcnode-id="1145" instrument_node="">Starting a food business, like anything else, comes with its rewards and challenges.&nbsp;</span></span></p><p data-dcnode-id="1130"><span data-dcnode-id="1141" style="font-weight: 400;"><span data-dcnode-id="1142" instrument_node="">The global pandemic has led to a</span></span><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//restaurant.org/research/reports/state-of-restaurant-industry" rel="noopener" target="_blank"><span data-dcnode-id="1139" style="font-weight: 400;"><span data-dcnode-id="1140" instrument_node=""> pent-up demand</span></span></a><span data-dcnode-id="1136" style="font-weight: 400;"><span data-dcnode-id="1137" instrument_node=""> for visiting restaurants, bars and other food establishments. While most food businesses have shifted focus to curbside pickup and delivery, the </span></span><a data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.restaurantdive.com/news/restaurant-operating-profits-will-rise-15-in-2021-moodys-predicts/587428/" rel="noopener" target="_blank"><span data-dcnode-id="1134" style="font-weight: 400;"><span data-dcnode-id="1135" instrument_node="">restaurant industry’s profits are expected to rise 15% in 2021</span></span></a><span data-dcnode-id="1131" style="font-weight: 400;"><span data-dcnode-id="1132" instrument_node="">.&nbsp;</span></span></p><p data-dcnode-id="1127"><span data-dcnode-id="1128" style="font-weight: 400;"><span data-dcnode-id="1129" instrument_node="">The imminent boon is fantastic news, but one of the biggest hurdles to starting a new food business is knowing where to begin. That’s why we’ve created this checklist to help you find the tools to grow and get started on the right foot.</span></span></p><ol data-dcnode-id="1105"><span data-dcnode-id="1126" instrument_node="">
</span><li data-dcnode-id="1123"><a data-dcnode-id="1124" href="#section1"><span data-dcnode-id="1125" instrument_node="">Construct a business plan</span></a></li><span data-dcnode-id="1122" instrument_node="">
</span><li data-dcnode-id="1119"><a data-dcnode-id="1120" href="#section2"><span data-dcnode-id="1121" instrument_node="">Buy your equipment</span></a></li><span data-dcnode-id="1118" instrument_node="">
</span><li data-dcnode-id="1115"><a data-dcnode-id="1116" href="#section3"><span data-dcnode-id="1117" instrument_node="">Assemble your team</span></a></li><span data-dcnode-id="1114" instrument_node="">
</span><li data-dcnode-id="1111"><a data-dcnode-id="1112" href="#section4"><span data-dcnode-id="1113" instrument_node="">Get licenses and permits</span></a></li><span data-dcnode-id="1110" instrument_node="">
</span><li data-dcnode-id="1107"><a data-dcnode-id="1108" href="#section5"><span data-dcnode-id="1109" instrument_node="">Set up your point of sale (POS) system</span></a></li><span data-dcnode-id="1106" instrument_node="">
</span></ol><div class="gb-background-color-grey shortcode-cta gb-flex gb-flex--center-horizontal gb-flex--center-vertical" data-dcnode-id="1088"><span data-dcnode-id="1104" instrument_node="">
</span><section class="shortcode-cta__content shortcode-cta__content--full-width" data-dcnode-id="1090"><span data-dcnode-id="1103" instrument_node="">
</span><h4 class="shortcode-cta__title" data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">9-step restaurant opening survival guide</span></h4><span data-dcnode-id="1100" instrument_node="">
</span><p class="shortcode-cta__text" data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Don't miss out on these key steps before opening your restaurant! Check out the must-do items for a successful grand opening.</span></p><span data-dcnode-id="1097" instrument_node="">
</span><div class="gb-button-container shortcode-cta__button-container" data-dcnode-id="1092"><span data-dcnode-id="1096" instrument_node="">
</span><a class="gb-button-cta-featured-primary gb-button-cta-featured-primary--on-light shortcode-cta__button" data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/resources/restaurant/opening-a-restaurant-a-9-step-guide/"><span data-dcnode-id="1095" instrument_node="">Download the guide</span></a><span data-dcnode-id="1093" instrument_node="">
</span></div><span data-dcnode-id="1091" instrument_node="">
</span></section><span data-dcnode-id="1089" instrument_node="">
</span></div><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="1083" id="section1"><b data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">1. Construct a business plan</span></b></h2><p data-dcnode-id="1075"><span data-dcnode-id="1081" style="font-weight: 400;"><span data-dcnode-id="1082" instrument_node="">The first and most important step to starting a food business is </span></span><a data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/blog/11-things-you-need-in-your-restaurant-business-plan-restaurant-growth-to/" rel="noopener" target="_blank"><span data-dcnode-id="1079" style="font-weight: 400;"><span data-dcnode-id="1080" instrument_node="">writing a business plan</span></span></a><span data-dcnode-id="1076" style="font-weight: 400;"><span data-dcnode-id="1077" instrument_node="">. A food or restaurant business plan should include the following:</span></span></p><ul data-dcnode-id="1007"><span data-dcnode-id="1074" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1069" style="font-weight: 400;"><b data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Your business entity type. </span></b><span data-dcnode-id="1070" style="font-weight: 400;"><span data-dcnode-id="1071" instrument_node="">Are you a sole proprietorship? A general partnership? Or possibly a Limited Liability Company (LLC)?</span></span></li><span data-dcnode-id="1068" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1063" style="font-weight: 400;"><b data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Your food business concept.</span></b><span data-dcnode-id="1064" style="font-weight: 400;"><span data-dcnode-id="1065" instrument_node=""> Are you going to be a quick-service restaurant? A full-service restaurant and bar? Or a food truck?</span></span></li><span data-dcnode-id="1062" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1057" style="font-weight: 400;"><b data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Your marketing, logo and name. </span></b><span data-dcnode-id="1058" style="font-weight: 400;"><span data-dcnode-id="1059" instrument_node="">You’ll need to determine how you’ll create a brand that your customers use to recognize your product.&nbsp;</span></span></li><span data-dcnode-id="1056" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1051" style="font-weight: 400;"><b data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Your target market.</span></b><span data-dcnode-id="1052" style="font-weight: 400;"><span data-dcnode-id="1053" instrument_node=""> Based on your concept and price point, what kind of patrons will be attracted to your business?</span></span></li><span data-dcnode-id="1050" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1040" style="font-weight: 400;"><b data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Choose an </span></b><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/blog/tips-for-leasing-restaurant-space/" rel="noopener" target="_blank"><b data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">ideal location</span></b></a><b data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">.</span></b><span data-dcnode-id="1041" style="font-weight: 400;"><span data-dcnode-id="1042" instrument_node=""> If you don’t already have a location for your food business, what neighborhood provides the best chance at a sustainable market share? What kind of competition will you face in a given area?</span></span></li><span data-dcnode-id="1039" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1034" style="font-weight: 400;"><b data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Your budget. </span></b><span data-dcnode-id="1035" style="font-weight: 400;"><span data-dcnode-id="1036" instrument_node="">A budget for expenses such as inventory (food and beverage), labor, rent and utilities.</span></span></li><span data-dcnode-id="1033" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1020" style="font-weight: 400;"><b data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Your </span></b><a data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/blog/restaurant-menu-pricing/" rel="noopener" target="_blank"><b data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">menu and price range</span></b></a><span data-dcnode-id="1026" style="font-weight: 400;"><span data-dcnode-id="1027" instrument_node="">. What dishes, beverages or </span></span><a data-dcnode-id="1023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/blog/bakery-menu-pricing-strategy/"><span data-dcnode-id="1024" style="font-weight: 400;"><span data-dcnode-id="1025" instrument_node="">baked goods</span></span></a><span data-dcnode-id="1021" style="font-weight: 400;"><span data-dcnode-id="1022" instrument_node=""> will you be serving and at what prices will your meals be profitable?</span></span></li><span data-dcnode-id="1019" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1009" style="font-weight: 400;"><b data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Your staffing plans.</span></b><span data-dcnode-id="1015" style="font-weight: 400;"><span data-dcnode-id="1016" instrument_node=""> How many </span></span><a data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/blog/temporary-restaurant-staffing/"><span data-dcnode-id="1013" style="font-weight: 400;"><span data-dcnode-id="1014" instrument_node="">employees will you hire</span></span></a><span data-dcnode-id="1010" style="font-weight: 400;"><span data-dcnode-id="1011" instrument_node=""> to start with, and how will they be broken down into management, front-of-house, and back-of-house?</span></span></li><span data-dcnode-id="1008" instrument_node="">
</span></ul><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">&nbsp;</span></p><p data-dcnode-id="997"><span data-dcnode-id="1003" style="font-weight: 400;"><span data-dcnode-id="1004" instrument_node="">These are just a few of the questions you’ll have to ask yourself to construct a business plan.&nbsp; The exact details of your plan will depend on what type of food business you’re looking to open. To help you get started with writing and organizing your information, here are some </span></span><a data-dcnode-id="1000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bplans.com/restaurant_business_plan_templates.php%3F_ga%3D2.159789364.887698318.1526056040-1028226338.1526056040" rel="noopener" target="_blank"><span data-dcnode-id="1001" style="font-weight: 400;"><span data-dcnode-id="1002" instrument_node="">simple, easy to use business plan templates</span></span></a><span data-dcnode-id="998" style="font-weight: 400;"><span data-dcnode-id="999" instrument_node="">.</span></span></p><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="992" id="section2"><b data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">2. Buy your equipment</span></b></h2><p data-dcnode-id="974"><span data-dcnode-id="990" style="font-weight: 400;"><span data-dcnode-id="991" instrument_node="">Bakery, </span></span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/blog/coffee-shop-equipment-list" rel="noopener" target="_blank"><span data-dcnode-id="988" style="font-weight: 400;"><span data-dcnode-id="989" instrument_node="">coffee shop </span></span></a><span data-dcnode-id="985" style="font-weight: 400;"><span data-dcnode-id="986" instrument_node="">or </span></span><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/blog/restaurant-equipment-list/" rel="noopener" target="_blank"><span data-dcnode-id="983" style="font-weight: 400;"><span data-dcnode-id="984" instrument_node="">restaurant equipment</span></span></a><span data-dcnode-id="980" style="font-weight: 400;"><span data-dcnode-id="981" instrument_node=""> is most likely going to one of your biggest </span></span><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/blog/restaurant-startup-costs/" rel="noopener" target="_blank"><span data-dcnode-id="978" style="font-weight: 400;"><span data-dcnode-id="979" instrument_node="">startup expenses</span></span></a><span data-dcnode-id="975" style="font-weight: 400;"><span data-dcnode-id="976" instrument_node="">. You’ll need to buy or rent everything from ovens to flatware before opening your doors. Here are some of the necessary items you’ll need:</span></span></p><ul data-dcnode-id="936"><span data-dcnode-id="973" instrument_node="">
</span><li aria-level="1" data-dcnode-id="970" style="font-weight: 400;"><span data-dcnode-id="971" style="font-weight: 400;"><span data-dcnode-id="972" instrument_node="">Kitchen appliances like ovens, stoves, grills, fryers and microwaves</span></span></li><span data-dcnode-id="969" instrument_node="">
</span><li aria-level="1" data-dcnode-id="966" style="font-weight: 400;"><span data-dcnode-id="967" style="font-weight: 400;"><span data-dcnode-id="968" instrument_node="">Cold storage appliances such as ice machines and walk-in freezers and refrigerators</span></span></li><span data-dcnode-id="965" instrument_node="">
</span><li aria-level="1" data-dcnode-id="962" style="font-weight: 400;"><span data-dcnode-id="963" style="font-weight: 400;"><span data-dcnode-id="964" instrument_node="">Work surfaces such as countertops, cutting boards, steam tables and cold food tables</span></span></li><span data-dcnode-id="961" instrument_node="">
</span><li aria-level="1" data-dcnode-id="958" style="font-weight: 400;"><span data-dcnode-id="959" style="font-weight: 400;"><span data-dcnode-id="960" instrument_node="">Smallwares like sauté and frying pans, sauce pots with lids and baking sheets</span></span></li><span data-dcnode-id="957" instrument_node="">
</span><li aria-level="1" data-dcnode-id="954" style="font-weight: 400;"><span data-dcnode-id="955" style="font-weight: 400;"><span data-dcnode-id="956" instrument_node="">Utensils for the kitchen such as tongs, ladles and a good knife set</span></span></li><span data-dcnode-id="953" instrument_node="">
</span><li aria-level="1" data-dcnode-id="950" style="font-weight: 400;"><span data-dcnode-id="951" style="font-weight: 400;"><span data-dcnode-id="952" instrument_node="">Silverware for the front-of-house along with napkins, tablecloths and placemats.</span></span></li><span data-dcnode-id="949" instrument_node="">
</span><li aria-level="1" data-dcnode-id="946" style="font-weight: 400;"><span data-dcnode-id="947" style="font-weight: 400;"><span data-dcnode-id="948" instrument_node="">Glassware and barware</span></span></li><span data-dcnode-id="945" instrument_node="">
</span><li aria-level="1" data-dcnode-id="942" style="font-weight: 400;"><span data-dcnode-id="943" style="font-weight: 400;"><span data-dcnode-id="944" instrument_node="">Furnishings such as tables, chairs, a host stand and decor. Make sure you can rearrange your furniture to comply with distancing or capacity requirements, if needed.&nbsp;</span></span></li><span data-dcnode-id="941" instrument_node="">
</span><li aria-level="1" data-dcnode-id="938" style="font-weight: 400;"><span data-dcnode-id="939" style="font-weight: 400;"><span data-dcnode-id="940" instrument_node="">Curbside pickup and delivery supplies, such as bags and drink holders.&nbsp;</span></span></li><span data-dcnode-id="937" instrument_node="">
</span></ul><p data-dcnode-id="933"><span data-dcnode-id="934" style="font-weight: 400;"><span data-dcnode-id="935" instrument_node="">Remember, every food establishment is different. Therefore, no two restaurants will have the same exact equipment checklist, but this will put you in the right direction.</span></span></p><p data-dcnode-id="931"><img alt="" class="aligncenter size-full wp-image-50208 lazyloaded" data-dcnode-id="932" data-src="https://blog-assets.lightspeedhq.com/img/2021/03/3f720dde-blog_starting-a-food-business-cheklist_800x500.jpg" data-srcset="https://blog-assets.lightspeedhq.com/img/2021/03/3f720dde-blog_starting-a-food-business-cheklist_800x500.jpg 800w, https://blog-assets.lightspeedhq.com/img/2021/03/3f720dde-blog_starting-a-food-business-cheklist_800x500-300x188.jpg 300w, https://blog-assets.lightspeedhq.com/img/2021/03/3f720dde-blog_starting-a-food-business-cheklist_800x500-768x480.jpg 768w" height="500" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog-assets.lightspeedhq.com/img/2021/03/3f720dde-blog_starting-a-food-business-cheklist_800x500.jpg&amp;raw" srcset="https://blog-assets.lightspeedhq.com/img/2021/03/3f720dde-blog_starting-a-food-business-cheklist_800x500.jpg 800w, https://blog-assets.lightspeedhq.com/img/2021/03/3f720dde-blog_starting-a-food-business-cheklist_800x500-300x188.jpg 300w, https://blog-assets.lightspeedhq.com/img/2021/03/3f720dde-blog_starting-a-food-business-cheklist_800x500-768x480.jpg 768w" width="800"></p><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="926" id="section3"><b data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">3. Assemble your team</span></b></h2><p data-dcnode-id="918"><span data-dcnode-id="924" style="font-weight: 400;"><span data-dcnode-id="925" instrument_node="">Each food business concept has different labor and staffing considerations. For example, if you’re planning to </span></span><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/blog/how-much-does-it-cost-to-start-a-food-truck" rel="noopener" target="_blank"><span data-dcnode-id="922" style="font-weight: 400;"><span data-dcnode-id="923" instrument_node="">start a food truck</span></span></a><span data-dcnode-id="919" style="font-weight: 400;"><span data-dcnode-id="920" instrument_node="">, it’s probably just you and maybe one or two other people.&nbsp;</span></span></p><p data-dcnode-id="915"><span data-dcnode-id="916" style="font-weight: 400;"><span data-dcnode-id="917" instrument_node="">On the other hand, a full-service restaurant will need a handful of servers and bartenders (over the age of 18 if alcohol is served), plus a complete kitchen staff, a trio of hosts to greet the guests and busboys to clean up after them.</span></span></p><p data-dcnode-id="907"><span data-dcnode-id="913" style="font-weight: 400;"><span data-dcnode-id="914" instrument_node="">It’s not uncommon for people in the food service industry to move around frequently, so job hopping isn’t always a bad sign. With that being said, when hiring an employee,</span></span><a data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/blog/restaurant-interview-questions/" rel="noopener" target="_blank"><span data-dcnode-id="911" style="font-weight: 400;"><span data-dcnode-id="912" instrument_node=""> interview everyone thoroughly</span></span></a><span data-dcnode-id="908" style="font-weight: 400;"><span data-dcnode-id="909" instrument_node=""> and make sure you call their references and confirm there are no major red flags.</span></span></p><p data-dcnode-id="904"><span data-dcnode-id="905" style="font-weight: 400;"><span data-dcnode-id="906" instrument_node="">Here’s a brief list of the type of employees you may need to hire, depending on what kind of food business you’re starting.&nbsp;</span></span></p><ul data-dcnode-id="865"><span data-dcnode-id="903" instrument_node="">
</span><li aria-level="1" data-dcnode-id="900" style="font-weight: 400;"><span data-dcnode-id="901" style="font-weight: 400;"><span data-dcnode-id="902" instrument_node="">Bakery: Cashiers, bakers, baristas and kitchen staff</span></span></li><span data-dcnode-id="899" instrument_node="">
</span><li aria-level="1" data-dcnode-id="896" style="font-weight: 400;"><span data-dcnode-id="897" style="font-weight: 400;"><span data-dcnode-id="898" instrument_node="">Cafe: Cashiers and baristas&nbsp;</span></span></li><span data-dcnode-id="895" instrument_node="">
</span><li aria-level="1" data-dcnode-id="892" style="font-weight: 400;"><span data-dcnode-id="893" style="font-weight: 400;"><span data-dcnode-id="894" instrument_node="">Food Truck: Cashiers and cooks&nbsp;</span></span></li><span data-dcnode-id="891" instrument_node="">
</span><li aria-level="1" data-dcnode-id="888" style="font-weight: 400;"><span data-dcnode-id="889" style="font-weight: 400;"><span data-dcnode-id="890" instrument_node="">Juice Bar: Cashiers</span></span></li><span data-dcnode-id="887" instrument_node="">
</span><li aria-level="1" data-dcnode-id="884" style="font-weight: 400;"><span data-dcnode-id="885" style="font-weight: 400;"><span data-dcnode-id="886" instrument_node="">Ice Cream Shop: Cashiers and ice cream scoopers&nbsp;</span></span></li><span data-dcnode-id="883" instrument_node="">
</span><li aria-level="1" data-dcnode-id="867" style="font-weight: 400;"><span data-dcnode-id="881" style="font-weight: 400;"><span data-dcnode-id="882" instrument_node="">Full-Service Restaurant: Hosts, waitstaff, bussers, bartenders, </span></span><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/blog/what-is-a-barback/" rel="noopener" target="_blank"><span data-dcnode-id="879" style="font-weight: 400;"><span data-dcnode-id="880" instrument_node="">barbacks</span></span></a><span data-dcnode-id="876" style="font-weight: 400;"><span data-dcnode-id="877" instrument_node="">, dishwashers, prep cooks, </span></span><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/blog/what-is-a-line-cook/" rel="noopener" target="_blank"><span data-dcnode-id="874" style="font-weight: 400;"><span data-dcnode-id="875" instrument_node="">line cooks</span></span></a><span data-dcnode-id="871" style="font-weight: 400;"><span data-dcnode-id="872" instrument_node=""> and </span></span><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/blog/hiring-a-restaurant-manager/" rel="noopener" target="_blank"><span data-dcnode-id="869" style="font-weight: 400;"><span data-dcnode-id="870" instrument_node="">managers</span></span></a></li><span data-dcnode-id="866" instrument_node="">
</span></ul><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="860" id="section4"><b data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">4. Get licenses and permits</span></b></h2><p data-dcnode-id="852"><span data-dcnode-id="858" style="font-weight: 400;"><span data-dcnode-id="859" instrument_node="">Being compliant with applicable health and safety codes as well as other food service regulations, is more important now than ever. While all businesses </span></span><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/blog/restaurant-licenses-and-permits/" rel="noopener" target="_blank"><span data-dcnode-id="856" style="font-weight: 400;"><span data-dcnode-id="857" instrument_node="">require licenses</span></span></a><span data-dcnode-id="853" style="font-weight: 400;"><span data-dcnode-id="854" instrument_node=""> and permits to operate, the food service industry is especially strict because you’re dealing with products that people consume. Here are some of the documents you’ll need to conduct business.</span></span></p><ul data-dcnode-id="817"><span data-dcnode-id="851" instrument_node="">
</span><li aria-level="1" data-dcnode-id="848" style="font-weight: 400;"><span data-dcnode-id="849" style="font-weight: 400;"><span data-dcnode-id="850" instrument_node="">A Federal Employer Identification Number (EIN) for tax purposes</span></span></li><span data-dcnode-id="847" instrument_node="">
</span><li aria-level="1" data-dcnode-id="844" style="font-weight: 400;"><span data-dcnode-id="845" style="font-weight: 400;"><span data-dcnode-id="846" instrument_node="">A business license from your city, state or province</span></span></li><span data-dcnode-id="843" instrument_node="">
</span><li aria-level="1" data-dcnode-id="840" style="font-weight: 400;"><span data-dcnode-id="841" style="font-weight: 400;"><span data-dcnode-id="842" instrument_node="">A food service license from the state, province or town for any establishment that serves food</span></span></li><span data-dcnode-id="839" instrument_node="">
</span><li aria-level="1" data-dcnode-id="836" style="font-weight: 400;"><span data-dcnode-id="837" style="font-weight: 400;"><span data-dcnode-id="838" instrument_node="">A Certificate of Occupancy (CO) deeming your restaurant safe for customers to occupy</span></span></li><span data-dcnode-id="835" instrument_node="">
</span><li aria-level="1" data-dcnode-id="832" style="font-weight: 400;"><span data-dcnode-id="833" style="font-weight: 400;"><span data-dcnode-id="834" instrument_node="">A tavern license if you only want to sell beer and wine</span></span></li><span data-dcnode-id="831" instrument_node="">
</span><li aria-level="1" data-dcnode-id="823" style="font-weight: 400;"><span data-dcnode-id="829" style="font-weight: 400;"><span data-dcnode-id="830" instrument_node="">A </span></span><a data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/blog/how-to-get-a-liquor-license/" rel="noopener" target="_blank"><span data-dcnode-id="827" style="font-weight: 400;"><span data-dcnode-id="828" instrument_node="">liquor license</span></span></a><span data-dcnode-id="824" style="font-weight: 400;"><span data-dcnode-id="825" instrument_node=""> for those that want to serve hard liquor for cocktails</span></span></li><span data-dcnode-id="822" instrument_node="">
</span><li aria-level="1" data-dcnode-id="819" style="font-weight: 400;"><span data-dcnode-id="820" style="font-weight: 400;"><span data-dcnode-id="821" instrument_node="">A cabaret license if you’re going to have an area for customers to dance</span></span></li><span data-dcnode-id="818" instrument_node="">
</span></ul><p data-dcnode-id="809"><span data-dcnode-id="815" style="font-weight: 400;"><span data-dcnode-id="816" instrument_node="">Keep in mind that different restaurant concepts are subject to different regulations as well. For example, food trucks need a different food service license because they’re on the go. In all cases, you’ll be under the oversight of your local authority, so make sure to pay attention to (and train your employees to follow) </span></span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/blog/restaurant-health-code-violations/" rel="noopener" target="_blank"><span data-dcnode-id="813" style="font-weight: 400;"><span data-dcnode-id="814" instrument_node="">food service health and safety practices</span></span></a><span data-dcnode-id="810" style="font-weight: 400;"><span data-dcnode-id="811" instrument_node="">.</span></span></p><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="804" id="section5"><b data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">5. Set up your point of sale (POS) system</span></b></h2><p data-dcnode-id="791"><span data-dcnode-id="802" style="font-weight: 400;"><span data-dcnode-id="803" instrument_node="">In today’s world, a POS that seamlessly integrates with online ordering to help you offer delivery and curbside pickup has become a necessity. A good </span></span><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/pos/restaurant/"><span data-dcnode-id="800" style="font-weight: 400;"><span data-dcnode-id="801" instrument_node="">restaurant POS</span></span></a><span data-dcnode-id="797" style="font-weight: 400;"><span data-dcnode-id="798" instrument_node=""> should print tickets, manage both in-person and </span></span><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/pos/restaurant/order-ahead/"><span data-dcnode-id="795" style="font-weight: 400;"><span data-dcnode-id="796" instrument_node="">online orders</span></span></a><span data-dcnode-id="792" style="font-weight: 400;"><span data-dcnode-id="793" instrument_node="">, keep customer tabs open, split checks, customize table layouts and let you take payments anywhere.&nbsp;</span></span></p><p data-dcnode-id="788"><span data-dcnode-id="789" style="font-weight: 400;"><span data-dcnode-id="790" instrument_node="">Many POS systems also come with insightful analytics and reporting, so you can quickly identify trends and make quick changes to your staffing or inventory, if need be. These tools can help run your business more efficiently and grow faster.&nbsp;</span></span></p><p data-dcnode-id="770"><span data-dcnode-id="786" style="font-weight: 400;"><span data-dcnode-id="787" instrument_node="">POS systems, like everything on our checklist, vary based on what type of food business you’re looking to open. For example, a </span></span><a data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/pos/restaurant/quick-service-restaurant-pos/"><span data-dcnode-id="784" style="font-weight: 400;"><span data-dcnode-id="785" instrument_node="">quick-service POS</span></span></a><span data-dcnode-id="781" style="font-weight: 400;"><span data-dcnode-id="782" instrument_node=""> will have different features and functionality than one for a </span></span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/pos/restaurant/full-service-pos-software/"><span data-dcnode-id="779" style="font-weight: 400;"><span data-dcnode-id="780" instrument_node="">full-service restaurant</span></span></a><span data-dcnode-id="776" style="font-weight: 400;"><span data-dcnode-id="777" instrument_node=""> or </span></span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/pos/restaurant/bar-pos-system/"><span data-dcnode-id="774" style="font-weight: 400;"><span data-dcnode-id="775" instrument_node="">bar</span></span></a><span data-dcnode-id="771" style="font-weight: 400;"><span data-dcnode-id="772" instrument_node="">. It’s up to you to do your research and find one that best fits your business model.</span></span></p><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="765"><b data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Getting started on your culinary journey</span></b></h2><p data-dcnode-id="762"><span data-dcnode-id="763" style="font-weight: 400;"><span data-dcnode-id="764" instrument_node="">Your restaurant’s checklist will depend on your concept, size and menu, but this list should give you a sense of what to focus on and where to start. With smart planning and the right tools in place, you’ll have what you need to be successful.&nbsp;&nbsp;</span></span></p><p data-dcnode-id="754"><span data-dcnode-id="760" style="font-weight: 400;"><span data-dcnode-id="761" instrument_node="">Itching to get started? </span></span><a data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lightspeedhq.com/pos/restaurant/talk-to-a-pos-expert/"><span data-dcnode-id="758" style="font-weight: 400;"><span data-dcnode-id="759" instrument_node="">Chat with one of our experts</span></span></a><span data-dcnode-id="755" style="font-weight: 400;"><span data-dcnode-id="756" instrument_node=""> to find out how Lightspeed can help you get a jump-start in your brand new food service business.&nbsp;</span></span></p><p data-dcnode-id="753"></p><span data-dcnode-id="752" instrument_node="">
