icle class="post-1221 post type-post status-publish format-standard hentry category-fashion-style category-tshirt" data-dcnode-id="152" id="post-1221"><header class="page-header" data-dcnode-id="1101"><h1 class="page-title entry-title" data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">How to Write a T-shirt Design &amp; Sales Business Plan [Sample Template]</span></h1></header><div class="entry-content-main" data-dcnode-id="154"><div class="entry-content" data-dcnode-id="155"><p data-dcnode-id="1094"><strong data-dcnode-id="1096"><span data-dcnode-id="1100" instrument_node="">Are you about </span><a data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/starting-a-tshirt-business/"><span data-dcnode-id="1099" instrument_node="">starting a T-shirt Business online</span></a><span data-dcnode-id="1097" instrument_node="">? If YES, here is a complete sample T-shirt printing business plan template &amp; feasibility report you can use for FREE</span></strong><span data-dcnode-id="1095" instrument_node="">. Starting a T – shirt design and sales business is of course one of the many businesses that can be started in any part of the world and the owner of the business can still penetrate the world market once the design is good and it meets a need in the fashion market; everybody whether old or young have need for clothes most especially T – shirts for casual wears.</span></p><div class="toc_white no_bullets contracted" data-dcnode-id="1029" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="1086"><span data-dcnode-id="1093" instrument_node="">Table of Content</span><span data-dcnode-id="1092" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="1087"><span data-dcnode-id="1091" instrument_node="">[</span><a data-dcnode-id="1089" href="#"><span data-dcnode-id="1090" instrument_node="">show</span></a><span data-dcnode-id="1088" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="1030" style="display: none;"><ul data-dcnode-id="1076"><li data-dcnode-id="1083"><a data-dcnode-id="1084" href="#Why_Start_a_T-Shirt_Business"><span data-dcnode-id="1085" instrument_node="">Why Start a T-Shirt Business?</span></a></li><li data-dcnode-id="1080"><a data-dcnode-id="1081" href="#What_It_Takes_to_Start_a_T-Shirt_Business"><span data-dcnode-id="1082" instrument_node="">What It Takes to Start a T-Shirt Business?</span></a></li><li data-dcnode-id="1077"><a data-dcnode-id="1078" href="#1_Industry_Overview"><span data-dcnode-id="1079" instrument_node="">1. Industry Overview</span></a></li></ul><li data-dcnode-id="1066"><a data-dcnode-id="1074" href="#2_Executive_Summary"><span data-dcnode-id="1075" instrument_node="">2. Executive Summary</span></a><ul data-dcnode-id="1067"><li data-dcnode-id="1071"><a data-dcnode-id="1072" href="#3_Our_Products_and_Services"><span data-dcnode-id="1073" instrument_node="">3. Our Products and Services</span></a></li><li data-dcnode-id="1068"><a data-dcnode-id="1069" href="#4_Our_Mission_and_Vision_Statement"><span data-dcnode-id="1070" instrument_node="">4. Our Mission and Vision Statement</span></a></li></ul></li><li data-dcnode-id="1063"><a data-dcnode-id="1064" href="#5_Job_Roles_and_Responsibilities"><span data-dcnode-id="1065" instrument_node="">5. Job Roles and Responsibilities</span></a></li><li data-dcnode-id="1060"><a data-dcnode-id="1061" href="#6_SWOT_Analysis"><span data-dcnode-id="1062" instrument_node="">6. SWOT Analysis</span></a></li><li data-dcnode-id="1038"><a data-dcnode-id="1058" href="#7_MARKET_ANALYSIS"><span data-dcnode-id="1059" instrument_node="">7. MARKET ANALYSIS</span></a><ul data-dcnode-id="1039"><li data-dcnode-id="1055"><a data-dcnode-id="1056" href="#8_Our_Target_Market"><span data-dcnode-id="1057" instrument_node="">8. Our Target Market</span></a></li><li data-dcnode-id="1052"><a data-dcnode-id="1053" href="#9_SALES_AND_MARKETING_STRATEGY"><span data-dcnode-id="1054" instrument_node="">9. SALES AND MARKETING STRATEGY</span></a></li><li data-dcnode-id="1049"><a data-dcnode-id="1050" href="#10_Sales_Forecast"><span data-dcnode-id="1051" instrument_node="">10. Sales Forecast</span></a></li><li data-dcnode-id="1046"><a data-dcnode-id="1047" href="#11_Publicity_and_Advertising_Strategy"><span data-dcnode-id="1048" instrument_node="">11. Publicity and Advertising Strategy</span></a></li><li data-dcnode-id="1043"><a data-dcnode-id="1044" href="#12_Our_Pricing_Strategy"><span data-dcnode-id="1045" instrument_node="">12. Our Pricing Strategy</span></a></li><li data-dcnode-id="1040"><a data-dcnode-id="1041" href="#Equipment_Tools"><span data-dcnode-id="1042" instrument_node="">Equipment &amp; Tools </span></a></li></ul></li><li data-dcnode-id="1031"><a data-dcnode-id="1036" href="#13_Startup_Expenditure_Budget"><span data-dcnode-id="1037" instrument_node="">13. Startup Expenditure (Budget)</span></a><ul data-dcnode-id="1032"><li data-dcnode-id="1033"><a data-dcnode-id="1034" href="#14_Sustainability_and_Expansion_Strategy"><span data-dcnode-id="1035" instrument_node="">14. Sustainability and Expansion Strategy</span></a></li></ul></li></ul></div><h4 data-dcnode-id="1025"><span data-dcnode-id="1026" id="Why_Start_a_T-Shirt_Business"><strong data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Why Start a T-Shirt Business?</span></strong></span></h4><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Entrepreneurs who intend starting a clothing line business can start their own T – shirt design and sale business from their home on a small scale and service a customized market or big time investors can open a clothing factory and dominant both the U.S. market and the international market.</span></p><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">The bottom line is always that there is always a ready market for manufacturers of clothes. All a designer need to do is to ensure that he or she carves a niche for his business and they work hard to build their brand name to be accepted beyond his / her city of operations.</span></p><div class="code-block code-block-1" data-dcnode-id="1011" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="1012"><span data-dcnode-id="1019" instrument_node="">
</span><span data-dcnode-id="1017" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2552847123501338" data-ad-format="auto" data-ad-slot="4731700007" data-dcnode-id="1016" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1015" instrument_node="">
</span></div></div><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">T – Shirt design and sales business just like most businesses, thrives on creativity, branding (media hype and what have you) and good business skills. Any aspiring entrepreneur can start a T – shirt design and sales business, as long as they are creative, they can get people to promote their brand and they have good business skills.</span></p><h4 data-dcnode-id="1005"><span data-dcnode-id="1006" id="What_It_Takes_to_Start_a_T-Shirt_Business"><strong data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">What It Takes to Start a T-Shirt Business?</span></strong></span></h4><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">The starting size of this type of business doesn’t really matter as long as the business is built on the right foundation and with the right combination of skills and talents; after all, a world renowned clothing line – Coco Chanel started from a little hat shop in a street in Paris and today they are all over the world.</span></p><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">One thing is certain, once you are creative, you will be able to come out with a unique style. In the clothing line industry, you signature is your style. Another important factor that counts in this line of business is the brand name and perhaps the logo of the clothing line.</span></p><p data-dcnode-id="996"><span data-dcnode-id="1000" instrument_node="">If you look at the leaders in the clothing line </span><a data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/choosing-a-business-name/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="999" instrument_node="">business you will realize that they deliberately choose a name</span></a><span data-dcnode-id="997" instrument_node=""> and create a logo that best communicate how they want people to perceive them. Once you are able to secure a good name for your T – shirt design and sales business and then hire experts (graphic artists) to help you create a compelling logo; if you don’t mind, you can follow the trend in the industry.</span></p><h2 data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">A Sample T-Shirt Design &amp; Sales Business Plan Template</span></h2><h4 data-dcnode-id="990"><span data-dcnode-id="991" id="1_Industry_Overview"><strong data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">1. Industry Overview</span></strong></span></h4><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">The fashion industry is indeed a highly thriving industry all over the globe for obvious reasons and T – shirt design and sales is a subset of the industry. There are various clothing label; some are national brand and some others are international brands.</span></p><div class="code-block code-block-2" data-dcnode-id="978" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="979"><span data-dcnode-id="986" instrument_node="">
</span><span data-dcnode-id="984" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2552847123501338" data-ad-format="auto" data-ad-slot="6182319196" data-dcnode-id="983" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="982" instrument_node="">
</span></div></div><p data-dcnode-id="973"><span data-dcnode-id="977" instrument_node="">The fashion industry, especially cloth / T – shirt making business was not as easy as it is now; before now, clothing was handmade based on demand by individual. In the 20</span><sup data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">th</span></sup><span data-dcnode-id="974" instrument_node=""> century after the invention of sewing machines (industrial sewing machines) it became pretty much easier to produce T – shirts en mass.</span></p><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Technology indeed is responsible for opening up the clothing industry. T – Shirts can now go through factory system of production and still maintain good quality and standard sizes. With that, it is easier for retailers to order and sell T – shirts at fix prices in department stores and boutique et al without stress.</span></p><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">The fashion industry is a creation of the modern age and fashion style changes with rapid astonishment and in most cases people go back to the past to re – introduce old fashion. The fashion industry is indeed a rapidly changing industry; fashion trend will always come and go at different season.</span></p><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">The bottom line is that successful clothing labels (T – shirt designers) have a thorough grasp of the market and they know how to meet their needs or cajole them to accept what they have to offer; they are always creative, flexible and ready to either detect the trend or move with the trend.</span></p><p data-dcnode-id="962"><span data-dcnode-id="966" instrument_node="">No doubt, a retailer or wholesale distributor of T – shirts can order for various sizes of clothes from anywhere in the world and sell in his or her country without even visiting the production factory. As a matter of fact, any </span><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/cost-starting-a-clothing-line/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="965" instrument_node="">clothing line based business</span></a><span data-dcnode-id="963" instrument_node=""> is one business that has the capacity to survive regardless of what is happening in the economy of the world.</span></p><div class="code-block code-block-3" data-dcnode-id="952" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="953"><span data-dcnode-id="960" instrument_node="">
</span><span data-dcnode-id="958" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2552847123501338" data-ad-format="auto" data-ad-slot="7800924793" data-dcnode-id="957" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="956" instrument_node="">
</span></div></div><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Economic downturn or even a galloping inflation does not in any way affect the sale of clothes; people can’t do without wearing clothes. For instance, you can’t find even the homeless people in America not wearing clothes.</span></p><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">From time immemorial, the fashion industry is known to be one of the largest employers of labor (both directly and indirectly) in the united states of America. Some of the leading labels in the fashion industry are from the United States of America. Although, some clothing labels outsource the production of their clothes to other parts of the world; predominantly Asian countries, just in a bid to cut cost.</span></p><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Some cities of the world are considered to be fashion hubs; they dictate what happens in the fashion industry. The cities are Paris, Milan, New York City, Tokyo and London. These cities are known to host fashion exhibitions; designers who want to play at the global stage ensures that they exhibit their clothing collections to fashion enthusiast during fashion week in any of the cities mentioned above.</span></p><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">As a T – shirt designer, once your brand / label is accepted in any of the fashion capitals of the world, it won’t be too long before you become a globally recognized clothing label – brand.</span></p><h3 data-dcnode-id="941"><span data-dcnode-id="942" id="2_Executive_Summary"><span data-dcnode-id="943" instrument_node="">2. Executive Summary</span></span></h3><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Richards Peal™ is an international clothing line with a bias for designers T – shirts that will be located in Beverly Hills, California. We have been able to secure a large warehouse in a strategic part of town that will be converted to our T – shirt production factory. We were able to out rightly buy over the facility with the help of our bank and support from family and friends.</span></p><div class="code-block code-block-7" data-dcnode-id="929" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="930"><span data-dcnode-id="937" instrument_node="">
</span><span data-dcnode-id="935" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2552847123501338" data-ad-format="auto" data-ad-slot="7800924793" data-dcnode-id="934" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="933" instrument_node="">
</span></div></div><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Richards Peal™ will be involved in the production of T – shirts and other casual cum sport clothes, and the likes, that will meet the needs of male, female, young adult and children. Our business goal is to become one of the leading T – shirt designers in the United States and we will make sure that every T – shirt or clothes that leaves our factory can favorable compete with the best brands in the industry.</span></p><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Our workers are going to be selected from a pool of talented T – shirt designers in and around Beverly Hills, California and also from any part of the world as the business grows. We will make sure that we take all the members of our workforce especially T – shirt designers through the required trainings that will position them to meet the expectation of the company and to compete with leading T – shirt designers in the United States and throughout the globe.</span></p><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">We have put plans in place to build a state of the art clothing line production factory in Beverly Hills, California, which is exactly why we have entered agreement with some manufacturers of sewing machines to produce customized sewing machines for us that will give us the quality of clothes that we want to be known for. Our factory will be well equipped and we will ensure that we follow the trend in the industry.</span></p><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Richards Peal™ will manufacture high quality T – shirts for both the high end customers and also for low income earners; we want to become one of the people’s choice where ever our T – shirts are put up for sale. Apart from mass production of T – shirts, we will also be engaged in customized production of T – shirts for customers based on their demands.</span></p><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">We are quite aware that there are some clients such as sporting clubs, political parties, schools, churches and organizations that would need quality customized T – shirts for specific purposes and we are well prepared to deliver as requested.</span></p><div class="code-block code-block-8" data-dcnode-id="909" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="910"><span data-dcnode-id="917" instrument_node="">
</span><span data-dcnode-id="915" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2552847123501338" data-ad-format="auto" data-ad-slot="7800924793" data-dcnode-id="914" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="913" instrument_node="">
</span></div></div><ul data-dcnode-id="905"><li data-dcnode-id="906"><strong data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Ownership Structure/Founder’s Biography</span></strong></li></ul><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Richards Peal™ is owned by Richard Crespo – Pablo and family. Richards Crespo – Pablo is an Italian – American fashion enthusiast with over two decades of experience in the fashion industry. He will occupy the position of the chief executive officer (CEO) / President of the organization.</span></p><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Richard Crespo – Pablo has Degree in Fashion Designing from Milan School of Fashion and also an MBA from Harvard. He is a well – respected figure in the fashion industry, prior to starting Richards Peal™ he was the creative director in one of the world’s leading fashion label that is based in Milan, Italy.</span></p><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">He will run the company with two of his children and also some protégées (core T- shirts designers and market and sales experts) of his that he has trained over his working years as a fashion icon in both Italy and the United States of America.</span></p><h4 data-dcnode-id="895"><span data-dcnode-id="896" id="3_Our_Products_and_Services"><strong data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">3. Our Products and Services</span></strong></span></h4><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Richards Peal™ was established with the aim of producing high quality and highly fashionable T – shirts for men, women, young adults and children. We know that quality is a key factor that will help us sell our brand which is why we have but in place a competent quality assurance team that will ensure that all our T – shirts meet and even surpass our customers’ expectations.</span></p><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">We will work hard to ensure that Richards Peal™ is not just accepted nationally in the united states of America, but also in other parts of the world.</span></p><div class="code-block code-block-9" data-dcnode-id="881" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="882"><span data-dcnode-id="889" instrument_node="">
</span><span data-dcnode-id="887" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2552847123501338" data-ad-format="auto" data-ad-slot="7800924793" data-dcnode-id="886" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="885" instrument_node="">
</span></div></div><h4 data-dcnode-id="877"><span data-dcnode-id="878" id="4_Our_Mission_and_Vision_Statement"><strong data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">4. Our Mission and Vision Statement</span></strong></span></h4><ul data-dcnode-id="872"><li data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Our vision is to establish a T – shirt design and sales company whose brand will not only be accepted in the United States of America, but also in other parts of the world.</span></li><li data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Our mission is to establish a T – shirt design and sales company that will design and produce high quality T – shirts and casual clothes for male, female, young adults and children; a T – shirt label that will compete favorably with international T – shirt labels like Ralph Lauren, Polo by Ralph, Tommy Hilfiger, Hugo Boss, Gap, Lacoste, Nike, Levi Straus, Adidas, Diesel, Nautical, Puma, Prada and Rebel (Children’s T – shirts) et al at the global stage.</span></li></ul><p data-dcnode-id="869"><strong data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Our Business Structure</span></strong></p><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Richards Peal™ T – shirt design and Sales Company, is a company that intends opening small, but hope to grow big in order to compete favorably with leading T – shirt design and sales labels in the fashion industry both in the United States and on a global stage.</span></p><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">We are aware of the significance of building a solid business structure that can support the picture of the kind of business we want to own. This is why we are committed to only hire the best hands that we can attract.</span></p><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Despite the fact that Richards Peal™ T – shirt designs and sales company will start operation from a single factory in Beverly, California, we have a holistic view of the kind of business we want to build; we want to grow to the level where we will build factories in Thailand and China.</span></p><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Our T – shirt brand is going to be specifically designed to penetrate not just the United States market, but also the world’s fashion industry.</span></p><div class="code-block code-block-10" data-dcnode-id="851" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="852"><span data-dcnode-id="859" instrument_node="">
</span><span data-dcnode-id="857" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2552847123501338" data-ad-format="auto" data-ad-slot="7800924793" data-dcnode-id="856" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="855" instrument_node="">
</span></div></div><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">We want people of all walks of life across the globe to someday put on our T – shirts; we want to see our T – shirts being worn in Paris, in London, in Tokyo, in Lagos, in Madrid, in Johannesburg, in Buenos Aries, in Sao Paulo, in Port Elizabeth, in Dubai and all over the nooks and crannies of the world.</span></p><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">At Richards Peal™ T – shirts design and sales company, we will guarantee that we hire people that are qualified, hardworking, customer centric and are ready to work to help us build a prosperous business that will benefit all the stake holders (the owners, workforce, and customers).</span></p><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">As a matter of fact, profit-sharing arrangement will be made available to all our senior management staff and it will be based on their performance for a period of five years or more as agreed by the board of trustees of the company. In view of the above, we have decided to hire qualified and competent hands to occupy the following positions;</span></p><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Chief Executive Officer (Owner), General Manager, Human Resources and Admin Manager, Sales and Marketing Executive, Accountant, Fashion Designers (With Bias in T – shirts design and casual clothes), Quality Control Officer, Tailors, and Factory Workers</span></p><h3 data-dcnode-id="839"><span data-dcnode-id="840" id="5_Job_Roles_and_Responsibilities"><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">5. Job Roles and Responsibilities</span></strong></span></h3><p data-dcnode-id="836"><strong data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Chief Executive Officer – CEO:</span></strong></p><div class="code-block code-block-11" data-dcnode-id="826" style="margin: 8px 0; clear: both; height: 300px;"><div data-dcnode-id="827"><span data-dcnode-id="834" instrument_node="">
</span><span data-dcnode-id="832" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2552847123501338" data-ad-format="auto" data-ad-slot="7800924793" data-dcnode-id="831" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="830" instrument_node="">
</span></div></div><ul data-dcnode-id="815"><li data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Increases management’s effectiveness by recruiting, selecting, orienting, training, coaching, counseling, and disciplining managers; communicating values, strategies, and objectives; assigning accountabilities; planning, monitoring, and appraising job results; developing incentives; developing a climate for offering information and opinions; providing educational opportunities.</span></li><li data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Responsible for providing direction for the business</span></li><li data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Creates, communicates, and implements the organization’s vision, mission, and overall direction – i.e. leading the development and implementation of the overall organization’s strategy.</span></li><li data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Responsible for signing checks and documents on behalf of the company</span></li><li data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Evaluates the success of the organization</span></li></ul><p data-dcnode-id="812"><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">General Manager:</span></strong></p><ul data-dcnode-id="783"><li data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Develops strategic plan by studying technological and financial opportunities; presenting assumptions; recommending objectives.</span></li><li data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Accomplishes subsidiary objectives by establishing plans, budgets, and results measurements; allocating resources; reviewing progress; making mid-course corrections.</span></li><li data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Coordinates efforts by establishing procurement, production, marketing, field, and technical services policies and practices; coordinating actions with corporate staff.</span></li><li data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Builds company image by collaborating with customers, government, community organizations, and employees; enforcing ethical business practices.</span></li><li data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Responsible for fixing prices and signing business deals</span></li><li data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Responsible for recruitment</span></li><li data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Responsible for payment of salaries</span></li><li data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Maintains quality service by establishing and enforcing organization standards.</span></li><li data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Maintains professional and technical knowledge by attending educational workshops; reviewing professional publications; establishing personal networks; benchmarking state-of-the-art practices; participating in professional societies.</span></li><li data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Contributes to team effort by accomplishing related results as needed.</span></li><li data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Responsible for managing the daily activities in the factory</span></li><li data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Responsible for supervising all the employees</span></li><li data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Responsible for planning sales, monitoring inventory, selecting the merchandise, and writing and pricing orders to vendors</span></li><li data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Ensures that the organization operates within stipulated budget.</span></li></ul><p data-dcnode-id="780"><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Human Resources and Admin Manager</span></strong></p><ul data-dcnode-id="767"><li data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Responsible for overseeing the smooth running of HR and administrative tasks for the organization</span></li><li data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Defining job positions for recruitment and managing interviewing process</span></li><li data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Carrying out staff induction for new team members</span></li><li data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Responsible for training, evaluation and assessment of employees</span></li><li data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Responsible for arranging travel, meetings and appointments</span></li><li data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Oversee the smooth running of the daily office and factory activities.</span></li></ul><p data-dcnode-id="764"><strong data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Sales and Marketing Manager</span></strong></p><ul data-dcnode-id="755"><li data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Manage external research and coordinates all the internal sources of information to retain the organizations’ best customers and attract new ones</span></li><li data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Models demographic information and analyzes the volumes of transactional data generated by customer purchases</span></li><li data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Creates new markets cum businesses for the organization</span></li><li data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Empowers and motivates the sales team to meet and surpass agreed targets</span></li></ul><p data-dcnode-id="752"><strong data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Accountant / Cashier:</span></strong></p><ul data-dcnode-id="737"><li data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Receives payments on behalf of the organization</span></li><li data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Issues receipt to customers</span></li><li data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Prepares financial report at the end of every working week</span></li><li data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Handles all financial transaction on behalf of the company</span></li><li data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Interfaces with the organization’s banks</span></li><li data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Responsible for payment of tax, levies and utility bills</span></li><li data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Any other duty as assigned by the CEO / store manager</span></li></ul><p data-dcnode-id="734"><strong data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Fashion Designers (with bias in T – shirt designs)</span></strong></p><div class="code-block code-block-12" data-dcnode-id="732" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="733"></div></div><ul data-dcnode-id="725"><li data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Responsible for designing T – shirts and casual clothes) to meet the latest trend</span></li><li data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Stays abreast with the dynamics of the fashion industry with key interest in T – shirts and casual clothes</span></li><li data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Research and advice the organization on style, size and other trendy fashion statements.</span></li></ul><p data-dcnode-id="722"><strong data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Quality Control Officer</span></strong></p><ul data-dcnode-id="709"><li data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Ensures that all the T – shirts and casual clothes in our production line meets the required quality before they are released in the market</span></li><li data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Make certain that production and manufacturing lines perform efficiently, coordinate employee efforts, and facilitate communications between management and production departments.</span></li><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Devises ways of improving the manufacturing process to ensure higher-quality and durable T – shirts</span></li><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Ensures that manufacturing production lines run smoothly and generate a consistently suitable output for their employers</span></li><li data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Ensures that the organization work in line with international best practices</span></li><li data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Handles any other responsibility as assigned by the general manager</span></li></ul><p data-dcnode-id="706"><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Tailors (Industrial Sewing Machine Operators)</span></strong></p><ul data-dcnode-id="699"><li data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Responsible for sewing T – shirts and casual clothes as instructed by the supervisor / fashion designer</span></li><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Responsible for cutting clothing materials to fit the expected design and size</span></li><li data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Handles any other duty as assigned by the general manager</span></li></ul><p data-dcnode-id="696"><strong data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Factory Workers:</span></strong></p><ul data-dcnode-id="685"><li data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Responsible for ironing and packaging of T – shirts and casual clothes</span></li><li data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Responsible for movement of equipment and raw materials as required</span></li><li data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Ensures that toiletries and supplies don’t run out of stock</span></li><li data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Cleans both the interior and exterior of the factory, machines and other equipment</span></li><li data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Handles any other duty as assigned by the general / floor manager.</span></li></ul><h3 data-dcnode-id="682"><span data-dcnode-id="683" id="6_SWOT_Analysis"><span data-dcnode-id="684" instrument_node="">6. SWOT Analysis</span></span></h3><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Richards Peal™ intends to build a world class T – shirts design and sales business that will manufacture T – shirts and casual clothes for men, women, young adult and children. We will be based in Beverly, California, but we will not restrict the sale of our T – shirts and casual clothes to the U.S market alone, we will sell our product in other parts of the world.</span></p><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">In other to achieve this in a highly competitive industry like the fashion industry, we must ensure that we critically look through our strength, our weaknesses, the opportunities available in the industry and the threats that we will are likely going to face.</span></p><div class="code-block code-block-13" data-dcnode-id="676" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="677"></div></div><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Because of the nature of the business we are involved in and the brand we want to build, we were able to hire the services of an HR and Business consultant with bias in fashion and retailing to help us conduct a thorough SWOT analysis and to help us create a Business model that will help us achieve our business goals and objectives.</span></p><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">This is the summary of the SWOT analysis that was conducted for Richards Peal™ T – shirt Design and Sales Company;</span></p><ul data-dcnode-id="668"><li data-dcnode-id="669"><strong data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Strength:</span></strong></li></ul><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Perhaps one of our strongest strength could be attributed to the quality of employees and the latest machines and equipment that we have in our T – shirt production factory. Our chief executive officer, Mr. Richards Crespo – Pablo will be bringing his vast wealth of experience to the table and that is indeed a huge positive for Richards Peal™ T – Shirts Design and Sales Company</span></p><ul data-dcnode-id="662"><li data-dcnode-id="663"><strong data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Weakness:</span></strong></li></ul><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">A major weakness that may count against us is the fact that we are a new T – shirt design and sales company and we don’t have the financial capacity to compete with multi – billion dollars fashion label like Ralph Lauren, Polo by Ralph, Tommy Hilfiger, Hugo Boss, Gap, Lacoste, Nike, Levi Straus, Adidas, Diesel, Nautical, Puma, Prada and Rebel (Children’s T – shirts) et al when it comes to controlling the market or detecting the trend.</span></p><ul data-dcnode-id="656"><li data-dcnode-id="657"><strong data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Opportunities:</span></strong></li></ul><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">One thing is certain, whether good or bad- people will always look for clothes to wear and on the average they go for T – shirts simply because it is cheap. Besides, the opportunity for clothing line to sell their clothes is massive and we hope to leverage on these opportunities to sell our T – shirts.</span></p><div class="code-block code-block-14" data-dcnode-id="652" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="653"></div></div><ul data-dcnode-id="648"><li data-dcnode-id="649"><strong data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Threat:</span></strong></li></ul><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Just like any other business, one of the major threats that we are likely going to face is economic downturn. It is a fact that economic downturn affects purchasing power. Another threat that may likely confront us is the arrival of a new T – shirts design and sales company in same location where our target market exist who may want to adopt same business model like us.</span></p><h3 data-dcnode-id="643"><span data-dcnode-id="644" id="7_MARKET_ANALYSIS"><span data-dcnode-id="645" instrument_node="">7. MARKET ANALYSIS</span></span></h3><ul data-dcnode-id="639"><li data-dcnode-id="640"><strong data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Market Trends</span></strong></li></ul><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">In recent time, the fashion industry relies more on mass market sales for them to make the kind of income that will sustain the business. The mass market takes care of a wide range of customers that cuts across both the rich and the poor. Most of the new clothing lines that are trying to catch – up with the market often produce ready-to-wear clothes using trends set by leading fashion labels.</span></p><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">What they do is that, they try to see the direction of the trend as established by renowned fashion brand before producing their own versions of the original look by making use of cheaper fabrics and simpler production processes which can easily be done by machines. They can comfortably sell such product at a cheaper price to the masses who can’t afford to by the original which is often way too expensive for the common man.</span></p><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">T – Shirt designers and fashion designers now leverage on the runway – fashion expo to promote and attract market for their products. Any fashion designer who is recognized in Paris, Milan, New York City, or London can comfortably become a global recognized fashion label.</span></p><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Small start – up T – shirt designs and sales companies leverage on small markets such as companies, churches, schools, organized groups and sport fans to sell their T – shirts. This group of people can order large numbers of customized T – shirts for special purposes. For example, a political party enters into a business deal with a T – shirt design and sales company to help them produce shirts to be used by their supporters during political rallies and campaigns.</span></p><div class="code-block code-block-15" data-dcnode-id="629" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="630"></div></div><h4 data-dcnode-id="625"><span data-dcnode-id="626" id="8_Our_Target_Market"><strong data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">8. Our Target Market</span></strong></span></h4><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">No doubt the clothing line industry has the widest range of customers; everybody on planet earth wears clothes howbeit different designs, quality and style. In view of that, we have created strategies that will enable us reach out to people that cut across different classes in the society; we will produce T – shirts and casual clothes for male, female, young adults and children.</span></p><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">We have conducted our market research and survey and we will ensure that our T – shirt label is well accepted in the market place. These are the different group of people that we will be producing T – shirts and casual clothes for;</span></p><ul data-dcnode-id="600"><li data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Male</span></li><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Female</span></li><li data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Young Adult</span></li><li data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Children</span></li><li data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Corporate Executives</span></li><li data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Unions</span></li><li data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Sports Men and Women (sport clubs)</span></li><li data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Students</span></li><li data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Churches (Customized church robes)</span></li><li data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Political Parties</span></li></ul><p data-dcnode-id="595"><strong data-dcnode-id="596"><span data-dcnode-id="599" instrument_node="">Our </span><a class="wpil_keyword_link" data-dcnode-id="597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/example-companies-competitive-advantage/" rel="noopener noreferrer" target="_blank" title="competitive advantage"><span data-dcnode-id="598" instrument_node="">competitive advantage</span></a></strong></p><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Our competitive advantage as a T – shirt design and sales company is the fact that we are going to produce T – shirts and casual clothes for a wide range of people; we will produce for both the rich and the poor.</span></p><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Another competitive advantage for Richards Peal™ T – shirts Design and Sales Company is the quality and robust wealth of experience of our management team. The management team comprises of professionals who have worked with some of the leading international brand in the fashion industry.</span></p><div class="code-block code-block-16" data-dcnode-id="589" style="margin: 8px 0; clear: both; height: 300px;"><div class="ai-lazy" data-class="Y29kZS1ibG9jaw==" data-code="PHNjcmlwdCBhc3luYyBzcmM9Imh0dHBzOi8vcGFnZWFkMi5nb29nbGVzeW5kaWNhdGlvbi5jb20vcGFnZWFkL2pzL2Fkc2J5Z29vZ2xlLmpzP2NsaWVudD1jYS1wdWItMjU1Mjg0NzEyMzUwMTMzOCIKICAgICBjcm9zc29yaWdpbj0iYW5vbnltb3VzIj48L3NjcmlwdD4KPCEtLSBQViBCbG9jayBBZHMgMiAtLT4KPGlucyBjbGFzcz0iYWRzYnlnb29nbGUiCiAgICAgc3R5bGU9ImRpc3BsYXk6YmxvY2siCiAgICAgZGF0YS1hZC1jbGllbnQ9ImNhLXB1Yi0yNTUyODQ3MTIzNTAxMzM4IgogICAgIGRhdGEtYWQtc2xvdD0iNzgwMDkyNDc5MyIKICAgICBkYXRhLWFkLWZvcm1hdD0iYXV0byIKICAgICBkYXRhLWZ1bGwtd2lkdGgtcmVzcG9uc2l2ZT0idHJ1ZSI+PC9pbnM+CjxzY3JpcHQ+CiAgICAgKGFkc2J5Z29vZ2xlID0gd2luZG93LmFkc2J5Z29vZ2xlIHx8IFtdKS5wdXNoKHt9KTsKPC9zY3JpcHQ+" data-dcnode-id="590"></div></div><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Our latest machines and equipment also count towards our advantage especially when it comes to competing with other T – shirt designs and sales companies within the same category that we operate. The quality of every T – shirts and casual clothes that comes out of our production line must be certified okay before they are released to the market.</span></p><h4 data-dcnode-id="583"><span data-dcnode-id="584" id="9_SALES_AND_MARKETING_STRATEGY"><strong data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">9. SALES AND MARKETING STRATEGY</span></strong></span></h4><ul data-dcnode-id="579"><li data-dcnode-id="580"><strong data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Sources of Income</span></strong></li></ul><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Richards Pearl™ T – shirt Design and Sales Company will be involved in the production of high quality T – shirts and casual clothes that will meet the needs of male, female, young adult and children and that will be our major sources of income.</span></p><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">In future, we hope to open a standard fashion design school in Beverly, California. A school that will meet and surpass the needs of aspiring fashion designers in and around California. We will also go into fashion consulting business as a means of generating additional income for the business.</span></p><h4 data-dcnode-id="571"><span data-dcnode-id="572" id="10_Sales_Forecast"><strong data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">10. Sales Forecast</span></strong></span></h4><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">It is important to state that our sales forecast is based on the data gathered during our feasibility studies, market survey and also some of the assumptions readily available on the field.</span></p><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">It is important to state that people buy T – shirts and casual clothes for different purposes and clothes sell all through the calendar year albeit different designs for different seasons / weather. If it is winter, the demand for winter clothes will increase and if it is summer, the demand for summer clothes will increase.</span></p><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Below are the sales projections that we were able to come up with for the first three years of operations;</span></p><ul data-dcnode-id="552"><li data-dcnode-id="561"><strong data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">First Year-: </span></strong><span data-dcnode-id="562" instrument_node="">$ 500,000</span></li><li data-dcnode-id="557"><strong data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Second Year-: </span></strong><span data-dcnode-id="558" instrument_node="">$1,000,000</span></li><li data-dcnode-id="553"><strong data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Third Year-: </span></strong><span data-dcnode-id="554" instrument_node="">$2,000,000</span></li></ul><p data-dcnode-id="545"><strong data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">N.B</span></strong><span data-dcnode-id="549" instrument_node="">: This projection is done based on what is obtainable in the clothing line (fashion) industry and with the assumption that there won’t be any major economic downturn and there won’t be any T – shirts design and sales company that will </span><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/types-business-models-example/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="548" instrument_node="">adopt our unique business model</span></a><span data-dcnode-id="546" instrument_node="">. Please note that the above projection might be lower and at the same time it might be higher.</span></p><ul data-dcnode-id="541"><li data-dcnode-id="542"><strong data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Marketing Strategy and Sales Strategy</span></strong></li></ul><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Owing to the fact that we are a new T – shirts design and sales company that want to take on the international market, we have decided to model some of the leading international clothing manufacturing brand. We will ensure that we interact with our target market (customers) and sample their opinions to know what they want before mass – producing T – shirts and casual clothes.</span></p><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">It is easier to penetrate the market when what you produce is exactly what the people wanted. The fashion industry is indeed a very competitive industry, every T – shirt designer and clothing line must ensure that they are always on their toe and in touch with the trend if indeed they want to continue to be in business.</span></p><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">We are aware of this fact which is why we hired business consultant with bias in marketing and sales to help us craft a winning marketing and sales strategy. In summary, Richards Pearls™ T – Shirts Design and Sales Company will adopt the following sales and marketing approach to promote and sell our T – shirts and casual clothes;</span></p><ol data-dcnode-id="516"><li data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Introduce our T – shirt label by sending introductory letters to churches, schools, corporate organizations, political parties, groups, and other establishment that wears T – shirts and casual clothes.</span></li><li data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Attend fashion expos in the U.S and in other parts of the world</span></li><li data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Organize our own fashion show; in order for us to display our designs / clothes</span></li><li data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Advertise our clothing label in newspapers, TV and radio stations</span></li><li data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Canvass celebrities to wear and help us promote our clothing label</span></li><li data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">List our business on yellow pages ads / local directories</span></li><li data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Leverage on the internet to promote our business</span></li><li data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Engage in direct marketing</span></li><li data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Leverage on word of mouth marketing (referrals)</span></li></ol><h4 data-dcnode-id="512"><span data-dcnode-id="513" id="11_Publicity_and_Advertising_Strategy"><strong data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">11. Publicity and Advertising Strategy</span></strong></span></h4><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Publicity and advertising as it relates to the fashion industry involves being in touch with the organizations target market and being very creative and proactive. Beyond every reasonable doubt the media plays a very big role when it comes to helping a clothing label gain international significance.</span></p><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">The social media also plays an important role in modern day fashion publicity and advertisement; it gives fashion label the ability to reach out to a wide range of customers all over the world within a short period of time and of course at a very cheaper price when compared to other publicity and advertising platforms.</span></p><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Any T – shirt Design and Sales Company that wants to take on the market must be deliberate when it comes to building brand awareness and credibility. Most often than not, big – time clothing labels ensures that they create great hype whenever they are about to release any unique design from their stable.</span></p><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Social media, such as blogs, micro blogs, podcasts, photo and video sharing sites are some of the tools fashion designers leverage on to promote their labels. Some of the preferred social media platforms that are used in the fashion industry are Instagram, Tumblr, WordPress, Facebook, twitter, YouTube and other sharing sites.</span></p><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Here are the platforms we intend leveraging on to promote and advertise Richards Pearls™ T – Shirt Design and Sales Company;</span></p><ul data-dcnode-id="487"><li data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Place adverts on both print (newspapers and fashion magazines) and electronic (radio and TV) media platforms</span></li><li data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Sponsor relevant community programs like school fashion shows et al</span></li><li data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Leverage on the internet and social media platforms like; Instagram, Tumblr, WordPress, Facebook, twitter, YouTube and other sharing sites.et al to promote our brand</span></li><li data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Attend local and intentional fashion expos</span></li><li data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Organize our own fashion show</span></li><li data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Promote our clothing label on our own official websites and online fashion community</span></li><li data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Build relationship with celebrities especially in the entertainment industry and sports to endorse of clothing label.</span></li></ul><h4 data-dcnode-id="481"><span data-dcnode-id="482" id="12_Our_Pricing_Strategy"><strong data-dcnode-id="483"><span data-dcnode-id="486" instrument_node="">12. Our </span><a class="wpil_keyword_link" data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/factors-product-pricing-strategy/" rel="noopener noreferrer" target="_blank" title="Pricing Strategy"><span data-dcnode-id="485" instrument_node="">Pricing Strategy</span></a></strong></span></h4><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Richards Pearls™ T – Shirts Design and Sales Company will make sure that we design and manufactured T – shirts and casual clothes that will meet the financial capacity of different classes of people in different parts of the world. The prices for all our T – shirts and casual clothes will be affordable and at the same time competitive with what is obtainable in the fashion cum clothing line industry.</span></p><ul data-dcnode-id="475"><li data-dcnode-id="476"><strong data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Payment Options</span></strong></li></ul><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Our payment policy is all inclusive because we are quite aware that different people prefer different payment options as it suits them. Here are the payment options that will be available in every of our outlets where our T – shirts and casual clothes will be sold;</span></p><ul data-dcnode-id="462"><li data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Payment by cash</span></li><li data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Payment via Point of Sale (POS) Machine</span></li><li data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Payment via online bank transfer (online payment portal)</span></li><li data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Payment via Mobile money</span></li><li data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Payment by cash</span></li></ul><p data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">In view of the above, we have chosen banking platforms that will help us achieve our payment plans without little or no difficulties.</span></p><h4 data-dcnode-id="454"><span data-dcnode-id="455" id="Equipment_Tools"><strong data-dcnode-id="456"><span data-dcnode-id="459" instrument_node="">Equipment &amp; Tools</span><br data-dcnode-id="458"><span data-dcnode-id="457" instrument_node=""> </span></strong></span></h4><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">These are the machines, equipment and tools that we would need to start our T – shirts design and sales business;</span></p><ul data-dcnode-id="373"><li data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Industrial sewing machines</span></li><li data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Pattern makers for crafting designs.</span></li><li data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Women and men dress forms used for garment building.</span></li><li data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Scissors</span></li><li data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Hole punchers</span></li><li data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Straight and curved rulers</span></li><li data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Pencils</span></li><li data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Measuring tapes</span></li><li data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Notchers for marking seams.</span></li><li data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Pins</span></li><li data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Slopers</span></li><li data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Dotted pattern paper.</span></li><li data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Sewing machine needles</span></li><li data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Hand sewing needles.</span></li><li data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Threads</span></li><li data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Sketching books.</span></li><li data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Drapings tools.</span></li><li data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Dressmaking Stick pins</span></li><li data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Muslin</span></li><li data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Style tapes</span></li><li data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Fabric shears</span></li><li data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Soft lead pencil</span></li><li data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Marking pen</span></li><li data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Pattern plotter.</span></li><li data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Pattern making software.</span></li><li data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Computer</span></li><li data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">CAD tools for designs</span></li><li data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Digital drawing tools</span></li><li data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Digitizer board for pattern scanning.</span></li><li data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Heat transfer machines for T-shirts.</span></li><li data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Print tables.</span></li><li data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Racks</span></li><li data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Slat wall</span></li><li data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Mannequins</span></li><li data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Hangers</span></li><li data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Labels and Tags.</span></li><li data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Packaging materials</span></li><li data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Industrial pressing irons</span></li><li data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Supply of fabrics</span></li></ul><h3 data-dcnode-id="369"><span data-dcnode-id="370" id="13_Startup_Expenditure_Budget"><strong data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">13. Startup Expenditure (Budget)</span></strong></span></h3><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">These are the key areas where we will spend our start – up capital on;</span></p><ul data-dcnode-id="293"><li data-dcnode-id="363"><span data-dcnode-id="366" instrument_node="">The Total Fee for Registering the Business in Beverly, California – </span><strong data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">$750.</span></strong></li><li data-dcnode-id="359"><span data-dcnode-id="362" instrument_node="">Legal expenses for obtaining licenses (Health department license and business license) and permits (Fire department permit, Air and water pollution control permit, and Sign permit et al) – </span><strong data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">$4,500.</span></strong></li><li data-dcnode-id="355"><span data-dcnode-id="358" instrument_node="">Budget for publicity and advertisement of our T – shirt brand – </span><strong data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">$50,000</span></strong></li><li data-dcnode-id="351"><span data-dcnode-id="354" instrument_node="">Cost for hiring Business Consultant – </span><strong data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">$2,000.</span></strong></li><li data-dcnode-id="347"><span data-dcnode-id="350" instrument_node="">Insurance (general liability, theft, workers’ compensation and property casualty) coverage at a total premium – </span><strong data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">$30,800.</span></strong></li><li data-dcnode-id="343"><span data-dcnode-id="346" instrument_node="">Cost of accounting software, CRM software and Payroll Software – </span><strong data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">$3,000</span></strong></li><li data-dcnode-id="339"><span data-dcnode-id="342" instrument_node="">Cost for acquiring facility for our production factory – </span><strong data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">$500,000.</span></strong></li><li data-dcnode-id="335"><span data-dcnode-id="338" instrument_node="">Cost for facility remodeling – </span><strong data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">$50,000.</span></strong></li><li data-dcnode-id="330"><span data-dcnode-id="334" instrument_node="">Cost for purchasing initial supply of fabrics, racks, hangers and packaging materials – (</span><strong data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">$100,000</span></strong><span data-dcnode-id="331" instrument_node="">)</span></li><li data-dcnode-id="325"><span data-dcnode-id="329" instrument_node="">Phone and Utilities (gas, sewer, water and electric) deposits – (</span><strong data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">$3,500</span></strong><span data-dcnode-id="326" instrument_node="">).</span></li><li data-dcnode-id="321"><span data-dcnode-id="324" instrument_node="">Operational cost for the first 3 months (salaries of employees, payments of bills et al) – </span><strong data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">$40,000</span></strong></li><li data-dcnode-id="317"><span data-dcnode-id="320" instrument_node="">The cost for Start-up inventory – </span><strong data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">$15,000</span></strong></li><li data-dcnode-id="310"><span data-dcnode-id="316" instrument_node="">Cost for </span><a data-dcnode-id="314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.profitableventure.com/equipment-start-tshirt-printing-business/" rel="noopener" target="_blank"><span data-dcnode-id="315" instrument_node="">sewing machines and other sewing equipment and tools</span></a><span data-dcnode-id="313" instrument_node=""> – </span><strong data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">$250,000 </span></strong></li><li data-dcnode-id="306"><span data-dcnode-id="309" instrument_node="">The cost for the purchase of furniture and gadgets (Printers, Telephone, vacuum cleaner, tables and chairs et al) – </span><strong data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">$30,000.</span></strong></li><li data-dcnode-id="302"><span data-dcnode-id="305" instrument_node="">The cost of Launching a Website – </span><strong data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">$600</span></strong></li><li data-dcnode-id="298"><span data-dcnode-id="301" instrument_node="">The cost for our grand opening party – </span><strong data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">$5,500</span></strong></li><li data-dcnode-id="294"><span data-dcnode-id="297" instrument_node="">Miscellaneous supplies – </span><strong data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">$10,000</span></strong></li></ul><p data-dcnode-id="288"><span data-dcnode-id="292" instrument_node="">We would need an estimate of </span><strong data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">$3million</span></strong><span data-dcnode-id="289" instrument_node=""> to successfully launch our T – shirt design and sales business in Beverly, California.</span></p><p data-dcnode-id="285"><strong data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Generating Funding / Startup Capital for Richards Pearls™ T – Shirts Designs and Sales Company</span></strong></p><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Richards Pearls™ T – shirts designs and sales company is a private business that is solely owned and financed by Richards Crespo – Pablo and family. They do not intend to welcome any external business partner which is why he has decided to restrict the sourcing of the start – up capital to 3 major sources.</span></p><p data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">These are the areas we intend generating our start – up capital;</span></p><ul data-dcnode-id="274"><li data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">The Chief Executive Officer who happens to be the lead partner will contribute 20 percent of the start – up capital from his personal savings and other sources</span></li><li data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">30% of the capital will be generated from other family members</span></li><li data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">50% of the capital will be sourced from banks as a loan facility</span></li></ul><h4 data-dcnode-id="270"><span data-dcnode-id="271" id="14_Sustainability_and_Expansion_Strategy"><strong data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">14. Sustainability and Expansion Strategy</span></strong></span></h4><p data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">The future of a business lies in the numbers of loyal customers that they have the capacity and competence of the employees, their investment strategy and the business structure. If any of these factors is missing from a business (company), then it won’t be too long before the business close shop.</span></p><p data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Richards Pearls™ T – shirts designs and sales company will make sure that all the factors listed above are reinforced on a regular basis and also we will engage in continuous capacity building of our workforce.</span></p><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">As a matter of fact, profit-sharing arrangement will be made available to all our senior management staff and it will be based on their performance for a period of five years or more. This will enable us secure their loyalty and services for a long period of time.</span></p><p data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">We will make sure that the right foundation, structures and processes are put in place to ensure that staff welfare is well taken of. Our company’s corporate culture is designed to drive our business to greater heights and training and re – training of our workforce is at the top burner of all that we do at Richards Pearls™ T – shirts designs and sales company.</span></p><p data-dcnode-id="259"><strong data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Check List / Milestone</span></strong></p><ul data-dcnode-id="156"><li data-dcnode-id="255"><span data-dcnode-id="258" instrument_node="">Business Name Availability Check: </span><strong data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">Completed</span></strong></li><li data-dcnode-id="251"><span data-dcnode-id="254" instrument_node="">Business Registration: </span><strong data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Completed</span></strong></li><li
