</span><span data-dcnode-id="1173" id="Our-Home-Inspection-Checklist"><span data-dcnode-id="1174" instrument_node="">Our Home Inspection Checklist</span></span></h2><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1170" instrument_node="">What we recommend you will need to do your&nbsp;</span><a data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/what-home-inspection-includes/"><span data-dcnode-id="1169" instrument_node="">home inspection</span></a><span data-dcnode-id="1167" instrument_node="">:</span></p><span data-dcnode-id="1165" instrument_node="">
</span><ol data-dcnode-id="1152"><li data-dcnode-id="1161"><strong data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Checklist:</span></strong><span data-dcnode-id="1162" instrument_node="">&nbsp;Print this checklist with a clipboard and pencil</span></li><li data-dcnode-id="1157"><strong data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Clothing:</span></strong><span data-dcnode-id="1158" instrument_node="">&nbsp;Safety glasses, gloves, sneakers, and coveralls</span></li><li data-dcnode-id="1153"><strong data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Tools:&nbsp;</span></strong><span data-dcnode-id="1154" instrument_node="">Flashlight, GFCI outlet tester, infrared thermometer, binoculars, and a cell phone or camera to take pictures.</span></li></ol><p data-dcnode-id="1147"><strong data-dcnode-id="1149"><em data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Insider’s</span></em></strong><span data-dcnode-id="1148" instrument_node=""> Note:&nbsp;you can purchase a GFCI outlet tester and an infrared thermometer in the hardware department at Walmart or in home improvement stores for less than $25 each. We use a FLIR RT50 Receptacle Tester in our inspections. It’s a professional-grade GFCI tester available at Amazon.</span></p><span data-dcnode-id="1146" instrument_node="">
</span><h2 data-dcnode-id="1143" id="inspecting-the-exterior"><span data-dcnode-id="1144" id="Inspecting-the-Exterior"><span data-dcnode-id="1145" instrument_node="">Inspecting the Exterior</span></span></h2><span data-dcnode-id="1142" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1140"><img alt="home inspection" class="wp-image-203" data-dcnode-id="1141" height="544" loading="lazy" sizes="(max-width: 950px) 100vw, 950px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/wp-content/uploads/2019/06/don-home-inspection-lg.jpg&amp;raw" srcset="https://homeinspectioninsider.com/wp-content/uploads/2019/06/don-home-inspection-lg.jpg 950w, https://homeinspectioninsider.com/wp-content/uploads/2019/06/don-home-inspection-lg-300x172.jpg 300w, https://homeinspectioninsider.com/wp-content/uploads/2019/06/don-home-inspection-lg-768x440.jpg 768w" width="950"></figure><p data-dcnode-id="1136"><strong data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Foundation:&nbsp;</span></strong><span data-dcnode-id="1137" instrument_node="">You’ll want to identify what type of foundation the home has.</span></p><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1134" instrument_node="">Does the house have a basement, </span><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/remove-water-from-flooded-crawl-space/"><span data-dcnode-id="1133" instrument_node="">crawl space</span></a><span data-dcnode-id="1131" instrument_node="">, or concrete slab foundation?</span></p><div data-dcnode-id="1128" data-inserter-version="2" id="ezoic-pub-ad-placeholder-633"></div><span data-dcnode-id="1126" instrument_node="">
</span><ul data-dcnode-id="1121"><li data-dcnode-id="1122"><strong data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Basements</span></strong><span data-dcnode-id="1123" instrument_node="">: are deep foundations that are below ground. Some basements have an exposed exterior wall with a walkout on the rear of the house. This is common in hillside construction. Basements may be finished or unfinished.</span></li></ul><ul data-dcnode-id="1110"><li data-dcnode-id="1111"><strong data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Crawl Space</span></strong><span data-dcnode-id="1118" instrument_node="">: crawl spaces under a home are typically less than 4 feet high and provide access underneath the house to examine </span><a data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/what-size-nails-for-framing/"><span data-dcnode-id="1117" instrument_node="">wood framing</span></a><span data-dcnode-id="1115" instrument_node="">, plumbing, electrical, and ductwork. You can identify a </span><a data-dcnode-id="1113" data-wpil="url" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/crawl-space-encapsulation/"><span data-dcnode-id="1114" instrument_node="">crawl space</span></a><span data-dcnode-id="1112" instrument_node=""> if an access door and foundation vents are visible along the foundation.</span></li></ul><ul data-dcnode-id="1102"><li data-dcnode-id="1103"><strong data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Concrete Slab</span></strong><span data-dcnode-id="1107" instrument_node="">: this is a </span><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/poured-concrete-or-pavers-which-is-more-expensive/"><span data-dcnode-id="1106" instrument_node="">poured concrete</span></a><span data-dcnode-id="1104" instrument_node=""> foundation with no access underneath the home. Concrete slabs typically have a minimum elevation of 4 inches. Raised slabs can be much higher.</span></li></ul><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Look at the foundation walls. Do you see any cracking, shifting, or separating along the exterior?</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1095"><strong data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Siding:&nbsp;</span></strong><span data-dcnode-id="1096" instrument_node="">What is the condition of the exterior siding?</span></p><span data-dcnode-id="1094" instrument_node="">
</span><ul data-dcnode-id="1077"><li data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Is there damage to the siding such as wood rot, chipped or broken pieces, etc.?</span></li><li data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Is there peeling paint on painted surfaces?</span></li><li data-dcnode-id="1085"><span data-dcnode-id="1089" instrument_node="">Are there loose or missing pieces of </span><a data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/home-siding-costs/"><span data-dcnode-id="1088" instrument_node="">siding</span></a><span data-dcnode-id="1086" instrument_node="">?</span></li><li data-dcnode-id="1080"><span data-dcnode-id="1084" instrument_node="">Are there cracks in the brick veneer or </span><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/replacing-stucco-with-siding/"><span data-dcnode-id="1083" instrument_node="">stucco</span></a><span data-dcnode-id="1081" instrument_node=""> walls?</span></li><li data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Is there a minimum of 6 inches of ground clearance?</span></li></ul><p data-dcnode-id="1073"><strong data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Windows:</span></strong><span data-dcnode-id="1074" instrument_node="">&nbsp;What is the condition of the windows?</span></p><span data-dcnode-id="1072" instrument_node="">
</span><ul data-dcnode-id="1063"><li data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Is there broken glass in the windows?</span></li><li data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Is there wood rot in the window frames and sashes?</span></li><li data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">What’s the condition of the caulking around the windows? Is it dry and brittle?</span></li><li data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Is there peeling paint on wood sashes and framing?</span></li></ul><p data-dcnode-id="1059"><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Exterior Doors:&nbsp;</span></strong><span data-dcnode-id="1060" instrument_node="">What is the condition of the exterior doors?</span></p><div data-dcnode-id="1057" data-inserter-version="2" id="ezoic-pub-ad-placeholder-634"></div><span data-dcnode-id="1055" instrument_node="">
</span><ul data-dcnode-id="1048"><li data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Is there water damage to the bottom of the door?</span></li><li data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Is there wood rot in the exterior door frames and trim?</span></li><li data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Is there peeling paint on wood door frames and trim?</span></li></ul><p data-dcnode-id="1044"><strong data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Lot Grading:</span></strong><span data-dcnode-id="1045" instrument_node="">&nbsp;What is the condition of the grading?</span></p><span data-dcnode-id="1043" instrument_node="">
</span><ul data-dcnode-id="1036"><li data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Does the ground slope away from the house?</span></li><li data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Is there erosion around the foundation walls?</span></li><li data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Are there low-lying or wet areas of the yard?</span></li></ul><p data-dcnode-id="1032"><strong data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Vegetation:&nbsp;</span></strong><span data-dcnode-id="1033" instrument_node="">You’ll need to look at the trees and any shrubbery around the house.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><ul data-dcnode-id="1020"><li data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Are there trees growing within 8-10 ft of the foundation?</span></li><li data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Are there any dead or leaning trees that could fall on the house?</span></li><li data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Are there tree limbs overhanging the roof?</span></li><li data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Is the shrubbery touching the exterior of the home?</span></li><li data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Are there vines growing on the exterior walls?</span></li></ul><p data-dcnode-id="1016"><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Fence:&nbsp;</span></strong><span data-dcnode-id="1017" instrument_node="">Walk along the fence, checking for loose posts and broken boards. Does the fence feel sturdy when tugged on?</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1009"><a data-dcnode-id="1012" data-wpil="url" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/concrete-vs-asphalt-driveway/"><strong data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Driveways</span></strong></a><strong data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">, walkways, and patios</span></strong></p><div data-dcnode-id="1007" data-inserter-version="2" id="ezoic-pub-ad-placeholder-635"></div><span data-dcnode-id="1005" instrument_node="">
</span><ul data-dcnode-id="997"><li data-dcnode-id="1000"><span data-dcnode-id="1004" instrument_node="">Do the </span><a data-dcnode-id="1002" data-wpil="url" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/concrete-vs-asphalt-driveway/"><span data-dcnode-id="1003" instrument_node="">driveway</span></a><span data-dcnode-id="1001" instrument_node="">, walkway, and patios slope away from the house?</span></li><li data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Is there cracking from settlement causing uneven surfaces?</span></li></ul><p data-dcnode-id="993"><strong data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Decks:&nbsp;</span></strong><span data-dcnode-id="994" instrument_node="">What is the condition of the deck?</span></p><span data-dcnode-id="992" instrument_node="">
</span><ul data-dcnode-id="977"><li data-dcnode-id="987"><span data-dcnode-id="991" instrument_node="">Are the </span><a data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/tips-to-maintain-your-wood-deck/"><span data-dcnode-id="990" instrument_node="">decking</span></a><span data-dcnode-id="988" instrument_node=""> boards weathered?</span></li><li data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Are the decking boards weak when walked on?</span></li><li data-dcnode-id="980"><span data-dcnode-id="984" instrument_node="">Are the </span><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/residential-staircase-codes-rise-run-nosing-handrails-explained/"><span data-dcnode-id="983" instrument_node="">handrails</span></a><span data-dcnode-id="981" instrument_node=""> secure?</span></li><li data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Are the steps secured and easy to walk on?</span></li></ul><h2 data-dcnode-id="974" id="inspecting-the-roof"><span data-dcnode-id="975" id="Inspecting-the-Roof"><span data-dcnode-id="976" instrument_node="">Inspecting the Roof</span></span></h2><span data-dcnode-id="973" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="971"><img alt="home inspection" class="wp-image-447" data-dcnode-id="972" height="472" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/wp-content/uploads/2019/06/206765-675x450-ThinkstockPhotos-175639895-lg.jpg&amp;raw" srcset="https://homeinspectioninsider.com/wp-content/uploads/2019/06/206765-675x450-ThinkstockPhotos-175639895-lg.jpg 900w, https://homeinspectioninsider.com/wp-content/uploads/2019/06/206765-675x450-ThinkstockPhotos-175639895-lg-300x157.jpg 300w, https://homeinspectioninsider.com/wp-content/uploads/2019/06/206765-675x450-ThinkstockPhotos-175639895-lg-768x403.jpg 768w" width="900"></figure><p class="has-background" data-dcnode-id="962" style="background-color:#e5e5e5"><strong data-dcnode-id="968"><em data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Safety Note:&nbsp;</span></em></strong><em data-dcnode-id="963"><span data-dcnode-id="967" instrument_node="">We are not advising anyone to climb on any roof surface regardless of the roof slope. You can inspect most roofs safely from the ground with binoculars. Contact a certified </span><a data-dcnode-id="965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/home-inspectors-building-inspectors-whats-the-difference/"><span data-dcnode-id="966" instrument_node="">home inspector</span></a><span data-dcnode-id="964" instrument_node=""> to conduct a thorough home inspection.</span></em></p><span data-dcnode-id="961" instrument_node="">
</span><ul data-dcnode-id="942"><li data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Look for signs of broken or curling shingles.</span></li><li data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">As roofs age, fungi will grow on roof coverings on the north side. Look on the north side to see if there are black streaks on the shingles.</span></li><li data-dcnode-id="952"><span data-dcnode-id="956" instrument_node="">Do you see any unevenness or buckling in the </span><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/roofing-guide-inspection-replacement-lifespan/"><span data-dcnode-id="955" instrument_node="">roof sheathing</span></a><span data-dcnode-id="953" instrument_node="">?</span></li><li data-dcnode-id="947"><span data-dcnode-id="951" instrument_node="">If the </span><a data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/how-to-rust-galvanized-roof/"><span data-dcnode-id="950" instrument_node="">roof is metal</span></a><span data-dcnode-id="948" instrument_node="">, do you see any bent metal or rust signs?</span></li><li data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">If the roof is wood shake, do you see any signs of mold, wood rot, or decay in the wood shakes?</span></li><li data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Are the gutter piping and downspouts secure to the house?</span></li></ul><p data-dcnode-id="934"><span data-dcnode-id="941" instrument_node="">Most home inspectors will </span><a data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/tips-to-walk-on-steep-roofs/"><span data-dcnode-id="940" instrument_node="">walk on a roof</span></a><span data-dcnode-id="938" instrument_node=""> surface, provided it is safe. See our article&nbsp;</span><a data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/home-inspectors-roofs/"><span data-dcnode-id="937" instrument_node="">How Home Inspectors Examine Roofs – Methods &amp; Safety Concerns</span></a><span data-dcnode-id="935" instrument_node="">.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="926"><strong data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Garage:&nbsp;</span></strong><span data-dcnode-id="930" instrument_node="">You’ll need to go inside the garage to inspect the garage door and garage door opener. Often, mechanicals like </span><a data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/how-long-water-heaters-last-signs-cost-replace/"><span data-dcnode-id="929" instrument_node="">water heaters</span></a><span data-dcnode-id="927" instrument_node=""> is located in the garage.</span></p><div data-dcnode-id="924" data-inserter-version="2" id="ezoic-pub-ad-placeholder-636"></div><span data-dcnode-id="922" instrument_node="">
</span><ul data-dcnode-id="915"><li data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Before operating the garage door opener, check the garage door for damage such as bent panels, bent tracks, broken rollers, etc. Make sure the garage door is not locked. Many foreclosed homes have padlocks on the garage doors for security.</span></li><li data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">If all looks good, operate the garage door opener. Does the garage door vibrate excessively during operation?</span></li><li data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Check the Auto Reverse Sensors. you can do this by lowering the door and using your hand or foot to block the sensor. The door should reverse on its own.</span></li></ul><h2 data-dcnode-id="912" id="inspecting-mechanical-equipment"><span data-dcnode-id="913" id="Inspecting-Mechanical-Equipment"><span data-dcnode-id="914" instrument_node="">Inspecting Mechanical Equipment</span></span></h2><span data-dcnode-id="911" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="909"><img alt="home inspection" class="wp-image-455" data-dcnode-id="910" height="399" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/wp-content/uploads/2019/06/web-pics-018-lg.jpg&amp;raw" srcset="https://homeinspectioninsider.com/wp-content/uploads/2019/06/web-pics-018-lg.jpg 900w, https://homeinspectioninsider.com/wp-content/uploads/2019/06/web-pics-018-lg-300x133.jpg 300w, https://homeinspectioninsider.com/wp-content/uploads/2019/06/web-pics-018-lg-768x340.jpg 768w" width="900"></figure><p data-dcnode-id="905"><strong data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Heating and Cooling System:</span></strong><span data-dcnode-id="906" instrument_node="">&nbsp;Look at the heating and cooling system.</span></p><span data-dcnode-id="904" instrument_node="">
</span><ul data-dcnode-id="893"><li data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Can you read the serial number and model number on the data plate? Some systems stamp the age on the data plate. For others, you may have to use an online resource to determine the age of the system. Use&nbsp;https://www.building-center.org/&nbsp;to determine the age of the system.</span></li><li data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Does the system show signs of age, such as rust or damaged fins on the side of the unit.</span></li><li data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">If possible, ask the owner for service records.</span></li><li data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Check the air filter. Is it clean or dirty?</span></li><li data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Operate the system using the thermostat. If the temperature is above 65 degrees, operate in cooling mode only. Suppose the temperature is below 65 degrees, operate in heating mode only. Improper operation can damage the system. Use your hand to feel if the air is hot or cold, depending on its mode. For more detailed reading, you can use an infrared thermometer.</span></li></ul><p data-dcnode-id="889"><strong data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Water Heater:</span></strong><span data-dcnode-id="890" instrument_node="">&nbsp;Look at the water heater system.</span></p><span data-dcnode-id="888" instrument_node="">
</span><ul data-dcnode-id="872"><li data-dcnode-id="883"><span data-dcnode-id="887" instrument_node="">Can you read the serial number and model number on the data plate? You will need the serial number to determine the age of the water heater. Use&nbsp;</span><a data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.building-center.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="886" instrument_node="">https://www.building-center.org/</span></a><span data-dcnode-id="884" instrument_node="">&nbsp;to determine the age of the water heater.</span></li><li data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Does the system show signs of age, such as rust along the tank’s bottom or around the valves?</span></li><li data-dcnode-id="873"><span data-dcnode-id="880" instrument_node="">Check for hot water at a </span><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/how-long-do-faucets-last/"><span data-dcnode-id="879" instrument_node="">faucet</span></a><span data-dcnode-id="877" instrument_node="">. The hot side is on the left of the tap. If there’s </span><a data-dcnode-id="875" data-id="1175" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/no-hot-water/"><span data-dcnode-id="876" instrument_node="">no hot water in the house</span></a><span data-dcnode-id="874" instrument_node="">, check the water heater breaker or gas supply to verify it is on. </span></li></ul><h2 data-dcnode-id="869" id="inspecting-the-electric-system"><span data-dcnode-id="870" id="Inspecting-the-Electric-System"><span data-dcnode-id="871" instrument_node="">Inspecting the Electric System</span></span></h2><span data-dcnode-id="868" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="866"><img alt="home inspection" class="wp-image-449" data-dcnode-id="867" height="485" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/wp-content/uploads/2019/06/fullsizeoutput_650-1024x768-lg.jpg&amp;raw" srcset="https://homeinspectioninsider.com/wp-content/uploads/2019/06/fullsizeoutput_650-1024x768-lg.jpg 900w, https://homeinspectioninsider.com/wp-content/uploads/2019/06/fullsizeoutput_650-1024x768-lg-300x162.jpg 300w, https://homeinspectioninsider.com/wp-content/uploads/2019/06/fullsizeoutput_650-1024x768-lg-768x414.jpg 768w" width="900"></figure><p class="has-background" data-dcnode-id="857" style="background-color:#e5e5e5"><strong data-dcnode-id="863"><em data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Safety Note:</span></em></strong><em data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">&nbsp;We do not advise removing the cover panel from any electrical device or panel. Call a professional home inspector or lic</span></em><span data-dcnode-id="860" instrument_node="">ensed electrician if</span><em data-dcnode-id="858"><span data-dcnode-id="859" instrument_node=""> you see something you are unsure about.</span></em></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="849"><strong data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Electrical System:&nbsp;</span></strong><span data-dcnode-id="853" instrument_node="">You’ll need to look closely at the meter base outside and the&nbsp;</span><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/can-home-inspectors-open-electrical-panels-why-or-why-not/"><span data-dcnode-id="852" instrument_node="">electrical panel box</span></a><span data-dcnode-id="850" instrument_node="">.</span></p><div data-dcnode-id="847" data-inserter-version="2" id="ezoic-pub-ad-placeholder-637"></div><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="841"><strong data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Meter Base:&nbsp;</span></strong><span data-dcnode-id="842" instrument_node="">You’ll need to look at the meter base to determine any defects.</span></p><span data-dcnode-id="840" instrument_node="">
</span><ul data-dcnode-id="829"><li data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Identify if the service is overhead or underground. Do you see a service mast and overhead wiring? If so, this is called an overhead electrical service.</span></li><li data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Is the service mast secured to the house?</span></li><li data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Is the meter base secured to the house?</span></li><li data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Is there an adequately identified main service disconnect? (this is sometimes located inside the electrical panel)</span></li><li data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Are there any other breakers, and if so, are they identified?</span></li></ul><p data-dcnode-id="825"><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Electrical Panel Box:</span></strong><span data-dcnode-id="826" instrument_node="">&nbsp;You’ll need to locate the electrical panel box. It is often located in the garage or interior. In older homes, they can be found in closets.</span></p><span data-dcnode-id="824" instrument_node="">
</span><ul data-dcnode-id="813"><li data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Is there an adequately identified main service disconnect? If it is neither in the panel nor the meter base, the house may not have one. Some older homes with no electrical upgrades do not have main disconnects. This can be a signal that the electric service is old.</span></li><li data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Are there any tripped breakers?</span></li><li data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Check the ground fault and arc fault breakers using the test button.</span></li><li data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Are the breakers in the electrical panel adequately identified?</span></li><li data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Is there evidence around the electrical panel that it has been tampered with, such as drywall patching, missing cover panel screws, cover panel screws that don’t match, etc.?</span></li></ul><h2 data-dcnode-id="810" id="inspecting-the-interior"><span data-dcnode-id="811" id="Inspecting-the-Interior"><span data-dcnode-id="812" instrument_node="">Inspecting the Interior</span></span></h2><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="805"><strong data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Windows:&nbsp;</span></strong><span data-dcnode-id="806" instrument_node="">You’ll need to check all or as many windows as possible to determine if the windows are functioning correctly.</span></p><span data-dcnode-id="804" instrument_node="">
</span><ul data-dcnode-id="795"><li data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Check to see if the windows open and close with ease.</span></li><li data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Do the locking mechanisms work?</span></li><li data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Are there any broken glass panes or fogging in the glass panes?</span></li><li data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Is there water staining on the walls under the windows?</span></li></ul><p data-dcnode-id="791"><strong data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Doors:</span></strong><span data-dcnode-id="792" instrument_node="">&nbsp;You’ll need to operate all the doors to ensure they are functioning correctly.</span></p><span data-dcnode-id="790" instrument_node="">
</span><ul data-dcnode-id="779"><li data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Do the doors open and close completely?</span></li><li data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Do they stick or hard to open?</span></li><li data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Do the doors lock properly?</span></li><li data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Do the doors scrape the floor during use?</span></li><li data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Do exterior doors have weather stripping?</span></li></ul><p data-dcnode-id="775"><strong data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Floors:&nbsp;</span></strong><span data-dcnode-id="776" instrument_node="">As you walk through the interior, you’ll want to be observant of several things.</span></p><div data-dcnode-id="773" data-inserter-version="2" id="ezoic-pub-ad-placeholder-638"></div><span data-dcnode-id="771" instrument_node="">
</span><ul data-dcnode-id="760"><li data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Is there noticeable unevenness in the floor?</span></li><li data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Does the floor feel bouncy when walked on?</span></li><li data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Does the floor creak when walked on?</span></li><li data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">What is the condition of the floor coverings?</span></li><li data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Does all or part of the floor coverings need replacement?</span></li></ul><p data-dcnode-id="756"><strong data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Walls and Ceilings:</span></strong><span data-dcnode-id="757" instrument_node="">&nbsp;Look at the condition of the walls.</span></p><span data-dcnode-id="755" instrument_node="">
</span><ul data-dcnode-id="744"><li data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Are there any holes that are larger than 1 inch in size?</span></li><li data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Do you see any water staining?</span></li><li data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Do you see any black fungi that could be mold?</span></li><li data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Do you see peeling wallpaper?</span></li><li data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Do you see any diagonal cracking above the windows and doors?</span></li></ul><p data-dcnode-id="740"><strong data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Wood Trim:</span></strong><span data-dcnode-id="741" instrument_node="">&nbsp;Look at the door trim, baseboards, and window trim condition.</span></p><span data-dcnode-id="739" instrument_node="">
</span><ul data-dcnode-id="734"><li data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Do you see any damage caused by animals?</span></li><li data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Do you see any broken or missing trim?</span></li></ul><p data-dcnode-id="730"><strong data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Outlets:</span></strong><span data-dcnode-id="731" instrument_node="">&nbsp;Use an outlet tester to test as many outlets as possible.</span></p><span data-dcnode-id="729" instrument_node="">
</span><ul data-dcnode-id="718"><li data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">If you see a bunch of outlets that are 2-prong and not 3-prong, that’s a surefire sign that the wiring in the house is old. Do not just assume that the 3-prong outlets in the house are grounded. I often find that people will replace the outlet and not the wiring in older homes, which results in an ungrounded outlet.</span></li><li data-dcnode-id="719"><span data-dcnode-id="726" instrument_node="">Test the outlets around the kitchen sink, and bathroom sinks to ensure </span><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/how-gfci-outlets-work/"><span data-dcnode-id="725" instrument_node="">ground fault circuit protection</span></a><span data-dcnode-id="723" instrument_node=""> (GFCI). You can verify this by using an </span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/bad-gfci-outlet/"><span data-dcnode-id="722" instrument_node="">outlet tester with a built-in GFCI</span></a><span data-dcnode-id="720" instrument_node=""> test button.</span></li></ul><p data-dcnode-id="714"><strong data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Lights:</span></strong><span data-dcnode-id="715" instrument_node="">&nbsp;Turn on all lights to check to see if they work.</span></p><span data-dcnode-id="713" instrument_node="">
</span><ul data-dcnode-id="703"><li data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">If a light doesn’t work, it’s likely only a blown bulb. If you can reach the light safely, you can change out the light bulb to confirm.</span></li><li data-dcnode-id="706"><span data-dcnode-id="710" instrument_node="">When checking light switches, you may see a light switch that doesn’t appear to operate anything. </span><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/why-electrical-outlets-dont-work-6-troubleshooting-tips-fixes/"><span data-dcnode-id="709" instrument_node="">Some switches that appear to be inoperative may work for wall outlets</span></a><span data-dcnode-id="707" instrument_node="">.</span></li><li data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Three quick ways to spot a switch that operates a wall outlet:</span></li></ul><ol data-dcnode-id="690"><li data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">If the room has a switch and no overhead light</span></li><li data-dcnode-id="693"><span data-dcnode-id="700" instrument_node="">In newer homes, builders often installed rooms, such as </span><a data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/afci-required-bedrooms/"><span data-dcnode-id="699" instrument_node="">bedrooms</span></a><span data-dcnode-id="697" instrument_node="">, without overhead lights but did install a lighting bracket. There would be three light switches on the wall; one for a </span><a data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/do-electricians-install-ceiling-fans/"><span data-dcnode-id="696" instrument_node="">ceiling fan</span></a><span data-dcnode-id="694" instrument_node="">, one for a ceiling fan light, and one for an outlet.</span></li><li data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">If you see an outlet with the grounding prong hole on top (looks upside down), yet all the other outlets in the room appear normal, there’s a good chance the outlet is switch operated. You can check if an outlet is a switch operated with an outlet tester.</span></li></ol><p data-dcnode-id="686"><strong data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Stairs:</span></strong><span data-dcnode-id="687" instrument_node="">&nbsp;Walk up and down the stairs in the home.</span></p><div data-dcnode-id="684" data-inserter-version="2" id="ezoic-pub-ad-placeholder-639"></div><span data-dcnode-id="682" instrument_node="">
</span><ul data-dcnode-id="672"><li data-dcnode-id="677"><span data-dcnode-id="681" instrument_node="">Are the </span><a data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/deck-railing-ideas/"><span data-dcnode-id="680" instrument_node="">railing</span></a><span data-dcnode-id="678" instrument_node=""> and spindles secure?</span></li><li data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Do the stairs lean or move when walked on?</span></li><li data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Are there any trip hazards?</span></li></ul><p data-dcnode-id="668"><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/do-electricians-install-smoke-alarms/"><span data-dcnode-id="671" instrument_node="">Smoke Alarms: Check your smoke detectors</span></a><span data-dcnode-id="669" instrument_node=""> and batteries</span></p><span data-dcnode-id="667" instrument_node="">
</span><ul data-dcnode-id="654"><li data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Are there smoke detectors inside and outside sleeping areas?</span></li><li data-dcnode-id="657"><span data-dcnode-id="664" instrument_node="">Are the </span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/why-do-smoke-detectors-give-a-false-alarm/"><span data-dcnode-id="663" instrument_node="">smoke detectors</span></a><span data-dcnode-id="661" instrument_node=""> yellow? </span><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/how-often-should-smoke-detectors-be-replaced/"><span data-dcnode-id="660" instrument_node="">Yellow smoke detectors indicate age and should be replaced</span></a><span data-dcnode-id="658" instrument_node="">.</span></li><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Do the batteries in the smoke detectors need to be replaced?</span></li></ul><h2 data-dcnode-id="651" id="inspecting-the-kitchen"><span data-dcnode-id="652" id="Inspecting-the-Kitchen"><span data-dcnode-id="653" instrument_node="">Inspecting the Kitchen</span></span></h2><span data-dcnode-id="650" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="648"><img alt="home inspection" class="wp-image-182" data-dcnode-id="649" height="520" loading="lazy" sizes="(max-width: 950px) 100vw, 950px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/wp-content/uploads/2019/06/home-inspector-9-lg.jpg&amp;raw" srcset="https://homeinspectioninsider.com/wp-content/uploads/2019/06/home-inspector-9-lg.jpg 950w, https://homeinspectioninsider.com/wp-content/uploads/2019/06/home-inspector-9-lg-300x164.jpg 300w, https://homeinspectioninsider.com/wp-content/uploads/2019/06/home-inspector-9-lg-768x420.jpg 768w" width="950"></figure><p data-dcnode-id="644"><strong data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Cabinets:</span></strong><span data-dcnode-id="645" instrument_node="">&nbsp;Open and close all the cabinet doors and drawers.</span></p><span data-dcnode-id="643" instrument_node="">
</span><ul data-dcnode-id="634"><li data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Do the doors open properly?</span></li><li data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Are the cabinet door hinges secured?</span></li><li data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Do the drawers slide open and closed freely?</span></li><li data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Look inside the cabinets to see if you see evidence of insect or rodent activity, such as dead bugs or rat droppings.</span></li></ul><p data-dcnode-id="630"><strong data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Oven:&nbsp;</span></strong><span data-dcnode-id="631" instrument_node="">Open and check the inside of the oven.</span></p><span data-dcnode-id="629" instrument_node="">
</span><ul data-dcnode-id="622"><li data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Does the door open and close properly?</span></li><li data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Is the oven clean, indicating it’s been cared for?</span></li><li data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Turn on the oven to make sure it works?</span></li></ul><p data-dcnode-id="618"><strong data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Stove/Cooktop:&nbsp;</span></strong><span data-dcnode-id="619" instrument_node="">Turn on each burner on the stovetop.</span></p><span data-dcnode-id="617" instrument_node="">
</span><ul data-dcnode-id="610"><li data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">If electric, turn on the burners to be sure they work correctly.</span></li><li data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">If the cooktop is glass, check for surface chips or cracks.</span></li><li data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">If gas, turn on each burner individually at first to make sure each igniter is working on its own. Then turn them all on at once. The flame should be blue. Do you see any high flames or yellow flames? This could indicate the burner needs to be serviced.</span></li></ul><p data-dcnode-id="606"><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Refrigerator:</span></strong><span data-dcnode-id="607" instrument_node="">&nbsp;Open the refrigerator/freezer doors.</span></p><div data-dcnode-id="604" data-inserter-version="2" id="ezoic-pub-ad-placeholder-640"></div><span data-dcnode-id="602" instrument_node="">
</span><ul data-dcnode-id="594"><li data-dcnode-id="597"><span data-dcnode-id="601" instrument_node="">If the </span><a data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/refrigerator-brands-to-avoid/"><span data-dcnode-id="600" instrument_node="">refrigerator</span></a><span data-dcnode-id="598" instrument_node=""> is running, check to ensure the doors open with ease.</span></li><li data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">If the house has been vacant, the power is off, or the unit is unplugged. Open at your discretion. Be warned. It could be disgusting inside. If there is mold or old moldy food inside, scrap it and get a new one.</span></li></ul><p data-dcnode-id="590"><strong data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Dishwasher:</span></strong><span data-dcnode-id="591" instrument_node="">&nbsp;Open the dishwasher to check inside.</span></p><span data-dcnode-id="589" instrument_node="">
</span><ul data-dcnode-id="578"><li data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Does the door open properly?</span></li><li data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Check the condition of the door seal before operating.</span></li><li data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Check underneath the sink to verify the drain hose is connected and that the water line is turned on. The water line should be connected to the hot water side and have its shut-off valve.</span></li><li data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">If all looks good, operate in a light wash cycle to ensure the pumps are working and the unit is draining properly.</span></li><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Does the door leak during operation?</span></li></ul><p data-dcnode-id="574"><strong data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Kitchen Sink:</span></strong><span data-dcnode-id="575" instrument_node="">&nbsp;Check your kitchen sink and the plumbing under the sink.</span></p><span data-dcnode-id="573" instrument_node="">
</span><ul data-dcnode-id="560"><li data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Are the plumbing pipes connected, and are there any signs of previous leaks?</span></li><li data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Are the water shut-off valves turned on?</span></li><li data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Does the drain piping look to be adequately configured and secure? Drain piping should have what’s called a P trap underneath.</span></li><li data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Run the water to check the water pressure?</span></li><li data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Check beneath while the water is running to verify there are no leaks.</span></li><li data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Does the sink drain properly?</span></li></ul><p data-dcnode-id="556"><strong data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Garbage Disposal:</span></strong><span data-dcnode-id="557" instrument_node="">&nbsp;While the water is running, check the garbage disposal.</span></p><span data-dcnode-id="555" instrument_node="">
</span><ul data-dcnode-id="550"><li data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Does the garbage disposal run? Check the red reset button under the garbage disposal if the unit doesn’t run.</span></li><li data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Does the garbage disposal leak?</span></li></ul><p data-dcnode-id="546"><strong data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Microwave:&nbsp;</span></strong><span data-dcnode-id="547" instrument_node="">Open up the microwave and look inside.</span></p><span data-dcnode-id="545" instrument_node="">
</span><ul data-dcnode-id="538"><li data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Does the digital display work properly?</span></li><li data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Does the door open and close properly?</span></li><li data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Turn it on for 5 seconds to see if it works. It’s not good to run an empty microwave. If there is a glass or microwave-safe bowl handy, fill it with water in testing.</span></li></ul><p data-dcnode-id="534"><strong data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Range Hood:&nbsp;</span></strong><span data-dcnode-id="535" instrument_node="">Turn on the range hood fan and light to ensure they work.</span></p><div data-dcnode-id="532" data-inserter-version="2" id="ezoic-pub-ad-placeholder-641"></div><span data-dcnode-id="530" instrument_node="">
</span><ul data-dcnode-id="525"><li data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Check the filter. Does it look clean?</span></li><li data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Is there a grease buildup under the hood requiring heavy cleaning? If the grease buildup is too bad, you’ll be best replacing it.</span></li></ul><p data-dcnode-id="521"><strong data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Countertops:</span></strong><span data-dcnode-id="522" instrument_node="">&nbsp;Check the condition of the countertop</span></p><span data-dcnode-id="520" instrument_node="">
</span><ul data-dcnode-id="513"><li data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Are there physical defects such as swelling from water damage, chips, etc.?</span></li><li data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Is the area behind the sink caulked?</span></li><li data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Lift on the countertop slightly to verify it’s secured to the cabinet.</span></li></ul><p data-dcnode-id="509"><strong data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Flooring:&nbsp;</span></strong><span data-dcnode-id="510" instrument_node="">Check the kitchen floor.</span></p><span data-dcnode-id="508" instrument_node="">
</span><ul data-dcnode-id="495"><li data-dcnode-id="503"><span data-dcnode-id="507" instrument_node="">If the </span><a data-dcnode-id="505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/determine-tile-laid-properly/"><span data-dcnode-id="506" instrument_node="">floor is tiled</span></a><span data-dcnode-id="504" instrument_node="">, are the tiles cracked or loose?</span></li><li data-dcnode-id="498"><span data-dcnode-id="502" instrument_node="">If the floor is wood or </span><a data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/why-laminate-flooring-is-lifting-how-to-fix-it/"><span data-dcnode-id="501" instrument_node="">laminate</span></a><span data-dcnode-id="499" instrument_node="">, is the wood stained or swollen from a prior water leak?</span></li><li data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">If the floor is vinyl, is the vinyl flooring curling, cut, or torn in areas.</span></li></ul><p data-dcnode-id="490"><span data-dcnode-id="494" instrument_node="">Read more on&nbsp;</span><a data-dcnode-id="492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/do-home-inspectors-check-appliances/"><span data-dcnode-id="493" instrument_node="">Do Home Inspectors Check Appliances</span></a><span data-dcnode-id="491" instrument_node="">.</span></p><span data-dcnode-id="489" instrument_node="">
</span><h2 data-dcnode-id="486" id="inspecting-the-bathrooms"><span data-dcnode-id="487" id="Inspecting-the-Bathrooms"><span data-dcnode-id="488" instrument_node="">Inspecting the Bathrooms</span></span></h2><span data-dcnode-id="485" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="483"><img alt="home inspection" class="wp-image-451" data-dcnode-id="484" height="404" loading="lazy" sizes="(max-width: 901px) 100vw, 901px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/wp-content/uploads/2019/06/maxresdefault2-lg.jpg&amp;raw" srcset="https://homeinspectioninsider.com/wp-content/uploads/2019/06/maxresdefault2-lg.jpg 901w, https://homeinspectioninsider.com/wp-content/uploads/2019/06/maxresdefault2-lg-300x135.jpg 300w, https://homeinspectioninsider.com/wp-content/uploads/2019/06/maxresdefault2-lg-768x344.jpg 768w" width="901"></figure><p data-dcnode-id="479"><strong data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Cabinets:</span></strong><span data-dcnode-id="480" instrument_node="">&nbsp;Open and close all the cabinet doors and drawers.</span></p><span data-dcnode-id="478" instrument_node="">
</span><ul data-dcnode-id="469"><li data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Do the doors open properly?</span></li><li data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Are the cabinet door hinges secured?</span></li><li data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Do the drawers slide open and closed freely?</span></li><li data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Look inside the cabinets to see if you see evidence of water damage from previous leaks.</span></li></ul><p data-dcnode-id="465"><strong data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Bathroom Sinks:</span></strong><span data-dcnode-id="466" instrument_node="">&nbsp;Check your bathroom sink and the plumbing under the sink.</span></p><div data-dcnode-id="463" data-inserter-version="2" id="ezoic-pub-ad-placeholder-642"></div><span data-dcnode-id="461" instrument_node="">
</span><ul data-dcnode-id="448"><li data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Are the plumbing pipes connected, and are there any signs of previous leaks?</span></li><li data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Are the water shut-off valves turned on?</span></li><li data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Does the drain piping look to be adequately configured and secure? Drain piping should have what’s called a P trap underneath.</span></li><li data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Run the water to check the water pressure?</span></li><li data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Check beneath while the water is running to verify there are no leaks.</span></li><li data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Does the sink drain properly?</span></li></ul><p data-dcnode-id="444"><strong data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Countertops:&nbsp;</span></strong><span data-dcnode-id="445" instrument_node="">Check the condition of the countertop</span></p><span data-dcnode-id="443" instrument_node="">
</span><ul data-dcnode-id="436"><li data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Are there physical defects such as swelling from water damage, chips, etc.?</span></li><li data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Is the area behind the sink caulked?</span></li><li data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Lift on the countertop slightly to verify it’s secured to the cabinet.</span></li></ul><p data-dcnode-id="432"><strong data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Flooring:</span></strong><span data-dcnode-id="433" instrument_node="">&nbsp;Check the bathroom floor.</span></p><span data-dcnode-id="431" instrument_node="">
</span><ul data-dcnode-id="418"><li data-dcnode-id="426"><span data-dcnode-id="430" instrument_node="">If the </span><a data-dcnode-id="428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/determine-tile-laid-properly/"><span data-dcnode-id="429" instrument_node="">floor is tiled</span></a><span data-dcnode-id="427" instrument_node="">, are the tiles cracked or loose?</span></li><li data-dcnode-id="421"><span data-dcnode-id="425" instrument_node="">If the floor is wood or </span><a data-dcnode-id="423" data-wpil="url" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/why-laminate-flooring-is-lifting-how-to-fix-it/"><span data-dcnode-id="424" instrument_node="">laminate</span></a><span data-dcnode-id="422" instrument_node="">, is the wood stained or swollen from a prior water leak?</span></li><li data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">If the floor is vinyl, is the vinyl flooring curling, cut, or torn in areas.</span></li></ul><p data-dcnode-id="414"><strong data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Toilets:</span></strong><span data-dcnode-id="415" instrument_node="">&nbsp;inspect the toilet to be sure if working properly</span></p><span data-dcnode-id="413" instrument_node="">
</span><ul data-dcnode-id="401"><li data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Is the toilet secure to the floor?</span></li><li data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Does the toilet flush properly?</span></li><li data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Is the tank on the back of the toilet secure?</span></li><li data-dcnode-id="402"><span data-dcnode-id="406" instrument_node="">Any </span><a data-dcnode-id="404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/how-long-toilets-last-signs-your-toilet-needs-to-be-replaced-costs/"><span data-dcnode-id="405" instrument_node="">signs of leaks around the base or behind the toilet</span></a><span data-dcnode-id="403" instrument_node="">?</span></li></ul><p data-dcnode-id="397"><strong data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Bathtubs:</span></strong><span data-dcnode-id="398" instrument_node="">&nbsp;turn the water on and fill the tub.</span></p><span data-dcnode-id="396" instrument_node="">
</span><ul data-dcnode-id="387"><li data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">With the tub stopper engaged, does the tub hold water?</span></li><li data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">With the tub stopper disengaged, does the tub drain properly?</span></li><li data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Any cracks or other surface defects in the bathtub?</span></li><li data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Any sign of leaking around the bathtub faucet?</span></li></ul><p data-dcnode-id="383"><strong data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Showers:</span></strong><span data-dcnode-id="384" instrument_node="">&nbsp;Turn on the shower to check operation.</span></p><div data-dcnode-id="381" data-inserter-version="2" id="ezoic-pub-ad-placeholder-643"></div><span data-dcnode-id="379" instrument_node="">
</span><ul data-dcnode-id="369"><li data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Any cracks or other surface defects to the shower base or surround?</span></li><li data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Are the inside corners, door, and base caulked?</span></li><li data-dcnode-id="370"><span data-dcnode-id="374" instrument_node="">Any sign of </span><a data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/shower-with-leaking-water-heater/"><span data-dcnode-id="373" instrument_node="">leaking around the shower</span></a><span data-dcnode-id="371" instrument_node=""> faucet?</span></li></ul><p data-dcnode-id="365"><strong data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Vent Fans:&nbsp;</span></strong><span data-dcnode-id="366" instrument_node="">Test the vent fans.</span></p><span data-dcnode-id="364" instrument_node="">
</span><ul data-dcnode-id="352"><li data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Are the vent fans functional?</span></li><li data-dcnode-id="357"><span data-dcnode-id="361" instrument_node="">Are the </span><a data-dcnode-id="359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/bathroom-vent-fans-how-to-clean-replace-options-costs/"><span data-dcnode-id="360" instrument_node="">vent fans noisy</span></a><span data-dcnode-id="358" instrument_node="">?</span></li><li data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Is the vent fan drawing air correctly? You can use a piece of toilet paper placed against the fan to determine if it is drawing correctly.</span></li><li data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Are there any signs of moisture damage to the ceiling, such as water stains, peeling ceiling texture, etc.?</span></li></ul><h2 data-dcnode-id="349" id="inspecting-the-attic"><span data-dcnode-id="350" id="Inspecting-the-Attic"><span data-dcnode-id="351" instrument_node="">Inspecting the Attic</span></span></h2><span data-dcnode-id="348" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="346"><img alt="attic" class="wp-image-445" data-dcnode-id="347" height="446" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/wp-content/uploads/2019/06/7GQX2HM4KM7OLMLPBQLQO4GEZU-lg.jpg&amp;raw" srcset="https://homeinspectioninsider.com/wp-content/uploads/2019/06/7GQX2HM4KM7OLMLPBQLQO4GEZU-lg.jpg 900w, https://homeinspectioninsider.com/wp-content/uploads/2019/06/7GQX2HM4KM7OLMLPBQLQO4GEZU-lg-300x149.jpg 300w, https://homeinspectioninsider.com/wp-content/uploads/2019/06/7GQX2HM4KM7OLMLPBQLQO4GEZU-lg-768x381.jpg 768w" width="900"></figure><p class="has-background" data-dcnode-id="335" style="background-color:#e5e5e5"><strong data-dcnode-id="336"><em data-dcnode-id="337"><span data-dcnode-id="345" instrument_node="">Safety Note:&nbsp;</span><em data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">We</span></em><em data-dcnode-id="341"><span data-dcnode-id="342" instrument_node=""> are not advising anyone to use a </span></em><a data-dcnode-id="339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/are-attic-ladders-safe-a-look-at-wood-aluminum-ladders/"><span data-dcnode-id="340" instrument_node="">ladder or climb into an attic</span></a><span data-dcnode-id="338" instrument_node="">. If you do enter the attic, do not walk on any area that is not floored. If you can not safely enter the attic, do not enter. Call a professional home inspector for assistance.</span></em></strong></p><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Provided you can safely enter the attic, look for the following:</span></p><span data-dcnode-id="331" instrument_node="">
</span><ul data-dcnode-id="309"><li data-dcnode-id="326"><span data-dcnode-id="330" instrument_node="">How many inches of insulation does the house have? </span><a data-dcnode-id="328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/how-often-should-insulation-be-replaced/"><span data-dcnode-id="329" instrument_node="">Fiberglass insulation</span></a><span data-dcnode-id="327" instrument_node=""> needs about 12-14 inches for an R30 level. Blown cellulose 8-10 inches is required for an R30 level. You may need an R60 insulated valve or about 18 inches thick depending on where you live.</span></li><li data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Do you see any broken rafters or trusses?</span></li><li data-dcnode-id="319"><span data-dcnode-id="323" instrument_node="">Do you see any water staining or fungi growth on the </span><a data-dcnode-id="321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/what-is-roof-sheathing/"><span data-dcnode-id="322" instrument_node="">roof sheathing</span></a><span data-dcnode-id="320" instrument_node="">?</span></li><li data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Do you see any spliced wire connections?</span></li><li data-dcnode-id="312"><span data-dcnode-id="316" instrument_node="">Are the </span><a data-dcnode-id="314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/permit-to-install-bathroom-fan/"><span data-dcnode-id="315" instrument_node="">bathroom vent fans</span></a><span data-dcnode-id="313" instrument_node=""> vented to the exterior?</span></li><li data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">If ductwork is present, does it appear to be in good condition?</span></li></ul><h2 data-dcnode-id="306" id="inspecting-the-basement"><span data-dcnode-id="307" id="Inspecting-the-Basement"><span data-dcnode-id="308" instrument_node="">Inspecting the Basement</span></span></h2><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Unfinished basements typically have an entry point from the house’s interior or an outside cellar door.</span></p><span data-dcnode-id="302" instrument_node="">
</span><ul data-dcnode-id="282"><li data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Any signs of cracking in the basement walls?</span></li><li data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Any signs of water staining or water intrusion in the basement?</span></li><li data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Check all visible plumbing connections for leaks.</span></li><li data-dcnode-id="291"><span data-dcnode-id="295" instrument_node="">Do you see any broken or cut </span><a data-dcnode-id="293" data-wpil="url" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/floor-joist/"><span data-dcnode-id="294" instrument_node="">floor joists</span></a><span data-dcnode-id="292" instrument_node="">? Sometimes you’ll see where a floor joist has been cut to make room around plumbing pipes. This cut framing has to be cross-supported.</span></li><li data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Do you see any dry rot or fungi in the visible wood framing?</span></li><li data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Check for wiring splices and open junction boxes in the visible electrical wiring.</span></li><li data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">If ductwork is present, does it appear to be in good condition?</span></li><li data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Look for signs of&nbsp;termite activity&nbsp;in the wood framing and basement walls. Look for damaged wood that looks shredded and pencil-thin mud tubes on the piers.</span></li></ul><h2 data-dcnode-id="279" id="inspecting-the-crawl-space"><span data-dcnode-id="280" id="Inspecting-the-Crawl-Space"><span data-dcnode-id="281" instrument_node="">Inspecting the Crawl Space</span></span></h2><span data-dcnode-id="278" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="276"><img alt="home inspection termites" class="wp-image-191" data-dcnode-id="277" height="476" loading="lazy" sizes="(max-width: 950px) 100vw, 950px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/wp-content/uploads/2019/06/Termite-Treatment-lg.jpg&amp;raw" srcset="https://homeinspectioninsider.com/wp-content/uploads/2019/06/Termite-Treatment-lg.jpg 950w, https://homeinspectioninsider.com/wp-content/uploads/2019/06/Termite-Treatment-lg-300x150.jpg 300w, https://homeinspectioninsider.com/wp-content/uploads/2019/06/Termite-Treatment-lg-768x385.jpg 768w" width="950"></figure><p class="has-background" data-dcnode-id="264" style="background-color:#e5e5e5"><strong data-dcnode-id="273"><em data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Safety Note:&nbsp;</span></em></strong><em data-dcnode-id="265"><span data-dcnode-id="272" instrument_node="">We are not advising anyone to enter a crawl space. If you enter the </span><a data-dcnode-id="270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/encapsulate-crawl-space/"><span data-dcnode-id="271" instrument_node="">crawl space</span></a><span data-dcnode-id="269" instrument_node="">, you will need to wear coveralls to protect your clothes, a facemask, and gloves. You will also need to take a flashlight with you to see. Otherwise, you should call a professional </span><a data-dcnode-id="267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/structural-inspection-vs-home-inspection-whats-the-difference/"><span data-dcnode-id="268" instrument_node="">home inspector</span></a><span data-dcnode-id="266" instrument_node=""> for assistance.</span></em></p><div data-dcnode-id="262" data-inserter-version="2" id="ezoic-pub-ad-placeholder-644"></div><span data-dcnode-id="260" instrument_node="">
</span><ul data-dcnode-id="231"><li data-dcnode-id="255"><span data-dcnode-id="259" instrument_node="">Any signs of </span><a data-dcnode-id="257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/remove-water-from-flooded-crawl-space/"><span data-dcnode-id="258" instrument_node="">water intrusion in the crawl space</span></a><span data-dcnode-id="256" instrument_node="">?</span></li><li data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Is there a plastic vapor barrier over the ground in the crawl space?</span></li><li data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Check all visible plumbing connections for leaks.</span></li><li data-dcnode-id="246"><span data-dcnode-id="250" instrument_node="">Do you see any broken or cut </span><a data-dcnode-id="248" data-wpil="url" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/floor-joist/"><span data-dcnode-id="249" instrument_node="">floor joists</span></a><span data-dcnode-id="247" instrument_node="">? Sometimes you’ll see where a floor joist has been cut to make room around plumbing pipes. This cut framing has to be cross-supported.</span></li><li data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Do you see any dry rot or fungi in the visible wood framing?</span></li><li data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">Check for wiring splices and open junction boxes in the visible electrical wiring.</span></li><li data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">If ductwork is present, does it appear to be in good condition?</span></li><li data-dcnode-id="232"><span data-dcnode-id="239" instrument_node="">Look for signs of&nbsp;termite activity&nbsp;in the wood framing and piers. </span><a data-dcnode-id="237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/how-often-should-a-house-be-treated-for-termites/"><span data-dcnode-id="238" instrument_node="">Termites</span></a><span data-dcnode-id="236" instrument_node=""> love damp, wet spaces such as </span><a data-dcnode-id="234" data-id="4126" data-type="post" data-wpil="url" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/crawl-space-encapsulation/"><span data-dcnode-id="235" instrument_node="">crawl spaces</span></a><span data-dcnode-id="233" instrument_node="">. Look for damaged wood that looks shredded and pencil-thin mud tubes on the piers.</span></li></ul><p data-dcnode-id="226"><span data-dcnode-id="230" instrument_node="">There you have it. You’ve completed your home inspection. Again this is not meant to stand in place of having a professional home inspection. This is only a small portion of what a certified&nbsp;home inspector&nbsp;does. However, it’s a good starting point to help you examine houses before offering to purchase or if </span><a data-dcnode-id="228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inspectionsupport.com/resources/home-inspection-higher-price-sale/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="229" instrument_node="">selling your home</span></a><span data-dcnode-id="227" instrument_node="">.</span></p><span data-dcnode-id="225" instrument_node="">
</span><p data-dcnode-id="220"><span data-dcnode-id="224" instrument_node="">You won’t find everything that a professional home inspector will, but you also can save the </span><a data-dcnode-id="222" data-wpil="url" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homeinspectioninsider.com/home-inspection-cost/"><span data-dcnode-id="223" instrument_node="">home inspection cost</span></a><span data-dcnode-id="221" instrument_node="">&nbsp;on a house you otherwise may not be interested in with a little more information.</span></p><span data-dcnode-id="219" instrument_node="">
