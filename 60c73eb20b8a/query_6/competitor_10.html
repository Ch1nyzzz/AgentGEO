</span><p data-dcnode-id="1110"><span data-dcnode-id="1111" style="font-weight: 400;"></span></p><h3 class="vc_custom_heading" data-dcnode-id="1106" style="text-align: left;font-family:Abril Fatface;font-weight:400;font-style:normal"><span data-dcnode-id="1108" id="2_Interior_Design_Playbook_In_The_New_Normal_From_Foyr_Neo"><span data-dcnode-id="1109" instrument_node="">2. Interior Design Playbook In The New Normal From Foyr Neo</span></span><span data-dcnode-id="1107" instrument_node="">
</span></h3><p data-dcnode-id="1105"></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" style="font-weight: 400;"><span data-dcnode-id="1103" instrument_node="">For over the past year, we have lived through a terrifying crisis, the impact of which has been harsh and far-ranging. These are unprecedented times, probably even the crisis of the generation, if not the century. It is unlike anything we’ve ever experienced before. So there is no right answer, no standard operating procedure, no playbook that could’ve been followed. But as business leaders, we sit at the intersection between well-being and performance, between keeping ourselves safe, while moving the needle a little every day. And the only way to achieve both and stay relevant after the pandemic lifts are by preparing well and building a resilient and shock-proof business plan.</span></span></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1096"><img alt="playbook for interior design" class="alignnone wp-image-7979 size-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="1099" data-lazy-loaded="1" height="450" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foyr.com/learn/wp-content/uploads/2021/02/Blog-Banner-Option-1-e1617230829315.png&amp;raw" width="800"><noscript data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">&lt;img   alt="playbook for interior design" width="800" height="450" data-src="https://foyr.com/learn/wp-content/uploads/2021/02/Blog-Banner-Option-1-e1617230829315.png" class="alignnone wp-image-7979 size-full lazyload" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="&gt;&lt;noscript&gt;&lt;img class="alignnone wp-image-7979 size-full" src="https://foyr.com/learn/wp-content/uploads/2021/02/Blog-Banner-Option-1-e1617230829315.png" alt="playbook for interior design" width="800" height="450"&gt;</span></noscript></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" style="font-weight: 400;"><span data-dcnode-id="1094" instrument_node="">The world of work may well have changed forever. And while a calibrated, safe and smooth exit from the pandemic is what one wishes for in the times to come — we need all the ammunition we can get today as designers to learn how to operate within this “new normal” successfully every day. Possibly for a far longer time than we originally planned for. So we’ve tried to put together a checklist of useful things in this ebook that you can use to adapt and navigate to this new world of work smoother.</span></span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1090" instrument_node="">Read also – </span><a data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foyr.com/learn/best-home-design-games/"><span data-dcnode-id="1089" instrument_node="">Best Interior Design Games</span></a></p><span data-dcnode-id="1086" instrument_node="">

</span></h3><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Available on Rizzoli Bookstore for $45.00</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">This book features beautiful design details and arrangements that give a home its personality from the world’s top designers, such as Bunny Williams, Alessandra Branca, John Derian, and others.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Salk gives design tips to add richness and personality to any interior, like adding trims and tassels, an upholstered chair in a corner, or an artistic mirror in an entry hall. To surround ourselves with things we love.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">If you love decorating and want to take your home to a whole new level, this is definitely a book you want to read.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1060"><a data-dcnode-id="1061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.ca/Its-Little-Things-Creating-Moments/dp/0847848078" rel="noopener" target="_blank"><span data-dcnode-id="1062" instrument_node="">Available on Amazon for $44.68</span></a></p><span data-dcnode-id="1059" instrument_node="">

e-things-interior-design-book-scaled.jpg" alt="its the little things interior design book" width="1683" height="2048" srcset="https://foyr.com/learn/wp-content/uploads/2021/03/its-the-little-things-interior-design-book-scaled.jpg 1683w, https://foyr.com/learn/wp-content/uploads/2021/03/its-the-little-things-interior-design-book-842x1024.jpg 842w, https://foyr.com/learn/wp-content/uploads/2021/03/its-the-little-things-interior-design-book-768x934.jpg 768w, https://foyr.com/learn/wp-content/uploads/2021/03/its-the-little-things-interior-design-book-1262x1536.jpg 1262w" sizes="(max-width: 1683px) 100vw, 1683px"&gt;</span></noscript></p><span data-dcnode-id="1054" instrument_node="">

</span><h3 class="vc_custom_heading" data-dcnode-id="1046" style="text-align: left;font-family:Abril Fatface;font-weight:400;font-style:normal"><span data-dcnode-id="1048" id="4_E-design_Business_Blueprint_From_Foyr_Neo"><span data-dcnode-id="1049" instrument_node="">4. E-design Business Blueprint From Foyr Neo</span></span><span data-dcnode-id="1047" instrument_node="">
</span></h3><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" style="font-weight: 400;"><span data-dcnode-id="1044" instrument_node="">The whole landscape and world of work have changed on account of the pandemic. Interior Designers today have completely pivoted to technology, and become more virtual than they were ever before. Now the only way to land a client or show a design is online. So there is no better time to embrace e-design; expand one’s virtual clientele, invite more opportunities and book more business.</span></span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1037"><img alt="Edesign-business-blueprint" class="alignnone wp-image-8570 size-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="1040" data-lazy-loaded="1" height="450" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foyr.com/learn/wp-content/uploads/2021/03/Edesign-business-blueprint-1-e1617231477503.png&amp;raw" width="800"><noscript data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">&lt;img   alt="Edesign-business-blueprint" width="800" height="450" data-src="https://foyr.com/learn/wp-content/uploads/2021/03/Edesign-business-blueprint-1-e1617231477503.png" class="alignnone wp-image-8570 size-full lazyload" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="&gt;&lt;noscript&gt;&lt;img class="alignnone wp-image-8570 size-full" src="https://foyr.com/learn/wp-content/uploads/2021/03/Edesign-business-blueprint-1-e1617231477503.png" alt="Edesign-business-blueprint" width="800" height="450"&gt;</span></noscript></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" style="font-weight: 400;"><span data-dcnode-id="1035" instrument_node="">So whether it’s due to the pandemic or the coming-of-age of cutting-edge technology, now you as a designer can complete your interior design service successfully without ever even having to set foot in your client’s home! </span><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foyr.com/edesignbusinessblueprint.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1034" instrument_node="">Download the ebook</span></a><span data-dcnode-id="1032" instrument_node=""> to learn everything you need to know to set up and scale your e-design business.&nbsp;</span></span></p><span data-dcnode-id="1029" instrument_node="">

</span><h3 class="vc_custom_heading" data-dcnode-id="1014" style="text-align: left;font-family:Abril Fatface;font-weight:400;font-style:normal"><span data-dcnode-id="1016" id="5_A_House_By_The_Sea_By_Bunny_Williams"><span data-dcnode-id="1017" instrument_node="">5. A House By The Sea By Bunny Williams</span></span><span data-dcnode-id="1015" instrument_node="">
</span></h3><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">In this book filled with aesthetic photographs, Bunny Williams takes us on a tour to her island home in the Dominican Republic, midst tropical gardens, overlooking the Caribbean Sea.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">She tells the story about this home and the vision she and her husband shared while designing and decorating the house and gardens surrounding it while reflecting on the beauty and relaxation of island living.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Some parts are written by friends, providing a different perspective of being a guest of Bunny’s and offering further insight into the architecture and decor at La Colina.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">What makes this book especially enjoyable is Bunny’s practical advice for every homeowner. She addresses many things in her book, like guest room design, mixing and matching, patios, and garden design.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">This book is both entertaining and inspiring. You won’t regret taking the time to flip through this gorgeous tome.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="995"><a data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/House-Sea-Bunny-Williams/dp/1419720813" rel="noopener" target="_blank"><span data-dcnode-id="997" instrument_node="">Available on Amazon for $49.50</span></a></p><span data-dcnode-id="994" instrument_node="">

</span><h3 class="vc_custom_heading" data-dcnode-id="981" style="text-align: left;font-family:Abril Fatface;font-weight:400;font-style:normal"><span data-dcnode-id="983" id="6_STYLED_Secrets_for_Arranging_Rooms_from_Tabletops_to_Bookshelves"><span data-dcnode-id="984" instrument_node="">6. STYLED: Secrets for Arranging Rooms, from Tabletops to Bookshelves</span></span><span data-dcnode-id="982" instrument_node="">
</span></h3><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">The author Emily Henderson is a famous HGTV and Instagram icon. Her book is a great resource for those just getting started in the design world. In her book, she focuses on design’s visual elements by arranging furniture around the living room or dining room and arranging items on the bookshelves.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">She points out a set of tips and rules that can apply to various tastes and styles. Layering, balancing, and scaling all play into space’s overall aesthetics and tie everything together.</span></p><span data-dcnode-id="974" instrument_node="">

</span><p data-dcnode-id="953"><span data-dcnode-id="954" style="font-weight: 400;"></span></p><h3 class="vc_custom_heading" data-dcnode-id="949" style="text-align: left;font-family:Abril Fatface;font-weight:400;font-style:normal"><span data-dcnode-id="951" id="7_Evocative_Style_by_Kelly_Wearstler"><span data-dcnode-id="952" instrument_node="">7. Evocative Style by Kelly Wearstler</span></span><span data-dcnode-id="950" instrument_node="">
</span></h3><p data-dcnode-id="948"></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Kelly Wearstler is one of the leading interior designers, known for her bold style and sophisticated blending.</span></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Her book Evocative Style shows off Wearstler’s mastery of constructing spaces that tell a story, whether through mixing vintage and contemporary pieces or experimenting with unique textures, patterns, and organic shapes along with mixing many periods of furniture.</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">It’s full of whimsical and elegant ideas of bold color palettes and geometric artwork as she’s pushing boundaries with her creative and rich modern interiors.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">This book is a must-read for designers, stylists, and homeowners looking for elegant design inspiration for fascinating designs.</span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="932"><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Kelly-Wearstler-Evocative-Style/dp/0847866033" rel="noopener" target="_blank"><span data-dcnode-id="934" instrument_node="">Available on Amazon for $27.91</span></a></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="924"><img alt="" class="alignnone size-full wp-image-10407 jetpack-lazy-image" data-dcnode-id="930" data-lazy-sizes="(max-width: 1559px) 100vw, 1559px" data-lazy-src="https://foyr.com/learn/wp-content/uploads/2021/03/Evocative-Style-by-Kelly-Wearstler-scaled.jpg?is-pending-load=1" data-lazy-srcset="https://foyr.com/learn/wp-content/uploads/2021/03/Evocative-Style-by-Kelly-Wearstler-scaled.jpg 1559w, https://foyr.com/learn/wp-content/uploads/2021/03/Evocative-Style-by-Kelly-Wearstler-780x1024.jpg 780w, https://foyr.com/learn/wp-content/uploads/2021/03/Evocative-Style-by-Kelly-Wearstler-768x1009.jpg 768w, https://foyr.com/learn/wp-content/uploads/2021/03/Evocative-Style-by-Kelly-Wearstler-1169x1536.jpg 1169w" height="2048" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foyr.com/learn/wp-content/uploads/2021/03/Evocative-Style-by-Kelly-Wearstler-scaled.jpg&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="1559"><noscript data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">&lt;img   alt="" width="1559" height="2048" data-srcset="https://foyr.com/learn/wp-content/uploads/2021/03/Evocative-Style-by-Kelly-Wearstler-scaled.jpg 1559w, https://foyr.com/learn/wp-content/uploads/2021/03/Evocative-Style-by-Kelly-Wearstler-780x1024.jpg 780w, https://foyr.com/learn/wp-content/uploads/2021/03/Evocative-Style-by-Kelly-Wearstler-768x1009.jpg 768w, https://foyr.com/learn/wp-content/uploads/2021/03/Evocative-Style-by-Kelly-Wearstler-1169x1536.jpg 1169w"  data-src="https://foyr.com/learn/wp-content/uploads/2021/03/Evocative-Style-by-Kelly-Wearstler-scaled.jpg" data-sizes="(max-width: 1559px) 100vw, 1559px" class="alignnone size-full wp-image-10407 lazyload" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="&gt;&lt;noscript&gt;&lt;img class="alignnone size-full wp-image-10407" src="https://foyr.com/learn/wp-content/uploads/2021/03/Evocative-Style-by-Kelly-Wearstler-scaled.jpg" alt="" width="1559" height="2048" srcset="https://foyr.com/learn/wp-content/uploads/2021/03/Evocative-Style-by-Kelly-Wearstler-scaled.jpg 1559w, https://foyr.com/learn/wp-content/uploads/2021/03/Evocative-Style-by-Kelly-Wearstler-780x1024.jpg 780w, https://foyr.com/learn/wp-content/uploads/2021/03/Evocative-Style-by-Kelly-Wearstler-768x1009.jpg 768w, https://foyr.com/learn/wp-content/uploads/2021/03/Evocative-Style-by-Kelly-Wearstler-1169x1536.jpg 1169w" sizes="(max-width: 1559px) 100vw, 1559px"&gt;</span></noscript><br data-dcnode-id="927"><em data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Image Credit: Amazon.com</span></em></p><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="922" style="font-weight: 400;"></span></p><h3 class="vc_custom_heading" data-dcnode-id="917" style="text-align: left;font-family:Abril Fatface;font-weight:400;font-style:normal"><span data-dcnode-id="919" id="8_Everything_A_Maximalist_Style_Guide"><span data-dcnode-id="920" instrument_node="">8. Everything: A Maximalist Style Guide</span></span><span data-dcnode-id="918" instrument_node="">
</span></h3><p data-dcnode-id="916"></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">‘More is more’ is the perfect way to describe Abigail Ahern’s book Everything.</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">In this book, you’ll learn the ins and outs of nailing the maximalist design aesthetic, from going bold with color to mixing furniture styles.</span></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">The Maximalism style embraces beautiful color palettes, luxurious textiles, patterns, ornament, and everything in between. Mixing and blending all beautifully to create a bedazzling space you’d be proud to call home.</span></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">If you want to learn to break the rules of interior design, play with different periods in a single room, and have fun with owning and displaying more items, this book is for you.</span></p><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" style="font-weight: 400;"><a data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Everything-Maximalist-Style-Abigail-Ahern/dp/1911641115/" rel="noopener" target="_blank"><span data-dcnode-id="902" instrument_node="">Available on Amazon for $45.00</span></a></span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="894"><img alt="Everything: A Maximalist Style Guide" class="alignnone wp-image-10408 jetpack-lazy-image" data-dcnode-id="897" data-lazy-src="https://foyr.com/learn/wp-content/uploads/2021/03/Everything-A-Maximalist-Style-Guide.png?is-pending-load=1" height="1051" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foyr.com/learn/wp-content/uploads/2021/03/Everything-A-Maximalist-Style-Guide.png&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="803"><noscript data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">&lt;img   alt="Everything: A Maximalist Style Guide" width="803" height="1051" data-src="https://foyr.com/learn/wp-content/uploads/2021/03/Everything-A-Maximalist-Style-Guide.png" class="alignnone wp-image-10408 lazyload" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="&gt;&lt;noscript&gt;&lt;img class="alignnone wp-image-10408" src="https://foyr.com/learn/wp-content/uploads/2021/03/Everything-A-Maximalist-Style-Guide.png" alt="Everything: A Maximalist Style Guide" width="803" height="1051"&gt;</span></noscript></p><span data-dcnode-id="893" instrument_node="">

</span><p data-dcnode-id="881"><span data-dcnode-id="882" style="font-weight: 400;"></span></p><h3 class="vc_custom_heading" data-dcnode-id="877" style="text-align: left;font-family:Abril Fatface;font-weight:400;font-style:normal"><span data-dcnode-id="879" id="9_Jungalow_Decorate_Wild_by_Justina_Blakeney"><span data-dcnode-id="880" instrument_node="">9. Jungalow: Decorate Wild by Justina Blakeney</span></span><span data-dcnode-id="878" instrument_node="">
</span></h3><p data-dcnode-id="876"></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Justina Blakeney’s book, Jungalow: Decorate Wild, will inspire you to embrace your personal and wild style. From choosing color schemes, mixing striking patterns, and breaking away from traditional design principles. This book is the ultimate guide to wild, &nbsp;free-spirited, and creative interiors.</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">This book is one of a kind; she’s sharing a combo of uplifting inspiration mixed with her memoir, DIY instruction, and interior design philosophies.</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Her goal is to encourage people to find inspiration in the world, bring bright colors into their homes, empower and inspire people to find their style and voice.</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Read it cover to cover to get your Jungalow fix!</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="860"><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Jungalow-Decorate-Wild-Justina-Blakeney/dp/1419747053" rel="noopener" target="_blank"><span data-dcnode-id="862" instrument_node="">Available on Amazon for $28.49</span></a></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="855"><img alt="Jungalow Decorate Wild by Justina Blakeney" class="alignnone wp-image-8969 jetpack-lazy-image" data-dcnode-id="858" data-lazy-src="https://foyr.com/learn/wp-content/uploads/2021/03/Jungalow-Decorate-Wild-by-Justina-Blakeney.png?is-pending-load=1" height="957" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foyr.com/learn/wp-content/uploads/2021/03/Jungalow-Decorate-Wild-by-Justina-Blakeney.png&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="802"><noscript data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">&lt;img   alt="Jungalow Decorate Wild by Justina Blakeney" width="802" height="957" data-src="https://foyr.com/learn/wp-content/uploads/2021/03/Jungalow-Decorate-Wild-by-Justina-Blakeney.png" class="alignnone wp-image-8969 lazyload" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="&gt;&lt;noscript&gt;&lt;img class="alignnone wp-image-8969" src="https://foyr.com/learn/wp-content/uploads/2021/03/Jungalow-Decorate-Wild-by-Justina-Blakeney.png" alt="Jungalow Decorate Wild by Justina Blakeney" width="802" height="957"&gt;</span></noscript></p><span data-dcnode-id="854" instrument_node="">

</span><p data-dcnode-id="847"><span data-dcnode-id="848" style="font-weight: 400;"></span></p><h3 class="vc_custom_heading" data-dcnode-id="843" style="text-align: left;font-family:Abril Fatface;font-weight:400;font-style:normal"><span data-dcnode-id="845" id="10_Inspired_Design_The_100_Most_Important_Designers_of_the_Past_100_Years_by_Jennifer_Boles"><span data-dcnode-id="846" instrument_node="">10. Inspired Design: The 100 Most Important Designers of the Past 100 Years by Jennifer Boles</span></span><span data-dcnode-id="844" instrument_node="">
</span></h3><p data-dcnode-id="842"></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">If you’re a design student, this book offers a comprehensive guide of the 100 most important designers – a great history book to learn from.</span></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Unlike other books that address just one designer, this one rather features big interior designer names and their work, lessons to learn from them, and how they changed the industry and contributed to interior design history.</span></p><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="832"><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Inspired-Design-Important-Designers-Years/dp/0865653569/" rel="noopener" target="_blank"><span data-dcnode-id="834" instrument_node="">Available on Amazon for $87.10</span></a></p><span data-dcnode-id="831" instrument_node="">

</span><p data-dcnode-id="814"><span data-dcnode-id="815" style="font-weight: 400;"></span></p><h3 class="vc_custom_heading" data-dcnode-id="810" style="text-align: left;font-family:Abril Fatface;font-weight:400;font-style:normal"><span data-dcnode-id="812" id="11_Habitat_The_Field_Guide_to_Decorating_by_Lauren_Liess"><span data-dcnode-id="813" instrument_node="">11. Habitat: The Field Guide to Decorating by Lauren Liess</span></span><span data-dcnode-id="811" instrument_node="">
</span></h3><p data-dcnode-id="809"></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Lauren’s the home decor blogger and designer known for her great designs and her organizational work.</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">In her book, she encourages readers to bring nature inside by mixing modern eclectic collections and quirky vintage decor.</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">In this book, she addresses:</span></p><span data-dcnode-id="799" instrument_node="">
</span><ul data-dcnode-id="788"><span data-dcnode-id="798" instrument_node="">
</span><li data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Fundamentals – which incorporates lists of outlines of materials, tips, and methods for creating a space</span></li><span data-dcnode-id="795" instrument_node="">
</span><li data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Aesthetics &nbsp;– including style, mood, authenticity, juxtaposition, comfort, luxury, charm, risk, &amp; confidence</span></li><span data-dcnode-id="792" instrument_node="">
</span><li data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">A step-by-step guide for decorating each room in your home</span></li><span data-dcnode-id="789" instrument_node="">
</span></ul><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">You’ll learn the essential elements of interior design, how to create a mood with your design, and how to tackle decor challenges.</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">The book is great for you whether you’re a new interior designer or a student looking for advice on how to start creating a beautiful space or if you’re a homeowner looking for a home makeover. It also makes for a beautiful coffee table book.</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="778"><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Habitat-Field-Decorating-Lauren-Liess/dp/1419717855/" rel="noopener" target="_blank"><span data-dcnode-id="780" instrument_node="">Available on Amazon for $23.27</span></a></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" style="font-weight: 400;"><img alt="Habitat The Field Guide to Decorating by Lauren Liess" class="alignnone size-full wp-image-10410 jetpack-lazy-image" data-dcnode-id="776" data-lazy-sizes="(max-width: 1680px) 100vw, 1680px" data-lazy-src="https://foyr.com/learn/wp-content/uploads/2021/03/Habitat-The-Field-Guide-to-Decorating-by-Lauren-Liess-scaled.jpg?is-pending-load=1" data-lazy-srcset="https://foyr.com/learn/wp-content/uploads/2021/03/Habitat-The-Field-Guide-to-Decorating-by-Lauren-Liess-scaled.jpg 1680w, https://foyr.com/learn/wp-content/uploads/2021/03/Habitat-The-Field-Guide-to-Decorating-by-Lauren-Liess-840x1024.jpg 840w, https://foyr.com/learn/wp-content/uploads/2021/03/Habitat-The-Field-Guide-to-Decorating-by-Lauren-Liess-768x936.jpg 768w, https://foyr.com/learn/wp-content/uploads/2021/03/Habitat-The-Field-Guide-to-Decorating-by-Lauren-Liess-1260x1536.jpg 1260w" height="2048" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foyr.com/learn/wp-content/uploads/2021/03/Habitat-The-Field-Guide-to-Decorating-by-Lauren-Liess-scaled.jpg&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="1680"><noscript data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">&lt;img   alt="Habitat The Field Guide to Decorating by Lauren Liess" width="1680" height="2048" data-srcset="https://foyr.com/learn/wp-content/uploads/2021/03/Habitat-The-Field-Guide-to-Decorating-by-Lauren-Liess-scaled.jpg 1680w, https://foyr.com/learn/wp-content/uploads/2021/03/Habitat-The-Field-Guide-to-Decorating-by-Lauren-Liess-840x1024.jpg 840w, https://foyr.com/learn/wp-content/uploads/2021/03/Habitat-The-Field-Guide-to-Decorating-by-Lauren-Liess-768x936.jpg 768w, https://foyr.com/learn/wp-content/uploads/2021/03/Habitat-The-Field-Guide-to-Decorating-by-Lauren-Liess-1260x1536.jpg 1260w"  data-src="https://foyr.com/learn/wp-content/uploads/2021/03/Habitat-The-Field-Guide-to-Decorating-by-Lauren-Liess-scaled.jpg" data-sizes="(max-width: 1680px) 100vw, 1680px" class="alignnone size-full wp-image-10410 lazyload" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="&gt;&lt;noscript&gt;&lt;img class="alignnone size-full wp-image-10410" src="https://foyr.com/learn/wp-content/uploads/2021/03/Habitat-The-Field-Guide-to-Decorating-by-Lauren-Liess-scaled.jpg" alt="Habitat The Field Guide to Decorating by Lauren Liess" width="1680" height="2048" srcset="https://foyr.com/learn/wp-content/uploads/2021/03/Habitat-The-Field-Guide-to-Decorating-by-Lauren-Liess-scaled.jpg 1680w, https://foyr.com/learn/wp-content/uploads/2021/03/Habitat-The-Field-Guide-to-Decorating-by-Lauren-Liess-840x1024.jpg 840w, https://foyr.com/learn/wp-content/uploads/2021/03/Habitat-The-Field-Guide-to-Decorating-by-Lauren-Liess-768x936.jpg 768w, https://foyr.com/learn/wp-content/uploads/2021/03/Habitat-The-Field-Guide-to-Decorating-by-Lauren-Liess-1260x1536.jpg 1260w" sizes="(max-width: 1680px) 100vw, 1680px"&gt;</span></noscript></span></p><span data-dcnode-id="771" instrument_node="">

</span><p data-dcnode-id="765"><span data-dcnode-id="766" style="font-weight: 400;"></span></p><h3 class="vc_custom_heading" data-dcnode-id="761" style="text-align: left;font-family:Abril Fatface;font-weight:400;font-style:normal"><span data-dcnode-id="763" id="12_Domino_The_Book_of_Decorating"><span data-dcnode-id="764" instrument_node="">12. Domino: The Book of Decorating</span></span><span data-dcnode-id="762" instrument_node="">
</span></h3><p data-dcnode-id="760"></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Domino: The Book of Decorating was a bestseller upon its release. It takes you room by room, giving you tips and tricks on how to decorate your own home, and provides a quintessential guide to interior design with plenty of photos of professionally decorated rooms in so many different styles.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">It shows real-life inspiration on how creative people inhabit their spaces that don’t have to be perfect. It helps to mix styles and tells you why rooms and the pieces in them work together well. And it’s a quick read with many photos and magazine-like format.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="750"><a data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Domino-Decorating-Room-Room-Creating/dp/1416575464/" rel="noopener" target="_blank"><span data-dcnode-id="752" instrument_node="">Available on Amazon for $20.40</span></a></p><span data-dcnode-id="749" instrument_node="">

</span><p data-dcnode-id="732"><span data-dcnode-id="733" style="font-weight: 400;"></span></p><h3 class="vc_custom_heading" data-dcnode-id="728" style="text-align: left;font-family:Abril Fatface;font-weight:400;font-style:normal"><span data-dcnode-id="730" id="13_Rebecca_Atwood_Living_With_Pattern"><span data-dcnode-id="731" instrument_node="">13. Rebecca Atwood: Living With Pattern</span></span><span data-dcnode-id="729" instrument_node="">
</span></h3><p data-dcnode-id="727"></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Textile designer Rebecca Atwood wrote this book to showcase the art of mixing and layering patterns. She provides inspirations and tips to help any design enthusiast properly work with patterns, get great designs, and transform their home decor from average to extraordinary.</span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="720"><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Living-Pattern-Color-Texture-Print/dp/0553459449/" rel="noopener" target="_blank"><span data-dcnode-id="722" instrument_node="">Available on Amazon for $20.67</span></a></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="715"><img alt="Rebecca Atwood Living With Pattern" class="alignnone size-full wp-image-10413 jetpack-lazy-image" data-dcnode-id="718" data-lazy-sizes="(max-width: 1648px) 100vw, 1648px" data-lazy-src="https://foyr.com/learn/wp-content/uploads/2021/03/Rebecca-Atwood-Living-With-Pattern-scaled.jpg?is-pending-load=1" data-lazy-srcset="https://foyr.com/learn/wp-content/uploads/2021/03/Rebecca-Atwood-Living-With-Pattern-scaled.jpg 1648w, https://foyr.com/learn/wp-content/uploads/2021/03/Rebecca-Atwood-Living-With-Pattern-824x1024.jpg 824w, https://foyr.com/learn/wp-content/uploads/2021/03/Rebecca-Atwood-Living-With-Pattern-768x954.jpg 768w, https://foyr.com/learn/wp-content/uploads/2021/03/Rebecca-Atwood-Living-With-Pattern-1236x1536.jpg 1236w" height="2048" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foyr.com/learn/wp-content/uploads/2021/03/Rebecca-Atwood-Living-With-Pattern-scaled.jpg&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="1648"><noscript data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">&lt;img   alt="Rebecca Atwood Living With Pattern" width="1648" height="2048" data-srcset="https://foyr.com/learn/wp-content/uploads/2021/03/Rebecca-Atwood-Living-With-Pattern-scaled.jpg 1648w, https://foyr.com/learn/wp-content/uploads/2021/03/Rebecca-Atwood-Living-With-Pattern-824x1024.jpg 824w, https://foyr.com/learn/wp-content/uploads/2021/03/Rebecca-Atwood-Living-With-Pattern-768x954.jpg 768w, https://foyr.com/learn/wp-content/uploads/2021/03/Rebecca-Atwood-Living-With-Pattern-1236x1536.jpg 1236w"  data-src="https://foyr.com/learn/wp-content/uploads/2021/03/Rebecca-Atwood-Living-With-Pattern-scaled.jpg" data-sizes="(max-width: 1648px) 100vw, 1648px" class="alignnone size-full wp-image-10413 lazyload" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="&gt;&lt;noscript&gt;&lt;img class="alignnone size-full wp-image-10 </span><p data-dcnode-id="708"><span data-dcnode-id="709" style="font-weight: 400;"></span></p><h3 class="vc_custom_heading" data-dcnode-id="704" style="text-align: left;font-family:Abril Fatface;font-weight:400;font-style:normal"><span data-dcnode-id="706" id="14_New_York_School_of_Interior_Design_Home_The_Foundations_of_Enduring_Spaces_by_Ellen_S_Fisher"><span data-dcnode-id="707" instrument_node="">14. New York School of Interior Design: Home: The Foundations of Enduring Spaces by Ellen S. Fisher</span></span><span data-dcnode-id="705" instrument_node="">
</span></h3><p data-dcnode-id="703"></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">This excellent reference for home decor is considered the ultimate Interior Design guide. This book contains detailed interior design content with a comprehensive focus on home design, color theory, and space-specific areas.</span></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">It offers the key elements of design, rendering it the only book you’ll ever need – it was built on the Home Study Course that is the foundation of the school’s curriculum.</span></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">It’s a helpful reference for student and self-taught designers and decorators when it comes to the technical elements of the job.</span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="690"><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/New-York-School-Interior-Design/dp/0804137196/" rel="noopener" target="_blank"><span data-dcnode-id="692" instrument_node="">Available on Amazon for $35.77</span></a></p><span data-dcnode-id="689" instrument_node="">

-Home-The-Foundations-of-Enduring-Spaces-by-Ellen-S.-Fisher-834x1024.jpg 834w, https://foyr.com/learn/wp-content/uploads/2021/03/New-York-School-of-Interior-Design-Home-The-Foundations-of-Enduring-Spaces-by-Ellen-S.-Fisher-768x943.jpg 768w, https://foyr.com/learn/wp-content/uploads/2021/03/New-York-School-of-Interior-Design-Home-The-Foundations-of-Enduring-Spaces-by-Ellen-S.-Fisher-1250x1536.jpg 1250w"  data-src="https://foyr.com/learn/wp-content/uploads/2021/03/New-York-School-of-Interior-Design-Home-The-Foundations-of-Enduring-Spaces-by-Ellen-S.-Fisher-scaled.jpg" data-sizes="(max-width: 1667px) 100vw, 1667px" class="alignnone size-full wp-image-10414 lazyload" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="&gt;&lt;noscript&gt;&lt;img class="alignnone size-full wp-image-10414" src="https://foyr.com/learn/wp-content/uploads/2021/03/New-York-School-of-Interior-Design-Home-The-Foundations-of-Enduring-Spaces-by-Ellen-S.-Fisher-scaled.jpg" alt="New York School of Interior Design Home The Foundations of Enduring Spaces by Ellen S Fisher" width="1667" height="2048" srcset="https://foyr.com/learn/wp-content/uploads/2021/03/New-York-School-of-Interior-Design-Home-The-Foundations-of-Enduring-Spaces-by-Ellen-S.-Fisher-scaled.jpg 1667w, https://foyr.com/learn/wp-content/uploads/2021/03/New-York-School-of-Interior-Design-Home-The-Foundations-of-Enduring-Spaces-by-Ellen-S.-Fisher-834x1024.jpg 834w, https://foyr.com/learn/wp-content/uploads/2021/03/New-York-School-of-Interior-Design-Home-The-Foundations-of-Enduring-Spaces-by-Ellen-S.-Fisher-768x943.jpg 768w, https://foyr.com/learn/wp-content/uploads/2021/03/New-York-School-of-Interior-Design-Home-The-Foundations-of-Enduring-Spaces-by-Ellen-S.-Fisher-1250x1536.jpg 1250w" sizes="(max-width: 1667px) 100vw, 1667px"&gt;</span></noscript></span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="680"><em data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Image Credit: amazon.com</span></em></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" style="font-weight: 400;"></span></p><h3 class="vc_custom_heading" data-dcnode-id="673" style="text-align: left;font-family:Abril Fatface;font-weight:400;font-style:normal"><span data-dcnode-id="675" id="15_The_Kinfolk_Home_A_Book_for_Fulfilling_Slow_Living_by_Nathan_Williams"><span data-dcnode-id="676" instrument_node="">15. The Kinfolk Home: A Book for Fulfilling, Slow Living by Nathan Williams</span></span><span data-dcnode-id="674" instrument_node="">
</span></h3><p data-dcnode-id="672"></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Kinfolk author Nathan Williams takes readers inside 35 homes worldwide, interviewing people about their home design and styling. He showcases how to embrace slow life to get benefits like simplifying your life and cultivating community— which allows you to create a beautiful and intimate living space from different perspectives around the world.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">In this book, the reader explores the stunning interiors of those homes. Some have constructed modern urban homes, while others honor their history and their roots.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">The book features insightful conversations, artistic aesthetics, and vibrant photographs of each home tour, which is guaranteed to inspire.</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="659"><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Kinfolk-Home-Interiors-Slow-Living/dp/157965665X/" rel="noopener" target="_blank"><span data-dcnode-id="661" instrument_node="">Available on Amazon for $26.19</span></a></p><span data-dcnode-id="658" instrument_node="">
