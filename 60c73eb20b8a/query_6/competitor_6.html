</span><figure class="wp-block-image" data-dcnode-id="770"><a data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//welcome.lesleymyrick.com/kitchen-checklist/" rel="noreferrer noopener" target="_blank"><img alt="The Essential Kitchen Design Checklist - FREE download from interior designer Lesley Myrick" class="wp-image-10795 lazyloaded" data-dcnode-id="774" data-src="https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-free-download-792x1024.png" data-srcset="https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-free-download-792x1024.png 792w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-free-download-232x300.png 232w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-free-download-768x993.png 768w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-free-download.png 1372w" height="1024" sizes="(max-width: 792px) 100vw, 792px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-free-download-792x1024.png&amp;raw" srcset="https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-free-download-792x1024.png 792w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-free-download-232x300.png 232w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-free-download-768x993.png 768w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-free-download.png 1372w" width="792"><noscript data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">&lt;img width="792" height="1024" src="https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-free-download-792x1024.png" alt="The Essential Kitchen Design Checklist - FREE download from interior designer Lesley Myrick" class="wp-image-10795 lazyload" srcset="https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-free-download-792x1024.png 792w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-free-download-232x300.png 232w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-free-download-768x993.png 768w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-free-download.png 1372w" sizes="(max-width: 792px) 100vw, 792px" /&gt;</span></noscript></a></figure><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="768" instrument_node="">There are four major categories to consider when </span><a aria-label="designing a kitchen (opens in a new tab)" data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lesleymyrick.com/waco-family-friendly-kitchen-remodel-after/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="767" instrument_node="">designing a kitchen</span></a><span data-dcnode-id="765" instrument_node="">: </span></p><span data-dcnode-id="763" instrument_node="">
</span><h3 data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Fixtures + Finishes, Plumbing, Appliances, and Storage. </span></h3><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Fixtures and Finishes includes the fun stuff, like counterops and cabinet colors. It also includes the boring (but necessary) stuff that needs to be selected, like the edge style and thickness for the countertop, and the grout color for the floor tiles. These are the kind of seemingly small design decisions that have a big impact on the overall result of a kitchen remodel, yet most homeowners aren’t prepared to make these kinds of selections and this indecision can really bottleneck a project.</span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Plumbing also seems simple (you need a faucet, right?) until you realize how many other elements are part of this decision, like the type of faucet mount (Centerset? Widespread?), finish (Chrome? Brass? Matte black?), or features (Pulldown? Touch-activated?). </span></p><span data-dcnode-id="754" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="750"><img alt="Everything you need to consider when designing a kitchen is included in this FREE kitchen checklist from Atlanta interior designer Lesley Myrick" class="wp-image-10797 lazyloaded" data-dcnode-id="753" data-src="https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-fixtures-finishes-plumbing-861x1024.png" data-srcset="https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-fixtures-finishes-plumbing-861x1024.png 861w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-fixtures-finishes-plumbing-252x300.png 252w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-fixtures-finishes-plumbing-768x913.png 768w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-fixtures-finishes-plumbing.png 1628w" height="1024" sizes="(max-width: 861px) 100vw, 861px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-fixtures-finishes-plumbing-861x1024.png&amp;raw" srcset="https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-fixtures-finishes-plumbing-861x1024.png 861w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-fixtures-finishes-plumbing-252x300.png 252w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-fixtures-finishes-plumbing-768x913.png 768w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-fixtures-finishes-plumbing.png 1628w" width="861"><noscript data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">&lt;img width="861" height="1024" src="https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-fixtures-finishes-plumbing-861x1024.png" alt="Everything you need to consider when designing a kitchen is included in this FREE kitchen checklist from Atlanta interior designer Lesley Myrick" class="wp-image-10797 lazyload" srcset="https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-fixtures-finishes-plumbing-861x1024.png 861w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-fixtures-finishes-plumbing-252x300.png 252w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-fixtures-finishes-plumbing-768x913.png 768w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-fixtures-finishes-plumbing.png 1628w" sizes="(max-width: 861px) 100vw, 861px" /&gt;</span></noscript></figure><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">If you’re designing a whole new kitchen layout, then the world of appliances is your oyster! Be sure to pay attention to size and electrical needs so that your contractor and electrician make the correct allowances (and so that your fancy new oven works properly!). </span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">If you’re working with an existing kitchen layout, pay attention to how wide the openings are for your appliances – a 24″ wide opening will not fit a 24″ wide appliance, and you’ll need to factor in a little wiggle-room to make sure things fit.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">And of course, storage is a major consideration in a kitchen design. This is the time to look into awesome storage solutions to make your life easier, like pull-outs, drawer dividers, and baking sheet dividers.</span></p><span data-dcnode-id="740" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="736"><img alt="Everything you need to consider - from appliances to storage - when designing a kitchen is included in this FREE kitchen checklist from interior designer Lesley Myrick" class="wp-image-10799 lazyloaded" data-dcnode-id="739" data-src="https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-appliances-storage-863x1024.png" data-srcset="https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-appliances-storage-863x1024.png 863w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-appliances-storage-253x300.png 253w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-appliances-storage-768x911.png 768w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-appliances-storage.png 1624w" height="1024" sizes="(max-width: 863px) 100vw, 863px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-appliances-storage-863x1024.png&amp;raw" srcset="https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-appliances-storage-863x1024.png 863w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-appliances-storage-253x300.png 253w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-appliances-storage-768x911.png 768w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-appliances-storage.png 1624w" width="863"><noscript data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">&lt;img width="863" height="1024" src="https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-appliances-storage-863x1024.png" alt="Everything you need to consider - from appliances to storage - when designing a kitchen is included in this FREE kitchen checklist from interior designer Lesley Myrick" class="wp-image-10799 lazyload" srcset="https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-appliances-storage-863x1024.png 863w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-appliances-storage-253x300.png 253w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-appliances-storage-768x911.png 768w, https://lesleymyrick.com/wp-content/uploads/sites/5/2020/02/kitchen-design-checklist-appliances-storage.png 1624w" sizes="(max-width: 863px) 100vw, 863px" /&gt;</span></noscript></figure><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">This FREE kitchen design checklist is the exact tool I use at Lesley Myrick Art + Design when I start a new kitchen remodel project. It includes four major categories to consider as well as alllll the nitty-gritty details you’ll need to cover in each category. </span></p><span data-dcnode-id="732" instrument_node="">
