</span><div class="column-section__column column-section__column--left column-section__column-tab-12 column-section__column-mob-12 column-section__column-desk-7" data-dcnode-id="316" data-test-column-item=""><span data-dcnode-id="507" instrument_node="">

</span><div class="text" data-dcnode-id="320"><span data-dcnode-id="505" instrument_node="">
</span><div data-dcnode-id="325" data-hypernova-id="58339799-26d7-4061-9ee8-c5b3f9f89637" data-hypernova-key="MsmText"><div class="cms-text" data-dcnode-id="326" data-server-rendered="true"><div data-cy-text="" data-dcnode-id="327"><div class="msm-page-s-g__body-text" data-dcnode-id="329"><span data-dcnode-id="330"><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Unemployment in the UK rose to 2.685 million in November 2011, the highest level we have seen since summer 1994, and with this level of uncertainty in the economy, it is little wonder that the number of self-employed people has risen to over four million.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">There are obvious questions to ask and risks to consider when starting a business, for example, how will you cope with not having a set, regular income? Do you have what it takes to be your own boss? How will you manage not having any paid holidays?</span></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">There is also a lack of contribution into a company pension to consider. However, if these are questions you’ve already answered and you are still planning to go ahead, it’s important to know what rules and regulations you need to abide by.</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Read on for our guide which details how to start a small business and examines each the key areas you will need to consider.</span></p><span data-dcnode-id="493" instrument_node="">
</span><h3 data-dcnode-id="490"><span class="cms-ft-charlie cms-p-t-48 cms-p-b-16" data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Developing a business structure</span></span></h3><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Regardless of whether you are entering the market place as a sole trader, partnership, or a limited company, you must register for Self-Assessment with HM Revenue &amp; Customs (HMRC); however there different regulations for different business structures:</span></p><span data-dcnode-id="486" instrument_node="">
</span><h2 data-dcnode-id="483"><span class="cms-ft-charlie cms-p-t-48 cms-p-b-16" data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">National Insurance</span></span></h2><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">As a sole trader or partnership, there are 2 kinds of National Insurance you’ll need to pay; Class 2 and Class 4 contributions. For example, in 2011, the Class 2 contribution was a fixed amount of £2.50 per week. Class 4 contributions are calculated as a percentage of your business profit, but only when the business starts to generate profits of £7,225 or above (2011-2012).</span></p><span data-dcnode-id="479" instrument_node="">
</span><h2 data-dcnode-id="476"><span class="cms-ft-charlie cms-p-t-48 cms-p-b-16" data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Other important tax information</span></span></h2><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">In addition to National Insurance, a limited company is also required to pay Corporation Tax which again is calculated as a percentage of taxable profits.</span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Although Tax is a legal requirement, if your business generates profits of £5,315 or less (£5,595 2012/2013), you can apply for a Small Earnings Exception (SEE), however please bear in mind that this may impact your benefit entitlements.</span></p><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Whether you decide to set up as a sole trader, a partnership, or a limited company, you must register with the HMRC within the first 3 months of becoming self-employed or you could risk being fined.</span></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">It is important to note that, if you plan on starting up a limited company (in which the business owner is absolved of personal financial responsibility in the event of the company becoming bankrupt), you will need to register with Companies House.</span></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="462" instrument_node="">Further information can be found on the&nbsp;</span><a data-dcnode-id="460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/organisations/hm-revenue-customs"><span data-dcnode-id="461" instrument_node="">HMRC website</span></a><span data-dcnode-id="459" instrument_node="">&nbsp;and the&nbsp;</span><a data-dcnode-id="457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/organisations/companies-house"><span data-dcnode-id="458" instrument_node="">Companies House website</span></a><span data-dcnode-id="456" instrument_node="">.</span></p><span data-dcnode-id="454" instrument_node="">
</span><h2 data-dcnode-id="451"><span class="cms-ft-charlie cms-p-t-48 cms-p-b-16" data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Business insurance</span></span></h2><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Most businesses intend to take out insurance at the very beginning; however it is something which can easily fall off the radar once the business starts to find its feet. Business Insurance is essential and it can help support you in the following areas:</span></p><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="446" instrument_node="">Public Liability.&nbsp;This protects you against any compensation claims which might arise in the case of injury or property damage where your business is deemed to be at fault. If you come into contact with members of the public, it is imperative you take out this kind of insurance.&nbsp;</span><br data-dcnode-id="445"><span data-dcnode-id="444" instrument_node="">
</span><br data-dcnode-id="443"><span data-dcnode-id="442" instrument_node="">
</span><a data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysupermarket.com/business-insurance/public-liability/"><span data-dcnode-id="441" instrument_node="">Read More…</span></a><span data-dcnode-id="439" instrument_node="">&nbsp;</span><br data-dcnode-id="438"><span data-dcnode-id="437" instrument_node="">
</span><br data-dcnode-id="436"><span data-dcnode-id="435" instrument_node="">
Employers' Liability.&nbsp;If you have employees, you are legally obliged to take out employers' liability insurance. It protects you if an employee is injured or becomes ill as a result of their work while in your employment.&nbsp;</span><br data-dcnode-id="434"><span data-dcnode-id="433" instrument_node="">
</span><br data-dcnode-id="432"><span data-dcnode-id="431" instrument_node="">
</span><a data-dcnode-id="429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysupermarket.com/business-insurance/employers-liability/"><span data-dcnode-id="430" instrument_node="">Read More…</span></a><span data-dcnode-id="428" instrument_node="">&nbsp;</span><br data-dcnode-id="427"><span data-dcnode-id="426" instrument_node="">
</span><br data-dcnode-id="425"><span data-dcnode-id="424" instrument_node="">
Business Building.&nbsp;This covers you in the event that your business premises are damaged and in the event that your equipment/stock is damaged, destroyed, lost or stolen. Ensure you take out adequate cover to enable you to replace your equipment or find a new business premises should the worst happen.&nbsp;</span><br data-dcnode-id="423"><span data-dcnode-id="422" instrument_node="">
</span><br data-dcnode-id="421"><span data-dcnode-id="420" instrument_node="">
</span><a data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysupermarket.com/business-insurance/business-building/"><span data-dcnode-id="419" instrument_node="">Read More…</span></a><span data-dcnode-id="417" instrument_node="">&nbsp;</span><br data-dcnode-id="416"><span data-dcnode-id="415" instrument_node="">
</span><br data-dcnode-id="414"><span data-dcnode-id="413" instrument_node="">
Professional Indemnity Insurance.&nbsp;This covers you in the event that any advice or professional knowledge your business imparts results in a compensation claim from a client due to lost income on their part.&nbsp;</span><br data-dcnode-id="412"><span data-dcnode-id="411" instrument_node="">
</span><br data-dcnode-id="410"><span data-dcnode-id="409" instrument_node="">
</span><a data-dcnode-id="407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysupermarket.com/business-insurance/professional-indemnity/"><span data-dcnode-id="408" instrument_node="">Read More…</span></a><span data-dcnode-id="406" instrument_node="">&nbsp;</span><br data-dcnode-id="405"><span data-dcnode-id="404" instrument_node="">
</span><br data-dcnode-id="403"><span data-dcnode-id="402" instrument_node="">
Insurance policies for small businesses (SME’s) can be tailored to suit your needs. For further information on the types of cover you can purchase, please click on one of the links in the list on the left hand side of this page, or return to our&nbsp;</span><a data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysupermarket.com/business-insurance/"><span data-dcnode-id="401" instrument_node="">business insurance homepage</span></a><span data-dcnode-id="399" instrument_node="">&nbsp;and select the more options tab.</span></p><span data-dcnode-id="397" instrument_node="">
</span><h2 data-dcnode-id="394"><span class="cms-ft-charlie cms-p-t-48 cms-p-b-16" data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Business financing</span></span></h2><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="392" instrument_node="">In recent years it’s become increasingly difficult to access bank loans, which is why most self-employed people choose to fund the business start-up through personal savings.&nbsp;</span><br data-dcnode-id="391"><span data-dcnode-id="390" instrument_node="">
</span><br data-dcnode-id="389"><span data-dcnode-id="388" instrument_node="">
If this isn’t an option for you, you could look into taking out loans or grants which are sometimes available through local authorities for those starting a business. If you do decide to go down this route, you need to convince investors that your idea is a worthwhile proposition.&nbsp;</span><br data-dcnode-id="387"><span data-dcnode-id="386" instrument_node="">
</span><br data-dcnode-id="385"><span data-dcnode-id="384" instrument_node="">
Our 5 tips for a successful financial support application are:</span></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Make sure your business plan is sound.&nbsp;Ensure the initial business proposal is realistic. Running out of money in the early days can seriously hamper a small company and the chances of survival.</span></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Plan ahead with budgets.&nbsp;Budgets in the short to medium also need to be considered – how much money will be required on a day to day basis for the business to continue to operate?</span></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Try to allocate budgets based on sales targets and revenue projections. Also take into consideration living costs.</span></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Do your research.&nbsp;Ensure comprehensive market research has been carried out. You can't plan ahead enough when it comes to starting up a business and knowledge is King!</span></p><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Be prepared to be grilled.&nbsp;Investors are notoriously hard to persuade so you should be prepared for any difficult questions they may ask in relation to your business plan, profit forecasts and the market you will be operating in.</span></p><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="362"><span data-dcnode-id="366" instrument_node="">For more information on funding a business, take a look at the Gov.uk website which can be found&nbsp;</span><a data-dcnode-id="364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/browse/business"><span data-dcnode-id="365" instrument_node="">here</span></a><span data-dcnode-id="363" instrument_node="">.</span></p><span data-dcnode-id="361" instrument_node="">
</span><h2 data-dcnode-id="358"><span class="cms-ft-charlie cms-p-t-48 cms-p-b-16" data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Business bank account</span></span></h2><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="356" instrument_node="">Once you have secured insurance and adequate finances, it’s important to open a business bank account which offers everything you need. It isn’t a legal requirement for sole traders, but it is always a good idea to keep business and personal finances separate. Most high street banks offer business bank accounts and they often use different incentives to persuade you to bank with them over and above one of their competitors, so make sure you shop around to get the best deal. MoneySupermarket.com offers a large range of different bank accounts and deals which you can find on our&nbsp;</span><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moneysupermarket.com/current-accounts/business-bank-accounts/"><span data-dcnode-id="355" instrument_node="">business bank accounts page</span></a><span data-dcnode-id="353" instrument_node="">.</span></p><span data-dcnode-id="351" instrument_node="">
</span><h2 data-dcnode-id="348"><span class="cms-ft-charlie cms-p-t-48 cms-p-b-16" data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Legal/VAT obligations when starting a business</span></span></h2><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Only if you hit a certain turnover threshold (£73,000 in 2011) within 12 months, are you legally obliged to register for Value Added Tax (VAT).</span></p><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">VAT returns are to be submitted online every three months and you are required to pay any VAT owed at the same time.</span></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">VAT ratings can differ between business categories, but you can benefit in certain areas by charging VAT on sales and claiming it back on purchases. For example, if you sell items which are VAT exempt and buy items which are standard rated, it is possible for you to obtain a VAT refund from HMRC. For more information on this, visit the HRMC website.</span></p><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">If you are ready to begin comparing business insurance quotes then hit the button at the top of the page or click on the link below. For further advice and info, or to read about the various types of cover on offer, please select one of the links to the left hand side of this page.</span></p><span data-dcnode-id="335" instrument_node="">
