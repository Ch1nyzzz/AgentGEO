</span><h2 data-dcnode-id="906" style="text-align: center;"><span data-dcnode-id="907" instrument_node="">How to Start a Microgreens Business</span></h2><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Have you considered going into business for yourself but thought it would be impossible? I’m here to tell you about an awesome business idea that could allow you to make a thousand dollars or more per week. Most people have likely never considered a microgreens business or how it could transform their lives.</span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">When I started out with my business, I was not an expert grower. I had my doubts and worried I would be a failure. Instead of giving up before I even started, I decided to give it my all and see what happened.</span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">While growing microgreens might seem difficult, it is pretty simple. With a few inexpensive supplies and time, you can soon have a crop of profitable microgreens that can be sold to restaurants and individuals in your community. If you are tired of the 9 to 5 grind like I once was, keep reading and learn all you can about how to start a microgreens business so you can determine if this opportunity is the one you have been searching for.</span></p><span data-dcnode-id="896" instrument_node="">
</span><h3 data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">What Are Microgreens?</span></h3><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">What are microgreens and how can they make you money? Maybe you’ve been to a restaurant and saw your dish served with a garnish of tiny greens or saw them being used on top of a salad.</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="889" instrument_node="">Microgreens are simply the tiny seedlings of vegetables. These tender and delicious plants have been incorporated in dishes since the 1980s, but they have recently made a huge splash in the culinary world.</span><br data-dcnode-id="888"><span data-dcnode-id="887" instrument_node="">
These tiny plants pack a big punch in the flavor department, and are filled with beneficial vitamins and nutrients. Even if you don’t decide to start selling microgreens, your health could benefit from learning how to grow a small crop on a regular basis.</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">I want you to discover microgreens because they have the potential to help you start your own business, so you can quit your job and enjoy living your life to the fullest - creating a livelihood that you enjoy and that benefits your local community.</span></p><span data-dcnode-id="882" instrument_node="">
</span><h3 data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">You Can Become a Microgreens Farmer</span></h3><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">When I started growing microgreens for profit, I was afraid it would not be a success. I was not an expert gardener, but was actually just beginning my farming journey. You may think it takes a giant “green thumb” to be successful in growing microgreens, but I am proof it does not.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Microgreens farming is growing microgreens in a spare room in your home or at a commercial location. Once or twice per week, you have a crop that can be harvested and sold. You do not need an outdoor garden and you don’t even need a lot of space to run this business.</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">I started my microgreen business with just a few flats. Starting small is the best option for beginners because it allows you to become comfortable with the process without feeling overwhelmed.</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">It sounds cliché, but if I can do this, anyone can! If you are willing to give it a shot and put in the small amount of effort it takes to start your microgreens business, you have the potential to turn this into a great thing.</span></p><span data-dcnode-id="867" instrument_node="">
</span><h3 data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">How to Start Selling Microgreens</span></h3><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Selling microgreens isn’t difficult. If you follow my tips, you will have a bountiful crop each week that you can sell to restaurant chefs, grocers, at farmers markets, and to individuals in your community.</span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">When you start selling microgreens, you might be a little nervous. But believe me when I tell you this: there is an expansive market for these delicious and nutritious microgreens. I recommend you start growing and selling radish, brassica, or pea microgreens, but there are tons more you can eventually learn to grow.</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="857" instrument_node="">Selling microgreens is not as time-consuming or as strenuous as it sounds. You’ll be surprised by how many people will buy microgreens from you, and as word spreads, your business will exponentially begin to grow.</span><br data-dcnode-id="856"><span data-dcnode-id="855" instrument_node="">
I have gone through all of the trial and error and have discovered the best and easiest methods of growing microgreens for profit. I am here to help others learn my methods so they can be as successful with much less effort.</span></p><span data-dcnode-id="853" instrument_node="">
</span><h3 data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Is a Microgreens Business Right for You?</span></h3><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">I talk with people from all walks of life every day about how to start a microgreens business. Most are skeptical at first until they begin to really listen to what I am saying. When I talk with people about becoming a microgreens farmer, I list the following criteria as a must for ensuring this type of business is right for them:</span></p><span data-dcnode-id="847" instrument_node="">
</span><ul data-dcnode-id="833"><span data-dcnode-id="846" instrument_node="">
</span><li data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">You must be willing to learn. (The growing process is pretty easy, but there are a few must do’s that many people miss)</span></li><span data-dcnode-id="843" instrument_node="">
</span><li data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">You must have a little time to devote to the watering and care of your crop.</span></li><span data-dcnode-id="840" instrument_node="">
</span><li data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">You must be willing to seek out selling opportunities in your community (I have many resources to help with this)</span></li><span data-dcnode-id="837" instrument_node="">
</span><li data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">You must have a small amount of money to purchase your growing supplies and initial seeds.</span></li><span data-dcnode-id="834" instrument_node="">
</span></ul><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">That doesn’t seem too hard, does it? You were not asked to get a college degree, invest tons of money or spend months working on your microgreen business. That’s what drew me to this opportunity and made me want to give it my all. If you are willing to invest a little time, money and space, microgreens farming can work for you just like it has for many others.</span></p><span data-dcnode-id="829" instrument_node="">
</span><h3 data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">How to Start a Microgreen Business</span></h3><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Has your interest been piqued enough to get started? Tons of people around the world are making thousands of dollars a week growing and selling microgreens for profit. I hear from people every day who have used my simple methods to start their own microgreens business.</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="822" instrument_node="">In my </span><a data-dcnode-id="820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.microgreensfarmer.com/webinar" rel="noopener" target="_blank"><span data-dcnode-id="821" instrument_node="">ebook and webinars</span></a><span data-dcnode-id="819" instrument_node="">, I detail the supplies you will need and what you need to do to ensure you start out on the right foot. If you have the right supplies and are ready to get started, you can easily begin growing a profitable crop with only a few hours a week of your time. Yes, you read that correctly! I will take you through the process and show you exactly how to start and how to keep your business going.</span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">This is not rocket science, and you do not need major training or a degree to get started. Most people are amazed when I tell them they can begin growing microgreens with a profit as high as $30 a pound.</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="813" instrument_node="">Reading my </span><a data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.microgreensfarmer.com/webinar" rel="noopener" target="_blank"><span data-dcnode-id="812" instrument_node="">FREE eBook</span></a><span data-dcnode-id="810" instrument_node=""> will teach you all the steps you need to take to get started and be successful. Within 10-14 days, you can be ready to harvest your first crop so it can be sold for profit. With each successful crop, the opportunities to make sales will grow. It is up to you how big your business becomes.</span></p><span data-dcnode-id="808" instrument_node="">
</span><h3 data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Get Started on Growing Your Business from Home</span></h3><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Do you have 4 hours a week to spare? Do you have a small corner in your home for a growing station? Are you excited about making a profit by helping others eat nutritionally-dense microgreens? If you answered yes to these questions, it is time for you to learn more.</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="801" instrument_node="">I believe so strongly in this amazing opportunity, I am willing to share my knowledge for free. You can get started by </span><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.microgreensfarmer.com/webinar" rel="noopener" target="_blank"><span data-dcnode-id="800" instrument_node="">attending my online classes</span></a><span data-dcnode-id="798" instrument_node="">, which offer extensive help. You can also </span><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.microgreensfarmer.com/webinar" rel="noopener" target="_blank"><span data-dcnode-id="797" instrument_node="">download my free eBook</span></a><span data-dcnode-id="795" instrument_node=""> that offers you step-by-step instruction.</span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">When I started my microgreens business, I was practically clueless. Learn from my mistakes and trial and error, and you will immediately begin seeing success. I know you are going to love your new business because microgreens are so easy to grow, they bring in such a high profit, and people LOVE THEM. You can say goodbye to the work grind and hello to a business that will give you much more freedom and time to do those things you really want to do, instead of breaking your back to make someone else wealthy.</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="784"><strong data-dcnode-id="785"><span data-dcnode-id="789" instrument_node="">Check out my </span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.microgreensfarmer.com/webinar" rel="noopener" target="_blank"><span data-dcnode-id="788" instrument_node="">free book and webinar schedule today</span></a><span data-dcnode-id="786" instrument_node=""> and do not allow this amazing opportunity to pass you by!</span></strong></p><span data-dcnode-id="783" instrument_node="">

</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">That job was as a ecological field restoration worker, spending my days spraying invasive plants with large amounts of herbicide.  After 5 long years of busting my butt, climbing through briars with my clothes soaked in sweat and herbicide and tick bites covering my legs, I'd had enough!  </span></p><span data-dcnode-id="748" instrument_node="">

</span><h2 class="widget-title" data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Privacy Policy</span></h2><span data-dcnode-id="358" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="138"><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="343"><span data-dcnode-id="356" instrument_node="">Microgreens Farmer and Nate Dodson&nbsp;(</span><strong data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">“Company”</span></strong><span data-dcnode-id="353" instrument_node="">&nbsp;or</span><strong data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">&nbsp;“We”</span></strong><span data-dcnode-id="350" instrument_node="">) respects your privacy and is committed to protecting it through its compliance with this policy. This policy describes the types of information we may collect from you or that you may provide when you visit&nbsp;</span><a data-dcnode-id="348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//microgreensfarmer.com/"><span data-dcnode-id="349" instrument_node="">http://microgreensfarmer.com</span></a><span data-dcnode-id="347" instrument_node="">&nbsp;(including any content, functionality and services offered on or through such website, whether as a guest or a registered user), and our practices for collecting, using, maintaining, protecting and disclosing that information. As used herein, “</span><strong data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Website</span></strong><span data-dcnode-id="344" instrument_node="">” shall refer to the aforementioned website.</span></p><span data-dcnode-id="342" instrument_node="">
</span><p data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">This Privacy Policy applies to information we collect on the Website or in e-mail, text and other electronic messages between you and this Website. It does not apply to information collected by (a) us offline or through any other means, including on any other website operated by Company or any third party; or (b) any third party, including through any application or content (including advertising) that may link to or be accessible from or on the Website.</span></p><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Please read this policy carefully (before using the Website or submitting any personal information) to understand our policies and practices regarding your information and how we will treat it. California residents, please also see the “Note to California Residents” Section below for additional rights that apply to you. If you do not agree with our policies and practices, your choice is to not use our Website. By accessing or using the Website, you agree to this Privacy Policy. This policy may change from time to time. Your continued use of this Website after we make changes is deemed to be acceptance of those changes, so please check the policy periodically for updates.</span></p><span data-dcnode-id="336" instrument_node="">
</span><p data-dcnode-id="333"><strong data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Information We Collect About You and How We Collect It</span></strong></p><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">We collect several types of information from and about users of our Website, including information (a) by which you may be personally identified, such as name, postal address, e-mail address, telephone number, credit card information (if voluntarily submitted by our visitors), social security number, or any other identifier by which you may be contacted online or offline (“personal information”); or (b) about your internet connection, the equipment you use to access our Website and usage details. We collect this information: (a) directly from you when you provide it to us, or (b) automatically as you navigate through the Website (which may include usage details, IP addresses and information collected through cookies, web beacons, and other tracking technologies); and (c) from third parties, for example, our business partners.</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="326"><strong data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Information You Provide to Us</span></strong></p><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">The information we collect on or through our Website may include (a) information that you provide by filling in forms on our Website, including information provided at the time of registering to use our Website, reporting problems with our Website, subscribing to our service, posting material, or requesting further services; (b) records and copies of your correspondence (including e-mail addresses), if you contact us; (c) your responses to surveys that we might ask you to complete for research purposes; (d) details of transactions you carry out through our Website and of the fulfillment of your orders, including financial information you may be required to provide before placing an order through our Website; and (e) your search queries on the Website.</span></p><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="317"><span data-dcnode-id="321" instrument_node="">You also may provide information to be published or displayed (hereinafter, “</span><strong data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">posted</span></strong><span data-dcnode-id="318" instrument_node="">“) on public areas of the Website, or transmitted to other users of the Website or third parties (collectively, “User Contributions”). Your User Contributions are posted on and transmitted to others at your own risk. Additionally, we cannot control the actions of other users of the Website with whom you may choose to share your User Contributions. Therefore, we cannot and do not guarantee that your User Contributions will not be viewed by unauthorized persons.</span></p><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="313"><strong data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Information We Collect Through Automatic Data Collection Technologies</span></strong></p><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">We also may collect various types of non-personally identifiable information to help us make your experience more enjoyable, measure site activity to identify future improvements that should be made, and compile aggregate data to help serve site visitors better.</span></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">As you navigate through and interact with our Website, we may use automatic data collection technologies to collect certain information about your equipment, browsing actions and patterns, including (a) details of your visits to our Website, including traffic data, location data, logs and other communication data and the resources that you access and use on the Website, or (b) information about your computer and internet connection, including your IP address, operating system and browser type. We may use your IP address to help prevent fraud, to help diagnose problems with our server, to gather broad demographic information, and to offer you products and services. Because there is not yet a common understanding of how to interpret web browser-based “Do Not Track” signals other than cookies, we do not currently respond to “Do Not Track” signals that are undefined.</span></p><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">The information we collect automatically is statistical data and does not include personal information, but we may maintain it or associate it with personal information we collect in other ways or receive from third parties. It helps us to improve our Website and to deliver a better and more personalized service, including by enabling us to (a) estimate our audience size and usage patterns; (b) store information about your preferences, allowing us to customize our Website according to your individual interests; (c) speed up your searches; and (d) recognize you when you return to our Website.</span></p><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">The technologies we use for this automatic data collection may include cookies, flash cookies, and/or web beacons, described below:</span></p><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="296"><strong data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Cookies</span></strong><span data-dcnode-id="297" instrument_node="">&nbsp;(or browser cookies). A cookie is a small file placed on the hard drive of your computer. You may refuse to accept browser cookies by activating the appropriate setting on your browser. However, if you select this setting you may be unable to access certain parts of our Website. Unless you have adjusted your browser setting so that it will refuse cookies, our system will issue cookies when you direct your browser to our Website, allowing us to enhance your user experience.</span></p><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="291"><strong data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Flash Cookies</span></strong><span data-dcnode-id="292" instrument_node="">. Certain features of our Website may use local stored objects (or Flash cookies) to collect and store information about your preferences and navigation to, from and on our Website. Flash cookies are not managed by the same browser settings as are used for browser cookies.</span></p><span data-dcnode-id="290" instrument_node="">
</span><p data-dcnode-id="286"><strong data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Web Beacons</span></strong><span data-dcnode-id="287" instrument_node="">. Emails and newsletters sent electronically, as well as Pages of our Website, may contain small electronic files known as web beacons (also referred to as clear gifs. pixel tags and single-pixel gifs) that permit the Company, for example, to count users who have visited those pages or opened an e-mail and for other related Website statistics (for example, recording the popularity of certain website content and verifying system and server integrity).</span></p><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">If you visit this site with an open ID (such as Facebook), you may also be sharing and integrating data with third-party social media sites, and we may track aggregate data about the number of visits to this site with an open ID, the number of items “liked” on this site, or items on this site that you choose to share with a third-party social media site.</span></p><span data-dcnode-id="282" instrument_node="">
</span><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">We do not collect personal Information automatically, but we may tie this information to personal information about you that we collect from other sources or you provide to us.</span></p><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="276"><strong data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Third-party Use of Cookies and Other Tracking Technologies</span></strong></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Some content or applications, including advertisements, on the Website are served by third-parties, including advertisers, ad networks and servers, content providers and application providers. These third parties may use cookies, alone or in conjunction with web beacons or other tracking technologies, to collect information about you when you use our website. The information they collect may be associated with your personal information or they may collect information, including personal information, about your online activities over time and across different websites and other online services. They may use this information to provide you with interest-based (behavioral) advertising or other targeted content.</span></p><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">We do not control and are not liable for the actions of any third parties who we may promote. We pride ourselves in working with quality companies, but have no control over the actions of those third parties. While we are not liable for any of the actions of those third parties, you should feel free to give us feedback from time to time on your experiences with any third parties to whom we work with so that we may enhance our future service to all customers. If you have any questions about an advertisement or other targeted content, you should contact the responsible provider directly.</span></p><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="266"><strong data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">How We Use Your Information</span></strong></p><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">We use information that we collect about you or that you provide to us, including any personal information (a) to present our Website and its contents to you; (b) to validate your compliance with the Terms of Use applicable to the Website; (c) for content improvement and feedback purposes; (d) to provide you with information, products or services that you request from us; (e) to reach you, when necessary, regarding your use of the Website or products; (f) to contact you about our goods and services that may be of interest to you; (g) to fulfill any other purpose for which you provide it; (h) to provide you with notices about your account/subscription, including expiration and renewal notices; (i) to carry out our obligations and enforce our rights arising from any contracts entered into between you and us, including for billing and collection; (j) to notify you about changes to our Website or any products or services we offer or provide though it; (k) to allow you to participate in interactive features on our Website; (l) in any other way we may describe when you provide the information; (m) for any other purpose with your consent.</span></p><span data-dcnode-id="262" instrument_node="">
</span><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">We may use the information we have collected from you to enable us to display advertisements to our advertisers’ target audiences. Even though we do not disclose your personal information for these purposes without your consent, if you click on or otherwise interact with an advertisement, the advertiser may assume that you meet its target criteria.</span></p><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">By submitting your email address on the Website, you agree to receive email from the Company and its Websites. You can cancel your participation in any of these email lists at any time by clicking the opt-out link or other unsubscribe option that is included in the respective email. We only send emails to people who have authorized us to contact them, either directly, or through a third party. We do not send unsolicited commercial emails, because we hate spam as much as you do.</span></p><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">In addition, you agree that by submitting your telephone contact information on the Website and/or registering to receive the product and/or service offered herein, such act constitutes a purchase, an inquiry, and/or an application for the purposes of the Amended Telemarketing Sales Rule (ATSR), 16 CFR ‘310 et seq. and any applicable state and local “do not call” regulations. We retain the right to contact you via telemarketing in accordance with the ATSR and the applicable state regulations.</span></p><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="250"><strong data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Disclosure of Your Information</span></strong></p><span data-dcnode-id="249" instrument_node="">
</span><p data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">We may disclose aggregated information about our users, and information that does not identify any individual, without restriction. We may disclose personal information that we collect or you provide as described in this privacy policy: (a) to our subsidiaries and affiliates; (b) to contractors, service providers and other third parties we use to support our business; (c) to a buyer or other successor in the event of a merger, divestiture, restructuring, reorganization, dissolution or other sale or transfer of some or all of the Company’s assets, whether as a going concern or as part of bankruptcy, liquidation or similar proceeding, in which personal information held by the Company about our Website users is among the assets transferred; (d) to third parties to market their products or services to you if you have not opted out of these disclosures; (e) to fulfill the purpose for which you provide it; (f) for any other purpose disclosed by us when you provide the information; or (g) with your consent. We may also disclose your personal information (a) to comply with any court order, law or legal process, including to respond to any government or regulatory request; (b) to enforce or apply our Terms of Use and other agreements, including for billing and collection purposes; or (c) if we believe disclosure is necessary or appropriate to protect the rights, property, or safety of the Company, our customers or others (this includes exchanging information with other companies and organizations for the purposes of fraud protection and credit risk reduction).</span></p><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Except as otherwise stated herein, we will NEVER share your personally identifiable information with third parties unless you have given us explicit permission to do so, such as in order to fulfill a third party offer that you have accepted from us. However, by permitting us to collect this information, you will be able to receive information on other products and services that may be of interest to you, including related third party offers that we may send directly to you. You also enable us to personalize your experience with us so that we can provide you with the highest quality of service.</span></p><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">By participating in one of our membership programs through the Website, you agree and understand that other members of the program may see the comments, questions, photos, and/or other documents that you post on the membership Website, as well as any responses to you that are posted by the Company or other members. If you do not want your personal details revealed to other members of the program, then please do not post any such information through the membership Website.</span></p><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="237"><strong data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Choices About How We Use and Disclose Your Information</span></strong></p><span data-dcnode-id="236" instrument_node="">
</span><p data-dcnode-id="231"><span data-dcnode-id="235" instrument_node="">You can set your browser to refuse all or some browser cookies, or to alert you when cookies are being sent. To learn how you can manage your Flash cookie settings, visit the Flash player settings page on Adobe’s website. If you disable or refuse cookies, please note that some parts of this site may then be inaccessible or not function properly. We do not control third parties’ collection or use of your information to serve interest-based advertising. However, these third parties may provide you with ways to choose not to have your information collected or used in this way. You can opt out of receiving targeted ads from members of the Network Advertising Initiative (“NAI”) on the NAI’s&nbsp;</span><em data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">website</span></em><span data-dcnode-id="232" instrument_node="">.</span></p><span data-dcnode-id="230" instrument_node="">
</span><p data-dcnode-id="227"><strong data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Accessing and Correcting Your Information</span></strong></p><span data-dcnode-id="226" instrument_node="">
</span><p data-dcnode-id="221"><span data-dcnode-id="225" instrument_node="">You can review and change your personal information by logging into the Website and visiting your account profile page. You may also send us an e-mail at&nbsp;</span><a data-dcnode-id="223" href="mailto:nate@microgreensfarmer.com"><span data-dcnode-id="224" instrument_node="">nate@microgreensfarmer.com</span></a><span data-dcnode-id="222" instrument_node="">&nbsp;to request access to, correct or delete any personal information that you have provided to us. We cannot delete your personal information except by also deleting your user account. We may not accommodate a request to change information if we believe the change would violate any law or legal requirement or cause the information to be incorrect.</span></p><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="215"><span data-dcnode-id="219" instrument_node="">If you delete your User Contributions from the Website, copies of your User Contributions may remain viewable in cached and archived pages, or might have been copied or stored by other Website users. Proper access and use of information provided on the Website, including User Contributions, is governed by our “Terms of Use” located at&nbsp;</span><a data-dcnode-id="217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//microgreensfarmer.com/legal-terms-of-use/"><span data-dcnode-id="218" instrument_node="">http://microgreensfarmer.com/legal-terms-of-use</span></a><span data-dcnode-id="216" instrument_node="">.</span></p><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="211"><strong data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Your California Privacy Rights</span></strong></p><span data-dcnode-id="210" instrument_node="">
</span><p data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">If you live in the State of California, under the California Civil Code, you have the right to request that companies who conduct business in California provide you with a list of all third parties to which the company has disclosed Personal Information during the preceding year for direct marketing purposes.</span></p><span data-dcnode-id="207" instrument_node="">
</span><p data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Alternatively, the law provides that if a company has a Privacy Policy that gives either an opt-out (often referred to as “unsubscribe”) or opt-in choice for use of your Personal Information by third parties (such as advertisers or affiliated companies) for marketing purposes, that the company may instead provide you with information on how to exercise your disclosure choice options.</span></p><span data-dcnode-id="204" instrument_node="">
</span><p data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">This Site qualifies for the alternative option; it has a comprehensive Privacy Policy and provides you with details on how you may either opt-out or opt-in to the use of your Personal Information by third parties for direct marketing purposes. Therefore, we are not required to maintain or disclose a list of the third parties that received your Personal Information for marketing purposes during the preceding year.</span></p><span data-dcnode-id="201" instrument_node="">
</span><p data-dcnode-id="196"><span data-dcnode-id="200" instrument_node="">If you are a California resident and want to request information about how to exercise your third party disclosure choices, you must send a request to the following address with a preference on how our response to your request should be sent (email or postal mail). Please send an email to the Privacy Administrator at&nbsp;</span><a data-dcnode-id="198" href="mailto:nate@microgreensfarmer.com"><span data-dcnode-id="199" instrument_node="">nate@microgreensfarmer.com</span></a><span data-dcnode-id="197" instrument_node="">, or you may contact us via regular mail at:</span></p><span data-dcnode-id="195" instrument_node="">
</span><p data-dcnode-id="189"><span data-dcnode-id="194" instrument_node="">MicrogreensFarmer</span><br data-dcnode-id="193"><span data-dcnode-id="192" instrument_node="">1015 W 14th St</span><br data-dcnode-id="191"><span data-dcnode-id="190" instrument_node="">Bloomington, IN 47404</span></p><span data-dcnode-id="188" instrument_node="">
</span><p data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">All requests sent via regular mail must be labeled “Your California Privacy Rights” on the envelope or post card and clearly stated on the actual request. For all requests, please include your name, street address, city, state, and zip code. Please include your zip code for our own recordkeeping.</span></p><span data-dcnode-id="185" instrument_node="">
</span><p data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">We do not accept requests via the telephone or by facsimile. We are not responsible for notices that are not labeled or sent properly, or do not have complete information.</span></p><span data-dcnode-id="182" instrument_node="">
</span><p data-dcnode-id="179"><strong data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">Children Under the Age of 18</span></strong></p><span data-dcnode-id="178" instrument_node="">
</span><p data-dcnode-id="173"><span data-dcnode-id="177" instrument_node="">Our Website is not intended for children under 18 years of age. No one under age 18 may provide any information to or on the Website. We do not knowingly collect personal information from children under 18. If you are under 18, do not use or provide any information on this Website, make any purchases through the Website, use any of the interactive or public comment features of this Website or provide any information about yourself to us, including your name, address, telephone number, e-mail address or any screen name or user name you may use. If we learn we have collected or received personal information from a child under 18 without verification of parental consent, we will delete that information. If you believe we might have any information from or about a child under 18, please&nbsp;email&nbsp;</span><a data-dcnode-id="175" href="mailto:nate@microgreensfarmer.com"><span data-dcnode-id="176" instrument_node="">nate@microgreensfarmer.com</span></a><span data-dcnode-id="174" instrument_node="">.</span></p><span data-dcnode-id="172" instrument_node="">
</span><p data-dcnode-id="169"><strong data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">Commitment to Data Security</span></strong></p><span data-dcnode-id="168" instrument_node="">
</span><p data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">We have implemented measures designed to secure your personal information from accidental loss and from unauthorized access, use, alteration and disclosure. All information you provide to us is stored in a technically and physically secure environment. Any payment transactions will be encrypted using SSL technology.</span></p><span data-dcnode-id="165" instrument_node="">
</span><p data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">The safety and security of your information also depends on you. Where we have given you (or where you have chosen) a password for access to certain parts of our Website, you are responsible for keeping this password confidential. We ask you not to share your password with anyone.</span></p><span data-dcnode-id="162" instrument_node="">
</span><p data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">Unfortunately, the transmission of information via the internet is not completely secure. Although we take reasonable measures to protect your information, we cannot guarantee the security of your personal information transmitted to our Website. Any transmission of personal information is at your own risk. We are not responsible for circumvention of any privacy settings or security measures contained on the Website.</span></p><span data-dcnode-id="159" instrument_node="">
</span><p data-dcnode-id="156"><strong data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">Changes to Our Privacy Policy</span></strong></p><span data-dcnode-id="155" instrument_node="">
</span><p data-dcnode-id="153"><span data-dcnode-id="154" instrument_node="">It is our policy to post any changes we make to our privacy policy on this page. The date the privacy policy was last revised is identified at the top of the page. You are responsible for periodically visiting our Website and this privacy policy to check for any changes.</span></p><span data-dcnode-id="152" instrument_node="">
</span><p data-dcnode-id="149"><strong data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">Contacting Us</span></strong></p><span data-dcnode-id="148" instrument_node="">
</span><p data-dcnode-id="143"><span data-dcnode-id="147" instrument_node="">If you need to contact us, please&nbsp;email&nbsp;</span><a data-dcnode-id="145" href="mailto:nate@microgreensfarmer.com"><span data-dcnode-id="146" instrument_node="">nate@microgreensfarmer.com</span></a><span data-dcnode-id="144" instrument_node="">, or send us a letter at: 1015 W 14th St., Bloomington, IN 47404</span></p><span data-dcnode-id="142" instrument_node="">
</span><p data-dcnode-id="140"><span data-dcnode-id="141" instrument_node="">We strive to provide excellent products, along with equally excellent customer service. If you have any questions about this Privacy Policy or our practices, please feel free to contact us using one of the methods listed above.</span></p><span data-dcnode-id="139" instrument_node="">
