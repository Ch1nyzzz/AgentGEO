</span><p data-dcnode-id="844"><strong data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Author Brendan John states: </span></strong><br data-dcnode-id="848"><span data-dcnode-id="847" instrument_node="">
</span><em data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">“I wrote Home Care How To specifically to help aspiring entrepreneurs, regardless of previous experience or profession, enter the home care business using the same steps I used over the past decade to build and grow numerous home care agencies into successful, thriving agencies! In addition to the book, I felt a website would add even more value by providing the forms, tools and resources discussed throughout the book along with providing ongoing business support.” </span></em></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">In addition to the full recipe for your home care business success, rest comfortably knowing you also have an experienced, seasoned, professional business support team to help you succeed whenever you need!</span></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="837" style="text-align: center;"><a data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homecarehowto.com/hcht-book/"><img alt="" class="aligncenter wp-image-1682 size-full" data-dcnode-id="839" height="163" loading="lazy" sizes="(max-width: 337px) 100vw, 337px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homecarehowto.com/wp-content/uploads/2013/03/Add_To_Cart_Paperback_or_eBook.jpg&amp;raw" srcset="https://www.homecarehowto.com/wp-content/uploads/2013/03/Add_To_Cart_Paperback_or_eBook.jpg 337w, https://www.homecarehowto.com/wp-content/uploads/2013/03/Add_To_Cart_Paperback_or_eBook-300x145.jpg 300w" title="Add To Cart - Paperback or eBook" width="337"></a></p><span data-dcnode-id="836" instrument_node="">
</span><h2 class="style2 highlight2" data-dcnode-id="831"><span data-dcnode-id="832" style="color: #000000;"><span data-dcnode-id="835" instrument_node="">Starting a Home Care Business Isn’t Rocket Science and </span><strong data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">People From all Backgrounds Are Successful!</span></strong></span></h2><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Are you in the health care field; a Nurse, CNA or LVN/LPN? Maybe you’ve worked in a service industry already or perhaps you’ve had a loved one that needed care already and through that experience, a door opened to considering this field? People from all career backgrounds are succeeding in this industry and business. You’ll quickly discover that a home care agency is not a difficult business to learn.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Having a background in the care or hospitality industry, providing a service or a love of helping others certainly lends itself to being familiar with or contacts in health care though not a prerequisite. Attorneys, insurance brokers, stay at home moms, auto industry executives, engineers, accountants, computer industry and many others are successfully running their agencies today. Will you join the group?</span></p><span data-dcnode-id="824" instrument_node="">

</span><p class="psboxcontent" data-dcnode-id="740"><span data-dcnode-id="743" instrument_node="">According to the US Census Report from 2000, the current year value of companion services is estimated at just over $6 billion. As the Baby Boom population ages, estimates indicate the companion industry to grow past $8 billion. As a result, a true opportunity is facing entrepreneurs considering the home care industry!</span><br data-dcnode-id="742"><span data-dcnode-id="741" instrument_node="">
Here are some of the attractive statistics:</span></p><span data-dcnode-id="739" instrument_node="">
</span><ul data-dcnode-id="716" style="padding-left: 30px;"><span data-dcnode-id="738" instrument_node="">
</span><li data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">2011 began the first year that members of the “Baby Boom” population began reaching the age 65.</span></li><span data-dcnode-id="735" instrument_node="">
</span><li data-dcnode-id="732"><strong data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Over 10,000 individuals are turning 65 each and every day!</span></strong></li><span data-dcnode-id="731" instrument_node="">
</span><li data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">At the end of 2012, the U.S. population of individuals 65 and older was 42.2 million strong</span></li><span data-dcnode-id="728" instrument_node="">
</span><li data-dcnode-id="725"><strong data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">By 2030 the US population of 65 and older will almost double to 70 million.</span></strong></li><span data-dcnode-id="724" instrument_node="">
</span><li data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Increasingly, adult children live more than 50 miles away from their parents and are less capable of providing assistance as a result.</span></li><span data-dcnode-id="721" instrument_node="">
</span><li data-dcnode-id="718"><strong data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Following the latest 2010 census, the US Bureau of Labor reported that the Senior Care Industry is projected to provide three out of the top ten job growth markets through 2020. And THAT’S HAPPENING RIGHT NOW !!!</span></strong></li><span data-dcnode-id="717" instrument_node="">
</span></ul><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="714" instrument_node="">As a result of these facts the Home Care Industry, medical and non-medical inclusive, continues to prosper by catering to these boomers and their elderly parents. The time to start your home care agency is TODAY!&nbsp;&nbsp; </span><strong data-dcnode-id="711"><em data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">HOME CARE HOW TO</span></em></strong><span data-dcnode-id="710" instrument_node=""> can help you do it!</span></p><span data-dcnode-id="708" instrument_node="">
