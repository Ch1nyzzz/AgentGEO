ginner’s Guide to Law, Registration, Shareholders, Capital Requirements &amp; Tax</span></h1></header><div class="entry-content" data-dcnode-id="4218"><p data-dcnode-id="4632"><span data-dcnode-id="4633" instrument_node="">Starting a business in Thailand&nbsp;can be a daunting prospect, but get it right and it can be a lucrative, enjoyable one. There's an abundance of opportunity in the&nbsp;industrial and service sectors and in import and export&nbsp;in general.</span></p><p data-dcnode-id="4630"><span data-dcnode-id="4631" instrument_node="">Thailand is the second-largest economy in Southeast Asia after Indonesia, and&nbsp;recognized by the World Bank as “one of the great development success stories” in social and development indicators.</span></p><p data-dcnode-id="4628"><span data-dcnode-id="4629" instrument_node="">But before you even consider this journey, you need to arm yourself with the basics of Thai business&nbsp;law and regulation.</span></p><p data-dcnode-id="4626"><span data-dcnode-id="4627" instrument_node="">There's a ton of incorrect information out there online, and indeed to be heard next to a mumbling expat at 2am on a barstool in a back alley of Bangkok.</span></p><p data-dcnode-id="4624"><span data-dcnode-id="4625" instrument_node="">So here it is. Everything you need to know in one handy post, broken down in to 12 helpful sections.</span></p><p data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">Get a coffee; you'll need it!</span></p><div class="wp-caption aligncenter" data-dcnode-id="4618" id="attachment_5433" style="width: 460px"><img alt="business in thailand" aria-describedby="caption-attachment-5433" class="wp-image-5433" data-dcnode-id="4621" height="566" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thethailandlife.com/wp-content/uploads/2016/12/business-in-thailand.jpg&amp;raw" srcset="https://www.thethailandlife.com/wp-content/uploads/2016/12/business-in-thailand.jpg 400w, https://www.thethailandlife.com/wp-content/uploads/2016/12/business-in-thailand-239x300.jpg 239w" style="border: 1px solid #cbcbcb;" width="450"><p class="wp-caption-text" data-dcnode-id="4619" id="caption-attachment-5433"><span data-dcnode-id="4620" instrument_node="">Asoke (Bangkok) is hub of business, with hundreds of thousands flooding into the area by BTS or MRT to work every day.</span></p></div><h2 data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">1. What law governs setting up a&nbsp;business in Thailand?</span></h2><p data-dcnode-id="4612"><span data-dcnode-id="4615" instrument_node="">Foreign business in Thailand is governed by the The Foreign Business &nbsp;Act of 1999, set up by the recently deceased His Majesty </span><a data-dcnode-id="4613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thethailandlife.com/videos-king-bhumibol-adulyadej" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4614" instrument_node="">King Bhumibol Adulyadej.</span></a></p><p data-dcnode-id="4610"><span data-dcnode-id="4611" instrument_node="">It is extremely important to know the penalties should you not adhere to the restrictions imposed. Non-compliance could result in a three year prison term and/or a fine of between 100,000b -1,000,000 Baht (£2.277 – £22.778) at today’s exchange rates.</span></p><p data-dcnode-id="4608"><span data-dcnode-id="4609" instrument_node="">The Foreign Business Act prescribes a range of business, commercial and industrial activities that may not be carried out by “foreigners” unless a relevant licence has been obtained or an exemption applies.</span></p><p data-dcnode-id="4606"><span data-dcnode-id="4607" instrument_node="">This includes&nbsp;Thai registered companies where half or more of the capital is held by non Thai individuals, foreign registered companies or Thai registered companies which are themselves majority foreign-owned.</span></p><p data-dcnode-id="4604"><span data-dcnode-id="4605" instrument_node="">There is no general prohibition against foreigners carrying out business in Thailand.&nbsp;However, foreigners cannot engage in the following:</span></p><ol data-dcnode-id="4585"><li data-dcnode-id="4602"><span data-dcnode-id="4603" instrument_node="">Newspaper publishing, radio or television broadcasting</span></li><li data-dcnode-id="4600"><span data-dcnode-id="4601" instrument_node="">Rice farming, arable farming or orchard farming</span></li><li data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">Rearing livestock</span></li><li data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">Forestry and the processing of wood from forests (naturally grown)</span></li><li data-dcnode-id="4594"><span data-dcnode-id="4595" instrument_node="">Fishery, only in relation to marine life in Thai waters and the specific economic zone</span></li><li data-dcnode-id="4592"><span data-dcnode-id="4593" instrument_node="">Extraction of Thai medicinal herbs</span></li><li data-dcnode-id="4590"><span data-dcnode-id="4591" instrument_node="">Trading and auctioning of Thai antiques or antiques which are of historical value to the country</span></li><li data-dcnode-id="4588"><span data-dcnode-id="4589" instrument_node="">Manufacture or casting of Buddha images and alms bowls</span></li><li data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">Trading in land</span></li></ol><p data-dcnode-id="4581"><span data-dcnode-id="4584" instrument_node="">You can read the full act </span><a data-dcnode-id="4582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.boi.go.th/index.php%3Fpage%3Dlegal_issues_for_investors_01_foreign_business_act" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4583" instrument_node="">here.</span></a></p><h2 data-dcnode-id="4579"><span data-dcnode-id="4580" instrument_node="">2. What different types of company can I&nbsp;start in Thailand?</span></h2><p data-dcnode-id="4577"><span data-dcnode-id="4578" instrument_node="">Foreigners can choose from&nbsp;the following&nbsp;types of company:</span></p><ul data-dcnode-id="4567"><li data-dcnode-id="4574"><em data-dcnode-id="4575"><span data-dcnode-id="4576" instrument_node="">Registered Ordinary OR Limited Partnership.</span></em></li><li data-dcnode-id="4571"><em data-dcnode-id="4572"><span data-dcnode-id="4573" instrument_node="">Representative Office, Regional Office or a Branch Office.</span></em></li><li data-dcnode-id="4568"><em data-dcnode-id="4569"><span data-dcnode-id="4570" instrument_node="">Limited Company.</span></em></li></ul><h3 data-dcnode-id="4565"><span data-dcnode-id="4566" instrument_node="">Limited Partnership</span></h3><p data-dcnode-id="4563"><span data-dcnode-id="4564" instrument_node="">Unlike a Thai partnership, in a limited partnership, one partner’s liability is limited while the other partner’s liability is unlimited.</span></p><p data-dcnode-id="4558"><span data-dcnode-id="4562" instrument_node="">Limited partnerships</span><strong data-dcnode-id="4560"><span data-dcnode-id="4561" instrument_node=""> MUST</span></strong><span data-dcnode-id="4559" instrument_node=""> be registered unlike a Thai partnership.</span></p><h3 data-dcnode-id="4556"><span data-dcnode-id="4557" instrument_node="">Representative Office</span></h3><p data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">A Representative Office has limitations on activities,&nbsp;as outlined below:</span></p><ul data-dcnode-id="4538"><li data-dcnode-id="4551"><em data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">Reporting on business movement in Thailand.</span></em></li><li data-dcnode-id="4548"><em data-dcnode-id="4549"><span data-dcnode-id="4550" instrument_node="">Providing advice related to products that are being sold to distributors or customers</span></em></li><li data-dcnode-id="4545"><em data-dcnode-id="4546"><span data-dcnode-id="4547" instrument_node="">Sourcing goods and services in Thailand</span></em></li><li data-dcnode-id="4542"><em data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">Inspecting and controlling the quality and quantity of goods purchased or ordered to be manufactured in Thailand</span></em></li><li data-dcnode-id="4539"><em data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">Introducing information regarding new products or services</span></em></li></ul><h3 data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">Regional Office</span></h3><p data-dcnode-id="4534"><span data-dcnode-id="4535" instrument_node="">Structure is what separates regional offices and their branch counterparts. The regional office will conduct its business in Thailand on behalf of its head office based outside of the Thai kingdom.</span></p><p data-dcnode-id="4532"><span data-dcnode-id="4533" instrument_node="">A regional office is limited to performing seven specific activities, all of which fall under list three of the Foreign Business Act ‘FBA Act 1999’, the afore mentioned activities are listed below.</span></p><ul data-dcnode-id="4507"><li data-dcnode-id="4529"><em data-dcnode-id="4530"><span data-dcnode-id="4531" instrument_node="">Communicating, coordinating and directing, on behalf of the head office</span></em></li><li data-dcnode-id="4526"><em data-dcnode-id="4527"><span data-dcnode-id="4528" instrument_node="">The operation of branches and affiliates which are located in the region</span></em></li><li data-dcnode-id="4523"><em data-dcnode-id="4524"><span data-dcnode-id="4525" instrument_node="">Providing services in consulting and management</span></em></li><li data-dcnode-id="4520"><em data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">Training and personnel development</span></em></li><li data-dcnode-id="4517"><em data-dcnode-id="4518"><span data-dcnode-id="4519" instrument_node="">Financial management</span></em></li><li data-dcnode-id="4514"><em data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">Marketing control and sales promotion planning</span></em></li><li data-dcnode-id="4511"><em data-dcnode-id="4512"><span data-dcnode-id="4513" instrument_node="">Product development</span></em></li><li data-dcnode-id="4508"><em data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">Services in research and development</span></em></li></ul><p data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">Also worth noting, a foreign company must have at least one active branch office or affiliate in Asia. Regional offices are also restricted from earning income, purchasing, selling, and negotiating while based on Thai soil.</span></p><h3 data-dcnode-id="4503"><span data-dcnode-id="4504" instrument_node="">Branch Office</span></h3><p data-dcnode-id="4501"><span data-dcnode-id="4502" instrument_node="">Unlike the Representative Office and Regional Office, Branch Offices under Thai law are not limited to the “non-trading” activities. They are allowed to earn income.</span></p><p data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">The Branch Office's liabilities arising from the action of the business in Thailand will not be limited within Thailand but extends to the head office overseas.</span></p><p data-dcnode-id="4497"><span data-dcnode-id="4498" instrument_node="">Under Thai law, the branch office is also governed by the&nbsp;FBA Act. If one of the branch office’s activities falls under the FBA Act, it will require a Foreign Business License (FBL) to conduct activities in Thailand.</span></p><h3 data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node="">Limited Company</span></h3><p data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">Here, two options are available depending on your circumstances:</span></p><p data-dcnode-id="4491"><span data-dcnode-id="4492" instrument_node="">1. Private OR closely held (company that has only a limited number of shareholders)</span></p><p data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">A private limited company is formed through a process which leads to the registration of a Memorandum of Association (Articles of Incorporation) and Articles of Association (By-laws), as its constitutive documents.</span></p><p data-dcnode-id="4487"><span data-dcnode-id="4488" instrument_node="">2. Public Company</span></p><p data-dcnode-id="4485"><span data-dcnode-id="4486" instrument_node="">A minimum of 15 promoters is required for the formation and registration of the memorandum of association of a public limited company, and the promoters must hold their shares for a minimum of two years before they can be transferred.</span></p><p data-dcnode-id="4483"><span data-dcnode-id="4484" instrument_node="">The Board of Directors of a public limited company must have a minimum of five members; at least half of them Thai nationals. The registration fee for a public limited company.is roughly 2,000 Baht per million baht of capital.</span></p><h2 data-dcnode-id="4481"><span data-dcnode-id="4482" instrument_node="">3. What is a&nbsp;Nominee Shareholder &amp; a Majority Shareholder?</span></h2><p data-dcnode-id="4479"><span data-dcnode-id="4480" instrument_node="">When setting up a company in Thailand is discussed, the term “Nominee Shareholder” often comes into the conversation. In Thailand a nominee shareholder is a shareholder ‘in name only’, thus does not have any substantial financial stake or interest in the proposed company.</span></p><p data-dcnode-id="4474"><span data-dcnode-id="4478" instrument_node="">Under Thailand’s Foreign Business ACT 1999, and also Thailand’s Land Act, </span><strong data-dcnode-id="4476"><span data-dcnode-id="4477" instrument_node="">the practice of having a nominee shareholder is illegal,</span></strong><span data-dcnode-id="4475" instrument_node=""> punished by way of substantial fines or imprisonment.</span></p><p data-dcnode-id="4472"><span data-dcnode-id="4473" instrument_node="">So, in short; avoid setting up a company in the name of your partner or someone you've only met a handful of times in a bid to quickly get started – this may come back to bite you.</span></p><p data-dcnode-id="4470"><span data-dcnode-id="4471" instrument_node="">However, foreigners are allowed to control the company as a minority shareholder and are allowed to be appointed as the managing director of the company</span></p><p data-dcnode-id="4468"><span data-dcnode-id="4469" instrument_node="">In this respect, a foreigner can choose to form a Thai majority company whereby the Thai partner(s) will have a 51% stake in the company, and the foreign associate 49%.</span></p><h2 data-dcnode-id="4466"><span data-dcnode-id="4467" instrument_node="">4. How would I benefit from having less of a stake than my Thai counterpart(s)?</span></h2><p data-dcnode-id="4464"><span data-dcnode-id="4465" instrument_node="">Simply put, a Thai majority company, as opposed to a registered foreign company, requires less capital and paperwork to setup and maintain. Another benefit from having Thai partners is that a Thai majority company is able to purchase land, should the need arise.</span></p><p data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node="">Buying property while in a Thai partnership, as a foreign investor, is a fairly common practice in Thailand. Should you choose this route, maintaining regular compliance of the company would be paramount.</span></p><p data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">Thai law requires balance sheets to be filed yearly and a company address must be maintained. Also bear in mind that if a company is not earning an income, it faces being de-listed by the authorities.</span></p><h2 data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node="">5. Given the fact I would be a minority shareholder, would I face being overruled by my associate(s)?</span></h2><p data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">Under certain circumstances, the use of preferential voting rights and the requirement of a super majority of shares to votes may alter voting rights in favour of minority shareholders.</span></p><p data-dcnode-id="4454"><span data-dcnode-id="4455" instrument_node="">However, it is common practice for lawyers to create companies for foreigners whereby the “assigned” Thai majority shareholders have no interest in the company.</span></p><p data-dcnode-id="4452"><span data-dcnode-id="4453" instrument_node="">Even so, since&nbsp;the income of a limited company is normally disbursed through expenses, such as salaries and rent, there is no equity for them to claim in the rare event that a coup was to take place.</span></p><h2 data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">6. Do I ‘have’ to have capital to&nbsp;register a Thai company?</span></h2><p data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">As it currently stands, the minimum capital requirement for a Thai majority shareholder company (limited) is 2 million Baht, with a government set up fee of roughly 7,000 Baht.</span></p><p data-dcnode-id="4446"><span data-dcnode-id="4447" instrument_node="">If you have a Thai spouse, this requirement is reduced to 1 million Baht.</span></p><p data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">On the other hand, if the business is required to obtain a Foreign Business License under FBA, the minimum capital requirement must be THB 3 million for each business activity.</span></p><h2 data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">7.&nbsp;Can I own/buy assets as part of a company?</span></h2><p data-dcnode-id="4440"><span data-dcnode-id="4441" instrument_node="">Prior to 1997, it was not possible for a foreign national to buy property or assets in Thailand. These laws have now thankfully been relaxed.</span></p><p data-dcnode-id="4438"><span data-dcnode-id="4439" instrument_node="">A popular method is to be in partnership with a Thai national, in a Thai majority limited company. An agreement would then be put in place that would result in the Thai entity handing over complete power of attorney to the foreign partner, which would then provide them with the power to purchase assets.</span></p><p data-dcnode-id="4433"><span data-dcnode-id="4437" instrument_node="">The owners of the joint venture would then be required to complete a tax return and pay administrative fees and tax each year. However, as mentioned earlier in this document, using nominee shareholders and creating joint ventures for the sole purpose of owning property</span><strong data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="4434" instrument_node="">is illegal and highly punishable under Thai law.</span></p><p data-dcnode-id="4431"><span data-dcnode-id="4432" instrument_node="">Acquiring a 30-year lease on a property (which is extendable to 60 years once obtained) is another&nbsp;route you can go down. You don't need a business to do this though. For example, your partner could lease you land for 30 years to build a house on.</span></p><h2 data-dcnode-id="4429"><span data-dcnode-id="4430" instrument_node="">8. Is it possible to&nbsp;own&nbsp;100% of a&nbsp;Thai company?</span></h2><p data-dcnode-id="4427"><span data-dcnode-id="4428" instrument_node="">The long-standing rumour&nbsp;that a foreigner can't own 100% of a Thai company still permeates the pavements of Thailand. But it is false;&nbsp;though some of the methods are time-consuming and the outcomes may be un-predictable.</span></p><p data-dcnode-id="4425"><span data-dcnode-id="4426" instrument_node="">There are three&nbsp;ways to achieve 100% ownership:</span></p><h3 data-dcnode-id="4423"><span data-dcnode-id="4424" instrument_node="">1. Obtain a&nbsp;Foreign Business License</span></h3><p data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">A Foreign Business License&nbsp;can be loosely understood as a Work Permit for companies. Just as foreigners in Thailand can only engage in certain occupations and are required to have a Work Permit to be able to work, foreign companies can also operate merely in the selected categories and need an FBL.</span></p><p data-dcnode-id="4419"><span data-dcnode-id="4420" instrument_node="">This way, the Thai government can control the influx of foreign businesses into the country and thus protect Thai nationals and their interests</span></p><h3 data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node="">2. Board of Investment (BOI) Promotion</span></h3><p data-dcnode-id="4415"><span data-dcnode-id="4416" instrument_node="">The Thailand Board of Investment (BOI)&nbsp;is a division of Thai government that promotes business start-ups and projects in areas that are deemed desirable for the economic outlook of Thailand.</span></p><p data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">One example of a success story set up under the BOI is the App Development &amp; Marketing Company Appsynth. 100% foreign owned, the business went from 1-40 employees in 5 years, and has won multiple regional awards for its services.</span></p><p data-dcnode-id="4409"><span data-dcnode-id="4412" instrument_node="">All you need to know about the BOI can be found </span><a data-dcnode-id="4410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.boi.go.th/index.php%3Fpage%3Dindex" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4411" instrument_node="">here.&nbsp;</span></a></p><h3 data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">3. Registration through the&nbsp;Treaty of Amity&nbsp;(for US citizens only)</span></h3><p data-dcnode-id="4405"><span data-dcnode-id="4406" instrument_node="">Thai-US Treaty of Amity and Economic Relations&nbsp;is a special agreement between the USA and the Thai Kingdom that allows American companies or entrepreneurs to maintain a majority of shareholding or full ownership of a company in Thailand.</span></p><p data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">It's actually pretty cool, and darn unfair for the rest of us.</span></p><p data-dcnode-id="4399"><span data-dcnode-id="4402" instrument_node="">You can read about the full requirements </span><a data-dcnode-id="4400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.siam-legal.com/Business-in-Thailand/US-Thai%2520Amity.php" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4401" instrument_node="">here.&nbsp;</span></a></p><h2 data-dcnode-id="4397"><span data-dcnode-id="4398" instrument_node="">9. What visa would I require to start the process of starting a Thai company?</span></h2><p data-dcnode-id="4395"><span data-dcnode-id="4396" instrument_node="">To enter Thailand with the purpose of doing business, you will require a non-immigrant ‘B’ (business visa). This makes you legally eligible to conduct business activities in Thailand, and that includes prospecting to set up a company.</span></p><p data-dcnode-id="4393"><span data-dcnode-id="4394" instrument_node="">You can apply for this particular visa at a Royal Thai Embassy or consulate in your home country. The visa fee is 2,000 Baht for single-entry with three-month validity and 5,000B for multiple entries with one-year validity.</span></p><h2 data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">10. Can I hire foreigners to work in my company?</span></h2><p data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">Eligibility boils down to registered capital, as mentioned above. Two million Baht will enable you to employ a foreign national,&nbsp;and a further 2 million Baht per person is required up to a maximum of 10 people.</span></p><p data-dcnode-id="4387"><span data-dcnode-id="4388" instrument_node="">Also note that the company may hire 1 foreign worker for every 5 million Baht paid in tax.</span></p><h2 data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">11. Am I able to open a Thai bank account?</span></h2><p data-dcnode-id="4383"><span data-dcnode-id="4384" instrument_node="">If your company is small, then the bank may not give you a checking account when you first open your company account. You may get only a savings account, whereby you can only withdraw cash. Note that you won't get an ATM card with a company account.</span></p><p data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">You must go, or send someone, to the bank with a withdrawal slip, with the authorized signature (e.g., yours) and stamped with your company stamp. The bank will write up individual bank cheques upon request. You will pay your clients in cash, or else transfer/deposit funds into their account at the bank.</span></p><p data-dcnode-id="4379"><span data-dcnode-id="4380" instrument_node="">Bear in mind that loans&nbsp;from local banks are not easily obtained. Getting a loan from your bank overseas may be easier, even though you will be transferring the money to Thailand.</span></p><p data-dcnode-id="4374"><span data-dcnode-id="4378" instrument_node="">If you want a personal account with an ATM card, </span><a data-dcnode-id="4376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thethailandlife.com/thai-bank-account-foreigners" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4377" instrument_node="">check out this post</span></a><span data-dcnode-id="4375" instrument_node=""> for the full lowdown.</span></p><h2 data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node="">12. What about tax? What will I pay?</span></h2><h3 data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">Corporate Income Tax</span></h3><p data-dcnode-id="4368"><span data-dcnode-id="4369" instrument_node="">Corporate Income Tax (CIT) is a direct tax levied on a juristic company or partnership carrying on business in Thailand, or not carrying on business in Thailand but deriving certain types of income from Thailand.</span></p><ul data-dcnode-id="4361"><li data-dcnode-id="4366"><span data-dcnode-id="4367" instrument_node="">Tax will be withheld on interest paid to associations or foundations at the rate of 10%.</span></li><li data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">Royalties paid to associations or foundations are subject to 10% withholding tax.</span></li><li data-dcnode-id="4362"><span data-dcnode-id="4363" instrument_node="">Government agencies are required to withhold tax at the rate of 1% on all types of income paid to companies.</span></li></ul><p data-dcnode-id="4357"><span data-dcnode-id="4360" instrument_node="">Get the full rundown on corporate tax rules </span><a data-dcnode-id="4358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rd.go.th/publish/6044.0.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4359" instrument_node="">here.</span></a></p><p data-dcnode-id="4353"><span data-dcnode-id="4356" instrument_node="">For personal income tax information, </span><a data-dcnode-id="4354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thethailandlife.com/income-tax-thailand" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4355" instrument_node="">go here.</span></a></p><p data-dcnode-id="4351"><span data-dcnode-id="4352" instrument_node="">————————-</span></p><p data-dcnode-id="4349"><span data-dcnode-id="4350" instrument_node="">I hope this post has helped you understand what setting up a Thai company entails. But let me just finish by making something very clear:</span></p><p data-dcnode-id="4347"><span data-dcnode-id="4348" instrument_node="">Succeeding in business in Thailand is no walk in the park. Sure, business costs are lower, but with that comes red tape – in business, banking and legalities. And then there's the cultural boundaries of dealing with suppliers and employees.</span></p><p data-dcnode-id="4345"><span data-dcnode-id="4346" instrument_node="">That said, there are thousands of foreign companies thriving in Thailand. And they all have one thing in common: They do things above board. They take time to learn the language, the culture, and pay that bit extra for the best legal advice.</span></p><p data-dcnode-id="4343"><span data-dcnode-id="4344" instrument_node="">Be sensible. And be lucky.</span></p><div data-dcnode-id="4294" id="tips-box"><div class="tips-box-title" data-dcnode-id="4340"><h3 data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">More Tips for a Better Life in Thailand</span></h3></div><p data-dcnode-id="4339"></p><p data-dcnode-id="4338"></p><div class="tip" data-dcnode-id="4330"><h4 class="title" data-dcnode-id="4336"><span data-dcnode-id="4337" instrument_node="">Send Money to Thailand:</span></h4><p data-dcnode-id="4331"><span data-dcnode-id="4335" instrument_node="">Use </span><a data-dcnode-id="4333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thethailandlife.com/how-to-send-money-to-thailand-no-bank-fees" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4334" instrument_node="">Transferwise.</span></a><span data-dcnode-id="4332" instrument_node=""> It is fast, cheap, and gives you the market exchange rate. Me and the majority of my readers are using it.</span></p></div><p data-dcnode-id="4329"></p><p data-dcnode-id="4328"></p><div class="tip" data-dcnode-id="4317"><h4 class="title" data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">Get Good Health Insurance:</span></h4><p data-dcnode-id="4318"><span data-dcnode-id="4325" instrument_node="">Start with a quick quote from </span><a data-dcnode-id="4323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thethailandlife.com/go/cigna-quote" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4324" instrument_node="">Cigna</span></a><span data-dcnode-id="4322" instrument_node="">. Then compare my other recommendations </span><a data-dcnode-id="4320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thethailandlife.com/international-health-insurance" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4321" instrument_node="">here</span></a><span data-dcnode-id="4319" instrument_node="">.</span></p></div><p data-dcnode-id="4316"></p><p data-dcnode-id="4315"></p><div class="tip" data-dcnode-id="4307"><h4 class="title" data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">Improve Your Thai Skills:</span></h4><p data-dcnode-id="4308"><span data-dcnode-id="4312" instrument_node="">Learning Thai makes life here easier and more fun. I use </span><a data-dcnode-id="4310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thethailandlife.com/thaipod101" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4311" instrument_node="">Thaipod101</span></a><span data-dcnode-id="4309" instrument_node="">. It is free to get started &amp; easy to use.</span></p></div><p data-dcnode-id="4306"></p><p data-dcnode-id="4305"></p><div class="tip" data-dcnode-id="4297"><h4 class="title" data-dcnode-id="4303"><span data-dcnode-id="4304" instrument_node="">Protect Your Online Privacy:</span></h4><p data-dcnode-id="4298"><span data-dcnode-id="4302" instrument_node="">A VPN protects you against hackers and government snooping. I always use one. You should too. Read why </span><a data-dcnode-id="4300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thethailandlife.com/vpn-thailand-law-risk-solution" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4301" instrument_node="">here</span></a><span data-dcnode-id="4299" instrument_node="">.</span></p></div><p data-dcnode-id="4296"></p><p data-dcnode-id="4295"></p></div><div class="essb_links essb_displayed_shortcode essb_share essb_template_metro-retina essb_1628733249 essb_fixedwidth_105_left print-no" data-dcnode-id="4268" data-essb-button-style="button" data-essb-counter-pos="hidden" data-essb-fullurl="https://www.thethailandlife.com/starting-a-business-in-thailand" data-essb-instance="1628733249" data-essb-position="shortcode" data-essb-postid="5428" data-essb-template="metro-retina" data-essb-url="https://www.thethailandlife.com/starting-a-business-in-thailand" id="essb_displayed_shortcode_1628733249"><ul class="essb_links_list" data-dcnode-id="4269"><li class="essb_item essb_link_facebook nolightbox" data-dcnode-id="4288"><span data-dcnode-id="4293" instrument_node=""> </span><a class="nolightbox" data-dcnode-id="4289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fwww.thethailandlife.com%252Fstarting-a-business-in-thailand%26t%3DStarting%2Ba%2BBusiness%2Bin%2BThailand%2B-%2BA%2B12-Step%2BBeginner%255C%2526%2523039%253Bs%2BGuide" onclick="essb.window('https://www.facebook.com/sharer/sharer.php?u=https%3A%2F%2Fwww.thethailandlife.com%2Fstarting-a-business-in-thailand&amp;t=Starting+a+Business+in+Thailand+-+A+12-Step+Beginner%5C%26%23039%3Bs+Guide','facebook','1628733249'); return false;" rel="nofollow" target="_blank" title="Share on Share it"><span class="essb_icon essb_icon_facebook" data-dcnode-id="4292"></span><span class="essb_network_name" data-dcnode-id="4290"><span data-dcnode-id="4291" instrument_node="">Share it</span></span></a></li><li class="essb_item essb_link_twitter nolightbox" data-dcnode-id="4282"><span data-dcnode-id="4287" instrument_node=""> </span><a class="nolightbox" data-dcnode-id="4283" href="#" onclick="essb.window('https://twitter.com/intent/tweet?text=Starting%20a%20Business%20in%20Thail Thailand does have a "new" visa - the Professional Visa - for skilled professionals looking to start businesses in Thailand. It was approved in August of 2017 but it's still not showing up on the US Thai Embassy website. (this is not uncommon for Thailand.) I'm not sure that itexempts you from the other requirements requiring a business to have Thai majority ownership (for most country's nationals), employ Thais, etc. I'm pretty sure it does not waive the capital requirements. The benefit seems to be that you don't need a work permit on top of the visa. Your best bet would be to contact the Thai embassy/consulate in your country and find out the details. You might also want to seek legal advice in Thailand. There was a lot of noise online when this got approved so there may be some first-hand experiences detailed.</span></span><a class="comment-read-more" data-dcnode-id="3129" href="javascript:void(0)"><span data-dcnode-id="3130" instrument_node="">Read More &gt;&gt;</span></a></div><div class="comment-reply" data-dcnode-id="3125"><a aria-label="Reply to James E" class="comment-reply-link" data-belowelement="comment-249262" data-commentid="249262" data-dcnode-id="3126" data-postid="5428" data-replyto="Reply to James E" data-respondelement="respond" href="#comment-249262" rel="nofollow"><span data-dcnode-id="3127" instrument_node="">Reply</span></a></div><div class="custom-meta" data-dcnode-id="3120"><p class="comments-meta" data-dcnode-id="3121"><span data-dcnode-id="3124" instrument_node="">

First thing I'd say is this: if 830k is your life savings and not money you can afford to lose, don't put it into a business. Risk 100k, maybe, but only put in what you can afford to lose. The margins are slim in tea and coffee and the competition is fierce.You could set up a company with your GF as 51% owner, but it's a lot of hassle for a tea shop. You would need the statuary minimum number of Thai Employees (4 I think it is) and the Social Security Payments for each and a Minimum of 2 million THB in money or assets to obtain a work permit. Plus you would still have all the visa reporting requirements to do, and the dreaded tax returns with accountancy fees too.All this and you're still a minority shareholder who can be overruled by your GF on all matters.Frankly, my advice in this would be to let your GF open a tea shop as a sole trader. If you want to put some cash in to help her get started and come to a personal arrangement over profit splits, that's up to you. You won't be able to work there per se, but no one is going to hunt you down for doing some decorating behind closed doors when the premises is shut, or helping her out with the books when at home.Be smart. Be extremely cautious with your money. Make your life easier, not more stressful :)</span></span><a class="comment-read-more" data-dcnode-id="1171" href="javascript:void(0)"><span data-dcnode-id="1172" instrument_node="">Read More &gt;&gt;</span></a></div><div class="comment-reply" data-dcnode-id="1167"><a aria-label="Reply to TheThailandLife" class="comment-reply-link" data-belowelement="comment-226389" data-commentid="226389" data-dcnode-id="1168" data-postid="5428" data-replyto="Reply to TheThailandLife" data-respondelement="respond" href="#comment-226389" rel="nofollow"><span data-dcnode-id="1169" instrument_node="">Reply</span></a></div><div class="custom-meta" data-dcnode-id="1162"><p class="comments-meta" data-dcnode-id="1163"><span data-dcnode-id="1166" instrument_node="">

Hi TTL,This is the first time I come across your website. I have started searching for business information that I need. The information is appreciated and unfortunately you are so spot on with your assessment of how thai dealings at times can be a tricky and can end up not what you hoped for. You just can't take anything on face value here. You have to do your homework and don't trust what someone says is factual or the law. At times it feels like everything is learnt mostly from chinese whispers. Also trying to find two lawyers that will give you the same explanation about laws in thailand is rare with my experience. For an example, for 5 years I have been trying to find out what the law is for selling alcohol at my resort on buddha public holidays or royal family birthdays or events. Over 5 years and many different lawyers I still cannot get a definitive answer. A resort is not a hotel is not a bar. I can't get the same answer from anyone. They just tell you chinese whispers but don't seem to actually do their homework and keep up to date with the ever changing laws here. I am at a loss when with many laws here when it comes to running a business. I urge anyone wanting to do business here is learn the Thai language because if you have a Thai person translate a conversation that you are having with another thai person, you are more likely to be even more confused at the end of it. I only know a little bit of thai but I couldn't hold a conversation for more than 30 seconds. How different my world would be here if I learnt to speak thai. I have to find time to learn because then, and only then, will I be able to really understand how things are done here. It would also gain some respect being a farang that can speak thai.Taking into account everything I have said here, I have a situation that is arising with my business here. I have a 12 year lease on a resort. I have no relationship with a thai person. I have a thai company for the lease of the resort. This where it gets tricky. I sub-lease the resort off a thai person who leases the land off another thai person. Now those two are are in such turmoil because the the guy I lease the resort off of is owed millions of baht from the land owner. The land owner has no money to pay his debt and now the banks are about to repossess the land because the land owner has defaulted on the loan for the land the resort sits on. This leaves me on very very shaky ground with my 12 year lease. I have 10 years left on it but have spent 5,000,000 baht transforming what was a run down unoccupied property. I have transformed it into one of the highest ranking resorts on the bookings sites with a 9.3 review score average from about 300 reviews. It is a little gem. Now I feel I could lose it all unless I come up with a solution with full knowledge of the law. There lies my dilemma. How can I trust what I am being told about the laws that I need to know to know what are good options for me. The land and the resort realistically is valued at about 17,000,000 baht. It is now a 15 room boutique resort. The land owner has been trying to sell it for 25,000,000 and can't get a buyer. Before I took out a lease on the property they would have been lucky to get 12,000,000 for it. I was offered 10,000,000 baht to sell my lease 8 months ago. I paid 850,000 key money for the lease just under 2 years ago. That shows you how much it has been transformed by me and what I invested into it to make it what it is today. Unfortunately I haven't got any return on it because I had to invest so much money into it to create something special. I am kicking myself now that I said no. I know the resort and land owners are desperate to sell but I asked the question six months ago to the land owner, how much would you be willing to sell it to me for, taking into account I have a 12 year lease on the property and I have spent 5,000,000 making it a very good business that was no business 18 months ago when I took it over. The land owner said no discount for you, I would still have to buy it for 25,000,000 lol. Reality can be a rare thing here when it comes to what somethings true value is. Many think they can get a price they dream to sell at but don't take into account what real value the property is worth. You sometimes have to contend with this and it is not easy to use reality as a tool when negotiating the deal. I would like to know how possible it would be for me as a single person with a thai company to get a bank loan in thailand for about 10,000,000 baht. I could come up with the other 7,000,000 or so. I currently pay monthly rent of 100,000 baht for my lease. That money could be redirected to loan repayments for the 10,000,000 baht bank loan. Do you have any knowledge on a foreigner owning a thai company having a company bank loan with no real capital except for the lease on the business they currently have. Sorry for the long winded message. It would solve my problem if this was possible for me.
Kind regards
Terry</span></span><a class="comment-read-more" data-dcnode-id="1137" href="javascript:void(0)"><span data-dcnode-id="1138" instrument_node="">Read More &gt;&gt;</span></a></div><div class="comment-reply" data-dcnode-id="1133"><a aria-label="Reply to Terry" class="comment-reply-link" data-belowelement="comment-226281" data-commentid="226281" data-dcnode-id="1134" data-postid="5428" data-replyto="Reply to Terry" data-respondelement="respond" href="#comment-226281" rel="nofollow"><span data-dcnode-id="1135" instrument_node="">Reply</span></a></div><div class="custom-meta" data-dcnode-id="1128"><p class="comments-meta" data-dcnode-id="1129"><span data-dcnode-id="1132" instrument_node="">

Hi Terry, wow, this is quite something. Without any assets to put up as security, you won't get a loan. But there is hope, if you get a good lawyer. The bank will repossess the land from the owner, and then a court may rule that the bank has to honour your lease; at which point you negotiate with the bank on a monthly payment. So you'll be paying the bank and not the owner. It may be a better situation.But here's the thing that worries me: The guy you lease from is sub-leasing. So who is your contract with? Is the sub-leasing above board? What is the contractual set-up here? If everything is not above board, any contract you have with the sub-leaser may be disregarded, in which case the bank will take the land and sell it without having to honour your lease. All you can hope for in that situation is that the new owner wants to lease the resort to you. But if that happened, no doubt the new owner would be looking for some key money, as it would be a new lease.</span></span><a class="comment-read-more" data-dcnode-id="1106" href="javascript:void(0)"><span data-dcnode-id="1107" instrument_node="">Read More &gt;&gt;</span></a></div><div class="comment-reply" data-dcnode-id="1102"><a aria-label="Reply to TheThailandLife" class="comment-reply-link" data-belowelement="comment-226290" data-commentid="226290" data-dcnode-id="1103" data-postid="5428" data-replyto="Reply to TheThailandLife" data-respondelement="respond" href="#comment-226290" rel="nofollow"><span data-dcnode-id="1104" instrument_node="">Reply</span></a></div><div class="custom-meta" data-dcnode-id="1097"><p class="comments-meta" data-dcnode-id="1098"><span data-dcnode-id="1101" instrument_node="">

Hi Ian,First off let's take a step back: I can't imagine that the business is still in your GF's name. I'm not saying she is lying but I have to throw caution to this. I have never known a Thai person to buy a business or piece of land without registering it in their name as a priority. Thais are extremely cautious of this because of A. being ripped off (the buyer), and B.someone committing fraud in their name (the seller). Your Gf's friend could, for example, have engaged in numerous illegal activities with the business and your GF would be liable. Moreover, your GF would have retained the tax liability if the business was in her name. So has she been paying tax?As a business, regardless of the location, salons are notoriously hard to profit from. There is one near me that has changed hands 5 times in 2 years. Sure, some do very well in high-foot traffic areas but competition is usually very high and it takes hard work to get established. The high competition drives down prices and the fact that you can only make as much money as you can cut or colour hair makes it hard to make a lot of money.If your GF already owns the business and is registered as a business with the relevant paperwork then you would not receive any formal recognition for your payment or right to a salary. To achieve this the company would have to be dissolved and a new company formed. Most likely you would seek a partnership, but as a foreigner you are restricted under the foreign business act and will need to seek legal advice. Protecting your investment will be very hard. You wouldn't receive a monthly salary unless you were working there, and for that you would need the work permit. You would receive a dividend as a shareholder. It would all be quite involved and depending on the return I'm pretty sure not worth it.Income tax rates are here: </span><a data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thethailandlife.com/income-tax-thailand" rel="nofollow"><span data-dcnode-id="809" instrument_node="">https://www.thethailandlife.com/income-tax-thailand</span></a><span data-dcnode-id="807" instrument_node="">I think you would have to consider that in this instance you would be giving the money away and would not see a return. I personally would not get involved in this venture unless I could afford to lose/give away the money.I should add that 350k is a low amount for a business and therefore the profits must be quite low; perhaps as little as 20-30k a month, if that.</span></span><a class="comment-read-more" data-dcnode-id="804" href="javascript:void(0)"><span data-dcnode-id="805" instrument_node="">Read More &gt;&gt;</span></a></div><div class="comment-reply" data-dcnode-id="800"><a aria-label="Reply to TheThailandLife" class="comment-reply-link" data-belowelement="comment-223570" data-commentid="223570" data-dcnode-id="801" data-postid="5428" data-replyto="Reply to TheThailandLife" data-respondelement="respond" href="#comment-223570" rel="nofollow"><span data-dcnode-id="802" instrument_node="">Reply</span></a></div><div class="custom-meta" data-dcnode-id="795"><p class="comments-meta" data-dcnode-id="796"><span data-dcnode-id="799" instrument_node="">
