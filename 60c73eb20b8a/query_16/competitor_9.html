</span><p data-dcnode-id="2463" id="breadcrumbs"><span data-dcnode-id="2464"><span data-dcnode-id="2465"><a data-dcnode-id="2469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abeautifulmess.com/category/abm-habitat-for-humanity/"><span data-dcnode-id="2470" instrument_node="">ABM + Habitat for Humanity</span></a><span data-dcnode-id="2468" instrument_node=""> » </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">Beginner’s Guide to Laying Tile</span></span></span></span></p><span data-dcnode-id="2462" instrument_node=""> </span><span class="entry-date" data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">

</span><h1 class="entry-title" data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">Beginner’s Guide to Laying Tile</span></h1><span data-dcnode-id="2456" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="2431"><span data-dcnode-id="2455" instrument_node="">
</span><span class="cat-links" data-dcnode-id="2440"><a data-dcnode-id="2453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abeautifulmess.com/category/abm-habitat-for-humanity/" rel="nofollow"><span data-dcnode-id="2454" instrument_node="">ABM + Habitat for Humanity</span></a><span data-dcnode-id="2452" instrument_node="">, </span><a data-dcnode-id="2450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abeautifulmess.com/category/diy/" rel="nofollow"><span data-dcnode-id="2451" instrument_node="">D.I.Y. Project</span></a><span data-dcnode-id="2449" instrument_node="">, </span><a data-dcnode-id="2447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abeautifulmess.com/category/epic-projects-advanced/" rel="nofollow"><span data-dcnode-id="2448" instrument_node="">Epic Projects (Advanced)</span></a><span data-dcnode-id="2446" instrument_node="">, </span><a data-dcnode-id="2444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abeautifulmess.com/category/home-decor/" rel="nofollow"><span data-dcnode-id="2445" instrument_node="">Home Decor</span></a><span data-dcnode-id="2443" instrument_node="">, </span><a data-dcnode-id="2441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abeautifulmess.com/category/home-decor-101/" rel="nofollow"><span data-dcnode-id="2442" instrument_node="">Home Decor 101</span></a></span><span data-dcnode-id="2439" instrument_node="">
</span><div class="entry-author" data-dcnode-id="2433"><span data-dcnode-id="2438" instrument_node="">
						By </span><a class="author-name-wrapper" data-dcnode-id="2435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abeautifulmess.com/author/josh-rhodes/"><span class="author-name" data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">Josh Rhodes</span></span></a><span data-dcnode-id="2434" instrument_node=""> </span></div><span data-dcnode-id="2432" instrument_node="">

</span></header><span data-dcnode-id="2426" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2196"><span data-dcnode-id="2425" instrument_node="">
</span><p data-dcnode-id="2410"><span data-dcnode-id="2411" style="background-color: #ffffff;"><a class="asset-img-link" data-dcnode-id="2420" style="display: inline;"><span data-dcnode-id="2421" style="background-color: #ffffff;"><img alt="How to lay tile (via abeautifulmess.com)" border="0" class="asset asset-image at-xid-6a00d8358081ff69e201b7c755f33b970b image-full img-responsive entered lazyloaded" data-dcnode-id="2424" data-lazy-src="https://abeautifulmess.com/wp-content/uploads/typekit/.a/6a00d8358081ff69e201b7c755f33b970b-800wi" data-ll-status="loaded" data-pin-description="Beginner's Guide to Laying Tile" data-pin-title="Beginner’s Guide to Laying Tile" height="603" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abeautifulmess.com/wp-content/uploads/typekit/.a/6a00d8358081ff69e201b7c755f33b970b-800wi&amp;raw" title="How to lay tile (via abeautifulmess.com)" width="800"><noscript data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">&lt;img width="800" height="603" data-pin-title="Beginner&amp;#8217;s Guide to Laying Tile" class="asset asset-image at-xid-6a00d8358081ff69e201b7c755f33b970b image-full img-responsive" title="How to lay tile (via abeautifulmess.com)" src="https://abeautifulmess.com/wp-content/uploads/typekit/.a/6a00d8358081ff69e201b7c755f33b970b-800wi" alt="How to lay tile (via abeautifulmess.com)" border="0" data-pin-description="Beginner&amp;apos;s Guide to Laying Tile" /&gt;</span></noscript></span></a><span data-dcnode-id="2419" instrument_node="">Ready to see what we’ve done in the laundry room at our </span><span data-dcnode-id="2417" style="background-color: #ffffff;"><span data-dcnode-id="2418" instrument_node="">Habitat for Humanity project house</span></span><span data-dcnode-id="2416" instrument_node="">? As you might remember, this room gave us quite the surprise when we discovered that </span><a data-dcnode-id="2413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abeautifulmess.com/budge-big-reno-at-our-hfhs-house/" rel="noopener noreferrer"><span data-dcnode-id="2414" style="background-color: #ffffff;"><span data-dcnode-id="2415" instrument_node="">the floor was rotted out</span></span></a><span data-dcnode-id="2412" instrument_node=""> and had to be replaced. The carpets were being removed when this discovery happened, so our tile plans got set aside while some other repairs took place. But now, we’ve made all our tile dreams come true! I (Emma) sourced the large, marbled-looking tiles locally and Josh installed them. Today he’s going to share how he did it in case any of you have tile dreams of your own. Take it away, Josh:</span></span></p><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2406"><span data-dcnode-id="2407" style="background-color: #ffffff;"><span data-dcnode-id="2408" instrument_node="">Tile has been used for a good while, close to 4000 years. That’s a pretty good run for a building/decorative material. I tried my hand at installing it for the first time about a month ago. Although laying tile takes practice and time to master, I found that the challenge was a lot easier to approach than I first imagined. With the help of a couple videos and tips from a contractor friend, I felt confident in starting the project. Also, the space is only about 75 square feet, so it was a good starting size.&nbsp;</span></span></p><span data-dcnode-id="2405" instrument_node="">
</span><p data-dcnode-id="2397"><span data-dcnode-id="2398" style="background-color: #ffffff;"><a class="asset-img-link" data-dcnode-id="2400" style="display: inline;"><span data-dcnode-id="2401" style="background-color: #ffffff;"><img alt="Marble tile" border="0" class="asset asset-image at-xid-6a00d8358081ff69e201b7c755f35b970b image-full img-responsive entered lazyloaded" data-dcnode-id="2404" data-lazy-src="https://abeautifulmess.com/wp-content/uploads/typekit/.a/6a00d8358081ff69e201b7c755f35b970b-800wi" data-ll-status="loaded" data-pin-description="Beginner's Guide to Laying Tile" data-pin-title="Beginner’s Guide to Laying Tile" height="1265" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abeautifulmess.com/wp-content/uploads/typekit/.a/6a00d8358081ff69e201b7c755f35b970b-800wi&amp;raw" title="Marble tile" width="800"><noscript data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">&lt;img width="800" height="1265" data-pin-title="Beginner&amp;#8217;s Guide to Laying Tile" class="asset asset-image at-xid-6a00d8358081ff69e201b7c755f35b970b image-full img-responsive" title="Marble tile" src="https://abeautifulmess.com/wp-content/uploads/typekit/.a/6a00d8358081ff69e201b7c755f35b970b-800wi" alt="Marble tile" border="0" data-pin-description="Beginner&amp;apos;s Guide to Laying Tile" /&gt;</span></noscript></span></a><span data-dcnode-id="2399" instrument_node="">Here’s what I learned from doing it for the first time. I’m not going to be able to squeeze in 4000 years worth of information or instruction, but it’ll be one more perspective you can work off of. Now that I’ve done it once, I feel pretty good about it. In fact, I love tiling! We spent about $350 to tile the floor including tile, supplies, tools, and tile saw rental. By installing the tile ourselves&nbsp;we saved at least $400!</span></span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2396" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2395" instrument_node="">
</span><p data-dcnode-id="2343"><span data-dcnode-id="2389" style="background-color: #ffffff;"><span data-dcnode-id="2390" style="display: inline; background-color: #ffffff;"><a class="asset-img-link" data-dcnode-id="2391" style="display: inline;"><img alt="Supplies" border="0" class="asset asset-image at-xid-6a00d8358081ff69e201bb07f9bb27970d image-full img-responsive entered lazyloaded" data-dcnode-id="2394" data-lazy-src="https://abeautifulmess.com/wp-content/uploads/typekit/.a/6a00d8358081ff69e201bb07f9bb27970d-800wi" data-ll-status="loaded" data-pin-description="Beginner's Guide to Laying Tile" data-pin-title="Beginner’s Guide to Laying Tile" height="530" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abeautifulmess.com/wp-content/uploads/typekit/.a/6a00d8358081ff69e201bb07f9bb27970d-800wi&amp;raw" title="Supplies" width="800"><noscript data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">&lt;img width="800" height="530" data-pin-title="Beginner&amp;#8217;s Guide to Laying Tile" class="asset asset-image at-xid-6a00d8358081ff69e201bb07f9bb27970d image-full img-responsive" title="Supplies" src="https://abeautifulmess.com/wp-content/uploads/typekit/.a/6a00d8358081ff69e201bb07f9bb27970d-800wi" alt="Supplies" border="0" data-pin-description="Beginner&amp;apos;s Guide to Laying Tile" /&gt;</span></noscript></a></span></span><strong data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">Supplies</span></strong><span data-dcnode-id="2386" instrument_node="">:</span><br data-dcnode-id="2385"><span data-dcnode-id="2384" instrument_node="">
-mixing paddle</span><br data-dcnode-id="2383"><span data-dcnode-id="2382" instrument_node="">
-tile markers</span><br data-dcnode-id="2381"><span data-dcnode-id="2380" instrument_node="">
-screws</span><br data-dcnode-id="2379"><span data-dcnode-id="2378" instrument_node="">
-drill</span><br data-dcnode-id="2377"><span data-dcnode-id="2376" instrument_node="">
-backerboard</span><br data-dcnode-id="2375"><span data-dcnode-id="2374" instrument_node="">
–</span><a data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lowes.com/pd_12949-1295-10750136_4294856533__%3FproductId%3D3743805%26Ns%3Dp_product_qty_sales_dollar%257C1%26pl%3D1%26currentURL%3D%253FNs%253Dp_product_qty_sales_dollar%257C1%26facetInfo%3D" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2373" instrument_node="">mortar</span><br data-dcnode-id="2372"><span data-dcnode-id="2371" instrument_node="">
</span></a><span data-dcnode-id="2369" instrument_node="">–</span><a data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mapei.com/US-EN/Tile-%26-Stone-Installation-Systems/Cement-Grouts/Keracolor-S" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2368" instrument_node="">grout</span><br data-dcnode-id="2367"><span data-dcnode-id="2366" instrument_node="">
</span></a><span data-dcnode-id="2364" instrument_node="">-trowels</span><br data-dcnode-id="2363"><span data-dcnode-id="2362" instrument_node="">
-tile saw (rented)</span><br data-dcnode-id="2361"><span data-dcnode-id="2360" instrument_node="">
-measuring tape</span><br data-dcnode-id="2359"><span data-dcnode-id="2358" instrument_node="">
-knee pads</span><br data-dcnode-id="2357"><span data-dcnode-id="2356" instrument_node="">
-spacers</span><br data-dcnode-id="2355"><span data-dcnode-id="2354" instrument_node="">
-bucket</span><br data-dcnode-id="2353"><span data-dcnode-id="2352" instrument_node="">
-utility knife</span><br data-dcnode-id="2351"><span data-dcnode-id="2350" instrument_node="">
-straight edge</span><br data-dcnode-id="2349"><span data-dcnode-id="2348" instrument_node="">
-sponges</span><br data-dcnode-id="2347"><span data-dcnode-id="2346" instrument_node="">
-level</span><br data-dcnode-id="2345"><span data-dcnode-id="2344" instrument_node="">
-tile (We used a 12″ x 25″ ceramic tile called Calacatta by Happy Floors.)</span></p><div class="adthrive" data-dcnode-id="2341" id="cls-video-container-k0dDy4iL" style="min-height: 441px;"><div data-dcnode-id="2342"></div></div><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2340" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2339" instrument_node="">
</span><p data-dcnode-id="2334"><span data-dcnode-id="2335" style="background-color: #ffffff;"><strong data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">Step one:&nbsp;</span></strong><span data-dcnode-id="2336" instrument_node="">The first thing I did was make sure the surface was free of dirt and dust. I vacuumed the entire area and checked for exposed nail heads and loose plywood. After everything was tidy and ready to go, it was time to install backerboard, which provides an even, protective, and moisture-resistant surface for the tile. I used Wonderboard Lite brand. The directions for using it are right on the board, so that was pretty straightforward. A couple things to remember when installing backerboard:</span></span></p><span data-dcnode-id="2333" instrument_node="">
</span><p data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">-To cut the boards, either using a scoring knife or utility knife, score, then snap the board along an edge.</span></p><span data-dcnode-id="2330" instrument_node="">
</span><p data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">-Stagger the sheets as you put them down. You don’t want the sheets coming together corner to corner. Leave 1/8″ gap between each sheet.</span></p><span data-dcnode-id="2327" instrument_node="">
</span><p data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">-Trowel a thin layer of mortar under the backerboard as you go along.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2324" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2323" instrument_node="">
</span><p data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">-You can nail or screw the backerboard on. I went with backerboard screws. &nbsp;If you want, rent a nailer and save yourself a little bit of time.</span></p><span data-dcnode-id="2320" instrument_node="">
</span><p data-dcnode-id="2315"><span data-dcnode-id="2319" instrument_node="">-Here’s the more in depth </span><a data-dcnode-id="2317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.homedepot.com/hdus/en_US/DTCCOM/HomePage/Brand_Pages/Custom_Building_Products/Docs/WBIG.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2318" instrument_node="">instruction</span></a><span data-dcnode-id="2316" instrument_node=""> for installing Wonderboard Lite.</span></p><span data-dcnode-id="2314" instrument_node="">
</span><p data-dcnode-id="2302"><span data-dcnode-id="2303" style="background-color: #ffffff;"><a class="asset-img-link" data-dcnode-id="2309" style="display: inline;"><span data-dcnode-id="2310" style="background-color: #ffffff;"><img alt="Clean up the floors" border="0" class="asset asset-image at-xid-6a00d8358081ff69e201b8d0df3c71970c image-full img-responsive entered lazyloaded" data-dcnode-id="2313" data-lazy-src="https://abeautifulmess.com/wp-content/uploads/typekit/.a/6a00d8358081ff69e201b8d0df3c71970c-800wi" data-ll-status="loaded" data-pin-description="Beginner's Guide to Laying Tile" data-pin-title="Beginner’s Guide to Laying Tile" height="533" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abeautifulmess.com/wp-content/uploads/typekit/.a/6a00d8358081ff69e201b8d0df3c71970c-800wi&amp;raw" title="Clean up the floors" width="800"><noscript data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">&lt;img width="800" height="533" data-pin-title="Beginner&amp;#8217;s Guide to Laying Tile" class="asset asset-image at-xid-6a00d8358081ff69e201b8d0df3c71970c image-full img-responsive" title="Clean up the floors" src="https://abeautifulmess.com/wp-content/uploads/typekit/.a/6a00d8358081ff69e201b8d0df3c71970c-800wi" alt="Clean up the floors" border="0" data-pin-description="Beginner&amp;apos;s Guide to Laying Tile" /&gt;</span></noscript></span></a><span data-dcnode-id="2308" instrument_node="">Note: A step that you probably (hopefully) won’t run into, was sealing up the floor. The laundry room was an add on, probably not built by a professional. There were gaps in parts of the floor (where it met up with the wall) where I could see down to the ground. I sprayed some </span><a data-dcnode-id="2305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//building.dow.com/en-us/products/great-stuff-gaps-and-cracks-insulating-foam-sealant/%3Fsc_itemid%3D852d5e84-1ba0-4985-a74f-8667c4d7990f" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2306" style="background-color: #ffffff;"><span data-dcnode-id="2307" instrument_node="">foam</span></span></a><span data-dcnode-id="2304" instrument_node=""> into the cracks in hopes of sealing up the room a bit more. After the foam dried, I trimmed off the excess, making it even with the wall and floor.</span></span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2301" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2300" instrument_node="">
</span><p data-dcnode-id="2285"><span data-dcnode-id="2286" style="background-color: #ffffff;"><strong data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Step two:&nbsp;</span></strong><span data-dcnode-id="2297" instrument_node="">After I had the backerboard down, it was time to start tiling! There are many methods when it comes to making sure your space is square, where to start the tile, etc. Since the space I was doing was pretty small and rectangular, I decided to start at the back wall and work my way toward the kitchen (see the&nbsp;</span><a data-dcnode-id="2294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abeautifulmess.com/hfhs-project-update-paint-colors/" rel="noopener noreferrer"><span data-dcnode-id="2295" style="background-color: #ffffff;"><span data-dcnode-id="2296" instrument_node="">layout</span></span></a><span data-dcnode-id="2293" instrument_node=""> in this post for reference.) I knew that we would have a washer and dryer up against the wall where I would finish, so any cut tile would be hidden. There are spec sheets (like this </span><span data-dcnode-id="2291" style="background-color: #ffffff;"><span data-dcnode-id="2292" instrument_node="">one</span></span><span data-dcnode-id="2290" instrument_node="">) and installation requirements for each type of tile you choose (as seen </span><span data-dcnode-id="2288" style="background-color: #ffffff;"><span data-dcnode-id="2289" instrument_node="">here</span></span><span data-dcnode-id="2287" instrument_node="">). You may not use all of the info, but it doesn’t hurt to know about the tile you’re using (like who knew that Calacatta tile had a friction coefficient of ≤ 0,60).</span></span></p><span data-dcnode-id="2284" instrument_node="">
</span><p data-dcnode-id="2276"><span data-dcnode-id="2277" style="background-color: #ffffff;"><a class="asset-img-link" data-dcnode-id="2279" style="display: inline;"><span data-dcnode-id="2280" style="background-color: #ffffff;"><img alt="How to lay tile" border="0" class="asset asset-image at-xid-6a00d8358081ff69e201bb07f9bb4a970d image-full img-responsive entered lazyloaded" data-dcnode-id="2283" data-lazy-src="https://abeautifulmess.com/wp-content/uploads/typekit/.a/6a00d8358081ff69e201bb07f9bb4a970d-800wi" data-ll-status="loaded" data-pin-description="Beginner's Guide to Laying Tile" data-pin-title="Beginner’s Guide to Laying Tile" height="533" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abeautifulmess.com/wp-content/uploads/typekit/.a/6a00d8358081ff69e201bb07f9bb4a970d-800wi&amp;raw" title="How to lay tile" width="800"><noscript data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">&lt;img width="800" height="533" data-pin-title="Beginner&amp;#8217;s Guide to Laying Tile" class="asset asset-image at-xid-6a00d8358081ff69e201bb07f9bb4a970d image-full img-responsive" title="How to lay tile" src="https://abeautifulmess.com/wp-content/uploads/typekit/.a/6a00d8358081ff69e201bb07f9bb4a970d-800wi" alt="How to lay tile" border="0" data-pin-description="Beginner&amp;apos;s Guide to Laying Tile" /&gt;</span></noscript></span></a><span data-dcnode-id="2278" instrument_node="">So I started at the back wall, opposite the back door and worked my way down. I mixed the mortar, per the directions, and started troweling it on the backerboard using a slotted trowel. the size of the slots depend on the thickness of the tile. Since I was laying pretty big pieces, I used a bigger slot trowel. (I found that the correlation isn’t an exact science. Basically, the thickness of the tile should be about the size of the trowel gaps.). I put down enough mortar for a couple tiles, laid one, and tapped it down. (You can use a rubber mallet, I just used my hands.) The goal for each tile, is to make sure they are level and line up with each other. Tile spacers aid in achieving uniform gaps between the tiles. &nbsp;</span></span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2275" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2266"><span data-dcnode-id="2267" style="background-color: #ffffff;"><a class="asset-img-link" data-dcnode-id="2269" style="display: inline;"><span data-dcnode-id="2270" style="background-color: #ffffff;"><img alt="A beginner's guide to laying tile" border="0" class="asset asset-image at-xid-6a00d8358081ff69e201b8d0df3c8e970c image-full img-responsive" data-dcnode-id="2273" data-lazy-src="https://abeautifulmess.com/wp-content/uploads/typekit/.a/6a00d8358081ff69e201b8d0df3c8e970c-800wi" data-pin-description="Beginner's Guide to Laying Tile" data-pin-title="Beginner’s Guide to Laying Tile" height="1200" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%201200'%3E%3C/svg%3E" title="A beginner's guide to laying tile" width="800"><noscript data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">&lt;img width="800" height="1200" data-pin-title="Beginner&amp;#8217;s Guide to Laying Tile" class="asset asset-image at-xid-6a00d8358081ff69e201b8d0df3c8e970c image-full img-responsive" title="A beginner's guide to laying tile" src="https://abeautifulmess.com/wp-content/uploads/typekit/.a/6a00d8358081ff69e201b8d0df3c8e970c-800wi" alt="A beginner's guide to laying tile" border="0" data-pin-description="Beginner&amp;apos;s Guide to Laying Tile" /&gt;</span></noscript></span></a><span data-dcnode-id="2268" instrument_node="">Taking my time, I worked my way down, row by row. The tile saw was easy to use, as I had to cut end pieces. Before I knew it, I was at the last row, which took just a little bit more measuring and cutting. When I laid that last piece of tile, I felt like an old pro looking across my finished floor. Actually it wasn’t done just yet. I waited a weekend, then came back, removed all the spacers and troweled in grout between all gaps. Keeping the tile as clean as possible at this stage is crucial. As soon as the grout dries, cleaning it up will be nearly impossible.&nbsp;</span></span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2265" id="AdThrive_Content_6_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2264" instrument_node="">
</span><p data-dcnode-id="2259"><span data-dcnode-id="2260" style="background-color: #ffffff;"><span data-dcnode-id="2263" instrument_node="">Here are some tips I would pass on to somebody doing tile for the first time (since I’m a seasoned tiler now. OK, not really but I do have some tips I picked up.)</span><br data-dcnode-id="2262"><span data-dcnode-id="2261" instrument_node="">
</span></span></p><span data-dcnode-id="2258" instrument_node="">
</span><p data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">-Spend the extra time making sure the floor is free of any debris, dirt or even dust before starting to tile.</span></p><span data-dcnode-id="2255" instrument_node="">
</span><p data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">-Unless you plan on doing a lot of tiling, like starting a tile business, (unlike painting tools) you don’t have to buy the expensive tools. I got the cheapest trowels, spacers, mixing paddle, etc. and it all worked great. I think the more expensive tools are just sturdier, made to last longer, but if you’re only doing one job, it doesn’t make sense to drop a bunch of cash on tools.</span></p><span data-dcnode-id="2252" instrument_node="">
</span><p data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">-Keep your tools clean, the mortar and grout rinse off easily before it sets, after that—good luck.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2249" id="AdThrive_Content_7_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2248" instrument_node="">
</span><p data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">-Have a good route in mind. You don’t want to tile yourself into a corner. Fortunately I had two exits to work with. I still had to stretch out a bit to lay that last piece though. -Josh</span></p><span data-dcnode-id="2245" instrument_node="">

</span><strong data-dcnode-id="821"><span class="fn" data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Natalie</span></span></strong><span data-dcnode-id="820" instrument_node="">
</span><a class="pull-right" data-dcnode-id="817" href="#comment-27060"><time data-dcnode-id="818" datetime="2:56 pm"><span data-dcnode-id="819" instrument_node="">April 10, 2015 </span></time></a><span data-dcnode-id="816" instrument_node="">
</span><span class="says" data-dcnode-id="815"></span><span data-dcnode-id="814" instrument_node=""> </span></h5><span data-dcnode-id="812" instrument_node="">
</span></footer><span data-dcnode-id="809" instrument_node="">
</span><div class="comment-content" data-dcnode-id="795"><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">I worked as an apprentice to a mason for a couple years. My additional tips would be:</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">a) if the room is any bigger than this one, do not start laying the tiles along the wall, you would want to start from the middle (taking measurements and setting a chalkline) making sure that the cut rows on the outside walls are not going to be too small (an easy way to test this is by laying out tiles on the floor in a “dry run”). If you start on one side of a room and the room is not square, it will be noticeable and the larger the room, the worse it will be.</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">b) use actual masonary/tiling sponges for grouting and when you think you have the tiles perfectly clean, get a new sponge and fresh water and wipe them down twice more. “Kim” towels are perfect for buffing out that last bit of grout residue from the tiles</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">c) everything to do with spreading masonary and grout or wiping it away should be done at about a 45 degree angle especially when you are “sponging” the grout — never do so straight on.</span></p><span data-dcnode-id="796" instrument_node="">
</span></div><span data-dcnode-id="793" instrument_node="">
