 301.1 0 237.6 0s-123.1 24.7-168 69.6S0 174.1 0 237.6s24.7 123.1 69.6 168 104.5 69.6 168 69.6 123.1-24.7 168-69.6 69.6-104.5 69.6-168-24.7-123.1-69.6-168zm-19.1 316.9c-39.8 39.8-92.7 61.7-148.9 61.7s-109.1-21.9-148.9-61.7c-82.1-82.1-82.1-215.7 0-297.8C128.5 48.9 181.4 27 237.6 27s109.1 21.9 148.9 61.7c82.1 82.1 82.1 215.7 0 297.8z" data-dcnode-id="424" data-old_color="#A96D6D" data-original="#000000" fill="#fff"></path><path class="active-path" d="M342.3 132.9c-5.3-5.3-13.8-5.3-19.1 0l-85.6 85.6-85.6-85.6c-5.3-5.3-13.8-5.3-19.1 0-5.3 5.3-5.3 13.8 0 19.1l85.6 85.6-85.6 85.6c-5.3 5.3-5.3 13.8 0 19.1 2.6 2.6 6.1 4 9.5 4s6.9-1.3 9.5-4l85.6-85.6 85.6 85.6c2.6 2.6 6.1 4 9.5 4 3.5 0 6.9-1.3 9.5-4 5.3-5.3 5.3-13.8 0-19.1l-85.4-85.6 85.6-85.6c5.3-5.3 5.3-13.8 0-19.1z" data-dcnode-id="423" data-old_color="#A96D6D" data-original="#000000" fill="#fff"></path></svg></div></div></div></div><iframe data-dcnode-id="417" id="sekindoNativeSkinFrameSekindoSPlayer626cf8a9b421e" scrolling="no" style="border: none; margin: 0px; visibility: visible; position: absolute; z-index: 0 !important; top: 0px; left: 0px; width: 100%; max-width: 100%; min-width: 100%; height: 282px;" title="primisNativeSkinFrame_SekindoSPlayer626cf8a9b421e"></iframe></div></div></div></div></div><h2 data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Arid, Transition, and Oasis Zones</span></h2><p data-dcnode-id="401"><span data-dcnode-id="408" instrument_node="">The practice of </span><a data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.doityourself.com/stry/xeriscape-gardening-in-the-winter" rel="noopener" target="_blank" title="Xeriscape Gardening in the Winter"><span data-dcnode-id="407" instrument_node="">xeriscaping</span></a><span data-dcnode-id="405" instrument_node=""> varies from region to region. However, basic principles are generally followed no matter where you live. The first thing you will need to decide is if you want to adjust your existing landscape to be more conservative with water or design and construct an entirely new landscape. Either way, you should analyze your yard and decide what areas will become arid zones, transition zones, and oasis zones. The three types of zones allow you to group plants together that have the same water requirements. </span><br data-dcnode-id="404"><br data-dcnode-id="403"><span data-dcnode-id="402" instrument_node="">Arid zones should be farthest away from the house and high-traffic areas. An arid zone will either be left in its natural state or planted with native and drought-tolerant plants. Transition zones will combine the drier areas with the more lush zones of your yard. This zone will take advantage of low and moderate water use plantings that need infrequent supplemental watering. Oasis zones should be nearer to the house where they can take advantage of rainfall runoff from the roofline and gutter downspouts.</span></p><h2 data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Xeriscape Grass Options</span></h2><p data-dcnode-id="391"><span data-dcnode-id="398" instrument_node="">Most people think that converting a yard to xeriscape means that </span><a data-dcnode-id="396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.doityourself.com/stry/how-to-avoid-common-mistakes-in-lawn-care" rel="noopener" target="_blank" title="How to Avoid Common Mistakes in Lawn Care"><span data-dcnode-id="397" instrument_node="">you have to get rid of all your grass</span></a><span data-dcnode-id="395" instrument_node="">. This is not true. When you xeriscape, you reduce the amount of grass in your yard to only what you need and use. For areas where you want or need grass, you have two choices. Warm season grasses such as buffalo grass and blue grama are very water-conservative, but not very hardy under foot traffic. These grasses do not need as much water and are perfect in areas that do not get a lot of use, such as a sunny front lawn. Cool season grasses, like Kentucky bluegrass, are much more tolerant to foot traffic, but require more water to stay green. Use cool season grasses in areas where your children or pets frequently play.</span><br data-dcnode-id="394"><br data-dcnode-id="393"><span data-dcnode-id="392" instrument_node="">Reducing the overall amount of grass you have in your yard is also important. If you have heavily shaded areas, consider planting shade-tolerant groundcover such as vinca or sweet woodruff in that area instead of grass. Replacing grassy areas such as steep slopes or the area between the sidewalk and the street with drought-hardy groundcovers or low-water perennials will not only save water, but eliminate troublesome mowing areas.</span></p><div class="ibinject-container" data-dcnode-id="389"><div data-dcnode-id="390" id="div-gpt-ad-1651308713173-0"></div></div><h2 data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Drip Irrigation Installation</span></h2><p data-dcnode-id="384"><span class="image-container" data-dcnode-id="385"><img alt="A xeriscaped area with drip irrigation. " class="lazyload js-mobile-stretch" data-dcnode-id="386" data-src="https://cimg1.ibsrv.net/cimg/www.doityourself.com/660x300_85/757/irrigation1-414757.jpg" data-srcset="https://cimg1.ibsrv.net/cimg/www.doityourself.com/660x300_85-1/757/irrigation1-414757.jpg 660w,https://cimg1.ibsrv.net/cimg/www.doityourself.com/320x146_85-1/757/irrigation1-414757.jpg 320w,https://cimg1.ibsrv.net/cimg/www.doityourself.com/375x171_85-1/757/irrigation1-414757.jpg 375w,https://cimg1.ibsrv.net/cimg/www.doityourself.com/425x194_85-1/757/irrigation1-414757.jpg 425w" data-target="#articlesModal" loading="lazy" sizes="(max-width: 320px) 320px,
                                       (max-width: 375px) 375px,
                                       (max-width: 425px) 425px,
                                660px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cimg1.ibsrv.net/cimg/www.doityourself.com/660x300_85/757/irrigation1-414757.jpg&amp;raw" style="visibility: visible;"></span></p><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">For areas of your yard that will require watering, it's best to install a drip irrigation system. Drip irrigation delivers water slowly at or near the surface of the soil. It can reduce water consumption by as much as 60 percent when compared to sprinkler systems because it minimizes the quantity of water lost to runoff, wind, and evaporation. You can purchase installation kits for drip irrigation systems online or at most nurseries and garden centers.</span></p><h2 data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Soil Care for Xeriscaping</span></h2><p data-dcnode-id="375"><span data-dcnode-id="379" instrument_node="">If your soil is primarily clay or sand, you may need to amend it so it will absorb and retain moisture, which is essential for xeriscaping. Although clay soil retains moisture well, it is slow to absorb it. Clay soil also tends to be heavily compacted, which makes it difficult for plants to survive during a drought. Sandy soil is exactly the opposite. It drains well, but does not retain moisture, which gives the roots little time to absorb the water. Either type of soil can be amended by adding organic materials, such as compost or manure. Soils are amended by blending the material at least six inches deep either by hand or with a rototiller. </span><br data-dcnode-id="378"><br data-dcnode-id="377"><span data-dcnode-id="376" instrument_node="">You might want to consider having your soil tested for organic and nutrient content before adding any organic materials. This will ensure that you know what organic materials to add and help you choose the right plants for your soil. Testing kits can usually be found at your local nursery or home improvement store. If you do not want to hassle with amending your soil, you could consult with a horticulture expert and choose plants that will tolerate the type of soil in your yard.</span></p><div class="ibinject-container" data-dcnode-id="373"><div data-dcnode-id="374" id="div-gpt-ad-1651308713173-1"></div></div><h2 data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Plant Types</span></h2><p data-dcnode-id="368"><span class="image-container" data-dcnode-id="369"><img alt="Xeriscaping with groundcover. " class="lazyload js-mobile-stretch" data-dcnode-id="370" data-src="https://cimg0.ibsrv.net/cimg/www.doityourself.com/660x300_85/756/plants1-414756.jpg" data-srcset="https://cimg0.ibsrv.net/cimg/www.doityourself.com/660x300_85-1/756/plants1-414756.jpg 660w,https://cimg0.ibsrv.net/cimg/www.doityourself.com/320x146_85-1/756/plants1-414756.jpg 320w,https://cimg0.ibsrv.net/cimg/www.doityourself.com/375x171_85-1/756/plants1-414756.jpg 375w,https://cimg0.ibsrv.net/cimg/www.doityourself.com/425x194_85-1/756/plants1-414756.jpg 425w" data-target="#articlesModal" loading="lazy" sizes="(max-width: 320px) 320px,
                                       (max-width: 375px) 375px,
                                       (max-width: 425px) 425px,
                                660px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cimg0.ibsrv.net/cimg/www.doityourself.com/660x300_85/756/plants1-414756.jpg&amp;raw" style="visibility: visible;"></span></p><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">The type of plants that you choose for your xeriscaping project will depend upon where you live. Native plants are usually chosen because they are naturally capable of tolerating the climate, but those are not your only options. Plants from other areas of the world that are also drought-tolerant or live in similar climates can also be used. It is important to note that plants will only be drought-tolerant once they have become established. This means more watering than usual should be done the first year or two after planting to help establish deep roots. You should also take care not to crowd plants, which would require them to compete for water. Annuals should be planted at least twelve inches apart, and perennials should be planted about 18 to 24 inches apart.</span></p><h2 data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Mulching</span></h2><p data-dcnode-id="356"><span data-dcnode-id="363" instrument_node="">Once you have everything planted, it's time to add </span><a data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.doityourself.com/stry/how-to-mulch-a-flower-bed" title="How to Mulch a Flower Bed"><span data-dcnode-id="362" instrument_node="">mulch</span></a><span data-dcnode-id="360" instrument_node="">. Mulch is an essential part of a xeriscape because it minimizes evaporation, reduces weed growth, and helps control erosion. </span><br data-dcnode-id="359"><br data-dcnode-id="358"><span data-dcnode-id="357" instrument_node="">Organic mulch is wood-based. It helps improve the soil texture by decomposing over time, but this means that it will eventually need to be replaced. Organic mulch should be about three to four inches deep and should always be placed directly on top of the soil. Inorganic mulch is stone-based. Because it usually retains heat, it should not be used in sunny areas. Inorganic mulch can be placed on the soil or over a weed barrier fabric about two to four inches deep. Never apply mulch over black plastic because the plastic does not allow for moisture and air to penetrate and will kill useful organisms in the soil.</span></p><h2 data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Xeriscaping Maintenance</span></h2><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">The last step is to maintain your yard. Luckily, maintaining a xeriscape is a lot easier than maintaining a regular yard. First, you spend much less time watering a xeriscape. In addition, xeriscapes usually have fewer problems with pests and disease and usually need less fertilizer. Using fewer pesticides and fertilizers is another benefit to both the environment and your pocketbook. This means that by transforming your yard into a xeriscape you get to save time, money, and the environment. Who could ask for more than that?</span></p></div><span data-dcnode-id="350" instrument_node=""> </span><div class="keywords-container container" data-dcnode-id="322"><button class="btn keywords-accordion collapsed-xs collapsed" data-dcnode-id="344"><span class="keyword-title bottom_line" data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">More From Doityourself</span></span><span data-dcnode-id="347" instrument_node=""> </span><span class="angle_container" data-dcnode-id="345"><i aria-hidden="true" class="fa fa-angle-up" data-dcnode-id="346"></i></span></button><span data-dcnode-id="343" instrument_node=""> </span><div class="keyword-content row" data-dcnode-id="323"><div class="keyword-links col-12 col-md-6" data-dcnode-id="340"><a class="ga-track-click" data-dcnode-id="341" data-ga-click-category="End of Article" data-ga-click-label=
