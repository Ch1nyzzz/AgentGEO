</span><div class="display_labels" data-dcnode-id="611" data-labels="Brochure › Long Description"><span data-dcnode-id="711" instrument_node="">
</span><center data-dcnode-id="705"><h3 data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">The Beautiful Business of Interior Design</span></h3><span data-dcnode-id="708" instrument_node="">
</span><h4 data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Be Your Own DecorBoss</span></h4></center><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">For decades, we have helped talented individuals turn their passion into a profitable business. There’s no need to reinvent the wheel! Our concept is simple: we provide our Design Franchise Partners with all the training, tools, suppliers, systems and support necessary to run a rewarding interior decorating/design business and to outshine the competition.</span></p><span data-dcnode-id="701" instrument_node="">
</span><hr data-dcnode-id="700"><span data-dcnode-id="699" instrument_node="">
</span><h3 data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Training &amp; Support</span></h3><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Here are just a few of the ways we help existing interior decorators &amp; designers,  those shifting careers, or others considering college, design school, or going straight into the workforce as a DecorBoss.</span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="688"><b data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Professional Training</span></b><br data-dcnode-id="690"><span data-dcnode-id="689" instrument_node="">
The training provided to our Designer Franchise Partners is comprehensive and ongoing. Whether someone joins us with just an “eye for design”, or already has a design degree and experience, our programs and trainers are here to support the needs of every new DecorBoss (aka. business owner).</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="682"><b data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Business Management</span></b><br data-dcnode-id="684"><span data-dcnode-id="683" instrument_node="">
Learn how to effectively manage a design business to be profitable and successful without the struggle of starting from scratch or maintaining everything on your own. </span></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="676"><b data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Mentorship + Coaching</span></b><br data-dcnode-id="678"><span data-dcnode-id="677" instrument_node="">
Decorating Den Interiors coaches and mentors are available to ensure your business gets off to the right start and keeps on growing. </span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="670"><b data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Wholesale Buying Network</span></b><br data-dcnode-id="672"><span data-dcnode-id="671" instrument_node="">
With over 135 brand name manufacturers and suppliers, our vendor relationships and enormous buying power allow designers and decorators to obtain true wholesale pricing instead of “to the trade” pricing. </span></p><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="664"><b data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Marketing</span></b><br data-dcnode-id="666"><span data-dcnode-id="665" instrument_node="">
Even the best decorators and designers need the phone to ring to be successful. Our franchise comes with turn-key systems for marketing and generating new clients. </span></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="658"><b data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">National Advertisements</span></b><br data-dcnode-id="660"><span data-dcnode-id="659" instrument_node="">
We feature our DecorBoss family in monthly full-page ads in national magazines such as ELLE DÉCOR, Traditional Home, House Beautiful or Veranda. Next time, it could be your work before millions of eyeballs throughout America.</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="652"><b data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Television + Sirius Radio</span></b><br data-dcnode-id="654"><span data-dcnode-id="653" instrument_node="">
If you're seriously into television advertising, we can help there too. We provide our DecorBoss owners with commercials ready to air. Nationally, we advertise on Sirius FM. </span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="646"><b data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Social Media Marketing</span></b><br data-dcnode-id="648"><span data-dcnode-id="647" instrument_node="">
Don’t have time for tweeters or the #instaworld? Don’t worry! We'll not only create the content but we'll update it weekly for you too! All you have to do is answer the calls or direct messages.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="640"><b data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Public Relations</span></b><br data-dcnode-id="642"><span data-dcnode-id="641" instrument_node="">
We gather the latest images from project installations from our entire DecorBoss family and present it to leading national and local editors in your area. DDI has a professionally connected PR guru working for your good name at all times.</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="634"><b data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Graphic Designer</span></b><br data-dcnode-id="636"><span data-dcnode-id="635" instrument_node="">
Need an ad for a local campaign or custom social media graphic for an event or project? No problem. Our graphic design team is at your service and we’ll help maintain a beautiful brand presence. </span></p><span data-dcnode-id="633" instrument_node="">
</span><hr data-dcnode-id="632"><span data-dcnode-id="631" instrument_node="">
</span><h3 data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Our Ideal Candidate</span></h3><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">We are looking for franchise candidates who have the innate talent (the "eye") for design, as well as strong people skills. This turnkey business does require some discipline and drive to achieve high levels of success. We have excellent training programs included so we routinely have people come to us from other careers and educational levels. Traits we look for include: addicted to HGTV, reads Design Magazines, frequent visitor to HOUZZ and/or Pinterest. Friends and family ask for design advice.</span></p><span data-dcnode-id="625" instrument_node="">
</span><hr data-dcnode-id="624"><span data-dcnode-id="623" instrument_node="">
</span><h3 data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Is This Your Time?</span></h3><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="616"><b data-dcnode-id="617"><i data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">To do what you love? Or to expand your existing design business?</span></i></b></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Fill out the form today to learn if this is a potential match.  Together, we will take our Mutual Discovery process one step at a time.</span></p><span data-dcnode-id="612" instrument_node=""> </span></div><span data-dcnode-id="610" instrument_node="">
