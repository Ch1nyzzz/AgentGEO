</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1041" id="mntl-sc-block_1-0-22"></div><span data-dcnode-id="1040" instrument_node="">

</span><li data-dcnode-id="1035"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Minimal startup investment</span></strong><span data-dcnode-id="1036" instrument_node="">. Most of your clients will have or pay for the decorations, so your only expenses would be purchasing tools needed to decorate and marketing.</span></li><li data-dcnode-id="1031"><strong data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Seasonality allows you time off during other times of the year. </span></strong><span data-dcnode-id="1032" instrument_node="">This is ideal for students, teachers, or retired people who want to make money occasionally.</span></li><li data-dcnode-id="1027"><strong data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">No occupational or specialized training required.</span></strong><span data-dcnode-id="1028" instrument_node=""> Although being creative and experienced in decorating can help, there's no official training or certification required.</span></li><li data-dcnode-id="1023"><strong data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">You can grow a home decorating business at your own pace</span></strong><span data-dcnode-id="1024" instrument_node=""> through referrals from satisfied clients and word-of-mouth advertising.</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1022"></span><span data-dcnode-id="1021" instrument_node="">
</span></ul><span data-dcnode-id="1019" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1018" id="mntl-sc-block_1-0-25"></div><span data-dcnode-id="1017" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1016" id="toc-cons-of-a-holiday-decorating-business"></span><span data-dcnode-id="1015" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1010" id="mntl-sc-block_1-0-26"><span data-dcnode-id="1014" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node=""> Cons of a Holiday Decorating Business </span></span><span data-dcnode-id="1011" instrument_node=""> </span></h2><span data-dcnode-id="1009" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1007" id="mntl-sc-block_1-0-28"><span data-dcnode-id="1008" instrument_node="">
Just like any other business, there are a few drawbacks to a holiday decorating business, including:
</span></p><span data-dcnode-id="1006" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1005" id="mntl-sc-block_1-0-29"></div><span data-dcnode-id="1004" instrument_node="">
</span><ul class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="984" id="mntl-sc-block_1-0-31"><span data-dcnode-id="1003" instrument_node="">
</span><li data-dcnode-id="999"><strong data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Seasonal work. </span></strong><span data-dcnode-id="1000" instrument_node="">This is both a pro and a con. While you might be overwhelmed with clients in October and December, the rest of the year could be lean. This means time off, but it also means you may need to do something else to make money.&nbsp;</span></li><li data-dcnode-id="995"><strong data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">It can take time to build up your client base.</span></strong><span data-dcnode-id="996" instrument_node="">&nbsp;Chances are you won't have a lot of clients right away. Clients usually want to see your work before they hire you, so referrals can be key.</span></li><li data-dcnode-id="991"><strong data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Potential dangers.</span></strong><span data-dcnode-id="992" instrument_node=""> If you offer exterior decorating for the Christmas holiday, you may be climbing roofs or trees in inclement weather.</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="990"></span><li data-dcnode-id="986"><strong data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Work may vary depending on the economy.</span></strong><span data-dcnode-id="987" instrument_node=""> Holiday decorating is one of those expenses that families and businesses will drop when the money is tight.</span></li><span data-dcnode-id="985" instrument_node="">
</span></ul><span data-dcnode-id="983" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="982" id="mntl-sc-block_1-0-32"></div><span data-dcnode-id="981" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="980" id="toc-what-you-need-to-get-started-in-holiday-decorating-business"></span><span data-dcnode-id="979" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="974" id="mntl-sc-block_1-0-33"><span data-dcnode-id="978" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="976"><span data-dcnode-id="977" instrument_node=""> What You Need to Get Started in&nbsp;Holiday Decorating Business </span></span><span data-dcnode-id="975" instrument_node=""> </span></h2><span data-dcnode-id="973" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="968" id="mntl-sc-block_1-0-35"><span data-dcnode-id="972" instrument_node="">
To sell your decorating services, you'll need to set up your business, have a few tools, and develop a </span><a data-component="link" data-dcnode-id="970" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancesmb.com/what-is-a-marketing-plan-1794426"><span data-dcnode-id="971" instrument_node="">marketing plan</span></a><span data-dcnode-id="969" instrument_node="">. Here's a list to get you started:
</span></p><span data-dcnode-id="967" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="966" id="mntl-sc-block_1-0-36"></div><span data-dcnode-id="965" instrument_node="">
</span><ul class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="909" id="mntl-sc-block_1-0-38"><span data-dcnode-id="964" instrument_node="">
</span><li data-dcnode-id="960"><strong data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Creativity:</span></strong><span data-dcnode-id="961" instrument_node=""> You'll need to be able to develop unique, eye-catching, holiday decorations.</span></li><span data-dcnode-id="959" instrument_node="">
</span><li data-dcnode-id="952"><strong data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Business license:</span></strong><span data-dcnode-id="956" instrument_node=""> Contact your local city or county business office for information on how to get a </span><a data-component="link" data-dcnode-id="954" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancesmb.com/do-i-need-a-home-business-license-1794654"><span data-dcnode-id="955" instrument_node="">business license</span></a><span data-dcnode-id="953" instrument_node=""> in your area.</span></li><span data-dcnode-id="951" instrument_node="">
</span><li data-dcnode-id="944"><strong data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Business plan: </span></strong><span data-dcnode-id="948" instrument_node="">The </span><a data-component="link" data-dcnode-id="946" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancesmb.com/business-plans-made-simple-1794150"><span data-dcnode-id="947" instrument_node="">business plan</span></a><span data-dcnode-id="945" instrument_node=""> will include defining what you'll do and who your clients are. For example, will you do just residential decorating, or will you do offices or events, as well?</span></li><span data-dcnode-id="943" instrument_node="">
</span><li data-dcnode-id="939"><strong data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Basic decorating tools: </span></strong><span data-dcnode-id="940" instrument_node="">You'll need items such as a ladder and hand tools, and you'll also need transportation to the locations you'll be decorating.</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="938"></span><span data-dcnode-id="937" instrument_node="">
</span><li data-dcnode-id="930"><strong data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Menu of services and pricing:</span></strong><span data-dcnode-id="934" instrument_node=""> You might want to offer a variety of packages, such as a basic package of putting up lights, versus a more robust package of complete outdoor decorating. Make sure you </span><a data-component="link" data-dcnode-id="932" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancesmb.com/plan-your-marketing-strategy-4161384"><span data-dcnode-id="933" instrument_node="">price your services</span></a><span data-dcnode-id="931" instrument_node=""> appropriately for the market you're in.</span></li><span data-dcnode-id="929" instrument_node="">
</span><li data-dcnode-id="925"><strong data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Portfolio:</span></strong><span data-dcnode-id="926" instrument_node=""> Use a scrapbook to show off photos of the homes you've decorated along with any written testimonials from your customers. Make sure you put them online, as well.</span></li><span data-dcnode-id="924" instrument_node="">
</span><li data-dcnode-id="920"><strong data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Helpers&nbsp;on standby:</span></strong><span data-dcnode-id="921" instrument_node=""> Depending on the number of clients or the difficulty of the decorating needs, you might need to have help. Many people need extra money during the holidays and would be happy to give you assistance if needed.</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="919"></span><span data-dcnode-id="918" instrument_node="">
</span><li data-dcnode-id="911"><strong data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Marketing plan:</span></strong><span data-dcnode-id="915" instrument_node=""> Start by decorating your own home or business, as well as your friends' and family's homes to get experience and referrals. Consider advertising or posting bulletins in your church or other organization, or at local stores. Take pictures and build a portfolio. Use a blog or a site like&nbsp;</span><a data-component="link" data-dcnode-id="913" data-ordinal="4" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancesmb.com/pinterest-in-your-small-business-2951700"><span data-dcnode-id="914" instrument_node="">Pinterest</span></a><span data-dcnode-id="912" instrument_node="">&nbsp;to show off your work.</span></li><span data-dcnode-id="910" instrument_node="">
</span></ul><span data-dcnode-id="908" instrument_node="">
</span></div><span data-dcnode-id="906" instrument_node="">
</span></div><span data-dcnode-id="904" instrument_node="">
