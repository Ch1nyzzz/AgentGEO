		This article was co-authored by </span><a data-dcnode-id="4186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Author/Suzanne-Lasky-ASID"><span data-dcnode-id="4187" instrument_node="">Suzanne Lasky, ASID</span></a><span data-dcnode-id="4185" instrument_node="">. Suzanne Lasky is an Interior Designer and the Founder of S Interior Design, a design consulting company based in Scottsdale, Arizona specializing in new home builds,  home remodels, and all related design options for residential and small business clients. Suzanne has over 19 years of interior design and consulting experience. She is an Allied Member of the ASID (American Society of Interior Designers). She earned a Master of Business Administration (MBA) from Indiana University and an AAS in Interior Design from Scottsdale Community College.

</span><p data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">If you're interested in starting your own interior decorating business, there are a few things that you'll need to take into consideration. You'll want to learn as much as you can about the craft of interior design. There is no formal educational requirement for an interior decorator, but you'll likely want to learn as much as you can about the business before you launch your own firm. Once you feel confident in your skills, you're ready to develop a business plan and consider marketing needs.

</span><li data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">Make sure to review commercial interior design magazines as well as consumer-driven interior design.</span></li><span data-dcnode-id="4002" instrument_node="">

</span><li data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">The single most important element of interior design is lighting.</span></li><span data-dcnode-id="3935" instrument_node="">
</span><li data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">For example, there are three forms of lighting: ambient lighting, which provides overall illumination; task lighting, which provides light for specific activities; accent lighting adds focus to particular elements of the space.</span></li><span data-dcnode-id="3932" instrument_node="">

</span><li data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">Realize that learning more about interior design takes time. You'll learn more skills over time.</span></li><span data-dcnode-id="3790" instrument_node="">
</span><li data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">One way to get training and practice in interior design is to find a job working for someone who has her own business. You'll learn more about what starting your own decorating business will be like.</span></li><span data-dcnode-id="3787" instrument_node="">

</span><b class="whb" data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">Develop a portfolio.</span></b><span data-dcnode-id="3578" instrument_node=""> Whenever you decorate a space, whether in your own home, a friend’s home, or something that you are commissioned to do, take pictures of it for your portfolio.</span><sup aria-label="Link to Reference 8" class="reference" data-dcnode-id="3562" id="_ref-8"><a data-dcnode-id="3576" href="#_note-8"><span data-dcnode-id="3577" instrument_node="">[8]</span></a><span class="ts_popup" data-dcnode-id="3564" hidden="" id="ts_popup_8" style="display: none;"><span data-dcnode-id="3575" instrument_node="">

</span></span><span data-dcnode-id="3563" instrument_node="">
</span></sup><span data-dcnode-id="3561" instrument_node=""> Your portfolio should be an example of all the work that you’ve done. If possible, have a professional photographer take these pictures, or take them with a quality camera. Your portfolio is an important part of starting a decorating business as it will show off you talents and design abilities to potential clients.
</span><ul data-dcnode-id="3544"><span data-dcnode-id="3560" instrument_node="">
</span><li data-dcnode-id="3558"><span data-dcnode-id="3559" instrument_node="">Make sure you include pictures of the rooms you decorate from various angles and take close-up photos of any special details.</span></li><span data-dcnode-id="3557" instrument_node="">
</span><li data-dcnode-id="3555"><span data-dcnode-id="3556" instrument_node="">Include before-and-after photos of your work. This is a powerful way to show your potential.</span></li><span data-dcnode-id="3554" instrument_node="">
</span><li data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">Place your photos in a leather presentation case or have them professionally mounted on art board.</span></li><span data-dcnode-id="3551" instrument_node="">
</span><li data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">Create an online or digitized portfolio. If you end up making a website for your decorating business, you will want to include this presentation on your site.</span></li><span data-dcnode-id="3548" instrument_node="">
</span><li data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">Add letters of recommendation if possible from those whose homes you have decorated.</span></li><span data-dcnode-id="3545" instrument_node="">
</span></ul><span data-dcnode-id="3543" instrument_node="">

</span><b class="whb" data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">Practice your estimating.</span></b><span data-dcnode-id="3505" instrument_node=""> Estimating the price of your decorating project is going to be one of the most important parts of starting your decorating business. You neither want to price your services too low or too high, so it is essential to make sure that you are pricing your work correctly. The median hourly rate for interior decorating work is $18.89 per hour, but rates may vary in your location.</span><sup aria-label="Link to Reference 9" class="reference" data-dcnode-id="3489" id="_ref-9"><a data-dcnode-id="3503" href="#_note-9"><span data-dcnode-id="3504" instrument_node="">[9]</span></a><span class="ts_popup" data-dcnode-id="3491" hidden="" id="ts_popup_9" style="display: none;"><span data-dcnode-id="3502" instrument_node="">

</span></span><span data-dcnode-id="3490" instrument_node="">
</span></sup><span data-dcnode-id="3488" instrument_node="">
</span><ul data-dcnode-id="3467"><li data-dcnode-id="3468"><span data-dcnode-id="3487" instrument_node="">In order to properly estimate the price of a job, consider:
</span><ul data-dcnode-id="3470"><span data-dcnode-id="3486" instrument_node="">
</span><li data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">The size of the job (this includes the number of hours that will be required to complete it)</span></li><span data-dcnode-id="3483" instrument_node="">
</span><li data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">The cost of the products used for the job</span></li><span data-dcnode-id="3480" instrument_node="">
</span><li data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">The number of outside helpers you will need to hire (for example, carpet layers, painters, etc.)</span></li><span data-dcnode-id="3477" instrument_node="">
</span><li data-dcnode-id="3475"><span data-dcnode-id="3476" instrument_node="">The deadline of the job (bill higher for a rush job)</span></li><span data-dcnode-id="3474" instrument_node="">
</span><li data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">Your personal markup, typically 15% of the total fee.</span></li><span data-dcnode-id="3471" instrument_node="">
</span></ul><span data-dcnode-id="3469" instrument_node="">
</span></li></ul><span data-dcnode-id="3466" instrument_node="">

</span><b class="whb" data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">Form relationships with vendors.</span></b><span data-dcnode-id="3390" instrument_node=""> In order to successfully start a decorating business, you will need vendors who can supply the necessary materials and supplies.</span><sup aria-label="Link to Reference 10" class="reference" data-dcnode-id="3374" id="_ref-10"><a data-dcnode-id="3388" href="#_note-10"><span data-dcnode-id="3389" instrument_node="">[10]</span></a><span class="ts_popup" data-dcnode-id="3376" hidden="" id="ts_popup_10" style="display: none;"><span data-dcnode-id="3387" instrument_node="">
</span><span class="ts_close" data-dcnode-id="3385"><span data-dcnode-id="3386" instrument_node="">X</span></span><span data-dcnode-id="3384" instrument_node="">
</span><span class="ts_name" data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">Research source</span></span><span data-dcnode-id="3381" instrument_node="">
</span><span class="ts_description" data-dcnode-id="3380"></span><span data-dcnode-id="3379" instrument_node="">
</span><a class="ts_source" data-dcnode-id="3378" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="3377" instrument_node="">
</span></span><span data-dcnode-id="3375" instrument_node="">
</span></sup><span data-dcnode-id="3373" instrument_node=""> Without an accredited interior designer license, you may not be entitled to designer discounts, but you can negotiate when buying in bulk or offering repeat business. Ask for updates about the latest decors and any decors that are yet to arrive in the market.</span><sup aria-label="Link to Reference 11" class="reference" data-dcnode-id="3357" id="_ref-11"><a data-dcnode-id="3371" href="#_note-11"><span data-dcnode-id="3372" instrument_node="">[11]</span></a><span class="ts_popup" data-dcnode-id="3359" hidden="" id="ts_popup_11" style="display: none;"><span data-dcnode-id="3370" instrument_node="">
</span><span class="ts_close" data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">X</span></span><span data-dcnode-id="3367" instrument_node="">
</span><span class="ts_name" data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">Research source</span></span><span data-dcnode-id="3364" instrument_node="">
</span><span class="ts_description" data-dcnode-id="3363"></span><span data-dcnode-id="3362" instrument_node="">
</span><a class="ts_source" data-dcnode-id="3361" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="3360" instrument_node="">
</span></span><span data-dcnode-id="3358" instrument_node="">
</span></sup><span data-dcnode-id="3356" instrument_node=""> This can help keep you ahead of your competition.
</span><ul data-dcnode-id="3348"><span data-dcnode-id="3355" instrument_node="">
</span><li data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">Additionally, you can be creative in your shopping. Find inexpensive sources for materials, such as overstock stores and consignment shops. A consignment or thrift store, for example, can also give you more unique or vintage items than you may get at larger vendors.</span></li><span data-dcnode-id="3352" instrument_node="">
</span><li data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">A common way to begin a career as a decorator is to function as a product-driven designer by marketing products and designing interiors around these particular products. You may want to consult with manufacturers or vendors to see if there are any opportunities available.</span></li><span data-dcnode-id="3349" instrument_node="">
</span></ul><span data-dcnode-id="3347" instrument_node="">

</span><b class="whb" data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">Set your rate.</span></b><span data-dcnode-id="3309" instrument_node=""> You can set your rate based on an hourly fee (the easiest way to charge), charge by square footage (usually the choice for commercial work), or charge a flat fee (though this will only work if your client supplies all the necessary products and furniture).</span><sup aria-label="Link to Reference 12" class="reference" data-dcnode-id="3293" id="_ref-12"><a data-dcnode-id="3307" href="#_note-12"><span data-dcnode-id="3308" instrument_node="">[12]</span></a><span class="ts_popup" data-dcnode-id="3295" hidden="" id="ts_popup_12" style="display: none;"><span data-dcnode-id="3306" instrument_node="">
</span><span class="ts_close" data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">X</span></span><span data-dcnode-id="3303" instrument_node="">
</span><span class="ts_name" data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">Research source</span></span><span data-dcnode-id="3300" instrument_node="">
</span><span class="ts_description" data-dcnode-id="3299"></span><span data-dcnode-id="3298" instrument_node="">
</span><a class="ts_source" data-dcnode-id="3297" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="3296" instrument_node="">
</span></span><span data-dcnode-id="3294" instrument_node="">
</span></sup><span data-dcnode-id="3292" instrument_node="">
</span><ul data-dcnode-id="3284"><span data-dcnode-id="3291" instrument_node="">
</span><li data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">Remember your markup. A markup for an interior decorator is typically a minimum of 15%, but you may choose to vary this based on your experience and potential for work in the market.</span></li><span data-dcnode-id="3288" instrument_node="">
</span><li data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">Know what your competitors are charging, and also how they are charging (for example, by hour or by square foot). This will make your business more competitive in the market.</span></li><span data-dcnode-id="3285" instrument_node="">
</span></ul><span data-dcnode-id="3283" instrument_node="">

</span><b class="whb" data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">Determine your target market and/or specialty.</span></b><span data-dcnode-id="3245" instrument_node=""> For example, you may choose to decorate offices, communal spaces, or private homes. Alternatively, you may want to specialize in decorating historical buildings. You can combine organizing with decorating, work in home staging for people selling their homes, or some other specialty.</span><sup aria-label="Link to Reference 13" class="reference" data-dcnode-id="3229" id="_ref-13"><a data-dcnode-id="3243" href="#_note-13"><span data-dcnode-id="3244" instrument_node="">[13]</span></a><span class="ts_popup" data-dcnode-id="3231" hidden="" id="ts_popup_13" style="display: none;"><span data-dcnode-id="3242" instrument_node="">

</span><li data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">Consider what opportunities may be available or necessary in your hometown. Depending on where you live, there may be a great demand for refurbishing older buildings, or decorating a new apartment complex that rents furnished apartments.</span></li><span data-dcnode-id="3224" instrument_node="">
</span><li data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">You may want to consider working for a franchise like Decorating Den or opening your own shop. This can be a great way to get your name known and showcase your work to the public. You will reach a larger audience than you might by word of mouth alone.</span></li><span data-dcnode-id="3221" instrument_node="">

</span></sup><span data-dcnode-id="3127" instrument_node=""> Similar to starting any business, starting a home decorating business involves creating a solid business plan.</span><sup aria-label="Link to Reference 15" class="reference" data-dcnode-id="3111" id="_ref-15"><a data-dcnode-id="3125" href="#_note-15"><span data-dcnode-id="3126" instrument_node="">[15]</span></a><span class="ts_popup" data-dcnode-id="3113" hidden="" id="ts_popup_15" style="display: none;"><span data-dcnode-id="3124" instrument_node="">

</span></span><span data-dcnode-id="3112" instrument_node="">
</span></sup><span data-dcnode-id="3110" instrument_node=""> Your business plan should include information such as the budget for your business, the type of clients you wish to have, and the medium you will use to reach your clients.</span><sup aria-label="Link to Reference 16" class="reference" data-dcnode-id="3094" id="_ref-16"><a data-dcnode-id="3108" href="#_note-16"><span data-dcnode-id="3109" instrument_node="">[16]</span></a><span class="ts_popup" data-dcnode-id="3096" hidden="" id="ts_popup_16" style="display: none;"><span data-dcnode-id="3107" instrument_node="">

</span></sup><span data-dcnode-id="3093" instrument_node="">
</span><ul data-dcnode-id="3051"><span data-dcnode-id="3092" instrument_node="">
</span><li data-dcnode-id="3073"><span data-dcnode-id="3091" instrument_node="">Decide whether you will be a product-driven decorator or will be a consultant who does not sell products.</span><sup aria-label="Link to Reference 17" class="reference" data-dcnode-id="3075" id="_ref-17"><a data-dcnode-id="3089" href="#_note-17"><span data-dcnode-id="3090" instrument_node="">[17]</span></a><span class="ts_popup" data-dcnode-id="3077" hidden="" id="ts_popup_17" style="display: none;"><span data-dcnode-id="3088" instrument_node="">

</span></sup><span data-dcnode-id="3074" instrument_node=""> There is room for both types of decorators in the industry.</span></li><span data-dcnode-id="3072" instrument_node="">
</span><li data-dcnode-id="3053"><span data-dcnode-id="3071" instrument_node="">Remember to consider how and from where you will purchase your inventory, and don’t forget to include costs such as insurance and vehicle maintenance.</span><sup aria-label="Link to Reference 18" class="reference" data-dcnode-id="3055" id="_ref-18"><a data-dcnode-id="3069" href="#_note-18"><span data-dcnode-id="3070" instrument_node="">[18]</span></a><span class="ts_popup" data-dcnode-id="3057" hidden="" id="ts_popup_18" style="display: none;"><span data-dcnode-id="3068" instrument_node="">

</span><ul data-dcnode-id="2981"><span data-dcnode-id="2994" instrument_node="">
</span><li data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">The Department of State can provide you with the business licensing and permit requirements for you to start a business in different states. Keep in mind that these requirements may vary widely based on state.</span></li><span data-dcnode-id="2991" instrument_node="">
</span><li data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">Consult an insurance agent to help you find the proper coverage to protect your personal assets from business liabilities.</span></li><span data-dcnode-id="2988" instrument_node="">
</span><li data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">Talk to a tax professional to learn how to ensure that your company is paying the correct amount of taxes.</span></li><span data-dcnode-id="2985" instrument_node="">
</span><li data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">See an attorney or consult the Department of State (for your state) for guidance in incorporating your company.</span></li><span data-dcnode-id="2982" instrument_node="">

</span><b class="whb" data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">Consider startup costs.</span></b><span data-dcnode-id="2942" instrument_node=""> Startup costs for decorating businesses are often relatively low and you likely won’t need a big budget to begin.Two must-haves are a good computer and reliable transportation that is also in good condition. Your basic startup costs will include the purchase of sample books, business cards, software, and promotional tools (such as brochures or any advertising you might like to do).</span><sup aria-label="Link to Reference 20" class="reference" data-dcnode-id="2926" id="_ref-20"><a data-dcnode-id="2940" href="#_note-20"><span data-dcnode-id="2941" instrument_node="">[20]</span></a><span class="ts_popup" data-dcnode-id="2928" hidden="" id="ts_popup_20" style="display: none;"><span data-dcnode-id="2939" instrument_node="">

</span><li data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">You'll likely need to prepare a certain amount of working capital to start your decorating business.</span></li><span data-dcnode-id="2921" instrument_node="">
</span><li data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">Unless you plan to work from a home office, you'll need to pay rent for an office space, electricity and internet access. You may need to pay for parking space for yourself and your future clients.</span></li><span data-dcnode-id="2918" instrument_node="">

</span><b class="whb" data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">Select your business name.</span></b><span data-dcnode-id="2878" instrument_node=""> A good business name will be something that is evocative, professional, and memorable. Thinking about choosing a name that is imaginative to show your clients your creative side. However, it's probably best to avoid a name that's too "cute" or trendy. Your business name should provide insight into the kind of professional work your interior decorating company will provide.</span><sup aria-label="Link to Reference 21" class="reference" data-dcnode-id="2862" id="_ref-21"><a data-dcnode-id="2876" href="#_note-21"><span data-dcnode-id="2877" instrument_node="">[21]</span></a><span class="ts_popup" data-dcnode-id="2864" hidden="" id="ts_popup_21" style="display: none;"><span data-dcnode-id="2875" instrument_node="">

</span></sup><span data-dcnode-id="2861" instrument_node="">
</span><ul data-dcnode-id="2853"><span data-dcnode-id="2860" instrument_node="">
</span><li data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">Give your company name a lot of thought. Selecting a business name is one of the most important steps in planning your business.</span></li><span data-dcnode-id="2857" instrument_node="">
</span><li data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">Don’t underestimate the power of your name. Some of the best names for businesses are simply a combination of your name and what you do; for example, "Jake Collins Decorating".</span></li><span data-dcnode-id="2854" instrument_node="">
</span></ul><span data-dcnode-id="2852" instrument_node="">

</span><b class="whb" data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">Market your decorating business.</span></b><span data-dcnode-id="2814" instrument_node=""> Advertising can follow many different paths. You may want to start spreading word of your business by word of mouth; to do this, you should speak with as many members of your community as possible. Let them know about your business and encourage them to contact you with any potential inquiries.</span><sup aria-label="Link to Reference 22" class="reference" data-dcnode-id="2798" id="_ref-22"><a data-dcnode-id="2812" href="#_note-22"><span data-dcnode-id="2813" instrument_node="">[22]</span></a><span class="ts_popup" data-dcnode-id="2800" hidden="" id="ts_popup_22" style="display: none;"><span data-dcnode-id="2811" instrument_node="">

</span><a class="ts_source" data-dcnode-id="2802" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2801" instrument_node="">
</span></span><span data-dcnode-id="2799" instrument_node="">
</span></sup><span data-dcnode-id="2797" instrument_node="">
</span><ul data-dcnode-id="2786"><span data-dcnode-id="2796" instrument_node="">
</span><li data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">Make sure you attend any markets or trade shows where people might be going to look for goods for their homes, and discuss your availability as an interior decorator.</span></li><span data-dcnode-id="2793" instrument_node="">
</span><li data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">Once your business is official, you can start advertising in newspapers, on radio, or on television. This is a great way to spread information about your business without depending on word of mouth alone. You will reach a much larger audience this way.</span></li><span data-dcnode-id="2790" instrument_node="">
</span><li data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">A great way to advertise your decorating business is by starting a website. You should fill this website with as many pictures as possible of your home designs and decorations.</span></li><span data-dcnode-id="2787" instrument_node="">
</span></ul><span data-dcnode-id="2785" instrument_node="">
