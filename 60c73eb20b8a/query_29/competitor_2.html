</span><div data-dcnode-id="5299" data-truncate-height="700"><div class="truncate-text more" data-dcnode-id="5308" style="height:700px"><h2 class="program-overview__benefit-statement field-benefit-statement" data-dcnode-id="5374"><span data-dcnode-id="5375" instrument_node="">Develop your creativity while you build your career.</span></h2><h3 class="mt-4" data-dcnode-id="5372"><span data-dcnode-id="5373" instrument_node="">Program Overview</span></h3><h4 class="field-title" data-dcnode-id="5370"><span data-dcnode-id="5371" instrument_node="">Benefits of our program</span></h4><p class="field-body" data-dcnode-id="5369"></p><ul data-dcnode-id="5352"><span data-dcnode-id="5368" instrument_node="">
</span><li data-dcnode-id="5366"><span data-dcnode-id="5367" instrument_node="">Work in a professional studio environment.</span></li><span data-dcnode-id="5365" instrument_node="">
</span><li data-dcnode-id="5363"><span data-dcnode-id="5364" instrument_node="">Get trained on industry-standard software.</span></li><span data-dcnode-id="5362" instrument_node="">
</span><li data-dcnode-id="5360"><span data-dcnode-id="5361" instrument_node="">Have full access to finishes, paints and samples in our decorating and design resource room.</span></li><span data-dcnode-id="5359" instrument_node="">
</span><li data-dcnode-id="5357"><span data-dcnode-id="5358" instrument_node="">Take periodic excursions to local design and product showrooms.</span></li><span data-dcnode-id="5356" instrument_node="">
</span><li data-dcnode-id="5354"><span data-dcnode-id="5355" instrument_node="">Participate in a three-week work placement.</span></li><span data-dcnode-id="5353" instrument_node="">
</span></ul><p data-dcnode-id="5351"></p><h4 class="field-title" data-dcnode-id="5349"><span data-dcnode-id="5350" instrument_node="">A full professional skill set</span></h4><p class="field-body" data-dcnode-id="5348"></p><ul data-dcnode-id="5334"><span data-dcnode-id="5347" instrument_node="">
</span><li data-dcnode-id="5345"><span data-dcnode-id="5346" instrument_node="">Plan and decorate residential and small commercial environments, from programming to final presentation drawings.</span></li><span data-dcnode-id="5344" instrument_node="">
</span><li data-dcnode-id="5342"><span data-dcnode-id="5343" instrument_node="">Draft using professional standards to visually communicate details and design concepts.</span></li><span data-dcnode-id="5341" instrument_node="">
</span><li data-dcnode-id="5339"><span data-dcnode-id="5340" instrument_node="">Freehand draw, sketch and apply mixed media to presentations.</span></li><span data-dcnode-id="5338" instrument_node="">
</span><li data-dcnode-id="5336"><span data-dcnode-id="5337" instrument_node="">Design and implement marketing and sales strategies.</span></li><span data-dcnode-id="5335" instrument_node="">
</span></ul><p data-dcnode-id="5333"></p><h4 class="field-title" data-dcnode-id="5331"><span data-dcnode-id="5332" instrument_node="">Flexible and collaborative learning</span></h4><p class="field-body" data-dcnode-id="5330"></p><p data-dcnode-id="5328"><span data-dcnode-id="5329" instrument_node="">Using your own laptop, you'll work collaboratively with faculty and classmates while enjoying 24/7 access to coursework, lecture notes, assignments, presentations and other resources. Because it mimics the structure of the workplace, this learning model gives Sheridan graduates a significant advantage in the job market.</span></p><p data-dcnode-id="5327"></p><h4 class="field-title" data-dcnode-id="5325"><span data-dcnode-id="5326" instrument_node="">Additional information</span></h4><p class="field-body" data-dcnode-id="5324"></p><p data-dcnode-id="5319"><span data-dcnode-id="5323" instrument_node="">In Sheridan's two-year Interior Decorating diploma program, your creativity will be nurtured. Our students have consistently taken honours in the </span><a data-dcnode-id="5321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ddacanada.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5322" instrument_node="">Decorators &amp; Designers Association of Canada</span></a><span data-dcnode-id="5320" instrument_node=""> (DDA, previously CDECA) Design Competition.</span></p><span data-dcnode-id="5318" instrument_node="">
</span><p data-dcnode-id="5316"><span data-dcnode-id="5317" instrument_node="">You'll enter the work force with a developed interior decorating sensibility, plus the business acumen to compete for clients and run an efficient, profitable business.</span></p><span data-dcnode-id="5315" instrument_node="">
</span><h3 class="h3" data-dcnode-id="5313"><span data-dcnode-id="5314" instrument_node="">DDA-recognized institution</span></h3><span data-dcnode-id="5312" instrument_node="">
</span><p data-dcnode-id="5310"><span data-dcnode-id="5311" instrument_node="">Sheridan's Interior Decorating diploma program is recognized by the Decorators &amp; Designers Association of Canada (DDA™).</span></p><p data-dcnode-id="5309"></p></div><p data-dcnode-id="5304"><a aria-expanded="true" aria-hidden="true" class="moreless more" data-dcnode-id="5305" h="1520" href="#" role="button" tabindex="-1"><span data-dcnode-id="5306"><span data-dcnode-id="5307" instrument_node="">Show more</span></span></a></p><p data-dcnode-id="5300"><a aria-expanded="false" aria-hidden="true" class="moreless less d-none" data-dcnode-id="5301" h="700" href="#" role="button" tabindex="-1"><span data-dcnode-id="5302"><span data-dcnode-id="5303" instrument_node="">Show less</span></span></a></p></div><span class="field-program-code sr-only field-program-code" data-dcnode-id="5297"><span data-dcnode-id="5298" instrument_node="">PINDE</span></span><span data-dcnode-id="5296" instrument_node=""> </span></div><span data-dcnode-id="5294" instrument_node="">

</span><h3 class="field-title" data-dcnode-id="4575"><span data-dcnode-id="4576" instrument_node="">Program Eligibility</span></h3><p data-dcnode-id="4572"><strong data-dcnode-id="4573"><span data-dcnode-id="4574" instrument_node="">Ontario Secondary School Diploma or equivalent, including these required courses:</span></strong></p><span data-dcnode-id="4571" instrument_node="">
</span><ul data-dcnode-id="4566"><span data-dcnode-id="4570" instrument_node="">
</span><li data-dcnode-id="4568"><span data-dcnode-id="4569" instrument_node="">One English, Grade 12 (ENG4C or ENG4U)</span></li><span data-dcnode-id="4567" instrument_node="">
</span></ul><span data-dcnode-id="4565" instrument_node="">
</span><p data-dcnode-id="4563"><span data-dcnode-id="4564" instrument_node="">plus</span></p><span data-dcnode-id="4562" instrument_node="">
</span><ul data-dcnode-id="4557"><span data-dcnode-id="4561" instrument_node="">
</span><li data-dcnode-id="4559"><span data-dcnode-id="4560" instrument_node="">One Grade 11 or 12 visual arts credit at the (M) or (Open) level with a minimum 65%*</span></li><span data-dcnode-id="4558" instrument_node="">
</span></ul><span data-dcnode-id="4556" instrument_node="">
</span><p data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">or</span></p><span data-dcnode-id="4553" instrument_node="">
</span><ul data-dcnode-id="4548"><span data-dcnode-id="4552" instrument_node="">
</span><li data-dcnode-id="4550"><span data-dcnode-id="4551" instrument_node="">A portfolio*</span></li><span data-dcnode-id="4549" instrument_node="">
</span></ul><span data-dcnode-id="4547" instrument_node="">
</span><p data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">or</span></p><span data-dcnode-id="4544" instrument_node="">
</span><p data-dcnode-id="4539"><strong data-dcnode-id="4540"><a data-dcnode-id="4542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sheridancollege.ca/admissions/how-to-apply/mature-students"><span data-dcnode-id="4543" instrument_node="">Mature student status</span></a><span data-dcnode-id="4541" instrument_node="">.</span></strong></p><span data-dcnode-id="4538" instrument_node="">
</span><p data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">*Applicants who are unable to complete a visual arts credit or who achieved less than 65% in their visual arts credit will be required to submit a portfolio. A portfolio assessment fee will be charged. </span></p><h3 class="field-title" data-dcnode-id="4534"><span data-dcnode-id="4535" instrument_node="">Applicant Selection</span></h3><p data-dcnode-id="4529"><span data-dcnode-id="4533" instrument_node="">Eligible applicants are selected on the assessment of their previous academic achievement (the average of their six highest senior-level credits, including required courses), and the results of their </span><a data-dcnode-id="4531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sheridancollege.ca/-/media/project/sheridan/shared/files/programs/admission-requirements/faad/apppinde.pdf"><span data-dcnode-id="4532" instrument_node="">portfolio assessment</span></a><span data-dcnode-id="4530" instrument_node="">, if required.</span></p><span data-dcnode-id="4528" instrument_node="">
</span><p data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">Applicants who do not meet the admission requirements for this program will be assessed and advised individually and may be considered for other, related programs. </span></p><span data-dcnode-id="4525" instrument_node="">
</span><p data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">*Course duration for September starts is two academic years. Course duration for January starts is 16 months continuous.</span></p><span data-dcnode-id="4522" instrument_node="">
</span><br data-dcnode-id="4521"><h3 class="field-title" data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">English Language Proficiency</span></h3><span data-dcnode-id="4518" instrument_node="">All applicants whose first language is not English must meet Sheridan’s </span><a data-dcnode-id="4516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sheridancollege.ca/admissions/how-to-apply/admission-requirements/english-language"><span data-dcnode-id="4517" instrument_node="">English proficiency requirements.</span></a><span data-dcnode-id="4515" instrument_node=""> </span></div><span data-dcnode-id="4513" instrument_node="">

</span><ul data-dcnode-id="3906"><span data-dcnode-id="3937" instrument_node="">
</span><li data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">Analyze the client's needs and goals using research techniques and taking psychological, sociological and physiological needs into consideration.</span></li><span data-dcnode-id="3934" instrument_node="">
</span><li data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">Collaborate in the preparation of a design proposal/contract to define the scope of services for the decorating project.</span></li><span data-dcnode-id="3931" instrument_node="">
</span><li data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">Analyze existing space conditions and decorating components in order to determine what modifications are required to meet the client's needs.</span></li><span data-dcnode-id="3928" instrument_node="">
</span><li data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">Prepare a design concept which meets all the criteria (i.e. historical context, accessibility) of a given decorating project using the creative process.</span></li><span data-dcnode-id="3925" instrument_node="">
</span><li data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">Communicate the design concept to the client in verbal and written formats.</span></li><span data-dcnode-id="3922" instrument_node="">
</span><li data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">Use a variety of media and rendering techniques to communicate the character of the space.</span></li><span data-dcnode-id="3919" instrument_node="">
</span><li data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">Prepare technical documents (i.e. plans, elevations) needed for the implementation of the decorating solution.</span></li><span data-dcnode-id="3916" instrument_node="">
</span><li data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">Collaborate with a variety of design and decoration professionals for the implementation of the decoration solution.</span></li><span data-dcnode-id="3913" instrument_node="">
</span><li data-dcnode-id="3911"><span data-dcnode-id="3912" instrument_node="">Evaluate the effectiveness of the final decoration solution.</span></li><span data-dcnode-id="3910" instrument_node="">
</span><li data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">Develop strategies and plans to implement and maintain a decorating business.</span></li><span data-dcnode-id="3907" instrument_node="">
</span></ul></div><span data-dcnode-id="3904" instrument_node=""> </span></div><span data-dcnode-id="3902" instrument_node="">

</span><h3 data-dcnode-id="3560"><span data-dcnode-id="3561" instrument_node="">International Entrance Scholarship</span></h3><span data-dcnode-id="3559" instrument_node="">
</span><p data-dcnode-id="3554"><span data-dcnode-id="3558" instrument_node="">All new international students beginning their full-time postsecondary studies (ESL excluded) in Spring 2022, Fall 2022 or Winter 2023 semesters in Year 1 (Semester 1) will receive an </span><a data-dcnode-id="3556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sheridancollege.ca/admissions/international-centre/current-students/scholarships-and-awards"><span data-dcnode-id="3557" instrument_node="">entrance scholarship</span></a><span data-dcnode-id="3555" instrument_node=""> ranging from $1,000 to $2,000.</span></p><span data-dcnode-id="3553" instrument_node=""> </span></div><span data-dcnode-id="3551" instrument_node="">

</span><h3 data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">Bursaries for Grade 12 Students Pursuing Studies Toward a Career in Law</span></h3><span data-dcnode-id="3544" instrument_node="">
</span><p data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node="">The annual Bursary Program for grade 12 students pursuing careers in the justice sector at an Ontario university or college is now open! Bursaries are offered by the Association of Justices of the Peace of Ontario (AJPO), the Association of Ontario Judges (AOJ) and the Ontario Superior Court Judges’ Association (OSCJA). Each association offers one bursary per year in each of their judicial regions for a total of 22 bursaries province-wide!</span></p><span data-dcnode-id="3541" instrument_node="">
</span><p data-dcnode-id="3536"><span data-dcnode-id="3540" instrument_node="">Applications close on May 27, 2022. Spread the word to students! Visit the </span><a data-dcnode-id="3538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ojen.ca/wp-content/plugins/civicrm/civicrm/extern/url.php%3Fu%3D2832%26qid%3D" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3539" instrument_node="">Bursary web page</span></a><span data-dcnode-id="3537" instrument_node=""> for more information.</span></p><span data-dcnode-id="3535" instrument_node=""> </span></div><span data-dcnode-id="3533" instrument_node="">

</span><p data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">In our Honours Bachelor of Computer Science program, you'll learn foundational skills that prepare you to work in any area of computer science. But you’ll also have the chance to specialize in one of four emerging fields that interests you the most.</span></p><span data-dcnode-id="2291" instrument_node="">
</span><p data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">In the first year of the program, you’ll be introduced to each of these four fields: cloud computing, data analytics, game engineering, and network engineering.</span></p><span data-dcnode-id="2288" instrument_node="">

</span><p data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Our mission is to utilize harmonious, comprehensive and specialized training to empower our learners with the knowledge, skills and attitude required to demonstrate the Professional Competencies for Canadian Pharmacy Technicians at Entry to Practice.</span></p><span data-dcnode-id="1645" instrument_node="">
</span><h2 data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Program Vision</span></h2><span data-dcnode-id="1642" instrument_node="">
