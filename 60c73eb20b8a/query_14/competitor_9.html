</span><section class="column-content" data-dcnode-id="1845"><p data-dcnode-id="2075"><span data-dcnode-id="2076" style="font-weight: 400;"><span data-dcnode-id="2077" instrument_node="">Becoming an interior designer is a very popular career path at the moment, and it’s easy to see why. If you have a passion for design and bringing out the beauty of a space, interior designing is the perfect career to flex your creative muscle and artistic ability. But how do you become a professional interior designer?</span></span></p><span data-dcnode-id="2074" instrument_node="">
</span><p data-dcnode-id="2071"><span data-dcnode-id="2072" style="font-weight: 400;"><span data-dcnode-id="2073" instrument_node="">It isn’t as simple as waking up one day and deciding that interior designing is you’re going to do. You have to get some training or work experience, no matter what route you take to become an interior designer, but whether you choose the traditional route or option B or C, you can still achieve your dream interior design career.</span></span></p><span data-dcnode-id="2070" instrument_node="">
</span><p data-dcnode-id="2067"><span data-dcnode-id="2068" style="font-weight: 400;"><span data-dcnode-id="2069" instrument_node="">In this post, we’ll take a look at the many ways how to become an interior designer. But first, let’s get something out of the way…</span></span></p><span data-dcnode-id="2066" instrument_node="">
</span><h2 data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">What is an Interior Designer?</span></h2><span data-dcnode-id="2063" instrument_node="">
</span><p data-dcnode-id="2060"><span data-dcnode-id="2061" style="font-weight: 400;"><span data-dcnode-id="2062" instrument_node="">An interior designer is a person who works on architecture and interior space. The interior designer develops the plans, researches, coordinates, and manages the projects. They focus on space planning all the while creating cohesive and aesthetically pleasing design ideas for homes and businesses. As an interior designer, you can focus on specializing in a particular design field, whether that be residential interior design, commercial, environmental designs, and much more.</span></span></p><span data-dcnode-id="2059" instrument_node="">
</span><h2 data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">What Does an Interior Designer Do?</span></h2><span data-dcnode-id="2056" instrument_node="">
</span><p data-dcnode-id="2053"><span data-dcnode-id="2054" style="font-weight: 400;"><span data-dcnode-id="2055" instrument_node="">An interior designer is in charge of a lot of design elements and responsibilities which include:</span></span></p><span data-dcnode-id="2052" instrument_node="">
</span><ul data-dcnode-id="2022"><span data-dcnode-id="2051" instrument_node="">
</span><li data-dcnode-id="2048" style="font-weight: 400;"><span data-dcnode-id="2049" style="font-weight: 400;"><span data-dcnode-id="2050" instrument_node="">Listening to the client’s needs, goals, space, interest, &amp; budget for the desired project</span></span></li><span data-dcnode-id="2047" instrument_node="">
</span><li data-dcnode-id="2044" style="font-weight: 400;"><span data-dcnode-id="2045" style="font-weight: 400;"><span data-dcnode-id="2046" instrument_node="">Creates a sketched design plan of the layout keeping in mind how many people will be using the space&nbsp;</span></span></li><span data-dcnode-id="2043" instrument_node="">
</span><li data-dcnode-id="2040" style="font-weight: 400;"><span data-dcnode-id="2041" style="font-weight: 400;"><span data-dcnode-id="2042" instrument_node="">Uses computer software to finalize design plans</span></span></li><span data-dcnode-id="2039" instrument_node="">
</span><li data-dcnode-id="2036" style="font-weight: 400;"><span data-dcnode-id="2037" style="font-weight: 400;"><span data-dcnode-id="2038" instrument_node="">Calculates estimated cost for projects&nbsp;</span></span></li><span data-dcnode-id="2035" instrument_node="">
</span><li data-dcnode-id="2032" style="font-weight: 400;"><span data-dcnode-id="2033" style="font-weight: 400;"><span data-dcnode-id="2034" instrument_node="">Creates a timeline for the project and project completion&nbsp;</span></span></li><span data-dcnode-id="2031" instrument_node="">
</span><li data-dcnode-id="2028" style="font-weight: 400;"><span data-dcnode-id="2029" style="font-weight: 400;"><span data-dcnode-id="2030" instrument_node="">Face-to-face meetings with clients to ensure the satisfaction of a project</span></span></li><span data-dcnode-id="2027" instrument_node="">
</span><li data-dcnode-id="2024" style="font-weight: 400;"><span data-dcnode-id="2025" style="font-weight: 400;"><span data-dcnode-id="2026" instrument_node="">Seeks out any potential clients &amp; makes offers on new projects</span></span></li><span data-dcnode-id="2023" instrument_node="">
</span></ul><span data-dcnode-id="2021" instrument_node="">
</span><h3 data-dcnode-id="2018"><b data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Interior Designer and Interior Decorator are the Same Thing, Right? </span></b></h3><span data-dcnode-id="2017" instrument_node="">
</span><p data-dcnode-id="2009"><span data-dcnode-id="2015" style="font-weight: 400;"><span data-dcnode-id="2016" instrument_node="">Wrong. In fact, an</span></span><a data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//newschoolarch.edu/academics/domus/bachelor-of-interior-design/interior-designer-and-decorator/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2013" style="font-weight: 400;"><span data-dcnode-id="2014" instrument_node=""> interior decorator is quite different from an interior designer</span></span></a><span data-dcnode-id="2010" style="font-weight: 400;"><span data-dcnode-id="2011" instrument_node="">. The main difference is education: To become an interior designer, you will most likely need to earn an associate or bachelor’s degree from an accredited institution or interior design school before you can begin work in the interior design field. </span></span></p><span data-dcnode-id="2008" instrument_node="">
</span><p data-dcnode-id="2000"><span data-dcnode-id="2001" style="font-weight: 400;"><span data-dcnode-id="2007" instrument_node="">Meanwhile, anyone can become an interior decorator, no matter what education, </span><a data-dcnode-id="2005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//newschoolarch.edu/academics/school-of-design/bachelor-of-interior-design/interior-designer-and-decorator/" rel="noopener" target="_blank"><span data-dcnode-id="2006" instrument_node="">interior decorator school</span></a><span data-dcnode-id="2004" instrument_node=""> you attended, or training you have. If you simply just enjoy playing with fabrics and colors, you can print out some business cards and declare yourself an interior decorator. There are no licensing requirements involved for interior decorating.</span><br data-dcnode-id="2003"><span data-dcnode-id="2002" instrument_node="">
</span></span></p><span data-dcnode-id="1999" instrument_node="">
</span><p data-dcnode-id="1991"><span data-dcnode-id="1997" style="font-weight: 400;"><span data-dcnode-id="1998" instrument_node="">Also, while an interior decorator simply decorates a space, </span></span><a data-dcnode-id="1994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//newschoolarch.edu/academics/professional-development/certificate-in-interior-design-for-architects/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1995" style="font-weight: 400;"><span data-dcnode-id="1996" instrument_node="">interior design</span></span></a><span data-dcnode-id="1992" style="font-weight: 400;"><span data-dcnode-id="1993" instrument_node=""> goes much deeper. An interior designer will design and create living and working spaces as well as many other building projects. These may be homes and apartments, corporate offices, theaters, and more. There are also different specialties an interior designer may have. It takes creativity, the ability to work independently and with contractors, a good eye and ear to listen to your client’s needs then bring them to life. You’ll oversee an interior design project from start to finish. </span></span></p><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1987"><span data-dcnode-id="1988" style="font-weight: 400;"><span data-dcnode-id="1989" instrument_node="">While it isn’t necessarily a bad thing that it takes less work to become an interior decorator, it does mean that to become an interior designer, you are going to have to put in some extra work to get there. But what kind of training do you need when becoming an interior designer?</span></span></p><span data-dcnode-id="1986" instrument_node="">
</span><h3 data-dcnode-id="1983"><b data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">Go To School and Earn an Associate or Bachelor’s Degree in Interior Design</span></b></h3><span data-dcnode-id="1982" instrument_node="">
</span><p data-dcnode-id="1979"><span data-dcnode-id="1980" style="font-weight: 400;"><span data-dcnode-id="1981" instrument_node="">Interior designers must be creative, technically proficient, and business-savvy in order to be truly successful. Lucky for you, there are several options to get your interior design education, from the associate level all the way to a doctorate. </span></span></p><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1970"><span data-dcnode-id="1976" style="font-weight: 400;"><span data-dcnode-id="1977" instrument_node="">The most traditional way to learn the skills you will need is through a bachelor’s degree program at a </span></span><a data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//newschoolarch.edu/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1974" style="font-weight: 400;"><span data-dcnode-id="1975" instrument_node="">university or college</span></span></a><span data-dcnode-id="1971" style="font-weight: 400;"><span data-dcnode-id="1972" instrument_node="">. But if you’re unsure if interior design is the career path you want to take, or aren’t ready to fully commit to a bachelor’s degree program, an associate’s degree is a good way to start and get your foot in the door.</span></span></p><span data-dcnode-id="1969" instrument_node="">
</span><p data-dcnode-id="1966"><span data-dcnode-id="1967" style="font-weight: 400;"><span data-dcnode-id="1968" instrument_node="">If you are a creative person or have some sort of artistic ability, and someone who is particularly intrigued by interior design, an associate’s degree program might be the perfect way to learn the fundamentals. From here, you can continue your education if you decide an interior design career is the career path you want to take. In most cases, you can later transfer your earned credits into a bachelor’s degree program. </span></span></p><span data-dcnode-id="1965" instrument_node="">
</span><p data-dcnode-id="1962"><span data-dcnode-id="1963" style="font-weight: 400;"><span data-dcnode-id="1964" instrument_node="">You can go in several different directions with an associate’s degree program. If you want to start working in the professional world as soon as possible, you should consider an Associate of Applied Science degree as an assistant interior designer. But if you find that you want to continue your education in interior design and earn your bachelor’s degree, you should go for an Associate of Arts. </span></span></p><span data-dcnode-id="1961" instrument_node="">
</span><p data-dcnode-id="1958"><span data-dcnode-id="1959" style="font-weight: 400;"><span data-dcnode-id="1960" instrument_node="">Don’t fret if you aren’t sure right away – your first year will focus on the fundamentals of design and the basic hand drawing and digital drafting skills you’ll need. Meanwhile, year two shifts into more specialized topics like color theory and architectural lighting, as well as introductory marketing and business topics. </span></span></p><span data-dcnode-id="1957" instrument_node="">
</span><p data-dcnode-id="1949"><span data-dcnode-id="1955" style="font-weight: 400;"><span data-dcnode-id="1956" instrument_node="">Earning a </span></span><a data-dcnode-id="1952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//newschoolarch.edu/academics/domus/bachelor-of-interior-design/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1953" style="font-weight: 400;"><span data-dcnode-id="1954" instrument_node="">bachelor’s degree</span></span></a><span data-dcnode-id="1950" style="font-weight: 400;"><span data-dcnode-id="1951" instrument_node=""> will take things a step further and make you a more well-rounded interior designer. You’ll learn more about the aesthetic, technical, and business skills you need to thrive in the field. A bachelor’s degree program will build on the skills you would learn in an associate’s program. </span></span></p><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1945"><span data-dcnode-id="1946" style="font-weight: 400;"><span data-dcnode-id="1947" instrument_node="">You’ll learn everything from the theory and history of interior design to how to draw sketches, build 3D models and use computer-aided design (CAD) software. You’ll gain vital knowledge on building materials, construction practices, and furniture technology to help your clients choose the best materials and furnishings for their space. </span></span></p><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1941"><span data-dcnode-id="1942" style="font-weight: 400;"><span data-dcnode-id="1943" instrument_node="">Most interior design programs will teach you the different skills needed for spaces other than just residential, including office spaces, retail, and large buildings. You’ll learn to consider things like traffic flow, lighting design, acoustics, and the social and psychological needs of a given space and its occupants. </span></span></p><span data-dcnode-id="1940" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1938" style="font-weight: 400;"><span data-dcnode-id="1939" instrument_node="">Beyond the skills you need on the job, you’ll also master the business side of things so you can learn how to become a success. This is especially helpful if you want to have your own interior design business, rather than work at a large design firm. You’ll need these skills to keep the lights on. </span></span></p><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1933"><span data-dcnode-id="1934" style="font-weight: 400;"><span data-dcnode-id="1935" instrument_node="">Many degree programs will also offer a variety of concentrations, which will allow you to hone your skills on one specific area, such as bathroom design or environmentally sustainable materials. This will make you an expert in a specific skillset, which could make you attractive to clients looking for design help in that specific area. </span></span></p><span data-dcnode-id="1932" instrument_node="">
</span><p data-dcnode-id="1929"><span data-dcnode-id="1930" style="font-weight: 400;"><span data-dcnode-id="1931" instrument_node="">Beyond a bachelor’s degree program, you can also take things a step further and earn a master’s or doctorate in interior design. Candidates for a master’s degree most often have worked in the industry for a couple of years and have identified an area of interior design that suits their skills the best, or that they are most interested in. A master’s interior design program helps them improve their knowledge on that topic and positions them for a higher role within their company, or to start their own interior design firm. </span></span></p><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1925"><span data-dcnode-id="1926" style="font-weight: 400;"><span data-dcnode-id="1927" instrument_node="">Doctoral programs are generally for those who are ready to move on to teaching, consulting, or conducting independent research on design theory. </span></span></p><span data-dcnode-id="1924" instrument_node="">
</span><p data-dcnode-id="1921"><span data-dcnode-id="1922" style="font-weight: 400;"><span data-dcnode-id="1923" instrument_node="">If the traditional learning path isn’t for you, many renowned interior design schools also offer online learning opportunities. An online interior design school will be the perfect option for anyone who wants to continue their education while working. </span></span></p><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1917"><span data-dcnode-id="1918" style="font-weight: 400;"><span data-dcnode-id="1919" instrument_node="">The very best degree programs will also include internships that will help you to build your professional portfolio, which is just as important to have as your degree. But no matter which degree program you choose, you should make sure you choose an accredited institution.</span></span></p><span data-dcnode-id="1916" instrument_node="">
</span><h3 data-dcnode-id="1913"><b data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">Upon Graduation, Pass the National Council for Interior Design Qualification Exam and Get an Interior Design License (If Necessary)</span></b></h3><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1909"><span data-dcnode-id="1910" style="font-weight: 400;"><span data-dcnode-id="1911" instrument_node="">While not all states require interior designers to be licensed, you need to make sure, because several states will prohibit unlicensed designers from doing any interior design work. Some other states allow both to work, but will only allow licensed professionals to use the “interior designer” title.</span></span></p><span data-dcnode-id="1908" instrument_node="">
</span><p data-dcnode-id="1905"><span data-dcnode-id="1906" style="font-weight: 400;"><span data-dcnode-id="1907" instrument_node="">To become a licensed interior designer, you will need to pass the National Council for Interior Design Qualification (NCIDQ) exam. This is a state-approved exam that you must qualify for with a combination of education and experience, typically a minimum of a bachelor’s degree and two years of on-the-job training. </span></span></p><span data-dcnode-id="1904" instrument_node="">
</span><p data-dcnode-id="1901"><span data-dcnode-id="1902" style="font-weight: 400;"><span data-dcnode-id="1903" instrument_node="">As we mentioned, the requirements do vary by state, so make sure to look into your state requirements. For example, California residents must take the California Council for Interior Design Certification (CCIDC) exam.</span></span></p><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1897"><span data-dcnode-id="1898" style="font-weight: 400;"><span data-dcnode-id="1899" instrument_node="">There are also some voluntary certifications you can get if you have a business that focuses on one specialty of interior design. These are commonly available through professional and trade associations and are a good way to make your business look better with a certified seal of approval from a trusted organization. </span></span></p><span data-dcnode-id="1896" instrument_node="">
</span><h3 data-dcnode-id="1893"><b data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Build a Strong Portfolio</span></b></h3><span data-dcnode-id="1892" instrument_node="">
</span><p data-dcnode-id="1889"><span data-dcnode-id="1890" style="font-weight: 400;"><span data-dcnode-id="1891" instrument_node="">The best way to make yourself attractive to clients is by building a strong portfolio. In whichever degree program you choose, part of the program should also be about creating a solid portfolio to showcase your skills and design ideas. You’ll want to take high-quality photographs of all of your work and package them attractively on your website and in a digital presentation.</span></span></p><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1885"><span data-dcnode-id="1886" style="font-weight: 400;"><span data-dcnode-id="1887" instrument_node="">This will show your clients what you’re capable of and present you as a well-organized professional. You should also include some examples of projects that you can show from sketch to completion to give them insight into your thought and work process. You should also always modify your portfolio to highlight projects that apply to the one you are trying to attain. </span></span></p><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1881"><span data-dcnode-id="1882" style="font-weight: 400;"><span data-dcnode-id="1883" instrument_node="">Digitally is the main way to showcase your portfolio, but don’t be afraid to create an old-fashioned flipbook as well. Clients love to flip through photo books to see your work and it may leave more of a lasting impact to actually have something in their hands. </span></span></p><span data-dcnode-id="1880" instrument_node="">
</span><p data-dcnode-id="1877"><span data-dcnode-id="1878" style="font-weight: 400;"><span data-dcnode-id="1879" instrument_node="">Internships are a great way to build a portfolio and gain hands-on experience before you start work as a professional, and don’t be afraid to include any schoolwork if you think it is top-notch. You have to be able to show what you have to get yourself started.</span></span></p><span data-dcnode-id="1876" instrument_node="">
</span><h3 data-dcnode-id="1873"><b data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">Take Pro Bono Work</span></b></h3><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1869"><span data-dcnode-id="1870" style="font-weight: 400;"><span data-dcnode-id="1871" instrument_node="">This might seem silly, as the goal, of course, is to earn money for your work, but you may find it difficult to get hired without any work experience. This is a way to get yourself some experience and better position yourself for employment. You can’t gain experience without doing some work, so you may, unfortunately, have to resort to practicing your craft for free. Volunteer your services to family, friends, or local nonprofit organizations. This will also help you develop your skills for when paying jobs do come your way.</span></span></p><span data-dcnode-id="1868" instrument_node="">
