</span><p data-dcnode-id="4141"><span data-dcnode-id="4157" instrument_node="">
		This article was co-authored by </span><a data-dcnode-id="4155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Author/Suzanne-Lasky-ASID"><span data-dcnode-id="4156" instrument_node="">Suzanne Lasky, ASID</span></a><span data-dcnode-id="4154" instrument_node="">. Suzanne Lasky is an Interior Designer and the Founder of S Interior Design, a design consulting company based in Scottsdale, Arizona specializing in new home builds,  home remodels, and all related design options for residential and small business clients. Suzanne has over 19 years of interior design and consulting experience. She is an Allied Member of the ASID (American Society of Interior Designers). She earned a Master of Business Administration (MBA) from Indiana University and an AAS in Interior Design from Scottsdale Community College.

</span><p data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">If you have a love of decorating and a knack for arranging furniture and choosing décor and color, a career as an interior decorator may be perfect for you. To become a "decorator" you don't need an extensive education or a fancy degree, just a good eye and a passion for the job. However, if you are interested in interior design, you will need to take specialized courses and gain the proper licensing from the state, depending on which state you are in.

</span><li data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">Making sure your portfolio translates to an electronic form is critical. In order to get the most out of your portfolio, you will want to create a website that highlights your work and keep an active blog to promote what you've done.</span></li><span data-dcnode-id="3881" instrument_node="">
</span><li data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node="">Utilize any and all popular social media sites, like Facebook, Twitter, Pinterest or Wanderfly. These sites are great spaces to share your work and engage in discussions with other people interested in interior decoration.</span></li><span data-dcnode-id="3878" instrument_node="">

</span><div class="step_num" data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node="">1</span></div><div class="step" data-dcnode-id="3653"><span data-dcnode-id="3747" instrument_node="">
</span><b class="whb" data-dcnode-id="3741"><span data-dcnode-id="3746" instrument_node="">Draft a </span><a data-dcnode-id="3743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Write-a-Business-Plan-for-a-Small-Business" title="Write a Business Plan for a Small Business"><b class="whb" data-dcnode-id="3744"><span data-dcnode-id="3745" instrument_node="">business plan</span></b></a><span data-dcnode-id="3742" instrument_node="">.</span></b><span data-dcnode-id="3740" instrument_node=""> The first step in starting any business is drafting a usable business plan. You can find some help with this process </span><a data-dcnode-id="3738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Write-a-Business-Plan" title="Write a Business Plan"><span data-dcnode-id="3739" instrument_node="">here</span></a><span data-dcnode-id="3737" instrument_node="">. A good business plan consists of many things. You are trying to outline some basic concepts, like how your business will generate money and customers, how much it will cost to operate the business, and how you intend to expand or grow your business. Some things to address are:
</span><ul data-dcnode-id="3655"><span data-dcnode-id="3736" instrument_node="">
</span><li data-dcnode-id="3717"><span data-dcnode-id="3735" instrument_node="">It may be helpful to meet with your local Small Business Development Center. SBDC's provide help during all of the stages of a business' life cycle and can help you put a business plan together.</span><sup aria-label="Link to Reference 4" class="reference" data-dcnode-id="3719" id="_ref-4"><a data-dcnode-id="3733" href="#_note-4"><span data-dcnode-id="3734" instrument_node="">[4]</span></a><span class="ts_popup" data-dcnode-id="3721" hidden="" id="ts_popup_4" style="display: none;"><span data-dcnode-id="3732" instrument_node="">
</span><span class="ts_close" data-dcnode-id="3730"><span data-dcnode-id="3731" instrument_node="">X</span></span><span data-dcnode-id="3729" instrument_node="">

</span></span><span data-dcnode-id="3720" instrument_node="">
</span></sup><span data-dcnode-id="3718" instrument_node="">
</span></li><span data-dcnode-id="3716" instrument_node="">
</span><li data-dcnode-id="3697"><span data-dcnode-id="3715" instrument_node="">Address your customer base. In your business plan, you will need to identify how you will drum up business. With interior decoration businesses, word of mouth and local advertising are effective ways of building a customer base.</span><sup aria-label="Link to Reference 5" class="reference" data-dcnode-id="3699" id="_ref-5"><a data-dcnode-id="3713" href="#_note-5"><span data-dcnode-id="3714" instrument_node="">[5]</span></a><span class="ts_popup" data-dcnode-id="3701" hidden="" id="ts_popup_5" style="display: none;"><span data-dcnode-id="3712" instrument_node="">
</span><span class="ts_close" data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">X</span></span><span data-dcnode-id="3709" instrument_node="">

</span><span class="ts_description" data-dcnode-id="3705"></span><span data-dcnode-id="3704" instrument_node="">

</span></span><span data-dcnode-id="3700" instrument_node="">
</span></sup><span data-dcnode-id="3698" instrument_node="">
</span></li><span data-dcnode-id="3696" instrument_node="">
</span><li data-dcnode-id="3677"><span data-dcnode-id="3695" instrument_node="">Address your financial situation in your business plan. Depending on how large or small you want to go with your interior decoration business, you may need to rally investors to support your efforts. In order to get others to invest in your business, you need to determine how much money you will need, how much you will generate, and how you will pay back any investors. </span><sup aria-label="Link to Reference 6" class="reference" data-dcnode-id="3679" id="_ref-6"><a data-dcnode-id="3693" href="#_note-6"><span data-dcnode-id="3694" instrument_node="">[6]</span></a><span class="ts_popup" data-dcnode-id="3681" hidden="" id="ts_popup_6" style="display: none;"><span data-dcnode-id="3692" instrument_node="">

</span></li><span data-dcnode-id="3676" instrument_node="">
</span><li data-dcnode-id="3657"><span data-dcnode-id="3675" instrument_node="">If you think your business will need employees, make sure to discuss hiring tactics and what these employees will cost you in your business plan. </span><sup aria-label="Link to Reference 7" class="reference" data-dcnode-id="3659" id="_ref-7"><a data-dcnode-id="3673" href="#_note-7"><span data-dcnode-id="3674" instrument_node="">[7]</span></a><span class="ts_popup" data-dcnode-id="3661" hidden="" id="ts_popup_7" style="display: none;"><span data-dcnode-id="3672" instrument_node="">

</span><b class="whb" data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">Get a business license.</span></b><span data-dcnode-id="3617" instrument_node=""> Even if you plan to keep your business small and the overhead costs low, you will need a business license from the township, city or municipality where you intend to operate the business. Getting the proper licenses can help you get discounts on materials and increases your legitimacy in the eyes of potential customers.
</span><ul data-dcnode-id="3614"><li data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node="">Your interior decoration business will most likely require a "Business Occupancy License". These licenses are acquired from your city or township, are fairly inexpensive and do not require site inspections.</span></li></ul><span data-dcnode-id="3613" instrument_node="">
</span></div><span data-dcnode-id="3611" instrument_node="">

</span><b class="whb" data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">Acquire startup capital.</span></b><span data-dcnode-id="3597" instrument_node=""> You'll need some money to get things started, mostly to cover the cost of materials. Your startup costs for an interior design business can be low, but you will need a business license. You might also need to rent office or storage space, depending on how large you want your business to be.</span><sup aria-label="Link to Reference 8" class="reference" data-dcnode-id="3581" id="_ref-8"><a data-dcnode-id="3595" href="#_note-8"><span data-dcnode-id="3596" instrument_node="">[8]</span></a><span class="ts_popup" data-dcnode-id="3583" hidden="" id="ts_popup_8" style="display: none;"><span data-dcnode-id="3594" instrument_node="">

</span><b class="whb" data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">Spread the word.</span></b><span data-dcnode-id="3506" instrument_node=""> You will want to advertise your services to potential customers. Paid advertising on local television or the local newspaper can be effective. Also, make sure you take the necessary steps to promote your business online, as a majority of people who need interior design help will probably turn to the internet to find someone. Finally, your business will rely heavily on word of mouth advertisement. People who see your work will get your name from friends, family, and acquaintances and seek you out.

</span><b class="whb" data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">Know the difference.</span></b><span data-dcnode-id="3297" instrument_node=""> An interior designer is not an interior decorator. These are two different jobs, that require slightly different skill sets and have different educational and certification requirements. As a general rule, interior designers are far more employable and tend to make more money than interior decorators.</span><sup aria-label="Link to Reference 12" class="reference" data-dcnode-id="3281" id="_ref-12"><a data-dcnode-id="3295" href="#_note-12"><span data-dcnode-id="3296" instrument_node="">[12]</span></a><span class="ts_popup" data-dcnode-id="3283" hidden="" id="ts_popup_12" style="display: none;"><span data-dcnode-id="3294" instrument_node="">

</span><b class="whb" data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">Take courses.</span></b><span data-dcnode-id="3243" instrument_node=""> The main difference between a designer and a decorator is education. To become an interior designer, you need to enroll in courses on interior design at a university, community college, or design school. These courses help you learn about interior design in order to pass licensing and certification exams, while also helping you learn the technical aspects of design, such as working within the guidelines laid out in local and municipal building ordinances.</span><sup aria-label="Link to Reference 13" class="reference" data-dcnode-id="3227" id="_ref-13"><a data-dcnode-id="3241" href="#_note-13"><span data-dcnode-id="3242" instrument_node="">[13]</span></a><span class="ts_popup" data-dcnode-id="3229" hidden="" id="ts_popup_13" style="display: none;"><span data-dcnode-id="3240" instrument_node="">

</span><b class="whb" data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">Get your license.</span></b><span data-dcnode-id="3189" instrument_node=""> Depending on what state you live in, the licensing requirements and guidelines are different. Some states don't require any licensing for interior designers while other states will not allow you to work in interior design without a license. Whether your state requires licensing or not, you really need a license to be viewed as a legitimate and employable interior designer.
</span><ul data-dcnode-id="3178"><span data-dcnode-id="3188" instrument_node="">
</span><li data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">In many states, you need to pass the NCIDQ (National Council for Interior Design Qualification) exam to receive your license to practice interior design.</span></li><span data-dcnode-id="3185" instrument_node="">
</span><li data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">California has its own certification process overseen by the CCIDC (The California Council for Interior Design Certification).</span></li><span data-dcnode-id="3182" instrument_node="">
</span><li data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">You will need to identify the licensing process for interior designers in your state, as practices and exams vary widely.</span></li><span data-dcnode-id="3179" instrument_node="">
</span></ul><span data-dcnode-id="3177" instrument_node="">

</span><b class="whb" data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">Build a portfolio.</span></b><span data-dcnode-id="3140" instrument_node=""> Just like decorators, designers need to keep a record of the jobs they have completed and have evidence of the quality of their  work. You can populate your portfolio more quickly if you are initially willing to work for free or take on design projects for friends or charitable organizations with small budgets. Make sure you take high-quality photographs of your work to include in your portfolio.</span><sup aria-label="Link to Reference 14" class="reference" data-dcnode-id="3124" id="_ref-14"><a data-dcnode-id="3138" href="#_note-14"><span data-dcnode-id="3139" instrument_node="">[14]</span></a><span class="ts_popup" data-dcnode-id="3126" hidden="" id="ts_popup_14" style="display: none;"><span data-dcnode-id="3137" instrument_node="">

</span><div class="qa_answer answer" data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">
								When I was a kid I would use the family desktop computer. I would draw rooms and decorate them  using the paint program on it. If you would like an even better option, there is a program in the Microsoft app store called "Planner - 5D Home and Interior Design," it allows you to switch from 2D to 3D easily and it is well worth it to spend the $10-$20 for the full version. You will have access to all materials and be able to save them, as well as take snapshots too. If you don't have access to a computer, good old fashioned graph paper, and a ruler work. Make sure you do well in school as well, as it will help you when looking for a college.
