</span><div class="entry-content" data-dcnode-id="625"><span data-dcnode-id="992" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="991" id="block-3008be1b-ed15-4986-b96b-d402b5a7a612"></h2><span data-dcnode-id="990" instrument_node="">
</span><ev-paywall class="ng-isolate-scope" data-dcnode-id="988"></ev-paywall><div class="ev-meter-content" data-dcnode-id="987"></div><span data-dcnode-id="986" instrument_node="">
</span><div class="wp-block-media-text alignfull is-stacked-on-mobile ev-meter-content" data-dcnode-id="946" style="grid-template-columns:31% auto"><figure class="wp-block-media-text__media" data-dcnode-id="984"><img alt="" class="wp-image-65790 size-full" data-dcnode-id="985" height="1024" sizes="(max-width: 763px) 100vw, 763px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.commercialinteriordesign.com/cloud/2022/01/03/CID_1801_01_COVER-scaled.jpg&amp;raw" srcset="https://www.commercialinteriordesign.com/cloud/2022/01/03/CID_1801_01_COVER-559x750.jpg 559w, https://www.commercialinteriordesign.com/cloud/2022/01/03/CID_1801_01_COVER-scaled.jpg 763w, https://www.commercialinteriordesign.com/cloud/2022/01/03/CID_1801_01_COVER-768x1030.jpg 768w, https://www.commercialinteriordesign.com/cloud/2022/01/03/CID_1801_01_COVER-1145x1536.jpg 1145w, https://www.commercialinteriordesign.com/cloud/2022/01/03/CID_1801_01_COVER-150x200.jpg 150w, https://www.commercialinteriordesign.com/cloud/2022/01/03/QeDs4Hna-CID_1801_01_COVER-1200x1610.jpg 1200w, https://www.commercialinteriordesign.com/cloud/2022/01/03/CID_1801_01_COVER-1568x2103.jpg 1568w, https://www.commercialinteriordesign.com/cloud/2022/01/03/CID_1801_01_COVER-400x537.jpg 400w, https://www.commercialinteriordesign.com/cloud/2022/01/03/CID_1801_01_COVER-scaled.jpg 1908w" width="763"></figure><div class="wp-block-media-text__content" data-dcnode-id="947"><span data-dcnode-id="983" instrument_node="">
</span><h2 data-dcnode-id="981" id="h-november-2021"><span data-dcnode-id="982" instrument_node="">January 2022</span></h2><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="979" instrument_node="">Some jokers on social media pointed out that 2022 sounds like “2020, too” – part two of a year that tested us all to the hilt.</span><br data-dcnode-id="978"><br data-dcnode-id="977"><span data-dcnode-id="976" instrument_node="">Obviously, we love some wordplay, but we also prefer to keep our predictions for this coming year with an accent of optimism.</span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Accordingly, for January’s cover feature, we asked the industry up-and-coming design stars – the Class of 2022 – to talk about their hopes and fears for the year.</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="970" instrument_node="">What else is bright about the next 12 months? Colour trend experts at Pantone have created a new shade that accurately captures the zeitgeist of 2022 and we’ve found the perfect products to incorporate ‘Very Peri’ into your upcoming projects.</span><br data-dcnode-id="969"><br data-dcnode-id="968"><span data-dcnode-id="967" instrument_node="">If this doesn’t bring you cheer, then this issue we’re also celebrating the design history of the humble LEGO brick and taking a first look at an entertainment destination in Dubai where some of you might have celebrated New Year’s Eve.</span><br data-dcnode-id="966"><br data-dcnode-id="965"><span data-dcnode-id="964" instrument_node="">With a new year comes a fresh start, and so our January special report focuses on bathroom design. We ask, hygiene and hi-luxe – what’s key for bathroom projects in 2022? Noted suppliers Cosentino, duka, RAK Ceramics and AXOR all understood the assignment and shared with us their trend predictions and new products.</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">From our Commercial Interior Design ‘family’ to yours, we wish you health, happiness and success for the year ahead</span></p><div class="code-block code-block-8" data-dcnode-id="955" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="959" instrument_node="">
</span><div class="googleAds" data-adtype="inread1" data-dcnode-id="956" data-index="121" id="ad-slot-121"><span data-dcnode-id="958" instrument_node="">
</span><div data-dcnode-id="957" id="adBannerSlot-121"></div></div></div><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="953" instrument_node="">You can all </span><strong data-dcnode-id="950"><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mags.itp.com/CommercialInteriorDesign/2022/1801-CID-JAN2022/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="952" instrument_node="">read the latest issue here.</span></a></strong></p><span data-dcnode-id="948" instrument_node="">
</span></div></div><span data-dcnode-id="945" instrument_node="">
</span><h2 class="has-text-align-center ev-meter-content" data-dcnode-id="943" id="h-from-the-archive"><span data-dcnode-id="944" instrument_node="">From the archive</span></h2><span data-dcnode-id="942" instrument_node="">

</span><div class="wp-container-6 wp-block-column ev-meter-content" data-dcnode-id="920"><span data-dcnode-id="940" instrument_node="">
