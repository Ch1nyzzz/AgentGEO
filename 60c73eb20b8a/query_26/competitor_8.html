</span></span><span data-dcnode-id="1159" instrument_node="">
</span><img alt="Fadd Studio" class="topimage" data-dcnode-id="1158" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.archidiaries.com/2020/04/Fadd_Feature-815x558.jpg&amp;raw"><span data-dcnode-id="1157" instrument_node="">
</span><h2 data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">More Information</span></h2><span data-dcnode-id="1154" instrument_node="">
</span><div class="projectdata" data-dcnode-id="1130"><span data-dcnode-id="1153" instrument_node="">
</span><p class="prjspec" data-dcnode-id="1149"><strong data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Architecture Firm Name:</span></strong><span data-dcnode-id="1150" instrument_node=""> Fadd Studio</span></p><span data-dcnode-id="1148" instrument_node="">
</span><p class="prjspec" data-dcnode-id="1142"><strong data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Website:</span></strong><span data-dcnode-id="1145" instrument_node=""> </span><a data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.faddstudio.com/" rel="nofollow" target="_blank"><span data-dcnode-id="1144" instrument_node="">www.faddstudio.com</span></a></p><span data-dcnode-id="1141" instrument_node="">
</span><p class="prjspec" data-dcnode-id="1137"><strong data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Firm Location:</span></strong><span data-dcnode-id="1138" instrument_node=""> Bangalore, India</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p class="prjspec" data-dcnode-id="1132"><strong data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Founding Year:</span></strong><span data-dcnode-id="1133" instrument_node=""> 2012</span></p><span data-dcnode-id="1131" instrument_node="">
</span></div><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1124"><strong data-dcnode-id="1126"><img alt="" class="alignleft wp-image-4532 size-medium" data-dcnode-id="1128" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.archidiaries.com/2020/04/IMG_0640-300x200.jpg&amp;raw" srcset="https://static.archidiaries.com/2020/04/IMG_0640-300x200.jpg 300w, https://static.archidiaries.com/2020/04/IMG_0640-1024x682.jpg 1024w, https://static.archidiaries.com/2020/04/IMG_0640-768x511.jpg 768w, https://static.archidiaries.com/2020/04/IMG_0640-640x426.jpg 640w, https://static.archidiaries.com/2020/04/IMG_0640-815x543.jpg 815w, https://static.archidiaries.com/2020/04/IMG_0640.jpg 1200w" width="300"><span data-dcnode-id="1127" instrument_node="">Farah Ahmed</span></strong><span data-dcnode-id="1125" instrument_node=""> has had an interesting exploratory journey before stumbling upon Interior Design. While Farah is creative, she is also very Type-A. She likes Excel almost as much as she likes Photoshop. Like most artsy people, she didn’t always know what she wanted to do with her life, but she did know that whatever it was, it had to keep her intrigued, challenged and busy.</span></p><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">During her undergraduate studies at Northwestern University, Farah studied Photography and Political Science and then moved to New York where she worked in advertising at Ogilvy and Mather focusing on key client relationships.&nbsp; With her right brain craving more stimulation and her desire to break the shackles of the corporate world to explore her independent creative side, she delved into fine art photography. She produced, showcased and sold fine art photography as an artist based out of India. Still not fully satiated, and in her desire to add tangible and practical aspects to her creativity, she began working at renowned architecture and interior firm of Khosla Associates.&nbsp; After a year and half, Farah knew she had struck the balance she sought between numbers and colours, and of leveraging her creative skills to help clients achieve their vision.</span></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Farah moved to Milan and received a Masters Degree in Interior Design from Istitutio Marangoni and returned to India in 2011 to start her Interior Design firm.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">And on her return to India, Farah looking to start her own studio and Dhaval looking to explore new opportunities on his own, they started FADD Studio in 2012. Her career in advertising made her acutely aware of business, branding and strategy; photography trained her eye to work with darkness and light, which is extremely essential for interior design.&nbsp; FADD studio is her equilibrium between business and creativity.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Farah loves to travel to places that are off the beaten path and will do anything that gives her a rush like sky-diving, bungee jumping, scuba diving; locally she enjoys watching movies in theatres and trying out new restaurants. In her free time, which is usually before going to bed, she watches TV shows like Billions, Suits, Grey’s Anatomy and Games of Thrones or pours over design blogs. Farah’s is a busy mum of an 11-month old Leah and a 3.5 year old Luca!</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1107"><strong data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Dhaval Shellugar</span></strong><span data-dcnode-id="1108" instrument_node=""> was born to design and he always knew it. At a very young age, while Dhaval helped his father in his automobile business, he would come across several posters and calendars of innovative vehicle design that fascinated and inspired him. He would often find himself lost in the sleekness of their exteriors and awed by the intricacies of how many little parts make a whole. He recollects this as his first introduction into the design field; and attributes this early exposure significantly to his increasing fondness and gravitation toward the creative arts while growing up.</span></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">In school, he naturally dabbled with arts and crafts. After high school, during the course of his academic career – still intrigued by details – he frequently visited his uncle’s architectural practice. Here he would often spend hours looking at architectural and interior drawings – their geometry, theirs colours and every little element resonated with him. With the instinct for creativity, newfound passion for drawings, and a conviction to be a creative visionary, he decided to pursue interior design in his studies and applied to the Rachna Sansad School of Design in Bombay.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">After Dhaval graduated from the Rachana Sansad School of Design in Mumbai in 2006, Mika Designs quickly recruited him. Here, he gained a strong foundation in the practical facets of the interior design field. He quickly learnt to apply theory to practice and developed a keen eye for details while working on high end residential and other boutique projects.</span></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">After Mika Designs, he moved to Khosla Associates in Bangalore where he was a Senior Design Lead for almost four years. Here his exposure ranged from various global and local trends to fine tuning what he had already learned about the importance of the basic principles of design. He was able to hone his skills to their fullest. It was at Khosla Associates that Dhaval met Farah Ahmed. They worked on the same team for almost eighteen months and found their working style complementary. Over the four years at Khosla Associates, Dhaval headed diverse and award winning projects – taking them from concept to execution. This invaluable experience gave him the inspiration, drive and confidence to eventually set off his own.</span></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1094" instrument_node="">
</span><h2 data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Practice Ideology</span></h2><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">FADD Studio was founded in 2012 in Bangalore by Farah Ahmed, who studied at Istitutio Marangoni in Milan and Dhaval Shellugar who studied at Rachana Sasand’s Academy of Architecture in Bombay. Both met while working at Khosla Associates under Sandeep Khosla and Amaresh Anand. The firm’s projects range from residences to offices and retail spaces to hospitality. Currently, the studio is designing a clubhouse of an exclusive gated community; luxury villas in the outskirts of Bangalore and a holiday home in the heart of Bangalore.</span></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">The world of design is in a constant state of flux; exploring and evolving into and out of new ideas, concept, trends and fads. It is also about revisiting older trends that were set decades ago and reinterpreting them in a fresh and contemporary way. So is the philosophy of FADD Studio. While FADD is an acronym for Farah and Dhaval Design, it is also a play on the word ‘fad’. It is easy to stagnate into a style that becomes a firm’s identity. And they believe that having a singular style defies the purpose of design, which is to push beyond what one knows, achieve something novel and unique in every project, and be constantly propelled out of the comfort zone into a world where one not only embrace new concepts and techniques but also create fads of their own. With this stubborn sensibility and desire to be original, they aspire not to create a style unique to us but to give you a design identity that is exclusive to you and your space whether it is a home, restaurant or store.</span></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1082" instrument_node="">
