</span><h3 data-dcnode-id="3887" id="business-name"><span data-dcnode-id="3888"><span data-dcnode-id="3889" instrument_node=""> Barton Interiors</span></span></h3><span data-dcnode-id="3886" instrument_node="">
</span><h2 data-dcnode-id="3882"><span data-dcnode-id="3885" instrument_node="">
                                    Financial Plan                                        </span><span data-container="#plan-text" data-dcnode-id="3884" data-original-title="Learn more about how to put together an <a href='https://www.liveplan.com/blog/5-steps-to-creating-an-investor-ready-personnel-plan/' target='_blank' rel='noopener'>investor-ready personnel plan</a>." data-toggle="tooltip" id="title-tooltip-btn" title=""></span><span data-dcnode-id="3883" instrument_node="">
</span></h2><span data-dcnode-id="3881" instrument_node="">
</span><div data-dcnode-id="564" id="sample_plan_page_content"><span data-dcnode-id="3880" instrument_node="">
</span><p data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">The initial funding of $25,000 will be invested&nbsp;by the owner.&nbsp; The goal is to fund the growth of the business from its earnings.&nbsp; The financial plan contains these essential factors:</span></p><span data-dcnode-id="3877" instrument_node="">
</span><ol data-dcnode-id="3866"><span data-dcnode-id="3876" instrument_node="">
</span><li data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">A growth rate in sales of 47% for the year 2002 and 15% for 2003. </span></li><span data-dcnode-id="3873" instrument_node="">
</span><li data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">An average sales per month that increases each year, averaging $3,870 in the first year, $5,720 the second, and $6,600&nbsp;in the third year. </span></li><span data-dcnode-id="3870" instrument_node="">
</span><li data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">Continue to fund the growth of the business from the revenues it generates.</span></li><span data-dcnode-id="3867" instrument_node="">
</span></ol><span data-dcnode-id="3865" instrument_node="">
</span><p data-dcnode-id="3861"><span data-dcnode-id="3864" instrument_node=""> &lt;p size="4" </span><strong data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">Financial difficulties and risks</span></strong></p><span data-dcnode-id="3860" instrument_node="">
</span><ul data-dcnode-id="3846"><span data-dcnode-id="3859" instrument_node="">
</span><li data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">Slow sales resulting in less-than-projected cash flow. </span></li><span data-dcnode-id="3856" instrument_node="">
</span><li data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">Unexpected and excessive cost increases compared to the&nbsp;planned expenses. </span></li><span data-dcnode-id="3853" instrument_node="">
</span><li data-dcnode-id="3851"><span data-dcnode-id="3852" instrument_node="">Overly aggressive and debilitating actions by competing designers. </span></li><span data-dcnode-id="3850" instrument_node="">
</span><li data-dcnode-id="3848"><span data-dcnode-id="3849" instrument_node="">A parallel entry by a new competitor further diminishing&nbsp;revenue generation&nbsp;potential. </span></li><span data-dcnode-id="3847" instrument_node="">
</span></ul><span data-dcnode-id="3845" instrument_node="">
</span><p data-dcnode-id="3842"><strong data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">Worst case risks might include</span></strong></p><span data-dcnode-id="3841" instrument_node="">
</span><ul data-dcnode-id="3833"><span data-dcnode-id="3840" instrument_node="">
</span><li data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">Determining the business cannot support itself on an ongoing basis. </span></li><span data-dcnode-id="3837" instrument_node="">
</span><li data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">Dealing with the financial, business, and personal devastation of the venture’s failure.&nbsp; Survivable but painful.</span></li><span data-dcnode-id="3834" instrument_node="">
</span></ul><span data-dcnode-id="3832" instrument_node="">
