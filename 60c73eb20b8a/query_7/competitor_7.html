</span><h3 data-dcnode-id="559" id="business-name"><span data-dcnode-id="560"><span data-dcnode-id="561" instrument_node=""> Barton Interiors</span></span></h3><span data-dcnode-id="558" instrument_node="">
</span><h2 data-dcnode-id="554"><span data-dcnode-id="557" instrument_node="">
                                    Company Summary                                        </span><span data-container="#plan-text" data-dcnode-id="556" data-original-title="A company summary (sometimes called a <a href='https://articles.bplans.com/write-company-overview/' target='_blank' rel='noopener'>company overview</a>) is an overview of the most important points about your company—your history, management team, location, mission statement and legal structure." data-toggle="tooltip" id="title-tooltip-btn" title=""></span><span data-dcnode-id="555" instrument_node="">
</span></h2><span data-dcnode-id="553" instrument_node="">
</span><div data-dcnode-id="535" id="sample_plan_page_content"><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Barton Interiors&nbsp;is a start-up business that will offer comprehensive interior design services&nbsp;for home and office.&nbsp; This business&nbsp;will assist those&nbsp;that want to have guidance and council&nbsp;in developing a basic&nbsp;design&nbsp;concept of&nbsp;their project, to the person that desires someone to take it from concept to complete implementation.&nbsp; Barton Interiors will offer the ability for clients to purchase new and antique&nbsp;furniture, art work, decorator fabric,&nbsp;and&nbsp;home accessories.&nbsp;&nbsp;The website www.bartoninteriors.com will be used as another way to communicate&nbsp;the services&nbsp;available&nbsp;and provide a portfolio of the work accomplished.&nbsp; The business will begin as a home-based business and is expected to remain in this structure through at least the first three years.</span></p><span data-dcnode-id="549" instrument_node="">
</span><h3 data-dcnode-id="547" id="Company_Ownership"><span data-dcnode-id="548" instrument_node="">Company Ownership</span></h3><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Barton Interiors, located in Boulder, Colorado&nbsp;is registered in the State of Colorado as&nbsp;a sole proprietorship owned and operated by Jill Barton dba Barton Interiors. </span></p><span data-dcnode-id="543" instrument_node="">
</span><h3 data-dcnode-id="541" id="Company_Locations_and_Facilities"><span data-dcnode-id="542" instrument_node="">Company Locations and Facilities</span></h3><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Barton Interiors is operated from a home office located in Boulder, Colorado.&nbsp; A room is dedicated to support&nbsp;a work area, a client contact work center, and&nbsp;display samples of design concepts, products, and past work.&nbsp; </span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="536"></p></div><span data-dcnode-id="534" instrument_node="">
