</span><article class="post-135436 post type-post status-publish format-standard has-post-thumbnail hentry category-optimism" data-dcnode-id="855" id="post-135436"><span data-dcnode-id="1490" instrument_node="">
</span><div class="entry-content" data-dcnode-id="857"><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1484"><img alt="Toxic Positivity" class="alignright wp-image-135522 size-medium lazyloaded" data-dcnode-id="1488" data-src="https://positivepsychology.com/wp-content/uploads/2021/03/Toxic-Positivity-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2021/03/Toxic-Positivity-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/03/Toxic-Positivity-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/03/Toxic-Positivity.jpg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/wp-content/uploads/2021/03/Toxic-Positivity-300x150.jpg&amp;raw" srcset="https://positivepsychology.com/wp-content/uploads/2021/03/Toxic-Positivity-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/03/Toxic-Positivity-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/03/Toxic-Positivity.jpg 800w" title="Avoiding the positivity trap" width="300"><noscript data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">&lt;img class="alignright wp-image-135522 size-medium lazyload" title="Avoiding the positivity trap" src="https://positivepsychology.com/wp-content/uploads/2021/03/Toxic-Positivity-300x150.jpg" alt="Toxic Positivity" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/2021/03/Toxic-Positivity-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/03/Toxic-Positivity-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/03/Toxic-Positivity.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="1485" instrument_node="">“Just think happy thoughts!”</span></p><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">“Don’t worry, be happy!”</span></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">“Look on the bright side!”</span></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">“It could be worse!”</span></p><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">“Good vibes only!”</span></p><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Although well intentioned, these phrases can be downright harmful. It turns out that the phrase “too much of a good thing can be bad” also applies to positivity.</span></p><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">The overgeneralization and encouragement of happy emotions across all areas is referred to as ‘toxic positivity.’ How can positivity be toxic, you may ask? Positivity has a time and place, and if ill timed or relied on in an inappropriate situation, positivity has the potential to be dangerous. Everything in moderation.</span></p><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1464" instrument_node="">Before you continue, we thought you might like to </span><a data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/ebook" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1463" instrument_node="">download our three Positive Psychology Exercises for free</span></a><span data-dcnode-id="1461" instrument_node="">. These science-based exercises explore fundamental aspects of positive psychology, including strengths, values, and self-compassion, and will give you the tools to enhance the wellbeing of your clients, students, or employees.</span></p><span data-dcnode-id="1459" instrument_node="">
</span><div data-dcnode-id="1415" id="inhoud"><span data-dcnode-id="1458" instrument_node="">
</span><h2 data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">This Article Contains:</span></h2><span data-dcnode-id="1455" instrument_node="">
</span><ul data-dcnode-id="1417"><span data-dcnode-id="1454" instrument_node="">
</span><li data-dcnode-id="1451"><a data-dcnode-id="1452" href="#toxic-positivity"><span data-dcnode-id="1453" instrument_node="">What Is Toxic Positivity According to Psychology?</span></a></li><span data-dcnode-id="1450" instrument_node="">
</span><li data-dcnode-id="1447"><a data-dcnode-id="1448" href="#examples"><span data-dcnode-id="1449" instrument_node="">2 Examples of Toxic Positivity</span></a></li><span data-dcnode-id="1446" instrument_node="">
</span><li data-dcnode-id="1443"><a data-dcnode-id="1444" href="#research-findings"><span data-dcnode-id="1445" instrument_node="">2 Fascinating Research Findings on Toxic Positivity</span></a></li><span data-dcnode-id="1442" instrument_node="">
</span><li data-dcnode-id="1439"><a data-dcnode-id="1440" href="#avoiding"><span data-dcnode-id="1441" instrument_node="">How to Avoid Using Toxic Positivity</span></a></li><span data-dcnode-id="1438" instrument_node="">
</span><li data-dcnode-id="1435"><a data-dcnode-id="1436" href="#books"><span data-dcnode-id="1437" instrument_node="">5 Interesting Books on the Topic</span></a></li><span data-dcnode-id="1434" instrument_node="">
</span><li data-dcnode-id="1431"><a data-dcnode-id="1432" href="#podcasts"><span data-dcnode-id="1433" instrument_node="">Top 4 Podcasts &amp; TED Talks</span></a></li><span data-dcnode-id="1430" instrument_node="">

</span><li data-dcnode-id="1423"><a data-dcnode-id="1424" href="#home"><span data-dcnode-id="1425" instrument_node="">A Take-Home Message</span></a></li><span data-dcnode-id="1422" instrument_node="">
</span><li data-dcnode-id="1419"><a data-dcnode-id="1420" href="#references"><span data-dcnode-id="1421" instrument_node="">References</span></a></li><span data-dcnode-id="1418" instrument_node="">
</span></ul><span data-dcnode-id="1416" instrument_node="">
</span></div><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1412"><a data-dcnode-id="1413" name="toxic-positivity"></a></p><span data-dcnode-id="1411" instrument_node="">
</span><h2 data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">What Is Toxic Positivity According to Psychology?</span></h2><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1407" instrument_node="">Let’s begin with what toxic positivity is not. Toxic positivity is not genuine encouragement at the right time. Toxic positivity is maintaining that one should have a </span><a data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/positive-mindset/"><span data-dcnode-id="1406" instrument_node="">positive mindset</span></a><span data-dcnode-id="1404" instrument_node=""> and exude only </span><a data-dcnode-id="1402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/positive-emotions-list-examples-definition-psychology/"><span data-dcnode-id="1403" instrument_node="">positive emotions</span></a><span data-dcnode-id="1401" instrument_node=""> and thoughts at all times, particularly when things are difficult. This approach is damaging because it discounts and discredits emotions that are not positive.</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Toxic positivity can be described as rejecting, denying, or displacing “any acknowledgement of stress, negativity, and possible disabling features of trauma” (Sokal, Trudel, &amp; Babb, 2020).</span></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Furthermore, Satriopamungkas, Yudani, and Wirawan (2020) define toxic positivity as the constant encouragement and excessive tendency to only see the good side of something and failing to understand the emotion that accompanies the experience.</span></p><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1388"><a data-dcnode-id="1389" name="examples"></a></p><span data-dcnode-id="1387" instrument_node="">
</span><h2 data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">2 Examples of Toxic Positivity</span></h2><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1380"><img alt="" class="alignright wp-image-135524 size-medium lazyloaded" data-dcnode-id="1383" data-src="https://positivepsychology.com/wp-content/uploads/2021/03/Office-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2021/03/Office-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/03/Office-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/03/Office.jpg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/wp-content/uploads/2021/03/Office-300x150.jpg&amp;raw" srcset="https://positivepsychology.com/wp-content/uploads/2021/03/Office-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/03/Office-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/03/Office.jpg 800w" title="Examples of toxic positivity" width="300"><noscript data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">&lt;img class="alignright wp-image-135524 size-medium lazyload" title="Examples of toxic positivity" src="https://positivepsychology.com/wp-content/uploads/2021/03/Office-300x150.jpg" alt="" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/2021/03/Office-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/03/Office-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/03/Office.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></p><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">While refilling your coffee mug in the office break room, a coworker vulnerably shares with you that his dog passed away the previous week. Further, last night he found out his wife has cancer, and he feels as though he may soon lose his job.</span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1375" instrument_node="">You respond, “</span><em data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Think positive thoughts.</span></em><span data-dcnode-id="1372" instrument_node="">” </span><a data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/positive-thinking/"><span data-dcnode-id="1371" instrument_node="">Thinking positive thoughts</span></a><span data-dcnode-id="1369" instrument_node=""> will not help his situation. In fact, these words have now worsened his situation because they invalidated his emotions. This exchange has now ended because this individual is no longer invited to discuss his concerns.</span></p><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1366" instrument_node="">An abuse victim confides with a family member about the physical and mental abuse she has been enduring, and the family member responds, “</span><em data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Be grateful for what you have. You have a husband who takes care of you financially</span></em><span data-dcnode-id="1363" instrument_node="">.”</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Encouraging a victim of abuse to experience gratitude devalues her cry for help. This toxic positivity could cause even more danger for this individual, who may now view the abuse as inconsequential.</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">The family member’s poor response may discourage the victim of abuse from facing the reality of her situation (Sinclair, Hart, &amp; Lomas, 2020). This is not only harmful, but could be deadly.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1350"><a data-dcnode-id="1351" name="research-findings"></a></p><span data-dcnode-id="1349" instrument_node="">
</span><h2 data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">2 Fascinating Research Findings on Toxic Positivity</span></h2><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Campbell-Sills, Barlow, Brown, and Hofmann (2006) studied the difference in physiological effects between people who were asked either to suppress or accept their emotions while watching an emotion-provoking film.</span></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Sixty individuals with anxiety or mood disorder took part in this study. The researchers monitored the participants’ subjective distress, heart rate, skin conductance level, and respiratory sinus arrhythmia before, during, and after the film.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1339" instrument_node="">The researchers found that while the subjective responses were equal in both groups, the participants who were asked to suppress their emotions showed an increased heart rate following the film. Higher levels of </span><a data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/positive-negative-affect/"><span data-dcnode-id="1338" instrument_node="">negative affect, lower levels of positive affect</span></a><span data-dcnode-id="1336" instrument_node="">, poorer social adjustment, and decreased wellbeing have been linked to repeated suppression of emotions, as these researchers have concluded.</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1333" instrument_node="">Positive self-statements were examined by Wood, Perunovic, and Lee (2009) in three interrelated studies and were found to have the most impact on individuals with low </span><a data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/self-esteem/"><span data-dcnode-id="1332" instrument_node="">self-esteem</span></a><span data-dcnode-id="1330" instrument_node="">. Astonishingly, the impact was negative.</span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Using the self-comparison theory (Talaifar &amp; Swann, 2020) as a lens, positive self-statements may contradict an individual’s self-view, causing the individual to reject the statement or hold onto their original preconception of themselves. In summary, positive self-statements may be beneficial for some people but detrimental to others.</span></p><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1320"><a data-dcnode-id="1321" name="avoiding"></a></p><span data-dcnode-id="1319" instrument_node="">
</span><h2 data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">How to Avoid Using Toxic Positivity</span></h2><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1309"><img alt="Showing Empathy" class="alignright wp-image-135525 size-medium lazyload" data-dcnode-id="1315" data-src="https://positivepsychology.com/wp-content/uploads/2021/03/Showing-Empathy-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2021/03/Showing-Empathy-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/03/Showing-Empathy-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/03/Showing-Empathy.jpg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Empathy is useful to avoid toxic positivity" width="300"><noscript data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">&lt;img class="alignright wp-image-135525 size-medium lazyload" title="Empathy is useful to avoid toxic positivity" src="https://positivepsychology.com/wp-content/uploads/2021/03/Showing-Empathy-300x150.jpg" alt="Showing Empathy" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/2021/03/Showing-Empathy-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/03/Showing-Empathy-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/03/Showing-Empathy.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><a data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/empathy/"><span data-dcnode-id="1312" instrument_node="">Empathy</span></a><span data-dcnode-id="1310" instrument_node=""> is an essential element in any relationship, and we need to meet people where they are in terms of their emotions.</span></p><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Perpetually having a “good vibes only” mantra devalues people’s emotions and sends the message of rejection, which can be dangerous to relationships.</span></p><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Why do we sometimes resort to toxic positivity? Because sometimes we just don’t have the right words to say to the person struggling with the negative emotion.</span></p><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Adjusting the language we use can help us avoid toxic positivity. One should refrain from using phrases such as “it could be worse,” “look on the bright side,” and “be thankful for what you have.” While these positive phrases may seem helpful in encouraging a positive mindset, they could, in fact, be harmful if used at an inappropriate time or for specific events.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1291"><span data-dcnode-id="1298" instrument_node="">See the </span><a data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/wp-content/uploads/2021/03/Harmful-to-Helpful-Toxic-Positivity-Phrases.pdf" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="1297" instrument_node="">Harmful to Helpful Toxic Positivity Phrases</span></a><span data-dcnode-id="1295" instrument_node=""> worksheet listing phrases to avoid using and suggested replacement phrases we can use instead. One should refrain from using statements in the first column and instead use the example responses in the second column, particularly when responding to those who confide </span><a data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/negative-emotions/"><span data-dcnode-id="1294" instrument_node="">negative emotions</span></a><span data-dcnode-id="1292" instrument_node=""> in the workplace and in personal relationships.</span></p><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">To build on this response, suggestions in the third column are particularly helpful for those in a position of authority, such as a teacher or supervisor, and when talking to people with depression.</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Considering relationships, both professional and personal, toxic positivity may deter the individual from sharing future struggles with you. It would be deleterious to a coworker’s career if you said that their bombed presentation was “just terrific” and told her, “don’t worry that it offended most of the audience.” Alternatively, you may say, “I know the feeling. Would you like to rehearse our next presentations with each other?”</span></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1283" instrument_node="">Perhaps reviewing these </span><a data-dcnode-id="1281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/resilience-quotes/"><span data-dcnode-id="1282" instrument_node="">Resilience &amp; Adversity Quotes</span></a><span data-dcnode-id="1280" instrument_node="">&nbsp;will help you avoid toxic positivity and instead </span><a data-dcnode-id="1278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/resilience-training/"><span data-dcnode-id="1279" instrument_node="">encourage resilience</span></a><span data-dcnode-id="1277" instrument_node="">. These quotes help to explain the importance of negative emotions and how to use them to empower yourself.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1270"><a data-dcnode-id="1271" name="books"></a></p><span data-dcnode-id="1269" instrument_node="">
</span><h2 data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">5 Interesting Books on the Topic</span></h2><span data-dcnode-id="1266" instrument_node="">
</span><h3 data-dcnode-id="1261"><span data-dcnode-id="1265" instrument_node="">1. </span><em data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Toxic Positivity</span></em><span data-dcnode-id="1262" instrument_node=""> – Theo Tucker</span></h3><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1255"><a data-dcnode-id="1256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/1715910192/" rel="noopener noreferrer" target="_blank"><img alt="Toxic Positivity" class="alignright wp-image-135428 lazyload" data-dcnode-id="1259" data-src="https://positivepsychology.com/wp-content/uploads/2021/03/Toxic-Positivity-Book-300x294.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2021/03/Toxic-Positivity-Book-300x294.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/03/Toxic-Positivity-Book.jpg 486w" height="191" sizes="(max-width: 195px) 100vw, 195px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Toxic Positivity" width="195"><noscript data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">&lt;img class="alignright wp-image-135428 lazyload" title="Toxic Positivity" src="https://positivepsychology.com/wp-content/uploads/2021/03/Toxic-Positivity-Book-300x294.jpg" alt="Toxic Positivity" width="195" height="191" srcset="https://positivepsychology.com/wp-content/uploads/2021/03/Toxic-Positivity-Book-300x294.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/03/Toxic-Positivity-Book.jpg 486w" sizes="(max-width: 195px) 100vw, 195px" /&gt;</span></noscript></a></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">In the foreword, Tucker commands the reader’s attention when describing a situation when toxic positivity could have cost someone their life.</span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">The author recounts a time when he was headed to conduct a Bible study at church. He approached a gentleman who was visibly upset after ending a call on a payphone. He asked the man if he was okay, and the man responded, “No.”</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Tucker could have thrown out an empty positive phrase to diffuse the scene; however, what he did next may very well have saved the man’s life. Tucker elicited the help of a nearby elder.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">This elder was able to talk to the gentleman and found that he planned to take his life in the parking lot. Things could have ended very differently had toxic positivity been used. Tucker analyzes five seemingly harmless phrases and explains what makes them toxic, offering suggestions for what to say instead.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1241" instrument_node="">Find the book on </span><a data-dcnode-id="1239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/1715910192/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1240" instrument_node="">Amazon</span></a><span data-dcnode-id="1238" instrument_node="">.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1233" instrument_node="">
</span><h3 data-dcnode-id="1228"><span data-dcnode-id="1232" instrument_node="">2. </span><em data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Bright-Sided: How Positive Thinking Is Undermining America</span></em><span data-dcnode-id="1229" instrument_node=""> – Barbara Ehrenreich</span></h3><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1222"><a data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/0312658850/" rel="noopener noreferrer" target="_blank"><img alt="Bright-sided" class="alignright wp-image-135427 lazyload" data-dcnode-id="1226" data-src="https://positivepsychology.com/wp-content/uploads/2021/03/Bright-sided-200x300.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2021/03/Bright-sided-200x300.jpg 200w, https://positivepsychology.com/wp-content/uploads/2021/03/Bright-sided.jpg 333w" height="292" sizes="(max-width: 195px) 100vw, 195px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Bright-sided" width="195"><noscript data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">&lt;img class="alignright wp-image-135427 lazyload" title="Bright-sided" src="https://positivepsychology.com/wp-content/uploads/2021/03/Bright-sided-200x300.jpg" alt="Bright-sided" width="195" height="292" srcset="https://positivepsychology.com/wp-content/uploads/2021/03/Bright-sided-200x300.jpg 200w, https://positivepsychology.com/wp-content/uploads/2021/03/Bright-sided.jpg 333w" sizes="(max-width: 195px) 100vw, 195px" /&gt;</span></noscript></a></p><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Positive phrases do not pay the mortgage, nor do they cure cancer. Author Barbara Ehrenreich describes toxic positivity as a “reckless optimism” when she was confronted with optimistic statements following her diagnosis with breast cancer.</span></p><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">She explains that it is important to prepare ourselves for life’s challenges, and the ever-cheerful outlook that seems to be taking over America cannot accomplish this. Ehrenreich begs for a change in this cultural attitude.</span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1214" instrument_node="">Find the book on </span><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/0312658850/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1213" instrument_node="">Amazon</span></a><span data-dcnode-id="1211" instrument_node="">.</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1206" instrument_node="">
</span><h3 data-dcnode-id="1201"><span data-dcnode-id="1205" instrument_node="">3. </span><em data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Emotional Agility: Get Unstuck, Embrace Change and Thrive in Work and Life</span></em><span data-dcnode-id="1202" instrument_node=""> – Susan David</span></h3><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1195"><a data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B017SAEYNI/" rel="noopener noreferrer" target="_blank"><img alt="Emotional Agility" class="alignright wp-image-135426 lazyload" data-dcnode-id="1199" data-src="https://positivepsychology.com/wp-content/uploads/2021/03/Emotional-Agility-Book-196x300.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2021/03/Emotional-Agility-Book-196x300.jpg 196w, https://positivepsychology.com/wp-content/uploads/2021/03/Emotional-Agility-Book.jpg 326w" height="299" sizes="(max-width: 195px) 100vw, 195px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Emotional Agility" width="195"><noscript data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">&lt;img class="alignright wp-image-135426 lazyload" title="Emotional Agility" src="https://positivepsychology.com/wp-content/uploads/2021/03/Emotional-Agility-Book-196x300.jpg" alt="Emotional Agility" width="195" height="299" srcset="https://positivepsychology.com/wp-content/uploads/2021/03/Emotional-Agility-Book-196x300.jpg 196w, https://positivepsychology.com/wp-content/uploads/2021/03/Emotional-Agility-Book.jpg 326w" sizes="(max-width: 195px) 100vw, 195px" /&gt;</span></noscript></a></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Dr. Susan David introduces emotional agility as what differentiates people who master challenges from people who are thwarted by them.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Dr. David’s life work of studying emotions, happiness, and achievement led her to developing the idea of emotional agility. She defines emotional agility as accepting difficult emotions, making slight changes, and adapting to the presented challenge.</span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">This book explains the importance of experiencing negative emotions and how to turn those experiences into success.</span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1184" instrument_node="">Find the book on </span><a data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B017SAEYNI/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1183" instrument_node="">Amazon</span></a><span data-dcnode-id="1181" instrument_node="">.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1176" instrument_node="">
</span><h3 data-dcnode-id="1171"><span data-dcnode-id="1175" instrument_node="">4. </span><em data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Manage My Emotions: What I Wish I’d Learned in School About Anger, Fear and Love</span></em><span data-dcnode-id="1172" instrument_node=""> – Kenneth Martz</span></h3><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1165"><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B08GZV98NX/" rel="noopener noreferrer" target="_blank"><img alt="Manage my emotions" class="alignright wp-image-135425 lazyload" data-dcnode-id="1169" data-src="https://positivepsychology.com/wp-content/uploads/2021/03/Manage-my-emotions-200x300.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2021/03/Manage-my-emotions-200x300.jpg 200w, https://positivepsychology.com/wp-content/uploads/2021/03/Manage-my-emotions.jpg 333w" height="293" sizes="(max-width: 195px) 100vw, 195px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Manage my emotions" width="195"><noscript data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">&lt;img class="alignright wp-image-135425 lazyload" title="Manage my emotions" src="https://positivepsychology.com/wp-content/uploads/2021/03/Manage-my-emotions-200x300.jpg" alt="Manage my emotions" width="195" height="293" srcset="https://positivepsychology.com/wp-content/uploads/2021/03/Manage-my-emotions-200x300.jpg 200w, https://positivepsychology.com/wp-content/uploads/2021/03/Manage-my-emotions.jpg 333w" sizes="(max-width: 195px) 100vw, 195px" /&gt;</span></noscript></a></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1159"><span data-dcnode-id="1163" instrument_node="">This four-part book not only acknowledges both </span><a data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/positive-negative-emotions/"><span data-dcnode-id="1162" instrument_node="">positive and negative emotions</span></a><span data-dcnode-id="1160" instrument_node="">, it also helps readers understand their emotions, leading to a purpose-driven life based on true emotional needs.</span></p><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Additionally, Dr. Kenneth Martz provides effective self-assessment exercises that support the reader in developing the ability to control emotions and limit the effect of ‘less comfortable emotions.’</span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">These include 8 powerful ways to conquer fear, 14 thoughtful tools to manage anger, and 12 simple exercises to quiet one’s worry.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">This book gives an excellent insight into understanding emotions, which is helpful in combating toxic positivity.</span></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1148" instrument_node="">Find the book on </span><a data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B08GZV98NX/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1147" instrument_node="">Amazon</span></a><span data-dcnode-id="1145" instrument_node="">.</span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1140" instrument_node="">
</span><h3 data-dcnode-id="1135"><span data-dcnode-id="1139" instrument_node="">5. </span><em data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Be Positive: Fuck Toxic Positivity</span></em><span data-dcnode-id="1136" instrument_node=""> – Briah Fleming</span></h3><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1129"><a data-dcnode-id="1130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/1692098381/" rel="noopener noreferrer" target="_blank"><img alt="Be Positive" class="alignright wp-image-135429 size-medium lazyload" data-dcnode-id="1133" data-src="https://positivepsychology.com/wp-content/uploads/2021/03/Be-Positive-195x300.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2021/03/Be-Positive-195x300.jpg 195w, https://positivepsychology.com/wp-content/uploads/2021/03/Be-Positive.jpg 324w" height="300" sizes="(max-width: 195px) 100vw, 195px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Be Positive" width="195"><noscript data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">&lt;img class="alignright wp-image-135429 size-medium lazyload" title="Be Positive" src="https://positivepsychology.com/wp-content/uploads/2021/03/Be-Positive-195x300.jpg" alt="Be Positive" width="195" height="300" srcset="https://positivepsychology.com/wp-content/uploads/2021/03/Be-Positive-195x300.jpg 195w, https://positivepsychology.com/wp-content/uploads/2021/03/Be-Positive.jpg 324w" sizes="(max-width: 195px) 100vw, 195px" /&gt;</span></noscript></a></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Pardon the language of the title; however, this book provides daily affirmations that encourage the reader to create peace and happiness in the way they think, speak, and act, all the while discouraging the “good vibes only” catchphrase.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">The affirmations were created to be read, meditated on, and lived by. These mantras are intended to replace the use of toxic positivity.</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1121" instrument_node="">Find the book on </span><a data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/1692098381/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1120" instrument_node="">Amazon</span></a><span data-dcnode-id="1118" instrument_node="">.</span></p><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><a data-dcnode-id="1112" name="podcasts"></a></p><span data-dcnode-id="1110" instrument_node="">
</span><h2 data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Top 4 Podcasts &amp; TED Talks</span></h2><span data-dcnode-id="1107" instrument_node="">
</span><h3 data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Dr. Susan David with Brené Brown on the dangers of toxic positivity</span></h3><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Brené Brown sits down with Dr. Susan David, presenter of the TED Talk “The Gift and Power of Emotional Courage,” to discuss the negative effects of toxic positivity.</span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Dr. David shares her very personal experience of how positivity was forced upon her as a child following her father’s diagnosis of terminal cancer and her family’s struggle following his death.</span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">That year, her grade school teacher exercised a monumental activity for her class. Dr. David was handed a blank journal and told to “tell the truth, and write like no one is reading.” This ongoing activity allowed an outlet for Dr. David and enabled her to organize and understand the emotions she was experiencing, despite the toxic positivity she was being exposed and subjected to.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1094" instrument_node="">Access this </span><a data-dcnode-id="1092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brenebrown.com/podcast/brene-with-dr-susan-david-on-the-dangers-of-toxic-positivity-part-1-of-2/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1093" instrument_node="">podcast</span></a><span data-dcnode-id="1091" instrument_node=""> episode.</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1086" instrument_node="">
</span><h3 data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">How much is too much?</span></h3><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Dr. Allison Niebes-Davis describes toxic positivity as the minimization and invalidation of some of life’s more painful moments.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">As she delineates positivity from toxic positivity, she notes the importance of feeling, expressing, and validating negative emotions. She references the “good vibes only” saying and notes how dangerous this thinking really is.</span></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lazyload" data-dcnode-id="1076" data-src="https://www.youtube.com/embed/t2kAkbdS2S4?feature=oembed" frameborder="0" height="360" title="Toxic Positivity: The Harmful Habit to Stop Immediately" width="640"></iframe></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1071" instrument_node="">
</span><h3 data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">How Toxic Positivity Leads to More Suffering</span></h3><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Mahmoud Khedr shares how toxic positivity causes more suffering than good. Khedr’s personal struggles with mental health, which almost led him to suicide, helped him to conclude that positivity can be toxic in some forms.</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">He paints a vivid picture of the failures of positivity in inappropriate times. For example, Khedr asks an audience member to imagine that after breaking their arm, Khedr responded, “Just be happy!” instead of taking them to the hospital.</span></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lazyload" data-dcnode-id="1061" data-src="https://www.youtube.com/embed/5EOj2Z7hw5w?feature=oembed" frameborder="0" height="360" title="How Toxic Positivity Leads to More Suffering | Mahmoud Khedr | TEDxMenloCollege" width="640"></iframe></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1056" instrument_node="">
</span><h3 data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">The Problem With Positivity</span></h3><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Tiffany Yu begins the presentation by sharing her experience of taking a step back from her overly positive Instagram posts during the wildfires in California and the realization that these posts did not truly reflect how she was actually feeling.</span></p><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1049" instrument_node="">More personally, she shares her experience of internalized toxic positivity. As a child, she was involved in a car accident that killed her father. She believed that by admitting to the car accident and </span><a data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/express-emotions/"><span data-dcnode-id="1048" instrument_node="">expressing her emotions</span></a><span data-dcnode-id="1046" instrument_node="">, she would bring shame to herself and her family.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">She later learned that because of hiding these feelings and failing to acknowledge her emotions, she had developed post-traumatic stress disorder. Additionally, she reaffirms the importance of empathy and asserts that relationships are built and become stronger during the vulnerable moments that we share.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1039"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lazyload" data-dcnode-id="1040" data-src="https://www.youtube.com/embed/CH2giVyDjKo?feature=oembed" frameborder="0" height="360" title="The Problem with Positivity | Tiffany Yu | TEDxYouth@CaliforniaHighSchool" width="640"></iframe></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><a data-dcnode-id="1034" name="resources"></a></p><span data-dcnode-id="1032" instrument_node="">
</span><h2 data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">PositivePsychology.com’s Relevant Resources</span></h2><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1028" instrument_node="">This </span><a data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/wp-content/uploads/2021/08/Levels-of-Validation.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1027" instrument_node="">Levels of Validation</span></a><span data-dcnode-id="1025" instrument_node=""> worksheet is a valuable tool that can help you assess your ability to validate others’ emotions, so you can identify ways to listen with more empathy.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1022" instrument_node="">Additionally, </span><a data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/wp-content/uploads/2020/10/10-Tips-for-Coping-with-Your-Partner%25E2%2580%2599s-Upset.pdf" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="1021" instrument_node="">10 Tips for Coping With Your Partner’s Upset</span></a><span data-dcnode-id="1019" instrument_node=""> is a tool you could use concerning personal relationships. This tool will help you address negative emotions and prevent you from using the harmful terms associated with toxic positivity.</span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1016" instrument_node="">17 Positive Psychology Exercises – If you’re looking for more science-based ways to help others enhance their wellbeing, this signature collection contains </span><a data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/17-exercises-download" rel="noopener" target="_blank"><span data-dcnode-id="1015" instrument_node="">17 validated positive psychology tools for practitioners</span></a><span data-dcnode-id="1013" instrument_node="">. Use them to help others flourish and thrive.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1006"><a data-dcnode-id="1007" name="home"></a></p><span data-dcnode-id="1005" instrument_node="">
</span><h2 data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">A Take-Home Message</span></h2><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Positivity can be mind altering.</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">But delivering positivity disingenuously or during unsuitable times can cause toxic positivity.</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Toxic positivity in the workplace can damage relationships and business productivity. Martin Seligman’s Theory of Authentic Happiness demonstrates the necessity for negativity. The premise of this theory is that authentic happiness involves developing one’s strengths (Mageed &amp; Mohamed, 2020).</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">To develop strengths, you must know your needs for improvement. With only positive statements, there is no room for constructive feedback, which is crucial for advancement.</span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Besides the workplace, an educator must give students feedback, both positive and negative. Likewise, during parent–teacher conferences, the teacher must remain honest while tactfully sharing constructive feedback about the student. Toxic positivity shared during a parent–teacher conference could lead to future problems if the parent only finds out their child is failing after the school year is over.</span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Positivity isn’t bad.</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">It is only harmful if it is disingenuously encouraged and when it dismisses other emotions. Thinking positively and encouraging positive vibes has its time and place; however, perhaps we should consider modifying the mantra “good vibes only” to “any vibe accepted” when listening to others and considering our own emotions.</span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">So before uttering another hakuna matata, consider the consequences and apply compassion and empathy instead.</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">It can be life altering.</span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="974" instrument_node="">We hope you enjoyed reading this article. Don’t forget to </span><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/ebook" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="973" instrument_node="">download our three Positive Psychology Exercises for free</span></a><span data-dcnode-id="971" instrument_node="">.</span></p><span data-dcnode-id="969" instrument_node="">
