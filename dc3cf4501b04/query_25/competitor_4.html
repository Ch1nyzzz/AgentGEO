</span><a class="linkedin" data-dcnode-id="1513" href="javascript:void(0);" onclick="window.open('https://www.linkedin.com/shareArticle?mini=true&amp;summary=People+are+drawn+to+those+who+have+a+positive+attitude+because+of+the+contagious+energy+they+exude.&amp;title=15+Tips+for+Maintaining+a+Positive+Attitude+Every+Day&amp;url=https%3A%2F%2Fwww.lifehack.org%2Farticles%2Fcommunication%2F11-tips-for-maintaining-your-positive-attitude.html', '_blank', 'location=yes,height=570,width=520,scrollbars=yes,status=yes');" title="Share on LinkedIn"><i class="fa fa-linkedin" data-dcnode-id="1515"></i><span data-dcnode-id="1514" instrument_node=""> Share</span></a><span data-dcnode-id="1512" instrument_node="">

</span><a class="email" data-dcnode-id="1506" href="mailto:?subject=15%20Tips%20for%20Maintaining%20a%20Positive%20Attitude%20Every%20Day&amp;body=Hi%20there%21%0A%0AI%20thought%20you%20might%20like%20this%20article%3A%0Ahttps%3A%2F%2Fwww.lifehack.org%2Farticles%2Fcommunication%2F11-tips-for-maintaining-your-positive-attitude.html%0A%0AThis%20is%20just%20a%20one-time%20email.%20If%20you%20want%20to%20get%20more%20articles%20like%20this%20subscribe%20to%20Lifehack%27s%20newsletter%20at%3A%20https%3A%2F%2Fwww.lifehack.org" title="Share by email"><i class="fa fa-envelope" data-dcnode-id="1508"></i><span data-dcnode-id="1507" instrument_node=""> Email</span></a><span data-dcnode-id="1505" instrument_node="">

</span></div><span data-dcnode-id="1499" instrument_node=""> </span><div class="article-content" data-dcnode-id="1008"><span data-dcnode-id="1498" instrument_node="">
</span><div class="bialty-container" data-dcnode-id="1093"><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">People are drawn to those who have a positive attitude because of the contagious energy they exude. They’re upbeat and positive and don’t succumb to pessimism even in the face of adversity.</span></p><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">So, how to keep a positive mindset? It is said that a positive mindset is connected with optimism, courage, and kindness, according to the idea of a positive mental attitude.</span></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">It is essential to maintain a good attitude and not give up hope when one is confronted with challenging circumstances. An optimistic person interacts with their emotions in a hopeful and constructive manner when the going gets difficult.</span></p><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Having a positive attitude is a choice you can make. You’ll build a better reality for yourself if you choose to see the positive in any situation and make the most of it.</span></p><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Here are the best tips to upkeep a positive attitude every day in your life.</span></p><span data-dcnode-id="1483" instrument_node="">
</span><h2 data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Useful Tips to Maintain a Positive Attitude Everyday</span></h2><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">When we talk about positivity, we often don’t know where to start. It can also happen that we tire ourselves by following what works for others. Find out the 15 best tips to practice positivity in your life and find out what works best for you.</span></p><span data-dcnode-id="1477" instrument_node="">
</span><h3 data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">1. You Determine Your Reality</span></h3><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">For at least several decades, the statement “you build your reality” has been part of the Western lexicon. Originally a statement advocated by those with a more positive attitude on life, the concept underlying the phrase may today be found in novels, television, popular music, and films.</span></p><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">The key to manifesting your dream life is to align yourself with your intentions. You may align yourself to get you where you want to go if you make a conscious effort to be self-aware of your ideas. Pay attention to your thoughts and the feelings they evoke.</span></p><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Determine your triggers and what causes you to become frustrated, upset, or anxious. Then, make choose your battles and win them too.</span></p><span data-dcnode-id="1465" instrument_node="">
</span><h3 data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">2. Start Your Day Strong</span></h3><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1457"><span data-dcnode-id="1461" instrument_node="">Starting the day with a clear head and a positive attitude is easier when your </span><a data-dcnode-id="1459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/articles/lifestyle/7-morning-rituals-empower-your-day-change-your-life.html"><span data-dcnode-id="1460" instrument_node="">morning ritual</span></a><span data-dcnode-id="1458" instrument_node=""> supports your long-term goals and mental health. Many people who have achieved success in their lives have a morning ritual they follow and use as “me time.”</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">There’s a good chance that affirmations and statements will help you. Intentionally using your voice to speak good words over your life is a powerful tool for overcoming negative thoughts and invalidating ideas, giving you a positive mental attitude.</span></p><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Exercise in the morning is a great way to jump-start your body, mind, and soul for the day ahead. When you know you’ve already met your daily target by 7 AM.</span></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1449"></p><div class="figure" data-dcnode-id="1427"><img alt="15 Tips for Maintaining a Positive Attitude Every Day" class="aligncenter wp-image-890426" data-dcnode-id="1448" data-lazy-sizes="(max-width: 495px) 100vw, 495px" data-lazy-src="https://cdn.lifehack.org/wp-content/uploads/2013/06/Best-Morning-Routine.png" data-lazy-srcset="https://cdn.lifehack.org/wp-content/uploads/2013/06/Best-Morning-Routine.png 1080w, https://cdn.lifehack.org/wp-content/uploads/2013/06/Best-Morning-Routine-170x170.png 170w" height="495" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20495%20495'%3E%3C/svg%3E" width="495"><noscript data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">&lt;img class="aligncenter wp-image-890426" src="https://cdn.lifehack.org/wp-content/uploads/2013/06/Best-Morning-Routine.png" width="495" height="495" srcset="https://cdn.lifehack.org/wp-content/uploads/2013/06/Best-Morning-Routine.png 1080w, https://cdn.lifehack.org/wp-content/uploads/2013/06/Best-Morning-Routine-170x170.png 170w" sizes="(max-width: 495px) 100vw, 495px" alt="15 Tips for Maintaining a Positive Attitude Every Day"&gt;</span></noscript><div class="image-share" data-dcnode-id="1428"><ul data-dcnode-id="1429"><li data-dcnode-id="1443"><a class="facebook" data-dcnode-id="1444" href="javascript:void(0);" onclick="window.open('https://www.facebook.com/sharer/sharer.php?u=https%3A%2F%2Fwww.lifehack.org%2Farticles%2Fcommunication%2F11-tips-for-maintaining-your-positive-attitude.html', '_blank', 'location=yes,height=570,width=520,scrollbars=yes,status=yes');" title="Share on Facebook"><i class="fa fa-fw fa-facebook" data-dcnode-id="1445"></i></a></li><li data-dcnode-id="1440"><a class="pinterest" data-dcnode-id="1441" href="javascript:void(0);" onclick="window.open('https://www.pinterest.com/pin/create/button/?description=People are drawn to those who have a positive attitude because of the contagious energy they exude.&amp;media=https://media.lifehack.org/wp-content/uploads/2013/06/positive-attitude-370x208.jpeg&amp;url=https%3A%2F%2Fwww.lifehack.org%2Farticles%2Fcommunication%2F11-tips-for-maintaining-your-positive-attitude.html&amp;autologin=true', '_blank', 'location=yes,height=570,width=520,scrollbars=yes,status=yes');" title="Share on Pinterest"><i class="fa fa-fw fa-pinterest" data-dcnode-id="1442"></i></a></li><li data-dcnode-id="1437"><a class="twitter" data-dcnode-id="1438" href="javascript:void(0);" onclick="window.open('https://twitter.com/intent/tweet?text=People are drawn to those who have a positive attitude because of the contagious energy they exude.&amp;url=https%3A%2F%2Fwww.lifehack.org%2Farticles%2Fcommunication%2F11-tips-for-maintaining-your-positive-attitude.html', '_blank', 'location=yes,height=570,width=520,scrollbars=yes,status=yes');" title="Share on Twitter"><i class="fa fa-fw fa-twitter" data-dcnode-id="1439"></i></a></li><li data-dcnode-id="1434"><a class="whatsapp" data-action="share/whatsapp/share" data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//api.whatsapp.com/send%3Ftext%3Dhttps%253A%252F%252Fwww.lifehack.org%252Farticles%252Fcommunication%252F11-tips-for-maintaining-your-positive-attitude.html" title="Share through Whatsapp"><i class="fa fa-fw fa-whatsapp" data-dcnode-id="1436"></i></a></li><li data-dcnode-id="1431"><a class="email" data-dcnode-id="1432" href="mailto:?subject=15%20Tips%20for%20Maintaining%20a%20Positive%20Attitude%20Every%20Day&amp;body=Hi%20there!%0A%0AI%20thought%20you%20might%20like%20this%20article:%0A%0Ahttps%3A%2F%2Fwww.lifehack.org%2Farticles%2Fcommunication%2F11-tips-for-maintaining-your-positive-attitude.html%0A%0AThis%20is%20just%20a%20one-time%20email.%20If%20you%20want%20to%20get%20more%20articles%20like%20this%20subscribe%20to%20Lifehack's%20newsletter%20at:%0A%0Ahttps://www.lifehack.org" title="Share by email"><i class="fa fa-fw fa-envelope" data-dcnode-id="1433"></i></a></li><ul data-dcnode-id="1430"></ul></ul></div></div><span data-dcnode-id="1426" instrument_node="">
</span><h3 data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">3. Exercise Is the Natural Feel-Good Drug</span></h3><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1422" instrument_node="">The majority of us are aware of how </span><a data-dcnode-id="1420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/articles/featured/15-tips-to-restart-the-exercise-habit-and-how-to-keep-it.html"><span data-dcnode-id="1421" instrument_node="">exercise</span></a><span data-dcnode-id="1419" instrument_node=""> affects our bodies. We increase our muscle mass or endurance. We see how regular exercise makes daily tasks like climbing stairs simpler. However, the link between our brain and our mood is less obvious.</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Workouts release hormones like norepinephrine, which help to boost cognitive thinking, learning, and mood. However, exercise isn’t the only benefit! Exercise-induced increased heart rate has the potential to repair stress-induced brain atrophy. </span></p><div class="ad-wrap-transparent article-top-ad container-fluid d-md-none" data-dcnode-id="1402"><span data-dcnode-id="1414" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1411" instrument_node="">
</span><div class="lazyload-ad incontent-inline-rect" data-dcnode-id="1407" data-id="lifehack_m_ATF2_ap" id="lifehack_m_ATF2_ap"><span data-dcnode-id="1410" instrument_node="">
</span><br data-dcnode-id="1409"><span data-dcnode-id="1408" instrument_node="">
</span></div><span data-dcnode-id="1406" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1403" instrument_node="">
</span></div><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Physical activity also forces the body’s many systems to interact more effectively, inculcating a positive attitude and helping the body to respond more effectively to worry and stress.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1397" instrument_node="">One study found that among groups who participated in high-intensity interval training, moderate continuous training, and no exercise, those in the second group experienced the greatest drop in depressive symptoms and stress</span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1395" id="footnote_plugin_tooltip_1" onclick="footnote_moveToAnchor('footnote_plugin_reference_1');"><span data-dcnode-id="1396" instrument_node="">[1]</span></sup><span class="footnote_tooltip" data-dcnode-id="1394" id="footnote_plugin_tooltip_text_1"></span><span data-dcnode-id="1393" instrument_node="">.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><h3 data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">4. Get Inspired by Books, Audio, and Videos</span></h3><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">There are moments in our lives when we fail to appreciate what we have right now because we are so focused on what is ahead. As soon as you start reading a motivational novel, you will be on the road to recovery reminiscing won’t bring it back to us any faster.</span></p><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Worrying about the future simply makes us feel more helpless and anxious. And that is not how to keep a positive mindset.</span></p><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1381" instrument_node="">Books are the ultimate solution to a bad day. Reading a </span><a data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/275217/10-inspirational-books-that-can-change-your-life"><span data-dcnode-id="1380" instrument_node="">good book</span></a><span data-dcnode-id="1378" instrument_node=""> is better than sweets, a nice movie, or retail therapy to boost confidence and self-esteem. Those pages will give you hope and motivation to get things done once you’ve finished reading them.</span></p><div class="convertflow-article-in-content cf-2355-area-14952" data-dcnode-id="1376"></div><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Also, nowadays, social media is flowing with many creative videos and audios curated with the content from such books that appeal to the young and old generations alike.</span></p><span data-dcnode-id="1372" instrument_node="">
</span><h3 data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">5. Hang out With Positive People</span></h3><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">In times of crisis, having a support system is critical, and negative people typically fail to supply this. It’s critical for your health to have a positive group of friends to lean on during physically and emotionally trying times. Positive people are frequently adept at offering a sympathetic ear, encouraging advice, and other assistance!</span></p><span data-dcnode-id="1366" instrument_node="">
</span><blockquote data-dcnode-id="1363"><p data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">“People with a positive attitude have more friends, which is a significant component of happiness and longevity,” – American Political Scientist, Robert D. Putnam.</span></p></blockquote><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">If having positive friends makes you happier, and as a result, you make more friends, you’ll be able to spread your happiness to new people and keep the positivity going. So, with optimism, pay it forward and discover how it may enhance your life and the lives of people around you!</span></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">We can’t do everything ourselves, no matter how much we’d want to believe we can. To keep motivated and on track, we need the love and support of those around us.</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1355" instrument_node="">Positive energy is contagious. According to research, whether you’re creating a network or hosting a fun event, it’s always crucial to have a community you respect around you on a regular basis. </span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1353" id="footnote_plugin_tooltip_2" onclick="footnote_moveToAnchor('footnote_plugin_reference_2');"><span data-dcnode-id="1354" instrument_node="">[2]</span></sup><span class="footnote_tooltip" data-dcnode-id="1352" id="footnote_plugin_tooltip_text_2"></span></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1349" instrument_node="">Choose your friends carefully; their level of positivity—or lack thereof—can greatly impact you. So if you want to be fit, then start to hang out with fit people. Want to start a business? Then hang out with business owners. And if you want to be positive, make sure you’re hanging out with positive people</span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1347" id="footnote_plugin_tooltip_3" onclick="footnote_moveToAnchor('footnote_plugin_reference_3');"><span data-dcnode-id="1348" instrument_node="">[3]</span></sup><span class="footnote_tooltip" data-dcnode-id="1346" id="footnote_plugin_tooltip_text_3"></span><span data-dcnode-id="1345" instrument_node="">.</span></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Emotions are contagious, and surrounding yourself with happy people can help you significantly!</span></p><span data-dcnode-id="1340" instrument_node="">
</span><h3 data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">6. Have an Open Mind</span></h3><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">It is our propensity to take everything for granted. As a society, we tend to focus on the negative aspects of our lives rather than appreciate the positive aspects, such as our health, our relationships, our capacity to participate in sports, and our potential to get an excellent education.</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">The never-ending cycle of dissatisfaction can be broken via appreciation. It provides space to find calmness in the hustle of life. How to have a positive attitude among such thoughts? </span></p><div class="ad-wrap-transparent article-top-ad container-fluid d-md-none" data-dcnode-id="1319"><span data-dcnode-id="1331" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1328" instrument_node="">
</span><div class="lazyload-ad incontent-inline-rect" data-dcnode-id="1324" data-id="lifehack_m_BTF1_ap" id="lifehack_m_BTF1_ap"><span data-dcnode-id="1327" instrument_node="">
</span><br data-dcnode-id="1326"><span data-dcnode-id="1325" instrument_node="">
</span></div><span data-dcnode-id="1323" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1320" instrument_node="">
</span></div><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Obstacles become opportunities when they are seen with gratitude. The potential to learn and develop lies in overcoming obstacles. With an open mind, you might approach the problem with an optimistic attitude rather than one that’s pessimistic. That is the secret to developing a positive mental attitude.</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Gratitude is a powerful force for good fortune in your life. Practicing gratitude in all aspects of your life, including your relationships, sports, school, and home, creates a pleasant attitude. When you show your appreciation towards others, their morale will rise, and they’ll be more motivated to work hard.</span></p><span data-dcnode-id="1312" instrument_node="">
</span><h3 data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">7. Rewire Pessimistic Thinking</span></h3><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">On occasion, we’re all prone to pessimistic thinking. Even when things appear to be going well, we often focus on the few things that aren’t. It takes time and practice to learn how to have a good attitude and quit focusing on the unpleasant aspects of one’s life.</span></p><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">For some people, worrying about the future or thinking adversely about others is an everyday occurrence, but for those who do so regularly, it is necessary to develop a set of behaviors that will halt these thoughts in their tracks. That is how to have a positive attitude.</span></p><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Be inquisitive, not critical of your own thoughts and actions. This is a way to be gentle with yourself when you’re having unpleasant thoughts. Allowing yourself some time for self-compassion can be a way to retrain your brain’s neural pathways.</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1294"><span data-dcnode-id="1299" instrument_node="">One particular study found that people who sent letters of gratitude experienced significant increases in happiness scores</span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1297" id="footnote_plugin_tooltip_4" onclick="footnote_moveToAnchor('footnote_plugin_reference_4');"><span data-dcnode-id="1298" instrument_node="">[4]</span></sup><span class="footnote_tooltip" data-dcnode-id="1296" id="footnote_plugin_tooltip_text_4"></span><span data-dcnode-id="1295" instrument_node="">.</span></p><span data-dcnode-id="1293" instrument_node="">
</span><h3 data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">8. Practice Gratitude</span></h3><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">In both direct and indirect ways, gratitude can have a positive impact on your health. Gratitude has been shown to strengthen the immune system, lower blood pressure, and produce a sense of relaxation.</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Those who are thankful, on the other hand, are more likely to adopt healthier lifestyle choices, such as upping their nutrient intake, getting more exercise, and avoiding dangerous behaviors.</span></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Individuals with a good attitude have better outcomes following medical operations, which is why it is important to cultivate thankfulness.</span></p><span data-dcnode-id="1281" instrument_node="">
</span><h3 data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">9. Turn on Some Music</span></h3><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">This may seem apparent, yet it’s worth emphasizing the natural chemical rationale behind it. Be aware that it just takes 10-15 minutes of listening to your favorite music for a natural high if you are ever feeling low.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">This is because when you listen to music you enjoy, your brain releases dopamine, a neurotransmitter that causes sensations of euphoria, excitement, and joy. Some people believe that is how to have a positive attitude when life weighs you down with negativity at times.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">For some time, music has been suggested as a means of reducing or managing stress. As a result, people may go to meditative music as a means of calming their brains and relaxing them.</span></p><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">It’s good news that this is one trend that is backed by the scientific community. Music can thus be a useful technique for coping with stress.</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">You can learn more about how to shift your mindset and negative attitudes in the following video:</span></p><span data-dcnode-id="1263" instrument_node="">
</span><div class="entry-content-asset" data-dcnode-id="1254"><div class="rll-youtube-player" data-dcnode-id="1257" data-id="w9tnln41WuY" data-query="feature=oembed&amp;enablejsapi=1&amp;origin=https://www.lifehack.org" data-src="https://www.youtube.com/embed/w9tnln41WuY"><div data-dcnode-id="1258" data-id="w9tnln41WuY" data-query="feature=oembed&amp;enablejsapi=1&amp;origin=https://www.lifehack.org" data-src="https://www.youtube.com/embed/w9tnln41WuY"><img alt="" data-dcnode-id="1262" data-lazy-src="https://i.ytimg.com/vi/w9tnln41WuY/hqdefault.jpg" height="360" loading="lazy" width="480"><noscript data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">&lt;img src="https://i.ytimg.com/vi/ID/hqdefault.jpg" alt="" width="480" height="360"&gt;</span></noscript><div class="play" data-dcnode-id="1259"></div></div></div><noscript data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">&lt;iframe loading="lazy" title="Lifehack Live Stream: Change Your Daily Mindset to Change Your Life" width="706" height="397" src="https://www.youtube.com/embed/w9tnln41WuY?feature=oembed&amp;amp;enablejsapi=1&amp;amp;origin=https://www.lifehack.org" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen&gt;&lt;/iframe&gt;</span></noscript></div><span data-dcnode-id="1253" instrument_node="">
</span><h3 data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">10. Accept Where You Are in the Present</span></h3><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Happiness, according to evolutionary psychologists, served as an adaptive advantage in the course of evolution. </span></p><div class="ad-wrap-transparent article-top-ad container-fluid d-md-none" data-dcnode-id="1238"><span data-dcnode-id="1247" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1244" instrument_node="">
</span><div class="pg-lazy incontent-inline-rect" data-dcnode-id="1243" data-gpt-parent="lifehack_m_BTF2_ap"></div><span data-dcnode-id="1242" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1239" instrument_node="">
</span></div><span data-dcnode-id="1237" instrument_node="">
</span><div class="cf-2355-area-21490" data-dcnode-id="1236"></div><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">When we are happier with a good attitude, we are better able to adapt to our surroundings and our social circles; we are also better able to pass on our happiness genes to our offspring. In the beginning, the pleasure was just a genetic variant, but as with all evolutionary adaptations, it has endured because it has helped us survive.</span></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Acceptance is the first step in the process. True happiness is a state of mind in which one accepts reality for what it is and even comes to appreciate and enjoy it.</span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">As a result of this acceptance, people feel content with a positive attitude. In order to truly be happy, one must accept the fact that things are as they are and that change is unavoidable. Those who are truly content with their lives are more likely to be adaptable because they are willing to accept change as an inevitable part of life.</span></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Understanding that both good and bad are fleeting in the grand scheme of things means that truly happy people have an appreciation for the fact that “this too shall pass.”</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1222" instrument_node="">One study found that reflecting on past experiences with a sense of gratitude can lead to increases in both hope and happiness</span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1220" id="footnote_plugin_tooltip_5" onclick="footnote_moveToAnchor('footnote_plugin_reference_5');"><span data-dcnode-id="1221" instrument_node="">[5]</span></sup><span class="footnote_tooltip" data-dcnode-id="1219" id="footnote_plugin_tooltip_text_5"></span><span data-dcnode-id="1218" instrument_node="">. That’s a great reason to give it a go today.</span></p><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1211"><span data-dcnode-id="1215" instrument_node="">You can find more ways to practice gratitude in</span><a data-dcnode-id="1213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/articles/communication/40-simple-ways-practice-gratitude.html"><span data-dcnode-id="1214" instrument_node=""> this article</span></a><span data-dcnode-id="1212" instrument_node="">.</span></p><span data-dcnode-id="1210" instrument_node="">
</span><h3 data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">11. Recharge Your Batteries</span></h3><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Because of the enormous amount of pressure people face in today’s society to reach a certain status, riches, or physical attractiveness, it can be easier to focus on our shortcomings than on our successes.</span></p><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">To achieve perfection might lead us to neglect our basic needs, such as psychological empowerment, companionship, and personal creative expression.</span></p><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Loving yourself is not selfish. The essence of self-love is the recognition of the necessity of prioritizing our own well-being over the well-being of others, as well as the pursuit of self-improvement rather than self-sacrifice.</span></p><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">You can cultivate an attitude of acceptance when you truly love yourself. You learn to accept and take responsibility for the phases and circumstances of your life. You can also pinpoint the source of your feelings of love, joy, ardor, and sincerity.</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">It’s easier to enjoy your life when you realize how much control you have over it. Being content with your life has a significant psychological influence and helps to reduce stress in your life as a whole, and maintain a positive outlook towards life.</span></p><span data-dcnode-id="1192" instrument_node="">
</span><h3 data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">12. Find Your Unique Meaning in Life</span></h3><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">When you have lost it all, a positive mental attitude can help you regain the strength to find your purpose again. It’s the best way to live and learn.</span></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Recognizing the power you have to carry on, make the best of things, and keep going when everything inside you wants to quit will lead to more success.</span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">You can’t always have it all, but you can always cultivate positive energy. That power keeps you grounded and safe.</span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">For example, say you lost someone to a disease. Instead of just thinking about the loss and seeing it as the end, a positive person may decide to contribute to a cause dedicated to that disease. In doing so, the positive person becomes a beacon of hope, which gives them power over their hardship through positive emotions. </span></p><div class="ad-wrap-transparent article-top-ad container-fluid d-md-none" data-dcnode-id="1168"><span data-dcnode-id="1177" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1174" instrument_node="">
</span><div class="pg-lazy incontent-inline-rect" data-dcnode-id="1173" data-gpt-parent="lifehack_m_BTF2_ap"></div><span data-dcnode-id="1172" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1169" instrument_node="">
</span></div><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">This is how people keep going: meaning. Meaning creates power over our emotions so that they do not define us.</span></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Positivity affects one’s stress levels and overall health. When you are positive about a situation, you are less stressed and calmer and can reason better to solve the problem in front of you.</span></p><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Cultivating this power is about realizing that a sense of meaning can be derived from all circumstances, even senseless tragedies. You don’t always have to have a reason for why something happens, but you can use whatever happens for a greater cause.</span></p><span data-dcnode-id="1158" instrument_node="">
</span><h3 data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">13. Avoid Toxic Positivity</span></h3><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Avoid the white-knuckling type of positivity where you don’t acknowledge your struggles or pain (as they also serve you). You don’t just want to tell yourself to move on because that equates to repression.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Emotions are part of positivity. You want to sit with your feelings, acknowledge them, and give them a voice. Instead of telling yourself to move on, let your emotions lead to a breakthrough that helps you cope with the changes in life.</span></p><span data-dcnode-id="1149" instrument_node="">
</span><h3 data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">14. Make Time to Be Alone</span></h3><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">I initially said, “take time just to be alone.” I changed it because if you don’t ensure you can take a break, you’ll surely be interrupted.</span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Being with other people is something you can do to make you happy, but I don’t include it in this list because nearly everyone finds time to talk with friends. On the other hand, spending time just with yourself is almost considered a taboo.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Take some time to figure out who you are.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><h3 data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">15. Find a Way to Measure Your Progress, and Then Measure It</span></h3><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Video games are addictive for a reason; filling up an experience bar and making it to the next level is immensely satisfying. I think that it would be really cool if we could apply this concept to the real world.</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">I put this near the bottom of the list because, unfortunately, this hasn’t been done too often in the real world – startup idea, anyone? So you would have to do it yourself, which is difficult when you don’t even know how much you’ve progressed.</span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">For a while, I kept a log of the runs I had taken and my average speed. It was really cool to see my improvement over the weeks. (Also, I was exercising. Combining the two was fantastic for boosting happiness.)</span></p><span data-dcnode-id="1125" instrument_node="">
</span><h2 data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Final Thoughts</span></h2><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">It is easier said than done, but maintaining a positive attitude in life can help you get over various struggles by giving you an optimistic view of situations.</span></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">You may be going through a tough time right now, but try to focus on all the good things in your life rather than dwelling on your problems. Make a list of things you can remember when things get tough.</span></p><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">As a person who is fortunate enough to have a home, a roof over your head, food on your table, and the ability to enjoy life while others struggle, you may feel glad for all of these things and more. Reminding yourself of all the good things in your life will help you feel more positive.</span></p><span data-dcnode-id="1113" instrument_node="">
</span><div class="cf-2355-area-19538" data-dcnode-id="1112"></div><span data-dcnode-id="1111" instrument_node="">
