</span><div class="comp mntl-toc__list-item-heading mntl-block" data-dcnode-id="1659" id="mntl-toc__list-item-heading_1-0-2"><span data-dcnode-id="1664" instrument_node="">
</span><a class="mntl-toc__list-item-link mntl-text-link mntl-toc__list-item-link js-mntl-toc-link" data-dcnode-id="1661" data-tracking-container="true" href="#toc-signs" id="mntl-toc__list-item-link_1-0-2" rel="nocaes"><span class="link__wrapper" data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Signs</span></span></a><span data-dcnode-id="1660" instrument_node="">

</span><li class="comp mntl-toc__list-item mntl-block" data-dcnode-id="1647" id="mntl-toc__list-item_1-0-3"><span data-dcnode-id="1655" instrument_node="">
</span><div class="comp mntl-toc__list-item-heading mntl-block" data-dcnode-id="1649" id="mntl-toc__list-item-heading_1-0-3"><span data-dcnode-id="1654" instrument_node="">
</span><a class="mntl-toc__list-item-link mntl-text-link mntl-toc__list-item-link js-mntl-toc-link" data-dcnode-id="1651" data-tracking-container="true" href="#toc-how-to-avoid-toxic-positivity" id="mntl-toc__list-item-link_1-0-3" rel="nocaes"><span class="link__wrapper" data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">How to Avoid Toxic Positivity</span></span></a><span data-dcnode-id="1650" instrument_node="">

</span></li><span data-dcnode-id="1646" instrument_node="">

</span></div><span data-dcnode-id="1642" instrument_node="">
</span></div><span data-dcnode-id="1640" instrument_node="">
</span></div><span data-dcnode-id="1638" instrument_node="">
</span></div><span data-dcnode-id="1636" instrument_node="">
</span></div><span data-dcnode-id="1634" instrument_node="">
</span><div class="loc article-content" data-dcnode-id="1043"><span data-dcnode-id="1633" instrument_node="">
</span><div class="comp structured-content article-content expert-content right-rail__offset lock-journey health-sc-page mntl-sc-page mntl-block" data-bind-scroll-on-start="true" data-dcnode-id="1265" data-sc-ad-label-height="24" data-sc-ad-track-spacing="100" data-sc-breakpoint="50em" data-sc-content-positions="[400, 1400, 1400, 1700, 2000, 2200, 2400, 2600, 2800]" data-sc-load-immediate="4" data-sc-max-track-height="600" data-sc-min-track-height="250" data-sc-sticky-offset="60" id="health-sc-page_1-0"><span data-dcnode-id="1632" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1624" id="mntl-sc-block_1-0"><span data-dcnode-id="1631" instrument_node="">
Toxic positivity is the belief that no matter how dire or difficult a situation is, people should maintain a positive mindset. It's a "good vibes only" approach to life. And while there are benefits to being an optimist and engaging in </span><a class="pseudoStyle" data-component="link" data-dcnode-id="1629" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/benefits-of-positive-thinking-2794767"><span data-dcnode-id="1630" instrument_node="">positive thinking</span></a><span data-dcnode-id="1628" instrument_node="">, toxic positivity instead rejects difficult </span><a data-component="link" data-dcnode-id="1626" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/an-overview-of-the-types-of-emotions-4163976"><span data-dcnode-id="1627" instrument_node="">emotions</span></a><span data-dcnode-id="1625" instrument_node=""> in favor of a cheerful, often falsely positive, facade.
</span></p><span data-dcnode-id="1623" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1622" id="mntl-sc-block_1-0-1"></div><span data-dcnode-id="1621" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1619" id="mntl-sc-block_1-0-2"><span data-dcnode-id="1620" instrument_node="">
We all know that having a positive outlook on life is good for your mental well-being. The problem is that life isn't always positive. We all deal with painful emotions and experiences. Those emotions, while often unpleasant, are important and need to be felt and dealt with openly and honestly.&nbsp;
</span></p><span data-dcnode-id="1618" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1617" id="mntl-sc-block_1-0-3"></div><span data-dcnode-id="1616" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1611" id="mntl-sc-block_1-0-4"><span data-dcnode-id="1615" instrument_node="">
Toxic positivity takes positive thinking to an overgeneralized extreme. This attitude doesn't just stress the importance of </span><a data-component="link" data-dcnode-id="1613" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/the-benefits-of-optimism-3144811"><span data-dcnode-id="1614" instrument_node="">optimism</span></a><span data-dcnode-id="1612" instrument_node="">, it minimizes and denies any trace of human emotions that aren't strictly happy or positive.
</span></p><span data-dcnode-id="1610" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1609" id="mntl-sc-block_1-0-5"></div><span data-dcnode-id="1608" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1607" id="toc-forms-of-toxic-positivity"></span><span data-dcnode-id="1606" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1601" id="mntl-sc-block_1-0-6"><span data-dcnode-id="1605" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node=""> Forms of Toxic Positivity </span></span><span data-dcnode-id="1602" instrument_node=""> </span></h2><span data-dcnode-id="1600" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1598" id="mntl-sc-block_1-0-7"><span data-dcnode-id="1599" instrument_node="">
Toxic positivity can take a wide variety of forms. Some examples you may have encountered in your own life:
</span></p><span data-dcnode-id="1597" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1589" id="mntl-sc-block_1-0-8"><div class="comp mntl-native" data-dcnode-id="1590" data-right-rail-index="1" id="mntl-native_1-0" style="--native-ad-height: auto"><span data-dcnode-id="1596" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad" data-dcnode-id="1592" id="mntl-native__adunit_1-0"><span data-dcnode-id="1595" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1594" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="1593" instrument_node="">
</span></div><span data-dcnode-id="1591" instrument_node="">
</span></div></div><span data-dcnode-id="1588" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1574" id="mntl-sc-block_1-0-9"><span data-dcnode-id="1587" instrument_node="">
</span><li data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">When something bad happens, such as losing your job, people tell you to “just stay positive” or “look on the bright side.” While such comments are often meant to be sympathetic, they can also be a way of shutting down anything you might want to say about what you are experiencing.</span></li><span data-dcnode-id="1584" instrument_node="">
</span><li data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">After experiencing some type of loss, people tell you that “everything happens for a reason.” While people often make such statements because they believe they are comforting, it is also a way of avoiding someone else’s pain.&nbsp;</span></li><span data-dcnode-id="1581" instrument_node="">
</span><li data-dcnode-id="1576"><span data-dcnode-id="1580" instrument_node="">When you express disappointment or sadness, someone tells you that “</span><a class="pseudoStyle" data-component="link" data-dcnode-id="1578" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/what-is-happiness-4869755"><span data-dcnode-id="1579" instrument_node="">happiness</span></a><span data-dcnode-id="1577" instrument_node=""> is a choice.” This suggests that if you are feeling negative emotions, then it’s your own fault for not “choosing” to be happy.</span></li><span data-dcnode-id="1575" instrument_node="">
</span></ul><span data-dcnode-id="1573" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1572" id="mntl-sc-block_1-0-10"></div><span data-dcnode-id="1571" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1569" id="mntl-sc-block_1-0-11"><span data-dcnode-id="1570" instrument_node="">
Such statements are often well-intentioned—people just don't know what else to say and don't know how to be empathetic. Still, it is important to recognize that these responses can be harmful.
</span></p><span data-dcnode-id="1568" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1567" id="mntl-sc-block_1-0-12"></div><span data-dcnode-id="1566" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1564" id="mntl-sc-block_1-0-13"><span data-dcnode-id="1565" instrument_node="">
At their best, such statements come off as trite platitudes that let you off the hook so you don’t have to deal with other people’s feelings. At their worst, these comments end up shaming and blaming people who are often dealing with incredibly difficult situations.
</span></p><span data-dcnode-id="1563" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1562" id="mntl-sc-block_1-0-14"></div><span data-dcnode-id="1561" instrument_node="">
</span><div class="comp theme-takeaway mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1554" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-16"><span data-dcnode-id="1560" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1556" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Toxic positivity denies people the authentic support that they need to cope with what they are facing.</span></p></div><span data-dcnode-id="1555" instrument_node="">
</span></div><span data-dcnode-id="1553" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1552" id="toc-why-its-harmful"></span><span data-dcnode-id="1551" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1546" id="mntl-sc-block_1-0-17"><span data-dcnode-id="1550" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node=""> Why It’s Harmful </span></span><span data-dcnode-id="1547" instrument_node=""> </span></h2><span data-dcnode-id="1545" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1543" id="mntl-sc-block_1-0-18"><span data-dcnode-id="1544" instrument_node="">
Toxic positivity can actually harm people who are going through difficult times. Rather than being able to share genuine human emotions and gain unconditional support, people find their feelings dismissed, ignored, or outright invalidated.&nbsp;
</span></p><span data-dcnode-id="1542" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1541" id="mntl-sc-block_1-0-19"></div><span data-dcnode-id="1540" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1515" id="mntl-sc-block_1-0-20"><span data-dcnode-id="1539" instrument_node="">
</span><li data-dcnode-id="1532"><strong data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">It's shaming</span></strong><span data-dcnode-id="1536" instrument_node="">: When someone is suffering, they need to know that their </span><a data-component="link" data-dcnode-id="1534" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/what-is-emotional-validation-425336"><span data-dcnode-id="1535" instrument_node="">emotions are valid</span></a><span data-dcnode-id="1533" instrument_node="">, but that they can find relief and love in their friends and family. Toxic positivity tells people that the emotions they are feeling are unacceptable.&nbsp;</span></li><span data-dcnode-id="1531" instrument_node="">
</span><li data-dcnode-id="1527"><strong data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">It causes guilt</span></strong><span data-dcnode-id="1528" instrument_node="">: It sends a message that if you aren't finding a way to feel positive, even in the face of tragedy, that you are doing something wrong.</span></li><span data-dcnode-id="1526" instrument_node="">
</span><li data-dcnode-id="1522"><strong data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">It avoids authentic human emotion:</span></strong><span data-dcnode-id="1523" instrument_node=""> Toxic positivity functions as an avoidance mechanism. When other people engage in this type of behavior, it allows them to sidestep emotional situations that might make them feel uncomfortable. But sometimes we turn these same ideas on ourselves, internalizing these toxic ideas. When we feel difficult emotions, we then discount, dismiss, and deny them.</span></li><span data-dcnode-id="1521" instrument_node="">
</span><li data-dcnode-id="1517"><strong data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">It prevents growth</span></strong><span data-dcnode-id="1518" instrument_node="">: It allows us to avoid feeling things that might be painful, but it also denies us the ability to face challenging feelings that can ultimately lead to growth and deeper insight.</span></li><span data-dcnode-id="1516" instrument_node="">
</span></ul><span data-dcnode-id="1514" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1513" id="mntl-sc-block_1-0-21"></div><span data-dcnode-id="1512" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1510" id="mntl-sc-block_1-0-22"><span data-dcnode-id="1511" instrument_node="">
The “positive vibes only” mantra can be particularly grating during times of intense personal distress. When people are coping with situations such as financial troubles, job loss, illness, or the loss of a loved one, being told that they need to look on the bright side can seem downright cruel.
</span></p><span data-dcnode-id="1509" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1508" id="mntl-sc-block_1-0-23"></div><span data-dcnode-id="1507" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1505" id="mntl-sc-block_1-0-24"><span data-dcnode-id="1506" instrument_node="">
It is possible to be optimistic in the face of difficult experiences and challenges. But people going through trauma don’t need to be told to stay positive or feel that they are being judged for not maintaining a sunny outlook.
</span></p><span data-dcnode-id="1504" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1503" id="mntl-sc-block_1-0-25"></div><span data-dcnode-id="1502" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1501" id="toc-signs"></span><span data-dcnode-id="1500" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1495" id="mntl-sc-block_1-0-26"><span data-dcnode-id="1499" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node=""> Signs&nbsp; </span></span><span data-dcnode-id="1496" instrument_node=""> </span></h2><span data-dcnode-id="1494" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1492" id="mntl-sc-block_1-0-27"><span data-dcnode-id="1493" instrument_node="">
Toxic positivity can often be subtle, but by learning to recognize the signs can help you better identify this type of behavior. Some signs include:
</span></p><span data-dcnode-id="1491" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1490" id="mntl-sc-block_1-0-28"></div><span data-dcnode-id="1489" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1472" id="mntl-sc-block_1-0-29"><span data-dcnode-id="1488" instrument_node="">
</span><li data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Brushing off problems rather than facing them</span></li><li data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Feeling guilty about being sad, angry, or disappointed</span></li><li data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Hiding your true feelings behind feel-good quotes that seem more socially acceptable</span></li><li data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">Hiding or disguising how you really feel</span></li><li data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Minimizing other people's feelings because they make you uncomfortable</span></li><li data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Shaming other people when they don't have a positive attitude</span></li><li data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Trying to be stoic or "get over" painful emotions</span></li><span data-dcnode-id="1473" instrument_node="">
</span></ul><span data-dcnode-id="1471" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1470" id="mntl-sc-block_1-0-30"></div><span data-dcnode-id="1469" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1468" id="toc-how-to-avoid-toxic-positivity"></span><span data-dcnode-id="1467" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1462" id="mntl-sc-block_1-0-31"><span data-dcnode-id="1466" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node=""> How to Avoid Toxic Positivity </span></span><span data-dcnode-id="1463" instrument_node=""> </span></h2><span data-dcnode-id="1461" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1459" id="mntl-sc-block_1-0-32"><span data-dcnode-id="1460" instrument_node="">
If you’ve been affected by toxic positivity—or if you recognize this kind of behavior in yourself— there are things that you can do to develop a healthier, more supportive approach. Some ideas include:
</span></p><span data-dcnode-id="1458" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1457" id="mntl-sc-block_1-0-33"></div><span data-dcnode-id="1456" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1419" id="mntl-sc-block_1-0-34"><span data-dcnode-id="1455" instrument_node="">
</span><li data-dcnode-id="1445"><strong data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Manage your negative emotions, but don't deny them</span></strong><span data-dcnode-id="1452" instrument_node="">. </span><a data-component="link" data-dcnode-id="1450" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/embrace-negative-emotions-4158317"><span data-dcnode-id="1451" instrument_node="">Negative emotions</span></a><span data-dcnode-id="1449" instrument_node=""> can cause stress when unchecked,</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1447" data-id="#citation-2"><span data-dcnode-id="1448" instrument_node="">1</span></span><span data-dcnode-id="1446" instrument_node=""> but they can also provide important information that can lead to beneficial changes in your life.</span></li><span data-dcnode-id="1444" instrument_node="">
</span><li data-dcnode-id="1437"><strong data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Be realistic about what you should feel</span></strong><span data-dcnode-id="1441" instrument_node="">. When you are facing a stressful situation, it’s normal to feel stressed, worried, or even fearful. Don’t expect too much from yourself. Focus on </span><a data-component="link" data-dcnode-id="1439" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/self-care-strategies-overall-stress-reduction-3144729"><span data-dcnode-id="1440" instrument_node="">self-care</span></a><span data-dcnode-id="1438" instrument_node=""> and taking steps that can help improve your situation.</span></li><span data-dcnode-id="1436" instrument_node="">
</span><li data-dcnode-id="1432"><strong data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">It’s okay to feel more than one thing</span></strong><span data-dcnode-id="1433" instrument_node="">. If you are facing a challenge, it’s possible to feel nervous about the future and also hopeful that you will succeed. Your emotions are as complex as the situation itself.&nbsp;</span></li><span data-dcnode-id="1431" instrument_node="">
</span><li data-dcnode-id="1427"><strong data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Focus on listening to others and showing support</span></strong><span data-dcnode-id="1428" instrument_node="">. When someone expresses a difficult emotion, don’t shut them down with toxic platitudes. Instead, let them know that what they are feeling is normal and that you are there to listen.&nbsp;</span></li><span data-dcnode-id="1426" instrument_node="">
</span><li data-dcnode-id="1422"><strong data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Notice how you feel</span></strong><span data-dcnode-id="1423" instrument_node="">. Following “positive” social media accounts can sometimes serve as a source of inspiration, but pay attention to how you feel after you view and interact with such content. If you are left with a sense of shame or guilt after seeing “uplifting” posts, it might be due to toxic positivity. In such cases, consider limiting your social media consumption.</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1421"></span><span data-dcnode-id="1420" instrument_node="">
</span></ul><span data-dcnode-id="1418" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1417" id="mntl-sc-block_1-0-35"></div><span data-dcnode-id="1416" instrument_node="">
</span><div class="comp theme-takeaway mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1403" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-37"><span data-dcnode-id="1415" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="1413" id="mntl-sc-block-callout-heading_1-0"><span data-dcnode-id="1414" instrument_node="">
Press Play for Advice on Self-Worth</span></h3><span data-dcnode-id="1412" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1405" id="mntl-sc-block-callout-body_1-0-1"><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1410" instrument_node="">Hosted by Editor-in-Chief and therapist Amy Morin, LCSW, this episode of </span><a data-component="link" data-dcnode-id="1408" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/the-verywell-mind-podcast-5113058"><span data-dcnode-id="1409" instrument_node="">The Verywell Mind Podcast</span></a><span data-dcnode-id="1407" instrument_node=""> shares tips for reframing your self-limiting beliefs, featuring Paralympic gold medalist Mallory Weggemann. Click below to listen now.</span></p></div><span data-dcnode-id="1404" instrument_node="">
</span></div><span data-dcnode-id="1402" instrument_node="">

</span><cite class="comp mntl-sc-block-iframe__caption mntl-text-block" data-dcnode-id="1398" id="mntl-sc-block-iframe__caption_1-0"></cite><span data-dcnode-id="1397" instrument_node="">

</span></div><span data-dcnode-id="1393" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1392" id="mntl-sc-block_1-0-40"></div><span data-dcnode-id="1391" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1374" id="mntl-sc-block_1-0-41"><span data-dcnode-id="1390" instrument_node="">
</span><strong data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Follow Now</span></strong><span data-dcnode-id="1387" instrument_node="">: </span><a data-component="link" data-dcnode-id="1385" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//podcasts.apple.com/us/podcast/the-verywell-mind-podcast-with-amy-morin/id1529983509" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1386" instrument_node="">Apple Podcasts</span></a><span data-dcnode-id="1384" instrument_node=""> / </span><a data-component="link" data-dcnode-id="1382" data-ordinal="2" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//open.spotify.com/show/2WGnJfJon5RKU9bXBUSWHU" rel="noopener" target="_blank"><span data-dcnode-id="1383" instrument_node="">Spotify</span></a><span data-dcnode-id="1381" instrument_node=""> / </span><a data-component="link" data-dcnode-id="1379" data-ordinal="3" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//podcasts.google.com/feed/aHR0cHM6Ly9mZWVkcy5idXp6c3Byb3V0LmNvbS8xMzA3NDQ5LnJzcw" rel="noopener" target="_blank"><span data-dcnode-id="1380" instrument_node="">Google Podcasts</span></a><span data-dcnode-id="1378" instrument_node=""> / </span><a data-component="link" data-dcnode-id="1376" data-ordinal="4" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//feeds.buzzsprout.com/1307449.rss" rel="noopener" target="_blank"><span data-dcnode-id="1377" instrument_node="">RSS</span></a><span data-dcnode-id="1375" instrument_node="">
</span></p><span data-dcnode-id="1373" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1372" id="mntl-sc-block_1-0-42"></div><span data-dcnode-id="1371" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1369" id="mntl-sc-block_1-0-43"><span data-dcnode-id="1370" instrument_node="">
Give yourself permission to feel your feelings. Instead of trying to avoid difficult emotions, give yourself permission to feel them. These feelings are real, valid, and important. They can provide information and help you see things about a situation that you need to work to change.
</span></p><span data-dcnode-id="1368" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1367" id="mntl-sc-block_1-0-44"></div><span data-dcnode-id="1366" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1364" id="mntl-sc-block_1-0-45"><span data-dcnode-id="1365" instrument_node="">
This doesn't necessarily mean that you should act on every emotion that you feel. Sometimes it is important to sit with your feelings and give yourself the time and space to process the situation before you take action.&nbsp;
</span></p><span data-dcnode-id="1363" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1362" id="mntl-sc-block_1-0-46"></div><span data-dcnode-id="1361" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1356" id="mntl-sc-block_1-0-47"><span data-dcnode-id="1360" instrument_node="">
So when you are going through something hard, think about ways to give voice to your emotions in a way that is productive. Write in a journal. Talk to a friend. Research suggests that just putting what you are feeling into words can help lower the intensity of those negative feelings.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1358" data-id="#citation-3"><span data-dcnode-id="1359" instrument_node="">2</span></span><span data-dcnode-id="1357" instrument_node="">
</span></p><span data-dcnode-id="1355" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1354" id="mntl-sc-block_1-0-48"></div><span data-dcnode-id="1353" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-comparisonlist" data-dcnode-id="1285" id="mntl-sc-block_1-0-50"><span data-dcnode-id="1352" instrument_node="">
</span><div class="mntl-sc-block-comparisonlist__wrapper" data-dcnode-id="1320"><span data-dcnode-id="1351" instrument_node="">
</span><span class="mntl-sc-block-comparisonlist__heading" data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Toxic Statements</span></span><span data-dcnode-id="1348" instrument_node="">
</span><ul class="mntl-sc-block-comparisonlist__list" data-dcnode-id="1322"><span data-dcnode-id="1347" instrument_node="">
</span><li data-dcnode-id="1344"><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Just stay positive!</span></p></li><span data-dcnode-id="1343" instrument_node="">
</span><li data-dcnode-id="1340"><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Good vibes only!</span></p></li><span data-dcnode-id="1339" instrument_node="">
</span><li data-dcnode-id="1336"><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">It could be worse.</span></p></li><span data-dcnode-id="1335" instrument_node="">
</span><li data-dcnode-id="1332"><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Things happen for a reason.</span></p></li><span data-dcnode-id="1331" instrument_node="">
</span><li data-dcnode-id="1328"><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Failure isn't an option.</span></p></li><span data-dcnode-id="1327" instrument_node="">
</span><li data-dcnode-id="1324"><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Happiness is a choice.</span></p></li><span data-dcnode-id="1323" instrument_node="">
</span></ul><span data-dcnode-id="1321" instrument_node="">
</span></div><span data-dcnode-id="1319" instrument_node="">
</span><div class="mntl-sc-block-comparisonlist__wrapper" data-dcnode-id="1287"><span data-dcnode-id="1318" instrument_node="">
</span><span class="mntl-sc-block-comparisonlist__heading" data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Non-Toxic Alternatives</span></span><span data-dcnode-id="1315" instrument_node="">
</span><ul class="mntl-sc-block-comparisonlist__list" data-dcnode-id="1289"><span data-dcnode-id="1314" instrument_node="">
</span><li data-dcnode-id="1311"><p data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">I'm listening.</span></p></li><span data-dcnode-id="1310" instrument_node="">
</span><li data-dcnode-id="1307"><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">I'm here no matter what.</span></p></li><span data-dcnode-id="1306" instrument_node="">
</span><li data-dcnode-id="1303"><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">That must be really hard.</span></p></li><span data-dcnode-id="1302" instrument_node="">
</span><li data-dcnode-id="1299"><p data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Sometimes bad things happen. How can I help?</span></p></li><span data-dcnode-id="1298" instrument_node="">
</span><li data-dcnode-id="1295"><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Failure is sometimes part of life.</span></p></li><span data-dcnode-id="1294" instrument_node="">
</span><li data-dcnode-id="1291"><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Your feelings are valid.</span></p></li><span data-dcnode-id="1290" instrument_node="">
</span></ul><span data-dcnode-id="1288" instrument_node="">
</span></div><span data-dcnode-id="1286" instrument_node="">
</span></div><span data-dcnode-id="1284" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1283" id="mntl-sc-block_1-0-51"></div><span data-dcnode-id="1282" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1281" id="toc-a-word-from-verywell"></span><span data-dcnode-id="1280" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1275" id="mntl-sc-block_1-0-52"><span data-dcnode-id="1279" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node=""> A Word From Verywell </span></span><span data-dcnode-id="1276" instrument_node=""> </span></h2><span data-dcnode-id="1274" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1272" id="mntl-sc-block_1-0-53"><span data-dcnode-id="1273" instrument_node="">
Toxic positivity is often subtle, and we’ve all engaged in this type of thinking at one point or another. By learning to recognize it, however, you’ll be better able to rid yourself of this type of thinking and provide (and receive) more authentic support when you are going through something that isn’t easy.
</span></p><span data-dcnode-id="1271" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1270" id="mntl-sc-block_1-0-54"></div><span data-dcnode-id="1269" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1267" id="mntl-sc-block_1-0-55"><span data-dcnode-id="1268" instrument_node="">
Start noticing toxic statements and strive to let yourself and others feel your emotions, both the positive and the negative.&nbsp;
</span></p><span data-dcnode-id="1266" instrument_node="">
</span></div><span data-dcnode-id="1264" instrument_node="">
