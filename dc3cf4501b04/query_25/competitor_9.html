</span><span class="postmetadata" data-dcnode-id="362"><a data-dcnode-id="367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.psu.edu/adampolinak/category/tips/" rel="category tag"><span data-dcnode-id="368" instrument_node="">Tips</span></a><span data-dcnode-id="366" instrument_node=""> — </span><a data-dcnode-id="364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.psu.edu/adampolinak/2015/08/03/5-ways-to-increase-positivity/%23respond"><span data-dcnode-id="365" instrument_node="">Leave a comment</span></a><span data-dcnode-id="363" instrument_node=""> </span></span><br data-dcnode-id="361"><span data-dcnode-id="360" instrument_node="">
</span><small data-dcnode-id="354"><span class="datef" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">03</span></span><br data-dcnode-id="357"><span data-dcnode-id="356" instrument_node="">Aug 15 </span></small><span data-dcnode-id="353" instrument_node="">
</span><h2 data-dcnode-id="350"><a data-dcnode-id="351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.psu.edu/adampolinak/2015/08/03/5-ways-to-increase-positivity/" rel="bookmark" title="Permanent Link to 5 Ways To Increase Positivity"><span data-dcnode-id="352" instrument_node="">5 Ways To Increase Positivity</span></a></h2><span data-dcnode-id="349" instrument_node="">
</span><div class="entry" data-dcnode-id="312"><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="345"><strong data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">1. Live in and Create a Positive Environment</span></strong></p><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">The people one surrounds themselves by&nbsp;may say a lot about their&nbsp;outlook and happiness. Simply put,&nbsp;constantly being surrounded by negativity&nbsp;will not have a positive impact on any individual’s outlook and overall experience.</span></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="338"><strong data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">2.&nbsp;Manage the Negativity of Others</span></strong></p><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">The fact of the matter&nbsp;is that negative experiences and interactions occur&nbsp;more often than most people would prefer.&nbsp;Realizing that negative interactions are inevitable&nbsp;can help one stay positive by&nbsp;not letting the negativity of others bring one down.</span></p><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="331"><strong data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">3. Take Things Slowly</span></strong></p><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">It is important to realize that most significant&nbsp;goals take time and will not happen overnight. Instead, it is important to seek positivity and happiness with the current time and place in&nbsp;life, while still working towards future goals.</span></p><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="324"><strong data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">4. Don’t be Afraid of Failure</span></strong></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">It is important to not let vague fears get in the way of important life goals. Most of the time, fears arise from&nbsp;negative thoughts.&nbsp;Recognizing these negative thoughts can help one push past any fears.</span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="317"><strong data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">5. Exercise and Sleep</span></strong></p><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Exercising regularly and sleeping enough greatly impact wellbeing and can be a large factor in maintaining&nbsp;a positive outlook. When one’s&nbsp;body and mind is&nbsp;healthy and rested, a clearer, more positive outlook comes long with it.</span></p><span data-dcnode-id="313" instrument_node="">
</span></div><span data-dcnode-id="311" instrument_node="">
</span><div class="clearfix" data-dcnode-id="310"></div><span data-dcnode-id="309" instrument_node="">
</span></div><span data-dcnode-id="307" instrument_node="">
</span><div class="post-9 post type-post status-publish format-standard hentry category-tips" data-dcnode-id="271" id="post-9"><span data-dcnode-id="306" instrument_node="">
</span><span class="postmetadata" data-dcnode-id="299"><a data-dcnode-id="304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.psu.edu/adampolinak/category/tips/" rel="category tag"><span data-dcnode-id="305" instrument_node="">Tips</span></a><span data-dcnode-id="303" instrument_node=""> — </span><a data-dcnode-id="301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.psu.edu/adampolinak/2015/08/02/turning-negatives-into-positives/%23respond"><span data-dcnode-id="302" instrument_node="">Leave a comment</span></a><span data-dcnode-id="300" instrument_node=""> </span></span><br data-dcnode-id="298"><span data-dcnode-id="297" instrument_node="">
</span><small data-dcnode-id="291"><span class="datef" data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">02</span></span><br data-dcnode-id="294"><span data-dcnode-id="293" instrument_node="">Aug 15 </span></small><span data-dcnode-id="290" instrument_node="">
</span><h2 data-dcnode-id="287"><a data-dcnode-id="288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.psu.edu/adampolinak/2015/08/02/turning-negatives-into-positives/" rel="bookmark" title="Permanent Link to Turning Negatives Into Positives"><span data-dcnode-id="289" instrument_node="">Turning Negatives Into Positives</span></a></h2><span data-dcnode-id="286" instrument_node="">
</span><div class="entry" data-dcnode-id="275"><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">No matter the person, every one has their bad days. However,&nbsp;how one deals with those bad days or situations&nbsp;determines the impact it may have.</span></p><span data-dcnode-id="282" instrument_node="">
</span><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Bad days are actually vital in order for us to grow and develop. Life experiences are the most significant aspects of learning. Often times, we cannot learn what not to do without making mistakes first.&nbsp;Bad days help us to determine what needs to be done differently next time in order to turn similar circumstances&nbsp;in to more positive ones. Life is all about growth and development, and it is naive&nbsp;to expect perfection. Expecting perfection will only increase stress and disappointment when things do not happen as planned.</span></p><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">More so,&nbsp;bad days can actually make one&nbsp;appreciate the good days even more when things do go as planned. Feeling down occasionally is part of life and being&nbsp;human. Humans by nature&nbsp;experience different moods and emotions, which is part of our biology. Recognizing this can help turn negative situations into more positive ones by learning from mistakes and by understanding more about oneself.</span></p><span data-dcnode-id="276" instrument_node="">
</span></div><span data-dcnode-id="274" instrument_node="">
</span><div class="clearfix" data-dcnode-id="273"></div><span data-dcnode-id="272" instrument_node="">

</span><span class="postmetadata" data-dcnode-id="262"><a data-dcnode-id="267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.psu.edu/adampolinak/category/news/" rel="category tag"><span data-dcnode-id="268" instrument_node="">News</span></a><span data-dcnode-id="266" instrument_node=""> — </span><a data-dcnode-id="264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.psu.edu/adampolinak/2015/07/30/tweet-inspires-romes-citizens-to-clean-up-the-city/%23respond"><span data-dcnode-id="265" instrument_node="">Leave a comment</span></a><span data-dcnode-id="263" instrument_node=""> </span></span><br data-dcnode-id="261"><span data-dcnode-id="260" instrument_node="">
</span><small data-dcnode-id="254"><span class="datef" data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">30</span></span><br data-dcnode-id="257"><span data-dcnode-id="256" instrument_node="">Jul 15 </span></small><span data-dcnode-id="253" instrument_node="">
</span><h2 data-dcnode-id="250"><a data-dcnode-id="251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.psu.edu/adampolinak/2015/07/30/tweet-inspires-romes-citizens-to-clean-up-the-city/" rel="bookmark" title="Permanent Link to Tweet Inspires Rome’s Citizens to Clean Up the City"><span data-dcnode-id="252" instrument_node="">Tweet Inspires Rome’s Citizens to Clean Up the City</span></a></h2><span data-dcnode-id="249" instrument_node="">
</span><div class="entry" data-dcnode-id="237"><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">The Guardian recently reported that one man’s tweet, actor Alessandro Gassman, has gone viral leading to a massive city clean up by Rome’s citizens. The tweet, calling for the clean up, was in response to inadequate rubbish collection, among other issues, which have greatly impacted the city’s cleanliness.</span></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="242"><a data-dcnode-id="243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.theguardian.com/world/2015/jul/27/alessandro-gassmann-actor-call-rome-cleanup-citizens-cleaning-streets" target="_blank"><span data-dcnode-id="244" instrument_node="">Read full story here…</span></a></p><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Stories like this, that involve people working&nbsp;together for a good cause, are certainly&nbsp;some of the most inspirational. It is always uplifting&nbsp;to see social media used in a positive aspect not only by the actor, but subsequently by the citizens involved,&nbsp;many of whom&nbsp;shared&nbsp;pictures of&nbsp;their involvement during the cause.</span></p><span data-dcnode-id="238" instrument_node="">
</span></div><span data-dcnode-id="236" instrument_node="">
</span><div class="clearfix" data-dcnode-id="235"></div><span data-dcnode-id="234" instrument_node="">
</span></div><span data-dcnode-id="232" instrument_node="">
</span><div class="post-7 post type-post status-publish format-standard hentry category-general" data-dcnode-id="190" id="post-7"><span data-dcnode-id="231" instrument_node="">
</span><span class="postmetadata" data-dcnode-id="224"><a data-dcnode-id="229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.psu.edu/adampolinak/category/general/" rel="category tag"><span data-dcnode-id="230" instrument_node="">General</span></a><span data-dcnode-id="228" instrument_node=""> — </span><a data-dcnode-id="226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.psu.edu/adampolinak/2015/07/29/why-try-to-be-positive/%23respond"><span data-dcnode-id="227" instrument_node="">Leave a comment</span></a><span data-dcnode-id="225" instrument_node=""> </span></span><br data-dcnode-id="223"><span data-dcnode-id="222" instrument_node="">
</span><small data-dcnode-id="216"><span class="datef" data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">29</span></span><br data-dcnode-id="219"><span data-dcnode-id="218" instrument_node="">Jul 15 </span></small><span data-dcnode-id="215" instrument_node="">
</span><h2 data-dcnode-id="212"><a data-dcnode-id="213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.psu.edu/adampolinak/2015/07/29/why-try-to-be-positive/" rel="bookmark" title="Permanent Link to Why Try To Be Positive?"><span data-dcnode-id="214" instrument_node="">Why Try To Be Positive?</span></a></h2><span data-dcnode-id="211" instrument_node="">
</span><div class="entry" data-dcnode-id="194"><span data-dcnode-id="210" instrument_node="">
</span><p data-dcnode-id="205"><span data-dcnode-id="209" instrument_node="">Mahatma Gandhi once said, “</span><a data-dcnode-id="207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiquote.org/wiki/Mahatma_Gandhi"><span data-dcnode-id="208" instrument_node="">A man is but the product of his thoughts. What he thinks, he becomes.</span></a><span data-dcnode-id="206" instrument_node="">” Generally speaking, he could not be more accurate.</span></p><span data-dcnode-id="204" instrument_node="">
</span><p data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Simply trying to be positive, however, is something most people do not consider, or simply something they give up on. It is generally agreed upon that positivity is associated with happiness and negativity associated with unhappiness. That, in and of itself, is an important reason to seek&nbsp;positivity.</span></p><span data-dcnode-id="201" instrument_node="">
</span><p data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">Positivity is important in all aspects of life. It is important to be positive towards family, friends, and one’s career. One’s own positivity can affect anyone they interact with. As a whole, positivity can affect the way our country and our world operates. Therefore, seeking positivity is important for both one’s own life and the lives of others.</span></p><span data-dcnode-id="198" instrument_node="">
</span><p data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">&nbsp;</span></p><span data-dcnode-id="195" instrument_node="">
