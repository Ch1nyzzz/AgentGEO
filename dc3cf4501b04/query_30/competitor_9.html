</span><p class="entry-meta" data-dcnode-id="3357"><time class="entry-time" data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">April 28, 2019</span></time><span class="entry-comments-link" data-dcnode-id="3358"><a data-dcnode-id="3359" href="#llc_comments"><span data-dcnode-id="3360" instrument_node="">11 Comments</span></a></span></p></header><div class="entry-content" data-dcnode-id="2458"><span data-dcnode-id="3355" data-image-pin-it="true" id="dpsp-post-content-markup"></span><p data-dcnode-id="3352"><strong data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">Want to know how to always be happy and positive?</span></strong></p><span data-dcnode-id="3351" instrument_node="">
</span><p data-dcnode-id="3348"><span data-dcnode-id="3350" instrument_node="">Wondering if being positive all the time will make you happy?</span><span data-dcnode-id="3349" id="more-25602"></span></p><span data-dcnode-id="3347" instrument_node="">
</span><p data-dcnode-id="3345"><span data-dcnode-id="3346" instrument_node="">“I don’t know! &nbsp;I’m just not happy!” I said as I sobbed into my husband’s broad chest. &nbsp;</span></p><span data-dcnode-id="3344" instrument_node="">
</span><p data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">Even now, I remember the moment clearly because it was a wake-up point for me. I thought that if anyone needed to learn how to always be happy and positive, it was me.</span></p><span data-dcnode-id="3341" instrument_node="">
</span><p data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">There I was, sitting on our worn tan couch in our living room. &nbsp;It was a Saturday and I had been discontent all day. That seemed to be the case all the time lately.</span></p><span data-dcnode-id="3338" instrument_node="">
</span><p data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">I felt mad at my husband, which was what started the whole discussion.&nbsp; And I was frustrated because he could not seem to do enough to make me happy.</span></p><span data-dcnode-id="3335" instrument_node="">
</span><p data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">I wanted the secrets to a happy life, but I wanted them to plop right in my lap! Now! &nbsp;I needed to learn how to always be happy and positive, and if that wasn’t possible, then to at least find contentment.</span></p><span data-dcnode-id="3332" instrument_node="">
</span><p data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3329" instrument_node="">
</span><p data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3326" instrument_node="">
</span><p data-dcnode-id="3322"><img alt="Hey boo, Pin it!" class="aligncenter wp-image-2575 size-medium error" data-dcnode-id="3325" data-lazy-src="https://itsallyouboo.com/wp-content/uploads/2017/05/hey-boo-pin-it-300x32.png" data-ll-status="error" data-pin-nopin="true" height="32" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/wp-content/uploads/2017/05/hey-boo-pin-it-300x32.png&amp;raw" width="300"><noscript data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">&lt;img class="aligncenter wp-image-2575 size-medium" src="https://itsallyouboo.com/wp-content/uploads/2017/05/hey-boo-pin-it-300x32.png" alt="Hey boo, Pin it!" width="300" height="32"&gt;</span></noscript></p><span data-dcnode-id="3321" instrument_node="">

</span><h2 data-dcnode-id="3284"><span data-dcnode-id="3285" instrument_node="">Remembering How to Always Be Happy and Positive</span></h2><span data-dcnode-id="3283" instrument_node="">
</span><p data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">I wasn’t sure what happened. &nbsp;It had once come so easily.</span></p><span data-dcnode-id="3280" instrument_node="">
</span><p data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">My husband just being in the room used to make me happy.&nbsp; We had all the things we needed to be happy and I knew that. I also knew that I was projecting things on to him that really weren’t his fault.</span></p><span data-dcnode-id="3277" instrument_node="">
</span><p data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">So what was wrong? &nbsp;How could I find the secrets to happiness again?</span></p><span data-dcnode-id="3274" instrument_node="">
</span><p data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3271" instrument_node="">
</span><h3 data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">My Personal Growth and Personal Development Journey&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;</span></h3><span data-dcnode-id="3268" instrument_node="">
</span><p data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">“Starting” might be a bit of an inaccurate word to describe what I was about to embark on. &nbsp;</span></p><span data-dcnode-id="3265" instrument_node="">
</span><p data-dcnode-id="3260"><span data-dcnode-id="3264" instrument_node="">You see, I had just finished reading a book called </span><a data-dcnode-id="3262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2uo1uK5" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="3263" instrument_node="">“The Four Doors” by Richard Paul Evans</span></a><span data-dcnode-id="3261" instrument_node="">. In it, he talked about living your life’s purpose. &nbsp;That’s the real reason I was crying. I felt like my life had no purpose and just blended into the sameness of the daily routine.</span></p><span data-dcnode-id="3259" instrument_node="">
</span><p data-dcnode-id="3249"></p><div class="dpsp-pin-it-wrapper aligncenter size-full wp-image-25793" data-dcnode-id="3252"><img alt="“For every minute you are angry you lose sixty seconds of happiness.” ― Ralph Waldo Emerson" class="lazyloaded" data-dcnode-id="3258" data-ll-status="loaded" data-pin-description="&quot;For every minute you are angry you lose sixty seconds of happiness&quot; ― Ralph Waldo Emerson. Click here for 12 secrets to always being happy and positive in life and with yourself. #Happiness #Positive #PositiveVibes #Positivity #Affirmation #PositivePeople #ChooseJoy #PositiveLife #MentalHealth #MindBodySpirit #EmotionalHealth #EmotionalHealing #SelfHelp #SelfGrowth #QuotesToLiveBy #Positive #PositiveThinking #QuotestoRemember #InspirationalQuotes #PositiveQuotes" data-pin-title="12 Secrets To Always Being Happy And Positive" height="900" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Ralph-Waldo-Emerson-quote.jpg&amp;raw" srcset="https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Ralph-Waldo-Emerson-quote.jpg 600w, https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Ralph-Waldo-Emerson-quote-200x300.jpg 200w" style="" width="600"><span class="dpsp-pin-it-overlay" data-dcnode-id="3257"></span><a aria-label="Save Pin For Later" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rounded dpsp-pin-it-button-has-label" data-dcnode-id="3253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%3A%252F%252Fitsallyouboo.com%252Fwp-content%252Fuploads%252F2019%252F04%252Falways-being-happy-and-positive-Ralph-Waldo-Emerson-quote.jpg%26url%3Dhttps%3A%252F%252Fitsallyouboo.com%252F12-secrets-to-always-being-happy-and-positive%252F%26is_video%3Dfals </span><p data-dcnode-id="3245"><strong data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">Have you ever been there? &nbsp;Started on your own personal quest to uncover the secrets to a happy life?</span></strong></p><span data-dcnode-id="3244" instrument_node="">
</span><p data-dcnode-id="3242"><span data-dcnode-id="3243" instrument_node="">Or perhaps, you longed to create the life you love, but didn’t know where to start? &nbsp;</span></p><span data-dcnode-id="3241" instrument_node="">
</span><p data-dcnode-id="3236"><span data-dcnode-id="3240" instrument_node="">I’d like to share with you what I discovered, and share some of my best tips on how to always be happy and positive from my book, “</span><a data-dcnode-id="3238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//contentmentquesting.com/pearl-perspective-quick-start-guide-to-happy/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3239" instrument_node="">The Pearl Perspective: How Changing Your Perspective Can Change Your Life</span></a><span data-dcnode-id="3237" instrument_node="">.”</span></p><span data-dcnode-id="3235" instrument_node="">
</span><p data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3232" instrument_node="">
</span><h2 data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">What Defines Happiness?</span></h2><span data-dcnode-id="3229" instrument_node="">
</span><p data-dcnode-id="3225"><span data-dcnode-id="3228" instrument_node="">Before we delve into the tips on how to always be happy and positive, let’s define what is happiness in life. &nbsp;Sometimes we, as adults, over-complicate things. I think that the definition of happiness is one of them. </span><strong data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">Happiness to me is living a content, fulfilled life where moments of joy are common. &nbsp;</span></strong></p><span data-dcnode-id="3224" instrument_node="">
</span><p data-dcnode-id="3221"><strong data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">Happiness also includes having a positive attitude and making a conscious decision to cultivate positive thoughts.</span></strong></p><span data-dcnode-id="3220" instrument_node="">
</span><p data-dcnode-id="3215"><span data-dcnode-id="3219" instrument_node="">It means </span><a data-dcnode-id="3217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/how-to-choose-the-right-path/"><span data-dcnode-id="3218" instrument_node="">making the choice</span></a><span data-dcnode-id="3216" instrument_node=""> to see the bright side of situations, looking for the lessons in hard times, concentrating on taking action to fix the things that you can, and trusting that the rest will work out. &nbsp;</span></p><span data-dcnode-id="3214" instrument_node="">
</span><p data-dcnode-id="3209"><a data-dcnode-id="3210" href="#ck_modal" rel="ck_modal"><img alt="Get your FREE Be More Positive Affirmations" class="aligncenter size-full wp-image-32190 lazyloaded" data-dcnode-id="3213" data-ll-status="loaded" data-pin-nopin="true" height="699" sizes="(max-width: 1552px) 100vw, 1552px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download.jpg&amp;raw" srcset="https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download.jpg 1552w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-300x135.jpg 300w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-1024x461.jpg 1024w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-768x346.jpg 768w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-1536x692.jpg 1536w" width="1552"><noscript data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">&lt;img class="aligncenter size-full wp-image-32190" src="https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download.jpg" alt="Get your FREE Be More Positive Affirmations" width="1552" height="699" srcset="https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download.jpg 1552w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-300x135.jpg 300w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-1024x461.jpg 1024w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-768x346.jpg 768w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-1536x692.jpg 1536w" sizes="(max-width: 1552px) 100vw, 1552px" /&gt;</span></noscript></a></p><span data-dcnode-id="3208" instrument_node="">
</span><h3 data-dcnode-id="3206"><span data-dcnode-id="3207" instrument_node="">What is Contentment?</span></h3><span data-dcnode-id="3205" instrument_node="">
</span><p data-dcnode-id="3202"><strong data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">Are happiness and contentment the same thing? </span></strong></p><span data-dcnode-id="3201" instrument_node="">
</span><p data-dcnode-id="3196"><span data-dcnode-id="3200" instrument_node="">While not the same, </span><strong data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node="">both happiness and contentment are both pieces to the puzzle of living a happy, fulfilled life</span></strong><span data-dcnode-id="3197" instrument_node="">.</span></p><span data-dcnode-id="3195" instrument_node="">
</span><p data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">For example, I might not be HAPPY if I had to work late, but at the same time, I would be content if I knew the work furthered my life purpose. You might not find me at my desk with a big smile on my face, relaxed and laughing. You would probably find me at my desk with an intense look of concentration and focus.</span></p><span data-dcnode-id="3192" instrument_node="">
</span><p data-dcnode-id="3185"><strong data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">Understanding that contentment is a component of happiness is the key that can unlock how to be happy in life always.</span></strong><span data-dcnode-id="3189" instrument_node=""> Learning </span><a data-dcnode-id="3187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/how-to-stay-positive-no-matter-what/"><span data-dcnode-id="3188" instrument_node="">how to be positive no matter what</span></a><span data-dcnode-id="3186" instrument_node=""> is another key, but today we are going to focus mostly on the happiness part. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="3184" instrument_node="">
</span><p data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3181" instrument_node="">
</span><h2 data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">The Best Tips on How to Always Be Happy and Positive</span></h2><span data-dcnode-id="3178" instrument_node="">
</span><p data-dcnode-id="3171"><a data-dcnode-id="3177" name="responsible"></a><br data-dcnode-id="3176"><span data-dcnode-id="3175" instrument_node="">
Each of the following tips is taken from my book, </span><a data-dcnode-id="3173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2YfgcAO" rel="noopener nofollow noreferrer" target="_blank"><span data-dcnode-id="3174" instrument_node="">The Pearl Perspective: How Changing Your Perspective Can Change Your Life</span></a><span data-dcnode-id="3172" instrument_node="">. They teach you how to not just find contentment in your life right now, but also how to just be happy.&nbsp;</span></p><span data-dcnode-id="3170" instrument_node="">
</span><h3 data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="3167" instrument_node="">
</span><h3 data-dcnode-id="3163"><span data-dcnode-id="3166" instrument_node="">#1.&nbsp; </span><span data-dcnode-id="3164" style="text-decoration: underline;"><span data-dcnode-id="3165" instrument_node="">Your Happiness is Your Responsibility</span></span></h3><span data-dcnode-id="3162" instrument_node="">
</span><p data-dcnode-id="3157"><span data-dcnode-id="3161" instrument_node="">My first mistake in the opening example was expecting someone else to make me happy. </span><strong data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">If you want to learn how to be happy and positive, no one else can do it for you. &nbsp;</span></strong><a data-dcnode-id="3158" name="critic"></a></p><span data-dcnode-id="3156" instrument_node="">
</span><p data-dcnode-id="3151"><span data-dcnode-id="3155" instrument_node="">My husband is incredible, but he’s just a man. No other person no matter how special they are to you can always make you happy. I had to take responsibility for my life and my choices. </span><strong data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">Our choices define our lives</span></strong><span data-dcnode-id="3152" instrument_node="">.</span></p><span data-dcnode-id="3150" instrument_node="">
</span><p data-dcnode-id="3146"><span data-dcnode-id="3149" instrument_node="">In order to find your happy, the first thing you have to do is take responsibility for your own thoughts and feelings. You can’t control other people’s thoughts, feelings, or reactions. &nbsp;You can only control yours.</span><strong data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node=""> If I wanted to be happy, then I had to start taking some personal action. </span></strong></p><span data-dcnode-id="3145" instrument_node="">
</span><p data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3142" instrument_node="">
</span><h3 data-dcnode-id="3138"><span data-dcnode-id="3141" instrument_node="">#2. </span><span data-dcnode-id="3139" style="text-decoration: underline;"><span data-dcnode-id="3140" instrument_node="">Get Your Inner Critic Under Control</span></span></h3><span data-dcnode-id="3137" instrument_node="">
</span><p data-dcnode-id="3132"><span data-dcnode-id="3136" instrument_node="">The first step for me was </span><a data-dcnode-id="3134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/silencing-your-inner-critic/"><span data-dcnode-id="3135" instrument_node="">getting my inner critic</span></a><span data-dcnode-id="3133" instrument_node=""> under control. &nbsp;Are you familiar with the inner critic?</span></p><span data-dcnode-id="3131" instrument_node="">
</span><pre data-dcnode-id="3127"><span data-dcnode-id="3130" instrument_node="">👉🏽 RELATED POST: </span><a data-dcnode-id="3128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/how-to-stop-negative-self-talk/"><span data-dcnode-id="3129" instrument_node="">How to Stop the Negative Self-Talk for Good</span></a></pre><span data-dcnode-id="3126" instrument_node="">
</span><p data-dcnode-id="3115"></p><div class="dpsp-pin-it-wrapper aligncenter size-full wp-image-25794" data-dcnode-id="3119"><img alt="“Folks are usually about as happy as they make their minds up to be.” ― Abraham Lincoln" class="" data-dcnode-id="3125" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Abraham-Lincoln-quote.jpg" data-lazy-srcset="https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Abraham-Lincoln-quote.jpg 600w, https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Abraham-Lincoln-quote-200x300.jpg 200w" data-pin-description="&quot;Folks are usually about as happy as they make their minds up to be&quot; ― Abraham Lincoln. Click here for 12 secrets to always being happy and positive in life and with yourself. #Happiness #Positive #PositiveVibes #Positivity #Affirmation #PositivePeople #ChooseJoy #PositiveLife #MentalHealth #MindBodySpirit #EmotionalHealth #EmotionalHealing #SelfHelp #SelfGrowth #QuotesToLiveBy #Positive #PositiveThinking #QuotestoRemember #InspirationalQuotes #PositiveQuotes" data-pin-title="12 Secrets To Always Being Happy And Positive" height="900" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20900'%3E%3C/svg%3E" style="" width="600"><span class="dpsp-pin-it-overlay" data-dcnode-id="3124"></span><a aria-label="Save Pin For Later" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rounded dpsp-pin-it-button-has-label" data-dcnode-id="3120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%3A%252F%252Fitsallyouboo.com%252Fwp-content%252Fuploads%252F2019%252F04%252Falways-being-happy-and-positive-Abraham-Lincoln-quote.jpg%26url%3Dhttps%3A%252F%252Fitsallyouboo.com%252F12-secrets-to-always-being-happy-and-positive%252F%26is_video%3Dfalse%26description%3D%2522Folks%2520are%2520usually%2520about%2520as%2520happy%2520as%2520they%2520make%2520their%2520minds%2520up%2520to%2520be%2522%2520%25E2%2580%2595%2520Abraham%2520Lincoln.%2520Click%2520here%2520for%252012%2520secrets%2520to%2520always%2520being%2520happy%2520and%2520positive%2520in%2520life%2520and%2520with%2520yourself.%2520%2523Happiness%2520%2523Positive%2520%2523PositiveVibes%2520%2523Positivity%2520%2523Affirmation%2520%2523PositivePeople%2520%2523ChooseJoy%2520%2523PositiveLife%2520%2523MentalHealth%2520%2523MindBodySpirit%2520%2523EmotionalHealth%2520%2523EmotionalHealing%2520%2523SelfHelp%2520%2523SelfGrowth%2520%2523QuotesToLiveBy%2520%2523Positive%2520%2523PositiveThinking%2520%2523QuotestoRemember%2520%2523InspirationalQuotes%2520%2523PositiveQuotes" rel="noopener" target="_blank" title="Save Pin For Later"><span class="dpsp-network-icon" data-dcnode-id="3121"><svg data-dcnode-id="3122" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="3123"></path></svg></span></a></div><noscript data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">&lt;img class="aligncenter size-full wp-image-25794" src="https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Abraham-Lincoln-quote.jpg" alt="“Folks are usually about as happy as they make their minds up to be.” ― Abraham Lincoln" width="600" height="900" data-pin-description=""Folks are usually about as happy as they make their minds up to be" ― Abraham Lincoln. Click here for 12 secrets to always being happy and positive in life and with yourself. #Happiness #Positive #PositiveVibes #Positivity #Affirmation #PositivePeople #ChooseJoy #PositiveLife #MentalHealth #MindBodySpirit #EmotionalHealth #EmotionalHealing #SelfHelp #SelfGrowth #QuotesToLiveBy #Positive #PositiveThinking #QuotestoRemember #InspirationalQuotes #PositiveQuotes" srcset="https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Abraham-Lincoln-quote.jpg 600w, https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Abraham-Lincoln-quote-200x300.jpg 200w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript><a data-dcnode-id="3116" name="ANTs"></a><p></p><span data-dcnode-id="3114" instrument_node="">
</span><p data-dcnode-id="3111"><strong data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">It’s that voice in your head that whispers lies to us and tells us things like “you’re not good enough.” and “you can’t do that.”</span></strong></p><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">When we let the inner critic run wild, those thoughts have the potential to cripple us. &nbsp;</span></p><span data-dcnode-id="3107" instrument_node="">
</span><p data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">We can go from feeling happy and positive to feeling lower than a snake’s belly in a wagon rut in a matter of minutes if we start listening to and believing our inner critic.&nbsp;</span></p><span data-dcnode-id="3104" instrument_node="">
</span><p data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3101" instrument_node="">
</span><h3 data-dcnode-id="3097"><span data-dcnode-id="3100" instrument_node="">#3. </span><span data-dcnode-id="3098" style="text-decoration: underline;"><span data-dcnode-id="3099" instrument_node="">Squash those ANTs</span></span></h3><span data-dcnode-id="3096" instrument_node="">
</span><p data-dcnode-id="3086"><a data-dcnode-id="3095" name="beliefs"></a><br data-dcnode-id="3094"><span data-dcnode-id="3093" instrument_node="">
Those whispers that our inner critic tells us to have another name – “</span><strong data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">automatic negative thoughts</span></strong><span data-dcnode-id="3090" instrument_node="">” or ANTs. &nbsp;Just like the insects they sound like, </span><strong data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">ANTs have a queen that drives them. Her name is Insecurity</span></strong><span data-dcnode-id="3087" instrument_node="">. Yes, those ANTs pop up because of our own insecurity. &nbsp;</span></p><span data-dcnode-id="3085" instrument_node="">
</span><p data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">Do you know what I do when I see a tiny insect ant in my house? If it’s just a single one, I squash it. You can squash your own ANTs too. They go *splat* quite easily when exposed to the truth. &nbsp;</span></p><span data-dcnode-id="3082" instrument_node="">
</span><p data-dcnode-id="3078"><strong data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">A large part of learning how to always be happy and positive is learning to combat negative thoughts.</span></strong><span data-dcnode-id="3079" instrument_node=""> You won’t be happy if those ANTs are always dragging you down.&nbsp;</span></p><span data-dcnode-id="3077" instrument_node="">
</span><p data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3074" instrument_node="">
</span><h3 data-dcnode-id="3070"><span data-dcnode-id="3073" instrument_node="">#4. </span><span data-dcnode-id="3071" style="text-decoration: underline;"><span data-dcnode-id="3072" instrument_node="">Combat Limiting Beliefs</span></span></h3><span data-dcnode-id="3069" instrument_node="">
</span><p data-dcnode-id="3061"><span data-dcnode-id="3068" instrument_node="">Those ANTs that our inner critic whispers hold us back from doing what we really want to do. &nbsp;</span><strong data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">They form the basis for limiting beliefs that we think to be true.</span></strong><span data-dcnode-id="3065" instrument_node=""> If you are going to live a happy life with purpose, you will have to stretch your comfort zone, which also means </span><a data-dcnode-id="3063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/how-to-overcome-your-limiting-beliefs-as-an-entrepreneur/"><span data-dcnode-id="3064" instrument_node="">overcoming those limiting beliefs</span></a><span data-dcnode-id="3062" instrument_node="">. &nbsp;</span></p><span data-dcnode-id="3060" instrument_node="">
</span><p data-dcnode-id="3052"><span data-dcnode-id="3059" instrument_node="">The most common way to do this is with affirmations. &nbsp;</span><strong data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">Affirmations are statements that we want to be true that directly conflict a limiting belief.</span></strong><span data-dcnode-id="3056" instrument_node=""> &nbsp;They are a “new program” that </span><a data-dcnode-id="3054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/train-your-subconscious-mind-for-success/"><span data-dcnode-id="3055" instrument_node="">our subconscious mind</span></a><span data-dcnode-id="3053" instrument_node=""> runs.</span></p><span data-dcnode-id="3051" instrument_node="">
</span><p data-dcnode-id="3044"><strong data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">The best affirmations are a positive statement that starts with “I am” &nbsp;followed by emotion and wrapped up with the specific thing you want to be true.</span></strong><span data-dcnode-id="3048" instrument_node=""> &nbsp;For example, if you have a goal to lose weight and your ideal weight is 128 lbs. You could </span><a data-dcnode-id="3046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thinkup.me/powerful-affirmations/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3047" instrument_node="">craft an affirmation</span></a><span data-dcnode-id="3045" instrument_node=""> that says “I am feeling energetic and great at 128!”</span></p><span data-dcnode-id="3043" instrument_node="">
</span><p data-dcnode-id="3032"><span data-dcnode-id="3042" instrument_node="">&nbsp;</span><br data-dcnode-id="3041"><span data-dcnode-id="3040" instrument_node="">
</span><a data-dcnode-id="3039" name="mindful"></a><br data-dcnode-id="3038"><span data-dcnode-id="3037" instrument_node="">
</span><a data-dcnode-id="3033" href="#ck_modal" rel="ck_modal"><img alt="Get your FREE Be More Positive Affirmations" class="aligncenter size-full wp-image-32190" data-dcnode-id="3036" data-lazy-sizes="(max-width: 1552px) 100vw, 1552px" data-lazy-src="https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download.jpg" data-lazy-srcset="https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download.jpg 1552w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-300x135.jpg 300w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-1024x461.jpg 1024w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-768x346.jpg 768w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-1536x692.jpg 1536w" data-pin-nopin="true" height="699" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201552%20699'%3E%3C/svg%3E" width="1552"><noscript data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">&lt;img class="aligncenter size-full wp-image-32190" src="https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download.jpg" alt="Get your FREE Be More Positive Affirmations" width="1552" height="699" srcset="https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download.jpg 1552w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-300x135.jpg 300w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-1024x461.jpg 1024w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-768x346.jpg 768w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-1536x692.jpg 1536w" sizes="(max-width: 1552px) 100vw, 1552px" /&gt;</span></noscript></a></p><span data-dcnode-id="3031" instrument_node="">
</span><h3 data-dcnode-id="3027"><span data-dcnode-id="3030" instrument_node="">#5. </span><span data-dcnode-id="3028" style="text-decoration: underline;"><span data-dcnode-id="3029" instrument_node="">Practice Mindfulness and Live in the Moment</span></span></h3><span data-dcnode-id="3026" instrument_node="">
</span><p data-dcnode-id="3022"><a data-dcnode-id="3024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/how-to-practice-mindfulness-throughout-the-day/"><span data-dcnode-id="3025" instrument_node="">Mindfulness</span></a><span data-dcnode-id="3023" instrument_node=""> has become a bit of a buzz word lately in the personal development/personal growth field. &nbsp;I had never heard of it until I started blogging.</span></p><span data-dcnode-id="3021" instrument_node="">
</span><p data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">Sometimes I would do something that I was supposed to enjoy. &nbsp;I would go out with the family on a day trip or take the kids to the park but I would not enjoy it. Why? Because I spent the whole time with my thoughts a million miles away.</span></p><span data-dcnode-id="3018" instrument_node="">
</span><p data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">I might have been worrying about something, planning something out, thinking of being somewhere else entirely, or obsessing over something that hurt my feelings. I not only ruined the experience for myself but often for the whole family because they would be concerned about why Mom’s not happy. &nbsp;</span></p><span data-dcnode-id="3015" instrument_node="">
</span><pre data-dcnode-id="3011"><span data-dcnode-id="3014" instrument_node="">👉🏽 RELATED POST: </span><a data-dcnode-id="3012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/how-to-practice-mindfulness-throughout-the-day/"><span data-dcnode-id="3013" instrument_node="">How to Practice Mindfulness Throughout the Day</span></a></pre><span data-dcnode-id="3010" instrument_node="">
</span><p data-dcnode-id="3005"><strong data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">If your mind is somewhere else, how many memories of the event are you going to walk away with?</span></strong><span data-dcnode-id="3007" instrument_node=""> Not many. You don’t know what happened because you weren’t paying attention to what was right in front of you!</span><a data-dcnode-id="3006" name="worry"></a></p><span data-dcnode-id="3004" instrument_node="">
</span><p data-dcnode-id="2998"><strong data-dcnode-id="3000"><a data-dcnode-id="3002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/how-to-live-in-the-moment-and-enjoy-the-present/"><span data-dcnode-id="3003" instrument_node="">Live in the moment</span></a><span data-dcnode-id="3001" instrument_node="">. Fully immerse yourself in the experience. &nbsp;</span></strong><span data-dcnode-id="2999" instrument_node="">Forget about the grocery list, forget about your to-do list next week. &nbsp;Concentrate on who you are with and what is happening right now. Kids are masters at this. &nbsp;When they are playing they are fully immersed in the experience. They are not worried about next week, tomorrow, or even what will happen in the next hour. &nbsp;They lose themselves in the experience. Soak it up.</span></p><span data-dcnode-id="2997" instrument_node="">
</span><p data-dcnode-id="2993"><span data-dcnode-id="2996" instrument_node="">Stop worrying about trying to take the perfect picture of the family swimming. &nbsp;Put the camera down and hop in with them! </span><strong data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">One of the best gifts you can give your loved ones is the gift of your full and complete presence.&nbsp;&nbsp;</span></strong></p><span data-dcnode-id="2992" instrument_node="">
</span><p data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2989" instrument_node="">
</span><h3 data-dcnode-id="2985"><span data-dcnode-id="2988" instrument_node="">#6. </span><span data-dcnode-id="2986" style="text-decoration: underline;"><span data-dcnode-id="2987" instrument_node="">Exchange Worry for Concern</span></span></h3><span data-dcnode-id="2984" instrument_node="">
</span><p data-dcnode-id="2979"><span data-dcnode-id="2983" instrument_node="">Have you ever seen a Chinese finger trap? It’s a little toy, usually a novelty, that is nothing more than a woven tube. &nbsp;You put a finger in each side of it easily, but if you try to pull both of your fingers out quickly at the same time, you are trapped! &nbsp;The harder you pull, the tighter the weaving becomes! You can’t get out! </span><strong data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">Worrying is like a that Chinese finger trap</span></strong><span data-dcnode-id="2980" instrument_node=""> – the more you pull, tug, and struggle, the tighter it binds you. &nbsp;You feel trapped and helpless as worry sucks away all your hard work learning how to always be happy and positive.</span></p><span data-dcnode-id="2978" instrument_node="">
</span><p data-dcnode-id="2968"><span data-dcnode-id="2977" instrument_node="">The truth is – </span><strong data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">worrying is a habit.</span></strong><span data-dcnode-id="2974" instrument_node=""> &nbsp;When you worry, it’s much like the child who convinces him/herself there is a monster under the bed. &nbsp;The feelings of being terrified are real, but the monster under the bed is fiction. </span><strong data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">Worry is based on fiction</span></strong><span data-dcnode-id="2971" instrument_node="">, with emotions that are often overblown in relation to the real situation. &nbsp;It’s not constructive. </span><strong data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">Concern is worry’s more realistic cousin. Concern is fact-based and constructive with emotions that are proportional to the situation.</span></strong></p><span data-dcnode-id="2967" instrument_node="">
</span><p data-dcnode-id="2957"></p><div class="dpsp-pin-it-wrapper aligncenter size-full wp-image-25795" data-dcnode-id="2960"><img alt="“Happiness is not something ready made. It comes from your own actions.” ― Dalai Lama" class="" data-dcnode-id="2966" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Dalai-Lama-quote.jpg" data-lazy-srcset="https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Dalai-Lama-quote.jpg 600w, https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Dalai-Lama-quote-200x300.jpg 200w" data-pin-description="&quot;Happiness is not something ready made. It comes from your own actions&quot; ― Dalai Lama. Click here for 12 secrets to always being happy and positive in life and with yourself. #Happiness #Positive #PositiveVibes #Positivity #Affirmation #PositivePeople #ChooseJoy #PositiveLife #MentalHealth #MindBodySpirit #EmotionalHealth #EmotionalHealing #SelfHelp #SelfGrowth #QuotesToLiveBy #Positive #PositiveThinking #QuotestoRemember #InspirationalQuotes #PositiveQuotes" data-pin-title="12 Secrets To Always Being Happy And Positive" height="900" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20900'%3E%3C/svg%3E" style="" width="600"><span class="dpsp-pin-it-overlay" data-dcnode-id="2965"></span><a aria-label="Save Pin For Later" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rounded dpsp-pin-it-button-has-label" data-dcnode-id="2961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%3A%252F%252Fitsallyouboo.com%252Fwp-content%252Fuploads%252F2019%252F04%252Falways-being-happy-and-positive-Dalai-Lama-quote.jpg%26url%3Dhttps%3A%252F%252Fitsallyouboo.com%252F12-secrets-to-always-being-happy-and-positive%252F%26is_video%3Dfalse%26description%3D%2522Happiness%2520is%2520not%2520something%2520ready%2520made.%2520It%2520comes%2520from%2520your%2520own%2520actions%2522%2520%25E2%2580%2595%2520Dalai%2520Lama.%2520Click%2520here%2520for%252012%2520secrets%2520to%2520always%2520being%2520happy%2520and%2520positive%2520in%2520life%2520and%2520with%2520yourself.%2520%2523Happiness%2520%2523Positive%2520%2523PositiveVibes%2520%2523Positivity%2520%2523Affirmation%2520%2523PositivePeople%2520%2523ChooseJoy%2520%2523PositiveLife%2520%2523MentalHealth%2520%2523MindBodySpirit%2520%2523EmotionalHealth%2520%2523EmotionalHealing%2520%2523SelfHelp%2520%2523SelfGrowth%2520%2523QuotesToLiveBy%2520%2523Positive%2520%2523PositiveThinking%2520%2523QuotestoRemember%2520%2523InspirationalQuotes%2520%2523PositiveQuotes" rel="noopener" target="_blank" title="Save Pin For Later"><span class="dpsp-network-icon" data-dcnode-id="2962"><svg data-dcnode-id="2963" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="2964"></path></svg></span></a></div><noscript data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">&lt;img class="aligncenter size-full wp-image-25795" src="https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Dalai-Lama-quote.jpg" alt="“Happiness is not something ready made. It comes from your own actions.” ― Dalai Lama" width="600" height="900" data-pin-description=""Happiness is not something ready made. It comes from your own actions" ― Dalai Lama. Click here for 12 secrets to always being happy and positive in life and with yourself. #Happiness #Positive #PositiveVibes #Positivity #Affirmation #PositivePeople #ChooseJoy #PositiveLife #MentalHealth #MindBodySpirit #EmotionalHealth #EmotionalHealing #SelfHelp #SelfGrowth #QuotesToLiveBy #Positive #PositiveThinking #QuotestoRemember #InspirationalQuotes #PositiveQuotes" srcset="https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Dalai-Lama-quote.jpg 600w, https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Dalai-Lama-quote-200x300.jpg 200w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript><p></p><span data-dcnode-id="2956" instrument_node="">
</span><h4 data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">How To Tell the Difference in Worry and Concern</span></h4><span data-dcnode-id="2953" instrument_node="">
</span><p data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">For example, if my car tires are wearing thin, concern might look like: “My tires are getting thin. With the current amount of driving that I do, I should have about a month before they need to be replaced. &nbsp;I’ll call several tire shops in the area and price tires, and then evaluate how I want to pay for them.”</span></p><span data-dcnode-id="2950" instrument_node="">
</span><p data-dcnode-id="2947"><span data-dcnode-id="2949" instrument_node="">Worrying in the same situation might look like: “Oh my goodness! My tires are getting thin! &nbsp;What if I have a flat on the freeway?! What if there is nowhere to pull over and I have to drive on it until it explodes or causes a huge multi-car pile-up! &nbsp;I could die in the wreck! My poor kids would be without a mother and my husband would be devastated! How would they make it without me?!”</span><a data-dcnode-id="2948" name="others"></a></p><span data-dcnode-id="2946" instrument_node="">
</span><p data-dcnode-id="2941"><span data-dcnode-id="2945" instrument_node="">Wait a minute…. I went from “My tires are thin” to “I’m dead.” Does the worrying scenario make any sense to you? </span><strong data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">Is it constructive and based on fact and are the emotions proportional to the real problem, or are they vastly overblown and based on fiction?</span></strong><span data-dcnode-id="2942" instrument_node=""> &nbsp;That’s the same as trying to pull both of your fingers out of that Chinese finger trap and panicking because you can’t get them out at the same time.</span></p><span data-dcnode-id="2940" instrument_node="">
</span><p data-dcnode-id="2936"><strong data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">The secret to escaping worry and the secret to getting out of the Chinese finger trap is the same – you let go</span></strong><span data-dcnode-id="2937" instrument_node="">. &nbsp;You will find that if you stop and evaluate the situation and ask if it based on fact or fiction, worry will start coming unraveled. &nbsp;Likewise, if you gently take your fingers out of the woven tube, you will find the Chinese finger trap quite easy to escape.</span></p><span data-dcnode-id="2935" instrument_node="">
</span><p data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2932" instrument_node="">
</span><h3 data-dcnode-id="2928"><span data-dcnode-id="2931" instrument_node="">#7. </span><span data-dcnode-id="2929" style="text-decoration: underline;"><span data-dcnode-id="2930" instrument_node="">Stop Comparing Yourself to Others</span></span></h3><span data-dcnode-id="2927" instrument_node="">
</span><p data-dcnode-id="2922"><span data-dcnode-id="2926" instrument_node="">Comparing yourself to others is a trap. &nbsp;</span><strong data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">I should know because I find myself falling into it all too easily.</span></strong><span data-dcnode-id="2923" instrument_node=""> &nbsp;In your journey towards unlocking the secrets to a happy life, comparing yourself to others is a habit best left behind. &nbsp;No two people have the same journey.</span></p><span data-dcnode-id="2921" instrument_node="">
</span><p data-dcnode-id="2914"><strong data-dcnode-id="2916"><span data-dcnode-id="2920" instrument_node="">You have different </span><a data-dcnode-id="2918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/20-ways-to-find-your-talent-passion-and-superpower/"><span data-dcnode-id="2919" instrument_node="">gifts, talents, and strengths</span></a><span data-dcnode-id="2917" instrument_node=""> than anyone else</span></strong><span data-dcnode-id="2915" instrument_node="">. You also have different challenges to overcome, as well as different resources at your disposal.</span></p><span data-dcnode-id="2913" instrument_node="">
</span><p data-dcnode-id="2909"><strong data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">When you compare yourself to others, you do not see the challenges that they had to overcome.</span></strong><span data-dcnode-id="2910" instrument_node=""> &nbsp;When you are tempted to compare yourself to others, remember that their success is only the tip of the iceberg. &nbsp;Ask any successful person – they will tell you that they had their own challenges to overcome, just as you have yours. &nbsp;</span></p><span data-dcnode-id="2908" instrument_node="">
</span><p data-dcnode-id="2905"><span data-dcnode-id="2907" instrument_node="">Keep your eyes on your own prize and not on your neighbor’s.</span><a data-dcnode-id="2906" name="gratitude"></a></p><span data-dcnode-id="2904" instrument_node="">
</span><h3 data-dcnode-id="2899"><a data-dcnode-id="2900" href="#ck_modal" rel="ck_modal"><img alt="Get your FREE Be More Positive Affirmations" class="aligncenter size-full wp-image-32190" data-dcnode-id="2903" data-lazy-sizes="(max-width: 1552px) 100vw, 1552px" data-lazy-src="https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download.jpg" data-lazy-srcset="https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download.jpg 1552w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-300x135.jpg 300w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-1024x461.jpg 1024w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-768x346.jpg 768w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-1536x692.jpg 1536w" data-pin-nopin="true" height="699" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201552%20699'%3E%3C/svg%3E" width="1552"><noscript data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">&lt;img class="aligncenter size-full wp-image-32190" src="https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download.jpg" alt="Get your FREE Be More Positive Affirmations" width="1552" height="699" srcset="https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download.jpg 1552w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-300x135.jpg 300w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-1024x461.jpg 1024w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-768x346.jpg 768w, https://itsallyouboo.com/wp-content/uploads/2019/04/Be-More-Positive-Affirmations-click-to-download-1536x692.jpg 1536w" sizes="(max-width: 1552px) 100vw, 1552px" /&gt;</span></noscript></a></h3><span data-dcnode-id="2898" instrument_node="">
</span><h3 data-dcnode-id="2894"><span data-dcnode-id="2897" instrument_node="">#8. </span><span data-dcnode-id="2895" style="text-decoration: underline;"><span data-dcnode-id="2896" instrument_node="">Practice Gratitude</span></span></h3><span data-dcnode-id="2893" instrument_node="">
</span><p data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">Gratitude is a major secret of how to be happy in life always. &nbsp;The great majority of us go through periods in our lives where we have less and periods where we have more. &nbsp;</span></p><span data-dcnode-id="2890" instrument_node="">
</span><p data-dcnode-id="2882"><strong data-dcnode-id="2885"><span data-dcnode-id="2889" instrument_node="">When you </span><a data-dcnode-id="2887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/inspirational-gratitude-quotes-happy-thanksgiving/"><span data-dcnode-id="2888" instrument_node="">practice gratitude</span></a><span data-dcnode-id="2886" instrument_node="">, it brings the focus to what you have instead of what you don’t.</span></strong><span data-dcnode-id="2884" instrument_node=""> The beautiful thing about gratitude is that it need not be time-consuming and you can practice it anytime, anywhere. </span><a data-dcnode-id="2883" name="choices"></a></p><span data-dcnode-id="2881" instrument_node="">
</span><p data-dcnode-id="2872"><strong data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">You can stop and ponder your blessings, or what has gone right in your day.</span></strong><span data-dcnode-id="2878" instrument_node=""> &nbsp;You can make a gratitude list, journal about it, respond to gratitude prompts, or even make a gratitude jar. However, you do it, </span><strong data-dcnode-id="2873"><span data-dcnode-id="2877" instrument_node="">practicing </span><a data-dcnode-id="2875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/why-is-gratitude-important/"><span data-dcnode-id="2876" instrument_node="">gratitude is one of the most important</span></a><span data-dcnode-id="2874" instrument_node=""> secrets to happiness.</span></strong></p><span data-dcnode-id="2871" instrument_node="">
</span><p data-dcnode-id="2863"><span data-dcnode-id="2870" instrument_node="">The biggest </span><a data-dcnode-id="2868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/benefits-of-gratitude/"><span data-dcnode-id="2869" instrument_node="">benefit of practicing gratitude</span></a><span data-dcnode-id="2867" instrument_node="">, in my opinion, is how </span><strong data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">it shifts your mindset.</span></strong><span data-dcnode-id="2864" instrument_node=""> &nbsp;You will be much better prepared for living a positive happy life when you are grateful for the good things presently in your life. I remember a day that I prayed for the things that I often take for granted now. Do you? Gratitude brings it back into remembrance.</span></p><span data-dcnode-id="2862" instrument_node="">
</span><p data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2859" instrument_node="">
</span><h3 data-dcnode-id="2855"><span data-dcnode-id="2858" instrument_node="">#9. </span><span data-dcnode-id="2856" style="text-decoration: underline;"><span data-dcnode-id="2857" instrument_node="">Be Mindful of Your Choices</span></span></h3><span data-dcnode-id="2854" instrument_node="">
</span><p data-dcnode-id="2847"><a data-dcnode-id="2853" name="critics"></a><br data-dcnode-id="2852"><span data-dcnode-id="2851" instrument_node="">
While all of these tips are good, </span><strong data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">if you are not mindful of your choices you will not learn how to always be happy and positive</span></strong><span data-dcnode-id="2848" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="2846" instrument_node="">
</span><p data-dcnode-id="2839"><span data-dcnode-id="2845" instrument_node="">If your choices are consistently bad and you do not take action to make them better, your life will still be unhappy. Make informed choices. Think about the consequences. </span><strong data-dcnode-id="2841"><a data-dcnode-id="2843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/how-to-choose-the-right-path/"><span data-dcnode-id="2844" instrument_node="">Make the right choices</span></a><span data-dcnode-id="2842" instrument_node=""> that align with your goals</span></strong><span data-dcnode-id="2840" instrument_node="">.</span></p><span data-dcnode-id="2838" instrument_node="">
</span><p data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2835" instrument_node="">
</span><h3 data-dcnode-id="2831"><span data-dcnode-id="2834" instrument_node="">#10. </span><span data-dcnode-id="2832" style="text-decoration: underline;"><span data-dcnode-id="2833" instrument_node="">Realize that Critics Usually Have a Problem With Themselves, Not You</span></span></h3><span data-dcnode-id="2830" instrument_node="">
</span><p data-dcnode-id="2825"><span data-dcnode-id="2829" instrument_node="">I am a pretty sensitive person and handling critics have always been something that I have struggled with. &nbsp;As I have gotten older, </span><strong data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">I started realizing that how people treat others has to do more with themselves than anyone else</span></strong><span data-dcnode-id="2826" instrument_node="">. &nbsp;Hurting people hurt others.</span></p><span data-dcnode-id="2824" instrument_node="">
</span><pre data-dcnode-id="2820"><span data-dcnode-id="2823" instrument_node="">👉🏽 RELATED POST:&nbsp; </span><a data-dcnode-id="2821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/50-quotes-about-being-criticized-and-how-to-handle-it/"><span data-dcnode-id="2822" instrument_node="">50 Criticism Quotes and How to Handle It</span></a></pre><span data-dcnode-id="2819" instrument_node="">
</span><p data-dcnode-id="2815"><a data-dcnode-id="2818" name="surround"></a><br data-dcnode-id="2817"><span data-dcnode-id="2816" instrument_node="">
You might be able to identify with this – if I am sick or hurt, I am cranky! &nbsp;Imagine living your whole life like that instead of just a few days. People lash out as a coping mechanism. &nbsp;It has nothing to do with the people they lash out at, and everything to do with them.</span></p><span data-dcnode-id="2814" instrument_node="">
</span><p data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">If someone gives you hurtful criticism, the problem is most likely how they feel about themselves.</span></p><span data-dcnode-id="2811" instrument_node="">
</span><p data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2808" instrument_node="">
</span><h3 data-dcnode-id="2804"><span data-dcnode-id="2807" instrument_node="">#11. </span><span data-dcnode-id="2805" style="text-decoration: underline;"><span data-dcnode-id="2806" instrument_node="">Surround Yourself with Positive Happy People</span></span></h3><span data-dcnode-id="2803" instrument_node="">
</span><p data-dcnode-id="2798"><span data-dcnode-id="2802" instrument_node="">We can’t always control our environment, but when we can, it certainly helps! &nbsp;</span><strong data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">Surround yourself with positive people that lift you up</span></strong><span data-dcnode-id="2799" instrument_node="">. Pay attention to how you feel after hanging out with them. &nbsp;</span></p><span data-dcnode-id="2797" instrument_node="">
</span><p data-dcnode-id="2786"></p><div class="dpsp-pin-it-wrapper aligncenter size-full wp-image-25797" data-dcnode-id="2790"><img alt="“Now and then it's good to pause in our pursuit of happiness and just be happy.” ― Guillaume Apollinaire" class="" data-dcnode-id="2796" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Guillaume-Apollinaire-quote.jpg" data-lazy-srcset="https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Guillaume-Apollinaire-quote.jpg 600w, https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Guillaume-Apollinaire-quote-200x300.jpg 200w" data-pin-description="&quot;Now and then it's good to pause in our pursuit of happiness and just be happy&quot; ― Guillaume Apollinaire. Click here for 12 secrets to always being happy and positive in life and with yourself. #Happiness #Positive #PositiveVibes #Positivity #Affirmation #PositivePeople #ChooseJoy #PositiveLife #MentalHealth #MindBodySpirit #EmotionalHealth #EmotionalHealing #SelfHelp #SelfGrowth #QuotesToLiveBy #Positive #PositiveThinking #QuotestoRemember #InspirationalQuotes #PositiveQuotes" data-pin-title="12 Secrets To Always Being Happy And Positive" height="900" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20900'%3E%3C/svg%3E" style="" width="600"><span class="dpsp-pin-it-overlay" data-dcnode-id="2795"></span><a aria-label="Save Pin For Later" class="dpsp-pin-it-button dpsp-pin-it-button-top-left dpsp-pin-it-button-shape-rounded dpsp-pin-it-button-has-label" data-dcnode-id="2791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%3A%252F%252Fitsallyouboo.com%252Fwp-content%252Fuploads%252F2019%252F04%252Falways-being-happy-and-positive-Guillaume-Apollinaire-quote.jpg%26url%3Dhttps%3A%252F%252Fitsallyouboo.com% </svg></span></a></div><noscript data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">&lt;img class="aligncenter size-full wp-image-25797" src="https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Guillaume-Apollinaire-quote.jpg" alt="“Now and then it's good to pause in our pursuit of happiness and just be happy.” ― Guillaume Apollinaire" width="600" height="900" data-pin-description=""Now and then it's good to pause in our pursuit of happiness and just be happy" ― Guillaume Apollinaire. Click here for 12 secrets to always being happy and positive in life and with yourself. #Happiness #Positive #PositiveVibes #Positivity #Affirmation #PositivePeople #ChooseJoy #PositiveLife #MentalHealth #MindBodySpirit #EmotionalHealth #EmotionalHealing #SelfHelp #SelfGrowth #QuotesToLiveBy #Positive #PositiveThinking #QuotestoRemember #InspirationalQuotes #PositiveQuotes" srcset="https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Guillaume-Apollinaire-quote.jpg 600w, https://itsallyouboo.com/wp-content/uploads/2019/04/always-being-happy-and-positive-Guillaume-Apollinaire-quote-200x300.jpg 200w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript><a data-dcnode-id="2787" name="takecare"></a><p></p><span data-dcnode-id="2785" instrument_node="">
</span><p data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">Do you feel uplifted and energized, or do you feel sad and unmotivated? When we are around positive, happy people it makes us feel the same way. &nbsp;Attitudes are contagious! &nbsp;Make sure yours is worth catching.</span></p><span data-dcnode-id="2782" instrument_node="">
</span><p data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2779" instrument_node="">
</span><h3 data-dcnode-id="2775"><span data-dcnode-id="2778" instrument_node="">#12. </span><span data-dcnode-id="2776" style="text-decoration: underline;"><span data-dcnode-id="2777" instrument_node=""> Take Care of Yourself</span></span></h3><span data-dcnode-id="2774" instrument_node="">
</span><p data-dcnode-id="2764"><a data-dcnode-id="2772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/benefits-of-practicing-self-care/"><span data-dcnode-id="2773" instrument_node="">Practicing self-care</span></a><span data-dcnode-id="2771" instrument_node=""> is huge. &nbsp;Our physical and our </span><a data-dcnode-id="2769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/ways-to-spend-a-mental-health-day/"><span data-dcnode-id="2770" instrument_node="">mental health</span></a><span data-dcnode-id="2768" instrument_node=""> is tied together. </span><strong data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">&nbsp;If you are drained and exhausted all the time, you will not be happy.</span></strong><span data-dcnode-id="2765" instrument_node=""> &nbsp;Remember that your happiness is your responsibility.</span></p><span data-dcnode-id="2763" instrument_node="">
</span><p data-dcnode-id="2759"><strong data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">Take time to recharge your batteries</span></strong><span data-dcnode-id="2760" instrument_node="">. You would not expect your electronic device to work well if the batteries are low. You are no different. Even if you know how to always be happy and positive, you won’t be able to put it into practice if you don’t take the time for self-care. &nbsp;</span></p><span data-dcnode-id="2758" instrument_node="">
</span><pre data-dcnode-id="2754"><span data-dcnode-id="2757" instrument_node="">👉🏽 RELATED POST: </span><a data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/cheap-and-easy-self-care-ideas/"><span data-dcnode-id="2756" instrument_node="">12 Cheap and Easy Self-Care Ideas That Feel Luxurious</span></a></pre><span data-dcnode-id="2753" instrument_node="">
</span><p data-dcnode-id="2749"><strong data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">Take the time that you need to care for yourself and make sure that your needs are met.</span></strong><span data-dcnode-id="2750" instrument_node=""> &nbsp;Your work will be much better quality, as will your gifts in caring for others. You have to make sure that there is something in your emotional bucket before you can pour anything out.</span></p><span data-dcnode-id="2748" instrument_node="">
</span><p data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2745" instrument_node="">
</span><p data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2742" instrument_node="">
</span><h2 data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">The Last Thing You Need to Know About How to Always Be Happy and Positive</span></h2><span data-dcnode-id="2739" instrument_node="">
</span><p data-dcnode-id="2735"><strong data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">If I can find the secrets to happiness and learn how to always be happy and positive I know you can too. &nbsp;</span></strong><span data-dcnode-id="2736" instrument_node="">I’m not saying that I’m perfect at it every day and that I never struggle. I am saying that I’m much happier than I was in the instance that I described in the opening paragraph.</span></p><span data-dcnode-id="2734" instrument_node="">
</span><p data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">Living a positive happy life is one of my big goals in life and it’s one that I hope we share.</span></p><span data-dcnode-id="2731" instrument_node="">
</span><h3 data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="2728" instrument_node="">

</span><p data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2677" instrument_node="">
</span><p data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">My book, “The Pearl Perspective” details the tips much more, but when you realize that happiness is your responsibility, you are taking the first steps towards learning how to always be happy and positive.</span></p><span data-dcnode-id="2674" instrument_node="">
</span><ul data-dcnode-id="2638"><span data-dcnode-id="2673" instrument_node="">
</span><li data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">Get your inner critic under control.</span></li><span data-dcnode-id="2670" instrument_node="">
</span><li data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">start squashing those automatic negative thoughts that pop up with the truth.</span></li><span data-dcnode-id="2667" instrument_node="">
</span><li data-dcnode-id="2663"><a data-dcnode-id="2665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/get-out-of-your-comfort-zone/"><span data-dcnode-id="2666" instrument_node="">Stretch your comfort zone</span></a><span data-dcnode-id="2664" instrument_node=""> by combatting your limiting beliefs.</span></li><span data-dcnode-id="2662" instrument_node="">
</span><li data-dcnode-id="2655"><a data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/how-to-practice-mindfulness-throughout-the-day/"><span data-dcnode-id="2661" instrument_node="">Practice mindfulness</span></a><span data-dcnode-id="2659" instrument_node=""> and </span><a data-dcnode-id="2657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itsallyouboo.com/how-to-live-in-the-moment-and-enjoy-the-present/"><span data-dcnode-id="2658" instrument_node="">live in the moment</span></a><span data-dcnode-id="2656" instrument_node="">. Breathe it in and enjoy it.</span></li><span data-dcnode-id="2654" instrument_node="">
</span><li data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">Exchange worry for its more productive cousin, concern.</span></li><span data-dcnode-id="2651" instrument_node="">
</span><li data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">Stop comparing yourself to others and start practicing gratitude on a regular basis.</span></li><span data-dcnode-id="2648" instrument_node="">
</span><li data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">Make well-thought-out choices.</span></li><span data-dcnode-id="2645" instrument_node="">
</span><li data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">Realize that critics usually have a problem with themselves and not you. Most of them are just lashing out. &nbsp;</span></li><span data-dcnode-id="2642" instrument_node="">
</span><li data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">Surround yourself with positive happy people and take care of yourself.</span></li><span data-dcnode-id="2639" instrument_node="">
</span></ul><span data-dcnode-id="2637" instrument_node="">
</span><p data-dcnode-id="2633"><strong data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">These secrets to happiness may sound simple, but they will make a world of difference in your life when you start applying them</span></strong><span data-dcnode-id="2634" instrument_node="">. &nbsp;</span></p><span data-dcnode-id="2632" instrument_node="">
</span><p data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">Just like everything else, if you want to always be happy and positive, it’s all you, Boo! &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="2629" instrument_node="">
