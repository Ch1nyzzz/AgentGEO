</span><div class="comp article-content expert-content right-rail__offset list lock-journey no-commerce list-sc mntl-block" data-bind-scroll-on-start="true" data-dcnode-id="1261" data-sc-breakpoint="50em" data-sc-content-positions="[1,1,1,1,1,1,1]" data-sc-load-immediate="3" data-sc-sticky-offset="80" id="list-sc_1-0"><span data-dcnode-id="1720" instrument_node="">
</span><div class="comp article-content__description article-intro mntl-sc-page mntl-block" data-dcnode-id="1703" id="article-intro_1-0"><span data-dcnode-id="1719" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1717" id="mntl-sc-block_1-0"><span data-dcnode-id="1718" instrument_node="">
Grit. Determination. Willpower. Fortitude. Do you have what it takes to persist in the face of challenges? To pick yourself up and carry on even when it seems like you have hit a brick wall? Mental toughness is a term used in psychology to refer to the resilience and strength that people possess to soldier through struggles and succeed.
</span></p><span data-dcnode-id="1716" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1708" id="mntl-sc-block_1-0-1"><span data-dcnode-id="1715" instrument_node="">
It is this mental toughness that gives some of the world's athletic superstars the ability to push past exhaustion, opposition, and injury to score and to win. It is the same quality that gives even weekend warriors the </span><a data-component="link" data-dcnode-id="1713" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/how-to-avoid-hitting-the-wall-in-a-marathon-2911443"><span data-dcnode-id="1714" instrument_node="">strength to finish that last mile</span></a><span data-dcnode-id="1712" instrument_node=""> and power through that </span><a data-component="link" data-dcnode-id="1710" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/beginners-guide-to-sets-repetitions-and-rest-intervals-3498619"><span data-dcnode-id="1711" instrument_node="">final set of reps</span></a><span data-dcnode-id="1709" instrument_node="">.
</span></p><span data-dcnode-id="1707" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1705" id="mntl-sc-block_1-0-2"><span data-dcnode-id="1706" instrument_node="">
So what can you do to cultivate a mentally tough attitude that will serve you well in not only your fitness pursuits but also in other aspects of your life?
</span></p><span data-dcnode-id="1704" instrument_node="">
</span></div><span data-dcnode-id="1702" instrument_node="">
</span><div class="comp mntl-sc-list-item list-sc-item mntl-block" data-dcnode-id="1607" id="list-sc-item_1-0"><span data-dcnode-id="1701" instrument_node="">
</span><div class="comp list-marker" data-dcnode-id="1700" id="list-marker_1-0"></div><span data-dcnode-id="1699" instrument_node="">
</span><div class="comp content-list-sc mntl-sc-list-item mntl-sc-page mntl-block" data-dcnode-id="1609" id="content-list-sc_1-0"><span data-dcnode-id="1698" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1697" id="toc-critical-components-of-mental-toughness"></span><span data-dcnode-id="1696" instrument_node=""> </span><h2 class="comp mntl-sc-list-item-title mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1691" id="mntl-sc-block_2-0"><span data-dcnode-id="1695" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node=""> Critical Components of Mental Toughness </span></span><span data-dcnode-id="1692" instrument_node=""> </span></h2><span data-dcnode-id="1690" instrument_node="">
</span><figure class="comp mntl-sc-block mntl-sc-block-image figure-landscape figure-high-res" data-dcnode-id="1670" id="mntl-sc-block_1-0-3"><span data-dcnode-id="1689" instrument_node="">

</span><figcaption class="comp mntl-figure-caption figure-article-caption" data-dcnode-id="1672" id="mntl-figure-caption_1-0"><span data-dcnode-id="1677" instrument_node="">
</span><span class="figure-article-caption-owner" data-dcnode-id="1674"><p data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Henrik Sorensen / Getty Images</span></p></span><span data-dcnode-id="1673" instrument_node="">
</span></figcaption><span data-dcnode-id="1671" instrument_node="">
</span></figure><span data-dcnode-id="1669" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1667" id="mntl-sc-block_2-0-2"><span data-dcnode-id="1668" instrument_node="">
Mental toughness is what helps set great athletes apart from the competition. To cultivate these qualities, it is essential first to understand what exactly makes these mentally strong competitors different from the pack.
</span></p><span data-dcnode-id="1666" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1661" id="mntl-sc-block_2-0-3"><span data-dcnode-id="1665" instrument_node="">
While it originated in the field of </span><a data-component="link" data-dcnode-id="1663" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/basic-training-the-best-workout-routines-for-athletes-3862379"><span data-dcnode-id="1664" instrument_node="">sports training</span></a><span data-dcnode-id="1662" instrument_node="">, referring to the ability of athletes to stay strong, confident, and competitive, mental toughness is a term that is now casually used to refer to the host of mental attributes that allow people to handle life's difficulties.
</span></p><span data-dcnode-id="1660" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1658" id="mntl-sc-block_2-0-4"><span data-dcnode-id="1659" instrument_node="">
There is some debate among researchers about exactly how to define mental toughness including what it entails and the areas of life to which it applies. Some experts, for example, suggest that mental toughness should be restricted largely to the field of sports while others believe that it is a more general quality that impacts many other areas of life.
</span></p><span data-dcnode-id="1657" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1652" id="mntl-sc-block_2-0-5"><span data-dcnode-id="1656" instrument_node="">
In their book, "Developing Mental Toughness," researchers Peter Clough and Doug Strycharczyk define mental toughness as "The quality which determines in large part how people deal effectively with challenges, stressors, and pressure...irrespective of prevailing circumstances."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1654" data-id="#citation-1"><span data-dcnode-id="1655" instrument_node="">1</span></span><span data-dcnode-id="1653" instrument_node="">﻿
</span></p><span data-dcnode-id="1651" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1649" id="mntl-sc-block_2-0-6"><span data-dcnode-id="1650" instrument_node="">
Clough and his colleagues describe it as similar to a personality trait consisting of four critical components.
</span></p><span data-dcnode-id="1648" instrument_node="">
</span><div class="comp theme-explainer mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1623" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-4"><span data-dcnode-id="1647" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="1645" id="mntl-sc-block-callout-heading_1-0"><span data-dcnode-id="1646" instrument_node="">
Components of Mental Toughness</span></h3><span data-dcnode-id="1644" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1625" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="1643" instrument_node="">
</span><ol data-dcnode-id="1626"><li data-dcnode-id="1639"><strong data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Challenge</span></strong><span data-dcnode-id="1640" instrument_node="">: Viewing challenges as opportunities rather than obstacles</span></li><li data-dcnode-id="1635"><strong data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Control</span></strong><span data-dcnode-id="1636" instrument_node="">: Believing that you are in control of your life and destiny</span></li><li data-dcnode-id="1631"><strong data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Commitment</span></strong><span data-dcnode-id="1632" instrument_node="">: Having the ability to stick to tasks and see them through to completion</span></li><li data-dcnode-id="1627"><strong data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Confidence</span></strong><span data-dcnode-id="1628" instrument_node="">: Possessing strong self-belief in your ability to succeed</span></li></ol></div><span data-dcnode-id="1624" instrument_node="">
</span></div><span data-dcnode-id="1622" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1620" id="mntl-sc-block_2-0-8"><span data-dcnode-id="1621" instrument_node="">
They also suggest that it is similar in many ways to the concept of psychological hardiness and that mental toughness should not be restricted to the field of sport. Elite athletes might typify the sort of mental toughness that makes them winners, but the same skills can apply to many areas of everyday life.
</span></p><span data-dcnode-id="1619" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1614" id="mntl-sc-block_2-0-9"><span data-dcnode-id="1618" instrument_node="">
So, is mental toughness the product of nature or nurture? Available evidence points to a strong genetic link. While some people just seem to come by mental toughness quite naturally, in a study published in 2017, researchers suggest that it is also a skill that can be learned and strengthened.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1616" data-id="#citation-2"><span data-dcnode-id="1617" instrument_node="">2</span></span><span data-dcnode-id="1615" instrument_node="">﻿
</span></p><span data-dcnode-id="1613" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1611" id="mntl-sc-block_2-0-10"><span data-dcnode-id="1612" instrument_node="">
Athletic training certainly points to the ability to acquire these skills. What else can you do to cultivate the quality of mental toughness?
</span></p><span data-dcnode-id="1610" instrument_node="">
</span></div><span data-dcnode-id="1608" instrument_node="">
</span></div><span data-dcnode-id="1606" instrument_node="">
</span><div class="comp mntl-sc-block-adslot adslot mntl-block" data-dcnode-id="1605" id="adslot_1-0"></div><span data-dcnode-id="1604" instrument_node="">
</span><div class="comp mntl-sc-list-item list-sc-item mntl-block" data-dcnode-id="1565" id="list-sc-item_1-0-1"><span data-dcnode-id="1603" instrument_node="">
</span><div class="comp list-marker" data-dcnode-id="1602" id="list-marker_1-0-1"></div><span data-dcnode-id="1601" instrument_node="">
</span><div class="comp content-list-sc mntl-sc-list-item mntl-sc-page mntl-block" data-dcnode-id="1567" id="content-list-sc_1-0-1"><span data-dcnode-id="1600" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1599" id="toc-believe-in-your-ability-to-achieve-your-goals"></span><span data-dcnode-id="1598" instrument_node=""> </span><h2 class="comp mntl-sc-list-item-title mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1593" id="mntl-sc-block_2-0-11"><span data-dcnode-id="1597" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node=""> Believe in Your Ability to Achieve Your Goals </span></span><span data-dcnode-id="1594" instrument_node=""> </span></h2><span data-dcnode-id="1592" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1584" id="mntl-sc-block_2-0-12"><span data-dcnode-id="1591" instrument_node="">
Mentally tough people don't just think they </span><em data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">might</span></em><span data-dcnode-id="1588" instrument_node=""> be able to succeed, they </span><em data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">know</span></em><span data-dcnode-id="1585" instrument_node=""> they can. While much of the research on mental toughness relates directly to the world of athletics and sport, you can apply some of these same principles to other areas of your life.
</span></p><span data-dcnode-id="1583" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1569" id="mntl-sc-block_2-0-13"><span data-dcnode-id="1582" instrument_node="">
Whether you are trying to </span><a data-component="link" data-dcnode-id="1580" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/how-to-break-bad-eating-habits-for-good-4153595"><span data-dcnode-id="1581" instrument_node="">lose weight</span></a><span data-dcnode-id="1579" instrument_node="">, drop a bad habit, </span><a data-component="link" data-dcnode-id="1577" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/reasons-to-run-a-marathon-2911072"><span data-dcnode-id="1578" instrument_node="">run a marathon</span></a><span data-dcnode-id="1576" instrument_node="">, excel in your career, or do great in school, </span><a data-component="link" data-dcnode-id="1574" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/how-to-motivate-yourself-to-lose-weight-3496383"><span data-dcnode-id="1575" instrument_node="">believing in yourself</span></a><span data-dcnode-id="1573" instrument_node=""> is essential.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1571" data-id="#citation-3"><span data-dcnode-id="1572" instrument_node="">3</span></span><span data-dcnode-id="1570" instrument_node="">﻿&nbsp;Avoid negative self-talk and instead focus your energy on staying positive and&nbsp;self-encouraging.
</span></p><span data-dcnode-id="1568" instrument_node="">
</span></div><span data-dcnode-id="1566" instrument_node="">
</span></div><span data-dcnode-id="1564" instrument_node="">
</span><div class="comp mntl-sc-block-adslot adslot mntl-block" data-dcnode-id="1563" id="adslot_1-0-1"></div><span data-dcnode-id="1562" instrument_node="">
</span><div class="comp mntl-sc-list-item list-sc-item mntl-block" data-dcnode-id="1527" id="list-sc-item_1-0-2"><span data-dcnode-id="1561" instrument_node="">
</span><div class="comp list-marker" data-dcnode-id="1560" id="list-marker_1-0-2"></div><span data-dcnode-id="1559" instrument_node="">
</span><div class="comp content-list-sc mntl-sc-list-item mntl-sc-page mntl-block" data-dcnode-id="1529" id="content-list-sc_1-0-2"><span data-dcnode-id="1558" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1557" id="toc-focus-on-intrinsic-motivations-rather-than-external-rewards"></span><span data-dcnode-id="1556" instrument_node=""> </span><h2 class="comp mntl-sc-list-item-title mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1551" id="mntl-sc-block_2-0-14"><span data-dcnode-id="1555" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node=""> Focus on Intrinsic Motivations Rather Than External Rewards </span></span><span data-dcnode-id="1552" instrument_node=""> </span></h2><span data-dcnode-id="1550" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1545" id="mntl-sc-block_2-0-15"><span data-dcnode-id="1549" instrument_node="">
The world's top athletes don't find the will to persevere and win because they are seeking acclaim, money, or other rewards (although those things are undoubtedly nice). Instead, they are </span><a data-component="link" data-dcnode-id="1547" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/positive-self-talk-3120690"><span data-dcnode-id="1548" instrument_node="">intrinsically motivated by forces within themselves</span></a><span data-dcnode-id="1546" instrument_node="">.
</span></p><span data-dcnode-id="1544" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1539" id="mntl-sc-block_2-0-16"><span data-dcnode-id="1543" instrument_node="">
Intrinsic motivations are those that come from within an individual and involve doing things for their own sake. These internal motivations drive people to do better, push harder, be stronger, and see just how far they can go.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1541" data-id="#citation-2"><span data-dcnode-id="1542" instrument_node="">2</span></span><span data-dcnode-id="1540" instrument_node="">﻿
</span></p><span data-dcnode-id="1538" instrument_node="">
</span><div class="comp theme-takeaway mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1531" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-5"><span data-dcnode-id="1537" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1533" id="mntl-sc-block-callout-body_1-0-1"><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Mentally tough people don't focus on the possible rewards that may await them at the end of a challenge. Instead, they see participating and overcoming challenges as rewarding in and of themselves.</span></p></div><span data-dcnode-id="1532" instrument_node="">
</span></div><span data-dcnode-id="1530" instrument_node="">
</span></div><span data-dcnode-id="1528" instrument_node="">
</span></div><span data-dcnode-id="1526" instrument_node="">
</span><div class="comp mntl-sc-block-adslot adslot mntl-block" data-dcnode-id="1525" id="adslot_1-0-2"></div><span data-dcnode-id="1524" instrument_node="">
</span><div class="comp mntl-sc-list-item list-sc-item mntl-block" data-dcnode-id="1497" id="list-sc-item_1-0-3"><span data-dcnode-id="1523" instrument_node="">
</span><div class="comp list-marker" data-dcnode-id="1522" id="list-marker_1-0-3"></div><span data-dcnode-id="1521" instrument_node="">
</span><div class="comp content-list-sc mntl-sc-list-item mntl-sc-page mntl-block" data-dcnode-id="1499" id="content-list-sc_1-0-3"><span data-dcnode-id="1520" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1519" id="toc-dont-let-setbacks-get-you-down"></span><span data-dcnode-id="1518" instrument_node=""> </span><h2 class="comp mntl-sc-list-item-title mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1513" id="mntl-sc-block_2-0-18"><span data-dcnode-id="1517" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node=""> Don't Let Setbacks Get You Down </span></span><span data-dcnode-id="1514" instrument_node=""> </span></h2><span data-dcnode-id="1512" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1510" id="mntl-sc-block_2-0-19"><span data-dcnode-id="1511" instrument_node="">
Mentally tough athletes tend to rebound from setbacks with a renewed sense of determination. You can employ this in your own life as well. Rather than becoming discouraged, focus on building the resolve to push through the challenge and achieve your goals.
</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1501" id="mntl-sc-block_2-0-20"><span data-dcnode-id="1508" instrument_node="">
In a 2010 study of elite female athletes, many participants suggested that mental toughness often develops out of </span><a data-component="link" data-dcnode-id="1506" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/the-emotional-stress-of-a-sports-injury-3120689"><span data-dcnode-id="1507" instrument_node="">negative experiences</span></a><span data-dcnode-id="1505" instrument_node="">.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1503" data-id="#citation-6"><span data-dcnode-id="1504" instrument_node="">4</span></span><span data-dcnode-id="1502" instrument_node="">﻿ Facing difficulty both in their sport and in their personal lives led these top performers to develop new ways of managing stress and excelling in the face of difficulty.
</span></p><span data-dcnode-id="1500" instrument_node="">
</span></div><span data-dcnode-id="1498" instrument_node="">
</span></div><span data-dcnode-id="1496" instrument_node="">
</span><div class="comp mntl-sc-block-adslot adslot mntl-block" data-dcnode-id="1495" id="adslot_1-0-3"></div><span data-dcnode-id="1494" instrument_node="">
</span><div class="comp mntl-sc-list-item list-sc-item mntl-block" data-dcnode-id="1449" id="list-sc-item_1-0-4"><span data-dcnode-id="1493" instrument_node="">
</span><div class="comp list-marker" data-dcnode-id="1492" id="list-marker_1-0-4"></div><span data-dcnode-id="1491" instrument_node="">
</span><div class="comp content-list-sc mntl-sc-list-item mntl-sc-page mntl-block" data-dcnode-id="1451" id="content-list-sc_1-0-4"><span data-dcnode-id="1490" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1489" id="toc-be-self-directed"></span><span data-dcnode-id="1488" instrument_node=""> </span><h2 class="comp mntl-sc-list-item-title mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1483" id="mntl-sc-block_2-0-21"><span data-dcnode-id="1487" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node=""> Be Self-Directed </span></span><span data-dcnode-id="1484" instrument_node=""> </span></h2><span data-dcnode-id="1482" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1480" id="mntl-sc-block_2-0-22"><span data-dcnode-id="1481" instrument_node="">
Mentally tough people don't let life happen to them—they create the life they want. By setting goals and then taking the initiative to follow through on pursuing these goals, mentally tough people are able to get the things that they want out of life.
</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1474" id="mntl-sc-block_2-0-23"><span data-dcnode-id="1478" instrument_node="">
When surveyed about their perceptions of what helped them develop this mental toughness, elite gymnasts cited having goals as one of the strongest influences: "I realized how to set goals and how trying to reach them would help me get to the highest level," one gymnast told researchers.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1476" data-id="#citation-6"><span data-dcnode-id="1477" instrument_node="">4</span></span><span data-dcnode-id="1475" instrument_node="">﻿
</span></p><span data-dcnode-id="1473" instrument_node="">
</span><div class="comp theme-takeaway mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1466" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-6"><span data-dcnode-id="1472" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1468" id="mntl-sc-block-callout-body_1-0-2"><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">While they sometimes make it look effortless, it is important to realize that they are simply willing to put in the work. For athletes, this is all about sticking to training regimens and facing competition at athletic events. In everyday life, this might involve taking steps each day toward reaching your goals, even when achieving those goals seems far off or even impossible.</span></p></div><span data-dcnode-id="1467" instrument_node="">
</span></div><span data-dcnode-id="1465" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1463" id="mntl-sc-block_2-0-25"><span data-dcnode-id="1464" instrument_node="">
Being mentally tough is not something that just happens suddenly in a moment; it is more about daily habits that help people soldier through the tough times in order to realize their ambitions.
</span></p><span data-dcnode-id="1462" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1460" id="mntl-sc-block_2-0-26"><span data-dcnode-id="1461" instrument_node="">
This doesn't mean that you should not accept help or go it alone. Even elite athletes rely on their coaches and teammates to help push them, guide them, and inspire them to work harder and achieve their full potential.
</span></p><span data-dcnode-id="1459" instrument_node="">
</span><div class="comp related-link mntl-sc-block mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1453" id="mntl-sc-block_1-0-7"><span data-dcnode-id="1458" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link" data-dcnode-id="1455" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/motivation-and-goal-setting-for-exercise-3120693" id="mntl-sc-block-featuredlink__link_1-0"><span class="link__wrapper" data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">How to Set and Reach Targeted Goals</span></span></a><span data-dcnode-id="1454" instrument_node="">
</span></div><span data-dcnode-id="1452" instrument_node="">
</span></div><span data-dcnode-id="1450" instrument_node="">
</span></div><span data-dcnode-id="1448" instrument_node="">
</span><div class="comp mntl-sc-block-adslot adslot mntl-block" data-dcnode-id="1447" id="adslot_1-0-4"></div><span data-dcnode-id="1446" instrument_node="">
</span><div class="comp mntl-sc-list-item list-sc-item mntl-block" data-dcnode-id="1422" id="list-sc-item_1-0-5"><span data-dcnode-id="1445" instrument_node="">
</span><div class="comp list-marker" data-dcnode-id="1444" id="list-marker_1-0-5"></div><span data-dcnode-id="1443" instrument_node="">
</span><div class="comp content-list-sc mntl-sc-list-item mntl-sc-page mntl-block" data-dcnode-id="1424" id="content-list-sc_1-0-5"><span data-dcnode-id="1442" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1441" id="toc-maintain-focus-in-the-face-of-distraction"></span><span data-dcnode-id="1440" instrument_node=""> </span><h2 class="comp mntl-sc-list-item-title mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1435" id="mntl-sc-block_2-0-28"><span data-dcnode-id="1439" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node=""> Maintain Focus in the Face of Distraction </span></span><span data-dcnode-id="1436" instrument_node=""> </span></h2><span data-dcnode-id="1434" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1432" id="mntl-sc-block_2-0-29"><span data-dcnode-id="1433" instrument_node="">
Elite performers are able to stay focused on their goals, even when life throws disruptions their way. You aren't always going to have the perfect setting and support for pursuing your goals. Other things are going to compete for your attention.
</span></p><span data-dcnode-id="1431" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1426" id="mntl-sc-block_2-0-30"><span data-dcnode-id="1430" instrument_node="">
Mentally tough people are able to maintain their sense of direction and keep working toward their goals in the face of these distractions. When you feel yourself losing focus, look for ways to recharge and </span><a data-component="link" data-dcnode-id="1428" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/how-to-keep-your-head-in-the-game-3120691"><span data-dcnode-id="1429" instrument_node="">bring yourself back on track</span></a><span data-dcnode-id="1427" instrument_node="">.
</span></p><span data-dcnode-id="1425" instrument_node="">
</span></div><span data-dcnode-id="1423" instrument_node="">
</span></div><span data-dcnode-id="1421" instrument_node="">
</span><div class="comp mntl-sc-block-adslot adslot mntl-block" data-dcnode-id="1420" id="adslot_1-0-5"></div><span data-dcnode-id="1419" instrument_node="">
</span><div class="comp mntl-sc-list-item list-sc-item mntl-block" data-dcnode-id="1395" id="list-sc-item_1-0-6"><span data-dcnode-id="1418" instrument_node="">
</span><div class="comp list-marker" data-dcnode-id="1417" id="list-marker_1-0-6"></div><span data-dcnode-id="1416" instrument_node="">
</span><div class="comp content-list-sc mntl-sc-list-item mntl-sc-page mntl-block" data-dcnode-id="1397" id="content-list-sc_1-0-6"><span data-dcnode-id="1415" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1414" id="toc-understand-that-there-will-be-highs-and-lows-in-life"></span><span data-dcnode-id="1413" instrument_node=""> </span><h2 class="comp mntl-sc-list-item-title mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1408" id="mntl-sc-block_2-0-31"><span data-dcnode-id="1412" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node=""> Understand That There Will Be Highs and Lows in Life </span></span><span data-dcnode-id="1409" instrument_node=""> </span></h2><span data-dcnode-id="1407" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1405" id="mntl-sc-block_2-0-32"><span data-dcnode-id="1406" instrument_node="">
Mentally tough people don't expect life to be sunshine and roses all the time. In fact, they expect adversity, but they have faith in their abilities to survive, adapt, and overcome.
</span></p><span data-dcnode-id="1404" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1399" id="mntl-sc-block_2-0-33"><span data-dcnode-id="1403" instrument_node="">
According to research published in 2016, adversity and competition can help foster mental toughness.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1401" data-id="#citation-5"><span data-dcnode-id="1402" instrument_node="">5</span></span><span data-dcnode-id="1400" instrument_node="">﻿ It is only in the face of great difficulty that people learn what they are truly capable of.
</span></p><span data-dcnode-id="1398" instrument_node="">
</span></div><span data-dcnode-id="1396" instrument_node="">
</span></div><span data-dcnode-id="1394" instrument_node="">
</span><div class="comp mntl-sc-block-adslot adslot mntl-block" data-dcnode-id="1393" id="adslot_1-0-6"></div><span data-dcnode-id="1392" instrument_node="">
</span><div class="comp mntl-sc-list-item list-sc-item mntl-block" data-dcnode-id="1368" id="list-sc-item_1-0-7"><span data-dcnode-id="1391" instrument_node="">
</span><div class="comp list-marker" data-dcnode-id="1390" id="list-marker_1-0-7"></div><span data-dcnode-id="1389" instrument_node="">
</span><div class="comp content-list-sc mntl-sc-list-item mntl-sc-page mntl-block" data-dcnode-id="1370" id="content-list-sc_1-0-7"><span data-dcnode-id="1388" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1387" id="toc-maintain-your-sense-of-control"></span><span data-dcnode-id="1386" instrument_node=""> </span><h2 class="comp mntl-sc-list-item-title mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1381" id="mntl-sc-block_2-0-34"><span data-dcnode-id="1385" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node=""> Maintain Your Sense of Control </span></span><span data-dcnode-id="1382" instrument_node=""> </span></h2><span data-dcnode-id="1380" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1375" id="mntl-sc-block_2-0-35"><span data-dcnode-id="1379" instrument_node="">
According to researcher Peter Clough, control is a key component of mental toughness. Those who exude this type of mental strength feel that they have personal control over their own destiny.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1377" data-id="#citation-1"><span data-dcnode-id="1378" instrument_node="">1</span></span><span data-dcnode-id="1376" instrument_node="">﻿
</span></p><span data-dcnode-id="1374" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1372" id="mntl-sc-block_2-0-36"><span data-dcnode-id="1373" instrument_node="">
Rather than pin their failures or successes on outside forces, the mentally tough have more of an internal locus of control. They don't see themselves as simply passive observers in their lives. Instead, they believe that they have an active role in creating their own victories.
</span></p><span data-dcnode-id="1371" instrument_node="">
</span></div><span data-dcnode-id="1369" instrument_node="">
</span></div><span data-dcnode-id="1367" instrument_node="">
</span><div class="comp mntl-sc-block-adslot adslot mntl-block" data-dcnode-id="1366" id="adslot_1-0-7"></div><span data-dcnode-id="1365" instrument_node="">
</span><div class="comp mntl-sc-list-item list-sc-item mntl-block" data-dcnode-id="1333" id="list-sc-item_1-0-8"><span data-dcnode-id="1364" instrument_node="">
</span><div class="comp list-marker" data-dcnode-id="1363" id="list-marker_1-0-8"></div><span data-dcnode-id="1362" instrument_node="">
</span><div class="comp content-list-sc mntl-sc-list-item mntl-sc-page mntl-block" data-dcnode-id="1335" id="content-list-sc_1-0-8"><span data-dcnode-id="1361" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1360" id="toc-stick-with-it-even-when-its-hard"></span><span data-dcnode-id="1359" instrument_node=""> </span><h2 class="comp mntl-sc-list-item-title mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1354" id="mntl-sc-block_2-0-37"><span data-dcnode-id="1358" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node=""> Stick With It, Even When It's Hard </span></span><span data-dcnode-id="1355" instrument_node=""> </span></h2><span data-dcnode-id="1353" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1348" id="mntl-sc-block_2-0-38"><span data-dcnode-id="1352" instrument_node="">
Commitment is another one of the four major factors identified by Clough and his colleagues. Consider how athletes are able to power through exhaustion and pain to reach the finish line. The mentally tough are dedicated to seeing it through, even when it's hard and even if they think they might fail.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1350" data-id="#citation-1"><span data-dcnode-id="1351" instrument_node="">1</span></span><span data-dcnode-id="1349" instrument_node="">﻿
</span></p><span data-dcnode-id="1347" instrument_node="">
</span><div class="comp theme-takeaway mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1340" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-8"><span data-dcnode-id="1346" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1342" id="mntl-sc-block-callout-body_1-0-3"><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Many of the best performers suggest that competition, and the inherent success and failure that comes with it, is one of the critical components that contributes to their mental toughness.</span></p></div><span data-dcnode-id="1341" instrument_node="">
</span></div><span data-dcnode-id="1339" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1337" id="mntl-sc-block_2-0-40"><span data-dcnode-id="1338" instrument_node="">
The lesson from the world's top athletes is that even though setbacks are hard, sticking to your commitments helps you gain the lessons and experience you need to succeed in the future. It teaches you about your strengths, makes you aware of your weaknesses, and helps you realize that obstacles and even failures don't spell disaster—as long as you dust yourself off and keep going.
</span></p><span data-dcnode-id="1336" instrument_node="">
</span></div><span data-dcnode-id="1334" instrument_node="">
</span></div><span data-dcnode-id="1332" instrument_node="">
</span><div class="comp mntl-sc-block-adslot adslot mntl-block" data-dcnode-id="1331" id="adslot_1-0-8"></div><span data-dcnode-id="1330" instrument_node="">
</span><div class="comp mntl-sc-list-item list-sc-item mntl-block" data-dcnode-id="1309" id="list-sc-item_1-0-9"><span data-dcnode-id="1329" instrument_node="">
</span><div class="comp list-marker" data-dcnode-id="1328" id="list-marker_1-0-9"></div><span data-dcnode-id="1327" instrument_node="">
</span><div class="comp content-list-sc mntl-sc-list-item mntl-sc-page mntl-block" data-dcnode-id="1311" id="content-list-sc_1-0-9"><span data-dcnode-id="1326" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1325" id="toc-put-a-positive-spin-on-it"></span><span data-dcnode-id="1324" instrument_node=""> </span><h2 class="comp mntl-sc-list-item-title mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1319" id="mntl-sc-block_2-0-41"><span data-dcnode-id="1323" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node=""> Put a Positive Spin on It </span></span><span data-dcnode-id="1320" instrument_node=""> </span></h2><span data-dcnode-id="1318" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1316" id="mntl-sc-block_2-0-42"><span data-dcnode-id="1317" instrument_node="">
Simply working on your goal may help contribute to a mentally tough attitude over time. Mahoney and his colleagues found that by exerting more continuous effort, people are more likely to feel a sense of mastery, achievement, and productivity, all of which make the pursuit of the goal a more positive experience.
</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1313" id="mntl-sc-block_2-0-43"><span data-dcnode-id="1314" instrument_node="">
When things are challenging or even unpleasant, pushing forward and attaining that feeling of accomplishment can give you the mental strength to keep going.
</span></p><span data-dcnode-id="1312" instrument_node="">
</span></div><span data-dcnode-id="1310" instrument_node="">
</span></div><span data-dcnode-id="1308" instrument_node="">
</span><div class="comp mntl-sc-block-adslot adslot mntl-block" data-dcnode-id="1307" id="adslot_1-0-9"></div><span data-dcnode-id="1306" instrument_node="">
</span><div class="comp mntl-sc-list-item list-sc-item mntl-block" data-dcnode-id="1267" id="list-sc-item_1-0-10"><span data-dcnode-id="1305" instrument_node="">
</span><div class="comp list-marker" data-dcnode-id="1304" id="list-marker_1-0-10"></div><span data-dcnode-id="1303" instrument_node="">
</span><div class="comp content-list-sc mntl-sc-list-item mntl-sc-page mntl-block" data-dcnode-id="1269" id="content-list-sc_1-0-10"><span data-dcnode-id="1302" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1301" id="toc-find-support"></span><span data-dcnode-id="1300" instrument_node=""> </span><h2 class="comp mntl-sc-list-item-title mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1295" id="mntl-sc-block_2-0-44"><span data-dcnode-id="1299" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node=""> Find Support </span></span><span data-dcnode-id="1296" instrument_node=""> </span></h2><span data-dcnode-id="1294" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1289" id="mntl-sc-block_2-0-45"><span data-dcnode-id="1293" instrument_node="">
World-class athletes do not reach the top of their game all on their own. In most cases, they spend a tremendous amount of time with peers who provide support, </span><a data-component="link" data-dcnode-id="1291" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfit.com/how-a-virtual-partner-could-enhance-your-next-workout-4019407"><span data-dcnode-id="1292" instrument_node="">training opportunities</span></a><span data-dcnode-id="1290" instrument_node="">, and a positive environment for personal and professional development.
</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1286" id="mntl-sc-block_2-0-46"><span data-dcnode-id="1287" instrument_node="">
Friends, family, colleagues, and even your competitors can also help contribute to a "never say die" attitude. Look to people you admire to help instill these feelings of hard work, determination, grit, and positivity.
</span></p><span data-dcnode-id="1285" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1283" id="mntl-sc-block_2-0-47"><span data-dcnode-id="1284" instrument_node="">
Seek out people who are going to contribute to your success and encourage you to achieve your goals. Find mentors and look to people who exude mental toughness to help inspire the development of this mental skill in your own life.
</span></p><span data-dcnode-id="1282" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1277" id="mntl-sc-block_1-0-9"><span data-dcnode-id="1281" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node=""> A Word From Verywell </span></span><span data-dcnode-id="1278" instrument_node=""> </span></h3><span data-dcnode-id="1276" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1274" id="mntl-sc-block_2-0-49"><span data-dcnode-id="1275" instrument_node="">
Mental toughness certainly has a strong genetic component, but research on some of the world's strongest athletes suggests that it is also a skill that can be developed. Look for ways to apply some of these lessons learned from mentally tough athletes to different areas of your own life, whether you are trying to find the strength to stick to a difficult workout routine or succeed in a challenging job.
</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1271" id="mntl-sc-block_2-0-50"><span data-dcnode-id="1272" instrument_node="">
As Winston Churchill once proclaimed, "Success is not final, failure is not fatal: It is the courage to continue that counts."
</span></p><span data-dcnode-id="1270" instrument_node="">
</span></div><span data-dcnode-id="1268" instrument_node="">
</span></div><span data-dcnode-id="1266" instrument_node="">
