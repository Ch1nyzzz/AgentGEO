</span><div class="single_article__thumb" data-dcnode-id="727"><picture class="attachment-1600x900 size-1600x900 wp-post-image sp-no-webp" data-dcnode-id="730"><source data-dcnode-id="733" sizes="(max-width: 1600px) 100vw, 1600px" srcset="https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/cover_keep-your-positivity.webp 1600w,https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/cover_keep-your-positivity-355x200.webp 355w,https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/cover_keep-your-positivity-300x169.webp 300w,https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/cover_keep-your-positivity-1024x576.webp 1024w,https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/cover_keep-your-positivity-768x432.webp 768w,https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/cover_keep-your-positivity-1536x864.webp 1536w" type="image/webp"><source data-dcnode-id="732" sizes="(max-width: 1600px) 100vw, 1600px" srcset="https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/cover_keep-your-positivity.jpg 1600w, https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/cover_keep-your-positivity-355x200.jpg 355w, https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/cover_keep-your-positivity-300x169.jpg 300w, https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/cover_keep-your-positivity-1024x576.jpg 1024w, https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/cover_keep-your-positivity-768x432.jpg 768w, https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/cover_keep-your-positivity-1536x864.jpg 1536w" type="image/jpeg"><img alt="keep your positivity" class="attachment-1600x900 size-1600x900 wp-post-image sp-no-webp" data-dcnode-id="731" height="900" sizes="(max-width: 1600px) 100vw, 1600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.powerofpositivity.com/wp-content/uploads/2021/12/cover_keep-your-positivity-1600x900.jpg&amp;raw" srcset="https://cdn.powerof </span><div class="content_article__meta" data-dcnode-id="697" style="margin-top: -10px;padding: 20px 10px"><div class="content_article__author" data-dcnode-id="698"><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.powerofpositivity.com/author/lakeisha-e/" title="Lakeisha Ethans"><img alt="" class="avatar avatar-60 photo" data-dcnode-id="710" height="60" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/a9774d624c4baa413736a74a08cd9d33%3Fs%3D60%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/a9774d624c4baa413736a74a08cd9d33?s=120&amp;d=mm&amp;r=g 2x" style="width: 60px;height: 60px;flex: 0 1 auto;border-radius: 50%" width="60"></a><div class="content_article__text" data-dcnode-id="699" style="display: flex;flex-flow: column;"><span class="content_article__author_name" data-dcnode-id="704"><span data-dcnode-id="707" style="color:#222;font-size:14px"><span data-dcnode-id="708" instrument_node="">By </span></span><a data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.powerofpositivity.com/author/lakeisha-e/" style="font-weight: bold !important; font-size: 14px" title="Lakeisha Ethans"><span data-dcnode-id="706" instrument_node="">Lakeisha Ethans</span></a></span><span class="content_article__date" data-dcnode-id="702" style="color:#000; margin-top:5px; font-size: 12px"><span data-dcnode-id="703" instrument_node="">Published on December 21, 2021</span></span><span class="content_article__date" data-dcnode-id="700" style="color:#aaa;margin-top:5px"><span data-dcnode-id="701" instrument_node="">Last modified April 06, 2022</span></span></div></div></div><div data-dcnode-id="696" id="fb-root"></div><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Do you ever feel like you see the worst in everything, no matter how hard you try? Do you struggle to have enough faith to believe that good will happen to you too? Do you struggle with pessimistic thoughts all the time? It’s time to learn how to keep your positivity, no matter what challenges you face.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">As people take on increasingly more responsibilities in the world, they also begin encountering more and more hurdles. The hurt they go through makes many people increasingly more pessimistic. The more difficulties someone encounters, the harder to believe that things can turn out well. Losing their positive outlook on life can impact people in more ways than one. If you want to regain or keep your positivity, here’s how to do it.</span></p><span data-dcnode-id="689" instrument_node="">
</span><h2 data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Why Are People Negative?</span></h2><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="685" instrument_node="">Some people use the terms negativity and pessimism interchangeably. In that sense, </span><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/is-it-safer-to-be-a-pessimist-3144874" rel="noopener" target="_blank"><span data-dcnode-id="684" instrument_node="">pessimism</span></a><span data-dcnode-id="682" instrument_node=""> is the belief that things are likely to go wrong, no matter how hard people try to make them right. Pessimistic people see the world mostly in shades of black and grey, rarely white.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Most psychologists see pessimism and optimism as a spectrum. Each individual is somewhere on that spectrum, depending on their personality. Everyone fluctuates on that spectrum throughout their lives. Immediately after a traumatic event, most people will become a little more pessimistic. Circumstances and the environment play a significant role in shaping how people see life. Besides the environment, genetics, relationships, past experiences, and other factors may affect people’s positive or negative.</span></p><div class="code-block code-block-center code-block-14" data-dcnode-id="669"><span data-dcnode-id="677" instrument_node="">
</span><a data-dcnode-id="673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3owaVnc" rel="noopener" target="_blank"><span data-dcnode-id="676" instrument_node="">
</span><img class="aligncenter" data-dcnode-id="675" height="500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.powerofpositivity.com/wp-content/uploads/2022/03/aBA3WGyw.gif&amp;raw" width="600"><span data-dcnode-id="674" instrument_node="">
</span></a><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="670" style="text-align: center; margin-bottom: 0; color: #aaa; font-size:8px"><span data-dcnode-id="671" instrument_node=""> ADVERTISEMENT </span></p></div><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="667" instrument_node="">Twin studies have suggested that more than half the differences between pessimists and optimists are genetic. But, as people advance through life, their genetics get diluted by environmental factors through a process called </span><a data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/magazine-23229014" rel="noopener" target="_blank"><span data-dcnode-id="666" instrument_node="">epigenetics</span></a><span data-dcnode-id="664" instrument_node="">. That means, even if you feel inherently pessimistic, if your environment is beneficial, you can learn to be more positive.</span></p><div class="code-block code-block-center code-block-3" data-dcnode-id="654"><span data-dcnode-id="662" instrument_node="">
</span><center class="ad2" data-dcnode-id="655"><span data-dcnode-id="660" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5033344588641976" data-ad-slot="5961532455" data-dcnode-id="659" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="658" instrument_node="">
</span></center></div><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="652" instrument_node="">While pessimistic people can get through life just fine, certain inherent benefits are associated with positivity. One </span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/aje/article/185/1/21/2631298" rel="noopener" target="_blank"><span data-dcnode-id="651" instrument_node="">study</span></a><span data-dcnode-id="649" instrument_node=""> that followed the lives of 70,000 women from 2004 to 2012 documented these benefits. The study found that the women who have a positive outlook on life have a significantly lower risk of dying from significant causes of death.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Amongst those causes are heart disease, stroke, cancer, and respiratory diseases. Those aren’t the only benefits associated with positivity. Researchers also found an increase in quality of life, higher energy levels, improved psychological health, lower rates of depression, and better coping skills.</span></p><span data-dcnode-id="644" instrument_node="">
</span><h2 data-dcnode-id="638"><a data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.powerofpositivity.com/positive-note-end-relationship/" rel="noopener" target="_blank"><picture class="aligncenter wp-image-142536 sp-no-webp" data-dcnode-id="640"><source data-dcnode-id="643" sizes="(max-width: 400px) 100vw, 400px" srcset="https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/pos-people-have-neg-thoughts.webp 1170w,https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/pos-people-have-neg-thoughts-300x300.webp 300w,https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/pos-people-have-neg-thoughts-1024x1024.webp 1024w,https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/pos-people-have-neg-thoughts-150x150.webp 150w,https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/pos-people-have-neg-thoughts-768x768.webp 768w" type="image/webp"><source data-dcnode-id="642" sizes="(max-width: 400px) 100vw, 400px" srcset="https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/pos-people-have-neg-thoughts.jpg 1170w, https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/pos-people-have-neg-thoughts-300x300.jpg 300w, https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/pos-people-have-neg-thoughts-1024x1024.jpg 1024w, https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/pos-people-have-neg-thoughts-150x150.jpg 150w, https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/pos-people-have-neg-thoughts-768x768.jpg 768w" type="image/jpeg"><img alt="keep your positivity" class="aligncenter wp-image-142536 sp-no-webp" data-dcnode-id="641" height="400" loading="lazy" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.powerofpositivity.com/wp-content/uploads/2021/12/pos-people-have-neg-thoughts.jpg&amp;raw" srcset="https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/pos-people-have-neg-thoughts.jpg 1170w, https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/pos-people-have-neg-thoughts-300x300.jpg 300w, https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/pos-people-have-neg-thoughts-1024x1024.jpg 1024w, https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/pos-people-have-neg-thoughts-150x150.jpg 150w, https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/pos-people-have-neg-thoughts-768x768.jpg 768w" width="400"></picture></a></h2><span data-dcnode-id="637" instrument_node="">
</span><h2 data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">5 Easy Ways to Keep Your Positivity in Life</span></h2><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Try adopting these new habits to add positive thinking to your day.</span></p><span data-dcnode-id="631" instrument_node="">
</span><h3 data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">1.&nbsp;&nbsp;&nbsp; Cultivate A Positive Environment to Keep Your Positivity</span></h3><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">One of the main reasons people tend to be harmful is because of their surroundings. From the people around you to your hobbies, every tiny aspect of your life can make a difference.</span></p><div class="code-block code-block-center code-block-9" data-dcnode-id="264"><span data-dcnode-id="625" instrument_node="">

/div></div><div aria-label="Fullscreen" class="jw-icon jw-icon-inline jw-button-color jw-reset jw-icon-fullscreen" data-dcnode-id="284" role="button" style="" tabindex="0"><svg class="jw-svg-icon jw-svg-icon-fullscreen-off" data-dcnode-id="289" focusable="false" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg"><path d="M109.2,134.9l-8.4,50.1c-0.4,2.7-2.4,3.3-4.4,1.4L82,172l-27.9,27.9l-14.2-14.2l27.9-27.9l-14.4-14.4c-1.9-1.9-1.3-3.9,1.4-4.4l50.1-8.4c1.8-0.5,3.6,0.6,4.1,2.4C109.4,133.7,109.4,134.3,109.2,134.9L109.2,134.9z M172.1,82.1L200,54.2L185.8,40l-27.9,27.9l-14.4-14.4c-1.9-1.9-3.9-1.3-4.4,1.4l-8.4,50.1c-0.5,1.8,0.6,3.6,2.4,4.1c0.5,0.2,1.2,0.2,1.7,0l50.1-8.4c2.7-0.4,3.3-2.4,1.4-4.4L172.1,82.1z" data-dcnode-id="290"></path></svg><svg class="jw-svg-icon jw-svg-icon-fullscreen-on" data-dcnode-id="287" focusable="false" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg"><path d="M96.3,186.1c1.9,1.9,1.3,4-1.4,4.4l-50.6,8.4c-1.8,0.5-3.7-0.6-4.2-2.4c-0.2-0.6-0.2-1.2,0-1.7l8.4-50.6c0.4-2.7,2.4-3.4,4.4-1.4l14.5,14.5l28.2-28.2l14.3,14.3l-28.2,28.2L96.3,186.1z M195.8,39.1l-50.6,8.4c-2.7,0.4-3.4,2.4-1.4,4.4l14.5,14.5l-28.2,28.2l14.3,14.3l28.2-28.2l14.5,14.5c1.9,1.9,4,1.3,4.4-1.4l8.4-50.6c0.5-1.8-0.6-3.6-2.4-4.2C197,39,196.4,39,195.8,39.1L195.8,39.1z" data-dcnode-id="288"></path></svg><div class="jw-reset-text jw-tooltip jw-tooltip-fullscreen" data-dcnode-id="285" dir="auto"><div class="jw-text" data-dcnode-id="286"></div></div></div></div></div></div></div><div class="afs_ads ad-placement" data-dcnode-id="278" style="width: 1px; height: 1px; position: absolute; background: transparent;"><span data-dcnode-id="279" instrument_node="">&nbsp;</span></div><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="267"><div class="jw-icon jw-reset" data-dcnode-id="273"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="274" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33 </span><p data-dcnode-id="258"><span data-dcnode-id="262" instrument_node="">People who struggle to keep positivity in their life are often </span><a data-dcnode-id="260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mindful.org/an-introduction-to-mindful-gratitude/" rel="noopener" target="_blank"><span data-dcnode-id="261" instrument_node="">influenced by externalities</span></a><span data-dcnode-id="259" instrument_node="">. The most overwhelming influence is often the people around you. If your friends and family are negative, they always think about the worst outcomes that will inevitably rub off on you. Most negative people are the way they are because of how they were raised. Many parents believe that preparing their kids for the worst will help in the long run, but it doesn’t.</span></p><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="252"><span data-dcnode-id="256" instrument_node="">If you feel like you struggle to keep your positivity, it might be helpful to reflect on the company you keep. If you find that your closest friends and family are the reason you struggle with optimism, it’s time to put some distance between you.&nbsp; Some of the people around you are straight-up </span><a data-dcnode-id="254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.powerofpositivity.com/confrontations-avoid-positive-statements-toxic-people/" rel="noopener" target="_blank"><span data-dcnode-id="255" instrument_node="">toxic</span></a><span data-dcnode-id="253" instrument_node="">, and you will need to cut ties with them for good. When you make space for positive people in your life, they will rub off on you and give you reasons to become more optimistic.</span></p><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Reflect on what activities you engage in. If you struggle with optimism, that is undoubtedly tied to specific toxic actions. If you engage in harmful activities daily, negativity will become part of your new normal. Playing a sport just for the sake of playing it is an example of a hobby that can cause more harm than good.</span></p><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">If your hobbies are all about results rather than following your dreams, chances are you should drop that activity. To harvest positive thoughts, you need to do things that bring you joy and prove things can be good.</span></p><span data-dcnode-id="245" instrument_node="">
</span><h3 data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">2.&nbsp;&nbsp;&nbsp; Be Tidy And Organized</span></h3><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Your levels of tidiness might seem unrelated to how positive or negative you are. But that’s a false impression many people have. The way your home or workplace looks can influence how you think about certain situations in your life.</span></p><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="235"><a data-dcnode-id="237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/19934011/" rel="noopener" target="_blank"><span data-dcnode-id="238" instrument_node="">Research</span></a><span data-dcnode-id="236" instrument_node=""> found that people who have more cluttered and messy houses are, on average more stressed and depressed than people who keep their surroundings clean. Stress plays a significant role in how someone’s outlook on life is shaped. More stressed people tend to feel like everything they do will backfire. For example, if your workplace is messy, you will have a more challenging time believing that your projects will turn out flawlessly.</span></p><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">What if you lost some paperwork in all the mess? What if you can’t find some piece of information that you desperately need? The messier you are, the more distracted you become. You lose focus, perform worse, and that gives you a reason to believe nothing will ever go in your favor. This encourages negative thought patterns.</span></p><div class="code-block code-block-center code-block-5" data-dcnode-id="224"><span data-dcnode-id="231" instrument_node="">
</span><span data-dcnode-id="229" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5033344588641976" data-ad-slot="5961532455" data-dcnode-id="228" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="227" instrument_node="">
</span></div><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">To regain positivity, you could start by cleaning everything up. Research has shown that the simple act of cleaning up helps people feel more optimistic, even after failure. Once you deal with that, you will have one less burden that can convince you nothing will work out for you. A clean home and workplace mean you can start having a pure mind.</span></p><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">The less stressed you are, the easier it will be to accept positive thoughts in your life. When everything is where it should be, your home looks aesthetically lovely. You have a reason to believe you can do anything.</span></p><span data-dcnode-id="217" instrument_node="">
</span><h3 data-dcnode-id="211"><a data-dcnode-id="212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.powerofpositivity.com/positive-mindset-better-than-negative/" rel="noopener" target="_blank"><picture class="aligncenter wp-image-142495 sp-no-webp" data-dcnode-id="213"><source data-dcnode-id="216" sizes="(max-width: 400px) 100vw, 400px" srcset="https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/be-so-positive-neg-people.webp 705w,https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/be-so-positive-neg-people-220x300.webp 220w" type="image/webp"><source data-dcnode-id="215" sizes="(max-width: 400px) 100vw, 400px" srcset="https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/be-so-positive-neg-people.jpg 705w, https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/be-so-positive-neg-people-220x300.jpg 220w" type="image/jpeg"><img alt="mindset shift" class="aligncenter wp-image-142495 sp-no-webp" data-dcnode-id="214" height="545" loading="lazy" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.powerofpositivity.com/wp-content/uploads/2021/12/be-so-positive-neg-people.jpg&amp;raw" srcset="https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/be-so-positive-neg-people.jpg 705w, https://cdn.powerofpositivity.com/wp-content/uploads/2021/12/be-so-positive-neg-people-220x300.jpg 220w" width="400"></picture></a></h3><span data-dcnode-id="210" instrument_node="">
</span><h3 data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">3.&nbsp;&nbsp;&nbsp; Practice Gratitude</span></h3><span data-dcnode-id="207" instrument_node="">
</span><p data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">In trying to keep your positivity, you might find that externalities aren’t all that you need to change. The way you think and engage with the situations around you are detrimental to your outlook in life.</span></p><span data-dcnode-id="204" instrument_node="">
</span><p data-dcnode-id="200"><a data-dcnode-id="202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mindful.org/an-introduction-to-mindful-gratitude/" rel="noopener" target="_blank"><span data-dcnode-id="203" instrument_node="">Gratitude</span></a><span data-dcnode-id="201" instrument_node=""> is characterized by someone’s openness to be appreciative and return kindness. This quality is more often than not. You need to learn, not just a trait you are born with. Many people experience many good things during a day, but they are passive to those events. That’s why they can’t have a positive outlook. But, once you actively acknowledge all the good in your life, your mindset will change.</span></p><div class="code-block code-block-center code-block-16" data-dcnode-id="190"><span data-dcnode-id="199" instrument_node="">
</span><a data-dcnode-id="195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3u37c4c" rel="noopener" target="_blank"><span data-dcnode-id="198" instrument_node="">
</span><img class="aligncenter" data-dcnode-id="197" height="670" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.powerofpositivity.com/wp-content/uploads/2022/04/positivity-journal-kristen-butler.gif&amp;raw" width="540"><span data-dcnode-id="196" instrument_node="">
</span></a><span data-dcnode-id="194" instrument_node="">
</span><p data-dcnode-id="192" style="text-align: center; margin-bottom: 0; color: #aaa; font-size:8px"><span data-dcnode-id="193" instrument_node=""> ADVERTISEMENT </span></p><span data-dcnode-id="191" instrument_node="">
</span></div><span data-dcnode-id="189" instrument_node="">
</span><p data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">There are three main steps if you want to learn to be grateful. First, you need to observe. What makes you smile? Why do you say thank you? The second step is to affirm the good you receive. When something positive happens, make a note of it.</span></p><div class="code-block code-block-center code-block-6" data-dcnode-id="178"><span data-dcnode-id="186" instrument_node="">
</span><center data-dcnode-id="179"><span data-dcnode-id="184" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5033344588641976" data-ad-slot="5961532455" data-dcnode-id="183" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="182" instrument_node="">
</span></center></div><span data-dcnode-id="177" instrument_node="">
</span><p data-dcnode-id="172"><span data-dcnode-id="176" instrument_node="">Lastly, you need to acknowledge the benefits that certain things and people bring to your life. </span><a data-dcnode-id="174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3010965/" rel="noopener" target="_blank"><span data-dcnode-id="175" instrument_node="">Studies</span></a><span data-dcnode-id="173" instrument_node=""> have found that one way to go through these steps is to keep a gratitude journal. Writing things down can improve your optimism and sense of well-being. So, if you have trouble learning to be grateful, start keeping a gratitude journal.</span></p><span data-dcnode-id="171" instrument_node="">
</span><h3 data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">4.&nbsp;&nbsp;&nbsp; Be Open To Humor to Keep Your Positivity</span></h3><span data-dcnode-id="168" instrument_node="">
</span><p data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">People who are prone to negativity are often severe and stuck-up. They feel like they can’t open up to humor, so they don’t seek out feel-good environments and situations.</span></p><span data-dcnode-id="165" instrument_node="">
</span><p data-dcnode-id="161"><a data-dcnode-id="163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bmrat.org/index.php/BMRAT/article/view/200" rel="noopener" target="_blank"><span data-dcnode-id="164" instrument_node="">Studies</span></a><span data-dcnode-id="162" instrument_node=""> have found that laughter lowers stress and anxiety levels. People who engage in humor also have improved coping skills and self-esteem. When you permit yourself to laugh, you can be more relaxed. Humour lightens the mood, thus making the world seem a little less harsh. If you feel like you are suppressing your emotions and trying to be as severe as possible, know that it might be why you are a pessimist.</span></p><div class="code-block code-block-default code-block-15" data-dcnode-id="29"><span data-dcnode-id="160" instrument_node="">
