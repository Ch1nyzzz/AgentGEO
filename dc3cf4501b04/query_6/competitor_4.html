itemscope="" itemtype="https://schema.org/ListItem"><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learning-mind.com/category/self-improvement/" itemprop="item" itemtype="https://schema.org/Thing"><span data-dcnode-id="805" itemprop="name"><span data-dcnode-id="806" instrument_node="">Self-Improvement</span></span></a><span class="breadcrumb-sep" data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">&gt;</span></span><meta content="2" data-dcnode-id="801" itemprop="position"></li><li class="trail-item trail-end" data-dcnode-id="795" itemprop="itemListElement" itemscope="" itemtype="https://schema.org/ListItem"><a data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learning-mind.com/realistic-optimism-blind-positivity/" itemprop="item" itemtype="https://schema.org/Thing"><span data-dcnode-id="798" itemprop="name"><span data-dcnode-id="799" instrument_node="">Realistic Optimism Is Not Blind Positivity: How to Cultivate It</span></span></a><meta content="3" data-dcnode-id="796" itemprop="position"></li></ol></nav></div><span class="background-image-page-header-overlay" data-dcnode-id="791"></span></header><div class="container clr" data-dcnode-id="278" id="content-wrap"><div class="content-area clr" data-dcnode-id="279" id="primary"><div class="site-content clr" data-dcnode-id="280" id="content"><article data-dcnode-id="281" id="post-38908"><ul class="meta ospm-none clr" data-dcnode-id="755"><li class="meta-author" data-dcnode-id="784"><span class="screen-reader-text" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Post author:</span></span><i aria-hidden="true" class="icon-user" data-dcnode-id="787" role="img"></i><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learning-mind.com/author/jamie-l/" rel="author" title="Posts by Jamie Logie, B.Sc."><span data-dcnode-id="786" instrument_node="">Jamie Logie, B.Sc.</span></a></li><li class="meta-date" data-dcnode-id="779"><span class="screen-reader-text" data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Post published:</span></span><i aria-hidden="true" class="icon-clock" data-dcnode-id="781" role="img"></i><span data-dcnode-id="780" instrument_node="">April 24, 2020</span></li><li class="meta-cat" data-dcnode-id="774"><span class="screen-reader-text" data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Reading time:</span></span><i aria-hidden="true" class="icon-cup" data-dcnode-id="776" role="img"></i><span data-dcnode-id="775" instrument_node="">7 mins read</span></li><li class="meta-cat" data-dcnode-id="756"><span class="screen-reader-text" data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Post category:</span></span><i aria-hidden="true" class="icon-folder" data-dcnode-id="771" role="img"></i><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learning-mind.com/category/self-improvement/personal-development/" rel="category tag"><span data-dcnode-id="770" instrument_node="">Personal Development</span></a><span data-dcnode-id="768" instrument_node=""> </span><span class="owp-sep" data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">/</span></span><span data-dcnode-id="765" instrument_node=""> </span><a data-dcnode-id="763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learning-mind.com/category/self-improvement/" rel="category tag"><span data-dcnode-id="764" instrument_node="">Self-Improvement</span></a><span data-dcnode-id="762" instrument_node=""> </span><span class="owp-sep" data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">/</span></span><span data-dcnode-id="759" instrument_node=""> </span><a data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learning-mind.com/category/self-improvement/success-skills/" rel="category tag"><span data-dcnode-id="758" instrument_node="">Success Skills</span></a></li></ul><div class="entry-content clr" data-dcnode-id="454"><p data-dcnode-id="750"><span data-dcnode-id="754" instrument_node="">Optimism isn’t always the easiest way to approach life, but </span><em data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">is realistic optimism more ideal</span></em><span data-dcnode-id="751" instrument_node="">?</span></p><p data-dcnode-id="745"><span data-dcnode-id="749" instrument_node="">We would all love to be as optimistic as possible all the time. Unfortunately, this will not be the case – and that’s ok. It’s fine to acknowledge that things aren’t always going to go perfectly despite our desires for that. </span><a data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learning-mind.com/the-power-of-positive-thinking/"><span data-dcnode-id="748" instrument_node="">Keeping a positive state of mind</span></a><span data-dcnode-id="746" instrument_node="">, and practicing realistic optimism, may serve you better than blind positivity.</span></p><div class="code-block code-block-1" data-dcnode-id="737" style="margin: 5px 35px 5px 35px; float: right;"><span data-dcnode-id="744" instrument_node=""> </span><span data-dcnode-id="742" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-7776366611534027" data-ad-slot="5742071118" data-dcnode-id="741" style="display:inline-block;width:300px;height:600px"></ins><span data-dcnode-id="740" instrument_node=""> </span></div><p data-dcnode-id="727"><strong data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">The difference between the two</span></strong><span data-dcnode-id="734" instrument_node=""> is is that blind positivity contains </span><em data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">a sense of ignorance</span></em><span data-dcnode-id="731" instrument_node=""> to it. Ignorance does not mean stupidity, it just means a lack of knowledge about something. Taking </span><a data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learning-mind.com/toxic-positivity-signs/"><span data-dcnode-id="730" instrument_node="">a blind positivity approach</span></a><span data-dcnode-id="728" instrument_node=""> may seem like an ideal mindset, but it will not do you any favors in the long run. Blind positivity makes you shut out the outside world. It puts a pair of blinders on your head and doesn’t allow you to face reality.</span></p><p data-dcnode-id="722"><span data-dcnode-id="726" instrument_node="">Blind positivity creates </span><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learning-mind.com/being-positive-fake/"><span data-dcnode-id="725" instrument_node="">a false sense of reality</span></a><span data-dcnode-id="723" instrument_node=""> and it glosses over areas of life, creates ignorance, and shuts out a lot of the world. The big issue with this is that it causes you to minimize experiences, and this can slowly eat away at your life.</span></p><p data-dcnode-id="717"><span data-dcnode-id="721" instrument_node="">This article will look at </span><em data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">why realistic optimism is a much better approach and ways to cultivate it</span></em><span data-dcnode-id="718" instrument_node="">.</span></p><h2 data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">What Is Realistic Optimism?</span></h2><p data-dcnode-id="704"><span data-dcnode-id="714" instrument_node="">Ideally, you don’t want to be overly pessimistic, and also </span><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learning-mind.com/positive-bias/"><span data-dcnode-id="713" instrument_node="">not blindly positive</span></a><span data-dcnode-id="711" instrument_node="">. Realistic optimism lies </span><em data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">somewhere in the middle</span></em><span data-dcnode-id="708" instrument_node="">. It is thought that </span><strong data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">optimism is only helpful when it’s realistic</span></strong><span data-dcnode-id="705" instrument_node="">.</span></p><p data-dcnode-id="699"><span data-dcnode-id="703" instrument_node="">One great </span><strong data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">definition of realistic optimism</span></strong><span data-dcnode-id="700" instrument_node=""> comes to us from the medical world. If you are coming out of a major injury, or serious illness, you have to be realistic in how you approach the immediate future. One must ease back into daily activities and understand what the limitations are. Some things will limit you, some will be off-limits, but others will be possible.</span></p><p data-dcnode-id="688"><span data-dcnode-id="698" instrument_node="">This is the approach that embraces realistic optimism – </span><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">understanding your limitations</span></strong><span data-dcnode-id="695" instrument_node="">. Realistic optimism </span><strong data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">acknowledges negativity</span></strong><span data-dcnode-id="692" instrument_node="">, but </span><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learning-mind.com/how-to-stop-dwelling-problems-negativity/"><span data-dcnode-id="691" instrument_node="">it doesn’t dwell on it</span></a><span data-dcnode-id="689" instrument_node="">.</span></p><p data-dcnode-id="678"><em data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Another way to look at realistic optimism</span></em><span data-dcnode-id="685" instrument_node=""> is how you respond to </span><strong data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">when life knocks you down</span></strong><span data-dcnode-id="682" instrument_node="">. It’s easy to take a negative approach and </span><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learning-mind.com/feeling-sorry-for-yourself-causes-coping/"><span data-dcnode-id="681" instrument_node="">feel pity and self-sorrow</span></a><span data-dcnode-id="679" instrument_node="">.</span></p><p data-dcnode-id="673"><span data-dcnode-id="677" instrument_node="">We all have </span><strong data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">negative thoughts</span></strong><span data-dcnode-id="674" instrument_node="">, there’s no denying or escaping that. So why do some people remain positive while others are extremely negative and pessimistic? If we all share these negative thoughts from time to time, what allows you to break free from them?</span></p><div class="code-block code-block-2" data-dcnode-id="665" style="margin: 8px 0; clear: both;"><span data-dcnode-id="672" instrument_node=""> </span><span data-dcnode-id="670" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-7776366611534027" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="8094854930" data-dcnode-id="669" style="display:block; text-align:center;"></ins><span data-dcnode-id="668" instrument_node=""> </span></div><h2 data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Here are some ways to cultivate realistic optimism:</span></h2><h3 data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">1. Understand What Is And Isn’t In Your Control</span></h3><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">In the case of the person coming off of an illness, injury or setback, the first thing to do is to start with a list of what you can do, what you have difficulty doing, and then the things you just can’t do.</span></p><p data-dcnode-id="654"><span data-dcnode-id="658" instrument_node="">Seeing the list of the things you can do can be a great way to </span><strong data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">boost optimism while being realistic</span></strong><span data-dcnode-id="655" instrument_node=""> – as the list may be longer than you expected. The list of things you would have difficulty doing can also create some optimism as it means they are not totally ruled out.</span></p><p data-dcnode-id="649"><span data-dcnode-id="653" instrument_node="">This middle list can give you a challenge and it can help you create</span><strong data-dcnode-id="651"><span data-dcnode-id="652" instrument_node=""> realistic goals and timelines</span></strong><span data-dcnode-id="650" instrument_node=""> to accomplish this. Having a goal is always a great way to stay positive, motivated, and optimistic.</span></p><h3 data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">2. Understanding You Can’t Change The Past, You Can Only Change The Present</span></h3><p data-dcnode-id="636"><span data-dcnode-id="646" instrument_node="">It’s so easy to </span><strong data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">dwell on past mistakes and screwups</span></strong><span data-dcnode-id="643" instrument_node="">. You may wish you could just go into your mind and rip these negative thoughts out to never be seen again. It can get to where you feel these bad </span><a data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learning-mind.com/repressed-memories/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="642" instrument_node="">memories</span></a><span data-dcnode-id="640" instrument_node=""> define who you are and you can’t escape them. The realistic optimism approach is to remember that </span><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learning-mind.com/letting-go-of-the-past/"><span data-dcnode-id="639" instrument_node="">you can’t change the past</span></a><span data-dcnode-id="637" instrument_node="">, you can only change the present.</span></p><p data-dcnode-id="631"><span data-dcnode-id="635" instrument_node="">When a memory that comes up that you wish you had reacted better to, tell yourself that</span><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node=""> this was the best you could do at the time</span></strong><span data-dcnode-id="632" instrument_node="">. It’s ok that you didn’t have enough information, or weren’t strong enough then. Instead, learn from it and use it to make better decisions in the future.</span></p><p data-dcnode-id="623"><span data-dcnode-id="630" instrument_node="">There’s </span><strong data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">no point in beating yourself up for past mistakes</span></strong><span data-dcnode-id="627" instrument_node=""> as they are over and done with. Realistic optimism is about </span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learning-mind.com/negative-thought-patterns-challenge/"><span data-dcnode-id="626" instrument_node="">working with those negative thoughts</span></a><span data-dcnode-id="624" instrument_node="">, but keeping them in the past so they don’t prevent you from moving forward.</span></p><h3 data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">3. It’s All About Being Proactive In Your Approach</span></h3><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">The realistic optimist is still at their core, passionately optimistic. They are just able to see things from all viewpoints and take in, and process, a variety of information.</span></p><div class="code-block code-block-3" data-dcnode-id="614" style="margin: 8px 0; clear: both;"><ins class="adsbygoogle" data-ad-client="ca-pub-7776366611534027" data-ad-format="auto" data-ad-slot="3694110317" data-dcnode-id="618" style="display:block"></ins><span data-dcnode-id="617" instrument_node=""> </span></div><p data-dcnode-id="609"><span data-dcnode-id="613" instrument_node="">Not only are they very aware, but they are also very proactive in making things happen and knowing they will succeed. </span><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.learning-mind.com/stockdale-paradox/"><span data-dcnode-id="612" instrument_node="">Some of the most successful people</span></a><span data-dcnode-id="610" instrument_node=""> are realistic optimists as they take all the best elements of realism, and optimism, and combine them together.</span></p><p data-dcnode-id="598"><span data-dcnode-id="608" instrument_node="">Realistic optimism is all about</span><strong data-dcnode-id="606"><span data-dcnode-id="607" instrument_node=""> perseverance and determination</span></strong><span data-dcnode-id="605" instrument_node="">. It acknowledges that setbacks will happen, but they don’t have to define or disrupt you. </span><strong data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Winston Churchill was the definition of the realistic optimist</span></strong><span data-dcnode-id="602" instrument_node="">, most notably, when he said: “</span><em data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Never, never, never give up</span></em><span data-dcnode-id="599" instrument_node="">.”</span></p><h3 data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">4. Give Yourself More Credit</span></h3><p data-dcnode-id="591"><span data-dcnode-id="595" instrument_node="">Again, it’s easy to focus on the negative. We seem to do that as it’s away to avoid taking responsibility for our own actions. If we can blame things on our circumstances, we’re off the hook for being an active participant in our own lives. Realistic optimism understands that things will not always be perfect, but makes it a point to </span><strong data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">celebrate the small wins</span></strong><span data-dcnode-id="592" instrument_node="">.</span></p><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">It’s the approach that every cloud has a silver lining, and list what you did best – however small it may be. Don’t be afraid to pat yourself on the back and celebrate your successes.</span></p><h2 data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Final Thoughts</span></h2><p data-dcnode-id="580"><strong data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Blind positivity</span></strong><span data-dcnode-id="584" instrument_node=""> sounds nice, but it’s not a realistic way to go through life. On the other hand, you don’t want to be focussed on </span><strong data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">negative pessimism</span></strong><span data-dcnode-id="581" instrument_node="">. Both of these are surefire ways to rob yourself of true joy.</span></p><p data-dcnode-id="576"><strong data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Realistic optimism emerges as the perfect alternative</span></strong><span data-dcnode-id="577" instrument_node=""> to both. Being realistically optimistic allows you to be as positive as possible despite the circumstances, while not ignoring the hardships. The sooner you can come to grips to letting go of the things out of your control, and embrace realistic optimism, the freer you can feel.</span></p><p data-dcnode-id="573"><strong data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">References:</span></strong></p><div class="code-block code-block-6" data-dcnode-id="568" style="margin: 8px 0; clear: both;"><ins class="adsbygoogle" data-ad-client="ca-pub-7776366611534027"
