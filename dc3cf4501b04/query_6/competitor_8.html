</span><h1 class="title single-title entry-title" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">8 Ways to Practice Satya in Daily Life and ON The Mat</span></h1><span data-dcnode-id="787" instrument_node="">
</span><div class="post-info" data-dcnode-id="766"><span data-dcnode-id="786" instrument_node="">
</span><span class="theauthor" data-dcnode-id="780"><i class="fa fa-user" data-dcnode-id="785"></i><span data-dcnode-id="784" instrument_node=""> </span><span data-dcnode-id="781"><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fitsri.com/author/ashishfitsri" rel="author" title="Posts by Ashish"><span data-dcnode-id="783" instrument_node="">Ashish</span></a></span></span><span data-dcnode-id="779" instrument_node="">
</span><span class="thetime date updated" data-dcnode-id="774"><i class="fa fa-calendar" data-dcnode-id="778"></i><span data-dcnode-id="777" instrument_node=""> </span><span data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">September 7, 2021</span></span></span><span data-dcnode-id="773" instrument_node="">
</span><span class="thecomment" data-dcnode-id="768"><i class="fa fa-comments" data-dcnode-id="772"></i><span data-dcnode-id="771" instrument_node=""> </span><a data-dcnode-id="769" href="#respond" itemprop="interactionCount"><span data-dcnode-id="770" instrument_node="">No Comments</span></a></span><span data-dcnode-id="767" instrument_node="">
</span></div><span data-dcnode-id="765" instrument_node="">
</span></header><span data-dcnode-id="763" instrument_node="">
</span><div class="post-single-content box mark-links entry-content" data-dcnode-id="514"><span data-dcnode-id="762" instrument_node="">
</span><div class="thecontent" data-dcnode-id="526"><span data-dcnode-id="761" instrument_node="">
</span><ul class="a-top-n" data-dcnode-id="751"><li data-dcnode-id="758"><a data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.sharethis.com/a/t_.htm%3Fver%3D1.906.23338%26cid%3Dc010%26cls%3DB%23what-it-is"><span data-dcnode-id="760" instrument_node="">What is Satya?</span></a></li><li data-dcnode-id="755"><a data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.sharethis.com/a/t_.htm%3Fver%3D1.906.23338%26cid%3Dc010%26cls%3DB%23in-daily-life"><span data-dcnode-id="757" instrument_node="">Satya in Daily Life</span></a></li><li data-dcnode-id="752"><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.sharethis.com/a/t_.htm%3Fver%3D1.906.23338%26cid%3Dc010%26cls%3DB%23on-the-mat"><span data-dcnode-id="754" instrument_node="">Satya ON the Mat</span></a></li></ul><span data-dcnode-id="750" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="746"><img alt="" class="wp-image-13542" data-dcnode-id="749" data-recalc-dims="1" height="454" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.fitsri.com/wp-content/uploads/2021/09/Practicing-satya.jpg%3Fresize%3D680%252C454%26ssl%3D1&amp;raw" width="680"><figcaption data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Image: Canva</span></figcaption></figure><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">We all know that honesty is the best policy. But how often do we really follow through on those crucial moments when it is needed the most. Hardly ever would we have thought!</span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="741" instrument_node="">Following Satya or truthfulness all along is very difficult. No man can be truly truthful unless there is a conscious observation of his own actions, thoughts and words. That’s not how Patanjali laid the foundation of yoga on Satya or more preciously on the </span><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fitsri.com/yoga/yamas" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="740" instrument_node="">5 Yamas</span></a><span data-dcnode-id="738" instrument_node="">.</span></p><span data-dcnode-id="736" instrument_node="">
</span><h2 data-dcnode-id="734" id="what-it-is"><span data-dcnode-id="735" instrument_node="">What is Satya?</span></h2><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="732" instrument_node="">Satya is the </span><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fitsri.com/articles/satya-truthfulness-the-second-yama" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="731" instrument_node="">second of 5 Yamas</span></a><span data-dcnode-id="729" instrument_node=""> after Ahimsa (Non-violence) described in </span><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fitsri.com/yoga/patanjali-yoga-sutra" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="728" instrument_node="">Patanjali’s Yoga Sutra</span></a><span data-dcnode-id="726" instrument_node="">. According to Patanjali, Satya is restraint from falsehood in our physical self (our actions and body), what we say, (our words, speech, writing) and our mind, (our feelings and thoughts). </span></p><div class="fitsr-content" data-dcnode-id="718" id="fitsr-204492025" style="margin-bottom: 12px; "><ins class="adsbygoogle" data-ad-client="ca-pub-1981382898521341" data-ad-format="auto" data-ad-slot="9615839830" data-dcnode-id="723" style="display:block;"></ins><span data-dcnode-id="722" instrument_node="">
</span><span data-dcnode-id="719" instrument_node="">
</span></div><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Indeed, the journey of practising Satya begins with ourselves – living as our most authentic self and doing things daily that bring inner happiness and joy is the practice of Satya itself. We usually limit the essence of Satya to “what we say”, but it’s what we live. Satya is expressing things as they are and not as one wants them to be. It is the “truth” about something and not a “belief” around it. The Truth is absolute and everything else is just relative to it. &nbsp;</span></p><span data-dcnode-id="714" instrument_node="">
</span><h2 data-dcnode-id="712" id="in-daily-life"><span data-dcnode-id="713" instrument_node="">How to Practice Satya in Daily Life?</span></h2><span data-dcnode-id="711" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="709"><img alt="" class="wp-image-13543" data-dcnode-id="710" data-recalc-dims="1" height="454" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.fitsri.com/wp-content/uploads/2021/09/satya-in-daily-life.jpg%3Fresize%3D680%252C454%26ssl%3D1&amp;raw" width="680"></figure><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Practising Satya means accepting your true thoughts, potentials and limitations. Being aware of yourself is the way of living a peaceful life. Be honest with yourself, what you do – how do you feel – how you want to express it. Then be honest with others, don’t let the thought of being judged by others intervene your words.</span></p><div class="fitsr-square-ads" data-dcnode-id="699" id="fitsr-1529809467"><ins class="adsbygoogle" data-ad-client="ca-pub-1981382898521341" data-ad-format="auto" data-ad-slot="7751887967" data-dcnode-id="704" style="display:block;"></ins><span data-dcnode-id="703" instrument_node="">
</span><span data-dcnode-id="700" instrument_node="">
</span></div><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Satya in daily life helps us to know ourselves as we are. It guides us to experience all ranges of varying emotions in our minds and be aware of ourselves. </span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Here are some easy ways to imbibe the Satya in daily life.</span></p><div class="fitsr-square-ads-2" data-dcnode-id="686" id="fitsr-1307175093"><ins class="adsbygoogle" data-ad-client="ca-pub-1981382898521341" data-ad-format="auto" data-ad-slot="7751887967" data-dcnode-id="691" style="display:block;"></ins><span data-dcnode-id="690" instrument_node="">
</span><span data-dcnode-id="687" instrument_node="">
</span></div><span data-dcnode-id="685" instrument_node="">
</span><h3 data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">1. Being True To Oneself</span></h3><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Being honest to oneself is the chief road towards practising Satya. What is the point of acknowledging truth when we cannot even acknowledge ourselves? Be it our strengths or weaknesses, winnings or failures, we should accept our true selves and strive towards becoming the persons we aspire to be.</span></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">We are the most comfortable when “we are in our true self” when everything about our personality is put forward as it is. Often, we shade ourselves with fake mannerisms and customs to meet the standards of the people around us and feel accepted. But we will never feel serene under a masked appearance.</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Often, people use the quality in the negative connotation such as when using the phrase, “this is how I am” or “this is my true self”. We use these to maintain a sense of pride and feel a confusing satisfaction. This only leads to self-doubt and feeling more anxious and depressed.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">We should try to be the best version of ourselves. We must remember that our true self is our best self. We should try to indulge in meaningful conversations instead of gossiping to gain social approval. If people see that we are genuine and authentic, they begin to trust us and respect our opinion. We have to realise that no matter how hard it gets, we have to remain ourselves. </span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="669" instrument_node="">Regular practice of yoga and mindful exercises helps us be more genuine and true to ourselves [efn_note] A Study Of Yoga, Its Health Benefits And The True Self </span><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getd.libs.uga.edu/pdfs/mccoy_colleen_m_200612_ma.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="668" instrument_node="">https://getd.libs.uga.edu/pdfs/mccoy_colleen_m_200612_ma.pdf</span></a><span data-dcnode-id="666" instrument_node=""> [/efn_note]. With time, we grow more and more accepting of ourselves.</span></p><span data-dcnode-id="664" instrument_node="">
</span><h3 data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">2. Show Humility</span></h3><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">While we are honest with ourselves and respect our opinions, we should also show humility. We must realise that we, in ourselves, are not omnipotent and that there is still a lot we are not aware of. We should stay modest, let others speak and respect their views.&nbsp;</span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Humility is also a quality of being honest with ourselves where we are aware of the fact that we don’t know what we haven’t experienced, directly or indirectly. We should be willing to learn things that we don’t have knowledge about. While the lack of knowledge might feel disheartening at present, on the brighter side, you will be knowledgeable someday.&nbsp;</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">We should also respect people who do not know as much as us. A very common example in India would be when certain people humiliate certain others for not being fluent enough in English or not knowing the language at all. We should express ourselves in ways that do not demean our fellows. Just knowing more than others does not make us better human beings.&nbsp;</span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">We should try to explain our side in a conflicting situation with calmness and not make an issue over it. We can also try to understand the severity of situations and act according to them. Being polite to our fellows gives them a sense of comfort and to us as well. It feels good to know that people are comfortable being their true selves in front of you.</span></p><span data-dcnode-id="649" instrument_node="">
</span><h3 data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">3. Do Not Wish ill of Others</span></h3><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="645" instrument_node="">Satya practice is a follow up to the </span><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fitsri.com/articles/ways-to-practice-ahimsa" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="644" instrument_node="">practice of the first Yama – Ahimsa</span></a><span data-dcnode-id="642" instrument_node="">. We should never consciously hurt someone, physically or psychologically. We must be empathetic towards people at all times as we do not know what is going on in their lives.&nbsp;</span></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Wishing someone ill only&nbsp;pollutes our own minds. No matter how wrong someone has been to us, we should not do wrong to them as well. We all pay for our actions, and so do they. Wishing them evil will only bring unpleasant thoughts to us.&nbsp;</span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">At times when we know what we say might be hurtful, we should try staying quiet, even if it is the truth. One must aim at bringing positivity to the life of others and also to our own. If we can stop a fight that is leading nowhere by stepping back, we should. Remember, being bluntly honest is not the way of expressing truth. Satya is for a good cause and a better life.&nbsp;</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">The miseries of the worst people also drench our hearts, because our soul is still pure. It’s like they say, “but you are not them” or “by doing them wrong, you are no different from them.” The purpose of Satya is to find happiness and by wishing foul of others we are definitely not receiving any of it.</span></p><span data-dcnode-id="631" instrument_node="">
</span><h3 data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">4. Realising The Purpose Of One’s Lives</span></h3><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Being confused about our future and questioning our lives at certain points is a part of living. We must always wonder what our life is? where are we moving? and what is the purpose of our lives?</span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">If you are pursuing a course you feel isn’t meant for you, or a job you no longer have an interest in, maybe it’s time you quit. Quitting isn’t a bad thing, sometimes we just have to move on.&nbsp;</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">If at some point you realise that singing is your passion and not the job you are doing right now, go for it. The sudden epiphany is sometimes all one needs in life.&nbsp;</span></p><span data-dcnode-id="619" instrument_node="">
</span><h3 data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">5. Including Mantras In Life</span></h3><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="615" instrument_node="">Although the </span><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fitsri.com/articles/mantra-yoga" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="614" instrument_node="">explanation of Mantras</span></a><span data-dcnode-id="612" instrument_node=""> lies quite deep and is elaborate, for a normal person’s understanding, we can say that Yoga creates a sense of protective armour against the negative environment. It is like a cue-controlled technique [efn_note]Counseling Techniques-Cue Controlled Relaxation </span><a class="broken_link" data-dcnode-id="610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.askmikethecounselor2.com/counseling-techniques-cue-controlled-relaxation.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="611" instrument_node="">https://www.askmikethecounselor2.com/counseling-techniques-cue-controlled-relaxation.html</span></a><span data-dcnode-id="609" instrument_node=""> [/efn_note] to relieve stress.&nbsp;</span></p><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Mantras are positive phrases repeated in a hushed tone or in our minds to relax ourselves. These phrases do not have to be pre-designed, they can be ones that we create ourselves, something that resonates with us and the situation we are in.&nbsp;</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Some examples of mantras:</span></p><span data-dcnode-id="601" instrument_node="">
</span><ul data-dcnode-id="594"><li data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">“Have faith in yourself”</span></li><li data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">“God has it all planned. Whatever happens happens for the good.”</span></li><li data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">“I can do this”</span></li></ul><span data-dcnode-id="593" instrument_node="">
</span><h2 data-dcnode-id="591" id="on-the-mat"><span data-dcnode-id="592" instrument_node="">Practicing Satya On The Mat</span></h2><span data-dcnode-id="590" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="586"><img alt="imbalanced root chakra signs" class="wp-image-13219" data-dcnode-id="589" data-recalc-dims="1" height="454" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/www.fitsri.com/wp-content/uploads/2021/06/imbalanced-root-chakra.jpg%3Fresize%3D680%252C454%26ssl%3D1&amp;raw" width="680"><figcaption data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Image: Canva</span></figcaption></figure><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="584" instrument_node="">The 5 Yamas are to be practised as a way of life. However, they can be applied on the mat as well. While they are not something physical as asanas practice, they can be termed as etiquette while performing yoga. A </span><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fitsri.com/poses/what-is-asana" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="583" instrument_node="">yoga asana is a true discipline</span></a><span data-dcnode-id="581" instrument_node=""> only when the Yamas are applied to it.&nbsp;</span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">In the world around us today, we have been brought up to give our “personal best” in physical exercises and motivated by sayings like “no pain, no gain”. And this is the same motivation we try to apply to Yoga asanas. However, on the contrary, yoga as an ancient discipline has been adopted to calm and relax our body and mind. It does not promote “pushing” ourselves to the edge but doing what the body can do and relax our minds.&nbsp;</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Satya, along with the other Yamas, is an essential part of Yoga asanas as it highlights the principles of ancient yoga. It requires the practitioner to do as much as the body can do without straining itself. This helps avoid injury and cultivates the quality of letting go of the pre-established ideas of how the poses should look, not look like.&nbsp;</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Satya on the mat can be exercised in the following ways:</span></p><span data-dcnode-id="570" instrument_node="">
</span><h3 data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">1. Accept our limits </span></h3><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">it is important to accept ourselves as we are. We must be aware of what we can do and what we can’t. And not push ourselves beyond the limits of our body. This not only results in physical injury and fatigue but also has an effect on us mentally. Yoga is acceptance, a way to find relief and struggling with ourselves is not the way to achieve it.&nbsp;</span></p><span data-dcnode-id="564" instrument_node="">
</span><h3 data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">2. Relax in yourself</span></h3><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Satya is something that can only be achieved through peace state of mind. Practice yoga asanas and pranayama with a calm mind. One should not bring a sense of competition (looking like others) while doing a yoga asana. Regular breathing and pleasant thoughts can help soothe the mind. We should feel ourselves sink and relax into the poses.&nbsp;</span></p><span data-dcnode-id="558" instrument_node="">
</span><h3 data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">3. Be Mindful of oneself </span></h3><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">The human mind is complex and is bound to wander around. We should try to focus singularly on ourselves and feel the movement of the body while being in a yoga pose.&nbsp;When we are concentrated, we are aware of our limits and potentials – and that’s what we need to know to understand Satya.&nbsp;</span></p><span data-dcnode-id="552" instrument_node="">
</span><div class="fitsr-content_2" data-dcnode-id="545" id="fitsr-402913080" style="margin-bottom: 12px; "><ins class="adsbygoogle" data-ad-client="ca-pub-1981382898521341" data-ad-format="auto" data-ad-slot="1002818269" data-dcnode-id="550" style="display:block;"></ins><span data-dcnode-id="549" instrument_node="">
</span><span data-dcnode-id="546" instrument_node="">
</span></div><h2 data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Conclusion</span></h2><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Satya can be practised in general day-to-day life as well as on a mat. The key is to accept the truth and make it a part of our lives. When the truth is clearly communicated, time unfolds as it should, and the mind is free of confusion and doubts. Practising Satya improves our quality of life and helps us be a little better every day. I hope you make Satya a part of your life!</span></p><span data-dcnode-id="539" instrument_node="">
