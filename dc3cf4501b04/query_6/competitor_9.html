          Probability in daily life
      </span></h3><span data-dcnode-id="930" instrument_node="">
</span><ol class="j-transcripts transcripts no-bullet no-style" data-dcnode-id="847" itemprop="text"><span data-dcnode-id="929" instrument_node="">
</span><li data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">
      1.
    PROBABILITY IN
DAILY LIFE
 
  </span></li><span data-dcnode-id="926" instrument_node="">
</span><li data-dcnode-id="921"><span data-dcnode-id="925" instrument_node="">
</span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/probabilityindailylife-150113070212-conversion-gate02/95/probability-in-daily-life-2-638.jpg%3Fcb%3D1421132584" target="_blank" title="Introduction A branch of mathematics concerned with the st..."><span data-dcnode-id="924" instrument_node="">
        2.
      </span></a><span data-dcnode-id="922" instrument_node="">
    Introduction A branch of mathematics concerned with the study of
randomness and uncertainity.
 
  </span></li><span data-dcnode-id="920" instrument_node="">
</span><li data-dcnode-id="915"><span data-dcnode-id="919" instrument_node="">
</span><a data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/probabilityindailylife-150113070212-conversion-gate02/95/probability-in-daily-life-3-638.jpg%3Fcb%3D1421132584" target="_blank" title=" It is a measure of how often
a particular event will happ..."><span data-dcnode-id="918" instrument_node="">
        3.
      </span></a><span data-dcnode-id="916" instrument_node="">
     It is a measure of how often
a particular event will happen
if something is done
repeatedly.
 If an event is certain to
happen then its probability is
1.
 If an event is not certain to
happen then its probability is
0.
 Probability is always between
0 and 1.
 
  </span></li><span data-dcnode-id="914" instrument_node="">
</span><li data-dcnode-id="909"><span data-dcnode-id="913" instrument_node="">
</span><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/probabilityindailylife-150113070212-conversion-gate02/95/probability-in-daily-life-4-638.jpg%3Fcb%3D1421132584" target="_blank" title=" If you draw a card from a standard deck of cards, what is..."><span data-dcnode-id="912" instrument_node="">
        4.
      </span></a><span data-dcnode-id="910" instrument_node="">
     If you draw a card from a standard deck of cards, what is the
probability of not drawing a spade?
 In a certain population, 10% of the people are rich, 5% are
famous, and 3% are both rich and famous. A person is
randomly selected from this population. What is the chance
that the person is
› not rich?
› rich but not famous?
› either rich or famous?
 
  </span></li><span data-dcnode-id="908" instrument_node="">
</span><li data-dcnode-id="903"><span data-dcnode-id="907" instrument_node="">
</span><a data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/probabilityindailylife-150113070212-conversion-gate02/95/probability-in-daily-life-5-638.jpg%3Fcb%3D1421132584" target="_blank" title="RANDOM
EXPERIMENT A random experiment is a process whose o..."><span data-dcnode-id="906" instrument_node="">
        5.
      </span></a><span data-dcnode-id="904" instrument_node="">
    RANDOM
EXPERIMENT A random experiment is a process whose outcome is
uncertain.
 Examples:-
 Tossing a coin once or several times.
 Picking a card or cards from a deck.
 
  </span></li><span data-dcnode-id="902" instrument_node="">
</span><li data-dcnode-id="897"><span data-dcnode-id="901" instrument_node="">
</span><a data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/probabilityindailylife-150113070212-conversion-gate02/95/probability-in-daily-life-6-638.jpg%3Fcb%3D1421132584" target="_blank" title="Sample Space
 In probability theory,
the sample space of a..."><span data-dcnode-id="900" instrument_node="">
        6.
      </span></a><span data-dcnode-id="898" instrument_node="">
    Sample Space
 In probability theory,
the sample space of an
experiment or random
trial is the set of all
possible outcomes or
results of that
experiment.
 
  </span></li><span data-dcnode-id="896" instrument_node="">
</span><li data-dcnode-id="891"><span data-dcnode-id="895" instrument_node="">
</span><a data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/probabilityindailylife-150113070212-conversion-gate02/95/probability-in-daily-life-7-638.jpg%3Fcb%3D1421132584" target="_blank" title=" The result of a random
experiment is called outcome.
 Ex..."><span data-dcnode-id="894" instrument_node="">
        7.
      </span></a><span data-dcnode-id="892" instrument_node="">
     The result of a random
experiment is called outcome.
 Example:-
Tossing a coin and getting up
head or tail is an outcome.
Throwing a dice and getting a
no. between 1 to 6 is also an
outcome.
 
  </span></li><span data-dcnode-id="890" instrument_node="">
</span><li data-dcnode-id="885"><span data-dcnode-id="889" instrument_node="">
</span><a data-dcnode-id="887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/probabilityindailylife-150113070212-conversion-gate02/95/probability-in-daily-life-8-638.jpg%3Fcb%3D1421132584" target="_blank" title=" Any possible outcome of a
random experiment is called
an ..."><span data-dcnode-id="888" instrument_node="">
        8.
      </span></a><span data-dcnode-id="886" instrument_node="">
     Any possible outcome of a
random experiment is called
an event.
 The probability of an event,
denoted P(E), is the likelihood
of that event occurring.
 Example:-
 Performing an experiment is
called trial and outcomes are
termed as event.
 
  </span></li><span data-dcnode-id="884" instrument_node="">
</span><li data-dcnode-id="879"><span data-dcnode-id="883" instrument_node="">
</span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/probabilityindailylife-150113070212-conversion-gate02/95/probability-in-daily-life-9-638.jpg%3Fcb%3D1421132584" target="_blank" title="FAVORABLE EVENT
 The no. of outcome which result in
the ha..."><span data-dcnode-id="882" instrument_node="">
        9.
      </span></a><span data-dcnode-id="880" instrument_node="">
    FAVORABLE EVENT
 The no. of outcome which result in
the happening of a desired event
are called favorable cases of the
event.
 Example:-
 In a single throw of a dice ,the no.
of favorable cases of getting an
odd no. are three.
 
  </span></li><span data-dcnode-id="878" instrument_node="">
</span><li data-dcnode-id="873"><span data-dcnode-id="877" instrument_node="">
</span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/probabilityindailylife-150113070212-conversion-gate02/95/probability-in-daily-life-10-638.jpg%3Fcb%3D1421132584" target="_blank" title="Relative Frequency
 Relative frequency is
another term for..."><span data-dcnode-id="876" instrument_node="">
        10.
      </span></a><span data-dcnode-id="874" instrument_node="">
    Relative Frequency
 Relative frequency is
another term for proportion;
it is the value calculated by
dividing the number of
times an event occurs by
the total number of times an
experiment is carried out.
 
  </span></li><span data-dcnode-id="872" instrument_node="">
</span><li data-dcnode-id="867"><span data-dcnode-id="871" instrument_node="">
</span><a data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/probabilityindailylife-150113070212-conversion-gate02/95/probability-in-daily-life-11-638.jpg%3Fcb%3D1421132584" target="_blank" title="In many situations, once more information
becomes available..."><span data-dcnode-id="870" instrument_node="">
        11.
      </span></a><span data-dcnode-id="868" instrument_node="">
    In many situations, once more information
becomes available, we are able to revise
our estimates for the probability of further
outcomes or events happening.
 For example, suppose you go out for
lunch at the same place with probability
0.9. However, given that you notice that
the restaurant is exceptionally busy, then
probability may reduce to 0.7.
 
  </span></li><span data-dcnode-id="866" instrument_node="">
</span><li data-dcnode-id="861"><span data-dcnode-id="865" instrument_node="">
</span><a data-dcnode-id="863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/probabilityindailylife-150113070212-conversion-gate02/95/probability-in-daily-life-12-638.jpg%3Fcb%3D1421132584" target="_blank" title=" The XVII century records the first use of
Probability The..."><span data-dcnode-id="864" instrument_node="">
        12.
      </span></a><span data-dcnode-id="862" instrument_node="">
     The XVII century records the first use of
Probability Theory.
 In 1654 Chevalier was trying to establish if such
an event has probability greater than 0.5.
 Puzzled by this and other similar gambling
problems he called the attention of the famous
mathematician Blaise Pascal. In turn this led to an
exchange of letters between Pascal and another
famous French mathematician Pierre
de Fermat, this becoming the first evidence of
probability.
 
  </span></li><span data-dcnode-id="860" instrument_node="">
</span><li data-dcnode-id="855"><span data-dcnode-id="859" instrument_node="">
</span><a data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/probabilityindailylife-150113070212-conversion-gate02/95/probability-in-daily-life-13-638.jpg%3Fcb%3D1421132584" target="_blank" title="Emergence of
probability All the things that happened in t..."><span data-dcnode-id="858" instrument_node="">
        13.
      </span></a><span data-dcnode-id="856" instrument_node="">
    Emergence of
probability All the things that happened in the
middle of the 17th century, when
probability “emerged”:
 Annuities sold to raise public funds.
 Statistics of births, deaths, etc.,
attended to.
 Mathematics of gaming proposed.
 Models for assessing evidence and
testimony.
 “Measurements” of the
likelihood/possibility of miracles.
 “Proofs” of the existence of God.
 
  </span></li><span data-dcnode-id="854" instrument_node="">
</span><li data-dcnode-id="849"><span data-dcnode-id="853" instrument_node="">
</span><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//image.slidesharecdn.com/probabilityindailylife-150113070212-conversion-gate02/95/probability-in-daily-life-14-638.jpg%3Fcb%3D1421132584" target="_blank" title="THANK YOU
BY
ABDULLAH
 "><span data-dcnode-id="852" instrument_node="">
        14.

    THANK YOU
BY

  </span></li><span data-dcnode-id="848" instrument_node="">
