</span><p data-dcnode-id="1387"><span data-dcnode-id="1404" instrument_node="">Courtney:</span><br data-dcnode-id="1403"><span data-dcnode-id="1402" instrument_node="">
1 – I commend you on a beautifully-written article. It’s concise, clear, and free of typos. Plus, it’s easy, pleasant reading that flows smoothly, and is free of ambiguity — not a single sentence required rereading to garner its intended meaning (which, perhaps, is a ”good thing” for an article on meaning). It’s obvious you put a substantial amount of time and thought into the writing of this piece.</span><br data-dcnode-id="1401"><span data-dcnode-id="1400" instrument_node="">
2 – I also appreciated the concise summary of Frankl’s “Man’s Search for Meaning” book. It reminded me that I once purchased the book when I was a teenager – circa 60 years ago – but have long ago lost it. After reading in your article the main points summation of Frankl’s insights, I decided to re-acquire the book and read it again.</span><br data-dcnode-id="1399"><span data-dcnode-id="1398" instrument_node="">
3 – After 20 (printed) pages of interesting description, you provide a summation statement that provides the answer to the implied question set up by the article’s title: “How Meaning (of Life) is Approached in Positive Psychology.” The summation statement is this:</span><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">
“… it seems that it is truly up to us to tease out that which is the most important, the most life-giving, and the most significant. Within this soup of values, experiences, goals, and beliefs, we can piece together that which gives us the best sense of meaning in our own lives.”</span><br data-dcnode-id="1395"><span data-dcnode-id="1394" instrument_node="">
I concur with your observation; this seems to describe the present situation as regards meaning. I also note that this conclusion describes, in essence, how meaning of life is approached in positive psychology. It indicates that, to date, the leadership of the positive psychology movement – mainly, positive psychology professors – have abjured any serious responsibility for creating a helpful practical methodology pertaining to the key fulfillment-building area of expanding personal life meaning. In light of history this is sad. The science of psychology started around 1900 and the positive psychology arm of it started almost 25 years ago. Yet, in spite of 120 years of psychological science, the creation of thousands of psychology PhD’s and PhD theses, thousands of hours of psychological testing and scientific discovery, thousands of psychology peer-reviewed articles, and perhaps hundreds of best-selling books, just about the only PRACTICAL thing we can say about the pursuit of personal life meaning is it’s a “soup of values, experiences, goals, and beliefs” out of which each person is to somehow “tease out” or “piece together” that which gives meaning to their life.</span><br data-dcnode-id="1393"><span data-dcnode-id="1392" instrument_node="">
This mind-befuddling situation gives rise to a vital question: What specific ACTIONS is a person to take to successfully execute the process of “teasing out” and “piecing together” a sense of life meaning? Or, put another way, where’s a simple, practical, action-driven, step-by-step, how-to METHODOLOGY that, when applied by any “average person,” will result in that person actualizing the goal of creating or expanding meaning and purpose in their life?</span><br data-dcnode-id="1391"><span data-dcnode-id="1390" instrument_node="">
Creating such a methodology is or should be, in my opinion, a part of the mission of the positive psychology movement – or, more specifically, a key responsibility of the leadership of the movement. It seems to me that, as regards the area of creating life meaning, the positive psychology movement should give thought to moving from generalized description to action-focused prescription. What the world needs is an “Action-based, Step-by-step METHODOLOGY for Expanding Personal Life Meaning.” And, it seems that the group that’s best equipped to create such a methodology is the leadership, or professorship, of the positive psychology movement.</span><br data-dcnode-id="1389"><span data-dcnode-id="1388" instrument_node="">
That’s it. And, again, commendations to you, Courtney, on creating a well-written, thought-provoking article. (Oh, by the way, in case you might find it worthwhile, I recently read a relatively new book titled “The Power of Meaning.” The author, Emily Esfahani Smith, describes what she calls the “four pillars of meaning.” It’s well-written and quite interesting.)</span></p><span data-dcnode-id="1386" instrument_node="">

</span><p data-dcnode-id="1347"><span data-dcnode-id="1354" instrument_node="">First, thank you for your comment! I’m so glad you enjoyed the article.</span><br data-dcnode-id="1353"><span data-dcnode-id="1352" instrument_node="">
And second, you’re preaching to the choir! For many years I have searched for a methodology like what you describe. Logotherapy is the closest I got to what I was looking for, but it seems like it’s a little more art than science. I crave some kind of actionable information to help me find more meaning, and I know others do too. I wholeheartedly support any efforts to come up with such a methodology. If successful, that kind of method would change the world.</span><br data-dcnode-id="1351"><span data-dcnode-id="1350" instrument_node="">
That’s great that you’re reading Frankl again–you can never read too much of his work! Thank you for the book recommendation as well, I’ll look into it.</span><br data-dcnode-id="1349"><span data-dcnode-id="1348" instrument_node="">
Thanks again for your insightful comment, and please “drop by” again anytime!</span></p><span data-dcnode-id="1346" instrument_node="">

</span><p data-dcnode-id="1305"><span data-dcnode-id="1314" instrument_node="">You invited me to “drop by again anytime,” so here I am.</span><br data-dcnode-id="1313"><span data-dcnode-id="1312" instrument_node="">
As I see it, the main impediment to creating an actionable methodology for finding/expanding personal meaning is not that personal meaning is something so individual, esoteric, and ephemeral that its realization defies reduction to a specific methodology, or to a series of actions.</span><br data-dcnode-id="1311"><span data-dcnode-id="1310" instrument_node="">
Rather, I believe the main obstacle to creating a “methodology for expanding personal meaning” is our limited field of vision. I believe the answer is before us and within our grasp, but we aren’t seeing it because it doesn’t yet exist within our present mental representation of how personal fulfillment and life flourishing comes about. Or, expressed another way, positive psychology hasn’t yet created an actionable methodology for expanding life meaning because the main dynamic by which personal life flourishing comes about is not yet a formally recognized component within positive psychology’s present “paradigm.”</span><br data-dcnode-id="1309"><span data-dcnode-id="1308" instrument_node="">
I realize the above hypothesis might sound far-fetched and a bit like gobbledygook. But, if it happens you’d like to investigate it further, I’d point you to a recently published book on the subject, which can be accessed via this amazon link: amazon.com/dp/1938001583</span><br data-dcnode-id="1307"><span data-dcnode-id="1306" instrument_node="">
I thank you for having taken the time to read this.</span></p><span data-dcnode-id="1304" instrument_node="">

</span><p data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Meaning is that what we assign to life and universe which are streams of events. We project onto these happenings “a Gestalt” (e.g. seeing our moon as a smiling person or equating a cloud formation with a face or viewing a rock constellation as a figure, …). Meaning derives from our mind’s need to deal with events in order to comprehend and to order them into a structure which makes sense to us.</span></p><span data-dcnode-id="1219" instrument_node="">
