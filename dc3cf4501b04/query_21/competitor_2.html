</span><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">What is Positive Psychology?</span></h2><span data-dcnode-id="1854" instrument_node=""> </span></div><span data-dcnode-id="1852" instrument_node="">
</span></div><span data-dcnode-id="1850" instrument_node="">
</span><div class="elementor-element elementor-element-eb5d99d elementor-widget elementor-widget-text-editor" data-dcnode-id="1832" data-element_type="widget" data-id="eb5d99d" data-widget_type="text-editor.default"><span data-dcnode-id="1849" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1834"><span data-dcnode-id="1848" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1836"><span data-dcnode-id="1847" instrument_node="">
</span><ul data-dcnode-id="1838"><li data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">The term “Positive Psychology”&nbsp; was originally coined by the psychologist Abraham Maslow in the 1950’s.&nbsp;</span></li><li data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Maslow used the term somewhat loosely to call for a more balanced view of human nature, that is, to draw attention to human potentialities as well as mental illness. The upbeat work of “humanistic” psychologists such as Carl Rogers as well as Maslow have served as a wellspring of ideas for the new field of Positive Psychology.&nbsp;</span></li><li data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">In 2002, Martin Seligman, previously President of the American Psychological Association, popularized the expression Positive Psychology through his influential work “Authentic Happiness.” He defined it as the study of positive emotions and the “strengths that enable individuals and communities to thrive.”</span></li><li data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">In his second best-seller, “Flourish,” Seligman expanded his vision of human well-being based on five components, known by the acronym PERMA, including Positive Emotion, Engagement, Relationships, Meaning, and Accomplishment.</span></li></ul><span data-dcnode-id="1837" instrument_node=""> </span></div><span data-dcnode-id="1835" instrument_node="">
</span></div><span data-dcnode-id="1833" instrument_node="">
</span></div><span data-dcnode-id="1831" instrument_node="">
</span></div><span data-dcnode-id="1829" instrument_node="">

</span></div><span data-dcnode-id="1825" instrument_node="">
</span><div class="elementor-column elementor-col-33 elementor-top-column elementor-element elementor-element-6770114" data-dcnode-id="1773" data-element_type="column" data-id="6770114"><span data-dcnode-id="1824" instrument_node="">
</span><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="1775"><span data-dcnode-id="1823" instrument_node="">

</span><div class="elementor-element elementor-element-99b7b50 elementor-widget elementor-widget-heading" data-dcnode-id="1814" data-element_type="widget" data-id="99b7b50" data-widget_type="heading.default"><span data-dcnode-id="1821" instrument_node="">

</span><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">What is the Science of Happiness?</span></h2><span data-dcnode-id="1817" instrument_node=""> </span></div><span data-dcnode-id="1815" instrument_node="">
</span></div><span data-dcnode-id="1813" instrument_node="">
</span><div class="elementor-element elementor-element-0273dc8 elementor-widget elementor-widget-text-editor" data-dcnode-id="1792" data-element_type="widget" data-id="0273dc8" data-widget_type="text-editor.default"><span data-dcnode-id="1812" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1794"><span data-dcnode-id="1811" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1796"><span data-dcnode-id="1810" instrument_node="">
</span><ul data-dcnode-id="1798"><li data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">The Science of Happiness, the scientific study of “what makes happy people happy,” was arguably launched by Mihaly Czikszentmihalyi in the late 1980’s.</span></li><li data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Czikszentmihalyi pioneered the “Experience Sampling Method” to discover what he called the “psychology of optimal experience,” and specifically, the experience of Flow.&nbsp;</span></li><li data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">The Science of Happiness is now picking up speed, with scientists from around the globe exploring the neuroscience of happiness as well as the psychology of well-being.&nbsp;</span></li><li data-dcnode-id="1799"><span data-dcnode-id="1803" instrument_node="">The </span><a data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pursuit-of-happiness.org/science-of-happiness/measuring-happiness/"><span data-dcnode-id="1802" instrument_node="">measurement of happiness</span></a><span data-dcnode-id="1800" instrument_node=""> has consequently become a major focus of the new science, with many scales presently being used depending on how “happiness” is defined.</span></li></ul><span data-dcnode-id="1797" instrument_node=""> </span></div><span data-dcnode-id="1795" instrument_node="">
</span></div><span data-dcnode-id="1793" instrument_node="">

</span><ul data-dcnode-id="1737"><li data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Positive Psychology could be regarded as a subset within the broader field we call the Science of Happiness, which extends to the natural as well as the social sciences.</span></li><li data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">Positive Psychology is traditionally focused on the study of positive emotions and “signature strengths,” and more recently on related areas such as intimate relationships and the discovery of meaning.&nbsp; &nbsp;</span></li><li data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">The Science of Happiness extends beyond the psychological sciences, for example, to such areas as the impact of exercise and nutrition on psychological well-being, or the effect of social media on happiness.</span></li></ul><span data-dcnode-id="1736" instrument_node=""> </span></div><span data-dcnode-id="1734" instrument_node="">

</span><p data-dcnode-id="1684"><img alt="happiness scientist" class="alignleft wp-image-1485 entered lazyloaded" data-dcnode-id="1688" data-lazy-sizes="(max-width: 120px) 100vw, 120px" data-lazy-src="https://www.pursuit-of-happiness.org/wp-content/uploads/2010/03/thumb_scientist.jpg" data-lazy-srcset="https://www.pursuit-of-happiness.org/wp-content/uploads/2010/03/thumb_scientist.jpg 200w, https://www.pursuit-of-happiness.org/wp-content/uploads/2010/03/thumb_scientist-139x300.jpg 139w" data-ll-status="loaded" height="258" sizes="(max-width: 120px) 100vw, 120px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pursuit-of-happiness.org/wp-content/uploads/2010/03/thumb_scientist.jpg&amp;raw" srcset="https://www.pursuit-of-happiness.org/wp-content/uploads/2010/03/thumb_scientist.jpg 200w, https://www.pursuit-of-happiness.org/wp-content/uploads/2010/03/thumb_scientist-139x300.jpg 139w" width="120"><noscript data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">&lt;img class="alignleft wp-image-1485" src="https://www.pursuit-of-happiness.org/wp-content/uploads/2010/03/thumb_scientist.jpg" alt="happiness scientist" width="120" height="258" srcset="https://www.pursuit-of-happiness.org/wp-content/uploads/2010/03/thumb_scientist.jpg 200w, https://www.pursuit-of-happiness.org/wp-content/uploads/2010/03/thumb_scientist-139x300.jpg 139w" sizes="(max-width: 120px) 100vw, 120px" /&gt;</span></noscript><span data-dcnode-id="1685" instrument_node="">On the internet and in bookstores, a thousand gurus tout different remedies for human misery. How can we find out which remedies work? We need to consult one of our greatest gurus, the scientific method. Recently we have seen a dramatic upsurge in scientific studies on Positive Psychology and the science of happiness or to put it simply, discovering what makes happy people happy. Fortunately, many of these studies point to specific ways of thinking and acting that can strongly impact our sense of happiness and peace of mind.</span></p><p data-dcnode-id="1678"><span data-dcnode-id="1683" instrument_node="">If you would prefer to explore the Science of Happiness through videos and fun quizzes, try our </span><a data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pursuit-of-happiness.org/the-science-of-happiness-course/"><span data-dcnode-id="1681" style="color: #3366ff;"><span data-dcnode-id="1682" instrument_node="">free Introductory Mini Course</span></span></a><span data-dcnode-id="1679" instrument_node="">. If not, keep reading!</span></p><span data-dcnode-id="1677" instrument_node=""> </span></div><span data-dcnode-id="1675" instrument_node="">

</span><h3 data-dcnode-id="1370"><a data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pursuit-of-happiness.org/science-of-happiness/getting-in-the-flow/"><span data-dcnode-id="1372" instrument_node="">Flow</span></a></h3><p data-dcnode-id="1366"><strong data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Find your flow</span></strong><span data-dcnode-id="1367" instrument_node="">. If we are deeply involved in trying to reach a goal, or an activity that is challenging but well suited to our skills, we experience a joyful state called “flow.” Many kinds of activities, such as sports, playing an instrument, or teaching, can produce the experience of flow. &nbsp;According to Mihaly Csikszentmihalyi, a pioneer of the scientific study of happiness,&nbsp; flow is a type of intrinsic motivation. In his words, “you do what you’re doing primarily because you like what you’re doing. If you learn only for external, extrinsic reasons, you will probably forget it as soon as you are no longer forced to remember what you want to do…</span></p><span data-dcnode-id="1365" instrument_node=""> </span></div><span data-dcnode-id="1363" instrument_node="">

</span><p data-dcnode-id="990"><span data-dcnode-id="1006" instrument_node="">Learn more about Positive Psychology through three pioneers, </span><a data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pursuit-of-happiness.org/history-of-happiness/abraham-maslow/"><span data-dcnode-id="1005" instrument_node="">Abraham Maslow,</span></a><span data-dcnode-id="1003" instrument_node=""> who origiinally coined the expression, </span><a data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pursuit-of-happiness.org/history-of-happiness/mihaly-csikszentmihalyi/"><span data-dcnode-id="1002" instrument_node="">Mihaly Csikszentmihalyi</span></a><span data-dcnode-id="1000" instrument_node="">, who conducted some of the original experiments on the concept of Flow, and especially </span><a data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pursuit-of-happiness.org/history-of-happiness/martin-seligman-psychology/"><span data-dcnode-id="999" instrument_node="">Martin Seligman</span></a><span data-dcnode-id="997" instrument_node="">, of the University of Pennsylvania, who launched Positive Psychology as a new field of inquiry though two landmark publications, </span><span data-dcnode-id="995" style="text-decoration: underline;"><span data-dcnode-id="996" instrument_node="">Authentic Happiness</span></span><span data-dcnode-id="994" instrument_node=""> and, more recently </span><span data-dcnode-id="992" style="text-decoration: underline;"><span data-dcnode-id="993" instrument_node="">Flourish</span></span><span data-dcnode-id="991" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="989" instrument_node=""> </span></div><span data-dcnode-id="987" instrument_node="">
