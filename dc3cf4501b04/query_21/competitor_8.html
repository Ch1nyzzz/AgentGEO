</span><h1 class="entry-title" data-dcnode-id="1081"><span data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">83</span></span><span data-dcnode-id="1082" instrument_node=""> The Pursuit of Happiness</span></h1><span data-dcnode-id="1080" instrument_node="">
</span></header><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">[latexpage]</span></p><span data-dcnode-id="1075" instrument_node="">
</span><div class="textbox learning-objectives" data-dcnode-id="1052"><span data-dcnode-id="1074" instrument_node="">
</span><h3 data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Learning Objectives</span></h3><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">By the end of this section, you will be able to:</span></p><span data-dcnode-id="1068" instrument_node="">
</span><ul data-dcnode-id="1054"><span data-dcnode-id="1067" instrument_node="">
</span><li data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Define and discuss happiness, including its determinants</span></li><span data-dcnode-id="1064" instrument_node="">
</span><li data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Describe the field of positive psychology and identify the kinds of problems it addresses</span></li><span data-dcnode-id="1061" instrument_node="">
</span><li data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Explain the meaning of positive affect and discuss its importance in health outcomes</span></li><span data-dcnode-id="1058" instrument_node="">
</span><li data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Describe the concept of flow and its relationship to happiness and fulfillment</span></li><span data-dcnode-id="1055" instrument_node="">
</span></ul><span data-dcnode-id="1053" instrument_node="">
</span></div><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1046" id="fs-idm110016176"><span data-dcnode-id="1050" instrument_node="">Although the study of </span><span class="no-emphasis" data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">stress</span></span><span data-dcnode-id="1047" instrument_node=""> and how it affects us physically and psychologically is fascinating, it is—admittedly—somewhat of a grim topic. Psychology is also interested in the study of a more upbeat and encouraging approach to human affairs—the quest for happiness.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><div class="bc-section section" data-dcnode-id="899" id="fs-idm50479264"><span data-dcnode-id="1044" instrument_node="">
</span><h1 data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">HAPPINESS</span></h1><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1039" id="fs-idm36966336"><span data-dcnode-id="1040" instrument_node="">America’s founders declared that its citizens have an unalienable right to pursue happiness. But what is happiness? When asked to define the term, people emphasize different aspects of this elusive state. Indeed, happiness is somewhat ambiguous and can be defined from different perspectives (Martin, 2012). Some people, especially those who are highly committed to their religious faith, view happiness in ways that emphasize virtuosity, reverence, and enlightened spirituality. Others see happiness as primarily contentment—the inner peace and joy that come from deep satisfaction with one’s surroundings, relationships with others, accomplishments, and oneself. Still others view happiness mainly as pleasurable engagement with their personal environment—having a career and hobbies that are engaging, meaningful, rewarding, and exciting. These differences, of course, are merely differences in emphasis. Most people would probably agree that each of these views, in some respects, captures the essence of happiness.</span></p><span data-dcnode-id="1038" instrument_node="">
</span><div class="bc-section section" data-dcnode-id="988" id="fs-idp141223008"><span data-dcnode-id="1037" instrument_node="">
</span><h2 data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Elements of Happiness</span></h2><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1029" id="fs-idm23486960"><span data-dcnode-id="1033" instrument_node="">Some psychologists have suggested that happiness consists of three distinct elements: the pleasant life, the good life, and the meaningful life, as shown in </span><a class="autogenerated-content" data-dcnode-id="1031" href="#CNX_Psych_14_05_Happiness"><span data-dcnode-id="1032" instrument_node="">[link]</span></a><span data-dcnode-id="1030" instrument_node=""> (Seligman, 2002; Seligman, Steen, Park, &amp; Peterson, 2005). The pleasant life is realized through the attainment of day-to-day pleasures that add fun, joy, and excitement to our lives. For example, evening walks along the beach and a fulfilling sex life can enhance our daily pleasure and contribute to the pleasant life. The good life is achieved through identifying our unique skills and abilities and engaging these talents to enrich our lives; those who achieve the good life often find themselves absorbed in their work or their recreational pursuits. The meaningful life involves a deep sense of fulfillment that comes from using our talents in the service of the greater good: in ways that benefit the lives of others or that make the world a better place. In general, the happiest people tend to be those who pursue the full life—they orient their pursuits toward all three elements (Seligman et al., 2005).</span></p><span data-dcnode-id="1028" instrument_node="">
</span><div class="bc-figure figure" data-dcnode-id="1017" id="CNX_Psych_14_05_Happiness"><span data-dcnode-id="1027" instrument_node="">
</span><div class="bc-figcaption figcaption" data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Happiness is an enduring state of well-being involving satisfaction in the pleasant, good, and meaningful aspects of life.</span></div><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" id="fs-idp37639504"><br data-dcnode-id="1023"><span data-dcnode-id="1022" instrument_node="">
</span><img alt="A Venn diagram features three circles: one labeled “Good life: using skills for enrichment,” one labeled “Pleasant life: enjoying daily pleasures,” and another labeled: Meaningful life: contributing to the greater good.” All three circles overlap at a section labeled “Happiness.”" data-dcnode-id="1021" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//opentext.wsu.edu/pysch105testimport/wp-content/uploads/sites/72/2017/09/CNX_Psych_14_05_Happiness.jpg&amp;raw"></span></p><span data-dcnode-id="1018" instrument_node="">
</span></div><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1011" id="fs-idm18600000"><span data-dcnode-id="1015" instrument_node="">For practical purposes, a precise definition of </span><span data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">happiness</span></span><span data-dcnode-id="1012" instrument_node=""> might incorporate each of these elements: an enduring state of mind consisting of joy, contentment, and other positive emotions, plus the sense that one’s life has meaning and value (Lyubomirsky, 2001). The definition implies that happiness is a long-term state—what is often characterized as subjective well-being—rather than merely a transient positive mood we all experience from time to time. It is this enduring happiness that has captured the interests of psychologists and other social scientists.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1005" id="fs-idp100690368"><span data-dcnode-id="1009" instrument_node="">The study of happiness has grown dramatically in the last three decades (Diener, 2013). One of the most basic questions that happiness investigators routinely examine is this: How happy are people in general? The average person in the world tends to be relatively happy and tends to indicate experiencing more positive feelings than negative feelings (Diener, Ng, Harter, &amp; Arora, 2010). When asked to evaluate their current lives on a scale ranging from 0 to 10 (with 0 representing “worst possible life” and 10 representing “best possible life”), people in more than 150 countries surveyed from 2010–2012 reported an average score of 5.2. People who live in North America, Australia, and New Zealand reported the highest average score at 7.1, whereas those living Sub-Saharan Africa reported the lowest average score at 4.6 (Helliwell, Layard, &amp; Sachs, 2013). Worldwide, the five happiest countries are Denmark, Norway, Switzerland, the Netherlands, and Sweden; the United States is ranked 17th happiest (</span><a class="autogenerated-content" data-dcnode-id="1007" href="#CNX_Psych_14_05_Denmark"><span data-dcnode-id="1008" instrument_node="">[link]</span></a><span data-dcnode-id="1006" instrument_node="">) (Helliwell et al., 2013).</span></p><span data-dcnode-id="1004" instrument_node="">
</span><div class="bc-figure figure" data-dcnode-id="993" id="CNX_Psych_14_05_Denmark"><span data-dcnode-id="1003" instrument_node="">
</span><div class="bc-figcaption figcaption" data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">(a) Surveys of residents in over 150 countries indicate that Denmark has the happiest citizens in the world. (b) Americans ranked the United States as the 17th happiest country in which to live. (credit a: modification of work by “JamesZ_Flickr”/Flickr; credit b: modification of work by Ryan Swindell)</span></div><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="996" id="fs-idp136008784"><br data-dcnode-id="999"><span data-dcnode-id="998" instrument_node="">
</span><img alt="Photograph A shows a row of buildings by the water in Denmark. Photograph B shows an aerial view of a city in the United States including several skyscrapers." data-dcnode-id="997" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//opentext.wsu.edu/pysch105testimport/wp-content/uploads/sites/72/2017/09/CNX_Psych_14_05_Denmark.jpg&amp;raw"></span></p><span data-dcnode-id="994" instrument_node="">
</span></div><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990" id="fs-idp55743440"><span data-dcnode-id="991" instrument_node="">Several years ago, a Gallup survey of more than 1,000 U.S. adults found that 52% reported that they were “very happy.” In addition, more than 8 in 10 indicated that they were “very satisfied” with their lives (Carroll, 2007). However, a recent poll of 2,345 U.S. adults surprisingly revealed that only one-third reported they are “very happy.” The poll also revealed that the happiness levels of certain groups, including minorities, recent college graduates, and the disabled, have trended downward in recent years (Gregoire, 2013). Although it is difficult to explain this apparent decline in happiness, it may be connected to the challenging economic conditions the United States has endured over the last several years. Of course, this presumption would imply that happiness is closely tied to one’s finances. But, is it? This question brings us to the next important issue: What factors influence happiness?</span></p><span data-dcnode-id="989" instrument_node="">
</span></div><span data-dcnode-id="987" instrument_node="">
</span><div class="bc-section section" data-dcnode-id="961" id="fs-idp45352368"><span data-dcnode-id="986" instrument_node="">
</span><h2 data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Factors Connected to Happiness</span></h2><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981" id="fs-idp145481648"><span data-dcnode-id="982" instrument_node="">What really makes people happy? What factors contribute to sustained joy and contentment? Is it money, attractiveness, material possessions, a rewarding occupation, a satisfying relationship? Extensive research over the years has examined this question. One finding is that age is related to happiness: Life satisfaction usually increases the older people get, but there do not appear to be gender differences in happiness (Diener, Suh, Lucas, &amp; Smith, 1999). Although it is important to point out that much of this work has been correlational, many of the key findings (some of which may surprise you) are summarized below.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978" id="fs-idp97481616"><span data-dcnode-id="979" instrument_node="">Family and other social relationships appear to be key factors correlated with happiness. Studies show that married people report being happier than those who are single, divorced, or widowed (Diener et al., 1999). Happy individuals also report that their marriages are fulfilling (Lyubomirsky, King, &amp; Diener, 2005). In fact, some have suggested that satisfaction with marriage and family life is the strongest predictor of happiness (Myers, 2000). Happy people tend to have more friends, more high-quality social relationships, and stronger social support networks than less happy people (Lyubomirsky et al., 2005). Happy people also have a high frequency of contact with friends (Pinquart &amp; Sörensen, 2000).</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="975" id="fs-idp11578816"><span data-dcnode-id="976" instrument_node="">Can money buy happiness? In general, extensive research suggests that the answer is yes, but with several caveats. While a nation’s per capita gross domestic product (GDP) is associated with happiness levels (Helliwell et al., 2013), changes in GDP (which is a less certain index of household income) bear little relationship to changes in happiness (Diener, Tay, &amp; Oishi, 2013). On the whole, residents of affluent countries tend to be happier than residents of poor countries; within countries, wealthy individuals are happier than poor individuals, but the association is much weaker (Diener &amp; Biswas-Diener, 2002). To the extent that it leads to increases in purchasing power, increases in income are associated with increases in happiness (Diener, Oishi, &amp; Ryan, 2013). However, income within societies appears to correlate with happiness only up to a point. In a study of over 450,000 U.S. residents surveyed by the Gallup Organization, Kahneman and Deaton (2010) found that well-being rises with annual income, but only up to $75,000. The average increase in reported well-being for people with incomes greater than $75,000 was null. As implausible as these findings might seem—after all, higher incomes would enable people to indulge in Hawaiian vacations, prime seats as sporting events, expensive automobiles, and expansive new homes—higher incomes may impair people’s ability to savor and enjoy the small pleasures of life (Kahneman, 2011). Indeed, researchers in one study found that participants exposed to a subliminal reminder of wealth spent less time savoring a chocolate candy bar and exhibited less enjoyment of this experience than did participants who were not reminded of wealth (Quoidbach, Dunn, Petrides, &amp; Mikolajczak, 2010).</span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972" id="fs-idp36849632"><span data-dcnode-id="973" instrument_node="">What about education and employment? Happy people, compared to those who are less happy, are more likely to graduate from college and secure more meaningful and engaging jobs. Once they obtain a job, they are also more likely to succeed (Lyubomirsky et al., 2005). While education shows a positive (but weak) correlation with happiness, intelligence is not appreciably related to happiness (Diener et al., 1999).</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="969" id="fs-idm20213456"><span data-dcnode-id="970" instrument_node="">Does religiosity correlate with happiness? In general, the answer is yes (Hackney &amp; Sanders, 2003). However, the relationship between religiosity and happiness depends on societal circumstances. Nations and states with more difficult living conditions (e.g., widespread hunger and low life expectancy) tend to be more highly religious than societies with more favorable living conditions. Among those who live in nations with difficult living conditions, religiosity is associated with greater well-being; in nations with more favorable living conditions, religious and nonreligious individuals report similar levels of well-being (Diener, Tay, &amp; Myers, 2011).</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966" id="fs-idp105145840"><span data-dcnode-id="967" instrument_node="">Clearly the living conditions of one’s nation can influence factors related to happiness. What about the influence of one’s culture? To the extent that people possess characteristics that are highly valued by their culture, they tend to be happier (Diener, 2012). For example, self-esteem is a stronger predictor of life satisfaction in individualistic cultures than in collectivistic cultures (Diener, Diener, &amp; Diener, 1995), and extraverted people tend to be happier in extraverted cultures than in introverted cultures (Fulmer et al., 2010).</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="963" id="fs-idm47569984"><span data-dcnode-id="964" instrument_node="">So we’ve identified many factors that exhibit some correlation to happiness. What factors don’t show a correlation? Researchers have studied both parenthood and physical attractiveness as potential contributors to happiness, but no link has been identified. Although people tend to believe that parenthood is central to a meaningful and fulﬁlling life, aggregate findings from a range of countries indicate that people who do not have children are generally happier than those who do (Hansen, 2012). And although one’s perceived level of attractiveness seems to predict happiness, a person’s objective physical attractiveness is only weakly correlated with her happiness (Diener, Wolsic, &amp; Fujita, 1995).</span></p><span data-dcnode-id="962" instrument_node="">
</span></div><span data-dcnode-id="960" instrument_node="">
</span><div class="bc-section section" data-dcnode-id="916" id="fs-idp119954080"><span data-dcnode-id="959" instrument_node="">
</span><h2 data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Life Events and Happiness</span></h2><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954" id="fs-idm8706640"><span data-dcnode-id="955" instrument_node="">An important point should be considered regarding happiness. People are often poor at affective forecasting: predicting the intensity and duration of their future emotions (Wilson &amp; Gilbert, 2003). In one study, nearly all newlywed spouses predicted their marital satisfaction would remain stable or improve over the following four years; despite this high level of initial optimism, their marital satisfaction actually declined during this period (Lavner, Karner, &amp; Bradbury, 2013). In addition, we are often incorrect when estimating how our long-term happiness would change for the better or worse in response to certain life events. For example, it is easy for many of us to imagine how euphoric we would feel if we won the lottery, were asked on a date by an attractive celebrity, or were offered our dream job. It is also easy to understand how long-suffering fans of the Chicago Cubs baseball team, which has not won a World Series championship since 1908, think they would feel permanently elated if their team would finally win another World Series. Likewise, it easy to predict that we would feel permanently miserable if we suffered a crippling accident or if a romantic relationship ended.</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="948" id="fs-idp47325568"><span data-dcnode-id="952" instrument_node="">However, something similar to sensory adaptation often occurs when people experience emotional reactions to life events. In much the same way our senses adapt to changes in stimulation (e.g., our eyes adapting to bright light after walking out of the darkness of a movie theater into the bright afternoon sun), we eventually adapt to changing emotional circumstances in our lives (Brickman &amp; Campbell, 1971; Helson, 1964). When an event that provokes positive or negative emotions occurs, at first we tend to experience its emotional impact at full intensity. We feel a burst of pleasure following such things as a marriage proposal, birth of a child, acceptance to law school, an inheritance, and the like; as you might imagine, lottery winners experience a surge of happiness after hitting the jackpot (Lutter, 2007). Likewise, we experience a surge of misery following widowhood, a divorce, or a layoff from work. In the long run, however, we eventually adjust to the emotional new normal; the emotional impact of the event tends to erode, and we eventually revert to our original baseline happiness levels. Thus, what was at first a thrilling lottery windfall or World Series championship eventually loses its luster and becomes the status quo (</span><a class="autogenerated-content" data-dcnode-id="950" href="#CNX_Psych_14_05_Cubs"><span data-dcnode-id="951" instrument_node="">[link]</span></a><span data-dcnode-id="949" instrument_node="">). Indeed, dramatic life events have much less long-lasting impact on happiness than might be expected (Brickman, Coats, &amp; Janoff-Bulman, 1978).</span></p><span data-dcnode-id="947" instrument_node="">
</span><div class="bc-figure figure" data-dcnode-id="936" id="CNX_Psych_14_05_Cubs"><span data-dcnode-id="946" instrument_node="">
</span><div class="bc-figcaption figcaption" data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">(a) Long-suffering Chicago Cub fans would no doubt feel elated if their team won a World Series championship, a feat that has not been accomplished by that franchise in over a century. (b) In ways that are similar, those who play the lottery rightfully think that choosing the correct numbers and winning millions would lead to a surge in happiness. However, the initial burst of elation following such elusive events would most likely erode with time. (credit a: modification of work by Phil Roeder; credit b: modification of work by Robert S. Donovan)</span></div><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" id="fs-idp52849824"><br data-dcnode-id="942"><span data-dcnode-id="941" instrument_node="">
</span><img alt="Photograph A shows a pitcher for the Cubs on the mound. Photograph B shows a lottery ticket." data-dcnode-id="940" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//opentext.wsu.edu/pysch105testimport/wp-content/uploads/sites/72/2017/09/CNX_Psych_14_05_Cubs.jpg&amp;raw"></span></p><span data-dcnode-id="937" instrument_node="">
</span></div><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="930" id="fs-idp95965104"><span data-dcnode-id="934" instrument_node="">Recently, some have raised questions concerning the extent to which important life events can permanently alter people’s happiness set points (Diener, Lucas, &amp; Scollon, 2006). Evidence from a number of investigations suggests that, in some circumstances, happiness levels do not revert to their original positions. For example, although people generally tend to adapt to marriage so that it no longer makes them happier or unhappier than before, they often do not fully adapt to unemployment or severe disabilities (Diener, 2012). </span><a class="autogenerated-content" data-dcnode-id="932" href="#CNX_Psych_14_05_AdaptationCh"><span data-dcnode-id="933" instrument_node="">[link]</span></a><span data-dcnode-id="931" instrument_node="">, which is based on longitudinal data from a sample of over 3,000 German respondents, shows life satisfaction scores several years before, during, and after various life events, and it illustrates how people adapt (or fail to adapt) to these events. German respondents did not get lasting emotional boosts from marriage; instead, they reported brief increases in happiness, followed by quick adaptation. In contrast, widows and those who had been laid off experienced sizeable decreases in happiness that appeared to result in long-term changes in life satisfaction (Diener et al., 2006). Further, longitudinal data from the same sample showed that happiness levels changed significantly over time for nearly a quarter of respondents, with 9% showing major changes (Fujita &amp; Diener, 2005). Thus, long-term happiness levels can and do change for some people.</span></p><span data-dcnode-id="929" instrument_node="">
</span><div class="bc-figure figure" data-dcnode-id="918" id="CNX_Psych_14_05_AdaptationCh"><span data-dcnode-id="928" instrument_node="">
</span><div class="bc-figcaption figcaption" data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">This graphs shows life satisfaction scores several years before and after three significant life events (0 represents the year the event happened) (Diener et al., 2006).</span></div><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="921" id="fs-idm42551696"><br data-dcnode-id="924"><span data-dcnode-id="923" instrument_node="">
</span><img alt="A chart compares life satisfaction scores in the years before and after significant life events. Life satisfaction is steady in the five years before and after marriage. There is a gradual incline that peaks in the year of marriage and declines slightly in the years following. With respect to unemployment, life satisfaction five years before is roughly the same as it is with marriage at that time, but begins to decline sharply around 2 years before unemployment. One year after unemployment, life satisfaction has risen slightly, but then becomes steady at a much lower level than at five years before. With respect to the death of a spouse, life satisfaction five years before is about the same as marriage at that time, but steadily declines until the death, when it starts to gradually rise again. After five years, the person who has suffered the death of a spouse has roughly the same life satisfaction as the person who was unemployed." data-dcnode-id="922" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//opentext.wsu.edu/pysch105testimport/wp-content/uploads/sites/72/2017/09/CNX_Psych_14_05_AdaptationCh.jpg&amp;raw"></span></p><span data-dcnode-id="919" instrument_node="">
</span></div><span data-dcnode-id="917" instrument_node="">
</span></div><span data-dcnode-id="915" instrument_node="">
</span><div class="bc-section section" data-dcnode-id="901" id="fs-idp63060784"><span data-dcnode-id="914" instrument_node="">
</span><h2 data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Increasing Happiness</span></h2><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909" id="fs-idp127495760"><span data-dcnode-id="910" instrument_node="">Some recent findings about happiness provide an optimistic picture, suggesting that real changes in happiness are possible. For example, thoughtfully developed well-being interventions designed to augment people’s baseline levels of happiness may increase happiness in ways that are permanent and long-lasting, not just temporary. These changes in happiness may be targeted at individual, organizational, and societal levels (Diener et al., 2006). Researchers in one study found that a series of happiness interventions involving such exercises as writing down three good things that occurred each day led to increases in happiness that lasted over six months (Seligman et al., 2005).</span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="903" id="fs-idp41908368"><span data-dcnode-id="907" instrument_node="">Measuring </span><span class="no-emphasis" data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">happiness</span></span><span data-dcnode-id="904" instrument_node=""> and well-being at the societal level over time may assist policy makers in determining if people are generally happy or miserable, as well as when and why they might feel the way they do. Studies show that average national happiness scores (over time and across countries) relate strongly to six key variables: per capita gross domestic product (GDP, which reflects a nation’s economic standard of living), social support, freedom to make important life choices, healthy life expectancy, freedom from perceived corruption in government and business, and generosity (Helliwell et al., 2013). Investigating why people are happy or unhappy might help policymakers develop programs that increase happiness and well-being within a society (Diener et al., 2006). Resolutions about contemporary political and social issues that are frequent topics of debate—such as poverty, taxation, affordable health care and housing, clean air and water, and income inequality—might be best considered with people’s happiness in mind.</span></p><span data-dcnode-id="902" instrument_node="">
</span></div><span data-dcnode-id="900" instrument_node="">
</span></div><span data-dcnode-id="898" instrument_node="">
</span><div class="bc-section section" data-dcnode-id="843" id="fs-idp44985952"><span data-dcnode-id="897" instrument_node="">
</span><h1 data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">POSITIVE PSYCHOLOGY</span></h1><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="886" id="fs-idm25064400"><span data-dcnode-id="893" instrument_node="">In 1998, </span><span class="no-emphasis" data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Seligman</span></span><span data-dcnode-id="890" instrument_node=""> (the same person who conducted the learned helplessness experiments mentioned earlier), who was then president of the American Psychological Association, urged psychologists to focus more on understanding how to build human strength and psychological well-being. In deliberately setting out to create a new direction and new orientation for psychology, Seligman helped establish a growing movement and field of research called positive psychology (Compton, 2005). In a very general sense, </span><span data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">positive psychology</span></span><span data-dcnode-id="887" instrument_node=""> can be thought of as the science of happiness; it is an area of study that seeks to identify and promote those qualities that lead to greater fulfillment in our lives. This field looks at people’s strengths and what helps individuals to lead happy, contented lives, and it moves away from focusing on people’s pathology, faults, and problems. According to Seligman and Csikszentmihalyi (2000), positive psychology,</span></p><span data-dcnode-id="885" instrument_node="">
</span><blockquote data-dcnode-id="881" id="fs-idp120563456"><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">at the subjective level is about valued subjective experiences: well-being, contentment, and satisfaction (in the past); hope and optimism (for the future); and… happiness (in the present). At the individual level, it is about positive individual traits: the capacity for love and vocation, courage, interpersonal skill, aesthetic sensibility, perseverance, forgiveness, originality, future mindedness, spirituality, high talent, and wisdom. (p. 5)</span></p><span data-dcnode-id="882" instrument_node="">
</span></blockquote><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="878" id="fs-idm7741440"><span data-dcnode-id="879" instrument_node="">Some of the topics studied by positive psychologists include altruism and empathy, creativity, forgiveness and compassion, the importance of positive emotions, enhancement of immune system functioning, savoring the fleeting moments of life, and strengthening virtues as a way to increase authentic happiness (Compton, 2005). Recent efforts in the field of positive psychology have focused on extending its principles toward peace and well-being at the level of the global community. In a war-torn world in which conflict, hatred, and distrust are common, such an extended “positive peace psychology” could have important implications for understanding how to overcome oppression and work toward global peace (Cohrs, Christie, White, &amp; Das, 2013).</span></p><span data-dcnode-id="877" instrument_node="">
</span><div class="note psychology dig-deeper" data-dcnode-id="866" id="fs-idp77009152"><span data-dcnode-id="876" instrument_node="">
</span><div class="title" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">The Center for Investigating Healthy Minds</span></div><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871" id="fs-idp11641392"><span data-dcnode-id="872" instrument_node="">On the campus of the University of Wisconsin–Madison, the Center for Investigating Healthy Minds at the Waisman Center conducts rigorous scientific research on healthy aspects of the mind, such as kindness, forgiveness, compassion, and mindfulness. Established in 2008 and led by renowned neuroscientist Dr. Richard J. Davidson, the Center examines a wide range of ideas, including such things as a kindness curriculum in schools, neural correlates of prosocial behavior, psychological effects of Tai Chi training, digital games to foster prosocial behavior in children, and the effectiveness of yoga and breathing exercises in reducing symptoms of post-traumatic stress disorder.</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868" id="fs-idp11662352"><span data-dcnode-id="869" instrument_node="">According to its website, the Center was founded after Dr. Davidson was challenged by His Holiness, the 14th Dalai Lama, “to apply the rigors of science to study positive qualities of mind” (Center for Investigating Health Minds, 2013). The Center continues to conduct scientific research with the aim of developing mental health training approaches that help people to live happier, healthier lives).</span></p><span data-dcnode-id="867" instrument_node="">
</span></div><span data-dcnode-id="865" instrument_node="">
</span><div class="bc-section section" data-dcnode-id="845" id="fs-idm549360"><span data-dcnode-id="864" instrument_node="">
</span><h2 data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Positive Affect and Optimism</span></h2><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="856" id="fs-idm32871088"><span data-dcnode-id="860" instrument_node="">Taking a cue from positive psychology, extensive research over the last 10-15 years has examined the importance of positive psychological attributes in physical well-being. Qualities that help promote psychological well-being (e.g., having meaning and purpose in life, a sense of autonomy, positive emotions, and satisfaction with life) are linked with a range of favorable health outcomes (especially improved cardiovascular health) mainly through their relationships with biological functions and health behaviors (such as diet, physical activity, and sleep quality) (Boehm &amp; Kubzansky, 2012). The quality that has received attention is </span><span data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">positive affect</span></span><span data-dcnode-id="857" instrument_node="">, which refers to pleasurable engagement with the environment, such as happiness, joy, enthusiasm, alertness, and excitement (Watson, Clark, &amp; Tellegen, 1988). The characteristics of positive affect, as with negative affect (discussed earlier), can be brief, long-lasting, or trait-like (Pressman &amp; Cohen, 2005). Independent of age, gender, and income, positive affect is associated with greater social connectedness, emotional and practical support, adaptive coping efforts, and lower depression; it is also associated with longevity and favorable physiological functioning (Steptoe, O’Donnell, Marmot, &amp; Wardle, 2008).</span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="850" id="fs-idm20518816"><span data-dcnode-id="854" instrument_node="">Positive affect also serves as a protective factor against heart disease. In a 10-year study of Nova Scotians, the rate of heart disease was 22% lower for each one-point increase on the measure of positive affect, from 1 (no positive affect expressed) to 5 (extreme positive affect) (Davidson, Mostofsky, &amp; Whang, 2010). In terms of our health, the expression, “don’t worry, be happy” is helpful advice indeed. There has also been much work suggesting that </span><span data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">optimism</span></span><span data-dcnode-id="851" instrument_node="">—the general tendency to look on the bright side of things—is also a significant predictor of positive health outcomes.</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847" id="fs-idp69612816"><span data-dcnode-id="848" instrument_node="">Although positive affect and optimism are related in some ways, they are not the same (Pressman &amp; Cohen, 2005). Whereas positive affect is mostly concerned with positive feeling states, optimism has been regarded as a generalized tendency to expect that good things will happen (Chang, 2001). It has also been conceptualized as a tendency to view life’s stressors and difficulties as temporary and external to oneself (Peterson &amp; Steen, 2002). Numerous studies over the years have consistently shown that optimism is linked to longevity, healthier behaviors, fewer postsurgical complications, better immune functioning among men with prostate cancer, and better treatment adherence (Rasmussen &amp; Wallio, 2008). Further, optimistic people report fewer physical symptoms, less pain, better physical functioning, and are less likely to be rehospitalized following heart surgery (Rasmussen, Scheier, &amp; Greenhouse, 2009).</span></p><span data-dcnode-id="846" instrument_node="">
</span></div><span data-dcnode-id="844" instrument_node="">
</span></div><span data-dcnode-id="842" instrument_node="">
</span><div class="bc-section section" data-dcnode-id="825" id="fs-idp85028080"><span data-dcnode-id="841" instrument_node="">
</span><h1 data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Flow</span></h1><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="833" id="fs-idp54035920"><span data-dcnode-id="837" instrument_node="">Another factor that seems to be important in fostering a deep sense of well-being is the ability to derive flow from the things we do in life. </span><span data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Flow</span></span><span data-dcnode-id="834" instrument_node=""> is described as a particular experience that is so engaging and engrossing that it becomes worth doing for its own sake (Csikszentmihalyi, 1997). It is usually related to creative endeavors and leisure activities, but it can also be experienced by workers who like their jobs or students who love studying (Csikszentmihalyi, 1999). Many of us instantly recognize the notion of flow. In fact, the term derived from respondents’ spontaneous use of the term when asked to describe how it felt when what they were doing was going well. When people experience flow, they become involved in an activity to the point where they feel they lose themselves in the activity. They effortlessly maintain their concentration and focus, they feel as though they have complete control of their actions, and time seems to pass more quickly than usual (Csikszentmihalyi, 1997). Flow is considered a pleasurable experience, and it typically occurs when people are engaged in challenging activities that require skills and knowledge they know they possess. For example, people would be more likely report flow experiences in relation to their work or hobbies than in relation to eating. When asked the question, “Do you ever get involved in something so deeply that nothing else seems to matter, and you lose track of time?” about 20% of Americans and Europeans report having these flow-like experiences regularly (Csikszentmihalyi, 1997).</span></p><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="830" id="fs-idp119614304"><span data-dcnode-id="831" instrument_node="">Although wealth and material possessions are nice to have, the notion of flow suggests that neither are prerequisites for a happy and fulfilling life. Finding an activity that you are truly enthusiastic about, something so absorbing that doing it is reward itself (whether it be playing tennis, studying Arabic, writing children’s novels, or cooking lavish meals) is perhaps the real key. According to Csikszentmihalyi (1999), creating conditions that make flow experiences possible should be a top social and political priority. How might this goal be achieved? How might flow be promoted in school systems? In the workplace? What potential benefits might be accrued from such efforts?</span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827" id="fs-idp138222016"><span data-dcnode-id="828" instrument_node="">In an ideal world, scientific research endeavors should inform us on how to bring about a better world for all people. The field of positive psychology promises to be instrumental in helping us understand what truly builds hope, optimism, happiness, healthy relationships, flow, and genuine personal fulfillment.</span></p><span data-dcnode-id="826" instrument_node="">
</span></div><span data-dcnode-id="824" instrument_node="">
</span><div class="summary" data-dcnode-id="816" id="fs-idp106790800"><span data-dcnode-id="823" instrument_node="">
</span><h1 data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Summary</span></h1><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818" id="fs-idm7254448"><span data-dcnode-id="819" instrument_node="">Happiness is conceptualized as an enduring state of mind that consists of the capacity to experience pleasure in daily life, as well as the ability to engage one’s skills and talents to enrich one’s life and the lives of others. Although people around the world generally report that they are happy, there are differences in average happiness levels across nations. Although people have a tendency to overestimate the extent to which their happiness set points would change for the better or for the worse following certain life events, researchers have identified a number of factors that are consistently related to happiness. In recent years, positive psychology has emerged as an area of study seeking to identify and promote qualities that lead to greater happiness and fulfillment in our lives. These components include positive affect, optimism, and flow.</span></p><span data-dcnode-id="817" instrument_node="">
</span></div><span data-dcnode-id="815" instrument_node="">
</span><div class="review-questions" data-dcnode-id="684" id="fs-idm22203072"><span data-dcnode-id="814" instrument_node="">

</span><p data-dcnode-id="771" id="fs-idp1203248"><span data-dcnode-id="775" instrument_node="">Researchers have identified a number of factors that are related to happiness. Which of the following is </span><em data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">not</span></em><span data-dcnode-id="772" instrument_node=""> one of them?</span></p><span data-dcnode-id="770" instrument_node="">

</span><div class="problem" data-dcnode-id="724" id="fs-idm23412592"><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741" id="fs-idm22395088"><span data-dcnode-id="742" instrument_node="">How does positive affect differ from optimism?</span></p><span data-dcnode-id="740" instrument_node="">
</span><ol data-dcnode-id="726" id="fs-idm4926384"><span data-dcnode-id="739" instrument_node="">
</span><li data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Optimism is more scientific than positive affect.</span></li><span data-dcnode-id="736" instrument_node="">
</span><li data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Positive affect is more scientific than optimism.</span></li><span data-dcnode-id="733" instrument_node="">
</span><li data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Positive affect involves feeling states, whereas optimism involves expectations.</span></li><span data-dcnode-id="730" instrument_node="">
</span><li data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Optimism involves feeling states, whereas positive affect involves expectations.</span></li><span data-dcnode-id="727" instrument_node="">

</span><p data-dcnode-id="711" id="fs-idp89362304"><span data-dcnode-id="712" instrument_node="">Carson enjoys writing mystery novels, and has even managed to publish some of his work. When he’s writing, Carson becomes extremely focused on his work; in fact, he becomes so absorbed that that he often loses track of time, often staying up well past 3 a.m. Carson’s experience best illustrates the concept of ________.</span></p><span data-dcnode-id="710" instrument_node="">

</span><div class="critical-thinking" data-dcnode-id="648" id="fs-idm19801680"><span data-dcnode-id="682" instrument_node="">
</span><h1 data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Critical Thinking Questions</span></h1><span data-dcnode-id="679" instrument_node="">
</span><div class="exercise" data-dcnode-id="665" id="fs-idp148648256"><span data-dcnode-id="678" instrument_node="">
</span><div class="problem" data-dcnode-id="673" id="fs-idm22570192"><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675" id="fs-idp117398368"><span data-dcnode-id="676" instrument_node="">In considering the three dimensions of happiness discussed in this section (the pleasant life, the good life, and the meaningful life), what are some steps you could take to improve your personal level of happiness?</span></p><span data-dcnode-id="674" instrument_node="">
</span></div><span data-dcnode-id="672" instrument_node="">
</span><div class="solution" data-dcnode-id="667" id="fs-idp67207472"><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669" id="fs-idp99794240"><span data-dcnode-id="670" instrument_node="">Answers will vary, but may include mentioning things that boost positive emotions (the pleasant life), developing and using skills and talents (the good life), and using one’s talents to help others (the meaningful life).</span></p><span data-dcnode-id="668" instrument_node="">
</span></div><span data-dcnode-id="666" instrument_node="">
</span></div><span data-dcnode-id="664" instrument_node="">
</span><div class="exercise" data-dcnode-id="650" id="fs-idp119982704"><span data-dcnode-id="663" instrument_node="">
</span><div class="problem" data-dcnode-id="658" id="fs-idp136343760"><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660" id="fs-idp120659104"><span data-dcnode-id="661" instrument_node="">The day before the drawing of a $300 million Powerball lottery, you notice that a line of people waiting to buy their Powerball tickets is stretched outside the door of a nearby convenience store. Based on what you’ve learned, provide some perspective on why these people are doing this, and what would likely happen if one of these individuals happened to pick the right numbers.</span></p><span data-dcnode-id="659" instrument_node="">
</span></div><span data-dcnode-id="657" instrument_node="">
</span><div class="solution" data-dcnode-id="652" id="fs-idp92875488"><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654" id="fs-idp53944864"><span data-dcnode-id="655" instrument_node="">These individuals’ affective forecasting is such that they believe their lives would be immeasurably happier if they won the lottery. Although winning would certainly lead to a surge of euphoria in the short term, long term they would likely adjust, and their happiness levels would likely return to normal. This fact is lost on most people, especially when considering the intensity and duration of their emotions following a major life event.</span></p><span data-dcnode-id="653" instrument_node="">
</span></div><span data-dcnode-id="651" instrument_node="">
</span></div><span data-dcnode-id="649" instrument_node="">
</span></div><span data-dcnode-id="647" instrument_node="">
</span><div class="personal-application" data-dcnode-id="633" id="fs-idp118492624"><span data-dcnode-id="646" instrument_node="">
</span><h1 data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Personal Application Question</span></h1><span data-dcnode-id="643" instrument_node="">
</span><div class="exercise" data-dcnode-id="635" id="fs-idm31224944"><span data-dcnode-id="642" instrument_node="">
</span><div class="problem" data-dcnode-id="637" id="fs-idp27147088"><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639" id="fs-idp49802656"><span data-dcnode-id="640" instrument_node="">Think of an activity you participate in that you find engaging and absorbing. For example, this might be something like playing video games, reading, or a hobby. What are your experiences typically like while engaging in this activity? Do your experiences conform to the notion of flow? If so, how? Do you think these experiences have enriched your life? Why or why not?</span></p><span data-dcnode-id="638" instrument_node="">
</span></div><span data-dcnode-id="636" instrument_node="">
</span></div><span data-dcnode-id="634" instrument_node="">
</span></div><span data-dcnode-id="632" instrument_node="">
</span><div class="textbox shaded" data-dcnode-id="582"><span data-dcnode-id="631" instrument_node="">
</span><h2 data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Glossary</span></h2><span data-dcnode-id="628" instrument_node="">
</span><dl class="definition" data-dcnode-id="620" id="fs-idm6402160"><span data-dcnode-id="627" instrument_node="">
</span><dt data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">flow</span></dt><span data-dcnode-id="624" instrument_node="">
</span><dd data-dcnode-id="622" id="fs-idp69814080"><span data-dcnode-id="623" instrument_node="">state involving intense engagement in an activity; usually is experienced when participating in creative, work, and leisure endeavors</span></dd><span data-dcnode-id="621" instrument_node="">
</span></dl><span data-dcnode-id="619" instrument_node="">
</span><dl class="definition" data-dcnode-id="611" id="fs-idp140642144"><span data-dcnode-id="618" instrument_node="">
</span><dt data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">happiness</span></dt><span data-dcnode-id="615" instrument_node="">
</span><dd data-dcnode-id="613" id="fs-idp103563136"><span data-dcnode-id="614" instrument_node="">enduring state of mind consisting of joy, contentment, and other positive emotions; the sense that one’s life has meaning and value</span></dd><span data-dcnode-id="612" instrument_node="">
</span></dl><span data-dcnode-id="610" instrument_node="">
</span><dl class="definition" data-dcnode-id="602" id="fs-idp22741200"><span data-dcnode-id="609" instrument_node="">
</span><dt data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">optimism</span></dt><span data-dcnode-id="606" instrument_node="">
</span><dd data-dcnode-id="604" id="fs-idp39046352"><span data-dcnode-id="605" instrument_node="">tendency toward a positive outlook and positive expectations</span></dd><span data-dcnode-id="603" instrument_node="">
</span></dl><span data-dcnode-id="601" instrument_node="">
</span><dl class="definition" data-dcnode-id="593" id="fs-idm57537312"><span data-dcnode-id="600" instrument_node="">
</span><dt data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">positive affect</span></dt><span data-dcnode-id="597" instrument_node="">
</span><dd data-dcnode-id="595" id="fs-idm39459808"><span data-dcnode-id="596" instrument_node="">state or a trait that involves pleasurable engagement with the environment, the dimensions of which include happiness, joy, enthusiasm, alertness, and excitement</span></dd><span data-dcnode-id="594" instrument_node="">
</span></dl><span data-dcnode-id="592" instrument_node="">
</span><dl class="definition" data-dcnode-id="584" id="fs-idp77850048"><span data-dcnode-id="591" instrument_node="">
</span><dt data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">positive psychology</span></dt><span data-dcnode-id="588" instrument_node="">
</span><dd data-dcnode-id="586" id="fs-idp9942256"><span data-dcnode-id="587" instrument_node="">scientific area of study seeking to identify and promote those qualities that lead to happy, fulfilled, and contented lives</span></dd><span data-dcnode-id="585" instrument_node="">
</span></dl><span data-dcnode-id="583" instrument_node="">
</span></div><span data-dcnode-id="581" instrument_node="">
