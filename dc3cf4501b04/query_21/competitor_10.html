</span><div class="comp structured-content expert-content mntl-sc-page mntl-block" data-bind-scroll-on-start="true" data-dcnode-id="794" data-sc-ad-label-height="24" data-sc-ad-track-spacing="100" data-sc-breakpoint="54em" data-sc-content-positions="[1, 1050, 1250, 1550, 1950, 2350, 2750, 3150]" data-sc-load-immediate="3" data-sc-max-track-height="600" data-sc-min-track-height="250" data-sc-sticky-offset="85" id="mntl-sc-page_1-0"><span data-dcnode-id="1400" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1398" id="mntl-sc-block_1-0"><span data-dcnode-id="1399" instrument_node="">
Positive psychology is a relatively new subfield of psychology that focuses on human strengths and the things that make life worth living. Psychologist Martin Seligman is considered the father of this branch of psychology after he led the charge to popularize it in 1998. Since then, positive psychology has garnered a great deal of interest, generating attention from both psychologists and the general public.
</span></p><span data-dcnode-id="1397" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1386" id="mntl-sc-block_1-0-1"><div class="comp mntl-block" data-dcnode-id="1387" id="mntl-block_4-0"><span data-dcnode-id="1396" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard1-sticky-dynamic mntl-sc-sticky-billboard scads-stick-in-parent scads-ad-placed" data-dcnode-id="1389" data-height="1050" id="ref-billboard1-sticky-dynamic_1-0" style="height: 1050px; top: 141px;"><span data-dcnode-id="1395" instrument_node="">

</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="1382" id="mntl-sc-block-callout-heading_1-0"><span data-dcnode-id="1383" instrument_node="">
Key Takeaways: Positive Psychology</span></h3><span data-dcnode-id="1381" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1372" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="1380" instrument_node="">
</span><ul data-dcnode-id="1373"><li data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Positive psychology is the scientific study of human flourishing and well-being.</span></li><li data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">While positive psychology has received a great deal of attention, it has also been criticized for a number of reasons, including neglecting individual differences, blaming the victim, and being biased towards a Western, white, middle-class perspective.</span></li><li data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Martin Seligman is considered the father of positive psychology because he introduced it as the theme for his term as president of the American Psychological Association in 1998. </span></li></ul></div><span data-dcnode-id="1371" instrument_node="">
</span></div><span data-dcnode-id="1369" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1368" id="toc-origins-and-definition-of-positive-psychology"></span><span data-dcnode-id="1367" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1362" id="mntl-sc-block_1-0-3"><span data-dcnode-id="1366" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node=""> Origins and Definition of Positive Psychology </span></span><span data-dcnode-id="1363" instrument_node=""> </span></h2><span data-dcnode-id="1361" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1356" id="mntl-sc-block_1-0-4"><span data-dcnode-id="1360" instrument_node="">
While psychologists have studied topics like happiness, optimism, and other human strengths for decades, positive psychology wasn’t officially identified as a branch of psychology until 1998 when Martin Seligman was elected president of the American Psychological Association (APA). </span><a data-component="link" data-dcnode-id="1358" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ted.com/talks/martin_seligman_the_new_era_of_positive_psychology" rel="noopener" target="_blank"><span data-dcnode-id="1359" instrument_node="">Seligman suggested</span></a><span data-dcnode-id="1357" instrument_node=""> that psychology had become too focused on mental illness. While this had yielded valuable treatments that enabled psychologists to treat a number of pathologies and dysfunctions that helped people become less unhappy, it meant that psychology was neglecting what was good about life—and what the average person could improve.
</span></p><span data-dcnode-id="1355" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1074" id="mntl-sc-block_1-0-6"><span data-dcnode-id="1075" instrument_node="">
Seligman called for research into what makes normal people’s lives positive and fulfilling, and suggested that the field should develop interventions that could make people happier. He stated that psychology should be just as concerned with nurturing the good things in life as it was with healing the bad. From these ideas positive psychology was born.
</span></p><span data-dcnode-id="1073" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1062" id="mntl-sc-block_1-0-7"><div class="comp mntl-block" data-dcnode-id="1063" id="mntl-block_6-0"><span data-dcnode-id="1072" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1053" id="mntl-sc-block_1-0-8"><span data-dcnode-id="1060" instrument_node="">
Seligman made positive psychology the theme of his term as APA president and used his visibility in that role to spread the word. From there the field took off. It received a great deal of </span><a data-component="link" data-dcnode-id="1058" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apa.org/monitor/2011/04/positive-psychology" rel="noopener" target="_blank"><span data-dcnode-id="1059" instrument_node="">attention from mainstream media</span></a><span data-dcnode-id="1057" instrument_node=""> outlets. Meanwhile, the </span><a data-component="link" data-dcnode-id="1055" data-ordinal="2" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodtherapy.org/learn-about-therapy/types/positive-psychology" rel="noopener" target="_blank"><span data-dcnode-id="1056" instrument_node="">first Positive Psychology Summit</span></a><span data-dcnode-id="1054" instrument_node=""> was held in 1999, followed by the first International Conference on Positive Psychology in 2002.
</span></p><span data-dcnode-id="1052" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1041" id="mntl-sc-block_1-0-9"><div class="comp mntl-block" data-dcnode-id="1042" id="mntl-block_7-0"><span data-dcnode-id="1051" instrument_node="">

</span><a data-component="link" data-dcnode-id="1037" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/the-highlight/2019/11/13/20955328/positive-psychology-martin-seligman-happiness-religion-secularism" rel="noopener" target="_blank"><span data-dcnode-id="1038" instrument_node="">Interest in positive psychology</span></a><span data-dcnode-id="1036" instrument_node=""> has remained high ever since. In 2019, 1,600 individuals attended the World Congress of Positive Psychology, research in the field has generated tens of thousands of academic papers, and a quarter of the undergraduate students at Yale University enrolled in a course devoted to the subject of happiness in 2018.
</span></p><span data-dcnode-id="1034" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1023" id="mntl-sc-block_1-0-11"><div class="comp mntl-block" data-dcnode-id="1024" id="mntl-block_8-0"><span data-dcnode-id="1033" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1020" id="mntl-sc-block_1-0-12"><span data-dcnode-id="1021" instrument_node="">
While Seligman is still the name most closely associated with positive psychology, numerous other well-known researchers have contributed to the subfield, including Mihaly Csikszentmihalyi, Barbara Fredrickson, Daniel Gilbert, Albert Bandura, Carol Dweck, and Roy Baumeister.
</span></p><span data-dcnode-id="1019" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1018" id="mntl-sc-block_1-0-13"></div><span data-dcnode-id="1017" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1012" id="mntl-sc-block_1-0-14"><span data-dcnode-id="1016" instrument_node="">
Today, positive psychology is sometimes confused with self-help movements, like positive thinking. However, like all of psychology, positive psychology is a science, and therefore, uses research based on the scientific method to reach its conclusions about what causes humans to thrive. Psychologist </span><a data-component="link" data-dcnode-id="1014" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologytoday.com/us/blog/the-good-life/200805/what-is-positive-psychology-and-what-is-it-not" rel="noopener" target="_blank"><span data-dcnode-id="1015" instrument_node="">Christopher Peterson</span></a><span data-dcnode-id="1013" instrument_node=""> also pointed out that positive psychology is meant to serve as a complement and extension of the areas of psychology that focus on mental illness and human weakness. Positive psychologists don’t wish to replace or discard the study of human problems, they simply wish to add the study of what’s good in life to the field.
</span></p><span data-dcnode-id="1011" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1010" id="mntl-sc-block_1-0-15"></div><span data-dcnode-id="1009" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1008" id="toc-important-theories-and-ideas"></span><span data-dcnode-id="1007" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1002" id="mntl-sc-block_1-0-16"><span data-dcnode-id="1006" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node=""> Important Theories and Ideas </span></span><span data-dcnode-id="1003" instrument_node=""> </span></h2><span data-dcnode-id="1001" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="999" id="mntl-sc-block_1-0-17"><span data-dcnode-id="1000" instrument_node="">
Since Seligman first brought widespread attention to positive psychology, several theories, ideas, and research findings have come out of the subfield, including:
</span></p><span data-dcnode-id="998" instrument_node="">

</span><li data-dcnode-id="981"><a data-component="link" data-dcnode-id="983" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.com/books%3Fid%3D2ur8ci01fIkC%26newbks%3D0%26hl%3Den%26source%3Dnewbks_fb" rel="noopener" target="_blank"><span data-dcnode-id="984" instrument_node="">Flow and mindfulness</span></a><span data-dcnode-id="982" instrument_node=""> can help encourage optimal human functioning.</span></li><span data-dcnode-id="980" instrument_node="">
</span><li data-dcnode-id="975"><span data-dcnode-id="979" instrument_node="">People tend to be </span><a data-component="link" data-dcnode-id="977" data-ordinal="2" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologytoday.com/us/blog/the-good-life/200805/what-is-positive-psychology-and-what-is-it-not" rel="noopener" target="_blank"><span data-dcnode-id="978" instrument_node="">pretty happy</span></a><span data-dcnode-id="976" instrument_node=""> and resilient.</span></li><span data-dcnode-id="974" instrument_node="">
</span><li data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">There are different forms of happiness—hedonism, or pleasure, and eudaimonia, or well-being. Eudaimonia has been found to be more important than hedonism to a satisfying life.</span></li><span data-dcnode-id="971" instrument_node="">
</span><li data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Strong relationships and character strengths can help counter the negative impact of setbacks.</span></li><span data-dcnode-id="968" instrument_node="">
</span><li data-dcnode-id="964"><a data-component="link" data-dcnode-id="966" data-ordinal="3" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/what-is-positive-psychology-definition/" rel="noopener" target="_blank"><span data-dcnode-id="967" instrument_node="">Money</span></a><span data-dcnode-id="965" instrument_node=""> doesn’t impact happiness past a certain point, but spending money on experiences will make people happier than spending it on material things.</span></li><span data-dcnode-id="963" instrument_node="">
</span><li data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Gratitude contributes to happiness.</span></li><span data-dcnode-id="960" instrument_node="">
</span><li data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">There is a genetic component to happiness; however, anyone can improve their happiness through practices like optimism and altruism.</span></li><span data-dcnode-id="957" instrument_node="">
</span></ul><span data-dcnode-id="955" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="944" id="mntl-sc-block_1-0-20"><div class="comp mntl-block" data-dcnode-id="945" id="mntl-block_10-0"><span data-dcnode-id="954" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="942" id="toc-critiques-and-limitations"></span><span data-dcnode-id="941" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="936" id="mntl-sc-block_1-0-21"><span data-dcnode-id="940" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="938"><span data-dcnode-id="939" instrument_node=""> Critiques and Limitations </span></span><span data-dcnode-id="937" instrument_node=""> </span></h2><span data-dcnode-id="935" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="918" id="mntl-sc-block_1-0-22"><span data-dcnode-id="934" instrument_node="">
Despite its ongoing popularity, positive psychology has been criticized for a number of different reasons. First, </span><a data-component="link" data-dcnode-id="932" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodtherapy.org/learn-about-therapy/types/positive-psychology" rel="noopener" target="_blank"><span data-dcnode-id="933" instrument_node="">humanistic psychologists</span></a><span data-dcnode-id="931" instrument_node=""> have argued that, with positive psychology, Seligman is claiming credit for work previously done in humanistic psychology. And indeed, humanistic psychologists like </span><a data-component="link" data-dcnode-id="929" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/carl-rogers-4588296"><span data-dcnode-id="930" instrument_node="">Carl Rogers</span></a><span data-dcnode-id="928" instrument_node=""> and </span><a data-component="link" data-dcnode-id="926" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/abraham-maslow-quotes-2795686"><span data-dcnode-id="927" instrument_node="">Abraham Maslow</span></a><span data-dcnode-id="925" instrument_node=""> focused their research on the positive side of the human experience years before Seligman turned his attention to positive psychology. </span><a data-component="link" data-dcnode-id="923" data-ordinal="4" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.com/books%3Fid%3D2ur8ci01fIkC%26newbks%3D0%26hl%3Den%26source%3Dnewbks_fb" rel="noopener" target="_blank"><span data-dcnode-id="924" instrument_node="">Maslow even coined the term</span></a><span data-dcnode-id="922" instrument_node=""> positive psychology, which he used in his book </span><em data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Motivation and Personality</span></em><span data-dcnode-id="919" instrument_node=""> in 1954. On the other hand, positive psychologists insist their research is based on empirical evidence while that of humanistic psychology is not.
</span></p><span data-dcnode-id="917" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="916" id="mntl-sc-block_1-0-23"></div><span data-dcnode-id="915" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="910" id="mntl-sc-block_1-0-24"><span data-dcnode-id="914" instrument_node="">
Despite positive psychologists' testaments to the scientific nature of their findings, some have said that the </span><a data-component="link" data-dcnode-id="912" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apa.org/monitor/2011/04/positive-psychology" rel="noopener" target="_blank"><span data-dcnode-id="913" instrument_node="">research produced by the subfield</span></a><span data-dcnode-id="911" instrument_node=""> is invalid or overstated. These critics believe the field has moved too quickly from research to practical interventions. They argue that positive psychology’s findings aren’t strong enough to support real-world applications, and as a result, it is getting subsumed by self-help movements and pop culture.
</span></p><span data-dcnode-id="909" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="898" id="mntl-sc-block_1-0-25"><div class="comp mntl-block" data-dcnode-id="899" id="mntl-block_11-0"><span data-dcnode-id="908" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard7-sticky-dynamic mntl-sc-sticky-billboard is-hidden" data-dcnode-id="901" data-height="600" id="ref-billboard7-sticky-dynamic_1-0" style="height: 600px;"><span data-dcnode-id="907" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic" data-dcnode-id="903" id="mntl-sc-sticky-billboard-ad_14-0"><span data-dcnode-id="906" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="daa077095a294d2ca303ee5b1463de4c" data-auction-floor-value="30" data-dcnode-id="905" data-pos="btf6" data-priority="9" data-rtb="true" data-sizes="[[300, 250],[300, 256],[250, 250],[200, 200],[180, 150],[8, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard7"></div><span data-dcnode-id="904" instrument_node="">
</span></div><span data-dcnode-id="902" instrument_node="">
</span></div><span data-dcnode-id="900" instrument_node="">
</span></div></div><span data-dcnode-id="897" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="895" id="mntl-sc-block_1-0-26"><span data-dcnode-id="896" instrument_node="">
Similarly, some claim that positive psychology fails to take individual differences into account, instead presenting findings as if they will work for everyone in the same way. For example, psychology professor Julie Norem has pointed out that positive psychology strategies like increasing optimism and cultivating positive emotions could backfire for individuals she dubs defensive pessimists. Defensive pessimists guard against anxiety by considering every negative outcome that could come out of a situation. This causes them to work harder to avoid those possibilities. In contrast, when these individuals are pushed to focus on optimism and positive emotions, their performance declines. In addition, when people with low self-esteem repeat a personally affirming statement (e.g., “I’m a lovable person”), it makes them feel worse than people with low self-esteem who didn’t repeat the statement.
</span></p><span data-dcnode-id="894" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="893" id="mntl-sc-block_1-0-27"></div><span data-dcnode-id="892" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="887" id="mntl-sc-block_1-0-28"><span data-dcnode-id="891" instrument_node="">
Another criticism of positive psychology is that it’s too </span><a data-component="link" data-dcnode-id="889" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/what-is-positive-psychology-definition/" rel="noopener" target="_blank"><span data-dcnode-id="890" instrument_node="">individualistic</span></a><span data-dcnode-id="888" instrument_node="">, which has led to victim blaming. These critics argue that the field's messages imply that if an individual can’t use positive psychology techniques to make themselves happy, it’s their own fault.
</span></p><span data-dcnode-id="886" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="885" id="mntl-sc-block_1-0-29"></div><span data-dcnode-id="884" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="882" id="mntl-sc-block_1-0-30"><span data-dcnode-id="883" instrument_node="">
Finally, some have suggested that positive psychology is limited by cultural bias. Not only has the majority of research in the field been conducted by Western scholars, positive psychology's findings has often come from a white, middle-class perspective that ignores issues such as systemic inequality and poverty. Recently, however, attempts have been made to expand the findings in positive psychology to incorporate perspectives from non-Western countries and a diversity of backgrounds.
</span></p><span data-dcnode-id="881" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="880" id="mntl-sc-block_1-0-31"></div><span data-dcnode-id="879" instrument_node="">
