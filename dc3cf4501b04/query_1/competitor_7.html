/static/optimized/rev-3ba518f/wp-content/uploads/2019/06/people-2567915_1280-1.jpg 1280w, https://cdn-emdkp.nitrocdn.com/mxClORazEIyIeaNYyyFPFNRtrTtCbgXL/assets/static/optimized/rev-3ba518f/wp-content/uploads/2019/06/people-2567915_1280-1-300x200.jpg 300w, https://cdn-emdkp.nitrocdn.com/mxClORazEIyIeaNYyyFPFNRtrTtCbgXL/assets/static/optimized/rev-3ba518f/wp-content/uploads/2019/06/people-2567915_1280-1-1024x682.jpg 1024w, https://cdn-emdkp.nitrocdn.com/mxClORazEIyIeaNYyyFPFNRtrTtCbgXL/assets/static/optimized/rev-3ba518f/wp-content/uploads/2019/06/people-2567915_1280-1-768x512.jpg 768w" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-emdkp.nitrocdn.com/mxClORazEIyIeaNYyyFPFNRtrTtCbgXL/assets/static/optimized/rev-3ba518f/wp-content/uploads/2019/06/people-2567915_1280-1.jpg&amp;raw" srcset="https://cdn-emdkp.nitrocdn.com/mxClORazEIyIeaNYyyFPFNRtrTtCbgXL/assets/static/optimized/rev-3ba518f/wp-content/uploads/2019/06/people-2567915_1280-1.jpg 1280w, https://cdn-emdkp.nitrocdn.com/mxClORazEIyIeaNYyyFPFNRtrTtCbgXL/assets/static/optimized/rev-3ba518f/wp-content/uploads/2019/06/people-2567915_1280-1-300x200.jpg 300w, https://cdn-emdkp.nitrocdn.com/mxClORazEIyIeaNYyyFPFNRtrTtCbgXL/assets/static/optimized/rev-3ba518f/wp-content/uploads/2019/06/people-2567915_1280-1-1024x682.jpg 1024w, https://cdn-emdkp.nitrocdn.com/mxClORazEIyIeaNYyyFPFNRtrTtCbgXL/assets/static/optimized/rev-3ba518f/wp-content/uploads/2019/06/people-2567915_1280-1-768x512.jpg 768w" width="1280"><span data-dcnode-id="730" instrument_node=""> </span></div><span data-dcnode-id="728" instrument_node=""> </span><header aria-label="Content" class="entry-header" data-dcnode-id="702"><span data-dcnode-id="727" instrument_node=""> </span><div class="gb-button-wrapper gb-button-wrapper-15dd6f2e" data-dcnode-id="722"><span data-dcnode-id="726" instrument_node=""> </span><span class="gb-button gb-button-29fdb34c gb-button-text popmake-1570" data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">✓ Evidence-Based Research</span></span><span data-dcnode-id="723" instrument_node=""> </span></div><span data-dcnode-id="721" instrument_node=""> </span><p data-dcnode-id="720"></p><span data-dcnode-id="719" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="704"><span data-dcnode-id="718" instrument_node=""> </span><span class="posted-on" data-dcnode-id="713"><time class="updated" data-dcnode-id="716" datetime="2022-02-19T00:54:40+01:00" itemprop="dateModified"><span data-dcnode-id="717" instrument_node="">February 19, 2022</span></time><time class="entry-date published" data-dcnode-id="714" datetime="2019-06-25T00:37:48+01:00" itemprop="datePublished"><span data-dcnode-id="715" instrument_node="">June 25, 2019</span></time></span><span data-dcnode-id="712" instrument_node=""> </span><span class="byline" data-dcnode-id="706"><span data-dcnode-id="711" instrument_node="">by </span><span class="author vcard" data-dcnode-id="707" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="url fn n" data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//colossalthoughts.com/author/admin/" itemprop="url" rel="author" title="View all posts by Zac Hyde M.D."><span class="author-name" data-dcnode-id="709" itemprop="name"><span data-dcnode-id="710" instrument_node="">Zac Hyde M.D.</span></span></a></span></span><span data-dcnode-id="705" instrument_node=""> </span></div><span data-dcnode-id="703" instrument_node=""> </span></header><span data-dcnode-id="701" instrument_node=""> </span><div class="entry-content" data-dcnode-id="386" itemprop="text"><span data-dcnode-id="700" instrument_node=""> </span><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">You just got out of the theaters after watching “The Avengers” and you’re thrilled from being one of the firsts to see it. You just listened to your favorite song, and you’re happy, giddy even. But how long does that happines last for? </span></p><span data-dcnode-id="697" instrument_node=""> </span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Say you watch the avengers over and over again, or say you hear your favorite song each day for a week. Will you still feel the same happiness you felt the first time, will you get the same rush and thrill?</span></p><span data-dcnode-id="694" instrument_node=""> </span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">The answer is No, we have this tendency of going back to a certain level of happiness, and this concept goes by the name “Hedonic Adaptation”.</span></p><span data-dcnode-id="691" instrument_node=""> </span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">But hedonic adaptation isn’t just that, it’s every dream job we ever fantasized about, every luxurious apartment we ever hoped to rent, every car we saved up for, and every time we uttered the words, “Imagine how happy I’d be if I got this or that”. </span></p><span data-dcnode-id="688" instrument_node=""> </span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Sadly, and to your your complete shock you’re not as happy as you thought you’d be when u got what you wanted. This wasn’t the amount of pleasure you were expecting, and even if it is. Surprise, surprise! It doesn’t last for long.</span></p><span data-dcnode-id="685" instrument_node=""> </span><h2 data-dcnode-id="683" id="how-the-hedonic-adaptation-came-to-be"><span data-dcnode-id="684" instrument_node="">How the hedonic adaptation came to be</span></h2><span data-dcnode-id="682" instrument_node=""> </span><p data-dcnode-id="674"><span data-dcnode-id="681" instrument_node="">Psychologists </span><em data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Brickman </span></em><span data-dcnode-id="678" instrument_node="">and </span><em data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Campbell </span></em><span data-dcnode-id="675" instrument_node="">first noted this concept in an essay in 1971 (“Hedonic Relativism and Planning the Good Society”). Back then, it was referred to as the hedonic adaptation. </span></p><span data-dcnode-id="673" instrument_node=""> </span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Later on in the 1990s, Michael Eysenck used the metaphor of a treadmill to describe how people are continually seeking to raise their level of happiness but never quite achieving what they expect when a life event occurs. This is how the hedonic treadmill term came to existence. </span></p><span data-dcnode-id="670" instrument_node=""> </span><p data-dcnode-id="665"><span data-dcnode-id="669" instrument_node="">Why did </span><em data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Michael </span></em><span data-dcnode-id="666" instrument_node="">use the treadmill metaphor, you ask?</span></p><span data-dcnode-id="664" instrument_node=""> </span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Well, he simply compared the pursuit of happiness to a person on a treadmill, who has to keep working just to stay in the same place. It fits the description, doesn’t it?</span></p><span data-dcnode-id="661" instrument_node=""> </span><h2 data-dcnode-id="659" id="the-hedonic-adaptation-studies"><span data-dcnode-id="660" instrument_node="">The hedonic adaptation studies</span></h2><span data-dcnode-id="658" instrument_node=""> </span><p data-dcnode-id="651"><span data-dcnode-id="657" instrument_node="">1.</span><em data-dcnode-id="653"><span data-dcnode-id="656" instrument_node=""> </span><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//spp.sagepub.com/content/early/2013/01/30/1948550612473489.full.pdf%3Fpatientinform-links%3Dyes%26legid%3Dspspp%3B1948550612473489v1" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="655" instrument_node="">A Harvard study</span></a></em><span data-dcnode-id="652" instrument_node=""> about chocolate consumption was carried out with two group participants for a two week period. Group A was allowed to binge on unlimited chocolate, whereas group B had none. </span></p><span data-dcnode-id="650" instrument_node=""> </span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">After the two-week period, both groups were then given chocolate. It was found that group B reported higher treat savoring, higher happiness levels, and was in a better mood after eating the treat.</span></p><span data-dcnode-id="647" instrument_node=""> </span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">2. Another study was conducted around two groups of people: the first group had individuals who won large lottery prizes, and the other was a group of accident victims who got paralyzed after their injuries.</span></p><span data-dcnode-id="644" instrument_node=""> </span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">It was revealed that, in the long term, neither group appeared to be happier or more miserable than the other. People who won the lottery tended to return to their roughly original levels of happiness after the novelty of the win has worn off.</span></p><span data-dcnode-id="641" instrument_node=""> </span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">The same was true for those who were in accidents. The change in ability was devastating at first, but bit by bit they went back to their pre-accident levels of happiness after the habituation period.</span></p><span data-dcnode-id="638" instrument_node=""> </span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">3. Furthermore, in a number of studies, researchers have traced the reactions to the death of a spouse, and these studies proved that emotional reactions eventually go back to baseline.</span></p><span data-dcnode-id="635" instrument_node=""> </span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">All these studies captured the attention of psychologists, and the idea of the hedonic adaptation, itself, was appealing because it offered an observation that people with substantial resources are sometimes not that much happier than those with few resources and that people with severe problems are sometimes quite happy.</span></p><span data-dcnode-id="632" instrument_node=""> </span><p data-dcnode-id="624"><span data-dcnode-id="631" instrument_node="">In the original theory of the hedonic adaptation, </span><em data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Brickman </span></em><span data-dcnode-id="628" instrument_node="">and </span><em data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Campbell </span></em><span data-dcnode-id="625" instrument_node="">proposed that people immediately react to good and bad events but in a short time return to neutrality.</span></p><span data-dcnode-id="623" instrument_node=""> </span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">However, if this is correct then any effort we put into increasing our happiness is pointless; meaning that if our happiness set point is on the low end of the spectrum, we’re doomed to unhappiness. </span></p><span data-dcnode-id="620" instrument_node=""> </span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">If that isn’t terrifying, I don’t know what is. I’m hoping you got what I mean but if not, then let’s start with the basics.</span></p><span data-dcnode-id="617" instrument_node=""> </span><h2 data-dcnode-id="615" id="the-hedonic-adaptation-curve"><span data-dcnode-id="616" instrument_node="">The hedonic adaptation curve</span></h2><span data-dcnode-id="614" instrument_node=""> </span><figure class="wp-block-image" data-dcnode-id="610"><img alt="hedonic treadmill curve" class="wp-image-1068 lazyloaded" data-dcnode-id="613" id="Mzc0OjM5Mw==-1" nitro-lazy-empty="" nitro-lazy-src="https://colossalthoughts.com/wp-content/uploads/2019/06/hedonic-treadmill1.gif" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//colossalthoughts.com/wp-content/uploads/2019/06/hedonic-treadmill1.gif&amp;raw"><noscript data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">&lt;img src="https://colossalthoughts.com/wp-content/uploads/2019/06/hedonic-treadmill1.gif" alt="hedonic treadmill curve" class="wp-image-1068"/&gt;</span></noscript></figure><span data-dcnode-id="609" instrument_node=""> </span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">As you can see, with time we stumble around extremely joyful or painful events that leave us with a temporary euphoria or misery where our happiness level oscillates significantly. But as soon as that passes we quickly return to a relatively stable level of happiness. </span></p><span data-dcnode-id="606" instrument_node=""> </span><h2 data-dcnode-id="604" id="what-is-our-happiness-set-point"><span data-dcnode-id="605" instrument_node="">What is our happiness set point?</span></h2><span data-dcnode-id="603" instrument_node=""> </span><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Researchers have found that a full 50% of our happiness set-point is due to genetics. While 10% is affected primarily by external factors like where we were born. </span></p><span data-dcnode-id="600" instrument_node=""> </span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">This leaves 40% that is subject to our influence and control (it accounts for our thoughts, actions, and attitudes).</span></p><span data-dcnode-id="597" instrument_node=""> </span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Other researchers have come up with slightly different numbers, but overall it’s all roughly the same.</span></p><span data-dcnode-id="594" instrument_node=""> </span><h2 data-dcnode-id="592" id="the-theory-of-adaptation"><span data-dcnode-id="593" instrument_node="">The theory of adaptation</span></h2><span data-dcnode-id="591" instrument_node=""> </span><figure class="wp-block-image" data-dcnode-id="587"><img alt="adaptation theory" class="wp-image-1090 lazyloaded" data-dcnode-id="590" id="NDAzOjM5OQ==-1" nitro-lazy-empty="" nitro-lazy-src="https://colossalthoughts.com/wp-content/uploads/2019/06/happiness-e1561330798438.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//colossalthoughts.com/wp-content/uploads/2019/06/happiness-e1561330798438.jpg&amp;raw"><noscript data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">&lt;img src="https://colossalthoughts.com/wp-content/uploads/2019/06/happiness-e1561330798438.jpg" alt="adaptation theory" class="wp-image-1090"/&gt;</span></noscript></figure><span data-dcnode-id="586" instrument_node=""> </span><p data-dcnode-id="578"><span data-dcnode-id="585" instrument_node="">&nbsp;</span><em data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Frederick </span></em><span data-dcnode-id="582" instrument_node="">and </span><em data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Lowenstein </span></em><span data-dcnode-id="579" instrument_node="">identified three types of processes in the hedonic adaptation:</span></p><span data-dcnode-id="577" instrument_node=""> </span><h3 data-dcnode-id="575" id="1-shifting-adaptation-levels"><span data-dcnode-id="576" instrument_node="">1. Shifting adaptation levels:</span></h3><span data-dcnode-id="574" instrument_node=""> </span><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">In this process, a hedonistic person may experience a change in what is seen as a neutral stimulus, but is still sensitive to differences in stimuli. </span></p><span data-dcnode-id="571" instrument_node=""> </span><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">For example; imagine a freelance writer who pours her heart and soul into her career and is always working to get new clients. When a new client hires the writer, she experiences a surge of joy and pleasure. This is an excellent step forward in her career, and her income will increase as a result.</span></p><span data-dcnode-id="568" instrument_node=""> </span><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Even though securing the new client brought her joy, over time, the high level of excitement wears off, and she reverts to her “baseline of happiness” as she completes the work assigned. </span></p><span data-dcnode-id="565" instrument_node=""> </span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">However, when she secures yet another new client, the freelance writer experiences the same joyful sensation as before. </span></p><span data-dcnode-id="562" instrument_node=""> </span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">This is the epitome of how shifting adaptation-levels operates within hedonic adaptation.</span></p><span data-dcnode-id="559" instrument_node=""> </span><h3 data-dcnode-id="555" id="2-desentization"><span data-dcnode-id="558" instrument_node="">2. </span><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Desentization:</span></strong></h3><span data-dcnode-id="554" instrument_node=""> </span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">This process reduces our overall sensitivity which decreases sensitivity to change. People who have been trapped in war zones become de-sensitized to the horrors of war and become less sensitive to serious injuries and violent deaths.</span></p><span data-dcnode-id="551" instrument_node=""> </span><h3 data-dcnode-id="547" id="3-sensitization"><span data-dcnode-id="550" instrument_node="">3. </span><strong data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Sensitization:</span></strong></h3><span data-dcnode-id="546" instrument_node=""> </span><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Sensitization occurs due to frequent exposure to the stimulus, meaning that the person can quickly recognize and enjoy the experience. </span></p><span data-dcnode-id="543" instrument_node=""> </span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">For example: try to think of someone who is used to earning $10,000 on an annual basis. Now imagine that their income increases by ten times that amount and the same individual now earns $100,000 per year. </span></p><span data-dcnode-id="540" instrument_node=""> </span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Naturally, he or she will have to become used to (or sensitized to ) such a considerable income upgrade. This person who is ten times richer may now begin to look at investing, depositing more money into savings, and perhaps changing his/her lifestyle.</span></p><span data-dcnode-id="537" instrument_node=""> </span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Regardless of the decisions he/she makes as a result of being ten times wealthier, sensitization to such a considerable income-increase is inevitable.</span></p><span data-dcnode-id="534" instrument_node=""> </span><h2 data-dcnode-id="531" id="the-problem-with-adaptation"><strong data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">The problem with adaptation</span></strong></h2><span data-dcnode-id="530" instrument_node=""> </span><figure class="wp-block-image" data-dcnode-id="526"><img alt="problem with adaptation" class="wp-image-1091 lazyloaded" data-dcnode-id="529" id="NDcxOjM5Nw==-1" nitro-lazy-empty="" nitro-lazy-src="https://colossalthoughts.com/wp-content/uploads/2019/06/happy-e1561331852851.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//colossalthoughts.com/wp-content/uploads/2019/06/happy-e1561331852851.jpg&amp;raw"><noscript data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">&lt;img src="https://colossalthoughts.com/wp-content/uploads/2019/06/happy-e1561331852851.jpg" alt="problem with adaptation" class="wp-image-1091"/&gt;</span></noscript></figure><span data-dcnode-id="525" instrument_node=""> </span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">As we get more famous, more powerful, prettier, and wealthier we get happier, but it’s always much less than what we had hoped for, what we dreamed about for so long. It pales in comparison to our expectations.</span></p><span data-dcnode-id="522" instrument_node=""> </span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">So, over the last decade Ed Diener and others have looked more into the adaptation theory, and they suggested that it needed some modifications to make sure no one is bound to live in unhappiness.</span></p><span data-dcnode-id="519" instrument_node=""> </span><h3 data-dcnode-id="517" id="they-came-up-with-these-implications"><span data-dcnode-id="518" instrument_node="">&nbsp;They came up with these implications:</span></h3><span data-dcnode-id="516" instrument_node=""> </span><h4 data-dcnode-id="514" id="1-the-set-point-is-not-neutral"><span data-dcnode-id="515" instrument_node="">1. The set Point is not neutral:</span></h4><span data-dcnode-id="513" instrument_node=""> </span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">The original treadmill theory suggested that people return to a neutral set point after an emotionally significant event. However, decades of research show that this part of the hedonic adaptation theory is wrong. Instead, most people are happy most of the time.</span></p><span data-dcnode-id="510" instrument_node=""> </span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">In the most recent world values survey, 80% of respondents said that they were very or quite happy. Thus, if people adapt and return to a baseline, the set point is positive rather than neutral.</span></p><span data-dcnode-id="507" instrument_node=""> </span><h4 data-dcnode-id="505" id="2-the-set-point-is-individualized"><span data-dcnode-id="506" instrument_node="">2) The set point is individualized:</span></h4><span data-dcnode-id="504" instrument_node=""> </span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Studies have shown that happiness set points vary considerably across individuals due to different personality traits. This may explain why optimistic people have a tendency to live longer as this helps make them happier.</span></p><span data-dcnode-id="501" instrument_node=""> </span><h4 class="nitro-offscreen" data-dcnode-id="499" id="3-people-have-multiple-set-points"><span data-dcnode-id="500" instrument_node="">3) People have multiple set points:</span></h4><span data-dcnode-id="498" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">At first, it was pointed out that to each individual a single set point, a single baseline of happiness. Lucas, Diener, and Suh (1996), however, found out that the overall category of happiness is composed of different, separate, well-being factors.</span></p><span data-dcnode-id="495" instrument_node=""> </span><h4 class="nitro-offscreen" data-dcnode-id="493" id="4-happiness-can-change"><span data-dcnode-id="494" instrument_node="">4) Happiness can change:</span></h4><span data-dcnode-id="492" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">As you might have observed the first hedonic adaptation theory suggested that there is little to none that can be done to change our happiness and life satisfaction. And if this is true then adaptation is really inevitable.</span></p><span data-dcnode-id="489" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">But recent evidence has shown that the contrary stands to be true. Life circumstances matter and make a difference. </span></p><span data-dcnode-id="486" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">For instance, Fujita and Diener (2005) ran some data to determine whether long-term average levels of happiness ever change. </span></p><span data-dcnode-id="483" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">They examined changes in baseline levels of well-being over a17-year period in a large and representative sample of people from Germany. </span></p><span data-dcnode-id="480" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">What they found was interesting. Although there was a considerable stability in happiness reports, 24% of respondents changed significantly from their early baseline, comprising the first five years of the study, to the last five years. 9% changed by approximately two standard deviations or more.</span></p><span data-dcnode-id="477" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Thus, long-term levels of happiness do change for some individuals.</span></p><span data-dcnode-id="474" instrument_node=""> </span><h4 class="nitro-offscreen" data-dcnode-id="470" id="5-individual-differences-in-adaptation"><span data-dcnode-id="473" instrument_node="">5) </span><strong data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Individual differences in adaptation:</span></strong></h4><span data-dcnode-id="469" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Another assumption stemming from the original hedonic treadmill theory is that adaptation happens the same way for everyone.</span></p><span data-dcnode-id="466" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">But recent evidence has shown that people adapt at different rates; furthermore, it proved that they don’t react the same way even to identical events.</span></p><span data-dcnode-id="463" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">One study showed that the least happy people reacted most strongly to marriage and the effect lasted longer compared to happier people. &nbsp;</span></p><span data-dcnode-id="460" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">This is probably because rare events or somehow big shifts in life may produce the greatest change in happiness.</span></p><span data-dcnode-id="457" instrument_node=""> </span><h2 class="nitro-offscreen" data-dcnode-id="455" id="how-to-escape-the-hedonic-treadmill"><span data-dcnode-id="456" instrument_node="">How to escape the hedonic treadmill</span></h2><span data-dcnode-id="454" instrument_node=""> </span><figure class="wp-block-image nitro-offscreen" data-dcnode-id="450"><img alt="How to escape the hedonic treadmill" class="wp-image-1083 nitro-lazy" data-dcnode-id="453" id="NTgxOjQwMw==-1" nitro-lazy-empty="" nitro-lazy-src="https://colossalthoughts.com/wp-content/uploads/2019/06/hedonic-treadmill.jpg" src="data:image/gif;nitro-empty-id=NTgxOjQwMw==-1;base64,R0lGODlhAQABAIABAAAAAP///yH5BAEAAAEALAAAAAABAAEAAAICTAEAOw=="><noscript data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">&lt;img src="https://colossalthoughts.com/wp-content/uploads/2019/06/hedonic-treadmill.jpg" alt="How to escape the hedonic treadmill" class="wp-image-1083"/&gt;</span></noscript></figure><span data-dcnode-id="449" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">As human beings we have the tendency to take things for granted. We’re never quite satisfied. I don’t think we will ever be. But we can work towards changing that.</span></p><span data-dcnode-id="446" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">&nbsp;We can try to escape the hedonic treadmill by trying out these strategies:</span></p><span data-dcnode-id="443" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="436"><strong data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">1.New challenges:</span></strong><span data-dcnode-id="440" instrument_node=""> Try to think of some activities that require </span><a aria-label="more effort and thought (opens in a new tab)" data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//colossalthoughts.com/how-to-not-procrastinate/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="439" instrument_node="">more effort and thought</span></a><span data-dcnode-id="437" instrument_node="">. You’ll not only be entertained but you’ll also not notice how time flies by.</span></p><span data-dcnode-id="435" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="431"><strong data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">2.Good deeds</span></strong><span data-dcnode-id="432" instrument_node="">: volunteering for a good cause or helping a friend out can bring you joy as well. Researchers have found that these activities may take a significant amount of energy and may not always be enjoyable while a person is engaged in them but they can, consequently, bring lasting results in terms of overall happiness and inner peace.</span></p><span data-dcnode-id="430" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="426"><strong data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">3.Meaningful experiences</span></strong><span data-dcnode-id="427" instrument_node="">: instead of spending your money on an expensive new pair of shoes, book that cruise trip you’ve been looking up online for weeks. Savor your memories and cherish them. Trust me you’ll look back to them and always feel joy. </span></p><span data-dcnode-id="425" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="421"><strong data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">4.Switching things up:</span></strong><span data-dcnode-id="422" instrument_node=""> dull, uneventful everyday routines are the buzz killers that the hedonic treadmill constantly feeds off. Switching things up, by going to a new restaurant or traveling to a new city, can help individuals boost their levels of happiness as opposed to returning to their original “baseline” emotional state.</span></p><span data-dcnode-id="420" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="416"><strong data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">5.Loving-kindness meditation: </span></strong><span data-dcnode-id="417" instrument_node="">this is a form of meditation that evokes feelings of warmth and care for oneself and others. Moreover, this just might be your way out of the hedonic adaptation by focusing on empathy and compassion.</span></p><span data-dcnode-id="415" instrument_node=""> </span><h2 class="nitro-offscreen" data-dcnode-id="413" id="conclusion"><span data-dcnode-id="414" instrument_node="">Conclusion</span></h2><span data-dcnode-id="412" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">The hedonic adaptation proved itself to be beneficial for people going through a negative experience. It gave them a way out of depression; the ability to go back to a default emotional state.</span></p><span data-dcnode-id="409" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">But, it was also an emotional letdown, a terrible roller-costar experience for people coming back from the high of a positive event.</span></p><span data-dcnode-id="406" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">And for that, further research on coping, personality traits, and the effectiveness of interventions was conducted. Strategies were put to maintain and increase our level of happiness.</span></p><span data-dcnode-id="403" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Moreover, there are of course some people who, despite the hedonic adaptation, have an inherently optimistic nature. They seem much happier than others, no matter what is happening&nbsp;in their lives.</span></p><span data-dcnode-id="400" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="396"><em data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Now,</span></em><span data-dcnode-id="397" instrument_node=""> I’m curious to know about your experience with the hedonic adaptation. How much control over your happiness do you think you really have? Make sure to comment away your thoughts. </span></p><span data-dcnode-id="395" instrument_node=""> </span><template data-dcnode-id="394" data-nitro-marker-id="d6422d9a8276af40f13bfe6992419f0a-1"></template><span data-dcnode-id="392" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-8359271939191105" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="6676900512" data-dcnode-id="391" style="display:block;text-align:center;"></ins><span data-dcnode-id="390" instrument_node=""> </span><template data-dcnode-id="389" data-nitro-marker-id="f782adfd52086f6026aca50c306b940a-1"></template><span data-dcnode-id="387" instrument_node=""> </span></div><span data-dcnode-id="385" inst
