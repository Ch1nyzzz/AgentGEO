ttps%3A//app.mywellbeing.com/therapists-and-coaches/florida" tabindex="0"><span data-dcnode-id="326" instrument_node="">Florida</span></a><a class="nav-link dropdown w-dropdown-link" data-dcnode-id="323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//app.mywellbeing.com/therapists-and-coaches/new-jersey" tabindex="0"><span data-dcnode-id="324" instrument_node="">New Jersey</span></a><a class="nav-link dropdown w-dropdown-link" data-dcnode-id="321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//app.mywellbeing.com/therapists-and-coaches/new-york" tabindex="0"><span data-dcnode-id="322" instrument_node="">New York</span></a><a class="nav-link dropdown w-dropdown-link" data-dcnode-id="319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//app.mywellbeing.com/therapists-and-coaches/pennsylvania" tabindex="0"><span data-dcnode-id="320" instrument_node="">Pennsylvania</span></a><a class="nav-link dropdown w-dropdown-link" data-dcnode-id="317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//app.mywellbeing.com/therapists-and-coaches/texas" tabindex="0"><span data-dcnode-id="318" instrument_node="">Texas</span></a></nav></div><a class="nav-link w-nav-link" data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mywellbeing.com/content-corner"><span data-dcnode-id="314" instrument_node="">Content Corner</span></a><a class="nav-link w-nav-link" data-dcnode-id="311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//join.mywellbeing.com/therapists"><span data-dcnode-id="312" instrument_node="">For Practitioners</span></a><a class="nav-link w-nav-link" data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//join.mywellbeing.com/enterprise/"><span data-dcnode-id="310" instrument_node="">For Enterprise</span></a></div><div class="_2-button-wrap slim margin-left" data-dcnode-id="305"><a class="nav-button-primary w-button" data-dcnode-id="306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//app.mywellbeing.com/get-started"><span data-dcnode-id="307" instrument_node="">Get matched</span></a></div></nav><div aria-controls="w-nav-overlay-0" aria-expanded="false" aria-haspopup="menu" aria-label="menu" class="menu-button w-nav-button" data-dcnode-id="302" role="button" style="-webkit-user-select: text;" tabindex="0"><div class="w-icon-nav-menu" data-dcnode-id="303"></div></div></div></div><div class="w-nav-overlay" data-dcnode-id="299" data-wf-ignore="" id="w-nav-overlay-0"></div></div><div class="section---padding wf-section" data-dcnode-id="171"><div class="rc centered" data-dcnode-id="172"><div class="centered" data-dcnode-id="286"><div class="inline-wrap" data-dcnode-id="291"><h4 class="light-text" data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">January 11, 2021</span></h4><h4 class="light-text sep" data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">·</span></h4><h4 class="light-text" data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Caitlin Harper</span></h4></div><h1 class="h1-sm" data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Toxic Positivity And Its Impact On Our Mental Health</span></h1><div class="subhead limited-888 top-margin-30" data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">As wonderful as looking on the bright side twenty-four hours a day might sound, toxic positivity is actually detrimental to our mental health. While hope and positivity are important, like everything else, there must be a balance. Here is some insight from our community of practitioners about toxic positivity, its impact on our mental health, and what we can do instead.</span></div></div><div class="blog-featured-image" data-dcnode-id="285" style="background-image:url(&quot;https://assets-global.website-files.com/61cb94e5fee3d491ca9aa59c/61cb94e5fee3d431a19aa8d0_toxic-positivity.jpg&quot;)"></div><div class="blog-body-wrap" data-dcnode-id="173"><div class="blog-body w-richtext" data-dcnode-id="183"><p data-dcnode-id="280"><span data-dcnode-id="284" instrument_node="">I still remember when, sharing a bad experience with a friend, she cut me off and said, “Just be grateful for everything you have. It’ll get better!” I replied that </span><em data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">of course</span></em><span data-dcnode-id="281" instrument_node=""> I was grateful for what I have, but I was mourning the loss of something important in that moment. And yes, “it”—as in my life or situation—would get better, but no, what had happened to me was not good, it itself would not get better, and it was over. Couldn’t she see that?</span></p><p data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">She could not, and continued to bombard me with bright and happy, meme-worthy sayings, like, “look on the bright side!” and “it could be worse,” until I got frustrated enough that I ended the conversation. In that moment, I had wanted to be with my negative emotions, not be told to get over them, ignore them, or bottle them up. </span></p><p data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">But my friend had another tactic in mind: toxic positivity.</span></p><p data-dcnode-id="271"><span data-dcnode-id="275" instrument_node="">“Toxic positivity contributes to ‘all or nothing’ thinking, which is a type of distorted assumption that things have to be either all good or all bad,” said </span><a data-dcnode-id="273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mywellbeing.com/practitioners/693-alice-rizzi" target="_blank"><span data-dcnode-id="274" instrument_node="">Alice Rizzi</span></a><span data-dcnode-id="272" instrument_node="">, a NYC therapist and MyWellbeing community member. “No one is happy 100% of the time, nor should they be. Humans are multi-faceted and experience complex emotional states.”</span></p><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">As wonderful as looking on the bright side twenty-four hours a day might sound at first, it’s actually detrimental to our mental health. While hope and positivity are important, like everything else, there must be a balance. Here is some insight from our community of practitioners about toxic positivity, its impact on our mental health, and what we can do instead.</span></p><h2 data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">What is toxic positivity?</span></h2><p data-dcnode-id="262"><span data-dcnode-id="266" instrument_node="">“Toxic positivity is the mistaken belief that only ‘good’ or ‘happy’ emotions are acceptable to experience, and that keeping a positive attitude will solve all or most problems, including mental or physical health issues,” said </span><a data-dcnode-id="264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mywellbeing.com/practitioners/607-shannon-gunnip" target="_blank"><span data-dcnode-id="265" instrument_node="">Shannon Gunnip</span></a><span data-dcnode-id="263" instrument_node="">, a New York City therapist and MyWellbeing community member. </span></p><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">“While it's true that positive self-talk can improve mental health and self esteem, it is not healthy or possible to deny all uncomfortable emotions,” she said. “Not unlike toxic masculinity, toxic positivity deems certain qualities or feelings as ‘good’ or ‘bad,’ ‘acceptable’ or ‘unacceptable,’ and denies a person the experience of a full range of human emotions by discouraging the expression of the ‘bad’ or ‘unacceptable.’”</span></p><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">But the person is just trying to be positive! Maybe you’re sad or mad and they’re just trying to get you to look on the bright side or give you a pep talk. How bad can that possibly be? </span></p><p data-dcnode-id="253"><span data-dcnode-id="257" instrument_node="">“Toxic positivity when you're trying to honor your true feelings is like telling someone you have a nut allergy and them eating a Reese's Cup in front of you while they tell you how to live fearlessly,” said </span><a data-dcnode-id="255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mywellbeing.com/practitioners/257-joanne-davies" target="_blank"><span data-dcnode-id="256" instrument_node="">Joanne Davies</span></a><span data-dcnode-id="254" instrument_node="">, a MyWellbeing community member who offers coaching and hypnosis. “Toxic positivity when you're seeking help is like showing a doctor your open wound and having them sprinkle it with glitter.”</span></p><p data-dcnode-id="248"><span data-dcnode-id="252" instrument_node="">That’s right: it’s painful to have your feelings invalidated and your pain and experience diminished. And not only does toxic positivity invalidate your emotional state, it </span><a data-dcnode-id="250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2020/11/its-okay-to-not-be-okay" target="_blank"><span data-dcnode-id="251" instrument_node="">also increases secondary emotions: you might end up feeling ashamed of being sad or embarrassed about being afraid or angry</span></a><span data-dcnode-id="249" instrument_node="">.</span></p><p data-dcnode-id="243"><span data-dcnode-id="247" instrument_node="">“Toxic positivity is toxic!” said </span><a data-dcnode-id="245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mywellbeing.com/practitioners/599-beatty-cohan" target="_blank"><span data-dcnode-id="246" instrument_node="">Beatty Cohan</span></a><span data-dcnode-id="244" instrument_node="">, a NYC therapist and MyWellbeing community member. “To deny and avoid acknowledging and expressing our authentic negative emotions, including fear, disappointment, anger, betrayal, etc. keeps us in a world of illusion and fantasy and inevitably harms our physical, emotional, and mental wellbeing.”</span></p><h2 data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">How does toxic positivity impact our mental health?</span></h2><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">“Because toxic positivity discourages and denies a full expression of human emotion by labeling certain feelings as ‘bad’ or ‘unacceptable,’ people subscribing to this belief may suppress their negative or uncomfortable emotions,” said Shannon. </span></p><p data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">“When unpleasant feelings arise, like grief, sadness, or even anger, rather than non-judgmentally sitting with these emotions and allowing them to run their course, folks buying into the notion of toxic positivity may end up feeling even more unpleasant feelings,” she said. “We may judge ourselves for experiencing the ‘bad’ feeling in the first place, or believe that something is wrong with us that keeping a positive attitude is so difficult.”</span></p><p data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">This can have a huge impact, compounding our existing negative emotions, causing us to ignore what is real for us and training ourselves to not speak truthfully when we are hurt, angry, or scared.</span></p><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">“Toxic positivity cheapens the human experience and makes us feel invalid for falling into ‘the wrong’ binary state,” said Alice. “It can bring on shame that you are ‘flawed’ or ‘broken’ if you don't happen to think positive thoughts all the time (which is impossible, by the way—we're just not hard wired that way).”</span></p><h2 data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">What's an alternative to toxic positivity?</span></h2><p data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Just because we want to feel our negative emotions doesn’t mean we have to dwell on them forever. But there are healthy ways to cope and start to move forward without turning to toxic positivity.</span></p><p data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">“Practicing mindfulness can help you identify and respond to how you're feeling in a healthy, compassionate way,” said Alice. “Acknowledging that something is there and naming what it is validates your experience. If you can admit that you are feeling an emotion, whether it's pleasant or uncomfortable, you can decide how to respond to it (e.g., taking a tap when tired or journaling when frustrated).”</span></p><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">“Alternatively, toxic positivity will have you believe that you ‘shouldn't’ feel uncomfortable and that something is wrong with you if you do,” she said. “This experience dismisses your very real feelings that may be trying to tell you something important. Also, being human is uncomfortable. It is much more the ‘default state’ than happiness ever was.”</span></p><p data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">If someone is trying to “help” you with toxic positivity, try to explain your needs to them if you have the capacity to do so. Try saying something like:</span></p><ul data-dcnode-id="216" role="list"><li data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">Right now, I just need to talk about what happened to me. Can I count on you to listen?</span></li><li data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">Thank you for caring. It would be best for me to sit with my negative emotions first before I try looking on the bright side.</span></li><li data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">What happened to me really hurt. I’d like to acknowledge the sadness before I try to move on.</span></li></ul><p data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">It can be really hard to speak your truth to someone when you are already in pain. Hopefully, the other person realizes what they’re doing, listens to you, and honors your feelings. If not, it’s completely fine to take a break from that person until you’re ready.</span></p><h2 data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">And if you find yourself practicing toxic positivity, there are other ways to better address the emotions of friends and family who might come to you for support</span></h2><p data-dcnode-id="207"><span data-dcnode-id="211" instrument_node="">When people tell you how they feel, </span><a data-dcnode-id="209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.refinery29.com/en-gb/what-is-toxic-positivity" target="_blank"><span data-dcnode-id="210" instrument_node="">more often than not they want to have their feelings validated, their problems normalized, and to feel listened to</span></a><span data-dcnode-id="208" instrument_node="">.</span></p><p data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">“Many of us hesitate to acknowledge when a loved one's situation is painful or difficult out of fear that doing so could somehow make things worse for them,” said Shannon. </span></p><p data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">Try saying things like:</span></p><ul data-dcnode-id="196" role="list"><li data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">That really sucks that that happened to you. Do you want to talk about it?</span></li><li data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">That sounds awful. I can see why you’re upset. I’m here if you need to vent.</span></li><li data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">It makes sense that you’re sad. That was a really tough situation.</span></li></ul><p data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">“Chances are, your loved one already feels that pain and is aware that their circumstances are challenging,” Shannon said. “Refusal to acknowledge their pain by suggesting they ‘just be grateful things aren't worse’ or to ‘look on the bright side’ can be more harmful than helpful. Humans are born with the capacity for a full range of emotions and it is possible to hold space for the ‘good’ and the ‘bad’ at the same time.”</span></p><h2 data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">Remember that it is normal and healthy to feel all of your emotions—the good and the bad</span></h2><p data-dcnode-id="188"><span data-dcnode-id="191" instrument_node="">Toxic positivity is an attempt to quell our negative emotions and feelings and that can have a detrimental impact on our mental health. But once we feel our emotions, it’s important to figure out what we can to move forward—</span><a data-dcnode-id="189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mywellbeing.com/get-matched" target="_blank"><span data-dcnode-id="190" instrument_node="">something that a therapist can help with.</span></a></p><p data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">“My mantra is to acknowledge, address, and take steps to RESOLVE feelings that get in the way of our life and relationships,” said Beatty.</span></p><p data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Acknowledging your negative emotions is the first step toward healing from trauma and hurt. So the next time someone tells you to look on the bright side, you can remind them that acknowledging the dark side is the first step forward.</span></p></div><div class="blog-social-wrap" data-dcnode-id="174"><a class="social-share-button w-inline-block" data-dcnode-id="181" href="#"><img alt="" class="social-share-icon" data-dcnode-id="182" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/617fc55c113e9135ba3a6c18/617fc55c113e916f803a6c54_Vector.svg&amp;raw"></a><a class="social-share-button w-inline-block" data-dcnode-id="179" href="#"><img alt="" class="social-share-icon" data-dcnode-id="180" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/617fc55c113e9135ba3a6c18/617fc55c113e91145c3a6c55_Vector-2.svg&amp;raw"></a><a class="social-share-button w-inline-block" data-dcnode-id="177" href="#"><img alt="" class="social-share-icon" data-dcnode-id="178" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/617fc55c113e9135ba3a6c18/617fc55c113e91c9093a6c56_linkedin.svg&amp;raw"></a><a class="social-share-button w-inline-block" data-dcnode-id="175" href="#"><img alt="" class="social-share-icon" data-dcnode-id="176" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/617fc55c113e9135ba3a6c18/617fc55c113e9144473a6c57_instagram.svg&amp;raw"></a></div></div></div></div><div class="section---padding blue-waves sllmmer wf-section" data-dcnode-id="157"><div class="rc" data-dcnode-id="159"><div class="_2-col-grid" data-dcnode-id="160"><div class="column margin" data-dcnode-id="163" id="w-node-_168fc7c7-7e73-d0e4-03b0-8dc1202a0029-18a65e0c" style="opacity: 1; transform: translate3d(0px, 0px, 0px) scale3d(1, 1, 1) rotateX(0deg) rotateY(0deg) rotateZ(0deg) skew(0deg, 0deg); transform-style: preserve-3d;"><h2 class="limited-h2" data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">Find the right therapist or coach for you</span></h2><p class="subhead top-margin-20" data-dcnode-id="166"><span data-dcnode-id="168" instrument_node="">Complete our free, confidential questionnaire to easily and quickly match with 3 personalized coaches or therapists.</span><br data-dcnode-id="167"></p><a class="button-secondary top-m m/61cb94e5fee3d4ce8b9aa575/61cb94e5fee3d431299aa5e9_MyWellbeing_Website_Illo_Sketch-p-800.png 800w, https://assets-global.website-files.com/61cb94e5fee3d4ce8b9aa575/61cb94e5fee3d431299aa5e9_MyWellbeing_Website_Illo_Sketch-p-1080.png 1080w, https://assets-global.website-files.com/61cb94e5fee3d4ce8b9aa575/61cb94e5fee3d431299aa5e9_MyWellbeing_Website_Illo_Sketch-p-1600.png 1600w, https://assets-global.website-files.com/61cb94e5fee3d4ce8b9aa575/61cb94e5fee3d431299aa5e9_MyWellbeing_Website_Illo_Sketch-p-2000.png 2000w, https://assets-global.website-files.com/61cb94e5fee3d4ce8b9aa575/61cb94e5fee3d431299aa5e9_MyWellbeing_Website_Illo_Sketch-p-2600.png 2600w, https://assets-global.website-files.com/61cb94e5fee3d4ce8b9aa575/61cb94e5fee3d431299aa5e9_MyWellbeing_Website_Illo_Sketch.png 3200w"><img alt="" class="hero-image rounded" data-dcnode-id="155" loading="lazy" sizes="(max-width: 479px) 100vw, (max-width: 991px) 30vw, 27vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/61cb94e5fee3d491ca9aa59c/61cb94e5fee3d45ccd9aa828_image-asset-6.jpeg&amp;raw" srcset="https://assets-global.website-files.com/61cb94e5fee3d491ca9aa59c/61cb94e5fee3d45ccd9aa828_image-asset-6-p-500.jpeg 500w, https://assets-global.website-files.com/61cb94e5fee3d491ca9aa59c/61cb94e5fee3d45ccd9aa828_image-asset-6-p-800.jpeg 800w, https://assets-global.website-files.com/61cb94e5fee3d491ca9aa59c/61cb94e5fee3d45ccd9aa828_image-asset-6-p-1080.jpeg 1080w, https://assets-global.website-files.com/61cb94e5fee3d491ca9aa59c/61cb94e5fee3d45ccd9aa828_image-asset-6.jpeg 1279w"><img alt="" class="hero-image rounded w-condition-invisible w-dyn-bind-empty" data-dcnode-id="154" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/&amp;raw"></div><div class="column margin" data-dcnode-id="142" id="w-node-_168fc7c7-7e73-d0e4-03b0-8dc1202a003b-18a65e0c" style="opacity: 1; transform: translate3d(0px, 0px, 0px) scale3d(1, 1, 1) rotateX(0deg) rotateY(0deg) rotateZ(0deg) skew(0deg, 0deg); transform-style: preserve-3d;"><h2 class="limited-h2" data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">About the author</span></h2><div class="subhead w-richtext" data-dcnode-id="144"><p data-dcnode-id="145"><span data-dcnode-id="150" instrument_node="">Caitlin is MyWellbeing's Content Lead, a writer, communication coach, keynote speaker, and the founder of Commcoterie, a communication consultancy. She teaches communication workshops, helps leaders and entrepreneurs create thought leadership content, and brings her signature peer coaching program to companies. Find out more, including how to work with her, at </span><a data-dcnode-id="148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.commcoterie.com/"><span data-dcnode-id="149" instrument_node="">www.commcoterie.com</span></a><span data-dcnode-id="147" instrument_node="">.</span><br data-dcnode-id="146"></p></div><div class="subhead w-condition-invisible w-dyn-bind-empty w-richtext" data-dcnode-id="143"></div></div></div><div class="separator" data-dcnode-id="140"></div><div class="post-bottom-wrap" data-dcnode-id="108"><h3 class="heading centered" data-dcnode-id="138"><span data-dcnode-id="139" instrument_node="">Similar posts</span></h3><div class="top-margin-30 w-dyn-list" data-dcnode-id="109"><div class="_3-col-grid alt-3 w-dyn-items" data-dcnode-id="110" role="list"><div class="w-dyn-item" data-dcnode-id="129" role="listitem"><a class="card link w-inline-block" data-dcnode-id="130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mywellbeing.com/ask-a-therapist/understanding-covid-19-anxiety"><div class="blog-hero-grid-image margin-bottom" data-dcnode-id="137" style="background-image:url(&quot;https://assets-global.website-files.com/61cb94e5fee3d491ca9aa59c/61cb94e5fee3d427df9aa896_evolution-of-anxiety.jpg&quot;)"></div><h5 data-dcnode-id="135"><span data-dcnode-id="136" instrument_node="">Mar 24, 2020</span></h5><h4 class="dark-text" data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">Understanding COVID-19 Anxiety From An Evolutionary Perspective</span></h4><div data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">If you are feeling overwhelmed with anxiety during this unprecedented time in history, you are not alone. There is absolutely nothing wrong with you. In fact, from an evolutionary perspective, your body is doing what it should be doing when there is a threat. It’s a sign that your body has adapted to survive.</span></div></a></div><div class="w-dyn-item" data-dcnode-id="120" role="listitem"><a class="card link w-inline-block" data-dcnode-id="121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mywellbeing.com/ask-a-therapist/3-breathing-techniques-that-actually-work"><div class="blog-hero-grid-image margin-bottom" data-dcnode-id="128" style="background-image:url(&quot;https://assets-global.website-files.com/61cb94e5fee3d491ca9aa59c/61cb94e5fee3d469049aa8da_le-minh-phuong-niH7Z81S44g-unsplash.jpg&quot;)"></div><h5 data-dcnode-id="126"><span data-dcnode-id="127" instrument_node="">Mar 25, 2021</span></h5><h4 class="dark-text" data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">3 Breathing Techniques That Actually Work</span></h4><div data-dcnode-id="122"><span data-dcnode-id="123" instrument_node="">If you want to use your breath to calm down, you have to breathe correctly. Breathing exercises can help. I love breathing exercises because they're easy to learn and you can do them anytime, anywhere. It can be really helpful to have a go-to that you practice so you're ready to use it when the anxiety hits. There are a ton of different techniques to pick from, but these are my 3 favorites. Give them a try and see which one you like best!</span></div></a></div><div class="w-dyn-item" data-dcnode-id="111" role="listitem"><a class="card
