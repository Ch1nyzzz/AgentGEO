</span><div class="article-info intro-left intro-final" data-dcnode-id="368"><span data-dcnode-id="372" instrument_node="">
</span><p class="article-date" data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">30 OCT 2019</span></p><span data-dcnode-id="369" instrument_node="">
</span></div><span data-dcnode-id="367" instrument_node="">
</span><div class="article-section-content article-news-top-line intro-full intro-final" data-dcnode-id="351"><span data-dcnode-id="366" instrument_node="">
</span><img alt="" class="article-hero-image" data-dcnode-id="365" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mediacom.com/apac/articles/thinking&amp;raw"><span data-dcnode-id="364" instrument_node="">
</span><div class="article-author-info" data-dcnode-id="353"><span data-dcnode-id="363" instrument_node="">
</span><div class="article-author" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">by Sue Unerman</span></div><span data-dcnode-id="360" instrument_node="">
</span><div class="article-author-title" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Chief Transformation Officer, MediaCom UK</span></div><span data-dcnode-id="357" instrument_node="">
</span><div class="article-author-links" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">
</span></div><span data-dcnode-id="354" instrument_node="">
</span></div><span data-dcnode-id="352" instrument_node="">
</span></div><span data-dcnode-id="350" instrument_node="">
</span><div class="article-section-content intro-full intro-final" data-dcnode-id="345"><span data-dcnode-id="349" instrument_node="">
</span><h3 class="article-intro followed-by-article-section" data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Thinking positive not only makes us healthier, it also makes us more willing to act on brands’ messages. Sue Unerman, Chief Transformation Officer at MediaCom UK, explains</span></h3><span data-dcnode-id="346" instrument_node="">
</span></div><span data-dcnode-id="344" instrument_node="">
</span><div class="article-section" data-dcnode-id="279"><span data-dcnode-id="343" instrument_node="">
</span><div class="article-section-content intro-full intro-final" data-dcnode-id="281"><span data-dcnode-id="342" instrument_node="">
</span><p data-dcnode-id="337"><span data-dcnode-id="341" instrument_node="">We live in negative times. According to the </span><a data-dcnode-id="339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.gallup.com/reports/212648/gallup-global-emotions-report-2017.aspx"><span data-dcnode-id="340" instrument_node="">Gallup Global Emotions Report</span></a><span data-dcnode-id="338" instrument_node="">, 2017 was the world’s most miserable year for more than a decade.</span></p><span data-dcnode-id="336" instrument_node="">
</span><p data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">And it’s true that between political upheavals, the rise of the far right, the effects of climate change, war, natural disasters, famine and terrorism, there’s plenty to be worried about.</span></p><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">All of this is contributing to the fact that only 4% of the UK population believes that the world is improving while the most recent Edelman ‘Trust Barometer’ found that 19% of people are actively avoiding news media altogether. Forty percent have made that decision because they find the news too depressing.</span></p><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Then there’s social media, which research has found 60% of users say has a negative impact on their self-esteem and 50% admit impacts on their relationships.</span></p><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">And yet for those of us who can ignore the pressures to go down the pit of despair, there are huge positives.</span></p><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Our consulting team, Theobald’s Road Consulting, recently addressed the impact of positivity, in a specially-commissioned study for Hearst. The report highlighted that:</span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">– People who express gratitude on a regular basis have better physical health, optimism, progress toward goals, well-being, and help others more (Emmons &amp; Crumpler, 2000).</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">– People who witness others perform good deeds experience an emotion called ‘elevation’ and this motivates them to perform their own good deeds (Haidt, 2000).</span></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">– Optimism can protect people from mental and physical illness (Taylor et al., 2000).</span></p><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">– People who are optimistic or happy have better performance in work, school and sports, are less depressed, have fewer physical health problems, and have better relationships with other people. Further, optimism can be measured, and it can be learned (Seligman, 1991; Lyubomirsky, King &amp; Diener, 2005).</span></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">– People who report more positive emotions in young adulthood live longer and healthier lives (Danner, Snowdon, &amp; Friesen, 2001).</span></p><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Positive thinking also makes us more resourceful because the alternative constricts the mind and makes us reluctant to try something new. Being positive reduces stress by helping us recover from challenges (both physical and mental) faster and it makes us more productive.</span></p><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">This is all great at a personal level but professionally as communications experts too there are benefits. Positive attitudes change the mindset in which we absorb media messaging – both editorial and ads. In fact, media is as important as a close family network in influencing a positive outlook on life.</span></p><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">What this means is that brands can take advantage of the benefits of positivity by placing their ads in the most positive environments.</span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">As our research for Hearst showed, people who have a positive outlook on life and feel positive about media are 15% more likely to take action after seeing a message than those who have a negative outlook but still feel positive about media.</span></p><span data-dcnode-id="294" instrument_node="">
</span><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">What’s more, positive people are more likely to try new things, 100% more likely to compare a product with competitors, 91% more likely to buy a product or service they have seen advertised and 167% more likely to make a change in their routine.</span></p><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">It’s perhaps no surprise that the research found that self-help/improvement magazines are seen as the most positive media, or that magazines generally score better than newspapers for putting regular users into a positive mindset. But media such as music streaming services also score well as do TV brands.</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">It’s too early to add right mood to our planning mantra of right time, right place and right context but it’s a factor that brands looking to drive growth.</span></p><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Happy people make happy, growing brands and, in these dark times, we could all do with more of both.</span></p><span data-dcnode-id="282" instrument_node="">
</span></div><span data-dcnode-id="280" instrument_node="">
</span></div><span data-dcnode-id="278" instrument_node="">
