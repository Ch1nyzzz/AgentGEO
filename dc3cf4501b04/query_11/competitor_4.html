</span><div class="g post post-10522 type-post status-publish format-standard has-post-thumbnail hentry category-psychology-of-empathy category-happinessindia category-business has_thumb" data-dcnode-id="171" id="post-10522"><span data-dcnode-id="1111" instrument_node="">
</span><div class="single_post" data-dcnode-id="173"><span data-dcnode-id="1110" instrument_node="">
</span><header data-dcnode-id="1105"><span data-dcnode-id="1109" instrument_node="">
</span><h1 class="title single-title entry-title" data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Impact Of Social Media On Mental Health And Wellbeing</span></h1><span data-dcnode-id="1106" instrument_node="">
</span></header><span data-dcnode-id="1104" instrument_node="">
</span><div class="post-single-content box mark-links entry-content" data-dcnode-id="175"><span data-dcnode-id="1103" instrument_node="">
</span><div class="thecontent" data-dcnode-id="177"><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Social media use continues to grow and its increasing impact is being felt across many aspects of our lives. Built mainly as a tool for communication, it offers a range of benefits, including helping people to stay better connected.</span></p><div data-dcnode-id="1099" data-inserter-version="2" id="ezoic-pub-ad-placeholder-691"></div><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">By contrast, it can also have a negative impact on our mental health and wellbeing. Through knowing the pros and cons of social media, we can better judge how to use and interact with it in the best and healthiest ways.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><h2 data-dcnode-id="1092"><span data-dcnode-id="1093" id="Advantages_of_Social_Media_On_Wellbeing"><span data-dcnode-id="1094" instrument_node="">Advantages of Social Media On Wellbeing</span></span></h2><span data-dcnode-id="1091" instrument_node="">
</span><div class="wp-block-image size-large is-style-default aligncenter" data-dcnode-id="1088"><figure class="aligncenter" data-dcnode-id="1089"><img alt="social-media-addiction" data-dcnode-id="1090" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//happyproject.in/wp-content/uploads/2020/07/social-media-addiction.jpg&amp;raw" title="social-media-addiction"></figure></div><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Social media can deliver several benefits that can help improve mental health, wellbeing and support our lives.</span></p><div data-dcnode-id="1084" data-inserter-version="2" id="ezoic-pub-ad-placeholder-699"></div><span data-dcnode-id="1083" instrument_node="">
</span><h3 data-dcnode-id="1080"><span data-dcnode-id="1081" id="1_Increases_Connections_With_Others"><span data-dcnode-id="1082" instrument_node="">1. Increases Connections With Others</span></span></h3><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">The biggest benefit of social media, and the primary reason why it has been so popular, is that it allows people to connect in easier and quicker ways than ever before.</span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Through social media, people can stay in touch with their friends they made across their lives. And it can help them stay connected with their families across geographical distances.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">It also offers the opportunity to reconnect with friends we may not have talked to for a long time, or even with family members who are long-lost.</span></p><div data-dcnode-id="1070" data-inserter-version="2" id="ezoic-pub-ad-placeholder-800"></div><span data-dcnode-id="1069" instrument_node="">
</span><h3 data-dcnode-id="1066"><span data-dcnode-id="1067" id="2_Expands_Networking_Opportunities"><span data-dcnode-id="1068" instrument_node="">2. Expands Networking Opportunities</span></span></h3><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Social networking provides a fantastic opportunity for us to network with other people in our industry or area of interest.</span></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">We may meet a new friend who can put us in touch with others, or we may also be able to approach individuals or companies that are of particular interest to us. This way, social media provides us with the opportunity to expand our network in a meaningful and positive manner.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Moreover, it facilitates the process of networking for individuals who may be more introverted.</span></p><span data-dcnode-id="1056" instrument_node="">
</span><h3 data-dcnode-id="1053"><span data-dcnode-id="1054" id="3_Reduces_Feelings_of_Loneliness"><span data-dcnode-id="1055" instrument_node="">3. Reduces Feelings of Loneliness</span></span></h3><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Another advantage of social media is the fact that it can help ease feelings of loneliness. This is especially important for those who have clinical depression and who feel, in some cases, isolation and loneliness.</span></p><div data-dcnode-id="1049" data-inserter-version="2" id="ezoic-pub-ad-placeholder-801"></div><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Through social media, we can reach out and connect with others who have similar experiences, or who can offer support to those who are struggling. As a result, many people can find a social support network and make new friends, which helps ease the feelings of loneliness.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p class="has-background" data-dcnode-id="1040" style="background-color:#c6e6f6"><span data-dcnode-id="1044" instrument_node="">• </span><strong data-dcnode-id="1041"><a aria-label="Do your Facebook friends make you happier? Find out what research says. (opens in a new tab)" class="rank-math-link" data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//happyproject.in/facebook-friends-happiness/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1043" instrument_node="">Do Facebook friends make you happy or sad? What does the research say?</span></a></strong></p><form action="https://tinyletter.com/dr-sandip-roy" data-dcnode-id="1018" method="post" style="border: 1px solid #D4CEC5; background: #FAF5EB; padding-top: 15px; text-align: center;" target="popupwindow"><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1033"><label data-dcnode-id="1034" for="tlemail"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Join us to craft your best life!</span></strong><br data-dcnode-id="1036"><span data-dcnode-id="1035" instrument_node="">Sign up with your email below</span></label></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><input data-dcnode-id="1031" id="tlemail" name="email" style="width: 150px;" type="text"></p><div data-dcnode-id="1029" data-inserter-version="2" id="ezoic-pub-ad-placeholder-802"></div><span data-dcnode-id="1028" instrument_node="">
</span><input data-dcnode-id="1027" name="embed" type="hidden" value="1"><input data-dcnode-id="1026" type="submit" value="Subscribe"><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1020"><br data-dcnode-id="1024"><em data-dcnode-id="1021"><a data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tinyletter.com/dr-sandip-roy" rel="noopener" target="_blank"><span data-dcnode-id="1023" instrument_node="">Powered by TinyLetter</span></a></em></p><span data-dcnode-id="1019" instrument_node="">
</span></form><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1016"></p><hr data-dcnode-id="1015"><p data-dcnode-id="1014"></p><span data-dcnode-id="1013" instrument_node="">
</span><h3 data-dcnode-id="1010"><span data-dcnode-id="1011" id="4_Provides_Emotional_Support"><span data-dcnode-id="1012" instrument_node="">4. Provides Emotional Support</span></span></h3><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">One of the main advantages of social media is when a crisis occurs, such as a natural disaster, information can be quickly communicated to large groups of people. As a result, social media can often be a good starting point for a range of support services.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">For example, it can offer support to groups and individuals on emotional and wellbeing issues. It can also support fundraising and providing financial aid to help relief efforts.</span></p><div data-dcnode-id="1003" data-inserter-version="2" id="ezoic-pub-ad-placeholder-803"></div><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="1001" instrument_node="">It can also be helpful for many people who experience a personal crisis to share their thoughts and experiences with others on social media. The support and empathy they receive from their social media community can help them cope with challenging situations and </span><a aria-label="prevent them from taking drastic actions (opens in a new tab)" class="rank-math-link" data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//happyproject.in/suicidal-thoughts/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1000" instrument_node="">prevent them from taking drastic actions</span></a><span data-dcnode-id="998" instrument_node="">.</span></p><span data-dcnode-id="996" instrument_node="">
</span><h3 data-dcnode-id="993"><span data-dcnode-id="994" id="5_Promotes_Expressing_Oneself"><span data-dcnode-id="995" instrument_node="">5. Promotes Expressing Oneself</span></span></h3><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Perhaps the biggest appeal of social media is that it offers people the opportunity to truly express themselves.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Whether having a bad day, or needing to get some things off your chest, or wanting to share some good news or accomplishment, airing your thoughts and feelings on social media can be therapeutic.</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Also, we also have the power and the ability to spread positivity to others using social media. Whether we share stories about how we overcame personal challenges, or offer support and advice to others who are struggling, we make a positive impact.</span></p><div data-dcnode-id="983" data-inserter-version="2" id="ezoic-pub-ad-placeholder-804"></div><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="981" instrument_node="">Often, when individuals share their personal stories of </span><a aria-label="resilience (opens in a new tab)" class="rank-math-link" data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//happyproject.in/resilience-psychology/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="980" instrument_node="">resilience</span></a><span data-dcnode-id="978" instrument_node="">, it can help others feel less alone. As they can see that others have also faced similar challenges or struggles as theirs, and managed to overcome them.</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Through such positive expressions, we can become an inspiration to others.</span></p><span data-dcnode-id="973" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="967"><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//happyproject.in/resilience-psychology/" rel="noopener noreferrer" target="_blank"><img alt="Resilience-in-Psychology" data-dcnode-id="972" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//happyproject.in/wp-content/uploads/2020/04/Resilience-in-Psychology.jpg&amp;raw" title="Impact Of Social Media On Mental Health And Wellbeing 1 The Happiness Blog"></a><figcaption data-dcnode-id="968"><a class="rank-math-link" data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//happyproject.in/resilience-psychology/"><span data-dcnode-id="970" instrument_node="">Find out what is resilience in psychology.</span></a></figcaption></figure><span data-dcnode-id="966" instrument_node="">
</span><h2 data-dcnode-id="963"><span data-dcnode-id="964" id="Disadvantages_of_Social_Media_On_Wellbeing"><span data-dcnode-id="965" instrument_node="">Disadvantages of Social Media On Wellbeing</span></span></h2><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Yet, for all its advantages, social media also comes with a range of disadvantages. And many of these can have a silent damaging effect on our mental health, especially if left unchecked.</span></p><span data-dcnode-id="959" instrument_node="">
</span><h3 data-dcnode-id="956"><span data-dcnode-id="957" id="1_Deepens_Degrees_of_Addiction"><span data-dcnode-id="958" instrument_node="">1. Deepens Degrees of Addiction</span></span></h3><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Social media can be quite addictive. This is especially true for younger people. A part of the problem is that social media is so easy to access, not just from a computer, but also via tablets and mobiles.</span></p><div data-dcnode-id="952" data-inserter-version="2" id="ezoic-pub-ad-placeholder-805"></div><span data-dcnode-id="951" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="950"><span data-dcnode-id="949" instrument_node="">
</span><blockquote class="wp-block-quote is-style-large" data-dcnode-id="944"><p data-dcnode-id="945"><strong data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Social media addiction</span></strong><span data-dcnode-id="946" instrument_node=""> is a behavioral problem characterized by excessive preoccupation with, and uncontrollable urges to, use social media, and spending inordinate amounts of time and energy on them to the extent it affects their other important areas of life.</span></p></blockquote><span data-dcnode-id="943" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="942"><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Moreover, many social media apps also send regular notifications, which can make it hard to stay switched off. For many, it can become addictive. They find it hard to resist checking how many comments or likes their posts have had.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">The problem is far more ubiquitous than we might imagine. Psychologists estimate as many as 5 to 10% of Americans meet the criteria for social media addiction.</span></p><span data-dcnode-id="935" instrument_node="">
</span><figure class="wp-block-image size-large is-style-default aligncenter" data-dcnode-id="929"><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//happyproject.in/facebook-envy/" rel="noopener noreferrer" target="_blank"><img alt="Overcome Facebook Envy Jealousy" data-dcnode-id="934" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//happyproject.in/wp-content/uploads/2017/01/overcome-facebook-envy-jealousy.jpeg&amp;raw" title="Impact Of Social Media On Mental Health And Wellbeing 2 The Happiness Blog"></a><figcaption data-dcnode-id="930"><a class="rank-math-link" data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//happyproject.in/facebook-envy/"><span data-dcnode-id="932" instrument_node="">Facebook envy: Is it for real?</span></a></figcaption></figure><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">However, spending too much time on social media has many negative effects on health and well-being, including poor sleep.</span></p><div data-dcnode-id="925" data-inserter-version="2" id="ezoic-pub-ad-placeholder-806"></div><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">This is especially true of those who become addicted to it and can not go to sleep unless they have checked their social media. This can have a direct impact on our melatonin levels, and therefore, our sleep.</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">The problem is further compounded by the fact that, because we can’t sleep, we end up checking our social media pages.</span></p><div class="code-block code-block-9" data-dcnode-id="534" style="margin: 20px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="918" instrument_node="">

</span><h3 data-dcnode-id="530"><span data-dcnode-id="531" id="2_Increases_Anxiety_And_Depression"><span data-dcnode-id="532" instrument_node="">2. Increases Anxiety And Depression</span></span></h3><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">For many people who are susceptible to depression or anxiety, social media can trigger feelings that can make them worse.</span></p><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">It is easy to look at the seemingly perfect lives of other people on social media and feel our own lives are not good enough. This way, social media can make people feel inadequate and insecure.</span></p><div class="code-block code-block-1" data-dcnode-id="516" style="margin: 20px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="523" instrument_node="">
</span><span data-dcnode-id="521" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-6363693298344044" data-ad-format="auto" data-ad-slot="9604606590" data-dcnode-id="520" style="display:block"></ins><span data-dcnode-id="519" instrument_node="">
</span></div><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">When people compare their lives with that of others, they often feel high pressures to keep up. And if they can’t measure up to them, they might end up feeling they aren’t good enough to compete with anyone ever, and their accomplishments aren’t as worthy as those of anyone else.</span></p><div data-dcnode-id="512" data-inserter-version="2" id="ezoic-pub-ad-placeholder-807"></div><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">This can lead to depression, anxiety, and distress. Furthermore, this can lead to low self-esteem, social isolation, and increased feelings of loneliness.</span></p><span data-dcnode-id="508" instrument_node="">
</span><div class="wp-block-image size-large is-style-default aligncenter" data-dcnode-id="501"><figure class="aligncenter" data-dcnode-id="502"><a data-dcnode-id="506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//happyproject.in/stress-science/" rel="noopener noreferrer" target="_blank"><img alt="Fake lives of people" data-dcnode-id="507" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//happyproject.in/wp-content/uploads/2020/08/why-care-about-what-people-show-their-live-to-be.jpg&amp;raw" title="Fake lives of people"></a><figcaption data-dcnode-id="503"><em data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Why care so much about other people’s fake lives?</span></em></figcaption></figure></div><span data-dcnode-id="500" instrument_node="">
</span><h3 data-dcnode-id="497"><span data-dcnode-id="498" id="3_Creates_Fears_of_Inadequacy_And_FOMO"><span data-dcnode-id="499" instrument_node="">3. Creates Fears of Inadequacy And FOMO</span></span></h3><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="495" instrument_node="">One of the commonest ways the fear of feeling inadequate arises is our internal voice telling us: </span><em data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">“I am not good enough!”</span></em></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="490" instrument_node="">Also known as </span><strong data-dcnode-id="487"><a aria-label="impostor syndrome (opens in a new tab)" class="rank-math-link" data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/content/pdf/10.1007/s11606-019-05364-1.pdf" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="489" instrument_node="">impostor syndrome</span></a></strong><span data-dcnode-id="486" instrument_node="">, it is a common experience based on self-doubt, and even some of the most talented people feel it. Social media can create this sense when we see the achievements and triumphs of others on our timeline.</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="483" instrument_node="">The </span><strong data-dcnode-id="480"><a aria-label="Fear of Missing Out (opens in a new tab)" class="rank-math-link" data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//online.king.edu/news/psychology-of-fomo/" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="482" instrument_node="">Fear of Missing Out</span></a></strong><span data-dcnode-id="479" instrument_node=""> (FOMO) has become alarmingly common these days. This is often the result of comparing our life to the lives of others on social media. FOMO causes emotional pain, </span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">This feeling can be especially amplified if we see lots of pictures or posts of friends enjoying themselves without us. It can also get triggered when we start comparing our achievements to those of others and feel we’re not doing enough.</span></p><div data-dcnode-id="474" data-inserter-version="2" id="ezoic-pub-ad-placeholder-808"></div><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">And thus triggering further insecurities that then have a negative impact on our self-esteem.</span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="469" instrument_node="">A </span><a aria-label="study on social media use (opens in a new tab)" class="rank-math-link" data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//eprints.gla.ac.uk/120206/7/120206.pdf" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="468" instrument_node="">study on social media use</span></a><span data-dcnode-id="466" instrument_node=""> found the influence of social networks can have dire effects on the psychological well-being of users. The research looked at the mental health effects of social media in 467 high school students.</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">The study found teenagers have a strong sense of social pressure to be always available online. This is made worse by frequent smartphone alerts, leading to FOMO. The study also found the FOMO in teenagers contributed to lower self-esteem, sleep issues, and anxiety.</span></p><span data-dcnode-id="461" instrument_node="">
</span><span class="bctt-click-to-tweet" data-dcnode-id="455"><span class="bctt-ctt-text" data-dcnode-id="458"><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%253A%252F%252Fhappyproject.in%252Fsocial-media-wellbeing%252F%26text%3D%2523Regret%2520that%2520emerges%2520from%2520an%2520imagined%2520future%2520reality%2520is%2520the%2520most%2520powerful%2520trigger%2520for%2520a%2520%2523FOMO%2520experience.%26related" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="460" instrument_node="">#Regret that emerges from an imagined future reality is the most powerful trigger for a #FOMO experience. </span></a></span><a class="bctt-ctt-btn" data-dcnode-id="456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%253A%252F%252Fhappyproject.in%252Fsocial-media-wellbeing%252F%26text%3D%2523Regret%2520that%2520emerges%2520from%2520an%2520imagined%2520future%2520reality%2520is%2520the%2520most%2520powerful%2520trigger%2520for%2520a%2520%2523FOMO%2520experience.%26related" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="457" instrument_node="">Click To Tweet</span></a></span><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">This fear of missing out on an opportunity, work-related or personal, can mean people linger on their social media longer than they would otherwise.</span></p><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="450" instrument_node="">FOMO and fear of inadequacy can be countered by cultivating a </span><strong data-dcnode-id="447"><a aria-label="positive mindset (opens in a new tab)" class="rank-math-link" data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//happyproject.in/positive-mindset/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="449" instrument_node="">positive mindset</span></a></strong><span data-dcnode-id="446" instrument_node="">.</span></p><div data-dcnode-id="444" data-inserter-version="2" id="ezoic-pub-ad-placeholder-809"></div><span data-dcnode-id="443" instrument_node="">
</span><figure class="wp-block-embed-youtube wp-block-embed is-type-video is-provider-youtube" data-dcnode-id="420"><div class="lyte-wrapper" data-dcnode-id="424" style="width:640px;max-width:100%;margin:5px auto;" title="Fear Of Missing Out (FOMO)"><div class="lyte lP" data-dcnode-id="425" id="WYL_VrC_MSG9zSU" itemprop="video" itemscope="" itemtype="https://schema.org/VideoObject"><div data-dcnode-id="438"><meta content="https://happyproject.in/wp-content/plugins/wp-youtube-lyte/lyteCache.php?origThumbUrl=https%3A%2F%2Fi.ytimg.com%2Fvi%2FVrC_MSG9zSU%2Fhqdefault.jpg" data-dcnode-id="442" itemprop="thumbnailUrl"><meta content="https://www.youtube.com/embed/VrC_MSG9zSU" data-dcnode-id="441" itemprop="embedURL"><meta content="PT3M46S" data-dcnode-id="440" itemprop="duration"><meta content="2015-05-18T11:01:29Z" data-dcnode-id="439" itemprop="uploadDate"></div><meta content="captions" data-dcnode-id="437" itemprop="accessibilityFeature"><div class="pL" data-dcnode-id="429" data-src="https://happyproject.in/wp-content/plugins/wp-youtube-lyte/lyteCache.php?origThumbUrl=https%3A%2F%2Fi.ytimg.com%2Fvi%2FVrC_MSG9zSU%2Fhqdefault.jpg" id="lyte_VrC_MSG9zSU"><div class="tC" data-dcnode-id="434"><div class="tT" data-dcnode-id="435" itemprop="name"><span data-dcnode-id="436" instrument_node="">Fear Of Missing Out (FOMO)</span></div></div><div class="play" data-dcnode-id="433"></div><div class="ctrl" data-dcnode-id="430"><div class="Lctrl" data-dcnode-id="432"></div><div class="Rctrl" data-dcnode-id="431"></div></div></div><noscript data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">&lt;a href="https://youtu.be/VrC_MSG9zSU" rel="nofollow noopener" target="_blank"&gt;&lt;img src="https://happyproject.in/wp-content/plugins/wp-youtube-lyte/lyteCache.php?origThumbUrl=https%3A%2F%2Fi.ytimg.com%2Fvi%2FVrC_MSG9zSU%2F0.jpg" alt="Fear Of Missing Out (FOMO)" width="640" height="340" title="Impact Of Social Media On Mental Health And Wellbeing 3 The Happiness Blog"&gt;&lt;br&gt;Watch this video on YouTube&lt;/a&gt;</span></noscript><meta content="Fear of Missing Out (FOMO) is an almost inevitable danger in the modern world, where we’re surrounded by suggestions of how life might be perfect. But there are better and worse ways of dealing with FOMO. Please subscribe here: http://tinyurl.com/o28mut7 If you like our films take a look at our shop (we ship worldwide): http://www.theschooloflife.com/shop/all/ Brought to you by http://www.theschooloflife.com Produced in collaboration with David Horsburgh http://www.davidtheanimator.com #TheSchoolOfLife" data-dcnode-id="426" itemprop="description"></div></div><div class="lL" data-dcnode-id="423" style="max-width:100%;width:640px;margin:5px auto;"></div><figcaption data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">There are better and worse ways of dealing with FOMO</span></figcaption></figure><span data-dcnode-id="419" instrument_node="">
</span><h3 data-dcnode-id="416"><span data-dcnode-id="417" id="4_Decreases_Face-To-Face_Interaction"><span data-dcnode-id="418" instrument_node="">4. Decreases Face-To-Face Interaction</span></span></h3><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Spending most of our time on social media can mean we actually end up missing out on important real-life experiences and interactions.</span></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">This can have a negative impact on our relationships. It can lead to decreased human interactions, leading to greater loneliness when offline.</span></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">By choosing to stay immersed in our online life, we can sometimes miss important events and milestones in our offline life. This may be especially true of parents, who may end up missing key milestones in their children’s lives.</span></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">What’s more, this can make us more detached from people in our lives. Because the time we spend online is the time we don’t get to invest in nurturing our ties with real-life friends and family.</span></p><span data-dcnode-id="403" instrument_node="">
</span><h3 data-dcnode-id="400"><span data-dcnode-id="401" id="5_Reduces_Productivity_And_Focus"><span data-dcnode-id="402" instrument_node="">5. Reduces Productivity And Focus</span></span></h3><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Spending long periods of time on social media can lead us to become less productive. Not only is it time-consuming to spend time on social media, but it can also be emotionally and mentally draining.</span></p><div data-dcnode-id="396" data-inserter-version="2" id="ezoic-pub-ad-placeholder-810"></div><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">As such, when we disconnect from social media, we may find it harder to be productive and focused.</span></p><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Similarly, it can lead to poor performance at work and academics. Because the time we spend online is the time we neglect our study or work responsibilities.</span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">This is especially of those who check social media during their working hours. The adverse effects of social media on the quality and length of our sleep will also mean we are less likely to be as productive as we might be otherwise.</span></p><span data-dcnode-id="386" instrument_node="">
</span><h2 data-dcnode-id="383"><span data-dcnode-id="384" id="Final_Words"><span data-dcnode-id="385" instrument_node="">Final Words</span></span></h2><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Social media has the potential to be an advantageous tool that enables people to connect, express themselves, find new communities and like-minded individuals to engage with, and reduce feelings of loneliness.</span></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">On the other hand, it can lead to increased levels of anxiety, depression, and lower self-esteem as people compare their life to others. It can also have an addictive and negative impact on our mental wellbeing as we decrease our interactions with others, miss out on real-world experiences, and lose out on proper sleep.</span></p><div data-dcnode-id="376" data-inserter-version="2" id="ezoic-pub-ad-placeholder-811"></div><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Ultimately, social media is the most effective and positive when it is used in moderation. It is essential to be aware of how we interact and use them, to be aware of how much time we spend there, and to be honest about the impact they have on us.</span></p><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">By being aware of the pros and cons, we are better equipped to break bad habits and make better choices for our mental health and well-being.</span></p><span data-dcnode-id="369" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">• • •</span></p><span data-dcnode-id="366" instrument_node="">
