</span><article class="et_pb_post post-14063 post type-post status-publish format-standard hentry category-life category-personal-development tag-emotions tag-health tag-laughter" data-dcnode-id="299" id="post-14063"><span data-dcnode-id="514" instrument_node="">
</span><div class="et_post_meta_wrapper" data-dcnode-id="490"><span data-dcnode-id="513" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Does Mental Health Affect Physical Health?</span></h1><span data-dcnode-id="510" instrument_node="">
</span><p class="post-meta" data-dcnode-id="492"><span data-dcnode-id="509" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="506"><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//weddingincana.com/author/joze" rel="author" title="Posts by Joze Tomsic"><span data-dcnode-id="508" instrument_node="">Joze Tomsic</span></a></span><span data-dcnode-id="505" instrument_node=""> | </span><span class="published" data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Jan 4, 2022</span></span><span data-dcnode-id="502" instrument_node=""> | </span><a data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//weddingincana.com/category/life" rel="category tag"><span data-dcnode-id="501" instrument_node="">Life</span></a><span data-dcnode-id="499" instrument_node="">, </span><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//weddingincana.com/category/personal-development" rel="category tag"><span data-dcnode-id="498" instrument_node="">Personal Development</span></a><span data-dcnode-id="496" instrument_node=""> | </span><span class="comments-number" data-dcnode-id="493"><a data-dcnode-id="494" href="#respond"><span data-dcnode-id="495" instrument_node="">0 comments</span></a></span></p><span data-dcnode-id="491" instrument_node="">
</span></div><span data-dcnode-id="489" instrument_node="">
</span><div class="entry-content" data-dcnode-id="378"><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="474" style="text-align: left;"><span data-dcnode-id="487" instrument_node="">Does mental health affect physical health? “A&nbsp;</span><em data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">man</span></em><span data-dcnode-id="484" instrument_node="">&nbsp;is what&nbsp;</span><em data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">he thinks</span></em><span data-dcnode-id="481" instrument_node="">&nbsp;about&nbsp;</span><em data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">all day long</span></em><span data-dcnode-id="478" instrument_node="">,” wrote American essayist Ralph </span><a data-dcnode-id="476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tidd.ly/3sVxdBG" rel="noopener" target="_blank"><span data-dcnode-id="477" instrument_node="">Waldo Emerson</span></a><span data-dcnode-id="475" instrument_node="">. It is just one of the countless sayings about the power and strength of our thoughts. Known and unknown, signed and unsigned authors have contributed to one of the most exciting chapters of human psychology.</span></p><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="470" style="text-align: center;"><em data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">There is a powerful and close connection between our thoughts and bodies, our fears, anxieties, disappointments, or joys concerning all those changes in tissues, organs, and organ systems.</span></em></p><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="465"><em data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">“</span></em><span data-dcnode-id="466" instrument_node="">Do you think you can or do you think you can’t; in both cases, you’re right,” is a famous saying from the arsenal of the modern theory of positive thinking. And scientists who have studied the effects of thoughts on our bodies have long since established a truth that you could tell something like this: “If I look at your body today, I know what your thoughts were yesterday. Knowing your thoughts today, I can guess what your body will look like tomorrow.” It is a powerful and close connection between our thoughts and bodies, our fears, anxieties, disappointments, or joys with all those changes in tissues, organs, and organ systems. Unfortunately, much less is said and written about this relationship than it should be.</span></p><span data-dcnode-id="464" instrument_node="">
</span><h1 data-dcnode-id="460"><span data-dcnode-id="463" instrument_node="">Does Mental Health Affect Physical Health?</span><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tidd.ly/3sVxdBG"><img alt="Does Mental Health Affect Physical Health?" class="alignright" data-dcnode-id="462" height="412" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//weddingincana.com/wp-content/uploads/2022/01/does-mental-health-affect-physical-health-.jpg&amp;raw" style="width: 354.236px; height: 412px;" title="Does Mental Health Affect Physical Health?" width="354.23648648648646"></a></h1><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">One 1987 study (M.R. Jansen, Yale University) confirmed that breast cancer spreads faster among women who experience extreme hopelessness and frustration in life, fear, or other negative emotions.</span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Only a narrow circle of physical illnesses was called psychosomatic illnesses in the past. We counted high blood pressure, stomach ulcers, heart attacks, and that’s where the list usually ended. Today, it is already proven that several diseases, and those of a purely physical nature, are caused by psychological factors. Examples are countless, to name a few: appendicitis, gout, and metabolic diseases are actually exacerbated by negative emotions, attitudes, fears, and preconceptions; many scientists claim that despair and hopelessness increase the risk of heart attack and cancer.</span></p><span data-dcnode-id="453" instrument_node="">
</span><h2 data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">How Negative Emotions Affect Your Health</span></h2><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Little is known that emotional factors are strongly associated with rheumatoid arthritis. This disorder seems to affect women who have a tendency to suppress their feelings, who, instead of getting angry and facing severe emotional problems, accept passivity and depression as a response to life’s problems.</span></p><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="445" style="text-align: left;"><span data-dcnode-id="446" instrument_node="">There is a close connection between emotions, body position, and the many orthopedic ailments that occur. Nervous and frustrated people uniquely hold their heads, unnaturally, with constant strain on the cervical spine muscles. Such posture causes damage to the spine. For similar reasons, depressed, sad, insecure and listless people have a lowered thoracic spine.</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="442" style="text-align: left;"><span data-dcnode-id="443" instrument_node="">“Sometimes even an X-ray of a patient’s spine can give a sense of what the psychological profile is,” says Japanese physician Kazuhiro MinatiYa. The opposite is also true: “From the patient’s behavior, I often conclude in advance what the picture of his spine might be.”</span></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="438" style="text-align: left;"><em data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">It is not new, and it is not unknown how much stress contributes to the onset and worsening of the disease, but little is still known about what stress is for the body.</span></em></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435" style="text-align: left;"><span data-dcnode-id="436" instrument_node="">Orthopedists have long known and warned – depressive conditions cause long-term muscle tension without the possibility of relief. The result is muscle stiffness, which in turn affects the improper loading of the spine. The body can still compensate for the physical overload, but an actual illness occurs if it is also a matter of mental overstrain.</span></p><span data-dcnode-id="434" instrument_node="">
</span><h2 data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Our Great Opportunity</span></h2><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="429" style="text-align: left;"><span data-dcnode-id="430" instrument_node="">Fortunately, just as everything has its other side, so the problem of the impact of emotions on the body has a brighter view. Namely, just as negative thoughts and ugly memories can gradually destroy our spirit and our body, so it is possible to reverse the process: positive and good thoughts, pleasant and beautiful memories have a beneficial and healing effect on every cell of our body, sometimes bringing miraculous improvements, healings, happiness, and health. The placebo effect is no longer shrouded in mystery but has been scientifically elaborated and explained in detail. In short, say the experiments, if they get a placebo, i.e., fake drug, 30 percent of patients will experience the same effect as if they had received an actual painkiller. What practice does this information point to? A whole range of new treatment methods is based on the power of (positive) thoughts. After all, the Bible says: As you believe, so will you. Joy and fulfillment make us healthy and prolong life. This means scientists conclude that the line between biology and psychology cannot be drawn with certainty. William James, the father of American psychology, said, “Whatever you imprint in the subconscious will move both heaven and earth to come true. Therefore, you only need to transmit the right ideas and creative thoughts to the subconscious.”</span></p><span data-dcnode-id="428" instrument_node="">
</span><h2 data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Practical Examples</span></h2><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="421" style="text-align: left;"><span data-dcnode-id="424" instrument_node="">If this advice seems too poetic and unreal, here are documented examples from the professional and scientific literature.</span><br data-dcnode-id="423"><span data-dcnode-id="422" instrument_node="">
In the 1970s, in a well-known series of experiments at Menninger Clinic, Indian yogi Swami Rama demonstrated the ability to change his heart rate at will from 70 to 300 beats per minute, thus to a speed far above normal. The bio-feedback method can be used to learn how to manage unwanted processes. Therefore, patients suffering from high blood pressure learn to regulate the diameter of their blood vessels by responding to light signals that tell them whether their blood vessels are too dilated or narrowed—days or weeks in lifeboats after their ships sank. As a rule, the youngest man would always die. This phenomenon remained a secret until it was realized that the older sailors, who survived the sinking, knew that the crisis could be happily overcome.</span></p><span data-dcnode-id="420" instrument_node="">
</span><h2 data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Laughter Is Health</span></h2><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="412" style="text-align: left;"><span data-dcnode-id="416" instrument_node="">If you </span><a data-dcnode-id="414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//weddingincana.com/the-health-benefits-of-laughter-therapy"><span data-dcnode-id="415" instrument_node="">laugh and smile</span></a><span data-dcnode-id="413" instrument_node="">, you are actually miraculously acting on your health through several physical and mental factors. The feeling of joy contributes to the health and the undoubted and direct impact of laughter on the body.</span></p><span data-dcnode-id="411" instrument_node="">
</span><ul data-dcnode-id="392"><span data-dcnode-id="410" instrument_node="">
</span><li data-dcnode-id="406"><span data-dcnode-id="409" instrument_node="">For example:</span><br data-dcnode-id="408"><span data-dcnode-id="407" instrument_node="">
while laughing, activating, and strengthening the abdominal muscles and diaphragm;</span></li><span data-dcnode-id="405" instrument_node="">
</span><li data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">abdominal movements deepen your breathing, and this increases the flow of oxygen to the body and improves circulation;</span></li><span data-dcnode-id="402" instrument_node="">
</span><li data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">laughing dilates blood vessels which accelerates tissue healing;</span></li><span data-dcnode-id="399" instrument_node="">
</span><li data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">If you smile and laugh, you stimulate the production of endorphins (the body’s natural painkillers), which creates a feeling of joy;</span></li><span data-dcnode-id="396" instrument_node="">
</span><li data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">when you laugh, you help your lymphatic system get rid of waste products, burn fat and relax muscles.</span></li><span data-dcnode-id="393" instrument_node="">
</span></ul><span data-dcnode-id="391" instrument_node="">
</span><h2 data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Emotions and Immunity</span></h2><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Many doctors and psychologists believe that there is a vital relationship between emotions and how the immune system works. Negative emotions such as guilt, hopelessness, repressed anger, and fear are common among people living with AIDS and can weaken the body’s ability to fight infection. It is believed that you will be healthier and live longer if you do everything you can to maintain a positive attitude. Moments of unhappiness and depression are inevitable, and one must not blame oneself for being overwhelmed by these states, but one must acquire the habit of eliminating negative thoughts. Scientists and psychotherapists agree that yoga exercises, exercise, and meditation help a lot. Researchers at the University of Nebraska School of Medicine have concluded after many experiments that older people, men, and women, who have at least one good friend they can trust, show better immune function, lower cholesterol, and less uric acid in their blood. For women, good interpersonal relationships and friendships are, if not the most expressive means of further development, then certainly in second or third place in importance. Therefore, many women view their relationships as an essential prerequisite for achieving happiness in life.</span></p><span data-dcnode-id="385" instrument_node="">
</span><h2 data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">How to Change Your Thoughts</span></h2><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">We leave this simple question to the end. The response of superficial healers, charlatans, and hunters to quick earnings is usually straightforward and reads: “Think positive, and your life will change! Immediately, from this moment, you will become a different person!” Unfortunately, things are not so simple. It would be like telling a beginner violinist just to imagine himself as a virtuoso, and from tomorrow his music will be perfect. It doesn’t work that way. In particular, one can focus all one’s thoughts on being slim from tomorrow and getting rid of obesity. Still, if one does not start with a systematic change in eating habits and regular exercise, no positive thoughts will change his body and his physiology. They don’t fall from heaven to us overnight, without toil, patience, or effort. But this should not discourage you, just as a novice violinist should not be discouraged at the start of his long journey to perfection. Masterpieces were created at the time of inspiration, but most of the valuable achievements required long and patient work. And just such a long and patient work requires changing yourself, your habits, thoughts, and attitudes. Fortunately, ways exist, techniques are known. Yoga, in particular, has developed several effective mental techniques over the five millennia of its existence that can systematically change your ingrained habits, attitudes, and negative thoughts.</span></p><span data-dcnode-id="379" instrument_node="">
</span></div><span data-dcnode-id="377" instrument_node="">
