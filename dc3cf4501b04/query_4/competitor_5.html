</span><meta content="Previous studies evaluating the welfare cost of air pollution have not paid much attention to its potential effect on mental health and subjective well-being (SWB). This paper attempts to fill the gap by investigating the impact of air pollution on several key dimensions, including mental health status, depressive symptoms, moment-to-moment happiness, and evaluative happiness. We match a nationwide longitudinal survey in China with local air quality and rich weather conditions according to the exact time and place of survey. By making use of variations in exposure to air pollution for the same individuals over time, we show that air pollution reduces hedonic happiness and increases the rate of depressive symptoms, while life satisfaction has little to do with the immediate air quality. Our results shed light on air pollution as an important contributor to the Easterlin paradox that economic growth may not bring more happiness." data-dcnode-id="341" lang="" name="citation_abstract"><span data-dcnode-id="340" instrument_node="">

</span><h2 class="title" data-dcnode-id="40"><span data-dcnode-id="41" instrument_node="">
        Abstract
        
      </span></h2><span data-dcnode-id="39" instrument_node="">
</span><div class="abstract-content selected" data-dcnode-id="34" id="enc-abstract"><span data-dcnode-id="38" instrument_node="">
</span><p data-dcnode-id="36"><span data-dcnode-id="37" instrument_node="">
      
      Previous studies evaluating the welfare cost of air pollution have not paid much attention to its potential effect on mental health and subjective well-being (SWB). This paper attempts to fill the gap by investigating the impact of air pollution on several key dimensions, including mental health status, depressive symptoms, moment-to-moment happiness, and evaluative happiness. We match a nationwide longitudinal survey in China with local air quality and rich weather conditions according to the exact time and place of survey. By making use of variations in exposure to air pollution for the same individuals over time, we show that air pollution reduces hedonic happiness and increases the rate of depressive symptoms, while life satisfaction has little to do with the immediate air quality. Our results shed light on air pollution as an important contributor to the Easterlin paradox that economic growth may not bring more happiness.
    </span></p><span data-dcnode-id="35" instrument_node="">
</span></div><span data-dcnode-id="33" instrument_node="">
</span><p data-dcnode-id="28"><span data-dcnode-id="32" instrument_node="">
</span><strong class="sub-title" data-dcnode-id="30"><span data-dcnode-id="31" instrument_node="">
          Keywords:
        </span></strong><span data-dcnode-id="29" instrument_node="">
      
      Easterlin paradox; air pollution; depression; hedonic happiness; life satisfaction; mental health.
    </span></p><span data-dcnode-id="27" instrument_node="">
