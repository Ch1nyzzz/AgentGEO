</span><img alt="Portrait of happy three multiethnic multiracial female friends closely hugging and showing care and love for each other in park" data-dcnode-id="771" height="562" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chopra.brightspotcdn.com/dims4/default/73e42ae/2147483647/strip/true/crop/5495x2175%2B0%2B777/resize/1420x562%21/quality/90/%3Furl%3Dhttp%253A%252F%252Fchopra-brightspot.s3.amazonaws.com%252F92%252F40%252Faad00e7049ecbe357024a2c8923b%252Fadobestock-319135418.jpeg&amp;raw" srcset="https://chopra.brightspotcdn.com/dims4/default/2117fbe/2147483647/strip/true/crop/5495x2175+0+777/resize/2840x1124!/quality/90/?url=http%3A%2F%2Fchopra-brightspot.s3.amazonaws.com%2F92%2F40%2Faad00e7049ecbe357024a2c8923b%2Fadobestock-319135418.jpeg 2x" width="1420"><span data-dcnode-id="770" instrument_node="">

</span><div class="ArticlePage__articleBody" data-dcnode-id="566"><span data-dcnode-id="756" instrument_node="">
</span><div class="RichTextArticleBody" data-dcnode-id="568"><span data-dcnode-id="755" instrument_node="">
</span><div class="RichTextArticleBody-body RichTextBody" data-dcnode-id="570"><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">If there was one magical cure for many of the woes of the world, it might be the power of kindness. When the epidemic of stress, anxiety, and depression threatens to overload the medical system and impede progress toward a greater sense of common humanity, and when the world can seem more divided than united, giving and receiving kindness is a way to connect at a deeper level. Kindness is a means of acknowledging that the needs of others are worthy of attention and that actions on their behalf are meaningful.</span></p><h2 data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">What Is Kindness?</span></h2><p data-dcnode-id="742"><span data-dcnode-id="749" instrument_node="">According to positive psychology (study of what makes communities thrive) pioneers Martin Seligman and David Petersen in their book Character Strengths and Virtues, </span><i data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">kindness</span></i><span data-dcnode-id="746" instrument_node=""> refers to “doing favors and good deeds for others; helping them; taking care of them.” </span><a class="Link" data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chopra.com/articles/4-magical-side-effects-of-kindness" target="_blank"><span data-dcnode-id="745" instrument_node="">Kindness</span></a><span data-dcnode-id="743" instrument_node=""> can be broken into two main categories:</span></p><ol data-dcnode-id="737"><li data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Being kind</span></li><li data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Receiving kindness from others</span></li></ol><p data-dcnode-id="725"><span data-dcnode-id="736" instrument_node="">Kindness is a chance to practice one of the </span><i data-dcnode-id="730"><a class="Link" data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chopra.com/articles/the-7-spiritual-laws-of-success" target="_blank"><span data-dcnode-id="735" instrument_node="">Seven Spiritual Laws of Success</span></a><span data-dcnode-id="733" instrument_node="">—</span><a class="Link" data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chopra.com/articles/the-law-of-giving-receiving" target="_blank"><span data-dcnode-id="732" instrument_node="">the Law of Giving and Receiving</span></a></i><span data-dcnode-id="729" instrument_node="">. Humans are social creatures who historically needed connection to have survived, and according to psychology professor Dacher Keltner, author of </span><i data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Born to Be Good</span></i><span data-dcnode-id="726" instrument_node="">, humans needed kindness to help peacefully overcome conflicts and create cohesion between disparate groups.  </span></p><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">These social instincts can seem like reflexes, actions outside your control (like when you put your arm up to stop your passenger from flying forward when you brake suddenly) and yet kindness can be both instinctual and learned. Kindness helps you to see how you are similar rather than how you are different.</span></p><h2 data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Giving Kindness</span></h2><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Young children tend to help each other. Their desire to help seems innate. They do it without expectations of praise or reward. The act itself has a built-in reward—the pleasure of feeling useful. As they grow, this natural kindness is shaped by a culture that sometimes discourages collaboration by rewarding competition.  </span></p><p data-dcnode-id="705"><span data-dcnode-id="718" instrument_node="">Children who engage in acts of kindness tend to be </span><a class="Link" data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologicalscience.org/observer/the-compassionate-mind" target="_blank"><span data-dcnode-id="717" instrument_node="">more well connected</span></a><span data-dcnode-id="715" instrument_node="">, have higher levels of </span><a class="Link" data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedaily.com/releases/2012/12/121226223051.htm" target="_blank"><span data-dcnode-id="714" instrument_node="">peer acceptance</span></a><span data-dcnode-id="712" instrument_node="">, and are </span><a class="Link" data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.plos.org/plosone/article%3Fid%3D10.1371/journal.pone.0051380" target="_blank"><span data-dcnode-id="711" instrument_node="">less likely to bully others</span></a><span data-dcnode-id="709" instrument_node="">. In adults, kindness is often one of the traits we seek in a partner. </span><a class="Link" data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S1090513804000066%3Fvia%253Dihub" target="_blank"><span data-dcnode-id="708" instrument_node="">One study</span></a><span data-dcnode-id="706" instrument_node=""> showed that people who were kind were seen as more attractive physically, too! Personality traits are directly tied to your perception of how physically attractive someone is. Kindness, then, should be encouraged. But how?</span></p><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">You can encourage kindness through:</span></p><ul data-dcnode-id="694"><li data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Modeling acts of kindness</span></li><li data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Giving responsibilities and opportunities</span></li><li data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Inspiring positive actions toward others</span></li><li data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Teaching empathy and compassion</span></li></ul><p data-dcnode-id="689"><span data-dcnode-id="693" instrument_node="">Notice the list does not include rewards. </span><a class="Link" data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eva.mpg.de/psycho/staff/tomas/pdf/Warneken_Tomasello_DevPsy_2008.pdf" target="_blank"><span data-dcnode-id="692" instrument_node="">Rewarding kind behavior</span></a><span data-dcnode-id="690" instrument_node=""> makes it less likely that a child will continue being helpful. Perhaps that speaks to the better angels of nature. People are good for goodness’s sake, not for applause.</span></p><p data-dcnode-id="681"><b data-dcnode-id="682"><i data-dcnode-id="683"><span data-dcnode-id="688" instrument_node="">Joy is a tap away. </span><u data-dcnode-id="685"><a class="Link" data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//app.chopra.com/CbbY/1275b40d" target="_blank"><span data-dcnode-id="687" instrument_node="">Download the Chopra App</span></a></u><span data-dcnode-id="684" instrument_node=""> for personalized well-being guidance you can access anywhere. Isn’t that a happy thought?</span></i></b></p><h2 data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">How to Show Kindness</span></h2><p data-dcnode-id="674"><span data-dcnode-id="678" instrument_node="">The great thing about kindness is that you have a </span><a class="Link" data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chopra.com/articles/99-simple-ways-to-show-kindness" target="_blank"><span data-dcnode-id="677" instrument_node="">free lifetime unlimited supply</span></a><span data-dcnode-id="675" instrument_node="">. The more you give, the more you have. Here are a few ways to get you started:</span></p><ul data-dcnode-id="637"><li data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Listen</span></li><li data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Smile</span></li><li data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Hug (with a mask on) </span></li><li data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Hold a door for someone</span></li><li data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Pick up litter</span></li><li data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Let someone into your lane while driving</span></li><li data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Pay for the order behind you in the drive-thru </span></li><li data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Take a neighbor’s garbage bins to and from the curb</span></li><li data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Compliment a friend, co-worker, or family member</span></li><li data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Clean up after yourself</span></li><li data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Send a text to a loved one</span></li><li data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Learn your partner’s “love language,”, and then use it</span></li><li data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Notice someone who seems lonely and invite them along with you</span></li><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Let someone who wants to help you, help</span></li><li data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Don’t offer advice unless asked</span></li><li data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Share silence with someone</span></li><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Engage in random acts of kindness</span></li><li data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Engage in kind acts that are not random at all</span></li></ul><h2 data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Receiving Kindness</span></h2><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">If you are like most people, you probably find it easier to be kind than to be on the receiving act of a kind act. When someone compliments you, do you reply, “it was nothing” or “no problem”? Many people have adopted this learned behavior as a way of being humble, but what this actually does is constrict the flow of the energy of giving and receiving. If someone gives you a compliment, not receiving it stops its power for both the giver and the receiver.</span></p><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Sometimes receiving kindness and compassion can feel threatening, as though the one being kind is somehow superior. If you notice you have trouble receiving gifts, compliments, or acts of generosity and love, spend some time reflecting on why. Who taught you to behave this way? Is it serving you and those around you?</span></p><h2 data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">What Gets in the Way of Kindness?</span></h2><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">You may encounter many stumbling blocks on the path of showing kindness to others. For example:</span></p><ul data-dcnode-id="610"><li data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">External rewards</span></li><li data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Self-interest (you can’t give to get)</span></li><li data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Risk to self or others (it requires bravery to risk being rebuffed)</span></li><li data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Lack of confidence</span></li><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Not being aware of others; too busy and distracted</span></li><li data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Negative emotions</span></li><li data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Hunger</span></li><li data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Fatigue</span></li></ul><p data-dcnode-id="607"><span data-dcnode-id="609" instrument_node="">Any one of these complications may stop you (even temporarily) from receiving or showing kindness. Being aware of your circumstances is the first way to counteract these (hopefully temporary) stops on your kindness journey.</span><br data-dcnode-id="608"></p><h2 data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">How to Improve and Mental Health</span></h2><p data-dcnode-id="596"><span data-dcnode-id="604" instrument_node="">The effects of kindness and mental health care are connected. Mental health happens on a continuum that ranges from mental illness and languishing to mental wellness and flourishing. Our </span><a class="Link" data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chopra.com/health-and-well-being" target="_blank"><span data-dcnode-id="603" instrument_node="">wellness retreats</span></a><span data-dcnode-id="601" instrument_node=""> help give you the tools to achieve emotional well-being and mental clarity, allowing kindness to naturally develop within. No matter where you sit on that continuum, kindness and compassion have the ability to lift you toward </span><i data-dcnode-id="598"><a class="Link" data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.sagepub.com/doi/full/10.1177/0141076816643333" target="_blank"><span data-dcnode-id="600" instrument_node="">flourishing</span></a></i><span data-dcnode-id="597" instrument_node="">—a state that is commonly described as one where you feel happy, engaged, energized, and satisfied with life. This might be why volunteering and philanthropy feel so good. Being kind helps you to feel good and boosts your mood.</span></p><h2 data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">The Ripple Effect</span></h2><p data-dcnode-id="587"><a class="Link" data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chopra.com/articles/7-random-acts-of-kindness-in-7-days" target="_blank"><span data-dcnode-id="593" instrument_node="">Kindness begins with you</span></a><span data-dcnode-id="591" instrument_node="">. Then it involves another which turns the “me” to “we.” Soon the "we’s" affect the community. Consider listening to the WBUR podcast called </span><a class="Link" data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wbur.org/kindworld" target="_blank"><span data-dcnode-id="590" instrument_node="">Kind World</span></a><span data-dcnode-id="588" instrument_node="">. Each episode shares a story that reminds listeners how a simple act of kindness changes the lives of both the individual being kind and the recipient. The ripple here also includes the listeners who are influenced simply by hearing stories of kindness.</span></p><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">When kindness is authentically given and received it lifts the well-being and mood of everyone involved. There’s no downside or side effect of positive feelings. Kindness is good.</span></p><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">If you have a story of how a kind act made a difference in your life, please share it in the comments below. You never know how your story might impact the life of another.</span></p><p data-dcnode-id="579"><i data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Kind hearts are the gardens. Kind thoughts are the roots. Kind words are the blossoms. Kind deeds are the fruits</span></i><span data-dcnode-id="580" instrument_node="">. —Kirpal Singh, spiritual master</span></p><p data-dcnode-id="572"><u data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">*Editor’s Note:</span></u><span data-dcnode-id="576" instrument_node=""> </span><i data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">The information in this article is intended for your educational use only and is not a substitute for professional medical advice, diagnosis, or treatment. Always seek the advice of your physician or other qualified health providers with any questions you may have regarding a medical condition and before undertaking any diet, supplement, fitness, or other health programs.</span></i><br data-dcnode-id="573"></p><span data-dcnode-id="571" instrument_node="">
