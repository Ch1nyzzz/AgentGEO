33wubrfki0l68.cloudfront.net/c375f633375cf97db38d86c4ceb52c048632cae0/66093/static/576ad35c36f4daacf8cea00b93890dd1/twitter.svg&amp;raw"></a></li><li class="index-module--sharing-buttons-entry--cOyab" data-dcnode-id="321"><a data-dcnode-id="322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/link/%3Fmedia%3Dhttps%253A%252F%252Fimages.ctfassets.net%252F90pc6zknij8o%252F3f3Fat9HRoHyZkyNJJzHOi%252F66d56c6f8a3f8036cabc6da5b82410cd%252FBLOG_CONTENT_exercise_and_happiness.jpg%253Fw%253D1200%2526h%253D630%2526q%253D50%2526fit%253Dfill%2526f%253Dfaces%26description%3DWe%2520all%2520know%2520that%2520exercise%2520is%2520beneficial%2520for%2520a%2520healthy%2520body.%2520But%2520did%2520you%2520know%2520that%2520regular%2520exercise%2520plays%2520a%2520big%2520role%2520in%2520boosting%2520happy%2520hormones%2520like%2520endorphins%252C%2520serotonin%2520and%2520dopamine%253F%2520Learn%2520how%2520working%2520out%2520balances%2520your%2520mind%2520and%2520body%2520for%2520a%2520happier%252C%2520healthier%2520you%21%26url%3Dhttps%253A%252F%252F8fit.com%252Ffitness%252Fexercise-and-happiness%252F%253Futm_source%253DContentLP%2526utm_medium%253DReferral%2526utm_campaign%253D_pin" rel="noopener noreferrer" target="_blank"><img alt="pinterest" class="index-module--icon--gGE-E" data-dcnode-id="323" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d33wubrfki0l68.cloudfront.net/ff93acafdd00984c0fd4c268f45e0e286b9684d6/6e6ff/static/933faeb288bf0b27ad9e325bcb5c28f7/pinterest.svg&amp;raw"></a></li></ul></div><div class="index-module--sidebar-area-fixed-cta--fx7nY" data-dcnode-id="318"></div></div><div class="flexboxgrid-module--col-xs-12--eIppi flexboxgrid-module--col-md-8--l+nn9 flexboxgrid-module--col-lg-6--RSSUf" data-dcnode-id="188"><div class="index-module--rtf-wrapper--J9sVn" data-dcnode-id="220"><p class="index-module--paragraph-block--kC1hs" data-dcnode-id="312" data-drop-cap="true"><span data-dcnode-id="316" instrument_node="">Did you know that when you start to exercise regularly, you not only begin to notice changes to your physique but also significant improvements to your health that extend beyond your physical appearance? Exercise goes a long way to&nbsp;</span><a data-dcnode-id="314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//8fit.com/lifestyle/daily-habits-help-boost-confidence"><span data-dcnode-id="315" instrument_node="">improve your general mood</span></a><span data-dcnode-id="313" instrument_node="">, the quality of your sleep as well as support your immune system.</span></p><h2 class="index-module--heading-block--N07zL" data-dcnode-id="310" id="how-does-exercise-make-you-happy"><span data-dcnode-id="311" instrument_node="">How does exercise make you happy?</span></h2><p class="index-module--paragraph-block--kC1hs" data-dcnode-id="308" data-drop-cap="false"><span data-dcnode-id="309" instrument_node="">When it comes to exercise and depression, studies show that maintaining a regular exercise routine can supplement proper counseling or therapy in the treatment of mild to moderate depression and, in some cases, is as effective as antidepressant medication.</span></p><p class="index-module--paragraph-block--kC1hs" data-dcnode-id="300" data-drop-cap="false"><span data-dcnode-id="307" instrument_node="">Now for the&nbsp;</span><a data-dcnode-id="305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//8fit.com/lifestyle/fitness-myths-debunked-sport-and-exercise-science"><span data-dcnode-id="306" instrument_node="">science</span></a><span data-dcnode-id="304" instrument_node="">. So what happens to our brains when we exercise? Working out leads to changes in your brain, such as increased blood flow and the creation of new neural pathways. Hormones such as endorphins, serotonin,&nbsp;</span><a data-dcnode-id="302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//8fit.com/nutrition/how-to-break-up-with-sugar"><span data-dcnode-id="303" instrument_node="">dopamine</span></a><span data-dcnode-id="301" instrument_node="">, and testosterone are also released in response to increased physical activity.</span></p><ul class="index-module--list-block--TrrJ2" data-dcnode-id="294"><li class="index-module--list-block-item--J9SSb" data-dcnode-id="295"><p class="index-module--list-block-item-paragraph--hDfRO" data-dcnode-id="296"><b data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Endorphins </span></b><span data-dcnode-id="297" instrument_node="">give you that post-exercise high-as-a-kite feeling. As your body’s natural painkillers, they reduce discomfort, enhance pleasure and improve self-esteem.</span></p></li></ul><ul class="index-module--list-block--TrrJ2" data-dcnode-id="288"><li class="index-module--list-block-item--J9SSb" data-dcnode-id="289"><p class="index-module--list-block-item-paragraph--hDfRO" data-dcnode-id="290"><b data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Serotonin </span></b><span data-dcnode-id="291" instrument_node="">controls your appetite, helps you sleep sounder, and regulates your mood. These factors all go hand-in-hand to make us feel happier, calmer, and more stable.</span></p></li></ul><ul class="index-module--list-block--TrrJ2" data-dcnode-id="282"><li class="index-module--list-block-item--J9SSb" data-dcnode-id="283"><p class="index-module--list-block-item-paragraph--hDfRO" data-dcnode-id="284"><b data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Dopamine </span></b><span data-dcnode-id="285" instrument_node="">is that pleasurable habit-forming hormone that keeps you coming back for more. It signals the reward and pleasure centers in our brain’s, which help motivate us to take action and work towards things that make us feel good.</span></p></li></ul><ul class="index-module--list-block--TrrJ2" data-dcnode-id="276"><li class="index-module--list-block-item--J9SSb" data-dcnode-id="277"><p class="index-module--list-block-item-paragraph--hDfRO" data-dcnode-id="278"><b data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Testosterone</span></b><span data-dcnode-id="279" instrument_node="">, crucial for both men and women, is important for your metabolism, muscle growth and libido. Low levels can lead to depression and obesity. Regular exercise, especially endurance/resistance training, raises testosterone levels.</span></p></li></ul><h2 class="index-module--heading-block--N07zL" data-dcnode-id="274" id="exercise-and-stress-reduction"><span data-dcnode-id="275" instrument_node="">Exercise and stress reduction</span></h2><p class="index-module--paragraph-block--kC1hs" data-dcnode-id="266" data-drop-cap="false"><span data-dcnode-id="273" instrument_node=""></span><a data-dcnode-id="271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mayoclinic.org/healthy-lifestyle/stress-management/in-depth/stress/art-20046037" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="272" instrument_node="">Chronic stress</span></a><span data-dcnode-id="270" instrument_node="">&nbsp;is a major factor in many modern-day mental ailments such as depression and anxiety. The pressure to meet life’s demands can result in the overactivation of “fight or flight” hormones,&nbsp;</span><a data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//8fit.com/lifestyle/how-to-prevent-stress-and-weight-gain"><span data-dcnode-id="269" instrument_node="">cortisol</span></a><span data-dcnode-id="267" instrument_node="">&nbsp;and adrenaline. The overproduction of these hormones over an extended period is the root of most stress-related illness. So what has this got to do with regular exercise you may ask? Well, regular exercise releases the previously listed “happy” hormones and counterbalances the overproduction of cortisol and adrenaline.</span></p><p class="index-module--paragraph-block--kC1hs" data-dcnode-id="264" data-drop-cap="false"><span data-dcnode-id="265" instrument_node="">Now take a moment and think about how you feel when you’re stressed. Do you notice a lot of muscle tension? Do you experience back pain, an upset stomach, or headaches? In addition to hormonal balance, exercise helps pump more blood and oxygen through your body, relieving tense muscles. Once your body relaxes, your mind follows suit.</span></p><div class="index-module--contentful-asset--09NNu" data-dcnode-id="254"><div class="gatsby-image-wrapper" data-dcnode-id="255" style="position:relative;overflow:hidden"><div aria-hidden="true" data-dcnode-id="263" style="width:100%;padding-bottom:66.66666666666667%"></div><img alt="Noureen, woman, planking, female, smiling" aria-hidden="true" data-dcnode-id="262" src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEAlgCWAAD/2wBDABALDA4MChAODQ4SERATGCgaGBYWGDEjJR0oOjM9PDkzODdASFxOQERXRTc4UG1RV19iZ2hnPk1xeXBkeFxlZ2P/2wBDARESEhgVGC8aGi9jQjhCY2NjY2NjY2NjY2NjY2NjY2NjY2NjY2NjY2NjY2NjY2NjY2NjY2NjY2NjY2NjY2NjY2P/wAARCAANABQDAREAAhEBAxEB/8QAFwAAAwEAAAAAAAAAAAAAAAAAAQMFBP/EACEQAAICAQQCAwAAAAAAAAAAAAECAxEABAUSMSHRE0FR/8QAFwEBAQEBAAAAAAAAAAAAAAAAAgMEAf/EABwRAQADAQEAAwAAAAAAAAAAAAEAAhESMRMhIv/aAAwDAQACEQMRAD8ArJuczNfFQAfzJjH8cj7rHpBuMMzQM7qQ0oHRuj7xHT5F+K++xG5fJBrZI9NGqxrVWvLK0tpqQ2wcJrSfgQ5QMKvj1mWrjL2rpG6aBdRFLNPbsFLn6v1mheQCZw6fuCWNZHMjgW3nwOsVTkycXXZ//9k=" style="position: absolute; top: 0px; left: 0px; width: 100%; height: 100%; object-fit: cover; object-position: center center; opacity: 0; transition-delay: 500ms;"><picture data-dcnode-id="258"><source data-dcnode-id="261" sizes="(max-width: 628px) 100vw, 628px" srcset="//images.ctfassets.net/90pc6zknij8o/40siWKUajT8uwCXZjrMGae/1f99862dd5bfef410f42fe554348630a/171106_wellgood_SHOOTING_office_019-1.jpg?w=157&amp;h=105&amp;q=50&amp;fm=webp 157w,

//images.ctfassets.net/90pc6zknij8o/40siWKUajT8uwCXZjrMGae/1f99862dd5bfef410f42fe554348630a/171106_wellgood_SHOOTING_office_019-1.jpg?w=900&amp;h=600&amp;q=50 900w" src="//images.ctfassets.net/90pc6zknij8o/40siWKUajT8uwCXZjrMGae/1f99862dd5bfef410f42fe554348630a/171106_wellgood_SHOOTING_office_019-1.jpg?w=628&amp;q=50" alt="Noureen, woman, planking, female, smiling" style="position:absolute;top:0;left:0;opacity:1;width:100%;height:100%;object-fit:cover;object-position:center"/&gt;&lt;/picture&gt;</span></noscript></div></div><h2 class="index-module--heading-block--N07zL" data-dcnode-id="252" id="state-of-play"><span data-dcnode-id="253" instrument_node="">State of play</span></h2><p class="index-module--paragraph-block--kC1hs" data-dcnode-id="250" data-drop-cap="false"><span data-dcnode-id="251" instrument_node="">Treat exercise as “play time” and give your brain a needed break from negative thoughts or rumination. Working out requires you to be fully present in the here and now, so you won’t have to time to ponder the more dismal goings on in your life. If you reframe the repetitive movements of exercise as a form of moving meditation, you’ll be able to foster a sense of calm and clarity.</span></p><h2 class="index-module--heading-block--N07zL" data-dcnode-id="248" id="rev-up-your-metabolism"><span data-dcnode-id="249" instrument_node="">Rev up your metabolism</span></h2><aside class="index-module--contentful-tooltip---4jpp" data-dcnode-id="243"><strong class="index-module--contentful-tooltip-title--lojPQ" data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Tip</span></strong><p class="index-module--contentful-tooltip-body--mYPhC" data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Aerobic exercise (running, Zumba, HIIT, and other cardio) will help you burn calories. While strength training will make your body a more efficient calorie-burning machine, even when you're at rest.
</span></p></aside><p class="index-module--paragraph-block--kC1hs" data-dcnode-id="238" data-drop-cap="false"><span data-dcnode-id="242" instrument_node="">Want to&nbsp;</span><a data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//8fit.com/fitness/understanding-metabolism-how-to-boost-your-metabolic-rate"><span data-dcnode-id="241" instrument_node="">reactivate your metabolism</span></a><span data-dcnode-id="239" instrument_node="">&nbsp;and have it humming like a well-oiled engine? Then maintain a regular workout routine and support your body in converting fuel (food) into energy more efficiently. Muscle cells burn more energy than fat cells, so working out and building more lean body mass amp up your metabolism.</span></p><h2 class="index-module--heading-block--N07zL" data-dcnode-id="236" id="exercise-for-a-good-night-s-sleep"><span data-dcnode-id="237" instrument_node="">Exercise for a good night’s sleep</span></h2><p class="index-module--paragraph-block--kC1hs" data-dcnode-id="228" data-drop-cap="false"><span data-dcnode-id="235" instrument_node="">Ask any&nbsp;</span><a data-dcnode-id="233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//8fit.com/lifestyle/how-to-stay-active-as-a-busy-parent/"><span data-dcnode-id="234" instrument_node="">new parent</span></a><span data-dcnode-id="232" instrument_node="">, a lack of sleep has a profound effect on mood, concentration and can even contribute to difficulty losing weight. If you find falling or staying asleep challenging and counting sheep just isn’t cutting it, then you may want to consider upping your physical activity. Regular exercise has been shown to&nbsp;</span><a data-dcnode-id="230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//8fit.com/lifestyle/sleep-why-you-need-it-and-how-to-do-it-better"><span data-dcnode-id="231" instrument_node="">improve quality of sleep</span></a><span data-dcnode-id="229" instrument_node="">. Even short bursts of exercise in the morning or afternoon can help regulate your sleep patterns. Keep in mind workouts in the evening may energize you too much before bedtime. Instead try more relaxing exercises such as yoga or gentle stretching.</span></p><h2 class="index-module--heading-block--N07zL" data-dcnode-id="226" id="boost-your-immune-system"><span data-dcnode-id="227" instrument_node="">Boost your immune system</span></h2><p class="index-module--paragraph-block--kC1hs" data-dcnode-id="221" data-drop-cap="false"><span data-dcnode-id="225" instrument_node="">As if that wasn’t enough, not only does exercise strengthen your mental resilience and neutralize the release of stress hormones, but resulting lower stress levels can&nbsp;</span><a data-dcnode-id="223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//8fit.com/nutrition/immune-boosting-recipes-help-combat-flu"><span data-dcnode-id="224" instrument_node="">improve your immunity</span></a><span data-dcnode-id="222" instrument_node="">. Exercise boosts your immune system by circulating white blood cells faster throughout your system and fighting disease quicker.</span></p></div><div class="index-module--container--iCcvJ" data-dcnode-id="192" data-issubmitted="false"><div class="index-module--background-container--SlSAk" data-dcnode-id="209"><div class="index-module--background-image--vqN0x" data-dcnode-id="210" data-issubmitted="false"><div class="gatsby-image-wrapper" data-dcnode-id="211" style="position:relative;overflow:hidden"><div aria-hidden="true" data-dcnode-id="219" style="width:100%;padding-bottom:150.2183406113537%"></div><img alt="" aria-hidden="true" data-dcnode-id="218" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAANCAMAAACejr5sAAABj1BMVEXg3+Tf4OTg4OTf2NPf3+Pf3+Tg4OXf3uPe3uPe3eLg3+Pf3uLg3dzf29rg4eXh4OXf3+Le2tff3eDezbzg3uHg29ng3uDg3+Lh3uDg1cng29rg3d7d3OHc2+Dh4eXg3t/e2Nbe293d2tvb2uDa2d7Z2N3Y1tzg0b7f19Hf2dfg3Nze29zd3ODd19Tb2NvY193X1tzU0tnSz9
