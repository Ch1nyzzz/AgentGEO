</span><h3 class="post-title tag-page-post-type-title" data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Posts</span></h3><article class="post-entry post-entry-type-standard post-entry-279110 post-loop-1 post-parity-odd post-entry-last single-big post-279110 post type-post status-publish format-standard hentry category-global-poverty category-mental-health tag-cycle-of-poverty tag-how-does-poverty-affect-mental-health tag-povertys-toll-on-mental-health" data-dcnode-id="313" itemscope="itemscope" itemtype="https://schema.org/BlogPosting"><div class="blog-meta" data-dcnode-id="456"></div><div class="entry-content-wrapper clearfix standard-content" data-dcnode-id="350"><header class="entry-content-header" data-dcnode-id="444"><div class="av-heading-wrapper" data-dcnode-id="445"><span class="blog-categories minor-meta" data-dcnode-id="450"><a data-dcnode-id="454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borgenproject.org/category/global-poverty/" rel="tag"><span data-dcnode-id="455" instrument_node="">Global Poverty</span></a><span data-dcnode-id="453" instrument_node="">, </span><a data-dcnode-id="451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borgenproject.org/category/mental-health/" rel="tag"><span data-dcnode-id="452" instrument_node="">Mental Health</span></a></span><h2 class="post-title entry-title" data-dcnode-id="446" itemprop="headline"><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borgenproject.org/povertys-toll-on-mental-health/" rel="bookmark" title="Permanent Link: Poverty’s Toll on Mental Health"><span data-dcnode-id="449" instrument_node="">Poverty’s Toll on Mental Health</span><span class="post-format-icon minor-meta" data-dcnode-id="448"></span></a></h2></div></header><span class="av-vertical-delimiter" data-dcnode-id="443"></span><div class="entry-content" data-dcnode-id="356" itemprop="text"><p data-dcnode-id="437"><img alt="Ending Modern Slavery One App at a Time" class="alignnone wp-image-284122" data-dcnode-id="442" height="425" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borgenproject.org/wp-content/uploads/poverty-mental-health-1-530x352.jpg&amp;raw" srcset="https://borgenproject.org/wp-content/uploads/poverty-mental-health-1-530x352.jpg 530w, https://borgenproject.org/wp-content/uploads/poverty-mental-health-1-300x199.jpg 300w, https://borgenproject.org/wp-content/uploads/poverty-mental-health-1.jpg 640w" width="640"><span data-dcnode-id="441" instrument_node="">Approximately </span><a data-dcnode-id="439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.who.int/whr/2001/media_centre/press_release/en/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="440" instrument_node="">one in four people</span></a><span data-dcnode-id="438" instrument_node=""> will be affected by a mental health disorder in their lifetime. There are strong links that show that living in poverty can take it a severy toll on one’s mental health. This article will examine poverty’s toll on mental health.</span></p><span data-dcnode-id="436" instrument_node="">
</span><h4 data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">What is mental health?</span></h4><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="432" instrument_node="">By definition, mental health is the condition regarding one’s psychological and emotional well-being. Mental health affects how one thinks, feels and acts. It can also dictate how someone copes with stress, their ability to relate to others and decision making. The most prevalent examples of mental health disorders are anxiety, depression, alcohol/drug use, Bipolar disorder, Schizophrenia and eating disorders. </span><a data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mentalhealth.gov/basics/what-is-mental-health" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="431" instrument_node="">According to Mentalhealth.gov</span></a><span data-dcnode-id="429" instrument_node="">, some factors that can contribute to mental health issues include:</span></p><span data-dcnode-id="427" instrument_node="">
</span><ul data-dcnode-id="411"><span data-dcnode-id="426" instrument_node="">
</span><li data-dcnode-id="422"><em data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Biological factors</span></em><span data-dcnode-id="423" instrument_node="">– genes, brain chemistry</span></li><span data-dcnode-id="421" instrument_node="">
</span><li data-dcnode-id="417"><em data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Life experiences</span></em><span data-dcnode-id="418" instrument_node="">– trauma, abuse, etc.</span></li><span data-dcnode-id="416" instrument_node="">
</span><li data-dcnode-id="413"><em data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Family history of mental health problems</span></em></li><span data-dcnode-id="412" instrument_node="">
</span></ul><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">The term ‘Mental Health’ has been around for quite some time, but it has gotten a reputation for being abused. There have been many cases over the years where people self-diagnose or lie to get out of particular circumstances. Because of this kind of abuse, some people don’t believe in mental health disorders at all. Although there is a vast variety of mental health issues, these disorders do exist and should be taken seriously.</span></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Everyone is different just like every health condition differs. There are some people who suffer from anxiety on a low spectrum, which can sometimes be maintained in-house, while there are others who suffer from anxiety on a high spectrum and may undergo daily panic attacks. This would be an example of someone who may need psychiatric help or medication.</span></p><span data-dcnode-id="404" instrument_node="">
</span><h4 data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">How does poverty affect mental health?</span></h4><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="400" instrument_node="">Poverty is considered a significant social determinant of mental health. Poverty is a perfect example of a </span><em data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">life experience </span></em><span data-dcnode-id="397" instrument_node="">that can affect one’s mental state. Physical health and wellness isn’t the only hardship that people in poverty endure. Being subjected to an impoverished environment where money, food and shelter is uncertain can lead to mental health complications.</span></p><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="394" instrument_node="">Although the idea of poverty being the cause of a mental illness is fairly new to science, there is evidence of a connection. According to </span><a data-dcnode-id="392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/sections/goatsandsoda/2016/10/30/499777541/can-poverty-lead-to-mental-illness" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="393" instrument_node="">National Public Radio</span></a><span data-dcnode-id="391" instrument_node="">, people that live in poverty appear to be at a higher risk for mental illnesses and show lower levels of happiness. It has been difficult to study people in poverty for statistical purposes, but the studies that have been done do exhibit signs that when financial circumstances are drastically affected, there’s a rise in rates of depression.</span></p><span data-dcnode-id="389" instrument_node="">
</span><h4 data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">How People in Poverty Are Affected</span></h4><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="385" instrument_node="">It’s a proven fact that living in poverty for any significant period of time automatically increases risk factors for health and mental problems. The </span><a data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//psychcentral.com/blog/the-vicious-cycle-of-poverty-and-mental-health/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="384" instrument_node="">vicious cycle of poverty</span></a><span data-dcnode-id="382" instrument_node=""> comes with the constant stress of finances- worrying if there’s enough money to eat and practicing bad eating habits because processed food is cheaper than healthy food.</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Stress is an immediate link to mental issues, such as depression, anxiety and, in extreme cases, multiple personality disorder. The rates of violence tend to also be higher among those that face economic tension. There are some cases where mental illnesses can be the cause for people to fall into poverty.</span></p><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="372"><span data-dcnode-id="376" instrument_node="">For people who have experienced poverty early in life, their risk of a mental illness is higher. Poverty’s toll on </span><a data-dcnode-id="374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.psychiatrictimes.com/special-reports/addressing-poverty-and-mental-illness/page/0/1" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="375" instrument_node="">mental health for children</span></a><span data-dcnode-id="373" instrument_node=""> can lead to higher rates of delinquency, depressive and anxiety disorders and higher rates for psychiatric disorders in adulthood.</span></p><span data-dcnode-id="371" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Although poverty’s toll on mental health is known, it’s still unclear how to best break this cycle. Perhaps more research will allow for solutions. Considering poverty doesn’t have to be a life-long condition, it is very possible for mental illnesses brought on by poverty to be alleviate if the people affected can be helped out of poverty.</span></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="364"><span data-dcnode-id="367" instrument_node="">– </span><em data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Kayla Sellers</span></em></p><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="358"><span class="imagecredit" data-dcnode-id="359"><span data-dcnode-id="362" instrument_node="">Photo: </span><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/julien_harneis/1354548776/in/photolist-SPbDj3-8vEXmG-bxYojk-mQWa9D-pBnTaT-Tb3fzd-o5n6F1-kMBxMt-nMZZee-o3r7wL-kMASUR-NpUkH9-34Gqaf-e4sQrj-dXZLNv-taaH8y-JHRn29-H144wi-NUzYuP-LrQwaA" rel="noopener"><span data-dcnode-id="361" instrument_node="">Flickr</span></a></span></p><span data-dcnode-id="357" instrument_node="">
</span></div><span class="post-meta-infos" data-dcnode-id="353"><time class="date-container minor-meta updated" data-dcnode-id="354" datetime="2018-10-10T01:30:11-07:00" itemprop="datePublished"><span data-dcnode-id="355" instrument_node="">October 10, 2018</span></time></span><footer class="entry-footer" data-dcnode-id="352"></footer><div class="post_delimiter" data-dcnode-id="351"></div></div><div class="post_author_timeline" data-dcnode-id="349"></div><span class="hidden" data-dcnode-id="314"><span data-dcnode-id="348" instrument_node="">
