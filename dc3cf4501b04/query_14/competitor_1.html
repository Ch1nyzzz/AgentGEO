    safe ground when we say that God is our friend.</span></p><span data-dcnode-id="566" instrument_node="">
</span><p align="justify" data-dcnode-id="561"><span data-dcnode-id="565" instrument_node="">I wonder if we always act toward God, as if we believe 
    with all our hearts that he is our friend. Some people are afraid of 
    God—afraid of what he will do to them, afraid of his attitude toward them. 
    There is a </span><i data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">reverential fear </span></i><span data-dcnode-id="562" instrument_node="">we should toward God; but I am talking of 
    that fear which dreads, which drives us away from God, rather to him. This 
    sort of fear makes us hesitate to be frank and open toward him; in fact, 
    many times we do not treat him as if we believe he is our friend.</span></p><span data-dcnode-id="560" instrument_node="">
</span><p align="justify" data-dcnode-id="555"><span data-dcnode-id="559" instrument_node="">Since God is our friend, it is natural for us act toward 
    him as we do toward our friends. In the first place, we </span><i data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">trust </span></i><span data-dcnode-id="556" instrument_node="">our 
    friends, rely upon them, have confidence in them. The closer our relation 
    with them, the more open our minds hearts are toward them. We are sure of 
    them. We do not question their loyalty to us. We feel free to approach them 
    at any time and upon most any subject. We enjoy being in their company. We 
    are drawn together by mutual ties of confidence and esteem that are precious 
    to us.</span></p><span data-dcnode-id="554" instrument_node="">
</span><p align="justify" data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">True friendship with God will produce these same results 
    between us and God, that true human friendship brings between two 
    individuals.</span></p><b data-dcnode-id="548"><span data-dcnode-id="551" instrument_node="">
</span><p align="justify" data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">CHARACTERISTICS OF FRIENDSHIP</span></p></b><span data-dcnode-id="547" instrument_node="">
</span><p align="justify" data-dcnode-id="536"><span data-dcnode-id="546" instrument_node="">We </span><i data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">confide </span></i><span data-dcnode-id="543" instrument_node="">in our friends. We feel free to let 
    them know things about us that we would not tell others. We seek their </span><i data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">company 
    </span></i><span data-dcnode-id="540" instrument_node="">when we are in trouble. We seek their </span><i data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">comfort </span></i><span data-dcnode-id="537" instrument_node="">in sorrow. 
    We tell them our problems and the things that trouble us. </span></p><span data-dcnode-id="535" instrument_node="">
</span><p align="justify" data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Do we act in the same way toward God? If he is really our 
    friend, then we ought to be just as free to confide in him as we are to 
    confide in any earthly friend, no matter how long he has proved the 
    integrity and reality of his friendship. But do we actually confide in God 
    with the same confidence we do in our friends?</span></p><span data-dcnode-id="532" instrument_node="">
</span><p align="justify" data-dcnode-id="524"><span data-dcnode-id="531" instrument_node="">Another mark of friendship is that we </span><i data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">trust </span></i><span data-dcnode-id="528" instrument_node="">in 
    what our friends say. We trust in their integrity, their reliability, their 
    sincerity. When they tell us a thing, we accept it as being true. We have 
    faith in them. If we question their word, their reliability, or their 
    trueness to us—that means there is something lacking in the friendship; one 
    of the most precious elements of friendship is absent. Do we believe what 
    God says as truly and as unquestioningly as we believe what our friends say? 
    We read the Bible and see many great and precious </span><i data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">promises</span></i><span data-dcnode-id="525" instrument_node="">. Do we 
    believe these promises of God with the same assurance and unquestioning 
    certainty as we believe our nearest and best friend? Or do we believe more 
    in the word of some of our friends than we believe in God's Word, and trust 
    them more than we trust him?</span></p><span data-dcnode-id="523" instrument_node="">
</span><p align="justify" data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">In other words, do we think we have human friends who are 
    truer than our divine Friend? If so, we are missing something in God's 
    friendship—something that is the very heart of friendship, something that 
    makes friendship rich and blessed, and makes communion satisfying and 
    fellowship sweet.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p align="justify" data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">We are free toward our friends in our relationships with 
    them. Many times we can act towards them as we would not think of acting 
    toward stranger; for we know that our friends understand. There is such 
    comradeship and understanding, that we can open our hearts to them without 
    fear of offending them; we can be frank and natural.</span></p><span data-dcnode-id="517" instrument_node="">
</span><p align="justify" data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">That is just the way God wants us to be with him. If we 
    truly place his friendship toward us on the same basis as our best and 
    finest human friendships—then these human friendships will not be closer 
    than our friendship with him. And our conduct toward God will be just as 
    free, without constraint, as our conduct toward our friends in whom we have 
    the utmost confidence.</span></p><span data-dcnode-id="514" instrument_node="">
</span><p align="justify" data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">What really is our attitude toward God? What do we do 
    when we are in trouble? Do we shrink from him and from his ministers? Do we 
    hide our trouble? Do we bear our own burdens? When we need somebody to 
    understand, do we feel like taking the matter to God—and yet not feel really 
    free to do so? If this is the case, then we do not count him our friend to 
    the extent we ought. We are holding back something from our friendship, or 
    not taking something he offers. We ought to be freer in our relations with 
    God, in our trust in him. We ought to confide in him with more assurance. We 
    ought to believe what he says with more confidence than we show toward any 
    human friend.</span></p><span data-dcnode-id="511" instrument_node="">
</span><p align="justify" data-dcnode-id="506"><span data-dcnode-id="510" instrument_node="">He is </span><i data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">truly </span></i><span data-dcnode-id="507" instrument_node="">our friend. Let us hold an attitude 
    toward him that will bring out the fullness of this friendship and make us 
    partakers of his richness. Let us be whole-hearted friends toward God, and 
    he in return will be a whole-hearted friend toward us. Then there can be 
    that intimate understanding, that blessed fellowship, that sweet communion, 
    which will enrich our lives and make them full of all the blessedness of the 
    spiritual realities that God would have us possess and enjoy in this present 
    life.</span></p><font data-dcnode-id="502" size="4"><span data-dcnode-id="505" instrument_node="">
</span><p align="justify" data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="497"><b data-dcnode-id="498"><span data-dcnode-id="501" instrument_node="">
</span><p align="justify" data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Brace Up</span></p></b></font><span data-dcnode-id="496" instrument_node="">
</span><p align="justify" data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">When a person has met with a loss, is suffering as the 
    result of an accident, or is passing through a bereavement—friends often to 
    him, "Brace up—be a man." By this they mean: "Summon your courage and 
    resolution—prepare your will to endure. Collect all the force within you and 
    set them in operation to support, fortify, and sustain you in the time of 
    need."</span></p><span data-dcnode-id="493" instrument_node="">
</span><p align="justify" data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">There are often times when we need to summon all our 
    spiritual powers to resist things that oppose us. It is inevitable that 
    there will be times when we need all our courage and strength. But the God 
    who watches over us and loves us—is God of wisdom, and he will not permit us 
    to have more than we can stand. He makes no mistakes in judging our ability 
    to meet the varying circumstances of life. </span></p><span data-dcnode-id="490" instrument_node="">
</span><p align="justify" data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">There are many people who try to evade passing through 
    difficulties, but their evasion (or attempt to evade) only weakens 
    themselves; and if they do miss the conflict, they also miss the strength 
    that comes from gaining the victory. The poet tells us:</span></p><span data-dcnode-id="487" instrument_node="">
</span><p align="justify" data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">"I must fight, if I would win."</span></p><span data-dcnode-id="484" instrument_node="">
</span><p align="justify" data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">But instead of wanting to run away from the conflict, he 
    says,</span></p><span data-dcnode-id="481" instrument_node="">
</span><p align="justify" data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">"Increase my courage, Lord."</span></p><span data-dcnode-id="478" instrument_node="">
</span><p align="justify" data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">By this he means, "Help me to brace up and win; help me 
    to fight like a man, not like a coward."</span></p><span data-dcnode-id="475" instrument_node="">
</span><p align="justify" data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">We have within us, many unrealized powers. There is 
    always reserve power in us that is commonly unknown until with confidence in 
    ourselves we go forward determined to win. Then we find strength, where 
    there seemed to be only weakness. Sometimes, however, this natural strength 
    is not sufficient and we realize the need of reinforcements.</span></p><span data-dcnode-id="472" instrument_node="">
</span><p align="justify" data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Once I saw the framework of a building erected without 
    any braces. A heavy windstorm came, and the frame of the building went 
    crashing to the ground. The framework was strong enough; all it lacked was 
    braces. The same may be true of us sometimes. The framework of our Christian 
    life may be strong and properly fitted together, but there may come times 
    when we need additional braces. Then we have only to rem that God has in his 
    great storehouse an as supply of braces—all cut to fit the places in w they 
    will be needed. He has provided them especially for our use, and he invites 
    us to help ourselves to all we need. Let us find a few and la them for 
    future use.</span></p><span data-dcnode-id="469" instrument_node="">
</span><p align="justify" data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Are you feeling lonely and forsaken? Here are two braces 
    for you: </span></p><span data-dcnode-id="466" instrument_node="">
</span><p align="justify" data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">"I will never leave you nor forsake you!" (Hebrews 13:5)</span></p><span data-dcnode-id="463" instrument_node="">
</span><p align="justify" data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">"Surely, I am with you always, even unto the end of the 
    world! (Matthew 28:20)</span></p><span data-dcnode-id="460" instrument_node="">
</span><p align="justify" data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Are you tempted? "No temptation has seized you except 
    what is common to man. And God is faithful; he will not let you be tempted 
    beyond what you can bear. But when you are tempted, he will also provide a 
    way out so that you can stand up under it." (1 Corinthians 10:13). Remember 
    that the way for your escape is already made and that God tells you that you 
    can put this brace under you. If this one is not sufficient, there are many 
    others of the same kind in the storehouse.</span></p><span data-dcnode-id="457" instrument_node="">
</span><p align="justify" data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Are you in distress? Use these braces: </span></p><span data-dcnode-id="454" instrument_node="">
</span><p align="justify" data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">"From six calamities he will rescue you; in seven no harm 
    will befall you." (Job 5:19).</span></p><span data-dcnode-id="451" instrument_node="">
</span><p align="justify" data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">"Many are the afflictions of the righteous—but the Lord 
    delivers him out of them all" (Psalm 34:19). </span></p><span data-dcnode-id="448" instrument_node="">
</span><p align="justify" data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">"He gives power to the faint; and to those who have no 
    might, he increases strength. Those who wait upon the Lord shall renew their 
    strength; they shall mount up with wings as eagles; they shall run, and not 
    be weary; and they shall walk, and not faint" (Isaiah 40:29, 31).</span></p><span data-dcnode-id="445" instrument_node="">
</span><p align="justify" data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Here are braces to try when you are fearful: </span></p><span data-dcnode-id="442" instrument_node="">
</span><p align="justify" data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">"Fear not, I will help you!" </span></p><span data-dcnode-id="439" instrument_node="">
</span><p align="justify" data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">"The angel of the Lord encamps round about those who fear 
    him, and delivers them!" (Psalm 34:7).</span></p><span data-dcnode-id="436" instrument_node="">
</span><p align="justify" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Do you have enemies? Do they rise up against you as an 
    army? Run into the storehouse, and get Psalm 27:5: "In the time of trouble, 
    he shall hide me in his pavilion."</span></p><span data-dcnode-id="433" instrument_node="">
</span><p align="justify" data-dcnode-id="425"><span data-dcnode-id="432" instrument_node="">The </span><i data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">promises </span></i><span data-dcnode-id="429" instrument_node="">of God are not the only braces that 
    he gives us. His many </span><i data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">warnings </span></i><span data-dcnode-id="426" instrument_node="">will also serve the same purpose; for 
    instance, this one spoken by Jesus: "Take heed, and beware of covetousness: 
    for a man's life consists not in the abundance of the things which he 
    possesses" (Luke 12:15) . Or, "Watch and pray, lest you enter into 
    temptation" (Mark 14:38).</span></p><span data-dcnode-id="424" instrument_node="">
</span><p align="justify" data-dcnode-id="410"><span data-dcnode-id="423" instrument_node="">We may find braces not only in his </span><i data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">promises </span></i><span data-dcnode-id="420" instrument_node="">and </span><i data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">warnings</span></i><span data-dcnode-id="417" instrument_node="">, but also in the 
    </span><i data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">examples </span></i><span data-dcnode-id="414" instrument_node="">that are recorded in the 
    Bible. How often God sustained his people in their troubles and 
    difficulties. How often he gave victory and turned defeat into quest. Then, 
    too, examples of </span><i data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">failures </span></i><span data-dcnode-id="411" instrument_node="">record in the Bible will make very good 
    braces, if will give heed to them.</span></p><span data-dcnode-id="409" instrument_node="">
</span><p align="justify" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Have you ever needed braces, when you did seem to have 
    them? If so, that should show the need of being prepared for the time when 
    you may need them. I think it is a good idea to go through the Bible and 
    pick out certain texts you think will help you, and then mark them some way 
    in the margin. You might write the word "brace" on the margin opposite some 
    helpful scriptures. If you need a brace and cannot call anything to mind, 
    you can take your Bible a read the texts that you have marked "brace". You 
    will be surprised to find what a great help they will be to you. You might 
    start with Isaiah 41:13-14, "I am the LORD, your God, who takes hold of your 
    right hand and says to you, 'Do not fear; I will help you. Do not be afraid, 
    O worm Jacob, O little Israel, for I myself will help you!' declares the 
    LORD, your Redeemer, the Holy One of Israel." Add as many others as you 
    wish, and you will soon be braced up for any emergency!</span></p><font data-dcnode-id="403" size="4"><span data-dcnode-id="406" instrument_node="">
</span><p align="justify" data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="398"><b data-dcnode-id="399"><span data-dcnode-id="402" instrument_node="">
</span><p align="justify" data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Negative and Positive Living</span></p></b></font><span data-dcnode-id="397" instrument_node="">
</span><p align="justify" data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Our happiness and joy in life, depend to a great extent 
    upon our attitude of mind and heart. If we take a positive attitude toward 
    ourselves and toward life in general, if we approach our problems and our 
    work with the right mental attitude—then we shall have already taken a long 
    step toward success. If we hold a negative attitude toward things, then life 
    will be a struggle, and we shall not live the joyful life that is God's 
    purpose for us.</span></p><span data-dcnode-id="394" instrument_node="">
</span><p align="justify" data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Many Christians are always on the defensive. They are 
    always facing an enemy, either outside or within. When they look around 
    them—they see everything against them. They expect circumstances to be 
    against them and to hinder them. They look forward to life with serious 
    misgivings. Will they be a success? Will they be able to overcome the great 
    obstacles that confront them? Will they be able to overcome the enemies they 
    must meet?</span></p><span data-dcnode-id="391" instrument_node="">
</span><p align="justify" data-dcnode-id="386"><span data-dcnode-id="390" instrument_node="">Some people are all the time afraid of the </span><i data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">devil</span></i><span data-dcnode-id="387" instrument_node="">. 
    Even when they awake in the night, they think of him and are afraid. They 
    look upon as a constant struggle against his power. As they look ahead they 
    see their lives with a line of enemies on either side striking at them as 
    they pass. When they look within they find a similar discouraging situation. 
    Life to them is a constant battle to limit themselves, to repress something, 
    to force themselves into a certain line of conduct or a certain way 
    thinking, and to force their emotions into a certain set channel.</span></p><span data-dcnode-id="385" instrument_node="">
</span><p align="justify" data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">The great question to them is, Shall I be able to conquer 
    myself? Shall I be able to keep the unruly things within me in proper 
    balance? They look forward to a non-ending struggle with self. They are 
    fearful all the time, lest they do something wrong or say something wrong, 
    or take a wrong attitude toward somebody or something. They feel their own 
    weakness, and tremble at what the day may bring forth. They are constantly 
    harassed lest they do something wrong. They weigh their conduct carefully 
    and scrutinize the minutest detail. They are never tranquil and at ease, for 
    if they are not troubled about what has passed—then they are troubled about 
    what is going to happen. Then too, their emotions must be carefully 
    analyzed. Constantly keeping one's actions and emotions under the 
    microscope, can never result in happiness nor freedom; it is a bondage that 
    is almost unendurable.</span></p><span data-dcnode-id="382" instrument_node="">
</span><p align="justify" data-dcnode-id="362"><span data-dcnode-id="381" instrument_node="">There are thousands of people who desire to serve the 
    Lord, but to them serving the Lord seems to be a constant round of 
    self-denial and repression. There is more </span><i data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">fear </span></i><span data-dcnode-id="378" instrument_node="">than </span><i data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">joy </span></i><span data-dcnode-id="375" instrument_node="">in 
    their lives, more </span><i data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">trembling </span></i><span data-dcnode-id="372" instrument_node="">than </span><i data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">rejoicing</span></i><span data-dcnode-id="369" instrument_node="">, more </span><i data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">doubt </span></i><span data-dcnode-id="366" instrument_node="">than 
    </span><i data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">trust</span></i><span data-dcnode-id="363" instrument_node="">. This negative life, however, is not the life that the 
    Bible teaches us to live. This negative outlook and attitude toward life is 
    the exact opposite of what the Bible teaches as the Christian outlook and 
    attitude. "I would have you anxious for nothing," is the language of the 
    Scriptures. God wants us to live positive lives and to be on the offensive.</span></p><span data-dcnode-id="361" instrument_node="">
</span><p align="justify" data-dcnode-id="356"><span data-dcnode-id="360" instrument_node="">Christianity is not so much </span><i data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">not </span></i><span data-dcnode-id="357" instrument_node="">doing things, as 
    it is doing. It is not so much holding ourselves in restraint, as it is 
    using our energies in right channels. It is our privilege to look away from 
    ourselves, our weaknesses, our faults, and our failures—to Christ, the 
    life-giver, and the Holy Spirit, the power-giver, and God, the merciful 
    Father, watching over our lives for good. There will be some things in our 
    lives to repress. There will other things to guide. There will be enemies 
    the outside and on the inside, but these are to take our chief attention. We 
    are to be occupied rather with constructive work for God. We are use our 
    faculties and powers, not simply restrain them from being used in a wrong 
    way. It is privilege to be courageous, confident, expectant of victory.</span></p><span data-dcnode-id="355" instrument_node="">
</span><p align="justify" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">God wants us to be serene, without anxiety. He said, 
    "Come unto me, and I will give you rest." Do you have rest in your soul? If 
    not, it may because you are straining and struggling and pressing and 
    fighting—where you ought to be trusting and resting in confident assurance 
    in God. If we are simply resting in faith on the promises of God, then we 
    shall be conscious of divine help. We must keep our hearts open to God's 
    fountain of power, not trusting in self, but in his sufficiency. His grace 
    is offered to us, and his power will be supplied to us for every need. We 
    should not trust in sell, but in the living God. In him we can rest with the 
    full assurance that there will positively be no lack of what is necessary to 
    make us overcomers in any situation in life. This positive life is the way 
    of happiness and victory.</span></p><font data-dcnode-id="349" size="4"><span data-dcnode-id="352" instrument_node="">
</span><p align="justify" data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="344"><b data-dcnode-id="345"><span data-dcnode-id="348" instrument_node="">
</span><p align="justify" data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Getting Properly Adjusted</span></p></b></font><span data-dcnode-id="343" instrument_node="">
</span><p align="justify" data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">"That is a fine watch you have there," said a man to his 
    friend. "I suppose it keeps good time."</span></p><span data-dcnode-id="340" instrument_node="">
</span><p align="justify" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">"Yes," was the reply, "it is adjusted to heat, cold, and 
    position. I find it very reliable."</span></p><span data-dcnode-id="337" instrument_node="">
</span><p align="justify" data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">No doubt we have all seen advertisements in papers and 
    magazines showing a watch solidly frozen in a large cake of ice, with the 
    information that that type of watch is so adjusted that it will keep correct 
    time even when frozen. </span></p><span data-dcnode-id="334" instrument_node="">
</span><p align="justify" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">People need adjusting too. Many people say: "Oh, if my 
    circumstances were different! If the influences around me were 
    different—then I would be so different from what I am." </span></p><span data-dcnode-id="331" instrument_node="">
</span><p align="justify" data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">If we wait for the world to be made over, then we shall 
    never become what we desire to be, nor live the kind of lives we desire to 
    live. Whatever we become, we must become in the face of all these things and 
    in spite of them.</span></p><span data-dcnode-id="328" instrument_node="">
</span><p align="justify" data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">A wise old gentleman, giving advice to a young man, said: 
    "You must remember that this world is pretty much made already. Success 
    consists in adjustment. Don't try to re-make your world—adjust yourself to 
    the situation. Make the best what you have where you are." </span></p><span data-dcnode-id="325" instrument_node="">
</span><p align="justify" data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">A poet has pressed the same thought in these lines:</span></p><span data-dcnode-id="322" instrument_node="">
</span><p align="justify" data-dcnode-id="312"><span data-dcnode-id="321" instrument_node="">The world will never adjust itself,</span><br data-dcnode-id="320"><span data-dcnode-id="319" instrument_node="">To suit your whims to the letter.</span><br data-dcnode-id="318"><span data-dcnode-id="317" instrument_node="">Some things will go wrong</span><br data-dcnode-id="316"><span data-dcnode-id="315" instrument_node="">Your whole life long,</span><br data-dcnode-id="314"><span data-dcnode-id="313" instrument_node="">And the sooner you know it, the better.</span></p><span data-dcnode-id="311" instrument_node="">
</span><p align="justify" data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">There will always be things working to hinder us, to 
    disturb our calculations, to overthrow our plans, to heap obstacles in our 
    way, and to discourage us if we will let them. It is persistence in the face 
    of such things, that brings success. Almost any cheap watch will run pretty 
    well under very favorable circumstances, but that fact does not make it of 
    real value. Just when it most needed, it may fail; for circumstances cannot 
    always be favorable, even to a watch. The qualities in the watch that make 
    it run right under unfavorable circumstances, are what make it valuable. </span></p><span data-dcnode-id="308" instrument_node="">
</span><p align="justify" data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">It is just the same with men and women: the qualities 
    that enable them to adjust themselves to their circumstances and be a 
    success, even when things are unfavorable—are the things in their characters 
    that are really worth while.</span></p><span data-dcnode-id="305" instrument_node="">
</span><p align="justify" data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Many people say, "It is of no use for me to try to live a 
    Christian life under my present circumstances. I must wait until there is a 
    change of my situation." </span></p><span data-dcnode-id="302" instrument_node="">
</span><p align="justify" data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Other people are living Christian lives under similar 
    conditions. If you cannot be a success, then perhaps the trouble is in you, 
    not in your circumstances. The grace of God will enable us to adjust 
    ourselves so that in any situation, we can live acceptably to God. There is 
    no use of whining and complaining and saying, "I can't." There is no use of 
    looking forward to the future and hoping for a better time. Right now is the 
    time to win or lose. God says his grace is sufficient, and it is. You may 
    have abundance of it if you will, and by His help you can conquer every 
    circumstance.</span></p><font data-dcnode-id="296" size="4"><span data-dcnode-id="299" instrument_node="">
</span><p align="justify" data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="291"><b data-dcnode-id="292"><span data-dcnode-id="295" instrument_node="">
</span><p align="justify" data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Five Necessary Adjustments</span></p></b></font><span data-dcnode-id="290" instrument_node="">
</span><p align="justify" data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Every Christian needs at least five adjustments. </span></p><span data-dcnode-id="287" instrument_node="">
</span><p align="justify" data-dcnode-id="282"><span data-dcnode-id="286" instrument_node="">First, he must be adjusted to the </span><b data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Lord</span></b><span data-dcnode-id="283" instrument_node="">—for God 
    will never change his ways for us. Accepting his ways and submitting to him, 
    will adjust us to him so that his ways suit us all right and keep us from 
    complaining and always wishing things were otherwise.</span></p><span data-dcnode-id="281" instrument_node="">
</span><p align="justify" data-dcnode-id="276"><span data-dcnode-id="280" instrument_node="">Second, we must be adjusted to the </span><b data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">church</span></b><span data-dcnode-id="277" instrument_node="">. There 
    are people who are not satisfied with what their fellow Christians are 
    doing, or with their dispositions, or with the way things are conducted in 
    the church. They think they cannot live successfully or be on proper terms 
    with others, unless things are going to suit them. You need not expect that 
    everything in the church will ever come up to your ideas of what it ought to 
    be, nor that every individual will measure up to your standard, nor that 
    everybody will teach just as you think he ought to. Instead of being 
    irritated over such things and finding fault—serve the Lord faithfully, but 
    do not try to assume all the responsibility for what others do.</span></p><span data-dcnode-id="275" instrument_node="">
</span><p align="justify" data-dcnode-id="270"><span data-dcnode-id="274" instrument_node="">Third, we need to be so adjusted to the </span><b data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">world</span></b><span data-dcnode-id="271" instrument_node="">—that 
    no matter what comes up, it will not cause us to swerve from the true path. 
    Worldly influences will constantly come against our lives, but we must not 
    let them draw us away nor hinder our spirituality.</span></p><span data-dcnode-id="269" instrument_node="">
</span><p align="justify" data-dcnode-id="264"><span data-dcnode-id="268" instrument_node="">Fourth, you must get adjusted to our </span><b data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">circumstances</span></b><span data-dcnode-id="265" instrument_node="">—the 
    things that go wrong in the family or in your work. Every now and then, 
    something will disturb you or vex you—but you must learn how to meet these 
    things. Have you ever noticed that vessels on the lakes have timbers on 
    their sides to sheer them off the wharf and to prevent the hull from being 
    injured by striking the wharf? Christians need some such contrivances in 
    their lives to keep their troubles from getting too close to them. They need 
    to have something alongside to prevent them from being hurt by the impact of 
    natural circumstances. One of the best things to sheer off petty annoyances, 
    is a good smile. An attitude of cheerful courage, is a wonderful help too.</span></p><span data-dcnode-id="263" instrument_node="">
</span><p align="justify" data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Fifth, we need to be adjusted to heat, cold, and 
    position. </span></p><span data-dcnode-id="260" instrument_node="">
</span><p align="justify" data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">We need to be so adjusted to the HEAT of human 
    enthusiasm, that we shall not be carried away from our common sense and be 
    led into doing unwise things. We need to be so adjusted to emotionalism, 
    that our emotions will not run away with us nor the emotions of others 
    influence us too strongly. We need to be adjusted to the passions of others, 
    so that their anger, envy, jealousy, malice, and such like will not affect 
    us. We must be able to hold our own position and go our own way. We need to 
    have a definite personality of our own, to think for ourselves, and to keep 
    balanced—no matter how high the tide of enthusiasm, emotionalism, or passion 
    may run about us.</span></p><span data-dcnode-id="257" instrument_node="">
</span><p align="justify" data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">We need to be so adjusted to COLD that religious 
    formality will not freeze us out, nor the prejudice of others move us to ill 
    feeling, nor the indifference of others make us indifferent.</span></p><span data-dcnode-id="254" instrument_node="">
</span><p align="justify" data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">We need to be so adjusted to POSITION that we shall be 
    able to live a balanced Christian life in any surroundings. No matter 
    whether we are rich or poor, no matter what our social position, our 
    employment, or our associates, or whatever might naturally influence us—they 
    will not be able to draw us away from the Lord or prevent us from serving 
    him. God made us to live in this world and be victorious Christians in it. 
    "This is the victory that overcomes the world, even our faith."</span></p><span data-dcnode-id="251" instrument_node="">
</span><font data-dcnode-id="247" size="4"><span data-dcnode-id="250" instrument_node="">
</span><p align="justify" data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="242"><b data-dcnode-id="243"><span data-dcnode-id="246" instrument_node="">
</span><p align="justify" data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Where Is Your God?</span></p></b></font><span data-dcnode-id="241" instrument_node="">
</span><p align="justify" data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">"Your God is far away," said a heathen man to a 
    missionary, "but our God is sitting here in the temple. We can see him and 
    come into his presence and make our offerings before his face. But your God 
    is far away—you cannot see him—and you do not know where he is."</span></p><span data-dcnode-id="238" instrument_node="">
</span><p align="justify" data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Because this man could not see the Christian's God with 
    his natural eyes, God seemed unreal to him. He could not see how a faraway 
    God could influence the Christian's life. Is the idea of a God afar off, the 
    true Christian idea of God? Where is your God today? Is he far away in 
    Heaven, leaving you alone here? Does he seem almost out of your reach? Is he 
    almost too far away to come into real contact with your life, or for you to 
    come into real contact with him? Is he so far away that only your most 
    earnest and anguished cry can reach him? Must you strive and struggle? Must 
    you grow desperate, before you can get his attention—or have hope that he 
    will hear you and take notice of your petition? Does it seem that only by 
    the most persistent and earnest effort, only by summoning all your forces 
    and by the utmost intensity of purpose—you can force yourself across that 
    great intervening space and now and then come into his presence? Do you seem 
    so far away from him, that divine help can rarely come to you, that you 
    rarely expect it? Do you feel that you must fight your battles alone except 
    in rare intervals and great crises? Can help be expected, only in your 
    extremity?</span></p><span data-dcnode-id="235" instrument_node="">
</span><p align="justify" data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Where is your God? Does your heart grow lonely? Do you 
    long for his companionship, but feel that you cannot have it? Do you seek 
    for him, and cannot find him. Do you try to come into his presence, but know 
    not where he is? Job had an experience like this at one time. He lost his 
    God. Listen to him: "Oh, if only I knew where to find Him; if only I could 
    go to His dwelling!" (Job 23:3).</span></p><span data-dcnode-id="232" instrument_node="">
</span><p align="justify" data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">Job's experience is repeated in many another life. There 
    are times when God seems so far away that with all our seeking him, he seems 
    to be no nearer. How natural it is for the heart at such a time to wish: 
    "Oh, that I had lived when Jesus walked the earth! Oh, that I might have 
    seen him! Oh, that I might have come before him and made known my needs and 
    heard the sound of his voice and followed his footsteps!" He was Immanuel, 
    that is, "God with us"; and he was truly with his people then. Has his name 
    changed—or does this not apply to him now? Ah, no, there has been no change 
    in him. He is still Immanuel. He is still "God with us." Heaven is not his 
    only dwelling place.</span></p><span data-dcnode-id="229" instrument_node="">
</span><p align="justify" data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Our God is not like a man. "For this is what the high and 
    lofty One says—he who lives forever, whose name is holy: "I live in a high 
    and holy place, but also with him who is contrite and lowly in spirit, to 
    revive the spirit of the lowly and to revive the heart of the contrite." 
    (Isaiah 57:15). Here God himself tells us that he dwells in Heaven—and also 
    that he has an earthly dwelling, with him who is of a humble spirit. He is 
    still Immanuel—he is still with us. Listen to some of his promises: "My 
    presence shall go with you" (Exodus 33: 14). "Lo, I am with you always, even 
    unto the end of the world" (Matthew 28:20). "I will never leave you, nor 
    ever forsake you" (Hebrews 13:5).</span></p><span data-dcnode-id="226" instrument_node="">
</span><p align="justify" data-dcnode-id="221"><span data-dcnode-id="225" instrument_node="">Sometimes these promises seem very true for others—but 
    unreal for ourselves. We can believe that he is near to others; we can 
    believe that his helping hand is guiding and upholding </span><i data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">them</span></i><span data-dcnode-id="222" instrument_node="">—but we 
    seem unable to find the same reality in it for ourselves. But Paul tells us 
    that this is true for all of us. He says that God is not far from any of us 
    (Acts 17:27). He is a very present help in times of trouble (Psalm 46:1).
    </span></p><span data-dcnode-id="220" instrument_node="">
</span><p align="justify" data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">God is very near you today, and knows every burden of 
    your heart, every unsatisfied longing, every aspiration. He hears every 
    prayer, even the silent heart-cry, though it may seem that he does not hear 
    nor care. </span></p><span data-dcnode-id="217" instrument_node="">
</span><p align="justify" data-dcnode-id="206"><span data-dcnode-id="216" instrument_node="">Perhaps you seem to be walking alone, but you are not 
    alone. There is a Presence beside you. His protection is around you. Your 
    God is with you. You may not be conscious of his presence by any of your 
    natural senses; you may not </span><i data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">see </span></i><span data-dcnode-id="213" instrument_node="">him; you may not </span><i data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">feel </span></i><span data-dcnode-id="210" instrument_node="">him; you 
    may not </span><i data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">hear </span></i><span data-dcnode-id="207" instrument_node="">him; you may be wholly unconscious of his presence; but 
    he is with you right now, to be to you everything that you need.</span></p><span data-dcnode-id="205" instrument_node="">
</span><p align="justify" data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">In an aquarium in a city were some large fish in a glass 
    tank. They were accustomed to being fed on minnows, which they snapped up 
    greedily. There was a plate glass partition in the tank, and one day the 
    minnows were placed in the water on the opposite side of the glass 
    partition. They saw the large fish and were very much frightened, thinking, 
    perhaps that they were in great danger. The large fish apparently thought 
    this was their opportunity, and in their efforts to get the minnows they 
    dashed against the plate glass partition again and again, to no purpose 
    except their own injury. This glass partition was a perfect protection, 
    though it could not be seen by the minnows nor the fish. </span></p><span data-dcnode-id="202" instrument_node="">
</span><p align="justify" data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">In the same way, sometimes God's protection is invisible 
    to us, but it is just as real and just as effective as though we could see 
    it. We are just as safe when we do not feel God's protection nor see it, nor 
    know of it—as though it were plainly apparent. God is with you just as much 
    when you do not feel his presence—as when you do feel it, when you do not 
    see him working as when you do see him working. Where is your God? He is 
    with you now.</span></p><font data-dcnode-id="196" size="4"><span data-dcnode-id="199" instrument_node="">
</span><p align="justify" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="191"><b data-dcnode-id="192"><span data-dcnode-id="195" instrument_node="">
</span><p align="justify" data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">You Have a Little Strength!</span></p></b></font><span data-dcnode-id="190" instrument_node="">
</span><p align="justify" data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">This chapter is not for those who feel themselves strong, 
    competent, and able to meet whatever comes. It is for those who know they 
    are weak—those who look toward life ahead and see difficulties and dangers 
    and the need of more strength than they possess. It is for those who 
    sometimes say with Paul, "Who is sufficient for these things?" (2 
    Corinthians 2:16).</span></p><span data-dcnode-id="187" instrument_node="">
</span><p align="justify" data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">Paul knew he was weak. He wrote to the Corinthians, "I 
    was with you in weakness, and in fear, and in much trembling" (1 Corinthians 
    2:3). Paul was not naturally a weakling. He had strong qualities of 
    leadership, yet he said, "We are weak" (4:10).</span></p><span data-dcnode-id="184" instrument_node="">
</span><p align="justify" data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">Paul's profession of weakness was not a pretense; he was 
    not saying it merely for effect; he felt that he was weak. He was not 
    ashamed to admit that he was weak; in fact, he gloried in his weakness. His 
    weakness served an excellent purpose in his life; for by recognizing it, he 
    could be made strong. We are told of those who out of weakness were made 
    strong, and did great and valiant deeds. Paul said, "Most gladly therefore 
    will I rather glory in my infirmities, that the power of Christ may rest 
    upon me. Therefore I take pleasure in infirmities, in reproaches, in 
    necessities, in persecutions, in distresses for Christ's sake: for when I am 
    weak, then am I strong" (2 Corinthians 12: 9-10) His recognition of his 
    weakness brought him into an attitude that prepared him to receive the power 
    of God.</span></p><span data-dcnode-id="181" instrument_node="">
</span><p align="justify" data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">Yes, we are weak—but what of it? Paul says our weakness 
    merely gives God his opportunity to assist us. He did not lament his 
    weakness; it cleared the way of all pride of self, of all trusting in his 
    own strength, of all self-sufficiency. It made him rely utterly upon Christ, 
    and doing so he was neither afraid of his weakness nor of life, but 
    confident and victorious for both the present and the future.</span></p><span data-dcnode-id="178" instrument_node="">
</span><p align="justify" data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">Paul said that God made us the weak human beings we are, 
    for a purpose: "We have this treasure in earthen vessels, that the 
    excellency of the power may be of God, and not of us" (2 Corinthians 4:7). 
    Then Paul illustrated by his own experience what he meant: "We are troubled 
    on every side, yet not distressed; we are perplexed, but not in despair; 
    persecuted, but not forsaken; cast down, but not destroyed" (vss. 8-9). Paul 
    had many troubles—but there was the power of God upholding, strengthening, 
    and making him able for whatever came.</span></p><span data-dcnode-id="175" instrument_node="">
</span><p align="justify" data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">To the church in Philadelphia came this message: "You 
    have a little strength" (Rev. 3:8). The members of this church were not 
    strong and mighty, but they were not altogether without strength. Their 
    little strength had made them able to do two things: they had kept God's 
    word, and had not denied his name. They had only a little strength, but that 
    little strength was sufficient for success.</span></p><span data-dcnode-id="172" instrument_node="">
</span><p align="justify" data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">Did you ever hear of trigger action? Where great 
    potentials of electricity are used, there is often a great switch which 
    would be very dangerous for one to handle because of the electric arc formed 
    when it is thrown—so a little switch is rigged up which controls the larger 
    switch. This switch, placed in a safe place, serves as a trigger to actuate 
    and to control the master switch. The so-called electric eyes are sensitive 
    to light, and light falling upon the bulb causes a small electric current to 
    flow according to the intensity of the light. This small current of 
    electricity is often used as a control to turn on or off the lights of a 
    great city, and as a control for power in many other ways. </span></p><span data-dcnode-id="169" instrument_node="">
</span><p align="justify" data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">That little electric current produces enormous results. 
    It has only a little strength, as you and I have. Our little strength, like 
    the little strength actuating the relay, can control an immense amount of 
    spiritual power. In other words, our little strength turns on the power of 
    God, which is waiting to operate when the occasion demands. You may be weak, 
    you may have but a little strength, but you do have that. You have some 
    faith, some knowledge, some ability in many directions.</span></p><span data-dcnode-id="166" instrument_node="">
</span><p align="justify" data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">We are too prone to think that we have to do everything 
    that is done, that it all depends upon our strength. Then if we feel weak, 
    we know that we can accomplish little. So we shrink before our tasks, we 
    tremble before responsibilities, we draw back from difficulties, and say, 
    "Oh, I am so weak—how can I go on? How can I be victorious?" Just in one 
    way: by using your strength, not to do the task, but to turn on God's power. 
    Use your strength as a relay. Paul said, "It is God who works in you."</span></p><span data-dcnode-id="163" instrument_node="">
</span><font data-dcnode-id="159" size="4"><span data-dcnode-id="162" instrument_node="">
</span><p align="justify" data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="154"><b data-dcnode-id="155"><span data-dcnode-id="158" instrument_node="">
</span><p align="justify" data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">Balanced Lives</span></p></b></font><span data-dcnode-id="153" instrument_node="">
</span><p align="justify" data-dcnode-id="148"><span data-dcnode-id="152" instrument_node="">There are always many people who live under strain. One 
    frequently hears such expressions as: "I am so nervous." "I am afraid." This
    </span><i data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">tense living </span></i><span data-dcnode-id="149" instrument_node="">is not normal. The pity of it all is that so many of 
    these tensions are wholly unnecessary.</span></p><span data-dcnode-id="147" instrument_node="">
</span><p align="justify" data-dcnode-id="145"><span data-dcnode-id="146" instrument_node="">The tensions set up in life often mar the quality of that 
    life. They cause abnormalities. They affect all of one's life relations, as 
    well as the inner life. Life needs to be balanced. The more nearly its 
    tensions are balanced, the richer and fuller and more satisfying will life 
    be.</span></p><span data-dcnode-id="144" instrument_node="">
</span><p align="justify" data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">If the moral life is not normal, if it is subject to 
    continuous strain of one kind or another, not only will the spiritual life 
    be strongly affected, but physical health, and even mental health, may be 
    profoundly affected. In fact, moral stresses may even cause death. Much of 
    the nervousness which people suffer, much of their apprehension, much of 
    their lack of physical ease—comes from moral or mental unbalance. </span></p><span data-dcnode-id="141" instrument_node="">
</span><p align="justify" data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">I can remember having heard people remark, "Getting 
    religion is healthy business." This is true. When religion comes into the 
    life and the sense of guilt, the fear of punishment, and other spiritual 
    tensions are relieved—then mental tensions are also relieved; and health 
    ensues as a natural result.</span></p><b data-dcnode-id="135"><span data-dcnode-id="138" instrument_node="">
</span><p align="justify" data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">CAUSES OF STRESS</span></p></b><span data-dcnode-id="134" instrument_node="">
</span><p align="justify" data-dcnode-id="129"><span data-dcnode-id="133" instrument_node="">Probably the most common of all causes of stresses is </span><i data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">fear</span></i><span data-dcnode-id="130" instrument_node="">. The fear of past things and the consequences that may flow from 
    them, haunt life for many people. Some fear present circumstances or 
    conditions—while others look into the future and conjure up so many fears 
    that they hardly dare go on living. People are besieged by anxiety and worry 
    day by day. Anxiety and worry are a sort of fear, and every fear sets up 
    tensions. That is why God says over and over in the Bible, "Fear not. Be not 
    afraid."</span></p><span data-dcnode-id="128" instrument_node="">
</span><p align="justify" data-dcnode-id="123"><span data-dcnode-id="127" instrument_node="">Some people are haunted by </span><i data-dcnode-id="125"><span data-dcnode-id="126" instrument_node="">regret</span></i><span data-dcnode-id="124" instrument_node="">. They are 
    constantly living over unpleasant things in their lives. Others labor under 
    a sense of failure until they are tormented by it. Tensions are set up and 
    maintained, which should be banished.</span></p><span data-dcnode-id="122" instrument_node="">
</span><p align="justify" data-dcnode-id="117"><span data-dcnode-id="121" instrument_node="">Another thing that causes great tensions in life, is 
    resistance to what cannot be changed. So many people are rebellious against 
    their </span><i data-dcnode-id="119"><span data-dcnode-id="120" instrument_node="">circumstances</span></i><span data-dcnode-id="118" instrument_node="">. They will not submit to them even though they 
    know they cannot change them. Thereby they set up tensions within themselves 
    which are constantly tearing them down.</span></p><b data-dcnode-id="113"><span data-dcnode-id="116" instrument_node="">
</span><p align="justify" data-dcnode-id="114"><span data-dcnode-id="115" instrument_node="">HOW TO GET RID OF STRESSES</span></p></b><span data-dcnode-id="112" instrument_node="">
</span><p align="justify" data-dcnode-id="110"><span data-dcnode-id="111" instrument_node="">"Yes, I know I have these tensions," says one, "but what 
    am I going to do about them? How can I relieve them? How can I get rid of 
    them?"</span></p><span data-dcnode-id="109" instrument_node="">
</span><p align="justify" data-dcnode-id="104"><span data-dcnode-id="108" instrument_node="">The first thing to do is to </span><i data-dcnode-id="106"><span data-dcnode-id="107" instrument_node="">face the facts</span></i><span data-dcnode-id="105" instrument_node="">. Admit 
    that you have the tensions, then analyze them, and search out the cause. 
    When the cause is found, then relief can often be obtained. Many times just 
    knowing the cause of the strain, will suggest the means of relief. </span></p><span data-dcnode-id="103" instrument_node="">
</span><p align="justify" data-dcnode-id="95"><span data-dcnode-id="102" instrument_node="">A man came to me and told me how timid he was. He wanted 
    to work for the Lord, but found it very difficult to do so. I began to 
    inquire concerning the cause of his timidity. I found that he had been </span><i data-dcnode-id="100"><span data-dcnode-id="101" instrument_node="">laughed at 
    </span></i><span data-dcnode-id="99" instrument_node="">a great deal in his childhood. In order to protect himself 
    against the laughter, to shield himself from the pain it caused, he had 
    withdrawn within himself, become uncommunicative, reserved, afraid of being 
    hurt. By shunning others and being by himself—he had formed </span><i data-dcnode-id="97"><span data-dcnode-id="98" instrument_node="">the habit of 
    timidity</span></i><span data-dcnode-id="96" instrument_node="">.</span></p><span data-dcnode-id="94" instrument_node="">
</span><p align="justify" data-dcnode-id="92"><span data-dcnode-id="93" instrument_node="">When he saw the cause of his timidity, he realized that 
    being timid was a bad habit he had formed—a habit that was just like any 
    other bad habit. Then he saw that the habit of timidity could be broken, in 
    just the same way that one breaks any other bad habit; that is, by 
    deliberately overcoming it, by deliberately doing what he knew he ought to 
    do despite feelings of timidity.</span></p><span data-dcnode-id="91" instrument_node="">
</span><p align="justify" data-dcnode-id="89"><span data-dcnode-id="90" instrument_node="">We need to ask ourselves, "Can these his tensions be 
    helped? Can I find a way to relieve them?" There is nearly always a way, and 
    usually not too hard a one. The fears and regrets of the past can be faced 
    with the question, "Are those things really important now? Do they have a 
    present bearing on life?" Usually they do not have. When that is the case, 
    we can dismiss those things. Refuse to let our minds rest upon them, and 
    force them out of our thoughts by bringing in other thoughts to take their 
    place. We can refuse to be bothered over those things of the past.</span></p><span data-dcnode-id="88" instrument_node="">
</span><p align="justify" data-dcnode-id="86"><span data-dcnode-id="87" instrument_node="">When things come up to produce tensions, you can ask, "Do 
    they need considering now?" If not, put them out of your 
    thoughts—deliberately turn away from them. Again you should ask, "Are these 
    things that trouble me, as big as they seem?" Probably you are giving to 
    your troubles much more importance than they really deserve. Try ignoring 
    them. That is a good cure.</span></p><span data-dcnode-id="85" instrument_node="">
</span><p align="justify" data-dcnode-id="83"><span data-dcnode-id="84" instrument_node="">Then there is the rest of faith, of trust in God, of 
    casting our cares upon him, of casting the things that trouble us upon him. 
    There is nothing that so relaxes spiritual tensions of life, as committing 
    the matter to God; he has to handle most of our troubles anyway, so why not 
    cast them upon him, and find that rest of faith that is his will for us?</span></p><span data-dcnode-id="82" instrument_node="">
</span><p align="justify" data-dcnode-id="77"><span data-dcnode-id="81" instrument_node="">One thing necessary, is to refuse to worry. You will 
    worry—if you let yourself worry. You will find plenty of things in life to 
    worry about. It is very easy to establish </span><i data-dcnode-id="79"><span data-dcnode-id="80" instrument_node="">the worry habit</span></i><span data-dcnode-id="78" instrument_node="">, and it 
    always creates tension. Learn to refuse to worry. God would have us calm, 
    peaceful, resting, contented. He would have us partake in that rest of soul, 
    which he said he would give to us. If your life is strained, unbalanced, 
    troubled—then seek the Rest-Giver and find in him the help you need.</span></p><span data-dcnode-id="76" instrument_node="">
</span><font data-dcnode-id="69" size="4"><span data-dcnode-id="75" instrument_node="">
</span><p align="justify" data-dcnode-id="73"><span data-dcnode-id="74" instrument_node="">&nbsp;</span></p><span data-dcnode-id="72" instrument_node="">
</span><p align="justify" data-dcnode-id="70"><span data-dcnode-id="71" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="64"><b data-dcnode-id="65"><span data-dcnode-id="68" instrument_node="">
</span><p align="justify" data-dcnode-id="66"><span data-dcnode-id="67" instrument_node="">I See Differently Now</span></p></b></font><span data-dcnode-id="63" instrument_node="">
</span><p align="justify" data-dcnode-id="61"><span data-dcnode-id="62" instrument_node="">When we look back through the years, many things look 
    different to us than they did when we were in the midst of them. It often 
    requires the lapse of years, to bring us understanding; there are so many 
    things that we cannot understand in the present. There are things that make 
    us wonder and question. In our human judgment, we often think that things 
    should be different. If we had our way, we Would never allow hurtful and 
    grievous things to happen to us. Sometimes we are crushed because they 
    happen, and we cannot understand why God permits them. But if we endure the 
    test, we can often look back and see that those were the very things that 
    were needed to develop in us strength of character, or to teach us lessons 
    needed to make our Christian experience more effective.</span></p><span data-dcnode-id="60" instrument_node="">
</span><p align="justify" data-dcnode-id="52"><span data-dcnode-id="59" instrument_node="">In my notebook I have a quotation taken from a letter 
    that expresses a great truth. I remember that the writer had told me of some 
    of the experiences he had passed through in former years. There had been 
    dark and trying times, hours of bitterness, days of sorrow and lamentation. 
    Now, gazing back over the years that intervened, he wrote: "</span><i data-dcnode-id="57"><span data-dcnode-id="58" instrument_node="">Then </span></i><span data-dcnode-id="56" instrument_node="">everything seemed to go wrong. But I see differently 
    </span><i data-dcnode-id="54"><span data-dcnode-id="55" instrument_node="">now</span></i><span data-dcnode-id="53" instrument_node="">. God has a 
    hand in placing us in our circumstances, and I know he has cared for me all 
    these years."</span></p><span data-dcnode-id="51" instrument_node="">
</span><p align="justify" data-dcnode-id="49"><span data-dcnode-id="50" instrument_node="">Many of us have had experiences of this kind, when things 
    seemed to be working for our destruction, instead of our help. Now, looking 
    back over those things, we see that it was God's kindness and mercy which 
    led us by this unseen path to heights and depths that we had not reached 
    before. We can see that those things that we thought were disastrous, were 
    our upbuilding. Even when we doubted God's care, even when we thought we 
    were left alone, even when we felt ourselves forsaken—the everlasting arms 
    were underneath us all the time. God was guiding us, though to us the path 
    was strange and difficult. Afterward he brought us out into a large place 
    and established our goings.</span></p><span data-dcnode-id="48" instrument_node="">
</span><p align="justify" data-dcnode-id="46"><span data-dcnode-id="47" instrument_node="">A rich manufacturer, who had begun as a poor boy and had 
    worked himself up until he was owner of a large factory, had a son just 
    coming into manhood. That son was bent on having a good time. He loved 
    pleasure and sought it eagerly. His father furnished him money to spend, but 
    one day he called his son into his private office, and said: "Son, I have 
    been furnishing you spending money for some years now. I think it has been 
    quite long enough. From now on you must make your own way. If you will go to 
    Johnson, the superintendent of the factory, he will no doubt find a place 
    for you."</span></p><span data-dcnode-id="45" instrument_node="">
</span><p align="justify" data-dcnode-id="43"><span data-dcnode-id="44" instrument_node="">The manufacturer turned again to his work, and the son 
    went out from his presence silent and stunned. He knew his father well 
    enough to know that his declaration was final. He would not change his mind. 
    The young man, feeling wounded and hurt, went away murmuring and 
    discontented and resentful. He felt that his father did not love him, and 
    that having to go to work to earn his living would be a disgrace to him and 
    would cut him off from his pleasures. He was sure that his companions would 
    laugh at him. The prospect as he viewed it was dismal enough. Presently he 
    realized that he was facing a situation that demanded that he pull himself 
    together and show himself to be a man. One morning he entered the office of 
    the superintendent of the factory and asked for employment, just as any 
    other individual would.</span></p><span data-dcnode-id="42" instrument_node="">
</span><p align="justify" data-dcnode-id="37"><span data-dcnode-id="41" instrument_node="">The superintendent, having been advised that the owner's 
    son was coming, gave him a job, starting him in a low position. It was real 
    work, and the young man did not enjoy it. But when he got his first 
    paycheck, he had a feeling he had never had before in his life. This was 
    money really his own; he had </span><i data-dcnode-id="39"><span data-dcnode-id="40" instrument_node="">earned </span></i><span data-dcnode-id="38" instrument_node="">it himself. There was 
    satisfaction in this, but not enough to take away the humiliation that he 
    was suffering; however, he made up his mind to show his father that he could 
    make his way, so he went on laboring earnestly and faithfully. Presently he 
    was promoted. From time to time other promotions came, until he was placed 
    in an executive position. Here he found that the knowledge he had acquired 
    by working himself up through the various positions, was invaluable to him, 
    and it dawned upon him why his father had acted as he had. </span></p><span data-dcnode-id="36" instrument_node="">
</span><p align="justify" data-dcnode-id="34"><span data-dcnode-id="35" instrument_node="">He walked into his father's office and said: "Father, I 
    see that I have done you great injustice. When you cut off my allowance and 
    sent me to the factory to work, I felt humiliated and resentful. I felt that 
    you did not love me. I thought you did not have my interest at heart—but now 
    I see it differently. I see that the course you took with me, was the only 
    course you could have taken to fit me for the position I now occupy. I see 
    now that it was the only way I could learn to value things at their real 
    worth. And I am thankful to you, Father, that you were true to me, and that 
    you manifested your trueness to me in a way that I know now must have cost 
    you dearly, but which at the same time makes me appreciate you far more than 
    I ever did before."</span></p><span data-dcnode-id="33" instrument_node="">
</span><p align="justify" data-dcnode-id="8"><span data-dcnode-id="32" instrument_node="">A few years ago a young preacher came to me and told me 
    his troubles. He was passing through a time of darkness that he could not 
    understand. Several months ago he called upon me again, and in the course of 
    our conversation he referred to the time of trouble through which he had 
    passed. He said, "Those things that I could not understand at that time, 
    have taught me lessons which have prepared me to help many souls as I never 
    could have, had I not had those severe trials." </span><br data-dcnode-id="31"><span data-dcnode-id="30" instrument_node="">
</span><br data-dcnode-id="29"><span data-dcnode-id="28" instrument_node="">
    Yes, things look different </span><i data-dcnode-id="26"><span data-dcnode-id="27" instrument_node="">now</span></i><span data-dcnode-id="25" instrument_node="">. </span><i data-dcnode-id="23"><span data-dcnode-id="24" instrument_node="">He can now see God's hand in it</span></i><span data-dcnode-id="22" instrument_node="">. 
    He can see that those difficult things were a blessing to his own soul and 
    to the souls of others. He can see that he had been in</span><i data-dcnode-id="20"><span data-dcnode-id="21" instrument_node=""> God's school of 
    adversity</span></i><span data-dcnode-id="19" instrument_node=""> and knew it not. He thought these things were destructive to 
    him, but when he looked back upon them with clear vision and a knowledge of 
    God's purpose—he saw real blessing in them. He saw them as manifestations of 
    the wisdom and kindness of God, and he thanked God for these things that had 
    been bitter and hard to bear.</span><br data-dcnode-id="18"><span data-dcnode-id="17" instrument_node="">
</span><br data-dcnode-id="16"><span data-dcnode-id="15" instrument_node="">
</span><i data-dcnode-id="13"><span data-dcnode-id="14" instrument_node="">Are you passing through difficult things which you cannot now understand?</span></i><span data-dcnode-id="12" instrument_node=""> 
    Does it look as if these things are ruining you? Just trust God and be 
    patient. Out of your </span><i data-dcnode-id="10"><span data-dcnode-id="11" instrument_node="">night of bitterness</span></i><span data-dcnode-id="9" instrument_node="">, out of your darkness and 
    woe—will come strength of character, a blessed realization of God's 
    faithfulness, and a knowledge of Him and yourself which can come to you in 
    no other way. You will look back in time to come, and thank God for His wise 
    care and tender love for you which brought you to these things, and realize 
    that it was His hand leading you to better and richer things beyond.</span></p><span data-dcnode-id="7" instrument_node="">
</span></blockquote><span data-dcnode-id="5" instrument_node="">
</span></blockquote><span data-dcnode-id="3" instrument_node="">
</span>
