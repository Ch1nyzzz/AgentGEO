    Out of the hundreds of interested an sympathetic friends who visited me 
    during the early months of my confinement, only three had any idea of what I 
    was passing through. These three had passed through the fires themselves. I 
    knew they understood; and their fellowship with my suffering, was balm to my 
    spirit. The others meant well, but many of them were only "Job's miserable 
    comforters." It was impossible for them to plumb the depths into which I had 
    gone, or to know the weight of my crushing burden—and so they looked on me 
    with bewilderment.</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p align="justify" data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">I am still in bed. I still suffer, but not so severely as 
    in the early years. I am not sorry that I have suffered, for God has made 
    life broader, deeper, and richer than it could have been made by any other 
    means.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p align="justify" data-dcnode-id="1105"><span data-dcnode-id="1109" instrument_node="">The wrong views that some people have about the cause of 
    suffering, often add to their suffering. Some people think that God sends 
    suffering upon his people as a punishment, and that when we suffer sickness 
    or something else, it is because God has been offended by something we have 
    done. It is true that God may </span><i data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">chastise </span></i><span data-dcnode-id="1106" instrument_node="">us. It is probably also true, 
    that he generally uses other means than sickness and actual suffering.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><p align="justify" data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">We are a part of the natural creation and, as Paul shows 
    in the eighth chapter of Romans, we share in the common travailing and 
    groaning of that whole creation. We are mortal and must share in the things 
    that are incident to being mortal until that glad day when our Lord shall 
    return and sickness, sorrow, and death shall give p to immortal life and 
    glory.</span></p><b data-dcnode-id="1098"><span data-dcnode-id="1101" instrument_node="">
</span><p align="justify" data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">WHAT CAUSES OUR SUFFERINGS?</span></p></b><span data-dcnode-id="1097" instrument_node="">
</span><p align="justify" data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Some of our sufferings are caused by inherited 
    conditions. Some of our sufferings are caused by wrong living—whether that 
    wrong is willful, or the result of ignorance. Some of our sufferings are 
    caused by eating wrong foods or not eating proper foods; some by gluttony, 
    overwork, an the like. Many of our troubles are caused by wrong 
    thinking—fear, hate, wrong attitudes toward people or toward ourselves or 
    toward life. Many of our physical and mental ills result from these things.</span></p><span data-dcnode-id="1094" instrument_node="">
</span><p align="justify" data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Most of the things that happen us, either good or bad, 
    happen as the natural and ordinary operations of living in a flawed world. 
    Take the following illustration: It is night and a dense fog has settled do 
    over the country. A bus filled with passengers is passing along a highway. A 
    little way ahead is a railroad crossing. A train is approaching that 
    crossing. The engineer of the train may know he is approaching the crossing, 
    but he is unaware of the approach of the bus. The bus driver may know there 
    is a railroad crossing ahead, but because of the fog he cannot see it, nor 
    can he see the train. Onward the two go through the foggy darkness. They 
    reach the crossing at the same moment. There is a crash, and several of the 
    passengers are killed.</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p align="justify" data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Who was responsible for the accident? Who brought about 
    the deaths? The engineer of the train did not plan the accident, nor desire 
    it—neither did the driver of the bus. Neither knew what was about to happen, 
    and so it could not be avoided. </span></p><span data-dcnode-id="1088" instrument_node="">
</span><p align="justify" data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Did Satan cause the fog or regulate the speed of the bus 
    and of the train to bring them together at the crossing? Satan possesses no 
    such power; he works through the hearts of wicked men, and there was no 
    wickedness involved.</span></p><span data-dcnode-id="1085" instrument_node="">
</span><p align="justify" data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">God permitted the accident to happen, just as he permits 
    many other things of like nature to happen. He permits all our adversities 
    to come. He permits us to act foolishly or sinfully—if we choose to do so. 
    He permits others to act improperly toward us. He permits all the evil that 
    happens in the world, in the sense that he does not step in and prevent it.
    </span></p><span data-dcnode-id="1082" instrument_node="">
</span><p align="justify" data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Think what a world this would be, if God should work a 
    thousand miracles each day to prevent undesirable happenings. He would have 
    to upset the regular course of nature, and everything would be thrown into 
    disorder. No, God does not work thus. He does interfere to help his 
    children. He does answer prayer. He does work miracles—but not by breaking 
    natural laws.</span></p><span data-dcnode-id="1079" instrument_node="">
</span><p align="justify" data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">What God does with our adversities and our sufferings, is 
    to transmute them into the gold of godly character. They prove to be 
    blessings in disguise—but blessings nevertheless. Again and again in the 
    Scriptures, we are told of the blessings that come through suffering and 
    pain, disappointments and testings. Yes, sufferings, losses, adversities—all 
    these things we so desire to shun—work "for us a far more exceeding and 
    eternal weight of glory"—if we patiently endure them and submit to God's 
    sovereign and loving will.</span></p><font data-dcnode-id="1073" size="4"><span data-dcnode-id="1076" instrument_node="">
</span><p align="justify" data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="1068"><b data-dcnode-id="1069"><span data-dcnode-id="1072" instrument_node="">
</span><p align="justify" data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">God and Our Adversities</span></p></b></font><span data-dcnode-id="1067" instrument_node="">
</span><p align="justify" data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">David believed that God was interested in his 
    adversities. He says, "I will be glad and rejoice in your love, for you saw 
    my affliction and knew the anguish of my soul." (Psalm 31:7)</span></p><span data-dcnode-id="1064" instrument_node="">
</span><p align="justify" data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">The writer of Psalm 94 says, "Blessed is the man you 
    discipline, O LORD, the man you teach from your law." Here is recognition of 
    the fact that God is not indifferent to the things that trouble his 
    children. These writers turned to God as to one from whom help might be 
    expected. They believed God would understand their situation and that they 
    could count on him to assist them in their adversities. They felt that they 
    could depend upon him in their time of trouble and not be disappointed.</span></p><span data-dcnode-id="1061" instrument_node="">
</span><p align="justify" data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Did they have reason to believe these things? And if so, 
    have we not equal reason to believe them and to act as though we believe? 
    God has ever been the help of those who put their trust in him. Just to 
    quote his promises to help, sustain, comfort, and bless in adversity; and 
    his exhortations to be strong, of good courage, to be unafraid, and to be 
    hopeful—would make a long chapter. Moreover, none of these things was put 
    into the Bible just to fill up space; neither are they just goody-goody 
    make-believes. God means every one of them and stands ready to fulfill his 
    promises and to make it possible for us to put his exhortations into effect.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><p align="justify" data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">It is a wonderful thing to have God as a friend in the 
    pleasant and desirable things of life. He can add greatly to all our natural 
    blessings by His gracious fellowship and love and the sense of His abiding 
    presence.</span></p><span data-dcnode-id="1055" instrument_node="">
</span><p align="justify" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">In our darker hours, when it seems we need Him more—we 
    can confidently count on His unfailing help. Talking about having God as our 
    helper, is not a mere platitude. It can be realized.</span></p><span data-dcnode-id="1052" instrument_node="">
</span><p align="justify" data-dcnode-id="1047"><span data-dcnode-id="1051" instrument_node="">God should be </span><i data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">our confidant</span></i><span data-dcnode-id="1048" instrument_node="">. We should take Him 
    into the depths of all our troubles and pour out to Him all the tribulations 
    of our hearts, all our sorrows, cares, anxieties, pains—everything that 
    troubles us.</span></p><span data-dcnode-id="1046" instrument_node="">
</span><p align="justify" data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">It always helps us when share our troubles with a friend, 
    especially if the friends is sympathetic and understanding. God the most 
    sympathetic and understanding of friends. So in our times of tribulation, 
    let us ruin straight to Him and open wide our hearts and minds, and lay out 
    before Him all those things that bring us anguish. We should not only 
    confide in Him our every heartache and pain—we should also rely upon Him to 
    be a present help in every time of trouble. We should have that trusting 
    confidence that assures us of His help to the full measure of our needs.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><b data-dcnode-id="1039"><span data-dcnode-id="1042" instrument_node="">
</span><p align="justify" data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">GOD IS ON OUR SIDE</span></p></b><span data-dcnode-id="1038" instrument_node="">
</span><p align="justify" data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">A common mistake is that God is on one side of the 
    question—and we on the other side persuading or cajoling him to help us. The 
    fact really is that God, like any good parent, is on the side of his 
    children. Get this clear. God is always on the side of his children. He 
    really is our Father. Our enemies, are his enemies.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p align="justify" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Speaking of the affliction of God's people, it is said, 
    "In all their affliction, He was afflicted." God enters into all our sorrow 
    and suffering, into all that troubles us. He may let us suffer for our own 
    good, but he can make us joyful in our tribulations. I remember that in some 
    of the most severe sufferings through which I ever passed, my soul was so 
    full of the glory of God that I was lifted up above the sufferings. God did 
    not take them away at the time—but he did make me able to bear them. Out of 
    bearing them, came rich blessings to my soul. When the hand of God is upon 
    us—it is always upon us for good. He never hinders us; he always helps us. 
    He never leaves us or forsakes us. Remember, whatever your trouble may be, 
    God is on your side always and all the time.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p align="justify" data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">One thing that sometimes stands in the way of people, is 
    the feeling that they have brought their troubles upon themselves. 
    Certainly, we bring many troubles on ourselves; but do parents refuse to 
    help their children out of trouble, just because they have brought it upon 
    themselves? Sometimes trouble comes upon them as the result of something 
    done ignorantly, with no thought of trouble resulting. Merciful parents help 
    their children just the same, and so does God help us even if we have caused 
    our own troubles. He is still our merciful Father. He may let us suffer a 
    little while, to learn to be more careful the next time, but he will help us 
    just the same.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p align="justify" data-dcnode-id="1024"><span data-dcnode-id="1028" instrument_node="">One of the most needed things in our tribulations is </span><i data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">patience</span></i><span data-dcnode-id="1025" instrument_node="">. We should endure with meekness, and at the same time hold fast 
    our confide in God. We read of one of old who endured because he saw One who 
    was invisible. That invisible One will be visible—when we look with the eye 
    of faith, and we shall see him as our deliverer.</span></p><b data-dcnode-id="1020"><span data-dcnode-id="1023" instrument_node="">
</span><p align="justify" data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">WHEN DEATH COMES</span></p></b><span data-dcnode-id="1019" instrument_node="">
</span><p align="justify" data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">I suppose the most tragic adversity that ever comes, is 
    when the death angel visits our home, or the homes of our dear friends. We 
    know that death is inevitable, and that love cannot hold it back. We know it 
    lies ahead of each one of us, but we are never ready to have a place left 
    vacant. We are never ready for the last good-by. We are never ready for the 
    heart-crushing loneliness that follows the going of our beloved. To those 
    who have no hope in Christ, death is a tragedy. To those in whose souls that 
    blessed hope blooms—death is a transfer, a going to the better land. It may 
    be a tragedy for those left behind, but we weep for ourselves, not for the 
    ones who have been transported to the realms of glory.</span></p><span data-dcnode-id="1016" instrument_node="">
</span><p align="justify" data-dcnode-id="1011"><span data-dcnode-id="1015" instrument_node="">Sometimes the departure comes after a long, lingering 
    illness—when we have looked for the end day after day. Sometimes the 
    telephone rings or the telegraph messenger knocks at our door with the 
    stunning news of unexpected tragedy that throws us into shocked amazement. 
    There is no need to describe this experience for one who has passed through 
    it. The important thing in the crisis, is the </span><i data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">attitude </span></i><span data-dcnode-id="1012" instrument_node="">we adopt. We 
    cannot change the facts; we can only meet and bear them.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p align="justify" data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Sometimes people meet this crisis of sorrow rebelliously 
    and resentfully. Ordinarily, death is the result of natural causes—disease, 
    accidents, old age, and the like. </span></p><span data-dcnode-id="1007" instrument_node="">
</span><p align="justify" data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Do you remember how Jesus wept at the grave of his friend 
    Lazarus? Did he shed tears of hypocrisy—or of genuine sorrow and sympathy? 
    When death comes to our circle, the Christian attitude is one of submission 
    and full reliance on the goodness and wisdom of God.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p align="justify" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Sometimes there are days of waiting for tidings from some 
    loved one far away. These are days that try the soul. There are times when 
    uncertainty, the fear, and the agitation can be borne by sharing it with Him 
    who is ready share all our troubles. To the extent we trust at such times, 
    to that extent he will be our helper and our strength.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p align="justify" data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">God's comfort in our times of sorrow is not imaginary 
    thing. It can be so real that it is a balm for our wounded spirits. Having 
    passed through the experience more than once, the writer knows within 
    himself how real and vital and sustaining the comfort of God can be. He 
    knows how corroding sorrow can be mixed with the joy of the divine Friend, 
    and a deep and satisfying sense that God understands and cares and helps. 
    Cast your cares upon him, for he cares for you and will comfort by healing 
    your wounds and bringing peace.</span></p><font data-dcnode-id="995" size="4"><span data-dcnode-id="998" instrument_node="">
</span><p align="justify" data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">&nbsp;</span></p></font><b data-dcnode-id="991"><span data-dcnode-id="994" instrument_node="">
</span><p align="justify" data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">WHEN WE HAVE MADE MISTAKES</span></p></b><span data-dcnode-id="990" instrument_node="">
</span><p align="justify" data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">One of the things in which we greatly need God's help, is 
    in living down our mistakes. We may have to re-establish ourselves in the 
    confidence of others. We may have to rebuild a wrecked business. We may have 
    to regain a lost reputation or re-establish a broken friendship. Whatever 
    our mistake has been, and however devastating its effect—the case is not 
    hopeless. We can patiently rebuild what has been destroyed. It may be 
    difficult, it may take a long time, it may require patient effort—and plenty 
    of it—but if we have the will, then we can find the way.</span></p><span data-dcnode-id="987" instrument_node="">
</span><p align="justify" data-dcnode-id="982"><span data-dcnode-id="986" instrument_node="">In all our efforts to re-establish ourselves, we should 
    pray God to be our helper. After failure, there is so often a sense of 
    frustration. The task of coming back looks too great. It may be too great 
    for us unaided, and many people will not aid us—rather, they may hinder us. 
    In God we may always be assured of </span><i data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">an understanding friend </span></i><span data-dcnode-id="983" instrument_node="">who is 
    ready to help. He will not do our work for us—but he will give us strength 
    for the work. He will not take away any reproach that has fallen on us, but 
    he will enable us to show ourselves again worthy of esteem. </span></p><span data-dcnode-id="981" instrument_node="">
</span><p align="justify" data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">There are many things he will not do; but in whatever we 
    must do, he will help us and make possible what we can not do alone. He will 
    strengthen our courage and help us. He will help us to cease to be what we 
    never should have been, and help us to become what we ought to be and desire 
    to be.</span></p><span data-dcnode-id="978" instrument_node="">
</span><p align="justify" data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">There are times when we do not understand, and when a 
    great many questions come to lips, but often these questions go unanswered. 
    Even when we ask God for a solution, that solution may not come. What shall 
    we do when our questions are unanswered? We can only wait—but we should not 
    wait impatiently. We should remember that God works in his own time and his 
    own way. He often answers our questions indirectly or through our 
    experiences, but until the answer comes, be patient and trust. At proper 
    time, you will know what you need know.</span></p><span data-dcnode-id="975" instrument_node="">
</span><p align="justify" data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Jesus told his disciples that here on earth—we will have 
    many trials and sorrows. But he also told them that in him they would have 
    peace. And so whatever life may bring us of adversity, sorrow, an 
    suffering—we can look to God for that peace which "passes all 
    understanding," which will keep our hearts and minds through Christ Jesus. 
    All his gracious promises are true, and they are true to us. He is our 
    present help in time of trouble. Lean upon him, trust him with confident 
    assurance, and he will not fail you; he will bear the heavier part of your 
    load.</span></p><font data-dcnode-id="969" size="4"><span data-dcnode-id="972" instrument_node="">
</span><p align="justify" data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="964"><b data-dcnode-id="965"><span data-dcnode-id="968" instrument_node="">
</span><p align="justify" data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">So Much to Worry About!</span></p></b></font><span data-dcnode-id="963" instrument_node="">
</span><p align="justify" data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Recently in speaking of one of our friends, she said, 
    "Mrs. Smith has so much to worry about." I suppose a great many people 
    thinking the same thing—that they have causes for worry. Perhaps they feel 
    somewhat justified in worrying, because they are confronted with 
    difficulties, and difficulties always create foreboding and fear—unless they 
    are properly met.</span></p><span data-dcnode-id="960" instrument_node="">
</span><p align="justify" data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">I have before me a letter that says: "I brought up in a 
    'worry' home, therefore I had acquired the habit of worrying from childhood. 
    I have worried regarding my spiritual condition since my early years, and it 
    is hard to rid myself of the habit."</span></p><span data-dcnode-id="957" instrument_node="">
</span><p align="justify" data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">"A worry home"—what a picture that brings to our minds! 
    No doubt all of us know of such homes. Perhaps some of us have been reared 
    such homes and have acquired the habit of worrying. Many others who have not 
    been reared in "worry homes" have acquired the habit. Worrying is a habit, 
    and a very bad one. It is an inexcusable one for a Christian.</span></p><b data-dcnode-id="951"><span data-dcnode-id="954" instrument_node="">
</span><p align="justify" data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">THE SIGNIFICANCE OF WORRY</span></p></b><span data-dcnode-id="950" instrument_node="">
</span><p align="justify" data-dcnode-id="945"><span data-dcnode-id="949" instrument_node="">First of all, </span><i data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">worry is distrust of God</span></i><span data-dcnode-id="946" instrument_node="">. Christians 
    believe God is watching over their lives. If they believe their Bible, they 
    must believe that God's wall of protection is round about them and that 
    nothing can come to them that does not come through his will. He has told us 
    that all things work together for good, if we truly love him. If we trust 
    our heavenly Father's care, we will rest in the assurance that he knows and 
    cares and will not fail to help us in every time of trouble. In other words, 
    we have no cause for worry.</span></p><span data-dcnode-id="944" instrument_node="">
</span><p align="justify" data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">When we worry, we take ourselves out of God's hands and 
    try to fight our own battles. I do not mean that we are not Christians; but 
    we do trust in our own efforts, rather than in his grace and loving care. 
    When we trust—we do not worry. When we worry—we do not trust.</span></p><i data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">
</span></i><p align="justify" data-dcnode-id="936"><i data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Worry dishonors God.</span></i><span data-dcnode-id="937" instrument_node=""> The goodness of God, his love 
    for his people, and his protecting care—are told over and over in the Bible, 
    proclaimed by preachers, and spoken of in our testimonies. Yet when trouble 
    looms on the horizon—we begin worry, worry, worry. We leave God out of 
    picture, forget his promises, and take the whole burden upon ourselves! He 
    has told us to cast burdens upon him, but we do not do it when worry. We 
    bear our burdens ourselves and add to them by our worry—making them far 
    greater they would be, even without divine help, if we not worry. </span></p><span data-dcnode-id="935" instrument_node="">
</span><p align="justify" data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">We are told to do all things to the glory of God. Did you 
    ever worry to the glory of God? Did worry ever make you feel like praising 
    God? Does the fact that you worry make other people feel that you believe in 
    God and expect him help you in your troubles? No! Your worry honors God, and 
    advertises the fact that you not trusting in him.</span></p><i data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">
</span></i><p align="justify" data-dcnode-id="927"><i data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Worry never makes anything better.</span></i><span data-dcnode-id="928" instrument_node=""> Look back over the 
    past and consider the things about which you have worried about. Did 
    worrying make them come out any better? Did worry give you strength meet 
    your problems?</span></p><span data-dcnode-id="926" instrument_node="">
</span><p align="justify" data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">But you say, "I cannot help worrying." I a not so sure 
    about that. Many people, even those who are not Christians, go through 
    troubles great as yours without worrying. They have learned to face 
    circumstances, and make the best of them. Christians should not only do 
    this—they should do still more. They should trust the Lord to take them 
    through difficulties, to give them strength, to make them victorious. </span></p><span data-dcnode-id="923" instrument_node="">
</span><p align="justify" data-dcnode-id="918"><span data-dcnode-id="922" instrument_node="">How many times in the past have you worried over things, 
    when the outcome showed that you had no reason to worry? All your worrying 
    was useless and causeless. </span><i data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Trust is a remedy that never fails to cure the 
    worry habit. </span></i><span data-dcnode-id="919" instrument_node="">Therefore, learn to trust.</span></p><b data-dcnode-id="914"><span data-dcnode-id="917" instrument_node="">
</span><p align="justify" data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">WHAT WORRY DOES TO US</span></p></b><span data-dcnode-id="913" instrument_node="">
</span><p align="justify" data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Here is what the lady from the "worry home" says: "I am 
    mentally in a state of agitation most of the time, which hinders me from 
    clear thinking, and this makes it almost impossible for me to compose my 
    mind and to take clear action." </span></p><span data-dcnode-id="910" instrument_node="">
</span><p align="justify" data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">That is exactly what worry does for anyone. It agitates 
    the mind, and as a result clear thinking is impossible; and if one does not 
    think clearly, then one's judgment of facts cannot be clear and correct. 
    Therefore, one can imagine that all sorts of evils are going to happen to 
    him, and his worry is increased. </span></p><span data-dcnode-id="907" instrument_node="">
</span><p align="justify" data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Many people lose control of themselves and go to 
    pieces—their nerves break down, their courage leaves them, they are forlorn, 
    discouraged, and often hopeless. What brought them to such a state? Not the 
    things that were actually facing them, but their worry over those things.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p align="justify" data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">The lady quoted knew the remedy: "I know that simple 
    trust is the remedy, but sometimes this, too, is hard to do and it takes me 
    several hours to get quiet."</span></p><i data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">
</span></i><p align="justify" data-dcnode-id="896"><i data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Worry is a habit which is hard to break. </span></i><span data-dcnode-id="897" instrument_node="">This lady is 
    gaining, however, for even though it does take some time, she is learning to 
    trust; and when she trusts, she comes to quietness of spirit and her worry 
    ends. She has got farther along than many, and she will eventually gain 
    victory over the habit and learn to trust and be at peace even under 
    threatening circumstances. She still give way to worry and this is the 
    result: "I still spend hours in discouragement and almost despair of ever 
    being an overcomer." However, she does not remain in that condition: "Then 
    my faith and courage will rise and I trust and obey through to victory." She 
    further says, "One thought has always helped me in time of trouble: if 
    somebody else has come through this, I can stand it too."</span></p><b data-dcnode-id="892"><span data-dcnode-id="895" instrument_node="">
</span><p align="justify" data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">NO REASON FOR WORRY</span></p></b><i data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">
</span></i><p align="justify" data-dcnode-id="886"><i data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">No Christian has any reason to worry.</span></i><span data-dcnode-id="887" instrument_node=""> Get that fact 
    fixed in your mind. Read it over and over. If you are a Christian, it 
    applies to you. You may be a worrier, but you have no justification for your 
    worry. Read God's promises and see if you can find justification in them for 
    your worrying. Think of how he has helped you in times past, and brought you 
    through even greater difficulties than those which you now face.</span></p><span data-dcnode-id="885" instrument_node="">
</span><p align="justify" data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Look at what God has done for many others. Does that give 
    you reason to worry? Not one good word can be said for worrying. There is no 
    excuse for it—no reason for it. Worry is a sort of mental disease. All bad 
    habits finally become a sort of disease; for they produce physical results. 
    The most common physical result of worry is broken-down nerves, mental 
    instability, and lack of ability to meet things that are coming. </span></p><span data-dcnode-id="882" instrument_node="">
</span><p align="justify" data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Learn to cast your cares on Christ. He will really bear 
    them for you. He will really sustain you. He will really give you grace, 
    courage, help, comfort—and whatever is needed to take you through. No, you 
    have nothing to worry about.</span></p><font data-dcnode-id="876" size="4"><span data-dcnode-id="879" instrument_node="">
</span><p align="justify" data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">&nbsp;</span></p></font><b data-dcnode-id="872"><span data-dcnode-id="875" instrument_node="">
</span><p align="justify" data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">"I DID NOT HAVE GRACE"</span></p></b><span data-dcnode-id="871" instrument_node="">
</span><p align="justify" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">A woman was mildly chiding her friend because she had 
    neglected a duty an missed a golden opportunity. "Yes," the friend replied, 
    "I know I ought to have done it, but I just did not have the grace."</span></p><span data-dcnode-id="868" instrument_node="">
</span><p align="justify" data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">How often this reason is given for coming short of known 
    duty, or leaving undone things we are impressed by the Spirit to do. How 
    often when there is a consciousness of coming short, the twinges of 
    conscience are answered by saying, "I did not have the grace!"</span></p><span data-dcnode-id="865" instrument_node="">
</span><p align="justify" data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Now was it a lack of grace, or was it a lack o something 
    else? Was the reason given just excuse? Let us see what lies behind it. 
    First, "I did not have grace" may mean only "I was not willing to do it." If 
    there is a lingering hesitancy to do a thing, that makes it doubly hard. To 
    compel our reluctant selves to do what we know we ought to do, though we do 
    not want to do it, is a difficult task. And it is very easy to fall back 
    upon so plausible an excuse as lack of grace. We never know whether we are 
    able to do a thing—until we sincerely try it; and we rarely sincerely try to 
    do what we do not want to do.</span></p><span data-dcnode-id="862" instrument_node="">
</span><p align="justify" data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">If there is something within us that says "I don't want 
    to do that"—then we can never say that we cannot do it for lack of grace. 
    God gives grace only for what we are willing to do. Let us face the facts. 
    We somehow find a way to do most of the things we desire to do—and find an 
    excuse for not doing the things we do not want to do. If we make a habit of 
    reluctancy and avoiding duty—it reveals itself in weakness and indecision.</span></p><span data-dcnode-id="859" instrument_node="">
</span><p align="justify" data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Sometimes we are willing and desirous that things be 
    done—but we are not willing to make the necessary exertion to do them. We 
    are prone to take the easy way and make excuses for not accomplishing more. 
    The lazy man is inclined to say "I can't" even when he feels that he could 
    do it, if he would exert himself.</span></p><span data-dcnode-id="856" instrument_node="">
</span><p align="justify" data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Sometimes effort is half-hearted and fails, because there 
    is not enough determination in it. Halfway measures seldom win. Unless we 
    are determined to succeed, we may often be tempted to fall back on the 
    excuse, "I did not have grace." </span></p><span data-dcnode-id="853" instrument_node="">
</span><p align="justify" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Often earnest, persistent effort is necessary; and if we 
    give up when we have only half tried, or have tried only a little while—the 
    failure is because of a lack of grace, but of persistence. A common proverb 
    says that love covers a multitude of sins. It is likewise true that the 
    excuse, "I did not have grace" covers a multitude shortcomings.</span></p><span data-dcnode-id="850" instrument_node="">
</span><p align="justify" data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Perhaps you really did lack grace. If so, why was the 
    grace lacking? If you can find the hindrance and remove it, abundant grace 
    will flow into your heart. Sometimes the hindrance to grace is something 
    that troubles the conscience; that prevents faith and wholehearted 
    prayer—and weakens the arm, and saps the courage. Who could be strong, bold, 
    and persistent, when his conscience is lashing him? If this is the reason 
    your lack of grace, go to God and get the matter settled with him. You must 
    have a clear conscience, before you can be strong in the Lord and have his 
    grace abounding in you.</span></p><span data-dcnode-id="847" instrument_node="">
</span><p align="justify" data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Some lack grace, because they neglect to seek it, or 
    because they seek it without faith. God promised us all the grace we need to 
    live a victorious Christian life; and he will not fail to give us all we 
    need in whatever circumstances may be placed or whatever work we may ha to 
    do. To ask God for grace and then not believe that he gives it—is to prevent 
    his giving it. Faith and grace work together. Grace is helpless without 
    faith. Unbelief is an impassable barrier to grace.</span></p><span data-dcnode-id="844" instrument_node="">
</span><p align="justify" data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Grace is not intended to supply willingness, nor to take 
    the place of earnestness and persistence and faith. Grace is meant to 
    supplement these, and to make up what we lack when we have thrown our whole 
    selves into the matter. God does not favor the lazy person—by doing his work 
    for him, or by making accomplishment so easy that things can be done with 
    little effort. Some people seem to think that if they have grace to do a 
    thing—it will be so easy that they will be merely passive instruments. No, 
    God does not give grace to make things easy—but to make difficult things 
    possible. Every possibility can be turned into an actuality—if we will do 
    our part. If God should by grace make all things easy—then what personal 
    worth would our actions show? What we do is praiseworthy, only to the extent 
    that we put effort into it. What is accomplished by grace, is no credit to 
    us, but to Him who supplies the grace.</span></p><span data-dcnode-id="841" instrument_node="">
</span><p align="justify" data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Since it is God who gives grace—when we excuse ourselves 
    by saying we have not grace, we actually throw the blame on God. But he has 
    said, "My grace is sufficient." If you do not have grace, seek it 
    persistently and in faith, then act as the you had it. You will find that 
    when you put forth an effort, grace will be given. Do not wait to that you 
    have grace, or you may never do anything. Grace is often given the moment it 
    needed. </span></p><span data-dcnode-id="838" instrument_node="">
</span><p align="justify" data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">"Let us therefore come boldly unto throne of grace, that 
    we may obtain mercy, and find grace to help in time of need" (Hebrews 4:16)</span></p><span data-dcnode-id="835" instrument_node="">
</span><b data-dcnode-id="826"><font color="#ff0000" data-dcnode-id="831" size="4"><span data-dcnode-id="834" instrument_node="">
</span><p align="justify" data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="827"><span data-dcnode-id="830" instrument_node="">
</span><p align="justify" data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Building up Ourselves</span></p></font></b><span data-dcnode-id="825" instrument_node="">
</span><p align="justify" data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">The Christian life is a process of building. Jude says, 
    "Building up yourselves on your most holy faith" (verse 20). Growing in 
    grace and in the various attainments of the spiritual life, is a slow 
    building-up process. We often hear of people edifying and building up 
    others, of helping those about them—but it is just as important that they 
    help themselves. There are so many people who are always looking outside of 
    themselves for help. They expect to be built up by their brethren, by 
    preaching, by the prayers of others, by exhortations, by encouragement, and 
    by help that comes from the outside—but the Apostle puts our building up 
    where it rightly belongs—most largely with ourselves.</span></p><span data-dcnode-id="822" instrument_node="">
</span><p align="justify" data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">When we start to build, the first thing we need is a good 
    foundation. Jude tells us what foundation we need: "Building up yourselves 
    on most holy faith." Some people try to build themselves up on their 
    emotions. When everything is going well—they build a structure of courage, 
    termination, hope, expectation, and the like. But presently reverses 
    come—and their building comes down with a crash. Their courage is gone, hope 
    is clouded, and their expectation is pointed. Only faith provides a solid 
    foundation which we may build a structure that will the storms.</span></p><span data-dcnode-id="819" instrument_node="">
</span><p align="justify" data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">By the grace of God we have power to build up ourselves 
    in faith, courage, love, hope, gentleness, meekness, goodness, strength, and 
    all the other elements of Christian character. We may encourage ourselves—or 
    discourage ourselves. We largely are—what we make ourselves. I have heard 
    said of some people, that they were their greatest hindrance.</span></p><span data-dcnode-id="816" instrument_node="">
</span><p align="justify" data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">An experience David once had gives us a good example of 
    how a man can help himself when he is in trouble. In First Samuel 30, we are 
    told how David and his men, who had gone out to war, came back and found 
    their city destroyed and their wives and children taken captive. This was a 
    critical situation. The whole blame was thrown upon David, because he had 
    led his men out to war and left the city unguarded. "And David was greatly 
    distressed; for the people spoke of stoning him" (verse 6). </span></p><span data-dcnode-id="813" instrument_node="">
</span><p align="justify" data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">What did David do in such a crisis? Sneak off like a 
    coward and hide? Did he begin to say, "How awful this is! What in the world 
    shall I do?" Did he say, "It is of no use to try?" No, he faced the 
    situation like a man. When everyone was finding fault with him and speaking 
    evil of him, "David encouraged himself in the Lord his God." What was the 
    result? He pursued after his enemies, defeated them, and recaptured all that 
    had been lost. </span></p><span data-dcnode-id="810" instrument_node="">
</span><p align="justify" data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">If you have met with a defeat, if you have been blaming 
    yourself, and others have been blaming you—do not get downcast and whimper 
    and whine. Encourage yourself in the Lord your God.</span></p><span data-dcnode-id="807" instrument_node="">
</span><p align="justify" data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">In the forty-second Psalm, David tells another of his 
    experiences. In the third verse we read, "My tears have been my food day and 
    night, while they continually say unto me, Where is God?" (Sometimes people 
    sneer at us when we are in trouble, and say—or at least act as if would like 
    to say, "Where is your God?") David must have felt very much depressed 
    indeed. He goes on to say: "My soul is cast down within me. All your waves 
    and your billows are over me." What did he do? In meditation he looked 
    forward and saw a brighter day: "Why are you downcast, O my soul? Why so 
    disturbed within me? Put your hope in God, for I will yet praise him, my 
    Savior and my God."</span></p><span data-dcnode-id="804" instrument_node="">
</span><p align="justify" data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">An example of a person hindering himself is found in 
    Elijah, when he bewailed his situation and thought that he alone was left in 
    Israel to worship God. We may look on the dark side, and discourage 
    ourselves. We may look forward to future with such forebodings, that we cast 
    a cloud over our hope and unfit ourselves to meet trouble when it comes.</span></p><span data-dcnode-id="801" instrument_node="">
</span><p align="justify" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Some people are always finding fault with themselves and 
    pointing out their faults weaknesses to themselves or to others. Such 
    attitude is very unjust. Be fair to yourself. Of course, you have faults and 
    failures—everyone does; but instead of this destruction criticism, adopt a 
    positive attitude. Try to correct your faults and profit by your failures. 
    "I can" wins; "I can't" loses. Really believe that God will take care of you 
    in time of danger—believe that God will bring you through your troubles. By 
    doing these things, you will strengthen your heart to meet your 
    difficulties.</span></p><span data-dcnode-id="798" instrument_node="">
</span><p align="justify" data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">But one may say, "You do not know my troubles." No, but I 
    know your God. Some have written me telling how their crops had failed and 
    lamenting over their situation. What shall they do?</span></p><span data-dcnode-id="795" instrument_node="">
</span><p align="justify" data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">"Even though the fig trees have no blossoms, and there 
    are no grapes on the vines; even though the olive crop fails, and the fields 
    lie empty and barren; even though the flocks die in the fields, and the 
    cattle barns are empty, yet I will rejoice in the LORD! I will be joyful in 
    the God of my salvation! The Sovereign LORD is my strength! He makes me as 
    surefooted as a deer, able to tread upon the heights." Habakkuk 3:17-19.</span></p><span data-dcnode-id="792" instrument_node="">
</span><p align="justify" data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Thus the prophet built up himself. And so may we if we 
    will exercise real faith in God.</span></p><font data-dcnode-id="786" size="4"><span data-dcnode-id="789" instrument_node="">
</span><p align="justify" data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="781"><b data-dcnode-id="782"><span data-dcnode-id="785" instrument_node="">
</span><p align="justify" data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Getting Rid of Troubles</span></p></b></font><span data-dcnode-id="780" instrument_node="">
</span><p align="justify" data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Most people have troubles of one kind another, and they 
    want to know he get rid of them. They try this way and that—yet the troubles 
    still cling to them. They worry and bother, fret and complain, but their 
    troubles grow no less. Sometimes they weep and pray; sometimes they become 
    discouraged and a despair; yet all that they do, only seems to increase 
    troubles.</span></p><span data-dcnode-id="777" instrument_node="">
</span><p align="justify" data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Since trouble is such a common thing, is there no way 
    that we can rise above it and triumph over it? Many people read the 
    scriptural prescription and know what the Bible says to with trouble—but it 
    seems that they try everything else first. The Bible says: "Casting all your 
    cares upon God—for he cares for you." Now there are people who believe the 
    latter part this who never do the first part.</span></p><span data-dcnode-id="774" instrument_node="">
</span><p align="justify" data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Someone says, "Why don't you cast your cares on the 
    Lord?" They reply, "Oh, I have; but it doesn't seem to do any good!" Have 
    they cast their cares on the Lord? No; they have simply brought their 
    trouble to the Lord for him to inspect—they have called his attention to 
    various things concerning it, told him how heavy it is, how weary they have 
    become of bearing it, and how much they need help. And then they have picked 
    up their burden and walked away with it!</span></p><span data-dcnode-id="771" instrument_node="">
</span><p align="justify" data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Have you thought you have been casting your care upon 
    Jesus—and at the same time have gone away from your place of prayer as 
    heavily burdened as before? Maybe you have just been having your troubles 
    inspected and have kept a tight hold upon them yourself. The first thing to 
    do in casting them on Jesus, is to let go of them, since you cannot cast 
    anything down unless you let go of it.</span></p><span data-dcnode-id="768" instrument_node="">
</span><p align="justify" data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Instead of disappearing, the troubles of some people grow 
    larger the more they pray over them and consider them. Their experience is 
    like that of the Psalmist, who said, "The troubles of my heart are enlarged" 
    (Psalm 25:17). When a thing is enlarged, then it is magnified. Often we 
    magnify our troubles by looking at them and thinking of them. </span></p><span data-dcnode-id="765" instrument_node="">
</span><p align="justify" data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">There is a story about an old lady who was walking along 
    the road carrying a heavy basket. A gentleman driving in a carriage invited 
    her to ride with him. She got into the carriage, but the basket was on her 
    lap. The man asked why she did not set it down on the floor of the carriage. 
    She answered, "I am heavy enough myself! I do not want to make the load 
    heavier by setting my basket down." You laugh at this, but perhaps you are 
    doing the same thing. Jesus is having to support both you and your 
    burden—yet you carry the burden too. This does not make it any easier for 
    Jesus, but it does make it harder for you.</span></p><span data-dcnode-id="762" instrument_node="">
</span><p align="justify" data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Do you say, "I can cast some troubles on Lord, but this 
    is a real one"? Do you think Jesus is able to bear only the imaginary 
    troubles, and that you must carry the real ones yourself? You can get rid of 
    the imaginary troubles by forgetting them; you do not need to cast them 
    Jesus. It is the real burdens—the ones that grip your soul, that cause you 
    to suffer, that wound and trouble you—that you should cast on Jesus. You can 
    get rid of them in this way, and only this way. Let go of your troubles. 
    Jesus is adequate to the task of taking care of them, and you too. Think 
    over this text until you really it deep in your heart: "Casting all your 
    cares upon him—for he cares for you."</span></p><font data-dcnode-id="756" size="4"><span data-dcnode-id="759" instrument_node="">
</span><p align="justify" data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="751"><b data-dcnode-id="752"><span data-dcnode-id="755" instrument_node="">
</span><p align="justify" data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">With Face to the Wall</span></p></b></font><span data-dcnode-id="750" instrument_node="">
</span><p align="justify" data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">The experience of Hezekiah related in the thirty-eighth 
    chapter of Isaiah, is full of lessons for us today. One of the most striking 
    expressions in it is: "Then Hezekiah turned his face toward the wall." He 
    was king. Dominion was his right. He was accustomed to giving commands and 
    having them obeyed. His desires were gratified, and his word was law. Though 
    he ruled in majesty, he had now come face to face with one who would not 
    obey him. Sickness held him in its grasp, and his majesty and glory counted 
    for nothing. Moreover, a message from God's prophet had told him that this 
    was a fatal illness. Death comes to the king, as well as to the humblest 
    servant.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p align="justify" data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">What should Hezekiah do in this crisis? His servants were 
    around him, solicitous for his welfare, ready to do whatever they could for 
    him. His splendid throne was unoccupied, and his glory forgotten. How empty 
    his honors must have seemed, and how weak was his authority! He turned his 
    face to the wall, away from the imperial and the jeweled diadem, and the 
    applause of people. He turned away from his riches—they were only vanity 
    now, unable to help him.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p align="justify" data-dcnode-id="733"><span data-dcnode-id="743" instrument_node="">There are times when we find human help unavailing. We 
    must pass through some things life alone. Some burdens, none can share. Some 
    sorrows, no one can assuage. There are some conflicts for which we can 
    summon no human reinforcements. Others may yearn to help and cheer and 
    strengthen us; but their well-meant efforts may only hinder instead of help. 
    We turn our faces to the wall, not knowing what to do. Perhaps we are almost 
    in despair; the </span><i data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">future </span></i><span data-dcnode-id="740" instrument_node="">looks dark, the </span><i data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">past </span></i><span data-dcnode-id="737" instrument_node="">has been 
    disappointing, and </span><i data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">present </span></i><span data-dcnode-id="734" instrument_node="">is the worst of all.</span></p><span data-dcnode-id="732" instrument_node="">
</span><p align="justify" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">When Hezekiah turned his face to the wall "he wept 
    sorely." He gave way to the sorrow his heart. "Ah, yes," you may say, "I 
    feel like doing that too. What else can I do?" God did not chide Hezekiah 
    for weeping. Neither will he chide you if your heart seems broken. Christ 
    was a "man of sorrows, and acquainted with grief." You and I will have 
    occasion for tears and sighs in our own lives, for it has pleased God to 
    place us in such circumstances that the fiber of our manhood and womanhood 
    may be tested. </span></p><span data-dcnode-id="729" instrument_node="">
</span><p align="justify" data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Sorrow is a great softener of the heart. Someone has said 
    that "tears are the rain that God pours into the heart." The bitterest of 
    all tears, are the ones that we shed alone, caused by those sorrows and 
    troubles that are peculiarly are own, and into which even the tenderest 
    sympathy cannot enter to help.</span></p><span data-dcnode-id="726" instrument_node="">
</span><p align="justify" data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Weeping cannot always continue—something else must follow 
    it. Many times discouragement and despair have followed. While Hezekiah 
    wept, he talked with God, though he had no indications that God would help 
    him. Through the wall, Hezekiah saw God as a loving, tender, pitiful, 
    infinite, compassionate Father. He saw God as the refuge of the oppressed, 
    the helper of the needy, the uplifter of the fallen. He looked to God—but 
    not as the majestic ruler, the lawgiver, the avenger of sin. As a son of 
    Israel, he looked to the Father of Israel and poured out his heart.</span></p><b data-dcnode-id="720"><span data-dcnode-id="723" instrument_node="">
</span><p align="justify" data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">THE COURAGE OF A GOOD CONSCIENCE</span></p></b><span data-dcnode-id="719" instrument_node="">
</span><p align="justify" data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">There was one thing that must have been very consoling to 
    Hezekiah at this time: he could come to God with a clear conscience and a 
    sense of the uprightness of his life. The New Testament says, "If our heart 
    does not condemn us—then we have confidence toward God." This was the secret 
    of Hezekiah's confidence—his heart did not condemn him. How good it is, if 
    in our times of troubles, when our faces turn to the wall, we can approach 
    God as Hezekiah did, and say to him: "You know that my heart is not set upon 
    evil, but upon good; and my purpose is to serve God aright. My life has been 
    pure before God." There is no other strength like the strength of a clear 
    conscience. There is no satisfaction like that of a well lived life. There 
    is no peace like the peace of conscience. Hezekiah's life must have been 
    upright, for men face to face with God speak the truth to him.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p align="justify" data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">When we come to God in our times of need, and can plead 
    the innocence and uprightness our hearts—then God will hear us. Our tears 
    will not be overlooked, and the yearnings of our heart will reach the heart 
    of God. He will send us help we need, to bring us out victorious. But if our 
    faces are turned to the wall, and we cannot plead that God has seen only 
    good in our lives; if our consciences do condemn us; if our shortcomings 
    stand out clearly before us; yet if we have the earnestness of repentance 
    that means a turning to the right, God will hear and help. God quickly 
    forgets the past—when the heart turns to him in submission and in 
    willingness to do his will. And so when human help fails us, let us turn our 
    faces to the wall and, if need be, weep sorely; and pray with all our hearts 
    whatever prayer may be necessary—and the God of all grace and comfort will 
    be our help and our deliverer.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p align="justify" data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Even in life's darkest hour we should not allow ourselves 
    to despair. God is ever on the side of those who try to do his will. He is a 
    present help, although our eyes may frequently fail to see him. It may seem 
    to us, as it did to Job, that God hides himself. All too often he is hidden 
    only because our vision is filled with the things that prevent our seeing 
    him. We see only the wall, and seeing it we fail to look at God's mercy and 
    help. Look beyond the difficulties and the threatening dangers, the failure 
    of human help—and even our own failures—to the One whose loving heart never 
    permits him to forget ,and who will never fail us in our time of need!</span></p><span data-dcnode-id="710" instrument_node="">
</span><font data-dcnode-id="706" size="4"><span data-dcnode-id="709" instrument_node="">
</span><p align="justify" data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="701"><b data-dcnode-id="702"><span data-dcnode-id="705" instrument_node="">
</span><p align="justify" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Beauty for Ashes</span></p></b></font><span data-dcnode-id="700" instrument_node="">
</span><p align="justify" data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Isaiah prophesied that Christ would be sent "To bind up 
    the brokenhearted, to proclaim freedom for the captives and release from 
    darkness for the prisoners, to proclaim the year of the LORD's favor and the 
    day of vengeance of our God, to comfort all who mourn, and provide for those 
    who grieve in Zion— to bestow on them a crown of beauty instead of ashes, 
    the oil of gladness instead of mourning, and a garment of praise instead of 
    a spirit of despair. They will be called oaks of righteousness, a planting 
    of the LORD for the display of his splendor." Isaiah 61:1-3 </span></p><span data-dcnode-id="697" instrument_node="">
</span><p align="justify" data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">We do not have to live to be very old, to learn that many 
    of our plans, hopes, and expectations are burned up in the fires of 
    circumstances—and only their ashes remain to us. Losses and disappointments 
    will come. Many of our fondest hopes will perish before our eyes, leaving 
    only heaps of ashes.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p align="justify" data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">The natural tendency at such a time is to conclude that 
    all is lost, that nothing remains to us of the things that were so precious. 
    I have seen people stand and look upon the ashes of a burned down home—ashes 
    representing the savings of many years, the loss of beautiful things that 
    had be gathered together. </span></p><span data-dcnode-id="691" instrument_node="">
</span><p align="justify" data-dcnode-id="686"><span data-dcnode-id="690" instrument_node="">I have seen others whose </span><i data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">hopes </span></i><span data-dcnode-id="687" instrument_node="">had become only 
    ashes; business losses, loss of loved ones, or grievous disappointments—had 
    left what seemed to them to be only a few ashes. </span></p><span data-dcnode-id="685" instrument_node="">
</span><p align="justify" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">The tendency is usually to sit beside these ashes and 
    mourn. Sometimes people spend the remainder of their lives in mourning and 
    self-pity.</span></p><span data-dcnode-id="682" instrument_node="">
</span><p align="justify" data-dcnode-id="674"><span data-dcnode-id="681" instrument_node="">In the passage quoted at the beginning of this article, 
    the Prophet Isaiah was probably referring to the custom of people putting on 
    sackcloth and sitting in ashes, as a token of mourning. Jesus, he said, was 
    "to comfort all that mourn." God does not intend that you and I should 
    </span><i data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">treasure our ashes </span></i><span data-dcnode-id="678" instrument_node="">and make of them a sort of wailing place to which we 
    go to express our sorrow. He does not want us to linger around our ash 
    piles. We shall have them—we may depend on that. Trouble will come into 
    every life sooner or later. Into some lives, there will come </span><i data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">much </span></i><span data-dcnode-id="675" instrument_node="">trouble, suffering, and disappointments. But God does not intend that we be 
    mourners.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p align="justify" data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Our griefs are to be assuaged, our sorrows are to be 
    comforted. We are to be given something instead of them—something to replace 
    them. God will give beauty for ashes, the oil of joy for mourning, and the 
    garment of praise for spirit of heaviness.</span></p><span data-dcnode-id="670" instrument_node="">
</span><p align="justify" data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Are you sitting beside the ashes of your smashed hopes, 
    lost friendships, business losses? Are mourning? This is not God's plan for 
    you. It is natural for us to mourn over our losses—but that mourning should 
    have an end. Our soup should cease, and the fountain of our tears should 
    dried up.</span></p><span data-dcnode-id="667" instrument_node="">
</span><p align="justify" data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">God will do these things for us, but he will not wrap up 
    his help and blessing and send it in surprise package to us. We must seek 
    the fulfillment of God's promise, by preparing our hearts to receive God's 
    gift, and by having a receptive attitude. To have such an attitude, we must 
    turn away from our ashes. We must put the past with its losses and 
    disappointments behind us—and turn to the future as to a new day.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p align="justify" data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">God cannot comfort us, if we choose to mourn. He cannot 
    give us beauty, if we preserve our ashes. He cannot fill our hearts with 
    glad, new thoughts and songs of praise—if we hold fast the old sorrows and 
    continue to shed tears. We must submit to God's changing our ashes into 
    beauty. We must have our vessel ready for the oil of joy. The garment of 
    praise cannot be put on—until the old garments of sorrow and complaint and 
    self-pity are put off. </span></p><span data-dcnode-id="661" instrument_node="">
</span><p align="justify" data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Have you been wanting the Lord to comfort you, to give 
    you beauty for your ashes? Your attitude may be the only thing that has kept 
    you from receiving these precious blessings which God has for you.</span></p><span data-dcnode-id="658" instrument_node="">
</span><p align="justify" data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Ashes may be very useful. When my father wanted to raise 
    turnips, he would build a big brush pile and burn it, and then plant his 
    turnip seed in the ashes. I have seen other ash-heaps growing crops of 
    nettles. Ashes are fertile. Whatever seed is sown into them, whether by man 
    or by nature—will produce a crop. What sort of seed have we sown in our 
    ashes? If we sow no seed—then weeds will grow. If we sow seeds of remorse, 
    self-pity, or resentment against life or against people—then we shall have a 
    crop and we shall reap it, but not with joy. If we sow the right kind of 
    seed—then we shall reap with joy, because we shall have a worth-while 
    harvest.</span></p><span data-dcnode-id="655" instrument_node="">
</span><p align="justify" data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">If I may be permitted to speak of myself, I can say that 
    I know what it is to have my life's hopes become only ashes. For eight years 
    after I had been confined to my bed, I saw no hope that I would ever be able 
    to accomplish anything more. I could only lie in bed and suffer, and be 
    waited on by others. I was only a burden to others, and to myself. There 
    seemed to be no prospect that the purpose of my life would be carried out. I 
    could no longer preach or write. I had few opportunities for service of any 
    kind. I knew the bitterness of disappointment. For eight long years there 
    was no hint of anything better, but then God opened the for a fuller life 
    than I had ever had before—and of greater and wider service. He gave me joy 
    my ashes, and now I can see that the ashes were a very necessary part of my 
    life.</span></p><span data-dcnode-id="652" instrument_node="">
</span><p align="justify" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Because of losses and failures, life often comes richer 
    and more beautiful. We read of those who "out of weakness were made strong." 
    Paul suffered the loss of all things.</span></p><span data-dcnode-id="649" instrument_node="">
</span><p align="justify" data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Don't waste your ashes. Don't sit moping over them. Make 
    a garden of them!</span></p><font data-dcnode-id="643" size="4"><span data-dcnode-id="646" instrument_node="">
</span><p align="justify" data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="638"><b data-dcnode-id="639"><span data-dcnode-id="642" instrument_node="">
</span><p align="justify" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">The Challenge of Obstacles</span></p></b></font><span data-dcnode-id="637" instrument_node="">
</span><p align="justify" data-dcnode-id="633"><span data-dcnode-id="636" instrument_node="">"The only use of an obstacle, is to be overcome. All that 
    an obstacle does with brave men is, not to frighten them, but to challenge 
    them. So that it ought to be our goal to overcome everything that stands in 
    the way." </span><i data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Woodrow Wilson</span></i></p><span data-dcnode-id="632" instrument_node="">
</span><p align="justify" data-dcnode-id="621"><span data-dcnode-id="631" instrument_node="">In the ancient days of chivalry, when the knights arrayed 
    themselves in armor, it was a common thing for a man to be challenged to 
    personal combat by another. A man traveling in that day knew not when he 
    might meet an adversary, and it behooved him to have his weapons at hand and 
    to be ready to use them. That day has gone, but there are still adversaries, 
    and very real ones, to challenge us on life's way. Not only are there </span><i data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">enemies 
    </span></i><span data-dcnode-id="628" instrument_node="">to meet—but there are </span><i data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">obstacles </span></i><span data-dcnode-id="625" instrument_node="">and </span><i data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">hindrances </span></i><span data-dcnode-id="622" instrument_node="">to 
    overcome. There can be no great achievement, unless there are great 
    obstacles; for achievement is triumphing over obstacles and overcoming 
    difficulties. The promises are all to the overcomer—not to the man who has 
    no difficulties to overcome. </span></p><span data-dcnode-id="620" instrument_node="">
</span><p align="justify" data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">When the warrior of old faced an adversary and his 
    challenge, he had either to meet him boldly, or to run away like a coward. 
    Every obstacle which rises in our way says defiantly, "I challenge you to 
    combat."</span></p><span data-dcnode-id="617" instrument_node="">
</span><p align="justify" data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">The first test given by an obstacle is the test of our 
    courage. Strength will avail us not, if we have not the courage to use it. 
    The foundation of victory, is always courage. Soldiers may shrink and 
    tremble when the battle begins, the difference between the one who stays and 
    fights, and the one who runs away, is courage. A brave soldier may tremble, 
    but he will nerve himself for the conflict. He does not consider running 
    away; he will do or die. </span></p><span data-dcnode-id="614" instrument_node="">
</span><p align="justify" data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">"The only use an obstacle," said Woodrow Wilson, "is to 
    overcome." It was not God's intention that obstacles should overcome us, but 
    that we should overcome them. Nothing else can develop our latent powers; 
    nothing else can increase our strength. Obstacles are opportunities—the 
    stepping-stones to higher life and greater attainment!</span></p><span data-dcnode-id="611" instrument_node="">
</span><p align="justify" data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">It is pointed out in the quotation, that it ought to be 
    our goal to overcome obstacles. We should have that virile, manly spirit of 
    determination not to be overcome, but to use one's powers in their most 
    effective way to win. There is a sort of pride in maintaining ourselves 
    undefeated, that brings out the best that is in us and causes us to summon 
    all our energies and throw them determinedly into the conflict. </span></p><span data-dcnode-id="608" instrument_node="">
</span><p align="justify" data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">During World War I, we often saw the phrase, "The will to 
    victory." This will to win, this determination not to be conquered, is as 
    needful in the Christian life as in the conflict of armies. Where it is 
    lacking, there will be few victories and little achievement. Many people 
    fail because they lack this will to conquer. Some people stop trying to live 
    the Christian life, because they do not have the will to face discouragement 
    and obstacles with full intent to conquer them.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p align="justify" data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Being creatures of environment and heredity, no matter 
    how ardently we desire to serve God—we shall find within ourselves 
    tendencies and dispositions that must be overcome, or they will overcome us. 
    Some people have a tendency to be selfish—to become more interested in their 
    own gratification than in others. Some are prone to distrust others, and 
    find it hard to repose confidence in them. Others may be inclined to 
    jealousy—these may have battles to fight over and over. But unless they 
    conquer this disposition, they will seriously hinder their happiness. </span></p><span data-dcnode-id="602" instrument_node="">
</span><p align="justify" data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Some are disposed to envy those who seem to be more 
    favored than they themselves. The feeling that others always have a better 
    chance—often lead to discouragement. Some speak or act impulsively without 
    considering results, and so cause themselves much trouble. Self-esteem, love 
    of ease, and exaggeration may cause trouble.</span></p><span data-dcnode-id="599" instrument_node="">
</span><p align="justify" data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">But why need I add to the catalogue of these things? 
    Everyone knows those particular things in himself which are obstacles to the 
    normal full development of the Christian life and the full operation of 
    God's grace in his soul. What shall we say when we face these things? Shall 
    shrink like cowards from their challenge? Or shall we face them, and conquer 
    them?</span></p><span data-dcnode-id="596" instrument_node="">
</span><p align="justify" data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">There are also external obstacles—natural obstacles, and 
    obstacles put in our way by others. These must be met with that same "will 
    to victory" as the internal obstacles. They will yield, as all such things 
    must yield, to him who faces them manfully. Put on the whole armor of God. 
    Go forward calmly, courageously, confidently, determinedly, meeting all 
    obstacles with an unfaltering faith, trusting in God!</span></p><font data-dcnode-id="587" size="4"><span data-dcnode-id="593" instrument_node="">
</span><p align="justify" data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">&nbsp;</span></p><span data-dcnode-id="590" instrument_node="">
</span><p align="justify" data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="582"><b data-dcnode-id="583"><span data-dcnode-id="586" instrument_node="">
</span><p align="justify" data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Is God Our Friend?</span></p></b></font><span data-dcnode-id="581" instrument_node="">
</span><p align="justify" data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">I suppose more songs have been written on the subject of 
    God's being our friend, than upon any other topic.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p align="justify" data-dcnode-id="573"><span data-dcnode-id="577" instrument_node="">We sing the old song, "What a Friend we have in </span><i data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Jesus</span></i><span data-dcnode-id="574" instrument_node="">," 
    and we do well to sing it; for he is a true friend in whom we may trust, a 
    friend who is always loyal, a friend who will never fail us.</span></p><span data-dcnode-id="572" instrument_node="">
</span><p align="justify" data-dcnode-id="567"><span data-dcnode-id="571" instrument_node="">But how about the </span><i data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Father?</span></i><span data-dcnode-id="568" instrument_node=""> What is his attitude 
    toward us? Is he also our friend, if we are his faithful children? Jesus is 
    so much like the Father that he said, "He who has seen me, has seen the 
    Father" (John 14:9). The attitude of the Father toward us, is just as 
    friendly as the attitude of Jesus. In fact, it was the Father's love that 
    sent Jesus to this world and made him our redeemer and friend. We are on
