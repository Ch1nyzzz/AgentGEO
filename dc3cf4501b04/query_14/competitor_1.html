            <template shadowrootmode="closed"><html data-dcnode-id="1"><head data-dcnode-id="1733"><meta name="robots" content="noindex, nofollow"><meta charset="utf-8"></head><body data-dcnode-id="2"><span data-dcnode-id="1741" instrument_node="">
</span><meta content="en-us" data-dcnode-id="1740" http-equiv="Content-Language"><span data-dcnode-id="1739" instrument_node="">
</span><meta content="text/html; charset=utf-8" data-dcnode-id="1738" http-equiv="Content-Type"><span data-dcnode-id="1737" instrument_node="">
</span><title data-dcnode-id="1735">When Adversity Comes</title><span data-dcnode-id="1734" instrument_node="">
</span><span data-dcnode-id="1732" instrument_node="">
</span><span data-dcnode-id="1731" instrument_node="">
</span><font data-dcnode-id="1729" size="4"><span data-dcnode-id="1730" instrument_node="">
</span></font><blockquote data-dcnode-id="4"><font data-dcnode-id="1727" size="4"><span data-dcnode-id="1728" instrument_node="">
</span></font><blockquote data-dcnode-id="6"><font data-dcnode-id="1725" size="4"><span data-dcnode-id="1726" instrument_node="">
</span></font><font color="#ff0000" data-dcnode-id="1720" size="4"><b data-dcnode-id="1721"><span data-dcnode-id="1724" instrument_node="">
</span><p align="center" data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">When Adversity Comes</span></p></b></font><span data-dcnode-id="1719" instrument_node="">
</span><p align="center" data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Charles Naylor, 1944</span></p><font data-dcnode-id="1713" size="4"><span data-dcnode-id="1716" instrument_node="">
</span><p align="justify" data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">&nbsp;</span></p></font><span data-dcnode-id="1712" instrument_node="">
</span><p align="justify" data-dcnode-id="1708"><span data-dcnode-id="1711" instrument_node="">Publisher's Preface:</span><br data-dcnode-id="1710"><span data-dcnode-id="1709" instrument_node="">Out of the personal experience of a sufferer, a man who because of 
    accidental injuries has been bedfast for thirty-five years, this book has 
    come. Here is a man who speaks the language of those who have suffered 
    adversity—loss of health, bereavement, unexpected reverses, disappointed 
    hopes, and many other calamities that happen to people.</span></p><span data-dcnode-id="1707" instrument_node="">
</span><p align="justify" data-dcnode-id="1702"><span data-dcnode-id="1706" instrument_node="">The thoughts printed in this book are not theoretical. 
    They were not born in the mind of one who was merely trying to be helpful to 
    those less fortunate than he. Rather, they flow forth from the inmost soul 
    of one who himself has had to wrestle with adversity.</span><i data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node=""> </span></i><span data-dcnode-id="1703" instrument_node="">Naylor spent 
    thirty-five years as a bedridden invalid with pain as a constant companion, 
    serious financial losses, and the loss of his wife. By the help of God he 
    has mastered the calamities that came upon him in life. For that reason he 
    is competent to give help to others.</span></p><font data-dcnode-id="1698" size="4"><span data-dcnode-id="1701" instrument_node="">
</span><p align="justify" data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="1693"><b data-dcnode-id="1694"><span data-dcnode-id="1697" instrument_node="">
</span><p align="justify" data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">When the Going Becomes Hard</span></p></b></font><span data-dcnode-id="1692" instrument_node="">
</span><p align="justify" data-dcnode-id="1687"><span data-dcnode-id="1691" instrument_node="">When youth's bright imagination looks forward, it gazes 
    down the</span><i data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node=""> vista of life</span></i><span data-dcnode-id="1688" instrument_node=""> and sees a bright future. People expect their 
    lives to be replete with happiness. They think of themselves as being happy, 
    they expect to be happy, they think that this life was made for happiness.</span></p><span data-dcnode-id="1686" instrument_node="">
</span><p align="justify" data-dcnode-id="1681"><span data-dcnode-id="1685" instrument_node="">One of the components of happiness for which people look, 
    is </span><b data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">ease</span></b><span data-dcnode-id="1682" instrument_node="">. Ease and comfort are two of the most desirable things in the 
    estimate of most people. Few people look forward and plan their lives to be 
    lives of toil and adversity. They expect to be so successful, that they may 
    sometime possess enough of the goods of this world to say, like one of old, 
    "Soul, you have plenty of good things laid up for many years. Take life 
    easy; eat, drink and be merry!" This is the goal of millions—the desire of 
    multitudes.</span></p><span data-dcnode-id="1680" instrument_node="">
</span><p align="justify" data-dcnode-id="1669"><span data-dcnode-id="1679" instrument_node="">Another thing that looms large on the skyline of life is
    </span><b data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">pleasure</span></b><span data-dcnode-id="1676" instrument_node="">. </span><i data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Gratification </span></i><span data-dcnode-id="1673" instrument_node="">of desire stands out as a thing to be 
    attained at all costs, for it is supposed to bring pleasure; therefore, 
    gratification is thought of as life's greatest good. The </span><i data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">goddess of 
    pleasure </span></i><span data-dcnode-id="1670" instrument_node="">is thought to be the giver of all that is most desirable. On 
    these things people set their hopes, and for them they make their plans. To 
    attain them seems to be life's most desirable ambition.</span></p><b data-dcnode-id="1665"><span data-dcnode-id="1668" instrument_node="">
</span><p align="justify" data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">THE CERTAINTY OF TROUBLE</span></p></b><span data-dcnode-id="1664" instrument_node="">
</span><p align="justify" data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">No one plans to have adversity in his life. Did you ever 
    see anyone who deliberately made provision in his life's plan for 
    adversities? Troubles are not wanted; they are shunned. Most people are like 
    those of whom the writer of the tenth Psalm speaks: "He has said in his 
    heart, I shall not be moved—for I shall never be in adversity" (Psalm 10:6).
    </span></p><span data-dcnode-id="1661" instrument_node="">
</span><p align="justify" data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Yet there are few who escape adversity. If we look at the 
    people around us and study their lives one by one, we shall see that life is 
    rarely ever smooth sailing all the way. Life has its difficulties, its hard 
    things—things that test the fiber of our souls. To believe we shall not have 
    our part in the adversities which beset others, is wishful thinking.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><p align="justify" data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Since good and evil are so blended in the world, 
    adversity is quite certain to come to us in one form or another. We may 
    expect our share, and should not leave it out of account in life's plans. 
    According to the law of averages and the law of probabilities, we know that 
    we shall not escape. </span></p><span data-dcnode-id="1655" instrument_node="">
</span><p align="justify" data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">This should not alarm us, neither should it make us 
    believe we shall be unhappy. We should not shrink from the future because of 
    it; we should prepare for it. This does not mean that we should fear it and 
    let its possible coming throw a deep shadow over life; neither should we 
    live under a strain, expecting trouble to overtake us at any time. We ought 
    to be ready to meet it bravely, confidently, and resourcefully, so that we 
    shall not be overwhelmed.</span></p><b data-dcnode-id="1649"><span data-dcnode-id="1652" instrument_node="">
</span><p align="justify" data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">USE YOUR RESERVE POWER</span></p></b><span data-dcnode-id="1648" instrument_node="">
</span><p align="justify" data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">At the same time that we are aware of life's 
    possibilities, we should be conscious of our own possibilities. Our bodies 
    are built with much greater capacity than we use day by day. In time of need 
    or danger or sickness, we draw upon these extra resources. This is true in 
    every part of our being. In other words, we are given capacities to meet 
    things far beyond what come upon us in our daily, normal life. Therefore, if 
    the going becomes rough, if the way becomes difficult—we have at hand 
    capabilities that enable us to rise to meet the need, and the first thing to 
    do is to draw upon these reserves.</span></p><span data-dcnode-id="1645" instrument_node="">
</span><p align="justify" data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">No wise general expects unfailing victory. He plans for 
    victory, works for victory, does everything possible for victory; but at the 
    same time he always has other plans to fall back on if he meets defeat. If 
    his army is defeated he will have everything ready to fall back to a 
    previously chosen strong position in the rear and there he will again 
    marshal his forces, make his dispositions, and be ready for a new encounter 
    with the foe.</span></p><span data-dcnode-id="1642" instrument_node="">
</span><p align="justify" data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">The good general will anticipate any surprise moves of 
    the enemy and have counter measures prepared. We have in our history 
    examples of generals who failed to take such precautions and whose plans 
    were not adequate to meet the conditions that arose.</span></p><span data-dcnode-id="1639" instrument_node="">
</span><p align="justify" data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">In the Indian wars in the Ohio country, General St. Clair 
    marched out with his army confident that he would be able to defeat the 
    Indians. They surprised him by attacking him and his army before he expected 
    it. He had not taken proper precautions. In a little while his army was 
    defeated with great slaughter. Later, General Wayne led his army against 
    these same Indian tribes. He was a general who took every precaution. The 
    Indians could not surprise him. To them he was a man who never slept but was 
    always on the alert. He defeated the Indians and compelled them to sue for 
    peace.</span></p><span data-dcnode-id="1636" instrument_node="">
</span><p align="justify" data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">At the battle of Chancellorsville, General Hooker is said 
    to have had more than twice as many troops as Lee and Jackson. He was 
    confident of success; he was certain the enemy must retreat; but General 
    Jackson passed around Hooker's flank and in the early dawn struck him a 
    mighty and unexpected blow. My grandfather was with his regiment in the 
    Eleventh Corps that stood in Jackson's path. They were taken by surprise, 
    outflanked, and driven from the field. This severe defeat resulted from 
    over-confidence, lack of care, and lack of preparation.</span></p><span data-dcnode-id="1633" instrument_node="">
</span><p align="justify" data-dcnode-id="1619"><span data-dcnode-id="1632" instrument_node="">Many people are taken by surprise by </span><i data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">adversity</span></i><span data-dcnode-id="1629" instrument_node="">—they 
    are thrown into a panic and cannot summon their resources immediately. The 
    result often is that they are overwhelmed by the adversity thus unexpectedly 
    met. Some give way to discouragement, or even to despair. They had planned 
    happiness, they were looking for </span><i data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">pleasure </span></i><span data-dcnode-id="1626" instrument_node="">and </span><i data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">gratification</span></i><span data-dcnode-id="1623" instrument_node="">, 
    for </span><i data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">ease</span></i><span data-dcnode-id="1620" instrument_node="">. They expected to do as they liked, and have a good time. 
    Adversity was the last thing they had expected, and they had no plans to 
    meet it. Their thought now is, "What shall I do?" </span></p><span data-dcnode-id="1618" instrument_node="">
</span><p align="justify" data-dcnode-id="1613"><span data-dcnode-id="1617" instrument_node="">Generally, they look for some easy way out—but adversity 
    usually has no easy way out. There are a great many things that we have to 
    go through, the hard way. There is always a way </span><i data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">through </span></i><span data-dcnode-id="1614" instrument_node="">adversity, 
    and many times that way is simpler than it seems at first. In any event, it 
    will require courage and determination. It will demand that we summon all 
    our resources and meet it manfully. It will not do to whimper and pity 
    ourselves, lament and weep.</span></p><span data-dcnode-id="1612" instrument_node="">
</span><p align="justify" data-dcnode-id="1607"><span data-dcnode-id="1611" instrument_node="">Some who read this do not look forward to possible 
    adversities—their adversities have already arrived. They are now facing them 
    or they are now in the midst of them. The question with them is,</span><i data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node=""> "What 
    shall we do now?" </span></i><span data-dcnode-id="1608" instrument_node="">The stress and strain is not a future thing with them, 
    but a present reality. In this volume we shall try to suggest some ways of 
    meeting the stress of adversities.</span></p><b data-dcnode-id="1598"><font color="#ff0000" data-dcnode-id="1603" size="4"><span data-dcnode-id="1606" instrument_node="">
</span><p align="justify" data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="1599"><span data-dcnode-id="1602" instrument_node="">
</span><p align="justify" data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">The USES of Adversity</span></p></font></b><span data-dcnode-id="1597" instrument_node="">
</span><p align="justify" data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">The common thought regarding adversity, is that it is 
    only destructive; it sweeps away what we possess, destroys what we value, 
    robs us of that which we cherish, sets up barriers before us, and makes life 
    difficult.</span></p><span data-dcnode-id="1594" instrument_node="">
</span><p align="justify" data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Yes, it does all this; and to many, it is only 
    destructive. But out of the evil, good can often come; or the evil can be 
    transmuted into good. Some people are ruined by adversity. To them it seems 
    that nothing is left. They can only sit down, fold the hands, and mourn for 
    the loss which they have sustained. Often such people give themselves over 
    to finding fault with others, or blaming God for what they have suffered. 
    They may blame some of their fellow men and give way to resentment, 
    complaining, bitterness, and general dissatisfaction with everything.</span></p><span data-dcnode-id="1591" instrument_node="">
</span><p align="justify" data-dcnode-id="1586"><span data-dcnode-id="1590" instrument_node="">I know people who for years have been going about 
    repeating the story of their wrongs, their losses, or their other 
    misfortunes, again and again, to whoever will listen. They never get out 
    from the shadow of these things. </span><i data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">They permit their lives to be blighted 
    and embittered and soured. </span></i><span data-dcnode-id="1587" instrument_node="">They are unhappy, morose, discontented. They 
    think their state of mind is the result of the adversity they have suffered.
    </span></p><span data-dcnode-id="1585" instrument_node="">
</span><p align="justify" data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">This is not at all the case. Other people have suffered 
    adversity without holding any such attitudes toward life or toward people or 
    toward God. They have kept sweet-spirited. Their lives have not been robbed 
    of their values, their beauty, or even of their serenity. The former people 
    are what they are, not because of what they have suffered—but because of the 
    sinful attitude they have taken toward their sufferings and losses.</span></p><span data-dcnode-id="1582" instrument_node="">
</span><p align="justify" data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Adversity can make us—or break us; it can rob us—or 
    enrich us. What it does for us, depends upon us and our outlook on 
    life—whether we count ourselves beaten or to have met merely a setback which 
    may be overcome.</span></p><b data-dcnode-id="1576"><span data-dcnode-id="1579" instrument_node="">
</span><p align="justify" data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">We must Use Adversity as a Door of Opportunity</span></p></b><span data-dcnode-id="1575" instrument_node="">
</span><p align="justify" data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Two miners lived in a cabin on a mountainside. There had 
    been many rich mines in this mountain. Now, however, they were pretty well 
    worked out and were being abandoned one by one. The miners were drifting 
    away, and these two were about ready to abandon their cabin and go away 
    also. But one night it caught on fire and burned to ashes. A short time 
    later it was discovered that this cabin had been sitting upon a rich 
    outcropping of valuable ore. The loss of the cabin revealed the hidden 
    treasure.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><p align="justify" data-dcnode-id="1564"><span data-dcnode-id="1571" instrument_node="">Our adversities, if we examine them properly, may reveal 
    to us </span><i data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">hidden treasures </span></i><span data-dcnode-id="1568" instrument_node="">not suspected before. The hidden gold of </span><i data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">character 
    </span></i><span data-dcnode-id="1565" instrument_node="">may be brought to light—characteristics we did not know we 
    possessed may come to the surface. We may find new strength. Qualities and 
    capacities that have been unused, and even not suspected, may show 
    themselves.</span></p><span data-dcnode-id="1563" instrument_node="">
</span><p align="justify" data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Many men and women have been going along in life with 
    favorable circumstances, taking life easy, enjoying its pleasures—but merely 
    drifting where the current carried them. Then adversity came, ease went out 
    of life, and difficulties were multiplied. But instead of bewailing their 
    fate, these people have taken a new grip upon themselves and faced life in a 
    new way. Refusing to surrender to circumstances, they have summoned their 
    resources and have become something they were not before, and something they 
    never would have become—had adversity not overtaken them.</span></p><span data-dcnode-id="1560" instrument_node="">
</span><p align="justify" data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Adversity often means opportunity. It may close the way 
    in one direction, only to open it to a wider vista, to a richer, fuller 
    life. However, if we are not careful, we shall not look for the 
    opportunities that adversity brings. We shall see only the way closed before 
    us, our hopes trailed in the dust, our expectations unrealized. The effect 
    adversity has upon us, does not depend upon the adversity; it depends upon 
    us and on what we do after adversity strikes. Adversity may floor us; we may 
    be knocked out for a time—but we do not need to remain in that condition. We 
    can arise again and bravely face what life has brought to us.</span></p><span data-dcnode-id="1557" instrument_node="">
</span><p align="justify" data-dcnode-id="1546"><span data-dcnode-id="1556" instrument_node="">We can spend our time looking at what adversity has done 
    to us—or we can look for what we can do to adversity. We can strike a lump 
    of clay with a hammer, and it is crushed to pieces. We can strike a lump of 
    wax, and impress the shape of the hammer on it. We can strike a piece of 
    rubber, and the hammer rebounds and the rubber is unharmed. People can be 
    like the </span><i data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">clay</span></i><span data-dcnode-id="1553" instrument_node="">, the </span><i data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">wax</span></i><span data-dcnode-id="1550" instrument_node="">, or the </span><i data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">rubber</span></i><span data-dcnode-id="1547" instrument_node="">. Their response 
    to the stroke of adversity depends upon themselves and their attitude toward 
    life. As we develop this attitude from day to day through the years—we 
    prepare ourselves to meet adversity, or we go on unprepared to meet it. We 
    choose to build up the attitudes we need to meet adversity, or we choose to 
    neglect to do so. We cannot escape adversity, or if we do escape it, we may 
    be worse off than if it came. The wise person will prepare to meet whatever 
    comes, and to be master of his circumstances—whatever those circumstances 
    may be—and make his life a success; for it is possible to make life a 
    success, no matter what happens.</span></p><b data-dcnode-id="1542"><span data-dcnode-id="1545" instrument_node="">
</span><p align="justify" data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">We must Use Adversity as Means of Discipline</span></p></b><span data-dcnode-id="1541" instrument_node="">
</span><p align="justify" data-dcnode-id="1536"><span data-dcnode-id="1540" instrument_node="">One important use of adversity, is that it brings </span><i data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">discipline</span></i><span data-dcnode-id="1537" instrument_node="">. The tendency of prosperity is to make one careless. It leads 
    to undisciplined living, which, in turn, always leads to weakness, to 
    failure, dissatisfaction, and unhappiness. For the past generation or two, 
    some of our philosophers have been teaching the undisciplined life, telling 
    our young people to let themselves go, to follow their impulses, to give 
    reign to their passions, to deny themselves nothing they desire. They have 
    taught parents not to correct their children but to let them run wild, to 
    live their own lives, to gratify all their propensities, to have their own 
    way in everything.</span></p><span data-dcnode-id="1535" instrument_node="">
</span><p align="justify" data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Many people have followed—and are still following—this 
    unrestrained, undisciplined way of life. What is the result today? The 
    undisciplined of a former generation, are now the mothers of this 
    generation. As a result, juvenile delinquency has reached a peak far above 
    anything known hitherto. The home life of former days, with all its rich 
    associations and blessings to the family and to society—is today almost 
    entirely unknown in millions of homes—or places called homes.</span></p><span data-dcnode-id="1532" instrument_node="">
</span><p align="justify" data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">As a result of following this philosophy of "do as you 
    please"—we are an undisciplined nation. Prisons and asylums are full. There 
    is one divorce for every six marriages. Suicides never were so common as in 
    recent years. </span></p><span data-dcnode-id="1529" instrument_node="">
</span><p align="justify" data-dcnode-id="1521"><span data-dcnode-id="1528" instrument_node="">Has all this lack of discipline brought happiness? On the 
    contrary, there is more unhappiness now than our nation ever knew before at 
    any other time in its history. No, </span><i data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">undisciplined lives do not lead to 
    happiness</span></i><span data-dcnode-id="1525" instrument_node="">, no matter how great the opportunities for gratification. It 
    is only the disciplined life that can produce happiness, and very often 
    adversity is the only thing that will bring about the discipline necessary 
    to set our feet in the way of true happiness. </span><i data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Sheltered lives are rarely 
    strong lives</span></i><span data-dcnode-id="1522" instrument_node="">.</span></p><span data-dcnode-id="1520" instrument_node="">
</span><p align="justify" data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Why is military discipline and training so rigorous? Why 
    must soldiers be drilled and disciplined from morning until night? It is to 
    bring out those qualities, characteristics, and abilities that will make the 
    difference between an ordinary civilian and a soldier. Only troops that have 
    been rigorously trained for long periods are able to meet the shock of war 
    successfully, or to endure its hardships, or accomplish its purposes. The 
    story of our marines at Guadalcanal and New Guinea is a vivid illustration 
    of the result of discipline and training.</span></p><span data-dcnode-id="1517" instrument_node="">
</span><p align="justify" data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">God knows the need of discipline for His children—and He 
    knows that truer, better discipline can come through adversity, than by any 
    other means.</span></p><span data-dcnode-id="1514" instrument_node="">
</span><p align="justify" data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Jesus speaks of himself as the vine and His people as 
    branches of that vine. "He prunes every branch that bears fruit—that it may 
    bring forth more fruit." John 15:2</span></p><span data-dcnode-id="1511" instrument_node="">
</span><p align="justify" data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">How are vines pruned? The gardener goes into his vineyard 
    and prunes his vines, often cutting away so large a portion of them that it 
    looks as though he would destroy them. But they are not destroyed. On the 
    contrary, they bring forth an abundant harvest, much more abundant than 
    would have been possible had they not been pruned so thoroughly.</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p align="justify" data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Are you a branch in Christ? If so, do not assume that you 
    are going to have an easy, happy time with pleasant circumstances always, 
    and never a sorrow or a care. No! God wants you to bear fruit, an abundance 
    of fruit. He knows you cannot do that when you are at ease and merely 
    enjoying yourself. In the school of adversity He will from time to time 
    employ the pruning knife that will cut away from you many of the things you 
    do not wish to lose. Christ is a wise gardener. He will not let adversity 
    prune you too closely, nor will He take away from you that which will not 
    profit you more by its absence, than by its retention. By disciplining you, 
    He will strengthen you and instruct you, enlighten you and profit you.</span></p><span data-dcnode-id="1505" instrument_node="">
</span><p align="justify" data-dcnode-id="1479"><span data-dcnode-id="1504" instrument_node="">Adversity develops Christian character. We can develop </span><i data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">patience</span></i><span data-dcnode-id="1501" instrument_node="">, only as we have tests which require the use of patience. We 
    can become </span><i data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">steadfast</span></i><span data-dcnode-id="1498" instrument_node="">, only by standing firm against opposition and 
    pressure. We can develop </span><i data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">loyalty</span></i><span data-dcnode-id="1495" instrument_node="">, only by having that loyalty tested 
    and put under strain. We often acquire </span><i data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">wisdom</span></i><span data-dcnode-id="1492" instrument_node="">, by passing through the 
    things that require wisdom. We can get </span><i data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">understanding</span></i><span data-dcnode-id="1489" instrument_node="">, only by things 
    that compel us to learn. </span><i data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Love </span></i><span data-dcnode-id="1486" instrument_node="">may reach its highest capacity when it 
    has been severely tested. </span><i data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Serenity </span></i><span data-dcnode-id="1483" instrument_node="">comes to some people, only after 
    they have suffered and have been ripened by that suffering. </span><i data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Boldness </span></i><span data-dcnode-id="1480" instrument_node="">belongs to those who have mastered themselves in many a conflict.</span></p><span data-dcnode-id="1478" instrument_node="">
</span><p align="justify" data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">If you needed help in times of adversity, to whom would 
    you go to seek that help? To one who has always had an easy and prosperous 
    time, one who has never suffered? No, you want someone who understands; and 
    you know that only those who have drunk deeply of the cup of adversity 
    understand it and are able to give help. Who are those who become great 
    souls? Are they not those who have dwelt long with adversity? Yes, adversity 
    has its uses; adversity is often a blessing. We would never know what we 
    might become or what we may do, unless we learn it through adversity.</span></p><span data-dcnode-id="1475" instrument_node="">
</span><font data-dcnode-id="1471" size="4"><span data-dcnode-id="1474" instrument_node="">
</span><p align="justify" data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="1466"><b data-dcnode-id="1467"><span data-dcnode-id="1470" instrument_node="">
</span><p align="justify" data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">The ORIGIN of Adversities</span></p></b></font><span data-dcnode-id="1465" instrument_node="">
</span><p align="justify" data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">In this chapter we shall speak of the sources and causes 
    of adversities; in the next chapter we shall begin to show the means and 
    methods of meeting and overcoming these adversities. </span></p><span data-dcnode-id="1462" instrument_node="">
</span><p align="justify" data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">We do not like to contemplate adversities. We desire to 
    shut them out of our minds and think of the pleasant things of life. 
    However, it is always best to face facts. We must face facts if we would be 
    prepared for what life will bring. Security does not lie in unpreparedness, 
    but in facing the possibilities and making provisions to meet whatever 
    comes. So we shall look at some of those possibilities—which to some people 
    are not possibilities but realities—in order to find the way out, and the 
    preparation to meet them successfully.</span></p><b data-dcnode-id="1456"><span data-dcnode-id="1459" instrument_node="">
</span><p align="justify" data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">NATURAL CALAMITIES</span></p></b><span data-dcnode-id="1455" instrument_node="">
</span><p align="justify" data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Ordinarily, nature is a very good mother to us. She loves 
    her children. Nevertheless, the forces of nature cannot be controlled to 
    such an extent that they will never work destructively. Along with others, 
    Christians must face the general calamities that befall society—earthquakes, 
    fires, floods, droughts, storms. There are those who think that if we are 
    truly children of God—then we ought not to suffer these calamities. Such 
    people say these calamities are punishments visited upon people for their 
    sins; therefore, it would not be just for God to let his children suffer 
    from them. </span></p><span data-dcnode-id="1452" instrument_node="">
</span><p align="justify" data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">However, the Bible teaches that God's children suffer the 
    same as others in these general calamities, and the experience of millions 
    of people confirms it.</span></p><span data-dcnode-id="1449" instrument_node="">
</span><p align="justify" data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">God is infinite in wisdom and must ever follow that which 
    is wisest in the circumstances.</span></p><span data-dcnode-id="1446" instrument_node="">
</span><p align="justify" data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Besides those general calamities, the farmer and gardener 
    have to face the depredations of insects and diseases of plants and stock. A 
    long catalogue of these lesser calamities might be given, but it would serve 
    no good purpose. We know that these things must be faced; often there is no 
    way of avoiding them. Our only recourse is to use all possible preventive 
    measures; and if these do not succeed, we must suffer the consequences and 
    find another way to balance things.</span></p><b data-dcnode-id="1440"><span data-dcnode-id="1443" instrument_node="">
</span><p align="justify" data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">SPECIAL CALAMITIES</span></p></b><span data-dcnode-id="1439" instrument_node="">
</span><p align="justify" data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">These special calamities include illness, personal 
    losses, injuries resulting from accidents, and a variety of other things. 
    This sort of adversity is often hard to bear, because it comes right home to 
    the individual. He must face the results himself, often alone; and he need 
    not be surprised if others do not notice his suffering, or even if they 
    repel him on account of it. The blind, the deaf, the crippled may be as they 
    are, through no fault of their own—yet they must suffer these handicaps. All 
    too often they become oversensitive on account of them, which makes their 
    lot still harder. As a result of being misunderstood, they are often treated 
    in a way that makes them feel the keen sting of the conduct of the 
    thoughtless and misunderstanding people about them. (We shall return to 
    these things later to find the way of helpfulness.)</span></p><span data-dcnode-id="1436" instrument_node="">
</span><p align="justify" data-dcnode-id="1431"><span data-dcnode-id="1435" instrument_node="">There are also </span><b data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">man-made </span></b><span data-dcnode-id="1432" instrument_node="">adversities. People have 
    enemies who injure them, their property, or their reputation—and so cause 
    adversities that are entirely needless. Sometimes business or other 
    prospects are destroyed by vicious conduct or misrepresentation.</span></p><span data-dcnode-id="1430" instrument_node="">
</span><p align="justify" data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Many suffer from false friends, who are friends to one's 
    face, but enemies behind his back. Others suffer adversities through lack of 
    foresight. They cannot manage their affairs properly. They cannot plan 
    wisely. Things overtake them unexpectedly, which might have been avoided.</span></p><span data-dcnode-id="1427" instrument_node="">
</span><p align="justify" data-dcnode-id="1413"><span data-dcnode-id="1426" instrument_node="">There are also </span><b data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">self-made </span></b><span data-dcnode-id="1423" instrument_node="">adversities, and these 
    are the worst of all to bear. People bring calamities upon themselves by 
    their own misconduct. A thousand examples of this may be seen in any city. 
    The </span><i data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">drunkard </span></i><span data-dcnode-id="1420" instrument_node="">reaps the fruit of his drunkenness, the </span><i data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">harlot </span></i><span data-dcnode-id="1417" instrument_node="">has her shame, the 
    </span><i data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">criminal </span></i><span data-dcnode-id="1414" instrument_node="">looks out from between the bars of steel. 
    Nothing truer was ever said than "Whatever a man sows—that shall he also 
    reap." And much reaping is with tears and bitter regret.</span></p><span data-dcnode-id="1412" instrument_node="">
</span><p align="justify" data-dcnode-id="1404"><span data-dcnode-id="1411" instrument_node="">Other adversities come upon us through our </span><i data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">miscalculations</span></i><span data-dcnode-id="1408" instrument_node="">. Things do not turn out as we supposed they would, and 
    we suffer the consequences. Sometimes our adversities come because we have 
    been </span><i data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">careless</span></i><span data-dcnode-id="1405" instrument_node="">, and sometimes because we have neglected to do the 
    things we knew we ought to do. All these must be met in some way; and the 
    happiness and success of our lives will depend in large measure upon how we 
    meet them.</span></p><b data-dcnode-id="1400"><span data-dcnode-id="1403" instrument_node="">
</span><p align="justify" data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">WASTED RESOURCES</span></p></b><span data-dcnode-id="1399" instrument_node="">
</span><p align="justify" data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Millions of people today are wasting their resources in 
    sinful living. In order to see the result of their conduct, people have only 
    to look around them to those who have spent their resources in former days 
    as they themselves are doing today. Look at elderly people with no 
    resources. See how many of them have no homes and how many of them are 
    dependent upon charity. So many young and middle-aged people are letting all 
    they make, slip through their fingers and saying to themselves, "The future 
    will take care of itself"; or thinking, "The government will take care of me 
    when I am old"; or, "My social security check will take care of my needs." I 
    wonder if these people are willing to live on the financial level that these 
    things promise. Wasting their substance today—they are heading straight for 
    a poverty-stricken old age! When that calamity comes, who will pity them?</span></p><span data-dcnode-id="1396" instrument_node="">
</span><p align="justify" data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">There are others who are wasting something that is much 
    more precious than money. They are wasting their inner resources—their moral 
    and spiritual capacities. They are running after pleasure, seeking thrills 
    and more thrills. They must try everything. No matter what calamities such 
    conduct has wrought upon others, they will not heed examples; they must know 
    for themselves. </span></p><span data-dcnode-id="1393" instrument_node="">
</span><p align="justify" data-dcnode-id="1382"><span data-dcnode-id="1392" instrument_node="">What is the result? Today we have thousands of young 
    people, as well as older people, whose </span><i data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">emotions have been burned out</span></i><span data-dcnode-id="1389" instrument_node="">. 
    They have no more thrills. They feel that they have known and exhausted 
    life, and can see no future for themselves. They come to hate life and to 
    grow cynical and hard. But have they known life? There are great areas of 
    life, in fact, the best part of life, of which they know nothing. To use a 
    simile, they have made the round of the </span><i data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">side shows </span></i><span data-dcnode-id="1386" instrument_node="">and think they 
    have seen all of the circus. They have known only the </span><i data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">superficial things
    </span></i><span data-dcnode-id="1383" instrument_node="">of life. They have never known life's real values and lasting 
    satisfactions, and perhaps never will know them.</span></p><span data-dcnode-id="1381" instrument_node="">
</span><p align="justify" data-dcnode-id="1376"><span data-dcnode-id="1380" instrument_node="">There are people in the religious world who are following 
    the same course. They think religion is made up of thrills. They want one 
    joyful thrill after another. They seek to stimulate their emotions. </span><i data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Such 
    emotionalism is merely the foam on the waters of religion</span></i><span data-dcnode-id="1377" instrument_node="">. Emotion is a 
    real part of religion, but emotion is one thing and emotionalism is quite 
    another. Joy is one thing, but hysteria is something different. Exaltation 
    of one's feelings is one thing, and to be carried out of one's senses is 
    quite another.</span></p><span data-dcnode-id="1375" instrument_node="">
</span><p align="justify" data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">There are today thousands of people who have gone into 
    the wild emotional religious movements that have been so prevalent in recent 
    years, and many of them can no longer feel the thrills they once felt in 
    their religion. Their emotions are burned out; they have become incapable of 
    religious feeling. Many of these people are discouraged and despairing. Many 
    of them have given up religion entirely, and many others are in asylums. The 
    trouble is, they squandered their spiritual resources in religious excesses. 
    They had a grand time while it lasted; but now that it has come to its end 
    and they have no more capacity for it—alas! what will they do? Their spree 
    is over, and now they are having "the morning after."</span></p><span data-dcnode-id="1372" instrument_node="">
</span><p align="justify" data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Can anything be done for these people with burned-out 
    emotions? Is there yet a chance for them? After the thrills are gone, is 
    there still to be found some solid, substantial, satisfying thing in life? 
    Yes, there is hope even for these, but the way out is not easy. If the task 
    of recovering themselves is taken up with courage and determination—then the 
    way out is not too difficult for them to find, nor too hard for them to 
    follow successfully. In the chapters that follow, we shall try to point out 
    this way.</span></p><font data-dcnode-id="1366" size="4"><span data-dcnode-id="1369" instrument_node="">
</span><p align="justify" data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="1361"><b data-dcnode-id="1362"><span data-dcnode-id="1365" instrument_node="">
</span><p align="justify" data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">How to Meet Adversities</span></p></b></font><span data-dcnode-id="1360" instrument_node="">
</span><p align="justify" data-dcnode-id="1352"><span data-dcnode-id="1359" instrument_node="">For the moment, the </span><i data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">easiest </span></i><span data-dcnode-id="1356" instrument_node="">way to meet adversity 
    is to </span><i data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">surrender </span></i><span data-dcnode-id="1353" instrument_node="">to the circumstances. The temptation often comes in 
    almost overwhelming force to give up, to quit, and make no further effort. 
    Sometimes we are tempted to run away from trouble, to put as many miles 
    between it and ourselves as possible.</span></p><span data-dcnode-id="1351" instrument_node="">
</span><p align="justify" data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Giving up does not make an end of the trouble. 
    Surrendering to it, only gives it mastery over us. We cannot run away so 
    far, but that trouble follows us. It does something to us on the inside, and 
    what it does there, is the most serious consequence of the adversity. If we 
    give up, we still have our trouble. If we run away, we take most of it with 
    us. Surrendering to circumstances is never the way out, though it may appear 
    to be the only possible way. No situation is entirely hopeless—there is 
    always some way to retrieve the disaster.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p align="justify" data-dcnode-id="1340"><span data-dcnode-id="1347" instrument_node="">There are some things that can never be the same after 
    the </span><i data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">hand of adversity </span></i><span data-dcnode-id="1344" instrument_node="">has struck us. Fortunes may be lost, and 
    poverty may be our lot. Health may be lost, and not be regained. We may be 
    injured, and become permanent cripples. Friendships may be broken, that 
    never can be mended. Past conditions, perhaps, cannot be restored—but the 
    thing that counts most, can be restored. </span><i data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">The citadel of the soul may be 
    re-conquered</span></i><span data-dcnode-id="1341" instrument_node="">. Confidence, assurance, hope, and tranquility may again 
    come to us. We can rise above disaster. We can build anew, the things that 
    have been broken down. </span></p><span data-dcnode-id="1339" instrument_node="">
</span><p align="justify" data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Examples of this are not hard to find. There are people 
    in every community who, by courage, fortitude, and patience have regained 
    soul mastery and are masters of their world. If the bird with a broken 
    pinion can never soar so high again, it can still fly and it can sing as 
    sweetly as before. When the worst happens, then all is not lost; there is 
    still hope for every courageous soul, and victory for those who will take 
    it.</span></p><span data-dcnode-id="1336" instrument_node="">
</span><p align="justify" data-dcnode-id="1328"><span data-dcnode-id="1335" instrument_node="">The first sight we have of adversity, usually shows its 
    worst features. There is nearly always a shock when we see it. We are 
    usually </span><i data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">surprised </span></i><span data-dcnode-id="1332" instrument_node="">and </span><i data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">unprepared</span></i><span data-dcnode-id="1329" instrument_node="">. It falls upon us like a 
    blight, blotting out the sun in our sky, stilling the song of hope in our 
    hearts, and obscuring all hopeful elements in the situation.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p align="justify" data-dcnode-id="1322"><span data-dcnode-id="1326" instrument_node="">Sudden adversity appeals to what is weakest in us. As </span><i data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">the icy hand of fear 
    </span></i><span data-dcnode-id="1323" instrument_node="">grasps us—the darkness of discouragement may settle 
    down over us, and we may also feel the shame of failure. When trouble seems 
    to engulf us, we may be unable to see a way out—but this darkness will be 
    followed by a new dawn.</span></p><b data-dcnode-id="1318"><span data-dcnode-id="1321" instrument_node="">
</span><p align="justify" data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">THE THINGS THAT REMAIN</span></p></b><span data-dcnode-id="1317" instrument_node="">
</span><p align="justify" data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">When the first shock of the coming of adversity has 
    passed somewhat and our fears are quieted a little and the throbbing of our 
    heart is lessened—the next thing to do is to take an inventory of what we 
    have left. There is always more left, than we at first think. </span></p><span data-dcnode-id="1314" instrument_node="">
</span><p align="justify" data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">A man and his wife, and their three-year-old girl stood 
    looking at the smoking embers of their ruined home. They had put years of 
    savings into it; they had worked hard and denied themselves; they had found 
    great satisfaction in having a home of their own; but in one short hour the 
    flames had consumed it all. As they gazed upon the scene with tearful eyes 
    the man said, "It is all gone—we have nothing now." The little girl slipped 
    up to her father's side, put her hand in his, looked up into his face, and 
    said, "You have me, Daddy." He snatched her up and held her tight and said, 
    "Yes, darling, we have you; and while we have you we are rich whether we 
    have anything else or not."</span></p><span data-dcnode-id="1311" instrument_node="">
</span><p align="justify" data-dcnode-id="1306"><span data-dcnode-id="1310" instrument_node="">In adversity, whatever our losses may be—the most 
    valuable things usually remain to us. What can rob you of your virtues? Who 
    can take away your </span><i data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">character </span></i><span data-dcnode-id="1307" instrument_node="">without your consent? As long as your 
    spirit is left unbroken—not all can be lost. You have within yourself many 
    things to help you retrieve your disaster and eventually to restore the 
    shout of victory in your soul.</span></p><span data-dcnode-id="1305" instrument_node="">
</span><p align="justify" data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Adversity cannot separate you from your God. Friends may 
    forsake you, your credit may be gone, many other things may be gone—but 
    trouble has not robbed you of the love of God nor of his interest in you nor 
    of his readiness to help you. No, the best things—the things that will count 
    the most for you—still remain. No matter how dark things may look or how 
    hopeless your situation may seem—there is always a way to go on.</span></p><span data-dcnode-id="1302" instrument_node="">
</span><p align="justify" data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">There are some adversities that can be conquered. We can 
    summon our courage and resources and go at them with both fists and fight 
    them until we knock them out. </span></p><span data-dcnode-id="1299" instrument_node="">
</span><p align="justify" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">McCormick, the inventor of the reaper, saw his factory go 
    up in smoke in the great Chicago fire. Before the ashes were cooled, he was 
    planning a larger factory, an expanded business, and greater successes; and 
    he achieved them. </span></p><span data-dcnode-id="1296" instrument_node="">
</span><p align="justify" data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">When General Montgomery's troops in the Egyptian desert 
    had been driven back so far that the thunder of the guns could be heard 
    almost to Cairo, he reorganized his command, attacked the enemy, and 
    attacked and attacked, and kept right on, until the foe was driven to final 
    surrender.</span></p><span data-dcnode-id="1293" instrument_node="">
</span><p align="justify" data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Many times we cannot tell whether or not the attack 
    method will work, until we have given it a thorough trial. Therefore it pays 
    to tackle our adversities with determination and courage and wage a battle 
    of conquest against them; for if we are to overcome adversity, no halfway 
    methods can be justified. We must mean business and throw all our resources 
    into the battle. We must go the whole way. We must not stop before our goal 
    is reached; for half satisfaction and half victory, mean half 
    dissatisfaction and half defeat.</span></p><span data-dcnode-id="1290" instrument_node="">
</span><p align="justify" data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Most adversities have to be endured, because they cannot 
    be surmounted. A leg lost in an accident cannot be replaced, but that does 
    not mean that one can never walk again. One may never walk as well on an 
    artificial leg, but he can walk; and some people walk very well indeed. A 
    business lost, does not mean that we can do no more business. A position 
    lost, does not mean that we shall not be able to work again. Few losses are 
    fatal. Few adversities are greater than we are. Many times we must accept 
    adversity as it is, because we cannot change it and no earthly power can 
    change it—but we can make the best of things.</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p align="justify" data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">If we have faced adversity, are we now making the best of 
    things? Or is it possible that we might be doing better if we should use our 
    powers and resources to the full? Nothing but doing our best, is good 
    enough. Nothing but doing our best, is meeting adversity as we are capable 
    of meeting it.</span></p><font data-dcnode-id="1281" size="4"><span data-dcnode-id="1284" instrument_node="">
</span><p align="justify" data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="1276"><b data-dcnode-id="1277"><span data-dcnode-id="1280" instrument_node="">
</span><p align="justify" data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">The Handicaps of Adversities</span></p></b></font><span data-dcnode-id="1275" instrument_node="">
</span><p align="justify" data-dcnode-id="1264"><span data-dcnode-id="1274" instrument_node="">Adversities are the result of many causes. After the 
    adversity has come, it matters little what has been the cause of it. It is 
    the adversity we must face. If the cause is not a continuing cause of 
    adversity, then its causative effects have ceased with the coming of the 
    adversity. Usually such </span><i data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">causes </span></i><span data-dcnode-id="1271" instrument_node="">need no further attention, and the 
    more attention we give them—the worse off we are. Causes that continue 
    working, must be dealt with—but as matters separate and distinct from the 
    adversity resulting from the cause. Look at the </span><i data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">cause </span></i><span data-dcnode-id="1268" instrument_node="">and at the </span><i data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">adversity</span></i><span data-dcnode-id="1265" instrument_node="">—and see if you can separate them. If you can do so, then no 
    longer link them together but treat them as separate things. You will find 
    that this greatly simplifies matters.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p align="justify" data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Some people seem born to adversity—they are just 
    "unlucky." So many unpleasant and injurious things happen to them, that they 
    seem to have a series of misfortunes. Others have natural limitations. Some 
    are born and reared in poverty, or come to poverty through later 
    circumstances. Some lack natural ability, and so are always handicapped in 
    life's processes. Others have family handicaps—perhaps their family has a 
    bad reputation or bad characters, or is involved in feuds or other troubles. 
    Some people always suffer ill health. Others are crippled or abnormal in 
    some way. Some have ugly features or are otherwise unattractive. Some people 
    meet accidents, lose limbs, or are scarred—or have something else that is a 
    handicap and a source of adversity to them. Some parents have abnormal 
    children that are a great burden upon them; others have relatives to support 
    and thus do not have freedom to live their own lives as they would choose. 
    Some are naturally timid or suspicious or jealous—and these things prove to 
    be handicaps and sources of adversities.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><p align="justify" data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">There are other adversities that come—losses in business 
    through unwise investments, through mismanagement, through lack of fidelity 
    in those we trusted. People also suffer as a result of their own unwise or 
    sinful conduct. They sow an evil harvest, and are compelled to reap what 
    they have sown. Sometimes they must reap what others have sown. Parents sow 
    tares—and often the children reap the harvest. This is a sad, unavoidable 
    thing that has cursed many a life. </span></p><span data-dcnode-id="1257" instrument_node="">
</span><p align="justify" data-dcnode-id="1252"><span data-dcnode-id="1256" instrument_node="">There are many also who have formed </span><i data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">bad habits</span></i><span data-dcnode-id="1253" instrument_node="">—habits 
    they have been unable or unwilling to break. These bad habits have brought 
    them many adversities.</span></p><b data-dcnode-id="1248"><span data-dcnode-id="1251" instrument_node="">
</span><p align="justify" data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">AFFECTED BY OUR ATTITUDE</span></p></b><span data-dcnode-id="1247" instrument_node="">
</span><p align="justify" data-dcnode-id="1242"><span data-dcnode-id="1246" instrument_node="">Whatever our handicaps, we have to live our lives. It 
    behooves us not to add to those handicaps, other handicaps that may be 
    avoided. For instance, </span><i data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">the mental attitude we hold toward our handicaps 
    is of primary importance</span></i><span data-dcnode-id="1243" instrument_node="">. We can add a great deal to our troubles by 
    adopting an improper mental attitude toward them. Perhaps one of the most 
    common reactions to a handicap, is that of shame—a constant feeling of 
    embarrassment. This feeling may be perfectly natural—but it is not the 
    result of a handicap itself, but of one's mental attitude toward it. If we 
    cannot help what we are or how we are—then what good does it do to give 
    place to embarrassment or shame? </span></p><span data-dcnode-id="1241" instrument_node="">
</span><p align="justify" data-dcnode-id="1236"><span data-dcnode-id="1240" instrument_node="">It is said that Mr. Wesley used to tell his preachers to
    </span><i data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">be ashamed of nothing but sin</span></i><span data-dcnode-id="1237" instrument_node="">. That was good advice. If one is 
    crippled or scarred or has an impediment in his speech or is otherwise 
    "different"—there is no use to be ashamed of it. We should overcome our 
    embarrassment, face life as it is for us, and make the best of it. </span></p><span data-dcnode-id="1235" instrument_node="">
</span><p align="justify" data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">When I say "make the best of it" I do not mean just 
    endure it or put up with it. By no means. I mean we should turn our 
    energies, our thoughts, our purposes into other directions and determine to 
    rise above our handicaps and be our best selves, rather than defeated 
    selves.</span></p><span data-dcnode-id="1232" instrument_node="">
</span><p align="justify" data-dcnode-id="1227"><span data-dcnode-id="1231" instrument_node="">Others let fear and timidity rule them because of their 
    handicaps. Whenever they think of trying to accomplish anything, their 
    handicaps stare them in the face. </span><i data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">They look at everything through 
    handicaps</span></i><span data-dcnode-id="1228" instrument_node="">. They say within themselves, "If I were as others, then I 
    could do it." They do not take into consideration that thousands of others 
    no more able than themselves, and some of them handicapped more—have 
    resolved to win in spite of handicaps, have pushed ahead with determination, 
    and have won—have won gloriously.</span></p><span data-dcnode-id="1226" instrument_node="">
</span><p align="justify" data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">If we have brought trouble on ourselves—as many do, 
    through our inability to foresee the outcome of things—the tendency is to 
    give way to self-blame and say, "I brought this trouble on myself!" Perhaps 
    you did; but vain regrets and self-condemnation will never help you overcome 
    it. You may have bitter memories, but those bitter memories should not be 
    allowed too great a place in your thoughts. If you have been the cause of 
    your own adversities—then you should try all the harder to overcome them; 
    you should not surrender to them. Neither self-blame nor self-pity will help 
    you. They are evil companions. Chase them away, and get down to the business 
    of making something of your life.</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p align="justify" data-dcnode-id="1218"><span data-dcnode-id="1222" instrument_node="">Improper mental attitudes toward our adversities, may 
    cause us to disregard our good points and the things that are still in our 
    favor; for no matter how hopeless things look, there are many things still 
    in our favor. </span><i data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Do not spend your time in useless regrets, nor in blaming 
    others, nor in coddling discouragement. </span></i><span data-dcnode-id="1219" instrument_node="">Wake up! Take an inventory of 
    your resources. Face the facts like a man. If you have been adding wrong 
    mental attitudes to your adversities—then stop right now! Take hold of 
    yourself; do something about things. They might be much worse than they are. 
    In the worst circumstances in which you can be placed, you have at least a 
    fifty-fifty chance. Will you take it and make use of it?</span></p><span data-dcnode-id="1217" instrument_node="">
</span><p align="justify" data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">When adversity overtakes some people, they give way to 
    reckless abandon and let go of everything. They accept misfortune as their 
    master, and make no effort to retrieve what remains to them. Such people are 
    quitters—they sell themselves to circumstances pretty cheaply. There is 
    neither reason nor excuse for adopting such an attitude. The time a man 
    needs most to be a man, is when the demands upon him are greatest, and that 
    is the time that he is capable of rising to the finest heights of courage, 
    fortitude, and determination that he will not be overwhelmed by any trouble 
    or sorrow that can come.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><p align="justify" data-dcnode-id="1209"><span data-dcnode-id="1213" instrument_node="">Do not add to adversity by putting on your face looks of 
    discouragement, sorrow, hatred, cynicism, criticism, or hardness. Do not 
    adopt an attitude that is mean, ugly, resentful. There is no use allowing 
    yourself to react in these ways. It may be a natural reaction, but it is not 
    by any means the only possible reaction. You can react unwisely or wisely, 
    as you choose. Perhaps you cannot help the first impulse, but you can 
    control that impulse; for you can deliberately choose the way you will </span><i data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">react 
    </span></i><span data-dcnode-id="1210" instrument_node="">to your adversities. Moreover, you do choose; for your will must 
    consent in order for your reaction to continue in any particular direction 
    or to become permanent.</span></p><span data-dcnode-id="1208" instrument_node="">
</span><p align="justify" data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">If you have troubles, do not talk about them to other 
    people; they want to hear pleasant things. Your troubles cause them to have 
    unpleasant reactions, which they do not want. Every time you talk about your 
    troubles or show them on your face or permit improper reactions to them in 
    the presence of others—you create unpleasant reactions in those about you; 
    and their unpleasant reactions are manifested towards you and you feel it. 
    Your relations with your friends suffer from these reactions—yours and 
    theirs.</span></p><b data-dcnode-id="1202"><span data-dcnode-id="1205" instrument_node="">
</span><p align="justify" data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">CHEERFULNESS A GREAT HELP</span></p></b><span data-dcnode-id="1201" instrument_node="">
</span><p align="justify" data-dcnode-id="1196"><span data-dcnode-id="1200" instrument_node="">Beware of talking about your troubles, looking sad and 
    discouraged, or scowling and murmuring. Look pleasant; be cheerful. Act 
    cheerful, even if you do not feel it. You may reply, "That is easy enough 
    for one to say who never had such experiences." Quite true. But if </span><i data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">thirty-five years as a bedridden invalid with pain as a constant companion, 
    serious financial losses, and the loss of my wife do not qualify me to speak</span></i><span data-dcnode-id="1197" instrument_node="">—then 
    what would? It is out of that background that I speak; for I, too, know 
    discouragement and sorrow. I, too, know the temptation to surrender to 
    circumstances. I know how difficult it is to smile, when there is nothing to 
    cause one to smile. And still I say, Put away your troubles out of your 
    sight and smile, and then smile again, and keep on smiling. Look at the 
    favorable things, take advantage of them, build up your life again. Such 
    things are always being done by others, and you can do what others are 
    doing. God intended you to be happy no matter what your circumstances, and 
    you can be happy in spite of them—I know.</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p align="justify" data-dcnode-id="1190"><span data-dcnode-id="1194" instrument_node="">Do not allow yourself to be </span><i data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">sensitive </span></i><span data-dcnode-id="1191" instrument_node="">as to what 
    people say, or think, or do about your adversity. Just ignore it. If they do 
    not act as they should act towards you, that is their fault—not yours. For 
    yourself, choose to be happy—discard gloomy thoughts, and think of pleasant 
    things. Try to do good to others, be interested in them, serve them.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p align="justify" data-dcnode-id="1184"><span data-dcnode-id="1188" instrument_node="">There are many others worse off than you and I are, and 
    yet they get along somehow. Some of the happiest people I have ever known, 
    have been people who have had adversities such as I felt I never could 
    endure. Yet they were happy in enduring them. What you and I must do when we 
    cannot conquer our adversities, is to conquer </span><i data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">ourselves </span></i><span data-dcnode-id="1185" instrument_node="">and settle 
    down to endure them, not sullenly, complainingly, self-pityingly, but with 
    courage and hope. Your fortitude is a wonderful thing—it can accomplish a 
    great many things you never have dreamed. Try putting it to work and keeping 
    it at work. Ask God's help; he will free strengthen your fortitude, and you 
    and he together make a success under any conditions.</span></p><span data-dcnode-id="1183" instrument_node="">
</span><p align="justify" data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Do not break yourself upon your adversities. Accept what 
    cannot be helped—but live your to your highest capacity. Many have wrung 
    success out of what seemed foredoomed to be failure. Will you choose to be 
    one of those many—or you spend the remainder of your life repining, unhappy, 
    discouraged, resentful? Ah, my friend, there are better things for you! 
    Strive for the better things. Strive with all your might. Strive without 
    ceasing. The end will be attainment for you, no matter what your 
    circumstances. Perhaps there will not be attainment of the degree and sort 
    you have desired; nevertheless, there will be sufficient attainment to make 
    you happy, contented, victorious, and able to live a wholesome well-rounded, 
    successful life.</span></p><b data-dcnode-id="1177"><span data-dcnode-id="1180" instrument_node="">
</span><p align="justify" data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">HELPING THE HANDICAPPED</span></p></b><span data-dcnode-id="1176" instrument_node="">
</span><p align="justify" data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">And now a word to those who are not handicapped, or do 
    not look upon themselves as being handicapped. Do you know how to treat the 
    handicapped? When you meet one who is blind, or crippled, or deformed, or 
    scarred—do you look upon him and act toward him as though he were a freak? 
    Do you look at handicapped people differently and act toward them 
    differently, than you do toward other people? Can they read in your looks or 
    your tone or your movements, that you think they are different from you, 
    that they belong in another class, that they are hardly human beings?</span></p><span data-dcnode-id="1173" instrument_node="">
</span><p align="justify" data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">For many years I have been associated quite closely with 
    a number of blind people. I have often been disgusted—even highly 
    offended—by the way I have seen them treated by people who did not mean to 
    be unkind. So often the tone in which they spoke, the way they acted, and 
    the way they talked to each other in the presence of the blind people—showed 
    that these sighted people did not think of the blind as acting, thinking, 
    and feeling the way other people do. Intentionally or unintentionally, the 
    blind were treated most discourteously and inconsiderately.</span></p><span data-dcnode-id="1170" instrument_node="">
</span><p align="justify" data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">All handicapped people are normal in most ways. They 
    think and feel like normal people—and when they are given a chance, they act 
    like normal people. They do not want to be pitied nor discussed. If you will 
    be courteous and thoughtful, and ignore their handicaps (whatever they may 
    be) and treat them just as you would treat anyone else, or would want anyone 
    else treat you—then you will be treating them properly.</span></p><span data-dcnode-id="1167" instrument_node="">
</span><p align="justify" data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Do not refer to their handicap—or if you do, do it in a 
    casual way that will not humiliate them. Most of all, teach yourself to feel 
    toward the handicapped people, as you feel toward other people. Whatever of 
    abnormality there is, you should not emphasize it nor call attention to it 
    by word, look, or action. In this way many of the sorrows of the handicapped 
    can be assuaged, instead of being accentuated and emphasized. Just use good 
    common sense, and the courtesy and consideration you show to other people; 
    then you will help the handicapped to be happy in spite of their handicaps.</span></p><span data-dcnode-id="1164" instrument_node="">
</span><font data-dcnode-id="1160" size="4"><span data-dcnode-id="1163" instrument_node="">
</span><p align="justify" data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">&nbsp;</span></p></font><font color="#ff0000" data-dcnode-id="1155"><b data-dcnode-id="1156"><span data-dcnode-id="1159" instrument_node="">
</span><p align="justify" data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">The Ministry of Suffering</span></p></b></font><span data-dcnode-id="1154" instrument_node="">
</span><p align="justify" data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Adversity brings suffering, which all desire to escape. 
    In a vast number of lives, however, suffering has proved to be the one 
    thing, and the only thing, that could work out the beneficial results that 
    were needed to enrich, deepen, and enlarge life. It is bitter fruit—but it 
    gives life something that can come from no other source.</span></p><span data-dcnode-id="1151" instrument_node="">
</span><p align="justify" data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Suffering is the common lot of all mankind, and of the 
    animal creation. People who do not have much else from which to 
    suffer—suffer from trifles or from imaginary ills—but all suffer. Sinners 
    and saints alike, know the rankling of the sharp arrows of pain. Even those 
    whose lives seem most prosperous and sheltered, cannot fully escape. </span></p><span data-dcnode-id="1148" instrument_node="">
</span><p align="justify" data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Suffering has a useful place in the economy of God. It is 
    a severe schoolmaster, but a good one, whose lessons may be costly. But if 
    they are properly learned, they become golden treasures that enrich life.</span></p><span data-dcnode-id="1145" instrument_node="">
</span><b data-dcnode-id="1141"><span data-dcnode-id="1144" instrument_node="">
</span><p align="justify" data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">ENRICHMENT OF CHARACTER</span></p></b><span data-dcnode-id="1140" instrument_node="">
</span><p align="justify" data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Pain is God's chisel with which he carves His image in 
    the heart.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><p align="justify" data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Suffering gives understanding—it illuminates life's dark 
    places and solves riddles.</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p align="justify" data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Suffering develops patience and endurance, and 
    strengthens the fibers of the soul.</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p align="justify" data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Suffering develops discipline and gives self-control. It 
    reveals and develops latent qualities. It ripens and enriches the character.</span></p><span data-dcnode-id="1128" instrument_node="">
</span><p align="justify" data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">To be sure, such results follow only when we meet our 
    sufferings in the right way. If resist suffering and become resentful and 
    pity ourselves or murmur against God—the fruits will be bitter indeed! </span></p><span data-dcnode-id="1125" instrument_node="">
</span><p align="justify" data-dcnode-id="1117"><span data-dcnode-id="1124" instrument_node="">Since we choose the attitude we hold toward our 
    sufferings—we determine whether they shall . . .</span><br data-dcnode-id="1123"><span data-dcnode-id="1122" instrument_node="">make us—or mar us, </span><br data-dcnode-id="1121"><span data-dcnode-id="1120" instrument_node="">bring joy—or sorrow, 
    </span><br data-dcnode-id="1119"><span data-dcnode-id="1118" instrument_node="">bring the sweetness of Christ's fellowship and comfort—or the darkness of 
    despair.</span></p><span data-dcnode-id="1116" instrument_node="">
</span><p align="justify" data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">When we suffer, we are very likely to be misunderstood.
