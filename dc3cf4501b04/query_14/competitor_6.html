</span></div></div><h3 data-dcnode-id="853"><span data-dcnode-id="854" id="Affirmations_For_Hard_Tough_Times"><span data-dcnode-id="855" instrument_node="">Affirmations For Hard &amp; Tough Times</span></span></h3><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">I can get through anything.</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">There are no problems, only challenges.</span></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">I welcome challenges into my life.</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Challenges are opportunities to learn and grow.</span></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">I am safe and secure no matter what.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">I can get through anything.</span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">I am getting stronger everyday.</span></p><span data-dcnode-id="831" instrument_node="">
</span><h3 data-dcnode-id="828"><span data-dcnode-id="829" id="Affirmations_For_Financial_Worries"><span data-dcnode-id="830" instrument_node="">Affirmations For Financial Worries</span></span></h3><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">I attract financial abundance into my life.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Money comes to me effortlessly.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">My bills are paid and I will live freely.</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">I earn plenty of money and love what I do.</span></p><span data-dcnode-id="815" instrument_node="">
</span><h3 data-dcnode-id="812"><span data-dcnode-id="813" id="Mantras_For_Difficult_Times_Mental_Strength"><span data-dcnode-id="814" instrument_node="">Mantras For Difficult Times &amp; Mental Strength</span></span></h3><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">I am a strong and capable person.</span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">I can get through anything in my life.</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Hard times do not get the best of me.</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">I have the ability to overcome any obstacle</span></p><span data-dcnode-id="799" instrument_node="">
</span><h3 data-dcnode-id="796"><span data-dcnode-id="797" id="Positive_Affirmations_After_A_Bad_Day"><span data-dcnode-id="798" instrument_node="">Positive Affirmations After A Bad Day</span></span></h3><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">I release all negative emotions from the day.</span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">I let go of any stress and anxiety from today.</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">I will learn what I need to from today which will make me a stronger person.</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">I know that life is not meant to be easy.</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Tomorrow is a brand new day.</span></p><span data-dcnode-id="780" instrument_node="">
</span><h3 data-dcnode-id="777"><span data-dcnode-id="778" id="Positive_Affirmations_for_Strength"><span data-dcnode-id="779" instrument_node="">Positive Affirmations for Strength</span></span></h3><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">I am a strong person.</span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">I can solve any problem.</span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">I will not let fear take control of me.</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">I can and will survive anything life throws at me.</span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">I have the strength and courage to get through any situation.</span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">I welcome challenges into my life.</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">I am ready to become the best version of myself.</span></p><span data-dcnode-id="755" instrument_node="">
</span><h3 class="p1" data-dcnode-id="750"><span data-dcnode-id="751" id="Affirmations_for_Handling_Stress"><span class="s1" data-dcnode-id="752"><b data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Affirmations for Handling Stress</span></b></span></span></h3><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">I release all negativity from my life.</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">I am filled with joy and ease right now.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="740"><span class="s1" data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">I don’t have to have this all solved today. </span></span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="736"><span class="s1" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">I am doing what I can with the knowledge and skills I have to survive this. </span></span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="732"><span class="s1" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">When I have done all I know how to do, I choose to let my mind rest. </span></span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="728"><span class="s1" data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">I welcome fear as a sign to be careful, but choose to let go of it when it no longer serves me. </span></span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="724"><span class="s1" data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">I am doing the best I can, and thus choose to release myself from guilt and shame. </span></span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="720"><span class="s1" data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">I am slowly becoming the kind of person who can survive this storm. </span></span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="716"><span class="s1" data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">When circumstances change, I will feel all the more grateful for what I have. </span></span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="712"><span class="s1" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">I am not a failure, but a survivor. I am daily in the process of surviving. </span></span></p><div class="code-block code-block-5" data-dcnode-id="695" style="margin: 30px auto; display:block;border:1px solid #ddd;padding:5px;"><span data-dcnode-id="711" instrument_node="">
</span><span data-dcnode-id="709" instrument_node="">
</span><div data-dcnode-id="699" id="ezoic-pub-ad-placeholder-113"><span data-dcnode-id="708" instrument_node="">
</span><span data-dcnode-id="706" instrument_node="">
</span><span data-dcnode-id="704" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-9486452500558542" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="4879631906" data-dcnode-id="703" style="display:block; text-align:center;"></ins><span data-dcnode-id="702" instrument_node="">
</span><span data-dcnode-id="700" instrument_node="">
</span></div><span data-dcnode-id="698" instrument_node="">
</span><span data-dcnode-id="696" instrument_node="">
</span></div><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="691"><span class="s1" data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">My commitment to showing up tomorrow overshadows the mistakes I have made. </span></span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="687"><span class="s1" data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">I am holding on in the dark to what I know to be true in the light, in better times. </span></span></p><span data-dcnode-id="686" instrument_node="">
</span><h3 class="p1" data-dcnode-id="681"><span data-dcnode-id="682" id="Affirmations_for_Overcoming_Adversity"><span class="s1" data-dcnode-id="683"><b data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Affirmations for Overcoming Adversity</span></b></span></span></h3><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="677"><span class="s1" data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">I am not the only one to have faced this sort of trauma, and I will not be the last. </span></span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="673"><span class="s1" data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">I am flexible and can adapt when life doesn’t go according to plan. </span></span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="669"><span class="s1" data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Courage does not mean having no fear of danger, but facing the danger despite that fear. </span></span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="665"><span class="s1" data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Life’s problems are not solved by perfect people, but by those who show up. I am someone who shows up. </span></span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="661"><span class="s1" data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">I know when to persevere along a path and when to let go and change course. </span></span></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="657"><span class="s1" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">I don’t have to go this road alone. I have, or can find, people in my life and examples to support and inspire me. </span></span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="653"><span class="s1" data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">I am worthy of love and my life is meaningful despite my losses. </span></span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="649"><span class="s1" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Life is full of constant change. My pain, though very real, will not be as acute forever. </span></span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="645"><span class="s1" data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">This is just one chapter in my life’s story.</span></span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Want more?</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="640" instrument_node="">Visit our guide to </span><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//motivationping.com/affirmations/"><span data-dcnode-id="639" instrument_node="">positive affirmations</span></a></p><span data-dcnode-id="636" instrument_node="">
</span><h3 data-dcnode-id="633"><span data-dcnode-id="634" id="Staying_Positive_In_Tough_Times_Quotes"><span data-dcnode-id="635" instrument_node="">Staying Positive In Tough Times Quotes</span></span></h3><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Life is 10% what happens to us and 90% how we react to it. – Dennis P. Kimbro</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">There are no mistakes, only lessons. Growth is a process of trial and error.</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">You must do the thing you think you cannot do. – Eleanor Roosevelt</span></p><div class="code-block code-block-7" data-dcnode-id="607" style="margin: 30px auto; display:block;background:#f6f6f6;padding:5px;border:1px solid #ddd;"><span data-dcnode-id="623" instrument_node="">
</span><span data-dcnode-id="621" instrument_node="">
</span><div data-dcnode-id="611" id="ezoic-pub-ad-placeholder-109"><span data-dcnode-id="620" instrument_node="">
</span><span data-dcnode-id="618" instrument_node="">
</span><span data-dcnode-id="616" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-9486452500558542" data-ad-format="auto" data-ad-slot="8073966994" data-dcnode-id="615" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="614" instrument_node="">
</span><span data-dcnode-id="612" instrument_node="">
</span></div><span data-dcnode-id="610" instrument_node="">
</span><span data-dcnode-id="608" instrument_node="">
</span></div><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Whatever is worrying you right now, forget about it. Take a deep breath, stay positive and know that things will get better.</span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Staying positive does not mean that things will turn out okay. Rather it is knowing that you will be okay no matter how things turn out. – unknown</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Strength doesn’t come from what you can do. It comes from overcoming the things you once thought you couldn’t. – Rikki Rogers</span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">No matter how hard times may get, always hold your head up and be strong; show them you’re not as weak as they think you are.</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Optimism is the faith that leads to achievement. Nothing can be done without hope and confidence. – Helen Keller</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Be faithful in the small things because it is in them that your strength lies. – Mother Theresa</span></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">I believe if you keep your faith, you keep your trust, you keep the right attitude, if you’re grateful, you’ll see God open up new doors. – Joel Osteen</span></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">We don’t develop courage by being happy every day. We develop it by surviving difficult times and challenging adversity. – Barbara De Angelis</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Good things come to those who believe. Better things come to those who are patient. The best things come to those who never give up.</span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">It’s okay to be scared. Being scared means you’re about to do something really, really brave.</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Once you replace negative thoughts with positive ones, you’ll start having positive results. – Willie Nelson</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Anyone can give up, it’s the easiest thing in the world to do. But to hold it together when everyone else would understand if you fell apart, that’s true strength.</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">The best way to gain self-confidence is to do what you are afraid to do. – Swati Sharma</span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Your hardest times often lead to the greatest moments of your life. Keep going. Tough situations build strong people in the end. ― Roy T. Bennett</span></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">You have one of two choices right now: give up or keep going. One will make you great and the other won’t. Which do you prefer?</span></p><div class="code-block code-block-6" data-dcnode-id="545" style="margin: 30px auto; display:block;border:1px solid #ddd;padding:5px;"><span data-dcnode-id="561" instrument_node="">
</span><span data-dcnode-id="559" instrument_node="">
</span><span data-dcnode-id="557" instrument_node="">
</span><div data-dcnode-id="549" id="ezoic-pub-ad-placeholder-104"><span data-dcnode-id="556" instrument_node="">
</span><span data-dcnode-id="554" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-9486452500558542" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="9851287521" data-dcnode-id="553" style="display:block; text-align:center;"></ins><span data-dcnode-id="552" instrument_node="">
</span><span data-dcnode-id="550" instrument_node="">
</span></div><span data-dcnode-id="548" instrument_node="">
</span><span data-dcnode-id="546" instrument_node="">
</span></div><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Tough people are not born. They’re made when there’s no one there to dry their tears.</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Don’t be afraid to start over. It’s a brand new opportunity to rebuild what you truly want.</span></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Challenges and obstacles are a part of life. They make us stronger and build character. If life were easy it would be boring and you would never grow.</span></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Life can be a scary but fun rollercoaster ride: filled with ups and downs, twist and turns, and you might get dizzy or throw up. But in the end, you will always return safe and sound.</span></p><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Remind yourself every day: I am in charge of my happiness. I will not let anything outside of myself control me. I am creating a life that feels good on the inside and it will turn into experiences that are good on the outside.</span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="528" instrument_node="">You are awesome.</span><br data-dcnode-id="527"><span data-dcnode-id="526" instrument_node="">
You are loved.</span><br data-dcnode-id="525"><span data-dcnode-id="524" instrument_node="">
You deserve the best.</span><br data-dcnode-id="523"><span data-dcnode-id="522" instrument_node="">
You deserve everything you want.</span><br data-dcnode-id="521"><span data-dcnode-id="520" instrument_node="">
I will always support you.</span><br data-dcnode-id="519"><span data-dcnode-id="518" instrument_node="">
I want you to be happy.</span><br data-dcnode-id="517"><span data-dcnode-id="516" instrument_node="">
– The Universe</span></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Positive thinking is powerful thinking. If you want happiness, fulfillment, success and inner peace, start thinking you have the power to achieve those things. Focus on the bright side of life and expect positive results.” ― Germany Kent</span></p><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="510" instrument_node="">Want more </span><a data-dcnode-id="508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//motivationping.com/quotes/"><span data-dcnode-id="509" instrument_node="">inspirational quotes</span></a><span data-dcnode-id="507" instrument_node="">?</span></p><span data-dcnode-id="505" instrument_node="">
