</span><h1 class="entry-title" data-dcnode-id="3695" itemprop="headline"><span data-dcnode-id="3696" instrument_node="">9 Ways to Be Happy Within Yourself</span></h1><div class="entry-meta" data-dcnode-id="3684"><span data-dcnode-id="3694" instrument_node="">By </span><span class="posted-by vcard author" data-dcnode-id="3686" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span data-dcnode-id="3693" instrument_node=""> </span><a class="url fn n" data-dcnode-id="3688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//possibilitychange.com/author/olusegun-jegede/" itemprop="url" rel="author" title="View all posts by Olusegun Jegede"><span data-dcnode-id="3692" instrument_node="">
</span><span class="author-name" data-dcnode-id="3690" itemprop="name"><span data-dcnode-id="3691" instrument_node="">Olusegun Jegede</span></span><span data-dcnode-id="3689" instrument_node="">
</span></a><span data-dcnode-id="3687" instrument_node="">
</span></span><span data-dcnode-id="3685" instrument_node="">
</span></div><span data-dcnode-id="3683" instrument_node=""> </span></div><span data-dcnode-id="3681" instrument_node="">
</span><div class="post-thumb-img-content post-thumb" data-dcnode-id="3677"><img alt="happy within" class="attachment-large size-large wp-post-image lazyloaded" data-dcnode-id="3680" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://s10721.pcdn.co/wp-content/uploads/2010/09/happy-within.jpg" data-srcset="https://s10721.pcdn.co/wp-content/uploads/2010/09/happy-within.jpg 1024w, https://s10721.pcdn.co/wp-content/uploads/2010/09/happy-within-300x188.jpg 300w, https://s10721.pcdn.co/wp-content/uploads/2010/09/happy-within-768x480.jpg 768w, https://s10721.pcdn.co/wp-content/uploads/2010/09/happy-within-400x250.jpg 400w" height="500" itemprop="image" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s10721.pcdn.co/wp-content/uploads/2010/09/happy-within.jpg&amp;raw" srcset="https://s10721.pcdn.co/wp-content/uploads/2010/09/happy-within.jpg 1024w, https://s10721.pcdn.co/wp-content/uploads/2010/09/happy-within-300x188.jpg 300w, https://s10721.pcdn.co/wp-content/uploads/2010/09/happy-within-768x480.jpg 768w, https://s10721.pcdn.co/wp-content/uploads/2010/09/happy-within-400x250.jpg 400w" width="800"><noscript data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">&lt;img width="800" height="500" src="https://s10721.pcdn.co/wp-content/uploads/2010/09/happy-within.jpg" class="attachment-large size-large wp-post-image" alt="happy within" itemprop="image" loading="lazy" srcset="https://s10721.pcdn.co/wp-content/uploads/2010/09/happy-within.jpg 1024w, https://s10721.pcdn.co/wp-content/uploads/2010/09/happy-within-300x188.jpg 300w, https://s10721.pcdn.co/wp-content/uploads/2010/09/happy-within-768x480.jpg 768w, https://s10721.pcdn.co/wp-content/uploads/2010/09/happy-within-400x250.jpg 400w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></div><span data-dcnode-id="3676" instrument_node="">
</span></header><span data-dcnode-id="3673" instrument_node="">
</span><div class="entry-content clear" data-dcnode-id="3480" itemprop="text"><span data-dcnode-id="3672" instrument_node="">
</span><p data-dcnode-id="3670"><span data-dcnode-id="3671" instrument_node="">Have you ever found yourself standing in front of the mirror and yelling at yourself or hating yourself? Do you understand what it feels like to be completely disgusted with yourself and longing for a change? We often spend time upset about something, allowing our environment and circumstances to dictate whether or not we are going to be happy. The truth is that we can live our lives with happiness and decide that we are going to do whatever it takes to be happy. You can be happy if you have the mind to.</span></p><span data-dcnode-id="3669" instrument_node="">
</span><p data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">Happiness is something we must do on purpose. In the midst of struggles or difficulties, we must choose to be happy. Happiness does not come from the acquisition of money or things; happiness begins from within each of us. Being happy within ourselves simply means showing mercy to ourselves, forgiving ourselves, befriending ourselves, accepting ourselves, and loving ourselves. It’s a lifelong journey that requires regular self-examination and an ongoing process of making peace with ourselves. It means discovering what makes us unhappy and choosing to live in peace. It means treating ourselves with compassion and kindness. It makes us to begin to enjoy life more and more and celebrate it as adventure in peace. It helps us to live life to the fullest, and help make the world a better place for us and others.</span></p><span data-dcnode-id="3666" instrument_node="">
</span><p data-dcnode-id="3664"><span data-dcnode-id="3665" instrument_node="">However, being happy within ourselves may be one of the most difficult challenges we will ever face. For some, this challenge may prove too difficult to handle, and as a result, they allow it to rule them. Many prefer to endure the challenges, while others love to overcome them but do not how to get out of them.</span></p><span data-dcnode-id="3663" instrument_node="">
</span><p data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">If you belong to any of these categories, the following tips could help you experience happiness within yourself.</span></p><span data-dcnode-id="3660" instrument_node="">
</span><h3 data-dcnode-id="3657"><strong data-dcnode-id="3658"><span data-dcnode-id="3659" instrument_node="">1. Forgive yourself</span></strong></h3><span data-dcnode-id="3656" instrument_node="">
</span><p data-dcnode-id="3654"><span data-dcnode-id="3655" instrument_node="">Forgive yourself for thinking negatively. Forgive yourself for talking, without thinking twice. Forgive yourself for being rude to your superior, your friend, your parents, or your siblings. Don’t think negative thoughts about yourself for taking wrong steps or making wrong decisions. This kind of thinking puts your focus on the problem and not the solution. It’s better to say good things about yourself than to say negative things. Always saying positive things about yourself is a sign that you have forgiven yourself.</span></p><span data-dcnode-id="3653" instrument_node="">
</span><h3 data-dcnode-id="3650"><strong data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">2. Forgive others</span></strong></h3><span data-dcnode-id="3649" instrument_node="">
</span><p data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">If we want to make peace with others, we first need to be at peace with ourselves. Learn to forgive and forget and let go of things quickly. It is not good to resent and hold grudges. People who hold grudges and resent their past incidents often suffer from cardiac and psychological problems. The easiest way to forgive others is to assume that they didn’t offend us in the first place. If you weren’t offended, you wouldn’t have the course to be offended or to forgive others.</span></p><span data-dcnode-id="3646" instrument_node="">
</span><h3 data-dcnode-id="3643"><strong data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">3. Stop thinking and talking about your problems</span></strong></h3><span data-dcnode-id="3642" instrument_node="">
</span><p data-dcnode-id="3640"><span data-dcnode-id="3641" instrument_node="">Instead, focus on the good in every situation you face and every person you are in a relationship with – including yourself.</span></p><span data-dcnode-id="3639" instrument_node="">
</span><h3 data-dcnode-id="3636"><strong data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">4. Focus on being a blessing to others</span></strong></h3><span data-dcnode-id="3635" instrument_node="">
</span><p data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">Get your mind off yourself and focus on blessing others instead. When you bless others, the blessings will come back to you; it’s a wonderful phenomenon many don’t understand. After all, life is not all about receiving; it’s more of giving.</span></p><span data-dcnode-id="3632" instrument_node="">
</span><h3 data-dcnode-id="3629"><strong data-dcnode-id="3630"><span data-dcnode-id="3631" instrument_node="">5. Be busy</span></strong></h3><span data-dcnode-id="3628" instrument_node="">
</span><p data-dcnode-id="3626"><span data-dcnode-id="3627" instrument_node="">The busier you are, the less time you have to think, especially, about something or someone who left you with negative feelings. Being busy is the best way to keep negative thoughts from provoking you repeatedly.</span></p><span data-dcnode-id="3625" instrument_node="">
</span><h3 data-dcnode-id="3622"><strong data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">6. Recount the things you have achieved</span></strong></h3><span data-dcnode-id="3621" instrument_node="">
</span><p data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">Take some personal time to be with myself and recount the things you have achieved and the things you have. Counting one’s blessings and achievements makes one feel fulfilled and happy. We often hate ourselves when we feel we have not achieved anything. The best way to count your blessings is to write down whatever you have achieved. No matter what happens in our lives, we have life, air to breathe, food to eat, some friends, family and associates, a measure of wealth and a measure of health.</span></p><span data-dcnode-id="3618" instrument_node="">
</span><h3 data-dcnode-id="3615"><strong data-dcnode-id="3616"><span data-dcnode-id="3617" instrument_node="">7. Develop a pastime</span></strong></h3><span data-dcnode-id="3614" instrument_node="">
</span><p data-dcnode-id="3612"><span data-dcnode-id="3613" instrument_node="">Spend your free time on reading, listening to music, watching movies or other activities. This enables you to put your mind off the problems you are facing and the thoughts you have about yourself.</span></p><span data-dcnode-id="3611" instrument_node="">
</span><h3 data-dcnode-id="3608"><strong data-dcnode-id="3609"><span data-dcnode-id="3610" instrument_node="">8. Be content with WHO you are</span></strong></h3><span data-dcnode-id="3607" instrument_node="">
</span><p data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">Don’t focus on things about yourself that you have no control over. Don’t strive to be like someone else. Don’t care about what other people think or say about you, when you’re not even sure whether they are right or wrong. When you do this, you relieve yourself of a lot of stress and anxiety. Be content with yourself, while you hope for a better you.</span></p><span data-dcnode-id="3604" instrument_node="">
</span><h3 data-dcnode-id="3601"><strong data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">9. Never lose hope</span></strong></h3><span data-dcnode-id="3600" instrument_node="">
</span><p data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">There’s always a light at the end of the tunnel. Hope is something you can never afford to lose. With hope you always have a path towards happiness. Hope reminds you that everything will be ok. With hope, you know that whatever looks terrible is only temporary and that soon enough, things will be just fine.</span></p><span data-dcnode-id="3597" instrument_node="">
</span><p data-dcnode-id="3592"><span data-dcnode-id="3596" instrument_node="">Randy Stiver once noted that </span><em data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">‘happiness must be pursued by personally choosing the right thoughts, right words and right actions at the right time.’</span></em><span data-dcnode-id="3593" instrument_node=""> In short, our happiness depends on us.</span></p><span data-dcnode-id="3591" instrument_node="">
</span><p data-dcnode-id="3586"><span data-dcnode-id="3587" style="font-size: xx-small;"><span data-dcnode-id="3590" instrument_node="">Photo by </span><a data-dcnode-id="3588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/58842866%40N08/5388738952/"><span data-dcnode-id="3589" instrument_node="">tommerton2010</span></a></span></p><span data-dcnode-id="3585" instrument_node="">

</span><p data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">Thanks, Olusegun! In behalf of the many people out there seeking means to understand themselves and find happiness, I am very grateful for this post. It lists down the basic ideas to find joyful meaning to one’s existence. But most of all, it highlights the truth that happiness is not what other people or outside forces would impact on one’s life. Happiness is within ourselves and we just need to let this ignite a better perspective, improved course of action and higher appreciation of who we really are. That way, we can truly be happy. Thanks again for the nine tips, Olu… Keep it up, puhleez! Many people need this kind of information. Cheers!</span></p><span data-dcnode-id="2994" instrument_node="">

</span><section class="ast-comment-content comment" data-dcnode-id="2251"><span data-dcnode-id="2272" instrument_node="">
</span><p data-dcnode-id="2260"><span data-dcnode-id="2271" instrument_node="">Im sorry. But this didn’t help me at all. I feel like this all the time. So unhappy with myself, and everything about me. The only thing in life I don’t really hate is Music&amp;food.</span><br data-dcnode-id="2270"><span data-dcnode-id="2269" instrument_node="">
Not kidding. This stuff is so much easier said than done. I want an explanation on HOW I forgive myself. And I want to make it better. I don’t wanna stay busy and forget. Come on. I want to change and be happy with myself. How is that possible? I don’t think it is anymore. I try to be content. Its not a lack of effort that stops me. The only things I’m content with are others and other things around me. I doubt I will ever be with myself. Does anyone, really, ever feel quite happy with themselves? The way they are and act and look, their style, friends, blahh?? Work? School? I’m starting to doubt it. I don’t get how other people deal with it. I want to go back in time. When I was happy. A cute little girl with friends and family. So many fun things happened, that was the only time in my life that I just didn’t think about all this shit. But its impossible. To ever. Go back.</span><br data-dcnode-id="2268"><span data-dcnode-id="2267" instrument_node="">
I see that now. But it doesn’t make anything ever better. The best thing I can think is that I have friends and family who seem to enjoy being around me somewhat. I thinnkkk they are content with me. At least my friends. Nope. Scratch that. They all abandon me. They always will. My family constantly complains about all the shit I do. Yet I don’t get why anyones ever around me anyway. But its not like anyones all that good to me. My mom. My best friend Mikayla. Those two are the best. Probably the people I care most about. And then my dad. &lt;33 Never had a boyfriend. Nothing. Nothing. I feel like crap. Maybe I'm tired and need to go to bed. But that wont change anything. I'll wake up tomorrow and feel basically the same. But I shove past and pretend.Pretend everythings okay. There are certain days when I do forget, when Im happy. But those are rare. I pray that my last day of school will be like that. Then maybe I can look at that day and be greatful. Maybe thats what I need to do. Try and be positive and greatful. Im so sorry this is long and I need to stop. My apologies to anyone who reads this. But I needed to get it out. Maybe someone will see this and feel the same. If you have any advice or if you feel the same, please contact me. We can discuss. Reply. Pleaasee…Im lost..gahhh..why am I telling this to strangers. I have problems. WELL NO DUH. Im sorry..Im justt…gonna..ugh..justt…</span><br data-dcnode-id="2266"><span data-dcnode-id="2265" instrument_node="">
I don't know why I did this…I'm just gonna stop.</span><br data-dcnode-id="2264"><span data-dcnode-id="2263" instrument_node="">
Im sorry.</span><br data-dcnode-id="2262"><span data-dcnode-id="2261" instrument_node="">
So sorry.</span></p><span data-dcnode-id="2259" instrument_node="">

</span><p data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">I use to feel the exact way your expressing!! So I understand where your coming from. This is what helped me I didn’t realize it but I actually was going through depression. And was constantly not only always down on myself and would be myself up as to way I couldn’t find happiness.. I would also blame life for my own problems. At times I wondered why anyone wanted to be around me and eventually it grotto the point where I didn’t even want to be around other people. I just couldn’t be happy. Then I got on medicine and it helped but still there was a empty feeling. That’s when I decided what was missing in my life was me!!! I was unhappy because I was allowing myself to be unhappy…. happiness starts from the inside ( not to mention along with praying and Jesus in your life). I needed to start loving myself and give myself credit for the things in life I had done. Not bash myself for the things I hadn’t done. I had a wake up call and I have to say praying and talking to jeers helped me ALOT!! I don’t know what your religion is but all I can say is love yourself.. I don’t know you but you are here for a REASON!!! And that’s a beautiful thing… you may not believe it at times but you are unique and different in your own special way…. I hope this has helped you.. :)</span></p><span data-dcnode-id="2161" instrument_node="">

</span><p data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">Hi Sam</span></p><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">There are days when a lot of people will feel the way you do, I have felt the same way quite often over the last few months.  Feeling like the answer was to run away or even death.  It is easier said than done to believe in yourself, but if you have a low self esteem then it will be even more difficult.  Start by taking small steps.  Help others who require assistance, try saying the same 2 positive affirmations per day about yourself for about 9 days AND DON’T GIVE UP.  If you feel the way you do now, having a boyfriend will be the least of your problems.  The relationship may not work because your feelings have yet to be resolved.  Try and take time out for yourself and explore what YOU want and think about how YOU are going to achieve this.  I agree with Tod below, research in your local area about counselling sessions.  You may not see any results initially but perseverance is the key.  Wishing you every success in your journey in achieving inner peace.</span></p><span data-dcnode-id="2058" instrument_node="">

</span><p data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Thank you. Seriously, thank you. It’s been forever since I posted this, and I’d completely forgotten about it. But now I remember sitting in my room and crying as I typed it, and seeing that so many people cared enough to try and give me encouraging advice, means a LOT. So thank you, all of you. I’m replying to Maegz, as you were the most recent, but I hope that Adam, Rochelle, Stacy, and Todd see this as well. I have been battling depression, and since I posted this, it’s only gotten worse. I’m ashamed to admit that I fell into a bad habit of self harm. Recently, my family found out, and I have stopped. I’m getting stronger, and all of these words you have taken the time out of your day to write, are only helping me along. I just wanted to let you know how grateful I truly am, and to show that your words truly had an affect, and didn’t go to waste. You’re all wonderful people. Thanks&lt;3</span></p><span data-dcnode-id="1890" instrument_node="">

</span><section class="ast-comment-content comment" data-dcnode-id="1834"><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Depression has no rational explanation so I believe it is a metabolical (physical) condition just like anemia (iron deficiency) which makes people very tired, etc..  Therefore you have to give yourself special allowances (including pardon, sympathy and compassion) for a kind of thinking that most other people don’t have and certainly will never understand.  People will say to you, oh just “think” your way to happiness.  Or the people will challenge your reason for feeling sad (you don’t have to have any reason though). Or to say do this or that mental exercise.  Or take a pill (very few work).  Or pray.  In the end, depression is a feeling of detachment (separation) that is very hard to overcome.  It is a feeling of isolation and abandonment.  However, you must promise yourself that you recognize this kind of thinking is only a “distortion” of facts, and is not a “reality” unto itself, or it will just pull down.   You have to promise yourself that you will not be defeated.  Or deceived by false perceptions!  Instead the power that will keep you going is knowing that you have something special to offer other people.  Maybe that time hasn’t happened yet.  But it will.  And you will be in the right place at the right time to make a unique difference for somebody else.  What happens to us, the people we meet, and the experiences we go through, and what we are empowered to say to one another, all those things are not accidental.  They are part of a larger puzzle that we don’t understand.  But we are there in the middle of it anyway.  We are there to complete a bigger picture.  In that regard have faith in your purpose.  And have patience that you will be fortunate enough to acknowledge it one day.  And to know that everything you’ve been through, and are going through now, has happened for a reason.  To put you in a place that will make an important difference for somebody else.  Never give up.  And never many any decision at the end of a day.  Because you will always feel a tiny bit better the next morning!  And the more often that you can continue to make that bargain with yourself!  Good luck.  Many people wish you well.  And know that you are very important!</span></p><span data-dcnode-id="1842" instrument_node="">

le="height: 229.297px; background-image: url(&quot;https://scontent-iad3-2.cdninstagram.com/v/t51.2885-15/275934576_1002899697292426_2515913043851280339_n.jpg?_nc_cat=107&amp;ccb=1-5&amp;_nc_sid=8ae9d6&amp;_nc_ohc=MPI-xMwwSvoAX9N7wy5&amp;_nc_ht=scontent-iad3-2.cdninstagram.com&amp;edm=AM6HXa8EAAAA&amp;oh=00_AT8VgP0t1XM1rSDkzltM81IKBsQ3wVli3M-uEXcQXSgj4A&amp;oe=626A3348&quot;); background-size: cover; background-position: center center; background-repeat: no-repeat;" target="_blank"><span data-dcnode-id="1169" instrument_node="">
</span><span class="sbi-screenreader" data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">"Personally, I struggle with change. Even good cha</span></span><span data-dcnode-id="1166" instrument_node="">
</span><img alt="&quot;Personally, I struggle with change. Even good change can be tricky for me to deal with. For example, about six months ago I left my job to focus on my site, PositivelyPresent.com, full time. I initiated this change—and was thrilled about it—but it was still a struggle to get used to the idea that I would be in control of my own business.

I would be making my own hours, writing on my own schedule. It was a great change—but I found it hard to adapt at times. I was used to the routine of my corporate job and suddenly I was alone in my apartment all day, expected to take care of all aspects of my newborn company, and it was overwhelming.

Even though I love my routines—and tend to shy away from change—changing my own career path has taught me to think differently about change. It’s shown me that change—even change I’ve initiated—can be unpredictable. It’s shown me that I can’t always control change—but I can control the way I think about it.&quot;

This excerpt is from &quot;5 Ways to Change Your Mind About Change&quot; by Dani DiPirro. Visit the Possibility Change website to read the full story!
