</span><p data-dcnode-id="6539"><span data-dcnode-id="6544" instrument_node="">Conflict and adversity is an inevitable part of all of our lives. Yet, many people have different reactions to the conflict they face in their own individual scenarios. For a lucky few, conflict can serve as a point of resistance where the individual can rise above adversity and embrace a strong sense of inner pride and strength as seen in Mia Angelou's poem "Still I ise"; however, there are other cases where the conflict is simply too great, and it can break the individual, causing them to act either irrationally as in Mordecai itchler's The Apprenticeship of Duddy Kravitz, or can throw one into a deep state of depression, as seen in Alex Colville's wartime painting.</span><br data-dcnode-id="6543"><span data-dcnode-id="6542" instrument_node="">
</span><br data-dcnode-id="6541"><span data-dcnode-id="6540" instrument_node="">

</span><p data-dcnode-id="6470"><span data-dcnode-id="6473" instrument_node="">Adversity</span><br data-dcnode-id="6472"><span data-dcnode-id="6471" instrument_node="">
Life comprises different challenges that one has to encounter and overcome in order to grow and develop. In my personal life, I have faced many challenges that have tested my physical, psychological and emotional mettle. One of the serious challenges I have faced in my personal life is lack of self confidence. I was always shy, lacked self confidence and had a low self-esteem. Growing up, I was shy and didn’t talk to anyone because of my low self-esteem. I avoided interacting with people, especially large groups of people. Most of the time, I would hang out with the same people i.e. three close friends because I had an extremely bad social anxiety. During my initial years in school, I was considered the class clown and would be removed from class often. My teachers were always concerned about my habit and would always try to find out if everything…</span></p><span data-dcnode-id="6469" instrument_node="">

</span><p data-dcnode-id="6418"><span data-dcnode-id="6423" instrument_node="">Hemingway both describes these characters in the relation with him as well as in the relation with other subjects. Regardless however of the perspective, the hurdles the characters overcome make them successful both in the mind of the reader and in terms of the artistic legacy they left behind.</span><br data-dcnode-id="6422"><span data-dcnode-id="6421" instrument_node="">
</span><br data-dcnode-id="6420"><span data-dcnode-id="6419" instrument_node="">
Gertrude Stein can be seen as an example of a person that overcame adversities and became successful. This is particularly taking into account the preferences in her private life and her long-term female companion, Alice Toklas. Back in the day, such preference was not necessarily condemned but it was not overlooked either. However, in the case of Gertrude Stein, her qualities and determination made her one of the most appreciated women of the French society. Hemingway points this success in his writing, "When you have two people who love each other, are happy and gay and really good work is being…</span></p><span data-dcnode-id="6417" instrument_node="">
</span><p data-dcnode-id="6407"><span data-dcnode-id="6416" instrument_node="">Overall, "The moveable feast" is one of Hemingway's most entertaining and at the same time full of meaning creations of his late years. The complexity of the writing and the portraits of the characters are essential for providing an overall image of the world in the 1920s. Furthermore, the focus on Paris to such a great detail allowed the city to be an actual character in Hemingway's creation. The perspectives proposed by Hemingway together with the themes and subjects link the existence of the author and his depicted friends to the American dream and to the way in which adversities can be overcome in order to achieve success.</span><br data-dcnode-id="6415"><span data-dcnode-id="6414" instrument_node="">

</span><p data-dcnode-id="6355"><span data-dcnode-id="6360" instrument_node="">Unfortunately, the Natives are still facing many social and economic barriers to success.</span><br data-dcnode-id="6359"><span data-dcnode-id="6358" instrument_node="">
</span><br data-dcnode-id="6357"><span data-dcnode-id="6356" instrument_node="">
In conclusion, "Bury My Heart at Wounded Knee" is a compelling and difficult book to read. It tells the graphic history of the Native Americans, and indicates that their way of life was paramount to their well being, their culture, and their very existence. So many of them attempted to hold on to their old ways even as they were ripped from their lands and moved to strange, uninhabitable places. Their character, their strength, and their dignity comes through in their history, and Brown's book makes them sympathetic, but never undermined their proud determination to survive and thrive. As ed Cloud says in the book, "When the white man comes to my country he leaves a trail of blood behind him" (Brown 103). That blood may have dried, but it will always be there in Native American…</span></p><span data-dcnode-id="6354" instrument_node="">

</span><br data-dcnode-id="5944"><span data-dcnode-id="5943" instrument_node="">
Employment in adulthood can be heavily affected by poverty in childhood, as noted above. There are several complex and interrelated ways in which this can occur. First, there is a strong indication that childhood poverty creates a pattern of psychological stress that becomes all but inescapable in adulthood (Evans &amp; Kim 2007). The prolonged stress that this can lead to has been linked to many health problems, like any other form of prolonged stress, but the cumulative effects of continued conditions of poverty often exacerbate the problem still further (Evans &amp; Kim 2007). It can even lead to a lack of ability to fully regulate stress, and this leads to many issues in the employment world, including memory issues, the ability to handle work-related stress including deadlines and other common features of modern jobs, which simply leads to more stress and again, reduced productivity (Evans &amp; Schamberg 2009). The problems of childhood poverty easily become self-perpetuating due to the reduced productivity of adults that grew up in poverty.</span><br data-dcnode-id="5942"><span data-dcnode-id="5941" instrument_node="">
</span><br data-dcnode-id="5940"><span data-dcnode-id="5939" instrument_node="">

</span><p data-dcnode-id="5882"><span data-dcnode-id="5891" instrument_node="">old, living away from home for the first time in an apartment in San Diego when I decided to attend college and maintain myself in an apartment without taking any financial assistance from my parents. Since I was not a California resident I had the additional expense of paying out-of-state tuition. I had a football scholarship that would pay fifty-percent of my tuition but I needed a job to pay my living expenses and the remaining tuition.</span><br data-dcnode-id="5890"><span data-dcnode-id="5889" instrument_node="">
</span><br data-dcnode-id="5888"><span data-dcnode-id="5887" instrument_node="">
Although the time required for school and football was a fulltime job in itself, my financial needs said I needed to work between thirty and thirty five hours per week to make ends meet. With that as my motivation, I took a job at Federal Express as a package handler on the graveyard shift.</span><br data-dcnode-id="5886"><span data-dcnode-id="5885" instrument_node="">
</span><br data-dcnode-id="5884"><span data-dcnode-id="5883" instrument_node="">
The summer before starting my sophomore year of college, just two weeks before the beginning of football camp in…</span></p><span data-dcnode-id="5881" instrument_node="">
</span><p data-dcnode-id="5871"><span data-dcnode-id="5880" instrument_node="">Using my newfound knowledge I spent three months doing intensive rehab in the swimming pool and in lifting soup cans for weights. At the end of that time, I gained enough use of my arm to be able to work in a restaurant. Meanwhile I continued my rehabilitation for an additional eight months.</span><br data-dcnode-id="5879"><span data-dcnode-id="5878" instrument_node="">
</span><br data-dcnode-id="5877"><span data-dcnode-id="5876" instrument_node="">
During that time of rehab and unemployment, I resided in the comfort of my 1966 VW Bug. I lived off my savings, ate canned goods, and showered at the pool after two workouts a day. Living in my VW Bug for eleven weeks and two days was an experience that will shape my life forever. It taught me the importance of resilience, humility, diligence, and the power of optimism. I know now that life gives us many obstacles we do not expect or want, but it is not what is dealt to us that is important. It is how we deal with what we are given.</span><br data-dcnode-id="5875"><span data-dcnode-id="5874" instrument_node="">
</span><br data-dcnode-id="5873"><span data-dcnode-id="5872" instrument_node="">
I learned how to handle many obstacles at the same time and perform all to the best of my ability. I found I can handle and even appreciate adversity at different times, and sometimes at the same time, while maintaining the tenacity and vision to accomplish daily responsibilities and pursue future goals. Having learned those things will serve me well in a career with the FAA.</span></p><span data-dcnode-id="5870" instrument_node="">

</span><br data-dcnode-id="5821"><span data-dcnode-id="5820" instrument_node="">
Dostoyevsky's Notes from Underground and Voltaire's Candide are precisely similar works: in attempting to construct a narrative critique of a philosophical system, they slip from harsh satire into a form of sentimentality. I would suggest that comparing the two works' differing approaches to the philosophical problems of optimism, adversity, and violence are indicative of a different attitude altogether toward the philosophical problems presented. Dostoyevsky is passionate but ultimately sees no alternative between traditional religious morality and nihilism; Voltaire, by contrast, sees traditional religious morality as banal and proposes his own alternative. But in my conclusion, I will compare and contrast the role played by comedy in both works -- although each takes a broadly satirical approach toward the philosophical fashions of the present-day, only Candide is the genuinely comic work.</span><br data-dcnode-id="5819"><span data-dcnode-id="5818" instrument_node="">
</span><br data-dcnode-id="5817"><span data-dcnode-id="5816" instrument_node="">

Psychological Disengagement</span><br data-dcnode-id="5763"><span data-dcnode-id="5762" instrument_node="">
</span><br data-dcnode-id="5761"><span data-dcnode-id="5760" instrument_node="">
Psychological disengagement represents a coping mechanism that preserves a person's sense of self-worth in the face of negative feedback. For example, a student may discount a bad grade on an exam by framing it as an aberration, thereby preserving a 'good student' self-identity. Employing this coping mechanism has specific advantages, such as allowing the student to be persistent about achieving academic success despite receiving negative feedback (Nussbaum and Steele, 2007). On the other hand, psychological disengagement could facilitate a student framing academic success as irrelevant to their personal goals and future. Such students tend to perform poorly in school and suffer from increased dropout rates (reviewed by Stephan, Caudroit, Boiche, and Sarrazin, 2011). In contrast, students who are academically successful tend not to disengage, despite receiving a negative evaluation, and self-perceptions of their academic competency suffers accordingly. Understanding the mechanisms that encourages psychological disengagement…</span></p><span data-dcnode-id="5758" instrument_node="">

Give a brief overview of the causes of the Civil War.</span><br data-dcnode-id="5688"><span data-dcnode-id="5687" instrument_node="">
</span><br data-dcnode-id="5686"><span data-dcnode-id="5685" instrument_node="">
From April 12, 1861 to April 9, 1865; America became engrossed in a bloody civil war. It was fought for many reasons, which came together to create increased hostilities and carnage. First, the influx of immigration in the 1850s brought a new labor force to the Northern states. This offered them with an alternative pool of cheap labor. While the South still believed, that slavery was an ethical practice and did not want to end it. (Kennedy, 2012)</span><br data-dcnode-id="5684"><span data-dcnode-id="5683" instrument_node="">
</span><br data-dcnode-id="5682"><span data-dcnode-id="5681" instrument_node="">
A second cause was the Supreme Court case Dred Scott vs. Stanford. Dred Scott was a slave who wanted to seek citizenship through the American legal system. His case was denied in 1857. It was based the legal interpretation that anyone who descended from Africa could not become American citizens. It also overturned the Missouri Compromise of 1820.…</span></p><span data-dcnode-id="5679" instrument_node="">

A key area of research focused on treatment of the symptoms of depression and aggression caused by steroid use. Effective treatment was achieved through the use of common antidepressants (Schule, et. al, 2003). This is an important body of research, as it provides the guidance counselor with choices in treating students found to be affected by steroid use. Knowing that there are treatment options available through mental health channels will help in the development of treatment strategies for students whose social lives are being negatively influenced by steroid use.</span><br data-dcnode-id="5613"><span data-dcnode-id="5612" instrument_node="">

The ability to help a person or a patient is often a complex affair that involves care on a much deeper level than simply treating symptoms. "Overcoming" is a concept that was chosen by the authors; this concept is multifaceted and includes many different aspects, but can be thought as roughly being able to overcome a personal challenge to meet a desired outcome (Brush, Kirk, Gultekin, &amp; Baiardi, 2011). The concept of overcoming is interesting to me and I feel that I have had overcome many things in my life; although these challenges were on a different scale than the case studies provided. However, understanding what it takes to "overcome" could be a valuable concept to many people.</span><br data-dcnode-id="5298"><span data-dcnode-id="5297" instrument_node="">

</span><p data-dcnode-id="5097"><span data-dcnode-id="5102" instrument_node="">The positive value that most people place on a character's ability to face their demons is traditionally what defines a "hero." What defines a "tragic hero" is when facing those demons is too much for the protagonist to handle, which is the case in this play. But this lack of unwavering strength and courage is what makes the character of Oedipus seem human, and therefore relatable to the audience. If his reaction to the truth had shown nothing but strength, he would seem more like a cardboard cut-out than a human being.</span><br data-dcnode-id="5101"><span data-dcnode-id="5100" instrument_node="">
</span><br data-dcnode-id="5099"><span data-dcnode-id="5098" instrument_node="">

The Metamorphosis</span><br data-dcnode-id="5034"><span data-dcnode-id="5033" instrument_node="">
</span><br data-dcnode-id="5032"><span data-dcnode-id="5031" instrument_node="">
On the surface Franz Kafka's The Metamorphosis is novella about a traveling salesman, Gregor Samsa, who literally transforms into a beetle-like creature. But underneath the surface, on an allegorical level, it is a story about adversity and alienation. As Gregor's condition worsens and he becomes more unrecognizable his family must confront the dilemma of how it is they are to handle the situation. And this dilemma, this point of conflict, this adversity they face, reveals their true character(s). It is the purpose of this essay to investigate not how Gregor's family changes in the story, but how their true colors are revealed by Gregor's metamorphosis.</span><br data-dcnode-id="5030"><span data-dcnode-id="5029" instrument_node="">

One of the most fascinating aspects of Neil Anderson's work of non-fiction, The ondage reaker, is that despite all of the different aspects of Christianity, spirituality, history, and contemporary culture that he details, the book revolves around a relatively simple precept. This tenet is the founding one of Christianity and the principle that has seen many an adherent through any assortment of beneficial or malefic circumstances. Quite simply it is that Jesus sacrificed himself on the cross, and in doing so gave a redemptive power to the world and to all who were willing to believe in him and his sacrifice. This power is referred to in Anderson's work again and again as a means of overcoming sin, evil, and self-indulgence, and to triumph in the spiritual warfare that the author posits occurs daily between Christians and minions of…</span></p><span data-dcnode-id="4644" instrument_node="">

Author C.E. Johnson explains that there are at least four kinds of passages -- crossroad events and meaningful challenges -- in a person's life that may result in failure. Those four include: a) diversity of work experiences like an important new assignment; b) adversity in work (a key failure); c) a life diversity (blending work and family); and d) life adversity (including injury or illness) (Johnson, 2016). I can truthfully say I have confronted all of Johnson's passages, but two in particular stand out and will be presented in this essay.</span><br data-dcnode-id="4503"><span data-dcnode-id="4502" instrument_node="">

</span><br data-dcnode-id="4146"><span data-dcnode-id="4145" instrument_node="">
As the workplace and management techniques have developed over the decades, employees have enjoyed an increasingly powerful position in their companies. According to Eisler and Montuori (2001), the changes in both business and its surrounding environment in terms of society, the economy and the environment have necessitated new paradigms of the employer-employee relationship. It is no longer sufficient to mindlessly follow traditional methods such as marionette management. Instead, the workplace needs to be assessed in terms of which management styles will most efficiently drive the specific business.</span><br data-dcnode-id="4144"><span data-dcnode-id="4143" instrument_node="">
</span><br data-dcnode-id="4142"><span data-dcnode-id="4141" instrument_node="">

</span><br data-dcnode-id="2669"><span data-dcnode-id="2668" instrument_node="">
Probably one of the most eye-opening parts of the book is when Angelou acknowledges that for decades, blacks in the South acquiesced to whites simply to survive, and they taught these tactics to each succeeding generation in an attempt to simply get along. She writes, "Momma intended to teach ailey and me to use the paths in life that she and her generation and all the Negroes gone before had found, and found to be safe ones. She didn't cotton to the idea that whitefolks could be talked to at all without risking one's life" (Angelou 46). She graphically illustrates life in the South in the 1930s and 40s for blacks…</span></p><span data-dcnode-id="2666" instrument_node="">

This is the primary source for this paper, and it is a book. This source must be reliable, as it is the primary source document for this subject matter, but it is also the primary autobiography of Maya Angelou, and thus, it serves as the most important work of this paper. The source is also reliable because it is clear, even though Angelou may add some fictional details to this work, that she clearly remembers her youth and growth as a time of change, development, and learning, with racial prejudice and repression as a part of her youth.</span><br data-dcnode-id="2656"><span data-dcnode-id="2655" instrument_node="">

</span><p data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">What has been determined to date is Machaut's masterful use of language and syntax to help amuse and entertain his intended audiences, and in an era absent the Internet, cable television and the popular press, it is not surprising that his works were well received. For instance, as De Looze points out, "Guillaume de Machaut gravitates toward equivocal signs: insomnia, colors that can have diametrically opposed meanings, plays on words, and so on" (1997, 13). This point is also made by Leach, who reports that Machaut was titillating without being vulgar about it: "In middle French courtly lyric the word merci signifies a broad range of favors that the lady may grant her lover; its meaning overlaps with 'pity,' but it also carries the sense of remuneration, reward or even salary -- the pay-off in the economy of noble love. Within Machaut's usage it has a specific resonance and range…</span></p><span data-dcnode-id="2525" instrument_node="">

</span><p data-dcnode-id="2474"><span data-dcnode-id="2479" instrument_node="">The central prophesy of the Surem ancestors of the Yoemem incorporates Catholicism. In the story of Yomumuli, a world tree speaks to the great Mother. Not unlike the burning bush anecdote of the Old Testament, the story reveals the symbolic connection between the Surem/Yoemem and Christian beliefs. Moreover, the prophesy itself foretold of the coming of the conquistadors and of their religion. Those Surem who were willing to convert, accept Jesus as savior, and move into modernity would become the Yaqui. Those who chose to retain the Surem traditions would live wild and free in the hills and sea.</span><br data-dcnode-id="2478"><span data-dcnode-id="2477" instrument_node="">

Remember the Titans is very much based on a true story; fact can back up most of the movie's dramatic events in some way. However, almost every time factual events are presented in the film, they are exaggerated or altered to help direct the audience towards a better understanding of the film's themes. For instance, T.C. illiams High School was an attempt at forced integration, but not to the extent portrayed in the film. The community was in turmoil, but not so violent in their reaction to the integration. These examples, in which the film takes certain liberties, help to create the environment of Alexandria, Virginia at the time. They over exaggerate that environment, but nevertheless are accurate in their general presentation of the sentiment among the different forces at play in 1971 Alexandria and T.C illiams High School.</span><br data-dcnode-id="2398"><span data-dcnode-id="2397" instrument_node="">

</span><br data-dcnode-id="2083"><span data-dcnode-id="2082" instrument_node="">
What's fascinating about all minority groups ("minority" not in the strictly racial sense of the word) is that they seek to push forward an agenda of "sameness" while simultaneously embracing the plain fact that they are in some way different than the established majority. They want to be treated like everyone else, but at the same time they expect sensitivity and/or preferential treatment with respect to that particular "otherness" (race, gender, sexual orientation, handicap) that makes them different. One can argue that if deaf people really wanted to be treated like everyone else, they wouldn't take advantage of the many special assistance programs that exist to help them function within a, for lack of a better word, "normal" society. A quick Internet search reveals that there are plenty of special programs for deaf people, at the federal, state,…</span></p><span data-dcnode-id="2080" instrument_node="">

ode-id="356" instrument_node="">日本語</span></span><span data-dcnode-id="354" instrument_node=""> </span></div><span data-dcnode-id="352" instrument_node=""> </span></div><span data-dcnode-id="350" instrument_node="">

</span></div><div class="acsb-popup acsb-statement-popup" data-acsb-popup="acsb-statement-popup" data-dcnode-id="162" tabindex="0"><span data-dcnode-id="342" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="341"></div><span data-dcnode-id="340" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="164" role="dialog"><span data-dcnode-id="339" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="335" role="button" tabindex="0"><span data-dcnode-id="338" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="337"></i><span data-dcnode-id="336" instrument_node=""> </span></span><span data-dcnode-id="334" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="166"><span data-dcnode-id="333" instrument_node=""> </span><div class="acsb-statement" data-dcnode-id="168"><strong class="acsb-title-main" data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Accessibility Statement</span></strong><strong class="acsb-title" data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Compliance status</span></strong><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">We firmly believe that the internet should be available and accessible to anyone and are committed to providing a website that is accessible to the broadest possible audience, regardless of ability.</span></p><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">To fulfill this, we aim to adhere as strictly as possible to the World Wide Web Consortium’s (W3C) Web Content Accessibility Guidelines 2.1 (WCAG 2.1) at the AA level. These guidelines explain how to make web content accessible to people with a wide array of disabilities. Complying with those guidelines helps us ensure that the website is accessible to blind people, people with motor impairments, visual impairment, cognitive disabilities, and more.</span></p><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">This website utilizes various technologies that are meant to make it as accessible as possible at all times. We utilize an accessibility interface that allows persons with specific disabilities to adjust the website’s UI (user interface) and design it to their personal needs.</span></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Additionally, the website utilizes an AI-based application that runs in the background and optimizes its accessibility level constantly. This application remediates the website’s HTML, adapts its functionality and behavior for screen-readers used by blind users, and for keyboard functions used by individuals with motor impairments.</span></p><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">If you wish to contact the website’s owner please use the website's form</span></p><span data-dcnode-id="313" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Screen-reader and keyboard navigation</span></strong><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Our website implements the ARIA attributes (Accessible Rich Internet Applications) technique, alongside various behavioral changes, to ensure blind users visiting with screen-readers can read, comprehend, and enjoy the website’s functions. As soon as a user with a screen-reader enters your site, they immediately receive a prompt to enter the Screen-Reader Profile so they can browse and operate your site effectively. Here’s how our website covers some of the most important screen-reader requirements:</span></p><span data-dcnode-id="307" instrument_node="">
</span><ol data-dcnode-id="281"><span data-dcnode-id="306" instrument_node="">
</span><li data-dcnode-id="294"><strong class="acsb-title" data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Screen-reader optimization:&nbsp;</span></strong><span data-dcnode-id="303" instrument_node="">we run a process that learns the website’s components from top to bottom, to ensure ongoing compliance even when updating the website. In this process, we provide screen-readers with meaningful data using the ARIA set of attributes. For example, we provide accurate form labels; descriptions for actionable icons (social media icons, search icons, cart icons, etc.); validation guidance for form inputs; element roles such as buttons, menus, modal dialogues (popups), and others.&nbsp;</span><br data-dcnode-id="302"><br data-dcnode-id="301"><span data-dcnode-id="300" instrument_node="">Additionally, the background process scans all of the website’s images. It provides an accurate and meaningful image-object-recognition-based description as an ALT (alternate text) tag for images that are not described. It will also extract texts embedded within the image using an OCR (optical character recognition) technology. To turn on screen-reader adjustments at any time, users need only to press the Alt+1 keyboard combination. Screen-reader users also get automatic announcements to turn the Screen-reader mode on as soon as they enter the website.</span><br data-dcnode-id="299"><br data-dcnode-id="298"><span data-dcnode-id="297" instrument_node="">These adjustments are compatible with popular screen readers such as JAWS, NVDA, VoiceOver, and TalkBack.</span><br data-dcnode-id="296"><br data-dcnode-id="295"></li><span data-dcnode-id="293" instrument_node="">
</span><li data-dcnode-id="283"><strong class="acsb-title" data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Keyboard navigation optimization:&nbsp;</span></strong><span data-dcnode-id="290" instrument_node="">The background process also adjusts the website’s HTML and adds various behaviors using JavaScript code to make the website operable by the keyboard. This includes the ability to navigate the website using the Tab and Shift+Tab keys, operate dropdowns with the arrow keys, close them with Esc, trigger buttons and links using the Enter key, navigate between radio and checkbox elements using the arrow keys, and fill them in with the Spacebar or Enter key.</span><br data-dcnode-id="289"><br data-dcnode-id="288"><span data-dcnode-id="287" instrument_node="">Additionally, keyboard users will find content-skip menus available at any time by clicking Alt+2, or as the first element of the site while navigating with the keyboard. The background process also handles triggered popups by moving the keyboard focus towards them as soon as they appear, not allowing the focus to drift outside.</span><br data-dcnode-id="286"><br data-dcnode-id="285"><span data-dcnode-id="284" instrument_node="">Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="282" instrument_node="">
</span></ol><span data-dcnode-id="280" instrument_node="">
</span><strong data-dcnode-id="277" style="border-color: var(--mce-guidelines);"><span data-dcnode-id="278" lang="EN-US"><span data-dcnode-id="279" instrument_node="">Disability profiles supported on our website</span></span></strong><span data-dcnode-id="276" instrument_node="">
</span><ul data-dcnode-id="244"><span data-dcnode-id="275" instrument_node="">
</span><li data-dcnode-id="271"><strong class="acsb-title" data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Epilepsy Safe Profile:</span></strong><span data-dcnode-id="272" instrument_node=""> this profile enables people with epilepsy to safely use the website by eliminating the risk of seizures resulting from flashing or blinking animations and risky color combinations.</span></li><span data-dcnode-id="270" instrument_node="">
</span><li data-dcnode-id="266"><strong class="acsb-title" data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Vision Impaired Profile:</span></strong><span data-dcnode-id="267" instrument_node=""> this profile adjusts the website so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others.</span></li><span data-dcnode-id="265" instrument_node="">
</span><li data-dcnode-id="261"><strong class="acsb-title" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Cognitive Disability Profile:</span></strong><span data-dcnode-id="262" instrument_node=""> this profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements more easily.</span></li><span data-dcnode-id="260" instrument_node="">
</span><li data-dcnode-id="256"><strong class="acsb-title" data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">ADHD Friendly Profile</span></strong><span data-dcnode-id="257" instrument_node="">: this profile significantly reduces distractions and noise to help people with ADHD, and Neurodevelopmental disorders browse, read, and focus on the essential elements more easily.</span></li><span data-dcnode-id="255" instrument_node="">
</span><li data-dcnode-id="251"><strong class="acsb-title" data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Blind Users Profile (Screen-readers):</span></strong><span data-dcnode-id="252" instrument_node=""> this profile adjusts the website to be compatible with screen-readers such as JAWS, NVDA, VoiceOver, and TalkBack. A screen-reader is installed on the blind user’s computer, and this site is compatible with it.</span></li><span data-dcnode-id="250" instrument_node="">
</span><li data-dcnode-id="246"><strong class="acsb-title" data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">Keyboard Navigation Profile (Motor-Impaired):</span></strong><span data-dcnode-id="247" instrument_node=""> this profile enables motor-impaired persons to operate the website using the keyboard Tab, Shift+Tab, and the Enter keys. Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="245" instrument_node="">
</span></ul><span data-dcnode-id="243" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="240"><span data-dcnode-id="241" lang="EN-US"><span data-dcnode-id="242" instrument_node="">Additional UI, design, and readability adjustments</span></span></strong><span data-dcnode-id="239" instrument_node="">
</span><ol data-dcnode-id="181"><span data-dcnode-id="238" instrument_node="">
</span><li data-dcnode-id="231"><strong class="acsb-title" data-dcnode-id="234"><span data-dcnode-id="236" lang="EN-US"><span data-dcnode-id="237" instrument_node="">Font&nbsp;adjustments </span></span><span data-dcnode-id="235" instrument_node="">–</span></strong><span data-dcnode-id="232" lang="EN-US"><span data-dcnode-id="233" instrument_node="">&nbsp;users can increase and decrease its size, change its family (type), adjust the spacing,&nbsp;alignment, line height,&nbsp;and more.</span></span></li><span data-dcnode-id="230" instrument_node="">
</span><li data-dcnode-id="223"><span data-dcnode-id="226" lang="EN-US"><strong class="acsb-title" data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Color&nbsp;adjustments –</span></strong><span data-dcnode-id="227" instrument_node="">&nbsp;</span></span><span data-dcnode-id="224" lang="EN-US"><span data-dcnode-id="225" instrument_node="">users can select various color contrast profiles such as light, dark, inverted, and monochrome. Additionally, users can swap color schemes of titles, texts, and backgrounds with over seven different coloring options.</span></span></li><span data-dcnode-id="222" instrument_node="">
</span><li data-dcnode-id="216"><span data-dcnode-id="218" lang="EN-US"><strong class="acsb-title" data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Animations –</span></strong><span data-dcnode-id="219" instrument_node="">&nbsp;</span></span><span data-dcnode-id="217" instrument_node="">epileptic users can stop all running animations with the click of a button. Animations controlled by the interface include videos, GIFs, and CSS flashing transitions.</span></li><span data-dcnode-id="215" instrument_node="">
</span><li data-dcnode-id="208"><span data-dcnode-id="211" lang="EN-US"><strong class="acsb-title" data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">Content&nbsp;highlighting –</span></strong><span data-dcnode-id="212" instrument_node="">&nbsp;</span></span><span data-dcnode-id="209" lang="EN-US"><span data-dcnode-id="210" instrument_node="">users can choose to emphasize essential elements such as links and titles. They can also choose to highlight focused or hovered elements only.</span></span></li><span data-dcnode-id="207" instrument_node="">
</span><li data-dcnode-id="200"><span data-dcnode-id="203" lang="EN-US"><strong class="acsb-title" data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Audio muting&nbsp;–</span></strong><span data-dcnode-id="204" instrument_node="">&nbsp;</span></span><span data-dcnode-id="201" lang="EN-US"><span data-dcnode-id="202" instrument_node="">users with hearing devices may experience headaches or other issues due to automatic audio playing. This option lets users mute the entire website instantly.</span></span></li><span data-dcnode-id="199" instrument_node="">
</span><li data-dcnode-id="192"><span data-dcnode-id="195" lang="EN-US"><strong class="acsb-title" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Cognitive&nbsp;disorders –</span></strong><span data-dcnode-id="196" instrument_node="">&nbsp;</span></span><span data-dcnode-id="193" lang="EN-US"><span data-dcnode-id="194" instrument_node="">we utilize a search engine linked to Wikipedia and Wiktionary, allowing people with cognitive disorders to decipher meanings of phrases, initials, slang, and others.</span></span></li><span data-dcnode-id="191" instrument_node="">
</span><li data-dcnode-id="183"><strong class="acsb-title" data-dcnode-id="188"><span data-dcnode-id="189" lang="EN-US"><span data-dcnode-id="190" instrument_node="">Additional functions&nbsp;</span></span></strong><span data-dcnode-id="184" lang="EN-US"><strong class="acsb-title" data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">–</span></strong><span data-dcnode-id="185" instrument_node=""> we allow users to change cursor color and size, use a printing mode, enable a virtual keyboard, and many other functions.</span></span></li><span data-dcnode-id="182" instrument_node="">
</span></ol><span data-dcnode-id="180" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">Assistive technology and browser compatibility</span></strong><span data-dcnode-id="177" instrument_node="">
</span><p data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">We aim to support as many browsers and assistive technologies as possible, so our users can choose the best fitting tools for them, with as few limitations as possible. Therefore, we have worked very hard to be able to support all major systems that comprise over 95% of the user market share, including Google Chrome, Mozilla Firefox, Apple Safari, Opera and Microsoft Edge, JAWS, and NVDA (screen readers), both for Windows and MAC users.</span></p><span data-dcnode-id="174" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">Notes, comments, and feedback</span></strong><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">Despite our very best efforts to allow anybody to adjust the website to their needs, there may still be pages or sections that are not fully accessible, are in the process of becoming accessible, or are lacking an adequate technological solution to make them accessible. Still, we are continually improving our accessibility, adding, updating, improving its options and features, and developing and adopting new technologies. All this is meant to reach the optimal level of accessibility following technological advancements. If you wish to contact the website’s owner, please use the website's form</span></p></div><span data-dcnode-id="167" instrument_node=""> </span></div><span data-dcnode-id="165" instrument_node=""> </span></div><span data-dcnode-id="163" instrument_node="">
