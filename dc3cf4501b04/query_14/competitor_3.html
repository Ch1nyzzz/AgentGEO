</span><p data-dcnode-id="7235" style="text-align: left; font-size: 16px;"><span data-dcnode-id="7236" instrument_node="">Trybe, an Institution of a Public Character (IPC), is a member of the National Council of Social Service (NCSS). Our corporate values are resilience, integrity, service, and excellence.</span></p><span data-dcnode-id="7234" instrument_node="">

</span><p class="p1" data-dcnode-id="2625"><strong data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">Campaign Details</span></strong></p><span data-dcnode-id="2624" instrument_node="">
</span><p class="p1" data-dcnode-id="2621"><strong data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Funds raised: $15,491</span></strong></p><span data-dcnode-id="2620" instrument_node="">
</span><p class="p1" data-dcnode-id="2617"><strong data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">Platform: Giving.sg</span></strong></p><span data-dcnode-id="2616" instrument_node="">
</span><p class="p1" data-dcnode-id="2613"><strong data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Summary:</span></strong></p><span data-dcnode-id="2612" instrument_node="">
</span><p data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">Every saint has a past, every sinner has a future</span></p><span data-dcnode-id="2609" instrument_node="">
</span><p data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">Not everyone gets it right on their first try.</span></p><span data-dcnode-id="2606" instrument_node="">
</span><p data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Despite falling down, everyone deserves a second chance in getting up and flying high. Every bird, however small, should spread their wings and fly. Every diamond, however unpolished, should be molded to shine.</span></p><span data-dcnode-id="2603" instrument_node="">
</span><p data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">Dream Builders comprises a group of 31 individuals who are guided by our vision to inspire and create a loving world where everyone, regardless of their background, can live their dream.</span></p><span data-dcnode-id="2600" instrument_node="">
</span><p data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">In collaboration with Trybe, an organization which works alongside youths to craft and build their success stories, Dream Builders aims to raise funds to support initiatives that enable these youths to rebuild their lives. We also are supporting Trybe’s mentorship program to support the youths in their journey towards rehabilitation and reintegration.</span></p><span data-dcnode-id="2597" instrument_node="">
</span><p data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">The mentorship program is built on the basis of forming a close-knitted relationship between the mentor and the youth. The mentor draws on his or her own field of experience, to be a source of inspiration for the youths to reach toward their personal goals and work towards restoring their relationship with their loved ones.</span></p><span data-dcnode-id="2594" instrument_node="">
</span><p data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">With your help, these youths will see their potential to live, love and inspire.</span></p><span data-dcnode-id="2591" instrument_node="">
</span></div><span data-dcnode-id="2589" instrument_node="">

</span><p data-dcnode-id="2573"><strong data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">Head, Communications &amp; Partnership Department</span></strong></p><span data-dcnode-id="2572" instrument_node="">
</span><p data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">Carla leads the Communications &amp; Partnership team in developing, managing, and executing a strategy that sets out how Trybe engages and communicates with its different stakeholders. Together, the team aims to improve Trybe’s position, build strong relationships in the community, and reach out to more young people through various platforms and partnerships. As the head of the department, Carla ensures that the team’s strategy is aligned with the Company’s strategic goals and plan.</span></p><span data-dcnode-id="2569" instrument_node="">
</span><p data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Carla graduated with a Bachelor’s Degree in Fine Arts and majored in Visual Communications. She has been in the creative field years prior to joining Trybe and her experience working in different industries shaped her work ethic.</span></p><span data-dcnode-id="2566" instrument_node="">
</span><p data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">Carla is grateful for the opportunity to work with inspiring and passionate individuals in Trybe. She also appreciates how the Company values career progression and family life among its staff.</span></p><span data-dcnode-id="2563" instrument_node="">
</span><p data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">In her free time, Carla likes to spend quality time with her loved ones. She enjoys good food, some karaoke, and thinks cake is always a great idea.</span></p><span data-dcnode-id="2560" instrument_node="">

</span><p data-dcnode-id="2542"><strong data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">Lead Social Worker &amp; Head, Practice &amp; Service Development Department</span></strong></p><span data-dcnode-id="2541" instrument_node="">
</span><p class="p1" data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">Esther leads a team of Social Workers across the various services in Trybe. As the Head of Practice &amp; Service Development, Esther ensures that services are relevant and the team remains highly competent and updated with skills to support the demands of Trybe youth clients.</span></p><span data-dcnode-id="2538" instrument_node="">
</span><p class="p1" data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">Esther graduated with a Master’s Degree in Social Work from NUS. Having always been intrigued by the behaviours of children and young persons, she finds herself amused just by witnessing their lively and expressive interactions. Prior to joining Trybe, she has worked with children at a Family Service Centre, Child Protection Specialist Centre, and those affected by cancer.</span></p><span data-dcnode-id="2535" instrument_node="">
</span><p class="p1" data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">She is passionate about food and enjoys cooking. She also loves the outdoors and hiking. However, these are things of the past and her life has changed vastly since having a baby in June 2020. In her free time now she sleeps, does the laundry, and tidies up toys.</span></p><span data-dcnode-id="2532" instrument_node="">

</span><div class="pum-content popmake-content" data-dcnode-id="2498" tabindex="0"><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2512"><strong data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">Social Worker &amp; Head, </span></strong><b data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Rehabilitation &amp; Reintegration Department</span></b></p><span data-dcnode-id="2511" instrument_node="">
</span><p class="p1" data-dcnode-id="2506"><span data-dcnode-id="2510" instrument_node="">Andre leads a dynamic and vibrant team of social workers</span><span class="Apple-converted-space" data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2507" instrument_node="">who journey with young people seeking to rehabilitate and reintegrate back into society. He oversees Growing Resilient Youth in Transition (GRYT)—an aftercare service that helps young individuals transition from institutions into the community. He also heads Overcoming Addiction Ensuring Youth’s Success (OASYS)—a rehabilitation service for young people with substance addiction.</span></p><span data-dcnode-id="2505" instrument_node="">
</span><p class="p1" data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">Andre graduated with a Social Work degree from SUSS. His drive in serving the youth stemmed from his experience working at the Singapore Boys’ Hostel where he gained a deeper understanding about the challenges the residents had to overcome. This fuelled his passion to work with youths beyond the walls of the hostel, inspiring them to realise their full potential.</span></p><span data-dcnode-id="2502" instrument_node="">
</span><p class="p1" data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">On his free time, you’ll find Andre playing badminton and video games. He loves spicy food and enjoys sharing a bowl of mala hotpot with friends.</span></p><span data-dcnode-id="2499" instrument_node="">

</span><div class="pum-content popmake-content" data-dcnode-id="2464" tabindex="0"><span data-dcnode-id="2484" instrument_node="">
</span><p data-dcnode-id="2481"><b data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">Senior Social Worker &amp; Head, Outreach &amp; Intervention Department</span></b></p><span data-dcnode-id="2480" instrument_node="">
</span><p data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">Amos oversees the Outreach &amp; Intervention Team in Trybe. The department covers casework and counselling programmes, job coaching and career guidance programmes.</span></p><span data-dcnode-id="2477" instrument_node="">
</span><p data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">He is a Registered Social Worker after attaining his Master of Social Work at SUSS. He is also trained in Choice Theory Reality Therapy among other modalities like Cognitive Behavioural Therapy and Satir Model. Prior to his 10 years in Trybe, he had been involved in at-risk youth programmes and also does training for facilitation skills in Experiential Learning.</span></p><span data-dcnode-id="2474" instrument_node="">
</span><p data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">After joining Trybe in 2010, Amos was involved in setting up the institution’s processes and structure at Singapore Boys’ Hostel when Trybe took over in 2011. He was also involved in the implementation of Restorative Practices into Trybe’s institutional rehabilitation approach, where it focuses on the restoration of relationships and building a sense of accountability with the young residents. From 2018, Amos started his involvement in developing the casework and counselling programmes in the community and eventually setting up youth mental health counselling.</span></p><span data-dcnode-id="2471" instrument_node="">
</span><p data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">Amos believes in the potential of every young person regardless of the circumstances they are in and every youth facing adversities can be supported to achieve his/her goals in life. This fits with Trybe’s vision that Every Youth A Success Story.</span></p><span data-dcnode-id="2468" instrument_node="">
</span><p data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">Outside his work, Amos enjoys his other full-time role as a father of a young girl. Through his time developing sports interests for residents in the Hostel, Amos had also rekindled his passion for football and he supports Liverpool. YNWA!</span></p><span data-dcnode-id="2465" instrument_node="">

</span><p data-dcnode-id="2447"><strong data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">Head, Finance Department– Corporate Services Division</span></strong></p><span data-dcnode-id="2446" instrument_node="">
</span><p data-dcnode-id="2432"><span data-dcnode-id="2445" instrument_node="">Maya leads the Finance team in overseeing the preparation of financial and management reports, ensuring that payroll is timely executed, and that audit and budget exercises are followed through, among many other tasks. On top of these responsibilities, Maya also ensures Trybe’s compliance with internal policies, controls, and procedures.</span><br data-dcnode-id="2444"><span data-dcnode-id="2443" instrument_node="">
&nbsp;</span><br data-dcnode-id="2442"><span data-dcnode-id="2441" instrument_node="">
Maya graduated with a Bachelor’s Degree in Accountancy and a Bachelor’s Degree in Management Accounting. Before she joined Trybe, Maya was providing management consultancy services to a multinational company based in the Philippines and was an accountant for a training and management consultancy firm in Singapore.</span><br data-dcnode-id="2440"><span data-dcnode-id="2439" instrument_node="">
&nbsp;</span><br data-dcnode-id="2438"><span data-dcnode-id="2437" instrument_node="">
Maya chose to work in Trybe because of her desire to serve the children and youth. She believes that the best investment is the one spent on equipping the next generation of young people.</span><br data-dcnode-id="2436"><span data-dcnode-id="2435" instrument_node="">
&nbsp;</span><br data-dcnode-id="2434"><span data-dcnode-id="2433" instrument_node="">
During her leisure time, Maya enjoys the outdoors and good music.</span></p><span data-dcnode-id="2431" instrument_node="">

</span><div class="pum-content popmake-content" data-dcnode-id="2400" tabindex="0"><span data-dcnode-id="2416" instrument_node="">
</span><p data-dcnode-id="2413"><strong data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">Head, Human Resources Department– Corporate Services Division</span></strong></p><span data-dcnode-id="2412" instrument_node="">
</span><p data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">Elyna’s main responsibility is to oversee areas ranging from recruitment of staff, staff welfare and benefits, to Human Resource (HR) development which includes training, performance appraisal and career planning. She graduated with an Honours Degree in Materials Engineering and a Graduate Diploma in Training and Development.</span></p><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">Since she started her career, Elyna has been championing the development of people. Her achievements include overseeing performance management exercises for non-managerial staff, administering training programmes, supervising external and internal scholarships, leading orientation programmes for new employees, and spearheading various HR events. Evidently, seeing people excel in their careers brings much joy to Elyna.</span></p><span data-dcnode-id="2406" instrument_node="">
</span><p data-dcnode-id="2402"><span data-dcnode-id="2405" instrument_node="">Prior to joining Trybe, Elyna was in China for five years with her husband who was posted there for work. She found the experience to be humbling as it presented a different perspective of life when living abroad and through these experiences, she&nbsp;</span><b data-dcnode-id="2404"></b><span data-dcnode-id="2403" instrument_node="">learnt to be grateful for the little things. Elyna is convinced that giving back to society is not a want but a necessity. She aspires to build a strong HR and people-centric culture in Trybe so that more talent can be attracted to the social service sector.</span></p><span data-dcnode-id="2401" instrument_node="">

</span><div class="pum-content popmake-content" data-dcnode-id="2369" tabindex="0"><span data-dcnode-id="2386" instrument_node="">
</span><p data-dcnode-id="2377"><b data-dcnode-id="2382"><strong data-dcnode-id="2383"><span class="s1" data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">Chief Secretary</span></span></strong></b><br data-dcnode-id="2381"><span data-dcnode-id="2380" instrument_node="">
</span><b data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">Head, Corporate Services Division</span></b></p><span data-dcnode-id="2376" instrument_node="">
</span><p data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">As Head of Corporate Services Division, Cristela delivers critical support and coordination role for the whole Company. On top of overseeing all aspects of the Division’s activities, she ensures every staff in the Company is supported to effectively and productively function. While it can be overwhelming juggling many tasks at once, Cristela’s cheerful disposition and warm personality, make her the best person for the job. With an eye for detail and excellent organisational skill, Cristela ensures the integrity of Company-wide information, strict implementation of structure and protocols, compliance and strong governance, and provision of a safe and conducive environment for all staff and other stakeholders.</span></p><span data-dcnode-id="2373" instrument_node="">
</span><p data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">Cristela is also known as Cris to her colleagues. She graduated with a Bachelor of Science in Commerce and majored in Accounting. Her extensive experience in office administration and as a personal assistant to high-net-worth individuals before joining Trybe has equipped her with valuable skillsets to deal with the day-to-day running of the offices and to keep them shipshape.</span></p><span data-dcnode-id="2370" instrument_node="">

</span><div class="pum-content popmake-content" data-dcnode-id="2341" tabindex="0"><span data-dcnode-id="2355" instrument_node="">
</span><p data-dcnode-id="2352"><b data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">Director, Services &amp; Programmes</span></b></p><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">Bee Lian oversees all of the services and programmes in Trybe. She is concurrently the Head of Singapore Boys’ Hostel.</span></p><span data-dcnode-id="2348" instrument_node="">
</span><p data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">Prior to joining Trybe, Bee Lian spent her time mentoring and coaching youths in netball and tchoukball. Her internship stint with Trybe during her undergraduate days left a significant impact on her life, and she eventually joined Trybe full-time in 2010 after graduating with a Bachelor in Social Science (Psychology) from Singapore Management University. While she had honed her skills in youth development training, programme design and business development areas during the first few years, she found her true passion in serving youths who are viewed as more at-risk. She assumed leadership of the Programmes Division in late 2014, and was involved in the progressive shift in our service direction to focus on youths facing adversities. She was involved in setting up the GRYT service in 2015 and leading the Youth-At-Risk Engagement (YARE) programme in 2016, before moving over to learn and lead the rehabilitation work in Singapore Boys’ Hostel in 2018.</span></p><span data-dcnode-id="2345" instrument_node="">
</span><p data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Outside of work, Bee Lian cherishes time spent in the company of family and close friends. She enjoys playing tennis, cycling, swimming and picking up new hobbies.</span></p><span data-dcnode-id="2342" instrument_node="">

</span><p data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Vimel joined Trybe in 2014 and served in several different roles before his appointment as the Chief Executive Officer. As the CEO, he directs the Company to achieve its mission and bring about transformation to the clients . Vimel believes that networking is important as everyone can play a part to bring change to society. He is open to have a coffee chat with like-minded individuals and is willing to contribute where possible. Vimel is also in the first batch of NCSS 40 Under 40 Leadership Programme.</span></p><span data-dcnode-id="2285" instrument_node="">
</span><p data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">Vimel graduated with a Master of Business Administration and a Master of Social Work. He is a certified Project Management Professional, Certified Change Management Practitioner and Certified Data Protection Practitioner. Vimel also has a Post-Graduate Diploma in Communications and Innovation and an Advanced Award in Organisation Design and Development.</span></p><span data-dcnode-id="2282" instrument_node="">

</span><p class="p1" data-dcnode-id="2183"><strong data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">Platform: Giving.sg and Global Giving</span></strong></p><span data-dcnode-id="2182" instrument_node="">
</span><p class="p1" data-dcnode-id="2179"><strong data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Summary:</span></strong></p><span data-dcnode-id="2178" instrument_node="">
</span><p data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Gift A Hope: Small Steps, Big Impact (by Trybe Limited) is a call for us as a community to empower youths facing adversities. By guiding them and celebrating their small accomplishments, we are encouraging young people to push through their struggles and aim for a better future.</span></p><span data-dcnode-id="2175" instrument_node="">
</span><p data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">Your donation to this project will help us continue our services that improve personal, social, educational, and employment outcomes for underserved youths in Singapore.</span></p><span data-dcnode-id="2172" instrument_node="">
</span><p data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">Most of the youths that we serve come from low-income families and have little to no support in addressing their issues. As a result, they get into trouble and develop at-risk behaviours.</span></p><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">To prevent this, we help young people develop resilience and realise their full potential by setting and working towards realistic and practical goals; ONE STEP AT A TIME.</span></p><span data-dcnode-id="2166" instrument_node="">
</span><p data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">We provide educational, career, and psycho-emotional support, keeping them off the streets. Our work also extends to their families, ensuring that they are also supported and better equipped to help their children excel.</span></p><span data-dcnode-id="2163" instrument_node="">
</span><p data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">By believing in them and supporting them every step of the way, we are giving them hope… that no matter what their circumstances are, they can be a success story. Inspiring them to take the small steps that can make a big impact in their lives.</span></p><span data-dcnode-id="2160" instrument_node="">
</span></div><span data-dcnode-id="2158" instrument_node="">

</span><p class="p1" data-dcnode-id="2138"><strong data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Funds raised: $582.12</span></strong></p><span data-dcnode-id="2137" instrument_node="">
</span><p class="p1" data-dcnode-id="2134"><strong data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Platform: Giving.sg and Global Giving</span></strong></p><span data-dcnode-id="2133" instrument_node="">
</span><p class="p1" data-dcnode-id="2130"><strong data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Summary:</span></strong></p><span data-dcnode-id="2129" instrument_node="">
</span><p data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">At-risk behaviours among youths are caused by external factors and internal conflicts. While external factors such as financial concerns, family issues, education and employment problems are relatively easier to detect, the youths’ internal conflicts must also be addressed. And to be able to tackle these less visible issues, we must encourage them to share their stories and let them know that it is OK2Talk.</span></p><span data-dcnode-id="2126" instrument_node="">
</span><p data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">OK2Talk is an initiative that primarily champions the overall wellness of the underserved youth. By donating to this campaign, you are supporting Trybe’s services and programmes that look after our clients’ emotional and mental well-being. Furthermore, your contribution will be doubled with the Bicentennial Community Fund.</span></p><span data-dcnode-id="2123" instrument_node="">
</span><p data-dcnode-id="2119"><span data-dcnode-id="2122" instrument_node="">Success Story</span><br data-dcnode-id="2121"><span data-dcnode-id="2120" instrument_node="">
Tim (not his real name), lived in a challenging family environment. Tim’s divorced parents (who still stayed together) argued frequently, and he found himself turning to substances as a way to escape his circumstances.</span></p><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Over several counselling sessions, Trybe’s Counsellor helped Tim process his emotions, eventually asking if he was open to clinical help. Tim agreed and was referred to a psychologist who diagnosed Tim with General Anxiety Disorder, allowing him to receive the proper treatment he needed.</span></p><span data-dcnode-id="2115" instrument_node="">
</span><p data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">If we are able to guide and convince the youths that it is okay to talk, half the battle would be won.</span></p><span data-dcnode-id="2112" instrument_node="">
</span><p data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">Why mental wellness? Read more: https://www.trybe.org/ok2talk/</span></p><span data-dcnode-id="2109" instrument_node="">

</span><div class="pum-content popmake-content" data-dcnode-id="2058" tabindex="0"><span data-dcnode-id="2094" instrument_node="">
</span><p class="p1" data-dcnode-id="2091"><strong data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">Campaign Details</span></strong></p><span data-dcnode-id="2090" instrument_node="">
</span><p class="p1" data-dcnode-id="2087"><strong data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">Funds raised: $14,447.30</span></strong></p><span data-dcnode-id="2086" instrument_node="">
</span><p class="p1" data-dcnode-id="2083"><strong data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Platform: Giving.sg, Global Giving and Benevity</span></strong></p><span data-dcnode-id="2082" instrument_node="">
</span><p class="p1" data-dcnode-id="2079"><strong data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Summary:</span></strong></p><span data-dcnode-id="2078" instrument_node="">
</span><p data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">We are deeply touched by the generosity of those who donated, as well those who shared about this campaign. Your response is empowering; you inspire us to do more and push further. We assure you that we’ll always be committed to serve the youth better especially those who are financially and mentally burdened by COVID-19.</span></p><span data-dcnode-id="2075" instrument_node="">
</span><p data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">The fight against the coronavirus is far from over. As we see the rapidly increasing number of cases and overwhelming impact of the outbreak here and overseas, we continue to seek your help in reaching out to affected youths and their families. We have extended this campaign to accommodate those who would still want to contribute.</span></p><span data-dcnode-id="2072" instrument_node="">
</span><p data-dcnode-id="2066"><span data-dcnode-id="2071" instrument_node="">THANK YOU, to all of you.</span><br data-dcnode-id="2070"><span data-dcnode-id="2069" instrument_node="">
—</span><br data-dcnode-id="2068"><span data-dcnode-id="2067" instrument_node="">
For most of Trybe’s youth-clients, the virus is an additional worry and expense on top of their basic needs. Coming from low-income families, most of them have already been struggling to make ends meet and to cope with their inner battles even prior to the outbreak.</span></p><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">Everyday Hero is a call for us as a community to step up and find our own little ways to help the vulnerable youth during this difficult time. The virus may have caused some setbacks to our daily interaction with others, but it should not limit our ability to reach out to those we serve.</span></p><span data-dcnode-id="2062" instrument_node="">
</span><p data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">Your donation will help us provide care kits with essential needs, financial assistance for youths and their loved ones, and support our services for them. It will also help us continue our psycho-emotional support for them during this crisis.</span></p><span data-dcnode-id="2059" instrument_node="">

</span><p data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">What is the first thing that comes to mind when we say ‘hero’? A hero is not just that character in movies who saves the damsel in distress. To us, a hero is in among the ordinary who chose to give that bit of time and money to the underserved. It could be ordinary people who choose to use their passion to reach out to those in need. Fight alongside us as we champion “every youth a success story”. Do let us know if you would like your gift to go towards a certain cause.</span></p><span data-dcnode-id="1989" instrument_node="">

</span><p class="p1" data-dcnode-id="1967"><strong data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Funds raised: $5,350</span></strong></p><span data-dcnode-id="1966" instrument_node="">
</span><p class="p1" data-dcnode-id="1963"><strong data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Platform: Giving.sg</span></strong></p><span data-dcnode-id="1962" instrument_node="">
</span><p class="p1" data-dcnode-id="1959"><strong data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">Summary:</span></strong></p><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">For a lot of us, work and busyness in our lives often takes time away from our family. Meal times together has shown to strengthen family togetherness and help grow good family values in children and youths.</span></p><span data-dcnode-id="1955" instrument_node="">
</span><p data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">But for many of Trybe’s disadvantaged and at-risk youth clients, who may come from complex family backgrounds, having a meal together with their family may be a first step in restoring relationships between them and their families. Support building of stronger family bonds by gifting our youths with a special family time together today. This Christmas Giving season, be an advocate for restoration through giving.</span></p><span data-dcnode-id="1952" instrument_node="">
</span><p data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">All proceeds will go towards family-client related programmes in Trybe that actively carve family time for our youth clients and their families to spend time together. These family events involve meals and activities together.</span></p><span data-dcnode-id="1949" instrument_node="">
</span></div><span data-dcnode-id="1947" instrument_node="">

</span><p class="p1" data-dcnode-id="1927"><strong data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">Funds raised: $210</span></strong></p><span data-dcnode-id="1926" instrument_node="">
</span><p class="p1" data-dcnode-id="1923"><strong data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">Platform: Giving.sg</span></strong></p><span data-dcnode-id="1922" instrument_node="">
</span><p class="p1" data-dcnode-id="1919"><strong data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">Summary:</span></strong></p><span data-dcnode-id="1918" instrument_node="">
</span><p data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">In support of the Giving Week movement and the giving season, Project Jumpstart is a fundraising initiative by Trybe which aims to raise awareness for disadvantaged youth and fund our strategic programmes as well as our youth outreach services. With YOUR contribution, we can continue to steer away the youth from crime, improve their family relationships, and keep them meaningfully engaged in the community.</span></p><span data-dcnode-id="1915" instrument_node="">
</span><p data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Behavioural risks among the disadvantaged youth are commonly caused by an underlying problem such as mental health issues, domestic abuse, and lack of interest in school. More often than not, their negative behaviour is a cry for help and a call for guidance. Through our ongoing intervention, rehabilitation, and reintegration support, Trybe is committed to giving at-risk youths a chance to start over, turn a new leaf, and jump start their journey towards a more meaningful life.</span></p><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">We welcome your generous donation and support as they are crucial to ensure that we can continue delivering our programmes and services not only to our youths but also their families. We hope that you can join us make “Every Youth A Success Story” a reality in Singapore.</span></p><span data-dcnode-id="1909" instrument_node="">
</span><p data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">All proceeds will automatically be matched dollar-for-dollar by the government via the Bicentennial Community Fund. Donations of $100 and above are 2.5 times tax deductible.</span></p><span data-dcnode-id="1906" instrument_node="">
</span></div><span data-dcnode-id="1904" instrument_node="">

</span><p class="p1" data-dcnode-id="1880"><strong data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">Platform: Giving.sg and Global Giving</span></strong></p><span data-dcnode-id="1879" instrument_node="">
</span><p class="p1" data-dcnode-id="1876"><strong data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Summary:</span></strong></p><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">For a lot of us, work and busyness in our lives often takes time away from our family. Taking it slow and having family meals together strengthen our ties, keep us connected, and help cultivate values.</span></p><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">But for many of Trybe’s disadvantaged and at-risk youth clients, having a meal together with their family not only means physical nourishment, but psychological and emotional as well. For these youth, who may come from complex backgrounds, shared mealtimes may be a first step in restoring relationships between them and their families.</span></p><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">This Chinese New Year season, be an advocate for restoration through giving. Support building stronger family bonds by gifting at-risk youth with a special family time together today.</span></p><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">All proceeds will go towards family-client related programmes and activities in Trybe that actively carve quality time for the youth and their loved ones.</span></p><span data-dcnode-id="1863" instrument_node="">

</span><p data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">This season of giving, we seek your generosity in bringing our youths one step closer to their success stories. Most of our youths come from lower-income and complex family background, putting them at a disadvantage. But that shouldn’t stop them from getting a better chance in life.</span></p><span data-dcnode-id="1827" instrument_node="">
</span><p data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">Your gift to this campaign will help us continue our services and programmes that provide educational, career, and psycho-emotional support for youths.</span></p><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">YOUR IMPACT</span></p><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">Adli came from a low-income family and had to depend on himself to make ends meet. At a very young age, he started committing crimes and was exposed to substance abuse. Eventually, he became addicted and was soon caught.</span></p><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Through extensive treatment and support, our Trybe staff worked with him to overcome addiction and helped him to reintegrate back into society. Today, we are happy to share that Adli’s life has changed completely. Apart from having goals to further his studies, he now advices his friends who are facing substance addiction on ways to overcome withdrawal symptoms.</span></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Help us give youths like Adli, the gift of a brighter future.</span></p><span data-dcnode-id="1812" instrument_node="">

</span><p class="p1" data-dcnode-id="1789"><strong data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Funds raised: </span></strong><span data-dcnode-id="1790" instrument_node="">$60</span></p><span data-dcnode-id="1788" instrument_node="">
</span><p class="p1" data-dcnode-id="1784"><strong data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Platform: </span></strong><span data-dcnode-id="1785" instrument_node="">Giving.sg</span></p><span data-dcnode-id="1783" instrument_node="">
</span><p class="p1" data-dcnode-id="1780"><strong data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">Summary:</span></strong></p><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1773"><span data-dcnode-id="1778" instrument_node="">This Lunar New Year, help our youths reconnect with their families by donating to Trybe. Your gift will support our services that carve out quality time and intentional activities for our clients and their loved ones.</span><br data-dcnode-id="1777"><span data-dcnode-id="1776" instrument_node="">
—</span><br data-dcnode-id="1775"><span data-dcnode-id="1774" instrument_node="">
Rebuilding relationships</span></p><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Sentenced to probation at the age of 16, Gene* decided to turn over a new leaf as soon as he realised how his past mistakes deeply affected his mother. She didn’t say much but he knew he caused her too much pain. Keen to make things right for his family, Gene sought help from Trybe to understand and control his aggressive behaviour.</span></p><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Making better choices for the family</span></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Kurt* found the motivation to change because of his family. It was during his rehabilitation programme with Trybe when he realised his father’s difficulties in supporting their family and his grandmother–who was recently diagnosed with cancer. With the encouragement and support from the Trybe staff, Kurt started to make better decisions to fulfill his dream of becoming a dependable man in the future.</span></p><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Having a strong family support empowers youths like Gene and Kurt to pursue their success stories. Help more disadvantaged youths transform their lives and rebuild their relationships with their families this new year.</span></p><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">*Names have been changed for client’s protection</span></p><span data-dcnode-id="1757" instrument_node="">

</span><p class="p1" data-dcnode-id="1734"><strong data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Funds raised: </span></strong><span data-dcnode-id="1735" instrument_node="">$1070</span></p><span data-dcnode-id="1733" instrument_node="">
</span><p class="p1" data-dcnode-id="1729"><strong data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Platform: </span></strong><span data-dcnode-id="1730" instrument_node="">Giving.sg</span></p><span data-dcnode-id="1728" instrument_node="">
</span><p class="p1" data-dcnode-id="1725"><strong data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Summary:</span></strong></p><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Many of us enter the enhanced measures of Phase 2 with heightened uncertainties. For the young population, it is even greater.</span></p><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Prior to the pandemic, countless youths have been facing different difficulties in life that may not be obvious to the eyes. From financial instability, to trauma and abandonment issues, many of the youths we serve developed behaviour that puts them and others at risk.</span></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">In Trybe, we journey with every youth identifying their needs–we care, we communicate, and we connect with them. With such empowerment, our youths can learn to be responsible for themselves, their families, and the community at large. Our services, comprehensive and intensive, include intervention, rehabilitation and reintegration.</span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">As we countdown the days leading to our National Day, we invite our community to come together as one, giving our best and care for the future generation.</span></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">With your generous giving, the youths will receive the most urgent support and assistance they may need. We believe that together with your contribution, we will all emerge from this pandemic even stronger. #NDP2021</span></p><span data-dcnode-id="1709" instrument_node="">
</span></div><span data-dcnode-id="1707" instrument_node="">

</span><p data-dcnode-id="1687"><strong data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Funds raised: $8,140</span></strong></p><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1682"><strong data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Platform:</span></strong><span data-dcnode-id="1683" instrument_node=""> Giving.sg</span></p><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1678"><strong data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Summary:</span></strong></p><span data-dcnode-id="1677" instrument_node="">
</span><p data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Paul* was discharged from the hostel two months earlier because of his good behaviour. Now, he is taking up some courses in art and design. “One day, I hope to provide creative solutions to many brands that companies will be proud of,” he said.</span></p><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Before Paul was sentenced to the hostel, he was living in anxiety, moving from house to house often. He never had a day’s rest and there wasn’t a place he would call home. His divorced mother was working hard, but was rarely around. At 14, he started feeding his curiosity for drugs and to earn quick cash, he started to sell the same substances he was abusing. Eventually the law caught up and he was sentenced to probation at the Singapore Boys’ Hostel, an institution managed by Trybe.</span></p><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Stepping into the hostel marked his first change. He knew if he didn’t take a good chance, he could end up in jail. While he knew there would always be external influences, Paul had to fight them all to save himself. He knows life has its ups and downs. What matters is, to do his best and keep learning.</span></p><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">Join us as we celebrate youths like Paul this #YouthRising month. By donating $10 or more, masks will be given to the youths and their families, as a symbol of encouragement. In addition, your donation will contribute to Trybe’s services that provide utmost support for youths facing adversities. Each contribution will show them a ray of hope that they are remembered, cared for and they are part of a compassionate community.</span></p><span data-dcnode-id="1665" instrument_node="">
</span><p data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">*not his real name</span></p><span data-dcnode-id="1662" instrument_node="">
</span></div><span data-dcnode-id="1660" instrument_node="">

</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Ai Weig leads the Practice and Service Development Department of the organization. She focuses on establishing practice frameworks, professional training and clinical supervision. She believes that people development not only determines an organization’s success, but also impacts a youth’s success story. She advocates for the personal and professional growth of very single practitioner in Trybe.</span></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Graduated in Social Work, Ai Weig went on to obtain her&nbsp;Masters&nbsp;degree in Counselling and in Art Therapy with the desire to integrate expressive methods in working with people. Prior to Trybe, she held other social work and art therapy positions in Family Service Centre, Youth Centre, Children’s home, Mental Health facility and Elderly nursing home. She previously served as Course Manager and Social Work lecturer in a Polytechnic. Compelled by the need for more senior workers in the sector, Ai Weig returned to direct practice and joined Trybe.</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">A natural artist, she enjoys crafting with leather, paper and wood.&nbsp;She is also charmed by quaint places.</span></p><span data-dcnode-id="1068" instrument_node="">

				MarComs Intern (Marketing / Media / Communications)			</span></div><span data-dcnode-id="425" instrument_node="">

</span><p data-dcnode-id="421"><strong data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">MarComs Interns (Marketing / Media / Communications)</span></strong></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Individuals who are passionate about marketing, content creation and engaging the public are welcome to intern with us. MarComs interns will have the opportunity to help Trybe increase its brand awareness and reach, and share about the work that Trybe does through its social media platforms and marketing materials. Interns who are creative, skilled in design and video editing will be able to contribute to Trybe’s publicity materials and videos. Through the internship, the interns will learn more about the youths Trybe serves and be their voice to the public.</span></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">MarComs Interns are expected to possess basic graphic design, video editing or mass communication knowledge or skills. They are expected to be flexible, team player and ready to operate with deadlines.</span></p><span data-dcnode-id="414" instrument_node="">
</span></div><span data-dcnode-id="412" instrument_node="">

</span><div class="pum-content popmake-content" data-dcnode-id="392" tabindex="0"><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Individuals who are keen to have a hands on experience working with youths facing adversities are strongly recommended to come onboard as our Social Service Interns. They will have an opportunity to engage the clients directly, gain a deeper understanding of their struggles, and be equipped to contribute to the social sectors. Interns will be assigned a Social Worker who supports them in their learning and development, and journey with them through their internship period.</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Social Service Interns are expected to possess basic knowledge in either social work, counselling or youth engagement. They are also expected to have good character and willing to learn and take on new challenges.</span></p><span data-dcnode-id="393" instrument_node="">

</span><p data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Individuals who are interested to learn the corporate roles required in a social service agencies are highly encouraged to consider the Corporate Function internship. Through the programme, interns will be exposed to activities that consolidate critical company-wide support services, provided based on specialized knowledge, best practices, and technology to serve the staff team and at times, external stakeholders.</span></p><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Interns supporting this function should have good knowledge and skills in general administration, finance and IT functions. Interns will play a supportive role to the different staff performing the specialized roles and will be at time, required to support other functions in the Company.</span></p><span data-dcnode-id="372" instrument_node="">

</span><p data-dcnode-id="128"><strong data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">Head, Programmes &amp; Rehabilitation Department – Singapore Boys’ Hostel</span></strong></p><span data-dcnode-id="127" instrument_node="">
</span><p data-dcnode-id="125"><span data-dcnode-id="126" instrument_node="">Since joining Trybe in 2014, Jeremy has been involved in coaching and mentoring the hostel youth. He leads a team of youth workers. Together, they look into the development of programmes that engage the youth constructively and aid in their effective reintegration into their families and the community.</span></p><span data-dcnode-id="124" instrument_node="">
</span><p data-dcnode-id="122"><span data-dcnode-id="123" instrument_node="">Jeremy has always been interested in working with youth and he has seized the opportunity to do so in Trybe. He values Trybe’s culture of honesty and care, and appreciates the development opportunities the organisation has given its staff. Jeremy credits his growth to his supervisors’ mentoring and the exposure and training afforded to him from them since joining Trybe.</span></p><span data-dcnode-id="121" instrument_node="">
</span><p data-dcnode-id="119"><span data-dcnode-id="120" instrument_node="">In his downtime, Jeremy enjoys a cup of Milo.</span></p><span data-dcnode-id="118" instrument_node="">
