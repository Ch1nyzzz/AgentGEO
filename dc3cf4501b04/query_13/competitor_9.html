024w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social_media_activism_header.jpg 768w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social_media_activism_header.jpg 100w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social_media_activism_header.jpg 600w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social_media_activism_header.jpg 200w" height="512" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlineoptimism.com/wp-content/uploads/2020/12/social_media_activism_header.jpg&amp;raw" srcset="https://www.onlineoptimism.com/wp-content/uploads/2020/12/social_media_activism_header.jpg 300w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social_media_activism_header.jpg 1024w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social_media_activism_header.jpg 768w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social_media_activism_header.jpg 100w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social_media_activism_header.jpg 600w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social_media_activism_header.jpg 200w" width="1024"><noscript data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">&lt;img class="wp-image-10009 size-large" src="https://www.onlineoptimism.com/wp-content/uploads/2020/12/social_media_activism_header.jpg" alt="A collage of three photos, the first in black and white showing a person holding a sign reading "BLM" at a protest. The second showing a women holding a sign reading "Plot Plan Mobilize Organize" at a protest. The third, in black and white, showing a women holding a sign reading "Black Lives Matter" at a protest." width="1024" height="512" srcset="https://www.onlineoptimism.com/wp-content/uploads/2020/12/social_media_activism_header.jpg 300w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social_media_activism_header.jpg 1024w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social_media_activism_header.jpg 768w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social_media_activism_header.jpg 100w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social_media_activism_header.jpg 600w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social_media_activism_header.jpg 200w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="889" id="caption-attachment-10009"><span data-dcnode-id="890" instrument_node="">All photographs courtesy of Zora Khiry.</span></figcaption></figure><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" style="font-weight: 400;"><span data-dcnode-id="886" instrument_node="">In 2020, a series of important social movements collided with a global pandemic that caused major shifts to the ways that people around the world live and share their lives via the internet—and many people began to reconsider the impacts of social media activism.</span></span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="881" style="font-weight: 400;"><span data-dcnode-id="882" instrument_node="">Following the onset of state-mandated social distancing measures, responses to the murders of Ahmaud Arbery, Breonna Taylor, George Floyd, Tony&nbsp;</span></span><span data-dcnode-id="880" instrument_node="">McDade, and countless others by police officers and white supremacists coalesced into the widespread revival of the Black Lives Matter movement. Millions across the world took to the streets in protest, while some of those people and others voiced their frustrations, spread resources, and raised money for racial justice organizations and victims’ families online.</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="876" style="font-weight: 400;"><span data-dcnode-id="877" instrument_node="">Meanwhile, terms like “antiracist,” “performative activism,” and “social media activism” were widely spread and popularized both on- and offline. Social media activism is a catch-all term for activism that utilizes online platforms to work toward the goals of social or political movements.</span></span></p><span data-dcnode-id="874" instrument_node="">
</span><h2 data-dcnode-id="871"><span data-dcnode-id="872" style="font-weight: 400;"><span data-dcnode-id="873" instrument_node="">A Brief History of Social Media Activism</span></span></h2><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" style="font-weight: 400;"><span data-dcnode-id="869" instrument_node="">For the past decade, social media has been used to bring attention to movements all over the world.</span></span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="864" style="font-weight: 400;"><span data-dcnode-id="865" instrument_node="">In 2011, activists across Tunisia, Egypt, Libya, and other Middle Eastern countries who were involved in the Arab Spring uprisings used social media—particularly, Twitter—to spread local and global awareness of their protests. Through these efforts, they created a massive grassroots movement that led to the disintegration of undemocratic regimes in Tunisia and Egypt. Video of protests and speeches received millions of views and studies have shown that the week before the resignation of Egyptian president Hosni Mubarak, </span></span><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washington.edu/news/2011/09/12/new-study-quantifies-use-of-social-media-in-arab-spring/"><span data-dcnode-id="862" style="font-weight: 400;"><span data-dcnode-id="863" instrument_node="">tweets referencing the movement grew from 2,300 to 230,000 a day.</span></span></a></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="857" style="font-weight: 400;"><span data-dcnode-id="858" instrument_node="">Around the same time in the United States, Occupy Wall Street protests began in New York City. Protesters began forming encampments near Wall Street in Zuccotti Park to protest corporate greed and economic inequality. Videos, pictures, and tweets spread like wildfire, with similar encampments popping up across the nation. While the physical protests only lasted for two months, </span></span><a data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2020/01/23/799004281/the-surprising-legacy-of-occupy-wall-street-in-2020"><span data-dcnode-id="855" style="font-weight: 400;"><span data-dcnode-id="856" instrument_node="">it has had a longstanding impact on politics in the United States</span></span></a><span data-dcnode-id="852" style="font-weight: 400;"><span data-dcnode-id="853" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="848" style="font-weight: 400;"><span data-dcnode-id="849" instrument_node="">In 2013, Patrisse Cullors, Opal Tometi, and Alicia Garza </span></span><a data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/2016/08/15/the-hashtag-blacklivesmatter-emerges-social-activism-on-twitter/"><span data-dcnode-id="846" style="font-weight: 400;"><span data-dcnode-id="847" instrument_node="">helped launch an international network of organizers and activists using the hashtag #BlackLivesMatter</span></span></a><span data-dcnode-id="843" style="font-weight: 400;"><span data-dcnode-id="844" instrument_node=""> following the acquittal of Trayvon Martin’s murderer. This hashtag helped birth the movement we are witnessing today known as </span></span><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blacklivesmatters.carrd.co/"><span data-dcnode-id="841" style="font-weight: 400;"><span data-dcnode-id="842" instrument_node="">Black Lives Matter</span></span></a><span data-dcnode-id="838" style="font-weight: 400;"><span data-dcnode-id="839" instrument_node="">. Throughout the past decade, with more killings of Black people—such as Mike Brown, Sandra Bland, Eric Garner, and many others—at the hands of police, the movement has evolved beyond any single organization or hashtag. However, it has relied upon social media to spread awareness and education about racial inequality and injustice happening today and throughout American history.&nbsp;</span></span></p><span data-dcnode-id="836" instrument_node="">
</span><h2 data-dcnode-id="833"><span data-dcnode-id="834" style="font-weight: 400;"><span data-dcnode-id="835" instrument_node="">What Makes Social Media a Good Platform for Activism? </span></span></h2><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="830" style="font-weight: 400;"><span data-dcnode-id="831" instrument_node="">Many cri</span></span><span data-dcnode-id="829" instrument_node="">tics have discussed whether or not social media activism is an effective form of political and social engagement. However, social media has the power to be a public forum for the exchange of ideas.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="825" style="font-weight: 400;"><span data-dcnode-id="826" instrument_node="">Social media allows those </span></span><a data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/culture/cultural-comment/the-second-act-of-social-media-activism"><span data-dcnode-id="823" style="font-weight: 400;"><span data-dcnode-id="824" instrument_node="">often excluded from spaces of access and privilege, like academia or politics, to engage in public and social debate.</span></span></a><span data-dcnode-id="821" instrument_node=""> </span><span data-dcnode-id="819" style="font-weight: 400;"><span data-dcnode-id="820" instrument_node="">Social media is a great equalizer. Someone without any personal or professional access to politicians, world leaders, and other decision-makers can get their attention within seconds.</span></span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" style="font-weight: 400;"><span data-dcnode-id="816" instrument_node="">One of the greatest gifts of social media is its accessibility. There are many dangers associated with in-person organizing, door-knocking, and protesting in person, especially in a global pandemic. Social media activism is a great way to include those who are disabled, who work long hours, or who are otherwise unable to participate physically.</span></span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" style="font-weight: 400;"><span data-dcnode-id="812" instrument_node="">Social media activism can create an inclusive space for conversation between organizers, activists, policy-makers, and anyone who wants their voice to be heard.</span></span></p><span data-dcnode-id="809" instrument_node="">
</span><h2 data-dcnode-id="806"><span data-dcnode-id="807" style="font-weight: 400;"><span data-dcnode-id="808" instrument_node="">Social Media Activism vs. Performative Activism</span></span></h2><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" style="font-weight: 400;"><span data-dcnode-id="804" instrument_node="">Performative activism is often associated with social media activism. However, there are some key differences:&nbsp;</span></span></p><span data-dcnode-id="801" instrument_node="">
</span><h3 data-dcnode-id="798"><span data-dcnode-id="799" style="font-weight: 400;"><span data-dcnode-id="800" instrument_node="">Social Media Activism&nbsp;</span></span></h3><span data-dcnode-id="797" instrument_node="">
</span><ul data-dcnode-id="779"><span data-dcnode-id="796" instrument_node="">
</span><li data-dcnode-id="793" style="font-weight: 400;"><span data-dcnode-id="794" style="font-weight: 400;"><span data-dcnode-id="795" instrument_node="">Supports the work of activists and organizers who have already been working on the ground.</span></span></li><span data-dcnode-id="792" instrument_node="">
</span><li data-dcnode-id="789" style="font-weight: 400;"><span data-dcnode-id="790" style="font-weight: 400;"><span data-dcnode-id="791" instrument_node="">Is based on the promotion of resources and information relevant to social and political movements.</span></span></li><span data-dcnode-id="788" instrument_node="">
</span><li data-dcnode-id="785" style="font-weight: 400;"><span data-dcnode-id="786" style="font-weight: 400;"><span data-dcnode-id="787" instrument_node="">Uplifts the voices of those within the movement.</span></span></li><span data-dcnode-id="784" instrument_node="">
</span><li data-dcnode-id="781" style="font-weight: 400;"><span data-dcnode-id="782" style="font-weight: 400;"><span data-dcnode-id="783" instrument_node="">Listens to voices of the marginalized.</span></span></li><span data-dcnode-id="780" instrument_node="">
</span></ul><span data-dcnode-id="778" instrument_node="">
</span><h3 data-dcnode-id="775"><span data-dcnode-id="776" style="font-weight: 400;"><span data-dcnode-id="777" instrument_node="">Performative Activism</span></span></h3><span data-dcnode-id="774" instrument_node="">
</span><ul data-dcnode-id="753"><span data-dcnode-id="773" instrument_node="">
</span><li data-dcnode-id="767" style="font-weight: 400;"><span data-dcnode-id="771" style="font-weight: 400;"><span data-dcnode-id="772" instrument_node="">Is performed in order to </span></span><a data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/illumination/the-difference-between-performative-activism-and-genuine-allyship-c1071133d0e0"><span data-dcnode-id="769" style="font-weight: 400;"><span data-dcnode-id="770" instrument_node="">obtain social capital rather than because of one’s dedication to a cause.</span></span></a></li><span data-dcnode-id="766" instrument_node="">
</span><li data-dcnode-id="763" style="font-weight: 400;"><span data-dcnode-id="764" style="font-weight: 400;"><span data-dcnode-id="765" instrument_node="">Centers one’s own voice, even if it runs counters to the movement.</span></span></li><span data-dcnode-id="762" instrument_node="">
</span><li data-dcnode-id="759" style="font-weight: 400;"><span data-dcnode-id="760" style="font-weight: 400;"><span data-dcnode-id="761" instrument_node="">Silences radical voices in favor of one that is the most comfortable or palatable.</span></span></li><span data-dcnode-id="758" instrument_node="">
</span><li data-dcnode-id="755" style="font-weight: 400;"><span data-dcnode-id="756" style="font-weight: 400;"><span data-dcnode-id="757" instrument_node="">Prevents activists from doing their work effectively.</span></span></li><span data-dcnode-id="754" instrument_node="">
</span></ul><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" style="font-weight: 400;"><span data-dcnode-id="751" instrument_node="">An example of the difference between social media activism and performative activism is the impact of “#BlackoutTuesday” in June 2020.</span></span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="742"><a data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2020/06/02/867371758/music-companies-promise-a-tuesday-blackout-for-black-lives"><span data-dcnode-id="746" style="font-weight: 400;"><span data-dcnode-id="747" instrument_node="">Blackout Tuesday was originally meant to draw attention to the contributions of the Black dollar to the worldwide economy, particularly within the music industry.</span></span></a><span data-dcnode-id="743" style="font-weight: 400;"><span data-dcnode-id="744" instrument_node=""> However, on various social media platforms, the original call for action was answered with inaction when millions of people posted a single, black square with the caption “#BlackoutTuesday” and “#BlackLivesMatter.” This prevented activists on social media from sharing relevant information about protests, bail-out funds, and education with these hashtags since feeds were clogged up with black squares.</span></span></p><span data-dcnode-id="741" instrument_node="">
</span><h2 data-dcnode-id="738"><span data-dcnode-id="739" style="font-weight: 400;"><span data-dcnode-id="740" instrument_node="">3 Tips for Effective Social Media Activism</span></span></h2><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="735" style="font-weight: 400;"><span data-dcnode-id="736" instrument_node="">There is a blurry line between social media activism and performative activism, but there are real steps you can take to use your personal and professional social media platforms as a force for good. The goal should be making sure that your posts have a positive impact offline. Here are some things to make sure of when participating in digital activism:</span></span></p><span data-dcnode-id="733" instrument_node="">
</span><h3 data-dcnode-id="730"><span data-dcnode-id="731" style="font-weight: 400;"><span data-dcnode-id="732" instrument_node="">1. Check The Source</span></span></h3><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" style="font-weight: 400;"><span data-dcnode-id="728" instrument_node="">Social media allows virtually anyone to share any information they want. That can be a good thing and bad thing. What often happens on many social media platforms is the spread of misinformation. With regard to social media activism, an inaccurate or misleading post may be shared thousands of times by well-intentioned people. It is very important to read through all the articles and websites you share. Make sure you research an issue you may be unfamiliar with. Avoid sharing information just because everyone else has.&nbsp;</span></span></p><span data-dcnode-id="725" instrument_node="">
</span><h3 data-dcnode-id="722"><span data-dcnode-id="723" style="font-weight: 400;"><span data-dcnode-id="724" instrument_node="">2. Uplift Marginalized Voices</span></span></h3><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" style="font-weight: 400;"><span data-dcnode-id="720" instrument_node="">When sharing resources on social media, be intentional about who you are sharing. It is important to always refer back to the voices of the marginalized. Try to avoid sharing information from celebrities or politicians. Instead, seek out those who are playing active roles in grassroots movements. Uplift the voices of those who are most marginalized instead of those in places of privilege. Make sure you look up the writer of an article you want to share or the creator of a video you have watched. Not all information is good information.</span></span></p><span data-dcnode-id="717" instrument_node="">
</span><h3 data-dcnode-id="714"><span data-dcnode-id="715" style="font-weight: 400;"><span data-dcnode-id="716" instrument_node="">3. The Small Things Matter</span></span></h3><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="711" style="font-weight: 400;"><span data-dcnode-id="712" instrument_node="">An unfair criticism of social media activism is that the results are insignificant. Some think that digital activism cannot result in any consequential, real-world results. However, social media has helped birth robust social and political movements around the world. This summer, millions of dollars were raised in support of racial justice movements. The National Bail Fund, which connects an independent network of organizers across the country, </span></span><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2020/06/14/us/politics/black-lives-matter-racism-donations.html"><span data-dcnode-id="709" style="font-weight: 400;"><span data-dcnode-id="710" instrument_node="">received an estimated $75 million dollars</span></span></a><span data-dcnode-id="706" style="font-weight: 400;"><span data-dcnode-id="707" instrument_node=""> in support of people protesting for Black lives. This would be absolutely impossible without social media.</span></span></p><span data-dcnode-id="704" instrument_node="">
</span><h2 data-dcnode-id="701"><span data-dcnode-id="702" style="font-weight: 400;"><span data-dcnode-id="703" instrument_node="">Everyone Has a Role to Play</span></span></h2><span data-dcnode-id="700" instrument_node="">
</span><figure aria-describedby="caption-attachment-9994" class="wp-caption aligncenter" data-dcnode-id="694" id="attachment_9994" style="width: 2048px"><img alt="In a protest, a person holds a blue, pink, and white flag that reads &quot;Black Trans Lives Matter BLM&quot;" class="wp-image-9994 size-full lazyloaded" data-dcnode-id="699" data-sizes="(max-width: 2048px) 100vw, 2048px" data-src="https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg" data-srcset="https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 300w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 1024w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 768w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 100w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 600w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 200w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 2048w" height="1365" loading="lazy" sizes="(max-width: 2048px) 100vw, 2048px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg&amp;raw" srcset="https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 300w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 1024w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 768w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 100w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 600w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 200w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 2048w" style="font-weight: 400; letter-spacing: -0.02em;" width="2048"><noscript data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">&lt;img class="wp-image-9994 size-full" style="font-weight: 400; letter-spacing: -0.02em;" src="https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg" alt="In a protest, a person holds a blue, pink, and white flag that reads "Black Trans Lives Matter BLM"" width="2048" height="1365" srcset="https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 300w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 1024w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 768w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 100w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 600w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 200w, https://www.onlineoptimism.com/wp-content/uploads/2020/12/social-media-activism.jpg 2048w" sizes="(max-width: 2048px) 100vw, 2048px" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="695" id="caption-attachment-9994"><span data-dcnode-id="696" instrument_node="">All photographs courtesy of Zora Khiry.</span></figcaption></figure><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" style="font-weight: 400;"><span data-dcnode-id="692" instrument_node="">In the future, the revolution will be not televised, but rather tweeted, Instagrammed, and live-streamed. Social media can be scary, but it is also a powerful tool. It allows us to learn about people all over the world directly from the source. Social media is a vast network of information, so here are a few places where I recommend starting:</span></span></p><span data-dcnode-id="689" instrument_node="">
</span><ul data-dcnode-id="640"><span data-dcnode-id="688" instrument_node="">
</span><li data-dcnode-id="677" style="font-weight: 400;"><span data-dcnode-id="686" style="font-weight: 400;"><span data-dcnode-id="687" instrument_node="">The Movement for Black Lives: </span></span><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/mvmnt4blklives/%3Fhl%3Den"><span data-dcnode-id="684" style="font-weight: 400;"><span data-dcnode-id="685" instrument_node="">Instagram</span></span></a><span data-dcnode-id="681" style="font-weight: 400;"><span data-dcnode-id="682" instrument_node=""> and </span></span><a data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/Mvmnt4BlkLives"><span data-dcnode-id="679" style="font-weight: 400;"><span data-dcnode-id="680" instrument_node="">Twitter</span></span></a></li><span data-dcnode-id="676" instrument_node="">
</span><li data-dcnode-id="670" style="font-weight: 400;"><span data-dcnode-id="674" style="font-weight: 400;"><span data-dcnode-id="675" instrument_node="">National Bail Fund: </span></span><a data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/bailfundnetwork%3Flang%3Den"><span data-dcnode-id="672" style="font-weight: 400;"><span data-dcnode-id="673" instrument_node="">Twitter</span></span></a></li><span data-dcnode-id="669" instrument_node="">
</span><li data-dcnode-id="661" style="font-weight: 400;"><span data-dcnode-id="665" style="font-weight: 400;"><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onlineoptimism.com/blog/supporting-the-city-house-of-tulip/"><span data-dcnode-id="668" instrument_node="">House of Tulip</span></a><span data-dcnode-id="666" instrument_node="">: </span></span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/houseoftulipno/%3Fhl%3Den"><span data-dcnode-id="663" style="font-weight: 400;"><span data-dcnode-id="664" instrument_node="">Twitter</span></span></a></li><span data-dcnode-id="660" instrument_node="">
</span><li data-dcnode-id="654" style="font-weight: 400;"><span data-dcnode-id="658" style="font-weight: 400;"><span data-dcnode-id="659" instrument_node="">Anti-Racism Daily: </span></span><a data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/antiracismdaily/%3Fhl%3Den"><span data-dcnode-id="656" style="font-weight: 400;"><span data-dcnode-id="657" instrument_node="">Instagram</span></span></a></li><span data-dcnode-id="653" instrument_node="">
</span><li data-dcnode-id="642" style="font-weight: 400;"><span data-dcnode-id="651" style="font-weight: 400;"><span data-dcnode-id="652" instrument_node="">Me Too: </span></span><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/metoomvmt/%3Fhl%3Den"><span data-dcnode-id="649" style="font-weight: 400;"><span data-dcnode-id="650" instrument_node="">Instagram</span></span></a><span data-dcnode-id="646" style="font-weight: 400;"><span data-dcnode-id="647" instrument_node=""> and </span></span><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/metoomvmt%3Flang%3Den"><span data-dcnode-id="644" style="font-weight: 400;"><span data-dcnode-id="645" instrument_node="">Twitter</span></span></a></li><span data-dcnode-id="641" instrument_node="">
</span></ul><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" style="font-weight: 400;"><span data-dcnode-id="638" instrument_node="">You should not have to be a lawyer, politician, organizer, or academic to be active in movements for social justice. If you have access to the internet and social media, you can play your part.</span></span></p><span data-dcnode-id="635" instrument_node="">
