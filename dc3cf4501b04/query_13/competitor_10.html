</span><article class="post-126078 post type-post status-publish format-standard has-post-thumbnail hentry category-strengths-virtues" data-dcnode-id="1051" id="post-126078"><span data-dcnode-id="1867" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1053"><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1861"><img alt="intuition" class="alignright wp-image-126738 size-medium lazyloaded" data-dcnode-id="1865" data-src="https://positivepsychology.com/wp-content/uploads/intuition-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/intuition-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/intuition-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/intuition-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/intuition-510x255.jpg 510w, https://positivepsychology.com/wp-content/uploads/intuition.jpg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/wp-content/uploads/intuition-300x150.jpg&amp;raw" srcset="https://positivepsychology.com/wp-content/uploads/intuition-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/intuition-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/intuition-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/intuition-510x255.jpg 510w, https://positivepsychology.com/wp-content/uploads/intuition.jpg 800w" title="what is intuition?" width="300"><noscript data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">&lt;img class="alignright wp-image-126738 size-medium lazyload" title="what is intuition?" src="https://positivepsychology.com/wp-content/uploads/intuition-300x150.jpg" alt="intuition" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/intuition-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/intuition-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/intuition-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/intuition-510x255.jpg 510w, https://positivepsychology.com/wp-content/uploads/intuition.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="1862" instrument_node="">Intuition is that feeling in your gut when you instinctively know that something you are doing is right or wrong.</span></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">Or it’s that moment when you sense kindness, or fear, in another’s face. You don’t know why you feel that way; it’s just a hunch.</span></p><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1852"><span data-dcnode-id="1856" instrument_node="">But what is it? After all, researchers can’t </span><em data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">see</span></em><span data-dcnode-id="1853" instrument_node=""> it in the brain.</span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1850" instrument_node="">While understanding intuition offers a considerable challenge for science, broadly speaking, it involves “</span><em data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">learned responses that are not the outcomes of deliberate processes</span></em><span data-dcnode-id="1847" instrument_node="">” (Hogarth, 2010).</span></p><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">In this article, we look at the lightning-fast, mostly hidden processes involved in intuition, their effect on decision making, and their role in creativity.</span></p><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1841" instrument_node="">Before you continue, we thought you might like to </span><a data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/3-exercises-strengths" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1840" instrument_node="">download our three Strengths Exercises for free</span></a><span data-dcnode-id="1838" instrument_node="">. These detailed, science-based exercises will help you or your clients realize your unique potential and create a life that feels energized and authentic.</span></p><span data-dcnode-id="1836" instrument_node="">
</span><div data-dcnode-id="1788" id="inhoud"><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">This article contains:</span></p><span data-dcnode-id="1832" instrument_node="">
</span><ul data-dcnode-id="1790"><span data-dcnode-id="1831" instrument_node="">
</span><li data-dcnode-id="1828"><a data-dcnode-id="1829" href="#intuition"><span data-dcnode-id="1830" instrument_node="">What Is Intuition? 5 Real-Life Examples</span></a></li><span data-dcnode-id="1827" instrument_node="">
</span><li data-dcnode-id="1824"><a data-dcnode-id="1825" href="#theories"><span data-dcnode-id="1826" instrument_node="">How Does Intuition Work? Psychology Theories</span></a></li><span data-dcnode-id="1823" instrument_node="">
</span><li data-dcnode-id="1820"><a data-dcnode-id="1821" href="#important"><span data-dcnode-id="1822" instrument_node="">Is Intuition Important?</span></a></li><span data-dcnode-id="1819" instrument_node="">
</span><li data-dcnode-id="1816"><a data-dcnode-id="1817" href="#instinct"><span data-dcnode-id="1818" instrument_node="">Instinct, Logic, or Intuition?</span></a></li><span data-dcnode-id="1815" instrument_node="">
</span><li data-dcnode-id="1812"><a data-dcnode-id="1813" href="#role"><span data-dcnode-id="1814" instrument_node="">Its Role in Decision Making</span></a></li><span data-dcnode-id="1811" instrument_node="">
</span><li data-dcnode-id="1808"><a data-dcnode-id="1809" href="#link"><span data-dcnode-id="1810" instrument_node="">The Link Between Intuition and Creativity</span></a></li><span data-dcnode-id="1807" instrument_node="">
</span><li data-dcnode-id="1804"><a data-dcnode-id="1805" href="#books"><span data-dcnode-id="1806" instrument_node="">7 Books on the Topic</span></a></li><span data-dcnode-id="1803" instrument_node="">

</span><li data-dcnode-id="1796"><a data-dcnode-id="1797" href="#home"><span data-dcnode-id="1798" instrument_node="">A Take-Home Message</span></a></li><span data-dcnode-id="1795" instrument_node="">

</span><p data-dcnode-id="1785"><a data-dcnode-id="1786" name="intuition"></a></p><span data-dcnode-id="1784" instrument_node="">
</span><h2 data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">What Is Intuition? 5 Real-Life Examples</span></h2><span data-dcnode-id="1781" instrument_node="">
</span><p data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">Intuition is not logical. It is not the result of a set of considered steps that can be shared or explained. Instead, while based on deep-seated knowledge, the process feels natural, almost instinctual.</span></p><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">And yet, while intuition is quick and usually beneficial, it is not always entirely accurate. The subconscious brain attempts to recognize, process, and use patterns of thinking based on prior experience and a best guess.</span></p><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Paradoxically, intuition feels unknowable. After all, you cannot explain the thinking behind a snap decision that appears out of nowhere.</span></p><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">It just happens.</span></p><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">While intuition occurs in your day-to-day life, it is sometimes most apparent in the decisions of experts. The specialist draws on years of experience, held in unconscious frameworks, to make fast, high-quality decisions (Nalliah, 2016).</span></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1763" instrument_node="">
</span><h3 data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">1. Dentistry</span></h3><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Healthcare researchers found that experienced dentists often rely on intuition to make complex, time-bound decisions. Based on many years of deeply stored knowledge, choices are made quickly and are often superior to those that rely on clear evidence and rational thought (Nalliah, 2016).</span></p><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1754" instrument_node="">
</span><h3 data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">2. Business</span></h3><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Perhaps surprisingly, many of the world’s most influential businesspeople admit to making decisions based on intuition rather than logical, deliberate thinking.</span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">Out of a sample of 36 CEOs, 85% confirmed that intuition – in the form of rules of thumb (ROTs) – was central to their decision-making process (Maidique, 2014).</span></p><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">The following list comes from the former president of Lenovo, William Amelio:</span></p><span data-dcnode-id="1742" instrument_node="">
</span><ul data-dcnode-id="1674"><span data-dcnode-id="1741" instrument_node="">
</span><li data-dcnode-id="1724"><span data-dcnode-id="1740" instrument_node="">Strategic
</span><ul data-dcnode-id="1726"><span data-dcnode-id="1739" instrument_node="">
</span><li data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Focus on a few crucial decisions.</span></li><span data-dcnode-id="1736" instrument_node="">
</span><li data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">A decision is better than no decision, but don’t let it run too far if it’s not working.</span></li><span data-dcnode-id="1733" instrument_node="">
</span><li data-dcnode-id="1728"><em data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Trust your intuition.</span></em><br data-dcnode-id="1730"><br data-dcnode-id="1729"></li><span data-dcnode-id="1727" instrument_node="">
</span></ul><span data-dcnode-id="1725" instrument_node="">
</span></li><span data-dcnode-id="1723" instrument_node="">
</span><li data-dcnode-id="1701"><span data-dcnode-id="1722" instrument_node="">People
</span><ul data-dcnode-id="1703"><span data-dcnode-id="1721" instrument_node="">
</span><li data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Communicate big decisions regularly and frequently.</span></li><span data-dcnode-id="1718" instrument_node="">
</span><li data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Don’t tolerate jerks.</span></li><span data-dcnode-id="1715" instrument_node="">
</span><li data-dcnode-id="1711"><a data-dcnode-id="1713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/psychology-teamwork/"><span data-dcnode-id="1714" instrument_node="">Build a team</span></a><span data-dcnode-id="1712" instrument_node=""> you can trust.</span></li><span data-dcnode-id="1710" instrument_node="">
</span><li data-dcnode-id="1705"><em data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Trust your intuition.</span></em><br data-dcnode-id="1707"><br data-dcnode-id="1706"></li><span data-dcnode-id="1704" instrument_node="">
</span></ul><span data-dcnode-id="1702" instrument_node="">
</span></li><span data-dcnode-id="1700" instrument_node="">
</span><li data-dcnode-id="1676"><span data-dcnode-id="1699" instrument_node="">Self
</span><ul data-dcnode-id="1678"><span data-dcnode-id="1698" instrument_node="">
</span><li data-dcnode-id="1696" style="text-align: left;"><span data-dcnode-id="1697" instrument_node="">Get feedback early and regularly, and act on it.</span></li><span data-dcnode-id="1695" instrument_node="">
</span><li data-dcnode-id="1693" style="text-align: left;"><span data-dcnode-id="1694" instrument_node="">Earn others’ trust and confidence.</span></li><span data-dcnode-id="1692" instrument_node="">
</span><li data-dcnode-id="1690" style="text-align: left;"><span data-dcnode-id="1691" instrument_node="">Gain credibility by showing your vulnerabilities.</span></li><span data-dcnode-id="1689" instrument_node="">
</span><li data-dcnode-id="1684" style="text-align: left;"><span data-dcnode-id="1688" instrument_node="">You have </span><a data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/classification-character-strengths-virtues/"><span data-dcnode-id="1687" instrument_node="">strengths;</span></a><span data-dcnode-id="1685" instrument_node=""> use them.</span></li><span data-dcnode-id="1683" instrument_node="">
</span><li data-dcnode-id="1680" style="text-align: left;"><em data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Trust your intuition.</span></em></li><span data-dcnode-id="1679" instrument_node="">
</span></ul><span data-dcnode-id="1677" instrument_node="">
</span></li><span data-dcnode-id="1675" instrument_node="">
</span></ul><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1670" instrument_node="">
</span><h3 data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">3. The stag hunt game</span></h3><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Intuition forms an essential part of both work and play.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1663" instrument_node="">The </span><a data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stag_hunt" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1662" instrument_node="">stag hunt game</span></a><span data-dcnode-id="1660" instrument_node=""> involves strategy, trust, and intuition. Players choose, in secret, to either cooperate or compete against one another.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">The use of intuition is associated with time pressure, and learned heuristics (another word for ROTs) play an essential role in winning the game (Belloc, Bilancini, Boncinelli, &amp; D’Alessandro, 2019).</span></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1652" instrument_node="">
</span><h3 data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">4. Stockbrokers</span></h3><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Human intuition is massively important – an evolved function fundamental to our ancestors’ survival – but it can be mistaken.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1645" instrument_node="">In an annual competition by </span><em data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">The Wall Street Journal</span></em><span data-dcnode-id="1642" instrument_node="">, teams competed on how their stocks performed. But while one side was a group of highly skilled expert brokers, the other was a group of journalists choosing their shares by the throw of a dart.</span></p><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Intuitively, expertise should win.</span></p><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">And yet, it appears, that wasn’t true in this case. The contest ceased without explanation, most likely to avoid the stockbrokers’ embarrassment (Arkes &amp; Kajdasz, 2011).</span></p><span data-dcnode-id="1634" instrument_node="">
</span><p data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1631" instrument_node="">
</span><h3 data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">5. Art</span></h3><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">In 1983, Gianfranco Becchina had a rare sixth-century sculpture for sale with a staggering $10 million price tag. The Getty Museum, having reviewed X-rays, expert testimony, and historical documentation, agreed to its purchase amid considerable media hype.</span></p><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">However, when Evelyn Harrison, a renowned expert on Greek sculptures, and Thomas Hoving, former director of the Metropolitan Museum of Art, arrived to admire the statue, they knew, intuitively, something was wrong.</span></p><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">According to Hoving, it seemed “fresh,” which was unexpected as the 2,000-year-old statue had been taken out of the ground.</span></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">And they were right. While the sculpture was from a workshop in Rome, it originated from a forger in 1980, rather than a master sculptor from antiquity (Gladwell, 2005).</span></p><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1611"><a data-dcnode-id="1612" name="theories"></a></p><span data-dcnode-id="1610" instrument_node="">
</span><h2 data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">How Does Intuition Work? Psychology Theories</span></h2><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1602"><img alt="blinking" class="alignright wp-image-126739 size-medium lazyload" data-dcnode-id="1606" data-src="https://positivepsychology.com/wp-content/uploads/blinking-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/blinking-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/blinking-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/blinking-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/blinking-510x255.jpg 510w, https://positivepsychology.com/wp-content/uploads/blinking.jpg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="blinking is when intuition is used" width="300"><noscript data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">&lt;img class="alignright wp-image-126739 size-medium lazyload" title="blinking is when intuition is used" src="https://positivepsychology.com/wp-content/uploads/blinking-300x150.jpg" alt="blinking" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/blinking-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/blinking-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/blinking-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/blinking-510x255.jpg 510w, https://positivepsychology.com/wp-content/uploads/blinking.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="1603" instrument_node="">The study of decision making has a problem.</span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1600" instrument_node="">While we can observe people’s behavior, even with the advances made in </span><a data-dcnode-id="1598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/neuroscience-of-gratitude/"><span data-dcnode-id="1599" instrument_node="">brain imaging</span></a><span data-dcnode-id="1597" instrument_node="">, we cannot – yet – see the thought processes that go on behind the scenes (Hogarth, 2010).</span></p><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1592"><em data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">What does psychology have to say about intuition, when much of what happens in the brain is invisible – like looking at the outside of a black box?</span></em></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1590" instrument_node="">Many scientists propose a </span><em data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">dual-process theory – </span></em><span data-dcnode-id="1587" instrument_node="">decision-making processes split between intuitive (experiential or tacit) and analytical (rational or deliberate).</span></p><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1584" instrument_node="">In </span><em data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Blink: The Power of Thinking Without Thinking</span></em><span data-dcnode-id="1581" instrument_node="">, Malcolm Gladwell (2005) describes the two different approaches as </span><em data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">blinking</span></em><span data-dcnode-id="1578" instrument_node="">, when intuition is used, and </span><em data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">thinking</span></em><span data-dcnode-id="1575" instrument_node="">, when an analysis is performed.</span></p><span data-dcnode-id="1573" instrument_node="">
</span><blockquote data-dcnode-id="1570"><p data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">There can be as much value in the blink of an eye as in months of rational analysis.</span></p></blockquote><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1567" style="text-align: right;"><span data-dcnode-id="1568" instrument_node="">Malcolm Gladwell</span></p><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Intuition (or blinking) typically refers to the use of knowledge that is not explicit and in popular culture might be described as a “hunch” or “women’s intuition.”</span></p><span data-dcnode-id="1563" instrument_node="">
</span><p data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">When it happens, it’s hard to quantify or define, but it is there. As with the following thought:</span></p><span data-dcnode-id="1560" instrument_node="">
</span><blockquote data-dcnode-id="1557"><p data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">I had a feeling there was something wrong; she just didn’t seem like herself.</span></p></blockquote><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1555" instrument_node="">Hogarth (2010) suggests “</span><em data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">the essence of intuition or intuitive responses is that they are reached with little apparent effort, and typically without conscious awareness. They involve little or no conscious deliberation.</span></em><span data-dcnode-id="1552" instrument_node="">”</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1549" instrument_node="">Seymour Epstein (2010) offers a further, complementary insight: “</span><em data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Intuition involves a sense of knowing without knowing how one knows</span></em><span data-dcnode-id="1546" instrument_node="">” based on the unconscious processing of information.</span></p><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Intuitions also appear to be holistic – combining insights from multiple sources and often requiring a leap in thinking based on limited information.</span></p><span data-dcnode-id="1541" instrument_node="">
</span><p data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1538" instrument_node="">
</span><h3 data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Processes involved in intuition</span></h3><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Herbert Simon’s research in the 1950s into the concept of bounded rationality guides much of the work on intuition. Simon suggested that people often make decisions – and reduce their cognitive load – based on what is good enough.</span></p><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1531" instrument_node="">Rather than arriving at complete and entirely correct answers, when faced with specific tasks, we often resort to </span><em data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">heuristics </span></em><span data-dcnode-id="1528" instrument_node="">– or rules of thumb – that help form intuitive judgments (Simon, 1955).</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">The use of heuristics is considered commonplace and the default approach for making decisions (Epstein, 2010).</span></p><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1522" instrument_node="">The process of </span><em data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">recognition </span></em><span data-dcnode-id="1519" instrument_node="">– a fundamental evolved function – is also crucial to intuition. It appears separate from other parts of the human memory in the brain, capable of persisting in the most challenging conditions with accuracy sufficient for practical purposes.</span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1512"><span data-dcnode-id="1516" instrument_node="">Intuition appears to rely on the </span><em data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">automation</span></em><span data-dcnode-id="1513" instrument_node=""> of the decision-making process.</span></p><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Newly learned tasks often rely on declarative knowledge; we must consciously consider each move or action. As a result of practice and learning, this knowledge becomes automated or procedural. Such tasks are acted out without conscious intervention, saving significant processing power and freeing the mind to focus on more intensive or newly acquired actions.</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1504"><em data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Forward and backward inferences</span></em><span data-dcnode-id="1505" instrument_node=""> also play an essential role in intuition (Hogarth, 2010). The knowledge we have acquired through experience helps us predict, intuitively, where the ball will land or why the child tripped and take action.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Indeed, the vast knowledge we build up over time allows real-world predictions, enabling us to act quickly and effectively in situations that most of us have encountered many times before.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1493"><em data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Learning </span></em><span data-dcnode-id="1497" instrument_node="">and</span><em data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node=""> retrieval</span></em><span data-dcnode-id="1494" instrument_node=""> are also highly relevant to successful intuitive processes.</span></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Having experienced objects and scenes before, we are highly adept at pattern matching to support our ability to decide and act quickly and effectively.</span></p><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">For example, when we walk into a coffee shop, we recognize a cup as something we have seen many times before. We also understand, intuitively, that it is likely to be hot and easily spilled on an uneven surface.</span></p><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Intuition appears to arise – like an epiphenomenon – out of the interaction of many distinctive cognitive processes, rather than a single one. They combine to deliver a fast and effective response when it is most needed.</span></p><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1478"><a data-dcnode-id="1479" name="important"></a></p><span data-dcnode-id="1477" instrument_node="">
</span><h2 data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Is Intuition Important?</span></h2><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">In a word, yes.</span></p><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Intuition offers a reduction in overall cognitive load and the ability to respond instantly while providing confidence in our knowledge and decision making – even though it may defy analysis (Hogarth, 2010).</span></p><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Such automatic thinking may benefit from, or be hampered by, experience.</span></p><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">When we receive a check at the end of a meal, we usually have an intuitive feel for its costs, based on experience. However, this may fail when we are in a new country or did not realize we had mistakenly chosen the most expensive wine in the cellar.</span></p><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Intuition helps us survive by providing fast responses that, usually, offer an appropriate, immediate action to address a situation. Such responses rely heavily on “cultural capital,” learnings specific to the environment in which we find ourselves.</span></p><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">While this usually helps us, it can lead to bias and prejudice in our decision making – based on religion, culture, social, moral, and even political environments – and may need to be countered by rational thinking.</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1455" instrument_node="">Indeed, “</span><em data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">intuition can be explicitly educated</span></em><span data-dcnode-id="1452" instrument_node="">,” says Hogarth (2010). By changing the content and environment surrounding our learning, we can lean toward more accurate and less biased, intuitive judgments.</span></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1445"><a data-dcnode-id="1446" name="instinct"></a></p><span data-dcnode-id="1444" instrument_node="">
</span><h2 data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Instinct, Logic, or Intuition?</span></h2><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1433"><img alt="instinct logic and intuition" class="alignright wp-image-126740 size-medium lazyload" data-dcnode-id="1440" data-src="https://positivepsychology.com/wp-content/uploads/instinct-logic-and-intuition-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/instinct-logic-and-intuition-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/instinct-logic-and-intuition-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/instinct-logic-and-intuition-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/instinct-logic-and-intuition-510x255.jpg 510w, https://positivepsychology.com/wp-content/uploads/instinct-logic-and-intuition.jpg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="logic and intellect" width="300"><noscript data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">&lt;img class="alignright wp-image-126740 size-medium lazyload" title="logic and intellect" src="https://positivepsychology.com/wp-content/uploads/instinct-logic-and-intuition-300x150.jpg" alt="instinct logic and intuition" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/instinct-logic-and-intuition-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/instinct-logic-and-intuition-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/instinct-logic-and-intuition-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/instinct-logic-and-intuition-510x255.jpg 510w, https://positivepsychology.com/wp-content/uploads/instinct-logic-and-intuition.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="1437" instrument_node="">While </span><em data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">intuition</span></em><span data-dcnode-id="1434" instrument_node=""> is defined as arriving at knowledge without relying on reason or inference (Epstein, 2010), it differs from instinct.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">The latter is hardwired, a less flexible, direct response to stimuli.</span></p><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1424"><span data-dcnode-id="1428" instrument_node="">According to Merriam-Webster, instinct is “</span><em data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">a largely inheritable and unalterable tendency of an organism to make a complex and specific response to environmental stimuli without involving reason</span></em><span data-dcnode-id="1425" instrument_node="">.”</span></p><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1422" instrument_node="">It is, therefore, likely to engage less complicated or deep processing. </span><em data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Instinct</span></em><span data-dcnode-id="1419" instrument_node=""> is innate, inherited, and hardwired into our brain’s circuitry as a result of millions of years of evolution.</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">If a lion roars and I am unaware of it standing behind me, I jump, turn, and, most likely, run for the hills. This action is more primal than intuitive or analytical – though most likely, there are shades of gray.</span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1410"><em data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Logic</span></em><span data-dcnode-id="1411" instrument_node=""> is analytical – the rational consideration of a problem. To complete our taxes, we rely on working through each question, completing each box and referencing spreadsheets, sticky notes, or boxes of receipts. Tax advisers are unlikely to appreciate completion using an intuitive, gut feeling regarding how much we owe.</span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><a data-dcnode-id="1405" name="role"></a></p><span data-dcnode-id="1403" instrument_node="">
</span><h2 data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Its Role in Decision Making</span></h2><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">While we may be mostly unaware of our day-to-day decision making, it is likely to be a mix of intuitive and deliberate thinking (Hogarth, 2010).</span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">And the role of intuition appears to be no different in our everyday thought processes than in more crucial decisions.</span></p><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Intuitive decision making is based on our past experiences and, therefore, repeatedly successful in similar situations, where previous outcomes and learning were useful and accurate.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Where the current or future situation is significantly different, we must use our intuition with caution. Without rational analysis, any decision taken could be ineffective at best or dangerous at worst.</span></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">When it works well and time constraints are strict, intuition can provide fast, focused thinking (e.g., the boat is sinking or the bomb is ticking). When there is time to deliberate – how do we tackle global warming or racism? – we must rely on rational, evidence-based analysis.</span></p><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1384" instrument_node="">Research at the University of South Wales confirmed that intuition significantly benefits decision making while adding that nonconscious information can increase decision accuracy, speed, and </span><a data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/self-confidence/"><span data-dcnode-id="1383" instrument_node="">confidence</span></a><span data-dcnode-id="1381" instrument_node=""> (Lufityanto, Donkin, &amp; Pearson, 2016).</span></p><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><a data-dcnode-id="1375" name="link"></a></p><span data-dcnode-id="1373" instrument_node="">
</span><h2 data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">The Link Between Intuition and Creativity</span></h2><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1363"><img alt="creativity" class="alignright size-medium wp-image-126741 lazyload" data-dcnode-id="1369" data-src="https://positivepsychology.com/wp-content/uploads/creativity-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/creativity-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/creativity-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/creativity-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/creativity-510x255.jpg 510w, https://positivepsychology.com/wp-content/uploads/creativity.jpg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="300"><noscript data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">&lt;img class="alignright size-medium wp-image-126741 lazyload" src="https://positivepsychology.com/wp-content/uploads/creativity-300x150.jpg" alt="creativity" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/creativity-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/creativity-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/creativity-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/creativity-510x255.jpg 510w, https://positivepsychology.com/wp-content/uploads/creativity.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><a data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/creativity/"><span data-dcnode-id="1366" instrument_node="">Creativity</span></a><span data-dcnode-id="1364" instrument_node="">, like intuition, can be challenging to define.</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">And yet they both appear to involve the transformation of ideas into something tangible, novel, and valuable in communicating ideas and solving problems.</span></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">The idea that intuition is perceptual, subconsciously linking disparate pieces of information, also suggests considerable interplay with creativity. Both intuition and creativity appear, at some level, to combine data from multiple sources into something coherent (Raidl &amp; Lubart, 2001).</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Recent research has identified links between intuition and the early stages of the creative process, including idea generation and evaluation stages (Pétervári, Osman, &amp; Bhattacharya, 2016).</span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1348"><a data-dcnode-id="1349" name="books"></a></p><span data-dcnode-id="1347" instrument_node="">
</span><h2 data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">7 Books on the Topic</span></h2><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">You can learn to become more intuitive (Epstein, 2010). Use the following books to explore the topic further:</span></p><span data-dcnode-id="1341" instrument_node="">

</span><h2 data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">PositivePsychology.com Relevant Resources</span></h2><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">We have many resources at PositivePsychology.com that will help you to explore personal development:</span></p><span data-dcnode-id="1270" instrument_node="">
</span><ul data-dcnode-id="1235"><span data-dcnode-id="1269" instrument_node="">
</span><li data-dcnode-id="1265"><a data-dcnode-id="1267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pro.positivepsychology.com/tools/connecting-to-your-intuition/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1268" instrument_node="">Connecting With Your Intuition</span></a><span data-dcnode-id="1266" instrument_node=""> can be vital to cultivating intuitive intelligence.</span></li><span data-dcnode-id="1264" instrument_node="">
</span><li data-dcnode-id="1259"><span data-dcnode-id="1263" instrument_node="">Create a growth mindset by </span><a data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pro.positivepsychology.com/tools/leaving-the-comfort-zone/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1262" instrument_node="">Leaving the Comfort Zone</span></a><span data-dcnode-id="1260" instrument_node="">, exploring new areas, and learning new skills.</span></li><span data-dcnode-id="1258" instrument_node="">
</span><li data-dcnode-id="1253"><span data-dcnode-id="1257" instrument_node="">Increase awareness and </span><a data-dcnode-id="1255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pro.positivepsychology.com/tools/learning-from-value-based-actions-of-the-past/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1256" instrument_node="">Learn From Value-Based Actions</span></a><span data-dcnode-id="1254" instrument_node=""> of the past.</span></li><span data-dcnode-id="1252" instrument_node="">
</span><li data-dcnode-id="1248"><a data-dcnode-id="1250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pro.positivepsychology.com/tools/exploring-flow-experiences/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1251" instrument_node="">Exploring Flow Experiences</span></a><span data-dcnode-id="1249" instrument_node=""> can help you immerse yourself in an experience and make more intuitive decisions while “being in the zone.”</span></li><span data-dcnode-id="1247" instrument_node="">
</span><li data-dcnode-id="1243"><a data-dcnode-id="1245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/intuition-training/"><span data-dcnode-id="1246" instrument_node="">Developing and Training Intuition</span></a><span data-dcnode-id="1244" instrument_node=""> is an article that can take you further on your intuition journey, and shares five exercises for your clients as well.</span></li><span data-dcnode-id="1242" instrument_node="">
</span><li data-dcnode-id="1237"><span data-dcnode-id="1241" instrument_node="">If you’re looking for more science-based ways to help others develop their strengths, this collection contains </span><a data-dcnode-id="1239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/17-strengths-exercises-download" rel="noopener" target="_blank"><span data-dcnode-id="1240" instrument_node="">17 strength-finding tools for practitioners</span></a><span data-dcnode-id="1238" instrument_node="">. Use them to help others better understand and harness their strengths in life-enhancing ways.</span></li><span data-dcnode-id="1236" instrument_node="">
</span></ul><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1229"><a data-dcnode-id="1230" name="home"></a></p><span data-dcnode-id="1228" instrument_node="">
</span><h2 data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">A Take-Home Message</span></h2><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Intuition is an incredibly powerful tool for decision making. It ensures we respond in the moment, freeing up valuable mental resources to tackle novel experiences and optimize learning.</span></p><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">While not infallible, intuition is invaluable.</span></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Intuition provides us with a “gut” response – an inner voice ­– beyond logic or learned responses, revealing both who we are and the knowledge we have gained.</span></p><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">If we listen, we can benefit from the creativity it offers and the feeling of confidence that it brings. Let intuition help you grow and make time-critical decisions based on resources that are not always easily reached.</span></p><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Recognize the circumstances when you are at your most intuitive. Find opportunities to recreate them and tap the potential for creativity and fast, insightful decision making.</span></p><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1209" instrument_node="">We hope you enjoyed reading this article. Don’t forget to </span><a data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/3-exercises-strengths" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1208" instrument_node="">download our three Strengths Exercises for free</span></a><span data-dcnode-id="1206" instrument_node="">.</span></p><span data-dcnode-id="1204" instrument_node="">

</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Hi Odia,</span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">This is a big question! And it depends on the situation and the stakes. For instance, it would be inappropriate to rely on intuition in, say, a court trial because the consequence of making an incorrect decision could drastically affect a person’s life. Likewise, relying on one’s gut during negotiations worth a lot of money to shareholders, and then making a wrong move, would be hard to explain. In these situations, where circumstances aren’t time-sensitive (e.g., you’re about to get socked in the face by a boxer) or other people have a stake in the outcome, a balanced weighing of a situation’s pros and cons is usually preferable.</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">I hope this helps! But there are probably lots of other reasons, too.</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">– Nicole | Community Manager</span></p><span data-dcnode-id="808" instrument_node="">
