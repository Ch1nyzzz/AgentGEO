</span><article class="post-131069 post type-post status-publish format-standard has-post-thumbnail hentry category-positive-workplace" data-dcnode-id="899" id="post-131069"><span data-dcnode-id="1587" instrument_node="">
</span><div class="entry-content" data-dcnode-id="901"><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1581"><img alt="Job Satisfaction" class="alignright wp-image-131186 size-medium lazyloaded" data-dcnode-id="1585" data-src="https://positivepsychology.com/wp-content/uploads/2020/11/Job-Satisfaction-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2020/11/Job-Satisfaction-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2020/11/Job-Satisfaction-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2020/11/Job-Satisfaction.jpg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/wp-content/uploads/2020/11/Job-Satisfaction-300x150.jpg&amp;raw" srcset="https://positivepsychology.com/wp-content/uploads/2020/11/Job-Satisfaction-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2020/11/Job-Satisfaction-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2020/11/Job-Satisfaction.jpg 800w" title="Why is job satisfaction important?" width="300"><noscript data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">&lt;img class="alignright wp-image-131186 size-medium lazyload" title="Why is job satisfaction important?" src="https://positivepsychology.com/wp-content/uploads/2020/11/Job-Satisfaction-300x150.jpg" alt="Job Satisfaction" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/2020/11/Job-Satisfaction-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2020/11/Job-Satisfaction-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2020/11/Job-Satisfaction.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="1582" instrument_node="">Have you asked yourself lately if your job is right for you?</span></p><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1579" instrument_node="">Are you aware of what </span><em data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">right</span></em><span data-dcnode-id="1576" instrument_node="">&nbsp;actually means?</span></p><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Determining whether you are satisfied with your job, whether it is right for you, and why that is important often involves personal intuition and circumstances. For some people, the right job might entail earning a certain salary. For others, the right job might involve having a supportive team.</span></p><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">With more than 21,000 participants in their study, researchers Dobrow Riza, Ganzach, and Liu (2018) found that over a 40-year span, people who stayed in the same organization over time became less satisfied, and people who moved to different organizations over time became happier.</span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">What does this mean? Does job satisfaction come from staying in an organization or leaving it? If someone were to stay in an organization, what would retain their satisfaction?</span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">In this article, we will explore just that and more, including divulging the ingredients of job satisfaction, real-life examples of it, and how it relates to motivation.</span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1561" instrument_node="">Before you continue, we thought you might like to </span><a data-dcnode-id="1559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/3-stress-exercises" rel="noopener" target="_blank"><span data-dcnode-id="1560" instrument_node="">download our three Stress &amp; Burnout Prevention Exercises (PDF) for free</span></a><span data-dcnode-id="1558" instrument_node="">. These science-based exercises will equip you and those you work with, with tools to manage stress better and find a healthier balance in your life.</span></p><span data-dcnode-id="1556" instrument_node="">
</span><div data-dcnode-id="1516" id="inhoud"><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">This article contains:</span></p><span data-dcnode-id="1552" instrument_node="">
</span><ul data-dcnode-id="1518"><span data-dcnode-id="1551" instrument_node="">
</span><li data-dcnode-id="1548"><a data-dcnode-id="1549" href="#job-satisfaction"><span data-dcnode-id="1550" instrument_node="">What Is Job Satisfaction?</span></a></li><span data-dcnode-id="1547" instrument_node="">
</span><li data-dcnode-id="1544"><a data-dcnode-id="1545" href="#ingredients"><span data-dcnode-id="1546" instrument_node="">10 Proven Ingredients for Job Satisfaction</span></a></li><span data-dcnode-id="1543" instrument_node="">
</span><li data-dcnode-id="1540"><a data-dcnode-id="1541" href="#benefits"><span data-dcnode-id="1542" instrument_node="">Is Job Satisfaction Important? 4 Benefits</span></a></li><span data-dcnode-id="1539" instrument_node="">
</span><li data-dcnode-id="1536"><a data-dcnode-id="1537" href="#examples"><span data-dcnode-id="1538" instrument_node="">2 Real-Life Examples</span></a></li><span data-dcnode-id="1535" instrument_node="">

</span><li data-dcnode-id="1528"><a data-dcnode-id="1529" href="#tools"><span data-dcnode-id="1530" instrument_node="">PositivePsychology.com’s Job Satisfaction Tools</span></a></li><span data-dcnode-id="1527" instrument_node="">
</span><li data-dcnode-id="1524"><a data-dcnode-id="1525" href="#home"><span data-dcnode-id="1526" instrument_node="">A Take-Home Message</span></a></li><span data-dcnode-id="1523" instrument_node="">

</span><p data-dcnode-id="1513"><a data-dcnode-id="1514" name="job-satisfaction"></a></p><span data-dcnode-id="1512" instrument_node="">
</span><h2 data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">What Is Job Satisfaction?</span></h2><span data-dcnode-id="1509" instrument_node="">
</span><blockquote data-dcnode-id="1506"><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Choose a job you love, and you will never have to work a day in your life.</span></p></blockquote><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1503" style="text-align: right;"><span data-dcnode-id="1504" instrument_node="">Confucius</span></p><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">You have probably heard that quote before, yet it may still have relevance today. It makes us ask whether emotions like happiness, stress, and anxiety play an important role in job satisfaction.</span></p><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1498" instrument_node="">The aptly titled </span><em data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Job Satisfaction</span></em><span data-dcnode-id="1495" instrument_node=""> (Hoppock, 1935) defines job satisfaction as any combination of psychological, physiological, and environmental circumstances that cause a person to truthfully say that they are satisfied with a job.</span></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Going a little deeper and fast-forwarding to this century, job satisfaction has been called a set of favorable or unfavorable feelings and emotions with which employees view their work (Karatepe, Uludag, Menevis, Hadzimehmedagic, &amp; Baddar, 2006).</span></p><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Before we get to favorable feelings or proven ingredients for job satisfaction, let’s first assess what leads to those unfavorable feelings.</span></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1483"><img alt="Unhappy Employees" class="aligncenter wp-image-130277 size-full lazyloaded" data-dcnode-id="1486" data-src="https://positivepsychology.com/wp-content/uploads/2020/10/Unhappy-Employees.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2020/10/Unhappy-Employees.jpg 478w, https://positivepsychology.com/wp-content/uploads/2020/10/Unhappy-Employees-241x300.jpg 241w" height="595" sizes="(max-width: 478px) 100vw, 478px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/wp-content/uploads/2020/10/Unhappy-Employees.jpg&amp;raw" srcset="https://positivepsychology.com/wp-content/uploads/2020/10/Unhappy-Employees.jpg 478w, https://positivepsychology.com/wp-content/uploads/2020/10/Unhappy-Employees-241x300.jpg 241w" width="478"><noscript data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">&lt;img class="aligncenter wp-image-130277 size-full lazyload" src="https://positivepsychology.com/wp-content/uploads/2020/10/Unhappy-Employees.jpg" alt="Unhappy Employees" width="478" height="595" srcset="https://positivepsychology.com/wp-content/uploads/2020/10/Unhappy-Employees.jpg 478w, https://positivepsychology.com/wp-content/uploads/2020/10/Unhappy-Employees-241x300.jpg 241w" sizes="(max-width: 478px) 100vw, 478px" /&gt;</span></noscript></p><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1475"><a data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dornsife.usc.edu/map/the-importance-of-job-satisfaction-in-todays-workforce/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1478" instrument_node="">The graphic above</span></a><span data-dcnode-id="1476" instrument_node=""> from the University of Southern California’s Applied Psychology Program shows some factors that make American employees unhappy or burnt out with jobs.</span></p><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">Many of us have experienced unhappiness because of these factors and more at some point in our careers. Let’s take a look at what can be done to satisfy ourselves in a job.</span></p><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1466"><a data-dcnode-id="1467" name="ingredients"></a></p><span data-dcnode-id="1465" instrument_node="">
</span><h2 data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">10 Proven Ingredients for Job Satisfaction</span></h2><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1457"><img alt="Ingredients for job satisfaction" class="alignright wp-image-131213 size-medium lazyload" data-dcnode-id="1461" data-src="https://positivepsychology.com/wp-content/uploads/2020/11/Ingredients-for-job-satisfaction-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2020/11/Ingredients-for-job-satisfaction-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2020/11/Ingredients-for-job-satisfaction-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2020/11/Ingredients-for-job-satisfaction.jpg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Job Satisfaction Research and Findings" width="300"><noscript data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">&lt;img class="alignright wp-image-131213 size-medium lazyload" title="Job Satisfaction Research and Findings" src="https://positivepsychology.com/wp-content/uploads/2020/11/Ingredients-for-job-satisfaction-300x150.jpg" alt="Ingredients for job satisfaction" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/2020/11/Ingredients-for-job-satisfaction-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2020/11/Ingredients-for-job-satisfaction-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2020/11/Ingredients-for-job-satisfaction.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="1458" instrument_node="">We may already have an idea of ingredients that go into making work satisfying.</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">Although it is subjective, job satisfaction research (Kumari, 2011) has showcased the following:</span></p><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1450" instrument_node="">
</span><h3 data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">1. Communication</span></h3><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Communication can be extremely important to retaining levels of satisfaction, on both a personal and professional level. It is exhibited in allowing employees to be open, collaborative, trustworthy, and even confrontational when needed.</span></p><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1441" instrument_node="">
</span><h3 data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">2. Culture</span></h3><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Defining a company culture links to job satisfaction as it provides values and guidance about topics ranging from organizational goals to appropriate levels of interaction between employees.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1432" instrument_node="">
</span><h3 data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">3. Security</span></h3><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">It’s no surprise that once a culture is established in a workplace, satisfaction can then be enhanced by added feelings of security. Security may arise from knowing you work for a viable company with long-term goals, insinuating feelings of belonging to that company (Berg, Grant, &amp; Johnson, 2010). This can be enhanced by having honest communication and transparency within a company.</span></p><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1423" instrument_node="">
</span><h3 data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">4. Leadership</span></h3><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">Tied into increased motivation for employees, leadership, or influencing a group toward the achievement of a vision or set of goals (Kinicki &amp; Kreitner, 2006), can lead to job satisfaction by making sure communication and instruction of tasks is adequate and easily understood.</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">In turn, when employees feel that leaders can guide them through tasks, their motivation and satisfaction increases.</span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1413" instrument_node="">With leadership having a crucial influence on job satisfaction, this related article with </span><a data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/leadership-activities/"><span data-dcnode-id="1412" instrument_node="">leadership activities</span></a><span data-dcnode-id="1410" instrument_node="">&nbsp;is a recommended read.</span></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1405" instrument_node="">
</span><h3 data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">5. Opportunities</span></h3><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Employees can gain more satisfaction with their job when more challenging opportunities arise. This can lead to participation in interesting and diverse projects and get employees away from the monotony of a role.</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1396" instrument_node="">
</span><h3 data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">6. Career development</span></h3><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Employees can become more satisfied with their job when they know there is an individualized plan for them. Beyond the formal nature of appraisals, if there is a path in place for growth, this can encourage employees to stay happier for longer.</span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1387" instrument_node="">
</span><h3 data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">7. Working conditions</span></h3><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1383" instrument_node="">Job satisfaction can be increased if a </span><a data-dcnode-id="1381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/resilience-in-the-workplace/"><span data-dcnode-id="1382" instrument_node="">resilient workplace</span></a><span data-dcnode-id="1380" instrument_node=""> is a cooperative environment. This means a place with respect for diverse ideas and opinions, honest and constructive feedback, mentoring opportunities, and freedom from harassment.</span></p><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1375" instrument_node="">
</span><h3 data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">8. Employee personality</span></h3><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Most ingredients linked to job satisfaction may have roots in elements outside of the employees’ control (such as leadership from managers and communication from company leaders), but what about the employees themselves? Can they control their own levels of satisfaction? Bakker, Tims, and Derks (2012) talk about just that.</span></p><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">These researchers discuss how job satisfaction can be determined by how proactive the employee is at work. Does the employee proactively seek out a manager for feedback? Does the employee go the extra mile to achieve tasks within a company? Does the employee try to stick to company goals, lead meetings, and ask questions when unsure about how to complete a task?</span></p><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">If yes, these employees are ones who can show more satisfaction in the workplace. Proactiveness in the workplace can lead to positive job appraisals, which when fed back to the employee, can lead to satisfaction.</span></p><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1358"><span data-dcnode-id="1362" instrument_node="">For more on constructive feedback, read our article discussing ways to give </span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/negative-feedback/"><span data-dcnode-id="1361" instrument_node="">negative feedback</span></a><span data-dcnode-id="1359" instrument_node="">&nbsp;constructively.</span></p><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1354" instrument_node="">
</span><h3 data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">9. Pay and benefits</span></h3><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Organizational success and job satisfaction are also linked to employees’ perceptions of adequate pay and benefits (Edwards, 2008).</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">While pay and benefits are not the only reason employees find satisfaction in their workplaces, research going back more than 30 years (e.g., Gerhart, 1987) shows that pay and benefits, at least according to how employees view themselves in their roles, has ranked high on lists of job satisfaction factors.</span></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1342" instrument_node="">
</span><h3 data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">10. Rewards and recognition</span></h3><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Beyond monetary gain and being paid fairly for the work they do, job satisfaction for employees means that promotional policies are unambiguous and in line with their expectations.</span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">A key finding here (Kumari, 2011) is that satisfaction at a job is not exclusively linked to pay, but to the perceived fairness of how one is recognized at work for achievements.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328"><a data-dcnode-id="1329" name="benefits"></a></p><span data-dcnode-id="1327" instrument_node="">
</span><h2 data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Is Job Satisfaction Important? 4 Benefits</span></h2><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">We have already discussed what employees look for in achieving and maintaining job satisfaction. But why is it important? And why should organizations care?</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">First, it is a primary responsibility of organizations to ascertain that employees are satisfied with their jobs through measurements, but also to find out the causes of dissatisfaction when employees are not feeling satisfied (McBride, 2002).</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Tools such as the following help measure some important factors that go into employees’ job satisfaction (Spector, 1997, chapter 2):</span></p><span data-dcnode-id="1315" instrument_node="">
</span><ul data-dcnode-id="1304"><span data-dcnode-id="1314" instrument_node="">
</span><li data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Job Satisfaction Survey (Spector, 1985)</span></li><span data-dcnode-id="1311" instrument_node="">
</span><li data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Job Description Index (Castanheira, 2014)</span></li><span data-dcnode-id="1308" instrument_node="">
</span><li data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">The Minnesota Satisfaction Questionnaire (Weiss, Dawis, and England, 1967)</span></li><span data-dcnode-id="1305" instrument_node="">
</span></ul><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">As to why job satisfaction is so important, the Employee Job Satisfaction and Engagement Report from the Society for Human Resource Management (Lee et al., 2016) notes four benefits of making sure employees are satisfied with their work.</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1297" instrument_node="">
</span><h3 data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">1. Increased profits</span></h3><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">This is one any manager and employee might appreciate. Keeping employees satisfied can lead to higher sales, lower costs, and a stronger bottom line.</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1288" instrument_node="">
</span><h3 data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">2. Higher productivity</span></h3><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Irrespective of their job titles or salary, employees who are more satisfied with their job, whether they feel satisfied with the organizational culture, with the rewards they are getting, or with recognition, can produce more and do it more efficiently.</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1279" instrument_node="">
</span><h3 data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">3. Lower turnover</span></h3><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">If employees are more satisfied with their job, they are less likely to leave. It also helps to recruit better quality talent as new talent sees employee staying power as added value.</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1270" instrument_node="">
</span><h3 data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">4. Loyalty</span></h3><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">When employees feel there is a growth path for them, they are more satisfied. In turn, because they feel the organization has their best interests at heart, they tend to support the organization’s mission and objectives. When this happens, employees may tell their friends or relatives about the good nature of the organization, which helps spread organizational goodwill.</span></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><a data-dcnode-id="1263" name="examples"></a></p><span data-dcnode-id="1261" instrument_node="">
</span><h2 data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">2 Real-Life Examples</span></h2><span data-dcnode-id="1258" instrument_node="">
</span><h3 data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">The importance of honesty and communication</span></h3><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Honesty and communication about a company’s objectives and goals can be vital and are linked to job satisfaction for employees. But do employees only care about company success? How does honest communication impact their own, individual success?</span></p><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Agarwal and Mehta (2014) were interested in employee job satisfaction within the IT industry.</span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Their curiosity stemmed from the idea that IT employees may largely be working in isolation, away from other employees, and the researchers wondered if employees valued appraisals more in such circumstances than in other industries. They discussed how performance appraisal was directly linked to satisfaction (or dissatisfaction) for the employee.</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Additionally, they also discuss how honest and consistent communication and regular updates of employee progress (bi-annual rather than yearly appraisals) can not only increase employee satisfaction at work, but also help companies by decreasing the rate of attrition. Interestingly enough, Agarwal and Mehta (2014) did not discuss company goals or performance in their findings.</span></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Let’s take a look at some familiar companies you may have heard of.</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1237" instrument_node="">
</span><h3 data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Starbucks</span></h3><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1232"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lazyload" data-dcnode-id="1233" data-src="https://www.youtube.com/embed/KpuoDRuxkU4?feature=oembed" frameborder="0" height="360" title="Starbucks CEO says, “Customers are Number Two.” [The effects of employee satisfaction]" width="640"></iframe></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Although the phrase “the customer is always right” may be common, it does not seem to ring all true behind the scenes (or the counter, in this case).</span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">The CEO’s mantra was that if managers look out for employees, employees will look after customers. To do this, he offered health insurance to all employees despite the excessive cost and being advised against it.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1224" instrument_node="">Is it surprising that good </span><a data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/leadership-strengths/"><span data-dcnode-id="1223" instrument_node="">leadership strengths</span></a><span data-dcnode-id="1221" instrument_node="">, recognition, and reward given to employees increased job satisfaction and in turn increased profits for Starbucks? It certainly fits in line with the aforementioned research in this article.</span></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1216" instrument_node="">
</span><h3 data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">2. Google</span></h3><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1211"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lazyload" data-dcnode-id="1212" data-src="https://www.youtube.com/embed/4a_f9H4xb28?feature=oembed" frameborder="0" height="360" title="How Google Keeps the Best and Brightest Employees" width="640"></iframe></p><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">While also producing satisfied end-users like us when using Google’s products, Google puts a lot of work into job satisfaction for its employees as well.</span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1206" instrument_node="">It’s interesting to note that Google does not care (perhaps as much) about employee titles, but more about what type of leaders its employees are, or emergent leadership. This draws us back to the importance of </span><a data-dcnode-id="1204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/positive-leadership/"><span data-dcnode-id="1205" instrument_node="">positive leadership</span></a><span data-dcnode-id="1203" instrument_node=""> in job satisfaction.</span></p><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Gillett (2016) writes that Google attracts talent with competitive pay and keeps employees satisfied by allowing telecommuting. This may show an appreciation for work–life balance and retention.</span></p><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Gillett also writes that according to compensation and data company PayScale, nearly three-quarters of Google employees find their jobs meaningful, citing that Google’s mission is to organize the world’s information and make it universally accessible and useful.</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">She describes Google employees thinking that their goal of working at Google is a moral rather than a business goal, which in turn creates motivation to innovate and push into new areas.</span></p><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">These sound like great organizational goals that drive profits. Furthermore, Google staff certainly demonstrate that job satisfaction can indeed lead to employees supporting the organization’s goals and objectives.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1184"><a data-dcnode-id="1185" name="motivation"></a></p><span data-dcnode-id="1183" instrument_node="">
</span><h2 data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">A Note on Job Satisfaction and Motivation</span></h2><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1175"><img alt="Importance of job satisfaction" class="alignright wp-image-131214 size-medium lazyload" data-dcnode-id="1179" data-src="https://positivepsychology.com/wp-content/uploads/2020/11/Importance-of-job-satisfaction-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2020/11/Importance-of-job-satisfaction-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2020/11/Importance-of-job-satisfaction-768x385.jpg 768w, https://positivepsychology.com/wp-content/uploads/2020/11/Importance-of-job-satisfaction.jpg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Job Satisfaction and Motivation" width="300"><noscript data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">&lt;img class="alignright wp-image-131214 size-medium lazyload" title="Job Satisfaction and Motivation" src="https://positivepsychology.com/wp-content/uploads/2020/11/Importance-of-job-satisfaction-300x150.jpg" alt="Importance of job satisfaction" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/2020/11/Importance-of-job-satisfaction-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2020/11/Importance-of-job-satisfaction-768x385.jpg 768w, https://positivepsychology.com/wp-content/uploads/2020/11/Importance-of-job-satisfaction.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="1176" instrument_node="">While considering the Google example above, what does motivation mean and how is it linked to job satisfaction?</span></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1173" instrument_node="">According to Latham (2012), motivation is a cognitive resource allocation process in which a person makes choices as to the time and energy to be allocated to an array of motives or tasks. The key word here seems to be </span><em data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">choice</span></em><span data-dcnode-id="1170" instrument_node="">.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">When an employee is able to make a choice, they feel more motivated to perform a task. When an employee is more motivated to perform and complete a task, this tends to be linked with higher job satisfaction (Jalagat, 2016).</span></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Choice, as directed or allowed by organizational policy, can lead to further motivation and, in turn, job satisfaction as well as performance. This seems to be echoed by the work of Ilies and Judge (2003).</span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Ilies and Judge (2003) discuss how leaders interact with employees, specifically by talking to them more as a person, and how assigning tasks and providing a career path can affect their motivation level.</span></p><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">When determining job satisfaction, it is key to remember that human factors such as motivation, excitement, satisfaction, and dissatisfaction must be considered. This is clearly indicated by the Starbucks example.</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">When employees are encouraged to be great leaders and to engage in challenging opportunities, such as at Google, they can end up feeling more satisfied with their job.</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1148"><a data-dcnode-id="1149" name="tools"></a></p><span data-dcnode-id="1147" instrument_node="">
</span><h2 data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">PositivePsychology.com’s Job Satisfaction Tools</span></h2><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">As one of the key ingredients of job satisfaction, communication among employees, managers, and staff cannot be underestimated.</span></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">However, communication is not automatically generated or achieved right away. When introducing new employees into a workplace, it may be even more important to establish good and fun communication procedures between employees.</span></p><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1133"><span data-dcnode-id="1137" instrument_node="">This helpful article with </span><a data-dcnode-id="1135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/communication-exercises-for-work/"><span data-dcnode-id="1136" instrument_node="">work-related communication games and exercises</span></a><span data-dcnode-id="1134" instrument_node=""> can help improve communication at the workplace.</span></p><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1131" instrument_node="">For other ways to establish </span><a data-dcnode-id="1129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/happiness-at-work/"><span data-dcnode-id="1130" instrument_node="">happiness in the workplace</span></a><span data-dcnode-id="1128" instrument_node="">, this article offers a guide and tips for making employees happier.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1125" instrument_node="">To determine your own job satisfaction, you need to do an assessment of your strengths and skills. This tool guides you to create a </span><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pro.positivepsychology.com/tools/a-strength-based-resume/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1124" instrument_node="">Strength-Based Resumé</span></a><span data-dcnode-id="1122" instrument_node=""> in order to do exactly that.</span></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1119" instrument_node="">Another invaluable tool based on research done by the Gallup Organization is </span><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pro.positivepsychology.com/tools/the-freelancer-approach/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1118" instrument_node="">The Freelancer Approach</span></a><span data-dcnode-id="1116" instrument_node="">. It is an interesting exercise that helps you understand what you like to do and, in turn, targets the right jobs and employers for ultimate job satisfaction.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1113" instrument_node="">17 Stress &amp; Burnout Prevention Exercises – If you’re looking for more science-based ways to help others manage stress without spending hours on research and session prep, this collection contains </span><a data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/17-stress-tools-download" rel="noopener" target="_blank"><span data-dcnode-id="1112" instrument_node="">17 validated stress management tools for practitioners</span></a><span data-dcnode-id="1110" instrument_node="">. Use them to help others identify signs of burnout and create more balance in their lives.</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1103"><a data-dcnode-id="1104" name="home"></a></p><span data-dcnode-id="1102" instrument_node="">
</span><h2 data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">A Take-Home Message</span></h2><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Job satisfaction can be a two-way street. Employees need to feel satisfied, and organizations must help employees realize their potential.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">If you are interested in increasing the job satisfaction of your employees, be sure to look beyond the seemingly practical benefits of providing adequate salaries and health insurance, although those too are critical.</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Motivating employees may be just as important. Job satisfaction links to motivation, which employees can gain even more of when realizing their full potential. Besides providing adequate salaries and health insurance, much more can be done by companies to motivate and guide employees. In turn, companies will reap the benefits of loyalty and shared objectives.</span></p><span data-dcnode-id="1090" instrument_node="">
