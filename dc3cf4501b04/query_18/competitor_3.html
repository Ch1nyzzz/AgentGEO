</span><div class="container" data-dcnode-id="4569"><h1 class="page-title" data-dcnode-id="4570"><span data-dcnode-id="4571" instrument_node="">How Meditation Increases Emotional Intelligence (EQ)</span></h1></div><span data-dcnode-id="4568" instrument_node="">
</span><span data-dcnode-id="4566" instrument_node="">
</span><article class="clearfix post-3254 page type-page status-publish hentry" data-dcnode-id="4560" id="post-3254"><span data-dcnode-id="4565" instrument_node="">

</span><span data-dcnode-id="4552" instrument_node="">
</span><h1 class="boldh1" data-dcnode-id="4550" id="theh1"><span data-dcnode-id="4551" instrument_node="">How Meditation Increases Emotional Intelligence (EQ)</span></h1><span data-dcnode-id="4549" instrument_node="">
</span><span data-dcnode-id="4546" instrument_node="">
</span><img align="right" alt="Meditation And Emotional Intelligence" class="lazyloaded" data-dcnode-id="4545" data-src="//dxkym3sl1eedi.cloudfront.net/eq-versus-iq.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dxkym3sl1eedi.cloudfront.net/eq-versus-iq.jpg&amp;raw" style="aspect-ratio: 140 / 196;" width="140"><span data-dcnode-id="4544" instrument_node="">
</span><p data-dcnode-id="4539"><span data-dcnode-id="4543" instrument_node="">
  Did you know that more and more scientists believe </span><b data-dcnode-id="4541"><span data-dcnode-id="4542" instrument_node="">Emotional Intelligence (EQ)</span></b><span data-dcnode-id="4540" instrument_node="">, not IQ, is the most important factor in determining a persons success?
</span></p><span data-dcnode-id="4538" instrument_node="">
</span><p data-dcnode-id="4533"><span data-dcnode-id="4537" instrument_node="">
  Before we tell you the secret to raising your emotional intelligence levels, it is important to </span><b data-dcnode-id="4535"><span data-dcnode-id="4536" instrument_node="">gauge your current EQ</span></b><span data-dcnode-id="4534" instrument_node="">:
</span></p><span data-dcnode-id="4532" instrument_node="">
</span><p data-dcnode-id="4491"><span data-dcnode-id="4531" instrument_node="">
  • Do you keep your cool and </span><b data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">stay calm</span></b><span data-dcnode-id="4528" instrument_node=""> in stressful situations? </span><br data-dcnode-id="4527"><span data-dcnode-id="4526" instrument_node="">
  • Are you caring, </span><b data-dcnode-id="4524"><span data-dcnode-id="4525" instrument_node="">compassionate</span></b><span data-dcnode-id="4523" instrument_node="">, and considerate? </span><br data-dcnode-id="4522"><span data-dcnode-id="4521" instrument_node="">
  • Do you make great decisions? </span><br data-dcnode-id="4520"><span data-dcnode-id="4519" instrument_node="">
  • Are you a </span><b data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">good listener</span></b><span data-dcnode-id="4516" instrument_node="">? </span><br data-dcnode-id="4515"><span data-dcnode-id="4514" instrument_node="">
  • Is your </span><b data-dcnode-id="4512"><span data-dcnode-id="4513" instrument_node="">intuition</span></b><span data-dcnode-id="4511" instrument_node=""> well developed?</span><br data-dcnode-id="4510"><span data-dcnode-id="4509" instrument_node="">
  • Are you </span><b data-dcnode-id="4507"><span data-dcnode-id="4508" instrument_node="">flexible</span></b><span data-dcnode-id="4506" instrument_node=""> and adaptable in most situations?</span><br data-dcnode-id="4505"><span data-dcnode-id="4504" instrument_node="">
  • Can you read the emotions of other people easily?</span><br data-dcnode-id="4503"><span data-dcnode-id="4502" instrument_node="">
  • Can you positively </span><b data-dcnode-id="4500"><span data-dcnode-id="4501" instrument_node="">influence</span></b><span data-dcnode-id="4499" instrument_node=""> people?</span><br data-dcnode-id="4498"><span data-dcnode-id="4497" instrument_node="">
  • Do you rarely give in to your urges?</span><br data-dcnode-id="4496"><span data-dcnode-id="4495" instrument_node="">
  • Are you generally </span><b data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">optimistic</span></b><span data-dcnode-id="4492" instrument_node=""> and happy?
</span></p><span data-dcnode-id="4490" instrument_node="">
</span><img align="right" alt="Meditation Emotional Intelligence" class="lazyloaded" data-dcnode-id="4489" data-src="//dxkym3sl1eedi.cloudfront.net/emotional-intelligence-EQ-2.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dxkym3sl1eedi.cloudfront.net/emotional-intelligence-EQ-2.jpg&amp;raw" style="aspect-ratio: 160 / 162;" width="160"><span data-dcnode-id="4488" instrument_node="">
</span><p data-dcnode-id="4480"><span data-dcnode-id="4487" instrument_node="">
  Answer </span><b data-dcnode-id="4485"><span data-dcnode-id="4486" instrument_node="">“no”</span></b><span data-dcnode-id="4484" instrument_node=""> to many of the questions? It's ok if you did, as most people do not have high levels of emotional intelligence. The </span><b data-dcnode-id="4482"><span data-dcnode-id="4483" instrument_node="">good news</span></b><span data-dcnode-id="4481" instrument_node=""> is, your EQ is not set in stone.
</span></p><span data-dcnode-id="4479" instrument_node="">
</span><p data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">What is the secret to increasing my emotional intelligence?
</span></p><span data-dcnode-id="4476" instrument_node="">
</span><p data-dcnode-id="4472"><b data-dcnode-id="4474"><span data-dcnode-id="4475" instrument_node="">Meditation.</span></b><span data-dcnode-id="4473" instrument_node=""> There are so many ways meditation can increase your EQ, here are three:
</span></p><span data-dcnode-id="4471" instrument_node="">
</span><p data-dcnode-id="4468"><b class="captext" data-dcnode-id="4469"><span data-dcnode-id="4470" instrument_node="">#1 — Meditation helps you become aware of and detach from negative thoughts</span></b></p><span data-dcnode-id="4467" instrument_node="">
</span><p data-dcnode-id="4453"><span data-dcnode-id="4466" instrument_node="">One thing a meditator learns is to simply </span><b data-dcnode-id="4464"><span data-dcnode-id="4465" instrument_node="">witness</span></b><span data-dcnode-id="4463" instrument_node=""> and </span><b data-dcnode-id="4461"><span data-dcnode-id="4462" instrument_node="">observe</span></b><span data-dcnode-id="4460" instrument_node=""> their own thoughts, without letting them create a whirlpool of anxiety. For example, the memory of a troubled past relationship might enter your consciousness, but instead of letting it take you on an emotional rollercoaster, you simply </span><b data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node="">let the thought go</span></b><span data-dcnode-id="4457" instrument_node="">, while staying in the present moment. This mindset helps you stay calm and balanced, and is integral to a </span><b data-dcnode-id="4455"><span data-dcnode-id="4456" instrument_node="">high EQ.</span></b><span data-dcnode-id="4454" instrument_node="">
</span></p><span data-dcnode-id="4452" instrument_node="">
</span><p data-dcnode-id="4449"><b class="captext" data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">#2 — Meditation helps you read the emotions of other people</span></b></p><span data-dcnode-id="4448" instrument_node="">
</span><p data-dcnode-id="4440"><span data-dcnode-id="4447" instrument_node="">As meditation helps to increase self understanding, your </span><b data-dcnode-id="4445"><span data-dcnode-id="4446" instrument_node="">awareness</span></b><span data-dcnode-id="4444" instrument_node=""> of other people’s vibes, energy, facial expressions, and body language becomes much more tuned. There are a few highly successful poker players (who often have advanced emotional intelligence) who </span><b data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">attribute their success</span></b><span data-dcnode-id="4441" instrument_node=""> to meditation.

</span><div class="text-box-stylin" data-dcnode-id="4175"><span data-dcnode-id="4176" instrument_node="">Not only do meditators often look decades younger than their actual age, but they also live much longer lives. Here, we take a look at the most fascinating age defying studies making news headlines, and how meditation freezes father time.</span></div><span data-dcnode-id="4174" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="4162"><span data-dcnode-id="4163" instrument_node="">With monumental health implications, meditation has been proven to naturally boost many highly beneficial brain chemicals while lowering those that are harmful. The benefits are staggering.</span></div></div></a><span data-dcnode-id="4159" instrument_node="">

</span><span data-dcnode-id="3885" instrument_node="">

</span><span data-dcnode-id="3881" instrument_node="">
</span><span data-dcnode-id="3879" instrument_node="">
</span><span data-dcnode-id="3877" instrument_node="">
</span><a data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/how-mindfulness-meditation-relieves-anxious-thoughts-mind-chatter/"><div class="white-outermost" data-dcnode-id="3870" style="height: 343px;"><span data-dcnode-id="3876" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3875" data-src="" id="inner_tab_a3" style="height: 108.08px;"><span data-dcnode-id="3874" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">Scientists estimate the number of human thoughts at around 70,000 per day, meaning a worried, anxious mind can literally generate a new negative thought every couple of seconds! Luckily, meditation quiets the mind beautifully.</span></div><span data-dcnode-id="3871" instrument_node="">
</span></div></a><span data-dcnode-id="3868" instrument_node="">
</span><span data-dcnode-id="3866" instrument_node="">
</span><span data-dcnode-id="3864" instrument_node="">
</span><a data-dcnode-id="3856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/how-meditation-relieves-anxiety-gaba-serotonin-neurotransmitters/"><div class="white-outermost" data-dcnode-id="3857" style="height: 343px;"><span data-dcnode-id="3863" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3862" data-src="" id="inner_tab_a4" style="height: 108.08px;"><span data-dcnode-id="3861" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">Between your magnificently complex brain's 100 billion neurons are a web-like network of "neurotransmitters." When levels run on empty, our stress defense shield drops — making us highly vulnerable to anxiety. Crank them up with meditation.</span></div><span data-dcnode-id="3858" instrument_node="">
</span></div></a><span data-dcnode-id="3855" instrument_node="">
</span><span data-dcnode-id="3853" instrument_node="">
</span><span data-dcnode-id="3851" instrument_node="">
</span><a data-dcnode-id="3843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/the-wandering-mind-how-meditation-conquers-anxiety-distraction/"><div class="white-outermost" data-dcnode-id="3844" style="height: 343px;"><span data-dcnode-id="3850" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3849" data-src="" id="inner_tab_a5" style="height: 108.08px;"><span data-dcnode-id="3848" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3846"><span data-dcnode-id="3847" instrument_node="">A recent study revealed that people were happiest when in a kind of fully immersed, deeply absorbed, present mind state. With our attention spans lower than ever, anxiety levels are higher than ever. Return to the present with meditation.</span></div><span data-dcnode-id="3845" instrument_node="">
</span></div></a><span data-dcnode-id="3842" instrument_node="">
</span><span data-dcnode-id="3840" instrument_node="">
</span><span data-dcnode-id="3838" instrument_node="">
</span><a data-dcnode-id="3830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/cortisol-how-meditation-extinguishes-inflammation-anxiety-stress/"><div class="white-outermost" data-dcnode-id="3831" style="height: 343px;"><span data-dcnode-id="3837" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3836" data-src="" id="inner_tab_a6" style="height: 108.08px;"><span data-dcnode-id="3835" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">Like a wildfire, inflammation can fan its flames into something very big. Chronic inflammation, especially within the brain, is a self perpetuating, highly toxic condition — perfect for anxiety to proliferate. Extinguish it with meditation.</span></div><span data-dcnode-id="3832" instrument_node="">
</span></div></a><span data-dcnode-id="3829" instrument_node="">
</span><span data-dcnode-id="3827" instrument_node="">
</span><span data-dcnode-id="3825" instrument_node="">
</span><a data-dcnode-id="3817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/the-caveman-brain-amygdala-how-meditation-relieves-anxiety-fear/"><div class="white-outermost" data-dcnode-id="3818" style="height: 343px;"><span data-dcnode-id="3824" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3823" data-src="" id="inner_tab_a7" style="height: 108.08px;"><span data-dcnode-id="3822" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3820"><span data-dcnode-id="3821" instrument_node="">All of us require food, warmth, water, and sleep. But, is it also built into human DNA to crave doom &amp; gloom? Is being afraid &amp; worrying all the time human nature or did we get here through nurture? Here's how meditation deactivates fear.</span></div><span data-dcnode-id="3819" instrument_node="">
</span></div></a><span data-dcnode-id="3816" instrument_node="">
</span><span data-dcnode-id="3814" instrument_node="">
</span><span data-dcnode-id="3812" instrument_node="">
</span><a data-dcnode-id="3804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/prefrontal-cortex-how-meditation-relieves-anxiety-builds-the-brain/"><div class="white-outermost" data-dcnode-id="3805" style="height: 343px;"><span data-dcnode-id="3811" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3810" data-src="" id="inner_tab_a9" style="height: 108.08px;"><span data-dcnode-id="3809" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">From dark caves to sunlit skyscrapers, from incoherent grunting to the world wide web, from muddy riverbanks to the far reaches of the solar system, we owe everything to our prefrontal cortex. How meditation builds it up, destroys anxiety.</span></div><span data-dcnode-id="3806" instrument_node="">
</span></div></a><span data-dcnode-id="3803" instrument_node="">
</span><span data-dcnode-id="3801" instrument_node="">
</span><span data-dcnode-id="3799" instrument_node="">
</span><a data-dcnode-id="3791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/how-mindful-meditation-tames-the-anxious-monkey-mind/"><div class="white-outermost" data-dcnode-id="3792" style="height: 343px;"><span data-dcnode-id="3798" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3797" data-src="" id="inner_tab_a10" style="height: 108.08px;"><span data-dcnode-id="3796" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">It's been said that the human mind is like a room full of monkeys, jumping around, chattering endlessly, carrying on all day &amp; night. The loudest of them all is fear, their highly influential troop leader. Here's how meditation tames them.</span></div><span data-dcnode-id="3793" instrument_node="">
</span></div></a><span data-dcnode-id="3790" instrument_node="">
</span><span data-dcnode-id="3788" instrument_node="">
</span><span data-dcnode-id="3786" instrument_node="">
</span><a data-dcnode-id="3778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/the-relaxation-response-how-meditation-relieves-anxiety-stress/"><div class="white-outermost" data-dcnode-id="3779" style="height: 343px;"><span data-dcnode-id="3785" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3784" data-src="" id="inner_tab_a11" style="height: 108.08px;"><span data-dcnode-id="3783" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">Times are stressful. The mounting career, relationship, &amp; family commitments we face makes living in this chaotic world all the more difficult. Pile on our connected devices, &amp; only a master can maintain a calm mind. Unless you meditate.</span></div><span data-dcnode-id="3780" instrument_node="">
</span></div></a><span data-dcnode-id="3777" instrument_node="">
</span><span data-dcnode-id="3775" instrument_node="">
</span><span data-dcnode-id="3773" instrument_node="">
</span><a data-dcnode-id="3765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/alpha-theta-delta-brainwaves-how-meditation-relieves-anxiety/"><div class="white-outermost" data-dcnode-id="3766" style="height: 343px;"><span data-dcnode-id="3772" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3771" data-src="" id="inner_tab_a12" style="height: 108.08px;"><span data-dcnode-id="3770" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">Your whole essence as a human being, from your biological makeup to your thoughts, moods, &amp; emotions (especially anxiety) show within your brainwave patterns. How meditation soothes &amp; calms your anxious "beta" brainwaves.</span></div><span data-dcnode-id="3767" instrument_node="">
</span></div></a><span data-dcnode-id="3764" instrument_node="">
</span><span data-dcnode-id="3762" instrument_node="">
</span><span data-dcnode-id="3760" instrument_node="">
</span><a data-dcnode-id="3752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/meditation-boosts-your-gaba/"><div class="white-outermost" data-dcnode-id="3753" style="height: 343px;"><span data-dcnode-id="3759" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3758" data-src="" id="inner_tab_a13" style="height: 108.08px;"><span data-dcnode-id="3757" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">Not having enough of this "calm chemical" can create an array of problems, including anxiety, nervousness, racing thoughts, sleeplessness, and most of all: bad habits. Here's how meditation uncaps the firehose.</span></div><span data-dcnode-id="3754" instrument_node="">
</span></div></a><span data-dcnode-id="3751" instrument_node="">
</span><span data-dcnode-id="3749" instrument_node="">
</span><span data-dcnode-id="3747" instrument_node="">
</span><a data-dcnode-id="3739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/meditation-for-anger-how-it-can-help-you-manage-emotions/"><div class="white-outermost" data-dcnode-id="3740" style="height: 343px;"><span data-dcnode-id="3746" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3745" data-src="" id="inner_tab_a14" style="height: 108.08px;"><span data-dcnode-id="3744" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">We all know it. We have all felt it. Anger. For those of us with anger issues, our health, our work, our relationships, &amp; our whole quality of life are dictated by one supreme ruler. Here's why meditators stay cool &amp; calm no matter what.</span></div><span data-dcnode-id="3741" instrument_node="">
</span></div></a><span data-dcnode-id="3738" instrument_node="">
</span><span data-dcnode-id="3736" instrument_node="">
</span><span data-dcnode-id="3734" instrument_node="">
</span><a data-dcnode-id="3726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/how-meditation-reduces-your-ocd/"><div class="white-outermost" data-dcnode-id="3727" style="height: 343px;"><span data-dcnode-id="3733" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3732" data-src="" id="inner_tab_a15" style="height: 108.08px;"><span data-dcnode-id="3731" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3729"><span data-dcnode-id="3730" instrument_node="">When it comes to slaying Obsessive Compulsive Disorder (OCD), meditation is the proverbial magic bullet. Here, we discuss eight psychological and biological reasons meditation is the key to conquering this multilayered disease.</span></div><span data-dcnode-id="3728" instrument_node="">
</span></div></a><span data-dcnode-id="3725" instrument_node="">
</span><span data-dcnode-id="3723" instrument_node="">
</span><span data-dcnode-id="3721" instrument_node="">
</span><a data-dcnode-id="3713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/how-meditation-helps-those-with-bipolar-disorder/"><div class="white-outermost" data-dcnode-id="3714" style="height: 343px;"><span data-dcnode-id="3720" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3719" data-src="" id="inner_tab_a16" style="height: 108.08px;"><span data-dcnode-id="3718" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">An incredibly complex disease, Bipolar disorder has an interwoven variety of biological, psychological, and sociological contributing factors. From a variety of angles, we discuss how meditation neutralizes Bipolar disorder.</span></div><span data-dcnode-id="3715" instrument_node="">
</span></div></a><span data-dcnode-id="3712" instrument_node="">
</span><span data-dcnode-id="3710" instrument_node="">
</span><span data-dcnode-id="3708" instrument_node="">
</span></div><span data-dcnode-id="3706" instrument_node="">
</span><span data-dcnode-id="3703" instrument_node="">
</span><div data-dcnode-id="3564" id="innert_tab_content_3" style="display: none;"><span data-dcnode-id="3702" instrument_node="">
</span><span data-dcnode-id="3700" instrument_node="">
</span><span data-dcnode-id="3698" instrument_node="">
</span><a data-dcnode-id="3690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/how-meditation-balances-the-brain-hemispheres-boosts-creativity/"><div class="white-outermost" data-dcnode-id="3691" id="white_outermost_tab3" style="height: 343px;"><span data-dcnode-id="3697" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3696" data-src="" id="inner_tab_b1" style="height: 108.08px;"><span data-dcnode-id="3695" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3693"><span data-dcnode-id="3694" instrument_node="">Like a dominant hand, most of us heavily favor one side of our brain. Imaging studies have shown that highly successful, massively creative people use both brain halves in a much more integrated way. Balance your brain with meditation.</span></div><span data-dcnode-id="3692" instrument_node="">
</span></div></a><span data-dcnode-id="3689" instrument_node="">
</span><span data-dcnode-id="3687" instrument_node="">
</span><span data-dcnode-id="3685" instrument_node="">
</span><a data-dcnode-id="3677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/the-fortified-hippocampus-how-meditation-improves-memory/"><div class="white-outermost" data-dcnode-id="3678" style="height: 343px;"><span data-dcnode-id="3684" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3683" data-src="" id="inner_tab_b2" style="height: 108.08px;"><span data-dcnode-id="3682" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node="">We have all forgotten where we left our keys, blanked on a friend's name, or let a family member's birthday slip through the cracks. However, memory loss is not inevitable, meditation helps us stay sharp as a razor regardless of age.</span></div><span data-dcnode-id="3679" instrument_node="">
</span></div></a><span data-dcnode-id="3676" instrument_node="">
</span><span data-dcnode-id="3674" instrument_node="">
</span><span data-dcnode-id="3672" instrument_node="">
</span><a data-dcnode-id="3664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/caveman-to-astronaut-how-meditation-brightens-humanitys-future/"><div class="white-outermost" data-dcnode-id="3665" style="height: 343px;"><span data-dcnode-id="3671" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3670" data-src="" id="inner_tab_b3" style="height: 108.08px;"><span data-dcnode-id="3669" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">Our brains are still wired like cavemen. While modern cities are free of lions, tigers, &amp; bears — our job stress, money problems, &amp; relationship quarrels still trigger our fear response 8 days a week. How meditation "evolves" humanity.</span></div><span data-dcnode-id="3666" instrument_node="">
</span></div></a><span data-dcnode-id="3663" instrument_node="">
</span><span data-dcnode-id="3661" instrument_node="">
</span><span data-dcnode-id="3659" instrument_node="">
</span><a data-dcnode-id="3651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/prefrontal-cortex-how-meditation-forges-an-einstein-brain/"><div class="white-outermost" data-dcnode-id="3652" style="height: 343px;"><span data-dcnode-id="3658" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3657" data-src="" id="inner_tab_b4" style="height: 108.08px;"><span data-dcnode-id="3656" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3654"><span data-dcnode-id="3655" instrument_node="">As the brain's thought orchestrator, complex planner, deep thinker, &amp; high level decision maker, if all the brain regions held an election, the prefrontal cortex would be emperor. Like Einstein, meditation builds-up this brain region.</span></div><span data-dcnode-id="3653" instrument_node="">
</span></div></a><span data-dcnode-id="3650" instrument_node="">
</span><span data-dcnode-id="3648" instrument_node="">
</span><span data-dcnode-id="3646" instrument_node="">
</span><a data-dcnode-id="3638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/whole_brain_synchronization/"><div class="white-outermost" data-dcnode-id="3639" style="height: 343px;"><span data-dcnode-id="3645" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3644" data-src="" id="inner_tab_b5" style="height: 108.08px;"><span data-dcnode-id="3643" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">Meditation balances your left &amp; right brain hemispheres, resulting in what's called "whole brain synchronization." This opens the door to many amazing benefits: faster &amp; easier learning, excellent mental health, super creativity, &amp; more.</span></div><span data-dcnode-id="3640" instrument_node="">
</span></div></a><span data-dcnode-id="3637" instrument_node="">
</span><span data-dcnode-id="3635" instrument_node="">
</span><span data-dcnode-id="3633" instrument_node="">
</span><a data-dcnode-id="3625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/increase-your-intelligence-with-meditation/"><div class="white-outermost" data-dcnode-id="3626" style="height: 343px;"><span data-dcnode-id="3632" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3631" data-src="" id="inner_tab_b6" style="height: 108.08px;"><span data-dcnode-id="3630" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">Meditation increases intelligence in many ways: From making both brain hemispheres work together, to boosting memory, to increasing brain size, to enhancing emotional intelligence (EQ). Here are six ways meditation does the job.</span></div><span data-dcnode-id="3627" instrument_node="">
</span></div></a><span data-dcnode-id="3624" instrument_node="">
</span><span data-dcnode-id="3622" instrument_node="">
</span><span data-dcnode-id="3620" instrument_node="">
</span><a data-dcnode-id="3612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/the-neurogenesis-guide-how-meditation-changes-the-adult-brain/"><div class="white-outermost" data-dcnode-id="3613" style="height: 343px;"><span data-dcnode-id="3619" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3618" data-src="" id="inner_tab_b7" style="height: 108.08px;"><span data-dcnode-id="3617" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node="">Through a process called "Neurogenesis," doctors have discovered that our brain's "neuron count" is not set for life. Meditation’s well-proven ability to generate a "neuron fortune" has massive implications &amp; big benefits.</span></div><span data-dcnode-id="3614" instrument_node="">
</span></div></a><span data-dcnode-id="3611" instrument_node="">
</span><span data-dcnode-id="3609" instrument_node="">
</span><span data-dcnode-id="3607" instrument_node="">
</span><a data-dcnode-id="3599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/how-to-improve-your-memory/"><div class="white-outermost" data-dcnode-id="3600" style="height: 343px;"><span data-dcnode-id="3606" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3605" data-src="" id="inner_tab_b8" style="height: 108.08px;"><span data-dcnode-id="3604" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">Whether you're a college student cramming for exams, a career ladder climbing professional looking for that extra acuity, or a senior wishing to preserve your golden year mental faculties, meditation can improve your memory &amp; brain power.</span></div><span data-dcnode-id="3601" instrument_node="">
</span></div></a><span data-dcnode-id="3598" instrument_node="">
</span><span data-dcnode-id="3596" instrument_node="">
</span><span data-dcnode-id="3594" instrument_node="">
</span><a data-dcnode-id="3586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/how-to-focus-your-mind/"><div class="white-outermost" data-dcnode-id="3587" style="height: 343px;"><span data-dcnode-id="3593" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3592" data-src="" id="inner_tab_b9" style="height: 108.08px;"><span data-dcnode-id="3591" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">Living in the age of distraction, it's no surprise that our ability to concentrate has taken a dive. Thankfully, there is a time tested, bulletproof way to retrain &amp; refocus the mind that works for everybody. It's called meditation.</span></div><span data-dcnode-id="3588" instrument_node="">
</span></div></a><span data-dcnode-id="3585" instrument_node="">
</span><span data-dcnode-id="3583" instrument_node="">
</span><span data-dcnode-id="3581" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">Did you know that your brain power, intelligence, &amp; memory can be dramatically upgraded? Here, we discuss why scientists keep studying the marvelous meditating brain, and how you too can tap these awesome benefits.</span></div><span data-dcnode-id="3575" instrument_node="">

</span><span data-dcnode-id="3558" instrument_node="">
</span><a data-dcnode-id="3550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/how-meditation-affects-flow/"><div class="white-outermost" data-dcnode-id="3551" id="white_outermost_tab4" style="height: 343px;"><span data-dcnode-id="3557" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">Think back to a time when you experienced "flow." What were you doing? Did your sense of self fade into oblivion? Did time disappear? Did the world drop out of sight? Were your mind, body, &amp; soul fully absorbed? Do it again with meditation.</span></div><span data-dcnode-id="3552" instrument_node="">

</span><a data-dcnode-id="3537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/the-compassionate-brain-how-meditation-us-kinder-happier/"><div class="white-outermost" data-dcnode-id="3538" style="height: 343px;"><span data-dcnode-id="3544" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">It is when we help our fellow man, when we feel connected, when we give, when we are kind, and when we see people as "other-selves" instead of "others" — that life takes on meaning &amp; purpose. Become kind &amp; compassionate with meditation.</span></div><span data-dcnode-id="3539" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">To be a happy &amp; healthy human, it's obvious that we need to sleep well, eat right, &amp; exercise. However, very few of us realize just how important "human connectedness" is to our well-being. Here's how meditation conquers loneliness.</span></div><span data-dcnode-id="3526" instrument_node="">

</span><span data-dcnode-id="3521" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">Thoughts are just thoughts, right? The truth is, the polarity, nature, &amp; quality of our thoughts deeply intertwine with our physical reality (health, career, success, relationships, etc). Charge your positive thoughts with meditation.</span></div><span data-dcnode-id="3513" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3501"><span data-dcnode-id="3502" instrument_node="">Often called the "happy" neurotransmitter, serotonin is key to relaying signals from one part of the brain to another. This crucial chemical has a profound impact on our mood &amp; overall well-being. Open the floodgates with meditation.</span></div><span data-dcnode-id="3500" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3488"><span data-dcnode-id="3489" instrument_node="">Life unfolds in the present. The problem is, like a monkey swinging from tree branch to tree branch, the human mind's tendency to jump from thought to thought has made us lose touch with the "now." How meditation trains us to be present.</span></div><span data-dcnode-id="3487" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3465"><span data-dcnode-id="3466" instrument_node="">Powerful CEOs, famous Hollywood actors, bestselling authors, well-known media personalities, top military rank, high level creatives, professional athletes, and even billionaires say meditation is the secret to their success.</span></div><span data-dcnode-id="3464" instrument_node="">

</span><a data-dcnode-id="3449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/boosting-willpower-self-discipline/"><div class="white-outermost" data-dcnode-id="3450" style="height: 343px;"><span data-dcnode-id="3456" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3455" data-src="" id="inner_tab_d2" style="height: 108.08px;"><span data-dcnode-id="3454" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">Without the willpower to put in the hard yards today, the dream of a better tomorrow will always be just that. A dream. Luckily, willpower is never set in stone. All the great ones had it, you can too. Become "willpowerful" with meditation.</span></div><span data-dcnode-id="3451" instrument_node="">
</span></div></a><span data-dcnode-id="3448" instrument_node="">
</span><span data-dcnode-id="3446" instrument_node="">

</span><a data-dcnode-id="3436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/benefits-of-meditation-for-creativity/"><div class="white-outermost" data-dcnode-id="3437" style="height: 343px;"><span data-dcnode-id="3443" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">The world needs creativity. Books don't author themselves. Inventions don't invent themselves. Technology doesn't innovate itself. Luckily, we are creative by nature. It's in our genes. It's in our brains. Awaken yours with meditation.</span></div><span data-dcnode-id="3438" instrument_node="">
</span></div></a><span data-dcnode-id="3435" instrument_node="">
</span><span data-dcnode-id="3433" instrument_node="">
</span><span data-dcnode-id="3431" instrument_node="">
</span><a data-dcnode-id="3423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/the-ultimate-guide-to-focus-motivation/"><div class="white-outermost" data-dcnode-id="3424" style="height: 343px;"><span data-dcnode-id="3430" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3429" data-src="" id="inner_tab_d4" style="height: 108.08px;"><span data-dcnode-id="3428" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">History is full of people who, in the face of failure, diversion, &amp; distraction, stayed the course anyway, achieving their dreams regardless of what's in their path. Here's how meditation can make us highly focused &amp; motivated.</span></div><span data-dcnode-id="3425" instrument_node="">

</span><a data-dcnode-id="3408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/develop-your-intuition-through-meditation/"><div class="white-outermost" data-dcnode-id="3409" style="height: 343px;"><span data-dcnode-id="3417" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node="">The world's most successful people often say that "intuition" is far more powerful than intellect and their #1 decision-making tool. Here's how meditation magnifies this mega-important sixth sense.</span></div><span data-dcnode-id="3410" instrument_node="">
</span></div></a><span data-dcnode-id="3407" instrument_node="">

</span><span data-dcnode-id="3403" instrument_node="">
</span><a data-dcnode-id="3395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/the-ultimate-guide-to-grit-mental-toughness/"><div class="white-outermost" data-dcnode-id="3396" style="height: 343px;"><span data-dcnode-id="3402" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">Dominating headlines with her viral 14+ million view TED Talk and bestselling book, a world famous psychologist makes the compelling case for "mental toughness" as successful people's real superpower. Get "Gritty" with meditation.</span></div><span data-dcnode-id="3397" instrument_node="">

</span><span data-dcnode-id="3392" instrument_node="">
</span><span data-dcnode-id="3390" instrument_node="">
</span><a data-dcnode-id="3382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/ultimate-guide-to-adaptability-fluid-intelligence/"><div class="white-outermost" data-dcnode-id="3383" style="height: 343px;"><span data-dcnode-id="3389" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3388" data-src="" id="inner_tab_d7" style="height: 108.08px;"><span data-dcnode-id="3387" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3385"><span data-dcnode-id="3386" instrument_node="">Whether dropped on a deserted island or elevated to the helm of a startup, with their uncanny ability to navigate uncertainty — people with high fluid intelligence always find a way to thrive. Become "fluidly intelligent" with meditation.</span></div><span data-dcnode-id="3384" instrument_node="">

</span><img class="img-stylin lazyload" data-dcnode-id="3375" data-src="" id="inner_tab_d8" style="height: 108.08px;"><span data-dcnode-id="3374" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">People with high "EQ" are masters of work &amp; play. They usually have prosperous careers, fulfilling relationships, &amp; tons of friends. They are often generous, empathic, with the ability to love &amp; be loved. Here's how meditation rockets EQ.</span></div><span data-dcnode-id="3371" instrument_node="">

</span><span data-dcnode-id="3356" instrument_node="">
</span><span data-dcnode-id="3354" instrument_node="">
</span><a data-dcnode-id="3346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/how-to-harness-your-subconscious-mind-power/"><div class="white-outermost" data-dcnode-id="3347" id="white_outermost_tab6" style="height: 343px;"><span data-dcnode-id="3353" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3352" data-src="" id="inner_tab_e1" style="height: 108.08px;"><span data-dcnode-id="3351" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">Your subconscious &amp; unconscious mind are incredibly powerful. Here we show you the vast benefits waiting under the surface, and how meditation is the best way to dive in, explore, and harness your deep mind. See detailed chart.</span></div><span data-dcnode-id="3348" instrument_node="">
</span></div></a><span data-dcnode-id="3345" instrument_node="">
</span><span data-dcnode-id="3343" instrument_node="">

</span><a data-dcnode-id="3333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/meditation-and-dreams-center-yourself-and-lucid-dream-to-your-hearts-content/"><div class="white-outermost" data-dcnode-id="3334" style="height: 343px;"><span data-dcnode-id="3340" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">What if there was a better way to enter the lucid dream alternate reality, where there are no rules, no fears, no inhibitions, &amp; no doubts? Where literally anything is possible? Play on the universe's coolest playground with meditation.</span></div><span data-dcnode-id="3335" instrument_node="">
</span></div></a><span data-dcnode-id="3332" instrument_node="">
</span><span data-dcnode-id="3330" instrument_node="">
</span><span data-dcnode-id="3328" instrument_node="">
</span><a data-dcnode-id="3320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/understand-the-law-of-attraction/"><div class="white-outermost" data-dcnode-id="3321" style="height: 343px;"><span data-dcnode-id="3327" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3326" data-src="" id="inner_tab_e3" style="height: 108.08px;"><span data-dcnode-id="3325" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">Did you know that, like a magnet, your attitudes, thoughts, expectations, &amp; beliefs attract everyone &amp; everything that enters into your life, both positive &amp; negative? The "law of attraction" is powerful. Harness it with meditation.</span></div><span data-dcnode-id="3322" instrument_node="">
</span></div></a><span data-dcnode-id="3319" instrument_node="">
</span><span data-dcnode-id="3317" instrument_node="">
</span><span data-dcnode-id="3315" instrument_node="">
</span><a data-dcnode-id="3307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/meditation-for-the-mind-how-meditation-affects-consciousness/"><div class="white-outermost" data-dcnode-id="3308" style="height: 343px;"><span data-dcnode-id="3314" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3313" data-src="" id="inner_tab_e4" style="height: 108.08px;"><span data-dcnode-id="3312" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">The nature &amp; origin of consciousness is life's greatest unanswered question. While science is still looking for a definitive explanation, it's clear that we can raise our own state of consciousness. What's the best way? Meditation.</span></div><span data-dcnode-id="3309" instrument_node="">
</span></div></a><span data-dcnode-id="3306" instrument_node="">
</span><span data-dcnode-id="3304" instrument_node="">

</span><a data-dcnode-id="3294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/we-are-all-one/"><div class="white-outermost" data-dcnode-id="3295" style="height: 343px;"><span data-dcnode-id="3301" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">The shift in consciousness achieved through meditation makes you aware of the highest &amp; perhaps most easily forgotten universal law — "We Are All One." Is there any surprise that history's greatest humanitarians often practiced meditation?</span></div><span data-dcnode-id="3296" instrument_node="">
</span></div></a><span data-dcnode-id="3293" instrument_node="">
</span><span data-dcnode-id="3291" instrument_node="">

</span><span data-dcnode-id="3281" instrument_node="">
</span><span data-dcnode-id="3279" instrument_node="">
</span><a data-dcnode-id="3271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/mindless-vs-mindful-eating-meditation-gives-you-power-over-food/"><div class="white-outermost" data-dcnode-id="3272" id="white_outermost_tab7" style="height: 343px;"><span data-dcnode-id="3278" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3277" data-src="" id="inner_tab_f1" style="height: 108.08px;"><span data-dcnode-id="3276" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">Mindless eating. We all do it. We shovel down food as quickly as possible, eat when we aren't hungry, eat bad foods, overeat, all without a second thought as to why. And it's making us fat. Luckily, mindful eating is natural for meditators.</span></div><span data-dcnode-id="3273" instrument_node="">
</span></div></a><span data-dcnode-id="3270" instrument_node="">
</span><span data-dcnode-id="3268" instrument_node="">
</span><span data-dcnode-id="3266" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">Layer after layer, when you peel an onion all the way, what's left? The core. Likewise, after stripping away the reasons we gain weight (poor diet, low motivation, no exercise, etc), what's at the root? The mind. Master it with meditation.</span></div><span data-dcnode-id="3260" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">Are you starving yourself to look like a ripped Hollywood movie star? Do the covers of GQ &amp; Vogue have you slaving away on the treadmill? If so, your weight loss efforts are apt to crash &amp; burn. Get intrinsic motivation. How? Meditation.</span></div><span data-dcnode-id="3247" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">Being infatuated with the scale, hating our body, &amp; thinking that life will be perfect once we are slim is often, ironically, the very reason we pile on more pounds. Yep, hating how fat we are makes us fatter. Love yourself with meditation.</span></div><span data-dcnode-id="3234" instrument_node="">

</span><span data-dcnode-id="3229" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">Conventional wisdom states that, when we get hit by food cravings, we have two options. We can either give in to the urge, or we can resist. Easy, right? Meditation unlocks a powerful third option. It’s called "urge surfing."</span></div><span data-dcnode-id="3221" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">Life sucks. Our endless responsibilities, dead end jobs, &amp; unhealthy relationships often make us feel like prisoners. With joy &amp; hope on fumes, we smother our emptiness, unhappiness, &amp; loneliness with food. Fill the void with meditation.</span></div><span data-dcnode-id="3208" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">While most of our body fat is the wiggly, jiggly kind that we can see &amp; pinch — there is an unseen, deeper, more sinister kind of fat which goes beyond simply making our favorite sweater a bit too snug. Meditation burns belly fat too? Yes!</span></div><span data-dcnode-id="3195" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">Instead of feeling our uncomfortable emotions, we turn to food. While filling-up our belly might make us feel better for a little while, it doesn't address the deeper reasons for overeating. Here's how meditation solves emotional eating.</span></div><span data-dcnode-id="3182" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">Stress is a fact of life. We all know this. But it goes further. In addition to making our heart race, stomach swirl, &amp; underarms sweat, stress can also make our weight go up. Real high. To the sky. Thankfully, meditation dissolves stress.</span></div><span data-dcnode-id="3169" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">Want to rejuvenate and restore your skin to pristine perfection? Of course, we all do! Look no further than meditation. With such overwhelming age-defying scientific evidence, it's easy to see why meditators so often look decades younger.</span></div><span data-dcnode-id="3146" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">Life ends at 80. That’s when, according to the latest data, we need to go coffin shoppin'. But, wouldn’t it be much better to live to 130? Well, according to an overwhelming number of studies, we can. Here's where meditation fits in.</span></div><span data-dcnode-id="3120" instrument_node="">

</span><span data-dcnode-id="3115" instrument_node="">

</span><a data-dcnode-id="3105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/telomerase-achieve-lobster-immortality-with-meditation/"><div class="white-outermost" data-dcnode-id="3106" style="height: 343px;"><span data-dcnode-id="3112" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">Lobsters are biologically immortal. That is, they don’t die from old age like we do. So, how are lobsters "immune" to aging while the rest of the animal kingdom, including us, withers away, DNA into dust? How meditation "lobsterfies" aging.</span></div><span data-dcnode-id="3107" instrument_node="">

</span><span data-dcnode-id="3102" instrument_node="">

</span><a data-dcnode-id="3092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/long-telomeres-how-meditation-slows-aging-extends-life/"><div class="white-outermost" data-dcnode-id="3093" style="height: 343px;"><span data-dcnode-id="3099" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3098" data-src="" id="inner_tab_g5" style="height: 108.08px;"><span data-dcnode-id="3097" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">Telomere shortening can, like a rock star living life in the fast lane, make us age hard and fast even if we are nowhere near over the hill. Learn how meditation's telomere lengthening effectively checkmates father time and mother stress.</span></div><span data-dcnode-id="3094" instrument_node="">
</span></div></a><span data-dcnode-id="3091" instrument_node="">

</span><a data-dcnode-id="3079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/sirt1-how-meditation-taps-resveratrols-benefits-longevity/"><div class="white-outermost" data-dcnode-id="3080" style="height: 343px;"><span data-dcnode-id="3086" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3082"><span data-dcnode-id="3083" instrument_node="">We've all seen the headlines, a glass a day can extend your life. So, what’s the magic ingredient in this crimson colored superfood? And how can meditation allow us to reap the same life lengthening benefits?</span></div><span data-dcnode-id="3081" instrument_node="">

</span><a data-dcnode-id="3066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/bdnf-how-meditation-prevents-alzheimers-disease-dementia/"><div class="white-outermost" data-dcnode-id="3067" style="height: 343px;"><span data-dcnode-id="3073" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3072" data-src="" id="inner_tab_g7" style="height: 108.08px;"><span data-dcnode-id="3071" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">To the human brain, father time is the cartoon bully. But instead of losing a few lunch money coins here and there, father time’s shakedowns are relentless, robbing a tiny fraction of our precious brain resources every moment of every day.</span></div><span data-dcnode-id="3068" instrument_node="">

</span><a data-dcnode-id="3053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/how-meditation-boosts-your-dhea-levels/"><div class="white-outermost" data-dcnode-id="3054" style="height: 343px;"><span data-dcnode-id="3060" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3059" data-src="" id="inner_tab_g8" style="height: 108.08px;"><span data-dcnode-id="3058" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">As we get older, one key hormone decreases year after year, speeding up the hands of time, opening the door to disease, and much more. Luckily, there is a time-tested way to boost this super longevity molecule. It's called meditation.</span></div><span data-dcnode-id="3055" instrument_node="">

</span><img class="img-stylin lazyload" data-dcnode-id="3046" data-src="" id="inner_tab_g9" style="height: 108.08px;"><span data-dcnode-id="3045" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">Man has sought the elusive "fountain of youth" since the dawn of time. While we don't believe in mythical "stay young forever" potions like our ancestors once did, one magic molecule is making a very strong case. Swim in it with meditation.</span></div><span data-dcnode-id="3042" instrument_node="">

</span><span data-dcnode-id="3025" instrument_node="">
</span><a data-dcnode-id="3017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/how-the-iceman-wim-hof-harnesses-meditation-for-super-immunity/"><div class="white-outermost" data-dcnode-id="3018" id="white_outermost_tab9" style="height: 343px;"><span data-dcnode-id="3024" instrument_node="">

</span><div class="text-box-stylin" data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">Now a living legend, news of the "Iceman's" jaw-dropping feats have spread far &amp; wide. A holder of 25+ Guinness World Records, the 60 year old dutch meditator is famous for his ability to withstand the extreme cold.</span></div><span data-dcnode-id="3019" instrument_node="">
</span></div></a><span data-dcnode-id="3016" instrument_node="">
</span><span data-dcnode-id="3014" instrument_node="">
</span><span data-dcnode-id="3012" instrument_node="">
</span><a data-dcnode-id="3004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/the-cell-membrane-how-meditative-thoughts-heal-both-mind-body/"><div class="white-outermost" data-dcnode-id="3005" style="height: 343px;"><span data-dcnode-id="3011" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="3010" data-src="" id="inner_tab_h2" style="height: 108.08px;"><span data-dcnode-id="3009" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">Your body is a "community" of 50 trillion living cells. When your cells are in harmony, you're healthy. In disharmony, disease can manifest. Here's how meditation heals at the molecular level, while helping to create a "cellular utopia."</span></div><span data-dcnode-id="3006" instrument_node="">
</span></div></a><span data-dcnode-id="3003" instrument_node="">
</span><span data-dcnode-id="3001" instrument_node="">
</span><span data-dcnode-id="2999" instrument_node="">
</span><a data-dcnode-id="2991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/how-meditation-boosts-immunity-t-cells-antibodies-slows-aidshiv/"><div class="white-outermost" data-dcnode-id="2992" style="height: 343px;"><span data-dcnode-id="2998" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="2997" data-src="" id="inner_tab_h3" style="height: 108.08px;"><span data-dcnode-id="2996" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">What if you could train your body to, like a fully loaded Mack truck, run over any bacteria, virus, or germ crossing your interstate? You can! Here's how meditation drafts more "antibodies" &amp; "T-cells" to your immune system's front line.</span></div><span data-dcnode-id="2993" instrument_node="">
</span></div></a><span data-dcnode-id="2990" instrument_node="">
</span><span data-dcnode-id="2988" instrument_node="">
</span><span data-dcnode-id="2986" instrument_node="">
</span><a data-dcnode-id="2978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eocinstitute.org/meditation/beyond-probiotics-how-meditation-heals-the-gut-brain-axis-stress/"><div class="white-outermost" data-dcnode-id="2979" style="height: 343px;"><span data-dcnode-id="2985" instrument_node="">
</span><img class="img-stylin lazyload" data-dcnode-id="2984" data-src="" id="inner_tab_h4" style="height: 108.08px;"><span data-dcnode-id="2983" instrument_node="">
</span><div class="text-box-stylin" data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">Doctors now say that our deeply intertwined "first" real brain &amp; "second" gut brain are actually one system, not two. Here's how meditation's incredible brain benefits can transform your microbiome — and ultimately, your health.</span></div><span data-dcnode-id="2980" instrument_node="">
