</span><div class="entry-content" data-dcnode-id="1115"><span data-dcnode-id="3172" instrument_node="">
</span><p data-dcnode-id="3167"><img alt="EQ at work" class="alignright wp-image-24131 size-medium lazyloaded" data-dcnode-id="3171" data-src="https://positivepsychology.com/wp-content/uploads/Emotional-Intelligence-in-the-Workplace-e1610095113854-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/Emotional-Intelligence-in-the-Workplace-e1610095113854-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/Emotional-Intelligence-in-the-Workplace-e1610095113854-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/Emotional-Intelligence-in-the-Workplace-e1610095113854.jpg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/wp-content/uploads/Emotional-Intelligence-in-the-Workplace-e1610095113854-300x150.jpg&amp;raw" srcset="https://positivepsychology.com/wp-content/uploads/Emotional-Intelligence-in-the-Workplace-e1610095113854-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/Emotional-Intelligence-in-the-Workplace-e1610095113854-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/Emotional-Intelligence-in-the-Workplace-e1610095113854.jpg 800w" title="EQ at work" width="300"><noscript data-dcnode-id="3169"><span data-dcnode-id="3170" instrument_node="">&lt;img class="alignright wp-image-24131 size-medium lazyload" title="EQ at work" src="https://positivepsychology.com/wp-content/uploads/Emotional-Intelligence-in-the-Workplace-e1610095113854-300x150.jpg" alt="EQ at work" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/Emotional-Intelligence-in-the-Workplace-e1610095113854-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/Emotional-Intelligence-in-the-Workplace-e1610095113854-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/Emotional-Intelligence-in-the-Workplace-e1610095113854.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="3168" instrument_node="">If you’ve heard a lot about emotional intelligence but you’re not sure what the hype is, or if you know what it is but doesn’t see how it really applies in the workplace, you’ve come to the right place.</span></p><span data-dcnode-id="3166" instrument_node="">
</span><p data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">In this piece, we’ll define emotional intelligence in the context of the workplace, describe its components, explore its correlates in the workplace, and look at how to improve it for both individual employees (including yourself) and the organization as a whole.</span></p><span data-dcnode-id="3163" instrument_node="">
</span><p data-dcnode-id="3155"><span data-dcnode-id="3162" instrument_node="">Before you read on, we thought you might like to </span><a data-dcnode-id="3160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/ei-exercises" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3161" instrument_node="">download our 3 Emotional Intelligence Exercises for free</span></a><span data-dcnode-id="3159" instrument_node="">. These science-based exercises will not only enhance your ability to </span><a data-dcnode-id="3157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/understanding-emotions/"><span data-dcnode-id="3158" instrument_node="">understand and work with your emotions</span></a><span data-dcnode-id="3156" instrument_node=""> but will also give you the tools to foster the emotional intelligence of your clients, students, or employees.</span></p><span data-dcnode-id="3154" instrument_node="">
</span><p data-dcnode-id="3149"><span data-dcnode-id="3153" instrument_node="">You can download the free PDF </span><a data-dcnode-id="3151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/ei-exercises" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3152" instrument_node="">here</span></a><span data-dcnode-id="3150" instrument_node="">.</span></p><span data-dcnode-id="3148" instrument_node="">

</span><li data-dcnode-id="3092"><a data-dcnode-id="3093" href="#home"><span data-dcnode-id="3094" instrument_node="">A Take-Home Message</span></a></li><span data-dcnode-id="3091" instrument_node="">
</span><li data-dcnode-id="3088"><a data-dcnode-id="3089" href="#references"><span data-dcnode-id="3090" instrument_node="">References</span></a></li><span data-dcnode-id="3087" instrument_node="">

</span><p data-dcnode-id="3081"><a data-dcnode-id="3082" name="What-is-EI"></a></p><span data-dcnode-id="3080" instrument_node="">
</span><h2 data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">What is Emotional Intelligence in the Workplace? (Definition + Concept)</span></h2><span data-dcnode-id="3077" instrument_node="">
</span><p data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">First, let’s get a baseline on what emotional intelligence is. Emotional intelligence (shortened to EI or EQ for emotional quotient) can be defined as:</span></p><span data-dcnode-id="3074" instrument_node="">
</span><blockquote data-dcnode-id="3071"><p data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">“EQ refers to someone’s ability to perceive, understand and manage their own feelings and emotions”</span></p></blockquote><span data-dcnode-id="3070" instrument_node="">
</span><p data-dcnode-id="3068" style="text-align: right;"><span data-dcnode-id="3069" instrument_node="">(Chignell, 2018).</span></p><span data-dcnode-id="3067" instrument_node="">
</span><p data-dcnode-id="3065"><span data-dcnode-id="3066" instrument_node="">Further, there are five distinct components of EI:</span></p><span data-dcnode-id="3064" instrument_node="">
</span><ol data-dcnode-id="3047"><span data-dcnode-id="3063" instrument_node="">
</span><li data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">Self-awareness</span></li><span data-dcnode-id="3060" instrument_node="">
</span><li data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node="">Self-regulation</span></li><span data-dcnode-id="3057" instrument_node="">
</span><li data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">Internal (or intrinsic) motivation</span></li><span data-dcnode-id="3054" instrument_node="">
</span><li data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">Empathy</span></li><span data-dcnode-id="3051" instrument_node="">
</span><li data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">Social skills</span></li><span data-dcnode-id="3048" instrument_node="">
</span></ol><span data-dcnode-id="3046" instrument_node="">
</span><p data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">From a glance at these components, it’s easy to see how EI applies in the workplace! Clearly workers with higher in self-regulation, intrinsic motivation, and social skills have a leg up on those with less. We’ll go over some of the reasons why this is so later in this piece.</span></p><span data-dcnode-id="3043" instrument_node="">
</span><p data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3040" instrument_node="">
</span><h3 data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">Daniel Goleman on EI in the Workplace</span></h3><span data-dcnode-id="3037" instrument_node="">
</span><p data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">EI was first defined and established as a construct in psychology back in the 1990s, but interest in it has grown exponentially since then-especially in its application in the workplace. Emotional intelligence expert Daniel Goleman shares his view on why there is so much interest on EI/EQ in the workplace:</span></p><span data-dcnode-id="3034" instrument_node="">
</span><blockquote data-dcnode-id="3031"><p data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">“The interest in emotional intelligence in the workplace stems from the widespread recognition that these abilities – self-awareness, self-management, empathy and social skill – separate the most successful workers and leaders from the average. This is especially true in roles like the professions and higher level executives, where everyone is about as smart as everyone else, and how people manage themselves and their relationships gives the best and edge.”</span></p></blockquote><span data-dcnode-id="3030" instrument_node="">
</span><p data-dcnode-id="3028" style="text-align: right;"><span data-dcnode-id="3029" instrument_node="">(Goleman, 2012).</span></p><span data-dcnode-id="3027" instrument_node="">
</span><p data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3024" instrument_node="">
</span><h3 data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">Why is Developing EQ Important in the Workplace?</span></h3><span data-dcnode-id="3021" instrument_node="">
</span><p data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">Emotional intelligence is a vital consideration in the workplace for many reasons, but there are two that really stick out:</span></p><span data-dcnode-id="3018" instrument_node="">
</span><ol data-dcnode-id="3008"><span data-dcnode-id="3017" instrument_node="">
</span><li data-dcnode-id="3013"><span data-dcnode-id="3016" instrument_node="">It is linked to higher job satisfaction for those with high EI/EQ as well as employees who work with or are managed by those with high EI/EQ.</span><br data-dcnode-id="3015"><br data-dcnode-id="3014"></li><span data-dcnode-id="3012" instrument_node="">
</span><li data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">It is strongly associated with job performance.</span></li><span data-dcnode-id="3009" instrument_node="">
</span></ol><span data-dcnode-id="3007" instrument_node="">
</span><p data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3004" instrument_node="">
</span><h3 data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">A Look at Emotional Intelligence and Job Satisfaction</span></h3><span data-dcnode-id="3001" instrument_node="">
</span><p data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">It’s well-known that emotional intelligence is related to job satisfaction. Employees who are high in EI/EQ also tend to be higher in job satisfaction, as many studies have shown:</span></p><span data-dcnode-id="2998" instrument_node="">
</span><ul data-dcnode-id="2983"><span data-dcnode-id="2997" instrument_node="">
</span><li data-dcnode-id="2993"><span data-dcnode-id="2996" instrument_node="">Çekmecelioğlu and colleagues studied nearly 150 call center employees in Istanbul and found a significant positive relationship between EI/EQ and internal job satisfaction (2012).</span><br data-dcnode-id="2995"><br data-dcnode-id="2994"></li><span data-dcnode-id="2992" instrument_node="">
</span><li data-dcnode-id="2988"><span data-dcnode-id="2991" instrument_node="">Similarly, high EI/EQ (specifically high self-awareness) is negatively related to burnout and positively related to job satisfaction in people who work in the public sector (Lee, 2017).</span><br data-dcnode-id="2990"><br data-dcnode-id="2989"></li><span data-dcnode-id="2987" instrument_node="">
</span><li data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">Ghanian nurses who were higher in emotional intelligence also enjoyed higher job satisfaction (Tagoe &amp; Quarshie, 2017).</span></li><span data-dcnode-id="2984" instrument_node="">
</span></ul><span data-dcnode-id="2982" instrument_node="">
</span><p data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2979" instrument_node="">
</span><h3 data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">How can Emotional Intelligence Improve Job Performance?</span></h3><span data-dcnode-id="2976" instrument_node="">
</span><p data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">In addition to contributing to greater happiness and satisfaction in employees, higher emotional intelligence also contributes to better job performance.</span></p><span data-dcnode-id="2973" instrument_node="">
</span><ul data-dcnode-id="2955"><span data-dcnode-id="2972" instrument_node="">
</span><li data-dcnode-id="2965"><span data-dcnode-id="2971" instrument_node="">Researchers found that </span><a data-dcnode-id="2969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/emotional-intelligence-training/"><span data-dcnode-id="2970" instrument_node="">emotional intelligence training</span></a><span data-dcnode-id="2968" instrument_node=""> boosted employee productivity and resulted in better evaluations from management (Hosseinian et al., 2008).</span><br data-dcnode-id="2967"><br data-dcnode-id="2966"></li><span data-dcnode-id="2964" instrument_node="">
</span><li data-dcnode-id="2960"><span data-dcnode-id="2963" instrument_node="">Teachers with higher emotional intelligence also generally perform better in their jobs (Mohamad &amp; Jais, 2016).</span><br data-dcnode-id="2962"><br data-dcnode-id="2961"></li><span data-dcnode-id="2959" instrument_node="">
</span><li data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">A 2017 study by Pekaar and colleagues showed that emotional intelligence is significantly correlated with job performance, particularly the EI/EQ components of recognizing and managing the emotions of the self and others.</span></li><span data-dcnode-id="2956" instrument_node="">
</span></ul><span data-dcnode-id="2954" instrument_node="">
</span><p data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">You might be thinking, “How does emotional intelligence have such an impact on job performance?” Through these seven traits and characteristics:</span></p><span data-dcnode-id="2951" instrument_node="">
</span><ol data-dcnode-id="2928"><span data-dcnode-id="2950" instrument_node="">
</span><li data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">Emotional stability (greater ability to manage their own emotions and tolerate stress)</span></li><span data-dcnode-id="2947" instrument_node="">
</span><li data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">Conscientiousness (tendency to be diligent, hardworking, control impulses)</span></li><span data-dcnode-id="2944" instrument_node="">
</span><li data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">Extraversion (personality trait that makes people more open and better at establishing relationships with others)</span></li><span data-dcnode-id="2941" instrument_node="">
</span><li data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">Ability EI (individuals’ ability to perform emotion-related behaviors, like expressing emotions, empathizing with others, and combine emotion with reasoning)</span></li><span data-dcnode-id="2938" instrument_node="">
</span><li data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">Cognitive ability (IQ; studies suggest there is at least some overlap between the IQ and EQ)</span></li><span data-dcnode-id="2935" instrument_node="">
</span><li data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">General self-efficacy (confidence in the ability to cope with the demands of our job)</span></li><span data-dcnode-id="2932" instrument_node="">
</span><li data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">Self-rated job performance (Bailey, 2015).</span></li><span data-dcnode-id="2929" instrument_node="">
</span></ol><span data-dcnode-id="2927" instrument_node="">
</span><p data-dcnode-id="2922"><span data-dcnode-id="2926" instrument_node="">To get a better handle on understanding the importance of emotional intelligence, let’s move on to some </span><a data-dcnode-id="2924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/emotional-intelligence-examples/"><span data-dcnode-id="2925" instrument_node="">examples of emotional intelligence</span></a><span data-dcnode-id="2923" instrument_node="">.</span></p><span data-dcnode-id="2921" instrument_node="">
</span><p data-dcnode-id="2919"><a data-dcnode-id="2920" name="examples-of-EI"></a></p><span data-dcnode-id="2918" instrument_node="">
</span><p data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2915" instrument_node="">
</span><h2 data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">7 Examples of High and Low EQ at Work</span></h2><span data-dcnode-id="2912" instrument_node="">
</span><p data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">We know that high EI/EQ in the workplace is an advantage, but how do we know it when we see it? What does it look like?</span></p><span data-dcnode-id="2909" instrument_node="">
</span><p data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">Here are some good examples of high vs. low EI/EQ at work from emotional intelligence coach Ush Dhanak:</span></p><span data-dcnode-id="2906" instrument_node="">
</span><p data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2903" instrument_node="">
</span><h3 data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">1. An Upset Employee Finds a Compassionate Ear</span></h3><span data-dcnode-id="2900" instrument_node="">
</span><p data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">We all get moody sometimes, even at work. How a person deals with her coworkers or employees when they are having a bad day is a good indication about her EI/EQ level.</span></p><span data-dcnode-id="2897" instrument_node="">
</span><p data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">If she doesn’t even notice the moodiness, ignores the employee, exacerbates the bad mood, or criticizes the employee and tells them to “snap out of it,” she probably has low EI/EQ. If, on the other hand, she notices that something’s up, offers her employee compassion and understanding, and tries to cheer the employee up or distract them from their woes, that’s a great indicator that she has high EI/EQ.</span></p><span data-dcnode-id="2894" instrument_node="">
</span><p data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2891" instrument_node="">
</span><h3 data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">2. People Listen to Each Other in Meetings</span></h3><span data-dcnode-id="2888" instrument_node="">
</span><p data-dcnode-id="2886"><span data-dcnode-id="2887" instrument_node="">Unfortunately, not all meetings are positive and productive; sometimes meetings can devolve into everyone talking at once, no one offering any input at all, or-worst of all-shouting and heated arguments.</span></p><span data-dcnode-id="2885" instrument_node="">
</span><p data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">If an employee contributes to any of the above in a meeting, he is displaying low emotional intelligence. If he allows others to have their say, listens attentively and refrains from interrupting others, and gently but effectively keeps everyone on task, he is probably high in EI/EQ.</span></p><span data-dcnode-id="2882" instrument_node="">
</span><p data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2879" instrument_node="">
</span><h3 data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">3. People Express Themselves Openly</span></h3><span data-dcnode-id="2876" instrument_node="">
</span><p data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">A person who is comfortable speaking up about things that are important, and is just as comfortable listening to others talk about their own opinions, is showing high workplace EI/EQ. She is probably also adept at expressing her own emotions in an appropriate way and accepting of others who express their own emotions.</span></p><span data-dcnode-id="2873" instrument_node="">
</span><p data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">A person who keeps things bottled up or gets upset when others disagree with her at work is likely low in emotional intelligence. She might spar with her coworkers about their opinions or-conversely-expect everyone to simply keep all emotions and opinions to themselves.</span></p><span data-dcnode-id="2870" instrument_node="">
</span><p data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2867" instrument_node="">
</span><h3 data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">4. Most Change Initiatives Work</span></h3><span data-dcnode-id="2864" instrument_node="">
</span><p data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">If a workplace is generally high in emotional intelligence, it likely handles change well. Change initiatives are probably taken seriously and carried out in earnest.</span></p><span data-dcnode-id="2861" instrument_node="">
</span><p data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">On the flip side, workplaces with low emotional intelligence are resistant to change, fail to put in the effort necessary to make change initiatives succeed, or even actively sabotage them. Additionally, poorly though-out initiatives indicate that the management team is low in EI/EQ and does not understand how their proposed changes will affect their employees.</span></p><span data-dcnode-id="2858" instrument_node="">
</span><p data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2855" instrument_node="">
</span><h3 data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">5. Flexibility</span></h3><span data-dcnode-id="2852" instrument_node="">
</span><p data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">A workplace that offers flexibility and understanding of the complex, busy lives of organization members is one that is probably high in EI/EQ. Managers and executives who accept that people have differing needs and offer ways to work smarter are displaying a good sense of emotional intelligence.</span></p><span data-dcnode-id="2849" instrument_node="">
</span><p data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">Managers and executives who refuse to allow their employees flexibility and hold strictly to the way things have always been done (when there is no need to do so) are showing signs of low emotional intelligence.</span></p><span data-dcnode-id="2846" instrument_node="">
</span><p data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2843" instrument_node="">
</span><h3 data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">6. People Have the Freedom to Be Creative</span></h3><span data-dcnode-id="2840" instrument_node="">
</span><p data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">Similarly, workplaces that allow their employees the opportunity to be creative and innovative are high in EI/EQ. Giving people the chance to practice their creativity and think outside the box is not only a welcome gesture for employees, it’s also a smart move for the workplace.</span></p><span data-dcnode-id="2837" instrument_node="">
</span><p data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">Workplaces that make their employees stick to strict policies and procedures (again, when there is no need for such strictness) are low in EI/EQ. Not understanding the value of creativity and the need employees have to be imaginative and invested in their work is a hallmark of low EI/EQ.</span></p><span data-dcnode-id="2834" instrument_node="">
</span><p data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2831" instrument_node="">
</span><h3 data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">7. People Meet Out of Work Time</span></h3><span data-dcnode-id="2828" instrument_node="">
</span><p data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">Finally, a good sign of emotional intelligence in the workplace is when organization members meet outside of the workplace. Organizations where employees enjoy happy hours, having lunch together, or other social activities indicates that there is a high level of EI/EQ present.</span></p><span data-dcnode-id="2825" instrument_node="">
</span><p data-dcnode-id="2820"><span data-dcnode-id="2824" instrument_node="">Workplaces that don’t feature such strong bonds and those in which employees do not spend any non-working time together are likely low in EI/EQ. When people are emotionally intelligent, they tend to get along and see the value in investing their time and energy into workplace relationships, but people low in EI/EQ are generally not interested in </span><a data-dcnode-id="2822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/emotional-intelligence-relationships/"><span data-dcnode-id="2823" instrument_node="">building quality relationships</span></a><span data-dcnode-id="2821" instrument_node=""> with their peers (Dhanak, n.d.).</span></p><span data-dcnode-id="2819" instrument_node="">
</span><p data-dcnode-id="2817"><a data-dcnode-id="2818" name="benefits-of-EI"></a></p><span data-dcnode-id="2816" instrument_node="">
</span><p data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2813" instrument_node="">
</span><h2 data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">5 Benefits and Advantages of Using EQ in Business</span></h2><span data-dcnode-id="2810" instrument_node="">
</span><p data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">If you’re not already convinced about the benefits of using EI/EQ in the workplace, here are a few more reasons you should pay attention to it!</span></p><span data-dcnode-id="2807" instrument_node="">
</span><ol data-dcnode-id="2782"><span data-dcnode-id="2806" instrument_node="">
</span><li data-dcnode-id="2802"><span data-dcnode-id="2805" instrument_node="">Motivation-high EI/EQ translates to better control of our motivation, and perhaps even more motivation for our coworkers!</span><br data-dcnode-id="2804"><br data-dcnode-id="2803"></li><span data-dcnode-id="2801" instrument_node="">
</span><li data-dcnode-id="2797"><span data-dcnode-id="2800" instrument_node="">Common vision-those high in EI/EQ are able to more effectively understand and communicate with others, which makes it easier to develop and maintain a common team vision.</span><br data-dcnode-id="2799"><br data-dcnode-id="2798"></li><span data-dcnode-id="2796" instrument_node="">
</span><li data-dcnode-id="2792"><span data-dcnode-id="2795" instrument_node="">Change-highly emotionally intelligent people can handle the stress, uncertainty, and anxiety that comes with working in business.</span><br data-dcnode-id="2794"><br data-dcnode-id="2793"></li><span data-dcnode-id="2791" instrument_node="">
</span><li data-dcnode-id="2787"><span data-dcnode-id="2790" instrument_node="">Communication-clear communication is a telltale sign of emotional intelligence, and it contributes to better relationships, an easier time getting help from others, and more effective persuasion and influence of others.</span><br data-dcnode-id="2789"><br data-dcnode-id="2788"></li><span data-dcnode-id="2786" instrument_node="">
</span><li data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">Leadership-self-leadership, leading others, influencing others-all of these are vital for those in business; more on this later (Elite World Hotels, 2018).</span></li><span data-dcnode-id="2783" instrument_node="">
</span></ol><span data-dcnode-id="2781" instrument_node="">
</span><p data-dcnode-id="2779"><a data-dcnode-id="2780" name="Disadvantages-of-EI"></a></p><span data-dcnode-id="2778" instrument_node="">
</span><p data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2775" instrument_node="">
</span><h2 data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">Are There Disadvantages and Limitations to Using EQ in the Workplace?</span></h2><span data-dcnode-id="2772" instrument_node="">
</span><p data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">There are absolutely advantages to using EI/EQ in the workplace, as the examples and associations above show. So far, there are virtually no disadvantages to it.</span></p><span data-dcnode-id="2769" instrument_node="">
</span><p data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">However, there are some limitations-emotional intelligence can be enhanced, but as with other traits and skills, there is an upper limit to it that is likely determined at least in part by genetics. Not everyone can be a master of emotional intelligence.</span></p><span data-dcnode-id="2766" instrument_node="">
</span><p data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">In addition, there is some concern that too much emotional intelligence can encourage manipulation and other unethical or bad behavior. If unscrupulous employees have extremely high EI/EQ, they may be tempted to use their emotional intelligence to manipulate, deceive, and take advantage of their coworkers, subordinates, and perhaps even their management.</span></p><span data-dcnode-id="2763" instrument_node="">
</span><p data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">Generally, having excess EI/EQ is not something anyone should be too concerned about; it’s much more common to have too little than too much!</span></p><span data-dcnode-id="2760" instrument_node="">
</span><p data-dcnode-id="2758"><a data-dcnode-id="2759" name="Lack-of-EQ"></a></p><span data-dcnode-id="2757" instrument_node="">
</span><p data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2754" instrument_node="">
</span><h2 data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">What Happens When There is a Lack of EQ in the Workplace?</span></h2><span data-dcnode-id="2751" instrument_node="">
</span><p data-dcnode-id="2746"><img alt="Emotional Intelligence at Work" class="alignright wp-image-24135 size-medium lazyload" data-dcnode-id="2750" data-src="https://positivepsychology.com/wp-content/uploads/Workplace-Stress-and-EQ-300x200.jpg" height="200" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Emotional Intelligence at Work" width="300"><noscript data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">&lt;img class="alignright wp-image-24135 size-medium lazyload" title="Emotional Intelligence at Work" src="https://positivepsychology.com/wp-content/uploads/Workplace-Stress-and-EQ-300x200.jpg" alt="Emotional Intelligence at Work" width="300" height="200" /&gt;</span></noscript><span data-dcnode-id="2747" instrument_node="">Speaking of too little EI/EQ, you might be wondering what a lack of emotional intelligence in the workplace looks like. There are two main ways that a lack of EI/EQ can negatively impact the workplace:</span></p><span data-dcnode-id="2745" instrument_node="">
</span><ol data-dcnode-id="2737"><span data-dcnode-id="2744" instrument_node="">
</span><li data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">Communication</span></li><span data-dcnode-id="2741" instrument_node="">
</span><li data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">Decision Making</span></li><span data-dcnode-id="2738" instrument_node="">
</span></ol><span data-dcnode-id="2736" instrument_node="">
</span><p data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2733" instrument_node="">
</span><h3 data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">How EQ Impacts Communication in the Workplace</span></h3><span data-dcnode-id="2730" instrument_node="">
</span><p data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">A lack of EI/EQ can negatively impact communication in the workplace through several mechanisms:</span></p><span data-dcnode-id="2727" instrument_node="">
</span><ul data-dcnode-id="2713"><span data-dcnode-id="2726" instrument_node="">
</span><li data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">Less understanding of one’s own emotions</span></li><span data-dcnode-id="2723" instrument_node="">
</span><li data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">Less understanding of the emotions of others</span></li><span data-dcnode-id="2720" instrument_node="">
</span><li data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">Less effective communication of ideas and emotions to others</span></li><span data-dcnode-id="2717" instrument_node="">
</span><li data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">Inappropriate communication-related behavior, such as outbursts of emotion, oversharing or failing to communicate important information.</span></li><span data-dcnode-id="2714" instrument_node="">
</span></ul><span data-dcnode-id="2712" instrument_node="">
</span><p data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">It’s easy to see how these mechanisms impact overall communication and, through less effective communication, lower productivity and efficiency in the workplace.</span></p><span data-dcnode-id="2709" instrument_node="">
</span><p data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2706" instrument_node="">
</span><h3 data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">How Emotional Intelligence Affects Decision Making in the Workplace</span></h3><span data-dcnode-id="2703" instrument_node="">
</span><p data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Similarly, EI/EQ can have a significant impact on decision-making in the workplace. When emotional intelligence is high, organization members can understand the cause and effect relationship between emotions and events and plan effectively (Côté &amp; Yip, 2013).</span></p><span data-dcnode-id="2700" instrument_node="">
</span><p data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">When EI/EQ is low, organization members may experience “incidental emotions” surrounding decision-making. For example, anxiety is a common emotion involved in decision-making, especially for big decisions that will have a significant impact.</span></p><span data-dcnode-id="2697" instrument_node="">
</span><p data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">Those low in EI/EQ may not understand the source of their anxiety or how to effectively manage it, leading to too much risk-taking, not enough risk-taking, or judgment clouded by bias (Côté &amp; Yip, 2013).</span></p><span data-dcnode-id="2694" instrument_node="">
</span><p data-dcnode-id="2692"><a data-dcnode-id="2693" name="address-problems-EQ"></a></p><span data-dcnode-id="2691" instrument_node="">
</span><p data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2688" instrument_node="">
</span><h2 data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">How EQ Can be Used to Manage and Address Problems in the Workplace</span></h2><span data-dcnode-id="2685" instrument_node="">
</span><p data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">So we know what a lack or surplus of EI/EQ can do to a workplace, but we still need to consider how emotional intelligence can actually be applied in the workplace.</span></p><span data-dcnode-id="2682" instrument_node="">
</span><p data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">There are many applications for EI/EQ at work, but there are three interesting areas where emotional intelligence interventions can be especially effective:</span></p><span data-dcnode-id="2679" instrument_node="">
</span><ul data-dcnode-id="2668"><span data-dcnode-id="2678" instrument_node="">
</span><li data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">Leadership and management</span></li><span data-dcnode-id="2675" instrument_node="">
</span><li data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">Project management</span></li><span data-dcnode-id="2672" instrument_node="">
</span><li data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">Social work</span></li><span data-dcnode-id="2669" instrument_node="">
</span></ul><span data-dcnode-id="2667" instrument_node="">
</span><p data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2664" instrument_node="">
</span><h3 data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">Leading with Emotional Intelligence in Management</span></h3><span data-dcnode-id="2661" instrument_node="">
</span><p data-dcnode-id="2656"><span data-dcnode-id="2660" instrument_node="">Emotional intelligence is perhaps most effective and impactful when applied to leadership and management; </span><a data-dcnode-id="2658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/emotional-intelligence-leadership-effectiveness/"><span data-dcnode-id="2659" instrument_node="">higher EI/EQ in leadership</span></a><span data-dcnode-id="2657" instrument_node=""> has a funny way of starting a trickle-down effect of positivity and efficiency in an organization.</span></p><span data-dcnode-id="2655" instrument_node="">
</span><p data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">A leader who embodies and practices high EI/EQ can:</span></p><span data-dcnode-id="2652" instrument_node="">
</span><ol data-dcnode-id="2638"><span data-dcnode-id="2651" instrument_node="">
</span><li data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">Communicate their vision more effectively.</span></li><span data-dcnode-id="2648" instrument_node="">
</span><li data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">Improve their persuasion and inspirational speaking abilities.</span></li><span data-dcnode-id="2645" instrument_node="">
</span><li data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">Ensure appropriate responses to stressful and confusing situations at work.</span></li><span data-dcnode-id="2642" instrument_node="">
</span><li data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">Manage their own emotions and the emotions of their employees (to an extent).</span></li><span data-dcnode-id="2639" instrument_node="">
</span></ol><span data-dcnode-id="2637" instrument_node="">
</span><p data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">All of this leads directly (and indirectly) to a more efficient, effective, and productive workplace.</span></p><span data-dcnode-id="2634" instrument_node="">
</span><p data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">To learn more about emotional intelligence in leadership and management, see the EI/EQ training resources towards the end of this piece.</span></p><span data-dcnode-id="2631" instrument_node="">
</span><p data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2628" instrument_node="">
</span><h3 data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">Emotional Intelligence for Project Managers</span></h3><span data-dcnode-id="2625" instrument_node="">
</span><p data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">Emotional intelligence is clearly important for leaders and managers, but don’t underestimate its importance in more peer-heavy projects and interactions. Project managers have good reason to pay attention to their EI/EQ levels, and improve them if possible.</span></p><span data-dcnode-id="2622" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">To be successful, project managers must be able to…</span></p><span data-dcnode-id="2619" instrument_node="">
</span><ol data-dcnode-id="2602"><span data-dcnode-id="2618" instrument_node="">
</span><li data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">Perceive emotion: ability to recognize, attend to, and understand one’s own emotions and others’ emotions.</span></li><span data-dcnode-id="2615" instrument_node="">
</span><li data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">Manage emotion: ability to effectively manage, control, and express emotions.</span></li><span data-dcnode-id="2612" instrument_node="">
</span><li data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">Decision-making: ability to appropriately apply emotion to manage and solve problems.</span></li><span data-dcnode-id="2609" instrument_node="">
</span><li data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">Achieve: the best motivation to achieve is inner or intrinsic motivation.</span></li><span data-dcnode-id="2606" instrument_node="">
</span><li data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Influence: ability to recognize, manage, and evoke emotions in others (Davey-Winter, n.d.).</span></li><span data-dcnode-id="2603" instrument_node="">
</span></ol><span data-dcnode-id="2601" instrument_node="">
</span><p data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">As you might have guessed, higher emotional intelligence is characterized by these five abilities! High EI/EQ is a must-have for project managers!</span></p><span data-dcnode-id="2598" instrument_node="">
</span><p data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">To learn more about emotional intelligence in leadership and management, see the EI/EQ training resources towards the end of this piece.</span></p><span data-dcnode-id="2595" instrument_node="">
</span><p data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2592" instrument_node="">
</span><h3 data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Using Emotional Intelligence in Social Work</span></h3><span data-dcnode-id="2589" instrument_node="">
</span><p data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">Emotional intelligence is especially important to apply in social work. Social workers have some of the most difficult situations, challenging interactions, and heavy emotional labor of all professions.</span></p><span data-dcnode-id="2586" instrument_node="">
</span><p data-dcnode-id="2582"><a data-dcnode-id="2584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/emotional-intelligence-skills/"><span data-dcnode-id="2585" instrument_node="">EI/EQ can be applied to improve one’s skills</span></a><span data-dcnode-id="2583" instrument_node=""> and abilities in five core social work tasks:</span></p><span data-dcnode-id="2581" instrument_node="">
</span><ol data-dcnode-id="2564"><span data-dcnode-id="2580" instrument_node="">
</span><li data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Engagement of users/clients</span></li><span data-dcnode-id="2577" instrument_node="">
</span><li data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">Assessment and observation</span></li><span data-dcnode-id="2574" instrument_node="">
</span><li data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">Decision making</span></li><span data-dcnode-id="2571" instrument_node="">
</span><li data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">Collaboration and cooperation</span></li><span data-dcnode-id="2568" instrument_node="">
</span><li data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">Dealing with stress (Morrison, 2007)</span></li><span data-dcnode-id="2565" instrument_node="">
</span></ol><span data-dcnode-id="2563" instrument_node="">
</span><p data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">Improvements in these five tasks will not only allow the social worker to work more effectively, but will also improve their clients’ experience and help the social worker feel more positive, fulfilled, and satisfied with their job (Morrison, 2007).</span></p><span data-dcnode-id="2560" instrument_node="">
</span><p data-dcnode-id="2558"><a data-dcnode-id="2559" name="EQ-organizational-behavior"></a></p><span data-dcnode-id="2557" instrument_node="">
</span><p data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2554" instrument_node="">
</span><h2 data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">Workplace Training in Emotional Intelligence</span></h2><span data-dcnode-id="2551" instrument_node="">
</span><p data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">Clearly, EI/EQ is worth spending some time on to understand and enhance. Luckily, there are ways to better understand and enhance our EI/EQ skills and abilities!</span></p><span data-dcnode-id="2548" instrument_node="">
</span><p data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">There are training courses and programs available for improving emotional intelligence in the workplace, some of which have impressive outcomes.</span></p><span data-dcnode-id="2545" instrument_node="">
</span><p data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">If you’re interested in learning more about the types of training out there and which one might be right for you, check out these resources:</span></p><span data-dcnode-id="2542" instrument_node="">
</span><p data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2539" instrument_node="">
</span><h3 data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">Emotional Intelligence Matters Workshop</span></h3><span data-dcnode-id="2536" instrument_node="">
</span><p data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">This workshop from the Careerstone Group is designed to help you and your organization learn how to improve their emotion recognition, emotion management, and social skills. It focuses on teaching participants to:</span></p><span data-dcnode-id="2533" instrument_node="">
</span><ul data-dcnode-id="2507"><span data-dcnode-id="2532" instrument_node="">
</span><li data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">Recognize how emotional intelligence impacts workplace interactions.</span></li><span data-dcnode-id="2529" instrument_node="">
</span><li data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">Increase self-awareness, self-management, and develop a clear understanding of interpersonal dynamics.</span></li><span data-dcnode-id="2526" instrument_node="">
</span><li data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">Use strategies to manage counterproductive tendencies.</span></li><span data-dcnode-id="2523" instrument_node="">
</span><li data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">Communicate professionally and effectively in all situations.</span></li><span data-dcnode-id="2520" instrument_node="">
</span><li data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">Identify and apply key emotional skills to a broad variety of workplace situations-regardless of emotional stress.</span></li><span data-dcnode-id="2517" instrument_node="">
</span><li data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">Improve sensitivity to organizational and social cues.</span></li><span data-dcnode-id="2514" instrument_node="">
</span><li data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">Avoid behaviors that will derail success in the workplace.</span></li><span data-dcnode-id="2511" instrument_node="">
</span><li data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">Practice effective engagement skills for organizational success.</span></li><span data-dcnode-id="2508" instrument_node="">
</span></ul><span data-dcnode-id="2506" instrument_node="">
</span><p data-dcnode-id="2501"><span data-dcnode-id="2505" instrument_node="">To learn more about this one-day training opportunity, </span><a data-dcnode-id="2503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//careerstonegroup.com/training-emotional-intelligence-workplace.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2504" instrument_node="">click here</span></a><span data-dcnode-id="2502" instrument_node="">.</span></p><span data-dcnode-id="2500" instrument_node="">
</span><p data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2497" instrument_node="">
</span><h3 data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Emotional Intelligence Courses from Skillsoft</span></h3><span data-dcnode-id="2494" instrument_node="">
</span><p data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">If you’re a leader or aspiring leader and you are committed to enhancing your emotional intelligence, Skillsoft’s resources are a great place to start.</span></p><span data-dcnode-id="2491" instrument_node="">
</span><p data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">They offer courses in:</span></p><span data-dcnode-id="2488" instrument_node="">
</span><ul data-dcnode-id="2462"><span data-dcnode-id="2487" instrument_node="">
</span><li data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Leadership Essentials: Leading with Emotional Intelligence</span></li><span data-dcnode-id="2484" instrument_node="">
</span><li data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">The Emotionally Intelligent Leader</span></li><span data-dcnode-id="2481" instrument_node="">
</span><li data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">How High Is Your EQ?</span></li><span data-dcnode-id="2478" instrument_node="">
</span><li data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">Emotional Intelligence at Work</span></li><span data-dcnode-id="2475" instrument_node="">
</span><li data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">Emotional Intelligence: Owning Your Emotions</span></li><span data-dcnode-id="2472" instrument_node="">
</span><li data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">Emotional Intelligence: Building Self-Management Skills</span></li><span data-dcnode-id="2469" instrument_node="">
</span><li data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">Emotional Intelligence: Applying EI at Work</span></li><span data-dcnode-id="2466" instrument_node="">
</span><li data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">Emotional Intelligence: Being Aware of the Emotions of Others</span></li><span data-dcnode-id="2463" instrument_node="">
</span></ul><span data-dcnode-id="2461" instrument_node="">
</span><p data-dcnode-id="2456"><span data-dcnode-id="2460" instrument_node="">They also list some books and videos that you can use to work on increasing your EI/EQ on your own. </span><a data-dcnode-id="2458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.skillsoft.com/content-solutions/business-skills-training/emotional-intelligence-training/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2459" instrument_node="">Click here</span></a><span data-dcnode-id="2457" instrument_node=""> to learn more.</span></p><span data-dcnode-id="2455" instrument_node="">
</span><p data-dcnode-id="2453"><a data-dcnode-id="2454" name="measure-EQ"></a></p><span data-dcnode-id="2452" instrument_node="">
</span><p data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2449" instrument_node="">
</span><h2 data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">Can We Measure Emotional Intelligence in the Workplace?</span></h2><span data-dcnode-id="2446" instrument_node="">
</span><p data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">Yes! Fortunately, there are many valid, reliable measures of emotional intelligence out there. Some are even geared towards teams and workplaces.</span></p><span data-dcnode-id="2443" instrument_node="">
</span><p data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">These two tools are some of the best measures available for getting a good indicator of EI/EQ in your workplace.</span></p><span data-dcnode-id="2440" instrument_node="">
</span><p data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2437" instrument_node="">
</span><h3 data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">Multidimensional Emotional Intelligence Assessment – Workplace (MEIA-W)</span></h3><span data-dcnode-id="2434" instrument_node="">
</span><p data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">This measure from Tett, Wang, and Fox (2006) takes only 20 minutes to complete and can provide you with a personality-based measure of the emotional intelligence of your workforce.</span></p><span data-dcnode-id="2431" instrument_node="">
</span><p data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">According to the experts, this measure is best for:</span></p><span data-dcnode-id="2428" instrument_node="">
</span><ul data-dcnode-id="2414"><span data-dcnode-id="2427" instrument_node="">
</span><li data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Qualified professionals looking to select leaders and employees with emotional intelligence (EI) and exceptional interpersonal skills</span></li><span data-dcnode-id="2424" instrument_node="">
</span><li data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">Psychologists seeking a brief, comprehensive, personality-based measure of EI</span></li><span data-dcnode-id="2421" instrument_node="">
</span><li data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">Employees and leaders who want to develop critical people skills</span></li><span data-dcnode-id="2418" instrument_node="">
</span><li data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Users seeking convenient online administration and a simple, brief, easy to interpret report</span></li><span data-dcnode-id="2415" instrument_node="">
</span></ul><span data-dcnode-id="2413" instrument_node="">
</span><p data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">The MEIA-W is composed of 144 short items that assess 10 distinct facets of emotional intelligence:</span></p><span data-dcnode-id="2410" instrument_node="">
</span><ul data-dcnode-id="2378"><span data-dcnode-id="2409" instrument_node="">
</span><li data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">Recognition of Emotion in the Self</span></li><span data-dcnode-id="2406" instrument_node="">
</span><li data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Regulation of Emotion in the Self</span></li><span data-dcnode-id="2403" instrument_node="">
</span><li data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">Recognition of Emotion in Others</span></li><span data-dcnode-id="2400" instrument_node="">
</span><li data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">Regulation of Emotion in Others</span></li><span data-dcnode-id="2397" instrument_node="">
</span><li data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">Nonverbal Emotional Expression</span></li><span data-dcnode-id="2394" instrument_node="">
</span><li data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">Empathy</span></li><span data-dcnode-id="2391" instrument_node="">
</span><li data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">Intuition versus Reason</span></li><span data-dcnode-id="2388" instrument_node="">
</span><li data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">Creative Thinking</span></li><span data-dcnode-id="2385" instrument_node="">
</span><li data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">Mood Redirected Attention</span></li><span data-dcnode-id="2382" instrument_node="">
</span><li data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">Motivating Emotions</span></li><span data-dcnode-id="2379" instrument_node="">
</span></ul><span data-dcnode-id="2377" instrument_node="">
</span><p data-dcnode-id="2372"><span data-dcnode-id="2376" instrument_node="">To learn more about the MEIA-W, </span><a data-dcnode-id="2374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sigmaassessmentsystems.com/assessments/multidimensional-emotional-intelligence-assessment-workplace/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2375" instrument_node="">click here</span></a><span data-dcnode-id="2373" instrument_node="">.</span></p><span data-dcnode-id="2371" instrument_node="">
</span><p data-dcnode-id="2367"><span data-dcnode-id="2370" instrument_node="">Related reading: </span><a data-dcnode-id="2368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/emotional-intelligence-tests/"><span data-dcnode-id="2369" instrument_node="">Emotional intelligence assessments</span></a></p><span data-dcnode-id="2366" instrument_node="">
</span><p data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2363" instrument_node="">
</span><h3 data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">Work Group Emotional Intelligence Profile (WEIP)</span></h3><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">This scale was developed by emotional intelligence researcher Adeyemo in 2008 and offers a measure of emotional intelligence in team members. It is a self-report measure containing 30 items rated on a scale from 1 (strongly disagree) to 7 (strongly agree).</span></p><span data-dcnode-id="2357" instrument_node="">
</span><p data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">Two scales (made up of their own subscales) comprise the WEIP:</span></p><span data-dcnode-id="2354" instrument_node="">
</span><ol data-dcnode-id="2325"><span data-dcnode-id="2353" instrument_node="">
</span><li data-dcnode-id="2339"><span data-dcnode-id="2352" instrument_node="">Ability to Deal with Own Emotions
</span><ol data-dcnode-id="2341"><span data-dcnode-id="2351" instrument_node="">
</span><li data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">Ability to Recognize Own Emotions</span></li><span data-dcnode-id="2348" instrument_node="">
</span><li data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">Ability to Discuss Own Emotions</span></li><span data-dcnode-id="2345" instrument_node="">
</span><li data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Ability to Manage Own Emotions</span></li><span data-dcnode-id="2342" instrument_node="">
</span></ol><span data-dcnode-id="2340" instrument_node="">
</span></li><span data-dcnode-id="2338" instrument_node="">
</span><li data-dcnode-id="2327"><span data-dcnode-id="2337" instrument_node="">Ability to Deal with Others’ Emotions
</span><ol data-dcnode-id="2329"><span data-dcnode-id="2336" instrument_node="">
</span><li data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">Ability to Recognize Others’ Emotions</span></li><span data-dcnode-id="2333" instrument_node="">
</span><li data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Ability to Manage Others’ Emotions</span></li><span data-dcnode-id="2330" instrument_node="">
</span></ol><span data-dcnode-id="2328" instrument_node="">
</span></li><span data-dcnode-id="2326" instrument_node="">
</span></ol><span data-dcnode-id="2324" instrument_node="">
</span><p data-dcnode-id="2319"><span data-dcnode-id="2323" instrument_node="">To learn more about this scale and how to use it, </span><a data-dcnode-id="2321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.eiconsortium.org/measures/weip.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2322" instrument_node="">click here</span></a><span data-dcnode-id="2320" instrument_node="">.</span></p><span data-dcnode-id="2318" instrument_node="">
</span><p data-dcnode-id="2316"><a data-dcnode-id="2317" name="Implement-EQ"></a></p><span data-dcnode-id="2315" instrument_node="">
</span><p data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2312" instrument_node="">
</span><h2 data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">How to Implement Emotional Intelligence in the Workplace</span></h2><span data-dcnode-id="2309" instrument_node="">
</span><p data-dcnode-id="2304"><strong data-dcnode-id="2305"><img alt="Building EQ in the workplace" class="alignright wp-image-24136 lazyload" data-dcnode-id="2308" data-src="https://positivepsychology.com/wp-content/uploads/team-building-min.jpg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Building EQ in the workplace" width="300"><noscript data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">&lt;img class="alignright wp-image-24136 lazyload" title="Building EQ in the workplace" src="https://positivepsychology.com/wp-content/uploads/team-building-min.jpg" alt="Building EQ in the workplace" width="300" /&gt;</span></noscript></strong></p><span data-dcnode-id="2303" instrument_node="">
</span><p data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">If you want to learn more about how to apply and enhance emotional intelligence in the workplace, this excellent guide from emotional intelligence experts Cherniss, Goleman, Emmerling, Cowan, and Adler (1998) is what you need.</span></p><span data-dcnode-id="2300" instrument_node="">
</span><p data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">It describes best practices for implementing emotional intelligence training and overall culture in four phases:</span></p><span data-dcnode-id="2297" instrument_node="">
</span><ol data-dcnode-id="2283"><span data-dcnode-id="2296" instrument_node="">
</span><li data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">Preparation</span></li><span data-dcnode-id="2293" instrument_node="">
</span><li data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">Training</span></li><span data-dcnode-id="2290" instrument_node="">
</span><li data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Transfer</span></li><span data-dcnode-id="2287" instrument_node="">
</span><li data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">Evaluation</span></li><span data-dcnode-id="2284" instrument_node="">
</span></ol><span data-dcnode-id="2282" instrument_node="">
</span><p data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">Phase One is where you should be:</span></p><span data-dcnode-id="2279" instrument_node="">
</span><ul data-dcnode-id="2253"><span data-dcnode-id="2278" instrument_node="">
</span><li data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">Assessing the organization’s needs</span></li><span data-dcnode-id="2275" instrument_node="">
</span><li data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">Assessing personal strengths and limitations</span></li><span data-dcnode-id="2272" instrument_node="">
</span><li data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">Providing feedback with care</span></li><span data-dcnode-id="2269" instrument_node="">
</span><li data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Maximizing learner choice</span></li><span data-dcnode-id="2266" instrument_node="">
</span><li data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">Encouraging participation-not requiring it</span></li><span data-dcnode-id="2263" instrument_node="">
</span><li data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Linking learning goals to personal values</span></li><span data-dcnode-id="2260" instrument_node="">
</span><li data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Adjusting expectations</span></li><span data-dcnode-id="2257" instrument_node="">
</span><li data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">Gauging readiness</span></li><span data-dcnode-id="2254" instrument_node="">
</span></ul><span data-dcnode-id="2252" instrument_node="">
</span><p data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Once you have your plans in place, Phase Two is where you start training. You should plan on:</span></p><span data-dcnode-id="2249" instrument_node="">
</span><ul data-dcnode-id="2214"><span data-dcnode-id="2248" instrument_node="">
</span><li data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Fostering a positive relationship between the trainer and the learner</span></li><span data-dcnode-id="2245" instrument_node="">
</span><li data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">Maximizing self-directed change</span></li><span data-dcnode-id="2242" instrument_node="">
</span><li data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">Setting clear goal</span></li><span data-dcnode-id="2239" instrument_node="">
</span><li data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">Breaking those goals into manageable steps</span></li><span data-dcnode-id="2236" instrument_node="">
</span><li data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Maximizing opportunities to practice emotional intelligence</span></li><span data-dcnode-id="2233" instrument_node="">
</span><li data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Providing frequent feedback on that practice</span></li><span data-dcnode-id="2230" instrument_node="">
</span><li data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">Relying on experiential, hands-on methods</span></li><span data-dcnode-id="2227" instrument_node="">
</span><li data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Building in support for your staff</span></li><span data-dcnode-id="2224" instrument_node="">
</span><li data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Using models of desirable behavior</span></li><span data-dcnode-id="2221" instrument_node="">
</span><li data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Enhancing insight into emotions and thought patterns</span></li><span data-dcnode-id="2218" instrument_node="">
</span><li data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">Preventing relapse by preparing people for mental slips</span></li><span data-dcnode-id="2215" instrument_node="">
</span></ul><span data-dcnode-id="2213" instrument_node="">
</span><p data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">Phase Three is all about transferring and maintaining the skills learned. Make sure you build in opportunities for:</span></p><span data-dcnode-id="2210" instrument_node="">
</span><ul data-dcnode-id="2202"><span data-dcnode-id="2209" instrument_node="">
</span><li data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Encouraging use of the skills learned on the job</span></li><span data-dcnode-id="2206" instrument_node="">
</span><li data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Providing an organizational culture that supports learning</span></li><span data-dcnode-id="2203" instrument_node="">
</span></ul><span data-dcnode-id="2201" instrument_node="">
</span><p data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">Finally, Phase Four is focused on evaluating the change that has come about from training. In this phase, you should be:</span></p><span data-dcnode-id="2198" instrument_node="">
</span><ul data-dcnode-id="2193"><span data-dcnode-id="2197" instrument_node="">
</span><li data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">Conducting ongoing evaluation research (Cherniss, Goleman, Emmerling, Cowan, &amp; Adler, 1998).</span></li><span data-dcnode-id="2194" instrument_node="">
</span></ul><span data-dcnode-id="2192" instrument_node="">
</span><p data-dcnode-id="2187"><span data-dcnode-id="2191" instrument_node="">Follow these guidelines to maximize your chances of spearheading a successful emotional intelligence training program in your organization. You can read the full report&nbsp;</span><a data-dcnode-id="2189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.eiconsortium.org/reports/technical_report.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2190" instrument_node="">here</span></a><span data-dcnode-id="2188" instrument_node="">.</span></p><span data-dcnode-id="2186" instrument_node="">
</span><p data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2183" instrument_node="">
</span><h3 data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">18 Tips for Teaching and Applying EQ in the Workplace</span></h3><span data-dcnode-id="2180" instrument_node="">
</span><p data-dcnode-id="2175"><span data-dcnode-id="2179" instrument_node="">Kendra Cherry at Very Well Mind has some great practical tips for boosting your own </span><a data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/teaching-emotional-intelligence/"><span data-dcnode-id="2178" instrument_node="">emotional intelligence and teaching</span></a><span data-dcnode-id="2176" instrument_node=""> your staff to boost their as well. She suggests:</span></p><span data-dcnode-id="2174" instrument_node="">
</span><ul data-dcnode-id="2116"><span data-dcnode-id="2173" instrument_node="">
</span><li data-dcnode-id="2162"><em data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">Becoming more self-aware</span></em><br data-dcnode-id="2170"><span data-dcnode-id="2169" instrument_node="">
Pay attention to how you are feeling throughout your day and noticing how your emotions contribute to your decisions and actions.</span><br data-dcnode-id="2168"><span data-dcnode-id="2167" instrument_node="">
Identify and understanding your emotional strengths and weaknesses.</span><br data-dcnode-id="2166"><span data-dcnode-id="2165" instrument_node="">
Understand that emotions can be fleeting and easily changed.</span><br data-dcnode-id="2164"><br data-dcnode-id="2163"></li><span data-dcnode-id="2161" instrument_node="">
</span><li data-dcnode-id="2150"><em data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Practicing self-regulation</span></em><br data-dcnode-id="2158"><span data-dcnode-id="2157" instrument_node="">
Find techniques that help you deal with your work-related stress, like hobbies, exercise, meditation, etc.</span><br data-dcnode-id="2156"><span data-dcnode-id="2155" instrument_node="">
Try to accept reality and keep a cool head when work gets crazy.</span><br data-dcnode-id="2154"><span data-dcnode-id="2153" instrument_node="">
Give yourself time to think and plan before making decisions-especially big decisions.</span><br data-dcnode-id="2152"><br data-dcnode-id="2151"></li><span data-dcnode-id="2149" instrument_node="">
</span><li data-dcnode-id="2136"><em data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Improving your social skills</span></em><br data-dcnode-id="2146"><span data-dcnode-id="2145" instrument_node="">
Listen actively and attentively to your managers, coworkers, and peers.</span><br data-dcnode-id="2144"><span data-dcnode-id="2143" instrument_node="">
Keep an eye out for nonverbal communication.</span><br data-dcnode-id="2142"><span data-dcnode-id="2141" instrument_node="">
Work on your persuasion and influencing skills.</span><br data-dcnode-id="2140"><span data-dcnode-id="2139" instrument_node="">
gossip, but step in to handle conflict when appropriate and necessary.</span><br data-dcnode-id="2138"><br data-dcnode-id="2137"></li><span data-dcnode-id="2135" instrument_node="">
</span><li data-dcnode-id="2126"><em data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">Becoming more empathetic</span></em><br data-dcnode-id="2132"><span data-dcnode-id="2131" instrument_node="">
Put yourself in their shoes-at work and in your personal life.</span><br data-dcnode-id="2130"><span data-dcnode-id="2129" instrument_node="">
Pay attention to your own responses to others.</span><br data-dcnode-id="2128"><br data-dcnode-id="2127"></li><span data-dcnode-id="2125" instrument_node="">
</span><li data-dcnode-id="2118"><em data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">Working on your motivation</span></em><br data-dcnode-id="2122"><span data-dcnode-id="2121" instrument_node="">
Focus on what you love about your job rather than what you hate about it.</span><br data-dcnode-id="2120"><span data-dcnode-id="2119" instrument_node="">
Try to maintain a positive, optimistic attitude (Cherry, 2018).</span></li><span data-dcnode-id="2117" instrument_node="">
</span></ul><span data-dcnode-id="2115" instrument_node="">
</span><p data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2112" instrument_node="">
</span><h3 data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">5 Emotional Intelligence Icebreakers for Team Building</span></h3><span data-dcnode-id="2109" instrument_node="">
</span><p data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">Meeting new people can often be awkward and uncomfortable, but icebreakers help! If you’re looking for a way to get the EI/EQ flowing in a group of strangers or just hoping to loosen up your team before training, these five icebreakers can do the trick.</span></p><span data-dcnode-id="2106" instrument_node="">
</span><h4 data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Emotional Intelligence Test</span></h4><span data-dcnode-id="2103" instrument_node="">
</span><p data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">This test is not a carefully constructed and validated measure of emotional intelligence, but the questions are simple, it’s quick to complete, and it makes it easy for everyone to understand emotional intelligence-all of which makes it a great icebreaker activity!</span></p><span data-dcnode-id="2100" instrument_node="">
</span><p data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">It’s only 20 questions, and they’re all short and easy to understand. You’ll see questions like:</span></p><span data-dcnode-id="2097" instrument_node="">
</span><ul data-dcnode-id="2058"><span data-dcnode-id="2096" instrument_node="">
</span><li data-dcnode-id="2084"><span data-dcnode-id="2095" instrument_node="">When criticized, I:</span><br data-dcnode-id="2094"><span data-dcnode-id="2093" instrument_node="">
a. Ignore the criticism</span><br data-dcnode-id="2092"><span data-dcnode-id="2091" instrument_node="">
b. Listen and learn</span><br data-dcnode-id="2090"><span data-dcnode-id="2089" instrument_node="">
c. Become defensive</span><br data-dcnode-id="2088"><span data-dcnode-id="2087" instrument_node="">
d. Get angry</span><br data-dcnode-id="2086"><br data-dcnode-id="2085"></li><span data-dcnode-id="2083" instrument_node="">
</span><li data-dcnode-id="2071"><span data-dcnode-id="2082" instrument_node="">I maintain a sense of humor at appropriate times and in appropriate places, without using sarcasm or hurting the feelings of others.</span><br data-dcnode-id="2081"><span data-dcnode-id="2080" instrument_node="">
a. Strongly disagree</span><br data-dcnode-id="2079"><span data-dcnode-id="2078" instrument_node="">
b. Disagree</span><br data-dcnode-id="2077"><span data-dcnode-id="2076" instrument_node="">
c. Neither agree nor disagree</span><br data-dcnode-id="2075"><span data-dcnode-id="2074" instrument_node="">
d. Agree</span><br data-dcnode-id="2073"><br data-dcnode-id="2072"></li><span data-dcnode-id="2070" instrument_node="">
</span><li data-dcnode-id="2060"><span data-dcnode-id="2069" instrument_node="">In stressful situations, I do not get irritated easily and I am able to contain my emotions.</span><br data-dcnode-id="2068"><span data-dcnode-id="2067" instrument_node="">
a. Never</span><br data-dcnode-id="2066"><span data-dcnode-id="2065" instrument_node="">
b. Sometimes</span><br data-dcnode-id="2064"><span data-dcnode-id="2063" instrument_node="">
c. Often</span><br data-dcnode-id="2062"><span data-dcnode-id="2061" instrument_node="">
d. Always</span></li><span data-dcnode-id="2059" instrument_node="">
</span></ul><span data-dcnode-id="2057" instrument_node="">
</span><p data-dcnode-id="2051"><span data-dcnode-id="2056" instrument_node="">See below for the interpretation of your score based on range, directly from the editor at </span><a data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//icebreakerideas.com/emotional-intelligence-test/%23Emotional_Intelligence_Test" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2055" instrument_node="">icebreakerideas.com</span></a><strong data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">.</span></strong></p><span data-dcnode-id="2050" instrument_node="">
