</span><table data-dcnode-id="1986" style="height: 703px; width: 689px;"><tbody data-dcnode-id="1988"><tr data-dcnode-id="2035"><td data-dcnode-id="2041" style="width: 88px;"><strong data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">Score</span></strong></td><td data-dcnode-id="2037" style="width: 585px;"><strong data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Interpretation</span></strong></td></tr><tr data-dcnode-id="2026"><td data-dcnode-id="2031" style="width: 88px;"><span data-dcnode-id="2032" instrument_node="">68-80</span></td><td data-dcnode-id="2028" style="width: 585px;"><span data-dcnode-id="2029" instrument_node="">You have extremely high emotional intelligence. You are skilled at understanding, interpreting, and acting appropriately upon your emotions and those of others. You deal effectively with emotional and social situations and conflicts, and express your feelings without hurting the feeling of others.</span></td></tr><tr data-dcnode-id="2017"><td data-dcnode-id="2022" style="width: 88px;"><span data-dcnode-id="2023" instrument_node="">60-68</span></td><td data-dcnode-id="2019" style="width: 585px;"><span data-dcnode-id="2020" instrument_node="">Although you score relatively high, you do have room for improvement. Watch the reactions of others to determine when you are using your emotional intelligence effectively and when you are not. Objectively looking at social and personal situations where emotions run high and analyzing your success will help you improve your already high emotional intelligence even more.</span></td></tr><tr data-dcnode-id="2008"><td data-dcnode-id="2013" style="width: 88px;"><span data-dcnode-id="2014" instrument_node="">48-60</span></td><td data-dcnode-id="2010" style="width: 585px;"><span data-dcnode-id="2011" instrument_node="">You fall in the middle range when it comes to your emotional intelligence. Although you are responding appropriately in most situations, your still find yourself losing it sometimes. You also get impatient with others and are sometimes uncomfortable in emotional situations. Don’t worry. Our section on developing your emotional intelligence will help you reach a high level.</span></td></tr><tr data-dcnode-id="1999"><td data-dcnode-id="2004" style="width: 88px;"><span data-dcnode-id="2005" instrument_node="">40-48</span></td><td data-dcnode-id="2001" style="width: 585px;"><span data-dcnode-id="2002" instrument_node="">Your emotional intelligence is a bit low. You probably struggle to manage your emotions in high-pressure situations or when you get angry. You have some work to do to improve. Begin by trying to express your emotions after you are calm. Our section on developing your emotional intelligence will help you a great deal.</span></td></tr><tr data-dcnode-id="1990"><td data-dcnode-id="1995" style="width: 88px;"><span data-dcnode-id="1996" instrument_node="">Under 40</span></td><td data-dcnode-id="1992" style="width: 585px;"><span data-dcnode-id="1993" instrument_node="">Your emotional intelligence is extremely low. You are probably experiencing anxiety and stress on a daily basis. Additionally, you are probably having difficulty in school or at work, not making the progress you wish to. Read carefully through our section on developing your emotional intelligence and follow our advice to improve your EI and have a happier, more meaningful and successful life.</span></td></tr></tbody></table><span data-dcnode-id="1985" instrument_node="">
</span><p data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1982" instrument_node="">
</span><p data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Take this test with your team and see how you all do. If you feel comfortable, share out about your answers, your scores, and your impressions or insights.</span></p><span data-dcnode-id="1979" instrument_node="">
</span><p data-dcnode-id="1975"><a data-dcnode-id="1977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//icebreakerideas.com/emotional-intelligence-test/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1978" instrument_node="">Click here</span></a><span data-dcnode-id="1976" instrument_node=""> to see the test.</span></p><span data-dcnode-id="1974" instrument_node="">
</span><h4 data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">My Colored Hat</span></h4><span data-dcnode-id="1971" instrument_node="">
</span><p data-dcnode-id="1966"><span data-dcnode-id="1970" instrument_node="">This easy and engaging game is a fun way to get participants thinking about emotional awareness. It is probably best suited for children and teens, but it could easily be scaled up in terms of maturity to work for an organization. (For more on this, see:&nbsp;</span><a data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/emotional-intelligence-for-kids/"><span data-dcnode-id="1969" instrument_node="">Is Emotional Intelligence Relevant for Kids?</span></a><span data-dcnode-id="1967" instrument_node="">)</span></p><span data-dcnode-id="1965" instrument_node="">
</span><p data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">First, do your prep work; grab some colored paper and make some paper hats! Alternatively, you could simply buy paper hats of different colors. You should have at least four different colors of hats, and enough hats for each of your participant to wear one.</span></p><span data-dcnode-id="1962" instrument_node="">
</span><p data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">Next, decide which colors represent which emotions and share these with your participants.</span></p><span data-dcnode-id="1959" instrument_node="">
</span><p data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">For the activity itself, have each participant pick out a hat that represents how they are feeling or that they’d simply like to work with for the activity and tell them to stand in a circle wearing the hat. Now, have each participant do one of the following based on their hat:</span></p><span data-dcnode-id="1956" instrument_node="">
</span><ol data-dcnode-id="1948"><span data-dcnode-id="1955" instrument_node="">
</span><li data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">If their hat represents a positive emotion, have them share that emotion with the group, describe it, and give themselves permission to feel it and enjoy it.</span></li><span data-dcnode-id="1952" instrument_node="">
</span><li data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">If their hat represents a negative emotion, have them acknowledge it but decide to put it aside (“bag” it or “bracket” it) for the moment. Once everyone has shared, remind them to take out that emotion and deal with it-whether that involves neutralizing it or replacing it with something positive.</span></li><span data-dcnode-id="1949" instrument_node="">
</span></ol><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1941"><span data-dcnode-id="1946" instrument_node="">To see this icebreaker at the source, </span><a data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.experiential-learning-games.com/emotionalintelligence.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1945" instrument_node="">click here</span><strong data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">.</span></strong></a></p><span data-dcnode-id="1940" instrument_node="">
</span><h4 data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">The “I Am” Circle</span></h4><span data-dcnode-id="1937" instrument_node="">
</span><p data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">This is a great icebreaker to help people figure out what they have in common.</span></p><span data-dcnode-id="1934" instrument_node="">
</span><p data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Have your participants stand in a circle with one person in the middle. The person in the middle should say something that’s true about themselves.</span></p><span data-dcnode-id="1931" instrument_node="">
</span><p data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">If it’s true for any of the other participants, then he or she must quickly switch places with the person in the middle (think musical chairs). Whoever doesn’t find a spot in the circle quick enough goes in the middle, and the cycle repeats.</span></p><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">Anita Hossain, the leader of First Round’s Knowledge program, notes that this activity usually starts off light, with people sharing things like, “I’m the youngest,” or “I have two kids.” However, it can get much deeper surprisingly quickly. Hossain says she’s heard things like, “I have impostor syndrome,” and “I grew up poor and have always felt less than.”</span></p><span data-dcnode-id="1925" instrument_node="">
</span><p data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">The movement from outside to inside is more than just to get the blood pumping; according to Hossain, it’s “kinetic” and promotes a sense of empathy among the participants.</span></p><span data-dcnode-id="1922" instrument_node="">
</span><h4 data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">Tell Your Story Redux</span></h4><span data-dcnode-id="1919" instrument_node="">
</span><p data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">Hossain also outlines another helpful icebreaker activity she learned from the consultancy Innerspace that’s all about telling your story-but telling it in a new and possibly more authentic way.</span></p><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">To begin, have your participants turn to their neighbor and tell their life stories in just two minutes. Next, have each participant do it again; however, this time, have them share their story in a way that’s totally different from the way they normally do.</span></p><span data-dcnode-id="1913" instrument_node="">
</span><p data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Hossain says that people usually go straight to their work lives: “People tell each other where they went to college and their paths through various jobs that got them to this moment. When forced to do something different, they immediately start sharing things they usually never would in a professional setting-and they get really into it.” (Hossain, as quoted in First Round Review, 2018).</span></p><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">In the second round, they open up quite a bit. They’ll talk about their real reasons for leaving a job and transitioning to another, why they moved, and what drives them. It’s a sort of “behind the scenes” peek at the real, more complex, and vastly more interesting story.</span></p><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Once each participant has told both versions of their story, get the whole group together again and have them share out about their partner’s story. Encourage them to note what changed and what was most interesting about those changes. The participants will likely find that they got to know each other far better than they thought they would in just two minutes of talking!</span></p><span data-dcnode-id="1904" instrument_node="">
</span><h4 data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">Empathy Cards</span></h4><span data-dcnode-id="1901" instrument_node="">
</span><p data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">The coaching firm Reboot taught Hossain this last icebreaker activity. It’s a great choice when you hope your participants will be vulnerable, open, and make meaningful connections.</span></p><span data-dcnode-id="1898" instrument_node="">
</span><p data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Before the official icebreaker-perhaps during a breakfast, cocktail hour, or whenever else you can fit it in.</span></p><span data-dcnode-id="1895" instrument_node="">
</span><p data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Give participants an index card and have each of them write down one work-related thing that worries them or causes them anxiety, preferably one that they don’t usually share with others. These cards should remain anonymous, so make sure they don’t write their names down on them.</span></p><span data-dcnode-id="1892" instrument_node="">
</span><p data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Gather them up and shuffle them, then place a card at each seat or space at the table. The idea is that each participant receives someone else’s card, and each participant can see that they’re not alone-we all have fears, anxieties, worries, and concerns hanging over us.</span></p><span data-dcnode-id="1889" instrument_node="">
</span><p data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">This icebreaker reinforces that we are all vulnerable and we’re not alone, which is a great place to start an open and empathic dialogue between participants (First Round Review, 2018).</span></p><span data-dcnode-id="1886" instrument_node="">
</span><p data-dcnode-id="1882"><a data-dcnode-id="1884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fastcompany.com/40557322/3-icebreakers-to-build-empathy-among-strangers-within-10-minutes" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1885" instrument_node="">Click here</span></a><span data-dcnode-id="1883" instrument_node=""> to see the last three activities described on the Fast Company website.</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1878" instrument_node="">
</span><h3 data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">3 Group Activities to Help Develop EQ</span></h3><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">Once you’ve successfully broken the ice, give this group activity a try. It has three separate levels with a range of time commitments, so you’re bound to find at least one level that works for you and your team.</span></p><span data-dcnode-id="1872" instrument_node="">
</span><h4 data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Compass Points Activity: Level One</span></h4><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">This group activity was designed off of work by the National School Reform Faculty, a non-profit professional development site for educators, and it works well with both teens and adults.</span></p><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Before the activity, you have a bit of preparation to do:</span></p><span data-dcnode-id="1863" instrument_node="">
</span><ul data-dcnode-id="1841"><span data-dcnode-id="1862" instrument_node="">
</span><li data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Create the four signs: North, South, East and West.</span></li><span data-dcnode-id="1859" instrument_node="">
</span><li data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Post them on the walls of the room before your participants arrive.</span></li><span data-dcnode-id="1856" instrument_node="">
</span><li data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">Bring large pieces of paper or flip-boards and markers for four groups.</span></li><span data-dcnode-id="1853" instrument_node="">
</span><li data-dcnode-id="1843"><span data-dcnode-id="1852" instrument_node="">Under each sign, list the traits associated, as directed by the Compass Points game:</span><br data-dcnode-id="1851"><span data-dcnode-id="1850" instrument_node="">
North: Acting – “Let’s do it;” Likes to act, try things, plunge in.</span><br data-dcnode-id="1849"><span data-dcnode-id="1848" instrument_node="">
East: Speculating – likes to look at the big picture and the possibilities before acting.</span><br data-dcnode-id="1847"><span data-dcnode-id="1846" instrument_node="">
South: Caring – likes to know that everyone’s feelings have been taken into consideration and that their voices have been heard before acting.</span><br data-dcnode-id="1845"><span data-dcnode-id="1844" instrument_node="">
West: Paying attention to detail -likes to know the who, what, when, where and why before acting.</span></li><span data-dcnode-id="1842" instrument_node="">
</span></ul><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Now you’re ready to begin the activity. The Level One activity only takes about 20 minutes.</span></p><span data-dcnode-id="1837" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Begin by pointing out the four compass points posted around the room to your participants, and ask them to read the information posted under each point. Next, they should gather under the point that most accurately captures how they work with others on teams.</span></p><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Once everyone has chosen their point, have your participants look around and see who has ended up in each group and think about whether that makes sense to them or gives them any new insights about their coworkers and peers.</span></p><span data-dcnode-id="1831" instrument_node="">
</span><p data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Direct each group to select three individuals for three team member roles:</span></p><span data-dcnode-id="1828" instrument_node="">
</span><ol data-dcnode-id="1817"><span data-dcnode-id="1827" instrument_node="">
</span><li data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">Recorder – records responses of the group</span></li><span data-dcnode-id="1824" instrument_node="">
</span><li data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Timekeeper – keeps the group members on task</span></li><span data-dcnode-id="1821" instrument_node="">
</span><li data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">Spokesperson — shares out on behalf of the group when time is called</span></li><span data-dcnode-id="1818" instrument_node="">
</span></ol><span data-dcnode-id="1816" instrument_node="">
</span><p data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">Once the teams are set up and ready to get started, give the groups 5 to 10 minutes to respond to these questions:</span></p><span data-dcnode-id="1813" instrument_node="">
</span><ol data-dcnode-id="1796"><span data-dcnode-id="1812" instrument_node="">
</span><li data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">What are the strengths of your style? (3-4 adjectives)</span></li><span data-dcnode-id="1809" instrument_node="">
</span><li data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">What are the limitations of your style? (3-4 adjectives)</span></li><span data-dcnode-id="1806" instrument_node="">
</span><li data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">What style do you find most difficult to work with and why?</span></li><span data-dcnode-id="1803" instrument_node="">
</span><li data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">What do people from other “directions” or styles need to know about you so you can work together effectively?</span></li><span data-dcnode-id="1800" instrument_node="">
</span><li data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">What’s one thing you value about each of the other three styles?</span></li><span data-dcnode-id="1797" instrument_node="">
</span></ol><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">When time is up and each team has answered all five questions, give them time to share out their responses.</span></p><span data-dcnode-id="1792" instrument_node="">
</span><p data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">You’ll probably hear some things like:</span></p><span data-dcnode-id="1789" instrument_node="">
</span><ul data-dcnode-id="1772"><span data-dcnode-id="1788" instrument_node="">
</span><li data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">North gets impatient with West’s need for details</span></li><span data-dcnode-id="1785" instrument_node="">
</span><li data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">West gets frustrated by North’s tendency to act before planning</span></li><span data-dcnode-id="1782" instrument_node="">
</span><li data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">South group members crave personal connections and get uncomfortable when team members’ emotional needs aren’t met</span></li><span data-dcnode-id="1779" instrument_node="">
</span><li data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">East group members get bored when West gets mired in details.</span></li><span data-dcnode-id="1776" instrument_node="">
</span><li data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">East gets frustrated when North dives in before agreeing on big goals</span></li><span data-dcnode-id="1773" instrument_node="">
</span></ul><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">As you wrap up the activity, give everyone at least 2 minutes to share their insights and key takeaways. If this takeaway doesn’t come up on its own, be sure to include it as part of the activity conclusion:</span></p><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">This activity increases our awareness of our own and others’ preferences and styles, and helps us to better understand, communicate with, and work with people who have different preferences and styles. Ultimately, this diversity almost always leads to better results (Allen, 2015).</span></p><span data-dcnode-id="1765" instrument_node="">
</span><h4 data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Compass Points Activity: Level Two</span></h4><span data-dcnode-id="1762" instrument_node="">
</span><p data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">To get a little deeper into this activity, you can go for Level Two.</span></p><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">It adds about 10 minutes to the first level by including a component that makes the activity more personally relevant: after participants have chosen a preference compass point, have them think of a past team experience they’ve had that was either very positive or very negative. For now, tell them to think of it but just keep it in mind; it will come into play later.</span></p><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Encourage them to think of one they feel comfortable sharing, since they’ll be asked to report out to the group.</span></p><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">After the participants have completed the first level activities and shared out some of their thoughts, ask them to think about their personal positive or negative team experience again. Tell them to spend a few moments reflecting on what they learned from this exercise and how it applies to their team experience; does it help them better understand why this past team experience was a very good one or a very bad one?</span></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">The point of this extra portion of the activity is to get them thinking about what they’ve learned and how it applies in their real life. They may have some “a-ha” moments or insights that wouldn’t have come up without this exercise to get them thinking about it. Give them at least a few minutes to share the personal lessons they’ve learned, then shift into the key takeaways described earlier (Allen, 2015).</span></p><span data-dcnode-id="1747" instrument_node="">
</span><h4 data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Compass Points Activity: Level Three</span></h4><span data-dcnode-id="1744" instrument_node="">
</span><p data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">To get really deep into the exercise and drive the point about emotional intelligence home, try the third level. You’ll need about 45 minutes to complete the whole thing.</span></p><span data-dcnode-id="1741" instrument_node="">
</span><p data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">The pieces added to Level Three include a warm-up at the beginning and some preferences background information before moving into the Level Two portion described above.</span></p><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Here’s how to do the warm-up:</span></p><span data-dcnode-id="1735" instrument_node="">
</span><p data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">“Begin by projecting an image of team members working together to achieve a goal. For example, there’s a terrific image of Universal Picture’s minions working together to screw in a light bulb. Ask participants to pair up and discuss what they notice about the team – their interactions, their facial expressions, and their progress. This can be a lighthearted yet focused way to kick off the exercise.”</span></p><span data-dcnode-id="1732" instrument_node="">
</span><p data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Once participants are all warmed up and ready to get started, you can move them into the preferences background information.</span></p><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Spend some time describing preferences and emphasizing exactly what they are-our natural inclinations or inherent tendencies. Emphasize that they are not things that we have chosen about ourselves, but pretty permanent features of our personality.</span></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">For this exercise, the relevant preferences are those related to how we tend to behave in teams. Make sure to also outline what they are not (e.g., ways to label, categorize, or judge ourselves or others). They are also not good or bad; each type has its strengths and weaknesses. To help them understand, you can talk a little bit about famed psychologist Carl Jung’s research into personality types, including extraversion and introversion.</span></p><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Once your participants have a good grasp of what these preferences and personality features are and why they are not “good” or “bad,” you can shift into the activity itself. Allow participants enough time to come up with their personal team experience and share out on it.</span></p><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">After each group shares their responses and participants have an opportunity to share some of their reflections on personal team experiences, make sure you have a few minutes left for the key takeaways discussion (Allen, 2015).</span></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1716" instrument_node="">Read more:&nbsp;</span><a data-dcnode-id="1714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/emotional-intelligence-exercises/"><span data-dcnode-id="1715" instrument_node="">13 Emotional Intelligence Activities &amp; Exercises</span></a></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1710"><a data-dcnode-id="1711" name="EI-HR"></a></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1706" instrument_node="">
</span><h2 data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Using EI in HR (Human Resources)</span></h2><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">HR is one of the most effective places to apply what we know about emotional intelligence. Besides contributing to better communication, relationships, and problem-solving among current employees, emotional intelligence can also help you to identify the best candidates for positions within the organization.</span></p><span data-dcnode-id="1700" instrument_node="">
</span><p data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Read on to learn how.</span></p><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1694" instrument_node="">
</span><h3 data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Using Emotional Intelligence Interview Questions</span></h3><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1686"><img alt="Emotional intelligence interviewing" class="alignright wp-image-24138 size-medium lazyload" data-dcnode-id="1690" data-src="https://positivepsychology.com/wp-content/uploads/Workplace-EI-Interviewing-300x200.jpg" height="200" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Emotional intelligence interviewing" width="300"><noscript data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">&lt;img class="alignright wp-image-24138 size-medium lazyload" title="Emotional intelligence interviewing" src="https://positivepsychology.com/wp-content/uploads/Workplace-EI-Interviewing-300x200.jpg" alt="Emotional intelligence interviewing" width="300" height="200" /&gt;</span></noscript><span data-dcnode-id="1687" instrument_node="">Emotional intelligence interview questions can be extremely helpful in narrowing down your pool of applicants, especially if you have a lot of applicants with similarly impressive qualifications.</span></p><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">However, make sure you don’t just jump in and come up with your own ways to assess emotional intelligence; follow these guidelines to make sure you’re doing it the right way.</span></p><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Don’t:</span></p><span data-dcnode-id="1679" instrument_node="">
</span><ul data-dcnode-id="1664"><span data-dcnode-id="1678" instrument_node="">
</span><li data-dcnode-id="1674"><span data-dcnode-id="1677" instrument_node="">Use personality tests as a proxy for EI; many of the EI/EQ measures are designed to measure emotional intelligence as a facet of personality rather than an indicator of work habits, competencies, and skills. They may not measure specific components of emotional intelligence such as self-awareness, positive outlook, achievement orientation, empathy, or inspirational leadership.</span><br data-dcnode-id="1676"><br data-dcnode-id="1675"></li><span data-dcnode-id="1673" instrument_node="">
</span><li data-dcnode-id="1669"><span data-dcnode-id="1672" instrument_node="">Use a self-report test (i.e., a test in which your candidates answer questions and report on their own emotional intelligence. This doesn’t really work for two reasons: (1) if a person is not self-aware, they possibly aren’t going to be able to accurately assess their own emotional intelligence, and (2) if they are self-aware, you could be giving them the opportunity to exaggerate their skills or abilities and make themselves seem like a better candidate than they really are.</span><br data-dcnode-id="1671"><br data-dcnode-id="1670"></li><span data-dcnode-id="1668" instrument_node="">
</span><li data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">Use a 360-degree feedback instrument-even if it is a good measure of EI competencies. A tool like 360-degree feedback is best used for development and improvement in current employees rather than evaluation and hiring. When these instruments are used to evaluate, some people “game” them by carefully selecting the respondents and even instructing them how to answer the questions.</span></li><span data-dcnode-id="1665" instrument_node="">
</span></ul><span data-dcnode-id="1663" instrument_node="">
</span><p data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Do:</span></p><span data-dcnode-id="1660" instrument_node="">
</span><ul data-dcnode-id="1650"><span data-dcnode-id="1659" instrument_node="">
</span><li data-dcnode-id="1655"><span data-dcnode-id="1658" instrument_node="">Get references for the candidate-and actually call them! Letters of reference don’t cut it when it comes to gauging a candidate’s EI/EQ, because they are carefully prepared, static, and usually pretty general. When you get the chance to speak with a candidate’s references, you can ask them questions that really get to the heart of EI/EQ and its subcomponents and competencies. Get as many examples as you can and press for details. Above all, be sure to ask for examples of how your candidate treats other people.</span><br data-dcnode-id="1657"><br data-dcnode-id="1656"></li><span data-dcnode-id="1654" instrument_node="">
</span><li data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Interview for emotional intelligence. This might sound easy or like it’s something you are already doing, but chances are you aren’t actually assessing EI/EQ. In interviews that aren’t strictly structured, we usually let people be vague in their responses-even to the point of not really answering the question-and we often fail to ask good follow-up questions. Even when we ask candidates directly about emotional intelligence or EI-related competencies, they generally provide us with a picture of an idealized version of themselves rather than an accurate portrait of their real selves. To overcome these obstacles to getting a good handle on your candidates’ EI/EQ, behavioral event interviewing is the way to go (McKee, 2016).</span></li><span data-dcnode-id="1651" instrument_node="">
</span></ul><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Behavioral event interviewing is a method that allows you to see their EI/EQ competencies almost firsthand.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Annie McKee from the Harvard Business Review explains how to do it:</span></p><span data-dcnode-id="1643" instrument_node="">
</span><ol data-dcnode-id="1613"><span data-dcnode-id="1642" instrument_node="">
</span><li data-dcnode-id="1638"><span data-dcnode-id="1641" instrument_node="">Start the interview off on the right foot; make it as warm, friendly, and comfortable as possible. This will help you get the candidate in a frame of mind conducive to sharing the information you want to get.</span><br data-dcnode-id="1640"><br data-dcnode-id="1639"></li><span data-dcnode-id="1637" instrument_node="">
</span><li data-dcnode-id="1633"><span data-dcnode-id="1636" instrument_node="">Ask a few traditional questions about the candidate’s experience, background, and education.</span><br data-dcnode-id="1635"><br data-dcnode-id="1634"></li><span data-dcnode-id="1632" instrument_node="">
</span><li data-dcnode-id="1628"><span data-dcnode-id="1631" instrument_node="">Next, ask the candidate about a recent situation where she and some of her peers (coworkers, teammates, etc.) faced a difficult challenge that needed solving, and encourage her to pick one where she’s the “protagonist” of the story and one where she was ultimately successful and/or proud of her solution.</span><br data-dcnode-id="1630"><br data-dcnode-id="1629"></li><span data-dcnode-id="1627" instrument_node="">
</span><li data-dcnode-id="1623"><span data-dcnode-id="1626" instrument_node="">Ask her to tell the story in a few brief sentences first. Once you have the outline, have her go over the story in detail and ask her specific, detailed questions about it (e.g., what she thought at a certain point, how she felt about what happened, what she did about it).</span><br data-dcnode-id="1625"><br data-dcnode-id="1624"></li><span data-dcnode-id="1622" instrument_node="">
</span><li data-dcnode-id="1618"><span data-dcnode-id="1621" instrument_node="">Ask her to share a similar story except this time it should be about a time when she failed and learned a valuable lesson. Again, have her give a brief overview then go more in-depth, and ask detailed questions.</span><br data-dcnode-id="1620"><br data-dcnode-id="1619"></li><span data-dcnode-id="1617" instrument_node="">
</span><li data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Finally, end on a positive note-ask for another positive story.</span></li><span data-dcnode-id="1614" instrument_node="">
</span></ol><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">This technique will give you insight into your candidate’s thought processes, her awareness of her own emotions, how she thinks and feels about others, what she does during a conflict, and how she handles disagreements and challenges with other people (McKee, 2016).</span></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">You may not be great at this method right away, but practice makes perfect!</span></p><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1603" instrument_node="">
</span><h3 data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">25 Emotional Intelligence Interview Questions</span></h3><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">There are tons of good questions you can ask to gauge emotional intelligence. These six were identified by Karla Cook, editor and team manager at HubSpot Marketing, as some of the best ones to get an indicator of EI/EQ:</span></p><span data-dcnode-id="1597" instrument_node="">
</span><ol data-dcnode-id="1577"><span data-dcnode-id="1596" instrument_node="">
</span><li data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">Can you tell me about a time you tried to do something and failed?</span></li><span data-dcnode-id="1593" instrument_node="">
</span><li data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Tell me about a time you received negative feedback from your boss. How did that make you feel?</span></li><span data-dcnode-id="1590" instrument_node="">
</span><li data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Can you tell me about a conflict at work that made you feel frustrated?</span></li><span data-dcnode-id="1587" instrument_node="">
</span><li data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Tell me about a hobby you like to do outside of work. Can you teach me about it?</span></li><span data-dcnode-id="1584" instrument_node="">
</span><li data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">What would your co-workers say is the most rewarding thing about working with you? What about the most challenging thing?</span></li><span data-dcnode-id="1581" instrument_node="">
</span><li data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Can you tell me about a time you needed to ask for help on a project? (Cook, 2017).</span></li><span data-dcnode-id="1578" instrument_node="">
</span></ol><span data-dcnode-id="1576" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">These six questions offer you some great opportunities to learn about your candidates EI/EQ, but if you need even more suggestions, check out the list below from Alison Doyle at The Balance Careers:</span></p><span data-dcnode-id="1573" instrument_node="">
</span><ul data-dcnode-id="1514"><span data-dcnode-id="1572" instrument_node="">
</span><li data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">What is one of your weaknesses? How do you overcome that weakness?</span></li><span data-dcnode-id="1569" instrument_node="">
</span><li data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">What motivates you to do your work?</span></li><span data-dcnode-id="1566" instrument_node="">
</span><li data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Describe a stressful work situation you’ve had. How did you resolve that situation?</span></li><span data-dcnode-id="1563" instrument_node="">
</span><li data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">What are one or two things that make you angry or frustrated at work? What do you do when you get angry or frustrated at work?</span></li><span data-dcnode-id="1560" instrument_node="">
</span><li data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Tell me about a time when you received feedback on your performance, and you disagreed with the feedback. How did you handle the situation?</span></li><span data-dcnode-id="1557" instrument_node="">
</span><li data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Tell me about a setback you had at work. How did you handle it?</span></li><span data-dcnode-id="1554" instrument_node="">
</span><li data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Describe a time when you made a big mistake at work. How did you handle the situation?</span></li><span data-dcnode-id="1551" instrument_node="">
</span><li data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Tell me about a time when you had to handle multiple work assignments at once. How did you feel? How did you handle the situation?</span></li><span data-dcnode-id="1548" instrument_node="">
</span><li data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Tell me about a time when you took on a task at work that was new to you. How did you feel doing it?</span></li><span data-dcnode-id="1545" instrument_node="">
</span><li data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">How would you handle a coworker who consistently does not pull his weight on group assignments?</span></li><span data-dcnode-id="1542" instrument_node="">
</span><li data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">How do your colleagues benefit from working with you?</span></li><span data-dcnode-id="1539" instrument_node="">
</span><li data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Tell me about a time when you did or said something that had a positive impact on an employee, coworker, or customer.</span></li><span data-dcnode-id="1536" instrument_node="">
</span><li data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Have you ever noticed that someone at work was having a bad day? How did you know? What did you do?</span></li><span data-dcnode-id="1533" instrument_node="">
</span><li data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Tell me about a time when you had a dispute with a colleague. What did you do to deal with the situation?</span></li><span data-dcnode-id="1530" instrument_node="">
</span><li data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Describe a time when a colleague came to you with a problem. How did you respond?</span></li><span data-dcnode-id="1527" instrument_node="">
</span><li data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Tell me about a time when understanding someone else’s perspective helped you accomplish a task or resolve an issue.</span></li><span data-dcnode-id="1524" instrument_node="">
</span><li data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Tell me about a time when you motivated someone to accomplish a task. How did you motivate him or her?</span></li><span data-dcnode-id="1521" instrument_node="">
</span><li data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Why is it important to develop a rapport with your colleagues?</span></li><span data-dcnode-id="1518" instrument_node="">
</span><li data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">How do you build a rapport with your colleagues? (Doyle, 2018).</span></li><span data-dcnode-id="1515" instrument_node="">
</span></ul><span data-dcnode-id="1513" instrument_node="">
</span><p data-dcnode-id="1511"><a data-dcnode-id="1512" name="HBR-EI"></a></p><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1507" instrument_node="">
</span><h2 data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">HBR and Emotional Intelligence</span></h2><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">As you may have noticed from the citations, the Harvard Business Review is at the forefront of sharing information about and applications of emotional intelligence in the workplace. To dive a little deeper into the finer points of this topic, check out these two resources from HBR:</span></p><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1498"><em data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Harvard Business Review Everyday Emotional Intelligence: Big Ideas and Practical Advice on How to Be Human at Work</span></em></p><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">This double-volume will give you a broad understanding of emotional intelligence, with HBR’s top 10 “must-reads” on the subject along with information and advice from HBR on how to actually apply this knowledge.</span></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">The book description promises that you’ll learn how to:</span></p><span data-dcnode-id="1491" instrument_node="">
</span><ul data-dcnode-id="1462"><span data-dcnode-id="1490" instrument_node="">
</span><li data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Recognize your own EQ strengths and weaknesses</span></li><span data-dcnode-id="1487" instrument_node="">
</span><li data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Regulate your emotions in tough situations</span></li><span data-dcnode-id="1484" instrument_node="">
</span><li data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Manage difficult people</span></li><span data-dcnode-id="1481" instrument_node="">
</span><li data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Build the social awareness of your team</span></li><span data-dcnode-id="1478" instrument_node="">
</span><li data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Motivate yourself through ups and downs</span></li><span data-dcnode-id="1475" instrument_node="">
</span><li data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Write forceful emails people won’t misinterpret</span></li><span data-dcnode-id="1472" instrument_node="">
</span><li data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Make better, less emotionally biased decisions</span></li><span data-dcnode-id="1469" instrument_node="">
</span><li data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Help an employee develop emotional intelligence</span></li><span data-dcnode-id="1466" instrument_node="">
</span><li data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Handle specific situations like crying at work and tense communications across different cultures</span></li><span data-dcnode-id="1463" instrument_node="">
</span></ul><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1457"><a data-dcnode-id="1459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Harvard-Business-Everyday-Emotional-Intelligence/dp/1633694119/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1460" instrument_node="">Click here</span></a><span data-dcnode-id="1458" instrument_node=""> to check it out.</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1455" instrument_node="">HBR </span><em data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Guides to Emotional Intelligence at Work </span></em><span data-dcnode-id="1452" instrument_node="">(5 Books from the HBR Guide Series)</span></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">This is a five-volume set of books that dive into the topic of emotional intelligence at work. It includes valuable information on emotional intelligence in general, office politics, dealing with conflict, managing stress at work, and managing “up and across.”</span></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Through this set, you’ll learn how to:</span></p><span data-dcnode-id="1444" instrument_node="">
</span><ul data-dcnode-id="1418"><span data-dcnode-id="1443" instrument_node="">
</span><li data-dcnode-id="1438"><span data-dcnode-id="1442" instrument_node="">Monitor and channel your </span><a data-dcnode-id="1440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/mood-charts-track-your-mood/"><span data-dcnode-id="1441" instrument_node="">moods</span></a><span data-dcnode-id="1439" instrument_node=""> and reactions</span></li><span data-dcnode-id="1437" instrument_node="">
</span><li data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Determine your emotional intelligence strengths and weaknesses</span></li><span data-dcnode-id="1434" instrument_node="">
</span><li data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Deal with difficult people</span></li><span data-dcnode-id="1431" instrument_node="">
</span><li data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Understand when to resolve a conflict head-on–and when to let it go</span></li><span data-dcnode-id="1428" instrument_node="">
</span><li data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Influence others across the organization</span></li><span data-dcnode-id="1425" instrument_node="">
</span><li data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Build supportive alliances with coworkers and colleagues</span></li><span data-dcnode-id="1422" instrument_node="">
</span><li data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Handle workplace stress in productive ways</span></li><span data-dcnode-id="1419" instrument_node="">
</span></ul><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1416" instrument_node="">You can find this set for sale or learn more about it on </span><a data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Guides-Emotional-Intelligence-Collection-Books/dp/1633694178/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1415" instrument_node="">Amazon</span></a><span data-dcnode-id="1413" instrument_node="">.</span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409"><a data-dcnode-id="1410" name="Books"></a></p><span data-dcnode-id="1408" instrument_node="">

</span><h2 data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">A Take-Home Message</span></h2><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">I hope you enjoyed this dive into emotional intelligence at work! It’s a vital topic to understand for managers, HR professionals, and leadership at all levels.</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">However, even if you don’t fall into any of the categories above, understanding your own emotions and working on your emotion recognition and management skills is still a good idea!</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">What are your thoughts on emotional intelligence? Do you think it’s really as important as they say? How do you get an estimate of someone’s emotional intelligence without using validated tests or scales? How do you think it can be improved? Let us know in the comments section!</span></p><span data-dcnode-id="1315" instrument_node="">
