</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">People are naturally reactive. It’s why children cry when they don’t get their way. It’s why otherwise professional coworkers rage quit. But, as most adults know, we are able to overcome our natural tendencies (hence, you don’t punch your coworker in the face when they’re two days late on a report).</span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Developing the ability to understand, interpret and effectively respond to our own emotions and the emotions of others is especially important for HR. It helps us communicate more effectively and overcome challenges—two things demanded of us daily. Further, people with emotional intelligence are more respected, rise to leadership positions more often and are able to step over office politics to focus on their productivity.</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">&nbsp;</span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="843"><em data-dcnode-id="844"><span data-dcnode-id="847" instrument_node="">Infographic&nbsp;credit: </span><a class="tracker-binded" data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//onlinemba.umd.edu/resources/webinars-and-infographics/emotional-iq-and-you" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="846" instrument_node="">Emotional IQ and You/onlinemba.umd.edu/ via onlinemba.umd.edu</span></a></em></p><span data-dcnode-id="842" instrument_node="">
</span><div class="essb_break_scroll" data-dcnode-id="841"></div><span data-dcnode-id="840" instrument_node=""> </span></div><span data-dcnode-id="838" instrument_node="">
</span><div class="blogPostContent" data-dcnode-id="772"><span data-dcnode-id="837" instrument_node="">
</span><div class="blogPostContent__ctaContainer blogPostContent__ctaContainer--right" data-dcnode-id="826"><span data-dcnode-id="836" instrument_node="">
</span><div class="blogPostContent__ctaText" data-dcnode-id="834" style="color: #1b7b7e;"><span data-dcnode-id="835" instrument_node="">How to Use Emotional Intelligence in the Workplace</span></div><span data-dcnode-id="833" instrument_node="">
</span><div class="blogPostContent__ctaBtnContainer" data-dcnode-id="828"><span data-dcnode-id="832" instrument_node="">
</span><a aria-label="Read More - opens in a new tab" class="Button Button--small blogPostContent__ctaBtn js-blog-cta-btn1" data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bamboohr.com/blog/emotional-intelligence-workplace/" rel="noopener noreferrer" style="background-color: #1b7b7e;" target="_blank"><span data-dcnode-id="831" instrument_node="">Read More</span></a><span data-dcnode-id="829" instrument_node="">
</span></div><span data-dcnode-id="827" instrument_node="">
</span></div><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Here are five ways to improve your emotional intelligence and workplace effectiveness:</span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="817"><strong data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">1. Meditate.&nbsp;</span></strong><br data-dcnode-id="819"><span data-dcnode-id="818" instrument_node="">
In order to rationally manage your emotions, you must be aware of them. In HR, most days come with emotional challenges—whether you’re frustrated at an employee derailing company culture, you have to let someone go or can’t seem to get your reporting to come out just right. You need to take a little time to process. Even if all you can afford is to close your door, shut your eyes and sit in silence for 5 minutes, do it! Allowing yourself time to process your emotions is a great way to make sense of them and act logically in the face of emotional turmoil.</span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="811"><strong data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">2. Be honest with yourself and others.&nbsp;</span></strong><br data-dcnode-id="813"><span data-dcnode-id="812" instrument_node="">
Being emotionally intelligent doesn’t mean stuffing how you feel into a little internal box until it spontaneously combusts. Yes, you will sometimes have to filter exactly how you feel. But expressing how situations affect you in a mature way is the only way to improve problems. Just remember to take time to really acknowledge and sort through your emotions before you express them. You may discover how you truly feel about something or think of a great way to be honest about them.</span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="805"><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">3. Give the benefit of the doubt.</span></strong><br data-dcnode-id="807"><span data-dcnode-id="806" instrument_node="">
If other people act irrationally toward you or anyone else in the company, realize that the problem extends beyond the target. People don’t act irrationally due to one event; they act irrationally in response to being overwhelmed. You never know what could be happening beyond the person’s professional life. Don’t take it personally, and don’t match their emotional behavior.</span></p><span data-dcnode-id="804" instrument_node="">
</span><div class="blogPostContent__ctaContainer blogPostContent__ctaContainer--left" data-dcnode-id="793"><span data-dcnode-id="803" instrument_node="">
</span><div class="blogPostContent__ctaText" data-dcnode-id="801" style="color: #1b7b7e;"><span data-dcnode-id="802" instrument_node="">11 Leadership Lessons</span></div><span data-dcnode-id="800" instrument_node="">
</span><div class="blogPostContent__ctaBtnContainer" data-dcnode-id="795"><span data-dcnode-id="799" instrument_node="">
</span><a aria-label="Download Now - opens in a new tab" class="Button Button--small blogPostContent__ctaBtn js-blog-cta-btn2" data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bamboohr.com/resources/ebooks/11-leadership-lessons-from-todays-top-people-managers/" rel="noopener noreferrer" style="background-color: #1b7b7e;" target="_blank"><span data-dcnode-id="798" instrument_node="">Download Now</span></a><span data-dcnode-id="796" instrument_node="">
</span></div><span data-dcnode-id="794" instrument_node="">
</span></div><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="787"><strong data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">4. Walk away.</span></strong><br data-dcnode-id="789"><span data-dcnode-id="788" instrument_node="">
Until you master emotional intelligence, you’re going to have to allow yourself to walk away at times. And even when you do master it, sometimes it’s best to let things cool first. When problems are fresh, we aren’t always ready to address them. Most people will respect you if you ask them to let you continue the conversation after you’ve had some time to process. It’s a good idea to extend employees the same courtesy. For example, an employee may be ready to bust down your office door after they receive a less-than-satisfactory review. Chances are, emotions will be high during that meeting. Giving a 48 hour cool-down period helps people really grasp their emotions to interact professionally.</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="781"><strong data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">5. Cultivate good emotional health.</span></strong><br data-dcnode-id="783"><span data-dcnode-id="782" instrument_node="">
Just like your physical health, you should be paying attention to your emotional health. This includes everything from work-life balance to positivity to job satisfaction. Taking an afternoon off might help if you’re feeling overwhelmed. Watching an uplifting TED talk may brighten a gloomy day. It’s easier to stay level-headed in a tough situation when you’re emotionally healthy.</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Developing emotional intelligence requires you to not react how you naturally want to—and therein lies its power. By monitoring your emotions, being honest with yourself and others, giving people the benefit of the doubt, allowing for cool-off time and paying attention to your emotional health, you’ll be in better control. And that control will bring so much peace to your hectic role in HR.</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="774"><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lifehack.org/articles/work/beginning-today-you-can-tremendously-improve-your-career-you-consider-this-study.html" rel="noopener" target="_blank"><img alt="workplace emotions" class="alignnone size-full wp-image-7539" data-dcnode-id="776" height="2911" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bamboohr.com/blog/wp-content/uploads/2015/05/EmotionalIQ-Infographic-3.png&amp;raw" width="540"></a></p><span data-dcnode-id="773" instrument_node="">
