</span><article class="et_pb_post post-19568 post type-post status-publish format-standard has-post-thumbnail hentry category-six-seconds tag-exercise-optimism" data-dcnode-id="2885" id="post-19568"><span data-dcnode-id="4108" instrument_node="">
</span><div class="et_post_meta_wrapper" data-dcnode-id="4087"><span data-dcnode-id="4107" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">Exercise Optimism</span></h1><span data-dcnode-id="4104" instrument_node="">
</span><p class="post-meta" data-dcnode-id="4089"><span data-dcnode-id="4103" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="4100"><a data-dcnode-id="4101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.6seconds.org/author/michael-miller6seconds-org/" rel="author" title="Posts by Michael Miller"><span data-dcnode-id="4102" instrument_node="">Michael Miller</span></a></span><span data-dcnode-id="4099" instrument_node=""> | </span><span class="published" data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">Aug 11, 2016</span></span><span data-dcnode-id="4096" instrument_node=""> | </span><a data-dcnode-id="4094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.6seconds.org/category/six-seconds/" rel="category tag"><span data-dcnode-id="4095" instrument_node="">Six Seconds</span></a><span data-dcnode-id="4093" instrument_node=""> | </span><span class="comments-number" data-dcnode-id="4090"><a data-dcnode-id="4091" href="#respond"><span data-dcnode-id="4092" instrument_node="">5 comments</span></a></span></p><span data-dcnode-id="4088" instrument_node="">
</span></div><span data-dcnode-id="4086" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3139"><span data-dcnode-id="4085" instrument_node="">
</span><p data-dcnode-id="4081"><em data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">The predominant quality of successful people is optimism. Your level of optimism is the very best predictor of how happy, healthy, wealthy and long-lived you will be.”</span></em><span data-dcnode-id="4082" instrument_node=""> ~ Brian Tracy</span></p><span data-dcnode-id="4080" instrument_node="">
</span><p data-dcnode-id="4076"><strong data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">Exercise Optimism Definition:&nbsp;</span></strong><span data-dcnode-id="4077" instrument_node="">Taking a proactive perspective of hope and possibility.</span></p><span data-dcnode-id="4075" instrument_node="">
</span><p data-dcnode-id="4071"><strong data-dcnode-id="4073"><span data-dcnode-id="4074" instrument_node="">Importance: </span></strong><span data-dcnode-id="4072" instrument_node="">By employing a habit of optimism, people take ownership.&nbsp;They generate new options, invent solutions to “unsolvable” problems — and they are healthier, have stronger relationships, do better at work, and are more resilient.&nbsp;</span></p><span data-dcnode-id="4070" instrument_node="">
</span><p data-dcnode-id="4068"><img alt="exercise optimism quote - helen keller: although the world is full of suffering, it is also full of the overcoming of it" class="alignnone size-full wp-image-19776" data-dcnode-id="4069" height="672" loading="lazy" sizes="(max-width: 1080px) 100vw, 1080px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.6seconds.org/wp-content/uploads/2016/08/04220124/optimism-world-suffering-overcoming.jpg&amp;raw" srcset="https://static.6seconds.org/wp-content/uploads/2016/08/04220124/optimism-world-suffering-overcoming.jpg 1080w, https://static.6seconds.org/wp-content/uploads/2016/08/04220124/optimism-world-suffering-overcoming-300x187.jpg 300w, https://static.6seconds.org/wp-content/uploads/2016/08/04220124/optimism-world-suffering-overcoming-768x478.jpg 768w, https://static.6seconds.org/wp-content/uploads/2016/08/04220124/optimism-world-suffering-overcoming-1024x637.jpg 1024w, https://static.6seconds.org/wp-content/uploads/2016/08/04220124/optimism-world-suffering-overcoming-400x250.jpg 400w" width="1080"></p><span data-dcnode-id="4067" instrument_node="">
</span><p data-dcnode-id="4056"><strong data-dcnode-id="4064"><img alt="imgres" class="alignright wp-image-19572 size-full" data-dcnode-id="4066" height="194" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.6seconds.org/wp-content/uploads/2016/08/04220157/imgres.jpg&amp;raw" width="259"><span data-dcnode-id="4065" instrument_node="">Example:</span></strong><span data-dcnode-id="4063" instrument_node=""> If you have a disagreement with a coworker, a perspective of optimism can be a game changer. Instead of thinking, my coworker is </span><em data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">this</span></em><span data-dcnode-id="4060" instrument_node=""> or </span><em data-dcnode-id="4058"><span data-dcnode-id="4059" instrument_node="">that</span></em><span data-dcnode-id="4057" instrument_node="">, and they won’t change anyway so there is nothing I can do, a person using optimism chooses to think that the disagreement was one specific event, which can be discussed after&nbsp;some time passes, and that they can work on communicating&nbsp;better with that coworker.</span></p><span data-dcnode-id="4055" instrument_node="">
</span><p data-dcnode-id="4051"><strong data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">Exercising optimism helps</span></strong><span data-dcnode-id="4052" instrument_node=""> you take ownership of your reactions. It makes people happy, which has a host of other positive effects. We use the term EXERCISE because it takes work — actively seeking out a perspective of possibility.</span></p><span data-dcnode-id="4050" instrument_node="">
</span><h2 data-dcnode-id="4048"><span data-dcnode-id="4049" instrument_node="">The Components of Exercise Optimism</span></h2><span data-dcnode-id="4047" instrument_node="">
</span><p data-dcnode-id="4043"><a data-dcnode-id="4045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//6seconds.org/tools/sei"><span data-dcnode-id="4046" instrument_node="">Six Seconds’ Emotional Intelligence test, SEI</span></a><span data-dcnode-id="4044" instrument_node="">, explores three dimensions to Exercise&nbsp;Optimism: duration, scope and power. For example, imagine&nbsp;someone had a car crash:</span></p><span data-dcnode-id="4042" instrument_node="">
</span><p data-dcnode-id="4035"><strong data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">How long will the problem last?</span></strong><br data-dcnode-id="4039"><span data-dcnode-id="4038" instrument_node="">
Pessimistic: “It’s going to take SUCH a long time&nbsp;for my broken ribs to heal, and the car will never be the same.”</span><br data-dcnode-id="4037"><span data-dcnode-id="4036" instrument_node="">
Optimistic: “It’s going to take months for my broken ribs to heal, it’s a long time, but it’s not forever.”</span></p><span data-dcnode-id="4034" instrument_node="">
</span><p data-dcnode-id="4027"><strong data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">How widespread is the problem?</span></strong><br data-dcnode-id="4031"><span data-dcnode-id="4030" instrument_node="">
Pessimistic: “I can’t do anything until I’m better, my whole life is on hold.”</span><br data-dcnode-id="4029"><span data-dcnode-id="4028" instrument_node="">
Optimistic: “I definitely can’t do sports for awhile, but I will catch up on some reading, and I will be able to work on my writing.”</span></p><span data-dcnode-id="4026" instrument_node="">
</span><p data-dcnode-id="4019"><strong data-dcnode-id="4024"><span data-dcnode-id="4025" instrument_node="">Is there anything I can do about the problem?</span></strong><br data-dcnode-id="4023"><span data-dcnode-id="4022" instrument_node="">
Pessimistic: “This was a freak accident that&nbsp;happened to me, and I just have to hope for a miracle.”</span><br data-dcnode-id="4021"><span data-dcnode-id="4020" instrument_node="">
Optimistic: “I better learn to drive more carefully next time. For now, I’m going to focus on taking care of myself and doing my physical therapy.”</span></p><span data-dcnode-id="4018" instrument_node="">
</span><div class="tweetdis_box tweetdis_none" data-dcnode-id="4002"><span data-dcnode-id="4017" instrument_node=""> </span><a class="tweetdis_box_link tweetdis_box_01 tweetdis_color_1" data-dcnode-id="4004" href="#" onclick="window.open('https://twitter.com/intent/tweet?text=Exercise%20Optimism.%20Hard%20work%20of%20choosing%20to%20find%20opportunity%2C%20even%20in%20challenge%20https%3A%2F%2Ftinyurl.com%2Fy64c3mt4', '_blank', 'width=500,height=500'); return false;"><span data-dcnode-id="4016" instrument_node=""> </span><p class="tweetdis_font_original" data-dcnode-id="4014"><span data-dcnode-id="4015" instrument_node="">Exercise Optimism. Hard work of choosing to find opportunity, even in challenge</span></p><span data-dcnode-id="4013" instrument_node=""> </span><span class="tweetdis_clearfix" data-dcnode-id="4006"><span data-dcnode-id="4012" instrument_node=""> </span><span class="tweetdis_click_to_tweet" data-dcnode-id="4008"><span data-dcnode-id="4011" instrument_node=""> </span><i data-dcnode-id="4010"></i><span data-dcnode-id="4009" instrument_node="">Click to tweet </span></span><span data-dcnode-id="4007" instrument_node=""> </span></span><span data-dcnode-id="4005" instrument_node=""> </span></a><span data-dcnode-id="4003" instrument_node=""> </span></div><span data-dcnode-id="4001" instrument_node="">
