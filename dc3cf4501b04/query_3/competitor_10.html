</span><article class="post-100399 post type-post status-publish format-standard has-post-thumbnail hentry category-optimism" data-dcnode-id="1480" id="post-100399"><span data-dcnode-id="2641" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1482"><span data-dcnode-id="2640" instrument_node="">
</span><p data-dcnode-id="2635"><img alt="learned optimism" class="alignright wp-image-103267 size-medium lazyloaded" data-dcnode-id="2639" data-src="https://positivepsychology.com/wp-content/uploads/learned-optimism-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/learned-optimism-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/learned-optimism-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/learned-optimism-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/learned-optimism-510x255.jpg 510w, https://positivepsychology.com/wp-content/uploads/learned-optimism.jpg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/wp-content/uploads/learned-optimism-300x150.jpg&amp;raw" srcset="https://positivepsychology.com/wp-content/uploads/learned-optimism-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/learned-optimism-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/learned-optimism-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/learned-optimism-510x255.jpg 510w, https://positivepsychology.com/wp-content/uploads/learned-optimism.jpg 800w" title="learned optimism" width="300"><noscript data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">&lt;img class="alignright wp-image-103267 size-medium lazyload" title="learned optimism" src="https://positivepsychology.com/wp-content/uploads/learned-optimism-300x150.jpg" alt="learned optimism" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/learned-optimism-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/learned-optimism-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/learned-optimism-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/learned-optimism-510x255.jpg 510w, https://positivepsychology.com/wp-content/uploads/learned-optimism.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="2636" instrument_node="">Can you learn to have a positive outlook? And if you could, how would that change your life?</span></p><span data-dcnode-id="2634" instrument_node="">
</span><p data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">Learned optimism is a concept from positive psychology’s founding father, Martin Seligman, that argues that we can cultivate a positive perspective.</span></p><span data-dcnode-id="2631" instrument_node="">
</span><p data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">With a more joyful outlook on life, he explains, we’re in a much better position to enhance our wellbeing.</span></p><span data-dcnode-id="2628" instrument_node="">
</span><p data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">This article is about the learned optimism concept and its benefits, as well as how you can start to change your mindset and life. If you’d love to lead a life from a ‘glass half full with a splash of ice’ perspective, then read on to learn more.</span></p><span data-dcnode-id="2625" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2624" instrument_node="">But first, we thought you might like to </span><a data-dcnode-id="2622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/ebook" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2623" instrument_node="">download our three Positive Psychology Exercises for free</span></a><span data-dcnode-id="2621" instrument_node="">. These science-based exercises explore fundamental aspects of positive psychology, including strengths, values, and self-compassion, and will give you the tools to enhance the wellbeing of your clients, students, or employees.</span></p><span data-dcnode-id="2619" instrument_node="">
</span><div data-dcnode-id="2565" id="inhoud"><span data-dcnode-id="2618" instrument_node="">
</span><h2 data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">This Article Contains:</span></h2><span data-dcnode-id="2615" instrument_node="">
</span><ul data-dcnode-id="2567"><span data-dcnode-id="2614" instrument_node="">
</span><li data-dcnode-id="2611"><a data-dcnode-id="2612" href="#psychology"><span data-dcnode-id="2613" instrument_node="">What Is Learned Optimism in Psychology?</span></a></li><span data-dcnode-id="2610" instrument_node="">
</span><li data-dcnode-id="2607"><a data-dcnode-id="2608" href="#research"><span data-dcnode-id="2609" instrument_node="">Benefits Found in Research</span></a></li><span data-dcnode-id="2606" instrument_node="">

</span><li data-dcnode-id="2573"><a data-dcnode-id="2574" href="#home"><span data-dcnode-id="2575" instrument_node="">A Take-Home Message</span></a></li><span data-dcnode-id="2572" instrument_node="">
</span><li data-dcnode-id="2569"><a data-dcnode-id="2570" href="#references"><span data-dcnode-id="2571" instrument_node="">References</span></a></li><span data-dcnode-id="2568" instrument_node="">
</span></ul><span data-dcnode-id="2566" instrument_node="">
</span></div><span data-dcnode-id="2564" instrument_node="">
</span><p data-dcnode-id="2562"><a data-dcnode-id="2563" name="psychology"></a></p><span data-dcnode-id="2561" instrument_node="">
</span><h2 data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">What Is Learned Optimism in Psychology?</span></h2><span data-dcnode-id="2558" instrument_node="">
</span><p data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">Put succinctly, learned optimism is a concept that says we can change our attitude and behaviors by recognizing and challenging our negative self-talk, among other things. It’s also the title of Seligman’s well-known book, which delves into the theory a little further.</span></p><span data-dcnode-id="2555" instrument_node="">
</span><p data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2552" instrument_node="">
</span><h3 data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">A little background</span></h3><span data-dcnode-id="2549" instrument_node="">
</span><blockquote data-dcnode-id="2546"><p data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">The aim of positive psychology is to begin to catalyze a change in the focus of psychology from preoccupation only with repairing the worst things in life to also building positive qualities.</span></p></blockquote><span data-dcnode-id="2545" instrument_node="">
</span><p data-dcnode-id="2543" style="text-align: right;"><span data-dcnode-id="2544" instrument_node="">Seligman &amp; Csikszentmihalyi, 2000, p. 5</span></p><span data-dcnode-id="2542" instrument_node="">
</span><p data-dcnode-id="2537"><span data-dcnode-id="2541" instrument_node="">Learned optimism is very much a positive psychology concept; it’s the opposite of </span><a data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/learned-helplessness-seligman-theory-depression-cure/"><span data-dcnode-id="2540" instrument_node="">learned helplessness</span></a><span data-dcnode-id="2538" instrument_node="">: a phenomenon whereby individuals believe they are incapable of changing their circumstances after repeatedly experiencing a stressful event (Abramson, Seligman, &amp; Teasdale, 1978; Seligman &amp; Garber, 1980; Maier &amp; Seligman, 2016).</span></p><span data-dcnode-id="2536" instrument_node="">
</span><p data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">Coming originally from a clinical psychology background, and with a lot of his work centered on pessimism, Seligman became curious why some individuals don’t feel helpless even when conditioned to do so. His interest shifted, and he started to look into how we could condition individuals to be more optimistic instead (Peterson, 2000).</span></p><span data-dcnode-id="2533" instrument_node="">
</span><p data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">Some of his earlier work began to consider how optimism and pessimism were related to how people explained the cause of challenges and adverse events, which set the stage for more studies into other subjects:</span></p><span data-dcnode-id="2530" instrument_node="">
</span><ul data-dcnode-id="2519"><span data-dcnode-id="2529" instrument_node="">
</span><li data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">The individual benefits of optimism, compared to pessimism</span></li><span data-dcnode-id="2526" instrument_node="">
</span><li data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">Its impact on health, wellbeing, and success</span></li><span data-dcnode-id="2523" instrument_node="">
</span><li data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">How people can learn to become more optimistic – learned optimism</span></li><span data-dcnode-id="2520" instrument_node="">
</span></ul><span data-dcnode-id="2518" instrument_node="">
</span><p data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2515" instrument_node="">
</span><p data-dcnode-id="2513"><a data-dcnode-id="2514" name="research"></a></p><span data-dcnode-id="2512" instrument_node="">
</span><h2 data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">Benefits Found in Research</span></h2><span data-dcnode-id="2509" instrument_node="">
</span><p data-dcnode-id="2504"><img alt="Learned Optimism" class="alignright size-medium wp-image-144659 lazyload" data-dcnode-id="2508" data-src="https://positivepsychology.com/wp-content/uploads/2019/12/Learned-Optimism-300x150.jpeg" data-srcset="https://positivepsychology.com/wp-content/uploads/2019/12/Learned-Optimism-300x150.jpeg 300w, https://positivepsychology.com/wp-content/uploads/2019/12/Learned-Optimism-768x384.jpeg 768w, https://positivepsychology.com/wp-content/uploads/2019/12/Learned-Optimism.jpeg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="300"><noscript data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">&lt;img class="alignright size-medium wp-image-144659 lazyload" src="https://positivepsychology.com/wp-content/uploads/2019/12/Learned-Optimism-300x150.jpeg" alt="Learned Optimism" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/2019/12/Learned-Optimism-300x150.jpeg 300w, https://positivepsychology.com/wp-content/uploads/2019/12/Learned-Optimism-768x384.jpeg 768w, https://positivepsychology.com/wp-content/uploads/2019/12/Learned-Optimism.jpeg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="2505" instrument_node="">Before examining the findings on optimism’s benefits, let’s consider exactly what the two entail.</span></p><span data-dcnode-id="2503" instrument_node="">
</span><p data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">Pessimism has been defined as: “[the] anticipation of good or bad things to happen in the future” (Carver, Scheier, &amp; Segerstrom, 2010). Optimism is often considered the opposite but can be thought of in different ways.</span></p><span data-dcnode-id="2500" instrument_node="">
</span><p data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">Carver et al. (2010, p. 879) defined optimism from a dispositional standpoint, as “an individual difference variable that reflects the extent to which people hold generalized favorable expectancies for their future.”</span></p><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">According to Seligman’s (2007, p. 52) explanatory style definition, “The basis of optimism does not lie in positive phrases or images of victory, but in the way you think about causes.”</span></p><span data-dcnode-id="2494" instrument_node="">
</span><p data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">From here, we can see where the idea of ‘learnability’ originated.</span></p><span data-dcnode-id="2491" instrument_node="">
</span><p data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">A few benefits of optimism include the following.</span></p><span data-dcnode-id="2488" instrument_node="">
</span><p data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2485" instrument_node="">
</span><h3 data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">1. Improved health</span></h3><span data-dcnode-id="2482" instrument_node="">
</span><p data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">Several studies illustrate the different ways that optimism positively impacts our health.</span></p><span data-dcnode-id="2479" instrument_node="">
</span><p data-dcnode-id="2477" style="padding-left: 40px;"><span data-dcnode-id="2478" instrument_node="">In a study of head and neck cancer patients, optimistic patients reported a higher quality of life both before and after treatment, suggesting that their positive outlook buffered the effects of health-related distress (Allison, Guichard, &amp; Gilain, 2000). Similar findings of lower distress have been reported in individuals undergoing treatment for breast cancer (Carver et al., 1999).</span></p><span data-dcnode-id="2476" instrument_node="">
</span><p data-dcnode-id="2474" style="padding-left: 40px;"><span data-dcnode-id="2475" instrument_node="">Optimistic individuals also tend to be more aware of their health status and how to stay that way. Specifically, Radcliffe and Klein’s (2002) research studied 146 middle-age adults and found that those with high optimism were more informed about heart attack risk factors, as well as the role of other risk factors on their health: stress, alcohol consumption, nutrition, smoking, fat consumption, and exercise.</span></p><span data-dcnode-id="2473" instrument_node="">
</span><p data-dcnode-id="2471" style="padding-left: 40px;"><span data-dcnode-id="2472" instrument_node="">Optimists may also take a more approach-focused method of dealing with health stressors. Rather than trying to avoid, ignore, or withdraw from a health concern, optimistic people are more inclined to seek practical support, cognitively restructure, or reinterpret the situation positively, among other coping methods (Solberg Nes &amp; Segerstrom, 2006).</span></p><span data-dcnode-id="2470" instrument_node="">
</span><p data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">Optimistic people are also less likely to need rehospitalization after a coronary bypass or repeat cardiac operations (Scheier et al., 1999; Helgeson, 2003; Cauley et al., 2017). Compared to pessimists, optimists are also less likely to develop high blood pressure (Everson, Kaplan, Goldberg, &amp; Salonen, 2000), suffer from stress-induced changes in immunity (Kubzansky, Sparrow, Vokonas, &amp; Kawachi, 2001), and even develop heart disease in the first place (Brydon, Walker, Wawrzyniak, Chart, &amp; Steptoe, 2009).</span></p><span data-dcnode-id="2467" instrument_node="">
</span><p data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2464" instrument_node="">
</span><h3 data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">2. Motivation and performance</span></h3><span data-dcnode-id="2461" instrument_node="">
</span><p data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">At work, optimism has been linked to intrinsic motivation to work harder, endure during stressful circumstances, and show more goal-focused behavior (Luthans, 2003).</span></p><span data-dcnode-id="2458" instrument_node="">
</span><p data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">As an important contributor to employees’ wellbeing, it has been linked to improved overall happiness in the workplace, task orientation, solution-focused approaches, perseverance, and decision-making efficacy (Strutton &amp; Lumpkin, 1992; Norman, Collins, Conner, Martin, &amp; Rance, 1995; Podsakoff &amp; MacKenzie, 1997; Chiok Foong Loke, 2001; Harter, Schmidt, &amp; Keyes, 2003; Gavin &amp; Mason, 2004).</span></p><span data-dcnode-id="2455" instrument_node="">
</span><p data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">This higher motivation was also shown in studies of college students (Solberg Nes, Evans, &amp; Segerstrom, 2009). In academic contexts, higher optimism was also coupled with better grade point averages, perhaps because optimistic tendencies have been linked with higher persistence (Segerstrom &amp; Solberg Nes, 2006).</span></p><span data-dcnode-id="2452" instrument_node="">
</span><p data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2449" instrument_node="">
</span><h3 data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">3. Career success</span></h3><span data-dcnode-id="2446" instrument_node="">
</span><p data-dcnode-id="2441"><span data-dcnode-id="2445" instrument_node="">Seligman himself researched the optimism levels of Metropolitan Life Insurance (MetLife) agents in 1985, a study that he describes in </span><em data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">Learned Optimism</span></em><span data-dcnode-id="2442" instrument_node="">. At the time, MetLife was struggling with poor staff retention rates despite investing vast amounts in training, so Seligman introduced an optimism test to their screening process.</span></p><span data-dcnode-id="2440" instrument_node="">
</span><p data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">Because the company was short on employees, they hired a few who scored below the cut-off point. Two years after hiring, the optimistic employees had sold 31% more than the pessimists (Seligman &amp; Schulman, 1986; Seligman, 2006).</span></p><span data-dcnode-id="2437" instrument_node="">
</span><p data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">Furthermore, those candidates who had failed the company’s aptitude test and scored well on the optimism test did 57% better than the pessimists in the second year, suggesting that optimism played a more significant role than selling proficiency.</span></p><span data-dcnode-id="2434" instrument_node="">
</span><p data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">Elsewhere, career optimism has also been linked positively with subjective career success, job satisfaction, and the external marketability of female academics (Spurk, Kauffeld, Barthauer, &amp; Heinemann, 2015). It has even been linked with higher career adaptability (Tolentino et al., 2014), which is “a set of attitudes, competencies, and behaviors that individuals use in fitting themselves to work that suits them” (Savickas, 2013, p. 45).</span></p><span data-dcnode-id="2431" instrument_node="">
</span><p data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">With so many promising findings, it’s encouraging that optimism can be learned. But if that’s the case, how do we get started?</span></p><span data-dcnode-id="2428" instrument_node="">
</span><p data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2425" instrument_node="">
</span><p data-dcnode-id="2423"><a data-dcnode-id="2424" name="taught"></a></p><span data-dcnode-id="2422" instrument_node="">
</span><h2 data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Can Optimism Be Taught?</span></h2><span data-dcnode-id="2419" instrument_node="">
</span><blockquote data-dcnode-id="2416"><p data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">“Life inflicts the same setbacks and tragedies on the optimist as on the pessimist, but the optimist weathers them better.”</span></p></blockquote><span data-dcnode-id="2415" instrument_node="">
</span><p data-dcnode-id="2413" style="text-align: right;"><span data-dcnode-id="2414" instrument_node="">Seligman, 2006, p. 312</span></p><span data-dcnode-id="2412" instrument_node="">
</span><p data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">The positive psychology view of learned optimism is about how we interpret the world, and according to this premise, it’s not a fixed trait nor part of our disposition. Instead, it can be seen as more of a strategy – an outlook that we can learn to cultivate when we start by challenging our automatic negative thoughts.</span></p><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">Some studies suggest that optimism interventions can improve people’s optimism significantly, with the face-to-face Best Possible Self intervention having the most significant effect of all studied (Meevissen, Peters, &amp; Alberts, 2011; Layous, Nelson, &amp; Lyubomirsky, 2013; Malouff &amp; Schutte, 2015).</span></p><span data-dcnode-id="2406" instrument_node="">
</span><p data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">In short: if it can be learned, it can be taught, Seligman (2006) would argue.</span></p><span data-dcnode-id="2403" instrument_node="">
</span><p data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2400" instrument_node="">
</span><p data-dcnode-id="2398"><a data-dcnode-id="2399" name="pessimism"></a></p><span data-dcnode-id="2397" instrument_node="">
</span><h2 data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">What Causes Pessimism?</span></h2><span data-dcnode-id="2394" instrument_node="">
</span><p data-dcnode-id="2389"><img alt="Job loss and depression" class="alignright size-medium wp-image-143526 lazyload" data-dcnode-id="2393" data-src="https://positivepsychology.com/wp-content/uploads/2022/01/Job-loss-and-depression-300x150.jpeg" data-srcset="https://positivepsychology.com/wp-content/uploads/2022/01/Job-loss-and-depression-300x150.jpeg 300w, https://positivepsychology.com/wp-content/uploads/2022/01/Job-loss-and-depression-768x384.jpeg 768w, https://positivepsychology.com/wp-content/uploads/2022/01/Job-loss-and-depression.jpeg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="300"><noscript data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">&lt;img class="alignright size-medium wp-image-143526 lazyload" src="https://positivepsychology.com/wp-content/uploads/2022/01/Job-loss-and-depression-300x150.jpeg" alt="Job loss and depression" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/2022/01/Job-loss-and-depression-300x150.jpeg 300w, https://positivepsychology.com/wp-content/uploads/2022/01/Job-loss-and-depression-768x384.jpeg 768w, https://positivepsychology.com/wp-content/uploads/2022/01/Job-loss-and-depression.jpeg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="2390" instrument_node="">There are a few different explanations in the literature on why we can be pessimistic.</span></p><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">Hecht (2013) discusses a couple of cognitive and perceptual reasons why people tend to be either optimistic or pessimistic.</span></p><span data-dcnode-id="2385" instrument_node="">
</span><p data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2382" instrument_node="">
</span><h3 data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">Attention and information processing</span></h3><span data-dcnode-id="2379" instrument_node="">
</span><p data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">First, it may be down to how we process information and our selective attention. Think of it this way: the glass is either half full or half empty depending on where your focus lies, right?</span></p><span data-dcnode-id="2376" instrument_node="">
</span><p data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">Assuming you’re thirsty, the presence of water in the glass is a positive environmental cue; paying more attention to its presence than its absence is optimistic. You disregard the fact that half the glass is not filled, filtering out the cues that don’t correspond with your positive outlook. And eye-tracking studies suggest that pessimists do the opposite, spending more time looking at unpleasant cues than optimistic people (Isaacowitz, 2005, 2006).</span></p><span data-dcnode-id="2373" instrument_node="">
</span><p data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2370" instrument_node="">
</span><h3 data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">Locus of control</span></h3><span data-dcnode-id="2367" instrument_node="">
</span><p data-dcnode-id="2362"><span data-dcnode-id="2366" instrument_node="">Hecht (2013) describes a second potential cognitive mechanism – the </span><a data-dcnode-id="2364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/internal-external-locus-of-control/"><span data-dcnode-id="2365" instrument_node="">locus of control</span></a><span data-dcnode-id="2363" instrument_node=""> – which refers to our confidence that we can change or control elements of our lives. An internal locus of control is associated with optimism; this is the belief that you can take an active role in controlling things like exam results, work performance, and your environment in general.</span></p><span data-dcnode-id="2361" instrument_node="">
</span><p data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">In contrast, those with an external locus of control tend to feel helpless about changing their relationships, lives, and so forth. The latter, Hecht argues, is pessimistic.</span></p><span data-dcnode-id="2358" instrument_node="">
</span><p data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">While your locus of control and optimism can be viewed as conceptually distinct – think about perceived self-efficacy and luck, for instance – there is doubtless some overlap between the two (Peacock &amp; Wong, 1996).</span></p><span data-dcnode-id="2355" instrument_node="">
</span><p data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2352" instrument_node="">
</span><h3 data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">Attributional style</span></h3><span data-dcnode-id="2349" instrument_node="">
</span><p data-dcnode-id="2344"><span data-dcnode-id="2348" instrument_node="">When we explain or attribute failure to internal, fixed, personal factors, we see them as uncontrollable. A failed relationship, for example, becomes “</span><em data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">I’m not lovable</span></em><span data-dcnode-id="2345" instrument_node="">” – a pessimistic outlook.</span></p><span data-dcnode-id="2343" instrument_node="">
</span><p data-dcnode-id="2338"><span data-dcnode-id="2342" instrument_node="">When we attribute failure to external, localized, and transient circumstances, we can feel hopeful for better results next time. “</span><em data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">I didn’t beat my personal best because I have the flu, but I’ll swim faster when I’m well.”</span></em><span data-dcnode-id="2339" instrument_node=""> This is distinctly optimistic.</span></p><span data-dcnode-id="2337" instrument_node="">
</span><p data-dcnode-id="2329"><span data-dcnode-id="2336" instrument_node="">Attributional styles also apply to positive outcomes, but the other way around. Viewing good results as due to global, stable factors inside ourselves is optimistic. “</span><em data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">I aced that because I’m a great student.</span></em><span data-dcnode-id="2333" instrument_node="">” Attributing them to temporary and uncontrollable causes is pessimistic. “</span><em data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Wow, that was a one-off. It’s downhill from here</span></em><span data-dcnode-id="2330" instrument_node="">” (Abramson et al., 1978).</span></p><span data-dcnode-id="2328" instrument_node="">
</span><p data-dcnode-id="2323"><span data-dcnode-id="2327" instrument_node="">The </span><a data-dcnode-id="2325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ppc.sas.upenn.edu/resources/questionnaires-researchers/attributional-style-questionnaire" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2326" instrument_node="">Attributional Style Questionnaire</span></a><span data-dcnode-id="2324" instrument_node=""> is a self-report measure often used to measure explanatory styles and optimism.</span></p><span data-dcnode-id="2322" instrument_node="">
</span><p data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Returning to our original question, there are a few potential psychological reasons why we may be pessimistic at specific times, or in general. Learned optimism is the idea that these can be addressed.</span></p><span data-dcnode-id="2319" instrument_node="">
</span><p data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2316" instrument_node="">
</span><p data-dcnode-id="2314"><a data-dcnode-id="2315" name="improve"></a></p><span data-dcnode-id="2313" instrument_node="">
</span><h2 data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">How to Improve Optimism</span></h2><span data-dcnode-id="2310" instrument_node="">
</span><p data-dcnode-id="2305"><span data-dcnode-id="2309" instrument_node="">There are a few ways to improve your optimism. Seligman recommends Albert Ellis’s ABC technique in </span><em data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Learned Optimism</span></em><span data-dcnode-id="2306" instrument_node="">, and it doesn’t hurt to know more about the cognitive distortions that need to be changed.</span></p><span data-dcnode-id="2304" instrument_node="">
</span><p data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2301" instrument_node="">
</span><h3 data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Cognitive distortions – The 3 Ps</span></h3><span data-dcnode-id="2298" instrument_node="">
</span><p data-dcnode-id="2290"><span data-dcnode-id="2297" instrument_node="">Three cognitive distortions tend to underpin the way we understand our experiences: </span><em data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">personalization, pervasiveness,</span></em><span data-dcnode-id="2294" instrument_node=""> and </span><em data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">permanence.</span></em><span data-dcnode-id="2291" instrument_node=""> By tackling these distortions, we can learn to be more optimistic.</span></p><span data-dcnode-id="2289" instrument_node="">
</span><p data-dcnode-id="2285"><em data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">Personalization</span></em><span data-dcnode-id="2286" instrument_node=""> can be thought of as an internal vs. external attribution style. If something bad happens, a pessimist will attribute it to internal factors. They’ll see that failure or setback as something that’s their fault, personalizing the outcome. Optimists externalize instead; they aren’t to blame, and next time may be better.</span></p><span data-dcnode-id="2284" instrument_node="">
</span><p data-dcnode-id="2274"><em data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Pervasiveness</span></em><span data-dcnode-id="2281" instrument_node=""> describes the global or specific element of adversity or a negative event. A global or pervasive attribution is pessimistic and closely related to catastrophizing. “</span><em data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">I did a terrible job; I’ll never be hired again – EVER.</span></em><span data-dcnode-id="2278" instrument_node="">” Someone who views an undesirable outcome as pervasive will also be more inclined to believe that it will impact other aspects of their lives, too. “</span><em data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">It means I’m a bad student, too, and unlovable (again)</span></em><span data-dcnode-id="2275" instrument_node="">.” Optimists see positive events as pervasive, it can be argued, rather than negative ones.</span></p><span data-dcnode-id="2273" instrument_node="">
</span><p data-dcnode-id="2263"><em data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Permanence</span></em><span data-dcnode-id="2270" instrument_node=""> is about whether we view a negative situation as fleeting or lasting and unchangeable. A pessimistic explanatory style sounds something like: “</span><em data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">I’ll always be a terrible dancer. It’s just who I am</span></em><span data-dcnode-id="2267" instrument_node="">.” A positive one sounds more like: “</span><em data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">I probably didn’t dance so well because my leg is currently hurting, but I’ll be back on top soon.</span></em><span data-dcnode-id="2264" instrument_node="">” The key takeaway here is that the situation or circumstances are not fixed or unchangeable.</span></p><span data-dcnode-id="2262" instrument_node="">
</span><p data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2259" instrument_node="">
</span><h3 data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">How to become more optimistic – The ABC technique</span></h3><span data-dcnode-id="2256" instrument_node="">
</span><p data-dcnode-id="2251"><span data-dcnode-id="2255" instrument_node="">We can change our explanatory styles by challenging these cognitive distortions. In </span><em data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">Learned Optimism</span></em><span data-dcnode-id="2252" instrument_node="">, Seligman introduces an adapted version of Dr. Albert Ellis’s ABC technique. We’ll use an example to illustrate how it works.</span></p><span data-dcnode-id="2250" instrument_node="">
</span><p data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">The acronym ABC refers to:</span></p><span data-dcnode-id="2247" instrument_node="">
</span><p data-dcnode-id="2230" style="padding-left: 40px;"><em data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">Antecedents/Adversity</span></em><span data-dcnode-id="2244" instrument_node="">&nbsp;– e.g., You’re fighting with a friend.</span><br data-dcnode-id="2243"><span data-dcnode-id="2242" instrument_node="">
</span><em data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">Beliefs/Behavior</span></em><span data-dcnode-id="2239" instrument_node="">&nbsp;– e.g., “</span><em data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">Wow, I’m an awful friend and always will be.</span></em><span data-dcnode-id="2236" instrument_node="">”</span><br data-dcnode-id="2235"><span data-dcnode-id="2234" instrument_node="">
</span><em data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">Consequences</span></em><span data-dcnode-id="2231" instrument_node=""> – e.g., You don’t try to make peace with your friend because you can’t change who you are.</span></p><span data-dcnode-id="2229" instrument_node="">
</span><p data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">Your explanatory style is how you get from A to B, and this is what Seligman argues that we can learn to change. It’s where one, two, or all of the three Ps come into play. Which one(s) did you notice here?</span></p><span data-dcnode-id="2226" instrument_node="">
</span><p data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Relearning your own ABC process is about becoming more aware of these cognitive distortions or pessimistic explanatory styles, confronting them, and replacing them with more optimistic and adaptive thoughts. Simply understanding these relationships is often the first step to changing the way you think to a more hopeful one (Saelid &amp; Nordahl, 2017).</span></p><span data-dcnode-id="2223" instrument_node="">
</span><p data-dcnode-id="2215"><span data-dcnode-id="2222" instrument_node="">Read more about </span><a data-dcnode-id="2220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/albert-ellis-abc-model-rebt-cbt/"><span data-dcnode-id="2221" instrument_node="">Albert Ellis’s ABC Model</span></a><span data-dcnode-id="2219" instrument_node=""> or access our </span><a data-dcnode-id="2217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/cbt-cognitive-behavioral-therapy-techniques-worksheets/"><span data-dcnode-id="2218" instrument_node="">Cognitive Distortions worksheets</span></a><span data-dcnode-id="2216" instrument_node="">.</span></p><span data-dcnode-id="2214" instrument_node="">
</span><p data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2211" instrument_node="">
</span><p data-dcnode-id="2209"><a data-dcnode-id="2210" name="learned"></a></p><span data-dcnode-id="2208" instrument_node="">
</span><h2 data-dcnode-id="2204"><em data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Learned Optimism</span></em><span data-dcnode-id="2205" instrument_node="">: Martin Seligman’s Book Summary</span></h2><span data-dcnode-id="2203" instrument_node="">
</span><p data-dcnode-id="2195"><a data-dcnode-id="2199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Learned-Optimism-Change-Your-Mind/dp/1400078393" rel="noopener noreferrer" target="_blank"><img alt="Learned Optimism" class="alignright wp-image-74424 size-medium lazyload" data-dcnode-id="2202" data-src="https://positivepsychology.com/wp-content/uploads/learnedoptimismbook-195x300-195x300.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/learnedoptimismbook-195x300.jpg 195w, https://positivepsychology.com/wp-content/uploads/learnedoptimismbook-195x300-65x100.jpg 65w" height="300" sizes="(max-width: 195px) 100vw, 195px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Learned Optimism" width="195"><noscript data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">&lt;img class="alignright wp-image-74424 size-medium lazyload" title="Learned Optimism" src="https://positivepsychology.com/wp-content/uploads/learnedoptimismbook-195x300-195x300.jpg" alt="Learned Optimism" width="195" height="300" srcset="https://positivepsychology.com/wp-content/uploads/learnedoptimismbook-195x300.jpg 195w, https://positivepsychology.com/wp-content/uploads/learnedoptimismbook-195x300-65x100.jpg 65w" sizes="(max-width: 195px) 100vw, 195px" /&gt;</span></noscript></a><em data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Learned Optimism</span></em><span data-dcnode-id="2196" instrument_node=""> starts with an introduction that describes the “pleasant,” “engaged,” and “meaningful” life – three kinds of happiness that learned optimism could help you achieve.</span></p><span data-dcnode-id="2194" instrument_node="">
</span><p data-dcnode-id="2190" style="padding-left: 40px;"><em data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">The pleasant life</span></em><span data-dcnode-id="2191" instrument_node=""> is about amplifying positive emotion and acquiring the skills to do this.</span></p><span data-dcnode-id="2189" instrument_node="">
</span><p data-dcnode-id="2185" style="padding-left: 40px;"><em data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">The engaged life</span></em><span data-dcnode-id="2186" instrument_node=""> is one where you discover your highest strengths and reshape your life to make the most of them in relationships, leisure, and work.</span></p><span data-dcnode-id="2184" instrument_node="">
</span><p data-dcnode-id="2180" style="padding-left: 40px;"><em data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">The meaningful life</span></em><span data-dcnode-id="2181" instrument_node=""> involves utilizing those strengths to “belong to and serve something you believe is larger than the self” (Seligman, 2006, p. iv).</span></p><span data-dcnode-id="2179" instrument_node="">
</span><p data-dcnode-id="2172"><span data-dcnode-id="2178" instrument_node="">The book is broken down into three sections: </span><em data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">The Quest, The Realms of Life</span></em><span data-dcnode-id="2175" instrument_node="">, and </span><em data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">Changing.</span></em></p><span data-dcnode-id="2171" instrument_node="">
</span><p data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">Seligman (2006) refers to a vast and extensive body of optimism literature to illustrate its beneficial impacts on quality of life, performance, motivation, health, and other life domains. It’s a combination of practical techniques about breaking pessimistic habits and replacing them, and a discussion of the skills that optimism involves.</span></p><span data-dcnode-id="2168" instrument_node="">
</span><p data-dcnode-id="2163"><span data-dcnode-id="2167" instrument_node="">It features a good deal of detail regarding the experiments he was academically involved in and anecdotes about how relevant theories were developed. </span><em data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">Learned Optimism</span></em><span data-dcnode-id="2164" instrument_node=""> also covers the potential dangers of extreme or unrealistic optimism and gives some easy-to-digest pointers on how to be adaptively optimistic, such as:</span></p><span data-dcnode-id="2162" instrument_node="">
</span><ul data-dcnode-id="2148"><span data-dcnode-id="2161" instrument_node="">
</span><li data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Being grateful for your blessings</span></li><span data-dcnode-id="2158" instrument_node="">
</span><li data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">Helping others in greater need than yourself</span></li><span data-dcnode-id="2155" instrument_node="">
</span><li data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">Challenging the utility of your negative thoughts and beliefs</span></li><span data-dcnode-id="2152" instrument_node="">
</span><li data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">Tackling negative self-talk head-on</span></li><span data-dcnode-id="2149" instrument_node="">
</span></ul><span data-dcnode-id="2147" instrument_node="">
</span><p data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">As well as the theory and practical exercises, Seligman’s book includes the Learned Optimism Test, which helps the reader understand their existing explanatory styles in greater depth. He also includes some material about how to cultivate optimism in children that caregivers, educators, and parents will likely find valuable.</span></p><span data-dcnode-id="2144" instrument_node="">
</span><p data-dcnode-id="2136"><span data-dcnode-id="2143" instrument_node="">You can find the book </span><em data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Learned Optimism: How to Change Your Mind and Your Life</span></em><span data-dcnode-id="2140" instrument_node=""> on </span><a data-dcnode-id="2138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Learned-Optimism-Change-Your-Mind/dp/1400078393" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2139" instrument_node="">Amazon</span></a><span data-dcnode-id="2137" instrument_node="">.</span></p><span data-dcnode-id="2135" instrument_node="">
</span><p data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2132" instrument_node="">
</span><p data-dcnode-id="2130"><a data-dcnode-id="2131" name="test"></a></p><span data-dcnode-id="2129" instrument_node="">
</span><h2 data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">The Learned Optimism Test</span></h2><span data-dcnode-id="2126" instrument_node="">
</span><p data-dcnode-id="2121"><span data-dcnode-id="2125" instrument_node="">Chapter 3 of </span><em data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">Learned Optimism</span></em><span data-dcnode-id="2122" instrument_node=""> features a 48-item test that can assess the three dimensions of your explanatory style: personalization, pervasiveness, and permanence.</span></p><span data-dcnode-id="2120" instrument_node="">
</span><p data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">For each, you’re asked to imagine each situation happening to you and select the response that best describes what you would think. Here are some examples. Note that some items are reverse-scored (Seligman, 2006).</span></p><span data-dcnode-id="2117" instrument_node="">
</span><ol data-dcnode-id="2079"><span data-dcnode-id="2116" instrument_node="">
</span><li data-dcnode-id="2105"><span data-dcnode-id="2115" instrument_node="">You run for a community office position, and you win. (Pervasiveness)
</span><ol data-dcnode-id="2107"><span data-dcnode-id="2114" instrument_node="">
</span><li data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">I devote a lot of time and energy to campaigning.</span></li><span data-dcnode-id="2111" instrument_node="">
</span><li data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">I work very hard at everything I do.</span></li><span data-dcnode-id="2108" instrument_node="">
</span></ol><span data-dcnode-id="2106" instrument_node="">
</span></li><span data-dcnode-id="2104" instrument_node="">
</span><li data-dcnode-id="2093"><span data-dcnode-id="2103" instrument_node="">You forget your partner’s birthday. (Personalization)
</span><ol data-dcnode-id="2095"><span data-dcnode-id="2102" instrument_node="">
</span><li data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">I’m not good at remembering birthdays.</span></li><span data-dcnode-id="2099" instrument_node="">
</span><li data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">I was preoccupied with other things.</span></li><span data-dcnode-id="2096" instrument_node="">
</span></ol><span data-dcnode-id="2094" instrument_node="">
</span></li><span data-dcnode-id="2092" instrument_node="">
</span><li data-dcnode-id="2081"><span data-dcnode-id="2091" instrument_node="">You owe the library $10 for an overdue book. (Permanence)
</span><ol data-dcnode-id="2083"><span data-dcnode-id="2090" instrument_node="">
</span><li data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">When I am really involved in what I am reading, I often forget when it’s due.</span></li><span data-dcnode-id="2087" instrument_node="">
</span><li data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">I was so involved in writing the report that I forgot to return the book.</span></li><span data-dcnode-id="2084" instrument_node="">
</span></ol><span data-dcnode-id="2082" instrument_node="">
</span></li><span data-dcnode-id="2080" instrument_node="">
</span></ol><span data-dcnode-id="2078" instrument_node="">
</span><p data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2075" instrument_node="">
</span><p data-dcnode-id="2073"><a data-dcnode-id="2074" name="exercises"></a></p><span data-dcnode-id="2072" instrument_node="">
</span><h2 data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">5 Learned Optimism Exercises</span></h2><span data-dcnode-id="2069" instrument_node="">
</span><h3 data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">1. Exploring Explanatory Styles</span></h3><span data-dcnode-id="2066" instrument_node="">
</span><p data-dcnode-id="2055"><img alt="" class="alignright size-medium wp-image-120652 lazyload" data-dcnode-id="2065" data-src="https://positivepsychology.com/wp-content/uploads/Conflict-resolution-worksheets-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/Conflict-resolution-worksheets-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/Conflict-resolution-worksheets-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/Conflict-resolution-worksheets-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/Conflict-resolution-worksheets-510x255.jpg 510w, https://positivepsychology.com/wp-content/uploads/Conflict-resolution-worksheets.jpg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="300"><noscript data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">&lt;img class="alignright size-medium wp-image-120652 lazyload" src="https://positivepsychology.com/wp-content/uploads/Conflict-resolution-worksheets-300x150.jpg" alt="" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/Conflict-resolution-worksheets-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/Conflict-resolution-worksheets-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/Conflict-resolution-worksheets-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/Conflict-resolution-worksheets-510x255.jpg 510w, https://positivepsychology.com/wp-content/uploads/Conflict-resolution-worksheets.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="2062" instrument_node="">This </span><em data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">Exploring Explanatory Style</span></em><span data-dcnode-id="2059" instrument_node="">s exercise from our </span><a data-dcnode-id="2057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pro.positivepsychology.com/product/positive-psychology-toolkit-yearly-new/" rel="noopener" target="_blank"><span data-dcnode-id="2058" instrument_node="">Positive Psychology Toolkit©</span></a><span data-dcnode-id="2056" instrument_node=""> is designed to help you or your client experience the difference between interpreting and explaining events in everyday life.</span></p><span data-dcnode-id="2054" instrument_node="">
</span><p data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Part One of this activity involves visualizing a hypothetical adverse scenario from a pessimistic point of view, then from an optimistic one. You are asked to imagine you’ve faced a setback, and then the exercise guides you through different elements of the situation that you can consider.</span></p><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">It uses the ideas of permanence, pervasiveness, and personalization to help you see it from both explanatory styles. Then it provides some evaluation questions to trigger self-reflection, for example:</span></p><span data-dcnode-id="2048" instrument_node="">
</span><p data-dcnode-id="2046" style="padding-left: 40px;"><span data-dcnode-id="2047" instrument_node="">Was there a difference in how you felt in each of these mindsets?</span></p><span data-dcnode-id="2045" instrument_node="">
</span><p data-dcnode-id="2043" style="padding-left: 40px;"><span data-dcnode-id="2044" instrument_node="">Did one mode feel more familiar to you than the other? If so, which?</span></p><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">In Part Two, you repeat the same steps with a positive hypothetical. The table below gives a concise overview of the concepts at play:</span></p><span data-dcnode-id="2039" instrument_node="">

</span><h3 data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">2. Thought Record Worksheet</span></h3><span data-dcnode-id="1973" instrument_node="">
</span><p data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Tackling cognitive distortions, as we mentioned, is part of learning to be more optimistic. This involves being aware of your thoughts, trying to be objective about them, and challenging them (Miller, 2001).</span></p><span data-dcnode-id="1970" instrument_node="">
</span><p data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">You can use this worksheet to record negative thoughts and look at whether some of them are related to any of the 3 Ps. Then you come up with evidence to support the thought and evidence that contradicts it.</span></p><span data-dcnode-id="1967" instrument_node="">
</span><p data-dcnode-id="1962"><span data-dcnode-id="1966" instrument_node="">For example, if you missed your son’s basketball game, your thought might be, “</span><em data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">I am a terrible mother who will never be there for her son.</span></em><span data-dcnode-id="1963" instrument_node="">”</span></p><span data-dcnode-id="1961" instrument_node="">
</span><p data-dcnode-id="1956"><span data-dcnode-id="1960" instrument_node="">You might then consider the evidence at hand – e.g., you got stuck in traffic – and come up with a more adaptive thought, such as, “</span><em data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">That road construction was to blame, and next time I’ll leave earlier to be on time</span></em><span data-dcnode-id="1957" instrument_node="">.”</span></p><span data-dcnode-id="1955" instrument_node="">
</span><p data-dcnode-id="1950"><span data-dcnode-id="1954" instrument_node="">Here is our free </span><a data-dcnode-id="1952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/wp-content/uploads/2018/01/Thought-Record-Worksheet.pdf" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="1953" instrument_node="">Thought Record Worksheet</span></a><span data-dcnode-id="1951" instrument_node="">.</span></p><span data-dcnode-id="1949" instrument_node="">
</span><p data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1946" instrument_node="">
</span><h3 data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">3. ABC Functional Analysis</span></h3><span data-dcnode-id="1943" instrument_node="">
</span><p data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">As we’ve discussed, the ABC technique can help you understand what underpins your behavior and its consequences.</span></p><span data-dcnode-id="1940" instrument_node="">
</span><p data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">There are three columns for Antecedents, Behavior, and Consequences on this sheet, and you can use it to explore your explanatory style in both positive and negative situations.</span></p><span data-dcnode-id="1937" instrument_node="">
</span><p data-dcnode-id="1929"><span data-dcnode-id="1936" instrument_node="">Using the information in our </span><em data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">How to Improve Optimism</span></em><span data-dcnode-id="1933" instrument_node="">&nbsp;section, you may find </span><a data-dcnode-id="1931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/wp-content/uploads/2020/09/ABC-Functional-Analysis-Worksheet.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1932" instrument_node="">this worksheet</span></a><span data-dcnode-id="1930" instrument_node=""> helpful in challenging a pessimistic explanatory style when you become aware of it.</span></p><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1925" instrument_node="">
</span><h3 data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">4. Tapping Into Your Inner Optimist</span></h3><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1917"><span data-dcnode-id="1921" instrument_node="">The extent to which you can successfully influence your explanatory style has an impact on how you experience the event both affectively and behaviorally. The </span><em data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">Tapping Into Your Inner Optimist</span></em><span data-dcnode-id="1918" instrument_node=""> exercise aims to help you explore the difference between attending to negative or positive information.</span></p><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">It helps you become aware of your ability to view situations from a particular perspective.</span></p><span data-dcnode-id="1913" instrument_node="">
</span><p data-dcnode-id="1908"><span data-dcnode-id="1912" instrument_node="">The first step is called </span><em data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Tapping Into Your Inner Pessimist</span></em><span data-dcnode-id="1909" instrument_node="">, and you’ll ask yourself questions such as:</span></p><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1903" style="padding-left: 40px;"><span data-dcnode-id="1906" instrument_node="">What were some things that annoyed you this week?</span><br data-dcnode-id="1905"><span data-dcnode-id="1904" instrument_node="">
What difficulties did you face at work?</span></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">The second step involves taking a more optimistic approach to viewing your week:</span></p><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1895" style="padding-left: 40px;"><span data-dcnode-id="1898" instrument_node="">What were some things that made you feel happy, excited, or joyful?</span><br data-dcnode-id="1897"><span data-dcnode-id="1896" instrument_node="">
What is one thing that made you proud of yourself?</span></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Finally, you’ll evaluate your experience in the final step. This sheet gives you reflection prompts, such as:</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1887" style="padding-left: 40px;"><span data-dcnode-id="1890" instrument_node="">How did it feel to embody your optimistic mindset? What did you notice?</span><br data-dcnode-id="1889"><span data-dcnode-id="1888" instrument_node="">
How could you use your insights from this exercise in your daily life?</span></p><span data-dcnode-id="1886" instrument_node="">
</span><p data-dcnode-id="1878"><span data-dcnode-id="1885" instrument_node="">Get </span><em data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Tapping Into Your Inner Optimist</span></em><span data-dcnode-id="1882" instrument_node=""> and many more exercises by subscribing to our </span><a data-dcnode-id="1880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pro.positivepsychology.com/product/positive-psychology-toolkit-yearly-new/" rel="noopener" target="_blank"><span data-dcnode-id="1881" instrument_node="">Toolkit</span></a><span data-dcnode-id="1879" instrument_node="">.</span></p><span data-dcnode-id="1877" instrument_node="">
</span><p data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1874" instrument_node="">
</span><h3 data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">5. The Best Possible Self</span></h3><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Research has shown that visualizing and writing about your Best Possible Self can have positive outcomes.</span></p><span data-dcnode-id="1868" instrument_node="">
</span><p data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">The Best Possible Self exercise requires people to envision themselves in an imaginary future in which everything has turned out optimally. Writing about and imagining a Best Possible Self has been found to boost people’s wellbeing and mood (King, 2001; Peters, Flink, Boersma, &amp; Linton, 2010; Meevissen et al., 2011).</span></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">This exercise invites you to envision your life the way you always hoped it would be, having accomplished everything you wanted to do and fulfilled your potential. Write as much as you like before working through the guided reflection, which asks you questions such as:</span></p><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1856" style="padding-left: 40px;"><span data-dcnode-id="1861" instrument_node="">How does this exercise affect your current self-image?</span><br data-dcnode-id="1860"><span data-dcnode-id="1859" instrument_node="">
Did this exercise motivate or inspire you?</span><br data-dcnode-id="1858"><span data-dcnode-id="1857" instrument_node="">
How did this exercise open you to possibilities?</span></p><span data-dcnode-id="1855" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1854" instrument_node="">Get </span><em data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">The Best Possible Self </span></em><span data-dcnode-id="1851" instrument_node="">and many more exercises by subscribing to our </span><a data-dcnode-id="1849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pro.positivepsychology.com/product/positive-psychology-toolkit-yearly-new/" rel="noopener" target="_blank"><span data-dcnode-id="1850" instrument_node="">Toolkit</span></a><span data-dcnode-id="1848" instrument_node="">.</span></p><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1841"><a data-dcnode-id="1842" name="videos"></a></p><span data-dcnode-id="1840" instrument_node="">
</span><h2 data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">3 Videos to Watch</span></h2><span data-dcnode-id="1837" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Here are some insightful videos about optimism. If you want to learn more or get a visual overview of the concepts in this article, check these out.</span></p><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1831" instrument_node="">
</span><h3 data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">1. Learned Optimism by Martin Seligman</span></h3><span data-dcnode-id="1828" instrument_node="">
</span><p data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">This video gives a brief overview of optimism and pessimism, along with good examples to clarify.</span></p><span data-dcnode-id="1825" instrument_node="">
</span><p data-dcnode-id="1823"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lazyload" data-dcnode-id="1824" data-src="https://www.youtube.com/embed/2hHNq45rEnU?feature=oembed" frameborder="0" height="360" title="Learned Optimism by Martin Seligman - Animation" width="640"></iframe></p><span data-dcnode-id="1822" instrument_node="">
</span><p data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1819" instrument_node="">
</span><h3 data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">2. Dr. Seligman’s Definition of Optimism</span></h3><span data-dcnode-id="1816" instrument_node="">
</span><p data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">Martin Seligman describes why optimism is more than just a “glass half full” perspective. He answers a few questions on the topic and talks about explanatory styles.</span></p><span data-dcnode-id="1813" instrument_node="">

</span><p data-dcnode-id="1781"><span data-dcnode-id="1785" instrument_node="">Do you feel like you could learn to be more optimistic? Have you successfully challenged negative thought patterns? How do you feel about the benefits of optimism, and do you consider yourself optimistic? Let us know what you think of our </span><a data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/optimism-tools-exercises-examples/"><span data-dcnode-id="1784" instrument_node="">learned optimism exercises</span></a><span data-dcnode-id="1782" instrument_node=""> and the theory we’ve been looking at together; I’d love to hear your thoughts and opinions in the comments below.</span></p><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1775"><span data-dcnode-id="1779" instrument_node="">If you’re keen to find out more about mindset and optimism, have a look at&nbsp;</span><a data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/category/optimism/"><span data-dcnode-id="1778" instrument_node="">the optimism</span></a><span data-dcnode-id="1776" instrument_node=""> section on our blog. And as always, let us know if you have any questions or would like to learn more about the tools and lessons in our Positive Psychology Toolkit. Thanks for reading!</span></p><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1769"><span data-dcnode-id="1773" instrument_node="">We hope you enjoyed reading this article. Don’t forget to </span><a data-dcnode-id="1771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/ebook" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1772" instrument_node="">download our three Positive Psychology Exercises for free</span></a><span data-dcnode-id="1770" instrument_node="">.</span></p><span data-dcnode-id="1768" instrument_node="">
