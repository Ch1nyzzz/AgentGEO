cnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/feed/hashtag/%3Fkeywords%3Dhappy%26highlightedUpdateUrns%3Durn%253Ali%253Aactivity%253A6845509724566376448"><font data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">#Happy</span></font></a><span data-dcnode-id="862" style="background-color: rgb(255, 255, 255);"><font data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">&nbsp;people tend to be more&nbsp;</span></font></span><a data-attribute-index="3" data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/feed/hashtag/%3Fkeywords%3Doptimistic%26highlightedUpdateUrns%3Durn%253Ali%253Aactivity%253A6845509724566376448"><font data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">#optimistic</span></font></a><span data-dcnode-id="856" style="background-color: rgb(255, 255, 255);"><font data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">, and optimistic people tend to be&nbsp;</span></font></span><a data-attribute-index="4" data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/feed/hashtag/%3Fkeywords%3Dhappier%26highlightedUpdateUrns%3Durn%253Ali%253Aactivity%253A6845509724566376448"><font data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">#happier</span></font></a><span data-dcnode-id="850" style="background-color: rgb(255, 255, 255);"><font data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">. So one of the key ideas of increasing happiness in our lives is to increase or boost our optimism. And that’s a skill we can learn just by making different choices."</span></font></span></font><br data-dcnode-id="848"></p></div><span data-dcnode-id="845" instrument_node="">

</span><p data-dcnode-id="821"><font data-dcnode-id="822" face="Ubuntu" style="font-size: 18px;"><strong data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">José de Jesús García</span></strong></font></p><p data-dcnode-id="800"><font data-dcnode-id="801" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="820" instrument_node="">"</span><strong data-dcnode-id="807"><span data-dcnode-id="817"><font data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Those of us who study happiness tend to be&nbsp;</span></font></span><span data-dcnode-id="814"><font data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">optimistic</span></font></span><span data-dcnode-id="811"><font data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">, by conviction and by congruence. The</span></font></span><span data-dcnode-id="808"><font data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">&nbsp;Science of Happiness</span></font></span></strong><span data-dcnode-id="802"><font data-dcnode-id="803"><strong data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">&nbsp;recognizes optimism as one of the common elements of happy people.</span></strong><span data-dcnode-id="804" instrument_node=""> The reason is that those who see the future with optimism have more determination and confidence that things will improve and dreams and projects will crystallize. Under this vision, I tend to think that 2020 was not a lost year; there must be something or a lot we can salvage."</span></font></span></font></p></div><span data-dcnode-id="798" instrument_node="">

</span><p data-dcnode-id="789"><font color="#1f272b" data-dcnode-id="790" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="792" style=""><font data-dcnode-id="793" style=""><strong data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Betty W. Phillips, Ph.D.</span></strong></font></span><br data-dcnode-id="791"></font></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="784"><font color="#1f272b" data-dcnode-id="786" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="787" instrument_node="">People with optimistic explanations of life generally feel happier and more energized to cope with obstacles, seeing them as challenges rather than failure experiences. Optimists are more likely to analyze whether setbacks are situational, then are able to develop plans to remove obstacles to their goals. Pessimists are more likely to view life problems as personal failures, blame themselves, feel unhappy and give up trying to change.</span></font><br data-dcnode-id="785"></p></div><span data-dcnode-id="782" instrument_node="">

</span><p data-dcnode-id="744"><font color="#000000" data-dcnode-id="745" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="746"><span data-dcnode-id="750" instrument_node="">“Optimism and gratitude are the keys to a happy and successful life. They are antidotes to stress, greed and fear. Whenever you feel any of those negative emotions coming on you replace those thoughts with gratitude. Your gratitude will lead to optimism which leads to </span><strong data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">happiness </span></strong><span data-dcnode-id="747" instrument_node="">which leads to success.”</span></span></font></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><br data-dcnode-id="742"></p></div><span data-dcnode-id="739" instrument_node="">

</span><p data-dcnode-id="733"><font color="#000000" data-dcnode-id="734" face="Ubuntu" style="font-size: 18px;"><strong data-dcnode-id="735" style=""><span data-dcnode-id="736" instrument_node="">Victor Perton</span></strong></font></p><p data-dcnode-id="727"><font color="#000000" data-dcnode-id="728" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="732" instrument_node="">An optimistic spirit can bring significant benefits, including </span><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">happiness</span></strong><span data-dcnode-id="729" instrument_node="">, joy, active longevity, better health including&nbsp;lower risks of cardiovascular disease,&nbsp;better sleep, greater resilience,&nbsp;stronger relationships&nbsp;and&nbsp;increased self-mastery.&nbsp;</span></font></p></div><span data-dcnode-id="725" instrument_node="">

</span><p data-dcnode-id="719"><font color="#000000" data-dcnode-id="720" face="Ubuntu" style="font-size: 18px;"><strong data-dcnode-id="721" style=""><span data-dcnode-id="722" instrument_node="">Andrew Stoner, Former Deputy Premier NSW</span></strong></font></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="712"><font color="#101214" data-dcnode-id="713" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="717" instrument_node="">“I know I am blessed to be an optimist. My lofty goals in life have been shaped by optimism, it lifts me off the canvas when the inevitable hard knocks come, and it enables me to experience </span><strong data-dcnode-id="715" style=""><span data-dcnode-id="716" instrument_node="">happiness</span></strong><span data-dcnode-id="714" instrument_node=""> in the little things in life.”</span></font></p></div><span data-dcnode-id="710" instrument_node="">
</span></div><div class="WaGadget WaGadgetContent gadgetStyleNone" data-componentid="uYouoUp" data-dcnode-id="689" id="id_uYouoUp" style=""><div class="gadgetStyleBody gadgetContentEditableArea" data-areaheight="auto" data-dcnode-id="691" data-editablearea="0" style="padding-top:20px;padding-right:30px;padding-bottom:20px;padding-left:30px;"><span data-dcnode-id="708" instrument_node="">

</span><p data-dcnode-id="697"><font color="#000000" data-dcnode-id="698" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="702" instrument_node="">Research shows that religious beliefs and practices are related to greater optimism, higher life satisfaction, </span><strong data-dcnode-id="700" style=""><span data-dcnode-id="701" instrument_node="">happiness</span></strong><span data-dcnode-id="699" instrument_node="">, hope, purpose and lower levels of anxiety and depression.</span></font></p><p align="center" data-dcnode-id="692" style="line-height: 17px;"><font color="#000000" data-dcnode-id="693" face="Palatino" style="font-size: 16px;"><a class="stylizedButton buttonStyle001" data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/Optimism-Spirituality-and-Religion" target="_blank"><span data-dcnode-id="696" instrument_node="">Optimism, Spirituality and Religion</span></a><br data-dcnode-id="694"></font></p></div><span data-dcnode-id="690" instrument_node="">

</span><p data-dcnode-id="680"><font color="#000000" data-dcnode-id="681" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="682" instrument_node="">"People are naturally drawn to leaders who see the world through a lens of optimism. Nobody wants to work for a manager who thinks the organization will fail. No one dreams of being mentored by a boss who doesn’t believe in his or her company’s ability to overcome hardships. People want to be led by those who see the world with hope, excitement and happiness."</span></font></p><p align="center" data-dcnode-id="675"><font color="#000000" data-dcnode-id="676" face="Ubuntu" style="font-size: 18px;"><a class="stylizedButton buttonStyle001" data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/Cultivate-Realistic-and-Infectiously-Optimistic-Leadership" target="_blank"><span data-dcnode-id="679" instrument_node="">Cultivate Realistic and Infectiously Optimistic Leadership</span></a><br data-dcnode-id="677"></font></p><span data-dcnode-id="674" instrument_node="">

</span><p data-dcnode-id="660"><font color="#000000" data-dcnode-id="661" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="662" instrument_node="">"Authentic leaders are realists as well as optimists, able to show vulnerability, admit mistakes and to compromise where necessary for the greater good."</span></font></p></div><span data-dcnode-id="658" instrument_node="">
</span></div><div class="WaGadget WaGadgetContent gadgetStyleNone" data-componentid="LCTEDnk" data-dcnode-id="645" id="id_LCTEDnk" style=""><div class="gadgetStyleBody gadgetContentEditableArea" data-areaheight="auto" data-dcnode-id="647" data-editablearea="0" style="padding-top:20px;padding-right:30px;padding-bottom:20px;padding-left:30px;"><span data-dcnode-id="656" instrument_node="">

</span><p data-dcnode-id="648"><font color="#000000" data-dcnode-id="649" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="650" instrument_node="">"My optimism and happiness are enhanced through expressing gratitude and being passionate when learning new things, meeting new people, building relationships based on trust, confidence and building bridges."</span></font></p></div><span data-dcnode-id="646" instrument_node="">

</span><p data-dcnode-id="632"><font color="#000000" data-dcnode-id="633" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="634"><span data-dcnode-id="638" instrument_node="">“When I think of Nathan, I think of warmth. Of reds, and oranges. But most of all, I think of yellow. That just seems like such a Nathan-y color. </span><strong data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Happiness,</span></strong><span data-dcnode-id="635" instrument_node=""> joy, his optimism, that smile.”</span></span></font></p><span data-dcnode-id="631" instrument_node="">

</span></div></div></div></td><td class="WaLayoutSeparator" data-componentid="Ys5p84M_separator" data-dcnode-id="621" style=""><div data-dcnode-id="622" style="width: inherit;"></div></td><td class="WaLayoutItem" data-componentid="YGwGics" data-dcnode-id="457" id="id_YGwGics" style="width:50%;"><div class="WaLayoutPlaceHolder placeHolderContainer" data-componentid="fTcBgGy" data-dcnode-id="458" id="id_fTcBgGy" style=""><div data-dcnode-id="459" style=""><div class="WaGadgetFirst WaGadgetContent gadgetStyleNone" data-componentid="Hi528DE" data-dcnode-id="603" id="id_Hi528DE" style=""><div class="gadgetStyleBody gadgetContentEditableArea" data-areaheight="auto" data-dcnode-id="605" data-editablearea="0" style="padding-top:20px;padding-right:30px;padding-bottom:20px;padding-left:30px;"><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="615"><font color="#000000" data-dcnode-id="616" face="Ubuntu" style="font-size: 18px;"><strong data-dcnode-id="617" style=""><span data-dcnode-id="618" style=""><span data-dcnode-id="619" instrument_node="">Steve Wozniak "The Woz”, Co-founder, Apple Computer</span></span></strong></font></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="606"><font color="#000000" data-dcnode-id="607"><span data-dcnode-id="608" style=""><font color="#1A1A1A" data-dcnode-id="609" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="613" instrument_node="">“H = S - F.&nbsp; </span><strong data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Happiness</span></strong><span data-dcnode-id="610" instrument_node=""> = Smiles - Frowns. Find ways to smile and enjoy life, but don’t frown. Don’t argue. Don’t let small things get to you. Just figure out the best path to move forward constructively. When you see pessimists, be glad that you are better with your optimism. Spread this thinking about optimism to young people. After about age 23 your personality is settled and you can’t change it just with logical reasoning.”</span></font></span></font></p></div><span data-dcnode-id="604" instrument_node="">
</span></div><div class="WaGadget WaGadgetContent gadgetStyleNone" data-componentid="OztyFQZ" data-dcnode-id="586" id="id_OztyFQZ" style=""><div class="gadgetStyleBody gadgetContentEditableArea" data-areaheight="auto" data-dcnode-id="588" data-editablearea="0" style="padding-top:20px;padding-right:30px;padding-bottom:20px;padding-left:30px;"><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="598"><font color="#000000" data-dcnode-id="599" face="Ubuntu" style="font-size: 18px;"><strong data-dcnode-id="600" style=""><span data-dcnode-id="601" instrument_node="">Jim Spigener</span></strong></font></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="594"><font color="#000000" data-dcnode-id="595" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="596" instrument_node="">"Leadership does not exist without optimism. Optimism is the secret to motivation, happiness and&nbsp;self-worth!"</span></font></p><p align="center" data-dcnode-id="589"><font color="#000000" data-dcnode-id="590" face="Ubuntu" style="font-size: 18px;"><a class="stylizedButton buttonStyle002" data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/Inspiring-Voices-of-Optimistic-Leadership" target="_blank"><span data-dcnode-id="593" instrument_node="">Inspiring Voices of Optimistic Leadership</span></a><br data-dcnode-id="591"></font></p></div><span data-dcnode-id="587" instrument_node="">
</span></div><div class="WaGadget WaGadgetContent gadgetStyleNone" data-componentid="uJ3YERk" data-dcnode-id="564" id="id_uJ3YERk" style=""><div class="gadgetStyleBody gadgetContentEditableArea" data-areaheight="auto" data-dcnode-id="566" data-editablearea="0" style="padding-top:20px;padding-right:30px;padding-bottom:20px;padding-left:30px;"><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="581"><strong data-dcnode-id="582"><font data-dcnode-id="583" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="584" instrument_node="">Victor Perton</span></font></strong></p><p data-dcnode-id="572"><font color="#000000" data-dcnode-id="573" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="580" instrument_node="">"Exercises and practices which increase and maintain optimism include </span><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/Practise-Gratitude" style="" target="_blank"><span data-dcnode-id="579" instrument_node="">expressing gratitude</span></a><span data-dcnode-id="577" instrument_node="">, </span><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/Practise-Gratitude-members" style="" target="_blank"><span data-dcnode-id="576" instrument_node="">using more positive language </span></a><span data-dcnode-id="574" instrument_node="">and focusing on sharing happiness. "</span></font></p><p align="center" data-dcnode-id="567"><a class="stylizedButton buttonStyle003" data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/Practise-Gratitude" target="_blank"><span data-dcnode-id="571" instrument_node="">Practise Gratitude</span></a><font color="#000000" data-dcnode-id="569" face="Ubuntu" style="font-size: 16px;"></font><br data-dcnode-id="568"></p></div><span data-dcnode-id="565" instrument_node="">
</span></div><div class="WaGadget WaGadgetContent gadgetStyleNone" data-componentid="EJMjkvc" data-dcnode-id="541" id="id_EJMjkvc" style=""><div class="gadgetStyleBody gadgetContentEditableArea" data-areaheight="auto" data-dcnode-id="543" data-editablearea="0" style="padding-top:20px;padding-right:30px;padding-bottom:2px;padding-left:30px;"><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="559"><font color="#000000" data-dcnode-id="560" face="Ubuntu" style="font-size: 18px;"><strong data-dcnode-id="561" style=""><span data-dcnode-id="562" instrument_node="">Kate Ashmor</span></strong></font></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="552"><font color="#000000" data-dcnode-id="553" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="557" instrument_node="">“Optimism brings with it a level of </span><strong data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">happiness</span></strong><span data-dcnode-id="554" instrument_node=""> and belonging that negativity and pessimism never can. Looking on the bright side, looking ahead, brings people together, creates a cohesiveness that is infectious.”</span></font></p><p align="center" data-dcnode-id="547"><font color="#000000" data-dcnode-id="548" face="Ubuntu" style="font-size: 18px;"><a class="stylizedButton buttonStyle002" data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/Optimists-and-their-Optimism" target="_blank"><span data-dcnode-id="551" instrument_node="">Optimists on their Optimism</span></a><br data-dcnode-id="549"></font></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="544"><br data-dcnode-id="545"></p></div><span data-dcnode-id="542" instrument_node="">
</span></div><div class="WaGadget WaGadgetContent gadgetStyleNone" data-componentid="ARchifq" data-dcnode-id="525" id="id_ARchifq" style=""><div class="gadgetStyleBody gadgetContentEditableArea" data-areaheight="auto" data-dcnode-id="527" data-editablearea="0" style="padding-top:20px;padding-right:30px;padding-bottom:20px;padding-left:30px;"><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="536"><font color="#000000" data-dcnode-id="537" face="Ubuntu" style="font-size: 18px;"><strong data-dcnode-id="538" style=""><span data-dcnode-id="539" instrument_node="">Victor Perton</span></strong></font></p><p data-dcnode-id="533"><font color="#000000" data-dcnode-id="534" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="535" instrument_node="">Ancient meditation practices like the “Loving Kindness” meditation and related compassion meditations are particularly beneficial.&nbsp; Compassion meditation strengthens the connection between the prefrontal cortex and the brain’s circuits for optimism, joy and happiness.&nbsp; The benefits are apparent right from the beginning of meditation practice and they increase with time spent.</span></font></p><p align="center" data-dcnode-id="528"><font color="#000000" data-dcnode-id="529" face="Ubuntu" style="font-size: 18px;"><a class="stylizedButton buttonStyle004" data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/Meditate-to-be-More-Optimistic" target="_blank"><span data-dcnode-id="532" instrument_node="">Meditate to be More Optimistic</span></a><br data-dcnode-id="530"></font></p></div><span data-dcnode-id="526" instrument_node="">
</span></div><div class="WaGadget WaGadgetContent gadgetStyleNone" data-componentid="aYXvq4x" data-dcnode-id="509" id="id_aYXvq4x" style=""><div class="gadgetStyleBody gadgetContentEditableArea" data-areaheight="auto" data-dcnode-id="511" data-editablearea="0" style="padding-top:20px;padding-right:30px;padding-bottom:20px;padding-left:30px;"><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="519"><font color="#000000" data-dcnode-id="520"><strong data-dcnode-id="521" style=""><font data-dcnode-id="522" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="523" instrument_node="">Nina Greig-Towers, The Future Business Council</span></font></strong></font></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="512"><font color="#000000" data-dcnode-id="513" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="517" instrument_node="">“Not being optimistic about your work, your team or about you illustrates that something major is failing or there are deep failures in your work. Whatever it may be to be a leader is to give hope, </span><strong data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">happiness</span></strong><span data-dcnode-id="514" instrument_node="">, education, motivation and so on. Not being optimistic doesn’t allow you to believe in the impossible, thus your team never striving for the impossible.”</span></font></p></div><span data-dcnode-id="510" instrument_node="">
</span></div><div class="WaGadget WaGadgetContent gadgetStyleNone" data-componentid="pBPsJBK" data-dcnode-id="492" id="id_pBPsJBK" style=""><div class="gadgetStyleBody gadgetContentEditableArea" data-areaheight="auto" data-dcnode-id="494" data-editablearea="0" style="padding-top:20px;padding-right:30px;padding-bottom:20px;padding-left:30px;"><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="504"><font data-dcnode-id="505" face="Ubuntu" style="font-size: 18px;"><strong data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Victor Perton</span></strong></font></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="500"><font color="#000000" data-dcnode-id="501" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="502" instrument_node="">Never underestimate the power of a smile.&nbsp; We know that smiling stimulates brain patterns which reinforce feelings of happiness and optimism.</span></font></p><p align="center" data-dcnode-id="495"><font color="#000000" data-dcnode-id="496" face="Ubuntu" style="font-size: 18px;"><a class="stylizedButton buttonStyle002" data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/Smile-Like-an-Optimist" target="_blank"><span data-dcnode-id="499" instrument_node="">Smile Like an Optimist</span></a><br data-dcnode-id="497"></font></p></div><span data-dcnode-id="493" instrument_node="">
</span></div><div class="WaGadget WaGadgetContent gadgetStyleNone" data-componentid="Ol4b4HO" data-dcnode-id="475" id="id_Ol4b4HO" style=""><div class="gadgetStyleBody gadgetContentEditableArea" data-areaheight="auto" data-dcnode-id="477" data-editablearea="0" style="padding-top:20px;padding-right:30px;padding-bottom:20px;padding-left:30px;"><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="486"><font color="#000000" data-dcnode-id="487" face="Ubuntu" style="font-size: 18px;"><strong data-dcnode-id="488" style=""><span data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Michelle Gielan, Author of Broadcasting Happiness</span></span></strong></font></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="481"><font color="#000000" data-dcnode-id="482" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">"In the field of positive psychology, we define optimism as the expectation of good things to happen and the belief that behavior matters, especially in the face of challenges"</span></span></font></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="478"><br data-dcnode-id="479"></p></div><span data-dcnode-id="476" instrument_node="">
</span></div><div class="WaGadgetLast WaGadgetContent gadgetStyleNone" data-componentid="hbVnASi" data-dcnode-id="460" id="id_hbVnASi" style=""><div class="gadgetStyleBody gadgetContentEditableArea" data-areaheight="auto" data-dcnode-id="462" data-editablearea="0" style="padding-top:20px;padding-right:30px;padding-bottom:20px;padding-left:30px;"><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="471"><font color="#000000" data-dcnode-id="472" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="473" instrument_node="">“She was a vibrant fountain of happiness and optimism.”</span></font></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="466"><font color="#000000" data-dcnode-id="467" face="Ubuntu" style="font-size: 18px;"><strong data-dcnode-id="468" style=""><span data-dcnode-id="469" instrument_node="">On Marilyn Smith Gattis</span></strong></font></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><br data-dcnode-id="464"></p></div><span data-dcnode-id="461" instrument_node="">
</span></div></div></div></td></tr></tbody></table><span data-dcnode-id="453" instrument_node=""> </span></div><div class="WaGadget WaGadgetContent gadgetStyleNone" data-componentid="58UEsWg" data-dcnode-id="428" id="id_58UEsWg" style=""><div class="gadgetStyleBody gadgetContentEditableArea" data-areaheight="auto" data-dcnode-id="430" data-editablearea="0" style="padding-top:20px;padding-right:30px;padding-bottom:20px;padding-left:30px;"><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="446"><font color="#000000" data-dcnode-id="447"><strong data-dcnode-id="448" style=""><font data-dcnode-id="449" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="450" instrument_node="">Diane G. Tillman, Living Values Author</span></font></strong></font></p><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="439"><font color="#000000" data-dcnode-id="440" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="444" instrument_node="">“Optimistic leadership is very needed at this critical juncture in the world. While some governments and many NGOs are moving toward positive solutions to the environmental and the plethora of social challenges, other governments and radical groups are engaged in blatant injustice and violence. Optimistic leadership generates hope; it nourishes the belief that all will be well. This belief is important for emotional wellbeing; it fuels greater cooperation and harmony in the community and workplace with tangible benefits in productivity, health and </span><strong data-dcnode-id="442" style=""><span data-dcnode-id="443" instrument_node="">happiness</span></strong><span data-dcnode-id="441" instrument_node="">. But optimistic leadership must be paired with values to be sustainable. Optimistic leadership paired with guile and egocentric selfishness deceives over time, generating mistrust, cynicism, and hopelessness, fear or hate. Optimistic leadership paired with respect for others empowers. I feel we need leaders who deeply understand the importance of inclusion and equality. A visible commitment to the values of peace, respect and equality help ameliorate the feelings of exclusion and bitterness which fuel violence and unite us to work for the common good. Optimistic leadership based on respect for all creates hope, positive solutions, a sense of belonging, and humanizes us all.”</span></font></p><p align="center" data-dcnode-id="434"><font color="#000000" data-dcnode-id="435" face="Ubuntu" style="font-size: 18px;"><a class="stylizedButton buttonStyle004" data-dcnode-id="437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/Foster-Optimistic-Leadership%3DPublic" target="_blank"><span data-dcnode-id="438" instrument_node="">Foster Optimistic Leadership</span></a><br data-dcnode-id="436"></font></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><br data-dcnode-id="432"></p></div><span data-dcnode-id="429" instrument_node="">
</span></div><div class="WaGadget WaGadgetContent gadgetStyleNone" data-componentid="VJOiep2" data-dcnode-id="406" id="id_VJOiep2" style=""><div class="gadgetStyleBody gadgetContentEditableArea" data-areaheight="auto" data-dcnode-id="408" data-editablearea="0" style="padding-top:20px;padding-right:30px;padding-bottom:20px;padding-left:30px;"><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="422"><font color="#000000" data-dcnode-id="423"><strong data-dcnode-id="424" style=""><font data-dcnode-id="425" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="426" instrument_node="">Nick Smit, International Affairs Expert</span></font></strong></font></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="412"><font color="#000000" data-dcnode-id="413" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="420" instrument_node="">“I am optimistic for the future of the world’s population as rising education standards, nutrition, disease control, birth control and employment, particularly in hitherto impoverished regions, are leading to a better life for more people. I am worried by the tendency of many in the developed world to want everything to stay the way it is now, e.g. to stop replacing native growth with rural development and rural by urban development. People seem to be </span><strong data-dcnode-id="418" style=""><span data-dcnode-id="419" instrument_node="">happy</span></strong><span data-dcnode-id="417" instrument_node=""> live on cleared bushland but refuse to allow anyone else to clear bushland to live on. A major challenge for leaders of the future is to find the right balance between development and conservation which will be key to improving global living standards and thus, </span><strong data-dcnode-id="415" style=""><span data-dcnode-id="416" instrument_node="">happiness</span></strong><span data-dcnode-id="414" instrument_node="">. Too many in the developed world are fearful of change at a time when the rate of change, particularly in the case of technological change, is accelerating rapidly.”</span></font></p><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="409"><br data-dcnode-id="410"></p></div><span data-dcnode-id="407" instrument_node="">
</span></div><div class="WaGadget WaGadgetContent gadgetStyleNone" data-componentid="EgiB3tn" data-dcnode-id="366" id="id_EgiB3tn" style=""><div class="gadgetStyleBody gadgetContentEditableArea" data-areaheight="auto" data-dcnode-id="368" data-editablearea="0" style="padding-top:20px;padding-right:30px;padding-bottom:20px;padding-left:30px;"><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="399"><font color="#000000" data-dcnode-id="400"><strong data-dcnode-id="401" style=""><span data-dcnode-id="402" style="background-color: white;"><font color="#191A19" data-dcnode-id="403" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="404" instrument_node="">Stephen Ibaraki, Futurist and Entrepreneur</span></font></span></strong></font></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="387"><font color="#000000" data-dcnode-id="388"><span data-dcnode-id="389" style="background-color: white;"><font color="#191A19" data-dcnode-id="390" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="397" instrument_node="">“In collecting more than 200 attributes that define success with entrepreneurs, there are four that stand out—one is optimism. When looking at the related area of </span><strong data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">happiness</span></strong><span data-dcnode-id="394" instrument_node="">, prior to 2000, it was believed that people were born with a </span><strong data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">happiness</span></strong><span data-dcnode-id="391" instrument_node=""> set point—immutable thus setting your course for the future. However, when studying Tibetan monks and their brain activity, it was discovered that this could be raised through technique. The same is true of Optimism; you can increase your optimism by reframing everything into opportunities or key lessons for growth. This is similar to stress hormones, they are produced in relation to how you frame workload and challenges—think optimistically about opportunities and skill growth—the stress levels go down thus improving your life quality. Finally, there is this definition of success related to Grit most recently defined by psychologist Angela Duckworth which I’m modifying based upon my experiences:</span></font></span></font></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="381"><font color="#000000" data-dcnode-id="382"><span data-dcnode-id="383" style="background-color: white;"><font color="#191A19" data-dcnode-id="384" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="385" instrument_node="">Talent x &nbsp;hyper effort = skill</span></font></span></font></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="375"><font color="#000000" data-dcnode-id="376"><span data-dcnode-id="377" style="background-color: white;"><font color="#191A19" data-dcnode-id="378" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="379" instrument_node="">Skill x hyper effort = achievement</span></font></span></font></p><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="369"><font color="#000000" data-dcnode-id="370"><span data-dcnode-id="371" style="background-color: white;"><font color="#191A19" data-dcnode-id="372" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="373" instrument_node="">Achievement x passion x perseverance x optimism (squared) = Grit applied over long-term goals = Success”</span></font></span></font></p></div><span data-dcnode-id="367" instrument_node="">
</span></div><div class="WaGadget WaGadgetContent gadgetStyleNone" data-componentid="XuVjp4v" data-dcnode-id="353" id="id_XuVjp4v" style=""><div class="gadgetStyleBody gadgetContentEditableArea" data-areaheight="auto" data-dcnode-id="355" data-editablearea="0" style="padding-top:20px;padding-right:30px;padding-bottom:20px;padding-left:30px;"><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="361"><a data-dcnode-id="362" data-entity-urn="urn:li:fs_miniProfile:ACoAAAMF5m4BAwIhyAoqp4a9ih2ec-nVy6bovbc" data-guid="0" data-object-urn="urn:li:member:50718318" data-original-text="Shyam Ramanathan, PMP,CSSGB,AINS,AU" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/pulse/26-tips-start-week-happy-note-shyam-ramanathan-pmp-cssgb-ains-au/"><font data-dcnode-id="363" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="364" instrument_node="">Shyam Ramanathan</span></font></a></p><p data-dcnode-id="356"><span data-dcnode-id="358"><font data-dcnode-id="359" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="360" instrument_node="">"The key to happiness lies in optimism. It’s not what happens to us but how we respond to what happens to us that matters. For example, Steve Jobs believed in his products even when he was the only one with the vision. He was not even sure if it will be accepted in the market but he showed undying optimism to see success till the end. Even in his professional nadir he showed enduring optimism and show what one can achieve with optimism and belief."</span></font></span><br data-dcnode-id="357"></p></div><span data-dcnode-id="354" instrument_node="">
</span></div><div class="WaGadget WaGadgetContent gadgetStyleNone" data-componentid="Gu3DSsV" data-dcnode-id="341" id="id_Gu3DSsV" style=""><div class="gadgetStyleBody gadgetContentEditableArea" data-areaheight="auto" data-dcnode-id="343" data-editablearea="0" style="padding-top:20px;padding-right:30px;padding-bottom:20px;padding-left:30px;"><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="348"><font color="#000000" data-dcnode-id="349" face="Ubuntu" style="font-size: 18px;"><strong data-dcnode-id="350" style=""><span data-dcnode-id="351" instrument_node="">Salman Farooqi, Artist, Pakistan</span></strong></font></p><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="344"><font color="#000000" data-dcnode-id="345" face="Ubuntu" style="font-size: 18px;"><span data-dcnode-id="346" instrument_node="">“Over the last 20 to 25 years, I have been an optimist and a believer in life. My works are, consequently, optimistic, bright and cheerful. I do not wish to convey sadness through art and I strive to depict beauty, energy and vitality that is not readily visible in&nbsp;everyday&nbsp;scene.&nbsp; My paintings are designed to be celebrations of happiness, positivity and cheerfulness.”</span></font></p></div><span data-dcnode-id="342" instrument_node="">
