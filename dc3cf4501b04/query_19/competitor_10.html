</span><h1 class="entry-title" data-dcnode-id="2668" itemprop="headline"><span data-dcnode-id="2669" instrument_node="">Why Self Awareness is Fundamental to Personal Growth (&amp; How to Cultivate It)</span></h1><div class="entry-meta" data-dcnode-id="2657"><span data-dcnode-id="2667" instrument_node="">By </span><span class="posted-by vcard author" data-dcnode-id="2659" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span data-dcnode-id="2666" instrument_node=""> </span><a class="url fn n" data-dcnode-id="2661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//possibilitychange.com/author/stephen-cox/" itemprop="url" rel="author" title="View all posts by Stephen Cox"><span data-dcnode-id="2665" instrument_node="">

</span></a><span data-dcnode-id="2660" instrument_node="">
</span></span><span data-dcnode-id="2658" instrument_node="">
</span></div><span data-dcnode-id="2656" instrument_node=""> </span></div><span data-dcnode-id="2654" instrument_node="">
</span><div class="post-thumb-img-content post-thumb" data-dcnode-id="2650"><img alt="self awareness" class="attachment-large size-large wp-post-image lazyloaded" data-dcnode-id="2653" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://s10721.pcdn.co/wp-content/uploads/2008/11/self-awareness-1200x715.jpeg" data-srcset="https://s10721.pcdn.co/wp-content/uploads/2008/11/self-awareness-1200x715.jpeg 1200w, https://s10721.pcdn.co/wp-content/uploads/2008/11/self-awareness-300x179.jpeg 300w, https://s10721.pcdn.co/wp-content/uploads/2008/11/self-awareness-768x458.jpeg 768w, https://s10721.pcdn.co/wp-content/uploads/2008/11/self-awareness-1080x644.jpeg 1080w, https://s10721.pcdn.co/wp-content/uploads/2008/11/self-awareness.jpeg 1280w" height="477" itemprop="image" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s10721.pcdn.co/wp-content/uploads/2008/11/self-awareness-1200x715.jpeg&amp;raw" srcset="https://s10721.pcdn.co/wp-content/uploads/2008/11/self-awareness-1200x715.jpeg 1200w, https://s10721.pcdn.co/wp-content/uploads/2008/11/self-awareness-300x179.jpeg 300w, https://s10721.pcdn.co/wp-content/uploads/2008/11/self-awareness-768x458.jpeg 768w, https://s10721.pcdn.co/wp-content/uploads/2008/11/self-awareness-1080x644.jpeg 1080w, https://s10721.pcdn.co/wp-content/uploads/2008/11/self-awareness.jpeg 1280w" width="800"><noscript data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">&lt;img width="800" height="477" src="https://s10721.pcdn.co/wp-content/uploads/2008/11/self-awareness-1200x715.jpeg" class="attachment-large size-large wp-post-image" alt="self awareness" itemprop="image" loading="lazy" srcset="https://s10721.pcdn.co/wp-content/uploads/2008/11/self-awareness-1200x715.jpeg 1200w, https://s10721.pcdn.co/wp-content/uploads/2008/11/self-awareness-300x179.jpeg 300w, https://s10721.pcdn.co/wp-content/uploads/2008/11/self-awareness-768x458.jpeg 768w, https://s10721.pcdn.co/wp-content/uploads/2008/11/self-awareness-1080x644.jpeg 1080w, https://s10721.pcdn.co/wp-content/uploads/2008/11/self-awareness.jpeg 1280w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></div><span data-dcnode-id="2649" instrument_node="">
</span></header><span data-dcnode-id="2646" instrument_node="">
</span><div class="entry-content clear" data-dcnode-id="2472" itemprop="text"><span data-dcnode-id="2645" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="2642"><p data-dcnode-id="2643" style="text-align: center;"><span data-dcnode-id="2644" instrument_node="">“We primarily grow as human beings by discovering new truths about ourselves and our reality.” – Steve Pavlina</span></p></blockquote><span data-dcnode-id="2641" instrument_node="">
</span><p data-dcnode-id="2636"><span data-dcnode-id="2640" instrument_node="">The scope of personal development and growth is a broad one. It is through the powerful impact of personal development and growth that we can grow and improve our relationships, our careers, our wealth, our health, and our happiness. At the very fundamental core of this broad and powerful pursuit is </span><strong data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">self awareness</span></strong><span data-dcnode-id="2637" instrument_node="">.</span></p><span data-dcnode-id="2635" instrument_node="">
</span><p data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">To discover new truths about ourselves is to expand our self awareness. Think of self awareness as a circle. Everything within and without the circle is the self. What is within the circle is what your current level of self awareness allows you to consciously perceive.</span></p><span data-dcnode-id="2632" instrument_node="">
</span><p data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">As you expand your circle of self awareness not only are you consciously aware of a greater portion of your self but also the borders of your awareness have expanded such that your self awareness borders upon an expanded field of future discovery and growth.</span></p><span data-dcnode-id="2629" instrument_node="">
</span><p data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">The more doors we open the more doors we discover there are to be opened. Self awareness is the very beginning of personal development. It may very well be the ultimate end.</span></p><span data-dcnode-id="2626" instrument_node="">
</span><h3 data-dcnode-id="2623"><strong data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">Why is Self Awareness Important?</span></strong></h3><span data-dcnode-id="2622" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="2619"><p data-dcnode-id="2620" style="text-align: center;"><span data-dcnode-id="2621" instrument_node="">“A man is but the product of his thoughts; what he thinks, he becomes.” – Gandhi</span></p></blockquote><span data-dcnode-id="2618" instrument_node="">
</span><p data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">The perspective we take on the happenings of the world and our lives largely determines for us the state of our world and our being. Thus probably the most vital lesson we can learn in life is the importance of what we think.</span></p><span data-dcnode-id="2615" instrument_node="">
</span><p data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">If you think failure you will find reasons to fail and inevitably succumb to it. If you think health and wellbeing you will make the conscious decision to take the path that leads to greater health and wellbeing.</span></p><span data-dcnode-id="2612" instrument_node="">
</span><p data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">Unfortunately, many of us do not consciously choose the perspective we take. Our thoughts, which may be considered covert behavior, may simply roll with life and become conditioned by events, the media and other people around us.</span></p><span data-dcnode-id="2609" instrument_node="">
</span><p data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">If this happens we have given up our power as human beings to create our world and our life around us. In fact we are using our own power against ourselves to make ourselves feel powerless. It is impossible for us to develop and grow ourselves if we lack awareness of ourselves.</span></p><span data-dcnode-id="2606" instrument_node="">
</span><h3 data-dcnode-id="2603"><strong data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">How To Cultivate Self Awareness</span></strong></h3><span data-dcnode-id="2602" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="2599"><p data-dcnode-id="2600" style="text-align: center;"><span data-dcnode-id="2601" instrument_node="">“A person who is aware of himself is in a better position to predict and control his own behavior.” – B. F. Skinner</span></p></blockquote><span data-dcnode-id="2598" instrument_node="">
</span><p data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">Within Buddhism one of The Three Poisons is Moha or delusion. Buddhism sees the three poisons as the root cause of all suffering. Moha basically means not knowing what is going on within oneself.</span></p><span data-dcnode-id="2595" instrument_node="">
</span><p data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">According to Buddhism, Moha is the most fundamental of the three poisons. It is a lack of awareness that lies at the root of all our problems. The cure Buddhism proposes is to extend clarity and awareness down into processes that are normally unconscious.</span></p><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">It is mindfulness that Buddhism uses to achieve this aim. Mindfulness is the process of bearing something in mind. An awareness, which does not drift along the surface of things but is a thorough observation, observing without judgment, without habitual reaction or compulsion, but clearly acknowledges what is actually there in the flow of experience, noting its nature.</span></p><span data-dcnode-id="2589" instrument_node="">
</span><p data-dcnode-id="2584"><span data-dcnode-id="2588" instrument_node="">Thus one of the ways in which we can expand our circle of self awareness is through the development of mindfulness. This can be achieved both through meditation practice and by making a conscious choice to actively be more mindful in our daily lives. In this way, through greater </span><a data-dcnode-id="2586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//possibilitychange.com/" title="self awareness"><span data-dcnode-id="2587" instrument_node="">self awareness</span></a><span data-dcnode-id="2585" instrument_node="">, we become empowered to choose our own way, to grow ourselves in the manner of our own choosing.</span></p><span data-dcnode-id="2583" instrument_node="">
</span><p data-dcnode-id="2578"><span data-dcnode-id="2579" style="font-size: xx-small;"><span data-dcnode-id="2582" instrument_node="">Photo by </span><a data-dcnode-id="2580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.flickr.com/photos/esparta/1584333702/"><span data-dcnode-id="2581" instrument_node="">Esparta</span></a></span></p><span data-dcnode-id="2577" instrument_node="">

</span><p data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">“A man is but the product of his thoughts; what he thinks, he becomes.” – Gandhi</span></p><span data-dcnode-id="2178" instrument_node="">

</span><p data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Thanks for this piece.  One method of maintaining self-awareness that I’ve found helpful is to keep my attention focused on my body — fully feeling all the sensations going on inside it.  We can do this in many different ways, but a simple one I’ve found effective is deeply breathing into the diaphragm and stomach and imagining the oxygen filling the entire body with healing warmth.  When we’re aware of our bodies, we’re less likely to automatically repeat our old patterns of behavior and we can choose to adopt new ones.  — In gratitude, Chris</span></p><span data-dcnode-id="2124" instrument_node="">

</span><section class="ast-comment-content comment" data-dcnode-id="1934"><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">Great post!  Self-awareness is certainly a topic that is popular among “personal development” blogs.  I must say here that there certainly is a difference between self-awareness and self-knowledge.</span></p><span data-dcnode-id="1957" instrument_node="">
</span><p data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">Self-awareness is, as you say, is quite a broad topic.  It has more to do with mindful attention to the present moment than with intimate knowledge of the self.</span></p><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">For the average person, an ideal place to begin, however, is with self-knowledge.  In my observation and personal experience, self-knowledge has two primary parts, the first being knowledge of ourselves, first as humans and what our human brain wants us to do; and second as unique and individual personalities, which is quite a personal endeavor and often a life-long journey.</span></p><span data-dcnode-id="1951" instrument_node="">
</span><p data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">I could write an entire book on this subject (and probably will at some point in the future) but I believe these few paragraphs could be of some use to your readers.</span></p><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Thanks for the useful post…</span></p><span data-dcnode-id="1945" instrument_node="">
</span><p data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">“Moderation, which consists in indifference about little things, and in a prudent and well-proportioned zeal about things of importance, can proceed from nothing but true knowledge, which has its foundation in self-acquaintance.” ~ Plato</span></p><span data-dcnode-id="1942" instrument_node="">

</span><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Interesting Kent, I would go the opposite direction and say that self-awareness is the foundation in which self-knowledge can be discovered.</span></p><span data-dcnode-id="1891" instrument_node="">

</span><section class="ast-comment-content comment" data-dcnode-id="1805"><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Thank you everyone for your comments thus far. There have been some interesting ones. </span></p><span data-dcnode-id="1837" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">@Jarrod – I wholeheartedly agree that the usefulness of mindfulness in daily life cannot be overstated.</span></p><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">@Ian – You might like to try letting go instead of battling with your mind. It’s an odd experience but I’ve found the more I let go the more negative things don’t stay around :)</span></p><span data-dcnode-id="1831" instrument_node="">
</span><p data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">@Chris – you raise an excellent point regarding how we’re less likely to automatically repeat our old patterns of behavior and can rather choose to adopt new ones when we are aware. This is certainly one of the great benefits!</span></p><span data-dcnode-id="1828" instrument_node="">
</span><p data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">@Tom – My pleasure. I feel observation without judgment is a vital skill. How can we change and develop if our perception of the current state of things is clouded by the discriminating mind that brought about the current state?</span></p><span data-dcnode-id="1825" instrument_node="">
</span><p data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">@Jeremy – Glad you enjoyed it and my blog. Thanks for the stumble!</span></p><span data-dcnode-id="1822" instrument_node="">
</span><p data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">@Kent – I feel I must agree with Jarrod. Without self-awareness how can we discover self-knowledge? As you say self-awareness is awareness in the present moment. In my experience my self is occurring constantly in the present moment – thoughts, feelings, emotions, physical sensations and reactions and so forth. All coming and going moment to moment. But perhaps we are getting lost in semantics here :)</span></p><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">All the best,</span></p><span data-dcnode-id="1816" instrument_node="">
</span><p data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">Stephen</span></p><span data-dcnode-id="1813" instrument_node="">

le="height: 229.297px; background-image: url(&quot;https://scontent-iad3-2.cdninstagram.com/v/t51.2885-15/275934576_1002899697292426_2515913043851280339_n.jpg?_nc_cat=107&amp;ccb=1-5&amp;_nc_sid=8ae9d6&amp;_nc_ohc=MPI-xMwwSvoAX9N7wy5&amp;_nc_ht=scontent-iad3-2.cdninstagram.com&amp;edm=AM6HXa8EAAAA&amp;oh=00_AT8XWJE-TjS41peFWV7Ht5kr5ZlpOzPYnV4Lcu_k3xB--Q&amp;oe=626E27C8&quot;); background-size: cover; background-position: center center; background-repeat: no-repeat;" target="_blank"><span data-dcnode-id="1169" instrument_node="">
</span><span class="sbi-screenreader" data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">"Personally, I struggle with change. Even good cha</span></span><span data-dcnode-id="1166" instrument_node="">
</span><img alt="&quot;Personally, I struggle with change. Even good change can be tricky for me to deal with. For example, about six months ago I left my job to focus on my site, PositivelyPresent.com, full time. I initiated this change—and was thrilled about it—but it was still a struggle to get used to the idea that I would be in control of my own business.

I would be making my own hours, writing on my own schedule. It was a great change—but I found it hard to adapt at times. I was used to the routine of my corporate job and suddenly I was alone in my apartment all day, expected to take care of all aspects of my newborn company, and it was overwhelming.

Even though I love my routines—and tend to shy away from change—changing my own career path has taught me to think differently about change. It’s shown me that change—even change I’ve initiated—can be unpredictable. It’s shown me that I can’t always control change—but I can control the way I think about it.&quot;

This excerpt is from &quot;5 Ways to Change Your Mind About Change&quot; by Dani DiPirro. Visit the Possibility Change website to read the full story!

</span><img alt="&quot;“If it is to be, it is up to me.

When my friend kept beating those words into me, a light finally turned on. If I wanted a job, it was up to me. If I wanted to love and support my family, it was up to me. If I wanted to be happier and stronger, it was up to me. Everything about me was up to me.

My friend’s advice hit me like a ton of bricks. It shook me. I was responsible. I needed to do whatever it took. I needed to do the hard things. I needed to quit asking for bailouts. And I needed to start trusting my own abilities. Not only was it up to me, I needed to start believing in myself more.

Talk about a turning point.&quot;

This excerpt is from &quot;How to Find Strength to Keep Going When Your Life Falls Apart&quot; by Dan Drew. Visit the Possibility Change website to read the full story!
