                       https://media.edutopia.org/styles/responsive_2880px_original/s3/masters/2020-11/AMERICANED_SUTTON_031-crop.jpg 2880w,"></div><div class="css-1gd7y0g" data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Allison Shelley / American Education</span></div></div><span data-dcnode-id="702" instrument_node=""></span></header><div class="css-1oxu44 rich-text" data-dcnode-id="615" data-testid="rich-text"><div data-dcnode-id="694"><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">In today’s fast-paced, rapidly changing educational atmosphere, leaders and districts need to create positive work environments. Although this is challenging for every leader, it’s critical to navigate these uncharted waters with care. Positive leadership is not a topic of conversation just because of Covid-19, but the drastic shifts we’re all facing due to the pandemic are reminders of just how important positive leadership strategies are.</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">As a leader, you directly influence the behaviors of others. Parker Palmer, an author, educator, and activist who focuses on issues in education, community, leadership, spirituality, and social change, said, “Relational trust is built on movements of the human heart, such as empathy, commitment, compassion, patience, and positivity.” When coupled with schools’ current needs to face change and new possibilities, being a positive educational leader is even more paramount. During my research at Boston College, I looked at positive leadership and its impact on school culture. I learned that positive leadership makes a difference in productivity, satisfaction, and happiness at work. Leading with positivity also helps to build trust among colleagues, and it becomes safer to open up to change.</span></p><span data-dcnode-id="695" instrument_node="">
</span></div><div class="newsletter-wrapper css-1qajsqc embedded" data-dcnode-id="673"><div aria-hidden="false" class="rah-static rah-static--height-auto" data-dcnode-id="674" id="newsletter-ad-height" style="height: auto; overflow: visible;"><div data-dcnode-id="675"><div class="hidden" data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Start of newsletter promotion.</span></div><div class="css-1heyucv" data-dcnode-id="678" data-testid="inline-toggle"><div class="css-wysylz" data-dcnode-id="679"><div class="css-15ndhca" data-dcnode-id="689"><div class="css-ee07wz" data-dcnode-id="690"><img alt="Small illustration of a bar chart with 3 bars with an upward trend" class="css-yrclke" data-dcnode-id="691" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edutopia.org/assets/newsletterad/graph-art.svg&amp;raw"></div></div><h2 class="css-u2zg4" data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Keep Up With Education Research</span></h2><p class="css-ngfhr1" data-dcnode-id="682"><span data-dcnode-id="686" instrument_node="">We read the major academic journals and case studies so you don’t have to. Sign up for </span><em data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">The Research Is In</span></em><span data-dcnode-id="683" instrument_node="">, and we’ll send you the key takeaways once a month.</span></p><a class="css-1r11a5x link" data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edutopia.org/account/signup%3Fgrades%3D%26subscribe%3DresearchNewsletter"><span data-dcnode-id="681" instrument_node="">I want that</span></a></div></div><div class="hidden" data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">End of newsletter promotion.</span></div></div></div></div><div data-dcnode-id="616"><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Positive leadership supports&nbsp;the idea that focusing on staff’s growth potential and shifting from the distractions of constraints and toxic culture empowers people to do and be their best. It looks simple, but it’s easier said than done. Positive leadership requires embracing positive possibilities and dealing with the criticism that goes along with it. It requires leaders to look for potential—even in situations or in people in which or in whom you cannot find anything to celebrate. Being a positive leader does not require an increase in budget or a change in school plans. Instead, it takes the courage to cultivate a team’s well-being.</span></p><span data-dcnode-id="670" instrument_node="">
</span><h3 class="section-heading" data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Strategies to Help You Become a Positive Leader</span></h3><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="663"><strong data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Attitude is contagious:</span></strong><span data-dcnode-id="664" instrument_node=""> Positive teams are productive teams. Confident and supportive cultures are more collaborative and creative and ultimately attract hardworking, talented people. When you lead with a positive attitude in a supportive climate, people will go above and beyond what’s necessary. When people feel appreciated, they become more confident and produce their best work.</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="658"><strong data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Positivity creates resilience: </span></strong><span data-dcnode-id="659" instrument_node="">This year has been riddled with shifts and obstacles. When leaders have an optimistic perspective, educators feel a glimmer of hope and show their grit. The better your attitude, the quicker we can rebound from challenges. When people see your resilience, they feel braver and hardier themselves.</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="653"><strong data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Optimism improves problem-solving:</span></strong><span data-dcnode-id="654" instrument_node=""> Optimism allows you to see beyond the problem and recognize potential solutions. Hopeful people are less likely to wallow in frustration and discouragement.</span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="648"><strong data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Unity creates connected teams:</span></strong><span data-dcnode-id="649" instrument_node=""> Positive leaders unite instead of divide. Unity can be the difference between a great team and an average team. It starts at the top. As a positive leader, you must be a unifier and connector who fosters relationships between others.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="643"><strong data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Positive leaders celebrate small wins:</span></strong><span data-dcnode-id="644" instrument_node=""> It’s important to celebrate the small achievements. We often commemorate holidays, birthdays, or major career advancements, but what about the regular everyday accomplishments? Finally grading a stack of papers that have been sitting in your bag for a week, planning an excellent hybrid lesson, sending a parent email you’ve been dreading—all of these things are accomplishments and deserve to be celebrated too. Positive leaders need to recognize these wins. In today’s environment, we’re always going fast and looking forward, so that we tend to ignore these things. Small wins are opportunities to reflect on how much we’ve done, which gives us the strength to stay inspired.</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="638"><strong data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Be the reason someone smiles:</span></strong><span data-dcnode-id="639" instrument_node=""> Highlight the positives you see in the school. Enthusiasm is contagious. Be the leader who spots great things and gives compliments. When you do, others will follow your lead. Maybe leave a note on a teacher’s desk or in the staff room highlighting an act of kindness or a great teaching strategy.</span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="633"><strong data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Positive leaders are confident and courageous:</span></strong><span data-dcnode-id="634" instrument_node=""> Confidence is assurance in one’s skills and abilities and the strength of an idea or initiative to make schools better. When leaders possess confidence, they inspire others to tap into their unique gifts and abilities. When leaders thrive, they convince others that they, too, can thrive.</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Positive leadership requires the courage to be confident. It takes courage to introduce a new way of being or doing. In our new normal of hybrid or remote learning, leaders must have the courage to do what is right for teachers and students, not just what is easy. Courage is required when assessing what is and what is not working in a school.</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="628" instrument_node="">Positive leaders know that positive energy unlocks human potential and, therefore, engagement at work. Positive leaders challenge their educators in their areas of expertise. They do not merely fill gaps revealed by a competency model. Positive leaders find a way to maximize educators’ strengths. Unfortunately, leadership cannot be fixed just by applying a new technique. No program, policy, or project will do the trick. Instead, leaders need new lenses with which to look at leadership—and rewire it. Great leaders aren’t born, they’re made. Your attitude is your superpower. We have the </span><em data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">power</span></em><span data-dcnode-id="625" instrument_node=""> to be </span><em data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">positive </span></em><span data-dcnode-id="622" instrument_node="">every day!</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">During these challenging times in education, positive leaders need to focus on the individuals, not just the job.</span></p><span data-dcnode-id="617" instrument_node=""> </span></div></div><div data-dcnode-id="583"><div class="css-1oxu44 rich-text" data-dcnode-id="613" data-testid="rich-text"><div data-dcnode-id="614"></div></div><footer class="article-footer" data-dcnode-id="584" data-testid="article-footer" id="articleFooter"><div class="css-1jn2id" data-dcnode-id="592"><h3 class="section-heading--small" data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Share This Story</span></h3><ul class="css-1dyfp8b" data-dcnode-id="593" data-testid="social-list"><li class="css-1vfqs25" data-dcnode-id="607"><button data-dcnode-id="608" target="_blank"><span data-dcnode-id="609"><img alt="facebook icon" data-dcnode-id="610" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edutopia.org/assets/facebook-share.svg&amp;raw" style="height:36px;width:36px"></span></button></li><li class="css-1vfqs25" data-dcnode-id="603"><button data-dcnode-id="604" target="_blank"><span data-dcnode-id="605"><img alt="twitter icon" data-dcnode-id="606" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edutopia.org/assets/twitter-share.svg&amp;raw" style="height:36px;width:36px"></span></button></li><li class="css-1vfqs25" data-dcnode-id="598"><div data-dcnode-id="599"><span data-dcnode-id="600"><a alt="Edutopia on email." data-dcnode-id="601" href="mailto:?subject=How%20to%20Lead%20With%20Positivity%20&amp;body=How%20to%20Lead%20With%20Positivity%20%0D%0Ahttps://www.edutopia.org/article/how-lead-positivity" rel="noopener noreferrer" target="_blank"><img alt="email icon" data-dcnode-id="602" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edutopia.org/assets/email-share.svg&amp;raw" style="height:36px;width:36px"></a></s 7"><a class="black-title-link" data-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edutopia.org/article/5-step-coaching-model-instructional-innovation"><span data-dcnode-id="539" instrument_node="">A 5 Step Coaching Model for Instructional Innovation</span></a></h1><div class="css-fn6d52" data-dcnode-id="533"><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Changing your staff’s instructional practices is never easy, but gathering teacher input and buy-in can make for a smoother transition.</span></p><span data-dcnode-id="534" instrument_node=""> </span></div><div class="css-u6w0kd" data-dcnode-id="527"><span data-dcnode-id="532" instrument_node="">By</span><span data-dcnode-id="531" instrument_node=""> </span><span data-dcnode-id="528"><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edutopia.org/profile/jorge-valenzuela"><span data-dcnode-id="530" instrument_node="">Jorge Valenzuela</span></a></span></div><div class="date-text css-1bxy5d4" data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">April 15, 2022</span></div><div data-dcnode-id="524" id="beyond-2"></div><div class="css-nixxmw" data-dcnode-id="520" data-hero-type="simple"><div class="css-a9vf8o" data-dcnode-id="521"><a class="" data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edutopia.org/article/5-step-coaching-model-instructional-innovation"><img alt="Small group of teachers in a meeting" class="css-1v65e2h" data-dcnode-id="523" data-testid="beyond-hero-simple" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.edutopia.org/styles/responsive_200px_original/s3/sites/default/files/masters/2022-04/iStock-993970024--crop.jpg&amp;raw" srcset="https://media.edutopia.org/styles/responsive_200px_original/s3/sites/default/files/masters/2022-04/iStock-993970024--crop.jpg 200w,

e"><div class="page-inner page-inner--no-min-height page-inner--content" data-dcnode-id="499"><hr class="article-separator" data-dcnode-id="500"></div><div class="page-inner page-inner--content page-inner--no-min-height" data-dcnode-id="465" data-testid="article-view"><article class="article" data-dcnode-id="466"><header data-dcnode-id="475" data-testid="article-header"><div class="eyebrow" data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Classroom Management</span></div><h1 class="h1" data-dcnode-id="494"><a class="black-title-link" data-dcnode-id="495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edutopia.org/article/strategies-managing-challenging-student-behaviors"><span data-dcnode-id="496" instrument_node="">Strategies for Managing Challenging Student Behaviors</span></a></h1><div class="css-fn6d52" data-dcnode-id="490"><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Student misbehavior has been particularly agonizing for teachers this year, but there are proactive steps educators can take to remedy it.</span></p><span data-dcnode-id="491" instrument_node=""> </span></div><div class="css-u6w0kd" data-dcnode-id="484"><span data-dcnode-id="489" instrument_node="">By</span><span data-dcnode-id="488" instrument_node=""> </span><span data-dcnode-id="485"><a data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edutopia.org/profile/mary-davenport"><span data-dcnode-id="487" instrument_node="">Mary Davenport</span></a></span></div><div class="date-text css-1bxy5d4" data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">April 1, 2022</span></div><div data-dcnode-id="481" id="beyond-3"></div><div class="css-nixxmw" data-dcnode-id="477" data-hero-type="simple"><div class="css-a9vf8o" data-dcnode-id="478"><a class="" data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edutopia.org/article/st ear-understanding-their-cell-phone-use"><span data-dcnode-id="459" instrument_node="">Guiding Students to Develop a Clear Understanding of Their Cell Phone Use</span></a></h1><div class="css-fn6d52" data-dcnode-id="453"><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Banning cell phones from classrooms can backfire, but teachers can help students think critically about this addictive technology.</span></p><span data-dcnode-id="454" instrument_node=""> </span></div><div class="css-u6w0kd" data-dcnode-id="447"><span data-dcnode-id="452" instrument_node="">By</span><span data-dcnode-id="451" instrument_node=""> </span><span data-dcnode-id="448"><a data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edutopia.org/profile/christopher-klein"><span data-dcnode-id="450" instrument_node="">Christopher Klein</span></a></span></div><div class="date-text css-1bxy5d4" data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">April 14, 2022</span></div><div data-dcnode-id="444" id="beyond-4"></div><div class="css-nixxmw" data-dcnode-id="440" data-hero-type="simple"><div class="css-a9vf8o" data-dcnode-id="441"><a class="" data-dcnode-id="442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edutopia.org/article/guiding-students-develop-clear-understanding-their-cell-phone-use"><img alt="HIgh school students using their smart phones at school" class="css-1v65e2h" data-dcnode-id="443" data-testid="beyond-hero-simple" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.edutopia.org/styles/responsive_200px_original/s3/sites/default/files/masters/2022-04/2DHA4AA--crop.jpg&amp;raw" srcset="https://media.edutopia.org/styles/responsive_200px_original/s3/sites/default/files/masters/2022-04/2DHA4AA--crop.jpg 200w,

earners</span></div><h1 class="h1" data-dcnode-id="309"><a class="black-title-link" data-dcnode-id="310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edutopia.org/article/benefits-oral-history-projects-multilingual-learners"><span data-dcnode-id="311" instrument_node="">The Benefits of Oral History Projects for Multilingual Learners</span></a></h1><div class="css-fn6d52" data-dcnode-id="305"><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">When multilingual students interview family members, they improve their communication skills and learn more about their roots.</span></p><span data-dcnode-id="306" instrument_node=""> </span></div><div class="css-u6w0kd" data-dcnode-id="299"><span data-dcnode-id="304" instrument_node="">By</span><span data-dcnode-id="303" instrument_node=""> </span><span data-dcnode-id="300"><a data-dcnode-id="301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edutopia.org/profile/erin-vong"><span data-dcnode-id="302" instrument_node="">Erin Vong</span></a></span></div><div class="date-text css-1bxy5d4" data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">April 29, 2022</span></div><div data-dcnode-id="296" id="beyond-8"></div><div class="css-nixxmw" data-dcnode-id="292" data-hero-type="simple"><div class="css-a9vf8o" data-dcnode-id="293"><a class="" data-dcnode-id="294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edutopia.org/article/benefits-oral-history-projects-multilingual-learners"><img alt="Father and son talking in car" class="css-1v65e2h" data-dcnode-id="295" data-testid="beyond-hero-simple" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.edutopia.org/styles/responsive_200px_original/s3/sites/default/files/masters/2022-04/iStock-1152039751-crop.jpg&amp;raw" srcset="https://media.edutopia.org/styles/responsive_200px_original/s3/sites/default/files/masters/
