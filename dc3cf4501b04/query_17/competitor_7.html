</span><div class="post-content no-thumbnail" data-dcnode-id="923"><span data-dcnode-id="1331" instrument_node="">
</span><div class="post-title-wrapper" data-dcnode-id="1326"><span data-dcnode-id="1330" instrument_node="">
</span><h1 class="post-title entry-title" data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">
		100 Things To Do When You’re Feeling Down		</span></h1><span data-dcnode-id="1327" instrument_node="">
</span></div><span data-dcnode-id="1325" instrument_node="">
</span><div class="clear" data-dcnode-id="1324"></div><span data-dcnode-id="1323" instrument_node="">
</span><div class="post-content-content" data-dcnode-id="925"><span data-dcnode-id="1322" instrument_node="">
</span><div class="entry-content" data-dcnode-id="931"><p align="center" data-dcnode-id="1320"><img alt="100 Things To Do When You're Feeling Down | Uncustomary" data-dcnode-id="1321" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uncustomary.org/wp-content/uploads/2015/11/100-Things-To-Do-When-Youre-Feeling-Down-Uncustomary.jpg&amp;raw" width="700"></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">All of our emotions are imperative for a well-rounded and healthy human experience. While a happy life is the ultimate goal, you still need to experience those “negative” emotions like fear, anger, and sadness. Knowing what these emotions feel like can make our joyful moments even more special.</span></p><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Sometimes feeling upset, low, and sad doesn’t seem as fleeting as we’d like, though, and it lingers longer than we feel comfortable with.&nbsp;I’ve come up with a list of things for you to try to try to shake the blues because you always have the opportunity to turn your day (and mood) around!</span></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">These are not cures for mental illness, including depression.</span></p><span data-dcnode-id="1310" instrument_node="">
</span><span data-dcnode-id="1308" instrument_node="">
</span><br data-dcnode-id="1306"><span data-dcnode-id="1305" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-6545679345452351" data-ad-format="auto" data-ad-slot="4574835426" data-dcnode-id="1304" style="display:block"></ins><br data-dcnode-id="1303"><span data-dcnode-id="1302" instrument_node="">
</span><span data-dcnode-id="1299" instrument_node="">
</span><h2 data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">100 Things To Do When You’re Feeling Down</span></h2><span data-dcnode-id="1296" instrument_node="">
</span><ol data-dcnode-id="967"><span data-dcnode-id="1295" instrument_node="">
</span><li data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Pick or buy flowers (or send them to yourself at work)</span></li><span data-dcnode-id="1292" instrument_node="">
</span><li data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Hang twinkle lights in your room</span></li><span data-dcnode-id="1289" instrument_node="">
</span><li data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Write what’s bothering you on paper and burn it with a lighter or in a bonfire</span></li><span data-dcnode-id="1286" instrument_node="">
</span><li data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Take a B12 supplement</span></li><span data-dcnode-id="1283" instrument_node="">
</span><li data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Get a pedicure complete with foot massage</span></li><span data-dcnode-id="1280" instrument_node="">
</span><li data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Blow bubbles out of the window of a moving car</span></li><span data-dcnode-id="1277" instrument_node="">
</span><li data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Go outside, even if it’s just for a walk around the neighborhood</span></li><span data-dcnode-id="1274" instrument_node="">
</span><li data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Let yourself cry and get feelings out</span></li><span data-dcnode-id="1271" instrument_node="">
</span><li data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Draw a heart on your face with lipstick</span></li><span data-dcnode-id="1268" instrument_node="">
</span><li data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Say “screw it” to your to do list and go do something fun</span></li><span data-dcnode-id="1265" instrument_node="">
</span><li data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Write/draw something happy on your sidewalk with chalk</span></li><span data-dcnode-id="1262" instrument_node="">
</span><li data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Get yourself a coloring book and new set of crayons and go to town</span></li><span data-dcnode-id="1259" instrument_node="">
</span><li data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Rent a bike and go for a ride and remember what it feels like to move fast above the earth with the wind in your hair</span></li><span data-dcnode-id="1256" instrument_node="">
</span><li data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Do some simple yoga poses like sun salutations and warrior poses</span></li><span data-dcnode-id="1253" instrument_node="">
</span><li data-dcnode-id="1250"><a data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uncustomary.leadpages.co/letter-to-your-future-self/"><span data-dcnode-id="1252" instrument_node="">Write a letter to your future self</span></a></li><span data-dcnode-id="1249" instrument_node="">
</span><li data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Have a selfie photoshoot in your most glamorous outfit/make-up</span></li><span data-dcnode-id="1246" instrument_node="">
</span><li data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Binge watch a TV show from your adolescence</span></li><span data-dcnode-id="1243" instrument_node="">
</span><li data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Lay outside to soak up sun and watch the clouds</span></li><span data-dcnode-id="1240" instrument_node="">
</span><li data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Call in sick to work, they’ll be okay</span></li><span data-dcnode-id="1237" instrument_node="">
</span><li data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Don’t listen to sad music, look out for your fragile emotions</span></li><span data-dcnode-id="1234" instrument_node="">
</span><li data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Hide in a fort you build with sheets and cushions</span></li><span data-dcnode-id="1231" instrument_node="">
</span><li data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Bring out film from your childhood and laugh at old memories</span></li><span data-dcnode-id="1228" instrument_node="">
</span><li data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Eat a bar of dark chocolate (the more pure cocoa the better!)</span></li><span data-dcnode-id="1225" instrument_node="">
</span><li data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Read a very good book that’s been strongly recommended to you by someone you love or one you already know you love</span></li><span data-dcnode-id="1222" instrument_node="">
</span><li data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Take a nap during the day with a very soft blanket</span></li><span data-dcnode-id="1219" instrument_node="">
</span><li data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Masturbate with an awesome sex toy</span></li><span data-dcnode-id="1216" instrument_node="">
</span><li data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Visit the aquarium and linger with the underwater life</span></li><span data-dcnode-id="1213" instrument_node="">
</span><li data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Go to Lush and ask to sample a bunch of good smelling, sparkly lotions</span></li><span data-dcnode-id="1210" instrument_node="">
</span><li data-dcnode-id="1206"><span data-dcnode-id="1209" instrument_node="">Pop the shit out of some </span><a data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uncustomary.org/bubble-wrap-bus-station/"><span data-dcnode-id="1208" instrument_node="">bubble wrap</span></a></li><span data-dcnode-id="1205" instrument_node="">
</span><li data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Google pictures of hot people (Chris Pratt and Zooey Deschannel are my go-to’s)</span></li><span data-dcnode-id="1202" instrument_node="">
</span><li data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Organize some of your digital files</span></li><span data-dcnode-id="1199" instrument_node="">
</span><li data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Order delivery for dinner so you don’t even need to get out of your pajamas</span></li><span data-dcnode-id="1196" instrument_node="">
</span><li data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Smell or rub some essential oils with citrus flavors on your skin (like orange, grapefruit, and lemon) which help with sadness and stress</span></li><span data-dcnode-id="1193" instrument_node="">
</span><li data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Make yourself a hot drink in a cute mug</span></li><span data-dcnode-id="1190" instrument_node="">
</span><li data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Go to a place where you can put your toes in a body of water</span></li><span data-dcnode-id="1187" instrument_node="">
</span><li data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Scream really loud until you cry, laugh, or gasp for breath</span></li><span data-dcnode-id="1184" instrument_node="">
</span><li data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Work on making an elaborate homemade gift for someone else</span></li><span data-dcnode-id="1181" instrument_node="">
</span><li data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Journal about how you feel and how you wish you felt</span></li><span data-dcnode-id="1178" instrument_node="">
</span><li data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Pet and/or cuddle an animal</span></li><span data-dcnode-id="1175" instrument_node="">
</span><li data-dcnode-id="1171"><span data-dcnode-id="1174" instrument_node="">Cross something off your </span><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uncustomary.org/bucket-list/"><span data-dcnode-id="1173" instrument_node="">bucket list</span></a></li><span data-dcnode-id="1170" instrument_node="">
</span><li data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Fly a kite, they’re actually pretty cheap at toy stores</span></li><span data-dcnode-id="1167" instrument_node="">
</span><li data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Visit a library and smell old books</span></li><span data-dcnode-id="1164" instrument_node="">
</span><li data-dcnode-id="1159"><span data-dcnode-id="1163" instrument_node="">Find a </span><a data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.blababooth.com/boothlocator.html"><span data-dcnode-id="1162" instrument_node="">photobooth</span></a><span data-dcnode-id="1160" instrument_node=""> and sit in one as much as you can afford it</span></li><span data-dcnode-id="1158" instrument_node="">
</span><li data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Wear a mini top hat all day</span></li><span data-dcnode-id="1155" instrument_node="">
</span><li data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Go to a wig shop and try on a bunch of different hairstyles and colors</span></li><span data-dcnode-id="1152" instrument_node="">
</span><li data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Actually go get your hair cut and/or colored in a more permanent way by a professional</span></li><span data-dcnode-id="1149" instrument_node="">
</span><li data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Go get an ice cream in a bowl and put the cone on top like a hat</span></li><span data-dcnode-id="1146" instrument_node="">
</span><li data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Order multiple orders of mozzarella sticks at TGIFridays</span></li><span data-dcnode-id="1143" instrument_node="">
</span><li data-dcnode-id="1138"><span data-dcnode-id="1142" instrument_node="">Bubble bath with a </span><a data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lushusa.com/Bath-Bombs/bath-bombs%2Cen_US%2Csc.html"><span data-dcnode-id="1141" instrument_node="">bath bomb</span></a><span data-dcnode-id="1139" instrument_node=""> that turns your water crazy cool colors</span></li><span data-dcnode-id="1137" instrument_node="">
</span><li data-dcnode-id="1133"><span data-dcnode-id="1136" instrument_node="">Flirt with </span><em data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">everyone</span></em></li><span data-dcnode-id="1132" instrument_node="">
</span><li data-dcnode-id="1128"><span data-dcnode-id="1131" instrument_node="">Dance naked all over your house, </span><a data-dcnode-id="1129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D-uv2QrtQh-4"><span data-dcnode-id="1130" instrument_node="">Abbi style</span></a></li><span data-dcnode-id="1127" instrument_node="">
</span><li data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Put on a bald cap and then a toupee</span></li><span data-dcnode-id="1124" instrument_node="">
</span><li data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Type a letter on a typewriter, listen to the click clack sounds and ding of the carriage return</span></li><span data-dcnode-id="1121" instrument_node="">
</span><li data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Make a s’more, even if it’s just over your stove</span></li><span data-dcnode-id="1118" instrument_node="">
</span><li data-dcnode-id="1114"><span data-dcnode-id="1117" instrument_node="">Watch&nbsp;a </span><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uncustomary.org/10-feel-good-movies/"><span data-dcnode-id="1116" instrument_node="">feel-good movie</span></a></li><span data-dcnode-id="1113" instrument_node="">
</span><li data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Stargaze and try to find constellations while thinking about how huge the universe is</span></li><span data-dcnode-id="1110" instrument_node="">
</span><li data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Throw a coin into a fountain and make a wish</span></li><span data-dcnode-id="1107" instrument_node="">
</span><li data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Check in at a hotel for the night and pamper the crap out of yourself, even room service if you can afford it</span></li><span data-dcnode-id="1104" instrument_node="">
</span><li data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Leave yourself a very nice voicemail to listen to later</span></li><span data-dcnode-id="1101" instrument_node="">
</span><li data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Unplug yourself from the internet and the world and just relax and remember what it’s like to be a person sans screen</span></li><span data-dcnode-id="1098" instrument_node="">
</span><li data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Walk around a garden or a nursery to smell and take photos of gorgeous flowers</span></li><span data-dcnode-id="1095" instrument_node="">
</span><li data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Fingerpaint and award yourself based on how messy you get</span></li><span data-dcnode-id="1092" instrument_node="">
</span><li data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Wear all of your jewelry at once and go to the local convenience store just to buy a drink</span></li><span data-dcnode-id="1089" instrument_node="">
</span><li data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Write “I am beautiful” on your mirror with your finger so it shows when it gets foggy or with a window/dry erase marker</span></li><span data-dcnode-id="1086" instrument_node="">
</span><li data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Start saying “That’s Dank City” whenever something is awesome and don’t worry about who that annoys</span></li><span data-dcnode-id="1083" instrument_node="">
</span><li data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Buy yourself a (bouquet of) balloon(s)</span></li><span data-dcnode-id="1080" instrument_node="">
</span><li data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Cuddle with a friend or lover, get all that oxytocin up in your brain (the “cuddle chemical”)</span></li><span data-dcnode-id="1077" instrument_node="">
</span><li data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Go next door and start singing your favorite Christmas song very loudly, even if it’s not December</span></li><span data-dcnode-id="1074" instrument_node="">
</span><li data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Put your hair in pigtails and tie ribbons or fuzzy pom poms on either side</span></li><span data-dcnode-id="1071" instrument_node="">
</span><li data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Go dancing at a gay bar</span></li><span data-dcnode-id="1068" instrument_node="">
</span><li data-dcnode-id="1064"><span data-dcnode-id="1067" instrument_node="">Take a page from a magazine, book, or the internet and make some </span><a data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uncustomary.org/blackout-poem/"><span data-dcnode-id="1066" instrument_node="">black out poetry</span></a></li><span data-dcnode-id="1063" instrument_node="">
</span><li data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Make a crown of wild flowers and wear it&nbsp;in your hair</span></li><span data-dcnode-id="1060" instrument_node="">
</span><li data-dcnode-id="1055"><span data-dcnode-id="1059" instrument_node="">Make a </span><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vimeo.com/114414291"><span data-dcnode-id="1058" instrument_node="">fake infomercial</span></a><span data-dcnode-id="1056" instrument_node=""> for a fake product in a fake accent</span></li><span data-dcnode-id="1054" instrument_node="">
</span><li data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Go to an estate sale and look through someone’s treasures</span></li><span data-dcnode-id="1051" instrument_node="">
</span><li data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Cover a wall in your room with photographs</span></li><span data-dcnode-id="1048" instrument_node="">
</span><li data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Make a list of three goals you want to accomplish today, and remember they can be very small and simple goals</span></li><span data-dcnode-id="1045" instrument_node="">
</span><li data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Go to a thrift store with a friend and have a contest to see who can wear the most ridiculous 80’s outfit</span></li><span data-dcnode-id="1042" instrument_node="">
</span><li data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Walk barefoot through sand, tall grass, or just out to the mailbox</span></li><span data-dcnode-id="1039" instrument_node="">
</span><li data-dcnode-id="1034"><span data-dcnode-id="1038" instrument_node="">Do some weird </span><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uncustomary.org/troll-baltimore-bridge/"><span data-dcnode-id="1037" instrument_node="">performance art</span></a><span data-dcnode-id="1035" instrument_node=""> on a street corner</span></li><span data-dcnode-id="1033" instrument_node="">
</span><li data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Play a boardgame with a group of friends</span></li><span data-dcnode-id="1030" instrument_node="">
</span><li data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Teach yourself the Thriller, Time Warp, or Evolution Of Dance dance</span></li><span data-dcnode-id="1027" instrument_node="">
</span><li data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Deep Google someone you find inspiring</span></li><span data-dcnode-id="1024" instrument_node="">
</span><li data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Buy, write on, and send ten postcards to friends’ snail mail addresses</span></li><span data-dcnode-id="1021" instrument_node="">
</span><li data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Browse a weird discount/wholesale/liquidator store for some super weird, old, discontinued treasures</span></li><span data-dcnode-id="1018" instrument_node="">
</span><li data-dcnode-id="1014"><span data-dcnode-id="1017" instrument_node="">Watch an excessive amount of </span><a data-dcnode-id="1015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DJxS5E-kZc2s"><span data-dcnode-id="1016" instrument_node="">cute cat videos</span></a></li><span data-dcnode-id="1013" instrument_node="">
</span><li data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Hold a lithium quartz crystal which is helpful with fighting sadness and stress, and finding peace and harmony</span></li><span data-dcnode-id="1010" instrument_node="">
</span><li data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Go to a sports bar and scream “City Name, Sports Team!” at the televisions</span></li><span data-dcnode-id="1007" instrument_node="">
</span><li data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Teach yourself five new words (even if they’re just from Urban Dictionary or in another language)</span></li><span data-dcnode-id="1004" instrument_node="">
</span><li data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Turn your hand into a face and put on a puppet show</span></li><span data-dcnode-id="1001" instrument_node="">
</span><li data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Make your own pom poms or tassels out of yarn or flowers out of cardstock or tissue paper</span></li><span data-dcnode-id="998" instrument_node="">
</span><li data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Visit a playground and get on the swings</span></li><span data-dcnode-id="995" instrument_node="">
</span><li data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Yell “Fuck It!” out loud with your arms up towards the sky</span></li><span data-dcnode-id="992" instrument_node="">
</span><li data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Write a positive haiku on a bathroom wall</span></li><span data-dcnode-id="989" instrument_node="">
</span><li data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Get yourself a harmonica, kazoo, or simple percussion instrument and make some really terrible music</span></li><span data-dcnode-id="986" instrument_node="">
</span><li data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Put a bunch of glitter on your eyes, face, and skin</span></li><span data-dcnode-id="983" instrument_node="">
</span><li data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Make a list of things you’re grateful for and lucky to have in your life</span></li><span data-dcnode-id="980" instrument_node="">
</span><li data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Buy and wear sexy underwear</span></li><span data-dcnode-id="977" instrument_node="">
</span><li data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Watch stand-up comedy you find hilarious and cackle unattractively</span></li><span data-dcnode-id="974" instrument_node="">
</span><li data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Wrap yourself up in soft blankets like a burrito and wiggle around</span></li><span data-dcnode-id="971" instrument_node="">
</span><li data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Move your mouth into a smile for sixty seconds to trick your brain</span></li><span data-dcnode-id="968" instrument_node="">
</span></ol><span data-dcnode-id="966" instrument_node="">
