</span><div class="sft-dsk-excerpt" data-dcnode-id="1868"><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Sadness is a feeling we all experience from time to time. We probably wouldn’t know what happiness was without it.</span></p></div><span data-dcnode-id="1867" instrument_node="">
</span><div class="single-main-content" data-dcnode-id="670"><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1865" instrument_node="">Sadness is a feeling we all experience from time to time. We probably wouldn’t know what happiness was without it. But what if the sadness won’t go away and turns into </span><a data-dcnode-id="1863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/2018/04/12/depression-doesnt-make-you-unlovable/"><span data-dcnode-id="1864" instrument_node="">hopelessness and despair</span></a><span data-dcnode-id="1862" instrument_node="">?</span></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">According to the World Health Organization, depression is a common mental illness with more than 300 million people affected worldwide.</span></p><div class="tpd-incontent-ad-container" data-dcnode-id="1853" style="background-color:#fff;"><div data-dcnode-id="1856" id="dsk-box-ad-d"></div><span data-dcnode-id="1855" instrument_node="">
</span><div data-dcnode-id="1854" id="mob-box-ad-a"></div></div><span data-dcnode-id="1852" instrument_node="">
</span><p data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">How depression manifests varies from person to person, but the mental health issue’s symptoms include feelings of sadness, a loss of interest in daily activities once enjoyed, sleep and appetite changes, irritability, problems focusing, loss of energy, feelings of helplessness, hopelessness and worthlessness. The more symptoms you might have, the more serious your condition might be — and it’s imperative to seek professional help. The good news is that with help and support and adequate treatment, those symptoms can be improved.</span></p><div aria-describedby="jw-shortcuts-tooltip-explanation" aria-label="Video Player" class="jwplayer jw-reset jw-state-playing jw-stretch-uniform jw-flag-aspect-mode jw-breakpoint-4 jw-floating-dismissible jw-flag-user-inactive" data-dcnode-id="1456" id="featured-jwplayer-video" role="application" style="width: 100%;" tabindex="0"><div class="jw-aspect jw-reset" data-dcnode-id="1849" style="padding-top: 56.25%;"></div><div class="jw-wrapper jw-reset" data-dcnode-id="1459"><div data-dcnode-id="1845" style="opacity: 0; visibility: hidden; overflow: hidden; display: block; position: absolute; top: 0px; left: 0px; width: 100%; height: 100%;"><div data-dcnode-id="1847" style="overflow: auto; display: block; position: absolute; top: 0px; left: 0px; width: 100%; height: 100%;"><div data-dcnode-id="1848" style="height: 1px; width: 709px;"></div></div><div class="jw-contract-trigger" data-dcnode-id="1846" style="overflow: auto; display: block; position: absolute; top: 0px; left: 0px; width: 100%; height: 100%;"></div></div><div class="jw-top jw-reset" data-dcnode-id="1844"></div><div class="jw-aspect jw-reset" data-dcnode-id="1843" style="padding-top: 56.25%;"></div><div class="jw-media jw-reset" data-dcnode-id="1841"><video class="jw-video jw-reset" data-dcnode-id="1842" disableremoteplayback="" playsinline="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw r | Inspirational Video | Goalcast</span></div></div></div></div></div><div aria-label="Video - “Sad Keanu” Finds Happiness | Life Stories by Goalcast" class="jw-reset jw-related-shelf-item" data-dcnode-id="1475" data-jw-index="7" role="button" style="background-image: url(https://cdn.jwplayer.com/v2/media/OjW1n8Yz/poster.jpg?width=720)" tabindex="-1"><div class="jw-reset jw-related-shelf-item-aspect" data-dcnode-id="1476"><div class="jw-reset jw-related-shelf-item-container" data-dcnode-id="1477"><div class="jw-reset jw-related-shelf-item-contents" data-dcnode-id="1478"><div class="jw-reset jw-related-shelf-item-duration jw-text" data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">06:47</span></div><div class="jw-reset-text jw-related-shelf-item-title jw-text" data-dcnode-id="1479" dir="auto"><span data-dcnode-id="1480" instrument_node="">“Sad Keanu” Finds Happiness | Life Stories by Goalcast</span></div></div></div></div></div></div></div><div aria-label="Next" class="jw-reset jw-icon jw-related-control jw-related-control-right" data-dcnode-id="1470" role="button" tabindex="0"><svg class="jw-svg-icon jw-svg-icon-arrow-right" data-dcnode-id="1471" focusable="false" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg"><path d="M183.6,104.4L81.8,0L45.4,36.3l84.9,84.9l-84.9,84.9L79.3,240l101.9-101.7c9.9-6.9,12.4-20.4,5.5-30.4C185.8,106.7,184.8,105.4,183.6,104.4L183.6,104.4z" data-dcnode-id="1472"></path></svg></div></div><div aria-label="Close" class="jw-reset jw-icon jw-icon-inline jw-related-close jw-related-more" data-dcnode-id="1465" role="button" tabindex="0"><span data-dcnode-id="1468" instrument_node="">Close</span><svg class="jw-svg-icon jw-svg-icon-arrow-down" data-dcnode-id="1466" focusable="false" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg"><path d="M105.398,185.598c1.1,1.1,2.3,2.2,3.6,3.1c9.9,6.9,23.5,4.4,30.4-5.5l101.6-101.9l-33.9-33.9l-84.9,84.9l-84.9-84.9l-36.3,36.3L105.398,185.598L105.398,185.598z" data-dcnode-id="1467"></path></svg></div></div></div></div></div></div></div><div class="afs_ads ad-placement" data-dcnode-id="1457" style="width: 1px; height: 1px; position: absolute; background: transparent;"><span data-dcnode-id="1458" instrument_node="">&nbsp;</span></div></div><p data-dcnode-id="1455"></p><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Depression hits everyone a little differently, sometimes just a few words can sometimes help you remember there is light at the end of the tunnel. Read through some of the depression quotes below, and you may find that your mental and even physical health starts to improve over time!</span></p><span data-dcnode-id="1451" instrument_node="">
</span><h2 data-dcnode-id="1449" id="h-depression-quotes-about-sadness-and-despair"><span data-dcnode-id="1450" instrument_node="">Depression quotes about sadness and despair</span></h2><span data-dcnode-id="1448" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Sadness is a basic human emotion we all feel every now and then, and sometimes it can be quite painful – even to the point that you don’t want to be alive anymore. This constant feeling can feel like a thousand pounds on your shoulders, making it difficult to move forward. But just remember: trying to ignore those feelings is not the way. It’s okay to feel sad and in fact, in many ways it is healthy to allow ourselves to feel the whole range of possible emotions as they come up, instead of suppressing them.</span></p><div class="tpd-incontent-ad-container" data-dcnode-id="1441" style="background-color:#fff;"><div data-dcnode-id="1444" id="dsk-box-ad-e"></div><span data-dcnode-id="1443" instrument_node="">
</span><div data-dcnode-id="1442" id="mob-box-ad-b"></div></div><span data-dcnode-id="1440" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1435"><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Every man has his secret sorrows which the world knows not; and often times we call a man cold when he is only sad.</span></p><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Henry Wadsworth Longfellow</span></p></blockquote><span data-dcnode-id="1434" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1429"><a data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-18-2.jpg"><img alt="depression quotes" class="wp-image-55486" data-dcnode-id="1433" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-18-2-1024x576.jpg&amp;raw" srcset="https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-18-2-1024x576.jpg 1024w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-18-2-708x398.jpg 708w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-18-2-336x189.jpg 336w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-18-2-750x422.jpg 750w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-18-2-345x194.jpg 345w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-18-2.jpg 1200w" width="1024"></a><figcaption data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">(FPG / Staff / Getty)</span></figcaption></figure><div class="tpd-incontent-ad-container" data-dcnode-id="1424" style="background-color:#fff;"><div data-dcnode-id="1427" id="dsk-box-ad-f"></div><span data-dcnode-id="1426" instrument_node="">
</span><div data-dcnode-id="1425" id="mob-box-ad-c"></div></div><span data-dcnode-id="1423" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1418"><p data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">The sun stopped shining for me is all. The whole story is: I am sad. I am sad all the time and the sadness is so heavy that I can’t get away from it. Not ever.</span></p><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Nina LaCour</span></p></blockquote><span data-dcnode-id="1417" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1412"><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Everyone wanted me to get help and rejoin life, pick up the pieces and move on, and I tried to, I wanted to, but I just had to lie in the mud with my arms wrapped around myself, eyes closed, grieving, until I didn’t have to anymore.</span></p><p data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Anne Lamott</span></p></blockquote><span data-dcnode-id="1411" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1406"><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">That very deadened feeling, which is so very different from feeling sad. Sad hurts but it’s a healthy feeling. It is a necessary thing to feel. Depression is very different.</span></p><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">J.K. Rowling</span></p></blockquote><span data-dcnode-id="1405" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1400"><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">I saw the world in black and white instead of the vibrant colors and shades I knew existed.</span></p><p data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Katie McGarry</span></p></blockquote><span data-dcnode-id="1399" instrument_node="">
</span><blockquote class="wp-block-quote is-style-default" data-dcnode-id="1394"><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Depression is being colorblind and constantly told how colorful the world is.</span></p><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Atticus</span></p></blockquote><span data-dcnode-id="1393" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1388"><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">That’s the thing about depression: A human being can survive almost anything, as long as she sees the end in sight. But depression is so insidious, and it compounds daily, that it’s impossible to ever see the end.</span></p><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Elizabeth Wurtzel</span></p></blockquote><span data-dcnode-id="1387" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1382"><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">A melancholy-looking man, he had the appearance of one who has searched for the leak in life’s gas-pipe with a lighted candle.</span></p><p data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">P.G. Wodehouse</span></p></blockquote><span data-dcnode-id="1381" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1376"><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">I’ve got a bad case of the 3:00 am guilts – you know, when you lie in bed awake and replay all those things you didn’t do right? Because, as we all know, nothing solves insomnia like a nice warm glass of regret, depression and self-loathing.</span></p><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">D.D. Barant</span></p></blockquote><span data-dcnode-id="1375" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1370"><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">I am in that temper that if I were under water I would scarcely kick to come to the top.</span></p><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">John Keats</span></p></blockquote><span data-dcnode-id="1369" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1364"><a data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-19-2.jpg"><img alt="depression quotes" class="wp-image-55489" data-dcnode-id="1368" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-19-2-1024x576.jpg&amp;raw" srcset="https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-19-2-1024x576.jpg 1024w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-19-2-708x398.jpg 708w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-19-2-336x189.jpg 336w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-19-2-750x422.jpg 750w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-19-2-345x194.jpg 345w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-19-2.jpg 1200w" width="1024"></a><figcaption data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">(Bettmann / Contributor / Getty)</span></figcaption></figure><span data-dcnode-id="1363" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1358"><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">There were days when she was unhappy, she did not know why,–when it did not seem worthwhile to be glad or sorry, to be alive or dead; when life appeared to her like a grotesque pandemonium and humanity like worms struggling blindly toward inevitable annihilation.</span></p><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Kate Chopin</span></p></blockquote><span data-dcnode-id="1357" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1352"><p data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">There are wounds that never show on the body that are deeper and more hurtful than anything that bleeds.</span></p><p data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Laurell K. Hamilton</span></p></blockquote><span data-dcnode-id="1351" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1346"><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Anyone who has actually been that sad can tell you that there’s nothing beautiful or literary or mysterious about depression.</span></p><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Jasmine Warga</span></p></blockquote><span data-dcnode-id="1345" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1338"><p data-dcnode-id="1341"><a class="thirstylink" data-dcnode-id="1343" data-linkid="25959" data-shortcode="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/2020/05/12/grief-quotes/" title="Grief Quotes"><span data-dcnode-id="1344" instrument_node="">Grief</span></a><span data-dcnode-id="1342" instrument_node=""> is depression in proportion to circumstance; depression is grief out of proportion to circumstance.</span></p><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Andrew Solomon</span></p></blockquote><span data-dcnode-id="1337" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1332"><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Killing oneself is, anyway, a misnomer. We don’t kill ourselves. We are simply defeated by the long, hard struggle to stay alive. When somebody dies after a long illness, people are apt to say, with a note of approval, He fought so hard. And they are inclined to think, about a suicide, that no fight was involved, that somebody simply gave up. This is quite wrong.</span></p><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Sally Brampton</span></p></blockquote><span data-dcnode-id="1331" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1326"><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">The sadness of the world has different ways of getting to people, but it seems to succeed almost every time.</span></p><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Louis-Ferdinand Céline</span></p></blockquote><span data-dcnode-id="1325" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1317"><p data-dcnode-id="1320"><span data-dcnode-id="1324" instrument_node="">Depression on my left, </span><a data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/2021/01/26/loneliness-quotes/"><span data-dcnode-id="1323" instrument_node="">Loneliness </span></a><span data-dcnode-id="1321" instrument_node="">on my right. They don’t need to show me their badges. I know these guys very well.</span></p><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Elizabeth Gilbert</span></p></blockquote><span data-dcnode-id="1316" instrument_node="">
</span><blockquote class="wp-block-quote is-style-default" data-dcnode-id="1311"><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Sadness is but a wall between two gardens.</span></p><p data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Kahlil Gibran</span></p></blockquote><span data-dcnode-id="1310" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1305"><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">I saw the world from the stars’ point of view, and it looked unbearably lonely.</span></p><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Shaun David Hutchinson</span></p></blockquote><span data-dcnode-id="1304" instrument_node="">
</span><h2 data-dcnode-id="1302" id="h-what-depression-feels-like-quotes"><span data-dcnode-id="1303" instrument_node="">What depression feels like quotes</span></h2><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">It can be difficult to describe depression to someone who’s never experienced it, whether it comes in the form of physical symptoms, feelings or even memories. Depression takes different forms with everyone, and sometimes it’s helpful to read something you can connect to, in order to make better sense of it all.&nbsp;</span></p><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1297" instrument_node="">Knowing other people understand what you’re going through can make you feel less alone and provide some reassurance that it’s possible to feel happy again, even if for now it feels completely out of reach. If you or someone you know is depressed, we </span><a data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/2020/02/27/hope-quotes/"><span data-dcnode-id="1296" instrument_node="">hope</span></a><span data-dcnode-id="1294" instrument_node=""> these quotes about depression bring comfort in challenging times.</span></p><span data-dcnode-id="1292" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1286"><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">It’s so difficult to describe depression to someone who’s never been there, because it’s not sadness. I know sadness. Sadness is to cry and to feel. But it’s that cold absence of feeling — that really hollowed-out feeling. </span></p><p data-dcnode-id="1287"><a data-dcnode-id="1288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/2018/03/02/successful-people-who-dealt-with-depression/"><span data-dcnode-id="1289" instrument_node="">J.K. ROWLING</span></a></p></blockquote><span data-dcnode-id="1285" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1277"><p data-dcnode-id="1280"><span data-dcnode-id="1284" instrument_node="">When you’re surrounded by all these people, it can be lonelier than when you’re by yourself. You can be in a huge crowd, but if you don’t feel like you can </span><a data-dcnode-id="1282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/2020/05/01/trust-quotes/"><span data-dcnode-id="1283" instrument_node="">trust</span></a><span data-dcnode-id="1281" instrument_node=""> anyone or talk to anybody, you feel like you’re really alone.</span></p><cite data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Fiona Apple</span></cite></blockquote><span data-dcnode-id="1276" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1271"><a data-dcnode-id="1274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-20-2.jpg"><img alt="depression quotes" class="wp-image-55491" data-dcnode-id="1275" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-20-2-1024x576.jpg&amp;raw" srcset="https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-20-2-1024x576.jpg 1024w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-20-2-708x398.jpg 708w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-20-2-336x189.jpg 336w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-20-2-750x422.jpg 750w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-20-2-345x194.jpg 345w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-20-2.jpg 1200w" width="1024"></a><figcaption data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">(David Corio / Contributor / Getty)</span></figcaption></figure><span data-dcnode-id="1270" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1265"><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Then night falls again and again, and you still have no idea where you are, and it’s time to admit that you have bewildered yourself so far off the path that you don’t even know from which direction the sun rises anymore.</span></p><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Elizabeth Gilbert</span></p></blockquote><span data-dcnode-id="1264" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1256"><p data-dcnode-id="1259"><span data-dcnode-id="1263" instrument_node="">I am so demanding and difficult for my friends because I want to crumble and fall apart before them so that they will </span><a class="thirstylink" data-dcnode-id="1261" data-linkid="21050" data-shortcode="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/2019/02/14/love-quotes/" title="Love Quotes"><span data-dcnode-id="1262" instrument_node="">love</span></a><span data-dcnode-id="1260" instrument_node=""> me even though I am no fun, lying in bed, crying all the time, not moving. Depression is all about If you loved me you would.</span></p><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Elizabeth Wurtzel</span></p></blockquote><span data-dcnode-id="1255" instrument_node="">
</span><h4 data-dcnode-id="1253" id="because-wherever-i-sat-on-the-deck-of-a-ship-or-at-a-street-cafe-in-paris-or-bangkok-i-would-be-sitting-under-the-same-glass-bell-jar-stewing-in-my-own-sour-air"><span data-dcnode-id="1254" instrument_node="">“Because wherever I sat—on the deck of a ship or at a street café in Paris or Bangkok—I would be sitting under the same glass bell jar, stewing in my own sour air.”</span></h4><span data-dcnode-id="1252" instrument_node="">
</span><h4 data-dcnode-id="1250" id="sylvia-plath"><span data-dcnode-id="1251" instrument_node="">Sylvia Plath</span></h4><span data-dcnode-id="1249" instrument_node="">
</span><h4 data-dcnode-id="1247" id="i-could-see-millions-and-millions-of-people-all-slotted-into-their-lives-then-i-could-see-me-i-d-lost-my-place-in-the-universe-it-had-closed-up-and-there-was-nowhere-for-me-to-be-i-was-more-lost-than-i-had-known-it-was-possible-for-any-human-being-to-be"><span data-dcnode-id="1248" instrument_node="">“I could see millions and millions of people, all slotted into their lives; then I could see me—I’d lost my place in the universe. It had closed up and there was nowhere for me to be. I was more lost than I had known it was possible for any human being to be.”</span></h4><span data-dcnode-id="1246" instrument_node="">
</span><h4 data-dcnode-id="1244" id="marian-keyes"><span data-dcnode-id="1245" instrument_node="">Marian Keyes</span></h4><span data-dcnode-id="1243" instrument_node="">
</span><h4 data-dcnode-id="1241" id="because-that-s-the-thing-about-depression-when-i-feel-it-deeply-i-don-t-want-to-let-it-go-it-becomes-a-comfort-i-want-to-cloak-myself-under-its-heavy-weight-and-breathe-it-into-my-lungs"><span data-dcnode-id="1242" instrument_node="">“Because that’s the thing about depression. When I feel it deeply, I don’t want to let it go. It becomes a comfort. I want to cloak myself under its heavy weight and breathe it into my lungs.”</span></h4><span data-dcnode-id="1240" instrument_node="">
</span><h4 data-dcnode-id="1238" id="stephanie-perkins"><span data-dcnode-id="1239" instrument_node="">Stephanie Perkins</span></h4><span data-dcnode-id="1237" instrument_node="">
</span><h4 data-dcnode-id="1235" id="i-didn-t-want-my-picture-taken-because-i-was-going-to-cry-i-didn-t-know-why-i-was-going-to-cry-but-i-knew-that-if-anybody-spoke-to-me-or-looked-at-me-too-closely-the-tears-would-fly-out-of-my-eyes-and-the-sobs-would-fly-out-of-my-throat-and-i-d-cry-for-a-week-i-could-feel-the-tears-brimming-and-sloshing-in-me-like-water-in-a-glass-that-is-unsteady-and-too-full"><span data-dcnode-id="1236" instrument_node="">“I didn’t want my picture taken because I was going to cry. I didn’t know why I was going to cry, but I knew that if anybody spoke to me or looked at me too closely the tears would fly out of my eyes and the sobs would fly out of my throat and I’d cry for a week. I could feel the tears brimming and sloshing in me like water in a glass that is unsteady and too full.”</span></h4><span data-dcnode-id="1234" instrument_node="">
</span><h4 data-dcnode-id="1232" id="sylvia-plath-1"><span data-dcnode-id="1233" instrument_node="">Sylvia Plath</span></h4><span data-dcnode-id="1231" instrument_node="">
</span><h4 data-dcnode-id="1229" id="when-you-are-depressed-the-past-and-future-are-absorbed-entirely-by-the-present-moment-as-in-the-world-of-a-three-year-old-you-cannot-remember-a-time-when-you-felt-better-at-least-not-clearly-and-you-certainly-cannot-imagine-a-future-time-when-you-will-feel-better"><span data-dcnode-id="1230" instrument_node="">“When you are depressed, the past and future are absorbed entirely by the present moment, as in the world of a three-year-old. You cannot remember a time when you felt better, at least not clearly; and you certainly cannot imagine a future time when you will feel better.”</span></h4><span data-dcnode-id="1228" instrument_node="">
</span><h4 data-dcnode-id="1226" id="andrew-solomon"><span data-dcnode-id="1227" instrument_node="">Andrew Solomon</span></h4><span data-dcnode-id="1225" instrument_node="">
</span><h2 data-dcnode-id="1221" id="h-depression-and-anxiety-quotes"><span data-dcnode-id="1224" instrument_node="">Depression and </span><a data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/2018/07/26/anxiety-quotes/"><span data-dcnode-id="1223" instrument_node="">anxiety quotes</span></a></h2><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1219" instrument_node="">It often happens that depression and </span><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/2018/07/26/anxiety-quotes/"><span data-dcnode-id="1218" instrument_node="">anxiety</span></a><span data-dcnode-id="1216" instrument_node=""> go hand in hand. When you don’t feel drained you may experience symptoms of </span><a class="thirstylink" data-dcnode-id="1214" data-linkid="25949" data-shortcode="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/2018/07/26/anxiety-quotes/" title="Anxiety Quotes"><span data-dcnode-id="1215" instrument_node="">anxiety</span></a><span data-dcnode-id="1213" instrument_node="">. For no particular reason, your heart starts racing and you might feel like something bad is about to happen, and there is not always a straightforward response you can make to turn this feeling around.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1210" instrument_node="">Depression can ten affect all areas of your life. When you experience it at a deeper level, you might ignore your friends, your partner or your job. At some point you might realize that you’re pushing people away, or fear that you’ll lose your job. That’s when anxiety kicks in and you enter a vicious circle where you worry about things and people that you may lose, but you also feel like there’s nothing you can do about it.Here are some depression and </span><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/2018/07/26/anxiety-quotes/"><span data-dcnode-id="1209" instrument_node="">anxiety quotes</span></a><span data-dcnode-id="1207" instrument_node=""> you may resonate with.</span></p><span data-dcnode-id="1205" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1200"><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">I tend to get pretty depressed and I have some issues with anxiety and things like that… For me, it’s more psychological. Exercise is a means of expelling those demons.</span></p><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Ryan Reynolds</span></p></blockquote><span data-dcnode-id="1199" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1194"><a data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-21-2.jpg"><img alt="depression quotes" class="wp-image-55495" data-dcnode-id="1198" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-21-2-1024x576.jpg&amp;raw" srcset="https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-21-2-1024x576.jpg 1024w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-21-2-708x398.jpg 708w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-21-2-336x189.jpg 336w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-21-2-750x422.jpg 750w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-21-2-345x194.jpg 345w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-21-2.jpg 1200w" width="1024"></a><figcaption data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">(Han Myung-Gu / Stringer / Getty)</span></figcaption></figure><span data-dcnode-id="1193" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1188"><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">I didn’t want to wake up. I was having a much better time asleep. And that’s really sad. It was almost like a reverse nightmare, like when you wake up from a nightmare you’re so relieved. I woke up into a nightmare.</span></p><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Ned Vizzini</span></p></blockquote><span data-dcnode-id="1187" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1182"><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">It weren’t too loo long before I seen something in me, had changed. A bitter seed was planted inside of me. And I just didn’t feel so, accepting, anymore.</span></p><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Kathryn Stockett</span></p></blockquote><span data-dcnode-id="1181" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1176"><p data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">I go dreaming into the future, where I see nothing, nothing. I have no plans, no idea, no project, and, what is worse, no ambition. Something – the eternal ‘what’s the use?’ – sets its bronze barrier across every avenue that I open up in the realm of hypothesis.</span></p><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Gustave Flaubert</span></p></blockquote><span data-dcnode-id="1175" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1170"><a data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-26-2.jpg"><img alt="depression quotes" class="wp-image-55512" data-dcnode-id="1174" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-26-2-1024x576.jpg&amp;raw" srcset="https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-26-2-1024x576.jpg 1024w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-26-2-708x398.jpg 708w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-26-2-336x189.jpg 336w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-26-2-750x422.jpg 750w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-26-2-345x194.jpg 345w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-26-2.jpg 1200w" width="1024"></a><figcaption data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">(Getty)</span></figcaption></figure><span data-dcnode-id="1169" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1164"><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">But when you get that depressed you don’t care. Apathy, because you’ve lost a sense of worth. It doesn’t matter whether you feel better because you have no worth.</span></p><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Philip K. Dick</span></p></blockquote><span data-dcnode-id="1163" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1158"><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">This fall I think you’re riding for — it’s a special kind of fall, a horrible kind. The man falling isn’t permitted to feel or hear himself hit bottom. He just keeps falling and falling.</span></p><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">J. D Salinger</span></p></blockquote><span data-dcnode-id="1157" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1152"><a data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-25-3.jpg"><img alt="" class="wp-image-55508" data-dcnode-id="1156" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-25-3-1024x576.jpg&amp;raw" srcset="https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-25-3-1024x576.jpg 1024w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-25-3-708x398.jpg 708w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-25-3-336x189.jpg 336w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-25-3-750x422.jpg 750w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-25-3-345x194.jpg 345w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-25-3.jpg 1200w" width="1024"></a><figcaption data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">(Bettmann / Contributor / Getty)</span></figcaption></figure><span data-dcnode-id="1151" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1146"><p data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">In every way that counted, I was dead. Inside somewhere maybe I was screaming and weeping and howling like an animal, but that was another person deep inside, another person who had no access to the lips and face and mouth and head, so on the surface I just shrugged and smile and kept moving.</span></p><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Neil Gaiman</span></p></blockquote><span data-dcnode-id="1145" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1140"><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Some people are just not meant to be in this world. It’s just too much for them.</span></p><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Phoebe Stone</span></p></blockquote><span data-dcnode-id="1139" instrument_node="">
</span><blockquote class="wp-block-quote is-style-default" data-dcnode-id="1134"><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">It is very hard to explain to people who have never known serious depression or anxiety the sheer continuous intensity of it. There is no off switch.</span></p><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Matt Haig</span></p></blockquote><span data-dcnode-id="1133" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1128"><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">I can’t eat and I can’t sleep. I’m not doing well in terms of being a functional human, you know?</span></p><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Ned Vizzini</span></p></blockquote><span data-dcnode-id="1127" instrument_node="">
</span><h2 data-dcnode-id="1125" id="h-depression-quotes-about-fighting-and-overcoming-it"><span data-dcnode-id="1126" instrument_node="">Depression quotes about fighting and overcoming it</span></h2><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Fighting depression is really demanding because you have to confront your own irrational thoughts. It can drain you of your energy, rob you of your motivation and leave you feeling hopeless. Once, your mind was your ally, but now it has become your enemy. How will you become functional again when your mind seems to be working against you?</span></p><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">The truth is there’s no universal recipe to recovering from depression. We are all unique, have different problems and experience emotions at different levels. However, there are small steps that we can take each day — little things that we can tell ourselves to slowly overcome our condition.</span></p><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1117" instrument_node="">We </span><a class="thirstylink" data-dcnode-id="1115" data-linkid="25937" data-shortcode="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/2020/02/27/hope-quotes/" rel="nofollow" title="Hope Quotes"><span data-dcnode-id="1116" instrument_node="">hope</span></a><span data-dcnode-id="1114" instrument_node=""> that the following depression quotes on fighting and overcoming it will inspire you and make you feel better, even if just for a moment.</span></p><span data-dcnode-id="1112" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1107"><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">I can do this… I can start over. I can save my own life and I’m never going to be alone as long as I have stars to wish on and people to still love.</span></p><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Jennifer Elisabeth</span></p></blockquote><span data-dcnode-id="1106" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1101"><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Start by doing what’s necessary; then do what’s possible; and suddenly you are doing the impossible.</span></p><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">St. Francis of Assisi</span></p></blockquote><span data-dcnode-id="1100" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1095"><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">A positive attitude gives you power over your circumstances instead of your circumstances having power over you.</span></p><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Joyce Meyer</span></p></blockquote><span data-dcnode-id="1094" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1089"><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">You must think that something is happening with you, that life has not forgotten you, that it holds you in its hand; it will not let you fall.</span></p><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Rainer Maria Rilke</span></p></blockquote><span data-dcnode-id="1088" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1083"><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">When you are depressed, you need the love of other people, and yet depression fosters actions that destroy that love. Depressed people often stick pins into their own life rafts. The conscious mind can intervene. One is not helpless.</span></p><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Andrew Solomon</span></p></blockquote><span data-dcnode-id="1082" instrument_node="">

</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1045"><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">You have been criticizing yourself for years, and it hasn’t worked. Try approving of yourself and see what happens.</span></p><p data-dcnode-id="1046"><a data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/2018/02/12/17-louise-hay-quotes/"><span data-dcnode-id="1048" instrument_node="">Louise L. Hay</span></a></p></blockquote><span data-dcnode-id="1044" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1039"><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">When one door closes, another opens. But we often look so regretfully upon the closed door that we don’t see the one that has opened for us.</span></p><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Alexander Graham Bell</span></p></blockquote><span data-dcnode-id="1038" instrument_node="">

</span><figure class="wp-block-image size-large" data-dcnode-id="1015"><a data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-17-2.jpg"><img alt="depression quotes" class="wp-image-55483" data-dcnode-id="1019" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-17-2-1024x576.jpg&amp;raw" srcset="https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-17-2-1024x576.jpg 1024w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-17-2-708x398.jpg 708w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-17-2-336x189.jpg 336w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-17-2-750x422.jpg 750w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-17-2-345x194.jpg 345w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-17-2.jpg 1200w" width="1024"></a><figcaption data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">(Hulton Deutsch / Contributor / Getty)</span></figcaption></figure><span data-dcnode-id="1014" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1009"><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">If you could only sense how important you are to the lives of those you meet; how important you can be to the people you may never even dream of. There is something of yourself that you leave at every meeting with another person.</span></p><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Fred Rogers</span></p></blockquote><span data-dcnode-id="1008" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="1003"><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">One of the most healing things you can do is recognize where in your life you are your own poison.</span></p><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Steve Maraboli</span></p></blockquote><span data-dcnode-id="1002" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="997"><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Only you can make yourself strong. Nobody else can do it for you.</span></p><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Kim Pape</span></p></blockquote><span data-dcnode-id="996" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="991"><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Man is fond of counting his troubles, but he does not count his joys. If he counted them up as he ought to, he would see that every lot has enough happiness provided for it.</span></p><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Fyodor Dostoevsky</span></p></blockquote><span data-dcnode-id="990" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="984"><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Although the world is full of suffering, it is also full of the overcoming of it.</span></p><p data-dcnode-id="985"><a data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/2019/01/31/helen-keller-quotes/"><span data-dcnode-id="987" instrument_node="">Helen Keller</span></a></p></blockquote><span data-dcnode-id="983" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="978"><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Once you replace negative thoughts with positive ones, you will start having positive results.</span></p><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Willie Nelson</span></p></blockquote><span data-dcnode-id="977" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="972"><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">What the caterpillar calls the end of the world, the master calls a butterfly.</span></p><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Richard Bach</span></p></blockquote><span data-dcnode-id="971" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="968"><a data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.goalcast.com/2018/06/08/20-depression-quotes/02_richard_bach_quotes_what_the_caterpillar/" rel="attachment wp-att-9311"><img alt="Richard-bach-quote-perspective-what-caterpillar-calls-end-world" class="wp-image-9311" data-dcnode-id="970" height="538" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.goalcast.com/wp-content/uploads/2018/06/02_Richard_Bach_Quotes_What_the_caterpillar-1024x538.jpg&amp;raw" srcset="https://www.goalcast.com/wp-content/uploads/2018/06/02_Richard_Bach_Quotes_What_the_caterpillar-1024x538.jpg 1024w, https://www.goalcast.com/wp-content/uploads/2018/06/02_Richard_Bach_Quotes_What_the_caterpillar-336x176.jpg 336w, https://www.goalcast.com/wp-content/uploads/2018/06/02_Richard_Bach_Quotes_What_the_caterpillar.jpg 1200w" width="1024"></a></figure><span data-dcnode-id="967" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="962"><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">It has been my philosophy of life that difficulties vanish when faced boldly.</span></p><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Isaac Asimov</span></p></blockquote><span data-dcnode-id="961" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="955"><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">If you have been brutally broken but still have the courage to be gentle to other living beings, then you’re a badass with a heart of an angel.</span></p><p data-dcnode-id="956"><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/2019/01/02/keanu-reeves-quotes/"><span data-dcnode-id="958" instrument_node="">Keanu Reeves</span></a></p></blockquote><span data-dcnode-id="954" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="949"><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">In the midst of winter, I finally learned that there was in me an invincible summer.</span></p><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Albert Camus</span></p></blockquote><span data-dcnode-id="948" instrument_node="">

</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="937"><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">A section withered and became a scar on the part of your soul that survived.</span></p><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Katie McGarry</span></p></blockquote><span data-dcnode-id="936" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="931"><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">In times of great stress or adversity, it’s always best to keep busy, to plow your anger and your energy into something positive.</span></p><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Lee Iacocca</span></p></blockquote><span data-dcnode-id="930" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="925"><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Have patience with yourself. Do not lose courage in considering your own imperfections but instantly set about remedying them — every day begin the task anew.</span></p><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Saint Francis de Sales</span></p></blockquote><span data-dcnode-id="924" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="919"><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">I’m learning. I’m learning to make things nice for myself. I’m learning to save myself. I’m trying, as I always will.</span></p><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Charlotte Eriksson</span></p></blockquote><span data-dcnode-id="918" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="913"><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">When one door closes, another opens. But we often look so regretfully upon the closed door that we don’t see the one that has opened for us.</span></p><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Alexander Graham Bell</span></p></blockquote><span data-dcnode-id="912" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="907"><a data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-16-2.jpg"><img alt="depression quotes" class="wp-image-55480" data-dcnode-id="911" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-16-2-1024x576.jpg&amp;raw" srcset="https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-16-2-1024x576.jpg 1024w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-16-2-708x398.jpg 708w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-16-2-336x189.jpg 336w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-16-2-750x422.jpg 750w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-16-2-345x194.jpg 345w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-16-2.jpg 1200w" width="1024"></a><figcaption data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">(Historical / Contributor / Getty)</span></figcaption></figure><span data-dcnode-id="906" instrument_node="">
