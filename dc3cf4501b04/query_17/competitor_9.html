</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="895"><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Seek out that particular mental attribute which makes you feel most deeply and vitally alive, along with which comes the inner voice which says, ‘This is the real me,’ and when you have found that attitude, follow it.</span></p><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">William James</span></p></blockquote><span data-dcnode-id="894" instrument_node="">
</span><h2 data-dcnode-id="892" id="h-inspirational-depression-quotes"><span data-dcnode-id="893" instrument_node="">Inspirational depression quotes</span></h2><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Depression can feel overwhelming. You may feel sad, hopeless, unmotivated and start questioning if you will ever feel better. Sometimes, it can be helpful to draw on the wisdom of others to inspire a shift in perspectives and brighten up your mood. Battling depression can lead feelings of isolation and there is comfort in simply knowing someone else understands what you’re going through.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">A simple yet thought provoking sentence can give you insight into your own experience with depression and hopefully, if the message resonates deeply enough, it may as well serve as a great catalyst for your healing.&nbsp;</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">If you’re living with depression, take your time reading through these inspirational depression quotes to help you navigate your struggle, and let them remind you that you’re not alone.</span></p><span data-dcnode-id="882" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="877"><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">You’d have to have personally been trapped and felt flames to really understand a terror way beyond falling.</span></p><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">David Foster Wallace</span></p></blockquote><span data-dcnode-id="876" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="871"><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">If we are to strive as human beings to gain more wisdom, more kindness and more compassion, we must have the intention to grow as a lotus and open each petal one by one.</span></p><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Goldie Hawn</span></p></blockquote><span data-dcnode-id="870" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="862"><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-14-2.jpg"><img alt="depression quotes" class="wp-image-55474" data-dcnode-id="869" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-14-2-1024x576.jpg&amp;raw" srcset="https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-14-2-1024x576.jpg 1024w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-14-2-708x398.jpg 708w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-14-2-336x189.jpg 336w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-14-2-750x422.jpg 750w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-14-2-345x194.jpg 345w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-14-2.jpg 1200w" width="1024"></a><figcaption data-dcnode-id="863"><span data-dcnode-id="867" instrument_node="">(</span><a class="thirstylink" data-dcnode-id="865" data-linkid="25972" data-shortcode="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/2020/05/20/art-quotes/" title="Art Quotes"><span data-dcnode-id="866" instrument_node="">Art</span></a><span data-dcnode-id="864" instrument_node=""> Zelin / Contributor / Getty)</span></figcaption></figure><span data-dcnode-id="861" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="856"><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Even for me life had its gleams of sunshine.</span></p><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Charlotte Brontë</span></p></blockquote><span data-dcnode-id="855" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="850"><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">There is only one thing for it then — to learn. Learn why the world wags and what wags it. That is the only thing which the mind can never exhaust, never alienate, never be tortured by, never fear or distrust, and never dream of regretting. Learning is the only thing for you. Look what a lot of things there are to learn.</span></p><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">T.H. White</span></p></blockquote><span data-dcnode-id="849" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="844"><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Mental pain is less dramatic than physical pain, but it is more common and also more hard to bear. The frequent attempt to conceal mental pain increases the burden: it is easier to say My tooth is aching than to say My heart is broken.</span></p><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">C.S. Lewis</span></p></blockquote><span data-dcnode-id="843" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="838"><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Believe that life is worth living and your belief will help create the fact.</span></p><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">William James</span></p></blockquote><span data-dcnode-id="837" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="832"><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">There is no point treating a depressed person as though she were just feeling sad, saying, ‘There now, hang on, you’ll get over it.’ Sadness is more or less like a head cold- with patience, it passes.</span></p><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Barbara Kingsolver</span></p></blockquote><span data-dcnode-id="831" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="826"><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">There are two ways to live your life. One is as though nothing is a miracle. The other is as though everything is a miracle.</span></p><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Albert Einstein</span></p></blockquote><span data-dcnode-id="825" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="820"><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Losing your life is not the worst thing that can happen. The worst thing is to lose your reason for living.</span></p><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Jo Nesbo</span></p></blockquote><span data-dcnode-id="819" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="814"><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Find meaning or don’t find meaning but ‘steal’ some time and give it freely and exclusively to your own self. Opt for privacy and solitude. That doesn’t make you antisocial or cause you to reject the rest of the world. But you need to breathe. And you need to be.</span></p><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Albert Camus</span></p></blockquote><span data-dcnode-id="813" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="808"><a data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-15-2.jpg"><img alt="depression quotes" class="wp-image-55477" data-dcnode-id="812" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-15-2-1024x576.jpg&amp;raw" srcset="https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-15-2-1024x576.jpg 1024w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-15-2-708x398.jpg 708w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-15-2-336x189.jpg 336w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-15-2-750x422.jpg 750w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-15-2-345x194.jpg 345w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-15-2.jpg 1200w" width="1024"></a><figcaption data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">(INA / Contributor / Getty)</span></figcaption></figure><span data-dcnode-id="807" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="802"><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Those with a grateful mindset tend to see the message in the mess. And even though life may knock them down, the grateful find reasons, if even small ones, to get up.</span></p><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Steve Maraboli</span></p></blockquote><span data-dcnode-id="801" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="796"><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">In times of pain, when the future is too terrifying to contemplate and the past too painful to remember, I have learned to pay attention to right now. The precise moment I was in was always the only safe place for me.</span></p><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Julia Cameron</span></p></blockquote><span data-dcnode-id="795" instrument_node="">
</span><blockquote class="wp-block-quote td_pull_quote td_pull_center is-style-default" data-dcnode-id="790"><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Those who have a ‘why’ to live, can bear with almost any ‘how’.</span></p><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Viktor E. Frankl</span></p></blockquote><span data-dcnode-id="789" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="784"><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-23-2.jpg"><img alt="" class="wp-image-55502" data-dcnode-id="788" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-23-2-1024x576.jpg&amp;raw" srcset="https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-23-2-1024x576.jpg 1024w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-23-2-708x398.jpg 708w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-23-2-336x189.jpg 336w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-23-2-750x422.jpg 750w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-23-2-345x194.jpg 345w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-23-2.jpg 1200w" width="1024"></a><figcaption data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">(United Archives / Contributor / Getty)</span></figcaption></figure><span data-dcnode-id="783" instrument_node="">
</span><h2 data-dcnode-id="781" id="h-uplifting-quotes-for-when-you-re-feeling-down"><span data-dcnode-id="782" instrument_node="">Uplifting quotes for when you’re feeling down</span></h2><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">It’s time to move to happier and more positive thoughts! Since we have already enlisted quite a few sad depression quotes, we thought it would be a great idea to share with you some quotes that can instantly lift up your mood.</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">While we need other people’s insight to better understand what’s happening to us when we’ve been sad for too long, we also need some uplifting sayings. The following positive quotes about depression will help you see that all is not lost and that you are resilient enough to overcome your current mood. </span></p><span data-dcnode-id="774" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="769"><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">I learned there are troubles of more than one kind. Some come from ahead, others come from behind. But I’ve bought a big bat. I’m all ready, you see. Now my troubles are going to have trouble with me.</span></p><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Dr. Seuss</span></p></blockquote><span data-dcnode-id="768" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="763"><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-24-2.jpg"><img alt="depression quotes" class="wp-image-55505" data-dcnode-id="767" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-24-2-1024x576.jpg&amp;raw" srcset="https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-24-2-1024x576.jpg 1024w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-24-2-708x398.jpg 708w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-24-2-336x189.jpg 336w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-24-2-750x422.jpg 750w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-24-2-345x194.jpg 345w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-24-2.jpg 1200w" width="1024"></a><figcaption data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">(Dr. Seuss / Getty)</span></figcaption></figure><span data-dcnode-id="762" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="757"><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">You say you’re ‘depressed’ – all i see is resilience. You are allowed to feel messed up and inside out. It doesn’t mean you’re defective – it just means you’re human.&nbsp;</span></p><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">David Mitchell</span></p></blockquote><span data-dcnode-id="756" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="751"><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Good humor is a tonic for mind and body. It is the best antidote for anxiety and depression. It is a business asset. It attracts and keeps friends. It lightens human burdens. It is the direct route to serenity and contentment.</span></p><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Greenville Kleisser</span></p></blockquote><span data-dcnode-id="750" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="745"><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">There is some good in this world, and it’s worth fighting for. </span></p><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">J.R.R. Tolkien</span></p></blockquote><span data-dcnode-id="744" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="739"><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-13-2.jpg"><img alt="depression quotes" class="wp-image-55471" data-dcnode-id="743" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-13-2-1024x576.jpg&amp;raw" srcset="https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-13-2-1024x576.jpg 1024w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-13-2-708x398.jpg 708w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-13-2-336x189.jpg 336w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-13-2-750x422.jpg 750w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-13-2-345x194.jpg 345w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-13-2.jpg 1200w" width="1024"></a><figcaption data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">(Haywood Magee / Stringer / Getty)</span></figcaption></figure><span data-dcnode-id="738" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="733"><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Even if happiness forgets you a little bit, never completely forget about it.</span></p><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Jacques Prevert</span></p></blockquote><span data-dcnode-id="732" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="727"><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">The pupil dilates in darkness and in the end finds light, just as the soul dilates in misfortune and in the end finds God.&nbsp;</span></p><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Victor Hugo</span></p></blockquote><span data-dcnode-id="726" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="721"><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">I will be stronger than my sadness.&nbsp;</span></p><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Jasmine Warga</span></p></blockquote><span data-dcnode-id="720" instrument_node="">
</span><h2 data-dcnode-id="718" id="h-depression-quotes-about-strength-and-hope"><span data-dcnode-id="719" instrument_node="">Depression quotes about strength and hope</span></h2><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Living with depression can make you feel like you’ve been stripped of your own power and of any sense of hope for the future. Hopelessness is a heavy emotion and a key element of depression that can keep you feeling stuck in a downward spiral that seems impossible to overcome but the truth is, change is possible even when you’re feeling defeated.</span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">There are actionable steps you can take to break free of depression, and the first thing is to acknowledge how you’re feeling. If you or someone you know is struggling to see the light at the end of the tunnel, these powerful depression quotes will remind you of how resilient you are and hopefully inspire a change in perspective, towards a more positive outlook.</span></p><span data-dcnode-id="711" instrument_node="">
</span><blockquote class="wp-block-quote is-style-default" data-dcnode-id="706"><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">I hope to one day see a sea of people all wearing silver ribbons as a sign that they understand the secret battle, and as a celebration of the victories made each day as we individually pull ourselves up out of our foxholes to see our scars heal, and to remember what the sun looks like.</span></p><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Jenny Lawson</span></p></blockquote><span data-dcnode-id="705" instrument_node="">
</span><blockquote class="wp-block-quote is-style-default" data-dcnode-id="700"><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Strength doesn’t come from what you can do. It comes from overcoming the things you once thought you couldn’t.</span></p><cite data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Rikki Rogers</span></cite></blockquote><span data-dcnode-id="699" instrument_node="">
</span><blockquote class="wp-block-quote is-style-default" data-dcnode-id="694"><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Once you choose hope, anything is possible.</span></p><cite data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Christopher Reeve</span></cite></blockquote><span data-dcnode-id="693" instrument_node="">
</span><blockquote class="wp-block-quote is-style-default" data-dcnode-id="688"><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">You may have to fight a battle more than once to win it.</span></p><cite data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Margaret Thatcher</span></cite></blockquote><span data-dcnode-id="687" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="682"><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-12-2.jpg"><img alt="depression quotes" class="wp-image-55468" data-dcnode-id="686" height="576" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-12-2-1024x576.jpg&amp;raw" srcset="https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-12-2-1024x576.jpg 1024w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-12-2-708x398.jpg 708w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-12-2-336x189.jpg 336w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-12-2-750x422.jpg 750w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-12-2-345x194.jpg 345w, https://www.goalcast.com/wp-content/uploads/2022/02/Untitled-design-12-2.jpg 1200w" width="1024"></a><figcaption data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">(Richard Baker / Contributor / Getty)</span></figcaption></figure><span data-dcnode-id="681" instrument_node="">
</span><blockquote class="wp-block-quote is-style-default" data-dcnode-id="676"><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Hope is important because it can make the present moment less difficult to bear. If we believe that tomorrow will be better, we can bear a hardship today.</span></p><cite data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Thich Nhat Hanh</span></cite></blockquote><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="672"><em data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Editor’s Note: Struggling and feeling hopeless? You are not alone. Please call the National Suicide Prevention Lifeline at 1-800-273-TALK (8255).</span></em></p><span data-dcnode-id="671" instrument_node=""> </span></div><span data-dcnode-id="669" instrument_node="">
