</span><p data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">If you’ve been feeling down lately, you may be in need of some self-care.</span></p><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1732"><span data-dcnode-id="1736" instrument_node="">What is self-care? I define self-care as any healthy, </span><a data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/self-care-activities-that-help-me-cope-with-bad-days/"><span data-dcnode-id="1735" instrument_node="">loving activity</span></a><span data-dcnode-id="1733" instrument_node=""> offered to yourself in order to allow your body and mind to reset and recharge. </span></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">This article is a collection of 32 self care strategies that you can use whenever you feel down.</span></p><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">In addition to helping you cheer up and fixing your low mood these self care strategies will allow you to connect with your feelings and recharge your energy for a greater sense of acceptance and peace. </span></p><span data-dcnode-id="1725" instrument_node="">

</span><h3 data-dcnode-id="1578"><span class="ez-toc-section" data-dcnode-id="1581" id="1_Take_a_walk_in_nature"></span><span data-dcnode-id="1580" instrument_node="">1. Take a walk in nature</span><span class="ez-toc-section-end" data-dcnode-id="1579"></span></h3><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1575"><img alt="Nature daisy flowers" class="aligncenter size-full wp-image-19720" data-dcnode-id="1576" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/wp-content/uploads/nature-daisy-flowers-1.png&amp;raw" width="434"></p><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">To me, nature is an instant mood booster. Even if you can’t head to the nearest hiking trail, taking a walk around the neighborhood works fine, as well. </span></p><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Breathe in the fresh air and feel the earth under your feet, forever supporting your every step. Sitting near a body of water or watching the sunrise or sunset can also be really uplifting. </span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Take this time to be at ease and relax into your feelings (more on this in the next step). </span></p><span data-dcnode-id="1565" instrument_node="">
</span><h3 data-dcnode-id="1561"><span class="ez-toc-section" data-dcnode-id="1564" id="2_Sit_with_your_feelings"></span><span data-dcnode-id="1563" instrument_node="">2. Sit with your feelings</span><span class="ez-toc-section-end" data-dcnode-id="1562"></span></h3><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">This is the easiest, yet also the hardest coping strategy. All you have to do is sit there and remove yourself from all distractions. </span></p><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1556" instrument_node="">You’re basically </span><a data-dcnode-id="1554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/understanding-meditation/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1555" instrument_node="">meditating</span></a><span data-dcnode-id="1553" instrument_node=""> – but it can be counterproductive to call it that, because when you’re “trying” to meditate “right”, you can produce a mental distraction from what’s present.</span></p><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1550" instrument_node="">So, just </span><a data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/inner-body-meditation/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1549" instrument_node="">sit there and feel</span></a><span data-dcnode-id="1547" instrument_node=""> the energy in your body. You don’t have to try to do this. </span><strong data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Whatever you allow yourself to feel, you allow yourself to release.</span></strong><span data-dcnode-id="1544" instrument_node=""> </span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1540"><img alt="Feel to release emotions" class="aligncenter size-full wp-image-13621" data-dcnode-id="1541" height="271" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/wp-content/uploads/feel-to-release-emotions.png&amp;raw" width="614"></p><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Additionally, when you sit with your feelings, you learn not to fear them.</span></p><span data-dcnode-id="1536" instrument_node="">
</span><h3 data-dcnode-id="1532"><span class="ez-toc-section" data-dcnode-id="1535" id="3_Practice_yin_yoga"></span><span data-dcnode-id="1534" instrument_node="">3. Practice yin yoga</span><span class="ez-toc-section-end" data-dcnode-id="1533"></span></h3><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Yin is a slower, gentler style of yoga which has you hold a stretch for several minutes at a time. This is my favorite style of yoga, due to its powerful relaxation effects. Some feel a natural “high” after practicing yin. </span></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">It’s perfect for tuning into your breath and sitting with your feelings, as well as releasing tension and energy stuck in the body.</span></p><span data-dcnode-id="1525" instrument_node="">

ode-id="1028" href="#ytp-id-7"><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="1029" id="ytp-id-7"></path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="1027" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="1022"><use class="ytp-svg-shadow" data-dcnode-id="1024" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1025" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1023" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="1018"><use class="ytp-svg-shadow" data-dcnode-id="1020" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1021" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1019" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=RQyX48NtDrQ" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></center><span data-dcnode-id="999" instrument_node=""> </span><p data-dcnode-id="998"></p><span data-dcnode-id="997" instrument_node="">
</span><h3 data-dcnode-id="993"><span class="ez-toc-section" data-dcnode-id="996" id="4_Watch_these_YouTubers"></span><span data-dcnode-id="995" instrument_node="">4. Watch these YouTubers</span><span class="ez-toc-section-end" data-dcnode-id="994"></span></h3><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">These people are not only YouTubers; they’re motivational speakers, teachers, and healers. Depending on your beliefs, you may prefer some of them more than others, so take what works for you and leave what doesn’t. </span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="988" instrument_node="">If you’re down, though, you might benefit from their inspiring messages. Give </span><a data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/user/JulieMuse" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="987" instrument_node="">Matt Kahn</span></a><span data-dcnode-id="985" instrument_node="">, </span><a data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/user/Kemetprince1/videos"><span data-dcnode-id="984" instrument_node="">Ralph Smart</span></a><span data-dcnode-id="982" instrument_node="">, or </span><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/user/kylecease" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="981" instrument_node="">Kyle Cease</span></a><span data-dcnode-id="979" instrument_node=""> a shot.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Here’s one of my all time favorite video to watch whenever I am feeling down:</span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="973"></p><center data-dcnode-id="936"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="937" frameborder="0" height="315" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/05_XbO1VFPM&amp;raw" width="560"><html data-cast-api-enabled="true" data-dcnode-id="939" dir="ltr" lang="en"><head data-dcnode-id="948"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="969" name="viewport"/><link data-dcnode-id="964" href="https://www.youtube.com/s/player/534c466c/www-player.css" name="www-player" nonce="UCy+wjFKEsSREMl3jcj1SQ" rel="stylesheet"/><title data-dcnode-id="951">YouTube</title><link data-dcnode-id="950" href="https://www.youtube.com/watch?v=05_XbO1VFPM" rel="canonical"/><link data-dcnode-id="949" data-loaded="true" href="https://www.youtube.com/s/player/534c466c/www-player.css" id="css-335067421" nonce="+OMMAHfe05J0UMvfg+4gmA" rel="stylesheet"/></meta></head><body class="date-20220424 en_US ltr site-center-aligned site-as-giant-card webkit webkit-534" data-dcnode-id="940" dir="ltr"><div data-dcnode-id="947" id="player" style="width: 100%; height: 100%;"></div><noscript data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=05_XbO1VFPM" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></center><p data-dcnode-id="935"></p><span data-dcnode-id="934" instrument_node="">
</span><h3 data-dcnode-id="930"><span class="ez-toc-section" data-dcnode-id="933" id="5_Journal_whats_on_your_mind"></span><span data-dcnode-id="932" instrument_node="">5. Journal what’s on your mind</span><span class="ez-toc-section-end" data-dcnode-id="931"></span></h3><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Even if you don’t own a journal, get out a piece of paper or open a Word document, and just start writing. Write about anything and everything without filtering yourself. No one’s going to read it. Just get it all down. When you are done, you will feel a lot more relaxed. </span></p><span data-dcnode-id="926" instrument_node="">
</span><h3 data-dcnode-id="922"><span class="ez-toc-section" data-dcnode-id="925" id="6_Make_a_gratitude_list"></span><span data-dcnode-id="924" instrument_node="">6. Make a gratitude list</span><span class="ez-toc-section-end" data-dcnode-id="923"></span></h3><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><img alt="Showing gratitude" class="aligncenter size-full wp-image-19731" data-dcnode-id="920" height="334" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/wp-content/uploads/showing-gratitude.png&amp;raw" width="257"></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">This one might sound cheesy or cliche, but like anything else on this list, you just have to try it for yourself. At the least, it’ll begin to get the happy chemicals flowing, and shift you a notch towards a mindset of abundance, as opposed to scarcity.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Try writing down everything that’s going right in your life, even if it’s the smallest thing like the breakfast you ate. </span></p><span data-dcnode-id="912" instrument_node="">
</span><h3 data-dcnode-id="908"><span class="ez-toc-section" data-dcnode-id="911" id="7_Write_a_love_letter_to_yourself"></span><span data-dcnode-id="910" instrument_node="">7. Write a love letter to yourself</span><span class="ez-toc-section-end" data-dcnode-id="909"></span></h3><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><img alt="Love letter to self" class="aligncenter size-full wp-image-19749" data-dcnode-id="906" height="327" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/wp-content/uploads/love-letter-to-self.jpg&amp;raw" width="401"></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Seriously. It sounds ridiculous and maybe even cringey to make yourself do this, but it could work wonders for you. This of course works especially for those who struggle with insecurity and low self-esteem.</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">There’s no rules or guidelines for doing this, but it helps to offer yourself compassion for whatever you’re feeling presently.</span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="897" instrument_node="">Try to say whatever you’d say to your own child. </span><strong data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">For example:</span></strong><span data-dcnode-id="894" instrument_node=""> </span><em data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">“Sweetheart, I understand. It’s okay. I’m here for you whenever you’re feeling sad.”</span></em><span data-dcnode-id="891" instrument_node=""> </span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">It’ll feel especially strange if you’re not used to or comfortable with hearing these statements from others, but that’s a good sign that you can benefit from this exercise. </span></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Remember, you always need more love, not less. </span></p><span data-dcnode-id="883" instrument_node="">
</span><h3 data-dcnode-id="879"><span class="ez-toc-section" data-dcnode-id="882" id="8_Talk_to_someone"></span><span data-dcnode-id="881" instrument_node="">8. Talk to someone</span><span class="ez-toc-section-end" data-dcnode-id="880"></span></h3><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Yes, this one sounds particularly obvious, maybe so obvious that we tend to overlook it. We tell ourselves to be strong. We remind ourselves that everyone else has problems, too. We are terrified of burdening anyone. </span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">I don’t know about you, but I’d much rather listen to a loved one’s problems for hours, than unknowingly have them suffer silently in pain. So, tell someone whom you trust how you’re feeling. It may be scary, but you’ll surely feel better once you realize how supported you are, and once you don’t have to pretend to be “fine” around them. </span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Our greatest pain often comes from hiding how we really feel.</span></p><span data-dcnode-id="869" instrument_node="">
</span><h3 data-dcnode-id="865"><span class="ez-toc-section" data-dcnode-id="868" id="9_Sing_and_Dance"></span><span data-dcnode-id="867" instrument_node="">9. Sing and Dance</span><span class="ez-toc-section-end" data-dcnode-id="866"></span></h3><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">When you were a kid you sang and danced around not because you were the next big thing, but because it made you happy. As adults we sometimes forget how much fun such a simple thing can be. </span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="860" instrument_node="">Whenever you are feeling down, put on some </span><a data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/wake-up-songs/"><span data-dcnode-id="859" instrument_node="">favorite tunes</span></a><span data-dcnode-id="857" instrument_node=""> and sing and dance around till your heart’s content. This works best for most people if you can find some private space to really let go without feeling self conscious. </span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="851"><strong data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Here’s a tip:</span></strong><span data-dcnode-id="852" instrument_node=""> closing your eyes while dancing can be really helpful. You feel the music more and allow it to permeate your being, making your body move naturally to the rhythm.</span></p><span data-dcnode-id="850" instrument_node="">
</span><h3 data-dcnode-id="846"><span class="ez-toc-section" data-dcnode-id="849" id="10_Watch_a_Favorite_Movie"></span><span data-dcnode-id="848" instrument_node="">10. Watch a Favorite Movie</span><span class="ez-toc-section-end" data-dcnode-id="847"></span></h3><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><img alt="Popcorn" class="aligncenter size-full wp-image-19730" data-dcnode-id="844" height="328" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/wp-content/uploads/popcorn.png&amp;raw" width="219"></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Sometimes just tuning out of the world and losing yourself in another can be all you need to snap out of the doldrums.&nbsp;Pop in a favorite movie (or show) and then sit back and enjoy. </span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">If your favorite movie is a serious drama, you might want to pick a more lighthearted variety to watch. Watch something that has a happy ending. Alternatively a good book can also do wonders for improving your mood.</span></p><span data-dcnode-id="836" instrument_node="">
</span><h3 data-dcnode-id="832"><span class="ez-toc-section" data-dcnode-id="835" id="11_Engage_in_a_Hobby"></span><span data-dcnode-id="834" instrument_node="">11. Engage in a Hobby</span><span class="ez-toc-section-end" data-dcnode-id="833"></span></h3><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Hobbies are something you choose to do because you enjoy them. This makes them great mood enhancers when you’re feeling less than chipper. If you can think of a way to share your hobby with others, that can improve your outlook even more. </span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Maybe your hobby is baking. Share your baked goods with friends or neighbors to bring a smile to their face as well as yours. It will make the euphoric feelings last longer.</span></p><span data-dcnode-id="825" instrument_node="">
</span><h3 data-dcnode-id="821"><span class="ez-toc-section" data-dcnode-id="824" id="12_Exercise"></span><span data-dcnode-id="823" instrument_node="">12. Exercise</span><span class="ez-toc-section-end" data-dcnode-id="822"></span></h3><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="819" instrument_node="">Many people approach exercise like a chore no one wants to do but they know they should. While it can be difficult to get going, you always feel better after a good workout, because, to quote Legally Blonde, </span><em data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">“Exercise gives you endorphins. Endorphins make you happy.”</span></em><span data-dcnode-id="816" instrument_node=""> </span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="813" instrument_node="">Your choice of exercise could be anything from a brisk walk around the block, lifting weights, hula hooping or even just playing with your kids at the park. Here are </span><a data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/23-fun-ways-to-exercise-for-relaxation/"><span data-dcnode-id="812" instrument_node="">23 fun ways you can exercise</span></a><span data-dcnode-id="810" instrument_node="">.</span></p><span data-dcnode-id="808" instrument_node="">
</span><h3 data-dcnode-id="804"><span class="ez-toc-section" data-dcnode-id="807" id="13_CleanOrganizeDeclutter"></span><span data-dcnode-id="806" instrument_node="">13. Clean/Organize/Declutter</span><span class="ez-toc-section-end" data-dcnode-id="805"></span></h3><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><img alt="Clothes bin" class="aligncenter size-full wp-image-19757" data-dcnode-id="802" height="273" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/wp-content/uploads/clothes-bin.jpg&amp;raw" width="350"></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Most of us have piles that we keep meaning to go through or places we really need to clean but never do. While cleaning is probably the last thing on your mind when you’re down, it can make you feel better. </span></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Often our unhappiness is exacerbated by the clutter and mess in our homes. It makes life feel more suffocating and uncontrollable, but when you clean out some of that clutter you regain a feeling of control, which can really cheer you up.</span></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">I also have noticed it’s a lot easier to stay happier since I started keeping my room clean and decorating it, it’s just a more cheerful place now.</span></p><span data-dcnode-id="791" instrument_node="">
</span><h3 data-dcnode-id="787"><span class="ez-toc-section" data-dcnode-id="790" id="14_Make_a_happiness_jar"></span><span data-dcnode-id="789" instrument_node="">14. Make a happiness jar</span><span class="ez-toc-section-end" data-dcnode-id="788"></span></h3><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><img alt="Happiness jar" class="aligncenter size-full wp-image-19747" data-dcnode-id="785" height="372" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/wp-content/uploads/happiness-jar.jpg&amp;raw" width="232"></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Write down all the good things that have ever happened to you in bits of paper, fold them up and put them in a jar. You can also add jokes that you find funny, funny moments in your life, favorite things to do, the best things about you, the things you look forward to, things you enjoy doing, etc. This is your happiness jar.</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">While writing these in itself can be therapeutic, you can always go to the jar and read out of it whenever you need an instant boost of positive energy.</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">If not a jar, you can also do the same with a self care journal.</span></p><span data-dcnode-id="774" instrument_node="">
</span><h3 data-dcnode-id="770"><span class="ez-toc-section" data-dcnode-id="773" id="15_DrawPaint"></span><span data-dcnode-id="772" instrument_node="">15. Draw/Paint</span><span class="ez-toc-section-end" data-dcnode-id="771"></span></h3><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><img alt="Painter" class="aligncenter size-full wp-image-19728" data-dcnode-id="768" height="351" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/wp-content/uploads/painter.png&amp;raw" width="268"></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">It doesn’t matter if you are good at it or not. There is nothing that is more uplifting than letting your creativity flow on a piece of canvas. </span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">You can also consider using a coloring book or even try coloring on your phone or tablet using a coloring app.</span></p><span data-dcnode-id="760" instrument_node="">
</span><h3 data-dcnode-id="756"><span class="ez-toc-section" data-dcnode-id="759" id="16_Listen_to_music_that_triggers_happy_memories"></span><span data-dcnode-id="758" instrument_node="">16. Listen to music that triggers happy memories</span><span class="ez-toc-section-end" data-dcnode-id="757"></span></h3><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><img alt="headphones" class="aligncenter size-full wp-image-19724" data-dcnode-id="754" height="342" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/wp-content/uploads/headphones-3.png&amp;raw" width="221"></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Music has the power to triggers old memories. Make a playlist of all the songs that are associated with happy events in your life. Listening to these songs will instantly change your focus and transport you back in time and space to a happy place. </span></p><span data-dcnode-id="749" instrument_node="">
</span><h3 data-dcnode-id="745"><span class="ez-toc-section" data-dcnode-id="748" id="17_Cheer_someone_else_up"></span><span data-dcnode-id="747" instrument_node="">17. Cheer someone else up</span><span class="ez-toc-section-end" data-dcnode-id="746"></span></h3><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">One of the easiest way to forget your blues is to do something nice for someone else. Making someone else happy be it your friend, a family member or sometimes even a complete stranger can give you that uplifting feeling and help you cheer up. </span></p><span data-dcnode-id="741" instrument_node="">
</span><h3 data-dcnode-id="737"><span class="ez-toc-section" data-dcnode-id="740" id="18_Read_old_journal_entries"></span><span data-dcnode-id="739" instrument_node="">18. Read old journal entries</span><span class="ez-toc-section-end" data-dcnode-id="738"></span></h3><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734"><img alt="Person reading" class="aligncenter size-full wp-image-19729" data-dcnode-id="735" height="319" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/wp-content/uploads/person-reading.png&amp;raw" width="246"></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Just like listening to music, reading old journal entries will help transport you to happy thoughts of the past. You can make this even more powerful by reading an entry and listening to music associated with that entry. </span></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">If you don’t have a journal, looking at past pictures/images associated with happy events can help too.</span></p><span data-dcnode-id="727" instrument_node="">
</span><h3 data-dcnode-id="723"><span class="ez-toc-section" data-dcnode-id="726" id="19_Look_at_the_stars"></span><span data-dcnode-id="725" instrument_node="">19. Look at the stars</span><span class="ez-toc-section-end" data-dcnode-id="724"></span></h3><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><img alt="Night sky" class="aligncenter size-full wp-image-19726" data-dcnode-id="721" height="328" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/wp-content/uploads/night-sky-1.png&amp;raw" width="656"></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Looking at the night star is relaxing as it gives you a different perspective of things. You feel comfortable knowing that how infinitely big the universe is in comparison to our problems and that certainly helps put things into perspective. </span></p><span data-dcnode-id="716" instrument_node="">
</span><h3 data-dcnode-id="712"><span class="ez-toc-section" data-dcnode-id="715" id="20_Go_for_an_aimless_drive"></span><span data-dcnode-id="714" instrument_node="">20. Go for an aimless drive</span><span class="ez-toc-section-end" data-dcnode-id="713"></span></h3><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709"><img alt="Open road" class="aligncenter size-full wp-image-19727" data-dcnode-id="710" height="184" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/wp-content/uploads/open-road.png&amp;raw" width="503"></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Hop in your car and go for a long aimless drive preferably to a location with less traffic and lots of greenery. Listen to music or an uplifting podcast while looking out at the scenery can be very therapeutic.</span></p><span data-dcnode-id="705" instrument_node="">
</span><h3 data-dcnode-id="701"><span class="ez-toc-section" data-dcnode-id="704" id="21_Do_Legs-up-the-wall_yoga_Viparita_Karani"></span><span data-dcnode-id="703" instrument_node="">21. Do Legs-up-the-wall yoga (Viparita Karani)</span><span class="ez-toc-section-end" data-dcnode-id="702"></span></h3><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">We discussed yin yoga earlier but if you are looking for something simpler do the ‘Legs up the wall’ yoga instead. </span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">This yoga pose is deeply restorative and will elevate your mood. Simply lie down on the floor while propping your legs up against the wall for 10 to 15 minutes. You can do this multiple times a day or whenever you want to relax.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Here’s a good video that explains how to do the pose:</span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="690"></p><center data-dcnode-id="688"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="689" frameborder="0" height="315" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/_OQEIiZLY-0&amp;raw" width="560"></iframe></center><p data-dcnode-id="687"></p><span data-dcnode-id="686" instrument_node="">
</span><h3 data-dcnode-id="682"><span class="ez-toc-section" data-dcnode-id="685" id="22_Read_a_good_book"></span><span data-dcnode-id="684" instrument_node="">22. Read a good book</span><span class="ez-toc-section-end" data-dcnode-id="683"></span></h3><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="679"><img alt="Books shelf" class="aligncenter size-full wp-image-19721" data-dcnode-id="680" height="198" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/wp-content/uploads/books-shelf.jpg&amp;raw" width="501"></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Just like watching a movie, reading a good book can help you tune out of your world and enter another. </span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">A good option is to go to a nearby library. The calm setting of a library will help relax and you just might discover an amazing book that will change your entire perspective of life.</span></p><span data-dcnode-id="672" instrument_node="">
</span><h3 data-dcnode-id="668"><span class="ez-toc-section" data-dcnode-id="671" id="23_Spend_time_with_a_pet"></span><span data-dcnode-id="670" instrument_node="">23. Spend time with a pet</span><span class="ez-toc-section-end" data-dcnode-id="669"></span></h3><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><img alt="Walking a dog" class="aligncenter size-full wp-image-19733" data-dcnode-id="666" height="340" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/wp-content/uploads/walking-a-dog.png&amp;raw" width="426"></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">There is nothing that is more relaxing and uplifting than being around animals – rabbits, cats, dogs, they are all good. If you don’t own a pet yourself, consider borrowing your friend or neighbor’s pet for a few hours. </span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Another option is to volunteer at a local shelter or visit a pet store to look at and play with some of the animals.</span></p><span data-dcnode-id="658" instrument_node="">
</span><h3 data-dcnode-id="654"><span class="ez-toc-section" data-dcnode-id="657" id="24_Plant_something"></span><span data-dcnode-id="656" instrument_node="">24. Plant something</span><span class="ez-toc-section-end" data-dcnode-id="655"></span></h3><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="651"><img alt="Garden sprout" class="aligncenter size-full wp-image-19753" data-dcnode-id="652" height="250" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/wp-content/uploads/garden-sprout.jpg&amp;raw" width="482"></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Working in a garden can be highly therapeutic. Plus, anyone can garden, you don’t need to be an expert to get started.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Clean your backyard, plant a new tree/plant, dig the ground, trim the bushes and rake the leaves while bathing in the sunlight, feeling the breeze and listening to the birds chirping. A few hours spent gardening is sure to life your spirits.</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Houseplants and container gardening are good options too.</span></p><span data-dcnode-id="641" instrument_node="">
</span><h3 data-dcnode-id="637"><span class="ez-toc-section" data-dcnode-id="640" id="25_Drink_chamomile_tea"></span><span data-dcnode-id="639" instrument_node="">25. Drink chamomile tea</span><span class="ez-toc-section-end" data-dcnode-id="638"></span></h3><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><img alt="Hot relaxing tea" class="aligncenter size-full wp-image-19756" data-dcnode-id="635" height="371" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/wp-content/uploads/hot-tea-1.jpg&amp;raw" width="320"></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">There’s a wide variety of teas out there that have healing and relaxation properties. One of the most popular is Chamomile tea. Some other options include rose, peppermint, kava, lavender and green tea. </span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">The entire process starting from boiling water to making and consuming your tea can be very relaxing and help take your mind off things.</span></p><span data-dcnode-id="627" instrument_node="">
</span><h3 data-dcnode-id="623"><span class="ez-toc-section" data-dcnode-id="626" id="26_Deep_conscious_breathing"></span><span data-dcnode-id="625" instrument_node="">26. Deep conscious breathing</span><span class="ez-toc-section-end" data-dcnode-id="624"></span></h3><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Taking a few minutes to connect with your body through deep breathing can be very therapeutic. </span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">All you need to do is close your eyes and become conscious of your breathing. Take a slow deep breath while feeling the cool air enter your lungs through your nostrils. Hold your breath for a few seconds feeling grateful for this life energy. Be conscious as you exhale and repeat for a few times or as many times as you want.</span></p><span data-dcnode-id="616" instrument_node="">
</span><h3 data-dcnode-id="612"><span class="ez-toc-section" data-dcnode-id="615" id="27_Take_a_long_mindful_showerbath"></span><span data-dcnode-id="614" instrument_node="">27. Take a long mindful shower/bath</span><span class="ez-toc-section-end" data-dcnode-id="613"></span></h3><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><img alt="shower" class="aligncenter size-full wp-image-19758" data-dcnode-id="610" height="263" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/wp-content/uploads/shower.png&amp;raw" width="222"></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Water has the power to cleanse not only your body but also your energy. As you take a warm shower (or a hot bath) consciously feel the water against your skin. Feel it cleanse away all negative energy and stress. A few minutes of mindful shower will restore and rejuvenate you.</span></p><span data-dcnode-id="605" instrument_node="">
</span><h3 data-dcnode-id="601"><span class="ez-toc-section" data-dcnode-id="604" id="28_Listen_to_guided_meditation"></span><span data-dcnode-id="603" instrument_node="">28. Listen to guided meditation</span><span class="ez-toc-section-end" data-dcnode-id="602"></span></h3><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">A guided meditation is where an expert meditator guides you through the process of meditation. This way you don’t need to second guess anything. Just listen to the voice and let yourself relax. At the end of a session, you will feel like a new person so definitely give it a try.</span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">You can find a ton of guided meditation videos on Youtube or try some meditation apps like Calm or Headspace.</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Here’s my go to guided meditation video:</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="590"></p><center data-dcnode-id="588"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="589" frameborder="0" height="315" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/67SeR3LxtdI&amp;raw" width="560"></iframe></center><p data-dcnode-id="587"></p><span data-dcnode-id="586" instrument_node="">
</span><h3 data-dcnode-id="582"><span class="ez-toc-section" data-dcnode-id="585" id="29_Connect_with_Friends"></span><span data-dcnode-id="584" instrument_node="">29. Connect with Friends</span><span class="ez-toc-section-end" data-dcnode-id="583"></span></h3><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Good friends are the perfect antidote to a bad day. Meeting up is often the most fun, but that doesn’t always work with your busy schedules. If that is the case, give them a call and have a nice chat over the phone. You can choose to let your friend know you’re feeling down. They’ll probably commiserate a bit and then move on to more enjoyable topics that will have you grinning ear to ear by the time you two hang up.</span></p><span data-dcnode-id="578" instrument_node="">
</span><h3 data-dcnode-id="574"><span class="ez-toc-section" data-dcnode-id="577" id="30_Find_a_positive_intention_or_mantra"></span><span data-dcnode-id="576" instrument_node="">30. Find a positive intention or mantra</span><span class="ez-toc-section-end" data-dcnode-id="575"></span></h3><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="572" instrument_node="">A positive intention is different from </span><a data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.outofstress.com/affirmations-for-positive-energy/"><span data-dcnode-id="571" instrument_node="">an affirmation</span></a><span data-dcnode-id="569" instrument_node="">. An intention is meant to anchor you and guide you. It’s a phrase you return to when you need a reminder of what you really want to feel.</span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Try taking some time journaling about what you want to feel right now. Or, even better: what do you wish someone would say to you right now? What could someone say to make you feel better? Write all of that down. </span></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="560"><strong data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Pick a statement that both feels true and resonates with you.</span></strong><span data-dcnode-id="561" instrument_node=""> In other words, choose an intention that feels like a reminder, not like a lie. Write that phrase down somewhere you’ll see it regularly: put it in your planner, or on a sticky note on your bathroom mirror. Comfort yourself with these words throughout the day.</span></p><span data-dcnode-id="559" instrument_node="">
</span><h3 data-dcnode-id="555"><span class="ez-toc-section" data-dcnode-id="558" id="31_Give_yourself_a_hug_or_hold_your_own_hand"></span><span data-dcnode-id="557" instrument_node="">31. Give yourself a hug or hold your own hand</span><span class="ez-toc-section-end" data-dcnode-id="556"></span></h3><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">We know that getting a hug or a gentle touch from a loved one can instantly help us to feel calm and safe. What if there’s nobody around who feels safe to hug, though? </span></p><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="550" instrument_node="">The amazing thing about being human is that you are always there for you. Did you know that hugging yourself or holding your own hand can actually </span><a data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/hugging-self%23benefits" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="549" instrument_node="">produce the same benefits</span></a><span data-dcnode-id="547" instrument_node=""> as hugging somebody else?</span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">It’s true; self touch has been proven to reduce cortisol, the stress hormone, and increase oxytocin, the feel-good, pain-relieving cuddle hormone. </span></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">So, next time you feel stressed or sad, hug yourself. Squeeze your hand. Draw thumb circles on your palm. Do so with a gentle, loving intention– the same way you’d comfort a crying child. Even if you don’t instantly feel 100% better, you’ll prove to yourself that you have your own back, and that goes a long way in helping you sit with these difficult emotions.</span></p><span data-dcnode-id="539" instrument_node="">
</span><h3 data-dcnode-id="535"><span class="ez-toc-section" data-dcnode-id="538" id="32_Eat_dark_chocolate"></span><span data-dcnode-id="537" instrument_node="">32. Eat dark chocolate </span><span class="ez-toc-section-end" data-dcnode-id="536"></span></h3><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">If you are a chocoholic, here’s some good news: next time you’re feeling down, eating a bit of that sweet stuff might lift your mood a little! </span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="530" instrument_node="">Cacao, the plant that chocolate is made of, is scientifically proven to </span><a data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/news/to-your-health/wp/2014/04/07/why-chocolate-really-is-the-secret-to-happiness-2/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="529" instrument_node="">increase your brain’s serotonin levels</span></a><span data-dcnode-id="527" instrument_node="">.</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">However, next time you’re stressed, try reaching for a bar of dark chocolate – the higher the cacao percentage, the more it’ll increase your serotonin levels. In addition, dark chocolate contains less sugar; you’d do best to stay away from sugar when you’re sad, as sugar can cause an insulin crash, leaving you feeling worse later on.</span></p><span data-dcnode-id="522" instrument_node="">
</span><h3 data-dcnode-id="518"><span class="ez-toc-section" data-dcnode-id="521" id="33_Drink_raw_cacao_and_banana_shake"></span><span data-dcnode-id="520" instrument_node="">33. Drink raw cacao and banana shake</span><span class="ez-toc-section-end" data-dcnode-id="519"></span></h3><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Want to reap chocolate’s mood-boosting benefits to the max? Instead of dark chocolate, you can try drinking raw cacao – this is chocolate that hasn’t been processed or added to, so you’ll get even more of a serotonin boost by taking this route. </span></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">To make the shake take 1 full banana, 1 tablespoon of raw cacao, a teaspoon of raw honey and half a cup of milk (regular, almond or oat milk). Blend all this up and your mood lifting shake is ready!</span></p><span data-dcnode-id="511" instrument_node="">
</span><h3 data-dcnode-id="507"><span class="ez-toc-section" data-dcnode-id="510" id="34_Use_essential_oils"></span><span data-dcnode-id="509" instrument_node="">34. Use essential oils</span><span class="ez-toc-section-end" data-dcnode-id="508"></span></h3><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Stock up on essential oils to carry around with you next time your mood gets low. You can use these by rubbing a few drops on your wrist, or by using a diffuser to disperse them throughout your home or office. </span></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Depending on your mood, there are a few different essential oils you can try:</span></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="496"><strong data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Bergamot:</span></strong><span data-dcnode-id="497" instrument_node=""> soothes anxiety</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="491"><strong data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Bitter orange:</span></strong><span data-dcnode-id="492" instrument_node=""> increases energy</span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="486"><strong data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Vetiver:</span></strong><span data-dcnode-id="487" instrument_node=""> calms the nervous system, helps to soothe anger, and aids in falling asleep</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="481"><strong data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Chamomile:</span></strong><span data-dcnode-id="482" instrument_node=""> aids in falling asleep and eases sadness</span></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="476"><strong data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Lavender:</span></strong><span data-dcnode-id="477" instrument_node=""> eases depression and anxiety</span></p><span data-dcnode-id="475" instrument_node="">
</span><h3 data-dcnode-id="471"><span class="ez-toc-section" data-dcnode-id="474" id="35_Congratulate_yourself_on_small_wins"></span><span data-dcnode-id="473" instrument_node="">35. Congratulate yourself on small wins</span><span class="ez-toc-section-end" data-dcnode-id="472"></span></h3><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">We tend to be especially hard on ourselves when we’re already feeling low. In addition, a bad mood can make it increasingly difficult for us to complete daily tasks. Sometimes, this can even lead to a self-perpetuating cycle of self-criticism: you feel too down to complete a task, then you beat ourselves up for not getting things done, then you feel even worse… And so on. </span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">If your mood is low, be careful not to send yourself spiraling into one of these negative feedback loops. One positive action you can take to break this downward spiral is to offer yourself some gratitude for even the smallest of accomplishments throughout your day. </span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Were you able to make it out of bed? Well done! Made yourself breakfast? Awesome job! Completed an act of self-care? Good work! </span></p><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">You get the idea – treating yourself with encouragement, rather than criticism, especially when you feel off, is essential to supporting yourself through hard feelings!</span></p><span data-dcnode-id="458" instrument_node="">
</span><h3 data-dcnode-id="454"><span class="ez-toc-section" data-dcnode-id="457" id="36_Remember_hard_times_youve_made_it_through_in_the_past"></span><span data-dcnode-id="456" instrument_node="">36. Remember hard times you’ve made it through in the past</span><span class="ez-toc-section-end" data-dcnode-id="455"></span></h3><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">You’re human. You’ve likely made it through so many hardships with grace. Can you remember any of those times right now?</span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Remember how difficult certain times in your life have been. Remember that you made it through, that you’re still breathing today. If you made it through once, you can make it through again.</span></p><span data-dcnode-id="447" instrument_node="">
</span><h3 data-dcnode-id="443"><span class="ez-toc-section" data-dcnode-id="446" id="37_Do_something_just_for_fun_with_no_pressure_to_be_productive"></span><span data-dcnode-id="445" instrument_node="">37. Do something just for fun, with no pressure to be “productive”</span><span class="ez-toc-section-end" data-dcnode-id="444"></span></h3><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">When was the last time you allowed yourself to do something fun or relaxing, with NO “end result” required whatsoever? In other words: do you allow yourself to enjoy fun activities that aren’t work-related or income-driven?</span></p><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Take the pressure off of yourself to make money or to be “productive” just for a little while. If you’re feeling down, you likely need to let yourself off the hook, anyway. </span></p><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="435" instrument_node="">Do you allow yourself to enjoy what you enjoy? </span><strong data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">What’s a fun activity you haven’t allowed yourself to partake in in a while?</span></strong><span data-dcnode-id="432" instrument_node=""> Let yourself off the hook for a little while and allow yourself to relax. </span></p><span data-dcnode-id="430" instrument_node="">
</span><h3 data-dcnode-id="426"><span class="ez-toc-section" data-dcnode-id="429" id="38_Help_someone_by_volunteering_in_your_community"></span><span data-dcnode-id="428" instrument_node="">38. Help someone by volunteering in your community</span><span class="ez-toc-section-end" data-dcnode-id="427"></span></h3><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">It’s difficult to give somebody else joy WITHOUT receiving a little joy ourselves! </span></p><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">What are your interests? What do you enjoy doing? Could there be a non-profit organization in your area which could use your volunteer help? </span></p><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Perhaps you love animals; maybe you could make a shelter dog’s day brighter by taking him for a walk. If you love kids, there’s sure to be an organization in your area that’ll help you serve schoolchildren. </span></p><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">There are boundless opportunities to help people in any community, and bringing a smile to someone’s face is sure to help you lift your spirits.</span></p><span data-dcnode-id="413" instrument_node="">
</span><h3 data-dcnode-id="409"><span class="ez-toc-section" data-dcnode-id="412" id="39_Plan_a_trip_even_if_the_trip_never_actually_takes_place"></span><span data-dcnode-id="411" instrument_node="">39. Plan a trip (even if the trip never actually takes place!)</span><span class="ez-toc-section-end" data-dcnode-id="410"></span></h3><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="407" instrument_node="">You don’t actually have to go on vacation to feel better– </span><a data-dcnode-id="405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalgeographic.com/travel/2020/05/planning-a-trip-is-good-for-you-especially-during-pandemic/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="406" instrument_node="">science shows</span></a><span data-dcnode-id="404" instrument_node=""> that simply planning a trip (even if it’s an imaginary one) can boost your mood!</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Is there anywhere you’ve dreamed of visiting, but you haven’t had the chance yet? Don’t worry right now about holding yourself back if this trip doesn’t feel “realistic”. The point here is to dream up the most amazing trip: where would you go? How would you get there? Where would you stay and what would you do?</span></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Remember, it’s okay if this trip never takes place. Simply dreaming up your dream vacation may lift you out of that slump you’re in.</span></p><span data-dcnode-id="396" instrument_node="">
</span><h3 data-dcnode-id="392"><span class="ez-toc-section" data-dcnode-id="395" id="40_Name_what_youre_feeling"></span><span data-dcnode-id="394" instrument_node="">40. Name what you’re feeling</span><span class="ez-toc-section-end" data-dcnode-id="393"></span></h3><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">A little mindfulness goes a long way. When we’re able to notice what we’re feeling, when we’re feeling it, we’re as a result able to learn two things:</span></p><span data-dcnode-id="388" instrument_node="">
</span><ol data-dcnode-id="380"><span data-dcnode-id="387" instrument_node="">
</span><li data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">What triggers that feeling, and</span></li><span data-dcnode-id="384" instrument_node="">
</span><li data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">What supports us through that feeling.</span></li><span data-dcnode-id="381" instrument_node="">
</span></ol><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">That means, next time you notice yourself feeling that same feeling, you’ll be able to face those feelings with empowerment, and support yourself through them with love and grace. </span></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">So, take a moment to ask yourself WHAT you’re actually feeling. It seems simple, but it’s these easy acts of mindfulness that we often overlook!</span></p><span data-dcnode-id="373" instrument_node="">
</span><h3 data-dcnode-id="369"><span class="ez-toc-section" data-dcnode-id="372" id="41_Up_your_Feng_Shui_game_by_moving_things_around_in_your_house"></span><span data-dcnode-id="371" instrument_node="">41. Up your Feng Shui game by moving things around in your house</span><span class="ez-toc-section-end" data-dcnode-id="370"></span></h3><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Sometimes, we find ourselves feeling “stuck in a rut”. Our routine feels boring. Daily life feels dull. We feel unhappy, but unsure as to why we feel unhappy. </span></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Feng shui – if you even know what that is!– might not be the first thing that comes to mind when we’re feeling “stuck”. Did you know, though, that practicing feng shui by moving things around your home can help you to feel less stuck, more motivated, and more joyful?</span></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="361" instrument_node="">If this resonates, you might check out </span><a data-dcnode-id="359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//openspacesfengshui.com/feng-shui-tips/2009/11/the-magic-of-27-things/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="360" instrument_node="">this article</span></a><span data-dcnode-id="358" instrument_node="">, which explains the “magic of 27 things”. Some people notice that simply moving 27 objects around in your house (throwing clutter away helps, as well) allows them to get their energy flowing again, which causes an instant mood boost.</span></p><span data-dcnode-id="356" instrument_node="">
</span><h3 data-dcnode-id="352"><span class="ez-toc-section" data-dcnode-id="355" id="42_Practice_EFT_Tapping"></span><span data-dcnode-id="354" instrument_node="">42. Practice EFT (Tapping)</span><span class="ez-toc-section-end" data-dcnode-id="353"></span></h3><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">The Emotional Freedom Technique, also known as “tapping”, stimulates your body’s energy meridians– similar to the way acupuncture works. </span></p><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Using EFT to stimulate eight specific meridians can actually release trapped emotions from your body. EFT teachers usually show you how to tap each of the eight meridians in order while guiding you to speak positive affirmations out loud; these affirmations vary in intention, and can be used to increase joy, decrease anxiety, relieve depression, increase a mindset of abundance, and more. </span></p><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">If this resonates with you, follow along with the following tapping video by Brad Yates for releasing emotional pain.</span></p><span data-dcnode-id="342" instrument_node="">
</span><p data-dcnode-id="341"></p><center data-dcnode-id="339"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="340" frameborder="0" height="315" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/S5l70B3BA8c&amp;raw" width="560"></iframe></center><p data-dcnode-id="338"></p><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Take the pressure off of yourself to feel “better”</span></p><span data-dcnode-id="334" instrument_node="">
</span><h3 data-dcnode-id="330"><span class="ez-toc-section" data-dcnode-id="333" id="43_Let_it_all_out"></span><span data-dcnode-id="332" instrument_node="">43. Let it all out</span><span class="ez-toc-section-end" data-dcnode-id="331"></span></h3><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Throw away all of your beliefs about crying being “weak”. It takes strength to let those energetic emotions out of our systems.</span></p><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="325" instrument_node="">Even if you’re not totally comfortable crying around other people, that’s okay. Take time to yourself alone in nature, or in the shower. Watch </span><a data-dcnode-id="323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D1jLOOCADTGs" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="324" instrument_node="">A Dog’s Purpose</span></a><span data-dcnode-id="322" instrument_node=""> and just let it out.</span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="316"><strong data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Remember – what you’re feeling, you’re healing. And crying is a perfect way to sit with and release whatever you may be feeling.</span></strong><span data-dcnode-id="317" instrument_node=""> Don’t try to contain your emotions. Find a place where you’re completely comfortable to sob and bawl.</span></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">When you’re done, try journaling about it, or doing any of the other things on this list. You’ll feel better and recharged afterwards. In addition, remember how strong you are for being able to tolerate the painful release of those emotions, and for continuing to help and heal yourself afterwards.</span></p><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">If you’re doing anything to help yourself, you’re already much stronger than you think.</span></p><span data-dcnode-id="309" instrument_node="">
</span><h2 data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Finally, remember not to try too hard</span></h2><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">There’s a concept known as the “backwards law”; it basically says that accepting a negative experience is in itself a positive experience. It follows, then, that trying to force yourself to be positive can actually cause you to feel more negative. </span></p><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">So remember: it’s okay to feel poorly. It’s okay to be sad, stressed, angry, or whatever else you may feel. It is not a reflection on your character that you don’t feel joyful and positive every single moment of your life. </span></p><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Allow yourself to feel down. It is okay, and there is absolutely nothing wrong with you. </span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">There are many things to do to cheer yourself up. Depending on the situations one technique will work better than another, so it is a good idea to keep a few different methods in your arsenal of cheer up techniques.</span></p><span data-dcnode-id="294" instrument_node="">
</span></div><span data-dcnode-id="292" instrument_node="">
