</span><div class="bialty-container" data-dcnode-id="1107"><p data-dcnode-id="1351"><span data-dcnode-id="1356" instrument_node="">You may be having a difficult day or a difficult week. It can feel like an uphill climb to get out of that emotional and mental rut and be kind to yourself, but there are, fortunately, many tools at our disposal for resetting our attitude. When we show ourselves kindness, we start to create new habit patterns and neuron pathways in the brain </span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1354" id="footnote_plugin_tooltip_1" onclick="footnote_moveToAnchor('footnote_plugin_reference_1');"><span data-dcnode-id="1355" instrument_node="">[1]</span></sup><span class="footnote_tooltip" data-dcnode-id="1353" id="footnote_plugin_tooltip_text_1"></span><span data-dcnode-id="1352" instrument_node="">. These new “mentalities” take us from seeing everything as negative and grim to joyful, positive, and full of opportunity.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1345"><span data-dcnode-id="1349" instrument_node="">We understand kindness from the perspective of how we treat our family and friends. What if we were to take that same approach to how we treat ourselves? How would our health improve if we listened to our body’s signals and responded with care and compassion? These are profound questions to ask. While having a bad day and feeling down is another part of life, we </span><em data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">can </span></em><span data-dcnode-id="1346" instrument_node="">start to implement tools into our routine that grow our self-compassion muscle even more.</span></p><span data-dcnode-id="1344" instrument_node="">
</span><h2 data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">1. Forgive Yourself Often</span></h2><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">This may be the best and hardest tool to implement in your life, but it is so potent! We are so hard on ourselves, and we are often our own worst critic. We can easily forgive our friends and family, but we have a harder time taking that forgiveness within.</span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1337" instrument_node="">Today, </span><a data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/316764/this-why-you-should-forgive-yourself-matter-what-2"><span data-dcnode-id="1336" instrument_node="">practice self-forgiveness</span></a><span data-dcnode-id="1334" instrument_node="">. When you get caught up in self-blame, pause and think about how you would react to the same situation with a friend. Often, we need the same kind of forgiveness. At the end of the day, we’re doing the best that we can. When we know better, we can do better. In the meantime, forgiveness is key.</span></p><span data-dcnode-id="1332" instrument_node="">
</span><h2 data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">2. Write Yourself a Love Letter</span></h2><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1328" instrument_node="">This is a simple yet precious way of writing your thoughts and feelings down on a piece of paper. If you really want to add a touch of extra love and be kind to yourself, pull out your fanciest stationary</span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1326" id="footnote_plugin_tooltip_2" onclick="footnote_moveToAnchor('footnote_plugin_reference_2');"><span data-dcnode-id="1327" instrument_node="">[2]</span></sup><span class="footnote_tooltip" data-dcnode-id="1325" id="footnote_plugin_tooltip_text_2"></span><span data-dcnode-id="1324" instrument_node="">! If you’re having a hard time with writing, imagine you’re writing to your younger self. What would you want to say? Often, it’s words of encouragement.</span></p><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">We hold a lot of compassion for ourselves in hindsight, after life has tested and blessed us. Writing love letters offers us perspective in which to find gratitude! If you want, you can also mail it to yourself, or save it and open it in a few months or even years. </span></p><div class="ad-wrap-transparent article-top-ad container-fluid d-md-none" data-dcnode-id="1307"><span data-dcnode-id="1319" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1316" instrument_node="">
</span><div class="lazyload-ad incontent-inline-rect" data-dcnode-id="1312" data-id="lifehack_m_ATF2_ap" id="lifehack_m_ATF2_ap"><span data-dcnode-id="1315" instrument_node="">
</span><br data-dcnode-id="1314"><span data-dcnode-id="1313" instrument_node="">
</span></div><span data-dcnode-id="1311" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1308" instrument_node="">
</span></div><span data-dcnode-id="1306" instrument_node="">
</span><h2 data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">3. Take Care of Your Physical Health</span></h2><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">This may look like going out for a walk every day in your neighborhood or favorite park; it may also look like taking a yoga class on a Saturday morning, or joining a favorite gym or fitness club.</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1294"><span data-dcnode-id="1299" instrument_node="">When we’re feeling down, our physical body hangs on to all of that pent-up energy and emotion. We need to clear that energy in order to maintain physical health, as well as emotional and mental health</span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1297" id="footnote_plugin_tooltip_3" onclick="footnote_moveToAnchor('footnote_plugin_reference_3');"><span data-dcnode-id="1298" instrument_node="">[3]</span></sup><span class="footnote_tooltip" data-dcnode-id="1296" id="footnote_plugin_tooltip_text_3"></span><span data-dcnode-id="1295" instrument_node="">. Whatever you choose is up to you! Just make sure it feels good and you’re having fun while you’re at it.</span></p><span data-dcnode-id="1293" instrument_node="">
</span><h2 data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">4. Nourish and Treat Yourself</span></h2><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">This may look like taking yourself out to dinner or cooking a delicious meal for yourself at home! Often, in times of despair, one of the first things that starts to lack is our nutrition. We either don’t eat enough or we overeat, and never the right kinds of food.</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Schedule a time on your calendar for treating yourself! It may be ordering food from your favorite restaurant, or spoiling yourself with something that you would never order regularly. Whatever it is, make sure it feels special, something out of the ordinary, and bonus points if it’s healthy!</span></p><span data-dcnode-id="1284" instrument_node="">
</span><h2 data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">5. Seek out a Therapist</span></h2><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1280" instrument_node="">When it comes to emotional and mental health, seeking out professional health is a major win and a great way to be kind to yourself. We can’t always help ourselves. We need someone to hold space for us, listen and hear us out, and offer perspectives that we wouldn’t have on our own</span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1278" id="footnote_plugin_tooltip_4" onclick="footnote_moveToAnchor('footnote_plugin_reference_4');"><span data-dcnode-id="1279" instrument_node="">[4]</span></sup><span class="footnote_tooltip" data-dcnode-id="1277" id="footnote_plugin_tooltip_text_4"></span><span data-dcnode-id="1276" instrument_node="">. There is no shame in asking for help.</span></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Therapists will often challenge you to confront the way you think about various situations and experiences, so if you have a problem with negative thinking, therapy can be particularly useful. Just make sure you’re ready to go into it with an open mind and lots of self-compassion. </span></p><div class="ad-wrap-transparent article-top-ad container-fluid d-md-none" data-dcnode-id="1259"><span data-dcnode-id="1271" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1268" instrument_node="">
</span><div class="lazyload-ad incontent-inline-rect" data-dcnode-id="1264" data-id="lifehack_m_BTF1_ap" id="lifehack_m_BTF1_ap"><span data-dcnode-id="1267" instrument_node="">
</span><br data-dcnode-id="1266"><span data-dcnode-id="1265" instrument_node="">
</span></div><span data-dcnode-id="1263" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1260" instrument_node="">
</span></div><span data-dcnode-id="1258" instrument_node="">
</span><div class="convertflow-article-in-content cf-2355-area-14952" data-dcnode-id="1257"></div><span data-dcnode-id="1256" instrument_node="">
</span><h2 data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">6. Buy Yourself Flowers</span></h2><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">This may seem like a cliché approach to self-kindness, but think about the last time you bought flowers for yourself. How long has it really been? There is great power in treating yourself in the same manner as you would treat someone you loved.</span></p><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Small gestures, such as buying yourself flowers, are breadcrumbs towards those new habit patterns. When put together, they create a new outlook of joy, happiness, peace, and contentment. To go a step further, take yourself out on a date! You may be surprised how much you enjoy your own company.</span></p><span data-dcnode-id="1247" instrument_node="">
</span><h2 data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">7. When You’re in a Rut, Ask Questions</span></h2><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">We reflexively jump to outside stimuli when we’re facing a challenge or are in a rut. You may turn to food, drugs, or alcohol; or you may keep yourself mindlessly busy, distracted, or running headfirst into emotional restlessness and poor decisions.</span></p><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Instead, we can ask ourselves questions to start to dig deeper into our current situation. For example, asking “What do I need right now?” can be a powerful moment of introspection. It not only brings us back to the present, but it also cuts through the noise of mental and emotional chatter.</span></p><span data-dcnode-id="1238" instrument_node="">
</span><h2 data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">8. Surround Yourself with Like-Minded People</span></h2><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Our loved ones have a beautiful way of pulling you out of your own funk when you don’t know how to be kind to yourself. Just by being around other people, our energy can lift and shift in ways that promote a new, fresh start to our day. Make sure you find friends who will be patient with you and make space for you to be heard and loved. If you feel like your friends aren’t capable of this, it may be the moment to limit the amount of time you spend with them. Remember to surround yourself with people who can lift you up versus people who can only bring you down!</span></p><span data-dcnode-id="1232" instrument_node="">
</span><h2 data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">9. Hydrate!</span></h2><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1228" instrument_node="">This also may seem like a simple tool, but it is an incredibly important one! Just like food, </span><a data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/531773/13-funny-ways-make-you-drink-more-water"><span data-dcnode-id="1227" instrument_node="">hydration</span></a><span data-dcnode-id="1225" instrument_node=""> is also something we toss to the back burner when we’re feeling down. It just doesn’t seem to be that important until we have a headache and don’t know where it’s coming from. </span></p><div class="ad-wrap-transparent article-top-ad container-fluid d-md-none" data-dcnode-id="1214"><span data-dcnode-id="1223" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1220" instrument_node="">
</span><div class="pg-lazy incontent-inline-rect" data-dcnode-id="1219" data-gpt-parent="lifehack_m_BTF2_ap"></div><span data-dcnode-id="1218" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1215" instrument_node="">
</span></div><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1212" instrument_node="">Drinking water not only regulates our body’s innate functioning systems, but it also heavily impacts our mood</span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1210" id="footnote_plugin_tooltip_5" onclick="footnote_moveToAnchor('footnote_plugin_reference_5');"><span data-dcnode-id="1211" instrument_node="">[5]</span></sup><span class="footnote_tooltip" data-dcnode-id="1209" id="footnote_plugin_tooltip_text_5"></span><span data-dcnode-id="1208" instrument_node="">. Remember to stick to water and avoid high-sugar drinks, such as sodas. If you’re not sure, water is your best bet!</span></p><span data-dcnode-id="1206" instrument_node="">
</span><h2 data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">10. Have a “Self-Care” Day</span></h2><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">This doesn’t have to be fancy. You can draw yourself a bath, have a picnic outside, or choose to snuggle in for a movie night. A “Self-Care” day is all about being present with yourself and enjoying the little things with more appreciation. There are many ways of enjoying the day that won’t cost you a lot of money, and all with tools already at your disposal in your home or community.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><h2 data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">11. Make Time for Meditation</span></h2><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1196" instrument_node="">This is a wonderful practice of tuning into your mental state and works to teach you how to be kind to yourself. With so many </span><a data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/articles/communication/how-meditation-helps-you-being-better-life.html"><span data-dcnode-id="1195" instrument_node="">meditation</span></a><span data-dcnode-id="1193" instrument_node=""> applications out there, you can find teacher-guided sessions or timers with gentle background music to ease you into meditation. Meditation teachers often say that all of our answers reside within us, so starting this practice in a time when we’re struggling can provide powerful insight.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><h2 data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">12. Give Yourself Recognition</span></h2><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">There are many successes we simply don’t take the time to celebrate. Instead, we wait for others to celebrate or recognize our accomplishments. Today, think about something you’d like to be recognized for. It could be a project you’ve been working on or something you’ve devoted time and effort to in your life. Then, celebrate it!</span></p><div class="cf-2355-area-21490" data-dcnode-id="1185"></div><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Share it with your friends and family, and give yourself a pat on the back! Another fun way of giving yourself recognition is to create a “Brag Bucket.” Each time you accomplish something, drop a note with what you did. At the end of the year, take a look at everything you’ve done and celebrate yourself!</span></p><span data-dcnode-id="1181" instrument_node="">
</span><h2 data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">13. Give Yourself a Massage</span></h2><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1177" instrument_node="">We already mentioned how the body holds on to emotional and mental baggage. This can show up in tension, tightness, aches, or pains. While it is certainly rewarding to go get a massage, you can also give yourself one. Ayurveda, the sister science of Yoga, highlights a particularly healing massage practice called </span><em data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">abhyanga, </span></em><span data-dcnode-id="1174" instrument_node="">which is an oil massage that you can do from the comfort of your own home</span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1172" id="footnote_plugin_tooltip_6" onclick="footnote_moveToAnchor('footnote_plugin_reference_6');"><span data-dcnode-id="1173" instrument_node="">[6]</span></sup><span class="footnote_tooltip" data-dcnode-id="1171" id="footnote_plugin_tooltip_text_6"></span><span data-dcnode-id="1170" instrument_node="">. </span></p><div class="ad-wrap-transparent article-top-ad container-fluid d-md-none" data-dcnode-id="1159"><span data-dcnode-id="1168" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1165" instrument_node="">
</span><div class="pg-lazy incontent-inline-rect" data-dcnode-id="1164" data-gpt-parent="lifehack_m_BTF2_ap"></div><span data-dcnode-id="1163" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1160" instrument_node="">
</span></div><span data-dcnode-id="1158" instrument_node="">
</span><h2 data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">14. Stop Tolerating What/Who Doesn’t Serve You Well</span></h2><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Sometimes practicing self-kindness is about cutting the cords of what no longer brings you joy in life. This may be an idea, routine, or a person. It’s OK to walk away from something that brings you down. When you can let go and distance yourself in such a way, more space opens up for you to fill that void with what actually makes you happy!</span></p><span data-dcnode-id="1152" instrument_node="">
</span><h2 data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">15. Rest and Recharge</span></h2><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">We live in a society that worships productivity. While that may be needed in some instances, it also creates the assumption that a lack of productivity makes you worth less as an employee and a person and makes it very difficult to find time to be kind to yourself. We need to get back to the flow of nature, which shows us that while much may not be going on, life is still thriving and growing. Likewise, so are we.</span></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1145" instrument_node="">We are not designed to thrive in a “grind” society. We don’t always need to work, move, create, and do. More often than not, </span><a data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/articles/lifestyle/claim-your-day-of-rest-for-improved-health-and-productivity.html"><span data-dcnode-id="1144" instrument_node="">we need rest</span></a><span data-dcnode-id="1142" instrument_node="">! We need to simply be, and we need to know that this is more than OK.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><h2 data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Final Thoughts</span></h2><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">We all have days where we feel down and out. In these moments, we can either wallow in our despair and let it consume us, or we can practice simple yet effective tools to nourish ourselves. At the core of self-kindness and compassion is the fact that we’re all just doing our very best, day in and day out. As the old Buddhist saying goes, “You yourself, as much as anybody in the entire universe, deserves your love and affection.”</span></p><span data-dcnode-id="1134" instrument_node="">
</span><h2 data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">More on How to Be Kind to Yourself</span></h2><span data-dcnode-id="1131" instrument_node="">
