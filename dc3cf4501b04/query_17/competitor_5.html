</span><h1 data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">8 ways to calm down when you are feeling anxious for no reason</span></h1><span data-dcnode-id="1307" instrument_node="">
</span><div class="separator" data-dcnode-id="1305"><span data-dcnode-id="1306"></span></div><span data-dcnode-id="1304" instrument_node="">
</span></div><span data-dcnode-id="1302" instrument_node="">
</span><div class="post-img" data-dcnode-id="1295"><span data-dcnode-id="1301" instrument_node="">
</span><a data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//meganhallier.com/feeling-anxious-for-no-reason/"><img alt="feeling-anxious-for-no-reason.jpg" class="lazy attachment-full-thumb size-full-thumb wp-post-image lazy-loaded" data-dcnode-id="1300" data-lazy-sizes="(max-width: 1080px) 100vw, 1080px" data-lazy-src="https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775-1080x720.x71568.jpg" data-lazy-srcset="https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775-1080x720.jpg 1080w, https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775-300x200.jpg 300w, https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775-768x512.jpg 768w, https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775-1024x683.jpg 1024w, https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775-30x20.jpg 30w, https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775.jpg 1650w" data-lazy-type="image" height="720" sizes="(max-width: 1080px) 100vw, 1080px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775-1080x720.x71568.jpg&amp;raw" srcset="https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775-1080x720.jpg 1080w, https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775-300x200.jpg 300w, https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775-768x512.jpg 768w, https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775-1024x683.jpg 1024w, https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775-30x20.jpg 30w, https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775.jpg 1650w" width="1080"><noscript data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">&lt;img width="1080" height="720" src="https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775-1080x720.x71568.jpg" class="attachment-full-thumb size-full-thumb wp-post-image" alt="feeling-anxious-for-no-reason.jpg" srcset="https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775-1080x720.jpg 1080w, https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775-300x200.jpg 300w, https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775-768x512.jpg 768w, https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775-1024x683.jpg 1024w, https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775-30x20.jpg 30w, https://meganhallier.com/wp-content/uploads/2019/04/Untitled-design-4-e1554334539775.jpg 1650w" sizes="(max-width: 1080px) 100vw, 1080px" /&gt;</span></noscript></a><span data-dcnode-id="1296" instrument_node="">
</span></div><span data-dcnode-id="1294" instrument_node="">
</span><div class="post-entry" data-dcnode-id="816"><span data-dcnode-id="1293" instrument_node="">
</span><div class="mailmunch-forms-before-post" data-dcnode-id="1292" style="display: none !important;"></div><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1286"><span data-contrast="auto" data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">I originally sat down to write a post on perfectionism but as soon as I started, I realised something. I’m not really a perfectionist and I don’t have much to say on the matter.&nbsp;</span></span></p><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1279"><span data-contrast="auto" data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">I would be of no use to you. I don’t have any advice for people who obsessively use rulers and match the colours of their clothes pegs. I am not that person.&nbsp;</span></span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1269"><span data-contrast="auto" data-dcnode-id="1270"><span data-dcnode-id="1274" instrument_node="">What I am however, is </span><em data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">highly strung</span></em><span data-dcnode-id="1271" instrument_node="">. I know all about feeling anxious for no reason.&nbsp;</span></span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1265" instrument_node="">
</span><h3 data-dcnode-id="1262"><span data-contrast="auto" data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">I carry anxiety around with me like most ladies do a purse.&nbsp;</span></span></h3><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1249"><span data-contrast="auto" data-dcnode-id="1250"><span data-dcnode-id="1257" instrument_node="">I am </span><em data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">hopeless</span></em><span data-dcnode-id="1254" instrument_node=""> without structure and routine. I need to be able to plan ahead. I need to make sure I am adequately prepared for any and </span><em data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">all</span></em><span data-dcnode-id="1251" instrument_node="">&nbsp;eventualities.&nbsp;</span></span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1242"><span data-contrast="auto" data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Spontaneity, completely throws me off, it rips the rug right out from under my feet.&nbsp;</span></span></p><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1232"><span data-contrast="auto" data-dcnode-id="1233"><span data-dcnode-id="1237" instrument_node="">The older I am getting, the better I am becoming at </span><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//meganhallier.com/letting-go-of-control/"><span data-dcnode-id="1236" instrument_node="">letting go of control</span></a><span data-dcnode-id="1234" instrument_node="">. I am slowly learning how to cope with uncertainty so that it doesn’t paralyze me.&nbsp;</span></span></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1225"><span data-contrast="auto" data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">But sometimes when we feel ourselves slipping, we need strategies to help us calm down.&nbsp;</span></span></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1218"><span data-contrast="auto" data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">We need tools to help us cope after a stressful day. A routine that can help us to prepare ourselves for something uncomfortable like a dentist visit or awkward phone call.&nbsp;</span></span></p><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1214" instrument_node="">
</span><blockquote data-dcnode-id="1210"><p data-dcnode-id="1211"><em data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">We need to have a way of cooling off and resetting, a way of bringing harmony into our every day lives.&nbsp;</span></em></p></blockquote><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1197"><span data-contrast="auto" data-dcnode-id="1198"><span data-dcnode-id="1205" instrument_node="">Because sometimes there is a clear and </span><em data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">obvious</span></em><span data-dcnode-id="1202" instrument_node=""> reason why we are feeling anxious, but sometimes we are feeling anxious for </span><em data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">no reason at all</span></em><span data-dcnode-id="1199" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1190"><span data-contrast="auto" data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">These coping mechanisms are especially important for highly strung people, those of us who are always just teetering on the edge of becoming overwhelmed.&nbsp;</span></span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1180"><span data-contrast="auto" data-dcnode-id="1181"><span data-dcnode-id="1185" instrument_node="">We need to know our limits and make sure we take </span><em data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">extra special</span></em><span data-dcnode-id="1182" instrument_node=""> care of ourselves.&nbsp;</span></span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1173"><span data-contrast="auto" data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">So as a highly strung, often anxious person, these are my personal coping mechanisms. These are the ways I practice self care. This is how I manage to stay sane.&nbsp;</span></span></p><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1165"><img alt="" class="lazy alignnone wp-image-516 size-full lazy-loaded" data-dcnode-id="1168" data-lazy-sizes="(max-width: 1000px) 100vw, 1000px" data-lazy-src="http://meganhallier.com/wp-content/uploads/2019/02/Untitled-design-2.x71568.png" data-lazy-srcset="https://meganhallier.com/wp-content/uploads/2019/02/Untitled-design-2.png 1000w, https://meganhallier.com/wp-content/uploads/2019/02/Untitled-design-2-300x14.png 300w, https://meganhallier.com/wp-content/uploads/2019/02/Untitled-design-2-768x35.png 768w, https://meganhallier.com/wp-content/uploads/2019/02/Untitled-design-2-30x1.png 30w" data-lazy-type="image" height="45" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//meganhallier.com/wp-content/uploads/2019/02/Untitled-design-2.x71568.png&amp;raw" srcset="https://meganhallier.com/wp-content/uploads/2019/02/Untitled-design-2.png 1000w, https://meganhallier.com/wp-content/uploads/2019/02/Untitled-design-2-300x14.png 300w, https://meganhallier.com/wp-content/uploads/2019/02/Untitled-design-2-768x35.png 768w, https://meganhallier.com/wp-content/uploads/2019/02/Untitled-design-2-30x1.png 30w" width="1000"><noscript data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">&lt;img class="alignnone wp-image-516 size-full" src="http://meganhallier.com/wp-content/uploads/2019/02/Untitled-design-2.x71568.png" alt="" width="1000" height="45" srcset="https://meganhallier.com/wp-content/uploads/2019/02/Untitled-design-2.png 1000w, https://meganhallier.com/wp-content/uploads/2019/02/Untitled-design-2-300x14.png 300w, https://meganhallier.com/wp-content/uploads/2019/02/Untitled-design-2-768x35.png 768w, https://meganhallier.com/wp-content/uploads/2019/02/Untitled-design-2-30x1.png 30w" sizes="(max-width: 1000px) 100vw, 1000px" /&gt;</span></noscript></p><span data-dcnode-id="1164" instrument_node="">
</span><h3 data-dcnode-id="1163"></h3><span data-dcnode-id="1162" instrument_node="">
</span><h3 data-dcnode-id="1159"><span data-contrast="auto" data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">8 ways to calm down when you are feeling anxious for no reason…</span></span></h3><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1155" instrument_node="">
</span><h5 data-dcnode-id="1152"><strong data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Focus on your breathing</span></strong></h5><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1147" instrument_node="">When we get very stressed we tend to take short, shallow breaths. The problem is, this only encourages our body’s ‘</span><em data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">fight or flight</span></em><span data-dcnode-id="1144" instrument_node="">‘ response which ends up prolonging our feeling of stress.</span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1138" instrument_node="">The very best thing we can do in any stressful situation is to </span><span data-dcnode-id="1136" style="text-decoration: underline;"><span data-dcnode-id="1137" instrument_node="">focus on our breathing.</span></span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Make a big deal of both your inhale and exhale. Pause and try to count a few seconds after each. Make your breathing as long and deep as possible.</span></p><span data-dcnode-id="1128" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1121" id="attachment_608" style="width: 544px"><a data-dcnode-id="1124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/%40jessicahagy"><img alt="jessica hagy illustration" aria-describedby="caption-attachment-608" class="lazy wp-image-608 lazy-loaded" data-dcnode-id="1127" data-lazy-sizes="(max-width: 534px) 100vw, 534px" data-lazy-src="http://meganhallier.com/wp-content/uploads/2019/04/1_Gn29U6ySMwFyhP68K93TYQ.x71568.jpeg" data-lazy-srcset="https://meganhallier.com/wp-content/uploads/2019/04/1_Gn29U6ySMwFyhP68K93TYQ.jpeg 494w, https://meganhallier.com/wp-content/uploads/2019/04/1_Gn29U6ySMwFyhP68K93TYQ-180x300.jpeg 180w, https://meganhallier.com/wp-content/uploads/2019/04/1_Gn29U6ySMwFyhP68K93TYQ-18x30.jpeg 18w" data-lazy-type="image" height="891" sizes="(max-width: 534px) 100vw, 534px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//meganhallier.com/wp-content/uploads/2019/04/1_Gn29U6ySMwFyhP68K93TYQ.x71568.jpeg&amp;raw" srcset="https://meganhallier.com/wp-content/uploads/2019/04/1_Gn29U6ySMwFyhP68K93TYQ.jpeg 494w, https://meganhallier.com/wp-content/uploads/2019/04/1_Gn29U6ySMwFyhP68K93TYQ-180x300.jpeg 180w, https://meganhallier.com/wp-content/uploads/2019/04/1_Gn29U6ySMwFyhP68K93TYQ-18x30.jpeg 18w" width="534"><noscript data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">&lt;img aria-describedby="caption-attachment-608" class="wp-image-608" src="http://meganhallier.com/wp-content/uploads/2019/04/1_Gn29U6ySMwFyhP68K93TYQ.x71568.jpeg" alt="jessica hagy illustration" width="534" height="891" srcset="https://meganhallier.com/wp-content/uploads/2019/04/1_Gn29U6ySMwFyhP68K93TYQ.jpeg 494w, https://meganhallier.com/wp-content/uploads/2019/04/1_Gn29U6ySMwFyhP68K93TYQ-180x300.jpeg 180w, https://meganhallier.com/wp-content/uploads/2019/04/1_Gn29U6ySMwFyhP68K93TYQ-18x30.jpeg 18w" sizes="(max-width: 534px) 100vw, 534px" /&gt;</span></noscript></a><p class="wp-caption-text" data-dcnode-id="1122" id="caption-attachment-608"><span data-dcnode-id="1123" instrument_node="">Illustration by Jessica Hagy.</span></p></div><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1117" instrument_node="">
</span><h5 data-dcnode-id="1114"><strong data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Listen to gentle music</span></strong></h5><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1107"><span data-contrast="auto" data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Although technically not music, I love listening to nature sounds, especially rain or thunderstorms. There is something soothing about hearing the rhythm of nature. (Unless you look up whale sounds, there is nothing soothing about that!)</span></span></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1096"><span data-contrast="auto" data-dcnode-id="1097"><span data-dcnode-id="1102" instrument_node="">My favourite album to listen to when I am feeling anxious for no reason is ‘</span><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//open.spotify.com/album/36mfScdTe8zFlaHQAmIMuf%3Fsi%3D65dCK8u7TpqIX64IwniMuw"><em data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Be Held</span></em></a><span data-dcnode-id="1098" instrument_node="">‘ by Christy Nockels. This is a collection of lullabies for adults which never fail to bring me back to a place of calm.&nbsp;</span></span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1086"><span data-contrast="auto" data-dcnode-id="1087"><span data-dcnode-id="1091" instrument_node="">I also made a </span><a data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//open.spotify.com/user/mhallier/playlist/3wGgc7hferREp02X2kY6C7%3Fsi%3D-BRxs1FZSfmdXykMMKq49Q"><span data-dcnode-id="1090" instrument_node="">playlist</span></a><span data-dcnode-id="1088" instrument_node=""> of slow, peaceful songs which I’ll put on in the car or as I am working to put myself at ease. Music has a way of reaching us that words simply cannot.&nbsp;</span></span></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1079" instrument_node="">
</span><h5 data-dcnode-id="1076"><strong data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Try using a relaxation exercise&nbsp;</span></strong></h5><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1069"><span data-contrast="auto" data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">In one of my tutorials at university we spent the whole hour learning different relaxation exercises. At the time I thought it was a bit kooky but now I can appreciate the value of it.&nbsp;</span></span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1062"><span data-contrast="auto" data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">The only one I can actually remember involves your five senses.&nbsp;</span></span></p><div class="mailmunch-forms-in-post-middle" data-dcnode-id="1061" style="display: none !important;"></div><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1052"><span data-contrast="auto" data-dcnode-id="1053"><em data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">It goes like this…</span></em><span data-dcnode-id="1054" instrument_node=""> Find yourself a quiet space and close your eyes. Begin breathing deeply. Then start to take notice of each of your senses individually. </span></span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1048"><span data-contrast="auto" data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">What can you hear around you? What can you smell? Open your eyes and what can you see?&nbsp;</span></span></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Slowly become aware of your surroundings and allow your tension to dissipate.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1035" instrument_node="">
</span><h5 data-dcnode-id="1032"><strong data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Just write</span></strong></h5><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">I always find healing in writing. I always manage to un-twinge my tension and stitch up the wounded bits when I write out exactly how I am feeling.</span></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1021" instrument_node="">The most important thing to remember is that your journal/laptop/back side of a napkin is a </span><em data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">safe space</span></em><span data-dcnode-id="1018" instrument_node="">. Allow yourself to write freely </span><em data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">without judgement</span></em><span data-dcnode-id="1015" instrument_node="">.</span></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1009" instrument_node="">You cannot fully let go of the built up pressure inside you if you are fretting about the things you are writing. So no judgement, </span><em data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">just write.</span></em></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">&nbsp;</span></p><span data-dcnode-id="999" instrument_node="">
</span><h5 data-dcnode-id="996"><strong data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Paint, draw or colour-in</span></strong></h5><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">&nbsp;</span></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="991" instrument_node="">Those adult colouring-in books became really popular a few years ago for a reason. Being creative is </span><em data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">relaxing</span></em><span data-dcnode-id="988" instrument_node="">.</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">&nbsp;</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Painting, drawing and colouring-in bring us back to the present. They allow us to be adventurous and playful, to make a mess and just have fun.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">&nbsp;</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="976" instrument_node="">They also distract us from the fears and worries that can overwhelm us. Sometimes what we need is a little </span><em data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">distraction</span></em><span data-dcnode-id="973" instrument_node="">, a little moment of rest from all the hustle and stress.</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">&nbsp;</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">&nbsp;</span></p><span data-dcnode-id="965" instrument_node="">
</span><h5 data-dcnode-id="962"><strong data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Go outside</span></strong></h5><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">&nbsp;</span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="957" instrument_node="">I am a nature girl. My happy places are all outside. I love the </span><em data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">softness</span></em><span data-dcnode-id="954" instrument_node=""> of the beach, the </span><em data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">ruggedness</span></em><span data-dcnode-id="951" instrument_node=""> of the mountains, the</span><em data-dcnode-id="949"><span data-dcnode-id="950" instrument_node=""> quietness</span></em><span data-dcnode-id="948" instrument_node=""> of the forest.</span></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">&nbsp;</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">I need greenery and I need wide open spaces. Nature is soothing for our souls.</span></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">&nbsp;</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">While you are outside, try out the relaxation exercise I mentioned above. There is nothing more uplifting than listening to the early-morning birdsong.</span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">&nbsp;</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="927"><img alt="how to calm down when you are feeling anxious for no reason, feeling anxious, calm down your mind, self care for anxious people, self care, anxiety tips, coping with anxiety, mindfulness, relaxation, how to relax, coping with overwhelm, calm down" class="lazy aligncenter wp-image-609 lazy-loaded" data-dcnode-id="930" data-lazy-sizes="(max-width: 532px) 100vw, 532px" data-lazy-src="http://meganhallier.com/wp-content/uploads/2019/04/How-to-calm-down.x71568.png" data-lazy-srcset="https://meganhallier.com/wp-content/uploads/2019/04/How-to-calm-down.png 735w, https://meganhallier.com/wp-content/uploads/2019/04/How-to-calm-down-200x300.png 200w, https://meganhallier.com/wp-content/uploads/2019/04/How-to-calm-down-683x1024.png 683w, https://meganhallier.com/wp-content/uploads/2019/04/How-to-calm-down-20x30.png 20w" data-lazy-type="image" height="798" sizes="(max-width: 532px) 100vw, 532px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//meganhallier.com/wp-content/uploads/2019/04/How-to-calm-down.x71568.png&amp;raw" srcset="https://meganhallier.com/wp-content/uploads/2019/04/How-to-calm-down.png 735w, https://meganhallier.com/wp-content/uploads/2019/04/How-to-calm-down-200x300.png 200w, https://meganhallier.com/wp-content/uploads/2019/04/How-to-calm-down-683x1024.png 683w, https://meganhallier.com/wp-content/uploads/2019/04/How-to-calm-down-20x30.png 20w" width="532"><noscript data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">&lt;img class="aligncenter wp-image-609 " src="http://meganhallier.com/wp-content/uploads/2019/04/How-to-calm-down.x71568.png" alt="how to calm down when you are feeling anxious for no reason, feeling anxious, calm down your mind, self care for anxious people, self care, anxiety tips, coping with anxiety, mindfulness, relaxation, how to relax, coping with overwhelm, calm down" width="532" height="798" srcset="https://meganhallier.com/wp-content/uploads/2019/04/How-to-calm-down.png 735w, https://meganhallier.com/wp-content/uploads/2019/04/How-to-calm-down-200x300.png 200w, https://meganhallier.com/wp-content/uploads/2019/04/How-to-calm-down-683x1024.png 683w, https://meganhallier.com/wp-content/uploads/2019/04/How-to-calm-down-20x30.png 20w" sizes="(max-width: 532px) 100vw, 532px" /&gt;</span></noscript></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">&nbsp;</span></p><span data-dcnode-id="923" instrument_node="">
</span><h5 data-dcnode-id="920"><strong data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Get clean</span></strong></h5><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">&nbsp;</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="915" instrument_node="">Have a shower or run a bath but make it an </span><em data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">experience</span></em><span data-dcnode-id="912" instrument_node="">.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">&nbsp;</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Fill the bath with bubbles, allow the steam from the shower to soak into your pores, bundle yourself up in a warm, fluffy towel afterwards.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">&nbsp;</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="900" instrument_node="">Often it is the simple things that bring the most pleasure. For example, when I want to feel especially </span><em data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">luxurious</span></em><span data-dcnode-id="897" instrument_node=""> I take the time to moisterize properly. I find the nicest, sweetest-smelling body lotion and I make myself soft all over. </span><em data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Simple, but delightful.</span></em></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">&nbsp;</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">&nbsp;</span></p><span data-dcnode-id="887" instrument_node="">
