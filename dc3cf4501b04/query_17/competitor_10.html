</span><p data-dcnode-id="769"><span data-dcnode-id="773" instrument_node="">Being sad is a normal human reaction and one that I am sure you experience from time to time. Here is a list of 80 </span><strong data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">things to cheer you up </span></strong><span data-dcnode-id="770" instrument_node="">to reference whenever you feel like you need a little pick me up. </span></p><span data-dcnode-id="768" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="764"><noscript data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">&lt;img width="683" height="1024" src="https://ladyandtheblog.com/wp-content/uploads/2020/06/things-to-cheer-you-up-683x1024.png" alt="things to cheer you up" class="wp-image-133587" srcset="https://ladyandtheblog.com/wp-content/uploads/2020/06/things-to-cheer-you-up-683x1024.png 683w, https://ladyandtheblog.com/wp-content/uploads/2020/06/things-to-cheer-you-up-200x300.png 200w, https://ladyandtheblog.com/wp-content/uploads/2020/06/things-to-cheer-you-up-640x960.png 640w, https://ladyandtheblog.com/wp-content/uploads/2020/06/things-to-cheer-you-up.png 735w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="things to cheer you up" class="wp-image-133587 lazyload" data-dcnode-id="765" data-pin-media="https://ladyandtheblog.com/wp-content/uploads/2020/06/things-to-cheer-you-up.png" data-src="https://ladyandtheblog.com/wp-content/uploads/2020/06/things-to-cheer-you-up-683x1024.png" data-srcset="https://ladyandtheblog.com/wp-content/uploads/2020/06/things-to-cheer-you-up-683x1024.png 683w, https://ladyandtheblog.com/wp-content/uploads/2020/06/things-to-cheer-you-up-200x300.png 200w, https://ladyandtheblog.com/wp-content/uploads/2020/06/things-to-cheer-you-up-640x960.png 640w, https://ladyandtheblog.com/wp-content/uploads/2020/06/things-to-cheer-you-up.png 735w" data-trellis-processed="1" height="1024" id="mv-trellis-img-1" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ladyandtheblog.com/wp-content/uploads/2020/06/things-to-cheer-you-up-683x1024.png&amp;raw" srcset="https://ladyandtheblog.com/wp-content/uploads/2020/06/things-to-cheer-you-up-683x1024.png 683w, https://ladyandtheblog.com/wp-content/uploads/2020/06/things-to-cheer-you-up-200x300.png 200w, https://ladyandtheblog.com/wp-content/uploads/2020/06/things-to-cheer-you-up-640x960.png 640w, https://ladyandtheblog.com/wp-content/uploads/2020/06/things-to-cheer-you-up.png 735w" width="683"></figure><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">We’ve all been there – that downward spiral that feels like mud and is almost impossible to free ourselves from mentally. Well, even when it’s raining out, you can always find a rainbow or a bit of sunshine at the end of the day. </span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">It’s that positive attitude that will flip things around and I am here to showcase 80 different things to brighten your mood for the next time you feel a bit down. </span></p><span data-dcnode-id="757" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="753"><noscript data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">&lt;img loading="lazy" width="683" height="1024" src="https://ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home-683x1024.png" alt="how can i cheer myself up at home" class="wp-image-133589" srcset="https://ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home-683x1024.png 683w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home-200x300.png 200w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home-768x1152.png 768w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home-640x960.png 640w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home.png 1000w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="how can i cheer myself up at home" class="wp-image-133589 lazyload" data-dcnode-id="754" data-pin-media="https://ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home.png" data-src="https://ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home-683x1024.png" data-srcset="https://ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home-683x1024.png 683w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home-200x300.png 200w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home-768x1152.png 768w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home-640x960.png 640w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home.png 1000w" data-trellis-processed="1" height="1024" id="mv-trellis-img-2" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home-683x1024.png&amp;raw" srcset="https://ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home-683x1024.png 683w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home-200x300.png 200w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home-768x1152.png 768w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home-640x960.png 640w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-can-i-cheer-myself-up-at-home.png 1000w" width="683"></figure><span data-dcnode-id="752" instrument_node="">
</span><h2 data-dcnode-id="750" id="h-how-can-i-cheer-myself-up-at-home"><span data-dcnode-id="751" instrument_node="">How can I cheer myself up at home?</span></h2><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="748" instrument_node="">After spending the last few months in my house, I can say with certainty that it is possible to cheer yourself up at home. I used to think that you needed to get out of the house to find joy, but now I know that everything you need to find peace and happiness comes from within and with the </span><a data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ladyandtheblog.com/simple-pleasures-in-life/"><span data-dcnode-id="747" instrument_node="">simple pleasures in life</span></a><span data-dcnode-id="745" instrument_node="">. </span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">It doesn’t always have to be about meditation and a bubble bath. I’m someone that loves to do sudoku puzzles and if I make time for that little hobby, then I really can change my mental state. Self care can take on many different forms. </span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="739" instrument_node="">I think the main thing that you have to do is acknowledge that something is wrong and then address it.  You know what brings you joy. Are you someone that likes to work off of a </span><a data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ladyandtheblog.com/guilty-pleasures-list/"><span data-dcnode-id="738" instrument_node="">guilty pleasures list</span></a><span data-dcnode-id="736" instrument_node=""> or are you more of a napper? Do you! </span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="733" instrument_node="">Related: </span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ladyandtheblog.com/stop-making-excuses/"><span data-dcnode-id="732" instrument_node="">7 Ways to Stop Making Excuses</span></a></p><span data-dcnode-id="729" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="725"><noscript data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">&lt;img loading="lazy" width="683" height="1024" src="https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-cheer-up-683x1024.png" alt="how to cheer up" class="wp-image-133588" srcset="https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-cheer-up-683x1024.png 683w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-cheer-up-200x300.png 200w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-cheer-up-640x960.png 640w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-cheer-up.png 735w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="how to cheer up" class="wp-image-133588 lazyload" data-dcnode-id="726" data-pin-media="https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-cheer-up.png" data-src="https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-cheer-up-683x1024.png" data-srcset="https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-cheer-up-683x1024.png 683w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-cheer-up-200x300.png 200w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-cheer-up-640x960.png 640w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-cheer-up.png 735w" data-trellis-processed="1" height="1024" id="mv-trellis-img-3" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ladyandtheblog.com/wp-content/uploads/2020/06/how-to-cheer-up-683x1024.png&amp;raw" srcset="https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-cheer-up-683x1024.png 683w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-cheer-up-200x300.png 200w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-cheer-up-640x960.png 640w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-cheer-up.png 735w" width="683"></figure><span data-dcnode-id="724" instrument_node="">
</span><h2 data-dcnode-id="722" id="h-80-things-to-cheer-you-up-when-you-are-feeling-down"><span data-dcnode-id="723" instrument_node="">80 Things To Cheer You Up When You Are Feeling Down</span></h2><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Here are 80 different things to cheer you up the next time you lose yourself to negative speak. Read through the entire list and pick what feels right for you today! </span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">The next time you are having a bad day, you might need to choose something else. </span></p><span data-dcnode-id="715" instrument_node="">
</span><ol data-dcnode-id="542"><li data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Your favorite drink</span></li><li data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Time spent with family</span></li><li data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Time spent with your best friends</span></li><li data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Write a gratitude list</span></li><li data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Listen to your favorite music</span></li><li data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Go on a nature walk</span></li><li data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Smile more</span></li><li data-dcnode-id="698"><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ladyandtheblog.com/mindful-exercises-for-kids/"><span data-dcnode-id="700" instrument_node="">Practice mindfulness</span></a></li><li data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Double scoops of your favorite ice cream</span></li><li data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Stop being so hard on yourself – eliminate negative speak</span></li><li data-dcnode-id="690"><span data-dcnode-id="693" instrument_node="">Use </span><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ladyandtheblog.com/daily-affirmations-for-kids/"><span data-dcnode-id="692" instrument_node="">positive affirmations</span></a></li><li data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Binge watch a few series on Netflix</span></li><li data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Spend the morning outdoors</span></li><li data-dcnode-id="682"><span data-dcnode-id="685" instrument_node="">Work on your </span><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ladyandtheblog.com/bucket-list-top-100-travel-ideas/"><span data-dcnode-id="684" instrument_node="">travel bucket list</span></a></li><li data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Spend time with a pet</span></li><li data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Make a list of your best qualities – don’t be shy</span></li><li data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Get out in public and just listen people watch</span></li><li data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Plan your dream vacation</span></li><li data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Look through old photos and memories</span></li><li data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Cook an elaborate dinner</span></li><li data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Better yet, order in an elaborate dinner</span></li><li data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Have a nice, hot bubble bath</span></li><li data-dcnode-id="662"><span data-dcnode-id="665" instrument_node="">Practice </span><a data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ladyandtheblog.com/headspace-meditation-app-helps-calm-the-mind-body-and-soul-plus-40-off-code/"><span data-dcnode-id="664" instrument_node="">meditation</span></a></li><li data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Call an old friend</span></li><li data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Do not go on social media for the rest of the day</span></li><li data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Clean your house (it does help, I promise)</span></li><li data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Create donation bags for those in need</span></li><li data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Do an at-home fitness class</span></li><li data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Cry and let it all out</span></li><li data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Hug someone for a long time</span></li><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Journal your feelings</span></li><li data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Go for a long walk</span></li><li data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Get dressed up</span></li><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Do your hair and makeup </span></li><li data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Have a great laugh</span></li><li data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Read a great book</span></li><li data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Spend the day doing crossword puzzles</span></li><li data-dcnode-id="629"><span data-dcnode-id="633" instrument_node="">Lose yourself in your </span><em data-dcnode-id="630"><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ladyandtheblog.com/apps-to-play-with-friends/"><span data-dcnode-id="632" instrument_node="">apps to play with friends</span></a></em></li><li data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Head into the city for a day of fun</span></li><li data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Create a vision board</span></li><li data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Surround yourself with positive people</span></li><li data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Go shopping</span></li><li data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Read a few good jokes</span></li><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Have a full-blown break from the world</span></li><li data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">THINK happy thoughts</span></li><li data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Sweep the front of your house</span></li><li data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Get some vitamin D – head to the beach</span></li><li data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Take a power nap</span></li><li data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Reward yourself</span></li><li data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Ask for help</span></li><li data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Break from your typical routine</span></li><li data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Go to church</span></li><li data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Do some gardening</span></li><li data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Buy concert tickets for your favorite band</span></li><li data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">String some LED lights around your room and change the way the space feels</span></li><li data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Spend the day going to garage sales</span></li><li data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Write a letter to someone you need to forgive</span></li><li data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Paint a room</span></li><li data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Wear sexy lingerie underneath your clothing</span></li><li data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Rearrange furniture</span></li><li data-dcnode-id="581"><span data-dcnode-id="584" instrument_node="">Get a new </span><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ladyandtheblog.com/60-hobbies-for-couples-to-help-strengthen-your-relationship/"><span data-dcnode-id="583" instrument_node="">hobby for adults</span></a></li><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Buy fresh flowers</span></li><li data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Create several lists of things you want to do </span></li><li data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Have a one-person dance party</span></li><li data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Buy your favorite childhood cereal and eat a full bowl</span></li><li data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Lean into the emotions you are having and accept them</span></li><li data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Acknowledge that you need a mental shift and it’s in your hands to make it happen</span></li><li data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Visit grandma</span></li><li data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Talk to a therapist if you need to</span></li><li data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Say thank you to everyone you see today</span></li><li data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Buy something totally silly for the house</span></li><li data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Wear a fuzzy robe and slippers all-day</span></li><li data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Light a candle with your favorite scent</span></li><li data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Try to solve a 1000 piece puzzle</span></li><li data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Make yourself some homemade waffles or pancakes</span></li><li data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Take a BuzzFeed Quiz</span></li><li data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Do a small good deed</span></li><li data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Look at a calendar and remember tomorrow is a new day</span></li><li data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Try breathing exercises</span></li><li data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Take on a creative new project</span></li></ol><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">I could probably add 100 more things to cheer you up to this post, but I will stop here. I have a feeling that you have thought of some ideas of your own by now. </span></p><span data-dcnode-id="538" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="534"><noscript data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">&lt;img loading="lazy" width="683" height="1024" src="https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood-683x1024.png" alt="how to perk up mood" class="wp-image-133590" srcset="https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood-683x1024.png 683w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood-200x300.png 200w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood-768x1152.png 768w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood-640x960.png 640w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood.png 1000w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="how to perk up mood" class="wp-image-133590 lazyload" data-dcnode-id="535" data-pin-media="https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood.png" data-src="https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood-683x1024.png" data-srcset="https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood-683x1024.png 683w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood-200x300.png 200w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood-768x1152.png 768w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood-640x960.png 640w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood.png 1000w" data-trellis-processed="1" height="1024" id="mv-trellis-img-4" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood-683x1024.png&amp;raw" srcset="https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood-683x1024.png 683w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood-200x300.png 200w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood-768x1152.png 768w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood-640x960.png 640w, https://ladyandtheblog.com/wp-content/uploads/2020/06/how-to-perk-up-mood.png 1000w" width="683"></figure><span data-dcnode-id="533" instrument_node="">
</span><h2 data-dcnode-id="531" id="h-how-can-i-perk-up-my-mood"><span data-dcnode-id="532" instrument_node="">How can I perk up my mood?</span></h2><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="529" instrument_node="">Are you ready to </span><strong data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">perk up your mood</span></strong><span data-dcnode-id="526" instrument_node=""> using this list and start </span><strong data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">finally feeling good</span></strong><span data-dcnode-id="523" instrument_node="">? It’s all about taking control of your mental state and making the first move. </span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="520" instrument_node="">What you decide to do on this list really doesn’t matter – it’s all about feeling good while in the moment and that is a </span><strong data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">mental choice</span></strong><span data-dcnode-id="517" instrument_node="">.</span></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="514" instrument_node="">If you are up for it, you could even take the </span><a data-dcnode-id="512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ladyandtheblog.com/30-day-positivity-challenge/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="513" instrument_node="">30 Day Positivity Challenge</span></a><span data-dcnode-id="511" instrument_node=""> once you have exhausted the above things to cheer you up list! That could be your next move. Maybe tomorrow! LOL! </span></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="508" instrument_node="">Right now, get some fresh air, help someone, maybe hit up a thrift store, call a friend, and realize that you are in control of your life. It will put a</span><strong data-dcnode-id="506"><span data-dcnode-id="507" instrument_node=""> smile on your face</span></strong><span data-dcnode-id="505" instrument_node=""> – for sure! </span></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="499"><strong data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Call a friend</span></strong><span data-dcnode-id="500" instrument_node=""> or a loved one and get some human contact! And if none of this works, then maybe talk to a therapist because trained professionals can work wonders. Sometimes we can’t always fix everything. Believe me, I know. </span></p><span data-dcnode-id="498" instrument_node="">
