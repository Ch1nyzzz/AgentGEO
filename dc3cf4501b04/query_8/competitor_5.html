</span></div></div><div class="widget widget--social noprint" data-dcnode-id="2074"></div></header><p data-dcnode-id="2069"><span data-dcnode-id="2072" instrument_node="">Toxic positivity. It’s the new buzzword for the year, it seems. Our DMs and emails have blown up with questions about toxic positivity in grief recently. </span><em data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Is this an example of toxic positivity? What is the difference between positivity and toxic positivity? If I’m focusing on gratitude, is that actually bad? Is positivity hurting my grief? If positive psychology is good, why is positivity bad? Is toxic positivity real?</span></em></p><p data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">It’s confusing, I know! We’re going to try to clear up some of the questions here. But in case you make it no further than this sentence, let me make one thing very clear: all positivity is NOT “toxic positivity” and positivity is NOT bad in grief. In fact, it can be really important. Now, I hope you’ll keep with us, but at least we have that out of the way.</span></p><hr class="wp-block-separator is-style-wide" data-dcnode-id="2066"><h3 data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">What is “toxic positivity”</span></h3><p data-dcnode-id="2059"><span data-dcnode-id="2063" instrument_node="">There is no singular definition for ‘toxic positivity’. It isn’t a psychological or academic term. But there is a pretty well agreed upon gist: toxic positivity is promoting the ideal or goal that, no matter the circumstances, one should always and only maintain a positive, happy or optimistic mindset. As a griever, I am </span><em data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">sure</span></em><span data-dcnode-id="2060" instrument_node=""> you know what we’re talking about. No matter your loss and it’s devastating grief aftermath, you’ve probably heard plenty of people encouraging you to just “stay positive”, “focus on gratitude”, “look on the bright side”, etc.&nbsp;</span></p><hr class="wp-block-separator is-style-wide" data-dcnode-id="2058"><h3 data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Why does it seem like suddenly everyone is talking about toxic positivity?</span></h3><p data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Good question. The “good vibes only” attitude is not new, so on the surface it may seem strange that it is only gaining notoriety (and strong social media push back) lately. Though I can’t say for sure why this is, I have a strong feeling 2020 had a little something to do with it. For the first time, we as a collective society were going through something terrible. All of a sudden all of those “just be positive” and “what you believe is what you’ll manifest” social media images started looking *pretty* obnoxious and tone deaf.</span></p><p data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Now, we grievers have been yelling this from the rooftops for quite some time now, I know. We’ve been trying to explain that we can’t positive-vibe our way out of grief, often to a crowd of friends saying things like, “you’re amazing, you’re strong, you’re going to land on your feet, just get back to the gym and think good thoughts and you’ll be back to normal in no time!”. It felt like they would never “get it”. Until 2020, when suddenly some people started to understand why this language wasn’t useful. It turns out being amazing and thinking good thoughts while taking a walk doesn’t solve everything.</span></p><hr class="wp-block-separator is-style-wide" data-dcnode-id="2051"><h3 data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Positivity is not a dirty word (and not all positivity is toxic positivity)</span></h3><p data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">Now, I have to be honest. On the one hand, I’m thrilled there is a new recognition that it isn’t helpful to tell people their problem is that they just aren’t being positive enough (and if they were they would have already manifested their best life). On the other hand, I think there is a danger that all this hype around “toxic positivity” puts us at risk of ignoring the incredible, evidence-based value of positivity. We don’t want this to be a situation of throwing the baby out with the bathwater.</span></p><p data-dcnode-id="2042"><span data-dcnode-id="2046" instrument_node="">Here is the thing, toxic positivity encourages us to </span><em data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">ignore or deny</span></em><span data-dcnode-id="2043" instrument_node=""> things that are hard, painful, overwhelming, difficult, confusing, etc. It says, “ignore the storm, focus on the rainbow. And even if you don’t see a rainbow, pretend you do. If you pretend long enough and hard enough, a rainbow will finally appear. And if it doesn’t, it must be because you weren’t trying hard enough”.</span></p><p data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">But here is the thing about rainbows – they require the storm. (Man, normally we hate rainbow analogies around here. Sorry, but it just kind of works in this case). They don’t require us to deny the storm, ignore the storm, or avoid the store.</span></p><p data-dcnode-id="2036"><span data-dcnode-id="2039" instrument_node="">Regular-old-positivity, it allows us to acknowledge the storm. Regular positivity creates a space where we recognize that life can be both ugly and messy and hard and dark and complicated. But, at the same time, it can also have moments of joy, hope, gratitude, and optimism. In our darkest moments, this kind of positivity is hugely beneficial and </span><a data-dcnode-id="2037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/doi/pdf/10.1080/15325020902724271%3FneedAccess%3Dtrue%26"><span data-dcnode-id="2038" instrument_node="">research has shown us the benefits of positivity in grief, time and again.</span></a></p><hr class="wp-block-separator is-style-wide" data-dcnode-id="2035"><h3 data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Positivity in grief</span></h3><p data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Toxic positivity in grief tells us grief is a dirty word and our goal should be to put a smile on and get back to “normal”.  When you stop and think about it, it really is an unreasonable task. It is asking you to repeat and believe something when there is clear evidence to the contrary. “Life is great!”. We can only say that and try to believe it for so long before wanting to scream “my husband is dead! Life is not great!”.</span></p><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-4-3 wp-has-aspect-ratio" data-dcnode-id="2027"><div class="wp-block-embed__wrapper" data-dcnode-id="2028"><span data-dcnode-id="2030" instrument_node=""> </span><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lazyloaded" data-dcnode-id="2029" data-src="https://www.youtube.com/embed/WBMTH-4B2NI?feature=oembed" frameborder="0" height="375" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" title="&quot;Serenity now, insanity later&quot;" width="500"></iframe></div></figure><p data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Positivity in grief allows us to say, “my life has been shattered, it will now never be the life I wanted, expected, or hoped for. But that doesn’t mean it will never be joyful, meaningful, or purposeful again”. Positivity allows us to say that sometimes we can feel hopeless and hopeful all at once. Sometimes we can feel total despair and still find small moments of gratitude. Sometimes we can say, “I have no idea how I am still surviving. But, I am grateful I opened my eyes this morning. I got out of bed and I am going to do it again tomorrow”. Positivity does not ask us to deny the problems.</span></p><hr class="wp-block-separator is-style-wide" data-dcnode-id="2024"><h3 data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Humanity is about feeling the full range of human emotions.</span></h3><p data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">We have said it 100 times before. We will say it 100 times again: emotions aren’t good or bad, they just are. Yes, what we DO with those emotions can cause us trouble. But it is crucial that we allow ourselves to experience our feelings, the hardest ones and the easiest ones. It is equally important that we feel we can express those emotions without someone telling us to stop being so negative.</span></p><p data-dcnode-id="2015"><span data-dcnode-id="2019" instrument_node="">In his book, </span><a data-dcnode-id="2017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3oYjjtP"><span data-dcnode-id="2018" instrument_node="">A Liberated Mind</span></a><span data-dcnode-id="2016" instrument_node="">, Steven Hayes (founder of Acceptance and Commitment Therapy, one of our favorite types of therapy) says, “psychological flexibility is the ability to feel and think with openness, to attend voluntarily to your experience of the present moment, and to move your life in directions that are important to you, building habits that allow you to live life in accordance with your values and aspirations. It’s about learning not to turn away from what is painful, instead turning toward your suffering in order to live a life full of meaning and purpose.” Needless to say, Hayes was calling out “toxic positivity” long before it was cool.</span></p><p data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">He reminds us that our suffering is often part of what allows us to move toward our purpose and meaning. Learning to be with our suffering while still taking actions that are consistent with our values is the stuff of living.</span></p><hr class="wp-block-separator is-style-wide" data-dcnode-id="2012"><h3 data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">Well-being is not about happiness. It is not even about everything being well.</span></h3><p data-dcnode-id="2003"><span data-dcnode-id="2009" instrument_node="">Another psychology guy we love around here is Martin Seligman. In </span><a data-dcnode-id="2007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/35TDdPj"><span data-dcnode-id="2008" instrument_node="">his book “Flourish: A Visionary New Understanding for Happiness and Well-Being</span></a><a data-dcnode-id="2005" href="flourish:%20A%20Visionary%20New%20Understanding%20for%20Happiness%20and%20Well-Being%22"><span data-dcnode-id="2006" instrument_node="">“</span></a><span data-dcnode-id="2004" instrument_node=""> he makes an important distinction between happiness and wellbeing. He says that those who live with the ideal of a happiness principle focus just on increasing happiness (satisfaction) while eliminating things that detract from it. He suggests, in a world filled with things we cannot control that may decrease happiness and satisfaction, that it is crucial that we look to our well-being. This is about our relationship with our thoughts and feelings.</span></p><p data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">A sense of well-being, he says, is not just about having positive emotion. Rather, he says it is about a life that also includes engagement, relationships, meaning and purpose, and accomplishment. These things will not always be easy or bring us a sense of happiness. There will be moments of devastation and despair. But a strong sense of well-being will allow us to sit with those emotions and have confidence that they are not a failure, but a part of life; they are storms we will weather, with faith in our ability to survive.</span></p><hr class="wp-block-separator is-style-wide" data-dcnode-id="2000"><h3 data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">Toxic positivity can come from the inside.</span></h3><p data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Though there is a lot of hype about external messages of toxic positivity, we can internalize these. Many times in grief we tell ourselves we should ignore the difficult stuff, focus on the positive. We may try to distract away from the hard emotions, looking to keep busy. We might become hyper-aware of gratitude, growth, and strength. The key is balance. Listen for the voice in yourself that might be pushing you to avoid and push back. Remind yourself that there is not only space for the hard stuff and the positive stuff, but we are most honest and human when we feel both. When all else fails, watch/re-watch Inside Out to remind yourself that we need to feel all the feelings (thanks Pixar!).</span></p><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="1992"><div class="wp-block-embed__wrapper" data-dcnode-id="1993"><span data-dcnode-id="1995" instrument_node=""> </span><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lazyloaded" data-dcnode-id="1994" data-src="https://www.youtube.com/embed/seMwpP0yeu4?feature=oembed" frameborder="0" height="281" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" title="Inside Out Official Trailer #2 (2015) - Disney Pixar Movie HD" width="500"></iframe></div></figure><hr class="wp-block-separator is-style-wide" data-dcnode-id="1991"><h3 data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">Toxic negativity can come from the inside too.</span></h3><p data-dcnode-id="1984"><span data-dcnode-id="1988" instrument_node="">It is an all too common symptom of grief to want to stay in our deepest, darkest pain. Weird, I know. But sometimes we think our</span><a data-dcnode-id="1986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whatsyourgrief.com/grief-and-the-fear-of-letting-go/"><span data-dcnode-id="1987" instrument_node=""> pain is the only thing that connects us to our loved one.</span></a><span data-dcnode-id="1985" instrument_node=""> [It isn’t]. Sometimes we think our pain is the only reminder to us and those around us of how important our loved one’s life was. Sometimes we can start to feel comfortable in our pain.</span></p><p data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">In these instances, we buck against all positivity, not just toxic positivity. We think if we acknowledge and positivity it means forgetting our loss. Remember, positivity and pain can live side by side. Neither cancels out the other. Finding hope, gratitude, or positivity never takes away from the significance of our loved ones life, death, or our grief. Instead, that positivity allows us to know that we can bring our loved one and our grief with us as we move forward in a life with  meaning and purpose.</span></p><hr class="wp-block-separator is-style-wide" data-dcnode-id="1981"><p data-dcnode-id="1978"><strong data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">Subscribe below for a new grief support article each week in your inbox.</span></strong></p><div class="wp-block-media-text alignwide is-stacked-on-mobile has-very-light-gray-background-color has-background" data-dcnode-id="1970" style="grid-template-columns:29% auto"><figure class="wp-block-media-text__media" data-dcnode-id="1974"><img alt="We invite you to share your experiences, questions, and resource suggestions with the WYG community in the discussion section below." class="wp-image-125775 size-full lazy -dcnode-id="1935" instrument_node="">January 18, 2021</span></time></article></div><aside class="show-for-xlarge cell large-3 sidebar sidebar--shop px-4 py-6" data-dcnode-id="1931" role="complementary"></aside></div></section><section class="section section--large section-pad--med bg-color--primary noprint" data-dcnode-id="1751" id="section-5"><div class="section__container" data-dcnode-id="1752"><header class="text-center mb-4" data-dcnode-id="1926"><h3 class="font--sinkinsans-medium text-color--port-gore mb-3" data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Let’s be grief friends.</span></h3></header><div class="text-center wmax-53 mx-auto" data-dcnode-id="1753"><article class="text-size--25 text-color--port-gore mb-5" data-dcnode-id="1923"><p data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">We post a new article to What’s Your Grief about once a week. Subscribe to stay up to date on all our posts.</span></p></article><span data-dcnode-id="1922" instrument_node=""> </span><noscript class="ninja-forms-noscript-message" data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node=""> Notice: JavaScript is required for this content.</span></noscript><div aria-describedby="nf-form-errors-4" aria-labelledby="nf-form-title-4" aria-live="polite" class="nf-form-cont form form--subscribe" data-dcnode-id="1764" id="nf-form-4-cont" role="form"><span class="nf-form-title" data-dcnode-id="1918" id="nf-form-title-4"><span data-dcnode-id="1919" instrument_node="">

node="">January 8, 2022 at 5:38 pm </span></small><span data-dcnode-id="1462" instrument_node=""> </span><span class="font-weight--7 text--upper" data-dcnode-id="1459"><a aria-label="Reply to Diana Clutter" class="comment-reply-link" data-belowelement="comment-191814" data-commentid="191814" data-dcnode-id="1460" data-postid="137846" data-replyto="Reply to Diana Clutter" data-respondelement="respond" href="#comment-191814" rel="nofollow"><span data-dcnode-id="1461" instrument_node="">Reply</span></a></span></p><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">I don’t even know where to start my son bipolar ADHD ODD AND CONDUCT DISORDER Shot and killed himself August 2 2021  That just about killed me inside I still have a hard time believing it</span></p><div class="cld-like-dislike-wrap cld-template-2" data-dcnode-id="1444"><div class="cld-like-wrap cld-common-wrap" data-dcnode-id="1445"><span data-dcnode-id="1455" instrument_node=""> </span><a class="cld-like-trigger cld-like-dislike-trigger" data-already-liked="0" data-comment-id="191814" data-dcnode-id="1449" data-restriction="cookie" data-trigger-type="like" href="javascript:void(0)" title=""><span data-dcnode-id="1454" instrument_node=""> </span><svg aria-hidden="true" class="svg-inline--fa fa-heart fa-w-16" data-dcnode-id="1452" data-fa-i2svg="" data-icon="heart" data-prefix="fas" role="img" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z" data-dcnode-id="1453" fill="currentColor"></path></svg><span data-dcnode-id="1450" instrument_node=""> </span></a><span data-dcnode-id="1448" instrument_node=""> </span><span class="cld-like-count-wrap cld-count-wrap" data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node=""> </span></span></div></div></div><div class="comment__arrow" data-dcnode-id="1418"><span data-dcnode-id="1442" instrument_node=""> </span><svg data-dcnode-id="1419" height="96.813" viewBox="0 0 96.813 96.813" width="96.813" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"></svg><span data-dcnode-id="1441" instrument_node=""> </span><defs data-dcnode-id="1426"><span data-dcnode-id="1440" instrument_node=""> </span><filter data-dcnode-id="1428" filterunits="userSpaceOnUse" height="96.813" id="Path_90" width="96.813" x="0" y="0"><span data-dcnode-id="1439" instrument_node=""> </span><feoffset data-dcnode-id="1438" input="SourceAlpha"></feoffset><span data-dcnode-id="1437" instrument_node=""> </span><fegaussianblur data-dcnode-id="1436" result="blur" stddeviation="5"></fegaussianblur><span data-dcnode-id="1435" instrument_node=""> </span><feflood data-dcnode-id="1434" flood-opacity="0.161"></feflood><span data-dcnode-id="1433" instrument_node=""> </span><fecomposite data-dcnode-id="1432" in2="blur" operator="in"></fecomposite><span data-dcnode-id="1431" instrument_node=""> </span><fecomposite data-dcnode-id="1430" in="SourceGraphic"></fecomposite><span data-dcnode-id="1429" instrument_node=""> </span></filter><span data-dcnode-id="1427" instrument_node=""> </span></defs><span data-dcnode-id="1425" instrument_node=""> </span><g data-dcnode-id="1421" filter="url(#Path_90)" transform="matrix(1, 0, 0, 1, 0, 0)"><span data-dcnode-id="1424" instrument_node=""> </span><path d="M30.49,34.488S49.028,4.868,60,.12c-31.414-1.668-60,14.6-60,14.6" data-dcnode-id="1423" data-name="Path 90" fill="#fff" id="Path_90-2" transform="translate(57.43 81.81) rotate(-135)"></path><span data-dcnode-id="1422" instrument_node=""> </span></g><span data-dcnode-id="1420" instrument_node=""> </span></div></div></article></li><li class="comment depth-1" data-dcnode-id="1350" id="comment-116797"><article class="media-object stack-for-small" data-dcnode-id="1351"><div class="media-object-section pos--relative" data-dcnode-id="1352"><div class="comment__box" data-dcnode-id="1378"><p class="text-size--16 text-color--dolphin" data-dcnode-id="1405"><strong data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Gilles</span></strong><span data-dcnode-id="1412" instrument_node="">&nbsp; </span><small class="" data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">May 21, 2021 at 8:18 am </span></small><span data-dcnode-id="1409" instrument_node=""> </span><span class="font-weight--7 text--upper" data-dcnode-id="1406"><a aria-label="Reply to Gilles" class="comment-reply-link" data-belowelement="comment-116797" data-commentid="116797" data-dcnode-id="1407" data-postid="137846" data-replyto="Reply to Gilles" data-respondelement="respond" href="#comment-116797" rel="nofollow"><span data-dcnode-id="1408" instrument_node="">Reply</span></a></span></p><p data-dcnode-id="1401"><span data-dcnode-id="1404" instrument_node="">GB,</span><br data-dcnode-id="1403"><span data-dcnode-id="1402" instrument_node=""> Your situation sounds similar to mine. My late wife and I were married just short of 23 yrs. My wife had a very rare immune disorder and by the time she was 21 she had had open heart surgery twice, lost the use of one lung and because of medication lost the ability to have children. She was divorced when we had met.</span></p><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">In 16 days it will be the 4 yr anniversary of her passing. Because her immune disorder (so rare that at the time of diagnosis she was the 4th known case in the world) her stomach cancer was hidden. All the symptoms of her stomach cancer pointed to side effects of her illness or the medications for her illness which in turn had the doctors chasing the wrong things. By the time she was finally admitted it was too late and she died 8 days after being admitted to the hospital. So many toxic statements floated in and out in so many ways. We have church/faith roots so “she’s in a better place now”, “at least she’s not suffering” (yes but I am), “at least you had the time you had together” and numerous others.</span></p><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">It is so hard when you try to move forward when you just want them back. I also lost both my parents to cancer and I am trying to deal with an 18 yr old high school dropout that is in denial with regard to mental health issues that he has been diagnosed with.</span></p><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Positivity can help a bit to keep focus on the good around you but when it distracts from dealing with the hard things in your life that’s when it becomes toxic. I have been working with a psychologist now for close to a year, which I have come to depend on her, good or bad, to work through life.</span></p><p data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">I am former military and where I live I enjoy but I have almost no support structure. I have little to no support or good relationship with my family (only have one brother and one sister). I wouldn’t say that my in-laws are useless to me but they don’t contact me or stay in touch with us.</span></p><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">So much I could go on about. The easiest way to say it is that it is hard. We find ways through an up and down battle that oftentimes feels impossible.</span></p><div class="cld-like-dislike-wrap cld-template-2" data-dcnode-id="1379"><div class="cld-like-wrap cld-common-wrap" data-dcnode-id="1380"><span data-dcnode-id="1390" instrument_node=""> </span><a class="cld-like-trigger cld-like-dislike-trigger" data-already-liked="0" data-comment-id="116797" data-dcnode-id="1384" data-restriction="cookie" data-trigger-type="like" href="javascript:void(0)" title=""><span data-dcnode-id="1389" instrument_node=""> </span><svg aria-hidden="true" class="svg-inline--fa fa-heart fa-w-16" data-dcno ""> </span><g data-dcnode-id="1356" filter="url(#Path_90)" transform="matrix(1, 0, 0, 1, 0, 0)"><span data-dcnode-id="1359" instrument_node=""> </span><path d="M30.49,34.488S49.028,4.868,60,.12c-31.414-1.668-60,14.6-60,14.6" data-dcnode-id="1358" data-name="Path 90" fill="#fff" id="Path_90-2" transform="translate(57.43 81.81) rotate(-135)"></path><span data-dcnode-id="1357" instrument_node=""> </span></g><span data-dcnode-id="1355" instrument_node=""> </span></div></div></article></li><li class="comment depth-1" data-dcnode-id="1188" id="comment-81659"><article class="media-object stack-for-small" data-dcnode-id="1189"><div class="media-object-section pos--relative" data-dcnode-id="1190"><div class="comment__box" data-dcnode-id="1325"><p class="text-size--16 text-color--dolphin" data-dcnode-id="1340"><strong data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Reid Peterson</span></strong><span data-dcnode-id="1347" instrument_node="">&nbsp; </span><small class="" data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">January 20, 2021 at 12:55 pm </span></small><span data-dcnode-id="1344" instrument_node=""> </span><span class="font-weight--7 text--upper" data-dcnode-id="1341"><a aria-label="Reply to Reid Peterson" class="comment-reply-link" data-belowelement="comment-81659" data-commentid="81659" data-dcnode-id="1342" data-postid="137846" data-replyto="Reply to Reid Peterson" data-respondelement="respond" href="#comment-81659" rel="nofollow"><span data-dcnode-id="1343" instrument_node="">Reply</span></a></span></p><p data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Hi, thank you for your article. Do you think that Toxic Positivity is strongly associated with Denial, as in the stage of grief? It seems to me that many grievers don’t want to feel the pain because it’s difficult to see the benefits of leaning in or as Steven Hayes states “turning towards” the pain itself. It’s easy to numb, ignore, and even deny the more painful emotions of one’s grief.</span></p><div class="cld-like-dislike-wrap cld-template-2" data-dcnode-id="1326"><div class="cld-like-wrap cld-common-wrap" data-dcnode-id="1327"><span data-dcnode-id="1337" instrument_node=""> </span><a class="cld-like-trigger cld-like-dislike-trigger" data-already-liked="0" data-comment-id="81659" data-dcnode-id="1331" data-restriction="cookie" data-trigger-type="like" href="javascript:void(0)" title=""><span data-dcnode-id="1336" instrument_node=""> </span><svg aria-hidden="true" class="svg-inline--fa fa-heart fa-w-16" data-dcnode-id="1334" data-fa-i2svg="" data-icon="heart" data-prefix="fas" role="img" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z" data-dcnode-id="1335" fill="currentColor"></path></svg><span data-dcnode-id="1332" instrument_node=""> </span></a><span data-dcnode-id="1330" instrument_node=""> </span><span class="cld-like-count-wrap cld-count-wrap" data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">2 </span></span></div></div></div><div class="comment__arrow" data-dcnode-id="1300"><span data-dcnode-id="1324" instrument_node=""> </span><svg data-dcnode-id="1301" height="96.813" viewBox="0 0 96.813 96.813" width="96.813" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"></svg><span data-dcnode-id="1323" instrument_node=""> </span><defs data-dcnode-id="1308"><span data-dcnode-id="1322" instrument_node=""> </span><filter data-dcnode-id="1310" filterunits="userSpaceOnUse" height="96.813" id="Path_90" width="96.813" x="0" y="0"><span data-dcnode-id="1321" instrument_node=""> </span><feoffset data-dcnode-id="1320" input="SourceAlpha"></feoffset><span data-dcnode-id="1319" instrument_node=""> </span><fegaussianblur data-dcnode-id="1318" result="blur" s 137846" data-replyto="Reply to Isabelle Siegel" data-respondelement="respond" href="#comment-82298" rel="nofollow"><span data-dcnode-id="1293" instrument_node="">Reply</span></a></span></p><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Reid, this is such an interesting and insightful perspective! I think you’re right: People often try to avoid difficult emotions because they believe they are “bad.” In reality, emotions are neither good nor bad. People must allow themselves to feel whatever it is they need to feel.</span></p><div class="cld-like-dislike-wrap cld-template-2" data-dcnode-id="1276"><div class="cld-like-wrap cld-common-wrap" data-dcnode-id="1277"><span data-dcnode-id="1287" instrument_node=""> </span><a class="cld-like-trigger cld-like-dislike-trigger" data-already-liked="0" data-comment-id="82298" data-dcnode-id="1281" data-restriction="cookie" data-trigger-type="like" href="javascript:void(0)" title=""><span data-dcnode-id="1286" instrument_node=""> </span><svg aria-hidden="true" class="svg-inline--fa fa-heart fa-w-16" data-dcnode-id="1284" data-fa-i2svg="" data-icon="heart" data-prefix="fas" role="img" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z" data-dcnode-id="1285" fill="currentColor"></path></svg><span data-dcnode-id="1282" instrument_node=""> </span></a><span data-dcnode-id="1280" instrument_node=""> </span><span class="cld-like-count-wrap cld-count-wrap" data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">1 </span></span></div></div></div><div class="comment__arrow" data-dcnode-id="1250"><span data-dcnode-id="1274" instrument_node=""> </span><svg data-dcnode-id="1251" height="96.813" viewBox="0 0 96.813 96.813" width="96.813" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http: ata-dcnode-id="1244" instrument_node="">&nbsp; </span><small class="" data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">March 3, 2021 at 1:11 am </span></small><span data-dcnode-id="1241" instrument_node=""> </span><span class="font-weight--7 text--upper" data-dcnode-id="1238"><a aria-label="Reply to Karen" class="comment-reply-link" data-belowelement="comment-92465" data-commentid="92465" data-dcnode-id="1239" data-postid="137846" data-replyto="Reply to Karen" data-respondelement="respond" href="#comment-92465" rel="nofollow"><span data-dcnode-id="1240" instrument_node="">Reply</span></a></span></p><p data-dcnode-id="1233"><span data-dcnode-id="1236" instrument_node="">I would disagree. I think it’s more that those around the person grieving don’t want to see their friend/ loved one in pain. So they try the “fix it” strategy, and try and be positive, in an attempt to take away the pain.</span><br data-dcnode-id="1235"><span data-dcnode-id="1234" instrument_node=""> Also, the “stages of grief” aren’t really important. They weren’t meant to be applied the way they have been historically. Some people may experience denial, some may not. It’s also not linear, more like a giant squiggle, going up, down, side to side, possibly second by second, minute by minute, day by day, month by month, year by year. Grief is messy.</span></p><div class="cld-like-dislike-wrap cld-template-2" data-dcnode-id="1221"><div class="cld-like-wrap cld-common-wrap" data-dcnode-id="1222"><span data-dcnode-id="1232" instrument_node=""> </span><a class="cld-like-trigger cld-like-dislike-trigger" data-already-liked="0" data-comment-id="92465" data-dcnode-id="1226" data-restriction="cookie" data-trigger-type="like" href="javascript:void(0)" title=""><span data-dcnode-id="1231" instrument_node=""> </span><svg aria-hidden="true" class="svg-inline--fa fa-heart fa-w-16" data-dcnode-id="1229" data-fa-i2svg="" data-icon="heart" data-prefix="fas" role="img" viewBox="0 0 512 512" xmlns="h imultaneously. I am focussed on being the best father I can be and keeping myself fit and healthy. Music is helpful; it makes me cry though, but it feels good, as if dignifying my experience and what I’ve lost. It’s really hard, but I am expecting that if I keep working towards the best me I can be, my life will be enjoyable once again. Thanks for the article –  it helped. Mark, Melbourne, Australia.</span></p><div class="cld-like-dislike-wrap cld-template-2" data-dcnode-id="1164"><div class="cld-like-wrap cld-common-wrap" data-dcnode-id="1165"><span data-dcnode-id="1175" instrument_node=""> </span><a class="cld-like-trigger cld-like-dislike-trigger" data-already-liked="0" data-comment-id="81381" data-dcnode-id="1169" data-restriction="cookie" data-trigger-type="like" href="javascript:void(0)" title=""><span data-dcnode-id="1174" instrument_node=""> </span><svg aria-hidden="true" class="svg-inline--fa fa-heart fa-w-16" data-dcnode-id="1172" data-fa-i2svg="" data-icon="heart" data-prefix="fas" role="img" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z" data-dcnode-id="1173" fill="currentColor"></path></svg><span data-dcnode-id="1170" instrument_node=""> </span></a><span data-dcnode-id="1168" instrument_node=""> </span><span class="cld-like-count-wrap cld-count-wrap" data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">2 </span></span></div></div></div><div class="comment__arrow" data-dcnode-id="1138"><span data-dcnode-id="1162" instrument_node=""> </span><svg data-dcnode-id="1139" height="96.813" viewBox="0 0 96.813 96.813" width="96.813" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"></svg><span data-dcnode-id="1161" instrument_node=""> </span><defs data-dcnode-id="1146"><span data-dcnode-id="1160" mplate-2" data-dcnode-id="954"><div class="cld-like-wrap cld-common-wrap" data-dcnode-id="955"><span data-dcnode-id="965" instrument_node=""> </span><a class="cld-like-trigger cld-like-dislike-trigger" data-already-liked="0" data-comment-id="81235" data-dcnode-id="959" data-restriction="cookie" data-trigger-type="like" href="javascript:void(0)" title=""><span data-dcnode-id="964" instrument_node=""> </span><svg aria-hidden="true" class="svg-inline--fa fa-heart fa-w-16" data-dcnode-id="962" data-fa-i2svg="" data-icon="heart" data-prefix="fas" role="img" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z" data-dcnode-id="963" fill="currentColor"></path></svg><span data-dcnode-id="960" instrument_node=""> </span></a><span data-dcnode-id="958" instrument_node=""> </span><span class="cld-like-count-wrap cld-count-wrap" data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">1 </span></span></div></div></div><div class="comment__arrow" data-dcnode-id="928"><span data-dcnode-id="952" instrument_node=""> </span><svg data-dcnode-id="929" height="96.813" viewBox="0 0 96.813 96.813" width="96.813" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"></svg><span data-dcnode-id="951" instrument_node=""> </span><defs data-dcnode-id="936"><span data-dcnode-id="950" instrument_node=""> </span><filter data-dcnode-id="938" filterunits="userSpaceOnUse" height="96.813" id="Path_90" width="96.813" x="0" y="0"><span data-dcnode-id="949" instrument_node=""> </span><feoffset data-dcnode-id="948" input="SourceAlpha"></feoffset><span data-dcnode-id="947" instrument_node=""> </span><fegaussianblur data-dcnode-id="946" result="blur" stddeviation="5"></fegaussianblur><span data-dcnode-id="945" instrument_node=""> </span><feflood data-dcnode-id="944" flood-opacity="0.161"></feflood><span data-dcnode-id="943" instrument_node=""> </span><fecomposite data-dcnode-id="942" in2="blur" operator="in"></fecomposite><span data-dcnode-id="941" instrument_node=""> </span><fecomposite data-dcnode-id="940" in="SourceGraphic"></fecomposite><span data-dcnode-id="939" instrument_node=""> </span></filter><span data-dcnode-id="937" instrument_node=""> </span></defs><span data-dcnode-id="935" instrument_node=""> </span><g data-dcnode-id="931" filter="url(#Path_90)" transform="matrix(1, 0, 0, 1, 0, 0)"><span data-dcnode-id="934" instrument_node=""> </span><path d="M30.49,34.488S49.028,4.868,60,.12c-31.414-1.668-60,14.6-60,14.6" data-dcnode-id="933" data-name="Path 90" fill="#fff" id="Path_90-2" transform="translate(57.43 81.81) rotate(-135)"></path><span data-dcnode-id="932" instrument_node=""> </span></g><span data-dcnode-id="930" instrument_node=""> </span></div></div></article></li></ul></div></article></li><li class="comment depth-1" data-dcnode-id="806" id="comment-81207"><article class="media-object stack-for-small" data-dcnode-id="807"><div class="media-object-section pos--relative" data-dcnode-id="808"><div class="comment__box" data-dcnode-id="894"><p class="text-size--16 text-color--dolphin" data-dcnode-id="911"><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Dee Rhea</span></strong><span data-dcnode-id="918" instrument_node="">&nbsp; </span><small class="" data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">January 19, 2021 at 10:00 am </span></small><span data-dcnode-id="915" instrument_node=""> </span><span class="font-weight--7 text--upper" data-dcnode-id="912"><a aria-label="Reply to Dee Rhea" class="comment-reply-link" data-belowelement="comment-81207" data-commentid="81207" data-dcnode-id="913" data-postid="137846" data-replyto="Reply to Dee Rhea" data-respondelement="respond" href="#comment-81207" rel="nofollow"><span data-dcnode-id="914" instrument_node="">Reply</span></a></span></p><p data-dcnode-id="907"><span data-dcnode-id="910" instrument_node="">I have never heard of toxic positivity, yet this article gave the ability to look back and think “Yes!” People did that to me after I lost my husband of 21 years.  Yet having been in that situation I am left with this one thought. “What do we say?”  I have asked this over and over in my mind. Of course having actually been in this situation I could think about what I wanted people to say and just know. Yet the truth is there was a while that I didn’t want people to say anything. Then there was a time that I wanted people to ask so I could talk about it. I am now getting to a time when I have questions. Tons of them.  Not questions for just anyone but questions for other widows. I have thought about joining a grief group but I am very hesitant.  My biggest question for them would be “what do we say!!”</span><br data-dcnode-id="909"><span data-dcnode-id="908" instrument_node=""> Dee</span></p><div class="cld-like-dislike-wrap cld-template-2" data-dcnode-id="895"><div class="cld-like-wrap cld-common-wrap" data-dcnode-id="896"><span data-dcnode-id="906" instrument_node=""> </span><a class="cld-like-trigger cld-like-dislike-trigger" data-already-liked="0" data-comment-id="81207" data-dcnode-id="900" data-restriction="cookie" data-trigger-type="like" href="javascript:void(0)" title=""><span data-dcnode-id="905" instrument_node=""> </span><svg aria-hidden="true" class="svg-inline--fa fa-heart fa-w-16" data-dcnode-id="903" data-fa-i2svg="" data-icon="heart" data-prefix="fas" role="img" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z" data-dcnode-id="904" fill="currentColor"></path></svg><span data-dcnode-id="901" instrument_node=""> </span></a><span data-dcnode-id="899" instrument_node=""> </span><span class="cld-like-count-wrap cld-count-wrap" data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">3 </span></span></div></div></div><div class="comment__arrow" data-dcnode-id="869"><span data-dcnode-id="893" instrument_node=""> </span><svg data-dcnode-id="870" height="96.813" viewBox="0 0 96.813 96.813" width="96.813" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"></svg><span data-dcnode-id="892" instrument_node=""> </span><defs data-dcnode-id="877"><span data-dcnode-id="891" instrument_node=""> </span><filter data-dcnode-id="879" filterunits="userSpaceOnUse" height="96.813" id="Path_90" width="96.813" x="0" y="0"><span data-dcnode-id="890" instrument_node=""> </span><feoffset data-dcnode-id="889" input="SourceAlpha"></feoffset><span data-dcnode-id="888" instrument_node=""> </span><fegaussianblur data-dcnode-id="887" result="blur" stddeviation="5"></fegaussianblur><span data-dcnode-id="886" instrument_node=""> </span><feflood data-dcnode-id="885" flood-opacity="0.161"></feflood><span data-dcnode-id="884" instrument_node=""> </span><fecomposite data-dcnode-id="883" in2="blur" operator="in"></fecomposite><span data-dcnode-id="882" instrument_node=""> </span><fecomposite data-dcnode-id="881" in="SourceGraphic"></fecomposite><span data-dcnode-id="880" instrument_node=""> </span></filter><span data-dcnode-id="878" instrument_node=""> </span></defs><span data-dcnode-id="876" instrument_node=""> </span><g data-dcnode-id="872" filter="url(#Path_90)" transform="matrix(1, 0, 0, 1, 0, 0)"><span data-dcnode-id="875" instrument_node=""> </span><path d="M30.49,34.488S49.028,4.868,60,.12c-31.414-1.668-60,14.6-60,14.6" data-dcnode-id="874" data-name="Path 90" fill="#fff" id="Path_90-2" transform="translate(57.43 81.81) rotate(-135)"></path><span data-dcnode-id="873" instrument_node=""> </span></g><span data-dcnode-id="871" instrument_node=""> </span></div><ul class="list list--clear children" data-dcnode-id="809"><li class="comment depth-2" data-dcnode-id="810" id="comment-81236"><article class="media-object stack-for-small" data-dcnode-id="811"><div class="media-object-section pos--relative" data-dcnode-id="812"><div class="comment__box" data-dcnode-id="838"><p class="text-size--16 text-color--dolphin" data-dcnode-id="859"><strong data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Isabelle Siegel</span></strong><span data-dcnode-id="866" instrument_node="">&nbsp; </span><small class="" data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">January 19, 2021 at 12:09 pm </span></small><span data-dcnode-id="863" instrument_node=""> </span><span class="font-weight--7 text--upper" data-dcnode-id="860"><a aria-label="Reply to Isabelle Siegel" class="comment-reply-link" data-belowelement="comment-81236" data-commentid="81236" data-dcnode-id="861" data-postid="137846" data-replyto="Reply to Isabelle Siegel" data-respondelement="respond" href="#comment-81236" rel="nofollow"><span data-dcnode-id="862" instrument_node="">Reply</span></a></span></p><p data-dcnode-id="851"><span data-dcnode-id="858" instrument_node="">Dee, I’m very sorry for your loss. You may be interested in this article: </span><a data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whatsyourgrief.com/what-should-i-say-to-someone-grieving/" rel="nofollow ugc"><span data-dcnode-id="857" instrument_node="">https://whatsyourgrief.com/what-should-i-say-to-someone-grieving/</span></a><span data-dcnode-id="855" instrument_node=""> I think joining a grief group has the potential to be very beneficial. You may also want to check out this article, which discusses some pros and cons: </span><a data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whatsyourgrief.com/grief-support-groups-positives-and-pitfalls/" rel="nofollow ugc"><span data-dcnode-id="854" instrument_node="">https://whatsyourgrief.com/grief-support-groups-positives-and-pitfalls/</span></a><span data-dcnode-id="852" instrument_node=""> All the best.</span></p><div class="cld-like-dislike-wrap cld-template-2" data-dcnode-id="839"><div class="cld-like-wrap cld-common-wrap" data-dcnode-id="840"><span data-dcnode-id="850" instrument_node=""> </span><a class="cld-like-trigger cld-like-dislike-trigger" data-already-liked="0" data-comment-id="81236" data-dcnode-id="844" data-restriction="cookie" data-trigger-type="like" href="javascript:void(0)" title=""><span data-dcnode-id="849" instrument_node=""> </span><svg aria-hidden="true" class="svg-inline--fa fa-heart fa-w-16" data-dcnode-id="847" data-fa-i2svg="" data-icon="heart" data-prefix="fas" role="img" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z" data-dcnode-id="848" fill="currentColor"></path></svg><span data-dcnode-id="845" instrument_node=""> </span></a><span data-dcnode-id="843" instrument_node=""> </span><span class="cld-like-count-wrap cld-count-wrap" data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">1 </span></span></div></div></div><div class="comment__arrow" data-dcnode-id="813"><span data-dcnode-id="837" instrument_node=""> </span><svg data-dcnode-id="814" height="96.813" viewBox="0 0 96.813 96.813" width="96.813" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"></svg><span data-dcnode-id="836" instrument_node=""> </span><defs data-dcnode-id="821"><span data-dcnode-id="835" instrument_node=""> </span><filter data-dcnode-id="823" filterunits="userSpaceOnUse" height="96.813" id="Path_90" width="96.813" x="0" y="0"><span data-dcnode-id="834" instrument_node=""> </span><feoffset data-dcnode-id="833" input="SourceAlpha"></feoffset><span data-dcnode-id="832" instrument_node=""> </span><fegaussianblur data-dcnode-id="831" result="blur" stddeviation="5"></fegaussianblur><span data-dcnode-id="830" instrument_node=""> </span><feflood data-dcnode-id="829" flood-opacity="0.161"></feflood><span data-dcnode-id="828" instrument_node=""> </span><fecomposite data-dcnode-id="827" in2="blur" operator="in"></fecomposite><span data-dcnode-id="826" instrument_node=""> </span><fecomposite data-dcnode-id="825" in="SourceGraphic"></fecomposite><span data-dcnode-id="824" instrument_node=""> </span></filter><span data-dcnode-id="822" instrument_node=""> </span></defs><span data-dcnode-id="820" instrument_node=""> </span><g data-dcnode-id="816" filter="url(#Path_90)" transform="matrix(1, 0, 0, 1, 0, 0)"><span data-dcnode-id="819" instrument_node=""> </span><path d="M30.49,34.488S49.028,4.868,60,.12c-31.414-1.668-60,14.6-60,14.6" data-dcnode-id="818" data-name="Path 90" fill="#fff" id="Path_90-2" transform="translate(57.43 81.81) rotate(-135)"></path><span data-dcnode-id="817" instrument_node=""> </span></g><span data-dcnode-id="815" instrument_node=""> </span></div></div></article></li></ul></div></article></li><li class="comment depth-1" data-dcnode-id="574" id="comment-81195"><article class="media-object stack-for-small" data-dcnode-id="575"><div class="media-object-section pos--relative" data-dcnode-id="576"><div class="comment__box" data-dcnode-id="771"><p class="text-size--16 text-color--dolphin" data-dcnode-id="796"><strong data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">GB</span></strong><span data-dcnode-id="803" instrument_node="">&nbsp; </span><small class="" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">January 19, 2021 at 7:32 am </span></small><span data-dcnode-id="800" instrument_node=""> </span><span class="font-weight--7 text--upper" data-dcnode-id="797"><a aria-label="Reply to GB" class="comment-reply-link" data-belowelement="comment-81195" data-commentid="81195" data-dcnode-id="798" data-postid="137846" data-replyto="Reply to GB" data-respondelement="respond" href="#comment-81195" rel="nofollow"><span data-dcnode-id="799" instrument_node="">Reply</span></a></span></p><p data-dcnode-id="784"><span data-dcnode-id="795" instrument_node="">Thank you!</span><br data-dcnode-id="794"><span data-dcnode-id="793" instrument_node=""> This is exactly what I am miserably going through with my 2 daughters!</span><br data-dcnode-id="792"><span data-dcnode-id="791" instrument_node=""> They dont want me to show any grief after tragically losing my wife of 38 years (44 in love as HS sweethearts).</span><br data-dcnode-id="790"><span data-dcnode-id="789" instrument_node=""> It was August 9 2018 and they still dont get it and dont want to hear it. Yes I have grandkids but when those moments are over- its all me. Plus while being with them I only think more of who is NOT with them. But my daughters are all “rainbows and unicorns” as you say here and think I need mental help and I DO NOT! This is the new me-its too damn bad. I will never be the same -EVER. I no longer want to go to the beach and see and feel the pain of places we used to love. It hurts and I refuse to walk right into “triggers”! But they continue to pound me with “its you Dad and you can change-you just dont want to- you need help”! NO I do not and have told them this. I said I will grieve every day for the rest of my life. The situation we were tossed into was horrible and she died from undetected cancer at at the worst time as we both finally retired and bought a great home-we worked so hard to get to our Golden years and she quickly left me and this earth only 2 months after diagnosis at age 62! She worked all her life to get to it and she/we got totally screwed/robbed at the worst time! Now I sit in retirement misery alone in a too large home-alone. Yet they demand vanilla cones and sprinkles every single day and come on vacation to the beach and come to parties and Happy Holidays and dont forget Valentines Day Dad for the kids etc…Oh yes gear it up Dad on one of your worst days and dont bring your unhappy face just because it was your wedding anniversary! Dad stop talking about things already-you have to move forward-its not healthy to keep thinking and going over things. Their “toxic positivity” makes me feel worse and they just dont seem to get it. As I tell them I do the best that I can and if its not enough I dont know what to tell you. I wear a mask at all events-I have to-just so they cant say “Dad you ruined this”. I am getting used to that but I refuse to go on happy vacations- I dread the summer because now the inground pool we always dreamed of and finally got? I sit in it alone and wish I could fill it with concrete. My own daughter doesnt help because they never bring the kids over even in summer heat. Since all unfolded at this house with home hospice and there are memories they have of it and some moments were tough and scary-I know call this the “house of pain” that nobody wants part of! It was to be our grandparents home full of life and now its a sad “tomb” rarely visited and if so a strict time limit seems to be in affect. But Dad come to our house and spend 4-5 hours! If I get an hour here I am lucky-most visits are less than 30 minutes and out they go. My wifes ashes that I put in our living room-totally ignored and not once has my daughter gone over to acknowledge and I see this and it hurts me. It crushes me and causes all kinds of thoughts. I guess she feels I should toss them in some closet? But everything around her must be positive-no chance of real life even getting into her home or life-her kids in a constant Disney like trance and lifestyle of rainbows and sprinkles. I wish I could just sell the house pack up and move and be left alone. That would be ok- My Mom did it when Dad passed as she stayed alone in Florida for 32 years later-would come up once in awhile and we only did a few trips down there. It was all ok she was content to stay and did not feel the need to be with her grandkids= yet she was a good Grandma just not one of those intruding every day ones-its OK! I wish I could be the same-live in another state and phone calls were good enough. Not demands to be here and he there for this and that and when I say I dont think so all I get is attacked and called anti-social! It sucks -I am grieving and always will! This TOXIC baloney unfortunately is true and I just wish my daughters would understand and let me be just as my Mom used to say. I try and do my best and every day is not “wine and roses”. Just because my kids want to portray a Disneyland life and attitude does not mean I have to!</span><br data-dcnode-id="788"><span data-dcnode-id="787" instrument_node=""> Just because I cut my time short when there-doesnt mean anything more than -thats it I have had enough- I am done.</span><br data-dcnode-id="786"><span data-dcnode-id="785" instrument_node=""> Those hopes and dreams of endless weekends and a wonderful retirement were ripped away from me. Its just different now-it just is and never to be the same. So call me “Mr Negativity” as I have been accused of for just being Mr Reality….they dont get it and I guess sadly they never will and I handle the days till I share my companion urn with the one I love and will be put away together forever. It sucks to say they may never “. But one day they will.</span></p><div class="cld-like-dislike-wrap cld-template-2" data-dcnode-id="772"><div class="cld-like-wrap cld-common-wrap" data-dcnode-id="773"><span data-dcnode-id="783" instrument_node=""> </span><a class="cld-like-trigger cld-like-dislike-trigger" data-already-liked="0" data-comment-id="81195" data-dcnode-id="777" data-restriction="cookie" data-trigger-type="like" href="javascript:void(0)" title=""><span data-dcnode-id="782" instrument_node=""> </span><svg aria-hidden="true" class="svg-inline--fa fa-heart fa-w-16" data-dcnode-id="780" data-fa-i2svg="" data-icon="heart" data-prefix="fas" role="img" vi .</span><br data-dcnode-id="686"><span data-dcnode-id="685" instrument_node=""> My son says to stop looking for that Hallmark movie moment. That they have moved on or at least show that to us. I expected it to be different-how I really dont know.</span></p><div class="cld-like-dislike-wrap cld-template-2" data-dcnode-id="672"><div class="cld-like-wrap cld-common-wrap" data-dcnode-id="673"><span data-dcnode-id="683" instrument_node=""> </span><a class="cld-like-trigger cld-like-dislike-trigger" data-already-liked="0" data-comment-id="81352" data-dcnode-id="677" data-restriction="cookie" data-trigger-type="like" href="javascript:void(0)" title=""><span data-dcnode-id="682" instrument_node=""> </span><svg aria-hidden="true" class="svg-inline--fa fa-heart fa-w-16" data-dcnode-id="680" data-fa-i2svg="" data-icon="heart" data-prefix="fas" role="img" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z" data-dcnode-id="681" fill="currentColor"></path></svg><span data-dcnode-id="678" instrument_node=""> </span></a><span data-dcnode-id="676" instrument_node=""> </span><span class="cld-like-count-wrap cld-count-wrap" data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">1 </span></span></div></div></div><div class="comment__arrow" data-dcnode-id="646"><span data-dcnode-id="670" instrument_node=""> </span><svg data-dcnode-id="647" height="96.813" viewBox="0 0 96.813 96.813" width="96.813" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"></svg><span data-dcnode-id="669" instrument_node=""> </span><defs data-dcnode-id="654"><span data-dcnode-id="668" instrument_node=""> </span><filter data-dcnode-id="656" filterunits="userSpaceOnUse" height="96.813" id="Path_90" width="96.813" x="0" y="0"><span data-dcnode-id="667" instr ly to Jackie" class="comment-reply-link" data-belowelement="comment-81757" data-commentid="81757" data-dcnode-id="631" data-postid="137846" data-replyto="Reply to Jackie" data-respondelement="respond" href="#comment-81757" rel="nofollow"><span data-dcnode-id="632" instrument_node="">Reply</span></a></span></p><p data-dcnode-id="619"><span data-dcnode-id="628" instrument_node="">GB, I just want to validate your feelings, I think it stinks that they are acting that way. It hurts you, disrespects their mom’s passing, and also robs themselves and your grandchildren of an opportunity to grow close, help eacher other through it and model healthy greiving. I would be just as angry as you.</span><br data-dcnode-id="627"><span data-dcnode-id="626" instrument_node=""> My relationship with my only living sister has grown cold since my son died to suicide. Its the same kind of stuff- she can’t handle my sadness and has to keep control over positivity.</span><br data-dcnode-id="625"><span data-dcnode-id="624" instrument_node=""> My only suggestion is that you stand your ground and push back at them if you need to.</span><br data-dcnode-id="623"><span data-dcnode-id="622" instrument_node=""> I’ve done that with a few people. May or nay not work.</span><br data-dcnode-id="621"><span data-dcnode-id="620" instrument_node=""> Take care of yourself &amp; nourish your loved one in your heart no matter what anyone says.</span></p><div class="cld-like-dislike-wrap cld-template-2" data-dcnode-id="607"><div class="cld-like-wrap cld-common-wrap" data-dcnode-id="608"><span data-dcnode-id="618" instrument_node=""> </span><a class="cld-like-trigger cld-like-dislike-trigger" data-already-liked="0" data-comment-id="81757" data-dcnode-id="612" data-restriction="cookie" data-trigger-type="like" href="javascript:void(0)" title=""><span data-dcnode-id="617" instrument_node=""> </span><svg aria-hidden="true" class="svg-inline--fa fa-heart fa-w-16" data-dcnode-id="615" data-fa-i2svg="" data-icon="hear
