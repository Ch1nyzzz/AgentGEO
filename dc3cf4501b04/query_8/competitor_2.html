</span><div class="c-article-body" data-article-body="true" data-dcnode-id="1519" data-track-component="article body"><span data-dcnode-id="3851" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="3838" data-gtm-vis-first-on-screen-50443292_562="856" data-gtm-vis-first-on-screen-50443292_563="856" data-gtm-vis-polling-id-50443292_562="95" data-gtm-vis-polling-id-50443292_563="97" data-gtm-vis-recent-on-screen-50443292_562="855" data-gtm-vis-recent-on-screen-50443292_563="856" data-gtm-vis-total-visible-time-50443292_562="9800" data-gtm-vis-total-visible-time-50443292_563="9800" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="3839" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3849" id="Abs1"><span data-dcnode-id="3850" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="3840" id="Abs1-content"><p data-dcnode-id="3841"><span data-dcnode-id="3848" instrument_node="">Recent studies suggested an important role of neuroticism and extraversion facets as incremental predictors of subjective well-being outcomes. Research has shown that positive cognitions mediated the relation between personality traits and well-being. The present study examined the relationship between neuroticism and extraversion, measured as general and group factors, and subjective happiness through a general positivity factor. 770 community participants (69.4&nbsp;% females; </span><i data-dcnode-id="3846"><span data-dcnode-id="3847" instrument_node="">M</span></i><span data-dcnode-id="3845" instrument_node="">&nbsp;=&nbsp;55.34; </span><i data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">SD</span></i><span data-dcnode-id="3842" instrument_node="">&nbsp;=&nbsp;16.01) completed personality, satisfaction with life, optimism, self-esteem, and subjective happiness scales. A bifactor model was used to parse general and specific variance components for multifaceted constructs. The general positivity factor completely mediated neuroticism-subjective happiness relationships and overlapped with general neuroticism, whilst it partially mediated extraversion-subjective happiness ones. Other paths to happiness involved cheerfulness and enthusiasm. Assertiveness, activity level and excitement-seeking had a weak relationship with subjective happiness and only through positivity. Gregariousness and friendliness had neither direct nor indirect effects on subjective happiness. Life satisfaction had a twofold role as a component of positivity as well as providing an independent contribution to variance in subjective happiness. In keeping with previous research, neuroticism acted as a sort of general negativity factor. Cheerfulness and extraversion made an incremental contribution to variance in subjective happiness. Our findings support the utility of a multifaceted approach to study pathways from personality to well-being. Theoretical and practical implications for promoting well-being were discussed.</span></p></div></div></section><span data-dcnode-id="3837" instrument_node="">
</span><section data-dcnode-id="3622" data-gtm-vis-first-on-screen-50443292_562="856" data-gtm-vis-first-on-screen-50443292_563="856" data-gtm-vis-polling-id-50443292_562="96" data-gtm-vis-polling-id-50443292_563="98" data-gtm-vis-recent-on-screen-50443292_562="856" data-gtm-vis-recent-on-screen-50443292_563="856" data-gtm-vis-total-visible-time-50443292_562="9800" data-gtm-vis-total-visible-time-50443292_563="9800" data-title="Introduction"><div class="c-article-section" data-dcnode-id="3623" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3835" id="Sec1"><span data-dcnode-id="3836" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="3624" id="Sec1-content"><p data-dcnode-id="3812"><span data-dcnode-id="3834" instrument_node="">Does positivity about one’s future, self and life account for the association between personality traits and subjective happiness? This question has been addressed in research on how various positive attitudes and beliefs mediate the relationships between personality traits and well-being (Lightsey Jr et al. </span><a aria-label="Reference 2013" data-dcnode-id="3832" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d307100786e323" title="Lightsey, O. R., Jr., Gharghani, G. G., Katz, A. M., McKinney, V. A., &amp; Rarey, E. B. (2013). Positive automatic cognitions mediate the relationship between personality and trait positive affect. Journal of Happiness Studies, 
                           14, 115–134. doi:
                    10.1007/s10902-011-9319-x
                    
                  ."><span data-dcnode-id="3833" instrument_node="">2013</span></a><span data-dcnode-id="3831" instrument_node="">, </span><a aria-label="Reference 2014" data-dcnode-id="3829" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d307100786e326" title="Lightsey, O. R., Jr., Boyraz, G., Ervin, A., Rarey, E. B., Gharibian Gharghani, G., &amp; Maxwell, D. (2014). Generalized self-efficacy, positive cognitions, and negative cognitions as mediators of the relationship between conscientiousness and meaning in life. Canadian Journal of Behavioural Science, 
                           46, 436–445. doi:
                    10.1037/a0034022
                    
                  ."><span data-dcnode-id="3830" instrument_node="">2014</span></a><span data-dcnode-id="3828" instrument_node="">; Pollock et al. </span><a aria-label="Reference 2016" data-dcnode-id="3826" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d307100786e329" title="Pollock, N. C., Noser, A. E., Holden, C. J., &amp; Zeigler-Hill, V. (2016). Do orientations to happiness mediate the associations between personality traits and subjective well-being? Journal of Happiness Studies, 
                           17, 713–729. doi:
                    10.1007/s10902-015-9617-9
                    
                  ."><span data-dcnode-id="3827" instrument_node="">2016</span></a><span data-dcnode-id="3825" instrument_node="">; Strobel et al. </span><a aria-label="Reference 2011" data-dcnode-id="3823" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d307100786e332" title="Strobel, M., Tumasjan, A., &amp; Spörrle, M. (2011). Be yourself, believe in yourself, and be happy: Self-efficacy as a mediator between personality factors and subjective well-being. Scandinavian Journal of Psychology, 
                           52, 43–48. doi:
                    10.1111/j.1467-9450.2010.00826.x
                    
                  ."><span data-dcnode-id="3824" instrument_node="">2011</span></a><span data-dcnode-id="3822" instrument_node="">; Weber et al. </span><a aria-label="Reference 2013" data-dcnode-id="3820" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d307100786e335" title="Weber, M., Ruch, W., Littman-Ovadia, H., Lavy, S., &amp; Gai, O. (2013). Relationships among higher-order strengths factors, subjective well-being, and general self-efficacy—The case of Israeli adolescents. Personality and Individual Differences, 
                           55, 322–327. doi:
                    10.1016/j.paid.2013.03.006
                    
                  ."><span data-dcnode-id="3821" instrument_node="">2013</span></a><span data-dcnode-id="3819" instrument_node="">). A common finding is that extraversion and neuroticism are the strongest predictors of subjective well-being (for a review, see DeNeve and Cooper </span><a aria-label="Reference 1998" data-dcnode-id="3817" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d307100786e339" title="DeNeve, K. M., &amp; Cooper, H. (1998). The happy personality: A meta-analysis of 137 personality traits and subjective well-being. Psychological Bulletin, 
                           124, 197–229. doi:
                    10.1037/0033-2909.124.2.197
                    
                  ."><span data-dcnode-id="3818" instrument_node="">1998</span></a><span data-dcnode-id="3816" instrument_node="">; Steel et al. </span><a aria-label="Reference 2008" data-dcnode-id="3814" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d307100786e342" title="Steel, P., Schmidt, J., &amp; Shultz, J. (2008). Refining the relationship between personality and subjective well-being. Psychological Bulletin, 
                           134, 138–161. doi:
                    10.1037/0033-2909.134.1.138
                    
                  ."><span data-dcnode-id="3815" instrument_node="">2008</span></a><span data-dcnode-id="3813" instrument_node="">); however as the studies have tested different mediators (e.g., positive automatic cognitions, orientation to happiness, generalized self-efficacy) it is difficult to generalize about the mediating role played by a general positive orientation.</span></p><p data-dcnode-id="3792"><span data-dcnode-id="3811" instrument_node="">Positivity has recently been defined as a general cognitive orientation that accounts for the covariance in dispositional optimism, self-esteem and life satisfaction (Caprara et al. </span><a aria-label="Reference 2012" data-dcnode-id="3809" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d307100786e348" title="Caprara, G. V., Alessandri, G., Eisenberg, N., Kupfer, A., Steca, P., Caprara, M. G., et al. (2012). The positivity scale. Psychological Assessment, 
                           24, 701–712. doi:
                    10.1037/a0026681
                    
                  ."><span data-dcnode-id="3810" instrument_node="">2012</span></a><span data-dcnode-id="3808" instrument_node="">; Heikamp et al. </span><a aria-label="Reference 2014" data-dcnode-id="3806" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d307100786e351" title="Heikamp, T., Alessandri, G., Laguna, M., Petrovic, V., Caprara, M. G., &amp; Trommsdorff, G. (2014). Cross-cultural validation of the positivity-scale in five European countries. Personality and Individual Differences, 
                           71, 140–145. doi:
                    10.1016/j.paid.2014.07.012
                    
                  ."><span data-dcnode-id="3807" instrument_node="">2014</span></a><span data-dcnode-id="3805" instrument_node="">). All three constructs capture positive evaluations that influence feelings, beliefs and behaviors, for instance dispositional optimism is typically defined as the tendency to expect that future outcomes are likely to be personally beneficial, or positive (Scheier et al. </span><a aria-label="Reference 1994" data-dcnode-id="3803" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d307100786e354" title="Scheier, M. F., Carver, C. S., &amp; Bridges, M. W. (1994). Distinguishing optimism from neuroticism (and trait anxiety, self-mastery, and self-esteem): A reevaluation of the Life Orientation Test. Journal of Personality and Social Psychology, 
                           67, 1063–1078. doi:
                    10.1037/0022-3514.67.6.1063
                    
                  ."><span data-dcnode-id="3804" instrument_node="">1994</span></a><span data-dcnode-id="3802" instrument_node="">). Likewise, self-esteem is the tendency to attach positive value to the self (Rosenberg </span><a aria-label="Reference 1965" data-dcnode-id="3800" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d307100786e357" title="Rosenberg, M. (1965). Society and the adolescent self-image. Princeton, NJ: Princeton University Press."><span data-dcnode-id="3801" instrument_node="">1965</span></a><span data-dcnode-id="3799" instrument_node="">). Last, life satisfaction is based on experiences that have been appraised positively (i.e., above a subjective standard; see Diener et al. </span><a aria-label="Reference 1985" data-dcnode-id="3797" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d307100786e360" title="Diener, E. D., Emmons, R. A., Larsen, R. J., &amp; Griffin, S. (1985). The satisfaction with life scale. Journal of Personality Assessment, 
                           49, 71–75. doi:
                    10.1207/s15327752jpa4901_13
                    
                  ."><span data-dcnode-id="3798" instrument_node="">1985</span></a><span data-dcnode-id="3796" instrument_node="">). Moreover, the three constructs exhibit similar patterns of concurrent and predictive validity, for instance positive evaluations of future, self, and life are all correlated with a variety of well-being outcomes as well as with success indicators such as health, job success, and positive relationships (for a review, see Lyubomirsky et al. </span><a aria-label="Reference 2005" data-dcnode-id="3794" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d307100786e364" title="Lyubomirsky, S., King, L., &amp; Diener, E. (2005). The benefits of frequent positive affect: Does happiness lead to success? Psychological Bulletin, 
                           131, 803–855. doi:
                    10.1037/0033-2909.131.6.803
                    
                  ."><span data-dcnode-id="3795" instrument_node="">2005</span></a><span data-dcnode-id="3793" instrument_node="">).</span></p><p data-dcnode-id="3772"><span data-dcnode-id="3791" instrument_node="">As well as capturing positive cognitions and evaluations, optimism, self-esteem and life satisfaction also have specific characteristics. Life satisfaction, for example, is deemed the cognitive component of subjective well-being (e.g., Gallagher et al. </span><a aria-label="Reference 2009" data-dcnode-id="3789" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d307100786e370" title="Gallagher, M. W., Lopez, S. J., &amp; Preacher, K. J. (2009). The hierarchical structure of well-being. Journal of Personality, 
                           77(4), 1025–1050. doi:
                    10.1111/j.1467-6494.2009.00573.x
                    
                  ."><span data-dcnode-id="3790" instrument_node="">2009</span></a><span data-dcnode-id="3788" instrument_node="">). Although the tendency to appraise one’s life positively is not commonly used as a predictor of health or well-being outcomes there is evidence that life satisfaction predicts health and longevity (Diener and Chan </span><a aria-label="Reference 2011" data-dcnode-id="3786" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d307100786e373" title="Diener, E., &amp; Chan, M. Y. (2011). Happy people live longer: Subjective well-being contributes to health and longevity. Applied Psychology: Health and Well-Being, 
                           3, 1–43. doi:
                    10.1111/j.1758-0854.2010.01045.x
                    
                  ."><span data-dcnode-id="3787" instrument_node="">2011</span></a><span data-dcnode-id="3785" instrument_node="">), health-promoting behaviors (e.g., smoking cessation, physical exercise, healthy diet; Grant et al. </span><a aria-label="Reference 2009" data-dcnode-id="3783" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d307100786e376" title="Grant, N., Wardle, J., &amp; Steptoe, A. (2009). The relationship between life satisfaction and health behavior: A cross-cultural analysis of young adults. International Journal of Behavioral Medicine, 
                           16, 259–268. doi:
                    10.1007/s12529-009-9032-x
                    
                  ."><span data-dcnode-id="3784" instrument_node="">2009</span></a><span data-dcnode-id="3782" instrument_node="">), subjective health status and sick leave (Straume and Vittersø </span><a aria-label="Reference 2015" data-dcnode-id="3780" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d307100786e379" title="Straume, L. V., &amp; Vittersø, J. (2015). Well-being at work: Some differences between life satisfaction and personal growth as predictors of subjective health and sick-leave. Journal of Happiness Studies, 
                           16(1), 149–168. doi:
                    10.1007/s10902-014-9502-y
                    
                  ."><span data-dcnode-id="3781" instrument_node="">2015</span></a><span data-dcnode-id="3779" instrument_node="">), emotional well-being (Ruiz et al. </span><a aria-label="Reference 2011" data-dcnode-id="3777" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d307100786e382" title="Ruiz, M. Á., Sanjuan, P., Pérez-García, A. M., &amp; Rueda, B. (2011). Relations between life satisfaction, adjustment to illness, and emotional distress in a sample of men with ischemic cardiopathy. The Spanish Journal of Psychology, 
                           14(01), 356–365. doi:
                    10.5209/rev_SJOP.2011.v14.n1.32
                    
                  ."><span data-dcnode-id="3778" instrument_node="">2011</span></a><span data-dcnode-id="3776" instrument_node="">) and hedonic feelings (Kopperud and Vittersø </span><a aria-label="Reference 2008" data-dcnode-id="3774" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d307100786e386" title="Kopperud, K. H., &amp; Vittersø, J. (2008). Distinctions between hedonic and eudaimonic well-being: Results from a day reconstruction study among Norwegian jobholders. The Journal of Positive Psychology, 
                           3(3), 174–181. doi:
                    10.1080/17439760801999420
                    
                  ."><span data-dcnode-id="3775" instrument_node="">2008</span></a><span data-dcnode-id="3773" instrument_node="">). Taken together, this literature illustrates that life satisfaction is not only a cognitive aspect of well-being, but also a predictor of significant life outcomes, including a number of affective states.</span></p><p data-dcnode-id="3743"><span data-dcnode-id="3771" instrument_node="">According to Caprara and colleagues (Caprara </span><a aria-label="Reference 2009" data-dcnode-id="3769" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d307100786e392" title="Caprara, G. V. (2009). Positive orientation: Turning potentials into optimal functioning. The Bulletin of the European Health Psychologist, 
                           11, 46–48."><span data-dcnode-id="3770" instrument_node="">2009</span></a><span data-dcnode-id="3768" instrument_node="">; Caprara et al. </span><a aria-label="Reference 2012" data-dcnode-id="3766" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d307100786e395" title="Caprara, G. V., Alessandri, G., Eisenberg, N., Kupfer, A., Steca, P., Caprara, M. G., et al. (2012). The positivity scale. Psychological Assessment, 
                           24, 701–712. doi:
                    10.1037/a0026681
                    
                  ."><span data-dcnode-id="3767" instrument_node="">2012</span></a><span data-dcnode-id="3765" instrument_node="">), optimism, self-esteem and life satisfaction represent enduring knowledge structures about oneself and the world that influence people’s feelings, cognitions and actions, and affect both present and future life (Caprara </span><a aria-label="Reference 2009" data-dcnode-id="3763" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d307100786e398" title="Caprara, G. V. (2009). Positive orientation: Turning potentials into optimal functioning. The Bulletin of the European Health Psychologist, 
                           11, 46–48."><span data-dcnode-id="3764" instrument_node="">2009</span></a><span data-dcnode-id="3762" instrument_node="">; Caprara et al. </span><a aria-label="Reference 2012" data-dcnode-id="3760" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d307100786e401" title="Caprara, G. V., Alessandri, G., Eisenberg, N., Kupfer, A., Steca, P., Caprara, M. G., et al. (2012). The positivity scale. Psychological Assessment, 
                           24, 701–712. doi:
                    10.1037/a0026681
                    
                  ."><span data-dcnode-id="3761" instrument_node="">2012</span></a><span data-dcnode-id="3759" instrument_node="">). The three constructs were so strongly associated with each other that a joint factor analysis at the item level revealed a large general factor and yielded a single brief measure, namely the Positivity scale (or P-scale; Caprara et al. </span><a aria-label="Reference 2012" data-dcnode-id="3757" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d307100786e404" title="Caprara, G. V., Alessandri, G., Eisenberg, N., Kupfer, A., Steca, P., Caprara, M. G., et al. (2012). The positivity scale. Psychological Assessment, 
                           24, 701–712. doi:
                    10.1037/a0026681
                    
                  ."><span data-dcnode-id="3758" instrument_node="">2012</span></a><span data-dcnode-id="3756" instrument_node="">). A recent 8-year longitudinal study also showed that the P-scale and positive affect loaded on separate factors at each time point (Caprara et al. </span><a aria-label="Reference 2016" data-dcnode-id="3754" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d307100786e408" title="Caprara, G. V., Eisenberg, N., &amp; Alessandri, G. (2016). Positivity: The dispositional basis of happiness. Journal of Happiness Studies. doi: 
                    10.1007/s10902-016-9728-y
                    
                  ."><span data-dcnode-id="3755" instrument_node="">2016</span></a><span data-dcnode-id="3753" instrument_node="">). The same study also revealed, in line with previous research, that positivity had an enduring influence on positive affect. These findings not only corroborate the distinction between positivity and the affective components of subjective well-being, they also reinforce the claim that individuals who seek positivity may be happier (see also Catalino et al. </span><a aria-label="Reference 2014" data-dcnode-id="3751" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d307100786e411" title="Catalino, L. I., Algoe, S. B., &amp; Fredrickson, B. L. (2014). Prioritizing positivity: An effective approach to pursuing happiness? Emotion, 
                           14, 1155–1161. doi:
                    10.1037/a0038029
                    
                  ."><span data-dcnode-id="3752" instrument_node="">2014</span></a><span data-dcnode-id="3750" instrument_node="">). Importantly, although positivity has enduring (i.e., trait-like) effects on well-being, the P-scale was relatively independent of personality traits. For instance, Caprara et al. (</span><a aria-label="Reference 2012" data-dcnode-id="3748" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d307100786e414" title="Caprara, G. V., Alessandri, G., Eisenberg, N., Kupfer, A., Steca, P., Caprara, M. G., et al. (2012). The positivity scale. Psychological Assessment, 
                           24, 701–712. doi:
                    10.1037/a0026681
                    
                  ."><span data-dcnode-id="3749" instrument_node="">2012</span></a><span data-dcnode-id="3747" instrument_node="">) reported only weak to mild correlations (i.e., ranging from 0.19 to −0.39) between P-scale score and the Big Five factors (McCrae and Costa </span><a aria-label="Reference 2008" data-dcnode-id="3745" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d307100786e417" title="McCrae, R., &amp; Costa, P. (2008). Empirical and theoretical status of the five-factor model of personality traits. In G. Boyle, G. Matthews, &amp; D. Saklofske (Eds.), The SAGE handbook of personality theory and assessment: Personality theories and models (Vol. 1, pp. 273–295). London: SAGE Publications Ltd. doi:
                    10.4135/9781849200462.n13
                    
                  ."><span data-dcnode-id="3746" instrument_node="">2008</span></a><span data-dcnode-id="3744" instrument_node="">). In summary, positivity is theoretically and empirically linked with both personality and well-being, but there is evidence that the constructs do not overlap completely.</span></p><p data-dcnode-id="3729"><span data-dcnode-id="3742" instrument_node=""> Returning to the issue of whether a general positive orientation accounts for the associations between personality traits and subjective happiness, the literature suggests that the concept of positivity has the potential to overcome the limitations associated with using narrow positive constructs to represent generalized positive orientations in mediation studies. The P-scale has not only predicted subjective happiness, it has also been shown to mediate the effects of extraversion and neuroticism on subjective happiness (Lauriola and Iani </span><a aria-label="Reference 2015" data-dcnode-id="3740" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d307100786e424" title="Lauriola, M., &amp; Iani, L. (2015). Does positivity mediate the relation of neuroticism and extraversion with subjective happiness? PLoS One, 
                           10, e0121991. doi:
                    10.1371/journal.pone.0121991
                    
                  ."><span data-dcnode-id="3741" instrument_node="">2015</span></a><span data-dcnode-id="3739" instrument_node="">). The same study suggested that there are two convergent pathways linking personality traits to subjective well-being (Lauriola and Iani </span><a aria-label="Reference 2015" data-dcnode-id="3737" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d307100786e427" title="Lauriola, M., &amp; Iani, L. (2015). Does positivity mediate the relation of neuroticism and extraversion with subjective happiness? PLoS One, 
                           10, e0121991. doi:
                    10.1371/journal.pone.0121991
                    
                  ."><span data-dcnode-id="3738" instrument_node="">2015</span></a><span data-dcnode-id="3736" instrument_node="">). Extraverts approach life with greater confidence and a more positive attitude, which tends to make them happier than other people with other personality types (e.g., Lucas et al. </span><a aria-label="Reference 2008" data-dcnode-id="3734" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d307100786e430" title="Lucas, R. E., Le, K., &amp; Dyrenforth, P. S. (2008). Explaining the extraversion/positive affect relation: Sociability cannot account for extraverts’ greater happiness. Journal of Personality, 
                           76, 385–414. doi:
                    10.1111/j.1467-6494.2008.00490.x
                    
                  ."><span data-dcnode-id="3735" instrument_node="">2008</span></a><span data-dcnode-id="3733" instrument_node="">), whereas introverted individuals, who are low on neuroticism, can be happy because they approach life with a positive outlook (e.g., “happy introverted”; Hills and Argyle </span><a aria-label="Reference 2001" data-dcnode-id="3731" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d307100786e433" title="Hills, P., &amp; Argyle, M. (2001). Happiness, introversion–extraversion and happy introverts. Personality and Individual Differences, 
                           30, 595–608. doi:
                    10.1016/S0191-8869(00)00058-1
                    
                  ."><span data-dcnode-id="3732" instrument_node="">2001</span></a><span data-dcnode-id="3730" instrument_node="">).</span></p><p data-dcnode-id="3718"><span data-dcnode-id="3728" instrument_node="">It is worth noting, however, that there have been studies that reached similar conclusions whilst stressing the role of a generalized negative orientation. For instance, Furr and Funder (</span><a aria-label="Reference 1998" data-dcnode-id="3726" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d307100786e439" title="Furr, R. M., &amp; Funder, D. C. (1998). A multimodal analysis of personal negativity. Journal of Personality and Social Psychology, 
                           74, 1580–1591. doi:
                    10.1037/0022-3514.74.6.1580
                    
                  ."><span data-dcnode-id="3727" instrument_node="">1998</span></a><span data-dcnode-id="3725" instrument_node="">) showed that in non-clinical samples self-reported depression was highly correlated with low self-esteem, dissatisfaction with life and unhappiness. Furthermore, they proposed that personal negativity, defined as a broad personality construct, could account for these relationships. This was corroborated by parent reports of participants who self-reported high personal negativity, which described them anxious, depressed, self-conscious and vulnerable (i.e., as having facets of neuroticism). Notably the authors stated that “such personal negativity is not simply negative affect or neuroticism, it is a particular pattern of negative views about the self and one’s life.” (Furr and Funder </span><a aria-label="Reference 1998" data-dcnode-id="3723" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d307100786e442" title="Furr, R. M., &amp; Funder, D. C. (1998). A multimodal analysis of personal negativity. Journal of Personality and Social Psychology, 
                           74, 1580–1591. doi:
                    10.1037/0022-3514.74.6.1580
                    
                  ."><span data-dcnode-id="3724" instrument_node="">1998</span></a><span data-dcnode-id="3722" instrument_node="">, p. 1590); in other words their description of the personal negativity construct mirrors the current operational definition of positivity (Caprara et al. </span><a aria-label="Reference 2012" data-dcnode-id="3720" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d307100786e445" title="Caprara, G. V., Alessandri, G., Eisenberg, N., Kupfer, A., Steca, P., Caprara, M. G., et al. (2012). The positivity scale. Psychological Assessment, 
                           24, 701–712. doi:
                    10.1037/a0026681
                    
                  ."><span data-dcnode-id="3721" instrument_node="">2012</span></a><span data-dcnode-id="3719" instrument_node="">), and suggests that a generalized negativity or positivity may be one of the determinants of subjective well-being.</span></p><p data-dcnode-id="3701"><span data-dcnode-id="3717" instrument_node="">Neuroticism and extraversion are, like positivity, hierarchical constructs that subsume more specific facets of personality. In the case of neuroticism, these facets are anxiety, angry-hostility (or anger), depression, self-consciousness, impulsiveness (or immoderation) and vulnerability. In the case of extraversion they are warmth (or friendliness), gregariousness, assertiveness, activity level, excitement-seeking and positive emotions (or cheerfulness) (Johnson </span><a aria-label="Reference 2014" data-dcnode-id="3715" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d307100786e451" title="Johnson, J. A. (2014). Measuring thirty facets of the Five Factor Model with a 120-item public domain inventory: Development of the IPIP-NEO-120. Journal of Research in Personality, 
                           51, 78–89. doi:
                    10.1016/j.jrp.2014.05.003
                    
                  ."><span data-dcnode-id="3716" instrument_node="">2014</span></a><span data-dcnode-id="3714" instrument_node="">; McCrae and Costa </span><a aria-label="Reference 2008" data-dcnode-id="3712" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d307100786e454" title="McCrae, R., &amp; Costa, P. (2008). Empirical and theoretical status of the five-factor model of personality traits. In G. Boyle, G. Matthews, &amp; D. Saklofske (Eds.), The SAGE handbook of personality theory and assessment: Personality theories and models (Vol. 1, pp. 273–295). London: SAGE Publications Ltd. doi:
                    10.4135/9781849200462.n13
                    
                  ."><span data-dcnode-id="3713" instrument_node="">2008</span></a><span data-dcnode-id="3711" instrument_node="">). Some scholars have proposed a further distinction between agentic extraversion (i.e., assertiveness, excitement-seeking, and activity level) and affiliative extraversion (i.e., gregariousness, friendliness) based on neurobiological evidence (Depue and Collins </span><a aria-label="Reference 1999" data-dcnode-id="3709" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d307100786e457" title="Depue, R. A., &amp; Collins, P. F. (1999). Neurobiology of the structure of personality: Dopamine, facilitation of incentive motivation, and extraversion. Behavioral and Brain Sciences, 
                           22, 491–517. doi:
                    10.1017/S0140525X99002046
                    
                  ."><span data-dcnode-id="3710" instrument_node="">1999</span></a><span data-dcnode-id="3708" instrument_node="">; Paris </span><a aria-label="Reference 2005" data-dcnode-id="3706" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d307100786e460" title="Paris, J. (2005). Neurobiological dimensional models of personality: A review of the models of Cloninger, Depue, and Siever. Journal of Personality Disorders, 
                           19, 156–170. doi:
                    10.1521/pedi.19.2.156.62629
                    
                  ."><span data-dcnode-id="3707" instrument_node="">2005</span></a><span data-dcnode-id="3705" instrument_node="">). Others have suggested that ‘assertiveness’ and ‘enthusiasm’ are better labels for the two major aspects of extraversion based on factor analyses of personality ratings (DeYoung et al. </span><a aria-label="Reference 2007" data-dcnode-id="3703" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d307100786e463" title="DeYoung, C. G., Quilty, L. C., &amp; Peterson, J. B. (2007). Between facets and domains: 10 aspects of the Big Five. Journal of Personality and Social Psychology, 
                           93, 880–896. doi:
                    10.1037/0022-3514.93.5.880
                    
                  ."><span data-dcnode-id="3704" instrument_node="">2007</span></a><span data-dcnode-id="3702" instrument_node="">). In particular, ‘enthusiasm’ is preferred to ‘affiliation’ by those who wish to highlight evidence that gregariousness, friendliness, and positive emotions all load on this factor.</span></p><p data-dcnode-id="3672"><span data-dcnode-id="3700" instrument_node="">Recent studies have examined the direct effect of personality facets on well-being outcomes (e.g., Albuquerque et al. </span><a aria-label="Reference 2012" data-dcnode-id="3698" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d307100786e469" title="Albuquerque, I., de Lima, M. P., Matos, M., &amp; Figueiredo, C. (2012). Personality and subjective well-being: What hides behind global analyses? Social Indicators Research, 
                           105, 447–460. doi:
                    10.1007/s11205-010-9780-7
                    
                  ."><span data-dcnode-id="3699" instrument_node="">2012</span></a><span data-dcnode-id="3697" instrument_node="">; Anglim and Grant </span><a aria-label="Reference 2016" data-dcnode-id="3695" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d307100786e472" title="Anglim, J., &amp; Grant, S. (2016). Predicting psychological and subjective well-being from personality: Incremental prediction from 30 facets over the big 5. Journal of Happiness Studies, 
                           17, 59–80. doi:
                    10.1007/s10902-014-9583-7
                    
                  ."><span data-dcnode-id="3696" instrument_node="">2016</span></a><span data-dcnode-id="3694" instrument_node="">; Marrero Quevedo and Carballeira Abella </span><a aria-label="Reference 2011" data-dcnode-id="3692" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d307100786e475" title="Marrero Quevedo, R. J., &amp; Carballeira Abella, M. (2011). Well-being and personality: Facet-level analyses. Personality and Individual Differences, 
                           50, 206–211. doi:
                    10.1016/j.paid.2010.09.030
                    
                  ."><span data-dcnode-id="3693" instrument_node="">2011</span></a><span data-dcnode-id="3691" instrument_node="">; Schimmack et al. </span><a aria-label="Reference 2004" data-dcnode-id="3689" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d307100786e478" title="Schimmack, U., Oishi, S., Furr, R. M., &amp; Funder, D. C. (2004). Personality and life satisfaction: A facet-level analysis. Personality and Social Psychology Bulletin, 
                           30, 1062–1075. doi:
                    10.1177/0146167204264292
                    
                  ."><span data-dcnode-id="3690" instrument_node="">2004</span></a><span data-dcnode-id="3688" instrument_node="">). For example, depression and cheerfulness were reported to be the strongest predictors of life satisfaction (Schimmack et al. </span><a aria-label="Reference 2004" data-dcnode-id="3686" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d307100786e481" title="Schimmack, U., Oishi, S., Furr, R. M., &amp; Funder, D. C. (2004). Personality and life satisfaction: A facet-level analysis. Personality and Social Psychology Bulletin, 
                           30, 1062–1075. doi:
                    10.1177/0146167204264292
                    
                  ."><span data-dcnode-id="3687" instrument_node="">2004</span></a><span data-dcnode-id="3685" instrument_node="">). Depression, vulnerability, anger and anxiety were found to account for a large proportion of variance in negative affect (44&nbsp;%); whilst depression and vulnerability accounted for 21&nbsp;% of variance in life satisfaction and together all five facets of extraversion (but mainly assertiveness, cheerfulness and activity level) accounted for 31&nbsp;% of variance in positive affect (Albuquerque et al. </span><a aria-label="Reference 2012" data-dcnode-id="3683" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d307100786e485" title="Albuquerque, I., de Lima, M. P., Matos, M., &amp; Figueiredo, C. (2012). Personality and subjective well-being: What hides behind global analyses? Social Indicators Research, 
                           105, 447–460. doi:
                    10.1007/s11205-010-9780-7
                    
                  ."><span data-dcnode-id="3684" instrument_node="">2012</span></a><span data-dcnode-id="3682" instrument_node="">). Furthermore, Marrero Quevedo and Carballeira Abella (</span><a aria-label="Reference 2011" data-dcnode-id="3680" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d307100786e488" title="Marrero Quevedo, R. J., &amp; Carballeira Abella, M. (2011). Well-being and personality: Facet-level analyses. Personality and Individual Differences, 
                           50, 206–211. doi:
                    10.1016/j.paid.2010.09.030
                    
                  ."><span data-dcnode-id="3681" instrument_node="">2011</span></a><span data-dcnode-id="3679" instrument_node="">) found that optimism and depression were the best predictors of happiness and life satisfaction, whilst low vulnerability was the strongest predictor of positive affect and low self-esteem the best predictor of negative affect. Interestingly, this study showed that seven out of personality facets, together with other personality traits, accounted for twice as much variance in well-being outcomes as broad Big Five measures. Nevertheless, Anglim and Grant (</span><a aria-label="Reference 2016" data-dcnode-id="3677" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d307100786e491" title="Anglim, J., &amp; Grant, S. (2016). Predicting psychological and subjective well-being from personality: Incremental prediction from 30 facets over the big 5. Journal of Happiness Studies, 
                           17, 59–80. doi:
                    10.1007/s10902-014-9583-7
                    
                  ."><span data-dcnode-id="3678" instrument_node="">2016</span></a><span data-dcnode-id="3676" instrument_node="">) reported that most facets of extraversion and neuroticism had moderate to large zero-order correlations with well-being measures that became null-small—except in the case of cheerfulness and depression—after controlling for shared variance with personality factors (Anglim and Grant </span><a aria-label="Reference 2016" data-dcnode-id="3674" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d307100786e494" title="Anglim, J., &amp; Grant, S. (2016). Predicting psychological and subjective well-being from personality: Incremental prediction from 30 facets over the big 5. Journal of Happiness Studies, 
                           17, 59–80. doi:
                    10.1007/s10902-014-9583-7
                    
                  ."><span data-dcnode-id="3675" instrument_node="">2016</span></a><span data-dcnode-id="3673" instrument_node="">; Table&nbsp;5). In sum, like all the aforementioned studies, this recent study provided evidence that specific personality facets are more helpful than traits in accounting for individual differences in subjective well-being, and that depression, vulnerability and cheerfulness are all independent incremental predictors of subjective well-being.</span></p><p data-dcnode-id="3637"><span data-dcnode-id="3671" instrument_node="">Recently there has been renewed interest in bifactor models of multifaceted hierarchical constructs such as extraversion, quality of life, psychological distress and well-being (e.g., Chen et al. </span><a aria-label="Reference 2012" data-dcnode-id="3669" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d307100786e500" title="Chen, F. F., Hayes, A., Carver, C. S., Laurenceau, J. P., &amp; Zhang, Z. (2012). Modeling general and specific variance in multifaceted constructs: A comparison of the bifactor model to other approaches. Journal of Personality, 
                           80, 219–251. doi:
                    10.1111/j.1467-6494.2011.00739.x
                    
                  ."><span data-dcnode-id="3670" instrument_node="">2012</span></a><span data-dcnode-id="3668" instrument_node="">, </span><a aria-label="Reference 2013" data-dcnode-id="3666" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d307100786e503" title="Chen, F. F., Jing, Y., Hayes, A., &amp; Lee, J. M. (2013). Two concepts or two approaches? A bifactor analysis of psychological and subjective well-being. Journal of Happiness Studies, 
                           14, 1033–1068. doi:
                    10.1007/s10902-012-9367-x
                    
                  ."><span data-dcnode-id="3667" instrument_node="">2013</span></a><span data-dcnode-id="3665" instrument_node="">, </span><a aria-label="Reference 2006" data-dcnode-id="3663" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d307100786e506" title="Chen, F. F., West, S. G., &amp; Sousa, K. H. (2006). A comparison of bifactor and second-order models of quality of life. Multivariate Behavioral Research, 
                           41, 189–225. doi:
                    10.1207/s15327906mbr4102_5
                    
                  ."><span data-dcnode-id="3664" instrument_node="">2006</span></a><span data-dcnode-id="3662" instrument_node="">; Iani et al. </span><a aria-label="Reference 2014a" data-dcnode-id="3660" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d307100786e509" title="Iani, L., Lauriola, M., &amp; Costantini, M. (2014a). A confirmatory bifactor analysis of the hospital anxiety and depression scale in an Italian community sample. Health and Quality of Life Outcomes, 
                           12, 84. doi:
                    10.1186/1477-7525-12-84
                    
                  ."><span data-dcnode-id="3661" instrument_node="">2014a</span></a><span data-dcnode-id="3659" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="3657" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d307100786e512" title="Iani, L., Lauriola, M., Layous, K., &amp; Sirigatti, S. (2014b). Happiness in Italy: Translation, factorial structure and norming of the subjective happiness scale in a large community sample. Social Indicators Research, 
                           118, 953–967. doi:
                    10.1007/s11205-013-0468-7
                    
                  ."><span data-dcnode-id="3658" instrument_node="">b</span></a><span data-dcnode-id="3656" instrument_node="">; Reise </span><a aria-label="Reference 2012" data-dcnode-id="3654" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d307100786e516" title="Reise, S. P. (2012). The rediscovery of bifactor measurement models. Multivariate Behavioral Research, 
                           47, 667–696. doi:
                    10.1080/00273171.2012.715555
                    
                  ."><span data-dcnode-id="3655" instrument_node="">2012</span></a><span data-dcnode-id="3653" instrument_node="">). Bifactor models parse personality ratings variance into orthogonal components that reflect either the influence of a general factor shared by all facets or the unique contributions of specific orthogonal factors associated with each facet (Chen et al. </span><a aria-label="Reference 2012" data-dcnode-id="3651" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d307100786e519" title="Chen, F. F., Hayes, A., Carver, C. S., Laurenceau, J. P., &amp; Zhang, Z. (2012). Modeling general and specific variance in multifaceted constructs: A comparison of the bifactor model to other approaches. Journal of Personality, 
                           80, 219–251. doi:
                    10.1111/j.1467-6494.2011.00739.x
                    
                  ."><span data-dcnode-id="3652" instrument_node="">2012</span></a><span data-dcnode-id="3650" instrument_node="">). Researchers have typically followed either total or subscale score approaches (e.g., Albuquerque et al. </span><a aria-label="Reference 2012" data-dcnode-id="3648" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d307100786e522" title="Albuquerque, I., de Lima, M. P., Matos, M., &amp; Figueiredo, C. (2012). Personality and subjective well-being: What hides behind global analyses? Social Indicators Research, 
                           105, 447–460. doi:
                    10.1007/s11205-010-9780-7
                    
                  ."><span data-dcnode-id="3649" instrument_node="">2012</span></a><span data-dcnode-id="3647" instrument_node="">; Anglim and Grant </span><a aria-label="Reference 2016" data-dcnode-id="3645" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d307100786e525" title="Anglim, J., &amp; Grant, S. (2016). Predicting psychological and subjective well-being from personality: Incremental prediction from 30 facets over the big 5. Journal of Happiness Studies, 
                           17, 59–80. doi:
                    10.1007/s10902-014-9583-7
                    
                  ."><span data-dcnode-id="3646" instrument_node="">2016</span></a><span data-dcnode-id="3644" instrument_node="">; Marrero Quevedo and Carballeira Abella </span><a aria-label="Reference 2011" data-dcnode-id="3642" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d307100786e528" title="Marrero Quevedo, R. J., &amp; Carballeira Abella, M. (2011). Well-being and personality: Facet-level analyses. Personality and Individual Differences, 
                           50, 206–211. doi:
                    10.1016/j.paid.2010.09.030
                    
                  ."><span data-dcnode-id="3643" instrument_node="">2011</span></a><span data-dcnode-id="3641" instrument_node="">; Schimmack et al. </span><a aria-label="Reference 2004" data-dcnode-id="3639" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d307100786e531" title="Schimmack, U., Oishi, S., Furr, R. M., &amp; Funder, D. C. (2004). Personality and life satisfaction: A facet-level analysis. Personality and Social Psychology Bulletin, 
                           30, 1062–1075. doi:
                    10.1177/0146167204264292
                    
                  ."><span data-dcnode-id="3640" instrument_node="">2004</span></a><span data-dcnode-id="3638" instrument_node="">). The former approach is based on summing all individual facets to produce a total score, such as the P-scale score, that mainly captures the common variance in positivity. The latter approach uses subscale scores for each facet, but the their unique variance is entangled with common variance in the general construct. It follows that a bifactor approach is the most effective way of modeling relationships between hierarchical, multifaceted constructs and might be useful to scholars trying to assess the contributions of specific personality facets to happiness.</span></p><p data-dcnode-id="3632"><span data-dcnode-id="3636" instrument_node="">Since positivity is a multifaceted construct, we modeled it using a bifactor model that assessed the relative contributions of facets and general traits whilst controlling for variance in the other. A bifactor model of positivity is also consistent with the theoretical definition of the construct, and expands on previous research in which the P-scale has been used to capture the common variance in the three distinct components of positivity. In this study we used optimism, self-esteem, and life satisfaction items to derive a latent variable representing general positive cognitions and evaluations (i.e., positivity; Caprara et al. </span><a aria-label="Reference 2012" data-dcnode-id="3634" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d307100786e537" title="Caprara, G. V., Alessandri, G., Eisenberg, N., Kupfer, A., Steca, P., Caprara, M. G., et al. (2012). The positivity scale. Psychological Assessment, 
                           24, 701–712. doi:
                    10.1037/a0026681
                    
                  ."><span data-dcnode-id="3635" instrument_node="">2012</span></a><span data-dcnode-id="3633" instrument_node="">), but, at the same time, we also modeled three group factors reflecting the variance specific to each constituent element of positivity. We used this approach to assess whether orthogonal general and group factors related to personality were independently associated with subjective happiness, either through the general positivity variable or through its constituent components (i.e., optimism, self-esteem and life satisfaction).</span></p><p data-dcnode-id="3627"><span data-dcnode-id="3631" instrument_node="">Although bifactor modeling has been used in recent subjective well-being studies (e.g., Chen et al. </span><a aria-label="Reference 2013" data-dcnode-id="3629" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d307100786e544" title="Chen, F. F., Jing, Y., Hayes, A., &amp; Lee, J. M. (2013). Two concepts or two approaches? A bifactor analysis of psychological and subjective well-being. Journal of Happiness Studies, 
                           14, 1033–1068. doi:
                    10.1007/s10902-012-9367-x
                    
                  ."><span data-dcnode-id="3630" instrument_node="">2013</span></a><span data-dcnode-id="3628" instrument_node="">), to the best of our knowledge our study is the first to use this approach for both predictor and mediator variables. We hypothesized that the general positivity factor would completely explain the process by which a personality trait and its facets influence a global well-being outcome, such as subjective happiness. If the results did not support our complete mediation, other indirect effects are possible (i.e., mediators other than positivity). In other words, evidence of either partial or complete mediation of the relationship between personality traits and subjective happiness by a general positivity construct would constitute evidence that positivity was an intermediate variable which could account for variance in subjective happiness.</span></p><p data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">Nested in the aforementioned mediation models, we also tested whether an alternative bifactor model of positivity, based solely on optimism and self-esteem, mediated the relationship between personality and a broad latent variable subsuming both subjective happiness and life satisfaction items. We expected that comparison of the two nested models would shed light on the status of positivity and life satisfaction within the set of constructs represented in our study. Specifically, we hypothesized that life satisfaction would have a central role in our model. Briefly, we predicted that the relationship between life satisfaction and subjective happiness would be partly described by the general positivity factor, which represents a common tendency to appraise things positively, and partly by the specific group factor, which represents life satisfaction aspects not shared with optimism and self-esteem.</span></p></div></div></section><section data-dcnode-id="3330" data-title="Methods"><div class="c-article-section" data-dcnode-id="3331" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3620" id="Sec2"><span data-dcnode-id="3621" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="3332" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="3618" id="Sec3"><span data-dcnode-id="3619" instrument_node="">Participants and Procedure</span></h3><p data-dcnode-id="3592"><span data-dcnode-id="3617" instrument_node="">The study was approved by the ethical review board for psychological research of the European University of Rome. The data were collected from 770 adults at the Popular University of Rome.</span><sup data-dcnode-id="3612"><a data-dcnode-id="3613" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node="">Footnote </span></span><span data-dcnode-id="3614" instrument_node="">1</span></a></sup><span data-dcnode-id="3611" instrument_node=""> Twenty-six participants were excluded from analyses because they provided incomplete data on (1) at least three out of four subjective happiness items (</span><i data-dcnode-id="3609"><span data-dcnode-id="3610" instrument_node="">n</span></i><span data-dcnode-id="3608" instrument_node="">&nbsp;=&nbsp;8); (2) half the positivity facets items (</span><i data-dcnode-id="3606"><span data-dcnode-id="3607" instrument_node="">n</span></i><span data-dcnode-id="3605" instrument_node="">&nbsp;=&nbsp;9); (3) half the items for each personality facet (</span><i data-dcnode-id="3603"><span data-dcnode-id="3604" instrument_node="">n</span></i><span data-dcnode-id="3602" instrument_node="">&nbsp;=&nbsp;9). The final sample thus comprised 744 participants (69.4&nbsp;% women; 30.6&nbsp;% men), aged 18–92&nbsp;years (</span><i data-dcnode-id="3600"><span data-dcnode-id="3601" instrument_node="">M</span></i><span data-dcnode-id="3599" instrument_node="">&nbsp;=&nbsp;55.34; </span><i data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">SD</span></i><span data-dcnode-id="3596" instrument_node="">&nbsp;=&nbsp;16.01). The typical participant was married (48.3&nbsp;% of participants), retired (45.7&nbsp;%) and had a Master’s degree (54.3&nbsp;%). Sporadic missing values were imputed using a random Hot Deck method which involved replacing each missing value with an individual response from a similar case (i.e., same age and gender). The Hot Deck method is considered less sensitive to model misspecification than other imputation methods (Andridge and Little </span><a aria-label="Reference 2010" data-dcnode-id="3594" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d307100786e584" title="Andridge, R. R., &amp; Little, R. J. (2010). A review of hot deck imputation for survey non-response. International Statistical Review, 
                           78, 40–64. doi:
                    10.1111/j.1751-5823.2010.00103.x
                    
                  ."><span data-dcnode-id="3595" instrument_node="">2010</span></a><span data-dcnode-id="3593" instrument_node="">). Before any data were collected participants signed a consent form confirming that they understood the general aim of the study, that they had been informed about procedures for ensuring the confidentiality and anonymity of their data, that their participation was voluntary and that they could withdraw at any time. Data were collected over a 6-month period.</span></p><h3 class="c-article__sub-heading c-article__sub-heading--divider" data-dcnode-id="3590" id="Sec4"><span data-dcnode-id="3591" instrument_node="">Measures</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="3588" id="Sec5"><span data-dcnode-id="3589" instrument_node="">Personality</span></h4><p data-dcnode-id="3577"><span data-dcnode-id="3587" instrument_node="">Forty-eight items from the 120-item version of the International Personality Item Pool (IPIP-NEO; Johnson </span><a aria-label="Reference 2014" data-dcnode-id="3585" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d307100786e599" title="Johnson, J. A. (2014). Measuring thirty facets of the Five Factor Model with a 120-item public domain inventory: Development of the IPIP-NEO-120. Journal of Research in Personality, 
                           51, 78–89. doi:
                    10.1016/j.jrp.2014.05.003
                    
                  ."><span data-dcnode-id="3586" instrument_node="">2014</span></a><span data-dcnode-id="3584" instrument_node="">) were used to measure two broad personality traits (i.e., neuroticism and extraversion) and 12 personality facets. Thus, six four-item scales were used to measure facets of neuroticism (i.e., anxiety, anger, depression, self-consciousness, immoderation and vulnerability) and extraversion (friendliness, gregariousness, assertiveness, activity level, excitement-seeking and cheerfulness). Participants reported how well each item described them using a five-point Likert scale ranging from 1 (</span><i data-dcnode-id="3582"><span data-dcnode-id="3583" instrument_node="">very inaccurate</span></i><span data-dcnode-id="3581" instrument_node="">) to 5 (</span><i data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">very accurate</span></i><span data-dcnode-id="3578" instrument_node="">). Representative items are “Am often down in the dumps” (depression item), and “Love life” (cheerfulness item). Values of Cronbach’s alpha ranged from 0.49 to 0.85 for the Big Five facets in this sample.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="3575" id="Sec6"><span data-dcnode-id="3576" instrument_node="">Positivity</span></h4><p data-dcnode-id="3561"><span data-dcnode-id="3574" instrument_node="">Consistent with the bifactor model, general positivity and the group factors were derived from the scales used to develop the P-Scale (Caprara et al. </span><a aria-label="Reference 2012" data-dcnode-id="3572" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d307100786e616" title="Caprara, G. V., Alessandri, G., Eisenberg, N., Kupfer, A., Steca, P., Caprara, M. G., et al. (2012). The positivity scale. Psychological Assessment, 
                           24, 701–712. doi:
                    10.1037/a0026681
                    
                  ."><span data-dcnode-id="3573" instrument_node="">2012</span></a><span data-dcnode-id="3571" instrument_node="">). Dispositional optimism was assessed using the 10-item Revised Life Orientation Test (LOT-R; Scheier et al. </span><a aria-label="Reference 1994" data-dcnode-id="3569" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d307100786e619" title="Scheier, M. F., Carver, C. S., &amp; Bridges, M. W. (1994). Distinguishing optimism from neuroticism (and trait anxiety, self-mastery, and self-esteem): A reevaluation of the Life Orientation Test. Journal of Personality and Social Psychology, 
                           67, 1063–1078. doi:
                    10.1037/0022-3514.67.6.1063
                    
                  ."><span data-dcnode-id="3570" instrument_node="">1994</span></a><span data-dcnode-id="3568" instrument_node="">); higher scores reflect greater optimism, a sample item is “I hardly ever expect things to go my way” (reverse-scored item) and in this sample Cronbach’s α was 0.74. Self-esteem was measured using the 10-item Rosenberg Self-Esteem Scale (Rosenberg </span><a aria-label="Reference 1965" data-dcnode-id="3566" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d307100786e622" title="Rosenberg, M. (1965). Society and the adolescent self-image. Princeton, NJ: Princeton University Press."><span data-dcnode-id="3567" instrument_node="">1965</span></a><span data-dcnode-id="3565" instrument_node="">); higher scores indicate greater self-esteem, a sample item is “All in all, I am inclined to feel that I am a failure” (inverted item) and in this sample Cronbach’s α was 0.81. Life satisfaction was assessed using the five-item Satisfaction With Life Scale (SWLS; Diener et al. </span><a aria-label="Reference 1985" data-dcnode-id="3563" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d307100786e625" title="Diener, E. D., Emmons, R. A., Larsen, R. J., &amp; Griffin, S. (1985). The satisfaction with life scale. Journal of Personality Assessment, 
                           49, 71–75. doi:
                    10.1207/s15327752jpa4901_13
                    
                  ."><span data-dcnode-id="3564" instrument_node="">1985</span></a><span data-dcnode-id="3562" instrument_node="">); higher scores reflect greater life satisfaction, a sample item is “I am satisfied with my life” and in this sample Cronbach’s α was 0.87.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="3559" id="Sec7"><span data-dcnode-id="3560" instrument_node="">Happiness</span></h4><p data-dcnode-id="3545"><span data-dcnode-id="3558" instrument_node="">Subjective happiness was measured using the four-item Subjective Happiness Scale (SHS; Iani et al. </span><a aria-label="Reference 2014a" data-dcnode-id="3556" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d307100786e636" title="Iani, L., Lauriola, M., &amp; Costantini, M. (2014a). A confirmatory bifactor analysis of the hospital anxiety and depression scale in an Italian community sample. Health and Quality of Life Outcomes, 
                           12, 84. doi:
                    10.1186/1477-7525-12-84
                    
                  ."><span data-dcnode-id="3557" instrument_node="">2014a</span></a><span data-dcnode-id="3555" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="3553" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d307100786e639" title="Iani, L., Lauriola, M., Layous, K., &amp; Sirigatti, S. (2014b). Happiness in Italy: Translation, factorial structure and norming of the subjective happiness scale in a large community sample. Social Indicators Research, 
                           118, 953–967. doi:
                    10.1007/s11205-013-0468-7
                    
                  ."><span data-dcnode-id="3554" instrument_node="">b</span></a><span data-dcnode-id="3552" instrument_node="">; Lyubomirsky and Lepper </span><a aria-label="Reference 1999" data-dcnode-id="3550" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d307100786e642" title="Lyubomirsky, S., &amp; Lepper, H. S. (1999). A measure of subjective happiness: Preliminary reliability and construct validation. Social Indicators Research, 
                           46, 137–155. doi:
                    10.1023/A:1006824100041
                    
                  ."><span data-dcnode-id="3551" instrument_node="">1999</span></a><span data-dcnode-id="3549" instrument_node="">), a brief measure capturing people’s global judgments of their happiness. The SHS has proved to be valid and reliable and it has been widely used in many different countries and research contexts (e.g., Joshanloo and Jarden </span><a aria-label="Reference 2016" data-dcnode-id="3547" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d307100786e645" title="Joshanloo, M., &amp; Jarden, A. (2016). Individualism as the moderator of the relationship between hedonism and happiness: A study in 19 nations. Personality and Individual Differences, 
                           94, 149–152."><span data-dcnode-id="3548" instrument_node="">2016</span></a><span data-dcnode-id="3546" instrument_node="">). A higher average SHS score represents greater subjective happiness. In this sample Cronbach’s α was 0.74.</span></p><h3 class="c-article__sub-heading c-article__sub-heading--divider" data-dcnode-id="3543" id="Sec8"><span data-dcnode-id="3544" instrument_node="">Data Analysis</span></h3><p data-dcnode-id="3532"><span data-dcnode-id="3542" instrument_node="">Structural equation modeling implemented in EQS.&nbsp;6.1 was used to test mediation hypotheses (Bentler </span><a aria-label="Reference 2005" data-dcnode-id="3540" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d307100786e657" title="Bentler, P. M. (2005). EQS&nbsp;6: Structural equations program manual. Encino, CA: Multivariate Software Inc."><span data-dcnode-id="3541" instrument_node="">2005</span></a><span data-dcnode-id="3539" instrument_node="">). Although it would have been possible to test a comprehensive mediation model involving neuroticism, extraversion, positivity and subjective happiness, we chose to perform separate analyses to determine how neuroticism and extraversion were related to positivity and subjective happiness.</span><sup data-dcnode-id="3534"><a data-dcnode-id="3535" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">Footnote </span></span><span data-dcnode-id="3536" instrument_node="">2</span></a></sup><span data-dcnode-id="3533" instrument_node=""> This choice represented a compromise between theoretical reasons, such as examining the role of both general and group personality factors as predictors of subjective happiness, and the complexity of the bifactor model.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="3530" id="Sec9"><span data-dcnode-id="3531" instrument_node="">Model Specification</span></h4><p data-dcnode-id="3516"><span data-dcnode-id="3529" instrument_node="">All analyses relating to neuroticism and extraversion involved seven exogenous latent variables (e.g., six neuroticism group factors, each representing a specific IPIP-NEO facet, plus a general neuroticism factor), and five endogenous latent variables (i.e., three positivity group factors, namely life satisfaction, optimism and self-esteem, plus a general positivity factor and a single subjective happiness factor) (see Figs.&nbsp;</span><a data-dcnode-id="3527" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3528" instrument_node="">1</span></a><span data-dcnode-id="3526" instrument_node="">, </span><a data-dcnode-id="3524" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3525" instrument_node="">2</span></a><span data-dcnode-id="3523" instrument_node="">). To shed light on the status of positivity and life satisfaction we also tested an alternative model with four endogenous latent variables (i.e., two positivity group factors, representing optimism and self-esteem, plus a general positivity factor and a broad subjective well-being factor based on life satisfaction and subjective happiness items). Neuroticism, extraversion and positivity were represented by bifactor models in each class of models. However, the alternative model assumed both a narrower definition of positivity and a broader definition of subjective well-being. Before testing specific mediation hypotheses we compared the bifactor model, depicted in Figs.&nbsp;</span><a data-dcnode-id="3521" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3522" instrument_node="">1</span></a><span data-dcnode-id="3520" instrument_node=""> and </span><a data-dcnode-id="3518" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3519" instrument_node="">2</span></a><span data-dcnode-id="3517" instrument_node="">, with the alternative model just described. Returning to mediation analyses, we tested whether general and group neuroticism (or extraversion) factors predicted subjective happiness (or broad subjective well-being, in the case of the alternative model was not a significant loss of fit) via their relationship with general positivity. In particular, we tested a complete mediation model for each personality trait in which neuroticism (or extraversion) group and general factors had a direct effect on the positivity factor but not on the subjective happiness factor. This model’s fit was compared to the fit of a partial mediation model which specified direct effects of neuroticism (or extraversion) group and general factors on subjective happiness as additional free parameters. The Chi square difference test was used to assess whether the partial mediation model was a significant improvement on the complete mediation model. After this structural parameters were inspected to identify non-significant structural paths which could be removed in model trimming.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3441" data-test="figure" data-title="Fig.&nbsp;1" id="figure-1"><figure data-dcnode-id="3442"><figcaption data-dcnode-id="3513"><b class="c-article-section__figure-caption" data-dcnode-id="3514" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="3515" instrument_node="">Fig.&nbsp;1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3453"><div class="c-article-section__figure-item" data-dcnode-id="3508"><a class="c-article-section__figure-link" data-dcnode-id="3509" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="htt s for the respecified model are in </span><i data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">parentheses</span></i><span data-dcnode-id="3425" instrument_node="">). For ease of presentation, only significant structural paths are reported; error terms covariances are omitted. </span><i data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">Dotted lines</span></i><span data-dcnode-id="3422" instrument_node=""> are insignificant relationships. </span><i data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">EXT</span></i><span data-dcnode-id="3419" instrument_node=""> extraversion, </span><i data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">FRI</span></i><span data-dcnode-id="3416" instrument_node=""> friendliness, </span><i data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">ASS</span></i><span data-dcnode-id="3413" instrument_node=""> assertiveness, </span><i data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node="">ACT LEV</span></i><span data-dcnode-id="3410" instrument_node=""> activity level, </span><i data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">EXC</span></i><span data-dcnode-id="3407" instrument_node=""> excitement seeking, </span><i data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">CHE</span></i><span data-dcnode-id="3404" instrument_node=""> cheerfulness, </span><i data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">POS</span></i><span data-dcnode-id="3401" instrument_node=""> positivity, </span><i data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node="">SAT</span></i><span data-dcnode-id="3398" instrument_node=""> satisfaction, </span><i data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">OPT</span></i><span data-dcnode-id="3395" instrument_node=""> optimism, </span><i data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">EST</span></i><span data-dcnode-id="339
