</span><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="3365" id="Sec10"><span data-dcnode-id="3366" instrument_node="">Assessment of Model Fit</span></h4><p data-dcnode-id="3333"><span data-dcnode-id="3364" instrument_node="">The following fit indices were used to assess model fit: Satorra–Bentler scaled χ</span><sup data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">2</span></sup><span data-dcnode-id="3361" instrument_node=""> (SBχ</span><sup data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">2</span></sup><span data-dcnode-id="3358" instrument_node="">), Comparative Fit Index (CFI), Bentler–Bonnett Non-Normed Fit Index (NNFI), Root Mean Square Error of Approximation (RMSEA) with its 90&nbsp;% confidence interval (90&nbsp;% CI), and the Standardized Root Mean Square Residual (SRMR). The SBχ</span><sup data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">2</span></sup><span data-dcnode-id="3355" instrument_node=""> is a test of model misspecification which is preferred to χ</span><sup data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">2</span></sup><span data-dcnode-id="3352" instrument_node=""> as a robust method for non-normal data. A significant SBχ</span><sup data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">2</span></sup><span data-dcnode-id="3349" instrument_node=""> indicates that the covariance matrix derived from the hypothesized model deviates from the observed covariance matrix. As the SBχ</span><sup data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">2</span></sup><span data-dcnode-id="3346" instrument_node=""> statistic is dependent on sample size and vulnerable to violations of the assumption of multivariate normality we also used other fit indices. RMSEA is a ‘badness of fit’ index representing the average lack of fit per degree of freedom. Values of RMSEA less than or equal to 0.05 indicate that the data are a close fit to the model, values greater than 0.05 but less than or equal to 0.08 indicate acceptable fit and values greater than 0.10 indicate poor fit (Browne and Cudek </span><a aria-label="Reference 1993" data-dcnode-id="3344" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d307100786e851" title="Browne, M. W., &amp; Cudek, R. (1993). Alternative ways of assessing model fit. In K. A. Bollen &amp; J. S. Long (Eds.), Testing structural equation models (pp. 136–162). Newbury Park, CA: Sage."><span data-dcnode-id="3345" instrument_node="">1993</span></a><span data-dcnode-id="3343" instrument_node="">). The 90&nbsp;% CI for the RMSEA is often used to make decisions about fit. A 90&nbsp;% CI with a lower limit of &lt;0.05 and an upper limit of less than 0.08 indicates the possibility of close fit, whereas an upper limit of 0.10 indicates an acceptable fit (Browne and Cudek </span><a aria-label="Reference 1993" data-dcnode-id="3341" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d307100786e854" title="Browne, M. W., &amp; Cudek, R. (1993). Alternative ways of assessing model fit. In K. A. Bollen &amp; J. S. Long (Eds.), Testing structural equation models (pp. 136–162). Newbury Park, CA: Sage."><span data-dcnode-id="3342" instrument_node="">1993</span></a><span data-dcnode-id="3340" instrument_node="">). The SRMR is another ‘badness of fit’ index; it represents the average value of model’s standardized residuals. SRMR values less than or equal to 0.08 are considered good (Hu and Bentler </span><a aria-label="Reference 1999" data-dcnode-id="3338" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d307100786e857" title="Hu, L. T., &amp; Bentler, P. M. (1999). Cutoff criteria for fit indexes in covariance structure analysis: Conventional criteria versus new alternatives. Structural Equation Modeling: A Multidisciplinary Journal, 
                           6, 1–55. doi:
                    10.1080/10705519909540118
                    
                  ."><span data-dcnode-id="3339" instrument_node="">1999</span></a><span data-dcnode-id="3337" instrument_node="">). The CFI and the NNFI are incremental fit indices. The CFI compares the adequacy of a specified model and a baseline model that assumes that observed variables are uncorrelated. Values of CFI greater than or equal to 0.95 indicate good fit, values &lt;0.95 but &gt;0.90 indicate adequate fit and values &lt;0.90 indicate a poor fit (Whitley and Kite </span><a aria-label="Reference 2013" data-dcnode-id="3335" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d307100786e860" title="Whitley, B. E., Jr., &amp; Kite, M. E. (2013). Principles of research in behavioral science (3rd ed.). New York: Routledge."><span data-dcnode-id="3336" instrument_node="">2013</span></a><span data-dcnode-id="3334" instrument_node="">). The NNFI penalizes model complexity but like the CFI, the NNFI ranges from 0 to 1.0; values &gt;0.90 indicate adequate fit, and values greater than or equal to 0.95 indicate good fit.</span></p></div></div></section><section data-dcnode-id="3036" data-title="Results"><div class="c-article-section" data-dcnode-id="3037" id="Sec11-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3328" id="Sec11"><span data-dcnode-id="3329" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="3038" id="Sec11-content"><h3 class="c-article__sub-heading" data-dcnode-id="3326" id="Sec12"><span data-dcnode-id="3327" instrument_node="">Neuroticism, Positivity and Subjective Happiness</span></h3><p data-dcnode-id="3261"><span data-dcnode-id="3325" instrument_node="">The complete mediation model with five endogenous latent variables was significant (SBχ</span><sup data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">2</span></sup><span data-dcnode-id="3322" instrument_node="">&nbsp;=&nbsp;2222.19, </span><i data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">df</span></i><span data-dcnode-id="3319" instrument_node="">&nbsp;=&nbsp;1071; </span><i data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">p</span></i><span data-dcnode-id="3316" instrument_node="">&nbsp;&lt;&nbsp;.001). Despite marginally unacceptable incremental fit indices (NNFI&nbsp;=&nbsp;0.891; CFI&nbsp;=&nbsp;0.901), RMSEA and SRMR indicated good fit (RMSEA&nbsp;=&nbsp;0.038; 90&nbsp;% CI 0.036, 0.040; SRMR&nbsp;=&nbsp;0.049). The alternative mediation model with four endogenous latent variables was also significant (SBχ</span><sup data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node="">2</span></sup><span data-dcnode-id="3313" instrument_node="">&nbsp;=&nbsp;2617.00, </span><i data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">df</span></i><span data-dcnode-id="3310" instrument_node="">&nbsp;=&nbsp;1077; </span><i data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">p</span></i><span data-dcnode-id="3307" instrument_node="">&nbsp;&lt;&nbsp;.001). Although the RMSEA and SRMR indicated that the alternative model was a good fit (RMSEA&nbsp;=&nbsp;0.044; 90&nbsp;% CI 0.042, 0.046; SRMR&nbsp;=&nbsp;0.058), the incremental fit indices indicated far from acceptable fit (NNFI&nbsp;=&nbsp;0.855; CFI&nbsp;=&nbsp;0.867). Importantly, however, the alternative model was a significantly worse fit compared than the previous complete mediation model (∆χ</span><sup data-dcnode-id="3305"><span data-dcnode-id="3306" instrument_node="">2</span></sup><span data-dcnode-id="3304" instrument_node="">&nbsp;=&nbsp;221.89, </span><i data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">df</span></i><span data-dcnode-id="3301" instrument_node="">&nbsp;=&nbsp;6; </span><i data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">p</span></i><span data-dcnode-id="3298" instrument_node="">&nbsp;&lt;&nbsp;.0001). Based on this evidence we opted to test specific mediation hypotheses using models with five endogenous latent variables, as depicted in Fig.&nbsp;</span><a data-dcnode-id="3296" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3297" instrument_node="">1</span></a><span data-dcnode-id="3295" instrument_node="">. To assess how important the general positivity factor was in accounting for the total effect of neuroticism factors on subjective happiness we tested a partial mediation model that included a direct effect of general neuroticism on subjective happiness. This model (SBχ</span><sup data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">2</span></sup><span data-dcnode-id="3292" instrument_node="">&nbsp;=&nbsp;2220.94, </span><i data-dcnode-id="3290"><span data-dcnode-id="3291" instrument_node="">df</span></i><span data-dcnode-id="3289" instrument_node="">&nbsp;=&nbsp;1070; NNFI&nbsp;=&nbsp;0.891; CFI&nbsp;=&nbsp;0.901, RMSEA&nbsp;=&nbsp;0.038; 90&nbsp;% CI 0.036, 0.040; SRMR&nbsp;=&nbsp;0.049) was not a significant improvement on the complete mediation model (∆χ</span><sup data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">2</span></sup><span data-dcnode-id="3286" instrument_node="">&nbsp;=&nbsp;1.09, </span><i data-dcnode-id="3284"><span data-dcnode-id="3285" instrument_node="">df</span></i><span data-dcnode-id="3283" instrument_node="">&nbsp;=&nbsp;1; </span><i data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">p</span></i><span data-dcnode-id="3280" instrument_node="">&nbsp;=&nbsp;.29), so we also tested partial mediation models incorporating direct effects of anger and vulnerability. This partial mediation model (SBχ</span><sup data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">2</span></sup><span data-dcnode-id="3277" instrument_node="">&nbsp;=&nbsp;2220.43, </span><i data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">df</span></i><span data-dcnode-id="3274" instrument_node="">&nbsp;=&nbsp;1068; NNFI&nbsp;=&nbsp;0.890; CFI&nbsp;=&nbsp;0.901, RMSEA&nbsp;=&nbsp;0.038; 90&nbsp;% CI 0.036, 0.040; SRMR&nbsp;=&nbsp;0.049) also failed to improve significantly on the fit of the complete mediation model (∆χ</span><sup data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">2</span></sup><span data-dcnode-id="3271" instrument_node="">&nbsp;=&nbsp;0.52, </span><i data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">df</span></i><span data-dcnode-id="3268" instrument_node="">&nbsp;=&nbsp;2, </span><i data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">p</span></i><span data-dcnode-id="3265" instrument_node="">&nbsp;=&nbsp;.77). It follows that general positivity completely accounted for the relationship between neuroticism and subjective happiness, both in terms of the general factor and the group factors. As seen in Fig.&nbsp;</span><a data-dcnode-id="3263" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3264" instrument_node="">1</span></a><span data-dcnode-id="3262" instrument_node="">, structural paths from neuroticism factors to positivity were significant for general neuroticism, anger and vulnerability and their joint effect accounted for 96&nbsp;% of the variance in the general positivity factor. No positivity facet except life satisfaction had a significant effect on subjective happiness. Together general positivity and life satisfaction accounted for 63&nbsp;% of the variance in subjective happiness.</span></p><p data-dcnode-id="3241"><span data-dcnode-id="3260" instrument_node="">Although RMSEA and SRMR indicated good fit, all the models tested so far had unacceptable NNFIs, whilst the CFIs were barely acceptable. The inconsistency of the fit indices may have been due to the tendency for incremental fit indices to be negatively affected by “the omission of small, theoretically insignificant factor loadings and correlated error terms in the model” (Cheung and Rensvold </span><a aria-label="Reference 2002" data-dcnode-id="3258" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d307100786e939" title="Cheung, G. W., &amp; Rensvold, R. B. (2002). Evaluating goodness-of-fit indexes for testing measurement invariance. Structural Equation Modeling, 
                           9, 233–255. doi:
                    10.1207/S15328007SEM0902_5
                    
                  ."><span data-dcnode-id="3259" instrument_node="">2002</span></a><span data-dcnode-id="3257" instrument_node="">, p. 250). We investigated whether adding a limited number of correlated error terms would improve model fit sufficiently to meet criteria for acceptable fit. Releasing constraints on error terms is regarded as less theoretically concerned than adding cross-loading parameters (Fan </span><a aria-label="Reference 2010" data-dcnode-id="3255" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d307100786e942" title="Fan, W. (2010). Impact of measurement model modification on structural parameter integrity when measurement model is misspecified. Journal of Modern Applied Statistical Methods, 
                           9, 103–115."><span data-dcnode-id="3256" instrument_node="">2010</span></a><span data-dcnode-id="3254" instrument_node="">). First, Lagrange Multiplier tests were used to identify correlated error terms for release (Chou and Bentler </span><a aria-label="Reference 1990" data-dcnode-id="3252" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d307100786e945" title="Chou, C. P., &amp; Bentler, P. M. (1990). Model modification in covariance structure modeling: A comparison among likelihood ratio, Lagrange multiplier, and Wald tests. Multivariate Behavioral Research, 
                           25(1), 115–136. doi:
                    10.1207/s15327906mbr2501_13
                    
                  ."><span data-dcnode-id="3253" instrument_node="">1990</span></a><span data-dcnode-id="3251" instrument_node="">). Then, we evaluated if model modifications made theoretical sense (Anderson and Gerbing </span><a aria-label="Reference 1988" data-dcnode-id="3249" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d307100786e948" title="Anderson, J. C., &amp; Gerbing, D. W. (1988). Structural equation modeling in practice: A review and recommended two-step approach. Psychological Bulletin, 
                           103, 411–423. doi:
                    10.1037/0033-2909.103.3.411
                    
                  ."><span data-dcnode-id="3250" instrument_node="">1988</span></a><span data-dcnode-id="3248" instrument_node="">; Schreiber et al. </span><a aria-label="Reference 2006" data-dcnode-id="3246" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d307100786e951" title="Schreiber, J. B., Nora, A., Stage, F. K., Barlow, E. A., &amp; King, J. (2006). Reporting structural equation modeling and confirmatory factor analysis results: A review. The Journal of Educational Research, 
                           99, 323–338. doi:
                    10.3200/JOER.99.6.323-338
                    
                  ."><span data-dcnode-id="3247" instrument_node="">2006</span></a><span data-dcnode-id="3245" instrument_node="">). In doing this we followed two criteria: (1) all correlated errors should involve items from a single instrument (i.e., correlated errors for items that belong to the same scale) and (2) items with similar wording or overlapping content should be present (Ullman </span><a aria-label="Reference 2006" data-dcnode-id="3243" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d307100786e955" title="Ullman, J. B. (2006). Structural equation modeling: Reviewing the basics and moving forward. Journal of Personality Assessment, 
                           87, 35–50. doi:
                    10.1207/s15327752jpa8701_03
                    
                  ."><span data-dcnode-id="3244" instrument_node="">2006</span></a><span data-dcnode-id="3242" instrument_node="">).</span></p><p data-dcnode-id="3227"><span data-dcnode-id="3240" instrument_node="">A re-specified complete mediation model with just one correlated error term proved to be an acceptable fit to the data (SBχ</span><sup data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">2</span></sup><span data-dcnode-id="3237" instrument_node="">&nbsp;=&nbsp;2070.64, </span><i data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">df</span></i><span data-dcnode-id="3234" instrument_node="">&nbsp;=&nbsp;1070; NNFI&nbsp;=&nbsp;0.905; CFI&nbsp;=&nbsp;0.914, RMSEA&nbsp;=&nbsp;0.036; 90&nbsp;% CI 0.033, 0.038; SRMR&nbsp;=&nbsp;0.049). Although the Lagrange multiplier test statistics suggested adding other free parameters we did not incorporate them into the model. Importantly, as one can see from Table&nbsp;</span><a data-dcnode-id="3232" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3233" instrument_node="">1</span></a><span data-dcnode-id="3231" instrument_node=""> and Fig.&nbsp;</span><a data-dcnode-id="3229" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3230" instrument_node="">1</span></a><span data-dcnode-id="3228" instrument_node="">, structural and measurement paths were virtually the same before and after re-specification, showing that the modifications did not alter the conclusions of the mediation hypothesis testing.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3212" data-test="inline-table" id="table-1"><figure data-dcnode-id="3213"><figcaption class="c-article-table__figcaption" data-dcnode-id="3224"><b data-dcnode-id="3225" data-test="table-caption" id="Tab1"><span data-dcnode-id="3226" instrument_node="">Table&nbsp;1 Standardized factor loadings and omega coefficients for neuroticism, positivity and subjective happiness in not respecified and respecified models</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3214"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="3215" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10902-016-9792-3/tables/1" rel="nofollow"><span data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3216" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3217" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3218" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3221" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3220" fill-rule="evenodd"></path><span data-dcnode-id="3219" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3211" instrument_node="">
</span><p data-dcnode-id="3182"><span data-dcnode-id="3210" instrument_node="">To obtain greater insight into the relationships between the various constructs we based our interpretation of the general factors in the model on items with higher factor loadings (λ&nbsp;&gt;&nbsp;0.60). The best markers of neuroticisim were items such as “Fear for the worst”; “Am afraid of many things”; “Often feel blue”; “Am often down in the dumps”; “Become overwhelmed by events”; “Feel that I’m unable to deal with things” (see Table&nbsp;</span><a data-dcnode-id="3208" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3209" instrument_node="">1</span></a><span data-dcnode-id="3207" instrument_node="">). These items belong to the anxiety, depression and vulnerability facets of neuroticism and mostly describe emotional responses to stressful situations that interfere with one’s daily activities or level of functioning. According to DeYoung et al. (</span><a aria-label="Reference 2007" data-dcnode-id="3205" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d307100786e4004" title="DeYoung, C. G., Quilty, L. C., &amp; Peterson, J. B. (2007). Between facets and domains: 10 aspects of the Big Five. Journal of Personality and Social Psychology, 
                           93, 880–896. doi:
                    10.1037/0022-3514.93.5.880
                    
                  ."><span data-dcnode-id="3206" instrument_node="">2007</span></a><span data-dcnode-id="3204" instrument_node="">) depression, vulnerability, and anxiety are markers of </span><i data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">withdrawal</span></i><span data-dcnode-id="3201" instrument_node="">, a component of neuroticism that accounts for problems of inhibition, inwardly directed negative affect and heightened stress reactivity (e.g., Felsten </span><a aria-label="Reference 2004" data-dcnode-id="3199" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d307100786e4010" title="Felsten, G. (2004). Stress reactivity and vulnerability to depressed mood in college students. Personality and Individual Differences, 
                           36, 789–800. doi:
                    10.1016/S0191-8869(03)00152-1
                    
                  ."><span data-dcnode-id="3200" instrument_node="">2004</span></a><span data-dcnode-id="3198" instrument_node="">). Using Reise’s (</span><a aria-label="Reference 2012" data-dcnode-id="3196" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d307100786e4013" title="Reise, S. P. (2012). The rediscovery of bifactor measurement models. Multivariate Behavioral Research, 
                           47, 667–696. doi:
                    10.1080/00273171.2012.715555
                    
                  ."><span data-dcnode-id="3197" instrument_node="">2012</span></a><span data-dcnode-id="3195" instrument_node="">) procedure we carried out a reliability analysis of the bifactor model to assess how general and specific sources of variance were distributed</span><sup data-dcnode-id="3190"><a data-dcnode-id="3191" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">Footnote </span></span><span data-dcnode-id="3192" instrument_node="">3</span></a></sup><span data-dcnode-id="3189" instrument_node=""> (see Table&nbsp;</span><a data-dcnode-id="3187" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3188" instrument_node="">1</span></a><span data-dcnode-id="3186" instrument_node="">). Overall the omega coefficients were acceptable (i.e., &gt;0.60) for all group factors except self-consciousness. After partialing out reliable variance accounted for by the general factor the residualized omega coefficients for group factors fell remarkably for anxiety, depression and vulnerability. In contrast the omega hierarchical coefficient for the general factor (ω</span><sub data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">h</span></sub><span data-dcnode-id="3183" instrument_node="">&nbsp;=&nbsp;0.72) still was high compared to standard omega (ω&nbsp;=&nbsp;0.88), thus providing evidence of the reliability of the general factor.</span></p><p data-dcnode-id="3165"><span data-dcnode-id="3181" instrument_node="">The general positivity factor was mostly loaded by self-esteem items such as “I take a positive attitude toward myself”, “On the whole, I am satisfied with myself”, “I certainly feel useless at times” (reverse scored), “At times, I think I am no good at all” (reverse scored) and optimism items such as “I’m always optimistic about my future” (Table&nbsp;</span><a data-dcnode-id="3179" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3180" instrument_node="">1</span></a><span data-dcnode-id="3178" instrument_node="">). Omega scale coefficients were high for life satisfaction, optimism and self-esteem; however once general factor variance was partialed out, the values of residualized coefficients for optimism and self-esteem, but not life satisfaction, were much lower. It follows that the former two positivity facets were not reliable indicators of specific constructs. However, a relatively large portion of the life satisfaction variance was accounted for by the group factor, indicating that this component of positivity was distinct from optimism and self-esteem.</span><sup data-dcnode-id="3173"><a data-dcnode-id="3174" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">Footnote </span></span><span data-dcnode-id="3175" instrument_node="">4</span></a></sup><span data-dcnode-id="3172" instrument_node=""> On the other hand, the hierarchical omega coefficient for the general factor (ω</span><sub data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">h</span></sub><span data-dcnode-id="3169" instrument_node="">&nbsp;=&nbsp;0.72) was still high compared with the standard omega coefficient (ω&nbsp;=&nbsp;0.88), thus indicating that most of the reliable variance in the positivity measurement model was accounted for by the general factor. As a whole, these findings corroborated our interpretation of the general positivity factor as being consistent with the original definition of the construct (Caprara </span><a aria-label="Reference 2009" data-dcnode-id="3167" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d307100786e4049" title="Caprara, G. V. (2009). Positive orientation: Turning potentials into optimal functioning. The Bulletin of the European Health Psychologist, 
                           11, 46–48."><span data-dcnode-id="3168" instrument_node="">2009</span></a><span data-dcnode-id="3166" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3163" id="Sec13"><span data-dcnode-id="3164" instrument_node="">Extraversion, Positivity and Subjective Happiness</span></h3><p data-dcnode-id="3119"><span data-dcnode-id="3162" instrument_node="">We used the same data analysis strategy as for neuroticism. Again, the complete mediation model (SBχ</span><sup data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">2</span></sup><span data-dcnode-id="3159" instrument_node="">&nbsp;=&nbsp;2738.59, </span><i data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">df</span></i><span data-dcnode-id="3156" instrument_node="">&nbsp;=&nbsp;1071) had unacceptable incremental fit indices (NNFI&nbsp;=&nbsp;0.862; CFI&nbsp;=&nbsp;0.875), whereas RMSEA and SRMR indicated good fit (RMSEA&nbsp;=&nbsp;0.046; 90&nbsp;% CI 0.044, 0.048; SRMR&nbsp;=&nbsp;0.061). As for neuroticism, the alternative model with four endogenous latent variables had unacceptable fit (SBχ</span><sup data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">2</span></sup><span data-dcnode-id="3153" instrument_node="">&nbsp;=&nbsp;3119.00, </span><i data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">df</span></i><span data-dcnode-id="3150" instrument_node="">&nbsp;=&nbsp;1077; </span><i data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">p</span></i><span data-dcnode-id="3147" instrument_node="">&nbsp;&lt;&nbsp;.001; NNFI&nbsp;=&nbsp;0.832; CFI&nbsp;=&nbsp;0.847; RMSEA&nbsp;=&nbsp;0.051; 90&nbsp;% CI 0.048, 0.053; SRMR&nbsp;=&nbsp;0.067), and represented a significant loss of fit compared with the previous model (∆χ</span><sup data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">2</span></sup><span data-dcnode-id="3144" instrument_node="">&nbsp;=&nbsp;175.80, </span><i data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">df</span></i><span data-dcnode-id="3141" instrument_node="">&nbsp;=&nbsp;6; </span><i data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">p</span></i><span data-dcnode-id="3138" instrument_node="">&nbsp;&lt;&nbsp;.0001). Specific mediation hypotheses were therefore tested using models based on five endogenous latent variables (Fig.&nbsp;</span><a data-dcnode-id="3136" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3137" instrument_node="">2</span></a><span data-dcnode-id="3135" instrument_node="">). The fit indices for the partial mediation model with a direct path from general extraversion to subjective happiness were similar to those for the complete mediation model (SBχ</span><sup data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">2</span></sup><span data-dcnode-id="3132" instrument_node="">&nbsp;=&nbsp;2731.19, </span><i data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">df</span></i><span data-dcnode-id="3129" instrument_node="">&nbsp;=&nbsp;1070, NNFI&nbsp;=&nbsp;0.863; CFI&nbsp;=&nbsp;0.875, RMSEA&nbsp;=&nbsp;0.046; 90&nbsp;% CI 0.044, 0.048; SRMR&nbsp;=&nbsp;0.059); however the partial mediation model was a significantly better fit to the data (∆χ</span><sup data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">2</span></sup><span data-dcnode-id="3126" instrument_node="">&nbsp;=&nbsp;9.83, </span><i data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">df</span></i><span data-dcnode-id="3123" instrument_node="">&nbsp;=&nbsp;1; </span><i data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">p</span></i><span data-dcnode-id="3120" instrument_node="">&nbsp;&lt;&nbsp;.001).</span></p><p data-dcnode-id="3099"><span data-dcnode-id="3118" instrument_node="">Next we tested a partial mediation model in which personality facets that had been significant in previous analyses (i.e., assertiveness, activity level, excitement-seeking and cheerfulness) had direct effects on subjective happiness. This model had better fit indices than the complete mediation model (SBχ</span><sup data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">2</span></sup><span data-dcnode-id="3115" instrument_node="">&nbsp;=&nbsp;2682.40, </span><i data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">df</span></i><span data-dcnode-id="3112" instrument_node="">&nbsp;=&nbsp;1066, NNFI&nbsp;=&nbsp;0.866; CFI&nbsp;=&nbsp;0.879, RMSEA&nbsp;=&nbsp;0.045; 90&nbsp;% CI 0.043, 0.047; SRMR&nbsp;=&nbsp;0.059) and was a significantly better fit to the data (∆χ</span><sup data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">2</span></sup><span data-dcnode-id="3109" instrument_node="">&nbsp;=&nbsp;50.67, </span><i data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">df</span></i><span data-dcnode-id="3106" instrument_node="">&nbsp;=&nbsp;4, </span><i data-dcnode-id="3104"><span data-dcnode-id="3105" instrument_node="">p</span></i><span data-dcnode-id="3103" instrument_node="">&nbsp;&lt;&nbsp;.001). As seen in Fig.&nbsp;</span><a data-dcnode-id="3101" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3102" instrument_node="">2</span></a><span data-dcnode-id="3100" instrument_node="">, the relationships of assertiveness, activity level and excitement-seeking with subjective happiness were completely mediated by positivity, whereas cheerfulness and general extraversion were partially mediated by positivity. Structural paths from extraversion factors to positivity accounted for 50&nbsp;% of the variance in general positivity. The only facet of positivity which had significant effect on subjective happiness was life satisfaction. Together general positivity and life satisfaction accounted for 69&nbsp;% of variance in subjective happiness.</span></p><p data-dcnode-id="3085"><span data-dcnode-id="3098" instrument_node="">Nevertheless, the CFI and NNFI indicated far from acceptable fit, so we conducted a specification search for correlated error terms, following the same strategy as in the neuroticism analyses. A respecified partial mediation model with five correlated errors had acceptable fit (SBχ</span><sup data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">2</span></sup><span data-dcnode-id="3095" instrument_node="">&nbsp;=&nbsp;2248.05, </span><i data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">df</span></i><span data-dcnode-id="3092" instrument_node="">&nbsp;=&nbsp;1061; NNFI&nbsp;=&nbsp;0.901; CFI&nbsp;=&nbsp;0.911, RMSEA&nbsp;=&nbsp;0.039; 90&nbsp;% CI 0.037, 0.041; SRMR&nbsp;=&nbsp;0.057). Measurement and structural paths were similar before and after respecification, except for gregariousness loadings on the group factor in a limited proportion (see Fig.&nbsp;</span><a data-dcnode-id="3090" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3091" instrument_node="">2</span></a><span data-dcnode-id="3089" instrument_node="">; Table&nbsp;</span><a data-dcnode-id="3087" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="3088" instrument_node="">2</span></a><span data-dcnode-id="3086" instrument_node="">). We concluded, therefore, that the re-specification did not affect the results of hypothesis testing.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3070" data-test="inline-table" id="table-2"><figure data-dcnode-id="3071"><figcaption class="c-article-table__figcaption" data-dcnode-id="3082"><b data-dcnode-id="3083" data-test="table-caption" id="Tab2"><span data-dcnode-id="3084" instrument_node="">Table&nbsp;2 Standardized factor loadings and omega coefficients for extraversion, positivity and subjective happiness in not respecified and respecified models</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3072"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="3073" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10902-016-9792-3/tables/2" rel="nofollow"><span data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3074" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3075" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3076" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3079" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3078" fill-rule="evenodd"></path><span data-dcnode-id="3077" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3069" instrument_node="">
</span><p data-dcnode-id="3058"><span data-dcnode-id="3068" instrument_node="">The best markers of the general extraversion factor were friendliness and gregariousness items such as “Make friends easily”, “Feel comfortable around people” and “Talk to a lot of different people at parties”. Furthermore, cheerfulness items such as “Radiate joy” and “Have a lot of fun” also had relative large factor loadings on the general extraversion factor. The general factor thus appeared to be consistent with the </span><i data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">enthusiasm</span></i><span data-dcnode-id="3065" instrument_node=""> label used for the affiliative component of extraversion (DeYoung et al. </span><a aria-label="Reference 2007" data-dcnode-id="3063" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d307100786e7189" title="DeYoung, C. G., Quilty, L. C., &amp; Peterson, J. B. (2007). Between facets and domains: 10 aspects of the Big Five. Journal of Personality and Social Psychology, 
                           93, 880–896. doi:
                    10.1037/0022-3514.93.5.880
                    
                  ."><span data-dcnode-id="3064" instrument_node="">2007</span></a><span data-dcnode-id="3062" instrument_node="">). In contrast items related to assertiveness (e.g., “Take charge”), activity level (e.g., “Am always on the go”) and excitement-seeking (e.g., “Seek adventure”) mostly loaded on their respective group factor. These facets reflected agency and social dominance aspects of extraversion, a separate component from enthusiasm (DeYoung et al. </span><a aria-label="Reference 2007" data-dcnode-id="3060" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d307100786e7192" title="DeYoung, C. G., Quilty, L. C., &amp; Peterson, J. B. (2007). Between facets and domains: 10 aspects of the Big Five. Journal of Personality and Social Psychology, 
                           93, 880–896. doi:
                    10.1037/0022-3514.93.5.880
                    
                  ."><span data-dcnode-id="3061" instrument_node="">2007</span></a><span data-dcnode-id="3059" instrument_node="">).</span></p><p data-dcnode-id="3050"><span data-dcnode-id="3057" instrument_node="">After respecification omega coefficients were acceptable (i.e., ω&nbsp;&gt;&nbsp;0.60) for all group factors except gregariousness; the residualized omega coefficients for the friendliness, gregariousness and cheerfulness group factors were much lower. In contrast, the hierarchical omega coefficients for the general factor (ω</span><sub data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">h</span></sub><span data-dcnode-id="3054" instrument_node="">-s&nbsp;=&nbsp;0.67 and ω</span><sub data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">h</span></sub><span data-dcnode-id="3051" instrument_node="">-s&nbsp;=&nbsp;0.68 for respecified and not respecified models respectively) were still higher than the standard omega coefficients (ω-s&nbsp;=&nbsp;0.87 and 0.89), indicating the reliability of the general domain factor.</span></p><p data-dcnode-id="3039"><span data-dcnode-id="3049" instrument_node="">There was no change in the factor loading pattern for positivity as a result of re-specification, nor across the neuroticism and extraversion analyses (see Tables&nbsp;</span><a data-dcnode-id="3047" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3048" instrument_node="">1</span></a><span data-dcnode-id="3046" instrument_node="">, </span><a data-dcnode-id="3044" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="3045" instrument_node="">2</span></a><span data-dcnode-id="3043" instrument_node="">). Reliability analyses corroborated this pattern of results. First, residualized omega coefficients were much lower than omega scales for optimism and self-esteem, but not for life satisfaction. Second, hierarchical omega coefficients (ω</span><sub data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">h</span></sub><span data-dcnode-id="3040" instrument_node="">-s&nbsp;=&nbsp;0.71 and 0.72 for respecified and not respecified models respectively) and standard omega coefficients (ω&nbsp;=&nbsp;0.87 and ω&nbsp;=&nbsp;0.88) for the general factor were very close to those estimated in the neuroticism analyses.</span></p></div></div></section><section data-dcnode-id="2889" data-title="Discussion"><div class="c-article-section" data-dcnode-id="2890" id="Sec14-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3034" id="Sec14"><span data-dcnode-id="3035" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="2891" id="Sec14-content"><p data-dcnode-id="3014"><span data-dcnode-id="3033" instrument_node="">A distinctive characteristic of our study was to examine how general and specific aspects of extraversion and neuroticism were associated with subjective happiness through their relationships with positivity. These relationships have been examined before (e.g., DeNeve and Cooper </span><a aria-label="Reference 1998" data-dcnode-id="3031" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d307100786e7223" title="DeNeve, K. M., &amp; Cooper, H. (1998). The happy personality: A meta-analysis of 137 personality traits and subjective well-being. Psychological Bulletin, 
                           124, 197–229. doi:
                    10.1037/0033-2909.124.2.197
                    
                  ."><span data-dcnode-id="3032" instrument_node="">1998</span></a><span data-dcnode-id="3030" instrument_node="">; Steel et al. </span><a aria-label="Reference 2008" data-dcnode-id="3028" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d307100786e7226" title="Steel, P., Schmidt, J., &amp; Shultz, J. (2008). Refining the relationship between personality and subjective well-being. Psychological Bulletin, 
                           134, 138–161. doi:
                    10.1037/0033-2909.134.1.138
                    
                  ."><span data-dcnode-id="3029" instrument_node="">2008</span></a><span data-dcnode-id="3027" instrument_node="">), but it is only recently that researchers have started to disentangle the relative contribution of personality facets rather than broad traits (e.g., Albuquerque et al. </span><a aria-label="Reference 2012" data-dcnode-id="3025" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d307100786e7229" title="Albuquerque, I., de Lima, M. P., Matos, M., &amp; Figueiredo, C. (2012). Personality and subjective well-being: What hides behind global analyses? Social Indicators Research, 
                           105, 447–460. doi:
                    10.1007/s11205-010-9780-7
                    
                  ."><span data-dcnode-id="3026" instrument_node="">2012</span></a><span data-dcnode-id="3024" instrument_node="">; Anglim and Grant </span><a aria-label="Reference 2016" data-dcnode-id="3022" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d307100786e7232" title="Anglim, J., &amp; Grant, S. (2016). Predicting psychological and subjective well-being from personality: Incremental prediction from 30 facets over the big 5. Journal of Happiness Studies, 
                           17, 59–80. doi:
                    10.1007/s10902-014-9583-7
                    
                  ."><span data-dcnode-id="3023" instrument_node="">2016</span></a><span data-dcnode-id="3021" instrument_node="">; Marrero Quevedo and Carballeira Abella </span><a aria-label="Reference 2011" data-dcnode-id="3019" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d307100786e7235" title="Marrero Quevedo, R. J., &amp; Carballeira Abella, M. (2011). Well-being and personality: Facet-level analyses. Personality and Individual Differences, 
                           50, 206–211. doi:
                    10.1016/j.paid.2010.09.030
                    
                  ."><span data-dcnode-id="3020" instrument_node="">2011</span></a><span data-dcnode-id="3018" instrument_node="">; Schimmack et al. </span><a aria-label="Reference 2004" data-dcnode-id="3016" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d307100786e7239" title="Schimmack, U., Oishi, S., Furr, R. M., &amp; Funder, D. C. (2004). Personality and life satisfaction: A facet-level analysis. Personality and Social Psychology Bulletin, 
                           30, 1062–1075. doi:
                    10.1177/0146167204264292
                    
                  ."><span data-dcnode-id="3017" instrument_node="">2004</span></a><span data-dcnode-id="3015" instrument_node="">). In this study we extended this line of research, modeling neuroticism and extraversion (i.e., exogenous latent variables in our study) using a bifactor approach that separated general and group factor components of variance in personality ratings. Likewise, positivity is a hierarchical, multifaceted construct subsuming more specific components (i.e., life satisfaction, self-esteem and optimism) and so a bifactor model was also used for positivity (i.e., endogenous mediator variable).</span></p><p data-dcnode-id="3000"><span data-dcnode-id="3013" instrument_node="">In keeping with previous research (Lightsey Jr. et al. </span><a aria-label="Reference 2013" data-dcnode-id="3011" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d307100786e7245" title="Lightsey, O. R., Jr., Gharghani, G. G., Katz, A. M., McKinney, V. A., &amp; Rarey, E. B. (2013). Positive automatic cognitions mediate the relationship between personality and trait positive affect. Journal of Happiness Studies, 
                           14, 115–134. doi:
                    10.1007/s10902-011-9319-x
                    
                  ."><span data-dcnode-id="3012" instrument_node="">2013</span></a><span data-dcnode-id="3010" instrument_node="">; Pollock et al. </span><a aria-label="Reference 2016" data-dcnode-id="3008" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d307100786e7248" title="Pollock, N. C., Noser, A. E., Holden, C. J., &amp; Zeigler-Hill, V. (2016). Do orientations to happiness mediate the associations between personality traits and subjective well-being? Journal of Happiness Studies, 
                           17, 713–729. doi:
                    10.1007/s10902-015-9617-9
                    
                  ."><span data-dcnode-id="3009" instrument_node="">2016</span></a><span data-dcnode-id="3007" instrument_node="">; Strobel et al. </span><a aria-label="Reference 2011" data-dcnode-id="3005" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d307100786e7251" title="Strobel, M., Tumasjan, A., &amp; Spörrle, M. (2011). Be yourself, believe in yourself, and be happy: Self-efficacy as a mediator between personality factors and subjective well-being. Scandinavian Journal of Psychology, 
                           52, 43–48. doi:
                    10.1111/j.1467-9450.2010.00826.x
                    
                  ."><span data-dcnode-id="3006" instrument_node="">2011</span></a><span data-dcnode-id="3004" instrument_node="">), we found that the general positivity factor had a key role as a mediator of neuroticism-well-being relationships. Furthermore, our study showed that general neuroticism and positivity factors overlapped considerably. Thus, general neuroticism acted as a sort of negativity factor in the model. This is not an entirely new finding, for instance, a broad ‘personal negativity’ construct characterized by unhappiness, dissatisfaction with life, low self-esteem and nonclinical depression has already been proposed (Furr and Funder </span><a aria-label="Reference 1998" data-dcnode-id="3002" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d307100786e7254" title="Furr, R. M., &amp; Funder, D. C. (1998). A multimodal analysis of personal negativity. Journal of Personality and Social Psychology, 
                           74, 1580–1591. doi:
                    10.1037/0022-3514.74.6.1580
                    
                  ."><span data-dcnode-id="3003" instrument_node="">1998</span></a><span data-dcnode-id="3001" instrument_node="">).</span></p><p data-dcnode-id="2986"><span data-dcnode-id="2999" instrument_node="">Previous research into the association between neuroticism and positivity (Caprara et al. </span><a aria-label="Reference 2012" data-dcnode-id="2997" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d307100786e7260" title="Caprara, G. V., Alessandri, G., Eisenberg, N., Kupfer, A., Steca, P., Caprara, M. G., et al. (2012). The positivity scale. Psychological Assessment, 
                           24, 701–712. doi:
                    10.1037/a0026681
                    
                  ."><span data-dcnode-id="2998" instrument_node="">2012</span></a><span data-dcnode-id="2996" instrument_node="">; Heikamp et al. </span><a aria-label="Reference 2014" data-dcnode-id="2994" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d307100786e7263" title="Heikamp, T., Alessandri, G., Laguna, M., Petrovic, V., Caprara, M. G., &amp; Trommsdorff, G. (2014). Cross-cultural validation of the positivity-scale in five European countries. Personality and Individual Differences, 
                           71, 140–145. doi:
                    10.1016/j.paid.2014.07.012
                    
                  ."><span data-dcnode-id="2995" instrument_node="">2014</span></a><span data-dcnode-id="2993" instrument_node="">; Lauriola and Iani </span><a aria-label="Reference 2015" data-dcnode-id="2991" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d307100786e7266" title="Lauriola, M., &amp; Iani, L. (2015). Does positivity mediate the relation of neuroticism and extraversion with subjective happiness? PLoS One, 
                           10, e0121991. doi:
                    10.1371/journal.pone.0121991
                    
                  ."><span data-dcnode-id="2992" instrument_node="">2015</span></a><span data-dcnode-id="2990" instrument_node="">) documented smaller effects than we found. It is worth noting, however, that in our study the general factors for neuroticism and positivity reflected only common variance, whereas previous research used total scores or latent variables that did not distinguish between specific and common variance. As Chen et al. (</span><a aria-label="Reference 2012" data-dcnode-id="2988" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d307100786e7269" title="Chen, F. F., Hayes, A., Carver, C. S., Laurenceau, J. P., &amp; Zhang, Z. (2012). Modeling general and specific variance in multifaceted constructs: A comparison of the bifactor model to other approaches. Journal of Personality, 
                           80, 219–251. doi:
                    10.1111/j.1467-6494.2011.00739.x
                    
                  ."><span data-dcnode-id="2989" instrument_node="">2012</span></a><span data-dcnode-id="2987" instrument_node="">) have pointed out, if only some facets of a multifaceted construct are related with a dependent variable, using a total score can be misleading because non-significant facets might dilute the overall relationship. Our results are consistent with this. In fact, four neuroticism group factors (i.e., anxiety, depression, self-consciousness and immoderation) were unrelated to general positivity, whereas anger and vulnerability had only small effects on it.</span></p><p data-dcnode-id="2969"><span data-dcnode-id="2985" instrument_node="">Well-being studies using personality facets have typically concluded that depression and vulnerability make independent, incremental contributions to variance in well-being outcomes (e.g., Albuquerque et al. </span><a aria-label="Reference 2012" data-dcnode-id="2983" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d307100786e7275" title="Albuquerque, I., de Lima, M. P., Matos, M., &amp; Figueiredo, C. (2012). Personality and subjective well-being: What hides behind global analyses? Social Indicators Research, 
                           105, 447–460. doi:
                    10.1007/s11205-010-9780-7
                    
                  ."><span data-dcnode-id="2984" instrument_node="">2012</span></a><span data-dcnode-id="2982" instrument_node="">; Anglim and Grant </span><a aria-label="Reference 2016" data-dcnode-id="2980" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d307100786e7278" title="Anglim, J., &amp; Grant, S. (2016). Predicting psychological and subjective well-being from personality: Incremental prediction from 30 facets over the big 5. Journal of Happiness Studies, 
                           17, 59–80. doi:
                    10.1007/s10902-014-9583-7
                    
                  ."><span data-dcnode-id="2981" instrument_node="">2016</span></a><span data-dcnode-id="2979" instrument_node="">; Marrero Quevedo and Carballeira Abella </span><a aria-label="Reference 2011" data-dcnode-id="2977" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d307100786e7281" title="Marrero Quevedo, R. J., &amp; Carballeira Abella, M. (2011). Well-being and personality: Facet-level analyses. Personality and Individual Differences, 
                           50, 206–211. doi:
                    10.1016/j.paid.2010.09.030
                    
                  ."><span data-dcnode-id="2978" instrument_node="">2011</span></a><span data-dcnode-id="2976" instrument_node="">; Schimmack et al. </span><a aria-label="Reference 2004" data-dcnode-id="2974" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d307100786e7284" title="Schimmack, U., Oishi, S., Furr, R. M., &amp; Funder, D. C. (2004). Personality and life satisfaction: A facet-level analysis. Personality and Social Psychology Bulletin, 
                           30, 1062–1075. doi:
                    10.1177/0146167204264292
                    
                  ."><span data-dcnode-id="2975" instrument_node="">2004</span></a><span data-dcnode-id="2973" instrument_node="">). On the surface our findings may appear to conflict with this research; however it is worth noting that an approach based on facet scores “can capture their unique contributions, but the specific effects of the facets are often entangled with the effects of the shared general construct” (Chen et al. </span><a aria-label="Reference 2012" data-dcnode-id="2971" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d307100786e7287" title="Chen, F. F., Hayes, A., Carver, C. S., Laurenceau, J. P., &amp; Zhang, Z. (2012). Modeling general and specific variance in multifaceted constructs: A comparison of the bifactor model to other approaches. Journal of Personality, 
                           80, 219–251. doi:
                    10.1111/j.1467-6494.2011.00739.x
                    
                  ."><span data-dcnode-id="2972" instrument_node="">2012</span></a><span data-dcnode-id="2970" instrument_node="">, p. 220). In our study, depression and vulnerability contributed greatly to the general factor common variance, which, in turn, had a strong effect on positivity and subjective happiness. Rather than showing that depression and vulnerability did not play a key role in subjective well-being, our bifactor model approach has resolved the ambiguities associated with both total and individual score approaches.</span></p><p data-dcnode-id="2964"><span data-dcnode-id="2968" instrument_node="">Importantly, the analysis relating to neuroticism indicated that only indirect effects were significant (i.e., complete mediation). An implication of this finding is that general positivity, as modeled in our study, completely accounted for the ways in which a personality trait and its facets were associated with a well-being outcome. People who were high on general neuroticism not only interpreted everyday situations as threatening and treated minor stressors as hopelessly difficult problems (i.e., withdrawal; DeYoung et al. </span><a aria-label="Reference 2007" data-dcnode-id="2966" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d307100786e7294" title="DeYoung, C. G., Quilty, L. C., &amp; Peterson, J. B. (2007). Between facets and domains: 10 aspects of the Big Five. Journal of Personality and Social Psychology, 
                           93, 880–896. doi:
                    10.1037/0022-3514.93.5.880
                    
                  ."><span data-dcnode-id="2967" instrument_node="">2007</span></a><span data-dcnode-id="2965" instrument_node="">), they also lacked of positivity, a cognitive process that actively regulates subjective well-being. At the beginning of this paper we proposed that a general positivity factor could account for the relation between facets of personality and happiness. In the case of neuroticism, at least, we can state that there is some support for this hypothesis.</span></p><p data-dcnode-id="2959"><span data-dcnode-id="2963" instrument_node="">The results of the bifactor extraversion model showed that both general extraversion and most of its facets (i.e., cheerfulness, assertiveness, activity level and excitement-seeking) had significant indirect effects on subjective happiness via general positivity. However, the mediating role of positivity was more limited than in the case of neuroticism. Neuroticism overlapped with positivity; however this was not the case for extraversion. Other paths to happiness involved positive emotionality and enthusiasm, as one can see from large direct effects of cheerfulness and general extraversion on subjective happiness. Overall, these findings are consistent with a study showing that people with high trait cheerfulness tend to experience enduring positive affective states, which in turn leads to greater well-being (Schimmack et al. </span><a aria-label="Reference 2004" data-dcnode-id="2961" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d307100786e7300" title="Schimmack, U., Oishi, S., Furr, R. M., &amp; Funder, D. C. (2004). Personality and life satisfaction: A facet-level analysis. Personality and Social Psychology Bulletin, 
                           30, 1062–1075. doi:
                    10.1177/0146167204264292
                    
                  ."><span data-dcnode-id="2962" instrument_node="">2004</span></a><span data-dcnode-id="2960" instrument_node="">). As for neuroticism, our analyses confirmed the importance of life satisfaction to the association between personality and well-being. Similarly, in the case of extraversion, life satisfaction made a contribution to variance in subjective happiness that was independent of and additional to that of the general positivity factor.</span></p><p data-dcnode-id="2942"><span data-dcnode-id="2958" instrument_node="">With regard to agentic extraversion, our findings showed that assertiveness, activity level and excitement-seeking had significant relationships with positivity as well as smaller significant indirect relationships with subjective happiness. People who scored high on these facets of extraversion not only strive to achieve desirable goals (i.e., positive incentive motivation; see Depue and Collins </span><a aria-label="Reference 1999" data-dcnode-id="2956" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d307100786e7306" title="Depue, R. A., &amp; Collins, P. F. (1999). Neurobiology of the structure of personality: Dopamine, facilitation of incentive motivation, and extraversion. Behavioral and Brain Sciences, 
                           22, 491–517. doi:
                    10.1017/S0140525X99002046
                    
                  ."><span data-dcnode-id="2957" instrument_node="">1999</span></a><span data-dcnode-id="2955" instrument_node="">) but also tend to have generalized positive expectations about them, which is linked to subjective happiness. This idea is also germane to hope theory (Snyder et al. </span><a aria-label="Reference 1991" data-dcnode-id="2953" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d307100786e7309" title="Snyder, C. R., Harris, C., Anderson, J. R., Holleran, S. A., Irving, L. M., Sigmon, S. T., et al. (1991). The will and the ways: Development and validation of an individual-differences measure of hope. Journal of Personality and Social Psychology, 
                           60, 570–585. doi:
                    10.1037/0022-3514.60.4.570
                    
                  ."><span data-dcnode-id="2954" instrument_node="">1991</span></a><span data-dcnode-id="2952" instrument_node="">), whose ‘agency’ component reflects the motivational side of goal pursuit, whilst the ‘pathway’ component reflects a belief that goals can be attained. It is not coincidence that happiness studies have considered striving to achieve goals (e.g., instrumental goal pursuit, see Tkach and Lyubomirsky </span><a aria-label="Reference 2006" data-dcnode-id="2950" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d307100786e7312" title="Tkach, C., &amp; Lyubomirsky, S. (2006). How do people pursue happiness? Relating personality, happiness-increasing strategies, and well-being. Journal of Happiness Studies, 
                           7, 183–225. doi:
                    10.1007/s10902-005-4754-1
                    
                  ."><span data-dcnode-id="2951" instrument_node="">2006</span></a><span data-dcnode-id="2949" instrument_node="">; commitment to goals, Warner and Vroman </span><a aria-label="Reference 2011" data-dcnode-id="2947" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d307100786e7315" title="Warner, R. M., &amp; Vroman, K. G. (2011). Happiness inducing behaviors in everyday life: An empirical assessment of “the how of happiness”. Journal of Happiness Studies, 
                           12, 1063–1082. doi:
                    10.1007/s10902-010-9245-3
                    
                  ."><span data-dcnode-id="2948" instrument_node="">2011</span></a><span data-dcnode-id="2946" instrument_node="">) as part of a set of happiness-inducing behaviors. Furthermore, our results are consistent with previous research indicating that both agency and optimism are associated with well-being components (e.g., Gallagher and Lopez </span><a aria-label="Reference 2009" data-dcnode-id="2944" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d307100786e7318" title="Gallagher, M. W., &amp; Lopez, S. J. (2009). Positive expectancies and mental health: Identifying the unique contributions of hope and optimism. Journal of Positive Psychology, 
                           4, 548–556. doi:
                    10.1080/17439760903157166
                    
                  ."><span data-dcnode-id="2945" instrument_node="">2009</span></a><span data-dcnode-id="2943" instrument_node="">).</span></p><p data-dcnode-id="2931"><span data-dcnode-id="2941" instrument_node="">Our model showed that gregariousness and friendliness had neither direct nor indirect effects on subjective happiness. Our study, like others (e.g., Anglim and Grant </span><a aria-label="Reference 2016" data-dcnode-id="2939" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d307100786e7324" title="Anglim, J., &amp; Grant, S. (2016). Predicting psychological and subjective well-being from personality: Incremental prediction from 30 facets over the big 5. Journal of Happiness Studies, 
                           17, 59–80. doi:
                    10.1007/s10902-014-9583-7
                    
                  ."><span data-dcnode-id="2940" instrument_node="">2016</span></a><span data-dcnode-id="2938" instrument_node="">), has shown that the incremental contribution of gregariousness and friendliness to variance in subjective happiness is not significant after controlling for the general extraversion factor and for other Big Five factors. This suggests that people who are low on such affiliative tendencies can have a positive or negative outlook and tend to be either happy or unhappy. One study on happy introverts noted that introverts reported about the same level of happiness as extraverts, although there were marginal differences between them with respect to amount and type of social behavior (Hills and Argyle </span><a aria-label="Reference 2001" data-dcnode-id="2936" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d307100786e7327" title="Hills, P., &amp; Argyle, M. (2001). Happiness, introversion–extraversion and happy introverts. Personality and Individual Differences, 
                           30, 595–608. doi:
                    10.1016/S0191-8869(00)00058-1
                    
                  ."><span data-dcnode-id="2937" instrument_node="">2001</span></a><span data-dcnode-id="2935" instrument_node="">). Another study found that extraverts reported greater positive affect than those scoring lower on this trait after controlling for variance in amount and types of social activity (Lucas et al. </span><a aria-label="Reference 2008" data-dcnode-id="2933" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d307100786e7330" title="Lucas, R. E., Le, K., &amp; Dyrenforth, P. S. (2008). Explaining the extraversion/positive affect relation: Sociability cannot account for extraverts’ greater happiness. Journal of Personality, 
                           76, 385–414. doi:
                    10.1111/j.1467-6494.2008.00490.x
                    
                  ."><span data-dcnode-id="2934" instrument_node="">2008</span></a><span data-dcnode-id="2932" instrument_node="">).</span></p><p data-dcnode-id="2920"><span data-dcnode-id="2930" instrument_node="">We turn now to the bifactor model of positivity. According to Caprara and colleagues (Caprara </span><a aria-label="Reference 2009" data-dcnode-id="2928" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d307100786e7336" title="Caprara, G. V. (2009). Positive orientation: Turning potentials into optimal functioning. The Bulletin of the European Health Psychologist, 
                           11, 46–48."><span data-dcnode-id="2929" instrument_node="">2009</span></a><span data-dcnode-id="2927" instrument_node="">; Caprara et al. </span><a aria-label="Reference 2012" data-dcnode-id="2925" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d307100786e7339" title="Caprara, G. V., Alessandri, G., Eisenberg, N., Kupfer, A., Steca, P., Caprara, M. G., et al. (2012). The positivity scale. Psychological Assessment, 
                           24, 701–712. doi:
                    10.1037/a0026681
                    
                  ."><span data-dcnode-id="2926" instrument_node="">2012</span></a><span data-dcnode-id="2924" instrument_node="">), positivity accounts for the covariance in optimism, self-esteem and life satisfaction, which thus represent common positive knowledge structures. Nonetheless, optimism, self-esteem and life satisfaction are theoretically distinct constructs. In particular, life satisfaction is deemed a cognitive component of subjective well-being (Gallagher et al. </span><a aria-label="Reference 2009" data-dcnode-id="2922" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d307100786e7342" title="Gallagher, M. W., Lopez, S. J., &amp; Preacher, K. J. (2009). The hierarchical structure of well-being. Journal of Personality, 
                           77(4), 1025–1050. doi:
                    10.1111/j.1467-6494.2009.00573.x
                    
                  ."><span data-dcnode-id="2923" instrument_node="">2009</span></a><span data-dcnode-id="2921" instrument_node="">). Our findings help to reconcile this apparent contradiction. It is worth noting that, although the three positivity components loaded similarly on the general positivity factor, life satisfaction items loaded more strongly on their specific factor than on the general factor. This result confirmed the pivotal role that life satisfaction plays in our model. Life satisfaction was not only a component of positivity, it also made an independent contribution to variance in subjective happiness additional to that of the general positivity factor. It is noteworthy that the alternative model, in which a subjective well-being factor made a contribution to variance in both life satisfaction and subjective happiness items, was a worse fit to the data than the model in which life satisfaction items belonged to the positivity domain. As well as providing support for the decision to keep life satisfaction in the positivity domain whilst also providing evidence for the existence of a direct path from the life satisfaction group factor to subjective happiness, this finding is also consistent with the view that although the two constructs are closely related, subjective happiness cannot be equated with life satisfaction.</span></p><p data-dcnode-id="2915"><span data-dcnode-id="2919" instrument_node="">Before concluding, it is worth acknowledging the following limitations of our study. First of all, we did not test the joint effect of neuroticism and extraversion on subjective happiness via positivity. Previous research (e.g., Lauriola and Iani </span><a aria-label="Reference 2015" data-dcnode-id="2917" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d307100786e7348" title="Lauriola, M., &amp; Iani, L. (2015). Does positivity mediate the relation of neuroticism and extraversion with subjective happiness? PLoS One, 
                           10, e0121991. doi:
                    10.1371/journal.pone.0121991
                    
                  ."><span data-dcnode-id="2918" instrument_node="">2015</span></a><span data-dcnode-id="2916" instrument_node="">) has shown that neuroticism and extraversion are negatively correlated latent variables and so we cannot rule out the possibility that omitting this relationship from our structural equation modeling may have produced different results. However, our findings are generally in keeping with the literature, which encourages us to believe that the effects of this omission, if any, were limited. Further data would be needed to address this issue.</span></p><p data-dcnode-id="2901"><span data-dcnode-id="2914" instrument_node="">Second, our mediation model was based on cross-sectional data, which provide only correlational evidence for the hypothesized relationships. More importantly our data may have been subject to common method bias and resulted in overestimation of mediation effects. To address the former issue and demonstrate causal relationships between facets of personality and subjective happiness that are mediated by positivity future research should be based on longitudinal data or take the form of clinical intervention studies. It is worth noting that there are theoretical arguments and empirical research (e.g., Steel et al. </span><a aria-label="Reference 2008" data-dcnode-id="2912" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d307100786e7355" title="Steel, P., Schmidt, J., &amp; Shultz, J. (2008). Refining the relationship between personality and subjective well-being. Psychological Bulletin, 
                           134, 138–161. doi:
                    10.1037/0033-2909.134.1.138
                    
                  ."><span data-dcnode-id="2913" instrument_node="">2008</span></a><span data-dcnode-id="2911" instrument_node="">) indicating that personality traits predict both positivity and subjective happiness. Thus, the theoretical grounds for interpreting our findings as indicating that happiness is linked to personality via positivity seem rather weaker than vice versa. For example, there is more clearly a heritable component to extraversion and neuroticism than life satisfaction, self-esteem, or optimism, they emerge earlier in life and are less malleable than positivity components or happiness (e.g., Bleidorn et al. </span><a aria-label="Reference 2014" data-dcnode-id="2909" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d307100786e7358" title="Bleidorn, W., Kandler, C., &amp; Caspi, A. (2014). The behavioural genetics of personality development in adulthood—classic, contemporary, and future trends. European Journal of Personality, 
                           28, 244–255. doi:
                    10.1002/per.1957
                    
                  ."><span data-dcnode-id="2910" instrument_node="">2014</span></a><span data-dcnode-id="2908" instrument_node="">; Myers et al. </span><a aria-label="Reference 2011" data-dcnode-id="2906" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d307100786e7361" title="Myers, J. E., Willse, J. T., &amp; Villalba, J. A. (2011). Promoting self-esteem in adolescents: The influence of wellness factors. Journal of Counseling and Development, 
                           89, 28–36."><span data-dcnode-id="2907" instrument_node="">2011</span></a><span data-dcnode-id="2905" instrument_node="">; Zentner and Bates </span><a aria-label="Reference 2008" data-dcnode-id="2903" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d307100786e7364" title="Zentner, M., &amp; Bates, J. E. (2008). Child temperament: An integrative review of concepts, research programs, and measures. European Journal of Developmental Science, 
                           2, 7–37."><span data-dcnode-id="2904" instrument_node="">2008</span></a><span data-dcnode-id="2902" instrument_node="">).</span></p><p data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">The third limitation is that we used a non-representative sampling method. Despite the large sample size, generalization of our findings to the general population is not warranted, because our sample consisted mainly of highly educated adults with a commitment to long-life learning. The few model modifications that were needed to attain acceptable fit might have reflected specific characteristics of the sample (e.g., older age and higher educational attainment) so these aspects of our modeling should be cross-validated in future research.</span></p><p data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">Finally, our conclusions were based on a single subjective well-being outcome, subjective happiness. Future studies should use other psychological or subjective well-being outcomes (e.g., scales measuring psychological well-being or affect) that also have a multifaceted structure, thus reinforcing the generality of our conclusions. Future research might also use a combination of behavioral indicators and self-reports in order to determine whether relationships found in this study between personality and well-being were spuriously inflated by a common method factor.</span></p><p data-dcnode-id="2892"><span data-dcnode-id="2896" instrument_node="">Notwithstanding these limitations, our findings indicate the value of a multifaceted approach to investigating pathways from personality to well-being which recognizes the interplay of general and specific components. Furthermore, our findings also have practical implications for well-being promotion, suggesting, for example, that interventions focused on positivity components might enhance cheerfulness and improve well-being (Papousek and Schulter </span><a aria-label="Reference 2008" data-dcnode-id="2894" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d307100786e7376" title="Papousek, I., &amp; Schulter, G. (2008). Effects of a mood-enhancing intervention on subjective well-being and cardiovascular parameters. International Journal of Behavioural Medicine, 
                           15, 293–302. doi:
                    10.1080/10705500802365508
                    
                  ."><span data-dcnode-id="2895" instrument_node="">2008</span></a><span data-dcnode-id="2893" instrument_node="">).</span></p></div></div></section><span data-dcnode-id="2888" instrument_node="">
</span><section data-dcnode-id="2857" data-title="Notes"><div class="c-article-section" data-dcnode-id="2858" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2886" id="notes"><span data-dcnode-id="2887" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="2859" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="2860"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="2882" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="2883"><p data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">Although this private institution does not offer formal degrees, students are free to follow a variety of courses in subjects such as music, psychology, foreign languages and so forth.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="2875" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="2876"><p data-dcnode-id="2877"><span data-dcnode-id="2881" instrument_node="">We actually tested the more comprehensive model, but it failed to reach convergence due to high number of parameters to be estimated; this problem is more likely to arise when many general and specific factors are used as predictors (Chen et al. </span><a aria-label="Reference 2012" data-dcnode-id="2879" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d307100786e664" title="Chen, F. F., Hayes, A., Carver, C. S., Laurenceau, J. P., &amp; Zhang, Z. (2012). Modeling general and specific variance in multifaceted constructs: A comparison of the bifactor model to other approaches. Journal of Personality, 
                           80, 219–251. doi:
                    10.1111/j.1467-6494.2011.00739.x
                    
                  ."><span data-dcnode-id="2880" instrument_node="">2012</span></a><span data-dcnode-id="2878" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="3." data-dcnode-id="2868" id="Fn3"><div class="c-article-footnote--listed__content" data-dcnode-id="2869"><p data-dcnode-id="2870"><span data-dcnode-id="2874" instrument_node="">We applied a correction factor to the omega formula for correlated scale component errors (see Raykov </span><a aria-label="Reference 2012" data-dcnode-id="2872" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d307100786e4021" title="Raykov, T. (2012). Scale construction and development using structural equation modeling. In R. H. Hoyle (Ed.), Handbook of structural equation modeling (pp. 472–492). New York: Guilford Press."><span data-dcnode-id="2873" instrument_node="">2012</span></a><span data-dcnode-id="2871" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="4." data-dcnode-id="2861" id="Fn4"><div class="c-article-footnote--listed__content" data-dcnode-id="2862"><p data-dcnode-id="2863"><span data-dcnode-id="2867" instrument_node="">Chen et al. (</span><a aria-label="Reference 2013" data-dcnode-id="2865" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d307100786e4042" title="Chen, F. F., Jing, Y., Hayes, A., &amp; Lee, J. M. (2013). Two concepts or two approaches? A bifactor analysis of psychological and subjective well-being. Journal of Happiness Studies,
