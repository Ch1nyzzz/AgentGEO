</span><meta content="Recent studies suggested an important role of neuroticism and extraversion facets as incremental predictors of subjective well-being outcomes. Research has shown that positive cognitions mediated the relation between personality traits and well-being. The present study examined the relationship between neuroticism and extraversion, measured as general and group factors, and subjective happiness through a general positivity factor. 770 community participants (69.4&amp;nbsp;% females; M&amp;nbsp;=&amp;nbsp;55.34; SD&amp;nbsp;=&amp;nbsp;16.01) completed personality, satisfaction with life, optimism, self-esteem, and subjective happiness scales. A bifactor model was used to parse general and specific variance components for multifaceted constructs. The general positivity factor completely mediated neuroticism-subjective happiness relationships and overlapped with general neuroticism, whilst it partially mediated extraversion-subjective happiness ones. Other paths to happiness involved cheerfulness and enthusiasm. Assertiveness, activity level and excitement-seeking had a weak relationship with subjective happiness and only through positivity. Gregariousness and friendliness had neither direct nor indirect effects on subjective happiness. Life satisfaction had a twofold role as a component of positivity as well as providing an independent contribution to variance in subjective happiness. In keeping with previous research, neuroticism acted as a sort of general negativity factor. Cheerfulness and extraversion made an incremental contribution to variance in subjective happiness. Our findings support the utility of a multifaceted approach to study pathways from personality to well-being. Theoretical and practical implications for promoting well-being were discussed." data-dcnode-id="4531" name="dc.description"><span data-dcnode-id="4530" instrument_node="">

</span><meta content="Recent studies suggested an important role of neuroticism and extraversion facets as incremental predictors of subjective well-being outcomes. Research has shown that positive cognitions mediated the relation between personality traits and well-being. The present study examined the relationship between neuroticism and extraversion, measured as general and group factors, and subjective happiness through a general positivity factor. 770 community participants (69.4 % females; M = 55.34; SD = 16.01) completed personality, satisfaction with life, optimism, self-esteem, and subjective happiness scales. A bifactor model was used to parse general and specific variance components for multifaceted constructs. The general positivity factor completely mediated neuroticism-subjective happiness relationships and overlapped with general neuroticism, whilst it partially mediated extraversion-subjective happiness ones. Other paths to happiness involved cheerfulness and enthusiasm. Assertiveness, activity level and excitement-seeking had a weak relationship with subjective happiness and only through positivity. Gregariousness and friendliness had neither direct nor indirect effects on subjective happiness. Life satisfaction had a twofold role as a component of positivity as well as providing an independent contribution to variance in subjective happiness. In keeping with previous research, neuroticism acted as a sort of general negativity factor. Cheerfulness and extraversion made an incremental contribution to variance in subjective happiness. Our findings support the utility of a multifaceted approach to study pathways from personality to well-being. Theoretical and practical implications for promoting well-being were discussed." data-dcnode-id="4297" property="og:description"><span data-dcnode-id="4296" instrument_node="">
