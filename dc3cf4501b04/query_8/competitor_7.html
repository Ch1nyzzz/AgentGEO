</span><meta content="Is happiness good for your health? This common notion is tested in a synthetic analysis of 30 follow-up studies on happiness and longevity. It appears that happiness does not predict longevity in sick populations, but that it does predict longevity among healthy populations So, happiness does not cure illness but it does protect against becoming ill. The effect of happiness on longevity in healthy populations is remarkably strong. The size of the effect is comparable to that of smoking or not. If so, public health can also be promoted by policies that aim at greater happiness of a greater number. That can be done by strengthening individual life-abilities and by improving the livability of the social environment. Some policies are proposed. Both ways of promoting health through happiness require more research on conditions for happiness." data-dcnode-id="3119" name="dc.description"><span data-dcnode-id="3118" instrument_node="">

</span><meta content="Healthy happiness: effects of happiness on physical health and the consequences for preventive health care - Journal of Happiness Studies" data-dcnode-id="2885" property="og:title"><span data-dcnode-id="2884" instrument_node="">
</span><meta content="Is happiness good for your health? This common notion is tested in a synthetic analysis of 30 follow-up studies on happiness and longevity. It appears that happiness does not predict longevity in sick populations, but that it does predict longevity among healthy populations So, happiness does not cure illness but it does protect against becoming ill. The effect of happiness on longevity in healthy populations is remarkably strong. The size of the effect is comparable to that of smoking or not.If so, public health can also be promoted by policies that aim at greater happiness of a greater number. That can be done by strengthening individual life-abilities and by improving the livability of the social environment. Some policies are proposed. Both ways of promoting health through happiness require more research on conditions for happiness." data-dcnode-id="2883" property="og:description"><span data-dcnode-id="2882" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="1030" data-track-component="article body"><span data-dcnode-id="2451" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="2442" data-gtm-vis-first-on-screen-50443292_562="594" data-gtm-vis-first-on-screen-50443292_563="618" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="594" data-gtm-vis-recent-on-screen-50443292_563="617" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2443" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2449" id="Abs1"><span data-dcnode-id="2450" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2444" id="Abs1-content"><p data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">Is happiness good for your health? This common notion is tested in a synthetic analysis of 30 follow-up studies on happiness and longevity. It appears that happiness does not predict longevity in sick populations, but that it does predict longevity among healthy populations So, happiness does not cure illness but it does protect against becoming ill. The effect of happiness on longevity in healthy populations is remarkably strong. The size of the effect is comparable to that of smoking or not.</span></p><p data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">If so, public health can also be promoted by policies that aim at greater happiness of a greater number. That can be done by strengthening individual life-abilities and by improving the livability of the social environment. Some policies are proposed. Both ways of promoting health through happiness require more research on conditions for happiness.</span></p></div></div></section><span data-dcnode-id="2441" instrument_node="">
</span><section data-dcnode-id="2407" data-gtm-vis-first-on-screen-50443292_562="617" data-gtm-vis-first-on-screen-50443292_563="618" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="617" data-gtm-vis-recent-on-screen-50443292_563="618" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="The issue"><div class="c-article-section" data-dcnode-id="2408" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2439" id="Sec1"><span data-dcnode-id="2440" instrument_node="">The issue</span></h2><div class="c-article-section__content" data-dcnode-id="2409" id="Sec1-content"><p data-dcnode-id="2434"><span data-dcnode-id="2438" instrument_node="">It is widely acknowledged that mental factors may influence physical functioning and that psychological well-being works positively on physical health. This idea does not only live among adherents of holistic medicine, it also has a firm root in academic psychology. There is good evidence for the negative effects of mental distress on physical health, e.g. of depression, anxiety and hostility and there are also indications for the beneficial effects of positive mental states, such as positive affect (Zautra, </span><a aria-label="Reference 2003" data-dcnode-id="2436" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d179686420e340" title="Zautra, A. J. (2003). Emotions, stress and health. Oxford NY, USA: Oxford University Press."><span data-dcnode-id="2437" instrument_node="">2003</span></a><span data-dcnode-id="2435" instrument_node="">).</span></p><p data-dcnode-id="2423"><span data-dcnode-id="2433" instrument_node="">In this context it is commonly assumed that happiness is conducive to physical health. It is believed that happiness helps to heal the sick and that it protects people in good healthy against getting ill. In this view, health-care should not only be concerned with illness, it should also be concerned with wider quality-of-life. This view is reflected in broad definitions of health, such as the World Health Organization’s definition of health as a state of general physical, mental and social wellbeing and not only the absence of illness and defect (Seedhouse, </span><a aria-label="Reference 1996" data-dcnode-id="2431" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d179686420e346" title="Seedhouse, D. (1996). Health promotion: Philosophy, prejudice and practice. UK: Chichester, Wiley."><span data-dcnode-id="2432" instrument_node="">1996</span></a><span data-dcnode-id="2430" instrument_node="">, p. 41). In this line it is also asserted that current health education may be counter productive because it puts a damper on enjoyable things such as smoking and drinking (Warburton, </span><a aria-label="Reference 1994" data-dcnode-id="2428" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d179686420e349" title="Warburton, D. M. (Ed.) (1994). Pleasure: The politics and reality. UK: Wiley, Chichester."><span data-dcnode-id="2429" instrument_node="">1994</span></a><span data-dcnode-id="2427" instrument_node="">, </span><a aria-label="Reference 1996" data-dcnode-id="2425" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d179686420e352" title="Warburton, D. M., &amp; Sherwood, N. (Eds.) (1996). Pleasure and quality-of-life. UK: Wiley, Chichester."><span data-dcnode-id="2426" instrument_node="">1996</span></a><span data-dcnode-id="2424" instrument_node="">).</span></p><p data-dcnode-id="2412"><span data-dcnode-id="2422" instrument_node="">Yet there are also different notes. For instance, VanDam (</span><a aria-label="Reference 1989" data-dcnode-id="2420" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d179686420e358" title="VanDam, F. (1989). Does happiness heal? In R. Veenhoven (Ed.) How harmful is happiness? Consequences of enjoying life or not (pp. 17–23). The Netherlands: Universitaire Pers Rotterdam."><span data-dcnode-id="2421" instrument_node="">1989</span></a><span data-dcnode-id="2419" instrument_node="">) argues that positive attitudes cannot stop serious illness and that the idea of ‘fighting cancer’ with happiness is a mere illusion that blames the victim. Several studies have indeed failed to find longer survival times among happy cancer patients and some studies even report shorter survival times (e.g. Derogatis, Abeloff, &amp; Melisaratos, </span><a aria-label="Reference 1979" data-dcnode-id="2417" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d179686420e361" title="Derogatis, L. R., Abeloff, M. D., &amp; Melisaratos, N. (1979). Psychological coping mechanisms and survival time in metastatis breast cancer. JAMA, 242(14), 1504–1508."><span data-dcnode-id="2418" instrument_node="">1979</span></a><span data-dcnode-id="2416" instrument_node="">). There is also doubt about the protective effect of happiness and even reports of greater mortality among cheerful people as a result to their more risky lifestyles (Friedman et al., </span><a aria-label="Reference 1993" data-dcnode-id="2414" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d179686420e364" title="Friedman, H. S., Tucker, J. S., Tomlinson-Keasey, C., Schwartz, J. E., Wingard, D. L., &amp; Criqui, M. H. (1993). Does childhood personality predict longevity? Journal of Personality and Social Psychology, 65, 176–185."><span data-dcnode-id="2415" instrument_node="">1993</span></a><span data-dcnode-id="2413" instrument_node="">). In this view healthcare is better limited to physical health in the strict sense with too buoyant living being discouraged.</span></p><p data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">In this paper I address this issue in two ways: First I take stock of the empirical research on effects of happiness on physical health. I focus on longevity and assess whether happy people live longer. This appears to be the case, though happiness does not cure serious illness, it does appear to protect against falling ill in some way. Having established that happiness adds to health, I next explore the consequences of this finding for public health policy.</span></p></div></div></section><section data-dcnode-id="2190" data-gtm-vis-first-on-screen-50443292_562="617" data-gtm-vis-first-on-screen-50443292_563="618" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="617" data-gtm-vis-recent-on-screen-50443292_563="618" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Effects of happiness on physical health: A review of the research literature"><div class="c-article-section" data-dcnode-id="2191" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2405" id="Sec2"><span data-dcnode-id="2406" instrument_node="">Effects of happiness on physical health: A review of the research literature</span></h2><div class="c-article-section__content" data-dcnode-id="2192" id="Sec2-content"><p data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">Assessing the effect of happiness on health requires first of all that we clearly define these concepts. The terms ‘happiness’ and ‘health’ are both used with different meanings, some of which overlap. Evidently we can assess meaningful effects only if we deal with different things. A second requirement is selection of appropriate measures of these concepts.</span></p><p data-dcnode-id="2392"><span data-dcnode-id="2402" instrument_node="">Happiness is defined, as the </span><i data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">overall appreciation of one’s life-as-a-whole</span></i><span data-dcnode-id="2399" instrument_node="">, in short, how much one likes the life one lives. Elsewhere I have delineated that concept in more detail (Veenhoven, </span><a aria-label="Reference 1984" data-dcnode-id="2397" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d179686420e382" title="Veenhoven, R. (1984). Conditions of happiness. Dordrecht, The Netherlands: Kluwer Academic."><span data-dcnode-id="2398" instrument_node="">1984</span></a><span data-dcnode-id="2396" instrument_node="">, chapter 2). Thus defined, happiness is a state of mind and can therefore be measured using questioning techniques, among which single, direct questions. Self-reports of happiness appear to be fairly valid, though not very precise (Veenhoven, </span><a aria-label="Reference 1984" data-dcnode-id="2394" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d179686420e385" title="Veenhoven, R. (1984). Conditions of happiness. Dordrecht, The Netherlands: Kluwer Academic."><span data-dcnode-id="2395" instrument_node="">1984</span></a><span data-dcnode-id="2393" instrument_node="">, chapter 3).</span></p><p data-dcnode-id="2384"><span data-dcnode-id="2391" instrument_node="">As for the concept of health, I restrict to physical health, which I define in the narrow sense of absence of illness or defect. I do so to avoid conceptual overlap with happiness or related attitudinal matters. Physical health can be measured objectively using medical assessments or subjectively using self-reports. The most objective measure of physical health is longevity</span><sup data-dcnode-id="2386"><a data-dcnode-id="2387" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">Footnote </span></span><span data-dcnode-id="2388" instrument_node="">1</span></a></sup><span data-dcnode-id="2385" instrument_node="">.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2382" id="Sec4"><span data-dcnode-id="2383" instrument_node="">Correlational studies</span></h3><p data-dcnode-id="2377"><span data-dcnode-id="2381" instrument_node="">There is a wealth of cross-sectional studies on happiness and physical health, much of which is summarized in the World Database of Happiness, section Correlational findings on happiness and Physical Health (Veenhoven, </span><a aria-label="Reference 2006b" data-dcnode-id="2379" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d179686420e403" title="Veenhoven, R. (2006b). World Database of Happiness: Continuous register of scientific research on subjective appreciation of life. Erasmus University Rotterdam. Available at http://worlddatabaseofhappiness.eur.nl."><span data-dcnode-id="2380" instrument_node="">2006b</span></a><span data-dcnode-id="2378" instrument_node="">). This research shows consistent positive relationships.</span></p><p data-dcnode-id="2369"><span data-dcnode-id="2376" instrument_node="">Correlations vary between +.10 and +.40 and appear to be largely independent of age, gender, socio-economic status and personality. The correlations tend to be higher in patient populations than among the general public. The correlations of happiness with self-rated health are somewhat stronger than the correlations between happiness and heath ratings based on medical examinations, but that does not necessarily mean that the relation with ‘real health’ is weaker, since objective indicators do not capture several relevant aspects of health (Benyamini, Leventhal, &amp; Leventhal, </span><a aria-label="Reference 1999" data-dcnode-id="2374" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d179686420e409" title="Benyamini, Y., Leventhal, E. A., &amp; Leventhal, H. (1999). Self-assessments of health. What do people know that predicts their mortality. Research in Aging, 21, 477–500."><span data-dcnode-id="2375" instrument_node="">1999</span></a><span data-dcnode-id="2373" instrument_node="">). A recent cross national survey found highly similar correlations in 46 nations, a one point difference on the 5-step self-rating of health corresponding to a 0.6 point difference in happiness (Helliwel, </span><a aria-label="Reference 2002" data-dcnode-id="2371" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d179686420e412" title="Helliwell, J. F. (2002). How’s life? Combining individual and national variables to explain subjective wellbeing. Economic Modeling, 20, 331–360."><span data-dcnode-id="2372" instrument_node="">2002</span></a><span data-dcnode-id="2370" instrument_node="">, p. 339).</span></p><p data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">These studies clearly show that there is a statistical relationship, but they do not inform us about cause and effect. The correlations can be caused by the effect of health on happiness rather than by effects of happiness of health. To disentangle cause and effect we need follow-up studies.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2365" id="Sec5"><span data-dcnode-id="2366" instrument_node="">Follow-up studies on effect of health on happiness</span></h3><p data-dcnode-id="2336"><span data-dcnode-id="2364" instrument_node="">Only four studies have been done to assess the effect of earlier physical health on later happiness. One of these estimated physical health in the first year of life, using the medical records of a maternity clinic, and found no statistical relation with happiness at age 33 (Ventegodt, </span><a aria-label="Reference 1997" data-dcnode-id="2362" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d179686420e426" title="Ventegodt, S. (1997). Livskvalitet og omsteandigheder tidligt I livet. Forknigscenter for Livskvalitet, Kobenhaven, Denmark."><span data-dcnode-id="2363" instrument_node="">1997</span></a><span data-dcnode-id="2361" instrument_node="">, p. 300). Likewise, a 12-year follow-up of adults did not find a correlation between doctor’s visits at baseline and later happiness (Chiriboga, </span><a aria-label="Reference 1982" data-dcnode-id="2359" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d179686420e429" title="Chiriboga, D. A. (1982). Consistency in adult functioning; the influence of stress. Ageing and Society, 2, 7–29."><span data-dcnode-id="2360" instrument_node="">1982</span></a><span data-dcnode-id="2358" instrument_node="">, p. 23). Another 12-year follow-up of middle aged Americans did find some relation between baseline self-rated health and later happiness, but no effect of </span><i data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">change</span></i><span data-dcnode-id="2355" instrument_node=""> in physical health over this period (Palmore, </span><a aria-label="Reference 1977" data-dcnode-id="2353" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d179686420e435" title="Palmore, E. B. (1977). Change in life satisfaction; a longitudinal study of persons aged 46–70. Journal of Gerontology, 32, 311–316."><span data-dcnode-id="2354" instrument_node="">1977</span></a><span data-dcnode-id="2352" instrument_node="">, p. 315). Still another 12-year follow-up among married couples in the USA found a small correlation between baseline self-rated health and later happiness (</span><i data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">r</span></i><span data-dcnode-id="2349" instrument_node="">&nbsp;=&nbsp;+.13 </span><i data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">p</span></i><span data-dcnode-id="2346" instrument_node="">&nbsp;&lt;&nbsp;.001). Interestingly, this study also observed a stronger effect of baseline happiness on later health (</span><i data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">r</span></i><span data-dcnode-id="2343" instrument_node="">&nbsp;=&nbsp;+.37 </span><i data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">p</span></i><span data-dcnode-id="2340" instrument_node="">&nbsp;&lt;&nbsp;.001, Hawkins &amp; Booth, </span><a aria-label="Reference 2005" data-dcnode-id="2338" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d179686420e451" title="Hawkins, D. N., &amp; Booth, A. (2005). Unhappily ever after: Effects of long-term, low-quality marriages on well-being. Social Forces, 84, 452–471."><span data-dcnode-id="2339" instrument_node="">2005</span></a><span data-dcnode-id="2337" instrument_node="">, p. 456). These results suggest that the observed correlation between happiness and health will be largely due to a causal effect of happiness, and as we will see, that is the case.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2334" id="Sec6"><span data-dcnode-id="2335" instrument_node="">Follow-up studies on effect of happiness on health, in particular longevity</span></h3><p data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">Physical health can be measured objectively using medical assessments or subjectively using self-reports. For the purpose of this study I opted for the most objective measure possible, that is, longevity. The reason was to avoid contamination. If we measure health using self-reports, there would be a fair chance that happiness colors self-appraisals of health and this could even be the case with medical assessments that are at least partly based on reports of symptoms.</span></p><p data-dcnode-id="2319"><i data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">Studies</span></i><span data-dcnode-id="2329" instrument_node=""> There is a lot of research on predictors of longevity. Studies at the individual level have documented effects of various genetic factors, physical functioning, personality traits, life style variables, social support and socio-economic status. For a recent review see Lyyra (</span><a aria-label="Reference 2006" data-dcnode-id="2327" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d179686420e466" title="Lyyra, T. M. (2006). Predictors of mortality in old age contribution of self-rated health, physical functions, life satisfaction and social support on survival among older people. Jyväskylä: University of Jyväskylä."><span data-dcnode-id="2328" instrument_node="">2006</span></a><span data-dcnode-id="2326" instrument_node="">). Only some of these studies have involved indicators of happiness and because happiness is typically a side issue it is difficult to trace the findings bibliographically. Most references were found in the Bibliography of the World Database of Happiness (Veenhoven, </span><a aria-label="Reference 2006b" data-dcnode-id="2324" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d179686420e469" title="Veenhoven, R. (2006b). World Database of Happiness: Continuous register of scientific research on subjective appreciation of life. Erasmus University Rotterdam. Available at http://worlddatabaseofhappiness.eur.nl."><span data-dcnode-id="2325" instrument_node="">2006b</span></a><span data-dcnode-id="2323" instrument_node="">) and in a recent monograph on the consequences of subjective wellbeing by Lyubomirsky, Diener, and King (</span><a aria-label="Reference 2005" data-dcnode-id="2321" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d179686420e472" title="Lyubomirsky, S., Diener, E., &amp; King, L. (2005). The benefits of frequent positive affect: Does happiness lead to success? Psychological Bulletin, 3005, Vol. 131, pp. 803–855."><span data-dcnode-id="2322" instrument_node="">2005</span></a><span data-dcnode-id="2320" instrument_node="">) </span></p><p data-dcnode-id="2312"><i data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Selection</span></i><span data-dcnode-id="2316" instrument_node=""> I used three criteria for selecting studies: first that the investigation involved follow-up over time, second that longevity was assessed and third that this was related to earlier happiness. In the context of the latter criterion I inspected whether the indicators of happiness used fit the above definition of happiness. Some studies claim to assess happiness, but measured something else. This was for instance the case with the above-mentioned study that observed greater mortality among cheerful people, the word ‘cheerfulness’ being used for a happy-go-lucky attitude (Friedman et al., </span><a aria-label="Reference 1993" data-dcnode-id="2314" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d179686420e480" title="Friedman, H. S., Tucker, J. S., Tomlinson-Keasey, C., Schwartz, J. E., Wingard, D. L., &amp; Criqui, M. H. (1993). Does childhood personality predict longevity? Journal of Personality and Social Psychology, 65, 176–185."><span data-dcnode-id="2315" instrument_node="">1993</span></a><span data-dcnode-id="2313" instrument_node="">).</span></p><p data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">Altogether, I found 30 studies, which gave a rather mixed bag. The studies were all done among different populations and used different methodologies. A main methodological difference was found in the control variables. Some of the studies did not assess baseline physical health and could therefore not rule out the possibility that greater longevity of the initially most happy is due to their better initial physical health. Most studies did control baseline physical health, but assessed this in different ways, some using self-reports and others medical screening. Another noteworthy difference was in the statistics used for quantifying the effect of happiness on longevity. Some studies expressed the difference in a regression coefficient and others in Odds Ratio’s of different kinds. On the basis of the published research reports I could not transform the findings to obtain a common effect size and a full blown meta-analysis is therefore not possible.</span></p><p data-dcnode-id="2306"><i data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">Results</span></i><span data-dcnode-id="2307" instrument_node=""> Together, researchers in these 30 studies observed 38 effects, with some researchers looking at subgroups separately. In 53% of the cases the observed effect was positive, meaning that the initially happiest people lived longer. In 13% the effect of happiness appeared to be negative, happy people living shorter lives. In 34% of the cases the difference was not statistically significant.</span></p><p data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">At first glance this does not denote a robust effect. Yet a more consistent picture emerges when we make a difference between studies among ailing people and studies among healthy populations. There is also a difference to be found in the results of short-term and long-term follow-up studies.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2302" id="Sec8"><span data-dcnode-id="2303" instrument_node="">Happiness and longevity in sick people</span></h4><p data-dcnode-id="2297"><span data-dcnode-id="2301" instrument_node="">Eleven follow-up studies have been done among ailing people, partly among frail elderly and partly among patients suffering serious diseases. Given the poor health of these people, the follow-up period was typically no longer than a few years. These studies are presented in Table&nbsp;</span><a data-dcnode-id="2299" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2300" instrument_node="">1</span></a><span data-dcnode-id="2298" instrument_node=""> in order of follow-up length; the shortest follow-up period was 1&nbsp;year, the longest 11&nbsp;years.
</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2282" data-test="inline-table" id="table-1"><figure data-dcnode-id="2283"><figcaption class="c-article-table__figcaption" data-dcnode-id="2294"><b data-dcnode-id="2295" data-test="table-caption" id="Tab1"><span data-dcnode-id="2296" instrument_node="">Table&nbsp;1 Happiness and longevity: 11 follow-up studies in patient populations</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2284"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="2285" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10902-006-9042-1/tables/1" rel="nofollow"><span data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2286" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2287" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2288" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2291" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2290" fill-rule="evenodd"></path><span data-dcnode-id="2289" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2281" instrument_node="">
</span><p data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">Researchers in these 11 studies observed 14 effects, of which only four appear to be positive and five negative, while in another five cases no significant effect was found. The positive effects were observed in studies with relatively healthy samples, that is, veterans in an old age home (not a nursing home), heart patients of all ages and people with spinal cord injuries. An exception to this pattern was the positive effect found for cancer patients that had a relapse. The negative effects were observed among incurably ill patients and the very old frail elderly.</span></p><p data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">Together these results do not suggest that happiness ‘heals’, at least not that happiness can restore health in the case of serious illness. In other words: happiness does not appear to prolong the deathbed.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2275" id="Sec9"><span data-dcnode-id="2276" instrument_node="">Happiness and longevity in healthy populations</span></h4><p data-dcnode-id="2267"><span data-dcnode-id="2274" instrument_node="">Nineteen follow-up studies in healthy populations are summarized in Table&nbsp;</span><a data-dcnode-id="2272" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2273" instrument_node="">2</span></a><span data-dcnode-id="2271" instrument_node="">, mainly non-institutionalized elderly persons and a few studies among younger age categories. A special case is the study carried out among nuns, summarized at the bottom of Table&nbsp;</span><a data-dcnode-id="2269" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2270" instrument_node="">2</span></a><span data-dcnode-id="2268" instrument_node="">. The studies are again presented in order of length of the follow-up period, which vary from 1&nbsp;year to more than 60&nbsp;years. Five of the studies cover 20&nbsp;years or more.
</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2252" data-test="inline-table" id="table-2"><figure data-dcnode-id="2253"><figcaption class="c-article-table__figcaption" data-dcnode-id="2264"><b data-dcnode-id="2265" data-test="table-caption" id="Tab2"><span data-dcnode-id="2266" instrument_node="">Table&nbsp;2 Happiness and longevity: 19 follow-up studies in healthy populations</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2254"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="2255" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10902-006-9042-1/tables/2" rel="nofollow"><span data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2256" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2257" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2258" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2261" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2260" fill-rule="evenodd"></path><span data-dcnode-id="2259" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="2251" instrument_node="">
</span><p data-dcnode-id="2243"><span data-dcnode-id="2250" instrument_node="">Researchers in these 19 follow-up studies assessed 24 effects, of which 16 were positive, while in eight cases an observed (positive) effect did not reach statistical significance. In the case of the study done in Japan by Kawamoto and Doi (</span><a aria-label="Reference 2002" data-dcnode-id="2248" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d179686420e2885" title="Kawamoto, R., &amp; Doi, T. (2002). Self-reported functional ability predicts three-year mobility and mortality in community dwelling older persons. Geriatrics and Gerontology International, 2, 68–74."><span data-dcnode-id="2249" instrument_node="">2002</span></a><span data-dcnode-id="2247" instrument_node="">) the non-significance is possibly due to control for activity and social contacts, which is likely to have removed variance in happiness. None of the studies in Table&nbsp;</span><a data-dcnode-id="2245" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2246" instrument_node="">2</span></a><span data-dcnode-id="2244" instrument_node=""> resulted in a negative effect.</span></p><p data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">The observed positive effects of happiness on longevity are quite sizable and amount to 7.5&nbsp;years and 10&nbsp;years. The strongest effect was observed in the longest follow-up, the study among American nuns, which covered their entire adult lifetime. In this study, happiness in young adulthood was measured using autobiographies written by the nuns on entering the convent. Unfortunately baseline health could not be controlled in that study. In the study by Levy et al. among over 50 aged in Ohio USA, the researchers did control baseline health and still found that the happy lived 7.5&nbsp;years longer.</span></p><p data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">It is not possible to generalize these finding to a simple statement such as: happy people live so many years longer. This is partly due to technical problems such as the use of incomparable statistics and different cut-off points between more and less happy people. Another problem is that the size of the effect may differ across subgroups of a population, such as among age categories. Still it clear that the effect of happiness on longevity is large. It involves several years and as such is comparable to the effect of smoking or not.</span></p><p data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">Since we have seen that happiness does not cure serious illness, this outcome means probably that happiness ‘protects’ one against falling ill. That interpretation fits well with the fact that the effects manifest most strongly in the long-term studies.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2235" id="Sec10"><span data-dcnode-id="2236" instrument_node="">How could happiness protect physical health?</span></h3><p data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">This begs the question of how happiness might protect against illness. Several possible mechanisms are mentioned in the literature.</span></p><p data-dcnode-id="2228"><span data-dcnode-id="2232" instrument_node="">The most commonly mentioned direct effect is that chronic unhappiness activates the fight-flight response, which is known to involve harmful effects in the long run, such as higher blood pressure and a lower immune response. The effect of negative mental states is well documented in psychosomatic medicine. There are also indications that positive mental states protect against illness, e.g. better immune response when in good mood (Cohen et al., </span><a aria-label="Reference 1995" data-dcnode-id="2230" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d179686420e2909" title="Cohen, S., Doyle, W. J., Skomer, D. P., Fireman, P., Gwaltney, J. M., &amp; Newson, J. P. (1995). State and trait negative affect as predictors of subjective and objective symptoms of respiratory viral infections. Journal of personality and Social Psychology, 68, 159–169."><span data-dcnode-id="2231" instrument_node="">1995</span></a><span data-dcnode-id="2229" instrument_node="">).</span></p><p data-dcnode-id="2211"><span data-dcnode-id="2227" instrument_node="">Another commonly mentioned mechanism is better health behavior. Happy people are more inclined to watch their weight (Schulz, </span><a aria-label="Reference 1985" data-dcnode-id="2225" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d179686420e2915" title="Schulz, W. (1985). Lebensqualität in Österreich (Quality of Life in Austria). Report Institut für Soziologie der Sozial- und Wirtschaftswissenschaftliche Fakultät der Universität Wien, 1985, Vienna, Austria."><span data-dcnode-id="2226" instrument_node="">1985</span></a><span data-dcnode-id="2224" instrument_node="">, p. 52), are more perceptive of symptoms of illness (Ormel, </span><a aria-label="Reference 1980" data-dcnode-id="2222" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d179686420e2918" title="Ormel, J. (1980). Moeite met leven of een moeilijk leven? Groningen: Konstapel."><span data-dcnode-id="2223" instrument_node="">1980</span></a><span data-dcnode-id="2221" instrument_node="">, p. 350) and cope better with threatening information (Aspingwall &amp; Brunhart, </span><a aria-label="Reference 1996" data-dcnode-id="2219" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d179686420e2921" title="Aspinwall, L. G., &amp; Brunhart, S. M. (1996). Distinguishing optimism from denial: Optimistic beliefs predict attention to health threads. Personality and Social Psychology Bulletin, 22, 993–1003."><span data-dcnode-id="2220" instrument_node="">1996</span></a><span data-dcnode-id="2218" instrument_node="">). Happy people also live healthier, they engage more often in sports (Schulz, </span><a aria-label="Reference 1985" data-dcnode-id="2216" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d179686420e2924" title="Schulz, W. (1985). Lebensqualität in Österreich (Quality of Life in Austria). Report Institut für Soziologie der Sozial- und Wirtschaftswissenschaftliche Fakultät der Universität Wien, 1985, Vienna, Austria."><span data-dcnode-id="2217" instrument_node="">1985</span></a><span data-dcnode-id="2215" instrument_node="">) and they tend to be more moderate with smoking and drinking (Ventegodt, </span><a aria-label="Reference 1997" data-dcnode-id="2213" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d179686420e2927" title="Ventegodt, S. (1997). Livskvalitet og omsteandigheder tidligt I livet. Forknigscenter for Livskvalitet, Kobenhaven, Denmark."><span data-dcnode-id="2214" instrument_node="">1997</span></a><span data-dcnode-id="2212" instrument_node="">, pp. 180–184).</span></p><p data-dcnode-id="2206"><span data-dcnode-id="2210" instrument_node="">Happiness could also further health through its wider activating effects, which keep the body fit and resilient. The reverse is seen in depression that typically slows down functioning and probably for that reason makes people more susceptible to illness. This mechanism fits Frederickson’s (</span><a aria-label="Reference 1998" data-dcnode-id="2208" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d179686420e2933" title="Frederickson, B. L. (1998). What good are positive emotions? Review of General Psychology, 2, 300–319."><span data-dcnode-id="2209" instrument_node="">1998</span></a><span data-dcnode-id="2207" instrument_node="">) theory that positive affect ‘broadens’ the action repertoire. According to Frederickson, positive affect helps also to ‘build’ resources and this is likely to create healthier living conditions. One notable mechanism in this context is that happiness facilitates the creation and maintenance of supportive social networks.</span></p><p data-dcnode-id="2201"><span data-dcnode-id="2205" instrument_node="">Another mechanism may be that happy people make better choices in life, because they are more open to the world and more self-confident. Happy people are also less likely to fall victim to the pattern of one-dimensional thinking in distress, which might hamper choice (Zautra, </span><a aria-label="Reference 2003" data-dcnode-id="2203" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d179686420e2940" title="Zautra, A. J. (2003). Emotions, stress and health. Oxford NY, USA: Oxford University Press."><span data-dcnode-id="2204" instrument_node="">2003</span></a><span data-dcnode-id="2202" instrument_node="">).</span></p><p data-dcnode-id="2193"><span data-dcnode-id="2200" instrument_node="">There is piece-meal evidence for each of these causal mechanisms, but as yet little overview on their relative importance and interactions. For the time being we know </span><i data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">that</span></i><span data-dcnode-id="2197" instrument_node=""> happiness fosters physical health, but not precisely </span><i data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">how</span></i><span data-dcnode-id="2194" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="2088" data-title="Implications for preventive health care: An exploration"><div class="c-article-section" data-dcnode-id="2089" id="Sec11-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2188" id="Sec11"><span data-dcnode-id="2189" instrument_node="">Implications for preventive health care: An exploration</span></h2><div class="c-article-section__content" data-dcnode-id="2090" id="Sec11-content"><p data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">This finding that happiness adds to health opens new ways for health promotion, preventive public health care in particular. It implies that we can make people healthier by making them happier. This not only broadens the practical options for interventions, but also widens the ideological basis for health promotion, the goal of ‘Health for all’ coinciding with the utilitarian aim of ‘Greater happiness for a greater number’.</span></p><p data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">What innovations could this approach lead to? To answer this question I will first summarize the commonly used ways to promote public health. Next I consider to what extend these policies also add to happiness; in other words, I look how much synergy there is between current health promotion and the requirements for greater happiness. Using this as a basis, I then identify in section "Furthering health through happiness" some ways that can be used to further happiness that are not yet part of public health policy.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2182" id="Sec13"><span data-dcnode-id="2183" instrument_node="">Spearheads of preventive health care</span></h3><p data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Preventive health care operates at different levels, at the micro-level of individual citizens, at the meso-level of social institutions and at the macro-level of nations.</span></p><p data-dcnode-id="2175"><span data-dcnode-id="2179" instrument_node="">At the </span><i data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">level of individuals</span></i><span data-dcnode-id="2176" instrument_node="">, illness is prevented by means of inoculation programs and by providing periodical health checks for categories such as new-borns and school children. Next there are attempts to raise awareness of health treads via health education, common themes of which today are that we should take more physical exercise, stop smoking, drink moderately, eat healthy and have safe sex.</span></p><p data-dcnode-id="2170"><span data-dcnode-id="2174" instrument_node="">At the </span><i data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">level of institutions</span></i><span data-dcnode-id="2171" instrument_node=""> health policy is aimed at reducing disease-producing conditions in the work and living environment. The emphasis is on regulations, for instance rules for safety in working places, hygiene in restaurants and sewage systems in cities. The observance of such rules is enforced by controls, i.e. fines for non-compliance or the closing down of building sites. Adherence is also encouraged by providing information.</span></p><p data-dcnode-id="2165"><span data-dcnode-id="2169" instrument_node="">At the </span><i data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">level of nations</span></i><span data-dcnode-id="2166" instrument_node=""> public health is also protected in several ways, such as by keeping people with infectious diseases out of the country, preventing pollution with noxious chemicals and mandatory safety controls of food and consumer commodities. Health protection is also an issue in wider policies. For instance one of the objectives of social security schemes is to prevent health damage resulting from (child) poverty.</span></p><p data-dcnode-id="2160"><span data-dcnode-id="2164" instrument_node="">It is hard to say how effective each of these policies is, but together they seem to contribute substantially to public health. Life expectancy doubled in the last century and is still rising and this gain is at least partly due to public health policies (VanderMaas, </span><a aria-label="Reference 1989" data-dcnode-id="2162" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d179686420e2990" title="Van derMaas, P. (1989). Kan Nederland gezonder? In R. Veenhoven (red), Kan Nederland gelukkiger? (pp. 11–29). The Netherlands: Universitaire Pers Rotterdam."><span data-dcnode-id="2163" instrument_node="">1989</span></a><span data-dcnode-id="2161" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2158" id="Sec14"><span data-dcnode-id="2159" instrument_node="">Fit with pursuit of greater happiness for a greater number</span></h3><p data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">These improvements in physical health are likely to contribute to happiness, though as we have seen above, the effects of health on happiness are typically small. Does preventive health care otherwise add to happiness? Let us consider the possible effects at each of the levels discussed here.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2154" id="Sec15"><span data-dcnode-id="2155" instrument_node="">Healthy lifestyle and happiness</span></h4><p data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">It is not likely that inoculation programs and health screenings will have an independent effect on happiness. However, it is possible that life-style education has. It could be that a healthy life-style is more enjoyable irrespective of its add-on physical health, e.g. that taking regular exercise makes life more satisfying anyway. However it is also possible that healthy living is not particularly enjoyable and that health educators typically try to make us do things that we do not like. What do the available data tell us?</span></p><p data-dcnode-id="2142"><i data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">Physical exercise</span></i><span data-dcnode-id="2149" instrument_node=""> Sportive people tend to be somewhat happier than non-sportive people, and the difference appears to be independent of age, marital status and physical health (Schulz, </span><a aria-label="Reference 1985" data-dcnode-id="2147" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d179686420e3011" title="Schulz, W. (1985). Lebensqualität in Österreich (Quality of Life in Austria). Report Institut für Soziologie der Sozial- und Wirtschaftswissenschaftliche Fakultät der Universität Wien, 1985, Vienna, Austria."><span data-dcnode-id="2148" instrument_node="">1985</span></a><span data-dcnode-id="2146" instrument_node="">). There are indications of a causal effect, in particular the effects of jogging on mood (Biddle, </span><a aria-label="Reference 2000" data-dcnode-id="2144" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d179686420e3014" title="Biddle, S. J. (2000). Emotions, mood and physical activity. In S. J. Biddle, R. K. Fox, &amp; S. H. Boutcher (Eds.), Physical activity and psychological well-being. London: Routledge."><span data-dcnode-id="2145" instrument_node="">2000</span></a><span data-dcnode-id="2143" instrument_node="">). In this case there is synergy between the promotion of health and happiness</span></p><p data-dcnode-id="2132"><i data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Smoking</span></i><span data-dcnode-id="2139" instrument_node=""> Moderate smokers appear to be no less happy than non-smokers, but heavy smokers are. There are indications for a causal effect of happiness on smoking, a follow-up among American adolescents showing that earlier unhappiness predicts later smoking (Bachman, O’ Malley, &amp; Johnson, </span><a aria-label="Reference 1978" data-dcnode-id="2137" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d179686420e3022" title="Bachman, J. G., O’Malley, P. M., &amp; Johnson, J. (1978). Youth in transition vol. IV: Adolescence to Adulthood, change and stability in the lives of young men. Ann Arbor, USA: University of Michigan, Institute for Social research."><span data-dcnode-id="2138" instrument_node="">1978</span></a><span data-dcnode-id="2136" instrument_node="">), but in a recent follow-up in Russia, happiness appeared not to predict starting or stopping smoking (Graham, Eggers, &amp; Sukhatankar, </span><a aria-label="Reference 2004" data-dcnode-id="2134" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d179686420e3025" title="Graham, C., Eggers, A., &amp; Sukhatankar, S. (2004). Does happiness pay? An exploration based on panel data from Russia. Economic Behavior and Organization, 55, 319–342."><span data-dcnode-id="2135" instrument_node="">2004</span></a><span data-dcnode-id="2133" instrument_node="">, p. 18). The available data do not tell us whether smoking cuts back on happiness irrespective of health. So, for the time being, we cannot rule out the possibility that smoking affect health negatively but happiness positively, hence we are not sure that synergy exists on this point.</span></p><p data-dcnode-id="2125"><i data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">Drinking</span></i><span data-dcnode-id="2129" instrument_node=""> Moderate drinkers appear to be happier than teetotallers, the optimum being one or two units of alcohol a day (Ventegodt, 1995, pp. 180–184). As in the case of smoking, heavy drinkers are less happy, that is people who drink five or more units of alcohol per day. The only indication of causality is found in a five-year follow-up in Russia, in which an increase in drinking appeared to be associated with a decline of happiness. Unfortunately the amounts of alcohol involved are not reported (Graham et al., </span><a aria-label="Reference 2004" data-dcnode-id="2127" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d179686420e3033" title="Graham, C., Eggers, A., &amp; Sukhatankar, S. (2004). Does happiness pay? An exploration based on panel data from Russia. Economic Behavior and Organization, 55, 319–342."><span data-dcnode-id="2128" instrument_node="">2004</span></a><span data-dcnode-id="2126" instrument_node="">). As in the foregoing case we cannot rule out that heavy drinking may be worse for your health than for your happiness. Only in the case problem drinking is there a clear synergy.</span></p><p data-dcnode-id="2118"><i data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">Eating</span></i><span data-dcnode-id="2122" instrument_node=""> There is a lot of research into the effects of nutrition on physical health, but hardly any research into the effects of diet on happiness. Analysis of a health-survey in the Netherlands showed no relationship between intake of unhealthy food-stuffs (sugar, fats) and happiness, nor with healthy food (fruit), while consumption of meat and dairy-products was slightly positively correlated with happiness (Aakster, </span><a aria-label="Reference 1972" data-dcnode-id="2120" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d179686420e3042" title="Aakster, C. W. (1972). Socio-cultural variables in the etiology of health disturbances: A sociological approach. PhD dissertation, University of Groningen, The Netherlands."><span data-dcnode-id="2121" instrument_node="">1972</span></a><span data-dcnode-id="2119" instrument_node="">). In a study carried out in Denmark the researcher observed that people who often eat fast foods tend to be somewhat less happy (Ventegodt, 1995). In both cases the correlations could be spurious or be due to a causal effect of happiness on food preference rather than the converse. There is not much research either on the effects of how much one eats on happiness. The available data suggest that being slightly overweight does not depress happiness, people with Body Mass Index between 25 and 30 being happiest (Ventegodt, 1995, pp. 232–234). Yet again we lack data on cause and effect. All in all, no clear synergy has been found as yet.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2116" id="Sec20"><span data-dcnode-id="2117" instrument_node="">Healthy living environment and happiness</span></h4><p data-dcnode-id="2111"><span data-dcnode-id="2115" instrument_node="">At the institutional level preventive healthcare deals primarily with physical aspects of the living environment, such as proper sewage, removal treatment, providing clean air and standards that must be met for electrical appliances or that detail what constitutes safe stairways. Does this also add to happiness? There is a correlation between quality of housing and happiness, independent of marital state and social class (World Database of Happiness, Correlational findings on Happiness and Living environment, Veenhoven, </span><a aria-label="Reference 2006" data-dcnode-id="2113" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d179686420e3053" title="Veenhoven, R. (2006b). World Database of Happiness: Continuous register of scientific research on subjective appreciation of life. Erasmus University Rotterdam. Available at http://worlddatabaseofhappiness.eur.nl."><span data-dcnode-id="2114" instrument_node="">2006</span></a><span data-dcnode-id="2112" instrument_node="">b). Causality is probable, but not proven as yet. The same holds for working conditions, though we know a lot about the effects of working conditions on health, we are still largely in the dark about the effects of working conditions on happiness.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2109" id="Sec21"><span data-dcnode-id="2110" instrument_node="">Sane society and happiness</span></h4><p data-dcnode-id="2104"><span data-dcnode-id="2108" instrument_node="">At the societal level an important spearhead of preventive health care is the control of infectious diseases in the country. This will certainly add to public health, but is unlikely to involve an independent effect on happiness. Another aim is to reduce of accidents in road traffic and workplaces. In this case synergy is more likely, since comparative research has shown a strong negative correlation between mortality from accidents and average happiness (Veenhoven, </span><a aria-label="Reference 1996" data-dcnode-id="2106" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d179686420e3064" title="Veenhoven, R. (1996). Happy life-expectancy: A comprehensive measure of quality-of-life in nations. Social Indicators Research, 39, 1–58."><span data-dcnode-id="2107" instrument_node="">1996</span></a><span data-dcnode-id="2105" instrument_node="">, p. 34). Causality is likely, but not proven as yet; the correlation can also be due to a greater degree of accident proneness in unhappy countries.</span></p><p data-dcnode-id="2099"><span data-dcnode-id="2103" instrument_node="">As noted above, considerations of health also play a role in wider social policies such as social security arrangements. Contrary to common expectation, there appears to be no relationship between spending on social security and health outcomes in nations, nor a relationship with happiness (Veenhoven, </span><a aria-label="Reference 2000" data-dcnode-id="2101" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d179686420e3070" title="Veenhoven, R. (2000a). Wellbeing in the welfare state, level not higher, distribution not more equitable. Journal of Comparative Policy Analysis: Research and Practice, 2, 91–125."><span data-dcnode-id="2102" instrument_node="">2000</span></a><span data-dcnode-id="2100" instrument_node="">a). So in this case there is again no synergy.</span></p><p data-dcnode-id="2091"><span data-dcnode-id="2098" instrument_node="">All in all, it is clear that not all health promotions are likely to further happiness as well. As yet this seems to be the case only for policies that aim at promoting exercise and preventing problem drinking and accidents. This applies to policies that aim at </span><i data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">physica</span></i><span data-dcnode-id="2095" instrument_node="">l health. Synergy may be greater for preventive </span><i data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">mental</span></i><span data-dcnode-id="2092" instrument_node=""> health care.</span></p></div></div></section><section data-dcnode-id="1940" data-title="Furthering health through happiness"><div class="c-article-section" data-dcnode-id="1941" id="Sec22-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2086" id="Sec22"><span data-dcnode-id="2087" instrument_node="">Furthering health through happiness</span></h2><div class="c-article-section__content" data-dcnode-id="1942" id="Sec22-content"><p data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Because happiness adds to physical health, health can also be furthered by policies that make people happier in the first place. What policies can we think of? Below are some proposals for each of the three levels discussed above.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2082" id="Sec23"><span data-dcnode-id="2083" instrument_node="">Helping individuals to live happier</span></h3><p data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Happiness can be furthered at the individual level by (1) information (2) training and (3) guidance. This approach is particularly useful in modern nations, where the environmental conditions are typically so good that most of the variance in happiness is due to individual differences.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2078" id="Sec24"><span data-dcnode-id="2079" instrument_node="">Evidence-based happiness advice </span></h4><p data-dcnode-id="2073"><span data-dcnode-id="2077" instrument_node="">Happiness depends to some extent on the choices we make in life, in particular in modern ‘multiple-choice societies’. Life-choices are for the most part based on expected happiness, for instance we typically choose a profession we think we will like. Economists call this ‘expected utility’, or ‘decision utility’, and acknowledge that this may differ from later ‘experienced utility’, because decisions are mostly made on the basis of incomplete information. An example of mal-informed choice is the decision to accept a higher paying job that requires more commuting. People typically accept such jobs in the expectation that the extra money will compensate for the travel time, but follow-up research has shown that they are mostly wrong, and that happiness tends to go down in such cases (Frey, </span><a aria-label="Reference 2004" data-dcnode-id="2075" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d179686420e3104" title="Frey, B. S. (2004). Economic consequences of mis-predicting utility. Working Paper, Institute for Empirical Research in Economics, Zürich, Switzerland."><span data-dcnode-id="2076" instrument_node="">2004</span></a><span data-dcnode-id="2074" instrument_node="">).</span></p><p data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Research of this kind can help people to make more informed choices. Though there is no guarantee that things will pan out in the same way for you, it is still useful to know how it has worked out for other people in the recent past. Such research is particularly useful if it concerns similar people.</span></p><p data-dcnode-id="2066"><span data-dcnode-id="2070" instrument_node="">This policy does not involve paternalism; it does not push people into a particular way of life, but it provides them with information for making a well-informed autonomous decision. Paternalism would only be involved if research is manipulated or its results communicated selectively. For instance if the observed negative effect of parenthood on happiness is disguised (World Database of happiness, Correlational findings on Happiness and Having Children, Veenhoven, </span><a aria-label="Reference 2006b" data-dcnode-id="2068" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d179686420e3112" title="Veenhoven, R. (2006b). World Database of Happiness: Continuous register of scientific research on subjective appreciation of life. Erasmus University Rotterdam. Available at http://worlddatabaseofhappiness.eur.nl."><span data-dcnode-id="2069" instrument_node="">2006b</span></a><span data-dcnode-id="2067" instrument_node="">).</span></p><p data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">This approach to the furthering of happiness is similar to current evidence based health-education. As in the case of happiness, we are often not sure about the consequences of life-style choices on our health. How much drinking is too much? Is eating raw vegetables really good for your health? We cannot answer such question on the basis of our own experience and common wisdom is often wrong. Hence we increasingly look to the results of scientific studies that provide us with ever more information.</span></p><p data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">As yet, the information basis for such a way of furthering happiness is still small. Although there is a considerable body of research on happiness, this research is typically cross-sectional and does not inform us about cause and effect. What we need is panel data that allow us to follow the effects of life-choices over time. Still another problem is that current happiness research deals mainly with things over which we have little control, such as personality and social background. What we need is research on things we can choose, for example, working part-time or fulltime or raising a family or not.</span></p><p data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">Once such information becomes available, it will quickly be disseminated to the public, though the lifestyle press and the self-help literature. It can also be included in organized health-education, broadened to become education for ‘living well’. The problem is not in the dissemination of knowledge, but in the production of it.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2058" id="Sec25"><span data-dcnode-id="2059" instrument_node="">Training techniques for art-of-living</span></h4><p data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Happiness depends heavily on various skills for living, such as realism, determination, social competence and having some resilience. Consequently, improving such skills can further an individual’s happiness.</span></p><p data-dcnode-id="2051"><span data-dcnode-id="2055" instrument_node="">As yet, such attempts focus typically on repairing skill-deficits, for instance psychotherapy in case of unrealistic beliefs and empowerment trainings for sub-assertive individuals. Many of the interventions are provided in the context of mental health care and are often paid for by health insurers. This supply caters to the unhappiest part of the population. Recently there has also been a rise in techniques that aim at to strengthen the life-skills of people without problems, in particular the ‘Positive Psychology’ movement (Seligman &amp; Csikszentmihalyi, </span><a aria-label="Reference 2000" data-dcnode-id="2053" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d179686420e3132" title="Seligman, M. E., &amp; Csikszentmihalyi, M. (2000). Positive psychology: an introduction. American Psychologist, 55, 5–14."><span data-dcnode-id="2054" instrument_node="">2000</span></a><span data-dcnode-id="2052" instrument_node="">). There is less institutional support for such ‘positive training’, but the potential audience is much greater.</span></p><p data-dcnode-id="2046"><span data-dcnode-id="2050" instrument_node="">In this context it would be worthwhile to invest in the development of training that focus on the art of living. ‘Art-of-living’ is the knack of leading a satisfying life, and in particular, the ability to develop a rewarding life-style (Veenhoven, </span><a aria-label="Reference 2003" data-dcnode-id="2048" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d179686420e3138" title="Veenhoven, R. (2003). Arts of living. Journal of Happiness Studies, 4, 373–384."><span data-dcnode-id="2049" instrument_node="">2003</span></a><span data-dcnode-id="2047" instrument_node="">). This involves various aptitudes, some of which seems to be susceptible to improvement using training techniques. Four of these aptitudes are: (1) the ability to enjoy, (2) the ability to choose, (3) the ability to keep developing and (4) the ability to see meaning.</span></p><p data-dcnode-id="2042"><i data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">Learning to enjoy</span></i><span data-dcnode-id="2043" instrument_node=""> The ability to take pleasure from life is partly in-born (trait negativity–positivity), but can to some extent be cultivated. Learning to take pleasure from life was part of traditional leisure-class education, which emphasized prestigious pleasures, such as the tasting of exquisite wines and the appreciation of difficult music. Yet it is also possible to develop an enjoyment of the common things in life, such as breakfast or watching the sunset. Training in savoring simple pleasures is part of some religious practices.</span></p><p data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Hedonistic enjoyment is valued in present day modern society and figures prominently in advertisements. Yet techniques that help us to gain the ability to enjoy are underdeveloped. There are no professional enjoyment trainers, at least no trainers aiming at improving our general level of enjoyment. There is professional guidance for specific types of pleasures, such as how to appreciate fine arts and often the main goal is to sell a particular product.</span></p><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Still it would seem possible to develop wider enjoyment training techniques. One way could be to provide training in ‘attentiveness’, possibly using meditation techniques. Another option could be the broadening of one’s repertoire of leisure activities, which could link up with expertise in various stimulation programs. A third way could be looking at ways to remove inner barriers to enjoy, which could be linked to clinical treatment of a-hedonie.</span></p><p data-dcnode-id="2034"><i data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">Learning to choose</span></i><span data-dcnode-id="2035" instrument_node=""> As mentioned above, happiness depends also the choices one makes in life and hence also on one’s ability to choose. The art-of-choosing involves several skills.</span></p><p data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">One such skill is getting to know what the options are. This aptitude can be improved by learning and this is one of the things we do in consumer education. Expertise in this field can be used for training in the charting of wider life options.</span></p><p data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Another requirement is an ability to estimate how well the various options would fit one’s nature. This requires self knowledge and that is also something that can be improved, self-insight being a common aim in training and psychotherapy.</span></p><p data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Once one knows what to choose, there is often a problem of carrying through. This phase requires aptitudes such as perseverance, assertiveness and creativity, all of which can be strengthened and are in fact common objectives in vocational trainings.</span></p><p data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">The next step in the choice process is assessing the outcomes, in term of the above-mentioned distinction, assessing whether ‘expected utility’ fits ‘experienced utility’. This phase calls for openness to one’s feelings and a realistic view on one’s overall mood pattern. Training in mood monitoring is common practice in psychotherapy and could possibly be improved using computed based techniques of experience sampling.</span></p><p data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">The problem is not so much to develop such training techniques, but to separate the chaff from the corn. That will require independent effect studies. Once such techniques have been proven to be effective a market will develop.</span></p><p data-dcnode-id="2017"><i data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Learning to grow</span></i><span data-dcnode-id="2021" instrument_node=""> Happiness depends largely on the gratification of basic needs, and an important class of needs is ‘growth-needs’ (Maslow, </span><a aria-label="Reference 1954" data-dcnode-id="2019" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d179686420e3172" title="Maslow, A. H. (1954). Motivation and personality. NY, USA: Harper."><span data-dcnode-id="2020" instrument_node="">1954</span></a><span data-dcnode-id="2018" instrument_node="">), also referred to as ‘functioning needs’ or ‘mastery needs’. These needs are not restricted to higher mental functions but also concern the use and development of the body and senses. In animals, the gratification of these needs is largely guided by instinct, but in humans it requires conscious action. Cultures typically provide standard action-patterns for this purpose, such as providing for vocational career scripts or artistic interests but people must also make choices of their own, in particular in multiple-choice societies. Failure to involve oneself in challenging activities may lead one into diffuse discontent or even depression, this for example happens regularly after retirement from work. Thus another art-of-living is to keep oneself going and developing.</span></p><p data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">Intervention would also seem possible in this case. Mere information will probably be useful and one can also think of various ways to get people going. Once again training techniques can build on available experience, in this case experience in various activation programs. There is already an ample supply of ‘growth trainings’ on the peripheries of psychology but as yet little evidence for the effectiveness of such interventions and certainly no proof of long term effects on happiness.</span></p><p data-dcnode-id="2005"><i data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Helping to see meaning</span></i><span data-dcnode-id="2012" instrument_node=""> Probably, but not certainly, happiness also depends on one seeing meaning in one’s life. Though it is not sure that we have an innate need for meaningfulness as such, the idea of it provides at least a sense of coherence. Seeing meaning in one’s life requires that one develops a view of one’s life and that one can see worth in it. These mental knacks can also be strengthened and possible one can also learn to live with the philosophical uncertainties that surround this issue. There is experience on this matter in existential counseling and in practices such as ‘life-reviewing’ (Holahan, Holahan, &amp; Wonacott, </span><a aria-label="Reference 1999" data-dcnode-id="2010" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d179686420e3182" title="Holahan, C. K., Holahan, C. J., &amp; Wonacott, N. L. (1999). Self appraisal, life satisfaction and retrospective life choices across one and three decades. Psychology and Aging, 14, 238–244."><span data-dcnode-id="2011" instrument_node="">1999</span></a><span data-dcnode-id="2009" instrument_node="">) and ‘logo-therapy’ (Frankl, </span><a aria-label="Reference 1946" data-dcnode-id="2007" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d179686420e3185" title="Frankl, V. E. (1946). De zin van het bestaan, een inleiding tot de logotherapie. Nederlandse vertaling, Donker 2002, Rotterdam."><span data-dcnode-id="2008" instrument_node="">1
