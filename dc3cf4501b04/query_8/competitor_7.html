946</span></a><span data-dcnode-id="2006" instrument_node="">). As far as I know, the impact of such interventions on happiness has yet to be investigated.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2003" id="Sec30"><span data-dcnode-id="2004" instrument_node="">Professional life-counseling</span></h4><p data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">If we feel unhealthy we go to a medical general practitioner, who makes a diagnosis and either prescribes a treatment or refers us to a medical specialist. If we feel unhappy, there is no such generalist. We have to guess about the possible causes ourselves and on that basis consult a specialist who may be a psychologist, a marriage counselor or a lawyer. Professional guidance for a happier life is unavailable as yet. This is a remarkable market failure, given the large number of people who feel they could be happier.</span></p><p data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node=""> The size of the demand is reflected in the booming sales of self-help books and the willingness to pay for things that promise greater happiness, such as cosmetic surgery and second homes. The main reason is probably that the knowledge basis for such a profession is still small and that trust in happiness counseling is undermined by the many quacks operating in this area.</span></p><p data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Still there seems to be a future for professional counseling for a happier life and for related life coaching and trainings. There is demand for such services, but as yet no proper supply. Much can be gained by developing that supply. One of the ways is to stimulate the professionalization of current activities in that area, amongst other things by following people who use such services to establish what interventions add to happiness or do not. The development of professional life counseling could also profit from the above-advised research into long-term changes in happiness following major life-choices.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1995" id="Sec31"><span data-dcnode-id="1996" instrument_node="">Improving the livability of institutions</span></h3><p data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Happiness depends further on environmental factors, amongst which the residential conditions in which we live and the organizational context in which we work or get educated.</span></p><p data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">There is a lot of research on residential preferences but amazingly little research into the effects of residential conditions on happiness. Research is driven by the wish to sell and the focus is therefore on expected utility rather than on experienced utility. As a result, there is as yet no solid evidence base for promoting happiness at the local level and decision making is still dominated by mere beliefs.</span></p><p data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">We find more research in the field of work organization, in particular a considerable body of literature on job-satisfaction. Yet job-satisfaction does not always coincide with life-satisfaction and this literature leaves us largely in the dark about cause and effect. There is also a large literature on the negative effects of work-conditions, such as professional injuries and burnout, but this literature is largely blind for positive effects. As a result there is as no good evidence base for happiness promotion in this field either. The same holds for schools. We know a lot about the exam results produced by educational institutions, but hardly anything about their impact on long-term happiness.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1987" id="Sec32"><span data-dcnode-id="1988" instrument_node="">Improving the livability of society</span></h3><p data-dcnode-id="1979"><span data-dcnode-id="1986" instrument_node="">Happiness also depends on the macro-social conditions in which one lives and in this case we can build on a better evidence base. Comparative research has revealed wide differences in average happiness across nations, scores on a 0–10 step scale ranging from 8.2 in present day Denmark to 3.2 in Tanzania (Veenhoven, </span><a aria-label="Reference 2005" data-dcnode-id="1984" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d179686420e3219" title="Veenhoven, R. (2005). Average happiness in 90 nations in the early 2000s. World Database of Happiness, Distributional Findings in Nations, Rank report 2005/1 http://worlddatabaseofhappiness.eur.nl/hap_nat/findingreports/."><span data-dcnode-id="1985" instrument_node="">2005</span></a><span data-dcnode-id="1983" instrument_node="">). There is a clear pattern in these differences. About 83% of the variation in average happiness can be explained by ‘hard’ country characteristics, such as economic development, political democracy and rule of law (Veenhoven &amp; Kalmijn, </span><a aria-label="Reference 2005" data-dcnode-id="1981" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d179686420e3222" title="Veenhoven, R. &amp; Kalmijn, W. (2005). Inequality-adjusted happiness in nations. Egalitarianism and utilitarianism married together in a new index of societal performance [Special issue on ‘Inequality of happiness in nations’]. Journal of Happiness Studies, 6, 421–455."><span data-dcnode-id="1982" instrument_node="">2005</span></a><span data-dcnode-id="1980" instrument_node="">, p. 436). What do these data tell us about the possibilities to create greater happiness for a greater number?</span></p><p data-dcnode-id="1975"><i data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">Material wealth</span></i><span data-dcnode-id="1976" instrument_node=""> People live happier in rich countries than in poor countries, the correlation between average happiness and buying power per head is +.66! The relationship is not linear, but follows a pattern of diminishing returns. Growth in material wealth adds little to happiness once the buying power per head is more than $ 10.000 per year. So, economic development adds most to happiness in poor countries.</span></p><p data-dcnode-id="1965"><i data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">Political democracy</span></i><span data-dcnode-id="1972" instrument_node=""> People also live happier in democratic countries. The correlation is less strong in this case (</span><i data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">r</span></i><span data-dcnode-id="1969" instrument_node="">&nbsp;=&nbsp;+.43), but follows a linear pattern, suggesting that happiness can also be advanced by further democratization in already democratic countries. This deduction is supported by the fact that in democratic and happy Switzerland happiness appears to be highest in the cantons where the threshold for referenda is lowest (Frey &amp; Stutzer, </span><a aria-label="Reference 2000" data-dcnode-id="1967" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d179686420e3238" title="Frey, B. S., &amp; Stutzer, A. (2000). Happiness prospers in democracy. Journal of Happiness Studies, 1, 79–102."><span data-dcnode-id="1968" instrument_node="">2000</span></a><span data-dcnode-id="1966" instrument_node="">).</span></p><p data-dcnode-id="1958"><i data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">Freedom</span></i><span data-dcnode-id="1962" instrument_node=""> Likewise, people live happier in free countries. This holds for three kinds of freedom: economic freedom, political freedom and freedom in the private sphere of life. Economic freedom appears to be most important for happiness in poor nations and private freedom in rich nations (Veenhoven, </span><a aria-label="Reference 2000" data-dcnode-id="1960" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d179686420e3246" title="Veenhoven, R. (2000b). Freedom and happiness: A comparative study in 44 nations in the early 1990s. In E. Diener &amp; E. M. Suh (Eds.), Culture and subjective well-being (pp. 257–288). Cambridge, USA: MIT Press."><span data-dcnode-id="1961" instrument_node="">2000</span></a><span data-dcnode-id="1959" instrument_node="">b). The relationship is again linear, suggesting that the saturation point has not yet been reached in the present day world.</span></p><p data-dcnode-id="1945"><i data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">Governance</span></i><span data-dcnode-id="1955" instrument_node=""> Comparative research has also revealed that happiness prospers in well-governed countries. There are strong correlations with rule of law (</span><i data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">r</span></i><span data-dcnode-id="1952" instrument_node="">&nbsp;=&nbsp;+.53) and government effectiveness (</span><i data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">r</span></i><span data-dcnode-id="1949" instrument_node="">&nbsp;=&nbsp;+.60). These relationships are largely independent of economic development and appear in all regions of the world (Ott, </span><a aria-label="Reference 2006" data-dcnode-id="1947" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d179686420e3261" title="Ott, J. (2006). Good governance and happiness in nations. Paper presented at the conference of the International Society for Quality of Life Studies, July 2006, Grahamstown, South Africa."><span data-dcnode-id="1948" instrument_node="">2006</span></a><span data-dcnode-id="1946" instrument_node="">).</span></p><p data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">This all suggests that greater happiness for a greater number can be achieved by policies that aim at a decent material standard of living, the fostering of freedom and democracy and good governance.</span></p></div></div></section><section data-dcnode-id="1929" data-title="Conclusions"><div class="c-article-section" data-dcnode-id="1930" id="Sec37-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1938" id="Sec37"><span data-dcnode-id="1939" instrument_node="">Conclusions</span></h2><div class="c-article-section__content" data-dcnode-id="1931" id="Sec37-content"><p data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Happy people live longer, probably because happiness protects physical health. If so, public health can be furthered by policies that aim at greater happiness of a great number. Current public health policies seem only to affect happiness marginally.</span></p><p data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">Happiness can be advanced in several ways: At the individual level happiness can be furthered by means of (1) providing information about consequences of life-choices on happiness, (2) training in art-of-living skills, and (3) professional life-counseling. At the level of society greater happiness for a greater number can be achieved by policies that aim at a decent material standard of living, the fostering of freedom and democracy and good governance.</span></p><p data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node=""> Evidence based happiness engineering requires more research.</span></p></div></div></section><span data-dcnode-id="1928" instrument_node="">
</span><section data-dcnode-id="1914" data-title="Notes"><div class="c-article-section" data-dcnode-id="1915" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1926" id="notes"><span data-dcnode-id="1927" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="1916" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="1917"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="1922" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="1923"><p data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">No measure of health is perfect. Longevity does not capture the good health of people who dye prematurely as a result of an accident.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="1918" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="1919"><p data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">The effect of life-satisfaction becomes insignificant when baseline heath-satisfaction is also controlled. The investigators used health-satisfaction as an indicator of physical health. Yet satisfaction with health is not the same as perceived state of health, one can acknowledges that one’s health is not too good, but still be satisfied with one’s health and this commonly observed among elderly people. Satisfaction with health is partly determined by general life-satisfaction (top down), hence control of health-satisfaction wipes out variance in life-satisfaction.</span></p></div></li></ol></div></div></section><div data-dcnode-id="1209" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="1210" data-title="References"><div class="c-article-section" data-dcnode-id="1211" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1912" id="Bib1"><span data-dcnode-id="1913" instrument_node="">References</span></h2><div class="c-article-section__content" data-dcnode-id="1212" id="Bib1-content"><div data-container-section="references" data-dcnode-id="1213"><ul class="c-article-references" data-dcnode-id="1223"><li class="c-article-references__item js-c-reading-companion-references-item" data-dcnode-id="1906"><p class="c-article-references__text" data-dcnode-id="1907" id="ref-CR1"><span data-dcnode-id="1911" instrument_node="">Aakster, C. W. (1972). </span><i data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">Socio-cultural variables in the etiology of health disturbances: A sociological approach.</span></i><span data-dcnode-id="1908" instrument_node=""> PhD dissertation, University of Groningen, The Netherlands.</span></p></li><li class="c-article-references__item js-c-reading-companion-references-item" data-dcnode-id="1893"><p class="c-article-references__text" data-dcnode-id="1901" id="ref-CR2"><span data-dcnode-id="1905" instrument_node="">Aspinwall, L. G., &amp; Brunhart, S. M. (1996). Distinguishing optimism from denial: Optimistic beliefs predict attention to health threads. </span><i data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Personality and Social Psychology Bulletin, 22</span></i><span data-dcnode-id="1902" instrument_node="">, 993–1003.</span></p><p class="c-article-references__links u-hide-print" data-dcnode-id="1894"><a aria-label="Article reference 2" data-dcnode-id="1899" data-track="click" data-track-action="outbound reference" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/01461672962210002"><span data-dcnode-id="1900" instrument_node="">Article</span></a><span data-dcnode-id="1898" instrument_node="">&nbsp;
