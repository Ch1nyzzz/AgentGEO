</span><meta content="On the basis of the theoretical distinction between self-centeredness and selflessness (Dambrun and Ricard, 2011), the main goal of this research was to develop two new scales assessing distinct dimensions of happiness. By trying to maximize pleasures and to avoid displeasures, we propose that a self-centered functioning induces a fluctuating happiness in which phases of pleasure and displeasure alternate repeatedly (i.e., Fluctuating Happiness). In contrast, a selfless psychological functioning postulates the existence of a state of durable plenitude that is less dependent upon circumstances but rather is related to a person’s inner resources and abilities to deal with whatever comes his way in life (i.e., Authentic–Durable Happiness). Using various samples (n = 735), we developed a 10-item Scale measuring Subjective Fluctuating Happiness (SFHS) and a 13-item scale assessing Subjective Authentic–Durable Happiness (SA–DHS). Results indicated high internal consistencies, satisfactory test–retest validities, and adequate convergent and discriminant validities with various constructs including a biological marker of stress (salivary cortisol). Consistent with our theoretical framework, while self-enhancement values were related only to fluctuating happiness, self-transcendence values were related only to authentic–durable happiness. Support for the distinction between contentment and inner-peace, two related markers of authentic happiness, also was found." data-dcnode-id="2931" name="Description" property="og:description"><span data-dcnode-id="2930" instrument_node="">

</span><p data-dcnode-id="2021"><span data-dcnode-id="2028" instrument_node="">On the basis of the theoretical distinction between self-centeredness and selflessness (</span><a data-dcnode-id="2026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="2027" instrument_node="">Dambrun and Ricard, 2011</span></a><span data-dcnode-id="2025" instrument_node="">), the main goal of this research was to develop two new scales assessing distinct dimensions of happiness. By trying to maximize pleasures and to avoid displeasures, we propose that a self-centered functioning induces a fluctuating happiness in which phases of pleasure and displeasure alternate repeatedly (i.e., Fluctuating Happiness). In contrast, a selfless psychological functioning postulates the existence of a state of durable plenitude that is less dependent upon circumstances but rather is related to a person’s inner resources and abilities to deal with whatever comes his way in life (i.e., Authentic–Durable Happiness). Using various samples (</span><i data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">n</span></i><span data-dcnode-id="2022" instrument_node=""> = 735), we developed a 10-item Scale measuring Subjective Fluctuating Happiness (SFHS) and a 13-item scale assessing Subjective Authentic–Durable Happiness (SA–DHS). Results indicated high internal consistencies, satisfactory test–retest validities, and adequate convergent and discriminant validities with various constructs including a biological marker of stress (salivary cortisol). Consistent with our theoretical framework, while self-enhancement values were related only to fluctuating happiness, self-transcendence values were related only to authentic–durable happiness. Support for the distinction between contentment and inner-peace, two related markers of authentic happiness, also was found.</span></p><span data-dcnode-id="2020" instrument_node="">

</span><a class="reset-hash-position" data-dcnode-id="2014" id="h2" name="h2"></a><h2 data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Introduction</span></h2><span data-dcnode-id="2011" instrument_node="">
</span><p class="mb15" data-dcnode-id="1988"><span data-dcnode-id="2010" instrument_node="">Since the early 1990s, researchers in the movement of positive psychology have encouraged the study of the conditions and processes which contribute to the optimal functioning of individuals, groups, and institutions (</span><a data-dcnode-id="2008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="2009" instrument_node="">Seligman and Csikszentmihalyi, 2000</span></a><span data-dcnode-id="2007" instrument_node="">; </span><a data-dcnode-id="2005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B18"><span data-dcnode-id="2006" instrument_node="">Gable and Haidt, 2005</span></a><span data-dcnode-id="2004" instrument_node="">). In recent years, the study of well-being and happiness has gradually become a field of primary importance (e.g., </span><a data-dcnode-id="2002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B15"><span data-dcnode-id="2003" instrument_node="">Diener, 2000</span></a><span data-dcnode-id="2001" instrument_node="">; </span><a data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="2000" instrument_node="">Csikszentmihalyi and Hunter, 2003</span></a><span data-dcnode-id="1998" instrument_node="">; </span><a data-dcnode-id="1996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B30"><span data-dcnode-id="1997" instrument_node="">Lyubomirsky et al., 2005</span></a><span data-dcnode-id="1995" instrument_node="">). In order to study happiness a valid measuring instrument is needed (</span><a data-dcnode-id="1993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B27"><span data-dcnode-id="1994" instrument_node="">Layard, 2010</span></a><span data-dcnode-id="1992" instrument_node="">). The first aim of the studies presented in this paper is the development of two such scales: the Subjective Fluctuating Happiness Scale (SFHS) and the Subjective Authentic–Durable Happiness Scale (SA–DHS). The development of these two scales is intimately linked to a recent theoretical model: the Self-centeredness/Selflessness Happiness Model (SSHM; </span><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="1991" instrument_node="">Dambrun and Ricard, 2011</span></a><span data-dcnode-id="1989" instrument_node="">). Under this perspective, our second objective is to empirically test the validity of some hypotheses derived from this model.</span></p><span data-dcnode-id="1987" instrument_node="">
</span><p class="mb15" data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">According to this recent theoretical model, the attainment of happiness is linked to the self, and more particularly to the structure of the self. This model proposes that the perception of a self as a permanent, independent, and solid entity leads to a self-centered psychological functioning that favors a fluctuating happiness. A selfless psychological functioning emerges when the perception of the self is flexible, strongly connected with the environment including others, favoring an authentic and durable happiness.</span></p><span data-dcnode-id="1984" instrument_node="">
</span><p class="mb15" data-dcnode-id="1952"><span data-dcnode-id="1983" instrument_node="">According to the SSHM (</span><a data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="1982" instrument_node="">Dambrun and Ricard, 2011</span></a><span data-dcnode-id="1980" instrument_node="">), the perception of the self as a real entity with sharp boundaries underlies a self-centered functioning. </span><a data-dcnode-id="1978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B25"><span data-dcnode-id="1979" instrument_node="">Laborit (1979)</span></a><span data-dcnode-id="1977" instrument_node=""> proposes that each entity (or organized structure in the form of an entity), which aims at its preservation, is led to favor gratifications that positively reinforce it, and to avoid disagreeable things that threaten its homeostasis. A self-centered functioning and the exaggerated importance given to the self which comes out of it, leads to a “hedonic principle” (e.g., </span><a data-dcnode-id="1975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B20"><span data-dcnode-id="1976" instrument_node="">Higgins, 1997</span></a><span data-dcnode-id="1974" instrument_node="">). In this principle, individuals are motivated to obtain pleasure (i.e., approach) and to avoid displeasure (i.e., avoidance). Attaining these objectives (i.e., obtaining gratification and avoiding disagreeable stimuli) creates a feeling of pleasure, joy, and transitory satisfaction. However, these stimulus-driven pleasures are contingent upon the appearance or disappearance of certain stimuli (</span><a data-dcnode-id="1972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1973" instrument_node="">Wallace and Shapiro, 2006</span></a><span data-dcnode-id="1971" instrument_node="">). The experience of pleasure is by nature fleeting and dependent upon circumstances. It is unstable and the sensations it evokes soon becomes neutral (i.e., hedonic adaptation; e.g., </span><a data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B6"><span data-dcnode-id="1970" instrument_node="">Brickman et al., 1978</span></a><span data-dcnode-id="1968" instrument_node="">). In addition, the impossibility to attaining valued objectives gives rise to afflictive affects such as frustration, anger, hostility, or jealousy that damage well-being (e.g., </span><a data-dcnode-id="1966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B31"><span data-dcnode-id="1967" instrument_node="">Miller et al., 1996</span></a><span data-dcnode-id="1965" instrument_node="">). Thus, by trying to maximize pleasures and avoiding displeasures, self-centeredness induces a fluctuating happiness in which phases of pleasure and displeasure alternate repeatedly. Happiness can thus be, at least partly, characterized by the alternation of positive and negative phases that provoke fluctuating happiness. Using the experience sampling method, the work done by </span><a data-dcnode-id="1963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="1964" instrument_node="">Csikszentmihalyi and Hunter (2003)</span></a><span data-dcnode-id="1962" instrument_node=""> provides a support for the existence of fluctuating happiness. For example, momentary-level scores show that reported happiness varies significantly both with the time of day and day of week. While particular activities significantly increase happiness (e.g., talking with friends), others are associated with a decrease in happiness (e.g., homework and professional work), with the result being that there are important fluctuations in happiness over the course of a day or week. Because the experience sampling method is very demanding, a scale that assesses perceived fluctuating degrees of happiness would be useful. Second, while the experience sampling method assesses “experienced well-being,” traditional scales measure “evaluated well-being.” Each of these two interdependent components has potentials meaningful antecedents and consequences (see </span><a data-dcnode-id="1960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B24"><span data-dcnode-id="1961" instrument_node="">Kahneman and Riis, 2005</span></a><span data-dcnode-id="1959" instrument_node="">). Thus, a scale measuring evaluated fluctuating happiness would be both valuable and useful. To our knowledge, such a scale does not exist. Thus the first objective of our research was to develop a valid instrument which would reflect perceived degrees of variation in happiness (i.e., the SFHS). Such a measure would contribute to our understanding of happiness and, more particularly, would permit to examine the validity of the SSHM using a questionnaire based correlational study. On the basis of the SSHM, we predict that subjective fluctuating happiness would be robustly and positively related to self-centered values such as Schwartz’ self-enhancement values (i.e., achievement and success; e.g., </span><a data-dcnode-id="1957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="1958" instrument_node="">Schwartz, 1992</span></a><span data-dcnode-id="1956" instrument_node="">, </span><a data-dcnode-id="1954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="1955" instrument_node="">2003</span></a><span data-dcnode-id="1953" instrument_node="">).</span></p><span data-dcnode-id="1951" instrument_node="">
</span><p class="mb15" data-dcnode-id="1877"><span data-dcnode-id="1950" instrument_node="">Some theorists propose the existence of a more durable and authentic happiness characterized by meaning and engagement (e.g., </span><a data-dcnode-id="1948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B43"><span data-dcnode-id="1949" instrument_node="">Seligman et al., 2005</span></a><span data-dcnode-id="1947" instrument_node="">), both intrinsic and pro-social values (e.g., </span><a data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B34"><span data-dcnode-id="1946" instrument_node="">Ryan and Deci, 2001</span></a><span data-dcnode-id="1944" instrument_node="">; </span><a data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B30"><span data-dcnode-id="1943" instrument_node="">Lyubomirsky et al., 2005</span></a><span data-dcnode-id="1941" instrument_node="">), the development of character strengths such as gratitude (e.g., </span><a data-dcnode-id="1939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B32"><span data-dcnode-id="1940" instrument_node="">Peterson and Seligman, 2004</span></a><span data-dcnode-id="1938" instrument_node="">), wisdom (e.g., </span><a data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B28"><span data-dcnode-id="1937" instrument_node="">Le, 2011</span></a><span data-dcnode-id="1935" instrument_node="">), or selflessness (</span><a data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="1934" instrument_node="">Dambrun and Ricard, 2011</span></a><span data-dcnode-id="1932" instrument_node="">). However, all these characteristics are both antecedents and consequences of authentic–durable happiness rather than markers of it. Authentic happiness is understood here as an optimal way of being, a state of durable contentment and plenitude or inner-peace (based on a quality of consciousness which underlies and imbues each experience, emotion, and behavior, and allows us to embrace all the joys and the pain with which we are confronted). The SSHM (</span><a data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="1931" instrument_node="">Dambrun and Ricard, 2011</span></a><span data-dcnode-id="1929" instrument_node="">) proposes that authentic–durable happiness is intimately linked to selflessness, a psychological functioning characterized by benevolent affects (e.g., compassion, empathy). These affects enhance emotional stability and generate a feeling of being in harmony that favors for example the experience of durable inner-peace and serenity, some markers of authentic–durable happiness. First, while contentment has been the focus of much research (e.g., </span><a data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B16"><span data-dcnode-id="1928" instrument_node="">Diener et al., 1985</span></a><span data-dcnode-id="1926" instrument_node="">; </span><a data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="1925" instrument_node="">Lyubomirsky and Lepper, 1999</span></a><span data-dcnode-id="1923" instrument_node="">), plenitude or inner-peace has rarely been taken into account. Thus, in order to assess authentic happiness, it seems relevant and important to take into account these two complementary dimensions. Second, authentic happiness would be a </span><i data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">lasting state</span></i><span data-dcnode-id="1920" instrument_node=""> that could be maintained through the various upheavals of life. Some recent researches support the sustainable happiness model of </span><a data-dcnode-id="1918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B30"><span data-dcnode-id="1919" instrument_node="">Lyubomirsky et al. (2005)</span></a><span data-dcnode-id="1917" instrument_node="">. This model proposes that lasting gains in happiness can occur under specific optimal circumstances. For example, using a longitudinal design, </span><a data-dcnode-id="1915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="1916" instrument_node="">Sheldon et al. (2010)</span></a><span data-dcnode-id="1914" instrument_node=""> reveal that sustained gains in happiness were observed in three treatment conditions (autonomy vs. competence vs. relatedness), only when there was continuing goal engagement. Thus, the “durable” dimension would also be an important marker of authentic happiness. In other words, a measure of authentic–durable happiness would consist of two related constructs, namely durable contentment and durable inner-peace or plenitude. To our knowledge, existing scales of happiness do not directly assess these dimensions. Many scales assessing happiness and well-being have been developed (e.g., </span><a data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B19"><span data-dcnode-id="1913" instrument_node="">Gurin et al., 1960</span></a><span data-dcnode-id="1911" instrument_node="">; </span><a data-dcnode-id="1909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="1910" instrument_node="">Cantril, 1965</span></a><span data-dcnode-id="1908" instrument_node="">; </span><a data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="1907" instrument_node="">Bradburn, 1969</span></a><span data-dcnode-id="1905" instrument_node="">; </span><a data-dcnode-id="1903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B49"><span data-dcnode-id="1904" instrument_node="">Tellegen, 1982</span></a><span data-dcnode-id="1902" instrument_node="">; </span><a data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B17"><span data-dcnode-id="1901" instrument_node="">Dupuy, 1984</span></a><span data-dcnode-id="1899" instrument_node="">; </span><a data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B16"><span data-dcnode-id="1898" instrument_node="">Diener et al., 1985</span></a><span data-dcnode-id="1896" instrument_node="">; </span><a data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1895" instrument_node="">Watson et al., 1988</span></a><span data-dcnode-id="1893" instrument_node="">; </span><a data-dcnode-id="1891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B2"><span data-dcnode-id="1892" instrument_node="">Argyle et al., 1989</span></a><span data-dcnode-id="1890" instrument_node="">; </span><a data-dcnode-id="1888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="1889" instrument_node="">Lyubomirsky and Lepper, 1999</span></a><span data-dcnode-id="1887" instrument_node="">; </span><a data-dcnode-id="1885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B21"><span data-dcnode-id="1886" instrument_node="">Hills and Argyle, 2002</span></a><span data-dcnode-id="1884" instrument_node="">), but none of them seem to focus on the authentic–durable happiness that is characterized by both durable contentment and durable inner-peace. Thus, one of the objectives of the present study was to develop a valid instrument which would assess subjective authentic–durable happiness (i.e., SA–DHS). Such a measure would permit to test one of the hypotheses derived from the SSHM. Specifically, on the basis of this model, we predict that subjective authentic–durable happiness would be robustly and positively related to selfless values such as Schwartz’ self-transcendence values (i.e., benevolence and universalism; e.g., </span><a data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="1883" instrument_node="">Schwartz, 1992</span></a><span data-dcnode-id="1881" instrument_node="">, </span><a data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="1880" instrument_node="">2003</span></a><span data-dcnode-id="1878" instrument_node="">).</span></p><span data-dcnode-id="1876" instrument_node="">
</span><p class="mb0" data-dcnode-id="1868"><span data-dcnode-id="1875" instrument_node="">In sum, this paper describes two new instruments assessing distinct components of happiness (i.e., the SFHS and the SA–DHS), and presents studies examining their reliability and validity using various psychological and biological constructs. Data are presented on factorial structure, internal consistency, test–retest reliability, convergent and discriminant validity. Moreover, on the basis of the SSHM (</span><a data-dcnode-id="1873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="1874" instrument_node="">Dambrun and Ricard, 2011</span></a><span data-dcnode-id="1872" instrument_node="">) and using the Portrait Values Questionnaire (PVQ; </span><a data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="1871" instrument_node="">Schwartz, 2003</span></a><span data-dcnode-id="1869" instrument_node="">), we predict that while subjective fluctuating happiness would be robustly and positively related to self-enhancement values (i.e., self-centeredness), subjective authentic–durable happiness would be robustly and positively related to self-transcendence values (i.e., selflessness).</span></p><span data-dcnode-id="1867" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="1866" id="h3" name="h3"></a><h2 data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Materials and Methods</span></h2><span data-dcnode-id="1863" instrument_node="">
</span><h3 class="pt0" data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Scale Development</span></h3><span data-dcnode-id="1860" instrument_node="">
</span><p class="mb0" data-dcnode-id="1852"><span data-dcnode-id="1859" instrument_node="">The 10-item SFHS was created in two steps. First, five items were administered to a university student sample (</span><i data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">n</span></i><span data-dcnode-id="1856" instrument_node=""> = 320) in a pilot study. Because reliability of this scale was only moderate (α = 0.70), we incorporated five additional items resulting in a 10-item scale. This last version provides adequate psychometric validity (i.e., high Cronbach alpha and a single factor solution, see below). A single composite score of subjective fluctuating happiness is computed by averaging responses to the 10 items. Thus the possible range of scores is from 1.0 to 7.0, with higher scores reflecting greater fluctuating happiness. Both French and English versions of this scale are presented in Table </span><a data-dcnode-id="1854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="1855" instrument_node="">1</span></a><span data-dcnode-id="1853" instrument_node="">. Items were introduced by the following: “Below is a collection of statements. Using the 1–7 scale below, please read each statement carefully and then indicate how much you agree or disagree by circling the number which best corresponds to what you think.” The accompanying seven-point scale was ranged from 1 (strongly disagree) to 7 (strongly agree).</span></p><span data-dcnode-id="1851" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="1850"></div><span data-dcnode-id="1849" instrument_node="">
</span><div class="Imageheaders" data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">TABLE 1</span></div><span data-dcnode-id="1846" instrument_node="">

</span><a data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/11619/fpsyg-03-00016-HTML/image_m/fpsyg-03-00016-t001.jpg" name="Table1" target="_blank"><span data-dcnode-id="1844" instrument_node="">

</span><p class="mb0 w100pc float_left mt15" data-dcnode-id="1812"><span data-dcnode-id="1826" instrument_node="">The 13-item SA–DHS was derived from an original pool of 17 self-report items. These items were incorporated in the pilot study. From these original items, five were dropped because they assessed various irrelevant dimensions (e.g., euphoria, frustration). Then, four new items were added to the previous scale. Specifically, in order to control for a compliance bias, two negatively valenced items were added (i.e., displeasure and unhappiness). Finally, two other items assessing inner-peace were added (i.e., inner-peace and plenitude). The final version comprised 16 items with 13 items assessing authentic–durable happiness and three assessing durable unhappiness. Because, we were only interested in assessing happiness (i.e., the positive dimension), the three negatively valenced items were only used to control for the compliance bias. Thus, they were not incorporated into the mean score of happiness. A single composite score for subjective authentic–durable happiness was computed by averaging responses to the 13 positively valenced items. Thus the possible range of scores was from 1.0 to 7.0, with higher scores reflecting greater authentic–durable happiness. Two sub-scores were calculated by averaging items assessing the contentment component (i.e., overall well-being, happiness, pleasure, bliss, satisfaction, beatitude, fulfillment, and joy) and the inner-peace dimension (i.e., peace of mind, serenity, inner-peace, inner-calm/tranquility, and plenitude). This scale is presented in Table </span><a data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="1825" instrument_node="">1</span></a><span data-dcnode-id="1823" instrument_node="">. Items were introduced by the following: “Using the 1–7 scale below, please indicate what is your regular</span><sup data-dcnode-id="1819" id="footnotesuper1"><a data-dcnode-id="1822" id="note1a"></a><a class="footnoteanchor" data-dcnode-id="1820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note1"><span data-dcnode-id="1821" instrument_node="">1</span></a></sup><span data-dcnode-id="1818" instrument_node=""> level of happiness in your life</span><sup data-dcnode-id="1814" id="footnotesuper2"><a data-dcnode-id="1817" id="note2a"></a><a class="footnoteanchor" data-dcnode-id="1815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note2"><span data-dcnode-id="1816" instrument_node="">2</span></a></sup><span data-dcnode-id="1813" instrument_node="">.” The accompanying seven-point scale was ranged from 1 (very low) to 7 (very high).</span></p><span data-dcnode-id="1811" instrument_node="">
</span><h3 data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">Samples</span></h3><span data-dcnode-id="1808" instrument_node="">
</span><p class="mb0" data-dcnode-id="1797"><span data-dcnode-id="1807" instrument_node="">The assessment of reliability and validity of the two scales of happiness were obtained through six samples, collected at different times and locations (see Table </span><a data-dcnode-id="1805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T2"><span data-dcnode-id="1806" instrument_node="">2</span></a><span data-dcnode-id="1804" instrument_node="">). The temporal stability of the scales was examined using sample A over a 3-month period. The first sample (i.e., sample A) was realized in 2004. The last sample was realized in 2010 (i.e., sample F). The total number of participants was 735. Unlike many studies in personality and social psychology, we did not rely exclusively on university students for our samples (see </span><a data-dcnode-id="1802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="1803" instrument_node="">Sears, 1986</span></a><span data-dcnode-id="1801" instrument_node="">). In fact, four of our six samples were composed exclusively of adults from the regional community (one sample was mixed). They were adequately heterogeneous in age, gender, education, religiosity, and SES. All the samples were from France. Table </span><a data-dcnode-id="1799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T2"><span data-dcnode-id="1800" instrument_node="">2</span></a><span data-dcnode-id="1798" instrument_node=""> describes each of the samples, and the means, SDs, and alpha reliabilities of the two scales. A formal ethical review of this study was not sought as this study was non-experimental in nature and was a voluntary, confidential (sample A), or anonymous (samples B–F) survey of consenting adults. Verbal informed consent was obtained from all respondents. Thus data were collected and analyzed anonymously or confidentially. All ethical concerns of the Helsinki declaration were followed.</span></p><span data-dcnode-id="1796" instrument_node="">

</span><h3 data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Materials</span></h3><span data-dcnode-id="1769" instrument_node="">
</span><p class="mb0" data-dcnode-id="1709"><span data-dcnode-id="1768" instrument_node="">First, three measures of happiness and well-being were used to validate the two scales of happiness. The Satisfaction with Life Scale (SLF; </span><a data-dcnode-id="1766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B16"><span data-dcnode-id="1767" instrument_node="">Diener et al., 1985</span></a><span data-dcnode-id="1765" instrument_node="">), the Positive Affectivity and Negative Affectivity Scale (PANAS; </span><a data-dcnode-id="1763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1764" instrument_node="">Watson et al., 1988</span></a><span data-dcnode-id="1762" instrument_node="">), and a selection of eight items from the Oxford Happiness Questionnaire (OHQ) closely related to happiness and life satisfaction (</span><a data-dcnode-id="1760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B21"><span data-dcnode-id="1761" instrument_node="">Hills and Argyle, 2002</span></a><span data-dcnode-id="1759" instrument_node="">; e.g., “I do not have particularly happy memories of the past,” “I am well satisfied about everything in my life”). Second, two measures of mental health were used: the Beck Depression Inventory (BDI; </span><a data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B4"><span data-dcnode-id="1758" instrument_node="">Beck et al., 1988</span></a><span data-dcnode-id="1756" instrument_node="">) and the scale of psychological distress (</span><a data-dcnode-id="1754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B10"><span data-dcnode-id="1755" instrument_node="">Dambrun, 2007</span></a><span data-dcnode-id="1753" instrument_node="">). In order to examine convergent validity, several constructs were measured: (1) dispositional optimism (LOT-R; </span><a data-dcnode-id="1751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="1752" instrument_node="">Scheier et al., 1994</span></a><span data-dcnode-id="1750" instrument_node="">); (2) self-efficacy (</span><a data-dcnode-id="1748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B22"><span data-dcnode-id="1749" instrument_node="">Jerusalem and Schwarzer, 1992</span></a><span data-dcnode-id="1747" instrument_node="">); (3) the sense of coherence with the Sense of Coherence Questionnaire (SCQ; </span><a data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B1"><span data-dcnode-id="1746" instrument_node="">Antonovsky, 1987</span></a><span data-dcnode-id="1744" instrument_node="">); (4) perceived resiliency (</span><a data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="1743" instrument_node="">Dambrun, 2009</span></a><span data-dcnode-id="1741" instrument_node="">)</span><sup data-dcnode-id="1737" id="footnotesuper3"><a data-dcnode-id="1740" id="note3a"></a><a class="footnoteanchor" data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note3"><span data-dcnode-id="1739" instrument_node="">3</span></a></sup><span data-dcnode-id="1736" instrument_node="">; (5) mindfulness with the Mindful Attention Awareness Scale (MAAS; </span><a data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="1735" instrument_node="">Brown and Ryan, 2003</span></a><span data-dcnode-id="1733" instrument_node="">); (6) mental rumination (</span><a data-dcnode-id="1731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B50"><span data-dcnode-id="1732" instrument_node="">Trapnell and Campbell, 1999</span></a><span data-dcnode-id="1730" instrument_node="">); (7) presence of and search for meaning in life with the Meaning in Life Questionnaire (MLQ; </span><a data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B45"><span data-dcnode-id="1729" instrument_node="">Steger et al., 2006</span></a><span data-dcnode-id="1727" instrument_node="">); and (8) salivary cortisol</span><sup data-dcnode-id="1723" id="footnotesuper4"><a data-dcnode-id="1726" id="note4a"></a><a class="footnoteanchor" data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note4"><span data-dcnode-id="1725" instrument_node="">4</span></a></sup><span data-dcnode-id="1722" instrument_node=""> (a biological marker of stress; sample F). To the extent that several markers of happiness such as positive affects (</span><a data-dcnode-id="1720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="1721" instrument_node="">Steptoe and Wardle, 2005</span></a><span data-dcnode-id="1719" instrument_node="">; </span><a data-dcnode-id="1717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="1718" instrument_node="">Steptoe et al., 2005</span></a><span data-dcnode-id="1716" instrument_node="">) and some dimensions of psychological well-being (</span><a data-dcnode-id="1714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="1715" instrument_node="">Ryff et al., 2006</span></a><span data-dcnode-id="1713" instrument_node="">) were found to correlate negatively and significantly with salivary cortisol, we predict that our measure of authentic–durable happiness would be negatively and significantly related to the level of salivary cortisol. Finally, in order to examine the validity of some of the hypotheses derived from the Self-centered/Selflessness Happiness Model, self-enhancement (i.e., achievement, power), and self-transcendence (i.e., benevolence, universalism) values were measured (PVQ; </span><a data-dcnode-id="1711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="1712" instrument_node="">Schwartz, 2003</span></a><span data-dcnode-id="1710" instrument_node="">).</span></p><span data-dcnode-id="1708" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="1707" id="h4" name="h4"></a><h2 data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Results and Discussion</span></h2><span data-dcnode-id="1704" instrument_node="">
</span><h3 class="pt0" data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Exploratory Factor Analyses</span></h3><span data-dcnode-id="1701" instrument_node="">
</span><p class="mb0" data-dcnode-id="1696"><span data-dcnode-id="1700" instrument_node="">To explore the factor structure of the two scales, we used the first five samples, resulting in a pool of 657 Adults French Citizens (see Table </span><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T2"><span data-dcnode-id="1699" instrument_node="">2</span></a><span data-dcnode-id="1697" instrument_node="">). Because sample F was exclusively composed of psychology students, it was not included in the factor analyses.</span></p><span data-dcnode-id="1695" instrument_node="">
</span><h3 data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">The Subjective Fluctuating Happiness Scale</span></h3><span data-dcnode-id="1692" instrument_node="">
</span><p class="mb0" data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">The principal component factor analysis with varimax rotation of the 10 items revealed a single factor solution. The Kaiser measure of sampling adequacy was 0.91. The single factor accounted for 50.53% of the total variance (Eigenvalue = 5.05). All items loaded appropriately on a single factor (factor loadings ranged from 0.53 to 0.80).</span></p><span data-dcnode-id="1689" instrument_node="">
</span><h3 data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">The Subjective Authentic–Durable Happiness Scale</span></h3><span data-dcnode-id="1686" instrument_node="">
</span><p class="mb0" data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">The principal component factor analysis with varimax rotation of the 13 items disclosed two factors with Eigenvalues greater than 1. The Kaiser measure of sampling adequacy was 0.93. The first factor accounted for 56% of the explained variance and regrouped eight items assessing the contentment dimension of happiness (i.e., overall well-being, happiness, pleasure, bliss, satisfaction, beatitude, fulfillment, and joy; Eigenvalue = 7.25; factor loadings ranged from 0.58 to 0.85). The second factor accounted for 8.57% of the explained variance and regrouped five items assessing the inner-peace component of happiness (i.e., peace of mind, serenity, inner-peace, inner-calm, plenitude; Eigenvalue = 1.11; factor loadings ranged from 0.52 to 0.80).</span></p><span data-dcnode-id="1683" instrument_node="">
</span><h3 data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Are Subjective Fluctuating Happiness and Authentic–Durable Happiness Distinct Constructs?</span></h3><span data-dcnode-id="1680" instrument_node="">
</span><p class="mb0" data-dcnode-id="1673"><span data-dcnode-id="1679" instrument_node="">To answer this question, we performed a new Factor Analysis with all items from the two scales. The Kaiser measure of sampling adequacy was 0.94. This analysis disclosed three factors with Eigenvalues greater than 1. The first factor accounted for 40.8% of the explained variance and regrouped all items assessing subjective fluctuating happiness. The second factor accounted for 13.05% of the explained variance and regrouped items assessing durable contentment. Finally, the third factor accounted for 5.22% of the explained variance and regrouped items assessing durable inner-peace. Thus, fluctuating happiness and authentic–durable happiness are two distinct constructs. The inter-correlation between these two scales is −0.48. In other words, these scales share 23% of the variance. Finally, the inter-correlation between the two factors of authentic–durable happiness (i.e., contentment and inner-peace) is 74, thus they share 55% of the variance. A confirmatory factor analysis (CFA) revealed the same basic findings</span><sup data-dcnode-id="1675" id="footnotesuper5"><a data-dcnode-id="1678" id="note5a"></a><a class="footnoteanchor" data-dcnode-id="1676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note5"><span data-dcnode-id="1677" instrument_node="">5</span></a></sup><span data-dcnode-id="1674" instrument_node="">.</span></p><span data-dcnode-id="1672" instrument_node="">
</span><h3 data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Internal Consistency of the Scales</span></h3><span data-dcnode-id="1669" instrument_node="">
</span><p class="mb0" data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">The internal consistency of the two scales was examined using all samples. For the SFHS, Cronbach alpha was equal to 0.89. Concerning the SA–DHS, the Cronbach alpha was 0.93. We also examined the internal consistency of the sub-dimensions of this scale. Both the contentment sub-scale (α = 0.90) and the inner-peace sub-scale (α = 0.87) had satisfactory internal consistencies.</span></p><span data-dcnode-id="1666" instrument_node="">
</span><h3 data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Test–Retest Reliability and Agreement</span></h3><span data-dcnode-id="1663" instrument_node="">
</span><p class="mb0" data-dcnode-id="1620"><span data-dcnode-id="1662" instrument_node="">The temporal stability of the scales was examined using sample A over a 3-month period. Both subjective authentic–durable happiness scores (</span><i data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">r</span></i><span data-dcnode-id="1659" instrument_node=""> = 0.90, </span><i data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">p </span></i><span data-dcnode-id="1656" instrument_node="">&lt; 0.001) and subjective fluctuating happiness scores (</span><i data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">r</span></i><span data-dcnode-id="1653" instrument_node=""> = 0.85, </span><i data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">p </span></i><span data-dcnode-id="1650" instrument_node="">&lt; 0.001) were highly correlated between time 1 and time 2 (3 months later). Another index of stability is test–retest score agreement, that is, individuals generally receive the same scale scores over repeated assessment (</span><a data-dcnode-id="1648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B13"><span data-dcnode-id="1649" instrument_node="">Dawis, 2000</span></a><span data-dcnode-id="1647" instrument_node="">). Scores on the SA–DHS were not significantly different between time 1 (</span><i data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">M</span></i><sub data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">1</span></sub><span data-dcnode-id="1642" instrument_node=""> = 4.25, SD = 1.09) and time 2 [</span><i data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">M</span></i><sub data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">2</span></sub><span data-dcnode-id="1637" instrument_node=""> = 4.21, SD = 1.10; </span><i data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">t</span></i><span data-dcnode-id="1634" instrument_node="">(171) &lt; 1]. Similarly, scores on the SFHS were similar in time 1 (</span><i data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">M</span></i><sub data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">1</span></sub><span data-dcnode-id="1629" instrument_node=""> = 3.80, SD = 1.37) and time 2 [</span><i data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">M</span></i><sub data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">2</span></sub><span data-dcnode-id="1624" instrument_node=""> = 3.79, SD = 1.27; </span><i data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">t</span></i><span data-dcnode-id="1621" instrument_node="">(171) &lt; 1].</span></p><span data-dcnode-id="1619" instrument_node="">
</span><h3 data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Convergent Validity with Measures of Well-Being and Mental Health</span></h3><span data-dcnode-id="1616" instrument_node="">
</span><p class="mb0" data-dcnode-id="1599"><span data-dcnode-id="1615" instrument_node="">In order to assess convergent validity, we examined the correlations between our two scales and published measures of happiness, well-being, and mental health. This analysis was performed using samples A, B, C, and D. Table </span><a data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T3"><span data-dcnode-id="1614" instrument_node="">3</span></a><span data-dcnode-id="1612" instrument_node=""> presents the main findings, which show substantial correlations between the main measures (i.e., subjective well-being, OHQ, depression, and psychological distress) and the SA–DHS (</span><i data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">r</span></i><span data-dcnode-id="1609" instrument_node=""> ranged from 0.48 to 0.71; </span><i data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">M</span></i><span data-dcnode-id="1606" instrument_node=""> = 0.60) and moderate correlations in the case of the SFHS (</span><i data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">r</span></i><span data-dcnode-id="1603" instrument_node=""> ranged from 0.24 to 0.48; </span><i data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">M</span></i><span data-dcnode-id="1600" instrument_node=""> = 0.38).</span></p><span data-dcnode-id="1598" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="1597"></div><span data-dcnode-id="1596" instrument_node="">
</span><div class="Imageheaders" data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">TABLE 3</span></div><span data-dcnode-id="1593" instrument_node="">
</span><div class="FigureDesc" data-dcnode-id="1579"><span data-dcnode-id="1592" instrument_node="">
</span><a data-dcnode-id="1589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/11619/fpsyg-03-00016-HTML/image_m/fpsyg-03-00016-t003.jpg" name="Table3" target="_blank"><span data-dcnode-id="1591" instrument_node="">
</span><img alt="www.frontiersin.org" data-dcnode-id="1590" id="T3" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/11619/fpsyg-03-00016-HTML/image_t/fpsyg-03-00016-t003.gif&amp;raw"></a><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1581"><strong data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">Table 3</span></strong><span data-dcnode-id="1585" instrument_node="">. </span><strong data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Correlations of the Subjective Authentic–Durable Happiness Scale and the Subjective Fluctuating Happiness Scale with various measures of well-being, happiness, and mental health</span></strong><span data-dcnode-id="1582" instrument_node="">.</span></p><span data-dcnode-id="1580" instrument_node="">

</span><div class="DottedLine" data-dcnode-id="1575"></div><span data-dcnode-id="1574" instrument_node="">
</span><p class="mb0 w100pc float_left mt15" data-dcnode-id="1554"><span data-dcnode-id="1573" instrument_node="">We also performed partial correlations, in which, first, the relationships between SA–DHS and the various dependent variables was controlled for fluctuating happiness, and second, the relationships between, SFHS and the various dependent variables was controlled for authentic–durable happiness. While positive affectivity was robustly related to the SA–DHS (partial </span><i data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">r</span></i><span data-dcnode-id="1570" instrument_node=""> ranged from 0.32 to 0.38), negative affectivity was more robustly related to the SFHS (partial </span><i data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">r</span></i><span data-dcnode-id="1567" instrument_node=""> ranged from 0.51 to 0.55). As for positive affectivity, life satisfaction was more robustly related to the SA–DHS than to the SFHS. However, both scales correlated significantly with subjective well-being; negatively for the SFHS (partial </span><i data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">r</span></i><span data-dcnode-id="1564" instrument_node=""> ranged from −0.24 to −0.44), and positively for the SA–DHS (partial </span><i data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">r</span></i><span data-dcnode-id="1561" instrument_node=""> ranged from 0.56 to 0.66). Items selected from the OHQ correlated appropriately with the two scales. Finally, both measures of mental health (i.e., depression and psychological distress) correlated significantly and positively with the SFHS (partial </span><i data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">r</span></i><span data-dcnode-id="1558" instrument_node=""> ranged from 0.36 to 0.48) and negatively with the SA–DHS (partial </span><i data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">r</span></i><span data-dcnode-id="1555" instrument_node=""> ranged from −0.36 to −0.43).</span></p><span data-dcnode-id="1553" instrument_node="">
</span><h3 data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Convergent Validity with Relevant Psychological Constructs</span></h3><span data-dcnode-id="1550" instrument_node="">
</span><p class="mb0" data-dcnode-id="1512"><span data-dcnode-id="1549" instrument_node="">We also assessed convergent validity using a number of psychological constructs with which happiness has been theoretically and empirically associated in previous research, namely optimism (</span><a data-dcnode-id="1547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="1548" instrument_node="">Scheier and Carver, 1985</span></a><span data-dcnode-id="1546" instrument_node="">; </span><a data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="1545" instrument_node="">Seligman, 1991</span></a><span data-dcnode-id="1543" instrument_node="">), self-efficacy (</span><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B3"><span data-dcnode-id="1542" instrument_node="">Bandura, 1991</span></a><span data-dcnode-id="1540" instrument_node="">), a sense of coherence (</span><a data-dcnode-id="1538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B1"><span data-dcnode-id="1539" instrument_node="">Antonovsky, 1987</span></a><span data-dcnode-id="1537" instrument_node="">), resiliency (</span><a data-dcnode-id="1535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B33"><span data-dcnode-id="1536" instrument_node="">Rutter, 1985</span></a><span data-dcnode-id="1534" instrument_node="">; </span><a data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B54"><span data-dcnode-id="1533" instrument_node="">Werner, 1992</span></a><span data-dcnode-id="1531" instrument_node="">), mindfulness (</span><a data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="1530" instrument_node="">Brown and Ryan, 2003</span></a><span data-dcnode-id="1528" instrument_node="">), mental rumination (</span><a data-dcnode-id="1526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B50"><span data-dcnode-id="1527" instrument_node="">Trapnell and Campbell, 1999</span></a><span data-dcnode-id="1525" instrument_node="">), and presence of and search for meaning in life (</span><a data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B45"><span data-dcnode-id="1524" instrument_node="">Steger et al., 2006</span></a><span data-dcnode-id="1522" instrument_node="">). The main results are presented in Table </span><a data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T4"><span data-dcnode-id="1521" instrument_node="">4</span></a><span data-dcnode-id="1519" instrument_node="">. Correlations with relevant constructs were moderate, ranging from 0.22 to 0.53 for the SA–DHS (</span><i data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">M</span></i><span data-dcnode-id="1516" instrument_node=""> = 0.37) and from 0.25 to 0.53. (</span><i data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">M</span></i><span data-dcnode-id="1513" instrument_node=""> = 0.39) for the SFHS.</span></p><span data-dcnode-id="1511" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="1510"></div><span data-dcnode-id="1509" instrument_node="">
</span><div class="Imageheaders" data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">TABLE 4</span></div><span data-dcnode-id="1506" instrument_node="">
</span><div class="FigureDesc" data-dcnode-id="1492"><span data-dcnode-id="1505" instrument_node="">
</span><a data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/11619/fpsyg-03-00016-HTML/image_m/fpsyg-03-00016-t004.jpg" name="Table4" target="_blank"><span data-dcnode-id="1504" instrument_node="">
</span><img alt="www.frontiersin.org" data-dcnode-id="1503" id="T4" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/11619/fpsyg-03-00016-HTML/image_t/fpsyg-03-00016-t004.gif&amp;raw"></a><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1494"><strong data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Table 4</span></strong><span data-dcnode-id="1498" instrument_node="">. </span><strong data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Correlations of the Subjective Authentic–Durable Happiness Scale and the Subjective Fluctuating Happiness Scale with various convergent measures (samples D and E)</span></strong><span data-dcnode-id="1495" instrument_node="">.</span></p><span data-dcnode-id="1493" instrument_node="">
</span></div><span data-dcnode-id="1491" instrument_node="">
</span><div class="clear" data-dcnode-id="1490"></div><span data-dcnode-id="1489" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="1488"></div><span data-dcnode-id="1487" instrument_node="">
</span><p class="mb0 w100pc float_left mt15" data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Again, we calculated partial correlations. The results showed that SA–DHS is robustly and positively related to optimism, self-efficacy, a sense of coherence, perceived resiliency, and the presence of meaning in life. Thus, those who perceived themselves as experiencing authentic–durable happiness, were optimistic, perceived themselves as effective, resilient, having a sense of coherence, and indicated the presence of meaning in their life. Subjective fluctuating happiness was robustly and positively correlated to mental rumination and the search for meaning in life. Thus, those who experienced fluctuating happiness were those who ruminated and searched for meaning in their life. Similarly, those who perceived themselves as optimistic, coherent, resilient, mindful, and having a presence of meaning in their life reported significantly less fluctuating happiness. It is worth noting that while self-efficacy is robustly related only to authentic–durable happiness, both mental rumination and mindlessness are robustly correlated only with fluctuating happiness. Thus, both the absence of mental rumination and mindfulness are not robust predictors of authentic–durable happiness, they are only related to a decrease in terms of fluctuation in happiness.</span></p><span data-dcnode-id="1484" instrument_node="">
</span><h3 data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Self-Enhancement and Self-Transcendence Values and Happiness</span></h3><span data-dcnode-id="1481" instrument_node="">
</span><p class="mb0" data-dcnode-id="1476"><span data-dcnode-id="1480" instrument_node="">Correlations between values and happiness measures are presented in Table </span><a data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T4"><span data-dcnode-id="1479" instrument_node="">4</span></a><span data-dcnode-id="1477" instrument_node="">. As predicted on the basis of the SSHM, self-enhancement values (i.e., achievement and power) were positively and significantly related to subjective fluctuating happiness, but not to subjective authentic–durable happiness. The exact opposite was found for self-transcendence values (i.e., benevolence and universalism); they were positively and significantly related to authentic–durable happiness, but not to subjective fluctuating happiness.</span></p><span data-dcnode-id="1475" instrument_node="">
</span><h3 data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Convergent Validity with Salivary Cortisol</span></h3><span data-dcnode-id="1472" instrument_node="">
</span><p class="mb0" data-dcnode-id="1455"><span data-dcnode-id="1471" instrument_node="">We also assessed convergent validity using a biological marker with which well-being has been empirically associated in previous research, namely salivary cortisol (e.g., </span><a data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="1470" instrument_node="">Steptoe et al., 2005</span></a><span data-dcnode-id="1468" instrument_node="">; </span><a data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="1467" instrument_node="">Ryff et al., 2006</span></a><span data-dcnode-id="1465" instrument_node="">). The main results are presented in Table </span><a data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T5"><span data-dcnode-id="1464" instrument_node="">5</span></a><span data-dcnode-id="1462" instrument_node="">. Interestingly, the only scale that was significantly related to this hormone stress was the SA–DHS (</span><i data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">r</span></i><span data-dcnode-id="1459" instrument_node=""> = −0.22, </span><i data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">p </span></i><span data-dcnode-id="1456" instrument_node="">&lt; 0.05). The life satisfaction scale, the measure of subjective well-being, and the SFHS were not significantly related to this biological marker.</span></p><span data-dcnode-id="1454" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="1453"></div><span data-dcnode-id="1452" instrument_node="">
</span><div class="Imageheaders" data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">TABLE 5</span></div><span data-dcnode-id="1449" instrument_node="">

</span><a data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/11619/fpsyg-03-00016-HTML/image_m/fpsyg-03-00016-t005.jpg" name="Table5" target="_blank"><span data-dcnode-id="1447" instrument_node="">
</span><img alt="www.frontiersin.org" data-dcnode-id="1446" id="T5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/11619/fpsyg-03-00016-HTML/image_t/fpsyg-03-00016-t005.gif&amp;raw"></a><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1437"><strong data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Table 5</span></strong><span data-dcnode-id="1441" instrument_node="">. </span><strong data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Correlations between salivary cortisol and happiness and well-being measures (Sample F)</span></strong><span data-dcnode-id="1438" instrument_node="">.</span></p><span data-dcnode-id="1436" instrument_node="">

</span><h3 data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Discriminant Validity</span></h3><span data-dcnode-id="1427" instrument_node="">
</span><p class="mb0" data-dcnode-id="1383"><span data-dcnode-id="1426" instrument_node="">In order to provide an additional test for the robustness of our two new scales, we performed some discriminant analyses. According to </span><a data-dcnode-id="1424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B51"><span data-dcnode-id="1425" instrument_node="">Veenhoven (1997)</span></a><span data-dcnode-id="1423" instrument_node="">, in Western countries such as France, constructs that should not be related to happiness include age and education. Thus, we computed the correlations between these variables and our two measures of happiness across the samples. As expected, age was neither correlated with the SFHS (</span><i data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">r</span></i><span data-dcnode-id="1420" instrument_node=""> = −0.05, </span><i data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">p </span></i><span data-dcnode-id="1417" instrument_node="">&gt; 0.10), nor to the SA–DHS (</span><i data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">r</span></i><span data-dcnode-id="1414" instrument_node=""> = 0.04, </span><i data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">p </span></i><span data-dcnode-id="1411" instrument_node="">&gt; 0.10). Similarly, the SFHS (</span><i data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">r</span></i><span data-dcnode-id="1408" instrument_node=""> = 0.03, </span><i data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">p </span></i><span data-dcnode-id="1405" instrument_node="">&gt; 0.10) and the SA–DHS (</span><i data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">r</span></i><span data-dcnode-id="1402" instrument_node=""> = −0.07, </span><i data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">p </span></i><span data-dcnode-id="1399" instrument_node="">&gt; 0.10) were not significantly related to education. Furthermore, we did not find support for gender differences. Social status showed only a marginal effect which is consistent with previous studies (see </span><a data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B51"><span data-dcnode-id="1398" instrument_node="">Veenhoven, 1997</span></a><span data-dcnode-id="1396" instrument_node="">); people in advantaged social positions experienced marginally more authentic–durable happiness (</span><i data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">r</span></i><span data-dcnode-id="1393" instrument_node=""> = 0.07, </span><i data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">p </span></i><span data-dcnode-id="1390" instrument_node="">&lt; 0.09) and marginally less fluctuating happiness (</span><i data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">r</span></i><span data-dcnode-id="1387" instrument_node=""> = −0.07, </span><i data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">p </span></i><span data-dcnode-id="1384" instrument_node="">&lt; 0.08). Finally, there were no significant differences between atheists and religious believers.</span></p><span data-dcnode-id="1382" instrument_node="">
</span><h3 data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">The Two Components of Subjective Authentic–Durable Happiness: Distinguishing Contentment and Inner-Peace</span></h3><span data-dcnode-id="1379" instrument_node="">
</span><p class="mb15" data-dcnode-id="1365"><span data-dcnode-id="1378" instrument_node="">After finding support for a two factors solution of the SA–DHS scale, we examined how each component was related to other constructs. First, we studied how the contentment sub-scale and the inner-peace sub-scale correlated with other measures of happiness, well-being and mental health. Second, we examined the relationships between these two dimensions and the relevant psychological and biological constructs. Using samples A to E, it is interesting to note that participants reported a greater level of durable contentment (</span><i data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">M</span></i><span data-dcnode-id="1375" instrument_node=""> = 4.46; SD = 1.00) than of durable inner-peace [</span><i data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">M</span></i><span data-dcnode-id="1372" instrument_node=""> = 4.07; SD = 1.18; </span><i data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">t</span></i><span data-dcnode-id="1369" instrument_node="">(650) = 12.38, </span><i data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">p </span></i><span data-dcnode-id="1366" instrument_node="">&lt; 0.001].</span></p><span data-dcnode-id="1364" instrument_node="">
</span><p class="mb0" data-dcnode-id="1359"><span data-dcnode-id="1363" instrument_node="">Table </span><a data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T6"><span data-dcnode-id="1362" instrument_node="">6</span></a><span data-dcnode-id="1360" instrument_node=""> indicates the relationships between the two dimensions of the SA–DHS and the various measures of happiness, well-being, and mental health. The Pearson correlations indicate that the two sub-scales correlate appropriately with the various measures. In a second step, we also computed partial correlations. Interestingly, once durable inner-peace is statistically controlled for, the relationships between durable contentment, subjective well-being and the OHQ still remain highly significant. On the other hand, when durable contentment is statistically controlled for, the relationships between durable inner-peace and these two measures are strongly reduced. These results suggest that the contentment sub-scale is more closely related to the existing measures of happiness and well-being that the inner-peace sub-scale. We found the exact opposite when we looked at mental health measures. While the relationships between durable contentment, depression, and psychological distress vanish when inner-peace is statistically controlled for, the relationships between inner-peace and mental health measures still remain highly significant when durable contentment is statistically controlled. Thus, durable inner-peace is a more robust predictor of mental health than contentment.</span></p><span data-dcnode-id="1358" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="1357"></div><span data-dcnode-id="1356" instrument_node="">

</span><p class="mt15 w100pc float_left" data-dcnode-id="1323"><span data-dcnode-id="1333" instrument_node="">Finally, we explored the relationships between these two sub-scales and various convergent psychological (see Table </span><a data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T7"><span data-dcnode-id="1332" instrument_node="">7</span></a><span data-dcnode-id="1330" instrument_node="">) and biological (Table </span><a data-dcnode-id="1328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T5"><span data-dcnode-id="1329" instrument_node="">5</span></a><span data-dcnode-id="1327" instrument_node="">) constructs. While the Pearson correlations indicate adequate convergent validity, the partial correlations reveal some interesting findings. Concerning psychological constructs, when durable inner-peace is statistically controlled for, only the correlation between durable contentment and optimism (LOT-R) remains significant. All the other relationships become non-significant. On the other hand, when durable contentment is statistically controlled for, most of the relationships between durable inner-peace and the various convergent psychological constructs remain significant or marginally significant. For example, only durable inner-peace is robustly related to a sense of coherence, perceived resiliency, rumination, mindfulness, the search for meaning in life, and the presence of meaning in life. Finally, only durable inner-peace is significantly and negatively related to the salivary cortisol level (see Table </span><a data-dcnode-id="1325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T5"><span data-dcnode-id="1326" instrument_node="">5</span></a><span data-dcnode-id="1324" instrument_node="">). Thus, this relatively unexplored dimension appears to have highly relevant associations.</span></p><span data-dcnode-id="1322" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="1321"></div><span data-dcnode-id="1320" instrument_node="">
