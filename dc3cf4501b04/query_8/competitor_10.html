</span><a class="reset-hash-position" data-dcnode-id="1297" id="h5" name="h5"></a><h2 data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">General Discussion</span></h2><span data-dcnode-id="1294" instrument_node="">
</span><p class="mb15" data-dcnode-id="1289"><span data-dcnode-id="1293" instrument_node="">This study provides the first empirical support for the distinction between evaluated fluctuating happiness and evaluated authentic–durable happiness. Despite some limitations, the present study provides some significant advances. We proposed two new instruments – the SFHS and the SA–DHS – that are characterized by high internal consistency, a logical factorial structure, and stability over time. Importantly, and as predicted, items from the SFHS and those of the SA–DHS load on distinct factors, suggesting they are distinct dimensions of happiness. Despite a moderate but significant negative correlation between these two dimensions, fluctuating happiness seems not to be simply the reverse of authentic–durable happiness. Exploration of the scales’ construct validity confirms, first, that both scales have adequate convergent construct validity, and, second, using partial correlations, that they assess distinct facets of human happiness. While the SA–DHS was more closely related to positive affectivity and life satisfaction, the SFSH was more closely related to negative affectivity. Thus, fluctuation of happiness, despite the experience of phases of pleasure, seems to be more linked to emotional negativity than to emotional positivity. While both scales were robustly related to optimism, a sense of coherence, perceived resiliency, and the presence of and the search for meaning in life, only the SFHS was robustly related to both mental rumination and mindlessness. Thus both mental rumination and escape from the present moment are involved in fluctuating happiness. </span><a data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="1292" instrument_node="">Brown and Ryan (2003)</span></a><span data-dcnode-id="1290" instrument_node=""> found that mindfulness was a robust predictor of well-being. The present results suggest that mindfulness, being able to focus on the present moment and not focus on past or future events, rather than enhancing contentment or happiness, is robustly related to a decrease of alternation between phases of satisfaction and dissatisfaction. These results must be confirmed in future research.</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p class="mb15" data-dcnode-id="1277"><span data-dcnode-id="1287" instrument_node="">We also found support for a distinction between two markers of authentic happiness, namely durable contentment and durable inner-peace or plenitude. First, factor analyses showed a two factors solution with items assessing contentment loading on the first factor and those assessing inner-peace loading on the second factor. Second, the relevance of this distinction was confirmed by analyses examining the relationships between these two dimensions and both well-being and relevant psychological and biological constructs. As predicted, existing happiness and well-being measures (i.e., SWB, life satisfaction, the OHQ) were strongly and robustly correlated with durable contentment, but not, or not strongly correlated with durable inner-peace. This confirms that contentment is already present in existing scales, but not inner-peace. However, the only robust predictor of mental health and cortisol level was durable inner-peace. This suggests that inner-peace, rather than contentment, could have beneficial consequences in terms of treating stress, depression, and psychological distress. The negative correlation between durable inner-peace and salivary cortisol is consistent with the existing literature (e.g., </span><a data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="1286" instrument_node="">Steptoe et al., 2005</span></a><span data-dcnode-id="1284" instrument_node="">; </span><a data-dcnode-id="1282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="1283" instrument_node="">Ryff et al., 2006</span></a><span data-dcnode-id="1281" instrument_node="">). However, it would be important to replicate this result using a multiple measurement of salivary cortisol</span><sup data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">4</span></sup><span data-dcnode-id="1278" instrument_node="">. Finally, examination of the relationships between the two factors of the SA–DHS and convergent psychological constructs revealed some interesting results. While both components were robustly related to optimism, only durable inner-peace was found to robustly predict the other various constructs such as a sense of coherence, perceived resiliency, mental rumination, mindfulness, and the search for and the presence of meaning in life. These results suggest that the relationships between happiness, life satisfaction and their usual psychological correlates may be due, at least partly, to an unmeasured component, namely durable inner-peace. In order to determine the respective role of contentment and inner-peace in the psychology of human happiness, it is important that future research includes measurement of these two dimensions.</span></p><span data-dcnode-id="1276" instrument_node="">
</span><p class="mb15" data-dcnode-id="1268"><span data-dcnode-id="1275" instrument_node="">Results of the present study also provide a preliminary support for the SSHM (</span><a data-dcnode-id="1273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="1274" instrument_node="">Dambrun and Ricard, 2011</span></a><span data-dcnode-id="1272" instrument_node="">). According to this theoretical framework, while fluctuating happiness would be related to a self-centered functioning, authentic–durable happiness would be related to selflessness. Using the PVQ (</span><a data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="1271" instrument_node="">Schwartz, 2003</span></a><span data-dcnode-id="1269" instrument_node="">), we examined to correlations between self-centered values such as self-enhancement (i.e., achievement, power), selfless values such as self-transcendence (i.e., universalism and benevolence) and the two types of happiness, namely fluctuating and authentic–durable happiness. Consistent with this model, while fluctuating happiness was related only to self-enhancement values, authentic–durable happiness was related only to self-transcendence values. Of course, because our design is correlational, it is impossible to provide strong claims about causality. Future studies using experimental designs would increase our confidence in the causal direction between self-based psychological functioning (i.e., self-centeredness and selflessness) and happiness (i.e., fluctuating and authentic–durable). Moreover the psychological processes that are theoretically implied in this relation need to be examined. Nonetheless, these results provide a first empirical support for this model.</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p class="mb0" data-dcnode-id="1259"><span data-dcnode-id="1266" instrument_node="">Finally, this study has some limitations that must be taken into account. First, using the experience sampling method, it would be relevant to reproduce the present findings. According to the SSHM, self-centeredness and selflessness are not only related to distinct patterns of evaluated happiness, but also to distinct pattern of experienced happiness. In addition, the model predicts that self-centeredness and selflessness can be evaluated, but would first experienced. Thus, it would be relevant to examine the hypotheses derived from this model using the experience sampling method. This approach would test our model by minimizing the bias associated with the recovery of memories and those associated with the development of global judgments (e.g., judgments based on the most accessible memories; </span><a data-dcnode-id="1264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="1265" instrument_node="">Kahneman, 1999</span></a><span data-dcnode-id="1263" instrument_node="">). In addition, these techniques provide continuous monitoring of longitudinal samples in the short or long term that can permit to infer temporal relationships (e.g., </span><a data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="1262" instrument_node="">Steger et al., 2008</span></a><span data-dcnode-id="1260" instrument_node="">). Second, some cautions need to be taken concerning both the content and the ultimate construct validity of our scales. Concerning the content construct validity, the fact that the two types of happiness were measured differently may reduce artificially the correlation between the two constructs and also may favor a separated factor structure. Concerning the ultimate construct validity of the SFHS, more research is needed. For example, it would be relevant to examine the extent to which SFHS is distinct from a self-report scale of bipolar disorder. Demonstrating that the scales presented in this paper correlate in the expected sense to actual experiential trends in happiness could make a convincing case.</span></p><span data-dcnode-id="1258" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="1257" id="h6" name="h6"></a><h2 data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Conflict of Interest Statement</span></h2><span data-dcnode-id="1254" instrument_node="">

</span><a class="reset-hash-position" data-dcnode-id="1250" id="h7" name="h7"></a><h2 data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Footnotes</span></h2><span data-dcnode-id="1247" instrument_node="">
</span><div class="fulltextdescription" data-dcnode-id="1191" id="footnotetext"><span data-dcnode-id="1246" instrument_node="">
</span><ol data-dcnode-id="1193"><span data-dcnode-id="1245" instrument_node="">
</span><li data-dcnode-id="1240" id="note1"><strong data-dcnode-id="1242"><a class="footnotetextanchor" data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note1a" title=""><span data-dcnode-id="1244" instrument_node="">^</span></a></strong><span data-dcnode-id="1241" instrument_node="">It is possible to enhance the lasting dimension of authentic happiness by using the word “permanent” instead of the word “regular.” This modification does not change the psychometric properties of the scale.</span></li><span data-dcnode-id="1239" instrument_node="">
</span><li data-dcnode-id="1234" id="note2"><strong data-dcnode-id="1236"><a class="footnotetextanchor" data-dcnode-id="1237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note2a" title=""><span data-dcnode-id="1238" instrument_node="">^</span></a></strong><span data-dcnode-id="1235" instrument_node="">It is possible to impose a recent time frame (e.g., within the past year or within the past few months) to create a more uniform frame of reference.</span></li><span data-dcnode-id="1233" instrument_node="">
</span><li data-dcnode-id="1228" id="note3"><strong data-dcnode-id="1230"><a class="footnotetextanchor" data-dcnode-id="1231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note3a" title=""><span data-dcnode-id="1232" instrument_node="">^</span></a></strong><span data-dcnode-id="1229" instrument_node="">This scale included six-items which assessed perceived resiliency (e.g., “When something unpleasant happens to me I get over it fairly quickly”). This scale has a satisfactory reliability (α = 0.83), adequate construct validity, and has a single factor structure.</span></li><span data-dcnode-id="1227" instrument_node="">
</span><li data-dcnode-id="1219" id="note4"><strong data-dcnode-id="1224"><a class="footnotetextanchor" data-dcnode-id="1225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note4a" title=""><span data-dcnode-id="1226" instrument_node="">^</span></a></strong><span data-dcnode-id="1223" instrument_node="">Cortisol was assayed by ELISA using commercial kits (AbCys SA, Paris, France), according to the manufacturer’s recommendations (including sampling steps) allowing the best performances of coefficient of variation (CV) and sensitivity. Sensitivity, intra- and interassay CVs were 0.05 ng/ml, 7 and 9.3%. Because salivary cortisol varies greatly during the day, one strategy consists to measure salivary cortisol repeatedly. Another possibility is to measure salivary cortisol at times when it does not vary or low (between 10am and 12am in the morning and between 16:30 and 19:30 in the afternoon; e.g., </span><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="1222" instrument_node="">Lac and Chamoux, 2000</span></a><span data-dcnode-id="1220" instrument_node="">). For constraints reasons, we opted for the latter.</span></li><span data-dcnode-id="1218" instrument_node="">
</span><li data-dcnode-id="1195" id="note5"><strong data-dcnode-id="1215"><a class="footnotetextanchor" data-dcnode-id="1216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note5a" title=""><span data-dcnode-id="1217" instrument_node="">^</span></a></strong><span data-dcnode-id="1214" instrument_node="">A series of confirmatory factor analyses revealed that the predicted model with three latent variables [i.e., (1) items assessing fluctuating happiness and authentic–durable happiness decomposed in (2) items assessing durable contentment and (3) items assessing durable inner-peace] provided a better description of the data [χ</span><sup data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">2</span></sup><span data-dcnode-id="1211" instrument_node="">(223) = 1051, </span><i data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">p </span></i><span data-dcnode-id="1208" instrument_node="">&lt; 0.001; NFI = 0.89; CFI = 0.91; RMSEA = 0.07] than models with two latent variables or a single latent variable [respectively, χ</span><sup data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">2</span></sup><span data-dcnode-id="1205" instrument_node="">(227) = 1324, </span><i data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">p </span></i><span data-dcnode-id="1202" instrument_node="">&lt; 0.001; NFI = 0.85; CFI = 0.86; RMSEA = 0.09, and χ</span><sup data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">2</span></sup><span data-dcnode-id="1199" instrument_node="">(229) = 3538, </span><i data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">p </span></i><span data-dcnode-id="1196" instrument_node="">&lt; 0.001; NFI = 0.60; CFI = 0.62; RMSEA = 0.15].</span></li><span data-dcnode-id="1194" instrument_node="">
</span></ol><span data-dcnode-id="1192" instrument_node="">
</span></div><span data-dcnode-id="1190" instrument_node="">
