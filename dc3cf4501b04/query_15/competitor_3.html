</span><p class="mb15" data-dcnode-id="3632"><span data-dcnode-id="3636" instrument_node="">DC was examined in a mediator analysis in one study from the US that focused on women with a current lupus flare-up and their husbands. Wives' perceptions of husbands' emotional responsiveness fully mediated the associations between husbands' support efforts and wives' marital satisfaction and depressive symptoms. In contrast, more problematic DC was interpreted as being less emotionally responsive, which in turn was associated with poorer well-being. For husbands, a similar picture emerged: husbands' feelings of emotional responsiveness fully mediated the associations between wives' emotional support and husbands' well-being, but only partially mediated the relationship between wives' problematic support and husbands' well-being (</span><a data-dcnode-id="3634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="3635" instrument_node="">Fekete et al., 2007</span></a><span data-dcnode-id="3633" instrument_node="">).</span></p><span data-dcnode-id="3631" instrument_node="">
</span><p class="mb15" data-dcnode-id="3623"><span data-dcnode-id="3630" instrument_node="">In a correlational study from the US, zooming in from the more global types of coping in couples, the focus was on dyadic effects in relation to pain management in RA (</span><a data-dcnode-id="3628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B33"><span data-dcnode-id="3629" instrument_node="">Dowdy, 1999</span></a><span data-dcnode-id="3627" instrument_node="">). Being in a good marriage and synchrony between the amount of support the wife desired and received were significantly associated with reduced RA pain ratings (</span><a data-dcnode-id="3625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B33"><span data-dcnode-id="3626" instrument_node="">Dowdy, 1999</span></a><span data-dcnode-id="3624" instrument_node="">).</span></p><span data-dcnode-id="3622" instrument_node="">
</span><p class="mb15" data-dcnode-id="3617"><span data-dcnode-id="3621" instrument_node="">One quantitative study published a new DC measure: In this study from the US, a new measure covering interpersonal efficacy in couples coping with rheumatoid arthritis was developed and tested. The measure comprised three subscales: arthritis problem solving and emotions, arthritis symptom management, and arthritis-related couple outcomes. It appeared to be a reliable instrument with parallel versions for patients and spouses (</span><a data-dcnode-id="3619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B103"><span data-dcnode-id="3620" instrument_node="">Sterba et al., 2007</span></a><span data-dcnode-id="3618" instrument_node="">).</span></p><span data-dcnode-id="3616" instrument_node="">
</span><p class="mb0" data-dcnode-id="3608"><span data-dcnode-id="3615" instrument_node="">Different patterns of coping together could be seen in two qualitative studies (one from the UK and one from the US). Both studies identified three groups of couples' illness-related interactions and management of the illness of one partner and how couples tackle the illness together (</span><a data-dcnode-id="3613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B74"><span data-dcnode-id="3614" instrument_node="">Mann and Dieppe, 2006</span></a><span data-dcnode-id="3612" instrument_node="">; </span><a data-dcnode-id="3610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B130"><span data-dcnode-id="3611" instrument_node="">Yorgason et al., 2010</span></a><span data-dcnode-id="3609" instrument_node="">). In these two studies, two of the identified groups were very similar: a group that shared illness management and a group where the ill partner was seen in charge of disease management. In the UK study, the third group was characterized by conflict over illness management, whereas in the US sample the third group consisted of couples that reported a mix of individual and shared coping activities.</span></p><span data-dcnode-id="3607" instrument_node="">
</span><h4 data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">Diabetes Mellitus</span></h4><span data-dcnode-id="3604" instrument_node="">
</span><p class="mb15" data-dcnode-id="3593"><span data-dcnode-id="3603" instrument_node="">Diabetes mellitus describes a group of metabolic disorders characterized by chronic hyperglycemia resulting from defects in insulin secretion, insulin action, or both. Over time, hyperglycemia leads to serious damage to many of the body's systems, especially the nerves and blood vessels (</span><a data-dcnode-id="3601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B127"><span data-dcnode-id="3602" instrument_node="">World Health Organization, 2021b</span></a><span data-dcnode-id="3600" instrument_node="">). The effects of diabetes on a couple's relationship vary but are most commonly related to dietary changes and physical activity and may require a partner to give care. Twenty-three publications (</span><i data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">k</span></i><span data-dcnode-id="3597" instrument_node=""> = 3 qualitative, </span><i data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">k</span></i><span data-dcnode-id="3594" instrument_node=""> = 20 quantitative) based on ten independent samples were included in this review covering type 1 and type 2 diabetes. All samples were from the US, with the exception of one Dutch study.</span></p><span data-dcnode-id="3592" instrument_node="">
</span><p class="mb15" data-dcnode-id="3587"><span data-dcnode-id="3591" instrument_node="">DC as the dependent variable was investigated in one publication that was part of four based on one sample with couples facing type 2 diabetes (US Midwest sample, see below). Here, having more confidence in the viability of the intimate relationship and finding satisfaction in making sacrifices for one's partner were related to engaging in more conversations about the patient's illness, inquiring about how the patient is feeling, and adopting a communal orientation toward diabetes, for both men and women (</span><a data-dcnode-id="3589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="3590" instrument_node="">Johnson et al., 2013b</span></a><span data-dcnode-id="3588" instrument_node="">).</span></p><span data-dcnode-id="3586" instrument_node="">
</span><p class="mb15" data-dcnode-id="3581"><span data-dcnode-id="3585" instrument_node="">Most non-intervention studies focused on DC as the independent variable, some including additional moderating variables such as gender, race, and attachment style. In young adults with type 1 diabetes, partner overinvolvement in diabetes management had a mixed impact on outcomes, whereas partner underinvolvement was uniformly related to poor outcomes. Only a small number of young adult patients considered their illness to be a shared problem and were actually aware that their illness was a source of distress to their partners, thus making it hard to ask for support (</span><a data-dcnode-id="3583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="3584" instrument_node="">Helgeson, 2017</span></a><span data-dcnode-id="3582" instrument_node="">).</span></p><span data-dcnode-id="3580" instrument_node="">
</span><p class="mb15" data-dcnode-id="3563"><span data-dcnode-id="3579" instrument_node="">Three publications were based on a 14-day longitudinal diary study of middle-aged couples with one partner having type 1 diabetes (</span><a data-dcnode-id="3577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="3578" instrument_node="">Helgeson et al., 2019</span></a><span data-dcnode-id="3576" instrument_node="">; </span><a data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="3575" instrument_node="">Berg et al., 2020</span></a><span data-dcnode-id="3573" instrument_node="">; </span><a data-dcnode-id="3571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B63"><span data-dcnode-id="3572" instrument_node="">Lee et al., 2020</span></a><span data-dcnode-id="3570" instrument_node="">). Here, greater shared illness appraisals were associated with fewer self-regulation failures and better self-care. Collaborative and support strategies were more detrimental for diabetes management when individuals viewed diabetes as a less shared phenomenon (</span><a data-dcnode-id="3568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="3569" instrument_node="">Berg et al., 2020</span></a><span data-dcnode-id="3567" instrument_node="">). In the same study, DC was highest when patients and partners were consistent in their shared appraisals. High DC was related to better psychological and physical health (</span><a data-dcnode-id="3565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="3566" instrument_node="">Helgeson et al., 2019</span></a><span data-dcnode-id="3564" instrument_node="">).</span></p><span data-dcnode-id="3562" instrument_node="">
</span><p class="mb15" data-dcnode-id="3557"><span data-dcnode-id="3561" instrument_node="">One study from the US contributed mixed results, some contrary to predictions: there was no evidence that collaboration was directly related to better disease management or emotional well-being for patients or spouses. Spouse collaboration did not significantly interact with dyadic appraisal to predict spouses' enjoyment of the relationship, but patient collaboration did. Disease-related collaboration was more beneficial for partners who viewed disease management as a shared responsibility (</span><a data-dcnode-id="3559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="3560" instrument_node="">Hemphill, 2015</span></a><span data-dcnode-id="3558" instrument_node="">).</span></p><span data-dcnode-id="3556" instrument_node="">
</span><p class="mb15" data-dcnode-id="3506"><span data-dcnode-id="3555" instrument_node="">Eight different publications were based on one US sample of couples with recently diagnosed type 2 diabetes couples (</span><a data-dcnode-id="3553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="3554" instrument_node="">Helgeson, 2017</span></a><span data-dcnode-id="3552" instrument_node="">; </span><a data-dcnode-id="3550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B117"><span data-dcnode-id="3551" instrument_node="">Van Vleet et al., 2018</span></a><span data-dcnode-id="3549" instrument_node="">, </span><a data-dcnode-id="3547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B118"><span data-dcnode-id="3548" instrument_node="">2019</span></a><span data-dcnode-id="3546" instrument_node="">; </span><a data-dcnode-id="3544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B131"><span data-dcnode-id="3545" instrument_node="">Zajdel et al., 2018</span></a><span data-dcnode-id="3543" instrument_node="">; </span><a data-dcnode-id="3541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="3542" instrument_node="">Helgeson and Van Vleet, 2019</span></a><span data-dcnode-id="3540" instrument_node="">; </span><a data-dcnode-id="3538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B116"><span data-dcnode-id="3539" instrument_node="">Van Vleet and Helgeson, 2019</span></a><span data-dcnode-id="3537" instrument_node="">; </span><a data-dcnode-id="3535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="3536" instrument_node="">Helgeson et al., 2020a</span></a><span data-dcnode-id="3534" instrument_node="">,</span><a data-dcnode-id="3532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B45"><span data-dcnode-id="3533" instrument_node="">b</span></a><span data-dcnode-id="3531" instrument_node="">). In spouses and patients affected by type 2 diabetes, more observed communal coping by partners was linked to better perceived diabetes problem-solving and fewer negative affects for females but not for males, as well as higher relationship satisfaction in both males and females (</span><a data-dcnode-id="3529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B117"><span data-dcnode-id="3530" instrument_node="">Van Vleet et al., 2018</span></a><span data-dcnode-id="3528" instrument_node="">). Communal coping was significantly linked to greater perceived problem resolution and more positive perceptions of the discussion, which led to increases in self-efficacy and decreases in diabetes distress in patients, but only patient communal coping was linked to changes 6 months later (</span><a data-dcnode-id="3526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B118"><span data-dcnode-id="3527" instrument_node="">Van Vleet et al., 2019</span></a><span data-dcnode-id="3525" instrument_node="">). Communal coping on a daily basis helped both patients and spouses adjust psychologically to the illness and enhance patient self-care behaviors (</span><a data-dcnode-id="3523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B131"><span data-dcnode-id="3524" instrument_node="">Zajdel et al., 2018</span></a><span data-dcnode-id="3522" instrument_node="">). However, there may be a limit to how much communal coping was adaptive. Patients who reported greater overlap with their partners in coping with diabetes (meaning more engaged partners) also saw those partners as overprotective and controlling (</span><a data-dcnode-id="3520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B43"><span data-dcnode-id="3521" instrument_node="">Helgeson et al., 2017</span></a><span data-dcnode-id="3519" instrument_node="">). Additionally, communal coping may not be equally beneficial for everyone. In particular, communal coping was less beneficial for the relationship quality in patients with avoidant attachment (</span><a data-dcnode-id="3517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B116"><span data-dcnode-id="3518" instrument_node="">Van Vleet and Helgeson, 2019</span></a><span data-dcnode-id="3516" instrument_node="">). Partners' communal coping, however, was more beneficial for patients than spouses and for women than men. Furthermore, white patients and black spouses benefited more from their own communal coping than black patients and white spouses (</span><a data-dcnode-id="3514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="3515" instrument_node="">Helgeson et al., 2020a</span></a><span data-dcnode-id="3513" instrument_node="">). Patient communal coping behavior interacted with partners' communal coping, such that partners' communal coping was related to lower patient distress, higher patient self-efficacy, and higher patient medication adherence, but only when partners scored low on unmitigated communion (</span><a data-dcnode-id="3511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B45"><span data-dcnode-id="3512" instrument_node="">Helgeson et al., 2020b</span></a><span data-dcnode-id="3510" instrument_node="">). Inclusion of other in self (IOS) was related to communal coping and relationship quality (</span><a data-dcnode-id="3508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="3509" instrument_node="">Helgeson and Van Vleet, 2019</span></a><span data-dcnode-id="3507" instrument_node="">).</span></p><span data-dcnode-id="3505" instrument_node="">
</span><p class="mb15" data-dcnode-id="3482"><span data-dcnode-id="3504" instrument_node="">In a Dutch sample with type 1 and type 2 diabetes, higher received active engagement and lower received protective buffering predicted relationship satisfaction, in both patients and partners. Active engagement moderated the negative association between protective buffering and relationship satisfaction (</span><a data-dcnode-id="3502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B101"><span data-dcnode-id="3503" instrument_node="">Schokker et al., 2010</span></a><span data-dcnode-id="3501" instrument_node="">). Four publications from Johnson's lab were based on one sample of couples facing type 2 diabetes (US Midwest sample; </span><a data-dcnode-id="3499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B50"><span data-dcnode-id="3500" instrument_node="">Johnson et al., 2013a</span></a><span data-dcnode-id="3498" instrument_node="">,</span><a data-dcnode-id="3496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="3497" instrument_node="">b</span></a><span data-dcnode-id="3495" instrument_node="">, </span><a data-dcnode-id="3493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B51"><span data-dcnode-id="3494" instrument_node="">2015</span></a><span data-dcnode-id="3492" instrument_node="">; </span><a data-dcnode-id="3490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B114"><span data-dcnode-id="3491" instrument_node="">Trump et al., 2018</span></a><span data-dcnode-id="3489" instrument_node="">), two of these investigated DC as the independent variable. Common DC was associated with higher levels of diabetes efficacy for both patients and spouses which was associated, in turn, with better dietary and exercise adherence of the patient (</span><a data-dcnode-id="3487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B50"><span data-dcnode-id="3488" instrument_node="">Johnson et al., 2013a</span></a><span data-dcnode-id="3486" instrument_node="">). However, consideration must be given to nuanced associations between the different ways spouses cope with illness to achieve better diabetes outcomes. Spousal overprotection was indirectly associated with worse dietary adherence in patients with type 2 diabetes only when spousal active engagement was low (</span><a data-dcnode-id="3484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B51"><span data-dcnode-id="3485" instrument_node="">Johnson et al., 2015</span></a><span data-dcnode-id="3483" instrument_node="">).</span></p><span data-dcnode-id="3481" instrument_node="">
</span><p class="mb15" data-dcnode-id="3476"><span data-dcnode-id="3480" instrument_node="">In a mediation analysis based on the data of the abovementioned middle-aged diabetes type 1 sample, spouse we-talk was more important than patient we-talk because it signified that spouses were involved in helping with diabetes management. This association was mediated by providing emotional support and refraining from criticizing the patient. Patient we-talk, however, was unrelated to well-being (</span><a data-dcnode-id="3478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B63"><span data-dcnode-id="3479" instrument_node="">Lee et al., 2020</span></a><span data-dcnode-id="3477" instrument_node="">).</span></p><span data-dcnode-id="3475" instrument_node="">
</span><p class="mb15" data-dcnode-id="3470"><span data-dcnode-id="3474" instrument_node="">DC as the moderator was the focus of one publication of the abovementioned US Midwest sample. Spouses' evaluation of dyadic coping attenuated the direct paths between spouses' depression symptoms and patients' adherence to dietary regimens. Additionally, spouses' evaluation of DC attenuated the direct paths between spouses' acute stress and patients' adherence to dietary regimens (</span><a data-dcnode-id="3472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B114"><span data-dcnode-id="3473" instrument_node="">Trump et al., 2018</span></a><span data-dcnode-id="3471" instrument_node="">).</span></p><span data-dcnode-id="3469" instrument_node="">
</span><p class="mb15" data-dcnode-id="3455"><span data-dcnode-id="3468" instrument_node="">In two qualitative studies, based on US samples with type 2 diabetes, authors reported the following findings: couples who talked about diabetes appeared to have greater support from the spouse and fewer difficulties with dietary adherence (</span><a data-dcnode-id="3466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="3467" instrument_node="">Beverly et al., 2008</span></a><span data-dcnode-id="3465" instrument_node="">). </span><a data-dcnode-id="3463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B10"><span data-dcnode-id="3464" instrument_node="">Beverly and Wray (2010)</span></a><span data-dcnode-id="3462" instrument_node=""> used the terms collective support, collective motivation, and collective responsibility, which may influence couples' adoption and maintenance of regular exercise. Because women provided the majority of support to older family members and served as gatekeepers for their health, they seemed more experienced and better equipped when it came to providing effective support for spouses living with diabetes than males (</span><a data-dcnode-id="3460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B10"><span data-dcnode-id="3461" instrument_node="">Beverly and Wray, 2010</span></a><span data-dcnode-id="3459" instrument_node="">). A particular aspect of diabetes management is the focus on dietary adherence. In older couples, traditional division of labor may be prevalent and have an impact on DC. Depending on who is suffering from diabetes in the relationship, dietary management was seen as a form of control (sensed by male patients) or lack of support (sensed by female patients) (</span><a data-dcnode-id="3457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="3458" instrument_node="">Beverly et al., 2008</span></a><span data-dcnode-id="3456" instrument_node="">).</span></p><span data-dcnode-id="3454" instrument_node="">
</span><p class="mb15" data-dcnode-id="3449"><span data-dcnode-id="3453" instrument_node="">A qualitative interview study indicated that a particular stressor in dealing with diabetes was acute hypoglycemia, where a spouse needed to act quickly while the patient was sometimes resistant to any support due to the concomitant mood swings and irritability. It seemed there was a fine line between ongoing reminders and nagging or finding the right level of respect for the patient's need for independence and autonomy. Partners' fear of negative consequences of poor diabetes management led to more negative DC interactions (</span><a data-dcnode-id="3451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B111"><span data-dcnode-id="3452" instrument_node="">Trief et al., 2003</span></a><span data-dcnode-id="3450" instrument_node="">).</span></p><span data-dcnode-id="3448" instrument_node="">
</span><p class="mb0" data-dcnode-id="3434"><span data-dcnode-id="3447" instrument_node="">A couple-oriented diabetes intervention was developed and tested in the US and published as a pilot study and randomized controlled trial (</span><a data-dcnode-id="3445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B112"><span data-dcnode-id="3446" instrument_node="">Trief et al., 2011</span></a><span data-dcnode-id="3444" instrument_node="">, </span><a data-dcnode-id="3442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B110"><span data-dcnode-id="3443" instrument_node="">2016</span></a><span data-dcnode-id="3441" instrument_node="">). The intervention was a telephonic intervention (“couple call,” CC, 12 sessions): In addition to diabetes management, couples were encouraged to provide mutual support for nutritional and behavior change, using collaborative problem-solving techniques and recognizing their interdependence. Control conditions were individual phone intervention (“individual call,” IC, 12 sessions) and individual diabetes education only (“diabetes education,” DE, 2 sessions). Intention-to-treat analyses found significant hemoglobin level (A1C) reductions for all groups with no differences between arms. Subgroup within-arm analyses found that the CC intervention was efficacious in lowering A1C levels for individuals with high A1C levels. For body mass index (BMI), CC showed significant improvement, and CC and DE led to decreased waist circumference. Unfortunately, Trief and colleagues (</span><a data-dcnode-id="3439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B112"><span data-dcnode-id="3440" instrument_node="">Trief et al., 2011</span></a><span data-dcnode-id="3438" instrument_node="">, </span><a data-dcnode-id="3436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B110"><span data-dcnode-id="3437" instrument_node="">2016</span></a><span data-dcnode-id="3435" instrument_node="">) did not include any DC outcome measures and hence changes in DC following the intervention could not be captured.</span></p><span data-dcnode-id="3433" instrument_node="">
</span><h4 data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">Parkinson's Disease</span></h4><span data-dcnode-id="3430" instrument_node="">
</span><p class="mb15" data-dcnode-id="3425"><span data-dcnode-id="3429" instrument_node="">Parkinson's disease is a neurological disorder that mainly affects the nervous system. Currently, there are no treatments that slow the neurodegenerative process and it is difficult to manage the symptoms (</span><a data-dcnode-id="3427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="3428" instrument_node="">Kalia and Lang, 2015</span></a><span data-dcnode-id="3426" instrument_node="">). Due to its progressive and complex nature, Parkinson's affects the couple relationship on many levels: the marital and sexual relationship, work and social activities as well as taking over household and care tasks by the partner as the condition progresses. DC in couples affected by Parkinson's was the focus of one quasi-experimental pilot intervention study and one qualitative study, both from the US.</span></p><span data-dcnode-id="3424" instrument_node="">
</span><p class="mb15" data-dcnode-id="3416"><span data-dcnode-id="3423" instrument_node="">The pilot study reported a quasi-experimental intervention study testing the efficacy of </span><i data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">Strive to Thrive</span></i><span data-dcnode-id="3420" instrument_node="">, a group workshop on self-management for Parkinson's disease. The intervention covered self-management skills related to monitoring, taking action, problem-solving, decision-making, and evaluating results. Significant changes were observed only in spouses' mental relaxation techniques but not for dyadic outcomes such as active engagement (</span><a data-dcnode-id="3418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B71"><span data-dcnode-id="3419" instrument_node="">Lyons et al., 2020</span></a><span data-dcnode-id="3417" instrument_node="">). Due to the quasi-experimental design of the study with no randomization and a small sample size, study quality had to be rated as “poor” in our quality assessment.</span></p><span data-dcnode-id="3415" instrument_node="">
</span><p class="mb0" data-dcnode-id="3410"><span data-dcnode-id="3414" instrument_node="">In the qualitative interview study on the effect of Parkinson's on couples, even though participants were not asked directly about DC, they touched on relevant aspects of DC, such as emotional support, listening, providing informational support, giving advice, or encouraging shifts in perspective. However, participants also described difficulties in coping together: partners' differing approaches to coping impeded support or support threatened independent and capable identity or placed unwanted emphasis on the disease. Furthermore, there was a fear of burdening the other partner and actual draining of the caregiver, in addition to having to deal with dependency. DC was enhanced by framing partners as equals, relinquishing control, sharing humor, seeking/providing support indirectly or subtly, and taking the other's perspective (</span><a data-dcnode-id="3412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B75"><span data-dcnode-id="3413" instrument_node="">Martin, 2014</span></a><span data-dcnode-id="3411" instrument_node="">).</span></p><span data-dcnode-id="3409" instrument_node="">
</span><h4 data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">Renal Disease</span></h4><span data-dcnode-id="3406" instrument_node="">
</span><p class="mb15" data-dcnode-id="3401"><span data-dcnode-id="3405" instrument_node="">Chronic renal disease can have a number of causes and describes the gradual loss of kidney function (</span><a data-dcnode-id="3403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B86"><span data-dcnode-id="3404" instrument_node="">Parmar, 2002</span></a><span data-dcnode-id="3402" instrument_node="">). Due to the often life-limiting and disabling nature of chronic renal diseases, the effects of these conditions on the couple are complex and may include care tasks by the healthy partner, restrictions on social and work life, and in the case of dialyses time-consuming treatment regimens. The two DC studies included in the review, one cross-sectional study from Germany and one qualitative study from the US, focused on the treatment of chronic renal diseases, namely dialysis and kidney transplantation.</span></p><span data-dcnode-id="3400" instrument_node="">
</span><p class="mb15" data-dcnode-id="3395"><span data-dcnode-id="3399" instrument_node="">The German-based cross-sectional study examined gender and role differences. Couples with male patients found that female caregivers showed higher own supportive DC than the males. In couples with female patients, women reported greater communication of their own stress, supportive DC, total positive DC, and total DC as well as depression compared to men. Low DC discrepancies were associated with positive psychological outcomes. In couples with female patients, higher comparability was associated with higher DC. Lower levels of similarity for male spouses showed correlations with higher rates of depression and anxiety in the females (</span><a data-dcnode-id="3397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B107"><span data-dcnode-id="3398" instrument_node="">Tkachenko et al., 2019</span></a><span data-dcnode-id="3396" instrument_node="">).</span></p><span data-dcnode-id="3394" instrument_node="">
</span><p class="mb0" data-dcnode-id="3389"><span data-dcnode-id="3393" instrument_node="">The qualitative study assessed how renal patients and their partners experienced the short daily home hemodialysis and what kind of relationship factors were beneficial. Four profiles for dyadic coping emerged from the analysis of couple interviews: (1) thriving—patients' care partners flourished; (2) surviving—strong couples adjusted to challenges; (3) martyrdom—one partner defers their needs and resentments to make dialysis work; and (4) seeking another option—patients are unwilling to burden an anxious partner. Associated with the thriving dyads was dialysis training that was unhurried and valued care partners as well as patients used a mix of learning strategies and provided a home visit for the first home treatment (</span><a data-dcnode-id="3391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B123"><span data-dcnode-id="3392" instrument_node="">Wise et al., 2010</span></a><span data-dcnode-id="3390" instrument_node="">).</span></p><span data-dcnode-id="3388" instrument_node="">
</span><h4 data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">Stroke</span></h4><span data-dcnode-id="3385" instrument_node="">
</span><p class="mb15" data-dcnode-id="3371"><span data-dcnode-id="3384" instrument_node="">Stroke is a condition where blood flow to the brain is compromised, causing cell damage, either through a lack of blood flow (ischemic) or bleeding (hemorrhagic). Stroke is a major cause of disability and the second most common cause of death worldwide (</span><a data-dcnode-id="3382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B32"><span data-dcnode-id="3383" instrument_node="">Donnan et al., 2008</span></a><span data-dcnode-id="3381" instrument_node="">). For those stroke survivors with disabling brain damages, a phase of regaining and relearning skills ensues, which can be stressful for the survivor as well as the partner. Depending on the level of disability, the marital relationship can be minimally or severely effected in different areas, for instance due to loss of language skills, care tasks taken over by the partner, and fear of future strokes. Dyadic coping in stroke survivors and their partners was the focus in four studies (</span><i data-dcnode-id="3379"><span data-dcnode-id="3380" instrument_node="">k</span></i><span data-dcnode-id="3378" instrument_node=""> = 2 intervention studies, </span><i data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">k</span></i><span data-dcnode-id="3375" instrument_node=""> = 1 mixed-methods study, and </span><i data-dcnode-id="3373"><span data-dcnode-id="3374" instrument_node="">k</span></i><span data-dcnode-id="3372" instrument_node=""> =1 qualitative). All studies were conducted in the US.</span></p><span data-dcnode-id="3370" instrument_node="">
</span><p class="mb15" data-dcnode-id="3356"><span data-dcnode-id="3369" instrument_node="">The two pilot studies from the US tested the feasibility of two different post-stroke couple interventions. One pilot study looked at a self-administered dyadic positive psychology-based intervention for stroke survivors and their partners where either one or both reported depressive symptoms (</span><a data-dcnode-id="3367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B106"><span data-dcnode-id="3368" instrument_node="">Terrill et al., 2018</span></a><span data-dcnode-id="3366" instrument_node="">). Feasibility was established informing a larger, planned randomized-controlled trial. In the second pilot study (</span><a data-dcnode-id="3364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B98"><span data-dcnode-id="3365" instrument_node="">Robinson-Smith et al., 2016</span></a><span data-dcnode-id="3363" instrument_node="">), psychoeducational intervention was adapted from the </span><i data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">Partners in Coping Program</span></i><span data-dcnode-id="3360" instrument_node=""> (</span><a data-dcnode-id="3358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B55"><span data-dcnode-id="3359" instrument_node="">Kayser and Scott, 2008</span></a><span data-dcnode-id="3357" instrument_node="">) and tailored to couple's needs, focusing on present, reasonable goals, reframing, spousal communication, integrating body image, and incorporating social and pleasurable activities. First, yet underpowered, results indicated a significant increase in experimental group stroke survivors' independent coping and quality of life and a reduction of depressive symptoms. Significant increases in positive DC were observed in experimental group spouses.</span></p><span data-dcnode-id="3355" instrument_node="">
</span><p class="mb0" data-dcnode-id="3347"><span data-dcnode-id="3354" instrument_node="">In the mixed methods study, cross-sectional data showed that lower levels of active engagement and higher levels of protective buffering were associated with greater depression in spouses but not in stroke survivors. The qualitative arm of the mixed methods study revealed, amongst other things, accounts of relationship challenges as well as growth as a couple, with some couples talking about how the illness had brought them closer together (</span><a data-dcnode-id="3352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B76"><span data-dcnode-id="3353" instrument_node="">McCarthy, 2012</span></a><span data-dcnode-id="3351" instrument_node="">). The qualitative study captured how couples sought a new equilibrium together after the stroke in an attempt to reduce its impact and adapt to changes in formerly shared leisure activities as well as division of homemaking and breadwinning labor (</span><a data-dcnode-id="3349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B99"><span data-dcnode-id="3350" instrument_node="">Robinson-Smith and Mahoney, 1995</span></a><span data-dcnode-id="3348" instrument_node="">).</span></p><span data-dcnode-id="3346" instrument_node="">
</span><h3 data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">Cluster III</span></h3><span data-dcnode-id="3343" instrument_node="">
</span><h4 class="pt0" data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">Endometriosis</span></h4><span data-dcnode-id="3340" instrument_node="">
</span><p class="mb0" data-dcnode-id="3332"><span data-dcnode-id="3339" instrument_node="">Endometriosis is a condition in which tissue similar to the uterine lining (endometrium) grows outside of the uterus. It is characterized by dysmenorrhea (painful menstrual periods), chronic pelvic pain, dyspareunia (pain during intercourse), and infertility (</span><a data-dcnode-id="3337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B2"><span data-dcnode-id="3338" instrument_node="">As-Sanie et al., 2019</span></a><span data-dcnode-id="3336" instrument_node="">). For these reasons, endometriosis affects the couple relationship in terms of dealing with pain and family planning as well as the sexual relationship. A qualitative study with a US- and Australian-based sample of ten couples focused on dyspareunia due to endometriosis and its effects on the couple relationship (</span><a data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B19"><span data-dcnode-id="3335" instrument_node="">Brown, 2007</span></a><span data-dcnode-id="3333" instrument_node="">). Most women in the study had developed endometriosis before entering the relationship, and thus they were openly sharing with their partners about their condition and had the impression that they were coping as a team. The women in this study seemed to be the ones receiving the information and sharing it with their partners. The women stressed how important it was to talk about the illness and their relationship. The partners talked about how over time they had come to understand their partners' cycles, moods, and triggers. Communication about the dyspareunia seemed particularly important for adapting their intimate relationship to avoid pain.</span></p><span data-dcnode-id="3331" instrument_node="">
</span><h4 data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">HIV</span></h4><span data-dcnode-id="3328" instrument_node="">
</span><p class="mb15" data-dcnode-id="3323"><span data-dcnode-id="3327" instrument_node="">The human immunodeficiency virus (HIV) weakens the immune system. The most advanced stage of HIV infection is acquired immunodeficiency syndrome (AIDS), which is defined by the development of certain cancers, infections or other severe long-term clinical manifestations. To date, for those with access to effective HIV prevention, diagnosis, treatment and care, HIV infection has become a manageable chronic health condition (</span><a data-dcnode-id="3325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B128"><span data-dcnode-id="3326" instrument_node="">World Health Organization, 2021c</span></a><span data-dcnode-id="3324" instrument_node="">). Depending on access to effective prevention and treatment, effects on the couple relationship may vary. The sexual relationship is affected in serodiscordant couples. For couples without effective treatments, which is more often the case in the global South, HIV/AIDS can be life-limiting, potentially for both partners, which represents a severe stressor.</span></p><span data-dcnode-id="3322" instrument_node="">
</span><p class="mb15" data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">Three qualitative and one quantitative study (from three samples) on HIV were included in the review. Two studies were from Sub-Saharan Africa with heterosexual serodiscordant couples and one from the US with male–male, mostly serodiscordant couples.</span></p><span data-dcnode-id="3319" instrument_node="">
</span><p class="mb15" data-dcnode-id="3311"><span data-dcnode-id="3318" instrument_node="">The publications from the US were based on data from the Duo Project (</span><a data-dcnode-id="3316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B25"><span data-dcnode-id="3317" instrument_node="">Conroy et al., 2016</span></a><span data-dcnode-id="3315" instrument_node="">) studying homosexual couples in which at least one partner was HIV-positive. In a quantitative longitudinal study (</span><a data-dcnode-id="3313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="3314" instrument_node="">Gamarel, 2014</span></a><span data-dcnode-id="3312" instrument_node="">), DC was operationalized as the inclusion of the partner in self and DC communication patterns. Communication was examined as the dependent variable.</span></p><span data-dcnode-id="3310" instrument_node="">
</span><p class="mb15" data-dcnode-id="3305"><span data-dcnode-id="3309" instrument_node="">Both sets of partners' reports of higher positive communication scores were associated with increased relationship satisfaction, and higher negative communication scores were associated with decreased relationship satisfaction. Only the actor effects were significant in any of the actor–partner interdependence models (APIMs), meaning that one's own level of positive or negative communication was relevant, not the partner's level of communication. Additionally, higher positive communication and lower negative communication scores were associated with sexual satisfaction and lower levels of depressive symptoms. However, HIV-negative partners' negative communication scores were associated with a decrease in non-adherence and a decrease in anal sex. Additionally, a mediation effect was analyzed, suggesting that partners who reported higher levels of inclusion of the partner in the self at baseline also tended to report higher levels of positive communication at 6-month follow-up and, in turn, higher levels of relationship satisfaction at 12-month follow-up (</span><a data-dcnode-id="3307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="3308" instrument_node="">Gamarel, 2014</span></a><span data-dcnode-id="3306" instrument_node="">).</span></p><span data-dcnode-id="3304" instrument_node="">
</span><p class="mb15" data-dcnode-id="3296"><span data-dcnode-id="3303" instrument_node="">In the qualitative study arm (</span><a data-dcnode-id="3301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="3302" instrument_node="">Gamarel et al., 2016</span></a><span data-dcnode-id="3300" instrument_node="">), participating couples (</span><i data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">n</span></i><span data-dcnode-id="3297" instrument_node=""> = 20) were grouped into two basic orientations toward health, the “relational” and the “personal.” The relational orientation described health as interconnected and couples prioritized being aware of one another's health status and care needs. They emphasized open communication and empathetic concern independent of serodiscordant status. A subgroup was termed “asymmetrical,” denoting couples in which one partner's health was prioritized over the other's. The personal orientation group consisted of couples in which one or both partners described their health and health care as independent and autonomous (as long as health status was stable). Individuals with more autonomous orientations to their own and their partners' health also were more satisfied with their partners' support.</span></p><span data-dcnode-id="3295" instrument_node="">
</span><p class="mb15" data-dcnode-id="3290"><span data-dcnode-id="3294" instrument_node="">In another qualitative study embedded in a larger RCT of vaginal gel use for the prevention of vaginally acquired HIV infection, couples were interviewed in Uganda and Zambia on their coping with HIV and serodiscordance (</span><a data-dcnode-id="3292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B80"><span data-dcnode-id="3293" instrument_node="">Montgomery et al., 2012</span></a><span data-dcnode-id="3291" instrument_node="">). In Uganda, participating couples believed that joint effort was needed regarding the mutual acceptance of their serodiscordant status. They communicated about the situation and engaged in cooperative action to solve problems, including use of condoms and gel. However, in the Zambian sample, protecting the health of the HIV-negative woman was left to the women themselves. Communication with the spouse occurred only when the women sought permission to use the gel with the implicit threat of conflict or even partner violence if they did not seek this assent and used the gel secretly. These Zambian couples did not touch upon any facets of DC in their interviews, thus depicting the absence of positive DC.</span></p><span data-dcnode-id="3289" instrument_node="">
</span><p class="mb0" data-dcnode-id="3284"><span data-dcnode-id="3288" instrument_node="">Finally, a qualitative study in South Africa and Tanzania focused on communication about HIV serodiscordance and dealing with HIV (</span><a data-dcnode-id="3286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B97"><span data-dcnode-id="3287" instrument_node="">Rispel et al., 2012</span></a><span data-dcnode-id="3285" instrument_node="">). Half of the couples showed a coping style termed “sero-normalcy,” whereby couples saw themselves as “normal” even though HIV still seemed to affect the relationship. Another coping style was termed “sero-silent,” partners reporting that they did not talk much with each other about issues related to their serodiscordant status. The third coping style was termed “sero-sharing”: couples portrayed HIV as being an issue that they dealt with together, talking about health issues and their desire for parenthood. Some couples exhibited features of more than one coping style and, at times, partners differed in their ways of coping within a couple.</span></p><span data-dcnode-id="3283" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="3282" id="h5" name="h5"></a><h2 data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">Discussion</span></h2><span data-dcnode-id="3279" instrument_node="">
</span><p class="mb15" data-dcnode-id="3256"><span data-dcnode-id="3278" instrument_node="">Chronic physical illness affects not only the patient but also the partner (</span><a data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B1"><span data-dcnode-id="3277" instrument_node="">Acitelli and Badr, 2005</span></a><span data-dcnode-id="3275" instrument_node="">; </span><a data-dcnode-id="3273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B129"><span data-dcnode-id="3274" instrument_node="">Yorgason and Choi, 2016</span></a><span data-dcnode-id="3272" instrument_node="">; </span><a data-dcnode-id="3270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B95"><span data-dcnode-id="3271" instrument_node="">Revenson and Hagedoorn, 2019</span></a><span data-dcnode-id="3269" instrument_node="">). Over the last 30 years, the field of DC has emerged with the understanding that partners communicate about stress, support each other, and deal jointly with chronic illness. The present study aimed to synthesize research on DC in couples affected by severe physical illnesses. We included forty-nine qualitative, quantitative, and mixed methods studies. When looking at the overall findings, both partners dealt with chronic illness better, if (a) they engaged in stress communication, (b) their supportive DC matched the needs of the partner and (c) they shared similar illness perceptions. The findings of this review mirror the results of previous reviews on chronic diseases such as cancer (</span><a data-dcnode-id="3267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B108"><span data-dcnode-id="3268" instrument_node="">Traa et al., 2015</span></a><span data-dcnode-id="3266" instrument_node="">), cardiovascular disease (</span><a data-dcnode-id="3264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B113"><span data-dcnode-id="3265" instrument_node="">Trump and Mendenhall, 2017</span></a><span data-dcnode-id="3263" instrument_node="">), chronic pain (</span><a data-dcnode-id="3261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B89"><span data-dcnode-id="3262" instrument_node="">Prenevost and Reme, 2017</span></a><span data-dcnode-id="3260" instrument_node="">), and multiple sclerosis (</span><a data-dcnode-id="3258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B20"><span data-dcnode-id="3259" instrument_node="">Busch et al., 2014</span></a><span data-dcnode-id="3257" instrument_node="">).</span></p><span data-dcnode-id="3255" instrument_node="">
</span><p class="mb15" data-dcnode-id="3250"><span data-dcnode-id="3254" instrument_node="">Interestingly, the inclusion of qualitative and mixed methods studies may be viewed as a proof of concept regarding the facets of DC and its relevance for patients and partners alike when dealing with chronic illness. When couples were asked, as part of the qualitative interviews, to talk freely about their experience of dealing with physical illness, they regarded the relevance of stress communication, feeling supported in the right way by one's partner, and collaboration as positive across all qualitative studies. Similarly, they regarded the lack of DC as stressful. However, there was one exception regarding the beneficial stance of DC. Some couples in a study on male–male couples with HIV valued independence during phases of relatively good health whilst knowing that this situation was fluid and depended on the affected partner's health status (</span><a data-dcnode-id="3252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="3253" instrument_node="">Gamarel et al., 2016</span></a><span data-dcnode-id="3251" instrument_node="">). Furthermore, the inclusion of qualitative and mixed-methods studies revealed the relevance of further facets of beneficial DC, for instance adopting the other's perspective and using humor. Additionally, qualitative analyses often grouped together different phenomena of DC. Some couples seemed to deal well with the physical illness together, whereas others would benefit more strongly from outside support or DC interventions.</span></p><span data-dcnode-id="3249" instrument_node="">
</span><p class="mb15" data-dcnode-id="3241"><span data-dcnode-id="3248" instrument_node="">In the quantitative studies, DC was mostly operationalized as the independent variable, fitting theoretical models, mainly STM (</span><a data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B13"><span data-dcnode-id="3247" instrument_node="">Bodenmann, 2005</span></a><span data-dcnode-id="3245" instrument_node="">) or relationship-focused DC (</span><a data-dcnode-id="3243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="3244" instrument_node="">Coyne and Smith, 1991</span></a><span data-dcnode-id="3242" instrument_node="">). However, especially this approach would be ideally suited to delving more into the dyadic coping processes in chronic disease by emphasizing observational studies that were extremely rare. Looking at how couples deal with the chronic illness in real time interactions might be highly beneficial and shed more light on the mechanisms of DC, the frequency and quality of partner's contributions, their impact on the patient, and consequences on quality of life and illness development.</span></p><span data-dcnode-id="3240" instrument_node="">
</span><p class="mb0" data-dcnode-id="3232"><span data-dcnode-id="3239" instrument_node="">In a first attempt to cluster the impact of chronic illness on couples, we collated type of illness in groups according to the assumed level of impact of symptom and treatment burden on the couple relationship. As mentioned above, this effort can only be a crude approximation. The impact may vary considerably, depending on the degree of severity or the stage of the illness or comorbid mental or physical health conditions of the affected individual as well as the partner. Based on the included studies and the variety of illnesses covered, at this juncture no clear picture emerged that would sufficiently differentiate DC findings between clusters. However, communication about the illness and the required support seemed highly relevant across the clusters. Secondly, in cluster II, it became apparent that overinvolvement could threaten the patient's independent and capable identity (cf. </span><a data-dcnode-id="3237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="3238" instrument_node="">Table 1</span></a><span data-dcnode-id="3236" instrument_node="">). Thus, the assumption that overinvolvement is deleterious (</span><a data-dcnode-id="3234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B84"><span data-dcnode-id="3235" instrument_node="">O'Brien and DeLongis, 1997</span></a><span data-dcnode-id="3233" instrument_node="">) was only found in cluster II couples.</span></p><span data-dcnode-id="3231" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="3230"></div><span data-dcnode-id="3229" instrument_node="">
