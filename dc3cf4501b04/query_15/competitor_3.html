</span><meta content="Objective: Chronic physical illness affects not only patients but also their partners. Dyadic coping (DC) – the ways couples cope in dealing with a stressor such as chronic illness – has received increased attention over the last three decades. The aim of the current study was to summarize the state of research on DC in couples with chronic physical illnesses. Methods: We conducted a systematic review of qualitative, quantitative, and mixed-methods studies published between 1990 and 2020, assessing DC in couples affected by severe physical illnesses. We used DC and related search terms for the literature search in Psycinfo, Psyndex, and Medline. 5,330 studies were identified in three electronic databases and 49 of these were included in the review (5,440 individuals reported on 2,820 dyads). We excluded studies on cancer, cardiovascular disease, and multiple sclerosis because of existing reviews in the respective fields. Half of the studies included were on diabetes. Other studies were on arthritis, chronic obstructive pulmonary disease, cystic fibrosis, human immunodeficiency virus (HIV), Huntington’s disease, lupus erythematosus, Parkinson’s disease, renal diseases, stroke, and endometriosis. Two raters extracted data using a predefined protocol, including study quality. Results were collated in a narrative synthesis organized by illness and DC operationalization. Results: Overall, DC was associated with beneficial outcomes in physical health, well-being, and relationship satisfaction. Differential effects became apparent for certain chronic conditions potentially depending on certain disease characteristics, such as early-onset, sudden-onset, or life-threatening conditions. Conclusion: Facing challenges together as a couple seemed indispensable for adapting to a diverse range of demands related to chronic illnesses with some specific demands of particular chronic diseases. There is a need for the development of truly dyadic interventions with an eye on the specific challenges of the various chronic conditions. " data-dcnode-id="5135" name="citation_abstract"><span data-dcnode-id="5134" instrument_node="">

h an eye on the specific challenges of the various chronic conditions. " data-dcnode-id="5133" name="description"><span data-dcnode-id="5132" instrument_node="">

</span><a addthis:description="Objective: Chronic physical illness affects not only patients but also their partners. Dyadic coping (DC)—the ways couples cope in dealing with a stressor such as chronic illness—has received increased attention over the last three decades. The aim of the current study was to summarize the state of research on DC in couples with chronic physical illnesses.Methods: We conducted a systematic review of qualitative, quantitative, and mixed-methods studies published between 1990 and 2020, assessing DC in couples affected by severe physical illnesses. We used DC and related search terms for the literature search in Psycinfo, Psyndex, and Medline. Five thousand three hundred thirty studies were identified in three electronic databases and 49 of these were included in the review (5,440 individuals reported on 2,820 dyads). We excluded studies on cancer, cardiovascular disease, and multiple sclerosis because of existing reviews in the respective fields. Half of the studies included were on diabetes. Other studies were on arthritis, chronic obstructive pulmonary disease (COPD), cystic fibrosis, human immunodeficiency virus (HIV), Huntington's disease, lupus erythematosus, Parkinson's disease, renal diseases, stroke, and endometriosis. Two raters extracted data using a predefined protocol, including study quality. Results were collated in a narrative synthesis organized by illness and DC operationalization.Results: Overall, DC was associated with beneficial outcomes in physical healt..." addthis:title="Dyadic Coping in Couples Facing Chronic Physical Illness: A Systematic Review" addthis:url="https://www.frontiersin.org/article/10.3389/fpsyg.2021.722740" class="addthis_button_facebook at300b" data-dcnode-id="4355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html" title="Facebook"><span class="at-icon-wrapper" data-dcnode-id="4356" style="background-color: rgb(59, 89 </span><a class="reset-hash-position" data-dcnode-id="4244" id="h1" name="h1"></a><h1 data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">Dyadic Coping in Couples Facing Chronic Physical Illness: A Systematic Review</span></h1><span data-dcnode-id="4241" instrument_node="">
</span><div class="authors" data-dcnode-id="4209"><span data-dcnode-id="4240" instrument_node="">
</span><a class="user-id-1143885" data-dcnode-id="4237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/1143885"><img class="pr5" data-dcnode-id="4239" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//loop.frontiersin.org/images/profile/1143885/24&amp;raw"><span data-dcnode-id="4238" instrument_node="">Katharina Weitkamp</span></a><sup data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">1</span></sup><sup data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">*</span></sup><span data-dcnode-id="4232" instrument_node="">, </span><img class="pr5" data-dcnode-id="4231" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg&amp;raw"><span data-dcnode-id="4230" instrument_node="">Fabienne Feger</span><sup data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">2</span></sup><span data-dcnode-id="4227" instrument_node="">, </span><a class="user-id-1367251" data-dcnode-id="4224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/1367251"><img class="pr5" data-dcnode-id="4226" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//loop.frontiersin.org/images/profile/1367251/24&amp;raw"><span data-dcnode-id="4225" instrument_node="">Selina A. Landolt</span></a><sup data-dcnode-id="4222"><span data-dcnode-id="4223" instrument_node="">1</span></sup><span data-dcnode-id="4221" instrument_node="">, </span><a class="user-id-1407195" data-dcnode-id="4218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/1407195"><img class="pr5" data-dcnode-id="4220" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//loop.frontiersin.org/images/profile/1407195/24&amp;raw"><span data-dcnode-id="4219" instrument_node="">Michelle Roth</span></a><sup data-dcnode-id="4216"><span data-dcnode-id="4217" instrument_node="">1</span></sup><span data-dcnode-id="4215" instrument_node=""> and </span><a class="user-id-421611" data-dcnode-id="4212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/421611"><img class="pr5" data-dcnode-id="4214" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//loop.frontiersin.org/images/profile/421611/24&amp;raw"><span data-dcnode-id="4213" instrument_node="">Guy Bodenmann</span></a><sup data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node="">1</span></sup></div><span data-dcnode-id="4208" instrument_node="">
</span><ul class="notes" data-dcnode-id="4194"><span data-dcnode-id="4207" instrument_node="">
</span><li data-dcnode-id="4202"><span data-dcnode-id="4204"><sup data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">1</span></sup></span><span data-dcnode-id="4203" instrument_node="">Clinical Psychology Children/Adolescents and Couples/Families, University of Zurich, Zurich, Switzerland</span></li><span data-dcnode-id="4201" instrument_node="">
</span><li data-dcnode-id="4196"><span data-dcnode-id="4198"><sup data-dcnode-id="4199"><span data-dcnode-id="4200" instrument_node="">2</span></sup></span><span data-dcnode-id="4197" instrument_node="">ZHAW Zurich University of Applied Science, Zurich, Switzerland</span></li><span data-dcnode-id="4195" instrument_node="">
</span></ul><span data-dcnode-id="4193" instrument_node="">
</span><p class="mb15" data-dcnode-id="4189"><strong data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node="">Objective:</span></strong><span data-dcnode-id="4190" instrument_node=""> Chronic physical illness affects not only patients but also their partners. Dyadic coping (DC)—the ways couples cope in dealing with a stressor such as chronic illness—has received increased attention over the last three decades. The aim of the current study was to summarize the state of research on DC in couples with chronic physical illnesses.</span></p><span data-dcnode-id="4188" instrument_node="">
</span><p class="mb15" data-dcnode-id="4178"><strong data-dcnode-id="4186"><span data-dcnode-id="4187" instrument_node="">Methods:</span></strong><span data-dcnode-id="4185" instrument_node=""> We conducted a systematic review of qualitative, quantitative, and mixed-methods studies published between 1990 and 2020, assessing DC in couples affected by severe physical illnesses. We used DC and related search terms for the literature search in </span><i data-dcnode-id="4183"><span data-dcnode-id="4184" instrument_node="">Psycinfo, Psyndex</span></i><span data-dcnode-id="4182" instrument_node="">, and </span><i data-dcnode-id="4180"><span data-dcnode-id="4181" instrument_node="">Medline</span></i><span data-dcnode-id="4179" instrument_node="">. Five thousand three hundred thirty studies were identified in three electronic databases and 49 of these were included in the review (5,440 individuals reported on 2,820 dyads). We excluded studies on cancer, cardiovascular disease, and multiple sclerosis because of existing reviews in the respective fields. Half of the studies included were on diabetes. Other studies were on arthritis, chronic obstructive pulmonary disease (COPD), cystic fibrosis, human immunodeficiency virus (HIV), Huntington's disease, lupus erythematosus, Parkinson's disease, renal diseases, stroke, and endometriosis. Two raters extracted data using a predefined protocol, including study quality. Results were collated in a narrative synthesis organized by illness and DC operationalization.</span></p><span data-dcnode-id="4177" instrument_node="">
</span><p class="mb15" data-dcnode-id="4173"><strong data-dcnode-id="4175"><span data-dcnode-id="4176" instrument_node="">Results:</span></strong><span data-dcnode-id="4174" instrument_node=""> Overall, DC was associated with beneficial outcomes in physical health, well-being, and relationship satisfaction. Differential effects became apparent for certain chronic conditions potentially depending on certain disease characteristics, such as early-onset, sudden-onset, or life-threatening conditions.</span></p><span data-dcnode-id="4172" instrument_node="">
</span><p class="mb0" data-dcnode-id="4168"><strong data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node="">Conclusion:</span></strong><span data-dcnode-id="4169" instrument_node=""> Facing challenges together as a couple seemed indispensable for adapting to a diverse range of demands related to chronic illnesses with some specific demands of particular chronic diseases. There is a need for the development of truly dyadic interventions with an eye on the specific challenges of the various chronic conditions.</span></p><span data-dcnode-id="4167" instrument_node="">
</span><div class="clear" data-dcnode-id="4166"></div><span data-dcnode-id="4165" instrument_node="">
</span></div><span data-dcnode-id="4163" instrument_node="">
</span><div class="JournalFullText" data-dcnode-id="426"><span data-dcnode-id="4162" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="4161" id="h2" name="h2"></a><h2 data-dcnode-id="4159"><span data-dcnode-id="4160" instrument_node="">Introduction</span></h2><span data-dcnode-id="4158" instrument_node="">
</span><p class="mb15" data-dcnode-id="4144"><span data-dcnode-id="4157" instrument_node="">The emergence of chronic diseases is currently seen as the predominant challenge to global health (</span><a data-dcnode-id="4155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B6"><span data-dcnode-id="4156" instrument_node="">Bauer et al., 2014</span></a><span data-dcnode-id="4154" instrument_node="">). Macrosocial and macroeconomic forces are understood as major determinants of population increases in chronic disease (</span><a data-dcnode-id="4152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B104"><span data-dcnode-id="4153" instrument_node="">Stuckler, 2008</span></a><span data-dcnode-id="4151" instrument_node="">) with around half (50.9%) of adults in the US having at least one chronic condition (</span><a data-dcnode-id="4149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B121"><span data-dcnode-id="4150" instrument_node="">Ward and Schiller, 2013</span></a><span data-dcnode-id="4148" instrument_node="">). Chronic diseases may deteriorate, enter remission, or fluctuate, but their defining characteristic is persistence (</span><a data-dcnode-id="4146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="4147" instrument_node="">Helgeson and Zajdel, 2017</span></a><span data-dcnode-id="4145" instrument_node="">).</span></p><span data-dcnode-id="4143" instrument_node="">
</span><p class="mb15" data-dcnode-id="4135"><span data-dcnode-id="4142" instrument_node="">To control or inhibit disease progression and to minimize disease side effects and disruptions to daily living, patients need to cope with the chronic condition. On the one hand, this entails behaviors such as taking medication, monitoring diet, exercising, and following up with health care professionals (</span><a data-dcnode-id="4140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="4141" instrument_node="">Helgeson and Zajdel, 2017</span></a><span data-dcnode-id="4139" instrument_node="">). Beyond these general tasks, some disease-specific tasks pose particular challenges and stressors, for instance adherence to time-consuming cancer treatment with severe side effects and uncertain outcomes, while in diabetes it is more about monitoring blood sugar and living a balanced life. On the other hand, patients need to deal with limitations in their daily lives, aspects of social and work life and adjustments to previously anticipated life plans. Whereas, disease refers to the undesirable biological processes that affect individuals, illness refers to the person's experience of the disease, including its psychological and social effects (</span><a data-dcnode-id="4137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="4138" instrument_node="">Charmaz and Rosenfeld, 2010</span></a><span data-dcnode-id="4136" instrument_node="">).</span></p><span data-dcnode-id="4134" instrument_node="">
</span><p class="mb15" data-dcnode-id="4129"><span data-dcnode-id="4133" instrument_node="">Historically, the majority of research on coping with physical illnesses focused on patients' individual processes. However, it is increasingly recognized that chronic illness takes place in an interpersonal context. The illness affects not only the person but also that person's spouse or romantic partner, family, and social network (</span><a data-dcnode-id="4131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="4132" instrument_node="">Helgeson and Zajdel, 2017</span></a><span data-dcnode-id="4130" instrument_node="">).</span></p><span data-dcnode-id="4128" instrument_node="">
</span><p class="mb15" data-dcnode-id="4060"><span data-dcnode-id="4127" instrument_node="">How couples cope with stress together has been the focus of research on dyadic coping since the early 1990s (</span><a data-dcnode-id="4125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B30"><span data-dcnode-id="4126" instrument_node="">DeLongis and O'Brien, 1990</span></a><span data-dcnode-id="4124" instrument_node="">; </span><a data-dcnode-id="4122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="4123" instrument_node="">Coyne and Smith, 1991</span></a><span data-dcnode-id="4121" instrument_node="">; </span><a data-dcnode-id="4119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B92"><span data-dcnode-id="4120" instrument_node="">Revenson, 1994</span></a><span data-dcnode-id="4118" instrument_node="">; </span><a data-dcnode-id="4116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="4117" instrument_node="">Bodenmann, 1995</span></a><span data-dcnode-id="4115" instrument_node="">). Dyadic coping (DC) refers to how partners communicate about stress, support each other in times of stress and deal with stressors together (</span><a data-dcnode-id="4113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="4114" instrument_node="">Bodenmann, 1997</span></a><span data-dcnode-id="4112" instrument_node="">). Dyadic coping represents a dynamic transactional process in which one partner's coping is dependent on the other's. Stressors could be either daily hassles or major stressors like chronic illnesses. Four facets of dyadic coping (DC) are distinguished (</span><a data-dcnode-id="4110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B13"><span data-dcnode-id="4111" instrument_node="">Bodenmann, 2005</span></a><span data-dcnode-id="4109" instrument_node="">): common dyadic coping, when both partners are directly affected by the stress and work together to deal with it as a unit; supportive dyadic coping, in which one person is primarily affected and the other assists in their stress management; delegated dyadic coping, in which one partner is affected and the other takes over several tasks to reduce stress; and negative dyadic coping, where the partner attempts to help the actor cope but does so ineffectively, without motivation or in an ambivalent, superficial or hostile way. Apart from the Systemic Transactional Model (STM; </span><a data-dcnode-id="4107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B13"><span data-dcnode-id="4108" instrument_node="">Bodenmann, 2005</span></a><span data-dcnode-id="4106" instrument_node="">; </span><a data-dcnode-id="4104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B16"><span data-dcnode-id="4105" instrument_node="">Bodenmann et al., 2016</span></a><span data-dcnode-id="4103" instrument_node="">), communal coping (</span><a data-dcnode-id="4101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B72"><span data-dcnode-id="4102" instrument_node="">Lyons et al., 1998</span></a><span data-dcnode-id="4100" instrument_node="">), marital or couple coping (</span><a data-dcnode-id="4098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B92"><span data-dcnode-id="4099" instrument_node="">Revenson, 1994</span></a><span data-dcnode-id="4097" instrument_node="">; </span><a data-dcnode-id="4095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B96"><span data-dcnode-id="4096" instrument_node="">Revenson et al., 2005b</span></a><span data-dcnode-id="4094" instrument_node="">), collaborative coping (</span><a data-dcnode-id="4092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="4093" instrument_node="">Berg and Upchurch, 2007</span></a><span data-dcnode-id="4091" instrument_node="">), or relationship-focused coping (</span><a data-dcnode-id="4089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B30"><span data-dcnode-id="4090" instrument_node="">DeLongis and O'Brien, 1990</span></a><span data-dcnode-id="4088" instrument_node="">; </span><a data-dcnode-id="4086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="4087" instrument_node="">Coyne and Smith, 1991</span></a><span data-dcnode-id="4085" instrument_node="">) suggest theoretical frameworks for understanding coping processes in intimate relationships. For an integrative overview of DC models, see </span><a data-dcnode-id="4083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="4084" instrument_node="">Falconier and Kuhn (2019)</span></a><span data-dcnode-id="4082" instrument_node=""> and for theoretical frameworks on couples' coping with chronic illness, see </span><a data-dcnode-id="4080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B94"><span data-dcnode-id="4081" instrument_node="">Revenson and DeLongis (2011)</span></a><span data-dcnode-id="4079" instrument_node="">. In the context of chronic illness, DC may be understood along a continuum of partner involvement from non-involvement (the patient perceives that they are coping individually), joint problem-solving, and shared emotion regulation (</span><a data-dcnode-id="4077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B95"><span data-dcnode-id="4078" instrument_node="">Revenson and Hagedoorn, 2019</span></a><span data-dcnode-id="4076" instrument_node="">) to overinvolvement of the spouse (e.g., the patient perceives the spouse as controlling, engaging in miscarried helping) (</span><a data-dcnode-id="4074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="4075" instrument_node="">Berg and Upchurch, 2007</span></a><span data-dcnode-id="4073" instrument_node="">). As DC approaches are rooted in stress and coping literature (e.g., </span><a data-dcnode-id="4071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B62"><span data-dcnode-id="4072" instrument_node="">Lazarus and Folkman, 1984</span></a><span data-dcnode-id="4070" instrument_node="">), it has long been a field that has developed independently from the social support literature and particularly emphasizes the stress-coping interplay between partners dealing with adversity and illness. It is only recently that both fields have begun to merge (</span><a data-dcnode-id="4068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B28"><span data-dcnode-id="4069" instrument_node="">Cutrona et al., 2018</span></a><span data-dcnode-id="4067" instrument_node="">) and partner support theories have started to focus on the dyadic and dynamic nature of support as well (</span><a data-dcnode-id="4065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B31"><span data-dcnode-id="4066" instrument_node="">Donato et al., 2020</span></a><span data-dcnode-id="4064" instrument_node="">). For theoretical clarity, in this review we focus exclusively on DC studies, as only DC approaches address common, joint or collaborative DC, which proves to be particularly relevant in illness management (</span><a data-dcnode-id="4062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B94"><span data-dcnode-id="4063" instrument_node="">Revenson and DeLongis, 2011</span></a><span data-dcnode-id="4061" instrument_node="">).</span></p><span data-dcnode-id="4059" instrument_node="">
</span><p class="mb15" data-dcnode-id="4054"><span data-dcnode-id="4058" instrument_node="">Even though DC research emphasizes couple dynamics, the patient has quite often been the focal point in reporting on the couple's DC, thereby limiting information on the genuine dyadic nature of coping. However, recent studies mostly address patient and partner perspectives and their involvement in DC, yielding a more comprehensive understanding of DC in chronic illness (</span><a data-dcnode-id="4056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B3"><span data-dcnode-id="4057" instrument_node="">Badr and Acitelli, 2017</span></a><span data-dcnode-id="4055" instrument_node="">).</span></p><span data-dcnode-id="4053" instrument_node="">
</span><p class="mb15" data-dcnode-id="4033"><span data-dcnode-id="4052" instrument_node="">The literature on DC and physical illness includes a wide array of chronic illness conditions. However, the standard of knowledge in terms of physical illnesses covered in DC literature and specific differential findings for the various chronic conditions is currently unclear. Overall, there is a consensus that psychosocial adjustment of the patient is enhanced when patients perceive their partner to be involved in dealing with the illness, but only to a certain degree. Some forms of DC (such as overprotection, controlling, or protective buffering) are perceived as detrimental to adjustment (</span><a data-dcnode-id="4050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="4051" instrument_node="">Hagedoorn et al., 2000</span></a><span data-dcnode-id="4049" instrument_node="">; </span><a data-dcnode-id="4047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="4048" instrument_node="">Berg and Upchurch, 2007</span></a><span data-dcnode-id="4046" instrument_node="">; </span><a data-dcnode-id="4044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B61"><span data-dcnode-id="4045" instrument_node="">Langer et al., 2009</span></a><span data-dcnode-id="4043" instrument_node="">). Furthermore, as demonstrated in a cardiac population, partner hostility is negatively associated with patient engagement with the treatment (</span><a data-dcnode-id="4041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B90"><span data-dcnode-id="4042" instrument_node="">Rapelli et al., 2020</span></a><span data-dcnode-id="4040" instrument_node="">). Additionally, for cardiac patients, not only high levels of negative DC but also low levels of positive DC were detrimental to the patient (</span><a data-dcnode-id="4038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B91"><span data-dcnode-id="4039" instrument_node="">Rapelli et al., 2021</span></a><span data-dcnode-id="4037" instrument_node="">). Nevertheless, there is a need for a thorough overview of chronic illnesses that vary in terms of their timeline, consequences, level of control, and effects on identity coupled with in-depth consideration of the temporal process within DC in the context of chronic illness (</span><a data-dcnode-id="4035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="4036" instrument_node="">Berg and Upchurch, 2007</span></a><span data-dcnode-id="4034" instrument_node="">).</span></p><span data-dcnode-id="4032" instrument_node="">
</span><p class="mb0" data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node="">Thus the present narrative review sought to synthesize research on DC in couples affected by severe chronic physical illnesses. We included qualitative, quantitative, and mixed-methods studies in order to provide a comprehensive, complete picture. The research questions were the following: (1) How was the DC construct operationalized in the studies on chronic physical illness (dependent or independent variable or mediator/moderator) and what outcomes was it associated with? (2) How does the relevance of DC vary between different types of chronic physical illnesses depending on the extent of the supposed impact the illness has on relationship functioning?</span></p><span data-dcnode-id="4029" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="4028" id="h3" name="h3"></a><h2 data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node="">Methods</span></h2><span data-dcnode-id="4025" instrument_node="">
</span><p class="mb0" data-dcnode-id="4020"><span data-dcnode-id="4024" instrument_node="">A systematic review of DC in couples suffering from chronic physical illnesses was undertaken as part of a larger global systematic review of DC. Methods of the analysis and inclusion criteria were specified in advance and documented in a protocol. Where applicable for the narrative review, we followed the PRISMA guidelines (</span><a data-dcnode-id="4022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B68"><span data-dcnode-id="4023" instrument_node="">Liberati et al., 2009</span></a><span data-dcnode-id="4021" instrument_node="">).</span></p><span data-dcnode-id="4019" instrument_node="">
</span><h3 data-dcnode-id="4017"><span data-dcnode-id="4018" instrument_node="">Literature Search</span></h3><span data-dcnode-id="4016" instrument_node="">
</span><p class="mb15" data-dcnode-id="4008"><span data-dcnode-id="4015" instrument_node="">As part of a more general systematic review, we conducted a literature search on May 20, 2020 of the following electronic databases in the field of psychology: </span><i data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">Psycinfo, Psyndex</span></i><span data-dcnode-id="4012" instrument_node="">, and </span><i data-dcnode-id="4010"><span data-dcnode-id="4011" instrument_node="">Medline</span></i><span data-dcnode-id="4009" instrument_node="">. Search terms regarding DC were “dyadic coping,” “communal coping,” “couple coping,” “collaborative coping,” or “relationship-focused coping” published between 1990 and 2020.</span></p><span data-dcnode-id="4007" instrument_node="">
</span><p class="mb15" data-dcnode-id="3993"><span data-dcnode-id="4006" instrument_node="">Within identified sources, for this review we extracted only those references that focused on chronic physical illnesses. We used the following study and report eligibility criteria for selecting studies: (a) a focus on DC in romantic couples (or related terms such as collaborative coping or relationship-focused coping), (b) one partner suffering from a specific chronic illness (samples with mixed diagnoses were excluded to allow for contrast and comparison of specific chronic conditions), (c) articles published after 1990, since the first publications on the notion of dyadic coping emerged in the early 1990s (among others </span><a data-dcnode-id="4004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B15"><span data-dcnode-id="4005" instrument_node="">Bodenmann and Perrez, 1991</span></a><span data-dcnode-id="4003" instrument_node="">; </span><a data-dcnode-id="4001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="4002" instrument_node="">Coyne and Smith, 1991</span></a><span data-dcnode-id="4000" instrument_node="">; </span><a data-dcnode-id="3998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B92"><span data-dcnode-id="3999" instrument_node="">Revenson, 1994</span></a><span data-dcnode-id="3997" instrument_node="">; </span><a data-dcnode-id="3995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B73"><span data-dcnode-id="3996" instrument_node="">Lyons et al., 1995</span></a><span data-dcnode-id="3994" instrument_node="">), (d) reporting on empirical data, (e) published in English, German, Spanish, French, or Portuguese since these are the languages with the most research activity in DC research, (f) published as a peer-reviewed article, book, editor-reviewed book chapter, or dissertation. When studies were published in parallel in a dissertation and peer-reviewed journal articles, we drew on the journal articles.</span></p><span data-dcnode-id="3992" instrument_node="">
</span><p class="mb0" data-dcnode-id="3990"><span data-dcnode-id="3991" instrument_node="">We excluded studies that either dealt exclusively with individual processes or outcomes or reported on social support, spousal support, or dyadic adjustment only. This ensured that only studies were considered that focus on dyadic appraisals, support responsiveness, and DC in dealing with physical illness as a stressor in order to warrant at least a certain level of homogeneity. Including the literature of the associated concept of spousal support was beyond the scope of this review.</span></p><span data-dcnode-id="3989" instrument_node="">
</span><h3 data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">Study Selection</span></h3><span data-dcnode-id="3986" instrument_node="">
</span><p class="mb0" data-dcnode-id="3981"><span data-dcnode-id="3985" instrument_node="">The initial search yielded 5,330 publications. </span><a data-dcnode-id="3983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F1"><span data-dcnode-id="3984" instrument_node="">Figure 1</span></a><span data-dcnode-id="3982" instrument_node=""> shows the flow chart of the study identification, retrieval, and the number of eligible articles. A senior researcher and two PhD students, assisted by graduate students, carried out screenings and data extraction. Studies were double-checked and where there was disagreement coders consulted with other members of the coding team until agreement was reached. We removed 1,077 duplicates and screened the titles and abstracts of the remaining references for eligibility. Three thousand five hundred one publications were excluded at this step. Where there was insufficient information, references were carried to the next step, in which full texts were retrieved and screened. When full texts were not available, authors were contacted if we could find an address. Unfortunately, quite a number of unavailable sources were dissertations. Ten references were added after hand searches of reference lists of included articles or thanks to authors who provided us with their full-text publications. After assessing the full texts, 713 additional sources were excluded.</span></p><span data-dcnode-id="3980" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="3979"></div><span data-dcnode-id="3978" instrument_node="">
</span><div class="Imageheaders" data-dcnode-id="3976"><span data-dcnode-id="3977" instrument_node="">FIGURE 1</span></div><span data-dcnode-id="3975" instrument_node="">

</span><div class="DottedLine" data-dcnode-id="3960"></div><span data-dcnode-id="3959" instrument_node="">
</span><p class="mb0 w100pc float_left mt15" data-dcnode-id="3924"><span data-dcnode-id="3958" instrument_node="">While sorting the included publications, we came across existing current reviews on certain physical illnesses. Where this was the case, we referred to the reviews and excluded these illnesses from the current review. This included the following physical illnesses: cancer (</span><a data-dcnode-id="3956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B77"><span data-dcnode-id="3957" instrument_node="">McLean and Jones, 2007</span></a><span data-dcnode-id="3955" instrument_node="">; </span><a data-dcnode-id="3953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="3954" instrument_node="">Baik and Adams, 2011</span></a><span data-dcnode-id="3952" instrument_node="">; </span><a data-dcnode-id="3950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B4"><span data-dcnode-id="3951" instrument_node="">Badr and Krebs, 2013</span></a><span data-dcnode-id="3949" instrument_node="">; </span><a data-dcnode-id="3947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B66"><span data-dcnode-id="3948" instrument_node="">Li and Loke, 2014a</span></a><span data-dcnode-id="3946" instrument_node="">,</span><a data-dcnode-id="3944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B67"><span data-dcnode-id="3945" instrument_node="">b</span></a><span data-dcnode-id="3943" instrument_node="">; </span><a data-dcnode-id="3941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B108"><span data-dcnode-id="3942" instrument_node="">Traa et al., 2015</span></a><span data-dcnode-id="3940" instrument_node="">; </span><a data-dcnode-id="3938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B54"><span data-dcnode-id="3939" instrument_node="">Kayser et al., 2018</span></a><span data-dcnode-id="3937" instrument_node="">; </span><a data-dcnode-id="3935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B69"><span data-dcnode-id="3936" instrument_node="">Luo et al., 2020</span></a><span data-dcnode-id="3934" instrument_node="">), cardiovascular disease (</span><a data-dcnode-id="3932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B113"><span data-dcnode-id="3933" instrument_node="">Trump and Mendenhall, 2017</span></a><span data-dcnode-id="3931" instrument_node="">), chronic pain (</span><a data-dcnode-id="3929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B89"><span data-dcnode-id="3930" instrument_node="">Prenevost and Reme, 2017</span></a><span data-dcnode-id="3928" instrument_node="">), and multiple sclerosis (</span><a data-dcnode-id="3926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B20"><span data-dcnode-id="3927" instrument_node="">Busch et al., 2014</span></a><span data-dcnode-id="3925" instrument_node="">). To avoid double counting of samples, we juxtaposed authors' names, study designs, sample sizes, and outcomes of included publications. The final sample of studies included 49 publications based on 33 distinct data sets.</span></p><span data-dcnode-id="3923" instrument_node="">
</span><h3 data-dcnode-id="3921"><span data-dcnode-id="3922" instrument_node="">Data Extraction and Quality Appraisal</span></h3><span data-dcnode-id="3920" instrument_node="">
</span><p class="mb15" data-dcnode-id="3909"><span data-dcnode-id="3919" instrument_node="">We followed the principles of narrative synthesis to explore relationships within and between qualitative, quantitative, and mixed methods studies (</span><a data-dcnode-id="3917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B88"><span data-dcnode-id="3918" instrument_node="">Popay et al., 2006</span></a><span data-dcnode-id="3916" instrument_node="">; </span><a data-dcnode-id="3914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B49"><span data-dcnode-id="3915" instrument_node="">Hong et al., 2017</span></a><span data-dcnode-id="3913" instrument_node="">) and developed a data extraction sheet. Two researchers extracted data from each paper independently using a predefined protocol, resolving disagreements by discussion. We entered each publication into a table (see </span><a data-dcnode-id="3911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23h11"><span data-dcnode-id="3912" instrument_node="">Supplementary Material</span></a><span data-dcnode-id="3910" instrument_node="">) sorted by study type (qualitative, quantitative, intervention trial, or mixed methods). In these tables, we identified the authors, title, year of publication, study design, sample (age, gender, relationship duration, country, illness), DC measures, non-DC measures, type of intervention (where applicable), measurement time points, and main findings.</span></p><span data-dcnode-id="3908" instrument_node="">
</span><p class="mb0" data-dcnode-id="3888"><span data-dcnode-id="3907" instrument_node="">In order to evaluate study quality, we included a quality assessment for all publications. We used different assessment tools for intervention studies, quantitative, and qualitative studies. Mixed methods studies were assessed with both the qualitative and quantitative assessment tools. All questions were rated “yes,” “no,” or “cannot determine.” For intervention studies, we used the 14-item Study Quality Assessment Tools for controlled intervention studies of the National Institute of Health (NIH; </span><a data-dcnode-id="3905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B82"><span data-dcnode-id="3906" instrument_node="">National Institute of Health, 2014a</span></a><span data-dcnode-id="3904" instrument_node="">). Study quality was rated as “good” when assessors answered “yes” to eleven or more questions, “adequate” in the case of six to ten answers of “yes,” or “poor” in the case of less than six answers of “yes.” For quantitative studies, we utilized an adapted version of the NIH Quality Assessment Tool for Observational Cohort and Cross-Sectional Studies (</span><a data-dcnode-id="3902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B83"><span data-dcnode-id="3903" instrument_node="">National Institute of Health, 2014b</span></a><span data-dcnode-id="3901" instrument_node="">). We excluded five items that referred to cohort studies only, leaving nine questions. Study quality was rated as “good” when assessors answered “yes” to seven or more questions, “adequate” in the case of five or six answers of “yes,” or “poor” in the case of less than four answers of “yes.” Quality assessment of qualitative studies was based on the 10-item checklist of the Critical Appraisal Skills Programme (CASP; </span><a data-dcnode-id="3899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B27"><span data-dcnode-id="3900" instrument_node="">Critical Appraisal Skills Programme, 2018</span></a><span data-dcnode-id="3898" instrument_node="">). As proposed by </span><a data-dcnode-id="3896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B64"><span data-dcnode-id="3897" instrument_node="">Lehane et al. (2017)</span></a><span data-dcnode-id="3895" instrument_node="">, studies received a quality rating of “good” when assessors answered “yes” to eight or more questions, a rating of “adequate” for six or seven answers of “yes” and a rating of “poor” for less than six answers of “yes.” We refrained from excluding studies that had low quality assessment ratings, since quality appraisal was only a rough estimate of study quality and the concordance and comparability of quality ratings between the assessment tools could not be verified. Most included publications were deemed “adequate” (</span><i data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">k</span></i><span data-dcnode-id="3892" instrument_node=""> = 33, 67.4%), with some rated “good” (</span><i data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">k</span></i><span data-dcnode-id="3889" instrument_node=""> = 12, 24.5%) and two (4.1%) rated “adequate” to “good,” while only two publications (4.1%) were lacking in rigor and thus rated “poor.”</span></p><span data-dcnode-id="3887" instrument_node="">
</span><h3 data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">Data Analysis</span></h3><span data-dcnode-id="3884" instrument_node="">
</span><p class="mb15" data-dcnode-id="3876"><span data-dcnode-id="3883" instrument_node="">We deemed a narrative synthesis approach an appropriate method to synthesize our data, since this allows the inclusion of qualitative, quantitative, and mixed methods studies. It adopts a textual approach allowing interpretative synthetization and evaluation of the findings. In our adapted narrative synthesis, we followed three stages of the narrative synthesis (</span><a data-dcnode-id="3881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B88"><span data-dcnode-id="3882" instrument_node="">Popay et al., 2006</span></a><span data-dcnode-id="3880" instrument_node="">): (1) developing a preliminary synthesis; (2) exploring relationships within and between studies; and (3) assessing the robustness of the synthesis. The preliminary synthesis involved writing a short descriptive summary of each study. To ensure consistency, these narrative descriptions were produced in a systematic way; the same set of information was extracted from each study (</span><a data-dcnode-id="3878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B88"><span data-dcnode-id="3879" instrument_node="">Popay et al., 2006</span></a><span data-dcnode-id="3877" instrument_node="">). Narrative evidence was clustered according to the type of physical illness. Within each chronic physical illness, findings were written up with the aim of condensing similar and overlapping findings and at the same time keeping the complexity of differential findings. Additionally, we appraised the robustness of the studies through the quality assessment process. Less robust study findings were pointed out for individual studies only in cases of contradictory results or when deemed relevant. Mostly, this pertained to studies lacking in test power or failing to use valid and reliable measures. Overall evaluation of study quality will be addressed in the discussion section.</span></p><span data-dcnode-id="3875" instrument_node="">
</span><p class="mb0" data-dcnode-id="3867"><span data-dcnode-id="3874" instrument_node="">One way to cluster the various illnesses is to draw on specific aspects of the disease which are relevant for coping: (1) How do the symptom and treatment burden (</span><a data-dcnode-id="3872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B100"><span data-dcnode-id="3873" instrument_node="">Sav et al., 2015</span></a><span data-dcnode-id="3871" instrument_node="">) impact on the couple's relationship, on their sexual relationship, and on work and social activities (</span><a data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B18"><span data-dcnode-id="3870" instrument_node="">Bouras et al., 1986</span></a><span data-dcnode-id="3868" instrument_node="">)? (2) How much care and taking over of tasks is required of the healthy partner? (3) Additionally, we would expect to find the greatest impacts on the individual as well as the couple in life-limiting (timeline) and degenerative illnesses (level of control). Self-evidently, this effort to cluster chronic physical illnesses can only be a crude approximation: depending on the degree of severity or the stage of the illness or comorbid mental or physical health, the impact on the couple may vary greatly within and between diseases. Following these aforementioned facets of chronic illness, we propose three clusters based on theoretical reflections. It is assumed that life-limiting and degenerative illnesses such as cystic fibrosis, Parkinson's, COPD, and renal diseases have a particularly strong impact on a couple's relationship (cluster I). Other diseases are less life-limiting but still have a high impact on the couple, with the affected individual needing care support from the partner on a regular basis or episodically, as in the case of individuals with arthritis or stroke survivors, for instance. Additionally, diabetes mellitus which has a strong impact on the couple in terms of lifestyle and diet (cluster II). Other chronic diseases affect the marital relationship or the sexual relationship, in particular diseases such as human immunodeficiency virus (HIV) or endometriosis (cluster III).</span></p><span data-dcnode-id="3866" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="3865" id="h4" name="h4"></a><h2 data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node="">Results</span></h2><span data-dcnode-id="3862" instrument_node="">
</span><p class="mb15" data-dcnode-id="3821"><span data-dcnode-id="3861" instrument_node="">Forty-nine publications based on thirty-three data sets were included in this review (</span><i data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">k</span></i><span data-dcnode-id="3858" instrument_node=""> = 21 quantitative, </span><i data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">k</span></i><span data-dcnode-id="3855" instrument_node=""> = 10 qualitative, and </span><i data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">k</span></i><span data-dcnode-id="3852" instrument_node=""> = 2 mixed-methods samples; for details of extracted data see </span><a data-dcnode-id="3850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23SM1"><span data-dcnode-id="3851" instrument_node="">Supplementary Table 1</span></a><span data-dcnode-id="3849" instrument_node="">: quantitative studies, </span><a data-dcnode-id="3847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23SM1"><span data-dcnode-id="3848" instrument_node="">Supplementary Table 2</span></a><span data-dcnode-id="3846" instrument_node="">: qualitative studies, </span><a data-dcnode-id="3844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23SM1"><span data-dcnode-id="3845" instrument_node="">Supplementary Table 3</span></a><span data-dcnode-id="3843" instrument_node="">: mixed methods studies, </span><a data-dcnode-id="3841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23SM1"><span data-dcnode-id="3842" instrument_node="">Supplementary Table 4</span></a><span data-dcnode-id="3840" instrument_node="">: intervention studies). The studies differed with regard to the underlying DC model. Hence the operationalization of DC in the quantitative studies varied considerably, mainly using instruments created by the authors </span><i data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">ad hoc</span></i><span data-dcnode-id="3837" instrument_node=""> for the specific purpose of the study (</span><i data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">k</span></i><span data-dcnode-id="3834" instrument_node=""> = 9, 21.4%); 6 (14.3%) studies used the Dyadic Coping Inventory (</span><a data-dcnode-id="3832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B14"><span data-dcnode-id="3833" instrument_node="">Bodenmann, 2008</span></a><span data-dcnode-id="3831" instrument_node="">), a further 6 (14.3%) publications used a behavioral coding of DC, Ways of Giving Support (</span><a data-dcnode-id="3829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B21"><span data-dcnode-id="3830" instrument_node="">Buunk et al., 1996</span></a><span data-dcnode-id="3828" instrument_node="">) was utilized by 3 (7.1%) studies, 3 (7.1%) publications used the Overprotection Scale (</span><a data-dcnode-id="3826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="3827" instrument_node="">Hagedoorn et al., 2000</span></a><span data-dcnode-id="3825" instrument_node="">), another 3 (7.1%) studies measured DC with the proportion of first-person plural pronouns use, and 12 (28.6%) studies used other reliable DC measures (see </span><a data-dcnode-id="3823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23SM1"><span data-dcnode-id="3824" instrument_node="">Supplementary Table 1</span></a><span data-dcnode-id="3822" instrument_node="">). With respect to DC operationalization in the study design, of the 25 quantitative studies, DC was the independent variable in 14 publications (56%), the dependent variable in four publications (16%), both dependent and independent in two publications (8%), independent and moderator in two publications (8%), mediator in one study (4%), and moderator also in one study (4%). One quantitative study did not fit into this categorization because it assessed a newly developed DC measure.</span></p><span data-dcnode-id="3820" instrument_node="">
</span><p class="mb15" data-dcnode-id="3752"><span data-dcnode-id="3819" instrument_node="">For longitudinal studies, study duration ranged from 14 days (</span><a data-dcnode-id="3817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B131"><span data-dcnode-id="3818" instrument_node="">Zajdel et al., 2018</span></a><span data-dcnode-id="3816" instrument_node="">) to 36 months (</span><a data-dcnode-id="3814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B119"><span data-dcnode-id="3815" instrument_node="">Vaske et al., 2015</span></a><span data-dcnode-id="3813" instrument_node="">). Sample size varied greatly. For quantitative studies, total sample size was </span><i data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">n</span></i><span data-dcnode-id="3810" instrument_node=""> = 4,736 (</span><i data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">M</span></i><span data-dcnode-id="3807" instrument_node=""> = 225.52, </span><i data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">SD</span></i><span data-dcnode-id="3804" instrument_node=""> = 162.15) and ranged between 20 dyads (</span><i data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">n</span></i><span data-dcnode-id="3801" instrument_node=""> = 40; </span><a data-dcnode-id="3799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B98"><span data-dcnode-id="3800" instrument_node="">Robinson-Smith et al., 2016</span></a><span data-dcnode-id="3798" instrument_node="">) and 280 dyads (</span><i data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">n</span></i><span data-dcnode-id="3795" instrument_node=""> = 560; </span><a data-dcnode-id="3793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B110"><span data-dcnode-id="3794" instrument_node="">Trief et al., 2016</span></a><span data-dcnode-id="3792" instrument_node="">). For qualitative studies, total sample size was </span><i data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">n</span></i><span data-dcnode-id="3789" instrument_node=""> = 446 (</span><i data-dcnode-id="3787"><span data-dcnode-id="3788" instrument_node="">M</span></i><span data-dcnode-id="3786" instrument_node=""> = 40.55, </span><i data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">SD</span></i><span data-dcnode-id="3783" instrument_node=""> = 21.38) and ranged between seven dyads (</span><i data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">n</span></i><span data-dcnode-id="3780" instrument_node=""> = 14; </span><a data-dcnode-id="3778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B99"><span data-dcnode-id="3779" instrument_node="">Robinson-Smith and Mahoney, 1995</span></a><span data-dcnode-id="3777" instrument_node="">) and 36 dyads (</span><i data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">n</span></i><span data-dcnode-id="3774" instrument_node=""> = 72; </span><a data-dcnode-id="3772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B97"><span data-dcnode-id="3773" instrument_node="">Rispel et al., 2012</span></a><span data-dcnode-id="3771" instrument_node="">). The mixed methods studies had a total sample of </span><i data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">n</span></i><span data-dcnode-id="3768" instrument_node=""> = 298 participants (</span><i data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">M</span></i><span data-dcnode-id="3765" instrument_node=""> = 149.00; </span><i data-dcnode-id="3763"><span data-dcnode-id="3764" instrument_node="">SD</span></i><span data-dcnode-id="3762" instrument_node=""> = 85.00) and a range between 32 dyads (</span><a data-dcnode-id="3760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B76"><span data-dcnode-id="3761" instrument_node="">McCarthy, 2012</span></a><span data-dcnode-id="3759" instrument_node="">) and 117 dyads (</span><a data-dcnode-id="3757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="3758" instrument_node="">Gamarel, 2014</span></a><span data-dcnode-id="3756" instrument_node="">; </span><a data-dcnode-id="3754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="3755" instrument_node="">Gamarel et al., 2016</span></a><span data-dcnode-id="3753" instrument_node="">).</span></p><span data-dcnode-id="3751" instrument_node="">
</span><p class="mb15" data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">Regarding type of physical illness, 23 out of 49 (46.9%) publications examined diabetes, 8 (16.3%) studies concerned arthritis, 4 (8.2%) studies examined HIV, 4 (8.2%) studies concerned stroke, 3 (6.1%) studies examined COPD, 2 (4.1%) studies examined Parkinson's disease, 2 (4.1%) studies focused on renal diseases, and single studies (2.0%) focused on cystic fibrosis, endometriosis, and lupus erythematosus.</span></p><span data-dcnode-id="3748" instrument_node="">
</span><p class="mb0" data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">Ethnic and cultural diversity was low. The majority of data sets were from the US (23 out of 33, 69.7%, with mostly Caucasian samples), six data sets were from Western Europe (18.2%), two data sets from Sub-Saharan Africa (6.1%), one was from Israel (3.0%), and one with a mixed sample was from the US and Australia (3.0%). Heterosexuality was the norm, with the exception of HIV-positive samples, where both homo- and heterosexual couples were included. We present the evidence organized by the three clusters of impact and sort results within each cluster by chronic condition. We focused on results regarding DC as an independent variable, dependent variable, or moderator/mediator, and structured the presentation of results accordingly for each chronic condition. Furthermore, the focus was on evidence from longitudinal data followed by intervention trials, cross-sectional, correlational data and psychometric studies. This quantitative evidence was then complemented by mixed methods and qualitative evidence where available.</span></p><span data-dcnode-id="3745" instrument_node="">
</span><h3 data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">Cluster I</span></h3><span data-dcnode-id="3742" instrument_node="">
</span><h4 class="pt0" data-dcnode-id="3740"><span data-dcnode-id="3741" instrument_node="">Chronic Obstructive Pulmonary Disease</span></h4><span data-dcnode-id="3739" instrument_node="">
</span><p class="mb15" data-dcnode-id="3725"><span data-dcnode-id="3738" instrument_node="">Chronic obstructive pulmonary disease (COPD) is a progressive lung disease characterized by shortness of breath and coughing, often caused by tobacco smoking or indoor and outdoor air pollution (</span><a data-dcnode-id="3736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B87"><span data-dcnode-id="3737" instrument_node="">Pauwels et al., 2001</span></a><span data-dcnode-id="3735" instrument_node="">). Shortness of breath may lead to fewer activities, thus affecting couples' shared activities and their social life. Additionally, the healthy partner may need to take over tasks. For COPD, three publications based on two quantitative data sets were included (</span><a data-dcnode-id="3733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B79"><span data-dcnode-id="3734" instrument_node="">Meier et al., 2011</span></a><span data-dcnode-id="3732" instrument_node="">, </span><a data-dcnode-id="3730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B78"><span data-dcnode-id="3731" instrument_node="">2012</span></a><span data-dcnode-id="3729" instrument_node="">; </span><a data-dcnode-id="3727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B119"><span data-dcnode-id="3728" instrument_node="">Vaske et al., 2015</span></a><span data-dcnode-id="3726" instrument_node="">). COPD patients in these samples were mostly male. DC was examined using correlational designs, but two publications each reported data on DC as the dependent variable and DC as the independent variable.</span></p><span data-dcnode-id="3724" instrument_node="">
</span><p class="mb15" data-dcnode-id="3716"><span data-dcnode-id="3723" instrument_node="">When DC was examined as the independent variable, in a German 3-year longitudinal study (</span><a data-dcnode-id="3721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B119"><span data-dcnode-id="3722" instrument_node="">Vaske et al., 2015</span></a><span data-dcnode-id="3720" instrument_node="">), patients' quality of life at follow-up was positively influenced by partners' stress communication at baseline. Partners' quality of life at follow-up was negatively influenced by patients' negative DC and positively influenced by partners' delegated DC as rated by patients. The authors did not report any effect sizes on these analyses. The results of the study suggested that partners of COPD patients strongly supported the patients but received little support in return. Patient perceived imbalance in delegated DC was associated with lower quality of life in couples (</span><a data-dcnode-id="3718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B79"><span data-dcnode-id="3719" instrument_node="">Meier et al., 2011</span></a><span data-dcnode-id="3717" instrument_node="">). Quality of life of partners seemed to benefit when patients were able to communicate about their stress and provided delegated DC on their part.</span></p><span data-dcnode-id="3715" instrument_node="">
</span><p class="mb0" data-dcnode-id="3701"><span data-dcnode-id="3714" instrument_node="">For the publications with DC as the dependent variable based on one data set, the relevance of anxious and depressive symptoms for DC were examined (</span><a data-dcnode-id="3712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B79"><span data-dcnode-id="3713" instrument_node="">Meier et al., 2011</span></a><span data-dcnode-id="3711" instrument_node="">, </span><a data-dcnode-id="3709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B78"><span data-dcnode-id="3710" instrument_node="">2012</span></a><span data-dcnode-id="3708" instrument_node="">). COPD patients with additional depressive symptoms were supported more often and attributed deficits in dyadic coping primarily to themselves. Partners with additional depressive symptoms reported more negative coping on their part and on that of their partners. Additionally, DC was compared in healthy couples with COPD couples (</span><a data-dcnode-id="3706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B78"><span data-dcnode-id="3707" instrument_node="">Meier et al., 2012</span></a><span data-dcnode-id="3705" instrument_node="">). Compared with the healthy control group, COPD patients and their partners stated that the patients received more DC and were less able to provide their partners with support. In addition, couples with COPD perceived higher levels of negative DC and reported less positive DC (</span><a data-dcnode-id="3703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B78"><span data-dcnode-id="3704" instrument_node="">Meier et al., 2012</span></a><span data-dcnode-id="3702" instrument_node="">). The authors did not report any effect sizes for these analyses.</span></p><span data-dcnode-id="3700" instrument_node="">
</span><h4 data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">Cystic Fibrosis</span></h4><span data-dcnode-id="3697" instrument_node="">
</span><p class="mb0" data-dcnode-id="3689"><span data-dcnode-id="3696" instrument_node="">Cystic fibrosis is an inherited, progressive, and life-limiting disorder. Main symptoms include periodic respiratory infection, coughing fits, shortness of breath, intestinal blockage, diarrhea, and fertility problems. Affected individuals need to follow a strict treatment routine to manage symptoms and enhance life expectancy (</span><a data-dcnode-id="3694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B81"><span data-dcnode-id="3695" instrument_node="">Naehrig et al., 2017</span></a><span data-dcnode-id="3693" instrument_node="">). This condition has severe effects on the marital relationship, because of the degenerative and life-limiting nature and dealing with uncertainty and daily challenges. One qualitative study from Israel (</span><a data-dcnode-id="3691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B122"><span data-dcnode-id="3692" instrument_node="">Werner et al., 2020</span></a><span data-dcnode-id="3690" instrument_node="">) dealt with couples coping with cystic fibrosis (CF). Due to the early onset and life-limiting course of CF, couples were on average younger than samples with other chronic diseases. In the interview study, two main ways of dealing with CF as a couple were observed: cooperation vs. tension. Findings pointed to three dyadic qualities that supported coping as a couple, and distinguished between the two patterns of DC: mutual empathy, division of roles, and open, direct, and congruent communication about the illness.</span></p><span data-dcnode-id="3688" instrument_node="">
</span><h3 data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">Cluster II</span></h3><span data-dcnode-id="3685" instrument_node="">
</span><h4 class="pt0" data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">Arthritis and Lupus Erythematosus</span></h4><span data-dcnode-id="3682" instrument_node="">
</span><p class="mb15" data-dcnode-id="3671"><span data-dcnode-id="3681" instrument_node="">Nine publications were included (</span><i data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">k</span></i><span data-dcnode-id="3678" instrument_node=""> = 2 qualitative, </span><i data-dcnode-id="3676"><span data-dcnode-id="3677" instrument_node="">k</span></i><span data-dcnode-id="3675" instrument_node=""> = 7 quantitative). Patients were mostly women suffering from rheumatoid arthritis (RA) or osteoarthritis, or, in one study, osteoarthritis with comorbid diabetes and lupus erythematosus. Arthritis is a general term for various conditions that typically include symptoms of joint pain and stiffness. Arthritis is currently a leading cause of work disability in the US (</span><a data-dcnode-id="3673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B22"><span data-dcnode-id="3674" instrument_node="">Centers for Disease Control and Prevention, 2020</span></a><span data-dcnode-id="3672" instrument_node="">). Arthritis can be a degenerative condition with high levels of comorbidity, affecting the couple relationship in terms of care and taking over of tasks by the non-affected partner while also impacting on the sexual relationship as well as work and social activities.</span></p><span data-dcnode-id="3670" instrument_node="">
</span><p class="mb15" data-dcnode-id="3644"><span data-dcnode-id="3669" instrument_node="">Improving DC for pain management was the focus of four publications based on two different interventions. One intervention comprised training of pain coping skills and couple skills designed to supplement and reinforce the patient's pain coping skills in couples in which one partner suffered from osteoarthritis with persistent knee pain. This intervention was tested in two different US-based RCTs (</span><a data-dcnode-id="3667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B58"><span data-dcnode-id="3668" instrument_node="">Keefe et al., 1996</span></a><span data-dcnode-id="3666" instrument_node="">, </span><a data-dcnode-id="3664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B59"><span data-dcnode-id="3665" instrument_node="">1999</span></a><span data-dcnode-id="3663" instrument_node="">, </span><a data-dcnode-id="3661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B57"><span data-dcnode-id="3662" instrument_node="">2004</span></a><span data-dcnode-id="3660" instrument_node="">). The spouse-assisted cognitive behavioral coping skills training (SA-CST) emphasized active learning. Skills and communication behavior were practiced in group sessions and couples were encouraged to practice at home as well. Control conditions were arthritis education or individual coping skills training with or without additional exercise training. In both studies, intervention benefits were specific: spouse-assisted training, either alone or in combination with exercise training, was found to produce improvements in coping and self-efficacy, whereas exercise training, either alone or in combination with spouse-assisted coping skills training, produced improvements in physical fitness and muscle strength (</span><a data-dcnode-id="3658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B58"><span data-dcnode-id="3659" instrument_node="">Keefe et al., 1996</span></a><span data-dcnode-id="3657" instrument_node="">, </span><a data-dcnode-id="3655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B57"><span data-dcnode-id="3656" instrument_node="">2004</span></a><span data-dcnode-id="3654" instrument_node="">). Additionally, patients undergoing SA-CST had significantly lower post-treatment levels of pain and psychological disability and showed less pain behavior post-treatment than patients in a control group receiving arthritis education combined with spousal support (</span><a data-dcnode-id="3652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B58"><span data-dcnode-id="3653" instrument_node="">Keefe et al., 1996</span></a><span data-dcnode-id="3651" instrument_node="">, </span><a data-dcnode-id="3649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B59"><span data-dcnode-id="3650" instrument_node="">1999</span></a><span data-dcnode-id="3648" instrument_node="">). The beneficial effects of SA-CST on coping and self-efficacy were still visible at 12-month follow-up (</span><a data-dcnode-id="3646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B59"><span data-dcnode-id="3647" instrument_node="">Keefe et al., 1999</span></a><span data-dcnode-id="3645" instrument_node="">). It is important to mention that this study was rated “poor” in our quality assessment process, mainly because the publication lacked data on the reporting of the sample, the method of randomization, and the treatment.</span></p><span data-dcnode-id="3643" instrument_node="">
</span><p class="mb15" data-dcnode-id="3638"><span data-dcnode-id="3642" instrument_node="">A Dutch non-randomized controlled trial tested the benefit of partner participation in cognitive-behavioral self-management group treatment for patients with RA (</span><a data-dcnode-id="3640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B115"><span data-dcnode-id="3641" instrument_node="">van Lankveld et al., 2004</span></a><span data-dcnode-id="3639" instrument_node="">). The intervention with the partner attending did not differ from the intervention without the partner, either in terms of content or effectiveness post-intervention. At 6-month follow-up, those patients with the partner attending reported better communication. However, since the intervention was educational and covered the same content in both conditions, it may be deduced that specific content focusing on the couples' interaction might be called for.</span></p><span data-dcnode-id="3637" instrument_node="">
