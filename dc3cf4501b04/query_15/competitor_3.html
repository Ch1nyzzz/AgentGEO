</span><div class="clear" data-dcnode-id="3213"></div><span data-dcnode-id="3212" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="3211"></div><span data-dcnode-id="3210" instrument_node="">
</span><p class="mb15 w100pc float_left mt15" data-dcnode-id="3196"><span data-dcnode-id="3209" instrument_node="">In the following, we will focus on a number of further differential aspects that were apparent above and beyond the beneficial aspects of DC for individual chronic physical health conditions (see </span><a data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="3208" instrument_node="">Table 1</span></a><span data-dcnode-id="3206" instrument_node=""> for an overview). Firstly, a differential effect of DC in early- and late-onset illnesses became apparent across the included studies, which has already been discussed in a previous review (</span><a data-dcnode-id="3204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="3205" instrument_node="">Berg and Upchurch, 2007</span></a><span data-dcnode-id="3203" instrument_node="">). For instance, young people with type 1 diabetes who have had diabetes for many years and were diagnosed in childhood represent an interesting group. They have already learned to manage diabetes on their own before entering into a committed relationship and therefore DC might play another role compared to couples confronted with an emerging disease within their relationship (</span><a data-dcnode-id="3201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="3202" instrument_node="">Berg et al., 2020</span></a><span data-dcnode-id="3200" instrument_node="">). Dealing with their health condition independently may have been a relevant part of their individuation process while they were growing up. For the early-onset illness patients it seemed to be more difficult to share illness appraisals with their partners, as they perceive an imbalance of illness-related knowledge and skills. This experience seemed similar for couples with COPD and cystic fibrosis. On the other hand, in couples with late-onset illnesses, an understanding of the illness as a “we-disease” (</span><a data-dcnode-id="3198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B56"><span data-dcnode-id="3199" instrument_node="">Kayser et al., 2007</span></a><span data-dcnode-id="3197" instrument_node="">) may be more logical, as the disease occurred during the intimate relationship. This shared experience of the onset might facilitate shared appraisals and mutual acceptation of the chronic illness as a shared task. Yet another picture emerged for couples in which the woman was suffering from dyspareunia due to endometriosis.</span></p><span data-dcnode-id="3195" instrument_node="">
</span><p class="mb15" data-dcnode-id="3187"><span data-dcnode-id="3194" instrument_node="">Secondly, another differential effect was visible in the case of stroke. A sudden onset out of the blue with related severe physical restrictions seemed to be particularly stressful to stroke survivors as well as their partners, with a high incidence of comorbid depressive symptoms in both (</span><a data-dcnode-id="3192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B98"><span data-dcnode-id="3193" instrument_node="">Robinson-Smith et al., 2016</span></a><span data-dcnode-id="3191" instrument_node="">; </span><a data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B106"><span data-dcnode-id="3190" instrument_node="">Terrill et al., 2018</span></a><span data-dcnode-id="3188" instrument_node="">). In these couples and in couples with Parkinson's disease, the fear of burdening the healthy partner and draining the caregiver were particularly visible.</span></p><span data-dcnode-id="3186" instrument_node="">
</span><p class="mb15" data-dcnode-id="3181"><span data-dcnode-id="3185" instrument_node="">Third, an additional facet of DC was captured in the case of serodiscordant couples with HIV/AIDS: not only caring for the ill partner but also preventing infection of the healthy spouse added a more vital note to DC. This was particularly visible in the Ugandan and Zambian sample of heterosexual couples and the threat to the woman's life if the partner was not concerned about her health (</span><a data-dcnode-id="3183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B80"><span data-dcnode-id="3184" instrument_node="">Montgomery et al., 2012</span></a><span data-dcnode-id="3182" instrument_node="">). This aspect of DC was correspondingly visible in the US samples with HIV, however to a slightly less vital degree, since theses couples reported receiving HIV treatment leading to a suppressed viral load and pre-exposure prophylaxis for the non-HIV partner. Still, the relevance of open communication, trust, and collaborative coping in medication adherence have a high relevance for both partners not just the one with the illness.</span></p><span data-dcnode-id="3180" instrument_node="">
</span><p class="mb15" data-dcnode-id="3166"><span data-dcnode-id="3179" instrument_node="">Additionally, gender, cohort, and sociocultural effects were found across the included studies. Disentangling the role of patient/partner and the influence of gender is difficult (</span><a data-dcnode-id="3177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B93"><span data-dcnode-id="3178" instrument_node="">Revenson et al., 2005a</span></a><span data-dcnode-id="3176" instrument_node="">). In light of traditional gender roles, women assume a disproportionate share of responsibilities for maintaining the family's organization and providing nurturance to family members, going along with higher expectations that they will provide DC (</span><a data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B93"><span data-dcnode-id="3175" instrument_node="">Revenson et al., 2005a</span></a><span data-dcnode-id="3173" instrument_node="">). Adaptations in role responsibilities outside traditional gender roles lead to differential effects of disease, for instance in the case of diabetes, RA, or stroke. In a similar vein, </span><a data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B93"><span data-dcnode-id="3172" instrument_node="">Revenson et al. (2005a)</span></a><span data-dcnode-id="3170" instrument_node=""> described that due to the traditionally unequal division of household labor, a greater work load was placed on healthy female spouses when the male partner suffered from a chronic condition vs. getting outside help when the woman was the one with the chronic illness. Similar findings were reported in a systematic review on cardiovascular disease, with women in the role of DC providers reporting more distress (</span><a data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B113"><span data-dcnode-id="3169" instrument_node="">Trump and Mendenhall, 2017</span></a><span data-dcnode-id="3167" instrument_node="">).</span></p><span data-dcnode-id="3165" instrument_node="">
</span><p class="mb15" data-dcnode-id="3151"><span data-dcnode-id="3164" instrument_node="">Sociocultural factors influence the expectations and norms governing the level of interdependence in committed relationships, with collectivistic cultures and females more likely to represent the self in relation to others (</span><a data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B109"><span data-dcnode-id="3163" instrument_node="">Triandis, 2001</span></a><span data-dcnode-id="3161" instrument_node="">). Most studies, however, were conducted in the US or in Europe. We do not yet have a clear understanding of how couples from other parts of the world with a more collectivistic background deal with chronic illnesses together and how gender norms and culture interact with DC (see also </span><a data-dcnode-id="3159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B34"><span data-dcnode-id="3160" instrument_node="">Falconier et al., 2015</span></a><span data-dcnode-id="3158" instrument_node="">). Again, the two included HIV studies seemed to yield particular findings, as they were conducted in Africa (</span><a data-dcnode-id="3156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B80"><span data-dcnode-id="3157" instrument_node="">Montgomery et al., 2012</span></a><span data-dcnode-id="3155" instrument_node="">; </span><a data-dcnode-id="3153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B97"><span data-dcnode-id="3154" instrument_node="">Rispel et al., 2012</span></a><span data-dcnode-id="3152" instrument_node="">). However, their contribution to the disentanglement of culture, gender, and illness is marginal, as HIV represents a specific challenge for DC, as this was the only contagious illness included in this review. Therefore, DC with HIV is not directly comparable with the other chronic illnesses affecting primarily only one partner and secondarily the other (in terms of worrying, care giving, inequity of roles, etc.). In sum, this review illustrates the need for more studies from different geographical areas and cultures all over the globe for a deeper understanding of the role of DC in couples with chronic illness.</span></p><span data-dcnode-id="3150" instrument_node="">
</span><p class="mb15" data-dcnode-id="3142"><span data-dcnode-id="3149" instrument_node="">It is important to keep in mind that DC does not happen in absence of other factors influencing the adjustment process when facing chronic disease. Particularly in older couples, people with chronic disease frequently face multiple chronic physical or mental health conditions (</span><a data-dcnode-id="3147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B120"><span data-dcnode-id="3148" instrument_node="">Vos et al., 2015</span></a><span data-dcnode-id="3146" instrument_node="">; </span><a data-dcnode-id="3144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="3145" instrument_node="">Helgeson and Zajdel, 2017</span></a><span data-dcnode-id="3143" instrument_node="">). However, this pile-up of stress due to chronic disease, multiple other impairments, and regular daily demands has not been studied in the included publications. This would be important, however, for gaining a deeper insight into DC processes embedded in different age contexts, stages of the illness, the exhaustion of DC resources over time, or comorbidity (only one partner affected by a chronic illness vs. both).</span></p><span data-dcnode-id="3141" instrument_node="">
</span><p class="mb15" data-dcnode-id="3136"><span data-dcnode-id="3140" instrument_node="">A number of interventions have been developed to alleviate the burden of chronic physical conditions. Mostly, these interventions developed out of existing interventions with an individual focus that included the partner as a participant with varying degrees of adaptation to a partner perspective. Effect sizes of health and relationship benefits were in the smaller range and could potentially be increased with a more stringent focus on couple interaction, as is the case for example in Couples Coping Enhancement Training (</span><a data-dcnode-id="3138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B17"><span data-dcnode-id="3139" instrument_node="">Bodenmann and Shantinath, 2004</span></a><span data-dcnode-id="3137" instrument_node="">).</span></p><span data-dcnode-id="3135" instrument_node="">
</span><p class="mb15" data-dcnode-id="3124"><span data-dcnode-id="3134" instrument_node="">Chronic diseases with high prevalence rates (&gt;10 per 100 in at least one country) in the Western world are diseases of the nervous system, hypertension, headache/migraine, chronic respiratory disease, genitourinary diseases, osteoarthrosis, back and spinal cord disorders, skin diseases, and allergies (</span><a data-dcnode-id="3132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="3133" instrument_node="">Dalstra et al., 2005</span></a><span data-dcnode-id="3131" instrument_node="">). Disproportionately, in our review, the majority of studies were on diabetes. Interestingly, no studies were found on headache/migraine, genitourinary diseases, back and spinal cord disorders, skin diseases and allergies, or obstructive sleep apnea syndrome. Even though they may vary in severity and some chronic illnesses such as allergies require less DC, for other chronic physical illnesses, the lack of couple research is unfortunate, for instance regarding headache/migraine, skin conditions or back and spinal cord disorders, which are very common and burdensome for couples, affecting daily functioning as well as couples' sex lives. Another caveat concerns the fact that most studies were conducted in the US or Europe in high-income nations, while chronic disease is most widespread in low and middle income countries (</span><a data-dcnode-id="3129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B125"><span data-dcnode-id="3130" instrument_node="">World Health Organization, 2013</span></a><span data-dcnode-id="3128" instrument_node="">, </span><a data-dcnode-id="3126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B126"><span data-dcnode-id="3127" instrument_node="">2021a</span></a><span data-dcnode-id="3125" instrument_node="">).</span></p><span data-dcnode-id="3123" instrument_node="">
</span><p class="mb15" data-dcnode-id="3118"><span data-dcnode-id="3122" instrument_node="">A criticism voiced by </span><a data-dcnode-id="3120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="3121" instrument_node="">Berg and Upchurch (2007)</span></a><span data-dcnode-id="3119" instrument_node=""> is that the majority of the DC literature did not include physical health outcomes but rather relied heavily on mental health outcomes. The current review shows that over a decade later, the situation has changed. A great number of studies on various health conditions including physical health outcomes is available: diabetes (glycemic control), COPD (lung function), HIV (viral load), arthritis (aerobic fitness and strength). Outcomes pointed toward a general positive impact of DC on physical health. Another outcome that is quite often overlooked is the economic costs of chronic disease (even implicit ones), e.g., staying home from work for check-ups. Future research could analyze the potential affect DC has on economic outcomes for the couple too.</span></p><span data-dcnode-id="3117" instrument_node="">
</span><p class="mb15" data-dcnode-id="3109"><span data-dcnode-id="3116" instrument_node="">Importantly, most studies were cross-sectional. Prospective studies were rare. In future research, efforts should be made to collect longitudinal data, given the dynamic, transactional, and circular nature of DC. It is important to keep in mind that DC is not a static concept, but changes according to the nature of the illness (i.e., severity, restrictions, comorbidity, impact on the couple) and the couples' adjustment and change of preferences (</span><a data-dcnode-id="3114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="3115" instrument_node="">Helgeson, 1993</span></a><span data-dcnode-id="3113" instrument_node="">). Many factors not only affect DC but also are affected by it in turn. For instance, relationship satisfaction can increase the likelihood of DC and can be further enhanced by DC processes (</span><a data-dcnode-id="3111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B34"><span data-dcnode-id="3112" instrument_node="">Falconier et al., 2015</span></a><span data-dcnode-id="3110" instrument_node="">).</span></p><span data-dcnode-id="3108" instrument_node="">
</span><p class="mb15" data-dcnode-id="3097"><span data-dcnode-id="3107" instrument_node="">In the current review of studies, the quality of quantitative studies was sometimes negatively affected by </span><i data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">ad hoc</span></i><span data-dcnode-id="3104" instrument_node=""> formulation of items or the truncation of existing measures compromising psychometric properties. Additionally, most quantitative studies were lacking in power analysis and relied on non-representative convenience sampling. This problem is characteristic of different systematic reviews on chronic illness, e.g., on DC with cardiovascular disease (</span><a data-dcnode-id="3102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B113"><span data-dcnode-id="3103" instrument_node="">Trump and Mendenhall, 2017</span></a><span data-dcnode-id="3101" instrument_node="">). Qualitative studies, on the other hand, often lacked information on how the researchers critically examined their own role or dealt with potential bias and subjective influence. Whether these shortcomings were due to journal space restrictions or unintentional remains unclear. One needs to bear in mind that reporting quality may differ from study quality (</span><a data-dcnode-id="3099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B102"><span data-dcnode-id="3100" instrument_node="">Soares, 2004</span></a><span data-dcnode-id="3098" instrument_node="">). Another problem is related to multiple publications based on the same data sets. This practice might inflate interpretation of findings and overestimate their validity.</span></p><span data-dcnode-id="3096" instrument_node="">
</span><p class="mb0" data-dcnode-id="3085"><span data-dcnode-id="3095" instrument_node="">This review provides only a snapshot of a rapidly evolving research area. The studies identified included, for instance, some study protocols for intervention studies that seem to be currently underway (</span><a data-dcnode-id="3093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B124"><span data-dcnode-id="3094" instrument_node="">Wittmann et al., 2017</span></a><span data-dcnode-id="3092" instrument_node="">; </span><a data-dcnode-id="3090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B70"><span data-dcnode-id="3091" instrument_node="">Lüscher et al., 2019</span></a><span data-dcnode-id="3089" instrument_node="">). Future reviews should also overcome the distinction between DC and spousal support literature. Even though both fields developed in parallel, it is high time a metatheory linking the different approaches were formulated, as has already been attempted by </span><a data-dcnode-id="3087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B28"><span data-dcnode-id="3088" instrument_node="">Cutrona et al. (2018)</span></a><span data-dcnode-id="3086" instrument_node="">. The synthesis of knowledge from both fields would further stimulate the development of interventions for couples facing chronic physical illness.</span></p><span data-dcnode-id="3084" instrument_node="">
</span><h3 data-dcnode-id="3082"><span data-dcnode-id="3083" instrument_node="">Strengths and Limitations</span></h3><span data-dcnode-id="3081" instrument_node="">
</span><p class="mb15" data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">A number of limitations pertaining to our review need to be taken into account when one considers our findings in addition to the above limitations of the included studies. Firstly, a strength of our study was the additional inclusion of gray literature (e.g., unpublished dissertations), often excluded from systematic reviews even though they may provide thorough insights. Despite great efforts, we could not obtain several dissertations either because we were unable to contact the authors or because the authors failed to respond. Hence in some areas the body of knowledge may be incomplete in this review.</span></p><span data-dcnode-id="3078" instrument_node="">
</span><p class="mb15" data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">In some cases, it was difficult to draw a clear line between the inclusion and exclusion of studies from the adjoining or overarching field of spousal support research. Including these was beyond the scope of this review. However, both research areas are intertwined and could enrich each other. Similarly, integrating studies on mental disease was beyond the scope of the current review.</span></p><span data-dcnode-id="3075" instrument_node="">
</span><p class="mb15" data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">Additionally, it was not possible to include studies that analyzed DC when both partners are affected by disease (even different ones). This could be another future research direction. Furthermore, we included only studies in which both partners' perspectives were taken into account.</span></p><span data-dcnode-id="3072" instrument_node="">
</span><p class="mb15" data-dcnode-id="3067"><span data-dcnode-id="3071" instrument_node="">Because of the broad range of studies included, we needed to apply various quality assessment tools, which varied in rigor and cannot easily be compared with each other. It is also important to consider the limitations of existing tools for assessing risk of reporting biases, in terms of their scope, guidance for reaching risk of bias judgments, and measurement properties (</span><a data-dcnode-id="3069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B85"><span data-dcnode-id="3070" instrument_node="">Page et al., 2018</span></a><span data-dcnode-id="3068" instrument_node="">). We thus refrained from placing too much emphasis on individual study quality. To reduce the risk of publication bias, several authors were contacted directly to establish whether they had more studies in our field of interest. Further, it is important to note that we did not find any study without any significant results. Because in our narrative review we did we not collate data statistically, risk of selective reporting bias has not been assessed.</span></p><span data-dcnode-id="3066" instrument_node="">
</span><p class="mb0" data-dcnode-id="3058"><span data-dcnode-id="3065" instrument_node="">Finally, we focused only on DC in intimate relationships. Even though it is commendable that the literature increasingly views chronic disease as a joint coping effort of the person affected and their romantic partner, considering further significant others beyond the couple, such as adult children, parents, friends, extended family, or “fictive kin,” would be of merit (</span><a data-dcnode-id="3063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B105"><span data-dcnode-id="3064" instrument_node="">Taylor et al., 2013</span></a><span data-dcnode-id="3062" instrument_node="">). Additionally, future research should consider intersectionality, which refers to the idea that we need to address diversity within social categories, hierarchies of privilege and power that structure social and material life, and commonalities across categories commonly viewed as profoundly different in psychological research (</span><a data-dcnode-id="3060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B24"><span data-dcnode-id="3061" instrument_node="">Cole, 2009</span></a><span data-dcnode-id="3059" instrument_node="">).</span></p><span data-dcnode-id="3057" instrument_node="">
</span><h3 data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">Conclusions</span></h3><span data-dcnode-id="3054" instrument_node="">
</span><p class="mb0" data-dcnode-id="3043"><span data-dcnode-id="3053" instrument_node="">Facing challenges together as a couple seems vital for adapting to a diverse range of demands related to chronic physical diseases. Integrating a systemic focus should be a continuing effort in research, policy, and clinical practice in order to optimize medical, psychological, and psychosocial care in the current times of growing prevalence rates of chronic physical diseases across the globe. In the healthcare context, the family context needs to be taken into consideration, in particular the couple's relationship as a crucial aspect of physical and psychological recovery following a diagnosis. For research, implications point toward more longitudinal studies with diverse samples beyond the Global North. Lastly, we hope the review will stimulate the development of truly dyadic interventions with an eye on the specific challenges of the various chronic conditions. In the clinical context, findings point to the necessity of addressing both partners and taking both of them into account in interventions, as both are affected by the disease and suffer in their own way but also together. On the other hand, both partners (despite the disease and associated limitations and deficits) have shared resources that can be discovered and strengthened (</span><a data-dcnode-id="3051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B65"><span data-dcnode-id="3052" instrument_node="">Leuchtmann and Bodenmann, 2017</span></a><span data-dcnode-id="3050" instrument_node="">). We believe that strengthening couples' resources (such as DC) in the context of the different diseases might be a promising direction for two reasons: (1) we can guarantee a better relationship functioning that is linked to better well-being and faster recovery from illness (</span><a data-dcnode-id="3048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B60"><span data-dcnode-id="3049" instrument_node="">Kiecolt-Glaser and Newton, 2001</span></a><span data-dcnode-id="3047" instrument_node="">), and (2) by involving both partners in the intervention so that both feel considered, cared about, and important to the process of recovery or enduring the burden associated with the illness (</span><a data-dcnode-id="3045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B65"><span data-dcnode-id="3046" instrument_node="">Leuchtmann and Bodenmann, 2017</span></a><span data-dcnode-id="3044" instrument_node="">).</span></p><span data-dcnode-id="3042" instrument_node="">
