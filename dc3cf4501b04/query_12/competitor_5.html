</span><li data-dcnode-id="1998"><em data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Mindset: The New Psychology of Success</span></em><span data-dcnode-id="2002" instrument_node=""> by Carol S. Dweck&nbsp;(</span><a data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Mindset-Psychology-Carol-S-Dweck/dp/0345472322/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2001" instrument_node="">Amazon</span></a><span data-dcnode-id="1999" instrument_node="">)</span></li><span data-dcnode-id="1997" instrument_node="">
</span><li data-dcnode-id="1990"><em data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">Getting Back to Happy: Change Your Thoughts, Change Your Reality, and Turn Your Trials into Triumphs</span></em><span data-dcnode-id="1994" instrument_node=""> by March Chernoff and Angel Chernoff&nbsp;(</span><a data-dcnode-id="1992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Getting-Back-Happy-Thoughts-Triumphs-ebook/dp/B07638LL34/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1993" instrument_node="">Amazon</span></a><span data-dcnode-id="1991" instrument_node="">)</span></li><span data-dcnode-id="1989" instrument_node="">

</span><h2 data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">A Take-Home Message</span></h2><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">If you’re still with me after this very long read, thanks for sticking with it! I hope you will find that the time invested in reading this piece was worth the information you gleaned from it.</span></p><span data-dcnode-id="1951" instrument_node="">
</span><p data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">The one takeaway from this piece that I really hope sticks with you is this: Positive thinking is a powerful tool that can result in a lot of benefits for you and those around you; however, thinking positive 100% of the time is unrealistic and could even be disastrous.</span></p><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">We have a lot of different emotions and thoughts, and we have such a wide variety for a reason. There are times when being a bit pessimistic can help us, and it is a good idea to let out the negative emotions you experience once in a while (especially if the alternative is bottling them up).</span></p><span data-dcnode-id="1945" instrument_node="">
</span><p data-dcnode-id="1940"><span data-dcnode-id="1944" instrument_node="">If you’re an optimist by nature, </span><a data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/gratitude-appreciation/" rel="noopener"><span data-dcnode-id="1943" instrument_node="">cultivate gratitude</span></a><span data-dcnode-id="1941" instrument_node=""> for your inherent positivity, but make sure you don’t push aside the negative feelings that crop up. They’re part of life too.</span></p><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">If you’re a pessimist by nature, don’t despair of ever thinking positively. Try a few of the techniques that seem most applicable and give yourself a break if it takes some time. Remember, the goal is not to become a “Pollyanna,” but to become the best version of yourself that you can be and maintain a healthy and happy mental state.</span></p><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">How do you feel about the positivity movement? Are you naturally optimistic, pessimistic, or somewhere in between? Do you have any thoughts about how to cultivate a positive mindset? Let us know in the comments section below!</span></p><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">Thanks for reading, and best of luck in developing a positive mindset!</span></p><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1925"><span data-dcnode-id="1929" instrument_node="">We hope you enjoyed reading this article. Don’t forget to </span><a data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/ebook" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1928" instrument_node="">download our 3 Positive Psychology Exercises for free</span></a><span data-dcnode-id="1926" instrument_node="">.</span></p><span data-dcnode-id="1924" instrument_node="">
