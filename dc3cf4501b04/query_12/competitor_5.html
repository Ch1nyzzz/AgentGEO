</span><article class="post-22345 post type-post status-publish format-standard has-post-thumbnail hentry category-positive-emotions" data-dcnode-id="1660" id="post-22345"><span data-dcnode-id="4155" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1662"><span data-dcnode-id="4154" instrument_node="">
</span><p data-dcnode-id="4150"><img alt="happy people: What is Positive Mindset and 89 Ways to Achieve a Positive Mental Attitude" class="alignright wp-image-22554 lazyloaded" data-dcnode-id="4153" data-src="https://positivepsychology.com/wp-content/uploads/1_positive-mindset-happy-people.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/wp-content/uploads/1_positive-mindset-happy-people.jpg&amp;raw" title="positive mindset happy people " width="300"><noscript data-dcnode-id="4151"><span data-dcnode-id="4152" instrument_node="">&lt;img class="alignright wp-image-22554 lazyload" title="positive mindset happy people " src="https://positivepsychology.com/wp-content/uploads/1_positive-mindset-happy-people.jpg" alt="happy people: What is Positive Mindset and 89 Ways to Achieve a Positive Mental Attitude" width="300" /&gt;</span></noscript></p><span data-dcnode-id="4149" instrument_node="">
</span><p data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">It is probably not a surprise to you that positivity is, inherently, at the center of positive psychology.</span></p><span data-dcnode-id="4146" instrument_node="">
</span><p data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node="">Positivity doesn’t always refer to simply smiling and looking cheerful, however—positivity is more about one’s overall perspective on life and their tendency to focus on all that is good in life.</span></p><span data-dcnode-id="4143" instrument_node="">
</span><p data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node="">In this piece, we’ll cover the basics of positivity within positive psychology, identify some of the many benefits of approaching life from a positive point of view, and explore some tips and techniques for cultivating a positive mindset.</span></p><span data-dcnode-id="4140" instrument_node="">
</span><p data-dcnode-id="4138"><span data-dcnode-id="4139" instrument_node="">This piece is a long one, so settle in and get comfortable. Let’s get started.</span></p><span data-dcnode-id="4137" instrument_node="">
</span><p data-dcnode-id="4132"><span data-dcnode-id="4136" instrument_node="">Before you read on, we thought you might like to </span><a data-dcnode-id="4134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/ebook" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4135" instrument_node="">download our 3 Positive Psychology Exercises for free</span></a><span data-dcnode-id="4133" instrument_node="">. These science-based exercises will explore fundamental aspects of positive psychology including strengths, values and self-compassion and will give you the tools to enhance the wellbeing of your clients, students or employees.</span></p><span data-dcnode-id="4131" instrument_node="">
</span><div data-dcnode-id="4067" id="inhoud"><span data-dcnode-id="4130" instrument_node="">
</span><h2 data-dcnode-id="4128"><span data-dcnode-id="4129" instrument_node="">This Article Contains:</span></h2><span data-dcnode-id="4127" instrument_node="">

</span><p data-dcnode-id="4064"><a data-dcnode-id="4065" name="what-positive-mindset"></a></p><span data-dcnode-id="4063" instrument_node="">
</span><h2 data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">What is a Positive Mindset and Attitude? A Definition</span></h2><span data-dcnode-id="4060" instrument_node="">
</span><p data-dcnode-id="4058"><span data-dcnode-id="4059" instrument_node="">You probably have an idea of what a positive mindset or positive attitude is already, but it’s always helpful to start with a definition.</span></p><span data-dcnode-id="4057" instrument_node="">
</span><p data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">This definition from Remez Sasson (n.d.) is a good general description:</span></p><span data-dcnode-id="4054" instrument_node="">
</span><blockquote data-dcnode-id="4051"><p data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">“Positive thinking is a mental and emotional attitude that focuses on the bright side of life and expects positive results.”</span></p></blockquote><span data-dcnode-id="4050" instrument_node="">
</span><p data-dcnode-id="4048"><span data-dcnode-id="4049" instrument_node="">Another, more comprehensive definition comes from Kendra Cherry at Very Well Mind (2017B):</span></p><span data-dcnode-id="4047" instrument_node="">
</span><blockquote data-dcnode-id="4044"><p data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">“[P]ositive thinking actually means approaching life’s challenges with a positive outlook. It does not necessarily mean avoiding or ignoring the bad things; instead, it involves making the most of the potentially bad situations, trying to see the best in other people, and viewing yourself and your abilities in a positive light.”</span></p></blockquote><span data-dcnode-id="4043" instrument_node="">
</span><p data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">We can extrapolate from these definitions and come up with a good description of a positive mindset as the tendency to focus on the bright side, expect positive results, and approach challenges with a positive outlook.</span></p><span data-dcnode-id="4040" instrument_node="">
</span><p data-dcnode-id="4035"><span data-dcnode-id="4039" instrument_node="">Having a positive mindset means making positive thinking a habit, continually searching for the </span><a data-dcnode-id="4037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/find-a-silver-lining/"><span data-dcnode-id="4038" instrument_node="">silver lining</span></a><span data-dcnode-id="4036" instrument_node=""> and making the best out of any situation you find yourself in.</span></p><span data-dcnode-id="4034" instrument_node="">
</span><p data-dcnode-id="4032"><a data-dcnode-id="4033" name="traits-positive-mindset"></a></p><span data-dcnode-id="4031" instrument_node="">
</span><p data-dcnode-id="4029"><span data-dcnode-id="4030" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4028" instrument_node="">
</span><h2 data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node="">Characteristics and Traits of a Positive Mindset: 6 Examples</span></h2><span data-dcnode-id="4025" instrument_node="">
</span><p data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">So, now we know what a positive mindset is, we can dive into the next important question: What does it look like?</span></p><span data-dcnode-id="4022" instrument_node="">
</span><p data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">There are many traits and characteristics associated with a positive mindset, including:</span></p><span data-dcnode-id="4019" instrument_node="">
</span><ul data-dcnode-id="3987"><span data-dcnode-id="4018" instrument_node="">
</span><li data-dcnode-id="4014"><a data-dcnode-id="4016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/learned-optimism/" rel="noopener"><span data-dcnode-id="4017" instrument_node="">Optimism</span></a><span data-dcnode-id="4015" instrument_node="">: a willingness to make an effort and take a chance instead of assuming your efforts won’t pay off.</span></li><span data-dcnode-id="4013" instrument_node="">
</span><li data-dcnode-id="4009"><a data-dcnode-id="4011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/act-acceptance-and-commitment-therapy/" rel="noopener"><span data-dcnode-id="4012" instrument_node="">Acceptance</span></a><span data-dcnode-id="4010" instrument_node="">: acknowledging that things don’t always turn out how you want them to, but learning from your mistakes.</span></li><span data-dcnode-id="4008" instrument_node="">
</span><li data-dcnode-id="4004"><a data-dcnode-id="4006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/resilience-in-positive-psychology/" rel="noopener"><span data-dcnode-id="4007" instrument_node="">Resilience</span></a><span data-dcnode-id="4005" instrument_node="">: bouncing back from adversity, disappointment, and failure instead of giving up.</span></li><span data-dcnode-id="4003" instrument_node="">
</span><li data-dcnode-id="3999"><a data-dcnode-id="4001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/gratitude-exercises/" rel="noopener"><span data-dcnode-id="4002" instrument_node="">Gratitude</span></a><span data-dcnode-id="4000" instrument_node="">: actively, continuously appreciating the good things in your life (Blank, 2017).</span></li><span data-dcnode-id="3998" instrument_node="">
</span><li data-dcnode-id="3994"><a data-dcnode-id="3996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/what-is-mindfulness/" rel="noopener"><span data-dcnode-id="3997" instrument_node="">Consciousness/Mindfulness</span></a><span data-dcnode-id="3995" instrument_node="">: dedicating the mind to conscious awareness and enhancing the ability to focus.</span></li><span data-dcnode-id="3993" instrument_node="">
</span><li data-dcnode-id="3989"><a data-dcnode-id="3991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/honesty-integrity-worksheets-activities-tests/" rel="noopener"><span data-dcnode-id="3992" instrument_node="">Integrity</span></a><span data-dcnode-id="3990" instrument_node="">: the trait of being honorable, righteous, and straightforward, instead of deceitful and self-serving (Power of Positivity, n.d.).</span></li><span data-dcnode-id="3988" instrument_node="">
</span></ul><span data-dcnode-id="3986" instrument_node="">
</span><p data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">Not only are these characteristics of a positive mindset, but they may also work in the other direction—actively adopting optimism, acceptance, resilience, gratitude, mindfulness, and integrity in your life will help you develop and maintain a positive mindset.</span></p><span data-dcnode-id="3983" instrument_node="">
</span><p data-dcnode-id="3981"><a data-dcnode-id="3982" name="list-positive-mindset"></a></p><span data-dcnode-id="3980" instrument_node="">
</span><p data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3977" instrument_node="">
</span><h2 data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">A List of Positive Attitudes</span></h2><span data-dcnode-id="3974" instrument_node="">
</span><p data-dcnode-id="3972"><span data-dcnode-id="3973" instrument_node="">If you found the list above still too vague, there are many more specific examples of a positive attitude in action.</span></p><span data-dcnode-id="3971" instrument_node="">
</span><p data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">For example, positive attitudes can include:</span></p><span data-dcnode-id="3968" instrument_node="">
</span><ul data-dcnode-id="3900"><span data-dcnode-id="3967" instrument_node="">
</span><li data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">It is looking adversity in the eye… and laughing.</span></li><span data-dcnode-id="3964" instrument_node="">
</span><li data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">Getting what you get, and not pitching a fit.</span></li><span data-dcnode-id="3961" instrument_node="">
</span><li data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">Enjoying the unexpected, even when it’s not what you wanted originally.</span></li><span data-dcnode-id="3958" instrument_node="">
</span><li data-dcnode-id="3956"><span data-dcnode-id="3957" instrument_node="">Motivating those around you with a positive word.</span></li><span data-dcnode-id="3955" instrument_node="">
</span><li data-dcnode-id="3953"><span data-dcnode-id="3954" instrument_node="">Using the power of a smile to reverse the tone of a situation.</span></li><span data-dcnode-id="3952" instrument_node="">
</span><li data-dcnode-id="3950"><span data-dcnode-id="3951" instrument_node="">Being friendly to those you don’t know.</span></li><span data-dcnode-id="3949" instrument_node="">
</span><li data-dcnode-id="3947"><span data-dcnode-id="3948" instrument_node="">It’s getting back up when you fall down. (No matter how many times you fall down.)</span></li><span data-dcnode-id="3946" instrument_node="">
</span><li data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">Being a source of energy that lifts those around you.</span></li><span data-dcnode-id="3943" instrument_node="">
</span><li data-dcnode-id="3938"><span data-dcnode-id="3942" instrument_node="">Understanding that </span><a data-dcnode-id="3940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/communication-in-relationships/" rel="noopener"><span data-dcnode-id="3941" instrument_node="">relationships</span></a><span data-dcnode-id="3939" instrument_node=""> are more important than material things.</span></li><span data-dcnode-id="3937" instrument_node="">
</span><li data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">Being happy even when you have little.</span></li><span data-dcnode-id="3934" instrument_node="">
</span><li data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">Having a good time even when you are losing.</span></li><span data-dcnode-id="3931" instrument_node="">
</span><li data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">Being happy for someone else’s success.</span></li><span data-dcnode-id="3928" instrument_node="">
</span><li data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">Having a positive future vision, no matter how bad your current circumstances.</span></li><span data-dcnode-id="3925" instrument_node="">
</span><li data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">Smiling.</span></li><span data-dcnode-id="3922" instrument_node="">
</span><li data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">Paying a compliment, even to a total stranger.</span></li><span data-dcnode-id="3919" instrument_node="">
</span><li data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">Tell someone you know that they did a great job. (And mean it.)</span></li><span data-dcnode-id="3916" instrument_node="">
</span><li data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">Making someone’s day. (Not just a child’s… adult’s like to have their day be special, too!)</span></li><span data-dcnode-id="3913" instrument_node="">
</span><li data-dcnode-id="3911"><span data-dcnode-id="3912" instrument_node="">It’s not complaining no matter how unfair things appear to be. (It is a waste of time… instead, do something!)</span></li><span data-dcnode-id="3910" instrument_node="">
</span><li data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">Not letting other people’s negativity bring you down.</span></li><span data-dcnode-id="3907" instrument_node="">
</span><li data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">Giving more than you expect to get in return.</span></li><span data-dcnode-id="3904" instrument_node="">
</span><li data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">Being true to yourself… always (Jarrow, 2012).</span></li><span data-dcnode-id="3901" instrument_node="">
</span></ul><span data-dcnode-id="3899" instrument_node="">
</span><p data-dcnode-id="3897"><a data-dcnode-id="3898" name="attitude-positive-mindset"></a></p><span data-dcnode-id="3896" instrument_node="">
</span><p data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3893" instrument_node="">
</span><h2 data-dcnode-id="3891"><span data-dcnode-id="3892" instrument_node="">Why is a Positive Attitude Considered the Key to Success?</span></h2><span data-dcnode-id="3890" instrument_node="">
</span><p data-dcnode-id="3886"><img alt="man smiling - Characteristics and Traits of a Positive Mindset: 6 Examples" class="alignright wp-image-22555 lazyload" data-dcnode-id="3889" data-src="https://positivepsychology.com/wp-content/uploads/positive-mindset-attitude.jpg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="positive mindset positive attitude " width="300"><noscript data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">&lt;img class="alignright wp-image-22555 lazyload" title="positive mindset positive attitude " src="https://positivepsychology.com/wp-content/uploads/positive-mindset-attitude.jpg" alt="man smiling - Characteristics and Traits of a Positive Mindset: 6 Examples" width="300" /&gt;</span></noscript></p><span data-dcnode-id="3885" instrument_node="">
</span><p data-dcnode-id="3883"><span data-dcnode-id="3884" instrument_node="">Now we know a little bit more about what a positive mindset looks like, we can turn to one of the biggest questions of all: What’s the deal with having a positive attitude?</span></p><span data-dcnode-id="3882" instrument_node="">
</span><p data-dcnode-id="3880"><span data-dcnode-id="3881" instrument_node="">What is it about having a positive mindset that is so important, so impactful, so life-changing?</span></p><span data-dcnode-id="3879" instrument_node="">
</span><p data-dcnode-id="3874"><span data-dcnode-id="3878" instrument_node="">Well, the </span><a data-dcnode-id="3876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/character-traits/" rel="noopener"><span data-dcnode-id="3877" instrument_node="">traits and characteristics</span></a><span data-dcnode-id="3875" instrument_node=""> listed above give us a hint; if you comb through the literature, you’ll see a plethora of benefits linked to optimism, resilience, and mindfulness.</span></p><span data-dcnode-id="3873" instrument_node="">
</span><p data-dcnode-id="3868"><span data-dcnode-id="3872" instrument_node="">You’ll see that awareness and integrity are linked to better </span><a data-dcnode-id="3870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/good-life/" rel="noopener"><span data-dcnode-id="3871" instrument_node="">quality of life</span></a><span data-dcnode-id="3869" instrument_node="">, and acceptance and gratitude can take you from the “okay life” to the “good life.”</span></p><span data-dcnode-id="3867" instrument_node="">
</span><p data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3864" instrument_node="">
</span><h3 data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">The Importance of Developing the Right Thoughts</span></h3><span data-dcnode-id="3861" instrument_node="">
</span><p data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">Developing a truly positive mindset and gaining these benefits is a function of the thoughts you cultivate.</span></p><span data-dcnode-id="3858" instrument_node="">
</span><p data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">Don’t worry—this piece isn’t about the kind of positive thinking that is all positive, all the time. We don’t claim that just “thinking happy thoughts” will bring you all the success you desire in life, and we certainly don’t believe that optimism is warranted in every situation, every minute of the day.</span></p><span data-dcnode-id="3855" instrument_node="">
</span><p data-dcnode-id="3850"><span data-dcnode-id="3854" instrument_node="">Developing the right thoughts is not about being constantly happy or cheerful, and it’s not about ignoring anything negative or unpleasant in your life. It’s about incorporating both the </span><a data-dcnode-id="3852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/positive-negative-emotions/" rel="noopener"><span data-dcnode-id="3853" instrument_node="">positive and negative</span></a><span data-dcnode-id="3851" instrument_node=""> into your perspective and choosing to still be generally optimistic.</span></p><span data-dcnode-id="3849" instrument_node="">
</span><p data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">It’s about acknowledging that you will not always be happy and learning to accept bad moods and difficult emotions when they come.</span></p><span data-dcnode-id="3846" instrument_node="">
</span><p data-dcnode-id="3841"><span data-dcnode-id="3845" instrument_node="">Above all, it’s about increasing your control over your own attitude in the face of whatever comes your way. You cannot control your </span><a data-dcnode-id="3843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/mood-charts-track-your-mood/" rel="noopener"><span data-dcnode-id="3844" instrument_node="">mood</span></a><span data-dcnode-id="3842" instrument_node="">, and you cannot always control the thoughts that pop into your head, but you can choose how you handle them.</span></p><span data-dcnode-id="3840" instrument_node="">
</span><p data-dcnode-id="3836"><span data-dcnode-id="3839" instrument_node="">When you choose to give in to the negativity, pessimism, and doom-and-gloom view of the world, you are not only submitting to a loss of control and potentially wallowing in unhappiness—you are missing out on an important opportunity for </span><a data-dcnode-id="3837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/growth-mindset-vs-fixed-mindset/" rel="noopener"><span data-dcnode-id="3838" instrument_node="">growth and development.</span></a></p><span data-dcnode-id="3835" instrument_node="">
</span><p data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">According to positive psychologist Barbara Fredrickson, negative thinking, and negative emotions have their place: they allow you to sharpen your focus on dangers, threats, and vulnerabilities. This is vital for survival, although perhaps not as much as it was for our ancestors.</span></p><span data-dcnode-id="3832" instrument_node="">
</span><p data-dcnode-id="3827"><span data-dcnode-id="3831" instrument_node="">On the other hand, positive thinking and positive emotions “</span><a data-dcnode-id="3829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/broaden-build-theory/" rel="noopener"><span data-dcnode-id="3830" instrument_node="">broaden and build</span></a><span data-dcnode-id="3828" instrument_node="">” our resources and skills, and open us up to possibilities (Fredrickson, 2004).</span></p><span data-dcnode-id="3826" instrument_node="">
</span><p data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">Building a positive framework for your thoughts is not about being bubbly and annoyingly cheerful, but making an investment in yourself and your future. It’s okay to feel down or think pessimistically sometimes, but choosing to respond with optimism, resilience, and gratitude will benefit you far more in the long run.</span></p><span data-dcnode-id="3823" instrument_node="">
</span><p data-dcnode-id="3821"><a data-dcnode-id="3822" name="outcomes-positive-mindset"></a></p><span data-dcnode-id="3820" instrument_node="">
</span><p data-dcnode-id="3818"><span data-dcnode-id="3819" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3817" instrument_node="">
</span><h2 data-dcnode-id="3815"><span data-dcnode-id="3816" instrument_node="">The Outcomes of a Positive Attitude</span></h2><span data-dcnode-id="3814" instrument_node="">
</span><p data-dcnode-id="3809"><span data-dcnode-id="3813" instrument_node="">Aside from enhancing your skills and personal resources, there are many other benefits of cultivating a positive mindset, including better overall health, better ability to </span><a data-dcnode-id="3811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/stress-management-techniques-tips-burn-out/" rel="noopener"><span data-dcnode-id="3812" instrument_node="">cope with stress</span></a><span data-dcnode-id="3810" instrument_node="">, and greater well-being (Cherry, 2017A).</span></p><span data-dcnode-id="3808" instrument_node="">
</span><p data-dcnode-id="3797"><span data-dcnode-id="3807" instrument_node="">According to the experts at the Mayo Clinic, positive thinking can increase your lifespan, </span><a data-dcnode-id="3805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/benefits-of-journaling/" rel="noopener"><span data-dcnode-id="3806" instrument_node="">reduce rates of depression and levels of distress</span></a><span data-dcnode-id="3804" instrument_node="">, give you greater resistance to the common cold, improve your overall psychological and physical </span><a data-dcnode-id="3802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/learned-helplessness-seligman-theory-depression-cure/" rel="noopener"><span data-dcnode-id="3803" instrument_node="">well-being</span></a><span data-dcnode-id="3801" instrument_node="">, improve your cardiovascular health and protect you from cardiovascular disease, and help you </span><a data-dcnode-id="3799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/coping/" rel="noopener"><span data-dcnode-id="3800" instrument_node="">build coping skills</span></a><span data-dcnode-id="3798" instrument_node=""> to keep you afloat during challenging times (2017).</span></p><span data-dcnode-id="3796" instrument_node="">
</span><p data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">You’ve probably heard of all these generic benefits before, so we’ll get more specific and explore the benefits of a positive mindset in several different contexts:</span></p><span data-dcnode-id="3793" instrument_node="">
</span><ul data-dcnode-id="3775"><span data-dcnode-id="3792" instrument_node="">
</span><li data-dcnode-id="3789"><a data-dcnode-id="3790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/positive-psychology-workplace-labor-of-love/" rel="noopener"><span data-dcnode-id="3791" instrument_node="">The workplace</span></a></li><span data-dcnode-id="3788" instrument_node="">
</span><li data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">Leadership</span></li><span data-dcnode-id="3785" instrument_node="">
</span><li data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">Dealing with disability (for both those with a disability and those around them)</span></li><span data-dcnode-id="3782" instrument_node="">
</span><li data-dcnode-id="3780"><span data-dcnode-id="3781" instrument_node="">Nursing and healthcare</span></li><span data-dcnode-id="3779" instrument_node="">
</span><li data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">Recovery from cancer</span></li><span data-dcnode-id="3776" instrument_node="">
</span></ul><span data-dcnode-id="3774" instrument_node="">
</span><p data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3771" instrument_node="">
</span><h3 data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">10 Benefits of a Positive Mental Attitude in the Workplace</span></h3><span data-dcnode-id="3768" instrument_node="">
</span><p data-dcnode-id="3763"><span data-dcnode-id="3767" instrument_node="">No construct better captures the essence of a positive attitude in the workplace quite like </span><a data-dcnode-id="3765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/psychological-capital-psycap/" rel="noopener"><span data-dcnode-id="3766" instrument_node="">psychological capital</span></a><span data-dcnode-id="3764" instrument_node=""> (or PsyCap for short). This multicomponent construct is made up of four psychological resources:</span></p><span data-dcnode-id="3762" instrument_node="">
</span><ol data-dcnode-id="3748"><span data-dcnode-id="3761" instrument_node="">
</span><li data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">Hope</span></li><span data-dcnode-id="3758" instrument_node="">
</span><li data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">Efficacy</span></li><span data-dcnode-id="3755" instrument_node="">
</span><li data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">Resilience</span></li><span data-dcnode-id="3752" instrument_node="">
</span><li data-dcnode-id="3750"><span data-dcnode-id="3751" instrument_node="">Optimism</span></li><span data-dcnode-id="3749" instrument_node="">
</span></ol><span data-dcnode-id="3747" instrument_node="">
</span><p data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">PsyCap was first conceptualized as “positive psychological capital” by renowned management and leadership researchers Luthans and Youssef in 2004. The concept quickly took off among positive organizational psychologists, and by 2011 there were already hundreds of citations of PsyCap in the literature.</span></p><span data-dcnode-id="3744" instrument_node="">
</span><p data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">The first meta-analysis of all the research on PsyCap was conducted in 2011, and it outlined some of the many benefits of PsyCap in the workplace:</span></p><span data-dcnode-id="3741" instrument_node="">
</span><ul data-dcnode-id="3715"><span data-dcnode-id="3740" instrument_node="">
</span><li data-dcnode-id="3733"><span data-dcnode-id="3739" instrument_node="">PsyCap was positively related to </span><a data-dcnode-id="3737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/zest/" rel="noopener"><span data-dcnode-id="3738" instrument_node="">job satisfaction</span></a><span data-dcnode-id="3736" instrument_node="">, organizational commitment, and psychological well-being.</span><br data-dcnode-id="3735"><br data-dcnode-id="3734"></li><span data-dcnode-id="3732" instrument_node="">
</span><li data-dcnode-id="3728"><span data-dcnode-id="3731" instrument_node="">PsyCap was also positively related to organizational citizenship (desirable employee behaviors) and multiple measures of performance (self-rated, supervisor evaluations, and objective measures).</span><br data-dcnode-id="3730"><br data-dcnode-id="3729"></li><span data-dcnode-id="3727" instrument_node="">
</span><li data-dcnode-id="3720"><span data-dcnode-id="3726" instrument_node="">PsyCap was negatively related to cynicism, turnover intentions, job stress, and </span><a data-dcnode-id="3724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/anxiety-worksheets/" rel="noopener"><span data-dcnode-id="3725" instrument_node="">anxiety</span></a><span data-dcnode-id="3723" instrument_node="">.</span><br data-dcnode-id="3722"><br data-dcnode-id="3721"></li><span data-dcnode-id="3719" instrument_node="">
</span><li data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">PsyCap was also negatively related to negative employee deviance (bad employee behaviors; Avey, Reichard, Luthans, &amp; Mhatre, 2011).</span></li><span data-dcnode-id="3716" instrument_node="">
</span></ul><span data-dcnode-id="3714" instrument_node="">
</span><p data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">It seems pretty straightforward that positive attitudes like optimism and resilience lead to positive outcomes for the organization and for the employees!</span></p><span data-dcnode-id="3711" instrument_node="">
</span><p data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">Another study by a few of the giants in the field of positive psychology (Sonja Lyubomirsky, Laura King, and Ed Diener, 2005) investigated the relationship between happiness and benefits to employees. They showed that positive attitudes in the workplace also benefit the employee in addition to the organization:</span></p><span data-dcnode-id="3708" instrument_node="">
</span><ul data-dcnode-id="3688"><span data-dcnode-id="3707" instrument_node="">
</span><li data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">Happier employees are more productive than other employees.</span></li><span data-dcnode-id="3704" instrument_node="">
</span><li data-dcnode-id="3702"><span data-dcnode-id="3703" instrument_node="">Happy salespeople have higher sales than other salespeople.</span></li><span data-dcnode-id="3701" instrument_node="">
</span><li data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">Happy employees are more creative than other employees.</span></li><span data-dcnode-id="3698" instrument_node="">
</span><li data-dcnode-id="3696"><span data-dcnode-id="3697" instrument_node="">Happy employees are evaluated more positively by their supervisors.</span></li><span data-dcnode-id="3695" instrument_node="">
</span><li data-dcnode-id="3693"><span data-dcnode-id="3694" instrument_node="">Happy employees are less likely to show job withdrawal (absenteeism, turnover, job burnout, and retaliatory behaviors).</span></li><span data-dcnode-id="3692" instrument_node="">
</span><li data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">Happy employees make more money than other employees.</span></li><span data-dcnode-id="3689" instrument_node="">
</span></ul><span data-dcnode-id="3687" instrument_node="">
</span><p data-dcnode-id="3685"><span data-dcnode-id="3686" instrument_node="">So, a positive attitude can have great benefits for the organization as a whole and for all of its employees.</span></p><span data-dcnode-id="3684" instrument_node="">
</span><p data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">It turns out that a positive attitude can also result in benefits for leaders and their followers (as well as spreading positivity throughout the organization).</span></p><span data-dcnode-id="3681" instrument_node="">
</span><p data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3678" instrument_node="">
</span><h3 data-dcnode-id="3676"><span data-dcnode-id="3677" instrument_node="">The Importance of a Positive Mindset for Leadership</span></h3><span data-dcnode-id="3675" instrument_node="">
</span><p data-dcnode-id="3673"><span data-dcnode-id="3674" instrument_node="">As important as a positive mindset is for the rank-and-file, it’s easy to see why it is vital for those in a position of leadership.</span></p><span data-dcnode-id="3672" instrument_node="">
</span><p data-dcnode-id="3664"><span data-dcnode-id="3671" instrument_node="">Researchers Hannah, Woolfolk, and Lord (2009) outlined a framework for </span><a data-dcnode-id="3669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/positive-leadership/" rel="noopener"><span data-dcnode-id="3670" instrument_node="">positive leadership</span></a><span data-dcnode-id="3668" instrument_node=""> that rests on the idea that leaders with a positive </span><a data-dcnode-id="3666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/self-concept/" rel="noopener"><span data-dcnode-id="3667" instrument_node="">self-concept</span></a><span data-dcnode-id="3665" instrument_node=""> (a positive idea of who they are and a habit of thinking positively about themselves) are more able to bring the “right stuff” to their leadership role.</span></p><span data-dcnode-id="3663" instrument_node="">
</span><p data-dcnode-id="3658"><span data-dcnode-id="3662" instrument_node="">In their theory, a </span><a data-dcnode-id="3660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/positive-leadership/" rel="noopener"><span data-dcnode-id="3661" instrument_node="">leader</span></a><span data-dcnode-id="3659" instrument_node=""> with a positive mindset is not only more likely to be actively engaged and to perform at a high level, he or she is also more able to influence followers toward a more positive mindset through role modeling and normative influence.</span></p><span data-dcnode-id="3657" instrument_node="">
</span><p data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">A study completed around the same time provides support for the relationship between leader and follower positivity; trust in management influenced positive PsyCap, which had a big impact on performance for leaders and followers (Clapp-Smith, Vogegesang, &amp; Avey, 2008).</span></p><span data-dcnode-id="3654" instrument_node="">
</span><p data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">Further, trust in management was linked to positive leadership and performance. While trust in management isn’t necessarily indicative of a positive mindset in both leader and follower, it is certainly a likely outcome of a generally positive attitude in the workplace.</span></p><span data-dcnode-id="3651" instrument_node="">
</span><p data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node="">Forbes writer Victor Lipman (2017) puts findings like these in simpler terms:</span></p><span data-dcnode-id="3648" instrument_node="">
</span><blockquote data-dcnode-id="3645"><p data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">“It’s always easier to follow someone with a positive outlook.”</span></p></blockquote><span data-dcnode-id="3644" instrument_node="">
</span><p data-dcnode-id="3642"><span data-dcnode-id="3643" instrument_node="">In other words, positive attitudes in a leader will draw followers and encourage motivation and engagement in subordinates. Lipman also notes that having a positive outlook and being resilient is vital in leadership positions because there is a lot of stress involved in managing and leading others.</span></p><span data-dcnode-id="3641" instrument_node="">
</span><p data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">Leaders must always be “on” and spend much of their time “performing” as a strong, confident leader and perhaps even a public face. This role is a tiring one, and being optimistic and resilient will help leaders stay sane and healthy in challenging contexts.</span></p><span data-dcnode-id="3638" instrument_node="">
</span><p data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3635" instrument_node="">
</span><h3 data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">The Promotion of Positive Attitudes Towards Disability</span></h3><span data-dcnode-id="3632" instrument_node="">
</span><p data-dcnode-id="3630"><span data-dcnode-id="3631" instrument_node="">Having a positive attitude is also a boon for those educating, interacting with, and caring for a disabled student, loved one, or patient.</span></p><span data-dcnode-id="3629" instrument_node="">
</span><p data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">A positive attitude toward disability facilitates disabled students’ education and helps them assimilate into postsecondary education (Rao, 2004).</span></p><span data-dcnode-id="3626" instrument_node="">
</span><p data-dcnode-id="3624"><span data-dcnode-id="3625" instrument_node="">This makes it even more troubling to learn that, according to a 2012 study on UK primary schools, only 38% of them had a Disability Equality Scheme in place and only 30% had included a plan to “promote positive attitudes towards disabled people” (Beckett &amp; Buckner). Further, 76% of schools reported that their staff had not received any training in the promotion of positive attitudes towards students with disabilities.</span></p><span data-dcnode-id="3623" instrument_node="">
</span><p data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">With so many resources available for promoting positive attitudes toward disability, there is ample opportunity to rectify this lack; for example, research by The Children’s Society in the UK identified several ways to promote positivity:</span></p><span data-dcnode-id="3620" instrument_node="">
</span><ul data-dcnode-id="3576"><span data-dcnode-id="3619" instrument_node="">
</span><li data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">An inclusive ethos within the school.</span></li><span data-dcnode-id="3616" instrument_node="">
</span><li data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">Staff teams who are knowledgeable, skilled, and committed.</span></li><span data-dcnode-id="3613" instrument_node="">
</span><li data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">Better training, guidance, and support for teachers, including Disability Equality training and ongoing INSET for all staff.</span></li><span data-dcnode-id="3610" instrument_node="">
</span><li data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">High levels of awareness across the whole school community.</span></li><span data-dcnode-id="3607" instrument_node="">
</span><li data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">Disability equality teaching being part of a wider strategy and included across the curriculum and not just within subjects such as PSHE, Citizenship and Religious education.</span></li><span data-dcnode-id="3604" instrument_node="">
</span><li data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">A designated member of staff to coordinate teaching across the curriculum</span></li><span data-dcnode-id="3601" instrument_node="">
</span><li data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">A better understanding of why promoting disability awareness and equality is important.</span></li><span data-dcnode-id="3598" instrument_node="">
</span><li data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">Links with disabled people within the school community and beyond, as well as links with special schools.</span></li><span data-dcnode-id="3595" instrument_node="">
</span><li data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">The availability of good resources.</span></li><span data-dcnode-id="3592" instrument_node="">
</span><li data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">Awareness of, and the challenging of, stereotypes.</span></li><span data-dcnode-id="3589" instrument_node="">
</span><li data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">A critical approach to the use of ‘disablist’ language which reinforces discriminatory attitudes and negative stereotypes.</span></li><span data-dcnode-id="3586" instrument_node="">
</span><li data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">Promotion of the social model of disability.</span></li><span data-dcnode-id="3583" instrument_node="">
</span><li data-dcnode-id="3578"><span data-dcnode-id="3582" instrument_node="">The inclusion of positive and diverse images in all materials used within the school and undertaking an audit of existing materials and resources to ensure they promote positive attitudes (More information on these suggestions can be found </span><a data-dcnode-id="3580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inclusivechoice.com/Disability%2520Equality%2520-%2520promoting%2520positive%2520attitudes%2520through%2520the%2520teaching%2520of%2520the%2520national%2520curriculum.pdf" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="3581" instrument_node="">here</span></a><span data-dcnode-id="3579" instrument_node="">).</span></li><span data-dcnode-id="3577" instrument_node="">
</span></ul><span data-dcnode-id="3575" instrument_node="">
</span><p data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">A 2009 study also established that formal instruction in disability awareness combined with hands-on fieldwork experiences with people who have a disability can have a significant impact on the positive attitudes toward those with disability (Campbell, Gilmore, &amp; Cuskelly).</span></p><span data-dcnode-id="3572" instrument_node="">
</span><p data-dcnode-id="3570"><span data-dcnode-id="3571" instrument_node="">The research found that teachers-in-training who participated in a one-semester course involving direct work with students who had Down syndrome greatly improved their knowledge of the syndrome as well as their attitudes toward those with Down syndrome.</span></p><span data-dcnode-id="3569" instrument_node="">
</span><p data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">All of these findings show that having a positive attitude towards those with a disability is not only the right thing to work toward, but it also has a significant positive influence on both those with disability and those around them.</span></p><span data-dcnode-id="3566" instrument_node="">
</span><p data-dcnode-id="3564"><span data-dcnode-id="3565" instrument_node="">Unsurprisingly, it’s also important for nurses and other health professionals to cultivate a positive attitude towards their patients with a disability—something that nurses sometimes struggle with (Tervo &amp; Palmer, 2004).</span></p><span data-dcnode-id="3563" instrument_node="">
</span><p data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3560" instrument_node="">
</span><h3 data-dcnode-id="3558"><span data-dcnode-id="3559" instrument_node="">Positive Attitude in Nursing and Health Care</span></h3><span data-dcnode-id="3557" instrument_node="">
</span><p data-dcnode-id="3555"><span data-dcnode-id="3556" instrument_node="">On the subject of nursing and healthcare, this is another context where having a positive mindset (towards oneself and one’s patients—disabled or otherwise) can have a positive impact.</span></p><span data-dcnode-id="3554" instrument_node="">
</span><p data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">In fact, having a positive attitude is so important for nursing, expert Jean Watson describes nursing as the “Caring Science” (2009). Indeed, positivity and caring are ingrained in the field; just take a look at the five core nursing values:</span></p><span data-dcnode-id="3551" instrument_node="">
</span><ol data-dcnode-id="3534"><span data-dcnode-id="3550" instrument_node="">
</span><li data-dcnode-id="3548"><span data-dcnode-id="3549" instrument_node="">Human dignity</span></li><span data-dcnode-id="3547" instrument_node="">
</span><li data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">Integrity</span></li><span data-dcnode-id="3544" instrument_node="">
</span><li data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node="">Autonomy</span></li><span data-dcnode-id="3541" instrument_node="">
</span><li data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">Altruism</span></li><span data-dcnode-id="3538" instrument_node="">
</span><li data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">Social justice (Fahrenwald, Bassett, Tschetter, Carson, White, &amp; Winterboer, 2005)</span></li><span data-dcnode-id="3535" instrument_node="">
</span></ol><span data-dcnode-id="3533" instrument_node="">
</span><p data-dcnode-id="3525"><span data-dcnode-id="3532" instrument_node="">These five values lay the foundation for a caring, positive mindset that is the hallmark of good nursing practice. Nurses who embrace these </span><a data-dcnode-id="3530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/values-clarification/" rel="noopener"><span data-dcnode-id="3531" instrument_node="">core values</span></a><span data-dcnode-id="3529" instrument_node=""> and adopt a positive mindset toward themselves, their work, and their patients can help them find the </span><a data-dcnode-id="3527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/meaning-of-life-positive-psychology/" rel="noopener"><span data-dcnode-id="3528" instrument_node="">meaning and fulfillment</span></a><span data-dcnode-id="3526" instrument_node=""> that likely prompted them to enter the field in the first place.</span></p><span data-dcnode-id="3524" instrument_node="">
</span><p data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">Having a positive mindset in health care not only acts as a facilitator of meaning and purpose in the lives of healthcare professionals but it also:</span></p><span data-dcnode-id="3521" instrument_node="">
</span><ol data-dcnode-id="3510"><span data-dcnode-id="3520" instrument_node="">
</span><li data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">Improves the professional’s performance and helps patients find healing and maintain a healthy lifestyle.</span></li><span data-dcnode-id="3517" instrument_node="">
</span><li data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">Reduces the frequency of accidents by enhancing focus.</span></li><span data-dcnode-id="3514" instrument_node="">
</span><li data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">Helps the professional build a good reputation and advance in their career (Swanson, n.d.).</span></li><span data-dcnode-id="3511" instrument_node="">
</span></ol><span data-dcnode-id="3509" instrument_node="">
</span><p data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">Luckily, there are evidence-backed ways for nurses to implement a more positive outlook, including:</span></p><span data-dcnode-id="3506" instrument_node="">
</span><ul data-dcnode-id="3476"><span data-dcnode-id="3505" instrument_node="">
</span><li data-dcnode-id="3501"><span data-dcnode-id="3504" instrument_node="">The “Three Good Things” exercise, in which the nursing staff maintains a “three good things” sheet that gets passed around all the nurses at the end of their shift; each staff member writes down at least one good thing that happened that day, and the charge nurse selects three of these positive things to share with the oncoming-shift nurses to help them start their day with positivity.</span><br data-dcnode-id="3503"><br data-dcnode-id="3502"></li><span data-dcnode-id="3500" instrument_node="">
</span><li data-dcnode-id="3496"><span data-dcnode-id="3499" instrument_node="">Increasing social connections with patients by placing a “getting to know you” board in each patient room; on admission, nurses can encourage the patient to share something about themselves (not their illness or hospitalization, but about who you are).</span><br data-dcnode-id="3498"><br data-dcnode-id="3497"></li><span data-dcnode-id="3495" instrument_node="">
</span><li data-dcnode-id="3491"><span data-dcnode-id="3494" instrument_node="">Encouraging random acts of kindness by nurses—a practice which has the potential to spread to patients and other healthcare professionals as well.</span><br data-dcnode-id="3493"><br data-dcnode-id="3492"></li><span data-dcnode-id="3490" instrument_node="">
</span><li data-dcnode-id="3486"><span data-dcnode-id="3489" instrument_node="">Enhancing gratitude through a staff peer recognition board.</span><br data-dcnode-id="3488"><br data-dcnode-id="3487"></li><span data-dcnode-id="3485" instrument_node="">
</span><li data-dcnode-id="3481"><span data-dcnode-id="3484" instrument_node="">Practicing loving-kindness meditation at staff meetings.</span><br data-dcnode-id="3483"><br data-dcnode-id="3482"></li><span data-dcnode-id="3480" instrument_node="">
</span><li data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">Identifying and applying one’s Signature Strengths (Roberts &amp; Strauss, 2015).</span></li><span data-dcnode-id="3477" instrument_node="">
</span></ul><span data-dcnode-id="3475" instrument_node="">
</span><p data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">Speaking of the importance of positivity in health care, the benefits can extend to the patients as well.</span></p><span data-dcnode-id="3472" instrument_node="">
</span><p data-dcnode-id="3468"><img alt="three good things exercise worksheet" class="aligncenter wp-image-22557 size-full lazyload" data-dcnode-id="3471" data-src="https://positivepsychology.com/wp-content/uploads/1_three-good-things.png" height="300" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="three good things exercise" width="600"><noscript data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">&lt;img class="aligncenter wp-image-22557 size-full lazyload" title="three good things exercise" src="https://positivepsychology.com/wp-content/uploads/1_three-good-things.png" alt="three good things exercise worksheet" width="600" height="300" /&gt;</span></noscript></p><span data-dcnode-id="3467" instrument_node="">
</span><p data-dcnode-id="3465"><span data-dcnode-id="3466" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3464" instrument_node="">
</span><h3 data-dcnode-id="3462"><span data-dcnode-id="3463" instrument_node="">Positive Attitude and Cancer Recovery</span></h3><span data-dcnode-id="3461" instrument_node="">
</span><p data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">You’ve probably heard the common phrases and encouragements used when discussing someone’s cancer diagnosis.</span></p><span data-dcnode-id="3458" instrument_node="">
</span><p data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">A cancer patient will likely be told at least a few times that “You have to stay positive!” and “You can fight this if you maintain a positive attitude.”</span></p><span data-dcnode-id="3455" instrument_node="">
</span><p data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">This idea that being positive will help cancer patients to fight the disease is a common one, although the literature is a bit iffy on whether this phenomenon is real (Coyne &amp; Tennen, 2010; O’Baugh, Wilkes, Luke, &amp; George, 2003).</span></p><span data-dcnode-id="3452" instrument_node="">
</span><p data-dcnode-id="3447"><span data-dcnode-id="3451" instrument_node="">Although it is unclear whether simply cultivating a positive mindset will help a patient beat cancer, there’s no doubt that getting support, focusing on a healthy mental state, and maintaining a positive attitude will help patients reduce their tension, anxiety, fatigue, and depression, and improve their overall </span><a data-dcnode-id="3449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/life-satisfaction/" rel="noopener"><span data-dcnode-id="3450" instrument_node="">quality of life</span></a><span data-dcnode-id="3448" instrument_node=""> (Spiegel et al., 2007).</span></p><span data-dcnode-id="3446" instrument_node="">
</span><p data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">Cancer Treatment Centers of America expert Katherine Puckett agrees that positivity can be helpful for patients being treated for cancer, but clarifies that other emotions are perfectly acceptable as well.</span></p><span data-dcnode-id="3443" instrument_node="">
</span><blockquote data-dcnode-id="3440"><p data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">“So often I have heard a loved one say to a cancer patient who is crying, ‘Stop crying. You know you have to be positive’… However, when we make space for people to express all of their feelings, rather than bottling them up inside, it is then easier for them to be optimistic. It is okay to allow tears to flow—these can be a healthy release.” (Katherine Puckett, as reported in Fischer, 2016).</span></p></blockquote><span data-dcnode-id="3439" instrument_node="">
</span><p data-dcnode-id="3434"><span data-dcnode-id="3438" instrument_node="">This indicates that the most important factor regarding positivity in cancer recovery is that it is </span><a data-dcnode-id="3436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/dabrowskis-positive-disintegration/" rel="noopener"><span data-dcnode-id="3437" instrument_node="">authentic</span></a><span data-dcnode-id="3435" instrument_node="">. False smiles and superficial cheerfulness will likely do nothing for the cancer patient, but working on cultivating an authentically positive mindset and focusing on the activities and techniques that build well-being can have a significant impact on a cancer patient’s quality of life and—possibly—their chances of beating cancer.</span></p><span data-dcnode-id="3433" instrument_node="">
</span><p data-dcnode-id="3431"><a data-dcnode-id="3432" name="tips-positive-mindset"></a></p><span data-dcnode-id="3430" instrument_node="">
</span><p data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3427" instrument_node="">
</span><h2 data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">33 Tips on How to Have &amp; Keep a Positive Mindset in Life and at Work</span></h2><span data-dcnode-id="3424" instrument_node="">
</span><p data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">Do a quick Google search on how to cultivate a more positive mindset, and you’ll see that there are tons of suggestions out there! We’ve gathered some of the most popular and most evidence-backed methods here, but don’t hesitate to search for more if you need them.</span></p><span data-dcnode-id="3421" instrument_node="">
</span><p data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">Larry Alton from Success.com lists 7 practical tips to help you get more positive:</span></p><span data-dcnode-id="3418" instrument_node="">
</span><ol data-dcnode-id="3392"><span data-dcnode-id="3417" instrument_node="">
</span><li data-dcnode-id="3412"><span data-dcnode-id="3416" instrument_node="">Start the day with </span><a data-dcnode-id="3414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/daily-affirmations/" rel="noopener"><span data-dcnode-id="3415" instrument_node="">positive affirmations</span></a><span data-dcnode-id="3413" instrument_node=""> (scroll down to see some example affirmations).</span></li><span data-dcnode-id="3411" instrument_node="">
</span><li data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">Focus on the good things, however small they are.</span></li><span data-dcnode-id="3408" instrument_node="">
</span><li data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">Find humor in bad situations.</span></li><span data-dcnode-id="3405" instrument_node="">
</span><li data-dcnode-id="3403"><span data-dcnode-id="3404" instrument_node="">Turn failures into lessons—and learn from them!</span></li><span data-dcnode-id="3402" instrument_node="">
</span><li data-dcnode-id="3400"><span data-dcnode-id="3401" instrument_node="">Transform negative self-talk into positive self-talk.</span></li><span data-dcnode-id="3399" instrument_node="">
</span><li data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">Focus on the present instead of getting mired in the past or losing your way in the future.</span></li><span data-dcnode-id="3396" instrument_node="">
</span><li data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">Find positive friends, mentors, and co-workers to support and encourage you (2018).</span></li><span data-dcnode-id="3393" instrument_node="">
</span></ol><span data-dcnode-id="3391" instrument_node="">
</span><p data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">A successful author, speaker, and coach Brian Tracy (n.d.) echoes some of these tips and adds a couple more:</span></p><span data-dcnode-id="3388" instrument_node="">
</span><ol data-dcnode-id="3371"><span data-dcnode-id="3387" instrument_node="">
</span><li data-dcnode-id="3385"><span data-dcnode-id="3386" instrument_node="">Remember that it’s your response that determines the outcome of a situation.</span></li><span data-dcnode-id="3384" instrument_node="">
</span><li data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">Use positive affirmations or phrases to chase off negative thoughts.</span></li><span data-dcnode-id="3381" instrument_node="">
</span><li data-dcnode-id="3379"><span data-dcnode-id="3380" instrument_node="">Find inspirational quotes and messages to bolster your positivity.</span></li><span data-dcnode-id="3378" instrument_node="">
</span><li data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">Decide to be happy by being grateful and assuming the people around you have the best of intentions.</span></li><span data-dcnode-id="3375" instrument_node="">
</span><li data-dcnode-id="3373"><span data-dcnode-id="3374" instrument_node="">Challenge yourself to maintain a positive attitude when something goes wrong—show the world how resilient and positive you are!</span></li><span data-dcnode-id="3372" instrument_node="">
</span></ol><span data-dcnode-id="3370" instrument_node="">
</span><p data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">For a more specific list of habits and actions you can take to develop a more positive mindset, try these 10 suggestions from Megan Wycklendt (2014) of Fulfillment Daily:</span></p><span data-dcnode-id="3367" instrument_node="">
</span><ul data-dcnode-id="3329"><span data-dcnode-id="3366" instrument_node="">
</span><li data-dcnode-id="3361"><span data-dcnode-id="3365" instrument_node="">Keep a </span><a data-dcnode-id="3363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/gratitude-journal/" rel="noopener"><span data-dcnode-id="3364" instrument_node="">gratitude journal</span></a><span data-dcnode-id="3362" instrument_node="">.</span></li><span data-dcnode-id="3360" instrument_node="">
</span><li data-dcnode-id="3355"><span data-dcnode-id="3359" instrument_node="">Reframe your challenges as opportunities for </span><a data-dcnode-id="3357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/5-ways-develop-grit-resilience/" rel="noopener"><span data-dcnode-id="3358" instrument_node="">growth</span></a><span data-dcnode-id="3356" instrument_node="">.</span></li><span data-dcnode-id="3354" instrument_node="">
</span><li data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">Get good at being rejected—it happens to everyone!</span></li><span data-dcnode-id="3351" instrument_node="">
</span><li data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">Use positive words to describe your life.</span></li><span data-dcnode-id="3348" instrument_node="">
</span><li data-dcnode-id="3346"><span data-dcnode-id="3347" instrument_node="">Replace have with get (e.g., I have to go to work → I get to go to work).</span></li><span data-dcnode-id="3345" instrument_node="">
</span><li data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">Don’t let yourself get dragged down into other people’s complaints.</span></li><span data-dcnode-id="3342" instrument_node="">
</span><li data-dcnode-id="3340"><span data-dcnode-id="3341" instrument_node="">Breathe—consciously, purposefully, and mindfully.</span></li><span data-dcnode-id="3339" instrument_node="">
</span><li data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">Notice the righteous and good in times of tragedy and violence.</span></li><span data-dcnode-id="3336" instrument_node="">
</span><li data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">Have solutions ready when you point out problems.</span></li><span data-dcnode-id="3333" instrument_node="">
</span><li data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">Make someone else smile.</span></li><span data-dcnode-id="3330" instrument_node="">
</span></ul><span data-dcnode-id="3328" instrument_node="">
</span><p data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">Finally, these 11 techniques from Dr. Tchiki Davis (2018) can also help you adopt a more positive attitude:</span></p><span data-dcnode-id="3325" instrument_node="">
</span><ul data-dcnode-id="3284"><span data-dcnode-id="3324" instrument_node="">
</span><li data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node="">Ask yourself, “Do I think positively?” Take a test or quiz on positivity to see where you stand.</span></li><span data-dcnode-id="3321" instrument_node="">
</span><li data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">Strengthen your memory for positive information by using positive words more often.</span></li><span data-dcnode-id="3318" instrument_node="">
</span><li data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">Strengthen your brain’s ability to work with positive information with exercises that involve positive words.</span></li><span data-dcnode-id="3315" instrument_node="">
</span><li data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">Strengthen your brain’s ability to pay attention to the positive by routinely redirecting your focus away from the negative to the positive.</span></li><span data-dcnode-id="3312" instrument_node="">
</span><li data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">Condition yourself to experience random moments of positivity (use classical conditioning on yourself to build positive associations).</span></li><span data-dcnode-id="3309" instrument_node="">
</span><li data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">Think positive—but not too much—and think negative when you need to; sometimes we need to grieve, think about the negative consequences, and use negative emotions to motivate and engage us.</span></li><span data-dcnode-id="3306" instrument_node="">
</span><li data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">Practice gratitude (perhaps with a gratitude journal).</span></li><span data-dcnode-id="3303" instrument_node="">
</span><li data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">Savor the good moments (stop to “smell the roses” and celebrate the positive).</span></li><span data-dcnode-id="3300" instrument_node="">
</span><li data-dcnode-id="3295"><span data-dcnode-id="3299" instrument_node="">Generate </span><a data-dcnode-id="3297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/positive-emotions-list-examples-definition-psychology/" rel="noopener"><span data-dcnode-id="3298" instrument_node="">positive emotions</span></a><span data-dcnode-id="3296" instrument_node=""> by watching funny videos</span></li><span data-dcnode-id="3294" instrument_node="">
</span><li data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">Stop minimizing your successes and acknowledge the efforts you put in.</span></li><span data-dcnode-id="3291" instrument_node="">
</span><li data-dcnode-id="3286"><span data-dcnode-id="3290" instrument_node="">Stop all-or-nothing thinking; this </span><a data-dcnode-id="3288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/cognitive-distortions/" rel="noopener"><span data-dcnode-id="3289" instrument_node="">cognitive distortion</span></a><span data-dcnode-id="3287" instrument_node=""> is not in line with reality since things are very rarely “all good” or “all bad.”</span></li><span data-dcnode-id="3285" instrument_node="">
</span></ul><span data-dcnode-id="3283" instrument_node="">
</span><p data-dcnode-id="3281"><a data-dcnode-id="3282" name="school-positive-mindset"></a></p><span data-dcnode-id="3280" instrument_node="">
</span><p data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3277" instrument_node="">
</span><h2 data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">Helping Students to Develop a Positive Attitude Towards Learning and School</span></h2><span data-dcnode-id="3274" instrument_node="">
</span><p data-dcnode-id="3270"><img alt="two happy students - Helping Students to Develop a Positive Attitude Towards Learning and School" class="alignright wp-image-22558 lazyload" data-dcnode-id="3273" data-src="https://positivepsychology.com/wp-content/uploads/positive-mindset-students.jpg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="positive mindset students" width="300"><noscript data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">&lt;img class="alignright wp-image-22558 lazyload" title="positive mindset students" src="https://positivepsychology.com/wp-content/uploads/positive-mindset-students.jpg" alt="two happy students - Helping Students to Develop a Positive Attitude Towards Learning and School" width="300" /&gt;</span></noscript></p><span data-dcnode-id="3269" instrument_node="">
</span><p data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">To pass along the benefits of developing a positive mindset to students, you can encourage them to try the techniques listed above.</span></p><span data-dcnode-id="3266" instrument_node="">
</span><p data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">However, there are some methods for improving students’ attitude towards learning and school that may be even more effective.</span></p><span data-dcnode-id="3263" instrument_node="">
</span><p data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">Elliot Seif from the ASCD’s Edge website outlines 13 ways you can help students cultivate this mindset:</span></p><span data-dcnode-id="3260" instrument_node="">
</span><ul data-dcnode-id="3189"><span data-dcnode-id="3259" instrument_node="">
</span><li data-dcnode-id="3255"><span data-dcnode-id="3258" instrument_node="">“Reduce the emphasis on traditional testing as the key assessment tool, and focus on more “natural” and diverse assessment approaches such as essays and papers, reflective journals, oral presentations, and other demonstrations of their learning.</span><br data-dcnode-id="3257"><br data-dcnode-id="3256"></li><span data-dcnode-id="3254" instrument_node="">
</span><li data-dcnode-id="3250"><span data-dcnode-id="3253" instrument_node="">Create the expectation that effort makes a difference in learning. Help students understand that when someone works hard, they are more likely to succeed. Give students more opportunities to put effort into areas that interest them and that they enjoy.</span><br data-dcnode-id="3252"><br data-dcnode-id="3251"></li><span data-dcnode-id="3249" instrument_node="">
</span><li data-dcnode-id="3242"><span data-dcnode-id="3248" instrument_node="">Include narratives on report cards that focus on individual </span><a data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/what-are-your-strengths/" rel="noopener"><span data-dcnode-id="3247" instrument_node="">strengths</span></a><span data-dcnode-id="3245" instrument_node=""> and interests.</span><br data-dcnode-id="3244"><br data-dcnode-id="3243"></li><span data-dcnode-id="3241" instrument_node="">
</span><li data-dcnode-id="3237"><span data-dcnode-id="3240" instrument_node="">Where possible, instead of or in addition to reading textbooks, find and have students read and choose books that are interesting to them, that opens them up to the world around them, that makes them think!</span><br data-dcnode-id="3239"><br data-dcnode-id="3238"></li><span data-dcnode-id="3236" instrument_node="">
</span><li data-dcnode-id="3229"><span data-dcnode-id="3235" instrument_node="">Focus primarily on student strengths and student success. For each student, consider “</span><a data-dcnode-id="3233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/learned-optimism/" rel="noopener"><span data-dcnode-id="3234" instrument_node="">the glass as half full</span></a><span data-dcnode-id="3232" instrument_node="">” rather than “the glass as half empty”. Encourage students as much as possible. Understand that not all students will be strong in all areas and that it is important to help each student find his or her strengths and interests and to build on them. Also, see “failure” as an opportunity for student growth. Make it clear to students that not doing well is a cause for looking inside yourself to see how you can do something better (and that you will do the same). Give students more specific feedback, along with opportunities to redo their work and improve it. Provide mentors and tutors and other help and support for students who need it.</span><br data-dcnode-id="3231"><br data-dcnode-id="3230"></li><span data-dcnode-id="3228" instrument_node="">
</span><li data-dcnode-id="3224"><span data-dcnode-id="3227" instrument_node="">Be willing to “slow down the learning process”. Focus learning on what you think is important. Figure out ways to teach an idea differently, and work on something for a longer period than you normally do if your students are not “getting it”. Figure out alternative ways to teach something if your approach isn’t working.</span><br data-dcnode-id="3226"><br data-dcnode-id="3225"></li><span data-dcnode-id="3223" instrument_node="">
</span><li data-dcnode-id="3219"><span data-dcnode-id="3222" instrument_node="">Focus a good deal of your teaching on “learning how to learn” skill development. Read up on how to teach study skills, learning to learn skills, research skills, inquiry skills. Make sure that your students grow both in terms of content they learn and the “learning to learn” skills they need to develop in order to learn well in the future.</span><br data-dcnode-id="3221"><br data-dcnode-id="3220"></li><span data-dcnode-id="3218" instrument_node="">
</span><li data-dcnode-id="3214"><span data-dcnode-id="3217" instrument_node="">Make “asking questions” central to your teaching and to your learning environment and school culture. Write course descriptions around key questions. Use essential questions to focus units, or have students develop essential questions as the focus for learning. As you teach, encourage students to ask clarifying and elaborative questions. Make it clear to students that no question is too small or too silly. Build open time for students to ask questions on the topics they are studying. Use “wait time” when you are asking for questions. Teach students study strategies such as SQ3R[i] that encourage students to turn statements (such as text headings) into questions.</span><br data-dcnode-id="3216"><br data-dcnode-id="3215"></li><span data-dcnode-id="3213" instrument_node="">
</span><li data-dcnode-id="3209"><span data-dcnode-id="3212" instrument_node="">Give students more choices and options – in the classroom, by offering many electives, through multiple extra-curricular options. Choices/options should give students opportunities to develop and expand their interests, see connections and relevance in what they are learning, and expand their talents.</span><br data-dcnode-id="3211"><br data-dcnode-id="3210"></li><span data-dcnode-id="3208" instrument_node="">
</span><li data-dcnode-id="3204"><span data-dcnode-id="3207" instrument_node="">Use inquiry strategies, research skill-building activities, interactive learning and projects as critical parts of teaching. Incorporate more interest-based projects into your curriculum.</span><br data-dcnode-id="3206"><br data-dcnode-id="3205"></li><span data-dcnode-id="3203" instrument_node="">
</span><li data-dcnode-id="3199"><span data-dcnode-id="3202" instrument_node="">Where possible, make learning experiences more “authentic”. For example, consider how learning about the American Revolution might be tied to a current event happening in the world. Visit the area surrounding the school to demonstrate how math might be used for everyday activity. Through surveys, encourage students to provide feedback on whether they feel that their learning is interesting, motivating, and relevant and whether they are being encouraged to develop their talents and interests. Conduct student surveys to determine what types of school and classroom activities are most motivating and interesting. Create activities and experiences that enable students to get outside the school and learn from the outside world and perform community service.</span><br data-dcnode-id="3201"><br data-dcnode-id="3200"></li><span data-dcnode-id="3198" instrument_node="">
</span><li data-dcnode-id="3194"><span data-dcnode-id="3197" instrument_node="">Create more ways to integrate learning across the curriculum and consider ways to redesign the curriculum. Use themes to create more interdisciplinary units. Connect separate subject areas, such as by teaching American history and literature in tandem so that history topics and specific literature that touch on similar time periods or themes are taught at the same time. When redesigning or renewing the curriculum, examine whether curriculum materials or programs have a significant component built around developing curiosity, motivation, relevance, and interest.</span><br data-dcnode-id="3196"><br data-dcnode-id="3195"></li><span data-dcnode-id="3193" instrument_node="">
</span><li data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">See yourself as helping students build “pathways to adult success”. How can your subject, your grade level, your school contribute to making these pathways smoother? How can you provide students with a concrete understanding of their future options? Can you take field trips to different places of business? Colleges and universities? Bring in speakers?” (Seif, 2013)</span></li><span data-dcnode-id="3190" instrument_node="">
</span></ul><span data-dcnode-id="3188" instrument_node="">
</span><p data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">However, these techniques are not always within a teacher’s (or parent’s) realm of control. If you these techniques are too overwhelming or the scope is out of your control, try these 7 strategies that you will likely have the power to implement:</span></p><span data-dcnode-id="3185" instrument_node="">
</span><ol data-dcnode-id="3147"><span data-dcnode-id="3184" instrument_node="">
</span><li data-dcnode-id="3180"><span data-dcnode-id="3183" instrument_node="">Be an example. Model a positive, encouraging attitude in all that you say, do and believe.</span><br data-dcnode-id="3182"><br data-dcnode-id="3181"></li><span data-dcnode-id="3179" instrument_node="">
</span><li data-dcnode-id="3175"><span data-dcnode-id="3178" instrument_node="">Create a positive learning space for your student.</span><br data-dcnode-id="3177"><br data-dcnode-id="3176"></li><span data-dcnode-id="3174" instrument_node="">
