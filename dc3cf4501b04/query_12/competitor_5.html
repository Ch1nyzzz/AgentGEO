</span><li data-dcnode-id="3170"><span data-dcnode-id="3173" instrument_node="">Help your student visualize a positive outcome from every scenario before starting.</span><br data-dcnode-id="3172"><br data-dcnode-id="3171"></li><span data-dcnode-id="3169" instrument_node="">
</span><li data-dcnode-id="3165"><span data-dcnode-id="3168" instrument_node="">Eliminate negative verbiage from your students’ dialogue (e.g., respond to “I can’t do it” with “Why can’t you do it? What’s holding you back? How can I help?”).</span><br data-dcnode-id="3167"><br data-dcnode-id="3166"></li><span data-dcnode-id="3164" instrument_node="">
</span><li data-dcnode-id="3160"><span data-dcnode-id="3163" instrument_node="">Help your students change negative thinking patterns (encourage them to replace the negative thoughts with positive ones).</span><br data-dcnode-id="3162"><br data-dcnode-id="3161"></li><span data-dcnode-id="3159" instrument_node="">
</span><li data-dcnode-id="3152"><span data-dcnode-id="3158" instrument_node="">Play the role of your students’ biggest fan (encourage them and help them develop </span><a data-dcnode-id="3156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/self-confidence/" rel="noopener"><span data-dcnode-id="3157" instrument_node="">self-confidence</span></a><span data-dcnode-id="3155" instrument_node="">).</span><br data-dcnode-id="3154"><br data-dcnode-id="3153"></li><span data-dcnode-id="3151" instrument_node="">
</span><li data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">Incorporate a rewards system to encourage positivity at all times (Werrell, 2016).</span></li><span data-dcnode-id="3148" instrument_node="">
</span></ol><span data-dcnode-id="3146" instrument_node="">
</span><p data-dcnode-id="3141"><span data-dcnode-id="3145" instrument_node="">For more tips and suggestions from the Association for Supervision and Curriculum Development, check out their excellent resource on instilling positive attitudes and perceptions about learning </span><a data-dcnode-id="3143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ascd.org/publications/books/61192107/chapters/Dimension-1%40-Positive-Attitudes-and-Perceptions-About-Learning.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3144" instrument_node="">here</span></a><span data-dcnode-id="3142" instrument_node="">.</span></p><span data-dcnode-id="3140" instrument_node="">
</span><p data-dcnode-id="3138"><a data-dcnode-id="3139" name="activities-positive-mindset"></a></p><span data-dcnode-id="3137" instrument_node="">
</span><p data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3134" instrument_node="">
</span><h2 data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">46 Activities and Games to Develop Positive Mindset Skills (incl. Group Exercises)</span></h2><span data-dcnode-id="3131" instrument_node="">
</span><p data-dcnode-id="3126"><img alt="46 Activities and Games to Develop Positive Mindset Skills (incl. Group Exercises)" class="alignright wp-image-22548 lazyload" data-dcnode-id="3130" data-src="https://positivepsychology.com/wp-content/uploads/positive-mindset-skills.jpg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="positive mindset skills" width="300"><noscript data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">&lt;img class="alignright wp-image-22548 lazyload" title="positive mindset skills" src="https://positivepsychology.com/wp-content/uploads/positive-mindset-skills.jpg" alt="46 Activities and Games to Develop Positive Mindset Skills (incl. Group Exercises)" width="300" /&gt;</span></noscript><span data-dcnode-id="3127" instrument_node="">If you’re interested in fun, engaging, and hands-on ways to improve your positivity and enhance your positive mindset, you’ve come to the right place!</span></p><span data-dcnode-id="3125" instrument_node="">
</span><p data-dcnode-id="3120"><span data-dcnode-id="3124" instrument_node="">There are many </span><a data-dcnode-id="3122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/positive-thinking-exercises/"><span data-dcnode-id="3123" instrument_node="">positive thinking exercises</span></a><span data-dcnode-id="3121" instrument_node=""> and games that can give you a boost.</span></p><span data-dcnode-id="3119" instrument_node="">
</span><p data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">Some of the most popular ones are listed here, but feel free to search for more if none of them align with your interests—there are a lot to choose from out there!</span></p><span data-dcnode-id="3116" instrument_node="">
</span><p data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3113" instrument_node="">
</span><h3 data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">For Adults</span></h3><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">Zdravko Lukovski from the Enlightenment Portal website has 10 exercises and activities that you can implement in your own life or encourage your clients to try in order to think more positively:</span></p><span data-dcnode-id="3107" instrument_node="">
</span><ul data-dcnode-id="3051"><span data-dcnode-id="3106" instrument_node="">
</span><li data-dcnode-id="3102"><span data-dcnode-id="3105" instrument_node="">Listen to your favorite music—it’s that easy! Music has a fairly unique ability to put you in a positive state of mind, so take advantage of that fact.</span><br data-dcnode-id="3104"><br data-dcnode-id="3103"></li><span data-dcnode-id="3101" instrument_node="">
</span><li data-dcnode-id="3097"><span data-dcnode-id="3100" instrument_node="">Express your thankfulness and gratitude for all the good things in your life. Appreciate them, and write them down to help you remember.</span><br data-dcnode-id="3099"><br data-dcnode-id="3098"></li><span data-dcnode-id="3096" instrument_node="">
</span><li data-dcnode-id="3092"><span data-dcnode-id="3095" instrument_node="">Remember to breathe. Breathe deeply, slowly, and mindfully to transport your mind to a positive, calm place.</span><br data-dcnode-id="3094"><br data-dcnode-id="3093"></li><span data-dcnode-id="3091" instrument_node="">
</span><li data-dcnode-id="3087"><span data-dcnode-id="3090" instrument_node="">Don’t live according to a label—labels come from others, not from yourself, and you are so much more than a simple label could ever represent. Be authentic, and it will be much easier to be positive.</span><br data-dcnode-id="3089"><br data-dcnode-id="3088"></li><span data-dcnode-id="3086" instrument_node="">
</span><li data-dcnode-id="3082"><span data-dcnode-id="3085" instrument_node="">Check your internal dialogue, and challenge that critical inner voice to make room for happiness.</span><br data-dcnode-id="3084"><br data-dcnode-id="3083"></li><span data-dcnode-id="3081" instrument_node="">
</span><li data-dcnode-id="3071"><span data-dcnode-id="3080" instrument_node="">Engage in positive activities like </span><a data-dcnode-id="3078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/mindfulness-meditation/" rel="noopener"><span data-dcnode-id="3079" instrument_node="">meditation</span></a><span data-dcnode-id="3077" instrument_node="">, </span><a data-dcnode-id="3075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/benefits-of-yoga/" rel="noopener"><span data-dcnode-id="3076" instrument_node="">yoga</span></a><span data-dcnode-id="3074" instrument_node="">, hiking, playing a sport, or whatever other activity you enjoy.</span><br data-dcnode-id="3073"><br data-dcnode-id="3072"></li><span data-dcnode-id="3070" instrument_node="">
</span><li data-dcnode-id="3066"><span data-dcnode-id="3069" instrument_node="">Take back control of the things you can change—and put in the effort required to actually change—but learn to accept the things you cannot change.</span><br data-dcnode-id="3068"><br data-dcnode-id="3067"></li><span data-dcnode-id="3065" instrument_node="">
</span><li data-dcnode-id="3061"><span data-dcnode-id="3064" instrument_node="">Go easy on yourself. Don’t kick yourself when you’re down; everyone fails, and it doesn’t mean you’re not good enough.</span><br data-dcnode-id="3063"><br data-dcnode-id="3062"></li><span data-dcnode-id="3060" instrument_node="">
</span><li data-dcnode-id="3056"><span data-dcnode-id="3059" instrument_node="">Pay attention to your diet, and ensure that you eat healthy food that will contribute to a healthy and positive mind.</span><br data-dcnode-id="3058"><br data-dcnode-id="3057"></li><span data-dcnode-id="3055" instrument_node="">
</span><li data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">Embrace change—it’s happening whether we want it to or not, so it’s best to embrace it. Make an effort to step outside of your comfort zone (2015).</span></li><span data-dcnode-id="3052" instrument_node="">
</span></ul><span data-dcnode-id="3050" instrument_node="">
</span><p data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">This list from Thought Catalog’s Kathy Mitchell (2017) has some of the same ideas as Lukovski, but she adds a few more activities as well:</span></p><span data-dcnode-id="3047" instrument_node="">
</span><ul data-dcnode-id="2972"><span data-dcnode-id="3046" instrument_node="">
</span><li data-dcnode-id="3042"><span data-dcnode-id="3045" instrument_node="">Listen to upbeat music.</span><br data-dcnode-id="3044"><br data-dcnode-id="3043"></li><span data-dcnode-id="3041" instrument_node="">
</span><li data-dcnode-id="3037"><span data-dcnode-id="3040" instrument_node="">Have sex (that can certainly be an engaging and life-affirming activity!).</span><br data-dcnode-id="3039"><br data-dcnode-id="3038"></li><span data-dcnode-id="3036" instrument_node="">
</span><li data-dcnode-id="3032"><span data-dcnode-id="3035" instrument_node="">Travel, even if it’s not very far—the point is to interact with different people and get to know other cultures.</span><br data-dcnode-id="3034"><br data-dcnode-id="3033"></li><span data-dcnode-id="3031" instrument_node="">
</span><li data-dcnode-id="3027"><span data-dcnode-id="3030" instrument_node="">Eat healthy foods.</span><br data-dcnode-id="3029"><br data-dcnode-id="3028"></li><span data-dcnode-id="3026" instrument_node="">
</span><li data-dcnode-id="3022"><span data-dcnode-id="3025" instrument_node="">Be thankful and cultivate gratitude.</span><br data-dcnode-id="3024"><br data-dcnode-id="3023"></li><span data-dcnode-id="3021" instrument_node="">
</span><li data-dcnode-id="3017"><span data-dcnode-id="3020" instrument_node="">Journal and/or use a notebook to write things down—especially positive things.</span><br data-dcnode-id="3019"><br data-dcnode-id="3018"></li><span data-dcnode-id="3016" instrument_node="">
</span><li data-dcnode-id="3012"><span data-dcnode-id="3015" instrument_node="">Breathe mindfully and deeply.</span><br data-dcnode-id="3014"><br data-dcnode-id="3013"></li><span data-dcnode-id="3011" instrument_node="">
</span><li data-dcnode-id="3007"><span data-dcnode-id="3010" instrument_node="">Use positive words and avoid phrases like “I can’t” and “I won’t.”</span><br data-dcnode-id="3009"><br data-dcnode-id="3008"></li><span data-dcnode-id="3006" instrument_node="">
</span><li data-dcnode-id="3002"><span data-dcnode-id="3005" instrument_node="">Practice positive affirmations or mantras.</span><br data-dcnode-id="3004"><br data-dcnode-id="3003"></li><span data-dcnode-id="3001" instrument_node="">
</span><li data-dcnode-id="2997"><span data-dcnode-id="3000" instrument_node="">Try the Best Possible Self exercise (imagine yourself in your best possible future, and write about it).</span><br data-dcnode-id="2999"><br data-dcnode-id="2998"></li><span data-dcnode-id="2996" instrument_node="">
</span><li data-dcnode-id="2992"><span data-dcnode-id="2995" instrument_node="">Volunteer and commit your time and efforts to helping others.</span><br data-dcnode-id="2994"><br data-dcnode-id="2993"></li><span data-dcnode-id="2991" instrument_node="">
</span><li data-dcnode-id="2987"><span data-dcnode-id="2990" instrument_node="">Take control of the things you can, and accept the things you can’t.</span><br data-dcnode-id="2989"><br data-dcnode-id="2988"></li><span data-dcnode-id="2986" instrument_node="">
</span><li data-dcnode-id="2982"><span data-dcnode-id="2985" instrument_node="">Remind yourself “Never a failure, always a lesson;” make every failure a learning opportunity.</span><br data-dcnode-id="2984"><br data-dcnode-id="2983"></li><span data-dcnode-id="2981" instrument_node="">
</span><li data-dcnode-id="2977"><span data-dcnode-id="2980" instrument_node="">Try the mirror technique—say something positive about yourself (and truly mean it) every time you see yourself in the mirror.</span><br data-dcnode-id="2979"><br data-dcnode-id="2978"></li><span data-dcnode-id="2976" instrument_node="">
</span><li data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">Socialize and spend time with others, including family, friends, your spouse or significant other, and new friends or acquaintances.</span></li><span data-dcnode-id="2973" instrument_node="">
</span></ul><span data-dcnode-id="2971" instrument_node="">
</span><p data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">If you’re more interested in games you can play to boost positive thinking, try these suggested games from Mary Osborne (2017) at Live Strong.</span></p><span data-dcnode-id="2968" instrument_node="">
</span><p data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2965" instrument_node="">
</span><h3 data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">Recognizing Positive Behavior</span></h3><span data-dcnode-id="2962" instrument_node="">
</span><p data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">Gather your team (or family, friends, etc.) and review a list of a generic individual’s positive behaviors (like giving credit to others, smiling, saying thank you, and listening nonjudgmentally).</span></p><span data-dcnode-id="2959" instrument_node="">
</span><p data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">Next, ask players to identify their reactions to positive behaviors like these.</span></p><span data-dcnode-id="2956" instrument_node="">
</span><p data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">When everyone has listed their responses to these behaviors, talk about them as a group to show that engaging in positive behaviors like these will attract clients, customers, and coworkers rather than repel them.</span></p><span data-dcnode-id="2953" instrument_node="">
</span><p data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2950" instrument_node="">
</span><h3 data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">The “Glad” Game</span></h3><span data-dcnode-id="2947" instrument_node="">
</span><p data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">This game comes from the Disney movie Pollyanna, in which the main character actively cultivates positive thinking.</span></p><span data-dcnode-id="2944" instrument_node="">
</span><p data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">Have one person bring up a negative event, like losing a job or breaking up with a boyfriend or girlfriend.</span></p><span data-dcnode-id="2941" instrument_node="">
</span><p data-dcnode-id="2936"><span data-dcnode-id="2940" instrument_node="">The other players are challenged to turn the first person’s thoughts to the positive; for example, they can say something like, “</span><em data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">But now that I’ve lost my job, I’ll have more time to _______</span></em><span data-dcnode-id="2937" instrument_node="">.” The first person must come up with a word or phrase that fits the blank.</span></p><span data-dcnode-id="2935" instrument_node="">
</span><p data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">This game will encourage you to find the silver lining and look for opportunities instead of wallowing in despair.</span></p><span data-dcnode-id="2932" instrument_node="">
</span><p data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2929" instrument_node="">
</span><h3 data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">Egg-Balancing Game</span></h3><span data-dcnode-id="2926" instrument_node="">
</span><p data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">The egg-balancing game can be frustrating, but it can impart an important lesson in staying optimistic and open-minded.</span></p><span data-dcnode-id="2923" instrument_node="">
</span><p data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">Give your player(s) a raw egg and a flat, somewhat textured tabletop (use a tablecloth or placemat if you need to). Tell them to find a way to balance the egg in an upright position on the table. They might say it’s not possible, but assure them that it is!</span></p><span data-dcnode-id="2920" instrument_node="">
</span><p data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">Let them try for a while—they might actually be able to do it—but give them a small mound of salt to balance the egg in if they are struggling for too long. If you use the salt, remind them that this is an important thing to remember: sometimes things that seem impossible actually are possible when you think outside the box!</span></p><span data-dcnode-id="2917" instrument_node="">
</span><p data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2914" instrument_node="">
</span><h3 data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">Hunt for Happiness</span></h3><span data-dcnode-id="2911" instrument_node="">
</span><p data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">This game is described as a “positive-thinking scavenger game” and it can be used with both children and adults.</span></p><span data-dcnode-id="2908" instrument_node="">
</span><p data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">Have the players make a list of things that they feel make life worth living or, for younger children, things that make them smile.</span></p><span data-dcnode-id="2905" instrument_node="">
</span><p data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">Once everyone has a list ready, send them off on a scavenger hunt to collect as many items on the list as possible. If it’s too big to collect and bring back, you can mark your “collection” of it on the list.</span></p><span data-dcnode-id="2902" instrument_node="">
</span><p data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">You’ll have to get creative to check off everything on the list, especially abstract things like “love,” but that’s part of the challenge. As a bonus, it will also help you boost your creative thinking in addition to your positive thinking.</span></p><span data-dcnode-id="2899" instrument_node="">
</span><p data-dcnode-id="2894"><span data-dcnode-id="2898" instrument_node="">To read more about these games, click </span><a data-dcnode-id="2896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livestrong.com/article/14685-goal-setting-in-relationships/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2897" instrument_node="">here</span></a><span data-dcnode-id="2895" instrument_node="">.</span></p><span data-dcnode-id="2893" instrument_node="">
</span><p data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2890" instrument_node="">
</span><h3 data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">For Children</span></h3><span data-dcnode-id="2887" instrument_node="">
</span><p data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">There are even more games and activities to help children develop a positive mindset. If you’re a teacher, parent, coach, or anyone else who interacts with kids, give these activities a try.</span></p><span data-dcnode-id="2884" instrument_node="">
</span><p data-dcnode-id="2879"><span data-dcnode-id="2883" instrument_node="">Big Life Journal has a great infographic that lists the ways you can help children develop a positive attitude. You can find the whole blog post </span><a data-dcnode-id="2881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biglifejournal.com/blogs/blog/children-positive-attitude" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2882" instrument_node="">here</span></a><span data-dcnode-id="2880" instrument_node="">, but we’ll outline the 7 activities they describe:</span></p><span data-dcnode-id="2878" instrument_node="">
</span><ol data-dcnode-id="2843"><span data-dcnode-id="2877" instrument_node="">
</span><li data-dcnode-id="2873"><span data-dcnode-id="2876" instrument_node="">Engage your child in loving-kindness meditation. You can teach him or her the four traditional phrases directed towards loved ones if you’d like: “May you feel safe. May you feel happy. May you feel healthy. May you live with ease.”</span><br data-dcnode-id="2875"><br data-dcnode-id="2874"></li><span data-dcnode-id="2872" instrument_node="">
</span><li data-dcnode-id="2868"><span data-dcnode-id="2871" instrument_node="">Encourage your child to help others, whether that takes the form of assisting an elderly neighbor with yard work or chores, helping a friend with homework, or participating in a canned food, clothing, or toy drive.</span><br data-dcnode-id="2870"><br data-dcnode-id="2869"></li><span data-dcnode-id="2867" instrument_node="">
</span><li data-dcnode-id="2863"><span data-dcnode-id="2866" instrument_node="">Have your child create and write in an “Awe Journal.” Tell them to write down any sights or moments from their daily life that they find beautiful, extraordinary, awesome, or just all-around wonderful.</span><br data-dcnode-id="2865"><br data-dcnode-id="2864"></li><span data-dcnode-id="2862" instrument_node="">
</span><li data-dcnode-id="2858"><span data-dcnode-id="2861" instrument_node="">Encourage your child to set goals, visualize their path forward, and plan for obstacles before they come face-to-face with them (this is the WOOP approach: Wish, Outcome, Obstacle, Plan).</span><br data-dcnode-id="2860"><br data-dcnode-id="2859"></li><span data-dcnode-id="2857" instrument_node="">
</span><li data-dcnode-id="2853"><span data-dcnode-id="2856" instrument_node="">Share your own positive experiences with your child. Laugh with them, hug them, and set aside quality time to simply be together.</span><br data-dcnode-id="2855"><br data-dcnode-id="2854"></li><span data-dcnode-id="2852" instrument_node="">
</span><li data-dcnode-id="2848"><span data-dcnode-id="2851" instrument_node="">Identify your child’s strengths and encourage him or her to put them to good use and develop them further with productive, fun activities.</span><br data-dcnode-id="2850"><br data-dcnode-id="2849"></li><span data-dcnode-id="2847" instrument_node="">
</span><li data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">Guide your child through the process of coming up with positive affirmations like, “I am kind. I am enough. I am loving. I am good.” (Cullins, 2018).</span></li><span data-dcnode-id="2844" instrument_node="">
</span></ol><span data-dcnode-id="2842" instrument_node="">
</span><p data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">Another collection of activities that can help children (and the whole family) develop and maintain a positive mindset comes from Sharon Harding at the Rediscovered Families website:</span></p><span data-dcnode-id="2839" instrument_node="">
</span><ul data-dcnode-id="2774"><span data-dcnode-id="2838" instrument_node="">
</span><li data-dcnode-id="2834"><span data-dcnode-id="2837" instrument_node="">Keep “Quote Books,” or notebooks for your children to write in. Every week, choose a positive quote to share with your kids and encourage them to write it down along with their thoughts, drawings that correspond to the quote, or insights from a family discussion or activities based on the quote.</span><br data-dcnode-id="2836"><br data-dcnode-id="2835"></li><span data-dcnode-id="2833" instrument_node="">
</span><li data-dcnode-id="2829"><span data-dcnode-id="2832" instrument_node="">Try the “Success of the Day” activity, in which each family member is encouraged to talk about a success they had that day, like helping someone, standing up for a peer, finishing a project, or committing (or receiving) a random act of kindness. Your children can keep a journal of their successes to look back on and draw inspiration from.</span><br data-dcnode-id="2831"><br data-dcnode-id="2830"></li><span data-dcnode-id="2828" instrument_node="">
</span><li data-dcnode-id="2824"><span data-dcnode-id="2827" instrument_node="">Create Warm Fuzzy Jars for each of your children; whenever they do something kind or helpful, they can place a pom-pom ball in their jar to represent the warm fuzzy feeling they gave to another person. When their jar is full, they get to choose a special or fun activity to do—with either parent, both parents, their sibling, or the whole family.</span><br data-dcnode-id="2826"><br data-dcnode-id="2825"></li><span data-dcnode-id="2823" instrument_node="">
</span><li data-dcnode-id="2819"><span data-dcnode-id="2822" instrument_node="">Write Morning Love Notes (sweet notes for them to read in the morning and get a good start to their day) for your children, and encourage them to write them for their siblings.</span><br data-dcnode-id="2821"><br data-dcnode-id="2820"></li><span data-dcnode-id="2818" instrument_node="">
</span><li data-dcnode-id="2814"><span data-dcnode-id="2817" instrument_node="">Choose an Act of Kindness to help your kids understand the impact a simple kindness can have. Try something like shoveling a neighbor’s walkway when it snows, bringing a meal to a family in need, or volunteering.</span><br data-dcnode-id="2816"><br data-dcnode-id="2815"></li><span data-dcnode-id="2813" instrument_node="">
</span><li data-dcnode-id="2806"><span data-dcnode-id="2812" instrument_node="">Creating art that helps them to manage their feelings and turn their mind towards the positive (more info </span><a data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imperfectfamilies.com/helping-kids-manage-anxiety-art/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2811" instrument_node="">here</span></a><span data-dcnode-id="2809" instrument_node="">).</span><br data-dcnode-id="2808"><br data-dcnode-id="2807"></li><span data-dcnode-id="2805" instrument_node="">
</span><li data-dcnode-id="2798"><span data-dcnode-id="2804" instrument_node="">Have each family member create a Slinky Character Trait Person. Encourage each family member to identify some positive character traits in each other and write them on the slinky person. You can find more detailed instructions </span><a data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teacherspayteachers.com/Product/Slinky-Character-Trait-Person-372421" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2803" instrument_node="">here</span></a><span data-dcnode-id="2801" instrument_node="">.</span><br data-dcnode-id="2800"><br data-dcnode-id="2799"></li><span data-dcnode-id="2797" instrument_node="">
</span><li data-dcnode-id="2793"><span data-dcnode-id="2796" instrument_node="">Help each child make a vision board to share their hopes, dreams, goals, and aspirations with each other.</span><br data-dcnode-id="2795"><br data-dcnode-id="2794"></li><span data-dcnode-id="2792" instrument_node="">
</span><li data-dcnode-id="2782"><span data-dcnode-id="2791" instrument_node="">Complete the </span><a data-dcnode-id="2789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//buggyandbuddy.com/inspirational-splatter-paint-art-project-for-kids/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2790" instrument_node="">Buggy and Buddy motivational art activity</span></a><span data-dcnode-id="2788" instrument_node=""> to help your children boost their creative confidence and </span><a data-dcnode-id="2786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/self-esteem-worksheets/" rel="noopener"><span data-dcnode-id="2787" instrument_node="">self-esteem</span></a><span data-dcnode-id="2785" instrument_node="">.</span><br data-dcnode-id="2784"><br data-dcnode-id="2783"></li><span data-dcnode-id="2781" instrument_node="">
</span><li data-dcnode-id="2776"><span data-dcnode-id="2780" instrument_node="">Make gratitude stones and encourage your children to practice gratitude every day. All you’ll need is a small, smooth stone and some paint to create a heart on the stone. Tell your children to carry them around and use them as a reminder to think about the things they are grateful for. You can also use them in other ways, detailed </span><a data-dcnode-id="2778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.firefliesandmudpies.com/gratitude-stones/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2779" instrument_node="">here</span></a><span data-dcnode-id="2777" instrument_node="">.</span></li><span data-dcnode-id="2775" instrument_node="">
</span></ul><span data-dcnode-id="2773" instrument_node="">
</span><p data-dcnode-id="2771"><a data-dcnode-id="2772" name="worksheets-positive-mindset"></a></p><span data-dcnode-id="2770" instrument_node="">
</span><p data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2767" instrument_node="">
</span><h2 data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">10 Worksheets for Training a Positive Mindset (PDF)</span></h2><span data-dcnode-id="2764" instrument_node="">
</span><p data-dcnode-id="2760"><img alt="man jumping - 10 Worksheets for Training a Positive Mindset (PDF)" class="alignright wp-image-22550 lazyload" data-dcnode-id="2763" data-src="https://positivepsychology.com/wp-content/uploads/positive-mindset-worksheets.jpg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="positive mindset worksheets " width="300"><noscript data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">&lt;img class="alignright wp-image-22550  lazyload" title="positive mindset worksheets " src="https://positivepsychology.com/wp-content/uploads/positive-mindset-worksheets.jpg" alt="man jumping - 10 Worksheets for Training a Positive Mindset (PDF)" width="300" /&gt;</span></noscript></p><span data-dcnode-id="2759" instrument_node="">
</span><p data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">If games and activities aren’t really your “thing,” there are lots of other ways to cultivate a positive attitude.</span></p><span data-dcnode-id="2756" instrument_node="">
</span><p data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">One effective technique is completing worksheets designed to help you develop a positive mindset.</span></p><span data-dcnode-id="2753" instrument_node="">
</span><p data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">A few of the many worksheets on this topic are described below.</span></p><span data-dcnode-id="2750" instrument_node="">
</span><p data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2747" instrument_node="">
</span><h3 data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">Strengths Exploration</span></h3><span data-dcnode-id="2744" instrument_node="">
</span><p data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">Becoming more positive can start with a fun and uplifting exercise—identifying your strengths.</span></p><span data-dcnode-id="2741" instrument_node="">
</span><p data-dcnode-id="2736"><span data-dcnode-id="2740" instrument_node="">This worksheet lists 36 individual strengths, with room to add 4 more, that you can use to pick out which strengths you embody. You can choose as many as you like, but try to keep the list to those traits that you think are your </span><a data-dcnode-id="2738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/self-transcendence/" rel="noopener"><span data-dcnode-id="2739" instrument_node="">biggest strengths</span></a><span data-dcnode-id="2737" instrument_node="">.</span></p><span data-dcnode-id="2735" instrument_node="">
</span><p data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">Once you have your strengths identified, move on to the rest of the worksheet: learning about your strengths in specific areas, how you apply them now, and how you can use them more often.</span></p><span data-dcnode-id="2732" instrument_node="">
</span><p data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">The second page concerns your relationships—romantic relationships, family relationships, and relationships with friends. There are three questions to guide you here:</span></p><span data-dcnode-id="2729" instrument_node="">
</span><ol data-dcnode-id="2718"><span data-dcnode-id="2728" instrument_node="">
</span><li data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">List the strengths you possess that help you in your relationships.</span></li><span data-dcnode-id="2725" instrument_node="">
</span><li data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">Describe a specific time your strengths were able to help you in a relationship.</span></li><span data-dcnode-id="2722" instrument_node="">
</span><li data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">Describe two new ways you could use your strengths in relationships.</span></li><span data-dcnode-id="2719" instrument_node="">
</span></ol><span data-dcnode-id="2717" instrument_node="">
</span><p data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">On the third page, you will answer the same questions but with your profession in mind instead of relationships.</span></p><span data-dcnode-id="2714" instrument_node="">
</span><p data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">The fourth page repeats these questions but with a focus on personal fulfillment (hobbies, interests, pleasurable activities).</span></p><span data-dcnode-id="2711" instrument_node="">
</span><p data-dcnode-id="2706"><span data-dcnode-id="2710" instrument_node="">You can find this worksheet </span><a data-dcnode-id="2708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.therapistaid.com/worksheets/strengths-exploration.pdf" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2709" instrument_node="">here</span></a><span data-dcnode-id="2707" instrument_node="">.</span></p><span data-dcnode-id="2705" instrument_node="">
</span><p data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2702" instrument_node="">
</span><h3 data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">Gratitude Journal</span></h3><span data-dcnode-id="2699" instrument_node="">
</span><p data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">Cultivating a regular practice of gratitude will help you to become more positive, and this worksheet will guide you in establishing your practice.</span></p><span data-dcnode-id="2696" instrument_node="">
</span><p data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">First, the instructions for the sheet are as follows: “Two times a week, write a detailed entry about one thing you are grateful for. This could be a person, a job, a great meal with friends, or anything else that comes to mind.”</span></p><span data-dcnode-id="2693" instrument_node="">
</span><p data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">Next, the worksheet includes some tips for effective journaling, like:</span></p><span data-dcnode-id="2690" instrument_node="">
</span><ul data-dcnode-id="2682"><span data-dcnode-id="2689" instrument_node="">
</span><li data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">Don’t rush to write down the first things that come to your mind. Take time to truly think about what you’re grateful for. Expect each entry to take between 10-20 minutes.</span></li><span data-dcnode-id="2686" instrument_node="">
</span><li data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">Writing about the people who you’re grateful for tends to be more powerful than writing about things.</span></li><span data-dcnode-id="2683" instrument_node="">
</span></ul><span data-dcnode-id="2681" instrument_node="">
</span><p data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">To help get you started, you can use one of the journaling prompts listed in the worksheet, including:</span></p><span data-dcnode-id="2678" instrument_node="">
</span><ul data-dcnode-id="2664"><span data-dcnode-id="2677" instrument_node="">
</span><li data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">Someone whose company I enjoy…</span></li><span data-dcnode-id="2674" instrument_node="">
</span><li data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">A fun experience I had…</span></li><span data-dcnode-id="2671" instrument_node="">
</span><li data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">A reason to be excited about the future…</span></li><span data-dcnode-id="2668" instrument_node="">
</span><li data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">An unexpected good thing that happened…</span></li><span data-dcnode-id="2665" instrument_node="">
</span></ul><span data-dcnode-id="2663" instrument_node="">
</span><p data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">The next two pages provide you space to write up to four entries. It’s best if you get a journal specifically for this purpose, but this space can get you started until you obtain a journal.</span></p><span data-dcnode-id="2660" instrument_node="">
</span><p data-dcnode-id="2655"><span data-dcnode-id="2659" instrument_node="">Click here to download </span><a data-dcnode-id="2657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.therapistaid.com/worksheets/gratitude-journal.pdf" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2658" instrument_node="">this worksheet</span></a><span data-dcnode-id="2656" instrument_node="">.</span></p><span data-dcnode-id="2654" instrument_node="">
</span><p data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2651" instrument_node="">
</span><h3 data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">Positive Journal</span></h3><span data-dcnode-id="2648" instrument_node="">
</span><p data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">Similar to the gratitude journal, a positive journal is an effective way to use journaling to improve your mindset.</span></p><span data-dcnode-id="2645" instrument_node="">
</span><p data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">The worksheet encourages you to make a point of recognizing positive experiences throughout your day, however big or small. At the end of each day, use the worksheet to record three positive things that happened.</span></p><span data-dcnode-id="2642" instrument_node="">
</span><p data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">It’s good to have an actual journal for your positive entries (either the same journal you use for recording the things you are grateful for or a separate one), but this worksheet includes space for entering three positive things for 7 days to help you get started.</span></p><span data-dcnode-id="2639" instrument_node="">
</span><p data-dcnode-id="2634"><span data-dcnode-id="2638" instrument_node="">Click </span><a data-dcnode-id="2636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.therapistaid.com/worksheets/positive-journal.pdf" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2637" instrument_node="">here</span></a><span data-dcnode-id="2635" instrument_node=""> to read the instructions in more detail.</span></p><span data-dcnode-id="2633" instrument_node="">
</span><p data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2630" instrument_node="">
</span><h3 data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">Protective Factors</span></h3><span data-dcnode-id="2627" instrument_node="">
</span><p data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">The Protective Factors worksheet will get you thinking about all of the positive traits, attributes, and skills that contribute to your resilience and overall mental health. Identifying these factors is essential to knowing when and how to use them.</span></p><span data-dcnode-id="2624" instrument_node="">
</span><p data-dcnode-id="2619"><span data-dcnode-id="2623" instrument_node="">The instructions are to review each of the </span><a data-dcnode-id="2621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/what-are-protective-factors/"><span data-dcnode-id="2622" instrument_node="">protective factors</span></a><span data-dcnode-id="2620" instrument_node=""> listed and marking where you are on the scale (from weak to strong). These factors include:</span></p><span data-dcnode-id="2618" instrument_node="">
</span><ul data-dcnode-id="2596"><span data-dcnode-id="2617" instrument_node="">
</span><li data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">Social Support</span></li><span data-dcnode-id="2614" instrument_node="">
</span><li data-dcnode-id="2611"><a data-dcnode-id="2612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/coping-skills-worksheets/" rel="noopener"><span data-dcnode-id="2613" instrument_node="">Coping Skills</span></a></li><span data-dcnode-id="2610" instrument_node="">
</span><li data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">Physical Health</span></li><span data-dcnode-id="2607" instrument_node="">
</span><li data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">Sense of Purpose</span></li><span data-dcnode-id="2604" instrument_node="">
</span><li data-dcnode-id="2601"><a data-dcnode-id="2602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/self-esteem/" rel="noopener"><span data-dcnode-id="2603" instrument_node="">Self-Esteem</span></a></li><span data-dcnode-id="2600" instrument_node="">
</span><li data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">Healthy Thinking</span></li><span data-dcnode-id="2597" instrument_node="">
</span></ul><span data-dcnode-id="2595" instrument_node="">
</span><p data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">Once you have given thought to each protective factor, the next page poses some questions about them:</span></p><span data-dcnode-id="2592" instrument_node="">
</span><ol data-dcnode-id="2575"><span data-dcnode-id="2591" instrument_node="">
</span><li data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">Which protective factor has been the most valuable to you during difficult times?</span></li><span data-dcnode-id="2588" instrument_node="">
</span><li data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">Specifically, how have you used this protective factor to your advantage in the past?</span></li><span data-dcnode-id="2585" instrument_node="">
</span><li data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">What are the two protective factors that you would like to improve?</span></li><span data-dcnode-id="2582" instrument_node="">
</span><li data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Describe how things might be different if you able to improve these protective factors.</span></li><span data-dcnode-id="2579" instrument_node="">
</span><li data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">List specific steps or actions that might help to make these goals a reality.</span></li><span data-dcnode-id="2576" instrument_node="">
</span></ol><span data-dcnode-id="2574" instrument_node="">
</span><p data-dcnode-id="2569"><span data-dcnode-id="2573" instrument_node="">To download this worksheet and learn about your own protective factors, click </span><a data-dcnode-id="2571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.therapistaid.com/worksheets/protective-factors.pdf" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2572" instrument_node="">here</span></a><span data-dcnode-id="2570" instrument_node="">.</span></p><span data-dcnode-id="2568" instrument_node="">
</span><p data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2565" instrument_node="">
</span><h3 data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">Looking Back, Looking Forward</span></h3><span data-dcnode-id="2562" instrument_node="">
</span><p data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">This worksheet will help you to identify times in your life when things have gone well, when you got things right, and when you thrived.</span></p><span data-dcnode-id="2559" instrument_node="">
</span><p data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">First, for the “Looking Back” portion, you will be instructed to choose a timeframe to reflect on (for example, “the past year” or “since starting my new job”).</span></p><span data-dcnode-id="2556" instrument_node="">
</span><p data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">Next, you will answer several questions about the positive events and accomplishments from this time period, including:</span></p><span data-dcnode-id="2553" instrument_node="">
</span><ol data-dcnode-id="2536"><span data-dcnode-id="2552" instrument_node="">
</span><li data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">List your accomplishments from this timeframe, even if they seem minor.</span></li><span data-dcnode-id="2549" instrument_node="">
</span><li data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">Describe a great day from this timeframe. What made this day special?</span></li><span data-dcnode-id="2546" instrument_node="">
</span><li data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">How have you grown, or what lessons did you learn, during this timeframe?</span></li><span data-dcnode-id="2543" instrument_node="">
</span><li data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">What are you grateful for from this timeframe? Try to list at least three examples.</span></li><span data-dcnode-id="2540" instrument_node="">
</span><li data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">What was a challenge that you overcame during this timeframe?</span></li><span data-dcnode-id="2537" instrument_node="">
</span></ol><span data-dcnode-id="2535" instrument_node="">
</span><p data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">For the “Looking Forward” portion, you will complete a similar exercise but with a future time period in mind.</span></p><span data-dcnode-id="2532" instrument_node="">
</span><p data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">Instead of the questions above, you will answer these five questions:</span></p><span data-dcnode-id="2529" instrument_node="">
</span><ol data-dcnode-id="2512"><span data-dcnode-id="2528" instrument_node="">
</span><li data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">What would you like to achieve during this timeframe?</span></li><span data-dcnode-id="2525" instrument_node="">
</span><li data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">What are you looking forward to during this timeframe? Try to list at least three examples.</span></li><span data-dcnode-id="2522" instrument_node="">
</span><li data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">What relationships would you like to strengthen during this timeframe?</span></li><span data-dcnode-id="2519" instrument_node="">
</span><li data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">What can you do to help others during this timeframe?</span></li><span data-dcnode-id="2516" instrument_node="">
</span><li data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">Ideally, how will your life be different at the end of this timeframe? Give specifics.</span></li><span data-dcnode-id="2513" instrument_node="">
</span></ol><span data-dcnode-id="2511" instrument_node="">
</span><p data-dcnode-id="2506"><span data-dcnode-id="2510" instrument_node="">Once you have completed this worksheet, you will have a list of good things and accomplishments already behind you, and a list of good things you have to look forward to and work towards. Click </span><a data-dcnode-id="2508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.therapistaid.com/worksheets/looking-back-looking-forward.pdf" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2509" instrument_node="">here</span></a><span data-dcnode-id="2507" instrument_node=""> to get started.</span></p><span data-dcnode-id="2505" instrument_node="">
</span><p data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2502" instrument_node="">
</span><h3 data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">Why I’m Grateful</span></h3><span data-dcnode-id="2499" instrument_node="">
</span><p data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">This is a great worksheet for cultivating gratitude, and it can be used with children or adults.</span></p><span data-dcnode-id="2496" instrument_node="">
</span><p data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">It lists six prompts for you to complete that will help you focus on the good things in your life:</span></p><span data-dcnode-id="2493" instrument_node="">
</span><ol data-dcnode-id="2473"><span data-dcnode-id="2492" instrument_node="">
</span><li data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">I am grateful for my family because…</span></li><span data-dcnode-id="2489" instrument_node="">
</span><li data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">Something good that happened this week…</span></li><span data-dcnode-id="2486" instrument_node="">
</span><li data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">I am grateful for my friendship with… because…</span></li><span data-dcnode-id="2483" instrument_node="">
</span><li data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">I am grateful for who I am because…</span></li><span data-dcnode-id="2480" instrument_node="">
</span><li data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">Something silly that I am grateful for…</span></li><span data-dcnode-id="2477" instrument_node="">
</span><li data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">Something else I am grateful for…</span></li><span data-dcnode-id="2474" instrument_node="">
</span></ol><span data-dcnode-id="2472" instrument_node="">
</span><p data-dcnode-id="2467"><span data-dcnode-id="2471" instrument_node="">To start thinking about all the things you have to be grateful for, click </span><a data-dcnode-id="2469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.therapistaid.com/worksheets/why-im-grateful.pdf" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2470" instrument_node="">here</span></a><span data-dcnode-id="2468" instrument_node="">.</span></p><span data-dcnode-id="2466" instrument_node="">
</span><p data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2463" instrument_node="">
</span><h3 data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">Positive Activities for Behavioral Activation</span></h3><span data-dcnode-id="2460" instrument_node="">
</span><p data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">This worksheet is focused on the therapeutic technique of behavioral activation—encouraging the patient to get more active, engage in positive activities, and gain the rewards inherent in these activities.</span></p><span data-dcnode-id="2457" instrument_node="">
</span><p data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">It instructs you to create a list of activities that you find personally rewarding and leaves space for you to do so.</span></p><span data-dcnode-id="2454" instrument_node="">
</span><p data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">Next, it instructs you to rate the ease of each activity on a scale from 1 (difficult) to 10 (easy) and the reward you get from each activity on a scale from 1 (not at all rewarding) to 10 (very rewarding).</span></p><span data-dcnode-id="2451" instrument_node="">
</span><p data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">Completing this worksheet will leave you with a list of activities that you can refer to whenever you need a quick boost, and help you learn about what you enjoy most.</span></p><span data-dcnode-id="2448" instrument_node="">
</span><p data-dcnode-id="2443"><span data-dcnode-id="2447" instrument_node="">Click </span><a data-dcnode-id="2445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.therapistaid.com/worksheets/activities-behavioral-activation.pdf" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2446" instrument_node="">here</span></a><span data-dcnode-id="2444" instrument_node=""> to download this worksheet.</span></p><span data-dcnode-id="2442" instrument_node="">
</span><p data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2439" instrument_node="">
</span><h3 data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Positive Experiences</span></h3><span data-dcnode-id="2436" instrument_node="">
</span><p data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">The Positive Experiences worksheet is a simple one in theory, but it can be difficult to actually complete. The difficulty comes with an equivalent reward though; you can get a great boost in your mood, self-esteem, and self-confidence from completing it.</span></p><span data-dcnode-id="2433" instrument_node="">
</span><p data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">The only instruction is to consider each of the positive traits listed and write briefly about times when you have displayed each of them.</span></p><span data-dcnode-id="2430" instrument_node="">
</span><p data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">The positive traits include:</span></p><span data-dcnode-id="2427" instrument_node="">
</span><ul data-dcnode-id="2399"><span data-dcnode-id="2426" instrument_node="">
</span><li data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">Courage</span></li><span data-dcnode-id="2423" instrument_node="">
</span><li data-dcnode-id="2420"><a data-dcnode-id="2421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/kindness-activities-empathy-worksheets/" rel="noopener"><span data-dcnode-id="2422" instrument_node="">Kindness</span></a></li><span data-dcnode-id="2419" instrument_node="">
</span><li data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">Selflessness</span></li><span data-dcnode-id="2416" instrument_node="">
</span><li data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">Love</span></li><span data-dcnode-id="2413" instrument_node="">
</span><li data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">Sacrifice</span></li><span data-dcnode-id="2410" instrument_node="">
</span><li data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">Wisdom</span></li><span data-dcnode-id="2407" instrument_node="">
</span><li data-dcnode-id="2404"><a data-dcnode-id="2405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/happiness/" rel="noopener"><span data-dcnode-id="2406" instrument_node="">Happiness</span></a></li><span data-dcnode-id="2403" instrument_node="">
</span><li data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">Determination</span></li><span data-dcnode-id="2400" instrument_node="">
</span></ul><span data-dcnode-id="2398" instrument_node="">
</span><p data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">If you’re feeling particularly down, you may be tempted to skip one or two, but fight this urge! You have definitely displayed each of these traits at one time or another—don’t sell yourself short!</span></p><span data-dcnode-id="2395" instrument_node="">
</span><p data-dcnode-id="2390"><span data-dcnode-id="2394" instrument_node="">You can find this worksheet </span><a data-dcnode-id="2392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.therapistaid.com/worksheets/positive-experiences.pdf" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2393" instrument_node="">here</span></a><span data-dcnode-id="2391" instrument_node="">.</span></p><span data-dcnode-id="2389" instrument_node="">
</span><p data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2386" instrument_node="">
</span><h3 data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">Positive Steps to Well-being</span></h3><span data-dcnode-id="2383" instrument_node="">
</span><p data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">This resource is actually a handout, but you can certainly make it interactive by taking notes or using check marks to indicate what you have tried, or what you would like to try.</span></p><span data-dcnode-id="2380" instrument_node="">
</span><p data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">It lists 12 things you can do to improve your well-being. These 12 activities include:</span></p><span data-dcnode-id="2377" instrument_node="">
</span><ul data-dcnode-id="2339"><span data-dcnode-id="2376" instrument_node="">
</span><li data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">Being kind to yourself</span></li><span data-dcnode-id="2373" instrument_node="">
</span><li data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">Exercise regularly</span></li><span data-dcnode-id="2370" instrument_node="">
</span><li data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">Take up a hobby and/or learn a new skill</span></li><span data-dcnode-id="2367" instrument_node="">
</span><li data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">Have some fun and/or be creative</span></li><span data-dcnode-id="2364" instrument_node="">
</span><li data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">Help others</span></li><span data-dcnode-id="2361" instrument_node="">
</span><li data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Relax</span></li><span data-dcnode-id="2358" instrument_node="">
</span><li data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">Eat healthily</span></li><span data-dcnode-id="2355" instrument_node="">
</span><li data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">Balance sleep</span></li><span data-dcnode-id="2352" instrument_node="">
</span><li data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">Connect with others</span></li><span data-dcnode-id="2349" instrument_node="">
</span><li data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Beware drink and drugs</span></li><span data-dcnode-id="2346" instrument_node="">
</span><li data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">See the bigger picture</span></li><span data-dcnode-id="2343" instrument_node="">
</span><li data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">Accepting: “It is as it is”</span></li><span data-dcnode-id="2340" instrument_node="">
</span></ul><span data-dcnode-id="2338" instrument_node="">
</span><p data-dcnode-id="2333"><span data-dcnode-id="2337" instrument_node="">To read more about how each of these activities contributes to your well-being, download the handout </span><a data-dcnode-id="2335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.therapistaid.com/worksheets/positive-steps-to-wellbeing.pdf" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2336" instrument_node="">here</span></a><span data-dcnode-id="2334" instrument_node="">.</span></p><span data-dcnode-id="2332" instrument_node="">
</span><p data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2329" instrument_node="">
</span><h3 data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Positive Self-Talk/Coping Thoughts Worksheet</span></h3><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">The positive self-talk/coping thoughts worksheet is a great way to turn your focus from the negative to the positive and come up with positive statements you can use to cope in future stressful or difficult situations.</span></p><span data-dcnode-id="2323" instrument_node="">
</span><p data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">Example coping thoughts and positive statements listed on the worksheet include:</span></p><span data-dcnode-id="2320" instrument_node="">
</span><ul data-dcnode-id="2303"><span data-dcnode-id="2319" instrument_node="">
</span><li data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Stop, and breathe, I can do this.</span></li><span data-dcnode-id="2316" instrument_node="">
</span><li data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">This will pass.</span></li><span data-dcnode-id="2313" instrument_node="">
</span><li data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">This feels bad, and feelings are very often wrong.</span></li><span data-dcnode-id="2310" instrument_node="">
</span><li data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">I can feel bad and still choose to take a new and healthy direction.</span></li><span data-dcnode-id="2307" instrument_node="">
</span><li data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">I feel this way because of my past experiences, but I am safe right now.</span></li><span data-dcnode-id="2304" instrument_node="">
</span></ul><span data-dcnode-id="2302" instrument_node="">
</span><p data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">After reading the example statements, the worksheet encourages you to write down some coping thoughts or positive statements for difficult or distressing situations in your life. You can write them directly on the worksheet, but it may be most helpful to copy them onto a note card and carry them with you.</span></p><span data-dcnode-id="2299" instrument_node="">
</span><p data-dcnode-id="2294"><span data-dcnode-id="2298" instrument_node="">Click </span><a data-dcnode-id="2296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getselfhelp.co.uk/docs/PositiveStatements.pdf" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2297" instrument_node="">here</span></a><span data-dcnode-id="2295" instrument_node=""> to download this worksheet.</span></p><span data-dcnode-id="2293" instrument_node="">
</span><p data-dcnode-id="2291"><a data-dcnode-id="2292" name="quotes-positive-mindset"></a></p><span data-dcnode-id="2290" instrument_node="">
</span><p data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2287" instrument_node="">
</span><h2 data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">32 Quotes and Affirmations on Positive Mindset/Attitude</span></h2><span data-dcnode-id="2284" instrument_node="">
</span><p data-dcnode-id="2280"><img alt="3 kids - positive mindset children worksheets skills" class="alignright wp-image-22551 lazyload" data-dcnode-id="2283" data-src="https://positivepsychology.com/wp-content/uploads/positive-mindset-kids.jpg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="positive mindset kids " width="300"><noscript data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">&lt;img class="alignright wp-image-22551 lazyload" title="positive mindset kids " src="https://positivepsychology.com/wp-content/uploads/positive-mindset-kids.jpg" alt="3 kids - positive mindset children worksheets skills" width="300" /&gt;</span></noscript></p><span data-dcnode-id="2279" instrument_node="">
</span><p data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">While we’re on the subject of positive statements, we should also mention that quotes and affirmations can be an excellent way to encourage positive thinking.</span></p><span data-dcnode-id="2276" instrument_node="">
</span><p data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2273" instrument_node="">
</span><h3 data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Affirmations</span></h3><span data-dcnode-id="2270" instrument_node="">
</span><p data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">If you’re interested in affirmations, try the Mind Tools Content Team’s (n.d.) list of positive thinking affirmations:</span></p><span data-dcnode-id="2267" instrument_node="">
</span><ul data-dcnode-id="2221"><span data-dcnode-id="2266" instrument_node="">
</span><li data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">I have plenty of creativity for this project.</span></li><span data-dcnode-id="2263" instrument_node="">
</span><li data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">My work will be recognized in a positive way by my boss and colleagues.</span></li><span data-dcnode-id="2260" instrument_node="">
</span><li data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">I can do this!</span></li><span data-dcnode-id="2257" instrument_node="">
</span><li data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">My team respects and values my opinion.</span></li><span data-dcnode-id="2254" instrument_node="">
</span><li data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">I am successful.</span></li><span data-dcnode-id="2251" instrument_node="">
</span><li data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">I am honest in my life, and my work.</span></li><span data-dcnode-id="2248" instrument_node="">
</span><li data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">I like completing tasks and projects on time.</span></li><span data-dcnode-id="2245" instrument_node="">
</span><li data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">I’m grateful for the job I have.</span></li><span data-dcnode-id="2242" instrument_node="">
</span><li data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">I enjoy working with my team.</span></li><span data-dcnode-id="2239" instrument_node="">
</span><li data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">I’m bringing a positive attitude to work every day.</span></li><span data-dcnode-id="2236" instrument_node="">
</span><li data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">I am excellent at what I do.</span></li><span data-dcnode-id="2233" instrument_node="">
</span><li data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">I am generous.</span></li><span data-dcnode-id="2230" instrument_node="">
</span><li data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">I am happy.</span></li><span data-dcnode-id="2227" instrument_node="">
</span><li data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">I will be a leader in my organization.</span></li><span data-dcnode-id="2224" instrument_node="">
</span><li data-dcnode-id="2223"></li><span data-dcnode-id="2222" instrument_node="">
</span></ul><span data-dcnode-id="2220" instrument_node="">
</span><p data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">If none of these appeal to you on a deep level, refer to their tips on developing your own personal affirmations:</span></p><span data-dcnode-id="2217" instrument_node="">
</span><ol data-dcnode-id="2200"><span data-dcnode-id="2216" instrument_node="">
</span><li data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Think about the areas of your life that you’d like to change.</span></li><span data-dcnode-id="2213" instrument_node="">
</span><li data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">Write affirmations that are credible and achievable (based on reality).</span></li><span data-dcnode-id="2210" instrument_node="">
</span><li data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">Use your affirmations to turn negative into positive (note a persistent negative thought and choose an affirmation that is the opposite).</span></li><span data-dcnode-id="2207" instrument_node="">
</span><li data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">Write your affirmations in the present tense—affirm yourself in the here and now, not a vague future version of yourself.</span></li><span data-dcnode-id="2204" instrument_node="">
</span><li data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">Say it with feeling! Your affirmations should be personally meaningful to you (Mind Tools Content Team, n.d.).</span></li><span data-dcnode-id="2201" instrument_node="">
</span></ol><span data-dcnode-id="2199" instrument_node="">
</span><p data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2196" instrument_node="">
</span><h3 data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">Quotes</span></h3><span data-dcnode-id="2193" instrument_node="">
</span><p data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">If you’re having trouble coming up with your affirmations or you just like to hear a different perspective on positive thinking, you might find some quotes helpful.</span></p><span data-dcnode-id="2190" instrument_node="">
</span><p data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">Lydia Sweatt (2017) from Success.com shares 13 great quotes on optimism and having a positive attitude.</span></p><span data-dcnode-id="2187" instrument_node="">
</span><blockquote data-dcnode-id="2184"><p data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">“Optimism doesn’t wait on facts. It deals with prospects.”</span></p></blockquote><span data-dcnode-id="2183" instrument_node="">
</span><p data-dcnode-id="2181" style="text-align: right;"><span data-dcnode-id="2182" instrument_node="">Norman Cousins</span></p><span data-dcnode-id="2180" instrument_node="">
</span><blockquote data-dcnode-id="2177"><p data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">“Be fanatically positive and militantly optimistic. If something is not to your liking, change your liking.”</span></p></blockquote><span data-dcnode-id="2176" instrument_node="">
</span><p data-dcnode-id="2174" style="text-align: right;"><span data-dcnode-id="2175" instrument_node="">Rick Steves</span></p><span data-dcnode-id="2173" instrument_node="">
</span><blockquote data-dcnode-id="2170"><p data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">“No pessimist ever discovered the secrets of the stars, or sailed to an uncharted land, or opened a new heaven to the human spirit.”</span></p></blockquote><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2167" style="text-align: right;"><span data-dcnode-id="2168" instrument_node="">Helen Keller</span></p><span data-dcnode-id="2166" instrument_node="">
</span><blockquote data-dcnode-id="2163"><p data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">“Optimism is a strategy for making a better future. Because unless you believe that the future can be better, you are unlikely to step up and take responsibility for making it so.”</span></p></blockquote><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2160" style="text-align: right;"><span data-dcnode-id="2161" instrument_node="">Noam Chomsky</span></p><span data-dcnode-id="2159" instrument_node="">
</span><blockquote data-dcnode-id="2156"><p data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">“One of the things I learned the hard way was that it doesn’t pay to get discouraged. Keeping busy and making optimism a way of life can restore your faith in yourself.”</span></p></blockquote><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2153" style="text-align: right;"><span data-dcnode-id="2154" instrument_node="">Lucille Ball</span></p><span data-dcnode-id="2152" instrument_node="">
</span><blockquote data-dcnode-id="2149"><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">“An optimist understands that life can be a bumpy road, but at least it is leading somewhere. They learn from mistakes and failures, and are not afraid to fail again.”</span></p></blockquote><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2146" style="text-align: right;"><span data-dcnode-id="2147" instrument_node="">Harvey Mackay</span></p><span data-dcnode-id="2145" instrument_node="">
</span><blockquote data-dcnode-id="2142"><p data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">“Optimism is a kind of heart stimulant―the digitalis of failure.”</span></p></blockquote><span data-dcnode-id="2141" instrument_node="">
</span><p data-dcnode-id="2139" style="text-align: right;"><span data-dcnode-id="2140" instrument_node="">Elbert Hubbard</span></p><span data-dcnode-id="2138" instrument_node="">
</span><blockquote data-dcnode-id="2135"><p data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">“Things turn out best for the people who make the best of the way things turn out.”</span></p></blockquote><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2132" style="text-align: right;"><span data-dcnode-id="2133" instrument_node="">John Wooden</span></p><span data-dcnode-id="2131" instrument_node="">
</span><blockquote data-dcnode-id="2128"><p data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">“Do not anticipate trouble, or worry about what may never happen. Keep in the sunlight.”</span></p></blockquote><span data-dcnode-id="2127" instrument_node="">
</span><p data-dcnode-id="2125" style="text-align: right;"><span data-dcnode-id="2126" instrument_node="">Benjamin Franklin</span></p><span data-dcnode-id="2124" instrument_node="">
</span><blockquote data-dcnode-id="2121"><p data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">“Optimism refuses to believe that the road ends without options.”</span></p></blockquote><span data-dcnode-id="2120" instrument_node="">
</span><p data-dcnode-id="2118" style="text-align: right;"><span data-dcnode-id="2119" instrument_node="">Robert H. Schuller</span></p><span data-dcnode-id="2117" instrument_node="">
</span><blockquote data-dcnode-id="2114"><p data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">“What is hope but a feeling of optimism, a thought that says things will improve, it won’t always be bleak [and] there’s a way to rise above the present circumstances.”</span></p></blockquote><span data-dcnode-id="2113" instrument_node="">
</span><p data-dcnode-id="2111" style="text-align: right;"><span data-dcnode-id="2112" instrument_node="">Wayne W. Dyer</span></p><span data-dcnode-id="2110" instrument_node="">
</span><blockquote data-dcnode-id="2107"><p data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">“A pessimist sees the difficulty in every opportunity; an optimist sees the opportunity in every difficulty.”</span></p></blockquote><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2104" style="text-align: right;"><span data-dcnode-id="2105" instrument_node="">Winston Churchill</span></p><span data-dcnode-id="2103" instrument_node="">
</span><blockquote data-dcnode-id="2100"><p data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">“Even if I knew that tomorrow the world would go to pieces, I would still plant my apple tree.”</span></p></blockquote><span data-dcnode-id="2099" instrument_node="">
</span><p data-dcnode-id="2097" style="text-align: right;"><span data-dcnode-id="2098" instrument_node="">Martin Luther</span></p><span data-dcnode-id="2096" instrument_node="">
</span><p data-dcnode-id="2094"><a data-dcnode-id="2095" name="videos-positive-mindset"></a></p><span data-dcnode-id="2093" instrument_node="">
</span><p data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2090" instrument_node="">
</span><h2 data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">Inspiring Speeches and Videos</span></h2><span data-dcnode-id="2087" instrument_node="">
</span><p data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">Quotes can be fantastic motivators, but you probably agree that a rousing speech or inspiring video can be even more effective.</span></p><span data-dcnode-id="2084" instrument_node="">
