</span><li data-dcnode-id="1077"><strong data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Discover 4 techniques to develop a creative mindset for yourself.</span></strong></li><span data-dcnode-id="1076" instrument_node="">

</span><hr data-dcnode-id="1073"><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1068"><img alt="" class="alignnone size-large wp-image-12822 error" data-dcnode-id="1071" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="//producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-1024x683.jpg" data-lazy-srcset="//producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-1024x683.jpg 1024w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-300x200.jpg 300w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-768x512.jpg 768w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-500x333.jpg 500w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-800x533.jpg 800w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-1280x853.jpg 1280w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash.jpg 1920w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-360x240.jpg 360w" data-ll-status="error" height="683" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-1024x683.jpg&amp;raw" srcset="//producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-1024x683.jpg 1024w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-300x200.jpg 300w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-768x512.jpg 768w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-500x333.jpg 500w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-800x533.jpg 800w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-1280x853.jpg 1280w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash.jpg 1920w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-360x240.jpg 360w" width="1024"><noscript data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">&lt;img class="alignnone size-large wp-image-12822" src="//producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-1024x683.jpg" alt="" width="1024" height="683" srcset="//producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-1024x683.jpg 1024w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-300x200.jpg 300w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-768x512.jpg 768w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-500x333.jpg 500w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-800x533.jpg 800w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-1280x853.jpg 1280w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash.jpg 1920w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/timothy-perry-fDfldVJEBqU-unsplash-360x240.jpg 360w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="1067" instrument_node="">
</span><h5 data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">The following editorial was written by licensed psychologist, Ricard Magnusson (MSc in Psychology, University of Umeå).</span></h5><span data-dcnode-id="1064" instrument_node="">
</span><hr data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1058"><em data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Ever wondered why some people seem to constantly evolve and stay motivated even in the face of adversity?</span></em><span data-dcnode-id="1059" instrument_node=""> It might be down to their mindset. Maintaining a mental mode that facilitates learning and growth is no easy task, but luckily research has something to say about this.</span></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1056" instrument_node="">In this editorial, </span><strong data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">you will learn how you can make your mindset work for you instead of against you.</span></strong></p><span data-dcnode-id="1052" instrument_node="">
</span><h3 class="ftwp-heading" data-dcnode-id="1050" id="ftoc-heading-1"><span data-dcnode-id="1051" instrument_node="">What Is Mindset?</span></h3><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1048" instrument_node="">In a broad sense, mindset can be defined as our habitual mental attitude that shapes how we</span><br data-dcnode-id="1047"><span data-dcnode-id="1046" instrument_node="">
interpret and view our current situation (webster-dictionary.com). American psychologist Carol</span><br data-dcnode-id="1045"><span data-dcnode-id="1044" instrument_node="">
Dweck expanded the concept of mindset further, in her 2006 book Mindset: the new psychology of success.</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1039"><strong data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node=""> Mindset, in short, is our implicit idea of the nature of our abilities.</span></strong></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Are our abilities relatively fixed with little variance across the life span, or are our abilities dynamic, with the potential to expand greatly if we put in the time and effort?</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Research shows that how we think about our potential to evolve our skills and abilities have a great impact on our motivation to put in the work needed to reach the next level of awesomeness (Dweck, 2006).</span></p><span data-dcnode-id="1032" instrument_node="">
</span><h3 class="ftwp-heading" data-dcnode-id="1030" id="ftoc-heading-2"><span data-dcnode-id="1031" instrument_node="">Fixed Mindset VS Growth Mindset</span></h3><span data-dcnode-id="1029" instrument_node="">
</span><div class="su-box su-box-style-default" data-dcnode-id="1020" id="" style="border-color:#c84e00;border-radius:3px"><div class="su-box-title" data-dcnode-id="1027" style="background-color:#FB8122;color:#1D2228;border-top-left-radius:1px;border-top-right-radius:1px"><span data-dcnode-id="1028" instrument_node="">Fixed Mindset Vs Growth Mindset</span></div><div class="su-box-content su-u-clearfix su-u-trim" data-dcnode-id="1021" style="border-bottom-left-radius:1px;border-bottom-right-radius:1px"><span data-dcnode-id="1026" instrument_node="">In Carol Dwecks book, mindset is thought of as a continuum, ranging from a fixed mindset on one end, to a growth mindset on the other. Believing your abilities are set in stone would put you on the fixed mindset end of the spectrum.</span><p data-dcnode-id="1025"></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Believing the state of your abilities are subject to change would put you on the growth mindset end (Dweck, 2006).</span></p></div></div><span data-dcnode-id="1019" instrument_node="">
</span><h3 class="ftwp-heading" data-dcnode-id="1017" id="ftoc-heading-3"><span data-dcnode-id="1018" instrument_node="">Key Characteristics</span></h3><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Most of us aren’t constantly stuck in just one mindset.</span></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">In reality, it probably depends on the situation and context we are currently in. Most people, however, can probably relate more to one than the other. It’s not always easy to identify your main mindset.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Carol Dweck herself reportedly once stated that claiming you’re always in a growth mindset, might in fact be a clear indication of a fixed mindset (Nottingham &amp; Larsson, 2019)…</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">The following key characteristics, or basic beliefs, can serve as examples to help you identify your mindset (Nottingham &amp; Larsson, 2019).</span></p><span data-dcnode-id="1004" instrument_node="">
</span><h3 class="ftwp-heading" data-dcnode-id="1002" id="ftoc-heading-4"><span data-dcnode-id="1003" instrument_node="">Examples Of Fixed Mindset Thought Process</span></h3><span data-dcnode-id="1001" instrument_node="">
</span><h5 data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Abilities are innate and decided by nature</span></h5><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="994"><em data-dcnode-id="995"><span data-dcnode-id="996" style="font-weight: 400;"><span data-dcnode-id="997" instrument_node="">“I’m no good at writing melodies, but I’ve always been good at making interesting chord progressions.”</span></span></em></p><span data-dcnode-id="993" instrument_node="">
</span><h5 data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Past failures, or expected ones, serve as excuses for not trying.</span></h5><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="986"><em data-dcnode-id="987"><span data-dcnode-id="988" style="font-weight: 400;"><span data-dcnode-id="989" instrument_node="">“I can’t do it”</span></span></em></p><span data-dcnode-id="985" instrument_node="">
</span><h5 data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Avoids challenges</span></h5><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="979"><em data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">“Challenges are threatening and should be avoided.”</span></em></p><span data-dcnode-id="978" instrument_node="">
</span><h5 data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Struggling is a sign of inability</span></h5><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="971"><em data-dcnode-id="972"><span data-dcnode-id="973" style="font-weight: 400;"><span data-dcnode-id="974" instrument_node="">“Different people have different talents, if I have to struggle, I’m just not talented enough.”</span></span></em></p><span data-dcnode-id="970" instrument_node="">
</span><h5 data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Covers up mistakes</span></h5><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="964"><em data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">“Failing shows you’re not good enough, so you need to make sure no one notices.”</span></em></p><span data-dcnode-id="963" instrument_node="">
</span><h5 data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Feedback is criticism</span></h5><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="957"><em data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">“Perceives feedback as negative criticism, often directed at you as a person.”</span></em></p><span data-dcnode-id="956" instrument_node="">
</span><figure aria-describedby="caption-attachment-12824" class="wp-caption alignnone" data-dcnode-id="950" id="attachment_12824" style="width: 1024px"><img alt="" class="wp-image-12824 size-large error" data-dcnode-id="955" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="//producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-1024x576.jpg" data-lazy-srcset="//producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-1024x576.jpg 1024w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-300x169.jpg 300w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-768x432.jpg 768w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-500x281.jpg 500w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-800x450.jpg 800w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-1280x720.jpg 1280w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash.jpg 1920w" data-ll-status="error" height="576" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-1024x576.jpg&amp;raw" srcset="//producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-1024x576.jpg 1024w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-300x169.jpg 300w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-768x432.jpg 768w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-500x281.jpg 500w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-800x450.jpg 800w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-1280x720.jpg 1280w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash.jpg 1920w" width="1024"><noscript data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">&lt;img class="wp-image-12824 size-large" src="//producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-1024x576.jpg" alt="" width="1024" height="576" srcset="//producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-1024x576.jpg 1024w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-300x169.jpg 300w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-768x432.jpg 768w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-500x281.jpg 500w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-800x450.jpg 800w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash-1280x720.jpg 1280w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/robina-weermeijer-IHfOpAzzjHM-unsplash.jpg 1920w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="951" id="caption-attachment-12824"><span data-dcnode-id="952" instrument_node="">Are our abilities relatively fixed with little variance across the life span, or are our abilities dynamic, with the potential to expand greatly if we put in the time and effort?</span></figcaption></figure><span data-dcnode-id="949" instrument_node="">
</span><h4 data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Examples Of Growth Mindset Thought Process</span></h4><span data-dcnode-id="946" instrument_node="">
</span><h5 data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Abilities can be developed</span></h5><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="939"><em data-dcnode-id="940"><span data-dcnode-id="941" style="font-weight: 400;"><span data-dcnode-id="942" instrument_node="">“I can’t do it… Yet… but I realize that abilities are malleable and I can grow with guidance.”</span></span></em></p><span data-dcnode-id="938" instrument_node="">
</span><h5 data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Past failures does not necessarily predict the future.</span></h5><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="931"><em data-dcnode-id="932"><span data-dcnode-id="933" style="font-weight: 400;"><span data-dcnode-id="934" instrument_node="">“Saying “I can’t do it yet” is a way of visualizing the possibility of succeeding in the future.”</span></span></em></p><span data-dcnode-id="930" instrument_node="">
</span><h5 data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Seeks out challenges</span></h5><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="923"><em data-dcnode-id="924"><span data-dcnode-id="925" style="font-weight: 400;"><span data-dcnode-id="926" instrument_node="">“Challenges are exciting and allows me to push my boundaries.”</span></span></em></p><span data-dcnode-id="922" instrument_node="">
</span><h5 data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Struggling is a sign of learning</span></h5><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="915"><em data-dcnode-id="916"><span data-dcnode-id="917" style="font-weight: 400;"><span data-dcnode-id="918" instrument_node="">“Talented people worked hard to get to where they are. I can work hard as well. Fighting means learning and growing.”</span></span></em></p><span data-dcnode-id="914" instrument_node="">
</span><h5 data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Probes mistakes</span></h5><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="907"><em data-dcnode-id="908"><span data-dcnode-id="909" style="font-weight: 400;"><span data-dcnode-id="910" instrument_node="">“Where did I go wrong? What do i need to focus on in order to improve? Realizing my own mistakes leads to greater success in the future.”</span></span></em></p><span data-dcnode-id="906" instrument_node="">
</span><h5 data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Feedback is information</span></h5><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" style="font-weight: 400;"><em data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">“I won’t take their critique personally. It’s information to help me develop my skills.”</span></em></span></p><span data-dcnode-id="898" instrument_node="">
</span><h3 class="ftwp-heading" data-dcnode-id="896" id="ftoc-heading-5"><span data-dcnode-id="897" instrument_node="">How Mindset Affects Your Progression</span></h3><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">As stated above the different mindsets comes with a set of characteristics that (to a varying degree) influence the way we handle our daily struggles and challenges.</span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">The music industry is a work field with intense competition. Over 1 million tracks are uploaded to Spotify each month (Ingham, 2019), and making it big in the industry is no easy task.</span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">So, preparing your mind for handling challenges and setbacks is a must to stay on top of your game in the music industry, and to keep improving your skills.</span></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Staying creative is what will keep you moving forward. This is where your mindset will have a big impact. Let your mindset make you instead of break you.</span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="879"><img alt="" class="alignnone size-large wp-image-12825 error" data-dcnode-id="882" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="//producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-1024x683.jpg" data-lazy-srcset="//producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-1024x683.jpg 1024w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-300x200.jpg 300w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-768x512.jpg 768w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-500x333.jpg 500w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-800x533.jpg 800w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-1280x853.jpg 1280w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-1536x1024.jpg 1536w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-360x240.jpg 360w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-720x480.jpg 720w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-770x513.jpg 770w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-1400x933.jpg 1400w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash.jpg 1920w" data-ll-status="error" height="683" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-1024x683.jpg&amp;raw" srcset="//producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-1024x683.jpg 1024w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-300x200.jpg 300w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-768x512.jpg 768w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-500x333.jpg 500w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-800x533.jpg 800w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-1280x853.jpg 1280w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-1536x1024.jpg 1536w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-360x240.jpg 360w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-720x480.jpg 720w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-770x513.jpg 770w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-1400x933.jpg 1400w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash.jpg 1920w" width="1024"><noscript data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">&lt;img class="alignnone size-large wp-image-12825" src="//producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-1024x683.jpg" alt="" width="1024" height="683" srcset="//producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-1024x683.jpg 1024w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-300x200.jpg 300w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-768x512.jpg 768w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-500x333.jpg 500w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-800x533.jpg 800w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-1280x853.jpg 1280w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-1536x1024.jpg 1536w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-360x240.jpg 360w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-720x480.jpg 720w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-770x513.jpg 770w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash-1400x933.jpg 1400w, //producerhive.b-cdn.net/wp-content/uploads/2020/04/tim-mossholder-SZgVZPbQ7RE-unsplash.jpg 1920w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="878" instrument_node="">
</span><h3 class="ftwp-heading" data-dcnode-id="876" id="ftoc-heading-6"><span data-dcnode-id="877" instrument_node="">The Creative Mindset</span></h3><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="874" instrument_node="">A widespread definition of the concept of creativity is the ability to create something original,</span><br data-dcnode-id="873"><span data-dcnode-id="872" instrument_node="">
unique and useful (Runco &amp; Jaeger, 2012).</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="867"><em data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Sounds like the goal of any music producer, right?</span></em></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">The creative mindset is closely related to the growth mindset and can be defined as beliefs about creativity as being malleable, something that can be developed (Karwowski, 2014).</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="860"><strong data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Current research findings show that there is a link between our beliefs about our creative abilities, and the creative outcome.</span></strong></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">People with a creative mindset become:</span></p><span data-dcnode-id="856" instrument_node="">
</span><ul data-dcnode-id="842"><span data-dcnode-id="855" instrument_node="">
</span><li data-dcnode-id="852"><strong data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">More creative (go figure…), </span></strong></li><span data-dcnode-id="851" instrument_node="">
</span><li data-dcnode-id="848"><strong data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Show more cognitive flexibility (are better at generating ideas and novel solutions to problems) </span></strong></li><span data-dcnode-id="847" instrument_node="">
</span><li data-dcnode-id="844"><strong data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Get more enjoyment out of the task (Intasao &amp; Hao, 2018).</span></strong></li><span data-dcnode-id="843" instrument_node="">
</span></ul><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="840" instrument_node="">A recent study on design students have similar results and shows that students with a creative mindset were </span><strong data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">more open-minded</span></strong><span data-dcnode-id="837" instrument_node="">, had a more </span><strong data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">positive attitude</span></strong><span data-dcnode-id="834" instrument_node="">, achieved </span><strong data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">higher learning goals</span></strong><span data-dcnode-id="831" instrument_node=""> and had a </span><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">better design ability</span></strong><span data-dcnode-id="828" instrument_node=""> (Choi, 2019).</span></p><span data-dcnode-id="826" instrument_node="">
</span><h3 class="ftwp-heading" data-dcnode-id="824" id="ftoc-heading-7"><span data-dcnode-id="825" instrument_node="">4 Habits To Cultivate A Creative Mindset</span></h3><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Developing a creative, growth mindset is not an easy task. After all, our mindset has been with us for so long it’s likely a part of our personality.</span></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">But, it’s not impossible to form new habitual ways of thinking.</span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="816" instrument_node="">Here are my thoughts on how to adapt to a more creative mindset… one&nbsp;that works </span><em data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">for us</span></em><span data-dcnode-id="813" instrument_node=""> instead of </span><em data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">against us</span></em><span data-dcnode-id="810" instrument_node="">:</span></p><span data-dcnode-id="808" instrument_node="">
</span><h4 data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Defer From Judgments And Formulate “Forward-Thinking Goals”</span></h4><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Making static, judgmental, statements like “this sucks”, “I’m no good at this” does not help you develop a more flexible, creative, ever-growing mindset. When you find yourself using these judgments, try rephrasing them in a way that is non-judgmental (avoid words like good/bad etc). Instead, try rephrasing it as a statement incorporating a learning goal. “I need to improve my low-end mixing skills” is a more useful thought than “My mix sounds really bad”. Continuously setting new learning goals will keep you moving forward.</span></p><span data-dcnode-id="802" instrument_node="">
</span><h4 data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Add A “But” When You Think You Can’t</span></h4><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Every time you think “I can’t do it”, you set a limit to your possibilities.</span></p><p data-dcnode-id="796"></p><div class="inline-post clearfix" data-dcnode-id="765"><div class="block-wrap block-wrap-23 block-to-see block-wrap-classic clearfix block-css-74302 block--light" data-dcnode-id="766" data-id="74302" id="block-wrap-74302"><div class="block-inner-style" data-dcnode-id="767"><div class="block-inner-box contents" data-dcnode-id="768"><div class="block" data-dcnode-id="769"><span data-dcnode-id="795" instrument_node=""> </span><article class="preview-thumbnail split ani-base article-ani article-ani-1 tipi-xs-12 preview-23 with-fi post-12067 post type-post status-publish format-standard has-post-thumbnail hentry category-editorial tag-creativity tag-editorial tag-psychology tag-writers-block post-ftoc" data-dcnode-id="771"><span data-dcnode-id="794" instrument_node="">
</span><div class="cb-mask mask" data-dcnode-id="785" style="background:#06526c;"><span data-dcnode-id="793" instrument_node="">
</span><a class="mask-img" data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//producerhive.com/editorial/how-to-overcome-writers-block-music/"><span data-dcnode-id="792" instrument_node="">
</span><img alt="" class="attachment-codetipi-15zine-120-120 size-codetipi-15zine-120-120 wp-post-image" data-dcnode-id="791" data-lazy-sizes="(max-width: 120px) 100vw, 120px" data-lazy-src="//producerhive.b-cdn.net/wp-content/uploads/2020/02/architecture-black-and-white-challenge-chance-277593-120x120.jpg" data-lazy-srcset="//producerhive.b-cdn.net/wp-content/uploads/2020/02/architecture-black-and-white-challenge-chance-277593-120x120.jpg 120w, //producerhive.b-cdn.net/wp-content/uploads/2020/02/architecture-black-and-white-challenge-chance-277593-300x300.jpg 300w, //producerhive.b-cdn.net/wp-content/uploads/2020/02/architecture-black-and-white-challenge-chance-277593-200x200.jpg 200w, //producerhive.b-cdn.net/wp-content/uploads/2020/02/architecture-black-and-white-challenge-chance-277593-150x150.jpg 150w, //producerhive.b-cdn.net/wp-content/uploads/2020/02/architecture-black-and-white-challenge-chance-277593-240x240.jpg 240w, //producerhive.b-cdn.net/wp-content/uploads/2020/02/architecture-black-and-white-challenge-chance-277593-360x360.jpg 360w, //producerhive.b-cdn.net/wp-content/uploads/2020/02/architecture-black-and-white-challenge-chance-277593-540x540.jpg 540w, //producerhive.b-cdn.net/wp-content/uploads/2020/02/architecture-black-and-white-challenge-chance-277593-125x125.jpg 125w" height="120" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20120%20120'%3E%3C/svg%3E" width="120"><noscript data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">&lt;img width="120" height="120" src="//producerhive.b-cdn.net/wp-content/uploads/2020/02/architecture-black-and-white-challenge-chance-277593-120x120.jpg" class="attachment-codetipi-15zine-120-120 size-codetipi-15zine-120-120 wp-post-image" alt="" srcset="//producerhive.b-cdn.net/wp-content/uploads/2020/02/architecture-black-and-white-challenge-chance-277593-120x120.jpg 120w, //producerhive.b-cdn.net/wp-content/uploads/2020/02/architecture-black-and-white-challenge-chance-277593-300x300.jpg 300w, //producerhive.b-cdn.net/wp-content/uploads/2020/02/architecture-black-and-white-challenge-chance-277593-200x200.jpg 200w, //producerhive.b-cdn.net/wp-content/uploads/2020/02/architecture-black-and-white-challenge-chance-277593-150x150.jpg 150w, //producerhive.b-cdn.net/wp-content/uploads/2020/02/architecture-black-and-white-challenge-chance-277593-240x240.jpg 240w, //producerhive.b-cdn.net/wp-content/uploads/2020/02/architecture-black-and-white-challenge-chance-277593-360x360.jpg 360w, //producerhive.b-cdn.net/wp-content/uploads/2020/02/architecture-black-and-white-challenge-chance-277593-540x540.jpg 540w, //producerhive.b-cdn.net/wp-content/uploads/2020/02/architecture-black-and-white-challenge-chance-277593-125x125.jpg 125w" sizes="(max-width: 120px) 100vw, 120px" /&gt;</span></noscript><span data-dcnode-id="788" instrument_node=""> </span></a><span data-dcnode-id="786" instrument_node="">

</span><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//producerhive.com/editorial/how-to-overcome-writers-block-music/"><span data-dcnode-id="778" instrument_node="">
						Overcome Musician’s Block (5 Science-Backed Tactics That WORK)					</span></a><span data-dcnode-id="776" instrument_node="">
</span></p><span data-dcnode-id="774" instrument_node="">
</span></div><span data-dcnode-id="772" instrument_node="">
</span></article><span data-dcnode-id="770" instrument_node="">
</span></div></div></div></div></div><p data-dcnode-id="764"></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Adding a simple “but” to the end of the sentence will help you remember that might not be able right now, but by putting in the time and effort you’ll always get closer to the goal. It will help keep on a path of progression. (Nottingham &amp; Larsson, 2019)</span></p><span data-dcnode-id="760" instrument_node="">
</span><h4 data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Find Challenges And Push Your Boundaries</span></h4><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">If you suck at writing ballads, commit to writing one, and don’t worry about the end result.</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Remind yourself it’s the process of doing something new that will make you grow, not the result.</span></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Deliberately stepping out of the box will also aid in generating novel ideas instead of just repeating yourself.</span></p><span data-dcnode-id="748" instrument_node="">
</span><h4 data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Make A Habit Out Of Asking Yourself “Why?”</span></h4><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">If your latest music production turned out particularly good, take the time to formulate what made it work.</span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="739"><em data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Was it the frequency balance between the different instruments? </span></em></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="735"><em data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">The way each section of the song effortlessly flowed into the next one? </span></em></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="731"><strong data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">This will help you put into words what parts of the process played a role in making it great.</span></strong></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="729" instrument_node="">Do the same when the results are less than great: Take the time to think about what parts of the production didn’t turn out the way you were aiming for. If you would do it again, </span><em data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">what would you do differently</span></em><span data-dcnode-id="726" instrument_node="">?</span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Don’t be afraid to seek out the opinions of others, as they are the only ones that can hear your production with a fresh set of ears.</span></p><span data-dcnode-id="721" instrument_node="">
</span><hr data-dcnode-id="720"><span data-dcnode-id="719" instrument_node="">
