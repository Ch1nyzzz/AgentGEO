">RECOMMENDED READING</span></a></li></ul></li><li class="menu_cta menu-item menu-item-type-post_type menu-item-object-page menu-item-33769" data-dcnode-id="873"><a data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//carolynstern.com/book-me/"><span data-dcnode-id="875" instrument_node="">BOOK ME</span></a></li></ul></div></div></div></div><div class="et_search_outer" data-dcnode-id="861"><div class="container et_search_form_container" data-dcnode-id="862"><form action="https://carolynstern.com/" class="et-search-form" data-dcnode-id="865" method="get" role="search"><span data-dcnode-id="867" instrument_node=""> </span><input class="et-search-field" data-dcnode-id="866" name="s" placeholder="Search …" title="Search for:" type="search" value=""></form><span data-dcnode-id="864" instrument_node=""> </span><span class="et_close_search_field" data-dcnode-id="863"></span></div></div></header><div data-dcnode-id="232" id="et-main-area"><div data-dcnode-id="652" id="main-content"><div class="container" data-dcnode-id="653"><div class="clearfix" data-dcnode-id="654" id="content-area"><div data-dcnode-id="655" id="left-area"><article class="et_pb_post post-41286 post type-post status-publish format-standard has-post-thumbnail hentry category-positive-thinking category-stress-management tag-cultivate-optimism tag-emotional-intelligence tag-optimism tag-optimistic-workplace tag-problem-solving-3 tag-social-connection" data-dcnode-id="656" id="post-41286"><div class="et_post_meta_wrapper" data-dcnode-id="850"><h1 class="entry-title" data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">How to Cultivate Optimism in the Workplace</span></h1><p class="post-meta" data-dcnode-id="852"><a data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//carolynstern.com/blog/category/positive-thinking/" rel="category tag"><span data-dcnode-id="857" instrument_node="">Positive Thinking</span></a><span data-dcnode-id="855" instrument_node="">, </span><a data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//carolynstern.com/blog/category/stress-management/" rel="category tag"><span data-dcnode-id="854" instrument_node="">Stress Management</span></a></p><img alt="Team cultivating optimism" class="" data-dcnode-id="851" height="675" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1080px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//carolynstern.com/wp-content/uploads/2020/11/CS-How-to-Cultivate-Optimism--1080x675.jpg&amp;raw" srcset="https://carolynstern.com/wp-content/uploads/2020/11/CS-How-to-Cultivate-Optimism--1080x675.jpg 1080w, https://carolynstern.com/wp-content/uploads/2020/11/CS-How-to-Cultivate-Optimism--980x653.jpg 980w, https://carolynstern.com/wp-content/uploads/2020/11/CS-How-to-Cultivate-Optimism--480x320.jpg 480w" width="1080"></div><div class="entry-content" data-dcnode-id="658"><div class="et-l et-l--post" data-dcnode-id="661"><div class="et_builder_inner_content et_pb_gutters3" data-dcnode-id="662"><div class="et_pb_section et_pb_section_0 et_section_regular" data-dcnode-id="663"><div class="et_pb_row et_pb_row_0" data-dcnode-id="664"><div class="et_pb_column et_pb_column_4_4 et_pb_column_0 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="665"><div class="et_pb_module et_pb_text et_pb_text_0 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="845"><div class="et_pb_text_inner" data-dcnode-id="846"><p data-dcnode-id="847"><span data-dcnode-id="848" style="font-weight: 400;"><span data-dcnode-id="849" instrument_node="">It seemed like yesterday when the world shifted, and a global pandemic brought on countless challenges and changes. While it is easy to zero in on the cons during these times of uncertainty, everyone needs to remember that there is also a positive side to the equation. During these times of change, it is more important than ever to stay optimistic.</span></span></p></div></div><div class="et_pb_module et_pb_text et_pb_text_1 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="840"><div class="et_pb_text_inner" data-dcnode-id="841"><h3 data-dcnode-id="842"><span data-dcnode-id="843" style="text-transform: none;"><span data-dcnode-id="844" instrument_node="">What is Optimism?</span></span></h3></div></div><div class="et_pb_module et_pb_text et_pb_text_2 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="822"><div class="et_pb_text_inner" data-dcnode-id="823"><p data-dcnode-id="832"><span data-dcnode-id="838" style="font-weight: 400;"><span data-dcnode-id="839" instrument_node="">There is more to optimism than only staying positive; </span></span><a data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//enterprisersproject.com/article/2020/6/emotional-intelligence-build-optimism"><span data-dcnode-id="836" style="font-weight: 400;"><span data-dcnode-id="837" instrument_node="">it is a strategy that looks to seek new opportunities and develop deep emotional courage and resilience despite setbacks.</span></span></a><span data-dcnode-id="833" style="font-weight: 400;"><span data-dcnode-id="834" instrument_node=""> When an obstacle is thrown their way, optimistic individuals can pivot and identify potential new opportunities. Optimistic individuals can also stay resilient in the face of adversity; they understand that there is a lesson to be learned from each challenge.&nbsp;</span></span></p><p data-dcnode-id="824"><span data-dcnode-id="830" style="font-weight: 400;"><span data-dcnode-id="831" instrument_node="">By cultivating optimism in the workplace, employees will improve their problem solving and stress management capabilities, overcoming any obstacles thrown their way. A positive work environment also leads to </span></span><a data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inc.com/shawn-murphy/10-tips-for-creating-an-optimistic-workplace.html"><span data-dcnode-id="828" style="font-weight: 400;"><span data-dcnode-id="829" instrument_node="">higher performance and a connected team</span></span></a><span data-dcnode-id="825" style="font-weight: 400;"><span data-dcnode-id="826" instrument_node="">. Optimism will allow employees to emerge from the changing workplace, both positively and resiliently.&nbsp;</span></span></p></div></div><div class="et_pb_module et_pb_text et_pb_text_3 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="817"><div class="et_pb_text_inner" data-dcnode-id="818"><h3 data-dcnode-id="819"><span data-dcnode-id="820" style="text-transform: none;"><span data-dcnode-id="821" instrument_node="">The Dark Side of Optimism</span></span></h3></div></div><div class="et_pb_module et_pb_text et_pb_text_4 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="804"><div class="et_pb_text_inner" data-dcnode-id="805"><p data-dcnode-id="809"><span data-dcnode-id="815" style="font-weight: 400;"><span data-dcnode-id="816" instrument_node="">It is important to note that optimism is one of the 15 core competencies of emotional intelligence. </span></span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//carolynstern.com/blog/the-dark-side-of-stress-management/"><span data-dcnode-id="813" style="font-weight: 400;"><span data-dcnode-id="814" instrument_node="">Too much optimism can contribute to avoidance</span></span></a><span data-dcnode-id="810" style="font-weight: 400;"><span data-dcnode-id="811" instrument_node=""> instead of a strategy to stay persistent.&nbsp;</span></span></p><p data-dcnode-id="806"><span data-dcnode-id="807" style="font-weight: 400;"><span data-dcnode-id="808" instrument_node="">Therefore, leaders need to cultivate a balance of optimism. Team members must recognize that staying optimistic is not a method to filter out negative feedback and news, but rather an approach that urges them to look on the bright side – find new opportunities, and stay resilient.&nbsp;</span></span></p></div></div><div class="et_pb_module et_pb_text et_pb_text_5 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="799"><div class="et_pb_text_inner" data-dcnode-id="800"><h3 data-dcnode-id="801"><span data-dcnode-id="802" style="text-transform: none;"><span data-dcnode-id="803" instrument_node="">Every Cloud Has a Silver Lining&nbsp;</span></span></h3></div></div><div class="et_pb_module et_pb_text et_pb_text_6 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="773"><div class="et_pb_text_inner" data-dcnode-id="774"><p data-dcnode-id="791"><span data-dcnode-id="797" style="font-weight: 400;"><span data-dcnode-id="798" instrument_node="">Optimism is a skill that can be learned primarily through practice. Individuals are not born either optimistic or pessimistic; learning optimism is a skill that develops over time. The first step to practice optimism is recognizing emotions. When faced with an obstacle, what emotion(s) appear? Once emotions are named, they can be tamed. After identifying and coping with the feelings, the next step of practicing optimism is to</span></span><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//enterprisersproject.com/article/2020/6/emotional-intelligence-build-optimism"><span data-dcnode-id="795" style="font-weight: 400;"><span data-dcnode-id="796" instrument_node=""> now think about the lesson(s) learned</span></span></a><span data-dcnode-id="792" style="font-weight: 400;"><span data-dcnode-id="793" instrument_node="">. While the obstacle may not be in your favour, know that there is always a benefit to each challenge. Turn challenges into learning opportunities; as the famous saying goes, “when one door closes, another door opens.”&nbsp;</span></span></p><p data-dcnode-id="783"><span data-dcnode-id="789" style="font-weight: 400;"><span data-dcnode-id="790" instrument_node="">For example, use the situation of getting laid off in a job. It is natural to feel upset at first. There is a loss; you lost your job. Loss can evoke a myriad of emotions, from sadness and regret to anger and frustration. After taming the emotions, now it’s time to reflect upon the story’s moral. Despite being let go from the company, recognize that other opportunities lie ahead. Reflect on what you learned, along with what you enjoyed and did not enjoy in your previous role. Then, use that information to drive your next job search. </span></span><a data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//enterprisersproject.com/article/2020/6/emotional-intelligence-build-optimism"><span data-dcnode-id="787" style="font-weight: 400;"><span data-dcnode-id="788" instrument_node="">Optimistic individuals think about themselves positively</span></span></a><span data-dcnode-id="784" style="font-weight: 400;"><span data-dcnode-id="785" instrument_node="">; do not let your challenges consume you. Instead, learn from your challenges, and use the lessons learned to propel you forward to seek new opportunities on the horizon.&nbsp;</span></span></p><p data-dcnode-id="775"><span data-dcnode-id="781" style="font-weight: 400;"><span data-dcnode-id="782" instrument_node="">When faced with conflict, it may be easier to focus on the negatives. To begin thinking optimistically, </span></span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//enterprisersproject.com/article/2020/6/emotional-intelligence-build-optimism"><span data-dcnode-id="779" style="font-weight: 400;"><span data-dcnode-id="780" instrument_node="">view your problems as temporary setbacks, not permanent conditions</span></span></a><span data-dcnode-id="776" style="font-weight: 400;"><span data-dcnode-id="777" instrument_node="">. By adopting this mindset, you will recognize that challenges are interim and learn ways to overcome the obstacle.&nbsp;</span></span></p></div></div><div class="et_pb_module et_pb_text et_pb_text_7 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="768"><div class="et_pb_text_inner" data-dcnode-id="769"><h3 data-dcnode-id="770"><span data-dcnode-id="771" style="text-transform: none;"><span data-dcnode-id="772" instrument_node="">How to Cultivate Optimism in the Workplace</span></span></h3></div></div><div class="et_pb_module et_pb_text et_pb_text_8 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="760"><div class="et_pb_text_inner" data-dcnode-id="761"><p data-dcnode-id="765"><span data-dcnode-id="766" style="font-weight: 400;"><span data-dcnode-id="767" instrument_node="">The traditional office life has shifted to remote work, now incorporating elements from employees’ personal lives. For example, team members are now invited into each others’ home offices virtually during meetings. With these changes, every employee has their own opinions and change tolerance. To boost morale and synergy, emotionally intelligent leaders need to be at the forefront of instilling optimism in the workplace, reminding their team members that they can make it through the turmoil.&nbsp;</span></span></p><p data-dcnode-id="762"><span data-dcnode-id="763" style="font-weight: 400;"><span data-dcnode-id="764" instrument_node="">Here are a few strategies leaders can implement to boost the workplace’s optimism and assist in the mission!</span></span></p></div></div><div class="et_pb_module et_pb_text et_pb_text_9 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="755"><div class="et_pb_text_inner" data-dcnode-id="756"><h4 data-dcnode-id="757"><span data-dcnode-id="758" style="text-transform: none;"><span data-dcnode-id="759" instrument_node="">Team Check-In’s&nbsp;</span></span></h4></div></div><div class="et_pb_module et_pb_text et_pb_text_10 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="740"><div class="et_pb_text_inner" data-dcnode-id="741"><p data-dcnode-id="742"><span data-dcnode-id="753" style="font-weight: 400;"><span data-dcnode-id="754" instrument_node="">As mentioned in </span></span><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiexperience.com/blog/leading-effective-virtual-meetings/"><span data-dcnode-id="751" style="font-weight: 400;"><span data-dcnode-id="752" instrument_node="">Leading Effective Virtual Meetings</span></span></a><span data-dcnode-id="748" style="font-weight: 400;"><span data-dcnode-id="749" instrument_node="">, a quick check-in at the beginning of a virtual meeting can help understand your team members’ emotional state, even though physically apart. The </span></span><a data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//enterprisersproject.com/article/2020/4/emotional-intelligence-leadership-in-pandemic"><span data-dcnode-id="746" style="font-weight: 400;"><span data-dcnode-id="747" instrument_node="">check-in can be as simple as asking ‘How are you doing?’</span></span></a><span data-dcnode-id="743" style="font-weight: 400;"><span data-dcnode-id="744" instrument_node=""> to dedicating a few minutes at the beginning of each meeting to discuss what team members did over the weekend. These check-ins help team members get to know each other outside of work and start the discussion and workday with a positive note before diving into work. By regularly incorporating check-in’s, employees will begin to feel a sense of optimism and self-worth.&nbsp;</span></span></p></div></div><div class="et_pb_module et_pb_text et_pb_text_11 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="735"><div class="et_pb_text_inner" data-dcnode-id="736"><h4 data-dcnode-id="737"><span data-dcnode-id="738" style="text-transform: none;"><span data-dcnode-id="739" instrument_node="">Wired for Connection</span></span></h4></div></div><div class="et_pb_module et_pb_text et_pb_text_12 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="717"><div class="et_pb_text_inner" data-dcnode-id="718"><p data-dcnode-id="727"><span data-dcnode-id="733" style="font-weight: 400;"><span data-dcnode-id="734" instrument_node="">Humans enjoy social connection; </span></span><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologytoday.com/ca/blog/fine-tuning-human-performance/201807/wired-connect"><span data-dcnode-id="731" style="font-weight: 400;"><span data-dcnode-id="732" instrument_node="">having a variety of deeper connections contributes to improved well-being</span></span></a><span data-dcnode-id="728" style="font-weight: 400;"><span data-dcnode-id="729" instrument_node="">. Since apart, employees may no longer feel as connected to the company or the people. To combat this, utilize technology to communicate with your teams. Communication can take form in an informal space to stay social, such as the #random Slack channel, or sending out a feel-good news article every Monday to kick off the week on a high note. Another option is to host virtual socials. Whether you choose to conduct a virtual happy hour or virtual game night, either will present a perfect opportunity to bond.&nbsp;</span></span></p><p data-dcnode-id="719"><span data-dcnode-id="725" style="font-weight: 400;"><span data-dcnode-id="726" instrument_node="">Creating a strong connection with your team helps cultivate optimism as it </span></span><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inc.com/shawn-murphy/10-tips-for-creating-an-optimistic-workplace.html"><span data-dcnode-id="723" style="font-weight: 400;"><span data-dcnode-id="724" instrument_node="">contributes to a positive environment</span></span></a><span data-dcnode-id="720" style="font-weight: 400;"><span data-dcnode-id="721" instrument_node="">. When you trust your teammates, you can collectively cheer each other and collaborate to see possibilities in each situation.&nbsp;</span></span></p></div></div><div class="et_pb_module et_pb_text et_pb_text_13 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="712"><div class="et_pb_text_inner" data-dcnode-id="713"><h4 data-dcnode-id="714"><span data-dcnode-id="715" style="text-transform: none;"><span data-dcnode-id="716" instrument_node="">Be a Champion of Optimism</span></span></h4></div></div><div class="et_pb_module et_pb_text et_pb_text_14 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="701"><div class="et_pb_text_inner" data-dcnode-id="702"><p data-dcnode-id="709"><span data-dcnode-id="710" style="font-weight: 400;"><span data-dcnode-id="711" instrument_node="">Leaders must ensure that they believe in an optimistic work environment before spreading the message. One way to show that you care is to hold one-on-one meetings with your team members. From the leaders’ perspective, you will provide valuable feedback on your team members’ goals and performance as a leader. In return, it allows for a deeper level of connection between you and your team.&nbsp;</span></span></p><p data-dcnode-id="706"><span data-dcnode-id="707" style="font-weight: 400;"><span data-dcnode-id="708" instrument_node="">During these meetings, showcase that optimism is a value you want to display in the workplace. If a team member is sharing their challenges, help them see the silver lining. Give them time to vent, but then use the conversation as a coaching opportunity. Ask them if they are open to having a coaching conversation, and if they agree, ask them what their goals are and how they think they can overcome their current challenges. By acting as the role model of focusing on solutions, not problems, you are naturally instilling your team to feel empowered and more optimistic. They will quickly realize they have the answers inside of them to solve their challenges. Your team members will soon adopt the same optimistic mindset you are modelling.</span></span></p><p data-dcnode-id="703"><span data-dcnode-id="704" style="font-weight: 400;"><span data-dcnode-id="705" instrument_node="">Cultivating optimism in the workplace starts with investing in your people and illustrating that you care. By nurturing an optimistic workplace, your team will feel connected with each other and resilient, able to take on the challenges that lie ahead.&nbsp;</span></span></p></div></div><div class="et_pb_module et_pb_text et_pb_text_15 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="686"><div class="et_pb_text_inner" data-dcnode-id="687"><p data-dcnode-id="688"><span data-dcnode-id="699" style="font-weight: 400;"><span data-dcnode-id="700" instrument_node="">If you would like to learn more about cultivating an optimistic workplace, check out our keynote, </span></span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//carolynstern.com/keynote-presentations/staying-emotionally-connected-together-apart/"><span data-dcnode-id="697" style="font-weight: 400;"><span data-dcnode-id="698" instrument_node="">Staying Emotionally Connected Together Apart</span></span></a><span data-dcnode-id="694" style="font-weight: 400;"><span data-dcnode-id="695" instrument_node="">, available in live or virtual delivery. You can also check out our workshop on </span></span><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiexperience.com/services/leadership-development-workshops/cultivating-a-positive-corporate-culture/"><span data-dcnode-id="692" style="font-weight: 400;"><span data-dcnode-id="693" instrument_node="">Corporate Culture</span></span></a><span data-dcnode-id="689" style="font-weight: 400;"><span data-dcnode-id="690" instrument_node="">, where you will learn how to foster a positive corporate culture by using emotional intelligence.&nbsp;</span></span></p></div></div><div class="et_pb_module et_pb_text et_pb_text_16 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="666"><div class="et_pb_text_inner" data-dcnode-id="667"><p data-dcnode-id="668"><span data-dcnode-id="684" style="font-weight: 400;"><span data-dcnode-id="685" instrument_node="">Follow us on </span></span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/carolynstern"><span data-dcnode-id="682" style="font-weight: 400;"><span data-dcnode-id="683" instrument_node="">Twitter</span></span></a><span data-dcnode-id="679" style="font-weight: 400;"><span data-dcnode-id="680" instrument_node="">, </span></span><a data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/CarolynStern.GetUnstuck"><span data-dcnode-id="677" style="font-weight: 400;"><span data-dcnode-id="678" instrument_node="">Facebook</span></span></a><span data-dcnode-id="674" style="font-weight: 400;"><span data-dcnode-id="675" instrument_node="">, and </span></span><a data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/company/carolyn-stern-%26-associates-incorporated/"><span data-dcnode-id="672" style="font-weight: 400;"><span data-dcnode-id="673" instrument_node="">LinkedIn</span></span></a><span data-dcnode-id="669" style="font-weight: 400;"><span data-dcnode-id="670" instrument_node=""> to stay up-to-date with our blogs!&nbsp;</span></span></p></div></div></div></div></div></div></div><span data-dcnode-id="660" instrument_node=""> </span><span class="et_social_bottom_trigger" data-dcnode-id="659"></span></div><div class="et_post_meta_wrapper" data-dcnode-id="657"></div></article></div></div></div></div><footer class="et-l et-l--footer" data-dcnode-id="233"><div class="et_builder_inner_content et_pb_gutters3" data-dcnode-id="234"><div class="et_pb_section et_pb_
