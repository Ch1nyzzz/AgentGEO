</span><article class="article article-secondary" data-dcnode-id="527"><span data-dcnode-id="834" instrument_node="">
</span><div class="container container-xs" data-dcnode-id="530"><span data-dcnode-id="833" instrument_node="">
</span><em class="article-meta tag" data-dcnode-id="830" style="color: #aa2173;"><a data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/mind-meaning/" rel="category tag"><span data-dcnode-id="832" instrument_node="">Mind &amp; Meaning</span></a></em><span data-dcnode-id="829" instrument_node="">
</span><h1 class="post-title" data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">10 tips for overcoming adversity</span></h1><span data-dcnode-id="826" instrument_node="">
</span><h4 class="subtitle" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">How to build resilience and overcome anything</span></h4><span data-dcnode-id="823" instrument_node="">
</span><span class="article-author" data-dcnode-id="818"><span data-dcnode-id="822" instrument_node="">
            Posted by:

            </span><strong data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Team Tony</span></strong><span data-dcnode-id="819" instrument_node="">
</span></span><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">
</span></p><div class="mobile-hide opt-in-ad-container short-code-opt-in" data-dcnode-id="810" style="float:right; padding-left:15px;"><span data-dcnode-id="814" instrument_node="">
</span><a class="shortcode-ad" data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//core.tonyrobbins.com/wheel-of-life/"><img data-dcnode-id="813" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnwp.tonyrobbins.com/wp-content/uploads/2015/04/WOL-tr-ad-2.png&amp;raw"></a><span data-dcnode-id="811" instrument_node="">
</span></div><span data-dcnode-id="809" instrument_node="">
</span><span data-dcnode-id="807" style="font-weight: 400;"><span data-dcnode-id="808" instrument_node="">Anyone who has ever achieved something worthwhile has had challenges and setbacks – because anything that is worth doing is going to be difficult. </span></span><span data-dcnode-id="805" style="font-weight: 400;"><span data-dcnode-id="806" instrument_node="">Overcoming adversity</span></span><span data-dcnode-id="803" style="font-weight: 400;"><span data-dcnode-id="804" instrument_node=""> is a necessary step on the road to greatness.</span></span><p data-dcnode-id="802"></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="799" style="font-weight: 400;"><span data-dcnode-id="800" instrument_node="">Philosopher Edmund Burke said, “He that wrestles with us strengthens our nerves and sharpens our skill. Our antagonist is our helper.” Life is the worthy opponent – the antagonist – we all need to grow. When you have the right tools for </span></span><span data-dcnode-id="797" style="font-weight: 400;"><span data-dcnode-id="798" instrument_node="">how to overcome adversity</span></span><span data-dcnode-id="795" style="font-weight: 400;"><span data-dcnode-id="796" instrument_node="">, you’re able to embrace it as a helper, instead of letting it stop you from achieving your goals. </span></span><span data-dcnode-id="792" style="font-weight: 400;"><span data-dcnode-id="793" style="font-size: 16px;"><span data-dcnode-id="794" instrument_node="">
</span></span></span></p><div class="mobile-show opt-in-ad-container short-code-opt-in" data-dcnode-id="786" style=""><span data-dcnode-id="790" instrument_node="">
</span><a class="shortcode-ad" data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//core.tonyrobbins.com/wheel-of-life/"><img data-dcnode-id="789" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnwp.tonyrobbins.com/wp-content/uploads/2015/04/WOL-tr-ad-2.png&amp;raw"></a><span data-dcnode-id="787" instrument_node="">
</span></div><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="784"></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><img alt="how does a person overcome adversity" class="size-medium wp-image-57236 alignnone" data-dcnode-id="782" height="310" sizes="(max-width: 550px) 100vw, 550px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnwp.tonyrobbins.com/wp-content/uploads/2021/02/shutterstock_1747603331-550x310.jpg&amp;raw" srcset="https://cdnwp.tonyrobbins.com/wp-content/uploads/2021/02/shutterstock_1747603331-550x310.jpg 550w, https://cdnwp.tonyrobbins.com/wp-content/uploads/2021/02/shutterstock_1747603331.jpg 928w" width="550"></p><span data-dcnode-id="780" instrument_node="">
</span><h3 data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">1. Be prepared</span></h3><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="775" style="font-weight: 400;"><span data-dcnode-id="776" instrument_node="">You can work on </span></span><span data-dcnode-id="773" style="font-weight: 400;"><span data-dcnode-id="774" instrument_node="">overcoming adversity</span></span><span data-dcnode-id="771" style="font-weight: 400;"><span data-dcnode-id="772" instrument_node=""> before it even happens. Train your brain to be resilient by building your</span></span><a data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/business/inner-strength/"><span data-dcnode-id="770" instrument_node=""> </span><span data-dcnode-id="768" style="font-weight: 400;"><span data-dcnode-id="769" instrument_node="">inner strength</span></span></a><span data-dcnode-id="765" style="font-weight: 400;"><span data-dcnode-id="766" instrument_node=""> and developing a growth mindset. Examine your</span></span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/stories/unleash-the-power/are-your-beliefs-holding-you-back/"><span data-dcnode-id="764" instrument_node=""> </span><span data-dcnode-id="762" style="font-weight: 400;"><span data-dcnode-id="763" instrument_node="">limiting beliefs</span></span></a><span data-dcnode-id="759" style="font-weight: 400;"><span data-dcnode-id="760" instrument_node=""> to uncover what’s holding you back. Develop a support system that you can fall back on. When the time comes to dig deep and uncover </span></span><span data-dcnode-id="757" style="font-weight: 400;"><span data-dcnode-id="758" instrument_node="">how to overcome adversity</span></span><span data-dcnode-id="755" style="font-weight: 400;"><span data-dcnode-id="756" instrument_node="">, you’ll be prepared.</span></span></p><span data-dcnode-id="753" instrument_node="">
</span><h3 data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">2. Practice positivity</span></h3><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="748" style="font-weight: 400;"><span data-dcnode-id="749" instrument_node="">How does a person overcome adversity</span></span><span data-dcnode-id="746" style="font-weight: 400;"><span data-dcnode-id="747" instrument_node="">? It’s often about the way they frame the things that happen to them. Take a step back and reframe the problem in a positive way. Catch any</span></span><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/mind-meaning/change-your-words-change-your-life/"><span data-dcnode-id="745" instrument_node=""> </span><span data-dcnode-id="743" style="font-weight: 400;"><span data-dcnode-id="744" instrument_node="">negative self-talk</span></span></a><span data-dcnode-id="740" style="font-weight: 400;"><span data-dcnode-id="741" instrument_node=""> and replace it with</span></span><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/mind-meaning/empowering-beliefs/"><span data-dcnode-id="739" instrument_node=""> </span><span data-dcnode-id="737" style="font-weight: 400;"><span data-dcnode-id="738" instrument_node="">empowering beliefs</span></span></a><span data-dcnode-id="734" style="font-weight: 400;"><span data-dcnode-id="735" instrument_node=""> that help you work toward your goal rather than undermine it. </span></span></p><span data-dcnode-id="732" instrument_node="">
</span><h3 data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">3. Stay disciplined</span></h3><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="727" style="font-weight: 400;"><span data-dcnode-id="728" instrument_node="">When tough times hit, it can feel like your life is out of control. That’s why rituals are a powerful tool for </span></span><span data-dcnode-id="725" style="font-weight: 400;"><span data-dcnode-id="726" instrument_node="">overcoming adversity</span></span><span data-dcnode-id="723" style="font-weight: 400;"><span data-dcnode-id="724" instrument_node="">. When you create positive habits like</span></span><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/ask-tony/priming/"><span data-dcnode-id="722" instrument_node=""> </span><span data-dcnode-id="720" style="font-weight: 400;"><span data-dcnode-id="721" instrument_node="">priming</span></span></a><span data-dcnode-id="714" style="font-weight: 400;"><span data-dcnode-id="718" instrument_node="">, meditation and daily exercise, you’re preparing your mind and body for adversity. Sticking to a </span><a data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/productivity-performance/making-a-daily-routine/"><span data-dcnode-id="717" instrument_node="">daily routine</span></a><span data-dcnode-id="715" instrument_node=""> through good times and bad will bring order and empowerment to your life.</span></span></p><span data-dcnode-id="712" instrument_node="">
</span><h3 data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">4. Stay focused</span></h3><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="707" style="font-weight: 400;"><span data-dcnode-id="708" instrument_node="">Getting what you want in life is</span></span><a data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/career-business/where-focus-goes-energy-flows/"><span data-dcnode-id="706" instrument_node=""> </span><span data-dcnode-id="704" style="font-weight: 400;"><span data-dcnode-id="705" instrument_node="">all about focus</span></span></a><span data-dcnode-id="701" style="font-weight: 400;"><span data-dcnode-id="702" instrument_node="">. No matter what happens, you must keep your eye on the prize. Remember why you wanted your goal: it’s your purpose, your passion, your reason for living.</span></span><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/how-to-focus/goal-visualization/"><span data-dcnode-id="700" instrument_node=""> </span><span data-dcnode-id="698" style="font-weight: 400;"><span data-dcnode-id="699" instrument_node="">Visualize your life</span></span></a><span data-dcnode-id="695" style="font-weight: 400;"><span data-dcnode-id="696" instrument_node=""> when you’ve achieved your dreams. Stay focused on your ultimate goal, no matter what. There’s no room for self-pity and no time for negativity when you’re learning </span></span><span data-dcnode-id="693" style="font-weight: 400;"><span data-dcnode-id="694" instrument_node="">how to overcome adversity</span></span><span data-dcnode-id="691" style="font-weight: 400;"><span data-dcnode-id="692" instrument_node="">.&nbsp; </span></span></p><span data-dcnode-id="689" instrument_node="">
</span><h3 data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">5. Find the lesson</span></h3><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="684" style="font-weight: 400;"><span data-dcnode-id="685" instrument_node="">Realizing that</span></span><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/mind-meaning/life-is-happening-for-me/"><span data-dcnode-id="683" instrument_node=""> </span><span data-dcnode-id="681" style="font-weight: 400;"><span data-dcnode-id="682" instrument_node="">life happens for you</span></span></a><span data-dcnode-id="678" style="font-weight: 400;"><span data-dcnode-id="679" instrument_node="">, not to you, is key to </span></span><span data-dcnode-id="676" style="font-weight: 400;"><span data-dcnode-id="677" instrument_node="">overcoming adversity</span></span><span data-dcnode-id="674" style="font-weight: 400;"><span data-dcnode-id="675" instrument_node="">. Every event in your life can teach you something. Those who are able to find the lessons will succeed. Those who blame their circumstances on others will fail. Take responsibility. Evaluate what happened and why. Determine how you can prevent it from happening in the future. Then move on. As Steve Jobs said when it comes to mistakes, “It’s best to admit them quickly and get on with improving your other innovations.”</span></span></p><span data-dcnode-id="672" instrument_node="">
</span><h3 data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">6. Work on your skills</span></h3><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="667" style="font-weight: 400;"><span data-dcnode-id="668" instrument_node="">The greatest leaders and most successful people know that there is always room for improvement. As Tony himself says, “</span></span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/mind-meaning/why-is-growth-addictive/"><span data-dcnode-id="665" style="font-weight: 400;"><span data-dcnode-id="666" instrument_node="">If you’re not growing, you’re dying</span></span></a><span data-dcnode-id="662" style="font-weight: 400;"><span data-dcnode-id="663" instrument_node="">.” </span></span><span data-dcnode-id="660" style="font-weight: 400;"><span data-dcnode-id="661" instrument_node="">Overcoming adversity</span></span><span data-dcnode-id="658" style="font-weight: 400;"><span data-dcnode-id="659" instrument_node=""> is about taking an honest look at your own knowledge and skills and working to improve them, every day. Work on your public speaking. Become a better networker. Improve your knowledge of finances or management. You’ll</span></span><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/building-confidence/how-to-be-confident/"><span data-dcnode-id="657" instrument_node=""> </span><span data-dcnode-id="655" style="font-weight: 400;"><span data-dcnode-id="656" instrument_node="">feel more confident</span></span></a><span data-dcnode-id="652" style="font-weight: 400;"><span data-dcnode-id="653" instrument_node=""> and prepared for the future.</span></span></p><span data-dcnode-id="650" instrument_node="">
</span><h3 data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">7. Get inspired</span></h3><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="645" style="font-weight: 400;"><span data-dcnode-id="646" instrument_node="">To answer the question, “</span></span><span data-dcnode-id="643" style="font-weight: 400;"><span data-dcnode-id="644" instrument_node="">How do people overcome adversity</span></span><span data-dcnode-id="641" style="font-weight: 400;"><span data-dcnode-id="642" instrument_node="">?,” go to the source. Read the biographies of people who have achieved what you want in life. From Oprah Winfrey to Bill Gates, there’s no shortage of real-life examples of </span></span><span data-dcnode-id="639" style="font-weight: 400;"><span data-dcnode-id="640" instrument_node="">overcoming adversity</span></span><span data-dcnode-id="637" style="font-weight: 400;"><span data-dcnode-id="638" instrument_node="">. Need a quick pick-me-up? Find</span></span><a data-dcnode-id="633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/tony-robbins-quotes/inspirational-quotes/"><span data-dcnode-id="636" instrument_node=""> </span><span data-dcnode-id="634" style="font-weight: 400;"><span data-dcnode-id="635" instrument_node="">inspirational quotes</span></span></a><span data-dcnode-id="631" style="font-weight: 400;"><span data-dcnode-id="632" instrument_node=""> to post on your mirror or fridge. Proactively</span></span><a data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/mind-meaning/feed-your-mind/"><span data-dcnode-id="630" instrument_node=""> </span><span data-dcnode-id="628" style="font-weight: 400;"><span data-dcnode-id="629" instrument_node="">feed your mind</span></span></a><span data-dcnode-id="625" style="font-weight: 400;"><span data-dcnode-id="626" instrument_node=""> and you’ll change your entire state.</span></span></p><span data-dcnode-id="623" instrument_node="">
</span><h3 data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">8. Elevate your peer group</span></h3><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="618" style="font-weight: 400;"><span data-dcnode-id="619" instrument_node="">Looking to success stories can help you learn </span></span><span data-dcnode-id="616" style="font-weight: 400;"><span data-dcnode-id="617" instrument_node="">how to overcome adversity</span></span><span data-dcnode-id="614" style="font-weight: 400;"><span data-dcnode-id="615" instrument_node=""> – but you must also look at those around you. As Tony says, “The quality of a person’s life is most often a direct reflection of the expectations of their peer group.”</span></span><a data-dcnode-id="610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/mind-meaning/peer-communities/"><span data-dcnode-id="613" instrument_node=""> </span><span data-dcnode-id="611" style="font-weight: 400;"><span data-dcnode-id="612" instrument_node="">You are who you hang out with</span></span></a><span data-dcnode-id="608" style="font-weight: 400;"><span data-dcnode-id="609" instrument_node="">. And if you want to bounce back from challenges, live optimistically and stay focused, you need to</span></span><a data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/stories/business-mastery/surround-yourself-with-quality-people/"><span data-dcnode-id="607" instrument_node=""> </span><span data-dcnode-id="605" style="font-weight: 400;"><span data-dcnode-id="606" instrument_node="">surround yourself with people</span></span></a><span data-dcnode-id="602" style="font-weight: 400;"><span data-dcnode-id="603" instrument_node=""> who support you – not people who hold you back.</span></span></p><span data-dcnode-id="600" instrument_node="">
</span><h3 data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">9. Get a coach</span></h3><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="595" style="font-weight: 400;"><span data-dcnode-id="596" instrument_node="">Overcoming adversity</span></span><span data-dcnode-id="593" style="font-weight: 400;"><span data-dcnode-id="594" instrument_node=""> takes just the right blend of positivity and realism, of passion and real-life skills, of inner strength and an outer support system. A</span></span><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/coaching/results-coaching/"><span data-dcnode-id="592" instrument_node=""> </span><span data-dcnode-id="590" style="font-weight: 400;"><span data-dcnode-id="591" instrument_node="">results coach</span></span></a><span data-dcnode-id="587" style="font-weight: 400;"><span data-dcnode-id="588" instrument_node=""> can help you balance it all and stay on track. They’re professionally trained in the art of </span></span><span data-dcnode-id="585" style="font-weight: 400;"><span data-dcnode-id="586" instrument_node="">overcoming adversity</span></span><span data-dcnode-id="580" style="font-weight: 400;"><span data-dcnode-id="584" instrument_node="">. They can give you the mix of guidance, goal-setting and tough love you need to </span><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/mind-meaning/tough-times/"><span data-dcnode-id="583" instrument_node="">get through tough times</span></a><span data-dcnode-id="581" instrument_node=""> and come out the other side stronger and wiser.</span></span></p><span data-dcnode-id="578" instrument_node="">
</span><h3 data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">&nbsp;10. Don’t give up</span></h3><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="573" style="font-weight: 400;"><span data-dcnode-id="574" instrument_node="">“</span></span><a data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/stories/business-mastery/finding-way-none/"><span data-dcnode-id="571" style="font-weight: 400;"><span data-dcnode-id="572" instrument_node="">Persistence</span></span></a><span data-dcnode-id="568" style="font-weight: 400;"><span data-dcnode-id="569" instrument_node=""> overshadows even talent as the most valuable resource shaping the quality of life,” says Tony.</span></span><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tonyrobbins.com/mind-meaning/reframing-traumatic-experiences/"><span data-dcnode-id="567" instrument_node=""> </span><span data-dcnode-id="565" style="font-weight: 400;"><span data-dcnode-id="566" instrument_node="">Surfer Mick Fanning</span></span></a><span data-dcnode-id="562" style="font-weight: 400;"><span data-dcnode-id="563" instrument_node=""> got back on his surfboard just six days after a shark attack. Stephen King’s classic novel </span></span><i data-dcnode-id="559"><span data-dcnode-id="560" style="font-weight: 400;"><span data-dcnode-id="561" instrument_node="">Carrie</span></span></i><span data-dcnode-id="557" style="font-weight: 400;"><span data-dcnode-id="558" instrument_node=""> was rejected 30 times. Thomas Edison tried thousands of methods before making a successful lightbulb, saying, “I have not failed. I’ve just found 10,000 ways that won’t work.” That’s the perfect way to sum up </span></span><span data-dcnode-id="555" style="font-weight: 400;"><span data-dcnode-id="556" instrument_node="">how to overcome adversity</span></span><span data-dcnode-id="553" style="font-weight: 400;"><span data-dcnode-id="554" instrument_node="">.</span></span></p><span data-dcnode-id="551" instrument_node="">
</span><div class="article-group" data-dcnode-id="533"><span data-dcnode-id="550" instrument_node="">
