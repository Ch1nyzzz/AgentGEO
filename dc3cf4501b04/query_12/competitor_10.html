</span><h2 data-dcnode-id="3077"><b data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">What is a Growth Mindset and Fixed Mindset?</span></b></h2><span data-dcnode-id="3076" instrument_node="">
</span><p data-dcnode-id="3070"><span data-dcnode-id="3071" style="font-weight: 400;"><span data-dcnode-id="3075" instrument_node="">So what exactly is </span><a data-dcnode-id="3073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//due.com/blog/entrepreneurs-growth-mindset/" rel="noopener" target="_blank"><span data-dcnode-id="3074" instrument_node="">growth mindset</span></a><span data-dcnode-id="3072" instrument_node=""> and fixed mindset? Carol Dweck defines growth mindset as the belief that intelligence and talents can be cultivated through hard work and dedication. It thrives on challenges for growth rather than avoiding them.</span></span></p><span data-dcnode-id="3069" instrument_node="">
</span><p data-dcnode-id="3066"><span data-dcnode-id="3067" style="font-weight: 400;"><span data-dcnode-id="3068" instrument_node="">On the other hand, fixed mindset is a belief in inherent or fixed traits, such as”I am smart” or “I am dumb.”</span></span></p><span data-dcnode-id="3065" instrument_node="">
</span><p data-dcnode-id="3059"><span data-dcnode-id="3060" style="font-weight: 400;"><span data-dcnode-id="3064" instrument_node="">In this case, looking at things as either easy or difficult reinforces this way of </span><a data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lifengoal.com/affirmations-for-overthinking/"><span data-dcnode-id="3063" instrument_node="">thinking</span></a><span data-dcnode-id="3061" instrument_node="">. The growth mindset sets out to prove the other wrong, whereas someone with a fixed mindset looks for evidence to confirm their belief system.</span></span></p><span data-dcnode-id="3058" instrument_node="">
</span><p data-dcnode-id="3055"><span data-dcnode-id="3056" style="font-weight: 400;"><span data-dcnode-id="3057" instrument_node="">It is more closely related to self-belief and how you view your abilities. People with growth mindsets believe that they can grow their intelligence and abilities, while those with fixed mindsets do not.</span></span></p><span data-dcnode-id="3054" instrument_node=""> </span></div><span data-dcnode-id="3052" instrument_node="">

</span><p data-dcnode-id="2951"><span data-dcnode-id="2952" style="font-weight: 400;"><span data-dcnode-id="2953" instrument_node="">Why is it that some people succeed, while others do not?&nbsp;</span></span></p><p data-dcnode-id="2945"><span data-dcnode-id="2946" style="font-weight: 400;"><span data-dcnode-id="2950" instrument_node="">Is </span><a data-dcnode-id="2948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lifengoal.com/affirmations-for-success-at-work/"><span data-dcnode-id="2949" instrument_node="">success a product of luck or hard work</span></a><span data-dcnode-id="2947" instrument_node="">?&nbsp;</span></span></p><p data-dcnode-id="2942"><span data-dcnode-id="2943" style="font-weight: 400;"><span data-dcnode-id="2944" instrument_node="">These are the questions that have been plaguing psychologists for decades.&nbsp;</span></span></p><p data-dcnode-id="2939"><span data-dcnode-id="2940" style="font-weight: 400;"><span data-dcnode-id="2941" instrument_node="">Recently, psychologist Carol Dweck has published her findings on this topic in her book “Mindset: The New Psychology of Success.”&nbsp;</span></span></p><p data-dcnode-id="2936"><span data-dcnode-id="2937" style="font-weight: 400;"><span data-dcnode-id="2938" instrument_node="">Through research and study Dweck has found that what separates those who succeed from those who don’t is their mindset.&nbsp;</span></span></p><p data-dcnode-id="2933"><span data-dcnode-id="2934" style="font-weight: 400;"><span data-dcnode-id="2935" instrument_node="">So if you want to learn more about why growth mindset is the #1 factor of success, read on.</span></span></p><span data-dcnode-id="2932" instrument_node=""> </span></div><span data-dcnode-id="2930" instrument_node="">

</span><h2 data-dcnode-id="2865"><b data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">Why Growth Mindset is the #1 Factor of Success</span></b></h2><p data-dcnode-id="2862"><span data-dcnode-id="2863" style="font-weight: 400;"><span data-dcnode-id="2864" instrument_node="">There is one factor that has been shown time after time as being the most important thing to have if you want to be truly successful: the growth mindset.</span></span></p><p data-dcnode-id="2856"><span data-dcnode-id="2857" style="font-weight: 400;"><span data-dcnode-id="2861" instrument_node="">A person’s true </span><a data-dcnode-id="2859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lifengoal.com/unlocking-your-potential/"><span data-dcnode-id="2860" instrument_node="">potential</span></a><span data-dcnode-id="2858" instrument_node=""> is developed through dedication and hard work.” – The Growth Mindset Mantra</span></span></p><p data-dcnode-id="2853"><span data-dcnode-id="2854" style="font-weight: 400;"><span data-dcnode-id="2855" instrument_node="">When you first begin something new, it should be approached as fun and challenging, not something that is going to take over your life.&nbsp;</span></span></p><p data-dcnode-id="2850"><span data-dcnode-id="2851" style="font-weight: 400;"><span data-dcnode-id="2852" instrument_node="">People who hold a “growth mindset” see challenges as learning opportunities instead of chances for failure or barriers to success.&nbsp;</span></span></p><p data-dcnode-id="2847"><span data-dcnode-id="2848" style="font-weight: 400;"><span data-dcnode-id="2849" instrument_node="">They understand that there is always more work to be done and progress to be made in their fields, and they never settle for mediocre results.</span></span></p><p data-dcnode-id="2844"><span data-dcnode-id="2845" style="font-weight: 400;"><span data-dcnode-id="2846" instrument_node="">“Talent is a pursued interest. Anything that you’re willing to practice, you can do.” – Carol Dweck</span></span></p><p data-dcnode-id="2841"><span data-dcnode-id="2842" style="font-weight: 400;"><span data-dcnode-id="2843" instrument_node="">This mindset allows you to continue to have fun with your work, rather than becoming weighed down by the difficulty of it.</span></span></p><p data-dcnode-id="2838"><span data-dcnode-id="2839" style="font-weight: 400;"><span data-dcnode-id="2840" instrument_node="">Pablo Picasso once said, “Every child is an artist. The problem is how to remain an artist once he grows up.”&nbsp;</span></span></p><p data-dcnode-id="2832"><span data-dcnode-id="2833" style="font-weight: 400;"><span data-dcnode-id="2837" instrument_node="">Picasso understood that </span><a data-dcnode-id="2835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lifengoal.com/affirmations-for-creativity/"><span data-dcnode-id="2836" instrument_node="">creativity</span></a><span data-dcnode-id="2834" instrument_node=""> isn’t something that dies as we age; it’s something that can be nurtured and developed into a lifelong passion.&nbsp;</span></span></p><p data-dcnode-id="2829"><span data-dcnode-id="2830" style="font-weight: 400;"><span data-dcnode-id="2831" instrument_node="">One characteristic of someone who holds a growth mindset is curiosity – they are always looking for new ways to improve themselves, whether through learning about other cultures or finding creative solutions to difficult problems at home or at work.</span></span></p><span data-dcnode-id="2828" instrument_node=""> </span></div><span data-dcnode-id="2826" instrument_node="">
</span></div><span data-dcnode-id="2824" instrument_node="">
</span></div><span data-dcnode-id="2822" instrument_node="">
</span><div class="elementor-element elementor-element-530ef4b elementor-widget elementor-widget-image" data-dcnode-id="2807" data-element_type="widget" data-id="530ef4b" data-widget_type="image.default"><span data-dcnode-id="2821" instrument_node="">

</span><p data-dcnode-id="2800" style="text-align: center;"><a data-dcnode-id="2801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teachstarter.com/wp-content/uploads/2021/08/growth-mindset-1.jpg" rel="noopener" target="_blank"><span data-dcnode-id="2802" instrument_node="">Source</span></a></p><span data-dcnode-id="2799" instrument_node=""> </span></div><span data-dcnode-id="2797" instrument_node="">
</span></div><span data-dcnode-id="2795" instrument_node="">
</span></div><span data-dcnode-id="2793" instrument_node="">
</span><div class="elementor-element elementor-element-822b056 elementor-widget elementor-widget-text-editor" data-dcnode-id="2745" data-element_type="widget" data-id="822b056" data-widget_type="text-editor.default"><span data-dcnode-id="2792" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="2747"><span data-dcnode-id="2791" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2749"><span data-dcnode-id="2790" instrument_node="">
</span><p data-dcnode-id="2787"><span data-dcnode-id="2788" style="font-weight: 400;"><span data-dcnode-id="2789" instrument_node="">It should be noted that holding a growth mindset does not mean having low standards – it means continually striving for excellence in all that you do.&nbsp;</span></span></p><p data-dcnode-id="2784"><span data-dcnode-id="2785" style="font-weight: 400;"><span data-dcnode-id="2786" instrument_node="">This also means not giving up when the pursuit of excellence takes time and effort, but continuing to learn.</span></span></p><p data-dcnode-id="2778"><span data-dcnode-id="2779" style="font-weight: 400;"><span data-dcnode-id="2783" instrument_node="">People with growth mindsets are ready to put in the work necessary to </span><a data-dcnode-id="2781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lifengoal.com/affirmations-to-help-you-achieve-your-goals/"><span data-dcnode-id="2782" instrument_node="">achieve their goals</span></a><span data-dcnode-id="2780" instrument_node=""> – they know that things will not be handed to them on a silver platter.&nbsp;</span></span></p><p data-dcnode-id="2775"><span data-dcnode-id="2776" style="font-weight: 400;"><span data-dcnode-id="2777" instrument_node="">They understand that getting where they want to go will take time, effort, and patience.</span></span></p><p data-dcnode-id="2772"><span data-dcnode-id="2773" style="font-weight: 400;"><span data-dcnode-id="2774" instrument_node="">“The secret of success is learning how to use pain and pleasure instead of having pain and pleasure use you.” -Tony Robbins</span></span></p><p data-dcnode-id="2766"><span data-dcnode-id="2767" style="font-weight: 400;"><span data-dcnode-id="2771" instrument_node="">Another thing about people with growth mindsets is that they don’t seek </span><a data-dcnode-id="2769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lifengoal.com/perfectionism/"><span data-dcnode-id="2770" instrument_node="">perfect</span></a><span data-dcnode-id="2768" instrument_node="">ion; they understand that nobody’s perfect (including themselves) and therefore no one can ever expect everything in life to go perfectly the way it is supposed to.&nbsp;</span></span></p><p data-dcnode-id="2763"><span data-dcnode-id="2764" style="font-weight: 400;"><span data-dcnode-id="2765" instrument_node="">If something doesn’t turn out the way they want it to, they don’t resort to giving up or blaming someone else – instead, they look for lessons to be learned and keep going.</span></span></p><p data-dcnode-id="2760"><span data-dcnode-id="2761" style="font-weight: 400;"><span data-dcnode-id="2762" instrument_node="">It takes much more energy and effort to maintain a competitive mindset than it does a growth mindset, as those who are “competitive” constantly feel that other people are getting ahead of them.</span></span></p><p data-dcnode-id="2757"><span data-dcnode-id="2758" style="font-weight: 400;"><span data-dcnode-id="2759" instrument_node="">Competitiveness breeds bitterness and hatred towards others rather than creativity, compassion, understanding, and motivation. It also prevents those with this view from being truly happy because all their time is spent comparing themselves to others instead of taking pride in their own accomplishments.&nbsp;&nbsp;</span></span></p><p data-dcnode-id="2754"><span data-dcnode-id="2755" style="font-weight: 400;"><span data-dcnode-id="2756" instrument_node="">On the other hand, people with a growth mindset see competition as beneficial because it helps them to set and achieve higher goals.&nbsp;</span></span></p><p data-dcnode-id="2751"><span data-dcnode-id="2752" style="font-weight: 400;"><span data-dcnode-id="2753" instrument_node="">They know that when someone else succeeds, they are one step closer to finding success themselves.</span></span></p><span data-dcnode-id="2750" instrument_node=""> </span></div><span data-dcnode-id="2748" instrument_node="">
</span></div><span data-dcnode-id="2746" instrument_node="">
</span></div><span data-dcnode-id="2744" instrument_node="">

</span><p data-dcnode-id="2722" style="text-align: center;"><a data-dcnode-id="2723" data-wplink-edit="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teachstarter.com/wp-content/uploads/2021/08/growth-mindset-1.jpg" rel="noopener" target="_blank"><span data-dcnode-id="2724" instrument_node="">Source</span></a></p><span data-dcnode-id="2721" instrument_node=""> </span></div><span data-dcnode-id="2719" instrument_node="">
</span></div><span data-dcnode-id="2717" instrument_node="">
</span></div><span data-dcnode-id="2715" instrument_node="">
</span><div class="elementor-element elementor-element-9462618 elementor-widget elementor-widget-text-editor" data-dcnode-id="2682" data-element_type="widget" data-id="9462618" data-widget_type="text-editor.default"><span data-dcnode-id="2714" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="2684"><span data-dcnode-id="2713" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2686"><span data-dcnode-id="2712" instrument_node="">
</span><p data-dcnode-id="2709"><span data-dcnode-id="2710" style="font-weight: 400;"><span data-dcnode-id="2711" instrument_node="">People with growth mindsets also see failure as a learning opportunity instead of an end.&nbsp;</span></span></p><p data-dcnode-id="2703"><span data-dcnode-id="2704" style="font-weight: 400;"><span data-dcnode-id="2708" instrument_node="">When faced with the possibility of failure, they push themselves to </span><a data-dcnode-id="2706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lifengoal.com/stronger-than-you-think/"><span data-dcnode-id="2707" instrument_node="">keep going and think</span></a><span data-dcnode-id="2705" instrument_node=""> about how to improve in the future rather than give up and wallow in self-pity.&nbsp;&nbsp;</span></span></p><p data-dcnode-id="2700"><span data-dcnode-id="2701" style="font-weight: 400;"><span data-dcnode-id="2702" instrument_node="">“The day you take complete responsibility for yourself, the day you stop making any excuses, that’s the day you start at the top.” -Will Smith</span></span></p><p data-dcnode-id="2697"><span data-dcnode-id="2698" style="font-weight: 400;"><span data-dcnode-id="2699" instrument_node="">There is nothing more fulfilling than achieving your dreams.&nbsp;</span></span></p><p data-dcnode-id="2694"><span data-dcnode-id="2695" style="font-weight: 400;"><span data-dcnode-id="2696" instrument_node="">If you want something so badly enough, there is no such thing as “impossible”. The only time success doesn’t happen is when you give up.</span></span></p><p data-dcnode-id="2691"><span data-dcnode-id="2692" style="font-weight: 400;"><span data-dcnode-id="2693" instrument_node="">There is no such thing as a “naturally gifted” person, either – that label is given to those who worked the hardest and never gave up.&nbsp;</span></span></p><p data-dcnode-id="2688"><span data-dcnode-id="2689" style="font-weight: 400;"><span data-dcnode-id="2690" instrument_node="">Achievement is not something reserved for only a few people&nbsp; privileged with natural talent; it’s reserved for those resilient and determined enough to keep going until they succeed.</span></span></p><span data-dcnode-id="2687" instrument_node=""> </span></div><span data-dcnode-id="2685" instrument_node="">

</span><p data-dcnode-id="2659" style="text-align: center;"><a data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teachstarter.com/wp-content/uploads/2021/08/growth-mindset-1.jpg" rel="noopener" target="_blank"><span data-dcnode-id="2661" instrument_node="">Source</span></a></p><span data-dcnode-id="2658" instrument_node=""> </span></div><span data-dcnode-id="2656" instrument_node="">
</span></div><span data-dcnode-id="2654" instrument_node="">
</span></div><span data-dcnode-id="2652" instrument_node="">
</span><div class="elementor-element elementor-element-7b69625 elementor-widget elementor-widget-text-editor" data-dcnode-id="2610" data-element_type="widget" data-id="7b69625" data-widget_type="text-editor.default"><span data-dcnode-id="2651" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="2612"><span data-dcnode-id="2650" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2614"><span data-dcnode-id="2649" instrument_node="">
</span><p data-dcnode-id="2646"><span data-dcnode-id="2647" style="font-weight: 400;"><span data-dcnode-id="2648" instrument_node="">People with growth mindsets understand this and use it as motivation to accomplish more than they ever thought possible.</span></span></p><p data-dcnode-id="2643"><span data-dcnode-id="2644" style="font-weight: 400;"><span data-dcnode-id="2645" instrument_node="">The number one factor of success in any field is your mindset – believing that you can achieve your goals instead of giving up at the first sign of adversity or seeing failure as an excuse to stop trying is what separates those who reach their dreams from those who don’t believe they can do it.</span></span></p><p data-dcnode-id="2640"><span data-dcnode-id="2641" style="font-weight: 400;"><span data-dcnode-id="2642" instrument_node="">It is important to remember that you can’t change your natural abilities, but you can always work on them and make yourself better in time if you keep trying.&nbsp;</span></span></p><p data-dcnode-id="2637"><span data-dcnode-id="2638" style="font-weight: 400;"><span data-dcnode-id="2639" instrument_node="">In the end, there are no shortcuts or special tricks to becoming successful – it’s a matter of deciding what’s more important to you: comfort or passion?&nbsp;</span></span></p><p data-dcnode-id="2634"><span data-dcnode-id="2635" style="font-weight: 400;"><span data-dcnode-id="2636" instrument_node="">The easier path or the challenging one?&nbsp;</span></span></p><p data-dcnode-id="2631"><span data-dcnode-id="2632" style="font-weight: 400;"><span data-dcnode-id="2633" instrument_node="">Giving up when things get tough or continuing to push forward even when all hope seems lost?</span></span></p><p data-dcnode-id="2625"><span data-dcnode-id="2626" style="font-weight: 400;"><span data-dcnode-id="2630" instrument_node="">Whether you become a superstar, world </span><a data-dcnode-id="2628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lifengoal.com/leadership/"><span data-dcnode-id="2629" instrument_node="">leader</span></a><span data-dcnode-id="2627" instrument_node="">, scientist who discovers cures for diseases, Nobel Prize winner, artist, entrepreneur who creates jobs and helps others succeed in life…</span></span></p><p data-dcnode-id="2622"><span data-dcnode-id="2623" style="font-weight: 400;"><span data-dcnode-id="2624" instrument_node="">Or simply becoming a regular person with fulfilling lives filled with love and joy…</span></span></p><p data-dcnode-id="2619"><span data-dcnode-id="2620" style="font-weight: 400;"><span data-dcnode-id="2621" instrument_node="">It doesn’t really matter because every single one of them has something in common.</span></span></p><p data-dcnode-id="2616"><span data-dcnode-id="2617" style="font-weight: 400;"><span data-dcnode-id="2618" instrument_node="">And that is…a growth mindset that allows them to see the positive side of every challenge and view failure as just another step closer to success.</span></span></p><span data-dcnode-id="2615" instrument_node=""> </span></div><span data-dcnode-id="2613" instrument_node="">

</span><p data-dcnode-id="2560"><span data-dcnode-id="2561" style="font-weight: 400;"><span data-dcnode-id="2562" instrument_node="">In this chapter, I will be comparing examples from growth mindset and fixed mindset.&nbsp;</span></span></p><p data-dcnode-id="2557"><span data-dcnode-id="2558" style="font-weight: 400;"><span data-dcnode-id="2559" instrument_node="">What do these two mean?&nbsp;</span></span></p><p data-dcnode-id="2554"><span data-dcnode-id="2555" style="font-weight: 400;"><span data-dcnode-id="2556" instrument_node="">How can we tell if someone has a growth or fixed mindset?&nbsp;</span></span></p><p data-dcnode-id="2551"><span data-dcnode-id="2552" style="font-weight: 400;"><span data-dcnode-id="2553" instrument_node="">And what is the difference between the two perspectives?&nbsp;</span></span></p><p data-dcnode-id="2548"><span data-dcnode-id="2549" style="font-weight: 400;"><span data-dcnode-id="2550" instrument_node="">Read on to find out!</span></span></p><span data-dcnode-id="2547" instrument_node=""> </span></div><span data-dcnode-id="2545" instrument_node="">

</span><h2 data-dcnode-id="2480"><b data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Examples of Growth Mindset vs Fixed Mindset</span></b></h2><p data-dcnode-id="2477"><span data-dcnode-id="2478" style="font-weight: 400;"><span data-dcnode-id="2479" instrument_node="">You probably can tell an example or two of growth mindset vs fixed mindset if you have read this far.</span></span></p><p data-dcnode-id="2474"><span data-dcnode-id="2475" style="font-weight: 400;"><span data-dcnode-id="2476" instrument_node="">But let’s get to the specifics, shall we?</span></span></p><p data-dcnode-id="2471"><span data-dcnode-id="2472" style="font-weight: 400;"><span data-dcnode-id="2473" instrument_node="">Let’s say there is somebody who has been running for years and is an experienced runner but is pretty slow compared to most people.&nbsp;</span></span></p><p data-dcnode-id="2468"><span data-dcnode-id="2469" style="font-weight: 400;"><span data-dcnode-id="2470" instrument_node="">Now let’s say that this runner wants to increase their speed by ten percent, so now they can run faster.&nbsp;</span></span></p><p data-dcnode-id="2465"><span data-dcnode-id="2466" style="font-weight: 400;"><span data-dcnode-id="2467" instrument_node="">If this person has a growth mindset then they will train hard and push themselves until they increase their speed by ten percent, but if they have a fixed mindset then they will not bother training because it’s too much of an effort and they’d rather just be slow than train hard to make themselves faster.</span></span></p><p data-dcnode-id="2462"><span data-dcnode-id="2463" style="font-weight: 400;"><span data-dcnode-id="2464" instrument_node="">Get it?</span></span></p><p data-dcnode-id="2459"><span data-dcnode-id="2460" style="font-weight: 400;"><span data-dcnode-id="2461" instrument_node="">Another example: a student is studying for a test.&nbsp;</span></span></p><p data-dcnode-id="2456"><span data-dcnode-id="2457" style="font-weight: 400;"><span data-dcnode-id="2458" instrument_node="">Let’s say this particular student has been studying very hard and knows the material inside out but still fails the test (not due to lack of effort, but because they actually know all of the answers).&nbsp;</span></span></p><p data-dcnode-id="2453"><span data-dcnode-id="2454" style="font-weight: 400;"><span data-dcnode-id="2455" instrument_node="">For somebody with a growth mindset, they will continue studying after that one test and not let it hold them back from receiving their desired grade.</span></span></p><p data-dcnode-id="2450"><span data-dcnode-id="2451" style="font-weight: 400;"><span data-dcnode-id="2452" instrument_node="">However, if this person is part of the fixed mindset group then they won’t study harder and instead try to ruin other tests so no one learns anything and all people receive bad grades (they would like for everybody to be as dumb as themselves).</span></span></p><p data-dcnode-id="2447"><span data-dcnode-id="2448" style="font-weight: 400;"><span data-dcnode-id="2449" instrument_node="">So which mindset do you have?</span></span></p><span data-dcnode-id="2446" instrument_node=""> </span></div><span data-dcnode-id="2444" instrument_node="">

</span><p data-dcnode-id="2405"><span data-dcnode-id="2406" style="font-weight: 400;"><span data-dcnode-id="2407" instrument_node="">It is probably easier to identify those who aren’t hard workers, have no desire to improve themselves, and are content being average for their entire lives.&nbsp;</span></span></p><p data-dcnode-id="2402"><span data-dcnode-id="2403" style="font-weight: 400;"><span data-dcnode-id="2404" instrument_node="">These people usually have a fixed mindset.&nbsp;</span></span></p><p data-dcnode-id="2399"><span data-dcnode-id="2400" style="font-weight: 400;"><span data-dcnode-id="2401" instrument_node="">People who constantly seek knowledge, strive to better themselves at the things they don’t know how to do yet, and will try until they get it right are most likely to have a growth mindset.</span></span></p><p data-dcnode-id="2396"><span data-dcnode-id="2397" style="font-weight: 400;"><span data-dcnode-id="2398" instrument_node="">If you’re somebody with a growth mindset then remember that every time you fail or come across something difficult, just remember that life is full of challenges that can either hold us back or push us forward depending on our attitude towards them.&nbsp;</span></span></p><p data-dcnode-id="2393"><span data-dcnode-id="2394" style="font-weight: 400;"><span data-dcnode-id="2395" instrument_node="">Remember not to let failure stop you from achieving your goals but instead learn from your mistakes because success lies in your ability to adapt to new situations while overcoming hardships along the way.</span></span></p><p data-dcnode-id="2387"><span data-dcnode-id="2388" style="font-weight: 400;"><span data-dcnode-id="2392" instrument_node="">If you’re somebody with a fixed </span><a data-dcnode-id="2390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lifengoal.com/meditation/"><span data-dcnode-id="2391" instrument_node="">mind</span></a><span data-dcnode-id="2389" instrument_node="">set then remember that by working hard and never giving up, you can accomplish anything you set your mind to.&nbsp;</span></span></p><p data-dcnode-id="2384"><span data-dcnode-id="2385" style="font-weight: 400;"><span data-dcnode-id="2386" instrument_node="">Remember that even the most advanced people in the world had to start somewhere before they reached where they are now. You will never learn or improve if you don’t put in any effort, so always give it your very best shot no matter what option you choose.</span></span></p><p data-dcnode-id="2381"><span data-dcnode-id="2382" style="font-weight: 400;"><span data-dcnode-id="2383" instrument_node="">Now that you’ve learned something new from these few examples, let’s move on to the research about it by Carol Dweck!</span></span></p><span data-dcnode-id="2380" instrument_node=""> </span></div><span data-dcnode-id="2378" instrument_node="">

</span><p data-dcnode-id="2325"><span data-dcnode-id="2326" style="font-weight: 400;"><span data-dcnode-id="2327" instrument_node="">We all want to be successful in life, but there’s a difference between wanting it and knowing how to get it.&nbsp;</span></span></p><p data-dcnode-id="2322"><span data-dcnode-id="2323" style="font-weight: 400;"><span data-dcnode-id="2324" instrument_node="">One of the most important things you can do for yourself is learn about growth mindset.&nbsp;</span></span></p><p data-dcnode-id="2319"><span data-dcnode-id="2320" style="font-weight: 400;"><span data-dcnode-id="2321" instrument_node="">Growth mindset is a way of thinking that will allow you to grow your future success exponentially.&nbsp;</span></span></p><p data-dcnode-id="2316"><span data-dcnode-id="2317" style="font-weight: 400;"><span data-dcnode-id="2318" instrument_node="">Here are some insights on what research shows about growth mindset.</span></span></p><p data-dcnode-id="2313"><span data-dcnode-id="2314" style="font-weight: 400;"><span data-dcnode-id="2315" instrument_node="">Read on.</span></span></p><span data-dcnode-id="2312" instrument_node=""> </span></div><span data-dcnode-id="2310" instrument_node="">

</span><div class="elementor-element elementor-element-eef20cf elementor-widget elementor-widget-text-editor" data-dcnode-id="2209" data-element_type="widget" data-id="eef20cf" data-widget_type="text-editor.default"><span data-dcnode-id="2250" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="2211"><span data-dcnode-id="2249" instrument_node="">

</span><h2 data-dcnode-id="2245"><b data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">What Research Shows about Growth Mindset</span></b></h2><p data-dcnode-id="2242"><span data-dcnode-id="2243" style="font-weight: 400;"><span data-dcnode-id="2244" instrument_node="">The term growth mindset is one that has recently received a surge in attention in the field of psychology — and for good reason.&nbsp;</span></span></p><p data-dcnode-id="2239"><span data-dcnode-id="2240" style="font-weight: 400;"><span data-dcnode-id="2241" instrument_node="">Research has shown that our mindset towards learning can have a significant impact on our long-term success.</span></span></p><p data-dcnode-id="2236"><span data-dcnode-id="2237" style="font-weight: 400;"><span data-dcnode-id="2238" instrument_node="">What does this mean?&nbsp;&nbsp;</span></span></p><p data-dcnode-id="2233"><span data-dcnode-id="2234" style="font-weight: 400;"><span data-dcnode-id="2235" instrument_node="">It means that when you think about yourself as someone who learns, who enjoys learning, and who is capable of improving with effort, you are more likely to succeed than if you believe otherwise.&nbsp;&nbsp;</span></span></p><p data-dcnode-id="2230"><span data-dcnode-id="2231" style="font-weight: 400;"><span data-dcnode-id="2232" instrument_node="">This idea was first introduced by Carol Dweck, a researcher at Stanford University, in her study on “mindset” — the expectation people have about their own intelligence.&nbsp;</span></span></p><p data-dcnode-id="2227"><span data-dcnode-id="2228" style="font-weight: 400;"><span data-dcnode-id="2229" instrument_node="">She asserts that these expectations can determine how students respond to challenges and setbacks in their learning process.</span></span></p><p data-dcnode-id="2224"><span data-dcnode-id="2225" style="font-weight: 400;"><span data-dcnode-id="2226" instrument_node="">After conducting a series of tests, Dweck took two groups of students and praised them for their intelligence and ability.</span></span></p><p data-dcnode-id="2221"><span data-dcnode-id="2222" style="font-weight: 400;"><span data-dcnode-id="2223" instrument_node="">This group was called the “entity” group.&nbsp;&nbsp;</span></span></p><p data-dcnode-id="2218"><span data-dcnode-id="2219" style="font-weight: 400;"><span data-dcnode-id="2220" instrument_node="">The other group was praised for their effort and hard work, called the “incremental” group.&nbsp;</span></span></p><p data-dcnode-id="2215"><span data-dcnode-id="2216" style="font-weight: 400;"><span data-dcnode-id="2217" instrument_node="">She then gave all participants a test designed to be difficult, but surmountable.</span></span></p><span data-dcnode-id="2214" instrument_node=""> </span></div><span data-dcnode-id="2212" instrument_node="">
</span></div><span data-dcnode-id="2210" instrument_node="">
</span></div><span data-dcnode-id="2208" instrument_node="">
</span><div class="elementor-element elementor-element-3ab7b34 elementor-widget elementor-widget-image" data-dcnode-id="2193" data-element_type="widget" data-id="3ab7b34" data-widget_type="image.default"><span data-dcnode-id="2207" instrument_node="">

</span><source data-dcnode-id="2203" sizes="(max-width: 552px) 100vw, 552px" srcset="https://lifengoal.com/wp-content/uploads/2021/10/dweck3.jpg.webp 552w, https://lifengoal.com/wp-content/uploads/2021/10/dweck3-228x300.jpg.webp 228w" type="image/webp"><span data-dcnode-id="2202" instrument_node="">
</span><img alt="dweck3" data-dcnode-id="2201" height="726" loading="lazy" sizes="(max-width: 552px) 100vw, 552px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lifengoal.com/wp-content/uploads/2021/10/dweck3.jpg&amp;raw" srcset="https://lifengoal.com/wp-content/uploads/2021/10/dweck3.jpg 552w, https://lifengoal.com/wp-content/uploads/2021/10/dweck3-228x300.jpg 228w" width="552"><span data-dcnode-id="2200" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2184"><span data-dcnode-id="2189" instrument_node="">
</span><p data-dcnode-id="2186" style="text-align: center;"><a data-dcnode-id="2187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brainpickings.org/2014/01/29/carol-dweck-mindset/" rel="noopener" target="_blank"><span data-dcnode-id="2188" instrument_node="">Source</span></a></p><span data-dcnode-id="2185" instrument_node=""> </span></div><span data-dcnode-id="2183" instrument_node="">
</span></div><span data-dcnode-id="2181" instrument_node="">
</span></div><span data-dcnode-id="2179" instrument_node="">
</span><div class="elementor-element elementor-element-20713a6 elementor-widget elementor-widget-text-editor" data-dcnode-id="2158" data-element_type="widget" data-id="20713a6" data-widget_type="text-editor.default"><span data-dcnode-id="2178" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="2160"><span data-dcnode-id="2177" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2162"><span data-dcnode-id="2176" instrument_node="">
</span><p data-dcnode-id="2173"><span data-dcnode-id="2174" style="font-weight: 400;"><span data-dcnode-id="2175" instrument_node="">The results were telling: after receiving an initial set of low scores on the test, the entity-praised kids became discouraged and performed worse than they had on the pretest, whereas the incremental-praised children remained and performed better than they had on the pretest.</span></span></p><p data-dcnode-id="2170"><span data-dcnode-id="2171" style="font-weight: 400;"><span data-dcnode-id="2172" instrument_node="">In a follow-up test, Dweck gave all the students a test that was designed to be much easier than the initial one.&nbsp;</span></span></p><p data-dcnode-id="2167"><span data-dcnode-id="2168" style="font-weight: 400;"><span data-dcnode-id="2169" instrument_node="">The “entity” group performed worse on this test as well, while the “incremental” group performed better–evidence of their increased motivation and determination to succeed when they were challenged by difficult material.</span></span></p><p data-dcnode-id="2164"><span data-dcnode-id="2165" style="font-weight: 400;"><span data-dcnode-id="2166" instrument_node="">In another study, Dweck divided 128 fifth graders into two groups based on their mindset: those who believe that intelligence is fixed, and those that believe that it can be developed.&nbsp;</span></span></p><span data-dcnode-id="2163" instrument_node=""> </span></div><span data-dcnode-id="2161" instrument_node="">
</span></div><span data-dcnode-id="2159" instrument_node="">
</span></div><span data-dcnode-id="2157" instrument_node="">

</span><div class="elementor-widget-container" data-dcnode-id="2131"><span data-dcnode-id="2139" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2133"><span data-dcnode-id="2138" instrument_node="">
</span><p data-dcnode-id="2135" style="text-align: center;"><a data-dcnode-id="2136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brainpickings.org/2014/01/29/carol-dweck-mindset/" rel="noopener" target="_blank"><span data-dcnode-id="2137" instrument_node="">Source</span></a></p><span data-dcnode-id="2134" instrument_node=""> </span></div><span data-dcnode-id="2132" instrument_node="">
</span></div><span data-dcnode-id="2130" instrument_node="">
</span></div><span data-dcnode-id="2128" instrument_node="">
</span><div class="elementor-element elementor-element-97bc8eb elementor-widget elementor-widget-text-editor" data-dcnode-id="2098" data-element_type="widget" data-id="97bc8eb" data-widget_type="text-editor.default"><span data-dcnode-id="2127" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="2100"><span data-dcnode-id="2126" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2102"><span data-dcnode-id="2125" instrument_node="">
</span><p data-dcnode-id="2122"><span data-dcnode-id="2123" style="font-weight: 400;"><span data-dcnode-id="2124" instrument_node="">She then asked them about their favorite subject in school and how they would respond if they received a lower grade on a personal essay or math exam.&nbsp;</span></span></p><p data-dcnode-id="2119"><span data-dcnode-id="2120" style="font-weight: 400;"><span data-dcnode-id="2121" instrument_node="">When followed up with these students three years later, Dweck found that those who believed intelligence to be unchangeable were performing worse than their counterparts in school and had more trouble switching from one task to another.</span></span></p><p data-dcnode-id="2116"><span data-dcnode-id="2117" style="font-weight: 400;"><span data-dcnode-id="2118" instrument_node="">“It’s like exercising a muscle.” Dr. Dweck notes that it isn’t always easy to adopt this type of growth mindset, but it can be done with effort and time.&nbsp;</span></span></p><p data-dcnode-id="2113"><span data-dcnode-id="2114" style="font-weight: 400;"><span data-dcnode-id="2115" instrument_node="">It’s like adopting any other new behavior – you’re probably never going to go from “not being able to do something” entirely into “being the absolute best” overnight, but if you keep at it, you’ll slowly notice that your abilities will improve.&nbsp;</span></span></p><p data-dcnode-id="2110"><span data-dcnode-id="2111" style="font-weight: 400;"><span data-dcnode-id="2112" instrument_node="">So if your fixed mindset is getting in the way of things you want to do or making you feel frustrated, try working on changing your own beliefs about yourself!</span></span></p><p data-dcnode-id="2107"><span data-dcnode-id="2108" style="font-weight: 400;"><span data-dcnode-id="2109" instrument_node="">Now, let’s move on to chapter 5 on how to cultivate your growth mindset!</span></span></p><p data-dcnode-id="2104"><span data-dcnode-id="2105" style="font-weight: 400;"><span data-dcnode-id="2106" instrument_node="">Keep reading!</span></span></p><span data-dcnode-id="2103" instrument_node=""> </span></div><span data-dcnode-id="2101" instrument_node="">

</span><p data-dcnode-id="2048"><span data-dcnode-id="2049" style="font-weight: 400;"><span data-dcnode-id="2050" instrument_node="">A growth mindset is about continuous improvement. It’s not just about intelligence and creativity, but rather the ability to learn from your mistakes and challenges in order to grow.&nbsp;</span></span></p><p data-dcnode-id="2045"><span data-dcnode-id="2046" style="font-weight: 400;"><span data-dcnode-id="2047" instrument_node="">In this chapter, we explore how cultivating a growth mindset can help you on your journey of personal development.</span></span></p><p data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">Keep reading.</span></p><span data-dcnode-id="2042" instrument_node=""> </span></div><span data-dcnode-id="2040" instrument_node="">

</span><h2 data-dcnode-id="1975"><b data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">How to Cultivate Growth Mindset</span></b></h2><p data-dcnode-id="1972"><span data-dcnode-id="1973" style="font-weight: 400;"><span data-dcnode-id="1974" instrument_node="">Can you imagine what you would do if you had no limits? Try to picture how different your life would be without them.</span></span></p><p data-dcnode-id="1969"><span data-dcnode-id="1970" style="font-weight: 400;"><span data-dcnode-id="1971" instrument_node="">What would you do if it were possible to become the very best at anything? What steps could one take to achieve this goal?</span></span></p><p data-dcnode-id="1966"><span data-dcnode-id="1967" style="font-weight: 400;"><span data-dcnode-id="1968" instrument_node="">The difference between those who live their lives with growth mindsets and those who live with fixed mindsets is a clear separation of these boundaries.&nbsp;</span></span></p><p data-dcnode-id="1963"><span data-dcnode-id="1964" style="font-weight: 400;"><span data-dcnode-id="1965" instrument_node="">The radical change in an individual’s mind when they adopt a growth mindset contributes extensively to the way they perceive the world around them, allowing for endless possibilities.</span></span></p><p data-dcnode-id="1960"><span data-dcnode-id="1961" style="font-weight: 400;"><span data-dcnode-id="1962" instrument_node="">So, what can we do to make these changes happen in our own lives?&nbsp;</span></span></p><p data-dcnode-id="1957"><span data-dcnode-id="1958" style="font-weight: 400;"><span data-dcnode-id="1959" instrument_node="">There are many small steps that anyone can take in order to improve their cognitive abilities and sharpen their skills.&nbsp;</span></span></p><p data-dcnode-id="1954"><span data-dcnode-id="1955" style="font-weight: 400;"><span data-dcnode-id="1956" instrument_node="">Here are a few of them:</span></span></p><h3 data-dcnode-id="1951"><b data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">1. Repetition can improve learning skills</span></b></h3><p data-dcnode-id="1948"><span data-dcnode-id="1949" style="font-weight: 400;"><span data-dcnode-id="1950" instrument_node="">One of the most crucial ways to stay on top is to have a well-trained mind. Repeating information over and over again allows for an easier recollection in times of need, which makes this process essential for building up long term memory.&nbsp;</span></span></p><p data-dcnode-id="1945"><span data-dcnode-id="1946" style="font-weight: 400;"><span data-dcnode-id="1947" instrument_node="">If you find yourself needing to memorize something important for an upcoming event, try listening to it several times throughout your day until it becomes a habit!</span></span></p><span data-dcnode-id="1944" instrument_node=""> </span></div><span data-dcnode-id="1942" instrument_node="">
</span></div><span data-dcnode-id="1940" instrument_node="">

</span><h3 data-dcnode-id="1903"><strong data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">2. Mind mapping/outlining helps you think more logically about information</span></strong></h3><p data-dcnode-id="1900"><span data-dcnode-id="1901" style="font-weight: 400;"><span data-dcnode-id="1902" instrument_node="">Sometimes we take in so much information that it is hard to process all at once, especially when dealing with a large amount of data.&nbsp;</span></span></p><p data-dcnode-id="1897"><span data-dcnode-id="1898" style="font-weight: 400;"><span data-dcnode-id="1899" instrument_node="">When faced with a lot of new concepts or ideas, use a mind map to group them together in categories and organize your thoughts.</span></span></p><span data-dcnode-id="1896" instrument_node=""> </span></div><span data-dcnode-id="1894" instrument_node="">

</span><p data-dcnode-id="1868" style="text-align: center;"><a data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.pinimg.com/736x/53/b7/e9/53b7e9759ae8d973421fb2daef72cc6f.jpg" rel="noopener" target="_blank"><span data-dcnode-id="1870" instrument_node="">Source</span></a></p><span data-dcnode-id="1867" instrument_node=""> </span></div><span data-dcnode-id="1865" instrument_node="">

</span><div class="elementor-widget-container" data-dcnode-id="1803"><span data-dcnode-id="1859" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1805"><span data-dcnode-id="1858" instrument_node="">
</span><h3 data-dcnode-id="1855"><b data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">3. Learning new skills is easier when you have a teacher or coach</span></b></h3><p data-dcnode-id="1852"><span data-dcnode-id="1853" style="font-weight: 400;"><span data-dcnode-id="1854" instrument_node="">If you want to develop new skills, it’s helpful to learn from someone who has mastered the art of the subject beforehand. Having an experienced guide can be very beneficial in helping you navigate through what you don’t know.</span></span></p><h3 data-dcnode-id="1849"><b data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">4. Consistency helps knowledge stick</span></b></h3><p data-dcnode-id="1846"><span data-dcnode-id="1847" style="font-weight: 400;"><span data-dcnode-id="1848" instrument_node="">To build up long term memory, it is best that we constantly reinforce information over time instead of cramming it all into our brains at once before moving on to newer concepts. This will allow for the absorption of knowledge within your mental framework for future use!</span></span></p><h3 data-dcnode-id="1843"><b data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">5. You are always learning something about yourself</span></b></h3><p data-dcnode-id="1840"><span data-dcnode-id="1841" style="font-weight: 400;"><span data-dcnode-id="1842" instrument_node="">Whether you know it or not, you are constantly learning about your own personal tendencies and behaviors. Taking time to reflect on these things can be quite useful when trying to learn the skills and abilities you want for yourself.</span></span></p><h3 data-dcnode-id="1837"><b data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">6. Forward thinking is important in making positive changes</span></b></h3><p data-dcnode-id="1834"><span data-dcnode-id="1835" style="font-weight: 400;"><span data-dcnode-id="1836" instrument_node="">It’s easy to get so caught up in the day-to-day that we forget where we’re going, which makes setting goals an essential asset for anyone who wants a well thought-out plan of action! Having a clear idea of where you want to end up will help keep your eyes on the prize, no matter how far away it may seem at times.</span></span></p><h3 data-dcnode-id="1831"><b data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">7. Be open to new experiences</span></b></h3><p data-dcnode-id="1828"><span data-dcnode-id="1829" style="font-weight: 400;"><span data-dcnode-id="1830" instrument_node="">In order to expand our knowledge base and explore all the possibilities the world has to offer, we need to be open-minded and receptive to everything around us. Try to make new friends with different backgrounds, learn more about cultures that are foreign to you, or engage in activities you’ve never tried before! You may find a new passion along the way.</span></span></p><h3 data-dcnode-id="1825"><b data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">8. Sometimes being too hard on yourself can get in your way of self development</span></b></h3><p data-dcnode-id="1819"><span data-dcnode-id="1820" style="font-weight: 400;"><span data-dcnode-id="1824" instrument_node="">Remember that no one is perfect–we all have good </span><a data-dcnode-id="1822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lifengoal.com/affirmations-after-a-bad-day/"><span data-dcnode-id="1823" instrument_node="">days and bad</span></a><span data-dcnode-id="1821" instrument_node=""> days. If at first something doesn’t come naturally or easily for you, don’t let it bring you down! It takes time and practice to develop certain abilities into skills that are useful for your own personal growth so try not to give up when things get difficult! Failure is just another opportunity to learn.</span></span></p><h3 data-dcnode-id="1816"><b data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">9. Keep an open mind</span></b></h3><p data-dcnode-id="1813"><span data-dcnode-id="1814" style="font-weight: 400;"><span data-dcnode-id="1815" instrument_node="">Try not to judge things before you fully understand them, especially in circumstances where your lack of information could lead you astray. Sometimes all it takes is a bit of curiosity and research before jumping to any conclusions so keep your mind open!</span></span></p><h3 data-dcnode-id="1810"><b data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">10. Not everything is final when it comes to learning</span></b></h3><p data-dcnode-id="1807"><span data-dcnode-id="1808" style="font-weight: 400;"><span data-dcnode-id="1809" instrument_node="">Just because something did not turn out the way you wanted doesn’t mean it’s all over for you! There are always second chances, multiple solutions, or alternative paths that may be available depending on the situation at hand–so don’t give up too easily! Find ways to improve yourself even if your initial attempt failed.</span></span></p><span data-dcnode-id="1806" instrument_node=""> </span></div><span data-dcnode-id="1804" instrument_node="">

</span><h2 data-dcnode-id="1677"><b data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">Extra Resources to Learn More about Growth Mindset</span></b></h2><p data-dcnode-id="1671"><span data-dcnode-id="1672" style="font-weight: 400;"><span data-dcnode-id="1676" instrument_node="">Learning a growth mindset is much easier when you have more resources to do so. In this article, I will be going through some of the most helpful materials which can help you to learn about how a growth mindset </span><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lifengoal.com/affirmations-for-success-at-work/"><span data-dcnode-id="1675" instrument_node="">works and how it affects your success</span></a><span data-dcnode-id="1673" instrument_node=""> in life.</span></span></p><h3 data-dcnode-id="1668"><b data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">1. A TED talk by Carol Dweck at Stanford University</span></b></h3><p data-dcnode-id="1665"><span data-dcnode-id="1666" style="font-weight: 400;"><span data-dcnode-id="1667" instrument_node="">There are many people who lead themselves into believing that innate talent determines everything rather than hard work – but they are wrong!&nbsp;</span></span></p><p data-dcnode-id="1662"><span data-dcnode-id="1663" style="font-weight: 400;"><span data-dcnode-id="1664" instrument_node="">This is what Carol has to say about her theory on how “Growth Mindset” overpowers “Fixed Mindset”.&nbsp;</span></span></p><p data-dcnode-id="1659"><span data-dcnode-id="1660" style="font-weight: 400;"><span data-dcnode-id="1661" instrument_node="">Through the use of examples and shared experiences, she helps us understand why having a fixed mindset would only hold yourself back.&nbsp;</span></span></p><p data-dcnode-id="1656"><span data-dcnode-id="1657" style="font-weight: 400;"><span data-dcnode-id="1658" instrument_node="">An especially notable quote from this Ted Talk is one where she exclaims “you are not a drop-of-water in the ocean” which, when translated to life, means that you are more than what your results are at.&nbsp;</span></span></p><p data-dcnode-id="1653"><span data-dcnode-id="1654" style="font-weight: 400;"><span data-dcnode-id="1655" instrument_node="">You are an individual with much potential!</span></span></p><span data-dcnode-id="1652" instrument_node=""> </span></div><span data-dcnode-id="1650" instrument_node="">

</span><h3 data-dcnode-id="1594"><b data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">2. The Mindset book by Carol Dweck herself</span></b></h3><p data-dcnode-id="1586"><span data-dcnode-id="1592" style="font-weight: 400;"><span data-dcnode-id="1593" instrument_node="">As you probably guessed, Dr. Dweck’s book is called </span></span><a data-dcnode-id="1589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Mindset-Psychology-Carol-S-Dweck/dp/0345472322/ref%3Dsr_1_1%3Fdchild%3D1%26keywords%3Dgrowth%2Bmindset%26qid%3D1633587175%26s%3Dbooks%26sr%3D1-1" rel="noopener" target="_blank"><span data-dcnode-id="1590" style="font-weight: 400;"><span data-dcnode-id="1591" instrument_node="">Mindset</span></span></a><span data-dcnode-id="1587" style="font-weight: 400;"><span data-dcnode-id="1588" instrument_node="">, which explains why people succeed or fail based on how they see themselves within society’s standards of success.&nbsp;</span></span></p><p data-dcnode-id="1583"><span data-dcnode-id="1584" style="font-weight: 400;"><span data-dcnode-id="1585" instrument_node="">There are many wonderful examples included in this edition of how they affect their children with either one type of mindset, and the results that follow. It is a wonderful read for anyone who wants to discover more about the growth mindset and its effects on us!</span></span></p><h3 data-dcnode-id="1580"><b data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">3. A TED talk by Matthew Syed</span></b></h3><p data-dcnode-id="1577"><span data-dcnode-id="1578" style="font-weight: 400;"><span data-dcnode-id="1579" instrument_node="">Perhaps one of the most famous videos giving insights on growth vs fixed mindset is this TED talk with journalist, author and table tennis champion Matthew Syed.&nbsp;</span></span></p><p data-dcnode-id="1574"><span data-dcnode-id="1575" style="font-weight: 400;"><span data-dcnode-id="1576" instrument_node="">His own experiences in sports helps him understand how we can improve ourselves through simply believing that we can get better, not necessarily work harder or discover some sort of magic formula.&nbsp;</span></span></p><p data-dcnode-id="1568"><span data-dcnode-id="1569" style="font-weight: 400;"><span data-dcnode-id="1573" instrument_node="">The most important part of having a growth mindset is our attitude towards failure and setbacks, turning something negative into something </span><a data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lifengoal.com/how-to-be-more-productive/"><span data-dcnode-id="1572" instrument_node="">productive</span></a><span data-dcnode-id="1570" instrument_node=""> and useful – which will help you grow more than any other way possible.</span></span></p><span data-dcnode-id="1567" instrument_node=""> </span></div><span data-dcnode-id="1565" instrument_node="">

</span><h2 data-dcnode-id="901"><b data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Top 21 Quotes on Growth Mindset</span></b></h2><div data-dcnode-id="817"><p data-dcnode-id="895"><span data-dcnode-id="896" style="font-weight: 400;"><span data-dcnode-id="900" instrument_node="">“It is hard to fail. But it is worse never to have tried to </span><a data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lifengoal.com/accepting-your-partner/"><span data-dcnode-id="899" instrument_node="">succeed.” – Theodore Roosevelt”I can accept</span></a><span data-dcnode-id="897" instrument_node=""> failure. Everyone fails at something. But I can’t accept not trying.” – Michael Jordan</span></span></p><p data-dcnode-id="892"><span data-dcnode-id="893" style="font-weight: 400;"><span data-dcnode-id="894" instrument_node="">Success is not an accident, success is a choice. – Stephen Curry</span></span></p><p data-dcnode-id="889"><span data-dcnode-id="890" style="font-weight: 400;"><span data-dcnode-id="891" instrument_node="">“Becoming is better than being” ― Carol Dweck</span></span></p><p data-dcnode-id="886"><span data-dcnode-id="887" style="font-weight: 400;"><span data-dcnode-id="888" instrument_node="">A person who never made a mistake never tried anything new. – Albert Einstein</span></span></p><p data-dcnode-id="880"><span data-dcnode-id="881" style="font-weight: 400;"><span data-dcnode-id="885" instrument_node="">“Why waste time proving over and over how great you are, when you could be getting better? Why hide deficiencies instead of overcoming them? Why look for friends or </span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lifengoal.com/affirmations-to-attract-a-specific-person/"><span data-dcnode-id="884" instrument_node="">partners</span></a><span data-dcnode-id="882" instrument_node=""> who will just shore up your self-esteem instead of ones who will also challenge you to grow? And why seek out the tried and true, instead of experiences that will stretch you? The passion for stretching yourself and sticking to it, even (or especially) when it’s not going well, is the hallmark of the growth mindset. This is the mindset that allows people to thrive during some of the most challenging times in their lives.” ― Carol S. Dweck</span></span></p><p data-dcnode-id="877"><span data-dcnode-id="878" style="font-weight: 400;"><span data-dcnode-id="879" instrument_node="">“Don’t worry about failure. Worry about the chances you miss when you don’t even try.” – Sherman Finesilver</span></span></p><p data-dcnode-id="874"><span data-dcnode-id="875" style="font-weight: 400;"><span data-dcnode-id="876" instrument_node="">“Picture your brain forming new connections as you meet the challenge and learn. Keep on going.” ― Carol Dweck</span></span></p><p data-dcnode-id="871"><span data-dcnode-id="872" style="font-weight: 400;"><span data-dcnode-id="873" instrument_node="">“I hated every minute of training, but I said, ‘Don’t quit. Suffer now and live the rest of your life as a champion.” – Muhammad Ali</span></span></p><p data-dcnode-id="868"><span data-dcnode-id="869" style="font-weight: 400;"><span data-dcnode-id="870" instrument_node="">“This is something I know for a fact: You have to work hardest for the things you love most.” ― Carol S. Dweck</span></span></p><p data-dcnode-id="865"><span data-dcnode-id="866" style="font-weight: 400;"><span data-dcnode-id="867" instrument_node="">There is no failure. Only feedback. – Robert Allen</span></span></p><p data-dcnode-id="860"><span data-dcnode-id="863" style="font-weight: 400;"><span data-dcnode-id="864" instrument_node="">“Mindset change is not about picking up a few pointers here and there. It’s about seeing things in a new way. When people…change to a growth mindset, they change from a judge-and-be-judged framework to a learn-and-help-learn framework. Their commitment is to growth, and growth takes plenty of time, effort, and mutual support.” ― Carol Dweck</span></span><span data-dcnode-id="861" style="font-weight: 400;"><span data-dcnode-id="862" instrument_node="">“Failure is so important. It is the ability to resist failure or use failure that often leads to greater success.” – J.K. Rowling</span></span></p><p data-dcnode-id="857"><span data-dcnode-id="858" style="font-weight: 400;"><span data-dcnode-id="859" instrument_node="">“Don’t tell me how talented you are. Tell me how hard you work” – Artur Rubenstein</span></span></p><p data-dcnode-id="854"><span data-dcnode-id="855" style="font-weight: 400;"><span data-dcnode-id="856" instrument_node="">“Effort is grossly underrated.” – Gary Vaynerchuk</span></span></p><p data-dcnode-id="851"><span data-dcnode-id="852" style="font-weight: 400;"><span data-dcnode-id="853" instrument_node="">“I believe ability can get you to the top,” says coach John Wooden, “but it takes character to keep you there.… It’s so easy to … begin thinking you can just ‘turn it on’ automatically, without proper preparation. It takes real character to keep working as hard or even harder once you’re there. When you read about an athlete or team that wins over and over and over, remind yourself, ‘More than ability, they have character.’” ― Carol Dweck</span></span></p><p data-dcnode-id="848"><span data-dcnode-id="849" style="font-weight: 400;"><span data-dcnode-id="850" instrument_node="">Genius is one percent inspiration and ninety-nine percent perspiration. – Thomas Edison</span></span></p><p data-dcnode-id="845"><span data-dcnode-id="846" style="font-weight: 400;"><span data-dcnode-id="847" instrument_node="">“In the fixed mindset, everything is about the outcome. If you fail—or if you’re not the best—it’s all been wasted. The growth mindset allows people to value what they’re doing regardless of the outcome . They’re tackling problems, charting new courses, and working on important issues. Maybe they haven’t found the cure for cancer, but the search was deeply meaningful.” ― Carol S. Dweck</span></span></p><p data-dcnode-id="842"><span data-dcnode-id="843" style="font-weight: 400;"><span data-dcnode-id="844" instrument_node="">Nothing is impossible. The word itself says ‘I’m possible!’ – Audrey Hepburn</span></span></p><p data-dcnode-id="839"><span data-dcnode-id="840" style="font-weight: 400;"><span data-dcnode-id="841" instrument_node="">“Many growth-minded people didn’t even plan to go to the top. They got there as a result of doing what they love. It’s ironic: The top is where the fixed-mindset people hunger to be, but it’s where many growth-minded people arrive as a by-product of their enthusiasm for what they do.” ― Carol S. Dweck</span></span></p><h2 data-dcnode-id="836"><b data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Conclusion</span></b></h2><p data-dcnode-id="833"><span data-dcnode-id="834" style="font-weight: 400;"><span data-dcnode-id="835" instrument_node="">The bottom line is that a growth mindset isn’t just for kids.&nbsp;</span></span></p><p data-dcnode-id="830"><span data-dcnode-id="831" style="font-weight: 400;"><span data-dcnode-id="832" instrument_node="">It’s a way of thinking, and it can be applied in many different areas of your life to achieve success.&nbsp;</span></span></p><p data-dcnode-id="827"><span data-dcnode-id="828" style="font-weight: 400;"><span data-dcnode-id="829" instrument_node="">And the best part about having a growth mindset?&nbsp;</span></span></p><p data-dcnode-id="824"><span data-dcnode-id="825" style="font-weight: 400;"><span data-dcnode-id="826" instrument_node="">You never have to give up on yourself or stop learning ever again!&nbsp;</span></span></p><p data-dcnode-id="821"><span data-dcnode-id="822" style="font-weight: 400;"><span data-dcnode-id="823" instrument_node="">What are some ways you’ve grown in your own personal development journey with the help of this article?&nbsp;</span></span></p><p data-dcnode-id="818"><span data-dcnode-id="819" style="font-weight: 400;"><span data-dcnode-id="820" instrument_node="">We’d love to hear from you in the comments below!</span></span></p></div><span data-dcnode-id="816" instrument_node=""> </span></div><span data-dcnode-id="814" instrument_node="">
