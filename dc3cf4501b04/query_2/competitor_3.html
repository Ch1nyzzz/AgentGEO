</span></a></div></figure></div><p data-dcnode-id="3011"><span data-dcnode-id="3042" instrument_node="">Reports of optimism and subjective well-being are positively correlated but display low correlation (</span><i data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">r</span></i><span data-dcnode-id="3039" instrument_node=""> = 0.23, </span><i data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">p</span></i><span data-dcnode-id="3036" instrument_node=""> &lt; 0.01). Furthermore, optimism is related to both negative affect (</span><i data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">r</span></i><span data-dcnode-id="3033" instrument_node=""> = −0.21, </span><i data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">p</span></i><span data-dcnode-id="3030" instrument_node=""> &lt; 0.01) and positive affect (</span><i data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">r</span></i><span data-dcnode-id="3027" instrument_node=""> = 0.32, </span><i data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">p</span></i><span data-dcnode-id="3024" instrument_node=""> &lt; 0.01) but also show a low correlation. Similarly, optimism was found to be significantly related to resilience (</span><i data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">r</span></i><span data-dcnode-id="3021" instrument_node=""> = 0.33, </span><i data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">p</span></i><span data-dcnode-id="3018" instrument_node=""> &lt; 0.01) as well as resilience and subjective well-being (</span><i data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">r</span></i><span data-dcnode-id="3015" instrument_node=""> = 0.33, </span><i data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">p</span></i><span data-dcnode-id="3012" instrument_node=""> &lt; 0.01). These findings partially support the hypothesis claiming that correlational pathways exist among the variables of the study.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3009" id="Sec8"><span data-dcnode-id="3010" instrument_node="">Mediation Analyses</span></h3><p data-dcnode-id="3001"><span data-dcnode-id="3008" instrument_node="">A simple mediation analysis was performed using ordinary least squares path analysis revealed that Optimism predicts Well-Being through Resilience. Hayes’ (</span><a aria-label="Reference 2012" data-dcnode-id="3006" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d212967077e775" title="Hayes, A. F. (2012). PROCESS: A versatile computational tool for observed variable mediation, moderation, and conditional process modeling [White paper]. Retrieved from 
http://www.afhayes.com/public/process2012.pdf


"><span data-dcnode-id="3007" instrument_node="">2012</span></a><span data-dcnode-id="3005" instrument_node="">) PROCESS Macro for SPSS model 4 was utilized in performing the analyses. Table </span><a data-dcnode-id="3003" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="3004" instrument_node="">2</span></a><span data-dcnode-id="3002" instrument_node=""> presents the total, direct and indirect effects of the mediation model.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2986" data-test="inline-table" id="table-2"><figure data-dcnode-id="2987"><figcaption class="c-article-table__figcaption" data-dcnode-id="2998"><b data-dcnode-id="2999" data-test="table-caption" id="Tab2"><span data-dcnode-id="3000" instrument_node="">Table 2 Results of mediation analyses for optimism as predictors of the three components of subjective well being as mediated by resilience</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2988"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="2989" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12144-020-00806-0/tables/2" rel="nofollow"><span data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2990" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2991" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2992" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2995" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2994" fill-rule="evenodd"></path><span data-dcnode-id="2993" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2960"><span data-dcnode-id="2985" instrument_node="">Three mediation models were analyzed, to understand the research analysis. The first model (Table </span><a data-dcnode-id="2983" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2984" instrument_node="">2</span></a><span data-dcnode-id="2982" instrument_node="">) is the mediation analysis for Optimism as Predictors of Life Satisfaction through Resilience, path a analysis show that Optimism of adolescents predicts Resilience (</span><i data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">β = 1.52**, p &lt; 0.01</span></i><span data-dcnode-id="2979" instrument_node="">) which fulfills a requisite criteria in the mediation. Path b revealed a significant association between Resilience and Life Satisfaction (</span><i data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">β = 0.14**, p &lt; 0.01</span></i><span data-dcnode-id="2976" instrument_node="">) while the c’ conveyed a significant direct effect between Optimism and Life Satisfaction (</span><i data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">β = 0.19*, p &lt; 0.05</span></i><span data-dcnode-id="2973" instrument_node="">). Path c reported a significant total effect between Optimism and Life Satisfaction while computing for the interaction of direct and indirect effect (</span><i data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">β = 0.40**, p &lt; 0.01</span></i><span data-dcnode-id="2970" instrument_node="">). Analysis displayed significant indirect effect (Table </span><a data-dcnode-id="2968" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="2969" instrument_node="">3</span></a><span data-dcnode-id="2967" instrument_node="">) computing for bootstrap (</span><i data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">β = 0.21, 95% CI [0.12,0.31]</span></i><span data-dcnode-id="2964" instrument_node="">). There was a decreased in the regression coefficient of c’ in considering Resilience. This explains that Resilience is a partial mediator on the relationship between Optimism and Life Satisfaction as illustrated in Fig.&nbsp;</span><a data-dcnode-id="2962" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2963" instrument_node="">1</span></a><span data-dcnode-id="2961" instrument_node="">.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2945" data-test="inline-table" id="table-3"><figure data-dcnode-id="2946"><figcaption class="c-article-table__figcaption" data-dcnode-id="2957"><b data-dcnode-id="2958" data-test="table-caption" id="Tab3"><span data-dcnode-id="2959" instrument_node="">Table 3 Bootstrap confidence intervals of indirect effects of optimism on the three components of subjective well being as mediated by resilience</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2947"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="2948" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12144-020-00806-0/tables/3" rel="nofollow"><span data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2949" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2950" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2951" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2954" instrument_node="">

</span></a></div></figure></div><p data-dcnode-id="2892"><span data-dcnode-id="2917" instrument_node="">The second model was the Mediation Analyses for Optimism as Predictors of General Negative Affect through Resilience (Table </span><a data-dcnode-id="2915" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2916" instrument_node="">2</span></a><span data-dcnode-id="2914" instrument_node="">). Path a analysis show that Optimism of adolescents predicts Resilience (</span><i data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">β = 1.52**, p &lt; 0.01</span></i><span data-dcnode-id="2911" instrument_node="">) which fulfills a requisite criteria in the mediation. Path b revealed a significant association between Resilience and General Negative Affect (</span><i data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">β = −0.09*, p &lt; 0.05</span></i><span data-dcnode-id="2908" instrument_node="">) while the c’ conveyed a significant direct effect between Optimism and General Negative Affect (</span><i data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">β = −0.30*, p &lt; 0.05</span></i><span data-dcnode-id="2905" instrument_node="">). Path c reported a significant total effect between Optimism and General Negative Affect while computing for the interaction of direct and indirect effect (</span><i data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">β = −0.43**, p &lt; 0.01</span></i><span data-dcnode-id="2902" instrument_node="">). Analysis displayed significant indirect effect (Table </span><a data-dcnode-id="2900" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="2901" instrument_node="">3</span></a><span data-dcnode-id="2899" instrument_node="">) computing for bootstrap (</span><i data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">β = −0.141, 95% CI [−0.28, −0.015]</span></i><span data-dcnode-id="2896" instrument_node="">). There was a decreased in the regression coefficient of c’ in considering Resilience. This explains that Resilience is a partial mediator on the relationship between Optimism and General Negative Affect as illustrated in Fig.&nbsp;</span><a data-dcnode-id="2894" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2895" instrument_node="">2</span></a><span data-dcnode-id="2893" instrument_node="">.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2865" data-test="figure" data-title="Fig. 2" id="figure-2"><figure data-dcnode-id="2866"><figcaption data-dcnode-id="2889"><b class="c-article-section__figure-caption" data-dcnode-id="2890" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="2891" instrument_node="">Fig. 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2877"><div class="c-article-section__figure-item" data-dcnode-id="2884"><a class="c-article-section__figure-link" data-dcnode-id="2885" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12144-020-00806-0/figures/2" rel="nofollow"><picture data-dcnode-id="2886"><source data-dcnode-id="2888" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12144-020-00806-0/MediaObjects/12144_2020_806_Fig2_HTML.png?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="2887" height="172" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12144-020-00806-0/MediaObjects/12144_2020_806_Fig2_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article- ><span data-dcnode-id="2843" instrument_node="">). There was a decreased in the regression coefficient of c’ in considering Resilience. This explains that Resilience is a partial mediator on the relationship between Optimism and General Positive Affect as illustrated in Fig.&nbsp;</span><a data-dcnode-id="2841" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="2842" instrument_node="">3</span></a><span data-dcnode-id="2840" instrument_node="">.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2812" data-test="figure" data-title="Fig. 3" id="figure-3"><figure data-dcnode-id="2813"><figcaption data-dcnode-id="2836"><b class="c-article-section__figure-caption" data-dcnode-id="2837" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="2838" instrument_node="">Fig. 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2824"><div class="c-article-section__figure-item" data-dcnode-id="2831"><a class="c-article-section__figure-link" data-dcnode-id="2832" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12144-020-00806-0/figures/3" rel="nofollow"><picture data-dcnode-id="2833"><source data-dcnode-id="2835" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12144-020-00806-0/MediaObjects/12144_2020_806_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="2834" height="172" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12144-020-00806-0/MediaObjects/12144_2020_806_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2825" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="2826"><span data-dcnode-id="2830" instrument_node="">Mediation model of resilience mediating the relationship of optimism and General Positive Affect. </span><i data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">Note</span></i><span data-dcnode-id="2827" instrument_node="">: ** path is significant at &lt;.01 level</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2814"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="2815" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12144-020-00806-0/figures/3" rel="nofollow"><span data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2816" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2817" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2818" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2821" instrument_node="">

</span></a></div></figure></div></div></div></section><section data-dcnode-id="2750" data-title="Discussion"><div class="c-article-section" data-dcnode-id="2751" id="Sec9-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2807" id="Sec9"><span data-dcnode-id="2808" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="2752" id="Sec9-content"><p data-dcnode-id="2802"><span data-dcnode-id="2806" instrument_node="">The primary goal of the study was to examine how emerging adult’s dispositional optimism generates pathways to subjective well-being through resilience. It was revealed in the results that resilience act as a mediator between optimism and subjective well-being. These results support various studies implying that optimism is significantly linked to subjective well-being mediated by resilience. The results are consistent with the results of Carver et al. (</span><a aria-label="Reference 2010" data-dcnode-id="2804" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d212967077e1055" title="Carver, C. S., Scheier, M. F., &amp; Segerstrom, S. C. (2010). Optimism. Clinical Psychology Review, 30(7), 879–889. 
https://doi.org/10.1016/j.cpr.2010.01.006

."><span data-dcnode-id="2805" instrument_node="">2010</span></a><span data-dcnode-id="2803" instrument_node="">), optimism is a positive psychological quality thinking that things will get better.</span></p><p data-dcnode-id="2785"><span data-dcnode-id="2801" instrument_node="">The findings of the study suggest that optimism is positively related to subjective well-being. At the same time, the mediation of resilience to optimism and subjective well-being was also found, which was also found in in Carver et al. (</span><a aria-label="Reference 2010" data-dcnode-id="2799" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d212967077e1061" title="Carver, C. S., Scheier, M. F., &amp; Segerstrom, S. C. (2010). Optimism. Clinical Psychology Review, 30(7), 879–889. 
https://doi.org/10.1016/j.cpr.2010.01.006

."><span data-dcnode-id="2800" instrument_node="">2010</span></a><span data-dcnode-id="2798" instrument_node="">)</span><b data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">.</span></b><span data-dcnode-id="2795" instrument_node=""> Moreover, optimism and resilience have a significant relationship and are linked with each other in adverse events. These results are consistent with the studies of Carver et al. (</span><a aria-label="Reference 2010" data-dcnode-id="2793" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d212967077e1067" title="Carver, C. S., Scheier, M. F., &amp; Segerstrom, S. C. (2010). Optimism. Clinical Psychology Review, 30(7), 879–889. 
https://doi.org/10.1016/j.cpr.2010.01.006

."><span data-dcnode-id="2794" instrument_node="">2010</span></a><span data-dcnode-id="2792" instrument_node="">), Tusaie-Mumford (</span><a aria-label="Reference 2001" data-dcnode-id="2790" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d212967077e1070" title="Tusaie-Mumford, K. (2001). Psychosocial resilience in rural adolescents: Optimism, perceived social support and gender differences. University of Pittsburgh."><span data-dcnode-id="2791" instrument_node="">2001</span></a><span data-dcnode-id="2789" instrument_node="">), and Bonanno and Bonanno (</span><a aria-label="Reference 2005" data-dcnode-id="2787" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d212967077e1073" title="Bonanno, G. A., &amp; Bonanno, G. A. (2005). Current directions in psychological science resilience in the face of potential trauma. 1–5. 
https://doi.org/10.1111/j.0963-7214.2005.00347.x

."><span data-dcnode-id="2788" instrument_node="">2005</span></a><span data-dcnode-id="2786" instrument_node="">).</span></p><p data-dcnode-id="2759"><span data-dcnode-id="2784" instrument_node="">Furthermore, findings of the study revealed that optimism and resilience are significant predictors of subjective well-being, which is also similar with the study of He et al. (</span><a aria-label="Reference 2013" data-dcnode-id="2782" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d212967077e1079" title="He, F., Cao, R., Feng, Z., Guan, H., &amp; Peng, J. (2013). The impacts of dispositional optimism and psychological resilience on the subjective well-being of burn patients: A structural equation modelling analysis. PLoS ONE, 8(12), 8–12. 
https://doi.org/10.1371/journal.pone.0082939

."><span data-dcnode-id="2783" instrument_node="">2013</span></a><span data-dcnode-id="2781" instrument_node="">). The present study found that resilience partially mediated the relationship between optimism and shows greater life satisfaction, higher positive affect, and lower negative affect. These results are also comparable with the study of Bajaj and Pande (</span><a aria-label="Reference 2016" data-dcnode-id="2779" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d212967077e1082" title="Bajaj, B., &amp; Pande, N. (2016). Mediating role of resilience in the impact of mindfulness on life satisfaction and affect as indices of subjective well-being. PAID, 93, 63–67. 
https://doi.org/10.1016/j.paid.2015.09.005

."><span data-dcnode-id="2780" instrument_node="">2016</span></a><span data-dcnode-id="2778" instrument_node="">). Based on the results of this study, emerging adults with high optimism have a positive outlook in life and they strongly believe that good things will happen in the future. They are convinced that the current situation is not permanent and manageable thus adversity will certainly pass. The present study highlights that optimism and resilience are important components of subjective well-being. These results provide possible explanations for why subjective well-being buffers against stresses in life and facilitates thriving. It is comparable to Lazarus’s (</span><a aria-label="Reference 1991" data-dcnode-id="2776" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d212967077e1085" title="Lazarus, R. S. (1991). Progress on a cognitive-motivational-relational theory of emotion. American Psychologist, 46(8), 819–834. 
https://doi.org/10.1037/0003-066X.46.8.819

."><span data-dcnode-id="2777" instrument_node="">1991</span></a><span data-dcnode-id="2775" instrument_node="">) theory of coping, a positive appraisal style provided by high life satisfaction. In his theory, emerging adults who show high life satisfaction possess positive outlook in life and are likely to view stressful life events in more positive ways and experience positive emotional responses, which leads them to display more effective coping behaviors and simply manage difficulty. As such It was reported that school-related social support has a direct effect on school-related stress and an indirect effect on global health, with higher perceived support predicting lower levels of stress and higher global health (Garc et al. </span><a aria-label="Reference 2013" data-dcnode-id="2773" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d212967077e1088" title="Garc, I., Rivera, F., &amp; Moreno, C. (2013). Personality and social psychology school context and health in adolescence: The role of sense of coherence. 
https://doi.org/10.1111/sjop.12041

."><span data-dcnode-id="2774" instrument_node="">2013</span></a><span data-dcnode-id="2772" instrument_node="">) Low levels of support from classmates are associated with higher levels of depression, social anxiety, lower levels of self-esteem (De Wit </span><a aria-label="Reference 2011" data-dcnode-id="2770" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d212967077e1091" title="De Wit, D. J. (2011). Perceptions of declining classmate and teacher support following the transition to high school: potential correlates of increasing student mental health difficulties. Psychology in the Schools, 48(6), 556–572. 
https://doi.org/10.1002/pits

."><span data-dcnode-id="2771" instrument_node="">2011</span></a><span data-dcnode-id="2769" instrument_node="">) and higher risk of emotional and conduct problems (Noam et al. </span><a aria-label="Reference 2014" data-dcnode-id="2767" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d212967077e1095" title="Noam, G., Oppedal, B., &amp; Idsoe, T. (2014). Mental health problems and school outcomes among immigrant and non-immigrant early adolescents in Norway. School Mental Health, 6(4), 279–293. 
https://doi.org/10.1007/s12310-014-9129-5

."><span data-dcnode-id="2768" instrument_node="">2014</span></a><span data-dcnode-id="2766" instrument_node="">) On the other hand, high levels of perceived school-related social support may act as a protective factor on adolescents from engaging in risk-taking health related behaviors particularly prohibited use of substance such as cigarette smoking, marijuana use and alcohol intoxication, (Hargreaves </span><a aria-label="Reference 2012" data-dcnode-id="2764" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d212967077e1098" title="Hargreaves, D. (2012). Country-level correlations between school experience and health behaviour: the health. Archives of Disease in Childhood, 97(Suppl 1), 63–64."><span data-dcnode-id="2765" instrument_node="">2012</span></a><span data-dcnode-id="2763" instrument_node="">; Mcneely and Falci </span><a aria-label="Reference 2004" data-dcnode-id="2761" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d212967077e1101" title="Mcneely, C., &amp; Falci, C. (2004). School connectedness and the transition into and out of health-risk behavior among adolescents: A comparison. Journal of School Health, 74(7), 284–292."><span data-dcnode-id="2762" instrument_node="">2004</span></a><span data-dcnode-id="2760" instrument_node="">).</span></p><p data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">In other words, having a positive outlook of the future is an important source of one’s ability to bounce back from adversity, thus, bouncing back from adversity suggest higher subjective well-being which implies that optimistic emerging adults tend to be more resilient which in turn lead to a higher subjective well-being. Thus, resilience can explain how optimistic emerging adults have better subjective well-being. In this light, emerging adults who are thinking positive about the future suggest higher life satisfaction and amass positive emotionality than negative emotionality and explains their capacity to recover quickly from adversity.</span></p><p data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">This study would be better interpreted in context of its limitations. The extent of generalizability of the study findings may be only in the context of the population included which are of Filipino university students. It is of question still however how the found relationships may be seen for other emerging adults that are not in a university setting.</span></p><p data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">Programs such as these promote the development of psychological strengths such as optimism and adaptability to increase resiliency and decrease the occurrence of negative psychological outcomes or stressful experiences. By focusing on intervention strategies on resilience, mental health practitioners may increase the frequency to employ healthy coping efforts and enhance feelings of efficacy regarding coping, as a means to maintain and enhance well-being. Researchers are encouraged to explore other possible constructs such as, social support, hope, and self-regulation, that may play an integral part to determine resilience. Moreover, it is also recommended to test the model in a special population to further understand its clinical utility in terms of developing possible programs and interventions. Another recommendation is a possible research on the topic and utilize a bigger sample size to increase representativeness and generalizability. Also, adapting a longitudinal design is recommended to see the development of the three variables across time, as well as using a qualitative design to explore possible phenomena and cases. Finally, adapting experimental designs would enable future researchers to establish causal relationships among optimism, resilience, and subjective well-being.</span></p></div></div></section><section data-dcnode-id="2740" data-title="Conclusions"><div class="c-article-section" data-dcnode-id="2741" id="Sec10-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2748" id="Sec10"><span data-dcnode-id="2749" instrument_node="">Conclusions</span></h2><div class="c-article-section__content" data-dcnode-id="2742" id="Sec10-content"><p data-dcnode-id="2743"><span data-dcnode-id="2747" instrument_node="">The results of this study indicate that optimism is a powerful predictor of subjective well-being and resilience among emerging adults. More importantly resilience is a mediator on the relation of optimism and subjective well-being. In summary, the current study confirmed that optimism and resilience are predictors of subjective well-being. Additionally, resilience was identified as a partial mediator of the link between optimism and subjective well-being. These findings offer a theoretically insightful pathway by which optimism is related to subjective well-being through resilience. These findings also generate some unique clinical implications like resilience-based programs that may aid emerging adults in coping efforts, which in turn should improve subjective well-being. Galante et al. (</span><a aria-label="Reference 2017" data-dcnode-id="2745" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d212967077e1122" title="Galante, J., Dufour, G., Vainre, M., Wagner, A. P., Stochl, J., Benton, A., et al. (2017). A mindfulness-based intervention to increase resilience to stress in university students (the Mindful Student Study ): a pragmatic randomised controlled trial. Lancet Public Health, 2667(17), 1–10. 
https://doi.org/10.1016/S2468-2667(17)30231-1

."><span data-dcnode-id="2746" instrument_node="">2017</span></a><span data-dcnode-id="2744" instrument_node="">) suggests proposing mindfulness-based interventions to increase resilience. Apart from other mental health services, the latter could also be a useful addition to clinical interventions.</span></p></div></div></section><span data-dcnode-id="2739" instrument_node="">
