</span><meta content="Recent researches established the effect of optimism on subjective well-being. In the present study, the author attempts to extend and fill in gaps from the previous literature by investigating the potential mediating role of resilience in the relationship between optimism and subjective well-being. This study hypothesized the mediation of resilience between optimism and subjective well-being. This was tested by examining the responses of 300 first year college students on administered questionnaires. Using mediation analysis, the results revealed that all paths were found to be significant; optimism has indirect effects on the three components of subjective well-being as mediated by resilience. Although resilience and indirect effect were found to be significant, resilience only partially mediated the relationship. The results highlights the role of resilience in subjective well-being, exerting its beneficial effects. Considerations for further research are also discussed." data-dcnode-id="4066" name="dc.description"><span data-dcnode-id="4065" instrument_node="">

</span><meta content="Recent researches established the effect of optimism on subjective well-being. In the present study, the author attempts to extend and fill in gaps from the previous literature by investigating the potential mediating role of resilience in the relationship between optimism and subjective well-being. This study hypothesized the mediation of resilience between optimism and subjective well-being. This was tested by examining the responses of 300 first year college students on administered questionnaires. Using mediation analysis, the results revealed that all paths were found to be significant; optimism has indirect effects on the three components of subjective well-being as mediated by resilience. Although resilience and indirect effect were found to be significant, resilience only partially mediated the relationship. The results highlights the role of resilience in subjective well-being, exerting its beneficial effects. Considerations for further research are also discussed." data-dcnode-id="3822" property="og:description"><span data-dcnode-id="3821" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="1473" data-track-component="article body"><span data-dcnode-id="3407" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="3400" data-gtm-vis-first-on-screen-50443292_562="802" data-gtm-vis-first-on-screen-50443292_563="802" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="802" data-gtm-vis-recent-on-screen-50443292_563="802" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="3401" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3405" id="Abs1"><span data-dcnode-id="3406" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="3402" id="Abs1-content"><p data-dcnode-id="3403"><span data-dcnode-id="3404" instrument_node="">Recent researches established the effect of optimism on subjective well-being. In the present study, the author attempts to extend and fill in gaps from the previous literature by investigating the potential mediating role of resilience in the relationship between optimism and subjective well-being. This study hypothesized the mediation of resilience between optimism and subjective well-being. This was tested by examining the responses of 300 first year college students on administered questionnaires. Using mediation analysis, the results revealed that all paths were found to be significant; optimism has indirect effects on the three components of subjective well-being as mediated by resilience. Although resilience and indirect effect were found to be significant, resilience only partially mediated the relationship. The results highlights the role of resilience in subjective well-being, exerting its beneficial effects. Considerations for further research are also discussed.</span></p></div></div></section><span data-dcnode-id="3399" instrument_node="">
</span><section data-dcnode-id="3134" data-gtm-vis-first-on-screen-50443292_562="802" data-gtm-vis-first-on-screen-50443292_563="802" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="802" data-gtm-vis-recent-on-screen-50443292_563="802" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="3135" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3397" id="Sec1"><span data-dcnode-id="3398" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="3136" id="Sec1-content"><p data-dcnode-id="3377"><span data-dcnode-id="3396" instrument_node="">Emerging adulthood and its theory has been known to be used in various fields of study since its conception more than two decades ago. It was proposed to identify new conception of developmental period along with demographic differences that takes place around the age 18–25. Emerging adulthood ends the period of rapid maturation and change (Arnett et al. </span><a aria-label="Reference 2014" data-dcnode-id="3394" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d212967077e227" title="Arnett, J. J., Žukauskiene, R., &amp; Sugimura, K. (2014). The new life stage of emerging adulthood at ages 18-29 years: Implications for mental health. The Lancet Psychiatry, 1(7), 569–576. 
https://doi.org/10.1016/S2215-0366(14)00080-7

."><span data-dcnode-id="3395" instrument_node="">2014</span></a><span data-dcnode-id="3393" instrument_node="">), it is the years from late teens through mid twenties that was known to be a critical transition in the life course of an individual in many domains,it is a distinct period wherein they explore various life directions and experience frequent changes in biological and psychological aspects (Arnett </span><a aria-label="Reference 2000" data-dcnode-id="3391" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d212967077e230" title="Arnett, J. J. (2000). Emerging adulthood: A theory of development from the late teens through the twenties. American Psychologist, 55(5), 469–480. 
https://doi.org/10.1037/0003-066X.55.5.469

."><span data-dcnode-id="3392" instrument_node="">2000</span></a><span data-dcnode-id="3390" instrument_node="">). Exploration in various life-threatening possibilities during emerging adulthood include relationships, socioeconomic supports, work and educational opportunities. During this phase emerging adulthood typically is accompanied by increase level of autonomy and decrease in social and institutional support (e.g., schools and family). Most individuals experience surge control in their daily activities and decision making. This increase in choice may result in greater success which will likely contribute to well-being. However, the increased freedom can also result in poor choices such as drug use and criminal activity that have a negative impact on the developmental course as well (Schulenberg and Maggs </span><a aria-label="Reference 2002" data-dcnode-id="3388" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d212967077e233" title="Schulenberg, J. E., &amp; Maggs, J. L. (2002). A developmental perspective on alcohol use and heavy drinking during adolescence and the transition to young adulthood. Journal of Studies on Alcohol. Supplement, (14), 54–70."><span data-dcnode-id="3389" instrument_node="">2002</span></a><span data-dcnode-id="3387" instrument_node="">; Schulenberg and Sameroff </span><a aria-label="Reference 2004" data-dcnode-id="3385" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d212967077e236" title="Schulenberg, J. E., &amp; Sameroff, A. J. (2004). The transition to adulthood as a critical juncture in the course of psychopathology and mental health. Development and Psychopathology, 16(4), 799–806."><span data-dcnode-id="3386" instrument_node="">2004</span></a><span data-dcnode-id="3384" instrument_node="">) and emerging adults may face many unpredictable events and diversity especially when they start to pursue college or university education and enter new relationships. Numerous risk taking behaviors was also found during emerging adulthood and various gender may be susceptible in the effects of vulnerability (Arnett </span><a aria-label="Reference 2000" data-dcnode-id="3382" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d212967077e239" title="Arnett, J. J. (2000). Emerging adulthood: A theory of development from the late teens through the twenties. American Psychologist, 55(5), 469–480. 
https://doi.org/10.1037/0003-066X.55.5.469

."><span data-dcnode-id="3383" instrument_node="">2000</span></a><span data-dcnode-id="3381" instrument_node="">; Kok et al. </span><a aria-label="Reference 2011" data-dcnode-id="3379" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d212967077e243" title="Kok, J. K., Gan, C. C., &amp; Goh, L. Y. (2011). Youths talk about death: Causes for suicide. International Journal of Social Science and Humanity, 1(2), 145-149."><span data-dcnode-id="3380" instrument_node="">2011</span></a><span data-dcnode-id="3378" instrument_node="">).</span></p><p data-dcnode-id="3342"><span data-dcnode-id="3376" instrument_node="">These are the years when students are immersed in a certain institution offering higher education. Ribeiro et al. (</span><a aria-label="Reference 2018" data-dcnode-id="3374" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d212967077e249" title="Ribeiro, Í. J. S., Pereira, R., Freire, I. V., de Oliveira, B. G., Casotti, C. A., &amp; Boery, E. N. (2018). Stress and quality of life among university students: A systematic literature review. Health Professions Education, 4(2), 70–77. 
https://doi.org/10.1016/j.hpe.2017.03.002

."><span data-dcnode-id="3375" instrument_node="">2018</span></a><span data-dcnode-id="3373" instrument_node="">) explained how the demands of modern life negatively affects emerging adults as university students. The emotions they face in the academe are seen to be connected to important student life outcomes, as well as student well-being. In earlier studies such as that of Latham and Green (</span><a aria-label="Reference 1997" data-dcnode-id="3371" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d212967077e252" title="Latham, G., &amp; Green, P. (1997). The journey to university: A study of the first year experience. Retrieved from http://ultibase.rmit.edu.au/Articles/dec97/greenlath1.htm."><span data-dcnode-id="3372" instrument_node="">1997</span></a><span data-dcnode-id="3370" instrument_node="">), the landscape is by far the same wherein they stated that transitions are also a source of stress when emerging adults leave the familiar network behind, entering into unfamiliar territory. In addition, emerging adults face new life stressors such as different social networks, financial changes, adaptation to a new family, and social roles that may have a negative impact on their mental health (Pidgeon and Pickett </span><a aria-label="Reference 2017" data-dcnode-id="3368" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d212967077e255" title="Pidgeon, A. M., &amp; Pickett, L. (2017). Examining the differences between university students’ levels of resilience on mindfulness, psychological distress and coping strategies. European Scientific Journal, 103–113. 
https://doi.org/10.1177/0306624X15602514

."><span data-dcnode-id="3369" instrument_node="">2017</span></a><span data-dcnode-id="3367" instrument_node="">). They are also considered at risk of psychological disorders such as personality and mood disorders (Baggio et al. </span><a aria-label="Reference 2016" data-dcnode-id="3365" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d212967077e258" title="Baggio, S., Studer, J., Iglesias, K., Daeppen, J.-B., &amp; Gmel, G. (2016). Emerging adulthood. Evaluation &amp; the Health Professions, 40(4), 383–400. 
https://doi.org/10.1177/0163278716663602

."><span data-dcnode-id="3366" instrument_node="">2016</span></a><span data-dcnode-id="3364" instrument_node="">; Baldwin et al. </span><a aria-label="Reference 2005" data-dcnode-id="3362" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d212967077e261" title="Baldwin, P., Browne, D., Scully, P. J., Quinn, J. F., Morgan, M. G., Kinsella, A., Owens, J. M., Russell, V., O’Callaghan, E., &amp; Waddington, J. L. (2005). Epidemiology of first-episode psychosis: Illustrating the challenges across diagnostic boundaries through the Cavan-Monaghan study at 8 years. Schizophrenia Bulletin, 31(3), 624–638. 
https://doi.org/10.1093/schbul/sbi025

."><span data-dcnode-id="3363" instrument_node="">2005</span></a><span data-dcnode-id="3361" instrument_node="">). Moreover, an increasing demand for mental health services among emerging adults moving to university has been given attention (Galante et al. </span><a aria-label="Reference 2017" data-dcnode-id="3359" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d212967077e265" title="Galante, J., Dufour, G., Vainre, M., Wagner, A. P., Stochl, J., Benton, A., et al. (2017). A mindfulness-based intervention to increase resilience to stress in university students (the Mindful Student Study ): a pragmatic randomised controlled trial. Lancet Public Health, 2667(17), 1–10. 
https://doi.org/10.1016/S2468-2667(17)30231-1

."><span data-dcnode-id="3360" instrument_node="">2017</span></a><span data-dcnode-id="3358" instrument_node="">). Thus, moving to university is widely acknowledged as a stressful transition event because this is the phase where they are expected to adjust and to be exposed to new social and educational environments. One of the primary components of stress they experience is the time they spend in the university, especially the beginning (Burris et al. </span><a aria-label="Reference 2009" data-dcnode-id="3356" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d212967077e268" title="Burris, J. L., Brechting, E. H., Salsman, J., &amp; Carlson, C. R. (2009). Factors associated with the psychological well-being and distress of university students. Journal of American College Health: JACH, 57(5), 536–543. 
https://doi.org/10.3200/JACH.57.5.536-544

."><span data-dcnode-id="3357" instrument_node="">2009</span></a><span data-dcnode-id="3355" instrument_node="">). Frequently, these stressful events cause a decrease in their psychological well-being (Chao </span><a aria-label="Reference 2012" data-dcnode-id="3353" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d212967077e271" title="Chao, R. C. (2012). Research managing perceived stress among college students: The roles of social support and dysfunctional coping. Journal of College Counseling, 15, 5–21."><span data-dcnode-id="3354" instrument_node="">2012</span></a><span data-dcnode-id="3352" instrument_node="">). Commonly, emerging adults transition to higher education with a decent level of well-being. Some, however, experience long-term emotional maladjustment, anxiety, and depressive symptomatology (Gall et al. </span><a aria-label="Reference 2000" data-dcnode-id="3350" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d212967077e274" title="Gall, T. L., Evans, D. R., &amp; Bellerose, S. (2000). Adjustment across life domains and time. Journal of Social and Clinical Psychology, 19(4), 544–567. 
https://doi.org/10.1521/jscp.2000.19.4.544

."><span data-dcnode-id="3351" instrument_node="">2000</span></a><span data-dcnode-id="3349" instrument_node="">). This can result in withdrawing from their studies, with a considerable number of these students failing to return to university to obtain higher education (Willcoxson et al. </span><a aria-label="Reference 2011" data-dcnode-id="3347" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d212967077e277" title="Willcoxson, L., Cotter, J., &amp; Joy, S. (2011). Beyond the first-year experience: The impact on attrition of student experiences throughout undergraduate degree studies in six diverse universities. Studies in Higher Education, 36(3), 331–352. 
https://doi.org/10.1080/03075070903581533

."><span data-dcnode-id="3348" instrument_node="">2011</span></a><span data-dcnode-id="3346" instrument_node="">). Besides, High suicide rate among these individuals is related to academic performance (Smith et al. </span><a aria-label="Reference 2016" data-dcnode-id="3344" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d212967077e280" title="Smith, D. T., Mouzon, D. M., &amp; Elliott, M. (2016). Reviewing the assumptions about men’s mental health: An exploration of the gender binary. American Journal of Men's Health, 12(1), 78–89. 
https://doi.org/10.1177/1557988316630953

."><span data-dcnode-id="3345" instrument_node="">2016</span></a><span data-dcnode-id="3343" instrument_node="">).</span></p><p data-dcnode-id="3328"><span data-dcnode-id="3341" instrument_node="">The promotion of psychological well-being and mental health among students is an important matter. Yet, the subject of health behavior and wellness are at the last of the bucket list among the emerging adults. Such inattention is evident by a decrease in physical exercise, their tendency to skip a healthy breakfast at home in lieu of fast food meals, they are also less likely to get regular physical checkups and dental checkups and even contract sexually transmitted diseases, smoke cigarettes, binge drink, and use marijuana as well as hard drugs (Harris et al. </span><a aria-label="Reference 2006" data-dcnode-id="3339" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d212967077e286" title="Harris, K. M., Larsen, P. G., Chantala, K., &amp; Udry, J. R. (2006). JAMA network JAMA pediatrics longitudinal trends in race-ethnic disparities in leading health indicators from adolescence to young adulthood. Archives of Pediatrics &amp; Adolescent Medicine, 160(1), 74–81. 
https://doi.org/10.1001/archpedi.160.1.74

."><span data-dcnode-id="3340" instrument_node="">2006</span></a><span data-dcnode-id="3338" instrument_node="">). The World Health Report of the World Health Organization (WHO </span><a aria-label="Reference 2002" data-dcnode-id="3336" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d212967077e289" title="WHO (World Health Organization). (2002). The WHO World Health Report 2001: New understanding – New hope."><span data-dcnode-id="3337" instrument_node="">2002</span></a><span data-dcnode-id="3335" instrument_node="">) report shows that 20% of emerging adults have one or more behavioral problems. In line with this, a study of Weschler et al. (</span><a aria-label="Reference 1994" data-dcnode-id="3333" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d212967077e292" title="Weschler, H., et al. (1994). Binge Drinking and Consequences.Pdf. The Journal of the American Medical Association, 272(21), 1672–1677 Retrieved from 
https://www.csus.edu/faculty/M/fred.molitor/docs/Binge

 Drinking and Consequences.pdf."><span data-dcnode-id="3334" instrument_node="">1994</span></a><span data-dcnode-id="3332" instrument_node="">) suggests that 44% of college students are alcoholics, some of them even experienced drinking-related problems such as physical injury and premarital sex. In spite of these negative reports, there are some emerging adults who can flourish amidst adversity as well as effectively cope and function adaptively (Lin et al. </span><a aria-label="Reference 2017" data-dcnode-id="3330" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d212967077e295" title="Lin, Y., Mutz, J., Clough, P. J., &amp; Papageorgiou, K. A. (2017). Mental toughness and individual differences in learning, educational and work performance, psychological well-being, and personality: A systematic review. Frontiers in Psychology, 8, 1–15. 
https://doi.org/10.3389/fpsyg.2017.01345

."><span data-dcnode-id="3331" instrument_node="">2017</span></a><span data-dcnode-id="3329" instrument_node="">).</span></p><p data-dcnode-id="3320"><span data-dcnode-id="3327" instrument_node="">Although there is substantial growth in the body of research focusing on the negative effect of the period of emerging adults, few studies gave attention to their positive psychological characteristics (Hoyt et al. </span><a aria-label="Reference 2012" data-dcnode-id="3325" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d212967077e301" title="Hoyt, L. T., Chase-lansdale, P. L., Mcdade, T. W., et al. (2012). Positive youth, healthy adults: Does positive well-being in adolescence predict better perceived health and fewer risky health behaviors in young adulthood? JAH, 50(1), 66–73. 
https://doi.org/10.1016/j.jadohealth.2011.05.002

."><span data-dcnode-id="3326" instrument_node="">2012</span></a><span data-dcnode-id="3324" instrument_node="">). It is deemed necessary to gain a greater understanding of the factors and qualities that may promote positive adjustment and successful transition into the university environment. Despite risk and adversity, it is expected that their well-being can be increased through offering students additional support in these areas. Furthermore, it is also crucial to examine the significance of well-being and distinguish those who faced challenges in making a successful transition, specifically in decision-making, to cope with risky behaviors or to manage daily distress and change in life events. Assisting them is critical to help them become fully functioning and independent adults (Terzian et al. </span><a aria-label="Reference 2014" data-dcnode-id="3322" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d212967077e304" title="Terzian, M. A., Moore, K. A., &amp; Constance, N. (2014). Transitioning to adulthood: The role of supportive relationships and regular religious involvement. Child Trends Research Brief, 2014–20, 1–10."><span data-dcnode-id="3323" instrument_node="">2014</span></a><span data-dcnode-id="3321" instrument_node="">).</span></p><p data-dcnode-id="3288"><span data-dcnode-id="3319" instrument_node="">It is important to determine what psychological factors contribute to enhance the level of well-being. One of the factors related to life adaptation is optimism, understood as the general expectancy of obtaining positive outcomes in the future (Scheier and Carver </span><a aria-label="Reference 2015" data-dcnode-id="3317" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d212967077e311" title="Scheier, M. F., &amp; Carver, C. S. (2015). Effects of optimism on psychological and physical well-being: Theoretical overview and empirical update effects of optimism on psychological and physical well-being: Theoretical overview and empirical update 1, (December). 
https://doi.org/10.1007/BF01173489

."><span data-dcnode-id="3318" instrument_node="">2015</span></a><span data-dcnode-id="3316" instrument_node="">) and previous studies showed that generalized positive outcome expectancy is linked with greater physical and psychological well-being. An optimistic view of the future gives them the motivation to push towards their plans and goals regardless of uncertainties (Hanssen et al. </span><a aria-label="Reference 2014" data-dcnode-id="3314" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d212967077e314" title="Hanssen, M. M., Vancleef, L. M. G., Vlaeyen, J. W. S., Hayes, A. F., Schouten, E. G. W., &amp; Peters, M. L. (2014). Optimism , Motivational Coping and Well-being: Adjustment. 
https://doi.org/10.1007/s10902-014-9572-x


"><span data-dcnode-id="3315" instrument_node="">2014</span></a><span data-dcnode-id="3313" instrument_node="">). Recent research on optimism and subjective well-being has already been established (Conversano et al. </span><a aria-label="Reference 2010" data-dcnode-id="3311" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d212967077e317" title="Conversano, C., Rotondo, A., Lensi, E., Della Vista, O., &amp; Reda, M. A. (2010). Optimism and its impact on mental and physical well-being. Clinical Practice &amp; Epidemiology in Mental Health, 6, 25–29."><span data-dcnode-id="3312" instrument_node="">2010</span></a><span data-dcnode-id="3310" instrument_node="">; Kleiman et al. </span><a aria-label="Reference 2015" data-dcnode-id="3308" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d212967077e320" title="Kleiman, E. M., Chiara, A. M., Liu, R. T., Jager-hyman, S. G., Choi, J. Y., Alloy, L. B., … Jager-hyman, S. G. (2015). Optimism and well-being: A prospective multi- method and multi-dimensional examination of optimism as a resilience factor following the occurrence of stressful life events, 9931(March 2016). 
https://doi.org/10.1080/02699931.2015.1108284


"><span data-dcnode-id="3309" instrument_node="">2015</span></a><span data-dcnode-id="3307" instrument_node="">; Rasmussen et al. </span><a aria-label="Reference 2009" data-dcnode-id="3305" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d212967077e323" title="Rasmussen, H. N., Scheier, M. F., &amp; Greenhouse, J. B. (2009). Optimism and physical health: A meta-analytic review. Annals of Behavioral Medicine, 37(3), 239–256. 
https://doi.org/10.1007/s12160-009-9111-x

."><span data-dcnode-id="3306" instrument_node="">2009</span></a><span data-dcnode-id="3304" instrument_node="">; Scheier and Carver </span><a aria-label="Reference 2015" data-dcnode-id="3302" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d212967077e327" title="Scheier, M. F., &amp; Carver, C. S. (2015). Effects of optimism on psychological and physical well-being: Theoretical overview and empirical update effects of optimism on psychological and physical well-being: Theoretical overview and empirical update 1, (December). 
https://doi.org/10.1007/BF01173489

."><span data-dcnode-id="3303" instrument_node="">2015</span></a><span data-dcnode-id="3301" instrument_node="">). It has also been conveyed that resilience plays an important role when facing adversity and transitions. As such, various definitions of the concept of resilience arose (Bonanno and Bonanno </span><a aria-label="Reference 2005" data-dcnode-id="3299" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d212967077e330" title="Bonanno, G. A., &amp; Bonanno, G. A. (2005). Current directions in psychological science resilience in the face of potential trauma. 1–5. 
https://doi.org/10.1111/j.0963-7214.2005.00347.x

."><span data-dcnode-id="3300" instrument_node="">2005</span></a><span data-dcnode-id="3298" instrument_node="">; Masten et al. </span><a aria-label="Reference 1991" data-dcnode-id="3296" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d212967077e333" title="Masten, A. N. N. S., Best, K. M., &amp; Garmezy, N. (1991). Resilience and development: Contributions from the study of children who overcome adversity. Development and Psychopathology, 2(1990), 425–444."><span data-dcnode-id="3297" instrument_node="">1991</span></a><span data-dcnode-id="3295" instrument_node="">; Schröder </span><a aria-label="Reference 2016" data-dcnode-id="3293" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d212967077e336" title="Schröder, M. (2016). Enhancing resilience, wellbeing and optimism through narrative imagination of the future and the interrelationship of the concepts with, (June), 1–41."><span data-dcnode-id="3294" instrument_node="">2016</span></a><span data-dcnode-id="3292" instrument_node="">). Research has clearly revealed that improved resilience increases an emerging adult’s capacity to bounce back from setbacks and challenges. Demonstrated in the study of Steinhardt and Dolbier (</span><a aria-label="Reference 2008" data-dcnode-id="3290" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d212967077e339" title="Steinhardt, M., &amp; Dolbier, C. (2008). Evaluation of a resilience intervention to enhance coping strategies and protective factors and decrease symptomatology. Journal of American College Health, 56(4), 445–453. 
https://doi.org/10.3200/JACH.56.44.445-454

."><span data-dcnode-id="3291" instrument_node="">2008</span></a><span data-dcnode-id="3289" instrument_node="">), developing positive human strengths and enhancing resilience has been linked with reductions of psychological distress.</span></p><span data-dcnode-id="3287" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="3285" id="FPar1"><span data-dcnode-id="3286" instrument_node="">Optimism</span></h3><span data-dcnode-id="3284" instrument_node="">
</span><p data-dcnode-id="3246"><span data-dcnode-id="3283" instrument_node="">Optimism is commonly illustrated by an idiom </span><i data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">glass filled with water to the halfway point,</span></i><span data-dcnode-id="3280" instrument_node=""> where an optimist will see the glass as halfway full. Predominantly, optimism has been viewed as a trait construct. It is the inclination “to believe or expect that things will turn out well.” In the literature, there are two basic ways to assess optimism, one primary way is through dispositional optimism. Carver and Scheier (</span><a aria-label="Reference 2014" data-dcnode-id="3278" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d212967077e352" title="Carver, C. S., &amp; Scheier, M. F. (2014). Dispositional optimism. Trends in Cognitive Sciences, 18(6), 293–299. 
https://doi.org/10.1016/j.tics.2014.02.003

."><span data-dcnode-id="3279" instrument_node="">2014</span></a><span data-dcnode-id="3277" instrument_node="">) coined the term to describe their approach as global belief or expectation that favorable outcomes will happen in the future. Optimism suggests better physical and mental health, social relationship, and improved academic learning and achievement (Chaturvedi </span><a aria-label="Reference 2014" data-dcnode-id="3275" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d212967077e355" title="Chaturvedi, A. T. K. R. (2014). Optimism: A factor of intrinsic motivation and achievement. 1341(04), 1–8."><span data-dcnode-id="3276" instrument_node="">2014</span></a><span data-dcnode-id="3274" instrument_node="">; Conversano et al. </span><a aria-label="Reference 2010" data-dcnode-id="3272" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d212967077e358" title="Conversano, C., Rotondo, A., Lensi, E., Della Vista, O., &amp; Reda, M. A. (2010). Optimism and its impact on mental and physical well-being. Clinical Practice &amp; Epidemiology in Mental Health, 6, 25–29."><span data-dcnode-id="3273" instrument_node="">2010</span></a><span data-dcnode-id="3271" instrument_node="">; Deptula et al. </span><a aria-label="Reference n.d." data-dcnode-id="3269" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d212967077e361" title="Deptula, D. P., Cohen, R., Phillipsen, L. C., &amp; Ey, S. (n.d.). Dedicated to furthering research and promoting good practice expecting the best: The relation between peer optimism and social competence. The Journal of Positive Psychology, 1, 37–41. 
https://doi.org/10.1080/17439760600613685

."><span data-dcnode-id="3270" instrument_node="">n.d.</span></a><span data-dcnode-id="3268" instrument_node="">). Moreover, optimism or global expectancies linked to different variables, as in the study of Rasmussen et al. (</span><a aria-label="Reference 2009" data-dcnode-id="3266" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d212967077e365" title="Rasmussen, H. N., Scheier, M. F., &amp; Greenhouse, J. B. (2009). Optimism and physical health: A meta-analytic review. Annals of Behavioral Medicine, 37(3), 239–256. 
https://doi.org/10.1007/s12160-009-9111-x

."><span data-dcnode-id="3267" instrument_node="">2009</span></a><span data-dcnode-id="3265" instrument_node="">) showed the link between dispositional optimism and physical health. Another variable associated with dispositional optimism is the lower levels of postpartum depression on adolescent and fewer depressive symptoms in children (Carver and Gaines </span><a aria-label="Reference 1987" data-dcnode-id="3263" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d212967077e368" title="Carver, C. S., &amp; Gaines, J. G. (1987). Optimism, pessimism, and postpartum depression. Cognitive Therapy and Research, 11(4), 449–462."><span data-dcnode-id="3264" instrument_node="">1987</span></a><span data-dcnode-id="3262" instrument_node="">; Ey et al. </span><a aria-label="Reference 2005" data-dcnode-id="3260" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d212967077e371" title="Ey, S., Hadley, W., Allen, D. N., Palmer, S., Deptula, D., Thomas, J., &amp; Cohen, R. (2005). A new measure of children’s optimism and pessimism: The youth life orientation test. Journal of Child Psychology and Psychiatry, 5, 548–558. 
https://doi.org/10.1111/j.1469-7610.2004.00372.x

."><span data-dcnode-id="3261" instrument_node="">2005</span></a><span data-dcnode-id="3259" instrument_node="">). Optimism can also act as a buffer against negative consequences of stress and may enhance coping strategies to help students adjust into their new university environment (Brissette et al. </span><a aria-label="Reference 2002" data-dcnode-id="3257" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d212967077e374" title="Brissette, I., Scheier, M. F., &amp; Carver, C. S. (2002). The role of optimism in social network development, coping , and psychological adjustment during a life transition. Journal of Personality and Social Psychology, 82(1), 102–111. 
https://doi.org/10.1037//0022-3514.82.1.102

."><span data-dcnode-id="3258" instrument_node="">2002</span></a><span data-dcnode-id="3256" instrument_node="">). Researches usually found that emerging adults with a more optimistic explanatory style demonstrates had fewer illnesses and physician contacts. For example, the study of Lin and Peterson (</span><a aria-label="Reference 1990" data-dcnode-id="3254" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d212967077e377" title="Lin, E. H., &amp; Peterson, C. (1990). Pessimistic explanatory style and response to illness. Behaviour Research and Therapy, 28(3), 243–248. 
https://doi.org/10.1016/0005-7967(90)90007-6

."><span data-dcnode-id="3255" instrument_node="">1990</span></a><span data-dcnode-id="3253" instrument_node="">) suggested that those emerging adults who habitually favor external, unstable, and specific explanations reported less frequent illnesses during the past year and rated their overall health better. Similarly, a study by Peterson (</span><a aria-label="Reference 1988" data-dcnode-id="3251" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d212967077e380" title="Peterson, C. (1988). Explanatory style as a risk factor for illness. Cognitive Therapy and Research, 12(2), 119–132. 
https://doi.org/10.1007/BF01204926

."><span data-dcnode-id="3252" instrument_node="">1988</span></a><span data-dcnode-id="3250" instrument_node="">) showed that college students who habitually favor stable and global factors experienced more days of illness in the following month and frequently visited physicians. Another study of optimism as a predictor of subjective well-being by Ayyash-abdo and Alamuddin (</span><a aria-label="Reference 2010" data-dcnode-id="3248" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d212967077e384" title="Ayyash-abdo, H., &amp; Alamuddin, R. (2010). Predictors of subjective well-being among college youth in Lebanon predictors of subjective well-being among college youth in Lebanon. The Journal of Social Psychology, 147(3), 37–41. 
https://doi.org/10.3200/SOCP.147.3.265-284

 November 2014."><span data-dcnode-id="3249" instrument_node="">2010</span></a><span data-dcnode-id="3247" instrument_node="">) indicated that college students’ subjective well-being was positively correlated by optimism, self-esteem, and positive affect.</span></p><span data-dcnode-id="3245" instrument_node="">
</span><p data-dcnode-id="3231"><span data-dcnode-id="3244" instrument_node="">Explanatory optimism also linked to mortality, wherein, it was concluded that emerging adults who use unstable plus specific factors showed reduced mortality (Peterson and Seligman </span><a aria-label="Reference 1987" data-dcnode-id="3242" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d212967077e390" title="Peterson, C., &amp; Seligman, M. E. P. (1987). Explanatory style and illness. Journal of Personality, 55(2), 237–265. 
https://doi.org/10.1111/j.1467-6494.1987.tb00436.x

."><span data-dcnode-id="3243" instrument_node="">1987</span></a><span data-dcnode-id="3241" instrument_node="">). However, there is an opposite outcome on the study of optimistic explanatory style with elderly adults. Based on this study, a greater risk of depressive symptoms was observed in response to unfavorable situations or experiences because of the perception that as the age increases the chance of death also increases (Isaacowitz and Seligman </span><a aria-label="Reference 2001" data-dcnode-id="3239" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d212967077e393" title="Isaacowitz, D. M., &amp; Seligman, M. E. P. (2001). Is pessimism a risk factor for depressive mood among community-dwelling older adults? Behaviour Research and Therapy, 39, 255–272."><span data-dcnode-id="3240" instrument_node="">2001</span></a><span data-dcnode-id="3238" instrument_node="">). Seemingly, optimism and depressive symptoms form an opposite relationship, i. e. when you are optimistic the lower the tendency for an individual to experience symptoms of depression (Chang and Sanna </span><a aria-label="Reference 2001" data-dcnode-id="3236" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d212967077e396" title="Chang, E. C., &amp; Sanna, L. J. (2001). Optimism, pessimism, and positive and negative affectivity in middle-aged adults: a test of a cognitive-affective model of psychological adjustment. Psychology and Aging, 16(3), 524–531. 
https://doi.org/10.1037//0882-7974.16.3.524

."><span data-dcnode-id="3237" instrument_node="">2001</span></a><span data-dcnode-id="3235" instrument_node="">; Hart et al. </span><a aria-label="Reference 2008" data-dcnode-id="3233" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d212967077e399" title="Hart, S. L., Vella, L., &amp; Mohr, D. C. (2008). Relationships among depressive symptoms, benefit-finding, optimism, and positive affect in multiple sclerosis patients after psychotherapy for depression. Health Psychology, 27(2), 230–238. 
https://doi.org/10.1037/0278-6133.27.2.230

."><span data-dcnode-id="3234" instrument_node="">2008</span></a><span data-dcnode-id="3232" instrument_node="">).</span></p><span data-dcnode-id="3230" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="3228" id="FPar2"><span data-dcnode-id="3229" instrument_node="">Resilience</span></h3><span data-dcnode-id="3227" instrument_node="">
</span><p data-dcnode-id="3213"><span data-dcnode-id="3226" instrument_node="">Setting intellectual capacity aside, distinguishing emerging adults who are successful in the transition to higher education from those who are not is important in identifying characteristics that enable academic achievement. One such characteristic is resilience. In general terms, all resilience definitions are divided into two groups: resilience as a personality trait and resilience as a developmental factor (Mestre et al. </span><a aria-label="Reference 2017" data-dcnode-id="3224" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d212967077e410" title="Mestre, J. M., Núñez-Lozano, J. M., Gómez-Molinero, R., Zayas, A., &amp; Guil, R. (2017). Emotion regulation ability and resilience in a sample of adolescents from a suburban area. Frontiers in Psychology, 8. 
https://doi.org/10.3389/fpsyg.2017.01980

."><span data-dcnode-id="3225" instrument_node="">2017</span></a><span data-dcnode-id="3223" instrument_node="">). Of current, resilience is known as people “bouncing back” from adversity and getting on with their lives. Likewise, resilience is defined by Riley and Masten (</span><a aria-label="Reference 2005" data-dcnode-id="3221" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d212967077e413" title="Riley, J. R., &amp; Masten, A. S. (2005). Resilience in context: Linking context to practice and policy. In R. D. Peters, B. Leadbeater, &amp; R. J. McMahon (Eds.), Resilience in children, families, and communities: Linking context to practice and policy (pp. 13–25). New York: Kluwer Academic/Plenum."><span data-dcnode-id="3222" instrument_node="">2005</span></a><span data-dcnode-id="3220" instrument_node="">) as referring to patterns of positive adaptation in the face of adversity. Equally, it is the capacity or outcome of successful adaptation despite difficulties (Masten et al. </span><a aria-label="Reference 1991" data-dcnode-id="3218" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d212967077e416" title="Masten, A. N. N. S., Best, K. M., &amp; Garmezy, N. (1991). Resilience and development: Contributions from the study of children who overcome adversity. Development and Psychopathology, 2(1990), 425–444."><span data-dcnode-id="3219" instrument_node="">1991</span></a><span data-dcnode-id="3217" instrument_node="">). In consonance with these meanings, resilience consists of two important factors – adversity and positive adaptation. Adversity is a state in which courage in the face of difficulty is demonstrated. On the other hand, positive adaptation is a degree in which positive developmental outcomes manifest through competence and success was experienced (Luthar et al. </span><a aria-label="Reference 2014" data-dcnode-id="3215" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d212967077e419" title="Luthar, S., Lyman, E. L., &amp; Crossman, E. J. (2014). Resilience and positive psychology. In Handbook of developmental psychopathology: Third edition (pp. 125–140). Springer, USA. 
https://doi.org/10.1007/978-1-4614-9608-3_7

."><span data-dcnode-id="3216" instrument_node="">2014</span></a><span data-dcnode-id="3214" instrument_node="">).</span></p><span data-dcnode-id="3212" instrument_node="">
</span><p data-dcnode-id="3192"><span data-dcnode-id="3211" instrument_node="">Di Fabio and Palazzeschi (</span><a aria-label="Reference 2015" data-dcnode-id="3209" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d212967077e425" title="Di Fabio, A., &amp; Palazzeschi, L. (2015). Hedonic and eudaimonic well-being: The role of resilience beyond fluid intelligence and personality traits. Frontiers in Psychology, 6, 1–7. 
https://doi.org/10.3389/fpsyg.2015.01367

."><span data-dcnode-id="3210" instrument_node="">2015</span></a><span data-dcnode-id="3208" instrument_node="">) indicated that resilience plays a major role in an emerging adult’s well-being. It was also pointed out by Min et al. (</span><a aria-label="Reference 2013" data-dcnode-id="3206" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d212967077e428" title="Min, J. A., Yoon, S., Lee, C. U., Chae, J. H., Lee, C., Song, K. Y., &amp; Kim, T. S. (2013). Psychological resilience contributes to low emotional distress in cancer patients. Supportive Care in Cancer, 21(9), 2469–2476. 
https://doi.org/10.1007/s00520-013-1807-6

."><span data-dcnode-id="3207" instrument_node="">2013</span></a><span data-dcnode-id="3205" instrument_node="">) that psychological resilience levels were relatively linked with positive well-being. Likewise, some researchers discussed that high resilience implies good physical and psychological health and demonstrates the ability to cope quickly from stressful events than lowly resilient ones (Ryff and Singer </span><a aria-label="Reference 2015" data-dcnode-id="3203" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d212967077e431" title="Ryff, C. D., &amp; Singer, B. (2015). Flourishing under fire: Resilience as a prototype of challenged thriving. 
https://doi.org/10.1037/10594-001

."><span data-dcnode-id="3204" instrument_node="">2015</span></a><span data-dcnode-id="3202" instrument_node="">). Resilience is also associated with improved quality of life and functional capacity when faced with a challenging situation (Abiola and Udofia </span><a aria-label="Reference 2011" data-dcnode-id="3200" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d212967077e434" title="Abiola, T., &amp; Udofia, O. (2011). Psychometric assessment of the Wagnild and Young’s resilience scale in Kano, Nigeria."><span data-dcnode-id="3201" instrument_node="">2011</span></a><span data-dcnode-id="3199" instrument_node="">). A study about positive emotions, resilience, and psychosomatic health revealed that high positive emotions exhibit a higher level of resilience and better psychosomatic health, while negative emotions display a lower level of resilience and poor psychosomatic health. Furthermore, resilience shows a strong relationship with psychosomatic health, which suggests that the higher the resilience, the lower the tendency to feel depressed and anxious (Masten and Wright </span><a aria-label="Reference 2010" data-dcnode-id="3197" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d212967077e437" title="Masten, A. S., &amp; Wright, M. O. (2010). Resilience over the lifespan: Developmental perspectives on resistance, recovery, and transformation. In J. W. Reich, A. J. Zautra, &amp; J. S. Hall (Eds.), Handbook of adult resilience (pp. 213–237). New York: The Guilford Press."><span data-dcnode-id="3198" instrument_node="">2010</span></a><span data-dcnode-id="3196" instrument_node="">). Resilience on emerging adults promotes better positive emotional self-regulation and shows better resistance to risky behaviors (Rasheed et al. </span><a aria-label="Reference 2016" data-dcnode-id="3194" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d212967077e441" title="Rasheed, R., Saleem, S., &amp; Mahmood, Z. (2016). Resilience in adolescents: A validation study of a resilience scale for adolescents. FWU Journal of Social SCiences, 10(1), 138–147 Retrieved from 
http://www.sbbwu.edu.pk/journal/Summmer 2016Vol.10

.No.1/16 Resilience in adolescents.pdf."><span data-dcnode-id="3195" instrument_node="">2016</span></a><span data-dcnode-id="3193" instrument_node="">).</span></p><span data-dcnode-id="3191" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="3189" id="FPar3"><span data-dcnode-id="3190" instrument_node="">Subjective Well-Being</span></h3><span data-dcnode-id="3188" instrument_node="">
</span><p data-dcnode-id="3168"><span data-dcnode-id="3187" instrument_node="">Well-being, in terms of the physical, mental and emotional health of an emerging adult enables the capacity of an emerging adult to thrive and flourish. According to Gough and McGregor (</span><a aria-label="Reference 2007" data-dcnode-id="3185" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d212967077e452" title="Gough, I., &amp; McGregor, J. (2007). Wellbeing in developing countries from theory to research. Cambridge: Cambridge University Press."><span data-dcnode-id="3186" instrument_node="">2007</span></a><span data-dcnode-id="3184" instrument_node="">), well-being is also not merely the absence of illness or pathology. There are two (2) major principles to understand well-being, namely: hedonic and eudaimonic views. The hedonic view consists of two (2) components: (a) evaluation of life in terms of satisfaction, and (b) stability between positive and negative affect. Well-being is used to relatively link it with the concept of subjective well-being (Diener et al. </span><a aria-label="Reference 2003" data-dcnode-id="3182" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d212967077e455" title="Diener, E., Oishi, S., &amp; Lucas, R. E. (2003). Personality, culture, and subjective well-being: Emotional and cognitive evaluations of life. Annual Review of Psychology, 54(1), 403–425. 
https://doi.org/10.1146/annurev.psych.54.101601.145056

."><span data-dcnode-id="3183" instrument_node="">2003</span></a><span data-dcnode-id="3181" instrument_node="">). The present study on well-being dwells from one general perspective only -the hedonic approach- which focuses on well-being in terms of life satisfaction and stability between positive and negative affect. Diener (</span><a aria-label="Reference 1984" data-dcnode-id="3179" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d212967077e458" title="Diener, E. (1984). Subjective well-being. Psychological Bulletin, 95(3), 542–575. 
https://doi.org/10.1037/0033-2909.95.3.542

."><span data-dcnode-id="3180" instrument_node="">1984</span></a><span data-dcnode-id="3178" instrument_node="">) proposed that subjective well-being has three components that are related but separable construct proposing high levels of positive affect (positive experiences of emotions and moods), relatively low levels of negative affect (negative experiences of emotions and moods), and favorable attitude towards one’s life. This latter cognitive appraisal is often identified as life satisfaction. Subjective well-being concentrates on how an emerging adult evaluates his or her own life, which includes emotional experiences (positive and negative affect) to specific events and cognitive evaluations of what an emerging adult considers a good life (Diener </span><a aria-label="Reference 2000" data-dcnode-id="3176" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d212967077e461" title="Diener, E. (2000). Subjective well-being: The science of happiness and a proposal for a national index. American Psychologist, 55(1), –43. 
https://doi.org/10.1037//0003-066X.55.1.34

."><span data-dcnode-id="3177" instrument_node="">2000</span></a><span data-dcnode-id="3175" instrument_node="">; Steel et al. </span><a aria-label="Reference 2008" data-dcnode-id="3173" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d212967077e464" title="Steel, P., Schmidt, J., &amp; Shultz, J. (2008). Refining the relationship between personality and subjective well-being. Psychological Bulletin, 134(1), 138–161. 
https://doi.org/10.1037/0033-2909.134.1.138

."><span data-dcnode-id="3174" instrument_node="">2008</span></a><span data-dcnode-id="3172" instrument_node="">). A study about emerging adults who have high levels of positive emotionality and who are satisfied with life were reported to be good at solving problems and display improved work performance. They also attained significant social relationships, showed forgiveness and generosity, and displayed high tolerance when they face stress, and experienced better physical and mental health (Veenhoven </span><a aria-label="Reference 1989" data-dcnode-id="3170" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d212967077e468" title="Veenhoven, R. (1989). National Wealth and individual happiness. In K. G. Grumert &amp; F. Olander (Eds.), Understanding economic behavior (pp. 9–32). Dordrecht: Kluwer Academic."><span data-dcnode-id="3171" instrument_node="">1989</span></a><span data-dcnode-id="3169" instrument_node="">).</span></p><span data-dcnode-id="3167" instrument_node="">
</span><p data-dcnode-id="3162"><span data-dcnode-id="3166" instrument_node="">In consonance with well-being theory, several psychological variables were relatively linked with well-being. Keyes (</span><a aria-label="Reference 2007" data-dcnode-id="3164" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d212967077e474" title="Keyes, C. L. M. (2007). Promoting and protecting mental health as flourishing: A complementary strategy for improving National Mental Health. American Psychologist, 62(2), 95–108. 
https://doi.org/10.1037/0003-066X.62.2.95

."><span data-dcnode-id="3165" instrument_node="">2007</span></a><span data-dcnode-id="3163" instrument_node="">) reported those emerging adults who flourished have the healthiest psychosocial functioning that connotes the highest number of attendances at work and lowest number of absences. They also turn out to be independent, flexible, and demonstrates good social relationship. Furthermore, another study investigated the three pathways (pleasant life or positive emotions, the engaged life, and the meaningful life) to well-being and identified its relationship to life satisfaction. The study suggests that those emerging adults who can make use of the three pathways at a high level, reported the highest level of life satisfaction.</span></p><span data-dcnode-id="3161" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="3159" id="Sec2"><span data-dcnode-id="3160" instrument_node="">The Current Study</span></h3><p data-dcnode-id="3142"><span data-dcnode-id="3158" instrument_node="">This present study attempts to extend the previous literature by investigating the potential mediating role of resilience in the relationship between optimism and subjective well-being. The primary objective of the study is to determine possible predictors of well-being, particularly optimism and resilience. These, as hypothesized to be predictors of well-being, are anchored on popular understanding of optimism as defined by Reker (</span><a aria-label="Reference 1997" data-dcnode-id="3156" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d212967077e485" title="Reker, G. T. (1997). Personal meaning, optimism and choice: Existential predictors of depression in community and institutionalised elderly. The Gerontologist, 37(6), 709–716."><span data-dcnode-id="3157" instrument_node="">1997</span></a><span data-dcnode-id="3155" instrument_node="">) where he viewed it as a dimension of humans revealing positive expectations towards the future and in which it was showed as a significant and adaptive characteristic. In this sense, optimists are likely to show persistence and confidence when faced with a problematic and tough condition (Krok </span><a aria-label="Reference 2015" data-dcnode-id="3153" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d212967077e488" title="Krok, D. (2015). The mediating role of optimism in the relations between sense of coherence, subjective and psychological well-being among late adolescents. Personality and Individual Differences, 85, 134–139. 
https://doi.org/10.1016/j.paid.2015.05.006

."><span data-dcnode-id="3154" instrument_node="">2015</span></a><span data-dcnode-id="3152" instrument_node="">). Resilience, on the other hand, is demonstrated through adapting positively in a situation regardless of experiences involving adversity (Luthar et al. </span><a aria-label="Reference 2014" data-dcnode-id="3150" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d212967077e491" title="Luthar, S., Lyman, E. L., &amp; Crossman, E. J. (2014). Resilience and positive psychology. In Handbook of developmental psychopathology: Third edition (pp. 125–140). Springer, USA. 
https://doi.org/10.1007/978-1-4614-9608-3_7

."><span data-dcnode-id="3151" instrument_node="">2014</span></a><span data-dcnode-id="3149" instrument_node="">). Specifically, this study will determine whether resilience will significantly mediate the relationship between optimism and well-being. Thus, the promotion of psychological well-being and mental health is an urgent agenda in school. Given this framework, it is stated that optimism, a set of thoughts that serves as a belief system that gives emerging adults the drive and motivation to determine what they feel and do and to be inspired toward marked behavioral differences predicts subjective well-being. On the other hand, it was previously shown that students with higher levels of dispositional optimism experienced higher levels of resilience which implies that dispositional optimism indirectly influences subjective well-being possibly due to resilience (Dawson and Pooley </span><a aria-label="Reference 2013" data-dcnode-id="3147" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d212967077e494" title="Dawson, M., &amp; Pooley, J. A. (2013). Resilience : The role of optimism , perceived parental autonomy support and perceived social support in first year university students. Journal of Education and Training Studies, 1, 38–49. 
https://doi.org/10.11114/jets.v1i2.137

."><span data-dcnode-id="3148" instrument_node="">2013</span></a><span data-dcnode-id="3146" instrument_node="">). In the same way, it was reported that optimists are resilient and therefore may live longer and achieve success in life (Seligman </span><a aria-label="Reference 1991" data-dcnode-id="3144" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d212967077e497" title="Seligman, M. E. P. (1991). Learned optimism. New York: Knopf."><span data-dcnode-id="3145" instrument_node="">1991</span></a><span data-dcnode-id="3143" instrument_node="">).</span></p><p data-dcnode-id="3137"><span data-dcnode-id="3141" instrument_node="">Similarly, in the face of adversity, people’s thinking that good things happen in the future can still drive people to achieve subjective well-being because of resilience, the process of positively adapting or “bouncing back” to stressful situations. It is reported that resilient emerging adults have an optimistic approach to life and are characterized by high positive emotionality (Klohnen </span><a aria-label="Reference 1996" data-dcnode-id="3139" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d212967077e503" title="Klohnen, E. C. (1996). Conceptual analysis and measurement of the construct of ego-resiliency. Journal of Personality and Social Psychology, 70(5), 1067–1079."><span data-dcnode-id="3140" instrument_node="">1996</span></a><span data-dcnode-id="3138" instrument_node="">). Additionally, resilience as demonstrated through adapting positively in a situation regardless of experiences involving adversity, predicts subjective well-being. It is further proposed that resilience, as described by the capacity of people to “bounce back” amid adversity, creates a pathway on the relationship between optimism and subjective well-being.</span></p></div></div></section><section data-dcnode-id="3073" data-title="Method"><div class="c-article-section" data-dcnode-id="3074" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3132" id="Sec3"><span data-dcnode-id="3133" instrument_node="">Method</span></h2><div class="c-article-section__content" data-dcnode-id="3075" id="Sec3-content"><h3 class="c-article__sub-heading" data-dcnode-id="3130" id="Sec4"><span data-dcnode-id="3131" instrument_node="">Participants</span></h3><p data-dcnode-id="3125"><span data-dcnode-id="3129" instrument_node="">The participants of the study comprises of a sample of 300 first-year college students enrolled in a private university in the Philippines with ages ranging from 18 to 25 (M = 19.11, SD = 1.01). Out of the total participants, there were 89 (29.67%) males, and most were females (</span><i data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">n</span></i><span data-dcnode-id="3126" instrument_node="">&nbsp;= 211, 70.33%).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3123" id="Sec5"><span data-dcnode-id="3124" instrument_node="">Measures</span></h3><span data-dcnode-id="3122" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="3120" id="FPar4"><span data-dcnode-id="3121" instrument_node="">Revised Life Orientation</span></h3><span data-dcnode-id="3119" instrument_node="">
</span><p data-dcnode-id="3114"><span data-dcnode-id="3118" instrument_node="">(LOT-R; Scheier and Carver </span><a aria-label="Reference 2015" data-dcnode-id="3116" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d212967077e534" title="Scheier, M. F., &amp; Carver, C. S. (2015). Effects of optimism on psychological and physical well-being: Theoretical overview and empirical update effects of optimism on psychological and physical well-being: Theoretical overview and empirical update 1, (December). 
https://doi.org/10.1007/BF01173489

."><span data-dcnode-id="3117" instrument_node="">2015</span></a><span data-dcnode-id="3115" instrument_node="">). Optimism was measured with the Revised Life Orientation. It is a self-report questionnaire on a 5-point rating scale (0 = strongly disagree; 4 = strongly agree) to show how much they agree to 10 statements about positive and negative expectations. These statements include “In uncertain times, I usually expect the best” and “If something can go wrong for me, it will.” Four items are “filler” statements that are not scored. This scale has demonstrated acceptable internal consistency based on Cronbach’s alpha of 0.78 and test-retest reliability correlations ranging from 0.56 to 0.79. In the present study, the LOT-R4 has an internal reliability coefficient of .74.</span></p><span data-dcnode-id="3113" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="3111" id="FPar5"><span data-dcnode-id="3112" instrument_node="">Connor-Davidson Resilience Scale</span></h3><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3102"><span data-dcnode-id="3109" instrument_node="">(CD-RISC; Connor and Davidson </span><a aria-label="Reference 2003" data-dcnode-id="3107" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d212967077e545" title="Connor, K. M., &amp; Davidson, J. R. T. (2003). Development of a new resilience scale: The Connor-Davidson resilience scale (CD-RISC). Depression and Anxiety, 18(2), 76–82. 
https://doi.org/10.1002/da.10113

."><span data-dcnode-id="3108" instrument_node="">2003</span></a><span data-dcnode-id="3106" instrument_node="">)</span><b data-dcnode-id="3104"><span data-dcnode-id="3105" instrument_node="">.</span></b><span data-dcnode-id="3103" instrument_node=""> The CD-RISC was used to measure the participants’ level of resilience. It consists of 25-item statements depicting the person’s ability to cope with adversity based on responses scaled from 0 (not true at all) to 4 (true nearly all the time) with higher scores reflecting greater resilience. These statements include “I can adapt when changes occur” and “I tend to bounce back after illness, injury, or other hardships”. Likewise, the scale has demonstrated satisfactory psychometric properties as measured by internal consistency reliability of .89, as well as Test-retest Reliability of 0.87 including evidence for convergent and discriminant validity. In the present study, the CD-RISC has an internal reliability coefficient of .89.</span></p><span data-dcnode-id="3101" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="3099" id="FPar6"><span data-dcnode-id="3100" instrument_node="">Positive and Negative Affect Scale</span></h3><span data-dcnode-id="3098" instrument_node="">
</span><p data-dcnode-id="3093"><span data-dcnode-id="3097" instrument_node="">(PANAS-X; Watson </span><a aria-label="Reference 1999" data-dcnode-id="3095" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d212967077e559" title="Watson, D. (1999). The PANAS-X: Manual for the Positive and Negative Affect Schedule – Expanded Form."><span data-dcnode-id="3096" instrument_node="">1999</span></a><span data-dcnode-id="3094" instrument_node="">). The PANAS-X is used to measure positive and negative affect. It is a self-report scale that assesses affective emotional states such as fear and joviality within the two general dimensions of positive and negative affect. The PANAS-X consists of a total of 60 items or statements to be answered using a 5-point scale where 1 corresponds to very slightly or not at all while 5 means extreme feeling. In this study, only the general dimension scales were used for both positive and negative affect. Each of the general dimension scales comprises of 10 item each for both dimensions. In this present study, the general positive affect scale has an internal reliability coefficient of .77, while the general negative affect scale has a coefficient of .70.</span></p><span data-dcnode-id="3092" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="3090" id="FPar7"><span data-dcnode-id="3091" instrument_node="">The Satisfaction with Life Scale</span></h3><span data-dcnode-id="3089" instrument_node="">
</span><p data-dcnode-id="3081"><span data-dcnode-id="3088" instrument_node="">(TSWLS; Diener et al. </span><a aria-label="Reference 1985" data-dcnode-id="3086" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d212967077e570" title="Diener E., Emmons R., Larsen R. J., &amp; Griffin S. (1985). The Satisfaction with Life Scale. Journal of Personality Assessment, 49, 71–75. 
https://doi.org/10.1207/s15327752jpa4901_13


"><span data-dcnode-id="3087" instrument_node="">1985</span></a><span data-dcnode-id="3085" instrument_node="">; Pavot and Diener </span><a aria-label="Reference 2008" data-dcnode-id="3083" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d212967077e573" title="Pavot, W., &amp; Diener, E. (2008). The satisfaction with life scale and the emerging construct of life satisfaction. The Journal of Positive Psychology, 3(2), 137–152. 
https://doi.org/10.1080/17439760701756946

."><span data-dcnode-id="3084" instrument_node="">2008</span></a><span data-dcnode-id="3082" instrument_node="">) is a widely used and well-validated measure, which can be applied to assess the cognitive dimension of subjective well-being. It demonstrates good psychometric properties with an alpha coefficient of .84 and includes evidence for convergent and discriminant validity. It is also a 5-point scale consisting of five (5) items rated from 1 (absolutely untrue) to 7 (absolutely true) where higher scores indicate greater satisfaction with life.</span></p><span data-dcnode-id="3080" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="3078" id="Sec6"><span data-dcnode-id="3079" instrument_node="">Procedures</span></h3><p data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">This study was reviewed and approved by the Institutional Review Board of Holy Angel University, Philiipines. Before the actual collection of data, the researcher met the concerned University Officials to formally seek approval to conduct the study. In the meeting, she assured the same ethical considerations particularly those affecting the students and how the results redounded to the promotion of their welfare. Once permission was sought, study questionnaires were administered to 300 college students enrolled in the university. Participants were read the informed consent and prior written consent was requested before administering the questionnaires.</span></p></div></div></section><section data-dcnode-id="2809" data-title="Results"><div class="c-article-section" data-dcnode-id="2810" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3071" id="Sec7"><span data-dcnode-id="3072" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="2811" id="Sec7-content"><p data-dcnode-id="3063"><span data-dcnode-id="3070" instrument_node="">Preliminary analyses were conducted to clean the study data. For analyses, the sum total scores of the scales were used to represent the study variables.Exploratory descriptive statistics were used to describe the distributions of the obtained data. Correlation analysis was carried out through the use of Pearson r to determine relationships between the study variables. To determine whether resilience mediates the relationship between optimism and subjective well-being, mediation analyses using PROCESS Macro by Hayes (</span><a aria-label="Reference 2012" data-dcnode-id="3068" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d212967077e594" title="Hayes, A. F. (2012). PROCESS: A versatile computational tool for observed variable mediation, moderation, and conditional process modeling [White paper]. Retrieved from 
http://www.afhayes.com/public/process2012.pdf


"><span data-dcnode-id="3069" instrument_node="">2012</span></a><span data-dcnode-id="3067" instrument_node="">) model 4. Since subjective well-being as conceptualized in this study comprises of life satisfaction, positive affect and the negative (lack of), three separate mediation models were analyzed with each component of subjective well-being as an outcome. For each modelStatistical analyses were conducted using the Statistical Package for Social Sciences version 22 and the mediation analysis was conducted through the use of PROCESS Macro by Hayes (</span><a aria-label="Reference 2012" data-dcnode-id="3065" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d212967077e597" title="Hayes, A. F. (2012). PROCESS: A versatile computational tool for observed variable mediation, moderation, and conditional process modeling [White paper]. Retrieved from 
http://www.afhayes.com/public/process2012.pdf


"><span data-dcnode-id="3066" instrument_node="">2012</span></a><span data-dcnode-id="3064" instrument_node="">) model 4.</span></p><p data-dcnode-id="3058"><span data-dcnode-id="3062" instrument_node="">The results of this study examining the possible associations between optimism and subjective well-being via resilience were outlined in this section. Descriptive statistics and correlations of the variables are summarized in Table </span><a data-dcnode-id="3060" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3061" instrument_node="">1</span></a><span data-dcnode-id="3059" instrument_node="">.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3043" data-test="inline-table" id="table-1"><figure data-dcnode-id="3044"><figcaption class="c-article-table__figcaption" data-dcnode-id="3055"><b data-dcnode-id="3056" data-test="table-caption" id="Tab1"><span data-dcnode-id="3057" instrument_node="">Table 1 Descriptive statistics and correlations of optimism, resilience, and subjective well-being</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3045"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="3046" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12144-020-00806-0/tables/1" rel="nofollow"><span data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3047" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3048" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3049" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3052" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3051" fill-rule="evenodd"></path><span data-dcnode-id="3050" instrument_node="">
