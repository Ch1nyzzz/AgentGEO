</span><article class="post-135888 post type-post status-publish format-standard has-post-thumbnail hentry category-optimism" data-dcnode-id="855" id="post-135888"><span data-dcnode-id="1802" instrument_node="">
</span><div class="entry-content" data-dcnode-id="857"><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1796"><img alt="Pessimism vs optimism" class="alignright wp-image-135935 size-medium lazyloaded" data-dcnode-id="1800" data-src="https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-vs-optimism-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-vs-optimism-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-vs-optimism-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-vs-optimism.jpg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/wp-content/uploads/2021/04/Pessimism-vs-optimism-300x150.jpg&amp;raw" srcset="https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-vs-optimism-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-vs-optimism-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-vs-optimism.jpg 800w" title="How mindset impacts wellbeing" width="300"><noscript data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">&lt;img class="alignright wp-image-135935 size-medium lazyload" title="How mindset impacts wellbeing" src="https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-vs-optimism-300x150.jpg" alt="Pessimism vs optimism" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-vs-optimism-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-vs-optimism-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-vs-optimism.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="1797" instrument_node="">Life experiences are interpreted through our own internal filters.</span></p><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">How we explain events to ourselves (i.e., explanatory style) is a key factor in how we respond.</span></p><span data-dcnode-id="1792" instrument_node="">
</span><p data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Pessimism, optimism, and realism represent three particularly salient and interconnected explanatory styles.</span></p><span data-dcnode-id="1789" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">This article will describe these mindsets and their relationship to psychological health. Tips, books, quotes, and resources from PositivePsychology.com are also included. So please follow along as we inspect how our mindsets influence how we navigate our way through the world.</span></p><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1781"><span data-dcnode-id="1785" instrument_node="">Before you continue, we thought you might like to </span><a data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/ebook" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1784" instrument_node="">download our three Positive Psychology Exercises for free</span></a><span data-dcnode-id="1782" instrument_node="">. These science-based exercises explore fundamental aspects of positive psychology, including strengths, values, and self-compassion, and will give you the tools to enhance the wellbeing of your clients, students, or employees.</span></p><span data-dcnode-id="1780" instrument_node="">
</span><div data-dcnode-id="1728" id="inhoud"><span data-dcnode-id="1779" instrument_node="">
</span><h2 data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">This Article Contains:</span></h2><span data-dcnode-id="1776" instrument_node="">
</span><ul data-dcnode-id="1730"><span data-dcnode-id="1775" instrument_node="">
</span><li data-dcnode-id="1772"><a data-dcnode-id="1773" href="#pessimism"><span data-dcnode-id="1774" instrument_node="">What Is Pessimism in Psychology?</span></a></li><span data-dcnode-id="1771" instrument_node="">
</span><li data-dcnode-id="1768"><a data-dcnode-id="1769" href="#optimism"><span data-dcnode-id="1770" instrument_node="">Pessimism vs Optimism and Realism</span></a></li><span data-dcnode-id="1767" instrument_node="">

</span><li data-dcnode-id="1736"><a data-dcnode-id="1737" href="#home"><span data-dcnode-id="1738" instrument_node="">A Take-Home Message</span></a></li><span data-dcnode-id="1735" instrument_node="">
</span><li data-dcnode-id="1732"><a data-dcnode-id="1733" href="#references"><span data-dcnode-id="1734" instrument_node="">References</span></a></li><span data-dcnode-id="1731" instrument_node="">

</span></div><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1725"><a data-dcnode-id="1726" name="pessimism"></a></p><span data-dcnode-id="1724" instrument_node="">
</span><h2 data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">What Is Pessimism in Psychology?</span></h2><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Pessimism is a type of explanatory style in which individuals “expect the disadvantageous outcome when facing events of unknown emotional impact” (Herwig et al., 2010, p. 789).</span></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Humans consistently search for meaning to explain life events. When a person views situations from a pessimistic mindset, this is considered a negative bias (Dember, Martin, Hummer, Howe, &amp; Melton, 1989).</span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Individuals who are pessimistic will often interpret negative events as internal, global, and stable; whereas positive events are often viewed as external, specific, and unstable (Gillham, Shatte, Reivich, &amp; Seligman, 2001). These relationships are presented in Figure 1 below.</span></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1708"><a data-dcnode-id="1710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/explanatory-styles-optimism/"><span data-dcnode-id="1711" instrument_node="">Explanatory style</span></a><span data-dcnode-id="1709" instrument_node=""> affects many aspects of life. For example, a person with a negative bias is less likely to feel resilient when dealing with stressors because they will feel a lack of personal control.</span></p><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1702"><span data-dcnode-id="1706" instrument_node="">Viewing undesirable events as due to stable, internal causes has a negative impact on </span><a data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/self-esteem/"><span data-dcnode-id="1705" instrument_node="">self-esteem</span></a><span data-dcnode-id="1703" instrument_node=""> (Gillham et al., 2001). In contrast, an optimistic disposition is associated with reduced depression and physical symptoms (Gillham et al., 2001).</span></p><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1700" instrument_node="">Importantly, however, an association between pessimism and negative outcomes is not always straightforward, as it is possible to feel simultaneously pessimistic and optimistic about a situation. Moreover, </span><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/defensive-pessimism/"><span data-dcnode-id="1699" instrument_node="">defensive pessimism</span></a><span data-dcnode-id="1697" instrument_node=""> may actually be beneficial in some situations.</span></p><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1692"><small data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">Figure 1: Relationship between explanatory style, event, and perception</span></small></p><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1686"><a data-dcnode-id="1687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/wp-content/uploads/2021/04/Relationship-between-Explanatory-Style-Event-and-Perception.jpg"><img alt="Relationship between Explanatory Style, Event, and Perception" class="aligncenter size-full wp-image-135887 lazyload" data-dcnode-id="1690" data-src="https://positivepsychology.com/wp-content/uploads/2021/04/Relationship-between-Explanatory-Style-Event-and-Perception.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2021/04/Relationship-between-Explanatory-Style-Event-and-Perception.jpg 789w, https://positivepsychology.com/wp-content/uploads/2021/04/Relationship-between-Explanatory-Style-Event-and-Perception-300x158.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/04/Relationship-between-Explanatory-Style-Event-and-Perception-768x405.jpg 768w" height="416" sizes="(max-width: 789px) 100vw, 789px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="789"><noscript data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">&lt;img class="aligncenter size-full wp-image-135887 lazyload" src="https://positivepsychology.com/wp-content/uploads/2021/04/Relationship-between-Explanatory-Style-Event-and-Perception.jpg" alt="Relationship between Explanatory Style, Event, and Perception" width="789" height="416" srcset="https://positivepsychology.com/wp-content/uploads/2021/04/Relationship-between-Explanatory-Style-Event-and-Perception.jpg 789w, https://positivepsychology.com/wp-content/uploads/2021/04/Relationship-between-Explanatory-Style-Event-and-Perception-300x158.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/04/Relationship-between-Explanatory-Style-Event-and-Perception-768x405.jpg 768w" sizes="(max-width: 789px) 100vw, 789px" /&gt;</span></noscript></a></p><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680"><a data-dcnode-id="1681" name="optimism"></a></p><span data-dcnode-id="1679" instrument_node="">
</span><h2 data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Pessimism vs Optimism and Realism</span></h2><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1668"><img alt="Pessimism vs Optimism" class="alignright wp-image-135939 size-medium lazyload" data-dcnode-id="1675" data-src="https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-1-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-1-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-1-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-1.jpg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Pessimism vs Optimism vs Realism" width="300"><noscript data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">&lt;img class="alignright wp-image-135939 size-medium lazyload" title="Pessimism vs Optimism vs Realism" src="https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-1-300x150.jpg" alt="Pessimism vs Optimism" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-1-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-1-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-1.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="1672" instrument_node="">While studies have often reported better outcomes from optimists versus pessimists (Scheier, Carver, &amp; Bridges, 1994), more recent research has also addressed the role of a realistic </span><a data-dcnode-id="1670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/mindset-activities-tests/"><span data-dcnode-id="1671" instrument_node="">mindset</span></a><span data-dcnode-id="1669" instrument_node="">, in which expectations are based in reality versus fantasy or illusion.</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">As a notable example, Chipperfield et al. (2019) addressed the role of explanatory styles in an 18-year longitudinal study assessing health expectations and health outcomes among elderly Canadians.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">The researchers found that having realistically pessimistic (versus unrealistically optimistic) health expectations was related to both reduced depressive symptoms and risk of death. Similarly, unrealistic optimism (versus realistic optimism) when health is deteriorating was associated with a 313% higher death rate.</span></p><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Clearly, optimism versus pessimism is not black and white. There is room for realism in this equation; realistic optimism serves a protective function by allowing a person to remain optimistic while accepting the reality of difficult situations.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><blockquote data-dcnode-id="1649"><p data-dcnode-id="1650"><span data-dcnode-id="1657" instrument_node="">A pessimist sees a dark tunnel.</span><br data-dcnode-id="1656"><span data-dcnode-id="1655" instrument_node="">
An optimist sees light at the end of the tunnel.</span><br data-dcnode-id="1654"><span data-dcnode-id="1653" instrument_node="">
A realist sees a freight train.</span><br data-dcnode-id="1652"><span data-dcnode-id="1651" instrument_node="">
A train driver sees three idiots standing on the tracks.</span></p></blockquote><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1643"><a data-dcnode-id="1644" name="examples"></a></p><span data-dcnode-id="1642" instrument_node="">
</span><h2 data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">3 Examples of the Different Mindsets</span></h2><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">The following vignettes highlight how mindsets affect how a person responds to a challenging situation.</span></p><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">Stephanie is an active 32-year-old woman who has been feeling fatigued lately, with a great deal of muscle pain and stiffness. She has also noticed that she’s been clumsy, forgetting things, and that one of her eyes is blurry.</span></p><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">When she goes to a specialist, Stephanie is diagnosed with recurring multiple sclerosis (MS), an autoimmune inflammatory disease that causes a wide range of neurological symptoms such as muscle weakness, vision problems, muscle numbness, and&nbsp; difficulty moving. Stephanie’s mindset will play a key role in how she manages her illness as noted below.</span></p><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1627" instrument_node="">
</span><h3 data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Unrealistically optimistic Stephanie</span></h3><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">If Stephanie is unrealistically optimistic, she is likely to view her condition as manageable, stable, and unlikely to worsen. She will not fault herself for her condition and will believe it to be a fluke, since things usually go her way.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1620" instrument_node="">Although upset by her diagnosis, she firmly believes that she has the least serious type of MS. She is confident that she will conquer her disease and get on with her life </span><em data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">just as before</span></em><span data-dcnode-id="1617" instrument_node="">.</span></p><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Stephanie immediately begins an anti-inflammatory diet, attends physical therapy, and takes her medicine regularly. Stephanie feels better, but then fails to maintain her lifestyle adjustments because she thinks she’s fine now. As a result, she has a bad flare-up, ends up in the ER, and feels terribly disappointed.</span></p><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1609" instrument_node="">
</span><h3 data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Unrealistically pessimistic Stephanie</span></h3><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">If Stephanie is an unrealistic pessimist, she is likely to view life challenges as stable, with this diagnosis serving as no exception. She might believe that the illness is a result of her lifestyle and that she could have prevented it somehow. She believes MS will ruin her life in many areas, such as work and relationships.</span></p><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Stephanie takes her medicines, but doesn’t engage in physical therapy or change her lifestyle because she feels there’s no point, given that she has a disease she can’t control. Because she doesn’t make necessary health changes, Stephanie’s MS gets much worse, and it’s not long before she finds herself depressed and unemployed.</span></p><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1597" instrument_node="">
</span><h3 data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Realistically optimistic Stephanie</span></h3><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">If Stephanie is realistically optimistic, she will receive her MS diagnosis with a healthy balance of positivism and acceptance. She will inform herself about the disease and have no illusions about her prognosis. She will take the necessary steps to reduce the impact of the disease and to enable her to maintain a meaningful, healthy lifestyle. She will change her diet and follow all of her doctor’s orders.</span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Because Stephanie is fully aware of the potential progression of MS, she won’t be knocked down if she has a flare-up. She will face her disease with resilience and will continue to partake in many activities that bring her joy.</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1583"><a data-dcnode-id="1584" name="role"></a></p><span data-dcnode-id="1582" instrument_node="">
</span><h2 data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">The Pessimism Bias: Its Role in Anxiety &amp; Depression</span></h2><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1574"><img alt="Pessimism and depression" class="alignright wp-image-135937 size-medium lazyload" data-dcnode-id="1578" data-src="https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-and-depression-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-and-depression-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-and-depression-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-and-depression.jpg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Pessimism and anxiety" width="300"><noscript data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">&lt;img class="alignright wp-image-135937 size-medium lazyload" title="Pessimism and anxiety" src="https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-and-depression-300x150.jpg" alt="Pessimism and depression" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-and-depression-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-and-depression-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/04/Pessimism-and-depression.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="1575" instrument_node="">The ability to anticipate the future has been referred to as “a hallmark of cognition” (Sharot, 2011, p. R941).</span></p><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Anticipation is necessary for survival, as it enables us to prepare for difficult situations. However, when we make sense of the world through a pessimistic lens, it leaves us vulnerable to anxiety and sadness.</span></p><span data-dcnode-id="1570" instrument_node="">
</span><blockquote data-dcnode-id="1567"><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">If you are depressed, you are living in the past. If you are anxious, you are living in the future. If you are at peace, you are living in the present.</span></p></blockquote><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1564" style="text-align: right;"><span data-dcnode-id="1565" instrument_node="">Lao Tzu</span></p><span data-dcnode-id="1563" instrument_node="">
</span><h3 data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Pessimism &amp; anxiety</span></h3><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Let’s first consider anxiety, which generally involves worry, fear, and rumination about the future (i.e., anticipatory anxiety). A highly anxious person often has a stream of what-if’s running through their mind, making it difficult to enjoy the moment.</span></p><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">If a person is pessimistic, they are more inclined to see the worst-case scenario, which only feeds anxiety. Additionally, a person who is chronically anxious is more likely to gauge ambiguous future events as unrealistically negative (Hartley &amp; Phelps, 2012).</span></p><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">The link between cognitive bias and anxiety has been supported by the literature. For example, optimism has been associated with reduced anxiety and depression among cancer patients (Zenger, Brix, Borowski, Stolzenburg, &amp; Hinz, 2010) and with lower anxiety among college students in both China (Yu, Chen, Liu, Yu, &amp; Zhao, 2015) and India (Singh &amp; Jha, 2013).</span></p><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Similarly, in a large-scale longitudinal study including Australian adolescents, those who were the most optimistic were almost half as likely to be at risk for depressive symptoms (Patton et al., 2011).</span></p><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Finally, in their meta-analysis, Alarcon, Bowling, and Khazon (2013) found that optimism was related to many aspects of positive wellbeing, including happiness and life satisfaction. Unsurprisingly, optimism also was negatively correlated with anxiety and depression.</span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1542" instrument_node="">
</span><h3 data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Pessimism &amp; depression</span></h3><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1538" instrument_node="">An explanatory style in which negative outcomes are anticipated also represents an integral ingredient of major depression (Herwig et al., 2010). Individuals with depression often feel helpless and don’t believe they have the </span><a data-dcnode-id="1536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/coping/"><span data-dcnode-id="1537" instrument_node="">coping resources</span></a><span data-dcnode-id="1535" instrument_node=""> to deal with challenges. They may be particularly hard on themselves, engaging in what Aaron Beck (1967, p. 234) has termed “systematic bias against the self.”</span></p><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">A person who is depressed may view themselves in a variety of negative ways that are untrue or grossly amplified (e.g., “I’m no good,” “I’ll never amount to anything,” “I’m worthless”). This pessimistic mindset increases depressive thinking, which serves to exacerbate pessimism. It’s a vicious cycle.</span></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Empirical research supports a positive relationship between pessimistic bias and depressive symptoms (Strunk, Lopez, &amp; DeRubeis, 2006). Significant associations between optimism and increased resilience and reduced depression among adolescents have also been reported (Niu, Fan, Zhou, Tian, &amp; Lian, 2015).</span></p><span data-dcnode-id="1527" instrument_node="">
</span><p data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Similarly, dispositional optimism among college students has been found to predict future depression (Vickers &amp; Vogeltanz, 2000). Among males middle-aged and older, optimism has also been linked to better mental health and vitality (Achat, Kawachi, Spiro, DeMolles, &amp; Sparrow, 2000).</span></p><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1519"><a data-dcnode-id="1520" name="good"></a></p><span data-dcnode-id="1518" instrument_node="">
</span><h2 data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Can Pessimism Be Good?</span></h2><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Like most everything in life, moderation is a key factor when it comes to explanatory style. For example, some people see the world through rose-colored glasses.</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">In doing so, they fail to notice, much less cope, with challenges. This repressive way of looking at things has drawbacks; just because you refuse to see a problem doesn’t mean it’s not there.</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">As with the prior example, ‘unrealistically optimistic Stephanie’ fails to comprehend the full nature of her illness, which leads to further health problems and enormous disappointment. Instead, allowing oneself to process the potential ramifications of a situation is a form of mental preparedness that helps to soften the fall during hard times.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1505" instrument_node="">The downside of a ‘</span><a data-dcnode-id="1503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/pollyanna-principle/"><span data-dcnode-id="1504" instrument_node="">Pollyanna</span></a><span data-dcnode-id="1502" instrument_node="">’ approach is indeed supported by the literature. For example, Chipperfield et al. (2019) found that overly optimistic forecasting was related to reduced psychological wellbeing and a greater risk of death.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Similarly, Forgeard and Seligman’s (2012) review suggests that ‘unmitigated and unrealistic optimism’ may lead to a range of undesirable outcomes. Of course, it’s not healthy to always expect the worst-case scenario, but by nurturing realistic optimism, we can search for “positive experiences while acknowledging what we do not know and accepting what we cannot know” (Schneider, 2001, p. 253).</span></p><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">So, go ahead and practice optimism, but make sure it is balanced with a good dose of flexibility and realism.</span></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1489"><a data-dcnode-id="1490" name="note"></a></p><span data-dcnode-id="1488" instrument_node="">
</span><h2 data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">A Note on Changing Your Mindset: 12 Tips</span></h2><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1480"><img alt="Changing your mindset" class="alignright wp-image-135938 size-medium lazyload" data-dcnode-id="1484" data-src="https://positivepsychology.com/wp-content/uploads/2021/04/Changing-your-mindset-300x169.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2021/04/Changing-your-mindset-300x169.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/04/Changing-your-mindset-1024x577.jpg 1024w, https://positivepsychology.com/wp-content/uploads/2021/04/Changing-your-mindset-768x432.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/04/Changing-your-mindset-1536x865.jpg 1536w, https://positivepsychology.com/wp-content/uploads/2021/04/Changing-your-mindset-1080x608.jpg 1080w, https://positivepsychology.com/wp-content/uploads/2021/04/Changing-your-mindset.jpg 1920w" height="169" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Optimism and rose tinted glasses" width="300"><noscript data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">&lt;img class="alignright wp-image-135938 size-medium lazyload" title="Optimism and rose tinted glasses" src="https://positivepsychology.com/wp-content/uploads/2021/04/Changing-your-mindset-300x169.jpg" alt="Changing your mindset" width="300" height="169" srcset="https://positivepsychology.com/wp-content/uploads/2021/04/Changing-your-mindset-300x169.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/04/Changing-your-mindset-1024x577.jpg 1024w, https://positivepsychology.com/wp-content/uploads/2021/04/Changing-your-mindset-768x432.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/04/Changing-your-mindset-1536x865.jpg 1536w, https://positivepsychology.com/wp-content/uploads/2021/04/Changing-your-mindset-1080x608.jpg 1080w, https://positivepsychology.com/wp-content/uploads/2021/04/Changing-your-mindset.jpg 1920w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="1481" instrument_node="">Explanatory styles are not fixed aspects of our personality; rather, they are malleable cognitive states.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Here are 12 ways to become more realistically optimistic:</span></p><span data-dcnode-id="1476" instrument_node="">
</span><ul data-dcnode-id="1386"><span data-dcnode-id="1475" instrument_node="">
</span><li data-dcnode-id="1466"><span data-dcnode-id="1474" instrument_node="">Change your expectations</span><br data-dcnode-id="1473"><span data-dcnode-id="1472" instrument_node="">
How much time and energy is wasted by feeling bad about things and people over which we have no control? Maya Angelou understood this concept when she said: “</span><em data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">When someone shows you who they are, believe them the first time</span></em><span data-dcnode-id="1469" instrument_node="">.” Imagine how much better you would feel if you simply modified your expectations to be consistent with that which you cannot change.</span><br data-dcnode-id="1468"><br data-dcnode-id="1467"></li><span data-dcnode-id="1465" instrument_node="">
</span><li data-dcnode-id="1459"><span data-dcnode-id="1464" instrument_node="">Enjoy the small things</span><br data-dcnode-id="1463"><span data-dcnode-id="1462" instrument_node="">
If you postpone happiness for big events in life, you are limiting your happiness to very few experiences. Consider the smaller, more frequent aspects of life that make you happy and you will reap the benefits.</span><br data-dcnode-id="1461"><br data-dcnode-id="1460"></li><span data-dcnode-id="1458" instrument_node="">
</span><li data-dcnode-id="1452"><span data-dcnode-id="1457" instrument_node="">Seek beauty</span><br data-dcnode-id="1456"><span data-dcnode-id="1455" instrument_node="">
Beauty is subjective. Find what is beautiful to you, such as a sunset or a garden, and savor it.</span><br data-dcnode-id="1454"><br data-dcnode-id="1453"></li><span data-dcnode-id="1451" instrument_node="">
</span><li data-dcnode-id="1445"><span data-dcnode-id="1450" instrument_node="">Visualize positivity</span><br data-dcnode-id="1449"><span data-dcnode-id="1448" instrument_node="">
Whether you use a vision board or simply your imagination, by visualizing what you desire, it feels more attainable.</span><br data-dcnode-id="1447"><br data-dcnode-id="1446"></li><span data-dcnode-id="1444" instrument_node="">
</span><li data-dcnode-id="1438"><span data-dcnode-id="1443" instrument_node="">Be realistic</span><br data-dcnode-id="1442"><span data-dcnode-id="1441" instrument_node="">
There is a happy medium between pessimism and radical optimism. Be realistic about yourself and the world around you, and it will better prepare you for what tomorrow brings.</span><br data-dcnode-id="1440"><br data-dcnode-id="1439"></li><span data-dcnode-id="1437" instrument_node="">
</span><li data-dcnode-id="1431"><span data-dcnode-id="1436" instrument_node="">Practice gratitude</span><br data-dcnode-id="1435"><span data-dcnode-id="1434" instrument_node="">
Gratitude is the antithesis of negativity. Consider and appreciate the great things in your life.</span><br data-dcnode-id="1433"><br data-dcnode-id="1432"></li><span data-dcnode-id="1430" instrument_node="">
</span><li data-dcnode-id="1424"><span data-dcnode-id="1429" instrument_node="">Start the day on a positive note</span><br data-dcnode-id="1428"><span data-dcnode-id="1427" instrument_node="">
A day goes more smoothly if it begins with a positive outlook. Remember to start the day with hope and positivity.</span><br data-dcnode-id="1426"><br data-dcnode-id="1425"></li><span data-dcnode-id="1423" instrument_node="">
</span><li data-dcnode-id="1417"><span data-dcnode-id="1422" instrument_node="">Be a positive role model</span><br data-dcnode-id="1421"><span data-dcnode-id="1420" instrument_node="">
When you behave like the optimistic person you would like your children, friends, or coworkers to emulate, you are likely to become that person.</span><br data-dcnode-id="1419"><br data-dcnode-id="1418"></li><span data-dcnode-id="1416" instrument_node="">
</span><li data-dcnode-id="1410"><span data-dcnode-id="1415" instrument_node="">Do something creative</span><br data-dcnode-id="1414"><span data-dcnode-id="1413" instrument_node="">
Creative flow is a positive and enjoyable experience. Find a creative pursuit you enjoy and your mindset will shift accordingly.</span><br data-dcnode-id="1412"><br data-dcnode-id="1411"></li><span data-dcnode-id="1409" instrument_node="">
</span><li data-dcnode-id="1403"><span data-dcnode-id="1408" instrument_node="">Don’t be too hard on yourself</span><br data-dcnode-id="1407"><span data-dcnode-id="1406" instrument_node="">
Self-love is a key aspect of a positive attitude. If you consistently berate yourself, seek ways to create more kind and loving self-talk.</span><br data-dcnode-id="1405"><br data-dcnode-id="1404"></li><span data-dcnode-id="1402" instrument_node="">
</span><li data-dcnode-id="1396"><span data-dcnode-id="1401" instrument_node="">Practice mindful meditation</span><br data-dcnode-id="1400"><span data-dcnode-id="1399" instrument_node="">
This approach enables a person to calm their ‘monkey mind’ and allow unwanted thoughts to float on by. It is an excellent way to minimize the impact of negative thoughts on emotional wellbeing.</span><br data-dcnode-id="1398"><br data-dcnode-id="1397"></li><span data-dcnode-id="1395" instrument_node="">
</span><li data-dcnode-id="1388"><span data-dcnode-id="1394" instrument_node="">Find your ikigai</span><br data-dcnode-id="1393"><span data-dcnode-id="1392" instrument_node="">
‘</span><a data-dcnode-id="1390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/ikigai/"><span data-dcnode-id="1391" instrument_node="">Ikigai</span></a><span data-dcnode-id="1389" instrument_node="">’ refers to a reason to live. It is a mindset and lifestyle that involves kindness, community, acceptance, beauty, healthy behaviors, and living in the moment. If you find your ikigai, you are far more likely to experience joy, excellent health, and a zest for life.</span></li><span data-dcnode-id="1387" instrument_node="">
</span></ul><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1380"><a data-dcnode-id="1381" name="books"></a></p><span data-dcnode-id="1379" instrument_node="">
</span><h2 data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">3 Books on the Topic</span></h2><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">There is plenty of reading material that promotes a healthy explanatory style; here are three examples:</span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1370" instrument_node="">
</span><h3 data-dcnode-id="1365"><span data-dcnode-id="1369" instrument_node="">1. </span><em data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Don’t Sweat the Small Stuff… And It’s All Small Stuff</span></em><span data-dcnode-id="1366" instrument_node=""> – Richard Carlson</span></h3><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1359"><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00HTK2E12/" rel="noopener noreferrer" target="_blank"><img alt="Don't sweat the small stuff" class="alignright wp-image-135916 lazyload" data-dcnode-id="1363" data-src="https://positivepsychology.com/wp-content/uploads/2021/04/Dont-sweat-the-small-stuff-1-252x300.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2021/04/Dont-sweat-the-small-stuff-1-252x300.jpg 252w, https://positivepsychology.com/wp-content/uploads/2021/04/Dont-sweat-the-small-stuff-1.jpg 420w" height="233" sizes="(max-width: 196px) 100vw, 196px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Don't Sweat the Small Stuff" width="196"><noscript data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">&lt;img class="alignright wp-image-135916 lazyload" title="Don't Sweat the Small Stuff" src="https://positivepsychology.com/wp-content/uploads/2021/04/Dont-sweat-the-small-stuff-1-252x300.jpg" alt="Don't sweat the small stuff" width="196" height="233" srcset="https://positivepsychology.com/wp-content/uploads/2021/04/Dont-sweat-the-small-stuff-1-252x300.jpg 252w, https://positivepsychology.com/wp-content/uploads/2021/04/Dont-sweat-the-small-stuff-1.jpg 420w" sizes="(max-width: 196px) 100vw, 196px" /&gt;</span></noscript></a></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">This highly successful book provides several simple ways to avoid overblowing difficult situations. By maintaining perspective, readers are better able to minimize anxiety.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Among the book’s many insights, readers are advised to trust their intuitions, focus on one thing at a time, and reframe challenges as teaching opportunities.</span></p><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1347"><span data-dcnode-id="1351" instrument_node="">Find the book on </span><a data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00HTK2E12/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1350" instrument_node="">Amazon</span></a><span data-dcnode-id="1348" instrument_node="">.</span></p><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1343" instrument_node="">
</span><h3 data-dcnode-id="1338"><span data-dcnode-id="1342" instrument_node="">2. </span><em data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Learned Optimism </span></em><span data-dcnode-id="1339" instrument_node="">– Martin Seligman</span></h3><span data-dcnode-id="1337" instrument_node="">

</span><p data-dcnode-id="1326"><span data-dcnode-id="1330" instrument_node="">Authored by a renowned expert in positive psychology, this informative book is the product of over 20 years of research. It contains many simple methods for embracing a constructive explanatory style and </span><a data-dcnode-id="1328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/learned-optimism/"><span data-dcnode-id="1329" instrument_node="">learned optimism</span></a><span data-dcnode-id="1327" instrument_node="">.</span></p><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">With tips that help to enhance happiness and wellbeing, this book applies to individuals of all ages.</span></p><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1321" instrument_node="">Find the book on </span><a data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//smile.amazon.com/dp/1400078393/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1320" instrument_node="">Amazon</span></a><span data-dcnode-id="1318" instrument_node="">.</span></p><span data-dcnode-id="1316" instrument_node="">

</span><h3 data-dcnode-id="1305"><span data-dcnode-id="1309" instrument_node="">3. </span><em data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">A Year of Positive Thinking: Daily Inspiration, Wisdom, and Courage</span></em><span data-dcnode-id="1306" instrument_node=""> – Cyndie Spiegel</span></h3><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1299"><a data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/1641522410/" rel="noopener noreferrer" target="_blank"><img alt="Year of positive thinking" class="alignright wp-image-135917 lazyload" data-dcnode-id="1303" data-src="https://positivepsychology.com/wp-content/uploads/2021/04/Year-of-positive-thinking-1.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2021/04/Year-of-positive-thinking-1.jpg 260w, https://positivepsychology.com/wp-content/uploads/2021/04/Year-of-positive-thinking-1-150x150.jpg 150w" height="196" sizes="(max-width: 196px) 100vw, 196px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Year of Positive Thinking" width="196"><noscript data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">&lt;img class="alignright wp-image-135917 lazyload" title="Year of Positive Thinking" src="https://positivepsychology.com/wp-content/uploads/2021/04/Year-of-positive-thinking-1.jpg" alt="Year of positive thinking" width="196" height="196" srcset="https://positivepsychology.com/wp-content/uploads/2021/04/Year-of-positive-thinking-1.jpg 260w, https://positivepsychology.com/wp-content/uploads/2021/04/Year-of-positive-thinking-1-150x150.jpg 150w" sizes="(max-width: 196px) 100vw, 196px" /&gt;</span></noscript></a></p><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">The goal of this book is to help readers develop a more positive mindset by following daily prompts for an entire year.</span></p><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">It contains a full year of tips, exercises, mantras, and other techniques aimed at promoting positive life changes.</span></p><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Grounded in psychological research, this inspirational guide provides actionable ways to enhance self-respect, courage, and positivity.</span></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1288" instrument_node="">Find the book on </span><a data-dcnode-id="1286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/1641522410/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1287" instrument_node="">Amazon</span></a><span data-dcnode-id="1285" instrument_node="">.</span></p><span data-dcnode-id="1283" instrument_node="">

</span><h2 data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">PositivePsychology.com’s Resources</span></h2><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">You’ll find many materials and further reading throughout our site that can help you or your clients develop a healthy, positive outlook.</span></p><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Here are just a few links to get you started.</span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1265" instrument_node="">
</span><h3 data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">11 Optimism Tools, Examples, and Exercises to Help Improve Your Outlook</span></h3><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1258"><a data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/optimism-tools-exercises-examples/" rel="noopener" target="_blank"><span data-dcnode-id="1261" instrument_node="">This comprehensive article</span></a><span data-dcnode-id="1259" instrument_node=""> includes information about optimism theory, along with ways to encourage optimism in therapy and among children. It also contains several optimism tests and questionnaires, worksheets, activities, and exercises.</span></p><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1254" instrument_node="">
</span><h3 data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Finding Silver Linings</span></h3><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">This exercise helps individuals find the bright side of difficult situations. It contains the following four steps:</span></p><span data-dcnode-id="1248" instrument_node="">
</span><ol data-dcnode-id="1234"><span data-dcnode-id="1247" instrument_node="">
</span><li data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Shift into a positive mindset by listing five things that are meaningful, enjoyable, or worthwhile.</span></li><span data-dcnode-id="1244" instrument_node="">
</span><li data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Identify a recent difficulty by describing a recent event that resulted in distress or frustration.</span></li><span data-dcnode-id="1241" instrument_node="">
</span><li data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Identify costs by writing down the costs associated with the event noted above.</span></li><span data-dcnode-id="1238" instrument_node="">
</span><li data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Find silver linings by listing at least three positive outcomes of the above difficulty.</span></li><span data-dcnode-id="1235" instrument_node="">
</span></ol><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Overall, by engaging in this exercise for two weeks, readers are more equipped to approach challenges with a positive perspective that promotes resilience.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1229" instrument_node="">You can access a pre-prepared version of this exercise, complete with facilitation instructions, with a subscription to the </span><a data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pro.positivepsychology.com/product/positive-psychology-toolkit-yearly-new/" rel="noopener" target="_blank"><span data-dcnode-id="1228" instrument_node="">Positive Psychology Toolkit©</span></a><span data-dcnode-id="1226" instrument_node="">.</span></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1221" instrument_node="">
</span><h3 data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">The Yes-Brain Versus the No-Brain</span></h3><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">This tool is aimed at helping individuals experience both a ‘yes’ mindset and a ‘no’ mindset in order to learn the benefits of the former. It includes the following four steps:</span></p><span data-dcnode-id="1215" instrument_node="">
</span><ol data-dcnode-id="1195"><span data-dcnode-id="1214" instrument_node="">
</span><li data-dcnode-id="1210"><span data-dcnode-id="1213" instrument_node="">Saying ‘No.’ Individuals first engage in a mindfulness exercise in which they become aware of the present moment and what happens within their bodies. The practitioner then says ‘No’ eight times in a row using a stern, low, hard voice. As this is happening, the client is asked to notice what’s happening in their body.</span><br data-dcnode-id="1212"><br data-dcnode-id="1211"></li><span data-dcnode-id="1209" instrument_node="">
</span><li data-dcnode-id="1205"><span data-dcnode-id="1208" instrument_node="">Saying ‘Yes.’ Individuals now consider how their bodies respond when the practitioner repeats the word ‘Yes’ eight times in a row, using a warm, encouraging, gentle voice.</span><br data-dcnode-id="1207"><br data-dcnode-id="1206"></li><span data-dcnode-id="1204" instrument_node="">
</span><li data-dcnode-id="1200"><span data-dcnode-id="1203" instrument_node="">Reflection. Individuals reflect on the prior steps by following prompts, such as “Did you feel differently when hearing ‘No’ and when hearing ‘Yes?’”</span><br data-dcnode-id="1202"><br data-dcnode-id="1201"></li><span data-dcnode-id="1199" instrument_node="">
</span><li data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Discussion. The practitioner now describes the client’s reactions in terms of a fight-or-flight response and how it relates to the ‘Yes’ versus ‘No’ brain. Individuals also learn that they can train their brain to become more emotionally stable, resilient, insightful, and empathetic.</span></li><span data-dcnode-id="1196" instrument_node="">
</span></ol><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">By participating in this exercise, individuals are in a better position to foster a more positive and healthy mindset.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1190" instrument_node="">Again, you can access a done-for-you template for this exercise, and over 400 more exercises, with a subscription to the </span><a data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pro.positivepsychology.com/product/positive-psychology-toolkit-yearly-new/" rel="noopener" target="_blank"><span data-dcnode-id="1189" instrument_node="">Positive Psychology Toolkit©</span></a><span data-dcnode-id="1187" instrument_node="">.</span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1182" instrument_node="">
</span><h3 data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">17 Positive Psychology Exercises</span></h3><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1178" instrument_node="">If you’re looking for more science-based ways to help others enhance their wellbeing, this signature collection contains </span><a data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/17-exercises-download" rel="noopener" target="_blank"><span data-dcnode-id="1177" instrument_node="">17 validated positive psychology tools for practitioners</span></a><span data-dcnode-id="1175" instrument_node="">. Use them to help others flourish and thrive.</span></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1168"><a data-dcnode-id="1169" name="quotes"></a></p><span data-dcnode-id="1167" instrument_node="">
</span><h2 data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">9 Popular Quotes</span></h2><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1156"><img alt="Optimism Quotes" class="alignright size-medium wp-image-135941 lazyload" data-dcnode-id="1163" data-src="https://positivepsychology.com/wp-content/uploads/2021/04/Optimism-Quotes-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2021/04/Optimism-Quotes-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/04/Optimism-Quotes-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/04/Optimism-Quotes.jpg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="300"><noscript data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">&lt;img class="alignright size-medium wp-image-135941 lazyload" src="https://positivepsychology.com/wp-content/uploads/2021/04/Optimism-Quotes-300x150.jpg" alt="Optimism Quotes" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/2021/04/Optimism-Quotes-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2021/04/Optimism-Quotes-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2021/04/Optimism-Quotes.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="1160" instrument_node="">Quotes often represent inspirational tools for embracing an </span><a data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/optimistic-explanatory-style/"><span data-dcnode-id="1159" instrument_node="">optimistic explanatory style</span></a><span data-dcnode-id="1157" instrument_node="">.</span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Here are nine examples:</span></p><span data-dcnode-id="1152" instrument_node="">
</span><blockquote data-dcnode-id="1149"><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Be optimistic like a flower. A flower never loses her optimism and will bloom with all of her beauty despite tremendous adversity.</span></p></blockquote><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1146" style="text-align: right;"><span data-dcnode-id="1147" instrument_node="">Debasish Mridha</span></p><span data-dcnode-id="1145" instrument_node="">
</span><blockquote data-dcnode-id="1142"><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Optimism is the foundation of courage.</span></p></blockquote><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1139" style="text-align: right;"><span data-dcnode-id="1140" instrument_node="">Nicholas M. Butler</span></p><span data-dcnode-id="1138" instrument_node="">
</span><blockquote data-dcnode-id="1135"><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Optimism is the madness of insisting that all is well when we are miserable.</span></p></blockquote><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132" style="text-align: right;"><span data-dcnode-id="1133" instrument_node="">Voltaire</span></p><span data-dcnode-id="1131" instrument_node="">
</span><blockquote data-dcnode-id="1128"><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">The optimism of a healthy mind is indefatigable.</span></p></blockquote><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1125" style="text-align: right;"><span data-dcnode-id="1126" instrument_node="">Margery Allingham</span></p><span data-dcnode-id="1124" instrument_node="">
</span><blockquote data-dcnode-id="1121"><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">A pessimist is a man who thinks everybody is as nasty as himself, and hates them for it.</span></p></blockquote><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118" style="text-align: right;"><span data-dcnode-id="1119" instrument_node="">George Bernard Shaw</span></p><span data-dcnode-id="1117" instrument_node="">
</span><blockquote data-dcnode-id="1114"><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">If you change the way you look at things, the things you look at change.</span></p></blockquote><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111" style="text-align: right;"><span data-dcnode-id="1112" instrument_node="">Wayne Dyer</span></p><span data-dcnode-id="1110" instrument_node="">
</span><blockquote data-dcnode-id="1107"><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Only those who attempt the absurd can achieve the impossible.</span></p></blockquote><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1104" style="text-align: right;"><span data-dcnode-id="1105" instrument_node="">Albert Einstein</span></p><span data-dcnode-id="1103" instrument_node="">
</span><blockquote data-dcnode-id="1100"><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">I’m a pessimist because of intelligence, but an optimist because of will.</span></p></blockquote><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097" style="text-align: right;"><span data-dcnode-id="1098" instrument_node="">Antonio Gramsci</span></p><span data-dcnode-id="1096" instrument_node="">
</span><blockquote data-dcnode-id="1093"><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Pessimists try to convince you the world sucks, optimists already know it does and smile anyway.</span></p></blockquote><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1090" style="text-align: right;"><span data-dcnode-id="1091" instrument_node="">Jonathan Harnisch</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1084"><a data-dcnode-id="1085" name="home"></a></p><span data-dcnode-id="1083" instrument_node="">
</span><h2 data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">A Take-Home Message</span></h2><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">There are many ways to adjust our mindsets to promote a healthy, positive approach to problems.</span></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">In fact, a combination of realism and optimism enables us to maintain positivity while bracing ourselves for disappointment.</span></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Fortunately, our explanatory styles can be changed.</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">There is no reason to hide behind rose-colored glasses; by embracing both reality and optimism, we are able to face life’s inevitable challenges with courage and perseverance.</span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1067" instrument_node="">We hope you enjoyed reading this article. Don’t forget to </span><a data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/ebook" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1066" instrument_node="">download our three Positive Psychology Exercises for free</span></a><span data-dcnode-id="1064" instrument_node="">.</span></p><span data-dcnode-id="1062" instrument_node="">
