</span><span data-dcnode-id="3888" id="freeText3982395422277495762" style="display:none"><span data-dcnode-id="3901" instrument_node="">Many of us have strong convictions. We want to advocate for causes we care about--but which ones? We want to work for change--but will the emotional toll lead to burn out?</span><br data-dcnode-id="3900"><br data-dcnode-id="3899"><span data-dcnode-id="3898" instrument_node="">Leadership coach, lawyer, photographer, and activist Karen Walrond knows that when you care deeply about the world, light can seem hard to find. But when your activism grows out of your joy--and vice versa--you begin to see light everywhere.</span><br data-dcnode-id="3897"><br data-dcnode-id="3896"><span data-dcnode-id="3895" instrument_node="">In </span><i data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">The Lightmaker's Manifesto</span></i><span data-dcnode-id="3892" instrument_node="">, Walrond helps us name the skills, values, and actions that bring us joy; identify the causes that spark our empathy and concern; and then put it all together to change the world. Creative and practical exercises, including journaling, daily intention-setting, and mindful self-compassion, are complemented by lively conversations with activists and thought leaders such as Valarie Kaur, Bren� Brown, Tarana Burke, and Zuri Adele. With stories from around the world and wisdom from those leading movements for change, Walrond beckons readers toward lives of integrity, advocacy, conviction, and joy.</span><br data-dcnode-id="3891"><br data-dcnode-id="3890"><span data-dcnode-id="3889" instrument_node="">By unearthing our passions and gifts, we learn how to joyfully advocate for justice, peace, and liberation. We learn how to become makers of light.</span></span><span data-dcnode-id="3887" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="3395" title="it was amazing"><span class="staticStar p10" data-dcnode-id="3400" size="15x15"><span data-dcnode-id="3401" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="3399" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3398" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3397" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3396" size="15x15"></span></span><span data-dcnode-id="3394" instrument_node="">

</span><span data-dcnode-id="3379" id="freeTextContainer6807686612423705560"><span data-dcnode-id="3389" instrument_node="">I was only a few pages into Karen Walrond's "The Lightmaker's Manifesto: How to Work for Change Without Losing Your Joy" when I began to realize that my reading posture had changed. </span><br data-dcnode-id="3388"><br data-dcnode-id="3387"><span data-dcnode-id="3386" instrument_node="">There are books that you read as a casual extra to a busy day. </span><br data-dcnode-id="3385"><br data-dcnode-id="3384"><span data-dcnode-id="3383" instrument_node="">There are books that help you fall to sleep. There are books with which you unwind after a busy day or a stressful week. There are books that engage. There are books that entertain. There are books that inspire. There are books that challenge. </span><br data-dcnode-id="3382"><br data-dcnode-id="3381"><span data-dcnode-id="3380" instrument_node="">Then, there</span></span><span data-dcnode-id="3378" instrument_node="">
</span><span data-dcnode-id="3279" id="freeText6807686612423705560" style="display:none"><span data-dcnode-id="3377" instrument_node="">I was only a few pages into Karen Walrond's "The Lightmaker's Manifesto: How to Work for Change Without Losing Your Joy" when I began to realize that my reading posture had changed. </span><br data-dcnode-id="3376"><br data-dcnode-id="3375"><span data-dcnode-id="3374" instrument_node="">There are books that you read as a casual extra to a busy day. </span><br data-dcnode-id="3373"><br data-dcnode-id="3372"><span data-dcnode-id="3371" instrument_node="">There are books that help you fall to sleep. There are books with which you unwind after a busy day or a stressful week. There are books that engage. There are books that entertain. There are books that inspire. There are books that challenge. </span><br data-dcnode-id="3370"><br data-dcnode-id="3369"><span data-dcnode-id="3368" instrument_node="">Then, there are those rare literary experiences where you find your entire being shifting as you read. These are the books where we put away our distractions and give ourselves to the author's world in a way that demands the full presence of heart, mind, body, and soul. </span><br data-dcnode-id="3367"><br data-dcnode-id="3366"><span data-dcnode-id="3365" instrument_node="">These are the books that take our soul and rattle it around in all the best ways. </span><br data-dcnode-id="3364"><br data-dcnode-id="3363"><span data-dcnode-id="3362" instrument_node="">Okay, maybe not ALL the best ways. Sometimes, there's a little uncomfortable squirming in there. </span><br data-dcnode-id="3361"><br data-dcnode-id="3360"><span data-dcnode-id="3359" instrument_node="">These are the books that change our lives in both tangible and intangible ways. </span><br data-dcnode-id="3358"><br data-dcnode-id="3357"><span data-dcnode-id="3356" instrument_node="">Oh, and of course, I'm building to the simple fact that Walrond's "The Lightmaker's Manifesto" is, at least for me, such a soul-shifting, soul-rattling, squirm-inducing, light-manifesting literary beacon of sorts. </span><br data-dcnode-id="3355"><br data-dcnode-id="3354"><span data-dcnode-id="3353" instrument_node="">I was only a few pages into "The Lightmaker's Manifesto" when I realized I'd set aside my distractions and contorted my body into some weird shape that immersed me in Walrond's inspirational meets perspirational universe. </span><br data-dcnode-id="3352"><br data-dcnode-id="3351"><span data-dcnode-id="3350" instrument_node="">After all, we're not really "inspired" unless we're called to action. "The Lightmaker's Manifesto" is a call to action. </span><br data-dcnode-id="3349"><br data-dcnode-id="3348"><span data-dcnode-id="3347" instrument_node="">I should explain a little bit about my own universe. It may very well help explain why "The Lightmaker's Manifesto" speaks to me with the vibrancy of a church organ as if I were sitting right next to it. </span><br data-dcnode-id="3346"><br data-dcnode-id="3345"><span data-dcnode-id="3344" instrument_node="">I'm a paraplegic/double amputee with spina bifida who's managed to survive 50+ years past my life expectancy. I'm also a longtime activist whose primary method of activism, affectionately known as "The Tenderness Tour," ended in late 2019 after 30 years not because I felt done with it and not because I'd somehow ended violence in the lives of children but because the physical strain of having wheeled over 6,000 miles by wheelchair had finally become physically too demanding to continue in a way I could convince myself was healthy. </span><br data-dcnode-id="3343"><br data-dcnode-id="3342"><span data-dcnode-id="3341" instrument_node="">I'd always promised I'd quit if it became abusive to me. I'd reached that point. </span><br data-dcnode-id="3340"><br data-dcnode-id="3339"><span data-dcnode-id="3338" instrument_node="">While I'm far from done as an activist, the truth is my soul has been restless as there was nothing quite like my Tenderness Tour and I've struggled to adapt to life without it. </span><br data-dcnode-id="3337"><br data-dcnode-id="3336"><span data-dcnode-id="3335" instrument_node="">"What's next?" is what I keep asking myself. </span><br data-dcnode-id="3334"><br data-dcnode-id="3333"><span data-dcnode-id="3332" instrument_node="">I've struggled to answer the question. </span><br data-dcnode-id="3331"><br data-dcnode-id="3330"><span data-dcnode-id="3329" instrument_node="">Into this scenario arrives "The Lightmaker's Manifesto," a work by Walrond - a leadership coach, lawyer, photographer, and activist - that serves as a reminder that joy is an essential part of activism. They are quilted together like a finely woven tapestry. It is arguable, I suppose, that my "burn-out" wasn't so much emotional as physical. However, it was no less profound. This burn-out wasn't so much the fault of anyone or anything including myself. It was the result of 30 years of a wondrous journey that most would say transcended what should have been my physical abilities. </span><br data-dcnode-id="3328"><br data-dcnode-id="3327"><span data-dcnode-id="3326" instrument_node="">In fact, it was this physical journey that took me from someone living on disability and turned me into an independent living college graduate in the workforce and living in a home I own and doing a myriad of things most would have considered impossible. </span><br data-dcnode-id="3325"><br data-dcnode-id="3324"><span data-dcnode-id="3323" instrument_node="">Simple things. Meaningful things. </span><br data-dcnode-id="3322"><br data-dcnode-id="3321"><span data-dcnode-id="3320" instrument_node="">How do I find that light again now that my body has changed and demanded self-care?</span><br data-dcnode-id="3319"><br data-dcnode-id="3318"><span data-dcnode-id="3317" instrument_node="">"The Lightmaker's Manifesto" has helped illuminate this activist's heart moving forward. </span><br data-dcnode-id="3316"><br data-dcnode-id="3315"><span data-dcnode-id="3314" instrument_node="">Instead of merely reading "The Lightmaker's Manifesto," I found that I began dialoguing with it. I found that I was stopping, taking notes, writing down ideas, and even following exercises that technically didn't come until book's end but that I was fully absorbing even as Walrond's storytelling continued. </span><br data-dcnode-id="3313"><br data-dcnode-id="3312"><span data-dcnode-id="3311" instrument_node="">"The Lightmaker's Manifesto" became an experiential book for me as almost immediately I found myself putting these ideas into actions and began reimagining what my activism could look like in a way that is both meaningful and filled with the joy I experienced traveling the roads by wheelchair and meeting people 1:1. </span><br data-dcnode-id="3310"><br data-dcnode-id="3309"><span data-dcnode-id="3308" instrument_node="">I began to tangibly realize the skills, actions, and values that bring me joy and to get back in touch with the causes that pique my curiosity. I embraced the words of Walrond's fellow activists including several whose works I've read including, most recently, Valarie Kaur. </span><br data-dcnode-id="3307"><br data-dcnode-id="3306"><span data-dcnode-id="3305" instrument_node="">I began to realize that many of the ingredients that led to my years of activism - integrity, joy, relationship, and interdependence - could be successfully reimagined and nurtured toward new manifestations of my passions and curiosities. </span><br data-dcnode-id="3304"><br data-dcnode-id="3303"><span data-dcnode-id="3302" instrument_node="">Oh, and that was really the thing here. Instead of withdrawing into my grief and resignation, I began to feel that curiosity rising again. </span><br data-dcnode-id="3301"><br data-dcnode-id="3300"><span data-dcnode-id="3299" instrument_node="">I stopped feeling sorry for myself without translating that into an absence of self-care. I accepted, I suppose, that this end was necessary physically but it wasn't the end of my activism - simply the end, perhaps, of one expression of it. </span><br data-dcnode-id="3298"><br data-dcnode-id="3297"><span data-dcnode-id="3296" instrument_node="">Oh my. </span><br data-dcnode-id="3295"><br data-dcnode-id="3294"><span data-dcnode-id="3293" instrument_node="">"The Lightmaker's Manifesto" is a weaving together of Walrond's personal and professional experiences along with the relationships and star circles she's grown along the way. It's a call to action not for the sake of action but for the sake of humanity and joy. </span><br data-dcnode-id="3292"><br data-dcnode-id="3291"><span data-dcnode-id="3290" instrument_node="">"The Lightmaker's Manifesto" is, for me, a lighted path toward more meaningful activism and toward a personal joy that allows activism to be sustained. It's a manifesto of light that calls us not just into being activists but also into being advocates for ourselves and our fellow activists. </span><br data-dcnode-id="3289"><br data-dcnode-id="3288"><span data-dcnode-id="3287" instrument_node="">Perhaps, more than anything, "The Lightmaker's Manifesto" is for me a reminder that showing up with joy is in itself activism and that some of our greatest activists, Audre Lord being a tremendous example, are our most vulnerable and transparent activists. </span><br data-dcnode-id="3286"><br data-dcnode-id="3285"><span data-dcnode-id="3284" instrument_node="">For me, "The Lightmaker's Manifesto" is a celebration of the tapestry of activism and its many diverse expressions. It's a reminder that, for me, even as my physical being changes my activism can be expressed in a myriad of ways when I do what brings me joy and explore the gifts, skills, beliefs, and relationships that have long guided my activism. </span><br data-dcnode-id="3283"><br data-dcnode-id="3282"><span data-dcnode-id="3281" instrument_node="">Quite simply, "The Lightmaker's Manifesto" is my not so gentle reminder that it's time to get back to work. </span><br data-dcnode-id="3280"></span><span data-dcnode-id="3278" instrument_node="">

</span><span data-dcnode-id="3115" id="freeText13903420774623224449" style="display:none"><span data-dcnode-id="3119" instrument_node="">This book shines a light that is desperately needed in a time when persistent crises threaten our hope and joy. Karen Walrond illuminates through stories (both her own and those of other well-known activists such as Tarana Burke, Valarie Kaur, and Brené Brown) the necessity of holding onto joy while working for change. The Lightmaker’s Manifesto provides thoughtful and practical exercises on listening for the whispers that motivate and inspire us, finding our light words, and creating a spark statement to guide our actions, keeping our light shining and avoid burning out.</span><br data-dcnode-id="3118"><br data-dcnode-id="3117"><span data-dcnode-id="3116" instrument_node="">After reading it, I am newly inspired to continue the work I feel called to do, motivated by self-awareness of my values and mission, and energized by practices that will keep me seeking light and joy along the way.</span></span><span data-dcnode-id="3114" instrument_node="">

</span><span data-dcnode-id="2713" id="freeTextContainer7779959008321926770"><span data-dcnode-id="2726" instrument_node="">This book is a joyful spark to action.</span><br data-dcnode-id="2725"><span data-dcnode-id="2724" instrument_node=""> </span><br data-dcnode-id="2723"><span data-dcnode-id="2722" instrument_node="">I'll be honest with you: These days I hesitate to call myself an activist. </span><br data-dcnode-id="2721"><span data-dcnode-id="2720" instrument_node=""> </span><br data-dcnode-id="2719"><span data-dcnode-id="2718" instrument_node="">I generally despise labels and constraints, plus there has been so much anger and suffering lately — add a pinch of self-imposed guilt for not doing “enough” (is it ever enough?) and I wasn’t sure I was the right reader for this book. Boy, was I wrong. </span><br data-dcnode-id="2717"><span data-dcnode-id="2716" instrument_node=""> </span><br data-dcnode-id="2715"><span data-dcnode-id="2714" instrument_node="">Karen and the unexpected activists she shares with us in the pages of The Lightmaker’s Manifesto have a way of gently shaking those</span></span><span data-dcnode-id="2712" instrument_node="">
</span><span data-dcnode-id="2670" id="freeText7779959008321926770" style="display:none"><span data-dcnode-id="2711" instrument_node="">This book is a joyful spark to action.</span><br data-dcnode-id="2710"><span data-dcnode-id="2709" instrument_node=""> </span><br data-dcnode-id="2708"><span data-dcnode-id="2707" instrument_node="">I'll be honest with you: These days I hesitate to call myself an activist. </span><br data-dcnode-id="2706"><span data-dcnode-id="2705" instrument_node=""> </span><br data-dcnode-id="2704"><span data-dcnode-id="2703" instrument_node="">I generally despise labels and constraints, plus there has been so much anger and suffering lately — add a pinch of self-imposed guilt for not doing “enough” (is it ever enough?) and I wasn’t sure I was the right reader for this book. Boy, was I wrong. </span><br data-dcnode-id="2702"><span data-dcnode-id="2701" instrument_node=""> </span><br data-dcnode-id="2700"><span data-dcnode-id="2699" instrument_node="">Karen and the unexpected activists she shares with us in the pages of The Lightmaker’s Manifesto have a way of gently shaking those doubts out of you and reminding you that you deserve to get to know yourself — it is the best way to know what you are capable of and that action without joy is exhausting. </span><br data-dcnode-id="2698"><span data-dcnode-id="2697" instrument_node=""> </span><br data-dcnode-id="2696"><span data-dcnode-id="2695" instrument_node="">You don’t have to call yourself anything. You can just act. But how?</span><br data-dcnode-id="2694"><span data-dcnode-id="2693" instrument_node=""> </span><br data-dcnode-id="2692"><span data-dcnode-id="2691" instrument_node="">Even if you don’t know what lights you up this book will teach you how to discover what those things are for yourself. Yes, it’s not just one thing! </span><br data-dcnode-id="2690"><span data-dcnode-id="2689" instrument_node=""> </span><br data-dcnode-id="2688"><span data-dcnode-id="2687" instrument_node="">The guidance in getting to know yourself alone is worth the price of the book. </span><br data-dcnode-id="2686"><br data-dcnode-id="2685"><span data-dcnode-id="2684" instrument_node="">The framework for this work is around joyful activism, but what this book is really about is discovering your soul’s purpose and putting it into action. </span><br data-dcnode-id="2683"><br data-dcnode-id="2682"><span data-dcnode-id="2681" instrument_node="">What is activism if not doing what lights you up so that your light may light the way for others? </span><br data-dcnode-id="2680"><span data-dcnode-id="2679" instrument_node=""> </span><br data-dcnode-id="2678"><span data-dcnode-id="2677" instrument_node="">The Lightmaker’s Manifesto is exactly as long as it needs to be and not a word longer. Karen is an engineer by training and she balances the soulful and the practical masterfully — the last third of the book is a simple and direct guide to exploring the deep mysteries inside of you. </span><br data-dcnode-id="2676"><span data-dcnode-id="2675" instrument_node=""> </span><br data-dcnode-id="2674"><span data-dcnode-id="2673" instrument_node="">The time you spend with the people in this book will inspire you to lead profound change — whether internally and/or externally is up to you. </span><br data-dcnode-id="2672"><span data-dcnode-id="2671" instrument_node=""> </span></span><span data-dcnode-id="2669" instrument_node="">

</span><span data-dcnode-id="2591" id="freeTextContainer10736902402499309858"><span data-dcnode-id="2595" instrument_node="">The Lightmaker's Manifesto isn't a self-help book, it is a finding-your-passion book. It is, and isn't, an easy read. Its a book that requires two, TWO, bookmarks. One for the chapters and another for the exercises in the back of the book. It is a book that could change your life for the better, if you let it. </span><br data-dcnode-id="2594"><br data-dcnode-id="2593"><span data-dcnode-id="2592" instrument_node="">Karen Walrond's book, The Lightmaker's Manifesto is a compelling story of a woman trying to find her way to claiming the title activist. She shares parts of her journey with the reality of</span></span><span data-dcnode-id="2590" instrument_node="">
</span><span data-dcnode-id="2582" id="freeText10736902402499309858" style="display:none"><span data-dcnode-id="2589" instrument_node="">The Lightmaker's Manifesto isn't a self-help book, it is a finding-your-passion book. It is, and isn't, an easy read. Its a book that requires two, TWO, bookmarks. One for the chapters and another for the exercises in the back of the book. It is a book that could change your life for the better, if you let it. </span><br data-dcnode-id="2588"><br data-dcnode-id="2587"><span data-dcnode-id="2586" instrument_node="">Karen Walrond's book, The Lightmaker's Manifesto is a compelling story of a woman trying to find her way to claiming the title activist. She shares parts of her journey with the reality of their curves and lifts up the profound meaning those curves have given her. Her writing style allows her journey to walk with you through the book. The writing shows the positive psychology she talks about. You can tell she tries to practice what she is writing. The exercises are simple but lead to real depth. I read this book at a time in my life when big changes were causing me to lose some of my sense of light. We are so often tossed by the changes and chances of this world like leaves in a breeze, but remembering our passions, our motivations, our light, allows us to enjoy the ride. I highly recommend this book to anyone feeling listless or confused about the ways they are acting in public or feeling overwhelmed by the immensity of issues facing our global village. While many of us believe that we can make a difference, no matter how small, we still get caught up in choosing one cause, not getting overwhelmed, or simply not knowing how to make the most of our time. This book helps you focus on your cause, your passion, your light, so that you can make a difference and enjoy the journey. </span><br data-dcnode-id="2585"><br data-dcnode-id="2584"><span data-dcnode-id="2583" instrument_node="">This book will help you find the motivation to change the world.</span></span><span data-dcnode-id="2581" instrument_node="">

</span><span data-dcnode-id="2408" id="freeTextContainer7905130118675159436"><span data-dcnode-id="2415" instrument_node="">2020 and 2021 have been tough years by all accounts. There's so much going on in the world and it's easy to feel frozen to inaction by all of it. It's easy to feel overwhelmed or dejected or even numb to all of it. </span><br data-dcnode-id="2414"><br data-dcnode-id="2413"><span data-dcnode-id="2412" instrument_node="">And yet. </span><br data-dcnode-id="2411"><br data-dcnode-id="2410"><span data-dcnode-id="2409" instrument_node="">Karen Walrond's book is a light that shines your way to joy and possibility. Walrond is a coach, lawyer, photographer, and activist. She's also a wonderful storyteller. Regardless of where you are in your journey to activism, there's something in this book for you. There are </span></span><span data-dcnode-id="2407" instrument_node="">
</span><span data-dcnode-id="2387" id="freeText7905130118675159436" style="display:none"><span data-dcnode-id="2406" instrument_node="">2020 and 2021 have been tough years by all accounts. There's so much going on in the world and it's easy to feel frozen to inaction by all of it. It's easy to feel overwhelmed or dejected or even numb to all of it. </span><br data-dcnode-id="2405"><br data-dcnode-id="2404"><span data-dcnode-id="2403" instrument_node="">And yet. </span><br data-dcnode-id="2402"><br data-dcnode-id="2401"><span data-dcnode-id="2400" instrument_node="">Karen Walrond's book is a light that shines your way to joy and possibility. Walrond is a coach, lawyer, photographer, and activist. She's also a wonderful storyteller. Regardless of where you are in your journey to activism, there's something in this book for you. There are inspiring stories, motivational examples, clear action and next steps and a full workbook for you to design your own personal journey. </span><br data-dcnode-id="2399"><br data-dcnode-id="2398"><span data-dcnode-id="2397" instrument_node="">There are varied examples of people taking action and practicing activism in a wide range of ways. Yet what they have in common is that they understand what deeply motivates them to do the work that they show up for. They know how to take breaks and they know how to add joy into their day to day so they can keep showing up and make this world a better place for all of us. </span><br data-dcnode-id="2396"><br data-dcnode-id="2395"><span data-dcnode-id="2394" instrument_node="">This is one of the most inspiring books I've read all year. </span><br data-dcnode-id="2393"><br data-dcnode-id="2392"><span data-dcnode-id="2391" instrument_node="">I've taken online classes by Walrond before and some of the exercises in the book are ones I've done in the past and yet I can't wait to sit and do them all over again. I feel motivated, hopeful and joyful all at once and I cannot recommend this book enough. </span><br data-dcnode-id="2390"><br data-dcnode-id="2389"><span data-dcnode-id="2388" instrument_node="">with gratitude to Broadleaf Books and netgalley for an advanced copy in exchange for an honest review.</span></span><span data-dcnode-id="2386" instrument_node="">

</span><span data-dcnode-id="2052" id="freeTextContainer8123996847710013566"><span data-dcnode-id="2056" instrument_node="">I am not normally a self-help/personal growth/happiness book reader, but I happily devoured this book - The Lightmaker's Manifesto: How to Work for Change Without Losing Your Joy - because I know the author, Karen Walrond, to be a light-filled human who practices what she preaches. Lawyer, engineer, leadership coach, photographer, mom and wife, Karen is also a wonderful speaker and a talented writer. </span><br data-dcnode-id="2055"><br data-dcnode-id="2054"><span data-dcnode-id="2053" instrument_node="">The Lightmaker's Manifesto did not disappoint. This book was filled with light and love and enco</span></span><span data-dcnode-id="2051" instrument_node="">
</span><span data-dcnode-id="2046" id="freeText8123996847710013566" style="display:none"><span data-dcnode-id="2050" instrument_node="">I am not normally a self-help/personal growth/happiness book reader, but I happily devoured this book - The Lightmaker's Manifesto: How to Work for Change Without Losing Your Joy - because I know the author, Karen Walrond, to be a light-filled human who practices what she preaches. Lawyer, engineer, leadership coach, photographer, mom and wife, Karen is also a wonderful speaker and a talented writer. </span><br data-dcnode-id="2049"><br data-dcnode-id="2048"><span data-dcnode-id="2047" instrument_node="">The Lightmaker's Manifesto did not disappoint. This book was filled with light and love and encouragement. The encouragement came not just from Karen but also from her activist friends - Asha Dornfest, Brene Brown, Valarie Kaur, Tarana Burke and Brad Montegue to name a few. Karen encouraged me to listen to my own heart's whispers and see my own activism as joy-filled. The book was well organized and compelling reading. I especially loved the "manual" at the end with journal prompts, templates and exercises to cultivate my own "joy-filled advocacy practice." I underlined and bookmarked the whole time I was reading the book. Now I am starting a fresh journal to explore some new ideas that came from reading this book. I have lots to think about, thanks to this provoking book. </span></span><span data-dcnode-id="2045" instrument_node="">

</span><span data-dcnode-id="1663" id="freeTextContainer11848181461996596339"><span data-dcnode-id="1667" instrument_node="">The Lightmaker's Manifesto is the guide to being an activist that I didn't know I needed. This book is helping me become more clear on what my values actually are and how I can best put them into action in a way that is helpful and healing. </span><br data-dcnode-id="1666"><br data-dcnode-id="1665"><span data-dcnode-id="1664" instrument_node="">I thought being an activist meant I needed to be angry all the time. I have worked hard to live a life of peace which includes feeling anger and letting it go. So, I had a bit of a conundrum when it came to activism. Walrond's book helps us to first recognize</span></span><span data-dcnode-id="1662" instrument_node="">
</span><span data-dcnode-id="1654" id="freeText11848181461996596339" style="display:none"><span data-dcnode-id="1661" instrument_node="">The Lightmaker's Manifesto is the guide to being an activist that I didn't know I needed. This book is helping me become more clear on what my values actually are and how I can best put them into action in a way that is helpful and healing. </span><br data-dcnode-id="1660"><br data-dcnode-id="1659"><span data-dcnode-id="1658" instrument_node="">I thought being an activist meant I needed to be angry all the time. I have worked hard to live a life of peace which includes feeling anger and letting it go. So, I had a bit of a conundrum when it came to activism. Walrond's book helps us to first recognize the intersection between activism and joy, and then to understand that joy is necessary in activism. Without joy, we will not be able to sustain our efforts for positive change.</span><br data-dcnode-id="1657"><br data-dcnode-id="1656"><span data-dcnode-id="1655" instrument_node="">She also reminds us that there are as many ways to be an activist as there are people. The exercises at the end of the book are just what is needed to help gain clarity and fine tune how we can each show up and shine our lights in the world. We can all be lightmakers!</span></span><span data-dcnode-id="1653" instrument_node="">

</span><span data-dcnode-id="1481" id="freeTextContainer11950732606283496110"><span data-dcnode-id="1485" instrument_node="">How I came to this book: I saw it on my stepmom’s shelf and was interested because she does a lot of advocacy work and I am interested in pursuing more service-oriented work. </span><br data-dcnode-id="1484"><br data-dcnode-id="1483"><span data-dcnode-id="1482" instrument_node="">Review: I felt a bit deceived by the title, as this book focused mostly on how to inspire one’s self to activism, and less about how to pursue it while avoiding burnout. Walrond also defines activism fairly narrowly through her examples, which include social justice advocacy in various art forms like writing, acting, photog</span></span><span data-dcnode-id="1480" instrument_node="">
</span><span data-dcnode-id="1469" id="freeText11950732606283496110" style="display:none"><span data-dcnode-id="1479" instrument_node="">How I came to this book: I saw it on my stepmom’s shelf and was interested because she does a lot of advocacy work and I am interested in pursuing more service-oriented work. </span><br data-dcnode-id="1478"><br data-dcnode-id="1477"><span data-dcnode-id="1476" instrument_node="">Review: I felt a bit deceived by the title, as this book focused mostly on how to inspire one’s self to activism, and less about how to pursue it while avoiding burnout. Walrond also defines activism fairly narrowly through her examples, which include social justice advocacy in various art forms like writing, acting, photography, etc. I wish there were more examples, such as going into more depth on the healthcare workers in Kenya that she opens and closes the book with. I also would have liked to see more struggle from her examples, including herself. She will briefly say things like “so and so felt lost” without expounding and so it was hard to tell if the advice would truly stop one from “losing your joy” when the going gets tough. The book is positive and aims to be inspiring, but needed more darkness to bring that light into relief. I admit I didn’t get as much out of this book because I already do a lot of journaling, personal mission statements, and goal setting, which are the most concrete/practical pieces of advice she offers.</span><br data-dcnode-id="1475"><br data-dcnode-id="1474"><span data-dcnode-id="1473" instrument_node="">Read this book if: You think you want to be an activist but don’t know how, are interested in some ideas for journaling and self-care.</span><br data-dcnode-id="1472"><br data-dcnode-id="1471"><span data-dcnode-id="1470" instrument_node="">Don’t read this book if: you already have a fairly clear mission and are looking for advice to avoid burnout.</span></span><span data-dcnode-id="1468" instrument_node="">

</span><span data-dcnode-id="1393" id="freeTextContainer7859998620788299876"><span data-dcnode-id="1398" instrument_node="">4.5/5</span><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">'The Lightmaker's Manifesto: How to Work for Change Without Losing Your Joy' by Karen Walrond is an inspiring book that looks at how to work for change while staying engaged and finding joy in the work. Walrond shares anecdotes from her own life as well as talking to some of her activist friends on what they do to keep motivated, especially while fighting for change. The book melds these small memoir moments with Walrond's larger takeaways to create an inspiring and uplifting book. </span><br data-dcnode-id="1395"><span data-dcnode-id="1394" instrument_node="">I think </span></span><span data-dcnode-id="1392" instrument_node="">
</span><span data-dcnode-id="1382" id="freeText7859998620788299876" style="display:none"><span data-dcnode-id="1391" instrument_node="">4.5/5</span><br data-dcnode-id="1390"><span data-dcnode-id="1389" instrument_node="">'The Lightmaker's Manifesto: How to Work for Change Without Losing Your Joy' by Karen Walrond is an inspiring book that looks at how to work for change while staying engaged and finding joy in the work. Walrond shares anecdotes from her own life as well as talking to some of her activist friends on what they do to keep motivated, especially while fighting for change. The book melds these small memoir moments with Walrond's larger takeaways to create an inspiring and uplifting book. </span><br data-dcnode-id="1388"><span data-dcnode-id="1387" instrument_node="">I think this is essential reading for anyone that wants to make a difference while still supporting their own joy. Walrond's approach and the way that she pulls from her friends' work means that I think there is something for everyone to take away from this book. This is especially well set up if you are someone starting out who is trying to find the thing you want to do to impact change. </span><br data-dcnode-id="1386"><span data-dcnode-id="1385" instrument_node="">One of my favorite aspects of the book is the last section, where Walrond shares journal prompts, inspiration, and concrete steps that readers can take to figure out what sparks their joy. For this reason, I would recommend a physical copy of this book though it would be great paired with the audiobook, which Walrond reads herself. </span><br data-dcnode-id="1384"><span data-dcnode-id="1383" instrument_node="">I think anyone and everyone could benefit from this book, particularly if you are just starting out trying to find out how you want to enact change with purpose and joy.</span></span><span data-dcnode-id="1381" instrument_node="">

</span><span data-dcnode-id="1301" id="freeTextContainer13097490023865933831"><span data-dcnode-id="1305" instrument_node="">As someone who didn't feel called to activism until later in life (in my late thirties, during the 2016 election) I've done a lot of reading, workshops, and seminars on activism. In some ways I wanted to help find ways to fit it into my already crowded life, in some ways I want to make sure I was a "real" activist, and mostly I just wanted to find out what to do. </span><br data-dcnode-id="1304"><br data-dcnode-id="1303"><span data-dcnode-id="1302" instrument_node="">This book has been the best guide I've ever experienced for all of those things. It doesn't motivate with fear or make activism unappr</span></span><span data-dcnode-id="1300" instrument_node="">
</span><span data-dcnode-id="1295" id="freeText13097490023865933831" style="display:none"><span data-dcnode-id="1299" instrument_node="">As someone who didn't feel called to activism until later in life (in my late thirties, during the 2016 election) I've done a lot of reading, workshops, and seminars on activism. In some ways I wanted to help find ways to fit it into my already crowded life, in some ways I want to make sure I was a "real" activist, and mostly I just wanted to find out what to do. </span><br data-dcnode-id="1298"><br data-dcnode-id="1297"><span data-dcnode-id="1296" instrument_node="">This book has been the best guide I've ever experienced for all of those things. It doesn't motivate with fear or make activism unapproachable, and it invites you to understand the inner spark - the light - that light makers in many different areas have while encouraging you to uncover your own. I would often find while reading that maybe I had heard the ideas before, but Karen Walrond presents them in such a way that they seem completely relevant and real, not as lofty ideals to aspire to someday. On a personal note, I've tried journaling off and on many many times over the years and just could never seem to get it to stick, yet based on Karen's advice I've been able to successfully journal for a week now, and I don't have to force myself to do it - it just happens. I'm working my way through other tools and exercises that she's outlined now and feel a lot more inspired.</span></span><span data-dcnode-id="1294" instrument_node="">

</span><span data-dcnode-id="1204" id="freeText11947383566210173615" style="display:none"><span data-dcnode-id="1211" instrument_node="">This book gave an entirely different perspective about what activism is (and is not). Something that I hope and pray many would be able to read, know, and experience themselves. I never thought I'd ever consider myself an activist until I read this book. Truly eye-opening. Utterly challenging. </span><br data-dcnode-id="1210"><br data-dcnode-id="1209"><span data-dcnode-id="1208" instrument_node="">I love how Karen Walrond has put it during her podcast conversation with Brené Brown:</span><br data-dcnode-id="1207"><br data-dcnode-id="1206"><span data-dcnode-id="1205" instrument_node="">"...I like to define activism, which is not about putting yourself in physical peril. I like to say that activism is being led by your values to do something that helps other people and makes the world brighter for other people. And the really important part of that is that you do something. The root of activism is actus, meaning to act, to do a deed, and so it requires a something, like you’re moved to do something from your values, and it can’t be just to help yourself. It may help a community of which you are a part, but it’s meant to be other facing. It’s supposed to help other people. So yeah, a full action, and nobody says that action has to be gigantic or death defying."</span></span><span data-dcnode-id="1203" instrument_node="">

</span><span data-dcnode-id="1048" id="freeTextContainer15742240247566941966"><span data-dcnode-id="1049" instrument_node="">5 / 5 ⭐: A truly wonderful, poignant, and needed read for any and all changemakers. Something that I've really struggled with in social justice circles in the past few years is the insistence on ruminating in anger and self-righteousness. Though those are almost always deeply warranted, they are also unsustainable and not terribly effective in the long-term. The Lightmaker's Manifesto finally brought to light (hah, couldn't help it) the need for joy, compassion, and straight-up PLAY in activism!</span></span><span data-dcnode-id="1047" instrument_node="">
</span><span data-dcnode-id="1045" id="freeText15742240247566941966" style="display:none"><span data-dcnode-id="1046" instrument_node="">5 / 5 ⭐: A truly wonderful, poignant, and needed read for any and all changemakers. Something that I've really struggled with in social justice circles in the past few years is the insistence on ruminating in anger and self-righteousness. Though those are almost always deeply warranted, they are also unsustainable and not terribly effective in the long-term. The Lightmaker's Manifesto finally brought to light (hah, couldn't help it) the need for joy, compassion, and straight-up PLAY in activism! It was joyful, brilliant, and a true manual. I can't wait to apply this to my current and future plans!</span></span><span data-dcnode-id="1044" instrument_node="">

</span><span data-dcnode-id="348" id="freeTextContainer13838940998274649479"><span data-dcnode-id="352" instrument_node="">Nationally renowned for her ability to see the beauty in the world around us, Karen Walrond, a former engineer and attorney, is the author of the photoblog </span><a data-dcnode-id="350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chookooloonks.com/" rel="nofollow noopener"><span data-dcnode-id="351" instrument_node="">Chookooloonks</span></a><span data-dcnode-id="349" instrument_node="">, which pairs striking imagery and inspiring words to provide evidence that the ordinary is, in fact, extraordinary. Published online since 2004, Chookooloonks has garnered many awards, including Best Eye Candy Blog 2010 of the 201</span></span><span data-dcnode-id="347" instrument_node="">
</span><span data-dcnode-id="327" id="freeText13838940998274649479" style="display:none"><span data-dcnode-id="346" instrument_node="">Nationally renowned for her ability to see the beauty in the world around us, Karen Walrond, a former engineer and attorney, is the author of the photoblog </span><a data-dcnode-id="344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.chookooloonks.com/" rel="nofollow noopener"><span data-dcnode-id="345" instrument_node="">Chookooloonks</span></a><span data-dcnode-id="343" instrument_node="">, which pairs striking imagery and inspiring words to provide evidence that the ordinary is, in fact, extraordinary. Published online since 2004, Chookooloonks has garnered many awards, including Best Eye Candy Blog 2010 of the 2010 BlogLuxe awards and judge's pick for best photoblog of the Black Weblogs Awards. She is a contributor to the new book </span><a data-dcnode-id="341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Expressive-Photography-Shutter-Sisters-Shooting/dp/0240813472/%3Ftag%3Dchookooloonks-20" rel="nofollow noopener"><span data-dcnode-id="342" instrument_node="">Expressive Photography: A Shutter Sisters' Guide to Shooting from the Heart</span></a><span data-dcnode-id="340" instrument_node="">. Her art pieces and projects shave been included in exhibits around the country, and her writing and other work has been featured on CNN.com, Good Housekeeping, Wondertime magazine among others. Karen is a seasoned public speaker and has appeared on both local and national television, including The Oprah Winfrey Show.</span><br data-dcnode-id="339"><br data-dcnode-id="338"><span data-dcnode-id="337" instrument_node="">Karen's new book, </span><a data-dcnode-id="335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Beauty-Different-Karen-Walrond/dp/1933979968/%3Ftag%3Dchookooloonks-20" rel="nofollow noopener"><span data-dcnode-id="336" instrument_node="">The Beauty of Different</span></a><span data-dcnode-id="334" instrument_node="">, is a chronicle of imagery and portraiture combined with written essays and observations on the concept that what makes us different makes us beautiful -- and may even be the source of our superpowers. It is available for order from both </span><a data-dcnode-id="332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//brightskypress.com/infostore/ca.cart.asp%3FsAction%3DDisplayDetails%26pid%3D182%26id%3D227" rel="nofollow noopener"><span data-dcnode-id="333" instrument_node="">Bright Sky Press</span></a><span data-dcnode-id="331" instrument_node=""> and </span><a data-dcnode-id="329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Beauty-Different-Karen-Walrond/dp/1933979968/%3Ftag%3Dchookooloonks-20" rel="nofollow noopener"><span data-dcnode-id="330" instrument_node="">Amazon</span></a><span data-dcnode-id="328" instrument_node="">.</span></span><span data-dcnode-id="326" instrument_node="">
