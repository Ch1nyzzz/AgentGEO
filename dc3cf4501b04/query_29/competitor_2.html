e-taxonomy menu-item-object-category menu-item-34748" data-dcnode-id="682" id="menu-item-34748"><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenchildmagazine.com/category/food-and-recipes/"><span data-dcnode-id="684" instrument_node="">Food &amp; Recipes</span></a></li></ul></div></div></section></div></div></div><div class="site-inner" data-dcnode-id="255"><div class="content-sidebar-wrap" data-dcnode-id="256"><main class="content" data-dcnode-id="270" id="genesis-content"><article aria-label="The Benefits of Positive Parenting &amp; How to Cultivate It in Your Family" class="post-16949 post type-post status-publish format-standard has-post-thumbnail category-family-fun category-just-for-mom category-mindfulness category-parenting category-self-care tag-attachment-parenting-2 tag-conscious-kids tag-green-parenting tag-meditation tag-mindfulness entry" data-dcnode-id="352"><header class="entry-header" data-dcnode-id="637"><h1 class="entry-title" data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">The Benefits of Positive Parenting &amp; How to Cultivate It in Your Family</span></h1><p class="entry-meta" data-dcnode-id="660"><span data-dcnode-id="672" instrument_node="">Last updated on </span><time class="entry-modified-time" data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">July 8, 2019</span></time><span data-dcnode-id="669" instrument_node=""> By </span><span class="entry-author" data-dcnode-id="665"><a class="entry-author-link" data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenchildmagazine.com/author/stacy-i-roth/" rel="author"><span class="entry-author-name" data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Stacy Roth</span></span></a></span><span data-dcnode-id="664" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="661"><a data-dcnode-id="662" href="#respond"><span data  4-24.286 17.429t-30.857 21.714-29.714 18.571-32.857 15.429-28.571 5.143h-1.143q-13.143 0-28.571-5.143t-32.857-15.429-29.714-18.571-30.857-21.714-24.286-17.429q-52-36.571-149.714-104.286t-117.143-81.429q-35.429-24-66.857-66t-31.429-78q0-44.571 23.714-74.286t67.714-29.714h841.143q37.143 0 64.286 26.857t27.143 64.571z" data-dcnode-id="645"></path></svg></span><span class="shared-counts-label" data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Email</span></span></span></a></div></header><div class="entry-content" data-dcnode-id="410"><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Many of our articles touch on the benefits of positive parenting, but today we’re looking at some of the science and research that backs up what many parents have found to be a tremendously rewarding approach to raising children.</span></p><p data-dcnode-id="630"><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenchildmagazine.com/wp-content/uploads/2016/12/The-Benefits-of-Positive-Parenting.jpeg"><picture data-dcnode-id="632"><source data-dcnode-id="634" data-srcset="https://www.greenchildmagazine.com/wp-content/webp-express/webp-images/uploads/2016/12/The-Benefits-of-Positive-Parenting.jpeg.webp 700w, https://www.greenchildmagazine.com/wp-content/webp-express/webp-images/uploads/2016/12/The-Benefits-of-Positive-Parenting-300x222.jpeg.webp 300w" sizes="(max-width: 672px) 100vw, 672px" type="image/webp"><img alt="The Benefits of Positive Parenting" class="aligncenter wp-image-17097 webpexpress-processed" data-dcnode-id="633" data-pin-nopin="nopin" data-pin-title="The Benefits of Positive Parenting &amp; How to Cultivate It in Your Family" height="498" sizes="(max-width: 672px) 100vw, 672px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenchildmagazine.com/wp-content/uploads/2016/12/The-Benefits-of-Positive-Parenting.jpeg&amp;raw" srcset="https://www.greenchildmagazine.com/wp-content/uploads/2016/12/The-Benefits-of-Positive-Parenting.jpeg 700w, https://www.greenchildmagazine.com/wp-content/uploads/2016/12/The-Benefits-of-Positive-Parenting-300x222.jpeg 300w" width="672"></picture></a></p><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Have you ever met a parent who exudes positivity with their words and actions?</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="627" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Do you feel “lifted up” and more positive after your exchange with this person?</span></p><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Positivity is a state of mind. It is being mindful of the importance of having a positive attitude about life, despite challenges that come our way. Reflecting on what is good in our lives assists us in maintaining a positive attitude.</span></p><div class="adthrive" data-dcnode-id="621" id="cls-video-container-ZhIIge3v" style="min-height: 439.312px;"><div data-dcnode-id="622"></div></div><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">The day to day responsibilities of being a parent can put us in a “doing” mode rather than a “being” mode. As a result, it can be challenging for parents to maintain a positive mindset. However, it’s extremely valuable for parents to take active steps to cultivate positivity for themselves and their families.</span></p><h2 data-dcnode-id="615"><span data-dcnode-id="616" style="color: #524e4e;"><strong data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">THE MANY BENEFITS OF POSITIVE PARENTING</span></strong></span></h2><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="614" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Having a positive outlook doesn’t mean you never feel negative emotions, such as sadness or anger, says Dr. Barbara L. Fredrickson, a psychologist and expert on emotional wellness at the University of North Carolina, Chapel Hill.</span></p><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">“All emotions—whether positive or negative—are adaptive in the right circumstances. The key seems to be finding a balance between the two,” she says.</span></p><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">“Positive emotions expand our awareness and open us up to new ideas, so we can grow and add to our toolkit for survival,” Fredrickson explains. “But people need negative emotions to move through difficult situations and respond to them appropriately in the short term. Negative emotions can get us into trouble, though, if they’re based on too much rumination about the past or excessive worry about the future, and they’re not really related to what’s happening in the here and now.”</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="607" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">People who are emotionally well, experts say, have fewer negative emotions and are able to bounce back from difficulties faster.</span></p><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">This quality is called resilience. Another sign of emotional wellness is being able to hold onto positive emotions longer and appreciate the good times. Developing a sense of meaning and purpose in life – and focusing on what’s important to you – also contributes to emotional wellness.</span></p><p data-dcnode-id="598"><strong data-dcnode-id="599"><span data-dcnode-id="602" instrument_node="">Related: </span><a data-dcnode-id="600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenchildmagazine.com/raising-resilient-kids/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="601" instrument_node="">How to Raise a Resilient Child</span></a></strong></p><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">It is important for parents to be mindful of striking a balance between positive emotions and negative emotions. These are some of the building blocks to the benefits of positive parenting.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="595" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">This can also help parents practice not getting stuck in negative emotions. They will be able to cultivate positivity for themselves, and model it for their children.</span></p><h2 data-dcnode-id="589"><span data-dcnode-id="590" style="color: #524e4e;"><strong data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">How you can cultivate positivity in your family</span></strong></span></h2><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Communication and building meaningful relationships with your family are valuable first steps to creating positivity in your life. It is important to be aware of your tone of voice, body language, and attitude when you are speaking with them. Simply be present and listen.</span></p><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Focus on the interaction in the moment instead of being preoccupied with responsibilities on the to-do list or the comment you want to make. By staying present with your family, you are not only creating more positivity, but you are building a deeper connection with them. This in turn will model meaningful communication and connections for your children.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="584" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><p data-dcnode-id="579"><span data-dcnode-id="583" instrument_node="">It is important that </span><a data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenchildmagazine.com/the-mother-well/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="582" instrument_node="">parents nurture themselves</span></a><span data-dcnode-id="580" instrument_node="">. It is essential for parents to nurture their mind and body on a daily basis as it will cultivate positivity in their lives. Pay attention to your thoughts, feelings, and actions. Think about a concern or situation with a new perspective, take time to eat well, exercise, practice meditation and yoga, connect with others, and engage in activities that bring you joy.</span></p><p data-dcnode-id="574"><span data-dcnode-id="578" instrument_node="">Take time out of your schedule on a regular basis to go on a family walk. Spending time together </span><a data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//richardlouv.com/books/nature-principle/field-guide/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="577" instrument_node="">to explore nature</span></a><span data-dcnode-id="575" instrument_node=""> or a new place is a wonderful way to deepen relationships and cultivate a positive lifestyle for your family.</span></p><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Engage in community causes and volunteer for organizations that are meaningful to you. Encourage your family to get involved, too!</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="571" id="AdThrive_Content_6_desktop" style="min-height: 250px;"></div><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Another way parents can create more positivity in their lives is to monitor their self talk. It is helpful for parents to ask themselves these questions: Are my self-statements promoting positivity in my life or inhibiting it in some way? How does it impact my relationships?</span></p><p data-dcnode-id="564"><strong data-dcnode-id="565"><span data-dcnode-id="568" instrument_node="">Related: </span><a data-dcnode-id="566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenchildmagazine.com/minimalist-parenting/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="567" instrument_node="">How to Embrace Minimalist Parenting</span></a></strong></p><p data-dcnode-id="559"><span data-dcnode-id="563" instrument_node="">Practice replacing negative self talk with positive self statements and gratitude for the good in your life are essential. When </span><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenchildmagazine.com/creating-mindful-parenting-moments/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="562" instrument_node="">parents are mindful </span></a><span data-dcnode-id="560" instrument_node="">of a positive attitude it becomes infectious at home. This is a great teachable moment for your child and you are creating a positive home environment.</span></p><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Evaluate your thoughts, feelings, and behaviors on a regular basis. Identify situations where you find yourself “slipping” into a negative mind set or engaging in behaviors that are counterproductive. Once you identify these situations, it provides a great opportunity to reflect on how adjusting your thoughts, feelings, and behaviors can bring forth more positivity in your life and for your family.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="556" id="AdThrive_Content_7_desktop" style="min-height: 250px;"></div><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Take time to reflect on the people in your life. Are you surrounding yourself with people who exude positivity? Do their words and actions inspire you or deflate you?</span></p><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">It is valuable to set boundaries with people in your life who maintain a negative mind set. Their personal issues are not your issues. You have control over how you want to respond to their negativity.</span></p><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Establish positive support systems in your life. Surround yourself with family members and friends who are positive and supportive with their words and actions. Their encouragement will help you on your path to maintaining the positivity you desire for yourself and your family.</span></p><h2 data-dcnode-id="546"><span data-dcnode-id="547" style="color: #524e4e;"><strong data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">How to help your child create positivity</span></strong></span></h2><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Assist your child in finding their joy and passions in life. This will help your child to develop a positive sense of self and good coping skills.</span></p><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Facilitate opportunities for your child to engage in creative expression. It will assist your child in recognizing their talents, inner strengths, and outer strengths.</span></p><p data-dcnode-id="537"><strong data-dcnode-id="538"><span data-dcnode-id="541" instrument_node="">Related: </span><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenchildmagazine.com/simplify-for-happier-calmer-kids/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="540" instrument_node="">Want happier, calmer kids? Simplify their world.</span></a></strong></p><p data-dcnode-id="529"><span data-dcnode-id="536" instrument_node="">Encourage </span><a data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenchildmagazine.com/bonding-with-your-child-through-yoga/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="535" instrument_node="">your child to practice yoga</span></a><span data-dcnode-id="533" instrument_node="">, deep breathing, and </span><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenchildmagazine.com/guided-relaxation-happy-heart/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="532" instrument_node="">meditation</span></a><span data-dcnode-id="530" instrument_node="">. Through these practices, your child will learn to calm their mind, strengthen their body, and positive ways to cope with life stressors.</span></p><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Help your child express their thoughts, feelings, and behaviors. By helping your child to get in touch with their thoughts, feelings, and behaviors, they will learn to not become “stuck”, and express themselves in a healthy way.</span></p><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Foster community involvement and volunteering opportunities for your child. It is an excellent way to help your child understand the importance of helping others, gratitude, and being a part of a community.</span></p><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Create opportunities for your child to make decisions and learn accountability. This will foster positivity as your child will identify pros and cons of a decision, possible outcomes, and develop resiliency from their experiences. As a result, your child will build character, strength, and a positive sense of self.</span></p><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">It is evident creating a positive lifestyle for you and your family is a process. The experts point out the importance of striking a balance between positive emotions and negative emotions. It is also important parents are clear about their individual goals and family goals as it will help to create a positive lifestyle.</span></p><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Taking small steps each day will empower you and your family to cultivate the positivity you envision. Community involvement and surrounding yourself with individuals who support your goals for a positive lifestyle are paramount.</span></p><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Parents being mindful of the suggestions above are taking active steps each day to create positivity for themselves and their family. Through these active steps to enjoy the benefits of positive parenting, you will cultivate intention, gratitude, and meaningful relationships in your life.</span></p><p data-dcnode-id="511"><span data-dcnode-id="514" style="color: #524e4e;"><strong data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">References:</span></strong></span><br data-dcnode-id="513"><span data-dcnode-id="512" instrument_node=""> Happiness unpacked: positive emotions increase life satisfaction by building resilience. Cohn MA, Fredrickson BL, Brown SL, Mikels JA, Conway AM. Emotion. 2009 Jun;9(3):361-8. doi: 10.1037/a0015952. PMID: 19485613</span></p><span data-dcnode-id="510" instrument_node=""> </span><form action="https://app.convertkit.com/forms/854304/subscriptions" class="seva-form formkit-form" data-dcnode-id="483" data-format="inline" data-sv-form="854304" data-uid="8fd3098a24" data-version="5" method="post" min-width="400 500 600 700" style="background-color:#f9fafb;border-radius:4px"><div class="formkit-background" data-dcnode-id="509" style="background-image:;opacity:0.2"></div><div data-dcnode-id="486" data-style="minimal"><div class="formkit-header" data-dcnode-id="506" data-element="header" style="color:#8b5275;font-size:27px;font-weight:700"><h2 data-dcnode-id="507"><span data-dcnode-id="508" instrum
