</span><h1 data-dcnode-id="711" data-pid="1" id="p1"><span aria-hidden="true" class="pageNum" data-before-text="26" data-dcnode-id="714" data-no="26" id="page26" style="display: inline;"></span><strong data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Goodness​—How Can You Cultivate It?</span></strong></h1><span data-dcnode-id="710" instrument_node="">
</span></header><span data-dcnode-id="708" instrument_node="">
</span><div class="bodyTxt" data-dcnode-id="387"><span data-dcnode-id="707" instrument_node="">
</span><div class="section" data-dcnode-id="634" id="section1"><span data-dcnode-id="706" instrument_node="">
</span><div class="pGroup" data-dcnode-id="636"><span data-dcnode-id="705" instrument_node="">
</span><div class="boxSupplement rule floatEast" data-dcnode-id="653"><aside data-dcnode-id="654"><div class="boxContent" data-dcnode-id="656"><ul class="noMarker" data-dcnode-id="658"><li data-dcnode-id="701"><p class="sc" data-dcnode-id="703" data-pid="28" id="p28"><span data-dcnode-id="704" instrument_node="">LOVE</span></p><span data-dcnode-id="702" instrument_node="">
</span></li><span data-dcnode-id="700" instrument_node="">
</span><li data-dcnode-id="696"><p class="sc" data-dcnode-id="698" data-pid="29" id="p29"><span data-dcnode-id="699" instrument_node="">JOY</span></p><span data-dcnode-id="697" instrument_node="">
</span></li><span data-dcnode-id="695" instrument_node="">
</span><li data-dcnode-id="691"><p class="sc" data-dcnode-id="693" data-pid="30" id="p30"><span data-dcnode-id="694" instrument_node="">PEACE</span></p><span data-dcnode-id="692" instrument_node="">
</span></li><span data-dcnode-id="690" instrument_node="">
</span><li data-dcnode-id="686"><p class="sc" data-dcnode-id="688" data-pid="31" id="p31"><span data-dcnode-id="689" instrument_node="">PATIENCE</span></p><span data-dcnode-id="687" instrument_node="">
</span></li><span data-dcnode-id="685" instrument_node="">
</span><li data-dcnode-id="681"><p class="sc" data-dcnode-id="683" data-pid="32" id="p32"><span data-dcnode-id="684" instrument_node="">KINDNESS</span></p><span data-dcnode-id="682" instrument_node="">
</span></li><span data-dcnode-id="680" instrument_node="">
</span><li data-dcnode-id="675"><p class="sc" data-dcnode-id="677" data-pid="33" id="p33"><strong data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">GOODNESS</span></strong></p><span data-dcnode-id="676" instrument_node="">
</span></li><span data-dcnode-id="674" instrument_node="">
</span><li data-dcnode-id="670"><p class="sc" data-dcnode-id="672" data-pid="34" id="p34"><span data-dcnode-id="673" instrument_node="">FAITH</span></p><span data-dcnode-id="671" instrument_node="">
</span></li><span data-dcnode-id="669" instrument_node="">
</span><li data-dcnode-id="665"><p class="sc" data-dcnode-id="667" data-pid="35" id="p35"><span data-dcnode-id="668" instrument_node="">MILDNESS</span></p><span data-dcnode-id="666" instrument_node="">
</span></li><span data-dcnode-id="664" instrument_node="">
</span><li data-dcnode-id="660"><p class="sc" data-dcnode-id="662" data-pid="36" id="p36"><span data-dcnode-id="663" instrument_node="">SELF-CONTROL</span></p><span data-dcnode-id="661" instrument_node="">
</span></li><span data-dcnode-id="659" instrument_node="">
</span></ul><span data-dcnode-id="657" instrument_node="">
</span></div><span data-dcnode-id="655" instrument_node="">
</span></aside></div><span data-dcnode-id="652" instrument_node="">
</span><p class="sb" data-dcnode-id="641" data-pid="2" id="p2"><span data-dcnode-id="651" instrument_node="">EACH of us naturally wants to be thought of as being a good person. However, displaying goodness is a challenge in today’s world. Many people are “without love of goodness.” (</span><a class="b" data-bid="1-1" data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/0/0"><span data-dcnode-id="650" instrument_node="">2&nbsp;Tim. 3:3</span></a><span data-dcnode-id="648" instrument_node="">) They may follow a personal standard of right and wrong that, in effect, says that “good is bad and bad is good.” (</span><a class="b" data-bid="2-1" data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/1/0"><span data-dcnode-id="647" instrument_node="">Isa. 5:20</span></a><span data-dcnode-id="645" instrument_node="">) And we all contend with our own background and imperfections. Hence, we may feel like Anne,</span><a class="fn" data-dcnode-id="643" data-fnid="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/fn/r1/lp-e/2019322/0"><span data-dcnode-id="644" instrument_node="">*</span></a><span data-dcnode-id="642" instrument_node=""> who despite serving Jehovah for decades admits, “I struggle to believe that I can be a good person.”</span></p><span data-dcnode-id="640" instrument_node="">
</span><p class="sb" data-dcnode-id="638" data-pid="3" id="p3"><span data-dcnode-id="639" instrument_node="">Happily, all of us can cultivate goodness! It is a product of God’s holy spirit, and his spirit is more powerful than any external or internal obstacle we might face. Let us examine goodness more closely and learn how we can display this quality more fully.</span></p><span data-dcnode-id="637" instrument_node="">
</span></div><span data-dcnode-id="635" instrument_node="">
</span></div><span data-dcnode-id="633" instrument_node="">
</span><div class="section" data-dcnode-id="612" id="section2"><span data-dcnode-id="632" instrument_node="">
</span><h2 data-dcnode-id="629" data-pid="4" id="p4"><strong data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">WHAT IS GOODNESS?</span></strong></h2><span data-dcnode-id="628" instrument_node="">
</span><div class="pGroup" data-dcnode-id="614"><span data-dcnode-id="627" instrument_node="">
</span><p class="sb" data-dcnode-id="625" data-pid="5" id="p5"><span data-dcnode-id="626" instrument_node="">Simply put, goodness is the quality or state of being good. It involves moral excellence and virtue, without badness or rottenness. Goodness is evident by its beneficial effect on others. It is an active, positive quality manifested in helpful deeds.</span></p><span data-dcnode-id="624" instrument_node="">
</span><p class="sb" data-dcnode-id="616" data-pid="6" id="p6"><span data-dcnode-id="623" instrument_node="">You have likely seen that some readily do good things for their family and friends, but is that where goodness should stop? Granted, we are limited in our ability to display this quality, for the Bible says that “there is no righteous man on earth who always does good and never sins.” (</span><a class="b" data-bid="3-1" data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/2/0"><span data-dcnode-id="622" instrument_node="">Eccl. 7:20</span></a><span data-dcnode-id="620" instrument_node="">) The apostle Paul candidly admitted: “I know that in me, that is, in my flesh, there dwells nothing good.” (</span><a class="b" data-bid="4-1" data-dcnode-id="618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/3/0"><span data-dcnode-id="619" instrument_node="">Rom. 7:18</span></a><span data-dcnode-id="617" instrument_node="">) How reasonable, therefore, to go to the Source of goodness if we want to develop that quality.</span></p><span data-dcnode-id="615" instrument_node="">
</span></div><span data-dcnode-id="613" instrument_node="">
</span></div><span data-dcnode-id="611" instrument_node="">
</span><div class="section" data-dcnode-id="551" id="section3"><span data-dcnode-id="610" instrument_node="">
</span><h2 data-dcnode-id="607" data-pid="7" id="p7"><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">“JEHOVAH IS GOOD”</span></strong></h2><span data-dcnode-id="606" instrument_node="">
</span><div class="pGroup" data-dcnode-id="553"><span data-dcnode-id="605" instrument_node="">
</span><p class="sb" data-dcnode-id="600" data-pid="8" id="p8"><span data-dcnode-id="604" instrument_node="">Jehovah God sets the standard of what is good. Regarding him, we read: “You are good and your works are good. Teach me your regulations.” (</span><a class="b" data-bid="5-1" data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/4/0"><span data-dcnode-id="603" instrument_node="">Ps. 119:68</span></a><span data-dcnode-id="601" instrument_node="">) Let us examine the two aspects of Jehovah’s goodness mentioned in that verse.</span></p><span data-dcnode-id="599" instrument_node="">
</span><p class="sb" data-dcnode-id="587" data-pid="9" id="p9"><em data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Jehovah is good.</span></em><span data-dcnode-id="596" instrument_node=""> Goodness is an inseparable part of Jehovah’s personality. Consider what happened when Jehovah told Moses: “I will make all my goodness pass before your face.” As Jehovah’s glory​—including his goodness—​passed by, Moses heard these words: “Jehovah, Jehovah, a God merciful and compassionate, slow to anger and abundant in loyal love and truth, showing loyal love to thousands, pardoning error and transgression and sin, but he will by no means leave the guilty unpunished.” (</span><a class="b" data-bid="6-1" data-dcnode-id="594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/5/0"><span data-dcnode-id="595" instrument_node="">Ex. 33:19;</span></a><a class="b" data-bid="6-2" data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/5/1"><span data-dcnode-id="593" instrument_node=""> 34:6,&nbsp;7</span></a><span data-dcnode-id="591" instrument_node="">) We have reason to understand, then, that goodness is reflected in every facet of Jehovah’s being. Though Jesus was the epitome of goodness in a human, he could say: “Nobody is good except one, God.”​—</span><a class="b" data-bid="7-1" data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/6/0"><span data-dcnode-id="590" instrument_node="">Luke 18:19</span></a><span data-dcnode-id="588" instrument_node="">.</span></p><span data-dcnode-id="586" instrument_node="">
</span><div class="north_center" data-dcnode-id="573" id="f1"><span data-dcnode-id="585" instrument_node="">
</span><figure data-dcnode-id="575"><span data-dcnode-id="584" instrument_node="">
</span><img alt="A father and son look at Jehovah’s creation" class="north_center" data-dcnode-id="583" data-img-small-src="/en/wol/mp/r1/lp-e/w19/2019/178" height="612" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/mp/r1/lp-e/w19/2019/179&amp;raw" style="cursor: pointer;" width="1200"><span data-dcnode-id="582" instrument_node="">
</span><figcaption class="figcaption" data-dcnode-id="577"><span data-dcnode-id="581" instrument_node="">
</span><p class="sc" data-dcnode-id="579" data-pid="40" id="p40"><span data-dcnode-id="580" instrument_node="">We see evidence of Jehovah’s goodness in creation</span></p><span data-dcnode-id="578" instrument_node="">
</span></figcaption><span data-dcnode-id="576" instrument_node="">
</span></figure><span data-dcnode-id="574" instrument_node="">
</span></div><span data-dcnode-id="572" instrument_node="">
</span><p class="sb" data-dcnode-id="555" data-pid="10" id="p10"><span aria-hidden="true" class="pageNum" data-before-text="27" data-dcnode-id="571" data-no="27" id="page27" style="display: inline;"></span><em data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Jehovah’s works are good.</span></em><span data-dcnode-id="568" instrument_node=""> Goodness is apparent in all of God’s doings. “Jehovah is good to all, and his mercy is evident in all his works.” (</span><a class="b" data-bid="8-1" data-dcnode-id="566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/7/0"><span data-dcnode-id="567" instrument_node="">Ps. 145:9</span></a><span data-dcnode-id="565" instrument_node="">) Jehovah’s goodness is impartial, providing life and all that humans need to sustain it. (</span><a class="b" data-bid="9-1" data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/8/0"><span data-dcnode-id="564" instrument_node="">Acts 14:17</span></a><span data-dcnode-id="562" instrument_node="">) His goodness is also shown when he forgives us. The psalmist wrote: “You, O&nbsp;Jehovah, are good and ready to forgive.” (</span><a class="b" data-bid="10-1" data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/9/0"><span data-dcnode-id="561" instrument_node="">Ps. 86:5</span></a><span data-dcnode-id="559" instrument_node="">) We can be certain that “Jehovah will not hold back anything good from those walking in integrity.”​—</span><a class="b" data-bid="11-1" data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/10/0"><span data-dcnode-id="558" instrument_node="">Ps. 84:11</span></a><span data-dcnode-id="556" instrument_node="">.</span></p><span data-dcnode-id="554" instrument_node="">
</span></div><span data-dcnode-id="552" instrument_node="">
</span></div><span data-dcnode-id="550" instrument_node="">
</span><div class="section" data-dcnode-id="426" id="section4"><span data-dcnode-id="549" instrument_node="">
</span><h2 data-dcnode-id="546" data-pid="11" id="p11"><strong data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">“LEARN TO DO GOOD”</span></strong></h2><span data-dcnode-id="545" instrument_node="">
</span><div class="pGroup" data-dcnode-id="428"><span data-dcnode-id="544" instrument_node="">
</span><p class="sb" data-dcnode-id="536" data-pid="12" id="p12"><span data-dcnode-id="543" instrument_node="">We are created in God’s image, so we have the potential for being good and for doing good. (</span><a class="b" data-bid="12-1" data-dcnode-id="541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/11/0"><span data-dcnode-id="542" instrument_node="">Gen. 1:27</span></a><span data-dcnode-id="540" instrument_node="">) Nevertheless, God’s Word urges his servants to “learn to do good.” (</span><a class="b" data-bid="13-1" data-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/12/0"><span data-dcnode-id="539" instrument_node="">Isa. 1:17</span></a><span data-dcnode-id="537" instrument_node="">) But how can we foster this appealing quality? Consider three ways we can do this.</span></p><span data-dcnode-id="535" instrument_node="">
</span><p class="sb" data-dcnode-id="521" data-pid="13" id="p13"><span data-dcnode-id="534" instrument_node="">First, we can </span><strong data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">pray for holy spirit,</span></strong><span data-dcnode-id="531" instrument_node=""> which can help Christians to produce genuine goodness. (</span><a class="b" data-bid="14-1" data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/13/0"><span data-dcnode-id="530" instrument_node="">Gal. 5:22</span></a><span data-dcnode-id="528" instrument_node="">) Yes, God’s spirit can help us come to love what is good and reject what is bad. (</span><a class="b" data-bid="15-1" data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/14/0"><span data-dcnode-id="527" instrument_node="">Rom. 12:9</span></a><span data-dcnode-id="525" instrument_node="">) In fact, the Bible indicates that Jehovah can make us “firm in every good deed and word.”​—</span><a class="b" data-bid="16-1" data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/15/0"><span data-dcnode-id="524" instrument_node="">2&nbsp;Thess. 2:16,&nbsp;17</span></a><span data-dcnode-id="522" instrument_node="">.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p class="sb" data-dcnode-id="505" data-pid="14" id="p14"><span data-dcnode-id="519" instrument_node="">Second, we should </span><strong data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">read God’s inspired Word.</span></strong><span data-dcnode-id="516" instrument_node=""> As we do, Jehovah can instruct us in “the entire course of what is good” and equip us “for every good work.” (</span><a class="b" data-bid="17-1" data-dcnode-id="514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/16/0"><span data-dcnode-id="515" instrument_node="">Prov. 2:9;</span></a><a class="b" data-bid="17-2" data-dcnode-id="512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/16/1"><span data-dcnode-id="513" instrument_node=""> 2&nbsp;Tim. 3:17</span></a><span data-dcnode-id="511" instrument_node="">) By such reading, followed by meditation, we fill our heart with good things about God and his will. We thus add to a treasure that we can draw on later.​—</span><a class="b" data-bid="18-1" data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/17/0"><span data-dcnode-id="510" instrument_node="">Luke 6:45;</span></a><a class="b" data-bid="18-2" data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/17/1"><span data-dcnode-id="508" instrument_node=""> Eph. 5:9</span></a><span data-dcnode-id="506" instrument_node="">.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p class="sb" data-dcnode-id="491" data-pid="15" id="p15"><span data-dcnode-id="503" instrument_node="">Third, we try our best to </span><strong data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">“imitate what is good.”</span></strong><span data-dcnode-id="500" instrument_node=""> (</span><a class="b" data-bid="19-1" data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/18/0"><span data-dcnode-id="499" instrument_node="">3&nbsp;John&nbsp;11</span></a><span data-dcnode-id="497" instrument_node="">) We find examples to imitate in the Bible. Of course, the prime examples are Jehovah and Jesus. But we can also consider others who were noted for their goodness. Two who might come to mind are Tabitha and Barnabas. (</span><a class="b" data-bid="20-1" data-dcnode-id="495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/19/0"><span data-dcnode-id="496" instrument_node="">Acts 9:36;</span></a><a class="b" data-bid="20-2" data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/19/1"><span data-dcnode-id="494" instrument_node=""> 11:22-24</span></a><span data-dcnode-id="492" instrument_node="">) You can profitably analyze their record, taking note of what they did in practical ways to help others. Give some thought to how you can take the initiative to render aid to some in your family or congregation. And do not overlook how each of those two benefited from having the reputation of being a good person. You can benefit similarly.</span></p><span data-dcnode-id="490" instrument_node="">
</span><p class="sb" data-dcnode-id="482" data-pid="16" id="p16"><span aria-hidden="true" class="pageNum" data-before-text="28" data-dcnode-id="489" data-no="28" id="page28" style="display: inline;"></span><span data-dcnode-id="488" instrument_node="">We can also give some thought to modern-day examples of those who do good. For instance, consider hardworking elders in the congregation who are ‘lovers of goodness.’ Not to be overlooked are faithful sisters who by word and example are “teachers of what is good.” (</span><a class="b" data-bid="21-1" data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/20/0"><span data-dcnode-id="487" instrument_node="">Titus 1:8;</span></a><a class="b" data-bid="21-2" data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/20/1"><span data-dcnode-id="485" instrument_node=""> 2:3</span></a><span data-dcnode-id="483" instrument_node="">) A sister named Roslyn relates: “My friend goes out of her way to help and encourage others in the congregation. She thinks about their situation and often gives them little gifts or helps them in other practical ways. I view her as a truly good person.”</span></p><span data-dcnode-id="481" instrument_node="">
</span><p class="sb" data-dcnode-id="473" data-pid="17" id="p17"><span data-dcnode-id="480" instrument_node="">Jehovah encourages his people to “search for what is good.” (</span><a class="b" data-bid="22-1" data-dcnode-id="478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/21/0"><span data-dcnode-id="479" instrument_node="">Amos 5:14</span></a><span data-dcnode-id="477" instrument_node="">) Doing so, we will not only come to love his standards but also strengthen our motivation to </span><em data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">do</span></em><span data-dcnode-id="474" instrument_node=""> what is good.</span></p><span data-dcnode-id="472" instrument_node="">
</span><div class="blockTxt floatEast" data-dcnode-id="468"><p class="sc" data-dcnode-id="470" data-pid="38" id="p38"><span data-dcnode-id="471" instrument_node="">We strive to be good and to do good</span></p><span data-dcnode-id="469" instrument_node="">
</span></div><span data-dcnode-id="467" instrument_node="">
</span><p class="sb" data-dcnode-id="465" data-pid="18" id="p18"><span data-dcnode-id="466" instrument_node="">We need not imagine that practicing good requires grand gestures or dramatic sacrifices. To illustrate: Do you think of an artist painting a portrait with only one or two brushstrokes? Rather, he may use many brushstrokes to create his painting. Similarly, our goodness can be seen in many helpful acts.</span></p><span data-dcnode-id="464" instrument_node="">
</span><p class="sb" data-dcnode-id="442" data-pid="19" id="p19"><span data-dcnode-id="463" instrument_node="">The Bible urges us to be </span><strong data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">“prepared”</span></strong><span data-dcnode-id="460" instrument_node=""> and </span><strong data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">“ready”</span></strong><span data-dcnode-id="457" instrument_node=""> to render good. (</span><a class="b" data-bid="23-1" data-dcnode-id="455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/22/0"><span data-dcnode-id="456" instrument_node="">2&nbsp;Tim. 2:21;</span></a><a class="b" data-bid="23-2" data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/22/1"><span data-dcnode-id="454" instrument_node=""> Titus 3:1</span></a><span data-dcnode-id="452" instrument_node="">) Being alert to the circumstances of others, we may see ways to please our neighbor “for his good, to build him up.” (</span><a class="b" data-bid="24-1" data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/23/0"><span data-dcnode-id="451" instrument_node="">Rom. 15:2</span></a><span data-dcnode-id="449" instrument_node="">) That may involve sharing something we have. (</span><a class="b" data-bid="25-1" data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/24/0"><span data-dcnode-id="448" instrument_node="">Prov. 3:27</span></a><span data-dcnode-id="446" instrument_node="">) We might invite someone over for a simple meal or for upbuilding association. If we know someone is sick, we can send him a card, visit him, or call him. Yes, we may identify many opportunities to say “what is good for building up as the need may be, to impart what is beneficial to the hearers.”​—</span><a class="b" data-bid="26-1" data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/25/0"><span data-dcnode-id="445" instrument_node="">Eph. 4:29</span></a><span data-dcnode-id="443" instrument_node="">.</span></p><span data-dcnode-id="441" instrument_node="">
</span><p class="sb" data-dcnode-id="430" data-pid="20" id="p20"><span data-dcnode-id="440" instrument_node="">Like Jehovah, we seek to do good to all people. We therefore treat others impartially. An outstanding way is by preaching the good news of the Kingdom to all. As Jesus commanded, we seek to do good even to those who seem to hate us. (</span><a class="b" data-bid="27-1" data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/26/0"><span data-dcnode-id="439" instrument_node="">Luke 6:27</span></a><span data-dcnode-id="437" instrument_node="">) It is never wrong to be kind and to do what is good to others, for “against such things there is no law.” (</span><a class="b" data-bid="28-1" data-dcnode-id="435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/27/0"><span data-dcnode-id="436" instrument_node="">Gal. 5:22,&nbsp;23</span></a><span data-dcnode-id="434" instrument_node="">) By good conduct despite opposition or trials, we may draw others to the truth and glorify God.​—</span><a class="b" data-bid="29-1" data-dcnode-id="432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/28/0"><span data-dcnode-id="433" instrument_node="">1&nbsp;Pet. 3:16,&nbsp;17</span></a><span data-dcnode-id="431" instrument_node="">.</span></p><span data-dcnode-id="429" instrument_node="">
</span></div><span data-dcnode-id="427" instrument_node="">
</span></div><span data-dcnode-id="425" instrument_node="">
</span><div class="section" data-dcnode-id="389" id="section5"><span data-dcnode-id="424" instrument_node="">
</span><h2 data-dcnode-id="421" data-pid="21" id="p21"><strong data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">REWARDED BY GOODNESS</span></strong></h2><span data-dcnode-id="420" instrument_node="">
</span><div class="pGroup" data-dcnode-id="391"><span data-dcnode-id="419" instrument_node="">
</span><p class="sb" data-dcnode-id="408" data-pid="22" id="p22"><span data-dcnode-id="418" instrument_node="">“The good man reaps the reward of his dealings.” (</span><a class="b" data-bid="30-1" data-dcnode-id="416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/29/0"><span data-dcnode-id="417" instrument_node="">Prov. 14:14</span></a><span data-dcnode-id="415" instrument_node="">) What are some of the rewards? When we are good toward others, they are more likely to treat us well in return. (</span><a class="b" data-bid="31-1" data-dcnode-id="413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/30/0"><span data-dcnode-id="414" instrument_node="">Prov. 14:22</span></a><span data-dcnode-id="412" instrument_node="">) Even if others do not, our persisting in good deeds may soften their disposition and melt their hardness.​—</span><a class="b" data-bid="32-1" data-dcnode-id="410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/31/0"><span data-dcnode-id="411" instrument_node="">Rom. 12:20</span></a><span data-dcnode-id="409" instrument_node="">, ftn.</span></p><span data-dcnode-id="407" instrument_node="">
</span><p class="sb" data-dcnode-id="405" data-pid="23" id="p23"><span data-dcnode-id="406" instrument_node="">Many can testify to how they have benefited from doing good and turning away from bad. Consider Nancy’s experience. “I grew up reckless, immoral, and disrespectful,” she admits. “However, as I learned and applied God’s standards of good, I began to feel happier. Now I have dignity and self-respect.”</span></p><span data-dcnode-id="404" instrument_node="">
</span><p class="sb" data-dcnode-id="393" data-pid="24" id="p24"><span data-dcnode-id="403" instrument_node="">The greatest reason for us to cultivate goodness is that doing so makes Jehovah happy. Even if many do not see what we do, Jehovah does. He is aware of our every good deed and thought. (</span><a class="b" data-bid="33-1" data-dcnode-id="401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/32/0"><span data-dcnode-id="402" instrument_node="">Eph. 6:7,&nbsp;8</span></a><span data-dcnode-id="400" instrument_node="">) With what result? “The good person obtains Jehovah’s approval.” (</span><a class="b" data-bid="34-1" data-dcnode-id="398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/33/0"><span data-dcnode-id="399" instrument_node="">Prov. 12:2</span></a><span data-dcnode-id="397" instrument_node="">) So let us continue to cultivate goodness. Jehovah promises “glory and honor and peace for everyone who works what is good.”​—</span><a class="b" data-bid="35-1" data-dcnode-id="395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wol.jw.org/en/wol/bc/r1/lp-e/2019322/34/0"><span data-dcnode-id="396" instrument_node="">Rom. 2:10</span></a><span data-dcnode-id="394" instrument_node="">.</span></p><span data-dcnode-id="392" instrument_node="">
</span></div><span data-dcnode-id="390" instrument_node="">
</span></div><span data-dcnode-id="388" instrument_node="">
</span></div><span data-dcnode-id="386" instrument_node="">
</span><div class="groupFootnote" data-dcnode-id="381"><div data-dcnode-id="383"><p data-dcnode-id="384" data-pid="26" id="p26"><span data-dcnode-id="385" instrument_node="">Some names have been changed.</span></p></div><span data-dcnode-id="382" instrument_node="">
