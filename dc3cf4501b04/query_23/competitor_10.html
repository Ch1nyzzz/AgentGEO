</span><img alt="" class="attachment-topic_banner size-topic_banner banner wp-post-image" data-dcnode-id="6667" height="84" loading="lazy" sizes="(max-width: 864px) 100vw, 864px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//y8wvtjcj4p-flywheel.netdna-ssl.com/wp-content/uploads/LMEIBanners_EmotionalIntelligence.png&amp;raw" srcset="https://y8wvtjcj4p-flywheel.netdna-ssl.com/wp-content/uploads/LMEIBanners_EmotionalIntelligence.png 864w, https://y8wvtjcj4p-flywheel.netdna-ssl.com/wp-content/uploads/LMEIBanners_EmotionalIntelligence-416x40.png 416w, https://y8wvtjcj4p-flywheel.netdna-ssl.com/wp-content/uploads/LMEIBanners_EmotionalIntelligence-275x27.png 275w, https://y8wvtjcj4p-flywheel.netdna-ssl.com/wp-content/uploads/LMEIBanners_EmotionalIntelligence-300x29.png 300w" width="864"><span data-dcnode-id="6666" instrument_node="">
</span><p data-dcnode-id="6664"><span data-dcnode-id="6665" instrument_node="">Emotional intelligence is the capacity to recognize the impact our own feelings have on ourselves and to tune into the feelings of those around us, to manage our emotions and our actions, and to interact skillfully with the people around us.</span></p><span data-dcnode-id="6663" instrument_node="">
</span><p data-dcnode-id="6660"><strong data-dcnode-id="6661"><span data-dcnode-id="6662" instrument_node="">Those who lead with Emotional Intelligence are better equipped to inspire and mobilize others towards making a positive impact in the world. </span></strong></p><span data-dcnode-id="6659" instrument_node="">
</span><p data-dcnode-id="6654"><span data-dcnode-id="6658" instrument_node="">To move from theory to practice, we use an evidence-based framework of EI: The </span><a data-dcnode-id="6656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.keystepmedia.com/emotional-social-intelligence-leadership-competencies"><span data-dcnode-id="6657" instrument_node="">Emotional and Social Intelligence Leadership Competency Model</span></a><span data-dcnode-id="6655" instrument_node="">, developed by Daniel Goleman and Richard Boyatzis. The balance of Emotional Self-Awareness and meaningful Relationship Management results in a dynamic process of behavioral change and transformation.</span></p><span data-dcnode-id="6653" instrument_node="">
</span><div class="swp-hidden-panel-wrap" data-dcnode-id="6622" style="display: none; visibility: collapse; opacity: 0"><div class="swp_social_panel swp_horizontal_panel swp_flat_fresh swp_default_full_color swp_individual_full_color swp_other_full_color scale-100 scale-" data-dcnode-id="6623" data-float="none" data-float-color="#ffffff" data-float-mobile="none" data-min-width="1100" data-post-id="17812" data-transition="slide"><div class="nc_tweetContainer swp_share_button swp_linkedin" data-dcnode-id="6645" data-network="linkedin"><a class="nc_tweet swp_share_link" data-dcnode-id="6646" data-link="https://www.linkedin.com/cws/share?url=https%3A%2F%2Fwww.keystepmedia.com%2Femotional-intelligence%2F" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/cws/share%3Furl%3Dhttps%253A%252F%252Fwww.keystepmedia.com%252Femotional-intelligence%252F" rel="nofollow noreferrer noopener" target="_blank"><span class="swp_count swp_hide" data-dcnode-id="6647"><span class="iconFiller" data-dcnode-id="6648"><span class="spaceManWilly" data-dcnode-id="6649"><i class="sw swp_linkedin_icon" data-dcnode-id="6652"></i><span class="swp_share" data-dcnode-id="6650"><span data-dcnode-id="6651" instrument_node="">Share</span></span></span></span></span></a></div><div class="nc_tweetContainer swp_share_button swp_facebook" data-dcnode-id="6637" data-network="facebook"><a class="nc_tweet swp_share_link" data-dcnode-id="6638" data-link="https://www.facebook.com/share.php?u=https%3A%2F%2Fwww.keystepmedia.com%2Femotional-intelligence%2F" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/share.php%3Fu%3Dhttps%253A%252F%252Fwww.keystepmedia.com%252Femotional-intelligence%252F" rel="nofollow noreferrer noopener" target="_blank"><span class="swp_count swp_hide" data-dcnode-id="6639"><span class="iconFiller" data-dcnode-id="6640"><span class="spaceManWilly" data-dcnode-id="6641"><i class="sw swp_facebook_icon" data-dc
