</span><figure class="wp-block-image size-full" data-dcnode-id="1503"><img alt="Emotions" class="wp-image-3868" data-dcnode-id="1504" sizes="(max-width: 1920px) 100vw, 1920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilspedia.com/wp-content/uploads/2021/05/image-40.png&amp;raw" srcset="https://civilspedia.com/wp-content/uploads/2021/05/image-40.png 1920w, https://civilspedia.com/wp-content/uploads/2021/05/image-40-300x169.png 300w, https://civilspedia.com/wp-content/uploads/2021/05/image-40-1024x576.png 1024w, https://civilspedia.com/wp-content/uploads/2021/05/image-40-768x432.png 768w, https://civilspedia.com/wp-content/uploads/2021/05/image-40-1536x864.png 1536w"></figure><span data-dcnode-id="1502" instrument_node="">
</span><ul data-dcnode-id="1495"><li data-dcnode-id="1496"><span data-dcnode-id="1501" instrument_node="">Emotions are </span><strong data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">feelings inside the person. </span></strong><strong data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">They

</span><ul data-dcnode-id="1491"><li data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">They
     are biologically given and a result of evolution because they provided

</span><ul data-dcnode-id="1487"><li data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">There are 8 Basic

</span><div class="wp-block-image" data-dcnode-id="1483"><figure class="aligncenter size-large" data-dcnode-id="1484"><img alt="Types of Emotions" class="wp-image-3870" data-dcnode-id="1485" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilspedia.com/wp-content/uploads/2021/05/image-42-1024x576.png&amp;raw" srcset="https://civilspedia.com/wp-content/uploads/2021/05/image-42-1024x576.png 1024w, https://civilspedia.com/wp-content/uploads/2021/05/image-42-300x169.png 300w, https://civilspedia.com/wp-content/uploads/2021/05/image-42-768x432.png 768w, https://civilspedia.com/wp-content/uploads/2021/05/image-42-1536x864.png 1536w, https://civilspedia.com/wp-content/uploads/2021/05/image-42.png 1920w"></figure></div><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">All other emotions are combination of these emotions . For
example: Happiness and Anticipation together results in Excitement.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1477"><img alt="Emotions" class="wp-image-3869" data-dcnode-id="1478" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilspedia.com/wp-content/uploads/2021/05/image-41-1024x372.png&amp;raw" srcset="https://civilspedia.com/wp-content/uploads/2021/05/image-41-1024x372.png 1024w, https://civilspedia.com/wp-content/uploads/2021/05/image-41-300x109.png 300w, https://civilspedia.com/wp-content/uploads/2021/05/image-41-768x279.png 768w, https://civilspedia.com/wp-content/uploads/2021/05/image-41.png 1050w"></figure><span data-dcnode-id="1476" instrument_node="">
</span><ul data-dcnode-id="1464"><li data-dcnode-id="1465"><span data-dcnode-id="1475" instrument_node="">Emotions have positive side as

      On the other hand, emotions such as hate can damage the relationships.</span></li><li data-dcnode-id="1467"><strong data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Positive</span></strong><span data-dcnode-id="1468" instrument_node=""> : Emotions are important for survival. Humans live i
      groups due to the emotional bonds of love and care.</span></li></ul></li></ul><span data-dcnode-id="1463" instrument_node="">
</span><ul data-dcnode-id="1447"><li data-dcnode-id="1448"><span data-dcnode-id="1462" instrument_node="">Quote </span><ol data-dcnode-id="1449" type="1"><li data-dcnode-id="1457"><span data-dcnode-id="1461" instrument_node="">Anyone can become </span><strong data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">angry </span></strong><span data-dcnode-id="1458" instrument_node="">—that is easy. But to be

</span><div class="wp-block-group has-background" data-dcnode-id="1367" style="background-color:#e7faf2"><div class="wp-block-group__inner-container" data-dcnode-id="1368"><span data-dcnode-id="1434" instrument_node="">

     and our relationships . (</span><strong data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">If asked
     in exam what is Emotional Intelligence, write this definition</span></strong><span data-dcnode-id="1428" instrument_node="">) </span></li></ul><span data-dcnode-id="1425" instrument_node="">
</span><ul data-dcnode-id="1402"><li data-dcnode-id="1417"><strong data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Emotional Intelligence consist of two words </span></strong><ul data-dcnode-id="1418"><li data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Emotions: Discussed above</span></li><li data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Intelligence: Information       processing ability of an individual</span></li></ul></li><li data-dcnode-id="1405"><strong data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Hence, Emotional Intelligence is ability to reason with      emotions and use emotions in the reason </span></strong><ul data-dcnode-id="1406"><li data-dcnode-id="1411"><strong data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Reason with Emotions:</span></strong><span data-dcnode-id="1412" instrument_node=""> Try to find the       cause of emotion that is generated.</span></li><li data-dcnode-id="1407"><strong data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Use Emotions in Reasoning</span></strong><span data-dcnode-id="1408" instrument_node=""> : Use emotions to       facilitate thinking . Common perception is emotions block the ability of       man to reason but person must use emotions to reason in better way.</span></li></ul></li><li data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">EI can be seen as head working      with heart . It is unique intersection of both without overpowering other.      </span></li></ul><span data-dcnode-id="1401" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1399"><img alt="Emotional Intelligence" class="wp-image-3872" data-dcnode-id="1400" sizes="(max-width: 1094px) 100vw, 1094px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilspedia.com/wp-content/uploads/2021/05/image-43.png&amp;raw" srcset="https://civilspedia.com/wp-content/uploads/2021/05/image-43.png 1094w, https://civilspedia.com/wp-content/uploads/2021/05/image-43-300x114.png 300w, https://civilspedia.com/wp-content/uploads/2021/05/image-43-1024x388.png 1024w, https://civilspedia.com/wp-content/uploads/2021/05/image-43-768x291.png 768w"></figure><span data-dcnode-id="1398" instrument_node="">
</span><ul data-dcnode-id="1386"><li data-dcnode-id="1387"><span data-dcnode-id="1397" instrument_node="">In </span><strong data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">earlier philosophies</span></strong><span data-dcnode-id="1394" instrument_node="">, </span><strong data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">emotions were seen negatively and opposite to
     reason</span></strong><span data-dcnode-id="1391" instrument_node=""> . It was
     advised to suppress or get rid of them&nbsp;
     to enjoy the fruits of life. But now emotions are seen in different
     way. </span><strong data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">We have come to realise that ,
     emotions are here to stay &amp; we cant get rid of them . Hence, it is
     better to manage our emotions</span></strong><span data-dcnode-id="1388" instrument_node=""> . </span></li></ul><span data-dcnode-id="1385" instrument_node="">
</span><ul data-dcnode-id="1373"><li data-dcnode-id="1374"><span data-dcnode-id="1384" instrument_node="">It involves </span><ol data-dcnode-id="1375" type="1"><li data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Identify
      &amp; access (understand) your emotions</span></li><li data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Manage your emotions </span></li><li data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Identify&nbsp; &amp; access (understand) other’s
      emotions (like your wife or team member’s emotions)</span></li><li data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Manage their emotions</span></li></ol></li></ul><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Hence, it involves not only managing your emotions but emotions
of other’s as well. </span></p><span data-dcnode-id="1369" instrument_node="">
</span></div></div><span data-dcnode-id="1366" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="1365"><span data-dcnode-id="1364" instrument_node="">
</span><h2 class="has-vivid-red-color has-text-color" data-dcnode-id="1359"><span class="ez-toc-section" data-dcnode-id="1363" id="History_of_Emotional_Intelligence"></span><strong data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">History of Emotional Intelligence</span></strong><span class="ez-toc-section-end" data-dcnode-id="1360"></span></h2><span data-dcnode-id="1358" instrument_node="">
</span><div class="wp-block-group has-background" data-dcnode-id="1307" style="background-color:#fdf8eb"><div class="wp-block-group__inner-container" data-dcnode-id="1308"><span data-dcnode-id="1357" instrument_node="">
</span><p class="has-text-color has-medium-font-size has-vivid-red-color" data-dcnode-id="1354"><strong data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Timeline </span></strong></p><span data-dcnode-id="1353" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="1310"><table class="" data-dcnode-id="1311"><tbody data-dcnode-id="1312"><tr data-dcnode-id="1343"><td data-dcnode-id="1349"><strong data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">300 BC</span></strong><span data-dcnode-id="1350" instrument_node=""> </span></td><td data-dcnode-id="1344"><span data-dcnode-id="1348" instrument_node="">
</span><strong data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Aristotle</span></strong><span data-dcnode-id="1345" instrument_node=""> was first to talk about this when he said, “Anyone
  can become angry —that is easy. But to be angry with the right person, to the
  right degree, at the right time, for the right purpose, and in the right way
  —this is not easy.”
  </span></td></tr><tr data-dcnode-id="1332"><td data-dcnode-id="1338"><span data-dcnode-id="1342" instrument_node="">
</span><strong data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">1989</span></strong><span data-dcnode-id="1339" instrument_node="">
</span></td><td data-dcnode-id="1333"><span data-dcnode-id="1337" instrument_node="">
</span><strong data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">John Mayer and Peter Salovey</span></strong><span data-dcnode-id="1334" instrument_node=""> talked about
  Emotional Intelligence and gave their Ability Model.
  </span></td></tr><tr data-dcnode-id="1321"><td data-dcnode-id="1327"><span data-dcnode-id="1331" instrument_node="">
</span><strong data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">1995</span></strong><span data-dcnode-id="1328" instrument_node="">
</span></td><td data-dcnode-id="1322"><span data-dcnode-id="1326" instrument_node="">
</span><strong data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Daniel Goleman </span></strong><span data-dcnode-id="1323" instrument_node="">popularised the term Emotional
  Intelligence for the workplaces. 
  </span></td></tr><tr data-dcnode-id="1313"><td data-dcnode-id="1316"><span data-dcnode-id="1320" instrument_node="">
</span><strong data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">2013</span></strong><span data-dcnode-id="1317" instrument_node="">
</span></td><td data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">
  UPSC
  introduced Ethics in the Mains exam and Emotional Intelligence was part of
  this.
  </span></td></tr></tbody></table></figure><span data-dcnode-id="1309" instrument_node="">
</span></div></div><span data-dcnode-id="1306" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="1305"><span data-dcnode-id="1304" instrument_node="">
</span><h2 class="has-vivid-red-color has-text-color" data-dcnode-id="1299"><span class="ez-toc-section" data-dcnode-id="1303" id="Domains_of_EI_given_by_Daniel_Goleman"></span><strong data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Domains of EI given by Daniel Goleman</span></strong><span class="ez-toc-section-end" data-dcnode-id="1300"></span></h2><span data-dcnode-id="1298" instrument_node="">
</span><div class="wp-block-group has-very-light-gray-background-color has-background" data-dcnode-id="1181"><div class="wp-block-group__inner-container" data-dcnode-id="1182"><span data-dcnode-id="1297" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1295"><img alt="Domains of Emotional Intelligence" class="wp-image-3873" data-dcnode-id="1296" sizes="(max-width: 1080px) 100vw, 1080px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilspedia.com/wp-content/uploads/2021/05/image-44.png&amp;raw" srcset="https://civilspedia.com/wp-content/uploads/2021/05/image-44.png 1080w, https://civilspedia.com/wp-content/uploads/2021/05/image-44-300x300.png 300w, https://civilspedia.com/wp-content/uploads/2021/05/image-44-1024x1024.png 1024w, https://civilspedia.com/wp-content/uploads/2021/05/image-44-150x150.png 150w, https://civilspedia.com/wp-content/uploads/2021/05/image-44-768x768.png 768w"></figure><span data-dcnode-id="1294" instrument_node="">
</span><p class="has-text-color has-large-font-size has-vivid-red-color" data-dcnode-id="1291"><strong data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">1 . Self-Awareness</span></strong></p><span data-dcnode-id="1290" instrument_node="">
</span><ul data-dcnode-id="1278"><li data-dcnode-id="1285"><span data-dcnode-id="1289" instrument_node="">Self-awareness
     means&nbsp; </span><strong data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">recognizing your own emotions and</span></strong><span data-dcnode-id="1286" instrument_node=""> ability to hear
     your inner voice</span></li><li data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">It is critical for
     psychological insight, self-understanding, and self-acceptance. </span></li><li data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">People who are
     certain about their emotions are more adept at managing their lives and
     having a more certain sense of their true feelings about various
     decisions: what job to take, what relationships to invest their time in,
     what activities to undertake, and what goals to set. </span></li><li data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Aristotle has also said that Self Awareness is the beginning of all
     wisdom.</span></li></ul><span data-dcnode-id="1277" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1276"><span data-dcnode-id="1275" instrument_node="">
</span><p class="has-text-color has-large-font-size has-vivid-red-color" data-dcnode-id="1272"><strong data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">2. Self-Management </span></strong></p><span data-dcnode-id="1271" instrument_node="">
</span><ul data-dcnode-id="1259"><li data-dcnode-id="1267"><span data-dcnode-id="1270" instrument_node="">Through self-awareness, you      come to know your emotions. </span><strong data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Now you&nbsp; can regulate &amp; manage&nbsp; ones      own emotions which comes under self management. </span></strong></li><li data-dcnode-id="1264"><strong data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">This      means soothing ourselves, and controlling anxiety, depression or anger.      People who      fail in this ability are more prone to feelings of distress &amp;      depression. </span></strong></li><li data-dcnode-id="1260"><span data-dcnode-id="1263" instrument_node="">Mastering the      management of our emotions </span><strong data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">allows us to recover      quicker from setbacks, upsets, and failures, and to move on towards our      goals.</span></strong></li></ul><span data-dcnode-id="1258" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1257"><span data-dcnode-id="1256" instrument_node="">
</span><p class="has-text-color has-large-font-size has-vivid-red-color" data-dcnode-id="1253"><strong data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">3. Social Awareness</span></strong></p><span data-dcnode-id="1252" instrument_node="">
</span><ul data-dcnode-id="1234"><li data-dcnode-id="1246"><strong data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Try to </span></strong><strong data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">know about emotions of&nbsp; others</span></strong><span data-dcnode-id="1247" instrument_node=""> (and hence coming to situation that those can be
     channelised and used in next stage). </span></li><li data-dcnode-id="1235"><span data-dcnode-id="1245" instrument_node="">It includes </span><strong data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Empathy</span></strong><span data-dcnode-id="1242" instrument_node=""> ie our ability to feel what others
     feel, to understand what others have to say, and to get attuned to subtle social signals about what others
     need or want. This</span><strong data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node=""> is a </span></strong><strong data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">must-have ability for everyone in the caring
     professions, in education, sales or management</span></strong><strong data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">.</span></strong></li></ul><span data-dcnode-id="1233" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1232"><span data-dcnode-id="1231" instrument_node="">
</span><p class="has-text-color has-large-font-size has-vivid-red-color" data-dcnode-id="1228"><strong data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">4. Social Management</span></strong></p><span data-dcnode-id="1227" instrument_node="">
</span><ul data-dcnode-id="1213"><li data-dcnode-id="1223"><span data-dcnode-id="1226" instrument_node="">It means </span><strong data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">managing the emotions of&nbsp; others.</span></strong></li><li data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">It comes under
     Relationship Management.</span></li><li data-dcnode-id="1214"><span data-dcnode-id="1220" instrument_node="">This is the task
     of </span><strong data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">leadership,
     popularity, and interpersonal effectiveness</span></strong><strong data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">.</span></strong><span data-dcnode-id="1215" instrument_node=""> It&nbsp; involves&nbsp;
     guiding them and channelising their emotions constructively. </span></li></ul><span data-dcnode-id="1212" instrument_node="">
</span><ul data-dcnode-id="1184"><li data-dcnode-id="1204"><strong data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Person with high emotional
     intelligence </span></strong><strong data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">becomes
     a force multiplier</span></strong><strong data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">, he
     can extract max work out of the team members – he knows how to motivate
     people</span></strong><span data-dcnode-id="1205" instrument_node="">.
     Gandhi became good leader because he had high EI.</span></li><li data-dcnode-id="1185"><span data-dcnode-id="1203" instrument_node="">Hence,
     person who can manage emotions of others will be affective in following
     works:-</span><ul data-dcnode-id="1186"><li data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Influence</span></li><li data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Leadership</span></li><li data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Developing
      Others </span></li><li data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Communication
      </span></li><li data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Change
      Catalyst </span></li><li data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Conflict
      Management </span></li><li data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Building
      Bonds </span></li><li data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Teamwork
      and Collaboration </span></li></ul></li></ul><span data-dcnode-id="1183" instrument_node="">
</span></div></div><span data-dcnode-id="1180" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="1179"><span data-dcnode-id="1178" instrument_node="">
</span><h2 class="has-vivid-red-color has-text-color" data-dcnode-id="1173"><span class="ez-toc-section" data-dcnode-id="1177" id="Ability_Model"></span><strong data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Ability Model </span></strong><span class="ez-toc-section-end" data-dcnode-id="1174"></span></h2><span data-dcnode-id="1172" instrument_node="">
</span><div class="wp-block-group has-background" data-dcnode-id="1094" style="background-color:#ffe9e9"><div class="wp-block-group__inner-container" data-dcnode-id="1095"><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1170" instrument_node="">The
model </span><strong data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">proposes that </span></strong><strong data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">individuals vary in
their ability to process information of an emotional nature&nbsp; .</span></strong><strong data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node=""> Those
who have high ability have high EI. </span></strong></p><span data-dcnode-id="1162" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1160"><img alt="Ability Model of Emotional Intelligence" class="wp-image-3878" data-dcnode-id="1161" sizes="(max-width: 1920px) 100vw, 1920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilspedia.com/wp-content/uploads/2021/05/image-45.png&amp;raw" srcset="https://civilspedia.com/wp-content/uploads/2021/05/image-45.png 1920w, https://civilspedia.com/wp-content/uploads/2021/05/image-45-300x169.png 300w, https://civilspedia.com/wp-content/uploads/2021/05/image-45-1024x576.png 1024w, https://civilspedia.com/wp-content/uploads/2021/05/image-45-768x432.png 768w, https://civilspedia.com/wp-content/uploads/2021/05/image-45-1536x864.png 1536w"></figure><span data-dcnode-id="1159" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1158" style="height:20px"></div><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1154"><strong data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">EI is calculated on basis of Four Abilities wrt Emotions </span></strong></p><span data-dcnode-id="1153" instrument_node="">
</span><p class="has-text-color has-large-font-size has-vivid-red-color" data-dcnode-id="1150"><strong data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">1 . Perceiving Emotions </span></strong></p><span data-dcnode-id="1149" instrument_node="">
</span><ul data-dcnode-id="1135"><li data-dcnode-id="1140"><span data-dcnode-id="1148" instrument_node="">The ability to </span><strong data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">detect&nbsp; emotions </span></strong><strong data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">in faces , pictures &amp; cultural
     artefacts</span></strong><span data-dcnode-id="1143" instrument_node="">&nbsp; </span><strong data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">including the ability
     to identify one’s own emotions. </span></strong></li><li data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">All individuals have different
     ability to perceive emotions.</span></li><li data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Perceiving emotions represents
     a basic aspect of EI as without it any further action in this regard is
     not possible. </span></li></ul><span data-dcnode-id="1134" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1133"><span data-dcnode-id="1132" instrument_node="">
</span><p class="has-text-color has-large-font-size has-vivid-red-color" data-dcnode-id="1129"><strong data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">2 . Understanding Emotions</span></strong></p><span data-dcnode-id="1128" instrument_node="">
</span><ul data-dcnode-id="1121"><li data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">The emotions that
     we perceive can carry wide variety of meanings. The observer must try to
     interpret cause of that emotion. One having more ability in this regard can interpret
     correctly the cause of emotion &amp; vice versa. </span></li><li data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">If someone is expressing angry
     emotion, the observer must interpret the cause of their anger &amp; what
     it might mean. </span></li><li data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">For example:&nbsp; if your boss is&nbsp; angry, it might mean that he is
     dissatisfied with your work or it could be because he got a speeding
     ticket or he might be fighting with his wife. One having high EI will have
     high ability to understand what is the cause.</span></li></ul><span data-dcnode-id="1120" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="1118"><img alt="understanding emotions" class="wp-image-3879" data-dcnode-id="1119" sizes="(max-width: 1920px) 100vw, 1920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilspedia.com/wp-content/uploads/2021/05/image-46.png&amp;raw" srcset="https://civilspedia.com/wp-content/uploads/2021/05/image-46.png 1920w, https://civilspedia.com/wp-content/uploads/2021/05/image-46-300x169.png 300w, https://civilspedia.com/wp-content/uploads/2021/05/image-46-1024x576.png 1024w, https://civilspedia.com/wp-content/uploads/2021/05/image-46-768x432.png 768w, https://civilspedia.com/wp-content/uploads/2021/05/image-46-1536x864.png 1536w"></figure><span data-dcnode-id="1117" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1116"><span data-dcnode-id="1115" instrument_node="">
</span><p class="has-text-color has-large-font-size has-vivid-red-color" data-dcnode-id="1112"><strong data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">3. Managing Emotions</span></strong></p><span data-dcnode-id="1111" instrument_node="">
</span><ul data-dcnode-id="1106"><li data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Emotional
     intelligence involves an ability to manage our own
     emotions and those of others.&nbsp; </span></li><li data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">People
     who are emotionally intelligent have an ability to amplify or restrain
     emotions, depending on the situation. </span></li></ul><span data-dcnode-id="1105" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1104"><span data-dcnode-id="1103" instrument_node="">
</span><p class="has-text-color has-large-font-size has-vivid-red-color" data-dcnode-id="1100"><strong data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">4. Using Emotions in thought</span></strong></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">In thought process, persons use Emotions&nbsp; to enhance thinking, decision-making, channelizing&nbsp; emotions&nbsp; for&nbsp; constructive&nbsp; purpose,&nbsp; like&nbsp; making appropriate&nbsp; decision&nbsp; or solving&nbsp; some&nbsp; problem.</span></p><span data-dcnode-id="1096" instrument_node="">
</span></div></div><span data-dcnode-id="1093" instrument_node="">

</span><h2 class="has-vivid-red-color has-text-color" data-dcnode-id="1086"><span class="ez-toc-section" data-dcnode-id="1090" id="Indian_Philosophical_Thought_and_Emotional_Intelligence"></span><strong data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Indian Philosophical Thought and Emotional Intelligence</span></strong><span class="ez-toc-section-end" data-dcnode-id="1087"></span></h2><span data-dcnode-id="1085" instrument_node="">
</span><div class="wp-block-group has-background" data-dcnode-id="1074" style="background-color:#e4f1fa"><div class="wp-block-group__inner-container" data-dcnode-id="1075"><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1083" instrument_node="">Indian philosophical thought also speaks about Emotional Intelligence. Bhagavad Gita refers to&nbsp; the&nbsp; emotionally&nbsp; intelligent&nbsp; person&nbsp; as&nbsp; a ‘</span><strong data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Sthithapragnya</span></strong><span data-dcnode-id="1080" instrument_node="">’ (the emotionally&nbsp; stable&nbsp; person).&nbsp; A&nbsp; ‘Sthithapragnya’,&nbsp; according&nbsp; to&nbsp; Lord&nbsp; Krishna&nbsp; is&nbsp; one&nbsp; who remains&nbsp; unperturbed&nbsp; in&nbsp; the&nbsp; face&nbsp; of&nbsp; calamity,&nbsp; and&nbsp; takes&nbsp; good&nbsp; or evil&nbsp; with&nbsp; equanimity.&nbsp; He has the&nbsp; power to&nbsp; emotionally&nbsp; attach&nbsp; or detach&nbsp; from&nbsp; any&nbsp; situation,&nbsp; at&nbsp; his&nbsp; will.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1077"></p><span data-dcnode-id="1076" instrument_node="">
</span></div></div><span data-dcnode-id="1073" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="1072"><span data-dcnode-id="1071" instrument_node="">
</span><h2 class="has-vivid-red-color has-text-color" data-dcnode-id="1066"><span class="ez-toc-section" data-dcnode-id="1070" id="Side_Topic_Intelligence_Quotient_IQ"></span><strong data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Side Topic: Intelligence Quotient (IQ)</span></strong><span class="ez-toc-section-end" data-dcnode-id="1067"></span></h2><span data-dcnode-id="1065" instrument_node="">
</span><div class="wp-block-group has-background" data-dcnode-id="988" style="background-color:#fdf7e6"><div class="wp-block-group__inner-container" data-dcnode-id="989"><span data-dcnode-id="1064" instrument_node="">
</span><p class="has-text-color has-large-font-size has-vivid-red-color" data-dcnode-id="1061"><strong data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Intelligence
Quotient (IQ) Measurement </span></strong></p><span data-dcnode-id="1060" instrument_node="">
</span><ul data-dcnode-id="1032"><li data-dcnode-id="1051"><span data-dcnode-id="1059" instrument_node="">It is ratio of person’s mental
     age to chronological age </span><ul data-dcnode-id="1052"><li data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Above Average Intelligence =
      Mental Age &gt; Chronological Age </span></li><li data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Below Average Intelligence =
      Mental Age &lt; Chronological Age </span></li><li data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Average Intelligence = Mental
      Age = Chronological Age </span></li></ul></li><li data-dcnode-id="1042"><span data-dcnode-id="1050" instrument_node="">Formula to calculate </span><strong data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">IQ = Mental Age / Chronological Age X 100</span></strong><ul data-dcnode-id="1043"><li data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">10 year old child who does as
      well as Average 10 year child has IQ of 100</span></li><li data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">8 Year old child who does as
      good as 10 year child has IQ of 125</span></li></ul></li><li data-dcnode-id="1033"><span data-dcnode-id="1041" instrument_node="">If </span><ul data-dcnode-id="1034"><li data-dcnode-id="1038"><strong data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">IQ &gt; 130 = Genius</span></strong></li><li data-dcnode-id="1035"><strong data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">IQ &lt; 70 = Mentally Retarded.&nbsp; </span></strong></li></ul></li></ul><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1030"></p><span data-dcnode-id="1029" instrument_node="">
</span><p class="has-text-color has-large-font-size has-vivid-red-color" data-dcnode-id="1026"><strong data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">IQ vs EQ</span></strong></p><span data-dcnode-id="1025" instrument_node="">
