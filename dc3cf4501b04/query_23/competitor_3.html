</span><h2 class="has-vivid-red-color has-text-color" data-dcnode-id="980"><span class="ez-toc-section" data-dcnode-id="984" id="What_is_more_important-_EQ_or_IQ"></span><strong data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">What is more important- EQ or IQ?</span></strong><span class="ez-toc-section-end" data-dcnode-id="981"></span></h2><span data-dcnode-id="979" instrument_node="">
</span><div class="wp-block-group has-background" data-dcnode-id="963" style="background-color:#ddf8ed"><div class="wp-block-group__inner-container" data-dcnode-id="964"><span data-dcnode-id="978" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="976"><img alt="What is more important- EQ or IQ?" class="wp-image-3881" data-dcnode-id="977" sizes="(max-width: 1920px) 100vw, 1920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilspedia.com/wp-content/uploads/2021/05/image-47.png&amp;raw" srcset="https://civilspedia.com/wp-content/uploads/2021/05/image-47.png 1920w, https://civilspedia.com/wp-content/uploads/2021/05/image-47-300x169.png 300w, https://civilspedia.com/wp-content/uploads/2021/05/image-47-1024x576.png 1024w, https://civilspedia.com/wp-content/uploads/2021/05/image-47-768x432.png 768w, https://civilspedia.com/wp-content/uploads/2021/05/image-47-1536x864.png 1536w"></figure><span data-dcnode-id="975" instrument_node="">
</span><ul data-dcnode-id="966"><li data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">EQ is believed to      be a better indicator of success at the workplace. People with high EQ      usually make great leaders and team players because of their ability to      understand, empathise, and connect with the people around them.&nbsp; David Goleman in his book ‘Emotional      Intelligence: Why EI matters more than IQ’&nbsp;      has concluded that “The success of a person depends more on EI      i.e. ability of person to manage emotions than IQ i.e. cognitive ability.”      According      to Goleman, success at workplace is about 80% or more dependent on EQ and      about 20% or less dependent upon IQ.</span></li><li data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">As a result, many persons,      high on IQ, may not be successful in life, while contrary to this, most      successful people are high on EQ. </span></li><li data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Intellectual intelligence (IQ)      isn’t enough on its own to be successful in life. Ones IQ can get him into      college, but it’s the Emotional Intelligence that manages the stress and      emotions when facing final exams or during an interview. EQ, on the other      hand, is the ability to effectively use IQ and all other potentialities      that an individual possesses to the greatest advantage. </span></li><li data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Nobel Prize winning      psychologist, Daniel Kahneman, found that people would rather do business      with a person they like and trust rather than someone they don’t, even if      the likeable person is offering a lower quality product or service at a      higher price. Hence, instead of exclusively focusing on conventional      intelligence quotient, one should make an investment in strengthening      his/her EQ (Emotional Intelligence). </span></li></ul><span data-dcnode-id="965" instrument_node="">
</span></div></div><span data-dcnode-id="962" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="961"><span data-dcnode-id="960" instrument_node="">
</span><h2 class="has-vivid-red-color has-text-color" data-dcnode-id="955"><span class="ez-toc-section" data-dcnode-id="959" id="Attributes_of_Emotionally_Intelligent_Person"></span><strong data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Attributes of Emotionally Intelligent Person </span></strong><span class="ez-toc-section-end" data-dcnode-id="956"></span></h2><span data-dcnode-id="954" instrument_node="">
</span><div class="wp-block-group has-very-light-gray-background-color has-background" data-dcnode-id="862"><div class="wp-block-group__inner-container" data-dcnode-id="863"><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">According
to Goleman, Emotionally Intelligent person has following characteristics </span></p><span data-dcnode-id="950" instrument_node="">
</span><p class="has-text-color has-medium-font-size has-vivid-red-color" data-dcnode-id="947"><strong data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Self Awareness </span></strong></p><span data-dcnode-id="946" instrument_node="">
</span><ul data-dcnode-id="938"><li data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Self Awareness means knowledge      about oneself ie one’s strength and weakness. </span></li><li data-dcnode-id="939"><span data-dcnode-id="943" instrument_node="">Benefit : Person will </span><strong data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">set realistic goals</span></strong><span data-dcnode-id="940" instrument_node=""> and hence chances of goal      accomplishment will be higher. Hence, they have history of positive goal      discrepancy.</span></li></ul><span data-dcnode-id="937" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="936" style="height:20px"></div><span data-dcnode-id="935" instrument_node="">
</span><p class="has-text-color has-medium-font-size has-vivid-red-color" data-dcnode-id="932"><strong data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Self Motivation </span></strong></p><span data-dcnode-id="931" instrument_node="">
</span><ul data-dcnode-id="926"><li data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Such people have high stress      management skills and can recover from setbacks rapidly. </span></li><li data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Because of self motivation,      sustained action is possible. </span></li></ul><span data-dcnode-id="925" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="924" style="height:20px"></div><span data-dcnode-id="923" instrument_node="">
</span><p class="has-text-color has-medium-font-size has-vivid-red-color" data-dcnode-id="920"><strong data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Self Regulation</span></strong></p><span data-dcnode-id="919" instrument_node="">
</span><ul data-dcnode-id="913"><li data-dcnode-id="914"><span data-dcnode-id="918" instrument_node="">They are able to produce </span><strong data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">measured response to the emotionally surcharged      events</span></strong><span data-dcnode-id="915" instrument_node=""> . This      becomes possible because they don’t allow themselves to become prisoners      of their own feelings.</span></li></ul><span data-dcnode-id="912" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="911" style="height:20px"></div><span data-dcnode-id="910" instrument_node="">
</span><p class="has-text-color has-medium-font-size has-vivid-red-color" data-dcnode-id="907"><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Empathy</span></strong></p><span data-dcnode-id="906" instrument_node="">
</span><ul data-dcnode-id="894"><li data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Understand the perspective of      others and feel the things like others do. </span></li><li data-dcnode-id="895"><span data-dcnode-id="903" instrument_node="">Empathy can be      further categorised into three types</span><ol data-dcnode-id="896" type="1"><li data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">cognitive empathy—the ability       to understand another person’s perspective;</span></li><li data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">emotional empathy—the ability       to feel what someone else feels;</span></li><li data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">empathic concern—the ability       to sense what another person needs from you.</span></li></ol></li></ul><span data-dcnode-id="893" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="892" style="height:20px"></div><span data-dcnode-id="891" instrument_node="">
</span><p class="has-text-color has-medium-font-size has-vivid-red-color" data-dcnode-id="888"><strong data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Better handling of relationships or social skills </span></strong></p><span data-dcnode-id="887" instrument_node="">
</span><ul data-dcnode-id="875"><li data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">The social skills that enables      the individual to manage relationship effectively includes Tolerance,      Patience, Tactfulness , Good social memory, sense of humour and high sense      of self-efficacy.</span></li><li data-dcnode-id="881"><span data-dcnode-id="884" instrument_node="">Person having high EI has the      ability to enrol people in his </span><strong data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">vision.</span></strong></li><li data-dcnode-id="876"><span data-dcnode-id="880" instrument_node="">Person having high EI has the      ability to convert challenges into opportunities and </span><strong data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">create      win-win situation</span></strong><span data-dcnode-id="877" instrument_node="">      for all stakeholders.</span></li></ul><span data-dcnode-id="874" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="873" style="height:20px"></div><span data-dcnode-id="872" instrument_node="">
</span><p class="has-text-color has-medium-font-size has-vivid-red-color" data-dcnode-id="869"><strong data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Creative</span></strong></p><span data-dcnode-id="868" instrument_node="">
</span><ul data-dcnode-id="865"><li data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">It
     is believed that creativity is facilitated by&nbsp; the positive emotions. On the other
     hand, EI enables one to manage their stress levels, and be optimistic in
     the face of adversities.</span></li></ul><span data-dcnode-id="864" instrument_node="">
</span></div></div><span data-dcnode-id="861" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="860"><span data-dcnode-id="859" instrument_node="">
</span><h2 class="has-vivid-red-color has-text-color" data-dcnode-id="854"><span class="ez-toc-section" data-dcnode-id="858" id="Applications_of_EI_Why_to_develop_EI"></span><strong data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Applications of EI : Why to develop EI?</span></strong><span class="ez-toc-section-end" data-dcnode-id="855"></span></h2><span data-dcnode-id="853" instrument_node="">
</span><div class="wp-block-group has-background" data-dcnode-id="748" style="background-color:#ffeeee"><div class="wp-block-group__inner-container" data-dcnode-id="749"><span data-dcnode-id="852" instrument_node="">
</span><p class="has-text-color has-medium-font-size has-vivid-red-color" data-dcnode-id="849"><strong data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">To become good
leader</span></strong></p><span data-dcnode-id="848" instrument_node="">
</span><ul data-dcnode-id="840"><li data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">It was Daniel
     Goleman who established the&nbsp; link
     between EQ and leadership. In leader-follower relationships, the leader is
     an&nbsp; “emotional guide” who navigates
     the&nbsp; course of uncertainty, threat,
     clarity, assurance and work.&nbsp; It is
     also the fundamental task of leaders to create&nbsp; resonance; resonance being “a reservoir
     of positivity that frees the best in people”. </span></li><li data-dcnode-id="841"><span data-dcnode-id="845" instrument_node="">Leadership is
     intrinsically an emotional process in which leader recognise follower’s
     emotional state , attempt to evoke emotions in followers and then seek to
     manage follower’s emotional state accordingly . </span><strong data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Person
     with high emotional intelligence becomes a force multiplier, he can
     extract max work out of the team members – he knows how to motivate people</span></strong><span data-dcnode-id="842" instrument_node="">. Gandhi became
     good leader because he had high EI. He know how to inspire people, how to
     rally them for freedom struggle , how people will react etc </span></li></ul><span data-dcnode-id="839" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="838" style="height:20px"></div><span data-dcnode-id="837" instrument_node="">
</span><p class="has-text-color has-medium-font-size has-vivid-red-color" data-dcnode-id="834"><strong data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">To build better Relationships &amp; become more acceptable</span></strong></p><span data-dcnode-id="833" instrument_node="">
</span><ul data-dcnode-id="827"><li data-dcnode-id="828"><span data-dcnode-id="832" instrument_node="">Intelligence Quotient (IQ)      will help person to work better because person will have more skills but      EQ will </span><strong data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">help person to have better relationships</span></strong><span data-dcnode-id="829" instrument_node="">. If you have high emotional      intelligence, you can recognise your own emotional state and emotional      state of others and engage people in a way that draws them near you. It      will help person to be accepted by public .&nbsp; </span></li></ul><span data-dcnode-id="826" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="825" style="height:20px"></div><span data-dcnode-id="824" instrument_node="">
</span><p class="has-text-color has-medium-font-size has-vivid-red-color" data-dcnode-id="821"><strong data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Channelize own
emotions constructively</span></strong></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="819" instrument_node="">Since
Emotions are here to stay so one cant get rid of them but one can channelize
his/her emotions in constructive way. </span><strong data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Unregulated emotions damage</span></strong><span data-dcnode-id="816" instrument_node=""> your mental and
physical health.</span></p><span data-dcnode-id="814" instrument_node="">
</span><ul data-dcnode-id="807"><li data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Depressed person may become      suicidal</span></li><li data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Aggressive person may become      insomniac.</span></li><li data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Unregulated Emotions leads to clouded judgements.</span></li></ul><span data-dcnode-id="806" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="805" style="height:20px"></div><span data-dcnode-id="804" instrument_node="">
</span><p class="has-text-color has-medium-font-size has-vivid-red-color" data-dcnode-id="801"><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Negotiations</span></strong></p><span data-dcnode-id="800" instrument_node="">
</span><ul data-dcnode-id="794"><li data-dcnode-id="795"><span data-dcnode-id="799" instrument_node="">Whether you are dealing with      trading partner , competitor , customer or colleague , being able to      empathise (put yourself in other’s shoe or thinking from other’s      perspective) can be used to arrive at </span><strong data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">finding win-win solutions</span></strong><span data-dcnode-id="796" instrument_node="">.&nbsp;&nbsp; </span></li></ul><span data-dcnode-id="793" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="792" style="height:20px"></div><span data-dcnode-id="791" instrument_node="">
</span><p class="has-text-color has-medium-font-size has-vivid-red-color" data-dcnode-id="788"><strong data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Emerge from setbacks and depressions easily</span></strong></p><span data-dcnode-id="787" instrument_node="">
</span><ul data-dcnode-id="781"><li data-dcnode-id="782"><span data-dcnode-id="786" instrument_node="">Improve      your performance and help to </span><strong data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">pass through depressions &amp; setbacks      easily</span></strong><span data-dcnode-id="783" instrument_node="">. Emotional Intelligence&nbsp;      can be used for internal motivation which can reduce      procrastination , increase self-confidence and improve our ability to      focus on goals. Along with that, it helps the person in leading a      healthy life as accumulated and persistent stress leads to the various      cardiovascular diseases. </span></li></ul><span data-dcnode-id="780" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="779" style="height:20px"></div><span data-dcnode-id="778" instrument_node="">
</span><p class="has-text-color has-medium-font-size has-vivid-red-color" data-dcnode-id="775"><strong data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Become more employable</span></strong></p><span data-dcnode-id="774" instrument_node="">
</span><ul data-dcnode-id="771"><li data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">U.S.&nbsp; Department of Labor conducted a      survey&nbsp; which looked at what      employers were looking for in entry level positions.&nbsp; The results showed that&nbsp; the list was&nbsp; dominated by emotional intelligence      factors. </span></li></ul><span data-dcnode-id="770" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="769" style="height:20px"></div><span data-dcnode-id="768" instrument_node="">
</span><p class="has-text-color has-medium-font-size has-vivid-red-color" data-dcnode-id="765"><strong data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Social Harmony</span></strong></p><span data-dcnode-id="764" instrument_node="">
</span><ul data-dcnode-id="761"><li data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Emotional      intelligent people can understand other outrage or outburst thus avoid      violent conflict and preventing communal issue. </span></li></ul><span data-dcnode-id="760" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="759" style="height:20px"></div><span data-dcnode-id="758" instrument_node="">
</span><p class="has-text-color has-medium-font-size has-vivid-red-color" data-dcnode-id="755"><strong data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Use in Governance and Administration</span></strong></p><span data-dcnode-id="754" instrument_node="">
</span><ul data-dcnode-id="751"><li data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Dealt below</span></li></ul><span data-dcnode-id="750" instrument_node="">
</span></div></div><span data-dcnode-id="747" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="746"><span data-dcnode-id="745" instrument_node="">
</span><h2 class="has-vivid-red-color has-text-color" data-dcnode-id="740"><span class="ez-toc-section" data-dcnode-id="744" id="Emotional_Intelligence_used_by_famous_personalities"></span><strong data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Emotional Intelligence used by famous personalities </span></strong><span class="ez-toc-section-end" data-dcnode-id="741"></span></h2><span data-dcnode-id="739" instrument_node="">
</span><div class="wp-block-group has-background" data-dcnode-id="705" style="background-color:#e2f2fb"><div class="wp-block-group__inner-container" data-dcnode-id="706"><span data-dcnode-id="738" instrument_node="">
</span><p class="has-text-color has-large-font-size has-vivid-red-color" data-dcnode-id="735"><strong data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Gandhi </span></strong></p><span data-dcnode-id="734" instrument_node="">
</span><ul data-dcnode-id="731"><li data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Gandhi became good leader
     because he had high EI. He know how to inspire people, how to rally them
     for freedom struggle , how people will react, how to select symbols that
     will resonate with the common public etc. </span></li></ul><span data-dcnode-id="730" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="728"><img alt="Mahatma Gandhi and Emotional Intelligence" class="wp-image-3882" data-dcnode-id="729" sizes="(max-width: 3840px) 100vw, 3840px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilspedia.com/wp-content/uploads/2021/05/image-48.png&amp;raw" srcset="https://civilspedia.com/wp-content/uploads/2021/05/image-48.png 3840w, https://civilspedia.com/wp-content/uploads/2021/05/image-48-300x169.png 300w, https://civilspedia.com/wp-content/uploads/2021/05/image-48-1024x576.png 1024w, https://civilspedia.com/wp-content/uploads/2021/05/image-48-768x432.png 768w, https://civilspedia.com/wp-content/uploads/2021/05/image-48-1536x864.png 1536w, https://civilspedia.com/wp-content/uploads/2021/05/image-48-2048x1152.png 2048w"></figure><span data-dcnode-id="727" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="726"><span data-dcnode-id="725" instrument_node="">
</span><p class="has-text-color has-large-font-size has-vivid-red-color" data-dcnode-id="722"><strong data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Jawahar Lal Nehru</span></strong></p><span data-dcnode-id="721" instrument_node="">
</span><ul data-dcnode-id="718"><li data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">During&nbsp; the&nbsp;
     seventeen years&nbsp; he&nbsp; was&nbsp;
     the&nbsp; Prime&nbsp; Minister,&nbsp; Nehru&nbsp;
     strode&nbsp; the&nbsp; Indian&nbsp;
     political stage&nbsp; like&nbsp; a&nbsp;
     colossus.&nbsp; But&nbsp; he&nbsp;
     never&nbsp; imposed&nbsp; his&nbsp;
     political&nbsp; will&nbsp; and&nbsp;
     always&nbsp; had&nbsp; an&nbsp;
     ear&nbsp; for what&nbsp; others&nbsp;
     had&nbsp; to&nbsp; say.&nbsp;
     Though&nbsp; not&nbsp; in&nbsp;
     favour&nbsp; of&nbsp; linguistic&nbsp; states,&nbsp;
     he&nbsp; adhered&nbsp; to&nbsp;
     popular wishes.&nbsp; He&nbsp; did&nbsp;
     not&nbsp; choose&nbsp; chief-ministers&nbsp; but allowed&nbsp; the&nbsp;
     party&nbsp; organisation&nbsp; at&nbsp;
     the state-levels to&nbsp;
     elect&nbsp; their&nbsp; leaders.</span></li></ul><span data-dcnode-id="717" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="716"><span data-dcnode-id="715" instrument_node="">
</span><p class="has-text-color has-large-font-size has-vivid-red-color" data-dcnode-id="712"><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Martin Luther King</span></strong></p><span data-dcnode-id="711" instrument_node="">
</span><ul data-dcnode-id="708"><li data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Some of the greatest moments in human history were fuelled by emotional intelligence. When Martin Luther King, Jr. presented his dream, he chose language that would stir the hearts of his audience. He promised that a land “sweltering with the heat of oppression” could be “transformed into an oasis of freedom and justice.” Delivering this electrifying message required emotional intelligence—the ability to recognize, understand, and manage emotions. Martin Luther King demonstrated remarkable skill in managing his own emotions and in sparking emotions that moved his audience to action. King delivered “a perfectly balanced outcry of reason and emotion, of anger and hope. His tone of pained indignation matched that note for note.” </span></li></ul><span data-dcnode-id="707" instrument_node="">
</span></div></div><span data-dcnode-id="704" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="703"><span data-dcnode-id="702" instrument_node="">
</span><h2 class="has-vivid-red-color has-text-color" data-dcnode-id="697"><span class="ez-toc-section" data-dcnode-id="701" id="Experiments_regarding_Emotional_Intelligence"></span><strong data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Experiments regarding Emotional Intelligence</span></strong><span class="ez-toc-section-end" data-dcnode-id="698"></span></h2><span data-dcnode-id="696" instrument_node="">
</span><div class="wp-block-group has-background" data-dcnode-id="678" style="background-color:#fbf7ea"><div class="wp-block-group__inner-container" data-dcnode-id="679"><span data-dcnode-id="695" instrument_node="">
</span><p class="has-text-color has-large-font-size has-vivid-red-color" data-dcnode-id="692"><strong data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Experiment 1: Marshmallow Experiment </span></strong></p><span data-dcnode-id="691" instrument_node="">
</span><ul data-dcnode-id="684"><li data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Experiment was conducted on      1,037 children who were born in single year of 1970s in Dunedin town of      New Zealand. </span></li><li data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">To know about the will power      and ability to control the emotions of these children, psychologist Walter      Mischel performed Marshmallow Test on them. He gave them choice between      eating one marshmallow right away and getting two by waiting 15 minutes.</span></li><li data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Only 1/3rd of the children      were able to resist for 15 minutes while 2/3rd took single marshmallow      right away. Years later, when the children in the Dunedin study were in      their 30s and all but 4% of them had been tracked down again, the      researchers found that those who’d had the cognitive control to resist the      marshmallow longest were significantly healthier, more successful      financially, and more law-abiding than the ones who’d been unable to hold      out at all.</span></li></ul><span data-dcnode-id="683" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="681"><img alt="Marshmallow Experiment " class="wp-image-3893" data-dcnode-id="682" sizes="(max-width: 1089px) 100vw, 1089px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilspedia.com/wp-content/uploads/2021/05/marshmallow-test-1.png&amp;raw" srcset="https://civilspedia.com/wp-content/uploads/2021/05/marshmallow-test-1.png 1089w, https://civilspedia.com/wp-content/uploads/2021/05/marshmallow-test-1-300x168.png 300w, https://civilspedia.com/wp-content/uploads/2021/05/marshmallow-test-1-1024x573.png 1024w, https://civilspedia.com/wp-content/uploads/2021/05/marshmallow-test-1-768x429.png 768w"></figure><span data-dcnode-id="680" instrument_node="">
</span></div></div><span data-dcnode-id="677" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="676"><span data-dcnode-id="675" instrument_node="">
</span><h2 class="has-vivid-red-color has-text-color" data-dcnode-id="670"><span class="ez-toc-section" data-dcnode-id="674" id="EI_in_Governance_Administration"></span><strong data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">EI in Governance&nbsp; &amp; Administration</span></strong><span class="ez-toc-section-end" data-dcnode-id="671"></span></h2><span data-dcnode-id="669" instrument_node="">
</span><div class="wp-block-group has-background" data-dcnode-id="538" style="background-color:#e7fbf3"><div class="wp-block-group__inner-container" data-dcnode-id="539"><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="667" instrument_node="">All Governance is people governance and all service is public
service . Relationships are the DNA of governance. If</span><strong data-dcnode-id="665"><span data-dcnode-id="666" instrument_node=""> the public functionaries fail to
develop trusting relationships with other people , there can be no governance. </span></strong></p><span data-dcnode-id="663" instrument_node="">
</span><ul data-dcnode-id="646"><li data-dcnode-id="655"><span data-dcnode-id="662" instrument_node="">Guided by </span><strong data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Max Weber’s</span></strong><span data-dcnode-id="659" instrument_node=""> idea on bureaucracy, it had been assumed that </span><strong data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">effectiveness and efficiency would be harmed if
     human emotions influence the rational actions of public administrators</span></strong><span data-dcnode-id="656" instrument_node="">. Therefore , impersonality
     and de-humanisation were regarded as the specific virtues of bureaucracy
     because it was believed that they would remove the danger of irrational
     behaviour by individual bureaucrats and the organization as a whole. </span></li><li data-dcnode-id="647"><span data-dcnode-id="654" instrument_node="">Likewise,</span><strong data-dcnode-id="652"><span data-dcnode-id="653" instrument_node=""> FW Taylor’s Scientific Management Approach</span></strong><span data-dcnode-id="651" instrument_node=""> modelled on the idea of </span><strong data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">time and motion waste was primarily concerned
     with maximizing output and efficiency</span></strong><span data-dcnode-id="648" instrument_node="">. Worker’s emotional issues like boredom, disaffection,
     frustration etc were dismissed as negligible terms. </span></li></ul><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Weber’s and Taylor’s ideas were substantial to the bureaucratic
management for most of the last century. </span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="641" instrument_node="">However, in the second half of last century, the notion that the
</span><strong data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">government
and administrative processes might be improved by looking at the emotional
content in the relational work rather than focussing solely on rationality and
science came more and more to the forefront</span></strong><span data-dcnode-id="638" instrument_node="">. One of the most prominent
contributor in this direction was </span><strong data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Elton Mayo</span></strong><span data-dcnode-id="635" instrument_node=""> who for the first time recognized
that the formal organizational properties don’t satisfy the needs of the
individuals and that the individual form informal groups . Through their
Hawthorne studies , Elton Mayo et al. demonstrated that the </span><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">most significant
factor affecting organizational productivity was the inter-personal
relationships developed on the job and not the pay and working conditions</span></strong><span data-dcnode-id="632" instrument_node="">.
Mayo saw the </span><strong data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">development
of informal groups as an indictment of the society that treated human beings as
insensitive machines and were concerned with only economic self interest.
Mayo’s work resulted in human-relation movement in industry and it’s impact was
felt in working of government and administrative machinery.</span></strong></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="627" instrument_node="">Mayo’s work was followed by the works of Mayer, Salovey and
Goleman and their efforts resulted in the development of understanding that </span><strong data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">governance
encompasses developing trusting relationships</span></strong><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node=""> between the government and
citizens</span></strong><span data-dcnode-id="622" instrument_node=""> . Hence, concept of Emotional Intelligence has become very
valid . </span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">It is increasingly being recognized that&nbsp; public functionaries must know how to deal with circumstances that include emotions.&nbsp;&nbsp; Administrative success and failure today is not based on technical proficiency alone but more so upon how effectively can Public Functionaries display their Emotional Intelligence skills to manage interactions with the people around them and as well as the public effectively. </span></p><span data-dcnode-id="617" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="616" style="height:50px"></div><span data-dcnode-id="615" instrument_node="">
</span><p class="has-text-color has-large-font-size has-vivid-red-color" data-dcnode-id="610"><strong data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">EI helps Civil Serva</span></strong><strong data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">nts to take correct decision in complex
situations</span></strong></p><span data-dcnode-id="609" instrument_node="">
</span><ul data-dcnode-id="588"><li data-dcnode-id="589"><span data-dcnode-id="608" instrument_node="">Indian Civil Servant works in
     complex situations like </span><ul data-dcnode-id="595"><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Scarcity of public resources
      vis a vis expectations of public. </span></li><li data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Unreasonable demands by
      different sections of society .</span></li><li data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Political pressure on
      bureaucrats to deliver.</span></li><li data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Pressure of media to act in
      public interest and to meet targets timely even when resources arent
      sufficient. </span></li><li data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Handling of mass protest and
      riot like situation. </span></li><li data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Management of subordinates.</span></li></ul><ul data-dcnode-id="590"><li data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Blatant use of ‘transfers’,
      ‘postings’ and ‘extensions’.</span></li><li data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Public agitation</span></li></ul></li></ul><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">In
these situations person must hold his nerves and control his emotions and shouldn’t lose temperament. This is possible using
Emotional Intelligence. </span></p><span data-dcnode-id="584" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="582"><img alt="Emotional Intelligence in Governance" class="wp-image-3887" data-dcnode-id="583" sizes="(max-width: 1920px) 100vw, 1920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilspedia.com/wp-content/uploads/2021/05/image-50.png&amp;raw" srcset="https://civilspedia.com/wp-content/uploads/2021/05/image-50.png 1920w, https://civilspedia.com/wp-content/uploads/2021/05/image-50-300x169.png 300w, https://civilspedia.com/wp-content/uploads/2021/05/image-50-1024x576.png 1024w, https://civilspedia.com/wp-content/uploads/2021/05/image-50-768x432.png 768w, https://civilspedia.com/wp-content/uploads/2021/05/image-50-1536x864.png 1536w"></figure><span data-dcnode-id="581" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="580"><span data-dcnode-id="579" instrument_node="">
</span><p class="has-text-color has-large-font-size has-vivid-red-color" data-dcnode-id="576"><strong data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Managing work family conflict</span></strong></p><span data-dcnode-id="575" instrument_node="">
</span><ul data-dcnode-id="572"><li data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">We have observed that Civil      Servants are not able to balance their professional and personal life and      even go to extend of committing suicide. EI is the way out in this regard.</span></li></ul><span data-dcnode-id="571" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="570"><span data-dcnode-id="569" instrument_node="">
</span><p class="has-text-color has-large-font-size has-vivid-red-color" data-dcnode-id="566"><strong data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Helps administrator to become
better leader</span></strong></p><span data-dcnode-id="565" instrument_node="">
</span><ul data-dcnode-id="554"><li data-dcnode-id="557"><span data-dcnode-id="564" instrument_node="">Emotionally intelligent      administrator will be a better leader because he has ability to </span><ul data-dcnode-id="558"><li data-dcnode-id="561"><strong data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Enroll people into his vision (both people and       his workforce).</span></strong></li><li data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Understand &amp; empathise       with different positions </span></li></ul></li><li data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">It improves social capital.      Social capital refers to the bonds of mutual respect and care among the      members of the collective . EI allows up for building up of Social Capital      with Peers, Media, Citizens, Superiors, Subordinates, General Public and      other stakeholders . </span></li></ul><span data-dcnode-id="553" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="552"><span data-dcnode-id="551" instrument_node="">
</span><p class="has-text-color has-large-font-size has-vivid-red-color" data-dcnode-id="548"><strong data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Use of EI in Crowd Management </span></strong></p><span data-dcnode-id="547" instrument_node="">
</span><ul data-dcnode-id="541"><li data-dcnode-id="542"><span data-dcnode-id="546" instrument_node="">When person is charged with
     emotion after particular incident , he will be at the </span><strong data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">lowest level
     of his reasoning</span></strong><span data-dcnode-id="543" instrument_node="">
     eg after Riot against particular community, people of that community will
     get emotionally charged with anger and may try to kill others. At this
     time , it is the emotion of anger that is driving them and not reason.
     Civil Servant placed to control at this situation will have to manage the
     Emotions of Crowd instead of going into reason . </span></li></ul><span data-dcnode-id="540" instrument_node="">
</span></div></div><span data-dcnode-id="537" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="536"><span data-dcnode-id="535" instrument_node="">
</span><h2 class="has-vivid-red-color has-text-color" data-dcnode-id="530"><span class="ez-toc-section" data-dcnode-id="534" id="Sample_Question"></span><strong data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Sample Question</span></strong><span class="ez-toc-section-end" data-dcnode-id="531"></span></h2><span data-dcnode-id="529" instrument_node="">
</span><div class="wp-block-group has-very-light-gray-background-color has-background" data-dcnode-id="495"><div class="wp-block-group__inner-container" data-dcnode-id="496"><span data-dcnode-id="528" instrument_node="">
</span><p class="has-text-color has-medium-font-size has-vivid-red-color" data-dcnode-id="525"><strong data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Question : “Emotion can lead to our worst decisions or our best ones: The difference is emotional intelligence.” In light of the given statement, illustrate how emotional intelligence is critical in decision making. How can it help a civil servant in taking prudent decisions?&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></strong></p><span data-dcnode-id="524" instrument_node="">
</span><ul data-dcnode-id="513"><li data-dcnode-id="516"><span data-dcnode-id="523" instrument_node="">Almost from the      beginning, the decision-making experts encouraged to make decisions      through rational process involving facts and analysis. However, in reality      in many instances, the real driver of our actions are our emotions.&nbsp; Many</span><strong data-dcnode-id="521"><span data-dcnode-id="522" instrument_node=""> experts and empirical studies warn decision-makers      about the perils of making decisions when one is emotionally aroused</span></strong><span data-dcnode-id="520" instrument_node="">. Reason for this      is, there is </span><strong data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">inverse      relationship between Emotional Arousing and Rational Thinking</span></strong><span data-dcnode-id="517" instrument_node="">. If person is more emotionally charged, he will act      under emotions ignoring the reason and can do unethical &amp; revengeful      acts.</span></li><li data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Hence, best course      of action in such situation is to control one’s own emotions and don’t get      swayed by them. Civil Servant should be high on EI and should be able to      control them so that he can take rational decision. </span></li></ul><span data-dcnode-id="512" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="511" style="height:20px"></div><span data-dcnode-id="510" instrument_node="">
</span><p class="has-text-color has-medium-font-size has-vivid-red-color" data-dcnode-id="507"><strong data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">It can help civil servant in taking prudent decision can be illustrated by following example : </span></strong></p><span data-dcnode-id="506" instrument_node="">
</span><ul data-dcnode-id="498"><li data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Take example of
     law enforcement agencies. When faced with hostile environment, they may
     commit revengeful acts. If some terrorist has killed members of agency, in
     anger they can take decision of revenging the death of their colleagues
     and go to site unprepared without doing home work. This can result in huge
     collateral damage. </span></li><li data-dcnode-id="499"><span data-dcnode-id="503" instrument_node="">At the same time,
     if officer is having high EI, then he can manage his own and his junior’s
     emotions and at the same time can channelise their </span><strong data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">anger into inspiration</span></strong><span data-dcnode-id="500" instrument_node=""> for eliminating terrorism. They can
     make proper plan , arrest those terrorist and take out information from
     them to bust their whole organisation </span></li></ul><span data-dcnode-id="497" instrument_node="">
</span></div></div><span data-dcnode-id="494" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="493"><span data-dcnode-id="492" instrument_node="">
</span><h2 class="has-vivid-red-color has-text-color" data-dcnode-id="487"><span class="ez-toc-section" data-dcnode-id="491" id="How_to_develop_Emotional_Intelligence"></span><strong data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">How to develop Emotional Intelligence?</span></strong><span class="ez-toc-section-end" data-dcnode-id="488"></span></h2><span data-dcnode-id="486" instrument_node="">
</span><div class="wp-block-group has-background" data-dcnode-id="457" style="background-color:#faebeb"><div class="wp-block-group__inner-container" data-dcnode-id="458"><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Cognitive&nbsp; intelligence&nbsp; (IQ) does not change with&nbsp; age or&nbsp;
experience.&nbsp; However, with&nbsp; EQ, this is not the case.&nbsp; Emotional competencies are learned and can be
taught.&nbsp; The mastery of EQ skills evolve
over a lifelong growth.</span></p><span data-dcnode-id="482" instrument_node="">
</span><ul data-dcnode-id="460"><li data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Emotional&nbsp; quotient&nbsp;      is best&nbsp; inculcated&nbsp; from&nbsp;      an&nbsp; early&nbsp; age&nbsp;      by&nbsp; encouraging&nbsp; qualities&nbsp; like&nbsp;      sharing, thinking&nbsp; about&nbsp; others,&nbsp;      putting&nbsp; oneself&nbsp; in&nbsp;      another&nbsp; person’s&nbsp; shoes,&nbsp;      giving&nbsp; individual&nbsp; space&nbsp;      and the&nbsp; general&nbsp; principles&nbsp; of&nbsp;      cooperation.&nbsp; There&nbsp; are&nbsp;      tools&nbsp; like&nbsp; toys&nbsp;      and&nbsp; games&nbsp; available&nbsp; to improve emotional&nbsp; quotient,&nbsp; and&nbsp;      children&nbsp; who&nbsp; do&nbsp;      not&nbsp; do&nbsp; well&nbsp;      in&nbsp; social&nbsp; settings&nbsp;      are&nbsp; known&nbsp; to&nbsp;      perform significantly&nbsp;      better&nbsp; after&nbsp; taking&nbsp;      SEL&nbsp; (Social&nbsp; and&nbsp;      Emotional&nbsp; Learning)&nbsp; classes. </span></li><li data-dcnode-id="476"><strong data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Using&nbsp; Yoga</span></strong><span data-dcnode-id="477" instrument_node="">: Person can take help of exercise such as      control over breathing to increase self awareness and self management.</span></li><li data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Person should be open to the      inputs from others.</span></li><li data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Make groups where they can      freely tell each other what they feel as we can’t know who we are until we      hear our self speaking the story of life to whom we trust. </span></li><li data-dcnode-id="468"><strong data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Emotional literacy</span></strong><span data-dcnode-id="469" instrument_node="">: Person should improve his      emotional literacy because if person can’t label his emotional state      correctly, he can’t manage his emotions.</span></li><li data-dcnode-id="464"><strong data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Non-verbal communication</span></strong><span data-dcnode-id="465" instrument_node="">: Person should learn to      interpret non-verbal communication such as facial and body gestures.</span></li><li data-dcnode-id="461"><strong data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Develop empathy </span></strong></li></ul><span data-dcnode-id="459" instrument_node="">
</span></div></div><span data-dcnode-id="456" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="455"><span data-dcnode-id="454" instrument_node="">
</span><div class="wp-block-group has-background" data-dcnode-id="429" style="background-color:#e8f6ff"><div class="wp-block-group__inner-container" data-dcnode-id="430"><span data-dcnode-id="453" instrument_node="">
</span><h2 class="has-vivid-red-color has-text-color" data-dcnode-id="448"><span class="ez-toc-section" data-dcnode-id="452" id="Dark_Side_of_Emotional_Intelligence"></span><strong data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Dark Side of Emotional Intelligence</span></strong><span class="ez-toc-section-end" data-dcnode-id="449"></span></h2><span data-dcnode-id="447" instrument_node="">
</span><ul data-dcnode-id="438"><li data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Leaders can use emotionally
     surcharged speeches to rob the capacity of person to reason and use people
     to achieve their nefarious goals. For Example: Hitler who used his
     emotionally surcharged speeches to encourage common germans to attack and
     kill Jews.</span></li><li data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Person can use Emotional
     Intelligence to disguise his/her true feelings.</span></li><li data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Person with high EQ can also
     use his capability to manipulate others.</span></li><li data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">In the jobs with low emotional
     demands, high EQ can prove to be liability rather than asset. Eg:
     Mechanics, Accountants etc.</span></li></ul><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">But it has to be accepted that people&nbsp; aren’t&nbsp; always&nbsp; using&nbsp; emotional intelligence&nbsp; for&nbsp; nefarious&nbsp; ends.&nbsp; More&nbsp; often&nbsp; than&nbsp; not,&nbsp; emotional&nbsp; skills&nbsp; are&nbsp; simply&nbsp; instrumental tools for goal accomplishment.</span></p><span data-dcnode-id="434" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="432"><img alt="Dark Side of Emotional Intelligence" class="wp-image-3890" data-dcnode-id="433" sizes="(max-width: 1920px) 100vw, 1920px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilspedia.com/wp-content/uploads/2021/05/Darkside-of-EI.png&amp;raw" srcset="https://civilspedia.com/wp-content/uploads/2021/05/Darkside-of-EI.png 1920w, https://civilspedia.com/wp-content/uploads/2021/05/Darkside-of-EI-300x169.png 300w, https://civilspedia.com/wp-content/uploads/2021/05/Darkside-of-EI-1024x576.png 1024w, https://civilspedia.com/wp-content/uploads/2021/05/Darkside-of-EI-768x432.png 768w, https://civilspedia.com/wp-content/uploads/2021/05/Darkside-of-EI-1536x864.png 1536w"></figure><span data-dcnode-id="431" instrument_node="">
</span></div></div><span data-dcnode-id="428" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="427"><span data-dcnode-id="426" instrument_node="">
</span><h2 class="has-vivid-red-color has-text-color" data-dcnode-id="421"><span class="ez-toc-section" data-dcnode-id="425" id="Sample_Case_Study"></span><strong data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Sample Case Study </span></strong><span class="ez-toc-section-end" data-dcnode-id="422"></span></h2><span data-dcnode-id="420" instrument_node="">
</span><div class="wp-block-group has-very-light-gray-background-color has-background" data-dcnode-id="368"><div class="wp-block-group__inner-container" data-dcnode-id="369"><span data-dcnode-id="419" instrument_node="">
</span><div class="wp-block-group has-background" data-dcnode-id="401" style="background-color:#fff0f0"><div class="wp-block-group__inner-container" data-dcnode-id="402"><span data-dcnode-id="418" instrument_node="">
</span><p class="has-text-color has-normal-font-size has-very-dark-gray-color" data-dcnode-id="415"><strong data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">You are the Officer Incharge of&nbsp; a&nbsp;
very&nbsp; important&nbsp; railway&nbsp;
junction,&nbsp; which&nbsp; is&nbsp;
an&nbsp; artery&nbsp; of&nbsp;
trade&nbsp; and&nbsp; commerce.&nbsp;
A&nbsp; peasant&nbsp; disturbance&nbsp;
has&nbsp; been&nbsp; brewing&nbsp;
in&nbsp; your&nbsp; district&nbsp;
for&nbsp; the past&nbsp; few&nbsp;
weeks.&nbsp; Their&nbsp; discussions&nbsp;
with&nbsp; the&nbsp; political&nbsp;
and&nbsp; district&nbsp; leadership&nbsp;
has&nbsp; borne no&nbsp; fruit&nbsp;
and&nbsp; it&nbsp; has&nbsp;
come&nbsp; to&nbsp; the&nbsp;
stage&nbsp; that&nbsp; now&nbsp;
they&nbsp; are&nbsp; protesting&nbsp;
by&nbsp; organizing&nbsp; a&nbsp;
sit-in&nbsp; on&nbsp; the&nbsp;
railway&nbsp; tracks&nbsp; near&nbsp;
the&nbsp; station.&nbsp; They&nbsp;
have&nbsp; thereby&nbsp; succeeded&nbsp;
in&nbsp; blocking movement&nbsp; of&nbsp;
all&nbsp; trains.&nbsp; This&nbsp;
disruption&nbsp; is&nbsp; causing&nbsp;
significant&nbsp; harassment&nbsp; for&nbsp;
the passengers&nbsp; waiting&nbsp; at&nbsp;
the&nbsp; platform&nbsp; as&nbsp;
well. </span></strong></p><span data-dcnode-id="414" instrument_node="">
</span><ol data-dcnode-id="404"><li data-dcnode-id="411"><strong data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">What&nbsp;
     will&nbsp; be&nbsp; your&nbsp;
     course&nbsp; of&nbsp; immediate&nbsp; action?</span></strong></li><li data-dcnode-id="408"><strong data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">How&nbsp; can&nbsp; emotional&nbsp; intelligence act&nbsp; as&nbsp;
     a&nbsp; tool&nbsp; in&nbsp;
     handling&nbsp; this issue? </span></strong></li><li data-dcnode-id="405"><strong data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">What&nbsp; steps&nbsp; will&nbsp;
     you&nbsp; take so&nbsp; that&nbsp;
     such&nbsp; incidents&nbsp; are not repeated&nbsp; in&nbsp;
     the future?</span></strong></li></ol><span data-dcnode-id="403" instrument_node="">
</span></div></div><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Being&nbsp; an&nbsp; officer&nbsp; in&nbsp; charge&nbsp; of&nbsp; the&nbsp; railway&nbsp; station&nbsp; it&nbsp; is&nbsp; my&nbsp; duty&nbsp; to&nbsp; ensure&nbsp; that&nbsp; the railway&nbsp; operations&nbsp; do&nbsp; not&nbsp; get&nbsp; affected&nbsp; by&nbsp; the&nbsp; ongoing&nbsp; protest.&nbsp; I&nbsp; will&nbsp; make&nbsp; sure&nbsp; that&nbsp; the railway&nbsp; tracks&nbsp; are&nbsp; cleared&nbsp; by&nbsp; using&nbsp; persuasion,&nbsp; warning&nbsp; and&nbsp; all&nbsp; other&nbsp; legal&nbsp; means available.&nbsp; I&nbsp; will&nbsp; also&nbsp; seek&nbsp; help&nbsp; from&nbsp; district&nbsp; administration&nbsp; to&nbsp; ensure&nbsp; that&nbsp; smooth functioning&nbsp; of&nbsp; the&nbsp; critical&nbsp; railway&nbsp; junction&nbsp; is&nbsp; not&nbsp; hampered.&nbsp; Additionally,&nbsp; I&nbsp; will&nbsp; ensure that&nbsp; the&nbsp; passengers&nbsp; face&nbsp; minimum&nbsp; inconvenience&nbsp; by&nbsp; providing&nbsp; timely&nbsp; communication to&nbsp; the&nbsp; passengers&nbsp; about&nbsp; the&nbsp; current&nbsp; situation,&nbsp; ensuring&nbsp; basic&nbsp; amenities&nbsp; like&nbsp; water, medical&nbsp; aid&nbsp; etc.&nbsp; at&nbsp; the&nbsp; station.&nbsp; Safety&nbsp; of&nbsp; the&nbsp; passengers&nbsp; at&nbsp; the&nbsp; station&nbsp; will&nbsp; also&nbsp; be&nbsp; taken care&nbsp; of.</span></p><span data-dcnode-id="397" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="396"><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Emotional&nbsp; intelligence&nbsp;
is very&nbsp; crucial&nbsp; to&nbsp;
handle&nbsp; the&nbsp; above&nbsp;
situation.</span></p><span data-dcnode-id="392" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="390"><img alt="" class="wp-image-3891" data-dcnode-id="391" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//civilspedia.com/wp-content/uploads/2021/05/image-51-1024x473.png&amp;raw" srcset="https://civilspedia.com/wp-content/uploads/2021/05/image-51-1024x473.png 1024w, https://civilspedia.com/wp-content/uploads/2021/05/image-51-300x139.png 300w, https://civilspedia.com/wp-content/uploads/2021/05/image-51-768x355.png 768w, https://civilspedia.com/wp-content/uploads/2021/05/image-51.png 1069w"></figure><span data-dcnode-id="389" instrument_node="">
</span><ul data-dcnode-id="382"><li data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Emotional&nbsp; intelligence&nbsp; is&nbsp;      helpful&nbsp; in&nbsp; keeping&nbsp;      oneself&nbsp; calm&nbsp; and&nbsp;      composed. Coordination&nbsp; at&nbsp; many&nbsp;      levels – district&nbsp;      administration,&nbsp; angry&nbsp; protesters,&nbsp; passengers- in&nbsp; such&nbsp;      situation&nbsp; is&nbsp; likely&nbsp;      to&nbsp; generate huge&nbsp; mental </span></li><li data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">The&nbsp; officer&nbsp;      should&nbsp; empathize&nbsp; with&nbsp;      the&nbsp; emotions&nbsp; of&nbsp;      the&nbsp; crowd&nbsp; and&nbsp;      win&nbsp; the&nbsp; trust&nbsp;      of angry&nbsp; peasant&nbsp; protesters&nbsp; who&nbsp;      are&nbsp; full&nbsp; of&nbsp;      doubt.&nbsp; The&nbsp; officer&nbsp;      must&nbsp; base&nbsp; arguments on&nbsp; huge&nbsp;      economic&nbsp; loss,&nbsp; inconvenience&nbsp; to&nbsp;      general&nbsp; public&nbsp; and&nbsp;      the&nbsp; legal consequences&nbsp; to&nbsp;      convince&nbsp; them&nbsp; for&nbsp;      dropping&nbsp; this&nbsp; method&nbsp;      of&nbsp; protest&nbsp; and&nbsp;      engage&nbsp; in meaningful talks      with the&nbsp; political leaders. </span></li><li data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Some&nbsp; passengers&nbsp; may&nbsp;      have&nbsp; urgent&nbsp; reasons&nbsp;      to&nbsp; travel&nbsp; and&nbsp;      the&nbsp; current&nbsp; situation requires&nbsp; that&nbsp;      the&nbsp; emotions&nbsp; of&nbsp;      passengers&nbsp; showing&nbsp; regret&nbsp;      with&nbsp; the&nbsp; current&nbsp;      service needs&nbsp; to&nbsp; be&nbsp;      understood.&nbsp; The&nbsp; officer&nbsp;      must&nbsp; show&nbsp; emotional&nbsp; maturity&nbsp;      in&nbsp; dealing&nbsp; with such&nbsp; passengers.</span></li></ul><span data-dcnode-id="381" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="380"><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Steps that can be
taken to prevent this in future:-</span></p><span data-dcnode-id="376" instrument_node="">
</span><ul data-dcnode-id="371"><li data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">First,&nbsp; I&nbsp;
     would&nbsp; ensure&nbsp; that&nbsp;
     those&nbsp; who&nbsp; are&nbsp;
     involved&nbsp; in&nbsp; blocking&nbsp;
     the&nbsp; railway&nbsp; lines&nbsp;
     get adequately&nbsp; punished.&nbsp; This&nbsp;

     in&nbsp; future&nbsp; to&nbsp;

     awareness&nbsp; about&nbsp; the&nbsp;

     such&nbsp; actions which&nbsp; will&nbsp;

     certain&nbsp; issues&nbsp; is&nbsp;
     not&nbsp; wrong&nbsp; but&nbsp;
     the&nbsp; mechanism&nbsp; to&nbsp;

     and&nbsp; within&nbsp; legal&nbsp;
     means.&nbsp; In&nbsp; any&nbsp;
     case,&nbsp; illegal&nbsp; means&nbsp;
     of&nbsp; protest&nbsp; like blocking&nbsp; railway&nbsp;
     lines&nbsp; is&nbsp; not&nbsp;
     acceptable&nbsp; in&nbsp; a&nbsp;
     democracy&nbsp; where&nbsp; various&nbsp;

</span></div></div><span data-dcnode-id="367" instrument_node="">

</span><h2 class="has-vivid-red-color has-text-color" data-dcnode-id="329"><span class="ez-toc-section" data-dcnode-id="333" id="Previous_Year_Case_Studies"></span><strong data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Previous Year Case Studies</span></strong><span class="ez-toc-section-end" data-dcnode-id="330"></span></h2><span data-dcnode-id="328" instrument_node="">

</span><ol data-dcnode-id="317"><li data-dcnode-id="318"><span data-dcnode-id="326" instrument_node="">A&nbsp; private&nbsp;

     a&nbsp; sense&nbsp; of&nbsp;

     was&nbsp; clear&nbsp; that&nbsp;
     those&nbsp; people&nbsp; who&nbsp;
     gate crashed&nbsp; wanted to&nbsp; be&nbsp;

     of&nbsp; the&nbsp; company&nbsp;
     as&nbsp; well&nbsp; as&nbsp;
     continue&nbsp; as&nbsp; the&nbsp;
     volunteers/members&nbsp; of&nbsp; the party.&nbsp; The&nbsp;
     company&nbsp; maintains&nbsp; high&nbsp;
     standards&nbsp; in&nbsp; integrity&nbsp; and&nbsp;
