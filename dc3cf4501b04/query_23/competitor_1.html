</span><article class="et_pb_post post-4 post type-post status-publish format-standard has-post-thumbnail hentry category-topics" data-dcnode-id="85" id="post-4"><span data-dcnode-id="311" instrument_node="">
</span><div class="et_post_meta_wrapper top" data-dcnode-id="301"><span data-dcnode-id="310" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Positive Emotions and Emotional Intelligence: The Positive Impact of Negative Emotions</span></h1><span data-dcnode-id="307" instrument_node="">
</span><p class="author-link" data-dcnode-id="303"><span data-dcnode-id="306" instrument_node="">By </span><a data-dcnode-id="304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//positivepsychology.org.uk/author/ilona-boniwell/" rel="author" title="Posts by Ilona Boniwell"><span data-dcnode-id="305" instrument_node="">Ilona Boniwell</span></a></p><span data-dcnode-id="302" instrument_node="">
</span></div><span data-dcnode-id="300" instrument_node=""> </span><span data-dcnode-id="298" instrument_node="">
</span><span data-dcnode-id="296" instrument_node="">
</span><div class="entry-content" data-dcnode-id="94"><span data-dcnode-id="295" instrument_node="">
</span><span data-dcnode-id="293" style="float: right;margin: -35px 0;"><span data-dcnode-id="294" instrument_node="">Published: 2008-11-07</span></span><p align="justify" data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">The term ‘emotion’ is notoriously difficult to define. As Fehr and Russell put it: ‘everyone knows what emotion is until asked to give a definition’. Yet we all use this term and seem to easily understand to what, in our experience, it relates.</span></p><span data-dcnode-id="290" instrument_node="">
</span><p align="justify" data-dcnode-id="285"><span data-dcnode-id="289" instrument_node="">Psychologists often employ the notion of affect as an umbrella term for various positive and negative emotions, feelings and moods we frequently experience and easily recognise. In this chapter, I’ll consider two ‘affective’ topics popular within positive psychology – positive emotions and </span><a data-dcnode-id="287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/emotional-intelligence-eq/"><span data-dcnode-id="288" instrument_node="">emotional intelligence</span></a><span data-dcnode-id="286" instrument_node="">.</span></p><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="282"><span data-dcnode-id="283" id="more-4"></span></p><span data-dcnode-id="281" instrument_node="">
</span><h2 data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">The Value of Positive Emotions</span></h2><span data-dcnode-id="278" instrument_node="">
</span><p data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">For years, psychology turned its attention to the study of negative emotions or negative affect, including: depression, sadness, anger, stress and anxiety. Not surprisingly, psychologists found them interesting because they may often lead to, or signal the presence of, psychological disorders.</span></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="269"><span data-dcnode-id="274" instrument_node="">However, </span><a data-dcnode-id="271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//positivepsychology.org.uk/the-beneficial-and-potentially-problematic-effects-of-positive-emotions/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">positive emotions</span></strong></a><span data-dcnode-id="270" instrument_node=""> are no less fascinating, if only because of many common-sense misconceptions that exist about positive affect. We tend to think, for example, that positive affect typically, by its very nature, distorts or disrupts orderly, effective thinking, that positive emotions are somehow ‘simple’ or that, because these emotions are shortlived, they cannot have a long-term impact.</span></p><span data-dcnode-id="268" instrument_node="">
</span><p data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Research has shown the above not to be the case but it took it a while to get there. It is only relatively recently that psychologists realised that positive emotions can be seen as valuable in their own right and started studying them.</span></p><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">The person behind that realisation was Barbara Fredrickson, who devoted most of her academic career to trying to understand the benefits of the positive emotions. The functions of negative emotions have been clear for a while.</span></p><span data-dcnode-id="262" instrument_node="">
</span><blockquote data-dcnode-id="258"><p data-dcnode-id="259"><em data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Negative emotions, like anxiety or anger, are associated with tendencies to act in specific ways, which are adaptive in evolutionary terms, i.e. the fight and flight response.</span></em></p></blockquote><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="254"><a data-dcnode-id="255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//positivepsychology.org.uk/wp-content/uploads/2008/11/10positiveemotions2.jpg"><img alt="positive emotions positive psychology" class="aligncenter wp-image-4532" data-dcnode-id="256" height="287" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//positivepsychology.org.uk/wp-content/uploads/2008/11/10positiveemotions2.jpg&amp;raw" srcset="http://positivepsychology.org.uk/wp-content/uploads/2008/11/10positiveemotions2.jpg 816w, http://positivepsychology.org.uk/wp-content/uploads/2008/11/10positiveemotions2-300x143.jpg 300w, http://positivepsychology.org.uk/wp-content/uploads/2008/11/10positiveemotions2-768x367.jpg 768w" width="600"></a></p><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Thus, fear contributes to a tendency to escape and anger to a tendency to attack. If our ancestors were not equipped with such effective emotional tools, our own existence could have been doubtful. Moreover, negative emotions seem to narrow our action repertoires (or actual behaviours) – when running from danger we are unlikely to appreciate a beautiful sunset.</span></p><span data-dcnode-id="250" instrument_node="">
</span><p data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">This function of negative emotions can help minimise distractions in an acute situation. Positive emotions, on the other hand, are not associated with specific actions. So what good are they, apart from the fact that they merely feel good? What is the point in feeling happy or joyful, affectionate or ecstatic?</span></p><span data-dcnode-id="247" instrument_node="">
</span><p data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">The ‘broaden-and-build’ theory of positive emotions, developed by Barbara Fredrickson, shows that positive affective experiences contribute and have a long-lasting effect on our personal growth and development. And this is how they do it:</span></p><span data-dcnode-id="244" instrument_node="">
</span><h3 data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">(a) Positive Emotions Broaden our Thought-Action Repertoires</span></h3><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="235"><span data-dcnode-id="240" instrument_node="">First of all, </span><a data-dcnode-id="237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//positivepsychology.org.uk/the-value-of-positive-psychology-interventions-for-emotion-regulation/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">positive emotions</span></strong></a><span data-dcnode-id="236" instrument_node=""> broaden our attention and thinking, which means that we have more positive thoughts and a greater variety of them. When we are experiencing positive emotions, like joy or interest, we are more likely to be creative, to see more opportunities, to be open to relationships with others, to play, to be more flexible and open-minded.</span></p><span data-dcnode-id="234" instrument_node="">
</span><h3 data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">(b) Positive Emotions Undo Negative Emotions</span></h3><span data-dcnode-id="231" instrument_node="">
</span><p data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">It’s hard to experience both positive and negative emotions simultaneously; thus a deliberate experience of positive emotions at times when negative emotions are dominant can serve to undo their lingering effects. Mild joy and contentment can eliminate the stress experienced at a physiological level.</span></p><span data-dcnode-id="228" instrument_node="">
</span><h3 data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">(c) Positive Emotions Enhance Resilience</span></h3><span data-dcnode-id="225" instrument_node="">
</span><p data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Enjoyment, happy playfulness, contentment, satisfaction, warm friendship, love, and affection all enhance resilience and the ability to cope, while negative emotions, in contrast, decrease them. Positive emotions can enhance problem-focused coping and reappraisal, or infuse negative events with positive meaning, all of which facilitate fast bouncing back after an unpleasant event.</span></p><span data-dcnode-id="222" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="218" style="width: 555px"><img alt="The Value of Positive Emotions" border="0" data-dcnode-id="221" height="503" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//positivepsychology.org.uk/wp-content/uploads/before_migration/images/stories/1_Resilience_hypothesis.JPG&amp;raw" width="545"><p class="wp-caption-text" data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">Resilience hypothesis</span></p></div><span data-dcnode-id="217" instrument_node="">
</span><h3 data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">(d) Positive Emotions Build Psychological Repertoire</span></h3><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Far from having only a momentary effect, positive emotions help to build important physical, intellectual, social and psychological resources that are enduring, even though the emotions themselves are temporary. For example, the positive emotions associated with play can build physical abilities; self-mastery and enjoyable times with friends – increase social skills.</span></p><span data-dcnode-id="211" instrument_node="">
</span><h3 data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">(e) Positive Emotions can Trigger an Upward Developmental Spiral</span></h3><span data-dcnode-id="208" instrument_node="">
</span><p data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">More than that, just as negative emotions can lead one into downward spirals of depression, positive emotions can trigger upward developmental spirals towards improved emotional well-being and transform people into better versions of themselves.</span></p><span data-dcnode-id="205" instrument_node="">
</span><p data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">The broaden-and-build theory urges us to consider positive emotions not as an end in themselves but as a means of leading a better life.</span></p><span data-dcnode-id="202" instrument_node="">
</span><p data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">A lot of interesting research highlights the benefits of positive emotions. In one study with people who had lost their partners, researchers found that laughter and Duchenne smiling predicts the duration of grief.</span></p><span data-dcnode-id="199" instrument_node="">
</span><blockquote data-dcnode-id="195"><p data-dcnode-id="196"><em data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">A Duchenne smile is a genuine smile characterised by the corners of the mouth turning up and the crinkling of the skin around the corners of the eyes. </span></em></p></blockquote><span data-dcnode-id="194" instrument_node="">
</span><p data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">People who laughed and smiled genuinely were more likely to be engaged in life and dating again two and a half years later, compared to those who felt angry.</span></p><span data-dcnode-id="191" instrument_node="">
</span><p data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">A famous yearbook study traced the lives of women who were attending an all-women’s college in 1965. The faces of the women in their college photographs were coded for smiling behaviour and results showed that Duchenne smiles related to less negativity, greater competence, more positive ratings from others and greater well-being in their later lives. Another study demonstrated that physicians experiencing positive emotions seemed to make more accurate diagnoses.</span></p><span data-dcnode-id="188" instrument_node="">
</span><h2 data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">The Positive Impact of Negative Emotions</span></h2><span data-dcnode-id="185" instrument_node="">
</span><p data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">So how much positivity do we need to have for a truly thriving existence? It appears that the ratio of 3:1 or above of positivity to negativity results in the experience of flourishing, while anything below this ratio (e.g. 2:1) – in the experience of languishing.</span></p><span data-dcnode-id="182" instrument_node="">
</span><p data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">So make sure that for every one negative emotion you have at least three positive ones. But beware, too much of even the best thing can be simply dangerous. Experiencing positivity at above 8:1 can have counterproductive effects.</span></p><span data-dcnode-id="179" instrument_node="">
</span><p data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">Positive emotions can certainly help us on the rocky path to well-being but that does not make the negative emotions irrelevant or unimportant. They may not feel quite as good, but they can bring about very positive effects nevertheless. In defence of negative emotions I propose the following:</span></p><span data-dcnode-id="176" instrument_node="">
</span><ul data-dcnode-id="162"><span data-dcnode-id="175" instrument_node="">
</span><li data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">Negative emotions can help initiate fundamental personality changes. A leading expert on emotions, Richard Lazarus, writes: ‘For the stable adult, major personality change may require a trauma, a personal crisis, or a religious conversion‘.</span></li><span data-dcnode-id="172" instrument_node="">
</span><li data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">Negative emotions can bring us to our depth and put us in touch with our deeper selves.</span></li><span data-dcnode-id="169" instrument_node="">
</span><li data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">They can facilitate learning, understanding of ourselves and knowledge of the world. Wisdom is often gained from experiencing suffering and loss that are the necessary parts of life.</span></li><span data-dcnode-id="166" instrument_node="">
</span><li data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">Finally, experiencing and coping with negative affect can have positive social consequences, such as modesty, moral considerations, care and empathy.</span></li><span data-dcnode-id="163" instrument_node="">
</span></ul><span data-dcnode-id="161" instrument_node="">
</span><p data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">Some scholars think that putting all the emotions into two loose bags of positive and negative is hardly a wise move. Hope, for example, is best conceived as a combination of a wish that a desired outcome will occur with anxiety that it might not. What is it then: a positive or a negative emotion?</span></p><span data-dcnode-id="158" instrument_node="">
</span><p data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">Pride is generally regarded as a positive emotion in the West but seen to be a sin in more collectivistic societies. Love, one of the first emotions to spring to mind when mentioning the positive, is hardly such when unrequited. Can smiling and laughing be considered positive emotions when directed at someone? What we shouldn’t underestimate whilst trying to understand emotions is that what often makes them negative or positive is the context within which they occur.</span></p><span data-dcnode-id="155" instrument_node="">
</span><h2 data-dcnode-id="153"><span data-dcnode-id="154" instrument_node="">Emotional Intelligence</span></h2><span data-dcnode-id="152" instrument_node="">
</span><p data-dcnode-id="141"><a data-dcnode-id="149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//positivepsychology.org.uk/emotional-intelligence-and-leadership/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">Emotional intelligence</span></strong></a><span data-dcnode-id="148" instrument_node="">, or EQ, is a well-known term, popularised (though not invented) by Daniel Goleman (1995) in his bestseller </span><em data-dcnode-id="146"><span data-dcnode-id="147" instrument_node="">Emotional Intelligence:</span></em><span data-dcnode-id="145" instrument_node=""> </span><em data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">Why It Can Matter More than IQ</span></em><span data-dcnode-id="142" instrument_node="">. Little could the academics John Mayer and Peter Salovey, who studied this subject well before the book was out , know that by allowing Goleman to use their term, he, rather than they, would be crowned with ‘discovering’ emotional intelligence.</span></p><span data-dcnode-id="140" instrument_node="">
</span><p data-dcnode-id="138"><span data-dcnode-id="139" instrument_node="">EQ refers to the capacity to recognise and manage our own emotions and the emotions of others close to us. It is often claimed to be more important than IQ for career success and for achievement of one’s life goals.</span></p><span data-dcnode-id="137" instrument_node="">
</span><p data-dcnode-id="131"><span data-dcnode-id="136" instrument_node="">With the explosion of the </span><a data-dcnode-id="133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//positivepsychology.org.uk/emotional-intelligence-mayer-salovey-theory/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">EQ phenomenon</span></strong></a><span data-dcnode-id="132" instrument_node="">, much thinking and research has been carried out around the concept and, as a result, multiple models of EQ have been advocated. Here, I’ll outline the Mayer-Salovey-Caruso model as an example of the better-developed ones. It proposes that there are four major branches or facets to the emotional intelligence concept (see figure below).</span></p><span data-dcnode-id="130" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="126" style="width: 524px"><img alt="The branches of EQ" border="0" data-dcnode-id="129" height="307" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//positivepsychology.org.uk/wp-content/uploads/before_migration/images/stories/1_The_branches_of_EQ.JPG&amp;raw" width="514"><p class="wp-caption-text" data-dcnode-id="127"><span data-dcnode-id="128" instrument_node="">The branches of EQ</span></p></div><span data-dcnode-id="125" instrument_node="">
</span><h3 data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">1. Perceiving Emotions</span></h3><span data-dcnode-id="122" instrument_node="">
</span><p data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">This is an ability to identify emotional messages in facial expressions, tone of voice and even works of art. People who are skilled at perceiving emotions in themselves and others have an advantage in social situations, as they are more likely to understand things from another person’s perspective and are more empathic.</span></p><span data-dcnode-id="119" instrument_node="">
</span><h3 data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">2. Using Emotions to Facilitate Thinking</span></h3><span data-dcnode-id="116" instrument_node="">
</span><p data-dcnode-id="114"><span data-dcnode-id="115" instrument_node="">Emotions have the power to change the way we think. When we are happy we may think that everything is possible, whereas when we are sad we tend to have more negative thoughts. This branch is about how emotions affect our thinking and how we can utilise our emotions for more effective problem solving, reasoning, decision making and creative endeavours.</span></p><span data-dcnode-id="113" instrument_node="">
</span><h3 data-dcnode-id="111"><span data-dcnode-id="112" instrument_node="">3. Understanding Emotions</span></h3><span data-dcnode-id="110" instrument_node="">
</span><p data-dcnode-id="108"><span data-dcnode-id="109" instrument_node="">It’s not enough to notice emotions, we need to figure out the message they are carrying. Why do we have certain emotions? Where are they coming from? What are they likely to lead us to? It’s important to understand, for example, that irritation may lead to anger, or feeling insecure – to unpredictable outbursts. Emotionally intelligent individuals are capable of labelling emotions with words appropriately, and also of understanding complex feelings and even contradictory emotional states.</span></p><span data-dcnode-id="107" instrument_node="">
</span><h3 data-dcnode-id="105"><span data-dcnode-id="106" instrument_node="">4. Managing Emotions</span></h3><span data-dcnode-id="104" instrument_node="">
</span><p data-dcnode-id="102"><span data-dcnode-id="103" instrument_node="">Emotional management or regulation is not about eliminating troubling emotions (life would be limited it this was the case), rather it’s about learning how to gain control over them. Some of us, when upset, think there is nothing that we can do about it, others believe that they can do something to make themselves feel better. Successful emotion-managers are often capable of helping others to deal with their emotions too.</span></p><span data-dcnode-id="101" instrument_node="">
</span><p data-dcnode-id="99"><span data-dcnode-id="100" instrument_node="">Separation of these EQ branches seems to make sense when we apply these findings to real life. A person may be skilled at listening to people, feeling for them and even understanding them (using and understanding emotions), yet fail to make good contact with others simply because he or she cannot ‘read’ non-verbal cues. Thus, perceiving emotions may be precisely the area where intervention is needed in this case.</span></p><span data-dcnode-id="98" instrument_node="">
</span><p data-dcnode-id="96"><span data-dcnode-id="97" instrument_node="">The concept of emotional intelligence, however, is not without its troubles. There is much debate about which branches should go in or out, whether emotional intelligence is really about emotions rather than our ability to rationally conceptualise them, and what the best way to measure EQ is. Still, emotional intelligence seems to offer useful insights into the convoluted and complex inner worlds of human beings.</span></p><span data-dcnode-id="95" instrument_node="">
</span></div><span data-dcnode-id="93" instrument_node=""> </span><span data-dcnode-id="91" instrument_node="">
</span><div class="et_post_meta_wrapper" data-dcnode-id="89"><span data-dcnode-id="90" instrument_node="">
</span></div><span data-dcnode-id="88" instrument_node=""> </span><span data-dcnode-id="86" instrument_node="">
</span></article><span data-dcnode-id="84" instrument_node=""> </span><span data-dcnode-id="82" instrument_node="">
</span></div><span data-dcnode-id="80" instrument_node=""> </span><span data-dcnode-id="78" instrument_node="">
</span></div><span data-dcnode-id="76" instrument_node=""> </span><span data-dcnode-id="74" instrument_node="">
