</span><h1 class="entry-title" data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">7 Signs of Low Emotional Intelligence</span></h1><span data-dcnode-id="3395" instrument_node="">
</span><div class="post-meta-wrapper post-meta-single post-meta-single-top" data-dcnode-id="3374"><span data-dcnode-id="3394" instrument_node="">
</span><ul class="post-meta" data-dcnode-id="3377"><span data-dcnode-id="3393" instrument_node="">
</span><li class="post-date" data-dcnode-id="3385"><span data-dcnode-id="3392" instrument_node="">
</span><a class="meta-wrapper" data-dcnode-id="3387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nickwignall.com/7-signs-of-low-emotional-intelligence/"><span data-dcnode-id="3391" instrument_node="">
</span><span class="screen-reader-text" data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">Post date</span></span><span data-dcnode-id="3388" instrument_node="">
								August 30, 2020							</span></a><span data-dcnode-id="3386" instrument_node="">
</span></li><span data-dcnode-id="3384" instrument_node="">
</span><li class="post-categories meta-wrapper" data-dcnode-id="3379"><span data-dcnode-id="3383" instrument_node="">
							In </span><a data-dcnode-id="3381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nickwignall.com/category/lists/" rel="category tag"><span data-dcnode-id="3382" instrument_node="">Lists</span></a><span data-dcnode-id="3380" instrument_node=""> </span></li><span data-dcnode-id="3378" instrument_node="">

</span></div><span data-dcnode-id="3372" instrument_node="">
</span></header><span data-dcnode-id="3369" instrument_node="">
</span><div class="featured-media" data-dcnode-id="3365"><span data-dcnode-id="3368" instrument_node="">
</span><img alt="7 Signs Low Emotional Intelligence Wignall" class="attachment-post-thumbnail size-post-thumbnail wp-post-image" data-dcnode-id="3367" height="648" sizes="(max-width: 1400px) 100vw, 1400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nickwignall.com/wp-content/uploads/2020/08/7-Signs-Low-Emotional-Intelligence-Nick-Wignall-2.jpg&amp;raw" srcset="https://nickwignall.com/wp-content/uploads/2020/08/7-Signs-Low-Emotional-Intelligence-Nick-Wignall-2.jpg 1400w, https://nickwignall.com/wp-content/uploads/2020/08/7-Signs-Low-Emotional-Intelligence-Nick-Wignall-2-300x139.jpg 300w, https://nickwignall.com/wp-content/uploads/2020/08/7-Signs-Low-Emotional-Intelligence-Nick-Wignall-2-1024x474.jpg 1024w, https://nickwignall.com/wp-content/uploads/2020/08/7-Signs-Low-Emotional-Intelligence-Nick-Wignall-2-768x355.jpg 768w, https://nickwignall.com/wp-content/uploads/2020/08/7-Signs-Low-Emotional-Intelligence-Nick-Wignall-2-400x185.jpg 400w, https://nickwignall.com/wp-content/uploads/2020/08/7-Signs-Low-Emotional-Intelligence-Nick-Wignall-2-800x370.jpg 800w" width="1400"><span data-dcnode-id="3366" instrument_node="">
</span></div><span data-dcnode-id="3363" instrument_node="">
</span><div class="post-inner" data-dcnode-id="343"><span data-dcnode-id="3362" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3167"><span data-dcnode-id="3361" instrument_node="">
</span><p data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">Most people don’t grow up learning very much about their emotions — what they are, how they work, or how to manage them well.</span></p><span data-dcnode-id="3358" instrument_node="">
</span><p data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">This means there are a lot of people out there with perfectly normal levels of academic or social intelligence but surprisingly low emotional intelligence.</span></p><span data-dcnode-id="3355" instrument_node="">
</span><p data-dcnode-id="3352"><strong data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">You need to recognize the signs of low emotional intelligence because it’s hard to have healthy relationships with these people.</span></strong></p><span data-dcnode-id="3351" instrument_node="">
</span><p data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">Whether you’re considering going into business with someone, getting married, or hiring a coach, it’s crucial that you’re able to spot the signs of low emotional intelligence early.</span></p><span data-dcnode-id="3348" instrument_node="">
</span><hr data-dcnode-id="3347"><span data-dcnode-id="3346" instrument_node="">
</span><h2 data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">1. They avoid talking about how they feel</span></h2><span data-dcnode-id="3343" instrument_node="">
</span><p data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">If you really want to see how much emotional intelligence someone has, pay attention to how they talk about their feelings.</span></p><span data-dcnode-id="3340" instrument_node="">
</span><p data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">Some people with very low emotional intelligence simply refuse to talk about their feelings. But more commonly, they just aren’t very good at it.</span></p><span data-dcnode-id="3337" instrument_node="">
</span><p data-dcnode-id="3332"><span data-dcnode-id="3336" instrument_node="">Often they use vague or metaphorical language to describe how they feel — “I’m just a little stressed” or “I’m pissed off.” Sometimes they </span><a data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nickwignall.com/intellectualized-emotions/"><span data-dcnode-id="3335" instrument_node="">intellectualize their emotions</span></a><span data-dcnode-id="3333" instrument_node="">, using abstract and conceptual language to avoid describing how they really feel — “I’m just kind of overwhelmed.”</span></p><span data-dcnode-id="3331" instrument_node="">
</span><p data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">On the other hand…</span></p><span data-dcnode-id="3328" instrument_node="">
</span><p data-dcnode-id="3325"><strong data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">People with high emotional intelligence aren’t afraid to describe their feelings with plain emotional language.</span></strong></p><span data-dcnode-id="3324" instrument_node="">
</span><p data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node="">They say things like: “I feel sad,” “I’m angry,” “I feel disappointed and a little annoyed right now.”</span></p><span data-dcnode-id="3321" instrument_node="">
</span><h2 data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">2. They criticize themselves for how they feel</span></h2><span data-dcnode-id="3318" instrument_node="">
</span><p data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">Because many emotions like fear or sadness feel bad, it’s easy to think they are bad or that we are bad for feeling them. This often happens to people who were punished or ridiculed for expressing emotion as children.</span></p><span data-dcnode-id="3315" instrument_node="">
</span><p data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">In any case, a common sign of low emotional intelligence is that people criticize themselves for having difficult emotions. They think it’s bad or wrong to feel afraid. They think it’s shameful to feel sad. They think it’s a sign of weakness that they get angry.</span></p><span data-dcnode-id="3312" instrument_node="">
</span><p data-dcnode-id="3309"><strong data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">Judging yourself for how you feel only makes you feel worse in the long-run.</span></strong></p><span data-dcnode-id="3308" instrument_node="">
</span><p data-dcnode-id="3303"><span data-dcnode-id="3307" instrument_node="">People with high emotional intelligence understand that just because something feels bad doesn’t mean it is bad. So they treat themselves instead with </span><a data-dcnode-id="3305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nickwignall.com/self-compassion-habits/"><span data-dcnode-id="3306" instrument_node="">compassion</span></a><span data-dcnode-id="3304" instrument_node=""> and kindness when they feel bad.</span></p><span data-dcnode-id="3302" instrument_node="">
</span><h2 data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">3. They try to control their emotions</span></h2><span data-dcnode-id="3299" instrument_node="">
</span><p data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">People with low emotional intelligence think about difficult emotions as problems to be solved.&nbsp;This means that anytime a painful mood or emotion comes up, they immediately try to get rid of it.</span></p><span data-dcnode-id="3296" instrument_node="">
</span><p data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">But when you constantly treat your emotions like problems, you teach your brain to see them as problems. This only makes you more fearful of your emotions and reactive toward them in the future.</span></p><span data-dcnode-id="3293" instrument_node="">
</span><p data-dcnode-id="3290"><strong data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">When you treat your emotions like problems, you teach your brain to see them that way.</span></strong></p><span data-dcnode-id="3289" instrument_node="">
</span><p data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">Emotionally intelligent people see emotions as messengers, not threats. And while you may or may not like the content of the message, it doesn’t make sense to shoot the messenger.</span></p><span data-dcnode-id="3286" instrument_node="">
</span><p data-dcnode-id="3284"><span data-dcnode-id="3285" instrument_node="">The best way to free yourself from painful emotions is to validate them and let them work themselves out instead of trying to control them.</span></p><span data-dcnode-id="3283" instrument_node="">
</span><h2 data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">4. They only notice their loud emotions</span></h2><span data-dcnode-id="3280" instrument_node="">
</span><p data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">While it’s very common to experience more than one emotion at a time, people with low emotional intelligence tend to only notice the biggest, loudest emotion happening.</span></p><span data-dcnode-id="3277" instrument_node="">
</span><p data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">For example, after getting cut-off suddenly on the road while driving, they describe feeling “mad a hell” but aren’t aware that they’re also feeling afraid.</span></p><span data-dcnode-id="3274" instrument_node="">
</span><p data-dcnode-id="3269"><span data-dcnode-id="3273" instrument_node="">People with high emotional intelligence have enough </span><a data-dcnode-id="3271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nickwignall.com/self-awareness/"><span data-dcnode-id="3272" instrument_node="">self-awareness</span></a><span data-dcnode-id="3270" instrument_node=""> to see all their emotions, even the quiet ones “behind” their primary emotions.</span></p><span data-dcnode-id="3268" instrument_node="">
</span><h2 data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">5. They blindly follow their emotions</span></h2><span data-dcnode-id="3265" instrument_node="">
</span><p data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">Another clear sign of low emotional intelligence is believing everything your emotions tell you.</span></p><span data-dcnode-id="3262" instrument_node="">
</span><p data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">Emotions often give us useful information—feeling fear when your fire alarm goes off, for example. But they’re just as likely to mislead us—feeling anger when our spouse points out a mistake and asks us to correct it.</span></p><span data-dcnode-id="3259" instrument_node="">
</span><p data-dcnode-id="3256"><strong data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">Emotionally intelligent people listen to all their emotions but never put blind trust in any of them. </span></strong></p><span data-dcnode-id="3255" instrument_node="">
</span><p data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">There’s nothing mystical about our emotions. And it can be just as dangerous to overvalue them as it is to undervalue them.</span></p><span data-dcnode-id="3252" instrument_node="">
</span><h2 data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">6. They try to ‘fix’ your emotions</span></h2><span data-dcnode-id="3249" instrument_node="">
</span><p data-dcnode-id="3244"><span data-dcnode-id="3248" instrument_node="">You can learn a lot about someone’s level of emotional intelligence by how they handle </span><a data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nickwignall.com/other-peoples-bad-moods/"><span data-dcnode-id="3247" instrument_node="">other people’s painful emotions</span></a><span data-dcnode-id="3245" instrument_node="">.</span></p><span data-dcnode-id="3243" instrument_node="">
</span><p data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">People with low emotional intelligence are afraid of painful feelings in others, so they usually try to make them go away. For example, they immediately start giving you reasons why you shouldn’t feel the way you do or try to problem-solve your bad mood. These are dead giveaways that they’re not very high on emotional intelligence.</span></p><span data-dcnode-id="3240" instrument_node="">
</span><p data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">On the other hand, if someone is good at validating your emotions and being willing to sit with them without judgment or advice, that’s usually a sign of very high emotional intelligence.</span></p><span data-dcnode-id="3237" instrument_node="">
</span><h2 data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">7. They pretend to be happy all the time</span></h2><span data-dcnode-id="3234" instrument_node="">
</span><p data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">I don’t trust people who claim to be happy all the time and never admit or show when they’re feeling sad, afraid, ashamed, or just plain upset. Insisting on being happy all the time is usually a sign of low emotional intelligence.</span></p><span data-dcnode-id="3231" instrument_node="">
</span><p data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">Because they don’t understand their moods and emotions very well, people with low emotional intelligence live in denial about the emotions they don’t like — the painful, uncomfortable ones. And they hope that if they tell themselves they’re happy all the time they will be happy all the time and won’t have to ever feel bad.</span></p><span data-dcnode-id="3228" instrument_node="">
</span><p data-dcnode-id="3223"><span data-dcnode-id="3227" instrument_node="">But I don’t care what you read about in </span><a data-dcnode-id="3225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesecret.tv/products/the-secret-book/"><span data-dcnode-id="3226" instrument_node="">The Secret</span></a><span data-dcnode-id="3224" instrument_node="">…</span></p><span data-dcnode-id="3222" instrument_node="">
</span><p data-dcnode-id="3219"><strong data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">You can manifest positivity until you’re blue in the face but it’s perfectly normal to experience all sorts of emotions, including painful ones.</span></strong></p><span data-dcnode-id="3218" instrument_node="">
</span><p data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">Emotionally intelligent people understand that there are no good or bad emotions any more than there are good or bad hair colors. And they’re secure enough to feel bad and show it.</span></p><span data-dcnode-id="3215" instrument_node="">
</span><hr data-dcnode-id="3214"><span data-dcnode-id="3213" instrument_node="">
</span><h2 data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">All You Need to Know</span></h2><span data-dcnode-id="3210" instrument_node="">
</span><p data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">Having low emotional intelligence doesn’t make someone bad or unworthy. In many ways, it’s simply a skill deficit. And obviously we all fall into some of these traps from time to time.</span></p><span data-dcnode-id="3207" instrument_node="">
</span><p data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">But it’s important to see people’s strengths and weaknesses clearly before you get into any kind of serious relationship with them.</span></p><span data-dcnode-id="3204" instrument_node="">
</span><p data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">It’s easy to be dazzled by a sharp wit or charming personality but neither of those will make up for low emotional intelligence and all the pain that comes with it.</span></p><span data-dcnode-id="3201" instrument_node="">
</span><p data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">Take it from a therapist, someone who talks to unhappy people for a living:</span></p><span data-dcnode-id="3198" instrument_node="">
</span><p data-dcnode-id="3195"><strong data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">Learn the signs of low emotional intelligence early and you’ll save yourself more grief than you can imagine.</span></strong></p><span data-dcnode-id="3194" instrument_node="">

</span><a data-dcnode-id="2663" href="#comment-33593"><time data-dcnode-id="2664" datetime="2021-05-04T15:30:54-06:00"><span data-dcnode-id="2665" instrument_node="">May 4, 2021 at 3:30 pm</span></time></a><span data-dcnode-id="2662" instrument_node=""> </span></div><span data-dcnode-id="2659" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2643"><span data-dcnode-id="2655" instrument_node="">
</span><p data-dcnode-id="2645"><span data-dcnode-id="2654" instrument_node="">My husband of three years, is a good man, in many ways. He works hard and comes home tired, barely enough energy to “see” the world around him, which actually, he doesn’t really care about, anyway. I know this because he has told me directly, many times that, “If it doesn’t affect me directly, I don’t care to hear about it.”  That statement covers a broad spectrum, I’ve come to find out.</span><br data-dcnode-id="2653"><span data-dcnode-id="2652" instrument_node="">
He was raised in a very liberal thinking, Hispanic family. There were no rules or boundaries given to any of the children (5). They were taught, from and early age, to be tough, no tears or emotions of displeasure were to be shown, but in the same breath, moments of happiness were to be kept to a minimum. As he reached adulthood, he played the field, often, and wound up fathering 4 children with three women, which he resents, although all involved, were consenting adults. The only innocents are the children, ranging from 19 to 8.</span><br data-dcnode-id="2651"><span data-dcnode-id="2650" instrument_node="">
I am not Hispanic. I am very much a white, blonde woman, who is a few years my husband’s senior. I grew up in a very different home. There was love, support, rules, boundaries, chores, religion and faith, hope, tears, loss, gains, two parents who worked as a “team”. And the list goes on. The four of us kids were allowed to be who we were and grow into the people we are now. Flaws and imperfections welcomed!!!!</span><br data-dcnode-id="2649"><span data-dcnode-id="2648" instrument_node="">
I’m a person who sees the world in color, not just black or white. This didn’t seem to be a problem to my husband when we dated. He seemed to embrace the differences between us. Now, those same differences seem to irritate  him. I was married before, for 14 years, and have three children from that union, who are all able bodied adults now, and living the lives they are choosing for themselves.</span><br data-dcnode-id="2647"><span data-dcnode-id="2646" instrument_node="">
My husband is not accustomed to celebrating ANYTHING!!! the idea of gift giving at Christmas is very new to him. And he absolutely despises his birthday being celebrated. :earned that the first year of marriage. Anything that may come up in my life, hes not keen on really making a “big deal” about it. He doesn’t believe in “spoiling” a woman with flowers, candy, just “because” surprises, etc. as he once told my grown son, “the minute you show any of that to a woman, she’s got you in her hooks and knows just how to tighten the noose. So, don’t even start, if you’re smart.” I was gravely disappointed to hear these words. All in all, I feel that he has the marriage he wants. Not the one we talked pf having when we were engaged. It seems that i am the only one putting forth the effort in this marriage. When I’ve brought up these concerns, he tells me, “You’re creating fire where there is no smoke and our marriage is just fine. Relax.”  No it’s not. For an intelligent woman, I went against my better judgement and got married again, even after repeatedly telling myself I would NEVER go down this road again.</span></p><span data-dcnode-id="2644" instrument_node="">
</span></div><span data-dcnode-id="2641" instrument_node="">

</span><p data-dcnode-id="2184"><span data-dcnode-id="2189" instrument_node="">I liked the article but couldn’t not refrain from wondering if this is subjective to culture, social constrains and age. Meaning if you lived through a communist era, “emotions” and “feelings” were the least of your problems, therefore, these were put at the bottom of a long “to do list”. This type of thinking affected a lot of generations and of course created illiterate people in terms of emotions and feelings.</span><br data-dcnode-id="2188"><span data-dcnode-id="2187" instrument_node="">
So in this setup that I mentioned, low EI people are the norm and not the exception and only through recent years (like 10-15 y.) people started to be more self aware and introspect. So if you say that there is “no hope” for us it seems like a pretty dim future and better results might be seen after many generations to come. </span><img alt="🙂" class="emoji" data-dcnode-id="2186" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f642.svg&amp;raw"><span data-dcnode-id="2185" instrument_node=""> (I still hope this will not be case)</span></p><span data-dcnode-id="2183" instrument_node="">

</span><p data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Hi Laura, that was not my intent. Like I said in the article, low emotional intelligence is not a moral issue, and these are things we all struggle with to some extent.</span></p><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">The article is meant to encourage people to think about emotional intelligence as one (among many) important factors to consider before getting into a serious relationship.</span></p><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Just like you might think twice before going into business with someone who had poor financial awareness and abilities, I think we ought to consider someone’s emotional intelligence before commiting to a serious relationship with them.</span></p><span data-dcnode-id="1766" instrument_node="">

</span><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Great article! I have been married 33 years. My husband was of low EI and I was a much more open to expressing my emotions, maybe too much. 2 years into our marriage he had a serious head injury. Over the last 20 years, what had been tolerable low EI turned into bizarre often violent behavior. Around everyone else he was Mr. Happy. I blamed myself. 2 years ago he got diagnosed with FTD (Fronto-temperal Degeneration) his brain is deteriorating. No one would believe me how cruel he was. I now have CPTSD. I left him in November to save my life. Now I see after your article why no one ever believed me. Thank you.</span></p><span data-dcnode-id="1146" instrument_node="">

</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">How do u rate about following incident :</span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Once after a busiest schedule, i was returning home. Suddenly one govt high ranking officer’s PA called to have a dinner with his boss, for which i was desperately seeking to meet him personally for official matters. Without any hesitation i just nodded and headed straight to the hotel. But on the way got calls from my spouse and daughter (12Y) to return immediately for her birthday, which i forgot. I was extremely confused, now what to do. Meantime many requesting calls from my daughter to return. But after convincing my spouse i headed for the dinner. The high profile govt officer was almost got late by 3 hrs. Still i continued for waiting for him.</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">The true incident start from here :</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">The officer entered the hotel alongwith 10 persons (personally i know only 2 out of 10). When i tried to introduce myself, he shouted on me and to his PA that why i had been in this meeting without invitation. (Plz note i am meeting this officer for the first time and there is absolutely nothing in between us). PA tried to explain to him but he was not in a mood to listen anything. For few seconds, i got stunned. Don’t know what to do? Trying to guage all options. To say sorry and left the place, or to explain about the invitation by PA or to sit at another place etc. etc. The hotel is almost 25 Kms from city, no transportation (as came alongwith PA), almost 10.00 pm.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">In such scenario….what u will do? Plz guess</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">I did following:</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Finally i decided to sit at the extreme corner of the dinner table, tried my best to avoid any conversations with anyone especially avoiding the officer. Tried to have a peaceful dinner.</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">The officer, now started noticing that i am extremely upset. Then he was trying to explain, why he is trying to avoid meeting new people. Few from the group also trying to give input from their sides. After few minutes then i started talking, slowly, confidently but at the same time explaining how i truely got hurt not being with my daughter’s birthday. I expressed my emotions freely even i was literally cried in front of all. After knowing the truth, the officer was also a kind hearted man. He said sorry many many times in front of all too. Also he came to drop me at my house where we all celebrated my daughter’s birthday once again late night.</span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">All the points what author mentioned here pertaining to high EI, seems i followed it all.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Thanks to the author.</span></p><span data-dcnode-id="809" instrument_node="">

</span><div class="comment-content" data-dcnode-id="708"><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">I really like Nick’s blog but I strongly disagree with the notion in this article and with the notion of low versus high EQ in general. EQ has a few domains -self awareness, self control, people awareness and managing people’s emotions- and they sit on very broad skillsets that in some cases are almost mutually exclusive. For example, You can be extremely self aware but that makes you struggle more with self regulation and managing other people’s emotions because you know them so acutely. Pretty much every ‘sign’ described here is actually a sign of low emotional awareness rather than intelligence- in fact, some of the later dot points are actually signs of purposeful emotion regulation and while those are definitely not advanced EQ strategies, they are still miles ahead from someone Who doesn’t even try to regulate.  I also observed that people who are truly good and managing other people/their emotions/highly skilled at ‘cooling down’ situations are actually far from being truly self-aware, in fact they often lack the depth of awareness  and often care much less About the situation, which gives them an advantage of better perspective and while it might serve them well, that is far from being truly ‘’high EQ”either. I think low versus high EQ is very flawed notion- at a minimum, you need to think of ALL domains at once to actually assess even the minimum and these sort of assessments are quite hurtful Rather than helpful as they oversimplify a broad concept of EQ.</span></p><span data-dcnode-id="709" instrument_node="">

</span><div class="comment-content" data-dcnode-id="613"><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="625" instrument_node="">It’s a shame some readers missed the point. I found your article very helpful. Obviously, our personal life experiences, ethnic backgrounds &amp; cultures shapes us all. But there’s an inherent truth; certain characteristics in an individual can &amp; will impact us negatively &amp; can result in painful experiences/outcomes if we ignore them.</span><br data-dcnode-id="624"><span data-dcnode-id="623" instrument_node="">
Everyone has the capacity to learn &amp; make changes to improve all aspects of their lives, including EI.</span><br data-dcnode-id="622"><span data-dcnode-id="621" instrument_node="">
But the likelihood that someone with low EI  who doesn’t see any value in becoming more open, self aware and transparent with their emotions will leave you wanting. Much like a Narcissist, you can have a relationship with one, but don’t think for a moment that most of what he/she does, isn’t self serving. Because it probably is. The object of their affection is in their reflection, after all the true Narcissist is all about me, me, me. For sure thefe won’t be much reciprocity in the relationship &amp; you’ll end up with the short end of the stick.  That doesn’t make them all bad, but there will be major limitations, &amp; the outcome of the business partnership or relationship may be fairly negative.</span><br data-dcnode-id="620"><span data-dcnode-id="619" instrument_node="">
A person can only change  oneself, so choose wisely, don’t enter into any kind of business or relationship hoping YOU can change them. You can show kindness to anyone, encourage them, share truthfully &amp; offer to help them become more EI, but there’s no guarantee they will change.</span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Keep up the Good work Nick! I loved all your insights.</span></p><span data-dcnode-id="614" instrument_node="">
</span></div><span data-dcnode-id="611" instrument_node="">

</span><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Great read!  I dated someone for over 7 years only to find out he was a covert narcissit, avoidant and suffered from low EQ!  He’d never admitted to it, too much pride!  In his eyes, he was “disconnecred”.  </span></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Only after going to therapy after the breakup did I find all these issues out.  I saw them early on but I was drowned in his drama that I ignored all of it and became codependent.  He was also codependent, recipe for disaster!  Now I’m moving on…he was so TOXIC all I could see was myself wanting to save him, but all I did was lose MYSELF!!</span></p><span data-dcnode-id="568" instrument_node="">

</span><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Its been more than a year, I am dating this guy. After being with him for so long and reading few articles on people with low EQ, I realise that he himself is dealing with a low EQ.</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">I am an emotionally expressive person. In fact my job is expressing emotions, I act for a living. Lately I am facing a lot of issue with him, emotionally. </span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Its not that he does not understands emotions but I do think he takes a lot of time to heal from a fight or argument. Every time we have a fight, it breaks him so much that he takes weeks to grow out from it. He shells himself. And now I am scared to even talk to him about my feelings and emotions as I know I would be misunderstood and I respect my feelings enough to not be misunderstood.</span></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">We are facing a very bad time emotionally. I really like this person, a lot. And I want to make it work.</span></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">I don’t understand, is it a low EQ to a hypersensitive person?</span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="512" instrument_node="">What should I do? I need help.</span><br data-dcnode-id="511"><span data-dcnode-id="510" instrument_node="">
I don’t know right now. Maybe he would come around or maybe it will be an absolute disaster and damaging to me in long term. </span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Hoping to have a hear from you!</span></p><span data-dcnode-id="505" instrument_node="">
