</span><meta content="Few studies have investigated how the specific facets of trait emotional intelligence (EI) and adversity quotient (AQ) affect individuals’ general life satisfaction. The present study identified three facets of trait EI and five of AQ and explored how each facet relates to individuals’ general life satisfaction. Participants were 256 Chinese adults who completed four questionnaires—the Self-Report Emotional Intelligence Test, the Connor-Davidson resilience scale, the GRIT scale, and the Satisfaction With Life Scale. After validating the scales, a hierarchical multiple regression analysis indicated that one trait EI component (regulation of emotion) and two AQ facets (tenacity and optimism) significantly and positively predicted individuals’ general life satisfaction. These results suggest that understanding the role of their own and others’ emotions, to be tenacious, and to cultivate positive attitudes and relationships might be a key to promoting their general life satisfaction. These findings contribute to a deeper understanding of the relationships between trait EI and life satisfaction and AQ and life satisfaction, and how specific trait EI and AQ facets relate to individuals’ life satisfaction." data-dcnode-id="4834" name="dc.description"><span data-dcnode-id="4833" instrument_node="">

</span><meta content="The roles of emotional intelligence and adversity quotient in life satisfaction - Current Psychology" data-dcnode-id="4554" property="og:title"><span data-dcnode-id="4553" instrument_node="">
</span><meta content="Few studies have investigated how the specific facets of trait emotional intelligence (EI) and adversity quotient (AQ) affect individuals’ general life satisfaction. The present study identified three facets of trait EI and five of AQ and explored how each facet relates to individuals’ general life satisfaction. Participants were 256 Chinese adults who completed four questionnaires—the Self-Report Emotional Intelligence Test, the Connor-Davidson resilience scale, the GRIT scale, and the Satisfaction With Life Scale. After validating the scales, a hierarchical multiple regression analysis indicated that one trait EI component (regulation of emotion) and two AQ facets (tenacity and optimism) significantly and positively predicted individuals’ general life satisfaction. These results suggest that understanding the role of their own and others’ emotions, to be tenacious, and to cultivate positive attitudes and relationships might be a key to promoting their general life satisfaction. These findings contribute to a deeper understanding of the relationships between trait EI and life satisfaction and AQ and life satisfaction, and how specific trait EI and AQ facets relate to individuals’ life satisfaction." data-dcnode-id="4552" property="og:description"><span data-dcnode-id="4551" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="4114" data-gtm-vis-first-on-screen-50443292_562="580" data-gtm-vis-first-on-screen-50443292_563="580" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="580" data-gtm-vis-recent-on-screen-50443292_563="580" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="4115" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4119" id="Abs1"><span data-dcnode-id="4120" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="4116" id="Abs1-content"><p data-dcnode-id="4117"><span data-dcnode-id="4118" instrument_node="">Few studies have investigated how the specific facets of trait emotional intelligence (EI) and adversity quotient (AQ) affect individuals’ general life satisfaction. The present study identified three facets of trait EI and five of AQ and explored how each facet relates to individuals’ general life satisfaction. Participants were 256 Chinese adults who completed four questionnaires—the Self-Report Emotional Intelligence Test, the Connor-Davidson resilience scale, the GRIT scale, and the Satisfaction With Life Scale. After validating the scales, a hierarchical multiple regression analysis indicated that one trait EI component (regulation of emotion) and two AQ facets (tenacity and optimism) significantly and positively predicted individuals’ general life satisfaction. These results suggest that understanding the role of their own and others’ emotions, to be tenacious, and to cultivate positive attitudes and relationships might be a key to promoting their general life satisfaction. These findings contribute to a deeper understanding of the relationships between trait EI and life satisfaction and AQ and life satisfaction, and how specific trait EI and AQ facets relate to individuals’ life satisfaction.</span></p></div></div></section><span data-dcnode-id="4113" instrument_node="">
</span><div class="c-article-section__content c-article-section__content--separator" data-dcnode-id="4059"><p data-dcnode-id="4060"><span data-dcnode-id="4112" instrument_node="">Life satisfaction, an essential component of subjective well-being (Diener, </span><a aria-label="Reference 1984" data-dcnode-id="4110" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d11761131e334" title="Diener, E. (1984). Subjective well-being. Psychological Bulletin, 95(3), 542–575. 
                https://doi.org/10.1037/0033-2909.95.3.542
                
              ."><span data-dcnode-id="4111" instrument_node="">1984</span></a><span data-dcnode-id="4109" instrument_node="">), has a significant influence on physical and psychological health (Grant, Wardle, &amp; Steptoe, </span><a aria-label="Reference 2009" data-dcnode-id="4107" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d11761131e337" title="Grant, N., Wardle, J., &amp; Steptoe, A. (2009). The relationship between life satisfaction and health behavior: A cross-cultural analysis of young adults. International Journal of Behavioral Medicine, 16(3), 259–268. 
                https://doi.org/10.1007/s12529-009-9032-x
                
              ."><span data-dcnode-id="4108" instrument_node="">2009</span></a><span data-dcnode-id="4106" instrument_node="">; Strine, Chapman, Balluz, Moriarty, &amp; Mokdad, </span><a aria-label="Reference 2008" data-dcnode-id="4104" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d11761131e340" title="Strine, T. W., Chapman, D. P., Balluz, L. S., Moriarty, D. G., &amp; Mokdad, A. H. (2008). The associations between life satisfaction and health-related quality of life, chronic illness, and health behaviors among US community-dwelling adults. Journal of Community Health, 33(1), 40–50. 
                https://doi.org/10.1007/s10900-007-9066-4
                
              ."><span data-dcnode-id="4105" instrument_node="">2008</span></a><span data-dcnode-id="4103" instrument_node="">), as well as psychological well-being (D’Ambrosio, Jäntti, &amp; Lepinteur, </span><a aria-label="Reference 2020" data-dcnode-id="4101" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d11761131e343" title="D’Ambrosio, C., Jäntti, M., &amp; Lepinteur, A. (2020). Money and happiness: Income, wealth and subjective well-being. Social Indicators Research, 148(1), 47–66."><span data-dcnode-id="4102" instrument_node="">2020</span></a><span data-dcnode-id="4100" instrument_node="">; Garcia &amp; Moradi, </span><a aria-label="Reference 2013" data-dcnode-id="4098" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d11761131e346" title="Garcia, D., &amp; Moradi, S. (2013). The affective temperaments and well-being: Swedish and Iranian adolescents’ life satisfaction and psychological well-being. Journal of Happiness Studies, 14(2), 689–707. 
                https://doi.org/10.1007/s10902-012-9349-z
                
              ."><span data-dcnode-id="4099" instrument_node="">2013</span></a><span data-dcnode-id="4097" instrument_node="">; Urquijo, Extremera, &amp; Villa, </span><a aria-label="Reference 2016" data-dcnode-id="4095" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d11761131e350" title="Urquijo, I., Extremera, N., &amp; Villa, A. (2016). Emotional intelligence, life satisfaction, and psychological well-being in graduates: The mediating effect of perceived stress. Applied Research in Quality of Life, 11(4), 1241–1252. 
                https://doi.org/10.1007/s11482-015-9432-9
                
              ."><span data-dcnode-id="4096" instrument_node="">2016</span></a><span data-dcnode-id="4094" instrument_node="">). Many factors have been found to have a significant impact on life satisfaction, including self-esteem (Campbell, </span><a aria-label="Reference 1981" data-dcnode-id="4092" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d11761131e353" title="Campbell, A. (1981). The sense of well-being in America: Recent patterns and trends. New York: McGraw-Hill."><span data-dcnode-id="4093" instrument_node="">1981</span></a><span data-dcnode-id="4091" instrument_node="">; Diener &amp; Diener, </span><a aria-label="Reference 2009" data-dcnode-id="4089" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d11761131e356" title="Diener, E., &amp; Diener, M. (2009). Cross-cultural correlates of life satisfaction and self-esteem. In E. Diener (Ed.), Culture and well-being (pp. 71–91). Dordrecht: Springer. 
                https://doi.org/10.1007/978-90-481-2352-0_4
                
              ."><span data-dcnode-id="4090" instrument_node="">2009</span></a><span data-dcnode-id="4088" instrument_node="">; Liang, Xu, Xia, &amp; Ma, </span><a aria-label="Reference 2020" data-dcnode-id="4086" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d11761131e359" title="Liang, D., Xu, D., Xia, L., &amp; Ma, X. (2020). Life satisfaction in Chinese rural-to-urban migrants: Investigating the roles of self-esteem and affect balance. Journal of Community Psychology, 48(5), 1651–1659.

              ."><span data-dcnode-id="4087" instrument_node="">2020</span></a><span data-dcnode-id="4085" instrument_node="">; Utsey, Ponterotto, Reynolds, &amp; Cancelli, </span><a aria-label="Reference 2000" data-dcnode-id="4083" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d11761131e362" title="Utsey, S. O., Ponterotto, J. G., Reynolds, A. L., &amp; Cancelli, A. A. (2000). Racial discrimination, coping, life satisfaction, and self-esteem among African Americans. Journal of Counseling &amp; Development, 78(1), 72–80.

              ."><span data-dcnode-id="4084" instrument_node="">2000</span></a><span data-dcnode-id="4082" instrument_node="">), education level (Kousha &amp; Mohseni, </span><a aria-label="Reference 1997" data-dcnode-id="4080" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d11761131e365" title="Kousha, M., &amp; Mohseni, N. (1997). Predictors of life satisfaction among urban Iranian women: An exploratory analysis. Social Indicators Research, 40(3), 329–357.

                https://doi.org/10.1177/089826430101300105

              ."><span data-dcnode-id="4069" instrument_node="">2010</span></a><span data-dcnode-id="4067" instrument_node="">; D’Ambrosio et al., </span><a aria-label="Reference 2020" data-dcnode-id="4065" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d11761131e381" title="D’Ambrosio, C., Jäntti, M., &amp; Lepinteur, A. (2020). Money and happiness: Income, wealth and subjective well-being. Social Indicators Research, 148(1), 47–66."><span data-dcnode-id="4066" instrument_node="">2020</span></a><span data-dcnode-id="4064" instrument_node="">; Johnson &amp; Krueger, </span><a aria-label="Reference 2006" data-dcnode-id="4062" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d11761131e384" title="Johnson, W., &amp; Krueger, R. F. (2006). How money buys happiness: Genetic and environmental processes linking finances and life satisfaction. Journal of Personality and Social Psychology, 90(4), 680–691. 
                https://doi.org/10.1037/0022-3514.90.4.680
                
              ."><span data-dcnode-id="4063" instrument_node="">2006</span></a><span data-dcnode-id="4061" instrument_node="">).</span></p></div><div class="c-article-section__content" data-dcnode-id="4002"><p data-dcnode-id="4003"><span data-dcnode-id="4058" instrument_node="">Researchers have devoted considerable attention to understanding the deeper relationship or mechanism between life satisfaction and physical and psychological health and well-being. For example, previous studies found life satisfaction to be related to various emotion-related factors such as affective well-being (Berlin &amp; Connolly, </span><a aria-label="Reference 2019" data-dcnode-id="4056" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d11761131e390" title="Berlin, M., &amp; Connolly, F. F. (2019). The association between life satisfaction and affective well-being. Journal of Economic Psychology, 73, 34–51. 
                https://doi.org/10.1016/j.joep.2019.04.010
                
              ."><span data-dcnode-id="4057" instrument_node="">2019</span></a><span data-dcnode-id="4055" instrument_node="">), positive and negative emotions (Diener, Colvin, Pavot, &amp; Allman, </span><a aria-label="Reference 1991" data-dcnode-id="4053" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d11761131e393" title="Diener, E., Colvin, C. R., Pavot, W. G., &amp; Allman, A. (1991). The psychic costs of intense positive affect. Journal of Personality and Social Psychology, 61(3), 492–503. 
                https://doi.org/10.1037/0022-3514.61.3.492
                
              ."><span data-dcnode-id="4054" instrument_node="">1991</span></a><span data-dcnode-id="4052" instrument_node="">; Diener, Sandvik, &amp; Pavot, </span><a aria-label="Reference 1990" data-dcnode-id="4050" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d11761131e396" title="Diener, E., Sandvik, E., &amp; Pavot, W. G. (1990). Happiness is the frequency, not intensity, of positive versus negative affect. In F. Strack, M. Argyle, &amp; N. Schwarz (Eds.), The social psychology of subjective well-being (pp. 119–139). Elmsford, NY: Pergamon Press."><span data-dcnode-id="4051" instrument_node="">1990</span></a><span data-dcnode-id="4049" instrument_node="">; Kööts-Ausmees, Realo, &amp; Allik, </span><a aria-label="Reference 2013" data-dcnode-id="4047" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d11761131e399" title="Kööts-Ausmees, L., Realo, A., &amp; Allik, J. (2013). The relationship between life satisfaction and emotional experience in 21 European countries. Journal of Cross-Cultural Psychology, 44(2), 223–244.

              ."><span data-dcnode-id="4036" instrument_node="">2012</span></a><span data-dcnode-id="4034" instrument_node="">). Besides emotion-related factors, significant relationships between life satisfaction and various adversities or obstacles such as general stressful events (Jiang, Zhang, Ming, Huang, &amp; Lin, </span><a aria-label="Reference 2019" data-dcnode-id="4032" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d11761131e415" title="Jiang, Y., Zhang, J., Ming, H., Huang, S., &amp; Lin, D. (2019). Stressful life events and well-being among rural-to-urban migrant adolescents: The moderating role of the stress mindset and differences between genders. Journal of Adolescence, 74, 24–32.

              ."><span data-dcnode-id="4033" instrument_node="">2019</span></a><span data-dcnode-id="4031" instrument_node="">; Wendt et al., </span><a aria-label="Reference 2019" data-dcnode-id="4029" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d11761131e418" title="Wendt, G. W., Costa, A. B., Poletto, M., Cassepp-Borges, V., Dellaglio, D. D., &amp; Koller, S. H. (2019). Stressful events, life satisfaction, and positive and negative affect in youth at risk. Children and Youth Services Review, 102, 34–41. 
                https://doi.org/10.1016/j.childyouth.2019.04.028
                
              ."><span data-dcnode-id="4030" instrument_node="">2019</span></a><span data-dcnode-id="4028" instrument_node="">) and negative life events (Bucciol &amp; Zarri, </span><a aria-label="Reference 2020" data-dcnode-id="4026" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d11761131e421" title="Bucciol, A., &amp; Zarri, L. (2020). Wounds that time can’t heal: Life satisfaction and exposure to traumatic events. Journal of Economic Psychology, 76, 102241."><span data-dcnode-id="4027" instrument_node="">2020</span></a><span data-dcnode-id="4025" instrument_node="">; Marum, Clench-Aas, Nes, &amp; Raanaas, </span><a aria-label="Reference 2014" data-dcnode-id="4023" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d11761131e425" title="Marum, G., Clench-Aas, J., Nes, R. B., &amp; Raanaas, R. K. (2014). The relationship between negative life events, psychological distress and life satisfaction: A population-based study. Quality of Life Research, 23(2), 601–611."><span data-dcnode-id="4024" instrument_node="">2014</span></a><span data-dcnode-id="4022" instrument_node="">) have also been found. Several studies have explored how specific types of stressful events such as sexual abuse (Whitelock, Lamb, &amp; Rentfrow, </span><a aria-label="Reference 2013" data-dcnode-id="4020" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR92" id="ref-link-section-d11761131e428" title="Whitelock, C. F., Lamb, M. E., &amp; Rentfrow, P. J. (2013). Overcoming trauma: Psychological and demographic characteristics of child sexual abuse survivors in adulthood. Clinical Psychological Science, 1(4), 351–362.

              ."><span data-dcnode-id="4021" instrument_node="">2013</span></a><span data-dcnode-id="4019" instrument_node="">), war (Shamai &amp; Kimhi, </span><a aria-label="Reference 2006" data-dcnode-id="4017" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d11761131e431" title="Shamai, M., &amp; Kimhi, S. (2006). Exposure to threat of war and terror, political attitudes, stress, and life satisfaction among teenagers in Israel. Journal of Adolescence, 29(2), 165–176. 
                https://doi.org/10.1016/j.adolescence.2005.03.003
                
              ."><span data-dcnode-id="4018" instrument_node="">2006</span></a><span data-dcnode-id="4016" instrument_node="">), unemployment (Headey &amp; Wearing, </span><a aria-label="Reference 1989" data-dcnode-id="4014" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d11761131e434" title="Headey, B., &amp; Wearing, A. (1989). Personality, life events, and subjective well-being: Toward a dynamic equilibrium model. Journal of Personality and Social Psychology, 57(4), 731–739."><span data-dcnode-id="4015" instrument_node="">1989</span></a><span data-dcnode-id="4013" instrument_node="">), and general poverty and impoverishment (Bayram, Aytac, Aytac, Sam, &amp; Bilgel, </span><a aria-label="Reference 2012" data-dcnode-id="4011" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d11761131e437" title="Bayram, N., Aytac, S., Aytac, M., Sam, N., &amp; Bilgel, N. (2012). Poverty, social exclusion, and life satisfaction: A study from Turkey. Journal of Poverty, 16(4), 375–391. 
                https://doi.org/10.1080/10875549.2012.720656
                
              ."><span data-dcnode-id="4012" instrument_node="">2012</span></a><span data-dcnode-id="4010" instrument_node="">; Samman &amp; Santos, </span><a aria-label="Reference 2013" data-dcnode-id="4008" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d11761131e440" title="Samman, E., &amp; Santos, M. E. (2013). Poor and dissatisfied? Income poverty, poverty transitions and life satisfaction in Chile. Journal of Poverty and Social Justice, 21(1), 19–31. 
                https://doi.org/10.1332/175982713X664038
                
              ."><span data-dcnode-id="4009" instrument_node="">2013</span></a><span data-dcnode-id="4007" instrument_node="">), affect individuals’ life satisfaction. The significant relationship between adversities and life satisfaction might depend on the way individuals perceive and cope with these adversities (Rezaei &amp; Jeddi, </span><a aria-label="Reference 2020" data-dcnode-id="4005" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d11761131e444" title="Rezaei, A., &amp; Jeddi, E. M. (2020). Relationship between wisdom, perceived control of internal states, perceived stress, social intelligence, information processing styles and life satisfaction among college students. Current Psychology, 39(3), 927–933."><span data-dcnode-id="4006" instrument_node="">2020</span></a><span data-dcnode-id="4004" instrument_node="">).</span></p></div><div class="c-article-section__content" data-dcnode-id="3993"><p data-dcnode-id="3994"><span data-dcnode-id="4001" instrument_node="">While previous studies have focused on the role of different types of emotions (e.g., positive or negative) or emotional outcomes (e.g., depression) in life satisfaction, it is even more important to explore how individuals’ abilities to recognize, control, understand, and utilize their emotions influence their life satisfaction. These components can be considered as part of an individual’s emotional intelligence (EI) (Mayer &amp; Salovey, </span><a aria-label="Reference 1997" data-dcnode-id="3999" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d11761131e450" title="Mayer, J. D., &amp; Salovey, P. (1997). What is emotional intelligence? In P. Salovey &amp; D. J. Sluyter (Eds.), Emotional development and emotional intelligence: Educational implications (pp. 3–31). New York: Basic Books."><span data-dcnode-id="4000" instrument_node="">1997</span></a><span data-dcnode-id="3998" instrument_node="">). Moreover, individuals’ abilities to be persistent and resilient in the face of various stressful events or adversities can also play an important role; this ability can be considered to be an individual’s adversity quotient (AQ) (Stoltz, </span><a aria-label="Reference 1997" data-dcnode-id="3996" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d11761131e453" title="Stoltz, P. G. (1997). Adversity quotient: Turning obstacles into opportunities. New York: John Wiley &amp; Sons."><span data-dcnode-id="3997" instrument_node="">1997</span></a><span data-dcnode-id="3995" instrument_node="">). The current study aimed to examine how EI and AQ affect individuals’ perceived life satisfaction.</span></p></div><section data-dcnode-id="3845" data-gtm-vis-first-on-screen-50443292_562="580" data-gtm-vis-first-on-screen-50443292_563="580" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="580" data-gtm-vis-recent-on-screen-50443292_563="580" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Theoretical Framework"><div class="c-article-section" data-dcnode-id="3846" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3991" id="Sec1"><span data-dcnode-id="3992" instrument_node="">Theoretical Framework</span></h2><div class="c-article-section__content" data-dcnode-id="3847" id="Sec1-content"><h3 class="c-article__sub-heading" data-dcnode-id="3989" id="Sec2"><span data-dcnode-id="3990" instrument_node="">Emotional Intelligence (EI)</span></h3><p data-dcnode-id="3981"><span data-dcnode-id="3988" instrument_node="">Trait EI is one of two types of EIs that are widely discussed in the literature, Salovey and Mayer (</span><a aria-label="Reference 1990" data-dcnode-id="3986" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d11761131e467" title="Salovey, P., &amp; Mayer, J. D. (1990). Emotional intelligence. Imagination, Cognition and Personality, 9(3), 185–211."><span data-dcnode-id="3987" instrument_node="">1990</span></a><span data-dcnode-id="3985" instrument_node="">) defined ability EI as “the subset of social intelligence that involves the ability to monitor one’s own and others’ feelings and emotions, to discriminate among them and to use this information to guide one’s thinking and actions” (p. 189). Trait EI, on the other hand, refers to emotion-related perceptions and dispositions, assessed using self-report measures. Petrides, Pita, and Kokkinaki (</span><a aria-label="Reference 2007" data-dcnode-id="3983" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d11761131e470" title="Petrides, K. V., Pita, R., &amp; Kokkinaki, F. (2007). The location of trait emotional intelligence in personality factor space. British Journal of Psychology, 98(2), 273–289."><span data-dcnode-id="3984" instrument_node="">2007</span></a><span data-dcnode-id="3982" instrument_node="">) defined trait EI as “a distinct and compound construct that lies at the lower levels of personality hierarchies” (p. 283).</span></p><p data-dcnode-id="3955"><span data-dcnode-id="3980" instrument_node="">Previous studies found self-reported trait EI was positively related to life satisfaction in diverse samples, including undergraduates (Afolabi &amp; Balogun, </span><a aria-label="Reference 2017" data-dcnode-id="3978" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d11761131e476" title="Afolabi, O. A., &amp; Balogun, A. G. (2017). Impacts of psychological security, emotional intelligence and self-efficacy on undergraduates’ life satisfaction. Psychological Thought, 10(2), 247–261. 
                https://doi.org/10.5964/psyct.v10i2.226
                
              ."><span data-dcnode-id="3979" instrument_node="">2017</span></a><span data-dcnode-id="3977" instrument_node="">), graduates (Amdurer, Boyatzis, Saatcioglu, Smith, &amp; Taylor, </span><a aria-label="Reference 2014" data-dcnode-id="3975" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d11761131e479" title="Amdurer, E., Boyatzis, R. E., Saatcioglu, A., Smith, M. L., &amp; Taylor, S. N. (2014). Long term impact of emotional, social and cognitive intelligence competencies and GMAT on career and life satisfaction and career success. Frontiers in Psychology, 5, 1447. 
                https://doi.org/10.3389/fpsyg.2014.01447
                
              ."><span data-dcnode-id="3976" instrument_node="">2014</span></a><span data-dcnode-id="3974" instrument_node="">), university employees (Hafiz &amp; Chouhan, </span><a aria-label="Reference 2015" data-dcnode-id="3972" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d11761131e482" title="Hafiz, S., &amp; Chouhan, M. (2015). Impact of emotional intelligence on life satisfaction of university employees. Indian Journal of Positive Psychology, 6(3), 315–317."><span data-dcnode-id="3973" instrument_node="">2015</span></a><span data-dcnode-id="3971" instrument_node="">), and secondary school teachers (Mehta &amp; Mehta, </span><a aria-label="Reference 2015" data-dcnode-id="3969" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d11761131e485" title="Mehta, P., &amp; Mehta, B. (2015). Emotional intelligence in relation to satisfaction with life: A study of govt. secondary school teachers. Indian Journal of Positive Psychology, 6(1), 98–102."><span data-dcnode-id="3970" instrument_node="">2015</span></a><span data-dcnode-id="3968" instrument_node="">). The positive direction of the relationship may be primarily due to the level of emotional self-efficacy associated with trait EI (Petrides &amp; Furnham, </span><a aria-label="Reference 2003" data-dcnode-id="3966" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d11761131e488" title="Petrides, K. V., &amp; Furnham, A. (2003). Trait emotional intelligence: Behavioural validation in two studies of emotion recognition and reactivity to mood induction. European Journal of Personality, 17(1), 39–57."><span data-dcnode-id="3967" instrument_node="">2003</span></a><span data-dcnode-id="3965" instrument_node="">). Emotional self-efficacy will not only directly affect an individual’s emotional status in negative situations, but also indirectly influence that individual’s reactions in the face of setbacks and obstacles. However, findings on the relationship between trait EI and life satisfaction has been inconsistent. For example, in terms of the relationship between different facets of trait EI (measured by Trait Meta-Mood Scale) and life satisfaction, only certain facets of trait EI (i.e., clarity of feelings) were significantly correlated with life satisfaction (Palmer, Donaldson, &amp; Stough, </span><a aria-label="Reference 2002" data-dcnode-id="3963" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d11761131e492" title="Palmer, B., Donaldson, C., &amp; Stough, C. (2002). Emotional intelligence and life satisfaction. Personality and Individual Differences, 33(7), 1091–1100."><span data-dcnode-id="3964" instrument_node="">2002</span></a><span data-dcnode-id="3962" instrument_node="">). Liu, Wang, and Lü (</span><a aria-label="Reference 2013" data-dcnode-id="3960" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d11761131e495" title="Liu, Y., Wang, Z., &amp; Lü, W. (2013). Resilience and affect balance as mediators between trait emotional intelligence and life satisfaction. Personality and Individual Differences, 54(7), 850–855."><span data-dcnode-id="3961" instrument_node="">2013</span></a><span data-dcnode-id="3959" instrument_node="">) further found that others’ emotional appraisal (measured by Wong and Law Emotional Intelligence Scale) was not significantly related to life satisfaction in a sample of undergraduate students. Interestingly, when Holinka (</span><a aria-label="Reference 2015" data-dcnode-id="3957" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d11761131e498" title="Holinka, C. (2015). Stress, emotional intelligence, and life satisfaction in college students. College Student Journal, 49(2), 300–311."><span data-dcnode-id="3958" instrument_node="">2015</span></a><span data-dcnode-id="3956" instrument_node="">) further explored the trait Emotional Quotient-Inventory (EQ-i) subscales, she found a negative correlation between the interpersonal trait EQ-i subscale and overall life satisfaction.</span></p><p data-dcnode-id="3953"><span data-dcnode-id="3954" instrument_node="">Since previous studies had inconsistent conclusions on the relationships between the sub-dimensions of trait EI and life satisfaction, we attempted to further explore the relationships between components of trait EI and life satisfaction, to provide a deeper understanding of the effect of each component on individuals’ life satisfaction. Knowledge gained from this study can help future researchers and practitioners to develop a better understanding of how different trait EI components are differentially related to life satisfaction. We hypothesized that higher levels of trait EI would be associated with higher levels of life satisfaction.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3951" id="Sec3"><span data-dcnode-id="3952" instrument_node="">Adversity Quotient/Intelligence (AQ/AI)</span></h3><p data-dcnode-id="3928"><span data-dcnode-id="3950" instrument_node="">The concept of AQ, or adversity intelligence (AI), originated in the late 1990s. Stoltz (</span><a aria-label="Reference 1997" data-dcnode-id="3948" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d11761131e512" title="Stoltz, P. G. (1997). Adversity quotient: Turning obstacles into opportunities. New York: John Wiley &amp; Sons."><span data-dcnode-id="3949" instrument_node="">1997</span></a><span data-dcnode-id="3947" instrument_node="">) first developed this concept after contemplating why people can possess both a high IQ and EI but still fall short of their potential. According to Stoltz (</span><a aria-label="Reference 1997" data-dcnode-id="3945" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d11761131e515" title="Stoltz, P. G. (1997). Adversity quotient: Turning obstacles into opportunities. New York: John Wiley &amp; Sons."><span data-dcnode-id="3946" instrument_node="">1997</span></a><span data-dcnode-id="3944" instrument_node="">), “AQ is a new conceptual framework for understanding and enhancing all facets of success” (p. 7). Although Stoltz did not explicitly operationalized the concept of AQ, some researchers, based on Stoltz’s early idea of AQ(Stoltz, </span><a aria-label="Reference 1997" data-dcnode-id="3942" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d11761131e518" title="Stoltz, P. G. (1997). Adversity quotient: Turning obstacles into opportunities. New York: John Wiley &amp; Sons."><span data-dcnode-id="3943" instrument_node="">1997</span></a><span data-dcnode-id="3941" instrument_node="">), operationalized it as individuals’ ability to face and overcome adversities and difficulties (i.e., Woo &amp; Song, </span><a aria-label="Reference 2015" data-dcnode-id="3939" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d11761131e521" title="Woo, H. Y., &amp; Song, J. H. (2015). The factors affecting the adversity quotient of nurses and office workers. International Journal of Bio-Science and Bio-Technology, 7(5), 1–10."><span data-dcnode-id="3940" instrument_node="">2015</span></a><span data-dcnode-id="3938" instrument_node="">; Suryadi &amp; Santoso, </span><a aria-label="Reference 2017" data-dcnode-id="3936" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d11761131e524" title="Suryadi, B., &amp; Santoso, T. I. (2017). Self-efficacy, adversity quotient, and students’ achievement in mathematics. International Education Studies, 10(10), 12–19."><span data-dcnode-id="3937" instrument_node="">2017</span></a><span data-dcnode-id="3935" instrument_node="">). Other researchers also tried to define the AQ, for example Parvathy and Praseeda (</span><a aria-label="Reference 2014" data-dcnode-id="3933" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d11761131e528" title="Parvathy, U., &amp; Praseeda, M. (2014). Relationship between adversity quotient and academic problems among student teachers. Journal of Humanities and Social Science, 19(11), 23–26."><span data-dcnode-id="3934" instrument_node="">2014</span></a><span data-dcnode-id="3932" instrument_node="">) defined AQ as “the capacity to deal with the adversities of his/her life”(p. 23). Similarly, Suryaningrum et al. (</span><a aria-label="Reference 2020" data-dcnode-id="3930" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d11761131e531" title="Suryaningrum, C. W., Purwanto, P., Subanji, S., Susanto, H., Ningtyas, Y. D. W. K., &amp; Irfan, M. (2020). Semiotic reasoning emerges in constructing properties of a rectangle: A study of adversity quotient. Journal on Mathematics Education, 11(1), 95–110."><span data-dcnode-id="3931" instrument_node="">2020</span></a><span data-dcnode-id="3929" instrument_node="">) described AQ as “AQ is the persistence of a person when dealing with obstacles to obtain success” (p. 97).</span></p><p data-dcnode-id="3893"><span data-dcnode-id="3927" instrument_node="">Although Stoltz (</span><a aria-label="Reference 1997" data-dcnode-id="3925" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d11761131e537" title="Stoltz, P. G. (1997). Adversity quotient: Turning obstacles into opportunities. New York: John Wiley &amp; Sons."><span data-dcnode-id="3926" instrument_node="">1997</span></a><span data-dcnode-id="3924" instrument_node="">) indicated that AQ can predict various factors such as performance, motivation, empowerment, creativity, productivity, learning, energy, hope, emotional health, physical health, persistence, resilience, improvement over time, attitude, longevity, response to change, happiness, vitality, and joy, limited empirical studies have been conducted on the topic of AQ so far. Our review of literature indicated that previous research explored the relationships between AQ and other variables, such as academic achievement (Matore, Khairani, &amp; Razak, </span><a aria-label="Reference 2015" data-dcnode-id="3922" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d11761131e540" title="Matore, M. E. E. M., Khairani, A. Z., &amp; Razak, N. A. (2015). The influence of AQ on the academic achievement among Malaysian polytechnic students. International Education Studies, 8(6), 69–74."><span data-dcnode-id="3923" instrument_node="">2015</span></a><span data-dcnode-id="3921" instrument_node="">; Suryadi &amp; Santoso, </span><a aria-label="Reference 2017" data-dcnode-id="3919" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d11761131e543" title="Suryadi, B., &amp; Santoso, T. I. (2017). Self-efficacy, adversity quotient, and students’ achievement in mathematics. International Education Studies, 10(10), 12–19."><span data-dcnode-id="3920" instrument_node="">2017</span></a><span data-dcnode-id="3918" instrument_node="">), good citizenship (Siphai, </span><a aria-label="Reference 2015" data-dcnode-id="3916" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d11761131e546" title="Siphai, S. (2015). Influences of moral, emotional and adversity quotient on good citizenship of Rajabhat university's students in the northeast of Thailand. Educational Research and Reviews, 10(17), 2413–2421."><span data-dcnode-id="3917" instrument_node="">2015</span></a><span data-dcnode-id="3915" instrument_node="">), career adaptability (Tian &amp; Fan, </span><a aria-label="Reference 2014" data-dcnode-id="3913" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d11761131e549" title="Tian, Y., &amp; Fan, X. (2014). Adversity quotients, environmental variables and career adaptability in student nurses. Journal of Vocational Behavior, 85(3), 251–257. 
                https://doi.org/10.1016/j.jvb.2014.07.006
                
              ."><span data-dcnode-id="3914" instrument_node="">2014</span></a><span data-dcnode-id="3912" instrument_node="">), defense mechanisms (Nikam &amp; Uplane, </span><a aria-label="Reference 2013" data-dcnode-id="3910" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d11761131e553" title="Nikam, V. B., &amp; Uplane, M. M. (2013). Adversity quotient and defense mechanism of secondary school students. Universal Journal of Educational Research, 1(4), 303–308."><span data-dcnode-id="3911" instrument_node="">2013</span></a><span data-dcnode-id="3909" instrument_node="">), job satisfaction (Woo &amp; Song, </span><a aria-label="Reference 2015" data-dcnode-id="3907" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d11761131e556" title="Woo, H. Y., &amp; Song, J. H. (2015). The factors affecting the adversity quotient of nurses and office workers. International Journal of Bio-Science and Bio-Technology, 7(5), 1–10."><span data-dcnode-id="3908" instrument_node="">2015</span></a><span data-dcnode-id="3906" instrument_node="">), psychological contract breach and turnover intention (Chin &amp; Hung, </span><a aria-label="Reference 2013" data-dcnode-id="3904" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d11761131e559" title="Chin, P.-L., &amp; Hung, M.-L. (2013). Psychological contract breach and turnover intention: The moderating roles of adversity quotient and gender. Social Behavior and Personality: An International Journal, 41(5), 843–859. 
                https://doi.org/10.2224/sbp.2013.41.5.843
                
              ."><span data-dcnode-id="3905" instrument_node="">2013</span></a><span data-dcnode-id="3903" instrument_node="">). Although it has been shown that some variables (i.e., job satisfaction and psychological contract breach) are related to individuals’ well-being (Bellali, Manomenidis, Meramveliotaki, Minasidou, &amp; Galanis, </span><a aria-label="Reference 2020" data-dcnode-id="3901" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d11761131e562" title="Bellali, T., Manomenidis, G., Meramveliotaki, E., Minasidou, E., &amp; Galanis, P. (2020). The impact of anxiety and depression in the quality of life and psychological well-being of Greek hematological cancer patients on chemotherapy. Psychology, Health &amp; Medicine, 25(2), 201–213. 
                https://doi.org/10.1080/13548506.2019.1695864
                
              ."><span data-dcnode-id="3902" instrument_node="">2020</span></a><span data-dcnode-id="3900" instrument_node="">; Duran, Bishopp, &amp; Woodhams, </span><a aria-label="Reference 2019" data-dcnode-id="3898" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d11761131e565" title="Duran, F., Bishopp, D., &amp; Woodhams, J. (2019). Relationships between psychological contract violation, stress and well-being in firefighters. International Journal of Workplace Health Management, 12(3), 120–133. 
                https://doi.org/10.1108/IJWHM-09-2018-0114
                
              ."><span data-dcnode-id="3899" instrument_node="">2019</span></a><span data-dcnode-id="3897" instrument_node="">; Segrin, Badger, Dorros, Meek, &amp; Lopez, </span><a aria-label="Reference 2007" data-dcnode-id="3895" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d11761131e568" title="Segrin, C., Badger, T., Dorros, S. M., Meek, P., &amp; Lopez, A. M. (2007). Interdependent anxiety and psychological distress in women with breast cancer and their partners. Psycho-Oncology: Journal of the Psychological, Social and Behavioral Dimensions of Cancer, 16(7), 634–643. 
                https://doi.org/10.1002/pon.1111
                
              ."><span data-dcnode-id="3896" instrument_node="">2007</span></a><span data-dcnode-id="3894" instrument_node="">), no study has yet examined how AQ directly affects people’s life satisfaction.</span></p><p data-dcnode-id="3873"><span data-dcnode-id="3892" instrument_node="">Nevertheless, as stated by Stoltz (</span><a aria-label="Reference 1997" data-dcnode-id="3890" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d11761131e574" title="Stoltz, P. G. (1997). Adversity quotient: Turning obstacles into opportunities. New York: John Wiley &amp; Sons."><span data-dcnode-id="3891" instrument_node="">1997</span></a><span data-dcnode-id="3889" instrument_node="">), “those with higher AQs enjoy a host of benefits, including greater performance, productivity, creativity, health, persistence, resilience, and vitality, than their low AQ counterparts” (p. 9). Moreover, other researchers also emphasized the importance of persistence in AQ (Suryaningrum et al., </span><a aria-label="Reference 2020" data-dcnode-id="3887" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d11761131e577" title="Suryaningrum, C. W., Purwanto, P., Subanji, S., Susanto, H., Ningtyas, Y. D. W. K., &amp; Irfan, M. (2020). Semiotic reasoning emerges in constructing properties of a rectangle: A study of adversity quotient. Journal on Mathematics Education, 11(1), 95–110."><span data-dcnode-id="3888" instrument_node="">2020</span></a><span data-dcnode-id="3886" instrument_node="">). As such, the concept of resilience and grit can be incorporated into the broader construct of AQ. In addition, Dewi, Hargono, and Tristiana (</span><a aria-label="Reference 2019" data-dcnode-id="3884" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d11761131e580" title="Dewi, Y. S., Hargono, R., &amp; Tristiana, R. D. (2019). Recovery self-efficacy, coping strategy, adversity quotient and resilience among intensive care unit nurses in Indonesia. Indian Journal of Public Health Research &amp; Development, 10(10), 2087–2092."><span data-dcnode-id="3885" instrument_node="">2019</span></a><span data-dcnode-id="3883" instrument_node="">) suggested a significant correlation between AQ and resilience. A study by Block and Turula (</span><a aria-label="Reference 1963" data-dcnode-id="3881" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d11761131e583" title="Block, J., &amp; Turula, E. (1963). Identification, ego control, and adjustment. Child Development, 34(4), 945–953. 
                https://doi.org/10.2307/1126537
                
              ."><span data-dcnode-id="3882" instrument_node="">1963</span></a><span data-dcnode-id="3880" instrument_node="">) might be the earliest empirical study to discuss resilience, defining it as an “individual’s adaption capability when under the strain set by new environmental demands” (p. 2). Similarly, Iyanda (</span><a aria-label="Reference 2018" data-dcnode-id="3878" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d11761131e586" title="Iyanda A, O. (2018). Organisational Grit: Succeeding with Adversity Quotient [Web log post]. Retrieved from 
                https://brootc.com/our-blog/leadership/what-is-your-adversity-quotient-olukunle-iyanda/
                
              "><span data-dcnode-id="3879" instrument_node="">2018</span></a><span data-dcnode-id="3877" instrument_node="">) discussed the vital relationship between grit and AQ in organizations, with both shown to be a critical factor for success. The concept of grit, defined as “perseverance and passion for long-term goals” (Duckworth, Peterson, Matthews, &amp; Kelly, </span><a aria-label="Reference 2007" data-dcnode-id="3875" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d11761131e590" title="Duckworth, A. L., Peterson, C., Matthews, M. D., &amp; Kelly, D. R. (2007). Grit: Perseverance and passion for long-term goals. Journal of Personality and Social Psychology, 92(6), 1087–1101. 
                https://doi.org/10.1037/0022-3514.92.6.1087
                
              ."><span data-dcnode-id="3876" instrument_node="">2007</span></a><span data-dcnode-id="3874" instrument_node="">, p. 1087), can reflect an individual’s ability or aptitude to persist in the face of adversity or obstacles. Thus, it appears reasonable to consider resilience and grit as specific components of AQ. In the current study, we consider AQ to be individuals’ general and intellectual abilities to effectively cope with adversity or obstacles, through perseverance and resilience. Therefore, we define AQ as an individual’s capacity to effectively cope with both internal (e.g., anxiety, fear, depression, perfectionism, and low motivation) and external obstacles (e.g., peer pressure, relationships with others, and financial and work issues) to achieve their goals. This conceptualization of AQ implies that individuals are able to adapt to, cope with, and overcome adversities through perseverance and resilience.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3871" id="Sec4"><span data-dcnode-id="3872" instrument_node="">EI and AQ</span></h3><p data-dcnode-id="3848"><span data-dcnode-id="3870" instrument_node="">As indicated by previous researchers that EI was often discussed in the context of resilience behaviors when individuals face adversities (Edward &amp; Warelow, </span><a aria-label="Reference 2005" data-dcnode-id="3868" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d11761131e601" title="Edward, K. L., &amp; Warelow, P. (2005). Resilience: When coping is emotionally intelligent. Journal of the American Psychiatric Nurses Association, 11(2), 101–102."><span data-dcnode-id="3869" instrument_node="">2005</span></a><span data-dcnode-id="3867" instrument_node="">). Although limited studies were found to discussed the relationship between EI and AQ, researchers found a significant positive relationship between EI and AQ in a diverse but majorly south east Asia population, such as Malaysia (Effendi, Matore, &amp; Khairani, </span><a aria-label="Reference 2016" data-dcnode-id="3865" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d11761131e604" title="Effendi, M., Matore, E. M., &amp; Khairani, A. Z. (2016). Correlation between adversity quotient (AQ) with IQ, EQ and SQ among polytechnic students using rasch model. Indian Journal of Science and Technology, 9(47), 1–8."><span data-dcnode-id="3866" instrument_node="">2016</span></a><span data-dcnode-id="3864" instrument_node="">), Korea (Woo &amp; Song, </span><a aria-label="Reference 2015" data-dcnode-id="3862" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d11761131e607" title="Woo, H. Y., &amp; Song, J. H. (2015). The factors affecting the adversity quotient of nurses and office workers. International Journal of Bio-Science and Bio-Technology, 7(5), 1–10."><span data-dcnode-id="3863" instrument_node="">2015</span></a><span data-dcnode-id="3861" instrument_node="">), and Indonesia (Anwar &amp; Fitriani, </span><a aria-label="Reference 2020" data-dcnode-id="3859" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d11761131e610" title="Anwar, M, C., &amp; Fitriani, S. (2020). Emotional intelligence and interpersonal communication: Their relationship on primary school teachers’ adversity quotient. In International Proceedings Conferences Series (pp. 55-67).&nbsp;
                https://doi.org/10.22236/ie.v1i1.137
                
              ."><span data-dcnode-id="3860" instrument_node="">2020</span></a><span data-dcnode-id="3858" instrument_node="">). For example, by using 1847 Malaysia polytechnic students, the results from Rash Model showed a significant moderate and positive correlation between AQ and EI (Effendi et al., </span><a aria-label="Reference 2016" data-dcnode-id="3856" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d11761131e613" title="Effendi, M., Matore, E. M., &amp; Khairani, A. Z. (2016). Correlation between adversity quotient (AQ) with IQ, EQ and SQ among polytechnic students using rasch model. Indian Journal of Science and Technology, 9(47), 1–8."><span data-dcnode-id="3857" instrument_node="">2016</span></a><span data-dcnode-id="3855" instrument_node="">). Similarly, Woo and Song (</span><a aria-label="Reference 2015" data-dcnode-id="3853" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d11761131e617" title="Woo, H. Y., &amp; Song, J. H. (2015). The factors affecting the adversity quotient of nurses and office workers. International Journal of Bio-Science and Bio-Technology, 7(5), 1–10."><span data-dcnode-id="3854" instrument_node="">2015</span></a><span data-dcnode-id="3852" instrument_node="">) found a significant positive relationship between AQ and all aspect of trait EI (measured by Wong and Law Emotional Intelligence Scale) in 270 Korean nurses and 192 office workers. Study further found that EI had a significant and positive effect on AQ in 217 students in Indonesia (Puspitacandri, </span><a aria-label="Reference 2020" data-dcnode-id="3850" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d11761131e620" title="Puspitacandri, A. (2020). The effects of intelligence, emotional, spiritual and adversity quotient on the graduates quality in Surabaya shipping polytechnic. European Journal of Educational Research, 9(3), 1075–1087."><span data-dcnode-id="3851" instrument_node="">2020</span></a><span data-dcnode-id="3849" instrument_node="">). Therefore, there is consistent and positive relationship between EI and AQ, especially in eastern culture.</span></p></div></div></section><section data-dcnode-id="3799" data-title="Current Study"><div class="c-article-section" data-dcnode-id="3800" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3843" id="Sec5"><span data-dcnode-id="3844" instrument_node="">Current Study</span></h2><div class="c-article-section__content" data-dcnode-id="3801" id="Sec5-content"><p data-dcnode-id="3802"><span data-dcnode-id="3842" instrument_node="">Considering the vital role life satisfaction plays in our daily life and well-being, it is necessary to explore the differential effects of trait EI and AQ on life satisfaction in a diverse population, thus laying the groundwork for further empirical and theoretical research. Even though some studies tried to explore the relationship among trait EI, AQ, and life satisfaction, their inconsistent findings warrant further research in this area. For example, researchers have identified a positive relationship between grit and life satisfaction across different age groups, such as early adolescence (Clark &amp; Malecki, </span><a aria-label="Reference 2019" data-dcnode-id="3840" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d11761131e632" title="Clark, K. N., &amp; Malecki, C. K. (2019). Academic grit scale: Psychometric properties and associations with achievement and life satisfaction. Journal of School Psychology, 72, 49–66."><span data-dcnode-id="3841" instrument_node="">2019</span></a><span data-dcnode-id="3839" instrument_node="">; Oriol, Miranda, Bazán, &amp; Benavente, </span><a aria-label="Reference 2020" data-dcnode-id="3837" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d11761131e635" title="Oriol, X., Miranda, R., Bazán, C., &amp; Benavente, E. (2020). Distinct routes to understand the relationship between dispositional optimism and life satisfaction: Self-control and grit, positive affect, gratitude, and meaning in life. Frontiers in Psychology, 11, 907."><span data-dcnode-id="3838" instrument_node="">2020</span></a><span data-dcnode-id="3836" instrument_node="">), young adulthood (Jin &amp; Kim, </span><a aria-label="Reference 2017" data-dcnode-id="3834" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d11761131e638" title="Jin, B., &amp; Kim, J. (2017). Grit, basic needs satisfaction, and subjective well-being. Journal of Individual Differences, 38(1), 29–35. 
                https://doi.org/10.1027/1614-0001/a000219
                
              ."><span data-dcnode-id="3835" instrument_node="">2017</span></a><span data-dcnode-id="3833" instrument_node="">; Li, Fang, Wang, Sun, &amp; Cheng, </span><a aria-label="Reference 2018" data-dcnode-id="3831" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d11761131e641" title="Li, J., Fang, M., Wang, W., Sun, G., &amp; Cheng, Z. (2018). The influence of grit on life satisfaction: Self-esteem as a mediator. Psychologica Belgica, 58(1), 51–66."><span data-dcnode-id="3832" instrument_node="">2018</span></a><span data-dcnode-id="3830" instrument_node="">), and adulthood (Palczyńska &amp; Świst, </span><a aria-label="Reference 2018" data-dcnode-id="3828" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d11761131e644" title="Palczyńska, M., &amp; Świst, K. (2018). Personality, cognitive skills and life outcomes: Evidence from the polish follow-up study to PIAAC. Large-scale Assessments in Education, 6(1), 2. 
                https://doi.org/10.1186/s40536-018-0056-z
                
              ."><span data-dcnode-id="3829" instrument_node="">2018</span></a><span data-dcnode-id="3827" instrument_node="">); however, when examining the subscales of grit, one meta-analysis found that the subscale of perseverance of effect (PoE) had a much stronger effect on life satisfaction than consistency of interest (CoI) subscale (Credé, Tynan, &amp; Harms, </span><a aria-label="Reference 2017" data-dcnode-id="3825" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d11761131e648" title="Credé, M., Tynan, M. C., &amp; Harms, P. D. (2017). Much ado about grit: A meta-analytic synthesis of the grit literature. Journal of Personality and Social Psychology, 113(3), 492–511."><span data-dcnode-id="3826" instrument_node="">2017</span></a><span data-dcnode-id="3824" instrument_node="">). This differential effect appears to be caused by cultural differences, specifically between individualism and collectivism, on overall grit (Disabato, Goodman, &amp; Kashdan, </span><a aria-label="Reference 2019" data-dcnode-id="3822" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d11761131e651" title="Disabato, D. J., Goodman, F. R., &amp; Kashdan, T. B. (2019). Is grit relevant to well-being and strengths? Evidence across the globe for separating perseverance of effort and consistency of interests. Journal of Personality, 87(2), 194–211."><span data-dcnode-id="3823" instrument_node="">2019</span></a><span data-dcnode-id="3821" instrument_node="">). Moreover, Datu, Valdez, and King (</span><a aria-label="Reference 2016" data-dcnode-id="3819" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d11761131e654" title="Datu, J. A. D., Valdez, J. P. M., &amp; King, R. B. (2016). Perseverance counts but consistency does not! Validating the short grit scale in a collectivist setting. Current Psychology, 35(1), 121–130."><span data-dcnode-id="3820" instrument_node="">2016</span></a><span data-dcnode-id="3818" instrument_node="">) revealed that CoI was not significantly related to life satisfaction. As with grit, extensive studies have found a positive relationship between resilience and life satisfaction (i.e., Arslan, </span><a aria-label="Reference 2019" data-dcnode-id="3816" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d11761131e657" title="Arslan, G. (2019). Mediating role of self–esteem and resilience in the association between social exclusion and life satisfaction among adolescents. Personality and Individual Differences, 151, 109514."><span data-dcnode-id="3817" instrument_node="">2019</span></a><span data-dcnode-id="3815" instrument_node="">; Beutel, Glaesmer, Wiltink, Marian, &amp; Brähler, </span><a aria-label="Reference 2010" data-dcnode-id="3813" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d11761131e660" title="Beutel, M. E., Glaesmer, H., Wiltink, J., Marian, H., &amp; Brähler, E. (2010). Life satisfaction, anxiety, depression and resilience across the life span of men. The Aging Male, 13(1), 32–39. 
                https://doi.org/10.3109/13685530903296698
                
              ."><span data-dcnode-id="3814" instrument_node="">2010</span></a><span data-dcnode-id="3812" instrument_node="">; McGinnis, </span><a aria-label="Reference 2018" data-dcnode-id="3810" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d11761131e663" title="McGinnis, D. (2018). Resilience, life events, and well-being during midlife: Examining resilience subgroups. Journal of Adult Development, 25(3), 198–221. 
                https://doi.org/10.1007/s10804-018-9288-y
                
              ."><span data-dcnode-id="3811" instrument_node="">2018</span></a><span data-dcnode-id="3809" instrument_node="">; Temiz &amp; Comert, </span><a aria-label="Reference 2018" data-dcnode-id="3807" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d11761131e667" title="Temiz, Z. T., &amp; Comert, I. T. (2018). The relationship between life satisfaction, attachment styles, and psychological resilience in university students. Düşünen Adam: Journal of Psychiatry and Neurological Sciences, 31(3), 274–283. "><span data-dcnode-id="3808" instrument_node="">2018</span></a><span data-dcnode-id="3806" instrument_node="">). However, when examining the relations between sub-dimensions of resilience and life satisfaction, only the moral tendency aspect of resilience (measured by Connor-Davidson Resilience Scale) was found to be positively related to life satisfaction (Celik &amp; Caglayan, </span><a aria-label="Reference 2019" data-dcnode-id="3804" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d11761131e670" title="Celik, M., &amp; Caglayan, N. İ. (2019). Resilience as the predictor of divorcees’ life satisfaction. Social Science Quarterly, 100(6), 2078–2093."><span data-dcnode-id="3805" instrument_node="">2019</span></a><span data-dcnode-id="3803" instrument_node="">). Considering the inconsistent results with respect to the relationship between grit, resilience, and life satisfaction, the current study further evaluated how various aspects of resilience and grit, as components of AQ, are differentially associated with life satisfaction.</span></p></div></div></section><section data-dcnode-id="3630" data-title="Method"><div class="c-article-section" data-dcnode-id="3631" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3797" id="Sec6"><span data-dcnode-id="3798" instrument_node="">Method</span></h2><div class="c-article-section__content" data-dcnode-id="3632" id="Sec6-content"><h3 class="c-article__sub-heading" data-dcnode-id="3795" id="Sec7"><span data-dcnode-id="3796" instrument_node="">Participants</span></h3><p data-dcnode-id="3790"><span data-dcnode-id="3794" instrument_node="">A total of 256 participants were involved in the current study, with 107 males (41.8%) and 149 females (58.2%). The average participant age was 35&nbsp;years old (</span><i data-dcnode-id="3792"><span data-dcnode-id="3793" instrument_node="">SD</span></i><span data-dcnode-id="3791" instrument_node=""> = 9.39). The majority of participants had earned a college degree (70.3%) and most were married (68.8%). More than half of the participants (53.3%) worked more than 40&nbsp;h per week.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3788" id="Sec8"><span data-dcnode-id="3789" instrument_node="">Data Collection</span></h3><p data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">All of the data used in the current study were collected online via questionnaires. Data were collected using four measurements, with one questionnaire each for trait EI, resilience, grit, and general life satisfaction. Basic demographic information was also collected from all participants.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3784" id="Sec9"><span data-dcnode-id="3785" instrument_node="">Measures</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="3782" id="Sec10"><span data-dcnode-id="3783" instrument_node="">Emotion Intelligence</span></h4><p data-dcnode-id="3744"><span data-dcnode-id="3781" instrument_node="">Trait EI was measured using Schutte et al.’s (</span><a aria-label="Reference 1998" data-dcnode-id="3779" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d11761131e709" title="Schutte, N. S., Malouff, J. M., Hall, L. E., Haggerty, D. J., Cooper, J. T., Golden, C. J., &amp; Dornheim, L. (1998). Development and validation of a measure of emotional intelligence. Personality and Individual Differences, 25(2), 167–177."><span data-dcnode-id="3780" instrument_node="">1998</span></a><span data-dcnode-id="3778" instrument_node="">) Self-Report EI Test (SREIT). The SREIT is a brief (33 items) self-report measurement of EI, which was developed based on Salovey and Mayer’s (</span><a aria-label="Reference 1990" data-dcnode-id="3776" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d11761131e712" title="Salovey, P., &amp; Mayer, J. D. (1990). Emotional intelligence. Imagination, Cognition and Personality, 9(3), 185–211."><span data-dcnode-id="3777" instrument_node="">1990</span></a><span data-dcnode-id="3775" instrument_node="">) earlier EI model. Schutte et al. (</span><a aria-label="Reference 1998" data-dcnode-id="3773" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d11761131e715" title="Schutte, N. S., Malouff, J. M., Hall, L. E., Haggerty, D. J., Cooper, J. T., Golden, C. J., &amp; Dornheim, L. (1998). Development and validation of a measure of emotional intelligence. Personality and Individual Differences, 25(2), 167–177."><span data-dcnode-id="3774" instrument_node="">1998</span></a><span data-dcnode-id="3772" instrument_node="">) identified three factors that represent Salovey and Mayer’s (</span><a aria-label="Reference 1990" data-dcnode-id="3770" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d11761131e718" title="Salovey, P., &amp; Mayer, J. D. (1990). Emotional intelligence. Imagination, Cognition and Personality, 9(3), 185–211."><span data-dcnode-id="3771" instrument_node="">1990</span></a><span data-dcnode-id="3769" instrument_node="">) model, which consisted of 13 items that represent the appraisal and expression of emotion (AEE), 10 items that represent the regulation of emotion (RE), and 10 items representing the utilization of emotion (UE). Examples include the following: “I know when to speak about my personal problems to others,” “By looking at their facial expressions, I recognize the emotions people are experiencing,” and “I find it hard to understand the non-verbal messages of other people.” Schutte et al. (</span><a aria-label="Reference 1998" data-dcnode-id="3767" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d11761131e721" title="Schutte, N. S., Malouff, J. M., Hall, L. E., Haggerty, D. J., Cooper, J. T., Golden, C. J., &amp; Dornheim, L. (1998). Development and validation of a measure of emotional intelligence. Personality and Individual Differences, 25(2), 167–177."><span data-dcnode-id="3768" instrument_node="">1998</span></a><span data-dcnode-id="3766" instrument_node="">) reported that the questionnaire had good reliability based on internal consistency reliability (</span><i data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">α</span></i><span data-dcnode-id="3763" instrument_node=""> = .87) and test-retest reliability (</span><i data-dcnode-id="3761"><span data-dcnode-id="3762" instrument_node="">α</span></i><span data-dcnode-id="3760" instrument_node=""> = .78) scores. The original response scale was a five-point Likert scale (</span><i data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">1</span></i><span data-dcnode-id="3757" instrument_node=""> = </span><i data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">strongly disagree</span></i><span data-dcnode-id="3754" instrument_node=""> to </span><i data-dcnode-id="3752"><span data-dcnode-id="3753" instrument_node="">5</span></i><span data-dcnode-id="3751" instrument_node=""> = </span><i data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">strongly agree</span></i><span data-dcnode-id="3748" instrument_node="">). In the current study, this was converted to a four-point Likert scale to avoid the mid-point effect and social desirability bias (Garland, </span><a aria-label="Reference 1991" data-dcnode-id="3746" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d11761131e744" title="Garland, R. (1991). The mid-point on a rating scale: Is it desirable? Marketing Bulletin, 2(1), 66–70."><span data-dcnode-id="3747" instrument_node="">1991</span></a><span data-dcnode-id="3745" instrument_node="">). In the current study, all items were coded so that a high score indicates a higher level of trait EI.</span></p><p data-dcnode-id="3739"><span data-dcnode-id="3743" instrument_node="">Since the scales we used in the current study were developed and validated in Western contexts, we performed confirmatory factor analysis (CFA) was conducted to ensure that culturally similar constructs are used in all scales, expect for the CD-RISC, which has been validated based on Chinese populations (Yu &amp; Zhang, </span><a aria-label="Reference 2007" data-dcnode-id="3741" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d11761131e750" title="Yu, X., &amp; Zhang, J. (2007). Factor analysis and psychometric evaluation of the Connor-Davidson resilience scale (CD-RISC) with Chinese people. Social Behavior and Personality: An International Journal, 35(1), 19–30. 
                https://doi.org/10.2224/sbp.2007.35.1.19
                
              ."><span data-dcnode-id="3742" instrument_node="">2007</span></a><span data-dcnode-id="3740" instrument_node="">). The detailed discussion of CFA results is presented in the supplementary material.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="3737" id="Sec11"><span data-dcnode-id="3738" instrument_node="">Adversity Quotient</span></h4><p data-dcnode-id="3696"><span data-dcnode-id="3736" instrument_node="">AQ was measured using two questionnaires—the Grit scale (GRIT; Duckworth et al., </span><a aria-label="Reference 2007" data-dcnode-id="3734" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d11761131e761" title="Duckworth, A. L., Peterson, C., Matthews, M. D., &amp; Kelly, D. R. (2007). Grit: Perseverance and passion for long-term goals. Journal of Personality and Social Psychology, 92(6), 1087–1101. 
                https://doi.org/10.1037/0022-3514.92.6.1087
                
              ."><span data-dcnode-id="3735" instrument_node="">2007</span></a><span data-dcnode-id="3733" instrument_node="">) and the Connor-Davidson Resilience scale (CD-RISC; Connor &amp; Davidson, </span><a aria-label="Reference 2003" data-dcnode-id="3731" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d11761131e764" title="Connor, K. M., &amp; Davidson, J. R. T. (2003). Development of a new resilience scale: The Connor-Davidson resilience scale (CD-RISC). Depression and Anxiety, 18(2), 76–82. 
                https://doi.org/10.1002/da.10113
                
              ."><span data-dcnode-id="3732" instrument_node="">2003</span></a><span data-dcnode-id="3730" instrument_node="">). GRIT is a 12-item self-reported measure developed by Duckworth et al. (</span><a aria-label="Reference 2007" data-dcnode-id="3728" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d11761131e767" title="Duckworth, A. L., Peterson, C., Matthews, M. D., &amp; Kelly, D. R. (2007). Grit: Perseverance and passion for long-term goals. Journal of Personality and Social Psychology, 92(6), 1087–1101. 
                https://doi.org/10.1037/0022-3514.92.6.1087
                
              ."><span data-dcnode-id="3729" instrument_node="">2007</span></a><span data-dcnode-id="3727" instrument_node="">). There are two subscales of grit: consistency of interest (CoI, 6 items) and perseverance of effort(PoE, 6 items). Examples for the perseverance of effort subscale include “I have achieved a goal that took years of work” and “I have overcome setbacks to conquer an important challenge.” In the questionnaire, the participants were asked to use a five-point scale (</span><i data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">1</span></i><span data-dcnode-id="3724" instrument_node=""> = </span><i data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">not like me at all</span></i><span data-dcnode-id="3721" instrument_node="">, </span><i data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">2</span></i><span data-dcnode-id="3718" instrument_node=""> = </span><i data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">not much like me</span></i><span data-dcnode-id="3715" instrument_node="">, </span><i data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">3</span></i><span data-dcnode-id="3712" instrument_node=""> = </span><i data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">somewhat like me</span></i><span data-dcnode-id="3709" instrument_node="">, </span><i data-dcnode-id="3707"><span data-dcnode-id="3708" instrument_node="">4</span></i><span data-dcnode-id="3706" instrument_node=""> = </span><i data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">mostly like me</span></i><span data-dcnode-id="3703" instrument_node="">, and </span><i data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">5</span></i><span data-dcnode-id="3700" instrument_node=""> = </span><i data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">very much like me</span></i><span data-dcnode-id="3697" instrument_node="">) to provide their opinio
