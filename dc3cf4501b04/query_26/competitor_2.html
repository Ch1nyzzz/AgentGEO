ns regarding how various statements reflect who they are.</span></p><p data-dcnode-id="3661"><span data-dcnode-id="3695" instrument_node="">CD-RISC is a 25-item self-reported measure of resilience. Connor and Davidson (</span><a aria-label="Reference 2003" data-dcnode-id="3693" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d11761131e805" title="Connor, K. M., &amp; Davidson, J. R. T. (2003). Development of a new resilience scale: The Connor-Davidson resilience scale (CD-RISC). Depression and Anxiety, 18(2), 76–82. 
                https://doi.org/10.1002/da.10113
                
              ."><span data-dcnode-id="3694" instrument_node="">2003</span></a><span data-dcnode-id="3692" instrument_node="">) suggested five factors of resilience: Factor 1 as personal competence, high standards, and tenacity; Factor 2 as trust in one’s instincts, tolerance of negative effects, and the strengthening effects of stress; Factor 3 as positive acceptance, change, and secure relationships; Factor 4 as control; and Factor 5 as spiritual influences. Participants were asked to use a five-point scale (</span><i data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">0</span></i><span data-dcnode-id="3689" instrument_node=""> = </span><i data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">not true at all</span></i><span data-dcnode-id="3686" instrument_node="">, </span><i data-dcnode-id="3684"><span data-dcnode-id="3685" instrument_node="">1</span></i><span data-dcnode-id="3683" instrument_node=""> = </span><i data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">rarely true</span></i><span data-dcnode-id="3680" instrument_node="">, </span><i data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">2</span></i><span data-dcnode-id="3677" instrument_node=""> = </span><i data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">sometimes true</span></i><span data-dcnode-id="3674" instrument_node="">, </span><i data-dcnode-id="3672"><span data-dcnode-id="3673" instrument_node="">3</span></i><span data-dcnode-id="3671" instrument_node=""> = </span><i data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">often true</span></i><span data-dcnode-id="3668" instrument_node="">, and </span><i data-dcnode-id="3666"><span data-dcnode-id="3667" instrument_node="">4</span></i><span data-dcnode-id="3665" instrument_node=""> = </span><i data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">true nearly all of the time</span></i><span data-dcnode-id="3662" instrument_node="">) to indicate how they felt over the past month in response to various statements. Higher scores meant higher levels of resilience in that specific aspect or subscale.</span></p><p data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">In order to assess the construct of AQ using GRIT and CD-RISC scales, we performed factor and bifactor analyses. The supplementary materials include comparisons with different models of structure of AQ.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="3657" id="Sec12"><span data-dcnode-id="3658" instrument_node="">Life Satisfaction</span></h4><p data-dcnode-id="3637"><span data-dcnode-id="3656" instrument_node="">Life satisfaction was measured with the Satisfaction with Life Scale (SWLS), which was developed by Diener, Emmons, Larsen, and Griffin (</span><a aria-label="Reference 1985" data-dcnode-id="3654" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d11761131e850" title="Diener, E., Emmons, R. A., Larsen, R. J., &amp; Griffin, S. (1985). The satisfaction with life scale. Journal of Personality Assessment, 49(1), 71–75. 
                https://doi.org/10.1207/s15327752jpa4901_13
                
              ."><span data-dcnode-id="3655" instrument_node="">1985</span></a><span data-dcnode-id="3653" instrument_node="">). The SWLS is a short five-item general life satisfaction scale wherein participants indicate to what extent they agree with certain statements using a seven-point Likert scale (</span><i data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">1</span></i><span data-dcnode-id="3650" instrument_node=""> = </span><i data-dcnode-id="3648"><span data-dcnode-id="3649" instrument_node="">strongly disagree</span></i><span data-dcnode-id="3647" instrument_node=""> to </span><i data-dcnode-id="3645"><span data-dcnode-id="3646" instrument_node="">7</span></i><span data-dcnode-id="3644" instrument_node=""> = </span><i data-dcnode-id="3642"><span data-dcnode-id="3643" instrument_node="">strongly agree</span></i><span data-dcnode-id="3641" instrument_node="">). A six-point scale was used in the current study, and the mid-point was deleted to avoid the mid-point effect or social desirability bias (Garland, </span><a aria-label="Reference 1991" data-dcnode-id="3639" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d11761131e866" title="Garland, R. (1991). The mid-point on a rating scale: Is it desirable? Marketing Bulletin, 2(1), 66–70."><span data-dcnode-id="3640" instrument_node="">1991</span></a><span data-dcnode-id="3638" instrument_node="">). Example SWLS questions include “In most ways, my life is close to my ideal” and “If I could live my life over, I would change almost nothing.”</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="3635" id="Sec13"><span data-dcnode-id="3636" instrument_node="">Basic Demographic Information</span></h4><p data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">The present study collected basic demographic information including gender, age, city, education level, relationship status, and employment status.</span></p></div></div></section><section data-dcnode-id="3609" data-title="Procedure"><div class="c-article-section" data-dcnode-id="3610" id="Sec14-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3628" id="Sec14"><span data-dcnode-id="3629" instrument_node="">Procedure</span></h2><div class="c-article-section__content" data-dcnode-id="3611" id="Sec14-content"><p data-dcnode-id="3623"><span data-dcnode-id="3627" instrument_node="">The Chinese version of the questionnaire used in the study was developed through a back-translation procedure (Brislin, </span><a aria-label="Reference 1986" data-dcnode-id="3625" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d11761131e887" title="Brislin, R. W. (1986). The wording and translation of research instruments. In W. J. Lonner &amp; J. W. Berry (Eds.), Field methods in cross-cultural research (pp. 137–164). Newbury Park, CA: Sage."><span data-dcnode-id="3626" instrument_node="">1986</span></a><span data-dcnode-id="3624" instrument_node="">). First, the original English version was translated into Chinese by two individuals who were fluent in English. Second, the Chinese version was translated back into English by two different individuals, who were unaware of the original English version. Third, the translated versions were compared, and adjustments were made to ensure that the Chinese version was comparable to the original English version. Fourth, a panel of five researchers reviewed the Chinese and original English versions to finalize the version used in the current study.</span></p><p data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">Participants were recruited electronically via social media. Participants who were willing to participate in the study were provided with an informed consent form and web link for responding to the questionnaires online. Participants were required to sign the informed consent form before completing the surveys. Participation was voluntary, and participants could withdraw from the process at any time. Since the participants were anonymous, no personal information was collected. No financial compensation was provided to participants in the current study. The study was reviewed and approved by the university institutional review board (IRB).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3619" id="Sec15"><span data-dcnode-id="3620" instrument_node="">Data Analysis</span></h3><p data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">Since all measurements were developed and translated to Chinese in the current study, validation for all measurements (e.g., confirmatory factor analysis) were performed. Meanwhile, bi-factor analysis was performed to test the construct structure of AQ. The results for confirmatory factor analysis and bi-factor analysis were available in the supplemental document.</span></p><p data-dcnode-id="3612"><span data-dcnode-id="3616" instrument_node="">For the study’s main data analysis, hierarchical multiple regression analysis was used to determine the differential effects of trait EI and AQ on individuals’ life satisfaction. We controlled age and gender, as these might affect the proposed relations with life satisfaction (Daig, Herschbach, Lehmann, Knoll, &amp; Decker, </span><a aria-label="Reference 2009" data-dcnode-id="3614" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d11761131e903" title="Daig, I., Herschbach, P., Lehmann, A., Knoll, N., &amp; Decker, O. (2009). Gender and age differences in domain-specific life satisfaction and the impact of depressive and anxiety symptoms: A general population survey from Germany. Quality of Life Research, 18(6), 669–678."><span data-dcnode-id="3615" instrument_node="">2009</span></a><span data-dcnode-id="3613" instrument_node="">). The variance inflation factor (VIF) was used to inspect the multicollinearity of the predicting variables. All analyses were performed using SPSS version 23 and SPSS Amos version 26.</span></p></div></div></section><section data-dcnode-id="3540" data-title="Results"><div class="c-article-section" data-dcnode-id="3541" id="Sec16-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3607" id="Sec16"><span data-dcnode-id="3608" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="3542" id="Sec16-content"><p data-dcnode-id="3593"><span data-dcnode-id="3606" instrument_node="">Table </span><a data-dcnode-id="3604" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3605" instrument_node="">1</span></a><span data-dcnode-id="3603" instrument_node=""> presents correlations between the study variables. Regarding the relationship between EI and AQ and life satisfaction, all aspects of EI and AQ showed a significant and positive relationship with life satisfaction, expect the CoI subscale from GRIT in AQ. Regarding the relationship between EI and AQ, the results consistent with the findings from previous studies (i.e., Effendi et al., </span><a aria-label="Reference 2016" data-dcnode-id="3601" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d11761131e918" title="Effendi, M., Matore, E. M., &amp; Khairani, A. Z. (2016). Correlation between adversity quotient (AQ) with IQ, EQ and SQ among polytechnic students using rasch model. Indian Journal of Science and Technology, 9(47), 1–8."><span data-dcnode-id="3602" instrument_node="">2016</span></a><span data-dcnode-id="3600" instrument_node="">; Woo &amp; Song, </span><a aria-label="Reference 2015" data-dcnode-id="3598" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d11761131e921" title="Woo, H. Y., &amp; Song, J. H. (2015). The factors affecting the adversity quotient of nurses and office workers. International Journal of Bio-Science and Bio-Technology, 7(5), 1–10."><span data-dcnode-id="3599" instrument_node="">2015</span></a><span data-dcnode-id="3597" instrument_node="">), where all aspects of EI showed a significant and positive relationship with all aspects of AQ, except the CoI subscale from GRIT in AQ. As indicated from previous studies, CoI tends to have a weaker association with key psychological outcomes in comparison to the other subscales (Datu et al., </span><a aria-label="Reference 2016" data-dcnode-id="3595" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d11761131e924" title="Datu, J. A. D., Valdez, J. P. M., &amp; King, R. B. (2016). Perseverance counts but consistency does not! Validating the short grit scale in a collectivist setting. Current Psychology, 35(1), 121–130."><span data-dcnode-id="3596" instrument_node="">2016</span></a><span data-dcnode-id="3594" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3576" data-test="inline-table" id="table-1"><figure data-dcnode-id="3577"><figcaption class="c-article-table__figcaption" data-dcnode-id="3588"><b data-dcnode-id="3589" data-test="table-caption" id="Tab1"><span data-dcnode-id="3592" instrument_node="">Table 1 </span><i data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">Correlations Between Study Variables and Cronbach’s Alpha</span></i></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3578"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="3579" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12144-021-01398-z/tables/1" rel="nofollow"><span data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3580" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3581" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3582" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3585" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3584" fill-rule="evenodd"></path><span data-dcnode-id="3583" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="3574" id="Sec17"><span data-dcnode-id="3575" instrument_node="">EI, AQ, and Life Satisfaction</span></h3><p data-dcnode-id="3558"><span data-dcnode-id="3573" instrument_node="">The three trait EI factors (i.e., appraisal and expression of emotion, regulation of emotion, and utilization of emotion) and five AQ factors (i.e., consistency of interest, perseverance of effort, tenacity, strength, and optimism) were used in hierarchical regression analysis to predict life satisfaction. The results of the VIF analysis indicated no multicollinearity among the independent variables. After controlling the significant effects for covariates of age and gender, trait EI and AQ variables together showed a substantial predictive power, with 16% increase in </span><i data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">R</span></i><sup data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">2</span></sup><span data-dcnode-id="3568" instrument_node="">, </span><i data-dcnode-id="3566"><span data-dcnode-id="3567" instrument_node="">∆F</span></i><span data-dcnode-id="3565" instrument_node=""> (8, 245) = 11.43, </span><i data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node="">p</span></i><span data-dcnode-id="3562" instrument_node=""> &lt; .001. As shown in Table </span><a data-dcnode-id="3560" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="3561" instrument_node="">2</span></a><span data-dcnode-id="3559" instrument_node="">, after statistically controlling age and gender in the analysis, regulation of emotion, tenacity, and optimism had significant and positive regression weights, indicating that individuals with higher scores on these three scales were likely to have higher life satisfaction levels.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3543" data-test="inline-table" id="table-2"><figure data-dcnode-id="3544"><figcaption class="c-article-table__figcaption" data-dcnode-id="3555"><b data-dcnode-id="3556" data-test="table-caption" id="Tab2"><span data-dcnode-id="3557" instrument_node="">Table 2 Hierarchical Regression Analysis for Predicting General Life Satisfaction (N = 259)</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3545"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="3546" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12144-021-01398-z/tables/2" rel="nofollow"><span data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3547" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3548" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3549" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3552" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3551" fill-rule="evenodd"></path><span data-dcnode-id="3550" instrument_node="">
</span></a></div></figure></div></div></div></section><section data-dcnode-id="3451" data-title="Discussion"><div class="c-article-section" data-dcnode-id="3452" id="Sec18-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3538" id="Sec18"><span data-dcnode-id="3539" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="3453" id="Sec18-content"><p data-dcnode-id="3515"><span data-dcnode-id="3537" instrument_node="">The present study examined the differential effects of specific components of trait EI and AQ on individuals’ general life satisfaction. Specifically, only one aspect of self-reported trait EI, regulation of emotion, was found to significantly predict general life satisfaction. Most previous research viewed trait EI as a single construct and found positive relationship between trait EI and life satisfaction (e.g., Afolabi &amp; Balogun, </span><a aria-label="Reference 2017" data-dcnode-id="3535" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d11761131e2078" title="Afolabi, O. A., &amp; Balogun, A. G. (2017). Impacts of psychological security, emotional intelligence and self-efficacy on undergraduates’ life satisfaction. Psychological Thought, 10(2), 247–261. 
                https://doi.org/10.5964/psyct.v10i2.226
                
              ."><span data-dcnode-id="3536" instrument_node="">2017</span></a><span data-dcnode-id="3534" instrument_node="">; Hafiz &amp; Chouhan, </span><a aria-label="Reference 2015" data-dcnode-id="3532" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d11761131e2081" title="Hafiz, S., &amp; Chouhan, M. (2015). Impact of emotional intelligence on life satisfaction of university employees. Indian Journal of Positive Psychology, 6(3), 315–317."><span data-dcnode-id="3533" instrument_node="">2015</span></a><span data-dcnode-id="3531" instrument_node="">; Mehta &amp; Mehta, </span><a aria-label="Reference 2015" data-dcnode-id="3529" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d11761131e2084" title="Mehta, P., &amp; Mehta, B. (2015). Emotional intelligence in relation to satisfaction with life: A study of govt. secondary school teachers. Indian Journal of Positive Psychology, 6(1), 98–102."><span data-dcnode-id="3530" instrument_node="">2015</span></a><span data-dcnode-id="3528" instrument_node="">). Afolabi and Balogun (</span><a aria-label="Reference 2017" data-dcnode-id="3526" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d11761131e2087" title="Afolabi, O. A., &amp; Balogun, A. G. (2017). Impacts of psychological security, emotional intelligence and self-efficacy on undergraduates’ life satisfaction. Psychological Thought, 10(2), 247–261. 
                https://doi.org/10.5964/psyct.v10i2.226
                
              ."><span data-dcnode-id="3527" instrument_node="">2017</span></a><span data-dcnode-id="3525" instrument_node="">) suggested that individuals with higher trait EI are more likely to experience higher happiness and life satisfaction levels because they find it easier to manage and control their negative emotions and emotion-related issues. In the current study, only regulation of emotion was found to be positively related to general life satisfaction, providing empirical evidence for Afolabi and Balogun’s (</span><a aria-label="Reference 2017" data-dcnode-id="3523" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d11761131e2090" title="Afolabi, O. A., &amp; Balogun, A. G. (2017). Impacts of psychological security, emotional intelligence and self-efficacy on undergraduates’ life satisfaction. Psychological Thought, 10(2), 247–261. 
                https://doi.org/10.5964/psyct.v10i2.226
                
              ."><span data-dcnode-id="3524" instrument_node="">2017</span></a><span data-dcnode-id="3522" instrument_node="">) claim. As indicated by Salovey and Mayer (</span><a aria-label="Reference 1990" data-dcnode-id="3520" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d11761131e2094" title="Salovey, P., &amp; Mayer, J. D. (1990). Emotional intelligence. Imagination, Cognition and Personality, 9(3), 185–211."><span data-dcnode-id="3521" instrument_node="">1990</span></a><span data-dcnode-id="3519" instrument_node="">), regulation of emotion involves regulating the emotion in both oneself and others. The willingness and ability to regulate emotions “may lead to more adaptive and reinforcing mood states” (p. 198), and individuals with higher EI are usually “especially adept at this process and do so to meet particular goals” (p. 198). Thus, people will regulate emotions in themselves and others to meet their personal goals, and the accomplishment of such goals will enhance their positive psychological emotions and preempts negative emotions (Brackett, Palomera, Mojsa-Kaja, Reyes, &amp; Salovey, </span><a aria-label="Reference 2010" data-dcnode-id="3517" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d11761131e2097" title="Brackett, M. A., Palomera, R., Mojsa-Kaja, J., Reyes, M. R., &amp; Salovey, P. (2010). Emotion-regulation ability, burnout, and job satisfaction among British secondary-school teachers. Psychology in the Schools, 47(4), 406–417."><span data-dcnode-id="3518" instrument_node="">2010</span></a><span data-dcnode-id="3516" instrument_node="">), which may ultimately leading to higher life satisfaction. Therefore, the results from the current study further support the importance of regulation of emotion in relation to life satisfaction. When considering improvement in general life satisfaction, it might be important and helpful for practitioners to cultivate individuals’ willingness and tendency to regulate their emotions.</span></p><p data-dcnode-id="3495"><span data-dcnode-id="3514" instrument_node="">One reason for nonsignificant relationships between the other two aspects of trait EI (i.e., appraisal and expression of emotion, and utilization of emotion) might due to the specific culture, values, and norms in China. Emotions have traditionally been viewed as an irrational factor that needs to be controlled, such perspective shifted during the late twentieth century in Western culture (Bower, </span><a aria-label="Reference 1981" data-dcnode-id="3512" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d11761131e2103" title="Bower, G. H. (1981). Mood and memory. American Psychologist, 36(2), 129–148."><span data-dcnode-id="3513" instrument_node="">1981</span></a><span data-dcnode-id="3511" instrument_node="">; De Sousa, </span><a aria-label="Reference 1987" data-dcnode-id="3509" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d11761131e2106" title="De Sousa, R. (1987). The rationality of emotion. Cambridge, Mass: MIT Press."><span data-dcnode-id="3510" instrument_node="">1987</span></a><span data-dcnode-id="3508" instrument_node="">; Lazarus &amp; Lazarus, </span><a aria-label="Reference 1991" data-dcnode-id="3506" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d11761131e2109" title="Lazarus, R., &amp; S., &amp; Lazarus, R, S. (1991). Emotion and adaptation. New York: Oxford University Press."><span data-dcnode-id="3507" instrument_node="">1991</span></a><span data-dcnode-id="3505" instrument_node="">; Solomon, </span><a aria-label="Reference 1993" data-dcnode-id="3503" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d11761131e2112" title="Solomon, R. C. (1993). The passions: Emotions and the meaning of life. Hackett Publishing."><span data-dcnode-id="3504" instrument_node="">1993</span></a><span data-dcnode-id="3502" instrument_node="">), while remaining the same in China (Eid &amp; Diener, </span><a aria-label="Reference 2001" data-dcnode-id="3500" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d11761131e2115" title="Eid, M., &amp; Diener, E. (2001). Norms for experiencing emotions in different cultures: Inter- and intranational differences. Journal of Personality and Social Psychology, 81(5), 869–885. 
                https://doi.org/10.1037/0022-3514.81.5.869
                
              ."><span data-dcnode-id="3501" instrument_node="">2001</span></a><span data-dcnode-id="3499" instrument_node="">). Moreover, when considering emotion display rules in different cultures, researchers found that Chinese displayed more deep acting emotions (i.e., changing how one really feels in order to express the social desired emotion) and less surface acting emotions (i.e., modifying the outward expression of the emotion) than Americans (Allen, Diefendorff, &amp; Ma, </span><a aria-label="Reference 2014" data-dcnode-id="3497" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d11761131e2119" title="Allen, J. A., Diefendorff, J. M., &amp; Ma, Y. (2014). Differences in emotional labor across cultures: A comparison of Chinese and US service workers. Journal of Business and Psychology, 29(1), 21–35."><span data-dcnode-id="3498" instrument_node="">2014</span></a><span data-dcnode-id="3496" instrument_node="">). When there are conflicts between individual authentic emotions and socially desirable emotions, Chinese culture encourages people not to express their authentic emotions in public settings. As influenced by such cultural norms, instead of expressing and utilizing their emotions, most Chinese choose to suppress their authentic feelings and emotions in public settings in order to fulfil socially desirable emotions. Thus, appraisal and expression of emotion and utilization of emotion were not appliable to Chinese, which might cause the non-significantly relationship with life satisfaction.</span></p><p data-dcnode-id="3478"><span data-dcnode-id="3494" instrument_node="">Two aspects of AQ (i.e., tenacity and optimism) were found to significantly predict general life satisfaction. In the current study, AQ was used as a broad construct that incorporates grit and resilience. The results indicate that the grit component of AQ (i.e., consistency of interest and perseverance of effort) was not significantly affect individuals’ general life satisfaction. Previous studies have had inconsistent findings regarding this relationship. For example, Palczyńska and Świst (</span><a aria-label="Reference 2018" data-dcnode-id="3492" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d11761131e2125" title="Palczyńska, M., &amp; Świst, K. (2018). Personality, cognitive skills and life outcomes: Evidence from the polish follow-up study to PIAAC. Large-scale Assessments in Education, 6(1), 2. 
                https://doi.org/10.1186/s40536-018-0056-z
                
              ."><span data-dcnode-id="3493" instrument_node="">2018</span></a><span data-dcnode-id="3491" instrument_node="">) found that grit was positively related to life satisfaction. However, in a sample of 455 Korean adults, Jin and Kim (</span><a aria-label="Reference 2017" data-dcnode-id="3489" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d11761131e2128" title="Jin, B., &amp; Kim, J. (2017). Grit, basic needs satisfaction, and subjective well-being. Journal of Individual Differences, 38(1), 29–35. 
                https://doi.org/10.1027/1614-0001/a000219
                
              ."><span data-dcnode-id="3490" instrument_node="">2017</span></a><span data-dcnode-id="3488" instrument_node="">) found that even though there was a significant and positive correlation between grit and life satisfaction, grit did not directly increase individuals’ life satisfaction. Jin and Kim (</span><a aria-label="Reference 2017" data-dcnode-id="3486" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d11761131e2131" title="Jin, B., &amp; Kim, J. (2017). Grit, basic needs satisfaction, and subjective well-being. Journal of Individual Differences, 38(1), 29–35. 
                https://doi.org/10.1027/1614-0001/a000219
                
              ."><span data-dcnode-id="3487" instrument_node="">2017</span></a><span data-dcnode-id="3485" instrument_node="">) explained this nonsignificant relationship by the effect of mediators (e.g., competence). In the current study, one explanation for the nonsignificant relationship might lie in the differences between individualistic and collectivist cultures. As noted by previous researchers, “the conceptualization of grit is not valid in a collectivist culture where CoI is not highly valued” (Datu et al., </span><a aria-label="Reference 2016" data-dcnode-id="3483" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d11761131e2134" title="Datu, J. A. D., Valdez, J. P. M., &amp; King, R. B. (2016). Perseverance counts but consistency does not! Validating the short grit scale in a collectivist setting. Current Psychology, 35(1), 121–130."><span data-dcnode-id="3484" instrument_node="">2016</span></a><span data-dcnode-id="3482" instrument_node="">, p. 129); individuals in collectivist cultures tend to act in the best interests of their families or societies, rather than their own. It is possible that the GRIT measurement reflects an individual’s willingness to devote effort toward personal long-term goals (Disabato et al., </span><a aria-label="Reference 2019" data-dcnode-id="3480" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d11761131e2137" title="Disabato, D. J., Goodman, F. R., &amp; Kashdan, T. B. (2019). Is grit relevant to well-being and strengths? Evidence across the globe for separating perseverance of effort and consistency of interests. Journal of Personality, 87(2), 194–211."><span data-dcnode-id="3481" instrument_node="">2019</span></a><span data-dcnode-id="3479" instrument_node="">), rather than goals that serve the greater good. Therefore, additional research is needed to further explore the nature and implications of GRIT in Chinese culture, as well as the potential mediating or moderating factors between grit and life satisfaction.</span></p><p data-dcnode-id="3458"><span data-dcnode-id="3477" instrument_node="">Regarding the resilience aspect of AQ, most previous studies viewed resilience as a single construct in relation to life satisfaction (Beutel et al., </span><a aria-label="Reference 2010" data-dcnode-id="3475" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d11761131e2143" title="Beutel, M. E., Glaesmer, H., Wiltink, J., Marian, H., &amp; Brähler, E. (2010). Life satisfaction, anxiety, depression and resilience across the life span of men. The Aging Male, 13(1), 32–39. 
                https://doi.org/10.3109/13685530903296698
                
              ."><span data-dcnode-id="3476" instrument_node="">2010</span></a><span data-dcnode-id="3474" instrument_node="">; McGinnis, </span><a aria-label="Reference 2018" data-dcnode-id="3472" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d11761131e2146" title="McGinnis, D. (2018). Resilience, life events, and well-being during midlife: Examining resilience subgroups. Journal of Adult Development, 25(3), 198–221. 
                https://doi.org/10.1007/s10804-018-9288-y
                
              ."><span data-dcnode-id="3473" instrument_node="">2018</span></a><span data-dcnode-id="3471" instrument_node="">; Temiz, &amp; Comert, 2018), rather than examining the specific type of resilience. The present study’s results indicate that both tenacity and optimism positively predict life satisfaction, but not strength. Tenacity refers to an “individual’s equanimity, promptness, perseverance, and sense of control when facing situations of hardship and challenge,” and optimism refers to “the individual’s tendency of looking on the positive side of things and trusting one’s personal and social resources” (Yu &amp; Zhang, </span><a aria-label="Reference 2007" data-dcnode-id="3469" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d11761131e2149" title="Yu, X., &amp; Zhang, J. (2007). Factor analysis and psychometric evaluation of the Connor-Davidson resilience scale (CD-RISC) with Chinese people. Social Behavior and Personality: An International Journal, 35(1), 19–30. 
                https://doi.org/10.2224/sbp.2007.35.1.19
                
              ."><span data-dcnode-id="3470" instrument_node="">2007</span></a><span data-dcnode-id="3468" instrument_node="">, p. 24). Individuals with high tenacity and optimism may view hardships, obstacles, and misfortunes differently than those with low optimism. When facing difficulties, tenacious and optimistic individuals often hold positive attitudes and affect about self and life, supported by positive personal and social resources (i.e., friends and families), which in turn may help them overcome adverse events and ultimately improve their general life satisfaction (Hamama, Ronen, Shachar, &amp; Rosenbaum, </span><a aria-label="Reference 2013" data-dcnode-id="3466" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d11761131e2152" title="Hamama, L., Ronen, T., Shachar, K., &amp; Rosenbaum, M. (2013). Links between stress, positive and negative affect, and life satisfaction among teachers in special education schools. Journal of Happiness Studies, 14(3), 731–751."><span data-dcnode-id="3467" instrument_node="">2013</span></a><span data-dcnode-id="3465" instrument_node="">; Young, Miller, Norton, &amp; Hill, </span><a aria-label="Reference 1995" data-dcnode-id="3463" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR94" id="ref-link-section-d11761131e2155" title="Young, M. H., Miller, B. C., Norton, M. C., &amp; Hill, E. J. (1995). The effect of parental supportive behaviors on life satisfaction of adolescent offspring. Journal of Marriage and the Family, 57, 813–822."><span data-dcnode-id="3464" instrument_node="">1995</span></a><span data-dcnode-id="3462" instrument_node="">). Unlike tenacity and optimism, which are more likely personality traits, strength is more like a skill or ability that can be learned through experiencing hardships and setbacks. Considering the collectivistic culture in China, individuals received much social support within their in-groups (families, friends, peers, etc.) (Triandis, Botempo, &amp; Asai, </span><a aria-label="Reference 1988" data-dcnode-id="3460" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d11761131e2159" title="Triandis, H. C., Botempo, R., Villareal, M. J., Asai, M., &amp; Lucca, N. (1988). Individualism and collectivism: Cross-cultural perspectives on self-ingroup relationships. Journal of Personality and Social Psychology, 54, 323–338."><span data-dcnode-id="3461" instrument_node="">1988</span></a><span data-dcnode-id="3459" instrument_node="">). When individuals are able to get sufficient help (i.e., psychological, emotional, and material assistance) from their friends and families when facing obstacles, they are less likely to learn or obtain the skills required to solve difficulties on their own. This might explain why, in the current study, strength was not a significant predictor of life satisfaction.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3456" id="Sec19"><span data-dcnode-id="3457" instrument_node="">Implications</span></h3><p data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">This study thoroughly explored how specific trait EI and AQ factors relate to general life satisfaction. In other words, rather than analyzing trait EI and AQ as single constructs, this study focused on the predictive power of each trait EI and AQ sub-constructs and clarified the underlying relationships between trait EI, AQ, and life satisfaction. By examining these specific components of trait EI and AQ, our results hold implications for practitioners in particular. By clarifying the most prominent aspects of trait EI and AQ that contribute to individuals’ life satisfaction, our results provide valuable guidance for the development of interventions to improve life satisfaction. Further, most studies in this area has focused on Western cultures. The results from this study enrich the literature by providing additional empirical evidence regarding the relationship between trait EI, AQ, and life satisfaction, with a focus on Eastern culture. More specifically, individuals’ interests towards family and society are more emphasized in relation with individuals’ life satisfaction in Eastern culture than individuals in Western cultural. Future practitioners need to keep this in mind when place interventions to individuals who are from Eastern cultures.</span></p></div></div></section><section data-dcnode-id="3442" data-title="Limitations"><div class="c-article-section" data-dcnode-id="3443" id="Sec20-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3449" id="Sec20"><span data-dcnode-id="3450" instrument_node="">Limitations</span></h2><div class="c-article-section__content" data-dcnode-id="3444" id="Sec20-content"><p data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">The current study has several limitations. First, AQ is used as a broad construct in the current study. We used Stoltz’s conceptual framework of AQ and incorporated resilience and perseverance as specific components of AQ – these components are not loaded on one general factor of AQ. The accurate measurement of AQ, rather than using existing scales as proxy measures, remains an issue to be addressed, although scales used in the current study are conceptually compatible with the construct of AQ. Second, the model fit (i.e., TLI and CFI) and average variance extracted (AVE) for EQ scale (i.e., SREIT) were below the threshold for good model fit (i.e., below .95 and .50, see supplemental material). The low model fit and AVE might be due to the differences between Western and Eastern cultures. The SREIT were developed and validated in Western countries, and its concepts might be incompatible with Chinese culture. Future studies may need to further examine this construct in Chinese cultural context. Third, the data collected in the current study were all from the same source (self-reported questionnaires). Future studies should use different sources, such as interviews and observations.</span></p><p data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">Despite these limitations, the current study sheds some light on the relationships between emotional regulation, tenacity, optimism, and general life satisfaction among individuals. It also stimulates further studies related to AQ.</span></p></div></div></section><span data-dcnode-id="3441" instrument_node="">
