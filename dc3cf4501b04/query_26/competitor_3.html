ved.</span></p><p data-dcnode-id="3956"><span data-dcnode-id="3959" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3958"><span data-dcnode-id="3957" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3916"><span data-dcnode-id="3955" instrument_node="">Dear Participant</span><br data-dcnode-id="3954"><span data-dcnode-id="3953" instrument_node="">Welcome to PBS The Business Channels presentation of Adversity Quotient:</span><br data-dcnode-id="3952"><span data-dcnode-id="3951" instrument_node="">Turning Obstacles into Opportunities.</span><br data-dcnode-id="3950"><span data-dcnode-id="3949" instrument_node="">Featuring Paul G. Stoltz, Ph.D., a leading authority, author, and business</span><br data-dcnode-id="3948"><span data-dcnode-id="3947" instrument_node="">consultant on Adversity Quotient (AQ), this seminar will show you how an</span><br data-dcnode-id="3946"><span data-dcnode-id="3945" instrument_node="">individuals AQ is a more significant factor in achieving success than IQ, education,</span><br data-dcnode-id="3944"><span data-dcnode-id="3943" instrument_node="">or even social skills. In fact, the AQ measurement of a person or an organization</span><br data-dcnode-id="3942"><span data-dcnode-id="3941" instrument_node="">indicates the ability to prevail and succeed in the face of adversity.</span><br data-dcnode-id="3940"><span data-dcnode-id="3939" instrument_node="">As president of PEAK Learning, Inc., Paul Stoltz is in great demand as a</span><br data-dcnode-id="3938"><span data-dcnode-id="3937" instrument_node="">keynote speaker and consultant on such topics as leadership, performance, successful</span><br data-dcnode-id="3936"><span data-dcnode-id="3935" instrument_node="">selling, and overcoming adversity. He conducts AQ seminars and workshops for thousands of people each year, and his many corporate clients include Deloitte &amp; Touche,</span><br data-dcnode-id="3934"><span data-dcnode-id="3933" instrument_node="">Motorola, Abbott Labs, and US West.</span><br data-dcnode-id="3932"><span data-dcnode-id="3931" instrument_node="">In the next two hours, Paul Stoltz will explain the underlying principles of</span><br data-dcnode-id="3930"><span data-dcnode-id="3929" instrument_node="">Adversity Quotient. Youll learn how to interpret your AQ score, how to assess the</span><br data-dcnode-id="3928"><span data-dcnode-id="3927" instrument_node="">AQ score of your organization, and how to nurture a high AQ for yourself and your</span><br data-dcnode-id="3926"><span data-dcnode-id="3925" instrument_node="">staff or colleagues.</span><br data-dcnode-id="3924"><span data-dcnode-id="3923" instrument_node="">While viewing the presentation, follow along and take notes in this</span><br data-dcnode-id="3922"><span data-dcnode-id="3921" instrument_node="">discussion guide. Most of all, be prepared to be enlightened by Paul Stoltzs clear</span><br data-dcnode-id="3920"><span data-dcnode-id="3919" instrument_node="">explanation of how you can improve your Adversity Quotient and achieve success.</span><br data-dcnode-id="3918"><span data-dcnode-id="3917" instrument_node="">You will be eager to begin implementing his strategies!</span></p><p data-dcnode-id="3912"><span data-dcnode-id="3915" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3914"><span data-dcnode-id="3913" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3902"><span data-dcnode-id="3911" instrument_node="">Program outline</span><br data-dcnode-id="3910"><span data-dcnode-id="3909" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3908"><span data-dcnode-id="3907" instrument_node="">Turning Obstacles into Opportunities</span><br data-dcnode-id="3906"><span data-dcnode-id="3905" instrument_node="">Welcome by our moderator, Megan Beyer</span><br data-dcnode-id="3904"><span data-dcnode-id="3903" instrument_node="">Part 1</span></p><p data-dcnode-id="3901"></p><h2 data-dcnode-id="3899"><span data-dcnode-id="3900" instrument_node="">Introduction to Adversity Quotient</span></h2><p data-dcnode-id="3898"></p><p data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">Part 2</span></p><p data-dcnode-id="3895"></p><h2 data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">Ascend Mt. Success</span></h2><p data-dcnode-id="3892"></p><p data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">Activity Break</span></p><p data-dcnode-id="3889"></p><h2 data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">Scaling Organizational Mountains</span></h2><p data-dcnode-id="3886"></p><p data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">Activity Break</span></p><p data-dcnode-id="3883"></p><h2 data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">The Adversity Response ProfileTM</span></h2><p data-dcnode-id="3880"></p><p data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">Part 3</span></p><p data-dcnode-id="3877"></p><h2 data-dcnode-id="3875"><span data-dcnode-id="3876" instrument_node="">AQs Scientific Building Blocks</span></h2><p data-dcnode-id="3874"></p><p data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">Part 4</span></p><p data-dcnode-id="3871"></p><h2 data-dcnode-id="3869"><span data-dcnode-id="3870" instrument_node="">AQ and Learned Helplessness</span></h2><p data-dcnode-id="3868"></p><p data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">Part 5</span></p><p data-dcnode-id="3865"></p><h2 data-dcnode-id="3863"><span data-dcnode-id="3864" instrument_node="">Four Key Facts About Facing Adversity</span></h2><p data-dcnode-id="3862"></p><p data-dcnode-id="3860"><span data-dcnode-id="3861" instrument_node="">Part 6</span></p><p data-dcnode-id="3858"><span data-dcnode-id="3859" instrument_node="">AQ Definition</span></p><p data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">Part 7</span></p><p data-dcnode-id="3850"><span data-dcnode-id="3855" instrument_node="">The AQ Continuum</span><br data-dcnode-id="3854"><span data-dcnode-id="3853" instrument_node="">Question and answer session (15 min.)</span><br data-dcnode-id="3852"><span data-dcnode-id="3851" instrument_node="">Intermission (10 min.)</span></p><p data-dcnode-id="3848"><span data-dcnode-id="3849" instrument_node="">Part 8</span></p><p data-dcnode-id="3846"><span data-dcnode-id="3847" instrument_node="">AQ in the Workplace</span></p><p data-dcnode-id="3844"><span data-dcnode-id="3845" instrument_node="">Part 9</span></p><p data-dcnode-id="3843"></p><h2 data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">Five Warning Signals</span></h2><p data-dcnode-id="3840"></p><p data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">Activity Break</span></p><p data-dcnode-id="3836"><span data-dcnode-id="3837" instrument_node="">Ways to Sabotage AQ</span></p><p data-dcnode-id="3834"><span data-dcnode-id="3835" instrument_node="">Part 10</span></p><p data-dcnode-id="3833"></p><h2 data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">Twelve Ways to Nurture AQ</span></h2><br data-dcnode-id="3830"><span data-dcnode-id="3829" instrument_node="">Question and answer session (15 min.)</span><p data-dcnode-id="3828"></p><p data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">Part 11</span></p><p data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">Wrap Up</span></p><p data-dcnode-id="3820"><span data-dcnode-id="3823" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3822"><span data-dcnode-id="3821" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3819"></p><h2 data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">What you will learn</span></h2><br data-dcnode-id="3816"><span data-dcnode-id="3815" instrument_node="">By participating in this seminar with Paul Stoltz you will be able to:</span><p data-dcnode-id="3814"></p><p data-dcnode-id="3813"></p><h2 data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">define Adversity Quotient</span></h2><p data-dcnode-id="3810"></p><p data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">in general terms, describe the scientific research that supports the AQ theory</span></p><p data-dcnode-id="3807"></p><h2 data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">determine and interpret your personal AQ by completing the Adversity</span></h2><br data-dcnode-id="3804"><span data-dcnode-id="3803" instrument_node="">Response ProfileTM</span><p data-dcnode-id="3802"></p><p data-dcnode-id="3801"></p><h2 data-dcnode-id="3799"><span data-dcnode-id="3800" instrument_node="">list a minimum of four warning signs that indicate an organization has a</span></h2><br data-dcnode-id="3798"><span data-dcnode-id="3797" instrument_node="">low or moderate AQ culture</span><p data-dcnode-id="3796"></p><p data-dcnode-id="3795"></p><h2 data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">list a minimum of three techniques by which an organization sabotages or</span></h2><br data-dcnode-id="3792"><span data-dcnode-id="3791" instrument_node="">undermines its AQ culture</span><p data-dcnode-id="3790"></p><p data-dcnode-id="3789"></p><h2 data-dcnode-id="3787"><span data-dcnode-id="3788" instrument_node="">assess your organizations AQ</span></h2><p data-dcnode-id="3786"></p><p data-dcnode-id="3785"></p><h2 data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">list a minimum of twelve strategies for nurturing a high AQ culture within</span></h2><br data-dcnode-id="3782"><span data-dcnode-id="3781" instrument_node="">an organization</span><p data-dcnode-id="3780"></p><p data-dcnode-id="3776"><span data-dcnode-id="3779" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3778"><span data-dcnode-id="3777" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3775"></p><h2 data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">How to get the most from this seminar</span></h2><br data-dcnode-id="3772"><span data-dcnode-id="3771" instrument_node="">During the seminar</span><br data-dcnode-id="3770"><span data-dcnode-id="3769" instrument_node=""> Participate! Contribute to the discussion using the question sheet</span><br data-dcnode-id="3768"><span data-dcnode-id="3767" instrument_node="">provided with this guide.</span><br data-dcnode-id="3766"><span data-dcnode-id="3765" instrument_node="">If you are participating in the live presentation of this program,</span><br data-dcnode-id="3764"><span data-dcnode-id="3763" instrument_node="">fax or call in your question to Paul Stoltz.</span><br data-dcnode-id="3762"><span data-dcnode-id="3761" instrument_node="">If you are taking part in an encore presentation of this program, share</span><br data-dcnode-id="3760"><span data-dcnode-id="3759" instrument_node="">your question with the site coordinator and your colleagues.</span><p data-dcnode-id="3758"></p><p data-dcnode-id="3754"><span data-dcnode-id="3757" instrument_node=""> Take notes, complete the written exercises, and jot down ideas on</span><br data-dcnode-id="3756"><span data-dcnode-id="3755" instrument_node="">how you can apply todays information in your own workplace.</span></p><p data-dcnode-id="3753"></p><h2 data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">After the seminar</span></h2><br data-dcnode-id="3750"><span data-dcnode-id="3749" instrument_node=""> Read Paul Stoltzs book, Adversity Quotient: Turning Obstacles into</span><br data-dcnode-id="3748"><span data-dcnode-id="3747" instrument_node="">Opportunities (John Wiley &amp; Sons, Inc.).</span><p data-dcnode-id="3746"></p><p data-dcnode-id="3745"></p><h2 data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node=""> Reread this discussion guide and review your notes.</sp ation</span><br data-dcnode-id="3624"><span data-dcnode-id="3623" instrument_node="">out-dated materials</span><br data-dcnode-id="3622"><span data-dcnode-id="3621" instrument_node="">boring presentation</span><br data-dcnode-id="3620"><span data-dcnode-id="3619" instrument_node="">presenter hard to follow</span><br data-dcnode-id="3618"><span data-dcnode-id="3617" instrument_node="">information not usable</span><br data-dcnode-id="3616"><span data-dcnode-id="3615" instrument_node="">inadequate participant materials</span><br data-dcnode-id="3614"><span data-dcnode-id="3613" instrument_node="">poor audio/visual quality</span><br data-dcnode-id="3612"><span data-dcnode-id="3611" instrument_node="">useless Q&amp;A time</span><br data-dcnode-id="3610"><span data-dcnode-id="3609" instrument_node="">other: ____________________________________________</span><p data-dcnode-id="3608"></p><p data-dcnode-id="3607"></p><h2 data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">5. What one thing will you try to do as a result of taking part in</span></h2><br data-dcnode-id="3604"><span data-dcnode-id="3603" instrument_node="">this program?</span><br data-dcnode-id="3602"><span data-dcnode-id="3601" instrument_node="">Return this form to your</span><br data-dcnode-id="3600"><span data-dcnode-id="3599" instrument_node="">site coordinator or send to:</span><br data-dcnode-id="3598"><span data-dcnode-id="3597" instrument_node="">PBS The Business Channel</span><br data-dcnode-id="3596"><span data-dcnode-id="3595" instrument_node="">Attn: Cutting-edge Seminars</span><br data-dcnode-id="3594"><span data-dcnode-id="3593" instrument_node="">1320 Braddock Place</span><br data-dcnode-id="3592"><span data-dcnode-id="3591" instrument_node="">Alexandria, VA 22314-1698</span><br data-dcnode-id="3590"><span data-dcnode-id="3589" instrument_node="">Fax: 703-739-3854</span><p data-dcnode-id="3588"></p><p data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">Please feel free to add additional comments on the back of this sheet.</span></p><p data-dcnode-id="3582"><span data-dcnode-id="3585" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3584"><span data-dcnode-id="3583" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3576"><span data-dcnode-id="3581" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3580"><span data-dcnode-id="3579" instrument_node="">Turning Obstacles into Opportunities</span><br data-dcnode-id="3578"><span data-dcnode-id="3577" instrument_node="">Featuring Paul</span></p><p data-dcnode-id="3574"><span data-dcnode-id="3575" instrument_node="">G. Stoltz</span></p><p data-dcnode-id="3570"><span data-dcnode-id="3573" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3572"><span data-dcnode-id="3571" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">Part 1</span></p><p data-dcnode-id="3567"></p><h2 data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">Introduction to Adversity Quotient</span></h2><p data-dcnode-id="3564"></p><p data-dcnode-id="3563"></p><h2 data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">Most of us are familiar with IQ (Intelligence Quotient). Some of us may have</span></h2><br data-dcnode-id="3560"><span data-dcnode-id="3559" instrument_node="">heard the term EQ (Emotional Quotient). In Paul Stoltzs book he introduces a new</span><br data-dcnode-id="3558"><span data-dcnode-id="3557" instrument_node="">term, AQ (Adversity Quotient).</span><br data-dcnode-id="3556"><span data-dcnode-id="3555" instrument_node="">Directions</span><br data-dcnode-id="3554"><span data-dcnode-id="3553" instrument_node="">As you listen to Paul Stoltz define AQ and compare it to IQ and EQ, jot down several</span><br data-dcnode-id="3552"><span data-dcnode-id="3551" instrument_node="">words or short phrases to help you recall each terms distinction:</span><p data-dcnode-id="3550"></p><p data-dcnode-id="3549"></p><h2 data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">Adversity Quotient (AQ) is:</span></h2><p data-dcnode-id="3546"></p><p data-dcnode-id="3545"></p><h2 data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">Intelligence Quotient (IQ) is:</span></h2><p data-dcnode-id="3542"></p><p data-dcnode-id="3541"></p><h2 data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">Emotional Quotient (EQ) is:</span></h2><p data-dcnode-id="3538"></p><p data-dcnode-id="3537"></p><h2 data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">AQ is an important indicator of ones success potential because:</span></h2><p data-dcnode-id="3534"></p><p data-dcnode-id="3533"></p><h2 data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">AQs potential effect on an organization is significant because:</span></h2><p data-dcnode-id="3530"></p><p data-dcnode-id="3526"><span data-dcnode-id="3529" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3528"><span data-dcnode-id="3527" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3516"><span data-dcnode-id="3525" instrument_node="">Directions</span><br data-dcnode-id="3524"><span data-dcnode-id="3523" instrument_node="">Paul Stoltz introduces Beck Weathers, the climber who met the challenge of Mount</span><br data-dcnode-id="3522"><span data-dcnode-id="3521" instrument_node="">Everest. Beck Weathers exhibits the traits of someone with a high AQ. He persevered</span><br data-dcnode-id="3520"><span data-dcnode-id="3519" instrument_node="">when obstacles threatened his life. On the lines below, list characteristics you would</span><br data-dcnode-id="3518"><span data-dcnode-id="3517" instrument_node="">associate with someone like Beck Weathers.</span></p><p data-dcnode-id="3515"></p><h2 data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">There are numerous adjectives to describe a person who possesses a high</span></h2><br data-dcnode-id="3512"><span data-dcnode-id="3511" instrument_node="">Adversity Quotient. Paul Stoltz points out that it was Beck Weathers desire to Ascend</span><br data-dcnode-id="3510"><span data-dcnode-id="3509" instrument_node="">that led to his victory over life-threatening obstacles. We all share that core human</span><br data-dcnode-id="3508"><span data-dcnode-id="3507" instrument_node="">drive. We, too, want to Ascendmoving your purpose in your life forward no matter</span><br data-dcnode-id="3506"><span data-dcnode-id="3505" instrument_node="">what your goals. In other words, successful people share the profound urge to strive,</span><br data-dcnode-id="3504"><span data-dcnode-id="3503" instrument_node="">to make progress, to achieve their goals and fulfill their dreams. If all humans share</span><br data-dcnode-id="3502"><span data-dcnode-id="3501" instrument_node="">the drive to Ascend, then why are there overachievers and underachievers?</span><br data-dcnode-id="3500"><span data-dcnode-id="3499" instrument_node="">The metaphor of climbing a mountain helps illustrate the phenomenon. Lets begin</span><br data-dcnode-id="3498"><span data-dcnode-id="3497" instrument_node="">by defining the mountain.</span><p data-dcnode-id="3496"></p><p data-dcnode-id="3492"><span data-dcnode-id="3495" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3494"><span data-dcnode-id="3493" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3491"></p><h2 data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">Ascend Mt. Success</span></h2><p data-dcnode-id="3488"></p><p data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">Part 2</span></p><p data-dcnode-id="3482"><span data-dcnode-id="3485" instrument_node="">Directions</span><br data-dcnode-id="3484"><span data-dcnode-id="3483" instrument_node="">As Paul Stoltz describes the mountain metaphor, note phrases that define the mountain.</span></p><p data-dcnode-id="3470"><span data-dcnode-id="3481" instrument_node="">`</span><br data-dcnode-id="3480"><span data-dcnode-id="3479" instrument_node="">Directions</span><br data-dcnode-id="3478"><span data-dcnode-id="3477" instrument_node="">There are three types of people one encounters on a mountain. There are: quitters,</span><br data-dcnode-id="3476"><span data-dcnode-id="3475" instrument_node="">campers, and climbers. Take a moment and indicate on the mountain shown above</span><br data-dcnode-id="3474"><span data-dcnode-id="3473" instrument_node="">where you are likely to encounter each type. Then briefly describe in your own</span><br data-dcnode-id="3472"><span data-dcnode-id="3471" instrument_node="">words each of the following:</span></p><p data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">Quitter</span></p><p data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">Camper</span></p><p data-dcnode-id="3464"><span data-dcnode-id="3465" instrument_node="">Climber</span></p><p data-dcnode-id="3462"><span data-dcnode-id="3463" instrument_node="">f10</span></p><p data-dcnode-id="3458"><span data-dcnode-id="3461" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3460"><span data-dcnode-id="3459" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">Activity Break</span></p><p data-dcnode-id="3455"></p><h2 data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">Scaling Organizational Mountains</span></h2><p data-dcnode-id="3452"></p><p data-dcnode-id="3442"><span data-dcnode-id="3451" instrument_node="">Directions</span><br data-dcnode-id="3450"><span data-dcnode-id="3449" instrument_node="">Select one of the following three questions and write down as many answers as</span><br data-dcnode-id="3448"><span data-dcnode-id="3447" instrument_node="">possible. If time permits, tackle as many of the remaining questions as possible.</span><br data-dcnode-id="3446"><span data-dcnode-id="3445" instrument_node="">Feel free to interact with those around you. When we return, members of our</span><br data-dcnode-id="3444"><span data-dcnode-id="3443" instrument_node="">studio audience will share their responses.</span></p><p data-dcnode-id="3441"></p><h2 data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">What separates Climbers</span></h2><br data-dcnode-id="3438"><span data-dcnode-id="3437" instrument_node="">from Campers and Quitters?</span><p data-dcnode-id="3436"></p><p data-dcnode-id="3435"></p><h2 data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node="">What does it take to succeed</span></h2><br data-dcnode-id="3432"><span data-dcnode-id="3431" instrument_node="">in your organization?</span><p data-dcnode-id="3430"></p><p data-dcnode-id="3429"></p><h2 data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">What do you consider to be</span></h2><br data-dcnode-id="3426"><span data-dcnode-id="3425" instrument_node="">the core competencies to thrive</span><br data-dcnode-id="3424"><span data-dcnode-id="3423" instrument_node="">in the next millennium?</span><p data-dcnode-id="3422"></p><p data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">f11</span></p><p data-dcnode-id="3416"><span data-dcnode-id="3419" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3418"><span data-dcnode-id="3417" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3406"><span data-dcnode-id="3415" instrument_node="">Do you see a connection between your responses and those shared by the</span><br data-dcnode-id="3414"><span data-dcnode-id="3413" instrument_node="">studio audience? Is there a pattern among responses for the three questions?</span><br data-dcnode-id="3412"><span data-dcnode-id="3411" instrument_node="">Now that you can see how your success is determined in part by your AQ, lets take</span><br data-dcnode-id="3410"><span data-dcnode-id="3409" instrument_node="">a few minutes to determine your AQ. Turn the page and complete the Adversity</span><br data-dcnode-id="3408"><span data-dcnode-id="3407" instrument_node="">Response ProfileTM. Follow the instructions to tally your results and calculate your AQ.</span></p><p data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">f12</span></p><p data-dcnode-id="3400"><span data-dcnode-id="3403" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3402"><span data-dcnode-id="3401" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">Activity Break</span></p><p data-dcnode-id="3397"></p><h2 data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">The Adversity Response Profile</span></h2><p data-dcnode-id="3394"></p><p data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">TM</span></p><p data-dcnode-id="3391"></p><h2 data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">The Adversity Response Profile is the only scientifically-grounded tool in</span></h2><br data-dcnode-id="3388"><span data-dcnode-id="3387" instrument_node="">existence for measuring how effectively one deals with adversity, or ones AQTM.</span><br data-dcnode-id="3386"><span data-dcnode-id="3385" instrument_node="">AQ is a valid predictor of ones success, stress-threshold, performance, risk-taking,</span><br data-dcnode-id="3384"><span data-dcnode-id="3383" instrument_node="">capacity for change, productivity, perseverance, improvement, energy, and health.</span><br data-dcnode-id="3382"><span data-dcnode-id="3381" instrument_node="">Below is a short sample of the Adversity Response Profile. It provides a snapshot</span><br data-dcnode-id="3380"><span data-dcnode-id="3379" instrument_node="">of how you respond to adversity, but does not provide a complete measure of AQ.</span><p data-dcnode-id="3378"></p><p data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">Sample AQ Quicktake</span></p><p data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">TM</span></p><p data-dcnode-id="3373"></p><h2 data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">1. You suffer a financial setback.</span></h2><br data-dcnode-id="3370"><span data-dcnode-id="3369" instrument_node="">How much control do you feel you have in this situation?</span><br data-dcnode-id="3368"><span data-dcnode-id="3367" instrument_node="">No control</span><p data-dcnode-id="3366"></p><p data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">Complete control</span></p><p data-dcnode-id="3363"></p><h2 data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">2. You are overlooked for a promotion.</span></h2><br data-dcnode-id="3360"><span data-dcnode-id="3359" instrument_node="">To what extent do you feel responsible for dealing with this situation?</span><br data-dcnode-id="3358"><span data-dcnode-id="3357" instrument_node="">Not responsible at all</span><p data-dcnode-id="3356"></p><p data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">Completely responsible</span></p><p data-dcnode-id="3348"><span data-dcnode-id="3353" instrument_node="">3. You are criticized for a big project which you just completed.</span><br data-dcnode-id="3352"><span data-dcnode-id="3351" instrument_node="">The reason I was criticized is something that:</span><br data-dcnode-id="3350"><span data-dcnode-id="3349" instrument_node="">Relates to all aspects of my life</span></p><p data-dcnode-id="3347"></p><h2 data-dcnode-id="3345"><span data-dcnode-id="3346" instrument_node="">Just relates to this situation</span></h2><p data-dcnode-id="3344"></p><p data-dcnode-id="3343"></p><h2 data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">4. You do not help a co-worker who needs your assistance.</span></h2><br data-dcnode-id="3340"><span data-dcnode-id="3339" instrument_node="">The reason I did not help will</span><br data-dcnode-id="3338"><span data-dcnode-id="3337" instrument_node="">Always exist</span><p data-dcnode-id="3336"></p><p data-dcnode-id="3335"></p><h2 data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">Never exist again</span></h2><p data-dcnode-id="3332"></p><p data-dcnode-id="3331"></p><h2 data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">5. The highest priority project you are working on gets canceled.</span></h2><br data-dcnode-id="3328"><span data-dcnode-id="3327" instrument_node="">How much control to you feel you have in this situation?</span><br data-dcnode-id="3326"><span data-dcnode-id="3325" instrument_node="">No control</span><p data-dcnode-id="3324"></p><p data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node="">Complete control</span></p><p data-dcnode-id="3321"></p><h2 data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">6. Someone you respect ignores your attempt to discuss an important issue.</span></h2><br data-dcnode-id="3318"><span data-dcnode-id="3317" instrument_node="">To what extent do you feel responsible for dealing with this situation?</span><br data-dcnode-id="3316"><span data-dcnode-id="3315" instrument_node="">Not responsible at all</span><p data-dcnode-id="3314"></p><p data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">Completely responsible</span></p><p data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">f13</span></p><p data-dcnode-id="3306"><span data-dcnode-id="3309" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3308"><span data-dcnode-id="3307" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3305"></p><h2 data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">7. People respond unfavorably to your latest ideas.</span></h2><br data-dcnode-id="3302"><span data-dcnode-id="3301" instrument_node="">The reason people responded unfavorably is something that:</span><br data-dcnode-id="3300"><span data-dcnode-id="3299" instrument_node="">Relates to all aspects of my life</span><p data-dcnode-id="3298"></p><p data-dcnode-id="3297"></p><h2 data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">Just relates to this situation</span></h2><p data-dcnode-id="3294"></p><p data-dcnode-id="3293"></p><h2 data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">8. You are unable to take a much needed vacation.</span></h2><br data-dcnode-id="3290"><span data-dcnode-id="3289" instrument_node="">The reason you are unable to take this vacation will:</span><br data-dcnode-id="3288"><span data-dcnode-id="3287" instrument_node="">Always exist</span><p data-dcnode-id="3286"></p><p data-dcnode-id="3285"></p><h2 data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">Never exist again</span></h2><p data-dcnode-id="3282"></p><p data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">Source: Paul G. Stoltz, author of Adversity Quotient: Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3256"><span data-dcnode-id="3279" instrument_node="">Scoring instructions</span><br data-dcnode-id="3278"><span data-dcnode-id="3277" instrument_node="">Add together all the numbers you circled to get your overall AQ.</span><br data-dcnode-id="3276"><span data-dcnode-id="3275" instrument_node="">Insert your total in this box.</span><br data-dcnode-id="3274"><span data-dcnode-id="3273" instrument_node="">Low AQ (8-18) indicates that you have a difficult time dealing with adversity and/or</span><br data-dcnode-id="3272"><span data-dcnode-id="3271" instrument_node="">adversity takes an unnecessary toll on your energy, performance, and spirit.</span><br data-dcnode-id="3270"><span data-dcnode-id="3269" instrument_node="">Strengthening your AQ can improve your natural resilience and lessen the fallout</span><br data-dcnode-id="3268"><span data-dcnode-id="3267" instrument_node="">from adversity.</span><br data-dcnode-id="3266"><span data-dcnode-id="3265" instrument_node="">Moderate AQ (19-32) indicates you deal with adversity fairly well, however, your</span><br data-dcnode-id="3264"><span data-dcnode-id="3263" instrument_node="">performance can be enhanced with a higher AQ.</span><br data-dcnode-id="3262"><span data-dcnode-id="3261" instrument_node="">High AQ (32-40) indicates a high capacity for adversity and the ability to persevere</span><br data-dcnode-id="3260"><span data-dcnode-id="3259" instrument_node="">through changing times. You may be strengthened by adversity, especially over time.</span><br data-dcnode-id="3258"><span data-dcnode-id="3257" instrument_node="">You probably embrace the right kind of change and take necessary risks.</span></p><p data-dcnode-id="3255"></p><h2 data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">1998 PEAK Learning, Inc. (800) 255-5572</span></h2><p data-dcnode-id="3252"></p><p data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">f14</span></p><p data-dcnode-id="3246"><span data-dcnode-id="3249" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3248"><span data-dcnode-id="3247" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">Part 3</span></p><p data-dcnode-id="3243"></p><h2 data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">AQs Scientific Building Blocks</span></h2><p data-dcnode-id="3240"></p><p data-dcnode-id="3239"></p><h2 data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">AQ is rooted in three sciences: psychoneuroimmunology, neurophysiology,</span></h2><br data-dcnode-id="3236"><span data-dcnode-id="3235" instrument_node="">and cognitive psychology. They are its building blocks. Hundreds of research studies lend</span><br data-dcnode-id="3234"><span data-dcnode-id="3233" instrument_node="">support to the role AQ plays in determining ones ability to triumph over obstacles.</span><br data-dcnode-id="3232"><span data-dcnode-id="3231" instrument_node="">Psychoneuroimmunology is a field in science that examines the mind-body</span><br data-dcnode-id="3230"><span data-dcnode-id="3229" instrument_node="">relationship. In essence, it studies the relationship between what one thinks and</span><br data-dcnode-id="3228"><span data-dcnode-id="3227" instrument_node="">feels and what goes on in the body. How do thoughts and feelings affect the</span><br data-dcnode-id="3226"><span data-dcnode-id="3225" instrument_node="">body and its overall health?</span><br data-dcnode-id="3224"><span data-dcnode-id="3223" instrument_node="">Directions</span><br data-dcnode-id="3222"><span data-dcnode-id="3221" instrument_node="">As Paul Stoltz describes the field of psychoneuroimmunology and how it supports AQ,</span><br data-dcnode-id="3220"><span data-dcnode-id="3219" instrument_node="">use the space below for personal notes.</span><p data-dcnode-id="3218"></p><p data-dcnode-id="3214"><span data-dcnode-id="3217" instrument_node="">Bottom Line Your thoughts and emotions determine the strength of your body</span><br data-dcnode-id="3216"><span data-dcnode-id="3215" instrument_node="">chemistry down to the cellular level.</span></p><p data-dcnode-id="3213"></p><h2 data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">Neurophysiology is a field in science that focuses on the brain. It studies how</span></h2><br data-dcnode-id="3210"><span data-dcnode-id="3209" instrument_node="">the brain learns and functions. How are habits formed and what must occur to change</span><br data-dcnode-id="3208"><span data-dcnode-id="3207" instrument_node="">habits once they are established?</span><br data-dcnode-id="3206"><span data-dcnode-id="3205" instrument_node="">Directions</span><br data-dcnode-id="3204"><span data-dcnode-id="3203" instrument_node="">As Paul Stoltz describes the field of neurophysiology and how it supports AQ, use the</span><br data-dcnode-id="3202"><span data-dcnode-id="3201" instrument_node="">space below for personal notes.</span><p data-dcnode-id="3200"></p><p data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node="">Bottom Line The brain is ideally equipped to hardwire habits of thought and behavior.</span></p><p data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">f15</span></p><p data-dcnode-id="3192"><span data-dcnode-id="3195" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3194"><span data-dcnode-id="3193" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3191"></p><h2 data-dcnode-id="3189"><span data-dcnode-id="3190" instrument_node="">Cognitive psychology is the most popular aspect of psychology focusing on</span></h2><br data-dcnode-id="3188"><span data-dcnode-id="3187" instrument_node="">the relationships between thoughts and feelings associated with ones mental health.</span><br data-dcnode-id="3186"><span data-dcnode-id="3185" instrument_node="">While there are many aspects to cognitive psychology, of particular importance to AQ</span><br data-dcnode-id="3184"><span data-dcnode-id="3183" instrument_node="">is the research examining the human need for control or mastery over ones life.</span><br data-dcnode-id="3182"><span data-dcnode-id="3181" instrument_node="">Directions</span><br data-dcnode-id="3180"><span data-dcnode-id="3179" instrument_node="">As Paul Stoltz describes the field of cognitive psychology and how it supports AQ,</span><br data-dcnode-id="3178"><span data-dcnode-id="3177" instrument_node="">use the space below for personal notes.</span><p data-dcnode-id="3176"></p><p data-dcnode-id="3175"></p><h2 data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">Bottom Line Learned Helplessness, considered to be the Landmark Theory of</span></h2><br data-dcnode-id="3172"><span data-dcnode-id="3171" instrument_node="">the Century, explains why many people give up or stop short when faced with lifes</span><br data-dcnode-id="3170"><span data-dcnode-id="3169" instrument_node="">challenges.</span><p data-dcnode-id="3168"></p><p data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">f16</span></p><p data-dcnode-id="3162"><span data-dcnode-id="3165" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3164"><span data-dcnode-id="3163" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">Part 4</span></p><p data-dcnode-id="3159"></p><h2 data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">AQ and Learned Helplessness</span></h2><p data-dcnode-id="3156"></p><p data-dcnode-id="3150"><span data-dcnode-id="3155" instrument_node="">In recent years there has been a push to empower individuals. Yet, learned</span><br data-dcnode-id="3154"><span data-dcnode-id="3153" instrument_node="">helplessness is pervasive in many organizations today. Take a moment to study the</span><br data-dcnode-id="3152"><span data-dcnode-id="3151" instrument_node="">graphic below.</span></p><p data-dcnode-id="3146"><span data-dcnode-id="3149" instrument_node="">Empowerment</span><br data-dcnode-id="3148"><span data-dcnode-id="3147" instrument_node="">(High AQ)</span></p><p data-dcnode-id="3142"><span data-dcnode-id="3145" instrument_node="">Learned Helplessness</span><br data-dcnode-id="3144"><span data-dcnode-id="3143" instrument_node="">(Low AQ)</span></p><p data-dcnode-id="3136"><span data-dcnode-id="3141" instrument_node="">Directions</span><br data-dcnode-id="3140"><span data-dcnode-id="3139" instrument_node="">Discuss the following question with the person sitting beside you. Jot down your</span><br data-dcnode-id="3138"><span data-dcnode-id="3137" instrument_node="">thoughts on the lines provided.</span></p><p data-dcnode-id="3135"></p><h2 data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">What is the relationship between learned helplessness and empowerment?</span></h2><p data-dcnode-id="3132"></p><p data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">f17</span></p><p data-dcnode-id="3126"><span data-dcnode-id="3129" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3128"><span data-dcnode-id="3127" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3125"></p><h2 data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">There are additional cognitive psychology theories that support AQ.</span></h2><br data-dcnode-id="3122"><span data-dcnode-id="3121" instrument_node="">They include:</span><br data-dcnode-id="3120"><span data-dcnode-id="3119" instrument_node="">attributional style</span><br data-dcnode-id="3118"><span data-dcnode-id="3117" instrument_node=""> resiliency</span><br data-dcnode-id="3116"><span data-dcnode-id="3115" instrument_node=""> locus of control</span><br data-dcnode-id="3114"><span data-dcnode-id="3113" instrument_node=""> self efficacy</span><p data-dcnode-id="3112"></p><p data-dcnode-id="3106"><span data-dcnode-id="3111" instrument_node="">control theory</span><br data-dcnode-id="3110"><span data-dcnode-id="3109" instrument_node=""> explanatory style</span><br data-dcnode-id="3108"><span data-dcnode-id="3107" instrument_node=""> hardiness</span></p><p data-dcnode-id="3102"><span data-dcnode-id="3105" instrument_node="">While these theories support AQ, the defining moment is when you face</span><br data-dcnode-id="3104"><span data-dcnode-id="3103" instrument_node="">ADVERSITY.</span></p><p data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">f18</span></p><p data-dcnode-id="3096"><span data-dcnode-id="3099" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3098"><span data-dcnode-id="3097" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">Part 5</span></p><p data-dcnode-id="3093"></p><h2 data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">Four Key Facts About Facing Adversity</span></h2><p data-dcnode-id="3090"></p><p data-dcnode-id="3089"></p><h2 data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">Though most of us will not experience a moment of truth of the same</span></h2><br data-dcnode-id="3086"><span data-dcnode-id="3085" instrument_node="">magnitude as Capt. Scott OGrady, we are regularly faced with events with which we</span><br data-dcnode-id="3084"><span data-dcnode-id="3083" instrument_node="">have little or no control. The choice lies in how you choose to respond. You can</span><br data-dcnode-id="3082"><span data-dcnode-id="3081" instrument_node="">choose to take control of your response or assume helplessness.</span><br data-dcnode-id="3080"><span data-dcnode-id="3079" instrument_node="">Moments of truth can be summarized in four statements:</span><br data-dcnode-id="3078"><span data-dcnode-id="3077" instrument_node="">1. The moment of truth is when you face adversity.</span><br data-dcnode-id="3076"><span data-dcnode-id="3075" instrument_node="">2. Patterns of how we react to adversity are difficult to judge.</span><br data-dcnode-id="3074"><span data-dcnode-id="3073" instrument_node="">3. Reaction patterns can be measured.</span><br data-dcnode-id="3072"><span data-dcnode-id="3071" instrument_node="">4. Reaction patterns can be permanently improved.</span><p data-dcnode-id="3070"></p><p data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">AQ</span></p><p data-dcnode-id="3056"><span data-dcnode-id="3067" instrument_node="">nd</span><br data-dcnode-id="3066"><span data-dcnode-id="3065" instrument_node="">ce</span><br data-dcnode-id="3064"><span data-dcnode-id="3063" instrument_node="">As</span><br data-dcnode-id="3062"><span data-dcnode-id="3061" instrument_node="">to</span><br data-dcnode-id="3060"><span data-dcnode-id="3059" instrument_node="">ols</span><br data-dcnode-id="3058"><span data-dcnode-id="3057" instrument_node="">To</span></p><p data-dcnode-id="3044"><span data-dcnode-id="3055" instrument_node="">Va</span><br data-dcnode-id="3054"><span data-dcnode-id="3053" instrument_node="">lid</span><br data-dcnode-id="3052"><span data-dcnode-id="3051" instrument_node="">M</span><br data-dcnode-id="3050"><span data-dcnode-id="3049" instrument_node="">ea</span><br data-dcnode-id="3048"><span data-dcnode-id="3047" instrument_node="">sur</span><br data-dcnode-id="3046"><span data-dcnode-id="3045" instrument_node="">e</span></p><p data-dcnode-id="3043"></p><h2 data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">Acceptance of these four underlying principles is fundamental to AQ.</span></h2><p data-dcnode-id="3040"></p><p data-dcnode-id="3039"></p><h2 data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">New Theory of Effectiveness</span></h2><p data-dcnode-id="3036"></p><p data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">f19</span></p><p data-dcnode-id="3030"><span data-dcnode-id="3033" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3032"><span data-dcnode-id="3031" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">AQ Definition</span></p><p data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">Part 6</span></p><p data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">Adversity Quotient</span></p><p data-dcnode-id="3023"></p><h2 data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">is a new theory of effectiveness</span></h2><p data-dcnode-id="3020"></p><p data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">identifies a new set of scientifically-grounded skills and tools for the Ascent</span></p><p data-dcnode-id="3017"></p><h2 data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">is a scientifically valid measurement</span></h2><p data-dcnode-id="3014"></p><p data-dcnode-id="3008"><span data-dcnode-id="3013" instrument_node="">Directions</span><br data-dcnode-id="3012"><span data-dcnode-id="3011" instrument_node="">AQ is relevant to individuals, families, organizations, and communities alike.</span><br data-dcnode-id="3010"><span data-dcnode-id="3009" instrument_node="">Jot down the multitude of areas in which AQ effectively predicts success.</span></p><p data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">f20</span></p><p data-dcnode-id="3002"><span data-dcnode-id="3005" instrument_node="">Adversity Quotient</span><br data-dcnode-id="3004"><span data-dcnode-id="3003" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">The AQ Continuum</span></p><p data-dcnode-id="2998"><span data-dcnode-id="2999" instrument_node="">Part 7</span></p><p data-dcnode-id="2994"><span data-dcnode-id="2997" instrument_node="">AQ scores are not simply categorized as high or low. Instead they tend to</span><br data-dcnode-id="2996"><span data-dcnode-id="2995" instrument_node="">fall in a normal distribution as illustrated by the bell-shaped curve shown below.</span></p><p data-dcnode-id="2990"><span data-dcnode-id="2993" instrument_node="">Low AQ</span><br data-dcnode-id="2992"><span data-dcnode-id="2991" instrument_node="">059</span></p><p data-dcnode-id="2986"><span data-dcnode-id="2989" instrument_node="">Moderate AQ</span><br data-dcnode-id="2988"><span data-dcnode-id="2987" instrument_node="">95134</span></p><p data-dcnode-id="2982"><span data-dcnode-id="2985" instrument_node="">High AQ</span><br data-dcnode-id="2984"><span data-dcnode-id="2983" instrument_node="">166200</span></p><p data-dcnode-id="2981"></p><h2 data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">AQ scores range from low to high, destructive to constructive. Regardless</span></h2><br data-dcnode-id="2978"><span data-dcnode-id="2977" instrument_node="">of where your score lies on the continuum, it can be strengthened.</span><br data-dcnode-id="2976"><span data-dcnode-id="2975" instrument_node="">There are four CORE dimensions to AQ. They are:</span><br data-dcnode-id="2974"><span data-dcnode-id="2973" instrument_node="">1. C</span><p data-dcnode-id="2972"></p><p data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">Control</span></p><p data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">2. O</span></p><p data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">Ownership</span></p><p data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">3. R</span></p><p data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node="">Reach</span></p><p data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">4. E</span></p><p data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">Endurance</span></p><p data-dcnode-id="2952"><span data-dcnode-id="2957" instrument_node="">Directions</span><br data-dcnode-id="2956"><span data-dcnode-id="2955" instrument_node="">Refer to the Adversity Response ProfileTM you completed previously. As Paul Stoltz</span><br data-dcnode-id="2954"><span data-dcnode-id="2953" instrument_node="">reviews each of the eight questions, use the space below for notes.</span></p><p data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">fAdversity Quotient</span></p><p data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">21</span></p><p data-dcnode-id="2947"></p><h2 data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">Turning Obstacles into Opportunities</span></h2><p data-dcnode-id="2944"></p><p data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">AQ in the Workplace</span></p><p data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">Part 8</span></p><p data-dcnode-id="2926"><span data-dcnode-id="2939" instrument_node="">Welcome back from the break. Prior to the break, you had an opportunity</span><br data-dcnode-id="2938"><span data-dcnode-id="2937" instrument_node="">to ask questions pertaining to your AQ score, the research underpinnings of AQ,</span><br data-dcnode-id="2936"><span data-dcnode-id="2935" instrument_node="">and other topics addressed in the first half of this presentation. But just how can</span><br data-dcnode-id="2934"><span data-dcnode-id="2933" instrument_node="">AQ be applied in an organization? What specific actions can management take</span><br data-dcnode-id="2932"><span data-dcnode-id="2931" instrument_node="">to nurture a high AQ workplace?</span><br data-dcnode-id="2930"><span data-dcnode-id="2929" instrument_node="">In this second portion, we will focus on how to apply AQ in a business setting.</span><br data-dcnode-id="2928"><span data-dcnode-id="2927" instrument_node="">You will learn about:</span></p><p data-dcnode-id="2925"></p><h2 data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">five warning signs</span></h2><p data-dcnode-id="2922"></p><p data-dcnode-id="2921"></p><h2 data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">six ways in which to sabotage AQ</span></h2><p data-dcnode-id="2918"></p><p data-dcnode-id="2917"></p><h2 data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">twelve ways to nurture AQ</span></h2><p data-dcnode-id="2914"></p><p data-dcnode-id="2906"><span data-dcnode-id="2913" instrument_node="">Lets first list the applications in which AQ can and has been applied successfully.</span><br data-dcnode-id="2912"><span data-dcnode-id="2911" instrument_node="">Directions</span><br data-dcnode-id="2910"><span data-dcnode-id="2909" instrument_node="">There are numerous applications of AQ within an organization. As Paul Stoltz describes</span><br data-dcnode-id="2908"><span data-dcnode-id="2907" instrument_node="">the variety of applications, use the space provided for notes.</span></p><p data-dcnode-id="2882"><span data-dcnode-id="2905" instrument_node="">Hiring</span><br data-dcnode-id="2904"><span data-dcnode-id="2903" instrument_node="">Retention</span><br data-dcnode-id="2902"><span data-dcnode-id="2901" instrument_node="">Performance</span><br data-dcnode-id="2900"><span data-dcnode-id="2899" instrument_node="">Leadership</span><br data-dcnode-id="2898"><span data-dcnode-id="2897" instrument_node="">Change</span><br data-dcnode-id="2896"><span data-dcnode-id="2895" instrument_node="">Resilience</span><br data-dcnode-id="2894"><span data-dcnode-id="2893" instrument_node="">Culture</span><br data-dcnode-id="2892"><span data-dcnode-id="2891" instrument_node="">Teams</span><br data-dcnode-id="2890"><span data-dcnode-id="2889" instrument_node="">Vision</span><br data-dcnode-id="2888"><span data-dcnode-id="2887" instrument_node="">Coaching</span><br data-dcnode-id="2886"><span data-dcnode-id="2885" instrument_node="">Relationships</span><br data-dcnode-id="2884"><span data-dcnode-id="2883" instrument_node="">Customers/Clients</span></p><p data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">f22</span></p><p data-dcnode-id="2876"><span data-dcnode-id="2879" instrument_node="">Adversity Quotient</span><br data-dcnode-id="2878"><span data-dcnode-id="2877" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">Part 9</span></p><p data-dcnode-id="2873"></p><h2 data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">Five Warning Signals</span></h2><p data-dcnode-id="2870"></p><p data-dcnode-id="2856"><span data-dcnode-id="2869" instrument_node="">There are five telltale signs that an organization is not inspiring employees</span><br data-dcnode-id="2868"><span data-dcnode-id="2867" instrument_node="">to Ascend. The signals are:</span><br data-dcnode-id="2866"><span data-dcnode-id="2865" instrument_node="">1. People accept, but do not embrace change.</span><br data-dcnode-id="2864"><span data-dcnode-id="2863" instrument_node="">2. People fight to maintain the status quo.</span><br data-dcnode-id="2862"><span data-dcnode-id="2861" instrument_node="">3. People accept less than optimal results.</span><br data-dcnode-id="2860"><span data-dcnode-id="2859" instrument_node="">4. Innovation is incremental, with no major breakthroughs.</span><br data-dcnode-id="2858"><span data-dcnode-id="2857" instrument_node="">5. People may be pleasant, but seem uninspired.</span></p><p data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">f23</span></p><p data-dcnode-id="2850"><span data-dcnode-id="2853" instrument_node="">Adversity Quotient</span><br data-dcnode-id="2852"><span data-dcnode-id="2851" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">Activity Break</span></p><p data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">Ways to Sabotage AQ</span></p><p data-dcnode-id="2834"><span data-dcnode-id="2845" instrument_node="">Directions</span><br data-dcnode-id="2844"><span data-dcnode-id="2843" instrument_node="">All too often organizations sabotage efforts to minimize learned helplessness</span><br data-dcnode-id="2842"><span data-dcnode-id="2841" instrument_node="">and nurture empowerment. Respond to the question in each column by listing</span><br data-dcnode-id="2840"><span data-dcnode-id="2839" instrument_node="">your responses in the space provided.</span><br data-dcnode-id="2838"><span data-dcnode-id="2837" instrument_node="">How does your organization</span><br data-dcnode-id="2836"><span data-dcnode-id="2835" instrument_node="">sabotage AQ?</span></p><p data-dcnode-id="2833"></p><h2 data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">How does your organization</span></h2><br data-dcnode-id="2830"><span data-dcnode-id="2829" instrument_node="">nurture AQ?</span><p data-dcnode-id="2828"></p><p data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">________________________________</span></p><p data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">________________________________</span></p><p data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">________________________________</span></p><p data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">________________________________</span></p><p data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">________________________________</span></p><p data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">________________________________</span></p><p data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">________________________________</span></p><p data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">________________________________</span></p><p data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">________________________________</span></p><p data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">________________________________</span></p><p data-dcnode-id="2784"><span data-dcnode-id="2807" instrument_node="">In the previous exercise, you listed actions your organization takes which unwittingly</span><br data-dcnode-id="2806"><span data-dcnode-id="2805" instrument_node="">undermine AQ. The following list summarizes surefire methods for sabotaging AQ,</span><br data-dcnode-id="2804"><span data-dcnode-id="2803" instrument_node="">not only in an organization but in your personal life as well. Carefully examine these</span><br data-dcnode-id="2802"><span data-dcnode-id="2801" instrument_node="">six ways.</span><br data-dcnode-id="2800"><span data-dcnode-id="2799" instrument_node="">1. Grant responsibility without authority.</span><br data-dcnode-id="2798"><span data-dcnode-id="2797" instrument_node="">2. Point out the downside to everything.</span><br data-dcnode-id="2796"><span data-dcnode-id="2795" instrument_node="">3. Sap strength with long hours and no rejuvenation.</span><br data-dcnode-id="2794"><span data-dcnode-id="2793" instrument_node="">4. Over promise, under deliver.</span><br data-dcnode-id="2792"><span data-dcnode-id="2791" instrument_node="">5. Surround Climbers with Campers.</span><br data-dcnode-id="2790"><span data-dcnode-id="2789" instrument_node="">6. Craft a mission statement, then forget about it.</span><br data-dcnode-id="2788"><span data-dcnode-id="2787" instrument_node="">What steps can you take to avoid these mistakes? Lets proceed to look at how</span><br data-dcnode-id="2786"><span data-dcnode-id="2785" instrument_node="">organizations can foster AQ.</span></p><p data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">f24</span></p><p data-dcnode-id="2778"><span data-dcnode-id="2781" instrument_node="">Adversity Quotient</span><br data-dcnode-id="2780"><span data-dcnode-id="2779" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">Part 10</span></p><p data-dcnode-id="2775"></p><h2 data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">Twelve Ways to Nurture AQ</span></h2><br data-dcnode-id="2772"><span data-dcnode-id="2771" instrument_node="">Directions</span><br data-dcnode-id="2770"><span data-dcnode-id="2769" instrument_node="">As each step is described, use the space provided to jot down key points pertaining</span><br data-dcnode-id="2768"><span data-dcnode-id="2767" instrument_node="">to that step. Try to use brief terms or quick drawings that will jog your recall of each step</span><br data-dcnode-id="2766"><span data-dcnode-id="2765" instrument_node="">when you reread this discussion guide after the presentation. It may be helpful to</span><br data-dcnode-id="2764"><span data-dcnode-id="2763" instrument_node="">consider the Malden Mills example when composing your brief notes.</span><p data-dcnode-id="2762"></p><p data-dcnode-id="2761"></p><h2 data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">1. Define the mountain and articulate individual alignment.</span></h2><br data-dcnode-id="2758"><span data-dcnode-id="2757" instrument_node="">_____________________________________________________________________</span><br data-dcnode-id="2756"><span data-dcnode-id="2755" instrument_node="">2. Align all systems to the mountain.</span><br data-dcnode-id="2754"><span data-dcnode-id="2753" instrument_node="">_____________________________________________________________________</span><br data-dcnode-id="2752"><span data-dcnode-id="2751" instrument_node="">3. Hire Climbers.</span><br data-dcnode-id="2750"><span data-dcnode-id="2749" instrument_node="">_____________________________________________________________________</span><br data-dcnode-id="2748"><span data-dcnode-id="2747" instrument_node="">4. Reward people for climbing.</span><br data-dcnode-id="2746"><span data-dcnode-id="2745" instrument_node="">_____________________________________________________________________</span><br data-dcnode-id="2744"><span data-dcnode-id="2743" instrument_node="">5. Promise modestly, deliver abundantly.</span><br data-dcnode-id="2742"><span data-dcnode-id="2741" instrument_node="">_____________________________________________________________________</span><br data-dcnode-id="2740"><span data-dcnode-id="2739" instrument_node="">6. Reward and model rejuvenation.</span><br data-dcnode-id="2738"><span data-dcnode-id="2737" instrument_node="">_____________________________________________________________________</span><br data-dcnode-id="2736"><span data-dcnode-id="2735" instrument_node="">7. Provide needed resources.</span><br data-dcnode-id="2734"><span data-dcnode-id="2733" instrument_node="">_____________________________________________________________________</span><br data-dcnode-id="2732"><span data-dcnode-id="2731" instrument_node="">8. Mine adversity for opportunity.</span><br data-dcnode-id="2730"><span data-dcnode-id="2729" instrument_node="">_____________________________________________________________________</span><br data-dcnode-id="2728"><span data-dcnode-id="2727" instrument_node="">9. Glorify the great struggles.</span><br data-dcnode-id="2726"><span data-dcnode-id="2725" instrument_node="">_____________________________________________________________________</span><br data-dcnode-id="2724"><span data-dcnode-id="2723" instrument_node="">10. Establish accountability.</span><br data-dcnode-id="2722"><span data-dcnode-id="2721" instrument_node="">_____________________________________________________________________</span><br data-dcnode-id="2720"><span data-dcnode-id="2719" instrument_node="">11. Demolish barriers to hope.</span><br data-dcnode-id="2718"><span data-dcnode-id="2717" instrument_node="">_____________________________________________________________________</span><br data-dcnode-id="2716"><span data-dcnode-id="2715" instrument_node="">12. Strengthen the CORE.</span><br data-dcnode-id="2714"><span data-dcnode-id="2713" instrument_node="">_____________________________________________________________________</span><p data-dcnode-id="2712"></p><p data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">f25</span></p><p data-dcnode-id="2706"><span data-dcnode-id="2709" instrument_node="">Adversity Quotient</span><br data-dcnode-id="2708"><span data-dcnode-id="2707" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">Part 11</span></p><p data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">Wrap Up</span></p><p data-dcnode-id="2640"><span data-dcnode-id="2701" instrument_node="">In todays session you became familiar with the Adversity Quotient (AQ)</span><br data-dcnode-id="2700"><span data-dcnode-id="2699" instrument_node="">theory. AQ has its roots in the fields of psychoneuroimmunology, neurophysiology, and</span><br data-dcnode-id="2698"><span data-dcnode-id="2697" instrument_node="">cognitive psychology. Essentially AQ is a scientifically valid measurement of ones</span><br data-dcnode-id="2696"><span data-dcnode-id="2695" instrument_node="">ability to turn obstacles into opportunities. By completing and scoring the Adversity</span><br data-dcnode-id="2694"><span data-dcnode-id="2693" instrument_node="">Response ProfileTM you were able to determine your personal AQ. You also assessed</span><br data-dcnode-id="2692"><span data-dcnode-id="2691" instrument_node="">your organizations AQ, not by completing a formal instrument but by responding to</span><br data-dcnode-id="2690"><span data-dcnode-id="2689" instrument_node="">questions posed by Paul Stoltz.</span><br data-dcnode-id="2688"><span data-dcnode-id="2687" instrument_node="">AQ has many applications within a business setting because it is a predictor of success.</span><br data-dcnode-id="2686"><span data-dcnode-id="2685" instrument_node="">For example, it can be used in recruiting, coaching, and even in change management.</span><br data-dcnode-id="2684"><span data-dcnode-id="2683" instrument_node="">To be truly effective in an organization, management must first recognize that</span><br data-dcnode-id="2682"><span data-dcnode-id="2681" instrument_node="">organizations unwittingly undermine AQ in the workplace. The telltale signs that</span><br data-dcnode-id="2680"><span data-dcnode-id="2679" instrument_node="">AQ is being sabotaged are:</span><br data-dcnode-id="2678"><span data-dcnode-id="2677" instrument_node="">1. People accept, but do not embrace change.</span><br data-dcnode-id="2676"><span data-dcnode-id="2675" instrument_node="">2. People fight to maintain the status quo.</span><br data-dcnode-id="2674"><span data-dcnode-id="2673" instrument_node="">3. People accept less than optimal results.</span><br data-dcnode-id="2672"><span data-dcnode-id="2671" instrument_node="">4. Innovation is incremental, with no major breakthroughs.</span><br data-dcnode-id="2670"><span data-dcnode-id="2669" instrument_node="">5. People may be pleasant, but seem uninspired.</span><br data-dcnode-id="2668"><span data-dcnode-id="2667" instrument_node="">So how do organizations sabotage AQ? Some of the answers are obvious, such as,</span><br data-dcnode-id="2666"><span data-dcnode-id="2665" instrument_node="">grant responsibility without authority and point out the downside to everything.</span><br data-dcnode-id="2664"><span data-dcnode-id="2663" instrument_node="">Less obvious methods are to: sap an individuals strength; over promise, under deliver;</span><br data-dcnode-id="2662"><span data-dcnode-id="2661" instrument_node="">surround Climbers with Campers; and craft a mission statement, then forget about it.</span><br data-dcnode-id="2660"><span data-dcnode-id="2659" instrument_node="">There are definite actions an organization can take to nurture an Ascending AQ</span><br data-dcnode-id="2658"><span data-dcnode-id="2657" instrument_node="">climate. While a list of twelve actions may appear daunting, Paul Stoltz shared the</span><br data-dcnode-id="2656"><span data-dcnode-id="2655" instrument_node="">Malden Mills case example. The company president, Aaron Feuerstein, demonstrated</span><br data-dcnode-id="2654"><span data-dcnode-id="2653" instrument_node="">a high AQ. He possessed an innate ability to see past the adversity and welcome the</span><br data-dcnode-id="2652"><span data-dcnode-id="2651" instrument_node="">opportunities posed by a devastating factory fire.</span><br data-dcnode-id="2650"><span data-dcnode-id="2649" instrument_node="">To fully appreciate AQ, read Paul Stoltzs book, Adversity Quotient: Turning Obstacles</span><br data-dcnode-id="2648"><span data-dcnode-id="2647" instrument_node="">into Opportunities. Particularly noteworthy are chapters six through nine. These chapters</span><br data-dcnode-id="2646"><span data-dcnode-id="2645" instrument_node="">expand upon the principles introduced in the latter half of todays presentation.</span><br data-dcnode-id="2644"><span data-dcnode-id="2643" instrument_node="">They provide additional, easy-to-apply strategies for improving your AQ, as well as the</span><br data-dcnode-id="2642"><span data-dcnode-id="2641" instrument_node="">AQ of those around you at home and at work.</span></p><p data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">f26</span></p><p data-dcnode-id="2634"><span data-dcnode-id="2637" instrument_node="">Adversity Quotient</span><br data-dcnode-id="2636"><span data-dcnode-id="2635" instrument_node="">Turning Obstacles into Opportunities</span></p><p data-dcnode-id="2633"></p><h2 data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">About Paul Stoltz</span></h2><br data-dcnode-id="2630"><span data-dcnode-id="2629" instrument_node="">As one of the worlds leading experts in human and organizational</span><br data-dcnode-id="2628"><span data-dcnode-id="2627" instrument_node="">performance, Paul Stoltz is in high demand as a presenter, consultant, and trainer.</span><br data-dcnode-id="2626"><span data-dcnode-id="2625" instrument_node="">He has shared his revolutionary AQ theory and technology with 35 million people,</span><br data-dcnode-id="2624"><span data-dcnode-id="2623" instrument_node="">helping individuals, teams, and organizations around the world to become</span><br data-dcnode-id="2622"><span data-dcnode-id="2621" instrument_node="">more resilient and effective in dealing with adversity. As a result, executives,</span><br data-dcnode-id="2620"><span data-dcnode-id="2619" instrument_node="">educators, managers, parents, and professionals have measurably enhanced their</span><br data-dcnode-id="2618"><span data-dcnode-id="2617" instrument_node="">change-readiness, resilience, performance, effectiveness, leadership, purpose,</span><br data-dcnode-id="2616"><span data-dcnode-id="2615" instrument_node="">relationships, communication, vision, sales, learning, and success.</span><br data-dcnode-id="2614"><span data-dcnode-id="2613" instrument_node="">As author of the internationally acclaimed bestseller Adversity Quotient: Turning</span><br data-dcnode-id="2612"><span data-dcnode-id="2611" instrument_node="">Obstacles into Opportunities, Paul Stoltz has been a featured expert on The Oprah</span><br data-dcnode-id="2610"><span data-dcnode-id="2609" instrument_node="">Winfrey Show, CNN, CNBC, Business News Network, The American Health</span><br data-dcnode-id="2608"><span data-dcnode-id="2607" instrument_node="">Network, and PBS. He is a sought after resource for The Wall Street Journal, The Los</span><br data-dcnode-id="2606"><span data-dcnode-id="2605" instrument_node="">Angeles Times, Success Magazine, Newsday, Entrepreneur Magazine, Family Circle,</span><br data-dcnode-id="2604"><span data-dcnode-id="2603" instrument_node="">Womans World, Investors Business Daily, and more than sixty radio stations from</span><br data-dcnode-id="2602"><span data-dcnode-id="2601" instrument_node="">around the United States and the world. To date his book has been published in seven</span><br data-dcnode-id="2600"><span data-dcnode-id="2599" instrument_node="">languages; has been adopted by MBA programs; and was selected as the Book of the</span><br data-dcnode-id="2598"><span data-dcnode-id="2597" instrument_node="">Month by the Institute for Management Studies and Audio Tech.</span><br data-dcnode-id="2596"><span data-dcnode-id="2595" instrument_node="">In 1997, Paul Stoltz was selected as keynote presenter to the prestigious Singapore</span><br data-dcnode-id="2594"><span data-dcnode-id="2593" instrument_node="">Assembly of Chief Executives annual conference where he presented to several</span><br data-dcnode-id="2592"><span data-dcnode-id="2591" instrument_node="">hundred senior executives representing more than 350,000 employees from Southeast</span><br data-dcnode-id="2590"><span data-dcnode-id="2589" instrument_node="">Asia. Other clients include Abbott Labs, Amoco, BellSouth, Coopers &amp; Lybrand, Levi</span><br data-dcnode-id="2588"><span data-dcnode-id="2587" instrument_node="">Strauss, Marriott International, Motorola, Sun Microsystems, and the U.S. Air Force.</span><br data-dcnode-id="2586"><span data-dcnode-id="2585" instrument_node="">Paul Stoltzs highly interactive, energizing presentations and programs feature leadingedge multimedia, innovative design, and breakthrough ideas. His sincere, warm, and</span><br data-dcnode-id="2584"><span data-dcnode-id="2583" instrument_node="">authentic manner is communicated through his rich humor, stories, and examples</span><br data-dcnode-id="2582"><span data-dcnode-id="2581" instrument_node="">which bring his ideas to life.</span><br data-dcnode-id="2580"><span data-dcnode-id="2579" instrument_node="">Paul Stoltz received his bachelors degree from the University of California and his</span><br data-dcnode-id="2578"><span data-dcnode-id="2577" instrument_node="">Masters and Ph.D. in Organizational Communication, Development and Leadership</span><br data-dcnode-id="2576"><span data-dcnode-id="2575" instrument_node="">from the University of Minnesota. He is president and CEO of PEAK Learning, Inc.,</span><br data-dcnode-id="2574"><span data-dcnode-id="2573" instrument_node="">an international performance consulting firm in Flagstaff, Arizona, where he resides</span><br data-dcnode-id="2572"><span data-dcnode-id="2571" instrument_node="">with his wife, two boys, and two Akitas. In a nationwide contest for Americas Most</span><br data-dcnode-id="2570"><span data-dcnode-id="2569" instrument_node="">Creative Family, USA Today awarded Paul Stoltzs family first prize.</span><p data-dcnode-id="2568"></p><p data-dcnode-id="2564"><span data-dcnode-id
