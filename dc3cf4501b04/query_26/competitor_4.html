</span><meta content="Creating a joyful workplace is not the same as dealing with issues of stress, fatigue, burn-out, and resilience. It requires a proactive approach to a…" data-dcnode-id="4951" property="og:description"><span data-dcnode-id="4950" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as010&quot;><p id=&quot;sp0010&quot;>Creating a joyful workplace is not the same as dealing with issues of stress, fatigue, burn-out, and resilience. It requires a proactive approach to augment feelings of worth, appreciation, and well-being in the members of the team. The sense that one is pursuing worthwhile, valuable activities requires a wholesale commitment to the mission, vision and values of the organization. These tenets are often created through an organic consensus of collegial workmates and then put to action by a leadership team. Reassessing the goals and virtues of the organization at appropriate intervals leads to ongoing loyalty and commitment to the team and a positive attitude. Well-being is addressed through the creation of a bright and cheerful physical and psychosocial workplace that offers programs that encourage mindfulness, humor, playfulness, and fitful lifestyle choices. The sense that one’s work is appreciated and valued stems from an attitude of gratitude on behalf of all levels of the organization including management and peers where such encouragement flourishes. Those expressions of appreciation may be in the form of celebrations in the workplace and/or compensation and benefits that appropriately value the contributions of the employee. The organization’s executive team should be dedicated to crafting an environment that leads to delighted, healthy employees.</p></div></div></div>" data-dcnode-id="4949" lang="en" name="citation_abstract"><span data-dcnode-id="4948" instrument_node="">

25" id="p0015"><span data-dcnode-id="4426" instrument_node="">Expressions of gratitude, appreciation, and humor engender workplace pleasure.</span></p></dd><dt class="list-label" data-dcnode-id="4422"><span data-dcnode-id="4423" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4419"><p data-dcnode-id="4420" id="p0020"><span data-dcnode-id="4421" instrument_node="">Equitable compensation and recognition for personal contributions please workers.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="4406" id="ab010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">Abstract</span></h2><div data-dcnode-id="4407" id="as010"><p data-dcnode-id="4408" id="sp0010"><span data-dcnode-id="4412" instrument_node="">Creating a joyful workplace is not the same as dealing with issues of stress, fatigue, burn-out, and resilience. It requires a proactive approach to augment feelings of worth, appreciation, and well-being in the members of the team. The sense that one is pursuing worthwhile, valuable activities requires a wholesale commitment to the mission, vision and values of the organization. These tenets are often created through an organic consensus of collegial workmates and then put to action by a leadership team. Reassessing the goals and virtues of the organization at appropriate intervals leads to ongoing loyalty and commitment to the team and a positive attitude. Well-being is addressed through the creation of a bright and cheerful physical and psychosocial workplace that offers programs that encourage </span><a class="topic-link" data-dcnode-id="4410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/mindfulness" title="Learn more about mindfulness from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4411" instrument_node="">mindfulness</span></a><span data-dcnode-id="4409" instrument_node="">, humor, playfulness, and fitful lifestyle choices. The sense that one’s work is appreciated and valued stems from an attitude of gratitude on behalf of all levels of the organization including management and peers where such encouragement flourishes. Those expressions of appreciation may be in the form of celebrations in the workplace and/or compensation and benefits that appropriately value the contributions of the employee. The organization’s executive team should be dedicated to crafting an environment that leads to delighted, healthy employees.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="4382" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="4394"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="4395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0720048X21005192"><svg class="icon icon-navigate-left" data-dcnode-id="4403" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="4404"></path></svg><span class="button-alternative-text" data-dcnode-id="4396"><strong data-dcnode-id="4401"><span data-dcnode-id="4402" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="4399"><span data-dcnode-id="4400" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4397"><span data-dcnode-id="4398" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="4383"><button class="button-alternative button-alternative-tertiary" data-dcnode-id="4384" disabled="" type="button"><span class="button-alternative-text" data-dcnode-id="4387"><strong data-dcnode-id="4392"><span data-dcnode-id="4393" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="4390"><span data-dcnode-id="4391" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="4385" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="4386"></path></svg></button></li></ul><div class="Keywords u-font-serif" data-dcnode-id="4351"><div class="keywords-section" data-dcnode-id="4352" id="kg005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4380"><span data-dcnode-id="4381" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="4377" id="k0005"><span data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">Joy in work</span></span></div><div class="keyword" data-dcnode-id="4374" id="k0010"><span data-dcnode-id="4375"><span data-dcnode-id="4376" instrument_node="">Work</span></span></div><div class="keyword" data-dcnode-id="4371" id="k0015"><span data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node="">Productivity</span></span></div><div class="keyword" data-dcnode-id="4368" id="k0020"><span data-dcnode-id="4369"><span data-dcnode-id="4370" instrument_node="">Wellness</span></span></div><div class="keyword" data-dcnode-id="4365" id="k0025"><span data-dcnode-id="4366"><span data-dcnode-id="4367" instrument_node="">Leadership</span></span></div><div class="keyword" data-dcnode-id="4362" id="k0030"><span data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">Workplace</span></span></div><div class="keyword" data-dcnode-id="4359" id="k0035"><span data-dcnode-id="4360"><span data-dcnode-id="4361" instrument_node="">Stress</span></span></div><div class="keyword" data-dcnode-id="4356" id="k0040"><span data-dcnode-id="4357"><span data-dcnode-id="4358" instrument_node="">Burnout</span></span></div><div class="keyword" data-dcnode-id="4353" id="k0045"><span data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">Practice management</span></span></div></div></div><span data-dcnode-id="4350" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="3833" id="body"><div data-dcnode-id="3839"><section data-dcnode-id="4330" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4346" id="st020"><span data-dcnode-id="4349" instrument_node="">1</span><span data-dcnode-id="4348" instrument_node="">. </span><span data-dcnode-id="4347" instrument_node="">Introduction</span></h2><p data-dcnode-id="4337" id="p0025"><span data-dcnode-id="4341"><span data-dcnode-id="4345" instrument_node="">This is an article about creating joy in the workplace. It is NOT about resilience and burnout. If leaders are having issues with burnout and have to build resilience in the job sphere, the battle may already be lost, if not the war. It is discouraging to note that in the May 2021 Wellness Issue of the Journal of the American College of </span><a class="topic-link" data-dcnode-id="4343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/radiology" title="Learn more about Radiology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4344" instrument_node="">Radiology</span></a><span data-dcnode-id="4342" instrument_node=""> the words “resilience” or “burnout” were in the title of seven of the nine articles; “wellness” was only in two titles and “joy” in none </span></span><a class="workspace-trigger" data-dcnode-id="4339" href="#b0005" name="bb0005"><span data-dcnode-id="4340" instrument_node="">[1]</span></a><span data-dcnode-id="4338" instrument_node="">. The discussion of the atmosphere of the workplace must be reframed.</span></p><p data-dcnode-id="4335" id="p0030"><span data-dcnode-id="4336" instrument_node="">Employers should be focused on creating an environment that is a pleasure to work in, attracts the best employees, retains the most productive workers, and serves as a source of joy for the people in the department. That is a tall order, but it should be the goal. If the goal is to address burnout, reduce the high suicide rate, and combat depression then the work site is NOT a place where people look forward to gathering. While some may opine that they are/were happy to abide in a remote workplace secondary to the COVID-infested world, the ideal workplace should be one that people miss and to which people are eager to return.</span></p><p data-dcnode-id="4333" id="p0035"><span data-dcnode-id="4334" instrument_node="">Why should one care if the workplace is a source of happiness? The costs associated with an unhappy employment environment are colossal: (1) increased absenteeism, (2) high employee turnover, (3) reduced productivity, (4) epidemic levels of “mental health days”, (5) time wasted dealing with adverse events/root cause analyses/recruitments, and (6) added expense/time for human resources counselors dealing with inappropriate behavior. Instead envision the company where the members (1) outperform the competition, (2) have continuous upward mobility, (3) enjoy a waiting list of candidates for future openings, (4) consistently meet productivity goals, (5) speak well of the enterprise, (6) earn best in class designations for employee satisfaction, and (7) maintain outstanding physical and emotional health. Those are the goals.</span></p><p data-dcnode-id="4331" id="p0040"><span data-dcnode-id="4332" instrument_node="">Easy to say. Hard to achieve. However, if there is no extant “joy at work” continuous effort or initiative, failure is likely and a “combatting burnout” crisis management program is imminent. As Wayne Gretzky, hockey’s greatest of all time (GOAT) once said, “You miss 100% of the shots you don’t take”. Take the shot. Build the “Creating Joy at Work” program. Here’s how……</span></p></section><section data-dcnode-id="4288" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4326" id="st025"><span data-dcnode-id="4329" instrument_node="">2</span><span data-dcnode-id="4328" instrument_node="">. </span><span data-dcnode-id="4327" instrument_node="">Basic Needs: Mission, Vision, Values</span></h2><p data-dcnode-id="4304" id="p0045"><span data-dcnode-id="4321"><span data-dcnode-id="4325" instrument_node="">Feeling happy at work requires that the employee is committed to the primary ideals of the institution or corporation. In business, most companies refer to these core principles in terms of Mission, Vision, and Values. The Mission of the institution refers to the goals that the group is trying to accomplish. The Vision consists of the outcome that one could hope to achieve if all of the group’s aspirations are attained in fulfilling the Mission. The Values describe the overriding ethical principles by which Mission and Vision are to be accomplished. As an example, a </span><a class="topic-link" data-dcnode-id="4323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/radiology" title="Learn more about Radiology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4324" instrument_node="">Radiology</span></a><span data-dcnode-id="4322" instrument_node=""> Department might say its mission is to provide the best oncologic imaging services to patients, with a vision of a department with a network of MR/PET services in its geographic area manned by double-boarded nuclear medicine and subspecialty trained radiologists. This department's values may be rooted in </span></span><em data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">generosity</span></em><span data-dcnode-id="4318" instrument_node=""> and </span><span data-dcnode-id="4314"><em data-dcnode-id="4315"><a class="topic-link" data-dcnode-id="4316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/altruism" title="Learn more about altruism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4317" instrument_node="">altruism</span></a></em></span><span data-dcnode-id="4313" instrument_node=""> by reinvesting all profits towards reducing fees and increasing patient satisfaction. Still another department might put top priority towards developing an artificial intelligence network that enhances human diagnostic abilities (mission) such that they create an amazingly accurate testing facility that (at high gigawatt speed) provides the diagnosis to a patient within minutes of being removed from the imaging modality (vision). The values that they expound might be </span><em data-dcnode-id="4311"><span data-dcnode-id="4312" instrument_node="">innovation</span></em><span data-dcnode-id="4310" instrument_node="">, </span><em data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">accuracy</span></em><span data-dcnode-id="4307" instrument_node="">, and </span><em data-dcnode-id="4305"><span data-dcnode-id="4306" instrument_node="">speed.</span></em></p><p data-dcnode-id="4299" id="p0050"><span data-dcnode-id="4303" instrument_node="">Victor Frankl, a Holocaust survivor and 20th century philosopher and psychiatrist has said “Life is never made unbearable by circumstances, but only by lack of meaning and purpose.” While Frankl emphasized the importance of a “will to meaning”, Friedrich Nietzsche believed in a “will to power” and Sigmund Freud a “will to pleasure”. So too, different departments may focus on mission (meaning), market share (power), or profit (pleasure). In Frankl’s view the “why to live” mission supersedes all else and can be empowering and pleasing. Frankl opines “…success, like happiness, cannot be pursued; it must ensue, and it only does so as the unintended side effect of one’s personal dedication to a cause greater” </span><a class="workspace-trigger" data-dcnode-id="4301" href="#b0010" name="bb0010"><span data-dcnode-id="4302" instrument_node="">[2]</span></a><span data-dcnode-id="4300" instrument_node="">.</span></p><p data-dcnode-id="4294" id="p0055"><span data-dcnode-id="4298" instrument_node="">The key therefore to happy employees is that they believe in the “greater cause”, the trifecta principles (Mission, Vision, Values) of the department so that they feel like their work is meaningful to them…and serves a greater purpose. As one might expect, the best way to get buy-in for these concepts is NOT by a top-down queen bee executive team feeding these critical components to the worker bees. This is a situation where working from the “bottom up”, where employees feel empowered to contribute to the essential principles of the institution, is critical. Even if their input does not meet with the majority view, the fact that their input was sought and considered is important. Many departments cite “Inclusion” as one of their values, but they seem to consider the term only in relation to ethnic diversity. Inclusion’s value is when the opinions and ideas of all employees are considered by all. Peter Kalina wrote, “The input of every team member is needed to optimize performance, as each has worthy contributions to make, and each needs the other to perform at their best” </span><a class="workspace-trigger" data-dcnode-id="4296" href="#b0015" name="bb0015"><span data-dcnode-id="4297" instrument_node="">[3]</span></a><span data-dcnode-id="4295" instrument_node="">. When one performs at one’s best, “pride” is created. Being proud of the quality of one’s work and one’s contribution to the noble cause that the team is pursuing creates tremendous self-satisfaction and joy. Being proud of your place of work and what it symbolizes, the radiology staff of which you are a member, and the work product is very powerful.</span></p><p data-dcnode-id="4289" id="p0060"><span data-dcnode-id="4293" instrument_node="">The Mission Vision Values proposition is a long-term commitment. Refreshing the values, tracking progress towards objectives, and fine-tuning the corporate statements are important to ensure a dedicated workforce and advise the leaders. These goals may be set at a dedicated work retreat. They are that important! Employees are happiest when they believe in what they are trying to accomplish. As Bruce Hillman editorialized, the mission, vision and values “…are more than well-intended sophistry. They are aspirations, the framework for further growth and continuing success” </span><a class="workspace-trigger" data-dcnode-id="4291" href="#b0020" name="bb0020"><span data-dcnode-id="4292" instrument_node="">[4]</span></a><span data-dcnode-id="4290" instrument_node="">.</span></p></section><section data-dcnode-id="4223" id="s0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4284" id="st030"><span data-dcnode-id="4287" instrument_node="">3</span><span data-dcnode-id="4286" instrument_node="">. </span><span data-dcnode-id="4285" instrument_node="">Physical environment</span></h2><p data-dcnode-id="4276" id="p0065"><span data-dcnode-id="4283" instrument_node="">Assembling a unique physical space that promotes cheerfulness can grow employee engagement. Offering an appealing indoor or outdoor space for people to gather is a vital touchpoint generated by many progressive organizations for bolstering employee relationships, creating joy, and sparking creative interactions. Designing the physical environment with decorations, ergonomically idealized furnishings to reduce stress </span><a class="workspace-trigger" data-dcnode-id="4281" href="#b0025" name="bb0025"><span data-dcnode-id="4282" instrument_node="">[5]</span></a><span data-dcnode-id="4280" instrument_node="">, and abundant plants is an effective method of pleasing employees; allowing them the freedom to also design/decorate their own workspace can boost morale </span><a class="workspace-trigger" data-dcnode-id="4278" href="#b0030" name="bb0030"><span data-dcnode-id="4279" instrument_node="">[6]</span></a><span data-dcnode-id="4277" instrument_node="">. Think of how many employees decorate their desk with family photos. Now imagine the entire workspace designed to make colleagues smile.</span></p><p data-dcnode-id="4267" id="p0070"><span data-dcnode-id="4275" instrument_node="">A dedicated area devoted to wellness which includes space for exercise, yoga mats, </span><a class="topic-link" data-dcnode-id="4273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/mindfulness" title="Learn more about mindfulness from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4274" instrument_node="">mindfulness</span></a><span data-dcnode-id="4268"><span data-dcnode-id="4272" instrument_node=""> retreats, and meditation may help with employee “reenergizing”. Group areas for meals, snacks, and coffee breaks are likely to increase joy by promoting commensality. There is a reason why people value the discussions at the water cooler or Coffee Maker—they promote </span><a class="topic-link" data-dcnode-id="4270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/teamwork" title="Learn more about teamwork from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4271" instrument_node="">teamwork</span></a><span data-dcnode-id="4269" instrument_node="">, comradery, and new ideas.</span></span></p><p data-dcnode-id="4256" id="p0075"><span data-dcnode-id="4266" instrument_node="">One can foster healthy physical activity at work by scheduling </span><em data-dcnode-id="4264"><span data-dcnode-id="4265" instrument_node="">“</span></em><span data-dcnode-id="4263" instrument_node="">walking meetings” rather than sedentary “sit-down” office meetings. Ergonomic innovations include elevatable desks for PACS workstations, some of which have treadmill or stationary bike attachments. An organizational design audit can be conducted to enhance the human factors that interface within the reading room. This audit could involve the installation of uniquely designed chairs and monitors, lighting and sound-absorbing panels, and wall art to improve the aesthetics of the office </span><a class="workspace-trigger" data-dcnode-id="4261" href="#b0035" name="bb0035"><span data-dcnode-id="4262" instrument_node="">[7]</span></a><span data-dcnode-id="4260" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4258" href="#b0040" name="bb0040"><span data-dcnode-id="4259" instrument_node="">[8]</span></a><span data-dcnode-id="4257" instrument_node="">.</span></p><p data-dcnode-id="4239" id="p0080"><span data-dcnode-id="4243"><span data-dcnode-id="4251"><span data-dcnode-id="4255" instrument_node="">Courtyards and greenspace are luxuries that most </span><a class="topic-link" data-dcnode-id="4253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/radiology" title="Learn more about radiology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4254" instrument_node="">radiology</span></a><span data-dcnode-id="4252" instrument_node=""> practices cannot accommodate given the need for darkness. At the same time, having a design where people can step out into the sunshine or cool air and see greenery prevents the </span></span><a class="topic-link" data-dcnode-id="4249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/dysphoria" title="Learn more about dysphoria from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4250" instrument_node="">dysphoria</span></a><span data-dcnode-id="4244"><span data-dcnode-id="4248" instrument_node=""> of always being in a shaded environment. Since “seasonal affective disorder”, a known entity endemic in gloomy environments, may be responsive to </span><a class="topic-link" data-dcnode-id="4246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/phototherapy" title="Learn more about light therapy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4247" instrument_node="">light therapy</span></a><span data-dcnode-id="4245" instrument_node=""> </span></span></span><a class="workspace-trigger" data-dcnode-id="4241" href="#b0045" name="bb0045"><span data-dcnode-id="4242" instrument_node="">[9]</span></a><span data-dcnode-id="4240" instrument_node="">, it behooves the employer to provide such luminosity for the radiology denizens of the (sub)basement.</span></p><p data-dcnode-id="4224" id="p0085"><span data-dcnode-id="4234"><span data-dcnode-id="4238" instrument_node="">The physical environment may also be enhanced by using </span><a class="topic-link" data-dcnode-id="4236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/aromatherapy" title="Learn more about aromatherapy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4237" instrument_node="">aromatherapy</span></a><span data-dcnode-id="4235" instrument_node="">. Utilization of psychosocial interventions such as aromatherapy, music, dance and massage can improve the cognitive abilities of patients </span></span><a class="workspace-trigger" data-dcnode-id="4232" href="#b0050" name="bb0050"><span data-dcnode-id="4233" instrument_node="">[10]</span></a><span data-dcnode-id="4231" instrument_node="">. The potential calming and/or focusing impact of olfactory stimuli (peppermint, jasmine, ylang-ylang, 1,8-cineole) has been studied by Heuberger and Ilmberger, albeit variable in its impact on individual subjects </span><a class="workspace-trigger" data-dcnode-id="4229" href="#b0055" name="bb0055"><span data-dcnode-id="4230" instrument_node="">[11]</span></a><span data-dcnode-id="4228" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4226" href="#b0060" name="bb0060"><span data-dcnode-id="4227" instrument_node="">[12]</span></a><span data-dcnode-id="4225" instrument_node="">.</span></p></section><section data-dcnode-id="4103" id="s0020"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4219" id="st035"><span data-dcnode-id="4222" instrument_node="">4</span><span data-dcnode-id="4221" instrument_node="">. </span><span data-dcnode-id="4220" instrument_node="">Attitude</span></h2><section data-dcnode-id="4175" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4215" id="st040"><span data-dcnode-id="4218" instrument_node="">4.1</span><span data-dcnode-id="4217" instrument_node="">. </span><span data-dcnode-id="4216" instrument_node="">Gratitude and appreciation</span></h3><p data-dcnode-id="4207" id="p0090"><span data-dcnode-id="4214" instrument_node="">The feeling of gratitude is one of the most essential emotions experienced in positive environments. It is often expressed as an attitude of thankfulness and acknowledgment of the surrounding positivity and it is strongly associated with the concepts of hope, happiness, and optimism </span><a class="workspace-trigger" data-dcnode-id="4212" href="#b0065" name="bb0065"><span data-dcnode-id="4213" instrument_node="">[13]</span></a><span data-dcnode-id="4211" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4209" href="#b0070" name="bb0070"><span data-dcnode-id="4210" instrument_node="">[14]</span></a><span data-dcnode-id="4208" instrument_node="">.</span></p><p data-dcnode-id="4199" id="p0095"><span data-dcnode-id="4206" instrument_node="">Gratitude in the workplace directly improves the cooperative environment and increases employees' well-being while minimizing undesirable emotions such as jealousy, perception of injustice, and rancor </span><a class="workspace-trigger" data-dcnode-id="4204" href="#b0075" name="bb0075"><span data-dcnode-id="4205" instrument_node="">[15]</span></a><span data-dcnode-id="4203" instrument_node="">. McCullough et al. </span><a class="workspace-trigger" data-dcnode-id="4201" href="#b0080" name="bb0080"><span data-dcnode-id="4202" instrument_node="">[16]</span></a><span data-dcnode-id="4200" instrument_node=""> suggested that gratitude causes not only the appreciation of one’s colleagues, but also makes one feel grateful about one’s own life, resulting in more positive feelings compared to people who do not express gratitude to others and about their own lot in life.</span></p><p data-dcnode-id="4187" id="p0100"><span data-dcnode-id="4198" instrument_node="">A grateful working environment enhances psychological security </span><a class="workspace-trigger" data-dcnode-id="4196" href="#b0085" name="bb0085"><span data-dcnode-id="4197" instrument_node="">[17]</span></a><span data-dcnode-id="4195" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4193" href="#b0090" name="bb0090"><span data-dcnode-id="4194" instrument_node="">[18]</span></a><span data-dcnode-id="4188"><span data-dcnode-id="4192" instrument_node="">. When individuals feel psychologically safe at their workplace, they have more confidence to take risks and provide innovative ideas to the team. Grateful employees view their colleagues in a more favorable perspective, enhancing organizational behaviors, increasing reciprocity, cooperation, and </span><a class="topic-link" data-dcnode-id="4190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/altruism" title="Learn more about altruism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4191" instrument_node="">altruism</span></a><span data-dcnode-id="4189" instrument_node="">.</span></span></p><p data-dcnode-id="4176" id="p0105"><span data-dcnode-id="4186" instrument_node="">Employees will feel appreciated for their contributions to the business if they receive expressions of gratitude </span><a class="workspace-trigger" data-dcnode-id="4184" href="#b0095" name="bb0095"><span data-dcnode-id="4185" instrument_node="">[19]</span></a><span data-dcnode-id="4183" instrument_node="">. The act of appreciation improves prosocial organizational behaviors such as helping, sharing, donating, cooperating, and volunteering </span><a class="workspace-trigger" data-dcnode-id="4181" href="#b0100" name="bb0100"><span data-dcnode-id="4182" instrument_node="">[20]</span></a><span data-dcnode-id="4180" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4178" href="#b0105" name="bb0105"><span data-dcnode-id="4179" instrument_node="">[21]</span></a><span data-dcnode-id="4177" instrument_node="">. Setting aside time in group meetings to acknowledge others, recognizing employee contributions in newsletters, hailing an exceptional employee each month with a parking spot at the front of the building, expressing heartfelt thanks in one on one sessions are all steps executive leaders can easily implement in a sincere effort to amplify an attitude of gratitude at work. Workplace social media sites can also be used to promote a practice of grateful recognition, publicly fueling employees’ motivation.</span></p></section><section data-dcnode-id="4156" id="s0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4171" id="st045"><span data-dcnode-id="4174" instrument_node="">4.2</span><span data-dcnode-id="4173" instrument_node="">. </span><span data-dcnode-id="4172" instrument_node="">Servant leadership</span></h3><p data-dcnode-id="4157" id="p0110"><span data-dcnode-id="4170" instrument_node="">When it comes to employees’ mental wellness and job satisfaction, servant leadership may offer a philosophical atmosphere that brightens the place of work. Greenleaf presented servant leadership theory for the first time in 1977, indicating that “A servant-leader focuses primarily on the growth and well-being of the people and the communities to which they belong. The servant-leader shares power, puts the needs of others first, and helps people develop and perform as highly as possible” </span><a class="workspace-trigger" data-dcnode-id="4168" href="#b0110" name="bb0110"><span data-dcnode-id="4169" instrument_node="">[22]</span></a><span data-dcnode-id="4167" instrument_node="">. Servant leadership may be defined as a leader's propensity to empower and assist junior colleagues by placing a higher emphasis on their well-being than on the leader’s own position. This is basic altruism. The habits of successful servant leaders include listening and perceiving, curing, providing meaning, caring, and creating. Servant leaders invest in faculty development programs, create a sense of community, open doors for others, and mentor people for their personal growth </span><a class="workspace-trigger" data-dcnode-id="4165" href="#b0110" name="bb0110"><span data-dcnode-id="4166" instrument_node="">[22]</span></a><span data-dcnode-id="4164" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4162" href="#b0115" name="bb0115"><span data-dcnode-id="4163" instrument_node="">[23]</span></a><span data-dcnode-id="4161" instrument_node="">. Servant leaders identify potential areas of progress, motivate others, and help others achieve personal desired goals. Servant leadership is outward-looking. These executives make a significant investment in the relationships with their followers and can establish deep personal connections </span><a class="workspace-trigger" data-dcnode-id="4159" href="#b0120" name="bb0120"><span data-dcnode-id="4160" instrument_node="">[24]</span></a><span data-dcnode-id="4158" instrument_node="">. In return, employees are grateful and joyful.</span></p></section><section data-dcnode-id="4140" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4152" id="st050"><span data-dcnode-id="4155" instrument_node="">4.3</span><span data-dcnode-id="4154" instrument_node="">. </span><span data-dcnode-id="4153" instrument_node="">Hope</span></h3><p data-dcnode-id="4141" id="p0115"><span data-dcnode-id="4151" instrument_node="">Hope is an essential human trait that may be a major characteristic of employees who find pleasure and satisfaction at work. Usually, those hopes are for advancement/acknowledgement either at the job or in the regional/national/global community. For some, the hope may be for an improved financial position, a leadership role, a noteworthy discovery. In the context of the workplace, hope has been found to promote and maintain the ability of employees to endure hardships and bounce back in ways that increase their performance </span><a class="workspace-trigger" data-dcnode-id="4149" href="#b0125" name="bb0125"><span data-dcnode-id="4150" instrument_node="">[25]</span></a><span data-dcnode-id="4148" instrument_node="">. In the face of downturns, pandemics, and disappointing results, a workroom full of hope for improvement bolsters security and drives progress. Hope at work complements earlier theories, such as Bandura's (1997) theory </span><a class="workspace-trigger" data-dcnode-id="4146" href="#b0130" name="bb0130"><span data-dcnode-id="4147" instrument_node="">[26]</span></a><span data-dcnode-id="4145" instrument_node=""> of self-efficacy and Mitchell's (1997) theory </span><a class="workspace-trigger" data-dcnode-id="4143" href="#b0135" name="bb0135"><span data-dcnode-id="4144" instrument_node="">[27]</span></a><span data-dcnode-id="4142" instrument_node=""> of work motivation, which have each contributed to our understanding of how we perform and succeed in the workplace.</span></p></section><section data-dcnode-id="4104" id="s0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4136" id="st055"><span data-dcnode-id="4139" instrument_node="">4.4</span><span data-dcnode-id="4138" instrument_node="">. </span><span data-dcnode-id="4137" instrument_node="">Interpersonal connections</span></h3><p data-dcnode-id="4122" id="p0120"><span data-dcnode-id="4135" instrument_node="">One of the most valuable Gallup poll questions measuring employee engagement is “Do you have a best friend at work?” Why is this asked? The Gallup surveyors have found that the correlation between having a best friend at work and the amount of effort employees expend in their job is strong. Women with a best friend at work are twice as “engaged” (63%) as those without (29%) </span><a class="workspace-trigger" data-dcnode-id="4133" href="#b0140" name="bb0140"><span data-dcnode-id="4134" instrument_node="">[28]</span></a><span data-dcnode-id="4132" instrument_node="">. Fulfilling interpersonal relationships lead workers to be more connected, driven, and happy at work </span><a class="workspace-trigger" data-dcnode-id="4130" href="#b0145" name="bb0145"><span data-dcnode-id="4131" instrument_node="">[29]</span></a><span data-dcnode-id="4129" instrument_node="">. In qualitative research on the feelings of pleasure at work, Jo Manion et al. </span><a class="workspace-trigger" data-dcnode-id="4127" href="#b0150" name="bb0150"><span data-dcnode-id="4128" instrument_node="">[30]</span></a><span data-dcnode-id="4126" instrument_node=""> found that four pathways led to workplace joy: connections, love of the job, accomplishment, and recognition. Joy at work is derived from relationships and connections established in the workplace. Fishman et al. </span><a class="workspace-trigger" data-dcnode-id="4124" href="#b0155" name="bb0155"><span data-dcnode-id="4125" instrument_node="">[31]</span></a><span data-dcnode-id="4123" instrument_node=""> described strategies that can impart joy in the workplace of radiologist, focusing on social interactions including non-work-related group discussions, volunteer efforts, and participation in workplace operations. These activities build rapport among colleagues. Most “individuals” like to feel a part of a successful “team”. Sharing similar interests that stimulate discussion and engagement will enhance interpersonal connections; i.e. there is value in the whole team dressing up for Halloween; distributing Soccer Jerseys before the big game and having company logos on swag to emphasize members’ common interests.</span></p><p data-dcnode-id="4120" id="p0125"><span data-dcnode-id="4121" instrument_node="">The modern office has several options for interpersonal communication. Programs like “Slack” or “MS Teams” allow a constant stream of conversation in the department without having to leave one’s cubicle/reading room. Participation by remote enhances the feel of a virtual office and having self-made icons or emojis to represent one’s personality converts regular discourse into a virtual computer game that all may enjoy… or find distracting.</span></p><p data-dcnode-id="4105" id="p0130"><span data-dcnode-id="4115"><span data-dcnode-id="4119" instrument_node="">For those who prefer in person “live” interactions, several potential activities throughout the workday (tea or coffee hour, lunch breaks, two minute dance raves, and lunchtime strolls) or after work (e.g., dining out, happy hour, movie night, sporting events, karaoke, concerts, bowling, kickball tourneys, or outdoor adventures) can augment effective interpersonal connections. Because of the increasing isolation caused by our dispersed work settings in the COVID era, participation in such group activities and volunteer community efforts is helpful to build group cohesiveness and promote </span><a class="topic-link" data-dcnode-id="4117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/teamwork" title="Learn more about teamwork from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4118" instrument_node="">teamwork</span></a><span data-dcnode-id="4116" instrument_node=""> </span></span><a class="workspace-trigger" data-dcnode-id="4113" href="#b0155" name="bb0155"><span data-dcnode-id="4114" instrument_node="">[31]</span></a><span data-dcnode-id="4112" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4110" href="#b0160" name="bb0160"><span data-dcnode-id="4111" instrument_node="">[32]</span></a><span data-dcnode-id="4109" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4107" href="#b0165" name="bb0165"><span data-dcnode-id="4108" instrument_node="">[33]</span></a><span data-dcnode-id="4106" instrument_node="">.</span></p></section></section><section data-dcnode-id="4004" id="s0045"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4099" id="st060"><span data-dcnode-id="4102" instrument_node="">5</span><span data-dcnode-id="4101" instrument_node="">. </span><span data-dcnode-id="4100" instrument_node="">Fun, humor, and games</span></h2><section data-dcnode-id="4072" id="s0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4095" id="st065"><span data-dcnode-id="4098" instrument_node="">5.1</span><span data-dcnode-id="4097" instrument_node="">. </span><span data-dcnode-id="4096" instrument_node="">Fun</span></h3><p data-dcnode-id="4084" id="p0135"><span data-dcnode-id="4094" instrument_node="">The notion of having fun at work was promoted in Silicon Valley during the dot-com era of the 1990s, when start-up businesses, staffed by newly graduated technology-driven workers, started to develop a new corporate culture. The workplace atmosphere had to change to meet the demands of these workers who were spending more than 80&nbsp;h a week creating new enterprises. The “work” space became not just a setting for occupational labor but also recreational activities. Multiple fun amenities such as pool tables, jukeboxes, video gaming machines, golf greens, coffee bars, and beanbag chairs were incorporated into the office environment to offset the long hours in the building </span><a class="workspace-trigger" data-dcnode-id="4092" href="#b0170" name="bb0170"><span data-dcnode-id="4093" instrument_node="">[34]</span></a><span data-dcnode-id="4091" instrument_node="">. The physical environment was not the only thing that dot-com businesses revised. Employees started to dress more casually, not just on Fridays, but on a daily basis.</span><a class="workspace-trigger" data-dcnode-id="4089" href="#b0175" name="bb0175"><span data-dcnode-id="4090" instrument_node="">[35]</span></a><span data-dcnode-id="4088" instrument_node=""> At these companies, the whole environment was filled with a sense of playfulness and freshness. Business became less connected with labor and more associated with fun </span><a class="workspace-trigger" data-dcnode-id="4086" href="#b0170" name="bb0170"><span data-dcnode-id="4087" instrument_node="">[34]</span></a><span data-dcnode-id="4085" instrument_node="">.</span></p><p data-dcnode-id="4073" id="p0140"><span data-dcnode-id="4083" instrument_node="">A study of 572 human resource experts was conducted by Ford et al. </span><a class="workspace-trigger" data-dcnode-id="4081" href="#b0180" name="bb0180"><span data-dcnode-id="4082" instrument_node="">[36]</span></a><span data-dcnode-id="4080" instrument_node=""> in 2003, to find the most common activities that create a fun work environment. Casual dress days, employee recognition and incentives, and company-provided food and refreshments/parties ranked as the top three most enjoyable events. Such engagement should be voluntary. Workplaces that are described as “fun” have fewer issues with employee absenteeism and turnover </span><a class="workspace-trigger" data-dcnode-id="4078" href="#b0185" name="bb0185"><span data-dcnode-id="4079" instrument_node="">[37]</span></a><span data-dcnode-id="4077" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4075" href="#b0190" name="bb0190"><span data-dcnode-id="4076" instrument_node="">[38]</span></a><span data-dcnode-id="4074" instrument_node="">.</span></p></section><section data-dcnode-id="4027" id="s0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4068" id="st070"><span data-dcnode-id="4071" instrument_node="">5.2</span><span data-dcnode-id="4070" instrument_node="">. </span><span data-dcnode-id="4069" instrument_node="">Humor</span></h3><p data-dcnode-id="4039" id="p0145"><span data-dcnode-id="4067" instrument_node="">Humor can improve communication and increase cohesion in the workplace. These factors are fundamental in establishing and maintaining an organization’s culture </span><a class="workspace-trigger" data-dcnode-id="4065" href="#b0195" name="bb0195"><span data-dcnode-id="4066" instrument_node="">[39]</span></a><span data-dcnode-id="4064" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4062" href="#b0200" name="bb0200"><span data-dcnode-id="4063" instrument_node="">[40]</span></a><span data-dcnode-id="4053"><span data-dcnode-id="4057"><span data-dcnode-id="4061" instrument_node="">. Humor is also a coping mechanism. According to Cindy Lamothe, “Laughter </span><a class="topic-link" data-dcnode-id="4059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/dopamine-release" title="Learn more about releases dopamine from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4060" instrument_node="">releases dopamine</span></a><span data-dcnode-id="4058" instrument_node="">, enhances immunity, lowers </span></span><a class="topic-link" data-dcnode-id="4055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/stress-hormone" title="Learn more about stress hormones from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4056" instrument_node="">stress hormones</span></a><span data-dcnode-id="4054" instrument_node="">, increases blood flow, and strengthens the heart, but beyond its many health perks, a good sense of humor leads to increased optimism, which in turn, boosts our</span></span><span data-dcnode-id="4052" instrument_node="">&nbsp;</span><span data-dcnode-id="4051" instrument_node="">resiliency</span><span data-dcnode-id="4050" instrument_node="">&nbsp;</span><span data-dcnode-id="4049" instrument_node="">and enables us to thrive when we’re faced with adversity” </span><a class="workspace-trigger" data-dcnode-id="4047" href="#b0205" name="bb0205"><span data-dcnode-id="4048" instrument_node="">[41]</span></a><span data-dcnode-id="4046" instrument_node="">. A recent study showed that the use of humor as a coping strategy was effective in reducing emotional stress among physicians and nurses working with patients with AIDS and cancer-related illnesses </span><a class="workspace-trigger" data-dcnode-id="4044" href="#b0210" name="bb0210"><span data-dcnode-id="4045" instrument_node="">[42]</span></a><span data-dcnode-id="4043" instrument_node="">. Examples of employment humor programs include decorating the lounge or break room with funny cartoons, adding humorous quotes to meeting agendas, hiring clowns/mimes to entertain workers, and writing funny messages in memos and newsletters </span><a class="workspace-trigger" data-dcnode-id="4041" href="#b0215" name="bb0215"><span data-dcnode-id="4042" instrument_node="">[43]</span></a><span data-dcnode-id="4040" instrument_node="">.</span></p><p data-dcnode-id="4028" id="p0150"><span data-dcnode-id="4038" instrument_node="">Humor is a complicated concept and often is culturally specific and can be more complex in multiethnic workplaces. What one may perceive as a good laugh may be considered an insult in another setting </span><a class="workspace-trigger" data-dcnode-id="4036" href="#b0220" name="bb0220"><span data-dcnode-id="4037" instrument_node="">[44]</span></a><span data-dcnode-id="4035" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4033" href="#b0225" name="bb0225"><span data-dcnode-id="4034" instrument_node="">[45]</span></a><span data-dcnode-id="4032" instrument_node="">. The use of humor therefore must be sensitive to the nuances of an ever more diverse workplace. Slapstick comedy and G-rated themes are likely to be more widely accepted. Self-deprecating humor on the part of leadership is a good means of connecting with employees and humanizing management. It also leads to improved emotional well-being and sociability </span><a class="workspace-trigger" data-dcnode-id="4030" href="#b0230" name="bb0230"><span data-dcnode-id="4031" instrument_node="">[46]</span></a><span data-dcnode-id="4029" instrument_node="">.</span></p></section><section data-dcnode-id="4005" id="s0060"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4023" id="st075"><span data-dcnode-id="4026" instrument_node="">5.3</span><span data-dcnode-id="4025" instrument_node="">. </span><span data-dcnode-id="4024" instrument_node="">Games</span></h3><p data-dcnode-id="4006" id="p0155"><span data-dcnode-id="4022" instrument_node="">In the effort to make the workplace a more enjoyable place, some employees found that games at work help to briefly mentally detach from job duties and refill energy resources before returning to workstations </span><a class="workspace-trigger" data-dcnode-id="4020" href="#b0235" name="bb0235"><span data-dcnode-id="4021" instrument_node="">[47]</span></a><span data-dcnode-id="4019" instrument_node="">. Playing at work provides a break in the workday, allows employees to connect with each other positively, and enhances work relations, all of which are beneficial to workers in terms of motivation, engagement, connections, as well as physical and mental health </span><a class="workspace-trigger" data-dcnode-id="4017" href="#b0190" name="bb0190"><span data-dcnode-id="4018" instrument_node="">[38]</span></a><span data-dcnode-id="4016" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4014" href="#b0240" name="bb0240"><span data-dcnode-id="4015" instrument_node="">[48]</span></a><span data-dcnode-id="4013" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4011" href="#b0245" name="bb0245"><span data-dcnode-id="4012" instrument_node="">[49]</span></a><span data-dcnode-id="4010" instrument_node="">. Employees of a telesales business participated in longitudinal research in which a play-at-work intervention was implemented. The participants expressed a sense of stress relief, enjoyment at getting to know co-workers better, and more energy after gaming. Notably, the socialization of the games was critical; employees mostly preferred group-based games (charades or foosball) and showed little to no interest in the individual games (adult coloring and crossword puzzles) </span><a class="workspace-trigger" data-dcnode-id="4008" href="#b0250" name="bb0250"><span data-dcnode-id="4009" instrument_node="">[50]</span></a><span data-dcnode-id="4007" instrument_node="">.</span></p></section></section><section data-dcnode-id="3928" id="s0065"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4000" id="st080"><span data-dcnode-id="4003" instrument_node="">6</span><span data-dcnode-id="4002" instrument_node="">. </span><span data-dcnode-id="4001" instrument_node="">Wellness activities</span></h2><p data-dcnode-id="3979" id="p0160"><span data-dcnode-id="3999" instrument_node="">Wellness is defined by the National Wellness Institute as “a conscious self-directed and evolving process of achieving full potential”. It includes six domains contributing to quality of life: occupational, physical, social, emotional, spiritual, and intellectual </span><a class="workspace-trigger" data-dcnode-id="3997" href="#b0205" name="bb0205"><span data-dcnode-id="3998" instrument_node="">[41]</span></a><span data-dcnode-id="3992"><span data-dcnode-id="3996" instrument_node="">. Wellness is a comprehensive concept with burnout and stress on one extreme and joy and engagement on the other. Achieving a state of wellness in the work environment is a continuous multistep journey that is the responsibility of team members at all levels, including administrators, physicians, technologists, nurses, and practice-support staff. Effective personal strategies include </span><a class="topic-link" data-dcnode-id="3994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/mindfulness" title="Learn more about mindfulness from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3995" instrument_node="">mindfulness</span></a><span data-dcnode-id="3993" instrument_node="">, stress management, communication skills training, exercise programs, meditation, and participation in group activities to decrease isolation while promoting community and connectedness </span></span><a class="workspace-trigger" data-dcnode-id="3990" href="#b0070" name="bb0070"><span data-dcnode-id="3991" instrument_node="">[14]</span></a><span data-dcnode-id="3989" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3987" href="#b0155" name="bb0155"><span data-dcnode-id="3988" instrument_node="">[31]</span></a><span data-dcnode-id="3986" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3984" href="#b0255" name="bb0255"><span data-dcnode-id="3985" instrument_node="">[51]</span></a><span data-dcnode-id="3983" instrument_node="">. A culture that incorporates peer support programs, leadership development, appreciation and compassion, and flexibility should be combined with personal resiliency skills and efficient practice patterns to optimize joy and wellness </span><a class="workspace-trigger" data-dcnode-id="3981" href="#b0260" name="bb0260"><span data-dcnode-id="3982" instrument_node="">[52]</span></a><span data-dcnode-id="3980" instrument_node="">.</span></p><p data-dcnode-id="3943" id="p0165"><span data-dcnode-id="3978" instrument_node="">Yoga is known to reduce stress and improve quality of life </span><a class="workspace-trigger" data-dcnode-id="3976" href="#b0265" name="bb0265"><span data-dcnode-id="3977" instrument_node="">[53]</span></a><span data-dcnode-id="3963"><span data-dcnode-id="3967"><span data-dcnode-id="3971"><span data-dcnode-id="3975" instrument_node="">. Yoga can alter stress-related physiological markers like </span><a class="topic-link" data-dcnode-id="3973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/hydrocortisone" title="Learn more about cortisol from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3974" instrument_node="">cortisol</span></a><span data-dcnode-id="3972" instrument_node="">, optimize secretion of sympathetic hormones, improve </span></span><a class="topic-link" data-dcnode-id="3969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/parasympathetic-tone" title="Learn more about parasympathetic activity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3970" instrument_node="">parasympathetic activity</span></a><span data-dcnode-id="3968" instrument_node=""> and decrease </span></span><a class="topic-link" data-dcnode-id="3965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/systolic-blood-pressure" title="Learn more about systolic blood pressure from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3966" instrument_node="">systolic blood pressure</span></a><span data-dcnode-id="3964" instrument_node=""> and heart rate </span></span><a class="workspace-trigger" data-dcnode-id="3961" href="#b0255" name="bb0255"><span data-dcnode-id="3962" instrument_node="">[51]</span></a><span data-dcnode-id="3960" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3958" href="#b0260" name="bb0260"><span data-dcnode-id="3959" instrument_node="">[52]</span></a><span data-dcnode-id="3957" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3955" href="#b0270" name="bb0270"><span data-dcnode-id="3956" instrument_node="">[54]</span></a><span data-dcnode-id="3950"><span data-dcnode-id="3954" instrument_node="">. The efficacy of Yoga in corporate </span><a class="topic-link" data-dcnode-id="3952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/wellness-program" title="Learn more about wellness programs from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3953" instrument_node="">wellness programs</span></a><span data-dcnode-id="3951" instrument_node=""> used in workplaces has been studied with the results showing that Yoga has a positive impact on health and decreases job-associated stress </span></span><a class="workspace-trigger" data-dcnode-id="3948" href="#b0275" name="bb0275"><span data-dcnode-id="3949" instrument_node="">[55]</span></a><span data-dcnode-id="3947" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3945" href="#b0280" name="bb0280"><span data-dcnode-id="3946" instrument_node="">[56]</span></a><span data-dcnode-id="3944" instrument_node="">.</span></p><p data-dcnode-id="3929" id="p0170"><span data-dcnode-id="3942" instrument_node="">Mindfulness is defined as the “nonjudgmental observation of the ongoing stream of internal and external stimuli as they arise” </span><a class="workspace-trigger" data-dcnode-id="3940" href="#b0285" name="bb0285"><span data-dcnode-id="3941" instrument_node="">[57]</span></a><span data-dcnode-id="3939" instrument_node="">, or as the “practice of paying attention in a particular way, on purpose, in the present moment and nonjudgmentally” </span><a class="workspace-trigger" data-dcnode-id="3937" href="#b0290" name="bb0290"><span data-dcnode-id="3938" instrument_node="">[58]</span></a><span data-dcnode-id="3936" instrument_node="">. By practicing mindfulness, people are able to get a better understanding of how their thoughts, feelings, sensations, and behavioral impulses originate and influence their overall health and well-being. Mindfulness-based techniques, according to many studies, have been shown to enhance mood and positive affect, energy, and social relationships while simultaneously reduce stress, anxiety and depression. In addition, even short-term mindfulness training improves emotional regulation and control </span><a class="workspace-trigger" data-dcnode-id="3934" href="#b0295" name="bb0295"><span data-dcnode-id="3935" instrument_node="">[59]</span></a><span data-dcnode-id="3933" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3931" href="#b0300" name="bb0300"><span data-dcnode-id="3932" instrument_node="">[60]</span></a><span data-dcnode-id="3930" instrument_node="">. These advantages may be especially relevant to a work environment due to their potential benefits to productivity.</span></p></section><section data-dcnode-id="3910" id="s0070"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3924" id="st085"><span data-dcnode-id="3927" instrument_node="">7</span><span data-dcnode-id="3926" instrument_node="">. </span><span data-dcnode-id="3925" instrument_node="">Celebrations</span></h2><p data-dcnode-id="3913" id="p0175"><span data-dcnode-id="3923" instrument_node="">Work should be the site of celebrations and parties. One should promote the Pavlovian association of the workplace with fun and identify opportunities to celebrate </span><a class="workspace-trigger" data-dcnode-id="3921" href="#b0155" name="bb0155"><span data-dcnode-id="3922" instrument_node="">[31]</span></a><span data-dcnode-id="3920" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3918" href="#b0305" name="bb0305"><span data-dcnode-id="3919" instrument_node="">[61]</span></a><span data-dcnode-id="3917" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3915" href="#b0310" name="bb0310"><span data-dcnode-id="3916" instrument_node="">[62]</span></a><span data-dcnode-id="3914" instrument_node="">. Birthdays, family events (births, engagements), service milestones, new recruits, retirements, academic achievements (grants, research awards, published manuscripts), and triumphant board examination results are all causes for staff celebrations. Create reasons for celebration! One of our colleagues was known to break out the party favors for such events as the anniversary of the Moon Landing, Elvis Presley’s birthday, and the day avocado toast was created.</span></p><p data-dcnode-id="3911" id="p0180"><span data-dcnode-id="3912" instrument_node="">This philosophy of partying at the workplace is important because the opposite mindset, that one has to leave the workplace to experience joy, happiness and celebration, is counterproductive. Such celebrations have a threefold benefit. In advance of the celebration, there is the excitement of planning the party, decorations, menu, and invitations. At the time of the celebration of an accomplishment, there is an environment of warmth, acceptance, recognition, and gratitude for those recognized for achieving a milestone. Often those receiving the recognition will credit others in the group, multiplying happiness. After the event, there is the posting of material, photos, and conversations about the party. If all three of these pleasurable activities occur at work, then work is associated with a place where good times are had.</span></p></section><section data-dcnode-id="3867" id="s0075"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3906" id="st090"><span data-dcnode-id="3909" instrument_node="">8</span><span data-dcnode-id="3908" instrument_node="">. </span><span data-dcnode-id="3907" instrument_node="">Compensation</span></h2><p data-dcnode-id="3893" id="p0185"><span data-dcnode-id="3901"><span data-dcnode-id="3905" instrument_node="">There has been extensive literature regarding the relationship between money and happiness. While the expression “Money cannot buy happiness” is true in most situations, the lack of money can certainly lead to </span><a class="topic-link" data-dcnode-id="3903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/unhappiness" title="Learn more about unhappiness from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3904" instrument_node="">unhappiness</span></a><span data-dcnode-id="3902" instrument_node="">. Although different top values vary by the study, it is said that happiness tracks to annual family income linearly up to about $93,000 </span></span><a class="workspace-trigger" data-dcnode-id="3899" href="#b0315" name="bb0315"><span data-dcnode-id="3900" instrument_node="">[63]</span></a><span data-dcnode-id="3894"><span data-dcnode-id="3898" instrument_node="">. After this value, the relationship between added income and additional happiness becomes less direct. Certainly, when dealing with typical </span><a class="topic-link" data-dcnode-id="3896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/radiology" title="Learn more about radiology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3897" instrument_node="">radiology</span></a><span data-dcnode-id="3895" instrument_node=""> salaries the academic department’s physician salaries will likely exceed this threshold and certainly surpassed at current private practice income levels across the globe.</span></span></p><p data-dcnode-id="3875" id="p0190"><span data-dcnode-id="3888"><span data-dcnode-id="3892" instrument_node="">However, an absence of equity and/or fairness can obliterate any upper limit of income happiness. If an employee feels that his/her compensation is discordant with another member of the department performing the same work, it is likely to cause unhappiness. Gender inequity is a definite disincentivizer. Similarly, if an employee feels that the employment package does not fairly compensate for the work being done, it can lead to unhappiness. That is particularly true in the construction of incentive plans. In the academic world, those individuals who spend the extra time protocoling studies, meeting with clinicians, </span><a class="topic-link" data-dcnode-id="3890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/patient-monitoring" title="Learn more about monitoring patients from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3891" instrument_node="">monitoring patients</span></a><span data-dcnode-id="3889" instrument_node="">, teaching medical trainees, all of which may lead to lower levels of daily RVUs produced, often feel devalued in a compensation scheme that emphasizes clinical productivity </span></span><a class="workspace-trigger" data-dcnode-id="3886" href="#b0320" name="bb0320"><span data-dcnode-id="3887" instrument_node="">[64]</span></a><span data-dcnode-id="3885" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3883" href="#b0325" name="bb0325"><span data-dcnode-id="3884" instrument_node="">[65]</span></a><span data-dcnode-id="3882" instrument_node="">. When the research efforts of clinical faculty are not rewarded despite being part of the academic mission it is disheartening </span><a class="workspace-trigger" data-dcnode-id="3880" href="#b0330" name="bb0330"><span data-dcnode-id="3881" instrument_node="">[66]</span></a><span data-dcnode-id="3879" instrument_node="">. Having an incentive program which is vetted by the entire faculty, after proposals by a diverse committee, leads to happier faculty </span><a class="workspace-trigger" data-dcnode-id="3877" href="#b0335" name="bb0335"><span data-dcnode-id="3878" instrument_node="">[67]</span></a><span data-dcnode-id="3876" instrument_node="">.</span></p><p data-dcnode-id="3870" id="p0195"><span data-dcnode-id="3874" instrument_node="">Similarly, Ph.D. research scientists in an academic department should be recognized for performance above expectations </span><a class="workspace-trigger" data-dcnode-id="3872" href="#b0340" name="bb0340"><span data-dcnode-id="3873" instrument_node="">[68]</span></a><span data-dcnode-id="3871" instrument_node="">. Those that are bonused based on NIH grant direct costs are often favored for the 3–5&nbsp;years duration of the grant (even though that submission was accepted one year). Making sure that non-NIH foundation or society grants are recognized as being “valued” is important to those faculty who must cover their salaries by grantsmanship. Others may argue that manuscript production should be the most valued research scientist output, rather than procuring grants.</span></p><p data-dcnode-id="3868" id="p0200"><span data-dcnode-id="3869" instrument_node="">Alternative (non-monetary) means for showing appreciation for each department members’ contribution to the practice is also effective in augmenting happiness in the workforce. The “employee of the month” recognition referred to earlier is effective as an acknowledgement of the contribution of that employee to the group. In radiology circles, public tributes by means of newsletters or callouts at departmental meetings for those accomplishments that are mission-centric are effective means for improving employee satisfaction. Leading the whole group in applause for a faculty member’s promotion or a practitioner’s praise from a Tumor Board is a simple show of appreciation that works. Quarterly awards that are of value for teaching, collaborations, business development, grantsmanship, scholarly activity, quality and safety programs, committee work, editorial board assignment, NIH study review selection, etc. are just some ideas for expressions of appreciation that lead to delighted faculty.</span></p></section><section data-dcnode-id="3860" id="s0080"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3863" id="st095"><span data-dcnode-id="3866" instrument_node="">9</span><span data-dcnode-id="3865" instrument_node="">. </span><span data-dcnode-id="3864" instrument_node="">Start today</span></h2><p data-dcnode-id="3861" id="p0205"><span data-dcnode-id="3862" instrument_node="">There are some “low hanging fruit” steps that can be implemented immediately to change your organizational culture into a joyous one. Simple steps take little effort such as (1) appointing a “Wellness/Joyfulness Ambassador” for the department whose goal is to create a jovial atmosphere, (2) transforming the décor of the department into rich colors, (3) adorning the hallways with plants, (4) creating an employee of the week/month/quarter award, (5) booking celebrations at the work site, (6) posting birthdays each week, (7) organizing 5&nbsp;min meditation breathing sessions by a knowledgeable faculty member, and (8) establishing a communal eating area for coffee/lunch breaks for interpersonal interactions. Longer term goals would include (1) organizing a “mission/vision/values” retreat, (2) creating a compensation and equity committee, (3) establishing celebrations of departmental kudos with party favors for grants, awards, major papers achieved, (4) beginning each faculty meeting with expressions of appreciation and gratitude, and (5) espousing a new philosophy of servant leadership that gives credit, takes blame, and looks outwardly at opportunities for employees to grow.</span></p></section><section data-dcnode-id="3840" id="s0085"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3856" id="st100"><span data-dcnode-id="3859" instrument_node="">10</span><span data-dcnode-id="3858" instrument_node="">. </span><span data-dcnode-id="3857" instrument_node="">Conclusion</span></h2><p data-dcnode-id="3854" id="p0210"><span data-dcnode-id="3855" instrument_node="">When employees are committed to the mission, vision, and values of the enterprise and feel that they are contributing to their fulfillment, they are more content at work. To achieve a greater sense of joy at work requires attention paid to the physical and psychological environment and should be strategically addressed to augment happiness. The latter is best achieved through expressions of gratitude, appreciation, humor, and celebration in the workplace. Positive associations of pleasure with the workplace will lead to enthusiasm for spending time at work and increased engagement, effectiveness, and quality of work by employees. While equitable compensation is important to workers, recognition for the contributions they make to the enterprise also solicits feelings of self-worth and joy.</span></p><section data-dcnode-id="3841" id="s0090"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3852" id="st105"><span data-dcnode-id="3853" instrument_node="">CRediT authorship contribution statement</span></h3><p data-dcnode-id="3842" id="p0215"><strong data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">Rozita Jalilianhasanpour:</span></strong><span data-dcnode-id="3849" instrument_node=""> Data curation, Formal analysis, Investigation, Methodology, Supervision, Validation, Writing – original draft, Writing – review &amp; editing. </span><strong data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">Shadi Asadollahi:</span></strong><span data-dcnode-id="3846" instrument_node=""> Data curation, Formal analysis, Investigation, Methodology, Supervision, Validation, Writing – original draft, Writing – review &amp; editing. </span><strong data-dcnode-id="3844"><span data-dcnode-id="3845" instrument_node="">David M. Yousem:</span></strong><span data-dcnode-id="3843" instrument_node=""> Conceptualization, Data curation, Formal analysis, Investigation, Methodology, Project administration, Resources, Software, Supervision, Validation, Writing – original draft, Writing – review &amp; editing.</span></p></section></section></div><section data-dcnode-id="3834" id="coi005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3837" id="st110"><span data-dcnode-id="3838" instrument_node="">Declaration of Competing Interest</span></h2><p data-dcnode-id="3835" id="p0220"><span data-dcnode-id="3836" instrument_node="">The authors declare that they have no known competing financial interests or personal relationships that could have appeared to influence the work reported in this paper.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="3829"><button class="button button-anchor" data-dcnode-id="3830" type="button"><span class="button-text" data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="3828"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="259" id="bi005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="260" id="bs005"><dl class="references" data-dcnode-id="261" id="reference-links-bs005"><dt class="label" data-dcnode-id="3823"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="3824" href="#bb0005" id="ref-id-b0005"><span data-dcnode-id="3825" instrument_node="">[1]</span></a></dt><dd class="reference" data-dcnode-id="3769" id="h0005"><div class="contribution" data-dcnode-id="3806"><span data-dcnode-id="3822" instrument_node="">P.W.</span><span data-dcnode-id="
