</span><article class="post-1754 post type-post status-publish format-standard hentry category-uncategorized tag-let-go-and-let-god tag-thankful-in-all-things" data-dcnode-id="508" id="post-1754"><span data-dcnode-id="566" instrument_node="">
</span><header class="entry-header" data-dcnode-id="550"><span data-dcnode-id="565" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="556"><span class="screen-reader-text" data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Posted on</span></span><span data-dcnode-id="562" instrument_node=""> </span><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/have-you-ever-been-told-you-need-to-get-a-grip/" rel="bookmark"><time class="entry-date published" data-dcnode-id="560" datetime="2022-02-13T10:31:08-05:00"><span data-dcnode-id="561" instrument_node="">February 13, 2022</span></time><time class="updated" data-dcnode-id="558" datetime="2022-02-13T16:18:18-05:00"><span data-dcnode-id="559" instrument_node="">February 13, 2022</span></time></a></div><h3 class="entry-title" data-dcnode-id="552"><a data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/have-you-ever-been-told-you-need-to-get-a-grip/" rel="bookmark"><span data-dcnode-id="554" instrument_node="">Have you ever been told you need to ”Get a Grip?”</span></a></h3><span data-dcnode-id="551" instrument_node=""> </span></header><span data-dcnode-id="548" instrument_node="">
</span><div class="entry-content" data-dcnode-id="511"><span data-dcnode-id="547" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="545"><img alt="" class="wp-image-1761" data-dcnode-id="546" height="185" loading="lazy" sizes="(max-width: 279px) 100vw, 279px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-21322-get-a-grip.jpg&amp;raw" srcset="https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-21322-get-a-grip.jpg 1024w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-21322-get-a-grip-300x200.jpg 300w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-21322-get-a-grip-768x512.jpg 768w" width="279"></figure><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="543" instrument_node="">Life sometimes comes at us faster than we can react or comprehend. It causes us to feel out of kilter seemingly unable to cope.  Our anxiety rises and our behavior shows things are getting might out of control. An inner voice or maybe someone you know encourages you to ”Get a Grip!” Like in a dentist chair or heading up the hill on a roller coaster ride, we grip tightly to something or someone  for whatever is coming our way.  But is that really how God wants us to react?  </span><br data-dcnode-id="542"></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="539" instrument_node="">A case can be made that instead of getting a grip, we should practice letting go. Instead of trying to hold on to or control something, God says to trust Him with the outcome.  God tells Abram in Genesis 13:17, </span><strong data-dcnode-id="536"><em data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">”Go, walk through the length and breadth of the land,&nbsp;for I am giving it to you.</span></em></strong><span data-dcnode-id="535" instrument_node="">” He tells him this right after he and Lot quarrel and decide to part ways.  The message here is that God had something better planned for Abram and his family  Abram’s job was to ”let go and let God” show him where he was to go next.</span></p><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="532" instrument_node="">I had my own Abram moment when my youngest daughter asked to go to a private Christian school two hours away from where we lived. She felt she needed a change and to my surprise, Dottie was backing her in this decision. I was wretched.  I did not want to miss being part of her high school years.  I fought with God and I made my wife and daughter cry on more than one occasion because I thought I knew what was best.  I was doing my best to control something that was out of my control hurting others along the way.  God spoke to me through a radio show.  The host talked about living a life in an opened handed manner.  That way, God could add to or take things away that were keeping me from experiencing the length and breadth of the life God wants for me and my family.  When I let go of my grip regarding Becca’s school decision, </span><strong data-dcnode-id="529"><em data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">a peace that transcended all human understanding </span></em></strong><a data-dcnode-id="527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/esv/philippians/4/7"><span data-dcnode-id="528" instrument_node="">https://biblia.com/bible/esv/philippians/4/7</span></a><span data-dcnode-id="526" instrument_node=""> came over me.  Who would have known her decision would, like Abram, lead us to move to Charlottesville 5 years later? </span></p><span data-dcnode-id="524" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="522"><img alt="" class="wp-image-1762" data-dcnode-id="523" height="283" loading="lazy" sizes="(max-width: 283px) 100vw, 283px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-21322-palms-upward.jpg&amp;raw" srcset="https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-21322-palms-upward.jpg 612w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-21322-palms-upward-300x300.jpg 300w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-21322-palms-upward-150x150.jpg 150w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-21322-palms-upward-100x100.jpg 100w" width="283"></figure><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">What are you trying to control?  Aren’t you tired of trying to hold on through your own strength. Loosen your GRIP. Relax your clenched fists and open your palms upward. Watch how it allows God to bring forth His blessings and take away the things that are holding you back from the life He desires and like Abram, He is giving to you.  </span></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">You can try getting a GRIP on your life as In His Grip www.inhisgripgolf.com does it.     G (Read God’s Word) R ( See what if REVEALS to you.  I (find ways to IMPLEMENT what you learned into your life.) P (PRAY to God for it to happen). </span></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node=""> Please subscribe to this blog so you can receive email notifications when new content is added.  I can be reached by email at michael@mrg7175.com</span></p><span data-dcnode-id="512" instrument_node="">
</span></div><span data-dcnode-id="509" instrument_node="">
