</span><main class="site-main" data-dcnode-id="468" id="main"><span data-dcnode-id="1176" instrument_node="">
</span><article class="post-1864 post type-post status-publish format-standard hentry category-uncategorized tag-confession tag-easter tag-forgiveness tag-lessons-learned-through-adversity tag-renewal tag-thankful-in-all-things" data-dcnode-id="1113" id="post-1864"><span data-dcnode-id="1175" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1161"><span data-dcnode-id="1174" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1167"><span class="screen-reader-text" data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Posted on</span></span><span data-dcnode-id="1171" instrument_node=""> </span><a data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/how-did-easter-cause-you-to-seek-god/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="1169" datetime="2022-04-24T06:46:06-04:00"><span data-dcnode-id="1170" instrument_node="">April 24, 2022</span></time></a></div><h3 class="entry-title" data-dcnode-id="1163"><a data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/how-did-easter-cause-you-to-seek-god/" rel="bookmark"><span data-dcnode-id="1165" instrument_node="">How did Easter cause you to seek God?</span></a></h3><span data-dcnode-id="1162" instrument_node=""> </span></header><span data-dcnode-id="1159" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1116"><span data-dcnode-id="1158" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="1154"><img alt="" class="wp-image-1873" data-dcnode-id="1157" height="206" sizes="(max-width: 275px) 100vw, 275px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-42422-easter-service.jpg&amp;raw" srcset="https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-42422-easter-service.jpg 640w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-42422-easter-service-300x225.jpg 300w" width="275"><figcaption data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">UVA Easter Sunrise Service </span></figcaption></figure><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1152" instrument_node="">Charles Stanley reminds us that we need to be mindful of our priorities. </span><em data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Where do you invest our time and energy? What or who occupies our thoughts?&nbsp;</span></em><span data-dcnode-id="1149" instrument_node=""> “As important as our earthly pursuits, responsibilities, and relationships may be, they cannot compare to the value of a life spent seeking the Lord.” The beginning of the year brings New Year resolutions? Easter brings the hope of a new life and the promise that our lives can be made new when we look to Him. How did you seek the Lord during the Easter season? I hope it was a time of refreshment and led you to a renewed desire to reorient your priorities so that life can be all God intends for it to be.</span></p><span data-dcnode-id="1147" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="1145"><img alt="" class="wp-image-1874" data-dcnode-id="1146" height="137" loading="lazy" sizes="(max-width: 382px) 100vw, 382px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-42422-pond2-1024x368.jpg&amp;raw" srcset="https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-42422-pond2-1024x368.jpg 1024w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-42422-pond2-300x108.jpg 300w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-42422-pond2-768x276.jpg 768w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-42422-pond2.jpg 1200w" width="382"></figure><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1143" instrument_node="">What does it mean to be renewed/refreshed? Why is it important? It is getting warmer outside again. As you walk by a pond, stop and look at it. It may look fine but in fact, it may be stagnant which can lead to fish kills and the rapid growth of floating green organic matter.  It happens when there isn’t a constant </span><strong data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node=""> exchange of living water</span></strong><span data-dcnode-id="1140" instrument_node="">&nbsp;that keeps a pond environment alive and healthy. Water comes in and fills a stagnant pond during a rain or a snow melt. But there is no outlet to keep the pond water fresh.  The same can be said for how we live.  Our lives can become stagnant because we are set in our ways which keeps us from receiving the fresh ideas and living water God wants to give us.  </span><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblestudytools.com/john/4-14.html"><span data-dcnode-id="1139" instrument_node="">https://www.biblestudytools.com/john/4-14.html</span></a><span data-dcnode-id="1137" instrument_node=""> Like a pond, we have to have an outlet to get rid of the stuff that holds us back from being a better version of ourselves so God has room to intervene and make us better.  </span></p><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1134" instrument_node="">Easter gives us that outlet.  It comes in two ways.  Confession and Forgiveness.  1 John 1;9 says, “</span><strong data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">If we confess our sins, he is faithful and just and will forgive us our sins and purify us from all unrighteousness</span></strong><span data-dcnode-id="1131" instrument_node="">.” This becomes the outlet that takes away the toxicity from our hearts.  Forgiveness does the same thing.  Buddha says it this way, ““Holding onto anger is like drinking poison and expecting the other person to die.” That is why Jesus teaches us in the Lord’s prayer to ask God for forgiveness and then do the same thing to others.  </span></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">So let’s remember that Easter is not just a one Sunday deal but an event that happened which changed the world forever. Let knowing God sent His Son to die be the living water that brings hope to your life every day. How awesome is it that gives us the outlet through confession and forgiveness to let go of the old so that we can be continually be refreshed and molded into the people for which God created us.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">I so appreciate you reading this blog.  If you haven’t already, please subscribe so you can receive email notifications when new content is posted.  I can be reached by email at michael@mrg7175.com  </span></p><span data-dcnode-id="1123" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="1121"><img alt="" class="wp-image-1875" data-dcnode-id="1122" height="175" loading="lazy" sizes="(max-width: 356px) 100vw, 356px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-31222-1John1-9-if-we-confess-our-sins-he-is-faithful-and-righteous-to-forgive-us.jpg&amp;raw" srcset="https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-31222-1John1-9-if-we-confess-our-sins-he-is-faithful-and-righteous-to-forgive-us.jpg 640w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-31222-1John1-9-if-we-confess-our-sins-he-is-faithful-and-righteous-to-forgive-us-300x148.jpg 300w" width="356"></figure><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node=""> </span></p><span data-dcnode-id="1117" instrument_node="">
</span></div><span data-dcnode-id="1114" instrument_node="">
</span></article><span data-dcnode-id="1111" instrument_node="">
</span><article class="post-1853 post type-post status-publish format-standard hentry category-uncategorized tag-holy-week tag-prayer tag-thankful-in-all-things" data-dcnode-id="1049" id="post-1853"><span data-dcnode-id="1110" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1096"><span data-dcnode-id="1109" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1102"><span class="screen-reader-text" data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Posted on</span></span><span data-dcnode-id="1106" instrument_node=""> </span><a data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/it-is-holy-week-god-wants-to-be-in-a-relationship-with-us/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="1104" datetime="2022-04-12T07:13:15-04:00"><span data-dcnode-id="1105" instrument_node="">April 12, 2022</span></time></a></div><h3 class="entry-title" data-dcnode-id="1098"><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/it-is-holy-week-god-wants-to-be-in-a-relationship-with-us/" rel="bookmark"><span data-dcnode-id="1100" instrument_node="">It is Holy Week.  God wants to be in a relationship with us</span></a></h3><span data-dcnode-id="1097" instrument_node=""> </span></header><span data-dcnode-id="1094" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1052"><span data-dcnode-id="1093" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="1091"><img alt="" class="wp-image-1861" data-dcnode-id="1092" height="196" loading="lazy" sizes="(max-width: 349px) 100vw, 349px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-32022-lent.jpg&amp;raw" srcset="https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-32022-lent.jpg 860w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-32022-lent-300x169.jpg 300w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-32022-lent-768x432.jpg 768w" width="349"></figure><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1089" instrument_node="">How is your Prayer life?  If you are like me, you wish it would be better.  Tim Keller writes in his book, Prayer </span><a data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//timothykeller.com/books/prayer"><span data-dcnode-id="1088" instrument_node="">https://timothykeller.com/books/prayer</span></a><span data-dcnode-id="1086" instrument_node="">, that it should be like the medication you take daily to make sure you remain healthy.  You know it is important and therefore, you try never to take the pills.  Prayer should be the same way.  Taking the time to pray daily helps us live our lives in the way in which God intended.  Through the help of the Holy Spirit it brings us into a relationship with our Father.  Craig Denison describes it this way.  “”If you ask for a deeper friendship with the Holy Spirit, you will find he is the best friend you have ever known. This is because “friendship with the Spirit is like any other friendship in that it develops over time. Like a new friend, you must get to know his character and personality. Spend time just talking with him, listening to him and allowing him to work in your heart and life. Prayer is your gateway to experiencing the things of God. Walk in relationship with him, follow his guidance, and make a new best friend in the Holy Spirit.”</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">For the regular readers of this blog, you know I wrote about having the proper “swing thoughts” as we go through our days.  The Masters was this week.  I read two different stories that helped me think about why we might find it hard to pray regularly.  </span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">The first was about someone who caddied for someone who was playing in the same group with Tiger Woods.  When he found out that this was happening, his first thought was, “what will I say to him if I get a chance?”  He didn’t want to say something stupid.  He wondered if Tiger would even acknowledge him.  This is true for many of us when trying to pray effectively.  “What is it God wants for me to say to Him?”  “Does He even care what is going on in my life?”  This Holy Week answers that question.  He sent His Son to die for us BECAUSE He wants to be in a relationship with Him.  That relationship allows us to communicate with Him.  Like Craig Denison shared, “Prayer allows us to develop a stronger friendship with God so that can develop the the proper “swing thoughts” on how to live.  </span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1077" instrument_node="">The second story was about the Scottie Sheffler who won The Masters even though he four putted the 18th hole.  It solidified his #1 ranking in the world but Jim Denison shared this interesting fact.  “Before Scheffler could win the tournament, he had to do something very important a few months ago: RSVP to his invitation to play. According to the </span><em data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">New York Times</span></em><span data-dcnode-id="1074" instrument_node="">, Augusta National </span><a data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//denisonministries.lt.acemlnb.com/Prod/link-tracker%3FredirectUrl%3DaHR0cHMlM0ElMkYlMkZ3d3cubnl0aW1lcy5jb20lMkYyMDIyJTJGMDQlMkYwNSUyRnNwb3J0cyUyRmdvbGYlMkZtYXN0ZXJzLWludml0YXRpb25zLmh0bWwlM0ZjYW1wYWlnbl9pZCUzRDU3JTI2ZW1jJTNEZWRpdF9uZV8yMDIyMDQwNSUyNmluc3RhbmNlX2lkJTNENTc2NzclMjZubCUzRGV2ZW5pbmctYnJpZWZpbmclMjZyZWdpX2lkJTNENjE0MTQ4OTUlMjZzZWdtZW50X2lkJTNEODc1ODAlMjZ0ZSUzRDElMjZ1c2VyX2lkJTNEMmViY2QwZjA3MzI0MWQ5MmVlYzFjZDFjNDZjMDVlYmE%3D%26sig%3D4Ca8kC8giWwkZzorzLXTyQn7WugyxK5VMequTCU1iJRy%26iat%3D1649673656%26a%3D%257C%257C27068980%257C%257C%26account%3Ddenisonministries.activehosted.com%26email%3D8QrYvOcOQuuoP1XESCFrKEzkASpiHornD%252Fz2wZTd1jg%253D%26s%3D2d386d89599a90990b8d05b8af9437e5%26i%3D650A692A5A12510"><span data-dcnode-id="1073" instrument_node="">sends</span></a><span data-dcnode-id="1071" instrument_node=""> invitations each year to golfers it wishes to invite to the tournament. They must signal their intention to play before they are permitted to compete.”</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1068" instrument_node="">Want to be better about praying?  Like Scottie Scheffler, You must first signal your intention to receive the gift God has for you. </span><a data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.beliefnet.com/columnists/idolchatter/2022/04/masters-champion-scottie-scheffler-says-he-plays-golf-to-glorify-god.html"><span data-dcnode-id="1067" instrument_node="">https://www.beliefnet.com/columnists/idolchatter/2022/04/masters-champion-scottie-scheffler-says-he-plays-golf-to-glorify-god.html</span></a><span data-dcnode-id="1065" instrument_node=""> He has invited you to be in relationship with Him.  Your first prayer needs to be, “Thank you Lord for giving the opportunity to communicate with You.”  Then know it doesn’t matter what we say as long as it is sincere and honest because He really does care what is going on in your life.  One prayer will lead to another and your faith will become stronger as you watch those prayers being answered.  Why not make this Holy Week a significant moment in our life?  Where you began to pray regularly with the proper swing thoughts allowing you to see life from God’s perspective.  Close your eyes.  Let your swing thoughts be Seeing (Visualize) it, Feeling the Love He has for you, and then being free to let yourself trust Him for the outcome versus trying to do it all on your own. </span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1062" instrument_node="">Happy Easter week everyone.  For those of your in Charlottesville, join us for an Easter Sunrise Service in the UVA Amphitheater.  We will be there from 6:45 am to 8:00 am.  Please subscribe to this blog if you want email notifications for when new content is posted.  I can be reached via email at michael@mrg7175.com  </span><br data-dcnode-id="1061"><span data-dcnode-id="1060" instrument_node=""> </span></p><span data-dcnode-id="1058" instrument_node="">

</span><article class="post-1842 post type-post status-publish format-standard hentry category-uncategorized tag-thankful-in-all-things" data-dcnode-id="994" id="post-1842"><span data-dcnode-id="1046" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1030"><span data-dcnode-id="1045" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1036"><span class="screen-reader-text" data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Posted on</span></span><span data-dcnode-id="1042" instrument_node=""> </span><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/how-significant-moments-propel-our-lives-forward/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1040" datetime="2022-04-05T08:54:36-04:00"><span data-dcnode-id="1041" instrument_node="">April 5, 2022</span></time><time class="updated" data-dcnode-id="1038" datetime="2022-04-05T09:34:05-04:00"><span data-dcnode-id="1039" instrument_node="">April 5, 2022</span></time></a></div><h3 class="entry-title" data-dcnode-id="1032"><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/how-significant-moments-propel-our-lives-forward/" rel="bookmark"><span data-dcnode-id="1034" instrument_node="">How Significant Moments propel our lives forward</span></a></h3><span data-dcnode-id="1031" instrument_node=""> </span></header><span data-dcnode-id="1028" instrument_node="">
</span><div class="entry-content" data-dcnode-id="997"><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1026" instrument_node="">Have you ever had a “Burning Bush” </span><a data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegateway.com/passage/%3Fsearch%3Dexodus%25203%26version%3DNIV"><span data-dcnode-id="1025" instrument_node="">https://www.biblegateway.com/passage/?search=exodus%203&amp;version=NIV</span></a><span data-dcnode-id="1023" instrument_node=""> experience?  I am guessing your answer is no but if you think about it, I am also guessing you have had your own “holy/significant moments”. I am reading through Exodus right now with some friends and wrote this prayer after reading about Moses’ burning bush encounter with God. “Lord you are my refuge and my foundation. You are my encourager and my strength. Let me step forward like Moses saying, “Here I am! The question then remains, “how do I have the courage and confidence to go where He wants me to go?”</span></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">The story in Exodus confirmed what I wanted to write about this week.  I hope to encourage you to think back to those significant moments that changed the direction of your life.  The snake turning into a staff and the arm healed of leprosy allowed Moses to be reminded that God is with Him no matter where he goes.  The wonderful book, “Hinds feet in High places” by Hannah Hurnard, teaches us how to look back so we can be encouraged to move forward.  It is the story of how Much-Afraid escaped from her Fearing relatives and went with the Shepherd to the High Places where “perfect love casteth out fear.” She does it by keeping pebbles in a satchel to remind her of the times the Shepherd helped her when she wanted to turn back.  </span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">What pebbles do you have in your satchel?  If you have never done it before, take some time to look back on your life.  When you do, you will see that you persevered in those moments which makes it easier the next time a big decision needs to be made or you are going through a hard time.  For me, like recovering from Guillain-Barre Syndrome, it strengthens my faith. Remembering those past moments allows me to have an even stronger faith that God is with me and will walk me the most difficult of times.  </span></p><span data-dcnode-id="1015" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="1013"><img alt="" class="wp-image-1847" data-dcnode-id="1014" height="226" loading="lazy" sizes="(max-width: 170px) 100vw, 170px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-4522-jm-and-me.jpg&amp;raw" srcset="https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-4522-jm-and-me.jpg 240w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-4522-jm-and-me-225x300.jpg 225w" width="170"></figure><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1011" instrument_node="">My son and I are golfers.  We were talking the other day about how to handle a tough conversation.  He shared with me the concept of “swing thoughts”.  You see in golf as Dave Cook writes in the book, Sacred Journey, </span><a data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Seven-Days-Utopia-Sacred-Journey/dp/0310335493"><span data-dcnode-id="1010" instrument_node="">https://www.amazon.com/Seven-Days-Utopia-Sacred-Journey/dp/0310335493</span></a><span data-dcnode-id="1008" instrument_node=""> , visualizing allows your brain to prepare the proper swing thoughts so you can hit the right shot..  Dave shares we must “See it, Feel it, Trust it”.  If I can see the shot, feel the swing I need, I can then trust that I will hit the ball properly.  The same concept can be used in our lives as we look back on the significant moments.  If we have the proper swing thoughts, we can make sure we say the rights things, not overact or get defensive, or maybe even forgive someone who has done your harm.  Looking back and seeing that you made it through other tough situations will help propel you confidently into the next one.  The confidence comes from having the right swing thoughts where you reach in your mental pocket and pull out the pebble reminding you that you will get through whatever challenges you next.   It may not be as cool as a burning bush, but I can assure you God is there encouraging onward toward being the best version of you.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Thanks for joining me on this #thankfulinallthings journey.  Please subscribe to the blog so you can receive email notifications when new content is posted.  I would love to hear how what I write is encouraging you.  I can be reached by email at michael@mrg7175.com  </span></p><span data-dcnode-id="1003" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="1001"><img alt="" class="wp-image-1848" data-dcnode-id="1002" height="309" loading="lazy" sizes="(max-width: 309px) 100vw, 309px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-4522-janet-denison-1024x1024.jpg&amp;raw" srcset="https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-4522-janet-denison-1024x1024.jpg 1024w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-4522-janet-denison-300x300.jpg 300w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-4522-janet-denison-150x150.jpg 150w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-4522-janet-denison-768x768.jpg 768w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-4522-janet-denison-100x100.jpg 100w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/04/blog-photo-4522-janet-denison.jpg 1080w" width="309"></figure><span data-dcnode-id="1000" instrument_node="">

</span><article class="post-1832 post type-post status-publish format-standard hentry category-uncategorized tag-listen tag-thankfulinallthings tag-wait" data-dcnode-id="859" id="post-1832"><span data-dcnode-id="991" instrument_node="">
</span><header class="entry-header" data-dcnode-id="977"><span data-dcnode-id="990" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="983"><span class="screen-reader-text" data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Posted on</span></span><span data-dcnode-id="987" instrument_node=""> </span><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/sometimes-it-is-better-to-just-listen/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="985" datetime="2022-03-27T06:57:54-04:00"><span data-dcnode-id="986" instrument_node="">March 27, 2022</span></time></a></div><h3 class="entry-title" data-dcnode-id="979"><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/sometimes-it-is-better-to-just-listen/" rel="bookmark"><span data-dcnode-id="981" instrument_node="">Sometimes, it is better to just listen</span></a></h3><span data-dcnode-id="978" instrument_node=""> </span></header><span data-dcnode-id="975" instrument_node="">
</span><div class="entry-content" data-dcnode-id="862"><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">It has been a wild week.  So many things coming at me from so many different directions.  God spoke to me in such amazing ways through scripture and via folks much smarter and stronger in their faith than me.  Each one came just at the right time.  They lifted me up and helped me navigate the challenges and stressful situations that were on my calendar.  I share them with you hoping that they will help you in the same way they helped me.  </span></p><span data-dcnode-id="971" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="969"><img alt="" class="wp-image-1839" data-dcnode-id="970" height="161" loading="lazy" sizes="(max-width: 309px) 100vw, 309px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/blog-photo-32722-proverbs-17-28-1024x536.jpg&amp;raw" srcset="https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/blog-photo-32722-proverbs-17-28-1024x536.jpg 1024w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/blog-photo-32722-proverbs-17-28-300x157.jpg 300w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/blog-photo-32722-proverbs-17-28-768x402.jpg 768w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/blog-photo-32722-proverbs-17-28.jpg 1376w" width="309"></figure><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Henri Nouwen wrote: “I really want to encourage you not to despair, not to lose faith, not to let go of God in your life, but stand in your suffering as a person who believes that she is deeply loved by God. When you look inside yourself, you might sometimes be overwhelmed by all the brokenness and confusion, but when you look outside toward him who died on the cross for you, you might suddenly realize that your brokenness has been lived through for you long before you touched it yourself.”</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="964" instrument_node="">David wrote Psalms 3 after he ran away when Absalom declared himself King. It is appropriated called the morning song. </span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.easyenglish.bible/psalms/psalm003-taw.htm"><span data-dcnode-id="963" instrument_node="">https://www.easyenglish.bible/psalms/psalm003-taw.htm</span></a><span data-dcnode-id="961" instrument_node="">  “Lord, how many are my foes! How many rise up against me! Many are saying of me, God will not deliver him. But you, Lord, are a shield around me, my glory, the One who lifts my head high. I call out to the Lord, and he answers me from his holy mountain. I lie down and sleep; I wake again, because the Lord sustains me. I will not fear though tens of thousands assail me on every side. Arise, Lord! Deliver me, my God! Strike all my enemies on the jaw; break the teeth of the wicked. From the Lord comes deliverance. May your blessing be on your people.”</span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="958" instrument_node="">Isaiah 55:9-11 “For as the heavens are higher than the earth, so My ways are higher than your ways and My thoughts than your thoughts.&nbsp;</span><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/3588.htm"><span data-dcnode-id="957" instrument_node="">For</span></a><span data-dcnode-id="955" instrument_node="">&nbsp;</span><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/834.htm"><span data-dcnode-id="954" instrument_node="">just as</span></a><span data-dcnode-id="952" instrument_node="">&nbsp;</span><a data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/1653.htm"><span data-dcnode-id="951" instrument_node="">rain</span></a><span data-dcnode-id="949" instrument_node="">&nbsp;</span><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/7950.htm"><span data-dcnode-id="948" instrument_node="">and snow</span></a><span data-dcnode-id="946" instrument_node="">&nbsp;</span><a data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/3381.htm"><span data-dcnode-id="945" instrument_node="">fall</span></a><span data-dcnode-id="943" instrument_node="">&nbsp;</span><a data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/4480.htm"><span data-dcnode-id="942" instrument_node="">from</span></a><span data-dcnode-id="940" instrument_node="">&nbsp;</span><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/8064.htm"><span data-dcnode-id="939" instrument_node="">heaven</span></a><span data-dcnode-id="937" instrument_node="">&nbsp;</span><a data-dcnode-id="935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/3808.htm"><span data-dcnode-id="936" instrument_node="">and do not</span></a><span data-dcnode-id="934" instrument_node="">&nbsp;</span><a data-dcnode-id="932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/7725.htm"><span data-dcnode-id="933" instrument_node="">return</span></a><span data-dcnode-id="931" instrument_node="">&nbsp;</span><a data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/8033.htm"></a><a data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/3588.htm"><span data-dcnode-id="929" instrument_node="">without</span></a><span data-dcnode-id="927" instrument_node="">&nbsp;</span><a data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/518.htm"></a><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/7301.htm"><span data-dcnode-id="925" instrument_node="">watering</span></a><span data-dcnode-id="923" instrument_node="">&nbsp;</span><a data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/853.htm"></a><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/776.htm"><span data-dcnode-id="921" instrument_node="">the earth,</span></a><span data-dcnode-id="919" instrument_node="">&nbsp;</span><a data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/3205.htm"><span data-dcnode-id="918" instrument_node="">making it bud</span></a><span data-dcnode-id="916" instrument_node="">&nbsp;</span><a data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/6779.htm"><span data-dcnode-id="915" instrument_node="">and sprout,</span></a><span data-dcnode-id="913" instrument_node="">&nbsp;</span><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/5414.htm"><span data-dcnode-id="912" instrument_node="">and providing</span></a><span data-dcnode-id="910" instrument_node="">&nbsp;</span><a data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/2233.htm"><span data-dcnode-id="909" instrument_node="">seed</span></a><span data-dcnode-id="907" instrument_node="">&nbsp;</span><a data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/2232.htm"><span data-dcnode-id="906" instrument_node="">to sow</span></a><span data-dcnode-id="904" instrument_node="">&nbsp;</span><a data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/3899.htm"><span data-dcnode-id="903" instrument_node="">and food</span></a><span data-dcnode-id="901" instrument_node="">&nbsp;</span><a data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblehub.com/hebrew/398.htm"><span data-dcnode-id="900" instrument_node="">to eat,</span></a><span data-dcnode-id="898" instrument_node="">&nbsp;so My word that proceeds from My mouth will not return to Me empty, but it will accomplish what I please, and it will prosper where I send it”</span></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">If you have taken the time to read what came my way this week, I hope you too will go into this coming week knowing God is with you and meets you no matter what circumstances your facing.  To face these extremely challenging times, you first need to know who you are and where your identity lies.  My identity is in Christ and the way Carol Wimmer describes what that means is how I will end this week’s blog.  </span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">“I am a Christian” </span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">When I say… “I am a Christian” I’m not shouting “I’m clean livin.” I’m whispering “I was lost,” Now I’m found and forgiven.</span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">When I say…”I am a Christian” I don’t speak of this with pride. I’m confessing that I stumble and need CHRIST to be my guide.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">When I say… “I am a Christian” I’m not trying to be strong. I’m professing that I’m weak and need HIS strength to carry on.</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">When I say… “I am a Christian” I’m not bragging of success. I’m admitting I have failed and need God to clean my mess.</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">When I say… “I am a Christian” I’m not claiming to be perfect, My flaws are far too visible but, God believes I am worth it.</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">When I say… “I am a Christian” I still feel the sting of pain, I have my share of heartaches So I call upon His name.</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">When I say… “I am a Christian” I’m not holier than thou, I’m just a simple sinner who received God’s good grace, somehow.”</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Please subscribe to this blog to receive email notifications when new content is posted.  I can be reached by email at michael@mrg7175.com   </span></p><span data-dcnode-id="866" instrument_node="">

</span><article class="post-1815 post type-post status-publish format-standard hentry category-uncategorized tag-lent tag-lessons-learned-through-adversity tag-season-of-waiting tag-thankful-in-all-things tag-those-who-wait tag-waiting" data-dcnode-id="800" id="post-1815"><span data-dcnode-id="856" instrument_node="">
</span><header class="entry-header" data-dcnode-id="842"><span data-dcnode-id="855" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="848"><span class="screen-reader-text" data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Posted on</span></span><span data-dcnode-id="852" instrument_node=""> </span><a data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/the-power-in-learning-how-to-wait/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="850" datetime="2022-03-20T06:47:53-04:00"><span data-dcnode-id="851" instrument_node="">March 20, 2022</span></time></a></div><h3 class="entry-title" data-dcnode-id="844"><a data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/the-power-in-learning-how-to-wait/" rel="bookmark"><span data-dcnode-id="846" instrument_node="">The power in learning how to wait</span></a></h3><span data-dcnode-id="843" instrument_node=""> </span></header><span data-dcnode-id="840" instrument_node="">
</span><div class="entry-content" data-dcnode-id="803"><span data-dcnode-id="839" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="837"><img alt="" class="wp-image-1829" data-dcnode-id="838" height="175" loading="lazy" sizes="(max-width: 311px) 100vw, 311px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/blog-photo-32022-lent.jpg&amp;raw" srcset="https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/blog-photo-32022-lent.jpg 860w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/blog-photo-32022-lent-300x169.jpg 300w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/blog-photo-32022-lent-768x432.jpg 768w" width="311"></figure><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="835" instrument_node="">Like Advent, Lent is another season where we are taught to wait.  This blog originated after my recovery from Guillain Barre Syndrome. GBS paralyzed me from my head down. March 17th marked three years since my arms went back over my head. </span><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.caringbridge.org/visit/michaelguthrie"><span data-dcnode-id="834" instrument_node="">http://www.caringbridge.org/visit/michaelguthrie</span></a><br data-dcnode-id="832"><span data-dcnode-id="831" instrument_node="">“We will be encouraged and strengthened in our faith when we recognize the ways in which God is operating. These glimpses of His handiwork will motivate us to stay the course and help us maintain a godly perspective on life.”  This Charles Stanley’s quote reminded me of the fact that God has made many wait until they were ready for what He had for them to do.  Sarah,  Moses,  Noah, Esther,  Ruth, John the Baptist, Paul and yes, even Jesus, all were made to wait. Abraham Lincoln and Winston Churchill lost elections before being raised up to do great things.  We remember that Jesus raised Lazarus from the dead but forget that his sisters, Mary and Martha sent word to Jesus that their brother needed His help, but Christ delayed before traveling to their home&nbsp;(</span><a data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.christianity.com/bible/search/%3Fver%3Dniv%26q%3Djohn%2B11%253a3-6"><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">John 11:3-6</span></strong></a><span data-dcnode-id="827" instrument_node="">).</span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="824" instrument_node="">As we wait over these next four weeks to celebrate the resurrection of Jesus at Easter, ask yourself, ”for what are you waiting?” Have you made a request to God that hasn’t been answered? Are you asking for relief from some type of adversity? Change your question to, ”what is it that you are preparing for me? What do I need to be doing to be ready for the task ahead?” It really is a matter of perspective. No wonder they say ”patience is a virtue” </span><a data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.christianity.com/wiki/bible/patience-is-a-virtue.html"><span data-dcnode-id="823" instrument_node="">https://www.christianity.com/wiki/bible/patience-is-a-virtue.html</span></a><span data-dcnode-id="821" instrument_node=""> </span></p><span data-dcnode-id="819" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="817"><img alt="" class="wp-image-1828" data-dcnode-id="818" height="262" loading="lazy" sizes="(max-width: 332px) 100vw, 332px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/blog-photo-32022-detour.jpg&amp;raw" srcset="https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/blog-photo-32022-detour.jpg 640w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/blog-photo-32022-detour-300x237.jpg 300w" width="332"></figure><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="815" instrument_node="">The season of&nbsp;</span><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Lent is&nbsp;</span></strong><span data-dcnode-id="812" instrument_node="">a time for personal reflection. If you are facing what seems like a dead end, why not take the time to stop and check out what is around you.  Like the Israelites in the desert, what might look like the end, may just be a bend in the road that though longer, will take you where you are meant to go.   As Charles Stanley shared, no matter what challenges we face, ”we are to stay the course with the proper perspective” </span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Please subscribe to this blog to receive email notifications when new content is posted. I can be reached by email at michael@mrg7175.com</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node=""> </span></p><span data-dcnode-id="804" instrument_node="">

</span></article><span data-dcnode-id="798" instrument_node="">
</span><article class="post-1801 post type-post status-publish format-standard hentry category-uncategorized tag-henri-nouwen tag-identity tag-prodigal-son tag-story tag-thankful-in-all-things" data-dcnode-id="741" id="post-1801"><span data-dcnode-id="797" instrument_node="">
</span><header class="entry-header" data-dcnode-id="783"><span data-dcnode-id="796" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="789"><span class="screen-reader-text" data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Posted on</span></span><span data-dcnode-id="793" instrument_node=""> </span><a data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/in-the-prodigal-son-story-which-characters-are-you/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="791" datetime="2022-03-13T09:27:33-04:00"><span data-dcnode-id="792" instrument_node="">March 13, 2022</span></time></a></div><h3 class="entry-title" data-dcnode-id="785"><a data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/in-the-prodigal-son-story-which-characters-are-you/" rel="bookmark"><span data-dcnode-id="787" instrument_node="">In the Prodigal Son story, which character(s) are you?</span></a></h3><span data-dcnode-id="784" instrument_node=""> </span></header><span data-dcnode-id="781" instrument_node="">
</span><div class="entry-content" data-dcnode-id="744"><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">We all are the main characters in our own stories, the central planet in our life’s universe.  Everything revolves around us.  Dottie’s mom summed it up best by saying, “wherever I go, there I am”.  Likewise, we all become the support cast for other people’s stories as protagonists, antagonists, serving minor roles, or even extras in your story.  </span></p><span data-dcnode-id="777" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="775"><img alt="" class="wp-image-1803" data-dcnode-id="776" height="225" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/blog-photo-31222-the-return-of-the-prodigal-son-henri-j-m-nouwen-9780867167382.webp&amp;raw" width="263"></figure><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="773" instrument_node="">A life changing book for me was Henri Nouwen’s Portrait of a Prodigal Son.  Back in 1992 Henri Nouwen received permission to visit the museum which houses the Rembrandt masterpiece daily and even into the night after the museum was closed. Nouwen spent literally hours and days alone sitting in a chair gazing at each character in the painting, studying every detail in hopes of discovering its spiritual reality for him.  Before being introduced to this book, I had  studied and given talks on this Luke 15:11-32 parable </span><a data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biblegateway.com/passage/%3Fsearch%3DLuke%252015%3A11-32%26version%3DNIV"><span data-dcnode-id="772" instrument_node="">https://www.biblegateway.com/passage/?search=Luke%2015:11-32&amp;version=NIV</span></a><span data-dcnode-id="770" instrument_node=""> more times than I can count.  It wasn’t until I read this wonderful portrayal that I realized there was more than one main character in the story.  I have no excuse because the 1st verse starts with “there were two sons and if you know the story, the father also plays a huge supporting role in Jesus’ teaching.” </span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">The lessons most of us learn from or try to teach in the story is 1) How selfish and greedy the younger son is in asking for his inheritance.  It is like he is saying Dad, “I wish you were dead”  2) The same son after squandering all he has been given realizes he would be better off as a servant to his father than living the life he had created by his stupidity.  He chooses to go home and ask forgiveness knowing he is unworthy of any kindness from his father.  3) We learn how strong a father’s love is for a child.  He has waited for this day; yearning for his son’s return and offers nothing but love and forgiveness. The moral to the story is quite obvious.  We learn from these two characters that God knows we will screw up as we think we know how to live life best without Him.  We also see that He will be waiting for our return  and when we do, He will welcome us and restore our position of being his children.  Isn’t it great that there is a happy ending for this wayward child?  But wait, is it really a happy ending?</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">This book did not end well for me.  Why?  Because like I shared earlier, verse 11 says “there were two sons.” When I started reading what Nouwen wrote about the older brother, tears began to stream down my face.  I had never seen what this passage of scripture was trying to teach me.  Why?  I am the oldest son in my family but my role in this story is I am always trying to do what is right and seeking the approval of my parents, family members, etc.  It was like in 2nd Corinthians 3:14, “But their minds were made dull, for to this day the same veil remains when the old covenant is read. It has not been removed, because only in Christ is it taken away.” Gratefully, a veil was lifted and I saw myself before God in an entirely new way.  I could not relate to the Prodigal.  What I was made to see was my “older brother self-righteous mindset.” My Father you owe me attitude was just as bad as what the younger brother had done.  It was like a slap across the face when my thinking I could earn God’s love was not unlike what the younger brother had done by asking for his inheritance.  </span></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">The sad part of this lesson from Jesus is, unlike the child who came home with a repentant heart, we don’t know if the older brother ever realizes his selfishness.  Verse 28 says, “he became angry and refused to enter the celebration for his wayward sibling.”  I am so glad this particular blind spot of my character was removed.  Like the Father waited for the Prodigal, I know he also kept watch hoping the older brother would see the error of his ways and return to the party asking for the same forgiveness his brother had rehearsed over and over on his way home.  I am so glad I read this book many years ago.  It allowed me to  realize God’s forgiveness and joy because, like the Prodigal Son, I had returned into His waiting and outstretched arms.   I also know when I stumble and find myself back in an older brother mindset, God is always there to love and encourage me forward regardless of how many times it happens.  </span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">I hope you will take the time to read and meditate on Luke 15:11-32  and then read this insightful book.  When you figure out which character best suits you, ask your loving Father to forgive you.  He promises to restore you to your rightful place as an heir to the throne, his adopted Son or Daughter in Christ.  Romans 8:17 </span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Please subscribe to this blog to receive email notifications when new content is posted.  I can be reached by email at michael@mrg7175.com  </span></p><span data-dcnode-id="753" instrument_node="">

</span><header class="entry-header" data-dcnode-id="724"><span data-dcnode-id="737" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="730"><span class="screen-reader-text" data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Posted on</span></span><span data-dcnode-id="734" instrument_node=""> </span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/stop-listening-to-others-and-talk-to-yourself/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="732" datetime="2022-03-06T06:47:26-05:00"><span data-dcnode-id="733" instrument_node="">March 6, 2022</span></time></a></div><h3 class="entry-title" data-dcnode-id="726"><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/stop-listening-to-others-and-talk-to-yourself/" rel="bookmark"><span data-dcnode-id="728" instrument_node="">Stop Listening to others and Talk to yourself</span></a></h3><span data-dcnode-id="725" instrument_node=""> </span></header><span data-dcnode-id="722" instrument_node="">
</span><div class="entry-content" data-dcnode-id="694"><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Do you let others tell you who you are or who you can or can’t be?  How can you make sure you live the life God created for you?  </span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">There are encouragers in this world but there are also those who want nothing more than to discourage us.  They want to “rain on your parade” by saying what you are trying to do won’t work or can’t be done.  In many cases, it is because they don’t want you to get to a better place than them.  Isn’t it so easy these days to look around and wish you were someone else.  Social Media allows you to see people living what look to be wonderful lives and having the kind of success for which you are striving.  The discouragers or the people whose lives look so easy can make us feel second rate causing us to think, “I could never be that kind of person”</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Listening to or watching others can cause us to go down a mental rabbit hole which causes us to say things like, “I can’t, I will never, There is no way, or I wish.”  That is why God says to Joshua, “Keep this Book of the Law always on your lips; meditate on it day and night, so that you may be careful to do everything written in it. Then you will be prosperous and successful.”   </span></p><span data-dcnode-id="712" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="710"><img alt="" class="wp-image-1794" data-dcnode-id="711" height="273" loading="lazy" sizes="(max-width: 365px) 100vw, 365px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/Blog-Photo-3522-Joshua-Meditate-on-Gods-Word-gold.jpg&amp;raw" srcset="https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/Blog-Photo-3522-Joshua-Meditate-on-Gods-Word-gold.jpg 900w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/Blog-Photo-3522-Joshua-Meditate-on-Gods-Word-gold-300x225.jpg 300w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/Blog-Photo-3522-Joshua-Meditate-on-Gods-Word-gold-768x576.jpg 768w" width="365"></figure><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">The lesson here is we are to speak the right things into our minds and our hearts instead of letting others tell us what kinds of lives we can live.  A coach shared this thought process with me years ago.  “Do not let others plant bad seeds by saying it can’t be done or that we aren’t good enough.  Instead, allow only good seeds to be planted and then pick the right people who will encourage, nourish, and fertilize those positive thoughts.  Jesus says,&nbsp;“I tell you the truth, if you had faith even as small as a mustard seed, you could say to this mountain, ‘Move from here to there,’ and it would move. Nothing would be impossible”  That faith; those good seeds planted in your heart will allow you to slowly but surely cross the T off I Can’t; turning your mindset to I CAN! Why, because you BELIEVE.   </span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">So what will you speak into your life today?  How will you keep from letting the negative thoughts ( the bad seeds) from strangling the wonderful things you want to accomplish? Meditate on this, the Word of God.  “If you abide in my word, you are truly my disciples,&nbsp;and you will&nbsp;know the truth, and the truth&nbsp;will set you free.” John 8:31,32  Free for what? To live the incredible life God has for you.  One that produces abundance beyond anything you can imagine.  John 10:10  Then go out and show others that goodness and mercy is what the Lord intends for all of us.  </span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Please subscribe to this blog if you would like to receive email notifications of when new content if posted.  I can be reached by email at michael@mrg7175.com   </span></p><span data-dcnode-id="700" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="698"><img alt="" class="wp-image-1799" data-dcnode-id="699" height="251" loading="lazy" sizes="(max-width: 251px) 100vw, 251px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/blog-photo-3522-abundance.jpg&amp;raw" srcset="https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/blog-photo-3522-abundance.jpg 640w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/blog-photo-3522-abundance-300x300.jpg 300w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/blog-photo-3522-abundance-150x150.jpg 150w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/03/blog-photo-3522-abundance-100x100.jpg 100w" width="251"></figure><span data-dcnode-id="697" instrument_node="">

</span><article class="post-1777 post type-post status-publish format-standard hentry category-uncategorized tag-fear tag-lessons-learned-through-adversity tag-mindset tag-prudent tag-rejoice tag-thankful-in-all-things" data-dcnode-id="638" id="post-1777"><span data-dcnode-id="688" instrument_node="">
</span><header class="entry-header" data-dcnode-id="674"><span data-dcnode-id="687" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="680"><span class="screen-reader-text" data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Posted on</span></span><span data-dcnode-id="684" instrument_node=""> </span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/fearful-or-being-prudent/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="682" datetime="2022-02-27T09:25:43-05:00"><span data-dcnode-id="683" instrument_node="">February 27, 2022</span></time></a></div><h3 class="entry-title" data-dcnode-id="676"><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/fearful-or-being-prudent/" rel="bookmark"><span data-dcnode-id="678" instrument_node="">Fearful or being Prudent?</span></a></h3><span data-dcnode-id="675" instrument_node=""> </span></header><span data-dcnode-id="672" instrument_node="">
</span><div class="entry-content" data-dcnode-id="641"><span data-dcnode-id="671" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="669"><img alt="" class="wp-image-1788" data-dcnode-id="670" height="207" loading="lazy" sizes="(max-width: 368px) 100vw, 368px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22722-be-of-sound-mind-1024x576.jpg&amp;raw" srcset="https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22722-be-of-sound-mind-1024x576.jpg 1024w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22722-be-of-sound-mind-300x169.jpg 300w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22722-be-of-sound-mind-768x432.jpg 768w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22722-be-of-sound-mind-1536x864.jpg 1536w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22722-be-of-sound-mind.jpg 1920w" width="368"></figure><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="667" instrument_node="">“For God hath not given us the spirit of fear; but of power, and of love, and of a sound mind.” 2 Timothy‬ ‭1:7‬&nbsp; I wanted so much to travel next week to our company’s conference in Las Vegas.  Many of my agents were going and I wanted to be there with them. I registered and made my plane reservations.  This was going to be the time where life was going to start getting back to  normal.  Last week I regrettably decided not to go.  This weekend marks when Guillain Barre Syndrome changed my life forever.  As much as I wanted to be there, I was unsettled. I could not find a peace that given my experience with GBS (</span><strong data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">a rare, autoimmune disorder in which a person’s own immune system damages the nerves, causing muscle weakness and sometimes paralysis</span></strong><span data-dcnode-id="664" instrument_node="">) it was worth the risk as Covid can, although rare, can cause a sequential Guillain Barre episode. </span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/34170552/"><span data-dcnode-id="663" instrument_node="">https://pubmed.ncbi.nlm.nih.gov/34170552/</span></a><span data-dcnode-id="661" instrument_node=""> I would rather not have that experience again. </span><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.caringbridge.org/visit/michaelguthrie"><span data-dcnode-id="660" instrument_node="">www.caringbridge.org/visit/michaelguthrie</span></a></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Since cancelling my travel plans, I have been wrestling with did I do it out of fear or was I making a prudent decision? Timothy writes that we are not to have spirit of fear but in the same sentence he says, God gives us a sound mind.  If I am honest, I have found it difficult that most folks I know are back to living their lives as they did before Covid.  I see the pictures of everyone travelling, gathering for parties and being in crowded sports arenas. Like going to Vegas next week, I have been tempted to throw caution to the wind so I can enjoy these things again.  I do not want to live my life in fear but at the same time I would rather not see if getting Covid would bring on the rare chance of a GBS relapse.  Not just for me but for the people (including my wife) whose lives would be impacted should it happen.  I also struggle when I am the only one who has a mask on at the functions I do attend.  I wonder if folks see it as a weakness and I know it makes some feel uncomfortable to be around me because they aren’t wearing a mask.  And so I wait for an answer to is it fear or being prudent? Friends help me with this answer by supporting and understanding why I remain somewhat tied down. Some even said, “Are you crazy?” when I shared my thoughts on going to the company conference. For those who follow this blog, you know my faith and those around me have been what has gotten me through what is now a three year journey.</span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Wearing the mask is the easy part.  I know many don’t think it matters and express they have the right to not wear one especially if they are vaccinated.  For me it is personal choice and it has in my opinion been effective.  Since wearing a mask, I have not even had my once or twice a year cold.  My doctor says he continues to see a very low number of patients with the flu.  If wearing a mask keeps me from getting sick, I will continue to wear one in crowded places where I don’t know who I am with or who they have been around who might be sick.  Travelling in public transportation is for another day in the hopefully not too distance future.  </span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">When I do;  “I will lift up mine eyes unto the hills, from whence cometh my help.  My help cometh from the LORD, which made heaven and earth.” Psalm 121:1,2 If He made the heaven and the earth, I can certainly trust that He has made me of sound mind and will provide me the peace to venture out knowing He is with me always.  Until then As Jodie Berndt shared on Twitter recently, ““Friendship doubles our joys and divides our griefs.”  “We need to cultivate a spirit of humility—one that is quick to celebrate someone else—instead of a spirit of criticism and contempt? freely.” Let’s be generous with our love, coming alongside others in their hard times and, even more, in their rejoicing.”</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Please subscribe to this blog to receive email notifications when new content is posted.  You can reach me by email at michael@mrg7175.com </span></p><span data-dcnode-id="645" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="643"><img alt="" class="wp-image-1789" data-dcnode-id="644" height="229" loading="lazy" sizes="(max-width: 438px) 100vw, 438px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22722-psalms-121-1-2-1024x536.jpg&amp;raw" srcset="https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22722-psalms-121-1-2-1024x536.jpg 1024w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22722-psalms-121-1-2-300x157.jpg 300w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22722-psalms-121-1-2-768x402.jpg 768w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22722-psalms-121-1-2.jpg 1376w" width="438"></figure><span data-dcnode-id="642" instrument_node="">
</span></div><span data-dcnode-id="639" instrument_node="">
</span></article><span data-dcnode-id="636" instrument_node="">
</span><article class="post-1765 post type-post status-publish format-standard hentry category-uncategorized tag-blessing-others tag-dave-anderson tag-gift-giving tag-leadership tag-selflessness tag-servant-hearted tag-thankful-in-all-things" data-dcnode-id="569" id="post-1765"><span data-dcnode-id="635" instrument_node="">
</span><header class="entry-header" data-dcnode-id="621"><span data-dcnode-id="634" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="627"><span class="screen-reader-text" data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Posted on</span></span><span data-dcnode-id="631" instrument_node=""> </span><a data-dcnode-id="628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/learning-how-to-follow-helps-us-to-better-lead/" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="629" datetime="2022-02-20T10:21:05-05:00"><span data-dcnode-id="630" instrument_node="">February 20, 2022</span></time></a></div><h3 class="entry-title" data-dcnode-id="623"><a data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thankfulinallthings.com/learning-how-to-follow-helps-us-to-better-lead/" rel="bookmark"><span data-dcnode-id="625" instrument_node="">Learning how to follow, helps us to better lead</span></a></h3><span data-dcnode-id="622" instrument_node=""> </span></header><span data-dcnode-id="619" instrument_node="">
</span><div class="entry-content" data-dcnode-id="572"><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Make no mistake. All of us are called to be leaders.  Stop for a moment and think about who is looking for you to lead them through their lives or even a challenging moment.  Are you willing to step up and if so, are you prepared to take on the responsibilities that come with being a leader?</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="614" instrument_node="">Dave Anderson shares to be a good leader, we must first learn to be a good follower.  “Before West Point expects cadets to become leaders, they train them how to be good followers. America’s leadership university designs the entire freshman (plebe) year around the idea of followership. Before you can effectively lead others, you need to understand how to be a good follower.”  That way we can harken back to what it felt like to follow someone who set a positive example of what leading others looked like to you and how it may you feel.  Dave goes on to say and I paraphrase, “The definition of </span><em data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Selflessness</span></em><span data-dcnode-id="611" instrument_node=""> is putting the needs of others before our own needs, desires or convenience. When we can learn to do that as a follower, it creates a habit that will prepare us to do the same thing when we are called to lead others in the future.”  Check out his character test here.  </span><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.becomingaleaderofcharacter.com/my-mirror-character-assessment"><span data-dcnode-id="610" instrument_node="">https://www.becomingaleaderofcharacter.com/my-mirror-character-assessment</span></a><span data-dcnode-id="608" instrument_node="">  Be honest 🙂  How did you do?</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="605" instrument_node="">Another term for </span><em data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">selflessness</span></em><span data-dcnode-id="602" instrument_node=""> is </span><em data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">servant heartedness</span></em><span data-dcnode-id="599" instrument_node="">.  Think about how you felt when being served.  Doesn’t it make you want to go out and serve others so they can be made to feel the same way?  It is what I call “turning the word gratitude into a verb”. Being served by others will help us learn the impact we can have when we serve them.  One lesson that is very hard to learn for one in a leadership position is asking for or accepting when offered, someone’s help.  The misnomer here is that leaders are to be strong and not show a weakness or vulnerability.  Nothing can be further from the truth.  </span></p><span data-dcnode-id="597" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="595"><img alt="" class="wp-image-1773" data-dcnode-id="596" height="193" loading="lazy" sizes="(max-width: 145px) 100vw, 145px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22022-gift.jpg&amp;raw" srcset="https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22022-gift.jpg 549w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22022-gift-225x300.jpg 225w" width="145"></figure><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Think about a beautifully wrapped present that someone wants to give to you.  The present doesn’t become a gift until the person receiving it accepts it.  Its purpose is left unfulfilled.  My friend, Kim Farrar, says it this way. “I cannot bless you if you won’t accept what it is I am trying to give or you say how can I repay you?”  </span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">John Maxwell writes, “If you’re all alone, that means nobody is following you. And if nobody is following you, then you’re not really leading.”  </span></p><span data-dcnode-id="588" instrument_node="">
</span><figure class="wp-block-image size-full is-resized" data-dcnode-id="586"><img alt="" class="wp-image-1774" data-dcnode-id="587" height="103" loading="lazy" sizes="(max-width: 206px) 100vw, 206px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22022-leader.jpg&amp;raw" srcset="https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22022-leader.jpg 736w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22022-leader-300x150.jpg 300w" width="206"></figure><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Who is God calling you to lead?  Even if only one person comes to mind, be the best leader you can be by finding ways to serve them well.  Love and care for them as God loves and cares for you.  That way you can confidently move lives forward (wink, wink, Liza Myers Borches) implementing what Dave Anderson writes about Followership. That it is a foundation to leadership. Someone who learns to be a good follower, will be more prepared to be a good leader.” There is noone better to follow first than our Lord Jesus Christ.  When we do he promises in Matthew 4:19 to make you “fishers of mankind”. </span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Please subscribe to this blog to receive email notifications when new content is posted.  You can reach me by email at michael@mrg7175.com  I would love to hear how you did on Dave Anderson’s character assessment </span></p><span data-dcnode-id="579" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="577"><img alt="" class="wp-image-1775" data-dcnode-id="578" height="132" loading="lazy" sizes="(max-width: 254px) 100vw, 254px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22022-follow-me-1024x536.jpg&amp;raw" srcset="https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22022-follow-me-1024x536.jpg 1024w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22022-follow-me-300x157.jpg 300w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22022-follow-me-768x402.jpg 768w, https://secureservercdn.net/198.71.233.44/x4a.ccb.myftpupload.com/wp-content/uploads/2022/02/blog-photo-22022-follow-me.jpg 1376w" width="254"></figure><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node=""> </span></p><span data-dcnode-id="573" instrument_node="">
