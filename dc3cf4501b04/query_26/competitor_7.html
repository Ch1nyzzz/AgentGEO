</span><table align="center" bgcolor="white" border="0" bordercolor="#613B99" cellpadding="10" cellspacing="0" class="c1" data-dcnode-id="317" width="746"><tbody data-dcnode-id="318"><tr data-dcnode-id="320"><td align="center" data-dcnode-id="322" width="742"><span data-dcnode-id="1677" instrument_node="">
</span><span data-dcnode-id="1675" instrument_node="">
</span><div class="western" data-dcnode-id="1667"><span data-dcnode-id="1674" instrument_node="">
</span><span class="c1" data-dcnode-id="1670" id="header1"><span data-dcnode-id="1673" instrument_node="">ADVERSITY PRAYERS</span><br data-dcnode-id="1672"><br data-dcnode-id="1671"></span><span data-dcnode-id="1669" instrument_node="">
</span><hr data-dcnode-id="1668"></div><span data-dcnode-id="1666" instrument_node=""> </span><span data-dcnode-id="1664" instrument_node="">
</span><div data-dcnode-id="1609" id="prayer1" style="display:block;"><span data-dcnode-id="1663" instrument_node=""> </span><span data-dcnode-id="1661" instrument_node="">
</span><span class="c3" data-dcnode-id="1657"><span data-dcnode-id="1660" instrument_node="">UNDERSTANDING AND INSIGHT</span><br data-dcnode-id="1659"><br data-dcnode-id="1658"></span><span data-dcnode-id="1656" instrument_node="">
</span><span class="c2" data-dcnode-id="1612"><span data-dcnode-id="1655" instrument_node="">Dear God, I pray that I understand what is going on now in my life.  May I have Your higher Mind come through my human mind to give me insight.  My human mind, dear God, is confused, and does not understand. I do not comprehend the reasons for the happenings and, God, I need to ask You, why?  I know that You have the answer God, and I pray that I am given that answer.  I pray that I can see from a higher vantage point.
</span><br data-dcnode-id="1654"><span data-dcnode-id="1653" instrument_node="">
</span><br data-dcnode-id="1652"><span data-dcnode-id="1651" instrument_node="">
I know that at any given point in my life, I only see a small portion of the overall tapestry that makes up my life.  I know that You have an overall plan of good for my life and I ask You to help me to comprehend it.  Help me to see and reason why this will turn to good, because to the appearances of my eyes, I am blind to that good at this present moment.  I know that You have the last word in my life, God, and that last word will always be good.  I pray that You will take away my pain as I wait for my higher answer.  I know that You will turn the situation into good, and I am willing to cooperate to do everything within my human power to bring about your Divine good in my life.  I pray that I will understand the people in my life and why they do the things they do and the reasons behind their actions.  I pray that I will understand with more than my past experience.
</span><br data-dcnode-id="1650"><span data-dcnode-id="1649" instrument_node="">
</span><br data-dcnode-id="1648"><span data-dcnode-id="1647" instrument_node="">
I pray that I will understand people with the wisdom of Your Mind that knows all people and all situations that people find themselves in.
</span><br data-dcnode-id="1646"><span data-dcnode-id="1645" instrument_node="">
</span><br data-dcnode-id="1644"><span data-dcnode-id="1643" instrument_node="">
I pray that I will understand, with deep insight, people's actions and reactions.  I pray that I will understand why these people in my life decided to act in this way.  I pray that I will have insight, insight that is higher than just a small individual limited isolated event. May I see the overall plan of good for my life and know that this one event is not the end all, it is just a blip in the road on the pathway to the endless good that You have prepared for me.
</span><br data-dcnode-id="1642"><span data-dcnode-id="1641" instrument_node="">
</span><br data-dcnode-id="1640"><span data-dcnode-id="1639" instrument_node="">
Dear God, I pray that You will turn the situation, both in my mind and in my environment, to a demonstrable, livable good.  I pray that I begin experiencing good from this situation, in my thoughts about it and in my outer life immediately.  Help me to realize that for everything there is a season and that the green will bloom again, and the flowers will spring up forth in my life to decorate my days with joy.  I pray that I am not locked into a painful past or to this event by reliving it over and over in my mind.  I pray that I can realize that I am not a victim.
</span><br data-dcnode-id="1638"><span data-dcnode-id="1637" instrument_node="">
</span><br data-dcnode-id="1636"><span data-dcnode-id="1635" instrument_node="">
This event is now past. It has no power over me.  It no longer exists in my life.  Only You hold power over my life, and I know You love me.  I realize, God, that through my free will I am the one that has to make the decision to walk towards a brighter tomorrow.
</span><br data-dcnode-id="1634"><span data-dcnode-id="1633" instrument_node="">
</span><br data-dcnode-id="1632"><span data-dcnode-id="1631" instrument_node="">
Therefore I shake the dust off my feet of this unwanted experience and I willingly walk forward.  Dear God, I ask for You to empower me as I move in positive directions in mind and in body.  I pray for the insight to know when, and how, to make my journey towards Your good.  I pray that You will give me understanding so that I can utilize the best traits in myself from the knowledge of studying the good and bad in those that have been in my life in this experience.  I know that I can learn from the bad as well as the good.
</span><br data-dcnode-id="1630"><span data-dcnode-id="1629" instrument_node="">
</span><br data-dcnode-id="1628"><span data-dcnode-id="1627" instrument_node="">
I pray that You will also give me insight and understanding about myself, show me things that I have been blind to, both good and bad held in my soul, so that I can develop, and follow You down the road of Your perfection.  I pray that my mind is fertile soil for Your Divine understanding. I know that the clouds over my present life are just temporarily there until the winds of the Holy Spirit move.
</span><br data-dcnode-id="1626"><span data-dcnode-id="1625" instrument_node="">
</span><br data-dcnode-id="1624"><span data-dcnode-id="1623" instrument_node="">
Dear God, please give me a glimpse in mind of the good that will be in my life tomorrow so that I may be empowered in my hope.  I pray that I will know, in my human mind, the things that are spiritual.  I pray that I will be given understanding and insight beyond my schooling, training, Bible studies and what I have learned through a lifetime of going to church. May I have the truth of spirituality directly from You so that I may forgive and love like You do.  I pray for understanding and insight that is broad and expansive. May it be a growing thing inside of me and never limited by my own human reasoning.  I pray that my understanding and insight is from your continuous wellspring flowing within me.  I do not live in a world that is just black and white. May my opinions never just be black and white.  May I see a Your rainbow of God possibilities.
</span><br data-dcnode-id="1622"><span data-dcnode-id="1621" instrument_node="">
</span><br data-dcnode-id="1620"><span data-dcnode-id="1619" instrument_node="">
God, I pray for eyes that can see.  I know there are roads in my life that will lead me to new people and experiences that I need. I pray also that I find them. I pray that from now on I am gifted with understanding and insight ahead of time so that I may be fully prepared for any and all events that will come my way, and I will know how to enter my future with success and victory.
</span><br data-dcnode-id="1618"><span data-dcnode-id="1617" instrument_node="">
</span><br data-dcnode-id="1616"><span data-dcnode-id="1615" instrument_node="">
In Jesus Christ's name, Amen</span><br data-dcnode-id="1614"><br data-dcnode-id="1613"></span><span data-dcnode-id="1611" instrument_node="">
</span><hr data-dcnode-id="1610"></div><span data-dcnode-id="1608" instrument_node=""> </span><span data-dcnode-id="1606" instrument_node="">
</span><div data-dcnode-id="1573" id="prayer2" style="display:none;"><span data-dcnode-id="1605" instrument_node=""> </span><span data-dcnode-id="1603" instrument_node="">
</span><span class="c3" data-dcnode-id="1599"><span data-dcnode-id="1602" instrument_node="">STANDING FIRM, WITH GOD</span><br data-dcnode-id="1601"><br data-dcnode-id="1600"></span><span data-dcnode-id="1598" instrument_node="">
</span><span class="c2" data-dcnode-id="1576"><span data-dcnode-id="1597" instrument_node="">Dear God, help me be 
</span><br data-dcnode-id="1596"><span data-dcnode-id="1595" instrument_node="">
patient as I wait for the right
</span><br data-dcnode-id="1594"><span data-dcnode-id="1593" instrument_node="">
outcome to be made manifest in the 
</span><br data-dcnode-id="1592"><span data-dcnode-id="1591" instrument_node="">
situation I currently face.
</span><br data-dcnode-id="1590"><span data-dcnode-id="1589" instrument_node="">
I know that Your Spirit is with me and within me, 
</span><br data-dcnode-id="1588"><span data-dcnode-id="1587" instrument_node="">
and I know that You, God, are more powerful 
</span><br data-dcnode-id="1586"><span data-dcnode-id="1585" instrument_node="">
than the problem.
</span><br data-dcnode-id="1584"><span data-dcnode-id="1583" instrument_node="">
My faith in you is steadfast.
</span><br data-dcnode-id="1582"><span data-dcnode-id="1581" instrument_node="">
</span><br data-dcnode-id="1580"><span data-dcnode-id="1579" instrument_node="">
In Jesus Christ's name, Amen
</span><br data-dcnode-id="1578"><br data-dcnode-id="1577"></span><span data-dcnode-id="1575" instrument_node="">
</span><hr data-dcnode-id="1574"></div><span data-dcnode-id="1572" instrument_node=""> </span><span data-dcnode-id="1570" instrument_node="">
</span><div data-dcnode-id="1531" id="prayer3" style="display:none;"><span data-dcnode-id="1569" instrument_node=""> </span><span data-dcnode-id="1567" instrument_node="">
</span><span class="c3" data-dcnode-id="1563"><span data-dcnode-id="1566" instrument_node="">GOD IS WORKING FOR GOOD</span><br data-dcnode-id="1565"><br data-dcnode-id="1564"></span><span data-dcnode-id="1562" instrument_node="">
</span><span class="c2" data-dcnode-id="1534"><span data-dcnode-id="1561" instrument_node="">I decree for you that you are
</span><br data-dcnode-id="1560"><span data-dcnode-id="1559" instrument_node="">
faith-filled and patient as God's
</span><br data-dcnode-id="1558"><span data-dcnode-id="1557" instrument_node="">
light leads you to your highest good.
</span><br data-dcnode-id="1556"><span data-dcnode-id="1555" instrument_node="">
I ask you to hold in your thoughts and
</span><br data-dcnode-id="1554"><span data-dcnode-id="1553" instrument_node="">
in your prayers continuously this thought:
</span><br data-dcnode-id="1552"><span data-dcnode-id="1551" instrument_node="">
I AM FAITHFILLED AND PATIENT AS GOD'S LIGHT LEADS ME TO MY HIGHEST GOOD.
</span><br data-dcnode-id="1550"><span data-dcnode-id="1549" instrument_node="">
Remember what it says in Romans 8:28:
</span><br data-dcnode-id="1548"><span data-dcnode-id="1547" instrument_node="">
"In everything God works for good." 
</span><br data-dcnode-id="1546"><span data-dcnode-id="1545" instrument_node="">
Not in some things, not only for some people,
</span><br data-dcnode-id="1544"><span data-dcnode-id="1543" instrument_node="">
but in everyone's life, God works for good.
</span><br data-dcnode-id="1542"><span data-dcnode-id="1541" instrument_node="">
Believe that and have patience in that.
</span><br data-dcnode-id="1540"><span data-dcnode-id="1539" instrument_node="">
Know that God is with you.
</span><br data-dcnode-id="1538"><span data-dcnode-id="1537" instrument_node="">
God Bless You!
</span><br data-dcnode-id="1536"><br data-dcnode-id="1535"></span><span data-dcnode-id="1533" instrument_node="">
</span><hr data-dcnode-id="1532"></div><span data-dcnode-id="1530" instrument_node=""> </span><span data-dcnode-id="1528" instrument_node="">
</span><div data-dcnode-id="1473" id="prayer4" style="display:none;"><span data-dcnode-id="1527" instrument_node=""> </span><span data-dcnode-id="1525" instrument_node="">
</span><span class="c3" data-dcnode-id="1521"><span data-dcnode-id="1524" instrument_node="">TAKING COMMAND</span><br data-dcnode-id="1523"><br data-dcnode-id="1522"></span><span data-dcnode-id="1520" instrument_node="">
</span><span class="c2" data-dcnode-id="1476"><span data-dcnode-id="1519" instrument_node="">"Peace! Be still!" And the wind ceased, and
</span><br data-dcnode-id="1518"><span data-dcnode-id="1517" instrument_node="">
there was a great calm.
</span><br data-dcnode-id="1516"><span data-dcnode-id="1515" instrument_node="">
Mark 4:39
</span><br data-dcnode-id="1514"><span data-dcnode-id="1513" instrument_node="">
</span><br data-dcnode-id="1512"><span data-dcnode-id="1511" instrument_node="">

Jesus Christ issued this command to the wind and 
</span><br data-dcnode-id="1510"><span data-dcnode-id="1509" instrument_node="">
the waves when His disciples became alarmed and fearful
</span><br data-dcnode-id="1508"><span data-dcnode-id="1507" instrument_node="">
because of the stormy sea.
</span><br data-dcnode-id="1506"><span data-dcnode-id="1505" instrument_node="">
Immediately "the wind ceased, and
</span><br data-dcnode-id="1504"><span data-dcnode-id="1503" instrument_node="">
there was great calm."
</span><br data-dcnode-id="1502"><span data-dcnode-id="1501" instrument_node="">
</span><br data-dcnode-id="1500"><span data-dcnode-id="1499" instrument_node="">

How great must have been Jesus' realization of 
</span><br data-dcnode-id="1498"><span data-dcnode-id="1497" instrument_node="">
His mastery over all
</span><br data-dcnode-id="1496"><span data-dcnode-id="1495" instrument_node="">
circumstances.
</span><br data-dcnode-id="1494"><span data-dcnode-id="1493" instrument_node="">
</span><br data-dcnode-id="1492"><span data-dcnode-id="1491" instrument_node="">

You, too, can take command of 
</span><br data-dcnode-id="1490"><span data-dcnode-id="1489" instrument_node="">
your life and circumstances of your life.
</span><br data-dcnode-id="1488"><span data-dcnode-id="1487" instrument_node="">
Through the power of God with you and within you,
</span><br data-dcnode-id="1486"><span data-dcnode-id="1485" instrument_node="">
you can assume leadership over your life and give 
</span><br data-dcnode-id="1484"><span data-dcnode-id="1483" instrument_node="">
the directive of peace and serenity to
</span><br data-dcnode-id="1482"><span data-dcnode-id="1481" instrument_node="">
fearful thoughts within you and the troubling
</span><br data-dcnode-id="1480"><span data-dcnode-id="1479" instrument_node="">
conditions about you.
</span><br data-dcnode-id="1478"><br data-dcnode-id="1477"></span><span data-dcnode-id="1475" instrument_node="">
</span><hr data-dcnode-id="1474"></div><span data-dcnode-id="1472" instrument_node=""> </span><span data-dcnode-id="1470" instrument_node="">
</span><div data-dcnode-id="1445" id="prayer5" style="display:none;"><span data-dcnode-id="1469" instrument_node=""> </span><span data-dcnode-id="1467" instrument_node="">
</span><span class="c3" data-dcnode-id="1463"><span data-dcnode-id="1466" instrument_node="">Say this prayer today before thinking about any problem:</span><br data-dcnode-id="1465"><br data-dcnode-id="1464"></span><span data-dcnode-id="1462" instrument_node="">
</span><span class="c2" data-dcnode-id="1448"><span data-dcnode-id="1461" instrument_node="">"God empowers, protects, surrounds, and infills me.
</span><br data-dcnode-id="1460"><span data-dcnode-id="1459" instrument_node="">
God radiates forth from me, clearing my way.
</span><br data-dcnode-id="1458"><span data-dcnode-id="1457" instrument_node="">
My way is paved with the good of God; nothing but good awaits me and mine.
</span><br data-dcnode-id="1456"><span data-dcnode-id="1455" instrument_node="">
My problem dissipates now before the radiant life of God.
</span><br data-dcnode-id="1454"><span data-dcnode-id="1453" instrument_node="">
My mind and body, in all circumstances, are cleansed, renewed, and regenerated into newness of life.
</span><br data-dcnode-id="1452"><span data-dcnode-id="1451" instrument_node="">
I proclaim with Jesus, "God and I are one."
</span><br data-dcnode-id="1450"><br data-dcnode-id="1449"></span><span data-dcnode-id="1447" instrument_node="">
</span><hr data-dcnode-id="1446"></div><span data-dcnode-id="1444" instrument_node=""> </span><span data-dcnode-id="1442" instrument_node="">
</span><div data-dcnode-id="1350" id="prayer6" style="display:none;"><span data-dcnode-id="1441" instrument_node=""> </span><span data-dcnode-id="1439" instrument_node="">
</span><span class="c3" data-dcnode-id="1435"><span data-dcnode-id="1438" instrument_node="">Inspiration Concerning Adversity</span><br data-dcnode-id="1437"><br data-dcnode-id="1436"></span><span data-dcnode-id="1434" instrument_node="">
</span><span class="c2" data-dcnode-id="1351"><span data-dcnode-id="1433" instrument_node="">
Though the road was steep and long,
 </span><br data-dcnode-id="1432"><span data-dcnode-id="1431" instrument_node="">
And through a dark and lonely land, 
</span><br data-dcnode-id="1430"><span data-dcnode-id="1429" instrument_node="">
God set upon my lips a song, 
</span><br data-dcnode-id="1428"><span data-dcnode-id="1427" instrument_node="">
And put a lantern in my hand. - Anonymous 
</span><br data-dcnode-id="1426"><span data-dcnode-id="1425" instrument_node="">
</span><br data-dcnode-id="1424"><span data-dcnode-id="1423" instrument_node="">
How To Handle Something That You Believe is More Than You Can Handle:
</span><br data-dcnode-id="1422"><span data-dcnode-id="1421" instrument_node="">
In a moment we can change our whole world by going to God and saying, 
</span><br data-dcnode-id="1420"><span data-dcnode-id="1419" instrument_node="">
"God, I need Your help. I know You are for me and not against me. 
</span><br data-dcnode-id="1418"><span data-dcnode-id="1417" instrument_node="">
I know that through Your power coming through me, 
</span><br data-dcnode-id="1416"><span data-dcnode-id="1415" instrument_node="">
I can change this situation - starting with my opinion of it." - Christopher Ian Chenoweth
</span><br data-dcnode-id="1414"><span data-dcnode-id="1413" instrument_node="">
</span><br data-dcnode-id="1412"><span data-dcnode-id="1411" instrument_node="">
Napoleon Hill said, "Every adversity, every failure, every heartache 
</span><br data-dcnode-id="1410"><span data-dcnode-id="1409" instrument_node="">
carries with it the seed on an equal or greater benefit."
</span><br data-dcnode-id="1408"><span data-dcnode-id="1407" instrument_node="">
</span><br data-dcnode-id="1406"><span data-dcnode-id="1405" instrument_node="">
"All the adversity I've had in my life, all my troubles and obstacles, 
</span><br data-dcnode-id="1404"><span data-dcnode-id="1403" instrument_node="">
have strengthened me... You may not realize it when it happens, 
</span><br data-dcnode-id="1402"><span data-dcnode-id="1401" instrument_node="">
but a kick in the teeth may be the best thing in the world for you."  Walt Disney  
</span><br data-dcnode-id="1400"><span data-dcnode-id="1399" instrument_node="">
</span><br data-dcnode-id="1398"><span data-dcnode-id="1397" instrument_node="">
I have felt in a strange land and longing for familiar landmarks. 
</span><br data-dcnode-id="1396"><span data-dcnode-id="1395" instrument_node="">
When I feel such a hungering, I try to draw
</span><br data-dcnode-id="1394"><span data-dcnode-id="1393" instrument_node="">
very close to God and rest in the assurance that all is well. 
</span><br data-dcnode-id="1392"><span data-dcnode-id="1391" instrument_node="">
I know that God would not have me struggle with
</span><br data-dcnode-id="1390"><span data-dcnode-id="1389" instrument_node="">
unknown things, or talk of that which I have not proved. 
</span><br data-dcnode-id="1388"><span data-dcnode-id="1387" instrument_node="">
I realize that that which God would have me do God 
</span><br data-dcnode-id="1386"><span data-dcnode-id="1385" instrument_node="">
inspires in me, that it is very easy to do God's will, 
</span><br data-dcnode-id="1384"><span data-dcnode-id="1383" instrument_node="">
and that when I thus conduct myself, a great peace and 
</span><br data-dcnode-id="1382"><span data-dcnode-id="1381" instrument_node="">
friendliness comes and abides. - Myrtle Fillmore, Healing Letters
</span><br data-dcnode-id="1380"><span data-dcnode-id="1379" instrument_node="">
</span><br data-dcnode-id="1378"><span data-dcnode-id="1377" instrument_node="">
I am here only to be truly helpful. 
</span><br data-dcnode-id="1376"><span data-dcnode-id="1375" instrument_node="">
I am here to represent Him who sent me.
 </span><br data-dcnode-id="1374"><span data-dcnode-id="1373" instrument_node="">
I do not have to worry about what to say or what to do,
 </span><br data-dcnode-id="1372"><span data-dcnode-id="1371" instrument_node="">
because He who sent me will direct me.
 </span><br data-dcnode-id="1370"><span data-dcnode-id="1369" instrument_node="">
I am content to be wherever He wishes, 
</span><br data-dcnode-id="1368"><span data-dcnode-id="1367" instrument_node="">
knowing He goes there with me. 
</span><br data-dcnode-id="1366"><span data-dcnode-id="1365" instrument_node="">
I will be healed as I let Him teach me to heal. - A Course in Miracles
</span><br data-dcnode-id="1364"><span data-dcnode-id="1363" instrument_node="">
</span><br data-dcnode-id="1362"><span data-dcnode-id="1361" instrument_node="">
"Always seek out the seed of triumph in every adversity." - Og Mandino 
</span><br data-dcnode-id="1360"><span data-dcnode-id="1359" instrument_node="">
</span><br data-dcnode-id="1358"><span data-dcnode-id="1357" instrument_node="">
"Sometimes adversity is what you need to face in order to become successful." - Zig Ziglar 
</span><br data-dcnode-id="1356"><span data-dcnode-id="1355" instrument_node="">
</span><br data-dcnode-id="1354"><span data-dcnode-id="1353" instrument_node="">
"Let me embrace thee, sour adversity, for wise men say it is the wisest course." - William Shakespeare 
 

</span><hr data-dcnode-id="1352"></span></div><span data-dcnode-id="1349" instrument_node=""> </span><span data-dcnode-id="1347" instrument_node="">
</span><div data-dcnode-id="1312" id="prayer7" style="display:none;"><span data-dcnode-id="1346" instrument_node=""> </span><span data-dcnode-id="1344" instrument_node="">
</span><span class="c3" data-dcnode-id="1340"><span data-dcnode-id="1343" instrument_node="">REFRAME ADVERSITY</span><br data-dcnode-id="1342"><br data-dcnode-id="1341"></span><span data-dcnode-id="1339" instrument_node="">
</span><span class="c2" data-dcnode-id="1315"><span data-dcnode-id="1338" instrument_node="">Dear God, when I face adversity
 </span><br data-dcnode-id="1337"><span data-dcnode-id="1336" instrument_node="">
let me have the wisdom not to curse it.
</span><br data-dcnode-id="1335"><span data-dcnode-id="1334" instrument_node="">
I welcome it because You are by my side helping
 </span><br data-dcnode-id="1333"><span data-dcnode-id="1332" instrument_node="">
me every step of my way.
</span><br data-dcnode-id="1331"><span data-dcnode-id="1330" instrument_node="">
I pray that I will become more skilled at asking for Your help.
</span><br data-dcnode-id="1329"><span data-dcnode-id="1328" instrument_node="">
More wise at realizing Your ever-abiding presence - ever with me.
</span><br data-dcnode-id="1327"><span data-dcnode-id="1326" instrument_node="">
Together, we will make success.
</span><br data-dcnode-id="1325"><span data-dcnode-id="1324" instrument_node="">
Together, we will walk past this momentary seeming setback.
</span><br data-dcnode-id="1323"><span data-dcnode-id="1322" instrument_node="">
Together, we will celebrate victory.
</span><br data-dcnode-id="1321"><span data-dcnode-id="1320" instrument_node="">
</span><br data-dcnode-id="1319"><span data-dcnode-id="1318" instrument_node="">
In Jesus Christ's name ... Amen
</span><br data-dcnode-id="1317"><br data-dcnode-id="1316"></span><span data-dcnode-id="1314" instrument_node="">
</span><hr data-dcnode-id="1313"></div><span data-dcnode-id="1311" instrument_node=""> </span><span data-dcnode-id="1309" instrument_node="">
</span><div data-dcnode-id="1268" id="prayer8" style="display:none;"><span data-dcnode-id="1308" instrument_node=""> </span><span data-dcnode-id="1306" instrument_node="">
</span><span class="c3" data-dcnode-id="1302"><span data-dcnode-id="1305" instrument_node="">GOD IS AT WORK</span><br data-dcnode-id="1304"><br data-dcnode-id="1303"></span><span data-dcnode-id="1301" instrument_node="">
</span><span class="c2" data-dcnode-id="1271"><span data-dcnode-id="1300" instrument_node="">The great creative energies of God 
</span><br data-dcnode-id="1299"><span data-dcnode-id="1298" instrument_node="">
are at work in my life - ever renewing, 
</span><br data-dcnode-id="1297"><span data-dcnode-id="1296" instrument_node="">
ever restoring, ever-refreshing.
 </span><br data-dcnode-id="1295"><span data-dcnode-id="1294" instrument_node="">
I decree, in Jesus Christ's name, that 
</span><br data-dcnode-id="1293"><span data-dcnode-id="1292" instrument_node="">
God's great creative energies spring
</span><br data-dcnode-id="1291"><span data-dcnode-id="1290" instrument_node="">
forth new within me.
 </span><br data-dcnode-id="1289"><span data-dcnode-id="1288" instrument_node="">
God's power is present within me,
 </span><br data-dcnode-id="1287"><span data-dcnode-id="1286" instrument_node="">
and I am capable of rising up. 
</span><br data-dcnode-id="1285"><span data-dcnode-id="1284" instrument_node="">
God fills me with new Divine hope and new
</span><br data-dcnode-id="1283"><span data-dcnode-id="1282" instrument_node="">
Divine enthusiasm for my life.
 </span><br data-dcnode-id="1281"><span data-dcnode-id="1280" instrument_node="">
God is active in every thought of
</span><br data-dcnode-id="1279"><span data-dcnode-id="1278" instrument_node="">
my mind, creating for me
</span><br data-dcnode-id="1277"><span data-dcnode-id="1276" instrument_node="">
a perfect outcome.
</span><br data-dcnode-id="1275"><span data-dcnode-id="1274" instrument_node="">
Amen
</span><br data-dcnode-id="1273"><br data-dcnode-id="1272"></span><span data-dcnode-id="1270" instrument_node="">
</span><hr data-dcnode-id="1269"></div><span data-dcnode-id="1267" instrument_node=""> </span><span data-dcnode-id="1265" instrument_node="">
</span><div data-dcnode-id="1222" id="prayer9" style="display:none;"><span data-dcnode-id="1264" instrument_node=""> </span><span data-dcnode-id="1262" instrument_node="">
</span><span class="c3" data-dcnode-id="1258"><span data-dcnode-id="1261" instrument_node="">Overcoming Adversity</span><br data-dcnode-id="1260"><br data-dcnode-id="1259"></span><span data-dcnode-id="1257" instrument_node="">
</span><span class="c2" data-dcnode-id="1225"><span data-dcnode-id="1256" instrument_node="">Dear God, I am facing adversity in my life.
</span><br data-dcnode-id="1255"><span data-dcnode-id="1254" instrument_node="">
I choose not to face it alone.
</span><br data-dcnode-id="1253"><span data-dcnode-id="1252" instrument_node="">
I consent to Your ever-abiding help.
</span><br data-dcnode-id="1251"><span data-dcnode-id="1250" instrument_node="">
I am ready and willing to accept Your guidance.
</span><br data-dcnode-id="1249"><span data-dcnode-id="1248" instrument_node="">
I am ready to be changed for the better.
</span><br data-dcnode-id="1247"><span data-dcnode-id="1246" instrument_node="">
Help me to transform this adversity into a strength.
</span><br data-dcnode-id="1245"><span data-dcnode-id="1244" instrument_node="">
Help me not to get bogged down in the valley of the problem.
</span><br data-dcnode-id="1243"><span data-dcnode-id="1242" instrument_node="">
Uplift me to new heights, that I was blind to before.
</span><br data-dcnode-id="1241"><span data-dcnode-id="1240" instrument_node="">
I pray that this adversity is a turning point in my life.
</span><br data-dcnode-id="1239"><span data-dcnode-id="1238" instrument_node="">
I do not accept that this adversity is here to stay.
</span><br data-dcnode-id="1237"><span data-dcnode-id="1236" instrument_node="">
Your power, Your authority, Your will works through me now.
</span><br data-dcnode-id="1235"><span data-dcnode-id="1234" instrument_node="">
God's total transformation will re-create me.
</span><br data-dcnode-id="1233"><span data-dcnode-id="1232" instrument_node="">
I give thanks now, I will give thanks every day of my life.
</span><br data-dcnode-id="1231"><span data-dcnode-id="1230" instrument_node="">
</span><br data-dcnode-id="1229"><span data-dcnode-id="1228" instrument_node="">
In Jesus Christ's name... Amen
</span><br data-dcnode-id="1227"><br data-dcnode-id="1226"></span><span data-dcnode-id="1224" instrument_node="">
</span><hr data-dcnode-id="1223"></div><span data-dcnode-id="1221" instrument_node=""> </span><span data-dcnode-id="1219" instrument_node="">
</span><div data-dcnode-id="1176" id="prayer10" style="display:none;"><span data-dcnode-id="1218" instrument_node=""> </span><span data-dcnode-id="1216" instrument_node="">
</span><span class="c3" data-dcnode-id="1212"><span data-dcnode-id="1215" instrument_node="">Prayer for Challenging Times</span><br data-dcnode-id="1214"><br data-dcnode-id="1213"></span><span data-dcnode-id="1211" instrument_node="">
</span><span class="c2" data-dcnode-id="1179"><span data-dcnode-id="1210" instrument_node="">Dear God, in the most difficult and challenging times, I recognize You.
</span><br data-dcnode-id="1209"><span data-dcnode-id="1208" instrument_node="">
Your tender and merciful love is with me and working for me.
</span><br data-dcnode-id="1207"><span data-dcnode-id="1206" instrument_node="">
I turn to You for comfort and reassurance.
</span><br data-dcnode-id="1205"><span data-dcnode-id="1204" instrument_node="">
I find courage and trust to live my life triumphantly.
</span><br data-dcnode-id="1203"><span data-dcnode-id="1202" instrument_node="">
I am comforted.
</span><br data-dcnode-id="1201"><span data-dcnode-id="1200" instrument_node="">
Even though it may seem, that because of some loss the door to my good has closed, 
</span><br data-dcnode-id="1199"><span data-dcnode-id="1198" instrument_node="">
I know that You provide another door to new, undiscovered good.
</span><br data-dcnode-id="1197"><span data-dcnode-id="1196" instrument_node="">
I ask Your help to move past feelings of discouragement 
</span><br data-dcnode-id="1195"><span data-dcnode-id="1194" instrument_node="">
and cross over the threshold to true comfort, peace, and joy.
</span><br data-dcnode-id="1193"><span data-dcnode-id="1192" instrument_node="">
Your loving kindness comforts my mind, body, and emotions.
</span><br data-dcnode-id="1191"><span data-dcnode-id="1190" instrument_node="">
Your loving kindness provides for complete healing and restoration.
</span><br data-dcnode-id="1189"><span data-dcnode-id="1188" instrument_node="">
I know, Your Will for me is abundant good, which is expressed in infinite ways.
</span><br data-dcnode-id="1187"><span data-dcnode-id="1186" instrument_node="">
When I know this in faith, I am comforted and uplifted.
</span><br data-dcnode-id="1185"><span data-dcnode-id="1184" instrument_node="">
</span><br data-dcnode-id="1183"><span data-dcnode-id="1182" instrument_node="">
In Jesus Christ's name... Amen
</span><br data-dcnode-id="1181"><br data-dcnode-id="1180"></span><span data-dcnode-id="1178" instrument_node="">
</span><hr data-dcnode-id="1177"></div><span data-dcnode-id="1175" instrument_node=""> </span><span data-dcnode-id="1173" instrument_node="">
</span><div data-dcnode-id="1138" id="prayer11" style="display:none;"><span data-dcnode-id="1172" instrument_node=""> </span><span data-dcnode-id="1170" instrument_node="">
</span><span class="c3" data-dcnode-id="1166"><span data-dcnode-id="1169" instrument_node="">RELY ON GOD</span><br data-dcnode-id="1168"><br data-dcnode-id="1167"></span><span data-dcnode-id="1165" instrument_node="">
</span><span class="c2" data-dcnode-id="1141"><span data-dcnode-id="1164" instrument_node="">Dear God, in times of adversity, 
</span><br data-dcnode-id="1163"><span data-dcnode-id="1162" instrument_node="">
and on days where everything seems perfect,
</span><br data-dcnode-id="1161"><span data-dcnode-id="1160" instrument_node="">
I pray that I remember to rely totally on You. I am tired 
</span><br data-dcnode-id="1159"><span data-dcnode-id="1158" instrument_node="">
of the struggle, stress, and strain 
</span><br data-dcnode-id="1157"><span data-dcnode-id="1156" instrument_node="">
of going it alone. 
</span><br data-dcnode-id="1155"><span data-dcnode-id="1154" instrument_node="">
I am ready to rely on something greater than 
</span><br data-dcnode-id="1153"><span data-dcnode-id="1152" instrument_node="">
my own self. I pray that my awareness is so spiritual
</span><br data-dcnode-id="1151"><span data-dcnode-id="1150" instrument_node="">
that I never forget You are 
</span><br data-dcnode-id="1149"><span data-dcnode-id="1148" instrument_node="">
my help in every need.
 </span><br data-dcnode-id="1147"><span data-dcnode-id="1146" instrument_node="">
Thank you God!
</span><br data-dcnode-id="1145"><span data-dcnode-id="1144" instrument_node="">
Amen
</span><br data-dcnode-id="1143"><br data-dcnode-id="1142"></span><span data-dcnode-id="1140" instrument_node="">
</span><hr data-dcnode-id="1139"></div><span data-dcnode-id="1137" instrument_node=""> </span><span data-dcnode-id="1135" instrument_node="">
</span><div data-dcnode-id="1098" id="prayer12" style="display:none;"><span data-dcnode-id="1134" instrument_node=""> </span><span data-dcnode-id="1132" instrument_node="">
</span><span class="c3" data-dcnode-id="1128"><span data-dcnode-id="1131" instrument_node="">HIGHER GROUND</span><br data-dcnode-id="1130"><br data-dcnode-id="1129"></span><span data-dcnode-id="1127" instrument_node="">
</span><span class="c2" data-dcnode-id="1101"><span data-dcnode-id="1126" instrument_node="">Dear God, I know that all good comes from You.
</span><br data-dcnode-id="1125"><span data-dcnode-id="1124" instrument_node="">
Therefore, I take the time to lift my thoughts from the situation
 </span><br data-dcnode-id="1123"><span data-dcnode-id="1122" instrument_node="">
I am facing to higher ground.
</span><br data-dcnode-id="1121"><span data-dcnode-id="1120" instrument_node="">
Through prayer, I enter into the spiritual stillness 
</span><br data-dcnode-id="1119"><span data-dcnode-id="1118" instrument_node="">
and begin to see the situation in new light.
</span><br data-dcnode-id="1117"><span data-dcnode-id="1116" instrument_node="">
In prayer, I slow down the rush of thoughts, 
</span><br data-dcnode-id="1115"><span data-dcnode-id="1114" instrument_node="">
and let the wisdom of God move me into new, 
</span><br data-dcnode-id="1113"><span data-dcnode-id="1112" instrument_node="">
positive ways of thinking.
</span><br data-dcnode-id="1111"><span data-dcnode-id="1110" instrument_node="">
I ask that You give me Divine ideas to move gently through my mind, 
</span><br data-dcnode-id="1109"><span data-dcnode-id="1108" instrument_node="">
as I open myself, through prayer, to receive them.
</span><br data-dcnode-id="1107"><span data-dcnode-id="1106" instrument_node="">
</span><br data-dcnode-id="1105"><span data-dcnode-id="1104" instrument_node="">
In Jesus Christ's name ... Amen
</span><br data-dcnode-id="1103"><br data-dcnode-id="1102"></span><span data-dcnode-id="1100" instrument_node="">
</span><hr data-dcnode-id="1099"></div><span data-dcnode-id="1097" instrument_node=""> </span><span data-dcnode-id="1095" instrument_node="">
</span><div data-dcnode-id="1046" id="prayer13" style="display:none;"><span data-dcnode-id="1094" instrument_node=""> </span><span data-dcnode-id="1092" instrument_node="">
</span><span class="c3" data-dcnode-id="1088"><span data-dcnode-id="1091" instrument_node="">ADVERSITY (hymn) TAKE MY HAND PRECIOUS LORD
</span><br data-dcnode-id="1090"><br data-dcnode-id="1089"></span><span data-dcnode-id="1087" instrument_node="">
</span><span class="c2" data-dcnode-id="1049"><span data-dcnode-id="1086" instrument_node="">Take my hand, Precious Lord,
</span><br data-dcnode-id="1085"><span data-dcnode-id="1084" instrument_node="">
Lead me on, let me stand.
</span><br data-dcnode-id="1083"><span data-dcnode-id="1082" instrument_node="">
I am tired, I am weak, I am worn.
</span><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">
Through the storm, through the night, lead me on to the light.
</span><br data-dcnode-id="1079"><span data-dcnode-id="1078" instrument_node="">
Take my hand, Precious Lord, lead me home.
</span><br data-dcnode-id="1077"><span data-dcnode-id="1076" instrument_node="">
</span><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node="">
When my way grows drear, Precious Lord, linger near
</span><br data-dcnode-id="1073"><span data-dcnode-id="1072" instrument_node="">
When my life is almost gone.
</span><br data-dcnode-id="1071"><span data-dcnode-id="1070" instrument_node="">
Hear my cry, hear my call, hold my hand, lest I fall.
</span><br data-dcnode-id="1069"><span data-dcnode-id="1068" instrument_node="">
Take my hand, Precious Lord, lead me home.
</span><br data-dcnode-id="1067"><span data-dcnode-id="1066" instrument_node="">
</span><br data-dcnode-id="1065"><span data-dcnode-id="1064" instrument_node="">
When the darkness appears and the night draws near
</span><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">
And the day is past and gone,
</span><br data-dcnode-id="1061"><span data-dcnode-id="1060" instrument_node="">
At the river I stand,
</span><br data-dcnode-id="1059"><span data-dcnode-id="1058" instrument_node="">
Guide my feet, hold my hand.
</span><br data-dcnode-id="1057"><span data-dcnode-id="1056" instrument_node="">
Take my hand, Precious Lord, lead me home.
</span><br data-dcnode-id="1055"><span data-dcnode-id="1054" instrument_node="">
</span><br data-dcnode-id="1053"><span data-dcnode-id="1052" instrument_node="">
(Thomas A Dorsey - "Precious Lord" was Martin Luther King Junior's favorite hymn)
</span><br data-dcnode-id="1051"><br data-dcnode-id="1050"></span><span data-dcnode-id="1048" instrument_node="">
</span><hr data-dcnode-id="1047"></div><span data-dcnode-id="1045" instrument_node=""> </span><span data-dcnode-id="1043" instrument_node="">
</span><div data-dcnode-id="990" id="prayer14" style="display:none;"><span data-dcnode-id="1042" instrument_node=""> </span><span data-dcnode-id="1040" instrument_node="">
</span><span class="c3" data-dcnode-id="1036"><span data-dcnode-id="1039" instrument_node="">I Ask for Strength</span><br data-dcnode-id="1038"><br data-dcnode-id="1037"></span><span data-dcnode-id="1035" instrument_node="">
</span><span class="c2" data-dcnode-id="993"><span data-dcnode-id="1034" instrument_node="">Dear God, I ask this day for strength, as I view some others in my life. 
</span><br data-dcnode-id="1033"><span data-dcnode-id="1032" instrument_node="">
Help me. 
</span><br data-dcnode-id="1031"><span data-dcnode-id="1030" instrument_node="">
I pray that I am totally responsible FOR me and that I am responsible TO them. 
</span><br data-dcnode-id="1029"><span data-dcnode-id="1028" instrument_node="">
Let me show, in my life, that I love You with all of my heart, 
</span><br data-dcnode-id="1027"><span data-dcnode-id="1026" instrument_node="">
all of my soul, 
</span><br data-dcnode-id="1025"><span data-dcnode-id="1024" instrument_node="">
all of my mind, 
</span><br data-dcnode-id="1023"><span data-dcnode-id="1022" instrument_node="">
and all of my strength. 
</span><br data-dcnode-id="1021"><span data-dcnode-id="1020" instrument_node="">
Then help me to love my neighbor, realizing this is God's neighborhood and all people are neighbors. 
</span><br data-dcnode-id="1019"><span data-dcnode-id="1018" instrument_node="">
Help me to love my neighbor as I love myself.
</span><br data-dcnode-id="1017"><span data-dcnode-id="1016" instrument_node="">
I pray for every loved one who comes to mind this day. 
</span><br data-dcnode-id="1015"><span data-dcnode-id="1014" instrument_node="">
I pray for a Divine intervention to happen in their lives. 
</span><br data-dcnode-id="1013"><span data-dcnode-id="1012" instrument_node="">
I pray for a spiritual awakening to happen in their minds and their hearts so they, 
</span><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">
too, can make the personal decision in their own way to dedicate their complete heart, 
</span><br data-dcnode-id="1009"><span data-dcnode-id="1008" instrument_node="">
soul, mind, and strength to You.
</span><br data-dcnode-id="1007"><span data-dcnode-id="1006" instrument_node=""> 
If they have to go down a path that is filled with things that I would want to
 </span><br data-dcnode-id="1005"><span data-dcnode-id="1004" instrument_node="">
keep them from, I pray that whatever that path is, it is exactly what they need 
</span><br data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node="">
to have the awakening to become ultimately the best person in Christ that they can be.
</span><br data-dcnode-id="1001"><span data-dcnode-id="1000" instrument_node="">
Thank You, God, for this awareness of You in me and in them. 
</span><br data-dcnode-id="999"><span data-dcnode-id="998" instrument_node="">
</span><br data-dcnode-id="997"><span data-dcnode-id="996" instrument_node="">
In Jesus Christ's name... Amen.</span><br data-dcnode-id="995"><br data-dcnode-id="994"></span><span data-dcnode-id="992" instrument_node="">
</span><hr data-dcnode-id="991"></div><span data-dcnode-id="989" instrument_node=""> </span><span data-dcnode-id="987" instrument_node="">
</span><div data-dcnode-id="954" id="prayer15" style="display:none;"><span data-dcnode-id="986" instrument_node=""> </span><span data-dcnode-id="984" instrument_node="">
</span><span class="c3" data-dcnode-id="980"><span data-dcnode-id="983" instrument_node="">Prayer of Restoration</span><br data-dcnode-id="982"><br data-dcnode-id="981"></span><span data-dcnode-id="979" instrument_node="">
</span><span class="c2" data-dcnode-id="957"><span data-dcnode-id="978" instrument_node="">Dear God,
</span><br data-dcnode-id="977"><span data-dcnode-id="976" instrument_node="">
Enlighten what's dark in me
</span><br data-dcnode-id="975"><span data-dcnode-id="974" instrument_node="">
Strengthen what's weak in me
</span><br data-dcnode-id="973"><span data-dcnode-id="972" instrument_node="">
Mend what's broken in me
</span><br data-dcnode-id="971"><span data-dcnode-id="970" instrument_node="">
Bind what's bruised in me
</span><br data-dcnode-id="969"><span data-dcnode-id="968" instrument_node="">
Heal what is sick in me,
</span><br data-dcnode-id="967"><span data-dcnode-id="966" instrument_node="">
and lastly...
</span><br data-dcnode-id="965"><span data-dcnode-id="964" instrument_node="">
Revive whatever peace and love
</span><br data-dcnode-id="963"><span data-dcnode-id="962" instrument_node="">
has died in me... Amen
</span><br data-dcnode-id="961"><span data-dcnode-id="960" instrument_node="">
(Submitted)</span><br data-dcnode-id="959"><br data-dcnode-id="958"></span><span data-dcnode-id="956" instrument_node="">
</span><hr data-dcnode-id="955"></div><span data-dcnode-id="953" instrument_node=""> </span><span data-dcnode-id="951" instrument_node="">
</span><div data-dcnode-id="922" id="prayer16" style="display:none;"><span data-dcnode-id="950" instrument_node=""> </span><span data-dcnode-id="948" instrument_node="">
</span><span class="c3" data-dcnode-id="944"><span data-dcnode-id="947" instrument_node="">Yet More</span><br data-dcnode-id="946"><br data-dcnode-id="945"></span><span data-dcnode-id="943" instrument_node="">
</span><span class="c2" data-dcnode-id="925"><span data-dcnode-id="942" instrument_node="">Dear God I know that no matter how bleak the outlook seems...
</span><br data-dcnode-id="941"><span data-dcnode-id="940" instrument_node="">
there is yet more.
</span><br data-dcnode-id="939"><span data-dcnode-id="938" instrument_node="">
Because You are by my side.
</span><br data-dcnode-id="937"><span data-dcnode-id="936" instrument_node="">
I have reason to hope.
</span><br data-dcnode-id="935"><span data-dcnode-id="934" instrument_node="">
I have reason to believe in more.
</span><br data-dcnode-id="933"><span data-dcnode-id="932" instrument_node="">
Dear God, You are the more in my life.
</span><br data-dcnode-id="931"><span data-dcnode-id="930" instrument_node="">
</span><br data-dcnode-id="929"><span data-dcnode-id="928" instrument_node=""> 
In Jesus Christ's name... Amen
</span><br data-dcnode-id="927"><br data-dcnode-id="926"></span><span data-dcnode-id="924" instrument_node="">
</span><hr data-dcnode-id="923"></div><span data-dcnode-id="921" instrument_node=""> </span><span data-dcnode-id="919" instrument_node="">
</span><div data-dcnode-id="868" id="prayer17" style="display:none;"><span data-dcnode-id="918" instrument_node=""> </span><span data-dcnode-id="916" instrument_node="">
</span><span class="c3" data-dcnode-id="912"><span data-dcnode-id="915" instrument_node="">Successful in Overcoming</span><br data-dcnode-id="914"><br data-dcnode-id="913"></span><span data-dcnode-id="911" instrument_node="">
</span><span class="c2" data-dcnode-id="871"><span data-dcnode-id="910" instrument_node="">
Dear God, I know that with Your Spirit working within me,
</span><br data-dcnode-id="909"><span data-dcnode-id="908" instrument_node="">
I will be successful in overcoming all the temporary challenges
</span><br data-dcnode-id="907"><span data-dcnode-id="906" instrument_node="">
that I face. Before I outwardly dress and groom in the morning,
</span><br data-dcnode-id="905"><span data-dcnode-id="904" instrument_node="">
preparing for another day, I remember to put on faith.
</span><br data-dcnode-id="903"><span data-dcnode-id="902" instrument_node="">
I put on the consciousness of Your power, love and self-control. 
</span><br data-dcnode-id="901"><span data-dcnode-id="900" instrument_node="">
</span><br data-dcnode-id="899"><span data-dcnode-id="898" instrument_node="">
I agree to turn to you at the first moment of any fear, doubt, hesitation,
</span><br data-dcnode-id="897"><span data-dcnode-id="896" instrument_node="">
or worry. I ask today that I am equipped with a power beyond
</span><br data-dcnode-id="895"><span data-dcnode-id="894" instrument_node="">
my human power. I ask today that I am equipped with a love beyond
</span><br data-dcnode-id="893"><span data-dcnode-id="892" instrument_node="">
my human ability to love. I ask today that I am equipped with self-control
</span><br data-dcnode-id="891"><span data-dcnode-id="890" instrument_node="">
that is beyond yesterday's self-control, that might have quivered 
</span><br data-dcnode-id="889"><span data-dcnode-id="888" instrument_node="">
in the face of temptation of former habits. 
</span><br data-dcnode-id="887"><span data-dcnode-id="886" instrument_node="">
</span><br data-dcnode-id="885"><span data-dcnode-id="884" instrument_node="">
I now realize it is more important to put on a consciousness of You,
</span><br data-dcnode-id="883"><span data-dcnode-id="882" instrument_node="">
dear God, inside of myself, than what I do in preparing the outer look
</span><br data-dcnode-id="881"><span data-dcnode-id="880" instrument_node="">
of my hair and wardrobe. I now go forth with God's power with me,
</span><br data-dcnode-id="879"><span data-dcnode-id="878" instrument_node="">
excited and in anticipation of the good that I will find in this God-empowered day.
</span><br data-dcnode-id="877"><span data-dcnode-id="876" instrument_node="">
</span><br data-dcnode-id="875"><span data-dcnode-id="874" instrument_node="">
In Jesus Christ's name...Amen
</span><br data-dcnode-id="873"><br data-dcnode-id="872"></span><span data-dcnode-id="870" instrument_node="">
</span><hr data-dcnode-id="869"></div><span data-dcnode-id="867" instrument_node=""> </span><span data-dcnode-id="865" instrument_node="">
</span><div data-dcnode-id="752" id="prayer18" style="display:none;"><span data-dcnode-id="864" instrument_node=""> </span><span data-dcnode-id="862" instrument_node="">
</span><span class="c3" data-dcnode-id="858"><span data-dcnode-id="861" instrument_node="">PRAYER FOR NEW LIFE</span><br data-dcnode-id="860"><br data-dcnode-id="859"></span><span data-dcnode-id="857" instrument_node="">
</span><span class="c2" data-dcnode-id="755"><span data-dcnode-id="856" instrument_node="">
"We have been born anew to a living hope... To an inheritance which is 
</span><br data-dcnode-id="855"><span data-dcnode-id="854" instrument_node="">
imperishable. 1 Peter 1:3,4
</span><br data-dcnode-id="853"><span data-dcnode-id="852" instrument_node="">
</span><br data-dcnode-id="851"><span data-dcnode-id="850" instrument_node="">
Dear God, I pray that You totally cleanse me THIS day.  May I experience
</span><br data-dcnode-id="849"><span data-dcnode-id="848" instrument_node="">
life, totally and completely fresh.
</span><br data-dcnode-id="847"><span data-dcnode-id="846" instrument_node="">
</span><br data-dcnode-id="845"><span data-dcnode-id="844" instrument_node="">
Dear God, brighten my vision.  I consent to the veils being lifted from my
</span><br data-dcnode-id="843"><span data-dcnode-id="842" instrument_node="">
eyes.  I pray that You will help me walk from the darkness, into the
</span><br data-dcnode-id="841"><span data-dcnode-id="840" instrument_node="">
constant light and illumination You freely offer.  I pray that if I
</span><br data-dcnode-id="839"><span data-dcnode-id="838" instrument_node="">
discover that I have a black cloud hanging over me, I now ask You to help
</span><br data-dcnode-id="837"><span data-dcnode-id="836" instrument_node="">
me rise above it, to the clear, blue, cloudless skies of God's truth.  I
</span><br data-dcnode-id="835"><span data-dcnode-id="834" instrument_node="">
do realize, through self-examination, that I have a black cloud hanging
</span><br data-dcnode-id="833"><span data-dcnode-id="832" instrument_node="">
over some of my past experiences, and my opinions about them. I consent,
</span><br data-dcnode-id="831"><span data-dcnode-id="830" instrument_node="">
now, to rising above and beyond former human idea and opinion.  I ask for
</span><br data-dcnode-id="829"><span data-dcnode-id="828" instrument_node="">
the Grace of God in a new day.  I pray for the empowerment to experience
</span><br data-dcnode-id="827"><span data-dcnode-id="826" instrument_node="">
and express life anew, not repeating the failed attempts of yesterday.  I
</span><br data-dcnode-id="825"><span data-dcnode-id="824" instrument_node="">
ask Your help in reinventing myself and my life.
</span><br data-dcnode-id="823"><span data-dcnode-id="822" instrument_node="">
</span><br data-dcnode-id="821"><span data-dcnode-id="820" instrument_node="">
I pray for great happiness and joy as I express my true purpose on my daily path.
</span><br data-dcnode-id="819"><span data-dcnode-id="818" instrument_node="">
</span><br data-dcnode-id="817"><span data-dcnode-id="816" instrument_node="">
I pray, dear God, that all fatigue is cast out.  I pray that You will
</span><br data-dcnode-id="815"><span data-dcnode-id="814" instrument_node="">
fortify my immune system with almighty power.  There is a new energy now
</span><br data-dcnode-id="813"><span data-dcnode-id="812" instrument_node="">
that is coming directly from the Christ.  In and through me, it circulates
</span><br data-dcnode-id="811"><span data-dcnode-id="810" instrument_node="">
its life giving power.  I pray that You will help me uncover the glories
</span><br data-dcnode-id="809"><span data-dcnode-id="808" instrument_node="">
that as of yet have been undiscovered.  In the past, I have been blind but
</span><br data-dcnode-id="807"><span data-dcnode-id="806" instrument_node="">
pray now for new God-given sight.  I pray that you empower me and enable
</span><br data-dcnode-id="805"><span data-dcnode-id="804" instrument_node="">
me to go into a period of great recovery.
</span><br data-dcnode-id="803"><span data-dcnode-id="802" instrument_node="">
</span><br data-dcnode-id="801"><span data-dcnode-id="800" instrument_node="">
I pray that no matter what my age, I am entering a spring of my life where
</span><br data-dcnode-id="799"><span data-dcnode-id="798" instrument_node="">
new growth and blooming are evident to all.
</span><br data-dcnode-id="797"><span data-dcnode-id="796" instrument_node="">
</span><br data-dcnode-id="795"><span data-dcnode-id="794" instrument_node="">
I pray that you will un-dull my five senses and increase my awareness,
</span><br data-dcnode-id="793"><span data-dcnode-id="792" instrument_node="">
spiritually.  May I look at life again with wonder as if I am tasting,
</span><br data-dcnode-id="791"><span data-dcnode-id="790" instrument_node="">
seeing, touching, hearing, and smelling for the first time.  I pray that I
</span><br data-dcnode-id="789"><span data-dcnode-id="788" instrument_node="">
do not miss even one blessing.  I pray that I am thankful, constantly, and
</span><br data-dcnode-id="787"><span data-dcnode-id="786" instrument_node="">
ever aware of the cornucopia of good that is daily presenting itself to me.
</span><br data-dcnode-id="785"><span data-dcnode-id="784" instrument_node="">
</span><br data-dcnode-id="783"><span data-dcnode-id="782" instrument_node="">
I pray that I bounce out of bed in the morning and have boundless energy
</span><br data-dcnode-id="781"><span data-dcnode-id="780" instrument_node="">
throughout the day, living fully every moment of my day.  I pray that I
</span><br data-dcnode-id="779"><span data-dcnode-id="778" instrument_node="">
sleep soundly at night, satisfied that I am living fully as God's complete
</span><br data-dcnode-id="777"><span data-dcnode-id="776" instrument_node="">
child.  I pray that I have spiritual revelations in my dreams.
</span><br data-dcnode-id="775"><span data-dcnode-id="774" instrument_node="">
</span><br data-dcnode-id="773"><span data-dcnode-id="772" instrument_node="">
I pray that no part of my life is anchored in disillusionment, but I pray
</span><br data-dcnode-id="771"><span data-dcnode-id="770" instrument_node="">
that every area is anchored in hope and excitement that each new day
</span><br data-dcnode-id="769"><span data-dcnode-id="768" instrument_node="">
brings.  God is a god of all possibilities and I am a person that believes
</span><br data-dcnode-id="767"><span data-dcnode-id="766" instrument_node="">
in God possibilities.  Help me, God, to eliminate and release the old and
</span><br data-dcnode-id="765"><span data-dcnode-id="764" instrument_node="">
the worn-out, so that I can experience fresh new life.
</span><br data-dcnode-id="763"><span data-dcnode-id="762" instrument_node="">
</span><br data-dcnode-id="761"><span data-dcnode-id="760" instrument_node="">
I now consent, in the name of Jesus Christ, to shift into a higher level
</span><br data-dcnode-id="759"><span data-dcnode-id="758" instrument_node="">
of life and living.
</span><br data-dcnode-id="757"><br data-dcnode-id="756"></span><span data-dcnode-id="754" instrument_node="">
</span><hr data-dcnode-id="753"></div><span data-dcnode-id="751" instrument_node=""> </span><span data-dcnode-id="749" instrument_node="">
</span><div data-dcnode-id="682" id="prayer19" style="display:none;"><span data-dcnode-id="748" instrument_node=""> </span><span data-dcnode-id="746" instrument_node="">
</span><span class="c3" data-dcnode-id="742"><span data-dcnode-id="745" instrument_node="">PRAYER of Release of The Bad and Acceptance of God's Good</span><br data-dcnode-id="744"><br data-dcnode-id="743"></span><span data-dcnode-id="741" instrument_node="">
</span><span class="c2" data-dcnode-id="685"><span data-dcnode-id="740" instrument_node="">RIGHT NOW, this moment, dear God, I release my problems to You 
</span><br data-dcnode-id="739"><span data-dcnode-id="738" instrument_node="">
in one complete gesture, without holding back anything. 
</span><br data-dcnode-id="737"><span data-dcnode-id="736" instrument_node="">                                                                                        
I release my anxiety, doubts, and confusion. 
 </span><br data-dcnode-id="735"><span data-dcnode-id="734" instrument_node="">                                                                              
I ask that You will give me the ideas to quickly solve my problems 
</span><br data-dcnode-id="733"><span data-dcnode-id="732" instrument_node="">
with God-speed, perfection, and ease. God, I ask that You will show me the way. 
</span><br data-dcnode-id="731"><span data-dcnode-id="730" instrument_node="">
Divine wisdom provides me with the right answers.
</span><br data-dcnode-id="729"><span data-dcnode-id="728" instrument_node="">                                                                           
Dear God, I have not always known that Your will for me is ever-present, 
</span><br data-dcnode-id="727"><span data-dcnode-id="726" instrument_node="">
everlasting good. I have not always known that You are with me as an abiding presence, 
</span><br data-dcnode-id="725"><span data-dcnode-id="724" instrument_node="">
the instant answer to every problem, the abundant supply for my every need.
</span><br data-dcnode-id="723"><span data-dcnode-id="722" instrument_node="">                                    
I have not always been ready to accept the good that You offer in every situation, 
</span><br data-dcnode-id="721"><span data-dcnode-id="720" instrument_node="">
because I have not always known that Your presence and help is ever at hand.
</span><br data-dcnode-id="719"><span data-dcnode-id="718" instrument_node="">
</span><br data-dcnode-id="717"><span data-dcnode-id="716" instrument_node="">
Today, I am ready, with all my heart, to accept Your help, advice, and guidance.
</span><br data-dcnode-id="715"><span data-dcnode-id="714" instrument_node=""> 
I am ready to accept the good that You have prepared for me.
</span><br data-dcnode-id="713"><span data-dcnode-id="712" instrument_node="">
All doubts and fears have left me.
</span><br data-dcnode-id="711"><span data-dcnode-id="710" instrument_node="">
</span><br data-dcnode-id="709"><span data-dcnode-id="708" instrument_node="">
With Your empowerment, I feel free and unlimited. 
</span><br data-dcnode-id="707"><span data-dcnode-id="706" instrument_node="">                                                                        
I ask that You give me the vision to see the solution to my problem 
</span><br data-dcnode-id="705"><span data-dcnode-id="704" instrument_node="">
and the focus to see new opportunity that is at hand.
</span><br data-dcnode-id="703"><span data-dcnode-id="702" instrument_node="">
</span><br data-dcnode-id="701"><span data-dcnode-id="700" instrument_node="">
I thank You, God, that, at the right time and in the right way, 
</span><br data-dcnode-id="699"><span data-dcnode-id="698" instrument_node="">
Your solutions are manifest.  
</span><br data-dcnode-id="697"><span data-dcnode-id="696" instrument_node="">
Your good comes to me and all concerned in Divine order; 
</span><br data-dcnode-id="695"><span data-dcnode-id="694" instrument_node="">
and in regular sequence, there is a steady stream of God's good pouring into my life 
</span><br data-dcnode-id="693"><span data-dcnode-id="692" instrument_node="">
and into all lives from every direction.
</span><br data-dcnode-id="691"><span data-dcnode-id="690" instrument_node="">
</span><br data-dcnode-id="689"><span data-dcnode-id="688" instrument_node="">
In Jesus Christ's name...Amen</span><br data-dcnode-id="687"><br data-dcnode-id="686"></span><span data-dcnode-id="684" instrument_node="">
</span><hr data-dcnode-id="683"></div><span data-dcnode-id="681" instrument_node=""> </span><span data-dcnode-id="679" instrument_node="">
</span><div data-dcnode-id="442" id="prayer20" style="display:none;"><span data-dcnode-id="678" instrument_node=""> </span><span data-dcnode-id="676" instrument_node="">
</span><span class="c3" data-dcnode-id="672"><span data-dcnode-id="675" instrument_node="">PRAYER TO CHANGE YOUR MIND</span><br data-dcnode-id="674"><br data-dcnode-id="673"></span><span data-dcnode-id="671" instrument_node="">
</span><span class="c2" data-dcnode-id="445"><span data-dcnode-id="670" instrument_node="">


"So if there is any encouragement in Christ, any incentive of love, any
</span><br data-dcnode-id="669"><span data-dcnode-id="668" instrument_node="">
participation in the Spirit, any affection and sympathy, complete my joy
</span><br data-dcnode-id="667"><span data-dcnode-id="666" instrument_node="">
by being OF THE SAME MIND, having the same love, being in full accord and
</span><br data-dcnode-id="665"><span data-dcnode-id="664" instrument_node="">
of one mind... HAVE THIS MIND AMONG YOURSELVES WHICH IS YOURS IN CHRIST JESUS." 
</span><br data-dcnode-id="663"><span data-dcnode-id="662" instrument_node="">
Philippians 2:1-5
</span><br data-dcnode-id="661"><span data-dcnode-id="660" instrument_node="">
</span><br data-dcnode-id="659"><span data-dcnode-id="658" instrument_node="">
There is a power beyond your power.  There is a wisdom beyond your wisdom.
</span><br data-dcnode-id="657"><span data-dcnode-id="656" instrument_node="">
There is an understanding beyond that which you can now understand or
</span><br data-dcnode-id="655"><span data-dcnode-id="654" instrument_node="">
comprehend.  You are now open and receptive in human mind to God's Divine
</span><br data-dcnode-id="653"><span data-dcnode-id="652" instrument_node="">
ideas.  Connected to the Creator, you are also connected to the power,
</span><br data-dcnode-id="651"><span data-dcnode-id="650" instrument_node="">
wisdom, and understanding of the ages.
</span><br data-dcnode-id="649"><span data-dcnode-id="648" instrument_node="">
</span><br data-dcnode-id="647"><span data-dcnode-id="646" instrument_node="">
We pray, today, in Jesus Christ's name, that you have the highest of high
</span><br data-dcnode-id="645"><span data-dcnode-id="644" instrument_node="">
thought processes, thinking in and through you.  We pray, today, that you
</span><br data-dcnode-id="643"><span data-dcnode-id="642" instrument_node="">
perceive and do things not known by you before.  A God-given instinct runs
</span><br data-dcnode-id="641"><span data-dcnode-id="640" instrument_node="">
through your thinking.  You have a power of thought that knows right and
</span><br data-dcnode-id="639"><span data-dcnode-id="638" instrument_node="">
wrong.  You understand, ahead of time, the right and proper way to
</span><br data-dcnode-id="637"><span data-dcnode-id="636" instrument_node="">
proceed.  You are able to look at a situation and judge it aright.  May
</span><br data-dcnode-id="635"><span data-dcnode-id="634" instrument_node="">
you have the God-given power to not need to judge by appearances, which
</span><br data-dcnode-id="633"><span data-dcnode-id="632" instrument_node="">
our human mind has relied upon too long.  May you have the human eyes to
</span><br data-dcnode-id="631"><span data-dcnode-id="630" instrument_node="">
see past appearance, and the human mind to think and judge aright.  May
</span><br data-dcnode-id="629"><span data-dcnode-id="628" instrument_node="">
there be a nucleus in every thought in your human mind that is God
</span><br data-dcnode-id="627"><span data-dcnode-id="626" instrument_node="">
thought.  We pray that your human mind expands to greater awareness of God, this moment.
</span><br data-dcnode-id="625"><span data-dcnode-id="624" instrument_node="">
</span><br data-dcnode-id="623"><span data-dcnode-id="622" instrument_node="">
This is the day of reckoning and reasoning.  This is the day of knowing
</span><br data-dcnode-id="621"><span data-dcnode-id="620" instrument_node="">
the truth and taking back your God-given right to think.  You do not allow
</span><br data-dcnode-id="619"><span data-dcnode-id="618" instrument_node="">
others to think for you; you exercise your God-given mental ability and
</span><br data-dcnode-id="617"><span data-dcnode-id="616" instrument_node="">
think for yourself.  You are set free in human mind.  We are no longer
</span><br data-dcnode-id="615"><span data-dcnode-id="614" instrument_node="">
locked within a safe of limited thinking.  With God thought, combined with
</span><br data-dcnode-id="613"><span data-dcnode-id="612" instrument_node="">
your thought, you are given the potential for a high IQ.  We pray that
</span><br data-dcnode-id="611"><span data-dcnode-id="610" instrument_node="">
every cell in your brain regenerates to have the capacity to hold the God
</span><br data-dcnode-id="609"><span data-dcnode-id="608" instrument_node="">
thought that is given to it.  The genius of God that came through the
</span><br data-dcnode-id="607"><span data-dcnode-id="606" instrument_node="">
great inventors, the creative masters, and today's wondrous idea people,
</span><br data-dcnode-id="605"><span data-dcnode-id="604" instrument_node="">
comes through you NOW.
</span><br data-dcnode-id="603"><span data-dcnode-id="602" instrument_node="">
</span><br data-dcnode-id="601"><span data-dcnode-id="600" instrument_node="">
Dear God, may I have this Mind that was in Christ Jesus.  I pray that I
</span><br data-dcnode-id="599"><span data-dcnode-id="598" instrument_node="">
have the motivation to act on every idea You give me.  I pray that I have
</span><br data-dcnode-id="597"><span data-dcnode-id="596" instrument_node="">
the human reasoning and Divine judgment to realize the difference between
</span><br data-dcnode-id="595"><span data-dcnode-id="594" instrument_node="">
a God-given idea and the human daydream.  This Mind of Christ within me
</span><br data-dcnode-id="593"><span data-dcnode-id="592" instrument_node="">
now does not know prejudice, fear, or worry.  This Mind of Christ knows
</span><br data-dcnode-id="591"><span data-dcnode-id="590" instrument_node="">
only faith, assuredness, and self-worth.  I comprehend the comprehension
</span><br data-dcnode-id="589"><span data-dcnode-id="588" instrument_node="">
of the Christ.  I perceive with the perception of the Christ.  As rain
</span><br data-dcnode-id="587"><span data-dcnode-id="586" instrument_node="">
falls on thirsty soil, so my mind receives the plentiful ideas of God,
</span><br data-dcnode-id="585"><span data-dcnode-id="584" instrument_node="">
showering down upon me, night and day.  I receive by opening my mind to
</span><br data-dcnode-id="583"><span data-dcnode-id="582" instrument_node="">
it.  My mind is expanding, and its concepts are enlarging.
</span><br data-dcnode-id="581"><span data-dcnode-id="580" instrument_node="">
</span><br data-dcnode-id="579"><span data-dcnode-id="578" instrument_node="">
God's light is on the inside of my mind, eliminating all darkness, and it
</span><br data-dcnode-id="577"><span data-dcnode-id="576" instrument_node="">
triggers the light in my heart.  My mind is too brilliant to hold
</span><br data-dcnode-id="575"><span data-dcnode-id="574" instrument_node="">
resentment, bitterness, or discord.  God's mind of love washes me clean of
</span><br data-dcnode-id="573"><span data-dcnode-id="572" instrument_node="">
all unforgiveness.  Every thought is filled with God and every thought is
</span><br data-dcnode-id="571"><span data-dcnode-id="570" instrument_node="">
filled with love for my fellow human, for my life, and for myself.  I no
</span><br data-dcnode-id="569"><span data-dcnode-id="568" instrument_node="">
longer talk down my own abilities because new and higher mental abilities
</span><br data-dcnode-id="567"><span data-dcnode-id="566" instrument_node="">
are given every moment.  I do not take the Lord's words and ideas in vain.
</span><br data-dcnode-id="565"><span data-dcnode-id="564" instrument_node="">
My brain is a vessel, a container that holds all my God-given mental
</span><br data-dcnode-id="563"><span data-dcnode-id="562" instrument_node="">
possibilities.  The Mind of God surrounds me, and infills me with its
</span><br data-dcnode-id="561"><span data-dcnode-id="560" instrument_node="">
powers of perception and inventiveness.  I touch the hem of the garment of
</span><br data-dcnode-id="559"><span data-dcnode-id="558" instrument_node="">
thought.  I think original thoughts and use original thinking.  I am
</span><br data-dcnode-id="557"><span data-dcnode-id="556" instrument_node="">
strong enough to be independent of thought.  I am strong enough to be a
</span><br data-dcnode-id="555"><span data-dcnode-id="554" instrument_node="">
mental leader, exercising my God-given ability to think.  I invent and I
</span><br data-dcnode-id="553"><span data-dcnode-id="552" instrument_node="">
create a better way to live my life and to help others.
</span><br data-dcnode-id="551"><span data-dcnode-id="550" instrument_node="">
</span><br data-dcnode-id="549"><span data-dcnode-id="548" instrument_node="">
As proper conditions bring forth the flower, so proper conditions are
</span><br data-dcnode-id="547"><span data-dcnode-id="546" instrument_node="">
bringing forth a flowering of my thought processes and mental capability.
</span><br data-dcnode-id="545"><span data-dcnode-id="544" instrument_node=""> 
The Mind of Christ helps lead me to a healthy mind, healthy emotions,
</span><br data-dcnode-id="543"><span data-dcnode-id="542" instrument_node="">
healthy body, and healthy lifestyle.  I have peace of mind and nothing
</span><br data-dcnode-id="541"><span data-dcnode-id="540" instrument_node="">
stops the calm peace of my soul.  I am calm in mind - my mind does not
</span><br data-dcnode-id="539"><span data-dcnode-id="538" instrument_node="">
know fear, for my mind only knows God.  I think about God first.  God is
</span><br data-dcnode-id="537"><span data-dcnode-id="536" instrument_node="">
first and foremost in every thought in my mind.
</span><br data-dcnode-id="535"><span data-dcnode-id="534" instrument_node="">
</span><br data-dcnode-id="533"><span data-dcnode-id="532" instrument_node="">
My former brain is bathed and immersed, baptized, in the Holy Spirit 
</span><br data-dcnode-id="531"><span data-dcnode-id="530" instrument_node="">
(the WHOLE spirit of God).  In mind, I see glimpses of my potential.  I see
</span><br data-dcnode-id="529"><span data-dcnode-id="528" instrument_node="">
visions of who I can become.  I see images of what can happen when God
</span><br data-dcnode-id="527"><span data-dcnode-id="526" instrument_node="">
happens in a situation.  My mind is in gear and it is attached to the new
</span><br data-dcnode-id="525"><span data-dcnode-id="524" instrument_node="">
movement of my body.  I move forward with great confidence and assurance of the Christ.
</span><br data-dcnode-id="523"><span data-dcnode-id="522" instrument_node="">
</span><br data-dcnode-id="521"><span data-dcnode-id="520" instrument_node="">
I am not a lonely island, I am connected to God, and God is connected to
</span><br data-dcnode-id="519"><span data-dcnode-id="518" instrument_node="">
me.  Realizing that I never think alone, I face any mental challenge in
</span><br data-dcnode-id="517"><span data-dcnode-id="516" instrument_node="">
front of me, and do what needs to be done by me with confidence of
</span><br data-dcnode-id="515"><span data-dcnode-id="514" instrument_node="">
thinking.  Everything in front of me becomes a doable task.  I no longer
</span><br data-dcnode-id="513"><span data-dcnode-id="512" instrument_node="">
hold the concept of self-defeat in my human brain.  There is a domino
</span><br data-dcnode-id="511"><span data-dcnode-id="510" instrument_node="">
reaction that causes old thought processes and opinions that are not up to
</span><br data-dcnode-id="509"><span data-dcnode-id="508" instrument_node="">
the Christ standard, to fall.  I enter the promised land of genius.  There
</span><br data-dcnode-id="507"><span data-dcnode-id="506" instrument_node="">
is a wind of God thought moving through me, cleaning out the debris.  I am
</span><br data-dcnode-id="505"><span data-dcnode-id="504" instrument_node="">
the landlord of my mind apartment house, and I have the power to evict
</span><br data-dcnode-id="503"><span data-dcnode-id="502" instrument_node="">
tenants of thought that are taking up space and not paying their rent, to
</span><br data-dcnode-id="501"><span data-dcnode-id="500" instrument_node="">
my peace of mind and well-being.
</span><br data-dcnode-id="499"><span data-dcnode-id="498" instrument_node="">
</span><br data-dcnode-id="497"><span data-dcnode-id="496" instrument_node="">
No crystallized thought stands inside of my mind as a monument to a bad
</span><br data-dcnode-id="495"><span data-dcnode-id="494" instrument_node="">
happening in my past.  God melds and molds, purifying, transmuting, old
</span><br data-dcnode-id="493"><span data-dcnode-id="492" instrument_node="">
thought to God thought.  My reflections are clear and untainted by painful
</span><br data-dcnode-id="491"><span data-dcnode-id="490" instrument_node="">
memories.  I am aware with an awareness that is spiritual and Divine.
</span><br data-dcnode-id="489"><span data-dcnode-id="488" instrument_node="">
</span><br data-dcnode-id="487"><span data-dcnode-id="486" instrument_node="">
I follow Jesus Christ first by thinking aright.  My mind expands to new
</span><br data-dcnode-id="485"><span data-dcnode-id="484" instrument_node="">
possibilities, hopes, and dreams.  I am no longer blocked in any area my
</span><br data-dcnode-id="483"><span data-dcnode-id="482" instrument_node="">
thinking.  I am creative with the power of the creator.  My mind always
</span><br data-dcnode-id="481"><span data-dcnode-id="480" instrument_node="">
grasps the idea that it can give more and think bigger.  I am exploring,
</span><br data-dcnode-id="479"><span data-dcnode-id="478" instrument_node="">
with eager anticipation of adventure, the endless bounds of inner-space.
</span><br data-dcnode-id="477"><span data-dcnode-id="476" instrument_node="">
</span><br data-dcnode-id="475"><span data-dcnode-id="474" instrument_node="">
The curtains are open in the room of every aspect of my mind and the Son
</span><br data-dcnode-id="473"><span data-dcnode-id="472" instrument_node="">
rays - raises and filters in, eliminating all and any darkness, in every
</span><br data-dcnode-id="471"><span data-dcnode-id="470" instrument_node="">
nook or cranny, and I experience true joy.
</span><br data-dcnode-id="469"><span data-dcnode-id="468" instrument_node="">
</span><br data-dcnode-id="467"><span data-dcnode-id="466" instrument_node="">
Thousands, perhaps tens of thousands, perhaps millions of thoughts are
</span><br data-dcnode-id="465"><span data-dcnode-id="464" instrument_node="">
being bathed in the one light of Christ, that sees all and permeates all
</span><br data-dcnode-id="463"><span data-dcnode-id="462" instrument_node="">
with perfection of illumination.
</span><br data-dcnode-id="461"><span data-dcnode-id="460" instrument_node="">
</span><br data-dcnode-id="459"><span data-dcnode-id="458" instrument_node="">
My mind is not in a shell; my mind is no longer closed in on itself; it is
</span><br data-dcnode-id="457"><span data-dcnode-id="456" instrument_node="">
wide open to the fruits of Spirit.  My mind, open to the broad expanses of
</span><br data-dcnode-id="455"><span data-dcnode-id="454" instrument_node="">
God, sees only hope on the horizon.  God deposits Divine ideas, daily, and
</span><br data-dcnode-id="453"><span data-dcnode-id="452" instrument_node="">
I can make withdrawals as I need.  I have a reserve that cannot be depleted.
</span><br data-dcnode-id="451"><span data-dcnode-id="450" instrument_node="">
</span><br data-dcnode-id="449"><span data-dcnode-id="448" instrument_node="">
In Jesus Christ's name...Amen
</span><br data-dcnode-id="447"><br data-dcnode-id="446"></span><span data-dcnode-id="444" instrument_node="">
</span><hr data-dcnode-id="443"></div><span data-dcnode-id="441" instrument_node=""> </span><span data-dcnode-id="439" instrument_node="">
</span><span data-dcnode-id="437" instrument_node="">
</span><span data-dcnode-id="435" instrument_node="">
</span><span data-dcnode-id="433" instrument_node="">
</span><div data-dcnode-id="344" id="affirms" style="display:none;"><span class="c3" data-dcnode-id="428"><span data-dcnode-id="432" instrument_node="">AFFIRMATIONS </span><br data-dcnode-id="430"><br data-dcnode-id="429"></span><span data-dcnode-id="427" instrument_node="">
</span><span class="c2" data-dcnode-id="423"><span data-dcnode-id="426" instrument_node="">Despite all and through all, I have an inner calm, for the Spirit of God establishes peace within me.</span><br data-dcnode-id="425"><br data-dcnode-id="424"></span><span data-dcnode-id="422" instrument_node="">
</span><span class="c2" data-dcnode-id="418"><span data-dcnode-id="421" instrument_node="">I align myself spiritually with the Christ power with me, and with undaunted courage, I surmount ALL obstacles.</span><br data-dcnode-id="420"><br data-dcnode-id="419"></span><span data-dcnode-id="417" instrument_node="">
</span><span class="c2" data-dcnode-id="413"><span data-dcnode-id="416" instrument_node="">God is turning this situation, in my mind and in my environment, to a demonstrable, livable good.</span><br data-dcnode-id="415"><br data-dcnode-id="414"></span><span data-dcnode-id="412" instrument_node="">
</span><span class="c2" data-dcnode-id="408"><span data-dcnode-id="411" instrument_node="">Nothing can stand in the way of God, for God is greater.</span><br data-dcnode-id="410"><br data-dcnode-id="409"></span><span data-dcnode-id="407" instrument_node="">
</span><span class="c2" data-dcnode-id="403"><span data-dcnode-id="406" instrument_node="">God is doing a mighty work in me, and I will overcome.</span><br data-dcnode-id="405"><br data-dcnode-id="404"></span><span data-dcnode-id="402" instrument_node="">
</span><span class="c2" data-dcnode-id="398"><span data-dcnode-id="401" instrument_node="">With God's help, I can overcome ALL things.</span><br data-dcnode-id="400"><br data-dcnode-id="399"></span><span data-dcnode-id="397" instrument_node="">
</span><span class="c2" data-dcnode-id="393"><span data-dcnode-id="396" instrument_node="">God will turn this situation to good.</span><br data-dcnode-id="395"><br data-dcnode-id="394"></span><span data-dcnode-id="392" instrument_node="">
</span><span class="c2" data-dcnode-id="388"><span data-dcnode-id="391" instrument_node="">God gives me understanding and insight to overcome adversity.</span><br data-dcnode-id="390"><br data-dcnode-id="389"></span><span data-dcnode-id="387" instrument_node="">
</span><span class="c2" data-dcnode-id="383"><span data-dcnode-id="386" instrument_node="">Everything has a season, and green will grow again.</span><br data-dcnode-id="385"><br data-dcnode-id="384"></span><span data-dcnode-id="382" instrument_node="">
</span><span class="c2" data-dcnode-id="378"><span data-dcnode-id="381" instrument_node="">This event is now in the past. It has no power over me.</span><br data-dcnode-id="380"><br data-dcnode-id="379"></span><span data-dcnode-id="377" instrument_node="">
</span><span class="c2" data-dcnode-id="373"><span data-dcnode-id="376" instrument_node="">God has made me free, whole, and able to overcome all challenges.</span><br data-dcnode-id="375"><br data-dcnode-id="374"></span><span data-dcnode-id="372" instrument_node="">
</span><span class="c2" data-dcnode-id="368"><span data-dcnode-id="371" instrument_node="">God is in charge of my life and affairs, greater than any challenge I face.</span><br data-dcnode-id="370"><br data-dcnode-id="369"></span><span data-dcnode-id="367" instrument_node="">
</span><span class="c2" data-dcnode-id="363"><span data-dcnode-id="366" instrument_node="">God has made me free and whole and able to overcome all challenges!</span><br data-dcnode-id="365"><br data-dcnode-id="364"></span><span data-dcnode-id="362" instrument_node="">
</span><span class="c2" data-dcnode-id="358"><span data-dcnode-id="361" instrument_node="">God transmutes my adversity into fuel for great strength.</span><br data-dcnode-id="360"><br data-dcnode-id="359"></span><span data-dcnode-id="357" instrument_node="">
</span><span class="c2" data-dcnode-id="353"><span data-dcnode-id="356" instrument_node="">Every crisis offers me extra desired power from God.</span><br data-dcnode-id="355"><br data-dcnode-id="354"></span><span data-dcnode-id="352" instrument_node="">
</span><span class="c2" data-dcnode-id="348"><span data-dcnode-id="351" instrument_node="">God will see me through, and someday, looking back, I will be able to see how God turned this momentary chaos into good.</span><br data-dcnode-id="350"><br data-dcnode-id="349"></span><span data-dcnode-id="347" instrument_node="">
