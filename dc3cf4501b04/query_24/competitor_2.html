ta-dcnode-id="6497"><span data-dcnode-id="6498" instrument_node="">0.0</span></td><td data-dcnode-id="6495"><span data-dcnode-id="6496" instrument_node="">13.3</span></td><td data-dcnode-id="6493"><span data-dcnode-id="6494" instrument_node="">8.3</span></td></tr><tr class="valign-top" data-dcnode-id="6479"><td data-dcnode-id="6488"><span data-dcnode-id="6491" instrument_node="">&nbsp;</span><span data-dcnode-id="6489" instrument_node="">Psychological comfort</span></td><td data-dcnode-id="6486"><span data-dcnode-id="6487" instrument_node="">52.4</span></td><td data-dcnode-id="6484"><span data-dcnode-id="6485" instrument_node="">0.0</span></td><td data-dcnode-id="6482"><span data-dcnode-id="6483" instrument_node="">13.3</span></td><td data-dcnode-id="6480"><span data-dcnode-id="6481" instrument_node="">16.7</span></td></tr><tr class="valign-top" data-dcnode-id="6468"><td data-dcnode-id="6477"><span data-dcnode-id="6478" instrument_node="">Connection to nature</span></td><td data-dcnode-id="6475"><span data-dcnode-id="6476" instrument_node="">9.5</span></td><td data-dcnode-id="6473"><span data-dcnode-id="6474" instrument_node="">25.0</span></td><td data-dcnode-id="6471"><span data-dcnode-id="6472" instrument_node="">6.7</span></td><td data-dcnode-id="6469"><span data-dcnode-id="6470" instrument_node="">33.3</span></td></tr><tr class="valign-top" data-dcnode-id="6457"><td data-dcnode-id="6466"><span data-dcnode-id="6467" instrument_node="">Freedom</span></td><td data-dcnode-id="6464"><span data-dcnode-id="6465" instrument_node="">14.3</span></td><td data-dcnode-id="6462"><span data-dcnode-id="6463" instrument_node="">18.8</span></td><td data-dcnode-id="6460"><span data-dcnode-id="6461" instrument_node="">20.0</span></td><td data-dcnode-id="6458"><span data-dcnode-id="6459" instrument_node="">16.7</span></td></tr><tr class="valign-top" data-dcnode-id="6446"><td data-dcnode-id="6455"><span data-dcnode-id="6456" instrument_node="">Intrigue</span></td><td data-dcnode-id="6453"><span data-dcnode-id="6454" instrument_node="">0.0</span></td><td data-dcnode-id="6451"><span data-dcnode-id="6452" instrument_node="">6.3</span></td><td data-dcnode-id="6449"><span data-dcnode-id="6450" instrument_node="">26.7</span></td><td data-dcnode-id="6447"><span data-dcnode-id="6448" instrument_node="">33.3</span></td></tr><tr class="valign-top" data-dcnode-id="6435"><td data-dcnode-id="6444"><span data-dcnode-id="6445" instrument_node="">Memories</span></td><td data-dcnode-id="6442"><span data-dcnode-id="6443" instrument_node="">71.4</span></td><td data-dcnode-id="6440"><span data-dcnode-id="6441" instrument_node="">62.5</span></td><td data-dcnode-id="6438"><span data-dcnode-id="6439" instrument_node="">80.0</span></td><td data-dcnode-id="6436"><span data-dcnode-id="6437" instrument_node="">91.7</span></td></tr><tr class="valign-top" data-dcnode-id="6424"><td data-dcnode-id="6433"><span data-dcnode-id="6434" instrument_node="">Positive emotions</span></td><td data-dcnode-id="6431"><span data-dcnode-id="6432" instrument_node="">42.9</span></td><td data-dcnode-id="6429"><span data-dcnode-id="6430" instrument_node="">37.5</span></td><td data-dcnode-id="6427"><span data-dcnode-id="6428" instrument_node="">40.0</span></td><td data-dcnode-id="6425"><span data-dcnode-id="6426" instrument_node="">33.3</span></td></tr><tr class="valign-top" data-dcnode-id="6413"><td data-dcnode-id="6422"><span data-dcnode-id="6423" instrument_node="">Practical needs (amenities)</span></td><td data-dcnode-id="6420"><span data-dcnode-id="6421" instrument_node="">14.3</span></td><td data-dcnode-id="6418"><span data-dcnode-id="6419" instrument_node="">0.0</span></td><td data-dcnode-id="6416"><span data-dcnode-id="6417" instrument_node="">6.7</span></td><td data-dcnode-id="6414"><span data-dcnode-id="6415" instrument_node="">8.3</span></td></tr><tr class="valign-top" data-dcnode-id="6402"><td data-dcnode-id="6411"><span data-dcnode-id="6412" instrument_node="">Privacy</span></td><td data-dcnode-id="6409"><span data-dcnode-id="6410" instrument_node="">4.8</span></td><td data-dcnode-id="6407"><span data-dcnode-id="6408" instrument_node="">6.3</span></td><td data-dcnode-id="6405"><span data-dcnode-id="6406" instrument_node="">0.0</span></td><td data-dcnode-id="6403"><span data-dcnode-id="6404" instrument_node="">8.3</span></td></tr><tr class="valign-top" data-dcnode-id="6391"><td data-dcnode-id="6400"><span data-dcnode-id="6401" instrument_node="">Relaxation</span></td><td data-dcnode-id="6398"><span data-dcnode-id="6399" instrument_node="">38.1</span></td><td data-dcnode-id="6396"><span data-dcnode-id="6397" instrument_node="">81.3</span></td><td data-dcnode-id="6394"><span data-dcnode-id="6395" instrument_node="">46.7</span></td><td data-dcnode-id="6392"><span data-dcnode-id="6393" instrument_node="">66.7</span></td></tr><tr class="valign-top" data-dcnode-id="6380"><td data-dcnode-id="6389"><span data-dcnode-id="6390" instrument_node="">Personal growth</span></td><td data-dcnode-id="6387"><span data-dcnode-id="6388" instrument_node="">19.0</span></td><td data-dcnode-id="6385"><span data-dcnode-id="6386" instrument_node="">25.0</span></td><td data-dcnode-id="6383"><span data-dcnode-id="6384" instrument_node="">26.7</span></td><td data-dcnode-id="6381"><span data-dcnode-id="6382" instrument_node="">16.7</span></td></tr></tbody></table></div></div></div></section></section><section data-dcnode-id="6064" id="sec3"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6367" id="sectitle0205"><span data-dcnode-id="6372" instrument_node="">3</span><span data-dcnode-id="6370" instrument_node="">. </span><span data-dcnode-id="6368" instrument_node="">Discussion</span></h2><p data-dcnode-id="6344" id="p0375"><span data-dcnode-id="6366" instrument_node="">Despite growing research interest in the benefits of place attachment (</span><a class="workspace-trigger" data-dcnode-id="6364" href="#bib75" name="bbib75"><span data-dcnode-id="6365" instrument_node="">López-Mosquera and Sánchez, 2013</span></a><span data-dcnode-id="6363" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6361" href="#bib96" name="bbib96"><span data-dcnode-id="6362" instrument_node="">Scannell and Gifford, 2010a</span></a><span data-dcnode-id="6360" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6358" href="#bib99" name="bbib99"><span data-dcnode-id="6359" instrument_node="">Scannell and Gifford, 2016</span></a><span data-dcnode-id="6357" instrument_node="">), and related concepts such as landscape values (</span><a class="workspace-trigger" data-dcnode-id="6355" href="#bib114" name="bbib114"><span data-dcnode-id="6356" instrument_node="">Brown, 2005</span></a><span data-dcnode-id="6354" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6352" href="#bib115" name="bbib115"><span data-dcnode-id="6353" instrument_node="">Brown and Raymond, 2007</span></a><span data-dcnode-id="6351" instrument_node="">) and motivations for place use (</span><a class="workspace-trigger" data-dcnode-id="6349" href="#bib66" name="bbib66"><span data-dcnode-id="6350" instrument_node="">Kyle, Mowen, et&nbsp;al., 2004</span></a><span data-dcnode-id="6348" instrument_node="">), research has generally examined concepts in the context of one place type (e.g., parks or neighborhoods) rather than across places, and the range of benefits discussed has been narrow, even in literature reviews (e.g., </span><a class="workspace-trigger" data-dcnode-id="6346" href="#bib96" name="bbib96"><span data-dcnode-id="6347" instrument_node="">Scannell &amp; Gifford, 2010a</span></a><span data-dcnode-id="6345" instrument_node="">). While validating some previously uncovered benefits of place attachment, and in some cases elaborating on them, the current study also presents a broader range of self-reported benefits for a variety of place attachment types, and explores how they vary by person and place characteristics.</span></p><p data-dcnode-id="6339" id="p0380"><span data-dcnode-id="6343" instrument_node="">This work also elaborates on an existing multidimensional framework of place attachment (</span><a class="workspace-trigger" data-dcnode-id="6341" href="#bib96" name="bbib96"><span data-dcnode-id="6342" instrument_node="">Scannell &amp; Gifford, 2010a</span></a><span data-dcnode-id="6340" instrument_node="">); specifically, it extends our understanding of the psychological process dimension of the person-place-process framework of place attachment by detailing 13 ways in which individuals experience the psychological benefits of place attachment. In addition, differences in the endorsement of each benefit vary somewhat by demographic characteristics, the type of place, and the geographical scale of the place of attachment, thus furthering our understanding of how two of the dimensions (place and person) may intersect. By detailing which reported place attachment benefits are common and novel, this study offers a more fulsome understanding about how place attachment is experienced by individuals. This work also has heuristic value in generating hypotheses and guiding future research.</span></p><section data-dcnode-id="6301" id="sec3.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6333" id="sectitle0210"><span data-dcnode-id="6338" instrument_node="">3.1</span><span data-dcnode-id="6336" instrument_node="">. </span><span data-dcnode-id="6334" instrument_node="">Commonly-reported benefits of place attachment</span></h3><p data-dcnode-id="6319" id="p0385"><span data-dcnode-id="6332" instrument_node="">In this search for the experienced psychological benefits of place attachment, 13 categories were revealed: memories, belonging, relaxation, positive emotions, activity support, comfort/security, personal growth, freedom, entertainment, connection to nature, practical benefits, privacy, and aesthetics. In addition to describing a range of benefits, we determined which are most commonly experienced as part of an individual's person-place bond, which has not previously been established. Common experiences of place attachment benefits, however, do not necessarily align with common areas of focus within place attachment research. In particular, memory support was by far the most commonly-expressed benefit, and yet relatively few studies have examined the role of memory in place attachment (e.g., </span><a class="workspace-trigger" data-dcnode-id="6330" href="#bib23" name="bbib23"><span data-dcnode-id="6331" instrument_node="">Cooper Marcus, 1992</span></a><span data-dcnode-id="6329" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6327" href="#bib61" name="bbib61"><span data-dcnode-id="6328" instrument_node="">Korpela, 1989</span></a><span data-dcnode-id="6326" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6324" href="#bib73" name="bbib73"><span data-dcnode-id="6325" instrument_node="">Lewicka, 2008</span></a><span data-dcnode-id="6323" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6321" href="#bib108" name="bbib108"><span data-dcnode-id="6322" instrument_node="">Twigger-Ross and Uzzell, 1996</span></a><span data-dcnode-id="6320" instrument_node="">). This suggests that memory (and other temporal processes) deserves greater attention among place attachment researchers.</span></p><p data-dcnode-id="6302" id="p0390"><span data-dcnode-id="6318" instrument_node="">The other three most commonly-mentioned benefits include belonging, relaxation, and positive emotions. While the emergence of these benefits are perhaps not surprising, given that they have received more coverage in previous research (e.g., </span><a class="workspace-trigger" data-dcnode-id="6316" href="#bib50" name="bbib50"><span data-dcnode-id="6317" instrument_node="">Hidalgo and Hernández, 2001</span></a><span data-dcnode-id="6315" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6313" href="#bib66" name="bbib66"><span data-dcnode-id="6314" instrument_node="">Kyle et&nbsp;al., 2004</span></a><span data-dcnode-id="6312" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6310" href="#bib63" name="bbib63"><span data-dcnode-id="6311" instrument_node="">Korpela et&nbsp;al., 2001</span></a><span data-dcnode-id="6309" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6307" href="#bib40" name="bbib40"><span data-dcnode-id="6308" instrument_node="">Giuliani, 2003</span></a><span data-dcnode-id="6306" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6304" href="#bib64" name="bbib64"><span data-dcnode-id="6305" instrument_node="">Korpela et&nbsp;al., 2002</span></a><span data-dcnode-id="6303" instrument_node="">), present results validate their importance in the functioning of place attachment, and situate their prominence relative to other experienced place attachment benefits. Knowledge of place attachment benefits and their relative commonality may therefore guide the selection of relevant measurement items and the construction of interview guides and prompts, as well as prioritize areas of future investigation.</span></p></section><section data-dcnode-id="6259" id="sec3.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6295" id="sectitle0215"><span data-dcnode-id="6300" instrument_node="">3.2</span><span data-dcnode-id="6298" instrument_node="">. </span><span data-dcnode-id="6296" instrument_node="">Lesser known experienced benefits of place attachment</span></h3><p data-dcnode-id="6287" id="p0395"><span data-dcnode-id="6294" instrument_node="">Although some of these 13 experienced benefits have been considered in previous research, to our knowledge, no earlier work has attempted to generate a comprehensive (albeit non-exhaustive) list for a range of place types. Results also revealed some benefits that have received less attention in the place attachment literature, including personal growth, freedom, entertainment, and aesthetics. For example, although it is well established that places may provide resources necessary for goal pursuit (</span><a class="workspace-trigger" data-dcnode-id="6292" href="#bib104" name="bbib104"><span data-dcnode-id="6293" instrument_node="">Stokols &amp; Shumaker, 1981</span></a><span data-dcnode-id="6291" instrument_node="">), and can offer an atmosphere appropriate for contemplation and emotion regulation (</span><a class="workspace-trigger" data-dcnode-id="6289" href="#bib63" name="bbib63"><span data-dcnode-id="6290" instrument_node="">Korpela, Hartig, Kaiser, &amp; Fuhrer, 2001</span></a><span data-dcnode-id="6288" instrument_node="">), the current study is among few which demonstrate that place attachment can provide new challenges and opportunities that fertilize expansion of the self. Considering personal growth as a specific outcome of place attachment may further the understanding of its eudemonic effects, and thus contribute to theory building in this area.</span></p><p data-dcnode-id="6279" id="p0400"><span data-dcnode-id="6286" instrument_node="">In addition, places of attachment were found to offer freedom in several ways. One is by providing an escape from one's daily routine, such as by visiting vacation places or other distant (yet still meaningful) environments. Trips away can reinforce local bonds (</span><a class="workspace-trigger" data-dcnode-id="6284" href="#bib19" name="bbib19"><span data-dcnode-id="6285" instrument_node="">Case, 1996</span></a><span data-dcnode-id="6283" instrument_node="">), but present results suggest that the destinations themselves may also serve important attachment roles, and support the need for escape. Places of attachment may also supply freedom when they allow individuals to exercise agency over their environment. Control is a key determinant of environmental satisfaction that relates to a variety of important personal outcomes including productivity, health and well-being (e.g., </span><a class="workspace-trigger" data-dcnode-id="6281" href="#bib38" name="bbib38"><span data-dcnode-id="6282" instrument_node="">Gifford, 2014</span></a><span data-dcnode-id="6280" instrument_node="">). Given this, future work should investigate links between control and place attachment in residences and workplaces where building managers aim to maximize occupants' connections to, and investments in, place.</span></p><p data-dcnode-id="6274" id="p0405"><span data-dcnode-id="6278" instrument_node="">Entertainment was another interesting benefit that has received little attention among place attachment researchers. This includes the ability of the place to provide stimulation, novelty, and learning. Entertainment may reflect person-environment congruency in stimulation preferences, such that individuals are attached to places that support their desired level of stimulation. Entertainment-in-place may also offer slight increases in the typical stimulation one experiences, and such changes are thought to be enjoyable (</span><a class="workspace-trigger" data-dcnode-id="6276" href="#bib112" name="bbib112"><span data-dcnode-id="6277" instrument_node="">Wohlwill, 1966</span></a><span data-dcnode-id="6275" instrument_node="">). Along these lines, place attachment-related relaxation may reflect congruent or reduced levels of stimulation. Future research connecting place attachment and stimulation theories would be of interest.</span></p><p data-dcnode-id="6260" id="p0410"><span data-dcnode-id="6273" instrument_node="">Finally, results showed that individuals benefit from places of attachment that provide them with aesthetic pleasure. The importance of aesthetics is thought to relate to an evolved preference for environments where survival is more likely (e.g., </span><a class="workspace-trigger" data-dcnode-id="6271" href="#bib30" name="bbib30"><span data-dcnode-id="6272" instrument_node="">Dutton, 2003</span></a><span data-dcnode-id="6270" instrument_node="">), although aesthetic appraisals vary among individuals (</span><a class="workspace-trigger" data-dcnode-id="6268" href="#bib38" name="bbib38"><span data-dcnode-id="6269" instrument_node="">Gifford, 2014</span></a><span data-dcnode-id="6267" instrument_node="">). Aesthetics also speaks to the intrinsic pleasure that can be derived from a place. Environmental psychologists have linked aesthetics to neighborhood and residential satisfaction, as well as judgments of buildings and architecture (e.g., </span><a class="workspace-trigger" data-dcnode-id="6265" href="#bib38" name="bbib38"><span data-dcnode-id="6266" instrument_node="">Gifford, 2014</span></a><span data-dcnode-id="6264" instrument_node="">). Aesthetics are largely overlooked in the place attachment literature, but one Taiwanese study found that “enjoying beautiful scenery” was a more common reason for returning to several national parks than was valuing nature (</span><a class="workspace-trigger" data-dcnode-id="6262" href="#bib53" name="bbib53"><span data-dcnode-id="6263" instrument_node="">Hwang, Lee, &amp; Chen, 2005</span></a><span data-dcnode-id="6261" instrument_node="">).</span></p></section><section data-dcnode-id="6216" id="sec3.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6253" id="sectitle0220"><span data-dcnode-id="6258" instrument_node="">3.3</span><span data-dcnode-id="6256" instrument_node="">. </span><span data-dcnode-id="6254" instrument_node="">Demographic differences</span></h3><p data-dcnode-id="6239" id="p0415"><span data-dcnode-id="6252" instrument_node="">The self-reported benefits of place attachment appeared to vary little by age and housing tenure. Although other place attachment researchers have discussed developmental differences in place attachment (e.g., </span><a class="workspace-trigger" data-dcnode-id="6250" href="#bib49" name="bbib49"><span data-dcnode-id="6251" instrument_node="">Hay, 1998</span></a><span data-dcnode-id="6249" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6247" href="#bib84" name="bbib84"><span data-dcnode-id="6248" instrument_node="">Morgan, 2010</span></a><span data-dcnode-id="6246" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6244" href="#bib105" name="bbib105"><span data-dcnode-id="6245" instrument_node="">Sugihara and Evans, 2000</span></a><span data-dcnode-id="6243" instrument_node="">), the present study was limited in the obtained age range of participants (i.e., adults, ages 18–53), and so its results cannot be compared to those of previous works. Future research should explore differences in the psychological benefits of place attachment across the lifespan. Nevertheless, the lack of age differences within our sample suggests that young and middle-aged adults use places to satisfy similar types of needs. This is not to say that the </span><em data-dcnode-id="6241"><span data-dcnode-id="6242" instrument_node="">expression</span></em><span data-dcnode-id="6240" instrument_node=""> of place-based need satisfaction is the same for all age groups; developmental differences are still likely. For example, younger and middle-aged adults both use their important places to obtain belonging. However, in younger adults, belonging appears more relevant to peer groups, whereas in middle-aged adults, belonging is derived from cultural place attachment. Without in-depth interviews, these developmental nuances are difficult to identify. Thus, a qualitative approach would be an appropriate follow-up to build theory about developmental differences in the expression of each of these benefits. The emergent list of benefits identified here may help to structure such interviews.</span></p><p data-dcnode-id="6225" id="p0420"><span data-dcnode-id="6238" instrument_node="">The number or types of self-reported psychological benefits also did not differ according to place ownership. Some studies support the notion that ownership is associated with </span><em data-dcnode-id="6236"><span data-dcnode-id="6237" instrument_node="">stronger</span></em><span data-dcnode-id="6235" instrument_node=""> place attachment (e.g., </span><a class="workspace-trigger" data-dcnode-id="6233" href="#bib8" name="bbib8"><span data-dcnode-id="6234" instrument_node="">Bolan, 1997</span></a><span data-dcnode-id="6232" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6230" href="#bib15" name="bbib15"><span data-dcnode-id="6231" instrument_node="">Brown et&nbsp;al., 2003</span></a><span data-dcnode-id="6229" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6227" href="#bib82" name="bbib82"><span data-dcnode-id="6228" instrument_node="">Mesch and Manor, 1998</span></a><span data-dcnode-id="6226" instrument_node="">). However, unlike many studies that focus on one specific place of attachment (e.g., one's residence or neighborhood), participants in this study selected a place of their choosing. Thus, homeowners and non-homeowners alike were able to select places to which they were strongly attached. Thus, these results show that non-homeowners are not necessarily deprived of meaningful place attachments, but that they can access many types of places that meet their psychological needs. This reiterates the utility of allowing participants to select their own place of attachment, and expanding the range of places of inquiry beyond that of the residence.</span></p><p data-dcnode-id="6217" id="p0425"><span data-dcnode-id="6224" instrument_node="">However, some gender differences emerged: women mentioned more benefits overall than did men, and they were significantly more likely to describe memories associated with their place of attachment. This is broadly consistent with the finding that women report stronger place attachment than do men at three spatial levels (</span><a class="workspace-trigger" data-dcnode-id="6222" href="#bib50" name="bbib50"><span data-dcnode-id="6223" instrument_node="">Hidalgo &amp; Hernández, 2001</span></a><span data-dcnode-id="6221" instrument_node="">). Perhaps because women have traditionally been restricted in terms of their mobility, they put a greater emphasis and value on the places that they consider to be theirs (e.g., </span><a class="workspace-trigger" data-dcnode-id="6219" href="#bib51" name="bbib51"><span data-dcnode-id="6220" instrument_node="">hooks, 2009</span></a><span data-dcnode-id="6218" instrument_node="">). Nevertheless, the relation between gender and place attachment is complex, and requires further work to disentangle these discrepant findings.</span></p></section><section data-dcnode-id="6179" id="sec3.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6210" id="sectitle0225"><span data-dcnode-id="6215" instrument_node="">3.4</span><span data-dcnode-id="6213" instrument_node="">. </span><span data-dcnode-id="6211" instrument_node="">Geographical scale differences</span></h3><p data-dcnode-id="6200" id="p0430"><a class="workspace-trigger" data-dcnode-id="6208" href="#bib35" name="bbib35"><span data-dcnode-id="6209" instrument_node="">Freundschuh and Egenhofer’s (1997)</span></a><span data-dcnode-id="6207" instrument_node=""> typology of geographic space contains six types of space, based on people's experiences. Three of these (non-manipulable object space, environmental space, and geographic space) were present in participants' descriptions of their important places. Manipulable object space was mostly absent, suggesting that place attachment tends to form in places larger than the body. This does not deny that attachments can form to smaller objects that are often embedded in place (e.g., </span><a class="workspace-trigger" data-dcnode-id="6205" href="#bib25" name="bbib25"><span data-dcnode-id="6206" instrument_node="">Csikszentmihalyi and Rochberg-Halton, 1981</span></a><span data-dcnode-id="6204" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6202" href="#bib4" name="bbib4"><span data-dcnode-id="6203" instrument_node="">Belk, 1988</span></a><span data-dcnode-id="6201" instrument_node="">), but indicates that individuals generally interpret “place” to be larger, and non-manipulable. Panoramic spaces and map spaces were also absent, suggesting that place attachment requires some locomotion, or at least, must be more than a view or symbolized space.</span></p><p data-dcnode-id="6195" id="p0435"><span data-dcnode-id="6199" instrument_node="">The three remaining types showed some differences in their profiles of experienced benefits. As compared to the other two scales, non-manipulable object spaces were especially conducive to activities, privacy, personal growth, and freedom. Some activities that are solitary, such as independent work, may benefit from small environments that shield one from distractions. Privacy may be more easily attained in small spaces, particularly when they have some enclosure that disables visual and acoustic invasions (e.g., </span><a class="workspace-trigger" data-dcnode-id="6197" href="#bib38" name="bbib38"><span data-dcnode-id="6198" instrument_node="">Gifford, 2014</span></a><span data-dcnode-id="6196" instrument_node="">). Similarly, smaller environments may be easier to control, change, and escape from the influence of others. However, size, locomotion, and manipulability characteristics of these places also limited the experience of some benefits, including connection to nature, entertainment, and practical benefits. This suggests that scale can support or constrain the affordances inherent in a given space.</span></p><p data-dcnode-id="6193" id="p0440"><span data-dcnode-id="6194" instrument_node="">Environmental spaces, more often than the other two scales, involved positive emotions, comfort, entertainment, and connectedness to nature. Parks, rivers, and smaller wilderness areas were often described at this scale, which explains the prevalence of the latter benefit. Entertainment is perhaps less available to smaller, non-manipulable spaces that are less dynamic than environmental spaces. However, the diversity of the types of places that fell within this category makes it difficult to interpret the prevalence of positive emotions and comfort as benefits common to this scale, although this could reflect the interaction of place type – especially home, which is more common at this scale.</span></p><p data-dcnode-id="6182" id="p0445"><span data-dcnode-id="6192" instrument_node="">Geographic spaces most commonly provided belonging, which is not surprising given that place identity often develops at urban, regional, and national scales (</span><a class="workspace-trigger" data-dcnode-id="6190" href="#bib10" name="bbib10"><span data-dcnode-id="6191" instrument_node="">Bonaiuto et&nbsp;al., 1996</span></a><span data-dcnode-id="6189" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6187" href="#bib69" name="bbib69"><span data-dcnode-id="6188" instrument_node="">Lalli, 1992</span></a><span data-dcnode-id="6186" instrument_node="">). Furthermore, physical comfort was more common to this scale than the other two, and it often referred to weather, which </span><a class="workspace-trigger" data-dcnode-id="6184" href="#bib60" name="bbib60"><span data-dcnode-id="6185" instrument_node="">Knez (2005)</span></a><span data-dcnode-id="6183" instrument_node=""> has linked to place attachment by way of place-congruent continuity. That is, people prefer places with weather similar to that experienced in places of childhood.</span></p><p data-dcnode-id="6180" id="p0450"><span data-dcnode-id="6181" instrument_node="">In sum, these results extend the understanding of geographical scale by showing that it not only impacts how one perceives, understands, and behaves in a space, but it can also impact the nature of the emotional bond with a given place. Further, these results help extend the understanding of place attachment by underlining that manipulability, locomotion, and size of a place can constrain or support the availability of certain benefits.</span></p></section><section data-dcnode-id="6123" id="sec3.5"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6173" id="sectitle0230"><span data-dcnode-id="6178" instrument_node="">3.5</span><span data-dcnode-id="6176" instrument_node="">. </span><span data-dcnode-id="6174" instrument_node="">Experienced psychological benefits by type of place</span></h3><p data-dcnode-id="6159" id="p0455"><span data-dcnode-id="6172" instrument_node="">The experienced psychological benefits varied in prevalence among different types of places of attachment. Some of our findings are congruent with previous studies. For example, that cities frequently provide belonging and memory support has been discussed by others (e.g., </span><a class="workspace-trigger" data-dcnode-id="6170" href="#bib72" name="bbib72"><span data-dcnode-id="6171" instrument_node="">Lewicka, 2005</span></a><span data-dcnode-id="6169" instrument_node="">), in part because cities can provide important information about place identity (</span><a class="workspace-trigger" data-dcnode-id="6167" href="#bib69" name="bbib69"><span data-dcnode-id="6168" instrument_node="">Lalli, 1992</span></a><span data-dcnode-id="6166" instrument_node="">). In addition, it is established that outdoor places frequently provide relaxation (e.g., </span><a class="workspace-trigger" data-dcnode-id="6164" href="#bib116" name="bbib116"><span data-dcnode-id="6165" instrument_node="">Fishwick &amp; Vining, 1992</span></a><span data-dcnode-id="6163" instrument_node="">) and support activities, thus reflecting place dependence in which bonds are based on a place's physical and social qualities aligned with the pursuit of certain activities such as sports (</span><a class="workspace-trigger" data-dcnode-id="6161" href="#bib118" name="bbib118"><span data-dcnode-id="6162" instrument_node="">Kyle, Graefe, &amp; Manning, 2005</span></a><span data-dcnode-id="6160" instrument_node="">). Interestingly, however, outdoor areas did not provide a sense of physical or psychological comfort, possibly reflecting a lack of control over outdoor physical (i.e., weather), and social climates.</span></p><p data-dcnode-id="6145" id="p0460"><span data-dcnode-id="6158" instrument_node="">Houses were more likely than the other place types to provide physical and psychological comfort, and offer a sense of security, thus supporting the view that for some, home can be a haven. Interestingly, this was not always restricted to an individuals' own home, but sometimes included the homes of friends and family, possibly reflecting that attachment to a place that includes particular people can confer the safe haven benefit of interpersonal attachment (</span><a class="workspace-trigger" data-dcnode-id="6156" href="#bib11" name="bbib11"><span data-dcnode-id="6157" instrument_node="">Bowlby, 1969/1982</span></a><span data-dcnode-id="6155" instrument_node="">), or perhaps it is due to other factors inherent in some houses such as prospect and refuge features (</span><a class="workspace-trigger" data-dcnode-id="6153" href="#bib113" name="bbib113"><span data-dcnode-id="6154" instrument_node="">Appleton, 1975</span></a><span data-dcnode-id="6152" instrument_node="">). Nevertheless, it should not be assumed that home is a haven for all; indeed home can evoke painful memories who experienced it as a place of abuse or oppression (</span><a class="workspace-trigger" data-dcnode-id="6150" href="#bib79" name="bbib79"><span data-dcnode-id="6151" instrument_node="">Manzo, 2014;</span></a><span data-dcnode-id="6149" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="6147" href="#bib122" name="bbib122"><span data-dcnode-id="6148" instrument_node="">Rose, 1993</span></a><span data-dcnode-id="6146" instrument_node="">).</span></p><p data-dcnode-id="6131" id="p0465"><span data-dcnode-id="6144" instrument_node="">The importance of place attachment to vacation places has been acknowledged among researchers from environmental psychology, tourism management, geography, and other fields (e.g., </span><a class="workspace-trigger" data-dcnode-id="6142" href="#bib2" name="bbib2"><span data-dcnode-id="6143" instrument_node="">Aronsson, 2004</span></a><span data-dcnode-id="6141" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6139" href="#bib59" name="bbib59"><span data-dcnode-id="6140" instrument_node="">Kelly and Hosking, 2008</span></a><span data-dcnode-id="6138" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="6136" href="#bib121" name="bbib121"><span data-dcnode-id="6137" instrument_node="">Ram, Björk, &amp; Weidenfeld, 2016;</span></a><span data-dcnode-id="6135" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="6133" href="#bib120" name="bbib120"><span data-dcnode-id="6134" instrument_node="">Prayag &amp; Ryan, 2012</span></a><span data-dcnode-id="6132" instrument_node="">). However, these studies typically focus on cases studies of a particular place. Current results thus suggest that memory support, relaxation, belonging, entertainment, connecting to nature, and positive emotions are the most prevalent benefits offered by important vacation places in general.</span></p><p data-dcnode-id="6129" id="p0470"><span data-dcnode-id="6130" instrument_node="">Our comparison of experienced psychological benefits across place types helps elucidate which benefits are unique or common to a range of place types. For example, attachment to homes and cities both provide belonging and memory support, but homes also frequently provide a strong sense of psychological security. This may also indicate why place attachment strength varies between different types of places. In addition, the range of places included helps to indicate the extent to which a benefit can be generalized across variations of places within a given category. For example, a variety of places comprised the “vacation place” category, but more participants with attachment to such a place discussed the importance of entertainment, thus bolstering the notion that entertainment is central to this type of place attachment.</span></p><p data-dcnode-id="6124" id="p0475"><span data-dcnode-id="6128" instrument_node="">Because certain types of places are more likely to include certain benefits, one implication is that place attachment visualizations could be used in therapeutic settings that aim to target these benefits (e.g., </span><a class="workspace-trigger" data-dcnode-id="6126" href="#bib99" name="bbib99"><span data-dcnode-id="6127" instrument_node="">Scannell &amp; Gifford, 2016</span></a><span data-dcnode-id="6125" instrument_node="">). For example, visualizations of outdoor areas or vacation places may be more likely to elicit relaxation than would other places of attachment, although additional quantitative and experimental research is needed to verify the associative and causal links between place attachment type and the various psychological benefits.</span></p></section><section data-dcnode-id="6090" id="sec3.6"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6117" id="sectitle0235"><span data-dcnode-id="6122" instrument_node="">3.6</span><span data-dcnode-id="6120" instrument_node="">. </span><span data-dcnode-id="6118" instrument_node="">Limitations</span></h3><p data-dcnode-id="6112" id="p0480"><span data-dcnode-id="6116" instrument_node="">Several limitations of this study should be noted. One issue is the online nature of data collection, which may limit the generalizability of results to those with internet access and interest in completing online questionnaires. Nevertheless, this recruitment method yielded a more diverse sample than would be expected from a university subject pool, mail-out survey, or other type of online recruitment (</span><a class="workspace-trigger" data-dcnode-id="6114" href="#bib17" name="bbib17"><span data-dcnode-id="6115" instrument_node="">Buhrmester et&nbsp;al., 2011</span></a><span data-dcnode-id="6113" instrument_node="">).</span></p><p data-dcnode-id="6110" id="p0485"><span data-dcnode-id="6111" instrument_node="">Another issue is that asking individuals to reflect on the psychological benefits they derive from place requires them to be aware of such benefits. Arguably, one can benefit from a place attachment bond without being able to express why. Therefore, the proposed benefits of place attachment in this study may have missed some of these unconscious or implicit benefits. As such, the list of benefits remains those that are self-reported and experienced. In general, place attachment research (which largely relies on self-reports and interview data) will benefit as methods are expanded and specifically, as physiological and behavioral measures are introduced. Future work should therefore endeavor to expand the list of benefits to include these objective benefits that do not typically emerge in a self-report.</span></p><p data-dcnode-id="6105" id="p0490"><span data-dcnode-id="6109" instrument_node="">In addition, this study has delineated a host of experienced psychological benefits, which confirms and expands the scattered psychological benefits alluded to in previous literature. However, the nature of descriptive survey research means that claims about place attachment causing these benefits cannot be made; whether the benefits are antecedents, outcomes, or concomitants of place attachment is unknown. Further research should contribute direction and cause to each of these benefits (c.f., </span><a class="workspace-trigger" data-dcnode-id="6107" href="#bib99" name="bbib99"><span data-dcnode-id="6108" instrument_node="">Scannell &amp; Gifford, 2016</span></a><span data-dcnode-id="6106" instrument_node="">).</span></p><p data-dcnode-id="6091" id="p0495"><span data-dcnode-id="6104" instrument_node="">Finally, one may question the comprehensiveness of the list of experienced benefits proposed, given the exploratory nature of the study and the somewhat modest sample size. Although the methods aimed to produce a comprehensive list of benefits, the possibility that some benefits are yet to be uncovered remains. For example, some have posited (albeit with limited evidence) that place attachment furthers our ability to conceive of the world as meaningful and coherent (e.g., </span><a class="workspace-trigger" data-dcnode-id="6102" href="#bib18" name="bbib18"><span data-dcnode-id="6103" instrument_node="">Casakin and Kreitler, 2008</span></a><span data-dcnode-id="6101" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6099" href="#bib29" name="bbib29"><span data-dcnode-id="6100" instrument_node="">Droseltis and Vignoles, 2010</span></a><span data-dcnode-id="6098" instrument_node="">), and that it can support various developmental tasks throughout the lifespan (e.g., </span><a class="workspace-trigger" data-dcnode-id="6096" href="#bib49" name="bbib49"><span data-dcnode-id="6097" instrument_node="">Hay, 1998</span></a><span data-dcnode-id="6095" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6093" href="#bib84" name="bbib84"><span data-dcnode-id="6094" instrument_node="">Morgan, 2010</span></a><span data-dcnode-id="6092" instrument_node="">). Further research and refinement is therefore needed. Nevertheless, the current study is among the first to examine a broad range of benefits of place attachment simultaneously.</span></p></section><section data-dcnode-id="6065" id="sec3.7"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6084" id="sectitle0240"><span data-dcnode-id="6089" instrument_node="">3.7</span><span data-dcnode-id="6087" instrument_node="">. </span><span data-dcnode-id="6085" instrument_node="">Future directions</span></h3><p data-dcnode-id="6079" id="p0500"><span data-dcnode-id="6083" instrument_node="">This exploratory study generates a variety of options for future research, some of which have already been described. For now, it offers greater understanding of the experienced benefits of place attachment. Because participants were asked to reflect on ways in which their place bond benefited them personally, we did not receive descriptions of benefits of the bond at other socioecological levels, such as its ability to bolster community engagement or motivate pro-environmental behavior (e.g., </span><a class="workspace-trigger" data-dcnode-id="6081" href="#bib97" name="bbib97"><span data-dcnode-id="6082" instrument_node="">Scannell &amp; Gifford, 2010b</span></a><span data-dcnode-id="6080" instrument_node="">). An interesting avenue for future research would be to elicit views on, and investigate place attachment benefits at varying socioecological levels of analysis beyond the personal, such as benefits to family, community, and sociocultural systems.</span></p><p data-dcnode-id="6077" id="p0505"><span data-dcnode-id="6078" instrument_node="">The present results also serve as a useful starting point for, and should therefore spur additional experimental research on, the processes and causal relations of place attachment. Future work should also develop a quantitative measure of these 13 benefits, which could be factor analysed to evaluate whether they could be better represented by a fewer number of underlying factors. This scale could then be used to assess the relative contribution of each benefit as predictors of strength of place attachment, as well as other outcomes, such as well-being, community engagement, or coping with place loss.</span></p><p data-dcnode-id="6066" id="p0510"><span data-dcnode-id="6076" instrument_node="">Other work should investigate the psychological benefits of mobility in comparison to those identified for place attachment. Some authors have proposed that place attachment and mobility are conflicting (</span><a class="workspace-trigger" data-dcnode-id="6074" href="#bib42" name="bbib42"><span data-dcnode-id="6075" instrument_node="">Gustafson, 2009a</span></a><span data-dcnode-id="6073" instrument_node="">), whereas others have argued that the two are complementary, for example that being away can strengthen local ties (e.g., </span><a class="workspace-trigger" data-dcnode-id="6071" href="#bib19" name="bbib19"><span data-dcnode-id="6072" instrument_node="">Case, 1996</span></a><span data-dcnode-id="6070" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6068" href="#bib74" name="bbib74"><span data-dcnode-id="6069" instrument_node="">Lewicka, 2011</span></a><span data-dcnode-id="6067" instrument_node="">). An analysis of the common and unique benefits of each mode may help to clarify these dynamics.</span></p></section></section><section data-dcnode-id="6052" id="sec4"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6058" id="sectitle0245"><span data-dcnode-id="6063" instrument_node="">4</span><span data-dcnode-id="6061" instrument_node="">. </span><span data-dcnode-id="6059" instrument_node="">Conclusion</span></h2><p data-dcnode-id="6053" id="p0515"><span data-dcnode-id="6057" instrument_node="">Given the steadily increasing interest in place attachment, that the range of psychological benefits of the bond has not yet been examined is somewhat surprising. This study is a first step in determining those experienced benefits, and sets the stage for future inquiries. Through a two-phase content analysis, 13 benefits were identified. This provides useful insight into how place attachment bonds interact with psychological functioning. This is not to say that place attachment is required for optimal psychological functioning, or that place attachment bonds all distribute positive effects; as </span><a class="workspace-trigger" data-dcnode-id="6055" href="#bib20" name="bbib20"><span data-dcnode-id="6056" instrument_node="">Chawla (1992)</span></a><span data-dcnode-id="6054" instrument_node=""> explains, place attachment can also have a “shadow side.” But the themes identified in the present study portray the positive aspects of person-place functioning, and which will be used to guide future research.</span></p></section></div><section data-dcnode-id="6043" id="ack0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6049" id="sectitle0255"><span data-dcnode-id="6050" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="6044" id="p0525"><span data-dcnode-id="6048" instrument_node="">The authors wish to acknowledge Andrea Piccinin, Reuben Rose-Redwood, and Maria Lewicka for their thoughtful comments on earlier drafts of this manuscript, as well as Jessica Rourke, Christine Kormos, Alexander Hum, and Heather Belecky for their assistance with data analysis. Finally, the authors gratefully acknowledge the </span><span data-dcnode-id="6046" id="gs1"><span data-dcnode-id="6047" instrument_node="">Social Sciences and Humanities Research Council of Canada</span></span><span data-dcnode-id="6045" instrument_node=""> for financially supporting this work.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="6038"><button class="button button-anchor" data-dcnode-id="6039" type="button"><span class="button-text" data-dcnode-id="6040"><span data-dcnode-id="6041" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="6037"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="367" id="cebib0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6035"><span data-dcnode-id="6036" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="368" id="cebibsec0010"><dl class="references" data-dcnode-id="369" id="reference-links-cebibsec0010"><dt class="label" data-dcnode-id="6032"><a data-aa-button="sd:product:journal trument_node="">38</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="371"><span data-dcnode-id="374" instrument_node=""></span><a aria-describedby="ref-id-sref112" class="link" data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DThe%2520physical%2520environment%253A%2520A%2520problem%2520for%2520a%2520psychology%2520of%2520stimulation%26publication_year%3D1966%26author%3DJ.F.%2520Wohlwill" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="373" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="243" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="244"><div class="PageDivider" data-dcnode-id="366"></div><header data-dcnode-id="363" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Cited by (126)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="245"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="246"><ul data-dcnode-id="252"><li class="ListArticleItem" data-dcnode-id="345"><div class="sub-heading" data-dcnode-id="357"><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S221242092200111X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="361" id="citing-articles-article0-title"><span data-dcnode-id="362" instrument_node="">Place attachment, community trust, and farmer's community participation: Evidence from the hardest-hit areas of Sichuan, China</span></h3></a><div class="article-source ellipsis" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">2022, International Journal of Disaster Risk Reduction</span></div></div><div class="buttons" data-dcnode-id="351"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="352" type="button"><span class="button-link-text" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="353" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="354"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="346"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="347" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="348"><p data-dcnode-id="349" id="abspara0010"><span data-dcnode-id="350" instrument_node="">Traditional community disaster prevention and mitigation relies on the top-down management mode led by the government and ignores the important role played by the participation of peasant households and communities in grass-roots disaster risk management. Based on the sampling survey data of 327 households in the disaster threatened area, An ordered multi-classification logistic regression model was constructed to explore the relationship between farmers' place attachment, community trust and community participation (CP), and further test the mediating effect of community trust on the relationship between place attachment and CP. The results showed that:(1) the self-score of farmers' CP behavior was in the middle level. place attachment was relatively high, with the mean scores of place identity and place dependence being 4.15 and 4.17 respectively. Farmers' community trust is at a high level, among which organizational trust score is the highest with an average of 4.37, and emotional trust score is the lowest with an average of 3.97. (2) Both farmers' local attachment and community trust are positively correlated with their social participation, and community trust has a partial mediating effect between Place attachment and community participation. This study analyzes the correlation between local attachment, community trust and community participation in disaster threatened areas, which can provide support for the construction of community resilience disaster prevention system and improve the comprehensive ability of communities to resist and reduce disaster loss.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="327"><div class="sub-heading" data-dcnode-id="339"><a data-dcnode-id="342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1618866722000747" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="343" id="citing-articles-article1-title"><span data-dcnode-id="344" instrument_node="">Predicting place attachment among walkers in the urban context: The role of dogs, motivations, satisfaction, past experience and setting development</span></h3></a><div class="article-source ellipsis" data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">2022, Urban Forestry and Urban Greening</span></div></div><div class="buttons" data-dcnode-id="333"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="334" type="button"><span class="button-link-text" data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="335" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="336"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="328"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="329" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="330"><p data-dcnode-id="331" id="sp0085"><span data-dcnode-id="332" instrument_node="">Place attachment knowledge informs urban green space management to maximize positive visitor experiences. However, little is known about how place attachment differs between urban green space settings and users, particularly dog walkers or owners. This study explored place attachment and the better-known influence of variables such as motivation, satisfaction and visit frequency, as well as the understudied contributions of dog-ownership status and degree of setting development. In total, 450 on-site walkers and dog walkers in two cities and four green spaces with different levels of development were interviewed. Regression analyses revealed motivations, satisfaction and visit frequency predicted place attachment. Place attachment strength differed between walkers and dog walkers: dog walkers were more likely to have higher place identity and place dependence. Similarly, visitors to the urban green spaces with the lowest degree of development were highest on place dependence and identity. Implications and future research ideas are shared.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="309"><div class="sub-heading" data-dcnode-id="321"><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1353829222000296" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="325" id="citing-articles-article2-title"><span data-dcnode-id="326" instrument_node="">‘It doesn't feel like our house anymore’: The impact of medical technology upon life at home for families with a medically complex, technology-dependent child</span></h3></a><div class="article-source ellipsis" data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">2022, Health and Place</span></div></div><div class="buttons" data-dcnode-id="315"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="316" type="button"><span class="button-link-text" data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="317" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="318"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="310"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="311" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="312"><p data-dcnode-id="313" id="abspara0010"><span data-dcnode-id="314" instrument_node="">The study aimed to identify how medical technology impacts upon the home and life at home. Inductive auto-driven photo-elicitation or semi-structured interviews were conducted with technology-dependent children/young people (n&nbsp;=&nbsp;2) and their family members (n&nbsp;=&nbsp;15) from 10 families. Thematic analysis generated three themes: Altered physicality and look of the home; Altered sounds in the home; and ‘It's worth it! Technology enables us to stay as a family’. Fundamentally, the detrimental impacts of living with medical technology were perceived as worth it as these enabled their child to be at home. Home was not home, and families were incomplete without their child at home.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="291"><div class="sub-heading" data-dcnode-id="303"><a data-dcnode-id="306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2095263521000479" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="307" id="citing-articles-article3-title"><span data-dcnode-id="308" instrument_node="">Biophilic design in architecture and its contributions to health, well-being, and sustainability: A critical review</span></h3></a><div class="article-source ellipsis" data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">2022, Frontiers of Architectural Research</span></div></div><div class="buttons" data-dcnode-id="297"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="298" type="button"><span class="button-link-text" data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="299" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="300"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="292"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="293" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="294"><p data-dcnode-id="295" id="abspara0010"><span data-dcnode-id="296" instrument_node="">In the last ten years, ‘nature’ and biophilic design have received widespread attention in architecture, especially in response to growing environmental challenges. However, open questions and controversies remain regarding conceptualizing and addressing ‘nature’ in practice and research. This study conducts a literature review to discuss biophilic design as a theoretical framework to interpret ‘nature’ in architecture. The following questions are answered: (1) How has the concept of biophilic design emerged, and how can it be defined? (2) In what ways can biophilic design contribute to the goals of sustainable architecture? (3) What are the key design strategies in biophilic design? This review identifies and compares the key frameworks of biophilic design and explains their major elements. We then analyse the benefits (e.g., enhance health, well-being, productivity, biodiversity, and circularity) of biophilic design in achieving sustainability, as framed through the UN Sustainable Development Goals. The results indicate that biophilic design is more complex and richer than the mere application of vegetation in buildings; it broadens the variety through encompassing different types of nature from physical, sensory, metaphorical, morphological, material to spiritual. Moreover, knowledge gaps are identified to motivate future research and critical reflections on biophilic design practices.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="271"><div class="sub-heading" data-dcnode-id="285"><a data-dcnode-id="288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0272494421001699" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="289" id="citing-articles-article4-title"><span data-dcnode-id="290" instrument_node="">Place attachment satisfies psychological needs in the context of environmental risk coping: Experimental evidence of a link between self-determination theory and person-place relationship effects</span></h3></a><div class="article-source ellipsis" data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">2021, Journal of Environmental Psychology</span></div></div><div class="buttons" data-dcnode-id="279"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="280" type="button"><span class="button-link-text" data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="281" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="282"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="272"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="273" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="274"><p data-dcnode-id="277" id="abspara0010"><span data-dcnode-id="278" instrument_node="">The present paper aims to provide some empirical evidence of how the ability of places to satisfy psychological needs might be an antecedent for the creation of an affective bond with those places by using visualization techniques for place attachment manipulation and exploring the similarities between two main frames of reference in literature, place attachment literature and Self-Determination Theory (SDT). The paper has three main hypotheses: 1) showing that the basic needs hypothesized by SDTand those hypothesized by Place Attachment Literature are both affected by place features and have similar affective and behavioral outcomes; 2) showing that the ability of a place to satisfy individual's needs is associated with the individual attachment to the place; 3) showing that the place attachment developed by the perception of needs satisfaction affects individual's place-related behaviors.</span></p><p data-dcnode-id="275" id="abspara0015"><span data-dcnode-id="276" instrument_node="">Two experimental studies were conducted manipulating place attachment toward a new evacuation site in a virtual location affected by natural hazards, with two scenario manipulations. One manipulation is realized on the basis of the needs emerged by place attachment literature taxonomies. The second manipulation aims to the same target on the basis of Self-Determination Theory. Study 1 shows that both manipulations affect psychological need satisfaction and place attachment; Study 2 shows that they also affect risk coping place-related behavior. Results confirm the three hypotheses and shed light on how psychological needs satisfaction is linked to place attachment and its practical relevance for environmental risk perception and coping in natural hazard contexts, possibly improving risk coping plans in emergency situations and, ultimately, saving lives. Moreover, these results could be applied also to other settings, like shelters or temporary settlements improving wellness conditions in these environments.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="253"><div class="sub-heading" data-dcnode-id="265"><a data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1618866721003332" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="269" id="citing-articles-article5-title"><span data-dcnode-id="270" instrument_node="">The effect of place attachment and greenway attributes on well-being among older adults in Taiwan</span></h3></a><div class="article-source ellipsis" data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">2021, Urban Forestry and Urban Greening</span></div></div><div class="buttons" data-dcnode-id="259"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="260" type="button"><span class="button-link-text" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="261" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="262"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="254"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="255" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="256"><p data-dcnode-id="257" id="spar0035"><span data-dcnode-id="258" instrument_node="">This study examined the effects of the behavioral, environmental, and intermediate attributes of greenways on the well-being of older adults, especially regarding how place attachment can serve as an intermediate factor in achieving aging in place. Data were obtained from environmental evaluations and user surveys of 769 participants aged 55 and older throughout all 13 greenways of the Taichung Urban Greenway system. The regression models revealed that greenway quality, perceived pollution, activities on the greenways, neighborhood social capital, and place attachment had significant effects on well-being. Moreover, the greenness of the greenways had a more positive impact on the well-being of those older people who experienced greater levels of place attachment. The strengths of the current study include a focus on the synergistic effects that a greenway, place attachment, and neighborhood social capital have on well-being, thereby contributing to aging in place for the growing older population.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85018622479%26md5%3Db4fa8674c0efbbe62f324aaf13e5687f" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="250" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="251"></path></svg><span class="button-alternative-text" data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0272494417300518"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2017 Published by Elsevier Ltd.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="230" type="button"><span class="button-link-text" data-dcnode-id="233"><h2 class="section-title u-h4" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Recommended articles</span></h2></span><svg class="icon icon-navigate-down" data-dcnode-id="231" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="232"></path></svg></button></
