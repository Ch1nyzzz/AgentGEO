=""> displays the resulting 13 experienced benefits of place attachment, and the frequencies for each category are presented in alphabetical order in </span><a class="workspace-trigger" data-dcnode-id="7291" href="#tbl3" name="btbl3"><span data-dcnode-id="7292" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="7290" instrument_node="">, each of which is described in detail below. The number of benefits expressed per participant ranged from zero to eight (</span><em data-dcnode-id="7288"><span data-dcnode-id="7289" instrument_node="">M</span></em><span data-dcnode-id="7287" instrument_node="">&nbsp;=&nbsp;3.73, </span><em data-dcnode-id="7285"><span data-dcnode-id="7286" instrument_node="">SD</span></em><span data-dcnode-id="7284" instrument_node="">&nbsp;=&nbsp;1.65).</span></p><figure class="figure text-xs" data-dcnode-id="7258" id="fig1"><span data-dcnode-id="7267"><img alt="Fig.&nbsp;1" aria-describedby="cap0010" data-dcnode-id="7282" height="341" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272494417300518-gr1.jpg&amp;raw"><span data-dcnode-id="7281" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7268"><li data-dcnode-id="7275"><a class="anchor download-link u-font-sans" data-dcnode-id="7276" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272494417300518-gr1_lrg.jpg" target="_blank" title="Download high-res image (217KB)"><span class="anchor-text" data-dcnode-id="7277"><span data-dcnode-id="7280" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7278"><span data-dcnode-id="7279" instrument_node="">Download high-res image (217KB)</span></span></span></a></li><li data-dcnode-id="7269"><a class="anchor download-link u-font-sans" data-dcnode-id="7270" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0272494417300518-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7271"><span data-dcnode-id="7274" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7272"><span data-dcnode-id="7273" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7259"><span data-dcnode-id="7260" id="cap0010"><p data-dcnode-id="7261" id="fspara0010"><span class="label" data-dcnode-id="7265"><span data-dcnode-id="7266" instrument_node="">Fig.&nbsp;1</span></span><span data-dcnode-id="7264" instrument_node="">. </span><span data-dcnode-id="7262" instrument_node="">Thirteen experienced psychological benefits of place attachment, and the percentages of participants who mentioned each given benefit at least once.</span></p></span></span></figure></div><section data-dcnode-id="7233" id="sec2.7.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7251" id="sectitle0110"><span data-dcnode-id="7256" instrument_node="">2.7.1</span><span data-dcnode-id="7254" instrument_node="">. </span><span data-dcnode-id="7252" instrument_node="">Memories</span></h4><p data-dcnode-id="7246" id="p0175"><span data-dcnode-id="7250" instrument_node="">The most commonly experienced benefit of place attachment, mentioned by 69% of participants, is that it supports memories. Many participants described their place of attachment as being able to connect them to the past, or evoke memories, as was expressed in comments such as:</span></p><blockquote data-dcnode-id="7247"><p data-dcnode-id="7248" id="dspara0010"><span data-dcnode-id="7249" instrument_node="">Although I have not been to this place in a while, I went frequently as a kid. I can still picture all of it in my mind; the memories are very vivid. I made a lot of friends there, I also caught my first fish there.</span></p></blockquote><p></p><p data-dcnode-id="7241"><span data-dcnode-id="7245" instrument_node="">Through memory, the place of attachment can also serve to symbolize past and present traditions, thereby helping to situate the individual in time. One person wrote:</span></p><blockquote data-dcnode-id="7242"><p data-dcnode-id="7243" id="dspara0015"><span data-dcnode-id="7244" instrument_node="">I feel attached to this place because I have been going to the cottage several times a year, every year for as long as I can remember. I have many childhood memories, as well as more recent memories of events that happened there.</span></p></blockquote><p></p><p data-dcnode-id="7236" id="p0180"><span data-dcnode-id="7240" instrument_node="">Memory can go further than the recent past, by representing one's lineage or ancestry. The place connects the person to the past through their family's history. One participant's attachment to a region in Northern Iraq demonstrated use of place to connect to the past cognitively (through nostalgia), historically (by situating his own story in a political event), and ancestrally:</span></p><blockquote data-dcnode-id="7237"><p data-dcnode-id="7238" id="dspara0020"><span data-dcnode-id="7239" instrument_node="">It creates nostalgia for me personally because it is a place I grew up in. It is full of mountains and land which seem to go on forever. It was my home. This was before the Iraqi Christians were persecuted and had to immigrate elsewhere. All my ancestors had lived there and have history there. It makes me feel as though that's where I belong – everyone is very welcoming.</span></p></blockquote><p></p><p data-dcnode-id="7234"><span data-dcnode-id="7235" instrument_node="">In this example, ancestral ties link the two benefits of belonging and memories.</span></p></section><section data-dcnode-id="7214" id="sec2.7.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7227" id="sectitle0115"><span data-dcnode-id="7232" instrument_node="">2.7.2</span><span data-dcnode-id="7230" instrument_node="">. </span><span data-dcnode-id="7228" instrument_node="">Belonging</span></h4><p data-dcnode-id="7222" id="p0195"><span data-dcnode-id="7226" instrument_node="">The second-most commonly mentioned benefit of place attachment was belonging, which was evident in 54% of responses. This benefit included feelings of “at homeness,” belonging, feeling loved, having roots in a place, fitting in, or connecting with others. This was evident in one participant's description of her aunt's house:</span></p><blockquote data-dcnode-id="7223"><p data-dcnode-id="7224" id="dspara0025"><span data-dcnode-id="7225" instrument_node="">It always gives me a feeling of belonging, much more than my own home because I moved houses several times as a child. It helps me stay connected with my extended family, some I don't usually see except for several times a year at this place.</span></p></blockquote><p></p><p data-dcnode-id="7220"><span data-dcnode-id="7221" instrument_node="">For this participant, the presence of family and the provision of stability offered by the place created the sense of belonging. Some participants described belongingness as a sense of origin, and family roots. Responses such as “it reminds me of my own roots,” or “this is where my family is from,” were sometimes cited as the source of the attachment. Belongingness was also associated with notions of feeling “at home,” and having a “hometown.” This was evident in one participant's explanation of her attachment to her hometown: “I like having a place to call ‘home.’ This is why my town is special to me. It gives me belonging.”</span></p><p data-dcnode-id="7215" id="p0200"><span data-dcnode-id="7219" instrument_node="">Sometimes, the connection to the physical place promoted belongingness, but at other times the place provided belongingness because of its interpersonal dimension, as was evident in one participant's description of her attachment to her lakeside cottage:</span></p><blockquote data-dcnode-id="7216"><p data-dcnode-id="7217" id="dspara0030"><span data-dcnode-id="7218" instrument_node="">I have some wonderful memories that I've made over the years there with my husband. I can see our future when we're there. It makes me feel a stronger connection to my husband because of the time we get to spend together up there with no other responsibilities.</span></p></blockquote><p></p></section><section data-dcnode-id="7200" id="sec2.7.3"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7208" id="sectitle0120"><span data-dcnode-id="7213" instrument_node="">2.7.3</span><span data-dcnode-id="7211" instrument_node="">. </span><span data-dcnode-id="7209" instrument_node="">Relaxation</span></h4><p data-dcnode-id="7203" id="p0210"><span data-dcnode-id="7207" instrument_node="">The third-most commonly mentioned benefit of place attachment was stress-relief and relaxation, mentioned by 49% of participants. One participant emphasized this about his attachment to his two-storey house:</span></p><blockquote data-dcnode-id="7204"><p data-dcnode-id="7205" id="dspara0035"><span data-dcnode-id="7206" instrument_node="">Every day after work I head home and relax. I feel most comfortable at home. This is where I always go to relax so I think of it as a relaxing place. I think this is why I always want to go back. I feel relaxed and my stress goes away. I could be in the worst mood but as soon as I get home it simmers and fades quickly.</span></p></blockquote><p></p><p data-dcnode-id="7201"><span data-dcnode-id="7202" instrument_node="">In this case, relaxation included comfort and restoration from stress and negative affect. Thus, the place-as-relaxation benefit encapsulates the ability of place to help individuals achieve restoration from depleted emotional, attentional, or psychophysiological states.</span></p></section><section data-dcnode-id="7188" id="sec2.7.4"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7194" id="sectitle0125"><span data-dcnode-id="7199" instrument_node="">2.7.4</span><span data-dcnode-id="7197" instrument_node="">. </span><span data-dcnode-id="7195" instrument_node="">Positive emotions</span></h4><p data-dcnode-id="7189" id="p0220"><span data-dcnode-id="7193" instrument_node="">Over a third of participants (38%) specifically mentioned experiencing positive emotions as a benefit of being attached to their place, such as happiness, joy, hope, and pride. Overall, expressions of happiness were most frequent (e.g., “When I'm in Courtenay I feel at ease, at peace, and happy. The world seems OK again when I'm there;” and “I feel joy and happiness as I escape to the place I love with the people I love”). Interestingly, a few participants (5%) expressed negative or ambivalent emotions associated with their place of attachment, because of lost friends, changes in place appearance or ownership or painful memories, supporting the notion that place attachment is not only beneficial, but also has a “shadow side” (</span><a class="workspace-trigger" data-dcnode-id="7191" href="#bib20" name="bbib20"><span data-dcnode-id="7192" instrument_node="">Chawla, 1992</span></a><span data-dcnode-id="7190" instrument_node="">). Although worth mentioning, these were not expressed in terms of psychological benefits, and so a separate category for negative emotions, or the “shadow side of place attachment” was not included.</span></p></section><section data-dcnode-id="7179" id="sec2.7.5"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7182" id="sectitle0130"><span data-dcnode-id="7187" instrument_node="">2.7.5</span><span data-dcnode-id="7185" instrument_node="">. </span><span data-dcnode-id="7183" instrument_node="">Activity support</span></h4><p data-dcnode-id="7180" id="p0225"><span data-dcnode-id="7181" instrument_node="">Place attachment can support the ability to engage in activities or work. This benefit was mentioned by 33% of participants. Unlike entertainment, which involves the presence of exciting activities in a place (see below), the “activities” category is more an interdependent person-place benefit, referring to the ability of a place to support one's hobbies, interests, work, or skills. One participant observed that “the benefit of being connected to this place psychologically is that it gives me the opportunity to write expressively in a comfortable place I feel safe in.” Another participant described his attachment to a comic book and record store “I was able to get a lot of material related to my growing interest in art, animation, and comics starting in my early teens.” These examples highlight how place attachment can provide a goal-supportive benefit that is by virtue of a good fit between the individual's interests and the attributes of the place.</span></p></section><section data-dcnode-id="7162" id="sec2.7.6"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7173" id="sectitle0135"><span data-dcnode-id="7178" instrument_node="">2.7.6</span><span data-dcnode-id="7176" instrument_node="">. </span><span data-dcnode-id="7174" instrument_node="">Comfort and security</span></h4><p data-dcnode-id="7168" id="p0230"><span data-dcnode-id="7172" instrument_node="">Another important benefit was comfort-security, mentioned by 31% of participants. Of those responses, one-third specifically referred to physical comfort, such as food, nourishment, climate, and physical safety. Physical comfort was evident in one participant's description of her attachment to Calgary:</span></p><blockquote data-dcnode-id="7169"><p data-dcnode-id="7170" id="dspara0040"><span data-dcnode-id="7171" instrument_node="">The climate is mild in the summer and cold and snowy in the winter; it is not humid. It is a big city but it doesn't feel big and isn't crowded compared to similarly-sized cities. There are very few insects aside from mosquitoes, and there are lots of outdoor and indoor spaces to enjoy year-round, alone or surrounded by people.</span></p></blockquote><p></p><p data-dcnode-id="7163"><span data-dcnode-id="7167" instrument_node="">However, two-thirds of the time, comfort was expressed in psychological terms, whereby the place provides a sense of security, allowing the individual to feel at ease. References to the place as “safe and secure,” “sanctuary,” and “safe haven,” were coded as part of this subcategory. This was evident in one participant's description of his attachment to Singapore, where he experiences “inner security.” A few of the participants who referred to comfort (i.e., </span><em data-dcnode-id="7165"><span data-dcnode-id="7166" instrument_node="">n</span></em><span data-dcnode-id="7164" instrument_node="">&nbsp;=&nbsp;4) did not provide enough information for coders to determine whether it was psychological or physical comfort (e.g., “it is my house that I [grew] up in and is the safest place on the earth”).</span></p></section><section data-dcnode-id="7151" id="sec2.7.7"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7156" id="sectitle0140"><span data-dcnode-id="7161" instrument_node="">2.7.7</span><span data-dcnode-id="7159" instrument_node="">. </span><span data-dcnode-id="7157" instrument_node="">Personal growth</span></h4><p data-dcnode-id="7154" id="p0240"><span data-dcnode-id="7155" instrument_node="">A number of participants (22%) recognized that their places of attachment supported their personal growth or self-improvement. In part, this occurred when the places were used for introspection, resulting in insight or self-reflection. The introspection was also used for self-regulation, where goal progress is assessed through a comparison of distance to the desired goal; This was evident for one participant, who explained that her place “helps me to see how close or far away I am from the path I want to be on in life.”</span></p><p data-dcnode-id="7152" id="p0245"><span data-dcnode-id="7153" instrument_node="">For others, personal-growth was afforded by the activities performed in the place, as one participant described about his attachment to the gym: “When I am at the gym I typically feel like I am improving myself so I think psychologically that makes me proud of myself.” Personal-growth was often expressed in terms of a sense of accomplishment, improved self-esteem, or an appreciation for things learned about oneself.</span></p></section><section data-dcnode-id="7142" id="sec2.7.8"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7145" id="sectitle0145"><span data-dcnode-id="7150" instrument_node="">2.7.8</span><span data-dcnode-id="7148" instrument_node="">. </span><span data-dcnode-id="7146" instrument_node="">Freedom</span></h4><p data-dcnode-id="7143" id="p0250"><span data-dcnode-id="7144" instrument_node="">Places of attachment were cited as providing freedom, control, and autonomy by 19% of participants. When in the place, participants reported feeling a sense of doing as they pleased and making their own decisions. For some, the place represented the first step of adult independence: “It was the first time I lived in a place that was all my own. I was officially an adult living away from my parents.” Freedom was also expressed in terms of an escape from daily routine: “It offers me freedom from life around me. It basically takes me out of my general rut of things and lets me enjoy everything around me.”</span></p></section><section data-dcnode-id="7123" id="sec2.7.9"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7136" id="sectitle0150"><span data-dcnode-id="7141" instrument_node="">2.7.9</span><span data-dcnode-id="7139" instrument_node="">. </span><span data-dcnode-id="7137" instrument_node="">Entertainment</span></h4><p data-dcnode-id="7131" id="p0255"><span data-dcnode-id="7135" instrument_node="">Another benefit of place attachment is the ability of the place to provide a pleasing level of stimulation and interest, which we termed “entertainment.” This refers to attributes inherent in the place that compellingly engage the individual in some way. Participants who experienced place attachment-based entertainment (i.e., 19%) lauded their place for providing novelty, curiosity, excitement, diversity, activities, exploration, exhilaration, or opportunities for learning. One participant described a flea market:</span></p><blockquote data-dcnode-id="7132"><p data-dcnode-id="7133" id="dspara0045"><span data-dcnode-id="7134" instrument_node="">[It] used to be in a very old building on the river in Fergus. On weekends [it] would come alive with vendors that sold everything from clothes to food to any kind of hobby you could think of. It was so much fun as a child because they not only had many hobby shops that I was interested in, but it was a maze for little kids to get lost in.</span></p></blockquote><p></p><p data-dcnode-id="7126"><span data-dcnode-id="7130" instrument_node="">The bond was rooted in the excitement and fun offered by the place, and the congruence between the activities of the place and the interests of the participant when he was a child. Another participant described benefiting from the entertaining aspects of a favorite park in Montreal:</span></p><blockquote data-dcnode-id="7127"><p data-dcnode-id="7128" id="dspara0050"><span data-dcnode-id="7129" instrument_node="">I like the idea that a lot of different kinds of people use and enjoy the park. […] A variety of people go there -- sometimes musicians are practicing or playing with their friends, sometimes circus performers are practicing their acts. Sometimes there's just a lot of people walking their dogs.</span></p></blockquote><p></p><p data-dcnode-id="7124" id="p0260"><span data-dcnode-id="7125" instrument_node="">This category of benefits demonstrates that places of attachment are not solely functioning as familiar safe havens, but that they can provide novelty, activity, interest, or excitement. Of note, the types of places that involve entertainment were more often vacation destinations, cities, commercial venues, parks, or countries, rather than residential environments.</span></p></section><section data-dcnode-id="7106" id="sec2.7.10"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7117" id="sectitle0155"><span data-dcnode-id="7122" instrument_node="">2.7.10</span><span data-dcnode-id="7120" instrument_node="">. </span><span data-dcnode-id="7118" instrument_node="">Connection to nature</span></h4><p data-dcnode-id="7112" id="p0270"><span data-dcnode-id="7116" instrument_node="">Not surprisingly, some of the places of attachment featured nature or greenery, but beyond this as a physical description, 11.5% of participants explicitly expressed that their place of attachment fulfilled their need to be connected to nature. For example, one person noted, “When I'm not there, I want to go back for the wilderness - I like to go back to places I've hiked and remember things I've seen.” For some participants, wildlife encounters were especially important, as one man explained:</span></p><blockquote data-dcnode-id="7113"><p data-dcnode-id="7114" id="dspara0055"><span data-dcnode-id="7115" instrument_node="">I had some friends there, but the most important reason I 'feel attached' to Pemberton was the close proximity to wilderness. I am quite a loner, and a 5 minute walk from my door and I was in old growth forest. I would see all kinds of animals – deer, moose, bear, eagles, cougars. You name it. I watched them as a child/teen.</span></p></blockquote><p></p><p data-dcnode-id="7107"><span data-dcnode-id="7111" instrument_node="">Some participants who expressed benefits of being connected to nature simultaneously benefited from relaxation (e.g., “I want to go there and see the trees and the creek and feel that peaceful relaxing feeling I used to feel every time I'd go there”), while others linked nature to their identity (e.g., “I grew up in nature, and seeing this place every day makes me feel more like myself”). Some, however, focused on connection to nature without reference to other types of benefits, such as one participant who described her attachment to her uncle's cottage in Ontario:</span></p><blockquote data-dcnode-id="7108"><p data-dcnode-id="7109" id="dspara0060"><span data-dcnode-id="7110" instrument_node="">It is a full acre of [a] beautiful Canadian landscape. Streams, bridges, frogs, dragonflies. Everything you could ever need. A stream that runs right next to the cottage where further upstream you may drink fresh water straight out of the ground. A most beautiful place to be. I wish I could live there.</span></p></blockquote><p></p></section><section data-dcnode-id="7097" id="sec2.7.11"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7100" id="sectitle0160"><span data-dcnode-id="7105" instrument_node="">2.7.11</span><span data-dcnode-id="7103" instrument_node="">. </span><span data-dcnode-id="7101" instrument_node="">Practical benefits</span></h4><p data-dcnode-id="7098" id="p0280"><span data-dcnode-id="7099" instrument_node="">Participants sometimes referred to the ability of their place to meet practical needs, such as obtaining food, services, or other resources. This benefit was mentioned by 9% of participants, who provided responses such as “[my place] has many amenities and everything I need. It is easy to get around town from the location,” and “I grew up in Calgary and like all the amenities (a wide selection of stores and good public transit).”</span></p></section><section data-dcnode-id="7088" id="sec2.7.12"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7091" id="sectitle0165"><span data-dcnode-id="7096" instrument_node="">2.7.12</span><span data-dcnode-id="7094" instrument_node="">. </span><span data-dcnode-id="7092" instrument_node="">Privacy</span></h4><p data-dcnode-id="7089" id="p0285"><span data-dcnode-id="7090" instrument_node="">Places of attachment sometimes enabled individuals to obtain privacy, solitude, isolation, or “peace and quiet,” and this class of benefits was mentioned by 7% of participants. One participant described an office which was “kind of isolated from the rest of my home. I feel attached to this place because it is a quiet place (usually) where others in my family rarely disturb me.” An attachment to the Pilbara desert region in Western Australia was similarly valued because of the opportunity for privacy: “You feel very secluded, hidden, and solitary.”</span></p></section><section data-dcnode-id="7079" id="sec2.7.13"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7082" id="sectitle0170"><span data-dcnode-id="7087" instrument_node="">2.7.13</span><span data-dcnode-id="7085" instrument_node="">. </span><span data-dcnode-id="7083" instrument_node="">Aesthetics</span></h4><p data-dcnode-id="7080" id="p0290"><span data-dcnode-id="7081" instrument_node="">Many participants described their places as beautiful, but some individuals (i.e., 7%) more explicitly recognized the aesthetic value of their place as a key benefit from the attachment. These people appreciated being privy to the beautiful view, scenery, or visual character of their place. That places of attachment met an aesthetic need may partly be related to other benefits, such as connection to nature, relaxation, comfort, or positive emotions. However, the experience of visual beauty may serve its own intrinsic benefit. One participant “enjoy[s] the pleasing aesthetics and power imagery of the lion” monument in Toronto to which he is attached, and another participant similarly cited the aesthetic value of her attachment to a valley near Vancouver: “It's beautiful. I've never seen anything like it.”</span></p></section><section data-dcnode-id="7065" id="sec2.7.14"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7073" id="sectitle0175"><span data-dcnode-id="7078" instrument_node="">2.7.14</span><span data-dcnode-id="7076" instrument_node="">. </span><span data-dcnode-id="7074" instrument_node="">No place attachment</span></h4><p data-dcnode-id="7068" id="p0295"><span data-dcnode-id="7072" instrument_node="">Three participants indicated that they had no place to which they considered themselves attached. One of them expressed an intentional value for non-attachment:</span></p><blockquote data-dcnode-id="7069"><p data-dcnode-id="7070" id="dspara0065"><span data-dcnode-id="7071" instrument_node="">I don't need to draw on people places and things to receive a sence [sic] of comfort about myself. I guess i am comfortable werever [sic] i am. There was a time that i felt attachment to many things/places. I guess once i realised it was all related to my feeling insecure i eventually, over the course of many years, let them go.</span></p></blockquote><p></p><p data-dcnode-id="7066"><span data-dcnode-id="7067" instrument_node="">The other two viewed attachment solely in interpersonal terms: “There's no place that is especially meaningful to me. People make places special, not the place,” and “When I think of attachment I think of people. I have no special places that I particularly like to be or that I can think about that have any real meaning to me as places seem to come and go.”</span></p></section></section><section data-dcnode-id="7024" id="sec2.8"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7058" id="sectitle0180"><span data-dcnode-id="7063" instrument_node="">2.8</span><span data-dcnode-id="7061" instrument_node="">. </span><span data-dcnode-id="7059" instrument_node="">Demographic differences in benefits of place attachment</span></h3><p data-dcnode-id="7029" id="p0305"><span data-dcnode-id="7057" instrument_node="">The frequencies of each experienced benefit were examined by gender, age, and housing tenure (renting or owning) (</span><a class="workspace-trigger" data-dcnode-id="7055" href="#tbl3" name="btbl3"><span data-dcnode-id="7056" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="7054" instrument_node="">). Females mentioned a greater number of benefits (</span><em data-dcnode-id="7052"><span data-dcnode-id="7053" instrument_node="">M</span></em><span data-dcnode-id="7051" instrument_node="">&nbsp;=&nbsp;4.29, </span><em data-dcnode-id="7049"><span data-dcnode-id="7050" instrument_node="">SD</span></em><span data-dcnode-id="7048" instrument_node="">&nbsp;=&nbsp;1.47) than did males, (</span><em data-dcnode-id="7046"><span data-dcnode-id="7047" instrument_node="">M</span></em><span data-dcnode-id="7045" instrument_node="">&nbsp;=&nbsp;3.38, </span><em data-dcnode-id="7043"><span data-dcnode-id="7044" instrument_node="">SD</span></em><span data-dcnode-id="7042" instrument_node="">&nbsp;=&nbsp;1.50), </span><em data-dcnode-id="7040"><span data-dcnode-id="7041" instrument_node="">t</span></em><span data-dcnode-id="7039" instrument_node="">(85)&nbsp;=&nbsp;−2.85, </span><em data-dcnode-id="7037"><span data-dcnode-id="7038" instrument_node="">p</span></em><span data-dcnode-id="7036" instrument_node="">&nbsp;=&nbsp;0.01. However, memory support was the only benefit that differed significantly by gender; this theme was mentioned more often among females (80.4%) than males (59.5%), χ</span><sup data-dcnode-id="7034"><span data-dcnode-id="7035" instrument_node="">2</span></sup><span data-dcnode-id="7033" instrument_node="">&nbsp;=&nbsp;4.61, </span><em data-dcnode-id="7031"><span data-dcnode-id="7032" instrument_node="">p</span></em><span data-dcnode-id="7030" instrument_node="">&nbsp;=&nbsp;0.03.</span></p><p data-dcnode-id="7027" id="p0310"><span data-dcnode-id="7028" instrument_node="">Age did not appear to play a role in the types (or total numbers) of place attachment benefits mentioned; mean ages were similar among those who mentioned (versus did not mention) each benefit.</span></p><p data-dcnode-id="7025" id="p0315"><span data-dcnode-id="7026" instrument_node="">Renters and owners also expressed similar numbers of benefits overall. A higher proportion of owners cited belonging, freedom, entertainment, privacy, and relaxation as benefits of their place of attachment, and more renters mentioned activities, aesthetics, psychological comfort, connection to nature, positive emotions and practical benefits of their places. However, chi-square tests revealed that these benefits did not differ significantly according to housing tenure.</span></p></section><section data-dcnode-id="6947" id="sec2.9"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7018" id="sectitle0185"><span data-dcnode-id="7023" instrument_node="">2.9</span><span data-dcnode-id="7021" instrument_node="">. </span><span data-dcnode-id="7019" instrument_node="">Interrater reliability for coding of geographical scale</span></h3><p data-dcnode-id="7010" id="p0320"><span data-dcnode-id="7017" instrument_node="">Two trained raters coded written responses according to </span><a class="workspace-trigger" data-dcnode-id="7015" href="#bib35" name="bbib35"><span data-dcnode-id="7016" instrument_node="">Freundschuh and Egenhofer’s (1997)</span></a><span data-dcnode-id="7014" instrument_node=""> taxonomy to assess the geographical scale of the place. The percent of overall agreement was 92.9%, and once adjusted for chance agreement, kappa indicated that the interrater reliability was excellent, κ&nbsp;=&nbsp;0.90 (</span><a class="workspace-trigger" data-dcnode-id="7012" href="#bib21" name="bbib21"><span data-dcnode-id="7013" instrument_node="">Cohen, 1960</span></a><span data-dcnode-id="7011" instrument_node="">).</span></p><div data-dcnode-id="6948"><p data-dcnode-id="7005" id="p0325"><span data-dcnode-id="7009" instrument_node="">Agreement could not be reached for determining the place scale of four responses which were lacking sufficient description, and so these participants were excluded from scale-related analyses, leaving 91 valid participants. The frequencies of each category are presented in </span><a class="workspace-trigger" data-dcnode-id="7007" href="#tbl4" name="btbl4"><span data-dcnode-id="7008" instrument_node="">Table&nbsp;4</span></a><span data-dcnode-id="7006" instrument_node="">. Interestingly, environmental space was the most common type of place (54.7%), including places such as a three-storey house, a church, a lakeside trail, a lagoon, a hotel, and a flea market. Geographic space was the second-most frequent scale of place attachments (27.4%), and examples included countries (e.g., Canada, Great Britain) cities (e.g., Houston, Texas, Paris) and regions (e.g., Pilbara desert, Australia). Non-manipulable object space, mentioned by 11.6% of participants, included places such as a coffee shop, a small cottage, a statue, a front yard, a bedroom, and a home office. Finally, places classified as manipulable object space, such as a desk and a tent were much less common (2.1%), and therefore were not included in further analyses. This left 89 participants for analyses involving scale.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="6949" id="tbl4"><span class="captions" data-dcnode-id="6997"><span data-dcnode-id="6998" id="cap0030"><p data-dcnode-id="6999" id="tspara0025"><span class="label" data-dcnode-id="7003"><span data-dcnode-id="7004" instrument_node="">Table&nbsp;4</span></span><span data-dcnode-id="7002" instrument_node="">. </span><span data-dcnode-id="7000" instrument_node="">Frequencies for geographical scale (n&nbsp;=&nbsp;95).</span></p></span></span><div class="groups" data-dcnode-id="6950"><table data-dcnode-id="6951"><thead data-dcnode-id="6988"><tr class="rowsep-1 valign-top" data-dcnode-id="6989"><td data-dcnode-id="6994" scope="col"><span class="screen-reader-only" data-dcnode-id="6995"><span data-dcnode-id="6996" instrument_node="">Empty Cell</span></span></td><th data-dcnode-id="6992" scope="col"><span data-dcnode-id="6993" instrument_node="">Frequency</span></th><th data-dcnode-id="6990" scope="col"><span data-dcnode-id="6991" instrument_node="">Percent</span></th></tr></thead><tbody data-dcnode-id="6952"><tr class="valign-top" data-dcnode-id="6981"><th data-dcnode-id="6986" scope="row"><span data-dcnode-id="6987" instrument_node="">Manipulable object space</span></th><td data-dcnode-id="6984"><span data-dcnode-id="6985" instrument_node="">2</span></td><td data-dcnode-id="6982"><span data-dcnode-id="6983" instrument_node="">2.1</span></td></tr><tr class="valign-top" data-dcnode-id="6974"><th data-dcnode-id="6979" scope="row"><span data-dcnode-id="6980" instrument_node="">Non-manipulable object space</span></th><td data-dcnode-id="6977"><span data-dcnode-id="6978" instrument_node="">11</span></td><td data-dcnode-id="6975"><span data-dcnode-id="6976" instrument_node="">11.6</span></td></tr><tr class="valign-top" data-dcnode-id="6967"><th data-dcnode-id="6972" scope="row"><span data-dcnode-id="6973" instrument_node="">Environmental space</span></th><td data-dcnode-id="6970"><span data-dcnode-id="6971" instrument_node="">52</span></td><td data-dcnode-id="6968"><span data-dcnode-id="6969" instrument_node="">54.7</span></td></tr><tr class="valign-top" data-dcnode-id="6960"><th data-dcnode-id="6965" scope="row"><span data-dcnode-id="6966" instrument_node="">Geographic space</span></th><td data-dcnode-id="6963"><span data-dcnode-id="6964" instrument_node="">26</span></td><td data-dcnode-id="6961"><span data-dcnode-id="6962" instrument_node="">27.4</span></td></tr><tr class="valign-top" data-dcnode-id="6953"><th data-dcnode-id="6958" scope="row"><span data-dcnode-id="6959" instrument_node="">Undetermined scale</span></th><td data-dcnode-id="6956"><span data-dcnode-id="6957" instrument_node="">4</span></td><td data-dcnode-id="6954"><span data-dcnode-id="6955" instrument_node="">4.2</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="6749" id="sec2.10"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6941" id="sectitle0190"><span data-dcnode-id="6946" instrument_node="">2.10</span><span data-dcnode-id="6944" instrument_node="">. </span><span data-dcnode-id="6942" instrument_node="">Geographical scale differences in benefits of place attachment</span></h3><p data-dcnode-id="6939" id="p0330"><span data-dcnode-id="6940" instrument_node="">Because the majority of places were environmental spaces, the majority of self-reported benefits were at this scale, too. Further, memories, belonging, and relaxation were the top three benefits within each scale, although belonging was slightly more common for geographic spaces (69%) than the other two types.</span></p><div data-dcnode-id="6754"><p data-dcnode-id="6934" id="p0335"><span data-dcnode-id="6938" instrument_node="">Beyond these top three commonly-reported benefits, some differences in benefits were evident by scale; these are detailed in </span><a class="workspace-trigger" data-dcnode-id="6936" href="#tbl5" name="btbl5"><span data-dcnode-id="6937" instrument_node="">Table&nbsp;5</span></a><span data-dcnode-id="6935" instrument_node="">. For example, personal growth (46%), activities (46%), privacy (36%), and freedom (27%) were particularly common for places classified as non-manipulable. Not desiring proximity was also more common for places at this scale (18%) than it was to places at the other two scales of interest. In contrast to the other two types of scale, participants attached to non-manipulable places did not report experiencing entertainment, a connection to nature, or practical benefits from these smaller spaces.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="6755" id="tbl5"><span class="captions" data-dcnode-id="6926"><span data-dcnode-id="6927" id="cap0035"><p data-dcnode-id="6928" id="tspara0030"><span class="label" data-dcnode-id="6932"><span data-dcnode-id="6933" instrument_node="">Table&nbsp;5</span></span><span data-dcnode-id="6931" instrument_node="">. </span><span data-dcnode-id="6929" instrument_node="">Percentages of Place Attachment Benefits within each Geographical Scale of Place.</span></p></span></span><div class="groups" data-dcnode-id="6756"><table data-dcnode-id="6757"><thead data-dcnode-id="6916"><tr class="rowsep-1 valign-top" data-dcnode-id="6917"><th data-dcnode-id="6924" scope="col"><span data-dcnode-id="6925" instrument_node="">Benefits</span></th><th data-dcnode-id="6922" scope="col"><span data-dcnode-id="6923" instrument_node="">% Non-manipulable object space</span></th><th data-dcnode-id="6920" scope="col"><span data-dcnode-id="6921" instrument_node="">% Environmental space</span></th><th data-dcnode-id="6918" scope="col"><span data-dcnode-id="6919" instrument_node="">% Geographic space</span></th></tr></thead><tbody data-dcnode-id="6758"><tr class="valign-top" data-dcnode-id="6907"><td data-dcnode-id="6914"><span data-dcnode-id="6915" instrument_node="">Activities</span></td><td data-dcnode-id="6912"><span data-dcnode-id="6913" instrument_node="">45.5</span></td><td data-dcnode-id="6910"><span data-dcnode-id="6911" instrument_node="">30.8</span></td><td data-dcnode-id="6908"><span data-dcnode-id="6909" instrument_node="">34.6</span></td></tr><tr class="valign-top" data-dcnode-id="6898"><td data-dcnode-id="6905"><span data-dcnode-id="6906" instrument_node="">Aesthetics</span></td><td data-dcnode-id="6903"><span data-dcnode-id="6904" instrument_node="">9.1</span></td><td data-dcnode-id="6901"><span data-dcnode-id="6902" instrument_node="">5.9</span></td><td data-dcnode-id="6899"><span data-dcnode-id="6900" instrument_node="">11.5</span></td></tr><tr class="valign-top" data-dcnode-id="6889"><td data-dcnode-id="6896"><span data-dcnode-id="6897" instrument_node="">Belonging</span></td><td data-dcnode-id="6894"><span data-dcnode-id="6895" instrument_node="">45.5</span></td><td data-dcnode-id="6892"><span data-dcnode-id="6893" instrument_node="">55.8</span></td><td data-dcnode-id="6890"><span data-dcnode-id="6891" instrument_node="">69.2</span></td></tr><tr class="valign-top" data-dcnode-id="6880"><td data-dcnode-id="6887"><span data-dcnode-id="6888" instrument_node="">Comfort-security</span></td><td data-dcnode-id="6885"><span data-dcnode-id="6886" instrument_node="">18.2</span></td><td data-dcnode-id="6883"><span data-dcnode-id="6884" instrument_node="">36.5</span></td><td data-dcnode-id="6881"><span data-dcnode-id="6882" instrument_node="">30.8</span></td></tr><tr class="valign-top" data-dcnode-id="6869"><td data-dcnode-id="6876"><span data-dcnode-id="6879" instrument_node="">&nbsp;</span><span data-dcnode-id="6877" instrument_node="">Physical comfort</span></td><td data-dcnode-id="6874"><span data-dcnode-id="6875" instrument_node="">9.1</span></td><td data-dcnode-id="6872"><span data-dcnode-id="6873" instrument_node="">9.6</span></td><td data-dcnode-id="6870"><span data-dcnode-id="6871" instrument_node="">11.5</span></td></tr><tr class="valign-top" data-dcnode-id="6858"><td data-dcnode-id="6865"><span data-dcnode-id="6868" instrument_node="">&nbsp;</span><span data-dcnode-id="6866" instrument_node="">Psychological comfort</span></td><td data-dcnode-id="6863"><span data-dcnode-id="6864" instrument_node="">18.2</span></td><td data-dcnode-id="6861"><span data-dcnode-id="6862" instrument_node="">25.0</span></td><td data-dcnode-id="6859"><span data-dcnode-id="6860" instrument_node="">15.4</span></td></tr><tr class="valign-top" data-dcnode-id="6849"><td data-dcnode-id="6856"><span data-dcnode-id="6857" instrument_node="">Connection to nature</span></td><td data-dcnode-id="6854"><span data-dcnode-id="6855" instrument_node="">0</span></td><td data-dcnode-id="6852"><span data-dcnode-id="6853" instrument_node="">15.4</span></td><td data-dcnode-id="6850"><span data-dcnode-id="6851" instrument_node="">11.5</span></td></tr><tr class="valign-top" data-dcnode-id="6840"><td data-dcnode-id="6847"><span data-dcnode-id="6848" instrument_node="">Freedom</span></td><td data-dcnode-id="6845"><span data-dcnode-id="6846" instrument_node="">27.3</span></td><td data-dcnode-id="6843"><span data-dcnode-id="6844" instrument_node="">17.3</span></td><td data-dcnode-id="6841"><span data-dcnode-id="6842" instrument_node="">15.4</span></td></tr><tr class="valign-top" data-dcnode-id="6831"><td data-dcnode-id="6838"><span data-dcnode-id="6839" instrument_node="">Entertainment</span></td><td data-dcnode-id="6836"><span data-dcnode-id="6837" instrument_node="">0</span></td><td data-dcnode-id="6834"><span data-dcnode-id="6835" instrument_node="">25.0</span></td><td data-dcnode-id="6832"><span data-dcnode-id="6833" instrument_node="">23.1</span></td></tr><tr class="valign-top" data-dcnode-id="6822"><td data-dcnode-id="6829"><span data-dcnode-id="6830" instrument_node="">Memories</span></td><td data-dcnode-id="6827"><span data-dcnode-id="6828" instrument_node="">72.7</span></td><td data-dcnode-id="6825"><span data-dcnode-id="6826" instrument_node="">73.1</span></td><td data-dcnode-id="6823"><span data-dcnode-id="6824" instrument_node="">73.1</span></td></tr><tr class="valign-top" data-dcnode-id="6813"><td data-dcnode-id="6820"><span data-dcnode-id="6821" instrument_node="">Positive emotions</span></td><td data-dcnode-id="6818"><span data-dcnode-id="6819" instrument_node="">18.2</span></td><td data-dcnode-id="6816"><span data-dcnode-id="6817" instrument_node="">48.1</span></td><td data-dcnode-id="6814"><span data-dcnode-id="6815" instrument_node="">34.6</span></td></tr><tr class="valign-top" data-dcnode-id="6804"><td data-dcnode-id="6811"><span data-dcnode-id="6812" instrument_node="">Practical benefits (amenities)</span></td><td data-dcnode-id="6809"><span data-dcnode-id="6810" instrument_node="">0</span></td><td data-dcnode-id="6807"><span data-dcnode-id="6808" instrument_node="">11.5</span></td><td data-dcnode-id="6805"><span data-dcnode-id="6806" instrument_node="">11.5</span></td></tr><tr class="valign-top" data-dcnode-id="6795"><td data-dcnode-id="6802"><span data-dcnode-id="6803" instrument_node="">Privacy</span></td><td data-dcnode-id="6800"><span data-dcnode-id="6801" instrument_node="">36.4</span></td><td data-dcnode-id="6798"><span data-dcnode-id="6799" instrument_node="">5.8</span></td><td data-dcnode-id="6796"><span data-dcnode-id="6797" instrument_node="">0</span></td></tr><tr class="valign-top" data-dcnode-id="6786"><td data-dcnode-id="6793"><span data-dcnode-id="6794" instrument_node="">Relaxation</span></td><td data-dcnode-id="6791"><span data-dcnode-id="6792" instrument_node="">45.5</span></td><td data-dcnode-id="6789"><span data-dcnode-id="6790" instrument_node="">53.8</span></td><td data-dcnode-id="6787"><span data-dcnode-id="6788" instrument_node="">50.0</span></td></tr><tr class="valign-top" data-dcnode-id="6777"><td data-dcnode-id="6784"><span data-dcnode-id="6785" instrument_node="">Personal growth</span></td><td data-dcnode-id="6782"><span data-dcnode-id="6783" instrument_node="">45.5</span></td><td data-dcnode-id="6780"><span data-dcnode-id="6781" instrument_node="">21.2</span></td><td data-dcnode-id="6778"><span data-dcnode-id="6779" instrument_node="">15.4</span></td></tr><tr class="valign-top" data-dcnode-id="6768"><td data-dcnode-id="6775"><span data-dcnode-id="6776" instrument_node="">Other: No Place Attachment</span></td><td data-dcnode-id="6773"><span data-dcnode-id="6774" instrument_node="">–</span></td><td data-dcnode-id="6771"><span data-dcnode-id="6772" instrument_node="">–</span></td><td data-dcnode-id="6769"><span data-dcnode-id="6770" instrument_node="">–</span></td></tr><tr class="valign-top" data-dcnode-id="6759"><td data-dcnode-id="6766"><span data-dcnode-id="6767" instrument_node="">Other: Does not want to go there</span></td><td data-dcnode-id="6764"><span data-dcnode-id="6765" instrument_node="">18.2</span></td><td data-dcnode-id="6762"><span data-dcnode-id="6763" instrument_node="">9.6</span></td><td data-dcnode-id="6760"><span data-dcnode-id="6761" instrument_node="">3.8</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="6752" id="p0340"><span data-dcnode-id="6753" instrument_node="">Participants attached to places classified as environmental space reported a range of benefits, but they were more likely to report deriving positive emotions (48%), comfort-security (37%), entertainment (25%) and connectedness to nature (15%) from places at this scale compared to the others. Aesthetics (6%) was the only benefit less likely to emerge at this scale than the others.</span></p><p data-dcnode-id="6750" id="p0345"><span data-dcnode-id="6751" instrument_node="">Geographic spaces were more likely to offer belonging (69%), aesthetics (11%) and physical comfort (12%) than were the other two scales. Personal growth (15%), psychological comfort (15%) and freedom (15%) were less common at this scale. Participants did not report experiencing privacy at this scale.</span></p></section><section data-dcnode-id="6582" id="sec2.11"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6743" id="sectitle0195"><span data-dcnode-id="6748" instrument_node="">2.11</span><span data-dcnode-id="6746" instrument_node="">. </span><span data-dcnode-id="6744" instrument_node="">Place types</span></h3><div data-dcnode-id="6587"><p data-dcnode-id="6735" id="p0350"><span data-dcnode-id="6742" instrument_node="">To determine the type of place of attachment, two trained raters used a simple inductive coding approach (</span><a class="workspace-trigger" data-dcnode-id="6740" href="#bib125" name="bbib125"><span data-dcnode-id="6741" instrument_node="">Thomas, 2003</span></a><span data-dcnode-id="6739" instrument_node="">) to generate categories of places from participants' written descriptions. This yielded 14 categories of places, the frequencies of which are presented in </span><a class="workspace-trigger" data-dcnode-id="6737" href="#tbl6" name="btbl6"><span data-dcnode-id="6738" instrument_node="">Table&nbsp;6</span></a><span data-dcnode-id="6736" instrument_node="">. The diversity of the types of places that serve as place attachment figures is notable, including, for example, houses, cities, natural areas, countries, and commercial spaces.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="6588" id="tbl6"><span class="captions" data-dcnode-id="6727"><span data-dcnode-id="6728" id="cap0040"><p data-dcnode-id="6729" id="tspara0035"><span class="label" data-dcnode-id="6733"><span data-dcnode-id="6734" instrument_node="">Table&nbsp;6</span></span><span data-dcnode-id="6732" instrument_node="">. </span><span data-dcnode-id="6730" instrument_node="">Commonly-mentioned types of places of Attachment.</span></p></span></span><div class="groups" data-dcnode-id="6589"><table data-dcnode-id="6590"><thead data-dcnode-id="6717"><tr class="rowsep-1 valign-top" data-dcnode-id="6718"><th data-dcnode-id="6725" scope="col"><span data-dcnode-id="6726" instrument_node="">Type of place</span></th><th data-dcnode-id="6723" scope="col"><span data-dcnode-id="6724" instrument_node="">Examples</span></th><th data-dcnode-id="6721" scope="col"><span data-dcnode-id="6722" instrument_node="">Frequency</span></th><th data-dcnode-id="6719" scope="col"><span data-dcnode-id="6720" instrument_node="">Percent</span></th></tr></thead><tbody data-dcnode-id="6591"><tr class="valign-top" data-dcnode-id="6708"><td data-dcnode-id="6715"><span data-dcnode-id="6716" instrument_node="">House</span></td><td data-dcnode-id="6713"><span data-dcnode-id="6714" instrument_node="">Current home; childhood home; other's home</span></td><td data-dcnode-id="6711"><span data-dcnode-id="6712" instrument_node="">21</span></td><td data-dcnode-id="6709"><span data-dcnode-id="6710" instrument_node="">21.9</span></td></tr><tr class="valign-top" data-dcnode-id="6699"><td data-dcnode-id="6706"><span data-dcnode-id="6707" instrument_node="">Outdoor area</span></td><td data-dcnode-id="6704"><span data-dcnode-id="6705" instrument_node="">Park; beach</span></td><td data-dcnode-id="6702"><span data-dcnode-id="6703" instrument_node="">16</span></td><td data-dcnode-id="6700"><span data-dcnode-id="6701" instrument_node="">16.7</span></td></tr><tr class="valign-top" data-dcnode-id="6690"><td data-dcnode-id="6697"><span data-dcnode-id="6698" instrument_node="">City/town</span></td><td data-dcnode-id="6695"><span data-dcnode-id="6696" instrument_node="">London, England; seaside village in Japan</span></td><td data-dcnode-id="6693"><span data-dcnode-id="6694" instrument_node="">15</span></td><td data-dcnode-id="6691"><span data-dcnode-id="6692" instrument_node="">15.6</span></td></tr><tr class="valign-top" data-dcnode-id="6681"><td data-dcnode-id="6688"><span data-dcnode-id="6689" instrument_node="">Vacation place</span></td><td data-dcnode-id="6686"><span data-dcnode-id="6687" instrument_node="">Cottage; hotel; condo</span></td><td data-dcnode-id="6684"><span data-dcnode-id="6685" instrument_node="">12</span></td><td data-dcnode-id="6682"><span data-dcnode-id="6683" instrument_node="">12.5</span></td></tr><tr class="valign-top" data-dcnode-id="6672"><td data-dcnode-id="6679"><span data-dcnode-id="6680" instrument_node="">Community place</span></td><td data-dcnode-id="6677"><span data-dcnode-id="6678" instrument_node="">Train station; flea market</span></td><td data-dcnode-id="6675"><span data-dcnode-id="6676" instrument_node="">7</span></td><td data-dcnode-id="6673"><span data-dcnode-id="6674" instrument_node="">7.3</span></td></tr><tr class="valign-top" data-dcnode-id="6663"><td data-dcnode-id="6670"><span data-dcnode-id="6671" instrument_node="">Country</span></td><td data-dcnode-id="6668"><span data-dcnode-id="6669" instrument_node="">Canada; India</span></td><td data-dcnode-id="6666"><span data-dcnode-id="6667" instrument_node="">4</span></td><td data-dcnode-id="6664"><span data-dcnode-id="6665" instrument_node="">4.2</span></td></tr><tr class="valign-top" data-dcnode-id="6654"><td data-dcnode-id="6661"><span data-dcnode-id="6662" instrument_node="">Workplace</span></td><td data-dcnode-id="6659"><span data-dcnode-id="6660" instrument_node="">Office; business</span></td><td data-dcnode-id="6657"><span data-dcnode-id="6658" instrument_node="">4</span></td><td data-dcnode-id="6655"><span data-dcnode-id="6656" instrument_node="">4.2</span></td></tr><tr class="valign-top" data-dcnode-id="6646"><td data-dcnode-id="6652"><span data-dcnode-id="6653" instrument_node="">No place</span></td><td data-dcnode-id="6651"></td><td data-dcnode-id="6649"><span data-dcnode-id="6650" instrument_node="">4</span></td><td data-dcnode-id="6647"><span data-dcnode-id="6648" instrument_node="">4.2</span></td></tr><tr class="valign-top" data-dcnode-id="6637"><td data-dcnode-id="6644"><span data-dcnode-id="6645" instrument_node="">Neighborhood</span></td><td data-dcnode-id="6642"><span data-dcnode-id="6643" instrument_node="">Residential area; a distinct area in a town</span></td><td data-dcnode-id="6640"><span data-dcnode-id="6641" instrument_node="">3</span></td><td data-dcnode-id="6638"><span data-dcnode-id="6639" instrument_node="">3.1</span></td></tr><tr class="valign-top" data-dcnode-id="6628"><td data-dcnode-id="6635"><span data-dcnode-id="6636" instrument_node="">Commercial place</span></td><td data-dcnode-id="6633"><span data-dcnode-id="6634" instrument_node="">Bookstore; coffee shop</span></td><td data-dcnode-id="6631"><span data-dcnode-id="6632" instrument_node="">3</span></td><td data-dcnode-id="6629"><span data-dcnode-id="6630" instrument_node="">3.1</span></td></tr><tr class="valign-top" data-dcnode-id="6619"><td data-dcnode-id="6626"><span data-dcnode-id="6627" instrument_node="">Room in a house</span></td><td data-dcnode-id="6624"><span data-dcnode-id="6625" instrument_node="">Bedroom; home office</span></td><td data-dcnode-id="6622"><span data-dcnode-id="6623" instrument_node="">2</span></td><td data-dcnode-id="6620"><span data-dcnode-id="6621" instrument_node="">2.1</span></td></tr><tr class="valign-top" data-dcnode-id="6610"><td data-dcnode-id="6617"><span data-dcnode-id="6618" instrument_node="">Region</span></td><td data-dcnode-id="6615"><span data-dcnode-id="6616" instrument_node="">Northern Iraq; Pilbara Desert, Australia</span></td><td data-dcnode-id="6613"><span data-dcnode-id="6614" instrument_node="">2</span></td><td data-dcnode-id="6611"><span data-dcnode-id="6612" instrument_node="">2.1</span></td></tr><tr class="valign-top" data-dcnode-id="6601"><td data-dcnode-id="6608"><span data-dcnode-id="6609" instrument_node="">Object space</span></td><td data-dcnode-id="6606"><span data-dcnode-id="6607" instrument_node="">Tent; desk</span></td><td data-dcnode-id="6604"><span data-dcnode-id="6605" instrument_node="">2</span></td><td data-dcnode-id="6602"><span data-dcnode-id="6603" instrument_node="">2.1</span></td></tr><tr class="valign-top" data-dcnode-id="6592"><td data-dcnode-id="6599"><span data-dcnode-id="6600" instrument_node="">Place of worship</span></td><td data-dcnode-id="6597"><span data-dcnode-id="6598" instrument_node="">Church</span></td><td data-dcnode-id="6595"><span data-dcnode-id="6596" instrument_node="">1</span></td><td data-dcnode-id="6593"><span data-dcnode-id="6594" instrument_node="">1</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="6585" id="p0355"><span data-dcnode-id="6586" instrument_node="">Houses, including one's current home, childhood home, or the home of someone else, were the most common type of attachment, but were mentioned by less than a quarter of respondents (i.e., 21.9%). “Home” was explicitly mentioned by 33% of participants at least once, and of those, most (53%) referred to residences, but for some (34%) “home” referred to larger scale spaces such as neighborhoods, towns, cities, and regions and occasionally to outdoor areas (6%), vacation places (6%), and single rooms (3%).</span></p><p data-dcnode-id="6583" id="p0360"><span data-dcnode-id="6584" instrument_node="">Other types of places of attachment included outdoor areas such as parks (16.7%), cities or towns (15.6%), and vacation places, such as a family cottage (12.5%). Other interesting, but less-frequently mentioned places included recreation places, a cemetery, small spaces (e.g., bed, chair), vehicles, and workplaces. As noted earlier, three respondents indicated that they did not have a place of attachment, supporting the idea that place attachment is not salient to everyone.</span></p></section><section data-dcnode-id="6374" id="sec2.12"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6576" id="sectitle0200"><span data-dcnode-id="6581" instrument_node="">2.12</span><span data-dcnode-id="6579" instrument_node="">. </span><span data-dcnode-id="6577" instrument_node="">Differences in experienced benefits of place attachment by place type</span></h3><p data-dcnode-id="6574" id="p0365"><span data-dcnode-id="6575" instrument_node="">Of the people whose place of attachment was a house (their own or someone else's), memories (71%) and belonging (71%) were commonly mentioned benefits. Houses were more likely than the other place types to provide physical and psychological comfort (76%), as well as practical benefits (14%), but they were less likely than the other place types to support activities, entertainment, and freedom. Similarly, those who had selected cities and towns as their key place of attachment also experienced memory support (80%), and were even more likely to experience belonging (87%) than did those who selected the other place types. Cities and towns did not appear to provide privacy or aesthetics, and they were less likely than other types of places to support a connection to nature.</span></p><div data-dcnode-id="6375"><p data-dcnode-id="6569" id="p0370"><span data-dcnode-id="6573" instrument_node="">Those who were attached to outdoor areas were more likely to report relaxation (81%) and activities (56%) as benefits, but were less likely to report belonging, comfort-security, and practical benefits. Finally, participants attached to vacation spots were more likely to experience memory support (92%), connection to nature (33%), entertainment (33%) and privacy (8%) from their place of attachment. The percentages of benefits mentioned by the four most-common place types are listed in </span><a class="workspace-trigger" data-dcnode-id="6571" href="#tbl7" name="btbl7"><span data-dcnode-id="6572" instrument_node="">Table&nbsp;7</span></a><span data-dcnode-id="6570" instrument_node="">.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="6376" id="tbl7"><span class="captions" data-dcnode-id="6561"><span data-dcnode-id="6562" id="cap0045"><p data-dcnode-id="6563" id="tspara0040"><span class="label" data-dcnode-id="6567"><span data-dcnode-id="6568" instrument_node="">Table&nbsp;7</span></span><span data-dcnode-id="6566" instrument_node="">. </span><span data-dcnode-id="6564" instrument_node="">Percentages of Place Attachment Benefits within each Type of Place.</span></p></span></span><div class="groups" data-dcnode-id="6377"><table data-dcnode-id="6378"><thead data-dcnode-id="6549"><tr class="rowsep-1 valign-top" data-dcnode-id="6550"><th data-dcnode-id="6559" scope="col"><span data-dcnode-id="6560" instrument_node="">Function</span></th><th data-dcnode-id="6557" scope="col"><span data-dcnode-id="6558" instrument_node="">% Houses</span></th><th data-dcnode-id="6555" scope="col"><span data-dcnode-id="6556" instrument_node="">% Outdoor Areas</span></th><th data-dcnode-id="6553" scope="col"><span data-dcnode-id="6554" instrument_node="">% Towns and cities</span></th><th data-dcnode-id="6551" scope="col"><span data-dcnode-id="6552" instrument_node="">% Vacation places</span></th></tr></thead><tbody data-dcnode-id="6379"><tr class="valign-top" data-dcnode-id="6538"><td data-dcnode-id="6547"><span data-dcnode-id="6548" instrument_node="">Activities</span></td><td data-dcnode-id="6545"><span data-dcnode-id="6546" instrument_node="">4.8</span></td><td data-dcnode-id="6543"><span data-dcnode-id="6544" instrument_node="">56.3
