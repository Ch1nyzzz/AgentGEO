</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abssec0010&quot;><p id=&quot;abspara0010&quot;>Place attachment, the cognitive-emotional bond that forms between individuals and their important settings, is a common human experience with implications for their well-being. It has often been described and defined, but few studies have examined the range of psychological benefits it provides. This study investigated the experienced psychological benefits of place attachment by content analyzing community members&amp;#x27; descriptions of places to which they consider themselves attached. Using an inductive approach, their responses were coded for themes of reported psychological benefits. Thirteen categories of benefits were revealed: memories, belonging, relaxation, positive emotions, activity support, comfort-security, personal growth, freedom, entertainment, connection to nature, practical benefits, privacy, and aesthetics. Variations in the reported benefits were explored as a function of place type, geographical scale, and demographic characteristics. This study provides heuristic insights into the experienced psychological benefits of place attachment.</p></div></div></div>" data-dcnode-id="9005" lang="en" name="citation_abstract"><span data-dcnode-id="9004" instrument_node="">

2l-28.64 15.38c-4.02-4.34-9.76-7.1-16.14-7.1-12.14 0-22 9.86-22 22s9.86 22 22 22c6.38 0 12.12-2.76 16.14-7.12l28.64 15.38c-0.5 1.84-0.78 3.76-0.78 5.74 0 12.14 9.86 22 22 22s22-9.86 22-22-9.86-22-22-22z" data-dcnode-id="8447"></path></svg><span class="button-text" data-dcnode-id="8444"><span data-dcnode-id="8445" instrument_node="">Share</span></span></button></div></div></div><div class="ExportCitation u-display-inline-block" data-dcnode-id="8432" id="export-citation"><div class="popover export-citation-popover" data-dcnode-id="8433" id="export-citation-popover"><div data-dcnode-id="8434" id="popover-trigger-export-citation-popover"><button aria-expanded="false" aria-haspopup="true" class="button button-anchor" data-dcnode-id="8435" type="button"><svg class="icon icon-cited-by-66" data-dcnode-id="8438" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="8439" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="8436"><span data-dcnode-id="8437" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="8425" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="8428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.jenvp.2017.04.001" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="8429" instrument_node="">https://doi.org/10.1016/j.jenvp.2017.04.001</span></a><a class="rights-and-content" data-dcnode-id="8426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0272494417300518%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8427" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="8424"></section><section class="ReferencedArticles" data-dcnode-id="8423"></section><div class="PageDivider" data-dcnode-id="8422"></div><div class="Abstracts u-font-serif" data-dcnode-id="8384" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="8391" id="abs0015" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8420"><span data-dcnode-id="8421" instrument_node="">Highlights</span></h2><div data-dcnode-id="8392" id="abssec0015"><p data-dcnode-id="8393" id="abspara0015"></p><dl class="list" data-dcnode-id="8394"><dt class="list-label" data-dcnode-id="8418"><span data-dcnode-id="8419" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8415"><p data-dcnode-id="8416" id="p0010"><span data-dcnode-id="8417" instrument_node="">A content analysis explored experienced psychological benefits of place attachment.</span></p></dd><dt class="list-label" data-dcnode-id="8413"><span data-dcnode-id="8414" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8410"><p data-dcnode-id="8411" id="p0015"><span data-dcnode-id="8412" instrument_node="">Thirteen categories of experienced psychological benefits were revealed.</span></p></dd><dt class="list-label" data-dcnode-id="8408"><span data-dcnode-id="8409" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8405"><p data-dcnode-id="8406" id="p0020"><span data-dcnode-id="8407" instrument_node="">Memory-support was the most commonly mentioned benefit.</span></p></dd><dt class="list-label" data-dcnode-id="8403"><span data-dcnode-id="8404" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8400"><p data-dcnode-id="8401" id="p0025"><span data-dcnode-id="8402" instrument_node="">Some benefits were more common according to geographical scale and place type.</span></p></dd><dt class="list-label" data-dcnode-id="8398"><span data-dcnode-id="8399" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8395"><p data-dcnode-id="8396" id="p0030"><span data-dcnode-id="8397" instrument_node="">Several lesser known benefits of place attachment were also revealed.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="8385" id="abs0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8389"><span data-dcnode-id="8390" instrument_node="">Abstract</span></h2><div data-dcnode-id="8386" id="abssec0010"><p data-dcnode-id="8387" id="abspara0010"><span data-dcnode-id="8388" instrument_node="">Place attachment, the cognitive-emotional bond that forms between individuals and their important settings, is a common human experience with implications for their well-being. It has often been described and defined, but few studies have examined the range of psychological benefits it provides. This study investigated the experienced psychological benefits of place attachment by content analyzing community members' descriptions of places to which they consider themselves attached. Using an inductive approach, their responses were coded for themes of reported psychological benefits. Thirteen categories of benefits were revealed: memories, belonging, relaxation, positive emotions, activity support, comfort-security, personal growth, freedom, entertainment, connection to nature, practical benefits, privacy, and aesthetics. Variations in the reported benefits were explored as a function of place type, geographical scale, and demographic characteristics. This study provides heuristic insights into the experienced psychological benefits of place attachment.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="8361" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="8373"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="8374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0272494417300567"><svg class="icon icon-navigate-left" data-dcnode-id="8382" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="8383"></path></svg><span class="button-alternative-text" data-dcnode-id="8375"><strong data-dcnode-id="8380"><span data-dcnode-id="8381" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="8378"><span data-dcnode-id="8379" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="8376"><span data-dcnode-id="8377" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="8362"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="8363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0272494417300294"><span class="button-alternative-text" data-dcnode-id="8366"><strong data-dcnode-id="8371"><span data-dcnode-id="8372" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="8369"><span data-dcnode-id="8370" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="8367"><span data-dcnode-id="8368" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="8364" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="8365"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="8345"><div class="keywords-section" data-dcnode-id="8346" id="kwrds0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8359"><span data-dcnode-id="8360" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="8356" id="kwrd0010"><span data-dcnode-id="8357"><span data-dcnode-id="8358" instrument_node="">Place attachment</span></span></div><div class="keyword" data-dcnode-id="8353" id="kwrd0015"><span data-dcnode-id="8354"><span data-dcnode-id="8355" instrument_node="">Experienced psychological benefits</span></span></div><div class="keyword" data-dcnode-id="8350" id="kwrd0020"><span data-dcnode-id="8351"><span data-dcnode-id="8352" instrument_node="">Well-being</span></span></div><div class="keyword" data-dcnode-id="8347" id="kwrd0025"><span data-dcnode-id="8348"><span data-dcnode-id="8349" instrument_node="">Content analysis</span></span></div></div></div><span data-dcnode-id="8344" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="6042" id="body"><div data-dcnode-id="6051"><section data-dcnode-id="8065" id="sec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8338" id="sectitle0025"><span data-dcnode-id="8343" instrument_node="">1</span><span data-dcnode-id="8341" instrument_node="">. </span><span data-dcnode-id="8339" instrument_node="">The experienced psychological benefits of place attachment</span></h2><p data-dcnode-id="8294" id="p0035"><span data-dcnode-id="8337" instrument_node="">Place attachment, the cognitive-emotional bond to a meaningful setting (e.g., </span><a class="workspace-trigger" data-dcnode-id="8335" href="#bib77" name="bbib77"><span data-dcnode-id="8336" instrument_node="">Low &amp; Altman, 1992</span></a><span data-dcnode-id="8334" instrument_node="">), is a common phenomenon that has been observed across cultures, place types, and eras (</span><a class="workspace-trigger" data-dcnode-id="8332" href="#bib74" name="bbib74"><span data-dcnode-id="8333" instrument_node="">Lewicka, 2011</span></a><span data-dcnode-id="8331" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8329" href="#bib76" name="bbib76"><span data-dcnode-id="8330" instrument_node="">Low, 1992</span></a><span data-dcnode-id="8328" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8326" href="#bib78" name="bbib78"><span data-dcnode-id="8327" instrument_node="">Lutwack, 1984</span></a><span data-dcnode-id="8325" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8323" href="#bib81" name="bbib81"><span data-dcnode-id="8324" instrument_node="">Mazumdar and Mazumdar, 2004</span></a><span data-dcnode-id="8322" instrument_node="">). Although much of the research on it has focused on describing and defining the multidimensional nature of place attachment (e.g., </span><a class="workspace-trigger" data-dcnode-id="8320" href="#bib77" name="bbib77"><span data-dcnode-id="8321" instrument_node="">Low and Altman, 1992</span></a><span data-dcnode-id="8319" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8317" href="#bib96" name="bbib96"><span data-dcnode-id="8318" instrument_node="">Scannell and Gifford, 2010a</span></a><span data-dcnode-id="8316" instrument_node="">), and distinguishing it from related constructs such as place identity (e.g., </span><a class="workspace-trigger" data-dcnode-id="8314" href="#bib95" name="bbib95"><span data-dcnode-id="8315" instrument_node="">Rollero &amp; De Piccoli, 2010b</span></a><span data-dcnode-id="8313" instrument_node="">), a number of studies have begun to identify its antecedents (e.g., </span><a class="workspace-trigger" data-dcnode-id="8311" href="#bib9" name="bbib9"><span data-dcnode-id="8312" instrument_node="">Bonaiuto et&nbsp;al., 1999</span></a><span data-dcnode-id="8310" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8308" href="#bib15" name="bbib15"><span data-dcnode-id="8309" instrument_node="">Brown et&nbsp;al., 2003</span></a><span data-dcnode-id="8307" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8305" href="#bib55" name="bbib55"><span data-dcnode-id="8306" instrument_node="">Jorgensen and Stedman, 2001</span></a><span data-dcnode-id="8304" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8302" href="#bib57" name="bbib57"><span data-dcnode-id="8303" instrument_node="">Kamalipour et&nbsp;al., 2012</span></a><span data-dcnode-id="8301" instrument_node="">) and outcomes (e.g., </span><a class="workspace-trigger" data-dcnode-id="8299" href="#bib28" name="bbib28"><span data-dcnode-id="8300" instrument_node="">Devine-Wright, 2009</span></a><span data-dcnode-id="8298" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8296" href="#bib65" name="bbib65"><span data-dcnode-id="8297" instrument_node="">Kyle et&nbsp;al., 2004</span></a><span data-dcnode-id="8295" instrument_node="">).</span></p><p data-dcnode-id="8283" id="p0040"><span data-dcnode-id="8293" instrument_node="">An accumulating body of evidence demonstrates that one of these outcomes is well being (e.g., </span><a class="workspace-trigger" data-dcnode-id="8291" href="#bib32" name="bbib32"><span data-dcnode-id="8292" instrument_node="">Eyles and Williams, 2008</span></a><span data-dcnode-id="8290" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8288" href="#bib94" name="bbib94"><span data-dcnode-id="8289" instrument_node="">Rollero and De Piccoli, 2010a</span></a><span data-dcnode-id="8287" instrument_node="">). However, the question of the ways in which person-place bonds benefit individuals psychologically, remains underexplored. This is surprising because place attachment is central to many aspects of life; as </span><a class="workspace-trigger" data-dcnode-id="8285" href="#bib91" name="bbib91"><span data-dcnode-id="8286" instrument_node="">Relph (1976)</span></a><span data-dcnode-id="8284" instrument_node=""> contends, “to be human is to live in a world that is filled with significant places: to be human is to have and to know your place” (p. 1). If forming emotional connections to places is part of human nature, we must ask, for what purpose? Uncovering the psychological benefits afforded by person-place bonds can help to answer this question.</span></p><section data-dcnode-id="8236" id="sec1.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8277" id="sectitle0030"><span data-dcnode-id="8282" instrument_node="">1.1</span><span data-dcnode-id="8280" instrument_node="">. </span><span data-dcnode-id="8278" instrument_node="">Place attachment and well-being</span></h3><p data-dcnode-id="8251" id="p0045"><span data-dcnode-id="8276" instrument_node="">In general, place attachment bonds, while intact, are positively associated with quality of life (</span><a class="workspace-trigger" data-dcnode-id="8274" href="#bib46" name="bbib46"><span data-dcnode-id="8275" instrument_node="">Harris, Werner, Brown, &amp; Ingebritsen, 1995</span></a><span data-dcnode-id="8273" instrument_node="">), life satisfaction (</span><a class="workspace-trigger" data-dcnode-id="8271" href="#bib7" name="bbib7"><span data-dcnode-id="8272" instrument_node="">Billig, Kohn, &amp; Levav, 2006</span></a><span data-dcnode-id="8270" instrument_node="">), and various other dimensions of well-being (e.g., </span><a class="workspace-trigger" data-dcnode-id="8268" href="#bib94" name="bbib94"><span data-dcnode-id="8269" instrument_node="">Rollero &amp; De Piccoli, 2010a</span></a><span data-dcnode-id="8267" instrument_node="">). The connection between place attachment and well-being has been more commonly investigated at the neighborhood, community, and city scales (e.g., </span><a class="workspace-trigger" data-dcnode-id="8265" href="#bib13" name="bbib13"><span data-dcnode-id="8266" instrument_node="">Brehm et&nbsp;al., 2004</span></a><span data-dcnode-id="8264" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8262" href="#bib107" name="bbib107"><span data-dcnode-id="8263" instrument_node="">Theodori, 2001</span></a><span data-dcnode-id="8261" instrument_node="">) than at other scales, and a number of studies have focused on this relation among older adults in particular (</span><a class="workspace-trigger" data-dcnode-id="8259" href="#bib39" name="bbib39"><span data-dcnode-id="8260" instrument_node="">Gilleard et&nbsp;al., 2007</span></a><span data-dcnode-id="8258" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8256" href="#bib68" name="bbib68"><span data-dcnode-id="8257" instrument_node="">Lager et&nbsp;al., 2012</span></a><span data-dcnode-id="8255" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8253" href="#bib111" name="bbib111"><span data-dcnode-id="8254" instrument_node="">Wiles et&nbsp;al., 2009</span></a><span data-dcnode-id="8252" instrument_node="">).</span></p><p data-dcnode-id="8237" id="p0050"><span data-dcnode-id="8250" instrument_node="">When disrupted, place attachment can have negative implications for well-being; separation from one's significant place, such as through forced or voluntary relocation, can be devastating (e.g., </span><a class="workspace-trigger" data-dcnode-id="8248" href="#bib124" name="bbib124"><span data-dcnode-id="8249" instrument_node="">Scannell, Cox, Fletcher, &amp; Heykoop, 2016</span></a><span data-dcnode-id="8247" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="8245" href="#bib36" name="bbib36"><span data-dcnode-id="8246" instrument_node="">Fried’s (1963)</span></a><span data-dcnode-id="8244" instrument_node=""> classic study found that immigrants who were displaced from their West End Boston neighborhood mourned their lost homes. Others have similarly found that broken or “stretched” place bonds are associated with physical health problems, lower grades, sadness, longing, alienation, and disorientation (</span><a class="workspace-trigger" data-dcnode-id="8242" href="#bib37" name="bbib37"><span data-dcnode-id="8243" instrument_node="">Fullilove, 1996</span></a><span data-dcnode-id="8241" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8239" href="#bib52" name="bbib52"><span data-dcnode-id="8240" instrument_node="">Hornsey and Gallois, 1998</span></a><span data-dcnode-id="8238" instrument_node="">). These studies support the idea that proximity to one's place of attachment is important, but they say little to describe the ways in which the bond may benefit well-being.</span></p></section><section data-dcnode-id="8142" id="sec1.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8230" id="sectitle0035"><span data-dcnode-id="8235" instrument_node="">1.2</span><span data-dcnode-id="8233" instrument_node="">. </span><span data-dcnode-id="8231" instrument_node="">Benefits of place attachment</span></h3><p data-dcnode-id="8159" id="p0055"><span data-dcnode-id="8229" instrument_node="">Although the broader question about the suite of psychological benefits gained from place attachment has not yet (to our knowledge) been addressed, some focused explorations have begun to reveal some of its particular psychological benefits. For example, place attachment can create belongingness by symbolically connecting individuals to their ancestors or cultures (e.g., </span><a class="workspace-trigger" data-dcnode-id="8227" href="#bib5" name="bbib5"><span data-dcnode-id="8228" instrument_node="">Billig, 2006</span></a><span data-dcnode-id="8226" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8224" href="#bib49" name="bbib49"><span data-dcnode-id="8225" instrument_node="">Hay, 1998</span></a><span data-dcnode-id="8223" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8221" href="#bib76" name="bbib76"><span data-dcnode-id="8222" instrument_node="">Low, 1992</span></a><span data-dcnode-id="8220" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8218" href="#bib81" name="bbib81"><span data-dcnode-id="8219" instrument_node="">Mazumdar and Mazumdar, 2004</span></a><span data-dcnode-id="8217" instrument_node="">), or by reinforcing social ties and community membership (</span><a class="workspace-trigger" data-dcnode-id="8215" href="#bib36" name="bbib36"><span data-dcnode-id="8216" instrument_node="">Fried, 1963</span></a><span data-dcnode-id="8214" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8212" href="#bib50" name="bbib50"><span data-dcnode-id="8213" instrument_node="">Hidalgo and Hernández, 2001</span></a><span data-dcnode-id="8211" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8209" href="#bib66" name="bbib66"><span data-dcnode-id="8210" instrument_node="">Kyle et&nbsp;al., 2004</span></a><span data-dcnode-id="8208" instrument_node="">). In turn, belongingness to a place can strengthen social capital, resulting in group-wide benefits, such as more effective community action (e.g., </span><a class="workspace-trigger" data-dcnode-id="8206" href="#bib80" name="bbib80"><span data-dcnode-id="8207" instrument_node="">Manzo and Perkins, 2006</span></a><span data-dcnode-id="8205" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8203" href="#bib87" name="bbib87"><span data-dcnode-id="8204" instrument_node="">Perkins and Long, 2002</span></a><span data-dcnode-id="8202" instrument_node="">). A place of attachment can also provide the important benefit of memory support; it connects us to past events and people (e.g., </span><a class="workspace-trigger" data-dcnode-id="8200" href="#bib23" name="bbib23"><span data-dcnode-id="8201" instrument_node="">Cooper Marcus, 1992</span></a><span data-dcnode-id="8199" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8197" href="#bib108" name="bbib108"><span data-dcnode-id="8198" instrument_node="">Twigger-Ross and Uzzell, 1996</span></a><span data-dcnode-id="8196" instrument_node="">), and hosts recurring traditions (e.g., </span><a class="workspace-trigger" data-dcnode-id="8194" href="#bib77" name="bbib77"><span data-dcnode-id="8195" instrument_node="">Low &amp; Altman, 1992</span></a><span data-dcnode-id="8193" instrument_node="">). Another demonstrated benefit of place attachment is that it can provide emotional and cognitive restoration and escape from daily stressors (e.g., </span><a class="workspace-trigger" data-dcnode-id="8191" href="#bib47" name="bbib47"><span data-dcnode-id="8192" instrument_node="">Hartig et&nbsp;al., 2001</span></a><span data-dcnode-id="8190" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8188" href="#bib48" name="bbib48"><span data-dcnode-id="8189" instrument_node="">Hartig et&nbsp;al., 1991</span></a><span data-dcnode-id="8187" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8185" href="#bib58" name="bbib58"><span data-dcnode-id="8186" instrument_node="">Kaplan, 1995</span></a><span data-dcnode-id="8184" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8182" href="#bib62" name="bbib62"><span data-dcnode-id="8183" instrument_node="">Korpela and Hartig, 1996</span></a><span data-dcnode-id="8181" instrument_node="">). For example, children often use favorite places for stress reduction (</span><a class="workspace-trigger" data-dcnode-id="8179" href="#bib63" name="bbib63"><span data-dcnode-id="8180" instrument_node="">Korpela et&nbsp;al., 2001</span></a><span data-dcnode-id="8178" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8176" href="#bib64" name="bbib64"><span data-dcnode-id="8177" instrument_node="">Korpela et&nbsp;al., 2002</span></a><span data-dcnode-id="8175" instrument_node="">). Other studies suggest that attachment to recreation areas (</span><a class="workspace-trigger" data-dcnode-id="8173" href="#bib56" name="bbib56"><span data-dcnode-id="8174" instrument_node="">Kaltenborn, 1997</span></a><span data-dcnode-id="8172" instrument_node="">) and neighborhood places (e.g., </span><a class="workspace-trigger" data-dcnode-id="8170" href="#bib54" name="bbib54"><span data-dcnode-id="8171" instrument_node="">Jorgensen, Hitchmough, &amp; Dunnett, 2007</span></a><span data-dcnode-id="8169" instrument_node="">) serves to alleviate stress. Some authors have demonstrated that one's place of attachment can also facilitate goal attainment (e.g., </span><a class="workspace-trigger" data-dcnode-id="8167" href="#bib66" name="bbib66"><span data-dcnode-id="8168" instrument_node="">Kyle et&nbsp;al., 2004</span></a><span data-dcnode-id="8166" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8164" href="#bib101" name="bbib101"><span data-dcnode-id="8165" instrument_node="">Shumaker and Taylor, 1983</span></a><span data-dcnode-id="8163" instrument_node="">). When the sociophysical features of the place match the individual's needs and goals, place attachment is more likely; some have termed this congruent transaction “place dependence” (</span><a class="workspace-trigger" data-dcnode-id="8161" href="#bib83" name="bbib83"><span data-dcnode-id="8162" instrument_node="">Moore &amp; Graefe, 1994</span></a><span data-dcnode-id="8160" instrument_node="">).</span></p><p data-dcnode-id="8157" id="p0060"><span data-dcnode-id="8158" instrument_node="">Past research therefore supports the idea that place attachment can provide a number of psychological benefits. However, these investigations were narrow in scope, often focusing on one specific place type or benefit, and did not explicitly aim to uncover the full range of benefits associated with place attachment. This study broadens the frame of inquiry to include multiple benefits across place types, and explores participants' perspectives of benefits without a priori hypothesizing.</span></p><p data-dcnode-id="8143" id="p0065"><span data-dcnode-id="8156" instrument_node="">Furthermore, this work builds on previous attempts to delineate the multidimensionality of place attachment. </span><a class="workspace-trigger" data-dcnode-id="8154" href="#bib96" name="bbib96"><span data-dcnode-id="8155" instrument_node="">Scannell and Gifford's (2010a)</span></a><span data-dcnode-id="8153" instrument_node=""> framework of place attachment definitions structured these into three dimensions, describing the </span><em data-dcnode-id="8151"><span data-dcnode-id="8152" instrument_node="">person's</span></em><span data-dcnode-id="8150" instrument_node=""> use of individually or collectively derived place meanings, the </span><em data-dcnode-id="8148"><span data-dcnode-id="8149" instrument_node="">place's</span></em><span data-dcnode-id="8147" instrument_node=""> geographical scale and physical characteristics, and the </span><em data-dcnode-id="8145"><span data-dcnode-id="8146" instrument_node="">psychological processes</span></em><span data-dcnode-id="8144" instrument_node=""> that comprise the bond, such as affect, cognition, and behavior. Given the growing, but still limited body of work, we propose that this latter dimension needs expanding, by identifying the range of psychological benefits that person-place bonds may offer. We also recognize the importance of exploring how the benefits interact with the place dimension, to determine which benefits are most common for places of various types and scales.</span></p></section><section data-dcnode-id="8115" id="sec1.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8136" id="sectitle0040"><span data-dcnode-id="8141" instrument_node="">1.3</span><span data-dcnode-id="8139" instrument_node="">. </span><span data-dcnode-id="8137" instrument_node="">Demographic differences and place attachment</span></h3><p data-dcnode-id="8116" id="p0070"><span data-dcnode-id="8135" instrument_node="">Despite its near ubiquity, place attachment is thought to vary in strength and kind according to several demographic factors (e.g., see </span><a class="workspace-trigger" data-dcnode-id="8133" href="#bib74" name="bbib74"><span data-dcnode-id="8134" instrument_node="">Lewicka, 2011</span></a><span data-dcnode-id="8132" instrument_node="">). For example, stronger place attachment is reported among those who have spent more time in a place or who own it (e.g., </span><a class="workspace-trigger" data-dcnode-id="8130" href="#bib15" name="bbib15"><span data-dcnode-id="8131" instrument_node="">Brown et&nbsp;al., 2003</span></a><span data-dcnode-id="8129" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8127" href="#bib82" name="bbib82"><span data-dcnode-id="8128" instrument_node="">Mesch and Manor, 1998</span></a><span data-dcnode-id="8126" instrument_node="">). Gender and age have also been investigated, but they show complex or inconsistent relations with place attachment (</span><a class="workspace-trigger" data-dcnode-id="8124" href="#bib8" name="bbib8"><span data-dcnode-id="8125" instrument_node="">Bolan, 1997</span></a><span data-dcnode-id="8123" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8121" href="#bib72" name="bbib72"><span data-dcnode-id="8122" instrument_node="">Lewicka, 2005</span></a><span data-dcnode-id="8120" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8118" href="#bib106" name="bbib106"><span data-dcnode-id="8119" instrument_node="">Tartaglia, 2006</span></a><span data-dcnode-id="8117" instrument_node="">). Because of these interactions, the psychological benefits afforded by places of attachment are examined according to demographic factors.</span></p></section><section data-dcnode-id="8075" id="sec1.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8109" id="sectitle0045"><span data-dcnode-id="8114" instrument_node="">1.4</span><span data-dcnode-id="8112" instrument_node="">. </span><span data-dcnode-id="8110" instrument_node="">Type of place and geographical scale</span></h3><p data-dcnode-id="8098" id="p0075"><span data-dcnode-id="8108" instrument_node="">Place attachment has been observed in a wide variety of place types, such as homes, natural areas, sacred or culturally significant sites, cities, streets, islands, recreation spaces, second homes, and other places (e.g., </span><a class="workspace-trigger" data-dcnode-id="8106" href="#bib29" name="bbib29"><span data-dcnode-id="8107" instrument_node="">Droseltis and Vignoles, 2010</span></a><span data-dcnode-id="8105" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8103" href="#bib81" name="bbib81"><span data-dcnode-id="8104" instrument_node="">Mazumdar and Mazumdar, 2004</span></a><span data-dcnode-id="8102" instrument_node="">). However, as </span><a class="workspace-trigger" data-dcnode-id="8100" href="#bib74" name="bbib74"><span data-dcnode-id="8101" instrument_node="">Lewicka (2011)</span></a><span data-dcnode-id="8099" instrument_node=""> has noted, the majority of place attachment research has focused on neighbourhoods, and relatively few studies have compared it across place type. Therefore, the present study also explores how the benefits of place attachment vary by place type.</span></p><p data-dcnode-id="8081" id="p0080"><span data-dcnode-id="8097" instrument_node="">Scale plays a major role in influencing how one perceives, understands, and behaves in a space (</span><a class="workspace-trigger" data-dcnode-id="8095" href="#bib117" name="bbib117"><span data-dcnode-id="8096" instrument_node="">Freundschuh, 2000;</span></a><span data-dcnode-id="8094" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="8092" href="#bib119" name="bbib119"><span data-dcnode-id="8093" instrument_node="">Montello, 1993</span></a><span data-dcnode-id="8091" instrument_node="">), and thus determining the contents of mental representations of spaces and experience of a given space. Given this, it would be expected that the experience of place attachment might also vary according to scale. Some studies that have compared the effects of geographical scale on place attachment have revealed differences in the strength of place attachment at different scales; it generally appears stronger for homes and cities than for neighborhoods (e.g., </span><a class="workspace-trigger" data-dcnode-id="8089" href="#bib50" name="bbib50"><span data-dcnode-id="8090" instrument_node="">Hidalgo and Hernández, 2001</span></a><span data-dcnode-id="8088" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8086" href="#bib67" name="bbib67"><span data-dcnode-id="8087" instrument_node="">Laczko, 2005</span></a><span data-dcnode-id="8085" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8083" href="#bib73" name="bbib73"><span data-dcnode-id="8084" instrument_node="">Lewicka, 2008</span></a><span data-dcnode-id="8082" instrument_node="">). These variations may relate to differing psychological benefits associated with each scale. However, studies that do consider place attachments at varying scales often include arbitrary or crude categorizations of scale, such as “neighborhood.”</span></p><p data-dcnode-id="8076" id="p0085"><span data-dcnode-id="8080" instrument_node="">Finer categorizations proposed by geographers are informative. In particular, </span><a class="workspace-trigger" data-dcnode-id="8078" href="#bib35" name="bbib35"><span data-dcnode-id="8079" instrument_node="">Freundschuh and Egenhofer (1997)</span></a><span data-dcnode-id="8077" instrument_node=""> reviewed 15 prominent theoretical models of geographical space, and synthesized them into a typology of space that describes individuals' spatial experiences. Specifically, the typology categorizes a space according to its degree of manipulability (i.e., holding, turning, or moving objects), the level of locomotion required to experience the space, and the constraints of size upon the spatial experience. The resultant typology describes the six types of spaces expected to form the basis of spatial experience (further described in the method section). Given this, the present study examines whether the psychological benefits of place attachment vary with geographical scale.</span></p></section><section data-dcnode-id="8066" id="sec1.5"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8069" id="sectitle0050"><span data-dcnode-id="8074" instrument_node="">1.5</span><span data-dcnode-id="8072" instrument_node="">. </span><span data-dcnode-id="8070" instrument_node="">Research objectives</span></h3><p data-dcnode-id="8067" id="p0090"><span data-dcnode-id="8068" instrument_node="">The primary objective of the present study was to explore the self-reported psychological benefits of place attachment using a content analysis. A secondary objective was to examine the variations of these experienced psychological benefits according to demographic characteristics, the type of place of attachment and its geographical scale.</span></p></section></section><section data-dcnode-id="6373" id="sec2"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8059" id="sectitle0055"><span data-dcnode-id="8064" instrument_node="">2</span><span data-dcnode-id="8062" instrument_node="">. </span><span data-dcnode-id="8060" instrument_node="">Method</span></h2><section data-dcnode-id="8032" id="sec2.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8053" id="sectitle0060"><span data-dcnode-id="8058" instrument_node="">2.1</span><span data-dcnode-id="8056" instrument_node="">. </span><span data-dcnode-id="8054" instrument_node="">Recruitment</span></h3><p data-dcnode-id="8033" id="p0095"><span data-dcnode-id="8052" instrument_node="">A diverse sample of participants was recruited through Mechanical Turk (MTurk), a website hosted by </span><a data-dcnode-id="8050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//amazon.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8051" instrument_node="">Amazon.com</span></a><span data-dcnode-id="8049" instrument_node=""> that allows individuals from any country to either post or complete tasks online for small amounts of money. In general, investigations have concluded that MTurk is a promising method of recruiting participants for behavioral research (</span><a class="workspace-trigger" data-dcnode-id="8047" href="#bib17" name="bbib17"><span data-dcnode-id="8048" instrument_node="">Buhrmester et&nbsp;al., 2011</span></a><span data-dcnode-id="8046" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8044" href="#bib41" name="bbib41"><span data-dcnode-id="8045" instrument_node="">Goodman et&nbsp;al., 2013</span></a><span data-dcnode-id="8043" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8041" href="#bib86" name="bbib86"><span data-dcnode-id="8042" instrument_node="">Paolacci et&nbsp;al., 2010</span></a><span data-dcnode-id="8040" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8038" href="#bib90" name="bbib90"><span data-dcnode-id="8039" instrument_node="">Rand, 2011</span></a><span data-dcnode-id="8037" instrument_node="">). Participants received $1 for completing the 20–30-min survey, which is above-average compensation rate for psychology studies of this length posted on MTurk (</span><a class="workspace-trigger" data-dcnode-id="8035" href="#bib100" name="bbib100"><span data-dcnode-id="8036" instrument_node="">Shapiro, Chandler, &amp; Mueller, 2013</span></a><span data-dcnode-id="8034" instrument_node="">).</span></p></section><section data-dcnode-id="7850" id="sec2.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8026" id="sectitle0065"><span data-dcnode-id="8031" instrument_node="">2.2</span><span data-dcnode-id="8029" instrument_node="">. </span><span data-dcnode-id="8027" instrument_node="">Participants</span></h3><div data-dcnode-id="7851"><p data-dcnode-id="7994" id="p0100"><span data-dcnode-id="8025" instrument_node="">Participants were 97 Canadian residents (43 males, 49 females, 5 unspecified) whose ages ranged from 18 to 53 years, (</span><em data-dcnode-id="8023"><span data-dcnode-id="8024" instrument_node="">Mdn</span></em><span data-dcnode-id="8022" instrument_node="">&nbsp;=&nbsp;27, </span><em data-dcnode-id="8020"><span data-dcnode-id="8021" instrument_node="">SD</span></em><span data-dcnode-id="8019" instrument_node="">&nbsp;=&nbsp;8.47). This sample size is larger than many place attachment studies that have content-analysed participant-generated (i.e., as opposed to media or other archival) data (e.g., </span><a class="workspace-trigger" data-dcnode-id="8017" href="#bib31" name="bbib31"><span data-dcnode-id="8018" instrument_node="">Eacott and Sonn, 2006</span></a><span data-dcnode-id="8016" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8014" href="#bib88" name="bbib88"><span data-dcnode-id="8015" instrument_node="">Peters et&nbsp;al., 2010</span></a><span data-dcnode-id="8013" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8011" href="#bib93" name="bbib93"><span data-dcnode-id="8012" instrument_node="">Rogan et&nbsp;al., 2005</span></a><span data-dcnode-id="8010" instrument_node="">), and was considered appropriate given the exploratory nature of the research. Participants represented various ethnic backgrounds (e.g., Caucasian, Asian, Indo Canadian, Hispanic, First Nations, Mixed, Croatian, Assyrian), occupations (e.g., janitor, call centre worker, librarian, engineer, retail, government worker), and level of education, ranging from high school diploma (24.2%) to PhD (3.3%). Some participants were students (19%) or unemployed (11%). Participants reported that they had lived in their current area from 4 months to 59 years (</span><em data-dcnode-id="8008"><span data-dcnode-id="8009" instrument_node="">Mdn</span></em><span data-dcnode-id="8007" instrument_node="">&nbsp;=&nbsp;10.00, </span><em data-dcnode-id="8005"><span data-dcnode-id="8006" instrument_node="">SD</span></em><span data-dcnode-id="8004" instrument_node="">&nbsp;=&nbsp;11.27); 49.5% rented their current residence, 35.0% owned, and 15,5% had other arrangements (e.g., lived with family) or did not specify. The sample was younger, more sociodemograpically diverse, and more highly educated than the general population, which is similar to other MTurk-derived samples (e.g., </span><a class="workspace-trigger" data-dcnode-id="8002" href="#bib86" name="bbib86"><span data-dcnode-id="8003" instrument_node="">Paolacci et&nbsp;al., 2010</span></a><span data-dcnode-id="8001" instrument_node="">). Key demographic variables are presented in </span><a class="workspace-trigger" data-dcnode-id="7999" href="#tbl1" name="btbl1"><span data-dcnode-id="8000" instrument_node="">Table&nbsp;1</span></a><span data-dcnode-id="7998" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7996" href="#tbl2" name="btbl2"><span data-dcnode-id="7997" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="7995" instrument_node="">.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="7920" id="tbl1"><span class="captions" data-dcnode-id="7986"><span data-dcnode-id="7987" id="cap0015"><p data-dcnode-id="7988" id="tspara0010"><span class="label" data-dcnode-id="7992"><span data-dcnode-id="7993" instrument_node="">Table&nbsp;1</span></span><span data-dcnode-id="7991" instrument_node="">. </span><span data-dcnode-id="7989" instrument_node="">Demographic frequencies.</span></p></span></span><div class="groups" data-dcnode-id="7921"><table data-dcnode-id="7922"><thead data-dcnode-id="7977"><tr class="rowsep-1 valign-top" data-dcnode-id="7978"><th colspan="2" data-dcnode-id="7984" scope="col"><span data-dcnode-id="7985" instrument_node="">Variable</span></th><th data-dcnode-id="7981" scope="col"><em data-dcnode-id="7982"><span data-dcnode-id="7983" instrument_node="">n</span></em></th><th data-dcnode-id="7979" scope="col"><span data-dcnode-id="7980" instrument_node="">Percent</span></th></tr></thead><tbody data-dcnode-id="7923"><tr class="valign-top" data-dcnode-id="7968"><td data-dcnode-id="7975" rowspan="3"><span data-dcnode-id="7976" instrument_node="">Gender</span></td><td data-dcnode-id="7973"><span data-dcnode-id="7974" instrument_node="">Male</span></td><td data-dcnode-id="7971"><span data-dcnode-id="7972" instrument_node="">43</span></td><td data-dcnode-id="7969"><span data-dcnode-id="7970" instrument_node="">44.3</span></td></tr><tr class="valign-top" data-dcnode-id="7961"><td data-dcnode-id="7966"><span data-dcnode-id="7967" instrument_node="">Female</span></td><td data-dcnode-id="7964"><span data-dcnode-id="7965" instrument_node="">49</span></td><td data-dcnode-id="7962"><span data-dcnode-id="7963" instrument_node="">50.5</span></td></tr><tr class="valign-top" data-dcnode-id="7954"><td data-dcnode-id="7959"><span data-dcnode-id="7960" instrument_node="">Unspecified</span></td><td data-dcnode-id="7957"><span data-dcnode-id="7958" instrument_node="">5</span></td><td data-dcnode-id="7955"><span data-dcnode-id="7956" instrument_node="">5.2</span></td></tr><tr class="valign-top" data-dcnode-id="7945"><td data-dcnode-id="7952" rowspan="4"><span data-dcnode-id="7953" instrument_node="">Housing tenure</span></td><td data-dcnode-id="7950"><span data-dcnode-id="7951" instrument_node="">Rent</span></td><td data-dcnode-id="7948"><span data-dcnode-id="7949" instrument_node="">48</span></td><td data-dcnode-id="7946"><span data-dcnode-id="7947" instrument_node="">49.5</span></td></tr><tr class="valign-top" data-dcnode-id="7938"><td data-dcnode-id="7943"><span data-dcnode-id="7944" instrument_node="">Own</span></td><td data-dcnode-id="7941"><span data-dcnode-id="7942" instrument_node="">34</span></td><td data-dcnode-id="7939"><span data-dcnode-id="7940" instrument_node="">35.0</span></td></tr><tr class="valign-top" data-dcnode-id="7931"><td data-dcnode-id="7936"><span data-dcnode-id="7937" instrument_node="">Other</span></td><td data-dcnode-id="7934"><span data-dcnode-id="7935" instrument_node="">2</span></td><td data-dcnode-id="7932"><span data-dcnode-id="7933" instrument_node="">2.1</span></td></tr><tr class="valign-top" data-dcnode-id="7924"><td data-dcnode-id="7929"><span data-dcnode-id="7930" instrument_node="">Unspecified</span></td><td data-dcnode-id="7927"><span data-dcnode-id="7928" instrument_node="">13</span></td><td data-dcnode-id="7925"><span data-dcnode-id="7926" instrument_node="">13.4</span></td></tr></tbody></table></div></div><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="7852" id="tbl2"><span class="captions" data-dcnode-id="7912"><span data-dcnode-id="7913" id="cap0020"><p data-dcnode-id="7914" id="tspara0015"><span class="label" data-dcnode-id="7918"><span data-dcnode-id="7919" instrument_node="">Table&nbsp;2</span></span><span data-dcnode-id="7917" instrument_node="">. </span><span data-dcnode-id="7915" instrument_node="">Descriptive statistics for continuous demographic variables.</span></p></span></span><div class="groups" data-dcnode-id="7853"><table data-dcnode-id="7854"><thead data-dcnode-id="7895"><tr class="rowsep-1 valign-top" data-dcnode-id="7896"><th data-dcnode-id="7910" scope="col"><span data-dcnode-id="7911" instrument_node="">Variable</span></th><th data-dcnode-id="7907" scope="col"><em data-dcnode-id="7908"><span data-dcnode-id="7909" instrument_node="">n</span></em></th><th data-dcnode-id="7905" scope="col"><span data-dcnode-id="7906" instrument_node="">Min</span></th><th data-dcnode-id="7903" scope="col"><span data-dcnode-id="7904" instrument_node="">Max</span></th><th data-dcnode-id="7900" scope="col"><em data-dcnode-id="7901"><span data-dcnode-id="7902" instrument_node="">M</span></em></th><th data-dcnode-id="7897" scope="col"><em data-dcnode-id="7898"><span data-dcnode-id="7899" instrument_node="">SD</span></em></th></tr></thead><tbody data-dcnode-id="7855"><tr class="valign-top" data-dcnode-id="7882"><td data-dcnode-id="7893"><span data-dcnode-id="7894" instrument_node="">Age</span></td><td data-dcnode-id="7891"><span data-dcnode-id="7892" instrument_node="">89</span></td><td data-dcnode-id="7889"><span data-dcnode-id="7890" instrument_node="">18</span></td><td data-dcnode-id="7887"><span data-dcnode-id="7888" instrument_node="">53</span></td><td data-dcnode-id="7885"><span data-dcnode-id="7886" instrument_node="">28.83</span></td><td data-dcnode-id="7883"><span data-dcnode-id="7884" instrument_node="">8.47</span></td></tr><tr class="valign-top" data-dcnode-id="7869"><td data-dcnode-id="7880"><span data-dcnode-id="7881" instrument_node="">Length of Residence (years)</span></td><td data-dcnode-id="7878"><span data-dcnode-id="7879" instrument_node="">92</span></td><td data-dcnode-id="7876"><span data-dcnode-id="7877" instrument_node="">0.30</span></td><td data-dcnode-id="7874"><span data-dcnode-id="7875" instrument_node="">59</span></td><td data-dcnode-id="7872"><span data-dcnode-id="7873" instrument_node="">14.29</span></td><td data-dcnode-id="7870"><span data-dcnode-id="7871" instrument_node="">11.27</span></td></tr><tr class="valign-top" data-dcnode-id="7856"><td data-dcnode-id="7867"><span data-dcnode-id="7868" instrument_node="">Number of housemates</span></td><td data-dcnode-id="7865"><span data-dcnode-id="7866" instrument_node="">90</span></td><td data-dcnode-id="7863"><span data-dcnode-id="7864" instrument_node="">0</span></td><td data-dcnode-id="7861"><span data-dcnode-id="7862" instrument_node="">12</span></td><td data-dcnode-id="7859"><span data-dcnode-id="7860" instrument_node="">1.98</span></td><td data-dcnode-id="7857"><span data-dcnode-id="7858" instrument_node="">1.73</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="7776" id="sec2.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7844" id="sectitle0070"><span data-dcnode-id="7849" instrument_node="">2.3</span><span data-dcnode-id="7847" instrument_node="">. </span><span data-dcnode-id="7845" instrument_node="">Measures</span></h3><section data-dcnode-id="7816" id="sec2.3.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7838" id="sectitle0075"><span data-dcnode-id="7843" instrument_node="">2.3.1</span><span data-dcnode-id="7841" instrument_node="">. </span><span data-dcnode-id="7839" instrument_node="">Place attachment description</span></h4><p data-dcnode-id="7830" id="p0105"><span data-dcnode-id="7837" instrument_node="">Participants were provided with a brief definition of place attachment and then asked to list one place to which they consider themselves especially attached (if any). Place attachment was defined for participants as “feeling especially connected to a place that is meaningful to you.” However, the concept of “place” was not defined for participants, to avoid the problem inherent in some research in which the “home” or “neighborhood” is the assumed place of attachment (e.g., </span><a class="workspace-trigger" data-dcnode-id="7835" href="#bib24" name="bbib24"><span data-dcnode-id="7836" instrument_node="">Cresswell, 2009</span></a><span data-dcnode-id="7834" instrument_node="">), and therefore to allow for a broader selection of important places. Participants who did not have a place of attachment (</span><em data-dcnode-id="7832"><span data-dcnode-id="7833" instrument_node="">n</span></em><span data-dcnode-id="7831" instrument_node="">&nbsp;=&nbsp;3) were asked to state this, and explain why.</span></p><p data-dcnode-id="7817" id="p0110"><span data-dcnode-id="7829" instrument_node="">The participants then wrote their responses to four open-ended questions: (1) </span><em data-dcnode-id="7827"><span data-dcnode-id="7828" instrument_node="">Describe this place in detail. Where is it? What is it like?</span></em><span data-dcnode-id="7826" instrument_node=""> (2) </span><em data-dcnode-id="7824"><span data-dcnode-id="7825" instrument_node="">Why do you feel attached to this place? Please provide one or two reasons.</span></em><span data-dcnode-id="7823" instrument_node=""> (3) </span><em data-dcnode-id="7821"><span data-dcnode-id="7822" instrument_node="">When you are not at this place, what makes you want to go there? Please give one or two reasons. If you don't want to go there, please explain why.</span></em><span data-dcnode-id="7820" instrument_node=""> (4) </span><em data-dcnode-id="7818"><span data-dcnode-id="7819" instrument_node="">What psychological and other benefits do you experience from being connected to this place? Please provide two or three benefits.</span></em></p></section><section data-dcnode-id="7807" id="sec2.3.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7810" id="sectitle0080"><span data-dcnode-id="7815" instrument_node="">2.3.2</span><span data-dcnode-id="7813" instrument_node="">. </span><span data-dcnode-id="7811" instrument_node="">Demographic information</span></h4><p data-dcnode-id="7808" id="p0115"><span data-dcnode-id="7809" instrument_node="">Participants reported their age, gender, occupation, current city or region of residence, length of residence, housing tenure (i.e., rent or own), number of others in their residence, highest educational level attained, and ethnicity.</span></p></section><section data-dcnode-id="7777" id="sec2.3.3"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7801" id="sectitle0085"><span data-dcnode-id="7806" instrument_node="">2.3.3</span><span data-dcnode-id="7804" instrument_node="">. </span><span data-dcnode-id="7802" instrument_node="">Geographical scale</span></h4><p data-dcnode-id="7778" id="p0120"><span data-dcnode-id="7800" instrument_node="">The geographical scale of the place of attachment was determined using </span><a class="workspace-trigger" data-dcnode-id="7798" href="#bib35" name="bbib35"><span data-dcnode-id="7799" instrument_node="">Freundschuh and Egenhofer’s (1997)</span></a><span data-dcnode-id="7797" instrument_node=""> taxonomy of spaces, which categorizes a given space according to its degree of manipulability (i.e., can be held, turned, or moved), level of locomotion required to experience the space, and the constraints of size upon the spatial experience. The taxonomy includes six types of space. </span><em data-dcnode-id="7795"><span data-dcnode-id="7796" instrument_node="">Manipulable object space</span></em><span data-dcnode-id="7794" instrument_node=""> is small space or objects that can be manipulated, and therefore does not require locomotion to experience. This could include a chair or a desk. </span><em data-dcnode-id="7792"><span data-dcnode-id="7793" instrument_node="">Non-manipulable object space</span></em><span data-dcnode-id="7791" instrument_node=""> is larger space or objects that are not as easily manipulable, and that typically require some locomotion to fully experience. This type of space is larger than one's body but smaller than a house. For example, a room in a house, an office, or a coffee shop might be considered non-manipulable object space. </span><em data-dcnode-id="7789"><span data-dcnode-id="7790" instrument_node="">Environmental space</span></em><span data-dcnode-id="7788" instrument_node=""> is larger, requiring locomotion and involving route knowledge. This could include the inside of a building, a neighborhood, or a park. </span><em data-dcnode-id="7786"><span data-dcnode-id="7787" instrument_node="">Geographic spaces</span></em><span data-dcnode-id="7785" instrument_node=""> are very large spaces that often cannot be fully perceived through locomotion such as large cities, regions or countries. </span><em data-dcnode-id="7783"><span data-dcnode-id="7784" instrument_node="">Panoramic space</span></em><span data-dcnode-id="7782" instrument_node=""> is a space that can be viewed from a single vantage point. It can vary in size, but does not require locomotion. Finally, </span><em data-dcnode-id="7780"><span data-dcnode-id="7781" instrument_node="">map space</span></em><span data-dcnode-id="7779" instrument_node=""> is a large space that has been downscaled and represented through symbols.</span></p></section></section><section data-dcnode-id="7761" id="sec2.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7770" id="sectitle0090"><span data-dcnode-id="7775" instrument_node="">2.4</span><span data-dcnode-id="7773" instrument_node="">. </span><span data-dcnode-id="7771" instrument_node="">Pretest</span></h3><p data-dcnode-id="7762" id="p0125"><span data-dcnode-id="7769" instrument_node="">The questions were pretested for clarity using the cognitive interviewing method (</span><a class="workspace-trigger" data-dcnode-id="7767" href="#bib3" name="bbib3"><span data-dcnode-id="7768" instrument_node="">Beatty and Willis, 2007</span></a><span data-dcnode-id="7766" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7764" href="#bib34" name="bbib34"><span data-dcnode-id="7765" instrument_node="">Forsyth and Lessler, 1991</span></a><span data-dcnode-id="7763" instrument_node="">), which aims to identify how each item is comprehended, and whether terms or wording cause any confusion among participants. A small sample of five people participated in the pretest interviews. They were varied in their demographic characteristics (i.e., gender, age, occupation, and ethnic background), and described different types of places of attachment (i.e., a city, a farm house, a cabin on a lake, an apartment, and a house). These pre-test participants were asked to freely describe what they were thinking about as they were answering questions, including what they interpreted the question to mean, whether they perceived any problems with it, and how they generated their responses. An iterative approach was used, in which the study instructions, definition of place attachment, demographic information, several unrelated questionnaires, and the four key questions were revised following each interview. Following the five interviews, the questionnaire was finalized and made available online.</span></p></section><section data-dcnode-id="7749" id="sec2.5"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7755" id="sectitle0095"><span data-dcnode-id="7760" instrument_node="">2.5</span><span data-dcnode-id="7758" instrument_node="">. </span><span data-dcnode-id="7756" instrument_node="">Procedure</span></h3><p data-dcnode-id="7750" id="p0130"><span data-dcnode-id="7754" instrument_node="">After signing up for the study via MTurk, the main study participants read the Letter of Information for implied consent that outlined details of participation based on the </span><em data-dcnode-id="7752"><span data-dcnode-id="7753" instrument_node="">Tri-Council Policy Statement on the Ethical Conduct for Research Involving Humans</span></em><span data-dcnode-id="7751" instrument_node="">. They were then directed to the survey website, where they wrote about their place of attachment. They also completed several closed-ended questionnaires which were included to investigate a separate research question, and thus were not further analysed for the present study. Finally, participants were thanked for their participation and were compensated via the MTurk system. The survey was open on the internet for approximately 30 days, but 95% of the data was received within the first two weeks of data collection; the rest of the data was received in the final two weeks.</span></p></section><section data-dcnode-id="7714" id="sec2.6"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7743" id="sectitle0100"><span data-dcnode-id="7748" instrument_node="">2.6</span><span data-dcnode-id="7746" instrument_node="">. </span><span data-dcnode-id="7744" instrument_node="">Content analysis</span></h3><p data-dcnode-id="7732" id="p0135"><span data-dcnode-id="7742" instrument_node="">In content analysis, quantitative coding schemes are applied to subjective material, such as personal accounts, media, or responses to interview questions; third-party coders analyze these documents for particular codes and themes (</span><a class="workspace-trigger" data-dcnode-id="7740" href="#bib102" name="bbib102"><span data-dcnode-id="7741" instrument_node="">Smith, 2007</span></a><span data-dcnode-id="7739" instrument_node="">). This approach was taken because it provides detailed information useful for exploratory research and theory development. Content analysis is also considered more reliable than other types of qualitative analyses, given its use of a detailed coding scheme, and the opportunity for data to be coded by multiple raters (</span><a class="workspace-trigger" data-dcnode-id="7737" href="#bib102" name="bbib102"><span data-dcnode-id="7738" instrument_node="">Smith, 2007</span></a><span data-dcnode-id="7736" instrument_node="">). Furthermore, this qualitative descriptive approach is intentionally categorical, less interpretive than some other methods, and produces “a complete and valued end-product in itself” (</span><a class="workspace-trigger" data-dcnode-id="7734" href="#bib123" name="bbib123"><span data-dcnode-id="7735" instrument_node="">Sandelowski, 2000</span></a><span data-dcnode-id="7733" instrument_node="">, p. 335).</span></p><p data-dcnode-id="7724" id="p0140"><span data-dcnode-id="7731" instrument_node="">Coding occurred in two rounds. The first involved an inductive approach (e.g., </span><a class="workspace-trigger" data-dcnode-id="7729" href="#bib125" name="bbib125"><span data-dcnode-id="7730" instrument_node="">Thomas, 2003</span></a><span data-dcnode-id="7728" instrument_node="">), in which two research assistants coded the written responses for evident benefits of place attachment using the QSR NVivo9</span><sup data-dcnode-id="7726"><span data-dcnode-id="7727" instrument_node="">©</span></sup><span data-dcnode-id="7725" instrument_node=""> software. These coders were PhD students in psychology who were unfamiliar with attachment theories, which helped to ensure that the emergent benefits were guided by the data rather than by pre-existing expectations. They were trained and provided with a manual with instructions and examples of coding from three questionnaires obtained from the pretest.</span></p><p data-dcnode-id="7722" id="p0145"><span data-dcnode-id="7723" instrument_node="">Responses could be coded into more than one category if the coder viewed it as fulfilling more than one benefit. For example, a response such as “this place evokes memories of time spent together with my family” could be coded into the categories of “place memories” and “connection to family.” After familiarizing themselves with the manual, the coders then independently coded three new responses, after which their codes were discussed and disagreements were explored. They then coded another round of three responses, which were again discussed.</span></p><p data-dcnode-id="7720" id="p0150"><span data-dcnode-id="7721" instrument_node="">Following this training session, the data were then independently coded by each coder, who identified apparent psychological benefits afforded to the participant by their place attachment bond. The coders reviewed the themes after the first 10 and 20 participants to discuss disagreements, and to refine the emerging structure of categories. Themes were merged into larger categories where appropriate. Once complete, the lists from each coder were compared and commonly listed benefits were retained; the coders agreed on a new label for each retained category.</span></p><p data-dcnode-id="7715" id="p0155"><span data-dcnode-id="7719" instrument_node="">A second round of coding was performed by two undergraduate psychology research assistants, who were also unfamiliar with attachment theories. After a training session to learn the coding scheme that had been previously created, they independently coded the data, determining whether each benefit was present or absent for each participant. They used open coding to determine the type of each place of attachment. They also coded each response to identify the geographical scale of each place of attachment, using </span><a class="workspace-trigger" data-dcnode-id="7717" href="#bib35" name="bbib35"><span data-dcnode-id="7718" instrument_node="">Freundschuh and Egenhofer’s (1997)</span></a><span data-dcnode-id="7716" instrument_node=""> classification system.</span></p></section><section data-dcnode-id="7064" id="sec2.7"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7708" id="sectitle0105"><span data-dcnode-id="7713" instrument_node="">2.7</span><span data-dcnode-id="7711" instrument_node="">. </span><span data-dcnode-id="7709" instrument_node="">Experienced benefits of place attachment</span></h3><p data-dcnode-id="7706" id="p0160"><span data-dcnode-id="7707" instrument_node="">As mentioned, the participants' responses to five questions about their places of attachment were coded into themes, in two phases of coding. The initial coding was done independently by each coder, whose lists were merged into one. Because of training and discussions, the lists were highly convergent. Specifically, 11 categories overlapped between coders and four were unique, resulting in a total of 15 categories of experienced benefits: activities, aesthetics, belonging, comfort (psychological and physical), connection to nature, freedom, entertainment, memories, positive emotions, practical needs, privacy, relaxation, personal growth, stability, and value-expressive. A coding scheme was then prepared for the second phase of the coding; the 15 categories were described in detail and supplemented with examples. Only themes that were thought to represent distinct categories were retained; specifically, coders deemed that the “value-expressive” and “stability” were coded infrequently and in all cases they could adequately be captured by other categories (i.e., “belonging” and “memories”, respectively), reducing the total to 13 categories.</span></p><div data-dcnode-id="7296"><p data-dcnode-id="7692" id="p0165"><span data-dcnode-id="7705" instrument_node="">In the second phase of the coding, two new coders judged whether each of the categories were present or absent in each participant's description of their place of attachment. </span><a class="workspace-trigger" data-dcnode-id="7703" href="#bib21" name="bbib21"><span data-dcnode-id="7704" instrument_node="">Cohen’s (1960)</span></a><span data-dcnode-id="7702" instrument_node=""> kappa was calculated to assess interrater reliability for codings of each category, and it revealed substantial agreement (ranging from κ&nbsp;=&nbsp;0.71-0.96; </span><a class="workspace-trigger" data-dcnode-id="7700" href="#tbl3" name="btbl3"><span data-dcnode-id="7701" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="7699" instrument_node="">) for all categories except “physical comfort,” which showed lower, but still adequate, agreement, κ&nbsp;=&nbsp;0.49 (</span><a class="workspace-trigger" data-dcnode-id="7697" href="#bib70" name="bbib70"><span data-dcnode-id="7698" instrument_node="">Landis &amp; Koch, 1977</span></a><span data-dcnode-id="7696" instrument_node="">). Following this, the coders added additional notes to the coding scheme. Then, considering these revisions, they individually re-coded all variables that had been inconsistently coded. Remaining disagreements were resolved through discussion, except for a few (</span><em data-dcnode-id="7694"><span data-dcnode-id="7695" instrument_node="">n</span></em><span data-dcnode-id="7693" instrument_node="">&nbsp;=&nbsp;8) which were left as missing data.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="7297" id="tbl3"><span class="captions" data-dcnode-id="7684"><span data-dcnode-id="7685" id="cap0025"><p data-dcnode-id="7686" id="tspara0020"><span class="label" data-dcnode-id="7690"><span data-dcnode-id="7691" instrument_node="">Table&nbsp;3</span></span><span data-dcnode-id="7689" instrument_node="">. </span><span data-dcnode-id="7687" instrument_node="">Place Attachment benefits by gender, age and tenure of residence.</span></p></span></span><div class="groups" data-dcnode-id="7298"><table data-dcnode-id="7299"><thead data-dcnode-id="7662"><tr class="rowsep-1 valign-top" data-dcnode-id="7663"><th data-dcnode-id="7682" scope="col"><span data-dcnode-id="7683" instrument_node="">Benefit</span></th><th data-dcnode-id="7680" scope="col"><span data-dcnode-id="7681" instrument_node="">κ</span></th><th data-dcnode-id="7678" scope="col"><span data-dcnode-id="7679" instrument_node="">n</span></th><th data-dcnode-id="7676" scope="col"><span data-dcnode-id="7677" instrument_node="">%</span></th><th data-dcnode-id="7674" scope="col"><span data-dcnode-id="7675" instrument_node="">% females</span></th><th data-dcnode-id="7672" scope="col"><span data-dcnode-id="7673" instrument_node="">% males</span></th><th data-dcnode-id="7670" scope="col"><span data-dcnode-id="7671" instrument_node="">% young adults</span></th><th data-dcnode-id="7668" scope="col"><span data-dcnode-id="7669" instrument_node="">% adults</span></th><th data-dcnode-id="7666" scope="col"><span data-dcnode-id="7667" instrument_node="">% renters</span></th><th data-dcnode-id="7664" scope="col"><span data-dcnode-id="7665" instrument_node="">% owners</span></th></tr></thead><tbody data-dcnode-id="7300"><tr class="valign-top" data-dcnode-id="7641"><td data-dcnode-id="7660"><span data-dcnode-id="7661" instrument_node="">Activities</span></td><td data-dcnode-id="7658"><span data-dcnode-id="7659" instrument_node="">0.71</span></td><td data-dcnode-id="7656"><span data-dcnode-id="7657" instrument_node="">32</span></td><td data-dcnode-id="7654"><span data-dcnode-id="7655" instrument_node="">33.33</span></td><td data-dcnode-id="7652"><span data-dcnode-id="7653" instrument_node="">36.4</span></td
