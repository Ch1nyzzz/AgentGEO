</span><article class="post-2104 post type-post status-publish format-standard hentry category-attitude" data-dcnode-id="1337" id="post-2104"><span data-dcnode-id="1724" instrument_node="">
</span><div class="hero-section" data-dcnode-id="1703" data-type="type-1"><span data-dcnode-id="1723" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1705"><span data-dcnode-id="1722" instrument_node="">
</span><h1 class="page-title" data-dcnode-id="1720" itemprop="headline"><span data-dcnode-id="1721" instrument_node="">45 Benefits of Optimism</span></h1><ul class="entry-meta" data-dcnode-id="1707" data-type="simple:slash"><li class="meta-author" data-dcnode-id="1717" itemprop="name"><a class="ct-meta-element-author" data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifeoptimizer.org/author/optixl/" itemprop="author" rel="author" title="Posts by Donald Latumahina"><span data-dcnode-id="1719" instrument_node="">Donald Latumahina</span></a></li><li class="meta-date" data-dcnode-id="1714" itemprop="datePublished"><time class="ct-meta-element-date" data-dcnode-id="1715" datetime="2010-03-24T08:02:21+00:00"><span data-dcnode-id="1716" instrument_node="">March 24, 2010</span></time></li><li class="meta-categories" data-dcnode-id="1711" data-type="simple"><a data-dcnode-id="1712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifeoptimizer.org/category/attitude/" rel="tag"><span data-dcnode-id="1713" instrument_node="">Attitude</span></a></li><li class="meta-comments" data-dcnode-id="1708"><a data-dcnode-id="1709" href="#comments"><span data-dcnode-id="1710" instrument_node="">23 Comments</span></a></li></ul><span data-dcnode-id="1706" instrument_node=""> </span></header><span data-dcnode-id="1704" instrument_node="">
</span></div><span data-dcnode-id="1702" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1479"><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1665"><em data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Note: This is a guest post from Ayo Olaniyan of </span></em><a data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//discoveringpurpose.co.uk/"><em data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Discovering Purpose</span></em></a><br data-dcnode-id="1695"><span data-dcnode-id="1694" instrument_node="">
Look at the picture closely: Is the glass half full or half empty?</span><br data-dcnode-id="1693"><span data-dcnode-id="1692" instrument_node="">
The BBC website published a report </span><a data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//news.bbc.co.uk/2/hi/8193180.stm"><span data-dcnode-id="1691" instrument_node="">Optimistic women ‘live longer’</span></a><span data-dcnode-id="1689" instrument_node="">. This was based on a research carried out by a group of US scientists who studied 100,000 women to deduce pessimists had higher blood pressure and cholesterol; optimistic women had a 9% lower risk of developing heart disease and a 14% lower risk of dying from any cause after more than eight years of follow-up.</span><br data-dcnode-id="1688"><span data-dcnode-id="1687" instrument_node="">
The concept of this post isn’t targeted at women only; I believe the subject of optimism affects every individual going/living through life’s struggles each day. There have been various studies carried out on optimism and while I have a few reservations on extreme optimism, one can’t deny the role optimism plays in enhancing your personal growth.</span><br data-dcnode-id="1686"><span data-dcnode-id="1685" instrument_node="">
</span><em data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">What is optimism?</span></em><br data-dcnode-id="1682"><span data-dcnode-id="1681" instrument_node="">
</span><span data-dcnode-id="1680" id="more-2104"></span><span data-dcnode-id="1679" instrument_node="">Optimism is looking at a more favorable side of events and simply anticipating the best possible outcome in any situation.</span><br data-dcnode-id="1678"><span data-dcnode-id="1677" instrument_node="">
Sir Winston Churchill states ‘A pessimist sees the difficulty in every opportunity; an optimist sees the opportunity in every difficulty.’ What do you see?</span><br data-dcnode-id="1676"><span data-dcnode-id="1675" instrument_node="">
A few months ago, I filled out the VIA Survey of Character Strengths by Martin Seligman (founder of Positive Psychology) and the results showed I was moderately optimistic.</span><br data-dcnode-id="1674"><span data-dcnode-id="1673" instrument_node="">
It’s also important to note that there are elements of hope expressed in optimism.</span><br data-dcnode-id="1672"><span data-dcnode-id="1671" instrument_node="">
Rick Snyder states ‘hope is a process of goal-directed thoughts that reflects both the belief that one can find </span><em data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">pathways</span></em><span data-dcnode-id="1668" instrument_node=""> to the goal and has motivation based on one’s perceived capabilities or thinking.’</span><br data-dcnode-id="1667"><span data-dcnode-id="1666" instrument_node="">
In no particular order, here are 45 benefits of optimism:</span></p><span data-dcnode-id="1664" instrument_node="">
</span><ol data-dcnode-id="1527"><span data-dcnode-id="1663" instrument_node="">
</span><li data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">It gives you a reason for living.</span></li><span data-dcnode-id="1660" instrument_node="">
</span><li data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">It reduces the level of stress experienced.</span></li><span data-dcnode-id="1657" instrument_node="">
</span><li data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Research shows that it increases longevity.</span></li><span data-dcnode-id="1654" instrument_node="">
</span><li data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">It enables you to handle and put your emotions in check.</span></li><span data-dcnode-id="1651" instrument_node="">
</span><li data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">It promotes happiness.</span></li><span data-dcnode-id="1648" instrument_node="">
</span><li data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">It promotes self respect and integrity</span></li><span data-dcnode-id="1645" instrument_node="">
</span><li data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">It enhances various coping skills developed in order to combat life’s struggles.</span></li><span data-dcnode-id="1642" instrument_node="">
</span><li data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">It forges persistence which is an essential trait required for achieving success.</span></li><span data-dcnode-id="1639" instrument_node="">
</span><li data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">It creates a sense of fulfillment and satisfaction.</span></li><span data-dcnode-id="1636" instrument_node="">
</span><li data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">It promotes healthy living.</span></li><span data-dcnode-id="1633" instrument_node="">
</span><li data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">It creates a positive anticipation of the future.</span></li><span data-dcnode-id="1630" instrument_node="">
</span><li data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">It increases your level of productivity.</span></li><span data-dcnode-id="1627" instrument_node="">
</span><li data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">It allows you to deal with failure constructively.</span></li><span data-dcnode-id="1624" instrument_node="">
</span><li data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">It allows you to develop the attribute of patience.</span></li><span data-dcnode-id="1621" instrument_node="">
</span><li data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">It makes you proactive.</span></li><span data-dcnode-id="1618" instrument_node="">
</span><li data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">It improves your physiological and psychological well being.</span></li><span data-dcnode-id="1615" instrument_node="">
</span><li data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">It enables you to take a balanced approach to life by dealing with the constant negative thoughts which spring up.</span></li><span data-dcnode-id="1612" instrument_node="">
</span><li data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">It increases the likelihood of effective problem solving.</span></li><span data-dcnode-id="1609" instrument_node="">
</span><li data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">It gives you peace of mind.</span></li><span data-dcnode-id="1606" instrument_node="">
</span><li data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">It enables you to generate an alternative, more hopeful explanation for various difficulties experienced.</span></li><span data-dcnode-id="1603" instrument_node="">
</span><li data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">It ensures you believe in your dream.</span></li><span data-dcnode-id="1600" instrument_node="">
</span><li data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">It creates a positive attitude.</span></li><span data-dcnode-id="1597" instrument_node="">
</span><li data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">It increases your tolerance levels because it lowers the risk of you being irritated by little things.</span></li><span data-dcnode-id="1594" instrument_node="">
</span><li data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">It allows you to develop the habit of being thankful.</span></li><span data-dcnode-id="1591" instrument_node="">
</span><li data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">It increases your level of motivation.</span></li><span data-dcnode-id="1588" instrument_node="">
</span><li data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">It builds successful careers by promoting productivity.</span></li><span data-dcnode-id="1585" instrument_node="">
</span><li data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">It promotes laughter.</span></li><span data-dcnode-id="1582" instrument_node="">
</span><li data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">It doesn’t give any room for self denial.</span></li><span data-dcnode-id="1579" instrument_node="">
</span><li data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">It welcomes any form of constructive change.</span></li><span data-dcnode-id="1576" instrument_node="">
</span><li data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">It creates positive expectations.</span></li><span data-dcnode-id="1573" instrument_node="">
</span><li data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">It sets your mood for the day.</span></li><span data-dcnode-id="1570" instrument_node="">
</span><li data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">It promotes positive relationships.</span></li><span data-dcnode-id="1567" instrument_node="">
</span><li data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">It builds resilience in the face of adversity.</span></li><span data-dcnode-id="1564" instrument_node="">
</span><li data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">It promotes self confidence and boosts self esteem.</span></li><span data-dcnode-id="1561" instrument_node="">
</span><li data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">It ensures you are focused.</span></li><span data-dcnode-id="1558" instrument_node="">
</span><li data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">It promotes bonding between individuals.</span></li><span data-dcnode-id="1555" instrument_node="">
</span><li data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">It reduces the level of your frustrations and worries.</span></li><span data-dcnode-id="1552" instrument_node="">
</span><li data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">It promotes forgiveness.</span></li><span data-dcnode-id="1549" instrument_node="">
</span><li data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">It enhances effective communication.</span></li><span data-dcnode-id="1546" instrument_node="">
</span><li data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">It increases your spiritual development and awakening.</span></li><span data-dcnode-id="1543" instrument_node="">
</span><li data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">It deals with your limiting beliefs which try to keep you from using your abilities.</span></li><span data-dcnode-id="1540" instrument_node="">
</span><li data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">It gives room for self expression.</span></li><span data-dcnode-id="1537" instrument_node="">
</span><li data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">It increases your mental flexibility.</span></li><span data-dcnode-id="1534" instrument_node="">
</span><li data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">It is therapeutic.</span></li><span data-dcnode-id="1531" instrument_node="">
</span><li data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">It improves your social life.</span></li><span data-dcnode-id="1528" instrument_node="">
</span></ol><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">There are several ways optimism can be developed. They are as follows:</span></p><span data-dcnode-id="1523" instrument_node="">
</span><ul data-dcnode-id="1500"><span data-dcnode-id="1522" instrument_node="">
</span><li data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Have realistic goals and expectations.</span></li><span data-dcnode-id="1519" instrument_node="">
</span><li data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Always remember you are human with a lot of imperfections.</span></li><span data-dcnode-id="1516" instrument_node="">
</span><li data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Acknowledge past events, but endeavor to manage the present with a view to creating a brighter future.</span></li><span data-dcnode-id="1513" instrument_node="">
</span><li data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Don’t fall into the trap of feeling hopeless.</span></li><span data-dcnode-id="1510" instrument_node="">
</span><li data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Be true to yourself.</span></li><span data-dcnode-id="1507" instrument_node="">
</span><li data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Network with people who show optimism in their daily lives.</span></li><span data-dcnode-id="1504" instrument_node="">
</span><li data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Believe in your dreams.</span></li><span data-dcnode-id="1501" instrument_node="">
</span></ul><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1498" instrument_node="">Once again, the aim of this post is to remind you of the benefits of optimism.</span><br data-dcnode-id="1497"><span data-dcnode-id="1496" instrument_node="">
I look forward to your comments and suggestions.</span><br data-dcnode-id="1495"><span data-dcnode-id="1494" instrument_node="">
</span><em data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Ayo Olaniyan is a certified Unitive Life Coach. He is also an Accredited Professional Counsellor with the Counselling Society United Kingdom. He writes on how you can discover your purpose through personal development and self-awareness on the blog </span></em><a data-dcnode-id="1489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//discoveringpurpose.co.uk/"><em data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Discovering Purpose</span></em></a><em data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">. He is also the publisher of </span></em><a data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//discoveringpurpose.co.uk/the-life-skills-magazine/"><em data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">The Life Skills Magazine</span></em></a><em data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">.</span></em></p><span data-dcnode-id="1480" instrument_node="">
