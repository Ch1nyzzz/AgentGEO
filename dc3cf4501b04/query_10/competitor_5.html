</span><div class="entry-content" data-dcnode-id="1015"><span data-dcnode-id="1910" instrument_node="">
</span><figure aria-describedby="caption-attachment-26056" class="wp-caption alignright" data-dcnode-id="1904" id="attachment_26056" style="width: 300px"><img alt="Music therapy benefits" class="size-medium wp-image-26056 lazyloaded" data-dcnode-id="1909" data-src="https://positivepsychology.com/wp-content/uploads/1_Music-therapy-benefits-300x150.jpg" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/wp-content/uploads/1_Music-therapy-benefits-300x150.jpg&amp;raw" width="300"><figcaption class="wp-caption-text" data-dcnode-id="1905" id="caption-attachment-26056"><noscript data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">&lt;img class="size-medium wp-image-26056 lazyload" src="https://positivepsychology.com/wp-content/uploads/1_Music-therapy-benefits-300x150.jpg" alt="Music therapy benefits" width="300" height="150" /&gt;</span></noscript><span data-dcnode-id="1906" instrument_node=""> Image by khamkhor from Pixabay</span></figcaption></figure><span data-dcnode-id="1903" instrument_node="">
</span><p data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Since the earliest days of humankind, music and the power of music, has been evident to us.</span></p><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1899" instrument_node="">After World War II, a new profession entered the arena – </span><a data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/music-therapy/"><span data-dcnode-id="1898" instrument_node="">music therapy</span></a><span data-dcnode-id="1896" instrument_node="">. With far-reaching benefits and in a variety of settings, the types and methods of music therapy have had a profound impact.</span></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Used in conjunction with traditional therapies, positive psychology, and even as a stand-alone intervention, music therapy offers a variety of benefits. It is these benefits we will evaluate here.</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1890" instrument_node="">Before you read on, we thought you might like to </span><a data-dcnode-id="1888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/ebook" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1889" instrument_node="">download our 3 Positive Psychology Exercises for free</span></a><span data-dcnode-id="1887" instrument_node="">. These science-based exercises will explore fundamental aspects of positive psychology including strengths, values and self-compassion and will give you the tools to enhance the wellbeing of your clients, students or employees.</span></p><span data-dcnode-id="1885" instrument_node="">
</span><div data-dcnode-id="1809" id="inhoud"><span data-dcnode-id="1884" instrument_node="">

</span><h2 data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">6 Proven Benefits of Music Therapy</span></h2><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Jillian Levy (2017) shares the six major health benefits of music therapy:</span></p><span data-dcnode-id="1799" instrument_node="">
</span><ol data-dcnode-id="1779"><span data-dcnode-id="1798" instrument_node="">
</span><li data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Music therapy reduces anxiety and physical effects of stress</span></li><span data-dcnode-id="1795" instrument_node="">
</span><li data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">It improves healing</span></li><span data-dcnode-id="1792" instrument_node="">
</span><li data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">It can help manage Parkinson’s and Alzheimer’s disease</span></li><span data-dcnode-id="1789" instrument_node="">
</span><li data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Music therapy reduces depression and other symptoms in the elderly</span></li><span data-dcnode-id="1786" instrument_node="">
</span><li data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">It helps to reduce symptoms of psychological disorders including schizophrenia</span></li><span data-dcnode-id="1783" instrument_node="">
</span><li data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">Music therapy improves self-expression and communication</span></li><span data-dcnode-id="1780" instrument_node="">
</span></ol><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1773"><a data-dcnode-id="1774" name="objectives"></a></p><span data-dcnode-id="1772" instrument_node="">
</span><h2 data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">What are the Goals and Objectives of Music Therapy?</span></h2><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">The overarching goal of music therapy is to achieve the objectives that meet the needs of the individual (Therapedia, n.d.). This may include, for example, improving motor function, social skills, emotions, coordination, self-expression and personal growth (Therapedia, n.d.).</span></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Common goals in music therapy, as identified by Everyday Harmony (n.d.) are the development of:</span></p><span data-dcnode-id="1763" instrument_node="">
</span><ul data-dcnode-id="1743"><span data-dcnode-id="1762" instrument_node="">
</span><li data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Communication skills (using vocal/verbal sounds and gestures)</span></li><span data-dcnode-id="1759" instrument_node="">
</span><li data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Social skills (making eye contact, turn-taking, initiating interaction, and self-esteem)</span></li><span data-dcnode-id="1756" instrument_node="">
</span><li data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Sensory skills (through touch, listening, and levels of awareness)</span></li><span data-dcnode-id="1753" instrument_node="">
</span><li data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Physical skills (fine and gross motor control and movement)</span></li><span data-dcnode-id="1750" instrument_node="">
</span><li data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Cognitive skills (concentration and attention, imitation, and sequencing)</span></li><span data-dcnode-id="1747" instrument_node="">
</span><li data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Emotional skills (expression of feelings non-verbally)</span></li><span data-dcnode-id="1744" instrument_node="">
</span></ul><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1737"><a data-dcnode-id="1738" name="effects"></a></p><span data-dcnode-id="1736" instrument_node="">
</span><h2 data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">What Effects Can Music Therapy Have on a Client?</span></h2><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1732" instrument_node="">Music can affect a client’s attention, emotion, cognition, behavior,&nbsp;and communication (Koelsch et al., 2009). It can also help bring about </span><a data-dcnode-id="1730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/relaxation-exercises-techniques-music-meditations/"><span data-dcnode-id="1731" instrument_node="">relaxation</span></a><span data-dcnode-id="1729" instrument_node=""> and </span><a data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/positive-psychology-and-mental-health/"><span data-dcnode-id="1728" instrument_node="">pleasure</span></a><span data-dcnode-id="1726" instrument_node=""> (Koelsch et al., 2009). Music also affects perception (Koelsch et al., 2009). Training in music promotes an individual’s skills in the decoding of acoustic features, such as pitch height and frequency modulation (Koelsch et al., 2009).</span></p><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Music has various effects on the activity of a large range of brain structures (Koelsch et al., 2009). Functional neuroimaging studies have shown that listening to music can have effects on the core structures of emotional processing (the limbic and paralimbic structures) in both musicians and ‘non-musicians’ (Koelsch et al., 2009).</span></p><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">The peripheral physiological effects of listening to music and making music are still being looked into (Koelsch et al., 2009). However, given the effects of emotion on the autonomic nervous system, endocrine system, and immune system – and the fact that music has the power to evoke and modulate emotions – Koelsch and colleagues (2009) suggest that music therapy may be used to treat disorders associated with dysfunctions and imbalances within these systems.</span></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1713"><a data-dcnode-id="1714" name="used-for"></a></p><span data-dcnode-id="1712" instrument_node="">
</span><h2 data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">What Can Music Therapy be Used For?</span></h2><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Research supports the effectiveness of music therapy for a wide range of purposes, as described by The American Music Therapy Association, n.d:</span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Music therapy can be used for facilitating movement and overall physical rehabilitation and motivating clients to cope with treatment. It can provide emotional support for clients and their families, and provide an outlet for expression of feelings.</span></p><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Credentialed music therapists can work with patients with an acquired brain injury (AMI). For example, music therapy helped congresswoman Gabby Giffords to regain her speech after she survived a bullet wound to her brain. Music therapy can be used to lessen the effects of dementia, reduce asthma episodes in both children and adults and help reduce pain in hospitalized patients.</span></p><span data-dcnode-id="1700" instrument_node="">
</span><p data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Music therapy can also be used to help children with autism spectrum disorder to improve their communication capabilities. Furthermore, it can help premature infants improve sleep patterns and increase their weight gain. Finally, music therapy can be used to help individuals with Parkinson’s disease to improve motor function.</span></p><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1692"><a data-dcnode-id="1693" name="statistics"></a></p><span data-dcnode-id="1691" instrument_node="">
</span><h2 data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">9 Interesting Facts and Statistics</span></h2><span data-dcnode-id="1688" instrument_node="">
</span><ol data-dcnode-id="1659"><span data-dcnode-id="1687" instrument_node="">
</span><li data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">86% of users of the Nordoff-Robbins music therapy services said that music therapy had enabled them to develop social skills and interaction (Nordoff Robbins, n.d.)</span></li><span data-dcnode-id="1684" instrument_node="">
</span><li data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Your heartbeat changes to mimic the music that you listen to</span></li><span data-dcnode-id="1681" instrument_node="">
</span><li data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Distinguishing changes in sounds were found to be equipped in those as small as a developing fetus</span></li><span data-dcnode-id="1678" instrument_node="">
</span><li data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Listening to happy vs. sad music can affect the way you perceive the world around you</span></li><span data-dcnode-id="1675" instrument_node="">
</span><li data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">An “earworm” is a song that you can’t seem to get out of your head</span></li><span data-dcnode-id="1672" instrument_node="">
</span><li data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">A ‘brain itch’ is a need for the brain to fill in the gaps in a song’s rhythm</span></li><span data-dcnode-id="1669" instrument_node="">
</span><li data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Music triggers activity in the same part of the brain that releases dopamine (the ‘pleasure chemical’)</span></li><span data-dcnode-id="1666" instrument_node="">
</span><li data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Music triggers networks of neurons into an organized movement</span></li><span data-dcnode-id="1663" instrument_node="">
</span><li data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Learning a musical instrument can improve fine motor and reasoning skills</span></li><span data-dcnode-id="1660" instrument_node="">
</span></ol><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">These interesting facts were sourced from Ashley Blodgett (2015).</span></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1650"><a data-dcnode-id="1651" name="approach"></a></p><span data-dcnode-id="1649" instrument_node="">
</span><h2 data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">A Look at the Nordoff-Robbins Approach</span></h2><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1645" instrument_node="">The following information was found on the Nordoff Robbins </span><a data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nordoff-robbins.org.uk/what-is-music-therapy" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1644" instrument_node="">website</span></a><span data-dcnode-id="1642" instrument_node="">.</span></p><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">In the 1950s, 1960s, and 1970s, the Nordoff-Robbins approach was developed by Paul Nordoff (an American composer and pianist) and Clive Robbins (a teacher of children with special needs from Britain). This is not a ‘method’. It is an approach designed to harness every person’s potential for engagement in active, communicative, expressive music-making.</span></p><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">The Nordoff-Robbins approach began as a form of collaborative music-making used to engage vulnerable and isolated children. Nordoff and Robbins term this ‘therapy in music’.</span></p><span data-dcnode-id="1634" instrument_node="">
</span><p data-dcnode-id="1629"><span data-dcnode-id="1633" instrument_node="">The Nordoff-Robbins approach emphasizes the importance of music-making in developing skills, a </span><a data-dcnode-id="1631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/self-concept/"><span data-dcnode-id="1632" instrument_node="">sense of self</span></a><span data-dcnode-id="1630" instrument_node=""> and a capacity for satisfying social interaction. It recognizes that all people, regardless of pathology, illness, disability, trauma or social isolation have the potential to make music.</span></p><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">The approach is well known for its work with children and adults with learning difficulties. This is because, like all forms of music therapy, the work has a non-verbal basis.</span></p><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Every music therapist using the Nordoff-Robbins approach thinks strategically. Using their musical abilities, they help people in ways that are specific to each person, each group, or each community.</span></p><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1617"><a data-dcnode-id="1618" name="relaxation"></a></p><span data-dcnode-id="1616" instrument_node="">
</span><h2 data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Relaxation and Music Therapy</span></h2><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">While most of us would agree that music can be relaxing, how is relaxation promoted with music therapy? To begin with, music can lead to relaxation of tense muscles (Scott, 2018). When you allow your muscles to relax and loosen your body, your mind relaxes too (Scott, 2018). Music is fun, cheap, and simple. It can decrease all the tension, worries and stress you may not even have been aware of (Scott, 2018).</span></p><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1602"><span data-dcnode-id="1609" instrument_node="">Listening to music can also enhance other stress-relieving activities (Scott, 2018). For example, it can aid in practicing </span><a data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/benefits-of-yoga/"><span data-dcnode-id="1608" instrument_node="">yoga</span></a><span data-dcnode-id="1606" instrument_node="">, self-hypnosis or </span><a data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/interactive-guided-imagery-therapy/"><span data-dcnode-id="1605" instrument_node="">guided imagery</span></a><span data-dcnode-id="1603" instrument_node="">. In other words, music can enhance the stress-relieving properties of other relaxing activities (Scott, 2018).</span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1600" instrument_node="">Music can also help the brain reach a meditative state (Scott, 2018). This promotes relaxation. Listening to music may be a less intimidating way for a client to practice </span><a data-dcnode-id="1598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/relaxation-exercises-techniques-music-meditations/"><span data-dcnode-id="1599" instrument_node="">meditation</span></a><span data-dcnode-id="1597" instrument_node=""> (Scott, 2018).</span></p><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1590"><a data-dcnode-id="1591" name="ideas"></a></p><span data-dcnode-id="1589" instrument_node="">
</span><h2 data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">4 Music Therapy Ideas and Interventions</span></h2><span data-dcnode-id="1586" instrument_node="">
</span><figure aria-describedby="caption-attachment-26058" class="wp-caption alignright" data-dcnode-id="1580" id="attachment_26058" style="width: 300px"><img alt="singalong music therapy for kids" class="wp-image-26058 size-medium lazyload" data-dcnode-id="1585" data-src="https://positivepsychology.com/wp-content/uploads/singalong-music-therapy-for-kids-300x150.jpg" height="150" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Music therapy for kids" width="300"><figcaption class="wp-caption-text" data-dcnode-id="1581" id="caption-attachment-26058"><noscript data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">&lt;img class="wp-image-26058 size-medium lazyload" title="Music therapy for kids" src="https://positivepsychology.com/wp-content/uploads/singalong-music-therapy-for-kids-300x150.jpg" alt="singalong music therapy for kids" width="300" height="150" /&gt;</span></noscript><span data-dcnode-id="1582" instrument_node=""> Image by Free-Photos from Pixabay</span></figcaption></figure><span data-dcnode-id="1579" instrument_node="">
</span><h3 data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">1. Singalong</span></h3><span data-dcnode-id="1576" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Fandom (n.d.) suggest that music therapy sessions for groups or individuals may include singing together in a way less formal than a choir.</span></p><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">The singalong may use a songbook of the music therapist’s repertoire, or plain copies of popular song lyrics (Fandom, n.d.). Participants could sing preferred and highly familiar songs by memory, or learn a new song by rote (Fandom, n.d.).</span></p><span data-dcnode-id="1570" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Singalongs encourage participation in a fun, music-making process (Fandom, n.d.). They can be used to meet various goals and objectives, including teaching breathing exercises (Fandom, n.d.).</span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1564" instrument_node="">
</span><h3 data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">2. ‘Blackout song-writing’ (Seibert, n.d.).</span></h3><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">In this session, the therapist provides clients with the lyrics to 4 – 5 different choices of songs which represent recovery – such as overcoming barriers, support, or struggles. Then, clients are encouraged to take some time to read the lyrics of the song they choose, and to select words from the lyrics to make up their own song.</span></p><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">The idea is to ‘blackout’ the lyrics which the client does not want in the song and to use the words that they have chosen to create their own song.</span></p><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1552" instrument_node="">
</span><h3 data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">3. Musical Hangman (Seibert, n.d.).</span></h3><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">This idea is to draw a thematic picture on a board, and ask clients to guess the missing word before the picture loses its details – e.g. to try and guess the word before the tree loses all its’ leaves.</span></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Then, choose a thematic word and find songs that start with each letter of that word. The aim is for clients to listen to the songs and try and guess the target word. For example, the word ‘happy’ may have the songs “Hey Jude”, “A Little Ray of Sunshine”, “Praying” and so on.</span></p><span data-dcnode-id="1543" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">Each letter that is guessed correctly earns the corresponding song to play and sing. The therapist can even coordinate songs that share a thematic idea as well as matching the letter.</span></p><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1537" instrument_node="">
</span><h3 data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">4. Blues Song-writing (Seibert, n.d.).</span></h3><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1529"><span data-dcnode-id="1533" instrument_node="">The music therapist explains the background of the blues, so that the client understands the basics – i.e. having a line A, repeating line A and a subsequent line B. Ask the client to share something that they may be feeling ‘blue’ about, and to think of a solution to the problem or a </span><a data-dcnode-id="1531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/coping/"><span data-dcnode-id="1532" instrument_node="">coping</span></a><span data-dcnode-id="1530" instrument_node=""> mechanism. Then, brainstorm ideas as to how to make the statements sound poetic in song-writing.</span></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1523"><span data-dcnode-id="1527" instrument_node="">After each client has had a chance to write their ‘blues’, have a continuous improvisation/singalong. Sing each person’s ‘blues’ as a group, following the same melody line. This activity can be extended using an iPad: clients can improvise on the blues scale keyboard on the app ‘</span><a data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itunes.apple.com/au/app/garageband/id408709785" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1526" instrument_node="">GarageBand</span></a><span data-dcnode-id="1524" instrument_node="">’.</span></p><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1517"><a data-dcnode-id="1518" name="songs"></a></p><span data-dcnode-id="1516" instrument_node="">
</span><h2 data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">12 Recommended Songs Commonly Used</span></h2><span data-dcnode-id="1513" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">According to Rachel Rambach (2011), the following are twelve songs that every music therapist should know:</span></p><span data-dcnode-id="1510" instrument_node="">
</span><ul data-dcnode-id="1472"><span data-dcnode-id="1509" instrument_node="">
</span><li data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">‘American Pie’</span></li><span data-dcnode-id="1506" instrument_node="">
</span><li data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">‘Amazing Grace’</span></li><span data-dcnode-id="1503" instrument_node="">
</span><li data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">‘Blue Suede Shoes’</span></li><span data-dcnode-id="1500" instrument_node="">
</span><li data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">‘Blue Skies’</span></li><span data-dcnode-id="1497" instrument_node="">
</span><li data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">‘Don’t Worry, Be Happy’</span></li><span data-dcnode-id="1494" instrument_node="">
</span><li data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">‘The Lion Sleeps Tonight’</span></li><span data-dcnode-id="1491" instrument_node="">
</span><li data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">‘Lean on me’</span></li><span data-dcnode-id="1488" instrument_node="">
</span><li data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">‘Ob-la-di’</span></li><span data-dcnode-id="1485" instrument_node="">
</span><li data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">‘Somewhere Over the Rainbow’</span></li><span data-dcnode-id="1482" instrument_node="">
</span><li data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">‘Take Me to The Ballgame’</span></li><span data-dcnode-id="1479" instrument_node="">
</span><li data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">‘This Little Light of Mine’</span></li><span data-dcnode-id="1476" instrument_node="">
</span><li data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">‘You Are My Sunshine’</span></li><span data-dcnode-id="1473" instrument_node="">
</span></ul><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1466"><a data-dcnode-id="1467" name="activities"></a></p><span data-dcnode-id="1465" instrument_node="">
</span><h2 data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">10 Music Therapy Activities and Exercises for Adults</span></h2><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1457"><span data-dcnode-id="1461" instrument_node="">The following are research-based </span><a data-dcnode-id="1459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/music-therapy-activities-tools/"><span data-dcnode-id="1460" instrument_node="">music therapy activities</span></a><span data-dcnode-id="1458" instrument_node=""> (interventions) for adults, found in Wigram and colleagues’ 2002 book.</span></p><span data-dcnode-id="1456" instrument_node="">
</span><ol data-dcnode-id="1422"><span data-dcnode-id="1455" instrument_node="">
</span><li data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Improvisation</span></li><span data-dcnode-id="1452" instrument_node="">
</span><li data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Singing well-known songs</span></li><span data-dcnode-id="1449" instrument_node="">
</span><li data-dcnode-id="1445"><span data-dcnode-id="1448" instrument_node="">Vibroacoustic therapy</span><br data-dcnode-id="1447"><span data-dcnode-id="1446" instrument_node="">
This is a receptive form of music therapy. It involves music being played through speakers which are built into a chair, mattress or bed (which the client lies in). Then, the client directly experiences the vibrations that are brought about by the music (Wigram, Pedersen &amp; Bonde, 2002).</span></li><span data-dcnode-id="1444" instrument_node="">
</span><li data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Stress-reduction techniques</span></li><span data-dcnode-id="1441" instrument_node="">
</span><li data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Music and movement</span></li><span data-dcnode-id="1438" instrument_node="">
</span><li data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Folk dancing or social dancing</span></li><span data-dcnode-id="1435" instrument_node="">
</span><li data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Vibrotactile stimulation</span></li><span data-dcnode-id="1432" instrument_node="">
</span><li data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Music reminiscence</span></li><span data-dcnode-id="1429" instrument_node="">
</span><li data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Music stimulation</span></li><span data-dcnode-id="1426" instrument_node="">
</span><li data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Songwriting</span></li><span data-dcnode-id="1423" instrument_node="">
</span></ol><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">For more information about any of these activities, Wigram et al. (2002) provide&nbsp;the scientific references associated with each activity on pages 193 – 194.</span></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1413"><a data-dcnode-id="1414" name="group-ideas"></a></p><span data-dcnode-id="1412" instrument_node="">
</span><h2 data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">5 Group Ideas and Activities</span></h2><span data-dcnode-id="1409" instrument_node="">
</span><h3 data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">1. ‘Beach ball autonomy’ (Seibert, n.d.)</span></h3><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Use a blow-up beach ball and draw on a range of shapes. Inside each, write genres, styles and generic artists. Toss the ball to a client. Whichever shape their thumb lands on describes the next song selection.</span></p><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">The therapist encourages the client to choose a selection of appropriate songs so that the therapist can choose the preferred song for that individual. The client also gets to choose whether the group will play instruments, sing, dance, or just listen.</span></p><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1397" instrument_node="">
</span><h3 data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">2. Drumming Emotions (Fandom, n.d.).</span></h3><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Each member of the group writes down one word to describe the emotion that they are feeling on a slip of paper. The paper is then put in a hat/bowl and group members take turns in selecting a different piece of paper. The person will then ‘perform’ (demonstrate) on the drum the emotion that is written on the paper. The rest of the group listens and tries to identify who in the group the emotion belongs to.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1388" instrument_node="">
</span><h3 data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">3. Conversation Drum Circle (Fandom, n.d.).</span></h3><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">The group plays a beat, and in pairs take turns in a ‘musical dialogue’ exchange.</span></p><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1379" instrument_node="">
</span><h3 data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">4. Name-That-Tune! (Fandom, n.d.).</span></h3><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">The music therapist asks clients to form two or three teams and to come up with a team name. Play appropriate music and each team has a turn at earning points for stating the name of the song, the group or artist, or sharing interesting, relevant facts about the song.</span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">It can also be fun to open up the guessing to the whole group if they are unable to identify the song. You could play “free-for-all” lightning rounds or use TV show themes, or popular movie soundtracks.</span></p><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1367" instrument_node="">
</span><h3 data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">5. Music trivia (Fandom, n.d.).</span></h3><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">This game challenges teams to answer trivia questions on music and pop-culture.</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1356"><a data-dcnode-id="1357" name="technology"></a></p><span data-dcnode-id="1355" instrument_node="">
</span><h2 data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Technologies to Support Music Therapy Interventions</span></h2><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1346"><a data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//quenza.com/%3Futm_source%3DPP%26utm_medium%3Dblog%26utm_campaign%3Dpost" rel="noopener noreferrer" target="_blank"><img alt="Quenza Gentle Harmony" class="alignright wp-image-136074 lazyload" data-dcnode-id="1351" data-src="https://positivepsychology.com/wp-content/uploads/2019/03/Quenza-Music-Therapy-488x1024.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2019/03/Quenza-Music-Therapy-488x1024.jpg 488w, https://positivepsychology.com/wp-content/uploads/2019/03/Quenza-Music-Therapy-143x300.jpg 143w, https://positivepsychology.com/wp-content/uploads/2019/03/Quenza-Music-Therapy.jpg 600w" height="629" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Quenza Music Therapy" width="300"><noscript data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">&lt;img class="alignright wp-image-136074 lazyload" title="Quenza Music Therapy" src="https://positivepsychology.com/wp-content/uploads/2019/03/Quenza-Music-Therapy-488x1024.jpg" alt="Quenza Gentle Harmony" width="300" height="629" srcset="https://positivepsychology.com/wp-content/uploads/2019/03/Quenza-Music-Therapy-488x1024.jpg 488w, https://positivepsychology.com/wp-content/uploads/2019/03/Quenza-Music-Therapy-143x300.jpg 143w, https://positivepsychology.com/wp-content/uploads/2019/03/Quenza-Music-Therapy.jpg 600w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></a><span data-dcnode-id="1347" instrument_node="">As you may have realized, music therapy interventions can involve both active and passive components.</span></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Some interventions invite active engagement, such as through dancing or playing instruments, while others require patients simply to listen to music.</span></p><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Sometimes, music therapists prescribing passive interventions may choose to invite their clients to take part in these interventions outside of scheduled therapy sessions.</span></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Many will do so with the support of technologies that allow them to design and distribute customized interventions digitally.</span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">For example, besides in-person interventions, such as drumming or sing-alongs, a music therapist might invite their client to listen to guided imagery recordings containing music.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1332" instrument_node="">Using a digital psychotherapy platform such as </span><a data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//quenza.com/%3Futm_source%3DPP%26utm_medium%3Dblog%26utm_campaign%3Dpost" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1331" instrument_node="">Quenza</span></a><span data-dcnode-id="1329" instrument_node=""> (pictured here), these pre-recorded audio clips can be sent directly to the client’s smartphone or tablet according to a predetermined schedule.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Likewise, therapists can use platforms such as this to design and administer reflections or exercises that invite clients to explore their emotional reactions or cognitive responses to different music therapy interventions, thereby supplementing the in-person therapy experience.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1323" instrument_node="">This is just a couple of examples of how music therapists might adapt the functions of a </span><a data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/blended-care/"><span data-dcnode-id="1322" instrument_node="">blended care</span></a><span data-dcnode-id="1320" instrument_node=""> platform like </span><a data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//quenza.com/%3Futm_source%3DPP%26utm_medium%3Dblog%26utm_campaign%3Dpost" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1319" instrument_node="">Quenza</span></a><span data-dcnode-id="1317" instrument_node=""> to design holistic treatment solutions for their clients. If you’d like to learn more about designing different therapy interventions using Quenza, take a look at our dedicated </span><a data-dcnode-id="1315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/quenza-psychoeducation-interventions/"><span data-dcnode-id="1316" instrument_node="">psychoeducation interventions</span></a><span data-dcnode-id="1314" instrument_node=""> article.</span></p><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307"><a data-dcnode-id="1308" name="schools"></a></p><span data-dcnode-id="1306" instrument_node="">
</span><h2 data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Using Music Therapy in Schools</span></h2><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Music therapy can be used with school-aged students in their school setting. Music therapy can be used at school to focus on higher level social and academic skills, including empathy, turn taking, compromise and problem-solving skills in social situations (Jacobson &amp; Artman, 2013).</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">It can be used to promote academic understanding in mathematics, such as teaching math facts, telling the time, and money concepts (Jacobson &amp; Artman, 2013). Music therapy can also target academic improvement in reading and writing (Jacobson &amp; Artman, 2013). For example, music therapy improves phonic and sight words, and story elements (Jacobson &amp; Artman, 2013).</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1296" instrument_node="">In schools, music therapy can be used to improve children’s behavior and wellbeing (Jacobson &amp; Artman, 2013). It can help children learn classroom rules, improving attention and focus, and promoting </span><a data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/self-expression/"><span data-dcnode-id="1295" instrument_node="">self-expression</span></a><span data-dcnode-id="1293" instrument_node=""> (Jacobson &amp; Artman, 2013).</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1286"><span data-dcnode-id="1290" instrument_node="">Finally, music therapy can be used in schools to improve social skills and </span><a data-dcnode-id="1288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/communication-activities-adults-students/"><span data-dcnode-id="1289" instrument_node="">communication</span></a><span data-dcnode-id="1287" instrument_node=""> (Jacobson &amp; Artman, 2013). For example, it can help with “wh” questions (who, what, where, and when) and develop vocabulary (Jacobson &amp; Artman, 2013).</span></p><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Music therapy can also be used in Special Education settings (Jacobson &amp; Artman, 2013). For example, a music therapist may work with a special needs student in the consideration of an Individual Education Program (IEP) (Jacobson &amp; Artman, 2013). They may work with the IEP team and the student’s family throughout the music therapy process (Jacobson &amp; Artman, 2013).</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1277"><a data-dcnode-id="1278" name="children"></a></p><span data-dcnode-id="1276" instrument_node="">
</span><h2 data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Music Therapy for Children</span></h2><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">This following information about the use of music therapy with children is provided by the Children’s Health Queensland Hospital and Health Service (n.d.).</span></p><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1269" instrument_node="">Music therapy can be a useful way to meet the various psychosocial needs of children, through engagement in song-writing and improvisation. It can provide children with opportunities for self-expression and communication. Music therapy can also give children the opportunity to identify their </span><a data-dcnode-id="1267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/via-survey/"><span data-dcnode-id="1268" instrument_node="">strengths</span></a><span data-dcnode-id="1266" instrument_node="">, providing a way for them to maintain a sense of </span><a data-dcnode-id="1264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/self-esteem/"><span data-dcnode-id="1265" instrument_node="">self-esteem</span></a><span data-dcnode-id="1263" instrument_node="">.</span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">For infants and children, a music therapist can use live, familiar music in conjunction with physical, social and cognitive activities to stimulate development. This also promotes interaction and encourages participation and motivation in young children. In order to reduce irritability, pain or anxiety, the music therapist can use soothing music. This also encourages child and family bonding.</span></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">To help develop creative self-expression in infants and young children, the music therapist and child can make music together and write songs.</span></p><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Adolescents can play a more active role in coming up with their own music therapy program. With a therapist, adolescents can explore a range of musical activities and select what feels right to them.</span></p><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Possible activities for adolescents are song-writing, improvisation and/or singing the songs by their favorite artists or bands. Adolescents may like to use technology to produce personalized audio/visual projects. The use of live music in addition to relaxation techniques can be an effective way to help reduce pain and anxiety in adolescents.</span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Clinical music therapy may benefit children who are chronically ill (or are long-term hospital patients) or have a developmental delay. It can help children who have autism or are isolated or bed-bound. Music therapy can be used for children who are anxious or depressed, are physically impaired or are frequently admitted to the hospital. Finally, clinical music therapy may benefit children who have experienced trauma.</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1241"><a data-dcnode-id="1242" name="kids"></a></p><span data-dcnode-id="1240" instrument_node="">
</span><h2 data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">5 Ideas for Kids</span></h2><span data-dcnode-id="1237" instrument_node="">
</span><h3 data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">1. Leader of the band (Fandom, n.d.).</span></h3><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">The therapist can sing a little song about who’s turn it is to be the ‘leader of the band’. Demonstrate to the group appropriate directions (such as “start”, “stop”, “LOUD”, “fast”, “slooooow”) or anything that the group will understand.</span></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1230" instrument_node="">You may choose a child who is cooperating and listening to directions to be the leader. Children are highly </span><a data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/resilience-in-children/"><span data-dcnode-id="1229" instrument_node="">reinforced</span></a><span data-dcnode-id="1227" instrument_node=""> for their behavior when they get to have a turn in communicating their preferred directions to the whole group.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1222" instrument_node="">
</span><h3 data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">2. “The Hello Song” from Dragon Tales (Fandom, n.d.).</span></h3><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">This song, based on simple chords, is a suitable ‘hello’ song for children under 8 years of age. It brings together social skills, interactive responses and allows an opportunity to greet each child individually. This activity also incorporates vocal and musical opposites such as “high” and “low” and “fast” and “slow”.</span></p><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1213" instrument_node="">
</span><h3 data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">3. “Hot Potato” (Fandom, n.d.).</span></h3><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">The group passes an object around in a circle, and when the music stops the person holding the object can – answer a question; ask a question; say something about themselves, or discuss something related to treatment.</span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1204" instrument_node="">
</span><h3 data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">4. ‘Music bingo’ (Fandom, n.d.)</span></h3><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Create bingo sheets for children that use songs instead of letters and numbers.</span></p><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1195" instrument_node="">
</span><h3 data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">5. ‘Pictionary’ (Fandom, n.d.).</span></h3><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Prepare cue cards with song titles written on them for individuals to draw pictures of while their team attempts to guess the song.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1184"><a data-dcnode-id="1185" name="home"></a></p><span data-dcnode-id="1183" instrument_node="">
</span><h2 data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">A Take Home Message</span></h2><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">We all can attest to the power of music, and using it to teach, calm, and encourage recovery, make it a viable therapy to consider.</span></p><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">We hope this article has given you an indication of some of the benefits of music therapy, and look forward to your feedback and examples where music therapy has benefited your clients.</span></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1173" instrument_node="">Continue Reading: </span><a data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/drama-therapy/"><span data-dcnode-id="1172" instrument_node="">17 Best Drama Therapy Techniques, Activities &amp; Exercises</span></a></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1168" instrument_node="">We hope you enjoyed reading this article. Don’t forget to </span><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/ebook" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1167" instrument_node="">download our 3 Positive Psychology Exercises for free</span></a><span data-dcnode-id="1165" instrument_node="">.</span></p><span data-dcnode-id="1163" instrument_node="">
