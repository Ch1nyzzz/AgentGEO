</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as010&quot;><p id=&quot;sp0010&quot;>Here we consider the nature of unrealistic optimism and other related positive illusions. We are interested in whether cognitive states that are unrealistically optimistic are belief states, whether they are false, and whether they are epistemically irrational. We also ask to what extent unrealistically optimistic cognitive states are fixed. Based on the classic and recent empirical literature on unrealistic optimism, we offer some preliminary answers to these questions, thereby laying the foundations for answering further questions about unrealistic optimism, such as whether it has biological, psychological, or epistemic benefits.</p></div></div></div>" data-dcnode-id="5381" lang="en" name="citation_abstract"><span data-dcnode-id="5380" instrument_node="">

"list-label" data-dcnode-id="4866"><span data-dcnode-id="4867" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4863"><p data-dcnode-id="4864" id="p0005"><span data-dcnode-id="4865" instrument_node="">There are a number of controversial questions regarding the nature and causes of unrealistic optimism.</span></p></dd><dt class="list-label" data-dcnode-id="4861"><span data-dcnode-id="4862" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4858"><p data-dcnode-id="4859" id="p0010"><span data-dcnode-id="4860" instrument_node="">We argue that unrealistically optimistic cognitions should be considered beliefs rather than desires or hopes.</span></p></dd><dt class="list-label" data-dcnode-id="4856"><span data-dcnode-id="4857" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4853"><p data-dcnode-id="4854" id="p0015"><span data-dcnode-id="4855" instrument_node="">Optimistically biased beliefs are frequently false but establishing falsity in individual cases is difficult and sometimes impossible.</span></p></dd><dt class="list-label" data-dcnode-id="4851"><span data-dcnode-id="4852" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4848"><p data-dcnode-id="4849" id="p0020"><span data-dcnode-id="4850" instrument_node="">Optimistically biased beliefs are epistemically irrational because they are unwarranted and their responsiveness to counter-evidence is limited.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="4838" id="ab010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4842"><span data-dcnode-id="4843" instrument_node="">Abstract</span></h2><div data-dcnode-id="4839" id="as010"><p data-dcnode-id="4840" id="sp0010"><span data-dcnode-id="4841" instrument_node="">Here we consider the nature of unrealistic optimism and other related positive illusions. We are interested in whether cognitive states that are unrealistically optimistic are belief states, whether they are false, and whether they are epistemically irrational. We also ask to what extent unrealistically optimistic cognitive states are fixed. Based on the classic and recent empirical literature on unrealistic optimism, we offer some preliminary answers to these questions, thereby laying the foundations for answering further questions about unrealistic optimism, such as whether it has biological, psychological, or epistemic benefits.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="4814" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="4826"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="4827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1053810016304317"><svg class="icon icon-navigate-left" data-dcnode-id="4835" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="4836"></path></svg><span class="button-alternative-text" data-dcnode-id="4828"><strong data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="4831"><span data-dcnode-id="4832" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4829"><span data-dcnode-id="4830" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="4815"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="4816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1053810016300800"><span class="button-alternative-text" data-dcnode-id="4819"><strong data-dcnode-id="4824"><span data-dcnode-id="4825" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="4822"><span data-dcnode-id="4823" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4820"><span data-dcnode-id="4821" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="4817" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="4818"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="4795"><div class="keywords-section" data-dcnode-id="4796" id="kg005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4812"><span data-dcnode-id="4813" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="4809" id="k0005"><span data-dcnode-id="4810"><span data-dcnode-id="4811" instrument_node="">Positive illusions</span></span></div><div class="keyword" data-dcnode-id="4806" id="k0010"><span data-dcnode-id="4807"><span data-dcnode-id="4808" instrument_node="">Unrealistic optimism</span></span></div><div class="keyword" data-dcnode-id="4803" id="k0015"><span data-dcnode-id="4804"><span data-dcnode-id="4805" instrument_node="">Optimism bias</span></span></div><div class="keyword" data-dcnode-id="4800" id="k0020"><span data-dcnode-id="4801"><span data-dcnode-id="4802" instrument_node="">Belief update</span></span></div><div class="keyword" data-dcnode-id="4797" id="k0025"><span data-dcnode-id="4798"><span data-dcnode-id="4799" instrument_node="">Irrationality</span></span></div></div></div><span data-dcnode-id="4794" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="4275" id="body"><div data-dcnode-id="4295"><section data-dcnode-id="4750" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4790" id="st020"><span data-dcnode-id="4793" instrument_node="">0</span><span data-dcnode-id="4792" instrument_node="">. </span><span data-dcnode-id="4791" instrument_node="">Introduction</span></h2><p data-dcnode-id="4770" id="p0025"><span data-dcnode-id="4789" instrument_node="">In this paper we are interested in the nature of unrealistic optimism and other positive illusions as discussed in the psychological literature. There is an ongoing debate in philosophy and psychology as to whether false beliefs are epistemically irrational and whether they can have pragmatic benefits, even if they are epistemically irrational (</span><a class="workspace-trigger" data-dcnode-id="4787" href="#b0035" name="bb0035"><span data-dcnode-id="4788" instrument_node="">Bortolotti and Sullivan-Bissett, 2015</span></a><span data-dcnode-id="4786" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4784" href="#b0085" name="bb0085"><span data-dcnode-id="4785" instrument_node="">Craigie and Bortolotti, 2014</span></a><span data-dcnode-id="4783" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4781" href="#b0140" name="bb0140"><span data-dcnode-id="4782" instrument_node="">Haselton and Nettle, 2006</span></a><span data-dcnode-id="4780" instrument_node="">). Beliefs exhibit epistemic irrationality to the extent that they are badly supported by the evidence available to the agent, or are maintained despite counter-evidence which is available to the agent. It is sometimes claimed that positive illusions generally, and unrealistic optimism specifically, are systematic tendencies to form beliefs that are biased, and often false, but have significant benefits (</span><a class="workspace-trigger" data-dcnode-id="4778" href="#b0315" name="bb0315"><span data-dcnode-id="4779" instrument_node="">Taylor and Brown, 1988</span></a><span data-dcnode-id="4777" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4775" href="#b0320" name="bb0320"><span data-dcnode-id="4776" instrument_node="">Taylor and Brown, 1994</span></a><span data-dcnode-id="4774" instrument_node="">), because they increase wellbeing, contribute to mental and physical health, and support productivity and motivation (cf. </span><a class="workspace-trigger" data-dcnode-id="4772" href="#b0030" name="bb0030"><span data-dcnode-id="4773" instrument_node="">Bortolotti &amp; Antrobus, 2015</span></a><span data-dcnode-id="4771" instrument_node="">).</span></p><p data-dcnode-id="4768" id="p0030"><span data-dcnode-id="4769" instrument_node="">In order to assess such claims, we need to explain what unrealistic optimism is, whether the cognitive states that are unrealistically optimistic are belief states, and to what extent they are false. If such cognitive states can be said to be false or epistemically irrational beliefs, then they are candidates for being false or epistemically irrational beliefs that are useful. Whether they do indeed have positive effects is beyond the scope of this paper.</span></p><p data-dcnode-id="4751" id="p0035"><span data-dcnode-id="4767" instrument_node="">In Section </span><a class="workspace-trigger" data-dcnode-id="4765" href="#s0010" name="bs0010"><span data-dcnode-id="4766" instrument_node="">1</span></a><span data-dcnode-id="4764" instrument_node="">, we distinguish between unrealistic optimism and other positive illusions and explain different ways of operationalizing unrealistic optimism. In Section </span><a class="workspace-trigger" data-dcnode-id="4762" href="#s0015" name="bs0015"><span data-dcnode-id="4763" instrument_node="">2</span></a><span data-dcnode-id="4761" instrument_node="">, we ask how we should think about positive illusions. Are they tendencies to adopt and maintain positive beliefs and to make predictions that are optimistically biased, or to express desires and hopes about the self and the future? We suggest that we should understand optimistically biased cognitive states as beliefs and predictions. In Sections </span><a class="workspace-trigger" data-dcnode-id="4759" href="#s0020" name="bs0020"><span data-dcnode-id="4760" instrument_node="">3 When is optimism unrealistic?</span></a><span data-dcnode-id="4758" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4756" href="#s0035" name="bs0035"><span data-dcnode-id="4757" instrument_node="">4 Are optimistically biased beliefs irrational?</span></a><span data-dcnode-id="4755" instrument_node="">, we consider their epistemic status. Are they typically false? Are they epistemically irrational? The answers to these questions will be informed by an analysis of the extent to which optimistically biased beliefs and predictions are fixed. In Section </span><a class="workspace-trigger" data-dcnode-id="4753" href="#s0040" name="bs0040"><span data-dcnode-id="4754" instrument_node="">5</span></a><span data-dcnode-id="4752" instrument_node=""> we discuss two ways of understanding fixity of beliefs, i.e., whether beliefs are responsive to evidence and whether they are sensitive to life circumstances. Throughout the paper we reflect on a number of methodological challenges in the empirical study of optimism.</span></p></section><section data-dcnode-id="4690" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4746" id="st025"><span data-dcnode-id="4749" instrument_node="">1</span><span data-dcnode-id="4748" instrument_node="">. </span><span data-dcnode-id="4747" instrument_node="">Unrealistic optimism and other positive illusions</span></h2><p data-dcnode-id="4729" id="p0040"><span data-dcnode-id="4745" instrument_node="">While several other forms of positive illusions have been identified in the psychological literature (e.g., self-serving bias and wishful thinking, </span><a class="workspace-trigger" data-dcnode-id="4743" href="#b0160" name="bb0160"><span data-dcnode-id="4744" instrument_node="">Krizan and Windschitl, 2009</span></a><span data-dcnode-id="4742" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4740" href="#b0295" name="bb0295"><span data-dcnode-id="4741" instrument_node="">Shepperd et al., 2008</span></a><span data-dcnode-id="4739" instrument_node="">), we will consider the following three forms: (1) the illusion of control, which is an exaggerated belief in one’s capacity to control independent, external events (e.g., </span><a class="workspace-trigger" data-dcnode-id="4737" href="#b0180" name="bb0180"><span data-dcnode-id="4738" instrument_node="">Langer &amp; Roth, 1975</span></a><span data-dcnode-id="4736" instrument_node="">); (2) the better than average effect (sometimes also called the superiority illusion), which is the perception of oneself, one’s past behaviour, and one’s lasting features as more positive than is the case (“I am more talented than the average person”) (e.g., </span><a class="workspace-trigger" data-dcnode-id="4734" href="#b0040" name="bb0040"><span data-dcnode-id="4735" instrument_node="">Brown, 2012</span></a><span data-dcnode-id="4733" instrument_node="">); (3) unrealistic optimism, which is the “tendency for people to believe that they are less likely to experience negative events and more likely to experience positive events than are other people” (</span><a class="workspace-trigger" data-dcnode-id="4731" href="#b0280" name="bb0280"><span data-dcnode-id="4732" instrument_node="">Shepperd, Carroll, Grace, &amp; Terry, 2002, p. 65</span></a><span data-dcnode-id="4730" instrument_node="">). In our paper, we use the expressions ‘unrealistic optimism’ and ‘optimism bias’ interchangeably, which is common practice in the literature.</span></p><p data-dcnode-id="4714" id="p0045"><span data-dcnode-id="4728" instrument_node="">Here are some examples of positive illusions. Instances of the illusion of control can be found in a casino, where people tend to think that they have a better chance at winning when they are the ones rolling the dice, and thus they bet more money in those circumstances (</span><a class="workspace-trigger" data-dcnode-id="4726" href="#b0325" name="bb0325"><span data-dcnode-id="4727" instrument_node="">Vyse, 1997</span></a><span data-dcnode-id="4725" instrument_node="">). An example of the better-than-average effect is when college professors are asked whether they do above-average work, and 94% of them say they do (</span><a class="workspace-trigger" data-dcnode-id="4723" href="#b0090" name="bb0090"><span data-dcnode-id="4724" instrument_node="">Cross, 1977</span></a><span data-dcnode-id="4718"><span data-dcnode-id="4722" instrument_node="">). They cannot all be right about that. An example of the </span><a class="topic-link" data-dcnode-id="4720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/optimism-bias" title="Learn more about optimism bias from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4721" instrument_node="">optimism bias</span></a><span data-dcnode-id="4719" instrument_node=""> is when people underestimate the likelihood that their marriage will end in divorce or that they will develop a serious health condition during their lives (</span></span><a class="workspace-trigger" data-dcnode-id="4716" href="#b0330" name="bb0330"><span data-dcnode-id="4717" instrument_node="">Weinstein, 1980</span></a><span data-dcnode-id="4715" instrument_node="">).</span></p><p data-dcnode-id="4699" id="p0050"><span data-dcnode-id="4713" instrument_node="">There are a number of different phenomena which are normally grouped under the heading ‘optimism bias’. </span><a class="workspace-trigger" data-dcnode-id="4711" href="#b0290" name="bb0290"><span data-dcnode-id="4712" instrument_node="">Shepperd, Klein, Waters, and Weinstein (2013)</span></a><span data-dcnode-id="4706"><span data-dcnode-id="4710" instrument_node=""> distinguish between unrealistic comparative optimism, and unrealistic absolute optimism. On the former definition, people evaluate their own prospects as better than those of similar others (or another specific reference group), in other words, they expect that positive outcomes are more likely and negative outcomes are less likely to occur for oneself than for others. On the latter definition, people’s risk assessment is unrealistically positive when compared to an objective criterion, such as an actuarial risk assessment or actual outcomes (e.g., a grade at the end of a college course). These forms of optimism bias need to be distinguished from dispositional optimism. Dispositional optimism is conceptualized as a </span><a class="topic-link" data-dcnode-id="4708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/personality-traits" title="Learn more about personality trait from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4709" instrument_node="">personality trait</span></a><span data-dcnode-id="4707" instrument_node="">, which people exhibit to different degrees. Broadly defined, it is a generalized tendency to expect positive outcomes (</span></span><a class="workspace-trigger" data-dcnode-id="4704" href="#b0055" name="bb0055"><span data-dcnode-id="4705" instrument_node="">Carver, Scheier, &amp; Segerstrom, 2010</span></a><span data-dcnode-id="4703" instrument_node="">). This expectation need not be unrealistic, and the Life Orientation Test measures a generally positive outlook which does not include predictions regarding specific life-events (</span><a class="workspace-trigger" data-dcnode-id="4701" href="#b0235" name="bb0235"><span data-dcnode-id="4702" instrument_node="">Scheier, Carver, &amp; Bridges, 1994</span></a><span data-dcnode-id="4700" instrument_node="">).</span></p><p data-dcnode-id="4691" id="p0055"><span data-dcnode-id="4698" instrument_node="">All three positive illusions are taken to give rise to beliefs that are badly supported by the evidence and that leave the person with a more positive outlook than is warranted. These positive illusions can interact with one another. For instance, an unrealistically positive view of the quality of one’s research is also likely to lead to unrealistic expectations regarding the likelihood of one’s research being published. Similarly, if a person believes that they can control events more than they can in fact, this belief will lead them to be more optimistic about their chances of avoiding undesirable outcomes and achieving desirable ones (</span><a class="workspace-trigger" data-dcnode-id="4696" href="#b0200" name="bb0200"><span data-dcnode-id="4697" instrument_node="">McKenna, 1993</span></a><span data-dcnode-id="4695" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4693" href="#b0280" name="bb0280"><span data-dcnode-id="4694" instrument_node="">Shepperd et al., 2002</span></a><span data-dcnode-id="4692" instrument_node="">).</span></p></section><section data-dcnode-id="4615" id="s0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4686" id="st030"><span data-dcnode-id="4689" instrument_node="">2</span><span data-dcnode-id="4688" instrument_node="">. </span><span data-dcnode-id="4687" instrument_node="">Are positive illusions beliefs?</span></h2><p data-dcnode-id="4675" id="p0060"><span data-dcnode-id="4685" instrument_node="">What is the status of the assertions research participants make in the positive illusions literature? Are they statements about what people think of themselves and about what they think will happen? Are they mere expressions of hope or desire, or guesses about what could happen? Taylor defines positive illusions as “enduring patterns of beliefs” about self, world, and future (1989, p. 44), and as “systematic small distortions of reality that make things appear better than they are” (1989, p. 228). Based on Taylor’s account of positive illusions, in this paper we understand positive illusions as systematic tendencies either to adopt and maintain excessively optimistic beliefs about the self or to make excessively optimistic predictions about the self, where we understand predictions as beliefs about what will happen or what is likely to happen. This understanding of positive illusions as patterns of beliefs is largely shared in the psychological literature, and compatible with common assumptions about how positive illusions work (cf. </span><a class="workspace-trigger" data-dcnode-id="4683" href="#b0070" name="bb0070"><span data-dcnode-id="4684" instrument_node="">Collard et al., 2016</span></a><span data-dcnode-id="4682" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4680" href="#b0185" name="bb0185"><span data-dcnode-id="4681" instrument_node="">Makridakis and Moleskis, 2015</span></a><span data-dcnode-id="4679" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4677" href="#b0195" name="bb0195"><span data-dcnode-id="4678" instrument_node="">McKay and Dennett, 2009</span></a><span data-dcnode-id="4676" instrument_node="">).</span></p><p data-dcnode-id="4664" id="p0065"><span data-dcnode-id="4674" instrument_node="">As with other cognitive states that are likely to be biased, illusory, or simply badly supported by the evidence, such as self-deception, prejudice, superstition, and delusion, there is some debate about the status of the cognitive states studied in the positive illusions literature (</span><a class="workspace-trigger" data-dcnode-id="4672" href="#b0105" name="bb0105"><span data-dcnode-id="4673" instrument_node="">Flanagan, 2009</span></a><span data-dcnode-id="4671" instrument_node="">), and often positive illusions are described as things people just hope for in the context of health (e.g., </span><a class="workspace-trigger" data-dcnode-id="4669" href="#b0220" name="bb0220"><span data-dcnode-id="4670" instrument_node="">Paley, 2014</span></a><span data-dcnode-id="4668" instrument_node="">) or relationships (e.g., </span><a class="workspace-trigger" data-dcnode-id="4666" href="#b0210" name="bb0210"><span data-dcnode-id="4667" instrument_node="">Murray, Holmes, &amp; Griffin, 1996</span></a><span data-dcnode-id="4665" instrument_node="">). Some of the methodological challenges to the positive illusions approach imply that the participants’ reports are expressions of their desires or hopes for positive outcomes, and thus are not subject to an assessment of rationality in the same way as beliefs would be.</span></p><p data-dcnode-id="4662" id="p0070"><span data-dcnode-id="4663" instrument_node="">People can have different attitudes towards the same propositional content. For instance, take the content “Mary won’t get a divorce”. Mary can believe that she won’t get a divorce. In this first case, Mary is committed to the truth of “Mary won’t get a divorce”, and, if she is a rational believer, her commitment should be guided by her weighing up the evidence for and against the content of her belief. Mary can also desire that she won’t get a divorce. In this second case, Mary wants the world to be such that she won’t get a divorce but she is committed neither to the truth nor to the possibility of what she desires. Mary can hope that she won’t get a divorce. In this third case, Mary is committed to it being a good thing and it being possible that she won’t get a divorce, but she is not committed to its being true that she won’t get a divorce. Believing, desiring, and hoping are what philosophers call “propositional attitudes”, that is, attitudes people can take to a propositional content.</span></p><p data-dcnode-id="4654" id="p0075"><span data-dcnode-id="4661" instrument_node="">One suggestion in the literature on positive illusions is that people have a desire or a hope that they are better than average, or that positive things will happen to them, but are not genuinely committed to the truth of those contents (</span><a class="workspace-trigger" data-dcnode-id="4659" href="#b0105" name="bb0105"><span data-dcnode-id="4660" instrument_node="">Flanagan, 2009</span></a><span data-dcnode-id="4658" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4656" href="#b0110" name="bb0110"><span data-dcnode-id="4657" instrument_node="">Frankish, 2009</span></a><span data-dcnode-id="4655" instrument_node="">). The claim is that, when people assess whether they are better than average in some domain or assess their likelihood of getting a divorce, they reply by expressing something they desire or hope, not something they believe. On this reading, such an optimistic outlook is not necessarily biased or illusory.</span></p><p data-dcnode-id="4649" id="p0080"><span data-dcnode-id="4653" instrument_node="">The so-called ‘optimism bias’ seems to be even better suited to this reading than the better than average effect, given its future orientation. When people say that they will not develop cancer in the course of their lives, are they expressing a belief in how their future will be, or a hope? </span><a class="workspace-trigger" data-dcnode-id="4651" href="#b0105" name="bb0105"><span data-dcnode-id="4652" instrument_node="">Flanagan (2009)</span></a><span data-dcnode-id="4650" instrument_node=""> has argued that positive illusions should be seen as “can do attitudes” or hopes as opposed to false beliefs or misbeliefs. Flanagan argues that to desire or hope for something that conflicts with evidence, and thus is unrealistic, can be beneficial, especially if it leads to positive affect or self-improvement. But to believe something that conflicts with evidence can lead to a distorted picture of reality and have bad psychological consequences.</span></p><p data-dcnode-id="4638" id="p0085"><span data-dcnode-id="4648" instrument_node="">The attractiveness of this position is that it makes one counter-intuitive claim of the positive illusions literature disappear. The counter-intuitive claim is that a set of beliefs or predictions that are biased, illusory, or not based on evidence (and thus </span><em data-dcnode-id="4646"><span data-dcnode-id="4647" instrument_node="">epistemically</span></em><span data-dcnode-id="4645" instrument_node=""> bad) can nonetheless be beneficial (and thus </span><em data-dcnode-id="4643"><span data-dcnode-id="4644" instrument_node="">psychologically</span></em><span data-dcnode-id="4642" instrument_node=""> good). If research participants in the positive illusions literature did express desires or hopes rather than beliefs, both the key claims defended by </span><a class="workspace-trigger" data-dcnode-id="4640" href="#b0315" name="bb0315"><span data-dcnode-id="4641" instrument_node="">Taylor and Brown (1988)</span></a><span data-dcnode-id="4639" instrument_node=""> would be challenged, (i) that illusory beliefs about the self and one’s future are very common in the non-clinical population; and that (ii) such illusory beliefs are beneficial. Taylor and Brown should have said instead that (i∗) optimistic desires and hopes are very widespread in the non-clinical population; and that (ii∗) such desires and hopes have benefits. As a result, their theses would have been much less controversial.</span></p><p data-dcnode-id="4627" id="p0090"><span data-dcnode-id="4637" instrument_node="">The problem with this view is that the statements of research participants in the positive illusions literature are expressed, defended, and acted upon in the same way as beliefs would be. For instance, they lead to action. In contexts as different as gambling, trading in the stock market, starting a new firm, and initiating a war (</span><a class="workspace-trigger" data-dcnode-id="4635" href="#b0185" name="bb0185"><span data-dcnode-id="4636" instrument_node="">Makridakis &amp; Moleskis, 2015</span></a><span data-dcnode-id="4634" instrument_node="">), people appear to rely on their predictions, and this reliance on excessively optimistic predictions turns out to be very costly. Anecdotal evidence and personal experience also provide examples: people assume that their relationships will last, thus arranging for prenuptial agreements that will negatively affect them in the case of a divorce, or take it for granted they will not be affected by a serious disease and thus do not get health insurance. Although desires and hopes can influence action to a significant extent, the connection between desire or hope and action is different from, and often less direct than, the connection between belief and action because only belief carries a commitment to the truth of its content (</span><a class="workspace-trigger" data-dcnode-id="4632" href="#b0015" name="bb0015"><span data-dcnode-id="4633" instrument_node="">Bishop, 2016</span></a><span data-dcnode-id="4631" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4629" href="#b0240" name="bb0240"><span data-dcnode-id="4630" instrument_node="">Schroeder, 2015</span></a><span data-dcnode-id="4628" instrument_node="">).</span></p><p data-dcnode-id="4616" id="p0095"><span data-dcnode-id="4626" instrument_node="">Although it may be methodologically difficult to distinguish beliefs from desires based on people’s statements in an empirical study, we have no good reason to rule out that people believe what they state in the positive illusions literature. After all, beliefs are not always backed up by evidence and are often unresponsive to new evidence (</span><a class="workspace-trigger" data-dcnode-id="4624" href="#b0025" name="bb0025"><span data-dcnode-id="4625" instrument_node="">Bortolotti, 2009</span></a><span data-dcnode-id="4623" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4621" href="#b0065" name="bb0065"><span data-dcnode-id="4622" instrument_node="">Cialdini et al., 1981</span></a><span data-dcnode-id="4620" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4618" href="#b0145" name="bb0145"><span data-dcnode-id="4619" instrument_node="">Hovland et al., 1953</span></a><span data-dcnode-id="4617" instrument_node="">). Agents are not ideally rational in the way they adopt and maintain their beliefs, due to a combination of cognitive limitations and motivational factors.</span></p></section><section data-dcnode-id="4476" id="s0020"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4611" id="st035"><span data-dcnode-id="4614" instrument_node="">3</span><span data-dcnode-id="4613" instrument_node="">. </span><span data-dcnode-id="4612" instrument_node="">When is optimism unrealistic?</span></h2><p data-dcnode-id="4606" id="p0100"><span data-dcnode-id="4610" instrument_node="">In Section </span><a class="workspace-trigger" data-dcnode-id="4608" href="#s0015" name="bs0015"><span data-dcnode-id="4609" instrument_node="">2</span></a><span data-dcnode-id="4607" instrument_node=""> we saw that in the literature unrealistically optimistic attitudes are commonly viewed as biased or illusory beliefs. But what makes them unrealistic?</span></p><section data-dcnode-id="4509" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4602" id="st040"><span data-dcnode-id="4605" instrument_node="">3.1</span><span data-dcnode-id="4604" instrument_node="">. </span><span data-dcnode-id="4603" instrument_node="">Some methodological considerations</span></h3><p data-dcnode-id="4578" id="p0105"><span data-dcnode-id="4601" instrument_node="">Several researchers (</span><a class="workspace-trigger" data-dcnode-id="4599" href="#b0075" name="bb0075"><span data-dcnode-id="4600" instrument_node="">Colvin and Block, 1994</span></a><span data-dcnode-id="4598" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4596" href="#b0080" name="bb0080"><span data-dcnode-id="4597" instrument_node="">Colvin et al., 1995</span></a><span data-dcnode-id="4595" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4593" href="#b0105" name="bb0105"><span data-dcnode-id="4594" instrument_node="">Flanagan, 2009</span></a><span data-dcnode-id="4592" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4590" href="#b0335" name="bb0335"><span data-dcnode-id="4591" instrument_node="">Young, 2014</span></a><span data-dcnode-id="4589" instrument_node="">) have expressed concerns about the methodology adopted in establishing the existence and pervasiveness of positive illusions in the non-clinical population, and the contributions of such illusions to psychological adjustment and mental health (</span><a class="workspace-trigger" data-dcnode-id="4587" href="#b0315" name="bb0315"><span data-dcnode-id="4588" instrument_node="">Taylor &amp; Brown, 1988</span></a><span data-dcnode-id="4582"><span data-dcnode-id="4586" instrument_node="">). Are so-called positive ‘illusions’ really illusory? While this question may arise for other positive illusions as well (when </span><a class="topic-link" data-dcnode-id="4584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/estetrol" title="Learn more about Estelle from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4585" instrument_node="">Estelle</span></a><span data-dcnode-id="4583" instrument_node=""> thinks she is a good friend, she may just have an idiosyncratic understanding of what makes a person a good friend), it is particularly difficult to answer when we are looking at predictions regarding the future. Scientists who aim to show that certain optimistic or self-enhancing beliefs are unwarranted or false face a number of methodological and epistemological problems in establishing falsity in specific cases of optimistically biased belief. The method for assessing whether a belief is unrealistically optimistic also depends on whether researchers are measuring absolute or comparative unrealistic optimism (see </span></span><a class="workspace-trigger" data-dcnode-id="4580" href="#b0290" name="bb0290"><span data-dcnode-id="4581" instrument_node="">Shepperd et al., 2013</span></a><span data-dcnode-id="4579" instrument_node="">).</span></p><p data-dcnode-id="4576" id="p0110"><span data-dcnode-id="4577" instrument_node="">In the case of absolute unrealistic optimism, a prediction is unrealistically positive compared to the objective likelihood of an event occurring. In contrast, in comparative unrealistic optimism, people are unrealistically optimistic about their chances compared to those of others. So the error the individual is making is a different one. The absolutely unrealistic individual is mistaken about their objective risk, or their actuarial risk assessment, whereas the comparatively optimistic individual is unrealistic about their risk relative to that of others.</span></p><p data-dcnode-id="4566" id="p0115"><span data-dcnode-id="4571"><span data-dcnode-id="4575" instrument_node="">Not only are the presence of unrealistic comparative optimism and unrealistic absolute optimism established in different ways, but these two forms of optimism may be uncorrelated. A person may exhibit unrealistic comparative optimism and unrealistic absolute </span><a class="topic-link" data-dcnode-id="4573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/pessimism" title="Learn more about pessimism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4574" instrument_node="">pessimism</span></a><span data-dcnode-id="4572" instrument_node=""> (or vice versa) at the same time.</span></span><a class="workspace-trigger" data-dcnode-id="4568" href="#fn1" name="bfn1"><sup data-dcnode-id="4569"><span data-dcnode-id="4570" instrument_node="">1</span></sup></a><span data-dcnode-id="4567" instrument_node=""> For example, a woman may believe that she is less likely than other women to get breast cancer, while at the same time overestimating her risk relative to the estimate suggested by some objective indicator, such as a risk calculator. Clearly, there are also possible scenarios where an individual exhibits comparative unrealistic optimism and absolute realism or comparative realism and absolute unrealistic optimism. Depending on the case and the kind of unrealistic optimism exhibited, people are mistaken about different things and commit different errors.</span></p><p data-dcnode-id="4549" id="p0120"><span data-dcnode-id="4565" instrument_node="">Most frequently, studies look at comparative and absolute unrealistic optimism at the group level (</span><a class="workspace-trigger" data-dcnode-id="4563" href="#b0300" name="bb0300"><span data-dcnode-id="4564" instrument_node="">Shepperd et al., 2017</span></a><span data-dcnode-id="4562" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4560" href="#b0290" name="bb0290"><span data-dcnode-id="4561" instrument_node="">Shepperd et al., 2013</span></a><span data-dcnode-id="4559" instrument_node="">). Establishing that some of the participants must be overly optimistic in their assessment is reasonably easy to do (though see </span><a class="workspace-trigger" data-dcnode-id="4557" href="#b0130" name="bb0130"><span data-dcnode-id="4558" instrument_node="">Hahn and Harris, 2014</span></a><span data-dcnode-id="4556" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4554" href="#b0135" name="bb0135"><span data-dcnode-id="4555" instrument_node="">Harris and Hahn, 2011</span></a><span data-dcnode-id="4553" instrument_node="">). For example, when 70% of the population take themselves to be less likely to be divorced than the average person, they cannot all be correct. In contrast, it is not possible to establish whether a specific individual is unrealistically optimistic when one doesn’t have access to the individual’s objective or actuarial risk (</span><a class="workspace-trigger" data-dcnode-id="4551" href="#b0290" name="bb0290"><span data-dcnode-id="4552" instrument_node="">Shepperd et al., 2013</span></a><span data-dcnode-id="4550" instrument_node="">).</span></p><p data-dcnode-id="4525" id="p0125"><span data-dcnode-id="4548" instrument_node="">While it is difficult to be certain when an individual has unrealistically optimistic beliefs, it is possible to assess whether an individual </span><em data-dcnode-id="4546"><span data-dcnode-id="4547" instrument_node="">updates</span></em><span data-dcnode-id="4545" instrument_node=""> her beliefs in an optimistically biased manner. A systematically distorted </span><em data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">belief updating</span></em><span data-dcnode-id="4542" instrument_node=""> that takes into account desirable news to a greater extent than undesirable news, is one mechanism that allows individuals to maintain or arrive at unrealistically positive beliefs in the face of disconfirming evidence. In a paradigm introduced by </span><a class="workspace-trigger" data-dcnode-id="4540" href="#b0275" name="bb0275"><span data-dcnode-id="4541" instrument_node="">Sharot, Korn, and Dolan (2011)</span></a><span data-dcnode-id="4539" instrument_node="">, people are asked to provide risk estimates for negative future events, are confronted with base rates for these events and are later asked for an estimate of their own risk again. It has been shown that when people update their initial risk estimates, they tend to incorporate desirable base rate information (i.e., information that risks are lower than expected) to a greater extent than undesirable information (i.e., information that risks are higher than expected). Importantly, according to formal learning theories, the amount of belief updating should depend on the size of the error, i.e., the difference between the expected and the actual outcome, and not on how desirable or undesirable this error was (</span><a class="workspace-trigger" data-dcnode-id="4537" href="#b0245" name="bb0245"><span data-dcnode-id="4538" instrument_node="">Schultz, Dayan, &amp; Montague, 1997</span></a><span data-dcnode-id="4536" instrument_node="">). Thus, the asymmetric reliance on new information dependent on its valence results in larger updates after good news than after bad news, therefore representing a biased learning and supporting the most favorable future outlooks. In a modification of this paradigm, </span><a class="workspace-trigger" data-dcnode-id="4534" href="#b0170" name="bb0170"><span data-dcnode-id="4535" instrument_node="">Kuzmanovic et al., 2015</span></a><span data-dcnode-id="4533" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4531" href="#b0175" name="bb0175"><span data-dcnode-id="4532" instrument_node="">Kuzmanovic et al., 2016</span></a><span data-dcnode-id="4526"><span data-dcnode-id="4530" instrument_node=""> have also shown that individuals show this asymmetric update pattern to a larger extent for themselves than for similar others. Moreover, given that the extent of the asymmetric updating (i.e., the difference between mean updates after good and bad news) can be computed for each single individual, this approach allows to assess </span><a class="topic-link" data-dcnode-id="4528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/optimism-bias" title="Learn more about optimism bias from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4529" instrument_node="">optimism bias</span></a><span data-dcnode-id="4527" instrument_node=""> at the individual level.</span></span></p><p data-dcnode-id="4510" id="p0130"><span data-dcnode-id="4524" instrument_node="">But here too there are methodological problems, because unless we know what base rate a person expected at the beginning, we do not know whether the base rate information they are subsequently given constitutes positive or negative information in their eyes (</span><a class="workspace-trigger" data-dcnode-id="4522" href="#b0260" name="bb0260"><span data-dcnode-id="4523" instrument_node="">Shah, Harris, Bird, Catmur, &amp; Hahn, 2016</span></a><span data-dcnode-id="4521" instrument_node="">). So, for example, if John thinks that the population base rate for heart attacks is 25% and that because of family history, his own likelihood is 35%, then the information that the base rate is 30% is not desirable information, even though it may look that way when we only compare the risk assessment John made for himself and the base rate he was then provided with.</span><a class="workspace-trigger" data-dcnode-id="4518" href="#fn2" name="bfn2"><sup data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">2</span></sup></a><span data-dcnode-id="4517" instrument_node=""> If, on the other hand, John thinks he has a risk of 35% but that the population base rate is 40%, then hearing that the base rate is 35% is welcome news, even though it will look neutral when we just look at the John’s risk estimate and the base rate he was provided with. In a recent study by </span><a class="workspace-trigger" data-dcnode-id="4515" href="#b0165" name="bb0165"><span data-dcnode-id="4516" instrument_node="">Kuzmanovic and Rigoux (unpublished manuscript)</span></a><span data-dcnode-id="4514" instrument_node="">, they controlled for this effect by asking people to estimate population base rates at the beginning of each experimental trial. After that, people estimated their own risk and were then presented with the true population base rate. This procedure ensured a valid assessment of the desirability of the presented base rates, as it was defined according to the difference between the estimated base rate and the presented base rate, and not to the difference between the estimated own risk and the presented base rate. Even after increasing the transparency of how individuals perceive the presented base rates, they still demonstrated the optimism bias in belief updating as they made larger updates after desirable than after undesirable information (the same result has also been revealed by </span><a class="workspace-trigger" data-dcnode-id="4512" href="#b9000" name="bb9000"><span data-dcnode-id="4513" instrument_node="">Garrett &amp; Sharot, 2017</span></a><span data-dcnode-id="4511" instrument_node="">). The asymmetric use of information which is particularly pronounced for predictions regarding oneself provides reasons to think that at least some of the beliefs resulting from such update processes will be false, as the differential use of information should naturally lead to a biased estimate of one’s own prospects.</span></p></section><section data-dcnode-id="4477" id="s0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4505" id="st045"><span data-dcnode-id="4508" instrument_node="">3.2</span><span data-dcnode-id="4507" instrument_node="">. </span><span data-dcnode-id="4506" instrument_node="">Optimistic predictions, positive outcomes, and falsity</span></h3><p data-dcnode-id="4503" id="p0135"><span data-dcnode-id="4504" instrument_node="">Sometimes, there can be confusion as to what exactly is required for an optimistic prediction to be false. Specifically, the question which arises is whether a positive outcome justifies the optimistic prediction post-hoc, making it a true belief. Some deny that an optimistic belief in one’s success can be false if one ends up being successful after all.</span></p><p data-dcnode-id="4494" id="p0140"></p><blockquote data-dcnode-id="4495"><p data-dcnode-id="4501" id="sp0015"><span data-dcnode-id="4502" instrument_node="">“For example, if a basketball team believes that it can beat a statistically better team, and this optimistic belief leads them to beat the statistically better team, then their belief was not false.”</span></p><span data-dcnode-id="4496"><span data-dcnode-id="4500" instrument_node="">(</span><a class="workspace-trigger" data-dcnode-id="4498" href="#b0335" name="bb0335"><span data-dcnode-id="4499" instrument_node="">Young, 2014, p. 550</span></a><span data-dcnode-id="4497" instrument_node="">)</span></span></blockquote><p></p><p data-dcnode-id="4489" id="p0145"><span data-dcnode-id="4493" instrument_node="">It is true that in the case of some optimistic predictions, their truth or falsity can only be established post hoc. If a student believes that she is going to finish in the top 10 percent of her class, this may be objectively unlikely, but only time will tell whether this prediction was correct or not.</span><a class="workspace-trigger" data-dcnode-id="4490" href="#fn3" name="bfn3"><sup data-dcnode-id="4491"><span data-dcnode-id="4492" instrument_node="">3</span></sup></a></p><p data-dcnode-id="4487" id="p0150"><span data-dcnode-id="4488" instrument_node="">But matters are different when people predict the likelihood of an event occurring in terms of a numerical risk estimate. If an event is classified as highly unlikely, the fact that it later occurs does not disprove the judgment that it was highly unlikely. This can be explained with a very simple example: If Liam mistakenly thinks that on a fair dice he has a 1 in 2 chance of throwing a 6, this estimate is not vindicated if he does throw a 6. A positive outcome does not change the fact that the odds of that outcome were low. In other words, it is possible for graded probabilities to be accurate irrespective of the actual outcome. In contrast, if his expectation was that he would roll a 6, this would turn out to be correct if he did roll a six. Another way of seeing that risk estimates which specify probabilities are different from predictions which say that a certain outcome will occur, is the following: If risk estimates could be proved or disproved by subsequent outcomes, then any risk estimate which isn’t either 0 or 1 will automatically be incorrect, it is just impossible to say whether the error lay in being too optimistic or pessimistic before the actual outcome ensues.</span></p><p data-dcnode-id="4485" id="p0155"><span data-dcnode-id="4486" instrument_node="">But in contrast to the dice throwing scenario, it is much harder to calculate the objective likelihood of most life events. Matters are further complicated by the fact that there is a real possibility that, in some areas of life, the thought that a result is achievable makes it more likely that it is in fact achieved. If Timothy had an actuarial risk assessment that placed his likelihood of suffering from a heart-attack at 60%, and he himself estimated it at 30% and lived out his life happily without any heart attacks, it is both possible that the actuarial risk assessment could have been improved by taking further factors into account, or that Timothy was unrealistically optimistic in his estimate. Importantly, he may have been unrealistically optimistic even if his positive beliefs had a beneficial effect on his stress-levels and therefore partially contributed to the fact that he did not have a heart-attack. It may therefore be possible that a belief is both unrealistically optimistic, because it underestimates the chance of a heart attack, and also contributes to the undesirable event not occurring. (So, it could shift his likelihood of suffering an attack from 60% to 50%. This is still higher than his estimate, but lower than it would have been if he hadn’t had the belief. Clearly, this is only a toy example to show what could in principle be the case.)</span></p><p data-dcnode-id="4483" id="p0160"><span data-dcnode-id="4484" instrument_node="">As we have seen, in many cases, it is not easy to assess predictions for their accuracy. In contrast, it is easier to make a case for the claim that an optimistically biased belief regarding the future is badly supported by the evidence. We can say that given the information Timothy had about the risk factors for heart attacks, he had no good reason to assume such a low likelihood of suffering from heart-attack.</span></p><p data-dcnode-id="4478" id="p0165"><span data-dcnode-id="4482" instrument_node="">In conclusion, there are a number of complications in establishing whether any given prediction is in fact incorrect: this may sometimes not be apparent until the actual outcome has occurred, and in other cases we may never know, because we do not know how good the actuarial risk estimate was, especially if someone beats the odds. Furthermore, and relatedly, one and the same prediction can be optimistic, realistic of pessimistic depending on the criterion used to evaluate the estimate. This has clear implications for research on the consequences of unrealistic optimism, as any statements regarding the consequences of unrealistic optimism need to establish whether unrealistic optimism was present in the first place (</span><a class="workspace-trigger" data-dcnode-id="4480" href="#b0300" name="bb0300"><span data-dcnode-id="4481" instrument_node="">Shepperd et al., 2017</span></a><span data-dcnode-id="4479" instrument_node="">).</span></p></section></section><section data-dcnode-id="4408" id="s0035"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4472" id="st050"><span data-dcnode-id="4475" instrument_node="">4</span><span data-dcnode-id="4474" instrument_node="">. </span><span data-dcnode-id="4473" instrument_node="">Are optimistically biased beliefs irrational?</span></h2><p data-dcnode-id="4470" id="p0170"><span data-dcnode-id="4471" instrument_node="">False beliefs and inaccurate predictions, no matter how they were formed, misrepresent how the world is or is going to be. Epistemically irrational beliefs and predictions can be either true or false, but what makes them irrational is that they were not formed on the basis of (sufficiently robust) evidence or are insufficiently responsive to evidence after being adopted.</span></p><p data-dcnode-id="4468" id="p0175"><span data-dcnode-id="4469" instrument_node="">Given this distinction between truth and rationality, falsity or inaccuracy is a red herring when we look at specific beliefs and predictions. Surely, what primarily makes these cognitive states problematic is the worry that they are epistemically irrational. Optimistically biased beliefs and predictions can be true or accurate by luck, and still count as irrational. Alternatively, beliefs can be rational, and still happen to be false or inaccurate.</span></p><p data-dcnode-id="4463" id="p0180"><span data-dcnode-id="4467" instrument_node="">Of course, the fact that people make unrealistically optimistic predictions does not in and of itself tell us anything about the reasoning processes which led to comparative or absolute unrealistic optimism. In some cases, people may exhibit unrealistic absolute optimism because they lack information or have misleading information. Thus, the question becomes whether the way we </span><em data-dcnode-id="4465"><span data-dcnode-id="4466" instrument_node="">acquire or maintain</span></em><span data-dcnode-id="4464" instrument_node=""> unrealistically optimistic beliefs exhibits irrationality.</span></p><p data-dcnode-id="4455" id="p0185"><span data-dcnode-id="4462" instrument_node="">Regarding comparative optimism, one might argue that we should expect judgments about the self and judgments about others to diverge, as people are in a very different epistemic situation regarding themselves and the ‘average other’, and thus a difference in their reasoning is to be expected. One tends to have more detailed information about oneself than about others, let alone the average other, and this may be an important factor underlying optimistically biased beliefs (</span><a class="workspace-trigger" data-dcnode-id="4460" href="#b0060" name="bb0060"><span data-dcnode-id="4461" instrument_node="">Chambers et al., 2003</span></a><span data-dcnode-id="4459" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4457" href="#b0280" name="bb0280"><span data-dcnode-id="4458" instrument_node="">Shepperd et al., 2002</span></a><span data-dcnode-id="4456" instrument_node="">). This asymmetry of information concerns both one’s own history and habits but also intentions and plans. Egocentric thinking skews people’s risk estimates because they have a lot of information about the factors that affect their personal risk, but not the same amount of information about others. So, for example, Victor knows that he does not smoke and goes running regularly, and that this reduces his risk of heart attacks. He does not have the same rich body of information about others, for example, he may not know how his running habits compare to that of others of his age and socio-economic class, so he may give undue weight to this personal information when making risk assessments.</span></p><p data-dcnode-id="4444" id="p0190"><span data-dcnode-id="4454" instrument_node="">However, there is a question to what extent egocentric thinking, too, is irrational, because it unjustifiably ignores the extent to which the things we take to be special about ourselves also apply to others. For example, some authors have argued that people overestimate the importance of their intentions and the amount of control they have relative to others, and that this is in part what underlies unrealistically optimistic expectations for the future (cf. </span><a class="workspace-trigger" data-dcnode-id="4452" href="#b0200" name="bb0200"><span data-dcnode-id="4453" instrument_node="">McKenna, 1993</span></a><span data-dcnode-id="4451" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4449" href="#b0230" name="bb0230"><span data-dcnode-id="4450" instrument_node="">Pronin and Kugler, 2010</span></a><span data-dcnode-id="4448" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4446" href="#b0280" name="bb0280"><span data-dcnode-id="4447" instrument_node="">Shepperd et al., 2002</span></a><span data-dcnode-id="4445" instrument_node="">). In as far as there are other unjustified or ill-considered beliefs underlying optimistic predictions, these inherit the irrationality.</span></p><p data-dcnode-id="4436" id="p0195"><span data-dcnode-id="4443" instrument_node="">In addition, there is evidence that unrealistic optimism is a form of motivated cognition in the sense that people process information that is available to them in a way that favors a certain kind of subjectively desirable conclusion (cf. </span><a class="workspace-trigger" data-dcnode-id="4441" href="#b0150" name="bb0150"><span data-dcnode-id="4442" instrument_node="">Hughes &amp; Zaki, 2015</span></a><span data-dcnode-id="4440" instrument_node="">). Where it can be shown that it is the desirability of certain evidence rather than its availability that influences a reasoning process, and that available evidence is neglected when it is undesirable, we are faced with instances of epistemic irrationality. It appears that such a filtering of information by desirability is what is at work in the cases of selective belief updating we considered earlier. In these cases, people favor certain evidence in order to ‘justify’ the desired belief (</span><a class="workspace-trigger" data-dcnode-id="4438" href="#b0270" name="bb0270"><span data-dcnode-id="4439" instrument_node="">Sharot &amp; Garrett, 2016</span></a><span data-dcnode-id="4437" instrument_node="">).</span></p><p data-dcnode-id="4411" id="p0200"><span data-dcnode-id="4435" instrument_node="">As was explained in the previous section, people make different uses of base rate information in estimating risks for themselves than they do when they estimate risks for others, and they ignore undesirable base rate information when updating beliefs regarding themselves to a larger extent than they do for others. While we may explain the initial base rate neglect as the result of egocentric thinking, this cannot be the explanation for asymmetric updating. Take the example where individuals are asked to provide a base rate estimate as well as a risk estimate for themselves before being given new base rate information and being asked to update (</span><a class="workspace-trigger" data-dcnode-id="4433" href="#b0165" name="bb0165"><span data-dcnode-id="4434" instrument_node="">Kuzmanovic &amp; Rigoux, unpublished manuscript</span></a><span data-dcnode-id="4432" instrument_node="">). If an individual already committed themselves to a relation between their own risk and the base rate, egocentric thinking should have been factored in at this stage. While people may have reasons to think that the base rate is not of great relevance to them (for instance because they think they are different from the average), this should manifest itself in a </span><em data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">symmetric</span></em><span data-dcnode-id="4425"><span data-dcnode-id="4429" instrument_node=""> use of desirable and undesirable base rate information in belief updating (provided that the perceived difference to the average is similar across the events with desirable and undesirable base rates). Moreover, using the Bayesian theorem as a normative benchmark for rational belief updating, it could be shown that participants’ </span><a class="topic-link" data-dcnode-id="4427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/optimism-bias" title="Learn more about optimism bias from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4428" instrument_node="">optimism bias</span></a><span data-dcnode-id="4426" instrument_node=""> was truly irrational, and that their updates deviated more from fully rational ones after bad than after good news (</span></span><a class="workspace-trigger" data-dcnode-id="4423" href="#b0165" name="bb0165"><span data-dcnode-id="4424" instrument_node="">Kuzmanovic &amp; Rigoux, unpublished manuscript</span></a><span data-dcnode-id="4418"><span data-dcnode-id="4422" instrument_node="">). Asymmetric use of information when new base rates are introduced suggests that individuals take on board the information that supports the desired outlook. This interpretation is corroborated by recent findings from </span><a class="topic-link" data-dcnode-id="4420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/neuroimaging-study" title="Learn more about neuroimaging studies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4421" instrument_node="">neuroimaging studies</span></a><span data-dcnode-id="4419" instrument_node="">. </span></span><a class="workspace-trigger" data-dcnode-id="4416" href="#b0175" name="bb0175"><span data-dcnode-id="4417" instrument_node="">Kuzmanovic, Jefferson, and Vogeley (2016)</span></a><span data-dcnode-id="4415" instrument_node=""> were able to provide empirical support for the hypothesis that the positive value of optimistically biased belief updates is tracked by the same neural regions that also track the value of rewards. They demonstrated that the activity in one of the central nodes of the human reward circuitry associated with the processing of positive value (ventromedial prefrontal cortex) was increased both during greater belief updating in response to favorable information, and during not-updating or low updating in reaction to unfavorable information. While these data from belief updating do not comprehensively prove that unrealistically optimistic beliefs are generally irrational, they provide evidence for irrationality because there is an element of motivationally driven distortion of the evidence. This tendency to take on board welcome information and ignore unwelcome information also manifests itself in other areas of self-enhancing belief, such as assessments of one’s own attractiveness and intelligence (cf. </span><a class="workspace-trigger" data-dcnode-id="4413" href="#b0100" name="bb0100"><span data-dcnode-id="4414" instrument_node="">Eil &amp; Rao, 2011</span></a><span data-dcnode-id="4412" instrument_node="">).</span></p><p data-dcnode-id="4409" id="p0205"><span data-dcnode-id="4410" instrument_node="">To recap, it is frequently hard to say whether specific unrealistically optimistic predictions are epistemically irrational. Whether a person is epistemically irrational in her unrealistic optimism will depend on the specifics of the case. One important factor is the information that is available to that person prior to her making a judgement or a prediction. In some cases, the self-assessment or the self-related prediction is justified on the basis of the evidence at hand. However, we have argued that in as far as unrealistically optimistic predictions are maintained by an asymmetric use of desirable and undesirable evidence, they are irrational.</span></p></section><section data-dcnode-id="4317" id="s0040"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4404" id="st055"><span data-dcnode-id="4407" instrument_node="">5</span><span data-dcnode-id="4406" instrument_node="">. </span><span data-dcnode-id="4405" instrument_node="">Are unrealistically optimistic predictions fixed?</span></h2><p data-dcnode-id="4399" id="p0210"><span data-dcnode-id="4403" instrument_node="">We have seen that the </span><a class="topic-link" data-dcnode-id="4401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/optimism-bias" title="Learn more about optimism bias from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4402" instrument_node="">optimism bias</span></a><span data-dcnode-id="4400" instrument_node=""> is pervasive phenomenon. But are unrealistically optimistic beliefs fixed? The answer to this question will depend on the notion of fixity we adopt. Here we shall consider two senses of fixity: beliefs can be fixed when they lack responsiveness to evidence or when they are not sensitive to changes in a person’s life circumstances.</span></p><p data-dcnode-id="4385" id="p0215"><span data-dcnode-id="4398" instrument_node="">Let us start with responsiveness to evidence. There is some controversy in the literature as to the extent to which positive illusions can be revised when counterevidence becomes available. To some extent, optimistic beliefs are sensitive to evidence. It has been shown that some forms of optimism and self-enhancement can be reduced or at least controlled by providing people with more information and making them more accountable for the accuracy of their predictions (e.g., </span><a class="workspace-trigger" data-dcnode-id="4396" href="#b0010" name="bb0010"><span data-dcnode-id="4397" instrument_node="">Barberia et al., 2013</span></a><span data-dcnode-id="4395" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4393" href="#b0250" name="bb0250"><span data-dcnode-id="4394" instrument_node="">Sedikides et al., 2002</span></a><span data-dcnode-id="4392" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4390" href="#b0330" name="bb0330"><span data-dcnode-id="4391" instrument_node="">Weinstein, 1980</span></a><span data-dcnode-id="4389" instrument_node="">). For instance, Sedikides argues that via introspective reflection people can control self-enhancing beliefs at least in the short-term, and that self-assessment is more accurate when people are held accountable for it (</span><a class="workspace-trigger" data-dcnode-id="4387" href="#b0255" name="bb0255"><span data-dcnode-id="4388" instrument_node="">Sedikides, Horton, &amp; Gregg, 2007</span></a><span data-dcnode-id="4386" instrument_node="">). Controlling or reducing self-enhancement and making self-assessment more realistic are likely to translate into more accurate predictions, that is, predictions that do not assume that one is able to influence external events and that one is better than average (more talented, smarter, healthier, trust-worthy as a romantic partner, etc.).</span></p><p data-dcnode-id="4380" id="p0220"><span data-dcnode-id="4384" instrument_node="">Another example comes from the literature on causal illusions. Causal illusions occur when people mistakenly believe that one event caused another just because they experienced them in close temporal succession (</span><a class="workspace-trigger" data-dcnode-id="4382" href="#b0190" name="bb0190"><span data-dcnode-id="4383" instrument_node="">Matute et al., 2015</span></a><span data-dcnode-id="4381" instrument_node="">). Causal illusions are pervasive and usually inflate people’s sense of control over external events. Matute and colleagues show that there are educational interventions that can be efficacious in reducing causal illusions. Beliefs caused by causal illusions can be challenged when people are provided with details of an alternative cause for the same outcome. For instance, if a group of people who rely on agriculture for their food and have only a superficial understanding of the weather notice that a dance is followed by rain, they may come to believe that the dance was instrumental in bringing about the rain. This may be the beginning of a superstitious belief in the effectiveness of rain dances. When the group acquires a better scientific understanding of the weather and its causes, they may realise that their dance has no effect on the weather, and the causal illusion may disappear. Examples such as these suggest that beliefs due to causal illusions are resistant to counterevidence but can be revised. Often causal illusions are the basis for inaccurate predictions, and thus eliminating such illusions may also help get rid of some instances of optimism bias.</span></p><p data-dcnode-id="4366" id="p0230"><span data-dcnode-id="4379" instrument_node="">Taylor makes the explicit claim that optimistically biased beliefs are not as fixed as delusional beliefs are, but are flexible and can be adjusted (</span><a class="workspace-trigger" data-dcnode-id="4377" href="#b0310" name="bb0310"><span data-dcnode-id="4378" instrument_node="">Taylor, 1989</span></a><span data-dcnode-id="4376" instrument_node="">). As we saw, people are known to update their self-related predictions in the light of new evidence, but they tend to do so to a greater extent when the new information is desirable and indicates that their previous estimates were pessimistic. Moreover, people tend to be more optimistic about events that they know they can partially control, and less optimistic just before receiving outcome feedback (</span><a class="workspace-trigger" data-dcnode-id="4374" href="#b0305" name="bb0305"><span data-dcnode-id="4375" instrument_node="">Sweeny, Carroll, &amp; Shepperd, 2006</span></a><span data-dcnode-id="4373" instrument_node="">). While they may give up their optimistic predictions in order to brace for bad news, people also tend to avoid situations that would cause disappointment, that is, situations in which their optimistic beliefs and predictions could be easily disproved (</span><a class="workspace-trigger" data-dcnode-id="4371" href="#b0005" name="bb0005"><span data-dcnode-id="4372" instrument_node="">Armor and Taylor, 1998</span></a><span data-dcnode-id="4370" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4368" href="#b0215" name="bb0215"><span data-dcnode-id="4369" instrument_node="">Neff and Geers, 2013</span></a><span data-dcnode-id="4367" instrument_node="">). Although this is evidence of some flexibility in the optimism bias, it does not support the claim that people are responsive to evidence in an epistemically rational way when it comes to their optimistically biased beliefs and predictions. Rather, the hypothesis is that optimism is strategically enhanced when fewer opportunities for it to be disconfirmed are available.</span></p><p data-dcnode-id="4343" id="p0235"><span data-dcnode-id="4365" instrument_node="">Thus, responsiveness to counterevidence seems to be a feature of optimistically biased beliefs only in some contexts, and the way beliefs are updated remains hostage to cognitive and motivational biases. It is easier to make a case for the optimism bias and other positive illusions being sensitive to life circumstances. People tend to be less optimistic about experiencing a negative event in the future if they have already experienced it in the past (cf. </span><a class="workspace-trigger" data-dcnode-id="4363" href="#b0045" name="bb0045"><span data-dcnode-id="4364" instrument_node="">Campbell et al., 2007</span></a><span data-dcnode-id="4362" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4360" href="#b0285" name="bb0285"><span data-dcnode-id="4361" instrument_node="">Shepperd et al., 2003</span></a><span data-dcnode-id="4359" instrument_node="">). For example, children of divorced parents are more likely to accurately predict the likelihood of divorce (</span><a class="workspace-trigger" data-dcnode-id="4357" href="#b0115" name="bb0115"><span data-dcnode-id="4358" instrument_node="">Franklin, Janoff-Bulman, &amp; Roberts, 1990</span></a><span data-dcnode-id="4356" instrument_node="">). More generally, positive illusions are very strong in young people with relatively happy childhoods (</span><a class="workspace-trigger" data-dcnode-id="4354" href="#b0050" name="bb0050"><span data-dcnode-id="4355" instrument_node="">Carr, 2011, p. 89</span></a><span data-dcnode-id="4353" instrument_node="">), especially if their parents adopted an optimistic explanatory style for external events, and attributed positive outcomes to internal and stable features of their children. It has been argued that positive illusions are hardwired due to their significant biological adaptiveness (</span><a class="workspace-trigger" data-dcnode-id="4351" href="#b0195" name="bb0195"><span data-dcnode-id="4352" instrument_node="">McKay &amp; Dennett, 2009</span></a><span data-dcnode-id="4350" instrument_node="">), but they can also be fostered by a parenting style that is warm and supportive (</span><a class="workspace-trigger" data-dcnode-id="4348" href="#b0225" name="bb0225"><span data-dcnode-id="4349" instrument_node="">Peterson, 2000</span></a><span data-dcnode-id="4347" instrument_node="">), reduced in children with depressed parents, or seriously compromised by “child abuse and neglect” (</span><a class="workspace-trigger" data-dcnode-id="4345" href="#b0050" name="bb0050"><span data-dcnode-id="4346" instrument_node="">Carr, 2011, p. 92</span></a><span data-dcnode-id="4344" instrument_node="">).</span></p><p data-dcnode-id="4335" id="p0240"><span data-dcnode-id="4342" instrument_node="">Such fluctuations are common later in life as well, and are also largely dependent on circumstances. There is evidence that unrealistic optimism is higher in childhood and old age but lower in middle age (</span><a class="workspace-trigger" data-dcnode-id="4340" href="#b0205" name="bb0205"><span data-dcnode-id="4341" instrument_node="">Moutsiana et al., 2013</span></a><span data-dcnode-id="4339" instrument_node="">), negatively correlating with stress and positively correlating with subjective wellbeing. People tend to be more optimistic in safe environments, but when it becomes important to identify threats and danger, they are more prone to updating beliefs in the face of negative information. Indeed, it has been shown that people who are stressed learn better from negative information (</span><a class="workspace-trigger" data-dcnode-id="4337" href="#b0120" name="bb0120"><span data-dcnode-id="4338" instrument_node="">Garrett et al., Unpublished results</span></a><span data-dcnode-id="4336" instrument_node="">).</span></p><p data-dcnode-id="4318" id="p0245"><span data-dcnode-id="4334" instrument_node="">In people who experience low mood and are prone to depressive symptoms, self-related judgements and predictions are more realistic, at least in some domains. In this population there is a lower vulnerability to positive illusions in general (</span><a class="workspace-trigger" data-dcnode-id="4332" href="#b0125" name="bb0125"><span data-dcnode-id="4333" instrument_node="">Garrett et al., 2014</span></a><span data-dcnode-id="4331" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4329" href="#b0155" name="bb0155"><span data-dcnode-id="4330" instrument_node="">Korn et al., 2014</span></a><span data-dcnode-id="4328" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4326" href="#b0335" name="bb0335"><span data-dcnode-id="4327" instrument_node="">Young, 2014</span></a><span data-dcnode-id="4325" instrument_node="">), which also affect the realism of self-related predictions (but see </span><a class="workspace-trigger" data-dcnode-id="4323" href="#b0095" name="bb0095"><span data-dcnode-id="4324" instrument_node="">Dunning &amp; Story, 1991</span></a><span data-dcnode-id="4322" instrument_node="">). But even in people who do not experience low moods or depression, a loss of positive illusions is experienced when adversities strike. People who become victims of abuse or suffer trauma, and their care-givers, become (temporarily) less optimistic in their self-related beliefs and predictions (“Bad things really happen, and I cannot do anything to avoid them”) (</span><a class="workspace-trigger" data-dcnode-id="4320" href="#b0020" name="bb0020"><span data-dcnode-id="4321" instrument_node="">Bloom, 2003</span></a><span data-dcnode-id="4319" instrument_node="">). This suggests that life circumstances can have an effect on whether and to what extent the optimism bias and other positive illusions are manifested.</span></p></section><section data-dcnode-id="4296" id="s0045"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4313" id="st060"><span data-dcnode-id="4316" instrument_node="">6</span><span data-dcnode-id="4315" instrument_node="">. </span><span data-dcnode-id="4314" instrument_node="">Conclusion</span></h2><p data-dcnode-id="4311" id="p0250"><span data-dcnode-id="4312" instrument_node="">In this paper we attempted to shed light on the extent to which unrealistic optimism and other positive illusions are belief-like, false or inaccurate, epistemically irrational, and fixed.</span></p><p data-dcnode-id="4309" id="p0255"><span data-dcnode-id="4310" instrument_node="">We suggested that there is no reason to rule out that optimistically biased cognitive states are beliefs as opposed to desires or hopes. Optimistically biased beliefs and predictions share the features of other types of beliefs and predictions, and lead people to act in the way we would expect if people were genuinely committed to their content being true.</span></p><p data-dcnode-id="4307" id="p0260"><span data-dcnode-id="4308" instrument_node="">When it comes to the illusory nature of unrealistic optimism and the other positive illusions, there are important methodological difficulties that need to be addressed. Nevertheless, the evidence suggests that these beliefs are in many cases genuinely unrealistic and do not merely constitute positive expectations. They also exhibit features of irrationality, because they seem to be formed and upheld by a use of information that is less than rational. In some cases, people give undue weight to knowledge of their own plans and intentions, in others they take on board desirable information while neglecting undesirable information.</span></p><p data-dcnode-id="4299" id="p0265"><span data-dcnode-id="4306" instrument_node="">One aspect of the epistemic irrationality of optimistically biased beliefs and predictions is the fact that their responsiveness to counter-evidence is limited. But such beliefs are not fixed as people’s predictions are affected by experience with the events they predict. Also, some interventions are successful in reducing self-enhancement in self-related beliefs (</span><a class="workspace-trigger" data-dcnode-id="4304" href="#b0255" name="bb0255"><span data-dcnode-id="4305" instrument_node="">Sedikides et al., 2007</span></a><span data-dcnode-id="4303" instrument_node="">), and in disclosing illusory nature of some causal relations
