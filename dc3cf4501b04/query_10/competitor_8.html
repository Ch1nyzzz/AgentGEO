 among events (</span><a class="workspace-trigger" data-dcnode-id="4301" href="#b0190" name="bb0190"><span data-dcnode-id="4302" instrument_node="">Matute et al., 2015</span></a><span data-dcnode-id="4300" instrument_node="">), which are the basis for unrealistically optimistic predictions. Finally, unrealistic optimism fluctuates with developmental stages and life circumstances, being more prominent in happy childhoods and old age, and temporarily disappearing after trauma, abuse, victimisation, and other adversities.</span></p><p data-dcnode-id="4297" id="p0270"><span data-dcnode-id="4298" instrument_node="">We hope that the issues discussed in the paper help clarify the nature of unrealistic optimism, and are highly optimistic that they will also be relevant to future investigations of its adaptiveness.</span></p></section></div><section data-dcnode-id="4276" id="ak005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4293" id="st065"><span data-dcnode-id="4294" instrument_node="">Acknowledgments</span></h2><p data-dcnode-id="4291" id="p0275"><span data-dcnode-id="4292" instrument_node="">We would like to thank James Shepherd, Constantine Sedikides, and Miriam McCormick for helpful feedback on the issues discussed in this paper. We have also profited from presentations and discussion of the topics under consideration at the workshop ‘Optimism – Its Nature, Causes and Effects’ at Senate House, London in February 2016.</span></p><p data-dcnode-id="4277" id="p0280"><span data-dcnode-id="4290" instrument_node="">In the preparation of this paper, Anneli Jefferson and Lisa Bortolotti acknowledge the support of Hope and Optimism: Conceptual and Empirical Investigations, a funding initiative by the </span><span data-dcnode-id="4288" id="gp005"><span data-dcnode-id="4289" instrument_node="">Templeton Foundation</span></span><span data-dcnode-id="4287" instrument_node="">, for a project entitled ‘Costs and Benefits of Optimism’ [grant ID </span><a data-dcnode-id="4285" href="#gp005"><span data-dcnode-id="4286" instrument_node="">46501</span></a><span data-dcnode-id="4284" instrument_node="">]. Lisa Bortolotti also acknowledges the support of a </span><span data-dcnode-id="4282" id="gp010"><span data-dcnode-id="4283" instrument_node="">European Research Council Consolidator Grant</span></span><span data-dcnode-id="4281" instrument_node=""> [grant agreement </span><a data-dcnode-id="4279" href="#gp010"><span data-dcnode-id="4280" instrument_node="">616358</span></a><span data-dcnode-id="4278" instrument_node="">] for a project entitled ‘Pragmatic and Epistemic Role of Factually Erroneous Cognitions and Thoughts’ (PERFECT).</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="4268"><button class="button button-anchor" data-dcnode-id="4272" type="button"><span class="button-text" data-dcnode-id="4273"><span data-dcnode-id="4274" instrument_node="">Special issue articles</span></span></button><button class="button button-anchor" data-dcnode-id="4269" type="button"><span class="button-text" data-dcnode-id="4270"><span data-dcnode-id="4271" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="4267"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="423" id="bi005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="424" id="bs005"><dl class="references" data-dcnode-id="425" id="reference-links-bs005"><dt class="label" data-dcnode-id="4262"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="4263" href="#bb0005" id="ref-id-b0005"><span data-dcnode-id="4264" instrument_node="">Armor and Taylor, 1998</span></a></dt><dd class="reference" data-dcnode-id="4194" id="h0005"><div class="contribution" data-dcnode- d="citing-articles-article0-title"><span data-dcnode-id="418" instrument_node="">The psychology of mineral wealth: Empirical evidence from Kazakhstan</span></h3></a><div class="article-source ellipsis" data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">2022, Resources Policy</span></div></div><div class="buttons" data-dcnode-id="407"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="408" type="button"><span class="button-link-text" data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="409" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="410"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="402"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="403" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="404"><p data-dcnode-id="405" id="abspara0010"><span data-dcnode-id="406" instrument_node="">Despite rapidly-expanding academic and policy interest in the links between natural resource wealth and development failures – commonly referred to as the ‘resource curse’ – little attention has been devoted to the psychology behind the phenomenon. Rent-seeking and excessive reliance on mineral revenues can be attributed largely to social psychology. Mineral booms (whether due to the discovery of mineral reserves or to the drastic rise in commodity prices) start as positive income shocks that can subsequently evolve into influential and expectation-changing public and media narratives; these lead consecutively to unrealistic demands that favor immediate consumption of accrued mineral revenues and to the postponement of productive investment. To our knowledge, this paper is the first empirical analysis that tests hypotheses regarding the psychological underpinnings of resource mismanagement in mineral-rich states. Our study relies on an extensive personal survey (of 1977 respondents) carried out in Almaty, Kazakhstan, between May and August 2018. We find empirical support for a positive link between exposure to news and inflated expectations regarding mineral availability, as well as evidence that the latter can generate preferences for excessive consumption, and hence, rent-seeking.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="383"><div class="sub-heading" data-dcnode-id="395"><a data-dcnode-id="398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0956713522000019" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="399" id="citing-articles-article1-title"><span data-dcnode-id="400" instrument_node="">Risk perception of food chemicals and technologies in the Midwest of Brazil: A population-based cross-sectional survey</span></h3></a><div class="article-source ellipsis" data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">2022, Food Control</span></div></div><div class="buttons" data-dcnode-id="389"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="390" type="button"><span class="button-link-text" data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="391" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="392"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="384"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="385" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="386"><p data-dcnode-id="387" id="abspara0010"><span data-dcnode-id="388" instrument_node="">This cross-sectional study aimed to assess the risk perception of three different population groups in the Federal District, Midwest Brazil, regarding chemical and technological risks related to food. An objective questionnaire was applied from May 2018 to January 2020 to 1,000 individuals in supermarkets, universities (only students) and hospitals/clinics. Risk perception was assessed through five general questions, and the degree of worry regarding 11 food-related hazards measured by a three-point scale (low, medium and high). The impact of belonging to a group and of sociodemographic variables on the worry level was assessed by multinomial logistic regression and expressed as Odds Ratio (OR). Over 80% of the participants had high or medium worry level about the presence of chemicals in food, hospital/clinic group having significantly higher level than the university group. Heavy metals had a significant higher worry score than all other hazards (2.76&nbsp;±&nbsp;0.55) and was the only hazard that was not impacted by the group or any sociodemographic variable. Nanotechnology had a significantly lower score than all others hazards and, along with mycotoxins, was the most unfamiliar term to the respondents. In the adjusted multinomial model, older individuals, those interviewed in hospital/clinic, and women showed significantly greater risk perception to most hazards. Income and education exerted less effect, except for the technologies, which significantly caused more worry among individuals with lower income and/or education. The results of this study can help government authorities in the implementation of effective risk communication strategies aimed at different population segments.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="359"><div class="sub-heading" data-dcnode-id="377"><a data-dcnode-id="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2211368121000590" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="381" id="citing-articles-article2-title"><span data-dcnode-id="382" instrument_node="">“It Won't Happen to Us”: Unrealistic Optimism Affects COVID-19 Risk Assessments and Attitudes Regarding Protective Behaviour</span></h3></a><div class="article-source ellipsis" data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">2021, Journal of Applied Research in Memory and Cognition</span></div></div><div class="buttons" data-dcnode-id="371"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="372" type="button"><span class="button-link-text" data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="373" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="374"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="360"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="361" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="362"><p data-dcnode-id="363" id="sp0005"><span data-dcnode-id="370" instrument_node="">People generally believe that their own future will be better than the one of comparable others. Robust evidence documents such unrealistic optimism in many domains of life. Here, we examine how unrealistic optimism may affect people’s risk assessments of COVID-19 infection as well as their attitudes regarding behaviours intended to protect against contagion. In two studies conducted in the USA (</span><em data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">N</span></em><span data-dcnode-id="367" instrument_node="">&nbsp;=&nbsp;160) and UK (</span><em data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">N</span></em><span data-dcnode-id="364" instrument_node="">&nbsp;=&nbsp;161), at different times during the pandemic, we show that participants considered the likelihood of contracting and carrying the infection lower for themselves and their close other compared to an acquaintance, while they considered the likelihood of engaging in protective behaviours higher for themselves and their close other than an acquaintance. The findings document unrealistic optimism in relation to COVID-19. Such biases are particularly critical in relation to infectious diseases, where underestimating the risk for both oneself and close others may reduce precautions and increase virus spreading.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="332"><div class="sub-heading" data-dcnode-id="353"><a data-dcnode-id="356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1472648320305319" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="357" id="citing-articles-article3-title"><span data-dcnode-id="358" instrument_node="">‘Luckily, I don't believe in statistics’: survey of women's understanding of chance of success with futile fertility treatments</span></h3></a><div class="article-source ellipsis" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">2021, Reproductive BioMedicine Online</span></div></div><div class="buttons" data-dcnode-id="347"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="348" type="button"><span class="button-link-text" data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="349" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="350"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="333"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="334" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="335"><p data-dcnode-id="345" id="spara005"><span data-dcnode-id="346" instrument_node="">Why are women who face poor prognoses for success in assisted reproductive technology (ART) treatment choosing to pursue procedures using their own eggs, despite receiving information that their chances of success are very low.</span></p><p data-dcnode-id="343" id="spara006"><span data-dcnode-id="344" instrument_node="">Cross-sectional study based on an anonymous questionnaire distributed to women aged between 43 and 45 years, undergoing ART using their own oocytes, at six public outpatient fertility clinics and three public in-hospital IVF units in Israel between 2015 and 2016. The main outcome measure was personal estimation of chance to achieve a live birth after the current ART treatment cycle and the cumulative estimated rate after all the treatment cycles the patient intended to undergo.</span></p><p data-dcnode-id="338" id="spara007"><span data-dcnode-id="342" instrument_node="">Response rate was 70.0%, with 91 participants of mean age 43.8 ± 0.7 years. Participants estimated their delivery rates after the next ART treatment cycle at 49.0 ± 31.8% (response rate 93.4%) and their cumulative delivery rates after all the ART treatments they would undergo at 57.7 ± 36.3% (response rate 90.1%). This is significantly higher than the predicted success rates of 5% and 15%, respectively (both </span><em data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">P</span></em><span data-dcnode-id="339" instrument_node=""> &lt; 0.001), which are based on national register data. Nearly one-half of patients rated themselves as having a better than average chance of conception (47.3%).</span></p><p data-dcnode-id="336" id="spara008"><span data-dcnode-id="337" instrument_node="">Women do not pursue futile treatments because they lack information. Despite being informed of the low success rates of conception using ART treatments, many patients of advanced maternal age have unrealistically high expectations from ART, essentially ignoring their estimated prognosis when deciding on treatment continuation. Future work should examine the psychological reasons behind continuing futile fertility treatments.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="321"><div class="sub-heading" data-dcnode-id="326"><a data-dcnode-id="329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.29333/ejgm/11548" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="330" id="citing-articles-article4-title"><span data-dcnode-id="331" instrument_node="">Hope and Irrational Beliefs Among Male Prisoners: The Comparative Effectiveness of Existential Therapy (ET) and Acceptance and Commitment Therapy (ACT)</span></h3></a><div class="article-source ellipsis" data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">2022, Electronic Journal of General Medicine</span></div></div><div class="buttons" data-dcnode-id="325"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="322"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="323" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="324"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="310"><div class="sub-heading" data-dcnode-id="315"><a data-dcnode-id="318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/record.url%3FpartnerID%3D10%26rel%3D3.0.0%26view%3Dbasic%26eid%3D2-s2.0-85127190057%26md5%3D74a84eb462c51e6eee1f9e87703a5b95" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="319" id="citing-articles-article5-title"><span data-dcnode-id="320" instrument_node="">Does Consumer Over-Optimism Affect Real Economic Activity?</span></h3></a><div class="article-source ellipsis" data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">2022, SSRN</span></div></div><div class="buttons" data-dcnode-id="314"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="311"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="312" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="313"></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85004191416%26md5%3De818229ab8ac7e37775ff8a670926b" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="307" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="308"></path></svg><span class="button-alternative-text" data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="275"><dl class="footnote" data-dcnode-id="292"><dt class="footnote-label" data-dcnode-id="296"><sup data-dcnode-id="297"><a data-dcnode-id="298" href="#bfn1"><span data-dcnode-id="299" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="293"><p data-dcnode-id="294" id="np005"><span data-dcnode-id="295" instrument_node="">We thank James Shepperd for drawing this point to our attention.</span></p></dd></dl><dl class="footnote" data-dcnode-id="284"><dt class="footnote-label" data-dcnode-id="288"><sup data-dcnode-id="289"><a data-dcnode-id="290" href="#bfn2"><span data-dcnode-id="291" instrument_node="">2</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="285"><p data-dcnode-id="286" id="np010"><span data-dcnode-id="287" instrument_node="">The example of heart attack may be considered problematic because the term heart attack is imprecise, which leads to imprecise the statistics. However, for the purposes of explaining our point, the actual data are not significant, rather the relation between the (fictional) numbers in the example is.</span></p></dd></dl><dl class="footnote" data-dcnode-id="276"><dt class="footnote-label" data-dcnode-id="280"><sup data-dcnode-id="281"><a data-dcnode-id="282" href="#bfn3"><span data-dcnode-id="283" instrument_node="">3</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="277"><p data-dcnode-id="278" id="np015"><span data-dcnode-id="279" instrument_node="">Alternatively, we may deny that future contingents have a truth value at the time they are made. We will disregard this problem here.</span></p></dd></dl></div><div class="Copyright" data-dcnode-id="272"><span class="copyright-line" data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">© 2016 The Authors. Published by Elsevier Inc.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-
