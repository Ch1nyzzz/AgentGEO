te half_rhythm" data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">Received 2016 May 12; Revised 2016 Oct 5; Accepted 2016 Oct 5.</span></div></div><div class="permissions half_rhythm hide" data-dcnode-id="3653" id="idm139931908372976_cpl" style="display:none"><div class="fm-copyright half_rhythm" data-dcnode-id="3656"><a data-dcnode-id="3658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/about/copyright/"><span data-dcnode-id="3659" instrument_node="">Copyright</span></a><span data-dcnode-id="3657" instrument_node=""> © 2016 The Authors</span></div><div class="license half_rhythm" data-dcnode-id="3654"><span data-dcnode-id="3655" instrument_node="">This is an open access article under the CC BY-NC-ND license (http://creativecommons.org/licenses/by-nc-nd/4.0/).</span></div></div></div><div aria-label="Related or updated information about this article." class="links-box whole_rhythm" data-dcnode-id="3646" id="pmclinksbox" role="complementary"><div data-dcnode-id="3647"><span data-dcnode-id="3651" instrument_node="">This article has been </span><a data-dcnode-id="3649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5380125/citedby/"><span data-dcnode-id="3650" instrument_node="">cited by</span></a><span data-dcnode-id="3648" instrument_node=""> other articles in PMC.</span></div></div></div><div class="sec" data-dcnode-id="3644"></div><div class="tsec sec" data-dcnode-id="3628" id="ab010" lang="en"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3640"><span data-dcnode-id="3641" role="menubar"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3642" href="#" role="menuitem" title="Go to other sections in this page"><span data-dcnode-id="3643" instrument_node="">Go to:</span></a></span></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3638" id="ab010title"><span data-dcnode-id="3639" instrument_node="">Abstract</span></h2><div data-dcnode-id="3634"><p class="p p-first-last" data-dcnode-id="3635" id="__p6"><span data-dcnode-id="3636" instrument_node="">Here we consider the nature of unrealistic optimism and other related positive illusions. We are interested in whether cognitive states that are unrealistically optimistic are belief states, whether they are false, and whether they are epistemically irrational. We also ask to what extent unrealistically optimistic cognitive states are fixed. Based on the classic and recent empirical literature on unrealistic optimism, we offer some preliminary answers to these questions, thereby laying the foundations for answering further questions about unrealistic optimism, such as whether it has biological, psychological, or epistemic benefits.</span></p></div><div class="sec" data-dcnode-id="3629"><strong class="kwd-title" data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node="">Keywords: </span></strong><span class="kwd-text" data-dcnode-id="3630"><span data-dcnode-id="3631" instrument_node="">Positive illusions, Unrealistic optimism, Optimism bias, Belief update, Irrationality</span></span></div></div><div class="tsec sec" data-dcnode-id="3583" id="s0005"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3625"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3626" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3627" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3623" id="s0005title"><span data-dcnode-id="3624" instrument_node="">0. Introduction</span></h2><p class="p p-first" data-dcnode-id="3603" id="__p7"><span data-dcnode-id="3622" instrument_node="">In this paper we are interested in the nature of unrealistic optimism and other positive illusions as discussed in the psychological literature. There is an ongoing debate in philosophy and psychology as to whether false beliefs are epistemically irrational and whether they can have pragmatic benefits, even if they are epistemically irrational (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3620" href="#b0035" rid="b0035" role="button"><span data-dcnode-id="3621" instrument_node="">Bortolotti and Sullivan-Bissett, 2015</span></a><span data-dcnode-id="3619" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3617" href="#b0085" rid="b0085" role="button"><span data-dcnode-id="3618" instrument_node="">Craigie and Bortolotti, 2014</span></a><span data-dcnode-id="3616" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3614" href="#b0140" rid="b0140" role="button"><span data-dcnode-id="3615" instrument_node="">Haselton and Nettle, 2006</span></a><span data-dcnode-id="3613" instrument_node="">). Beliefs exhibit epistemic irrationality to the extent that they are badly supported by the evidence available to the agent, or are maintained despite counter-evidence which is available to the agent. It is sometimes claimed that positive illusions generally, and unrealistic optimism specifically, are systematic tendencies to form beliefs that are biased, and often false, but have significant benefits (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3611" href="#b0315" rid="b0315" role="button"><span data-dcnode-id="3612" instrument_node="">Taylor and Brown, 1988</span></a><span data-dcnode-id="3610" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3608" href="#b0320" rid="b0320" role="button"><span data-dcnode-id="3609" instrument_node="">Taylor and Brown, 1994</span></a><span data-dcnode-id="3607" instrument_node="">), because they increase wellbeing, contribute to mental and physical health, and support productivity and motivation (cf. </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3605" href="#b0030" rid="b0030" role="button"><span data-dcnode-id="3606" instrument_node="">Bortolotti &amp; Antrobus, 2015</span></a><span data-dcnode-id="3604" instrument_node="">).</span></p><p data-dcnode-id="3601" id="__p8"><span data-dcnode-id="3602" instrument_node="">In order to assess such claims, we need to explain what unrealistic optimism is, whether the cognitive states that are unrealistically optimistic are belief states, and to what extent they are false. If such cognitive states can be said to be false or epistemically irrational beliefs, then they are candidates for being false or epistemically irrational beliefs that are useful. Whether they do indeed have positive effects is beyond the scope of this paper.</span></p><p class="p p-last" data-dcnode-id="3584" id="__p9"><span data-dcnode-id="3600" instrument_node="">In Section </span><a class="sec" data-dcnode-id="3598" href="#s0010" rid="s0010"><span data-dcnode-id="3599" instrument_node="">1</span></a><span data-dcnode-id="3597" instrument_node="">, we distinguish between unrealistic optimism and other positive illusions and explain different ways of operationalizing unrealistic optimism. In Section </span><a class="sec" data-dcnode-id="3595" href="#s0015" rid="s0015"><span data-dcnode-id="3596" instrument_node="">2</span></a><span data-dcnode-id="3594" instrument_node="">, we ask how we should think about positive illusions. Are they tendencies to adopt and maintain positive beliefs and to make predictions that are optimistically biased, or to express desires and hopes about the self and the future? We suggest that we should understand optimistically biased cognitive states as beliefs and predictions. In Sections </span><a class="sec" data-dcnode-id="3592" href="#s0020" rid="s0020"><span data-dcnode-id="3593" instrument_node="">3</span></a><span data-dcnode-id="3591" instrument_node="">, </span><a class="sec" data-dcnode-id="3589" href="#s0035" rid="s0035"><span data-dcnode-id="3590" instrument_node="">4</span></a><span data-dcnode-id="3588" instrument_node="">, we consider their epistemic status. Are they typically false? Are they epistemically irrational? The answers to these questions will be informed by an analysis of the extent to which optimistically biased beliefs and predictions are fixed. In Section </span><a class="sec" data-dcnode-id="3586" href="#s0040" rid="s0040"><span data-dcnode-id="3587" instrument_node="">5</span></a><span data-dcnode-id="3585" instrument_node=""> we discuss two ways of understanding fixity of beliefs, i.e., whether beliefs are responsive to evidence and whether they are sensitive to life circumstances. Throughout the paper we reflect on a number of methodological challenges in the empirical study of optimism.</span></p></div><div class="tsec sec" data-dcnode-id="3530" id="s0010"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3580"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3581" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3582" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3578" id="s0010title"><span data-dcnode-id="3579" instrument_node="">1. Unrealistic optimism and other positive illusions</span></h2><p class="p p-first" data-dcnode-id="3561" id="__p10"><span data-dcnode-id="3577" instrument_node="">While several other forms of positive illusions have been identified in the psychological literature (e.g., self-serving bias and wishful thinking, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3575" href="#b0160" rid="b0160" role="button"><span data-dcnode-id="3576" instrument_node="">Krizan and Windschitl, 2009</span></a><span data-dcnode-id="3574" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3572" href="#b0295" rid="b0295" role="button"><span data-dcnode-id="3573" instrument_node="">Shepperd et al., 2008</span></a><span data-dcnode-id="3571" instrument_node="">), we will consider the following three forms: (1) the illusion of control, which is an exaggerated belief in one’s capacity to control independent, external events (e.g., </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3569" href="#b0180" rid="b0180" role="button"><span data-dcnode-id="3570" instrument_node="">Langer &amp; Roth, 1975</span></a><span data-dcnode-id="3568" instrument_node="">); (2) the better than average effect (sometimes also called the superiority illusion), which is the perception of oneself, one’s past behaviour, and one’s lasting features as more positive than is the case (“I am more talented than the average person”) (e.g., </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3566" href="#b0040" rid="b0040" role="button"><span data-dcnode-id="3567" instrument_node="">Brown, 2012</span></a><span data-dcnode-id="3565" instrument_node="">); (3) unrealistic optimism, which is the “tendency for people to believe that they are less likely to experience negative events and more likely to experience positive events than are other people” (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3563" href="#b0280" rid="b0280" role="button"><span data-dcnode-id="3564" instrument_node="">Shepperd, Carroll, Grace, &amp; Terry, 2002, p. 65</span></a><span data-dcnode-id="3562" instrument_node="">). In our paper, we use the expressions ‘unrealistic optimism’ and ‘optimism bias’ interchangeably, which is common practice in the literature.</span></p><p data-dcnode-id="3550" id="__p11"><span data-dcnode-id="3560" instrument_node="">Here are some examples of positive illusions. Instances of the illusion of control can be found in a casino, where people tend to think that they have a better chance at winning when they are the ones rolling the dice, and thus they bet more money in those circumstances (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3558" href="#b0325" rid="b0325" role="button"><span data-dcnode-id="3559" instrument_node="">Vyse, 1997</span></a><span data-dcnode-id="3557" instrument_node="">). An example of the better-than-average effect is when college professors are asked whether they do above-average work, and 94% of them say they do (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3555" href="#b0090" rid="b0090" role="button"><span data-dcnode-id="3556" instrument_node="">Cross, 1977</span></a><span data-dcnode-id="3554" instrument_node="">). They cannot all be right about that. An example of the optimism bias is when people underestimate the likelihood that their marriage will end in divorce or that they will develop a serious health condition during their lives (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3552" href="#b0330" rid="b0330" role="button"><span data-dcnode-id="3553" instrument_node="">Weinstein, 1980</span></a><span data-dcnode-id="3551" instrument_node="">).</span></p><p data-dcnode-id="3539" id="__p12"><span data-dcnode-id="3549" instrument_node="">There are a number of different phenomena which are normally grouped under the heading ‘optimism bias’. </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3547" href="#b0290" rid="b0290" role="button"><span data-dcnode-id="3548" instrument_node="">Shepperd, Klein, Waters, and Weinstein (2013)</span></a><span data-dcnode-id="3546" instrument_node=""> distinguish between unrealistic comparative optimism, and unrealistic absolute optimism. On the former definition, people evaluate their own prospects as better than those of similar others (or another specific reference group), in other words, they expect that positive outcomes are more likely and negative outcomes are less likely to occur for oneself than for others. On the latter definition, people’s risk assessment is unrealistically positive when compared to an objective criterion, such as an actuarial risk assessment or actual outcomes (e.g., a grade at the end of a college course). These forms of optimism bias need to be distinguished from dispositional optimism. Dispositional optimism is conceptualized as a personality trait, which people exhibit to different degrees. Broadly defined, it is a generalized tendency to expect positive outcomes (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3544" href="#b0055" rid="b0055" role="button"><span data-dcnode-id="3545" instrument_node="">Carver, Scheier, &amp; Segerstrom, 2010</span></a><span data-dcnode-id="3543" instrument_node="">). This expectation need not be unrealistic, and the Life Orientation Test measures a generally positive outlook which does not include predictions regarding specific life-events (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3541" href="#b0235" rid="b0235" role="button"><span data-dcnode-id="3542" instrument_node="">Scheier, Carver, &amp; Bridges, 1994</span></a><span data-dcnode-id="3540" instrument_node="">).</span></p><p class="p p-last" data-dcnode-id="3531" id="__p13"><span data-dcnode-id="3538" instrument_node="">All three positive illusions are taken to give rise to beliefs that are badly supported by the evidence and that leave the person with a more positive outlook than is warranted. These positive illusions can interact with one another. For instance, an unrealistically positive view of the quality of one’s research is also likely to lead to unrealistic expectations regarding the likelihood of one’s research being published. Similarly, if a person believes that they can control events more than they can in fact, this belief will lead them to be more optimistic about their chances of avoiding undesirable outcomes and achieving desirable ones (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3536" href="#b0200" rid="b0200" role="button"><span data-dcnode-id="3537" instrument_node="">McKenna, 1993</span></a><span data-dcnode-id="3535" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3533" href="#b0280" rid="b0280" role="button"><span data-dcnode-id="3534" instrument_node="">Shepperd et al., 2002</span></a><span data-dcnode-id="3532" instrument_node="">).</span></p></div><div class="tsec sec" data-dcnode-id="3454" id="s0015"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3527"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3528" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3529" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3525" id="s0015title"><span data-dcnode-id="3526" instrument_node="">2. Are positive illusions beliefs?</span></h2><p class="p p-first" data-dcnode-id="3514" id="__p14"><span data-dcnode-id="3524" instrument_node="">What is the status of the assertions research participants make in the positive illusions literature? Are they statements about what people think of themselves and about what they think will happen? Are they mere expressions of hope or desire, or guesses about what could happen? Taylor defines positive illusions as “enduring patterns of beliefs” about self, world, and future (1989, p. 44), and as “systematic small distortions of reality that make things appear better than they are” (1989, p. 228). Based on Taylor’s account of positive illusions, in this paper we understand positive illusions as systematic tendencies either to adopt and maintain excessively optimistic beliefs about the self or to make excessively optimistic predictions about the self, where we understand predictions as beliefs about what will happen or what is likely to happen. This understanding of positive illusions as patterns of beliefs is largely shared in the psychological literature, and compatible with common assumptions about how positive illusions work (cf. </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3522" href="#b0070" rid="b0070" role="button"><span data-dcnode-id="3523" instrument_node="">Collard et al., 2016</span></a><span data-dcnode-id="3521" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3519" href="#b0185" rid="b0185" role="button"><span data-dcnode-id="3520" instrument_node="">Makridakis and Moleskis, 2015</span></a><span data-dcnode-id="3518" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3516" href="#b0195" rid="b0195" role="button"><span data-dcnode-id="3517" instrument_node="">McKay and Dennett, 2009</span></a><span data-dcnode-id="3515" instrument_node="">).</span></p><p data-dcnode-id="3503" id="__p15"><span data-dcnode-id="3513" instrument_node="">As with other cognitive states that are likely to be biased, illusory, or simply badly supported by the evidence, such as self-deception, prejudice, superstition, and delusion, there is some debate about the status of the cognitive states studied in the positive illusions literature (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3511" href="#b0105" rid="b0105" role="button"><span data-dcnode-id="3512" instrument_node="">Flanagan, 2009</span></a><span data-dcnode-id="3510" instrument_node="">), and often positive illusions are described as things people just hope for in the context of health (e.g., </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3508" href="#b0220" rid="b0220" role="button"><span data-dcnode-id="3509" instrument_node="">Paley, 2014</span></a><span data-dcnode-id="3507" instrument_node="">) or relationships (e.g., </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3505" href="#b0210" rid="b0210" role="button"><span data-dcnode-id="3506" instrument_node="">Murray, Holmes, &amp; Griffin, 1996</span></a><span data-dcnode-id="3504" instrument_node="">). Some of the methodological challenges to the positive illusions approach imply that the participants’ reports are expressions of their desires or hopes for positive outcomes, and thus are not subject to an assessment of rationality in the same way as beliefs would be.</span></p><p data-dcnode-id="3501" id="__p16"><span data-dcnode-id="3502" instrument_node="">People can have different attitudes towards the same propositional content. For instance, take the content “Mary won’t get a divorce”. Mary can believe that she won’t get a divorce. In this first case, Mary is committed to the truth of “Mary won’t get a divorce”, and, if she is a rational believer, her commitment should be guided by her weighing up the evidence for and against the content of her belief. Mary can also desire that she won’t get a divorce. In this second case, Mary wants the world to be such that she won’t get a divorce but she is committed neither to the truth nor to the possibility of what she desires. Mary can hope that she won’t get a divorce. In this third case, Mary is committed to it being a good thing and it being possible that she won’t get a divorce, but she is not committed to its being true that she won’t get a divorce. Believing, desiring, and hoping are what philosophers call “propositional attitudes”, that is, attitudes people can take to a propositional content.</span></p><p data-dcnode-id="3493" id="__p17"><span data-dcnode-id="3500" instrument_node="">One suggestion in the literature on positive illusions is that people have a desire or a hope that they are better than average, or that positive things will happen to them, but are not genuinely committed to the truth of those contents (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3498" href="#b0105" rid="b0105" role="button"><span data-dcnode-id="3499" instrument_node="">Flanagan, 2009</span></a><span data-dcnode-id="3497" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3495" href="#b0110" rid="b0110" role="button"><span data-dcnode-id="3496" instrument_node="">Frankish, 2009</span></a><span data-dcnode-id="3494" instrument_node="">). The claim is that, when people assess whether they are better than average in some domain or assess their likelihood of getting a divorce, they reply by expressing something they desire or hope, not something they believe. On this reading, such an optimistic outlook is not necessarily biased or illusory.</span></p><p data-dcnode-id="3488" id="__p18"><span data-dcnode-id="3492" instrument_node="">The so-called ‘optimism bias’ seems to be even better suited to this reading than the better than average effect, given its future orientation. When people say that they will not develop cancer in the course of their lives, are they expressing a belief in how their future will be, or a hope? </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3490" href="#b0105" rid="b0105" role="button"><span data-dcnode-id="3491" instrument_node="">Flanagan (2009)</span></a><span data-dcnode-id="3489" instrument_node=""> has argued that positive illusions should be seen as “can do attitudes” or hopes as opposed to false beliefs or misbeliefs. Flanagan argues that to desire or hope for something that conflicts with evidence, and thus is unrealistic, can be beneficial, especially if it leads to positive affect or self-improvement. But to believe something that conflicts with evidence can lead to a distorted picture of reality and have bad psychological consequences.</span></p><p data-dcnode-id="3477" id="__p19"><span data-dcnode-id="3487" instrument_node="">The attractiveness of this position is that it makes one counter-intuitive claim of the positive illusions literature disappear. The counter-intuitive claim is that a set of beliefs or predictions that are biased, illusory, or not based on evidence (and thus </span><em data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">epistemically</span></em><span data-dcnode-id="3484" instrument_node=""> bad) can nonetheless be beneficial (and thus </span><em data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">psychologically</span></em><span data-dcnode-id="3481" instrument_node=""> good). If research participants in the positive illusions literature did express desires or hopes rather than beliefs, both the key claims defended by </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3479" href="#b0315" rid="b0315" role="button"><span data-dcnode-id="3480" instrument_node="">Taylor and Brown (1988)</span></a><span data-dcnode-id="3478" instrument_node=""> would be challenged, (i) that illusory beliefs about the self and one’s future are very common in the non-clinical population; and that (ii) such illusory beliefs are beneficial. Taylor and Brown should have said instead that (i∗) optimistic desires and hopes are very widespread in the non-clinical population; and that (ii∗) such desires and hopes have benefits. As a result, their theses would have been much less controversial.</span></p><p data-dcnode-id="3466" id="__p20"><span data-dcnode-id="3476" instrument_node="">The problem with this view is that the statements of research participants in the positive illusions literature are expressed, defended, and acted upon in the same way as beliefs would be. For instance, they lead to action. In contexts as different as gambling, trading in the stock market, starting a new firm, and initiating a war (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3474" href="#b0185" rid="b0185" role="button"><span data-dcnode-id="3475" instrument_node="">Makridakis &amp; Moleskis, 2015</span></a><span data-dcnode-id="3473" instrument_node="">), people appear to rely on their predictions, and this reliance on excessively optimistic predictions turns out to be very costly. Anecdotal evidence and personal experience also provide examples: people assume that their relationships will last, thus arranging for prenuptial agreements that will negatively affect them in the case of a divorce, or take it for granted they will not be affected by a serious disease and thus do not get health insurance. Although desires and hopes can influence action to a significant extent, the connection between desire or hope and action is different from, and often less direct than, the connection between belief and action because only belief carries a commitment to the truth of its content (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3471" href="#b0015" rid="b0015" role="button"><span data-dcnode-id="3472" instrument_node="">Bishop, 2016</span></a><span data-dcnode-id="3470" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3468" href="#b0240" rid="b0240" role="button"><span data-dcnode-id="3469" instrument_node="">Schroeder, 2015</span></a><span data-dcnode-id="3467" instrument_node="">).</span></p><p class="p p-last" data-dcnode-id="3455" id="__p21"><span data-dcnode-id="3465" instrument_node="">Although it may be methodologically difficult to distinguish beliefs from desires based on people’s statements in an empirical study, we have no good reason to rule out that people believe what they state in the positive illusions literature. After all, beliefs are not always backed up by evidence and are often unresponsive to new evidence (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3463" href="#b0025" rid="b0025" role="button"><span data-dcnode-id="3464" instrument_node="">Bortolotti, 2009</span></a><span data-dcnode-id="3462" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3460" href="#b0065" rid="b0065" role="button"><span data-dcnode-id="3461" instrument_node="">Cialdini et al., 1981</span></a><span data-dcnode-id="3459" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3457" href="#b0145" rid="b0145" role="button"><span data-dcnode-id="3458" instrument_node="">Hovland et al., 1953</span></a><span data-dcnode-id="3456" instrument_node="">). Agents are not ideally rational in the way they adopt and maintain their beliefs, due to a combination of cognitive limitations and motivational factors.</span></p></div><div class="tsec sec" data-dcnode-id="3330" id="s0020"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3451"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3452" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3453" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3449" id="s0020title"><span data-dcnode-id="3450" instrument_node="">3. When is optimism unrealistic?</span></h2><p class="p p-first" data-dcnode-id="3444" id="__p22"><span data-dcnode-id="3448" instrument_node="">In Section </span><a class="sec" data-dcnode-id="3446" href="#s0015" rid="s0015"><span data-dcnode-id="3447" instrument_node="">2</span></a><span data-dcnode-id="3445" instrument_node=""> we saw that in the literature unrealistically optimistic attitudes are commonly viewed as biased or illusory beliefs. But what makes them unrealistic?</span></p><div class="sec" data-dcnode-id="3361" id="s0025"><h3 data-dcnode-id="3442" id="s0025title"><span data-dcnode-id="3443" instrument_node="">3.1. Some methodological considerations</span></h3><p class="p p-first" data-dcnode-id="3422" id="__p23"><span data-dcnode-id="3441" instrument_node="">Several researchers (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3439" href="#b0075" rid="b0075" role="button"><span data-dcnode-id="3440" instrument_node="">Colvin and Block, 1994</span></a><span data-dcnode-id="3438" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3436" href="#b0080" rid="b0080" role="button"><span data-dcnode-id="3437" instrument_node="">Colvin et al., 1995</span></a><span data-dcnode-id="3435" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3433" href="#b0105" rid="b0105" role="button"><span data-dcnode-id="3434" instrument_node="">Flanagan, 2009</span></a><span data-dcnode-id="3432" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3430" href="#b0335" rid="b0335" role="button"><span data-dcnode-id="3431" instrument_node="">Young, 2014</span></a><span data-dcnode-id="3429" instrument_node="">) have expressed concerns about the methodology adopted in establishing the existence and pervasiveness of positive illusions in the non-clinical population, and the contributions of such illusions to psychological adjustment and mental health (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3427" href="#b0315" rid="b0315" role="button"><span data-dcnode-id="3428" instrument_node="">Taylor &amp; Brown, 1988</span></a><span data-dcnode-id="3426" instrument_node="">). Are so-called positive ‘illusions’ really illusory? While this question may arise for other positive illusions as well (when Estelle thinks she is a good friend, she may just have an idiosyncratic understanding of what makes a person a good friend), it is particularly difficult to answer when we are looking at predictions regarding the future. Scientists who aim to show that certain optimistic or self-enhancing beliefs are unwarranted or false face a number of methodological and epistemological problems in establishing falsity in specific cases of optimistically biased belief. The method for assessing whether a belief is unrealistically optimistic also depends on whether researchers are measuring absolute or comparative unrealistic optimism (see </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3424" href="#b0290" rid="b0290" role="button"><span data-dcnode-id="3425" instrument_node="">Shepperd et al., 2013</span></a><span data-dcnode-id="3423" instrument_node="">).</span></p><p data-dcnode-id="3420" id="__p24"><span data-dcnode-id="3421" instrument_node="">In the case of absolute unrealistic optimism, a prediction is unrealistically positive compared to the objective likelihood of an event occurring. In contrast, in comparative unrealistic optimism, people are unrealistically optimistic about their chances compared to those of others. So the error the individual is making is a different one. The absolutely unrealistic individual is mistaken about their objective risk, or their actuarial risk assessment, whereas the comparatively optimistic individual is unrealistic about their risk relative to that of others.</span></p><p data-dcnode-id="3414" id="__p25"><span data-dcnode-id="3419" instrument_node="">Not only are the presence of unrealistic comparative optimism and unrealistic absolute optimism established in different ways, but these two forms of optimism may be uncorrelated. A person may exhibit unrealistic comparative optimism and unrealistic absolute pessimism (or vice versa) at the same time.</span><sup data-dcnode-id="3416"><a class="fn" data-dcnode-id="3417" href="#fn1" rid="fn1"><span data-dcnode-id="3418" instrument_node="">1</span></a></sup><span data-dcnode-id="3415" instrument_node=""> For example, a woman may believe that she is less likely than other women to get breast cancer, while at the same time overestimating her risk relative to the estimate suggested by some objective indicator, such as a risk calculator. Clearly, there are also possible scenarios where an individual exhibits comparative unrealistic optimism and absolute realism or comparative realism and absolute unrealistic optimism. Depending on the case and the kind of unrealistic optimism exhibited, people are mistaken about different things and commit different errors.</span></p><p data-dcnode-id="3397" id="__p26"><span data-dcnode-id="3413" instrument_node="">Most frequently, studies look at comparative and absolute unrealistic optimism at the group level (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3411" href="#b0300" rid="b0300" role="button"><span data-dcnode-id="3412" instrument_node="">Shepperd et al., 2017</span></a><span data-dcnode-id="3410" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3408" href="#b0290" rid="b0290" role="button"><span data-dcnode-id="3409" instrument_node="">Shepperd et al., 2013</span></a><span data-dcnode-id="3407" instrument_node="">). Establishing that some of the participants must be overly optimistic in their assessment is reasonably easy to do (though see </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3405" href="#b0130" rid="b0130" role="button"><span data-dcnode-id="3406" instrument_node="">Hahn and Harris, 2014</span></a><span data-dcnode-id="3404" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3402" href="#b0135" rid="b0135" role="button"><span data-dcnode-id="3403" instrument_node="">Harris and Hahn, 2011</span></a><span data-dcnode-id="3401" instrument_node="">). For example, when 70% of the population take themselves to be less likely to be divorced than the average person, they cannot all be correct. In contrast, it is not possible to establish whether a specific individual is unrealistically optimistic when one doesn’t have access to the individual’s objective or actuarial risk (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3399" href="#b0290" rid="b0290" role="button"><span data-dcnode-id="3400" instrument_node="">Shepperd et al., 2013</span></a><span data-dcnode-id="3398" instrument_node="">).</span></p><p data-dcnode-id="3377" id="__p27"><span data-dcnode-id="3396" instrument_node="">While it is difficult to be certain when an individual has unrealistically optimistic beliefs, it is possible to assess whether an individual </span><em data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">updates</span></em><span data-dcnode-id="3393" instrument_node=""> her beliefs in an optimistically biased manner. A systematically distorted </span><em data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">belief updating</span></em><span data-dcnode-id="3390" instrument_node=""> that takes into account desirable news to a greater extent than undesirable news, is one mechanism that allows individuals to maintain or arrive at unrealistically positive beliefs in the face of disconfirming evidence. In a paradigm introduced by </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3388" href="#b0275" rid="b0275" role="button"><span data-dcnode-id="3389" instrument_node="">Sharot, Korn, and Dolan (2011)</span></a><span data-dcnode-id="3387" instrument_node="">, people are asked to provide risk estimates for negative future events, are confronted with base rates for these events and are later asked for an estimate of their own risk again. It has been shown that when people update their initial risk estimates, they tend to incorporate desirable base rate information (i.e., information that risks are lower than expected) to a greater extent than undesirable information (i.e., information that risks are higher than expected). Importantly, according to formal learning theories, the amount of belief updating should depend on the size of the error, i.e., the difference between the expected and the actual outcome, and not on how desirable or undesirable this error was (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3385" href="#b0245" rid="b0245" role="button"><span data-dcnode-id="3386" instrument_node="">Schultz, Dayan, &amp; Montague, 1997</span></a><span data-dcnode-id="3384" instrument_node="">). Thus, the asymmetric reliance on new information dependent on its valence results in larger updates after good news than after bad news, therefore representing a biased learning and supporting the most favorable future outlooks. In a modification of this paradigm, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3382" href="#b0170" rid="b0170" role="button"><span data-dcnode-id="3383" instrument_node="">Kuzmanovic et al., 2015</span></a><span data-dcnode-id="3381" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3379" href="#b0175" rid="b0175" role="button"><span data-dcnode-id="3380" instrument_node="">Kuzmanovic et al., 2016</span></a><span data-dcnode-id="3378" instrument_node=""> have also shown that individuals show this asymmetric update pattern to a larger extent for themselves than for similar others. Moreover, given that the extent of the asymmetric updating (i.e., the difference between mean updates after good and bad news) can be computed for each single individual, this approach allows to assess optimism bias at the individual level.</span></p><p class="p p-last" data-dcnode-id="3362" id="__p28"><span data-dcnode-id="3376" instrument_node="">But here too there are methodological problems, because unless we know what base rate a person expected at the beginning, we do not know whether the base rate information they are subsequently given constitutes positive or negative information in their eyes (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3374" href="#b0260" rid="b0260" role="button"><span data-dcnode-id="3375" instrument_node="">Shah, Harris, Bird, Catmur, &amp; Hahn, 2016</span></a><span data-dcnode-id="3373" instrument_node="">). So, for example, if John thinks that the population base rate for heart attacks is 25% and that because of family history, his own likelihood is 35%, then the information that the base rate is 30% is not desirable information, even though it may look that way when we only compare the risk assessment John made for himself and the base rate he was then provided with.</span><sup data-dcnode-id="3370"><a class="fn" data-dcnode-id="3371" href="#fn2" rid="fn2"><span data-dcnode-id="3372" instrument_node="">2</span></a></sup><span data-dcnode-id="3369" instrument_node=""> If, on the other hand, John thinks he has a risk of 35% but that the population base rate is 40%, then hearing that the base rate is 35% is welcome news, even though it will look neutral when we just look at the John’s risk estimate and the base rate he was provided with. In a recent study by </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3367" href="#b0165" rid="b0165" role="button"><span data-dcnode-id="3368" instrument_node="">Kuzmanovic and Rigoux (unpublished manuscript)</span></a><span data-dcnode-id="3366" instrument_node="">, they controlled for this effect by asking people to estimate population base rates at the beginning of each experimental trial. After that, people estimated their own risk and were then presented with the true population base rate. This procedure ensured a valid assessment of the desirability of the presented base rates, as it was defined according to the difference between the estimated base rate and the presented base rate, and not to the difference between the estimated own risk and the presented base rate. Even after increasing the transparency of how individuals perceive the presented base rates, they still demonstrated the optimism bias in belief updating as they made larger updates after desirable than after undesirable information (the same result has also been revealed by </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3364" href="#b9000" rid="b9000" role="button"><span data-dcnode-id="3365" instrument_node="">Garrett &amp; Sharot, 2017</span></a><span data-dcnode-id="3363" instrument_node="">). The asymmetric use of information which is particularly pronounced for predictions regarding oneself provides reasons to think that at least some of the beliefs resulting from such update processes will be false, as the differential use of information should naturally lead to a biased estimate of one’s own prospects.</span></p></div><div class="sec sec-last" data-dcnode-id="3331" id="s0030"><h3 data-dcnode-id="3359" id="s0030title"><span data-dcnode-id="3360" instrument_node="">3.2. Optimistic predictions, positive outcomes, and falsity</span></h3><p class="p p-first" data-dcnode-id="3357" id="__p29"><span data-dcnode-id="3358" instrument_node="">Sometimes, there can be confusion as to what exactly is required for an optimistic prediction to be false. Specifically, the question which arises is whether a positive outcome justifies the optimistic prediction post-hoc, making it a true belief. Some deny that an optimistic belief in one’s success can be false if one ends up being successful after all.</span></p><blockquote class="pullquote" data-dcnode-id="3349"><p data-dcnode-id="3355" id="__p31"><span data-dcnode-id="3356" instrument_node="">“For example, if a basketball team believes that it can beat a statistically better team, and this optimistic belief leads them to beat the statistically better team, then their belief was not false.”</span></p><div class="half_rhythm align_right attrib" data-dcnode-id="3350"><span data-dcnode-id="3354" instrument_node="">(</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3352" href="#b0335" rid="b0335" role="button"><span data-dcnode-id="3353" instrument_node="">Young, 2014, p. 550</span></a><span data-dcnode-id="3351" instrument_node="">)</span></div></blockquote><p data-dcnode-id="3348"></p><p data-dcnode-id="3343" id="__p32"><span data-dcnode-id="3347" instrument_node="">It is true that in the case of some optimistic predictions, their truth or falsity can only be established post hoc. If a student believes that she is going to finish in the top 10 percent of her class, this may be objectively unlikely, but only time will tell whether this prediction was correct or not.</span><sup data-dcnode-id="3344"><a class="fn" data-dcnode-id="3345" href="#fn3" rid="fn3"><span data-dcnode-id="3346" instrument_node="">3</span></a></sup></p><p data-dcnode-id="3341" id="__p33"><span data-dcnode-id="3342" instrument_node="">But matters are different when people predict the likelihood of an event occurring in terms of a numerical risk estimate. If an event is classified as highly unlikely, the fact that it later occurs does not disprove the judgment that it was highly unlikely. This can be explained with a very simple example: If Liam mistakenly thinks that on a fair dice he has a 1 in 2 chance of throwing a 6, this estimate is not vindicated if he does throw a 6. A positive outcome does not change the fact that the odds of that outcome were low. In other words, it is possible for graded probabilities to be accurate irrespective of the actual outcome. In contrast, if his expectation was that he would roll a 6, this would turn out to be correct if he did roll a six. Another way of seeing that risk estimates which specify probabilities are different from predictions which say that a certain outcome will occur, is the following: If risk estimates could be proved or disproved by subsequent outcomes, then any risk estimate which isn’t either 0 or 1 will automatically be incorrect, it is just impossible to say whether the error lay in being too optimistic or pessimistic before the actual outcome ensues.</span></p><p data-dcnode-id="3339" id="__p34"><span data-dcnode-id="3340" instrument_node="">But in contrast to the dice throwing scenario, it is much harder to calculate the objective likelihood of most life events. Matters are further complicated by the fact that there is a real possibility that, in some areas of life, the thought that a result is achievable makes it more likely that it is in fact achieved. If Timothy had an actuarial risk assessment that placed his likelihood of suffering from a heart-attack at 60%, and he himself estimated it at 30% and lived out his life happily without any heart attacks, it is both possible that the actuarial risk assessment could have been improved by taking further factors into account, or that Timothy was unrealistically optimistic in his estimate. Importantly, he may have been unrealistically optimistic even if his positive beliefs had a beneficial effect on his stress-levels and therefore partially contributed to the fact that he did not have a heart-attack. It may therefore be possible that a belief is both unrealistically optimistic, because it underestimates the chance of a heart attack, and also contributes to the undesirable event not occurring. (So, it could shift his likelihood of suffering an attack from 60% to 50%. This is still higher than his estimate, but lower than it would have been if he hadn’t had the belief. Clearly, this is only a toy example to show what could in principle be the case.)</span></p><p data-dcnode-id="3337" id="__p35"><span data-dcnode-id="3338" instrument_node="">As we have seen, in many cases, it is not easy to assess predictions for their accuracy. In contrast, it is easier to make a case for the claim that an optimistically biased belief regarding the future is badly supported by the evidence. We can say that given the information Timothy had about the risk factors for heart attacks, he had no good reason to assume such a low likelihood of suffering from heart-attack.</span></p><p class="p p-last" data-dcnode-id="3332" id="__p36"><span data-dcnode-id="3336" instrument_node="">In conclusion, there are a number of complications in establishing whether any given prediction is in fact incorrect: this may sometimes not be apparent until the actual outcome has occurred, and in other cases we may never know, because we do not know how good the actuarial risk estimate was, especially if someone beats the odds. Furthermore, and relatedly, one and the same prediction can be optimistic, realistic of pessimistic depending on the criterion used to evaluate the estimate. This has clear implications for research on the consequences of unrealistic optimism, as any statements regarding the consequences of unrealistic optimism need to establish whether unrealistic optimism was present in the first place (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3334" href="#b0300" rid="b0300" role="button"><span data-dcnode-id="3335" instrument_node="">Shepperd et al., 2017</span></a><span data-dcnode-id="3333" instrument_node="">).</span></p></div></div><div class="tsec sec" data-dcnode-id="3269" id="s0035"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3327"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3328" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3329" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3325" id="s0035title"><span data-dcnode-id="3326" instrument_node="">4. Are optimistically biased beliefs irrational?</span></h2><p class="p p-first" data-dcnode-id="3323" id="__p37"><span data-dcnode-id="3324" instrument_node="">False beliefs and inaccurate predictions, no matter how they were formed, misrepresent how the world is or is going to be. Epistemically irrational beliefs and predictions can be either true or false, but what makes them irrational is that they were not formed on the basis of (sufficiently robust) evidence or are insufficiently responsive to evidence after being adopted.</span></p><p data-dcnode-id="3321" id="__p38"><span data-dcnode-id="3322" instrument_node="">Given this distinction between truth and rationality, falsity or inaccuracy is a red herring when we look at specific beliefs and predictions. Surely, what primarily makes these cognitive states problematic is the worry that they are epistemically irrational. Optimistically biased beliefs and predictions can be true or accurate by luck, and still count as irrational. Alternatively, beliefs can be rational, and still happen to be false or inaccurate.</span></p><p data-dcnode-id="3316" id="__p39"><span data-dcnode-id="3320" instrument_node="">Of course, the fact that people make unrealistically optimistic predictions does not in and of itself tell us anything about the reasoning processes which led to comparative or absolute unrealistic optimism. In some cases, people may exhibit unrealistic absolute optimism because they lack information or have misleading information. Thus, the question becomes whether the way we </span><em data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">acquire or maintain</span></em><span data-dcnode-id="3317" instrument_node=""> unrealistically optimistic beliefs exhibits irrationality.</span></p><p data-dcnode-id="3308" id="__p40"><span data-dcnode-id="3315" instrument_node="">Regarding comparative optimism, one might argue that we should expect judgments about the self and judgments about others to diverge, as people are in a very different epistemic situation regarding themselves and the ‘average other’, and thus a difference in their reasoning is to be expected. One tends to have more detailed information about oneself than about others, let alone the average other, and this may be an important factor underlying optimistically biased beliefs (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3313" href="#b0060" rid="b0060" role="button"><span data-dcnode-id="3314" instrument_node="">Chambers et al., 2003</span></a><span data-dcnode-id="3312" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3310" href="#b0280" rid="b0280" role="button"><span data-dcnode-id="3311" instrument_node="">Shepperd et al., 2002</span></a><span data-dcnode-id="3309" instrument_node="">). This asymmetry of information concerns both one’s own history and habits but also intentions and plans. Egocentric thinking skews people’s risk estimates because they have a lot of information about the factors that affect their personal risk, but not the same amount of information about others. So, for example, Victor knows that he does not smoke and goes running regularly, and that this reduces his risk of heart attacks. He does not have the same rich body of information about others, for example, he may not know how his running habits compare to that of others of his age and socio-economic class, so he may give undue weight to this personal information when making risk assessments.</span></p><p data-dcnode-id="3297" id="__p41"><span data-dcnode-id="3307" instrument_node="">However, there is a question to what extent egocentric thinking, too, is irrational, because it unjustifiably ignores the extent to which the things we take to be special about ourselves also apply to others. For example, some authors have argued that people overestimate the importance of their intentions and the amount of control they have relative to others, and that this is in part what underlies unrealistically optimistic expectations for the future (cf. </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3305" href="#b0200" rid="b0200" role="button"><span data-dcnode-id="3306" instrument_node="">McKenna, 1993</span></a><span data-dcnode-id="3304" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3302" href="#b0230" rid="b0230" role="button"><span data-dcnode-id="3303" instrument_node="">Pronin and Kugler, 2010</span></a><span data-dcnode-id="3301" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3299" href="#b0280" rid="b0280" role="button"><span data-dcnode-id="3300" instrument_node="">Shepperd et al., 2002</span></a><span data-dcnode-id="3298" instrument_node="">). In as far as there are other unjustified or ill-considered beliefs underlying optimistic predictions, these inherit the irrationality.</span></p><p data-dcnode-id="3289" id="__p42"><span data-dcnode-id="3296" instrument_node="">In addition, there is evidence that unrealistic optimism is a form of motivated cognition in the sense that people process information that is available to them in a way that favors a certain kind of subjectively desirable conclusion (cf. </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3294" href="#b0150" rid="b0150" role="button"><span data-dcnode-id="3295" instrument_node="">Hughes &amp; Zaki, 2015</span></a><span data-dcnode-id="3293" instrument_node="">). Where it can be shown that it is the desirability of certain evidence rather than its availability that influences a reasoning process, and that available evidence is neglected when it is undesirable, we are faced with instances of epistemic irrationality. It appears that such a filtering of information by desirability is what is at work in the cases of selective belief updating we considered earlier. In these cases, people favor certain evidence in order to ‘justify’ the desired belief (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3291" href="#b0270" rid="b0270" role="button"><span data-dcnode-id="3292" instrument_node="">Sharot &amp; Garrett, 2016</span></a><span data-dcnode-id="3290" instrument_node="">).</span></p><p data-dcnode-id="3272" id="__p43"><span data-dcnode-id="3288" instrument_node="">As was explained in the previous section, people make different uses of base rate information in estimating risks for themselves than they do when they estimate risks for others, and they ignore undesirable base rate information when updating beliefs regarding themselves to a larger extent than they do for others. While we may explain the initial base rate neglect as the result of egocentric thinking, this cannot be the explanation for asymmetric updating. Take the example where individuals are asked to provide a base rate estimate as well as a risk estimate for themselves before being given new base rate information and being asked to update (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3286" href="#b0165" rid="b0165" role="button"><span data-dcnode-id="3287" instrument_node="">Kuzmanovic &amp; Rigoux, unpublished manuscript</span></a><span data-dcnode-id="3285" instrument_node="">). If an individual already committed themselves to a relation between their own risk and the base rate, egocentric thinking should have been factored in at this stage. While people may have reasons to think that the base rate is not of great relevance to them (for instance because they think they are different from the average), this should manifest itself in a </span><em data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">symmetric</span></em><span data-dcnode-id="3282" instrument_node=""> use of desirable and undesirable base rate information in belief updating (provided that the perceived difference to the average is similar across the events with desirable and undesirable base rates). Moreover, using the Bayesian theorem as a normative benchmark for rational belief updating, it could be shown that participants’ optimism bias was truly irrational, and that their updates deviated more from fully rational ones after bad than after good news (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3280" href="#b0165" rid="b0165" role="button"><span data-dcnode-id="3281" instrument_node="">Kuzmanovic &amp; Rigoux, unpublished manuscript</span></a><span data-dcnode-id="3279" instrument_node="">). Asymmetric use of information when new base rates are introduced suggests that individuals take on board the information that supports the desired outlook. This interpretation is corroborated by recent findings from neuroimaging studies. </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3277" href="#b0175" rid="b0175" role="button"><span data-dcnode-id="3278" instrument_node="">Kuzmanovic, Jefferson, and Vogeley (2016)</span></a><span data-dcnode-id="3276" instrument_node=""> were able to provide empirical support for the hypothesis that the positive value of optimistically biased belief updates is tracked by the same neural regions that also track the value of rewards. They demonstrated that the activity in one of the central nodes of the human reward circuitry associated with the processing of positive value (ventromedial prefrontal cortex) was increased both during greater belief updating in response to favorable information, and during not-updating or low updating in reaction to unfavorable information. While these data from belief updating do not comprehensively prove that unrealistically optimistic beliefs are generally irrational, they provide evidence for irrationality because there is an element of motivationally driven distortion of the evidence. This tendency to take on board welcome information and ignore unwelcome information also manifests itself in other areas of self-enhancing belief, such as assessments of one’s own attractiveness and intelligence (cf. </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3274" href="#b0100" rid="b0100" role="button"><span data-dcnode-id="3275" instrument_node="">Eil &amp; Rao, 2011</span></a><span data-dcnode-id="3273" instrument_node="">).</span></p><p class="p p-last" data-dcnode-id="3270" id="__p44"><span data-dcnode-id="3271" instrument_node="">To recap, it is frequently hard to say whether specific unrealistically optimistic predictions are epistemically irrational. Whether a person is epistemically irrational in her unrealistic optimism will depend on the specifics of the case. One important factor is the information that is available to that person prior to her making a judgement or a prediction. In some cases, the self-assessment or the self-related prediction is justified on the basis of the evidence at hand. However, we have argued that in as far as unrealistically optimistic predictions are maintained by an asymmetric use of desirable and undesirable evidence, they are irrational.</span></p></div><div class="tsec sec" data-dcnode-id="3180" id="s0040"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3266"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3267" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3268" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3264" id="s0040title"><span data-dcnode-id="3265" instrument_node="">5. Are unrealistically optimistic predictions fixed?</span></h2><p class="p p-first" data-dcnode-id="3262" id="__p45"><span data-dcnode-id="3263" instrument_node="">We have seen that the optimism bias is pervasive phenomenon. But are unrealistically optimistic beliefs fixed? The answer to this question will depend on the notion of fixity we adopt. Here we shall consider two senses of fixity: beliefs can be fixed when they lack responsiveness to evidence or when they are not sensitive to changes in a person’s life circumstances.</span></p><p data-dcnode-id="3248" id="__p46"><span data-dcnode-id="3261" instrument_node="">Let us start with responsiveness to evidence. There is some controversy in the literature as to the extent to which positive illusions can be revised when counterevidence becomes available. To some extent, optimistic beliefs are sensitive to evidence. It has been shown that some forms of optimism and self-enhancement can be reduced or at least controlled by providing people with more information and making them more accountable for the accuracy of their predictions (e.g., </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3259" href="#b0010" rid="b0010" role="button"><span data-dcnode-id="3260" instrument_node="">Barberia et al., 2013</span></a><span data-dcnode-id="3258" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3256" href="#b0250" rid="b0250" role="button"><span data-dcnode-id="3257" instrument_node="">Sedikides et al., 2002</span></a><span data-dcnode-id="3255" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3253" href="#b0330" rid="b0330" role="button"><span data-dcnode-id="3254" instrument_node="">Weinstein, 1980</span></a><span data-dcnode-id="3252" instrument_node="">). For instance, Sedikides argues that via introspective reflection people can control self-enhancing beliefs at least in the short-term, and that self-assessment is more accurate when people are held accountable for it (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3250" href="#b0255" rid="b0255" role="button"><span data-dcnode-id="3251" instrument_node="">Sedikides, Horton, &amp; Gregg, 2007</span></a><span data-dcnode-id="3249" instrument_node="">). Controlling or reducing self-enhancement and making self-assessment more realistic are likely to translate into more accurate predictions, that is, predictions that do not assume that one is able to influence external events and that one is better than average (more talented, smarter, healthier, trust-worthy as a romantic partner, etc.).</span></p><p data-dcnode-id="3243" id="__p47"><span data-dcnode-id="3247" instrument_node="">Another example comes from the literature on causal illusions. Causal illusions occur when people mistakenly believe that one event caused another just because they experienced them in close temporal succession (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3245" href="#b0190" rid="b0190" role="button"><span data-dcnode-id="3246" instrument_node="">Matute et al., 2015</span></a><span data-dcnode-id="3244" instrument_node="">). Causal illusions are pervasive and usually inflate people’s sense of control over external events. Matute and colleagues show that there are educational interventions that can be efficacious in reducing causal illusions. Beliefs caused by causal illusions can be challenged when people are provided with details of an alternative cause for the same outcome. For instance, if a group of people who rely on agriculture for their food and have only a superficial understanding of the weather notice that a dance is followed by rain, they may come to believe that the dance was instrumental in bringing about the rain. This may be the beginning of a superstitious belief in the effectiveness of rain dances. When the group acquires a better scientific understanding of the weather and its causes, they may realise that their dance has no effect on the weather, and the causal illusion may disappear. Examples such as these suggest that beliefs due to causal illusions are resistant to counterevidence but can be revised. Often causal illusions are the basis for inaccurate predictions, and thus eliminating such illusions may also help get rid of some instances of optimism bias.</span></p><p data-dcnode-id="3229" id="__p48"><span data-dcnode-id="3242" instrument_node="">Taylor makes the explicit claim that optimistically biased beliefs are not as fixed as delusional beliefs are, but are flexible and can be adjusted (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3240" href="#b0310" rid="b0310" role="button"><span data-dcnode-id="3241" instrument_node="">Taylor, 1989</span></a><span data-dcnode-id="3239" instrument_node="">). As we saw, people are known to update their self-related predictions in the light of new evidence, but they tend to do so to a greater extent when the new information is desirable and indicates that their previous estimates were pessimistic. Moreover, people tend to be more optimistic about events that they know they can partially control, and less optimistic just before receiving outcome feedback (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3237" href="#b0305" rid="b0305" role="button"><span data-dcnode-id="3238" instrument_node="">Sweeny, Carroll, &amp; Shepperd, 2006</span></a><span data-dcnode-id="3236" instrument_node="">). While they may give up their optimistic predictions in order to brace for bad news, people also tend to avoid situations that would cause disappointment, that is, situations in which their optimistic beliefs and predictions could be easily disproved (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3234" href="#b0005" rid="b0005" role="button"><span data-dcnode-id="3235" instrument_node="">Armor and Taylor, 1998</span></a><span data-dcnode-id="3233" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3231" href="#b0215" rid="b0215" role="button"><span data-dcnode-id="3232" instrument_node="">Neff and Geers, 2013</span></a><span data-dcnode-id="3230" instrument_node="">). Although this is evidence of some flexibility in the optimism bias, it does not support the claim that people are responsive to evidence in an epistemically rational way when it comes to their optimistically biased beliefs and predictions. Rather, the hypothesis is that optimism is strategically enhanced when fewer opportunities for it to be disconfirmed are available.</span></p><p data-dcnode-id="3206" id="__p49"><span data-dcnode-id="3228" instrument_node="">Thus, responsiveness to counterevidence seems to be a feature of optimistically biased beliefs only in some contexts, and the way beliefs are updated remains hostage to cognitive and motivational biases. It is easier to make a case for the optimism bias and other positive illusions being sensitive to life circumstances. People tend to be less optimistic about experiencing a negative event in the future if they have already experienced it in the past (cf. </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3226" href="#b0045" rid="b0045" role="button"><span data-dcnode-id="3227" instrument_node="">Campbell et al., 2007</span></a><span data-dcnode-id="3225" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3223" href="#b0285" rid="b0285" role="button"><span data-dcnode-id="3224" instrument_node="">Shepperd et al., 2003</span></a><span data-dcnode-id="3222" instrument_node="">). For example, children of divorced parents are more likely to accurately predict the likelihood of divorce (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3220" href="#b0115" rid="b0115" role="button"><span data-dcnode-id="3221" instrument_node="">Franklin, Janoff-Bulman, &amp; Roberts, 1990</span></a><span data-dcnode-id="3219" instrument_node="">). More generally, positive illusions are very strong in young people with relatively happy childhoods (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3217" href="#b0050" rid="b0050" role="button"><span data-dcnode-id="3218" instrument_node="">Carr, 2011, p. 89</span></a><span data-dcnode-id="3216" instrument_node="">), especially if their parents adopted an optimistic explanatory style for external events, and attributed positive outcomes to internal and stable features of their children. It has been argued that positive illusions are hardwired due to their significant biological adaptiveness (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3214" href="#b0195" rid="b0195" role="button"><span data-dcnode-id="3215" instrument_node="">McKay &amp; Dennett, 2009</span></a><span data-dcnode-id="3213" instrument_node="">), but they can also be fostered by a parenting style that is warm and supportive (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3211" href="#b0225" rid="b0225" role="button"><span data-dcnode-id="3212" instrument_node="">Peterson, 2000</span></a><span data-dcnode-id="3210" instrument_node="">), reduced in children with depressed parents, or seriously compromised by “child abuse and neglect” (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3208" href="#b0050" rid="b0050" role="button"><span data-dcnode-id="3209" instrument_node="">Carr, 2011, p. 92</span></a><span data-dcnode-id="3207" instrument_node="">).</span></p><p data-dcnode-id="3198" id="__p50"><span data-dcnode-id="3205" instrument_node="">Such fluctuations are common later in life as well, and are also largely dependent on circumstances. There is evidence that unrealistic optimism is higher in childhood and old age but lower in middle age (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3203" href="#b0205" rid="b0205" role="button"><span data-dcnode-id="3204" instrument_node="">Moutsiana et al., 2013</span></a><span data-dcnode-id="3202" instrument_node="">), negatively correlating with stress and positively correlating with subjective wellbeing. People tend to be more optimistic in safe environments, but when it becomes important to identify threats and danger, they are more prone to updating beliefs in the face of negative information. Indeed, it has been shown that people who are stressed learn better from negative information (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3200" href="#b0120" rid="b0120" role="button"><span data-dcnode-id="3201" instrument_node="">Garrett et al., Unpublished results</span></a><span data-dcnode-id="3199" instrument_node="">).</span></p><p class="p p-last" data-dcnode-id="3181" id="__p51"><span data-dcnode-id="3197" instrument_node="">In people who experience low mood and are prone to depressive symptoms, self-related judgements and predictions are more realistic, at least in some domains. In this population there is a lower vulnerability to positive illusions in general (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3195" href="#b0125" rid="b0125" role="button"><span data-dcnode-id="3196" instrument_node="">Garrett et al., 2014</span></a><span data-dcnode-id="3194" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3192" href="#b0155" rid="b0155" role="button"><span data-dcnode-id="3193" instrument_node="">Korn et al., 2014</span></a><span data-dcnode-id="3191" instrument_node="">, </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3189" href="#b0335" rid="b0335" role="button"><span data-dcnode-id="3190" instrument_node="">Young, 2014</span></a><span data-dcnode-id="3188" instrument_node="">), which also affect the realism of self-related predictions (but see </span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3186" href="#b0095" rid="b0095" role="button"><span data-dcnode-id="3187" instrument_node="">Dunning &amp; Story, 1991</span></a><span data-dcnode-id="3185" instrument_node="">). But even in people who do not experience low moods or depression, a loss of positive illusions is experienced when adversities strike. People who become victims of abuse or suffer trauma, and their care-givers, become (temporarily) less optimistic in their self-related beliefs and predictions (“Bad things really happen, and I cannot do anything to avoid them”) (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3183" href="#b0020" rid="b0020" role="button"><span data-dcnode-id="3184" instrument_node="">Bloom, 2003</span></a><span data-dcnode-id="3182" instrument_node="">). This suggests that life circumstances can have an effect on whether and to what extent the optimism bias and other positive illusions are manifested.</span></p></div><div class="tsec sec" data-dcnode-id="3158" id="s0045"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3177"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3178" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3179" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3175" id="s0045title"><span data-dcnode-id="3176" instrument_node="">6. Conclusion</span></h2><p class="p p-first" data-dcnode-id="3173" id="__p52"><span data-dcnode-id="3174" instrument_node="">In this paper we attempted to shed light on the extent to which unrealistic optimism and other positive illusions are belief-like, false or inaccurate, epistemically irrational, and fixed.</span></p><p data-dcnode-id="3171" id="__p53"><span data-dcnode-id="3172" instrument_node="">We suggested that there is no reason to rule out that optimistically biased cognitive states are beliefs as opposed to desires or hopes. Optimistically biased beliefs and predictions share the features of other types of beliefs and predictions, and lead people to act in the way we would expect if people were genuinely committed to their content being true.</span></p><p data-dcnode-id="3169" id="__p54"><span data-dcnode-id="3170" instrument_node="">When it comes to the illusory nature of unrealistic optimism and the other positive illusions, there are important methodological difficulties that need to be addressed. Nevertheless, the evidence suggests that these beliefs are in many cases genuinely unrealistic and do not merely constitute positive expectations. They also exhibit features of irrationality, because they seem to be formed and upheld by a use of information that is less than rational. In some cases, people give undue weight to knowledge of their own plans and intentions, in others they take on board desirable information while neglecting undesirable information.</span></p><p data-dcnode-id="3161" id="__p55"><span data-dcnode-id="3168" instrument_node="">One aspect of the epistemic irrationality of optimistically biased beliefs and predictions is the fact that their responsiveness to counter-evidence is limited. But such beliefs are not fixed as people’s predictions are affected by experience with the events they predict. Also, some interventions are successful in reducing self-enhancement in self-related beliefs (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3166" href="#b0255" rid="b0255" role="button"><span data-dcnode-id="3167" instrument_node="">Sedikides et al., 2007</span></a><span data-dcnode-id="3165" instrument_node="">), and in disclosing illusory nature of some causal relations among events (</span><a aria-expanded="false" aria-haspopup="true" class="bibr popnode" data-dcnode-id="3163" href="#b0190" rid="b0190" role="button"><span data-dcnode-id="3164" instrument_node="">Matute et al., 2015</span></a><span data-dcnode-id="3162" instrument_node="">), which are the basis for unrealistically optimistic predictions. Finally, unrealistic optimism fluctuates with developmental stages and life circumstances, being more prominent in happy childhoods and old age, and temporarily disappearing after trauma, abuse, victimisation, and other adversities.</span></p><p class="p p-last" data-dcnode-id="3159" id="__p56"><span data-dcnode-id="3160" instrument_node="">We hope that the issues discussed in the paper help clarify the nature of unrealistic optimism, and are highly optimistic that they will also be relevant to future investigations of its adaptiveness.</span></p></div><div class="tsec sec" data-dcnode-id="3147" id="ak005"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3155"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3156" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3157" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3153" id="ak005title"><span data-dcnode-id="3154" instrument_node="">Acknowledgments</span></h2><div class="sec" data-dcnode-id="3148"><p data-dcnode-id="3151" id="__p57"><span data-dcnode-id="3152" instrument_node="">We would like to thank James Shepherd, Constantine Sedikides, and Miriam McCormick for he
