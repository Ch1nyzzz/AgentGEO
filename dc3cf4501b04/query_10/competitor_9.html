lpful feedback on the issues discussed in this paper. We have also profited from presentations and discussion of the topics under consideration at the workshop ‘Optimism – Its Nature, Causes and Effects’ at Senate House, London in February 2016.</span></p><p data-dcnode-id="3149" id="__p58"><span data-dcnode-id="3150" instrument_node="">In the preparation of this paper, Anneli Jefferson and Lisa Bortolotti acknowledge the support of Hope and Optimism: Conceptual and Empirical Investigations, a funding initiative by the Templeton Foundation, for a project entitled ‘Costs and Benefits of Optimism’ [grant ID 46501]. Lisa Bortolotti also acknowledges the support of a European Research Council Consolidator Grant [grant agreement 616358] for a project entitled ‘Pragmatic and Epistemic Role of Factually Erroneous Cognitions and Thoughts’ (PERFECT).</span></p></div></div><div class="tsec sec" data-dcnode-id="3127" id="fn-group-1"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3144"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3145" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3146" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3142" id="fn-group-1title"><span data-dcnode-id="3143" instrument_node="">Footnotes</span></h2><div class="fm-sec half_rhythm small" data-dcnode-id="3128"><p class="fn sec" data-dcnode-id="3137" id="fn1"><sup data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">1</span></sup><span data-dcnode-id="3138" instrument_node="">We thank James Shepperd for drawing this point to our attention.</span></p><p class="fn sec" data-dcnode-id="3133" id="fn2"><sup data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">2</span></sup><span data-dcnode-id="3134" instrument_node="">The example of heart attack may be considered problematic because the term heart attack is imprecise, which leads to imprecise the statistics. However, for the purposes of explaining our point, the actual data are not significant, rather the relation between the (fictional) numbers in the example is.</span></p><p class="fn sec" data-dcnode-id="3129" id="fn3"><sup data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">3</span></sup><span data-dcnode-id="3130" instrument_node="">Alternatively, we may deny that future contingents have a truth value at the time they are made. We will disregard this problem here.</span></p></div></div><div class="tsec sec" data-dcnode-id="1914" id="bi005"><div class="goto jig-ncbiinpagenav-goto-container" data-dcnode-id="3124"><a aria-expanded="false" aria-haspopup="true" class="tgt_dark page-toc-label jig-ncbiinpagenav-goto-heading" data-dcnode-id="3125" href="#" role="button" title="Go to other sections in this page"><span data-dcnode-id="3126" instrument_node="">Go to:</span></a></div><h2 class="head no_bottom_margin ui-helper-clearfix" data-dcnode-id="3122" id="bi005title"><span data-dcnode-id="3123" instrument_node="">References</span></h2><div class="ref-list-sec sec" data-dcnode-id="1915" id="reference-list"><div class="ref-cit-blk half_rhythm" data-dcnode-id="3110" id="b0005"><span data-dcnode-id="3121" instrument_node=""> </span><span class="element-citation" data-dcnode-id="3111" id="h0005"><span data-dcnode-id="3120" instrument_node="">Armor D.A., Taylor S.E.  Situated optimism: Specific outcome expectancies and self-regulation. In: Zanna M.P., editor. </span><span class="ref-journal" data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">Advances in experimental social psychology.</span></span><span data-dcnode-id="3117" instrument_node=""> Academic Press; New York: 1998. pp. 309–379. </span><span class="nowrap" data-dcnode-id="3112"><span data-dcnode-id="3116" instrument_node="">[</span><a aria-expanded="false" aria-haspopup="true" data-dcnode-id="3114"
