</span><h2 class="article-title" data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">The Benefits of Optimism</span></h2><span data-dcnode-id="1067" instrument_node="">
</span><h3 data-dcnode-id="1066"></h3><span data-dcnode-id="1065" instrument_node="">
</span><span class="article-meta" data-dcnode-id="1060"><span data-dcnode-id="1064" instrument_node="">
							By 
    
        
        
</span><a data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatergood.berkeley.edu/profile/christine_carter" style="padding-right: 0;"><span data-dcnode-id="1063" instrument_node="">Christine Carter</span></a><span data-dcnode-id="1061" instrument_node="">

         
    

						| April 7, 2008
						</span></span><span data-dcnode-id="1059" instrument_node="">
</span><ul class="list-actions" data-dcnode-id="1037"><span data-dcnode-id="1058" instrument_node="">
</span><li class="hidden-sm hidden-xs" data-dcnode-id="1049"><span data-dcnode-id="1057" instrument_node="">
</span><a aria-label="Print" data-dcnode-id="1051" href="#"><span data-dcnode-id="1056" instrument_node="">
</span><i aria-hidden="true" class="fa fa-print" data-dcnode-id="1053"><span class="sr-only" data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Print</span></span></i><span data-dcnode-id="1052" instrument_node="">
</span></a><span data-dcnode-id="1050" instrument_node="">
</span></li><span data-dcnode-id="1048" instrument_node="">
</span><li data-dcnode-id="1039"><span data-dcnode-id="1047" instrument_node="">
</span><a class="link-popup bookmark-logged-out" data-dcnode-id="1041" data-entry-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatergood.berkeley.edu/_ajax/login-popup%3Fpath%3Dhttps%3A//greatergood.berkeley.edu/article/item/the_benefits_of_optimism" style="display: inline;"><span data-dcnode-id="1046" instrument_node="">
</span><i aria-hidden="true" aria-label="Bookmark" class="far fa-bookmark" data-dcnode-id="1043"><span class="sr-only" data-dcnode-id="1044" style="position: absolute;"><span data-dcnode-id="1045" instrument_node="">Bookmark</span></span></i><span data-dcnode-id="1042" instrument_node="">

</span><div class="article-body" data-dcnode-id="499"><span data-dcnode-id="1031" instrument_node="">
</span><div class="article-entry" data-dcnode-id="853"><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1027"><em data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Just as despair can come to one another only from other human beings, hope, too, can be given to one only by other human beings. –Elie Wiesel</span></em></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1025" instrument_node="">Are our children hopeful?  Do they expect good in the world?  That things will work out for the best?  Optimism is so closely related to happiness that the two can practically be equated.  And guess what: optimism is a teachable skill.  Hope, faith and optimism are all positive emotions about the future, and so are essential parts of a happy childhood.  That is enough for me, but if a happy childhood isn't your first priority for your kids, think about these other benefits reaped by optimistic children.  Compared to pessimistic people, optimists are:</span><a data-dcnode-id="1023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatergood.berkeley.edu/tools-books.html%23optimism" target="_blank"><img alt="tools-icon-book.gif" border="0" data-dcnode-id="1024" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatergood.berkeley.edu/images/header-topNav/tools/icons/tools-icon-book.gif&amp;raw" style="padding-right: 12px; float: right"></a><br data-dcnode-id="1022"><span data-dcnode-id="1021" instrument_node="">
</span></p><span data-dcnode-id="1018" instrument_node="">
</span><ul data-dcnode-id="984"><span data-dcnode-id="1017" instrument_node="">
• More </span><strong data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">successful</span></strong><span data-dcnode-id="1014" instrument_node=""> in </span><strong data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">school</span></strong><span data-dcnode-id="1011" instrument_node="">, at </span><strong data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">work</span></strong><span data-dcnode-id="1008" instrument_node="">, and in </span><strong data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">athletics</span></strong><br data-dcnode-id="1005"><span data-dcnode-id="1004" instrument_node="">
• They are </span><strong data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">healthier</span></strong><span data-dcnode-id="1001" instrument_node="">  and they live longer</span><br data-dcnode-id="1000"><span data-dcnode-id="999" instrument_node="">
• They are more </span><strong data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">satisfied</span></strong><span data-dcnode-id="996" instrument_node="">  with their </span><strong data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">marriages</span></strong><br data-dcnode-id="993"><span data-dcnode-id="992" instrument_node="">
• They are </span><strong data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">less likely to suffer</span></strong><span data-dcnode-id="989" instrument_node="">  from depression</span><br data-dcnode-id="988"><span data-dcnode-id="987" instrument_node="">
• They are </span><strong data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">less anxious</span></strong></ul><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Who wouldn't want that list of benefits for themselves or for their kids?? (If you raised your hand, this is the wrong blog for you!)  Research points to three ways that kids learn to be either optimistic or pessimistic from their parents.</span></p><span data-dcnode-id="980" instrument_node="">

</span><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holstee.com/products/greater-good-toolkit"><span data-dcnode-id="963" instrument_node="">
</span><div class="ad-title" data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Meet the Greater Good Toolkit</span></div><span data-dcnode-id="960" instrument_node="">
</span><div class="ad-sub" data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">From the GGSC to your bookshelf: 30 science-backed tools for well-being.</span></div><span data-dcnode-id="957" instrument_node="">
</span></a><span data-dcnode-id="955" instrument_node="">
</span></footer><span data-dcnode-id="953" instrument_node="">
</span></div><p data-dcnode-id="950"></p><span data-dcnode-id="949" instrument_node="">
</span><ol data-dcnode-id="900"><span data-dcnode-id="948" instrument_node="">
(1) </span><strong data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Parental Affection.</span></strong><span data-dcnode-id="945" instrument_node="">   Since I am the huggiest person you'll ever meet, I LOVE that parental affection can influence your kids' outlook on life.  (My brother thinks my propensity to stand close and touch the people I'm talking with is indicative of what he calls "underdeveloped personal space disorder".  I wonder if I'm inadvertently fostering hope in my friends by invading their space.)  The researchers who direct the Penn Resiliency Project at the University of Pennsylvania say that kids whose parents are caring and affectionate are more hopeful.  Parental affection and care is—no duh—essential for kids to develop trust in the world.  When kids have a secure base in their parents, they tend to believe that the world is a good place.  In addition to fostering optimism, this allows them to take risks and explore—another way they learn to be optimistic. </span><p data-dcnode-id="943"></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="937"><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.feedburner.com/fb/a/emailverifySubmit%3FfeedId%3D1221515%26loc%3Den_US" target="_blank"><br data-dcnode-id="941"><span data-dcnode-id="940" instrument_node="">
</span><img alt="subscribe" border="0" data-dcnode-id="939" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatergood.berkeley.edu/images/header-topNav/tools/icons/tools-icon-subscribe.gif&amp;raw" style="padding-left: 12px; float: right" width="100"></a></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="934" instrument_node=""> (2)</span><strong data-dcnode-id="932"><span data-dcnode-id="933" instrument_node=""> By having the opportunity to take risks and fail. </span></strong><span data-dcnode-id="931" instrument_node="">   The ability to cope with challenge and frustration—even </span><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatergood.berkeley.edu/half_full/%3Fp%3D56"><span data-dcnode-id="930" instrument_node="">failure</span></a><span data-dcnode-id="928" instrument_node="">—is also critical for the development of optimism.  Research shows that kids who are protected from failure and adversity are less likely to develop optimism. Why?  When kids make mistakes and learn from them they also learn that they can overcome the challenges that likely lie ahead.  This makes them feel hopeful about the future.  However: repeated failures lead to learned helplessness, not optimism, so it is really important that the challenges children face are developmentally appropriate.  Too much challenge can overwhelm children, making them anxious and insecure.  </span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="925" instrument_node="">(3)</span><strong data-dcnode-id="923"><span data-dcnode-id="924" instrument_node=""> Modeling. </span></strong><span data-dcnode-id="922" instrument_node="">   Pessimistic parents are more likely to have pessimistic children.  Being an optimist means having a particular way of explaining events, like "explaining good events in terms of permanent causes," says </span><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatergood.berkeley.edu/tools-books.html%23optimism" target="_blank"><span data-dcnode-id="921" instrument_node="">Martin Seligman</span></a><span data-dcnode-id="919" instrument_node="">, who has studied optimism for more than two decades.  </span></p><span data-dcnode-id="917" instrument_node="">
</span><blockquote data-dcnode-id="914"><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">[Optimists] point to traits and abilities that they will always have, like being hard-working, likable, or lovable.  They use "always" when they describe the causes of good events.  Pessimists think in terms of transient causes.  "I was in a good mood," or "I practiced hard this time."  Their explanations of good events are qualified with the words, "sometimes" and "today," and they often use the past tense and limit it to time only ("I practiced hard this time.")  When children who believe their successes have permanent causes do well, they will try even harder next time.  Children who see temporary reasons for good events may give up even when they succeed, believing the success was a fluke.</span></p></blockquote><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="901"><a data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.npr.org/templates/story/story.php%3FstoryId%3D12103658" target="_blank"><img alt="radio-icon" border="0" data-dcnode-id="911" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatergood.berkeley.edu/images/header-topNav/tools/icons/tools-icon-radio.gif&amp;raw" style="padding-left: 5 px; float: right"></a><span data-dcnode-id="908" instrument_node="">More than modeling how you interpret events in our own lives, kids model how you interpret events in </span><em data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">their</span></em><span data-dcnode-id="905" instrument_node=""> lives.  In other words, kids are more sensitive to the feedback they get from their parents ("you are so lazy" or "that won't work") than they are to their parents' explanations about their own life events.  This means that when we criticize our children we make them more vulnerable to pessimism.  This adds a new dimension to thinking about </span><a data-dcnode-id="903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatergood.berkeley.edu/half_full/%3Fp%3D55"><span data-dcnode-id="904" instrument_node="">how we praise</span></a><span data-dcnode-id="902" instrument_node=""> kids.  In coming weeks, we'll learn more about what optimism really is and how best to teach it to our kids.</span></p></ol><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="886"><em data-dcnode-id="889"><em data-dcnode-id="890"><em data-dcnode-id="891"><span data-dcnode-id="898" instrument_node="">Christine Carter, Ph.D., is a mother of two and the executive director of the </span><a data-dcnode-id="896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatergoodscience.org/"><span data-dcnode-id="897" instrument_node="">Greater Good Science Center at UC Berkeley</span></a><span data-dcnode-id="895" instrument_node="">.  Find more tips for raising happy kids at </span><a data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.greatergoodparents.org/"><span data-dcnode-id="894" instrument_node="">greatergoodparents.org</span></a><span data-dcnode-id="892" instrument_node="">. </span></em></em></em><br data-dcnode-id="888"><span data-dcnode-id="887" instrument_node="">
</span></p><p data-dcnode-id="879"><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatergood.berkeley.edu/raising_happiness/post/100000_happier_parents_are_you_willing_to_be_one/" title="Join the Campaign for 100,000 Happier Parents"><span data-dcnode-id="885" instrument_node="">Join the Campaign for 100,000 Happier Parents</span></a><span data-dcnode-id="883" instrument_node=""> by signing this simple </span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surveymonkey.com/s/100khappierparents" title="pledge"><span data-dcnode-id="882" instrument_node="">pledge</span></a><span data-dcnode-id="880" instrument_node="">.</span></p><span data-dcnode-id="878" instrument_node="">

</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Okay, so I’m struggling with the praise concept. Here it seems like we want to encourage our kids to think of themselves as having permanent positive traits… doesn’t this go against your previous blog about praise? “You are a fantastic baseball player.”(permanent positive trait) verses “You connected with the ball much better this time” (qualified to this time only).</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">I’ve read Alfie Kohn’s book and I get the idea that I don’t want my kid to think I love her only when she’s “good”. Can you provide more information about how these two things you’ve talked about don’t conflict?</span></p><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Thanks!</span></p><span data-dcnode-id="596" instrument_node="">
</span><p class="ar" data-dcnode-id="591"><small data-dcnode-id="592"><span data-dcnode-id="595" instrument_node="">Rebecca | 3:29 pm, April 10, 2008 | </span><a data-dcnode-id="593" href="#c2065" title="#c2065"><span data-dcnode-id="594" instrument_node="">Link</span></a></small></p><span data-dcnode-id="590" instrument_node="">

</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">I have to wonder what science says about genetic tendencies in disposition.&nbsp; I am a sunny optimist.&nbsp; My more difficult child is a sunny optimist.&nbsp; My child who is easier to parent, receives far less discipline and is praised frequently for his high achievements is , i feel, by nature a pessimist.&nbsp; I believe strongly in praise and feel that it will have a</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">positive effect on my eeyore, but at some point , when he is older, I feel that he will need to take responsibility for his disposition.&nbsp; I do not feel that it is my job to make him happy.&nbsp; I do feel it is my job to give unconditional love and guidance as needed.&nbsp; Thanks for your blog and your suggestions.</span></p><span data-dcnode-id="572" instrument_node="">
