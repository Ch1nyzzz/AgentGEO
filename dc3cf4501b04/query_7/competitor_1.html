</span><meta content="The present study examined in a stringent developmental model whether positivity, conceptualized as a pervasive mode of appraising, viewing, and perceiving life from a positive stance, predicts chronic positive affectivity across time or vice versa. Participants [263 participants (47 % males)], aged 15.5 at the beginning of the study and 23.5 at the end, reported on measures of positivity and dispositional positive affect four times. Longitudinal findings corroborated the posited paths of relations, with positivity significantly predicting positive affectivity across time rather than vice versa." data-dcnode-id="4560" property="og:description"><span data-dcnode-id="4559" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="1765" data-track-component="article body"><span data-dcnode-id="4119" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="4112" data-gtm-vis-first-on-screen-50443292_562="1745" data-gtm-vis-first-on-screen-50443292_563="1749" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1745" data-gtm-vis-recent-on-screen-50443292_563="1749" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="4113" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4117" id="Abs1"><span data-dcnode-id="4118" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="4114" id="Abs1-content"><p data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">
The present study examined in a stringent developmental model whether positivity, conceptualized as a pervasive mode of appraising, viewing, and perceiving life from a positive stance, predicts chronic positive affectivity across time or vice versa. Participants [263 participants (47&nbsp;% males)], aged 15.5 at the beginning of the study and 23.5 at the end, reported on measures of positivity and dispositional positive affect four times. Longitudinal findings corroborated the posited paths of relations, with positivity significantly predicting positive affectivity across time rather than vice versa.</span></p></div></div></section><span data-dcnode-id="4111" instrument_node="">
</span><section data-dcnode-id="3868" data-gtm-vis-first-on-screen-50443292_562="1749" data-gtm-vis-first-on-screen-50443292_563="1750" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1749" data-gtm-vis-recent-on-screen-50443292_563="1750" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="3869" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4109" id="Sec1"><span data-dcnode-id="4110" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="3870" id="Sec1-content"><p data-dcnode-id="4098"><span data-dcnode-id="4108" instrument_node="">
Current views of happiness highlight states of well-being in which the individual realizes his or her own potential and is able to engage in rewarding relationships with others, value life and experience, turn challenges into opportunities for growth, work productively, and actively promote his or her own health (Ryan and Deci </span><a aria-label="Reference 2001" data-dcnode-id="4106" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d172700698e312" title="Ryan, R. M., &amp; Deci, E. L. (2001). On happiness and human potentials: A review of research on hedonic and eudaimonic well-being. Annual Review of Psychology, 
                           52, 141–166. doi:
                    10.1146/annurev.psych.52.1.141
                    
                  ."><span data-dcnode-id="4107" instrument_node="">2001</span></a><span data-dcnode-id="4105" instrument_node="">; World Health Organization </span><a aria-label="Reference 2004" data-dcnode-id="4103" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d172700698e315" title="World Health Organization. (2004). The world health report, 2004. Changing history. Geneva: World Health Organization."><span data-dcnode-id="4104" instrument_node="">2004</span></a><span data-dcnode-id="4102" instrument_node="">). Indeed, even severe conditions of illness can be better addressed by acknowledging the individuals’ characteristics that predispose them to adaptive functioning and enable them to cope with adversities by capitalizing upon their own strengths (Scheier and Carver </span><a aria-label="Reference 2001" data-dcnode-id="4100" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d172700698e318" title="Scheier, M. F., &amp; Carver, C. S. (2001). Adapting to cancer: The importance of hope and purpose. In A. Baum &amp; B. L. Andersen (Eds.), Psychosocial interventions for cancer (pp. 15–36). Washington, DC: American Psychological Association."><span data-dcnode-id="4101" instrument_node="">2001</span></a><span data-dcnode-id="4099" instrument_node="">).</span></p><p data-dcnode-id="4078"><span data-dcnode-id="4097" instrument_node="">
Among the individual characteristics that have been previously associated with a variety of positive outcomes, self-esteem (Baumeister et al. </span><a aria-label="Reference 2003" data-dcnode-id="4095" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d172700698e324" title="Baumeister, R. F., Campbell, J. D., Krueger, J. I., &amp; Vohs, K. D. (2003). Does high self-esteem cause better performance, interpersonal success, happiness, or healthier lifestyles? Psychological Science in the Public Interest, 
                           4(Whole No. 1), 1–44."><span data-dcnode-id="4096" instrument_node="">2003</span></a><span data-dcnode-id="4094" instrument_node="">), optimism (Carver et al. </span><a aria-label="Reference 2010" data-dcnode-id="4092" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d172700698e327" title="Carver, C. S., Scheier, M. F., &amp; Segerstrom, S. C. (2010). Optimism. Clinical Psychology Review, 
                           30, 879–889. doi:
                    10.1016/j.cpr.2010.01.006
                    
                  ."><span data-dcnode-id="4093" instrument_node="">2010</span></a><span data-dcnode-id="4091" instrument_node="">), and life satisfaction (Pavot and Diener </span><a aria-label="Reference 2008" data-dcnode-id="4089" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d172700698e330" title="Pavot, W., &amp; Diener, E. (2008). The satisfaction with life scale and the emerging construct of life satisfaction. Journal of Positive Psychology, 
                           3, 137–152. doi:
                    10.1080/1743976070175694
                    
                  ."><span data-dcnode-id="4090" instrument_node="">2008</span></a><span data-dcnode-id="4088" instrument_node="">) have been recently traced to a common disposition named positivity (POS) (Caprara et al. </span><a aria-label="Reference 2009" data-dcnode-id="4086" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d172700698e333" title="Caprara, G. V., Fagnani, C., Alessandri, G., Steca, P., Gigantesco, A., Cavalli Sforza, L. L., et al. (2009). Human optimal functioning: The genetics of positive orientation towards self, life, and the future. Behaviour Genetics, 
                           39, 277–284. doi:
                    10.1007/s10519-009-9267-y
                    
                  ."><span data-dcnode-id="4087" instrument_node="">2009</span></a><span data-dcnode-id="4085" instrument_node="">). Similarly, chronic positive affect has been previously associated with subjective well-being and individual differences in chronic positive affectivity has been viewed as an enduring disposition associated with a variety of positive outcomes and wellbeing (Lyubomirsky et al. </span><a aria-label="Reference 2005" data-dcnode-id="4083" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d172700698e336" title="Lyubomirsky, S., King, L., &amp; Diener, E. (2005). The benefits of frequent positive affect: Does happiness lead to success? Psychological Bulletin, 
                           131, 803–855. doi:
                    10.1037/0033-2909.131.6.803
                    
                  ."><span data-dcnode-id="4084" instrument_node="">2005</span></a><span data-dcnode-id="4082" instrument_node="">; Pressman and Cohen </span><a aria-label="Reference 2005" data-dcnode-id="4080" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d172700698e340" title="Pressman, S. D., &amp; Cohen, S. (2005). Does positive affect influence health? Psychological Bulletin, 
                           131, 925–971. doi:
                    10.1037/00332909.131.6.925
                    
                  ."><span data-dcnode-id="4081" instrument_node="">2005</span></a><span data-dcnode-id="4079" instrument_node="">). The extent to which POS and chronic positive affectivity relate to each other is unknown and is the target of the present article.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4076" id="Sec2"><span data-dcnode-id="4077" instrument_node="">Positivity</span></h3><p data-dcnode-id="4047"><span data-dcnode-id="4075" instrument_node="">A large set of studies corroborates the idea that POS represents a common latent factor underlying self-esteem, life satisfaction, and dispositional optimism in diverse samples and cultures (Caprara et al. </span><a aria-label="Reference 2012a" data-dcnode-id="4073" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d172700698e350" title="Caprara, G. V., Alessandri, G., Eisenberg, N., Kupfer, A., Steca, P., Caprara, M. G., et al. (2012a). The positivity scale. Psychological Assessment, 
                           24, 701–712. doi:
                    10.1037/a0026681
                    
                  ."><span data-dcnode-id="4074" instrument_node="">2012a</span></a><span data-dcnode-id="4072" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="4070" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d172700698e353" title="Caprara, G. V., Alessandri, G., Trommsdorff, G., Heikamp, T., Yamaguchi, S., &amp; Suzuki, F. (2012b). Positive orientation across countries. Journal of Cross Cultural Psychology, 
                           43, 77–83. doi:
                    10.1177/0022022111422257
                    
                  ."><span data-dcnode-id="4071" instrument_node="">b</span></a><span data-dcnode-id="4069" instrument_node="">). Twin studies show that heritability accounts for about the 50&nbsp;% of the variance of this latent dimension, whereas unshared environment accounts for the remaining (Fagnani et al. </span><a aria-label="Reference 2014" data-dcnode-id="4067" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d172700698e356" title="Fagnani, C., Medda, E., Stazi, M. A., Caprara, G. V., &amp; Alessandri, G. (2014). Investigation of age and gender effects on positive orientation in Italian Twins. International Journal of Psychology, 
                           6, 453–461. doi:
                    10.1002/ijop.12053
                    
                  ."><span data-dcnode-id="4068" instrument_node="">2014</span></a><span data-dcnode-id="4066" instrument_node="">). Further studies have provided evidence of the stability of POS over the course of development and to its potential positive effect on people’s lives across diverse domains of functioning including health, work performance, psychological well-being, and social adjustment (Alessandri et al. </span><a aria-label="Reference 2012a" data-dcnode-id="4064" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d172700698e359" title="Alessandri, G., Caprara, G. V., &amp; Tisak, J. (2012a). Further explorations on the unique contribution of positive orientation to optimal functioning. European Psychologist, 
                           17, 44–54. doi:
                    10.1027/1016-9040/a000070
                    
                  ."><span data-dcnode-id="4065" instrument_node="">2012a</span></a><span data-dcnode-id="4063" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="4061" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d172700698e362" title="Alessandri, G., Caprara, G. V., &amp; Tisak, J. (2012b). A unified latent curve, latent state-trait analysis of the developmental trajectories and correlates of positive orientation. Multivariate Behavioral Research, 
                           47, 341–368. doi:
                    10.1080/00273171.2012.673954
                    
                  ."><span data-dcnode-id="4062" instrument_node="">b</span></a><span data-dcnode-id="4060" instrument_node="">; Fagnani et al. </span><a aria-label="Reference 2014" data-dcnode-id="4058" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d172700698e366" title="Fagnani, C., Medda, E., Stazi, M. A., Caprara, G. V., &amp; Alessandri, G. (2014). Investigation of age and gender effects on positive orientation in Italian Twins. International Journal of Psychology, 
                           6, 453–461. doi:
                    10.1002/ijop.12053
                    
                  ."><span data-dcnode-id="4059" instrument_node="">2014</span></a><span data-dcnode-id="4057" instrument_node="">). Of interest, little residual variance was explained in the above outcomes by self-esteem, life satisfaction, and optimism once their common component was taken into account (Alessandri et al. </span><a aria-label="Reference 2012b" data-dcnode-id="4055" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d172700698e369" title="Alessandri, G., Caprara, G. V., &amp; Tisak, J. (2012b). A unified latent curve, latent state-trait analysis of the developmental trajectories and correlates of positive orientation. Multivariate Behavioral Research, 
                           47, 341–368. doi:
                    10.1080/00273171.2012.673954
                    
                  ."><span data-dcnode-id="4056" instrument_node="">2012b</span></a><span data-dcnode-id="4054" instrument_node="">, </span><a aria-label="Reference c" data-dcnode-id="4052" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d172700698e372" title="Alessandri, G., Vecchione, M., Tisak, J., DeIana, G., Caria, S., &amp; Caprara, G. V. (2012c). The utility of positive orientation in predicting job performance and organizational citizenship behaviors. Applied Psychology: An International Review,. doi:
                    10.1111/j.1464-0597.2012.00511.x
                    
                  ."><span data-dcnode-id="4053" instrument_node="">c</span></a><span data-dcnode-id="4051" instrument_node="">, </span><a aria-label="Reference 2015" data-dcnode-id="4049" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d172700698e375" title="Alessandri, G., Borgogni, L., Schaufeli, B. W., Caprara, G. V., &amp; Consiglio, C. (2015a). From positive orientation to job performance: The role of work engagement and self-efficacy beliefs. Journal of Happiness Studies, 
                           16, 767–788. doi:
                    10.1007/s10902-014-9533-4
                    
                  ."><span data-dcnode-id="4050" instrument_node="">2015</span></a><span data-dcnode-id="4048" instrument_node="">).</span></p><p data-dcnode-id="4036"><span data-dcnode-id="4046" instrument_node="">Summarizing, these results support the argument that POS is a stable evaluative disposition, which is primarily cognitive in nature. Self-esteem, life satisfaction, and optimism represent its major phenomenological expressions. The basic tenet of the developing theory regarding POS is that viewing oneself, life, and the future from a positive outlook reflects a basic trait that has an important biological function of making people prone to cope with life despite adversities, failures, and loss (Caprara et al. </span><a aria-label="Reference 2009" data-dcnode-id="4044" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d172700698e381" title="Caprara, G. V., Fagnani, C., Alessandri, G., Steca, P., Gigantesco, A., Cavalli Sforza, L. L., et al. (2009). Human optimal functioning: The genetics of positive orientation towards self, life, and the future. Behaviour Genetics, 
                           39, 277–284. doi:
                    10.1007/s10519-009-9267-y
                    
                  ."><span data-dcnode-id="4045" instrument_node="">2009</span></a><span data-dcnode-id="4043" instrument_node="">). Such an approach to life is believed to be necessary for sustaining people’s growth, flourishing, and their willingness to continue to care about living, despite the decline of aging and the idea of death (Caprara et al. </span><a aria-label="Reference 2010a" data-dcnode-id="4041" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d172700698e384" title="Caprara, G. V., Alessandri, G., &amp; Barbaranelli, C. (2010a). Optimal functioning: Contribution of self-efficacy beliefs to positive orientation. Psychotherapy and Psychosomatics, 
                           79, 328–330. doi:
                    10.1159/000319532
                    
                  ."><span data-dcnode-id="4042" instrument_node="">2010a</span></a><span data-dcnode-id="4040" instrument_node="">, </span><a aria-label="Reference b
" data-dcnode-id="4038" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d172700698e387" title="Caprara, G. V., Steca, P., Alessandri, G., Abela, J. R. Z., &amp; McWhinnie, C. M. (2010b). Positive orientation: Explorations on what is common to life satisfaction, self-esteem, and optimism. Epidemiologia e Psichiatria Sociale, 
                           19, 63–71. doi:
                    10.1017/S1121189X00001615
                    
                  ."><span data-dcnode-id="4039" instrument_node="">b
</span></a><span data-dcnode-id="4037" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4034" id="Sec3"><span data-dcnode-id="4035" instrument_node="">Theory Regarding POS</span></h3><p data-dcnode-id="4017"><span data-dcnode-id="4033" instrument_node="">The reasoning underlying POS is built upon the earlier intuitions of Beck (</span><a aria-label="Reference 1967" data-dcnode-id="4031" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d172700698e398" title="Beck, A. T. (1967). Depression: Clinical, experimental, and theoretical aspects. New York: Harper &amp; Row."><span data-dcnode-id="4032" instrument_node="">1967</span></a><span data-dcnode-id="4030" instrument_node="">), who posited that a negative view of oneself, the world, and the future at the core of social cognitive processing of depressed versus non-depressed persons. In particular, Caprara et al. (</span><a aria-label="Reference 2009" data-dcnode-id="4028" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d172700698e401" title="Caprara, G. V., Fagnani, C., Alessandri, G., Steca, P., Gigantesco, A., Cavalli Sforza, L. L., et al. (2009). Human optimal functioning: The genetics of positive orientation towards self, life, and the future. Behaviour Genetics, 
                           39, 277–284. doi:
                    10.1007/s10519-009-9267-y
                    
                  ."><span data-dcnode-id="4029" instrument_node="">2009</span></a><span data-dcnode-id="4027" instrument_node="">, </span><a aria-label="Reference 2010a" data-dcnode-id="4025" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d172700698e404" title="Caprara, G. V., Alessandri, G., &amp; Barbaranelli, C. (2010a). Optimal functioning: Contribution of self-efficacy beliefs to positive orientation. Psychotherapy and Psychosomatics, 
                           79, 328–330. doi:
                    10.1159/000319532
                    
                  ."><span data-dcnode-id="4026" instrument_node="">2010a</span></a><span data-dcnode-id="4024" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="4022" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d172700698e407" title="Caprara, G. V., Steca, P., Alessandri, G., Abela, J. R. Z., &amp; McWhinnie, C. M. (2010b). Positive orientation: Explorations on what is common to life satisfaction, self-esteem, and optimism. Epidemiologia e Psichiatria Sociale, 
                           19, 63–71. doi:
                    10.1017/S1121189X00001615
                    
                  ."><span data-dcnode-id="4023" instrument_node="">b</span></a><span data-dcnode-id="4021" instrument_node="">) posited the existence of an analogous positive cognitive triad that leads people to hold a positive view of themselves, their life, and the future, and is reflected in observed levels of self-esteem, life satisfaction, and optimism (see Alessandri et al. </span><a aria-label="Reference 2012a" data-dcnode-id="4019" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d172700698e410" title="Alessandri, G., Caprara, G. V., &amp; Tisak, J. (2012a). Further explorations on the unique contribution of positive orientation to optimal functioning. European Psychologist, 
                           17, 44–54. doi:
                    10.1027/1016-9040/a000070
                    
                  ."><span data-dcnode-id="4020" instrument_node="">2012a</span></a><span data-dcnode-id="4018" instrument_node="">).</span></p><p data-dcnode-id="3997"><span data-dcnode-id="4016" instrument_node="">The idea of a general propensity to evaluate life from a positive outlook is not new. Likewise, the name given to that dimension (i.e., POS) is not completely new. Indeed, many authors have pointed to individual differences that, to varying degrees, can be traced to a general tendency to approach one’s experience with a positive outlook. Scheier and Carver (</span><a aria-label="Reference 1993" data-dcnode-id="4014" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d172700698e416" title="Scheier, M. F., &amp; Carver, C. S. (1993). On the power of positive thinking: Benefits of being optimistic. Current Directions in Psychological Science, 
                           2, 26–30. doi:
                    10.1111/1467-8721.ep10770572
                    
                  ."><span data-dcnode-id="4015" instrument_node="">1993</span></a><span data-dcnode-id="4013" instrument_node="">) suggested that positive thinking is at the core of individuals’ confidence in their future. Kozma et al. (</span><a aria-label="Reference 2000" data-dcnode-id="4011" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d172700698e419" title="Kozma, A., Stone, S., &amp; Stones, M. J. (2000). Stability in components and predictors of subjective well-being (SWB): Implications for SWB structure. In E. Diener &amp; D. R. Rahtz (Eds.), Advances in quality of life theory and research (Vol. I, pp. 13–30). London: Kluwer Academic Publishers."><span data-dcnode-id="4012" instrument_node="">2000</span></a><span data-dcnode-id="4010" instrument_node="">) described POS as a general dispositional determinant of subjective well being (SWB), which operates much like a trait, and may account for individual variation and stability in happiness despite environmental change. Diener et al. (</span><a aria-label="Reference 2000" data-dcnode-id="4008" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d172700698e422" title="Diener, E., Scollon, C. K. N., Oishi, S., Dzokoto, V., &amp; Suh, E. M. (2000). Positivity and the construction of life satisfaction judgments: Global happiness is not the sum of its part. Journal of Happiness Studies, 
                           1, 159–176. doi:
                    10.1023/A:1010031813405
                    
                  ."><span data-dcnode-id="4009" instrument_node="">2000</span></a><span data-dcnode-id="4007" instrument_node="">) referred to POS as a propensity to evaluate aspects of life in general as good. In the view of Diener et al. (</span><a aria-label="Reference 2000" data-dcnode-id="4005" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d172700698e425" title="Diener, E., Scollon, C. K. N., Oishi, S., Dzokoto, V., &amp; Suh, E. M. (2000). Positivity and the construction of life satisfaction judgments: Global happiness is not the sum of its part. Journal of Happiness Studies, 
                           1, 159–176. doi:
                    10.1023/A:1010031813405
                    
                  ."><span data-dcnode-id="4006" instrument_node="">2000</span></a><span data-dcnode-id="4004" instrument_node="">) view, global satisfaction was more than just the sum of specific domains satisfaction (like recreation, education and oneself) but rather the expression of a trait that colors the way people perceive the world. Finally, the label of POS has been used to refer to cluster of positive emotions that color “peoples’ day to day lives” (Frederickson </span><a aria-label="Reference 2009" data-dcnode-id="4002" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d172700698e428" title="Fredrickson, B. L. (2009). Positivity. New York: Three Rivers Press."><span data-dcnode-id="4003" instrument_node="">2009</span></a><span data-dcnode-id="4001" instrument_node="">, p. 39) and to the latent construct of behavioral and evaluative tendencies, including sense of mastery, self-esteem, life satisfaction, and coping (see Neppl et al. </span><a aria-label="Reference 2015" data-dcnode-id="3999" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d172700698e432" title="Neppl, T. K., Jeon, S., Schofield, T. J., &amp; Donnellan, B. M. (2015). The impact of economic pressure on parent positivity, parenting, and adolescent positivity into emerging adulthood. Family Relations, 
                           64, 80–92. doi:
                    10.1111/fare.12098
                    
                  ."><span data-dcnode-id="4000" instrument_node="">2015</span></a><span data-dcnode-id="3998" instrument_node="">).</span></p><p data-dcnode-id="3992"><span data-dcnode-id="3996" instrument_node="">Caprara and his colleagues’ theorizing about POS shares with previous perspectives the idea of the existence of a pervasive human tendency to construe the subjective individual experiences from a positive outlook. This tendency is believed to be based on the functioning of self-referent evaluative processes, which operate when individuals assess themselves as living beings, by reflecting on their past life conditions, by making reference to their present, their past, and what they expect from the future. The primacy assigned to self-referential thoughts, and to the proclivity to positively interpret external stimuli regarding the self, is what, in our opinion, distinguishes POS, from the above perspectives, and from other constructs like core self-evaluations (CSE) that share some of its components (Judge and Bono </span><a aria-label="Reference 2001" data-dcnode-id="3994" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d172700698e438" title="Judge, T. A., &amp; Bono, J. E. (2001). Relationship of core self-evaluations traits—self-esteem, generalized self-efficacy, locus of control, and emotional stability—with job satisfaction and job performance: A meta-analysis. Journal of Applied Psychology, 
                           86, 80–92. doi:
                    10.1037//0021-9010.86.1.80
                    
                  ."><span data-dcnode-id="3995" instrument_node="">2001</span></a><span data-dcnode-id="3993" instrument_node="">).</span></p><p data-dcnode-id="3981"><span data-dcnode-id="3991" instrument_node="">The association of POS with self-referential information processing has recently been confirmed by a electroencephalographic study reporting an association between POS and electric activity in two areas brain areas (i.e., BA23 and BA31), member of the posterior cingulate (Alessandri et al. </span><a aria-label="Reference 2015" data-dcnode-id="3989" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d172700698e444" title="Alessandri, G., Caprara, G. V., &amp; De Pascalis, V. (2015b). Relations among EEG-alpha asymmetry and positivity personality trait. Brain and Cognition, 
                           5(97), 10–21. doi:
                    10.1016/j.bandc.2015.04.003
                    
                  ."><span data-dcnode-id="3990" instrument_node="">2015</span></a><span data-dcnode-id="3988" instrument_node="">). These areas are part of a complex default-mode neural network (DMN). The activity in the DMN appears to play a predominant role in identifying self-relevant stimuli by integrating cognitive and emotional processing, and in introspective self-referential processing, such as the appraisal and evaluation of the self-relevant stimuli (Gallagher and Frith </span><a aria-label="Reference 2003" data-dcnode-id="3986" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d172700698e447" title="Gallagher, H. L., &amp; Frith, C. D. (2003). Functional imaging of ‘theory of mind’. Trends in Cognitive Science, 
                           7, 77–83. doi:
                    10.1016/S1364-6613(02)00025-6
                    
                  ."><span data-dcnode-id="3987" instrument_node="">2003</span></a><span data-dcnode-id="3985" instrument_node="">; Gusnard et al. </span><a aria-label="Reference 2001" data-dcnode-id="3983" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d172700698e450" title="Gusnard, D. A., Akbudak, E., Shulman, G. L., &amp; Raichle, M. E. (2001). Medial prefrontal cortex and self-referential mental activity: Relation to a default mode of brain function. Proceedings of the National Academy of Sciences USA, 
                           98, 4259–4264."><span data-dcnode-id="3984" instrument_node="">2001</span></a><span data-dcnode-id="3982" instrument_node="">).</span></p><p data-dcnode-id="3967"><span data-dcnode-id="3980" instrument_node="">Moreover, POS has accounted for a significant portion of variance in studies examining people’s tendencies to overestimate their performance and attributes. In particular, POS correlated with individuals’ tendency to perceive their academic performance better than the average independently of their previous objective academic achievements (Caprara et al. </span><a aria-label="Reference 2012a" data-dcnode-id="3978" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d172700698e457" title="Caprara, G. V., Alessandri, G., Eisenberg, N., Kupfer, A., Steca, P., Caprara, M. G., et al. (2012a). The positivity scale. Psychological Assessment, 
                           24, 701–712. doi:
                    10.1037/a0026681
                    
                  ."><span data-dcnode-id="3979" instrument_node="">2012a</span></a><span data-dcnode-id="3977" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="3975" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d172700698e460" title="Caprara, G. V., Alessandri, G., Trommsdorff, G., Heikamp, T., Yamaguchi, S., &amp; Suzuki, F. (2012b). Positive orientation across countries. Journal of Cross Cultural Psychology, 
                           43, 77–83. doi:
                    10.1177/0022022111422257
                    
                  ."><span data-dcnode-id="3976" instrument_node="">b</span></a><span data-dcnode-id="3974" instrument_node="">). Thus, there is reason to believe that POS may account (at least in part) for many phenomena that have been previously regarded as positive illusions, self-serving comparisons and distortions, egocentric bias, and self-enhancement manoeuvres (Cummins and Nistico </span><a aria-label="Reference 2002" data-dcnode-id="3972" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d172700698e463" title="Cummins, R. A., &amp; Nistico, H. (2002). Maintaining life satisfaction: The role of positive cognitive bias. Journal of Happiness Studies, 
                           3, 37–69. doi:
                    10.1023/a:1015678915305
                    
                  ."><span data-dcnode-id="3973" instrument_node="">2002</span></a><span data-dcnode-id="3971" instrument_node="">; Taylor and Brown </span><a aria-label="Reference 1988" data-dcnode-id="3969" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d172700698e466" title="Taylor, S. E., &amp; Brown, J. D. (1988). Illusion and well-being: A social psychological perspective on mental health. Psychological Bulletin, 
                           103, 193–210. doi:
                    10.1037/0033-2909.103.2.193
                    
                  ."><span data-dcnode-id="3970" instrument_node="">1988</span></a><span data-dcnode-id="3968" instrument_node="">).</span></p><p data-dcnode-id="3956"><span data-dcnode-id="3966" instrument_node="">However, there is reason to doubt that these phenomena always reflect flawed judgments. Indeed, they may also represent assets that help to make life worth living, despite the limitations of the human condition. Self-serving evaluations and comparisons, in particular, may have beneficial effects because they increase positive affect that, in turn, fosters affect regulation and appears to affect health and wellbeing (Lyubomirsky et al. </span><a aria-label="Reference 2005" data-dcnode-id="3964" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d172700698e472" title="Lyubomirsky, S., King, L., &amp; Diener, E. (2005). The benefits of frequent positive affect: Does happiness lead to success? Psychological Bulletin, 
                           131, 803–855. doi:
                    10.1037/0033-2909.131.6.803
                    
                  ."><span data-dcnode-id="3965" instrument_node="">2005</span></a><span data-dcnode-id="3963" instrument_node="">; Taylor et al. </span><a aria-label="Reference 2003" data-dcnode-id="3961" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d172700698e475" title="Taylor, S. E., Lerner, J. S., Sherman, D. K., Sage, R. M., &amp; McDowell, N. K. (2003). Are self-enhancing cognitions associated with healthy or unhealthy biological profiles? Journal of Personality and Social Psychology, 
                           85, 605–615. doi:
                    10.1037/0022-3514.85.4.605
                    
                  ."><span data-dcnode-id="3962" instrument_node="">2003</span></a><span data-dcnode-id="3960" instrument_node="">). Positive affect helps to preserve a state of optimal vigilance toward threats, compensate for the effects of negative affect, and help to cope effectively with uncertainties and setbacks (Roese and Olson </span><a aria-label="Reference 2007" data-dcnode-id="3958" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d172700698e478" title="Roese, N. J., &amp; Olson, J. M. (2007). Better, stronger, faster: Self-serving judgment, affect regulation, and the optimal vigilance hypothesis. Perspectives on Psychological Science, 
                           2, 124–141. doi:
                    10.1111/j.1745-6916.2007.00033.x
                    
                  ."><span data-dcnode-id="3959" instrument_node="">2007</span></a><span data-dcnode-id="3957" instrument_node="">).</span></p><p data-dcnode-id="3948"><span data-dcnode-id="3955" instrument_node="">Yet, to our knowledge, researchers have not systematically investigated whether the habitual level of individuals’ positive affect is partly dependent on the functioning of a more general cognitive predisposition to approach reality. The idea is that POS might be part of humans’ biological equipment that predisposes them to benefit from positive events. In this regard, Cacioppo and Berntson (</span><a aria-label="Reference 1999" data-dcnode-id="3953" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d172700698e484" title="Cacioppo, J. T., &amp; Berntson, G. G. (1999). The affect system: Architecture and operating characteristics. Current Directions in Psychological Science, 
                           8, 133–137. doi:
                    10.1111/1467-8721.00031
                    
                  ."><span data-dcnode-id="3954" instrument_node="">1999</span></a><span data-dcnode-id="3952" instrument_node="">) described a ‘POS offset’ as a general tendency of humans to be positively predisposed towards neutral stimuli. This tendency may counter balance the natural reactivity of humans to negative stimuli (Baumeister et al. </span><a aria-label="Reference 2001" data-dcnode-id="3950" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d172700698e487" title="Baumeister, R. F., Bratslavsky, E., Finkenauer, C., &amp; Vohs, K. D. (2001). Bad is stronger than good. Review of General Psychology, 
                           5, 323–370. doi:
                    10.1037/1089-2680.5.4.323
                    
                  ."><span data-dcnode-id="3951" instrument_node="">2001</span></a><span data-dcnode-id="3949" instrument_node="">). In brief, POS represents the cognitive evaluative structure at the core of self-esteem, life satisfaction, and optimism, as the expression of a more general tendency to positively evaluate external reality. Moreover, we predicted that POS, in general, provides the motivational force to construe experience in a way that fosters positive affectivity. More specifically, individual differences in POS were hypothesized to predict dispositional differences in positive affectivity.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3946" id="Sec4"><span data-dcnode-id="3947" instrument_node="">Positive Affect</span></h3><p data-dcnode-id="3905"><span data-dcnode-id="3945" instrument_node="">The frequency of positive affect (PA), namely feelings and emotions that reflect a pleasurable engagement with the environment such as joy, excitement, contentment, interest and enthusiasm (Watson et al. </span><a aria-label="Reference 1988" data-dcnode-id="3943" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d172700698e499" title="Watson, D., Clark, L. A., &amp; Tellegen, A. (1988). Development and validation of brief measures of positive and negative affect: The PANAS scales. Journal of Personality and Social Psychology, 
                           54, 1063–1070. doi:
                    10.1037/0022-3514.54.6.1020
                    
                  ."><span data-dcnode-id="3944" instrument_node="">1988</span></a><span data-dcnode-id="3942" instrument_node="">), has been viewed as a key indicator of well-being. PA has been associated with many positive healthy outcomes through its apparent effects on social relationships (Neyer and Asendorpf </span><a aria-label="Reference 2001" data-dcnode-id="3940" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d172700698e502" title="Neyer, F. J., &amp; Asendorpf, J. B. (2001). Personality–relationship transaction in young adulthood. Journal of Personality and Social Psychology, 
                           81, 1190–1204. doi:
                    10.1037/0022-3514.81.6.1190
                    
                  ."><span data-dcnode-id="3941" instrument_node="">2001</span></a><span data-dcnode-id="3939" instrument_node="">), cognition (Bolte et al. </span><a aria-label="Reference 2003" data-dcnode-id="3937" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d172700698e505" title="Bolte, A., Goschkey, T., &amp; Kuhl, J. (2003). Emotion and intuition: Effects of positive and negative mood on implicit judgments of semantic coherence. Psychological Science, 
                           14, 416–421. doi:
                    10.1111/1467-9280.01456
                    
                  ."><span data-dcnode-id="3938" instrument_node="">2003</span></a><span data-dcnode-id="3936" instrument_node="">; Fredrickson and Branigan </span><a aria-label="Reference 2005" data-dcnode-id="3934" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d172700698e508" title="Fredrickson, B. L., &amp; Branigan, C. A. (2005). Positive emotions broaden the scope of attention and thought–action repertoires. Cognition and Emotion, 
                           19, 313–332. doi:
                    10.1080/02699930441000238
                    
                  ."><span data-dcnode-id="3935" instrument_node="">2005</span></a><span data-dcnode-id="3933" instrument_node="">; Rowe et al. </span><a aria-label="Reference 2007" data-dcnode-id="3931" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d172700698e511" title="Rowe, G., Hirsh, J. B., &amp; Anderson, A. K. (2007). Positive affect increases the breadth of attentional selection. Proceedings of National Academy of Sciences, 
                           104, 383–388. doi:
                    10.1073/pnas.0605198104
                    
                  ."><span data-dcnode-id="3932" instrument_node="">2007</span></a><span data-dcnode-id="3930" instrument_node="">; Isen et al. </span><a aria-label="Reference 1987" data-dcnode-id="3928" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d172700698e515" title="Isen, A. M., Daubman, K. A., &amp; Nowicki, G. P. (1987). Positive affect facilitates creative problem solving. Journal of Personality and Social Psychology, 
                           52, 1122–1131. doi:
                    10.1037/0022-3514.52.6.1122
                    
                  ."><span data-dcnode-id="3929" instrument_node="">1987</span></a><span data-dcnode-id="3927" instrument_node="">), coping (McCrae and Costa </span><a aria-label="Reference 1986" data-dcnode-id="3925" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d172700698e518" title="McCrae, R. R., &amp; Costa, P. T. (1986). Personality, coping, and coping effectiveness in an adult sample. Journal of Personality, 
                           54, 385–405."><span data-dcnode-id="3926" instrument_node="">1986</span></a><span data-dcnode-id="3924" instrument_node="">), resiliency (Fredrickson et al. </span><a aria-label="Reference 2003" data-dcnode-id="3922" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d172700698e521" title="Fredrickson, B. L., Tugade, M. M., Waugh, C. E., &amp; Larkin, G. R. (2003). What good are positive emotions in crisis? A prospective study of resilience and emotions following the terrorist attacks on the United States on September 11th, 2001. Journal of Personality and Social Psychology, 
                           84, 365–376. doi:
                    10.1037/0022-3514.84.2.365
                    
                  ."><span data-dcnode-id="3923" instrument_node="">2003</span></a><span data-dcnode-id="3921" instrument_node="">). This is not surprising given the well known association of PA with various physiological functions (e.g., cardiovascular, endocrine, and immune systems) (see Pressman and Cohen </span><a aria-label="Reference 2005" data-dcnode-id="3919" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d172700698e524" title="Pressman, S. D., &amp; Cohen, S. (2005). Does positive affect influence health? Psychological Bulletin, 
                           131, 925–971. doi:
                    10.1037/00332909.131.6.925
                    
                  ."><span data-dcnode-id="3920" instrument_node="">2005</span></a><span data-dcnode-id="3918" instrument_node="">). Despite the correlational nature of most findings, chronic PA has been assigned a primary causal role in promoting the sense of personal satisfaction and achievement that one can call happiness (Fredrickson and Joiner </span><a aria-label="Reference 2002" data-dcnode-id="3916" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d172700698e527" title="Fredrickson, B. L., &amp; Joiner, T. (2002). Positive emotions trigger upward spirals toward emotional well-being. Psychological Science, 
                           13, 172–175. doi:
                    10.1111/1467-9280.00431
                    
                  ."><span data-dcnode-id="3917" instrument_node="">2002</span></a><span data-dcnode-id="3915" instrument_node="">), in fostering individuals’ success in various contexts (Lyubomirsky et al. </span><a aria-label="Reference 2005" data-dcnode-id="3913" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d172700698e530" title="Lyubomirsky, S., King, L., &amp; Diener, E. (2005). The benefits of frequent positive affect: Does happiness lead to success? Psychological Bulletin, 
                           131, 803–855. doi:
                    10.1037/0033-2909.131.6.803
                    
                  ."><span data-dcnode-id="3914" instrument_node="">2005</span></a><span data-dcnode-id="3912" instrument_node="">; Mastekaasa </span><a aria-label="Reference 1994" data-dcnode-id="3910" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d172700698e534" title="Mastekaasa, A. (1994). Marital status, distress, and well-being: An international comparison. Journal of Comparative Family Studies, 
                           25, 183–205."><span data-dcnode-id="3911" instrument_node="">1994</span></a><span data-dcnode-id="3909" instrument_node="">), and in sustaining health (Mroczek and Spiro </span><a aria-label="Reference 2005" data-dcnode-id="3907" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d172700698e537" title="Mroczek, D. K., &amp; Spiro, A. (2005). Change in life satisfaction during adulthood: Findings from the veterans affairs normative aging study. Journal of Personality and Social Psychology, 
                           88, 189–202. doi:
                    10.1037/0022-3514.88.1.189
                    
                  ."><span data-dcnode-id="3908" instrument_node="">2005</span></a><span data-dcnode-id="3906" instrument_node="">).</span></p><p data-dcnode-id="3897"><span data-dcnode-id="3904" instrument_node="">Developmentally, PA appears to be an element of early temperament (Rothbart and Bates </span><a aria-label="Reference 2006" data-dcnode-id="3902" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d172700698e543" title="Rothbart, M. K., &amp; Bates, J. E. (2006). Temperament. In W. Damon, R. Lerner, &amp; N. Eisenberg (Eds.), Handbook of child psychology: Vol. 3. Social, emotional, and personality development (6th ed., pp. 99–166). New York: Wiley."><span data-dcnode-id="3903" instrument_node="">2006</span></a><span data-dcnode-id="3901" instrument_node="">). However, viewing children (after infancy) and adults as agents potentially endowed with the properties of self-awareness, self-reflection, and self-regulation (Bandura </span><a aria-label="Reference 1997" data-dcnode-id="3899" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d172700698e546" title="Bandura, A. (1997). Self-efficacy: The exercise of control. New York: Freeman."><span data-dcnode-id="3900" instrument_node="">1997</span></a><span data-dcnode-id="3898" instrument_node="">) leads one to connect emotions, including PA, with cognitions, and in particular with the set of self-referent evaluations captured by POS. Because feelings and emotions largely derive from the meanings people assign to the events, it is unlikely that the frequency of positive feelings and emotions reflects only their actual experience and an individual’s life conditions.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3895" id="Sec5"><span data-dcnode-id="3896" instrument_node="">Positivity and Positive Affect</span></h3><p data-dcnode-id="3890"><span data-dcnode-id="3894" instrument_node="">Whereas individual differences in PA reflect individuals’ sensitivity and responsivity to environmental demands that is mostly temperamental, individual differences in POS reflect a pervasive evaluative disposition that mostly rests upon individuals’ levels of self-awareness and self-reflection. Although positive feelings open people’s hearts to experience and supply the vital energy that is needed to grow and flourish (Fredrickson </span><a aria-label="Reference 2009" data-dcnode-id="3892" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d172700698e557" title="Fredrickson, B. L. (2009). Positivity. New York: Three Rivers Press."><span data-dcnode-id="3893" instrument_node="">2009</span></a><span data-dcnode-id="3891" instrument_node="">), people’s views of themselves and life might be more important in dictating the direction of their endeavors and consequently the benefits they can draw from pleasant feelings. It is likely that in earlier stages of life, positive feelings mostly reflect individuals’ natural sensitivity and responsivity to pleasure. However, once people are aware of themselves and reflect upon their experience, what they think of themselves, of their life, and of their future would be expected to increasingly dictate the extent to which their attainments accord with their goals and ultimately the satisfaction and pleasure they enjoy.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3888" id="Sec6"><span data-dcnode-id="3889" instrument_node="">The Present Study</span></h3><p data-dcnode-id="3871"><span data-dcnode-id="3887" instrument_node="">The present prospective study was designed to examine the relations between POS and positive affect over time from middle adolescence to early adulthood. In accordance with the theoretical arguments exposed above, we expected that, over time, POS would significantly predict PA rather than vice versa when controlling for the stability of the two constructs and for their prior associations. In all analyses, we controlled for two potentially relevant confounds, gender and socio-economical status. Previous studies investigating gender differences in POS have found inconsistent results because both a slightly higher score on POS for men than women (Caprara et al. </span><a aria-label="Reference 2003" data-dcnode-id="3885" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d172700698e568" title="Caprara, G. V., Caprara, M. G., &amp; Steca, P. (2003). Personality’s correlates of adult development and aging. European Psychologist, 
                           8, 131–147. doi:
                    10.1027//1016-9040.8.3.131
                    
                  ."><span data-dcnode-id="3886" instrument_node="">2003</span></a><span data-dcnode-id="3884" instrument_node="">) and no sex difference (Alessandri et al. </span><a aria-label="Reference 2012b" data-dcnode-id="3882" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d172700698e571" title="Alessandri, G., Caprara, G. V., &amp; Tisak, J. (2012b). A unified latent curve, latent state-trait analysis of the developmental trajectories and correlates of positive orientation. Multivariate Behavioral Research, 
                           47, 341–368. doi:
                    10.1080/00273171.2012.673954
                    
                  ."><span data-dcnode-id="3883" instrument_node="">2012b</span></a><span data-dcnode-id="3881" instrument_node="">; Caprara et al. </span><a aria-label="Reference 2012b" data-dcnode-id="3879" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d172700698e574" title="Caprara, G. V., Alessandri, G., Eisenberg, N., Kupfer, A., Steca, P., Caprara, M. G., et al. (2012a). The positivity scale. Psychological Assessment, 
                           24, 701–712. doi:
                    10.1037/a0026681
                    
                  ."><span data-dcnode-id="3880" instrument_node="">2012b</span></a><span data-dcnode-id="3878" instrument_node="">) have been reported. However, in a meta-analysis, Else-Quest et al. (</span><a aria-label="Reference 2006" data-dcnode-id="3876" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d172700698e577" title="Else-Quest, N. M., Hyde, J. S., Goldsmith, H. H., &amp; Van Hulle, C. A. (2006). Gender differences in temperament: A meta-analysis. Psychological Bulletin, 
                           132, 33–72. doi:
                    10.1037/0033-2909.132.1.33
                    
                  ."><span data-dcnode-id="3877" instrument_node="">2006</span></a><span data-dcnode-id="3875" instrument_node="">) found gender differences in absolute levels of PA. Finally, weak associations between SES and several indicators of well-being and well being have been found (see Argyle </span><a aria-label="Reference 1999" data-dcnode-id="3873" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d172700698e580" title="Argyle, M. (1999). Causes and correlates of happiness. In D. Kahneman, E. Diener, &amp; N. Schwarz (Eds.), Foundations of hedonic psychology: Scientific perspectives on enjoyment and suffering (pp. 353–357). New York: Russell Sage Foundation."><span data-dcnode-id="3874" instrument_node="">1999</span></a><span data-dcnode-id="3872" instrument_node="">, for a review).</span></p></div></div></section><section data-dcnode-id="3660" data-title="Methods"><div class="c-article-section" data-dcnode-id="3661" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3866" id="Sec7"><span data-dcnode-id="3867" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="3662" id="Sec7-content"><h3 class="c-article__sub-heading" data-dcnode-id="3864" id="Sec8"><span data-dcnode-id="3865" instrument_node="">Participants</span></h3><p data-dcnode-id="3859"><span data-dcnode-id="3863" instrument_node="">Two hundred and sixty-three adolescents (47&nbsp;% males) took part at this study. Participants attended the 10th grade at Time 1 (T1, mean age 15.5; </span><i data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">SD</span></i><span data-dcnode-id="3860" instrument_node="">&nbsp;=&nbsp;.50) and most of them attended the 12th grade at Time 2 (T2, mean age 17.5; SD&nbsp;=&nbsp;.55). At Time 3 (T3, mean age 19.5; SD&nbsp;=&nbsp;.51), the majority (52.2&nbsp;%) were college students. At Time 4 (T4, 23.5; SD&nbsp;=&nbsp;.50), about half (46.6&nbsp;%) were college students. Of the remaining participants (at T4), 70&nbsp;% had stable work, 9&nbsp;% worked occasionally, 13&nbsp;% were unemployed, and 7&nbsp;% were searching for a job. At T4, 94&nbsp;% of participants were unmarried and only 1 participant was divorced.</span></p><p data-dcnode-id="3854"><span data-dcnode-id="3858" instrument_node="">At T1, all participants were drawn from two schools located in Genzano, a residential community near Rome, and they were from families involved in an ongoing longitudinal study in that community. The families of this community represent a socioeconomic microcosm of the larger Italian society (ISTAT </span><a aria-label="Reference 2002" data-dcnode-id="3856" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d172700698e602" title="Istituto Italiano di Statistica. (2002). Annuario statistico italiano 2002 [Italian yearbook of statistics 2002]. Rome: ISTAT."><span data-dcnode-id="3857" instrument_node="">2002</span></a><span data-dcnode-id="3855" instrument_node="">): at T1, 14&nbsp;% of the parents of the children were in professional or managerial ranks, 25&nbsp;% were merchants or operators of other businesses, 31&nbsp;% were skilled workers, 29&nbsp;% were unskilled workers, and 1&nbsp;% were retired.</span></p><p data-dcnode-id="3852"><span data-dcnode-id="3853" instrument_node="">The participation rate was fairly high during the present longitudinal data collection; the 92.2, 92.1, and the 71.8&nbsp;% of the sample returned the questionnaire from T1 to T2, from T2 to T3, and from T3 to T4 respectively. Attrition was mainly due to relocation from the area, absence from school at the time of assessment, or to the impossibility of contacting the participants (especially at T3 and T4).</span></p><p data-dcnode-id="3829"><span data-dcnode-id="3851" instrument_node="">Analyses of variance suggested that the participants included at T4 did not significantly differ from the participants who were not available at T4 on any of the variables in the initial assessment; nor did the groups differ in the covariance matrices as tested by the </span><i data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">Box</span></i><span data-dcnode-id="3848" instrument_node="">-</span><i data-dcnode-id="3846"><span data-dcnode-id="3847" instrument_node="">M</span></i><span data-dcnode-id="3845" instrument_node=""> test for homogeneity of covariance matrices. Furthermore, we examined the tenability of the assumption that data were “missing at random” (MAR) (i.e., missingness is related to the observed values for the variables in the data set, but unrelated to unobserved missing values) using the MCAR test (Little and Rubin </span><a aria-label="Reference 2002" data-dcnode-id="3843" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d172700698e617" title="Little, R. J. A., &amp; Rubin, D. B. (2002). Statistical analysis with missing data. New York: Wiley."><span data-dcnode-id="3844" instrument_node="">2002</span></a><span data-dcnode-id="3842" instrument_node="">) in SPSS 14. This test resulted in a nonsignificant value (i.e., </span><i data-dcnode-id="3840"><span data-dcnode-id="3841" instrument_node="">χ</span></i><span data-dcnode-id="3839" instrument_node="">
</span><sup data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">2</span></sup><span data-dcnode-id="3836" instrument_node="">&nbsp;=&nbsp;25.67, </span><i data-dcnode-id="3834"><span data-dcnode-id="3835" instrument_node="">df</span></i><span data-dcnode-id="3833" instrument_node="">&nbsp;=&nbsp;37, </span><i data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">p</span></i><span data-dcnode-id="3830" instrument_node="">&nbsp;=&nbsp;.92), indicating the tenability of MAR assumption.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3827" id="Sec9"><span data-dcnode-id="3828" instrument_node="">Procedures</span></h3><p data-dcnode-id="3825"><span data-dcnode-id="3826" instrument_node="">At T1 and T2, two female researchers collected the questionnaires with measures of interest for this study (as well as other measures) during specially scheduled sessions at school. Parents’ and youths’ consents, as well as approvals from school councils, were obtained. Experimenters informed participants that their responses would be confidential and offered clarification regarding the variables measured. Participants were asked to complete the scales independently of others. At T3 and T4, when the majority of participants were in college, they were contacted by phone and invited to participate in the study, for which they received a small payment. Participants received all measures by mail and returned them after completion.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="3823" id="Sec10"><span data-dcnode-id="3824" instrument_node="">Positive Orientation (POS)</span></h4><p data-dcnode-id="3803"><span data-dcnode-id="3822" instrument_node="">For the aim of this study, items to measure POS were extracted from four existing instruments. Specifically, (1) two items (i.e., “I feel I do not have much to be proud of,” “At times I think I am no good at all”) were drawn from the Rosenberg self-esteem scale (Rosenberg </span><a aria-label="Reference 1965" data-dcnode-id="3820" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d172700698e647" title="Rosenberg, M. (1965). Society and the adolescent self-image. Princeton: Princeton University Press."><span data-dcnode-id="3821" instrument_node="">1965</span></a><span data-dcnode-id="3819" instrument_node="">); (2) three items (i.e., “Overall, I expect more good things to happen to me than bad,” “I’m always optimistic about my future,” and “I hardly ever expect things to go my way”) were drawn from the Life Orientation Test (Scheier et al. </span><a aria-label="Reference 1994" data-dcnode-id="3817" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d172700698e650" title="Scheier, M. F., Carver, C. S., &amp; Bridges, M. W. (1994). Distinguishing optimism from neuroticism (and trait anxiety, self-mastery, and self-esteem): A reevaluation of the life orientation test. Journal of Personality and Social Psychology, 
                           67, 1063–1078. doi:
                    10.1037/0022-3514.67.6.1063
                    
                  ."><span data-dcnode-id="3818" instrument_node="">1994</span></a><span data-dcnode-id="3816" instrument_node="">); (3) an item (i.e., “I am satisfied with my life”) was drawn from the Satisfaction with Life Scale (Diener et al. </span><a aria-label="Reference 1985" data-dcnode-id="3814" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d172700698e653" title="Diener, E., Emmons, R. A., Larsen, R. J., &amp; Griffin, S. (1985). The satisfaction with life scale. Journal of Personality Assessment, 
                           49, 71–75. doi:
                    10.1207/s15327752jpa4901_13
                    
                  ."><span data-dcnode-id="3815" instrument_node="">1985</span></a><span data-dcnode-id="3813" instrument_node="">); and one item (i.e., “I feel that people dislike me”) was drawn from the CESD-D scale (Radloff </span><a aria-label="Reference 1977" data-dcnode-id="3811" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d172700698e656" title="Radloff, L. S. (1977). The CES-D scale: A self-report depression scale for research in the general population. Applied Psychological Measurement, 
                           1, 385–401. doi:
                    10.1177/014662167700100306
                    
                  ."><span data-dcnode-id="3812" instrument_node="">1977</span></a><span data-dcnode-id="3810" instrument_node="">). Despite slight differences in wording, these items are fully overlapped in form and content with those from the recently introduced P-Scale (see Caprara et al. </span><a aria-label="Reference 2012a" data-dcnode-id="3808" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d172700698e659" title="Caprara, G. V., Alessandri, G., Trommsdorff, G., Heikamp, T., Yamaguchi, S., &amp; Suzuki, F. (2012b). Positive orientation across countries. Journal of Cross Cultural Psychology, 
                           43, 77–83. doi:
                    10.1177/0022022111422257
                    
                  ."><span data-dcnode-id="3809" instrument_node="">2012a</span></a><span data-dcnode-id="3807" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="3805" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d172700698e663" title="Caprara, G. V., Alessandri, G., Eisenberg, N., Kupfer, A., Steca, P., Caprara, M. G., et al. (2012a). The positivity scale. Psychological Assessment, 
                           24, 701–712. doi:
                    10.1037/a0026681
                    
                  ."><span data-dcnode-id="3806" instrument_node="">b</span></a><span data-dcnode-id="3804" instrument_node="">). All items were standardized and then averaged before analyses. At T4 only, all individuals were administered the full P-Scale; the correlation between the summative score on the P-Scale and on the measure used in this study was .95. Cronbach’s alphas at T1, T2, T3, and T4 were .74, .75, .79, and .80.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="3801" id="Sec11"><span data-dcnode-id="3802" instrument_node="">Positive Affect</span></h4><p data-dcnode-id="3796"><span data-dcnode-id="3800" instrument_node="">Participants’ positive affectivity was assessed using ten items from the PANAS (Watson et al. </span><a aria-label="Reference 1988" data-dcnode-id="3798" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d172700698e674" title="Watson, D., Clark, L. A., &amp; Tellegen, A. (1988). Development and validation of brief measures of positive and negative affect: The PANAS scales. Journal of Personality and Social Psychology, 
                           54, 1063–1070. doi:
                    10.1037/0022-3514.54.6.1020
                    
                  ."><span data-dcnode-id="3799" instrument_node="">1988</span></a><span data-dcnode-id="3797" instrument_node="">). The “positive affect” section of the PANAS includes terms such as “active,” “cheerful,” “enthusiastic,” and “happy.” Individuals reported the frequency that they generally experienced each term (1&nbsp;=&nbsp;never/almost never to 5&nbsp;=&nbsp;always/almost always; alphas at T1, T2, T3, and T4&nbsp;=&nbsp;.76, .82, .78, and .83).</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="3794" id="Sec12"><span data-dcnode-id="3795" instrument_node="">Socioeconomic Status (SES)</span></h4><p data-dcnode-id="3786"><span data-dcnode-id="3793" instrument_node="">Familial SES was based on the occupation and education of both mothers and fathers (Sirin </span><a aria-label="Reference 2005" data-dcnode-id="3791" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d172700698e685" title="Sirin, S. R. (2005). Socioeconomic status and academic achievement: A meta-analytic review of research 1990–2000. Review of Educational Research, 
                           75, 417–453. doi:
                    10.3102/00346543075003417
                    
                  ."><span data-dcnode-id="3792" instrument_node="">2005</span></a><span data-dcnode-id="3790" instrument_node="">). To derive a SES index, we performed a confirmatory factor model, using the WLSMV as the method of estimation (see Muthén and Muthén </span><a aria-label="Reference 2006" data-dcnode-id="3788" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d172700698e688" title="Muthén, L. K., &amp; Muthén, B. O. (2006). Mplus user’s guide. Los Angeles: Muthen &amp; Muthen."><span data-dcnode-id="3789" instrument_node="">2006</span></a><span data-dcnode-id="3787" instrument_node="">, for details), where SES was defined as a latent factor loaded by parents’ education and occupation. After establishing the unidimensionality of this set of indicators (54&nbsp;% of variance was explained by the first factor alone), we estimated the factor score of SES by using a regression method.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="3784" id="Sec13"><span data-dcnode-id="3785" instrument_node="">Preliminary Analysis</span></h4><p data-dcnode-id="3776"><span data-dcnode-id="3783" instrument_node="">In order to investigate the dimensionality of the measure items and to avoid any overlapping among the two measures, a principal factor analysis with Promax rotation was performed at each assessment times. According to the scree-plots, the four analyses yielded a two-factor structure corresponding to the hypothesized two constructs of POS and positive affect at each assessment time. The actual item loadings on the intended factors ranged from .34 to .92 (M&nbsp;=&nbsp;.50; SD&nbsp;=&nbsp;.18) across the four assessment times, whereas the secondary loading varied from |.01| to .185 (</span><i data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">M</span></i><span data-dcnode-id="3780" instrument_node="">&nbsp;=&nbsp;.11; </span><i data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">SD</span></i><span data-dcnode-id="3777" instrument_node="">&nbsp;=&nbsp;.06) across the two assessment times. Factor correlations ranged from .33 to .45 across the two assessments. These analyses supported (1) the factorial validity of the two measures, (2) to the empirical separateness of POS and PA, and (3) the lack of empirical overlapping among items measuring POS and PA, as indicated by the low secondary loadings.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3774" id="Sec14"><span data-dcnode-id="3775" instrument_node="">Data Analytic Strategy</span></h3><p data-dcnode-id="3742"><span data-dcnode-id="3773" instrument_node="">To investigate our research question, we employed an integrative autoregressive-latent-trajectory (ALT) model. The ALT model has been recently introduced by Bollen and Curran (</span><a aria-label="Reference 2004" data-dcnode-id="3771" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d172700698e715" title="Bollen, K. A., &amp; Curran, P. J. (2004). Autoregressive latent trajectory (ALT) models: A synthesis of two traditions. Sociological Methods and Research, 
                           32, 336–383. doi:
                    10.1177/0049124103260222
                    
                  ."><span data-dcnode-id="3772" instrument_node="">2004</span></a><span data-dcnode-id="3770" instrument_node="">, </span><a aria-label="Reference 2006" data-dcnode-id="3768" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d172700698e718" title="Bollen, K. A., &amp; Curran, P. J. (2006). Latent curve models: A structural equation perspective. Hoboken, NJ: Wiley. doi:
                    10.1002/0471746096
                    
                  ."><span data-dcnode-id="3769" instrument_node="">2006</span></a><span data-dcnode-id="3767" instrument_node="">) as a way to combine two otherwise exclusive statistical models: autoregressive cross-lagged models (Cole and Maxwell </span><a aria-label="Reference 2003" data-dcnode-id="3765" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d172700698e721" title="Cole, D. A., &amp; Maxwell, S. E. (2003). Testing mediational models with longitudinal data: Questions and tips in the use of structural equation modelling. Journal of Abnormal Psychology, 
                           112, 558–577. doi:
                    10.1037/0021-843X.112.4.558
                    
                  ."><span data-dcnode-id="3766" instrument_node="">2003</span></a><span data-dcnode-id="3764" instrument_node="">) and latent growth models (LGMs) (Meredith and Tisak </span><a aria-label="Reference 1990" data-dcnode-id="3762" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d172700698e724" title="Meredith, W., &amp; Tisak, J. (1990). Latent curve analysis. Psychometrika, 55, 107–122."><span data-dcnode-id="3763" instrument_node="">1990</span></a><span data-dcnode-id="3761" instrument_node="">). Both models have advantages and disadvantages because each approach considers the analysis of repeated measures from a different perspective. Autoregressive cross-lagged models (AR) (Fig.&nbsp;</span><a data-dcnode-id="3759" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3760" instrument_node="">1</span></a><span data-dcnode-id="3758" instrument_node="">, Model 1) use cross-lagged regression paths to unravel the likely direction of influence among processes occurring at the same time (Cole and Maxwell </span><a aria-label="Reference 2003" data-dcnode-id="3756" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d172700698e731" title="Cole, D. A., &amp; Maxwell, S. E. (2003). Testing mediational models with longitudinal data: Questions and tips in the use of structural equation modelling. Journal of Abnormal Psychology, 
                           112, 558–577. doi:
                    10.1037/0021-843X.112.4.558
                    
                  ."><span data-dcnode-id="3757" instrument_node="">2003</span></a><span data-dcnode-id="3755" instrument_node="">). Autoregressive paths link the same variable assessed at each successive time point. Latent growth models (Fig.&nbsp;</span><a data-dcnode-id="3753" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3754" instrument_node="">1</span></a><span data-dcnode-id="3752" instrument_node="">, Model 2) have been introduced as an extension of structural equation models to explain intra-individual changes observed at the mean level. As such, LGMs include an intercept (i.e., the initial level) and a slope (i.e., the change over time). The comprehensive ALT model (Fig.&nbsp;</span><a data-dcnode-id="3750" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3751" instrument_node="">1</span></a><span data-dcnode-id="3749" instrument_node="">, Model 3) combines the advantages of AR and LGM (Bollen and Curran </span><a aria-label="Reference 2006" data-dcnode-id="3747" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d172700698e740" title="Bollen, K. A., &amp; Curran, P. J. (2006). Latent curve models: A structural equation perspective. Hoboken, NJ: Wiley. doi:
