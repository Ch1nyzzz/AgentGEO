                    10.1002/0471746096
                    
                  ."><span data-dcnode-id="3748" instrument_node="">2006</span></a><span data-dcnode-id="3746" instrument_node="">) and allows one to simultaneously examine overall trajectories of the constructs and their inter-relationship. Whereas the interpretation of the LGM is straightforward, as noticed by Morin et al. (</span><a aria-label="Reference 2011" data-dcnode-id="3744" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d172700698e743" title="Morin, A. J. S., Maiano, C., Marsh, H. W., Janosz, M., &amp; Nagengast, B. (2011). The longitudinal interplay of adolescents’ self-esteem and body image: A conditional autoregressive latent trajectory analysis. Multivariate Behavioral Research, 
                           46, 157–201. doi:
                    10.1080/00273171.2010.546731
                    
                  ."><span data-dcnode-id="3745" instrument_node="">2011</span></a><span data-dcnode-id="3743" instrument_node="">), “the AR structures take another meaning in ALTs, being based on the state-like residuals of the LGM part, and thus do not directly reflect inter-individual rank order stability” (p. 9). Instead, the AR structure (i.e., cross lagged and autoregressive longitudinal paths) should be interpreted as “reflecting the impact of individual state-like deviations from the overall trajectories on the remaining time points” (p. 9).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3709" data-test="figure" data-title="Fig.&nbsp;1" id="figure-1"><figure data-dcnode-id="3710"><figcaption data-dcnode-id="3739"><b class="c-article-section__figure-caption" data-dcnode-id="3740" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="3741" instrument_node="">Fig.&nbsp;1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3721"><div class="c-article-section__figure-item" data-dcnode-id="3734"><a class="c-article-section__figure-link" data-dcnode-id="3735" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10902-016-9728-y/figures/1" rel="nofollow"><picture data-dcnode-id="3736"><source data-dcnode-id="3738" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10902-016-9728-y/MediaObjects/10902_2016_9728_Fig1_HTML.gif?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="3737" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10902-016-9728-y/MediaObjects/10902_2016_9728_Fig1_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3722" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="3723"><span data-dcnode-id="3733" instrument_node="">The alternative models tested. </span><i data-dcnode-id="3731"><span data-dcnode-id="3732" instrument_node="">Note</span></i><span data-dcnode-id="3730" instrument_node="">. </span><i data-dcnode-id="3728"><span data-dcnode-id="3729" instrument_node="">PA</span></i><span data-dcnode-id="3727" instrument_node=""> positive affect, </span><i data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">POS</span></i><span data-dcnode-id="3724" instrument_node=""> positivity. The coefficient for the slope have been chosen by taking into account the distance between times of assessment</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3711"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="3712" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10902-016-9728-y/figures/1" rel="nofollow"><span data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3713" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3714" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3715" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3718" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3717" fill-rule="evenodd"></path><span data-dcnode-id="3716" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3708" instrument_node="">
</span><p data-dcnode-id="3700"><span data-dcnode-id="3707" instrument_node="">Usually the ALT model is identified by assuming (similar to a conventional AR model) that the variable at the first measurement point is an exogenous variable not influenced by the estimated trajectory factors or the other measurement points. However, this variable can be correlated with the latent intercept and slope parameters. Practical rules of implementation require several steps (Bollen and Curran </span><a aria-label="Reference 2006" data-dcnode-id="3705" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d172700698e777" title="Bollen, K. A., &amp; Curran, P. J. (2006). Latent curve models: A structural equation perspective. Hoboken, NJ: Wiley. doi:
                    10.1002/0471746096
                    
                  ."><span data-dcnode-id="3706" instrument_node="">2006</span></a><span data-dcnode-id="3704" instrument_node="">). In short, we started with first fitting multivariate autoregressive models (M1) and then LGMs (M2). Then, we proceeded with implementing the ALT model sequentially, starting from the ARC model (see Bollen and Curran </span><a aria-label="Reference 2006" data-dcnode-id="3702" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d172700698e780" title="Bollen, K. A., &amp; Curran, P. J. (2006). Latent curve models: A structural equation perspective. Hoboken, NJ: Wiley. doi:
                    10.1002/0471746096
                    
                  ."><span data-dcnode-id="3703" instrument_node="">2006</span></a><span data-dcnode-id="3701" instrument_node="">). Thus, we first specified an “intercept only ALT model” for PA (M3) and then for POS (M4). Finally, we expanded this model by including two correlated linear slopes, one for POS and one for PA (M5).</span></p><p data-dcnode-id="3689"><span data-dcnode-id="3699" instrument_node="">Although AR, LGM and ALT model were not nested, we compared the best-fitting version of the above presented ALT models with that of a more parsimonious model in which the autoregressive and cross-lagged parameters were fixed to zero (M7; see Morin et al. </span><a aria-label="Reference 2011" data-dcnode-id="3697" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d172700698e786" title="Morin, A. J. S., Maiano, C., Marsh, H. W., Janosz, M., &amp; Nagengast, B. (2011). The longitudinal interplay of adolescents’ self-esteem and body image: A conditional autoregressive latent trajectory analysis. Multivariate Behavioral Research, 
                           46, 157–201. doi:
                    10.1080/00273171.2010.546731
                    
                  ."><span data-dcnode-id="3698" instrument_node="">2011</span></a><span data-dcnode-id="3696" instrument_node="">). This model allowed us to test the plausibility for the autoregressive and cross-lagged structure of the state-like deviations of both constructs (Bollen and Curran </span><a aria-label="Reference 2004" data-dcnode-id="3694" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d172700698e789" title="Bollen, K. A., &amp; Curran, P. J. (2004). Autoregressive latent trajectory (ALT) models: A synthesis of two traditions. Sociological Methods and Research, 
                           32, 336–383. doi:
                    10.1177/0049124103260222
                    
                  ."><span data-dcnode-id="3695" instrument_node="">2004</span></a><span data-dcnode-id="3693" instrument_node="">). Once done, we proceeded with the other tests recommended by Bollen and Curran (</span><a aria-label="Reference 2004" data-dcnode-id="3691" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d172700698e792" title="Bollen, K. A., &amp; Curran, P. J. (2004). Autoregressive latent trajectory (ALT) models: A synthesis of two traditions. Sociological Methods and Research, 
                           32, 336–383. doi:
                    10.1177/0049124103260222
                    
                  ."><span data-dcnode-id="3692" instrument_node="">2004</span></a><span data-dcnode-id="3690" instrument_node="">). These tests (implemented in models M8–16) are necessary to investigate the relevance of specific parts of the model, and thus the worthiness to include them in the model, along with the stability of the observed coefficients over time. In detail, we proceeded to text the various possible alterations to the model; specifically, these were to exclude the correlated within-time residuals (M8), constrain within-time residuals to equality (M9), exclude autoregressive paths for PA (M10), constrain autoregressive paths to equality for PA (M11), exclude autoregressive path for POS (M12), constrain autoregressive paths to equality for POS (M13), to exclude lagged paths from PA to POS (M14), constrain cross-lagged paths from PA to POS to equality (M15), exclude lagged paths from POS to PA (M15), and constrain cross-lagged paths from POS to PA to equality (M16).</span></p><p data-dcnode-id="3663"><span data-dcnode-id="3688" instrument_node="">To investigate the fit of different alternative models, structural equation modeling (SEM) was used as the general modeling framework. Parameters were estimated by Maximum Likelihood using M</span><i data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">plus</span></i><span data-dcnode-id="3685" instrument_node=""> 5.1 (Muthén and Muthén </span><a aria-label="Reference 2006" data-dcnode-id="3683" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d172700698e801" title="Muthén, L. K., &amp; Muthén, B. O. (2006). Mplus user’s guide. Los Angeles: Muthen &amp; Muthen."><span data-dcnode-id="3684" instrument_node="">2006</span></a><span data-dcnode-id="3682" instrument_node="">). Missing data were handled using Full Information Maximum Likelihood, which draws on all available data to estimate model parameters without imputing missing values (Arbuckle </span><a aria-label="Reference 1996" data-dcnode-id="3680" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d172700698e804" title="Arbuckle, J. L. (1996). Full information estimation in the presence of incomplete data. In G. A. Marcoulides &amp; R. E. Schumacker (Eds.), Advanced structural equation modeling: Issues and techniques. Mahwah, NJ: Lawrence Erlbaum Associates."><span data-dcnode-id="3681" instrument_node="">1996</span></a><span data-dcnode-id="3679" instrument_node="">). The following criteria were used to evaluate the goodness of fit: </span><i data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">χ</span></i><span data-dcnode-id="3676" instrument_node="">
</span><sup data-dcnode-id="3674"><span data-dcnode-id="3675" instrument_node="">2</span></sup><span data-dcnode-id="3673" instrument_node=""> likelihood ratio statistic, Comparative Fit Index (CFI), the Root Mean Square Error of Approximation (RMSEA) with associated confidence intervals, and the Root Mean Square Residuals Standardized (SRMR). We accepted CFI values &gt;.95, RMSEA values &lt;.08, and SRMR&nbsp;&lt;&nbsp;.08 (Kline </span><a aria-label="Reference 2016" data-dcnode-id="3671" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d172700698e813" title="Kline, R. B. (2016). Principles and practices of structural equation modeling. New York: Guilford."><span data-dcnode-id="3672" instrument_node="">2016</span></a><span data-dcnode-id="3670" instrument_node="">). Nested models were compared using the difference Chi-square test. Given the large number of models compared, to control for alpha inflation we fixed the alpha level for this test at .01 (Vandenberg and Lance </span><a aria-label="Reference 2000" data-dcnode-id="3668" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d172700698e816" title="Vandenberg, R. J., &amp; Lance, C. E. (2000). A review and synthesis of the measurement invariance literature: Suggestions, practices, and recommendations for organizational research. Organizational Research Methods, 
                           3, 4–70. doi:
                    10.1177/109442810031002
                    
                  ."><span data-dcnode-id="3669" instrument_node="">2000</span></a><span data-dcnode-id="3667" instrument_node="">). The Akaike Information Criterion (AIC, Burnham and Anderson </span><a aria-label="Reference 2004" data-dcnode-id="3665" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d172700698e819" title="Burnham, K. P., &amp; Anderson, D. R. (2004). Multimodel inference: Understanding AIC and BIC in model selection. Sociological Methods and Research, 
                           33, 261–304. doi:
                    10.1177/0049124104268644
                    
                  ."><span data-dcnode-id="3666" instrument_node="">2004</span></a><span data-dcnode-id="3664" instrument_node="">) was used to compare non-nested models proposed. The lower the AIC, the better the fit of the model.
</span></p></div></div></section><section data-dcnode-id="3501" data-title="Results"><div class="c-article-section" data-dcnode-id="3502" id="Sec15-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3658" id="Sec15"><span data-dcnode-id="3659" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="3503" id="Sec15-content"><h3 class="c-article__sub-heading" data-dcnode-id="3656" id="Sec16"><span data-dcnode-id="3657" instrument_node="">Measurement Invariance</span></h3><p data-dcnode-id="3639"><span data-dcnode-id="3655" instrument_node="">Measurement invariance is a basic requirement for longitudinal modeling, which tests if individuals’ scores at different waves are directly comparable (Vandenberg and Lance </span><a aria-label="Reference 2000" data-dcnode-id="3653" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d172700698e835" title="Vandenberg, R. J., &amp; Lance, C. E. (2000). A review and synthesis of the measurement invariance literature: Suggestions, practices, and recommendations for organizational research. Organizational Research Methods, 
                           3, 4–70. doi:
                    10.1177/109442810031002
                    
                  ."><span data-dcnode-id="3654" instrument_node="">2000</span></a><span data-dcnode-id="3652" instrument_node="">). In this study, we were interested in comparing individuals’ scores across time and across males and females. This requires the assumption of metric invariance (i.e., the same measurement model and relations between each indicator and the latent factor must hold across time and gender). We tested these assumptions by comparing the fit of sequentially restrictive models (Table&nbsp;</span><a data-dcnode-id="3650" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3651" instrument_node="">1</span></a><span data-dcnode-id="3649" instrument_node="">). To reduce the number of indicators, items were combined randomly into four parcel for POS (composed by 2 items each), and into five parcels for PA (composed by four items each) at each time point. Item parcels are likely to </span><i data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">increase</span></i><span data-dcnode-id="3646" instrument_node=""> the stability of the parameter estimates, to improve the variable to sample size ratio, and to reduce the effects of nonnormality (e.g., Little et al. </span><a aria-label="Reference 2002" data-dcnode-id="3644" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d172700698e844" title="Little, T. D., Cunningham, W. A., Shahar, G., &amp; Widaman, K. F. (2002). To parcel or not to parcel: Exploring the question, weighing the merits. Structural Equation Modeling, 9, 151–173. doi:10.1.1.118.6289."><span data-dcnode-id="3645" instrument_node="">2002</span></a><span data-dcnode-id="3643" instrument_node="">). All parcels were highly reliable (mean alpha&nbsp;=&nbsp;.88, </span><i data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">SD</span></i><span data-dcnode-id="3640" instrument_node="">&nbsp;=&nbsp;.07).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3624" data-test="inline-table" id="table-1"><figure data-dcnode-id="3625"><figcaption class="c-article-table__figcaption" data-dcnode-id="3636"><b data-dcnode-id="3637" data-test="table-caption" id="Tab1"><span data-dcnode-id="3638" instrument_node="">Table&nbsp;1 Fit indices for measurement invariance models</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3626"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="3627" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10902-016-9728-y/tables/1" rel="nofollow"><span data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3628" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3629" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3630" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3633" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3632" fill-rule="evenodd"></path><span data-dcnode-id="3631" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="3623" instrument_node="">
</span><p data-dcnode-id="3612"><span data-dcnode-id="3622" instrument_node="">Separately for both PA scale and the P-Scale, we first tested a baseline model with parameters freely estimated over time (Model 1). In this model, the correlations between the four latent traits (i.e., POS or, alternatively, PA, from time 1 to time 4) were estimated, as were the correlations between the parcel-specific residuals across time. This model fit the data well (in Table&nbsp;</span><a data-dcnode-id="3620" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3621" instrument_node="">1</span></a><span data-dcnode-id="3619" instrument_node="">). We then assessed measurement invariance by first testing whether the model was equivalent across time (Model 2). Specifically, in Model 2, metric invariance was tested by constraining loadings for a given construct to equality across the four time points. For both PA scale and the P-Scale, this model fit the data well, and, according to the Chi-square difference tests, was not significantly different from Model 1 (Table&nbsp;</span><a data-dcnode-id="3617" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3618" instrument_node="">1</span></a><span data-dcnode-id="3616" instrument_node="">). Constraining intercepts to be equal over time did not worsen the fit of the model for either POS or PA (Table&nbsp;</span><a data-dcnode-id="3614" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3615" instrument_node="">1</span></a><span data-dcnode-id="3613" instrument_node="">). Thus, the hypothesis of scalar invariance cannot be rejected for the present data.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3610" id="Sec17"><span data-dcnode-id="3611" instrument_node="">Longitudinal Modelling</span></h3><p data-dcnode-id="3596"><span data-dcnode-id="3609" instrument_node="">
Correlations, means, and standard deviation for all variables are presented in Table&nbsp;</span><a data-dcnode-id="3607" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="3608" instrument_node="">2</span></a><span data-dcnode-id="3606" instrument_node="">. Overall, POS and PA showed substantial stability over the 8&nbsp;years of study. The ALT model provided an adequate fit to the data and was preferable to the ARC and LGM models (see Table&nbsp;</span><a data-dcnode-id="3604" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="3605" instrument_node="">3</span></a><span data-dcnode-id="3603" instrument_node="">). The final best-fitting model depicted in Fig.&nbsp;</span><a data-dcnode-id="3601" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3602" instrument_node="">2</span></a><span data-dcnode-id="3600" instrument_node=""> (i.e., M13 in Table&nbsp;</span><a data-dcnode-id="3598" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="3599" instrument_node="">3</span></a><span data-dcnode-id="3597" instrument_node="">), consisted of only two latent factors—the intercepts factors explaining the observed covariation among the four indicators of POS and the four indicators of PA. Thus, individuals’ scores on PO and PA were highly stable across the study period. The latent intercepts represent the individual average levels of POS or PA as observed across the study period. This model included all autoregressive parameters (i.e., the parameter predicting a variable from its previous level), but only the cross-lagged prediction of PA from POS. Furthermore, all autoregressive and cross-lagged parameters, as well as within-time correlations among residual terms, were constrained to equality over time.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3581" data-test="inline-table" id="table-2"><figure data-dcnode-id="3582"><figcaption class="c-article-table__figcaption" data-dcnode-id="3593"><b data-dcnode-id="3594" data-test="table-caption" id="Tab2"><span data-dcnode-id="3595" instrument_node="">Table&nbsp;2 Means and standard deviations, and correlations of positivity (POS), and positive affectivity (PA), at T1, T2, T3, and T4</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3583"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="3584" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10902-016-9728-y/tables/2" rel="nofollow"><span data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3585" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3586" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3587" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3590" instrument_node="">

</span><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3525" data-test="figure" data-title="Fig.&nbsp;2" id="figure-2"><figure data-dcnode-id="3526"><figcaption data-dcnode-id="3561"><b class="c-article-section__figure-caption" data-dcnode-id="3562" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="3563" instrument_node="">Fig.&nbsp;2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3537"><div class="c-article-section__figure-item" data-dcnode-id="3556"><a class="c-article-section__figure-link" data-dcnode-id="3557" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10902-016-9728-y/figures/2" rel="nofollow"><picture data-dcnode-id="3558"><source data-dcnode-id="3560" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10902-016-9728-y/MediaObjects/10902_2016_9728_Fig2_HTML.gif?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="3559" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10902-016-9728-y/MediaObjects/10902_2016_9728_Fig2_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3538" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="3539"><span data-dcnode-id="3555" instrument_node="">The best fitting model. </span><i data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">Note.</span></i><span data-dcnode-id="3552" instrument_node=""> Significant parameters are bolded and on </span><i data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">solid lines</span></i><span data-dcnode-id="3549" instrument_node="">. </span><i data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">Dashed lines</span></i><span data-dcnode-id="3546" instrument_node=""> represent paths fixed to zero after model testing. The figure does not show the correlations of positive affect at 15.5 and of positivity at the same age with the latent intercepts, nor the correlation between the latent intercept. These correlations are reported in the main text. </span><i data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node="">PA</span></i><span data-dcnode-id="3543" instrument_node=""> positive affect, </span><i data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">POS</span></i><span data-dcnode-id="3540" instrument_node=""> positivity</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3527"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="3528" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10902-016-9728-y/figures/2" rel="nofollow"><span data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3529" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3530" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3531" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3534" instrument_node="">

</span></a></div></figure></div><span data-dcnode-id="3524" instrument_node="">
</span><p data-dcnode-id="3516"><span data-dcnode-id="3523" instrument_node="">Intercepts for both PA and POS were moderately and significantly correlated (φ&nbsp;=&nbsp;.34, t&nbsp;=&nbsp;1.96), suggesting an association between the stability in PA and POS across time. PA at T1 was significantly correlated to PA intercept (φ&nbsp;=&nbsp;.49, t&nbsp;=&nbsp;4.35) and POS intercept (φ&nbsp;=&nbsp;.43, t&nbsp;=&nbsp;6.90). Likewise, POS at T1 was significantly correlated to POS intercept (φ&nbsp;=&nbsp;.61, t&nbsp;=&nbsp;11.83) and PA intercept (φ&nbsp;=&nbsp;.35, t&nbsp;=&nbsp;2.56).</span><sup data-dcnode-id="3518"><a data-dcnode-id="3519" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">Footnote </span></span><span data-dcnode-id="3520" instrument_node="">1</span></a></sup><span data-dcnode-id="3517" instrument_node=""> Furthermore, time-specific covariances between the uniquenesses of both constructs, which represent the individual specific state of POS or PA that specific year, were significant and moderate in size. All in all, these results indicate a moderate level of covariation between the experience of PA and POS states within each assessment period that remained substantially stable over the study period.</span></p><p data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">The analysis of autoregressive indicated that the association of state-like deviations in PA levels with later levels of PA, and state-like deviations in POS with later levels of POS, were moderate and significant, about .24 and about .23 for mean PA and POS, respectively. Importantly, at all time points, state-like deviations in PA levels did not significantly predict later levels of POS. In contrast, there were moderate and significant paths from state-like deviations in POS to later levels of PA over time. These findings suggest that the presence of unidirectional relations between POS and PA from a previous time point to the next.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3512" id="Sec18"><span data-dcnode-id="3513" instrument_node="">Covarying Gender and SES</span></h3><p data-dcnode-id="3504"><span data-dcnode-id="3511" instrument_node="">To investigate the role of gender and SES as potential confounds, we estimated two additional models. The first model was identical to the previous best fitting ALT model but included gender and SES specified as time invariant predictors of observed scores on POS and PA across the four waves. The second model was identical to the previous best fitting ALT model but included gender and SES specified as time invariant predictors of the latent intercept of POS and PA. Both models fit the data very well (first model: χ</span><sup data-dcnode-id="3509"><span data-dcnode-id="3510" instrument_node="">2</span></sup><span data-dcnode-id="3508" instrument_node="">(21)&nbsp;=&nbsp;33.45, CFI&nbsp;=&nbsp;989, RMSEA&nbsp;=&nbsp;.051(.041, .062); second model: χ</span><sup data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">2</span></sup><span data-dcnode-id="3505" instrument_node="">(33)&nbsp;=&nbsp;47.89, CFI&nbsp;=&nbsp;.991, RMSEA&nbsp;=&nbsp;.041 (.033, −.049). Gender and SES were unrelated to both observed scores or latent intercepts. Moreover, the inclusion of the two covariates did not change the size of the estimated parameters.</span></p></div></div></section><section data-dcnode-id="3383" data-title="Discussion"><div class="c-article-section" data-dcnode-id="3384" id="Sec19-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3499" id="Sec19"><span data-dcnode-id="3500" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="3385" id="Sec19-content"><p data-dcnode-id="3488"><span data-dcnode-id="3498" instrument_node="">The identification of positive traits, behaviours, emotions, and cognitions that tend to promote well-being and flourishing has become a major goal of recent psychological research (Judge and Bono </span><a aria-label="Reference 2001" data-dcnode-id="3496" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d172700698e3193" title="Judge, T. A., &amp; Bono, J. E. (2001). Relationship of core self-evaluations traits—self-esteem, generalized self-efficacy, locus of control, and emotional stability—with job satisfaction and job performance: A meta-analysis. Journal of Applied Psychology, 
                           86, 80–92. doi:
                    10.1037//0021-9010.86.1.80
                    
                  ."><span data-dcnode-id="3497" instrument_node="">2001</span></a><span data-dcnode-id="3495" instrument_node="">). Self-esteem, life satisfaction, and optimism correspond to pervasive views of experience, highly correlated to each other and commonly associated with positive outcomes across domains of functioning and over the life-span. Although most of the literature has focused primarily on the unique role of self-esteem, life satisfaction, and optimism with respect to specific life contexts and outcomes, the three constructs have been traced to a common latent factor—a finding supporting a basic disposition characterized by a positive orientation towards self, life, and the future (i.e., positivity, Caprara et al. </span><a aria-label="Reference 2010a" data-dcnode-id="3493" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d172700698e3196" title="Caprara, G. V., Alessandri, G., &amp; Barbaranelli, C. (2010a). Optimal functioning: Contribution of self-efficacy beliefs to positive orientation. Psychotherapy and Psychosomatics, 
                           79, 328–330. doi:
                    10.1159/000319532
                    
                  ."><span data-dcnode-id="3494" instrument_node="">2010a</span></a><span data-dcnode-id="3492" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="3490" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d172700698e3199" title="Caprara, G. V., Steca, P., Alessandri, G., Abela, J. R. Z., &amp; McWhinnie, C. M. (2010b). Positive orientation: Explorations on what is common to life satisfaction, self-esteem, and optimism. Epidemiologia e Psichiatria Sociale, 
                           19, 63–71. doi:
                    10.1017/S1121189X00001615
                    
                  ."><span data-dcnode-id="3491" instrument_node="">b</span></a><span data-dcnode-id="3489" instrument_node="">).</span></p><p data-dcnode-id="3465"><span data-dcnode-id="3487" instrument_node="">
Previous findings have supported the conclusion that POS predicts the likelihood of an array of positive outcomes and appears to have a protective function in regard to adverse outcomes such as severe illness (Alessandri et al. </span><a aria-label="Reference 2012a" data-dcnode-id="3485" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d172700698e3205" title="Alessandri, G., Caprara, G. V., &amp; Tisak, J. (2012a). Further explorations on the unique contribution of positive orientation to optimal functioning. European Psychologist, 
                           17, 44–54. doi:
                    10.1027/1016-9040/a000070
                    
                  ."><span data-dcnode-id="3486" instrument_node="">2012a</span></a><span data-dcnode-id="3484" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="3482" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d172700698e3208" title="Alessandri, G., Caprara, G. V., &amp; Tisak, J. (2012b). A unified latent curve, latent state-trait analysis of the developmental trajectories and correlates of positive orientation. Multivariate Behavioral Research, 
                           47, 341–368. doi:
                    10.1080/00273171.2012.673954
                    
                  ."><span data-dcnode-id="3483" instrument_node="">b</span></a><span data-dcnode-id="3481" instrument_node="">; Caprara et al. </span><a aria-label="Reference 2010a" data-dcnode-id="3479" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d172700698e3211" title="Caprara, G. V., Alessandri, G., &amp; Barbaranelli, C. (2010a). Optimal functioning: Contribution of self-efficacy beliefs to positive orientation. Psychotherapy and Psychosomatics, 
                           79, 328–330. doi:
                    10.1159/000319532
                    
                  ."><span data-dcnode-id="3480" instrument_node="">2010a</span></a><span data-dcnode-id="3478" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="3476" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d172700698e3214" title="Caprara, G. V., Steca, P., Alessandri, G., Abela, J. R. Z., &amp; McWhinnie, C. M. (2010b). Positive orientation: Explorations on what is common to life satisfaction, self-esteem, and optimism. Epidemiologia e Psichiatria Sociale, 
                           19, 63–71. doi:
                    10.1017/S1121189X00001615
                    
                  ."><span data-dcnode-id="3477" instrument_node="">b</span></a><span data-dcnode-id="3475" instrument_node="">, </span><a aria-label="Reference 2012a" data-dcnode-id="3473" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d172700698e3217" title="Caprara, G. V., Alessandri, G., Eisenberg, N., Kupfer, A., Steca, P., Caprara, M. G., et al. (2012a). The positivity scale. Psychological Assessment, 
                           24, 701–712. doi:
                    10.1037/a0026681
                    
                  ."><span data-dcnode-id="3474" instrument_node="">2012a</span></a><span data-dcnode-id="3472" instrument_node="">). The findings in the present study suggest that POS fosters positive affect over a prolonged time through an important life transition. Chronic positive affect (Lyubomirsky et al. </span><a aria-label="Reference 2005" data-dcnode-id="3470" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d172700698e3221" title="Lyubomirsky, S., King, L., &amp; Diener, E. (2005). The benefits of frequent positive affect: Does happiness lead to success? Psychological Bulletin, 
                           131, 803–855. doi:
                    10.1037/0033-2909.131.6.803
                    
                  ."><span data-dcnode-id="3471" instrument_node="">2005</span></a><span data-dcnode-id="3469" instrument_node="">; Watson et al. </span><a aria-label="Reference 1988" data-dcnode-id="3467" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d172700698e3224" title="Watson, D., Clark, L. A., &amp; Tellegen, A. (1988). Development and validation of brief measures of positive and negative affect: The PANAS scales. Journal of Personality and Social Psychology, 
                           54, 1063–1070. doi:
                    10.1037/0022-3514.54.6.1020
                    
                  ."><span data-dcnode-id="3468" instrument_node="">1988</span></a><span data-dcnode-id="3466" instrument_node="">) reflects the enduring tendency to be in a positive mood (i.e., the frequency and the intensity of positive feelings). POS, in contrast, is crucial in setting the conditions to face, frame, and construe experiences in ways that activate and promote positive affect.</span></p><p data-dcnode-id="3445"><span data-dcnode-id="3464" instrument_node="">Our findings are particularly noteworthy because positive affect has been associated with many health outcomes through its apparent effects on cognition and social relationships (Bolte et al. </span><a aria-label="Reference 2003" data-dcnode-id="3462" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d172700698e3230" title="Bolte, A., Goschkey, T., &amp; Kuhl, J. (2003). Emotion and intuition: Effects of positive and negative mood on implicit judgments of semantic coherence. Psychological Science, 
                           14, 416–421. doi:
                    10.1111/1467-9280.01456
                    
                  ."><span data-dcnode-id="3463" instrument_node="">2003</span></a><span data-dcnode-id="3461" instrument_node="">; Fredrickson and Branigan </span><a aria-label="Reference 2005" data-dcnode-id="3459" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d172700698e3233" title="Fredrickson, B. L., &amp; Branigan, C. A. (2005). Positive emotions broaden the scope of attention and thought–action repertoires. Cognition and Emotion, 
                           19, 313–332. doi:
                    10.1080/02699930441000238
                    
                  ."><span data-dcnode-id="3460" instrument_node="">2005</span></a><span data-dcnode-id="3458" instrument_node="">; Fredrickson and Joiner </span><a aria-label="Reference 2002" data-dcnode-id="3456" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d172700698e3236" title="Fredrickson, B. L., &amp; Joiner, T. (2002). Positive emotions trigger upward spirals toward emotional well-being. Psychological Science, 
                           13, 172–175. doi:
                    10.1111/1467-9280.00431
                    
                  ."><span data-dcnode-id="3457" instrument_node="">2002</span></a><span data-dcnode-id="3455" instrument_node="">; Rowe et al. </span><a aria-label="Reference 2007" data-dcnode-id="3453" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d172700698e3239" title="Rowe, G., Hirsh, J. B., &amp; Anderson, A. K. (2007). Positive affect increases the breadth of attentional selection. Proceedings of National Academy of Sciences, 
                           104, 383–388. doi:
                    10.1073/pnas.0605198104
                    
                  ."><span data-dcnode-id="3454" instrument_node="">2007</span></a><span data-dcnode-id="3452" instrument_node="">; Lyubomirsky et al. </span><a aria-label="Reference 2005" data-dcnode-id="3450" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d172700698e3242" title="Lyubomirsky, S., King, L., &amp; Diener, E. (2005). The benefits of frequent positive affect: Does happiness lead to success? Psychological Bulletin, 
                           131, 803–855. doi:
                    10.1037/0033-2909.131.6.803
                    
                  ."><span data-dcnode-id="3451" instrument_node="">2005</span></a><span data-dcnode-id="3449" instrument_node="">), as well as on various physiological functions (e.g., cardiovascular, endocrinal and immunological) (Pressman and Cohen </span><a aria-label="Reference 2005" data-dcnode-id="3447" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d172700698e3246" title="Pressman, S. D., &amp; Cohen, S. (2005). Does positive affect influence health? Psychological Bulletin, 
                           131, 925–971. doi:
                    10.1037/00332909.131.6.925
                    
                  ."><span data-dcnode-id="3448" instrument_node="">2005</span></a><span data-dcnode-id="3446" instrument_node="">). Thus, one can argue that POS likely contributes to individuals’ mood by predisposing them to positive emotional experiences and by enhancing positive feelings.</span></p><p data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">Our empirical model, although longitudinal, does not permit strong inferences about causal effects. Certainly, it does not exclude the possibility that positive affect also contributes to POS, sometimes or under certain circumstances. The tendency to be in positive mood, in fact, may foster rewarding experiences that further reinforce individuals’ positive stance towards themselves, life, and the future. Likely relations between POS further evolve and become reciprocal other than unidirectional, varying over the course of development. However, in the present data, and for the observed time span, the strong and consistent directional pattern of associations we found supports the primacy of POS with respect to positive affect in the population and over the interval of time examined. In this regard, further research is needed to clarify the path of influence between POS and PA across longer (and earlier) time periods, as well as to clarify the influences of culture and life experiences on these constructs.</span></p><p data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">Moreover, as stated above, heredity accounts for a large portion of both POS and PA. Thus, further investigation is necessary to clarify the extent to which PA and POS can be traced to a common genetic endowment and to unravel their overlapping versus unique developmental pathways. Probably maturation and life events exert crucial influences in shaping both PA and POS and their reciprocal relation. The more children are sensitive and positively responsive to others, the more they attract others’ support and sympathy. The more children are provided with rewarding experiences, the more their positive feelings contribute to building positive relations. The more children enjoy love and care, the more they are encouraged to view themselves as worthy of regard and life as worth living. The more children tend to view at life and experience from a positive stance, the more likely they are to benefit from any good events that happen to them.</span></p><p data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">Further research is also needed to clarify when self-esteem, life satisfaction, and optimism appear during development and when POS emerges as a pervasive mode of appraising, viewing, and construing, able to affect how individuals act and approach experiences. We speculate that the sense of the self remains at the core of POS because people are unlikely to be satisfied with their lives and to be confident about the future unless they believe themselves to be of value. Likewise, we conjecture that self-regard emerges in concomitance with self-awareness whereas life satisfaction and dispositional optimism build upon the cognitive capacities to remind, compare, and anticipate events and experiences.</span></p><p data-dcnode-id="3434"><span data-dcnode-id="3438" instrument_node="">In the future, it would be useful to further clarify how and when different feelings about the self, life, and the future ultimately coalesce under a unique pervasive disposition. Viewing POS as a disposition opens new avenues to both research and practice relevant to the promotion of human potential and strengths. Whereas recent findings suggest that POS, although stable, is malleable to change (Caprara et al. </span><a aria-label="Reference 2010b" data-dcnode-id="3436" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d172700698e3262" title="Caprara, G. V., Steca, P., Alessandri, G., Abela, J. R. Z., &amp; McWhinnie, C. M. (2010b). Positive orientation: Explorations on what is common to life satisfaction, self-esteem, and optimism. Epidemiologia e Psichiatria Sociale, 
                           19, 63–71. doi:
                    10.1017/S1121189X00001615
                    
                  ."><span data-dcnode-id="3437" instrument_node="">2010b</span></a><span data-dcnode-id="3435" instrument_node="">), both whether and how POS has a beneficial function, and whether and why a lack or excess of POS may carry negative consequences, deserve further investigation. Such knowledge is crucial to design interventions structured on practices that promote and sustain individuals’ POS. Likewise, a better understanding of the biological correlates of POS and of the ways POS may moderate stress, illness, and pain is crucial to promote positive affect and, as a consequence, health and wellbeing.</span></p><p data-dcnode-id="3390"><span data-dcnode-id="3433" instrument_node="">One may wonder what distinguishes POS from other general constructs, such as CSE (Judge et al. </span><a aria-label="Reference 1998" data-dcnode-id="3431" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d172700698e3268" title="Judge, T. A., Erez, A., &amp; Bono, J. E. (1998). The power of being positive: The relation between positive self-concept and job performance. Human Performance, 
                           11, 167–187. doi:
                    10.1080/08959285.1998.9668030
                    
                  ."><span data-dcnode-id="3432" instrument_node="">1998</span></a><span data-dcnode-id="3430" instrument_node="">), that have received considerable attention in the Industrial and Organizational psychology during the last years (Johnson et al. </span><a aria-label="Reference 2006" data-dcnode-id="3428" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d172700698e3271" title="Johnson, R. E., Rosen, C. C., &amp; Levy, P. E. (2006). Getting to the core of core self-evaluation: A review and recommendations. Journal of Organizational Behavior, 
                           29, 391–413. doi:
                    10.1002/job.514
                    
                  ."><span data-dcnode-id="3429" instrument_node="">2006</span></a><span data-dcnode-id="3427" instrument_node="">). Empirically, when submitted to a simultaneous confirmatory factor analyses, measures of POS and CSE are highly correlated (in the range of .66), but not perfectly correlated (see Alessandri et al. </span><a aria-label="Reference 2012c" data-dcnode-id="3425" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d172700698e3274" title="Alessandri, G., Vecchione, M., Tisak, J., DeIana, G., Caria, S., &amp; Caprara, G. V. (2012c). The utility of positive orientation in predicting job performance and organizational citizenship behaviors. Applied Psychology: An International Review,. doi:
                    10.1111/j.1464-0597.2012.00511.x
                    
                  ."><span data-dcnode-id="3426" instrument_node="">2012c</span></a><span data-dcnode-id="3424" instrument_node="">). Moreover, POS shows incremental validity over and above CSE in predicting important organizational outcomes such as job performance (Alessandri </span><a aria-label="Reference 2012c" data-dcnode-id="3422" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d172700698e3277" title="Alessandri, G., Vecchione, M., Tisak, J., DeIana, G., Caria, S., &amp; Caprara, G. V. (2012c). The utility of positive orientation in predicting job performance and organizational citizenship behaviors. Applied Psychology: An International Review,. doi:
                    10.1111/j.1464-0597.2012.00511.x
                    
                  ."><span data-dcnode-id="3423" instrument_node="">2012c</span></a><span data-dcnode-id="3421" instrument_node="">). Theoretically, there are important differences separating the two constructs. The construct of core self-evaluations (i.e., CSE) has been defined as the “fundamental premises that individuals hold about themselves and their functioning in the world” (Judge et al. </span><a aria-label="Reference 1998" data-dcnode-id="3419" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d172700698e3280" title="Judge, T. A., Erez, A., &amp; Bono, J. E. (1998). The power of being positive: The relation between positive self-concept and job performance. Human Performance, 
                           11, 167–187. doi:
                    10.1080/08959285.1998.9668030
                    
                  ."><span data-dcnode-id="3420" instrument_node="">1998</span></a><span data-dcnode-id="3418" instrument_node="">, p. 161). In contrast, POS is instead intended as a higher order dimension explaining the communality among individual judgments about oneself, one’s life, and one’s future. Moreover, a goal of CSE theory is to explain why certain traits (e.g., self-esteem, general self-efficacy, internal locus of control, and positive affectivity) successfully predict job satisfaction, whereas POS theory points to the dispositional components of individual’s well being in the everyday life. Likewise, whereas the four basic components of CSE were individuated using three criteria: </span><i data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">evaluation</span></i><span data-dcnode-id="3415" instrument_node="">-</span><i data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">focus</span></i><span data-dcnode-id="3412" instrument_node="">, </span><i data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">fundamentality</span></i><span data-dcnode-id="3409" instrument_node="">, and </span><i data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">scope</span></i><span data-dcnode-id="3406" instrument_node="">, self-esteem, life satisfaction and optimism were selected as empirical manifestations of abroad orientation and as crucial determinants of a syndrome of well being with the self playing a crucial role as an anchor (Caprara et al. </span><a aria-label="Reference 2010a" data-dcnode-id="3404" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d172700698e3296" title="Caprara, G. V., Alessandri, G., &amp; Barbaranelli, C. (2010a). Optimal functioning: Contribution of self-efficacy beliefs to positive orientation. Psychotherapy and Psychosomatics, 
                           79, 328–330. doi:
                    10.1159/000319532
                    
                  ."><span data-dcnode-id="3405" instrument_node="">2010a</span></a><span data-dcnode-id="3403" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="3401" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d172700698e3299" title="Caprara, G. V., Steca, P., Alessandri, G., Abela, J. R. Z., &amp; McWhinnie, C. M. (2010b). Positive orientation: Explorations on what is common to life satisfaction, self-esteem, and optimism. Epidemiologia e Psichiatria Sociale, 
                           19, 63–71. doi:
                    10.1017/S1121189X00001615
                    
                  ."><span data-dcnode-id="3402" instrument_node="">b</span></a><span data-dcnode-id="3400" instrument_node="">). Finally, whereas POS can be represented as a Multifaceted “reflective” construct (i.e., a latent factor which directly influences its observed indicators, as in the standard factor model, see Bollen and Lennox </span><a aria-label="Reference 1991" data-dcnode-id="3398" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d172700698e3303" title="Bollen, K. A., &amp; Lennox, R. (1991). Conventional wisdom on measurement: A structural equation perspective. Psychological Bulletin, 
                           10, 305–314. doi:
                    10.1037/0033-2909.110.2.305
                    
                  ."><span data-dcnode-id="3399" instrument_node="">1991</span></a><span data-dcnode-id="3397" instrument_node="">), recent findings have shown that CSE should be best represented as an aggregate construct (i.e., a latent factor which is, instead, influenced by its observed indicators, see Bollen and Lennox </span><a aria-label="Reference 1991" data-dcnode-id="3395" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d172700698e3306" title="Bollen, K. A., &amp; Lennox, R. (1991). Conventional wisdom on measurement: A structural equation perspective. Psychological Bulletin, 
                           10, 305–314. doi:
                    10.1037/0033-2909.110.2.305
                    
                  ."><span data-dcnode-id="3396" instrument_node="">1991</span></a><span data-dcnode-id="3394" instrument_node="">, for details and also Johnson et al. </span><a aria-label="Reference 2006" data-dcnode-id="3392" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d172700698e3309" title="Johnson, R. E., Rosen, C. C., &amp; Levy, P. E. (2006). Getting to the core of core self-evaluation: A review and recommendations. Journal of Organizational Behavior, 
                           29, 391–413. doi:
                    10.1002/job.514
                    
                  ."><span data-dcnode-id="3393" instrument_node="">2006</span></a><span data-dcnode-id="3391" instrument_node="">), resulting from basic behavioral tendencies (emotional stability), attributional style (locus of control), self-esteem and self-related knowledge structures (general self-efficacy). In contrast, POS reflects the common core of optimism and life satisfaction, as well as self-esteem.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3388" id="Sec20"><span data-dcnode-id="3389" instrument_node="">Limitations</span></h3><p data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">Finally, we acknowledge a few limitations of the present contribution. Although POS and PA rest on a set of subjective evaluations that are not easily accessible other than through self-reports, other methods such as implicit measures, clinical interviews, and reports from other informants would be useful complements to the use of self-report data. Moreover, well-educated participants were over-represented in our sample and it is not clear if the findings can be generalized to less advantaged groups. Moreover, the unique prediction of PA by POS found in this study need to be replicated and extended to other (larger or smaller) temporal interval (such as days, or hours), or during a major life transition (i.e., entering to the college, facing with a major life events). Most important of all, more theoretical work is necessary to further develop a full theoretical account of the possibly intricate relations between POS and PA, and of the mechanisms that connect or have the power to change (i.e., strengthen or reduce) the relation between the two constructs. Because the advancement of research on POS has mostly relied on the accumulation of empirical proofs sustaining their utility, the need of further theoretical development should be, in some respects, not surprising. However, further development of the theory is likely to expand or change our current understanding of the construct.</span></p></div></div></section><section data-dcnode-id="3364" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="3365" id="Sec21-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3381" id="Sec21"><span data-dcnode-id="3382" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="3366" id="Sec21-content"><p data-dcnode-id="3367"><span data-dcnode-id="3380" instrument_node="">The human condition is fraught with frailty and limitations. Yet, as we progress in our understanding of the basic mechanisms governing the expression of endowed potentialities, the better we understand the critical role of psychological structures in ensuring individuals a good life. POS theory emphasizes the role of positive self-beliefs in sustaining positive affect during the course of development. In turn, it suggest the idea that positive affect can be the key psychological mechanism mediating the behavioral expression of POS. While this latter point is in need of evaluation in future research, present study offers a novel contribution to the understanding of the critical role of POS in human development. Moreover, given that PA been posited among the key determinants not only of psychological adjustment (Davis et al. </span><a aria-label="Reference 2004" data-dcnode-id="3378" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d172700698e3328" title="Davis, M. C., Zautra, A. J., &amp; Smith, B. W. (2004). Chronic pain, stress, and the dynamics of affective differentiation. Journal of Personality, 
                           72, 1133–1159. doi:
                    10.1111/j.1467-6494.2004.00293.x
                    
                  ."><span data-dcnode-id="3379" instrument_node="">2004</span></a><span data-dcnode-id="3377" instrument_node="">; Reich and Zautra </span><a aria-label="Reference 2002" data-dcnode-id="3375" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d172700698e3331" title="Reich, J. W., &amp; Zautra, A. J. (2002). Arousal and the relationship between positive and negative affect: An analysis of the data of Ito, Cacioppo, and Lang (1998). Motivation and Emotion, 
                           26, 209–222. doi:
                    10.1023/A:1021773013487
                    
                  ."><span data-dcnode-id="3376" instrument_node="">2002</span></a><span data-dcnode-id="3374" instrument_node="">), but also of a variety of psychological problems (see Koenigsberg et al. </span><a aria-label="Reference 2002" data-dcnode-id="3372" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d172700698e3334" title="Koenigsberg, H. W., Harvey, P. D., Mitropoulou, V., Schmeidler, J., New, A. S., Goodman, M., et al. (2002). Characterizing affective instability in borderline personality disorder. The American Journal of Psychiatry, 
                           159, 784–788. doi:
                    10.1176/appi.ajp.159.5.784
                    
                  ."><span data-dcnode-id="3373" instrument_node="">2002</span></a><span data-dcnode-id="3371" instrument_node="">; Litz et al. </span><a aria-label="Reference 2000" data-dcnode-id="3369" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d172700698e3337" title="Litz, B. T., Orsillo, S. M., Kaloupek, D., &amp; Weathers, F. (2000). Emotional processing in posttraumatic stress disorder. Journal of Abnormal Psychology, 
                           109, 26–39. doi:
                    10.1037/0021-843X.109.1.26
                    
                  ."><span data-dcnode-id="3370" instrument_node="">2000</span></a><span data-dcnode-id="3368" instrument_node="">), uncovering the basis of stable PA has the potential to inform applied interventions designed to bolster and maintain positive youth growth and flourishing.</span></p></div></div></section><span data-dcnode-id="3363" instrument_node="">
