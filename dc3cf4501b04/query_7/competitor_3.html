</span><article class="post-8178 post type-post status-publish format-standard has-post-thumbnail hentry category-happiness" data-dcnode-id="2033" id="post-8178"><span data-dcnode-id="3124" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2035"><span data-dcnode-id="3123" instrument_node="">
</span><p data-dcnode-id="3118"><img alt="" class="wp-image-75772 alignright lazyloaded" data-dcnode-id="3122" data-src="https://positivepsychology.com/wp-content/uploads/happiness-science-1024x512.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/happiness-science-1024x512.jpg 1024w, https://positivepsychology.com/wp-content/uploads/happiness-science-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/happiness-science-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/happiness-science-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/happiness-science-1080x540.jpg 1080w, https://positivepsychology.com/wp-content/uploads/happiness-science-510x255.jpg 510w" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/wp-content/uploads/happiness-science-1024x512.jpg&amp;raw" srcset="https://positivepsychology.com/wp-content/uploads/happiness-science-1024x512.jpg 1024w, https://positivepsychology.com/wp-content/uploads/happiness-science-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/happiness-science-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/happiness-science-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/happiness-science-1080x540.jpg 1080w, https://positivepsychology.com/wp-content/uploads/happiness-science-510x255.jpg 510w" width="300"><noscript data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">&lt;img class="wp-image-75772 alignright lazyload" src="https://positivepsychology.com/wp-content/uploads/happiness-science-1024x512.jpg" alt="" width="300" srcset="https://positivepsychology.com/wp-content/uploads/happiness-science-1024x512.jpg 1024w, https://positivepsychology.com/wp-content/uploads/happiness-science-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/happiness-science-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/happiness-science-100x50.jpg 100w, https://positivepsychology.com/wp-content/uploads/happiness-science-1080x540.jpg 1080w, https://positivepsychology.com/wp-content/uploads/happiness-science-510x255.jpg 510w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><span data-dcnode-id="3119" instrument_node="">Happiness has been a human pursuit for as long as we can remember, and positive psychology has taken this concept into the realm of scientific research in hopes of gaining a better understanding of global wellbeing and meaningful living.</span></p><span data-dcnode-id="3117" instrument_node="">
</span><p data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">Whether on a global or an individual level, the pursuit of happiness is one that is gaining traction and scientific recognition.</span></p><span data-dcnode-id="3114" instrument_node="">
</span><p data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">There are many definitions of happiness, and we will also explore those in this article. For now, we invite you to think of a time when you were happy. Were you alone? With others? Inside? Outside.</span></p><span data-dcnode-id="3111" instrument_node="">
</span><p data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">At the end of this article, revisit that memory. You may have new insight as to what made that moment “happy,” as well as tips to train your brain towards more happiness.</span></p><span data-dcnode-id="3108" instrument_node="">
</span><p data-dcnode-id="3103"><span data-dcnode-id="3107" instrument_node="">Before you continue, we thought you might like to </span><a data-dcnode-id="3105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/ebook" rel="noopener" target="_blank"><span data-dcnode-id="3106" instrument_node="">download our three Positive Psychology Exercises for free</span></a><span data-dcnode-id="3104" instrument_node="">. These science-based exercises will explore fundamental aspects of positive psychology including strengths, values, and self-compassion, and will give you the tools to enhance the wellbeing of your clients, students, or employees.</span></p><span data-dcnode-id="3102" instrument_node="">
</span><div data-dcnode-id="3050" id="inhoud"><span data-dcnode-id="3101" instrument_node="">
</span><h2 data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">This Article Contains:</span></h2><span data-dcnode-id="3098" instrument_node="">

</span><li data-dcnode-id="3058"><a data-dcnode-id="3059" href="#home"><span data-dcnode-id="3060" instrument_node="">A Take-Home Message</span></a></li><span data-dcnode-id="3057" instrument_node="">
</span><li data-dcnode-id="3054"><a data-dcnode-id="3055" href="#references"><span data-dcnode-id="3056" instrument_node="">References</span></a></li><span data-dcnode-id="3053" instrument_node="">
</span></ul><span data-dcnode-id="3051" instrument_node="">
</span></div><span data-dcnode-id="3049" instrument_node="">
</span><p data-dcnode-id="3047"><a data-dcnode-id="3048" name="definition-happiness"></a></p><span data-dcnode-id="3046" instrument_node="">
</span><h2 data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">A Definition of Happiness</span></h2><span data-dcnode-id="3043" instrument_node="">
</span><p data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">In general, happiness is understood as the positive emotions we have in regards to the pleasurable activities we take part in through our daily lives.</span></p><span data-dcnode-id="3040" instrument_node="">
</span><p data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">Pleasure, comfort, gratitude, hope, and inspiration are examples of positive emotions that increase our happiness and move us to flourish. In scientific literature, happiness is referred to as hedonia (Ryan &amp; Deci, 2001), the presence of positive emotions and the absence of negative emotions.</span></p><span data-dcnode-id="3037" instrument_node="">
</span><p data-dcnode-id="3029"><span data-dcnode-id="3036" instrument_node="">In a more broad understanding, human wellbeing is made up of both </span><a data-dcnode-id="3034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/hedonic-treadmill/"><span data-dcnode-id="3035" instrument_node="">Hedonic</span></a><span data-dcnode-id="3033" instrument_node=""> and </span><a data-dcnode-id="3031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/eudaimonia/"><span data-dcnode-id="3032" instrument_node="">Eudaimonic</span></a><span data-dcnode-id="3030" instrument_node=""> principles,&nbsp;the literature on which is vast and describes our&nbsp;personal meaning and purpose in life (Ryan et al, 2001).</span></p><span data-dcnode-id="3028" instrument_node="">
</span><p data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">Research on happiness over the years has found that there are some contributing correlational factors that affect our happiness. These include (Ryan, 2001):</span></p><span data-dcnode-id="3025" instrument_node="">
</span><ol data-dcnode-id="3002"><span data-dcnode-id="3024" instrument_node="">
</span><li data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">Personality Type</span></li><span data-dcnode-id="3021" instrument_node="">
</span><li data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">Positive Emotions versus Negative Emotions</span></li><span data-dcnode-id="3018" instrument_node="">
</span><li data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">Attitude towards Physical Health</span></li><span data-dcnode-id="3015" instrument_node="">
</span><li data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">Social Class and Wealth</span></li><span data-dcnode-id="3012" instrument_node="">
</span><li data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">Attachment and Relatedness</span></li><span data-dcnode-id="3009" instrument_node="">
</span><li data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">Goals and Self-Efficacy</span></li><span data-dcnode-id="3006" instrument_node="">
</span><li data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">Time and Place.</span></li><span data-dcnode-id="3003" instrument_node="">
</span></ol><span data-dcnode-id="3001" instrument_node="">
</span><p data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2998" instrument_node="">
</span><p data-dcnode-id="2996"><a data-dcnode-id="2997" name="science-of-happiness"></a></p><span data-dcnode-id="2995" instrument_node="">
</span><h2 data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">A Look at the Science of Happiness</span></h2><span data-dcnode-id="2992" instrument_node="">
</span><p data-dcnode-id="2987"><span data-dcnode-id="2991" instrument_node="">So what is the “</span><em data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">science of happiness?</span></em><span data-dcnode-id="2988" instrument_node="">”</span></p><span data-dcnode-id="2986" instrument_node="">
</span><p data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">This is one of those times when something is exactly what it sounds like – it’s all about the science behinds what happiness is and how to experience it, what happy people do differently, and what we can do to feel happier.</span></p><span data-dcnode-id="2983" instrument_node="">
</span><p data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">This focus on happiness is new to the field of psychology; for many decades – basically since the foundation of psychology as a science in the mid- to late-1800s – the focus was on the less pleasant in life. The field focused on pathology, on the worst-scenario cases, on what can go wrong in our lives.</span></p><span data-dcnode-id="2980" instrument_node="">
</span><p data-dcnode-id="2978"><span data-dcnode-id="2979" instrument_node="">Although there was some attention paid to wellbeing, success, and high functioning, the vast majority of funding and research was dedicated to those who were struggling the most: those with severe mental illness, mental disorders, or those who have survived trauma and tragedy.</span></p><span data-dcnode-id="2977" instrument_node="">
</span><p data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">While there’s certainly nothing wrong with doing what we can to raise up those who are struggling, there was an unfortunate lack of knowledge about what we can do to bring us all up to a higher level of functioning and happiness.</span></p><span data-dcnode-id="2974" instrument_node="">
</span><p data-dcnode-id="2966"><span data-dcnode-id="2973" instrument_node="">Positive psychology changed all of that. Suddenly, there was space at the table for a focus on the positive in life, for “</span><em data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">what thoughts, actions, and</span></em><span data-dcnode-id="2970" instrument_node=""> </span><em data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">behaviors make us more productive at work, happier in our relationships, and more fulfilled at the end of the day</span></em><span data-dcnode-id="2967" instrument_node="">” (Happify Daily, n.d.).</span></p><span data-dcnode-id="2965" instrument_node="">
</span><p data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">The science of happiness has opened our eyes to a plethora of new findings about the sunny side of life.</span></p><span data-dcnode-id="2962" instrument_node="">
</span><p data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2959" instrument_node="">
</span><h3 data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">Current research and studies</span></h3><span data-dcnode-id="2956" instrument_node="">
</span><p data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">For instance, we have learned a lot about what happiness is and what drives us.</span></p><span data-dcnode-id="2953" instrument_node="">
</span><p data-dcnode-id="2951"><span data-dcnode-id="2952" instrument_node="">Recent studies have shown us that:</span></p><span data-dcnode-id="2950" instrument_node="">
</span><ul data-dcnode-id="2910"><span data-dcnode-id="2949" instrument_node="">
</span><li data-dcnode-id="2945"><span data-dcnode-id="2948" instrument_node="">Money can only buy happiness up to about $75,000 – after that, it has no significant effect on our emotional wellbeing (Kahneman &amp; Deaton, 2010).</span><br data-dcnode-id="2947"><br data-dcnode-id="2946"></li><span data-dcnode-id="2944" instrument_node="">
</span><li data-dcnode-id="2940"><span data-dcnode-id="2943" instrument_node="">Most of our happiness is not determined by our genetics, but by our experiences and our day-to-day lives (Lyubomirsky, Sheldon, &amp; Schkade, 2005).</span><br data-dcnode-id="2942"><br data-dcnode-id="2941"></li><span data-dcnode-id="2939" instrument_node="">
</span><li data-dcnode-id="2935"><span data-dcnode-id="2938" instrument_node="">Trying too hard to find happiness often has the opposite effect and can lead us to be overly selfish (Mauss et al., 2012).</span><br data-dcnode-id="2937"><br data-dcnode-id="2936"></li><span data-dcnode-id="2934" instrument_node="">
</span><li data-dcnode-id="2930"><span data-dcnode-id="2933" instrument_node="">Pursuing happiness through social means (e.g., spending more time with family and friends) is more likely to be effective than other methods (Rohrer, Richter, Brümmer, Wagner, &amp; Schmukle, 2018).</span><br data-dcnode-id="2932"><br data-dcnode-id="2931"></li><span data-dcnode-id="2929" instrument_node="">
</span><li data-dcnode-id="2925"><span data-dcnode-id="2928" instrument_node="">The pursuit of happiness is one place where we should consider ditching the SMART goals; it may be more effective to pursue “vague” happiness goals than more specific ones (Rodas, Ahluwalia, &amp; Olson, 2018).</span><br data-dcnode-id="2927"><br data-dcnode-id="2926"></li><span data-dcnode-id="2924" instrument_node="">
</span><li data-dcnode-id="2920"><span data-dcnode-id="2923" instrument_node="">Happiness makes us better citizens – it is a good predictor of civic engagement in the transition to adulthood (Fang, Galambos, Johnson, &amp; Krahn, 2018).</span><br data-dcnode-id="2922"><br data-dcnode-id="2921"></li><span data-dcnode-id="2919" instrument_node="">
</span><li data-dcnode-id="2915"><span data-dcnode-id="2918" instrument_node="">Happiness leads to career success, and it doesn’t have to be “natural” happiness – researchers found that “experimentally enhancing” positive emotions also contributed to improved outcomes at work (Walsh, Boehm, &amp; Lyubomirsky, 2018).</span><br data-dcnode-id="2917"><br data-dcnode-id="2916"></li><span data-dcnode-id="2914" instrument_node="">
</span><li data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">There is a linear relationship between religious involvement and happiness. Higher worship service attendance is correlated with more commitment to faith, and commitment to faith is related to greater compassion. Those more compassionate individuals are more likely to provide emotional support to others, and those who provide emotional support to others are more likely to be happy (Krause, Ironson, &amp; Hill, 2018). It’s a long road, but a direct one!</span></li><span data-dcnode-id="2911" instrument_node="">
</span></ul><span data-dcnode-id="2909" instrument_node="">
</span><p data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2906" instrument_node="">
</span><p data-dcnode-id="2904"><a data-dcnode-id="2905" name="science-of-happiness-at-work"></a></p><span data-dcnode-id="2903" instrument_node="">
</span><h2 data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">The Scientific Research on Happiness at Work</span></h2><span data-dcnode-id="2900" instrument_node="">
</span><p data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">There’s been a ton of research on the effects of happiness in the workplace. Much of this is driven by companies who want to find a way to improve productivity, attract new talent, and get a dose of good publicity, all at the same time. After all, who wouldn’t want to do business with and/or work for a company full of happy employees?</span></p><span data-dcnode-id="2897" instrument_node="">
</span><p data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node="">Although the jury is still out on exactly how happy employees “should” be for maximum productivity, efficiency, and health, we have learned a few things about the effects of a happy workforce:</span></p><span data-dcnode-id="2894" instrument_node="">
</span><ul data-dcnode-id="2869"><span data-dcnode-id="2893" instrument_node="">
</span><li data-dcnode-id="2889"><span data-dcnode-id="2892" instrument_node="">People who are happy with their jobs are less likely to leave their jobs, less likely to be absent, and less likely to engage in counterproductive behaviors at work.</span><br data-dcnode-id="2891"><br data-dcnode-id="2890"></li><span data-dcnode-id="2888" instrument_node="">
</span><li data-dcnode-id="2884"><span data-dcnode-id="2887" instrument_node="">People who are happy with their jobs are more likely to engage in behavior that contributes to a happy and productive organization, more likely to be physically healthy, and more likely to be mentally healthy.</span><br data-dcnode-id="2886"><br data-dcnode-id="2885"></li><span data-dcnode-id="2883" instrument_node="">
</span><li data-dcnode-id="2879"><span data-dcnode-id="2882" instrument_node="">Happiness and job performance are related—and the relationship likely works in both directions (e.g., happy people do a better job and people who do a good job are more likely to be happy).</span><br data-dcnode-id="2881"><br data-dcnode-id="2880"></li><span data-dcnode-id="2878" instrument_node="">
</span><li data-dcnode-id="2874"><span data-dcnode-id="2877" instrument_node="">Unit- or team-level happiness is also linked to positive outcomes, including higher customer satisfaction, profit, productivity, employee turnover, and a safer work environment.</span><br data-dcnode-id="2876"><br data-dcnode-id="2875"></li><span data-dcnode-id="2873" instrument_node="">
</span><li data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">In general, a happier organization is a more productive and successful organization (Fisher, 2010).</span></li><span data-dcnode-id="2870" instrument_node="">
</span></ul><span data-dcnode-id="2868" instrument_node="">
</span><p data-dcnode-id="2863"><span data-dcnode-id="2867" instrument_node="">To sum up the findings we have so far, it’s easy to see that </span><a data-dcnode-id="2865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/happiness-at-work/"><span data-dcnode-id="2866" instrument_node="">happiness at work</span></a><span data-dcnode-id="2864" instrument_node=""> does matter – for individuals, for teams, and for organizations overall. We don’t have all the answers about exactly how the relationship between happiness and productivity works, but we know that there is a relationship there.</span></p><span data-dcnode-id="2862" instrument_node="">
</span><p data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">Lately, many human resources managers, executives, and other organizational leaders have decided that knowing there’s a relationship is good enough evidence to establish happiness-boosting practices at work, which means that we have a lot of opportunities to see the impact of greater happiness at work in the future.</span></p><span data-dcnode-id="2859" instrument_node="">
</span><p data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2856" instrument_node="">
</span><p data-dcnode-id="2854"><a data-dcnode-id="2855" name="facts-findings"></a></p><span data-dcnode-id="2853" instrument_node="">
</span><h2 data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">17 Interesting Facts and Findings</span></h2><span data-dcnode-id="2850" instrument_node="">
</span><figure aria-describedby="caption-attachment-24745" class="wp-caption alignright" data-dcnode-id="2844" id="attachment_24745" style="width: 300px"><img alt="Smelling flowers happiness" class="wp-image-24745 size-medium lazyload" data-dcnode-id="2849" data-src="https://positivepsychology.com/wp-content/uploads/Secrets-of-Happiness-300x169.jpg" height="169" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Smelling flowers is a secrets to happiness" width="300"><figcaption class="wp-caption-text" data-dcnode-id="2845" id="caption-attachment-24745"><noscript data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">&lt;img class="wp-image-24745 size-medium lazyload" title="Smelling flowers is a secrets to happiness" src="https://positivepsychology.com/wp-content/uploads/Secrets-of-Happiness-300x169.jpg" alt="Smelling flowers happiness" width="300" height="169" /&gt;</span></noscript><span data-dcnode-id="2846" instrument_node=""> Photo via Pexels</span></figcaption></figure><span data-dcnode-id="2843" instrument_node="">
</span><p data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">Research in this field is booming, and new findings are coming out all the time. Here are a few of the most interesting facts and findings so far:</span></p><span data-dcnode-id="2840" instrument_node="">
</span><ol data-dcnode-id="2755"><span data-dcnode-id="2839" instrument_node="">
</span><li data-dcnode-id="2835"><span data-dcnode-id="2838" instrument_node="">Happiness is linked to lower heart rate and blood pressure, as well as healthier heart rate variability.</span><br data-dcnode-id="2837"><br data-dcnode-id="2836"></li><span data-dcnode-id="2834" instrument_node="">
</span><li data-dcnode-id="2830"><span data-dcnode-id="2833" instrument_node="">Happiness can also act as a barrier between you and germs – happier people are less likely to get sick.</span><br data-dcnode-id="2832"><br data-dcnode-id="2831"></li><span data-dcnode-id="2829" instrument_node="">
</span><li data-dcnode-id="2825"><span data-dcnode-id="2828" instrument_node="">People who are happier enjoy greater protection against stress and release less of the stress hormone cortisol.</span><br data-dcnode-id="2827"><br data-dcnode-id="2826"></li><span data-dcnode-id="2824" instrument_node="">
</span><li data-dcnode-id="2820"><span data-dcnode-id="2823" instrument_node="">Happy people tend to experience fewer aches and pains, including dizziness, muscle strain, and heartburn.</span><br data-dcnode-id="2822"><br data-dcnode-id="2821"></li><span data-dcnode-id="2819" instrument_node="">
</span><li data-dcnode-id="2815"><span data-dcnode-id="2818" instrument_node="">Happiness acts as a protective factor against disease and disability (in general, of course).</span><br data-dcnode-id="2817"><br data-dcnode-id="2816"></li><span data-dcnode-id="2814" instrument_node="">
</span><li data-dcnode-id="2810"><span data-dcnode-id="2813" instrument_node="">Those who are happiest tend to live significantly longer than those who are not.</span><br data-dcnode-id="2812"><br data-dcnode-id="2811"></li><span data-dcnode-id="2809" instrument_node="">
</span><li data-dcnode-id="2805"><span data-dcnode-id="2808" instrument_node="">Happiness boosts our immune system, which can help us fight and fend off the common cold.</span><br data-dcnode-id="2807"><br data-dcnode-id="2806"></li><span data-dcnode-id="2804" instrument_node="">
</span><li data-dcnode-id="2800"><span data-dcnode-id="2803" instrument_node="">Happy people tend to make others happier as well, and vice versa – those who do good, feel good!</span><br data-dcnode-id="2802"><br data-dcnode-id="2801"></li><span data-dcnode-id="2799" instrument_node="">
</span><li data-dcnode-id="2795"><span data-dcnode-id="2798" instrument_node="">A portion of our happiness is determined by our genetics (but there’s still plenty of room for attitude adjustments and happiness-boosting exercises!).</span><br data-dcnode-id="2797"><br data-dcnode-id="2796"></li><span data-dcnode-id="2794" instrument_node="">
</span><li data-dcnode-id="2790"><span data-dcnode-id="2793" instrument_node="">Smelling floral scents like roses can make us happier.</span><br data-dcnode-id="2792"><br data-dcnode-id="2791"></li><span data-dcnode-id="2789" instrument_node="">
</span><li data-dcnode-id="2785"><span data-dcnode-id="2788" instrument_node="">Those who are paid by the hour may be happier than those on salary (however, these findings are limited, so take them with a grain of salt!).</span><br data-dcnode-id="2787"><br data-dcnode-id="2786"></li><span data-dcnode-id="2784" instrument_node="">
</span><li data-dcnode-id="2780"><span data-dcnode-id="2783" instrument_node="">Relationships are much more conducive to a happy life than money.</span><br data-dcnode-id="2782"><br data-dcnode-id="2781"></li><span data-dcnode-id="2779" instrument_node="">
</span><li data-dcnode-id="2775"><span data-dcnode-id="2778" instrument_node="">Happier people tend to wear bright colors; it’s not certain which way the relationship works, but it can’t hurt to throw on some brighter hues once in a while—just in case!</span><br data-dcnode-id="2777"><br data-dcnode-id="2776"></li><span data-dcnode-id="2774" instrument_node="">
</span><li data-dcnode-id="2770"><span data-dcnode-id="2773" instrument_node="">Happiness can help people cope with arthritis and chronic pain better.</span><br data-dcnode-id="2772"><br data-dcnode-id="2771"></li><span data-dcnode-id="2769" instrument_node="">
</span><li data-dcnode-id="2765"><span data-dcnode-id="2768" instrument_node="">Being outdoors – especially near the water – can make us happier.</span><br data-dcnode-id="2767"><br data-dcnode-id="2766"></li><span data-dcnode-id="2764" instrument_node="">
</span><li data-dcnode-id="2760"><span data-dcnode-id="2763" instrument_node="">The holidays can be a stressful time, even for the happiest among us – an estimated 44% of women and 31% of men get the “holiday blues.”</span><br data-dcnode-id="2762"><br data-dcnode-id="2761"></li><span data-dcnode-id="2759" instrument_node="">
</span><li data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">Happiness is contagious! When we spend time around happy people, we’re likely to get a boost of happiness as well (Florentine, 2016; Newman, 2015).</span></li><span data-dcnode-id="2756" instrument_node="">
</span></ol><span data-dcnode-id="2754" instrument_node="">
</span><p data-dcnode-id="2746"><span data-dcnode-id="2753" instrument_node="">Here is the source for the first </span><a data-dcnode-id="2751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatergood.berkeley.edu/article/item/six_ways_happiness_is_good_for_your_health" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2752" instrument_node="">six facts</span></a><span data-dcnode-id="2750" instrument_node=""> and findings, as well as for the </span><a data-dcnode-id="2748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bustle.com/articles/169675-11-scientific-facts-about-happiness-that-youll-want-to-know" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2749" instrument_node="">latter 11</span></a><span data-dcnode-id="2747" instrument_node="">.</span></p><span data-dcnode-id="2745" instrument_node="">
</span><p data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2742" instrument_node="">
</span><p data-dcnode-id="2740"><a data-dcnode-id="2741" name="acts-of-kindness-happiness-study"></a></p><span data-dcnode-id="2739" instrument_node="">
</span><h2 data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">A Study Showing How Acts of Kindness Make us Happier</span></h2><span data-dcnode-id="2736" instrument_node="">
</span><p data-dcnode-id="2731"><img alt="Happiness as a Social Emotion." class="size-medium wp-image-30417 alignright lazyload" data-dcnode-id="2735" data-src="https://positivepsychology.com/wp-content/uploads/senior-3336451_640-300x225.jpg" height="225" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="300"><noscript data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">&lt;img class="size-medium wp-image-30417 alignright lazyload" src="https://positivepsychology.com/wp-content/uploads/senior-3336451_640-300x225.jpg" alt="Happiness as a Social Emotion." width="300" height="225" /&gt;</span></noscript><span data-dcnode-id="2732" instrument_node="">Feeling stressed after a long day of work? Treat yourself to a bubble bath.</span></p><span data-dcnode-id="2730" instrument_node="">
</span><p data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">Feeling blue? Treat yourself to a decadent dessert.</span></p><span data-dcnode-id="2727" instrument_node="">
</span><p data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">Feeling frustrated after an argument with a friend? Skip your workout and have an extra scoop of ice cream.</span></p><span data-dcnode-id="2724" instrument_node="">
</span><p data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">The message is clear: If you want to feel happy, you should focus on your own wishes and desires. Yet this is not the advice that many people grew up hearing. Indeed, most of the world’s religions (and grandmothers everywhere) have long suggested that people should focus on others first and themselves second.</span></p><span data-dcnode-id="2721" instrument_node="">
</span><p data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">Psychologists refer to such behavior as prosocial behavior and many recent&nbsp;studies have shown that when people have a prosocial focus, doing kind acts for others, their own happiness increases.</span></p><span data-dcnode-id="2718" instrument_node="">
</span><p data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">But how does prosocial behavior compare to treating yourself in terms of your happiness? And does treating yourself really make you feel happy?</span></p><span data-dcnode-id="2715" instrument_node="">
</span><p data-dcnode-id="2710"><span data-dcnode-id="2714" instrument_node="">In a recent study published in the journal </span><a data-dcnode-id="2712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apa.org/pubs/journals/emo/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2713" instrument_node="">Emotion</span></a><span data-dcnode-id="2711" instrument_node="">, Katherine Nelson-Coffey and her colleagues presented their research answering these questions.</span></p><span data-dcnode-id="2709" instrument_node="">
</span><p data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2706" instrument_node="">
</span><h3 data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">The Study</span></h3><span data-dcnode-id="2703" instrument_node="">
</span><p data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Participants were divided into four groups and given new instructions each week for four weeks.</span></p><span data-dcnode-id="2700" instrument_node="">
</span><p data-dcnode-id="2695"><span data-dcnode-id="2699" instrument_node="">One group was instructed to perform </span><a data-dcnode-id="2697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/random-acts-kindness/" rel="noopener noreferrer"><span data-dcnode-id="2698" instrument_node="">random acts of kindness</span></a><span data-dcnode-id="2696" instrument_node=""> for themselves (such as going shopping or enjoying a favorite hobby); the second group was instructed to perform acts of kindness for others (such as visiting an elderly relative or helping someone carry groceries); the third group was instructed to perform acts of kindness to improve the world (such as recycling or donating to charity); the fourth group was instructed to keep track of their daily activities.</span></p><span data-dcnode-id="2694" instrument_node="">
</span><p data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">Each week, the participants reported their activities from the previous week, as well as their experience of positive and negative emotions.</span></p><span data-dcnode-id="2691" instrument_node="">
</span><p data-dcnode-id="2686"><span data-dcnode-id="2690" instrument_node="">At the beginning, the end, and again two weeks after the four-week period, participants completed a questionnaire to assess their psychological flourishing. As a measure of overall happiness, the questionnaire included questions about psychological, social, and </span><a data-dcnode-id="2688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/emotional-intelligence-eq/" rel="noopener noreferrer"><span data-dcnode-id="2689" instrument_node="">emotional wellbeing</span></a><span data-dcnode-id="2687" instrument_node="">.</span></p><span data-dcnode-id="2685" instrument_node="">
</span><p data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2682" instrument_node="">
</span><h3 data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">The Results</span></h3><span data-dcnode-id="2679" instrument_node="">
</span><p data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">The results of the study were striking. Only participants who engaged in prosocial behavior demonstrated improvements in psychological flourishing.</span></p><span data-dcnode-id="2676" instrument_node="">
</span><p data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">Participants who practiced prosocial behavior demonstrated increases in positive emotions from one week to the next. In turn, these increases in feelings such as happiness, joy, and enjoyment predicted increases in psychological flourishing at the end of the study. In other words, positive emotions appeared to have been a critical ingredient linking prosocial behavior to increases in flourishing.</span></p><span data-dcnode-id="2673" instrument_node="">
</span><p data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">But what about the people who treated themselves?</span></p><span data-dcnode-id="2670" instrument_node="">
</span><p data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">They did not show the same increases in positive emotions or psychological flourishing as those who engaged in acts of kindness.&nbsp;In fact, people who treated themselves did not differ in positive emotions, negative emotions, or psychological flourishing over the course of the study compared to those who merely kept track of their daily activities.</span></p><span data-dcnode-id="2667" instrument_node="">
</span><p data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">This research does not say that we shouldn’t treat ourselves, show ourselves self-love when we need it, or enjoy our relaxation when we have it. However, the results of this study strongly suggest that we are more likely to reach greater levels of happiness when we exhibit prosocial behavior and show others kindness through our actions.</span></p><span data-dcnode-id="2664" instrument_node="">
</span><p data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2661" instrument_node="">
</span><p data-dcnode-id="2659"><a data-dcnode-id="2660" name="global-pursuit-of-happiness"></a></p><span data-dcnode-id="2658" instrument_node="">
</span><h2 data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">The Global Pursuit of Happiness</span></h2><span data-dcnode-id="2655" instrument_node="">
</span><figure aria-describedby="caption-attachment-8278" class="wp-caption alignright" data-dcnode-id="2649" id="attachment_8278" style="width: 300px"><img alt="main_1200_mini" class="wp-image-8278 lazyload" data-dcnode-id="2654" data-src="https://positivepsychology.com/wp-content/uploads/main_1200_mini.jpg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Happiness evaluation" width="300"><figcaption class="wp-caption-text" data-dcnode-id="2650" id="caption-attachment-8278"><noscript data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">&lt;img class="wp-image-8278 lazyload" title="Happiness evaluation" src="https://positivepsychology.com/wp-content/uploads/main_1200_mini.jpg" alt="main_1200_mini" width="300" /&gt;</span></noscript><span data-dcnode-id="2651" instrument_node=""> Happiness Evaluation. Image Retrieved by URL.</span></figcaption></figure><span data-dcnode-id="2648" instrument_node="">
</span><p data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">In world economic circles, Richard Easterlin investigated the relationship between money and wellbeing. The Easterlin paradox—”money does not buy happiness” (Mohun, 2012)—sparked a new wave of thinking about wealth and wellbeing.</span></p><span data-dcnode-id="2645" instrument_node="">
</span><p data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">In 1972, Bhutan chose to pursue a policy of happiness rather than a focus on economic growth tracked via their gross domestic product (GDPP). Subsequently, this little nation has been among the happiest, ranking amongst nations with far superior wealth (Kelly, 2012).</span></p><span data-dcnode-id="2642" instrument_node="">
</span><p data-dcnode-id="2634"><span data-dcnode-id="2641" instrument_node="">More global organizations and nations are becoming aware and supportive of the importance of happiness in today’s world. This has lead to The United Nations inviting nations to take part in a happiness survey, resulting in the “</span><a data-dcnode-id="2639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//worldhappiness.report/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2640" instrument_node="">World Happiness Report</span></a><span data-dcnode-id="2638" instrument_node="">,” a basis from which to steer public policy. Learn about the </span><a data-dcnode-id="2636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//templatearchive.com/world-happiness-report/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2637" instrument_node="">World Happiness Report for 2016</span></a><span data-dcnode-id="2635" instrument_node="">.</span></p><span data-dcnode-id="2633" instrument_node="">
</span><p data-dcnode-id="2622"><span data-dcnode-id="2632" instrument_node="">The United Nations also established&nbsp;</span><a data-dcnode-id="2630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.happinessday.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2631" instrument_node="">World Happiness Day</span></a><span data-dcnode-id="2629" instrument_node="">,&nbsp;March 20</span><sup data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">th</span></sup><span data-dcnode-id="2626" instrument_node="">, which was the result of efforts of the Bhutan Kingdom and their </span><a data-dcnode-id="2624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2012/dec/01/bhutan-wealth-happiness-counts" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2625" instrument_node="">Gross National Happiness</span></a><span data-dcnode-id="2623" instrument_node=""> initiative (Helliwell, Layard &amp; Sachs, 2013).</span></p><span data-dcnode-id="2621" instrument_node="">
</span><p data-dcnode-id="2616"><span data-dcnode-id="2620" instrument_node="">Organizations such as the&nbsp;</span><a data-dcnode-id="2618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.neweconomics.org/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2619" instrument_node="">New Economic Foundation</span></a><span data-dcnode-id="2617" instrument_node=""> are playing an influential role as an economic think tank that focuses on steering economic policy and development for the betterment of human wellbeing.</span></p><span data-dcnode-id="2615" instrument_node="">
</span><p data-dcnode-id="2610"><span data-dcnode-id="2614" instrument_node="">Ruut Veenhoven, a world authority on the scientific study of happiness, was one of the sources of inspiration for the United Nations adopting happiness measures (Ki-Moon, n.d). Veenhoven is a&nbsp;founding member of the&nbsp;</span><a data-dcnode-id="2612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worlddatabaseofhappiness.eur.nl/" rel="noopener" target="_blank"><span data-dcnode-id="2613" instrument_node="">World Database of Happiness</span></a><span data-dcnode-id="2611" instrument_node="">, which is a comprehensive scientific repository of happiness measures worldwide.</span></p><span data-dcnode-id="2609" instrument_node="">
</span><p data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">The objective of this organization is to provide a coordinated collection of data, with common interpretation according to a scientifically validated happiness theory, model, and body of research.</span></p><span data-dcnode-id="2606" instrument_node="">
</span><p data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2603" instrument_node="">
</span><p data-dcnode-id="2601"><a data-dcnode-id="2602" name="measures-of-happiness"></a></p><span data-dcnode-id="2600" instrument_node="">
</span><h2 data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">Measures of Happiness</span></h2><span data-dcnode-id="2597" instrument_node="">
</span><p data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">At this point, you might be wondering: Is it possible to measure happiness? Many psychologists have devoted their careers to answering this question and in short, the answer is yes.</span></p><span data-dcnode-id="2594" instrument_node="">
</span><p data-dcnode-id="2589"><span data-dcnode-id="2593" instrument_node="">Happiness can be measured by these three factors: the presence of positive emotions, the absence of negative emotions, and </span><a data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/life-satisfaction/" rel="noopener noreferrer"><span data-dcnode-id="2592" instrument_node="">life satisfaction</span></a><span data-dcnode-id="2590" instrument_node=""> (Ryan et al., 2001). It is a uniquely subjective experience, which means that nobody is better at reporting on someone’s happiness than the individuals themselves.</span></p><span data-dcnode-id="2588" instrument_node="">
</span><p data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">For this reason scales, self-report measures, and questionnaires are the most common formats for measuring happiness. The most recognized examples are the following:</span></p><span data-dcnode-id="2585" instrument_node="">
</span><ol data-dcnode-id="2572"><span data-dcnode-id="2584" instrument_node="">
</span><li data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">The PANAS (Positive Affect and Negative Affect Schedule);</span></li><span data-dcnode-id="2581" instrument_node="">
</span><li data-dcnode-id="2577"><a data-dcnode-id="2579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/measure-happiness-tests-surveys/"><span data-dcnode-id="2580" instrument_node="">The SWLS (Satisfaction With Life Scale)</span></a><span data-dcnode-id="2578" instrument_node="">;</span></li><span data-dcnode-id="2576" instrument_node="">
</span><li data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">The SHS (Subjective Happiness Scale)</span></li><span data-dcnode-id="2573" instrument_node="">
</span></ol><span data-dcnode-id="2571" instrument_node="">
</span><p data-dcnode-id="2566"><span data-dcnode-id="2570" instrument_node="">However, there are&nbsp;</span><a data-dcnode-id="2568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/measure-happiness-tests-surveys/"><span data-dcnode-id="2569" instrument_node="">many instruments available to measure happiness</span></a><span data-dcnode-id="2567" instrument_node=""> that have proven reliable and valid over time (Hefferon &amp; Boniwell, 2011).</span></p><span data-dcnode-id="2565" instrument_node="">
</span><p data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2562" instrument_node="">
</span><p data-dcnode-id="2560"><a data-dcnode-id="2561" name="four-qualities"></a></p><span data-dcnode-id="2559" instrument_node="">
</span><h2 data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">Four Qualities of Life: A South African Happiness Case Study</span></h2><span data-dcnode-id="2556" instrument_node="">
</span><p data-dcnode-id="2548"><img alt="global happiness" class="wp-image-15574 alignright lazyload" data-dcnode-id="2555" data-src="https://positivepsychology.com/wp-content/uploads/global-happiness.jpg" height="209" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="300"><noscript data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">&lt;img class="wp-image-15574 alignright lazyload" src="https://positivepsychology.com/wp-content/uploads/global-happiness.jpg" alt="global happiness" width="300" height="209" /&gt;</span></noscript><span data-dcnode-id="2552" instrument_node="">Another measurement of happiness was developed by Ruut Veenhoven. He constructed the model of </span><a data-dcnode-id="2550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//personal.eur.nl/veenhoven/Pub2000s/2006f-full.pdf" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2551" instrument_node="">Four Qualities of Life</span></a><span data-dcnode-id="2549" instrument_node=""> which positions and describes the construct of happiness in various dimensions (Veenhoven, 2010).</span></p><span data-dcnode-id="2547" instrument_node="">
</span><p data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">Of the four dimensions, satisfaction is our personal subjective measure of happiness as we interpret life as a whole. Veenhoven’s global research into happiness suggests that happiness is possible for many (Veenhoven, 2010).</span></p><span data-dcnode-id="2544" instrument_node="">
</span><p data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">This is an overview of his Four Qualities:</span></p><span data-dcnode-id="2541" instrument_node="">
</span><span data-dcnode-id="2540" instrument_node="">
</span><span data-dcnode-id="2539" instrument_node="">
</span><span data-dcnode-id="2538" instrument_node="">
</span><span data-dcnode-id="2536" instrument_node="">
</span><span data-dcnode-id="2533" instrument_node="">
</span><span data-dcnode-id="2530" instrument_node="">
</span><span data-dcnode-id="2528" instrument_node="">
</span><span data-dcnode-id="2526" instrument_node="">
</span><span data-dcnode-id="2525" instrument_node="">
</span><span data-dcnode-id="2524" instrument_node="">
</span><span data-dcnode-id="2521" instrument_node="">
</span><span data-dcnode-id="2518" instrument_node="">
</span><span data-dcnode-id="2515" instrument_node="">
</span><span data-dcnode-id="2513" instrument_node="">
</span><span data-dcnode-id="2512" instrument_node="">
</span><span data-dcnode-id="2509" instrument_node="">
</span><span data-dcnode-id="2506" instrument_node="">
</span><span data-dcnode-id="2503" instrument_node="">
</span><span data-dcnode-id="2501" instrument_node="">
</span><span data-dcnode-id="2499" instrument_node="">
</span><table data-dcnode-id="2498" width="100%"><thead data-dcnode-id="2527"><tr data-dcnode-id="2529"><th data-dcnode-id="2537"></th><th data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">Outer Qualities</span></th><th data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">Inner Qualities</span></th></tr></thead><tbody data-dcnode-id="2500"><tr data-dcnode-id="2514"><td data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">Life Chances</span></td><td data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">Liveability of Environment</span></td><td data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">Life-ability of Individual</span></td></tr><tr data-dcnode-id="2502"><td data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">Life Results</span></td><td data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">Utility of Life</span></td><td data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">Satisfaction</span></td></tr></tbody></table><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2494" instrument_node="">
</span><p data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">Using Veenhoven’s Four Qualities it is possible to assess the happiness of any country. In this case study, we will use the example of South Africa.</span></p><span data-dcnode-id="2491" instrument_node="">
</span><h4 data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">Liveability of environment</span></h4><span data-dcnode-id="2488" instrument_node="">
</span><p data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">This dimension includes factors such as law, freedom, schooling, employment, etc. It is a measurement of how well an environment meets what Maslow proposed as our basic needs (safety, security, shelter, food) (Maslow, 1943).</span></p><span data-dcnode-id="2485" instrument_node="">
</span><p data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">In South Africa, there is still a chronic shortage of housing, water supply, and adequate schooling. For some time now, South Africa has been plagued by resultant ‘service delivery riots.’</span></p><span data-dcnode-id="2482" instrument_node="">
</span><p data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">Corruption shows as a strong negative correlation (-0.69) to happiness in Veenhoven’s (2010) research and sadly South Africa is plagued by a high level of corruption and maladministration.</span></p><span data-dcnode-id="2479" instrument_node="">
</span><h4 data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Life-ability of individuals</span></h4><span data-dcnode-id="2476" instrument_node="">
</span><p data-dcnode-id="2471"><span data-dcnode-id="2475" instrument_node="">The ability of individuals to deal with life is important; both </span><a data-dcnode-id="2473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/exercise-neurological-benefits/" rel="noopener noreferrer"><span data-dcnode-id="2474" instrument_node="">mental and physical health</span></a><span data-dcnode-id="2472" instrument_node=""> are identified as important factors, together with social values of solidarity, tolerance, and love (Veenhoven, 2010).</span></p><span data-dcnode-id="2470" instrument_node="">
</span><p data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">In South Africa, the race divide is widening as it is being used as a political motivator to wield power to the detriment of the average individual. Violent crime, intolerance, and poverty also threaten the presence of love and compassion for each other.</span></p><span data-dcnode-id="2467" instrument_node="">
</span><h4 data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Utility of life</span></h4><span data-dcnode-id="2464" instrument_node="">
</span><p data-dcnode-id="2459"><span data-dcnode-id="2463" instrument_node="">In this dimension, Veenhoven (2010) references a </span><a data-dcnode-id="2461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/viktor-frankl-logotherapy/"><span data-dcnode-id="2462" instrument_node="">higher-order meaning</span></a><span data-dcnode-id="2460" instrument_node="">, for example, religious affiliations. The writer would further argue that national patriotism finds a&nbsp;place here.</span></p><span data-dcnode-id="2458" instrument_node="">
</span><p data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">If we hold strong pride in our nation would that not constitute an input to our life’s meaning? If we felt proud of our nation, would that not play a significant part in our happiness?</span></p><span data-dcnode-id="2455" instrument_node="">
</span><p data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">Uchida et al. (2013) found that high levels of national disaster negatively impacted a nation’s level of happiness. Recently, South Africa has experienced national tragedies such as the Marikana mine tragedy and the passing of Nelson Mandela.</span></p><span data-dcnode-id="2452" instrument_node="">
</span><p data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">South Africa has come through a very unsettled and violent history of imperialism and apartheid. In both accounts, a minority population was ‘protected’ and experienced a ‘good life,’ whilst the oppression of the majority fuelled that good life.</span></p><span data-dcnode-id="2449" instrument_node="">
</span><p data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">The year 1994 was a significant time in history for South Africa, marking the turn of democracy to serve all equally. There is no doubt that a significant stride has been made to correct past imbalances. However, happiness has not been a focal area&nbsp;for progress in this country.</span></p><span data-dcnode-id="2446" instrument_node="">
</span><p data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2443" instrument_node="">
</span><h3 data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">Suggestions To Increase Happiness In South Africa</span></h3><span data-dcnode-id="2440" instrument_node="">
</span><p data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">Many of our challenges in South Africa are of a political and administrative nature.</span></p><span data-dcnode-id="2437" instrument_node="">
</span><p data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">Happiness is a complex construct that cannot be directly controlled. This helps. Through policy and individual and organizational action, we can endeavor to influence and increase happiness (Veenhoven, 2010).</span></p><span data-dcnode-id="2434" instrument_node="">
</span><p data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">Here are some examples of how happiness in South Africa could be improved:</span></p><span data-dcnode-id="2431" instrument_node="">
</span><ol data-dcnode-id="2391"><span data-dcnode-id="2430" instrument_node="">
</span><li data-dcnode-id="2426"><span data-dcnode-id="2429" instrument_node="">The distribution of food packs including positive psychology literature for the homeless which motorists can purchase from major retail stores or garages;</span><br data-dcnode-id="2428"><br data-dcnode-id="2427"></li><span data-dcnode-id="2425" instrument_node="">
</span><li data-dcnode-id="2421"><span data-dcnode-id="2424" instrument_node="">Happy South Africa movies consisting of what is going well with South Africa as a nation and highlighting each South African culture, which could be shown before main features at cinemas or on DVDs;</span><br data-dcnode-id="2423"><br data-dcnode-id="2422"></li><span data-dcnode-id="2420" instrument_node="">
</span><li data-dcnode-id="2416"><span data-dcnode-id="2419" instrument_node="">All major newspapers could give a Happy South Africa news story;</span><br data-dcnode-id="2418"><br data-dcnode-id="2417"></li><span data-dcnode-id="2415" instrument_node="">
</span><li data-dcnode-id="2411"><span data-dcnode-id="2414" instrument_node="">Positive psychology consultants could give classes or roadshow teachings of the principles such as gratitude, mindfulness, meaning, and purpose;</span><br data-dcnode-id="2413"><br data-dcnode-id="2412"></li><span data-dcnode-id="2410" instrument_node="">
</span><li data-dcnode-id="2406"><span data-dcnode-id="2409" instrument_node="">The formation of an overarching organization that could provide a consolidated portal to all volunteer and community organizations which are working to make South Africa happier;</span><br data-dcnode-id="2408"><br data-dcnode-id="2407"></li><span data-dcnode-id="2405" instrument_node="">
</span><li data-dcnode-id="2401"><span data-dcnode-id="2404" instrument_node="">The creation of a South African Happiness Community which researches local happiness;</span><br data-dcnode-id="2403"><br data-dcnode-id="2402"></li><span data-dcnode-id="2400" instrument_node="">
</span><li data-dcnode-id="2396"><span data-dcnode-id="2399" instrument_node="">Assistance could be given to communities in designing local projects, to both obtain resources and project manage the initiatives to successful completion;</span><br data-dcnode-id="2398"><br data-dcnode-id="2397"></li><span data-dcnode-id="2395" instrument_node="">
</span><li data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">South Africa could engage and actively take part in the world happiness initiatives which are taking off globally.</span></li><span data-dcnode-id="2392" instrument_node="">
</span></ol><span data-dcnode-id="2390" instrument_node="">
</span><p data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">South Africa is just one example of the many countries in the world that require greater advocacy and action on an individual, organizational, and governmental level. However, happiness is a subjective experience and only once we change the way we perceive the world can we really begin sharing and creating happiness for others.</span></p><span data-dcnode-id="2387" instrument_node="">
</span><p data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">But is it possible to train yourself to be happier?</span></p><span data-dcnode-id="2384" instrument_node="">
</span><p data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">The answer is yes!</span></p><span data-dcnode-id="2381" instrument_node="">
</span><p data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2378" instrument_node="">
</span><p data-dcnode-id="2376"><a data-dcnode-id="2377" name="train-brain-happiness"></a></p><span data-dcnode-id="2375" instrument_node="">
</span><h2 data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">How to Train Your Brain for Happiness</span></h2><span data-dcnode-id="2372" instrument_node="">
</span><p data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">At birth, our genetics provide us with a happiness set point that accounts for about 40% of our happiness. Having enough food, shelter, and safety are 10%.</span></p><span data-dcnode-id="2369" instrument_node="">
</span><p data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">Then we have 50% that is entirely up to us.</span></p><span data-dcnode-id="2366" instrument_node="">
</span><p data-dcnode-id="2361"><span data-dcnode-id="2365" instrument_node="">By training our brain through </span><a data-dcnode-id="2363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/self-awareness-matters-how-you-can-be-more-self-aware/" rel="noopener noreferrer"><span data-dcnode-id="2364" instrument_node="">awareness</span></a><span data-dcnode-id="2362" instrument_node=""> and exercises to think in a happier, more optimistic, and more resilient way, we can effectively train our brains for happiness.</span></p><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">New discoveries in the field of positive psychology show that physical health, psychological wellbeing, and physiological functioning are all improved by how we learn to “feel good” (Fredrickson,&nbsp; 2000).</span></p><span data-dcnode-id="2357" instrument_node="">
</span><p data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2354" instrument_node="">
</span><h3 data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">What Are The Patterns We Need To “Train Out” of Our Brains?</span></h3><span data-dcnode-id="2351" instrument_node="">
</span><ol data-dcnode-id="2314"><span data-dcnode-id="2350" instrument_node="">
</span><li data-dcnode-id="2341"><em data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">Perfectionism</span></em><span data-dcnode-id="2347" instrument_node="">&nbsp;–&nbsp;Often confused with conscientiousness, which involves appropriate and tangible expectations, </span><a data-dcnode-id="2345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/cognitive-distortions/" rel="noopener noreferrer"><span data-dcnode-id="2346" instrument_node="">perfectionism</span></a><span data-dcnode-id="2344" instrument_node=""> involves inappropriate levels of expectations and intangible goals. It often produces problems for adults, adolescents, and children.</span><br data-dcnode-id="2343"><br data-dcnode-id="2342"></li><span data-dcnode-id="2340" instrument_node="">
</span><li data-dcnode-id="2331"><em data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">Social comparison</span></em><span data-dcnode-id="2337" instrument_node="">&nbsp;–&nbsp;When we compare ourselves to others we often find ourselves lacking. </span><a data-dcnode-id="2335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/social-comparison/"><span data-dcnode-id="2336" instrument_node="">Healthy social comparison</span></a><span data-dcnode-id="2334" instrument_node=""> is about finding what you admire in others and learning to strive for those qualities. However, the best comparisons we can make are with ourselves. How are you better than you were in the past?</span><br data-dcnode-id="2333"><br data-dcnode-id="2332"></li><span data-dcnode-id="2330" instrument_node="">
</span><li data-dcnode-id="2324"><em data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">Materialism</span></em><span data-dcnode-id="2327" instrument_node=""> – Attaching our happiness to external things and material wealth is dangerous, as we can lose our happiness if our material circumstances change (Carter &amp; Gilovich, 2010).</span><br data-dcnode-id="2326"><br data-dcnode-id="2325"></li><span data-dcnode-id="2323" instrument_node="">
</span><li data-dcnode-id="2316"><em data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">Maximizing</span></em><span data-dcnode-id="2320" instrument_node="">&nbsp;–&nbsp;Maximizers search for better options even when they are satisfied. This leaves them little time to </span><a data-dcnode-id="2318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/mindfulness-exercises-techniques-activities/"><span data-dcnode-id="2319" instrument_node="">be present for the good moments</span></a><span data-dcnode-id="2317" instrument_node=""> in their lives and with very little gratitude (Schwartz, Ward, Monterosso, Lyubomirsky, White,&nbsp; &amp; Lehman, 2002).</span></li><span data-dcnode-id="2315" instrument_node="">
</span></ol><span data-dcnode-id="2313" instrument_node="">
</span><p data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2310" instrument_node="">
</span><h3 data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">Misconceptions About Mind Training</span></h3><span data-dcnode-id="2307" instrument_node="">
</span><p data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">Some of the misconceptions about retraining your brain are simply untrue. Here are a few myths that need debunking:</span></p><span data-dcnode-id="2304" instrument_node="">
</span><p data-dcnode-id="2301"><em data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">1. We are products of our genetics so we cannot create change in our brains.</span></em></p><span data-dcnode-id="2300" instrument_node="">
</span><p data-dcnode-id="2298" style="padding-left: 60px;"><span data-dcnode-id="2299" instrument_node="">Our minds are malleable. Ten years ago we thought brain pathways were set in early childhood. In fact, we now know that there is huge potential for large changes through to your twenties, and neuroplasticity is still changing throughout one’s life.</span></p><span data-dcnode-id="2297" instrument_node="">
</span><p data-dcnode-id="2295" style="padding-left: 60px;"><span data-dcnode-id="2296" instrument_node="">The myelin sheath that covers your neural pathways gets thicker and stronger the more it is used (think of the plastic protective covering on wires); the more a pathway is used, the stronger the myelin and the faster the neural pathway. Simply put, when you practice feeling grateful, you notice more things to be grateful for.</span></p><span data-dcnode-id="2294" instrument_node="">
</span><p data-dcnode-id="2291"><em data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">2. Brain training is brainwashing.</span></em></p><span data-dcnode-id="2290" instrument_node="">
</span><p data-dcnode-id="2288" style="padding-left: 60px;"><span data-dcnode-id="2289" instrument_node="">Brainwashing is an involuntary change. If we focus on training our mind to see the glass half full instead of half empty, that is a choice.</span></p><span data-dcnode-id="2287" instrument_node="">
</span><p data-dcnode-id="2284"><em data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">3. If&nbsp;we are too happy we run the risk of becoming overly optimistic.</span></em></p><span data-dcnode-id="2283" instrument_node="">
</span><p data-dcnode-id="2278" style="padding-left: 60px;"><span data-dcnode-id="2282" instrument_node="">There is no such thing as overly optimistic, and science shows that brain training for positivity includes practices like&nbsp;</span><a data-dcnode-id="2280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/mindfulness-exercises-techniques-activities/"><span data-dcnode-id="2281" instrument_node="">mindfulness</span></a><span data-dcnode-id="2279" instrument_node=""> and gratitude. No one has ever overdosed on these habits.</span></p><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2274" instrument_node="">
</span><h3 data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">How Is The Brain Wired For Happiness?</span></h3><span data-dcnode-id="2271" instrument_node="">
</span><p data-dcnode-id="2267"><img alt="Can You Train Your Mind for Happiness? - Brain scan" class="wp-image-8485 alignright lazyload" data-dcnode-id="2270" data-src="https://positivepsychology.com/wp-content/uploads/can-you-train-your-mind-for-happiness-brain-scan.jpg" height="173" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="250"><noscript data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">&lt;img class="wp-image-8485 alignright lazyload" src="https://positivepsychology.com/wp-content/uploads/can-you-train-your-mind-for-happiness-brain-scan.jpg" alt="Can You Train Your Mind for Happiness? - Brain scan" width="250" height="173" /&gt;</span></noscript></p><span data-dcnode-id="2266" instrument_node="">
</span><p data-dcnode-id="2261"><span data-dcnode-id="2265" instrument_node="">Our brains come&nbsp;already designed for happiness. We have caregiving systems in place for eye contact, touch, and vocalizations to let others know we are </span><a data-dcnode-id="2263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/build-trust/"><span data-dcnode-id="2264" instrument_node="">trustworthy and secure</span></a><span data-dcnode-id="2262" instrument_node="">.</span></p><span data-dcnode-id="2260" instrument_node="">
</span><p data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Our brains also regulate&nbsp;chemicals like oxytocin.</span></p><span data-dcnode-id="2257" instrument_node="">
</span><p data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">People who have more oxytocin trust more readily, have increased tendencies towards monogamy, and exhibit more caregiving behavior. These behaviors reduce stress which lowers production of hormones like cortisol and inhibits the cardiovascular response to stress (Kosfeld, Heinrichs, Zak, Fischbacher, &amp; Fehr, 2005).</span></p><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">The following TED talk&nbsp;provides an insight into how we can overcome our negative mental patterns:</span></p><span data-dcnode-id="2251" instrument_node="">
</span><p data-dcnode-id="2249"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lazyload" data-dcnode-id="2250" data-src="https://www.youtube.com/embed/KZIGekgoaz4?feature=oembed" frameborder="0" height="360" title="Happy Brain: How to Overcome Our Neural Predispositions to Suffering | Amit Sood, MD | TEDxUNI" width="640"></iframe></p><span data-dcnode-id="2248" instrument_node="">
</span><p data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">If happiness has little to do with having too many resources, then it is an inner state that we have the power to cultivate. The above video even offers specific exercises for you to try. Just by doing them, you are actively re-wiring your brain towards calm and happy sensations.</span></p><span data-dcnode-id="2245" instrument_node="">
</span><p data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">Meanwhile, this TEDtalk gives a better understanding of how to wire your brain to accept the positivity and happiness in your life:</span></p><span data-dcnode-id="2242" instrument_node="">
</span><p data-dcnode-id="2240"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lazyload" data-dcnode-id="2241" data-src="https://www.youtube.com/embed/jpuDyGgIeh0?feature=oembed" frameborder="0" height="360" title="Hardwiring happiness: Dr. Rick Hanson at TEDxMarin 2013" width="640"></iframe></p><span data-dcnode-id="2239" instrument_node="">
</span><p data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">The negativity bias that Dr. Rick Hanson discusses can help us understand how we can activate and “install” positive thinking as part of our core brain chemistry. If you don’t have a moment to watch either of these videos now, make time for it later—they are rich with relevant data and tips.</span></p><span data-dcnode-id="2236" instrument_node="">
</span><p data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2233" instrument_node="">
</span><p data-dcnode-id="2231"><a data-dcnode-id="2232" name="home"></a></p><span data-dcnode-id="2230" instrument_node="">
</span><h2 data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">A Take-Home Message</span></h2><span data-dcnode-id="2227" instrument_node="">
</span><p data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Happiness is the overall subjective experience of our positive emotions. There are many factors which influence our happiness, and ongoing research continues to uncover what makes us happiest.</span></p><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">This global pursuit of happiness has resulted in measures such as the World Happiness Report, while the World Happiness Database is working to collaborate and consolidate the existing happiness pursuits of different nations.</span></p><span data-dcnode-id="2221" instrument_node="">
</span><p data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">We are living in a time when the conditions for happiness are known. This can be disheartening at times when we consider examples such as South Africa, where political strife prevent much of the population from experiencing the Four Qualities of Life as presented by Veenhoven.</span></p><span data-dcnode-id="2218" instrument_node="">
</span><p data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">There is, however, good news in this situation: neuroplasticity.</span></p><span data-dcnode-id="2215" instrument_node="">
</span><blockquote data-dcnode-id="2212"><p data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">The human brain is wired for happiness and positive connections with others. It is actually possible to experience and learn happiness despite what has been genetically hardwired.</span></p></blockquote><span data-dcnode-id="2211" instrument_node="">
</span><p data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">In a world where the focus on happiness is growing and the mirror is turning back towards ourselves, the happiness of the world relies on the happiness within each one of us and how we act, share, and voice the importance of happiness for everyone.</span></p><span data-dcnode-id="2208" instrument_node="">
</span><p data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">What are the steps you are taking to make yourself and others happier? Let us know by leaving a comment below!</span></p><span data-dcnode-id="2205" instrument_node="">
</span><p data-dcnode-id="2200"><span data-dcnode-id="2204" instrument_node="">We hope you enjoyed reading this article. Don’t forget to </span><a data-dcnode-id="2202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/ebook" rel="noopener" target="_blank"><span data-dcnode-id="2203" instrument_node="">download our three Positive Psychology Exercises for free</span></a><span data-dcnode-id="2201" instrument_node="">.</span></p><span data-dcnode-id="2199" instrument_node="">

</span><p data-dcnode-id="1226"><span data-dcnode-id="1233" instrument_node="">Random acts of anonymous kindness are toxic?</span><br data-dcnode-id="1232"><span data-dcnode-id="1231" instrument_node="">
Good article, thanks. I thought I’d add this reminder about random acts of anonymous kindness. They may make the giver feel happier – it is not true for the recipient. At best, it’s a zero sum gain. No additional happiness created.</span><br data-dcnode-id="1230"><span data-dcnode-id="1229" instrument_node="">
People on the receiving end do not think: “How very kind!”. Instead, they want to know why and who because they are deeply suspicious of an ulterior motive. And frankly, it’s a bit creepy.</span><br data-dcnode-id="1228"><span data-dcnode-id="1227" instrument_node="">
So, if you do this yourself, you’ll feel better (maybe) but don’t think the the recipient will.</span></p><span data-dcnode-id="1225" instrument_node="">
