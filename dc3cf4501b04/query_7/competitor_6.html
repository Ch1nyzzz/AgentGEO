</span><a class="reset-hash-position" data-dcnode-id="2572" id="h5" name="h5"></a><h2 data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">Discussion</span></h2><span data-dcnode-id="2569" instrument_node="">
</span><p class="mb0" data-dcnode-id="2564"><span data-dcnode-id="2568" instrument_node="">We investigated younger and older adults’ gaze preferences on different pairings of angry, sad, happy, and neutral face stimuli, and how inter-individual factors related to socioemotional functioning, most relevant FTP, might be associated with greater attention to the more positive faces. While we did not observe any significant age-group difference in overall gaze preferences to the face pairs when the entire trial duration was considered, older adults showed greater attentional shifts to more positive stimuli in later stages of processing (i.e., </span><i data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">positivity shifts</span></i><span data-dcnode-id="2565" instrument_node="">). As expected, FTP was more limited in the elderly group. Interestingly, however, age moderated the relationship between positivity shifts and FTP, such that the relationship between the FTP and positivity shifts was positive in the younger, and negative in the older adults. While positivity shifts in younger adults were modulated by inter-individual differences related to socioemotional functioning, this was not the case in older adults. Similarly, the relationship between FTP and other socioemotional factors also differed across age.</span></p><span data-dcnode-id="2563" instrument_node="">
</span><h3 data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">Age Similarities and Differences in Gaze Preferences to Emotional Stimuli</span></h3><span data-dcnode-id="2560" instrument_node="">
</span><p class="mb15" data-dcnode-id="2549"><span data-dcnode-id="2559" instrument_node="">Our results support the existence of a positivity effect, but suggest that an age-dependent group difference in attention toward “positive information” needs to be qualified by additional parameters. We found that the age-dependent group effect only emerged when the temporal dynamics of gaze patterns were examined. Specifically, although both groups showed strikingly similar gaze patterns on face pairs and more attention to the more positive face during later stages of processing (see </span><a data-dcnode-id="2557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F1"><span data-dcnode-id="2558" instrument_node="">Figure 1</span></a><span data-dcnode-id="2556" instrument_node="">), gaze preferences for the more positive face in late compared to early trial durations were significantly stronger in the older adults. A delayed occurrence of positivity seems consistent with an emotion regulatory mechanism which takes into account the first (random sequence) observations and subsequently guides attention toward the more positive image. Thus, this finding might support the argument that the positivity effect might reflect motivated cognition in older adults to a greater extent than it does in younger adults, and is congruent with previous studies which also showed a delayed onset of positivity in older adults (</span><a data-dcnode-id="2554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="2555" instrument_node="">Isaacowitz et al., 2009</span></a><span data-dcnode-id="2553" instrument_node="">; </span><a data-dcnode-id="2551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B58"><span data-dcnode-id="2552" instrument_node="">Lee and Knight, 2009</span></a><span data-dcnode-id="2550" instrument_node="">).</span></p><span data-dcnode-id="2548" instrument_node="">
</span><p class="mb15" data-dcnode-id="2534"><span data-dcnode-id="2547" instrument_node="">Furthermore, results from the ANOVA analysis gave no indication that age differences in positivity shifts differentially emerged for a particular contrast (for happy vs. sad, happy vs. angry, happy vs. neutral, neutral vs. angry, and neutral vs. sad contrasts). Based on previous reports regarding the differential processing of particularly negative emotions such as sadness and anger across age (</span><a data-dcnode-id="2545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B10"><span data-dcnode-id="2546" instrument_node="">Blanchard-Fields and Coats, 2008</span></a><span data-dcnode-id="2544" instrument_node="">; </span><a data-dcnode-id="2542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B85"><span data-dcnode-id="2543" instrument_node="">Streubel and Kunzmann, 2011</span></a><span data-dcnode-id="2541" instrument_node="">; </span><a data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="2540" instrument_node="">Kunzmann et al., 2014</span></a><span data-dcnode-id="2538" instrument_node="">), we conducted an exploratory analysis to test whether younger and older adults show a differential preference for sad or angry faces (in sad vs. angry contrast) in late compared to early trial durations, but failed to observe a significant Age × Emotion interaction. Both groups fixated longer on the angry face in late compared to early trial durations (see also </span><a data-dcnode-id="2536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F1"><span data-dcnode-id="2537" instrument_node="">Figure 1</span></a><span data-dcnode-id="2535" instrument_node="">).</span></p><span data-dcnode-id="2533" instrument_node="">
</span><p class="mb15" data-dcnode-id="2528"><span data-dcnode-id="2532" instrument_node="">We also examined whether there are age-related differences in focusing on different regions of faces, and whether these relate to positivity shifts. In line with previous findings, younger adults spent more time looking at the eye regions, whereas older adults on mouth regions, independent of the emotional expression displayed. This has been suggested to be a compensatory mechanism for hearing loss that often accompany increasing age, through older adults’ increased reliance on visible speech (</span><a data-dcnode-id="2530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B89"><span data-dcnode-id="2531" instrument_node="">Thompson, 1995</span></a><span data-dcnode-id="2529" instrument_node="">). We had hypothesized that increased positivity in gaze preferences to more positive faces might be related to this age-related differentiation in focusing on different regions of faces, however, our results did not support this link. Eyes provide social cues, so it might be the case that older adults miss on important aspects of communication due to this trade-off. However, this did not seem to be related to greater shifts to positive faces in older age, possibly since older adults fixated longer at the mouth region of the faces independent of the emotion displayed.</span></p><span data-dcnode-id="2527" instrument_node="">
</span><p class="mb0" data-dcnode-id="2522"><span data-dcnode-id="2526" instrument_node="">Taken together, our results show that younger and older adults’ positivity preferences did not significantly differ according to the stimulus type (i.e., groups showed more similarities than differences in their gaze preferences to face pairs), and for each contrast, both groups on average showed a shift toward the more positive face (when comparing late vs. early trial durations, see </span><a data-dcnode-id="2524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F1"><span data-dcnode-id="2525" instrument_node="">Figure 1</span></a><span data-dcnode-id="2523" instrument_node="">). However, the overall shifts to more positive faces were significantly higher for older compared to younger adults, supporting SST’s notion that a motivational shift to more positive, emotionally gratifying information increases with age.</span></p><span data-dcnode-id="2521" instrument_node="">
</span><h3 data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">The Role of FTP in Positivity and Socioemotional Functioning in Younger and in Older Adults</span></h3><span data-dcnode-id="2518" instrument_node="">
</span><p class="mb15" data-dcnode-id="2510"><span data-dcnode-id="2517" instrument_node="">Previous reports have emphasized the role of limited FTP in the positivity effect using the theoretical framework of SST. Despite its presumably important role, a few studies that have used a questionnaire-based FTP did not observe any significant links to behavioral assessments of positivity (e.g., </span><a data-dcnode-id="2515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B25"><span data-dcnode-id="2516" instrument_node="">Demeyer and De Raedt, 2013</span></a><span data-dcnode-id="2514" instrument_node="">; </span><a data-dcnode-id="2512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="2513" instrument_node="">Bohn et al., 2016</span></a><span data-dcnode-id="2511" instrument_node="">). Rather than manipulating participants’ perceived future time by asking them to imagine a limited or an open-ended FTP (which was the method mostly used by previous studies), we investigated whether how one perceives future time would moderate the relationship between positivity shifts and age. We reasoned that between-person differences in FTP would differentially be related to positivity across age groups, based on the assumption that perceiving one’s remaining life as limited (as operationalized by the FTP questionnaire) might have a different meaning, and therefore different behavioral outcomes for younger and older adults. One important aim of our study was to investigate this hypothesis.</span></p><span data-dcnode-id="2509" instrument_node="">
</span><p class="mb15" data-dcnode-id="2501"><span data-dcnode-id="2508" instrument_node="">Regarding the age-related differences, we confirmed that FTP was more limited in the older group, who also showed stronger gaze preferences for the more positive face. However, we found that the interaction between FTP and the age group in predicting the positivity shift was significant (see </span><a data-dcnode-id="2506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F2"><span data-dcnode-id="2507" instrument_node="">Figure 2</span></a><span data-dcnode-id="2505" instrument_node="">). In line with our prediction, FTP was more negatively associated with positivity shifts in the older group, while a more positive relationship was observed in the younger adults. For the older group, increased preference for positive stimuli especially in the later stages of processing (e.g., more controlled as opposed to automatic, reflexive processes) being driven by a limited FTP seems consistent with the tenet of the SST that age-related positivity is related to a change in FTP. However, this did not seem to apply to the younger people in our study. This is similar to </span><a data-dcnode-id="2503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B51"><span data-dcnode-id="2504" instrument_node="">Kellough and Knight’s (2012)</span></a><span data-dcnode-id="2502" instrument_node=""> finding, where the authors experimentally manipulated participants’ time perspective, and found that while imagining a more expanded life span decreased positivity in older adults’ perception of emotions, imagining a limited FTP did not have an effect on younger adults’ perception of emotions. Although the FTP has been measured differently in these studies, these similar findings regarding the moderator role of age suggest that positivity in information processing depend on both age and FTP.</span></p><span data-dcnode-id="2500" instrument_node="">
</span><p class="mb15" data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">The different outcomes of FTP on positivity as a function of age might be related to a different meaning that a limited FTP might have for the two age groups. In line with this, we observed that FTP’s associations with worry and well-being levels showed significant differences between the age-groups, such that the negative associations of FTP to worry and well-being were more significant in the younger adults.</span></p><span data-dcnode-id="2497" instrument_node="">
</span><p class="mb0" data-dcnode-id="2486"><span data-dcnode-id="2496" instrument_node="">While FTP is claimed to be the driving force behind the positivity effect and higher levels of well-being in the elderly, </span><a data-dcnode-id="2494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="2495" instrument_node="">Grühn et al. (2016)</span></a><span data-dcnode-id="2493" instrument_node=""> showed FTP to be inversely related to socioemotional functioning independent of age. In our study, an open-ended FTP indicated a more adaptive socioemotional profile in younger adults, given its highly significant association with well-being, where in older adults no such link was observed. The FTP measure used in our study, as conceptualized by </span><a data-dcnode-id="2491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B56"><span data-dcnode-id="2492" instrument_node="">Lang and Carstensen (2002)</span></a><span data-dcnode-id="2490" instrument_node="">, captures whether an individual perceives the future in positive or negative light. One of the questions included in the FTP scale is to what extent individuals perceive their future to be full of opportunities. One would expect an older person’s answer to this question to be less affirmative than a younger person’s. For a younger person with a more limited or constrained outlook into the future, the negative consequences for their current well-being can be deemed expected. On the other hand, for an older individual, not perceiving the future to be full of opportunities would most probably have a lessened impact on their current well-being. In other words, it might be possible that the different ends of the scale implicate different things for younger and older adults, and that the relationship between the instrument (the FTP questionnaire) to the underlying construct is not linear. While the SST treats FTP as a unidimensional construct, it has been suggested that FTP is a two-factor or multidimensional construct (</span><a data-dcnode-id="2488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B18"><span data-dcnode-id="2489" instrument_node="">Cate and John, 2007</span></a><span data-dcnode-id="2487" instrument_node="">). While this is not elaborated in the theory, some authors suggest that only specific facets of FTP might indicate positive socioemotional functioning. Our findings, along with the mixed findings observed about the links between FTP and socioemotional functioning, show that the relationship is nuanced. While more data are needed to draw firmer conclusions, based on our findings—particularly the relationship between FTP and well-being—we suggest that FTP (as assessed by the FTP measure) might reflect different socioemotional profiles depending on the phase of life. Future studies should consider the potential qualifier role of age in their assessments of FTP along with positivity in information processing or socioemotional functioning.</span></p><span data-dcnode-id="2485" instrument_node="">
</span><h3 data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">The Role of Inter-individual Differences in Positivity</span></h3><span data-dcnode-id="2482" instrument_node="">
</span><p class="mb15" data-dcnode-id="2474"><span data-dcnode-id="2481" instrument_node="">Based on our assumption that inter-individual differences in abilities, resources, or emotional states might contribute to an individual’s top-down motivation for positive stimuli, we conducted exploratory analyses to look at the role of stress, emotion regulation, social support, well-being, cognitive functioning, and FTP, examining the effect of these alongside age in positivity shifts. Interestingly, we found that inter-individual differences in socioemotional factors were more significantly related to positivity shifts than age by itself, supporting the notion that age alone is not a sufficient causal factor for psychological processes (e.g., </span><a data-dcnode-id="2479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="2480" instrument_node="">Baltes and Lang, 1997</span></a><span data-dcnode-id="2478" instrument_node="">; </span><a data-dcnode-id="2476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B6"><span data-dcnode-id="2477" instrument_node="">Baltes et al., 2006</span></a><span data-dcnode-id="2475" instrument_node="">), such as the positivity effect. These analyses also confirmed the interaction between age and FTP.</span></p><span data-dcnode-id="2473" instrument_node="">
</span><p class="mb15" data-dcnode-id="2462"><span data-dcnode-id="2472" instrument_node="">Some of the relationships that we hypothesized were not supported (i.e., the role of well-being, social support, and emotion regulation in positivity shifts). Although the positivity effect is claimed to be a top-down, motivationally driven process that relies on cognitive resources, our study failed to demonstrate a significant role for cognitive functioning for top-down, motivational shifts to more positive stimuli. This is consistent with a recent study which examined the association of positivity in memory and attention with performance on cognitive tasks, and found limited evidence (</span><a data-dcnode-id="2470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="2471" instrument_node="">Barber et al., 2020</span></a><span data-dcnode-id="2469" instrument_node="">). Unlike studies that associated cognitive functioning with positivity effects, studies that used manipulations of cognitive resources have shown different results. For instance, a previous study that examined the role of emotionally valanced distractors on the encoding of negative stimuli found no interference effects for positive distractors in memory for negative targets, supporting the role of autonomic rather than effortful processing of positive distractors (</span><a data-dcnode-id="2467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B93"><span data-dcnode-id="2468" instrument_node="">Ziaei et al., 2015</span></a><span data-dcnode-id="2466" instrument_node="">). Likewise, </span><a data-dcnode-id="2464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B61"><span data-dcnode-id="2465" instrument_node="">Mather and Carstensen (2003)</span></a><span data-dcnode-id="2463" instrument_node=""> found that compared to younger adults, older adults avoided emotionally negative faces during a cognitive task, supporting the claim that positivity relies on cognitive resources.</span></p><span data-dcnode-id="2461" instrument_node="">
</span><p class="mb15" data-dcnode-id="2448"><a data-dcnode-id="2459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B32"><span data-dcnode-id="2460" instrument_node="">Fox and Knight (2005)</span></a><span data-dcnode-id="2458" instrument_node=""> examined the hypothesis whether trait and state anxiety mediated the relationship between positivity and cognition, and showed although there was a tendency for older adults without anxiety to avoid attending to negative stimuli during a cognitive task, older adults who were induced into anxious moods showed selective attention to threat similar with younger adults. This suggests an important role for anxiety in positivity in emotion processing. Consistent with this, among the stress measures that we examined (i.e., </span><i data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">stress due to lack of resources</span></i><span data-dcnode-id="2455" instrument_node="">, </span><i data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">worry</span></i><span data-dcnode-id="2452" instrument_node="">, and </span><i data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">burden</span></i><span data-dcnode-id="2449" instrument_node="">), worry was significantly related to positivity shifts, in that higher levels of worry were associated with fewer shifts to more positive faces across age.</span></p><span data-dcnode-id="2447" instrument_node="">
</span><p class="mb15" data-dcnode-id="2427"><span data-dcnode-id="2446" instrument_node="">Worry is characterized by “a chain of thoughts and images, negatively affect-laden, and relatively uncontrollable; it represents an attempt to engage in mental problem-solving on an issue whose outcome is uncertain but contains the possibility of one or more negative outcomes; consequently, worry relates closely to the fear process” (</span><a data-dcnode-id="2444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="2445" instrument_node="">Borkovec et al., 1983</span></a><span data-dcnode-id="2443" instrument_node="">, p. 10). For these reasons, worry is a common feature of most anxiety disorders (</span><a data-dcnode-id="2441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="2442" instrument_node="">Beck and Clark, 1997</span></a><span data-dcnode-id="2440" instrument_node="">). Significant attentional biases to negative or threatening stimuli have been reported in individuals high in trait anxiety (</span><a data-dcnode-id="2438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B73"><span data-dcnode-id="2439" instrument_node="">Quigley et al., 2012</span></a><span data-dcnode-id="2437" instrument_node="">), and in participants who were induced into an anxious mood (</span><a data-dcnode-id="2435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="2436" instrument_node="">Goodwin et al., 2017</span></a><span data-dcnode-id="2434" instrument_node="">). Our finding that higher levels of worry are associated with fewer shifts to positive faces is congruent with these studies, however, this contrasts with claims that younger and older adults use positive gaze for different reasons (such that older adults use positive gaze in negative mood states, whereas younger adults show more mood congruent looking patterns) (</span><a data-dcnode-id="2432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="2433" instrument_node="">Isaacowitz et al., 2008</span></a><span data-dcnode-id="2431" instrument_node="">; </span><a data-dcnode-id="2429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="2430" instrument_node="">Isaacowitz and Noh, 2011</span></a><span data-dcnode-id="2428" instrument_node="">).</span></p><span data-dcnode-id="2426" instrument_node="">
</span><p class="mb15" data-dcnode-id="2394"><span data-dcnode-id="2425" instrument_node="">Indeed, increased positivity in older as compared to younger adults might as well be due to decreased levels of worry in older age, a very significant age-group difference that we also observed in our data (see </span><a data-dcnode-id="2423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="2424" instrument_node="">Table 1</span></a><span data-dcnode-id="2422" instrument_node="">), similar with past research (</span><a data-dcnode-id="2420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B43"><span data-dcnode-id="2421" instrument_node="">Hunt et al., 2003</span></a><span data-dcnode-id="2419" instrument_node="">). For instance, worries about finances and social events are more frequent in younger than in older adults (</span><a data-dcnode-id="2417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B72"><span data-dcnode-id="2418" instrument_node="">Powers et al., 1992</span></a><span data-dcnode-id="2416" instrument_node="">). It has been noted that psychological distress and mental health problems have become more widespread among the younger populations over the last twenty years (</span><a data-dcnode-id="2414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B88"><span data-dcnode-id="2415" instrument_node="">Sweeting et al., 2010</span></a><span data-dcnode-id="2413" instrument_node="">; </span><a data-dcnode-id="2411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B65"><span data-dcnode-id="2412" instrument_node="">Mojtabai and Jorm, 2015</span></a><span data-dcnode-id="2410" instrument_node="">), which have been linked to changes in national labor and market trends (</span><a data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B55"><span data-dcnode-id="2409" instrument_node="">Lager and Bremberg, 2009</span></a><span data-dcnode-id="2407" instrument_node="">). Employment and the labor markets during the 1970s were “secure,” but they have since become increasingly “polarized and precarious” (</span><a data-dcnode-id="2405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B24"><span data-dcnode-id="2406" instrument_node="">Dannefer and Huang, 2017</span></a><span data-dcnode-id="2404" instrument_node="">). For instance, the crises of 1980s brought about an increase in the number of suicides in Spain, which coincided with greater increases in unemployment (</span><a data-dcnode-id="2402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B64"><span data-dcnode-id="2403" instrument_node="">McKee and Stuckler, 2001</span></a><span data-dcnode-id="2401" instrument_node="">). Thus, the increase in precariousness might be the reason for increased levels of anxiety among the young populations. If worry in younger populations is increasing due to social and economic changes, this change might hypothetically also be reflected in the positivity levels of younger adults (such as in emotion processing, or in affect domains), and to the age-related difference observed in these groups. The reliance of the positivity effect on worry could explain why the positivity effect, which has initially been identified and conceptualized in 2005 by Mather and Carstensen, might be influenced by cohort effects. This would also explain the inconsistencies found in previous research. For instance, age-related differences to positive over negative stimuli observed in US Americans were not observed in Hong Kong Chinese (</span><a data-dcnode-id="2399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B33"><span data-dcnode-id="2400" instrument_node="">Fung et al., 2008</span></a><span data-dcnode-id="2398" instrument_node="">). Cohort effects have also been established on well-being, in that the well-being of cohorts in the US that lived through the economic challenges of the early twentieth century was lower than those born during more prosperous times (</span><a data-dcnode-id="2396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B87"><span data-dcnode-id="2397" instrument_node="">Sutin et al., 2013</span></a><span data-dcnode-id="2395" instrument_node="">). Possibly also related to this, the strongest negative correlate of well-being in our data was lack of resources, which depicted satisfaction with one’s job and social conditions.</span></p><span data-dcnode-id="2393" instrument_node="">
</span><p class="mb15" data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">From this perspective, a differential relationship of FTP to positivity shifts in younger and older adults and the stronger link between perceived limited FTP and worry in younger adults would make sense. This is possibly because FTP comprises ideas such as “many opportunities lie ahead of me in the future.” Younger adults who are pessimistic about their future and who think the future does not bear many opportunities for them might be more prompted to focus on the negative information.</span></p><span data-dcnode-id="2390" instrument_node="">
</span><p class="mb0" data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">One is more prompted to focus on the negative when one feels unsafe or threatened. When one feels more secure, it might be easier to afford to pay attention to the positive in the environment. There is little reason as to why this should be different in younger and in older adults. Rather than focusing on age-group differences, studies should try to identify why these differences emerge between younger and older groups, and include inter-individual assessments related to socioemotional functioning. Taken together, our study extends the prior literature by showing that along with the interaction between Age and FTP, lower levels of worry are important factors for increased positivity in emotion processing in general, pointing to the necessity of studying inter-individual differences in psychological constructs in positivity effect research.</span></p><span data-dcnode-id="2387" instrument_node="">
</span><h3 data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">Limitations, Caveats, and Future Directions</span></h3><span data-dcnode-id="2384" instrument_node="">
</span><p class="mb15" data-dcnode-id="2376"><span data-dcnode-id="2383" instrument_node="">An important limitation of our study lies in its cross-sectional nature and its heavy reliance on self-report data. Drawing on the findings that the positivity effect mostly emerges when participants are free from experimental constraints (</span><a data-dcnode-id="2381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B76"><span data-dcnode-id="2382" instrument_node="">Reed et al., 2014</span></a><span data-dcnode-id="2380" instrument_node="">), we chose a relatively simple task, in which the participants passively viewed pairs of face stimuli. Since this kind of task does not implicate any emotional response on the part of the participants, they cannot be claimed to test emotion regulation (</span><a data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B45"><span data-dcnode-id="2379" instrument_node="">Isaacowitz and Blanchard-Fields, 2012</span></a><span data-dcnode-id="2377" instrument_node="">). Since we did not manipulate gaze or other measures we used (i.e., well-being, emotion regulation, FTP, etc.), but rather examined associations between behavioral assessments of positivity and self-report data in light of our hypotheses, we cannot draw conclusions about causal pathways underlying the positivity effect and associated outcomes for well-being. Studying age-related changes in emotion processing with ambulatory assessments and/or in longitudinal designs would be more desirable to establish such links.</span></p><span data-dcnode-id="2375" instrument_node="">
</span><p class="mb15" data-dcnode-id="2367"><span data-dcnode-id="2374" instrument_node="">An important focus of our study was to investigate the theoretical grounding of the positivity effect. We therefore investigated the role, and indirectly the meaning of FTP, as it has been treated as the most relevant construct to explain the age differences in emotion processing. Since previous reports have claimed increased positivity—suggested to be driven by a limited FTP—to have a potential role for the well-being of older adults (</span><a data-dcnode-id="2372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B75"><span data-dcnode-id="2373" instrument_node="">Reed and Carstensen, 2012</span></a><span data-dcnode-id="2371" instrument_node="">), it would be interesting to test the role of well-being levels in the relationship between positivity and FTP, and whether this relationship might differ across the age groups. While our study did not have enough statistical power for this three-way interaction, we provide data on this exploratory analysis (detailed results are reported in the </span><a data-dcnode-id="2369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23S11"><span data-dcnode-id="2370" instrument_node="">Supplementary Material</span></a><span data-dcnode-id="2368" instrument_node="">). We observed that the negative relationship between FTP and positivity indicated older adults with lower well-being levels. Since this analysis did not have sufficient statistical power, its results are speculative at this point. Nevertheless, we regard this worthwhile to be pursued further (in studies with adequate power). Our data will be publicly available for future meta-analyses.</span></p><span data-dcnode-id="2366" instrument_node="">
</span><p class="mb0" data-dcnode-id="2355"><span data-dcnode-id="2365" instrument_node="">Another important thing to add is that the older adults in the current study, in contrast to previous research (</span><a data-dcnode-id="2363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B66"><span data-dcnode-id="2364" instrument_node="">Mroczek and Kolarz, 1998</span></a><span data-dcnode-id="2362" instrument_node="">), did not report higher well-being as compared to younger adults. Surprisingly also, younger adults in our study reported using more positive emotion regulation than older adults. It might be worth noting that most of the older adults who took part in this study have lived in the former German Democratic Republic (GDR). With the fall of the Berlin Wall, people who had lived in the GDR suddenly experienced a great amount of instability and change. The experience of stability and continuity is essential to an individual’s well-being (</span><a data-dcnode-id="2360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B92"><span data-dcnode-id="2361" instrument_node="">Westerhof and Keyes, 2006</span></a><span data-dcnode-id="2359" instrument_node="">). Thus, one reason that older adults did not report higher life satisfaction than younger adults might be related to this, given that the age-related differences in positive affect are suggested to be small, and hard to disentangle from cohort effects (</span><a data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B54"><span data-dcnode-id="2358" instrument_node="">Kunzmann et al., 2000</span></a><span data-dcnode-id="2356" instrument_node="">). Future studies might consider including measurements of important life events (such as important personal or health-related changes), measures related worry, anxiety, job and social security, and whether positivity in older adults is still maintained in face of a potential health threat (such as a pandemic like Covid-19 which poses a stronger risk for elderly people), which could provide new insights into the positivity effect and its relationship to socioemotional functioning.</span></p><span data-dcnode-id="2354" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2353" id="h6" name="h6"></a><h2 data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Conclusion</span></h2><span data-dcnode-id="2350" instrument_node="">
</span><p class="mb0" data-dcnode-id="2345"><span data-dcnode-id="2349" instrument_node="">The positivity effect, i.e., increased attention and memory for positive information in older as compared to younger people is thought to play a major role in emotional well-being in older age. Within the framework of SST, the positivity effect is suggested to be driven by a limited FTP. However, although FTP has been the most relevant construct in explaining the positivity effect, questions regarding its relationship to a top-down, motivationally driven positivity in emotion processing, and its meaning across age groups were still open. Our findings confirmed the presence of increased positivity in the older adults, who more often shifted their attention to more positive stimuli in later stages of processing (i.e., positivity shifts). We found that age moderated the association between positivity shifts and FTP, such that the positivity shifts were associated with more limited FTPs in older, and more open FTPs in younger adults, most likely stemming from a different meaning of FTP across the age-groups. Moreover, we show that neither age, nor the associated FTP </span><i data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">per se</span></i><span data-dcnode-id="2346" instrument_node=""> were sufficient in explaining positivity shifts, and inter-individual differences in levels of worry also played a significant role. Our study is the first one to demonstrate the moderator role of age in the relationship between top-down positivity in emotion processing and FTP, with its underlying dynamics related to socioemotional functioning. Our findings also demonstrate the importance of studying inter-individual differences in socioemotional functioning rather than solely focusing on age-related differences in studies of the positivity effect.</span></p><span data-dcnode-id="2344" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2343" id="h7" name="h7"></a><h2 data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">Data Availability Statement</span></h2><span data-dcnode-id="2340" instrument_node="">
</span><p class="mb0" data-dcnode-id="2326"><span data-dcnode-id="2339" instrument_node="">The datasets generated for this study can be found in the online repositories. The names of the repository/repositories and accession number(s) can be found below: Parts of our data (all measures used in our study except the eye-tracker data) are publicly available and can be accessed via Gesellschaft für wissenschaftliche Datenverarbeitung mbH Göttingen (GWDG) (</span><a data-dcnode-id="2337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gwdg.de/"><span data-dcnode-id="2338" instrument_node="">https://www.gwdg.de/</span></a><span data-dcnode-id="2336" instrument_node="">). Raw and preprocessed data at this location is accessible through web browser (</span><a data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ftp.gwdg.de/pub/misc/MPI-Leipzig_Mind-Brain-Body-LEMON/"><span data-dcnode-id="2335" instrument_node="">https://ftp.gwdg.de/pub/misc/MPI-Leipzig_Mind-Brain-Body-LEMON/</span></a><span data-dcnode-id="2333" instrument_node="">) and a fast FTP connection (</span><a data-dcnode-id="2331" href="ftp://ftp.gwdg.de/pub/misc/MPI-Leipzig_Mind-Brain-Body-LEMON/"><span data-dcnode-id="2332" instrument_node="">ftp://ftp.gwdg.de/pub/misc/MPI-Leipzig_Mind-Brain-Body-LEMON/</span></a><span data-dcnode-id="2330" instrument_node="">). In the case the location of the data changes in the future, the location of the dataset can be resolved with PID 21.11101/0000-0007-C379-5 (e.g., </span><a data-dcnode-id="2328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hdl.handle.net/21.11101/0000-0007-C379-5"><span data-dcnode-id="2329" instrument_node="">http://hdl.handle.net/21.11101/0000-0007-C379-5</span></a><span data-dcnode-id="2327" instrument_node="">).</span></p><span data-dcnode-id="2325" instrument_node="">

</span><p class="mb0" data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">We would like to thank Ulman Lindenberger, Mara Mather, Annette Brose, and Roger Mundry for their helpful suggestions and feedback. Parts of the data in this manuscript have been previously presented at the Society of Affective Science (SAS) Conference in Boston, in 2017, and at the LeiPsych Psychology Conference in Leipzig, in 2016. We thank Joshua Grant for his help in proofreading the manuscript. We additionally thank our interns Jennifer Neubauer, Laura Golz, Edith Bongartz, C. Alexandrina Guran, Melina Engelhardt, Gabriele Dambrauskeite, Enzo Morino, Dorothee Poehlchen, and Maria Voss for their assistance in behavioral data acquisition.</span></p><span data-dcnode-id="2290" instrument_node="">

</span><a data-dcnode-id="2280" id="FNT1" name="FNT1"></a><h2 data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">Footnotes</span></h2><span data-dcnode-id="2277" instrument_node="">
</span><ol data-dcnode-id="2188"><span data-dcnode-id="2276" instrument_node="">
</span><li data-dcnode-id="2244" id="footnote1"><strong data-dcnode-id="2273"><a class="footnotetextanchor" data-dcnode-id="2274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23footnote1a" style="color:gray;" title=""><span data-dcnode-id="2275" instrument_node="">^</span></a></strong><span data-dcnode-id="2272" instrument_node=""> In their meta-analysis, </span><a data-dcnode-id="2270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B67"><span data-dcnode-id="2271" instrument_node="">Murphy and Isaacowitz (2008)</span></a><span data-dcnode-id="2269" instrument_node=""> state that the terms such as </span><i data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">positivity bias</span></i><span data-dcnode-id="2266" instrument_node="">, </span><i data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">positivity effect</span></i><span data-dcnode-id="2263" instrument_node="">, and </span><i data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">negativity effect</span></i><span data-dcnode-id="2260" instrument_node=""> have been used liberally throughout the literature to implicate biases for positive over negative, or for positive and negative over neutral stimuli. We define </span><i data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">positivity bias</span></i><span data-dcnode-id="2257" instrument_node=""> in our study as greater preference for more positive stimuli during the entire trial periods. Time course differences in </span><i data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">positivity bias</span></i><span data-dcnode-id="2254" instrument_node="">—particularly a more pronounced positivity bias in late compared to early trial durations—would be identified as the </span><i data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">“positivity shift.”</span></i><span data-dcnode-id="2251" instrument_node=""> According to the proponents of the SST (see </span><a data-dcnode-id="2249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B75"><span data-dcnode-id="2250" instrument_node="">Reed and Carstensen, 2012</span></a><span data-dcnode-id="2248" instrument_node="">), it is this delayed positivity which marks the age differences in </span><i data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">the positivity effect</span></i><span data-dcnode-id="2245" instrument_node="">.</span></li><span data-dcnode-id="2243" instrument_node="">
</span><li data-dcnode-id="2229" id="footnote2"><strong data-dcnode-id="2240"><a class="footnotetextanchor" data-dcnode-id="2241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23footnote2a" style="color:gray;" title=""><span data-dcnode-id="2242" instrument_node="">^</span></a></strong><span data-dcnode-id="2239" instrument_node=""> We had no a priori hypothesis regarding this contrast (sad vs. angry); rather we used this contrast as we used all pairings of happy/neutral/sad/angry faces to counterbalance the emotional stimuli in our study. This analysis was implemented </span><i data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">post-hoc</span></i><span data-dcnode-id="2236" instrument_node=""> after finding out that previous studies have indicated differences with respect to sadness and anger in younger and in older adults (e.g., </span><a data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B10"><span data-dcnode-id="2235" instrument_node="">Blanchard-Fields and Coats, 2008</span></a><span data-dcnode-id="2233" instrument_node="">; </span><a data-dcnode-id="2231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="2232" instrument_node="">Kunzmann et al., 2014</span></a><span data-dcnode-id="2230" instrument_node="">).</span></li><span data-dcnode-id="2228" instrument_node="">
</span><li data-dcnode-id="2223" id="footnote3"><strong data-dcnode-id="2225"><a class="footnotetextanchor" data-dcnode-id="2226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23footnote3a" style="color:gray;" title=""><span data-dcnode-id="2227" instrument_node="">^</span></a></strong><span data-dcnode-id="2224" instrument_node=""> Some files from the eye tracker had long missing data intervals. The eye tracker camera could not reliably detect the pupil in participants wearing glasses (especially anti-reflective types) or hard lenses, or when the participant changed posture, making the files unusable for analysis. Some files were corrupt, such that the original raw files from the eye tracker could not be opened, therefore, they could not be used for further processing.</span></li><span data-dcnode-id="2222" instrument_node="">
</span><li data-dcnode-id="2214" id="footnote4"><strong data-dcnode-id="2219"><a class="footnotetextanchor" data-dcnode-id="2220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23footnote4a" style="color:gray;" title=""><span data-dcnode-id="2221" instrument_node="">^</span></a></strong><span data-dcnode-id="2218" instrument_node=""> Factor analyses in our study were mainly used for data reduction purposes. For this factor analyses, the results were confirmed by the parallel analysis approach (Horn’s Test of Principal Components/Factors) as well as the Very Simple Structure approach in R (</span><a data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="2217" instrument_node="">Dinno, 2012</span></a><span data-dcnode-id="2215" instrument_node="">). The Kaiser-Meyer-Olkin (KMO) test values indicating the sampling adequacy for factor analysis for emotion regulation, stress, and for cognitive functioning scales were 0.70, 0.84, and 0.80, respectively.</span></li><span data-dcnode-id="2213" instrument_node="">
</span><li data-dcnode-id="2202" id="footnote5"><strong data-dcnode-id="2210"><a class="footnotetextanchor" data-dcnode-id="2211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23footnote5a" style="color:gray;" title=""><span data-dcnode-id="2212" instrument_node="">^</span></a></strong><span data-dcnode-id="2209" instrument_node=""> The arousal levels of the faces have not been controlled for in this study. After the eye tracker study, participants were asked to rate 48 novel face stimuli from the FACES database. They were instructed to rate the intensity level of angry, sad, happy, and neutral faces according to how happy, angry, and sad the faces looked on a Likert-type scale from 0 (</span><i data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">not at all</span></i><span data-dcnode-id="2206" instrument_node="">) to 4 (</span><i data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">very much</span></i><span data-dcnode-id="2203" instrument_node="">). The faces were again counterbalanced for age group (young/middle-aged/old faces), sex (male/female), and emotional expression (sad/angry/neutral/happy). This task was carried out to investigate emotional perception and is not directly linked to the current study. The results will be reported elsewhere. We do not report these results here—as a manipulation check—since the stimuli in these two tasks were not the same. However, since the younger and older participants rated the same 48 faces, it might be relevant to report that we found that younger and older adults did not show differences in the overall accuracy of labeling the emotions.</span></li><span data-dcnode-id="2201" instrument_node="">
</span><li data-dcnode-id="2196" id="footnote6"><strong data-dcnode-id="2198"><a class="footnotetextanchor" data-dcnode-id="2199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23footnote6a" style="color:gray;" title=""><span data-dcnode-id="2200" instrument_node="">^</span></a></strong><span data-dcnode-id="2197" instrument_node=""> We included participant sex as a within-subject covariate in our preliminary mixed-effects ANOVA analyses (both for positivity bias and positivity shift) to see whether it significantly relates to positivity preferences. We collapsed the data across participant sex when no main effect of sex or any interactions between sex and other variables emerged.</span></li><span data-dcnode-id="2195" instrument_node="">
</span><li data-dcnode-id="2190" id="footnote7"><strong data-dcnode-id="2192"><a class="footnotetextanchor" data-dcnode-id="2193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23footnote7a" style="color:gray;" title=""><span data-dcnode-id="2194" instrument_node="">^</span></a></strong><span data-dcnode-id="2191" instrument_node=""> The same analysis was carried out on late vs. early trial durations for the sad vs. angry contrast.</span></li><span data-dcnode-id="2189" instrument_node="">
</span></ol><span data-dcnode-id="2187" instrument_node="">
</span><a data-dcnode-id="2186" id="refer1" name="refer1"></a><h2 data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">References</span></h2><span data-dcnode-id="2183" instrument_node="">
