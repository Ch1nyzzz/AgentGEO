</span><h3 data-dcnode-id="3306"><span data-dcnode-id="3307" instrument_node="">Sample Size and Power</span></h3><span data-dcnode-id="3305" instrument_node="">
</span><p class="mb0" data-dcnode-id="3258"><span data-dcnode-id="3304" instrument_node="">We performed the power analysis of our study on the basis of data from </span><a data-dcnode-id="3302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="3303" instrument_node="">Isaacowitz et al., 2009</span></a><span data-dcnode-id="3301" instrument_node="">; </span><i data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">N</span></i><span data-dcnode-id="3298" instrument_node=""> = 79). They found that older adults’ positivity preferences emerged only 500 ms after the stimulus onset and increased linearly over time (effect size η</span><sup data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">2</span></sup><span data-dcnode-id="3295" instrument_node=""> = 0.06 for Age Group × Emotion × Time Course). We used G</span><sup data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">∗</span></sup><span data-dcnode-id="3292" instrument_node="">Power 3.1 (</span><a data-dcnode-id="3290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B30"><span data-dcnode-id="3291" instrument_node="">Faul et al., 2009</span></a><span data-dcnode-id="3289" instrument_node="">) to perform the power analyses. With an alpha level of 0.05, and power of 0.95, the projected sample size that is needed to detect an effect size of </span><i data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">f</span></i><sup data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">2</span></sup><span data-dcnode-id="3284" instrument_node=""> = 0.25 is 54 participants for a repeated-measures analysis of variance (ANOVA) with a within and between subjects interaction. Moreover, in order to test our hypothesis for the FTP × Age Group interaction, we additionally performed sensitivity power analysis using “Linear Multiple Regression: Fixed Model, </span><i data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">R</span></i><sup data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">2</span></sup><span data-dcnode-id="3279" instrument_node=""> increase,” and calculated the projected sample size to detect small (</span><i data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">f</span></i><sup data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">2</span></sup><span data-dcnode-id="3274" instrument_node=""> = 0.02), medium (</span><i data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">f</span></i><sup data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">2</span></sup><span data-dcnode-id="3269" instrument_node=""> = 0.15), and large (</span><i data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">f</span></i><sup data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">2</span></sup><span data-dcnode-id="3264" instrument_node=""> = 0.35) effect sizes. We specified the number of tested predictors as 1, and number of total predictors as 3 (i.e., FTP, Age Group, and a two-way interaction that is between FTP × Age Group). The power analysis revealed that the projected sample size needed to be 635 to detect a small effect, 129 to detect a medium effect, and 57 to detect a large effect. Taken together, these analyses show that our sample size of 129 should be adequate to examine the main objectives of this study, as long as the FTP × Age Group interaction </span><i data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">f</span></i><sup data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">2</span></sup><span data-dcnode-id="3259" instrument_node=""> is larger than 0.15.</span></p><span data-dcnode-id="3257" instrument_node="">
</span><h3 data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">Measures</span></h3><span data-dcnode-id="3254" instrument_node="">
</span><h4 class="pt0" data-dcnode-id="3252"><span data-dcnode-id="3253" instrument_node="">Well-Being</span></h4><span data-dcnode-id="3251" instrument_node="">
</span><p class="mb0" data-dcnode-id="3231"><span data-dcnode-id="3250" instrument_node="">To have a general measure of subjective well-being, we used the “well-being” subscale of the </span><i data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">Trait Emotional Intelligence Questionnaire</span></i><span data-dcnode-id="3247" instrument_node=""> (TEIQue-SF; </span><a data-dcnode-id="3245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B71"><span data-dcnode-id="3246" instrument_node="">Petrides and Furnham, 2006</span></a><span data-dcnode-id="3244" instrument_node="">; German adaptation by </span><a data-dcnode-id="3242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B50"><span data-dcnode-id="3243" instrument_node="">Jacobs et al., 2015</span></a><span data-dcnode-id="3241" instrument_node="">), which covers three facets of well-being: Self-esteem, Trait-happiness, and Trait-optimism. This factor has also been labeled as “trait positivity” and has been shown to be tightly associated with life satisfaction (</span><a data-dcnode-id="3239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B82"><span data-dcnode-id="3240" instrument_node="">Siegling et al., 2015</span></a><span data-dcnode-id="3238" instrument_node="">). Items on this scale include statements such as “On the whole, I’m pleased with my life,” and are answered on a 7-point Likert-type scale from 1 (</span><i data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node="">completely disagree</span></i><span data-dcnode-id="3235" instrument_node="">) to 7 (</span><i data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">completely agree</span></i><span data-dcnode-id="3232" instrument_node="">). Cronbach’s alpha for this subscale was 0.80.</span></p><span data-dcnode-id="3230" instrument_node="">
</span><h4 data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">Stress</span></h4><span data-dcnode-id="3227" instrument_node="">
</span><p class="mb15" data-dcnode-id="3213"><span data-dcnode-id="3226" instrument_node="">Perceived stress levels were measured using two questionnaires. The </span><i data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">Trierer Inventar zum Chronischen Stress</span></i><span data-dcnode-id="3223" instrument_node=""> (TICS; </span><a data-dcnode-id="3221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B81"><span data-dcnode-id="3222" instrument_node="">Schulz and Schlotz, 1999</span></a><span data-dcnode-id="3220" instrument_node="">), which assesses chronic stress over the last 3 months with nine subscales (Work Overload, Social Overload, Pressure to Perform, Work Discontent, Excessive Demands at Work, Lack of Social Recognition, Social Tension, Social Isolation, and Chronic Worrying), and the </span><i data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">Perceived Stress Questionnaire</span></i><span data-dcnode-id="3217" instrument_node=""> (PSQ; </span><a data-dcnode-id="3215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B22"><span data-dcnode-id="3216" instrument_node="">Cohen et al., 1983</span></a><span data-dcnode-id="3214" instrument_node="">). The PSQ assesses the perception, appraisal, and processing of stressors (“global stress”) from the previous 2 years and includes four subscales: Worries, Tension, Joy, and Demands.</span></p><span data-dcnode-id="3212" instrument_node="">
</span><p class="mb0" data-dcnode-id="3187"><span data-dcnode-id="3211" instrument_node="">As the TICS and PSQ assess related constructs, a maximum likelihood factor analysis</span><sup data-dcnode-id="3207" id="footnotesuper4"><a data-dcnode-id="3210" id="footnote4a"></a><a class="footnoteanchor" data-dcnode-id="3208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23footnote4"><span data-dcnode-id="3209" instrument_node="">4</span></a></sup><span data-dcnode-id="3206" instrument_node=""> with promax oblique rotation on a total of 13 subscales was used in the testing sample (</span><i data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">N</span></i><span data-dcnode-id="3203" instrument_node=""> = 129). Cronbach’s alpha for the 13 subscales was 0.67. The factor analysis extracted three factors (based on Complexity 1 and Complexity 2 Criteria of </span><i data-dcnode-id="3201"><span data-dcnode-id="3202" instrument_node="">Very Simple Structure</span></i><span data-dcnode-id="3200" instrument_node="">, VSS; </span><a data-dcnode-id="3198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B78"><span data-dcnode-id="3199" instrument_node="">Revelle and Rocklin, 1979</span></a><span data-dcnode-id="3197" instrument_node="">). Items with salient loadings on Factor 1 corresponded to lack of satisfaction with one’s job and one’s social conditions; items with high loadings on Factor 2 corresponded to subscales related to external demands and exhaustion; items with high loadings on Factor 3 corresponded to worry and anxiety subscales of the TICS and PSQ. Thus, the three factors were labeled as Stress due to </span><i data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">Lack of Resources</span></i><span data-dcnode-id="3194" instrument_node="">, </span><i data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">Burden</span></i><span data-dcnode-id="3191" instrument_node="">, and </span><i data-dcnode-id="3189"><span data-dcnode-id="3190" instrument_node="">Worry</span></i><span data-dcnode-id="3188" instrument_node="">, respectively.</span></p><span data-dcnode-id="3186" instrument_node="">
</span><h4 data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">Emotion Regulation</span></h4><span data-dcnode-id="3183" instrument_node="">
</span><p class="mb0" data-dcnode-id="3163"><span data-dcnode-id="3182" instrument_node="">We used the German version of the </span><i data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">Cognitive Emotion Regulation Questionnaire</span></i><span data-dcnode-id="3179" instrument_node=""> (CERQ; </span><a data-dcnode-id="3177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="3178" instrument_node="">Garnefski and Spinnhoven, 2006</span></a><span data-dcnode-id="3176" instrument_node="">, German adaptation by </span><a data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B59"><span data-dcnode-id="3175" instrument_node="">Loch et al., 2011</span></a><span data-dcnode-id="3173" instrument_node="">) to assess emotion regulation. Only the subscales that correspond to positive emotion regulation strategies (i.e., “Acceptance,” “Positive Refocusing,” “Refocus on Planning,” “Putting into Perspective,” and “Positive Reappraisal”) (</span><a data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="3172" instrument_node="">Garnefski et al., 2005</span></a><span data-dcnode-id="3170" instrument_node="">) were used for analysis. Cronbach’s alpha for the five subscales was 0.73. Maximum likelihood factor analysis with promax oblique rotation was applied on these five subscales, with one factor extracted based on the results of Horn’s parallel analysis (</span><a data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="3169" instrument_node="">Glorfeld, 1995</span></a><span data-dcnode-id="3167" instrument_node="">). A composite score was derived using the regression scores from the factor analysis, which we labeled as </span><i data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">Positive Emotion Regulation</span></i><span data-dcnode-id="3164" instrument_node="">.</span></p><span data-dcnode-id="3162" instrument_node="">
</span><h4 data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">Social Support</span></h4><span data-dcnode-id="3159" instrument_node="">
</span><p class="mb0" data-dcnode-id="3136"><span data-dcnode-id="3158" instrument_node="">It has been suggested that older adults’ perception of available social support is a stronger predictor of well-being than the actual support they receive (</span><a data-dcnode-id="3156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B3"><span data-dcnode-id="3157" instrument_node="">Auslander and Litwin, 1991</span></a><span data-dcnode-id="3155" instrument_node="">; </span><a data-dcnode-id="3153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B68"><span data-dcnode-id="3154" instrument_node="">Newsom and Schulz, 1996</span></a><span data-dcnode-id="3152" instrument_node="">). To have a measure for both practical and perceived support, we used two subscales of </span><i data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">Fragebogen zur Sozialen Unterstützung</span></i><span data-dcnode-id="3149" instrument_node=""> (</span><i data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">F-SozU</span></i><span data-dcnode-id="3146" instrument_node="">; </span><a data-dcnode-id="3144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B34"><span data-dcnode-id="3145" instrument_node="">Fydrich et al., 2009</span></a><span data-dcnode-id="3143" instrument_node="">) that correspond to the receipt of </span><i data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">Practical Social Support</span></i><span data-dcnode-id="3140" instrument_node=""> (PSS) as well as the personal </span><i data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">Satisfaction with Social Support</span></i><span data-dcnode-id="3137" instrument_node=""> (SSS) received. Cronbach’s alpha for these subscales were 0.82 and 0.65, respectively.</span></p><span data-dcnode-id="3135" instrument_node="">
</span><h4 data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">Future Time Perspective</span></h4><span data-dcnode-id="3132" instrument_node="">
</span><p class="mb0" data-dcnode-id="3118"><span data-dcnode-id="3131" instrument_node="">We used the German version of the 10-item </span><i data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">Future Time Perspective Scale</span></i><span data-dcnode-id="3128" instrument_node=""> (FTP; </span><a data-dcnode-id="3126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B14"><span data-dcnode-id="3127" instrument_node="">Carstensen and Lang, 1996</span></a><span data-dcnode-id="3125" instrument_node="">) to assess perceived limitations on time. Sample items in this scale include: “Many opportunities await me in the future” and “Most of my life (still) lies ahead of me.” Answers were given on a 7-point Likert-type scale, ranging from 1 (</span><i data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">strongly disagree</span></i><span data-dcnode-id="3122" instrument_node="">) to 7 (</span><i data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">strongly agree</span></i><span data-dcnode-id="3119" instrument_node="">). Cronbach’s alpha for this subscale was 0.87.</span></p><span data-dcnode-id="3117" instrument_node="">
</span><h4 data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">Cognition</span></h4><span data-dcnode-id="3114" instrument_node="">
</span><p class="mb0" data-dcnode-id="3070"><span data-dcnode-id="3113" instrument_node="">We chose measures of cognition based on previous research relating top-down emotion regulation to executive functioning (</span><a data-dcnode-id="3111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B70"><span data-dcnode-id="3112" instrument_node="">Ochsner and Gross, 2005</span></a><span data-dcnode-id="3110" instrument_node="">). We derived a score for cognitive and executive function across the domains of speed of processing, attention/vigilance, working memory, and visual learning. For this purpose we used the following tests: (1) Part A and B from the </span><i data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">Trail Making Test</span></i><span data-dcnode-id="3107" instrument_node=""> (TMT; </span><a data-dcnode-id="3105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B77"><span data-dcnode-id="3106" instrument_node="">Reitan, 1992</span></a><span data-dcnode-id="3104" instrument_node="">), the 2-back task from </span><i data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">Testbatterie zur Aufmerksamkeitsprüfung</span></i><span data-dcnode-id="3101" instrument_node=""> (TAP; </span><a data-dcnode-id="3099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B94"><span data-dcnode-id="3100" instrument_node="">Zimmermann and Fimm, 2012</span></a><span data-dcnode-id="3098" instrument_node="">) using mistakes and omissions, and the Simon-effect score (</span><a data-dcnode-id="3096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B83"><span data-dcnode-id="3097" instrument_node="">Simon and Small, 1969</span></a><span data-dcnode-id="3095" instrument_node="">) for working memory; (2) The LPS 4 (subtest 4 of the German intelligence test battery </span><i data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">Leistungsprüfungssystem</span></i><span data-dcnode-id="3092" instrument_node=""> (LPS; </span><a data-dcnode-id="3090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="3091" instrument_node="">Horn, 1983</span></a><span data-dcnode-id="3089" instrument_node="">) for fluid intelligence; (3) The two subscales of the </span><i data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">Regensburger Wortflüssigkeitstest</span></i><span data-dcnode-id="3086" instrument_node=""> (RWT; </span><a data-dcnode-id="3084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B2"><span data-dcnode-id="3085" instrument_node="">Aschenbrenner et al., 2000</span></a><span data-dcnode-id="3083" instrument_node="">) for verbal memory, and a learned sum score of </span><i data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">California Verbal Learning Test</span></i><span data-dcnode-id="3080" instrument_node=""> (CVLT; </span><a data-dcnode-id="3078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B69"><span data-dcnode-id="3079" instrument_node="">Niemann et al., 2008</span></a><span data-dcnode-id="3077" instrument_node="">). Cronbach’s alpha for these subscales was 0.63. We used </span><i data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">Very Simple Structure</span></i><span data-dcnode-id="3074" instrument_node=""> in R in order to screen for the number of factors. The VSS complexity 1 suggested one factor solution with a fit value of 0.75, which was congruent with the number that was suggested by the Velicer Minimum Average Partial (MAP; </span><a data-dcnode-id="3072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B91"><span data-dcnode-id="3073" instrument_node="">Velicer, 1976</span></a><span data-dcnode-id="3071" instrument_node="">) criterion. A composite score was derived for cognitive functioning for each participant using the regression scores from the maximum likelihood factor analysis with a promax oblique rotation.</span></p><span data-dcnode-id="3069" instrument_node="">
</span><h3 data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">Stimuli and Apparatus</span></h3><span data-dcnode-id="3066" instrument_node="">
</span><p class="mb15" data-dcnode-id="3056"><span data-dcnode-id="3065" instrument_node="">Face stimuli were used to measure visual attention to emotional stimuli. These stimuli consisted of high-resolution, front-view photographs of Caucasian faces that were taken from the FACES database</span><sup data-dcnode-id="3061" id="footnotesuper5"><a data-dcnode-id="3064" id="footnote5a"></a><a class="footnoteanchor" data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23footnote5"><span data-dcnode-id="3063" instrument_node="">5</span></a></sup><span data-dcnode-id="3060" instrument_node=""> (</span><a data-dcnode-id="3058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B27"><span data-dcnode-id="3059" instrument_node="">Ebner et al., 2010</span></a><span data-dcnode-id="3057" instrument_node="">). “Happy,” “angry,” “sad,” and “neutral” facial expressions from 144 individuals were randomly selected from a pool of 171 individuals using a customized MATLAB (MathWorks, Natick, MA, United States) script. Two emotional expressions from each of these 144 individuals were again randomly selected for each participant from the pool of 576 pictures (i.e., 4 emotion categories from 144 faces) and presented in a counterbalanced fashion for age (young/middle/old), sex (female/male), emotion type (happy/angry/sad/neutral), and picture presentation position (left/right).</span></p><span data-dcnode-id="3055" instrument_node="">
</span><p class="mb0" data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">Stimuli were presented using Presentation Software (Neurobehavioral Systems Inc., Berkeley, CA, United States). We recorded participants’ left eye movements with a sampling rate of 1,000 Hz using an Eyelink 1,000 eye tracker system (SR Research Ltd., Ottawa, Canada). A chin-rest was used to limit head movements. The stimuli were presented on a 22-inch Ilyama CRT monitor positioned 80 cm away from the participant.</span></p><span data-dcnode-id="3052" instrument_node="">
</span><h3 data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">Task Design and Procedure</span></h3><span data-dcnode-id="3049" instrument_node="">
</span><p class="mb0" data-dcnode-id="3044"><span data-dcnode-id="3048" instrument_node="">Before the recording session, participants performed a 9-point eye calibration test in order to ensure an accurate mapping between the eye orientation and eye tracker measurements. Next, participants were presented with a sequence of face pairs—two pictures of the same person would appear simultaneously on the left and right side of a fixation cross—and were instructed to “view the images naturally as if at home watching television” (</span><a data-dcnode-id="3046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B49"><span data-dcnode-id="3047" instrument_node="">Isaacowitz et al., 2006</span></a><span data-dcnode-id="3045" instrument_node="">). In 144 trials, participants were presented with 10 combinations of facial emotions: 48 trials, in which both faces showed the same emotion (happy–happy, sad–sad, angry–angry, neutral–neutral) and 96 trials, in which the emotion differed between the left and the right face (happy–sad, happy–angry, happy–neutral, neutral–angry, neutral–sad, sad–angry). The latter were counterbalanced for positive–negative, positive–neutral, neutral–negative, and negative–negative contrasts. Each picture (pairing of an individual face and a specific emotion) appeared only once for each participant. Trials, in which both faces showed the same emotion (e.g., happy–happy), were used as filler trials to mask the aim of the study. Each pair was presented for 3,000 ms with a 1,500 ms fixation cross between trials. Participants were tested in a quiet room and left alone during the eye-tracking session.</span></p><span data-dcnode-id="3043" instrument_node="">
</span><h3 data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">Data Analysis</span></h3><span data-dcnode-id="3040" instrument_node="">
</span><p class="mb15" data-dcnode-id="3026"><span data-dcnode-id="3039" instrument_node="">Eye tracker files were processed using customized MATLAB (MathWorks, Natick, MA, United States) scripts, and statistical analyses on the fixations were carried out using the R Software (Version 3.1, </span><a data-dcnode-id="3037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B74"><span data-dcnode-id="3038" instrument_node="">R Development Core Team, 2008</span></a><span data-dcnode-id="3036" instrument_node="">). As a first step, trials with the same emotional expression on both sides were discarded. Since the experimental stimuli were presented in pairs, for the remaining 96 trials of happy–angry, happy–sad, happy–neutral, neutral–sad, neutral–angry, sad–angry face pairs, </span><i data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">Fixation Ratio Scores</span></i><span data-dcnode-id="3033" instrument_node=""> (FRS; </span><a data-dcnode-id="3031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B49"><span data-dcnode-id="3032" instrument_node="">Isaacowitz et al., 2006</span></a><span data-dcnode-id="3030" instrument_node="">) were calculated to assess relative looking patterns on both side of these pairs. We used durations rather than number of fixations, given that this is generally considered to be a better proxy for capturing attentional biases (</span><a data-dcnode-id="3028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B1"><span data-dcnode-id="3029" instrument_node="">Allard and Isaacowitz, 2008</span></a><span data-dcnode-id="3027" instrument_node="">).</span></p><span data-dcnode-id="3025" instrument_node="">
</span><p class="mb15" data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Percent of total fixation duration on each side of face pairs for each contrast were quantified for each participant relative to the total duration of fixations on both pairs for the entire 3,000 ms trial duration, and separately for the first (0–1,500 ms) and second half (1,500–3,000 ms) of the trial duration time. A fixation ratio over 50% would indicate gaze preference toward the more positive face.</span></p><span data-dcnode-id="3022" instrument_node="">
</span><p class="mb15" data-dcnode-id="3007"><span data-dcnode-id="3021" instrument_node="">We carried out two ANOVA analyses to investigate overall age differences: (1) For the entire 3,000 ms trial durations (positivity bias) using a two-way mixed-effects ANOVA with Age Group (younger/older adults) as a between-subject variable, and five emotion contrasts (happy–angry, happy–sad, happy–neutral, neutral–sad, and neutral–angry) as within-subject variables, and percent of total fixation duration on happy (in happy vs. angry/sad/neutral), and neutral (in neutral vs. angry/sad pairings) faces in these contrasts as the dependent variable,</span><sup data-dcnode-id="3017" id="footnotesuper6"><a data-dcnode-id="3020" id="footnote6a"></a><a class="footnoteanchor" data-dcnode-id="3018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23footnote6"><span data-dcnode-id="3019" instrument_node="">6</span></a></sup><span data-dcnode-id="3016" instrument_node=""> (2) by adding time course to the previous analysis: with a 2 (Age Group) × 2 (Time Course: Early/Late Trial Duration) × 5 (Emotion Contrasts) mixed effects ANOVA, in order to examine whether younger and older adults’ gaze preferences for the more positive face were different in late (last 1,500 ms) compared to the early trial periods (first 1,500 ms) (</span><i data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">positivity shifts</span></i><span data-dcnode-id="3013" instrument_node="">).</span><sup data-dcnode-id="3009" id="footnotesuper7"><a data-dcnode-id="3012" id="footnote7a"></a><a class="footnoteanchor" data-dcnode-id="3010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23footnote7"><span data-dcnode-id="3011" instrument_node="">7</span></a></sup><span data-dcnode-id="3008" instrument_node=""> A potential Age Group × Time Course interaction would implicate that the time course of positivity differs between younger and older adults.</span></p><span data-dcnode-id="3006" instrument_node="">
</span><p class="mb15" data-dcnode-id="3001"><span data-dcnode-id="3005" instrument_node="">Next, we quantified an index for positivity shifts for each participant to conduct further analyses. We subtracted the percent of total fixation durations on the “more positive” side (i.e., to happy faces paired with negative and neutral faces, and to neutral faces paired with angry or sad faces) of pairs of the first half (first 1,500 ms) from the second half (last 1,500 ms) of the entire trial duration (3,000 ms). We then quantified individual levels of positivity shift (</span><i data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">the positivity shift index</span></i><span data-dcnode-id="3002" instrument_node="">) by taking the average of these five values, in order to perform regression analyses to examine our hypotheses related to the role of inter-individual differences.</span></p><span data-dcnode-id="3000" instrument_node="">
</span><p class="mb15" data-dcnode-id="2992"><span data-dcnode-id="2999" instrument_node="">We performed two separate analyses on positivity shifts: (1) We tested the moderator role of age on the relationship between the positivity shift and FTP. We used age as a categorical variable interacting with FTP to investigate differential effects of age group with FTP. Predictors were centered (</span><i data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">z</span></i><span data-dcnode-id="2996" instrument_node="">-scored), a method suggested in order to reduce multicollinearity (</span><a data-dcnode-id="2994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B21"><span data-dcnode-id="2995" instrument_node="">Cohen et al., 2003</span></a><span data-dcnode-id="2993" instrument_node="">). Significant interactions were subsequently probed by simple slope analyses.</span></p><span data-dcnode-id="2991" instrument_node="">
</span><p class="mb15" data-dcnode-id="2983"><span data-dcnode-id="2990" instrument_node="">(2) Using multiple regression analysis, we examined how other socioemotional predictors alongside age are associated with positivity shifts. Age was entered in the analyses as a continuous variable interacting with the predictors to capture possible non-linear interactions between age and the predictors. All predictors were again centered before computing the interaction term. </span><i data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">Variance Inflation Factors</span></i><span data-dcnode-id="2987" instrument_node=""> (VIF) and their tolerance indices were used to assess how much the variance of the coefficient estimate is being inflated by multicollinearity. Predictors were again centered (</span><i data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">z</span></i><span data-dcnode-id="2984" instrument_node="">-scored). The VIF scores for the multiple regression analyses were all below five.</span></p><span data-dcnode-id="2982" instrument_node="">
</span><p class="mb15" data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">We first compared two models. In the full model, the positivity shift score was regressed onto age, interacting with stress (lack of resources, burden, worry), FTP, practical social support, satisfaction with social support, positive emotion regulation, cognitive functioning, and well-being. The null model comprised only age as a continuous variable predicting positivity shifts. The reduced model comprised significant primary interactions from the initial model.</span></p><span data-dcnode-id="2979" instrument_node="">
</span><p class="mb0" data-dcnode-id="2964"><span data-dcnode-id="2978" instrument_node="">Pearson’s correlations were used to evaluate the relationships between the study variables in the two age groups separately (see </span><a data-dcnode-id="2976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T2"><span data-dcnode-id="2977" instrument_node="">Table 2</span></a><span data-dcnode-id="2975" instrument_node="">). We used r-to-z transformations to compare correlations between younger and older adults. For all subsequent statistical analyses, we used a two-sided alpha level of 0.05 with 95% confidence intervals, and Cohen’s </span><i data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">d</span></i><span data-dcnode-id="2972" instrument_node=""> or partial eta squared (η</span><i data-dcnode-id="2968"><sub data-dcnode-id="2969"><i data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">p</span></i></sub></i><sup data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">2</span></sup><span data-dcnode-id="2965" instrument_node="">) for measuring the effect size.</span></p><span data-dcnode-id="2963" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2962" id="h4" name="h4"></a><h2 data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">Results</span></h2><span data-dcnode-id="2959" instrument_node="">
</span><h3 class="pt0" data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">Age Group Differences in Gaze Preferences to Face Pairs</span></h3><span data-dcnode-id="2956" instrument_node="">
</span><h4 class="pt0" data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">Positivity Bias</span></h4><span data-dcnode-id="2953" instrument_node="">
</span><p class="mb0" data-dcnode-id="2935"><span data-dcnode-id="2952" instrument_node="">We examined overall age differences in fixation durations on happy and neutral face stimuli (in happy vs. angry/sad/neutral, and neutral vs. angry/sad contrasts) for the entire 3,000 ms trial period (</span><i data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">positivity bias</span></i><span data-dcnode-id="2949" instrument_node="">) using a 2 (Age Group) × 5 (Contrast Type) mixed-effects ANOVA. The main effect of age group was not significant, </span><i data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">F</span></i><span data-dcnode-id="2946" instrument_node="">(1, 127) = 0.45, </span><i data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">p</span></i><span data-dcnode-id="2943" instrument_node=""> = 0.502, η</span><i data-dcnode-id="2939"><sub data-dcnode-id="2940"><i data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">p</span></i></sub></i><sup data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">2</span></sup><span data-dcnode-id="2936" instrument_node=""> = 0.00, indicating no overall significant age difference between younger and older adults’ preferences to more positive stimuli when the entire 3 s trial period was considered.</span></p><span data-dcnode-id="2934" instrument_node="">
</span><h4 data-dcnode-id="2932"><span data-dcnode-id="2933" instrument_node="">Positivity Shifts</span></h4><span data-dcnode-id="2931" instrument_node="">
</span><p class="mb0" data-dcnode-id="2849"><span data-dcnode-id="2930" instrument_node="">Fixation durations on the more positive side of the five contrasts in late compared to the early trial periods examined by 2 × 2 × 5 mixed-effects ANOVA revealed a significant interaction between Age Group × Time Course, </span><i data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">F</span></i><span data-dcnode-id="2927" instrument_node="">(1, 127) = 4.68, </span><i data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">p</span></i><span data-dcnode-id="2924" instrument_node=""> = 0.032, η</span><i data-dcnode-id="2920"><sub data-dcnode-id="2921"><i data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">p</span></i></sub></i><sup data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">2</span></sup><span data-dcnode-id="2917" instrument_node=""> = 0.03, and between Age Group × Contrast Type, </span><i data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">F</span></i><span data-dcnode-id="2914" instrument_node="">(4, 1,018) = 5.65, </span><i data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">p</span></i><span data-dcnode-id="2911" instrument_node=""> &lt; 0.001, η</span><i data-dcnode-id="2907"><sub data-dcnode-id="2908"><i data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">p</span></i></sub></i><sup data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">2</span></sup><span data-dcnode-id="2904" instrument_node=""> = 0.02 (see </span><a data-dcnode-id="2902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F1"><span data-dcnode-id="2903" instrument_node="">Figure 1</span></a><span data-dcnode-id="2901" instrument_node="">). </span><i data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">Post-hoc</span></i><span data-dcnode-id="2898" instrument_node=""> pairwise Tukey </span><i data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">t</span></i><span data-dcnode-id="2895" instrument_node="">-tests showed that the fixation durations on more positive stimuli in late (</span><i data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">M</span></i><span data-dcnode-id="2892" instrument_node=""> = 56.7, </span><i data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">SD</span></i><span data-dcnode-id="2889" instrument_node=""> = 1.64) compared to early trials (</span><i data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">M</span></i><span data-dcnode-id="2886" instrument_node=""> = 52, </span><i data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">SD</span></i><span data-dcnode-id="2883" instrument_node=""> = 1.19) were significantly different in older adults </span><i data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">t</span></i><span data-dcnode-id="2880" instrument_node="">(127) = −4.11, </span><i data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">p</span></i><span data-dcnode-id="2877" instrument_node=""> &lt; 0.001, </span><i data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">d</span></i><span data-dcnode-id="2874" instrument_node=""> = 0.58, but not in younger adults (early </span><i data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">M</span></i><span data-dcnode-id="2871" instrument_node=""> = 51.7, </span><i data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">SD</span></i><span data-dcnode-id="2868" instrument_node=""> = 0.72, late </span><i data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">M</span></i><span data-dcnode-id="2865" instrument_node=""> = 53.5, </span><i data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">SD</span></i><span data-dcnode-id="2862" instrument_node=""> = 1.22), </span><i data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">t</span></i><span data-dcnode-id="2859" instrument_node="">(127) = −1.41, </span><i data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">p</span></i><span data-dcnode-id="2856" instrument_node=""> = 0.493, </span><i data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">d</span></i><span data-dcnode-id="2853" instrument_node=""> = 0.17, indicating that older adults’ fixations on more positive faces increased in the late trial period. Although we were mainly interested in overall age-related differences in positivity in early and late trials, we also examined the interaction between Age-group × Contrast, however, we found no age-group differences for any relevant contrast for the two age groups. The Age Group × Time Course × Contrast Type was not significant (</span><i data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">p</span></i><span data-dcnode-id="2850" instrument_node=""> = 0.718).</span></p><span data-dcnode-id="2848" instrument_node="">

</span><h4 data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">Fixation Durations on Sad vs. Angry Faces in Early/Late Trial Periods</span></h4><span data-dcnode-id="2821" instrument_node="">
</span><p class="mb0" data-dcnode-id="2780"><span data-dcnode-id="2820" instrument_node="">Age differences in gaze preferences to sad vs. angry face stimuli in late compared to early trial durations were examined using a two-way mixed-design ANOVA, with Age Group (younger/older adults) as the between-subject factor, Time Course (early/late) as within-subject factor, and percent of total fixation duration on sad faces as the dependent variable. This analysis revealed a significant main effect of Time Course, </span><i data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">F</span></i><span data-dcnode-id="2817" instrument_node="">(1, 252) = 6.98, </span><i data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">p</span></i><span data-dcnode-id="2814" instrument_node=""> = 0.008, η</span><i data-dcnode-id="2810"><sub data-dcnode-id="2811"><i data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">p</span></i></sub></i><sup data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">2</span></sup><span data-dcnode-id="2807" instrument_node=""> = 0.02. Age Group, </span><i data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">F</span></i><span data-dcnode-id="2804" instrument_node="">(1, 252) = 2.88, </span><i data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">p</span></i><span data-dcnode-id="2801" instrument_node=""> = 0.090, η</span><i data-dcnode-id="2797"><sub data-dcnode-id="2798"><i data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">p</span></i></sub></i><sup data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">2</span></sup><span data-dcnode-id="2794" instrument_node=""> = 0.01, and the interaction between Age Group × Time Course, </span><i data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">F</span></i><span data-dcnode-id="2791" instrument_node="">(1, 252) = 2.98, </span><i data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">p</span></i><span data-dcnode-id="2788" instrument_node=""> = 0.085, η</span><i data-dcnode-id="2784"><sub data-dcnode-id="2785"><i data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">p</span></i></sub></i><sup data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">2</span></sup><span data-dcnode-id="2781" instrument_node=""> = 0.01, were not statistically significant.</span></p><span data-dcnode-id="2779" instrument_node="">
</span><h4 data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">Fixation Durations on Upper or Lower Parts of Faces</span></h4><span data-dcnode-id="2776" instrument_node="">
</span><p class="mb0" data-dcnode-id="2756"><span data-dcnode-id="2775" instrument_node="">We tested whether younger and older adults showed differences in attending to upper (i.e., toward the eye region of faces) or lower part (i.e., more mouth region of the face) of facial stimuli. Younger adults had overall longer durations of fixations on the upper part of faces than older adults, </span><i data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">t</span></i><span data-dcnode-id="2772" instrument_node="">(92) = 2.77, </span><i data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">p</span></i><span data-dcnode-id="2769" instrument_node=""> = 0.006. A two-way mixed-design ANOVA, with Age Group (younger/older adults) as the between-subject factor, four emotion categories (happy/sad/angry/neutral) as within-subject factor, and percent of total fixation duration on the upper part of these four emotional expressions as the dependent variable showed that the effect of the age group was significant, [</span><i data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">F</span></i><span data-dcnode-id="2766" instrument_node="">(1, 3) = 37.73, </span><i data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">p</span></i><span data-dcnode-id="2763" instrument_node=""> &lt; 0.001], indicating that older adults’ fixations on lower part of faces were significantly longer across happy, sad, angry, and neutral faces. Linear regression analysis where positivity shifts were regressed onto percentage of fixation durations on upper part of faces in interaction with the age group was not statistically significant [</span><i data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">F</span></i><span data-dcnode-id="2760" instrument_node="">(2, 126) = 1.67, </span><i data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">p</span></i><span data-dcnode-id="2757" instrument_node=""> = 0.192], indicating that fixation durations on upper or lower parts of faces were not significantly associated with positivity shifts in neither group.</span></p><span data-dcnode-id="2755" instrument_node="">
</span><h3 data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">Moderating Role of Age for the Relationship Between Positivity Shift and FTP</span></h3><span data-dcnode-id="2752" instrument_node="">
</span><p class="mb0" data-dcnode-id="2702"><span data-dcnode-id="2751" instrument_node="">We examined whether the relationship between positivity shifts and FTP is moderated by age. Positivity shift scores were regressed onto FTP, Age Group, and the interaction between FTP and Age Group. Age Group, (</span><i data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">b</span></i><span data-dcnode-id="2748" instrument_node=""> = 4.17, </span><i data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">SEb</span></i><span data-dcnode-id="2745" instrument_node=""> = 1.73, β = 0.26, </span><i data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">p</span></i><span data-dcnode-id="2742" instrument_node=""> = 0.017), and FTP, (</span><i data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">b</span></i><span data-dcnode-id="2739" instrument_node=""> = 0.44, </span><i data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">SEb</span></i><span data-dcnode-id="2736" instrument_node=""> = 0.44, β = 0.64, </span><i data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">p</span></i><span data-dcnode-id="2733" instrument_node=""> &lt; 0.001) showed significant main effects, qualified by a significant interaction between FTP × Age Group (</span><i data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">b</span></i><span data-dcnode-id="2730" instrument_node=""> = -0.63, </span><i data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">SEb</span></i><span data-dcnode-id="2727" instrument_node=""> = 0.15, β = -0.61, </span><i data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">p</span></i><span data-dcnode-id="2724" instrument_node=""> &lt; 0.001), indicating that FTP’s association with positivity shifts was positive in younger (</span><i data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">b</span></i><span data-dcnode-id="2721" instrument_node=""> = 0.44, </span><i data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">SEb</span></i><span data-dcnode-id="2718" instrument_node=""> = 0.11, </span><i data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">p</span></i><span data-dcnode-id="2715" instrument_node=""> &lt; 0.001), and negative in older adults (</span><i data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">b</span></i><span data-dcnode-id="2712" instrument_node=""> = -0.19, </span><i data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">SEb</span></i><span data-dcnode-id="2709" instrument_node=""> = 0.10, </span><i data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">p</span></i><span data-dcnode-id="2706" instrument_node=""> = 0.061) (see </span><a data-dcnode-id="2704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F2"><span data-dcnode-id="2705" instrument_node="">Figure 2</span></a><span data-dcnode-id="2703" instrument_node="">).</span></p><span data-dcnode-id="2701" instrument_node="">

</span><p class="mb15 w100pc float_left mt15" data-dcnode-id="2639"><span data-dcnode-id="2679" instrument_node="">To test whether FTP might have different meanings across age, we additionally examined correlations between our predictors (see </span><a data-dcnode-id="2677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T2"><span data-dcnode-id="2678" instrument_node="">Table 2</span></a><span data-dcnode-id="2676" instrument_node="">). Comparing correlations using r-to-z transformation, we assessed whether the correlation between FTP and socioemotional functioning variables (e.g., well-being, and worry) differ in magnitude in the younger and in the older adults. FTP was positively associated with well-being levels in the younger, and negatively in the older adults (Younger: </span><i data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">r</span></i><span data-dcnode-id="2673" instrument_node=""> = 0.47, </span><i data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">p</span></i><span data-dcnode-id="2670" instrument_node=""> &lt; 0.001, Older: </span><i data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">r</span></i><span data-dcnode-id="2667" instrument_node=""> = 0.16, </span><i data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">p</span></i><span data-dcnode-id="2664" instrument_node=""> = 0.19, r-to-z value: </span><i data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">z</span></i><span data-dcnode-id="2661" instrument_node=""> = 1.95, </span><i data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">p</span></i><span data-dcnode-id="2658" instrument_node=""> = 0.02). FTP’s association to worry also differed between the younger and older adults (Younger: </span><i data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">r</span></i><span data-dcnode-id="2655" instrument_node=""> = -0.31, </span><i data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">p</span></i><span data-dcnode-id="2652" instrument_node=""> &lt; 0.01, Older: </span><i data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">r</span></i><span data-dcnode-id="2649" instrument_node=""> = 0.11, </span><i data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">p</span></i><span data-dcnode-id="2646" instrument_node=""> = 0.41, r-to-z value: </span><i data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">z</span></i><span data-dcnode-id="2643" instrument_node=""> = −2.36, </span><i data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">p</span></i><span data-dcnode-id="2640" instrument_node=""> &lt; 0.001).</span></p><span data-dcnode-id="2638" instrument_node="">
</span><h3 data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">The Role of Inter-individual Differences in Positivity Shifts</span></h3><span data-dcnode-id="2635" instrument_node="">
</span><p class="mb0" data-dcnode-id="2595"><span data-dcnode-id="2634" instrument_node="">To examine whether predictors related to socioemotional functioning that we measured alongside age are associated with positivity shifts, multiple regression analyses were performed. To test the significance of the predictors as a whole, we compared the fit of the full model (where the positivity shift score was regressed onto age, lack of resources, burden, worry, FTP, practical social support, satisfaction with social support, positive emotion regulation, cognitive functioning, and well-being) with that of the null model comprising only age. Age was entered as a continuous variable in interaction with the other predictors to examine whether within group differences in predictors differentially relate to positivity shifts across age. Overall, the comparison of the full model with all the predictors to the null model that comprised only age was significant [</span><i data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">F</span></i><span data-dcnode-id="2631" instrument_node="">(19, 93) = 1.97, </span><i data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">p</span></i><span data-dcnode-id="2628" instrument_node=""> = 0.019]. The full model revealed a significant regression equation [</span><i data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">F</span></i><span data-dcnode-id="2625" instrument_node="">(19, 93) = 2.09, </span><i data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">R</span></i><sup data-dcnode-id="2621"><span data-dcnode-id="2622" instrument_node="">2</span></sup><span data-dcnode-id="2620" instrument_node=""> = 0.29, </span><i data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">p</span></i><span data-dcnode-id="2617" instrument_node=""> = 0.010]. Age and FTP showed a significant interaction (</span><i data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">b</span></i><span data-dcnode-id="2614" instrument_node=""> = -0.01, </span><i data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">SEb</span></i><span data-dcnode-id="2611" instrument_node=""> = 0.00, </span><i data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">p</span></i><span data-dcnode-id="2608" instrument_node=""> &lt; 0.001). Non-significant interactions from the full model were removed to form the reduced model which comprised Age and FTP interaction, and the remaining predictors. Along with a significant Age and FTP interaction, worry had a significant effect (</span><i data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">b</span></i><span data-dcnode-id="2605" instrument_node=""> = −1.99, </span><i data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">SEb</span></i><span data-dcnode-id="2602" instrument_node=""> = 0.92, </span><i data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">p</span></i><span data-dcnode-id="2599" instrument_node=""> = 0.034), indicating a negative association with positivity shifts across age (for full and reduced models see </span><a data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T3"><span data-dcnode-id="2598" instrument_node="">Table 3</span></a><span data-dcnode-id="2596" instrument_node="">).</span></p><span data-dcnode-id="2594" instrument_node="">

</span><img alt="www.frontiersin.org" data-dcnode-id="2586" id="T3" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/567133/fpsyg-11-567133-HTML/image_t/fpsyg-11-567133-t003.gif&amp;raw"></a><span data-dcnode-id="2584" instrument_node="">
