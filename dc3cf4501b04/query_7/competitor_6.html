</span><meta content="Aging has been associated with a motivational shift to positive over negative information, which is often explained by a limited future time perspective (FTP) within the framework of socioemotional selectivity theory (SST). However, whether a limited FTP functions similarly in younger and older adults, and whether inter-individual differences in socioemotional functioning are similarly associated with preference for positive information (i.e., positivity) in both groups is still not clear. We investigated younger (20 to 35 years, N = 73) and older (60 to 75 years, N = 56) adults’ gaze preferences on pairs of happy, angry, sad, and neutral faces using an eye-tracking system. While we found no age-related differences in positivity when the entire trial duration was considered, older adults showed longer fixations on the more positive face in later stages of processing (positivity shifts). This allocation of resources towards more positive stimuli might serve an emotion regulatory purpose and seems consistent with the SST. However, our findings suggest that FTP differentially relates to positivity such that the relationship between FTP and positivity was negative in older, and positive in younger adults. Furthermore, our explanatory analyses showed that between-person differences in positivity and FTP differentially relate to proxies of socioemotional functioning such as stress, social support, cognitive functioning, emotion regulation, and well-being across age. In conclusion, we confirm the existence of positivity effect, and show a differential relevance of FTP for positivity in younger and older adults stemming from a differential meaning of FTP construct across age." data-dcnode-id="4698" name="citation_abstract"><span data-dcnode-id="4697" instrument_node="">

</span><div class="atButton" data-dcnode-id="3858"><span data-dcnode-id="3867" instrument_node="">
</span><a addthis:description="Aging has been associated with a motivational shift to positive over negative information (i.e., positivity effect), which is often explained by a limited future time perspective (FTP) within the framework of socioemotional selectivity theory (SST). However, whether a limited FTP functions similarly in younger and older adults, and whether inter-individual differences in socioemotional functioning are similarly associated with preference for positive information (i.e., positivity) is still not clear. We investigated younger (20–35 years, N = 73) and older (60–75 years, N = 56) adults’ gaze preferences on pairs of happy, angry, sad, and neutral faces using an eye-tracking system. We additionally assessed several parameters potentially underlying inter-individual differences in emotion processing such as FTP, stress, cognitive functioning, social support, emotion regulation, and well-being. While we found no age-related differences in positivity when the entire trial duration was considered, older adults showed longer fixations on the more positive face in later stages of processing (i.e., positivity shifts). This allocation of resources toward more positive stimuli might serve an emotion regulatory purpose and seems consistent with the SST. However, our findings suggest that age moderates the relationship between FTP and positivity shifts, such that the relationship between FTP and positivity preferences was negative in older, and positive in younger adults, potentially ste..." addthis:title="Positivity in Younger and in Older Age: Associations With Future Time Perspective and Socioemotional Functioning" addthis:url="https://www.frontiersin.org/article/10.3389/fpsyg.2020.567133" class="addthis_button_facebook at300b" data-dcnode-id="3860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html" title="Facebook"><span class="at-icon-wrapper" data-dcnode-id="3861" </span><li data-dcnode-id="3662"><span data-dcnode-id="3664"><sup data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">2</span></sup></span><span data-dcnode-id="3663" instrument_node="">MindBrainBody Institute at the Berlin School of Mind and Brain, Humboldt-Universität zu Berlin, Berlin, Germany</span></li><span data-dcnode-id="3661" instrument_node="">
</span><li data-dcnode-id="3656"><span data-dcnode-id="3658"><sup data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">3</span></sup></span><span data-dcnode-id="3657" instrument_node="">International Max Planck Research School on the Life Course, Max Planck Institute for Human Development, Berlin, Germany</span></li><span data-dcnode-id="3655" instrument_node="">
</span><li data-dcnode-id="3650"><span data-dcnode-id="3652"><sup data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">4</span></sup></span><span data-dcnode-id="3651" instrument_node="">Lifespan Developmental Neuroscience, Technische Universität Dresden, Dresden, Germany</span></li><span data-dcnode-id="3649" instrument_node="">
</span><li data-dcnode-id="3644"><span data-dcnode-id="3646"><sup data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">5</span></sup></span><span data-dcnode-id="3645" instrument_node="">International Max Planck Research School NeuroCom, Leipzig, Germany</span></li><span data-dcnode-id="3643" instrument_node="">
</span><li data-dcnode-id="3638"><span data-dcnode-id="3640"><sup data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">6</span></sup></span><span data-dcnode-id="3639" instrument_node="">Department of Education and Psychology, Center for Cognitive Neuroscience Berlin, Freie Universität Berlin, Berlin, Germany</span></li><span data-dcnode-id="3637" instrument_node="">
</span><li data-dcnode-id="3632"><span data-dcnode-id="3634"><sup data-dcnode-id="3635"><span data-dcnode-id="3636" instrument_node="">7</span></sup></span><span data-dcnode-id="3633" instrument_node="">Department of Psychology, Humboldt-Universität zu Berlin, Berlin, Germany</span></li><span data-dcnode-id="3631" instrument_node="">
</span><li data-dcnode-id="3626"><span data-dcnode-id="3628"><sup data-dcnode-id="3629"><span data-dcnode-id="3630" instrument_node="">8</span></sup></span><span data-dcnode-id="3627" instrument_node="">Department of Cognitive Neurology, Leipzig University Hospital, Leipzig, Germany</span></li><span data-dcnode-id="3625" instrument_node="">
</span></ul><span data-dcnode-id="3623" instrument_node="">
</span><p class="mb0" data-dcnode-id="3609"><span data-dcnode-id="3622" instrument_node="">Aging has been associated with a motivational shift to positive over negative information (i.e., positivity effect), which is often explained by a limited future time perspective (FTP) within the framework of socioemotional selectivity theory (SST). However, whether a limited FTP functions similarly in younger and older adults, and whether inter-individual differences in socioemotional functioning are similarly associated with preference for positive information (i.e., positivity) is still not clear. We investigated younger (20–35 years, </span><i data-dcnode-id="3620"><span data-dcnode-id="3621" instrument_node="">N</span></i><span data-dcnode-id="3619" instrument_node=""> = 73) and older (60–75 years, </span><i data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">N</span></i><span data-dcnode-id="3616" instrument_node=""> = 56) adults’ gaze preferences on pairs of happy, angry, sad, and neutral faces using an eye-tracking system. We additionally assessed several parameters potentially underlying inter-individual differences in emotion processing such as FTP, stress, cognitive functioning, social support, emotion regulation, and well-being. While we found no age-related differences in positivity when the entire trial duration was considered, older adults showed longer fixations on the more positive face in later stages of processing (i.e., </span><i data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">positivity shifts</span></i><span data-dcnode-id="3613" instrument_node="">). This allocation of resources toward more positive stimuli might serve an emotion regulatory purpose and seems consistent with the SST. However, our findings suggest that age moderates the relationship between FTP and positivity shifts, such that the relationship between FTP and positivity preferences was negative in older, and positive in younger adults, potentially stemming from an age-related differential meaning of the FTP construct across age. Furthermore, our exploratory analyses showed that along with the age and FTP interaction, lower levels of worry also played a significant role in positivity shifts. We conclude that positivity effects cannot be solely explained by aging, or the associated reduced FTP </span><i data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">per se</span></i><span data-dcnode-id="3610" instrument_node="">, but is rather determined by a complex interplay of psychosocial and emotional features.</span></p><span data-dcnode-id="3608" instrument_node="">
</span><div class="clear" data-dcnode-id="3607"></div><span data-dcnode-id="3606" instrument_node="">

</span><a class="reset-hash-position" data-dcnode-id="3602" id="h2" name="h2"></a><h2 data-dcnode-id="3600"><span data-dcnode-id="3601" instrument_node="">Introduction</span></h2><span data-dcnode-id="3599" instrument_node="">
</span><p class="mb15" data-dcnode-id="3567"><span data-dcnode-id="3598" instrument_node="">Late adulthood has been characterized in several studies by increased emotional stability and emotional well-being in comparison to early adulthood (</span><a data-dcnode-id="3596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B16"><span data-dcnode-id="3597" instrument_node="">Carstensen et al., 2000</span></a><span data-dcnode-id="3595" instrument_node="">, </span><a data-dcnode-id="3593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B17"><span data-dcnode-id="3594" instrument_node="">2011</span></a><span data-dcnode-id="3592" instrument_node="">). For instance, in a cross-sectional study of younger and older adults, the oldest age group (45–75 years old) reported having the most positive, along with the least negative affect (</span><a data-dcnode-id="3590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B66"><span data-dcnode-id="3591" instrument_node="">Mroczek and Kolarz, 1998</span></a><span data-dcnode-id="3589" instrument_node="">). Furthermore, in several experimental settings, older adults were shown to display more attention and memory for positive and less for negative stimuli compared to younger adults (</span><a data-dcnode-id="3587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B61"><span data-dcnode-id="3588" instrument_node="">Mather and Carstensen, 2003</span></a><span data-dcnode-id="3586" instrument_node="">, </span><a data-dcnode-id="3584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B62"><span data-dcnode-id="3585" instrument_node="">2005</span></a><span data-dcnode-id="3583" instrument_node="">; </span><a data-dcnode-id="3581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="3582" instrument_node="">Knight et al., 2007</span></a><span data-dcnode-id="3580" instrument_node="">; </span><a data-dcnode-id="3578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B1"><span data-dcnode-id="3579" instrument_node="">Allard and Isaacowitz, 2008</span></a><span data-dcnode-id="3577" instrument_node="">). This age-group difference in greater preference for positive over negative information in information processing has been named the </span><i data-dcnode-id="3575"><span data-dcnode-id="3576" instrument_node="">positivity effect</span></i><span data-dcnode-id="3574" instrument_node="">, and it is assumed to play an important role in emotional functioning and well-being of the elderly (</span><a data-dcnode-id="3572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B15"><span data-dcnode-id="3573" instrument_node="">Carstensen and Mikels, 2005</span></a><span data-dcnode-id="3571" instrument_node="">; </span><a data-dcnode-id="3569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B75"><span data-dcnode-id="3570" instrument_node="">Reed and Carstensen, 2012</span></a><span data-dcnode-id="3568" instrument_node="">).</span></p><span data-dcnode-id="3566" instrument_node="">
</span><p class="mb15" data-dcnode-id="3564"><span data-dcnode-id="3565" instrument_node="">While the positivity effect has been extensively studied and replicated in many studies, and has been recognized as an important cornerstone to explain emotional development across the life span, some questions continue to be debated: These concern (i) the reliability of the effect and the conditions for its occurrence, (ii) its grounding in theory, and (iii) potential factors modulating increased attention to positive information.</span></p><span data-dcnode-id="3563" instrument_node="">
</span><p class="mb15" data-dcnode-id="3537"><span data-dcnode-id="3562" instrument_node="">Regarding the reliability of the positivity effect, several authors have pointed to a lack of consistency (</span><a data-dcnode-id="3560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="3561" instrument_node="">Grühn et al., 2005</span></a><span data-dcnode-id="3559" instrument_node="">). Mixed findings were mostly attributed to differences in study paradigms, suggesting that the positivity effect is more likely to emerge when participants are free of explicit cognitive demands and can allocate their attention to stimuli at their leisure (</span><a data-dcnode-id="3557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B76"><span data-dcnode-id="3558" instrument_node="">Reed et al., 2014</span></a><span data-dcnode-id="3556" instrument_node="">). Attentional deployment, which denotes diverting attention from or reallocating attention to specific aspects of emotional stimuli, has been suggested to be an emotion regulation strategy according to theories on emotion regulation (</span><a data-dcnode-id="3554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="3555" instrument_node="">Gross, 1999</span></a><span data-dcnode-id="3553" instrument_node="">). Previous studies have indicated that attentional deployment is more often used by older rather than by younger adults as an emotion regulatory tool (</span><a data-dcnode-id="3551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B60"><span data-dcnode-id="3552" instrument_node="">Lohani and Isaacowitz, 2014</span></a><span data-dcnode-id="3550" instrument_node="">). Eye tracking allows direct and continuous assessments of fixations, and is a useful method for a fine-grained measure of early and sustained attention (</span><a data-dcnode-id="3548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B90"><span data-dcnode-id="3549" instrument_node="">Vazquez et al., 2016</span></a><span data-dcnode-id="3547" instrument_node="">). For instance, studies using eye tracking have shown that older adults display positivity especially in later stages of processing (e.g., </span><a data-dcnode-id="3545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="3546" instrument_node="">Isaacowitz et al., 2009</span></a><span data-dcnode-id="3544" instrument_node="">; </span><a data-dcnode-id="3542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B58"><span data-dcnode-id="3543" instrument_node="">Lee and Knight, 2009</span></a><span data-dcnode-id="3541" instrument_node="">). Delayed onset of positivity (i.e., shifting attention toward positive and away from negative stimuli) would be consistent with an allocation of resources serving an emotion regulatory purpose, supporting the thesis that older adults with higher executive functioning show greater positivity in information processing (</span><a data-dcnode-id="3539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B63"><span data-dcnode-id="3540" instrument_node="">Mather and Knight, 2005</span></a><span data-dcnode-id="3538" instrument_node="">).</span></p><span data-dcnode-id="3536" instrument_node="">
</span><p class="mb15" data-dcnode-id="3528"><span data-dcnode-id="3535" instrument_node="">Moreover, studies using eye tracking have shown that older adults tend to focus on mouth regions, whereas younger adults spend more time looking at the eye regions, which is more informative in recognizing negative expressions (</span><a data-dcnode-id="3533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B86"><span data-dcnode-id="3534" instrument_node="">Sullivan et al., 2007</span></a><span data-dcnode-id="3532" instrument_node="">). In line with this, older adults were shown to perform worse at recognizing emotions such as anger, sadness and fear, but show no consistent difficulties in recognizing emotions such as happiness, surprise and disgust (</span><a data-dcnode-id="3530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="3531" instrument_node="">Isaacowitz et al., 2007</span></a><span data-dcnode-id="3529" instrument_node="">). This brings us to question whether the positivity effect observed in older age arise from a differentiation in focusing on different regions of faces. Investigating gaze preferences on face stimuli might help answer whether older adults who look more at the mouth regions are the ones who show more positivity effect in general.</span></p><span data-dcnode-id="3527" instrument_node="">
</span><p class="mb15" data-dcnode-id="3504"><span data-dcnode-id="3526" instrument_node="">Regarding the conceptual grounding, the positivity effect is often explained in the framework of socioemotional selectivity theory (SST; </span><a data-dcnode-id="3524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B13"><span data-dcnode-id="3525" instrument_node="">Carstensen et al., 1999</span></a><span data-dcnode-id="3523" instrument_node="">), a life-span theory which posits that human priorities shift with changes in perceived time horizons. When people perceive their remaining lifetime as limited, they tend to prioritize present goals such as optimizing well-being over future-oriented goals such as acquiring knowledge (</span><a data-dcnode-id="3521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B19"><span data-dcnode-id="3522" instrument_node="">Charles and Carstensen, 2010</span></a><span data-dcnode-id="3520" instrument_node="">). Favoring positive over negative stimuli in information processing has been suggested to reflect a goal-directed, top-down regulatory effort for optimizing emotional experience (</span><a data-dcnode-id="3518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B75"><span data-dcnode-id="3519" instrument_node="">Reed and Carstensen, 2012</span></a><span data-dcnode-id="3517" instrument_node="">). Consistent with the proposal that a limited future time perspective (FTP) drives the positivity effect, </span><a data-dcnode-id="3515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B51"><span data-dcnode-id="3516" instrument_node="">Kellough and Knight (2012)</span></a><span data-dcnode-id="3514" instrument_node=""> found that imagining an open-ended FTP reduced positivity in older adults’ perception of emotions. Interestingly, however, imagining a limited FTP did not lead to a change in younger adults’ interpretations of emotions in this study. This raises the question whether the theory only consistently applies to older adults. According to the SST, it is the perceived remaining life time—rather than the age </span><i data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">per se</span></i><span data-dcnode-id="3511" instrument_node="">—that drives the differences in motivation for optimizing emotional experience. However, perceiving future life time as limited might have different meanings for different age groups. The self-report FTP questionnaire (</span><a data-dcnode-id="3509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B14"><span data-dcnode-id="3510" instrument_node="">Carstensen and Lang, 1996</span></a><span data-dcnode-id="3508" instrument_node="">) involves items such as “Many opportunities lie ahead of me in the future.” A person’s only weak support for such a statement might indicate a more realistic (for an older person), or a pessimistic attitude (for a younger person), depending on one’s age. The idea that perceiving future life time as limited might have different meanings for different age groups is not explicitly discussed in positivity effect research (within the framework of SST), although this might be a potential qualifier to the theory (</span><a data-dcnode-id="3506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="3507" instrument_node="">Grühn et al., 2016</span></a><span data-dcnode-id="3505" instrument_node="">). Although FTP has been the most relevant construct in explaining age differences in the positivity effect, questions such as whether a top-down, motivated attention to positive information would be similarly linked to a limited FTP in younger and in older adults, and whether any potential differences can be explained by differences in socioemotional functioning remain open.</span></p><span data-dcnode-id="3503" instrument_node="">
</span><p class="mb0" data-dcnode-id="3444"><span data-dcnode-id="3502" instrument_node="">Finally, based on the premise that age alone is not a sufficient causal factor for psychological processes (e.g., </span><a data-dcnode-id="3500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="3501" instrument_node="">Baltes and Lang, 1997</span></a><span data-dcnode-id="3499" instrument_node="">; </span><a data-dcnode-id="3497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B6"><span data-dcnode-id="3498" instrument_node="">Baltes et al., 2006</span></a><span data-dcnode-id="3496" instrument_node="">), we reasoned that inter-individual differences in abilities, resources, or emotional states might contribute to an individual’s top-down motivation for positive stimuli. In light of previous research, we examined several socioemotional factors alongside age that might be relevant for the positivity effect. One such factor that has been implicated to influence top-down positivity in information processing is cognitive functioning (</span><a data-dcnode-id="3494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B63"><span data-dcnode-id="3495" instrument_node="">Mather and Knight, 2005</span></a><span data-dcnode-id="3493" instrument_node="">; </span><a data-dcnode-id="3491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B75"><span data-dcnode-id="3492" instrument_node="">Reed and Carstensen, 2012</span></a><span data-dcnode-id="3490" instrument_node="">). Another potential factor might be </span><i data-dcnode-id="3488"><span data-dcnode-id="3489" instrument_node="">stress</span></i><span data-dcnode-id="3487" instrument_node="">. Compared to younger adults, older adults experience fewer interpersonal tensions (</span><a data-dcnode-id="3485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="3486" instrument_node="">Birditt et al., 2005</span></a><span data-dcnode-id="3484" instrument_node="">), report fewer daily stressors (</span><a data-dcnode-id="3482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B20"><span data-dcnode-id="3483" instrument_node="">Charles et al., 2010</span></a><span data-dcnode-id="3481" instrument_node="">), and avoid negative stimuli during acute stress (</span><a data-dcnode-id="3479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B28"><span data-dcnode-id="3480" instrument_node="">Ellenbogen et al., 2002</span></a><span data-dcnode-id="3478" instrument_node="">). Furthermore, studies on emotion regulation have shown that older adults are more likely to use distraction (</span><a data-dcnode-id="3476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B80"><span data-dcnode-id="3477" instrument_node="">Scheibe et al., 2015</span></a><span data-dcnode-id="3475" instrument_node="">), and avoid distressing situations or appraise unavoidable situations as less severe (</span><a data-dcnode-id="3473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B84"><span data-dcnode-id="3474" instrument_node="">Stawski et al., 2008</span></a><span data-dcnode-id="3472" instrument_node="">). Increased motivation for positive information, and avoiding stressful/negative situations might be related to the same underlying emotion regulatory mechanism. However, although the positivity effect is assumed to have an emotion regulatory role, how individual differences in emotion regulation and chronic stress relates to differences in positivity in emotion processing is not known. Availability of </span><i data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">social support</span></i><span data-dcnode-id="3469" instrument_node=""> might also be a relevant factor for positivity. Focusing primarily on positive information would not be an evolutionarily adaptive mechanism, as detecting negative information is necessary to deal with potential threat or danger (</span><a data-dcnode-id="3467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B57"><span data-dcnode-id="3468" instrument_node="">LeDoux, 1995</span></a><span data-dcnode-id="3466" instrument_node="">). Older adults do not show positivity in situations where avoiding the negative might have detrimental effects on their well-being (</span><a data-dcnode-id="3464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="3465" instrument_node="">English, 2012</span></a><span data-dcnode-id="3463" instrument_node="">; </span><a data-dcnode-id="3461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B75"><span data-dcnode-id="3462" instrument_node="">Reed and Carstensen, 2012</span></a><span data-dcnode-id="3460" instrument_node="">). Negative stimuli or outcomes can more easily be dealt with in a group or with </span><i data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">perceived</span></i><span data-dcnode-id="3457" instrument_node=""> assistance from one’s peers, and lack of social support might make negative effects more apparent for some older adults (</span><a data-dcnode-id="3455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B79"><span data-dcnode-id="3456" instrument_node="">Russell and Cutrona, 1991</span></a><span data-dcnode-id="3454" instrument_node="">; </span><a data-dcnode-id="3452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="3453" instrument_node="">Dalgard et al., 1995</span></a><span data-dcnode-id="3451" instrument_node="">). Therefore, a person who lacks social support might be more primed than others to focus more on the negative (in order to avoid its potential negative consequences). Thus, the amount of social support that older adults receive may modulate their focus on positive or negative information. Finally, although increased attention to positive information has been commonly linked to everyday functioning and positive outcomes, i.e., </span><i data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">well-being</span></i><span data-dcnode-id="3448" instrument_node=""> (</span><a data-dcnode-id="3446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B75"><span data-dcnode-id="3447" instrument_node="">Reed and Carstensen, 2012</span></a><span data-dcnode-id="3445" instrument_node="">), whether well-being is a significant predictor of motivated, top-down attention to positive information is not clear.</span></p><span data-dcnode-id="3443" instrument_node="">
</span><h3 data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">Present Study</span></h3><span data-dcnode-id="3440" instrument_node="">
</span><p class="mb15" data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">Based on the above considerations, we pursued three main aims in this study: (1) to identify whether there are age-related time-course differences in gaze patterns (positivity shift) during observation of pairs of “more positive vs. more negative” face pictures, (2) the role of FTP in positivity shifts, and whether FTP is similarly related to socioemotional functioning in younger and older adults, (3) how inter-individual differences in socioemotional functioning alongside age relate to positivity shifts.</span></p><span data-dcnode-id="3437" instrument_node="">
</span><p class="mb15" data-dcnode-id="3421"><span data-dcnode-id="3436" instrument_node="">To pursue these aims, we used a free viewing task where younger and older adults’ gaze patterns on pairs of happy, angry, sad, and neutral face stimuli were recorded using an eye-tracking system. We followed </span><a data-dcnode-id="3434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B75"><span data-dcnode-id="3435" instrument_node="">Reed and Carstensen’s (2012)</span></a><span data-dcnode-id="3433" instrument_node=""> definition that “positive processing preference can result from heightened processing of positive </span><i data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">and/or</span></i><span data-dcnode-id="3430" instrument_node=""> reduced processing of negative information” (p. 2), and quantified positivity by assessing the relative fixation durations on the “more positive” side of the five contrasts (happy vs. sad, happy vs. angry, happy vs. neutral, neutral vs. angry, and neutral vs. sad). Taking into account previous findings on delayed occurrence of positivity, we tested whether age differences in positivity preferences differentially emerge in early and late trial periods (i.e., positivity shifts), as opposed to when the entire viewing period (i.e., positivity bias</span><sup data-dcnode-id="3426" id="footnotesuper1"><a data-dcnode-id="3429" id="footnote1a"></a><a class="footnoteanchor" data-dcnode-id="3427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23footnote1"><span data-dcnode-id="3428" instrument_node="">1</span></a></sup><span data-dcnode-id="3425" instrument_node="">) was considered. We hypothesized that older adults would show greater positivity for the entire trial durations, and especially greater </span><i data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">positivity shifts</span></i><span data-dcnode-id="3422" instrument_node=""> than younger adults.</span></p><span data-dcnode-id="3420" instrument_node="">
</span><p class="mb15" data-dcnode-id="3410"><span data-dcnode-id="3419" instrument_node="">In a </span><i data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">post-hoc</span></i><span data-dcnode-id="3416" instrument_node=""> analysis,</span><sup data-dcnode-id="3412" id="footnotesuper2"><a data-dcnode-id="3415" id="footnote2a"></a><a class="footnoteanchor" data-dcnode-id="3413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23footnote2"><span data-dcnode-id="3414" instrument_node="">2</span></a></sup><span data-dcnode-id="3411" instrument_node=""> we also examined whether younger and older adults show a differential preference for sad and angry faces. Further analyses on gaze preferences examined whether there are age-related differences in focusing on different regions of faces. We hypothesized that increased positivity in older age might be related to a preference for looking at different regions of faces.</span></p><span data-dcnode-id="3409" instrument_node="">
</span><p class="mb15" data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">We assessed perceived FTP in all participants. We hypothesized that the relationship between FTP and the positivity shift would differ as a function of age, such that a limited FTP would be associated with greater positivity shifts in older, but not in younger adults.</span></p><span data-dcnode-id="3406" instrument_node="">
</span><p class="mb0" data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">Regarding inter-individual differences, we further hypothesized: (1) executive functioning, increased positive emotion regulation, and higher subjective well-being would be positively, whereas factors related to stress would be negatively associated with positivity shifts, (2) a higher social support would be associated with greater positivity shifts especially in older adults, (3) the relationship between FTP and other socioemotional functioning measures, such as well-being and stress, would be different across the age groups.</span></p><span data-dcnode-id="3403" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="3402" id="h3" name="h3"></a><h2 data-dcnode-id="3400"><span data-dcnode-id="3401" instrument_node="">Materials and Methods</span></h2><span data-dcnode-id="3399" instrument_node="">
</span><p class="mb0" data-dcnode-id="3394"><span data-dcnode-id="3398" instrument_node="">The current study was planned and carried out as part of a larger cross-sectional study, the “Leipzig study for mind-body-emotion interactions” (LEMON), established at the Max Planck Institute for Human Cognitive and Brain Sciences (MPI CBS) in Leipzig (for details, see </span><a data-dcnode-id="3396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B4"><span data-dcnode-id="3397" instrument_node="">Babayan et al., 2019</span></a><span data-dcnode-id="3395" instrument_node="">).</span></p><span data-dcnode-id="3393" instrument_node="">
</span><h3 data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">Participants</span></h3><span data-dcnode-id="3390" instrument_node="">
</span><p class="mb15" data-dcnode-id="3385"><span data-dcnode-id="3389" instrument_node="">For the LEMON study, healthy participants between the age of 20–35 and 59–77 were recruited through the MPI CBS’s participant database, online advertisements, and flyers distributed in public spaces and at the University of Leipzig, Germany. Participants were all Caucasian and native German speakers. Exclusion criteria comprised a diagnosis of cardiovascular (e.g., hypertension, heart attack), neurological (e.g., multiple sclerosis, stroke), psychiatric (with inpatient treatment &gt; 2 weeks within the last 10 years; e.g., psychosis, PTSD; with inpatient treatment &gt; 2 weeks within the last 10 years) or any other malignant disease (e.g., cancer); consumption of psychoactive drugs (e.g., MDMA, THC) or excessive alcohol; intake of centrally active medications (amber, beta- or alpha blocker, cortisol, any chemotherapeutic, or psychopharmacological medication); and standard MRI exclusion criteria (e.g., metallic implants, tattoos, pregnancy, claustrophobia). Current or past study of psychology and previous participation in a scientific study within the last 10 years were also among the exclusion criteria (see </span><a data-dcnode-id="3387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B4"><span data-dcnode-id="3388" instrument_node="">Babayan et al., 2019</span></a><span data-dcnode-id="3386" instrument_node="">).</span></p><span data-dcnode-id="3384" instrument_node="">
</span><p class="mb15" data-dcnode-id="3376"><span data-dcnode-id="3383" instrument_node="">Inclusion to the study was performed in two steps: people were prescreened via telephone, during which potential exclusion criteria were assessed. Individuals who did not meet any exclusion criterion were invited to MPI CBS and were individually interviewed by the study physician to ensure that none of the exclusion criteria were met. For this study, after the exclusion criteria were applied to the full sample of 170 participants who completed the task, 12 participants were excluded due to positive drug tests and 4 participants were excluded due to a current alcohol or substance use disorder diagnosed with the Structured Clinical Interview for the </span><i data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">DSM-IV</span></i><span data-dcnode-id="3380" instrument_node=""> (SCID-IV; </span><a data-dcnode-id="3378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B31"><span data-dcnode-id="3379" instrument_node="">First et al., 1996</span></a><span data-dcnode-id="3377" instrument_node="">) measurement, leaving 154 people for the analyses. The study was carried out in accordance with the Declaration of Helsinki and the study protocol was approved by the ethics committee at the medical faculty of the University of Leipzig (reference number 154/13-ff). All participants signed a consent form according to the protocols approved by the ethics committee of the Medical Faculty at the University of Leipzig.</span></p><span data-dcnode-id="3375" instrument_node="">
</span><p class="mb15" data-dcnode-id="3358"><span data-dcnode-id="3374" instrument_node="">After eye-tracker data from 25 participants (13 older, 12 younger adults) were excluded from the analysis,</span><sup data-dcnode-id="3370" id="footnotesuper3"><a data-dcnode-id="3373" id="footnote3a"></a><a class="footnoteanchor" data-dcnode-id="3371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23footnote3"><span data-dcnode-id="3372" instrument_node="">3</span></a></sup><span data-dcnode-id="3369" instrument_node=""> 129 participants remained for the analysis of this study. 73 were younger (</span><i data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">M</span></i><sub data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">age</span></sub><span data-dcnode-id="3364" instrument_node=""> = 24.49, age range: 20–35 years, 40 female) and 56 were older (</span><i data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">M</span></i><sub data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">age</span></sub><span data-dcnode-id="3359" instrument_node=""> = 67.33, age range: 60–75 years, 35 female) adults.</span></p><span data-dcnode-id="3357" instrument_node="">
</span><p class="mb0" data-dcnode-id="3349"><span data-dcnode-id="3356" instrument_node="">Older adults reported having longer education (in years) than younger adults. Younger adults reported higher levels of worry, using more positive emotion regulation strategies, and a more open-ended FTP than older adults, and they scored higher on cognitive functioning than older adults. There were no significant age-related differences on well-being, lack of resources, or in social support measures (see </span><a data-dcnode-id="3354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="3355" instrument_node="">Table 1</span></a><span data-dcnode-id="3353" instrument_node="">). Correlations between our study variables for each group can be seen in </span><a data-dcnode-id="3351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T2"><span data-dcnode-id="3352" instrument_node="">Table 2</span></a><span data-dcnode-id="3350" instrument_node="">.</span></p><span data-dcnode-id="3348" instrument_node="">
