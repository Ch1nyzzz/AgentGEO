</span><div class="td-post-author-name" data-dcnode-id="818"><div class="td-author-by" data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">By</span></div><span data-dcnode-id="821" instrument_node=""> </span><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.lifeder.com/author/asisa-nieto/"><span data-dcnode-id="820" instrument_node="">Asisa Nieto</span></a></div><span data-dcnode-id="817" instrument_node=""> </span></div><span data-dcnode-id="815" instrument_node="">

</span><a class="td-social-sharing-buttons td-social-whatsapp" data-dcnode-id="791" href="whatsapp://send/?text=What+is+Happiness%3F+%28for+Psychology%29%20-%20https%3A%2F%2Fen.lifeder.com%2Fwhat-is-happiness%2F"><i class="td-icon-whatsapp" data-dcnode-id="792"></i></a><span data-dcnode-id="790" instrument_node="">
</span></div></div><span data-dcnode-id="787" instrument_node="">
</span><div class="td-post-content" data-dcnode-id="486"><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="781" style="text-align: justify;"><span data-dcnode-id="782" style="color: #000000;"><strong data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Happiness</span></strong><span data-dcnode-id="783" instrument_node=""> is a state of good mental health and positive feelings, such as joy and pleasure. It is an abstract concept that differs from person to person, and culture to culture. Some terms related to it are wellbeing, quality of life, and satisfaction.</span></span></p><div class="code-block code-block-1" data-dcnode-id="769" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="780" instrument_node="">
</span><center data-dcnode-id="770"><span data-dcnode-id="779" instrument_node="">
</span><span data-dcnode-id="777" instrument_node="">
</span><div data-dcnode-id="772" id="div-gpt-ad-content-adapt-1"><span data-dcnode-id="776" instrument_node="">
</span><span data-dcnode-id="773" instrument_node="">
</span></div><span data-dcnode-id="771" instrument_node="">
</span></center></div><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="765" style="text-align: justify;"><span data-dcnode-id="766" style="color: #000000;"><span data-dcnode-id="767" instrument_node="">Have you ever tried to establish what happiness is? Maybe you’ve looked up the definition in a dictionary? If you have, you have probably realised how difficult it is to find a definition that doesn’t just rely on synonyms to explain it. Combined with this, it is almost impossible to measure how happy a person is.</span></span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762"><img alt="what-is-happiness" class="wp-image-603 aligncenter td-animation-stack-type0-2" data-dcnode-id="763" height="318" sizes="(max-width: 477px) 100vw, 477px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.lifeder.com/wp-content/uploads/2017/03/what-is-happiness-300x200.jpeg&amp;raw" srcset="https://en.lifeder.com/wp-content/uploads/2017/03/what-is-happiness-300x200.jpeg 300w, https://en.lifeder.com/wp-content/uploads/2017/03/what-is-happiness.jpeg 630w" width="477"></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="758" style="text-align: justify;"><span data-dcnode-id="759" style="color: #000000;"><span data-dcnode-id="760" instrument_node="">In this article we will try and tackle the problem of what is meant by “happiness”.</span></span></p><span data-dcnode-id="757" instrument_node="">
</span><h2 data-dcnode-id="752" style="text-align: justify;"><strong data-dcnode-id="753"><span data-dcnode-id="754" style="color: #000000;"><u data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">What is known about happiness?</span></u></span></strong></h2><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="748" style="text-align: justify;"><span data-dcnode-id="749" style="color: #000000;"><span data-dcnode-id="750" instrument_node="">Due to the unhappiness of the modern world, the science of happiness has become more and more important. Who doesn’t want to be happy?</span></span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="738" style="text-align: justify;"><span data-dcnode-id="739" style="color: #000000;"><span data-dcnode-id="746" instrument_node="">Since ancient times, philosophers, religious leaders, writers and thinkers such as Aristotle, have tried to answer this question. For Aristotle happiness was based on: </span><em data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Hedonia </span></em><span data-dcnode-id="743" instrument_node="">(pleasure) and </span><em data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">eudaimonia </span></em><span data-dcnode-id="740" instrument_node="">(a well lived life)</span></span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="734" style="text-align: justify;"><span data-dcnode-id="735" style="color: #000000;"><span data-dcnode-id="736" instrument_node="">According to Dr Seligman (2011) this concept is slightly more complex. Seligman states that happiness comes from a pleasant, and meaningful life, full of fulfilling commitments. He says that it also includes good quality relationships, success and achievements.</span></span></p><div class="code-block code-block-2" data-dcnode-id="725" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="733" instrument_node="">
</span><span data-dcnode-id="731" instrument_node="">
</span><div data-dcnode-id="726" id="div-gpt-ad-content-adapt-2"><span data-dcnode-id="730" instrument_node="">
</span><span data-dcnode-id="727" instrument_node="">
</span></div></div><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="721" style="text-align: justify;"><span data-dcnode-id="722" style="color: #000000;"><span data-dcnode-id="723" instrument_node="">Below is a formula of the elements that determine our happiness, known as subjective well-being (SWB):</span></span></p><span data-dcnode-id="720" instrument_node="">
</span><ul data-dcnode-id="706" style="text-align: justify;"><span data-dcnode-id="719" instrument_node="">
</span><li data-dcnode-id="716"><span data-dcnode-id="717" style="color: #000000;"><span data-dcnode-id="718" instrument_node="">50% of our happiness is determined by our genes.</span></span></li><span data-dcnode-id="715" instrument_node="">
</span><li data-dcnode-id="712"><span data-dcnode-id="713" style="color: #000000;"><span data-dcnode-id="714" instrument_node="">10% is determined by our surroundings.</span></span></li><span data-dcnode-id="711" instrument_node="">
</span><li data-dcnode-id="708"><span data-dcnode-id="709" style="color: #000000;"><span data-dcnode-id="710" instrument_node="">40% is determined by what we do every day</span></span></li><span data-dcnode-id="707" instrument_node="">
</span></ul><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="702" style="text-align: justify;"><span data-dcnode-id="703" style="color: #000000;"><span data-dcnode-id="704" instrument_node="">(Lyubomirsky, Sheldon y Schkade, 2005).</span></span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="698" style="text-align: justify;"><span data-dcnode-id="699" style="color: #000000;"><span data-dcnode-id="700" instrument_node="">As shown above, 60% of our happiness is out of our control. We should still try make the most of the 40% that we can control.</span></span></p><span data-dcnode-id="697" instrument_node="">
</span><h2 data-dcnode-id="692" style="text-align: justify;"><strong data-dcnode-id="693"><span data-dcnode-id="694" style="color: #000000;"><u data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Happiness in Psychology</span></u></span></strong></h2><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><img alt="happy-brain" class="wp-image-604 aligncenter td-animation-stack-type0-2" data-dcnode-id="690" height="421" sizes="(max-width: 421px) 100vw, 421px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.lifeder.com/wp-content/uploads/2017/03/happy-brain-300x300.jpeg&amp;raw" srcset="https://en.lifeder.com/wp-content/uploads/2017/03/happy-brain-300x300.jpeg 300w, https://en.lifeder.com/wp-content/uploads/2017/03/happy-brain-150x150.jpeg 150w, https://en.lifeder.com/wp-content/uploads/2017/03/happy-brain-420x420.jpeg 420w, https://en.lifeder.com/wp-content/uploads/2017/03/happy-brain.jpeg 511w" width="421"></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="685" style="text-align: justify;"><span data-dcnode-id="686" style="color: #000000;"><span data-dcnode-id="687" instrument_node="">We can start defining this concept by stating what happiness is not. For a lot of people happiness is going to a party with friends or enjoying a meal with someone they love.</span></span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="678" style="text-align: justify;"><span data-dcnode-id="679" style="color: #000000;"><span data-dcnode-id="683" instrument_node="">These pleasant experiences make us feel good, however this only determines the meaning of pleasure. So, if happiness is not the same as pleasure, what </span><em data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">is</span></em><span data-dcnode-id="680" instrument_node=""> it?</span></span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="671" style="text-align: justify;"><span data-dcnode-id="672" style="color: #000000;"><span data-dcnode-id="676" instrument_node="">As Seligman has said, happiness is comes from the fulfilment of our </span><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.lifeder.com/maslows-hierarchy-of-needs/" rel="noopener" target="_blank"><span data-dcnode-id="675" instrument_node="">needs</span></a><span data-dcnode-id="673" instrument_node="">. That is, when we feel satisfied and complete. It is a feeling of satisfaction, and feeling that life is as it is supposed to be. This true happiness, the light, comes when all of our needs are met.</span></span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="667" style="text-align: justify;"><span data-dcnode-id="668" style="color: #000000;"><span data-dcnode-id="669" instrument_node="">This leads us to Sonja Lyubomirsky’s definition of happiness: “joy, satisfaction and well being, combined with a feeling that life is good, meaningful and worth living”.</span></span></p><span data-dcnode-id="666" instrument_node="">
</span><h2 data-dcnode-id="661" style="text-align: justify;"><strong data-dcnode-id="662"><span data-dcnode-id="663" style="color: #000000;"><u data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">What do we need to achieve happiness?</span></u></span></strong></h2><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="658"><img alt="happy-woman-countryside" class="wp-image-605 aligncenter td-animation-stack-type0-2" data-dcnode-id="659" height="313" sizes="(max-width: 469px) 100vw, 469px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.lifeder.com/wp-content/uploads/2017/03/happy-woman-countryside-300x200.jpeg&amp;raw" srcset="https://en.lifeder.com/wp-content/uploads/2017/03/happy-woman-countryside-300x200.jpeg 300w, https://en.lifeder.com/wp-content/uploads/2017/03/happy-woman-countryside.jpeg 630w" width="469"></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="654" style="text-align: justify;"><span data-dcnode-id="655" style="color: #000000;"><span data-dcnode-id="656" instrument_node="">Once we know what happiness is we are faced with another question: what needs must be met to achieve happiness?</span></span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="650" style="text-align: justify;"><span data-dcnode-id="651" style="color: #000000;"><span data-dcnode-id="652" instrument_node="">Our needs depend on our genes, our childhood and our life experiences. This complex combination is what makes people unique, makes them who they are, and determines their needs.</span></span></p><div class="code-block code-block-3" data-dcnode-id="641" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="649" instrument_node="">
</span><span data-dcnode-id="647" instrument_node="">
</span><div data-dcnode-id="642" id="div-gpt-ad-content-adapt-3"><span data-dcnode-id="646" instrument_node="">
</span><span data-dcnode-id="643" instrument_node="">
</span></div></div><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="637" style="text-align: justify;"><span data-dcnode-id="638" style="color: #000000;"><span data-dcnode-id="639" instrument_node="">People are complex, but we are all human beings with similar needs.</span></span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="633" style="text-align: justify;"><span data-dcnode-id="634" style="color: #000000;"><span data-dcnode-id="635" instrument_node="">Outlined below is a list of the most important human needs based on Dr. Seligman’s concept of happiness and the Maslow Hierarchy. If these criteria are fulfilled a happy life can be achieved:</span></span></p><span data-dcnode-id="632" instrument_node="">
</span><ul data-dcnode-id="576" style="text-align: justify;"><span data-dcnode-id="631" instrument_node="">
</span><li data-dcnode-id="626"><span data-dcnode-id="627" style="color: #000000;"><strong data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Wellbeing:</span></strong><span data-dcnode-id="628" instrument_node=""> the connections between mind and body that affect our mood. We cannot be happy unless we meet this essential need: the physiological need (Vázquez y otros, (S/F).</span></span></li><span data-dcnode-id="625" instrument_node="">
</span><li data-dcnode-id="620"><span data-dcnode-id="621" style="color: #000000;"><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Environment: </span></strong><span data-dcnode-id="622" instrument_node="">these are the external factors, such as security, availability of food, freedom, climate, beauty and home. The human being needs to feel protected in order to be happy.</span></span></li><span data-dcnode-id="619" instrument_node="">
</span><li data-dcnode-id="614"><span data-dcnode-id="615" style="color: #000000;"><strong data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Pleasure: </span></strong><span data-dcnode-id="616" instrument_node="">all human beings need experiences such as joy, sex, love and food, in order to feel good.</span></span></li><span data-dcnode-id="613" instrument_node="">
</span><li data-dcnode-id="608"><span data-dcnode-id="609" style="color: #000000;"><strong data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Relationships: </span></strong><span data-dcnode-id="610" instrument_node="">we are a social species and we need relationships to build personalities, and as Seligman (2011) states, these relationships must be positive.</span></span></li><span data-dcnode-id="607" instrument_node="">
</span><li data-dcnode-id="602"><span data-dcnode-id="603" style="color: #000000;"><strong data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Self-development: </span></strong><span data-dcnode-id="604" instrument_node="">we need to set goals and be motivated to achieve them. We should be adventurous, make plans and be curious about the world around us.</span></span></li><span data-dcnode-id="601" instrument_node="">
</span><li data-dcnode-id="596"><span data-dcnode-id="597" style="color: #000000;"><strong data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Commitment: </span></strong><span data-dcnode-id="598" instrument_node="">involve yourself fully in your commitments and activities, and do not depend always on the external factors. To be happy you must really commit to doing something.</span></span></li><span data-dcnode-id="595" instrument_node="">
</span><li data-dcnode-id="590"><span data-dcnode-id="591" style="color: #000000;"><strong data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Success and achievement:</span></strong><span data-dcnode-id="592" instrument_node=""> everyone needs to set goals to achieve their dreams. This will make them feel competent and self-reliant, giving them the tools to keep growing personally and professionally. Self-confidence is essential for this task.</span></span></li><span data-dcnode-id="589" instrument_node="">
</span><li data-dcnode-id="584"><span data-dcnode-id="585" style="color: #000000;"><strong data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Self- esteem: </span></strong><span data-dcnode-id="586" instrument_node="">people need to feel loved, to have a positive opinion of themselves, and the work they are doing. Without this, self-esteem happiness will be affected.</span></span></li><span data-dcnode-id="583" instrument_node="">
</span><li data-dcnode-id="578"><span data-dcnode-id="579" style="color: #000000;"><strong data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Flexibility: </span></strong><span data-dcnode-id="580" instrument_node="">we must be able to adapt to different situations and overcome difficulty with positivity.</span></span></li><span data-dcnode-id="577" instrument_node="">
</span></ul><span data-dcnode-id="575" instrument_node="">
</span><h2 data-dcnode-id="570" style="text-align: justify;"><span data-dcnode-id="571" style="color: #000000;"><strong data-dcnode-id="572"><u data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Can happiness be measured?</span></u></strong></span></h2><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><img alt="happy-man" class="wp-image-606 aligncenter td-animation-stack-type0-2" data-dcnode-id="568" height="293" sizes="(max-width: 439px) 100vw, 439px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.lifeder.com/wp-content/uploads/2017/03/happy-man-300x200.jpeg&amp;raw" srcset="https://en.lifeder.com/wp-content/uploads/2017/03/happy-man-300x200.jpeg 300w, https://en.lifeder.com/wp-content/uploads/2017/03/happy-man.jpeg 631w" width="439"></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="563" style="text-align: justify;"><span data-dcnode-id="564" style="color: #000000;"><span data-dcnode-id="565" instrument_node="">Happiness in intangible: we can’t put it in our pockets and save it for when we need it. However, do you think scientists can measure and study happiness? According to some of them it is possible.</span></span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="559" style="text-align: justify;"><span data-dcnode-id="560" style="color: #000000;"><span data-dcnode-id="561" instrument_node="">A study was carried out in which general health, happiness, self-efficacy, stress, life expectancy and life satisfaction of students was evaluated. The results showed that there was a significant connection between happiness and psychological well-being.</span></span></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="555" style="text-align: justify;"><span data-dcnode-id="556" style="color: #000000;"><span data-dcnode-id="557" instrument_node="">According to the study, “those with good relationships who enjoyed social events had better mental health”.</span></span></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="551" style="text-align: justify;"><span data-dcnode-id="552" style="color: #000000;"><span data-dcnode-id="553" instrument_node="">Dr. George Vaillant lead another study with 90-year-old men who were still studying. Between 1930 and 1940 Harvard Study of Adult Development started studying the health and well-being of the 268 most successful male students in the University of Harvard.</span></span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="547" style="text-align: justify;"><span data-dcnode-id="548" style="color: #000000;"><span data-dcnode-id="549" instrument_node="">The Grant Study examined the lives of these men, looking at the war, their careers, marriages, divorces, fatherhood and becoming grandfathers, and the last stages of their lives. Some of the results have been published in The Atlantic.</span></span></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="540" style="text-align: justify;"><span data-dcnode-id="541" style="color: #000000;"><span data-dcnode-id="545" instrument_node="">A similar, more recent social study is the BBC documentary </span><em data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Child of Our Time</span></em><span data-dcnode-id="542" instrument_node="">. The documentary is presented by Professor Robert Winston who studies the first 20 years of the life of 25 British children born in 1999/2000.</span></span></p><span data-dcnode-id="539" instrument_node="">
</span><h2 data-dcnode-id="534" style="text-align: justify;"><span data-dcnode-id="535" style="color: #000000;"><strong data-dcnode-id="536"><u data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Conclusion</span></u></strong></span></h2><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="530" style="text-align: justify;"><span data-dcnode-id="531" style="color: #000000;"><span data-dcnode-id="532" instrument_node="">As we have seen in this article, a lot is known about happiness nowadays. However, there is still much to learn and we still do not have an accurate definition of the term.</span></span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="526" style="text-align: justify;"><span data-dcnode-id="527" style="color: #000000;"><span data-dcnode-id="528" instrument_node=""> Being able to measure happiness will require a significant amount of work, but we are progressing on the right track.</span></span></p><span data-dcnode-id="525" instrument_node="">
