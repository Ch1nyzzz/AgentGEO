</span><meta content="We employ a novel paradigm to test whether six basic emotions (sadness, fear, disgust, anger, surprise, and happiness; Ekman, 1992) contain both negativity and positivity, as opposed to consisting of a single continuum between negative and positive. We examined the perceived negativity and positivity of these emotions in terms of their affective and cognitive components among Korean, Chinese, Canadian, and American students. Assessing each emotion at the cognitive and affective levels cross-culturally provides a fairly comprehensive picture of the positivity and negativity of emotions. Affective components were rated as more divergent than cognitive components. Cross-culturally, Americans and Canadians gave higher valence ratings to the salient valence of each emotion, and lower ratings to the non-salient valence of an emotion, compared to Chinese and Koreans. The results suggest that emotions encompass both positivity and negativity, and there were cross-cultural differences in reported emotions. This paradigm complements existing emotion theories, building on past research and allowing for more parsimonious explanations of cross-cultural research on emotion." data-dcnode-id="6590" name="Description" property="og:description"><span data-dcnode-id="6589" instrument_node="">

</span><div class="atButton" data-dcnode-id="5766"><span data-dcnode-id="5775" instrument_node="">
</span><a addthis:description="We employ a novel paradigm to test whether six basic emotions (sadness, fear, disgust, anger, surprise, and happiness; Ekman, 1992) contain both negativity and positivity, as opposed to consisting of a single continuum between negative and positive. We examined the perceived negativity and positivity of these emotions in terms of their affective and cognitive components among Korean, Chinese, Canadian, and American students. Assessing each emotion at the cognitive and affective levels cross-culturally provides a fairly comprehensive picture of the positivity and negativity of emotions. Affective components were rated as more divergent than cognitive components. Cross-culturally, Americans and Canadians gave higher valence ratings to the salient valence of each emotion, and lower ratings to the non-salient valence of an emotion, compared to Chinese and Koreans. The results suggest that emotions encompass both positivity and negativity, and there were cross-cultural differences in reported emotions. This paradigm complements existing emotion theories, building on past research and allowing for more parsimonious explanations of cross-cultural research on emotion." addthis:title="Two Sides of Emotion: Exploring Positivity and Negativity in Six Basic Emotions across Cultures" addthis:url="https://www.frontiersin.org/article/10.3389/fpsyg.2017.00610" class="addthis_button_facebook at300b" data-dcnode-id="5768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html" title="Facebook"><span class="at-icon-wrapper" data-dcnode-id="5769" style="background-color: rgb(59, 89, 152); line-height: 16px; height: 16px; width: 16px;"><svg alt="Facebook" aria-labelledby="at-svg-facebook-1" class="at-icon at-icon-facebook" data-dcnode-id="5770" role="img" style="width: 16px; height: 16px;" title="Facebook" version="1.1" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" xmlns:x </span><a class="reset-hash-position" data-dcnode-id="5657" id="h1" name="h1"></a><h1 data-dcnode-id="5655"><span data-dcnode-id="5656" instrument_node="">Two Sides of Emotion: Exploring Positivity and Negativity in Six Basic Emotions across Cultures</span></h1><span data-dcnode-id="5654" instrument_node="">
</span><div class="authors" data-dcnode-id="5630"><span data-dcnode-id="5653" instrument_node="">
</span><a class="user-id-404716" data-dcnode-id="5650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/404716"><img alt="" class="pr5" data-dcnode-id="5652" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//loop.frontiersin.org/images/profile/404716/24&amp;raw"><span data-dcnode-id="5651" instrument_node="">Sieun An</span></a><sup data-dcnode-id="5648"><span data-dcnode-id="5649" instrument_node="">1,2,3*</span></sup><span data-dcnode-id="5647" instrument_node="">, </span><a class="user-id-324665" data-dcnode-id="5644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/324665"><img alt="" class="pr5" data-dcnode-id="5646" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg&amp;raw"><span data-dcnode-id="5645" instrument_node="">Li-Jun Ji</span></a><sup data-dcnode-id="5642"><span data-dcnode-id="5643" instrument_node="">2*</span></sup><span data-dcnode-id="5641" instrument_node="">, </span><a class="user-id-414337" data-dcnode-id="5638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/414337"><img alt="" class="pr5" data-dcnode-id="5640" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg&amp;raw"><span data-dcnode-id="5639" instrument_node="">Michael Marks</span></a><sup data-dcnode-id="5636"><span data-dcnode-id="5637" instrument_node="">4</span></sup><span data-dcnode-id="5635" instrument_node=""> and </span><img alt="" class="pr5" data-dcnode-id="5634" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg&amp;raw"><span data-dcnode-id="5633" instrument_node="">Zhiyong Zhang</span><sup data-dcnode-id="5631"><span data-dcnode-id="5632" instrument_node="">3</span></sup></div><span data-dcnode-id="5629" instrument_node="">

</span><li data-dcnode-id="5623"><span data-dcnode-id="5625"><sup data-dcnode-id="5626"><span data-dcnode-id="5627" instrument_node="">1</span></sup></span><span data-dcnode-id="5624" instrument_node="">Department of Psychology, Ashoka University, Sonepat, India</span></li><span data-dcnode-id="5622" instrument_node="">
</span><li data-dcnode-id="5617"><span data-dcnode-id="5619"><sup data-dcnode-id="5620"><span data-dcnode-id="5621" instrument_node="">2</span></sup></span><span data-dcnode-id="5618" instrument_node="">Department of Psychology, Queen’s University, Kingston, ON, Canada</span></li><span data-dcnode-id="5616" instrument_node="">
</span><li data-dcnode-id="5611"><span data-dcnode-id="5613"><sup data-dcnode-id="5614"><span data-dcnode-id="5615" instrument_node="">3</span></sup></span><span data-dcnode-id="5612" instrument_node="">School of Psychological and Cognitive Sciences, Peking University, Beijing, China</span></li><span data-dcnode-id="5610" instrument_node="">
</span><li data-dcnode-id="5605"><span data-dcnode-id="5607"><sup data-dcnode-id="5608"><span data-dcnode-id="5609" instrument_node="">4</span></sup></span><span data-dcnode-id="5606" instrument_node="">Department of Psychology, New Mexico State University, Las Cruces, NM, USA</span></li><span data-dcnode-id="5604" instrument_node="">
</span></ul><span data-dcnode-id="5602" instrument_node="">
</span><p class="mb0" data-dcnode-id="5597"><span data-dcnode-id="5601" instrument_node="">We employ a novel paradigm to test whether six basic emotions (sadness, fear, disgust, anger, surprise, and happiness; </span><a data-dcnode-id="5599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12" style="color:#D54449;"><span data-dcnode-id="5600" instrument_node="">Ekman, 1992</span></a><span data-dcnode-id="5598" instrument_node="">) contain both negativity and positivity, as opposed to consisting of a single continuum between negative and positive. We examined the perceived negativity and positivity of these emotions in terms of their affective and cognitive components among Korean, Chinese, Canadian, and American students. Assessing each emotion at the cognitive and affective levels cross-culturally provides a fairly comprehensive picture of the positivity and negativity of emotions. Affective components were rated as more divergent than cognitive components. Cross-culturally, Americans and Canadians gave higher valence ratings to the salient valence of each emotion, and lower ratings to the non-salient valence of an emotion, compared to Chinese and Koreans. The results suggest that emotions encompass both positivity and negativity, and there were cross-cultural differences in reported emotions. This paradigm complements existing emotion theories, building on past research and allowing for more parsimonious explanations of cross-cultural research on emotion.</span></p><span data-dcnode-id="5596" instrument_node="">
</span><div class="clear" data-dcnode-id="5595"></div><span data-dcnode-id="5594" instrument_node="">

</span><a class="reset-hash-position" data-dcnode-id="5590" id="h2" name="h2"></a><h2 data-dcnode-id="5588"><span data-dcnode-id="5589" instrument_node="">Introduction</span></h2><span data-dcnode-id="5587" instrument_node="">
</span><p class="mb0" data-dcnode-id="5576"><span data-dcnode-id="5586" instrument_node="">Emotion is widely studied and investigated in psychological science. It is a construct important for art, literature, and everyday life, and is at the core of the human experience. Traditionally, emotions are categorized dichotomously, as negative or positive, unpleasant or pleasant, activated or deactivated, and so on (</span><a data-dcnode-id="5584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="5585" instrument_node="">Plutchik, 1980</span></a><span data-dcnode-id="5583" instrument_node="">; </span><a data-dcnode-id="5581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="5582" instrument_node="">Russell, 1980</span></a><span data-dcnode-id="5580" instrument_node="">). Dichotomous classifications, however, are difficult to reconcile with certain developments in emotion research. In this paper, rather than classifying emotions on a single continuum from positive to negative, we argue that each emotion contains some degree of both negativity and positivity. Further, we employ a cross-cultural paradigm in an effort to highlight the nuances of the positivity and negativity of emotion, as there are several important differences in the affective signature of emotions across cultures. If this conceptualization is supported, it would facilitate more parsimonious explanations of several findings related to emotion. We investigated the issue with six basic emotions (sadness, fear, disgust, anger, surprise, and happiness; </span><a data-dcnode-id="5578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="5579" instrument_node="">Ekman, 1992</span></a><span data-dcnode-id="5577" instrument_node="">) in a cross-cultural study, involving participants from four different countries (South Korea, China, Canada, and the US).</span></p><span data-dcnode-id="5575" instrument_node="">
</span><h3 data-dcnode-id="5573"><span data-dcnode-id="5574" instrument_node="">A Brief History of Emotion Classification</span></h3><span data-dcnode-id="5572" instrument_node="">
</span><p class="mb15" data-dcnode-id="5558"><span data-dcnode-id="5571" instrument_node="">Emotions have long been an important topic of human interactions and society, and have hence been extensively studied in the field of psychological science. Perhaps the first notable scientific endeavor on emotions was </span><a data-dcnode-id="5569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="5570" instrument_node="">Darwin’s (1872/1998)</span></a><span data-dcnode-id="5568" instrument_node="">. </span><a data-dcnode-id="5566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="5567" instrument_node="">Darwin’s (1872/1998)</span></a><span data-dcnode-id="5565" instrument_node=""> concept of emotion as expressive and as physiological states has strongly influenced subsequent investigations of emotion. Consequently, emotion researchers have emphasized physiological aspects of emotions, particularly facial expressions (</span><a data-dcnode-id="5563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B10"><span data-dcnode-id="5564" instrument_node="">Ekman, 1977</span></a><span data-dcnode-id="5562" instrument_node="">, </span><a data-dcnode-id="5560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B13"><span data-dcnode-id="5561" instrument_node="">1999</span></a><span data-dcnode-id="5559" instrument_node="">). Ekman’s research suggests that there are universal emotions based on cross-cultural recognition of facial expressions. Although there are cultural differences in display rules for expressing emotion, six basic emotions (sadness, fear, disgust, anger, surprise, and happiness) have been identified as universal. This tenet is widely accepted among emotion researchers.</span></p><span data-dcnode-id="5557" instrument_node="">
</span><p class="mb15" data-dcnode-id="5534"><span data-dcnode-id="5556" instrument_node="">In another early attempt to understand emotion, </span><a data-dcnode-id="5554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B63"><span data-dcnode-id="5555" instrument_node="">Wundt (1897)</span></a><span data-dcnode-id="5553" instrument_node=""> proposed that all emotions can be described by three dimensions: pleasurable to non-pleasurable, arousing to subduing, and strained to relaxed. Later, </span><a data-dcnode-id="5551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B50"><span data-dcnode-id="5552" instrument_node="">Schlosberg (1954)</span></a><span data-dcnode-id="5550" instrument_node=""> refined these three dimensions into pleasantness–unpleasantness, attention–rejection, and level of activation. Dimensional models of emotion are based on the assumption that all emotions involve the same interconnected system for emotion states. Still, the currently dominant models are the two-dimensional models: the circumplex model (</span><a data-dcnode-id="5548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="5549" instrument_node="">Russell, 1980</span></a><span data-dcnode-id="5547" instrument_node="">; </span><a data-dcnode-id="5545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B43"><span data-dcnode-id="5546" instrument_node="">Plutchik and Conte, 1997</span></a><span data-dcnode-id="5544" instrument_node="">; </span><a data-dcnode-id="5542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="5543" instrument_node="">Remington et al., 2000</span></a><span data-dcnode-id="5541" instrument_node="">), the vector model (</span><a data-dcnode-id="5539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B4"><span data-dcnode-id="5540" instrument_node="">Bradley et al., 1992</span></a><span data-dcnode-id="5538" instrument_node="">), and the Positive Activation – Negative Activation (PANA) model which contains two dimensions: positive to negative valence, and high to low activation (</span><a data-dcnode-id="5536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B62"><span data-dcnode-id="5537" instrument_node="">Watson and Tellegen, 1985</span></a><span data-dcnode-id="5535" instrument_node="">). In most (if not all) of these models, valence is one important dimension, along which a specific emotion is categorized as positive or negative. Indeed, the field of scientific studies on emotion has rested and evolved on the assumption that emotions are either positive or negative.</span></p><span data-dcnode-id="5533" instrument_node="">
</span><p class="mb0" data-dcnode-id="5531"><span data-dcnode-id="5532" instrument_node="">Our research is motivated by the fact that certain developments in emotion research, including findings related to simultaneous feelings of positive and negative emotion and emotions having both positive and negative consequences, are difficult to explain by traditional, dichotomous classifications of emotion, which would require numerous auxiliary assumptions to satisfy. In the review below, we first briefly review these two areas generally, and then as they relate to culture. Next we review research related to the cognitive and affective components of emotion, and finally research on culture and dialectical thinking in order to frame our hypotheses.</span></p><span data-dcnode-id="5530" instrument_node="">
</span><h3 data-dcnode-id="5528"><span data-dcnode-id="5529" instrument_node="">Positivity and Negativity in Emotion Research</span></h3><span data-dcnode-id="5527" instrument_node="">
</span><p class="mb15" data-dcnode-id="5522"><span data-dcnode-id="5526" instrument_node="">First, research suggests that there are simultaneous positive and negative outcomes associated with specific emotions. Emotions can also have conflicting consequences; a positive emotion can lead to a negative consequence, and a negative emotion can lead to a positive consequence. For example, although happiness is considered as a positive and desirable emotion, research has revealed a darker side of happiness. According to </span><a data-dcnode-id="5524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B17"><span data-dcnode-id="5525" instrument_node="">Gruber et al. (2011)</span></a><span data-dcnode-id="5523" instrument_node="">, the pursuit of happiness is not always positive, and experiencing happiness is not always a good thing. People who pursue happiness strongly tend to be more depressed, miserable, and unhappy.</span></p><span data-dcnode-id="5521" instrument_node="">
</span><p class="mb15" data-dcnode-id="5513"><span data-dcnode-id="5520" instrument_node="">Further, participants primed with happy emotions displayed significantly more selfishness than those primed with sad emotions (</span><a data-dcnode-id="5518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B56"><span data-dcnode-id="5519" instrument_node="">Tan and Forgas, 2010</span></a><span data-dcnode-id="5517" instrument_node="">). People placing a high importance on pursuing happiness reported significantly more loneliness compared to those neutral in pursuing happiness. Further, </span><a data-dcnode-id="5515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B55"><span data-dcnode-id="5516" instrument_node="">Tamir and Bigman (2014)</span></a><span data-dcnode-id="5514" instrument_node=""> demonstrate that there are benefits (cognitive upsides; e.g., anger resulted in better performance on a confrontational task) to experiencing emotions that typically elicit unpleasant feelings (affective downsides). This suggests that so-called positive emotions can have a negative influence on people, and that negative emotions can have a positive influence.</span></p><span data-dcnode-id="5512" instrument_node="">
</span><p class="mb15" data-dcnode-id="5492"><span data-dcnode-id="5511" instrument_node="">Second, regarding simultaneous positive and negative emotions, people reported simultaneously feeling happy and sad in various situations (</span><a data-dcnode-id="5509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="5510" instrument_node="">Larsen et al., 2001</span></a><span data-dcnode-id="5508" instrument_node="">; e.g., on their graduation day or the day moving away from home), despite that sadness and happiness were rated as opposites. Simultaneous emotions have also been reported in response to winning in disappointing fashion (e.g., a victory that could have been better) and losing in a relieving fashion (e.g., a defeat that could have been worse; </span><a data-dcnode-id="5506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B24"><span data-dcnode-id="5507" instrument_node="">Larsen et al., 2004</span></a><span data-dcnode-id="5505" instrument_node="">). Thus, despite the traditional emotion framework that conceptualizes emotions dichotomously – as being either positive or negative, the literature suggests that a more flexible approach is needed. This might be why emotion researchers have long argued that the same emotion can serve different functions (</span><a data-dcnode-id="5503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="5504" instrument_node="">Ekman, 1984</span></a><span data-dcnode-id="5502" instrument_node="">; </span><a data-dcnode-id="5500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="5501" instrument_node="">Scherer, 1984</span></a><span data-dcnode-id="5499" instrument_node="">; </span><a data-dcnode-id="5497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B15"><span data-dcnode-id="5498" instrument_node="">Frijda and Mesquita, 1994</span></a><span data-dcnode-id="5496" instrument_node="">). Indeed, researchers have found both positive and negative effects of a positive mood, and of a negative mood (</span><a data-dcnode-id="5494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B6"><span data-dcnode-id="5495" instrument_node="">Clore et al., 1994</span></a><span data-dcnode-id="5493" instrument_node="">).</span></p><span data-dcnode-id="5491" instrument_node="">
</span><p class="mb15" data-dcnode-id="5484"><a data-dcnode-id="5489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B3"><span data-dcnode-id="5490" instrument_node="">Bagozzi et al. (1999)</span></a><span data-dcnode-id="5488" instrument_node=""> investigated the valence of emotion cross-culturally, and found that Easterners tended to report more concurrently reported positive and negative emotions than Westerners. Further, </span><a data-dcnode-id="5486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B34"><span data-dcnode-id="5487" instrument_node="">Miyamoto et al. (2010)</span></a><span data-dcnode-id="5485" instrument_node=""> investigated the co-occurrence of positive and negative emotions in both Japan and the United States. Japanese participants reported feeling more mixed emotions than Americans in predominantly positive situations, but not in predominantly negative situations, in which there were no differences.</span></p><span data-dcnode-id="5483" instrument_node="">
</span><p class="mb0" data-dcnode-id="5466"><span data-dcnode-id="5482" instrument_node="">Cross-cultural research casts doubt on the classification of emotions as strictly positive or negative, because an emotion that is considered negative in one culture can be considered positive in another (</span><a data-dcnode-id="5480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="5481" instrument_node="">Eid and Diener, 2001</span></a><span data-dcnode-id="5479" instrument_node="">). Individualistic cultures believe that self-reflective emotions (emotions that reflect on the individual’s own actions) concerning a person doing well are good, whereas collectivistic cultures believe that self-reflective emotions concerning that one’s actions need improvement are desirable. For example, those from individualistic cultures tend to consider pride as a desirable emotion, and those from collectivist cultures tend to consider guilt a desirable emotion (</span><a data-dcnode-id="5477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="5478" instrument_node="">Eid and Diener, 2001</span></a><span data-dcnode-id="5476" instrument_node="">). This is in line with cultural differences in regulatory focus. Overall, </span><a data-dcnode-id="5474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="5475" instrument_node="">Eid and Diener’s (2001)</span></a><span data-dcnode-id="5473" instrument_node=""> results further support that not all positive emotions are interpreted positively by all people, nor are all negative emotions interpreted negatively. Indeed, </span><a data-dcnode-id="5471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B59"><span data-dcnode-id="5472" instrument_node="">Tsai et al. (2006)</span></a><span data-dcnode-id="5470" instrument_node=""> and </span><a data-dcnode-id="5468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B58"><span data-dcnode-id="5469" instrument_node="">Tsai (2007)</span></a><span data-dcnode-id="5467" instrument_node=""> have shown that ideal affect – the affective state that people desire feeling – varies across cultures: Americans value high-arousal positive affective states (such as excitement) more, whereas East Asians value low-arousal positive affective states (such as calm or peacefulness) more. Further insight to these differences can be found in the literature concerning the components of emotion.</span></p><span data-dcnode-id="5465" instrument_node="">
</span><h3 data-dcnode-id="5463"><span data-dcnode-id="5464" instrument_node="">Emotional Components</span></h3><span data-dcnode-id="5462" instrument_node="">
</span><p class="mb15" data-dcnode-id="5418"><span data-dcnode-id="5461" instrument_node="">Research has indicated that emotion has affective and cognitive components (</span><a data-dcnode-id="5459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="5460" instrument_node="">Scherer, 1982</span></a><span data-dcnode-id="5458" instrument_node="">, </span><a data-dcnode-id="5456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="5457" instrument_node="">1984</span></a><span data-dcnode-id="5455" instrument_node="">; </span><a data-dcnode-id="5453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B1"><span data-dcnode-id="5454" instrument_node="">Aue et al., 2007</span></a><span data-dcnode-id="5452" instrument_node="">; </span><a data-dcnode-id="5450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B2"><span data-dcnode-id="5451" instrument_node="">Aue and Scherer, 2008</span></a><span data-dcnode-id="5449" instrument_node="">; </span><a data-dcnode-id="5447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="5448" instrument_node="">Dan Glauser and Scherer, 2008</span></a><span data-dcnode-id="5446" instrument_node="">; </span><a data-dcnode-id="5444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B16"><span data-dcnode-id="5445" instrument_node="">Grandjean and Scherer, 2008</span></a><span data-dcnode-id="5443" instrument_node="">). The affective component is related to our immediate response to stimuli (feelings), while the cognitive component is our more controlled, conscious evaluation after the immediate response (thinking). The Component Process Model (CPM), which is based on appraisal theory, suggests that emotion is composed of different stages: automatic sensory motor, schematic unconscious, and controlled conscious stages (</span><a data-dcnode-id="5441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="5442" instrument_node="">Scherer, 1982</span></a><span data-dcnode-id="5440" instrument_node="">, </span><a data-dcnode-id="5438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="5439" instrument_node="">1984</span></a><span data-dcnode-id="5437" instrument_node="">; </span><a data-dcnode-id="5435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B61"><span data-dcnode-id="5436" instrument_node="">Van Reekum and Scherer, 1997</span></a><span data-dcnode-id="5434" instrument_node="">). According to the CPM, the affective process is more immediate and provides a strong subjective sense of feeling that is prominent to oneself. The affective process is automatic, less controlled, and tends to be strongly aligned with the valence of the emotion); on the other hand, the cognitive process is rather controlled, occurring later in the realization of emotion sequence. The cognitive components of emotions are therefore considered less intense and less extreme compared to the affective components (</span><a data-dcnode-id="5432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="5433" instrument_node="">Scherer, 1982</span></a><span data-dcnode-id="5431" instrument_node="">, </span><a data-dcnode-id="5429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="5430" instrument_node="">1984</span></a><span data-dcnode-id="5428" instrument_node="">; </span><a data-dcnode-id="5426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B57"><span data-dcnode-id="5427" instrument_node="">Tice et al., 2004</span></a><span data-dcnode-id="5425" instrument_node="">; </span><a data-dcnode-id="5423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="5424" instrument_node="">Ochsner and Gross, 2005</span></a><span data-dcnode-id="5422" instrument_node="">). Indeed, research has shown that affective and cognitive components of emotions do not necessarily corroborate each other. For example, </span><a data-dcnode-id="5420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B55"><span data-dcnode-id="5421" instrument_node="">Tamir and Bigman (2014)</span></a><span data-dcnode-id="5419" instrument_node=""> explain that emotions can be pursued both for how they feel and what they accomplish, and highlight the complexities among the different emotional motives. For example, a boxer may desire to feel anger, a negative emotion, in order to motivate himself to beat his opponent. So although he may be feeling a negative emotion (affective component), he thinks about it in a positive light (cognitive component).</span></p><span data-dcnode-id="5417" instrument_node="">
</span><p class="mb15" data-dcnode-id="5397"><span data-dcnode-id="5416" instrument_node="">This distinction is similar to </span><a data-dcnode-id="5414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B30"><span data-dcnode-id="5415" instrument_node="">Mayer and Gaschke’s (1988)</span></a><span data-dcnode-id="5413" instrument_node=""> model, which argues that moods have at least two components: The direct experience of a mood, and a meta level of experience that consists of thoughts and feelings about the mood (</span><a data-dcnode-id="5411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B30"><span data-dcnode-id="5412" instrument_node="">Mayer and Gaschke, 1988</span></a><span data-dcnode-id="5410" instrument_node="">). They are called meta-moods because they do not concern the immediate experience of feeling states, but concern their reflective experience, involving subjective thoughts and feelings about one’s moods. The regulatory process of the reflective experience is under the individual’s control. The duality described above may explain why some cultures focus on hedonic pleasures (e.g., Western cultures) while others focus on peace and harmony (e.g., Eastern cultures). Indeed, East Asians reported that happiness is experienced as rather calm and zen-like, whereas Westerners reported that happiness is experienced as excitement and extreme positivity (</span><a data-dcnode-id="5408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B58"><span data-dcnode-id="5409" instrument_node="">Tsai, 2007</span></a><span data-dcnode-id="5407" instrument_node="">). This may explain why Westerners desire to feel positive emotions more than negative emotions relative to Easterners (</span><a data-dcnode-id="5405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B51"><span data-dcnode-id="5406" instrument_node="">Sims et al., 2015</span></a><span data-dcnode-id="5404" instrument_node="">). All of the above suggests that subjective interpretation of specific emotions (i.e., primarily the cognitive component of emotion) differs across cultures (</span><a data-dcnode-id="5402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B60"><span data-dcnode-id="5403" instrument_node="">Uchida et al., 2004</span></a><span data-dcnode-id="5401" instrument_node="">). Most recently, an argument based on Higher Order Theory (HOT) was put forth that emotions are cognitive (</span><a data-dcnode-id="5399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="5400" instrument_node="">LeDoux and Brown, 2017</span></a><span data-dcnode-id="5398" instrument_node="">). Based on the literature review on neuroimaging evidence, they have concluded that emotion is a cognitive process, as it involves cortical (conscious) rather than subcortical (unconscious) brain circuits. This suggests that emotion could be a higher order process, separate from the affect we feel.</span></p><span data-dcnode-id="5396" instrument_node="">
</span><p class="mb15" data-dcnode-id="5370"><span data-dcnode-id="5395" instrument_node="">Emotions and cognitions are intertwined. Indeed, emotions are the result of human cognition (</span><a data-dcnode-id="5393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B25"><span data-dcnode-id="5394" instrument_node="">Lazarus, 1982</span></a><span data-dcnode-id="5392" instrument_node="">), and cognitive processes in turn are influenced by emotion (</span><a data-dcnode-id="5390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B14"><span data-dcnode-id="5391" instrument_node="">Forgas, 1995</span></a><span data-dcnode-id="5389" instrument_node="">). Research has shown that culture influences cognitive processes (</span><a data-dcnode-id="5387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="5388" instrument_node="">Nisbett et al., 2001</span></a><span data-dcnode-id="5386" instrument_node="">). </span><a data-dcnode-id="5384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B19"><span data-dcnode-id="5385" instrument_node="">Ji et al. (2001)</span></a><span data-dcnode-id="5383" instrument_node=""> found that Westerners tend to have a linear thinking style, resulting in expectations of unchanging or consistent outcomes. Easterners, by contrast, have a more dialectical thinking style, resulting in expectations of more malleable or changing outcomes (see also </span><a data-dcnode-id="5381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="5382" instrument_node="">Peng and Nisbett, 1997</span></a><span data-dcnode-id="5380" instrument_node="">). East Asians’ greater dialectical thinking, or the degree to which contradictions are tolerated, is thought to drive the more predominant emotional complexity (i.e., concurrence of positive and negative emotion) of East-Asians relative to Westerners (</span><a data-dcnode-id="5378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="5379" instrument_node="">Spencer-Rodgers et al., 2010</span></a><span data-dcnode-id="5377" instrument_node="">). Because dialectical thinking involves a greater expectation of change, it is likely that any thought about emotion will be less extreme. This is because if something is expected to change or fluctuate, it would not be taken in the extreme view. Linear thinkers, on the other hand, expect stability, so their thoughts might be grounded more in the extremes (less likely to change because they are so strong). One difference between dialectical and linear thinking styles lies in how people from different cultures view events. Easterners tend to take a more balanced view of negative events compared to Westerners (</span><a data-dcnode-id="5375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B21"><span data-dcnode-id="5376" instrument_node="">Ji et al., 2004</span></a><span data-dcnode-id="5374" instrument_node="">). Indeed, findings suggest that people from dialectical and collectivist cultures (Chinese, Koreans, Japanese, Indonesians, and Malaysians) make less polarized life quality judgments, whether negative or positive, compared to non-dialectical thinkers and individualist cultures (e.g., Americans; </span><a data-dcnode-id="5372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B31"><span data-dcnode-id="5373" instrument_node="">Minkov, 2009</span></a><span data-dcnode-id="5371" instrument_node="">).</span></p><span data-dcnode-id="5369" instrument_node="">
</span><p class="mb15" data-dcnode-id="5361"><span data-dcnode-id="5368" instrument_node="">Greater dialectical thinking among East Asians than European North Americans also contributes to cultural differences in emotion regulation. </span><a data-dcnode-id="5366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B32"><span data-dcnode-id="5367" instrument_node="">Miyamoto and Ma (2011)</span></a><span data-dcnode-id="5365" instrument_node="">, in a series of studies, showed that, although people in general want to savor rather than dampen their positive emotions, such hedonic emotion regulation was weaker among Asians than among Americans. Furthermore, dialectical beliefs about positive emotions mediated such cultural differences. As a whole, these findings indicate that culturally specific dialectical beliefs guide both emotion regulation and emotional experience. In fact, people from interdependent cultures tend to report experiencing positive and negative emotions simultaneously (</span><a data-dcnode-id="5363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="5364" instrument_node="">Spencer-Rodgers et al., 2010</span></a><span data-dcnode-id="5362" instrument_node="">). This suggests that dialecticism results in emotional complexity.</span></p><span data-dcnode-id="5360" instrument_node="">
</span><p class="mb15" data-dcnode-id="5340"><span data-dcnode-id="5359" instrument_node="">There are individual and cultural variations in how positive and negative emotions are perceived (</span><a data-dcnode-id="5357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="5358" instrument_node="">Eid and Diener, 2001</span></a><span data-dcnode-id="5356" instrument_node="">; </span><a data-dcnode-id="5354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B33"><span data-dcnode-id="5355" instrument_node="">Miyamoto et al., 2014</span></a><span data-dcnode-id="5353" instrument_node="">; </span><a data-dcnode-id="5351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B51"><span data-dcnode-id="5352" instrument_node="">Sims et al., 2015</span></a><span data-dcnode-id="5350" instrument_node="">). For instance, </span><a data-dcnode-id="5348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B28"><span data-dcnode-id="5349" instrument_node="">Luong et al. (2016)</span></a><span data-dcnode-id="5347" instrument_node=""> reported evidence that people differ in negative affect valuation – the extent to which negative affective states are valued as pleasant, useful/helpful, appropriate, and meaningful experience, which has implications for the links between affective experience and psychological/physical well-being. Furthermore, </span><a data-dcnode-id="5345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B45"><span data-dcnode-id="5346" instrument_node="">Riediger et al. (2014)</span></a><span data-dcnode-id="5344" instrument_node=""> showed evidence through experience sampling that people experience both positive and negative (i.e., mixed) affects simultaneously, which was especially true for adolescents and younger adults. Cross-culturally, </span><a data-dcnode-id="5342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B33"><span data-dcnode-id="5343" instrument_node="">Miyamoto et al. (2014)</span></a><span data-dcnode-id="5341" instrument_node=""> found that Asians were less likely than Euro-Americans to engage in hedonic emotion regulation after experiencing a negative event or feeling a negative emotion, mediated by stronger dialectical beliefs among Asians than among Euro-Americans. Indeed, Asians had a more positive view of negative emotions, as they were more likely than Euro-Americans to believe in the motivational and cognitive utility of negative emotions.</span></p><span data-dcnode-id="5339" instrument_node="">
</span><p class="mb0" data-dcnode-id="5337"><span data-dcnode-id="5338" instrument_node="">One issue is that although previous research suggests the possibility that each emotion contains both positivity and negativity, most researchers have relied on bipolar measures to assess the cognitive and affective components of emotions, which made it impossible to examine the extent to which different emotions are ambivalent, containing both positivity and negativity. The present research extends the earlier work by taking a new approach in methodology, in which we measure positivity and negativity of emotion separately.</span></p><span data-dcnode-id="5336" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="5335" id="h3" name="h3"></a><h2 data-dcnode-id="5333"><span data-dcnode-id="5334" instrument_node="">Hypotheses</span></h2><span data-dcnode-id="5332" instrument_node="">
</span><p class="mb0" data-dcnode-id="5330"><span data-dcnode-id="5331" instrument_node="">Based on the theoretical and empirical evidence reviewed above, we generated three hypotheses. First, although most emotions may be most salient in either positivity (e.g., in the case of happiness) or negativity (e.g., in the case of sadness), we hypothesized that each emotion would contain some degree of both positivity and negativity (H1). Second, based on research that the affective component of emotion is more intense and extreme than the cognitive component, we hypothesized that the positivity and negativity ratings would be more divergent for affective than for cognitive components. For example, sadness, which is salient in negativity, should be rated more negatively on the affective than the cognitive component, and relatively less positively on the affective than cognitive component (H2). Finally, based on the review of the culture and emotion literature, we hypothesized that American and Canadian ratings would be higher for the salient valence (e.g., negativity for sadness) and lower for the less salient valence (e.g., positivity for sadness) of an emotion, compared to Chinese and Koreans (H3).</span></p><span data-dcnode-id="5329" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="5328" id="h4" name="h4"></a><h2 data-dcnode-id="5326"><span data-dcnode-id="5327" instrument_node="">Materials and Methods</span></h2><span data-dcnode-id="5325" instrument_node="">
</span><h3 class="pt0" data-dcnode-id="5323"><span data-dcnode-id="5324" instrument_node="">Participants</span></h3><span data-dcnode-id="5322" instrument_node="">
</span><p class="mb0" data-dcnode-id="5305"><span data-dcnode-id="5321" instrument_node="">Our sample included a total of 458 undergraduate students (166 men and 292 women) recruited in four countries: 147 South Koreans (61 men and 86 women, mean age 20.51, </span><i data-dcnode-id="5319"><span data-dcnode-id="5320" instrument_node="">SD</span></i><span data-dcnode-id="5318" instrument_node=""> = 2.04), 90 Chinese (44 men and 46 women, mean age 18.87, </span><i data-dcnode-id="5316"><span data-dcnode-id="5317" instrument_node="">SD</span></i><span data-dcnode-id="5315" instrument_node=""> = 1.06), 109 Euro-Canadians (15 men and 94 women, mean age 19.11, </span><i data-dcnode-id="5313"><span data-dcnode-id="5314" instrument_node="">SD</span></i><span data-dcnode-id="5312" instrument_node=""> = 6.96), and 112 Americans (46 men and 66 women, mean age 21.39, </span><i data-dcnode-id="5310"><span data-dcnode-id="5311" instrument_node="">SD</span></i><span data-dcnode-id="5309" instrument_node=""> = 5.76). The Americans were Caucasians (30%), Hispanics (62%), and others (8%; Native Americans, Black, etc.); however, Asians were excluded from the American sample. Preliminary analyses on ethnicity in the American sample revealed no significant differences between Caucasians and Hispanics (</span><i data-dcnode-id="5307"><span data-dcnode-id="5308" instrument_node="">ps</span></i><span data-dcnode-id="5306" instrument_node=""> ≥ 0.263). All participants participated in exchange for partial course credit or small gifts. Participants from South Korea and China were all nationally and ethnically Koreans and Chinese, respectively. Participants from Canada and the US were all nationally Canadians and Americans, respectively.</span></p><span data-dcnode-id="5304" instrument_node="">
</span><h3 data-dcnode-id="5302"><span data-dcnode-id="5303" instrument_node="">Design and Procedure</span></h3><span data-dcnode-id="5301" instrument_node="">
</span><p class="mb15" data-dcnode-id="5296"><span data-dcnode-id="5300" instrument_node="">The experiment employed a 6 (emotions: sadness, fear, disgust, anger, happiness, and surprise) × 2 (valence: negative vs. positive) × 2 (emotional component: affective vs. cognitive) × 4 (culture: South Korea, China, Canada, US) mixed participants design, with the first three variables as within-participant factors. In order to avoid culturally specific or unique emotions, we employed the six basic emotions, as research suggests that these emotions are universal (</span><a data-dcnode-id="5298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="5299" instrument_node="">Ekman, 1992</span></a><span data-dcnode-id="5297" instrument_node="">).</span></p><span data-dcnode-id="5295" instrument_node="">
</span><p class="mb15" data-dcnode-id="5269"><span data-dcnode-id="5294" instrument_node="">The study was conducted in a lab setting, with all measures presented on a computer monitor. First, participants thought about each basic emotion (presented in a random order), and then responded to two questions measuring the affective positivity and negativity, and cognitive positivity and negativity of each emotion in a random order, respectively, on a scale from 0 (not at all) to 6 (extremely). Take sadness as an example: We asked two questions to measure sadness’s affective positivity (“</span><i data-dcnode-id="5292"><span data-dcnode-id="5293" instrument_node="">How positive does experiencing sadness feel to you?</span></i><span data-dcnode-id="5291" instrument_node="">” “</span><i data-dcnode-id="5289"><span data-dcnode-id="5290" instrument_node="">How good do you feel when you are feeling sad?</span></i><span data-dcnode-id="5288" instrument_node="">”), affective negativity (“</span><i data-dcnode-id="5286"><span data-dcnode-id="5287" instrument_node="">How negative does experiencing sadness feel to you?</span></i><span data-dcnode-id="5285" instrument_node="">” “</span><i data-dcnode-id="5283"><span data-dcnode-id="5284" instrument_node="">How bad do you feel when you are feeling sad?</span></i><span data-dcnode-id="5282" instrument_node="">”), cognitive positivity (“</span><i data-dcnode-id="5280"><span data-dcnode-id="5281" instrument_node="">To what extent do you think the emotion of sadness is positive?</span></i><span data-dcnode-id="5279" instrument_node="">” “</span><i data-dcnode-id="5277"><span data-dcnode-id="5278" instrument_node="">Overall, how positive do you think experiencing the emotion of sadness is?</span></i><span data-dcnode-id="5276" instrument_node="">”), and cognitive negativity (“</span><i data-dcnode-id="5274"><span data-dcnode-id="5275" instrument_node="">To what extent do you think the emotion of sadness is negative?</span></i><span data-dcnode-id="5273" instrument_node="">” “</span><i data-dcnode-id="5271"><span data-dcnode-id="5272" instrument_node="">Overall, how negative do you think experiencing the emotion of sadness is</span></i><span data-dcnode-id="5270" instrument_node="">?”).</span></p><span data-dcnode-id="5268" instrument_node="">
</span><p class="mb0" data-dcnode-id="5263"><span data-dcnode-id="5267" instrument_node="">The study was conducted in the participants’ native language. Study materials were developed in English, and then translated into Chinese and Korean for those respective samples. Several bilingual research assistants assisted with the translation, or checked the back translation for equivalence across languages. The first two authors also reviewed the translation to ensure equivalence across languages. See Table </span><a data-dcnode-id="5265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="5266" instrument_node="">1</span></a><span data-dcnode-id="5264" instrument_node=""> for the Korean, Chinese, and English translations of each emotion.</span></p><span data-dcnode-id="5262" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="5261"></div><span data-dcnode-id="5260" instrument_node="">

</span><a data-dcnode-id="5253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/253368/fpsyg-08-00610-HTML/image_m/fpsyg-08-00610-t001.jpg" name="table1" target="_blank"><span data-dcnode-id="5255" instrument_node="">
</span><img alt="www.frontiersin.org" data-dcnode-id="5254" id="T1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/253368/fpsyg-08-00610-HTML/image_t/fpsyg-08-00610-t001.gif&amp;raw"></a><span data-dcnode-id="5252" instrument_node="">

</span><a class="reset-hash-position" data-dcnode-id="5238" id="h5" name="h5"></a><h2 data-dcnode-id="5236"><span data-dcnode-id="5237" instrument_node="">Results</span></h2><span data-dcnode-id="5235" instrument_node="">
</span><h3 class="pt0" data-dcnode-id="5233"><span data-dcnode-id="5234" instrument_node="">Item Reliability</span></h3><span data-dcnode-id="5232" instrument_node="">
</span><p class="mb0" data-dcnode-id="5224"><span data-dcnode-id="5231" instrument_node="">Given that we used two items to measure each valence (negativity and positivity) for each emotion (sadness, fear, disgust, anger, surprise, and happiness), for the affective and cognitive components, respectively, we first calculated the correlations between these two items before averaging them. The correlations ranged from 0.59 to 0.73 across emotions for affective positivity ratings, and from 0.46 to 0.76 for affective negativity ratings, </span><i data-dcnode-id="5229"><span data-dcnode-id="5230" instrument_node="">ps</span></i><span data-dcnode-id="5228" instrument_node=""> &lt; 0.001. The correlations ranged from 0.58 to 0.78 for cognitive positivity ratings, and from 0.65 to 0.80 for cognitive negativity ratings, </span><i data-dcnode-id="5226"><span data-dcnode-id="5227" instrument_node="">ps</span></i><span data-dcnode-id="5225" instrument_node=""> &lt; 0.001. Thus, the two items showed reasonable reliability overall, so we used the mean of the two items in subsequent ANOVA analyses. A preliminary analysis revealed no significant main effects or interactions involving gender, and therefore gender is not included in the following analyses.</span></p><span data-dcnode-id="5223" instrument_node="">
</span><h3 data-dcnode-id="5221"><span data-dcnode-id="5222" instrument_node="">The Coexistence of Positivity and Negativity</span></h3><span data-dcnode-id="5220" instrument_node="">
</span><p class="mb0" data-dcnode-id="4986"><span data-dcnode-id="5219" instrument_node="">To test Hypothesis 1, we compared the average positivity and negativity ratings of the affective and cognitive components for each emotion to zero (which means “not at all” positive or negative) and found all the comparisons significant, </span><i data-dcnode-id="5217"><span data-dcnode-id="5218" instrument_node="">ts</span></i><span data-dcnode-id="5216" instrument_node=""> &gt; 13.58, </span><i data-dcnode-id="5214"><span data-dcnode-id="5215" instrument_node="">ps</span></i><span data-dcnode-id="5213" instrument_node=""> &lt; 0.001. Thus, H1, that each emotion contained some degree of positivity and negativity is supported (Figure </span><a data-dcnode-id="5211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F1"><span data-dcnode-id="5212" instrument_node="">1</span></a><span data-dcnode-id="5210" instrument_node="">). Further analyses showed that the ratings of positivity and negativity ratings were most divergent for happiness, followed by disgust, anger, sadness, fear, and surprise, in that order, </span><i data-dcnode-id="5208"><span data-dcnode-id="5209" instrument_node="">Fs</span></i><span data-dcnode-id="5207" instrument_node="">(1,457) ≥ 4.20, </span><i data-dcnode-id="5205"><span data-dcnode-id="5206" instrument_node="">ps</span></i><span data-dcnode-id="5204" instrument_node=""> ≤ 0.041.</span><sup data-dcnode-id="5200" id="footnotesuper1"><a data-dcnode-id="5203" id="note1a"></a><a class="footnoteanchor" data-dcnode-id="5201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note1"><span data-dcnode-id="5202" instrument_node="">1</span></a></sup><span data-dcnode-id="5199" instrument_node=""> If less divergent ratings of positivity and negativity indicate ambivalence, the results showed that surprise is a much more ambivalent emotion than happiness, with anger, disgust, fear and sadness in between. Such between-emotion differences cannot be explained by response biases, such as random responding or acquiescence. Additionally, we performed a 6 (emotion) × 2 (valence) × 4 (country) mixed ANOVA with emotional ratings averaged across affective and cognitive components as the dependent variable. There was a significant main effect of emotion, </span><i data-dcnode-id="5197"><span data-dcnode-id="5198" instrument_node="">F</span></i><span data-dcnode-id="5196" instrument_node="">(5,454) = 14.10, </span><i data-dcnode-id="5194"><span data-dcnode-id="5195" instrument_node="">p</span></i><span data-dcnode-id="5193" instrument_node=""> &lt; 0.001, </span><span class="MathJax_Preview" data-dcnode-id="5192" style="color: inherit; display: none;"></span><span class="MathJax" data-dcnode-id="5152" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow><msubsup><mrow><mi mathvariant=&quot;normal&quot;>&amp;#x3B7;</mi></mrow><mrow><mi mathvariant=&quot;normal&quot;>p</mi></mrow><mrow><mn>2</mn></mrow></msubsup></mrow></math>" id="MathJax-Element-1-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="5166"><span class="math" data-dcnode-id="5167" id="MathJax-Span-1" style="width: 1.054em; display: inline-block;"><span data-dcnode-id="5169" style="display: inline-block; position: relative; width: 0.951em; height: 0px; font-size: 111%;"><span data-dcnode-id="5170" style="position: absolute; clip: rect(1.163em, 1000.95em, 2.512em, -1000em); top: -2.102em; left: 0em;"><span class="mrow" data-dcnode-id="5172" id="MathJax-Span-2"><span class="mrow" data-dcnode-id="5173" id="MathJax-Span-3"><span class="msubsup" data-dcnode-id="5174" id="MathJax-Span-4"><span data-dcnode-id="5175" style="display: inline-block; position: relative; width: 0.93em; height: 0px;"><span data-dcnode-id="5186" style="position: id="4991"><span data-dcnode-id="4992" instrument_node="">ps</span></i><span data-dcnode-id="4990" instrument_node=""> ≤ 0.013. Again, these between-emotional and cross-cultural differences cannot be explained by random responding. See Table </span><a data-dcnode-id="4988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T2"><span data-dcnode-id="4989" instrument_node="">2</span></a><span data-dcnode-id="4987" instrument_node=""> for mean differences of each emotion across countries.</span></p><span data-dcnode-id="4985" instrument_node="">

</span><p class="mb15 w100pc float_left mt15" data-dcnode-id="4896"><span data-dcnode-id="4903" instrument_node="">Finally, we used the MIN statistic (</span><a data-dcnode-id="4901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B49"><span data-dcnode-id="4902" instrument_node="">Schimmack, 2001</span></a><span data-dcnode-id="4900" instrument_node="">) to test H1. According to Schimmack, the intensity of the weaker rating in valence, is a “more appropriate statistic (p92)” to test whether positivity and negativity are mutually exclusive. If positivity and negativity belonged to the same dimension (as unipolar opposites), then MIN value should be close to zero. We computed MIN value as the lower of the two valence ratings (i.e., I[V] = MIN[I[P],I[N]]), with I[V] being the MIN score, I[P] the ratings of positivity and I[N] the ratings of negativity. Comparing this MIN score to zero within each emotion and each culture, we found that all MIN scores were greater than zero (</span><i data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">ps</span></i><span data-dcnode-id="4897" instrument_node=""> &lt; 0.001), supporting H1.</span></p><span data-dcnode-id="4895" instrument_node="">
</span><p class="mb0" data-dcnode-id="4719"><span data-dcnode-id="4894" instrument_node="">We then conducted a 4 (country) × 6 (emotion) mixed ANOVA on MIN scores. There was a significant main effect of country, </span><i data-dcnode-id="4892"><span data-dcnode-id="4893" instrument_node="">F</span></i><span data-dcnode-id="4891" instrument_node="">(3,454) = 18.62, </span><i data-dcnode-id="4889"><span data-dcnode-id="4890" instrument_node="">p</span></i><span data-dcnode-id="4888" instrument_node=""> &lt; 0.001, </span><span class="MathJax_Preview" data-dcnode-id="4887" style="color: inherit; display: none;"></span><span class="MathJax" data-dcnode-id="4847" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow><msubsup><mrow><mi mathvariant=&quot;normal&quot;>&amp;#x3B7;</mi></mrow><mrow><mi mathvariant=&quot;normal&quot;>p</mi></mrow><mrow><mn>2</mn></mrow></msubsup></mrow></math>" id="MathJax-Element-5-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="4861"><span class="math" data-dcnode-id="4862" id="MathJax-Span-41" style="width: 1.054em; display: inline-block;"><span data-dcnode-id="4864" style="display: inline-block; position: relative; width: 0.951em; height: 0px; font-size: 111%;"><span data-dcnode-id="4865" style="position: absolute; clip: rect(1.163em, 1000.95em, 2.512em, -1000em); top: -2.102em; left: 0em;"><span class="mrow" data-dcnode-id="4867" id="MathJax-Span-42"><span class="mrow" data-dcnode-id="4868" id="MathJax-Span-43"><span class="msubsup" data-dcnode-id="4869" id="MathJax-Span-44"><span data-dcnode-id="4870" style="display: inline-block; position: relative; width: 0.93em; height: 0px;"><span data-dcnode-id="4881" style="position: absolute; clip: rect(3.441em, 1000.47em, 4.356em, -1000em); top: -4.004em; left: 0em;"><span class="mrow" data-dcnode-id="4883" id="MathJax-Span-45"><span class="mi" data-dcnode-id="4884" id="MathJax-Span-46"><img data-dcnode-id="4886" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Math/Italic/400/03B7.png%3FV%3D2.7.1&amp;raw" style="width: 9px; height: 13px; vertical-align: -4px; margin-right: -0.006em;"><span data-dcnode-id="4885" style="display: inline-block; overflow: hidden; height: 1px; width: 0.006em;"></span></span></span><span data-dcnode-id="4882" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="4876" style="position: absolute; clip: rect(3.409em, 1000.41em, 4.154em, -1000em); top: -4.348em; left: 0.522em;"><span class="mrow" data-dcnode-id="4878" id="MathJax-Span-47"><span class="mn" data-dcnode-id="4879" id="MathJax-Span-48" style="font-size: 70.7%;"><img data-dcnode-id="4880" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0032.png%3FV%3D2.7.1&amp;raw" style="width: 6px; height: 9px; margin-right: 0.048em;"></span></span><span data-dcnode-id="4877" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="4871" style="position: absolute; clip: rect(3.559em, 1000.45em, 4.284em, -1000em); top: -3.873em; left: 0.464em;"><span class="mrow" data-dcnode-id="4873" id="MathJax-Span-49"><span class="mi" data-dcnode-id="4874" id="MathJax-Span-50" style="font-size: 70.7%;"><img data-dcnode-id="4875" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0070.png%3FV%3D2.7.1&amp;raw" style="width: 7px; height: 8px; vertical-align: -3px; margin-right: 0.032em;"></span></span><span data-dcnode-id="4872" style="display: inline-block; width: 0px; height: 4.004em;"></span></span></span></span></span></span><span data-dcnode-id="4866" style="display: inline-block; width: 0px; height: 2.102em;"></span></span></span><span data-dcnode-id="4863" style="display: inline-block; overflow: hidden; vertical-align: -0.344em; border-left: 0px solid; width: 0px; height: 1.275em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="4848" role="presentation"><math data-dcnode-id="4849" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="4850"><msubsup data-dcnode-id="4851"><mrow data-dcnode-id="4858"><mi data-dcnode-id="4859" mathvariant="normal"><span data-dcnode-id="4860" instrument_node="">η</span></mi></mrow><mrow data-dcnode-id="4855"><mi data-dcnode-id="4856" mathvariant="normal"><span data-dcnode-id="4857" instrument_node="">p</span></mi></mrow><mrow data-dcnode-id="4852"><mn data-dcnode-id="4853"><span data-dcnode-id="4854" instrument_node="">2</span></mn></mrow></msubsup></mrow></math></span></span><span data-dcnode-id="4844" instrument_node=""> = 0.11. </span><i data-dcnode-id="4842"><span data-dcnode-id="4843" instrument_node="">Post hoc</span></i><span data-dcnode-id="4841" instrument_node=""> analyses showed that Koreans and Chinese were not different from each other (</span><i data-dcnode-id="4839"><span data-dcnode-id="4840" instrument_node="">p</span></i><span data-dcnode-id="4838" instrument_node=""> = 0.111), Canadians and Americans were not different from each other (</span><i data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">p</span></i><span data-dcnode-id="4835" instrument_node=""> = 0.826), but the two East Asian groups significantly differently from the two North American groups (</span><i data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">ps</span></i><span data-dcnode-id="4832" instrument_node=""> &lt; 0.001). There was a significant main effect of emotion, </span><i data-dcnode-id="4830"><span data-dcnode-id="4831" instrument_node="">F</span></i><span data-dcnode-id="4829" instrument_node="">(5,452) = 222.19, </span><i data-dcnode-id="4827"><span data-dcnode-id="4828" instrument_node="">p</s ock; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="4814" style="position: absolute; clip: rect(3.409em, 1000.41em, 4.154em, -1000em); top: -4.348em; left: 0.522em;"><span class="mrow" data-dcnode-id="4816" id="MathJax-Span-57"><span class="mn" data-dcnode-id="4817" id="MathJax-Span-58" style="font-size: 70.7%;"><img data-dcnode-id="4818" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0032.png%3FV%3D2.7.1&amp;raw" style="width: 6px; height: 9px; margin-right: 0.048em;"></span></span><span data-dcnode-id="4815" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="4809" style="position: absolute; clip: rect(3.559em, 1000.45em, 4.284em, -1000em); top: -3.873em; left: 0.464em;"><span class="mrow" data-dcnode-id="4811" id="MathJax-Span-59"><span class="mi" data-dcnode-id="4812" id="MathJax-Span-60" style="font-size: 70.7%;"><img data-dcnode-id="4813" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0070.png%3FV%3D2.7.1&amp;raw" style="width: 7px; height: 8px; vertical-align: -3px; margin-right: 0.032em;"></span></span><span data-dcnode-id="4810" style="display: inline-block; width: 0px; height: 4.004em;"></span></span></span></span></span></span><span data-dcnode-id="4804" style="display: inline-block; width: 0px; height: 2.102em;"></span></span></span><span data-dcnode-id="4801" style="display: inline-block; overflow: hidden; vertical-align: -0.344em; border-left: 0px solid; width: 0px; height: 1.275em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="4786" role="presentation"><math data-dcnode-id="4787" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="4788"><msubsup data-dcnode-id="4789"><mrow data-dcnode-id="4796"><mi data-dcnode-id="4797" mathvariant="normal"><span data-dcnode-id="4798" instrument_node="">η</span></mi></mrow><mrow data-dcnode-id="4793"><mi data-dcnode-id="4794" mathvariant="normal"><span data-dcnode-id="4795" instrument_node="">p</span></mi></mrow><mrow data-dcnode-id="4790"><mn data-dcnode-id="4791"><span data-dcnode-id="4792" instrument_node="">2</span></mn></mrow></msubsup></mrow></math></span></span><span data-dcnode-id="4782" instrument_node=""> = 0.71. </span><i data-dcnode-id="4780"><span data-dcnode-id="4781" instrument_node="">Post hoc</span></i><span data-dcnode-id="4779" instrument_node=""> analyses showed that the MIN scores for anger and sadness did not differ from each other (</span><i data-dcnode-id="4777"><span data-dcnode-id="4778" instrument_node="">p</span></i><span data-dcnode-id="4776" instrument_node=""> = 0.201), but all other pair-wise comparisons between any two emotions were significant (</span><i data-dcnode-id="4774"><span data-dcnode-id="4775" instrument_node="">ps</span></i><span data-dcnode-id="4773" instrument_node=""> &lt; 0.001). In addition, these main effects were qualified by a significant two-way interaction between country and emotion, </span><i data-dcnode-id="4771"><span data-dcnode-id="4772" instrument_node="">F</span></i><span data-dcnode-id="4770" instrument_node="">(24,434) = 25.19, </span><i data-dcnode-id="4768"><span data-dcnode-id="4769" instrument_node="">p</span></i><span data-dcnode-id="4767" instrument_node=""> &lt; 0.001, </span><span class="MathJax_Preview" data-dcnode-id="4766" style="color: inherit; display: none;"></span><span class="MathJax" data-dcnode-id="4726" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow><msubsup><mrow><mi mathvariant=&quot;normal&quot;>&amp;#x3B7;</mi></mrow><mrow><mi mathvariant=&quot;normal&quot;>p</mi></mrow><mrow><mn>2</mn></mrow></msubsup></mrow></math>" id="MathJax-Element-7-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcn : 0.048em;"></span></span><span data-dcnode-id="4756" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="4750" style="position: absolute; clip: rect(3.559em, 1000.45em, 4.284em, -1000em); top: -3.873em; left: 0.464em;"><span class="mrow" data-dcnode-id="4752" id="MathJax-Span-69"><span class="mi" data-dcnode-id="4753" id="MathJax-Span-70" style="font-size: 70.7%;"><img data-dcnode-id="4754" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0070.png%3FV%3D2.7.1&amp;raw" style="width: 7px; height: 8px; vertical-align: -3px; margin-right: 0.032em;"></span></span><span data-dcnode-id="4751" style="display: inline-block; width: 0px; height: 4.004em;"></span></span></span></span></span></span><span data-dcnode-id="4745" style="display: inline-block; width: 0px; height: 2.102em;"></span></span></span><span data-dcnode-id="4742" style="display: inline-block; overflow: hidden; vertical-align: -0.344em; border-left: 0px solid; width: 0px; height: 1.275em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="4727" role="presentation"><math data-dcnode-id="4728" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="4729"><msubsup data-dcnode-id="4730"><mrow data-dcnode-id="4737"><mi data-dcnode-id="4738" mathvariant="normal"><span data-dcnode-id="4739" instrument_node="">η</span></mi></mrow><mrow data-dcnode-id="4734"><mi data-dcnode-id="4735" mathvariant="normal"><span data-dcnode-id="4736" instrument_node="">p</span></mi></mrow><mrow data-dcnode-id="4731"><mn data-dcnode-id="4732"><span data-dcnode-id="4733" instrument_node="">2</span></mn></mrow></msubsup></mrow></math></span></span><span data-dcnode-id="4723" instrument_node=""> = 0.22. See Table </span><a data-dcnode-id="4721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T3"><span data-dcnode-id="4722" instrument_node="">3</span></a><span data-dcnode-id="4720" instrument_node="">.</span></p><span data-dcnode-id="4718" instrument_node="">
</span><div class="clear" data-dcnode-id="4717"></div><span data-dcnode-id="4716" instrument_node="">
</span><div class="DottedLine mb15" data-dcnode-id="4715"></div><span data-dcnode-id="4714" instrument_node="">
</span><div class="Imageheaders" data-dcnode-id="4712"><span data-dcnode-id="4713" instrument_node="">TABLE 3</span></div><span data-dcnode-id="4711" instrument_node="">

</span><a data-dcnode-id="4707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/253368/fpsyg-08-00610-HTML/image_m/fpsyg-08-00610-t003.jpg" name="table3" target="_blank"><span data-dcnode-id="4709" instrument_node="">
</span><img alt="www.frontiersin.org" data-dcnode-id="4708" id="T3" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/253368/fpsyg-08-00610-HTML/image_t/fpsyg-08-00610-t003.gif&amp;raw"></a><span data-dcnode-id="4706" instrument_node="">
</span><p data-dcnode-id="4700"><strong data-dcnode-id="4704"><span data-dcnode-id="4705" instrument_node="">TABLE 3.</span></strong><span data-dcnode-id="4703" instrument_node=""> </span><b data-dcnode-id="4701"><span data-dcnode-id="4702" instrument_node="">MIN Scores of Six Emotions in Korea, China, Canada, and the US.</span></b></p><span data-dcnode-id="4699" instrument_node="">
