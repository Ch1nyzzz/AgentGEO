</span><div class="DottedLine" data-dcnode-id="4694"></div><span data-dcnode-id="4693" instrument_node="">
</span><p class="mb15 w100pc float_left mt15" data-dcnode-id="4640"><span data-dcnode-id="4692" instrument_node="">We examined each emotion separately to better understand the interaction effects. Simple effect analyses showed that for anger, Koreans had a higher MIN score than the other three groups (</span><i data-dcnode-id="4690"><span data-dcnode-id="4691" instrument_node="">ps</span></i><span data-dcnode-id="4689" instrument_node=""> ≤ 0.042)</span><sup data-dcnode-id="4685" id="footnotesuper2"><a data-dcnode-id="4688" id="note2a"></a><a class="footnoteanchor" data-dcnode-id="4686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note2"><span data-dcnode-id="4687" instrument_node="">2</span></a></sup><span data-dcnode-id="4684" instrument_node=""> while the other three groups did not differ from one another (</span><i data-dcnode-id="4682"><span data-dcnode-id="4683" instrument_node="">ps</span></i><span data-dcnode-id="4681" instrument_node=""> &gt; 0.352). For sadness, each country was significantly differently from any other country (</span><i data-dcnode-id="4679"><span data-dcnode-id="4680" instrument_node="">ps</span></i><span data-dcnode-id="4678" instrument_node=""> ≤ 0.038)</span><sup data-dcnode-id="4674" id="footnotesuper3"><a data-dcnode-id="4677" id="note3a"></a><a class="footnoteanchor" data-dcnode-id="4675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note3"><span data-dcnode-id="4676" instrument_node="">3</span></a></sup><span data-dcnode-id="4673" instrument_node="">. For fear, Koreans were significantly higher than Chinese and Americans (</span><i data-dcnode-id="4671"><span data-dcnode-id="4672" instrument_node="">ps</span></i><span data-dcnode-id="4670" instrument_node=""> ≤ 0.015) and Canadians were significantly higher than Americans (</span><i data-dcnode-id="4668"><span data-dcnode-id="4669" instrument_node="">p</span></i><span data-dcnode-id="4667" instrument_node=""> = 0.017), but no other pair-wise comparisons were significant (</span><i data-dcnode-id="4665"><span data-dcnode-id="4666" instrument_node="">ps</span></i><span data-dcnode-id="4664" instrument_node=""> ≥ 0.166). For disgust, Koreans and Chinese were significantly higher than Canadians or Americans (</span><i data-dcnode-id="4662"><span data-dcnode-id="4663" instrument_node="">ps</span></i><span data-dcnode-id="4661" instrument_node=""> ≤ 0.001), with no significant difference between Koreans and Chinese or between Canadians and Americans (</span><i data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">ps</span></i><span data-dcnode-id="4658" instrument_node=""> ≥ 0.538). For happiness, Koreans and Chinese were significantly higher than Canadians or Americans (</span><i data-dcnode-id="4656"><span data-dcnode-id="4657" instrument_node="">ps</span></i><span data-dcnode-id="4655" instrument_node=""> ≥ 0.005), with no significant difference between Koreans and Chinese or between Canadians and Americans (</span><i data-dcnode-id="4653"><span data-dcnode-id="4654" instrument_node="">ps</span></i><span data-dcnode-id="4652" instrument_node=""> ≤ 0.234). For surprise, Americans were significantly lower than each of the other groups (</span><i data-dcnode-id="4650"><span data-dcnode-id="4651" instrument_node="">ps</span></i><span data-dcnode-id="4649" instrument_node=""> ≤ 0.025)</span><sup data-dcnode-id="4645" id="footnotesuper4"><a data-dcnode-id="4648" id="note4a"></a><a class="footnoteanchor" data-dcnode-id="4646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note4"><span data-dcnode-id="4647" instrument_node="">4</span></a></sup><span data-dcnode-id="4644" instrument_node="">, whereas the other three groups did not differ from one another (</span><i data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">ps</span></i><span data-dcnode-id="4641" instrument_node=""> ≥ 0.094). Given that all MIN scores were significantly greater than zero, we conclude that positivity and negativity are not mutually exclusive, and can co-exist in each emotion. Differences in each emotion are addressed in the following analyses of H2 and H3.</span></p><span data-dcnode-id="4639" instrument_node="">
</span><p class="mb15" data-dcnode-id="4637"><span data-dcnode-id="4638" instrument_node="">Before further hypothesis testing, we conducted a series of exploratory factor analyses (EFA) in order to confirm that participants’ cognitive and affective component responses actually loaded on separate factors. First, we ran a principal axis factor analysis with varimax rotation on each of the six emotions. For each emotion except surprise, examination of the rotated factor matrices revealed the best fit was a two-factor solution with the cognitive components on one factor and the affective components on the other, and within each factor, the positive and negative component loading on opposite sides (i.e., positive factor loadings were positive, and negative factor loadings were negative). For surprise, the rotated factor matrix revealed positive components (both affective and cognitive) loaded on one factor, and negative components (both affective and cognitive) on the other.</span></p><span data-dcnode-id="4636" instrument_node="">
</span><p class="mb0" data-dcnode-id="4631"><span data-dcnode-id="4635" instrument_node="">In order to confirm the results of the EFAs, confirmatory factor analyses (CFA) using Maximum Likelihood Estimation were conducted using AMOS software. For each emotion, both one-factor (cognitive and affective together) and two-factor (cognitive and affective separately) models were run. For all six emotions, the two-factor model was a better fit than the one-factor model based on several fit indices (GFI, CFI, and RMSEA). See Table </span><a data-dcnode-id="4633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T4"><span data-dcnode-id="4634" instrument_node="">4</span></a><span data-dcnode-id="4632" instrument_node="">. Taken together, the analyses support the separation of the cognitive and affective components.</span></p><span data-dcnode-id="4630" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="4629"></div><span data-dcnode-id="4628" instrument_node="">
</span><div class="Imageheaders" data-dcnode-id="4626"><span data-dcnode-id="4627" instrument_node="">TABLE 4</span></div><span data-dcnode-id="4625" instrument_node="">
</span><div class="FigureDesc" data-dcnode-id="4612"><span data-dcnode-id="4624" instrument_node="">
</span><a data-dcnode-id="4621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/253368/fpsyg-08-00610-HTML/image_m/fpsyg-08-00610-t004.jpg" name="table4" target="_blank"><span data-dcnode-id="4623" instrument_node="">
</span><img alt="www.frontiersin.org" data-dcnode-id="4622" id="T4" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/253368/fpsyg-08-00610-HTML/image_t/fpsyg-08-00610-t004.gif&amp;raw"></a><span data-dcnode-id="4620" instrument_node="">
</span><p data-dcnode-id="4614"><strong data-dcnode-id="4618"><span data-dcnode-id="4619" instrument_node="">TABLE 4.</span></strong><span data-dcnode-id="4617" instrument_node=""> </span><b data-dcnode-id="4615"><span data-dcnode-id="4616" instrument_node="">Goodness-of-fit indicators of models of six emotions.</span></b></p><span data-dcnode-id="4613" instrument_node="">
</span></div><span data-dcnode-id="4611" instrument_node="">

</span><div class="DottedLine" data-dcnode-id="4608"></div><span data-dcnode-id="4607" instrument_node="">
</span><p class="mb15 w100pc float_left mt15" data-dcnode-id="4219"><span data-dcnode-id="4606" instrument_node="">To examine H2 and H3, we conducted a 2 (valence: negative vs. positive) × 2 (emotional component: affective vs. cognitive) × 6 (emotion) × 4 (culture: South Korea, China, Canada, and the US) mixed ANOVA, with the former three variables as within-participant factors. (Due to the large number of analyses involved, we report here only those analyses most relevant to testing our hypotheses). Overall, participants rated the emotions as more negative (</span><i data-dcnode-id="4604"><span data-dcnode-id="4605" instrument_node="">M</span></i><span data-dcnode-id="4603" instrument_node=""> = 3.43, </span><i data-dcnode-id="4601"><span data-dcnode-id="4602" instrument_node="">se</span></i><span data-dcnode-id="4600" instrument_node=""> = 0.03) than positive (</span><i data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">M</span></i><span data-dcnode-id="4597" instrument_node=""> = 2.45, </span><i data-dcnode-id="4595"><span data-dcnode-id="4596" instrument_node="">se</span></i><span data-dcnode-id="4594" instrument_node=""> = 0.03), </span><i data-dcnode-id="4592"><span data-dcnode-id="4593" instrument_node="">F</span></i><span data-dcnode-id="4591" instrument_node="">(1,454) = 370.25, </span><i data-dcnode-id="4589"><span data-dcnode-id="4590" instrument_node="">p &lt;</span></i><span data-dcnode-id="4588" instrument_node=""> 0.001, </span><span class="MathJax_Preview" data-dcnode-id="4587" style="color: inherit; display: none;"></span><span class="MathJax" data-dcnode-id="4547" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow><msubsup><mrow><mi mathvariant=&quot;normal&quot;>&amp;#x3B7;</mi></mrow><mrow><mi mathvariant=&quot;normal&quot;>p</mi></mrow><mrow><mn>2</mn></mrow></msubsup></mrow></math>" id="MathJax-Element-8-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="4561"><span class="math" data-dcnode-id="4562" id="MathJax-Span-71" style="width: 1.054em; display: inline-block;"><span data-dcnode-id="4564" style="display: inline-block; position: relative; width: 0.951em; height: 0px; font-size: 111%;"><span data-dcnode-id="4565" style="position: absolute; clip: rect(1.163em, 1000.95em, 2.512em, -1000em); top: -2.102em; left: 0em;"><span class="mrow" data-dcnode-id="4567" id="MathJax-Span-72"><span class="mrow" data-dcnode-id="4568" id="MathJax-Span-73"><span class="msubsup" data-dcnode-id="4569" id="MathJax-Span-74"><span data-dcnode-id="4570" style="display: inline-block; position: relative; width: 0.93em; height: 0px;"><span data-dcnode-id="4581" style="position: absolute; clip: rect(3.441em, 1000.47em, 4.356em, -1000em); top: -4.004em; left: 0em;"><span class="mrow" data-dcnode-id="4583" id="MathJax-Span-75"><span class="mi" data-dcnode-id="4584" id="MathJax-Span-76"><img data-dcnode-id="4586" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Math/Italic/400/03B7.png%3FV%3D2.7.1&amp;raw" style="width: 9px; height: 13px; vertical-align: -4px; margin-right: -0.006em;"><span data-dcnode-id="4585" style="display: inline-block; overflow: hidden; height: 1px; width: 0.006em;"></span></span></span><span data-dcnode-id="4582" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="4576" style="position: absolute; clip: rect(3.409em, 1000.41em, 4.154em, -1000em); top: -4.348em; left: 0.522em;"><span class="mrow" data-dcnode-id="4578" id="MathJax-Span-77"><span class="mn" data-dcnode-id="4579" id="MathJax-Span-78" style="font-size: 70.7%;"><img data-dcnode-id="4580" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0032.png%3FV%3D2.7.1&amp;raw" style="width: 6px; height: 9px; margin-right: 0.048em;"></span></span><span data-dcnode-id="4577" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="4571" style="position: absolute; clip: rect(3.559em, 1000.45em, 4.284em, -1000em); top: -3.873em; left: 0.464em;"><span class="mrow" data-dcnode-id="4573" id="MathJax-Span-79"><span class="mi" data-dcnode-id="4574" id="MathJax-Span-80" style="font-size: 70.7%;"><img data-dcnode-id="4575" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0070.png%3FV%3D2.7.1&amp;raw" style="width: 7px; height: 8px; vertical-align: -3px; margin-right: 0.032em;"></span></span><span data-dcnode-id="4572" style="display: inline-block; width: 0px; height: 4.004em;"></span></span></span></span></span></span><span data-dcnode-id="4566" style="display: inline-block; width: 0px; height: 2.102em;"></span></span></span><span data-dcnode-id="4563" style="display: inline-block; overflow: hidden; vertical-align: -0.344em; border-left: 0px solid; width: 0px; height: 1.275em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="4548" role="presentation"><math data-dcnode-id="4549" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="4550"><msubsup data-dcnode-id="4551"><mrow data-dcnode-id="4558"><mi data-dcnode-id="4559" mathvariant="normal"><span data-dcnode-id="4560" instrument_node="">η</span></mi></mrow><mrow data-dcnode-id="4555"><mi data-dcnode-id="4556" mathvariant="normal"><span data-dcnode-id="4557" instrument_node="">p</span></mi></mrow><mrow data-dcnode-id="4552"><mn data-dcnode-id="4553"><span data-dcnode-id="4554" instrument_node="">2</span></mn></mrow></msubsup></mrow></math></span></span><span data-dcnode-id="4544" instrument_node=""> = 0.45. This likely reflects that fact that the majority in the basic emotions are more negative than positive (e.g., sadness, fear, disgust, and anger). Regarding H2 that the positivity and negativity ratings would be more divergent for affective than for cognitive components, the Valence × Component interaction was significant, </span><i data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">F</span></i><span data-dcnode-id="4541" instrument_node="">(1,454) = 97.09, </span><i data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">p &lt;</span></i><span data-dcnode-id="4538" instrument_node=""> 0.001, </span><span class="MathJax_Preview" data-dcnode-id="4537" style="color: inherit; display: none;"></span><span class="MathJax" data-dcnode-id="4497" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow><msubsup><mrow><mi mathvariant=&quot;normal&quot;>&amp;#x3B7;</mi></mrow><mrow><mi mathvariant=&quot;normal&quot;>p</mi></mrow><mrow><mn>2</mn></mrow></msubsup></mrow></math>" id="MathJax-Element-9-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="4511"><span class="math" data-dcnode-id="4512" id="MathJax-Span-81" style="width: 1.054em; display: inline-block;"><span data-dcnode-id="4514" style="display: inline-block; position: relative; width: 0.951em; height: 0px; font-size: 111%;"><span data-dcnode-id="4515" style="position: absolute; clip: rect(1.163em, 1000.95em, 2.512em, -1000em); top: -2.102em; left: 0em;"><span class="mrow" data-dcnode-id="4517" id="MathJax-Span-82"><span class="mrow" data-dcnode-id="4518" id="MathJax-Span-83"><span class="msubsup" data-dcnode-id="4519" id="MathJax-Span-84"><span data-dcnode-id="4520" style="display: inline-block; position: relative; width: 0.93em; height: 0px;"><span data-dcnode-id="4531" style="position: absolute; clip: rect(3.441em, 1000.47em, 4.356em, -1000em); top: -4.004em; left: 0em;"><span class="mrow" data-dcnode-id="4533" id="MathJax-Span-85"><span class="mi" data-dcnode-id="4534" id="MathJax-Span-86"><img data-dcnode-id="4536" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Math/Italic/400/03B7.png%3FV%3D2.7.1&amp;raw" style="width: 9px; height: 13px; vertical-align: -4px; margin-right: -0.006em;"><span data-dcnode-id="4535" style="display: inline-block; overflow: hidden; height: 1px; width: 0.006em;"></span></span></span><span data-dcnode-id="4532" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="4526" style="position: absolute; clip: rect(3.409em, 1000.41em, 4.154em, -1000em); top: -4.348em; left: 0.522em;"><span class="mrow" data-dcnode-id="4528" id="MathJax-Span-87"><span class="mn" data-dcnode-id="4529" id="MathJax-Span-88" style="font-size: 70.7%;"><img data-dcnode-id="4530" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0032.png%3FV%3D2.7.1&amp;raw" style="width: 6px; height: 9px; margin-right: 0.048em;"></span></span><span data-dcnode-id="4527" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="4521" style="position: absolute; clip: rect(3.559em, 1000.45em, 4.284em, -1000em); top: -3.873em; left: 0.464em;"><span class="mrow" data-dcnode-id="4523" id="MathJax-Span-89"><span class="mi" data-dcnode-id="4524" id="MathJax-Span-90" style="font-size: 70.7%;"><img data-dcnode-id="4525" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0070.png%3FV%3D2.7.1&amp;raw" style="width: 7px; height: 8px; vertical-align: -3px; margin-right: 0.032em;"></span></span><span data-dcnode-id="4522" style="display: inline-block; width: 0px; height: 4.004em;"></span></span></span></span></span></span><span data-dcnode-id="4516" style="display: inline-block; width: 0px; height: 2.102em;"></span></span></span><span data-dcnode-id="4513" style="di </span><p class="mb15" data-dcnode-id="4016"><span data-dcnode-id="4111" instrument_node="">To test H2 that the positivity and negativity ratings would be more divergent for affective than for cognitive components, we conducted a 2 (valence: negativity vs. positivity) × 2 (component: cognitive vs. affective) × 4 (country) mixed ANOVA on the average ratings. The most relevant result to test H2 is the two-way interaction between valence and component, </span><i data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">F</span></i><span data-dcnode-id="4108" instrument_node="">(1,454) = 110.84, </span><i data-dcnode-id="4106"><span data-dcnode-id="4107" instrument_node="">p</span></i><span data-dcnode-id="4105" instrument_node=""> &lt; 0.001, </span><span class="MathJax_Preview" data-dcnode-id="4104" style="color: inherit; display: none;"></span><span class="MathJax" data-dcnode-id="4064" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow><msubsup><mrow><mi mathvariant=&quot;normal&quot;>&amp;#x3B7;</mi></mrow><mrow><mi mathvariant=&quot;normal&quot;>p</mi></mrow><mrow><mn>2</mn></mrow></msubsup></mrow></math>" id="MathJax-Element-17-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="4078"><span class="math" data-dcnode-id="4079" id="MathJax-Span-161" style="width: 1.054em; display: inline-block;"><span data-dcnode-id="4081" style="display: inline-block; position: relative; width: 0.951em; height: 0px; font-size: 111%;"><span data-dcnode-id="4082" style="position: absolute; clip: rect(1.163em, 1000.95em, 2.512em, -1000em); top: -2.102em; left: 0em;"><span class="mrow" data-dcnode-id="4084" id="MathJax-Span-162"><span class="mrow" data-dcnode-id="4085" id="MathJax-Span-163"><span class="msubsup" data-dcnode-id="4086" id="MathJax-Span-164"><span data-dcnode-id="4087" style="display: inline-block; position: relative; width: 0.93em; height: 0px;"><span data-dcnode-id="4098" style="position: absolute; clip: rect(3.441em, 1000.47em, 4.356em, -1000em); top: -4.004em; left: 0em;"><span class="mrow" data-dcnode-id="4100" id="MathJax-Span-165"><span class="mi" data-dcnode-id="4101" id="MathJax-Span-166"><img data-dcnode-id="4103" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Math/Italic/400/03B7.png%3FV%3D2.7.1&amp;raw" style="width: 9px; height: 13px; vertical-align: -4px; margin-right: -0.006em;"><span data-dcnode-id="4102" style="display: inline-block; overflow: hidden; height: 1px; width: 0.006em;"></span></span></span><span data-dcnode-id="4099" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="4093" style="position: absolute; clip: rect(3.409em, 1000.41em, 4.154em, -1000em); top: -4.348em; left: 0.522em;"><span class="mrow" data-dcnode-id="4095" id="MathJax-Span-167"><span class="mn" data-dcnode-id="4096" id="MathJax-Span-168" style="font-size: 70.7%;"><img data-dcnode-id="4097" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0032.png%3FV%3D2.7.1&amp;raw" style="width: 6px; height: 9px; margin-right: 0.048em;"></span></span><span data-dcnode-id="4094" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="4088" style="position: absolute; clip: rect(3.559em, 1000.45em, 4.284em, -1000em); top: -3.873em; left: 0.464em;"><span class="mrow" data-dcnode-id="4090" id="MathJax-Span-169"><span class="mi" data-dcnode-id="4091" id="MathJax-Span-170" style="font-size: 70.7%;"><img data-dcnode-id="4092" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0070.png%3FV%3D2.7.1&amp;raw" style="width: 7px; height: 8px; vertical-align: -3px; margin-right: 0.032em;"></span></span><span data-dcnode-id="4089" style="display: inline-block; width: 0px; height: 4.004em;"></span></span></span></span></span></span><span data-dcnode-id="4083" style="display: inline-block; width: 0px; height: 2.102em;"></span></span></span><span data-dcnode-id="4080" style="display: inline-block; overflow: hidden; vertical-align: -0.344em; border-left: 0px solid; width: 0px; height: 1.275em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="4065" role="presentation"><math data-dcnode-id="4066" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="4067"><msubsup data-dcnode-id="4068"><mrow data-dcnode-id="4075"><mi data-dcnode-id="4076" mathvariant="normal"><span data-dcnode-id="4077" instrument_node="">η</span></mi></mrow><mrow data-dcnode-id="4072"><mi data-dcnode-id="4073" mathvariant="normal"><span data-dcnode-id="4074" instrument_node="">p</span></mi></mrow><mrow data-dcnode-id="4069"><mn data-dcnode-id="4070"><span data-dcnode-id="4071" instrument_node="">2</span></mn></mrow></msubsup></mrow></math></span></span><span data-dcnode-id="4061" instrument_node=""> = 0.20, which was not qualified by a three-way interaction, </span><i data-dcnode-id="4059"><span data-dcnode-id="4060" instrument_node="">F</span></i><span data-dcnode-id="4058" instrument_node="">(3,454) = 1.40, </span><i data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">p</span></i><span data-dcnode-id="4055" instrument_node=""> = 0.243. Simple effect analyses revealed that, consistent with H2, sadness was rated more negatively on the affective component (</span><i data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">M</span></i><sub data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">affective &amp; negativity</span></sub><span data-dcnode-id="4050" instrument_node=""> = 4.51, </span><i data-dcnode-id="4048"><span data-dcnode-id="4049" instrument_node="">se</span></i><span data-dcnode-id="4047" instrument_node=""> = 0.05) than on the cognitive component (</span><i data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">M</span></i><sub data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">cognitive &amp; negativity</span></sub><span data-dcnode-id="4042" instrument_node=""> = 4.08, </span><i data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">se</span></i><span data-dcnode-id="4039" instrument_node=""> = 0.06), but more positively on the cognitive component (</span><i data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">M</span></i><sub data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">cognitive &amp; positivity</span></sub><span data-dcnode-id="4034" instrument_node=""> = 1.88, </span><i data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">se</span></i><span data-dcnode-id="4031" instrument_node=""> = 0.07) than on the affective component (</span><i data-dcnode-id="4029"><span data-dcnode-id="4030" instrument_node="">M</span></i><sub data-dcnode-id="4027"><span data-dcnode-id="4028" instrument_node="">affective &amp; positivity</span></sub><span data-dcnode-id="4026" instrument_node=""> = 1.19, </span><i data-dcnode-id="4024"><span data-dcnode-id="4025" instrument_node="">se</span></i><span data-dcnode-id="4023" instrument_node=""> = 0.05), </span><i data-dcnode-id="4021"><span data-dcnode-id="4022" instrument_node="">ts</span></i><span data-dcnode-id="4020" instrument_node=""> &gt; 7.60, </span><i data-dcnode-id="4018"><span data-dcnode-id="4019" instrument_node="">ps</span></i><span data-dcnode-id="4017" instrument_node=""> &lt; 0.001.</span></p><span data-dcnode-id="4015" instrument_node="">
</span><p class="mb0" data-dcnode-id="3881"><span data-dcnode-id="4014" instrument_node="">Regarding H3 that Americans and Canadians would rate sadness as more negative and less positive than Chinese and Koreans, there was a significant two-way interaction between country and valence, </span><i data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">F</span></i><span data-dcnode-id="4011" instrument_node="">(3,454) = 54.33, </span><i data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">p</span></i><span data-dcnode-id="4008" instrument_node=""> &lt; 0.001, </span><span class="MathJax_Preview" data-dcnode-id="4007" style="color: inherit; display: none;"></span><span class="MathJax" data-dcnode-id="3967" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow><msubsup><mrow><mi mathvariant=&quot;normal&quot;>&amp;#x3B7;</mi></mrow><mrow><mi mathvariant=&quot;normal&quot;>p</mi></mrow><mrow><mn>2</mn></mrow></msubsup></mrow></math>" id="MathJax-Element-18-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="3981"><span class="math" data-dcnode-id="3982" id="MathJax-Span-171" style="width: 1.054em; display: inline-block;"><span data-dcnode-id="3984" style="display: inline-block; position: relative; width: 0.951em; height: 0px; font-size: 111%;"><span data-dcnode-id="3985" style="position: absolute; clip: rect(1.163em, 1000.95em, 2.512em, -1000em); top: -2.102em; left: 0em;"><span class="mrow" data-dcnode-id="3987" id="MathJax-Span-172"><span class="mrow" data-dcnode-id="3988" id="MathJax-Span-173"><span class="msubsup" data-dcnode-id="3989" id="MathJax-Span-174"><span data-dcnode-id="3990" style="display: inline-block; position: relative; width: 0.93em; height: 0px;"><span data-dcnode-id="4001" style="position: absolute; clip: rect(3.441em, 1000.47em, 4.356em, -1000em); top: -4.004em; left: 0em;"><span class="mrow" data-dcnode-id="4003" id="MathJax-Span-175"><span class="mi" data-dcnode-id="4004" id="MathJax-Span-176"><img data-dcnode-id="4006" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Math/Italic/400/03B7.png%3FV%3D2.7.1&amp;raw" style="width: 9px; height: 13px; vertical-align: -4px; margin-right: -0.006em;"><span data-dcnode-id="4005" style="display: inline-block; overflow: hidden; height: 1px; width: 0.006em;"></span></span></span><span data-dcnode-id="4002" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="3996" style="position: absolute; clip: rect(3.409em, 1000.41em, 4.154em, -1000em); top: -4.348em; left: 0.522em;"><span class="mrow" data-dcnode-id="3998" id="MathJax-Span-177"><span class="mn" data-dcnode-id="3999" id="MathJax-Span-178" style="font-size: 70.7%;"><img data-dcnode-id="4000" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0032.png%3FV%3D2.7.1&amp;raw" style="width: 6px; height: 9px; margin-right: 0.048em;"></span></span><span data-dcnode-id="3997" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="3991" style="position: absolute; clip: rect(3.559em, 1000.45em, 4.284em, -1000em); top: -3.873em; left: 0.464em;"><span class="mrow" data-dcnode-id="3993" id="MathJax-Span-179"><span class="mi" data-dcnode-id="3994" id="MathJax-Span-180" style="font-size: 70.7%;"><img data-dcnode-id="3995" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0070.png%3FV%3D2.7.1&amp;raw" style="width: 7px; height: 8px; vertical-align: -3px; margin-right: 0.032em;"></span></span><span data-dcnode-id="3992" style="display: inline-block; width: 0px; height: 4.004em;"></span></span></span></span></span></span><span data-dcnode-id="3986" style="display: inline-block; width: 0px; height: 2.102em;"></span></span></span><span data-dcnode-id="3983" style="display: inline-block; overflow: hidden; vertical-align: -0.344em; border-left: 0px solid; width: 0px; height: 1.275em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="3968" role="presentation"><math data-dcnode-id="3969" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="3970"><msubsup data-dcnode-id="3971"><mrow data-dcnode-id="3978"><mi data-dcnode-id="3979" mathvariant="normal"><span data-dcnode-id="3980" instrument_node="">η</span></mi></mrow><mrow data-dcnode-id="3975"><mi data-dcnode-id="3976" mathvariant="normal"><span data-dcnode-id="3977" instrument_node="">p</span></mi></mrow><mrow data-dcnode-id="3972"><mn data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">2</span></mn></mrow></msubsup></mrow></math></span></span><span data-dcnode-id="3964" instrument_node=""> = 0.26, which was not qualified by a three-way interaction, </span><i data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">F</span></i><span data-dcnode-id="3961" instrument_node="">(3,454) = 1.40, </span><i data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">p</span></i><span data-dcnode-id="3958" instrument_node=""> = 0.243. Simple effect analyses revealed that Canadians (</span><i data-dcnode-id="3956"><span data-dcnode-id="3957" instrument_node="">M</span></i><sub data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">Canada &amp; negativity</span></sub><span data-dcnode-id="3953" instrument_node=""> = 5.03, </span><i data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">se</span></i><span data-dcnode-id="3950" instrument_node=""> = 0.10) and Americans (</span><i data-dcnode-id="3948"><span data-dcnode-id="3949" instrument_node="">M</span></i><sub data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">US &amp; negativity</span></sub><span dat sub><span data-dcnode-id="3907" instrument_node=""> = 1.89, </span><i data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">se</span></i><span data-dcnode-id="3904" instrument_node=""> = 0.12) rated sadness to be more positive than Americans (</span><i data-dcnode-id="3902"><span data-dcnode-id="3903" instrument_node="">M</span></i><sub data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">US &amp; positivity</span></sub><span data-dcnode-id="3899" instrument_node=""> = 1.12, </span><i data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">se</span></i><span data-dcnode-id="3896" instrument_node=""> = 0.11) and Canadians (</span><i data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">M</span></i><sub data-dcnode-id="3892"><span data-dcnode-id="3893" instrument_node="">Canada &amp; positivity</span></sub><span data-dcnode-id="3891" instrument_node=""> = 0.79, </span><i data-dcnode-id="3889"><span data-dcnode-id="3890" instrument_node="">se</span></i><span data-dcnode-id="3888" instrument_node=""> = 0.11), </span><i data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">Fs</span></i><span data-dcnode-id="3885" instrument_node=""> &gt; 46.61, </span><i data-dcnode-id="3883"><span data-dcnode-id="3884" instrument_node="">ps</span></i><span data-dcnode-id="3882" instrument_node=""> &lt; 0.019 Thus, both H2 and H3 were fully supported.</span></p><span data-dcnode-id="3880" instrument_node="">
</span><h3 data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">Fear</span></h3><span data-dcnode-id="3877" instrument_node="">
</span><p class="mb15" data-dcnode-id="3781"><span data-dcnode-id="3876" instrument_node="">A 2 (valence: negativity vs. positivity) × 2 (component: cognitive vs. affective) × 4 (country) mixed ANOVA on the average ratings of fear revealed a significant interaction between valence and component, </span><i data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">F</span></i><span data-dcnode-id="3873" instrument_node="">(1,454) = 56.67, </span><i data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">p</span></i><span data-dcnode-id="3870" instrument_node=""> &lt; 0.001, </span><span class="MathJax_Preview" data-dcnode-id="3869" style="color: inherit; display: none;"></span><span class="MathJax" data-dcnode-id="3829" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow><msubsup><mrow><mi mathvariant=&quot;normal&quot;>&amp;#x3B7;</mi></mrow><mrow><mi mathvariant=&quot;normal&quot;>p</mi></mrow><mrow><mn>2</mn></mrow></msubsup></mrow></math>" id="MathJax-Element-19-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="3843"><span class="math" data-dcnode-id="3844" id="MathJax-Span-181" style="width: 1.054em; display: inline-block;"><span data-dcnode-id="3846" style="display: inline-block; position: relative; width: 0.951em; height: 0px; font-size: 111%;"><span data-dcnode-id="3847" style="position: absolute; clip: rect(1.163em, 1000.95em, 2.512em, -1000em); top: -2.102em; left: 0em;"><span class="mrow" data-dcnode-id="3849" id="MathJax-Span-182"><span class="mrow" data-dcnode-id="3850" id="MathJax-Span-183"><span class="msubsup" data-dcnode-id="3851" id="MathJax-Span-184"><span data-dcnode-id="3852" style="display: inline-block; position: relative; width: 0.93em; height: 0px;"><span data-dcnode-id="3863" style="position: absolute; clip: rect(3.441em, 1000.47em, 4.356em, -1000em); top: -4.004em; left: 0em;"><span class="mrow" data-dcnode-id="3865" id="MathJax-Span-185"><span class="mi" data-dcnode-id="3866" id="MathJax-Span-186"><img data-dcnode-id="3868" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Math/Italic/400/03B7.png%3FV%3D2.7.1&amp;raw" style="width: 9px; height: 13px; vertical-align: -4px; margin-right: -0.006em;"><span data-dcnode-id="3867" style="display: inline-block; overflow: hidden; height: 1px; width: 0.006em;"></span></span></span><span data-dcnode-id="3864" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="3858" style="position: absolute; clip: rect(3.409em, 1000.41em, 4.154em, -1000em); top: -4.348em; left: 0.522em;"><span class="mrow" data-dcnode-id="3860" id="MathJax-Span-187"><span class="mn" data-dcnode-id="3861" id="MathJax-Span-188" style="font-size: 70.7%;"><img data-dcnode-id="3862" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0032.png%3FV%3D2.7.1&amp;raw" style="width: 6px; height: 9px; margin-right: 0.048em;"></span></span><span data-dcnode-id="3859" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="3853" style="position: absolute; clip: rect(3.559em, 1000.45em, 4.284em, -1000em); top: -3.873em; left: 0.464em;"><span class="mrow" data-dcnode-id="3855" id="MathJax-Span-189"><span class="mi" data-dcnode-id="3856" id="MathJax-Span-190" style="font-size: 70.7%;"><img data-dcnode-id="3857" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0070.png%3FV%3D2.7.1&amp;raw" style="width: 7px; height: 8px; vertical-align: -3px; margin-right: 0.032em;"></span></span><span data-dcnode-id="3854" style="display: inline-block; width: 0px; height: 4.004em;"></span></span></span></span></span></span><span data-dcnode-id="3848" style="display: inline-block; width: 0px; height: 2.102em;"></span></span></span><span data-dcnode-id="3845" style="display: inline-block; overflow: hidden; vertical-align: -0.344em; border-left: 0px solid; width: 0px; height: 1.275em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="3830" role="presentation"><math data-dcnode-id="3831" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="3832"><msubsup data-dcnode-id="3833"><mrow data-dcnode-id="3840"><mi data-dcnode-id="3841" mathvariant="normal"><span data-dcnode-id="3842" instrument_node="">η</span></mi></mrow><mrow data-dcnode-id="3837"><mi data-dcnode-id="3838" mathvariant="normal"><span data-dcnode-id="3839" instrument_node="">p</span></mi></mrow><mrow data-dcnode-id="3834"><mn data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">2</span></mn></mrow></msubsup></mrow></math></span></span><span data-dcnode-id="3826" instrument_node=""> = 0.11, which was not qualified by a three-way interaction, </span><i data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">F</span></i><span data-dcnode-id="3823" instrument_node="">(3,454) = 0.04, </span><i data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">p</span></i><span data-dcnode-id="3820" instrument_node=""> = 0.99. Simple effect analyses revealed that, consistent with H2, fear was rated more negatively on the affective component (</span><i data-dcnode-id="3818"><span data-dcnode-id="3819" instrument_node="">M</span></i><sub data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">affective &amp; negativity</span></sub><span data-dcnode-id="3815" instrument_node=""> = 4.31, </span><i data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">se</span></i><span data-dcnode-id="3812" instrument_node=""> = 0.06) than on the cognitive component (</span><i data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">M</span></i><sub data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">cognitive &amp; negativity</span></sub><span data-dcnode-id="3807" instrument_node=""> = 4.06, </span><i data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">se</span></i><span data-dcnode-id="3804" instrument_node=""> = 0.06), but more positively on the cognitive component (</span><i data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">M</span></i><sub data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">cognitive &amp; positivity</span></sub><span data-dcnode-id="3799" instrument_node=""> = 1.95, </span><i data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">se</span></i><span data-dcnode-id="3796" instrument_node=""> = 0.06) than on the affective component (</span><i data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">M</span></i><sub data-dcnode-id="3792"><span data-dcnode-id="3793" instrument_node="">affective &amp; positivity</span></sub><span data-dcnode-id="3791" instrument_node=""> = 1.42, </span><i data-dcnode-id="3789"><span data-dcnode-id="3790" instrument_node="">se</span></i><span data-dcnode-id="3788" instrument_node=""> = 0.06), </span><i data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">ts</span></i><span data-dcnode-id="3785" instrument_node=""> &gt; 4.38, </span><i data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">ps</span></i><span data-dcnode-id="3782" instrument_node=""> &lt; 0.001. Thus, H2 was fully supported.</span></p><span data-dcnode-id="3780" instrument_node="">
</span><p class="mb0" data-dcnode-id="3646"><span data-dcnode-id="3779" instrument_node="">In addition, there was a significant two-way interaction between country and valence, </span><i data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">F</span></i><span data-dcnode-id="3776" instrument_node="">(3,454) = 5.43, </span><i data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">p</span></i><span data-dcnode-id="3773" instrument_node=""> &lt; 0.001, </span><span class="MathJax_Preview" data-dcnode-id="3772" style="color: inherit; display: none;"></span><span class="MathJax" data-dcnode-id="3732" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow><msubsup><mrow><mi mathvariant=&quot;normal&quot;>&amp;#x3B7;</mi></mrow><mrow><mi mathvariant=&quot;normal&quot;>p</mi></mrow><mrow><mn>2</mn></mrow></msubsup></mrow></math>" id="MathJax-Element-20-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="3746"><span class="math" data-dcnode-id="3747" id="MathJax-Span-191" style="width: 1.054em; display: inline-block;"><span data-dcnode-id="3749" style="display: inline-block; position: relative; width: 0.951em; height: 0px; font-size: 111%;"><span data-dcnode-id="3750" style="position: absolute; clip: rect(1.163em, 1000.95em, 2.512em, -1000em); top: -2.102em; left: 0em;"><span class="mrow" data-dcnode-id="3752" id="MathJax-Span-192"><span class="mrow" data-dcnode-id="3753" id="MathJax-Span-193"><span class="msubsup" data-dcnode-id="3754" id="MathJax-Span-194"><span data-dcnode-id="3755" style="display: inline-block; position: relative; width: 0.93em; height: 0px;"><span data-dcnode-id="3766" style="position: absolute; clip: rect(3.441em, 1000.47em, 4.356em, -1000em); top: -4.004em; left: 0em;"><span class="mrow" data-dcnode-id="3768" id="MathJax-Span-195"><span class="mi" data-dcnode-id="3769" id="MathJax-Span-196"><img data-dcnode-id="3771" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Math/Italic/400/03B7.png%3FV%3D2.7.1&amp;raw" style="width: 9px; height: 13px; vertical-align: -4px; margin-right: -0.006em;"><span data-dcnode-id="3770" style="display: inline-block; overflow: hidden; height: 1px; width: 0.006em;"></span></span></span><span data-dcnode-id="3767" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="3761" style="position: absolute; clip: rect(3.409em, 1000.41em, 4.154em, -1000em); top: -4.348em; left: 0.522em;"><span class="mrow" data-dcnode-id="3763" id="MathJax-Span-197"><span class="mn" data-dcnode-id="3764" id="MathJax-Span-198" style="font-size: 70.7%;"><img data-dcnode-id="3765" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0032.png%3FV%3D2.7.1&amp;raw" style="width: 6px; height: 9px; margin-right: 0.048em;"></span></span><span data-dcnode-id="3762" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="3756" style="position: absolute; clip: rect(3.559em, 1000.45em, 4.284em, -1000em); top: -3.873em; left: 0.464em;"><span class="mrow" data-dcnode-id="3758" id="MathJax-Span-199"><span class="mi" data-dcnode-id="3759" id="MathJax-Span-200" style="font-size: 70.7%;"><img data-dcnode-id="3760" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0070.png%3FV%3D2.7.1&amp;raw" style="width: 7px; height: 8px; vertical-align: -3px; margin-right: 0.032em;"></span></span><span data-dcnode-id="3757" style="display: inline-block; width: 0px; height: 4.004em;"></span></span></span></span></span></span><span data-dcnode-id="3751" style="display: inline-block; width: 0px; height: 2.102em;"></span></span></span><span data-dcnode-id="3748" style="display: inline-block; overflow: hidden; vertical-align: -0.344em; border-left: 0px solid; width: 0px; height: 1.275em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="3733" role="presentation"><math data-dcnode-id="3734" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="3735"><msubsup data-dcnode-id="3736"><mrow data-dcnode-id="3743"><mi data-dcnode-id="3744" mathvariant="normal"><span data-dcnode-id="3745" instrument_node="">η</span></mi></mrow><mrow data-dcnode-id="3740"><mi data-dcnode-id="3741" mathvariant="normal"><span data-dcnode-id="3742" instrument_node="">p</span></mi></mrow><mrow data-dcnode-id="3737"><mn data-dcnode-id="3738"><span data-dcnode-id="3739" instrument_node="">2</span></mn></mrow></msubsup></mrow></math></span></span><span data-dcnode-id="3729" instrument_node=""> = 0.04. Simple effect analyses revealed that Chinese (</span><i data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">M</span></i><sub data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">China &amp; negativity</span></sub><span data-dcnode-id="3724" instrument_node=""> = 4.45, </span><i data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">se</span></i><span data-dcnode-id="3721" instrument_node=""> = 0.12), Canadians (</span><i data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">M</span></i><sub data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">Canada &amp; negativity</span></sub><span data-dcnode-id="3716" instrument_node=""> = 4.23, </span><i data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">se</span></i><span data-dcnode-id="3713" instrument_node=""> = 0.11) and Americans (</span><i data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">M</span></i><sub data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">US &amp; negativity</span></sub><span data-dcnode-id="3708" instrument_node=""> = 4.16, </span><i data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">se</span></i><span data-dcnode-id="3705" instrument_node=""> = 0.11) rated fear to be more negative compared to Koreans (</span><i data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">M</span></i><sub data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">Korea &amp; negativity</span></sub><span data-dcnode-id="3700" instrument_node=""> = 3.90, </span><i data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">se</span></i><span data-dcnode-id="3697" instrument_node=""> = 0.09), although only the Koreans vs. Chinese comparison was significant, </span><i data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">F</span></i><span data-dcnode-id="3694" instrument_node="">(3,454) = 4.71; </span><i data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">p</span></i><span data-dcnode-id="3691" instrument_node=""> = 0.003; for all the other comparisons, </span><i data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">Fs</span></i><span data-dcnode-id="3688" instrument_node=""> &lt; 4.71, </span><i data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">ps</span></i><span data-dcnode-id="3685" instrument_node=""> &gt; 0.125. Meanwhile Koreans (</span><i data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">M</span></i><sub data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">Korea &amp; positivity</span></sub><span data-dcnode-id="3680" instrument_node=""> = 2.01, </span><i data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">se</span></i><span data-dcnode-id="3677" instrument_node=""> = 0.09) and Canadians (</span><i data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">M</span></i><sub data-dcnode-id="3673"><span data-dcnode-id="3674" instrument_node="">Canada &amp; positivity</span></sub><span data-dcnode-id="3672" instrument_node=""> = 1.72, </span><i data-dcnode-id="3670"><span data-dcnode-id="3671" instrument_node="">se</span></i><span data-dcnode-id="3669" instrument_node=""> = 0.11) rated fear to be more positive than Americans (</span><i data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">M</span></i><sub data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">US &amp; positivity</span></sub><span data-dcnode-id="3664" instrument_node=""> = 1.55, </span><i data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">se</span></i><span data-dcnode-id="3661" instrument_node=""> = 0.11) and Chinese (</span><i data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">M</span></i><sub data-dcnode-id="3657"><span data-dcnode-id="3658" instrument_node="">China &amp; positivity</span></sub><span data-dcnode-id="3656" instrument_node=""> = 1.46, </span><i data-dcnode-id="3654"><span data-dcnode-id="3655" instrument_node="">se</span></i><span data-dcnode-id="3653" instrument_node=""> = 0.12), although only comparisons involving Koreans vs. Chinese and Koreans vs. Americans were significant, </span><i data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">Fs</span></i><span data-dcnode-id="3650" instrument_node=""> &gt; 5.52; </span><i data-dcnode-id="3648"><span data-dcnode-id="3649" instrument_node="">ps</span></i><span data-dcnode-id="3647" instrument_node=""> &lt; 0.001). Thus, H3 was only partially supported.</span></p><span data-dcnode-id="3645" instrument_node="">
</span><h3 data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">Disgust</span></h3><span data-dcnode-id="3642" instrument_node="">

ine-block; width: 0px; height: 2.102em;"></span></span></span><span data-dcnode-id="3357" style="display: inline-block; overflow: hidden; vertical-align: -0.344em; border-left: 0px solid; width: 0px; height: 1.275em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="3342" role="presentation"><math data-dcnode-id="3343" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="3344"><msubsup data-dcnode-id="3345"><mrow data-dcnode-id="3352"><mi data-dcnode-id="3353" mathvariant="normal"><span data-dcnode-id="3354" instrument_node="">η</span></mi></mrow><mrow data-dcnode-id="3349"><mi data-dcnode-id="3350" mathvariant="normal"><span data-dcnode-id="3351" instrument_node="">p</span></mi></mrow><mrow data-dcnode-id="3346"><mn data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">2</span></mn></mrow></msubsup></mrow></math></span></span><span data-dcnode-id="3338" instrument_node=""> = 0.00. The simple effect analyses revealed that Koreans rated disgust more negatively on the affective (</span><i data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">M</span></i><sub data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">Korea &amp; affective &amp; negativity</span></sub><span data-dcnode-id="3333" instrument_node=""> = 4.83, </span><i data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">se</span></i><span data-dcnode-id="3330" instrument_node=""> = 0.10) than cognitive component (</span><i data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">M</span></i><sub data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">Korea &amp; cognitive &amp; negativity</span></sub><span data-dcnode-id="3325" instrument_node=""> = 4.61, </span><i data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">se</span></i><span data-dcnode-id="3322" instrument_node=""> = 0.10), and more positively on the cognitive (</span><i data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">M</span></i><sub data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">Korea &amp; cognitive &amp; positivity</span></sub><span data-dcnode-id="3317" instrument_node=""> = 1.44, </span><i data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">se</span></i><span data-dcnode-id="3314" instrument_node=""> = 0.10) than affective component (</span><i data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">M</span></i><sub data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">Korea &amp; affective &amp; positivity</span></sub><span data-dcnode-id="3309" instrument_node=""> = 1.01, </span><i data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">se</span></i><span data-dcnode-id="3306" instrument_node=""> = 0.08), </span><i data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">ts</span></i><span data-dcnode-id="3303" instrument_node=""> &gt; 2.53, </span><i data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">ps</span></i><span data-dcnode-id="3300" instrument_node=""> &lt; 0.012. Next, the simple effect analyses revealed that Chinese rated disgust more negatively on the affective (</span><i data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">M</span></i><sub data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">China &amp; affective &amp; negativity</span></sub><span data-dcnode-id="3295" instrument_node=""> = 4.71, </span><i data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">se</span></i><span data-dcnode-id="3292" instrument_node=""> = 0.12) than the cognitive component (</span><i data-dcnode-id="3290"><span data-dcnode-id="3291" instrument_node="">M</span></i><sub data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">China &amp; cognitive &amp;negativity</span></sub><span data-dcnode-id="3287" instrument_node=""> = 4.46, </span><i data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">se</span></i><span data-dcnode-id="3284" instrument_node=""> = 0.12), </span><i data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">t</span></i><span data-dcnode-id="3281" instrument_node=""> = −3.74, </span><i data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">p</span></i><span data-dcnode-id="3278" instrument_node=""> &lt; 0.001, and more positively on the cognitive (</span><i data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">M</span></i><sub data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">China &amp; cognitive &amp; positivity</span></sub><span data-dcnode-id="3273" instrument_node=""> = 1.46, </span><i data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">se</span></i><span data-dcnode-id="3270" instrument_node=""> = 0.12) than the affective component (</span><i data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">M</span></i><sub data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">China &amp; affective &amp; positivity</span></sub><span data-dcnode-id="3265" instrument_node=""> = 1.06, </span><i data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">se</span></i><span data-dcnode-id="3262" instrument_node=""> = 0.10), </span><i data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">t</span></i><span data-dcnode-id="3259" instrument_node=""> = 1.98, </span><i data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">p</span></i><span data-dcnode-id="3256" instrument_node=""> = 0.051. Thus, H2 was supported for Korean and Chinese participants, but not for Canadian or American participants.</span></p><span data-dcnode-id="3254" instrument_node="">
</span><p class="mb15" data-dcnode-id="3170"><span data-dcnode-id="3253" instrument_node="">Due to the significant 3-way interaction, we examined H3 within affective and cognitive components separately. Within the affective component, the simple effect analyses revealed that Canadians (</span><i data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">M</span></i><sub data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">Canada &amp; affective &amp; negativity</span></sub><span data-dcnode-id="3248" instrument_node=""> = 5.02, </span><i data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">se</span></i><span data-dcnode-id="3245" instrument_node=""> = 0.11) rated strongest affective negativity for disgust followed by Koreans (</span><i data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">M</span></i><sub data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">Korea &amp; affective &amp; negativity</span></sub><span data-dcnode-id="3240" instrument_node=""> = 4.83, </span><i data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">se</span></i><span data-dcnode-id="3237" instrument_node=""> = 0.10), Chinese (</span><i data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">M</span></i><sub data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">China &amp; affective &amp; negativity</span></sub><span data-dcnode-id="3232" instrument_node=""> = 4.71, </span><i data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">se</span></i><span data-dcnode-id="3229" instrument_node=""> = 0.12), and Americans (</span><i data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">M</span></i><sub data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">US &amp; affective &amp; negativity</span></sub><span data-dcnode-id="3224" instrument_node=""> = 4.42, </span><i data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">se</span></i><span data-dcnode-id="3221" instrument_node=""> = 0.11); Canadians were significantly different from Chinese and Americans, and Koreans were significantly different from Americans, </span><i data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">Fs</span></i><span data-dcnode-id="3218" instrument_node=""> &gt; 5.23, </span><i data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">ps</span></i><span data-dcnode-id="3215" instrument_node=""> &lt; 0.030; none of the other comparisons were significant, </span><i data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">Fs</span></i><span data-dcnode-id="3212" instrument_node=""> &lt; 5.23, </span><i data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node="">ps</span></i><span data-dcnode-id="3209" instrument_node=""> &gt; 0.382. In addition, for affect positivity, the simple effect analyses revealed that Canadians (</span><i data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">M</span></i><sub data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">Canada &amp; affective &amp; positivity</span></sub><span data-dcnode-id="3204" instrument_node=""> = 0.67, </span><i data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">se</span></i><span data-dcnode-id="3201" instrument_node=""> = 0.09) and Americans (</span><i data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">M</span></i><sub data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">US &amp; affective &amp; positivity</span></sub><span data-dcnode-id="3196" instrument_node=""> = 0.68, </span><i data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">se</span></i><span data-dcnode-id="3193" instrument_node=""> = 0.09) rated disgust less positively than did Koreans (</span><i data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">M</span></i><sub data-dcnode-id="3189"><span data-dcnode-id="3190" instrument_node="">Korea &amp; affective &amp; positivity</span></sub><span data-dcnode-id="3188" instrument_node=""> = 1.01, </span><i data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">se</span></i><span data-dcnode-id="3185" instrument_node=""> = 0.08) and Chinese (</span><i data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">M</span></i><sub data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">China &amp; affective &amp; positivity</span></sub><span data-dcnode-id="3180" instrument_node=""> = 1.06, </span><i data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">se</span></i><span data-dcnode-id="3177" instrument_node=""> = 0.10), </span><i data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">Fs</span></i><span data-dcnode-id="3174" instrument_node=""> &gt; 5.03, </span><i data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">p</span></i><span data-dcnode-id="3171" instrument_node=""> &lt; 0.041 for the East vs. West comparisons. This latter part is consistent with H3.</span></p><span data-dcnode-id="3169" instrument_node="">
</span><p class="mb0" data-dcnode-id="3073"><span data-dcnode-id="3168" instrument_node="">Within the cognitive component, simple effect analyses revealed that Canadians (</span><i data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">M</span></i><sub data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">Canada &amp; cognitive &amp; negativity</span></sub><span data-dcnode-id="3163" instrument_node=""> = 5.09, </span><i data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">se</span></i><span data-dcnode-id="3160" instrument_node=""> = 0.11) rated disgust more negatively than did Koreans (</span><i data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">M</span></i><sub data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">Korea &amp; cognitive</span></sub><span data-dcnode-id="3155" instrument_node=""> </span><sub data-dcnode-id="3151"><span class="thinspace" data-dcnode-id="3154" style="margin-left:0.3em"></span><span class="thinspace" data-dcnode-id="3153" style="margin-left:0.3em"></span><span data-dcnode-id="3152" instrument_node="">&amp;negativity</span></sub><span data-dcnode-id="3150" instrument_node=""> = 4.61, </span><i data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">se</span></i><span data-dcnode-id="3147" instrument_node=""> = 0.10) and Chinese (</span><i data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">M</span></i><sub data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">China &amp; cognitive</span></sub><span data-dcnode-id="3142" instrument_node=""> </span><sub data-dcnode-id="3138"><span class="thinspace" data-dcnode-id="3141" style="margin-left:0.3em"></span><span class="thinspace" data-dcnode-id="3140" style="margin-left:0.3em"></span><span data-dcnode-id="3139" instrument_node="">&amp;negativity</span></sub><span data-dcnode-id="3137" instrument_node=""> = 4.46, </span><i data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">se</span></i><span data-dcnode-id="3134" instrument_node=""> = 0.12), </span><i data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">Fs</span></i><span data-dcnode-id="3131" instrument_node=""> &gt; 5.65, </span><i data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">ps</span></i><span data-dcnode-id="3128" instrument_node=""> &lt; 0.007. Americans (</span><i data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">M</span></i><sub data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">US &amp; cognitive &amp; negativity</span></sub><span data-dcnode-id="3123" instrument_node=""> = 4.73, </span><i data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">se</span></i><span data-dcnode-id="3120" instrument_node=""> = 0.11), also rated disgust more negatively than the two Asian groups, although the difference did not reach statistical significance; </span><i data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">ps</span></i><span data-dcnode-id="3117" instrument_node=""> &gt; 0.603. In addition, the simple effect analyses revealed that Canadians (</span><i data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">M</span></i><sub data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">Canada &amp; cognitive</span></sub><span data-dcnode-id="3112" instrument_node=""> </span><sub data-dcnode-id="3108"><span class="thinspace" data-dcnode-id="3111" style="margin-left:0.3em"></span><span class="thinspace" data-dcnode-id="3110" style="margin-left:0.3em"></span><span data-dcnode-id="3109" instrument_node="">&amp;positivity</span></sub><span data-dcnode-id="3107" instrument_node=""> = 0.75, </span><i data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">se</span></i><span data-dcnode-id="3104" instrument_node=""> = 0.11) and Americans (</span><i data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">M</span></i><sub data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">US &amp; cognitive &amp; positivity</span></sub><span data-dcnode-id="3099" instrument_node=""> = 0.93, </span><i data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">se</span></i><span data-dcnode-id="3096" instrument_node=""> = 0.11) rated disgust less positively than did Koreans (</span><i data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">M</span></i><sub data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">Korea &amp; cognitive &amp; positivity</span></sub><span data-dcnode-id="3091" instrument_node=""> = 1.44, </span><i data-dcnode-id="3089"><span data-dcnode-id="3090" instrument_node="">se</span></i><span data-dcnode-id="3088" instrument_node=""> = 0.10), and Chinese (</span><i data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">M</span></i><sub data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">China &amp; cognitive &amp; positivity</span></sub><span data-dcnode-id="3083" instrument_node=""> = 1.46, </span><i data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">se</span></i><span data-dcnode-id="3080" instrument_node=""> = 0.12), </span><i data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">Fs</span></i><span data-dcnode-id="3077" instrument_node=""> &gt; 10.84, </span><i data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">ps</span></i><span data-dcnode-id="3074" instrument_node=""> &lt; 0.009. Thus, H3 was partially supported in the cognitive component.</span></p><span data-dcnode-id="3072" instrument_node="">
</span><h3 data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">Anger</span></h3><span data-dcnode-id="3069" instrument_node="">
