</span><p class="mb0" data-dcnode-id="2400"><span data-dcnode-id="2520" instrument_node="">Within the cognitive component, simple effect analyses revealed that Canadians (</span><i data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">M</span></i><sub data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">Canada &amp; cognitive</span></sub><span data-dcnode-id="2515" instrument_node=""> </span><sub data-dcnode-id="2510"><span class="thinspace" data-dcnode-id="2514" style="margin-left:0.3em"></span><span class="thinspace" data-dcnode-id="2513" style="margin-left:0.3em"></span><span class="thinspace" data-dcnode-id="2512" style="margin-left:0.3em"></span><span data-dcnode-id="2511" instrument_node="">&amp;negativity</span></sub><span data-dcnode-id="2509" instrument_node=""> = 4.74, </span><i data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">se</span></i><span data-dcnode-id="2506" instrument_node=""> = 0.12) and Americans (</span><i data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">M</span></i><sub data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">US &amp; cognitive</span></sub><span data-dcnode-id="2501" instrument_node=""> </span><sub data-dcnode-id="2496"><span class="thinspace" data-dcnode-id="2500" style="margin-left:0.3em"></span><span class="thinspace" data-dcnode-id="2499" style="margin-left:0.3em"></span><span class="thinspace" data-dcnode-id="2498" style="margin-left:0.3em"></span><span data-dcnode-id="2497" instrument_node="">&amp;negativity</span></sub><span data-dcnode-id="2495" instrument_node=""> = 4.50, </span><i data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">se</span></i><span data-dcnode-id="2492" instrument_node=""> = 0.11) rated anger more negatively than did Koreans (</span><i data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">M</span></i><sub data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">Korea &amp; cognitive</span></sub><span data-dcnode-id="2487" instrument_node=""> </span><sub data-dcnode-id="2482"><span class="thinspace" data-dcnode-id="2486" style="margin-left:0.3em"></span><span class="thinspace" data-dcnode-id="2485" style="margin-left:0.3em"></span><span class="thinspace" data-dcnode-id="2484" style="margin-left:0.3em"></span><span data-dcnode-id="2483" instrument_node="">&amp;negativity</span></sub><span data-dcnode-id="2481" instrument_node=""> = 4.11, </span><i data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">se</span></i><span data-dcnode-id="2478" instrument_node=""> = 0.10), </span><i data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">Fs</span></i><span data-dcnode-id="2475" instrument_node=""> &gt; 5.97, </span><i data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">p</span></i><span data-dcnode-id="2472" instrument_node=""> &lt; 0.001 and </span><i data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">p</span></i><span data-dcnode-id="2469" instrument_node=""> = 0.057, respectively. Canadians and Americans also rated anger more negatively than did Chinese (</span><i data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">M</span></i><sub data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">China &amp; cognitive &amp; negativity</span></sub><span data-dcnode-id="2464" instrument_node=""> = 4.38, </span><i data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">se</span></i><span data-dcnode-id="2461" instrument_node=""> = 0.13), although these differences did not reach statistical significance; </span><i data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">ps</span></i><span data-dcnode-id="2458" instrument_node=""> &gt; 0.221. For cognitive positivity, Canadians (</span><i data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">M</span></i><sub data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Canada &amp; cognitive &amp; positivity</span></sub><span data-dcnode-id="2453" instrument_node=""> = 1.36, </span><i data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">se</span></i><span data-dcnode-id="2450" instrument_node=""> = 0.12) rated anger least positively, followed by Americans (</span><i data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">M</span></i><sub data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">US &amp; cognitive</span></sub><span data-dcnode-id="2445" instrument_node=""> </span><sub data-dcnode-id="2440"><span class="thinspace" data-dcnode-id="2444" style="margin-left:0.3em"></span><span class="thinspace" data-dcnode-id="2443" style="margin-left:0.3em"></span><span class="thinspace" data-dcnode-id="2442" style="margin-left:0.3em"></span><span data-dcnode-id="2441" instrument_node="">&amp;positivity</span></sub><span data-dcnode-id="2439" instrument_node=""> = 1.47, </span><i data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">se</span></i><span data-dcnode-id="2436" instrument_node=""> = 0.12), Chinese (</span><i data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">M</span></i><sub data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">China &amp; cognitive</span></sub><span data-dcnode-id="2431" instrument_node=""> </span><sub data-dcnode-id="2426"><span class="thinspace" data-dcnode-id="2430" style="margin-left:0.3em"></span><span class="thinspace" data-dcnode-id="2429" style="margin-left:0.3em"></span><span class="thinspace" data-dcnode-id="2428" style="margin-left:0.3em"></span><span data-dcnode-id="2427" instrument_node=""> &amp; positivity</span></sub><span data-dcnode-id="2425" instrument_node=""> = 1.63, </span><i data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">se</span></i><span data-dcnode-id="2422" instrument_node=""> = 0.14), and Koreans (</span><i data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">M</span></i><sub data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">Korea &amp; cognitive</span></sub><span data-dcnode-id="2417" instrument_node=""> </span><sub data-dcnode-id="2414"><span class="thinspace" data-dcnode-id="2416" style="margin-left:0.3em"></span><span data-dcnode-id="2415" instrument_node="">&amp;positivity</span></sub><span data-dcnode-id="2413" instrument_node=""> = 2.07, </span><i data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">se</span></i><span data-dcnode-id="2410" instrument_node=""> = 0.11), omnibus </span><i data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">F</span></i><span data-dcnode-id="2407" instrument_node=""> = 7.71, </span><i data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">p</span></i><span data-dcnode-id="2404" instrument_node=""> &lt; 0.001, however, Chinese were not significantly different from Koreans, Canadians or Americans; </span><i data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">p</span></i><span data-dcnode-id="2401" instrument_node=""> &gt; 0.073. Thus, H3 was partially supported in the cognitive component when evaluating anger.</span></p><span data-dcnode-id="2399" instrument_node="">
</span><h3 data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">Happiness</span></h3><span data-dcnode-id="2396" instrument_node="">
</span><p class="mb15" data-dcnode-id="2300"><span data-dcnode-id="2395" instrument_node="">A mixed ANOVA revealed a marginally significant interaction between valence and component, </span><i data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">F</span></i><span data-dcnode-id="2392" instrument_node="">(1,454) = 2.79, </span><i data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">p</span></i><span data-dcnode-id="2389" instrument_node=""> = 0.096, </span><span class="MathJax_Preview" data-dcnode-id="2388" style="color: inherit; display: none;"></span><span class="MathJax" data-dcnode-id="2348" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow><msubsup><mrow><mi mathvariant=&quot;normal&quot;>&amp;#x3B7;</mi></mrow><mrow><mi mathvariant=&quot;normal&quot;>p</mi></mrow><mrow><mn>2</mn></mrow></msubsup></mrow></math>" id="MathJax-Element-33-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="2362"><span class="math" data-dcnode-id="2363" id="MathJax-Span-321" style="width: 1.054em; display: inline-block;"><span data-dcnode-id="2365" style="display: inline-block; position: relative; width: 0.951em; height: 0px; font-size: 111%;"><span data-dcnode-id="2366" style="position: absolute; clip: rect(1.163em, 1000.95em, 2.512em, -1000em); top: -2.102em; left: 0em;"><span class="mrow" data-dcnode-id="2368" id="MathJax-Span-322"><span class="mrow" data-dcnode-id="2369" id="MathJax-Span-323"><span class="msubsup" data-dcnode-id="2370" id="MathJax-Span-324"><span data-dcnode-id="2371" style="display: inline-block; position: relative; width: 0.93em; height: 0px;"><span data-dcnode-id="2382" style="position: absolute; clip: rect(3.441em, 1000.47em, 4.356em, -1000em); top: -4.004em; left: 0em;"><span class="mrow" data-dcnode-id="2384" id="MathJax-Span-325"><span class="mi" data-dcnode-id="2385" id="MathJax-Span-326"><img data-dcnode-id="2387" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Math/Italic/400/03B7.png%3FV%3D2.7.1&amp;raw" style="width: 9px; height: 13px; vertical-align: -4px; margin-right: -0.006em;"><span data-dcnode-id="2386" style="display: inline-block; overflow: hidden; height: 1px; width: 0.006em;"></span></span></span><span data-dcnode-id="2383" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="2377" style="position: absolute; clip: rect(3.409em, 1000.41em, 4.154em, -1000em); top: -4.348em; left: 0.522em;"><span class="mrow" data-dcnode-id="2379" id="MathJax-Span-327"><span class="mn" data-dcnode-id="2380" id="MathJax-Span-328" style="font-size: 70.7%;"><img data-dcnode-id="2381" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0032.png%3FV%3D2.7.1&amp;raw" style="width: 6px; height: 9px; margin-right: 0.048em;"></span></span><span data-dcnode-id="2378" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="2372" style="position: absolute; clip: rect(3.559em, 1000.45em, 4.284em, -1000em); top: -3.873em; left: 0.464em;"><span class="mrow" data-dcnode-id="2374" id="MathJax-Span-329"><span class="mi" data-dcnode-id="2375" id="MathJax-Span-330" style="font-size: 70.7%;"><img data-dcnode-id="2376" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0070.png%3FV%3D2.7.1&amp;raw" style="width: 7px; height: 8px; vertical-align: -3px; margin-right: 0.032em;"></span></span><span data-dcnode-id="2373" style="display: inline-block; width: 0px; height: 4.004em;"></span></span></span></span></span></span><span data-dcnode-id="2367" style="display: inline-block; width: 0px; height: 2.102em;"></span></span></span><span data-dcnode-id="2364" style="display: inline-block; overflow: hidden; vertical-align: -0.344em; border-left: 0px solid; width: 0px; height: 1.275em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="2349" role="presentation"><math data-dcnode-id="2350" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="2351"><msubsup data-dcnode-id="2352"><mrow data-dcnode-id="2359"><mi data-dcnode-id="2360" mathvariant="normal"><span data-dcnode-id="2361" instrument_node="">η</span></mi></mrow><mrow data-dcnode-id="2356"><mi data-dcnode-id="2357" mathvariant="normal"><span data-dcnode-id="2358" instrument_node="">p</span></mi></mrow><mrow data-dcnode-id="2353"><mn data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">2</span></mn></mrow></msubsup></mrow></math></span></span><span data-dcnode-id="2345" instrument_node=""> = 0.01, which was not qualified by a 3-way interaction, </span><i data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">F</span></i><span data-dcnode-id="2342" instrument_node="">(3,454) = 1.80, </span><i data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">p</span></i><span data-dcnode-id="2339" instrument_node=""> = 0.147. Consistent with H2, happiness was rated more negatively on the cognitive component (</span><i data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">M</span></i><sub data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">cognitive &amp; negativity</span></sub><span data-dcnode-id="2334" instrument_node=""> = 0.54, </span><i data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">se</span></i><span data-dcnode-id="2331" instrument_node=""> = 0.04) than the affective component (</span><i data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">M</span></i><sub data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">affective &amp; negativity</span></sub><span data-dcnode-id="2326" instrument_node=""> = 0.65, </span><i data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">se</span></i><span data-dcnode-id="2323" instrument_node=""> = 0.04), </span><i data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">t</span></i><span data-dcnode-id="2320" instrument_node=""> = −2.37, </span><i data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">p</span></i><span data-dcnode-id="2317" instrument_node=""> = 0.018. However, happiness was rated equally positively on the affective component (</span><i data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">M</span></i><sub data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">affective &amp; positivity</span></sub><span data-dcnode-id="2312" instrument_node=""> = 5.47, </span><i data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">se</span></i><span data-dcnode-id="2309" instrument_node=""> = 0.04) and the cognitive component (</span><i data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">M</span></i><sub data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">cognitive &amp; positivity</span></sub><span data-dcnode-id="2304" instrument_node=""> = 5.46, </span><i data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">se</span></i><span data-dcnode-id="2301" instrument_node=""> = 0.04) Thus, H2 was partially supported.</span></p><span data-dcnode-id="2299" instrument_node="">
</span><p class="mb0" data-dcnode-id="2171"><span data-dcnode-id="2298" instrument_node="">A significant two-way interaction between country and valence, </span><i data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">F</span></i><span data-dcnode-id="2295" instrument_node="">(3,454) = 15.54, </span><i data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">p</span></i><span data-dcnode-id="2292" instrument_node=""> &lt; 0.001, </span><span class="MathJax_Preview" data-dcnode-id="2291" style="color: inherit; display: none;"></span><span class="MathJax" data-dcnode-id="2251" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow><msubsup><mrow><mi mathvariant=&quot;normal&quot;>&amp;#x3B7;</mi></mrow><mrow><mi mathvariant=&quot;normal&quot;>p</mi></mrow><mrow><mn>2</mn></mrow></msubsup></mrow></math>" id="MathJax-Element-34-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="2265"><span class="math" data-dcnode-id="2266" id="MathJax-Span-331" style="width: 1.054em; display: inline-block;"><span data-dcnode-id="2268" style="display: inline-block; position: relative; width: 0.951em; height: 0px; font-size: 111%;"><span data-dcnode-id="2269" style="position: absolute; clip: rect(1.163em, 1000.95em, 2.512em, -1000em); top: -2.102em; left: 0em;"><span class="mrow" data-dcnode-id="2271" id="MathJax-Span-332"><span class="mrow" data-dcnode-id="2272" id="MathJax-Span-333"><span class="msubsup" data-dcnode-id="2273" id="MathJax-Span-334"><span data-dcnode-id="2274" style="display: inline-block; position: relative; width: 0.93em; height: 0px;"><span data-dcnode-id="2285" style="position: absolute; clip: rect(3.441em, 1000.47em, 4.356em, -1000em); top: -4.004em; left: 0em;"><span class="mrow" data-dcnode-id="2287" id="MathJax-Span-335"><span class="mi" data-dcnode-id="2288" id="MathJax-Span-336"><img data-dcnode-id="2290" src="https://chatnoir-webcontent.chatnoir.eu/?inde  inline-block; overflow: hidden; vertical-align: -0.344em; border-left: 0px solid; width: 0px; height: 1.275em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="2252" role="presentation"><math data-dcnode-id="2253" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="2254"><msubsup data-dcnode-id="2255"><mrow data-dcnode-id="2262"><mi data-dcnode-id="2263" mathvariant="normal"><span data-dcnode-id="2264" instrument_node="">η</span></mi></mrow><mrow data-dcnode-id="2259"><mi data-dcnode-id="2260" mathvariant="normal"><span data-dcnode-id="2261" instrument_node="">p</span></mi></mrow><mrow data-dcnode-id="2256"><mn data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">2</span></mn></mrow></msubsup></mrow></math></span></span><span data-dcnode-id="2248" instrument_node=""> = 0.10, not qualified by a 3-way interaction supported H3. Simple effect analyses revealed that Canadians (</span><i data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">M</span></i><sub data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">Canada &amp; positivity</span></sub><span data-dcnode-id="2243" instrument_node=""> = 5.74, </span><i data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">se</span></i><span data-dcnode-id="2240" instrument_node=""> = 0.07) and Americans (</span><i data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">M</span></i><sub data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">US &amp; positivity</span></sub><span data-dcnode-id="2235" instrument_node=""> = 5.61, </span><i data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">se</span></i><span data-dcnode-id="2232" instrument_node=""> = 0.07) rated happiness to be more positive than Chinese (</span><i data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">M</span></i><sub data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">China &amp; positivity</span></sub><span data-dcnode-id="2227" instrument_node=""> = 5.31, </span><i data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">se</span></i><span data-dcnode-id="2224" instrument_node=""> = 0.08) and Koreans (</span><i data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">M</span></i><sub data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">Korea &amp; positivity</span></sub><span data-dcnode-id="2219" instrument_node=""> = 5.20, </span><i data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">se</span></i><span data-dcnode-id="2216" instrument_node=""> = 0.06), </span><i data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Fs</span></i><span data-dcnode-id="2213" instrument_node=""> &gt; 12.11, </span><i data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">ps</span></i><span data-dcnode-id="2210" instrument_node=""> &lt; 0.022, whereas Koreans (</span><i data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">M</span></i><sub data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Korea &amp; negativity</span></sub><span data-dcnode-id="2205" instrument_node=""> = 0.86, </span><i data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">se</span></i><span data-dcnode-id="2202" instrument_node=""> = 0.06) and Chinese (</span><i data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">M</span></i><sub data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">China &amp; negativity</span></sub><span data-dcnode-id="2197" instrument_node=""> = 0.73, </span><i data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">se</span></i><span data-dcnode-id="2194" instrument_node=""> = 0.08) rated happiness to be more negative than Americans (</span><i data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">M</span></i><sub data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">US &amp; negativity</span></sub><span data-dcnode-id="2189" instrument_node=""> = 0.42, </span><i data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">se</span></i><span data-dcnode-id="2186" instrument_node=""> = 0.07) and Canadians (</span><i data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">M</span></i><sub data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Canada &amp; negativity</span></sub><span data-dcnode-id="2181" instrument_node=""> = 0.36, </span><i data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">se</span></i><span data-dcnode-id="2178" instrument_node=""> = 0.07), </span><i data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Fs</span></i><span data-dcnode-id="2175" instrument_node=""> &gt; 14.51, </span><i data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">ps</span></i><span data-dcnode-id="2172" instrument_node=""> &lt; 0.019. Thus, H3 was fully supported.</span></p><span data-dcnode-id="2170" instrument_node="">
</span><h3 data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">Surprise</span></h3><span data-dcnode-id="2167" instrument_node="">
</span><p class="mb15" data-dcnode-id="2109"><span data-dcnode-id="2166" instrument_node="">The interaction between valence and component, </span><i data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">F</span></i><span data-dcnode-id="2163" instrument_node="">(3,454) = 0.15, </span><i data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">p</span></i><span data-dcnode-id="2160" instrument_node=""> = 0.703, was not significant, neither was the three-way interaction, </span><i data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">F</span></i><span data-dcnode-id="2157" instrument_node="">(3,454) = 0.82, </span><i data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">p</span></i><span data-dcnode-id="2154" instrument_node=""> = 0.486. We went ahead to test our priori hypothesis. Simple effect analyses revealed that surprise was rated more positively on the cognitive component (</span><i data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">M</span></i><sub data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">cognitive &amp; positivity</span></sub><span data-dcnode-id="2149" instrument_node=""> = 3.67, </span><i data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">se</span></i><span data-dcnode-id="2146" instrument_node=""> = 0.05) than on the affective component (</span><i data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">M</span></i><sub data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">affective &amp; positivity</span></sub><span data-dcnode-id="2141" instrument_node=""> = 3.55, </span><i data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">se</span></i><span data-dcnode-id="2138" instrument_node=""> = 0.05), </span><i data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">t</span></i><span data-dcnode-id="2135" instrument_node=""> = −2.80, </span><i data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">p</span></i><span data-dcnode-id="2132" instrument_node=""> = 0.005; however, surprise was also rated more negatively on the cognitive (</span><i data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">M</span></i><sub data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">cognitive &amp; negativity</span></sub><span data-dcnode-id="2127" instrument_node=""> = 2.26, </span><i data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">se</span></i><span data-dcnode-id="2124" instrument_node=""> = 0.06) than affective (</span><i data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">M</span></i><sub data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">affective &amp; negativity</span></sub><span data-dcnode-id="2119" instrument_node=""> = 2.18, </span><i data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">se</span></i><span data-dcnode-id="2116" instrument_node=""> = 0.06) component, </span><i data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">t</span></i><span data-dcnode-id="2113" instrument_node=""> = −1.85, </span><i data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">p</span></i><span data-dcnode-id="2110" instrument_node=""> = 0.066. Thus H2 was not supported.</span></p><span data-dcnode-id="2108" instrument_node="">
</span><p class="mb15" data-dcnode-id="1974"><span data-dcnode-id="2107" instrument_node="">In support of H3, we found a significant two-way interaction between country and valence, </span><i data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">F</span></i><span data-dcnode-id="2104" instrument_node="">(1,454) = 15.93, </span><i data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">p</span></i><span data-dcnode-id="2101" instrument_node=""> &lt; 0.001, </span><span class="MathJax_Preview" data-dcnode-id="2100" style="color: inherit; display: none;"></span><span class="MathJax" data-dcnode-id="2060" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow><msubsup><mrow><mi mathvariant=&quot;normal&quot;>&amp;#x3B7;</mi></mrow><mrow><mi mathvariant=&quot;normal&quot;>p</mi></mrow><mrow><mn>2</mn></mrow></msubsup></mrow></math>" id="MathJax-Element-35-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="2074"><span class="math" data-dcnode-id="2075" id="MathJax-Span-341" style="width: 1.054em; display: inline-block;"><span data-dcnode-id="2077" style="display: inline-block; position: relative; width: 0.951em; height: 0px; font-size: 111%;"><span data-dcnode-id="2078" style="position: absolute; clip: rect(1.163em, 1000.95em, 2.512em, -1000em); top: -2.102em; left: 0em;"><span class="mrow" data-dcnode-id="2080" id="MathJax-Span-342"><span class="mrow" data-dcnode-id="2081" id="MathJax-Span-343"><span class="msubsup" data-dcnode-id="2082" id="MathJax-Span-344"><span data-dcnode-id="2083" style="display: inline-block; position: relative; width: 0.93em; height: 0px;"><span data-dcnode-id="2094" style="position: absolute; clip: rect(3.441em, 1000.47em, 4.356em, -1000em); top: -4.004em; left: 0em;"><span class="mrow" data-dcnode-id="2096" id="MathJax-Span-345"><span class="mi" data-dcnode-id="2097" id="MathJax-Span-346"><img data-dcnode-id="2099" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Math/Italic/400/03B7.png%3FV%3D2.7.1&amp;raw" style="width: 9px; height: 13px; vertical-align: -4px; margin-right: -0.006em;"><span data-dcnode-id="2098" style="display: inline-block; overflow: hidden; height: 1px; width: 0.006em;"></span></span></span><span data-dcnode-id="2095" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="2089" style="position: absolute; clip: rect(3.409em, 1000.41em, 4.154em, -1000em); top: -4.348em; left: 0.522em;"><span class="mrow" data-dcnode-id="2091" id="MathJax-Span-347"><span class="mn" data-dcnode-id="2092" id="MathJax-Span-348" style="font-size: 70.7%;"><img data-dcnode-id="2093" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0032.png%3FV%3D2.7.1&amp;raw" style="width: 6px; height: 9px; margin-right: 0.048em;"></span></span><span data-dcnode-id="2090" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="2084" style="position: absolute; clip: rect(3.559em, 1000.45em, 4.284em, -1000em); top: -3.873em; left: 0.464em;"><span class="mrow" data-dcnode-id="2086" id="MathJax-Span-349"><span class="mi" data-dcnode-id="2087" id="MathJax-Span-350" style="font-size: 70.7%;"><img data-dcnode-id="2088" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0070.png%3FV%3D2.7.1&amp;raw" style="width: 7px; height: 8px; vertical-align: -3px; margin-right: 0.032em;"></span></span><span data-dcnode-id="2085" style="display: inline-block; width: 0px; height: 4.004em;"></span></span></span></span></span></span><span data-dcnode-id="2079" style="display: inline-block; width: 0px; height: 2.102em;"></span></span></span><span data-dcno  instrument_node="">se</span></i><span data-dcnode-id="2035" instrument_node=""> = 0.11) rated surprise to be more negative compared to Canadians (</span><i data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">M</span></i><sub data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Canada &amp; negativity</span></sub><span data-dcnode-id="2030" instrument_node=""> = 2.21, </span><i data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">se</span></i><span data-dcnode-id="2027" instrument_node=""> = 0.10) and Americans (</span><i data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">M</span></i><sub data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">US &amp; negativity</span></sub><span data-dcnode-id="2022" instrument_node=""> = 1.82, </span><i data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">se</span></i><span data-dcnode-id="2019" instrument_node=""> = 0.10), </span><i data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">Fs</span></i><span data-dcnode-id="2016" instrument_node=""> &gt; 8.52, </span><i data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">ps</span></i><span data-dcnode-id="2013" instrument_node=""> &lt; 0.028 (only Americans were significantly different from Koreans, Chinese, and Canadians), whereas Americans (</span><i data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">M</span></i><sub data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">US &amp; positivity</span></sub><span data-dcnode-id="2008" instrument_node=""> = 4.04, </span><i data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">se</span></i><span data-dcnode-id="2005" instrument_node=""> = 0.09), and Canadians (</span><i data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">M</span></i><sub data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">Canada &amp; positivity</span></sub><span da cnode-id="1766" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow><msubsup><mrow><mi mathvariant=&quot;normal&quot;>&amp;#x3B7;</mi></mrow><mrow><mi mathvariant=&quot;normal&quot;>p</mi></mrow><mrow><mn>2</mn></mrow></msubsup></mrow></math>" id="MathJax-Element-39-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="1780"><span class="math" data-dcnode-id="1781" id="MathJax-Span-381" style="width: 1.054em; display: inline-block;"><span data-dcnode-id="1783" style="display: inline-block; position: relative; width: 0.951em; height: 0px; font-size: 111%;"><span data-dcnode-id="1784" style="position: absolute; clip: rect(1.163em, 1000.95em, 2.512em, -1000em); top: -2.102em; left: 0em;"><span class="mrow" data-dcnode-id="1786" id="MathJax-Span-382"><span class="mrow" data-dcnode-id="1787" id="MathJax-Span-383"><span class="msubsup" data-dcnode-id="1788" id="MathJax-Span-384"><span data-dcnode-id="1789" style="display: inline-block; position: relative; width: 0.93em; height: 0px;"><span data-dcnode-id="1800" style="position: absolute; clip: rect(3.441em, 1000.47em, 4.356em, -1000em); top: -4.004em; left: 0em;"><span class="mrow" data-dcnode-id="1802" id="MathJax-Span-385"><span class="mi" data-dcnode-id="1803" id="MathJax-Span-386"><img data-dcnode-id="1805" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Math/Italic/400/03B7.png%3FV%3D2.7.1&amp;raw" style="width: 9px; height: 13px; vertical-align: -4px; margin-right: -0.006em;"><span data-dcnode-id="1804" style="display: inline-block; overflow: hidden; height: 1px; width: 0.006em;"></span></span></span><span data-dcnode-id="1801" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="1795" style="position: absolute; clip: rect(3.409em, 1000.41em, 4.154em, -1000em); top: -4.348em; left: 0.522em;"><span class="mrow" data-dcnode-id="1797" id="MathJax-Span-387"><span class="mn" data-dcnode-id="1798" id="MathJax-Span-388" style="font-size: 70.7%;"><img data-dcnode-id="1799" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0032.png%3FV%3D2.7.1&amp;raw" style="width: 6px; height: 9px; margin-right: 0.048em;"></span></span><span data-dcnode-id="1796" style="display: inline-block; width: 0px; height: 4.004em;"></span></span><span data-dcnode-id="1790" style="position: absolute; clip: rect(3.559em, 1000.45em, 4.284em, -1000em); top: -3.873em; left: 0.464em;"><span class="mrow" data-dcnode-id="1792" id="MathJax-Span-389"><span class="mi" data-dcnode-id="1793" id="MathJax-Span-390" style="font-size: 70.7%;"><img data-dcnode-id="1794" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/283/0070.png%3FV%3D2.7.1&amp;raw" style="width: 7px; height: 8px; vertical-align: -3px; margin-right: 0.032em;"></span></span><span data-dcnode-id="1791" style="display: inline-block; width: 0px; height: 4.004em;"></span></span></span></span></span></span><span data-dcnode-id="1785" style="display: inline-block; width: 0px; height: 2.102em;"></span></span></span><span data-dcnode-id="1782" style="display: inline-block; overflow: hidden; vertical-align: -0.344em; border-left: 0px solid; width: 0px; height: 1.275em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="1767" role="presentation"><math data-dcnode-id="1768" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="1769"><msubsup data-dcnode-id="1770"><mrow data-dcnode-id="1777"><mi data-dcnode-id="1778" mathvariant="normal"><span data-dcnode-id="1779" instrument_node="">η</span></mi></mrow><mrow data-dcnode-id="1774"><mi data-dcnode-id="1775" mathvariant="normal"><span data-dcnode-id="1776" instrument_node="">p</span></mi></mrow><mrow data-dcnode-id="1771"><mn data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">2</span></mn></mrow></msubsup></mrow></math></span></span><span data-dcnode-id="1763" instrument_node=""> = 0.01. Although there were differences in three of the pooled variables, the differences were not systematic: the Asian groups scored sometimes higher, sometimes lower, and were sometimes comparable to the North Americans. This suggests that the results were not driven by systematic response biases by any group.</span></p><span data-dcnode-id="1761" instrument_node="">

</span><img alt="www.frontiersin.org" data-dcnode-id="1753" id="T5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/253368/fpsyg-08-00610-HTML/image_t/fpsyg-08-00610-t005.gif&amp;raw"></a><span data-dcnode-id="1751" instrument_node="">

</span><a class="reset-hash-position" data-dcnode-id="1737" id="h6" name="h6"></a><h2 data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">Discussion</span></h2><span data-dcnode-id="1734" instrument_node="">
</span><p class="mb15" data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">To our knowledge, this is the first study that explicitly examined positivity and negativity, separately, of the six basic emotions. Investigating the issue systematically across different cultures, we found that: (1) each emotion indeed contained both positivity and negativity (true for all six emotions); (2) the positivity and negativity ratings were more divergent for affective than for cognitive components (true or partially true for sadness, fear, disgust and anger); (3) American and Canadian ratings were higher for the salient valence and lower for the less salient valence of an emotion, compared to Chinese and Koreans (true or partially true for all six emotions). Thus, the results for most emotions partially or fully supported our hypotheses.</span></p><span data-dcnode-id="1731" instrument_node="">
</span><p class="mb15" data-dcnode-id="1723"><span data-dcnode-id="1730" instrument_node="">For sadness specifically, the results revealed the delicate aspects of cultural differences in sadness: Easterners (Koreans and Chinese) reported stronger positivity of sadness compared to Westerners (Canadians and Americans), while Westerners reported stronger negativity of sadness compared to Easterners. The finding is consistent with </span><a data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B33"><span data-dcnode-id="1729" instrument_node="">Miyamoto et al. (2014)</span></a><span data-dcnode-id="1727" instrument_node=""> finding that Asians were more likely than Euro-Americans to believe in motivational and cognitive utility of negative emotions, which mediated cultural differences in emotion regulation. The findings can be attributable to Easterners embracing sadness when they experience it, whereas Westerners feel that they should not have to face sadness (e.g., </span><a data-dcnode-id="1725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B54"><span data-dcnode-id="1726" instrument_node="">Spencer-Rodgers et al., 2004</span></a><span data-dcnode-id="1724" instrument_node="">).</span></p><span data-dcnode-id="1722" instrument_node="">
</span><p class="mb15" data-dcnode-id="1717"><span data-dcnode-id="1721" instrument_node="">Regarding fear, only Americans reported stronger cognitive fear, while all others reported stronger affective fear. This suggests that Americans tend to think and conceptualize fear to be negative, while others tend to actually feel it as negative. This provides insight into how people face and deal with fear. In contrast to other cultures, Americans tend to anticipate fear more and feel it less, or perhaps even suppress it (</span><a data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="1720" instrument_node="">Mauro et al., 1992</span></a><span data-dcnode-id="1718" instrument_node="">). Only Koreans reported significantly stronger positivity of fear compared to participants from other countries. Koreans may not view fear as negatively as others due to their cultural background. As a small peninsula country, Koreans have faced (and are still facing) threats to their existence, but despite that, may think they should live their lives as they normally would. China, on the other hand, is the largest country on the continent of Asia, and their ecological and political situation is not threatened by outside factors, which may affect how cultural fear was shaped for Chinese individuals.</span></p><span data-dcnode-id="1716" instrument_node="">
</span><p class="mb15" data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Regarding disgust, only Americans reported a stronger level of cognitive disgust relative to others, implying that Americans tend to think and conceptualize disgust as negative, while others tend to feel it more negatively. This suggests that perhaps culture affects how people face and deal with disgust. Americans reported the strongest negativity of disgust, perhaps due to its extreme negativity in American culture. However, for the positivity of disgust, Easterners (Koreans and Chinese) reported stronger positivity of disgust compared to Westerners (Canadians and Americans). This may be due to Easterners’ dialectical thinking style, in that they find both the feeling and thinking of disgust to have benefits for them.</span></p><span data-dcnode-id="1713" instrument_node="">
</span><p class="mb15" data-dcnode-id="1708"><span data-dcnode-id="1712" instrument_node="">Regarding anger, Easterners (Koreans and Chinese) reported stronger positivity of anger compared to Westerners, especially on the cognitive component. In most countries, anger is viewed as rather negative, but to Koreans (and to some extent, Chinese), anger has a more positive impact. This is consistent with </span><a data-dcnode-id="1710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="1711" instrument_node="">Park et al. (2013)</span></a><span data-dcnode-id="1709" instrument_node=""> finding that, unlike in the U.S. where Americans with lower social status expressed more anger – likely due to frustration, in Japan, it was those with higher social status that expressed more anger, presumably to display authority. Thus, anger and its expression may have a more positive connotation in East Asian cultures. On the affective component, Americans reported lower negativity than Canadians (and East Asians, to some extent), which was unexpected. It is unclear to what extent this result was due to the fact that the majority of the US sample was Hispanic, whereas the Canadian sample consisted of only Caucasians. Although a within-US comparison revealed no significant differences, the test may have been underpowered. Future research should further investigate this possibility.</span></p><span data-dcnode-id="1707" instrument_node="">
</span><p class="mb15" data-dcnode-id="1696"><span data-dcnode-id="1706" instrument_node="">Happiness was rated as a positive emotion across all four countries. Still, Westerners reported stronger positivity of happiness compared to Easterners, and Easterners reported stronger negativity of happiness compared to Westerners. Previous findings showed cross-cultural differences in the meaning of happiness and the interpretation of happy images; Westerners typically report happiness to feel uplifting and exciting, but Easterners tend to report happiness as a serene, calm state (</span><a data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B60"><span data-dcnode-id="1705" instrument_node="">Uchida et al., 2004</span></a><span data-dcnode-id="1703" instrument_node="">; </span><a data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B58"><span data-dcnode-id="1702" instrument_node="">Tsai, 2007</span></a><span data-dcnode-id="1700" instrument_node="">). Not only is happiness considered to evoke less arousal in Easterners compared to Westerners, but happiness also contains possibly more negativity for Easterners (</span><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B22"><span data-dcnode-id="1699" instrument_node="">Kubota, 2012</span></a><span data-dcnode-id="1697" instrument_node="">). This suggests that happiness may be experienced differently across cultures. To Westerners, perhaps happiness is an emotion that is bright like a clear sunny day, whereas to Easterners, happiness is still positive, but balanced with negativity, like a drizzling sunny day with a rainbow. In other words, how we treat happiness and deal with such an emotion perhaps requires a different attitude for different cultures.</span></p><span data-dcnode-id="1695" instrument_node="">
</span><p class="mb15" data-dcnode-id="1684"><span data-dcnode-id="1694" instrument_node="">Lastly, although considered a relatively positive emotion, Westerners (Canadians and Americans) reported surprise to be more positive compared to Easterners (Koreans and Chinese). Further, Easterners reported surprise to be more negative compared to Westerners. The results are consistent with the finding that Koreans displayed less surprise than Americans (</span><a data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="1693" instrument_node="">Choi and Nisbett, 2000</span></a><span data-dcnode-id="1691" instrument_node="">). This is perhaps due to Easterners viewing unexpected events to be rather negative despite their dialectical thinking style. This suggests that while Easterners expect changes more so than Westerners (</span><a data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B19"><span data-dcnode-id="1690" instrument_node="">Ji et al., 2001</span></a><span data-dcnode-id="1688" instrument_node="">), they may not welcome changes (</span><a data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B18"><span data-dcnode-id="1687" instrument_node="">Ji, 2005</span></a><span data-dcnode-id="1685" instrument_node="">). Instead they may be in a pursuit of balance between positivity and negativity, which is consistent with their dialectical thinking style.</span></p><span data-dcnode-id="1683" instrument_node="">
</span><p class="mb15" data-dcnode-id="1672"><span data-dcnode-id="1682" instrument_node="">Overall, the current research revealed that while there are East versus West cross-cultural differences, each basic emotion has consistent patterns. This is remarkable, considering that although each basic emotion is universally recognized, they are still experienced differently across several cultures. Further, our findings suggest that the degrees of quality of emotions, such as negativity and positivity, and the affective and cognitive constructs of emotion differ across cultures. An implication of this study is that the cognitive processes that arise from culture affect how people feel. This may stem from differences in thinking styles, such as dialectical and linear thinking (</span><a data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="1681" instrument_node="">Peng and Nisbett, 1999</span></a><span data-dcnode-id="1679" instrument_node="">; </span><a data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B19"><span data-dcnode-id="1678" instrument_node="">Ji et al., 2001</span></a><span data-dcnode-id="1676" instrument_node="">; </span><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="1675" instrument_node="">Nisbett, 2003</span></a><span data-dcnode-id="1673" instrument_node="">). Specifically, Easterners tend to be dialectical when thinking about a situation in a manner that balances the positives and negatives. When things are going well, Easterners might expect a change for the worse, and when things are going badly, they might expect things to get better. This may prepare Easterners for unexpected situations. However, Westerners tend to focus more on one pattern—things will tend to stay as they are, good or bad. This thinking style may lead Westerners to think that things are rather consistent, leading them to concentrate on one side of an issue.</span></p><span data-dcnode-id="1671" instrument_node="">
</span><p class="mb15" data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Finally, our results suggest that there is no clear divide separating East from West. For the six basic emotions, the overall patterns were similar across the four countries, such that each of the basic emotions had both positive and negative elements, and that the affective components were stronger (and therefore more polarized) than the cognitive components. The similarities between Koreans and Chinese were stronger than between the US and Canada in some cases (e.g., sadness), but not in others (e.g., anger, where Chinese were more similar to Western cultures than to Koreans). This provides evidence that there are some cultural differences even within Eastern and within Western cultures.</span></p><span data-dcnode-id="1668" instrument_node="">
</span><p class="mb0" data-dcnode-id="1663"><span data-dcnode-id="1667" instrument_node="">A final implication as a whole include more parsimonious explanations for emotional phenomena in general. For example, there is a large literature on the different kinds of surprise, which is necessary due to the complicated and numerous ways in which surprise has traditionally been conceptualized (see </span><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B27"><span data-dcnode-id="1666" instrument_node="">Lorini and Castelfranchi, 2007</span></a><span data-dcnode-id="1664" instrument_node="">). A more parsimonious conceptualization of surprise as containing both positivity and negativity (instead of being wholly one or the other) can more easily explain a variety of findings (e.g., surprise as an alarm vs. surprise as a discrepancy between reality and expectation) than requiring multiple conceptualizations.</span></p><span data-dcnode-id="1662" instrument_node="">
</span><h3 data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Limitation and Future Directions</span></h3><span data-dcnode-id="1659" instrument_node="">
</span><p class="mb15" data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">There are some limitations to the present research. First, participants were all students. While the mean sample age and occupations were consistent across all four countries, we did not sample the general population. As mentioned, the American sample had a higher percentage of Hispanics compared to Caucasians; although the difference between them was not statistically significant, this test may have been underpowered given the amount of participants in the two groups. Thus, it is possible this could have impacted the mixed findings for the Americans.</span></p><span data-dcnode-id="1656" instrument_node="">
</span><p class="mb15" data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">Next, we only explored the six basic emotions. By using basic emotions, we were able to address nuances in the most common emotions across cultures. That being said, as the basic emotions include more negative than positive emotions, future research should include more positive emotions to test the generalizability of the current findings.</span></p><span data-dcnode-id="1653" instrument_node="">
</span><p class="mb15" data-dcnode-id="1639"><span data-dcnode-id="1652" instrument_node="">There are known issues of equivalence of meaning across languages and differences in response styles (e.g., </span><a data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="1651" instrument_node="">Peng et al., 1997</span></a><span data-dcnode-id="1649" instrument_node="">; </span><a data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B20"><span data-dcnode-id="1648" instrument_node="">Ji et al., 2000</span></a><span data-dcnode-id="1646" instrument_node="">; </span><a data-dcnode-id="1644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1645" instrument_node="">Smith, 2004</span></a><span data-dcnode-id="1643" instrument_node="">). However, acquiescence and extremity are valid representations of cultural differences (</span><a data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1642" instrument_node="">Smith, 2004</span></a><span data-dcnode-id="1640" instrument_node="">). Thus, even in this case, we argue the results are not simply artefactual, as demonstrated in the supplementary analyses we conducted.</span></p><span data-dcnode-id="1638" instrument_node="">
</span><p class="mb0" data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Lastly, we relied on a self-report based methodology. In other future research, it would be interesting to investigate the topic using other approaches, such as behavioral and neuroscience approaches, in order to get a more comprehensive picture of the processes involved in the present findings.</span></p><span data-dcnode-id="1635" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="1634" id="h7" name="h7"></a><h2 data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Conclusion</span></h2><span data-dcnode-id="1631" instrument_node="">
</span><p class="mb0" data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">The goals of the present research were (a) to determine the degree to which each emotion contains both negativity and positivity, and (b) to determine the quality of the differences and similarities of the emotional experience of the basic emotions. The results of the current study supported our hypotheses. The findings revealed that there are rather consistent patterns across Eastern and Western cultures, although differences also exist across cultures, and sometimes even within cultures. This framework is novel, yet compliments existing theory and research. Also, the current paper is the first to examine cultural differences systematically across basic emotions. We hope that this research enhances our understanding of emotion across cultures, as well as provides a new framework with which to examine emotion more generally.</span></p><span data-dcnode-id="1628" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="1627" id="h8" name="h8"></a><h2 data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Ethics Statement</span></h2><span data-dcnode-id="1624" instrument_node="">
</span><p class="mb0" data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">This research was approved by the Queen’s University Institutional Review Board where the study was designed (and also each institution in each country where the studies were conducted), in accordance with APA ethical standards. Written informed consent from each respective country’s participants was given.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="1620" id="h9" name="h9"></a><h2 data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Author Contributions</span></h2><span data-dcnode-id="1617" instrument_node="">
</span><p class="mb0" data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">SA conducted the project across four countries while she was in Canada, analyzed the data, and wrote the paper. L-JJ was a postdoc mentor of SA; shaped the project and contributed to writing the paper. MM conducted the project in the US, and contributed to writing the project. ZZ collected data from China.</span></p><span data-dcnode-id="1614" instrument_node="">
