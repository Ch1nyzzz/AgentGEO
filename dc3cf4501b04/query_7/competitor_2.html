</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0005&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as0005&quot;><p id=&quot;sp0040&quot;>The novel coronavirus (COVID-19) pandemic has produced an unprecedented impact on all aspects of life, including mental outcomes like death distress. This study examined the mediating effect of positivity on the association between COVID-19 related perceived risk, death distress, and happiness. Participants were 3109 Turkish adults (Mean <sub>age</sub> = 38.64 ± 10.40) who completed online measures of perceived risk, positivity, death distress, and happiness during the pandemic. Results showed that perceived risk had a significant direct effect on positivity, death distress, and happiness. Positivity had a significant direct effect on death distress and happiness. Mediation analysis indicated that positivity mediated the effect of perceived risk on death distress and happiness. Results suggest that positivity is an important aspect of developing strength-based preventions and interventions aiming to reduce psychological distress and improve happiness.</p></div></div></div>" data-dcnode-id="6029" lang="en" name="citation_abstract"><span data-dcnode-id="6028" instrument_node="">

de="">https://doi.org/10.1016/j.paid.2020.110347</span></a><a class="rights-and-content" data-dcnode-id="5527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0191886920305389%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5528" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="5525"></section><section class="ReferencedArticles" data-dcnode-id="5524"></section><div class="PageDivider" data-dcnode-id="5523"></div><div class="Abstracts u-font-serif" data-dcnode-id="5487" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="5497" id="ab0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5521"><span data-dcnode-id="5522" instrument_node="">Highlights</span></h2><div data-dcnode-id="5498" id="as0010"><p data-dcnode-id="5499" id="sp0045"></p><dl class="list" data-dcnode-id="5500"><dt class="list-label" data-dcnode-id="5519"><span data-dcnode-id="5520" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5516"><p data-dcnode-id="5517" id="p0005"><span data-dcnode-id="5518" instrument_node="">COVID-19 perceived risk had a significant direct effect on positivity, death distress, and happiness.</span></p></dd><dt class="list-label" data-dcnode-id="5514"><span data-dcnode-id="5515" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5511"><p data-dcnode-id="5512" id="p0010"><span data-dcnode-id="5513" instrument_node="">Positivity had a significant direct effect on death distress and happiness.</span></p></dd><dt class="list-label" data-dcnode-id="5509"><span data-dcnode-id="5510" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5506"><p data-dcnode-id="5507" id="p0015"><span data-dcnode-id="5508" instrument_node="">Positivity mediates the effect of perceived risk on death distress and happiness.</span></p></dd><dt class="list-label" data-dcnode-id="5504"><span data-dcnode-id="5505" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5501"><p data-dcnode-id="5502" id="p0020"><span data-dcnode-id="5503" instrument_node="">Death Distress Scale has sound psychometric properties in Turkish language.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="5488" id="ab0005" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5495"><span data-dcnode-id="5496" instrument_node="">Abstract</span></h2><div data-dcnode-id="5489" id="as0005"><p data-dcnode-id="5490" id="sp0040"><span data-dcnode-id="5494" instrument_node="">The novel coronavirus (COVID-19) pandemic has produced an unprecedented impact on all aspects of life, including mental outcomes like death distress. This study examined the mediating effect of positivity on the association between COVID-19 related perceived risk, death distress, and happiness. Participants were 3109 Turkish adults (Mean </span><sub data-dcnode-id="5492"><span data-dcnode-id="5493" instrument_node="">age</span></sub><span data-dcnode-id="5491" instrument_node=""> = 38.64 ± 10.40) who completed online measures of perceived risk, positivity, death distress, and happiness during the pandemic. Results showed that perceived risk had a significant direct effect on positivity, death distress, and happiness. Positivity had a significant direct effect on death distress and happiness. Mediation analysis indicated that positivity mediated the effect of perceived risk on death distress and happiness. Results suggest that positivity is an important aspect of developing strength-based preventions and interventions aiming to reduce psychological distress and improve happiness.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="5464" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="5476"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0191886920305146"><svg class="icon icon-navigate-left" data-dcnode-id="5485" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="5486"></path></svg><span class="button-alternative-text" data-dcnode-id="5478"><strong data-dcnode-id="5483"><span data-dcnode-id="5484" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="5481"><span data-dcnode-id="5482" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5479"><span data-dcnode-id="5480" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="5465"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0191886920305432"><span class="button-alternative-text" data-dcnode-id="5469"><strong data-dcnode-id="5474"><span data-dcnode-id="5475" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="5472"><span data-dcnode-id="5473" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5470"><span data-dcnode-id="5471" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="5467" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="5468"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="5448"><div class="keywords-section" data-dcnode-id="5449" id="ks0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5462"><span data-dcnode-id="5463" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="5459" id="kw0005"><span data-dcnode-id="5460" id="tx0010"><span data-dcnode-id="5461" instrument_node="">COVID-19, COVID-19 related perceived risk</span></span></div><div class="keyword" data-dcnode-id="5456" id="kw0010"><span data-dcnode-id="5457" id="tx0015"><span data-dcnode-id="5458" instrument_node="">Positivity</span></span></div><div class="keyword" data-dcnode-id="5453" id="kw0015"><span data-dcnode-id="5454" id="tx0020"><span data-dcnode-id="5455" instrument_node="">Death distress</span></span></div><div class="keyword" data-dcnode-id="5450" id="kw0020"><span data-dcnode-id="5451" id="tx0025"><span data-dcnode-id="5452" instrument_node="">Happiness</span></span></div></div></div><span data-dcnode-id="5447" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="3979" id="body"><div data-dcnode-id="4005"><section data-dcnode-id="5224" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5441" id="st0020"><span data-dcnode-id="5446" instrument_node="">1</span><span data-dcnode-id="5444" instrument_node="">. </span><span data-dcnode-id="5442" instrument_node="">Introduction</span></h2><p data-dcnode-id="5430" id="p0025"><span data-dcnode-id="5440" instrument_node="">With its rapid spread, the novel coronavirus 2019 (COVID-19) pandemic has a high death rate and causes substantial fear, panic, psychosis, anxiety, trauma, and suicidal ideation around the globe (</span><a class="workspace-trigger" data-dcnode-id="5438" href="#bb0260" name="bbb0260"><span data-dcnode-id="5439" instrument_node="">World Health Organization [WHO], 2020</span></a><span data-dcnode-id="5437" instrument_node="">). As of August 7, 2020, about 19,193,600 cases have been confirmed and over 716,700 deaths across 188 countries or territories (</span><a class="workspace-trigger" data-dcnode-id="5435" href="#bb0065" name="bbb0065"><span data-dcnode-id="5436" instrument_node="">Center for Systems Science and Engineering, 2020</span></a><span data-dcnode-id="5434" instrument_node="">). In Turkey, the first confirmed COVID-19 case was announced on March 11, 2020 and as of August 7, 2020 there have been more than 238,400 confirmed cases and 5.800 deaths with a basic reproduction number (R0 or R-naught) of between 0.72 and 1.56 and pneumonia rate of 8.3% (</span><a class="workspace-trigger" data-dcnode-id="5432" href="#bb0215" name="bbb0215"><span data-dcnode-id="5433" instrument_node="">Republic of Turkey Ministry of Health, 2020</span></a><span data-dcnode-id="5431" instrument_node="">). There is an urgent need to understand the possible psychosocial impact of the COVID-19 pandemic and determine factors that can reduce its impact on people's psychological health.</span></p><p data-dcnode-id="5419" id="p0030"><span data-dcnode-id="5429" instrument_node="">Due to being a highly contagious disease, COVID-19 has enforced authorities to take a wide range of restrictive measures such as social distancing, avoiding crowded public places, travel restriction, imposing quarantine of all arrivals in the country (</span><a class="workspace-trigger" data-dcnode-id="5427" href="#bb0285" name="bbb0285"><span data-dcnode-id="5428" instrument_node="">Yıldırım, Geçer, &amp; Akgül, 2020</span></a><span data-dcnode-id="5426" instrument_node="">). As many other countries, Turkish government has also taken many measures for the prevention and control of the pandemic including testing, tracing, isolation, and restricting the movement of people across the country. While the implementations of these virus prevention and control measures have been effective to protect people against COVID-19, the risks of a second wave and a new peak of infections may cause uncertainties among people around the world. The consequences of COVID-19 including disruption in daily life, risk of infection, sense of confinement, inadequate supplies, fear, and anxiety associated with the virus can lead to detrimental effects at individuals and societal levels (</span><a class="workspace-trigger" data-dcnode-id="5424" href="#bb0015" name="bbb0015"><span data-dcnode-id="5425" instrument_node="">Ahorsu et al., 2020</span></a><span data-dcnode-id="5423" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5421" href="#bb0025" name="bbb0025"><span data-dcnode-id="5422" instrument_node="">Arslan, Yıldırım, Tanhan, Buluş, &amp; Allen, 2020</span></a><span data-dcnode-id="5420" instrument_node="">).</span></p><p data-dcnode-id="5408" id="p0035"><span data-dcnode-id="5418" instrument_node="">The fast escalation of the COVID-19 has caused people to perceive themselves under the risk of infections across the globe. The conception of risk is multifaceted, complex, and context-related phenomenon (</span><a class="workspace-trigger" data-dcnode-id="5416" href="#bb0235" name="bbb0235"><span data-dcnode-id="5417" instrument_node="">Slovic, 1987</span></a><span data-dcnode-id="5415" instrument_node="">). Potential infection to life-threatening diseases determines individuals' responses to diseases which are associated with the likelihood, severity, controllability, vulnerability, and the number of deaths rose as a result of the infection (</span><a class="workspace-trigger" data-dcnode-id="5413" href="#bb0230" name="bbb0230"><span data-dcnode-id="5414" instrument_node="">Short, 1984</span></a><span data-dcnode-id="5412" instrument_node="">). Some studies showed that perceived risk, fear, and vulnerability are related to engagement in preventive behaviours against COVID-19 (</span><a class="workspace-trigger" data-dcnode-id="5410" href="#bb0285" name="bbb0285"><span data-dcnode-id="5411" instrument_node="">Yıldırım et al., 2020</span></a><span data-dcnode-id="5409" instrument_node="">).</span></p><p data-dcnode-id="5376" id="p0040"><span data-dcnode-id="5407" instrument_node="">Excessive risk can be detrimental for mental health (</span><a class="workspace-trigger" data-dcnode-id="5405" href="#bb0285" name="bbb0285"><span data-dcnode-id="5406" instrument_node="">Yıldırım et al., 2020</span></a><span data-dcnode-id="5404" instrument_node="">), despite its adaptive aspect in terms of motivating individuals to engage in health-protective behaviours (</span><a class="workspace-trigger" data-dcnode-id="5402" href="#bb0040" name="bbb0040"><span data-dcnode-id="5403" instrument_node="">Brewer et al., 2007</span></a><span data-dcnode-id="5401" instrument_node="">). The excessive risk of COVID-19 not only causes the risk of death but also can cause unbearable psychological problems (</span><a class="workspace-trigger" data-dcnode-id="5399" href="#bb0015" name="bbb0015"><span data-dcnode-id="5400" instrument_node="">Ahorsu et al., 2020</span></a><span data-dcnode-id="5398" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5396" href="#bb0265" name="bbb0265"><span data-dcnode-id="5397" instrument_node="">Xiao, 2020</span></a><span data-dcnode-id="5395" instrument_node="">). Research has revealed that perceived risk has significant associations with health conditions, distress, and life satisfaction (</span><a class="workspace-trigger" data-dcnode-id="5393" href="#bb0295" name="bbb0295"><span data-dcnode-id="5394" instrument_node="">Zhang, Wang, Rauch, &amp; Wei, 2020</span></a><span data-dcnode-id="5392" instrument_node="">), sleep disturbances, anxiety, and stress (</span><a class="workspace-trigger" data-dcnode-id="5390" href="#bb0060" name="bbb0060"><span data-dcnode-id="5391" instrument_node="">Casagrande, Favieri, Tambelli, &amp; Forte, 2020</span></a><span data-dcnode-id="5389" instrument_node="">), suicidal thought, suicide attempts, or actual suicide (</span><a class="workspace-trigger" data-dcnode-id="5387" href="#bb0125" name="bbb0125"><span data-dcnode-id="5388" instrument_node="">Jahan, Araf, Griffiths, Gozal, &amp; Mamun, 2020</span></a><span data-dcnode-id="5386" instrument_node="">), coping strategies (</span><a class="workspace-trigger" data-dcnode-id="5384" href="#bb0090" name="bbb0090"><span data-dcnode-id="5385" instrument_node="">Gerhold, 2020</span></a><span data-dcnode-id="5383" instrument_node="">), preventive behaviours toward COVID-19 (</span><a class="workspace-trigger" data-dcnode-id="5381" href="#bb0285" name="bbb0285"><span data-dcnode-id="5382" instrument_node="">Yıldırım et al., 2020</span></a><span data-dcnode-id="5380" instrument_node="">), worry and disruption of daily life (</span><a class="workspace-trigger" data-dcnode-id="5378" href="#bb0140" name="bbb0140"><span data-dcnode-id="5379" instrument_node="">Kwok et al., 2020</span></a><span data-dcnode-id="5377" instrument_node="">).</span></p><p data-dcnode-id="5359" id="p0045"><span data-dcnode-id="5375" instrument_node="">Recently published studies have reported a high prevalence of mental health problems on different populations during the COVID-19 pandemic. For example, the prevalence rates of mental health problems in Italy ranged between 8.27% (insomnia) and 49.38% (post-traumatic stress disorders, PTSD), with severe depression (24.73%), anxiety (19.80%), and perceived stress (21.90%) being prominent reported mental health outcomes among healthcare workers (</span><a class="workspace-trigger" data-dcnode-id="5373" href="#bb0220" name="bbb0220"><span data-dcnode-id="5374" instrument_node="">Rossi et al., 2020</span></a><span data-dcnode-id="5372" instrument_node="">). These rates were relatively higher than those reported before the pandemic. For example, the prevalence rates of PTSD among healthcare workers operating in an emergency department in Italy have been reported to be approximately 21.4% (</span><a class="workspace-trigger" data-dcnode-id="5370" href="#bb0055" name="bbb0055"><span data-dcnode-id="5371" instrument_node="">Carmassi et al., 2018</span></a><span data-dcnode-id="5369" instrument_node="">). In another study with over 1200 general population in China, researchers reported that more than half of participants suffered from psychological distress, anxiety, depression, and stress at moderate to severe levels (</span><a class="workspace-trigger" data-dcnode-id="5367" href="#bb0250" name="bbb0250"><span data-dcnode-id="5368" instrument_node="">Wang et al., 2020</span></a><span data-dcnode-id="5366" instrument_node="">). A survey on general population in the UK demonstrated excessive concerns about the effect of social isolation on wellbeing including increased depression, anxiety, stress, and other negative emotions (</span><a class="workspace-trigger" data-dcnode-id="5364" href="#bb0245" name="bbb0245"><span data-dcnode-id="5365" instrument_node="">The Academy of Medical Sciences, 2020</span></a><span data-dcnode-id="5363" instrument_node="">). Other studies have also reported experience of various mental health difficulties such as depression, fear, anxiety, boredom, worry, sadness, sense of being trapped, feelings of insecurity, loneliness, and helplessness during the pandemic (</span><a class="workspace-trigger" data-dcnode-id="5361" href="#bb0265" name="bbb0265"><span data-dcnode-id="5362" instrument_node="">Xiao, 2020</span></a><span data-dcnode-id="5360" instrument_node="">).</span></p><p data-dcnode-id="5342" id="p0050"><span data-dcnode-id="5358" instrument_node="">The devastating impact of COVID-19 on mental health can be much severe than expected. Mental health suffering related to COVID-19 can cause suicidal behaviours such as suicidal ideation, suicide attempts, and actual suicide (</span><a class="workspace-trigger" data-dcnode-id="5356" href="#bb0180" name="bbb0180"><span data-dcnode-id="5357" instrument_node="">Mamun &amp; Griffiths, 2020</span></a><span data-dcnode-id="5355" instrument_node="">). In Bangladesh and India, two suicide cases have been recently reported due to depression, anxiety, panic, social isolation, stigma, and, other COVID-19 related issues (</span><a class="workspace-trigger" data-dcnode-id="5353" href="#bb0095" name="bbb0095"><span data-dcnode-id="5354" instrument_node="">Goyal, Chauhan, Chhikara, Gupta, &amp; Singh, 2020</span></a><span data-dcnode-id="5352" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5350" href="#bb0180" name="bbb0180"><span data-dcnode-id="5351" instrument_node="">Mamun &amp; Griffiths, 2020</span></a><span data-dcnode-id="5349" instrument_node="">). Pandemic-specific stressors such as fear of contracting COVID-19, social and financial issues can lead to psychological problems such as helplessness, loneliness, sadness, and worry which may in turn increase risk factors for suicidal behaviours (</span><a class="workspace-trigger" data-dcnode-id="5347" href="#bb0180" name="bbb0180"><span data-dcnode-id="5348" instrument_node="">Mamun &amp; Griffiths, 2020</span></a><span data-dcnode-id="5346" instrument_node="">). Death distress can also be a potential contributing factor in committing suicide (</span><a class="workspace-trigger" data-dcnode-id="5344" href="#bb0160" name="bbb0160"><span data-dcnode-id="5345" instrument_node="">Lee, Jobe, Mathis, &amp; Gibbons, 2020</span></a><span data-dcnode-id="5343" instrument_node="">).</span></p><p data-dcnode-id="5313" id="p0055"><span data-dcnode-id="5341" instrument_node="">The expectancy of death reveals different emotions and cognitions which are largely negative in nature (</span><a class="workspace-trigger" data-dcnode-id="5339" href="#bb0010" name="bbb0010"><span data-dcnode-id="5340" instrument_node="">Abdel-Khalek, 2004</span></a><span data-dcnode-id="5338" instrument_node="">). Death distress embodies negative attitudes toward death and comprises death anxiety, death depression, and death obsession. Death anxiety refers to negative emotional reactions, and awareness of death attitudes such as fear, grief, unease, and discontent of dying. Death depression refers to occurrence of negative emotions such as sadness, loneliness, hopelessness associated with one's own death, death of significant others, and general meaning of death. Death obsession reflects rumination, persistent ideas, or repetitive thoughts centred on death of own and significant others (</span><a class="workspace-trigger" data-dcnode-id="5336" href="#bb0005" name="bbb0005"><span data-dcnode-id="5337" instrument_node="">Abdel-Khalek, 1998</span></a><span data-dcnode-id="5335" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5333" href="#bb0200" name="bbb0200"><span data-dcnode-id="5334" instrument_node="">Mohammadzadeh, Ashouri, Vahedi, &amp; Asgharipour, 2018</span></a><span data-dcnode-id="5332" instrument_node="">). Despite being correlated, the three dimensions are empirically distinct concepts (</span><a class="workspace-trigger" data-dcnode-id="5330" href="#bb0165" name="bbb0165"><span data-dcnode-id="5331" instrument_node="">Lester, 2003</span></a><span data-dcnode-id="5329" instrument_node="">). People with high levels of death distress tend to experience more mental health problems or psychopathology such as distress/impairment, depression, anxiety, and stress (</span><a class="workspace-trigger" data-dcnode-id="5327" href="#bb0035" name="bbb0035"><span data-dcnode-id="5328" instrument_node="">Bodner, Shrira, Bergman, &amp; Cohen-Fridel, 2015</span></a><span data-dcnode-id="5326" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5324" href="#bb0190" name="bbb0190"><span data-dcnode-id="5325" instrument_node="">Menzies, Sharpe, &amp; Dar-Nimrod, 2019</span></a><span data-dcnode-id="5323" instrument_node="">), which may trigger risk of death or engagement in suicidal behaviours. Death distress is also associated with obsession (</span><a class="workspace-trigger" data-dcnode-id="5321" href="#bb0010" name="bbb0010"><span data-dcnode-id="5322" instrument_node="">Abdel-Khalek, 2004</span></a><span data-dcnode-id="5320" instrument_node="">), religiosity (</span><a class="workspace-trigger" data-dcnode-id="5318" href="#bb0205" name="bbb0205"><span data-dcnode-id="5319" instrument_node="">Mohammadzadeh &amp; Oraki, 2018</span></a><span data-dcnode-id="5317" instrument_node="">), satisfaction and resilience (</span><a class="workspace-trigger" data-dcnode-id="5315" href="#bb0255" name="bbb0255"><span data-dcnode-id="5316" instrument_node="">Wen, 2010</span></a><span data-dcnode-id="5314" instrument_node="">).</span></p><p data-dcnode-id="5296" id="p0060"><span data-dcnode-id="5312" instrument_node="">The negative emotions emerged during COVID-19, which can result in suicidal behaviours, can be preventable (</span><a class="workspace-trigger" data-dcnode-id="5310" href="#bb0180" name="bbb0180"><span data-dcnode-id="5311" instrument_node="">Mamun &amp; Griffiths, 2020</span></a><span data-dcnode-id="5309" instrument_node="">). Psychological resources and strengths can help individuals to cope with stressors effectively. As such, positivity can act as an important psychological strength that can protect temporal and permanent COVID-19 related tragedies. Positivity is conceptualised as a dispositional self-evaluative tendency to view one's life, and future with a positive outlook while restrains negativity (</span><a class="workspace-trigger" data-dcnode-id="5307" href="#bb0050" name="bbb0050"><span data-dcnode-id="5308" instrument_node="">Caprara et al., 2012</span></a><span data-dcnode-id="5306" instrument_node="">). Positivity is a trait-like disposition that equips people to effectively cope with challenges and weaknesses (</span><a class="workspace-trigger" data-dcnode-id="5304" href="#bb0045" name="bbb0045"><span data-dcnode-id="5305" instrument_node="">Caprara, Alessandri, &amp; Caprara, 2018</span></a><span data-dcnode-id="5303" instrument_node="">) and contributes to people's growth, development, and success (</span><a class="workspace-trigger" data-dcnode-id="5301" href="#bb0185" name="bbb0185"><span data-dcnode-id="5302" instrument_node="">McGrath, 2004</span></a><span data-dcnode-id="5300" instrument_node="">). People with high positivity evaluate their lives as worth living in general and view their lives through a positive lens (</span><a class="workspace-trigger" data-dcnode-id="5298" href="#bb0020" name="bbb0020"><span data-dcnode-id="5299" instrument_node="">Alessandri, Caprara, &amp; Tisak, 2012</span></a><span data-dcnode-id="5297" instrument_node="">).</span></p><p data-dcnode-id="5276" id="p0065"><span data-dcnode-id="5295" instrument_node="">Studies showed that positivity is significantly associated with life satisfaction, self-esteem, optimism, depressive symptoms (</span><a class="workspace-trigger" data-dcnode-id="5293" href="#bb0050" name="bbb0050"><span data-dcnode-id="5294" instrument_node="">Caprara et al., 2012</span></a><span data-dcnode-id="5292" instrument_node="">), happiness (</span><a class="workspace-trigger" data-dcnode-id="5290" href="#bb0150" name="bbb0150"><span data-dcnode-id="5291" instrument_node="">Lauriola &amp; Iani, 2015</span></a><span data-dcnode-id="5289" instrument_node="">), quality of interpersonal relationships (</span><a class="workspace-trigger" data-dcnode-id="5287" href="#bb0145" name="bbb0145"><span data-dcnode-id="5288" instrument_node="">Laguna, Alessandri, &amp; Caprara, 2017</span></a><span data-dcnode-id="5286" instrument_node="">), and resilience (</span><a class="workspace-trigger" data-dcnode-id="5284" href="#bb0195" name="bbb0195"><span data-dcnode-id="5285" instrument_node="">Milioni, Alessandri, Eisenberg, &amp; Caprara, 2016</span></a><span data-dcnode-id="5283" instrument_node="">). Evidence also suggests that people with resources, capacities, and psychological strengths such positive emotions (e.g., happiness), positive individuals' traits (e.g., positivity), and social environmental factors (e.g., social support) may help to maintain positive mental health (</span><a class="workspace-trigger" data-dcnode-id="5281" href="#bb0275" name="bbb0275"><span data-dcnode-id="5282" instrument_node="">Yildirim &amp; Arslan, 2020</span></a><span data-dcnode-id="5280" instrument_node="">). Trait-like variables have significant effects on happiness, well-being, and positive mental health (</span><a class="workspace-trigger" data-dcnode-id="5278" href="#bb0225" name="bbb0225"><span data-dcnode-id="5279" instrument_node="">Sheldon &amp; Lyubomirsky, 2004</span></a><span data-dcnode-id="5277" instrument_node="">). Due to the trait-like nature of positivity, it can act as an effective mediator toward the examination of death distress and happiness, particularly within the context of COVID-19.</span></p><p data-dcnode-id="5256" id="p0070"><span data-dcnode-id="5275" instrument_node="">Empirical studies have examined the impacts of COVID-19 related risk factors in contributing to psychological distress during the pandemic (</span><a class="workspace-trigger" data-dcnode-id="5273" href="#bb0025" name="bbb0025"><span data-dcnode-id="5274" instrument_node="">Arslan et al., 2020</span></a><span data-dcnode-id="5272" instrument_node="">), yet little attention has been paid to the underlying mechanism that reduces psychological distress and increases happiness. Previous research has shown that psychological resource capacities like hope, optimism, and self-esteem can reduce death anxiety (</span><a class="workspace-trigger" data-dcnode-id="5270" href="#bb0030" name="bbb0030"><span data-dcnode-id="5271" instrument_node="">Barnett, Anderson, &amp; Marsden III, 2018</span></a><span data-dcnode-id="5269" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5267" href="#bb0110" name="bbb0110"><span data-dcnode-id="5268" instrument_node="">Hiyoshi, Becker, Oishi, &amp; Fukuyama, 2017</span></a><span data-dcnode-id="5266" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5264" href="#bb0240" name="bbb0240"><span data-dcnode-id="5265" instrument_node="">Soleimani et al., 2020</span></a><span data-dcnode-id="5263" instrument_node="">). However, to date, there is no direct evidence testing the impact of positivity in the relationship between COVID-19 risk perception and death distress. Positivity is an individual characteristic that may assist to sustain individuals' happiness and mental health due to its protective role (</span><a class="workspace-trigger" data-dcnode-id="5261" href="#bb0050" name="bbb0050"><span data-dcnode-id="5262" instrument_node="">Caprara et al., 2012</span></a><span data-dcnode-id="5260" instrument_node="">). Thus, it is also plausible that positivity may create the motivational resources to help people cope with the challenges of pandemic and consequently protect their mental health. Terror Management Theory (TMT; </span><a class="workspace-trigger" data-dcnode-id="5258" href="#bb0100" name="bbb0100"><span data-dcnode-id="5259" instrument_node="">Greenberg, Pyszczynski, &amp; Solomon, 1986</span></a><span data-dcnode-id="5257" instrument_node="">) can help us to understand the cognitive, emotional, and behavioural responses to COVID-19. The theory assumes that people have a dual-process system that acts as a protective function against people's awareness of vulnerability and inevitable mortality. According to the TMT, death anxiety underlies much of the human behaviours, but people with high psychological resource capacities will experience less anxiety against death-related scenes.</span></p><div data-dcnode-id="5225"><p data-dcnode-id="5251" id="p0075"><span data-dcnode-id="5255" instrument_node="">Given the profound adverse effects of COVID-19 on mental health outcomes such as death distress, it is critical to understand the underlying mechanism of COVID-19 related psychological factors like perceived risk, death distress, and happiness. Therefore, this study aimed to examine the mediating role of positivity on the relationship between COVID-19 related perceived risk, death distress, and happiness. The hypotheses are as follows: (1) perceived risk would have a significant effect on positivity, death distress, and happiness; (2) positivity would have a significant effect on death distress and happiness; (3) positivity mediates the association between perceived risk, death distress and happiness (</span><a class="workspace-trigger" data-dcnode-id="5253" href="#f0005" name="bf0005"><span data-dcnode-id="5254" instrument_node="">Fig. 1</span></a><span data-dcnode-id="5252" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="5226" id="f0005"><span data-dcnode-id="5235"><img alt="Fig. 1" aria-describedby="ca0005" data-dcnode-id="5250" height="365" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0191886920305389-gr1.jpg&amp;raw"><span data-dcnode-id="5249" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5236"><li data-dcnode-id="5243"><a class="anchor download-link u-font-sans" data-dcnode-id="5244" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0191886920305389-gr1_lrg.jpg" target="_blank" title="Download high-res image (121KB)"><span class="anchor-text" data-dcnode-id="5245"><span data-dcnode-id="5248" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5246"><span data-dcnode-id="5247" instrument_node="">Download high-res image (121KB)</span></span></span></a></li><li data-dcnode-id="5237"><a class="anchor download-link u-font-sans" data-dcnode-id="5238" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0191886920305389-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5239"><span data-dcnode-id="5242" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5240"><span data-dcnode-id="5241" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5227"><span data-dcnode-id="5228" id="ca0005"><p data-dcnode-id="5229" id="sp0005"><span class="label" data-dcnode-id="5233"><span data-dcnode-id="5234" instrument_node="">Fig. 1</span></span><span data-dcnode-id="5232" instrument_node="">. </span><span data-dcnode-id="5230" instrument_node="">The proposed model indicating the associations between the variables.</span></p></span></span></figure></div></section><section data-dcnode-id="5111" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5218" id="st0025"><span data-dcnode-id="5223" instrument_node="">2</span><span data-dcnode-id="5221" instrument_node="">. </span><span data-dcnode-id="5219" instrument_node="">Method</span></h2><section data-dcnode-id="5209" id="s0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5212" id="st0030"><span data-dcnode-id="5217" instrument_node="">2.1</span><span data-dcnode-id="5215" instrument_node="">. </span><span data-dcnode-id="5213" instrument_node="">Participants</span></h3><p data-dcnode-id="5210" id="p0080"><span data-dcnode-id="5211" instrument_node="">The sample included 3109 Turkish adults drawn from general public. Their ages ranged between 18 and 70 with a mean age of 38.64 (SD =10.40). They were proportionally distributed by gender (49.98% males). The majority of participants (64.68%) were married, university graduate (39.76%), belonging to average perceived socioeconomic status (68.51%), without any chronic disease (72.40%), living with three or four people (53.30%), and living in the city centre (81.76%).</span></p></section><section data-dcnode-id="5200" id="s0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5203" id="st0035"><span data-dcnode-id="5208" instrument_node="">2.2</span><span data-dcnode-id="5206" instrument_node="">. </span><span data-dcnode-id="5204" instrument_node="">Procedure</span></h3><p data-dcnode-id="5201" id="p0085"><span data-dcnode-id="5202" instrument_node="">This study was conducted during the COVID-19 pandemic throughout April 2020. A message contained the study link was distributed online to all potential participants. Before beginning to partake in the study, participants were given information explaining the aims of the study, the voluntary nature of involvement, potential benefits, risks, and data confidentiality at the first page of the survey. After providing informed consent, they were allowed to proceed. The study protocol was approved through institutional ethical committee.</span></p></section><section data-dcnode-id="5133" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5194" id="st0040"><span data-dcnode-id="5199" instrument_node="">2.3</span><span data-dcnode-id="5197" instrument_node="">. </span><span data-dcnode-id="5195" instrument_node="">Measures</span></h3><section data-dcnode-id="5179" id="s0030"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5188" id="st0045"><span data-dcnode-id="5193" instrument_node="">2.3.1</span><span data-dcnode-id="5191" instrument_node="">. </span><span data-dcnode-id="5189" instrument_node="">COVID-19 Perceived Risk Scale (CPRS)</span></h4><p data-dcnode-id="5180" id="p0090"><span data-dcnode-id="5187" instrument_node="">The CPRS measures the COVID-19 related to personal risk (</span><a class="workspace-trigger" data-dcnode-id="5185" href="#bb0290" name="bbb0290"><span data-dcnode-id="5186" instrument_node="">Yıldırım &amp; Güler, 2020</span></a><span data-dcnode-id="5184" instrument_node="">). The scale includes 8 items and two dimensions (cognitive and emotional). Each item is rated on a Likert-type scale between 1 (negligible) and 5 (very large). Sample items include “What is the likelihood that you would acquire the COVID-19?” (cognitive) and “How worried are you about contracting the COVID-19?” (emotional). Higher scores reflect greater risk related to COVID-19. </span><a class="workspace-trigger" data-dcnode-id="5182" href="#bb0290" name="bbb0290"><span data-dcnode-id="5183" instrument_node="">Yıldırım and Güler (2020)</span></a><span data-dcnode-id="5181" instrument_node=""> reported that the CPRS has a two-factor structure (shown through exploratory and confirmatory factor analyses), good convergent validity with COVID-19 severity, self-efficacy, and mental health and high internal consistency reliability.</span></p></section><section data-dcnode-id="5164" id="s0035"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5173" id="st0050"><span data-dcnode-id="5178" instrument_node="">2.3.2</span><span data-dcnode-id="5176" instrument_node="">. </span><span data-dcnode-id="5174" instrument_node="">Positivity Scale (PS)</span></h4><p data-dcnode-id="5165" id="p0095"><span data-dcnode-id="5172" instrument_node="">The PS measures one's positive views about self, life, and future alongside his/her confidence in others (</span><a class="workspace-trigger" data-dcnode-id="5170" href="#bb0050" name="bbb0050"><span data-dcnode-id="5171" instrument_node="">Caprara et al., 2012</span></a><span data-dcnode-id="5169" instrument_node="">). The scale includes 8 items, rating on a Likert-type scale from 1 (strongly disagree) to 5 (strongly agree). A sample item is “I have great faith in the future.” Higher scores indicate greater positivity. For the scale, good evidence of reliability and validity has been reported (</span><a class="workspace-trigger" data-dcnode-id="5167" href="#bb0070" name="bbb0070"><span data-dcnode-id="5168" instrument_node="">Çıkrıkçı, Çiftçi, &amp; Gençdoğan, 2015</span></a><span data-dcnode-id="5166" instrument_node="">).</span></p></section><section data-dcnode-id="5149" id="s0040"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5158" id="st0055"><span data-dcnode-id="5163" instrument_node="">2.3.3</span><span data-dcnode-id="5161" instrument_node="">. </span><span data-dcnode-id="5159" instrument_node="">Death Distress Scale (DDS)</span></h4><p data-dcnode-id="5150" id="p0100"><span data-dcnode-id="5157" instrument_node="">The DDS is a 9-item measure of death distress with three components: anxiety, depression, and obsessive thoughts (</span><a class="workspace-trigger" data-dcnode-id="5155" href="#bb0080" name="bbb0080"><span data-dcnode-id="5156" instrument_node="">Dadfar &amp; Lester, 2020</span></a><span data-dcnode-id="5154" instrument_node="">). Items are rated on a Likert-type scale from 1 (never) to 5 (always). Sample items are “I am not at all afraid to die” (anxiety), “Hearing the word death makes me sad” (“depression”, and “I can't get the notion of death out of my mind” (obsession). The scores of each component are obtained by summing the response to each of the items on the respective component. Higher scores indicate higher levels of death distress. As the DDS has not been validated in Turkish yet, this study investigated the psychometric properties of the DSS to enhance its utility for use in research and practice (see </span><a class="workspace-trigger" data-dcnode-id="5152" href="#s0055" name="bs0055"><span data-dcnode-id="5153" instrument_node="">Results</span></a><span data-dcnode-id="5151" instrument_node=""> section).</span></p></section><section data-dcnode-id="5134" id="s0045"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5143" id="st0060"><span data-dcnode-id="5148" instrument_node="">2.3.4</span><span data-dcnode-id="5146" instrument_node="">. </span><span data-dcnode-id="5144" instrument_node="">The Short Depression-Happiness Scale (SDHS)</span></h4><p data-dcnode-id="5135" id="p0105"><span data-dcnode-id="5142" instrument_node="">The SDHS is a short measure of bipolar dimension of happiness on a continuum from depression to happiness (</span><a class="workspace-trigger" data-dcnode-id="5140" href="#bb0130" name="bbb0130"><span data-dcnode-id="5141" instrument_node="">Joseph, Linley, Harwood, Lewis, &amp; McCollam, 2004</span></a><span data-dcnode-id="5139" instrument_node="">). The scale comprises of 6 items answered on a 4-point Likert-type scale ranging from 0 (never) to 3 (often) where higher scores reflect greater happiness. A sample item is “I felt dissatisfied with my life.” </span><a class="workspace-trigger" data-dcnode-id="5137" href="#bb0280" name="bbb0280"><span data-dcnode-id="5138" instrument_node="">Yıldırım and Belen (2019)</span></a><span data-dcnode-id="5136" instrument_node=""> reported sound psychometric properties for the scale in Turkish language.</span></p></section></section><section data-dcnode-id="5112" id="s0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5127" id="st0065"><span data-dcnode-id="5132" instrument_node="">2.4</span><span data-dcnode-id="5130" instrument_node="">. </span><span data-dcnode-id="5128" instrument_node="">Data analysis</span></h3><p data-dcnode-id="5113" id="p0110"><span data-dcnode-id="5126" instrument_node="">Exploratory factor analysis (EFA) and confirmatory factor analysis (CFA) were conducted to examine the factor structure of the CPRS and DDS. Participants were randomly split into two subsamples of roughly equal size. Subsample 1 (n = 1565) was used for EFA and Subsample 2 (n = 1544) for CFA, which was conducted using SPSS-AMOS (v.24). CFA results were evaluated using multiple indices: Chi-Square/degree of freedom ratio (χ2/df), the goodness of fit index (GFI), adjusted goodness of fit (AGFI), comparative fit index (CFI), incremental fit index (IFI), Tucker-Lewis fit index (TLI), root mean squared error of approximation (RMSEA), and standardized root mean square residual (SRMR) were used to assess the fit of the model to data (</span><a class="workspace-trigger" data-dcnode-id="5124" href="#bb0500" name="bbb0500"><span data-dcnode-id="5125" instrument_node="">Tabachnick &amp; Fidell, 2007</span></a><span data-dcnode-id="5123" instrument_node="">). The statistics that represent a “good” fit are demonstrated by GFI, AGFI, CFI, IFI and TLI ≥ 0.95, RMSEA ≤0.08, SRMR ≤0.05, and χ2/df &lt; 3 (</span><a class="workspace-trigger" data-dcnode-id="5121" href="#bb0115" name="bbb0115"><span data-dcnode-id="5122" instrument_node="">Hu &amp; Bentler, 1999</span></a><span data-dcnode-id="5120" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5118" href="#bb0135" name="bbb0135"><span data-dcnode-id="5119" instrument_node="">Kline, 2005</span></a><span data-dcnode-id="5117" instrument_node="">). Pearson's correlation was run to explore the relationships between the variables. The SPSS macro PROCESS (</span><a class="workspace-trigger" data-dcnode-id="5115" href="#bb0105" name="bbb0105"><span data-dcnode-id="5116" instrument_node="">Hayes, 2013</span></a><span data-dcnode-id="5114" instrument_node="">) was used to perform mediation analyses. The bootstrapping method with 5000 resamples to estimate the 95% confidence intervals (CI) was subsequently conducted to demonstrate the significance of indirect effects.</span></p></section></section><section data-dcnode-id="4111" id="s0055"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5105" id="st0070"><span data-dcnode-id="5110" instrument_node="">3</span><span data-dcnode-id="5108" instrument_node="">. </span><span data-dcnode-id="5106" instrument_node="">Results</span></h2><section data-dcnode-id="4877" id="s0060"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5099" id="st0075"><span data-dcnode-id="5104" instrument_node="">3.1</span><span data-dcnode-id="5102" instrument_node="">. </span><span data-dcnode-id="5100" instrument_node="">Psychometric analysis</span></h3><div data-dcnode-id="4886"><p data-dcnode-id="5088" id="p0115"><span data-dcnode-id="5098" instrument_node="">Using Subsample 1 (n = 1565), we conducted EFA with principal axis factoring and promax rotation to identify the underlying factor structure of the DDS. Kaiser-Meyer-Olkin value was 0.78 and the Barlett's test of sphericity was also significant, χ2 (</span><sub data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">df=36</span></sub><span data-dcnode-id="5095" instrument_node="">) =8011,92, </span><em data-dcnode-id="5093"><span data-dcnode-id="5094" instrument_node="">p</span></em><span data-dcnode-id="5092" instrument_node=""> &lt; .001. The analysis demonstrated a three-factor solution with eigenvalue of 3.79, 2.09, and 1.20, which explained 42.08% (death obsession), 23.17% (death depression), and 13.28% (death anxiety) of the total variance, respectively. The factor loadings for the nine items ranged between 0.49 and 0.96. Internal consistency reliabilities were computed as 0.77 for death anxiety, 0.88 for death depression, and 0.91 for death obsession. Additional statistics are reported in </span><a class="workspace-trigger" data-dcnode-id="5090" href="#t0005" name="bt0005"><span data-dcnode-id="5091" instrument_node="">Table 1</span></a><span data-dcnode-id="5089" instrument_node="">.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4887" id="t0005"><span class="captions" data-dcnode-id="5080"><span data-dcnode-id="5081" id="ca0010"><p data-dcnode-id="5082" id="sp0010"><span class="label" data-dcnode-id="5086"><span data-dcnode-id="5087" instrument_node="">Table 1</span></span><span data-dcnode-id="5085" instrument_node="">. </span><span data-dcnode-id="5083" instrument_node="">Descriptive statistics and factor loadings for the nine items of DDS.</span></p></span></span><div class="groups" data-dcnode-id="4888"><table data-dcnode-id="4889"><thead data-dcnode-id="5044"><tr class="valign-top" data-dcnode-id="5062"><td class="rowsep-1" data-dcnode-id="5077" scope="col"><span class="screen-reader-only" data-dcnode-id="5078"><span data-dcnode-id="5079" instrument_node="">Empty Cell</span></span></td><td cla de-id="4969" instrument_node="">0.48</span></td><td class="align-char" data-dcnode-id="4966"><span data-dcnode-id="4967" instrument_node="">−0.98</span></td><td class="align-char" data-dcnode-id="4964"><span data-dcnode-id="4965" instrument_node="">0.00</span></td><td class="align-char" data-dcnode-id="4962"><span data-dcnode-id="4963" instrument_node="">0.79</span></td><td class="align-char" data-dcnode-id="4960"><span data-dcnode-id="4961" instrument_node="">0.03</span></td></tr><tr class="valign-middle" data-dcnode-id="4942"><td data-dcnode-id="4957"><span data-dcnode-id="4958" instrument_node="">6. I feel sad when I dream of death.</span></td><td class="align-char" data-dcnode-id="4955"><span data-dcnode-id="4956" instrument_node="">2.82</span></td><td class="align-char" data-dcnode-id="4953"><span data-dcnode-id="4954" instrument_node="">1.33</span></td><td class="align-char" data-dcnode-id="4951"><span data-dcnode-id="4952" instrument_node="">0.24</span></td><td class="align-char" data-dcnode-id="4949"><span data-dcnode-id="4950" instrument_node="">−1.06</span></td><td class="align-char" data-dcnode-id="4947"><span data-dcnode-id="4948" instrument_node="">0.01</span></td><td class="align-char" data-dcnode-id="4945"><span data-dcnode-id="4946" instrument_node="">0.91</span></td><td class="align-char" data-dcnode-id="4943"><span data-dcnode-id="4944" instrument_node="">0.01</span></td></tr><tr class="valign-middle" data-dcnode-id="4925"><td data-dcnode-id="4940"><span data-dcnode-id="4941" instrument_node="">7. I can't get the notion of death out of my mind.</span></td><td class="align-char" data-dcnode-id="4938"><span data-dcnode-id="4939" instrument_node="">2.03</span></td><td class="align-char" data-dcnode-id="4936"><span data-dcnode-id="4937" instrument_node="">1.09</span></td><td class="align-char" data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">0.91</span></td><td class="align-char" data-dcnode-id="4932"><span data-dcnode-id="4933" instrument_node="">0.15</span></td><td class="align-char" data-dcnode-id="4930"><span data-dcnode-id="4931" instrument_node="">−0.01</span></td><td class="align-char" data-dcnode-id="4928"><span data-dcnode-id="4929" instrument_node="">0.10</span></td><td class="align-char" data-dcnode-id="4926"><span data-dcnode-id="4927" instrument_node="">0.79</span></td></tr><tr class="valign-middle" data-dcnode-id="4908"><td data-dcnode-id="4923"><span data-dcnode-id="4924" instrument_node="">8. I am preoccupied by thoughts of death.</span></td><td class="align-char" data-dcnode-id="4921"><span data-dcnode-id="4922" instrument_node="">1.78</span></td><td class="align-char" data-dcnode-id="4919"><span data-dcnode-id="4920" instrument_node="">0.99</span></td><td class="align-char" data-dcnode-id="4917"><span data-dcnode-id="4918" instrument_node="">1.30</span></td><td class="align-char" data-dcnode-id="4915"><span data-dcnode-id="4916" instrument_node="">1.28</span></td><td class="align-char" data-dcnode-id="4913"><span data-dcnode-id="4914" instrument_node="">0.01</span></td><td class="align-char" data-dcnode-id="4911"><span data-dcnode-id="4912" instrument_node="">−0.04</span></td><td class="align-char" data-dcnode-id="4909"><span data-dcnode-id="4910" instrument_node="">0.96</span></td></tr><tr class="valign-middle" data-dcnode-id="4891"><td data-dcnode-id="4906"><span data-dcnode-id="4907" instrument_node="">9. I find it greatly difficult to get rid of my thoughts about death.</span></td><td class="align-char" data-dcnode-id="4904"><span data-dcnode-id="4905" instrument_node="">1.80</span></td><td class="align-char" data-dcnode-id="4902"><span data-dcnode-id="4903" instrument_node="">1.06</span></td><td class="align-char" data-dcnode-id="4900"><span data-dcnode-id="4901" instrument_node="">1.33</span></td><td class="align-char" data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">1.15</span></td><td class="align-char" data-dcnode-id="4896"><span data-dcnode-id="4897" instrument_node="">−0.01</span></td><td class="align-char" data-dcnode-id="4894"><span data-dcnode-id="4895" instrument_node="">−0.01</span></td><td class="align-char" data-dcnode-id="4892"><span data-dcnode-id="4893" instrument_node="">0.87</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="4878" id="p0120"><span data-dcnode-id="4885" instrument_node="">CFA was used to examine whether the proposed three-factor model of the DDS could be replicated in Subsample 2 (n = 1544). Other than χ2/df, which showed a moderate fit statistic-less than five- (</span><a class="workspace-trigger" data-dcnode-id="4883" href="#bb0135" name="bbb0135"><span data-dcnode-id="4884" instrument_node="">Kline, 2005</span></a><span data-dcnode-id="4882" instrument_node="">), the results evidenced a good model fit: χ2(df = 24) = 96,454, χ2/df = 4.019, </span><em data-dcnode-id="4880"><span data-dcnode-id="4881" instrument_node="">p</span></em><span data-dcnode-id="4879" instrument_node=""> &lt; .001, GFI = 0.987, AGFI = 975, IFI = 0.990, TLI = 0.985, CFI = 0.990, RMSEA = 0.044, and SRMR = 0.035. All items contributed significantly to their corresponding factor. The standardized item factor loadings ranged from 0.42 to 0.93 for anxiety, from 0.78 to 90 for depression, and from 0.84 to 0.92 for obsession.</span></p></section><section data-dcnode-id="4640" id="s0065"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4871" id="st0080"><span data-dcnode-id="4876" instrument_node="">3.2</span><span data-dcnode-id="4874" instrument_node="">. </span><span data-dcnode-id="4872" instrument_node="">Descriptive statistics</span></h3><div data-dcnode-id="4641"><p data-dcnode-id="4866" id="p0125"><span data-dcnode-id="4870" instrument_node="">Descriptive statistics, internal consistencies, and correlation matrix are presented in </span><a class="workspace-trigger" data-dcnode-id="4868" href="#t0010" name="bt0010"><span data-dcnode-id="4869" instrument_node="">Table 2</span></a><span data-dcnode-id="4867" instrument_node="">. For the main variables, skewness values ranged between −0.22 and 1.19 and that kurtosis scores ranged between −0.02 and 0.99, indicating that all variables had approximately normal distribution based on the criteria of skewness and kurtosis values ≤|2|. The internal consistency reliability of the scales had satisfactory-to-strong internal reliability coefficients (range α = 0.75 to 0.91). COVID-19 risk was negatively correlated with positivity, happiness, and positively correlated with death distress. Positivity and happiness were negatively correlated with death distress.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4642" id="t0010"><span class="captions" data-dcnode-id="4855"><span data-dcnode-id="4856" id="ca0015"><p data-dcnode-id="4857" id="sp0015"><span class="label" data-dcnode-id="4864"><span data-dcnode-id="4865" instrument_node="">Table 2</span></span><span data-dcnode-id="4863" instrument_node="">. </span><span data-dcnode-id="4861" instrument_node="">The results of descriptive statistics and correlation analysis (</span><em data-dcnode-id="4859"><span data-dcnode-id="4860" instrument_node="">N</span></em><span data-dcnode-id="4858" instrument_node=""> = 3109).</span></p></span></span><div class="groups" data-dcnode-id="4649"><table data-dcnode-id="4650"><thead data-dcnode-id="4829"><tr class="rowsep-1 valign-top" data-dcnode-id="4830"><th data-dcnode-id="4853" scope="col"><span data-dcnode-id="4854" instrument_node="">Variable</span></th><th data-dcnode-id="4851" scope="col"><span data-dcnode-id="4852" instrument_node="">α</span></th><th data-dcnode-id="4849" scope="col"><span data-dcnode-id="4850" instrument_node="">Mean</span></th><th data-dcnode-id="4847" scope="col"><span data-dcnode-id="4848" instrument_node="">SD</span></th><th data-dcnode-id="4845" scope="col"><span data-dcnode-id="4846" instrument_node="">Skew</span></th><th data-dcnode-id="4843" scope="col /td><td class="align-char" data-dcnode-id="4686"><span data-dcnode-id="4687" instrument_node="">1.19</span></td><td class="align-char" data-dcnode-id="4684"><span data-dcnode-id="4685" instrument_node="">0.99</span></td><td data-dcnode-id="4683"></td><td data-dcnode-id="4682"></td><td data-dcnode-id="4681"></td><td data-dcnode-id="4680"></td><td data-dcnode-id="4678"><span data-dcnode-id="4679" instrument_node="">–</span></td><td data-dcnode-id="4673"><span data-dcnode-id="4677" instrument_node="">−0.27</span><a class="workspace-trigger" data-dcnode-id="4674" href="#tf0005" name="btf0005"><sup data-dcnode-id="4675"><span data-dcnode-id="4676" instrument_node="">⁎⁎</span></sup></a></td></tr><tr class="valign-middle" data-dcnode-id="4652"><td data-dcnode-id="4670"><span data-dcnode-id="4671" instrument_node="">6. Depression-Happiness</span></td><td class="align-char" data-dcnode-id="4668"><span data-dcnode-id="4669" instrument_node="">0.83</span></td><td class="align-char" data-dcnode-id="4666"><span data-dcnode-id="4667" instrument_node="">10.99</span></td><td class="align-char" data-dcnode-id="4664"><span data-dcnode-id="4665" instrument_node="">3.94</span></td><td class="align-char" data-dcnode-id="4662"><span data-dcnode-id="4663" instrument_node="">−0.26</span></td><td class="align-char" data-dcnode-id="4660"><span data-dcnode-id="4661" instrument_node="">−0.35</span></td><td data-dcnode-id="4659"></td><td data-dcnode-id="4658"></td><td data-dcnode-id="4657"></td><td data-dcnode-id="4656"></td><td data-dcnode-id="4655"></td><td data-dcnode-id="4653"><span data-dcnode-id="4654" instrument_node="">–</span></td></tr></tbody></table></div><dl class="footnotes" data-dcnode-id="4643"><dt data-dcnode-id="4647" id="tf0005"><span data-dcnode-id="4648" instrument_node="">⁎⁎</span></dt><dd data-dcnode-id="4644"><p data-dcnode-id="4645" id="np0005"><span data-dcnode-id="4646" instrument_node="">Correlation is significant at the 0.001 level (2-tailed).</span></p></dd></dl></div></div></section><section data-dcnode-id="4112" id="s0070"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4634" id="st0085"><span data-dcnode-id="4639" instrument_node="">3.3</span><span data-dcnode-id="4637" instrument_node="">. </span><span data-dcnode-id="4635" instrument_node="">Testing the mediating role of positivity</span></h3><div data-dcnode-id="4113"><p data-dcnode-id="4626" id="p0130"><span data-dcnode-id="4633" instrument_node="">Following the exploration of the preliminary results, we tested the mediating role of the positivity in the relationships between coronavirus risk and death anxiety, death depression, death obsession, and happiness. The results of mediation analyses are reported in </span><a class="workspace-trigger" data-dcnode-id="4631" href="#t0015" name="bt0015"><span data-dcnode-id="4632" instrument_node="">Table 3</span></a><span data-dcnode-id="4630" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4628" href="#t0020" name="bt0020"><span data-dcnode-id="4629" instrument_node="">Table 4</span></a><span data-dcnode-id="4627" instrument_node="">. Firstly, the results showed that coronavirus risk had a significant negative direct effect on positivity, but not on death anxiety. Positivity had a significant negative direct effect on death anxiety. Positivity fully mediated the effect of coronavirus risk on death anxiety. Coronavirus risk and positivity together accounted for 1% of the total variance in death anxiety. Secondly, the direct effect of coronavirus risk on death depression was positive and significant. Coronavirus risk led to decreased positivity which in turn led to decreased death depression. Collectively, coronavirus risk and positivity accounted for 11% of the total variance in death depression. Thirdly, the direct effect of coronavirus risk on death obsession was positive and significant. The indirect effect of coronavirus risk on death obsession through positivity was negative and significant. Coronavirus risk and positivity together accounted for 10% of the total variance in death obsession. Finally, the direct effect of coronavirus risk on happiness was negative and significant. Positivity functioned as a partial mediator between coronavirus risk and happiness. Coronavirus risk led to decreased positivity which in turn led to increased happiness. Coronavirus risk and positivity accounted for 38% of the total variance in happiness.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4385" id="t0015"><span class="captions" data-dcnode-id="4618"><span data-dcnode-id="4619" id="ca0020"><p data-dcnode-id="4620" id="sp0020"><span class="label" data-dcnode-id="4624"><span data-dcnode-id="4625" instrument_node="">Table 3</span></span><span data-dcnode-id="4623" instrument_node="">. </span><span data-dcnode-id="4621" instrument_node="">Unstandardized structural path coefficients and 95% bootstrap confidence intervals (BCI).</span></p></span></span><div class="groups" data-dcnode-id="4389"><table data-dcnode-id="4390"><thead data-dcnode-id="4602"><tr class="rowsep-1 valign-top" data-dcnode-id="4603"><th data-dcnode-id="4616" scope="col"><span data-dcnode-id="4617" instrument_node="">Consequent</span></th><th data-dcnode-id="4614" scope="col"><span data-dcnode-id="4615" instrument_node="">Antecedent</span></th><th data-dcnode-id="4612" scope="col"><span data-dcnode-id="4613" instrument_node="">Coeff</span></th><th data-dcnode-id="4610" scope="col"><span data-dcnode-id="4611" instrument_node="">SE</span></th><th data-dcnode-id="4607" scope="col"><em data-dcnode-id="4608"><span data-dcnode-id="4609" instrument_node="">t</span></em></th><th data-dcnode-id="4604" scope="col"><em data-dcnode-id="4605"><span data-dcnode-id="4606" instrument_node="">p</span></em></th></tr></thead><tbody data-dcnode-id="4391"><tr class="valign-middle" data-dcnode-id="4587"><td data-dcnode-id="4600" rowspan="2"><span data-dcnode-id="4601" instrument_nod  data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">–</span></td><td data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">–</span></td><td data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node="">–</span></td><td data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node="">–</span></td><td data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node="">–</span></td><td data-dcnode-id="4135"><span data-dcnode-id="4136" instrument_node="">–</span></td><td data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">–</span></td><td data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node="">–</span></td><td data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">−0.07</span></td><td data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">−0.09</span></td><td data-dcnode-id="4125"><span data-dcnode-id="4126" instrument_node="">−0.06</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="4115"></p><p data-dcnode-id="4116" id="sp0035"><span data-dcnode-id="4120" instrument_node="">Note. </span><em data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">N</span></em><span data-dcnode-id="4117" instrument_node=""> = 3109. Bootstrap sample size = 5000.</span></p><p></p></div></div></section></section><section data-dcnode-id="4011" id="s0075"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4105" id="st0090"><span data-dcnode-id="4110" instrument_node="">4</span><span data-dcnode-id="4108" instrument_node="">. </span><span data-dcnode-id="4106" instrument_node="">Discussion</span></h2><p data-dcnode-id="4103" id="p0135"><span data-dcnode-id="4104" instrument_node="">This study investigated the role of positivity as a potential mechanism for linking between COVID-19 related perceived risk, death distress, and happiness. As predicted, perceived risk was associated with positivity, death distress, and happiness. More importantly, the results suggested that the effect of perceived risk on death distress and happiness was mediated by positivity.</span></p><p data-dcnode-id="4077" id="p0140"><span data-dcnode-id="4102" instrument_node="">Our findings that COVID-19 related perceived risk had a significant direct effect on positivity, death distress, and happiness supported our first hypothesis. This result is consistent with previous studies that explored the relationship between perceived risk and mental health outcomes occurred during the COVID-19 pandemic (e.g., </span><a class="workspace-trigger" data-dcnode-id="4100" href="#bb0015" name="bbb0015"><span data-dcnode-id="4101" instrument_node="">Ahorsu et al., 2020</span></a><span data-dcnode-id="4099" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4097" href="#bb0265" name="bbb0265"><span data-dcnode-id="4098" instrument_node="">Xiao, 2020</span></a><span data-dcnode-id="4096" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4094" href="#bb0285" name="bbb0285"><span data-dcnode-id="4095" instrument_node="">Yıldırım et al., 2020</span></a><span data-dcnode-id="4093" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4091" href="#bb0295" name="bbb0295"><span data-dcnode-id="4092" instrument_node="">Zhang et al., 2020</span></a><span data-dcnode-id="4090" instrument_node="">). This result suggests that excessive levels of COVID-19 related perceived risk can have a negative effect on psychological health by increasing experience of death distress, decreasing happiness and positive outlook about self, life, and future. Positivity was positively associated with happiness and negatively associated with death distress supporting the second hypothesis of this study. Previous studies demonstrated that higher level of positivity is related with increased satisfaction with life, happiness, optimism, resilience, and decreased depressive symptoms (</span><a class="workspace-trigger" data-dcnode-id="4088" href="#bb0050" name="bbb0050"><span data-dcnode-id="4089" instrument_node="">Caprara et al., 2012</span></a><span data-dcnode-id="4087" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4085" href="#bb0150" name="bbb0150"><span data-dcnode-id="4086" instrument_node="">Lauriola &amp; Iani, 2015</span></a><span data-dcnode-id="4084" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4082" href="#bb0195" name="bbb0195"><span data-dcnode-id="4083" instrument_node="">Milioni et al., 2016</span></a><span data-dcnode-id="4081" instrument_node="">). This suggests that individuals with higher levels of positivity report higher levels of happiness and lower levels of psychological distress. Being positive can energize one's potential, relationships, worldview, and mental energies (</span><a class="workspace-trigger" data-dcnode-id="4079" href="#bb0085" name="bbb0085"><span data-dcnode-id="4080" instrument_node="">Fredrickson, 2009</span></a><span data-dcnode-id="4078" instrument_node="">).</span></p><p data-dcnode-id="4072" id="p0145"><span data-dcnode-id="4076" instrument_node="">The main finding of this study is that positivity mediates the link between COVID-19 related perceived risk, death distress, and happiness, confirming our third hypothesis. This result suggests that the underlying mechanism between perceived risk, death distress, and happiness can be explained in part by positivity. However, it is important to note that this study used a large sample suggesting that power can be very high in terms of producing significant results. For example, coronavirus risk and positivity together explained 1% of the total variance in death anxiety. Even though the proportion of explained variance is small for this model, it is significantly different from 0, showing that the hypothesised model has a significant explanatory power. According to </span><a class="workspace-trigger" data-dcnode-id="4074" href="#bb0075" name="bbb0075"><span data-dcnode-id="4075" instrument_node="">Cohen's (1988)</span></a><span data-dcnode-id="4073" instrument_node=""> classifications of effect size where 0.02 = small, 0.15 = medium, and 0.35 = large, the amount of variance explained can be practically meaningful despite being small. This suggests that although the effects are small, positivity promotion strategies applied at an individual-level could potentially have a large cumulative impact at the population level.</span></p><p data-dcnode-id="4049" id="p0150"><span data-dcnode-id="4071" instrument_node="">The mediating role of positivity provides new insights into why people high in COVID-19 related perceived risk experience more death distress and less happiness. Studies highlighted that there is a wide range of psychological impact of pandemic related measures on people's mental health which can be severe and long-lasting (</span><a class="workspace-trigger" data-dcnode-id="4069" href="#bb0140" name="bbb0140"><span data-dcnode-id="4070" instrument_node="">Kwok et al., 2020</span></a><span data-dcnode-id="4068" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4066" href="#bb0285" name="bbb0285"><span data-dcnode-id="4067" instrument_node="">Yıldırım et al., 2020</span></a><span data-dcnode-id="4065" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4063" href="#bb0275" name="bbb0275"><span data-dcnode-id="4064" instrument_node="">Yildirim &amp; Arslan, 2020</span></a><span data-dcnode-id="4062" instrument_node="">). During the pandemic, greater exposure to negative news content related to COVID-19 on social media increases the likelihood of rumination over information (</span><a class="workspace-trigger" data-dcnode-id="4060" href="#bb0400" name="bbb0400"><span data-dcnode-id="4061" instrument_node="">Brooks et al., 2020</span></a><span data-dcnode-id="4059" instrument_node="">). Research also reported high anxiety, depression, posttraumatic stress disorders, susceptibility to social risk, low life satisfaction and positive emotions (</span><a class="workspace-trigger" data-dcnode-id="4057" href="#bb0170" name="bbb0170"><span data-dcnode-id="4058" instrument_node="">Li, Wang, Xue, Zhao, &amp; Zhu, 2020</span></a><span data-dcnode-id="4056" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4054" href="#bb0175" name="bbb0175"><span data-dcnode-id="4055" instrument_node="">Liu et al., 2020</span></a><span data-dcnode-id="4053" instrument_node="">). Strength-based model (</span><a class="workspace-trigger" data-dcnode-id="4051" href="#bb0210" name="bbb0210"><span data-dcnode-id="4052" instrument_node="">Peterson &amp; Seligman, 2004</span></a><span data-dcnode-id="4050" instrument_node="">) emphasises individuals' self-determination and strengths that help individuals to protect their psychological health in adverse conditions by focusing on positive characteristics promoting to mental health and well-being rather than negative characteristics that cause distress or disease. Accordingly, having positive psychological strengths and resources like positivity can help people to diminish the detrimental effect of COVID-19 related perceived risk on psychological health.</span></p><p data-dcnode-id="4032" id="p0155"><span data-dcnode-id="4048" instrument_node="">Concerning adaptation of the DDS into Turkish language, the results showed that the DDS is a reliable and valid measurement tool assessing death distress among Turkish public. The construct validity of the DDS confirms a three-factor structure representing anxiety, depression, and obsession with good internal consistency reliability. The DDS also had adequate correlation with other employed study variables. This result is in accordance with the original study (</span><a class="workspace-trigger" data-dcnode-id="4046" href="#bb0080" name="bbb0080"><span data-dcnode-id="4047" instrument_node="">Dadfar &amp; Lester, 2020</span></a><span data-dcnode-id="4045" instrument_node="">). Previous studies showed that three dimensions of death distress had none/low to high correlation with each other and explained different proportion of variance in an outcome variable among samples with different cultural backgrounds (e.g. </span><a class="workspace-trigger" data-dcnode-id="4043" href="#bb0010" name="bbb0010"><span data-dcnode-id="4044" instrument_node="">Abdel-Khalek, 2004</span></a><span data-dcnode-id="4042" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4040" href="#bb0165" name="bbb0165"><span data-dcnode-id="4041" instrument_node="">Lester, 2003</span></a><span data-dcnode-id="4039" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4037" href="#bb0200" name="bbb0200"><span data-dcnode-id="4038" instrument_node="">Mohammadzadeh et al., 2018</span></a><span data-dcnode-id="4036" instrument_node="">). Individual and cultural differences may influence the relationships between the dimensions of death distress and their relationships with other variables. Individual attitudes toward deaths can be formed by culture, and therefore these dimensions differ from each other across culture (</span><a class="workspace-trigger" data-dcnode-id="4034" href="#bb0200" name="bbb0200"><span data-dcnode-id="4035" instrument_node="">Mohammadzadeh et al., 2018</span></a><span data-dcnode-id="4033" instrument_node="">).</span></p><p data-dcnode-id="4024" id="p0160"><span data-dcnode-id="4031" instrument_node="">As researchers become increasingly interested in the mechanisms that underlie death distress and happiness (</span><a class="workspace-trigger" data-dcnode-id="4029" href="#bb0120" name="bbb0120"><span data-dcnode-id="4030" instrument_node="">Iverach, Menzies, &amp; Menzies, 2014</span></a><span data-dcnode-id="4028" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4026" href="#bb0270" name="bbb0270"><span data-dcnode-id="4027" instrument_node="">Yildirim, 2019</span></a><span data-dcnode-id="4025" instrument_node="">). Positivity appears to be a key factor that can contribute to this investigation. In this study, we tested a model that facilitates to explain how COVID-19 perceived risk can reduce positivity, happiness, and increase death distress. Our results suggest that positivity can help to explain how coronavirus related risk contributes to the development of death distress and reduction in happiness. Broadly, positivity and its relationships with perceived risk, death distress, and happiness in particular are promising avenues for future research within the context of health crisis.</span></p><p data-dcnode-id="4022" id="p0165"><span data-dcnode-id="4023" instrument_node="">The practical implications of this research are also important. Given that one's positive views about self, life and future were a significant mediator between COVID-19 related risk and mental health, we may be able to promote positivity that will reduce the impact of coronavirus risk on death distress and happiness. Researchers and practitioners may incorporate positivity into their treatment of distress and may focus on the exploration of ways to increase positivity that can help individuals, who are under the risk of coronavirus, to protect their mental health and maintain positive functioning.</span></p><p data-dcnode-id="4020" id="p0170"><span data-dcnode-id="4021" instrument_node="">The findings of this study should be considered in light of several limitations. First, there are different forms of COVID-19 related risk such as unknown risk and dread risk, but the present study only focused on the personal risk at general level. Future studies may explore whether the mediating effect of positivity would vary as the forms of risk perception change. Second, as participants in the current study were recruited online, it is necessary to be cautious in respect to generalization of these findings to those who are unable to access the internet. Third, the current study is based on a cross-sectional research which could not verify the causal relationship between COVID-19 perceived risk, death distress, and happiness. Subsequent studies may attempt to adopt longitudinal designs with control for possible confounders to elucidate the relationship between COVID-19 perceived risk, death distress, and happiness alongside their underlying mechanism.</span></p><p data-dcnode-id="4012" id="p0175"><span data-dcnode-id="4019" instrument_node="">Researchers have recently begun to investigate the critical role of positive traits and psychological strengths as mediators/moderators of the influence of predictors on mental health during the pandemic (</span><a class="workspace-trigger" data-dcnode-id="4017" href="#bb0025" name="bbb0025"><span data-dcnode-id="4018" instrument_node="">Arslan et al., 2020</span></a><span data-dcnode-id="4016" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4014" href="#bb0275" name="bbb0275"><span data-dcnode-id="4015" instrument_node="">Yildirim &amp; Arslan, 2020</span></a><span data-dcnode-id="4013" instrument_node="">). This study adds to this burgeoning body of research by demonstrating that positivity can diminish the negative influence of COVID-19 perceived risk on death distress and happiness. Therefore, the present findings offer fresh insights that can be utilised in tailoring and implementing subsequent psychotherapeutic approaches or psychological interventions aiming to promote one's positive views about self, life, and future. Focusing on such positive views could be a very fruitful of any intervention program aiming to help people, who are under the risk of coronavirus risk, to better function in their day-to-day lives.</span></p></section><section data-dcnode-id="4006" id="s0080"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4009" id="st0095"><span data-dcnode-id="4010" instrument_node="">CRediT authorship contribution statement</span></h2><p data-dcnode-id="4007" id="p0180"><span data-dcnode-id="4008" instrument_node="">MY and AG conceived of the study idea and design. MY performed the analysis and drafted the paper. All authors provided critical revisions. All authors approved the final version of the paper.</span></p></section></div><section data-dcnode-id="4000" id="s0090"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4003" id="st0105"><span data-dcnode-id="4004" instrument_node="">Acknowledgement</span></h2><p data-dcnode-id="4001" id="p0190"><span data-dcnode-id="4002" instrument_node="">We thank to all participants who voluntarily contributed to this study.</span></p></section><section data-dcnode-id="3995" id="s0095"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3998" id="st0110"><span data-dcnode-id="3999" instrument_node="">Declaration of competing interest</span></h2><p data-dcnode-id="3996" id="p0195"><span data-dcnode-id="3997" instrument_node="">The authors declared no conflicts of interest with respect to the research, authorship, and/or publication of this article.</span></p></section><section data-dcnode-id="3990" id="s0100"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3993" id="st0115"><span data-dcnode-id="3994" instrument_node="">Funding</span></h2><p data-dcnode-id="3991" id="p0200"><span data-dcnode-id="3992" instrument_node="">The authors received no financial support for the research, authorship, and/or publication of this article.</span></p></section><section data-dcnode-id="3985" id="s0105"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3988" id="st0120"><span data-dcnode-id="3989" instrument_node="">Ethical approval</span></h2><p data-dcnode-id="3986" id="p0205"><span data-dcnode-id="3987" instrument_node="">All procedures performed in studies involving human participants were in accordance with the ethical standards of the institutional and/or national research committee a
