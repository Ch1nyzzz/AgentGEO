d="357"></div><header data-dcnode-id="354" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Cited by (73)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="245"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="246"><ul data-dcnode-id="252"><li class="ListArticleItem" data-dcnode-id="336"><div class="sub-heading" data-dcnode-id="348"><a data-dcnode-id="351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0148296322000698" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="352" id="citing-articles-article0-title"><span data-dcnode-id="353" instrument_node="">Redefining “masstige” luxury consumption in the post-COVID era</span></h3></a><div class="article-source ellipsis" data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">2022, Journal of Business Research</span></div></div><div class="buttons" data-dcnode-id="342"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="343" type="button"><span class="button-link-text" data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="344" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="345"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="337"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="338" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="339"><p data-dcnode-id="340" id="sp0005"><span data-dcnode-id="341" instrument_node="">The concept of “new luxury” has challenged the conventional marketing of luxury goods as prestigious, leading to greater expansion of mass luxury meaning. This has become more evident since the outbreak of COVID-19, which has been a catalyst for consumption in the luxury market. This paper investigates the mass marketing of luxury goods and explores the essence of masstige luxury consumption since the outbreak of COVID-19. An interpretive approach was conducted based on semi-structured, in-depth interviews with 31 participants. It analyzes four themes of mass luxury: self as content, self as process, self as context, and self–other. We further argue that the mass consumption of luxury reduces cognitive dissonance, with the pandemic resolving the dark side of conventional luxury consumption. Our findings provide important insights for both scholars and practitioners in the development of a more holistic understanding of masstige in the post-COVID era.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="310"><div class="sub-heading" data-dcnode-id="330"><a data-dcnode-id="333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0033298421000868" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="334" id="citing-articles-article1-title"><span data-dcnode-id="335" instrument_node="">The French version of the Positivity Scale: Assessing the common factor between self-esteem, optimism and life satisfaction</span></h3></a><div class="article-source ellipsis" data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">2022, Psychologie Francaise</span></div></div><div class="buttons" data-dcnode-id="324"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="325" type="button"><span class="button-link-text" data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="326" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="327"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="311"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="312" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="313"><p data-dcnode-id="319" id="spar0005"><span data-dcnode-id="323" instrument_node="">L’objectif de cet article est de présenter l’adaptation et la validation de l’Échelle de Positivité (Caprara, Alessandri, Eisenberg, Kupfer, Steca, Caprara, &amp; Abela, 2012) à travers trois études réalisées auprès de 840&nbsp;adultes. La positivité, qui est le facteur commun et latent entre l’estime de soi, l’optimisme et la satisfaction de vie (Alessandri, Caprara, &amp; Tisak, 2012&nbsp;; Caprara, Steca, Alessandri, Abela, &amp; McWhinnie, 2010), est «&nbsp;</span><em data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">la tendance à voir la vie et les expériences avec une vision positive</span></em><span data-dcnode-id="320" instrument_node="">&nbsp;» (Caprara et al., 2012, p.&nbsp;701). L’analyse factorielle confirmatoire soutient l’unidimensionnalité du facteur G Positivité, coexistant avec deux facteurs spécifiques, l’Optimisme et l’Estime de soi. L’instrument atteste d’une très bonne fiabilité et le haut niveau de stabilité temporelle indique une très bonne fidélité. La validité a été démontrée par une bonne convergence avec l’estime de soi, l’optimisme, la satisfaction de vie ainsi que l’affect positif et par une bonne divergence avec l’affect négatif. L’étude de la validité discriminante établit qu’elle se différencie des échelles mesurant l’estime de soi, l’optimisme et la satisfaction de vie. L’étude de la validité incrémentielle montre qu’elle est capable de contribuer de manière significative, par l’effet de trois construits en une dimension unique, à la prédiction de phénomène psychologique. Cette recherche permet de disposer d’une échelle valide en 7&nbsp;items pour mesurer la positivité en langue française.</span></p><p data-dcnode-id="314" id="spar0010"><span data-dcnode-id="318" instrument_node="">The purpose of this article is to present the adaptation and the validation of the Positivity Scale (Caprara, Alessandri, Eisenberg, Kupfer, Steca, Caprara, &amp; Abela, 2012) through three studies of 840 adults. Positivity, which is a common latent factor between self-esteem, optimism and life satisfaction (Alessandri, Caprara, &amp; Tisak, 2012; Caprara, Steca, Alessandri, Abela, &amp; McWhinnie, 2010), is “</span><em data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">the tendency to view life and experiences with a positive outlook</span></em><span data-dcnode-id="315" instrument_node="">” (Caprara et al., 2012, p.&nbsp;701). Confirmatory factor analysis supports the unidimensionality of factor G Positivity, coexisting with two specific factors, optimism and self-esteem. The instrument attest very good reliability and the high level of temporal stability indicate a very good fidelity. The validity was demonstrated by a good convergence with self-esteem, optimism, life satisfaction as well as positive affect and good divergence with negative affect. The study of the discriminant validity establishes that it differs from scales measuring self-esteem, optimism and life satisfaction. The study of incremental validity shows that it can contribute significantly, through the effect of three constructs in a single dimension, to the prediction of psychological phenomena. This research provides a valid 7-item scale to measure positivity in French.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="286"><div class="sub-heading" data-dcnode-id="304"><a data-dcnode-id="307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0197457221002901" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="308" id="citing-articles-article2-title"><span data-dcnode-id="309" instrument_node="">Risk perception trajectory of elderly chronic disease patients in the community under COVID-19: A qualitative research</span></h3></a><div class="article-source ellipsis" data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">2021, Geriatric Nursing</span></div></div><div class="buttons" data-dcnode-id="298"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="299" type="button"><span class="button-link-text" data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="300" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="301"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="287"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="288" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="289"><p data-dcnode-id="296" id="spara003"><span data-dcnode-id="297" instrument_node="">While traditional “non-medical” prevention and control measures have achieved remarkable results during the COVID-19 pandemic, they have generated difficult situations for older adult patients with chronic disease. The purpose of this study was to understand and identify the COVID-19 risk perception process and trajectory among older adults with chronic disease living in the community.</span></p><p data-dcnode-id="294" id="spara004"><span data-dcnode-id="295" instrument_node="">This was a qualitative research study that used in-depth semi-structured interviews to explore the experiences of 21 older adult patients with chronic disease. Data were analyzed using conventional content analysis methods.</span></p><p data-dcnode-id="292" id="spara005"><span data-dcnode-id="293" instrument_node="">Three themes emerged: restricted travel, psychological shock and panic, and unintended consequences.</span></p><p data-dcnode-id="290" id="spara006"><span data-dcnode-id="291" instrument_node="">The perceptions of epidemic risk among older adult patients with chronic disease living in the community had varying characteristics at different stages. Correct identification of risk perception processes and trajectories will assist in formulating more scientific emergency measures in the event of future public health emergencies.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="275"><div class="sub-heading" data-dcnode-id="280"><a data-dcnode-id="283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3390/healthcare10040687" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="284" id="citing-articles-article3-title"><span data-dcnode-id="285" instrument_node="">Gender Risk Perception and Coping Mechanisms among Ghanaian University Students during the COVID-19 Pandemic</span></h3></a><div class="article-source ellipsis" data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">2022, Healthcare (Switzerland)</span></div></div><div class="buttons" data-dcnode-id="279"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="276"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="277" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="278"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="264"><div class="sub-heading" data-dcnode-id="269"><a data-dcnode-id="272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1007/s11469-020-00429-3" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="273" id="citing-articles-article4-title"><span data-dcnode-id="274" instrument_node="">The Effect of COVID-19 Anxiety on General Health: the Role of COVID-19 Coping</span></h3></a><div class="article-source ellipsis" data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">2022, International Journal of Mental Health and Addiction</span></div></div><div class="buttons" data-dcnode-id="268"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="265"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="266" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="267"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="253"><div class="sub-heading" data-dcnode-id="258"><a data-dcnode-id="261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1007/s11469-020-00416-8" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="262" id="citing-articles-article5-title"><span data-dcnode-id="263" instrument_node="">Meaningful Living to Promote Complete Mental Health Among University Students in the Context of the COVID-19 Pandemic</span></h3></a><div class="article-source ellipsis" data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">2022, International Journal of Mental Health and Addiction</span></div></div><div class="buttons" data-dcnode-id="257"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="254"><div class="abstract u-margin-m-ver u-margin-xs-
