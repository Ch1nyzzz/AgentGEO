chor level_1" data-dcnode-id="5090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totalimpactma.com/curriculum/"><span class="w-nav-title" data-dcnode-id="5092"><span data-dcnode-id="5093" instrument_node="">Student Portal</span></span><span class="w-nav-arrow" data-dcnode-id="5091"></span></a></li><li class="w-nav-close" data-dcnode-id="5088"></li></ul><div class="w-nav-options hidden" data-dcnode-id="5086" onclick="return {&quot;mobileWidth&quot;:1091,&quot;mobileBehavior&quot;:0}"></div></nav></div></div></div></div></div><div class="l-subheader for_hidden hidden" data-dcnode-id="5079"></div></header><main class="l-main" data-dcnode-id="4767" id="page-content" itemprop="mainContentOfPage"><span data-dcnode-id="5077" instrument_node="">
</span><section class="l-section height_auto for_sidebar at_right" data-dcnode-id="4768"><div class="l-section-h" data-dcnode-id="4769"><div class="g-cols type_default valign_top" data-dcnode-id="4770"><div class="vc_col-sm-9 vc_column_container l-content" data-dcnode-id="4848"><div class="vc_column-inner" data-dcnode-id="4849"><div class="wpb_wrapper" data-dcnode-id="4850"><section class="l-section wpb_row us_custom_49b0c898 height_small color_primary for_blogpost gradient_overlay with_img with_overlay" data-dcnode-id="5054"><div class="l-section-img loaded" data-dcnode-id="5076" data-img-height="471" data-img-width="1096" style="background-image: url(https://totalimpactma.com/wp-content/uploads/2019/03/IMG_6830.jpg);"></div><div class="l-section-overlay" data-dcnode-id="5075" style="background: rgba(0,0,0,0.5)"></div><div class="l-section-h i-cf" data-dcnode-id="5055"><div class="g-cols vc_row type_default valign_top" data-dcnode-id="5056"><div class="vc_col-sm-12 wpb_column vc_column_container" data-dcnode-id="5057"><div class="vc_column-inner" data-dcnode-id="5058"><div class="wpb_wrapper" data-dcnode-id="5059"><h1 class="w-post-elm post_title us_custom_e2aee182 entry-title color_link_inherit" data-dcnode-id="5073"><span data-dcnode-id="5074" instrument_node="">Top 5 Benefits of Martial Arts for Mental Health</span></h1><div class="w-hwrapper align_left valign_top wrap highlight_faded" data-dcnode-id="5060"><time class="w-post-elm post_date us_custom_ea2be81a entry-date published" data-dcnode-id="5070" datetime="2019-07-10T23:24:18-05:00" itemprop="datePublished"><i class="far fa-clock" data-dcnode-id="5072"></i><span data-dcnode-id="5071" instrument_node="">July 10, 2019</span></time><div class="w-post-elm post_author us_custom_ea2be81a vcard author color_link_inherit hidden" data-dcnode-id="5065"><i class="far fa-user" data-dcnode-id="5069"></i><div class="post-author-meta" data-dcnode-id="5066"><a class="post-author-name fn" data-dcnode-id="5067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totalimpactma.com/author/nate/"><span data-dcnode-id="5068" instrument_node="">nate</span></a></div></div><div class="w-post-elm post_taxonomy us_custom_ea2be81a style_simple color_link_inherit" data-dcnode-id="5061"><i class="far fa-folder-open" data-dcnode-id="5064"></i><a data-dcnode-id="5062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totalimpactma.com/category/benefits-of-martial-arts/"><span data-dcnode-id="5063" instrument_node="">Benefits of Martial Arts</span></a></div></div></div></div></div></div></div></section><section class="l-section wpb_row us_custom_d46e9dff height_auto" data-dcnode-id="4852"><div class="l-section-h i-cf" data-dcnode-id="4853"><div class="g-cols vc_row type_default valign_top" data-dcnode-id="4854"><div class="vc_col-sm-12 wpb_column vc_column_container" data-dcnode-id="4855"><div class="vc_column-inner us_custom_36724591" data-dcnode-id="4856"><div class="wpb_wrapper" data-dcnode-id="4857"><div class="w-post-elm post_content" data-dcnode-id="4870" itemprop="text"><section class="l-section wpb_row height_medium" data-dcnode-id="4872"><div class="l-section-h i-cf" data-dcnode-id="4873"><div class="g-cols vc_row type_default valign_top" data-dcnode-id="4874"><div class="vc_col-sm-12 wpb_column vc_column_container" data-dcnode-id="4875"><div class="vc_column-inner" data-dcnode-id="4876"><div class="wpb_wrapper" data-dcnode-id="4877"><div class="wpb_text_column" data-dcnode-id="4907"><div class="wpb_wrapper" data-dcnode-id="4908"><h5 data-dcnode-id="5050" style="text-align: center;"><em data-dcnode-id="5051"><b data-dcnode-id="5052"><span data-dcnode-id="5053" instrument_node="">“Be kind, for everyone you meet is fighting a hard battle you know nothing about.”- Socrates</span></b></em></h5><span data-dcnode-id="5049" instrument_node="">
</span><p data-dcnode-id="5028" style="text-align: justify;"><a data-dcnode-id="5046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mentalhealthamerica.net/about-us" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5047" style="font-weight: 400;"><span data-dcnode-id="5048" instrument_node="">Mental Health America</span></span></a><span data-dcnode-id="5044" style="font-weight: 400;"><span data-dcnode-id="5045" instrument_node=""> is just one of the great organizations along with </span></span><a data-dcnode-id="5041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totalimpactma.com/these-celebs-prove-that-practicing-martial-arts-pays-off-big-time/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5042" style="font-weight: 400;"><span data-dcnode-id="5043" instrument_node="">celebrity mental health advocates</span></span></a><span data-dcnode-id="5039" style="font-weight: 400;"><span data-dcnode-id="5040" instrument_node=""> and nationwide initiatives educating people on the importance of taking care of our mental &amp; emotional wellness. Mental illness affects </span></span><a data-dcnode-id="5036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nami.org/mentalhealthmonth" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5037" style="font-weight: 400;"><span data-dcnode-id="5038" instrument_node="">1 in 5 people</span></span></a><span data-dcnode-id="5034" style="font-weight: 400;"><span data-dcnode-id="5035" instrument_node="">. While a professional diagnosis is key to treating serious conditions, </span></span><a data-dcnode-id="5031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totalimpactma.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5032" style="font-weight: 400;"><span data-dcnode-id="5033" instrument_node="">martial arts</span></span></a><span data-dcnode-id="5029" style="font-weight: 400;"><span data-dcnode-id="5030" instrument_node=""> is a physical exercise that is proven to significantly improve one’s general mental well-being.</span></span></p><span data-dcnode-id="5027" instrument_node="">
</span><p data-dcnode-id="5012" style="text-align: justify;"><span data-dcnode-id="5025" style="font-weight: 400;"><span data-dcnode-id="5026" instrument_node="">Martial arts focuses on tenets and philosophies that revolve around self-discipline, integrity and resilience which comes from within ourselves. </span></span><a data-dcnode-id="5022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/7762694" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5023" style="font-weight: 400;"><span data-dcnode-id="5024" instrument_node="">According to Psychotherapeutic aspects of the martial arts</span></span></a><span data-dcnode-id="5020" style="font-weight: 400;"><span data-dcnode-id="5021" instrument_node="">, “MA’s enhance self-esteem through the provision of physical activity and group experience, and the teaching of relaxation, concentration, assertiveness, and directiveness and honesty in communication.”</span></span><span data-dcnode-id="5018" style="font-weight: 400;"><span data-dcnode-id="5019" instrument_node=""> Obtaining a black belt is extremely challenging. </span></span><a data-dcnode-id="5015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totalimpactma.com/senseis-top-five-tips-healthy-families/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5016" style="font-weight: 400;"><span data-dcnode-id="5017" instrument_node="">Reaching the goals you set is a tremendous accomplishment</span></span></a><span data-dcnode-id="5013" style="font-weight: 400;"><span data-dcnode-id="5014" instrument_node=""> and requires a lot of self-discipline and motivation. Earning these different belts and rankings help students feel a sense of progress and accomplishment. Our mental agility is strengthened on this self-mastery journey.</span></span></p><span data-dcnode-id="5011" instrument_node="">
</span><h4 data-dcnode-id="5007" style="text-align: justify;"><span data-dcnode-id="5008" style="font-weight: 400;"><a data-dcnode-id="5009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totalimpactma.com/wp-content/uploads/2019/07/IMG_5283.jpg" ref="magnificPopup"><img alt="Top 5 Benefits of Martial Arts for Mental Health - Total Impact " class="aligncenter wp-image-1592" data-dcnode-id="5010" height="422" loading="lazy" sizes="(max-width: 550px) 100vw, 550px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totalimpactma.com/wp-content/uploads/2019/07/IMG_5283-768x590.jpg&amp;raw" srcset="https://totalimpactma.com/wp-content/uploads/2019/07/IMG_5283-768x590.jpg 768w, https://totalimpactma.com/wp-content/uploads/2019/07/IMG_5283-300x230.jpg 300w, https://totalimpactma.com/wp-content/uploads/2019/07/IMG_5283-1024x786.jpg 1024w" width="550"></a></span></h4><span data-dcnode-id="5006" instrument_node="">
</span><h4 data-dcnode-id="5003" style="text-align: justify;"><span data-dcnode-id="5004" style="font-weight: 400;"><span data-dcnode-id="5005" instrument_node="">Let’s take a closer look at the 5 Benefits of Adult Martial Arts for Mental Health…</span></span></h4><span data-dcnode-id="5002" instrument_node="">
</span><h5 data-dcnode-id="4999" style="text-align: justify;"><b data-dcnode-id="5000"><span data-dcnode-id="5001" instrument_node="">Release Your Anger</span></b></h5><span data-dcnode-id="4998" instrument_node="">
</span><p data-dcnode-id="4995" style="text-align: justify;"><span data-dcnode-id="4996" style="font-weight: 400;"><span data-dcnode-id="4997" instrument_node="">Martial Arts is an intense aerobic workout, so it’s a very helpful (and fun!) way to release your anger. Kicking, punching, yelling, sweating. Research shows that martial arts training combats the harmful effects related to anger. Students learn to manage their reactions, calm their thoughts and even how to let things go.&nbsp;</span></span></p><span data-dcnode-id="4994" instrument_node="">
</span><h5 data-dcnode-id="4991" style="text-align: justify;"><b data-dcnode-id="4992"><span data-dcnode-id="4993" instrument_node="">Mindfulness</span></b></h5><span data-dcnode-id="4990" instrument_node="">
</span><p data-dcnode-id="4982" style="text-align: justify;"><span data-dcnode-id="4988" style="font-weight: 400;"><span data-dcnode-id="4989" instrument_node="">Many traditional forms of martial arts emphasize meditation and mindfulness, as well as mental strength. Not only does mindfulness decrease stress but it also benefits anyone in addiction recovery. Practicing breathing techniques inside and outside of the dojo helps calm the mind and body. Concentrating on martial arts values can </span></span><a data-dcnode-id="4985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totalimpactma.com/senseis-top-five-tips-healthy-families/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4986" style="font-weight: 400;"><span data-dcnode-id="4987" instrument_node="">help people form healthier habits</span></span></a><span data-dcnode-id="4983" style="font-weight: 400;"><span data-dcnode-id="4984" instrument_node="">, increase self-control, and reduce impulsivity.</span></span></p><span data-dcnode-id="4981" instrument_node="">
</span><h5 data-dcnode-id="4978" style="text-align: justify;"><b data-dcnode-id="4979"><span data-dcnode-id="4980" instrument_node="">Meeting Like-Minded People</span></b></h5><span data-dcnode-id="4977" instrument_node="">
</span><p data-dcnode-id="4964" style="text-align: justify;"><span data-dcnode-id="4975" style="font-weight: 400;"><span data-dcnode-id="4976" instrument_node="">The dojo is a great place to meet new people and belong to a supportive community. Surrounding yourself with people who are all working towards common goals (such as weight loss, learning self defense, taking up a new hobby) is an easy way to make meaningful friendships. For adults who are </span></span><a data-dcnode-id="4972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totalimpactma.com/strengthen-resilience-muscle-push-through-adversity/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4973" style="font-weight: 400;"><span data-dcnode-id="4974" instrument_node="">navigating major life transitions</span></span></a><span data-dcnode-id="4970" style="font-weight: 400;"><span data-dcnode-id="4971" instrument_node="">, just moved into a new area, or want to step outside their comfort zone, attending regular martial arts classes is a sure way to make friends. Come check out our </span></span><a data-dcnode-id="4967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totalimpactma.com/class-schedule/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4968" style="font-weight: 400;"><span data-dcnode-id="4969" instrument_node="">adult kickboxing class</span></span></a><span data-dcnode-id="4965" style="font-weight: 400;"><span data-dcnode-id="4966" instrument_node=""> which meets on Friday evenings at 6:30p and jumpstart your weekend with a healthy habit!</span></span></p><span data-dcnode-id="4963" instrument_node="">
</span><h5 data-dcnode-id="4958" style="text-align: justify;"><span data-dcnode-id="4961" style="font-weight: 400;"><span data-dcnode-id="4962" instrument_node="">&nbsp;</span></span><b data-dcnode-id="4959"><span data-dcnode-id="4960" instrument_node="">Increasing Confidence and Self-Esteem</span></b></h5><span data-dcnode-id="4957" instrument_node="">
</span><p data-dcnode-id="4949" style="text-align: justify;"><span data-dcnode-id="4955" style="font-weight: 400;"><span data-dcnode-id="4956" instrument_node="">“</span></span><a data-dcnode-id="4952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//believeperform.com/performance/psychological-benefits-of-martial-arts-training/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4953" style="font-weight: 400;"><span data-dcnode-id="4954" instrument_node="">The psychological benefits of martial arts training</span></span></a><span data-dcnode-id="4950" style="font-weight: 400;"><span data-dcnode-id="4951" instrument_node=""> have come to the attention of western psychologists over the last thirty years and in particular within the last ten years due to the rise in popularity of MMA (Mixed Martial Arts). It is acknowledged that martial art training embodies a system of moral values (e.g. respect property, be faithful and sincere, exert oneself in the perfection of character), that together can inculcate physical and mental relaxation, control of mind and body, and an increase in self confidence (Weiser et al, 1995).”</span></span></p><span data-dcnode-id="4948" instrument_node="">
</span><p data-dcnode-id="4945" style="text-align: justify;"><span data-dcnode-id="4946" style="font-weight: 400;"><span data-dcnode-id="4947" instrument_node="">When you work hard to become a better person, you’ll bring physical and mental relaxation to yourself. Begin to see more opportunity in your life and less stress…</span></span></p><span data-dcnode-id="4944" instrument_node="">
</span><p data-dcnode-id="4936" style="text-align: justify;"><span data-dcnode-id="4942" style="font-weight: 400;"><span data-dcnode-id="4943" instrument_node="">We also believe that students </span></span><a data-dcnode-id="4939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totalimpactma.com/5-awesome-benefits-martial-arts-children/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4940" style="font-weight: 400;"><span data-dcnode-id="4941" instrument_node="">improve their self esteem</span></span></a><span data-dcnode-id="4937" style="font-weight: 400;"><span data-dcnode-id="4938" instrument_node=""> through consistent positive verbal reinforcement from our instructors. When one masters a new skill or earns a higher belt level, their sense of achievement automatically boosts up confidence and learning to feel good about themselves!</span></span></p><span data-dcnode-id="4935" instrument_node="">
</span><h5 data-dcnode-id="4930" style="text-align: justify;"><span data-dcnode-id="4933" style="font-weight: 400;"><span data-dcnode-id="4934" instrument_node="">&nbsp;</span></span><b data-dcnode-id="4931"><span data-dcnode-id="4932" instrument_node="">Learning to Go with the Flow of Life</span></b></h5><span data-dcnode-id="4929" instrument_node="">
</span><p data-dcnode-id="4916" style="text-align: justify;"><span data-dcnode-id="4927" style="font-weight: 400;"><span data-dcnode-id="4928" instrument_node="">Developing a flexible mindset helps students become more accepting of life’s situations. For our focus, it helps on overcoming stressful decisions in life. All of us will have periods of big changes in our lives (career, family, relationships, etc) – and </span></span><a data-dcnode-id="4924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totalimpactma.com/strengthen-resilience-muscle-push-through-adversity/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4925" style="font-weight: 400;"><span data-dcnode-id="4926" instrument_node="">how we handle these transitions on a psychological level is essential for long term success</span></span></a><span data-dcnode-id="4922" style="font-weight: 400;"><span data-dcnode-id="4923" instrument_node="">. Every </span></span><a data-dcnode-id="4919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totalimpactma.com/martial-arts-classes/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4920" style="font-weight: 400;"><span data-dcnode-id="4921" instrument_node="">martial arts class</span></span></a><span data-dcnode-id="4917" style="font-weight: 400;"><span data-dcnode-id="4918" instrument_node=""> teaches the dynamics of change, response and reaction. Over time, a healthy mindset is developed and strengthened to embrace challenges and see how we are able to turn them into positive solutions!</span></span></p><span data-dcnode-id="4915" instrument_node="">
</span><h4 data-dcnode-id="4910" style="text-align: center;"><strong data-dcnode-id="4911"><a data-dcnode-id="4913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totalimpactma.com/contact/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4914" instrument_node="">Contact Total Impact</span></a><span data-dcnode-id="4912" instrument_node="">&nbsp;so we can help you improve your mental well-being through Martial Arts training!</span></strong></h4><span data-dcnode-id="4909" instrument_node="">

.5 14.5q-19 0-40-12l-449-236-449 236q-22 12-40 12-21 0-31.5-14.5t-10.5-35.5q0-6 2-20l86-500-364-354q-25-27-25-48 0-37 56-46l502-73 225-455q19-41 49-41t49 41l225 455 502 73q56 9 56 46z" data-dcnode-id="1884"></path></g></use></svg></div><span class="rplg-review-text" data-dcnode-id="1875"><span data-dcnode-id="1879" instrument_node="">I had the pleasure of trying the facility out this morning and I am impressed.A little background about me so you can sort of weigh in for a little bit of credibility (lol) I have tried different fitness centers and I will not provide a review unless I feel that they deserve one. In my fitness journey, I will try and sign up on what currently fit my fitness goals. I am currently has been focused on strengthening workouts but aiming to lose fat mass, total weight (10lbs) and to increase strength and endurance. I am not getting close to this goal and felt like I am getting slower. It’s time for a little boost from trainings. Before trying out, I have tried a couple of facilities which I just didn’t fit in.I asked a friend to join me with try outs. We were welcomed and didn’t feel like a stranger. Every one introduced themselves to us. Now, I am sort of a newbie on kickboxing but (Shihan)Brian and the others (Allen, Brandon, Jon... got your names, right? Lol)were always there to assist and explain the correct way to move to avoid injury (I was the “granny” who didnt remember what the next thing to do). They will correct without embarrassing you. The intensity of the workout has greatly met and my friend’s expectation. They gave me more than the little boost I was looking for!Knowing that I will be meeting what I wanted fitness-wise (strength, endurance, and more) while learning in a non-judgmental environment, I decided that it is the best way to reach the goal. I am 29 miles away but I will definitely see them again.Thank you very much for the great experience!!! I am excited for the next class </span><img alt="😊" class="emoji" data-dcnod s for the students, their families and the public. Having been a School Social Worker and the Executive Director of a Mental Health Clinic specializing in serving children and their families, I think I bring a special perspective to this review.What struck me first about the students at Total Impact is their enthusiasm for the programs.  You will see this especially with the kids, who are very attentive and excited about the classes.  BIG SMILES EVERYHERE!I also found Master Brian to be an incredible instructor.  In addition to being a 5th Degree Black Belt, he also has a “Black Belt” in teaching and entertaining children.  There is no doubt the students are having fun, EVERY STUDENT!  No one is left out.  The amazing thing about this is that the kids are obviously learning a lot and Master Brian has a wonderful, gentle control of class discipline.When attending special events at Total Impact, I am always impressed with the amount of participation of both the students and their families.  The attendance is amazing!  Often the parents bring snacks without even being asked to.  Everyone stays for the duration of the event.What a great, safe environment for children of all ages to learn high level martial arts, self confidence, self discipline, calmness, courtesy, and social skills.I think that the staff of Total Impact have established a perfect balance for the students.  Martial Arts are a powerful tool:  How wonderful that at Total Impact it is combined with a gentleness that comes from self-confidence.Full disclosure, Jeff Nelson, a partner and instructor at Total Impact is my son and I am very proud of it.  The above review is my honest opinion.  I would give the same review even if I were not related!</span></span></div></div></div></div><div class="rplg-form-review" data-dcnode-id="1382"><div class="rplg-row rplg-row-start" data-dcnode-id="1383"><div class="rplg-row-left" data-dcnode-id="1412"><img alt="Phil La Brec" class="rplg-review-avatar rplg-blazy" data-dc ma.com/wp-content/plugins/business-reviews-bundle/assets/img/fb_avatar.png&amp;raw" title="Andie Thomas Boever" width="50"></div><div class="rplg-row-right" data-dcnode-id="411"><a class="rplg-review-name rplg-trim" data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/10205253180126337" rel="noopener" target="_blank" title="Andie Thomas Boever"><span data-dcnode-id="447" instrument_node="">Andie Thomas Boever</span></a><div class="rplg-review-time rplg-trim" data-dcnode-id="444" data-time="1527024824"><span data-dcnode-id="445" instrument_node="">4 years ago</span></div><div class="rplg-box-content" data-dcnode-id="412"><div class="rplg-stars" data-dcnode-id="423" data-info="5,facebook,#777"><svg data-dcnode-id="440" height="17" viewBox="0 0 1792 1792" width="17"><use data-dcnode-id="441" fill="#3c5b9b" xlink:href="#star"><g data-dcnode-id="442" height="17" id="star" width="17"><path d="M1728 647q0 22-26 48l-363 354 86 500q1 7 1 20 0 21-10.5 35.5t-30.5 14.5q-19 0-40-12l-449-236-449 236q-22 12-40 12-21 0-31.5-14.5t-10.5-35.5q0-6 2-20l86-500-364-354q-25-27-25-48 0-37 56-46l502-73 225-455q19-41 49-41t49 41l225 455 502 73q56 9 56 46z" data-dcnode-id="443"></path></g></use></svg><svg data-dcnode-id="436" height="17" viewBox="0 0 1792 1792" width="17"><use data-dcnode-id="437" fill="#3c5b9b" xlink:href="#star"><g data-dcnode-id="438" height="17" id="star" width="17"><path d="M1728 647q0 22-26 48l-363 354 86 500q1 7 1 20 0 21-10.5 35.5t-30.5 14.5q-19 0-40-12l-449-236-449 236q-22 12-40 12-21 0-31.5-14.5t-10.5-35.5q0-6 2-20l86-500-364-354q-25-27-25-48 0-37 56-46l502-73 225-455q19-41 49-41t49 41l225 455 502 73q56 9 56 46z" data-dcnode-id="439"></path></g></use></svg><svg data-dcnode-id="432" height="17" viewBox="0 0 1792 1792" width="17"><use data-dcnode-id="433" fill="#3c5b9b" xlink:href="#star"><g data-dcnode-id="434" height="17" id="star" width="17"><path d="M1728 647q0 22-26 48l-363 354 86 500q1 7 1 20 0 21-10.5 35.5t-30.5 14.5q-19 0-40-12l-449-236-449 236q-22 12-40 12-21 0-31.5-14.5t-10.5-35.5q0-6 2-20l86-500-364-354q-25-27-25-48 0-37 56-46l502-73 225-455q19-41 49-41t49 41l225 455 502 73q56 9 56 46z" data-dcnode-id="435"></path></g></use></svg><svg data-dcnode-id="428" height="17" viewBox="0 0 1792 1792" width="17"><use data-dcnode-id="429" fill="#3c5b9b" xlink:href="#star"><g data-dcnode-id="430" height="17" id="star" width="17"><path d="M1728 647q0 22-26 48l-363 354 86 500q1 7 1 20 0 21-10.5 35.5t-30.5 14.5q-19 0-40-12l-449-236-449 236q-22 12-40 12-21 0-31.5-14.5t-10.5-35.5q0-6 2-20l86-500-364-354q-25-27-25-48 0-37 56-46l502-73 225-455q19-41 49-41t49 41l225 455 502 73q56 9 56 46z" data-dcnode-id="431"></path></g></use></svg><svg data-dcnode-id="424" height="17" viewBox="0 0 1792 1792" width="17"><use data-dcnode-id="425" fill="#3c5b9b" xlink:href="#star"><g data-dcnode-id="426" height="17" id="star" width="17"><path d="M1728 647q0 22-26 48l-363 354 86 500q1 7 1 20 0 21-10.5 35.5t-30.5 14.5q-19 0-40-12l-449-236-449 236q-22 12-40 12-21 0-31.5-14.5t-10.5-35.5q0-6 2-20l86-500-364-354q-25-27-25-48 0-37 56-46l502-73 225-455q19-41 49-41t49 41l225 455 502 73q56 9 56 46z" data-dcnode-id="427"></path></g></use></svg></div><span class="rplg-review-text" data-dcnode-id="413"><span data-dcnode-id="422" instrument_node="">**PLEASE take the time to read.  This is truly from my heart and not something I ever do. This is my first review to write ever.**</span><br data-dcnode-id="421"><br data-dcnode-id="420"><span data-dcnode-id="419" instrument_node="">Total Impact has been a true blessing for our family.  We just transferred for my husband’s job from Texas so being unfamiliar with everything here in Arlington Heights/Chicago I reached out to a Mom’s group and received glowing recommendations for Total Impact.  I have a 5 year old son and we have seen great improvement in his self confidence and he loves his teachers.  Master Brian, Sensei Allen and Sensei John John are amazing with the kids.  They have patience over and above.  They truly know how to balance having fun and teaching discipline along with the true skills to be successful and grow in this sport.  I could not have found a better location to send my son for true growth.  Master Brian has all the right beliefs such as teaching the kids to succeed in life, not everything is handed to you it must be worked for, success comes with hard work and diligence.  I believe children need to have the drive to win but the ability to accept loss and learn from it.  A loss is only ok when you learn from it, gaining motivitation and drive to push forward to try again.  You can be certain Master Brian, Sensei Allen and Sensei John John will give them positive reinforcement win or lose because no great accomplishment is given to you it is earned with determination and never giving up.  All of these things will not only give our children discipline,healthy habits, like minded friends, sportsmanship and life skills that will put them on a path for success.  One last thing and this is my opinion only and I respect others opinions so just know I feel strongly about this and pray others may take a moment and think about it.  Don’t be afraid to see your children lose, don’t teach them they will receive a ribbon/trophy either way.  Again, my opinion if you don’t win you don’t receive a ribbon, trophy or etc it’s just not real life.  At work when you don’t get the big promotion you were working for they don’t say good try here is a corner office for your effort.  Right or wrong I don’t believe in participation ribbons or trophies for everyone.  I grew up in a time when 1st and 2nd received recognition and sometimes only 1st.  Trust me I have a box full of trophies, ribbons and awards but just as many or more times I received nothing.  The drive and desire that gave me to push harder, train more and succeed was the most powerful motivator out there.  This has served me well in life so many times.  Just a few to mention...  I completed college on my own working during the day at Hardee’s to pay for night classes at the university, seeking out jobs at a very young age in the legal field with no experience being turned away and asking what do you need for me to be hire able?  Experience they would say, time on the job, more training.  I told them no problem I will be back and I was a year later receiving the lowest job they had as a mail/errand runner.  I was thrilled because know I could show them my abilities which I did and found myself head of the legal department because I knew from a very young age what it was to be pushed to learn and never give up with failures along the way what sweet success in the end.  All because I had a coach/ trainer like Master Brian who believed in getting up dusting yourself off and getting back to work.  I understood what they were asking for.  See I didn’t train in karate but I was a runner from the age of second grade our coach would take us to fun runs 5k and 10ks on the weekend.  I never could win because we had one girl who was so thin, had legs for days and incredible stamina from my same school.  No matter how hard I tried I couldn’t cross that line first.  I ran everyday for miles (I was young �).  Finally we were headed to a Valentine 5k and I looked at my coach this was 5th grade by now and I told him coach I’m going to sprint this whole thing, I don’t care if I puke or faint at the end.  I will just keep running I’m tired of not taking home a trophy.  And I did just that when the race started I ran like my life depended on it.  I passed the girl/my friend and I never looked back I actually started running harder out of fear she would just kick it in with those long legs and stamina that was hard to beat.  I remember seeing the finish line in site and I could hear my coach hollering you did it, you did it.  When I crossed the line I fell to my knees an accomplishment for the books, finally a trophy that yes I still display to this day 38 years later.  </span><br data-dcnode-id="418"><br data-dcnode-id="417"><span data-dcnode-id="416" instrument_node="">Sorry for the long story which might feel meaningless but Master Brian shares the same desires to motivate the young kids, mold them into young adults who know how to push and train for what they want at the same time teaching sportsmanship.  My coach always, I mean always had me congratulate the winners and give them words of praise.  Total Impact has these life lessons in mind.  They want to see their students taught the right way, learning the skills they need to be healthy, strong mentally and physically.  Total Impact also has a new word each week posted that they focus on teaching our children such as honesty, focus and courtesy just to name a few and each lesson they talk about it and have the kids say what they can do to implement.  I believe this is the place to be because trust me your children will grow to be successful in the sport gaining each belt truly deserving the honor of moving up to the next level and when that ever sought out black belt is earned,  it’s not because of money spent, 6 months of perfect attendance or other non related knowledge/skill.  That belt will proudly be awarded because the time, effort, dedication and drive set forth to learn what was needed to wear that belt was accomplished.  If you are looking to “buy” a belt just to say hey look at me, this isn’t your studio but I promise when your child EARNS that belt with his own efforts he will have so much more than just a black belt to show his skills.  What a life lesson.  My son will be at Total Impact for many years to come.  I have seen so much growth in him in such a short time it is amazing.  If you are looking for a place that will help build your child into a successful human being and prepare them for not only healthy living, defense skills but the most powerful life lesson to gain success “Never Give Up”.  Finally, for those schools, churches and organizations that feel karate is violence I challenge you to reach out to me and allow me to visit with you on this matter.  As a law enforcement officer certified in the State of Texas and Louisiana having worked for 10 plus years to date I have seen schools like Total Impact come in to public and private schools and teach children just the opposite that violence is the last resort. We ask our children to educate themselves but we in turn have to learn to do the same.  Please give Total Impact a try you will not be disappointed!!!  Join and get ready to watch your kids have a blast because it’s not drill instructors it’s a happy balance like I mentioned earlier.  PS if your child suffers from ADD, ADHD, sensory disorders, social anxiety, etc. like my little boy these guys are amazing with patience like you can’t imagine.  I see many of these issues minimizing greatly in 3 short months.   </span><br data-dcnode-id="415"><span data-dcnode-id="414" instrument_node="">#totalimpactforlife</span></span></div></div></div></div><div class="rplg-form-review" data-dcnode-id="373"><div class="rplg-row rplg-row-start" data-dcnode-id="374"><div class="rplg-row-left" data-dcnode-id="407"><img alt="Megan Meyers" class="rplg-review-avatar rplg-blazy" data-dcnode-id="408" data-src="https://platform-lookaside.fbsbx.com/platform/profilepic/?psid=2258213327544623&amp;height=56&amp;width=56&amp;ext=1653491400&amp;hash=AeSDEXEatiwuPC9ThKE" height="50" onerror="if(this.src!='https://totalimpactma.com/wp-content/plugins/business-reviews-bundle/assets/img/fb_avatar.png')this.src='https://totalimpactma.com/wp-content/plugins/business-reviews-bundle/assets/img/fb_avatar.png';" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totalimpactma.com/wp-content/plugins/business-reviews-bundle/assets/img/fb_avatar.png&amp;raw" title="Megan Meyers" width="50"></div><div class="rplg-row-right" data-dcnode-id="375"><a class="rplg-review-name rplg-trim" data-dcnode-id="405" href="h  height="17" viewBox="0 0 1792 1792" width="17"><use data-dcnode-id="388" fill="#3c5b9b" xlink:href="#star"><g data-dcnode-id="389" height="17" id="star" width="17"><path d="M1728 647q0 22-26 48l-363 354 86 500q1 7 1 20 0 21-10.5 35.5t-30.5 14.5q-19 0-40-12l-449-236-449 236q-22 12-40 12-21 0-31.5-14.5t-10.5-35.5q0-6 2-20l86-500-364-354q-25-27-25-48 0-37 56-46l502-73 225-455q19-41 49-41t49 41l225 455 502 73q56 9 56 46z" data-dcnode-id="390"></path></g></use></svg><svg data-dcnode-id="383" height="17" viewBox="0 0 1792 1792" width="17"><use data-dcnode-id="384" fill="#3c5b9b" xlink:href="#star"><g data-dcnode-id="385" height="17" id="star" width="17"><path d="M1728 647q0 22-26 48l-363 354 86 500q1 7 1 20 0 21-10.5 35.5t-30.5 14.5q-19 0-40-12l-449-236-449 236q-22 12-40 12-21 0-31.5-14.5t-10.5-35.5q0-6 2-20l86-500-364-354q-25-27-25-48 0-37 56-46l502-73 225-455q19-41 49-41t49 41l225 455 502 73q56 9 56 46z" data-dcnode-id="386"></path></g></use></svg></div><span class="rplg-review-text" data-dcnode-id="377"><span data-dcnode-id="381" instrument_node="">I found Total Impact by clicking on this add (which I almost never do) about a 6-week Get Fit Challenge. When I entered the challenge, I didn’t know what to expect and was totally out of my comfort zone, but I went anyways and I am SO glad that I did. I absolutely LOVE this place and have fallen in love with the adult kickboxing classes. Everyone there treats you like family. It doesn’t matter your skill level or if you’ve never stepped foot in a gym before. They watch each student and take the time to train with you. They will correct your form for you and show you the right way to punch, kick, squat, etc. to prevent you from getting hurt. For me this is HUGE! I’ve been to other workout classes and even had a personal trainer, but I ended up hurting my back because no one corrected my form when I was lifting weights. I am now pained every day by this injury. Total Impact is NOT like that at all. There is a huge emphasis on stretching, drinking plenty of water, and living an overall healthy lifestyle. They take the time to show you the correct movements and will explain why its important to have the correct form. I could go on and on about this place . . . </span><br data-dcnode-id="380"><br data-dcnode-id="379"><span data-dcnode-id="378" instrument_node="">This is the best workout that also teaches you discipline, respect, and self-defense. This isn’t your typical “workout class.” The challenge is in its last week and I had already decided after Day 1 that I will absolutely be sticking around to train at Total Impact for a long time. I definitely recommend anyone and everyone to check this place out and try at least one class. You won’t regret it!!</span></span></div></div></div></div><div class="rplg-form-review" data-dcnode-id="341"><div class="rplg-row rplg-row-start" data-dcnode-id="342"><div class="rplg-row-left" data-dcnode-id="371"><img alt="Penny Lewandowski" class="rplg-review-avatar rplg-blazy" data-dcnode-id="372" data-src="https://platform-lookaside.fbsbx.com/platform/profilepic/?psid=1707309649370719&amp;height=56&amp;width=56&amp;ext=1653491400&amp;hash=AeS3shYncFnNb88M7hM" height="50" onerror="if(this.src!='https://totalimpactma.com/wp-content/plugins/business-reviews-bundle/assets/img/fb_avatar.png')this.src='https://totalimpactma.com/wp-content/plugins/business-reviews-bundle/assets/img/fb_avatar.png';" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totalimpactma.com/wp-content/plugins/business-reviews-bundle/assets/img/fb_avatar.png&amp;raw" title="Penny Lewandowski" width="50"></div><div class="rplg-row-right" data-dcnode-id="343"><a class="rplg-review-name rplg-trim" data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facebook.com/10223816277224610" rel="noopener" target="_blank" title="Penny Lewandowski"><span data-dcnode-id="370" instrument_node="">Penny Lewandowski</span></a><div class="rp
