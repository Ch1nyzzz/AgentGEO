</span><div class="elementor-widget-container" data-dcnode-id="1165"><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1291" style="font-weight: 400;"><span data-dcnode-id="1292" instrument_node="">It’s been heard on the radio and spoken in times of struggle, “don’t worry, be happy.” However, it is not always easy to remind yourself. Even in these challenging times, there are ways we can help manage our stress. Different forms of exercise, such as swimming, have been proven to provide strong, lasting benefits for our mental and physical health.&nbsp;</span></span></p><span data-dcnode-id="1289" instrument_node="">
</span><h2 data-dcnode-id="1286"><b data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">The Struggle of Mental Health</span></b></h2><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1283" style="font-weight: 400;"><span data-dcnode-id="1284" instrument_node="">According to the </span></span><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/volumes/69/wr/pdfs/mm6932a1-H.pdf"><span data-dcnode-id="1281" style="font-weight: 400;"><span data-dcnode-id="1282" instrument_node="">Centers for Disease Control and Prevention (CDC)</span></span></a><span data-dcnode-id="1278" style="font-weight: 400;"><span data-dcnode-id="1279" instrument_node="">, symptoms of anxiety and depression have significantly increased in the United States during April to June of 2020, compared to the same time in 2019. Additionally, over 30 percent of U.S. adults reported struggling with anxiety and/or depression in late June 2020.&nbsp;</span></span></p><span data-dcnode-id="1276" instrument_node="">
</span><h2 data-dcnode-id="1273"><b data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Mental Health and Swimming</span></b></h2><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Depression varies&nbsp;from person to person, it comes in many different forms and there are myriad triggers and reasons for feeling hopeless and helpless. Just as causes of depression vary, so do cures, but exercise has been shown to help.</span></p><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Swimming is particularly effective for all ages and all physical abilities at reducing stress, depression and anxiety for many reasons:</span></p><span data-dcnode-id="1266" instrument_node="">
</span><h3 data-dcnode-id="1263"><b data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">1. Swimming releases endorphins</span></b></h3><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1256"><a data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clearcomfort.com//unique-pool-exercises/"><span data-dcnode-id="1260" style="font-weight: 400;"><span data-dcnode-id="1261" instrument_node="">Exercise</span></span></a><span data-dcnode-id="1257" style="font-weight: 400;"><span data-dcnode-id="1258" instrument_node=""> can reduce stress and produce feel-good hormones and chemicals in our brains, like serotonin and endorphins. As a good form of exercise, swimming can release these powerful chemicals in your brain that energize your spirits and make you feel good.</span></span></p><span data-dcnode-id="1255" instrument_node="">
</span><h3 data-dcnode-id="1252"><b data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">2. Swimming gets the whole body moving</span></b></h3><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1249" style="font-weight: 400;"><span data-dcnode-id="1250" instrument_node="">Mental health illnesses, such as depression, are positively impacted through getting the body moving with activities like swimming. Swimming i</span></span><span data-dcnode-id="1247" style="font-weight: 400;"><span data-dcnode-id="1248" instrument_node="">s </span></span><span data-dcnode-id="1245" style="font-weight: 400;"><span data-dcnode-id="1246" instrument_node="">a proven way to work your entire body and cardiovascular system. For example, just one hour of swimming can burn almost as many calories as running.&nbsp;</span></span></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1241" style="font-weight: 400;"><span data-dcnode-id="1242" instrument_node="">In addition, using swimming to </span></span><span data-dcnode-id="1239" style="font-weight: 400;"><span data-dcnode-id="1240" instrument_node="">burn calories and get the whole body moving </span></span><span data-dcnode-id="1237" style="font-weight: 400;"><span data-dcnode-id="1238" instrument_node="">will help you get </span></span><span data-dcnode-id="1235" style="font-weight: 400;"><span data-dcnode-id="1236" instrument_node="">better sleep at night</span></span><span data-dcnode-id="1233" style="font-weight: 400;"><span data-dcnode-id="1234" instrument_node=""> – which means </span></span><span data-dcnode-id="1231" style="font-weight: 400;"><span data-dcnode-id="1232" instrument_node="">you’ll have more energy in the day.</span></span></p><span data-dcnode-id="1229" instrument_node="">
</span><h3 data-dcnode-id="1226"><b data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">3. Swimming gives feelings of relaxation and positivity</span></b></h3><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">The long muscle movements and deep breathing required in swimming, much like in yoga, stimulate the brain to promote nerve cell growth and release endorphins and other stress-reducing hormones.</span></p><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1220" style="font-weight: 400;"><span data-dcnode-id="1221" instrument_node="">Additionally, swimming </span></span><span data-dcnode-id="1218" style="font-weight: 400;"><span data-dcnode-id="1219" instrument_node="">promotes changes in the brain, including neural growth and new activity patterns that create feelings of calm.</span></span></p><span data-dcnode-id="1216" instrument_node="">
</span><h3 data-dcnode-id="1213"><b data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">4. Swimming gets you away from screens</span></b></h3><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1210" style="font-weight: 400;"><span data-dcnode-id="1211" instrument_node="">According to a </span></span><a data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jmir.org/2019/4/e11485/%23%3A~%3Atext%3DThose%2520who%2520depended%2520on%2520screens%2Chigher%2520levels%2520of%2520life%2520satisfaction."><span data-dcnode-id="1208" style="font-weight: 400;"><span data-dcnode-id="1209" instrument_node="">study</span></span></a><span data-dcnode-id="1205" style="font-weight: 400;"><span data-dcnode-id="1206" instrument_node=""> from Concordia University, survey responders who depended on screens for entertainment and social media had up to 19 percent more emotional stress. These days, screens and notifications are hard to avoid, but setting time aside to unplug and get moving is becoming increasingly important. Swimming is a great way to take a break from the stimulation of calls, texts, news alerts, social media updates and “urgent” emails.&nbsp;</span></span></p><span data-dcnode-id="1203" instrument_node="">
</span><h3 data-dcnode-id="1200"><b data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">5. Swimming is inclusive to all ages and abilities&nbsp;</span></b></h3><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1198" instrument_node="">Since swimming is a non-weight bearing exercise it allows even those with painful joints, disabilities or injury to exercise weightlessly and without pain. From home or at an aquatic facility,</span><span data-dcnode-id="1196" style="font-weight: 400;"><span data-dcnode-id="1197" instrument_node="">&nbsp;</span></span><a data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clearcomfort.com//4-ways-hydrotherapy-can-help-heal/"><span data-dcnode-id="1195" instrument_node="">hydrotherapy</span></a><span data-dcnode-id="1192" style="font-weight: 400;"><span data-dcnode-id="1193" instrument_node=""> is a great way to use physical therapy practices to accelerate rehabilitation or ease chronic pain. By leveraging a feeling of weightlessness, hydrotherapy enables swimmers to perform exercises that might be too difficult to do outside of the water.</span></span></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1183" style="font-weight: 400;"><a data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//clearcomfort.com//"><span data-dcnode-id="1189" instrument_node="">Clear Comfort</span></a><span data-dcnode-id="1187" instrument_node=""> works with leading hydrotherapy pool, spa and hot tub manufacturers to provide the healthiest, freshest and easiest swimming experience with the </span><a data-dcnode-id="1185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clearcomfort.com//blog/aop-pool-sanitation-future-swimming/"><span data-dcnode-id="1186" instrument_node="">least amount of toxic chemicals</span></a><span data-dcnode-id="1184" instrument_node="">.</span></span></p><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Next time you are feeling down, stressed out or anxious, go for a swim and see if it helps.</span></p><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1176" style="font-weight: 400;"><span data-dcnode-id="1177" instrument_node="">Prioritizing strong mental health is as important as physical health and exercise can improve both. Invest time today to release endorphins and boost overall mood by jumping in the pool.&nbsp;</span></span></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1170" instrument_node="">*</span><em data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node=""> Originally published on: May 13, 2015</span></em></p><span data-dcnode-id="1166" instrument_node="">
