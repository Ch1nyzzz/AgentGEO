</span><div class="single_thumb" data-dcnode-id="953"><img alt="Mental-Health-Benefits-Of-Positive-Self-Talk" class="attachment-post-thumbnail size-post-thumbnail wp-post-image" data-dcnode-id="954" height="450" loading="lazy" sizes="(max-width: 980px) 100vw, 980px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/wp-content/uploads/2020/05/Mental-Health-Benefits-Of-Positive-Self-Talk.jpg&amp;raw" srcset="https://www.calmsage.com/wp-content/uploads/2020/05/Mental-Health-Benefits-Of-Positive-Self-Talk.jpg 980w, https://www.calmsage.com/wp-content/uploads/2020/05/Mental-Health-Benefits-Of-Positive-Self-Talk-300x138.jpg 300w, https://www.calmsage.com/wp-content/uploads/2020/05/Mental-Health-Benefits-Of-Positive-Self-Talk-768x353.jpg 768w, https://www.calmsage.com/wp-content/uploads/2020/05/Mental-Health-Benefits-Of-Positive-Self-Talk-770x354.jpg 770w" width="980"></div><span data-dcnode-id="952" instrument_node="">
</span><blockquote data-dcnode-id="946"><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="948" style="text-align: justify;"><strong data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">“Positive Self talk is the most powerful form of communication because it either empowers you or it defeats you.” – Wright Thurston</span></strong></p><span data-dcnode-id="947" instrument_node="">
</span></blockquote><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943" style="text-align: justify;"><span data-dcnode-id="944" instrument_node="">One must be willing to talk to self to learn more about our actions. The emotional wellbeing is directly reflected in our actions in life, so it is essential to be in touch with our inner self. What we pretend to be or perceive for the world on the external often clouds our connection to the spirit. Therefore, we must allow ourselves to have an introspect on the behaviour and what’s better than the positive self talk.</span></p><div class="desk_ad_para_2" data-dcnode-id="938"><ins class="adsbygoogle" data-ad-client="ca-pub-7586013374084738" data-ad-format="auto" data-ad-slot="7005359760" data-dcnode-id="942" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="941" instrument_node=""> </span></div><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="929" style="text-align: justify;"><span data-dcnode-id="936" instrument_node="">Sometimes we don’t realise the power the inner voice has over us, but that can be significantly hampering our growth. If you self talk negatively at most of the times, it can increase the </span><a data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/stress-o-meter/"><span data-dcnode-id="935" instrument_node="">stress levels</span></a><span data-dcnode-id="933" instrument_node="">. One can develop an inability to perform best as one can think less of ourselves to take a challenge. Harbouring such a habit can lead to bringing adverse events from the past to the present and </span><a data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/taking-care-of-stress-caused-by-social-annoyances/"><span data-dcnode-id="932" instrument_node="">cause unnecessary stress</span></a><span data-dcnode-id="930" instrument_node="">.</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="921" style="text-align: justify;"><span data-dcnode-id="927" instrument_node="">All of this can develop negative feelings, lack of confidence, </span><a data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/change-your-mindset-and-reduce-anxiety/"><span data-dcnode-id="926" instrument_node="">anxiety and lack of motivation will reduce</span></a><span data-dcnode-id="924" instrument_node=""> productivity. Hence, we want to tell you about the importance of positive self talk. So in this article, let’s learn a little more about that and what are the benefits of positive self talk.</span><br data-dcnode-id="923"><span data-dcnode-id="922" instrument_node="">
</span></p><div class="sys-content-toc-wrapper" data-dcnode-id="898"><h3 class="sys-content-toc-title" data-dcnode-id="917"><span data-dcnode-id="920" instrument_node="">List of Contents </span><span class="toc_toggle" data-dcnode-id="918"><button class="tocToggleBtn flaticon-up-arrow active" data-dcnode-id="919"></button></span></h3><ul class="sys-content-toc-list" data-dcnode-id="899"><li data-dcnode-id="914"><a data-dcnode-id="915" href="#what_is_positive_self_talk"><span data-dcnode-id="916" instrument_node="">What Is Positive Self Talk?</span></a></li><li data-dcnode-id="911"><a data-dcnode-id="912" href="#how_to_have_positive_self_talk"><span data-dcnode-id="913" instrument_node="">How To Have Positive Self Talk?</span></a></li><li data-dcnode-id="908"><a data-dcnode-id="909" href="#what8217s_the_importance_of_positive_self_talk"><span data-dcnode-id="910" instrument_node="">What’s The Importance Of Positive Self Talk?</span></a></li><li data-dcnode-id="905"><a data-dcnode-id="906" href="#here_are_some_of_the_positive_self_talk_benefits"><span data-dcnode-id="907" instrument_node="">Here are some of the positive self talk benefits-</span></a></li><li data-dcnode-id="902"><a data-dcnode-id="903" href="#types_of_positive_self_talk"><span data-dcnode-id="904" instrument_node="">Types Of Positive Self Talk-</span></a></li></ul></div><p data-dcnode-id="897"></p><span data-dcnode-id="896" instrument_node="">
</span><h3 data-dcnode-id="893" style="text-align: justify;"><span data-dcnode-id="894" id="what_is_positive_self_talk"><span data-dcnode-id="895" instrument_node="">What Is Positive Self Talk?</span></span></h3><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="887" style="text-align: justify;"><span data-dcnode-id="891" instrument_node="">The pep talk you give yourself before attending a meeting or giving a presentation is positive self talk. We always have an inner voice in our head which works as a narrative to us. Just like a narration goes on in a play or movie, our life story has our inner voice. This keeps telling us to weigh the pros and cons, deliver correct words while speaking and often drives our body to action. Remember that you can not </span><a data-dcnode-id="889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/bad-habits-you-need-to-avoid-to-live-a-positive-life/"><span data-dcnode-id="890" instrument_node="">live a positive life</span></a><span data-dcnode-id="888" instrument_node=""> with a negative mind.</span></p><div class="desk_ad_para_5" data-dcnode-id="882"><ins class="adsbygoogle" data-ad-client="ca-pub-7586013374084738" data-ad-format="auto" data-ad-slot="7005359760" data-dcnode-id="886" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="885" instrument_node=""> </span></div><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="876" style="text-align: justify;"><span data-dcnode-id="880" instrument_node="">So, it’s evident that while we have our little narrator with us, it’s important to make sure it’s a positive one. As the voice, we carry with us everywhere and also impacts our lives at a great extent. It’s needed that we make this internal voice a </span><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/best-self-improvement-books/"><span data-dcnode-id="879" instrument_node="">positive one to help us out in life</span></a><span data-dcnode-id="877" instrument_node=""> to make better decisions. It is generally a combination of the conscious and subconscious thoughts in our brain, the general perception of the world and the beliefs in general, which inhabit our thoughts and influence this self talk.</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873" style="text-align: justify;"><span data-dcnode-id="874" instrument_node="">So let’s make an effort to learn to have a positive attitude in life with this positive self talk.</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="867" style="text-align: justify;"><strong data-dcnode-id="868"><span data-dcnode-id="871" instrument_node="">Also Read: </span><a data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/how-to-overcome-self-doubt/" rel="noopener noreferrer"><span data-dcnode-id="870" instrument_node="">9 Most Powerful Ways To Overcome Self-Doubt</span></a></strong></p><div class="desk_ad_para_8" data-dcnode-id="862"><ins class="adsbygoogle" data-ad-client="ca-pub-7586013374084738" data-ad-format="auto" data-ad-slot="7005359760" data-dcnode-id="866" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="865" instrument_node=""> </span></div><span data-dcnode-id="861" instrument_node="">
</span><h2 data-dcnode-id="859" style="text-align: justify;"><span data-dcnode-id="860" instrument_node="">What Are The Effects Of Positive Self Talking?</span></h2><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="856" style="text-align: justify;"><span data-dcnode-id="857" instrument_node="">To begin with, one must analyze the type of self talk. It is often judged by the kind of self talk, which is a factor in taking us forward to make a decision or take actions. First, we must understand the difference between negative and positive self talk. As often, two of them are confused with being rational. We would like to give you an example of a child trying to learn a new activity. If they fail to be good in it, and no one assures them about it being completely fine, they can develop issues with it. This might lead to a problem with self-confidence in future. The kid turned adult will always talk themselves out of that activity to avoid failure. This is the kind of behaviour which can hamper our growth and worsen our mental health.</span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="850" style="text-align: justify;"><span data-dcnode-id="854" instrument_node="">The personal commentary that goes on in our brain can be misleading at times, feeding on our fears. This is how we can quickly develop anxiousness and stress ourselves over it. This can be commonly seen as a sign when we have stage fright or right before an examination. Even though it is not an impossible task, we have a fear of failing or making a fool of ourselves in front of people. Such behaviour often leads to character traits, which may drift away from our talent. A person may get panic attacks due to the </span><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/how-to-control-negative-thoughts/"><span data-dcnode-id="853" instrument_node="">negative thoughts</span></a><span data-dcnode-id="851" instrument_node=""> in the head.</span></p><span data-dcnode-id="849" instrument_node="">
</span><h3 data-dcnode-id="846" style="text-align: justify;"><span data-dcnode-id="847" id="how_to_have_positive_self_talk"><span data-dcnode-id="848" instrument_node="">How To Have Positive Self Talk?</span></span></h3><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843" style="text-align: justify;"><img alt="How To Have Positive Self Talk" class="size-full wp-image-4381 aligncenter" data-dcnode-id="844" height="340" loading="lazy" sizes="(max-width: 510px) 100vw, 510px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/wp-content/uploads/2020/05/How-To-Have-Positive-Self-Talk.png&amp;raw" srcset="https://www.calmsage.com/wp-content/uploads/2020/05/How-To-Have-Positive-Self-Talk.png 510w, https://www.calmsage.com/wp-content/uploads/2020/05/How-To-Have-Positive-Self-Talk-300x200.png 300w" width="510"></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="834" style="text-align: justify;"><span data-dcnode-id="841" instrument_node="">It is indeed said that we live in our brains, and therefore it’s important to feed it right. No </span><a data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/how-to-deal-with-your-negative-thoughts/"><span data-dcnode-id="840" instrument_node="">negative talking to self will help you eradicate the thoughts</span></a><span data-dcnode-id="838" instrument_node=""> which cause stress and panic. One learns to defeat the pain and wins over the anxiety and </span><a data-dcnode-id="836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/under-too-much-stress-here-what-you-can-do/" rel="noopener noreferrer"><span data-dcnode-id="837" instrument_node="">stress</span></a><span data-dcnode-id="835" instrument_node="">. Let’s learn the proper way to have positive self talking in this infographic. We have shown an alternative to negative self talk with a positive attitude which can help you in the below image.</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831" style="text-align: justify;"><img alt="Effects Of Positive Self Talk" class="size-full wp-image-4380 aligncenter" data-dcnode-id="832" height="516" loading="lazy" sizes="(max-width: 514px) 100vw, 514px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/wp-content/uploads/2020/05/Effects-Of-Positive-Self-Talk.png&amp;raw" srcset="https://www.calmsage.com/wp-content/uploads/2020/05/Effects-Of-Positive-Self-Talk.png 514w, https://www.calmsage.com/wp-content/uploads/2020/05/Effects-Of-Positive-Self-Talk-300x300.png 300w, https://www.calmsage.com/wp-content/uploads/2020/05/Effects-Of-Positive-Self-Talk-150x150.png 150w, https://www.calmsage.com/wp-content/uploads/2020/05/Effects-Of-Positive-Self-Talk-86x86.png 86w, https://www.calmsage.com/wp-content/uploads/2020/05/Effects-Of-Positive-Self-Talk-100x100.png 100w" width="514"></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828" style="text-align: justify;"><span data-dcnode-id="829" instrument_node="">Treat yourself as you will advise your loved ones, which will be in their best interest. Similarly, treat yourself as the person and learn to love and accept yourself. Positive self-talk, be it in whispers or out loud should always be in our benefit. Just the same way you can have a significant impact on how you think of a situation. In another exercise, we would like you to write down all the thoughts you have in a day. Now read them at the end of the day along with the actions you reluctantly avoided. You will see the issue as the negative thoughts which undermine your calibre.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825" style="text-align: justify;"><span data-dcnode-id="826" instrument_node="">Remember to give yourself the due credit for how far you have come. Success is only the part of this journey; one must not stop after one obstacle in life. The way to continue is being your cheerleader and hustling with all of your capacity. This is the only way to keep all the possibilities open for oneself as the person determines to walk on the path of positivity.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="819" style="text-align: justify;"><strong data-dcnode-id="820"><span data-dcnode-id="823" instrument_node="">Also Read: </span><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/how-to-practice-self-forgiveness/" rel="noopener noreferrer"><span data-dcnode-id="822" instrument_node="">How to Practice Self-forgiveness?</span></a></strong></p><span data-dcnode-id="818" instrument_node="">
</span><h3 data-dcnode-id="815" style="text-align: justify;"><span data-dcnode-id="816" id="what8217s_the_importance_of_positive_self_talk"><span data-dcnode-id="817" instrument_node="">What’s The Importance Of Positive Self Talk?</span></span></h3><span data-dcnode-id="814" instrument_node="">
</span><blockquote data-dcnode-id="808"><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="810" style="text-align: center;"><strong data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">“Take care of how you speak to yourself because you are listening.”</span></strong></p><span data-dcnode-id="809" instrument_node="">
</span></blockquote><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="802" style="text-align: justify;"><span data-dcnode-id="806" instrument_node="">The importance of positive self talk is simple to counter the negative thoughts in our head. This leads us to the results that we have never imagined for us. Too often, we collect a bunch of things said to us as a child and bring that to our present, which is not correct. Parents, teachers, siblings and friends all make remarks for different aspects of one’s life. The negative things stick to our brain and often lead to </span><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/signs-and-symptoms-of-depression/" rel="noopener noreferrer"><span data-dcnode-id="805" instrument_node="">depression</span></a><span data-dcnode-id="803" instrument_node=""> in some cases. We must learn that there is a better way to anticipate things, and it will be changed to good when you speak positively with your self.</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="796" style="text-align: justify;"><span data-dcnode-id="800" instrument_node="">There are several </span><a data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/mental-health-benefits-of-yoga/"><span data-dcnode-id="799" instrument_node="">mental health benefits</span></a><span data-dcnode-id="797" instrument_node=""> of positive self talk. One of them is a sports team forming a huddle and repeating their slogans to cheer the players for the victory. It has a positive impact on the human’s brain, and it lets us respond with full vigour and confidence. When you sit back and think, negative talking to self can damage your self-esteem. With positive talk, loneliness does not haunt you, instead works as a thought process to learn better about yourself.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793" style="text-align: justify;"><img alt="Importance Of Positive Self Talk" class="size-full wp-image-4382 aligncenter" data-dcnode-id="794" height="340" loading="lazy" sizes="(max-width: 596px) 100vw, 596px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/wp-content/uploads/2020/05/Importance-Of-Positive-Self-Talk.png&amp;raw" srcset="https://www.calmsage.com/wp-content/uploads/2020/05/Importance-Of-Positive-Self-Talk.png 596w, https://www.calmsage.com/wp-content/uploads/2020/05/Importance-Of-Positive-Self-Talk-300x171.png 300w" width="596"></p><span data-dcnode-id="792" instrument_node="">
</span><h3 data-dcnode-id="789" style="text-align: justify;"><span data-dcnode-id="790" id="here_are_some_of_the_positive_self_talk_benefits"><span data-dcnode-id="791" instrument_node="">Here are some of the positive self talk benefits-</span></span></h3><span data-dcnode-id="788" instrument_node="">
</span><ul data-dcnode-id="726" style="text-align: justify;"><span data-dcnode-id="787" instrument_node="">
</span><li data-dcnode-id="728" style="list-style-type: none;"><span data-dcnode-id="786" instrument_node="">
</span><ul class="ugb-block-content" data-dcnode-id="730"><span data-dcnode-id="785" instrument_node="">
</span><li data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">You learn your true potential.</span></li><span data-dcnode-id="782" instrument_node="">
</span><li data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Gain self-confidence.</span></li><span data-dcnode-id="779" instrument_node="">
</span><li data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Empower others with the belief that if you can do, they can too.</span></li><span data-dcnode-id="776" instrument_node="">
</span><li data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Removes hesitation, and the learning process comes at ease.</span></li><span data-dcnode-id="773" instrument_node="">
</span><li data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">You stop the comparison to others.</span></li><span data-dcnode-id="770" instrument_node="">
</span><li data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Have a better understanding of yourself.</span></li><span data-dcnode-id="767" instrument_node="">
</span><li data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Create a positive environment around you.</span></li><span data-dcnode-id="764" instrument_node="">
</span><li data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Have clarity in your vision.</span></li><span data-dcnode-id="761" instrument_node="">
</span><li data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Start being grateful to others and yourself.</span></li><span data-dcnode-id="758" instrument_node="">
</span><li data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Have a positive attitude.</span></li><span data-dcnode-id="755" instrument_node="">
</span><li data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Don’t feel anxious all the time.</span></li><span data-dcnode-id="752" instrument_node="">
</span><li data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">A greater sense of self-purpose in life.</span></li><span data-dcnode-id="749" instrument_node="">
</span><li data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Lesser distractions.</span></li><span data-dcnode-id="746" instrument_node="">
</span><li data-dcnode-id="741"><span data-dcnode-id="745" instrument_node="">Improved </span><a data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/podcast-ep-9-how-physical-health-impacts-mental-well-being/"><span data-dcnode-id="744" instrument_node="">physical health</span></a><span data-dcnode-id="742" instrument_node="">.</span></li><span data-dcnode-id="740" instrument_node="">
</span><li data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Enhances your performance.</span></li><span data-dcnode-id="737" instrument_node="">
</span><li data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Gives you strong willpower.</span></li><span data-dcnode-id="734" instrument_node="">
</span><li data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Have an optimistic outlook for the future.</span></li><span data-dcnode-id="731" instrument_node="">
</span></ul><span data-dcnode-id="729" instrument_node="">
</span></li><span data-dcnode-id="727" instrument_node="">
</span></ul><span data-dcnode-id="725" instrument_node="">
</span><h3 data-dcnode-id="722" style="text-align: justify;"><span data-dcnode-id="723" id="types_of_positive_self_talk"><span data-dcnode-id="724" instrument_node="">Types Of Positive Self Talk-</span></span></h3><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719" style="text-align: justify;"><img alt="types of positive self talk" class="size-full wp-image-4384 aligncenter" data-dcnode-id="720" height="340" loading="lazy" sizes="(max-width: 544px) 100vw, 544px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/wp-content/uploads/2020/05/types-of-positive-self-talk.png&amp;raw" srcset="https://www.calmsage.com/wp-content/uploads/2020/05/types-of-positive-self-talk.png 544w, https://www.calmsage.com/wp-content/uploads/2020/05/types-of-positive-self-talk-300x188.png 300w, https://www.calmsage.com/wp-content/uploads/2020/05/types-of-positive-self-talk-400x250.png 400w" width="544"></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716" style="text-align: justify;"><span data-dcnode-id="717" instrument_node="">The way we keep the internal dialogue run in our head is mostly seen in the actions. That’s why it’s needed to keep that place positive and stick to hope and encouragement. There are different ways to start speak positive with yourself.</span></p><span data-dcnode-id="715" instrument_node="">
</span><blockquote data-dcnode-id="709"><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="711" style="text-align: center;"><strong data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">“If you hear a voice within you saying, you are not a painter, then by all means paint, and that voice will be silenced. – Vincent Van Gogh</span></strong></p><span data-dcnode-id="710" instrument_node="">
</span></blockquote><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706" style="text-align: justify;"><span data-dcnode-id="707" instrument_node="">First, you can start by focusing on the way your thoughts work for daily tasks. Now, try to see what negative thoughts you see in response to that. If you get any, please try and change it to a positive one like “I am good at what I do” or “ I like my work”.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="700" style="text-align: justify;"><span data-dcnode-id="704" instrument_node="">Second, stop avoiding trying things as in your head; you have made sure you are not good enough. Positive self-talk can begin with words like ” I can try” and “Failing isn’t such a bad thing”.</span><a data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/positive-self-affirmations/"><span data-dcnode-id="703" instrument_node="">Positive affirmations</span></a><span data-dcnode-id="701" instrument_node=""> are of greatest help in turning negative thoughts into positive.</span></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="694" style="text-align: justify;"><span data-dcnode-id="698" instrument_node="">Third, </span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/how-to-accept-yourself/"><span data-dcnode-id="697" instrument_node="">accept yourself and stop the self</span></a><span data-dcnode-id="695" instrument_node=""> agonizing all the time. Body shaming is one of the biggest hurdles for many of us. We avoid multiple things just because of it, so one should start believing in self. Positive talks for this should sound like “I like the way I am”. “ I am good enough” “ I am thankful for my healthy body”.</span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="688" style="text-align: justify;"><span data-dcnode-id="692" instrument_node="">Fourth, start practising self-talk in front of a mirror with positive praises for self. This will help you boost confidence and have a positive opinion. </span><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/self-improvement-tips/" rel="noopener noreferrer"><span data-dcnode-id="691" instrument_node="">Self-improvement</span></a><span data-dcnode-id="689" instrument_node=""> is always good and necessary if you want to lead a happy life.</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="682" style="text-align: justify;"><span data-dcnode-id="686" instrument_node="">Also, learn to take the criticism not to your heart, if you feel there is a scope of betterment, do it. We are not saying that be unrealistic and just go with the positive thoughts. But, we want you to focus on the good from the circumstances and remove the negative thoughts. The positive self-talk will only promote joy, passion in your life and help you </span><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/ways-to-achieve-personal-growth-and-development/"><span data-dcnode-id="685" instrument_node="">achieve the best of yourself as a person</span></a><span data-dcnode-id="683" instrument_node="">.</span></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="678" style="text-align: justify;"><strong data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">To Sum up-</span></strong></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="672" style="text-align: justify;"><span data-dcnode-id="676" instrument_node="">The way we move forward in life relies a lot on our self-talk, therefore making it positive self-talk is required. To </span><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmsage.com/ways-to-make-you-wise-everyday/"><span data-dcnode-id="675" instrument_node="">change the way</span></a><span data-dcnode-id="673" instrument_node=""> we think will help us achieve beliefs, trust in self and improve our communication with others. Your mind will always believe what we feed it, therefore try to feed it positive things like- hope, love and truth. If you feel you are still not good enough with this practice, ask a friend to help or seek a therapist.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669" style="text-align: justify;"><span data-dcnode-id="670" instrument_node="">Please share the article with others to help them understand the benefits of positive self talk.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666" style="text-align: justify;"><span data-dcnode-id="667" instrument_node="">You can follow us on the social media platforms- Facebook, Instagram and YouTube. We post about mental health regularly on them. Share your views on the post in the comments section and let us know what topic you would like us to cover next.</span></p><span data-dcnode-id="665" instrument_node="">
