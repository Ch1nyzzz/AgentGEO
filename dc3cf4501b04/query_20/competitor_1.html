</span><p data-dcnode-id="1186" style="font-size: 24px;"><span data-dcnode-id="1187" instrument_node="">Emotional well-being is an important part of holistic wellness, as it can impact your outlook on life, your relationships, and your health. This post will share a definition of emotional well-being, why it’s important, and practical ways to achieve it.</span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Taking care of your emotional well-being matters. When you’re emotionally healthy you manage the various elements of your life and work with a range of emotions, without losing control. You bounce back.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">We’re all more aware of it right now, coming off of a year that triggered more intense emotions for many people. But attending to your emotional well-being is always a good investment, in good times or bad.&nbsp;</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Life presents events that challenge you, but when you know how to face these obstacles with a resilient mindset, your confidence in your ability to get through any circumstance is strengthened.</span></p><span data-dcnode-id="1176" instrument_node="">
</span></div><span data-dcnode-id="1174" instrument_node="">
</span></div><span data-dcnode-id="1172" instrument_node="">
</span><div data-dcnode-id="1125"><a data-dcnode-id="1171" data-hs-anchor="true" id="what-is-emotional-well-being"></a><span data-dcnode-id="1170" instrument_node="">
</span><h2 data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">What is emotional well-being?</span></h2><span data-dcnode-id="1167" instrument_node="">
</span><div data-dcnode-id="1127"><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Emotional well-being is the ability to produce positive emotions, moods, thoughts, and feelings, and adapt when confronted with adversity and stressful situations.</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1162" instrument_node="">One of its foundations is </span><a data-dcnode-id="1160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.betterup.com/en-us/about-us/blog/how-to-build-resilience-why-resilience-is-a-top-skill-for-the-workplace%3FhsLang%3Den" rel="noopener" target="_blank"><span data-dcnode-id="1161" instrument_node="">resilience</span></a><span data-dcnode-id="1159" instrument_node="">, which allows you to navigate challenging life events. Think of resilience like a muscle. It flexes and develops the more you use it. Resilience impacts how you face challenges and how you think about the challenges you face.</span></p><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1156" instrument_node="">For example, when you’re passed up </span><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.betterup.com/blog/how-to-get-promoted%3FhsLang%3Den" rel="noopener" target="_blank"><span data-dcnode-id="1155" instrument_node="">for a promotion at work</span></a><span data-dcnode-id="1153" instrument_node="">, do you feel motivated to jump into a new professional development program, or do you feel resentful? Are you optimistic that another strong opportunity will come along when the time is right, or do you feel overwhelming disappointment that you missed this particular opportunity?&nbsp;</span></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Emotional well-being allows you to focus on the positive, and manage the negative emotions and feelings you may have in a given situation. This can help you forge stronger relationships with those around you. For instance, the person promoted into the role you had wanted, or the company leader who may have inadvertently overlooked you.</span></p><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">According to the Mental Health Foundation and the CDC:</span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">“A positive sense of well-being…enables an individual to be able to function in society and meet the demands of everyday life. Well-being generally includes global judgments of life satisfaction and feelings ranging from depression to joy.”</span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">How you deal with your range of emotions is critical.</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1129"><span class="hs-cta-wrapper" data-dcnode-id="1131" id="hs-cta-wrapper-6af09f63-75b0-4522-9f58-657b09d6b6a5"><span class="hs-cta-node hs-cta-6af09f63-75b0-4522-9f58-657b09d6b6a5" data-dcnode-id="1135" data-hs-drop="true" id="hs-cta-6af09f63-75b0-4522-9f58-657b09d6b6a5" style="visibility: visible;"><a class="cta_button" cta_dest_link="https://grow.betterup.com/subscribe-betterup-blog" data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.betterup.com/cs/c/%3Fcta_guid%3Dea0f7ea0-05df-4b10-a07a-41456399977e%26signature%3DAAH58kHoDjiM8RciG4hEupZl6xdN9vBOzQ%26pageId%3D49164634542%26placement_guid%3D6af09f63-75b0-4522-9f58-657b09d6b6a5%26canon%3Dhttps%253A%252F%252Fwww.betterup.com%252Fblog%252Fwhat-is-emotional-well-being%26portal_id%3D9253440" id="cta_button_9253440_ea0f7ea0-05df-4b10-a07a-41456399977e"><img alt="subscribe-cta" class="hs-cta-img" data-dcnode-id="1137" height="100" id="hs-cta-img-6af09f63-75b0-4522-9f58-657b09d6b6a5" mce_noresize="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//f.hubspotusercontent40.net/hubfs/9253440/hub_generated/resized/d1209f9c-3880-44f3-b6bc-cd467f72b1d3.png&amp;raw" style="border-width: 0px; " width="900"></a></span></span></p><span data-dcnode-id="1128" instrument_node="">
</span></div><span data-dcnode-id="1126" instrument_node="">
</span></div><span data-dcnode-id="1124" instrument_node="">
</span><div class="cta-box clickable" data-dcnode-id="1106"><span data-dcnode-id="1123" instrument_node="">
</span><div class="row align-items-center" data-dcnode-id="1108"><span data-dcnode-id="1122" instrument_node="">
</span><div class="col-sm-7" data-dcnode-id="1117"><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Personalized support helps build mental and emotional well-being.</span></p><span data-dcnode-id="1118" instrument_node="">
</span></div><span data-dcnode-id="1116" instrument_node="">
</span><div class="col-sm-5" data-dcnode-id="1110"><span data-dcnode-id="1115" instrument_node="">
</span><p class="align-center" data-dcnode-id="1112"><a class="button white primary-tex" data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.betterup.com/en-us/solutions/betterup-care%3FhsLang%3Den" title="Find out more"><span data-dcnode-id="1114" instrument_node=""> Find out more </span></a></p><span data-dcnode-id="1111" instrument_node="">
</span></div><span data-dcnode-id="1109" instrument_node="">
</span></div><span data-dcnode-id="1107" instrument_node="">
</span></div><span data-dcnode-id="1105" instrument_node="">
</span><div data-dcnode-id="1069"><a data-dcnode-id="1104" data-hs-anchor="true" id="why-is-emotional-well-being-important"></a><span data-dcnode-id="1103" instrument_node="">
</span><h2 data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Why is emotional well-being important?</span></h2><span data-dcnode-id="1100" instrument_node="">
</span><div data-dcnode-id="1071"><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Your resilience grows when you recognize the emotions that trigger you and express them in a constructive manner to yourself and others.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">“If we do not transform our pain, we will most assuredly transmit it — usually to those closest to us: our family, our neighbors, our co-workers, and invariably, the most vulnerable, our children.”&nbsp; - Fr. Richard Rohr</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">To transform that adversity, begin by observing and managing your thoughts, feelings, and behaviors. That helps determine the actions you take and completely changes the way you handle stressful situations and make decisions.</span></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">As you place more emphasis on your emotional well-being, you’re able to:</span></p><span data-dcnode-id="1087" instrument_node="">
</span><ul data-dcnode-id="1076"><span data-dcnode-id="1086" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1084" style="font-weight: 400;"><span data-dcnode-id="1085" instrument_node="">Receive and offer feedback with a healthy perspective.</span></li><span data-dcnode-id="1083" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1081" style="font-weight: 400;"><span data-dcnode-id="1082" instrument_node="">Have discussions and difficult conversations with anyone.</span></li><span data-dcnode-id="1080" instrument_node="">
</span><li aria-level="1" data-dcnode-id="1078" style="font-weight: 400;"><span data-dcnode-id="1079" instrument_node="">Establish stronger relationships.</span></li><span data-dcnode-id="1077" instrument_node="">
</span></ul><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">That’s because your level of understanding, empathy, humor, and compassion increases. You view yourself and others with less judgment.</span></p><span data-dcnode-id="1072" instrument_node="">
</span></div><span data-dcnode-id="1070" instrument_node="">
</span></div><span data-dcnode-id="1068" instrument_node="">
</span><div data-dcnode-id="1038"><a data-dcnode-id="1067" data-hs-anchor="true" id="emotional-well-being-health"></a><span data-dcnode-id="1066" instrument_node="">
</span><h2 data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">What’s the relationship between emotional well-being and health?</span></h2><span data-dcnode-id="1063" instrument_node="">
</span><div data-dcnode-id="1040"><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Everything in your life — emotional, social, spiritual, physical, and intellectual — connects in a state of well-being. For example, walking just 10-15 minutes a day gives your brain a boost. That means more energy, awareness, and a healthier outlook on life. Because exercise of any sort balances your dopamine and serotonin levels, it also improves your sleep and reduces stress and anxiety. All of this can make you better equipped to manage your feelings and emotions.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1058" instrument_node="">Each area of your well-being has the potential to impact other areas. Many research studies focus on how poor </span><a data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.betterup.com/en-us/about-us/blog/what-is-mental-wellbeing-3-steps-to-boost-your-mental-health%3FhsLang%3Den" rel="noopener" target="_blank"><span data-dcnode-id="1057" instrument_node="">mental well-being</span></a><span data-dcnode-id="1055" instrument_node=""> negatively impacts physical health — leading to an increased risk in cancer, heart disease, and respiratory disease. And there is an emerging set of data that is focusing on the effects of positive well-being.</span></p><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1052" instrument_node="">For example, in a PhD project involving mental health and life stories, </span><a data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//psy.au.dk/en/research/research-projects/life-stories/ongoing-studies/how-are-life-stories-related-to-well-being/" rel="noopener" target="_blank"><span data-dcnode-id="1051" instrument_node="">Rikke Jensen</span></a><span data-dcnode-id="1049" instrument_node=""> found a compelling connection between what you say about yourself and your experience of well-being. She asked 259 adults to describe up to ten specific memories in their life stories and answer questions about whether the events were related to positive or negative aspects of who they were. She found that life stories dominated by positive events and connections were related to higher </span><a data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.betterup.com/en-us/about-us/blog/what-is-subjective-wellbeing%3FhsLang%3Den" rel="noopener" target="_blank"><span data-dcnode-id="1048" instrument_node="">subjective well-being</span></a><span data-dcnode-id="1046" instrument_node="">, while life stories dominated by negative events and connections were related to lower subjective well-being.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">It makes sense that your stories reflect what you’re feeling about yourself, your health, and how you relate to others. Consider that the next time you share what happened in your day. Take control of your emotional well-being by focusing on the positive emotions you felt, and processing and learning from any negative experiences.</span></p><span data-dcnode-id="1041" instrument_node="">
</span></div><span data-dcnode-id="1039" instrument_node="">
</span></div><span data-dcnode-id="1037" instrument_node="">

</span><a data-dcnode-id="992" data-hs-anchor="true" id="examples"></a><span data-dcnode-id="991" instrument_node="">
</span><h2 data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">What are some emotional well-being examples?</span></h2><span data-dcnode-id="988" instrument_node="">
</span><div data-dcnode-id="891"><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Strong emotional well-being means you’re prepared to face events that may or may not be in your control. When faced with a challenging situation, you might use one of these strategies to bring yourself into a frame of mind that allows you to manage your emotions.</span></p><span data-dcnode-id="984" instrument_node="">
</span><h4 data-dcnode-id="981"><strong data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">You breathe, ground yourself, and pause</span></strong></h4><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">In a stressful situation, this simple three-step process can help you better control your emotions.&nbsp;</span></p><span data-dcnode-id="977" instrument_node="">
</span><ol data-dcnode-id="960"><span data-dcnode-id="976" instrument_node="">
</span><li aria-level="1" data-dcnode-id="972" style="font-weight: 400;"><strong data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Breathe.</span></strong><span data-dcnode-id="973" instrument_node=""> When you breathe deeply, you send a message to your brain that helps you calm down and relax.&nbsp;</span></li><span data-dcnode-id="971" instrument_node="">
</span><li aria-level="1" data-dcnode-id="967" style="font-weight: 400;"><strong data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Ground yourself.</span></strong><span data-dcnode-id="968" instrument_node=""> Hold a pen. Grab the edge of a desk. Feel the floor under your feet. You return to the present moment and away from your challenging thoughts.&nbsp;</span></li><span data-dcnode-id="966" instrument_node="">
</span><li aria-level="1" data-dcnode-id="962" style="font-weight: 400;"><strong data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Pause.</span></strong><span data-dcnode-id="963" instrument_node=""> Wait. Now consider, “What do I really want to say?” When you know the words that will express what you need to communicate, you are in a state of emotional well-being.</span></li><span data-dcnode-id="961" instrument_node="">
</span></ol><span data-dcnode-id="959" instrument_node="">
</span><h4 data-dcnode-id="948"><strong data-dcnode-id="949"><span class="hs-cta-wrapper" data-dcnode-id="951" id="hs-cta-wrapper-85abf680-e44b-43d9-a5fe-9766648a2e10"><span class="hs-cta-node hs-cta-85abf680-e44b-43d9-a5fe-9766648a2e10" data-dcnode-id="955" data-hs-drop="true" id="hs-cta-85abf680-e44b-43d9-a5fe-9766648a2e10" style="visibility: visible;"><a class="cta_button" cta_dest_link="https://www.betterup.com/for-individuals?utm_medium=in-article-cta&amp;utm_source=bu_blog&amp;utm_campaign=d2c&amp;utm_content=elevate%20potential_half%20size_v2" data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.betterup.com/cs/c/%3Fcta_guid%3D5fb69a19-f08e-4fc8-a0ea-c99592bfd485%26signature%3DAAH58kHL0swDRMWUS7qgORbZ1VqXJ4e9FQ%26pageId%3D49164634542%26placement_guid%3D85abf680-e44b-43d9-a5fe-9766648a2e10%26canon%3Dhttps%253A%252F%252Fwww.betterup.com%252Fblog%252Fwhat-is-emotional-well-being%26portal_id%3D9253440" id="cta_button_9253440_5fb69a19-f08e-4fc8-a0ea-c99592bfd485" rel="noopener" target="_blank"><img alt="elevate your potential - coaching for individuals" class="hs-cta-img" data-dcnode-id="957" height="300" id="hs-cta-img-85abf680-e44b-43d9-a5fe-9766648a2e10" mce_noresize="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//f.hubspotusercontent40.net/hubfs/9253440/hub_generated/resized/18476556-ad2c-468b-8865-9f9f69f8d389.jpeg&amp;raw" style="border-width: 0px; " width="1800"></a></span></span></strong></h4><span data-dcnode-id="947" instrument_node="">
</span><h4 data-dcnode-id="944"><strong data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">You respond instead of react</span></strong></h4><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="942" instrument_node="">To </span><i data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">respond</span></i><span data-dcnode-id="939" instrument_node=""> is to exercise emotional intelligence. To </span><i data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">react</span></i><span data-dcnode-id="936" instrument_node=""> is to be emotional. So how do you consistently respond instead of react? Begin by slowing down the process.&nbsp;</span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Responding means you think through what you want to have happen in an interaction or conflict. You are measured, thoughtful, and allow creative ideas to enter the process.&nbsp;</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Reacting, on the other hand, is typically immediate, without thought, and often results in a negative outcome.</span></p><span data-dcnode-id="928" instrument_node="">
</span><h4 data-dcnode-id="925"><strong data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">You question your thoughts</span></strong></h4><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="923" instrument_node="">The latest scientific research finds that the average person has more than six-thousand thoughts every day. The next time a thought challenges your emotional well-being, follow a pattern by self-Inquiry teacher </span><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thework.com/2017/10/four-liberating-questions/" rel="noopener" target="_blank"><span data-dcnode-id="922" instrument_node="">Byron Katie</span></a><span data-dcnode-id="920" instrument_node=""> and ask yourself these four questions:</span></p><span data-dcnode-id="918" instrument_node="">
</span><ol data-dcnode-id="896"><span data-dcnode-id="917" instrument_node="">
</span><li data-dcnode-id="913"><i data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Is it true?</span></i><span data-dcnode-id="914" instrument_node=""> Consider whether the thought reflects how you really feel. For example, if you think, “My life is a disaster right now,” consider whether you truly feel that way.</span></li><span data-dcnode-id="912" instrument_node="">
</span><li data-dcnode-id="908"><i data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Is it absolutely true? </span></i><span data-dcnode-id="909" instrument_node="">Go deeper, open your mind, and question what you think you know. If, after the first question, you thought, “Yes, my life is truly a disaster,” consider why you think that. Are there perhaps just a few things you could change, and can you find some things are going well?</span></li><span data-dcnode-id="907" instrument_node="">
</span><li data-dcnode-id="903"><em data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">How do I feel when I think that thought?</span></em><span data-dcnode-id="904" instrument_node=""> Consider the emotions and feelings that come along with a negative thought. For example, when you think your life is a disaster, you might feel hopeless, anxious, or melancholy.</span></li><span data-dcnode-id="902" instrument_node="">
</span><li data-dcnode-id="898"><em data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Who would I be without that thought?</span></em><span data-dcnode-id="899" instrument_node=""> Now, imagine your life without that negative thought. For example, you might be happier, more motivated, and more focused if you thought your life was wonderful. Consider which thoughts and feelings you prefer and make a conscious decision to focus on that.&nbsp;</span></li><span data-dcnode-id="897" instrument_node="">
</span></ol><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">To wrap up this practice, use the final step of turning around the initial thought that challenged your well-being. Come up with three reasons why your new thought might be true. The practice of questioning and then turning your thoughts around offers you a concrete way to return to a state of emotional well-being.</span></p><span data-dcnode-id="892" instrument_node="">
</span></div><span data-dcnode-id="890" instrument_node="">

</span><div class="side-note-wrap" data-dcnode-id="789"><span data-dcnode-id="887" instrument_node="">

</span><a data-dcnode-id="843" data-hs-anchor="true" id="tips-to-improve-emotional-well-being"></a><span data-dcnode-id="842" instrument_node="">
</span><h2 data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">How can you improve your emotional well-being?</span></h2><span data-dcnode-id="839" instrument_node="">
</span><div data-dcnode-id="791"><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Your range of emotions—and how you manage them—influences your emotional health. Here are eight ways you can control your emotions and feelings, and stay resilient:</span></p><span data-dcnode-id="835" instrument_node="">
</span><ol data-dcnode-id="793"><span data-dcnode-id="834" instrument_node="">
</span><li aria-level="1" data-dcnode-id="830" style="font-weight: 400;"><strong data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Move your body. </span></strong><span data-dcnode-id="831" instrument_node="">Do some sort of physical activity every 90 minutes. Exercise. Dance. Fold laundry. Weather permitting, get outside. Walk around the block. Run. Visit a park.</span></li><span data-dcnode-id="829" instrument_node="">
</span><li aria-level="1" data-dcnode-id="825" style="font-weight: 400;"><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Establish a routine. </span></strong><span data-dcnode-id="826" instrument_node="">Create a schedule that balances the work you do with the life you want. Set time for your meetings. Block space to set goals. Create room to read. Cook a new dish. Listen to music.</span></li><span data-dcnode-id="824" instrument_node="">
</span><li aria-level="1" data-dcnode-id="820" style="font-weight: 400;"><strong data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Connect with others. </span></strong><span data-dcnode-id="821" instrument_node="">Love on your family. Check in with those who support you. Ask for help. Learn something out of your comfort zone. Spend time with someone who you respect.</span></li><span data-dcnode-id="819" instrument_node="">
</span><li aria-level="1" data-dcnode-id="815" style="font-weight: 400;"><strong data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Forgive. </span></strong><span data-dcnode-id="816" instrument_node="">Forgive others and forgive yourself. Forgiveness frees you to keep your power. Forgiveness opens the path to live in the moment. Forgiveness allows for growth and happiness.</span></li><span data-dcnode-id="814" instrument_node="">
</span><li aria-level="1" data-dcnode-id="810" style="font-weight: 400;"><strong data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Do something for others. </span></strong><span data-dcnode-id="811" instrument_node="">Offer to do something for someone you know or don’t know, for which you cannot be repaid. Pick up groceries for a neighbor. Volunteer online. Send a thank you note.</span></li><span data-dcnode-id="809" instrument_node="">
</span><li aria-level="1" data-dcnode-id="805" style="font-weight: 400;"><strong data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Sleep. </span></strong><span data-dcnode-id="806" instrument_node="">Healthy sleep gives your body the chance to repair itself. Sleep refreshes your brain to manage your memories and process information. You wake up in a better mood.</span></li><span data-dcnode-id="804" instrument_node="">
</span><li aria-level="1" data-dcnode-id="800" style="font-weight: 400;"><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Be kind to yourself. </span></strong><span data-dcnode-id="801" instrument_node="">What gives you joy? Where are you most at peace? When do you have space to be you? As you are kind to yourself, you will want to extend that kindness beyond yourself.</span></li><span data-dcnode-id="799" instrument_node="">
</span><li aria-level="1" data-dcnode-id="795" style="font-weight: 400;"><strong data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Be self-aware. </span></strong><span data-dcnode-id="796" instrument_node="">Notice the thoughts, actions, habits, and character traits that serve you well. And when you spot what needs to change, you’ll be ready. You will simply know.</span></li><span data-dcnode-id="794" instrument_node="">
</span></ol><span data-dcnode-id="792" instrument_node="">

</span><h2 data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Final thoughts on emotional well-being</span></h2><span data-dcnode-id="739" instrument_node="">
</span><div data-dcnode-id="728"><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">“Watch your thoughts; they become words. Watch your words; they become actions. Watch your actions; they become habits. Watch your habits; they become character. Watch your character; it becomes your destiny.” - Lao Tzu</span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">You become more resilient as you encounter and master any situation.&nbsp;Whenever you have doubts, and you will, remember that you have everything you need to take care of your emotional well-being.</span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">You will bounce back.</span></p><span data-dcnode-id="729" instrument_node="">
