</span><p data-dcnode-id="550"><span data-dcnode-id="551" style="font-weight: 400;" wfd-id="515"><span data-dcnode-id="576" instrument_node="">We help you </span><strong data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Consciously Create a Life &amp; Body YOU Love</span></strong><span data-dcnode-id="573" instrument_node="">, without doing anything you don’t want to do or following any rules. We provide </span><strong data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Transformational</span></strong><span data-dcnode-id="570" instrument_node=""> Coaching in </span><strong data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Health</span></strong><span data-dcnode-id="567" instrument_node=""> and </span><strong data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Mindset</span></strong><span data-dcnode-id="564" instrument_node=""> as well as Events to </span><strong data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Connect</span></strong><span data-dcnode-id="561" instrument_node=""> with </span><strong data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Community</span></strong><span data-dcnode-id="558" instrument_node=""> and </span><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Nature</span></strong><span data-dcnode-id="555" instrument_node=""> including </span><strong data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Life-Changing Retreats</span></strong><span data-dcnode-id="552" instrument_node="">.</span></span></p></div><span data-dcnode-id="548" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="519"><h2 data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Do you feel like you’re trapped on the hamster wheel of mediocrity?</span></h2></div><span data-dcnode-id="518" instrument_node="">
</span></div><span data-dcnode-id="516" instrument_node="">
</span></div><span data-dcnode-id="514" instrument_node="">

</span><div class="et_pb_module et_pb_text et_pb_text_2 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="481"><span data-dcnode-id="510" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="483"><h1 data-dcnode-id="508" style="text-align: center;"><span data-dcnode-id="509" instrument_node="">Are you stuck in a rut?</span></h1><span data-dcnode-id="507" instrument_node="">
</span><h3 data-dcnode-id="505" style="text-align: center;"><span data-dcnode-id="506" instrument_node="">Doing the same things over and over and getting the same undesirable results?</span></h3><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502" style="text-align: center;"><span data-dcnode-id="503" instrument_node="">Maybe you’ve been so focused on your career or raising a family that you lost yourself. One day you looked in the mirror and didn’t recognize the image staring back at you. The body definitely had changed. But inside, you may still be dreaming the same dreams but not taking any action to live that life you truly desire!</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="495" style="text-align: center;"><em data-dcnode-id="498" style="font-size: 16px;"><strong data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">We get it! We’ve been there!</span></strong></em><span data-dcnode-id="496" style="font-size: 16px;"><span data-dcnode-id="497" instrument_node=""> We know what it’s like to no longer do what you used to love to do and realize there is so much more you want out of life but have no idea what to do to get there.</span></span></p><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="492" style="text-align: center;"><span data-dcnode-id="493" instrument_node="">Maybe you’ve tried the latest diet trends, read the latest self-help book, but nothing sticks! Perhaps you feel insecure to try something new, thinking you’re too old, too out of shape, so you continue on the same path you’ve been on, which isn’t getting you any closer to what you really desire!</span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="486" style="text-align: center;"><em data-dcnode-id="488"><strong data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">What you really need is to take care of the Inner Self, the Outer Self, and the Connected Self</span></strong></em><span data-dcnode-id="487" instrument_node="">; incorporating nutrition, body movement, mindfulness, mindset, and community—taking care of your Complete Well-Being.</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="484" style="text-align: center;"></p></div><span data-dcnode-id="482" instrument_node="">
