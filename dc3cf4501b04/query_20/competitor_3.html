better articles</span></a><span data-dcnode-id="2010" instrument_node=""> for suggestions.</span></span><span data-dcnode-id="2008" instrument_node=""> </span><span class="date-container" data-dcnode-id="2002"><i data-dcnode-id="2003"><span data-dcnode-id="2007" instrument_node="">(</span><span class="date" data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">June 2018</span></span><span data-dcnode-id="2004" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="1995"><i data-dcnode-id="1996"><span data-dcnode-id="2001" instrument_node=""> (</span><small data-dcnode-id="1998"><a data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="2000" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="1997" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="1989" instrument_node="">
</span><p data-dcnode-id="1973"><b data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Emotional well-being</span></b><span data-dcnode-id="1986" instrument_node=""> refers to the emotional quality of an individual's experiences.</span><sup class="reference" data-dcnode-id="1983" id="cite_ref-1"><a data-dcnode-id="1984" href="#cite_note-1"><span data-dcnode-id="1985" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1982" instrument_node=""> Emotional well-being is influenced by a variety of psychological, demographic, economic, and situational factors. For example, the onset of the COVID-19 outbreak lowered emotional well-being by 74% in China according to one study.</span><sup class="reference" data-dcnode-id="1979" id="cite_ref-2"><a data-dcnode-id="1980" href="#cite_note-2"><span data-dcnode-id="1981" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1978" instrument_node=""> Multiple factors may interact</span><sup class="reference" data-dcnode-id="1975" id="cite_ref-:0_3-0"><a data-dcnode-id="1976" href="#cite_note-:0-3"><span data-dcnode-id="1977" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1974" instrument_node="">
</span></p><p data-dcnode-id="1939"><span data-dcnode-id="1972" instrument_node="">The implications of decreased emotional well-being are related to </span><a data-dcnode-id="1970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mental_health" title="Mental health"><span data-dcnode-id="1971" instrument_node="">mental health</span></a><span data-dcnode-id="1969" instrument_node=""> concerns such as </span><a data-dcnode-id="1967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stress_%28biology%29" title="Stress (biology)"><span data-dcnode-id="1968" instrument_node="">stress</span></a><span data-dcnode-id="1966" instrument_node="">, </span><a data-dcnode-id="1964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mood_disorder" title="Mood disorder"><span data-dcnode-id="1965" instrument_node="">depression</span></a><span data-dcnode-id="1963" instrument_node="">, and </span><a data-dcnode-id="1961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anxiety" title="Anxiety"><span data-dcnode-id="1962" instrument_node="">anxiety</span></a><span data-dcnode-id="1960" instrument_node="">. These in turn, contribute to physical health concerns such as </span><a data-dcnode-id="1958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gastroenterology" title="Gastroenterology"><span data-dcnode-id="1959" instrument_node="">digestive disorders</span></a><span data-dcnode-id="1957" instrument_node="">, </span><a data-dcnode-id="1955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sleep_disorder" title="Sleep disorder"><span data-dcnode-id="1956" instrument_node="">sleep disturbances</span></a><span data-dcnode-id="1954" instrument_node="">, and general </span><a class="mw-redirect" data-dcnode-id="1952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fatigue_%28medical%29" title="Fatigue (medical)"><span data-dcnode-id="1953" instrument_node="">lack of energy</span></a><span data-dcnode-id="1951" instrument_node="">.</span><sup class="reference" data-dcnode-id="1948" id="cite_ref-4"><a data-dcnode-id="1949" href="#cite_note-4"><span data-dcnode-id="1950" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1947" instrument_node=""> The profile of a person prone to emotional distress is likely someone with low self-esteem, pessimistic, emotionally sensitive, very self-critical…, people who need to constantly assert themselves through their emotions. They also tend to be timid, overly worried about the future, and focused on the past. As Dr. Marisa Navarro says in her book </span><a class="external text" data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//lamedicinaemocional.com/" rel="nofollow"><span data-dcnode-id="1946" instrument_node="">La Medicina Emocional</span></a><span data-dcnode-id="1944" instrument_node=""> (Emotional Medicine), "no one is safe from suffering this emotional state. It is a very serious problem that can result in constant states of anger, sadness, worry and even anxiety or depression</span><sup class="reference" data-dcnode-id="1941" id="cite_ref-5"><a data-dcnode-id="1942" href="#cite_note-5"><span data-dcnode-id="1943" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1940" instrument_node="">".
</span></p><p data-dcnode-id="1913"><span data-dcnode-id="1938" instrument_node="">On the positive side, enhanced emotional well-being is seen to contribute to upward spirals in increasing </span><a class="mw-redirect" data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coping_%28psychology%29" title="Coping (psychology)"><span data-dcnode-id="1937" instrument_node="">coping ability</span></a><span data-dcnode-id="1935" instrument_node="">,</span><sup class="reference" data-dcnode-id="1932" id="cite_ref-6"><a data-dcnode-id="1933" href="#cite_note-6"><span data-dcnode-id="1934" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1931" instrument_node=""> </span><a data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-esteem" title="Self-esteem"><span data-dcnode-id="1930" instrument_node="">self-esteem</span></a><span data-dcnode-id="1928" instrument_node="">, </span><a data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Performance_management" title="Performance management"><span data-dcnode-id="1927" instrument_node="">performance</span></a><span data-dcnode-id="1925" instrument_node=""> and </span><a data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Productivity" title="Productivity"><span data-dcnode-id="1924" instrument_node="">productivity</span></a><span data-dcnode-id="1922" instrument_node=""> at work, and even longevity.</span><sup class="reference" data-dcnode-id="1919" id="cite_ref-7"><a data-dcnode-id="1920" href="#cite_note-7"><span data-dcnode-id="1921" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1918" instrument_node=""> Thoughts determine our feelings, and thoughts are nothing more than firings of neurons. And those feelings that our thoughts generate make our body release extremely addicting substances like adrenaline and cortisol. Like with any other addiction, the need to continually feed off these addicting substances tends to make the body think and feel in a certain way. When someone decides to disengage from these emotional addictions, they have to learn to think differently.</span><sup class="reference" data-dcnode-id="1915" id="cite_ref-8"><a data-dcnode-id="1916" href="#cite_note-8"><span data-dcnode-id="1917" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1914" instrument_node="">
</span></p><p data-dcnode-id="1907"><span data-dcnode-id="1912" instrument_node="">The connection between the mind and the body is so strong that mental and physical states feed into each other in both a positive and negative way. Feelings depend on thoughts and both determine attitudes and actions. This is the first thing that children would have to learn at a young age in order to learn that they can take the reins of their lives. And their feelings would not depend on what is happening around them, but rather their interpretation about what is happening.</span><sup class="reference" data-dcnode-id="1909" id="cite_ref-9"><a data-dcnode-id="1910" href="#cite_note-9"><span data-dcnode-id="1911" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1908" instrument_node="">
</span></p><p data-dcnode-id="1862"><span data-dcnode-id="1906" instrument_node="">Emotional well-being is also one of two aspects of personal </span><a data-dcnode-id="1904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Well-being" title="Well-being"><span data-dcnode-id="1905" instrument_node="">well-being</span></a><span data-dcnode-id="1903" instrument_node=""> that can be measured in quantitative </span><a data-dcnode-id="1901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quality_of_life" title="Quality of life"><span data-dcnode-id="1902" instrument_node="">quality of life</span></a><span data-dcnode-id="1900" instrument_node=""> assessments, the other being 'life evaluation', the evaluation of one's life in general against a scale.</span><sup class="reference" data-dcnode-id="1897" id="cite_ref-10"><a data-dcnode-id="1898" href="#cite_note-10"><span data-dcnode-id="1899" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1896" instrument_node=""> It is a term receiving attention from many groups, from </span><a data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Age" title="New Age"><span data-dcnode-id="1895" instrument_node="">new-age</span></a><span data-dcnode-id="1893" instrument_node=""> therapists to </span><a class="mw-redirect" data-dcnode-id="1891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Management_consultant" title="Management consultant"><span data-dcnode-id="1892" instrument_node="">management consultants</span></a><span data-dcnode-id="1890" instrument_node="">, from </span><a data-dcnode-id="1888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Outdoor_recreation" title="Outdoor recreation"><span data-dcnode-id="1889" instrument_node="">outdoor recreation</span></a><span data-dcnode-id="1887" instrument_node=""> enthusiasts to </span><a data-dcnode-id="1885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elderly_care" title="Elderly care"><span data-dcnode-id="1886" instrument_node="">carers for the elderly</span></a><span data-dcnode-id="1884" instrument_node="">. It is also of interest to many </span><a data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parenting" title="Parenting"><span data-dcnode-id="1883" instrument_node="">parents</span></a><span data-dcnode-id="1881" instrument_node="">, </span><a data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_worker" title="Youth worker"><span data-dcnode-id="1880" instrument_node="">youth workers</span></a><span data-dcnode-id="1878" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/School_teacher" title="School teacher"><span data-dcnode-id="1877" instrument_node="">school teachers</span></a><span data-dcnode-id="1875" instrument_node="">, anti-</span><a data-dcnode-id="1873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bullying" title="Bullying"><span data-dcnode-id="1874" instrument_node="">bullying</span></a><span data-dcnode-id="1872" instrument_node=""> campaigners, and those thinking about </span><a data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Retirement" title="Retirement"><span data-dcnode-id="1871" instrument_node="">retirement</span></a><span data-dcnode-id="1869" instrument_node="">, as well as to </span><a data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychologist" title="Psychologist"><span data-dcnode-id="1868" instrument_node="">psychologists</span></a><span data-dcnode-id="1866" instrument_node=""> and other </span><a data-dcnode-id="1864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Health_professional" title="Health professional"><span data-dcnode-id="1865" instrument_node="">health professionals</span></a><span data-dcnode-id="1863" instrument_node="">.
</span></p><p data-dcnode-id="1856"><span data-dcnode-id="1861" instrument_node="">Good emotional health leads to better physical health, prevents diseases, and makes it possible to enjoy life and be happier. In this way one can become a "medicine person" through mirror neurons, those that lead to empathy and fire to imitate the emotions of others. Mirror neurons are what make people feel good when they are with someone who is positive, cheerful, and motivational. At the other extreme are the so-called "toxic people", who make others around them feel bad.</span><sup class="reference" data-dcnode-id="1858" id="cite_ref-11"><a data-dcnode-id="1859" href="#cite_note-11"><span data-dcnode-id="1860" instrument_node="">[11]</span></a></sup><span data-dcnode-id="1857" instrument_node="">
</span></p><p data-dcnode-id="1843"><span data-dcnode-id="1855" instrument_node="">The </span><a data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Surgeon_General_of_the_United_States" title="Surgeon General of the United States"><span data-dcnode-id="1854" instrument_node="">Surgeon General of the United States</span></a><span data-dcnode-id="1852" instrument_node=""> made emotional well-being one of his priorities in 2012</span><sup class="reference" data-dcnode-id="1849" id="cite_ref-12"><a data-dcnode-id="1850" href="#cite_note-12"><span data-dcnode-id="1851" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1848" instrument_node=""> and spoke about its importance at the Aspen Ideas Festival 2016.</span><sup class="reference" data-dcnode-id="1845" id="cite_ref-13"><a data-dcnode-id="1846" href="#cite_note-13"><span data-dcnode-id="1847" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1844" instrument_node="">
</span></p><span data-dcnode-id="1842" instrument_node="">
