</span><div class="a-divider a-divider-section" data-dcnode-id="2956"><div class="a-divider-inner" data-dcnode-id="2957"></div></div><span data-dcnode-id="2955" instrument_node=""> </span><h2 data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node=""> Editorial Reviews </span></h2><span data-dcnode-id="2952" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-base" data-dcnode-id="2701"><span data-dcnode-id="2951" instrument_node=""> </span><div class="a-row a-expander-container a-expander-extend-container" data-dcnode-id="2703"><span data-dcnode-id="2950" instrument_node=""> </span><h3 data-dcnode-id="2947"><span data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">Review</span></span></h3><span data-dcnode-id="2946" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2891"><span data-dcnode-id="2945" instrument_node=""> </span><span data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">"A great gift to anyone who reads it! I have personally benefited tremendously, and I recommend Happiness Is A Choice highly." -- </span></span><span class="a-text-italic" data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">O. Carl Simonton, M.D., Co-Author of Getting Well Again</span></span><span data-dcnode-id="2937"><br data-dcnode-id="2940"><br data-dcnode-id="2939"><span data-dcnode-id="2938" instrument_node="">"A superb book written with the greatest of compassion and sensitivity." -- </span></span><span class="a-text-italic" data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">Gerald Jampolsky, M.D., Author of Love Is Letting Go Of Fear</span></span><span data-dcnode-id="2931"><br data-dcnode-id="2934"><br data-dcnode-id="2933"><span data-dcnode-id="2932" instrument_node="">"Barry Neil Kaufman has written a moving exploration of the healing power of compassion and caring. Happiness Is A Choice affirms the unlimited potential of the human spirit and offers hope to those who have been challenged by adversity." -- </span></span><span class="a-text-italic" data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">Coretta Scott King, President/CEO of the Martin Luther King, Jr. Center for Nonviolent Social Change.</span></span><span data-dcnode-id="2925"><br data-dcnode-id="2928"><br data-dcnode-id="2927"><span data-dcnode-id="2926" instrument_node="">"For those who sincerely want to follow the supreme law of love, Barry Kaufman's book provides an unexpected blueprint to selfless living." -- </span></span><span class="a-text-italic" data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">Father John Catoir, Director, The Christophers</span></span><span data-dcnode-id="2919"><br data-dcnode-id="2922"><br data-dcnode-id="2921"><span data-dcnode-id="2920" instrument_node="">"I have long admired the work of Barry and Samahria Kaufman. Happiness Is a Choice is an excellent book, simple and effective for all." -- </span></span><span class="a-text-italic" data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">Bernie Siegel, M.D., Author. Love, Medicine and Miracles</span></span><span data-dcnode-id="2913"><br data-dcnode-id="2916"><br data-dcnode-id="2915"><span data-dcnode-id="2914" instrument_node="">"Not only a wise book, but a liberating one." -- </span></span><span class="a-text-italic" data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">Harold S. Kushner, Author, When Bad Things Happen to Good People</span></span><span data-dcnode-id="2907"><br data-dcnode-id="2910"><br data-dcnode-id="2909"><span data-dcnode-id="2908" instrument_node="">"This book really delivers! A not-to-be-missed resource and guide for anyone who wants a happier life." -- </span></span><span class="a-text-italic" data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">Ken Dychtwald, Ph. D., Author of Bodymind</span></span><span data-dcnode-id="2901"><br data-dcnode-id="2904"><br data-dcnode-id="2903"><span data-dcnode-id="2902" instrument_node="">"We are all players in the game of life...and this book shows how to be a winner. Barry Neil Kaufman's new book champions making the choice to believe in ourselves, to have a positive attitude, to be hopeful and to seize the power of loving ourselves and others." -- </span></span><span class="a-text-italic" data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">Lou Holtz, Head Football Coach, University of Notre Dame</span></span><span data-dcnode-id="2895"><br data-dcnode-id="2898"><br data-dcnode-id="2897"><span data-dcnode-id="2896" instrument_node="">"Within these pages Kaufman unfolds a precious secret for attaining happiness and leading a more meaningful, joyful life...A wonderfully wise, warm and insightful book that is sure to reward those who read it with a richer, more balanced life." -- </span></span><span class="a-text-italic" data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">Jesse Stoff, M.D., Author of The Chronic Fatigue Syndrome</span></span><span data-dcnode-id="2892" instrument_node=""> </span></div><span data-dcnode-id="2890" instrument_node=""> </span><h3 data-dcnode-id="2887"><span data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">From the Publisher</span></span></h3><span data-dcnode-id="2886" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2862"><span data-dcnode-id="2885" instrument_node=""> </span><span data-dcnode-id="2864"><span data-dcnode-id="2884" instrument_node="">This is one of those books that just called to me. With its bright red cover and petite format, </span><br data-dcnode-id="2883"><span data-dcnode-id="2882" instrument_node="">it practically leapt off the shelf. I actually had picked it up as a gift for a friend--only to find </span><br data-dcnode-id="2881"><span data-dcnode-id="2880" instrument_node="">myself reading it when I got home. I especially love the idea of choosing happiness now, as </span><br data-dcnode-id="2879"><span data-dcnode-id="2878" instrument_node="">opposed to postponing it and subjecting myself to all sorts of obstacles in the meantime. It </span><br data-dcnode-id="2877"><span data-dcnode-id="2876" instrument_node="">really made me stop and think about how I struggle to be right or to have things my way--</span><br data-dcnode-id="2875"><span data-dcnode-id="2874" instrument_node="">imagining that will ensure some future happiness--at the expense of my happiness in the </span><br data-dcnode-id="2873"><span data-dcnode-id="2872" instrument_node="">present. Plus, I was already a firm believer in the healing power of affirmations, and this </span><br data-dcnode-id="2871"><span data-dcnode-id="2870" instrument_node="">title actually has helped me to focus and refine my practice of them. </span><br data-dcnode-id="2869"><span data-dcnode-id="2868" instrument_node="">I never did give the book away. = )</span><br data-dcnode-id="2867"><br data-dcnode-id="2866"><span data-dcnode-id="2865" instrument_node="">Laurie Kahn, Associate Managing Editor</span></span><span data-dcnode-id="2863" instrument_node=""> </span></div><span data-dcnode-id="2861" instrument_node=""> </span><div aria-expanded="false" class="a-expander-content a-expander-extend-content" data-dcnode-id="2713" style="display:none"><span data-dcnode-id="2860" instrument_node=""> </span><h3 data-dcnode-id="2857"><span data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">From the Inside Flap</span></span></h3><span data-dcnode-id="2856" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2845"><span data-dcnode-id="2855" instrument_node=""> </span><span data-dcnode-id="2847"><span data-dcnode-id="2854" instrument_node="">very explicity reveals the options and choices we can all make to find the road to happiness."</span><br data-dcnode-id="2853"><span data-dcnode-id="2852" instrument_node="">BERNIE SIEGEL, M.D.</span><br data-dcnode-id="2851"><span data-dcnode-id="2850" instrument_node="">Author of LOVE, MEDICINE AND MIRACLES</span><br data-dcnode-id="2849"><span data-dcnode-id="2848" instrument_node="">Barry Neil Kaufman, therapist, author, motivational speaker, and founder of the Option Institute shows you how you can use the traits of happy people to change your life quickly, and easily. His shortcuts to happiness include: making happiness the priority; accepting your personal authenticity, the freedom to be yourself; learning to discard regrets about the past and worries about the future, and so much more.</span></span><span data-dcnode-id="2846" instrument_node=""> </span></div><span data-dcnode-id="2844" instrument_node=""> </span><h3 data-dcnode-id="2841"><span data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">From the Back Cover</span></span></h3><span data-dcnode-id="2840" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2829"><span data-dcnode-id="2839" instrument_node=""> </span><span data-dcnode-id="2831"><span data-dcnode-id="2838" instrument_node="">"Barry very explicity reveals the options and choices we can all make to find the road to happiness."</span><br data-dcnode-id="2837"><span data-dcnode-id="2836" instrument_node="">BERNIE SIEGEL, M.D.</span><br data-dcnode-id="2835"><span data-dcnode-id="2834" instrument_node="">Author of LOVE, MEDICINE AND MIRACLES</span><br data-dcnode-id="2833"><span data-dcnode-id="2832" instrument_node="">Barry Neil Kaufman, therapist, author, motivational speaker, and founder of the Option Institute shows you how you can use the traits of happy people to change your life quickly, and easily. His shortcuts to happiness include: making happiness the priority; accepting your personal authenticity, the freedom to be yourself; learning to discard regrets about the past and worries about the future, and so much more.</span></span><span data-dcnode-id="2830" instrument_node=""> </span></div><span data-dcnode-id="2828" instrument_node=""> </span><h3 data-dcnode-id="2825"><span data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">About the Author</span></span></h3><span data-dcnode-id="2824" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2817"><span data-dcnode-id="2823" instrument_node=""> </span><span class="a-text-bold" data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">Barry Neil Kaufman</span></span><span data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">&nbsp;teaches a uniquely self-accepting and empowering process (The Option Process®), which has both educational and therapeutic applications. He and his wife, Samahria, are co-founders and co-directors of The Option Institute and Fellowship, which offers programs for people either challenged by adversity or trying to improve the quality of their lives. The Kaufmans, with their staff, also counsel individuals, couples, and families. Additionally, Mr. Kaufman lectures at universities, presents motivational talks, guides workshops and seminars, and has appeared in mass media throughout the country.</span></span><span data-dcnode-id="2818" instrument_node=""> </span></div><span data-dcnode-id="2816" instrument_node=""> </span><h3 data-dcnode-id="2813"><span data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">Excerpt. © Reprinted by permission. All rights reserved.</span></span></h3><span data-dcnode-id="2812" instrument_node=""> </span><div class="a-section a-spacing-small a-padding-small" data-dcnode-id="2715"><span data-dcnode-id="2811" instrument_node=""> </span><span data-dcnode-id="2717"><span data-dcnode-id="2810" instrument_node="">Years ago, following the publication of my first book about the uplifting journey my family took to heal our special child (once neurologically impaired and dysfunctioning), I spoke with a man who had written quite a different saga. He documented what he experienced as the difficult and damning reality of parenting a “less-than-perfect” youngster. He declared without apology that he hated people like me.</span><br data-dcnode-id="2809"><span data-dcnode-id="2808" instrument_node=""> &nbsp;</span><br data-dcnode-id="2807"><span data-dcnode-id="2806" instrument_node=""> “You take something that’s terrible,” he said flatly, “and make believe it’s beautiful.”</span><br data-dcnode-id="2805"><span data-dcnode-id="2804" instrument_node=""> &nbsp;</span><br data-dcnode-id="2803"><span data-dcnode-id="2802" instrument_node=""> I considered his point of view for a moment. “Did you ever consider,” I asked softly, “that you might be taking something that’s beautiful and making believe it’s terrible?”</span><br data-dcnode-id="2801"><span data-dcnode-id="2800" instrument_node=""> &nbsp;</span><br data-dcnode-id="2799"><span data-dcnode-id="2798" instrument_node=""> At that moment, I realized that neither one of us held the truth, only a vision we had each created and then used to embrace our situation. I had decided to see my son and his difficulties as an opportunity to grow, learn and love. He regarded his situation as a curse. Our different experiences had followed from those distinctly different visions.</span><br data-dcnode-id="2797"><span data-dcnode-id="2796" instrument_node=""> &nbsp;</span><br data-dcnode-id="2795"><span data-dcnode-id="2794" instrument_node=""> Wanting to reach out to him, I told him that I, too, would have once been overwhelmed and devastated by such an event. I remember, in grade school, watching a group of mentally retarded students trying to master the simplest aspects of a baseball game without success. I turned away, confused and uncomfortable about what I had witnessed. In high school, a boy in one of my classes walked with a limp, his left hand and arm contorted awkwardly. When he tried to speak, he had tremendous difficulty forming words and drooled uncontrollably each time he labored to verbalize even the shortest sentence. The teacher told us that Douglas had been born that way. Sometimes, other students mimicked his movements and laughed at their pantomimes. For one semester I tried to help him by carrying his bookbag, though I felt somewhat awkward, embarrassed and scared each time. I never knew what to say to him, so we walked together from the bus to the school building in silence.</span><br data-dcnode-id="2793"><span data-dcnode-id="2792" instrument_node=""> &nbsp;</span><br data-dcnode-id="2791"><span data-dcnode-id="2790" instrument_node=""> Before the arrival of our first child, I thought about Douglas and how his life seemed like torture to me. I remember lying in bed one night, staring at the huge abdomen of my pregnant wife and thinking, “Oh God, what if&nbsp;…&nbsp;just what if what happened to Douglas happened to us and our child?” I remember praying for a healthy baby. Indeed, our first two children, both daughters, arrived as healthy and energetic little people. Our third child was very different. However, by the time of his arrival, my wife and I both had changed dramatically from the frightened and uncomfortable people who had greeted those first years of marriage and child rearing.</span><br data-dcnode-id="2789"><span data-dcnode-id="2788" instrument_node=""> &nbsp;</span><br data-dcnode-id="2787"><span data-dcnode-id="2786" instrument_node=""> I tried to explain how the world had changed for me, in significant and irrevocable ways, once I had changed my own vision of life and had begun to make happiness and love priorities. As a result, my wife and I could greet our special child as a wonderful opportunity. The man with the different point of view listened to my sharing without comment. Finally, he laughed at my unending enthusiasm. He decided I had been well-intentioned but, nonetheless, naive and unrealistic in my hopefulness and happiness. He questioned the validity of my attitude. Ultimately, he preferred what he called his sanity.</span><br data-dcnode-id="2785"><span data-dcnode-id="2784" instrument_node=""> &nbsp;</span><br data-dcnode-id="2783"><span data-dcnode-id="2782" instrument_node=""> The way we choose to see the world creates the world we see.</span><br data-dcnode-id="2781"><span data-dcnode-id="2780" instrument_node=""> &nbsp;</span><br data-dcnode-id="2779"><span data-dcnode-id="2778" instrument_node=""> During a question-and-answer segment immediately following a class I had conducted on developing attitudes of self-trust, a participant raised his hand tentatively. When I nodded at him, he withdrew at first, then leaned forward cautiously.</span><br data-dcnode-id="2777"><span data-dcnode-id="2776" instrument_node=""> &nbsp;</span><br data-dcnode-id="2775"><span data-dcnode-id="2774" instrument_node=""> “My question is, um, somewhat related to what we’ve discussed, but in a bit of a different direction, and, er, more personal. I am having so much trouble with my asthma. I’ve gone from doctor to doctor. I take all the medication they’ve prescribed, but nothing really helps. I just can’t stand it. I wonder if you could say something, well, anything, that might be useful.”</span><br data-dcnode-id="2773"><span data-dcnode-id="2772" instrument_node=""> &nbsp;</span><br data-dcnode-id="2771"><span data-dcnode-id="2770" instrument_node=""> I hesitated for a moment and considered sharing with him several scientific studies that would lay a foundation for what I knew would be my answer. However, the class had only minutes left. Finally, I smiled broadly and said, “This may sound silly or crazy or both, but I’ll do my best to give you a useful response. Be happy with your asthma! Instead of treating it like an enemy, embrace it like a friend. If you change your attitude about your condition you’ll change the chemistry in your body. Every thought we have is a physical event. Neurotransmitters and neuropeptides pop into existence throughout the body each time we activate a belief. Change the belief (the thought, the perspective, the judgment) and we change or, at the very least, influence the physical event we call our ‘bodymind.’ Your attitude and intelligence exist everywhere in the 50 trillion cells of your body. This is a marvelous and concrete opportunity for you, not just a pie-in-the-sky game. Give yourself and your asthma a different message and see what happens. So, when you have the tightness in your chest, the shortness of breath, the wheezing or coughing, you could first welcome it, talk to it, even play with it. Then open yourself, ultimately, to loving it&nbsp;…&nbsp;really loving it!”</span><br data-dcnode-id="2769"><span data-dcnode-id="2768" instrument_node=""> &nbsp;</span><br data-dcnode-id="2767"><span data-dcnode-id="2766" instrument_node=""> He seemed amused, intrigued and skeptical. “I thought you’d say something like that,” he replied, chuckling. “Well, what do I have to lose? Okay, I’ll try it.”</span><br data-dcnode-id="2765"><span data-dcnode-id="2764" instrument_node=""> &nbsp;</span><br data-dcnode-id="2763"><span data-dcnode-id="2762" instrument_node=""> The very next day, he came to the morning session of the program visibly rested and alert. “I had a special experience last night,” he told the group. “I greeted my nightly wheezing with a smile instead of my usual annoyance or depression. I actually did say hello out loud and laughed. I talked to my asthma like a friend. Wow! I told my asthma, we sure have a lot of history together.” He smiled shyly, then continued, “I even thanked my bronchial tubes each time I coughed. At first, I felt&nbsp;…&nbsp;well, absolutely ridiculous, but soon something magically freed up inside and I really felt loving and loved.” His eyes filled with tears. “You know, in no time at all, I fell asleep. Right now, I feel more comfortable and peaceful in my body than I have in months.”</span><br data-dcnode-id="2761"><span data-dcnode-id="2760" instrument_node=""> &nbsp;</span><br data-dcnode-id="2759"><span data-dcnode-id="2758" instrument_node=""> This man had eased himself into being happy and loving toward a condition he had previously viewed as intolerable. He had created a powerful attitudinal advantage for himself. His play, his talk and his laughter helped him to change his vision of asthma from enemy to friend, and his new vision in turn changed his experience.</span><br data-dcnode-id="2757"><span data-dcnode-id="2756" instrument_node=""> &nbsp;</span><br data-dcnode-id="2755"><span data-dcnode-id="2754" instrument_node=""> Each of us can, in a simple and easy way, access an amazing attitudinal advantage within ourselves once we come to know that happiness (and love) is a choice and misery is optional (not inevitable).</span><br data-dcnode-id="2753"><span data-dcnode-id="2752" instrument_node=""> &nbsp;</span><br data-dcnode-id="2751"><span data-dcnode-id="2750" instrument_node=""> I never knew I could just claim happiness, at any time, as my birthright and not be limited by the condemning evidence of my own personal history and the past. That awareness, which I previously resisted as preposterous, has been a blessing and changed my life profoundly, allowing me in my own imperfect way to be so much more loving, peaceful and useful to myself and all those I touch.</span><br data-dcnode-id="2749"><span data-dcnode-id="2748" instrument_node=""> &nbsp;</span><br data-dcnode-id="2747"><span data-dcnode-id="2746" instrument_node=""> During this past summer (as in many previous summers), my teaching staff and I lived and worked for two full months with a group of forty-two adults who had come together as strangers for eight weeks to form what became an instant family. This diverse group included a physician, a farmer, a lawyer, a social worker, homemakers, an engineer, a psychotherapist, a nurse, an artist, a carpenter, an actress, a computer programmer, a textile designer, several business executives, some entrepreneurs, teachers, college students, retirees and the like. They ranged in age from late teens to mid-seventies and hailed from urban and rural centers across the United States as well as from other countries. Together, we created an intention to explore completely the very substances of who we were and to re-create ourselves in accordance with our own individual designs. We dared to experiment with ourselves and then to live in ways that others might easily dismiss as “unrealistic” or “impossible.” Ultimately, the members of this amazing group (“amazing” tends to be my consistent reflection about all the groups, families and individuals I have had the privilege to facilitate) resourced and taught each other, crashed through the walls of limiting beliefs and constructed what we called “a vision to live by.”</span><br data-dcnode-id="2745"><span data-dcnode-id="2744" instrument_node=""> &nbsp;</span><br data-dcnode-id="2743"><span data-dcnode-id="2742" instrument_node=""> Each day we gathered together for experiential interactions, discussions, intimate sharings and segments for self-exploration. We laughed. We cried. We shouted. We whispered. We challenged each other. We loved and hugged each other. Eventually, we forged a respectful and honoring family of dear and supportive friends. Finally, we turned to an easel at the front of our meeting room and composed guidelines for an intentional lifestyle and then, in the weeks that followed, we put those guidelines into action with great energy and enthusiasm. We not only created a prototype of interfacing with other people in a happy, loving, accepting, stimulating and harmonious way, but also re-created our personal belief systems so we could be continuously open, self-accepting, energetic, embracing, joyful and yet unflappable (not vulnerable) in the face of judgments and criticism of others.</span><br data-dcnode-id="2741"><span data-dcnode-id="2740" instrument_node=""> &nbsp;</span><br data-dcnode-id="2739"><span data-dcnode-id="2738" instrument_node=""> Even though we tripped and stumbled over old beliefs and judgments at times, we could not contain our awe and delight in what we had accomplished. No one could ever take that experience and learning from us or diminish the inspiration of what could become a possibility for everyday living on this planet. We did more than just dream that dream&nbsp;…&nbsp;we lived it, challenging and tickling each other until everyone had endless opportunities to experience their own momentous changes.</span><br data-dcnode-id="2737"><span data-dcnode-id="2736" instrument_node=""> &nbsp;</span><br data-dcnode-id="2735"><span data-dcnode-id="2734" instrument_node=""> In response to their own appreciation for creating rapid, even instant, change in themselves, some members of this group returned to our teaching center (as did members of similar groups before them) with their entire families and helped loved ones quickly establish more open, intimate, supportive and loving relationships. Others brought friends and coworkers who wanted easier, sweeter and more nurturing life experiences and were willing to experiment by translating what they wanted into action. One man came back with the key executives from his company for a special program designed to help them create and live a common intention which encouraged open, authentic, energetic, creative and fearless interaction.</span><br data-dcnode-id="2733"><span data-dcnode-id="2732" instrument_node=""> &nbsp;</span><br data-dcnode-id="2731"><span data-dcnode-id="2730" instrument_node=""> “A vision to live by” has not only become the backbone for the staff and volunteers at our teaching center, but also the wellspring of inspiration for the individuals, families and groups we teach as well as an essential frame of reference for this book.</span><br data-dcnode-id="2729"><span data-dcnode-id="2728" instrument_node=""> &nbsp;</span><br data-dcnode-id="2727"><span data-dcnode-id="2726" instrument_node=""> We now witness people implementing in hours what took us years to understand. The ideas contained on these pages can become a simple blueprint into which anyone can breathe life and thereby make profound, immediate changes. Oftentimes, we limit our perspective to past references, citing the evidence of yesterday as proof of what’s possible. But evidence tells us nothing about what we can be and do if we choose to walk a different path. When we have mentored people confronting catastrophic illnesses or situations and watched them triumph, defying the statistics and the predictions of experts, we are awestruck by people’s ability to reclaim their personal power and sense of self-trust. Suddenly, anything seems possible.</span><br data-dcnode-id="2725"><span data-dcnode-id="2724" instrument_node=""> &nbsp;</span><br data-dcnode-id="2723"><span data-dcnode-id="2722" instrument_node=""> Now I would like to take your hand and guide you through a few hours of reading which, I believe, will enable you to make the most important decision of your life&nbsp;…&nbsp;to seize an attitudinal advantage by becoming happy and more loving right now, this instant, whatever your circumstances.</span><br data-dcnode-id="2721"><span data-dcnode-id="2720" instrument_node=""> &nbsp;</span><br data-dcnode-id="2719"><span data-dcnode-id="2718" instrument_node=""> Remember, as you read, there will be something to decide and something to do&nbsp;…&nbsp;an easy, but amazing adventure.</span></span><span data-dcnode-id="2716" instrument_node=""> </span></div><span data-dcnode-id="2714" instrument_node=""> </span></div><span data-dcnode-id="2712" instrument_node=""> </span><div class="a-row" data-dcnode-id="2705"><span data-dcnode-id="2711" instrument_node=""> </span><a aria-expanded="false" class="a-expander-header a-declarative a-expander-extend-header" data-a-expander-toggle="{&quot;allowLinkDefault&quot;:true, &quot;expand_prompt&quot;:& dcnode-id="2340"><a class="a-size-large a-link-normal" data-dcnode-id="2341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Barry-Neil-Kaufman/e/B000APW3O6"><h2 data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">Barry Neil Kaufman</span></h2></a></div><div class="a-row a-spacing-base a-spacing-top-medium a-grid-vertical-align a-grid-center" data-dcnode-id="2301"><div class="a-cardui-deck" data-a-remove-bottom-gutter="true" data-a-remove-top-gutter="true" data-dcnode-id="2302" name="a-cardui-deck-autoname-1"><div class="a-teaser-describedby-collapsed a-hidden" data-dcnode-id="2338" id="a-cardui-deck-autoname-1-teaser-describedby-collapsed"><span data-dcnode-id="2339" instrument_node="">Brief content visible, double tap to read full content.</span></div><div class="a-teaser-describedby-expanded a-hidden" data-dcnode-id="2336" id="a-cardui-deck-autoname-1-teaser-describedby-expanded"><span data-dcnode-id="2337" instrument_node="">Full content visible, double tap to read brief content.</span></div><div class="a-cardui _about-the-author-card_carouselItemStyles_expander__3Fm-M" data-a-card-type="peekExpand" data-dcnode-id="2303" name="a-cardui-deck-autoname-1-card0"><div class="a-cardui-body" data-dcnode-id="2314"><div class="a-reactive-container a-reactive-container-transition" data-dcnode-id="2315"><div data-dcnode-id="2317"><div class="a-cardui-content a-cardui-uninitialized" data-a-max-height="80" data-dcnode-id="2318" style="max-height:80px" tabindex="0"><p data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">BARRY NEIL KAUFMAN is the author of twelve books on The Option Process® and The Son-Rise Program®, including the best-selling Happiness Is A Choice, a blueprint of simple, concrete methods to empower the decision to be happy. He also wrote the iconic Son-Rise: The Miracle Continues, as well as To Love Is To Be Happy With, Giant Steps, PowerDialogues, A Miracle to Believe In, A Sacred Dying, FutureSight and Out-Smarting Your Karma. Mr. Kaufman’s books are available in 22 languages, in over 60 countries. He has twice won the Christopher Award for his writing. He has also won the Humanitas Prize, along with his wife, Samahria Lyte Kaufman, for their screenplay of the award winning NBC-TV movie, Son-Rise: A Miracle of Love.</span></p><p data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">Mr. Kaufman, along with his wife, is the co-founder, co-director and co-creator of The Option Institute® International Learning &amp; Training Center in Sheffield, Massachusetts, a nonprofit educational organization and worldwide teaching center for The Option Process. The Institute offers empowering personal growth E-Learning Training Courses and counseling services for individuals, couples, families and groups, using life-changing experiential learning techniques designed to greatly improve areas of self-empowerment, relationships, career, health… and all aspects of quality of life. </span></p><p data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">The Kaufmans are also the originators of The Son-Rise Program®, which is taught at the Autism Treatment Center of America™, a division of the Option Institute®. The Son-Rise Program methodology evolved when their son, Raun, was diagnosed with having a severe and incurable case of Autism. Refusing to give up on their son’s future, Bears and Samahria worked with Raun for over 12 hours a day, 7 days a week, for more than three years, resulting in his full recovery from Autism. Raun went on to graduate from an Ivy League university and to become the director of an educational center for school-aged children. Later, Raun was the Director of Global Education and the CEO of The Option Institute for a period of time. Son-Rise: The Miracle Continues, the story of the Kaufmans’ work with Raun, became a bestselling book and the award-winning NBC TV movie based on this book was viewed worldwide.</span></p><p data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">The Autism Treatment Center of America also offers E-Learning Training Courses in The Son-Rise Program methodology for parents, professionals and caregivers of children and adults on the autism spectrum and with other developmental challenges, as well as consultation and counselling sessions. The Son-Rise Program was awarded “Best Autism Therapy” at The National AutismOne Conference. Over the past 40 years, more than 45,000 individuals, families and children from over 140 different countries have attended programs presented by The Option Institute and The Autism treatment Center of America.</span></p><p data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">In addition to raising their three biological children, they chose to adopt three more children from circumstances of trauma, as a way to express their gratitude for what they had learned in their journey with Raun. One of their adopted sons had been seriously malnourished, resulting in physiological, motor and other challenges. Bears and Samahria worked with him and he thrived, demonstrating a keen mind and a wonderful ability to learn. Another son, whose mother had died and who had his throat slit by his birth father, found support, guidance and love in the expanding Kaufman family. Their adoption of an eleven-year-old girl from El Salvador, also a trauma survivor, completed their immediate family. The Kaufmans have passed this tradition on to their own children, some of who have adopted children from similar situations, further expanding their multi-racial, multi-cultural family. </span></p><p data-dcnode-id="2325"></p><p data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">www.option.org </span></p><p data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">www.autismtreatmentcenter.org</span></p><p data-dcnode-id="2320"></p><p data-dcnode-id="2319"></p></div></div><div class="a-reactive-container-gradient" data-dcnode-id="2316"></div></div></div><div class="a-cardui-footer" data-dcnode-id="2304"><div class="a-cardui-expand-control-footer" data-csa-c-type="widget" data-csa-interaction-events="click" data-dcnode-id="2305"><a class="a-cardui-expand-control-footer-button" data-dcnode-id="2306" href="javascript:void(0)" role="button"><span class="a-expander-icon" data-dcnode-id="2312"><i class="a-css-icon a-css-icon-draw a-css-icon-expand" data-dcnode-id="2313"></i></span><span class="a-see-more a-color-link" data-dcnode-id="2307"><span class="a-see-more-text" data-dcnode-id="2310" style=""><span data-dcnode-id="2311" instrument_node="">Read more</span></span><span class="a-see-less-text" data-dcnode-id="2308" style="display:none"><span data-dcnode-id="2309" instrument_node="">Read less</span></span></span></a></div></div></div></div></div></div></div></div></div></div></div><span data-dcnode-id="2292" instrument_node="">
