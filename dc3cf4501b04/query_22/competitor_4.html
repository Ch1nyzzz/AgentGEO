153-2.766-1.118-4.293-2.046-.84 4.406-1.866 8.63-4.906 10.836-.94-6.658 1.377-11.66 2.453-16.968-1.834-3.087.22-9.3 4.09-7.77 4.758 1.883-4.123 11.478 1.84 12.676 6.223 1.25 8.765-10.8 4.905-14.72C13.038-.44 2.38 5.088 3.69 13.19c.32 1.982 2.367 2.583.82 5.317-3.57-.792-4.636-3.607-4.5-7.36C.233 5.004 5.53.703 10.847.107c6.722-.752 13.03 2.468 13.902 8.79.98 7.138-3.034 14.867-10.222 14.312z" data-dcnode-id="438"></path></svg></a></li></ul></div></div><div class="articleFeaturedImage__componentWrapper--1O_Mn" data-dcnode-id="425"><figure class="articleFeaturedImage__wrapper--1FIbz" data-dcnode-id="426" itemprop="image" itemscope="" itemtype="https://schema.org/ImageObject"><span class="image__wrapper--i55tn" data-dcnode-id="430"><img alt="Courtesy of Gonzalo Aragon/Shutterstock" data-dcnode-id="431" itemprop="contentUrl url" sizes="(max-width: 30rem) 480px,(max-width: 37.5rem) 600px,(max-width: 56.25rem) 900px,(max-width: 81.25rem) 1180px,(min-width: 81.25rem) 1550px,100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//content.thriveglobal.com/wp-content/uploads/2019/10/shutterstock_763842916.jpg&amp;raw" srcset="https://content.thriveglobal.com/wp-content/uploads/2019/10/shutterstock_763842916.jpg?w=480 480w,https://content.thriveglobal.com/wp-content/uploads/2019/10/shutterstock_763842916.jpg?w=600 600w,https://content.thriveglobal.com/wp-content/uploads/2019/10/shutterstock_763842916.jpg?w=900 900w,https://content.thriveglobal.com/wp-content/uploads/2019/10/shutterstock_763842916.jpg?w=1180 1180w,https://content.thriveglobal.com/wp-content/uploads/2019/10/shutterstock_763842916.jpg?w=1550 1550w"></span><figcaption class="articleFeaturedImage__caption--2Hd34" data-dcnode-id="427" itemprop="description"><div data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Courtesy of Gonzalo Aragon/Shutterstock</span></div></figcaption></figure></div><div class="articleBody__componentWrapper--3_dZV" data-dcnode-id="234"><div class="articleBody__wrapper--3f_4-" data-dcnode-id="235"><div class="articleBody__inner--9RVcu" data-dcnode-id="242"><div class="articleBody__content--1Cv9L rich-text" data-dcnode-id="275" itemprop="articleBody"><div data-dcnode-id="276"><span data-dcnode-id="424" instrument_node="">
</span><h3 data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Happiness is a Choice!</span></h3><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">As Aristotle said, “Happiness is the meaning and the purpose of life, the whole aim . . . of human existence.” One of the greatest achievements we can attain in life is leaving this world a better place than we found it. So, how can we make that a real accomplishment, and not just a hope? For one, we may need to re-think some of our attitudes about the sources of happiness. Taking a fresh look at what we believe, can open up a world of possibilities.&nbsp; Ultimately, happiness boils down to small course corrections made daily.&nbsp; They will help us to become happier people.</span></p><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="417" instrument_node="">There are many people who are knowledgeable and highly educated, yet who are quite unhappy in their lives. They know intellectually the steps to happiness, but </span><em data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">knowledge without application is really just education.</span></em><span data-dcnode-id="414" instrument_node=""> We can learn all the things that contribute to true, lasting happiness, like gratitude, forgiveness, love, and being of service, but if we don’t apply them in our life on a daily basis, not much will change.</span></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">The good news is, we have quite a bit of control over whether we are happy or not. Although much of our natural disposition for happiness is based upon our genetic makeup, and therefore varies from person to person, it is merely an inherited tendency, not our destiny. Our destiny is, and always will be, what we work toward, what we accomplish in our lives.</span></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Happiness expert Sonja Lyubomirsky, a professor of psychology at the University of California-Riverside, compared the genetically determined happiness “set point” to our inherited tendency to stay thin or to put on weight. She wrote “All the set point means is that in the same way some people have to work on maintaining their weight, [a person] may have to work to achieve the same level of happiness as someone else. It may be harder, but it can be done.”&nbsp; So if we’re not as happy as we’d like to be – we can actually do something about it.&nbsp;</span></p><span data-dcnode-id="406" instrument_node="">
</span><h3 data-dcnode-id="403"><strong data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">What Is Happiness, Anyway?</span></strong></h3><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">What does being happy feel like, and do we recognize happiness when we are experiencing it? Feeling happy can be defined as a sustainable sense of spiritual contentment that arises from deep within. It is a condition of the heart. It is not giddiness, silliness, or ecstasy. What many people don’t realize, though, is that happiness is the result of many decisions made (whether consciously or unconsciously), to be happy.&nbsp;</span></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">There are many people who prefer to blame their unhappiness upon their circumstances, but if our happiness were dependent upon our circumstances, then most people would rarely be happy, because no one has a pain-free life. We all experience many challenges, hardships, adversity, and disappointments. It’s a part of our human existence.</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Dr. Viktor Frankl, the bestselling author of Man’s Search for Meaning and a renowned Austrian psychiatrist, survived the holocaust in Germany. While watching his fellow inmates in a Nazi concentration camp, he observed that all things could be taken from a man except the final freedom: the ability to choose how he will respond to any situation.&nbsp; He wrote that “between stimulus and response there is a space. In that space is our power to choose our response. In our response lies our growth and our freedom.”&nbsp; And I would add our happiness.</span></p><span data-dcnode-id="393" instrument_node="">
</span><h3 data-dcnode-id="390"><strong data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Is Happiness Worth the Effort?</span></strong></h3><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="384"><span data-dcnode-id="388" instrument_node="">Is happiness truly worth the effort? Absolutely! There are many reasons why life is more fulfilling when we’re happy. Our happiness, or lack thereof, influences our daily interactions and all of our relationships with others. If we’re happy, we are much more likely to positively impact our spouse, our children, our neighbors, friends, our co-workers, and our community. </span><em data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">The world is a better place when the happiest version of each one of us is walking around</span></em><span data-dcnode-id="385" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Here are some additional reasons why the effort to become happier is worth it:</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">1) Happiness is success:&nbsp; Albert Schweitzer said that “Success is not the key to happiness.&nbsp; Happiness is the key to success.”</span></p><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">2) Happiness is healthy: Our physical health is directly impacted by our emotional and mental state. Happier people tend to be healthier in every aspect of life.</span></p><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">3) Happiness is being connected: If I smile, make a polite gesture, or say something welcoming, the majority of people will respond in kind.&nbsp;</span></p><span data-dcnode-id="371" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">4) Happiness is attractive: People are drawn to those who radiate happiness, warmth, and positivity.</span></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Our happiness depends on the way we live our lives and how we view the world.&nbsp; We each create the lens through which we view the world.</span></p><span data-dcnode-id="365" instrument_node="">
</span><h3 data-dcnode-id="362"><strong data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">What About Stress and Happiness?</span></strong></h3><span data-dcnode-id="361" instrument_node="">
</span><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">How often do you run into somebody, ask how they are, and hear the answer,&nbsp;</span></p><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">“Oh, I’m all stressed out!”&nbsp;</span></p><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">That has become so commonplace in our society, it’s almost synonymous with “good morning.” Imagine instead the following conversation: &nbsp;</span></p><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">“How are you today?”&nbsp;</span></p><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">“I’m doing great! I have zero stress in my life!”</span></p><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">It sounds funny! In fact, many people wear their stress and busyness as if it were a badge of honor. Being overcommitted gives some people a false sense of value, almost like an unspoken “I’m busier than you, so I must be more important than you.” But that road can become filled with loneliness and regret farther down, as we realize that we’ve been spinning on our hamster wheel so long, that we’ve lost touch with the people and practices in our lives that truly matter most.&nbsp;</span></p><span data-dcnode-id="343" instrument_node="">
</span><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Sometimes we’re so busy, we even deprive ourselves of the most fundamental things: sleep and healthy food. Can you imagine having the following conversation with a child?&nbsp;</span></p><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">“You need to stay on the computer until 2:00 a.m. to keep checking your email and read the news!&nbsp;</span></p><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">“But Mom/Dad, I’m tired, I want to go to sleep!”&nbsp;</span></p><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">“NO! Go back to the computer and check to see if you have any new emails!” &nbsp;</span></p><span data-dcnode-id="331" instrument_node="">
</span><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Similarly, if a client is putting harmful substances in their body, I ask them if they would give it to their child, and the thought of doing so is shocking to them. But why is it so easy for us to say no to our kids (when it’s in their best interest), but not take care of ourselves? I believe it’s because we lack adequate self-parenting. Mismanagement of time and stress becomes a long-term neglect of our needs; it can make us physically sick or lead to emotional and mental breakdowns.&nbsp;</span></p><span data-dcnode-id="328" instrument_node="">
</span><h3 data-dcnode-id="325"><strong data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Take Time Out to Contemplate:</span></strong></h3><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">So, how do we change our mindset from dealing with crises all the time to taking charge of our lives? We literally need to stop, ponder and meditate on the direction of our work, our relationships, and every other aspect of our lives. It’s a key ingredient to successfully managing our overall stress levels. I’ve had quite a few clients who are business executives that way too many hours. They don’t take time for themselves, and they become so overwhelmed, that their lifestyle is more reactive crisis management than crisis prevention. When doing executive coaching, I frequently have to ask,</span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">“When was the last time you actually took a day or two off to contemplate, to think about the direction of your life? When did you last take time to do something others might think of as nonproductive, when you didn’t make appointments, go to meetings, close any deals, answer any phone calls, or return any emails? When, instead, you sat, pondered, and meditated about the direction of your life, the direction of your company, and/or the direction of your family?”</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">The typical pushback is, “I can’t afford to take a day off!”</span></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">And my immediate response is, “You can’t afford NOT to take a day off!”</span></p><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">It is the same for the rest of us. To effectively manage our stress, we need to take time to ponder the direction our lives are taking. The result might be that you’ll make a necessary course correction. This may not only add quality (and quantity) years to your life, but it will also add balance and perspective. As a result, you’ll be a better spouse, employee, parent, friend and, ultimately, a better person. Your most vital relationships will receive the benefit of the best you, including your relationship with yourself. &nbsp;</span></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="303"><em data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">The difference between who you are and who you want to be, is what you do!</span></em><strong data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">&nbsp; </span></strong><span data-dcnode-id="304" instrument_node="">If happiness is what you seek, then reading, pondering, and applying, the 7 Paths to Lasting Happiness is a great way to begin!</span></p><span data-dcnode-id="302" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="300"><img class="wp-image-572088" data-dcnode-id="301" sizes="(max-width: 2057px) 100vw, 2057px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//content.thriveglobal.com/wp-content/uploads/2019/10/6x9_FULLCover_140602_FINAL-4.jpg%3Fw%3D742&amp;raw" srcset="https://content.thriveglobal.com/wp-content/uploads/2019/10/6x9_FULLCover_140602_FINAL-4.jpg 2057w, https://content.thriveglobal.com/wp-content/uploads/2019/10/6x9_FULLCover_140602_FINAL-4.jpg?resize=217%2C300 217w, https://content.thriveglobal.com/wp-content/uploads/2019/10/6x9_FULLCover_140602_FINAL-4.jpg?resize=768%2C1060 768w, https://content.thriveglobal.com/wp-content/uploads/2019/10/6x9_FULLCover_140602_FINAL-4.jpg?resize=742%2C1024 742w, https://content.thriveglobal.com/wp-content/uploads/2019/10/6x9_FULLCover_140602_FINAL-4.jpg?resize=1113%2C1536 1113w, https://content.thriveglobal.com/wp-content/uploads/2019/10/6x9_FULLCover_140602_FINAL-4.jpg?resize=1484%2C2048 1484w, https://content.thriveglobal.com/wp-content/uploads/2019/10/6x9_FULLCover_140602_FINAL-4.jpg?resize=1080%2C1490 1080w"></figure><span data-dcnode-id="299" instrument_node="">

ir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//content.thriveglobal.com/wp-content/uploads/2019/08/Screen-Shot-2019-10-08-at-11.15.45-AM.png%3Fquality%3D60%26resize%3D60%2C60&amp;raw"></div><h3 class="articleFooterByline__name--3Vta-" data-dcnode-id="187"><a class="articleFooterByline__nameLink--xTTGy" data-dcnode-id="197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thriveglobal.com/authors/eliagourgouris/" to="https://thriveglobal.com/authors/eliagourgouris/"><span data-dcnode-id="198" instrument_node="">Dr. Elia Gourgouris</span></a><span class="articleFooterByline__title--3Ukl2" data-dcnode-id="193"><span data-dcnode-id="196" instrument_node="">, </span><span data-dcnode-id="194" instrument_node="">Ph.D.</span></span><span class="articleFooterByline__title--3Ukl2" data-dcnode-id="189"><span class="articleFooterByline__title--3Ukl2" data-dcnode-id="191"><span data-dcnode-id="192" instrument_node=""> at </span></span><span data-dcnode-id="190" instrument_node="">The Happiness Center</span></span><span data-dcnode-id="188" instrument_node=""></span></h3><div class="articleFooterByline__biography--2KhgI" data-dcnode-id="163"><div data-dcnode-id="176"><span data-dcnode-id="186" instrument_node="">
</span><p class="p1" data-dcnode-id="178"><span data-dcnode-id="185" instrument_node="">Dr. Elia Gourgouris, is an International Keynote speaker and a #1 Best-selling author of “</span><a data-dcnode-id="183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Paths-Lasting-Happiness-Ultimate-Success/dp/0996229000/ref%3Dasc_df_0996229000/%3Ftag%3Dhyprod-20%26linkCode%3Ddf0%26hvadid%3D312681615521%26hvpos%3D1o1%26hvnetw%3Dg%26hvrand%3D4812943586323633762%26hvpone%3D%26hvptwo%3D%26hvqmt%3D%26hvdev%3Dc%26hvdvcmdl%3D%26hvlocint%3D%26hvlocphy%3D9067609%26hvtargid%3Dpla-612407811284%26psc%3D1"><span data-dcnode-id="184" instrument_node="">7 Paths to Lasting Happiness</span></a><span data-dcnode-id="182" instrument_node="">”. He was born and raised in Athens, Greece, where he became a National Swim Champion. He moved with his family to Santa Monica, CA when he was ten. He received his BA in psychology from UCLA, and then went on to receive his MA and PhD in psychology. He’s the President of the Happiness Center (</span><a data-dcnode-id="180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thehappinesscenter.com/"><span data-dcnode-id="181" instrument_node="">www.thehappinesscenter.com</span></a><span data-dcnode-id="179" instrument_node="">) an organization of world leading experts in the field of Positive Psychology. Together they have helped thousands of individuals and companies achieve happiness, success and corporate wellness. He is also a contributor to Thrive Global.</span></p><span data-dcnode-id="177" instrument_node="">
