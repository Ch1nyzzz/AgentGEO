</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="4002" data-fontsize="15.4" data-lineheight="21.56px" style="--fontSize:15.4; line-height: 1.4; --minFontSize:15.4;"><span data-dcnode-id="4003" instrument_node="">Happiness Is Obeying God’s Word</span></h3><span data-dcnode-id="4001" instrument_node="">
</span><ol data-dcnode-id="3786" style="list-style-type: upper-alpha;"><span data-dcnode-id="4000" instrument_node="">
</span><li data-dcnode-id="3950"><span data-dcnode-id="3999" instrument_node="">The LORD gave laws governing our lives and relationships, and we lose if we think we can try a different or modified approach and succeed (</span><a class="rtBibleRef" data-dcnode-id="3997" data-purpose="bible-reference" data-reference="Ps 1.1-3" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%25201.1-3" rel="noopener" target="_blank"><span data-dcnode-id="3998" instrument_node="">Ps 1:1-3</span></a><span data-dcnode-id="3996" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3994" data-purpose="bible-reference" data-reference="Ps 119.113" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%2520119.113" rel="noopener" target="_blank"><span data-dcnode-id="3995" instrument_node="">119:113</span></a><span data-dcnode-id="3993" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="3991" data-purpose="bible-reference" data-reference="Ps 119.128" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%2520119.128" rel="noopener" target="_blank"><span data-dcnode-id="3992" instrument_node="">128</span></a><span data-dcnode-id="3990" instrument_node="">).
</span><ol data-dcnode-id="3952"><span data-dcnode-id="3989" instrument_node="">
</span><li data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">Do you believe the law of gravity? His laws of wisdom are even more sure forever.</span></li><span data-dcnode-id="3986" instrument_node="">
</span><li data-dcnode-id="3981"><span data-dcnode-id="3985" instrument_node="">Learning and keeping Solomon’s wisdom is life, peace, and favour (</span><a class="rtBibleRef" data-dcnode-id="3983" data-purpose="bible-reference" data-reference="Prov 3.1-4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%25203.1-4" rel="noopener" target="_blank"><span data-dcnode-id="3984" instrument_node="">Prov 3:1-4</span></a><span data-dcnode-id="3982" instrument_node="">).</span></li><span data-dcnode-id="3980" instrument_node="">
</span><li data-dcnode-id="3975"><span data-dcnode-id="3979" instrument_node="">Wisdom – knowledge of God and His laws – brings life or death (</span><a class="rtBibleRef" data-dcnode-id="3977" data-purpose="bible-reference" data-reference="Prov 8.32-36" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%25208.32-36" rel="noopener" target="_blank"><span data-dcnode-id="3978" instrument_node="">Prov 8:32-36</span></a><span data-dcnode-id="3976" instrument_node="">).</span></li><span data-dcnode-id="3974" instrument_node="">
</span><li data-dcnode-id="3969"><span data-dcnode-id="3973" instrument_node="">The Lord can overthrow these laws, if we disobey elsewhere, as Israel learned when they worked hard at farming but neglected His house (</span><a class="rtBibleRef" data-dcnode-id="3971" data-purpose="bible-reference" data-reference="Haggai 1.2-11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Haggai%25201.2-11" rel="noopener" target="_blank"><span data-dcnode-id="3972" instrument_node="">Haggai 1:2-11</span></a><span data-dcnode-id="3970" instrument_node="">).</span></li><span data-dcnode-id="3968" instrument_node="">
</span><li data-dcnode-id="3963"><span data-dcnode-id="3967" instrument_node="">And the Lord can exceed these laws, if we seek Him fervently (</span><a class="rtBibleRef" data-dcnode-id="3965" data-purpose="bible-reference" data-reference="1 Sam 16.6-13" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Sam%252016.6-13" rel="noopener" target="_blank"><span data-dcnode-id="3966" instrument_node="">I Sam 16:6-13</span></a><span data-dcnode-id="3964" instrument_node="">).</span></li><span data-dcnode-id="3962" instrument_node="">
</span><li data-dcnode-id="3954"><span data-dcnode-id="3961" instrument_node="">The more you delight in His word, the more He will bless you (</span><a class="rtBibleRef" data-dcnode-id="3959" data-purpose="bible-reference" data-reference="Ps 112.1" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%2520112.1" rel="noopener" target="_blank"><span data-dcnode-id="3960" instrument_node="">Ps 112:1</span></a><span data-dcnode-id="3958" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3956" data-purpose="bible-reference" data-reference="Ps 128.1-6" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%2520128.1-6" rel="noopener" target="_blank"><span data-dcnode-id="3957" instrument_node="">128:1-6</span></a><span data-dcnode-id="3955" instrument_node="">).</span></li><span data-dcnode-id="3953" instrument_node="">
</span></ol><span data-dcnode-id="3951" instrument_node="">
</span></li><span data-dcnode-id="3949" instrument_node="">
</span><li data-dcnode-id="3902"><span data-dcnode-id="3948" instrument_node="">The LORD will not be mocked, and it is folly to deceive yourself about sin (</span><a class="rtBibleRef" data-dcnode-id="3946" data-purpose="bible-reference" data-reference="Gal 6.7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Gal%25206.7" rel="noopener" target="_blank"><span data-dcnode-id="3947" instrument_node="">Gal 6:7</span></a><span data-dcnode-id="3945" instrument_node="">).
</span><ol data-dcnode-id="3904"><span data-dcnode-id="3944" instrument_node="">
</span><li data-dcnode-id="3939"><span data-dcnode-id="3943" instrument_node="">He has guaranteed that your every sin will find you out for punishment (</span><a class="rtBibleRef" data-dcnode-id="3941" data-purpose="bible-reference" data-reference="Num 32.23" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Num%252032.23" rel="noopener" target="_blank"><span data-dcnode-id="3942" instrument_node="">Nu 32:23</span></a><span data-dcnode-id="3940" instrument_node="">).</span></li><span data-dcnode-id="3938" instrument_node="">
</span><li data-dcnode-id="3927"><span data-dcnode-id="3937" instrument_node="">There is no escape – the way of transgressors is hard (</span><a class="rtBibleRef" data-dcnode-id="3935" data-purpose="bible-reference" data-reference="Prov 13.15" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252013.15" rel="noopener" target="_blank"><span data-dcnode-id="3936" instrument_node="">Prov 13:15</span></a><span data-dcnode-id="3934" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3932" data-purpose="bible-reference" data-reference="Prov 4.19" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%25204.19" rel="noopener" target="_blank"><span data-dcnode-id="3933" instrument_node="">4:19</span></a><span data-dcnode-id="3931" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3929" data-purpose="bible-reference" data-reference="Ps 36.1-2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252036.1-2" rel="noopener" target="_blank"><span data-dcnode-id="3930" instrument_node="">Ps 36:1-2</span></a><span data-dcnode-id="3928" instrument_node="">).</span></li><span data-dcnode-id="3926" instrument_node="">
</span><li data-dcnode-id="3918"><span data-dcnode-id="3925" instrument_node="">Thorns are a nasty, irritating, harsh thing, so do not be froward (</span><a class="rtBibleRef" data-dcnode-id="3923" data-purpose="bible-reference" data-reference="Prov 15.19" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252015.19" rel="noopener" target="_blank"><span data-dcnode-id="3924" instrument_node="">Prov 15:19</span></a><span data-dcnode-id="3922" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3920" data-purpose="bible-reference" data-reference="Prov 22.5" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252022.5" rel="noopener" target="_blank"><span data-dcnode-id="3921" instrument_node="">22:5</span></a><span data-dcnode-id="3919" instrument_node="">).</span></li><span data-dcnode-id="3917" instrument_node="">
</span><li data-dcnode-id="3909"><span data-dcnode-id="3916" instrument_node="">David and Paul reasoned of the folly of worldly lifestyles (</span><a class="rtBibleRef" data-dcnode-id="3914" data-purpose="bible-reference" data-reference="Ps 36.1-2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252036.1-2" rel="noopener" target="_blank"><span data-dcnode-id="3915" instrument_node="">Ps 36:1-2</span></a><span data-dcnode-id="3913" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3911" data-purpose="bible-reference" data-reference="Rom 6.21" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rom%25206.21" rel="noopener" target="_blank"><span data-dcnode-id="3912" instrument_node="">Rom 6:21</span></a><span data-dcnode-id="3910" instrument_node="">).</span></li><span data-dcnode-id="3908" instrument_node="">
</span><li data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">How much do you believe God? Are you better than Eve and Adam in Eden?</span></li><span data-dcnode-id="3905" instrument_node="">
</span></ol><span data-dcnode-id="3903" instrument_node="">
</span></li><span data-dcnode-id="3901" instrument_node="">
</span><li data-dcnode-id="3788"><span data-dcnode-id="3900" instrument_node="">Consider a few examples of His laws leading to blessing and prosperity or vice versa.
</span><ol data-dcnode-id="3790"><span data-dcnode-id="3899" instrument_node="">
</span><li data-dcnode-id="3888"><span data-dcnode-id="3898" instrument_node="">Death and hell, figuratively, are by sparing the rod (</span><a class="rtBibleRef" data-dcnode-id="3896" data-purpose="bible-reference" data-reference="Prov 23.13-14" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252023.13-14" rel="noopener" target="_blank"><span data-dcnode-id="3897" instrument_node="">Prov 23:13-14</span></a><span data-dcnode-id="3895" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3893" data-purpose="bible-reference" data-reference="Prov 29.15" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252029.15" rel="noopener" target="_blank"><span data-dcnode-id="3894" instrument_node="">29:15</span></a><span data-dcnode-id="3892" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3890" data-purpose="bible-reference" data-reference="Prov 19.18" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252019.18" rel="noopener" target="_blank"><span data-dcnode-id="3891" instrument_node="">19:18</span></a><span data-dcnode-id="3889" instrument_node="">).</span></li><span data-dcnode-id="3887" instrument_node="">
</span><li data-dcnode-id="3876"><span data-dcnode-id="3886" instrument_node="">Happiness and joy are through the route of godly training (</span><a class="rtBibleRef" data-dcnode-id="3884" data-purpose="bible-reference" data-reference="Prov 29.17" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252029.17" rel="noopener" target="_blank"><span data-dcnode-id="3885" instrument_node="">Pro 29:17</span></a><span data-dcnode-id="3883" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3881" data-purpose="bible-reference" data-reference="Pro 10.1" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Pro%252010.1" rel="noopener" target="_blank"><span data-dcnode-id="3882" instrument_node="">10:1</span></a><span data-dcnode-id="3880" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3878" data-purpose="bible-reference" data-reference="Pro 15.20" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Pro%252015.20" rel="noopener" target="_blank"><span data-dcnode-id="3879" instrument_node="">15:20</span></a><span data-dcnode-id="3877" instrument_node="">).</span></li><span data-dcnode-id="3875" instrument_node="">
</span><li data-dcnode-id="3870"><span data-dcnode-id="3874" instrument_node="">Honoring the office of parent is a simple rule for the good life (</span><a class="rtBibleRef" data-dcnode-id="3872" data-purpose="bible-reference" data-reference="Eph 6.2-3" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eph%25206.2-3" rel="noopener" target="_blank"><span data-dcnode-id="3873" instrument_node="">Ephesians 6:2-3</span></a><span data-dcnode-id="3871" instrument_node="">).</span></li><span data-dcnode-id="3869" instrument_node="">
</span><li data-dcnode-id="3861"><span data-dcnode-id="3868" instrument_node="">Zealous diligence and time urgency at work beats safe pacing (</span><a class="rtBibleRef" data-dcnode-id="3866" data-purpose="bible-reference" data-reference="Prov 10.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252010.4" rel="noopener" target="_blank"><span data-dcnode-id="3867" instrument_node="">Prov 10:4</span></a><span data-dcnode-id="3865" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3863" data-purpose="bible-reference" data-reference="Prov 12.24" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252012.24" rel="noopener" target="_blank"><span data-dcnode-id="3864" instrument_node="">12:24</span></a><span data-dcnode-id="3862" instrument_node="">).</span></li><span data-dcnode-id="3860" instrument_node="">
</span><li data-dcnode-id="3852"><span data-dcnode-id="3859" instrument_node="">Saving a portion of your labor will bless you in days to come (</span><a class="rtBibleRef" data-dcnode-id="3857" data-purpose="bible-reference" data-reference="Prov 6.6-8" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%25206.6-8" rel="noopener" target="_blank"><span data-dcnode-id="3858" instrument_node="">Prov 6:6-8</span></a><span data-dcnode-id="3856" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3854" data-purpose="bible-reference" data-reference="Prov 30.25" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252030.25" rel="noopener" target="_blank"><span data-dcnode-id="3855" instrument_node="">30:25</span></a><span data-dcnode-id="3853" instrument_node="">).</span></li><span data-dcnode-id="3851" instrument_node="">
</span><li data-dcnode-id="3843"><span data-dcnode-id="3850" instrument_node="">Speculating for an easier way to make money will bring ruin (</span><a class="rtBibleRef" data-dcnode-id="3848" data-purpose="bible-reference" data-reference="Prov 14.23" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252014.23" rel="noopener" target="_blank"><span data-dcnode-id="3849" instrument_node="">Prov 14:23</span></a><span data-dcnode-id="3847" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3845" data-purpose="bible-reference" data-reference="Prov 28.19" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252028.19" rel="noopener" target="_blank"><span data-dcnode-id="3846" instrument_node="">28:19</span></a><span data-dcnode-id="3844" instrument_node="">).</span></li><span data-dcnode-id="3842" instrument_node="">
</span><li data-dcnode-id="3828"><span data-dcnode-id="3841" instrument_node="">Why does the man who says he cannot afford to give always end up poorer than the man who says he cannot afford not to give (</span><a class="rtBibleRef" data-dcnode-id="3839" data-purpose="bible-reference" data-reference="Prov 3.9-10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%25203.9-10" rel="noopener" target="_blank"><span data-dcnode-id="3840" instrument_node="">Prov 3:9-10</span></a><span data-dcnode-id="3838" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3836" data-purpose="bible-reference" data-reference="Mal 3.7-12" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Mal%25203.7-12" rel="noopener" target="_blank"><span data-dcnode-id="3837" instrument_node="">Mal 3:7-12</span></a><span data-dcnode-id="3835" instrument_node="">)? Or in other words, how does the man who gives money away get rich and the man who keeps his money gets poor (</span><a class="rtBibleRef" data-dcnode-id="3833" data-purpose="bible-reference" data-reference="Prov 11.24" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252011.24" rel="noopener" target="_blank"><span data-dcnode-id="3834" instrument_node="">Prov 11:24</span></a><span data-dcnode-id="3832" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3830" data-purpose="bible-reference" data-reference="Luke 6.38" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Luke%25206.38" rel="noopener" target="_blank"><span data-dcnode-id="3831" instrument_node="">Luke 6:38</span></a><span data-dcnode-id="3829" instrument_node="">)?</span></li><span data-dcnode-id="3827" instrument_node="">
</span><li data-dcnode-id="3822"><span data-dcnode-id="3826" instrument_node="">Generosity comes back in a way you cannot understand naturally (</span><a class="rtBibleRef" data-dcnode-id="3824" data-purpose="bible-reference" data-reference="Prov 11.24-26" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252011.24-26" rel="noopener" target="_blank"><span data-dcnode-id="3825" instrument_node="">Prov 11:24-26</span></a><span data-dcnode-id="3823" instrument_node="">).</span></li><span data-dcnode-id="3821" instrument_node="">
</span><li data-dcnode-id="3813"><span data-dcnode-id="3820" instrument_node="">Friends come by friendliness, and this is surer than gravity (</span><a class="rtBibleRef" data-dcnode-id="3818" data-purpose="bible-reference" data-reference="Prov 18.24" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252018.24" rel="noopener" target="_blank"><span data-dcnode-id="3819" instrument_node="">Prov 18:24</span></a><span data-dcnode-id="3817" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3815" data-purpose="bible-reference" data-reference="Prov 22.11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252022.11" rel="noopener" target="_blank"><span data-dcnode-id="3816" instrument_node="">22:11</span></a><span data-dcnode-id="3814" instrument_node="">).</span></li><span data-dcnode-id="3812" instrument_node="">
</span><li data-dcnode-id="3807"><span data-dcnode-id="3811" instrument_node="">Cherishing and nourishing your wife is loving yourself, husbands (</span><a class="rtBibleRef" data-dcnode-id="3809" data-purpose="bible-reference" data-reference="Eph 5.25-33" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eph%25205.25-33" rel="noopener" target="_blank"><span data-dcnode-id="3810" instrument_node="">Eph 5:25-33</span></a><span data-dcnode-id="3808" instrument_node="">).</span></li><span data-dcnode-id="3806" instrument_node="">
</span><li data-dcnode-id="3801"><span data-dcnode-id="3805" instrument_node="">A woman will be praised – not for beauty or favor – but fearing God (</span><a class="rtBibleRef" data-dcnode-id="3803" data-purpose="bible-reference" data-reference="Prov 31.30" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252031.30" rel="noopener" target="_blank"><span data-dcnode-id="3804" instrument_node="">Prov 31:30</span></a><span data-dcnode-id="3802" instrument_node="">).</span></li><span data-dcnode-id="3800" instrument_node="">
</span><li data-dcnode-id="3795"><span data-dcnode-id="3799" instrument_node="">Letting God’s kingdom take second place in your life brings pain (</span><a class="rtBibleRef" data-dcnode-id="3797" data-purpose="bible-reference" data-reference="Haggai 1.2-11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Haggai%25201.2-11" rel="noopener" target="_blank"><span data-dcnode-id="3798" instrument_node="">Haggai 1:2-11</span></a><span data-dcnode-id="3796" instrument_node="">).</span></li><span data-dcnode-id="3794" instrument_node="">
</span><li data-dcnode-id="3792"><span data-dcnode-id="3793" instrument_node="">These simple examples are to show painful consequences of Bible compromise.</span></li><span data-dcnode-id="3791" instrument_node="">
</span></ol><span data-dcnode-id="3789" instrument_node="">
</span></li><span data-dcnode-id="3787" instrument_node="">
</span></ol><span data-dcnode-id="3785" instrument_node="">
</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="3783" data-fontsize="15.4" data-lineheight="21.56px" style="--fontSize:15.4; line-height: 1.4; --minFontSize:15.4;"><span data-dcnode-id="3784" instrument_node="">Happiness Is Knowing the Gospel</span></h3><span data-dcnode-id="3782" instrument_node="">
</span><ol data-dcnode-id="3673" style="list-style-type: upper-alpha;"><span data-dcnode-id="3781" instrument_node="">
</span><li data-dcnode-id="3744"><span data-dcnode-id="3780" instrument_node="">The gospel brings glad tidings of good things (</span><a class="rtBibleRef" data-dcnode-id="3778" data-purpose="bible-reference" data-reference="Isa 52.7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Isa%252052.7" rel="noopener" target="_blank"><span data-dcnode-id="3779" instrument_node="">Isaiah 52:7</span></a><span data-dcnode-id="3777" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3775" data-purpose="bible-reference" data-reference="Rom 10.15" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rom%252010.15" rel="noopener" target="_blank"><span data-dcnode-id="3776" instrument_node="">Romans 10:15</span></a><span data-dcnode-id="3774" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3772" data-purpose="bible-reference" data-reference="Ps 89.15" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252089.15" rel="noopener" target="_blank"><span data-dcnode-id="3773" instrument_node="">Ps 89:15</span></a><span data-dcnode-id="3771" instrument_node="">).
</span><ol data-dcnode-id="3746"><span data-dcnode-id="3770" instrument_node="">
</span><li data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">There is no drama of any kind that can come even close to the glory of salvation.</span></li><span data-dcnode-id="3767" instrument_node="">
</span><li data-dcnode-id="3756"><span data-dcnode-id="3766" instrument_node="">Joy in thankfulness for salvation is a constant (</span><a class="rtBibleRef" data-dcnode-id="3764" data-purpose="bible-reference" data-reference="2 Thess 2.13" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Thess%25202.13" rel="noopener" target="_blank"><span data-dcnode-id="3765" instrument_node="">II Thes 2:13</span></a><span data-dcnode-id="3763" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3761" data-purpose="bible-reference" data-reference="Isa 61.10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Isa%252061.10" rel="noopener" target="_blank"><span data-dcnode-id="3762" instrument_node="">Is 61:10</span></a><span data-dcnode-id="3760" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3758" data-purpose="bible-reference" data-reference="2 Cor 9.15" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Cor%25209.15" rel="noopener" target="_blank"><span data-dcnode-id="3759" instrument_node="">II Co 9:15</span></a><span data-dcnode-id="3757" instrument_node="">).</span></li><span data-dcnode-id="3755" instrument_node="">
</span><li data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">Work your way through the facets of salvation, looking for more, for great joy.</span></li><span data-dcnode-id="3752" instrument_node="">
</span><li data-dcnode-id="3748"><a data-dcnode-id="3750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letgodbetrue.com/sermons/index/year-2014/facets-of-salvation/"><span data-dcnode-id="3751" instrument_node="">Facets of Salvation</span></a><span data-dcnode-id="3749" instrument_node="">.</span></li><span data-dcnode-id="3747" instrument_node="">
</span></ol><span data-dcnode-id="3745" instrument_node="">
</span></li><span data-dcnode-id="3743" instrument_node="">
</span><li data-dcnode-id="3735"><span data-dcnode-id="3742" instrument_node="">The gospel is a free feast that satisfies and produces great delight (</span><a class="rtBibleRef" data-dcnode-id="3740" data-purpose="bible-reference" data-reference="Isa 55.1-2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Isa%252055.1-2" rel="noopener" target="_blank"><span data-dcnode-id="3741" instrument_node="">Is 55:1-2</span></a><span data-dcnode-id="3739" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3737" data-purpose="bible-reference" data-reference="Is 25.6" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Is%252025.6" rel="noopener" target="_blank"><span data-dcnode-id="3738" instrument_node="">25:6</span></a><span data-dcnode-id="3736" instrument_node="">).</span></li><span data-dcnode-id="3734" instrument_node="">
</span><li data-dcnode-id="3708"><span data-dcnode-id="3733" instrument_node="">The first result was great joy by believers (</span><a class="rtBibleRef" data-dcnode-id="3731" data-purpose="bible-reference" data-reference="Acts 2.41" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%25202.41" rel="noopener" target="_blank"><span data-dcnode-id="3732" instrument_node="">Acts 2:41</span></a><span data-dcnode-id="3730" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="3728" data-purpose="bible-reference" data-reference="Acts 2.46" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%25202.46" rel="noopener" target="_blank"><span data-dcnode-id="3729" instrument_node="">46</span></a><span data-dcnode-id="3727" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3725" data-purpose="bible-reference" data-reference="Acts 8.5-8" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%25208.5-8" rel="noopener" target="_blank"><span data-dcnode-id="3726" instrument_node="">8:5-8</span></a><span data-dcnode-id="3724" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="3722" data-purpose="bible-reference" data-reference="Acts 8.39" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%25208.39" rel="noopener" target="_blank"><span data-dcnode-id="3723" instrument_node="">39</span></a><span data-dcnode-id="3721" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3719" data-purpose="bible-reference" data-reference="Acts 13.48" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252013.48" rel="noopener" target="_blank"><span data-dcnode-id="3720" instrument_node="">13:48</span></a><span data-dcnode-id="3718" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="3716" data-purpose="bible-reference" data-reference="Acts 13.52" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252013.52" rel="noopener" target="_blank"><span data-dcnode-id="3717" instrument_node="">52</span></a><span data-dcnode-id="3715" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3713" data-purpose="bible-reference" data-reference="Acts 15.3" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252015.3" rel="noopener" target="_blank"><span data-dcnode-id="3714" instrument_node="">15:3</span></a><span data-dcnode-id="3712" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="3710" data-purpose="bible-reference" data-reference="Acts 15.31" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252015.31" rel="noopener" target="_blank"><span data-dcnode-id="3711" instrument_node="">31</span></a><span data-dcnode-id="3709" instrument_node="">).</span></li><span data-dcnode-id="3707" instrument_node="">
</span><li data-dcnode-id="3699"><span data-dcnode-id="3706" instrument_node="">Peter exhorted persecuted, suffering Jews to great joy in Christ (</span><a class="rtBibleRef" data-dcnode-id="3704" data-purpose="bible-reference" data-reference="1 Pet 1.8" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Pet%25201.8" rel="noopener" target="_blank"><span data-dcnode-id="3705" instrument_node="">I Peter 1:8</span></a><span data-dcnode-id="3703" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3701" data-purpose="bible-reference" data-reference="I Peter 4.12-13" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/I%2520Peter%25204.12-13" rel="noopener" target="_blank"><span data-dcnode-id="3702" instrument_node="">4:12-13</span></a><span data-dcnode-id="3700" instrument_node="">).</span></li><span data-dcnode-id="3698" instrument_node="">
</span><li data-dcnode-id="3693"><span data-dcnode-id="3697" instrument_node="">Believing is the only condition for Holy Ghost power for joy and peace (</span><a class="rtBibleRef" data-dcnode-id="3695" data-purpose="bible-reference" data-reference="Rom 15.13" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rom%252015.13" rel="noopener" target="_blank"><span data-dcnode-id="3696" instrument_node="">Rom 15:13</span></a><span data-dcnode-id="3694" instrument_node="">).</span></li><span data-dcnode-id="3692" instrument_node="">
</span><li data-dcnode-id="3687"><span data-dcnode-id="3691" instrument_node="">No matter what happens to us here, Jesus has overcome this wicked world (</span><a class="rtBibleRef" data-dcnode-id="3689" data-purpose="bible-reference" data-reference="John 16.33" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/John%252016.33" rel="noopener" target="_blank"><span data-dcnode-id="3690" instrument_node="">Jn 16:33</span></a><span data-dcnode-id="3688" instrument_node="">).</span></li><span data-dcnode-id="3686" instrument_node="">
</span><li data-dcnode-id="3681"><span data-dcnode-id="3685" instrument_node="">No matter what happens to us here, what happens next transcends it all (</span><a class="rtBibleRef" data-dcnode-id="3683" data-purpose="bible-reference" data-reference="Rom 8.18" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rom%25208.18" rel="noopener" target="_blank"><span data-dcnode-id="3684" instrument_node="">Rom 8:18</span></a><span data-dcnode-id="3682" instrument_node="">).</span></li><span data-dcnode-id="3680" instrument_node="">
</span><li data-dcnode-id="3675"><span data-dcnode-id="3679" instrument_node="">There is no drama, concept, or relationship that can approach adoption (</span><a class="rtBibleRef" data-dcnode-id="3677" data-purpose="bible-reference" data-reference="1 John 3.1-3" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520John%25203.1-3" rel="noopener" target="_blank"><span data-dcnode-id="3678" instrument_node="">I John 3:1-3</span></a><span data-dcnode-id="3676" instrument_node="">).</span></li><span data-dcnode-id="3674" instrument_node="">
</span></ol><span data-dcnode-id="3672" instrument_node="">
</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="3670" data-fontsize="15.4" data-lineheight="21.56px" style="--fontSize:15.4; line-height: 1.4; --minFontSize:15.4;"><span data-dcnode-id="3671" instrument_node="">Happiness Is a Choice</span></h3><span data-dcnode-id="3669" instrument_node="">
</span><ol data-dcnode-id="3520" style="list-style-type: upper-alpha;"><span data-dcnode-id="3668" instrument_node="">
</span><li data-dcnode-id="3645"><span data-dcnode-id="3667" instrument_node="">There are many errors in human thinking about happiness due to sin’s evil deception.
</span><ol data-dcnode-id="3647"><span data-dcnode-id="3666" instrument_node="">
</span><li data-dcnode-id="3664"><span data-dcnode-id="3665" instrument_node="">Many think happiness depends on circumstances like health, money, success, etc.</span></li><span data-dcnode-id="3663" instrument_node="">
</span><li data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">Many think happiness depends on feelings, chemistry, moods, venue, environment.</span></li><span data-dcnode-id="3660" instrument_node="">
</span><li data-dcnode-id="3658"><span data-dcnode-id="3659" instrument_node="">Many think happiness depends on other people treating you the way you want.</span></li><span data-dcnode-id="3657" instrument_node="">
</span><li data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">Even the wicked can sometimes approach truth by emphasizing the role of attitude.</span></li><span data-dcnode-id="3654" instrument_node="">
</span><li data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">They will rather easily instruct, order, or criticize a person for not choosing joy.</span></li><span data-dcnode-id="3651" instrument_node="">
</span><li data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node="">Yet, it is rather easy to observe that often the rich are not happier than the poor.</span></li><span data-dcnode-id="3648" instrument_node="">
</span></ol><span data-dcnode-id="3646" instrument_node="">
</span></li><span data-dcnode-id="3644" instrument_node="">
</span><li data-dcnode-id="3624"><span data-dcnode-id="3643" instrument_node="">It is a foolish error to wait for circumstances or situations to change to be happy.
</span><ol data-dcnode-id="3626"><span data-dcnode-id="3642" instrument_node="">
</span><li data-dcnode-id="3640"><span data-dcnode-id="3641" instrument_node="">If circumstances, you will be miserable until a change … and it may get worse!</span></li><span data-dcnode-id="3639" instrument_node="">
</span><li data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">If circumstances, they may never align as you wish, so you get worse and worse.</span></li><span data-dcnode-id="3636" instrument_node="">
</span><li data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">If people treating you better, you are in for a long wait, because they do not care.</span></li><span data-dcnode-id="3633" instrument_node="">
</span><li data-dcnode-id="3631"><span data-dcnode-id="3632" instrument_node="">Worldly idiots think that joy, love, thankfulness are forces of nature that happen.</span></li><span data-dcnode-id="3630" instrument_node="">
</span><li data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">It is not a feeling … for you can rule your spirit and obey or disobey its feelings.</span></li><span data-dcnode-id="3627" instrument_node="">
</span></ol><span data-dcnode-id="3625" instrument_node="">
</span></li><span data-dcnode-id="3623" instrument_node="">
</span><li data-dcnode-id="3591"><span data-dcnode-id="3622" instrument_node="">But the Bible indicates or proves that happiness is a choice (</span><a class="rtBibleRef" data-dcnode-id="3620" data-purpose="bible-reference" data-reference="Eccles 9.9" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25209.9" rel="noopener" target="_blank"><span data-dcnode-id="3621" instrument_node="">Eccl 9:9</span></a><span data-dcnode-id="3619" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3617" data-purpose="bible-reference" data-reference="Phil 3.1" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Phil%25203.1" rel="noopener" target="_blank"><span data-dcnode-id="3618" instrument_node="">Phil 3:1</span></a><span data-dcnode-id="3616" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3614" data-purpose="bible-reference" data-reference="Phil 4.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Phil%25204.4" rel="noopener" target="_blank"><span data-dcnode-id="3615" instrument_node="">4:4</span></a><span data-dcnode-id="3613" instrument_node="">).
</span><ol data-dcnode-id="3593"><span data-dcnode-id="3612" instrument_node="">
</span><li data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">God commands us to be happy, to love, and to be thankful and to give thanks.</span></li><span data-dcnode-id="3609" instrument_node="">
</span><li data-dcnode-id="3607"><span data-dcnode-id="3608" instrument_node="">Therefore, these powerful human emotions are not results, but rather your choices.</span></li><span data-dcnode-id="3606" instrument_node="">
</span><li data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">We first make the choice to do them, and then we keep His word for His power.</span></li><span data-dcnode-id="3603" instrument_node="">
</span><li data-dcnode-id="3598"><span data-dcnode-id="3602" instrument_node="">We then obey commandments, which have direct and indirect benefits (</span><a class="rtBibleRef" data-dcnode-id="3600" data-purpose="bible-reference" data-reference="Eph 6.2-3" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eph%25206.2-3" rel="noopener" target="_blank"><span data-dcnode-id="3601" instrument_node="">Ep 6:2-3</span></a><span data-dcnode-id="3599" instrument_node="">).</span></li><span data-dcnode-id="3597" instrument_node="">
</span><li data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">You can love a spouse more right now … by repenting, remembering, and doing.</span></li><span data-dcnode-id="3594" instrument_node="">
</span></ol><span data-dcnode-id="3592" instrument_node="">
</span></li><span data-dcnode-id="3590" instrument_node="">
</span><li data-dcnode-id="3579"><span data-dcnode-id="3589" instrument_node="">Therefore, happiness and love and thankfulness (and other things) are duties to God.
</span><ol data-dcnode-id="3581"><span data-dcnode-id="3588" instrument_node="">
</span><li data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">David went past duty … duty is overhyped! … his passion, zeal, joy were higher.</span></li><span data-dcnode-id="3585" instrument_node="">
</span><li data-dcnode-id="3583"><span data-dcnode-id="3584" instrument_node="">Freewill offerings are not tithes, as tithes are not offerings … think duty or love.</span></li><span data-dcnode-id="3582" instrument_node="">
</span></ol><span data-dcnode-id="3580" instrument_node="">
</span></li><span data-dcnode-id="3578" instrument_node="">
</span><li data-dcnode-id="3558"><span data-dcnode-id="3577" instrument_node="">The Bible has </span><em data-dcnode-id="3575"><span data-dcnode-id="3576" instrument_node="">if … then</span></em><span data-dcnode-id="3574" instrument_node=""> opportunities throughout for blessings, as in </span><a class="rtBibleRef" data-dcnode-id="3572" data-purpose="bible-reference" data-reference="Eph 6.2-3" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eph%25206.2-3" rel="noopener" target="_blank"><span data-dcnode-id="3573" instrument_node="">Ephesians 6:2-3</span></a><span data-dcnode-id="3571" instrument_node="">.
</span><ol data-dcnode-id="3560"><span data-dcnode-id="3570" instrument_node="">
</span><li data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">The Law had many blessings and curses based on conduct, thus proving choice.</span></li><span data-dcnode-id="3567" instrument_node="">
</span><li data-dcnode-id="3562"><span data-dcnode-id="3566" instrument_node="">God will plentifully reward both the righteous man and the proud doer (</span><a class="rtBibleRef" data-dcnode-id="3564" data-purpose="bible-reference" data-reference="Ps 31.23" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252031.23" rel="noopener" target="_blank"><span data-dcnode-id="3565" instrument_node="">Ps 31:23</span></a><span data-dcnode-id="3563" instrument_node="">).</span></li><span data-dcnode-id="3561" instrument_node="">
</span></ol><span data-dcnode-id="3559" instrument_node="">
</span></li><span data-dcnode-id="3557" instrument_node="">
</span><li data-dcnode-id="3540"><span data-dcnode-id="3556" instrument_node="">You can choose … right now … to end sinful thinking … and to embrace God’s joy.
</span><ol data-dcnode-id="3542"><span data-dcnode-id="3555" instrument_node="">
</span><li data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">You can love a spouse more right now … by repenting, remembering, and doing.</span></li><span data-dcnode-id="3552" instrument_node="">
</span><li data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">Since this is one of God’s great gifts for happiness, your joy will quickly increase.</span></li><span data-dcnode-id="3549" instrument_node="">
</span><li data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">All sinful thinking … bitterness, covetousness, depression, envy, grudges, hate, pride, revenge, and so forth should be rejected as the fatal wickedness that they are.</span></li><span data-dcnode-id="3546" instrument_node="">
</span><li data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node="">All godly thinking … appreciation, forgiveness, forbearance, humility, thankfulness, love, mercy, and such should be embraced as the remedies they are.</span></li><span data-dcnode-id="3543" instrument_node="">
</span></ol><span data-dcnode-id="3541" instrument_node="">
</span></li><span data-dcnode-id="3539" instrument_node="">
</span><li data-dcnode-id="3522"><span data-dcnode-id="3538" instrument_node="">You can choose right now to invest in God or to invest in another person for gladness.
</span><ol data-dcnode-id="3524"><span data-dcnode-id="3537" instrument_node="">
</span><li data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">You love God by delighting in Him via meditation, prayer, reading, singing, etc.</span></li><span data-dcnode-id="3534" instrument_node="">
</span><li data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">You love others by valuing them highly and seeing giving as better than receiving.</span></li><span data-dcnode-id="3531" instrument_node="">
</span><li data-dcnode-id="3529"><span data-dcnode-id="3530" instrument_node="">In either case, God or others, you will find your contentment and joy quickly grow.</span></li><span data-dcnode-id="3528" instrument_node="">
</span><li data-dcnode-id="3526"><span data-dcnode-id="3527" instrument_node="">A wise man does both – loving God and others – and finds his greatest fulfillment.</span></li><span data-dcnode-id="3525" instrument_node="">
</span></ol><span data-dcnode-id="3523" instrument_node="">
</span></li><span data-dcnode-id="3521" instrument_node="">
</span></ol><span data-dcnode-id="3519" instrument_node="">
</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="3517" data-fontsize="15.4" data-lineheight="21.56px" style="--fontSize:15.4; line-height: 1.4; --minFontSize:15.4;"><span data-dcnode-id="3518" instrument_node="">Happiness Is a Commandment</span></h3><span data-dcnode-id="3516" instrument_node="">
</span><ol data-dcnode-id="3298" style="list-style-type: upper-alpha;"><span data-dcnode-id="3515" instrument_node="">
</span><li data-dcnode-id="3483"><span data-dcnode-id="3514" instrument_node="">Joyfulness is commanded (</span><a class="rtBibleRef" data-dcnode-id="3512" data-purpose="bible-reference" data-reference="Deut 28.47-48" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Deut%252028.47-48" rel="noopener" target="_blank"><span data-dcnode-id="3513" instrument_node="">Deut 28:47-48</span></a><span data-dcnode-id="3511" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3509" data-purpose="bible-reference" data-reference="Phil 3.1" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Phil%25203.1" rel="noopener" target="_blank"><span data-dcnode-id="3510" instrument_node="">Phil 3:1</span></a><span data-dcnode-id="3508" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3506" data-purpose="bible-reference" data-reference="Phil 4.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Phil%25204.4" rel="noopener" target="_blank"><span data-dcnode-id="3507" instrument_node="">4:4</span></a><span data-dcnode-id="3505" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3503" data-purpose="bible-reference" data-reference="Prov 5.18-19" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%25205.18-19" rel="noopener" target="_blank"><span data-dcnode-id="3504" instrument_node="">Prov 5:18-19</span></a><span data-dcnode-id="3502" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3500" data-purpose="bible-reference" data-reference="Eccles 9.6-10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25209.6-10" rel="noopener" target="_blank"><span data-dcnode-id="3501" instrument_node="">Eccl 9:6-10</span></a><span data-dcnode-id="3499" instrument_node="">).
</span><ol data-dcnode-id="3485"><span data-dcnode-id="3498" instrument_node="">
</span><li data-dcnode-id="3496"><span data-dcnode-id="3497" instrument_node="">Celebrations (mirth feasts, etc.), even under the OT, were required for His worship.</span></li><span data-dcnode-id="3495" instrument_node="">
</span><li data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">It is RCC monks and nuns that helped set the stage for conditioning you to sadness.</span></li><span data-dcnode-id="3492" instrument_node="">
</span><li data-dcnode-id="3490"><span data-dcnode-id="3491" instrument_node="">There is a time to mourn, but not often, especially if living righteously in Christ.</span></li><span data-dcnode-id="3489" instrument_node="">
</span><li data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">Happiness, gladness, and joy are not options in His kingdom. Get happy! Rejoice!</span></li><span data-dcnode-id="3486" instrument_node="">
</span></ol><span data-dcnode-id="3484" instrument_node="">
</span></li><span data-dcnode-id="3482" instrument_node="">
</span><li data-dcnode-id="3465"><span data-dcnode-id="3481" instrument_node="">Kings generally did not allow unhappy servants around (</span><a class="rtBibleRef" data-dcnode-id="3479" data-purpose="bible-reference" data-reference="Neh 2.1-2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Neh%25202.1-2" rel="noopener" target="_blank"><span data-dcnode-id="3480" instrument_node="">Nehemiah 2:1-2</span></a><span data-dcnode-id="3478" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3476" data-purpose="bible-reference" data-reference="Esther 4.2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Esther%25204.2" rel="noopener" target="_blank"><span data-dcnode-id="3477" instrument_node="">Esther 4:2</span></a><span data-dcnode-id="3475" instrument_node="">).
</span><ol data-dcnode-id="3467"><span data-dcnode-id="3474" instrument_node="">
</span><li data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">Parents can easily grasp this rule, as morose children are destructive to the family.</span></li><span data-dcnode-id="3471" instrument_node="">
</span><li data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">Masters and spouses also see it as evidence of disrespect and disaffection to them.</span></li><span data-dcnode-id="3468" instrument_node="">
</span></ol><span data-dcnode-id="3466" instrument_node="">
</span></li><span data-dcnode-id="3464" instrument_node="">
</span><li data-dcnode-id="3441"><span data-dcnode-id="3463" instrument_node="">Our King has commanded joy in His service, which is truly a most reasonable request.
</span><ol data-dcnode-id="3443"><span data-dcnode-id="3462" instrument_node="">
</span><li data-dcnode-id="3457"><span data-dcnode-id="3461" instrument_node="">Paul commanded Philippians to rejoice, in perpetuity and by repetition (</span><a class="rtBibleRef" data-dcnode-id="3459" data-purpose="bible-reference" data-reference="Phil 4.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Phil%25204.4" rel="noopener" target="_blank"><span data-dcnode-id="3460" instrument_node="">Phil 4:4</span></a><span data-dcnode-id="3458" instrument_node="">).</span></li><span data-dcnode-id="3456" instrument_node="">
</span><li data-dcnode-id="3451"><span data-dcnode-id="3455" instrument_node="">When you find this clearly stated command, do not miss the earlier one (</span><a class="rtBibleRef" data-dcnode-id="3453" data-purpose="bible-reference" data-reference="Phil 3.1" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Phil%25203.1" rel="noopener" target="_blank"><span data-dcnode-id="3454" instrument_node="">Phil 3:1</span></a><span data-dcnode-id="3452" instrument_node="">).</span></li><span data-dcnode-id="3450" instrument_node="">
</span><li data-dcnode-id="3445"><span data-dcnode-id="3449" instrument_node="">Worship or obedience by duty or drudgery is severely condemned (</span><a class="rtBibleRef" data-dcnode-id="3447" data-purpose="bible-reference" data-reference="Mal 1.6-14" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Mal%25201.6-14" rel="noopener" target="_blank"><span data-dcnode-id="3448" instrument_node="">Mal 1:6-14</span></a><span data-dcnode-id="3446" instrument_node="">).</span></li><span data-dcnode-id="3444" instrument_node="">
</span></ol><span data-dcnode-id="3442" instrument_node="">
</span></li><span data-dcnode-id="3440" instrument_node="">
</span><li data-dcnode-id="3432"><span data-dcnode-id="3439" instrument_node="">Moses, under an austere covenant, commanded gladness (</span><a class="rtBibleRef" data-dcnode-id="3437" data-purpose="bible-reference" data-reference="Deut 28.47-48" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Deut%252028.47-48" rel="noopener" target="_blank"><span data-dcnode-id="3438" instrument_node="">Deut 28:47-48</span></a><span data-dcnode-id="3436" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3434" data-purpose="bible-reference" data-reference="Deut 14.22-27" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Deut%252014.22-27" rel="noopener" target="_blank"><span data-dcnode-id="3435" instrument_node="">14:22-27</span></a><span data-dcnode-id="3433" instrument_node="">).</span></li><span data-dcnode-id="3431" instrument_node="">
</span><li data-dcnode-id="3366"><span data-dcnode-id="3430" instrument_node="">David’s Psalms are filled with duties and examples of rejoicing in the Lord (</span><a class="rtBibleRef" data-dcnode-id="3428" data-purpose="bible-reference" data-reference="Ps 2.11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%25202.11" rel="noopener" target="_blank"><span data-dcnode-id="3429" instrument_node="">Ps 2:11</span></a><span data-dcnode-id="3427" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3425" data-purpose="bible-reference" data-reference="Ps 5.11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%25205.11" rel="noopener" target="_blank"><span data-dcnode-id="3426" instrument_node="">5:11</span></a><span data-dcnode-id="3424" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3422" data-purpose="bible-reference" data-reference="Ps 21.1" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252021.1" rel="noopener" target="_blank"><span data-dcnode-id="3423" instrument_node="">21:1</span></a><span data-dcnode-id="3421" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3419" data-purpose="bible-reference" data-reference="Ps 32.11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252032.11" rel="noopener" target="_blank"><span data-dcnode-id="3420" instrument_node="">32:11</span></a><span data-dcnode-id="3418" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3416" data-purpose="bible-reference" data-reference="Ps 33.1" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252033.1" rel="noopener" target="_blank"><span data-dcnode-id="3417" instrument_node="">33:1</span></a><span data-dcnode-id="3415" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3413" data-purpose="bible-reference" data-reference="Ps 40.16" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252040.16" rel="noopener" target="_blank"><span data-dcnode-id="3414" instrument_node="">40:16</span></a><span data-dcnode-id="3412" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3410" data-purpose="bible-reference" data-reference="Ps 48.11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252048.11" rel="noopener" target="_blank"><span data-dcnode-id="3411" instrument_node="">48:11</span></a><span data-dcnode-id="3409" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3407" data-purpose="bible-reference" data-reference="Ps 58.10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252058.10" rel="noopener" target="_blank"><span data-dcnode-id="3408" instrument_node="">58:10</span></a><span data-dcnode-id="3406" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3404" data-purpose="bible-reference" data-reference="Ps 63.11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252063.11" rel="noopener" target="_blank"><span data-dcnode-id="3405" instrument_node="">63:11</span></a><span data-dcnode-id="3403" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3401" data-purpose="bible-reference" data-reference="Ps 68.3-4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252068.3-4" rel="noopener" target="_blank"><span data-dcnode-id="3402" instrument_node="">68:3-4</span></a><span data-dcnode-id="3400" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3398" data-purpose="bible-reference" data-reference="Ps 70.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252070.4" rel="noopener" target="_blank"><span data-dcnode-id="3399" instrument_node="">70:4</span></a><span data-dcnode-id="3397" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3395" data-purpose="bible-reference" data-reference="Ps 85.6" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252085.6" rel="noopener" target="_blank"><span data-dcnode-id="3396" instrument_node="">85:6</span></a><span data-dcnode-id="3394" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3392" data-purpose="bible-reference" data-reference="Ps 89.15-16" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252089.15-16" rel="noopener" target="_blank"><span data-dcnode-id="3393" instrument_node="">89:15-16</span></a><span data-dcnode-id="3391" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3389" data-purpose="bible-reference" data-reference="Ps 90.14" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252090.14" rel="noopener" target="_blank"><span data-dcnode-id="3390" instrument_node="">90:14</span></a><span data-dcnode-id="3388" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3386" data-purpose="bible-reference" data-reference="Ps 97.1" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252097.1" rel="noopener" target="_blank"><span data-dcnode-id="3387" instrument_node="">97:1</span></a><span data-dcnode-id="3385" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="3383" data-purpose="bible-reference" data-reference="Ps 97.12" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252097.12" rel="noopener" target="_blank"><span data-dcnode-id="3384" instrument_node="">12</span></a><span data-dcnode-id="3382" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3380" data-purpose="bible-reference" data-reference="Ps 98.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252098.4" rel="noopener" target="_blank"><span data-dcnode-id="3381" instrument_node="">98:4</span></a><span data-dcnode-id="3379" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3377" data-purpose="bible-reference" data-reference="Ps 105.3" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%2520105.3" rel="noopener" target="_blank"><span data-dcnode-id="3378" instrument_node="">105:3</span></a><span data-dcnode-id="3376" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3374" data-purpose="bible-reference" data-reference="Ps 118.24" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%2520118.24" rel="noopener" target="_blank"><span data-dcnode-id="3375" instrument_node="">118:24</span></a><span data-dcnode-id="3373" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3371" data-purpose="bible-reference" data-reference="Ps 119.162" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%2520119.162" rel="noopener" target="_blank"><span data-dcnode-id="3372" instrument_node="">119:162</span></a><span data-dcnode-id="3370" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3368" data-purpose="bible-reference" data-reference="Ps 149.2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%2520149.2" rel="noopener" target="_blank"><span data-dcnode-id="3369" instrument_node="">149:2</span></a><span data-dcnode-id="3367" instrument_node="">; etc., etc.).</span></li><span data-dcnode-id="3365" instrument_node="">
</span><li data-dcnode-id="3357"><span data-dcnode-id="3364" instrument_node="">Blessed by God’s Spirit as elsewhere, they are also duties (</span><a class="rtBibleRef" data-dcnode-id="3362" data-purpose="bible-reference" data-reference="Rom 14.17-19" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rom%252014.17-19" rel="noopener" target="_blank"><span data-dcnode-id="3363" instrument_node="">Ro 14:17-19</span></a><span data-dcnode-id="3361" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3359" data-purpose="bible-reference" data-reference="Gal 5.22-23" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Gal%25205.22-23" rel="noopener" target="_blank"><span data-dcnode-id="3360" instrument_node="">Gal 5:22-23</span></a><span data-dcnode-id="3358" instrument_node="">).</span></li><span data-dcnode-id="3356" instrument_node="">
</span><li data-dcnode-id="3318"><span data-dcnode-id="3355" instrument_node="">Happiness and joy are a daily choice – they are truly not the results of circumstances.
</span><ol data-dcnode-id="3320"><span data-dcnode-id="3354" instrument_node="">
</span><li data-dcnode-id="3349"><span data-dcnode-id="3353" instrument_node="">Jesus taught for those persecuted to rejoice and be exceeding glad (</span><a class="rtBibleRef" data-dcnode-id="3351" data-purpose="bible-reference" data-reference="Matt 5.10-12" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Matt%25205.10-12" rel="noopener" target="_blank"><span data-dcnode-id="3352" instrument_node="">Matt 5:10-12</span></a><span data-dcnode-id="3350" instrument_node="">).</span></li><span data-dcnode-id="3348" instrument_node="">

</span><ol data-dcnode-id="3030" style="list-style-type: upper-alpha;"><span data-dcnode-id="3197" instrument_node="">
</span><li data-dcnode-id="3180"><span data-dcnode-id="3196" instrument_node="">Depression is now a common word describing a malady that means a wounded spirit.

</span><li data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">People beg pity for overwhelming circumstances, their excuse for foolish conduct.</span></li><span data-dcnode-id="3192" instrument_node="">
</span><li data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">Books and counseling have exploded in quantity without any real improvement.</span></li><span data-dcnode-id="3189" instrument_node="">
</span><li data-dcnode-id="3184"><span data-dcnode-id="3188" instrument_node="">The human heart will gladly justify ungodly conduct to itself and others (</span><a class="rtBibleRef" data-dcnode-id="3186" data-purpose="bible-reference" data-reference="Jer 17.9" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Jer%252017.9" rel="noopener" target="_blank"><span data-dcnode-id="3187" instrument_node="">Jer 17:9</span></a><span data-dcnode-id="3185" instrument_node="">).</span></li><span data-dcnode-id="3183" instrument_node="">

</span></li><span data-dcnode-id="3179" instrument_node="">
</span><li data-dcnode-id="3175"><strong data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">Depression.</span></strong><span data-dcnode-id="3176" instrument_node=""> A sinking of the spirit; dejection; a state of sadness; want of courage or animation; as depression of the mind. Pressed down, dispirited, dejection of mind. Abnormal state of inactivity and unpleasant emotion. A psychoneurotic or psychotic disorder marked by sadness, inactivity and self-depreciation.”</span></li><span data-dcnode-id="3174" instrument_node="">
</span><li data-dcnode-id="3170"><strong data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">Depression.</span></strong><span data-dcnode-id="3171" instrument_node=""> Moods, feelings, or thoughts of hopelessness which become a person’s excuse to cease from handling life and its problems and avoid serving God fervently.</span></li><span data-dcnode-id="3169" instrument_node="">
</span><li data-dcnode-id="3165"><span data-dcnode-id="3168" instrument_node="">Emotions: </span><em data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">hopelessness, pessimism, apathy, gloom, black, blue, bleak, dejected, forlorn, sensitive, despondent, introverted, indifferent, emotional pain, fearfulness, disgust, confusion, overwhelmed, etc.</span></em></li><span data-dcnode-id="3164" instrument_node="">
</span><li data-dcnode-id="3160"><span data-dcnode-id="3163" instrument_node="">Behaviors: </span><em data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">cries more easily, seldom laughs, moody, signs, eating habits change, critical, frets, distracted, insomnia, withdrawn, suicidal, rejection of comfort, cynicism, hypochondria, detached, unproductive, irritable, etc.</span></em></li><span data-dcnode-id="3159" instrument_node="">
</span><li data-dcnode-id="3155"><span data-dcnode-id="3158" instrument_node="">Physical:</span><em data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node=""> inactive, fatigue, sad facial expression, looks down, ulcers, headaches, etc.</span></em></li><span data-dcnode-id="3154" instrument_node="">
</span><li data-dcnode-id="3149"><span data-dcnode-id="3153" instrument_node="">It is a symptom of these perilous times, with Christians compromising (</span><a class="rtBibleRef" data-dcnode-id="3151" data-purpose="bible-reference" data-reference="2 Tim 3.1-5" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Tim%25203.1-5" rel="noopener" target="_blank"><span data-dcnode-id="3152" instrument_node="">II Tim 3:1-5</span></a><span data-dcnode-id="3150" instrument_node="">).</span></li><span data-dcnode-id="3148" instrument_node="">
</span><li data-dcnode-id="3125"><span data-dcnode-id="3147" instrument_node="">They are lovers of their own selves, indulging themselves in introverted self-worship.
</span><ol data-dcnode-id="3127"><span data-dcnode-id="3146" instrument_node="">
</span><li data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">Self-love and self-esteem produce self-pity, selfishness, self-protection, etc., etc.</span></li><span data-dcnode-id="3143" instrument_node="">
</span><li data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">These byproducts produce envy, jealousy, covetousness, anger, hatred, and so on.</span></li><span data-dcnode-id="3140" instrument_node="">
</span><li data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">The Bible does not indicate an inferiority complex, but rather pride and self-love.</span></li><span data-dcnode-id="3137" instrument_node="">
</span><li data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">Man’s sin nature is a pride/superiority complex, not a humility/inferiority complex.</span></li><span data-dcnode-id="3134" instrument_node="">
</span><li data-dcnode-id="3129"><span data-dcnode-id="3133" instrument_node="">The Bible condemns </span><a data-dcnode-id="3131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letgodbetrue.com/sermons/index/year-2004/lie-of-self-love/"><span data-dcnode-id="3132" instrument_node="">self-love</span></a><span data-dcnode-id="3130" instrument_node="">.</span></li><span data-dcnode-id="3128" instrument_node="">
</span></ol><span data-dcnode-id="3126" instrument_node="">
</span></li><span data-dcnode-id="3124" instrument_node="">
</span><li data-dcnode-id="3104"><span data-dcnode-id="3123" instrument_node="">A person running himself down to you likely has evil but hidden motives to identify.

</span><li data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">He does not truly feel that way about himself, but he knows such talk is acceptable.</span></li><span data-dcnode-id="3119" instrument_node="">
</span><li data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">He is saying it for you to correct him and tell that after all he is really quite special.</span></li><span data-dcnode-id="3116" instrument_node="">
</span><li data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">He resents life for not treating him as well as he believers he deserves to be treated.</span></li><span data-dcnode-id="3113" instrument_node="">
