</span><li data-dcnode-id="1651"><em data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Tiredness</span></em><span data-dcnode-id="1673" instrument_node=""> can be a cause of depression and will steal away happiness, love, zeal, etc.
</span><ol data-dcnode-id="1653"><span data-dcnode-id="1672" instrument_node="">
</span><li data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Sleep deprivation is common for interrogation or torture to break down prisoners.</span></li><span data-dcnode-id="1669" instrument_node="">
</span><li data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Sleep deprivation – snowflakes are different – women may need more, not always.</span></li><span data-dcnode-id="1666" instrument_node="">
</span><li data-dcnode-id="1661"><span data-dcnode-id="1665" instrument_node="">Elijah was apparently tired after his great success on Mount Carmel (</span><a class="rtBibleRef" data-dcnode-id="1663" data-purpose="bible-reference" data-reference="1 Kings 19.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Kings%252019.4" rel="noopener" target="_blank"><span data-dcnode-id="1664" instrument_node="">I Kings 19:4</span></a><span data-dcnode-id="1662" instrument_node="">).</span></li><span data-dcnode-id="1660" instrument_node="">
</span><li data-dcnode-id="1655"><span data-dcnode-id="1659" instrument_node="">David warned against unreasonable care and extending the work day (</span><a class="rtBibleRef" data-dcnode-id="1657" data-purpose="bible-reference" data-reference="Ps 127.1-2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%2520127.1-2" rel="noopener" target="_blank"><span data-dcnode-id="1658" instrument_node="">Ps 127:1-2</span></a><span data-dcnode-id="1656" instrument_node="">).</span></li><span data-dcnode-id="1654" instrument_node="">
</span></ol><span data-dcnode-id="1652" instrument_node="">
</span></li><span data-dcnode-id="1650" instrument_node="">
</span><li data-dcnode-id="1610"><em data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Too much care and responsibility</span></em><span data-dcnode-id="1647" instrument_node=""> will wear the spirit down by dilution of strength.
</span><ol data-dcnode-id="1612"><span data-dcnode-id="1646" instrument_node="">
</span><li data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">The American rat race can affect Christians by driving them beyond wise reason.</span></li><span data-dcnode-id="1643" instrument_node="">
</span><li data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Life is too short to get so busy you cannot fully rest and enjoy life as you should.</span></li><span data-dcnode-id="1640" instrument_node="">
</span><li data-dcnode-id="1629"><span data-dcnode-id="1639" instrument_node="">God wants us to live care-free (</span><a class="rtBibleRef" data-dcnode-id="1637" data-purpose="bible-reference" data-reference="Matt 6.31-34" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Matt%25206.31-34" rel="noopener" target="_blank"><span data-dcnode-id="1638" instrument_node="">Matt 6:31-34</span></a><span data-dcnode-id="1636" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="1634" data-purpose="bible-reference" data-reference="Phil 4.6-7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Phil%25204.6-7" rel="noopener" target="_blank"><span data-dcnode-id="1635" instrument_node="">Phil 4:6-7</span></a><span data-dcnode-id="1633" instrument_node="">), so take mercy (</span><a class="rtBibleRef" data-dcnode-id="1631" data-purpose="bible-reference" data-reference="Prov 11.17" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252011.17" rel="noopener" target="_blank"><span data-dcnode-id="1632" instrument_node="">Pr 11:17</span></a><span data-dcnode-id="1630" instrument_node="">).</span></li><span data-dcnode-id="1628" instrument_node="">
</span><li data-dcnode-id="1623"><span data-dcnode-id="1627" instrument_node="">As Moses in Israel, men sometimes try to do everything themselves (</span><a class="rtBibleRef" data-dcnode-id="1625" data-purpose="bible-reference" data-reference="Exod 18.13-18" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Exod%252018.13-18" rel="noopener" target="_blank"><span data-dcnode-id="1626" instrument_node="">Ex 18:13-18</span></a><span data-dcnode-id="1624" instrument_node="">).</span></li><span data-dcnode-id="1622" instrument_node="">
</span><li data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">This error is (a) being unable to say ‘no’, (b) inability to delegate, (c) thinking yourself indispensable, (d) being responsible for others, (e) always being ‘productive’ and ‘active,’ (f) guilt from doing nothing, and so forth.</span></li><span data-dcnode-id="1619" instrument_node="">
</span><li data-dcnode-id="1614"><span data-dcnode-id="1618" instrument_node="">The cure here, as in many similar situations, was given by David (</span><a class="rtBibleRef" data-dcnode-id="1616" data-purpose="bible-reference" data-reference="Ps 127.1-2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%2520127.1-2" rel="noopener" target="_blank"><span data-dcnode-id="1617" instrument_node="">Psalm 127:1-2</span></a><span data-dcnode-id="1615" instrument_node="">).</span></li><span data-dcnode-id="1613" instrument_node="">
</span></ol><span data-dcnode-id="1611" instrument_node="">
</span></li><span data-dcnode-id="1609" instrument_node="">
</span><li data-dcnode-id="1584"><em data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Finishing a major project</span></em><span data-dcnode-id="1606" instrument_node=""> can lead to a psychological letdown in spirit (</span><a class="rtBibleRef" data-dcnode-id="1604" data-purpose="bible-reference" data-reference="1 Kings 19.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Kings%252019.4" rel="noopener" target="_blank"><span data-dcnode-id="1605" instrument_node="">I Kings 19:4</span></a><span data-dcnode-id="1603" instrument_node="">).
</span><ol data-dcnode-id="1586"><span data-dcnode-id="1602" instrument_node="">
</span><li data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">No one goal should become so important that your spirit and joy depend upon it.</span></li><span data-dcnode-id="1599" instrument_node="">
</span><li data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Every goal you have should be submitted to His providential will in your life.</span></li><span data-dcnode-id="1596" instrument_node="">
</span><li data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">To be forewarned is to be forearmed, so be looking for this natural response to life.</span></li><span data-dcnode-id="1593" instrument_node="">
</span><li data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Marriage seldom satisfies or thrills as dreamed, so be ready to work to make it fun!</span></li><span data-dcnode-id="1590" instrument_node="">
</span><li data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">A job is a job is a job to a great degree; a promotion will bring problems with it.</span></li><span data-dcnode-id="1587" instrument_node="">
</span></ol><span data-dcnode-id="1585" instrument_node="">
</span></li><span data-dcnode-id="1583" instrument_node="">
</span><li data-dcnode-id="1579"><em data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Night shifts</span></em><span data-dcnode-id="1580" instrument_node=""> were made for bats, owls, and raccoons, not men; be wary of the effects.</span></li><span data-dcnode-id="1578" instrument_node="">
</span><li data-dcnode-id="1574"><em data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Second job</span></em><span data-dcnode-id="1575" instrument_node=""> might add income, but it is also a distraction that steals energy and time.</span></li><span data-dcnode-id="1573" instrument_node="">
</span><li data-dcnode-id="1569"><em data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Air conditioning</span></em><span data-dcnode-id="1570" instrument_node=""> is a tremendous invention and should be used to preserve optimism.</span></li><span data-dcnode-id="1568" instrument_node="">

</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="1564" data-fontsize="15.4" data-lineheight="21.56px" style="--fontSize:15.4; line-height: 1.4; --minFontSize:15.4;"><span data-dcnode-id="1565" instrument_node="">Happiness Enemies – Spiritual</span></h3><span data-dcnode-id="1563" instrument_node="">
</span><ol data-dcnode-id="562" style="list-style-type: upper-alpha;"><span data-dcnode-id="1562" instrument_node="">
</span><li data-dcnode-id="1507"><span data-dcnode-id="1561" instrument_node="">There are </span><em data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">evil diseases</span></em><span data-dcnode-id="1558" instrument_node=""> that can and will steal happiness from the person thus infected.

</span><li data-dcnode-id="1532"><span data-dcnode-id="1536" instrument_node="">There is a disease of </span><em data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">too grave and sober</span></em><span data-dcnode-id="1533" instrument_node="">, as if all depends on you like punishment.</span></li><span data-dcnode-id="1531" instrument_node="">

</span><li data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">You can be too active to allow downtime, rest, contemplation, walks, reading, etc.</span></li><span data-dcnode-id="1489" instrument_node="">
</span></ol><span data-dcnode-id="1487" instrument_node="">
</span></li><span data-dcnode-id="1485" instrument_node="">
</span><li data-dcnode-id="1457"><em data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Husbands</span></em><span data-dcnode-id="1482" instrument_node=""> forgetting the proper use of their authority and role can destroy happiness.

</span><li data-dcnode-id="1476"><span data-dcnode-id="1480" instrument_node="">A husband that overlooks his wife’s heart or needs is a great oppressor (</span><a class="rtBibleRef" data-dcnode-id="1478" data-purpose="bible-reference" data-reference="Prov 28.16" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252028.16" rel="noopener" target="_blank"><span data-dcnode-id="1479" instrument_node="">Pr 28:16</span></a><span data-dcnode-id="1477" instrument_node="">).</span></li><span data-dcnode-id="1475" instrument_node="">
</span><li data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">You are not a leader or manager because you make all decisions by your feelings.</span></li><span data-dcnode-id="1472" instrument_node="">

</span><li data-dcnode-id="1464"><span data-dcnode-id="1468" instrument_node="">There is delicate treatment of those under your authority that works (</span><a class="rtBibleRef" data-dcnode-id="1466" data-purpose="bible-reference" data-reference="Prov 29.21" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252029.21" rel="noopener" target="_blank"><span data-dcnode-id="1467" instrument_node="">Prov 29:21</span></a><span data-dcnode-id="1465" instrument_node="">).</span></li><span data-dcnode-id="1463" instrument_node="">
</span><li data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">By this cruel and oppressive conduct, a husband loses the full response of his wife.</span></li><span data-dcnode-id="1460" instrument_node="">

</span></li><span data-dcnode-id="1456" instrument_node="">

</span><li data-dcnode-id="1444"><span data-dcnode-id="1451" instrument_node="">An odious wife can drive a man to think living in the attic is good (</span><a class="rtBibleRef" data-dcnode-id="1449" data-purpose="bible-reference" data-reference="Prov 21.9" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252021.9" rel="noopener" target="_blank"><span data-dcnode-id="1450" instrument_node="">Pr 21:9</span></a><span data-dcnode-id="1448" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="1446" data-purpose="bible-reference" data-reference="Pr 25.24" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Pr%252025.24" rel="noopener" target="_blank"><span data-dcnode-id="1447" instrument_node="">25:24</span></a><span data-dcnode-id="1445" instrument_node="">).</span></li><span data-dcnode-id="1443" instrument_node="">
</span><li data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">A cheerleader can drive a man to accomplish things and enjoy life at a high level.</span></li><span data-dcnode-id="1440" instrument_node="">

</span><li data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">It hardly matters what she may look like, because an ugly cheerleader is far better.</span></li><span data-dcnode-id="1434" instrument_node="">
</span><li data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">By this lazy, proud, and selfish conduct, a wife loses the full love of her husband.</span></li><span data-dcnode-id="1431" instrument_node="">

</span><li data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">Any variation of God’s plan for a family, no matter your thoughts, is joy suicide.</span></li><span data-dcnode-id="1417" instrument_node="">
</span><li data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Either the wife or husband (worse) doting on children over spouse is terrible; you were not created to be a parent; your chief and prime relationship is your marriage.</span></li><span data-dcnode-id="1414" instrument_node="">

</span><li data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">All relationships, especially the family now, should carefully keep God’s order.</span></li><span data-dcnode-id="1405" instrument_node="">

</span><li data-dcnode-id="1380"><span data-dcnode-id="1387" instrument_node="">Living wickedly or among the wicked will vex your spirit (</span><a class="rtBibleRef" data-dcnode-id="1385" data-purpose="bible-reference" data-reference="2 Pet 2.8" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Pet%25202.8" rel="noopener" target="_blank"><span data-dcnode-id="1386" instrument_node="">II Pet 2:8</span></a><span data-dcnode-id="1384" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="1382" data-purpose="bible-reference" data-reference="Ps 119.158" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%2520119.158" rel="noopener" target="_blank"><span data-dcnode-id="1383" instrument_node="">Ps 119:158</span></a><span data-dcnode-id="1381" instrument_node="">).</span></li><span data-dcnode-id="1379" instrument_node="">
</span><li data-dcnode-id="1374"><span data-dcnode-id="1378" instrument_node="">Get the truth clear – God forgives faster, fuller, and freer than you ever (</span><a class="rtBibleRef" data-dcnode-id="1376" data-purpose="bible-reference" data-reference="Isa 55.8-9" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Isa%252055.8-9" rel="noopener" target="_blank"><span data-dcnode-id="1377" instrument_node="">Is 55:8-9</span></a><span data-dcnode-id="1375" instrument_node="">).</span></li><span data-dcnode-id="1373" instrument_node="">
</span><li data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">He knows you are a loser, and He saved and adopted you because you are a loser.</span></li><span data-dcnode-id="1370" instrument_node="">
</span><li data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Most guilt is not self-examination, but questioning His integrity or Christ’s death.</span></li><span data-dcnode-id="1367" instrument_node="">

</span><li data-dcnode-id="1356"><span data-dcnode-id="1360" instrument_node="">You must have faith without real doubts in all your conduct (</span><a class="rtBibleRef" data-dcnode-id="1358" data-purpose="bible-reference" data-reference="Rom 14.22-23" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rom%252014.22-23" rel="noopener" target="_blank"><span data-dcnode-id="1359" instrument_node="">Romans 14:22-23</span></a><span data-dcnode-id="1357" instrument_node="">).</span></li><span data-dcnode-id="1355" instrument_node="">
</span><li data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">A grieved or quenched Holy Spirit cannot and will not help with joy and peace.</span></li><span data-dcnode-id="1352" instrument_node="">
</span><li data-dcnode-id="1344"><span data-dcnode-id="1351" instrument_node="">Too much sorrow is wrong; God forgives quickly in Christ (</span><a class="rtBibleRef" data-dcnode-id="1349" data-purpose="bible-reference" data-reference="2 Cor 2.7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Cor%25202.7" rel="noopener" target="_blank"><span data-dcnode-id="1350" instrument_node="">II Co 2:7</span></a><span data-dcnode-id="1348" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="1346" data-purpose="bible-reference" data-reference="2 Sam 12.13" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Sam%252012.13" rel="noopener" target="_blank"><span data-dcnode-id="1347" instrument_node="">II Sa 12:13</span></a><span data-dcnode-id="1345" instrument_node="">).</span></li><span data-dcnode-id="1343" instrument_node="">

</span></ol><span data-dcnode-id="1338" instrument_node="">

</span><li data-dcnode-id="1296"><em data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Worry</span></em><span data-dcnode-id="1333" instrument_node=""> about things in your life is destructive to peace and happiness that God offers.

</span><li data-dcnode-id="1327"><span data-dcnode-id="1331" instrument_node="">Your best efforts are vanity without His blessing; stop trying so hard (</span><a class="rtBibleRef" data-dcnode-id="1329" data-purpose="bible-reference" data-reference="Ps 127.1-2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%2520127.1-2" rel="noopener" target="_blank"><span data-dcnode-id="1330" instrument_node="">Ps 127:1-2</span></a><span data-dcnode-id="1328" instrument_node="">).</span></li><span data-dcnode-id="1326" instrument_node="">
</span><li data-dcnode-id="1318"><span data-dcnode-id="1325" instrument_node="">Turn things over to Him for perfect peace; He cares for you (</span><a class="rtBibleRef" data-dcnode-id="1323" data-purpose="bible-reference" data-reference="Phil 4.6-7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Phil%25204.6-7" rel="noopener" target="_blank"><span data-dcnode-id="1324" instrument_node="">Phil 4:6-7</span></a><span data-dcnode-id="1322" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="1320" data-purpose="bible-reference" data-reference="1 Pet 5.7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Pet%25205.7" rel="noopener" target="_blank"><span data-dcnode-id="1321" instrument_node="">I Pet 5:7</span></a><span data-dcnode-id="1319" instrument_node="">).</span></li><span data-dcnode-id="1317" instrument_node="">
</span><li data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">You cannot save children from everything; be careful, or He will prove you wrong.</span></li><span data-dcnode-id="1314" instrument_node="">
</span><li data-dcnode-id="1309"><span data-dcnode-id="1313" instrument_node="">Peace, essential to contented happiness, must trust Jehovah at all times (</span><a class="rtBibleRef" data-dcnode-id="1311" data-purpose="bible-reference" data-reference="Isa 26.3-4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Isa%252026.3-4" rel="noopener" target="_blank"><span data-dcnode-id="1312" instrument_node="">Is 26:3-4</span></a><span data-dcnode-id="1310" instrument_node="">).</span></li><span data-dcnode-id="1308" instrument_node="">
</span><li data-dcnode-id="1303"><span data-dcnode-id="1307" instrument_node="">Civil injustice and political intrigue has always existed, but God rules (</span><a class="rtBibleRef" data-dcnode-id="1305" data-purpose="bible-reference" data-reference="Eccles 5.8" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25205.8" rel="noopener" target="_blank"><span data-dcnode-id="1306" instrument_node="">Eccl 5:8</span></a><span data-dcnode-id="1304" instrument_node="">).</span></li><span data-dcnode-id="1302" instrument_node="">
</span><li data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Worry has never altered or improved anything, but it will alter and destroy you.</span></li><span data-dcnode-id="1299" instrument_node="">

</span></li><span data-dcnode-id="1295" instrument_node="">
</span><li data-dcnode-id="1267"><em data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Selfishness</span></em><span data-dcnode-id="1292" instrument_node=""> is a lying fraud, in that trying to save your life for you will cost happiness.
</span><ol data-dcnode-id="1269"><span data-dcnode-id="1291" instrument_node="">
</span><li data-dcnode-id="1286"><span data-dcnode-id="1290" instrument_node="">If giving is more blessed than receiving, focusing on you steals joy (</span><a class="rtBibleRef" data-dcnode-id="1288" data-purpose="bible-reference" data-reference="Acts 20.35" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252020.35" rel="noopener" target="_blank"><span data-dcnode-id="1289" instrument_node="">Acts 20:35</span></a><span data-dcnode-id="1287" instrument_node="">).</span></li><span data-dcnode-id="1285" instrument_node="">
</span><li data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Jesus taught plainly that those who lose their lives for Him will find their lives.</span></li><span data-dcnode-id="1282" instrument_node="">
</span><li data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">The more you keep to yourself and do not get involved, you get ingrown insanity.</span></li><span data-dcnode-id="1279" instrument_node="">
</span><li data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">It is as plain as the noonday sun, those who serve others the most are the happiest.</span></li><span data-dcnode-id="1276" instrument_node="">
</span><li data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Those in love with themselves think too much about themselves into self-pity.</span></li><span data-dcnode-id="1273" instrument_node="">
