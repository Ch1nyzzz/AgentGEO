</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="4811" data-fontsize="15.4" data-lineheight="21.56px" style="--fontSize:15.4; line-height: 1.4; --minFontSize:15.4;"><span data-dcnode-id="4812" instrument_node="">God Wants You Happy</span></h3><span data-dcnode-id="4810" instrument_node="">
</span><ol data-dcnode-id="4248" style="list-style-type: upper-alpha;"><span data-dcnode-id="4809" instrument_node="">
</span><li data-dcnode-id="4793"><span data-dcnode-id="4808" instrument_node="">Have we focused too much on dreading God? The balance is there, if you will listen.
</span><ol data-dcnode-id="4795"><span data-dcnode-id="4807" instrument_node="">
</span><li data-dcnode-id="4805"><span data-dcnode-id="4806" instrument_node="">My sober mandate from God’s word is His balance, not what you think is balance.</span></li><span data-dcnode-id="4804" instrument_node="">
</span><li data-dcnode-id="4802"><span data-dcnode-id="4803" instrument_node="">Recall Delighting in God, Knowing God, He Is Altogether Lovely, Unsearchable Riches, etc.</span></li><span data-dcnode-id="4801" instrument_node="">
</span><li data-dcnode-id="4797"><span data-dcnode-id="4800" instrument_node="">Review the recent PowerPoint sermon . . .&nbsp; </span><a data-dcnode-id="4798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letgodbetrue.com/sermons/index/year-2012/god-distortions/"><span data-dcnode-id="4799" instrument_node="">God Distortions.</span></a></li><span data-dcnode-id="4796" instrument_node="">
</span></ol><span data-dcnode-id="4794" instrument_node="">
</span></li><span data-dcnode-id="4792" instrument_node="">
</span><li data-dcnode-id="4772"><span data-dcnode-id="4791" instrument_node="">God’s goodness and desire for human happiness even extends to wicked reprobates.
</span><ol data-dcnode-id="4774"><span data-dcnode-id="4790" instrument_node="">
</span><li data-dcnode-id="4785"><span data-dcnode-id="4789" instrument_node="">He fills their evil hearts with food and gladness to show His goodness (</span><a class="rtBibleRef" data-dcnode-id="4787" data-purpose="bible-reference" data-reference="Acts 14.17" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252014.17" rel="noopener" target="_blank"><span data-dcnode-id="4788" instrument_node="">Ac 14:17</span></a><span data-dcnode-id="4786" instrument_node="">).</span></li><span data-dcnode-id="4784" instrument_node="">
</span><li data-dcnode-id="4779"><span data-dcnode-id="4783" instrument_node="">The sunshine and rain necessary is His natural benevolence to enemies (</span><a class="rtBibleRef" data-dcnode-id="4781" data-purpose="bible-reference" data-reference="Matt 5.45" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Matt%25205.45" rel="noopener" target="_blank"><span data-dcnode-id="4782" instrument_node="">Matt 5:45</span></a><span data-dcnode-id="4780" instrument_node="">).</span></li><span data-dcnode-id="4778" instrument_node="">
</span><li data-dcnode-id="4776"><span data-dcnode-id="4777" instrument_node="">His creation thrills … sunrise, hummingbirds, sex, aptitudes, friends, taste buds, music, seasons, speech, flowers, skin, water, lions, food, laughter, alcohol, etc.</span></li><span data-dcnode-id="4775" instrument_node="">
</span></ol><span data-dcnode-id="4773" instrument_node="">
</span></li><span data-dcnode-id="4771" instrument_node="">
</span><li data-dcnode-id="4739"><span data-dcnode-id="4770" instrument_node="">Life is a gift … not a curse … yes, we messed it up … but He has adopted us children.
</span><ol data-dcnode-id="4741"><span data-dcnode-id="4769" instrument_node="">
</span><li data-dcnode-id="4761"><span data-dcnode-id="4768" instrument_node="">He made everything very good (</span><a class="rtBibleRef" data-dcnode-id="4766" data-purpose="bible-reference" data-reference="Gen 1.31" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Gen%25201.31" rel="noopener" target="_blank"><span data-dcnode-id="4767" instrument_node="">Gen 1:31</span></a><span data-dcnode-id="4765" instrument_node="">), but we sought out inventions (</span><a class="rtBibleRef" data-dcnode-id="4763" data-purpose="bible-reference" data-reference="Eccles 7.29" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25207.29" rel="noopener" target="_blank"><span data-dcnode-id="4764" instrument_node="">Ec 7:29</span></a><span data-dcnode-id="4762" instrument_node="">).</span></li><span data-dcnode-id="4760" instrument_node="">
</span><li data-dcnode-id="4758"><span data-dcnode-id="4759" instrument_node="">Even a natural man damned to hell can prosper in life following a Bible lifestyle.</span></li><span data-dcnode-id="4757" instrument_node="">
</span><li data-dcnode-id="4755"><span data-dcnode-id="4756" instrument_node="">Of course, the key thought only applies to God’s elect children chosen for heaven.</span></li><span data-dcnode-id="4754" instrument_node="">
</span><li data-dcnode-id="4752"><span data-dcnode-id="4753" instrument_node="">He not only gave you natural life, but He also gave you spiritual life to enjoy Him.</span></li><span data-dcnode-id="4751" instrument_node="">
</span><li data-dcnode-id="4749"><span data-dcnode-id="4750" instrument_node="">Not only does He give you a new spirit, but also His Spirit, and all objects for joy.</span></li><span data-dcnode-id="4748" instrument_node="">
</span><li data-dcnode-id="4743"><span data-dcnode-id="4747" instrument_node="">God has a full benefit package for good men to cry out in praise (</span><a class="rtBibleRef" data-dcnode-id="4745" data-purpose="bible-reference" data-reference="Ps 103.1-18" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%2520103.1-18" rel="noopener" target="_blank"><span data-dcnode-id="4746" instrument_node="">Psalm 103:1-18</span></a><span data-dcnode-id="4744" instrument_node="">).</span></li><span data-dcnode-id="4742" instrument_node="">
</span></ol><span data-dcnode-id="4740" instrument_node="">
</span></li><span data-dcnode-id="4738" instrument_node="">
</span><li data-dcnode-id="4691"><span data-dcnode-id="4737" instrument_node="">The Bible has passages that deal directly with the issue of how to be happy on earth.
</span><ol data-dcnode-id="4693"><span data-dcnode-id="4736" instrument_node="">
</span><li data-dcnode-id="4728"><span data-dcnode-id="4735" instrument_node="">Peter quoted David for rules leading to a good life (</span><a class="rtBibleRef" data-dcnode-id="4733" data-purpose="bible-reference" data-reference="Ps 34.10-16" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252034.10-16" rel="noopener" target="_blank"><span data-dcnode-id="4734" instrument_node="">Psalm 34:10-16</span></a><span data-dcnode-id="4732" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4730" data-purpose="bible-reference" data-reference="1 Pet 3.10-12" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Pet%25203.10-12" rel="noopener" target="_blank"><span data-dcnode-id="4731" instrument_node="">I Pet 3:10-12</span></a><span data-dcnode-id="4729" instrument_node="">).</span></li><span data-dcnode-id="4727" instrument_node="">
</span><li data-dcnode-id="4725"><span data-dcnode-id="4726" instrument_node="">Ecclesiastes is 1/66 of the Bible … divinely inspired … with research for profit.</span></li><span data-dcnode-id="4724" instrument_node="">
</span><li data-dcnode-id="4713"><span data-dcnode-id="4723" instrument_node="">God prepared and charged Solomon to find happiness (</span><a class="rtBibleRef" data-dcnode-id="4721" data-purpose="bible-reference" data-reference="Eccles 2.24" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25202.24" rel="noopener" target="_blank"><span data-dcnode-id="4722" instrument_node="">Eccl 2:24</span></a><span data-dcnode-id="4720" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4718" data-purpose="bible-reference" data-reference="Eccl 3.13" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccl%25203.13" rel="noopener" target="_blank"><span data-dcnode-id="4719" instrument_node="">3:13</span></a><span data-dcnode-id="4717" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4715" data-purpose="bible-reference" data-reference="Eccl 5.19" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccl%25205.19" rel="noopener" target="_blank"><span data-dcnode-id="4716" instrument_node="">5:19</span></a><span data-dcnode-id="4714" instrument_node="">; etc.).</span></li><span data-dcnode-id="4712" instrument_node="">
</span><li data-dcnode-id="4707"><span data-dcnode-id="4711" instrument_node="">God gives both the assets or benefits … and the ability to enjoy them (</span><a class="rtBibleRef" data-dcnode-id="4709" data-purpose="bible-reference" data-reference="Eccles 5.18-20" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25205.18-20" rel="noopener" target="_blank"><span data-dcnode-id="4710" instrument_node="">Ec 5:18-20</span></a><span data-dcnode-id="4708" instrument_node="">).</span></li><span data-dcnode-id="4706" instrument_node="">
</span><li data-dcnode-id="4701"><span data-dcnode-id="4705" instrument_node="">Solomon carefully identified what things in life to pursue for pleasure (</span><a class="rtBibleRef" data-dcnode-id="4703" data-purpose="bible-reference" data-reference="Eccles 9.6-10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25209.6-10" rel="noopener" target="_blank"><span data-dcnode-id="4704" instrument_node="">Ec 9:6-10</span></a><span data-dcnode-id="4702" instrument_node="">).</span></li><span data-dcnode-id="4700" instrument_node="">
</span><li data-dcnode-id="4698"><span data-dcnode-id="4699" instrument_node="">Heathen gods demanded your sons in sacrifice, but our God gave His only Son.</span></li><span data-dcnode-id="4697" instrument_node="">
</span><li data-dcnode-id="4695"><span data-dcnode-id="4696" instrument_node="">Heathen gods took meat and drink offerings, but our God tells us to enjoy them.</span></li><span data-dcnode-id="4694" instrument_node="">
</span></ol><span data-dcnode-id="4692" instrument_node="">
</span></li><span data-dcnode-id="4690" instrument_node="">
</span><li data-dcnode-id="4655"><span data-dcnode-id="4689" instrument_node="">Why did God create Eve? Reproduction? RCC heresy! For companionship (</span><a class="rtBibleRef" data-dcnode-id="4687" data-purpose="bible-reference" data-reference="Gen 2.18" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Gen%25202.18" rel="noopener" target="_blank"><span data-dcnode-id="4688" instrument_node="">Ge 2:18</span></a><span data-dcnode-id="4686" instrument_node="">)!
</span><ol data-dcnode-id="4657"><span data-dcnode-id="4685" instrument_node="">
</span><li data-dcnode-id="4683"><span data-dcnode-id="4684" instrument_node="">Life with God is not usually good enough; this is not carnal, evil, sinful thinking.</span></li><span data-dcnode-id="4682" instrument_node="">
</span><li data-dcnode-id="4680"><span data-dcnode-id="4681" instrument_node="">Marriage sermons directly contribute to this topic, and it contributes to marriage.</span></li><span data-dcnode-id="4679" instrument_node="">
</span><li data-dcnode-id="4677"><span data-dcnode-id="4678" instrument_node="">Solomon’s Song is filled with euphoric gladness, happiness, or joy in marital love.</span></li><span data-dcnode-id="4676" instrument_node="">
</span><li data-dcnode-id="4671"><span data-dcnode-id="4675" instrument_node="">The gifts of love, marriage, and sex are a portion from God on earth (</span><a class="rtBibleRef" data-dcnode-id="4673" data-purpose="bible-reference" data-reference="Eccles 9.9" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25209.9" rel="noopener" target="_blank"><span data-dcnode-id="4674" instrument_node="">Eccl 9:9</span></a><span data-dcnode-id="4672" instrument_node="">).</span></li><span data-dcnode-id="4670" instrument_node="">
</span><li data-dcnode-id="4668"><span data-dcnode-id="4669" instrument_node="">Who will argue against orgasms? Are you ashamed? God gave them for pleasure.</span></li><span data-dcnode-id="4667" instrument_node="">
</span><li data-dcnode-id="4662"><span data-dcnode-id="4666" instrument_node="">Consider here how God Himself gave the kind rule to cheer up wives (</span><a class="rtBibleRef" data-dcnode-id="4664" data-purpose="bible-reference" data-reference="Deut 24.5" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Deut%252024.5" rel="noopener" target="_blank"><span data-dcnode-id="4665" instrument_node="">Deut 24:5</span></a><span data-dcnode-id="4663" instrument_node="">).</span></li><span data-dcnode-id="4661" instrument_node="">
</span><li data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">Here is a hint for happiness … regain first love with God and your spouse … wow!</span></li><span data-dcnode-id="4658" instrument_node="">
</span></ol><span data-dcnode-id="4656" instrument_node="">
</span></li><span data-dcnode-id="4654" instrument_node="">
</span><li data-dcnode-id="4601"><span data-dcnode-id="4653" instrument_node="">God gave wisdom for great human joy (</span><a class="rtBibleRef" data-dcnode-id="4651" data-purpose="bible-reference" data-reference="Prov 8.30-36" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%25208.30-36" rel="noopener" target="_blank"><span data-dcnode-id="4652" instrument_node="">Prov 8:30-36</span></a><span data-dcnode-id="4650" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4648" data-purpose="bible-reference" data-reference="Prov 3.13" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%25203.13" rel="noopener" target="_blank"><span data-dcnode-id="4649" instrument_node="">3:13</span></a><span data-dcnode-id="4647" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="4645" data-purpose="bible-reference" data-reference="Prov 3.18" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%25203.18" rel="noopener" target="_blank"><span data-dcnode-id="4646" instrument_node="">18</span></a><span data-dcnode-id="4644" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4642" data-purpose="bible-reference" data-reference="Prov 16.20" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252016.20" rel="noopener" target="_blank"><span data-dcnode-id="4643" instrument_node="">16:20</span></a><span data-dcnode-id="4641" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4639" data-purpose="bible-reference" data-reference="Prov 28.14" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252028.14" rel="noopener" target="_blank"><span data-dcnode-id="4640" instrument_node="">28:14</span></a><span data-dcnode-id="4638" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4636" data-purpose="bible-reference" data-reference="Prov 29.18" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252029.18" rel="noopener" target="_blank"><span data-dcnode-id="4637" instrument_node="">29:18</span></a><span data-dcnode-id="4635" instrument_node="">).
</span><ol data-dcnode-id="4603"><span data-dcnode-id="4634" instrument_node="">
</span><li data-dcnode-id="4632"><span data-dcnode-id="4633" instrument_node="">The book of Proverbs is to teach practical wisdom for a prosperous, successful life.</span></li><span data-dcnode-id="4631" instrument_node="">
</span><li data-dcnode-id="4620"><span data-dcnode-id="4630" instrument_node="">Solving a problem or answering a question is thrilling (</span><a class="rtBibleRef" data-dcnode-id="4628" data-purpose="bible-reference" data-reference="Prov 15.23" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252015.23" rel="noopener" target="_blank"><span data-dcnode-id="4629" instrument_node="">Prov 15:23</span></a><span data-dcnode-id="4627" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4625" data-purpose="bible-reference" data-reference="Prov 16.20" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252016.20" rel="noopener" target="_blank"><span data-dcnode-id="4626" instrument_node="">16:20</span></a><span data-dcnode-id="4624" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4622" data-purpose="bible-reference" data-reference="Prov 24.26" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252024.26" rel="noopener" target="_blank"><span data-dcnode-id="4623" instrument_node="">24:26</span></a><span data-dcnode-id="4621" instrument_node="">).</span></li><span data-dcnode-id="4619" instrument_node="">
</span><li data-dcnode-id="4617"><span data-dcnode-id="4618" instrument_node="">Confusion, dilemmas, fear, ignorance, inefficiency, oppression, etc. all steal joy.</span></li><span data-dcnode-id="4616" instrument_node="">
</span><li data-dcnode-id="4605"><span data-dcnode-id="4615" instrument_node="">The perfect book for life and eternity brings joy (</span><a class="rtBibleRef" data-dcnode-id="4613" data-purpose="bible-reference" data-reference="Jer 15.16" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Jer%252015.16" rel="noopener" target="_blank"><span data-dcnode-id="4614" instrument_node="">Jer 15:16</span></a><span data-dcnode-id="4612" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4610" data-purpose="bible-reference" data-reference="Ps 19.10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252019.10" rel="noopener" target="_blank"><span data-dcnode-id="4611" instrument_node="">Ps 19:10</span></a><span data-dcnode-id="4609" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4607" data-purpose="bible-reference" data-reference="Ps 119.111" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%2520119.111" rel="noopener" target="_blank"><span data-dcnode-id="4608" instrument_node="">119:111</span></a><span data-dcnode-id="4606" instrument_node="">).</span></li><span data-dcnode-id="4604" instrument_node="">
</span></ol><span data-dcnode-id="4602" instrument_node="">
</span></li><span data-dcnode-id="4600" instrument_node="">
</span><li data-dcnode-id="4568"><span data-dcnode-id="4599" instrument_node="">God delights in mercy and requires it of those that are His children (</span><a class="rtBibleRef" data-dcnode-id="4597" data-purpose="bible-reference" data-reference="Micah 7.18" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Micah%25207.18" rel="noopener" target="_blank"><span data-dcnode-id="4598" instrument_node="">Micah 7:18</span></a><span data-dcnode-id="4596" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4594" data-purpose="bible-reference" data-reference="Micah 6.8" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Micah%25206.8" rel="noopener" target="_blank"><span data-dcnode-id="4595" instrument_node="">6:8</span></a><span data-dcnode-id="4593" instrument_node="">).
</span><ol data-dcnode-id="4570"><span data-dcnode-id="4592" instrument_node="">
</span><li data-dcnode-id="4587"><span data-dcnode-id="4591" instrument_node="">He taught mercy over sacrifice or self-denial for your joy and pleasure (</span><a class="rtBibleRef" data-dcnode-id="4589" data-purpose="bible-reference" data-reference="Matt 12.7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Matt%252012.7" rel="noopener" target="_blank"><span data-dcnode-id="4590" instrument_node="">Matt 12:7</span></a><span data-dcnode-id="4588" instrument_node="">).</span></li><span data-dcnode-id="4586" instrument_node="">
</span><li data-dcnode-id="4581"><span data-dcnode-id="4585" instrument_node="">He taught intent over sacrifice or self-denial for your joy and pleasure (</span><a class="rtBibleRef" data-dcnode-id="4583" data-purpose="bible-reference" data-reference="Mark 2.27" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Mark%25202.27" rel="noopener" target="_blank"><span data-dcnode-id="4584" instrument_node="">Mark 2:27</span></a><span data-dcnode-id="4582" instrument_node="">).</span></li><span data-dcnode-id="4580" instrument_node="">
</span><li data-dcnode-id="4575"><span data-dcnode-id="4579" instrument_node="">He taught His children they should apply this principle to themselves (</span><a class="rtBibleRef" data-dcnode-id="4577" data-purpose="bible-reference" data-reference="Prov 11.17" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252011.17" rel="noopener" target="_blank"><span data-dcnode-id="4578" instrument_node="">Prov 11:17</span></a><span data-dcnode-id="4576" instrument_node="">).</span></li><span data-dcnode-id="4574" instrument_node="">
</span><li data-dcnode-id="4572"><span data-dcnode-id="4573" instrument_node="">Workaholics and worrywarts have not learned the God of the Bible and His will.</span></li><span data-dcnode-id="4571" instrument_node="">
</span></ol><span data-dcnode-id="4569" instrument_node="">
</span></li><span data-dcnode-id="4567" instrument_node="">
</span><li data-dcnode-id="4535"><span data-dcnode-id="4566" instrument_node="">A church with the Holy Ghost, like Jerusalem at Pentecost, is very happy (</span><a class="rtBibleRef" data-dcnode-id="4564" data-purpose="bible-reference" data-reference="Acts 2.46" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%25202.46" rel="noopener" target="_blank"><span data-dcnode-id="4565" instrument_node="">Acts 2:46</span></a><span data-dcnode-id="4563" instrument_node="">).
</span><ol data-dcnode-id="4537"><span data-dcnode-id="4562" instrument_node="">
</span><li data-dcnode-id="4545"><span data-dcnode-id="4561" instrument_node="">Where the gospel went, there was joy sure to follow (</span><a class="rtBibleRef" data-dcnode-id="4559" data-purpose="bible-reference" data-reference="Acts 8.8" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%25208.8" rel="noopener" target="_blank"><span data-dcnode-id="4560" instrument_node="">Acts 8:8</span></a><span data-dcnode-id="4558" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4556" data-purpose="bible-reference" data-reference="Acts 13.48" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252013.48" rel="noopener" target="_blank"><span data-dcnode-id="4557" instrument_node="">13:48</span></a><span data-dcnode-id="4555" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="4553" data-purpose="bible-reference" data-reference="Acts 13.52" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252013.52" rel="noopener" target="_blank"><span data-dcnode-id="4554" instrument_node="">52</span></a><span data-dcnode-id="4552" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4550" data-purpose="bible-reference" data-reference="Acts 15.3" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252015.3" rel="noopener" target="_blank"><span data-dcnode-id="4551" instrument_node="">15:3</span></a><span data-dcnode-id="4549" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="4547" data-purpose="bible-reference" data-reference="Acts 15.31" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252015.31" rel="noopener" target="_blank"><span data-dcnode-id="4548" instrument_node="">31</span></a><span data-dcnode-id="4546" instrument_node="">).</span></li><span data-dcnode-id="4544" instrument_node="">
</span><li data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">If you are not joyful in a church, it is entirely your fault, for not taking advantage.</span></li><span data-dcnode-id="4541" instrument_node="">
</span><li data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">There is no society with greater cause, friends, purpose, and celebration than this!</span></li><span data-dcnode-id="4538" instrument_node="">
</span></ol><span data-dcnode-id="4536" instrument_node="">
</span></li><span data-dcnode-id="4534" instrument_node="">
</span><li data-dcnode-id="4499"><span data-dcnode-id="4533" instrument_node="">The O.T. had all kind of celebrations, but we have much more to celebrate than them.
</span><ol data-dcnode-id="4501"><span data-dcnode-id="4532" instrument_node="">
</span><li data-dcnode-id="4530"><span data-dcnode-id="4531" instrument_node="">Think holidays, Jubilee, dances, Sabbaths, tithes, Canaan with everything ready!</span></li><span data-dcnode-id="4529" instrument_node="">
</span><li data-dcnode-id="4524"><span data-dcnode-id="4528" instrument_node="">What more could have been done for His OT vineyard (</span><a class="rtBibleRef" data-dcnode-id="4526" data-purpose="bible-reference" data-reference="Isa 5.1-7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Isa%25205.1-7" rel="noopener" target="_blank"><span data-dcnode-id="4527" instrument_node="">Is 5:1-7</span></a><span data-dcnode-id="4525" instrument_node="">)? Your NT place!</span></li><span data-dcnode-id="4523" instrument_node="">
</span><li data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">Think Jesus, adoption, regeneration, Holy Spirit, end of Law, Gentiles, knowledge!</span></li><span data-dcnode-id="4520" instrument_node="">
</span><li data-dcnode-id="4515"><span data-dcnode-id="4519" instrument_node="">There is nothing in the O.T. to compare with the gift of Jesus Christ (</span><a class="rtBibleRef" data-dcnode-id="4517" data-purpose="bible-reference" data-reference="Luke 2.10-11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Luke%25202.10-11" rel="noopener" target="_blank"><span data-dcnode-id="4518" instrument_node="">Lu 2:10-11</span></a><span data-dcnode-id="4516" instrument_node="">).</span></li><span data-dcnode-id="4514" instrument_node="">
</span><li data-dcnode-id="4509"><span data-dcnode-id="4513" instrument_node="">John wrote an epistle to help you have fellowship with God and full joy (</span><a class="rtBibleRef" data-dcnode-id="4511" data-purpose="bible-reference" data-reference="1 John 1.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520John%25201.4" rel="noopener" target="_blank"><span data-dcnode-id="4512" instrument_node="">I Jn 1:4</span></a><span data-dcnode-id="4510" instrument_node="">).</span></li><span data-dcnode-id="4508" instrument_node="">
</span><li data-dcnode-id="4503"><span data-dcnode-id="4507" instrument_node="">The same apostle desired that Gaius would prosper and be in health (</span><a class="rtBibleRef" data-dcnode-id="4505" data-purpose="bible-reference" data-reference="3 John 1.2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/3%2520John%25201.2" rel="noopener" target="_blank"><span data-dcnode-id="4506" instrument_node="">III John 1:2</span></a><span data-dcnode-id="4504" instrument_node="">).</span></li><span data-dcnode-id="4502" instrument_node="">
</span></ol><span data-dcnode-id="4500" instrument_node="">
</span></li><span data-dcnode-id="4498" instrument_node="">
</span><li data-dcnode-id="4457"><span data-dcnode-id="4497" instrument_node="">Our present standing in Christ with the Holy Spirit is joyful (</span><a class="rtBibleRef" data-dcnode-id="4495" data-purpose="bible-reference" data-reference="Rom 5.1-2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rom%25205.1-2" rel="noopener" target="_blank"><span data-dcnode-id="4496" instrument_node="">Rom 5:1-2</span></a><span data-dcnode-id="4494" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4492" data-purpose="bible-reference" data-reference="1 Pet 1.8" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Pet%25201.8" rel="noopener" target="_blank"><span data-dcnode-id="4493" instrument_node="">I Peter 1:8</span></a><span data-dcnode-id="4491" instrument_node="">).
</span><ol data-dcnode-id="4459"><span data-dcnode-id="4490" instrument_node="">
</span><li data-dcnode-id="4482"><span data-dcnode-id="4489" instrument_node="">He has given you the Holy Spirit, the divine Person for joy (</span><a class="rtBibleRef" data-dcnode-id="4487" data-purpose="bible-reference" data-reference="Gal 5.22" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Gal%25205.22" rel="noopener" target="_blank"><span data-dcnode-id="4488" instrument_node="">Gal 5:22</span></a><span data-dcnode-id="4486" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4484" data-purpose="bible-reference" data-reference="Rom 15.13" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rom%252015.13" rel="noopener" target="_blank"><span data-dcnode-id="4485" instrument_node="">Rom 15:13</span></a><span data-dcnode-id="4483" instrument_node="">).</span></li><span data-dcnode-id="4481" instrument_node="">
</span><li data-dcnode-id="4476"><span data-dcnode-id="4480" instrument_node="">His kingdom is not details of religious rules, but rather peace and joy (</span><a class="rtBibleRef" data-dcnode-id="4478" data-purpose="bible-reference" data-reference="Rom 14.17" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rom%252014.17" rel="noopener" target="_blank"><span data-dcnode-id="4479" instrument_node="">Rom 14:17</span></a><span data-dcnode-id="4477" instrument_node="">).</span></li><span data-dcnode-id="4475" instrument_node="">
</span><li data-dcnode-id="4470"><span data-dcnode-id="4474" instrument_node="">He came to bring abundant life and more abundant life to faithful sheep (</span><a class="rtBibleRef" data-dcnode-id="4472" data-purpose="bible-reference" data-reference="John 10.10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/John%252010.10" rel="noopener" target="_blank"><span data-dcnode-id="4473" instrument_node="">Jn 10:10</span></a><span data-dcnode-id="4471" instrument_node="">).</span></li><span data-dcnode-id="4469" instrument_node="">
</span><li data-dcnode-id="4461"><span data-dcnode-id="4468" instrument_node="">He has provided all divine power for all godliness and joy (</span><a class="rtBibleRef" data-dcnode-id="4466" data-purpose="bible-reference" data-reference="Col 1.11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Col%25201.11" rel="noopener" target="_blank"><span data-dcnode-id="4467" instrument_node="">Col 1:11</span></a><span data-dcnode-id="4465" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4463" data-purpose="bible-reference" data-reference="2 Pet 1.3-4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Pet%25201.3-4" rel="noopener" target="_blank"><span data-dcnode-id="4464" instrument_node="">II Pet 1:3-4</span></a><span data-dcnode-id="4462" instrument_node="">).</span></li><span data-dcnode-id="4460" instrument_node="">
</span></ol><span data-dcnode-id="4458" instrument_node="">
</span></li><span data-dcnode-id="4456" instrument_node="">
</span><li data-dcnode-id="4439"><span data-dcnode-id="4455" instrument_node="">He told Abraham that He Himself was Abraham’s exceeding great reward (</span><a class="rtBibleRef" data-dcnode-id="4453" data-purpose="bible-reference" data-reference="Gen 15.1" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Gen%252015.1" rel="noopener" target="_blank"><span data-dcnode-id="4454" instrument_node="">Gen 15:1</span></a><span data-dcnode-id="4452" instrument_node="">).
</span><ol data-dcnode-id="4441"><span data-dcnode-id="4451" instrument_node="">
</span><li data-dcnode-id="4449"><span data-dcnode-id="4450" instrument_node="">Note the context: Abraham had no reward from a military victory to honor God.</span></li><span data-dcnode-id="4448" instrument_node="">
</span><li data-dcnode-id="4446"><span data-dcnode-id="4447" instrument_node="">Furthermore, of the goods he had taken from the confederate kings, he gave a tithe.</span></li><span data-dcnode-id="4445" instrument_node="">
</span><li data-dcnode-id="4443"><span data-dcnode-id="4444" instrument_node="">God was Abraham’s friend; Abraham was God’s friend; why sell yourself short?</span></li><span data-dcnode-id="4442" instrument_node="">
</span></ol><span data-dcnode-id="4440" instrument_node="">
</span></li><span data-dcnode-id="4438" instrument_node="">
</span><li data-dcnode-id="4400"><span data-dcnode-id="4437" instrument_node="">It is basic for those in authority, origination, or administration to have happy subjects.
</span><ol data-dcnode-id="4402"><span data-dcnode-id="4436" instrument_node="">
</span><li data-dcnode-id="4434"><span data-dcnode-id="4435" instrument_node="">Kings wanted their servants to be happy, thus Nehemiah’s fear of Artaxerxes.</span></li><span data-dcnode-id="4433" instrument_node="">
</span><li data-dcnode-id="4431"><span data-dcnode-id="4432" instrument_node="">Parents want children happy … with supper … with siblings … with family, etc.</span></li><span data-dcnode-id="4430" instrument_node="">
</span><li data-dcnode-id="4428"><span data-dcnode-id="4429" instrument_node="">The Bible repeatedly declares God love and expectation for our unity and our joy.</span></li><span data-dcnode-id="4427" instrument_node="">
</span><li data-dcnode-id="4425"><span data-dcnode-id="4426" instrument_node="">What do you intend when you tell your child to cheer up? Can God say it to you?</span></li><span data-dcnode-id="4424" instrument_node="">
</span><li data-dcnode-id="4404"><span data-dcnode-id="4423" instrument_node="">“Be of good cheer” … </span><a class="rtBibleRef" data-dcnode-id="4421" data-purpose="bible-reference" data-reference="Matt 9.2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Matt%25209.2" rel="noopener" target="_blank"><span data-dcnode-id="4422" instrument_node="">Matt 9:2</span></a><span data-dcnode-id="4420" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4418" data-purpose="bible-reference" data-reference="Matt 14.27" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Matt%252014.27" rel="noopener" target="_blank"><span data-dcnode-id="4419" instrument_node="">14:27</span></a><span data-dcnode-id="4417" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4415" data-purpose="bible-reference" data-reference="John 16.33" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/John%252016.33" rel="noopener" target="_blank"><span data-dcnode-id="4416" instrument_node="">John 16:33</span></a><span data-dcnode-id="4414" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4412" data-purpose="bible-reference" data-reference="Acts 23.11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252023.11" rel="noopener" target="_blank"><span data-dcnode-id="4413" instrument_node="">Acts 23:11</span></a><span data-dcnode-id="4411" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4409" data-purpose="bible-reference" data-reference="Acts 27.22" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252027.22" rel="noopener" target="_blank"><span data-dcnode-id="4410" instrument_node="">Acts 27:22</span></a><span data-dcnode-id="4408" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="4406" data-purpose="bible-reference" data-reference="Acts 27.25" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252027.25" rel="noopener" target="_blank"><span data-dcnode-id="4407" instrument_node="">25</span></a><span data-dcnode-id="4405" instrument_node="">.</span></li><span data-dcnode-id="4403" instrument_node="">
</span></ol><span data-dcnode-id="4401" instrument_node="">
</span></li><span data-dcnode-id="4399" instrument_node="">
</span><li data-dcnode-id="4349"><span data-dcnode-id="4398" instrument_node="">Do you think heaven will be totally void, or opposite, of our emotional pleasure here?
</span><ol data-dcnode-id="4351"><span data-dcnode-id="4397" instrument_node="">
</span><li data-dcnode-id="4392"><span data-dcnode-id="4396" instrument_node="">Jesus Christ will present us faultless to God: we all will be very happy (</span><a class="rtBibleRef" data-dcnode-id="4394" data-purpose="bible-reference" data-reference="Jude 1.24" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Jude%25201.24" rel="noopener" target="_blank"><span data-dcnode-id="4395" instrument_node="">Jude 1:24</span></a><span data-dcnode-id="4393" instrument_node="">).</span></li><span data-dcnode-id="4391" instrument_node="">
</span><li data-dcnode-id="4380"><span data-dcnode-id="4390" instrument_node="">The angels do not marry, as Jesus taught, but they rejoice (</span><a class="rtBibleRef" data-dcnode-id="4388" data-purpose="bible-reference" data-reference="Job 38.7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Job%252038.7" rel="noopener" target="_blank"><span data-dcnode-id="4389" instrument_node="">Job 38:7</span></a><span data-dcnode-id="4387" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4385" data-purpose="bible-reference" data-reference="Luke 15.7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Luke%252015.7" rel="noopener" target="_blank"><span data-dcnode-id="4386" instrument_node="">Luke 15:7</span></a><span data-dcnode-id="4384" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="4382" data-purpose="bible-reference" data-reference="Luke 15.10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Luke%252015.10" rel="noopener" target="_blank"><span data-dcnode-id="4383" instrument_node="">10</span></a><span data-dcnode-id="4381" instrument_node="">).</span></li><span data-dcnode-id="4379" instrument_node="">
</span><li data-dcnode-id="4371"><span data-dcnode-id="4378" instrument_node="">Jesus endured the cross by looking to the joy in heaven (</span><a class="rtBibleRef" data-dcnode-id="4376" data-purpose="bible-reference" data-reference="Ps 16.8-11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252016.8-11" rel="noopener" target="_blank"><span data-dcnode-id="4377" instrument_node="">Ps 16:8-11</span></a><span data-dcnode-id="4375" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4373" data-purpose="bible-reference" data-reference="Heb 12.2-3" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Heb%252012.2-3" rel="noopener" target="_blank"><span data-dcnode-id="4374" instrument_node="">Heb 12:2-3</span></a><span data-dcnode-id="4372" instrument_node="">).</span></li><span data-dcnode-id="4370" instrument_node="">
</span><li data-dcnode-id="4368"><span data-dcnode-id="4369" instrument_node="">Glorification of the universe and you includes removal of every impediment to joy.</span></li><span data-dcnode-id="4367" instrument_node="">
</span><li data-dcnode-id="4353"><span data-dcnode-id="4366" instrument_node="">Saints suffer for Him here, but they will rejoice there (</span><a class="rtBibleRef" data-dcnode-id="4364" data-purpose="bible-reference" data-reference="1 Pet 4.13" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Pet%25204.13" rel="noopener" target="_blank"><span data-dcnode-id="4365" instrument_node="">I Pet 4:13</span></a><span data-dcnode-id="4363" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4361" data-purpose="bible-reference" data-reference="Rom 8.18" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rom%25208.18" rel="noopener" target="_blank"><span data-dcnode-id="4362" instrument_node="">Ro 8:18</span></a><span data-dcnode-id="4360" instrument_node="">); persecution is two tokens – destruction and salvation (</span><a class="rtBibleRef" data-dcnode-id="4358" data-purpose="bible-reference" data-reference="Phil 1.28-29" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Phil%25201.28-29" rel="noopener" target="_blank"><span data-dcnode-id="4359" instrument_node="">Phil 1:28-29</span></a><span data-dcnode-id="4357" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4355" data-purpose="bible-reference" data-reference="2 Thess 1.5-6" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Thess%25201.5-6" rel="noopener" target="_blank"><span data-dcnode-id="4356" instrument_node="">II Thess 1:5-6</span></a><span data-dcnode-id="4354" instrument_node="">).</span></li><span data-dcnode-id="4352" instrument_node="">
</span></ol><span data-dcnode-id="4350" instrument_node="">
</span></li><span data-dcnode-id="4348" instrument_node="">
</span><li data-dcnode-id="4340"><span data-dcnode-id="4347" instrument_node="">Unless God wanted you happy, He would not have commanded joy (</span><a class="rtBibleRef" data-dcnode-id="4345" data-purpose="bible-reference" data-reference="Phil 3.1" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Phil%25203.1" rel="noopener" target="_blank"><span data-dcnode-id="4346" instrument_node="">Phil 3:1</span></a><span data-dcnode-id="4344" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4342" data-purpose="bible-reference" data-reference="Phil 4.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Phil%25204.4" rel="noopener" target="_blank"><span data-dcnode-id="4343" instrument_node="">4:4</span></a><span data-dcnode-id="4341" instrument_node="">).</span></li><span data-dcnode-id="4339" instrument_node="">
</span><li data-dcnode-id="4337"><span data-dcnode-id="4338" instrument_node="">Life may be probationary in some senses … but it is not punishment or persecution.</span></li><span data-dcnode-id="4336" instrument_node="">
</span><li data-dcnode-id="4322"><span data-dcnode-id="4335" instrument_node="">In light of death, God commends a joyful approach to life’s blessings (</span><a class="rtBibleRef" data-dcnode-id="4333" data-purpose="bible-reference" data-reference="Eccles 9.7-10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25209.7-10" rel="noopener" target="_blank"><span data-dcnode-id="4334" instrument_node="">Eccl 9:7-10</span></a><span data-dcnode-id="4332" instrument_node="">).
</span><ol data-dcnode-id="4324"><span data-dcnode-id="4331" instrument_node="">
</span><li data-dcnode-id="4329"><span data-dcnode-id="4330" instrument_node="">Here is mentioned bread, wine, white garments, ointment, wives, and work. Get it!</span></li><span data-dcnode-id="4328" instrument_node="">
</span><li data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">We can add sunshine, wonders, seasons, taste, sleep, friends, children, success, wisdom, 600-count sheets, travel, the zoo, the oceans, deliverances, answers, etc.</span></li><span data-dcnode-id="4325" instrument_node="">
</span></ol><span data-dcnode-id="4323" instrument_node="">
</span></li><span data-dcnode-id="4321" instrument_node="">
</span><li data-dcnode-id="4271"><span data-dcnode-id="4320" instrument_node="">God’s commands are not grievous: they are the only way to true happiness (</span><a class="rtBibleRef" data-dcnode-id="4318" data-purpose="bible-reference" data-reference="1 John 5.3" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520John%25205.3" rel="noopener" target="_blank"><span data-dcnode-id="4319" instrument_node="">I Jn 5:3</span></a><span data-dcnode-id="4317" instrument_node="">).
</span><ol data-dcnode-id="4273"><span data-dcnode-id="4316" instrument_node="">
</span><li data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">Consider any commandments, from quarantining leprosy to corporal child training, from dowries to waste removal, from marital duties to a work ethic, etc., etc.</span></li><span data-dcnode-id="4313" instrument_node="">
</span><li data-dcnode-id="4308"><span data-dcnode-id="4312" instrument_node="">This was so true that Moses said Israel’s laws would be highly regarded (</span><a class="rtBibleRef" data-dcnode-id="4310" data-purpose="bible-reference" data-reference="Deut 4.6" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Deut%25204.6" rel="noopener" target="_blank"><span data-dcnode-id="4311" instrument_node="">Deut 4:6</span></a><span data-dcnode-id="4309" instrument_node="">).</span></li><span data-dcnode-id="4307" instrument_node="">
</span><li data-dcnode-id="4299"><span data-dcnode-id="4306" instrument_node="">Solomon’s inspired advice greatly exalted the effect of wisdom (</span><a class="rtBibleRef" data-dcnode-id="4304" data-purpose="bible-reference" data-reference="Prov 3.13" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%25203.13" rel="noopener" target="_blank"><span data-dcnode-id="4305" instrument_node="">Proverbs 3:13</span></a><span data-dcnode-id="4303" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="4301" data-purpose="bible-reference" data-reference="Proverbs 3.18" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Proverbs%25203.18" rel="noopener" target="_blank"><span data-dcnode-id="4302" instrument_node="">18</span></a><span data-dcnode-id="4300" instrument_node="">).</span></li><span data-dcnode-id="4298" instrument_node="">
</span><li data-dcnode-id="4290"><span data-dcnode-id="4297" instrument_node="">David / Peter tell how to love life and see good days (</span><a class="rtBibleRef" data-dcnode-id="4295" data-purpose="bible-reference" data-reference="Ps 34.12-14" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252034.12-14" rel="noopener" target="_blank"><span data-dcnode-id="4296" instrument_node="">Ps 34:12-14</span></a><span data-dcnode-id="4294" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4292" data-purpose="bible-reference" data-reference="1 Pet 3.10-12" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Pet%25203.10-12" rel="noopener" target="_blank"><span data-dcnode-id="4293" instrument_node="">I Pet 3:10-12</span></a><span data-dcnode-id="4291" instrument_node="">).</span></li><span data-dcnode-id="4289" instrument_node="">
</span><li data-dcnode-id="4275"><span data-dcnode-id="4288" instrument_node="">The gospel of Jesus Christ brings happiness (</span><a class="rtBibleRef" data-dcnode-id="4286" data-purpose="bible-reference" data-reference="John 13.17" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/John%252013.17" rel="noopener" target="_blank"><span data-dcnode-id="4287" instrument_node="">Jn 13:17</span></a><span data-dcnode-id="4285" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4283" data-purpose="bible-reference" data-reference="Jn 15.11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Jn%252015.11" rel="noopener" target="_blank"><span data-dcnode-id="4284" instrument_node="">15:11</span></a><span data-dcnode-id="4282" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4280" data-purpose="bible-reference" data-reference="1 John 1.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520John%25201.4" rel="noopener" target="_blank"><span data-dcnode-id="4281" instrument_node="">I John 1:4</span></a><span data-dcnode-id="4279" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4277" data-purpose="bible-reference" data-reference="James 1.25" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/James%25201.25" rel="noopener" target="_blank"><span data-dcnode-id="4278" instrument_node="">Jas 1:25</span></a><span data-dcnode-id="4276" instrument_node="">).</span></li><span data-dcnode-id="4274" instrument_node="">
</span></ol><span data-dcnode-id="4272" instrument_node="">
</span></li><span data-dcnode-id="4270" instrument_node="">
</span><li data-dcnode-id="4250"><span data-dcnode-id="4269" instrument_node="">The yoke of Christ is easy and His burden light compared to others (</span><a class="rtBibleRef" data-dcnode-id="4267" data-purpose="bible-reference" data-reference="Matt 11.28-30" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Matt%252011.28-30" rel="noopener" target="_blank"><span data-dcnode-id="4268" instrument_node="">Matt 11:28-30</span></a><span data-dcnode-id="4266" instrument_node="">).
</span><ol data-dcnode-id="4252"><span data-dcnode-id="4265" instrument_node="">
</span><li data-dcnode-id="4260"><span data-dcnode-id="4264" instrument_node="">The Pharisees, in Jesus’ day like now, bound burdens on men’s backs (</span><a class="rtBibleRef" data-dcnode-id="4262" data-purpose="bible-reference" data-reference="Matt 23.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Matt%252023.4" rel="noopener" target="_blank"><span data-dcnode-id="4263" instrument_node="">Matt 23:4</span></a><span data-dcnode-id="4261" instrument_node="">).</span></li><span data-dcnode-id="4259" instrument_node="">
</span><li data-dcnode-id="4254"><span data-dcnode-id="4258" instrument_node="">All the touch not, taste not, handle not commandments are grievous (</span><a class="rtBibleRef" data-dcnode-id="4256" data-purpose="bible-reference" data-reference="Col 2.20-23" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Col%25202.20-23" rel="noopener" target="_blank"><span data-dcnode-id="4257" instrument_node="">Col 2:20-23</span></a><span data-dcnode-id="4255" instrument_node="">).</span></li><span data-dcnode-id="4253" instrument_node="">
</span></ol><span data-dcnode-id="4251" instrument_node="">
</span></li><span data-dcnode-id="4249" instrument_node="">
</span></ol><span data-dcnode-id="4247" instrument_node="">
</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="4245" data-fontsize="15.4" data-lineheight="21.56px" style="--fontSize:15.4; line-height: 1.4; --minFontSize:15.4;"><span data-dcnode-id="4246" instrument_node="">Happiness Is Knowing God</span></h3><span data-dcnode-id="4244" instrument_node="">
</span><ol data-dcnode-id="4005" style="list-style-type: upper-alpha;"><span data-dcnode-id="4243" instrument_node="">
</span><li data-dcnode-id="4199"><span data-dcnode-id="4242" instrument_node="">The LORD Jehovah created us for Himself and His own pleasure (</span><a class="rtBibleRef" data-dcnode-id="4240" data-purpose="bible-reference" data-reference="Prov 16.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252016.4" rel="noopener" target="_blank"><span data-dcnode-id="4241" instrument_node="">Pr 16:4</span></a><span data-dcnode-id="4239" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4237" data-purpose="bible-reference" data-reference="Rev 4.11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rev%25204.11" rel="noopener" target="_blank"><span data-dcnode-id="4238" instrument_node="">Rev 4:11</span></a><span data-dcnode-id="4236" instrument_node="">).
</span><ol data-dcnode-id="4201"><span data-dcnode-id="4235" instrument_node="">
</span><li data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">If you try to find happiness or pleasure outside Him, you beg Him to frustrate you!</span></li><span data-dcnode-id="4232" instrument_node="">
</span><li data-dcnode-id="4230"><span data-dcnode-id="4231" instrument_node="">He commands us to love Him always with our whole heart, mind, soul, strength.</span></li><span data-dcnode-id="4229" instrument_node="">
</span><li data-dcnode-id="4227"><span data-dcnode-id="4228" instrument_node="">He will not accept competitors, distractions, or compromises, for He is Lord of all.</span></li><span data-dcnode-id="4226" instrument_node="">
</span><li data-dcnode-id="4221"><span data-dcnode-id="4225" instrument_node="">He is a jealous God, and His name is Jealous. Do not try to cheat Him (</span><a class="rtBibleRef" data-dcnode-id="4223" data-purpose="bible-reference" data-reference="Exod 34.14" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Exod%252034.14" rel="noopener" target="_blank"><span data-dcnode-id="4224" instrument_node="">Ex 34:14</span></a><span data-dcnode-id="4222" instrument_node="">).</span></li><span data-dcnode-id="4220" instrument_node="">
</span><li data-dcnode-id="4215"><span data-dcnode-id="4219" instrument_node="">He told Eli … Them that honor me – I will honor … and vice versa (</span><a class="rtBibleRef" data-dcnode-id="4217" data-purpose="bible-reference" data-reference="1 Sam 2.30" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Sam%25202.30" rel="noopener" target="_blank"><span data-dcnode-id="4218" instrument_node="">I Sam 2:30</span></a><span data-dcnode-id="4216" instrument_node="">).</span></li><span data-dcnode-id="4214" instrument_node="">
</span><li data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">Therefore, He must be the end of all you think, say, do, plan, desire, value, and etc.</span></li><span data-dcnode-id="4211" instrument_node="">
</span><li data-dcnode-id="4203"><span data-dcnode-id="4210" instrument_node="">The world is His enemy; flirting is adultery and belly worship (</span><a class="rtBibleRef" data-dcnode-id="4208" data-purpose="bible-reference" data-reference="James 4.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/James%25204.4" rel="noopener" target="_blank"><span data-dcnode-id="4209" instrument_node="">Jas 4:4</span></a><span data-dcnode-id="4207" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4205" data-purpose="bible-reference" data-reference="Phil 3.19" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Phil%25203.19" rel="noopener" target="_blank"><span data-dcnode-id="4206" instrument_node="">Phil 3:19</span></a><span data-dcnode-id="4204" instrument_node="">).</span></li><span data-dcnode-id="4202" instrument_node="">
</span></ol><span data-dcnode-id="4200" instrument_node="">
</span></li><span data-dcnode-id="4198" instrument_node="">
</span><li data-dcnode-id="4154"><span data-dcnode-id="4197" instrument_node="">The people whose God is the LORD Jehovah and know Him are a happy, prosperous people (</span><a class="rtBibleRef" data-dcnode-id="4195" data-purpose="bible-reference" data-reference="Deut 33.29" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Deut%252033.29" rel="noopener" target="_blank"><span data-dcnode-id="4196" instrument_node="">Deut 33:29</span></a><span data-dcnode-id="4194" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4192" data-purpose="bible-reference" data-reference="Ps 33.12" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252033.12" rel="noopener" target="_blank"><span data-dcnode-id="4193" instrument_node="">Psalm 33:12</span></a><span data-dcnode-id="4191" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4189" data-purpose="bible-reference" data-reference="Psalm 63.5-6" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Psalm%252063.5-6" rel="noopener" target="_blank"><span data-dcnode-id="4190" instrument_node="">63:5-6</span></a><span data-dcnode-id="4188" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4186" data-purpose="bible-reference" data-reference="Psalm 65.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Psalm%252065.4" rel="noopener" target="_blank"><span data-dcnode-id="4187" instrument_node="">65:4</span></a><span data-dcnode-id="4185" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4183" data-purpose="bible-reference" data-reference="Psalm 89.15" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Psalm%252089.15" rel="noopener" target="_blank"><span data-dcnode-id="4184" instrument_node="">89:15</span></a><span data-dcnode-id="4182" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4180" data-purpose="bible-reference" data-reference="Psalm 144.15" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Psalm%2520144.15" rel="noopener" target="_blank"><span data-dcnode-id="4181" instrument_node="">144:15</span></a><span data-dcnode-id="4179" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4177" data-purpose="bible-reference" data-reference="Psalm 146.5" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Psalm%2520146.5" rel="noopener" target="_blank"><span data-dcnode-id="4178" instrument_node="">146:5</span></a><span data-dcnode-id="4176" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4174" data-purpose="bible-reference" data-reference="Dan 11.32" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Dan%252011.32" rel="noopener" target="_blank"><span data-dcnode-id="4175" instrument_node="">Daniel 11:32</span></a><span data-dcnode-id="4173" instrument_node="">).

</span><li data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node="">Walking with God in daily fellowship and obedience is the foundation for pure joy.</span></li><span data-dcnode-id="4169" instrument_node="">
</span><li data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">It has little to do with church attendance, Bible reading, prayer, and other externals.</span></li><span data-dcnode-id="4166" instrument_node="">

</span><ol data-dcnode-id="4060"><span data-dcnode-id="4142" instrument_node="">

ment_node="">119:16</span></a><span data-dcnode-id="4081" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4079" data-purpose="bible-reference" data-reference="Isa 58.13-14" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Isa%252058.13-14" rel="noopener" target="_blank"><span data-dcnode-id="4080" instrument_node="">Is 58:13-14</span></a><span data-dcnode-id="4078" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4076" data-purpose="bible-reference" data-reference="Is 66.10-11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Is%252066.10-11" rel="noopener" target="_blank"><span data-dcnode-id="4077" instrument_node="">66:10-11</span></a><span data-dcnode-id="4075" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4073" data-purpose="bible-reference" data-reference="Phil 4.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Phil%25204.4" rel="noopener" target="_blank"><span data-dcnode-id="4074" instrument_node="">Phil 4:4</span></a><span data-dcnode-id="4072" instrument_node="">), as also in Job (</span><a class="rtBibleRef" data-dcnode-id="4070" data-purpose="bible-reference" data-reference="Job 22.26" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Job%252022.26" rel="noopener" target="_blank"><span data-dcnode-id="4071" instrument_node="">Job 22:26</span></a><span data-dcnode-id="4069" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4067" data-purpose="bible-reference" data-reference="Job 27.10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Job%252027.10" rel="noopener" target="_blank"><span data-dcnode-id="4068" instrument_node="">27:10</span></a><span data-dcnode-id="4066" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4064" data-purpose="bible-reference" data-reference="Job 34.9" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Job%252034.9" rel="noopener" target="_blank"><span data-dcnode-id="4065" instrument_node="">34:9</span></a><span data-dcnode-id="4063" instrument_node="">).</span></li><span data-dcnode-id="4061" instrument_node="">

</span><li data-dcnode-id="4031"><span data-dcnode-id="4056" instrument_node="">Active joy in God provides more strength of soul than does fear or sorrow (</span><a class="rtBibleRef" data-dcnode-id="4054" data-purpose="bible-reference" data-reference="Neh 8.10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Neh%25208.10" rel="noopener" target="_blank"><span data-dcnode-id="4055" instrument_node="">Neh 8:10</span></a><span data-dcnode-id="4053" instrument_node="">).

</span><li data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">The source of joy was God’s preparation of hearts and understanding His word.</span></li><span data-dcnode-id="4049" instrument_node="">
</span><li data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">When God visits with His presence or blessings, we should unashamedly rejoice.</span></li><span data-dcnode-id="4046" instrument_node="">

</span><li data-dcnode-id="4019"><span data-dcnode-id="4023" instrument_node="">The Person of God’s Son, your Lord and Saviour, causes unspeakable joy (</span><a class="rtBibleRef" data-dcnode-id="4021" data-purpose="bible-reference" data-reference="1 Pet 1.8" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Pet%25201.8" rel="noopener" target="_blank"><span data-dcnode-id="4022" instrument_node="">I Pet 1:8</span></a><span data-dcnode-id="4020" instrument_node="">).</span></li><span data-dcnode-id="4018" instrument_node="">
