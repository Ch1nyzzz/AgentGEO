</span><p data-dcnode-id="5486"><span data-dcnode-id="5487" instrument_node="">&nbsp;</span></p><span data-dcnode-id="5485" instrument_node="">
</span><p data-dcnode-id="5483" style="text-align: justify;"><span data-dcnode-id="5484" instrument_node="">“All the days of the afflicted are evil:&nbsp;but he that is of a merry heart hath a continual feast.”</span></p><span data-dcnode-id="5482" instrument_node="">
</span><p data-dcnode-id="5479" style="text-align: center;"><span class="no" data-dcnode-id="5480"><span data-dcnode-id="5481" instrument_node="">Proverbs 15:15</span></span></p><span data-dcnode-id="5478" instrument_node="">
</span><p data-dcnode-id="5476"><span data-dcnode-id="5477" instrument_node="">&nbsp;</span></p><span data-dcnode-id="5475" instrument_node="">
</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="5473" data-fontsize="15.4" data-lineheight="21.56px" style="--fontSize:15.4; line-height: 1.4; --minFontSize:15.4;"><span data-dcnode-id="5474" instrument_node="">Bible Axioms of Joy</span></h3><span data-dcnode-id="5472" instrument_node="">
</span></div><span data-dcnode-id="5470" instrument_node="">
</span><div class="sermon-outline" data-dcnode-id="245"><span data-dcnode-id="5469" instrument_node="">
</span><ol data-dcnode-id="5341" style="list-style-type: upper-alpha;"><span data-dcnode-id="5468" instrument_node="">
</span><li data-dcnode-id="5463"><span data-dcnode-id="5467" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5465" data-purpose="bible-reference" data-reference="Prov 15.15" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252015.15" rel="noopener" target="_blank"><span data-dcnode-id="5466" instrument_node="">Proverbs 15:15</span></a><span data-dcnode-id="5464" instrument_node=""> … summarizes the choices men make and their profound results affecting every day.</span></li><span data-dcnode-id="5462" instrument_node="">
</span><li data-dcnode-id="5457"><span data-dcnode-id="5461" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5459" data-purpose="bible-reference" data-reference="Hab 3.17-19" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Hab%25203.17-19" rel="noopener" target="_blank"><span data-dcnode-id="5460" instrument_node="">Habakkuk 3:17-19</span></a><span data-dcnode-id="5458" instrument_node=""> … God is able to boost great joy for those glad by faith in terrible circumstances.</span></li><span data-dcnode-id="5456" instrument_node="">
</span><li data-dcnode-id="5451"><span data-dcnode-id="5455" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5453" data-purpose="bible-reference" data-reference="Neh 8.10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Neh%25208.10" rel="noopener" target="_blank"><span data-dcnode-id="5454" instrument_node="">Nehemiah 8:10</span></a><span data-dcnode-id="5452" instrument_node=""> … joy produces greater strength and zeal for any duty or diligent effort than sorrow.</span></li><span data-dcnode-id="5450" instrument_node="">
</span><li data-dcnode-id="5445"><span data-dcnode-id="5449" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5447" data-purpose="bible-reference" data-reference="Ps 34.12-16" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252034.12-16" rel="noopener" target="_blank"><span data-dcnode-id="5448" instrument_node="">Psalm 34:12-16</span></a><span data-dcnode-id="5446" instrument_node=""> … God knows His children want good lives, so He specifies how we can get them.</span></li><span data-dcnode-id="5444" instrument_node="">
</span><li data-dcnode-id="5439"><span data-dcnode-id="5443" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5441" data-purpose="bible-reference" data-reference="Prov 15.13" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252015.13" rel="noopener" target="_blank"><span data-dcnode-id="5442" instrument_node="">Proverbs 15:13</span></a><span data-dcnode-id="5440" instrument_node=""> … a merry heart has a positive effect on face and body language opposite sadness.</span></li><span data-dcnode-id="5438" instrument_node="">
</span><li data-dcnode-id="5433"><span data-dcnode-id="5437" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5435" data-purpose="bible-reference" data-reference="Prov 17.22" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252017.22" rel="noopener" target="_blank"><span data-dcnode-id="5436" instrument_node="">Proverbs 17:22</span></a><span data-dcnode-id="5434" instrument_node=""> … a merry heart has a psychosomatic effect on the body and life not to be slighted.</span></li><span data-dcnode-id="5432" instrument_node="">
</span><li data-dcnode-id="5427"><span data-dcnode-id="5431" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5429" data-purpose="bible-reference" data-reference="Prov 18.14" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252018.14" rel="noopener" target="_blank"><span data-dcnode-id="5430" instrument_node="">Proverbs 18:14</span></a><span data-dcnode-id="5428" instrument_node=""> … a spirit that is merry can endure or overcome much, or a spirit can tear you down.</span></li><span data-dcnode-id="5426" instrument_node="">
</span><li data-dcnode-id="5421"><span data-dcnode-id="5425" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5423" data-purpose="bible-reference" data-reference="Deut 14.22-26" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Deut%252014.22-26" rel="noopener" target="_blank"><span data-dcnode-id="5424" instrument_node="">Deut 14:22-26</span></a><span data-dcnode-id="5422" instrument_node=""> … even under the hard old covenant, families spent a tithe on lusts for joy in worship.</span></li><span data-dcnode-id="5420" instrument_node="">
</span><li data-dcnode-id="5415"><span data-dcnode-id="5419" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5417" data-purpose="bible-reference" data-reference="Deut 28.47-48" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Deut%252028.47-48" rel="noopener" target="_blank"><span data-dcnode-id="5418" instrument_node="">Deut 28:47-48</span></a><span data-dcnode-id="5416" instrument_node=""> … God truly expected joy and gladness for abundance of all things with a warning.</span></li><span data-dcnode-id="5414" instrument_node="">
</span><li data-dcnode-id="5409"><span data-dcnode-id="5413" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5411" data-purpose="bible-reference" data-reference="Eccles 9.9" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25209.9" rel="noopener" target="_blank"><span data-dcnode-id="5412" instrument_node="">Eccl 9:9</span></a><span data-dcnode-id="5410" instrument_node=""> … marriage is one of God’s gifts to add great pleasure to life on earth to those embracing it.</span></li><span data-dcnode-id="5408" instrument_node="">
</span><li data-dcnode-id="5400"><span data-dcnode-id="5407" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5405" data-purpose="bible-reference" data-reference="Isa 61.3" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Isa%252061.3" rel="noopener" target="_blank"><span data-dcnode-id="5406" instrument_node="">Isaiah 61:3</span></a><span data-dcnode-id="5404" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="5402" data-purpose="bible-reference" data-reference="Isaiah 61.10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Isaiah%252061.10" rel="noopener" target="_blank"><span data-dcnode-id="5403" instrument_node="">10</span></a><span data-dcnode-id="5401" instrument_node=""> … the prophecy of Christ and the gospel included much joy coming by the Spirit.</span></li><span data-dcnode-id="5399" instrument_node="">
</span><li data-dcnode-id="5394"><span data-dcnode-id="5398" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5396" data-purpose="bible-reference" data-reference="Acts 14.17" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252014.17" rel="noopener" target="_blank"><span data-dcnode-id="5397" instrument_node="">Acts 14:17</span></a><span data-dcnode-id="5395" instrument_node=""> … God sends food and gladness even for the hearts of reprobates for a witness of Him.</span></li><span data-dcnode-id="5393" instrument_node="">
</span><li data-dcnode-id="5388"><span data-dcnode-id="5392" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5390" data-purpose="bible-reference" data-reference="Rom 14.17" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rom%252014.17" rel="noopener" target="_blank"><span data-dcnode-id="5391" instrument_node="">Rom 14:17</span></a><span data-dcnode-id="5389" instrument_node=""> … the kingdom of God is not handbook rules of liberty but peace and joy by the Spirit.</span></li><span data-dcnode-id="5387" instrument_node="">
</span><li data-dcnode-id="5382"><span data-dcnode-id="5386" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5384" data-purpose="bible-reference" data-reference="Phil 4.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Phil%25204.4" rel="noopener" target="_blank"><span data-dcnode-id="5385" instrument_node="">Philippians 4:4</span></a><span data-dcnode-id="5383" instrument_node=""> … rejoicing is a commandment for all times and to be repeated as it may be needed.</span></li><span data-dcnode-id="5381" instrument_node="">
</span><li data-dcnode-id="5376"><span data-dcnode-id="5380" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5378" data-purpose="bible-reference" data-reference="Col 2.20-23" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Col%25202.20-23" rel="noopener" target="_blank"><span data-dcnode-id="5379" instrument_node="">Col 2:20-23</span></a><span data-dcnode-id="5377" instrument_node=""> … Christian living rejects manmade and traditional self-denial to satisfy your flesh.</span></li><span data-dcnode-id="5375" instrument_node="">
</span><li data-dcnode-id="5370"><span data-dcnode-id="5374" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5372" data-purpose="bible-reference" data-reference="1 Tim 1.17" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Tim%25201.17" rel="noopener" target="_blank"><span data-dcnode-id="5373" instrument_node="">I Tim 1:17</span></a><span data-dcnode-id="5371" instrument_node=""> … even in the New Testament God gives rich men the liberty to richly enjoy all things.</span></li><span data-dcnode-id="5369" instrument_node="">
</span><li data-dcnode-id="5361"><span data-dcnode-id="5368" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5366" data-purpose="bible-reference" data-reference="James 4.9" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/James%25204.9" rel="noopener" target="_blank"><span data-dcnode-id="5367" instrument_node="">James 4:9</span></a><span data-dcnode-id="5365" instrument_node=""> … mourning and weeping rather than laughter or joy is for sinners in context (</span><a class="rtBibleRef" data-dcnode-id="5363" data-purpose="bible-reference" data-reference="James 4.1-10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/James%25204.1-10" rel="noopener" target="_blank"><span data-dcnode-id="5364" instrument_node="">Jas 4:1-10</span></a><span data-dcnode-id="5362" instrument_node="">).</span></li><span data-dcnode-id="5360" instrument_node="">
</span><li data-dcnode-id="5355"><span data-dcnode-id="5359" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5357" data-purpose="bible-reference" data-reference="1 Pet 1.8" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Pet%25201.8" rel="noopener" target="_blank"><span data-dcnode-id="5358" instrument_node="">I Peter 1:8</span></a><span data-dcnode-id="5356" instrument_node=""> … the fact of the Lord’s return can yield joy unspeakable and full of glory to believers.</span></li><span data-dcnode-id="5354" instrument_node="">
</span><li data-dcnode-id="5349"><span data-dcnode-id="5353" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5351" data-purpose="bible-reference" data-reference="1 John 1.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520John%25201.4" rel="noopener" target="_blank"><span data-dcnode-id="5352" instrument_node="">I John 1:4</span></a><span data-dcnode-id="5350" instrument_node=""> … apostolic fellowship with God and Jesus Christ for full joy was the goal of the epistle.</span></li><span data-dcnode-id="5348" instrument_node="">
</span><li data-dcnode-id="5343"><span data-dcnode-id="5347" instrument_node=""></span><a class="rtBibleRef" data-dcnode-id="5345" data-purpose="bible-reference" data-reference="Rev 19.7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rev%252019.7" rel="noopener" target="_blank"><span data-dcnode-id="5346" instrument_node="">Rev 19:7</span></a><span data-dcnode-id="5344" instrument_node=""> … heaven will be a place and time of gladness and rejoicing as a wedding to the Lamb.</span></li><span data-dcnode-id="5342" instrument_node="">
</span></ol><span data-dcnode-id="5340" instrument_node="">
</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="5338" data-fontsize="15.4" data-lineheight="21.56px" style="--fontSize:15.4; line-height: 1.4; --minFontSize:15.4;"><span data-dcnode-id="5339" instrument_node="">Introduction:</span></h3><span data-dcnode-id="5337" instrument_node="">
</span><ol data-dcnode-id="5238" style="list-style-type: upper-alpha;"><span data-dcnode-id="5336" instrument_node="">
</span><li data-dcnode-id="5334"><span data-dcnode-id="5335" instrument_node="">God wants His children to be happy; He gave the Spirit of joy and gladness; the gospel secures it.</span></li><span data-dcnode-id="5333" instrument_node="">
</span><li data-dcnode-id="5331"><span data-dcnode-id="5332" instrument_node="">Happiness is invigorating power! Duty by itself is drudgery! Temperance by itself is torture! Shout!</span></li><span data-dcnode-id="5330" instrument_node="">
</span><li data-dcnode-id="5328"><span data-dcnode-id="5329" instrument_node="">David danced with all his might and paid for the temple out of passionate joy and excited gladness.</span></li><span data-dcnode-id="5327" instrument_node="">

</span><li data-dcnode-id="5298"><span data-dcnode-id="5299" instrument_node="">Christians should be the happiest people on earth; if not, it is their fault; if not, it is a sorry disgrace.</span></li><span data-dcnode-id="5297" instrument_node="">
</span><li data-dcnode-id="5295"><span data-dcnode-id="5296" instrument_node="">Christians should have plenty of joy to give; since God gave them so much and the wisdom to share.</span></li><span data-dcnode-id="5294" instrument_node="">
</span><li data-dcnode-id="5292"><span data-dcnode-id="5293" instrument_node="">God knows our first love or lukewarmness, so we should alter our spirits by repentance and action.</span></li><span data-dcnode-id="5291" instrument_node="">
</span><li data-dcnode-id="5289"><span data-dcnode-id="5290" instrument_node="">The LORD Jehovah not only deserves happy children – He expects them – He rewards accordingly.</span></li><span data-dcnode-id="5288" instrument_node="">
</span><li data-dcnode-id="5286"><span data-dcnode-id="5287" instrument_node="">Compare to Nehemiah coming before Artaxerses of the Persian Empire without great happiness.</span></li><span data-dcnode-id="5285" instrument_node="">
</span><li data-dcnode-id="5280"><span data-dcnode-id="5284" instrument_node="">We recently considered relationships … and doing good must include causing happiness (</span><a class="rtBibleRef" data-dcnode-id="5282" data-purpose="bible-reference" data-reference="Gal 6.10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Gal%25206.10" rel="noopener" target="_blank"><span data-dcnode-id="5283" instrument_node="">Gal 6:10</span></a><span data-dcnode-id="5281" instrument_node="">).</span></li><span data-dcnode-id="5279" instrument_node="">
</span><li data-dcnode-id="5273"><span data-dcnode-id="5278" instrument_node="">The women recently studied </span><a data-dcnode-id="5275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letgodbetrue.com/sermons/index/year-2016/overwhelmed/"><em data-dcnode-id="5276"><span data-dcnode-id="5277" instrument_node="">Overwhelmed!</span></em></a><span data-dcnode-id="5274" instrument_node=""> … but a happy and merry spirit will cause overcoming.</span></li><span data-dcnode-id="5272" instrument_node="">
</span><li data-dcnode-id="5267"><span data-dcnode-id="5271" instrument_node="">A favorite verse for many and this author for many years is </span><a class="rtBibleRef" data-dcnode-id="5269" data-purpose="bible-reference" data-reference="Ps 37.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252037.4" rel="noopener" target="_blank"><span data-dcnode-id="5270" instrument_node="">Psalm 37:4</span></a><span data-dcnode-id="5268" instrument_node="">, emphasizing the first clause.</span></li><span data-dcnode-id="5266" instrument_node="">
</span><li data-dcnode-id="5264"><span data-dcnode-id="5265" instrument_node="">Think back to when you were most in love with another person – the energizing excitement you had.</span></li><span data-dcnode-id="5263" instrument_node="">
</span><li data-dcnode-id="5261"><span data-dcnode-id="5262" instrument_node="">Think back to when you got an unexpected promotion or raise – the energizing excitement you had.</span></li><span data-dcnode-id="5260" instrument_node="">
</span><li data-dcnode-id="5258"><span data-dcnode-id="5259" instrument_node="">A simple rule is not to wait for others to make you happy, but rather for you to make them happy.</span></li><span data-dcnode-id="5257" instrument_node="">
</span><li data-dcnode-id="5255"><span data-dcnode-id="5256" instrument_node="">A ton of material has been reaped, and I hope in just a few sermons we can organize and learn it.</span></li><span data-dcnode-id="5254" instrument_node="">
</span><li data-dcnode-id="5252"><span data-dcnode-id="5253" instrument_node="">Do not expect psychobabble or temperamental/personality analysis, for I will preach God’s word.</span></li><span data-dcnode-id="5251" instrument_node="">
</span><li data-dcnode-id="5249"><span data-dcnode-id="5250" instrument_node="">While I will be positive, you will still be corrected and warned, which you must accept and adopt.</span></li><span data-dcnode-id="5248" instrument_node="">
</span><li data-dcnode-id="5246"><span data-dcnode-id="5247" instrument_node="">An exhaustive study of all the Bible has to say on this subject would take many weeks or months.</span></li><span data-dcnode-id="5245" instrument_node="">
</span><li data-dcnode-id="5240"><span data-dcnode-id="5244" instrument_node="">God wrote the Bible in part for living the abundant life He intended for His children (</span><a class="rtBibleRef" data-dcnode-id="5242" data-purpose="bible-reference" data-reference="Deut 32.47" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Deut%252032.47" rel="noopener" target="_blank"><span data-dcnode-id="5243" instrument_node="">Deut 32:47</span></a><span data-dcnode-id="5241" instrument_node="">).</span></li><span data-dcnode-id="5239" instrument_node="">

</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="5235" data-fontsize="15.4" data-lineheight="21.56px" style="--fontSize:15.4; line-height: 1.4; --minFontSize:15.4;"><span data-dcnode-id="5236" instrument_node="">What Is Happiness?</span></h3><span data-dcnode-id="5234" instrument_node="">
</span><ol data-dcnode-id="5067" style="list-style-type: upper-alpha;"><span data-dcnode-id="5233" instrument_node="">
</span><li data-dcnode-id="5227"><strong data-dcnode-id="5231"><span data-dcnode-id="5232" instrument_node="">Happy.</span></strong><span data-dcnode-id="5230" instrument_node=""> Having good ‘hap’ or fortune; lucky, fortunate; favoured by lot, position, or other external circumstance. Characterized by or involving good fortune; fortunate, lucky; prosperous; favourable, propitious. </span><span data-dcnode-id="5228" style="text-decoration: underline;"><span data-dcnode-id="5229" instrument_node="">Having a feeling of great pleasure or content of mind, arising from satisfaction with one’s circumstances or condition; also in weakened sense: Glad, pleased.</span></span></li><span data-dcnode-id="5226" instrument_node="">
</span><li data-dcnode-id="5219"><strong data-dcnode-id="5224"><span data-dcnode-id="5225" instrument_node="">Happiness.</span></strong><span data-dcnode-id="5223" instrument_node=""> Good fortune or luck in life or in a particular affair; success, prosperity. </span><span data-dcnode-id="5221" style="text-decoration: underline;"><span data-dcnode-id="5222" instrument_node="">The state of pleasurable content of mind, which results from success or the attainment of what is considered good.</span></span><span data-dcnode-id="5220" instrument_node=""> Successful or felicitous aptitude, fitness, suitability, or appropriateness; felicity.</span></li><span data-dcnode-id="5218" instrument_node="">
</span><li data-dcnode-id="5212"><strong data-dcnode-id="5216"><span data-dcnode-id="5217" instrument_node="">Joy.</span></strong><span data-dcnode-id="5215" instrument_node=""> </span><span data-dcnode-id="5213" style="text-decoration: underline;"><span data-dcnode-id="5214" instrument_node="">A vivid emotion of pleasure arising from a sense of well-being or satisfaction; the feeling or state of being highly pleased or delighted; exultation of spirit; gladness, delight.</span></span></li><span data-dcnode-id="5211" instrument_node="">
</span><li data-dcnode-id="5207"><span data-dcnode-id="5210" instrument_node="">Happiness has many synonyms that help grasp its full value: </span><em data-dcnode-id="5208"><span data-dcnode-id="5209" instrument_node="">joy, gladness, pleasure, satisfaction, delight, cheerfulness, laughter, enjoyment, blessedness, merry, mirth, rejoicing, joyous, contented, bliss, pleased, pleasantness, joyful, glad, triumph.</span></em></li><span data-dcnode-id="5206" instrument_node="">
</span><li data-dcnode-id="5180"><span data-dcnode-id="5205" instrument_node="">Happiness is defined and explained many different ways, which should be combined.
</span><ol data-dcnode-id="5182"><span data-dcnode-id="5204" instrument_node="">
</span><li data-dcnode-id="5202"><span data-dcnode-id="5203" instrument_node="">It is pleasant confidence that things in your life will turn out okay or even better.</span></li><span data-dcnode-id="5201" instrument_node="">
</span><li data-dcnode-id="5199"><span data-dcnode-id="5200" instrument_node="">It is thrilling pleasure of having a sensory experience that delights the human soul.</span></li><span data-dcnode-id="5198" instrument_node="">
</span><li data-dcnode-id="5196"><span data-dcnode-id="5197" instrument_node="">It is thankful relief that danger or fear earlier felt has been lifted and taken away.</span></li><span data-dcnode-id="5195" instrument_node="">
</span><li data-dcnode-id="5193"><span data-dcnode-id="5194" instrument_node="">It is the exciting reward of working hard for a goal and achieving it and then some.</span></li><span data-dcnode-id="5192" instrument_node="">
</span><li data-dcnode-id="5190"><span data-dcnode-id="5191" instrument_node="">It is mutually basking with another person in exploring or experiencing goodness.</span></li><span data-dcnode-id="5189" instrument_node="">
</span><li data-dcnode-id="5187"><span data-dcnode-id="5188" instrument_node="">It is the feeling of knowing the acceptance and love of God or men toward you.</span></li><span data-dcnode-id="5186" instrument_node="">
</span><li data-dcnode-id="5184"><span data-dcnode-id="5185" instrument_node="">Christians should have all the descriptions and more due to God’s great provision.</span></li><span data-dcnode-id="5183" instrument_node="">
</span></ol><span data-dcnode-id="5181" instrument_node="">
</span></li><span data-dcnode-id="5179" instrument_node="">
</span><li data-dcnode-id="5156"><span data-dcnode-id="5178" instrument_node="">Happiness is the energizing joy and excitement of a young couple before marriage!
</span><ol data-dcnode-id="5158"><span data-dcnode-id="5177" instrument_node="">
</span><li data-dcnode-id="5175"><span data-dcnode-id="5176" instrument_node="">If you say, “That is mainly lust,” you are certainly right, but marital lust is allowed.</span></li><span data-dcnode-id="5174" instrument_node="">
</span><li data-dcnode-id="5169"><span data-dcnode-id="5173" instrument_node="">A husband’s selfish desire for pleasure should be to pamper his wife (</span><a class="rtBibleRef" data-dcnode-id="5171" data-purpose="bible-reference" data-reference="Eph 5.25-27" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eph%25205.25-27" rel="noopener" target="_blank"><span data-dcnode-id="5172" instrument_node="">Ep 5:25-27</span></a><span data-dcnode-id="5170" instrument_node="">).</span></li><span data-dcnode-id="5168" instrument_node="">
</span><li data-dcnode-id="5166"><span data-dcnode-id="5167" instrument_node="">The young couple can stay happy, but they must work at it every day without fail.</span></li><span data-dcnode-id="5165" instrument_node="">
</span><li data-dcnode-id="5160"><span data-dcnode-id="5164" instrument_node="">Was any young couple ever motivated more than Paul without lust (</span><a class="rtBibleRef" data-dcnode-id="5162" data-purpose="bible-reference" data-reference="2 Cor 12.15" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Cor%252012.15" rel="noopener" target="_blank"><span data-dcnode-id="5163" instrument_node="">II Cor 12:15</span></a><span data-dcnode-id="5161" instrument_node="">)?</span></li><span data-dcnode-id="5159" instrument_node="">
</span></ol><span data-dcnode-id="5157" instrument_node="">
</span></li><span data-dcnode-id="5155" instrument_node="">
</span><li data-dcnode-id="5105"><span data-dcnode-id="5154" instrument_node="">Wicked men might be happy for a short time while gratifying sinful lusts (</span><a class="rtBibleRef" data-dcnode-id="5152" data-purpose="bible-reference" data-reference="Heb 11.25" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Heb%252011.25" rel="noopener" target="_blank"><span data-dcnode-id="5153" instrument_node="">Heb 11:25</span></a><span data-dcnode-id="5151" instrument_node="">).

</span><li data-dcnode-id="5145"><span data-dcnode-id="5149" instrument_node="">But they all eventually learn truth, sin’s empty and painful consequences (</span><a class="rtBibleRef" data-dcnode-id="5147" data-purpose="bible-reference" data-reference="Ps 36.2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252036.2" rel="noopener" target="_blank"><span data-dcnode-id="5148" instrument_node="">Ps 36:2</span></a><span data-dcnode-id="5146" instrument_node="">).</span></li><span data-dcnode-id="5144" instrument_node="">
</span><li data-dcnode-id="5133"><span data-dcnode-id="5143" instrument_node="">The Bible declares the joy of the hypocrite is short (</span><a class="rtBibleRef" data-dcnode-id="5141" data-purpose="bible-reference" data-reference="Job 20.4-7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Job%252020.4-7" rel="noopener" target="_blank"><span data-dcnode-id="5142" instrument_node="">Job 20:4-7</span></a><span data-dcnode-id="5140" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="5138" data-purpose="bible-reference" data-reference="Job 27.8" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Job%252027.8" rel="noopener" target="_blank"><span data-dcnode-id="5139" instrument_node="">27:8</span></a><span data-dcnode-id="5137" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="5135" data-purpose="bible-reference" data-reference="Num 32.23" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Num%252032.23" rel="noopener" target="_blank"><span data-dcnode-id="5136" instrument_node="">Num 32:23</span></a><span data-dcnode-id="5134" instrument_node="">).</span></li><span data-dcnode-id="5132" instrument_node="">
</span><li data-dcnode-id="5121"><span data-dcnode-id="5131" instrument_node="">God sends gladness, but they sin by ungratefulness (</span><a class="rtBibleRef" data-dcnode-id="5129" data-purpose="bible-reference" data-reference="Acts 14.17" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252014.17" rel="noopener" target="_blank"><span data-dcnode-id="5130" instrument_node="">Acts 14:17</span></a><span data-dcnode-id="5128" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="5126" data-purpose="bible-reference" data-reference="Ps 4.7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%25204.7" rel="noopener" target="_blank"><span data-dcnode-id="5127" instrument_node="">Ps 4:7</span></a><span data-dcnode-id="5125" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="5123" data-purpose="bible-reference" data-reference="Matt 5.45" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Matt%25205.45" rel="noopener" target="_blank"><span data-dcnode-id="5124" instrument_node="">Mat 5:45</span></a><span data-dcnode-id="5122" instrument_node="">).</span></li><span data-dcnode-id="5120" instrument_node="">

</span><li data-dcnode-id="4845"><span data-dcnode-id="4852" instrument_node="">He delighted to do God’s will, for it is perfect happiness (</span><a class="rtBibleRef" data-dcnode-id="4850" data-purpose="bible-reference" data-reference="Ps 40.6-10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252040.6-10" rel="noopener" target="_blank"><span data-dcnode-id="4851" instrument_node="">Ps 40:6-10</span></a><span data-dcnode-id="4849" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="4847" data-purpose="bible-reference" data-reference="Heb 10.5-9" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Heb%252010.5-9" rel="noopener" target="_blank"><span data-dcnode-id="4848" instrument_node="">Heb 10:5-9</span></a><span data-dcnode-id="4846" instrument_node="">).</span></li><span data-dcnode-id="4844" instrument_node="">
</span><li data-dcnode-id="4839"><span data-dcnode-id="4843" instrument_node="">He was glad whenever He could magnify God by His great works (</span><a class="rtBibleRef" data-dcnode-id="4841" data-purpose="bible-reference" data-reference="John 11.15" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/John%252011.15" rel="noopener" target="_blank"><span data-dcnode-id="4842" instrument_node="">John 11:15</span></a><span data-dcnode-id="4840" instrument_node="">).</span></li><span data-dcnode-id="4838" instrument_node="">
</span><li data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">Regardless of the devil’s recorded and unrecorded temptations, He chose His God.</span></li><span data-dcnode-id="4835" instrument_node="">

</span><li data-dcnode-id="4816"><span data-dcnode-id="4830" instrument_node="">This holy example of His joy should guide and preserve our own souls (</span><a class="rtBibleRef" data-dcnode-id="4828" data-purpose="bible-reference" data-reference="Heb 12.1-4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Heb%252012.1-4" rel="noopener" target="_blank"><span data-dcnode-id="4829" instrument_node="">Heb 12:1-4</span></a><span data-dcnode-id="4827" instrument_node="">).

</span><li data-dcnode-id="4820"><span data-dcnode-id="4822" instrument_node="">Hebrews 11</span><span data-dcnode-id="4821" instrument_node=""> gave a great stadium of witnesses, but look to the example of Jesus.</span></li><span data-dcnode-id="4819" instrument_node="">
