</span></ol><span data-dcnode-id="1268" instrument_node="">
</span></li><span data-dcnode-id="1266" instrument_node="">
</span><li data-dcnode-id="1247"><em data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Envy</span></em><span data-dcnode-id="1263" instrument_node=""> is a horrible disease inside that will not let you rest content as you (</span><a class="rtBibleRef" data-dcnode-id="1261" data-purpose="bible-reference" data-reference="Prov 27.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252027.4" rel="noopener" target="_blank"><span data-dcnode-id="1262" instrument_node="">Prov 27:4</span></a><span data-dcnode-id="1260" instrument_node="">).
</span><ol data-dcnode-id="1249"><span data-dcnode-id="1259" instrument_node="">
</span><li data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">There will always be someone else in your opinion that has it way better than you.</span></li><span data-dcnode-id="1256" instrument_node="">
</span><li data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">If you walk with God and use what He has given you, no one can be honored more.</span></li><span data-dcnode-id="1253" instrument_node="">
</span><li data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Envy only hurts you, because if known by others actually encourages their pride.</span></li><span data-dcnode-id="1250" instrument_node="">
</span></ol><span data-dcnode-id="1248" instrument_node="">
</span></li><span data-dcnode-id="1246" instrument_node="">
</span><li data-dcnode-id="1182"><em data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Covetousness</span></em><span data-dcnode-id="1243" instrument_node=""> is a horrible disease that will not let you be content with your things.
</span><ol data-dcnode-id="1184"><span data-dcnode-id="1242" instrument_node="">
</span><li data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">This lose-lose perspective cannot have what it wants and turns to hate what it has.</span></li><span data-dcnode-id="1239" instrument_node="">
</span><li data-dcnode-id="1234"><span data-dcnode-id="1238" instrument_node="">The Bible is clear that you can learn to be content with what you have (</span><a class="rtBibleRef" data-dcnode-id="1236" data-purpose="bible-reference" data-reference="Phil 4.11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Phil%25204.11" rel="noopener" target="_blank"><span data-dcnode-id="1237" instrument_node="">Phil 4:11</span></a><span data-dcnode-id="1235" instrument_node="">).</span></li><span data-dcnode-id="1233" instrument_node="">
</span><li data-dcnode-id="1228"><span data-dcnode-id="1232" instrument_node="">Once you learn contentment, great gain will come by adding godliness (</span><a class="rtBibleRef" data-dcnode-id="1230" data-purpose="bible-reference" data-reference="1 Tim 6.6" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Tim%25206.6" rel="noopener" target="_blank"><span data-dcnode-id="1231" instrument_node="">I Tim 6:6</span></a><span data-dcnode-id="1229" instrument_node="">).</span></li><span data-dcnode-id="1227" instrument_node="">
</span><li data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">I can’t get no satisfaction, the world screams; they show the resulting dysfunction.</span></li><span data-dcnode-id="1224" instrument_node="">
</span><li data-dcnode-id="1213"><span data-dcnode-id="1223" instrument_node="">Wandering desires kill the slothful (</span><a class="rtBibleRef" data-dcnode-id="1221" data-purpose="bible-reference" data-reference="Eccles 6.7-9" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25206.7-9" rel="noopener" target="_blank"><span data-dcnode-id="1222" instrument_node="">Eccl 6:7-9</span></a><span data-dcnode-id="1220" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="1218" data-purpose="bible-reference" data-reference="Prov 21.25-26" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252021.25-26" rel="noopener" target="_blank"><span data-dcnode-id="1219" instrument_node="">Prov 21:25-26</span></a><span data-dcnode-id="1217" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="1215" data-purpose="bible-reference" data-reference="1 Tim 6.9-10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Tim%25206.9-10" rel="noopener" target="_blank"><span data-dcnode-id="1216" instrument_node="">I Tim 6:9-10</span></a><span data-dcnode-id="1214" instrument_node="">).</span></li><span data-dcnode-id="1212" instrument_node="">
</span><li data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Discontentment with what you have is vanity and vexation of spirit you generate.</span></li><span data-dcnode-id="1209" instrument_node="">
</span><li data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Every second you think about things you do not have and crave to have them …</span></li><span data-dcnode-id="1206" instrument_node="">
</span><li data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">You lose that second of joy and satisfaction from the things you do have from God.</span></li><span data-dcnode-id="1203" instrument_node="">
</span><li data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">You degrade the value and pleasure of what you have by comparing it to a fantasy.</span></li><span data-dcnode-id="1200" instrument_node="">
</span><li data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">You waste limited energy and time in a direction that cannot provide satisfaction.</span></li><span data-dcnode-id="1197" instrument_node="">
</span><li data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">You frustrate yourself into a maniac like Amnon, craving things you cannot have.</span></li><span data-dcnode-id="1194" instrument_node="">
</span><li data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">You deceive yourself by idealizing what you do not have by your ignorance of it.</span></li><span data-dcnode-id="1191" instrument_node="">
</span><li data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">You fret against the Lord, for He ordained what you have, grieving the Holy Spirit.</span></li><span data-dcnode-id="1188" instrument_node="">
</span><li data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Apply this point – are you discontented with your job, wife, house, car, body, etc.?</span></li><span data-dcnode-id="1185" instrument_node="">
</span></ol><span data-dcnode-id="1183" instrument_node="">
</span></li><span data-dcnode-id="1181" instrument_node="">
</span><li data-dcnode-id="1165"><em data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Joel Osteen’s ideas</span></em><span data-dcnode-id="1178" instrument_node=""> only work if you are a millionaire television personality like him.
</span><ol data-dcnode-id="1167"><span data-dcnode-id="1177" instrument_node="">
</span><li data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">God has not made every child of His to be a “winner,” a “star,” or a “champion.”</span></li><span data-dcnode-id="1174" instrument_node="">
</span><li data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Books like, Your Best Life Now, are prosperity gospel lies from the pit of hell.</span></li><span data-dcnode-id="1171" instrument_node="">
</span><li data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Of course he grins all the way to the bank every day due to fawning sycophants.</span></li><span data-dcnode-id="1168" instrument_node="">
</span></ol><span data-dcnode-id="1166" instrument_node="">
</span></li><span data-dcnode-id="1164" instrument_node="">
</span><li data-dcnode-id="1148"><em data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Extreme goals</span></em><span data-dcnode-id="1161" instrument_node=""> for your life are counterproductive in that they destroy productive zeal.
</span><ol data-dcnode-id="1150"><span data-dcnode-id="1160" instrument_node="">
</span><li data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">If your goals are too high, you will force yourself into failure, which brings guilt.</span></li><span data-dcnode-id="1157" instrument_node="">
</span><li data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">High goals are worthless without achievement; lower goals achieved are better.</span></li><span data-dcnode-id="1154" instrument_node="">
</span><li data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Goals too high for you or family reduce effort by discouragement or hopelessness.</span></li><span data-dcnode-id="1151" instrument_node="">
</span></ol><span data-dcnode-id="1149" instrument_node="">
</span></li><span data-dcnode-id="1147" instrument_node="">
</span><li data-dcnode-id="1110"><em data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Fear</span></em><span data-dcnode-id="1144" instrument_node=""> is an enemy of happiness in that it steals joy from the present by the unknown.
</span><ol data-dcnode-id="1112"><span data-dcnode-id="1143" instrument_node="">
</span><li data-dcnode-id="1135"><span data-dcnode-id="1142" instrument_node="">David gave good advice by declaring against very great fears (</span><a class="rtBibleRef" data-dcnode-id="1140" data-purpose="bible-reference" data-reference="Ps 27.1-5" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252027.1-5" rel="noopener" target="_blank"><span data-dcnode-id="1141" instrument_node="">Ps 27:1-5</span></a><span data-dcnode-id="1139" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="1137" data-purpose="bible-reference" data-reference="Ps 46.1-3" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252046.1-3" rel="noopener" target="_blank"><span data-dcnode-id="1138" instrument_node="">46:1-3</span></a><span data-dcnode-id="1136" instrument_node="">).</span></li><span data-dcnode-id="1134" instrument_node="">
</span><li data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Some fear is good, because it keeps you from exposing yourself to hurtful danger.</span></li><span data-dcnode-id="1131" instrument_node="">
</span><li data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Much fear is worthless, because you dread things you have heard or imagined.</span></li><span data-dcnode-id="1128" instrument_node="">
</span><li data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">The news media has only a few things that sell newspapers, and fear is a big one.</span></li><span data-dcnode-id="1125" instrument_node="">
</span><li data-dcnode-id="1117"><span data-dcnode-id="1124" instrument_node="">God has not given us the spirit of fear, like so many have (</span><a class="rtBibleRef" data-dcnode-id="1122" data-purpose="bible-reference" data-reference="2 Tim 1.7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Tim%25201.7" rel="noopener" target="_blank"><span data-dcnode-id="1123" instrument_node="">II Tim 1:7</span></a><span data-dcnode-id="1121" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="1119" data-purpose="bible-reference" data-reference="Luke 12.4-5" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Luke%252012.4-5" rel="noopener" target="_blank"><span data-dcnode-id="1120" instrument_node="">Luk 12:4-5</span></a><span data-dcnode-id="1118" instrument_node="">).</span></li><span data-dcnode-id="1116" instrument_node="">
</span><li data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Never before have so many fear-mongers had so much ability to reach so many.</span></li><span data-dcnode-id="1113" instrument_node="">
</span></ol><span data-dcnode-id="1111" instrument_node="">
</span></li><span data-dcnode-id="1109" instrument_node="">
</span><li data-dcnode-id="1096"><em data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Pain</span></em><span data-dcnode-id="1106" instrument_node=""> is an enemy of happiness in that it steals joy from the present by distraction.
</span><ol data-dcnode-id="1098"><span data-dcnode-id="1105" instrument_node="">
</span><li data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Some pain is real, and you need to use whatever means you can to get rid of it.</span></li><span data-dcnode-id="1102" instrument_node="">
</span><li data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Some pain is self-imposed, and you need to change your attitude to get rid of it.</span></li><span data-dcnode-id="1099" instrument_node="">
</span></ol><span data-dcnode-id="1097" instrument_node="">
</span></li><span data-dcnode-id="1095" instrument_node="">
</span><li data-dcnode-id="1071"><em data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Children are a burden</span></em><span data-dcnode-id="1092" instrument_node="">, and saying so is not a criticism of them, but of the carefulness.
</span><ol data-dcnode-id="1073"><span data-dcnode-id="1091" instrument_node="">
</span><li data-dcnode-id="1086"><span data-dcnode-id="1090" instrument_node="">God would have us to be without carefulness, including marriage (</span><a class="rtBibleRef" data-dcnode-id="1088" data-purpose="bible-reference" data-reference="1 Cor 7.28-35" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Cor%25207.28-35" rel="noopener" target="_blank"><span data-dcnode-id="1089" instrument_node="">I Cor 7:28-35</span></a><span data-dcnode-id="1087" instrument_node="">).</span></li><span data-dcnode-id="1085" instrument_node="">
</span><li data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">God has not charged you with replenishing the earth, for it is already replenished.</span></li><span data-dcnode-id="1082" instrument_node="">
</span><li data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Consider the strict birth control of Elijah, John, Jesus, Anna, Paul, and other saints.</span></li><span data-dcnode-id="1079" instrument_node="">
</span><li data-dcnode-id="1075"><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letgodbetrue.com/sermons/index/year-2003/family-planning/"><span data-dcnode-id="1078" instrument_node="">Family planning </span></a><span data-dcnode-id="1076" instrument_node="">PowerPoint slides.</span></li><span data-dcnode-id="1074" instrument_node="">
</span></ol><span data-dcnode-id="1072" instrument_node="">
</span></li><span data-dcnode-id="1070" instrument_node="">
</span><li data-dcnode-id="1039"><em data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Feelings</span></em><span data-dcnode-id="1067" instrument_node=""> are the ruin of genuine happiness, even if you think happiness is a feeling.
</span><ol data-dcnode-id="1041"><span data-dcnode-id="1066" instrument_node="">
</span><li data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Ruling your spirit is key to real happiness, and feelings cannot rule your spirit.</span></li><span data-dcnode-id="1063" instrument_node="">
</span><li data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Once you let feelings dictate your mood or outlook, they will tear you down often.</span></li><span data-dcnode-id="1060" instrument_node="">
</span><li data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Feelings that flow from faith and godly conduct are genuine and can last a lifetime.</span></li><span data-dcnode-id="1057" instrument_node="">
</span><li data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Living on feelings rather than faith is a sure way to get in trouble with depression.</span></li><span data-dcnode-id="1054" instrument_node="">
</span><li data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Those who love pleasure more than God will exalt feelings out of their right place.</span></li><span data-dcnode-id="1051" instrument_node="">
</span><li data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">God does not care if you feel like obeying or not; He demands and expects it.</span></li><span data-dcnode-id="1048" instrument_node="">
</span><li data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">When feelings are exalted too highly, the initial feelings of depression are accommodated when they should be blown away in disgust and discipline.</span></li><span data-dcnode-id="1045" instrument_node="">
</span><li data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Good Christians have feelings, as exuberant joy, but they follow faith, not lead it.</span></li><span data-dcnode-id="1042" instrument_node="">
</span></ol><span data-dcnode-id="1040" instrument_node="">
</span></li><span data-dcnode-id="1038" instrument_node="">
</span><li data-dcnode-id="1031"><em data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Overstaying</span></em><span data-dcnode-id="1035" instrument_node=""> visits … emails … texts … phone calls … (</span><a class="rtBibleRef" data-dcnode-id="1033" data-purpose="bible-reference" data-reference="Prov 25.17" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252025.17" rel="noopener" target="_blank"><span data-dcnode-id="1034" instrument_node="">Pr 25:17</span></a><span data-dcnode-id="1032" instrument_node="">) … steal others’ joy.</span></li><span data-dcnode-id="1030" instrument_node="">
</span><li data-dcnode-id="1005"><em data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Bitterness</span></em><span data-dcnode-id="1027" instrument_node=""> will devour the soul and restrict ordinary love and its consequent blessings.
</span><ol data-dcnode-id="1007"><span data-dcnode-id="1026" instrument_node="">
</span><li data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Bitterness results from unresolved offences, which you could have easily forgiven.</span></li><span data-dcnode-id="1023" instrument_node="">
</span><li data-dcnode-id="1015"><span data-dcnode-id="1022" instrument_node="">God condemns bitterness as devilish confusion from hell (</span><a class="rtBibleRef" data-dcnode-id="1020" data-purpose="bible-reference" data-reference="James 3.14-16" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/James%25203.14-16" rel="noopener" target="_blank"><span data-dcnode-id="1021" instrument_node="">Jas 3:14-16</span></a><span data-dcnode-id="1019" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="1017" data-purpose="bible-reference" data-reference="Eph 4.31" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eph%25204.31" rel="noopener" target="_blank"><span data-dcnode-id="1018" instrument_node="">Eph 4:31</span></a><span data-dcnode-id="1016" instrument_node="">).</span></li><span data-dcnode-id="1014" instrument_node="">
</span><li data-dcnode-id="1009"><span data-dcnode-id="1013" instrument_node="">For more about </span><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letgodbetrue.com/sermons/index/year-2000/bitterness-will-destroy-you/"><span data-dcnode-id="1012" instrument_node="">bitterness</span></a><span data-dcnode-id="1010" instrument_node="">.</span></li><span data-dcnode-id="1008" instrument_node="">
</span></ol><span data-dcnode-id="1006" instrument_node="">
</span></li><span data-dcnode-id="1004" instrument_node="">
</span><li data-dcnode-id="991"><em data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Spoiled</span></em><span data-dcnode-id="1001" instrument_node=""> … too much … fun … activities … flattery … school … friends … ease, etc.
</span><ol data-dcnode-id="993"><span data-dcnode-id="1000" instrument_node="">
</span><li data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Your perception and perspective will be perverted by an imbalance in these things.</span></li><span data-dcnode-id="997" instrument_node="">
</span><li data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Life is hard and requires work, yet with a right attitude it is a challenge and joy.</span></li><span data-dcnode-id="994" instrument_node="">
</span></ol><span data-dcnode-id="992" instrument_node="">
</span></li><span data-dcnode-id="990" instrument_node="">
</span><li data-dcnode-id="976"><span data-dcnode-id="989" instrument_node="">A </span><em data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">cycle</span></em><span data-dcnode-id="986" instrument_node=""> of discouragement, depression, or self-pity is the choice of an indulgent infant.
</span><ol data-dcnode-id="978"><span data-dcnode-id="985" instrument_node="">
</span><li data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Once a negative thought or event occurs, the weak/wicked mull themselves down.</span></li><span data-dcnode-id="982" instrument_node="">
</span><li data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Excessive introversion, and it does not take much, is a great blight among men.</span></li><span data-dcnode-id="979" instrument_node="">
</span></ol><span data-dcnode-id="977" instrument_node="">
</span></li><span data-dcnode-id="975" instrument_node="">
</span><li data-dcnode-id="940"><span data-dcnode-id="974" instrument_node="">A </span><em data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">great loss</span></em><span data-dcnode-id="971" instrument_node=""> can often trigger the emotional response that leads to a despondent spirit.
</span><ol data-dcnode-id="942"><span data-dcnode-id="970" instrument_node="">
</span><li data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">It is too bad for this effeminate generation that the loss is often ridiculously trivial.</span></li><span data-dcnode-id="967" instrument_node="">
</span><li data-dcnode-id="962"><span data-dcnode-id="966" instrument_node="">The Shunamite woman was grieved in her heart after losing her son (</span><a class="rtBibleRef" data-dcnode-id="964" data-purpose="bible-reference" data-reference="2 Kings 4.27" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Kings%25204.27" rel="noopener" target="_blank"><span data-dcnode-id="965" instrument_node="">II Kgs 4:27</span></a><span data-dcnode-id="963" instrument_node="">).</span></li><span data-dcnode-id="961" instrument_node="">
</span><li data-dcnode-id="956"><span data-dcnode-id="960" instrument_node="">The Bible allows being cast down, but we should not be destroyed (</span><a class="rtBibleRef" data-dcnode-id="958" data-purpose="bible-reference" data-reference="2 Cor 4.7-10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Cor%25204.7-10" rel="noopener" target="_blank"><span data-dcnode-id="959" instrument_node="">II Cor 4:7-10</span></a><span data-dcnode-id="957" instrument_node="">).</span></li><span data-dcnode-id="955" instrument_node="">
</span><li data-dcnode-id="950"><span data-dcnode-id="954" instrument_node="">We should respond like Job, combining mourning with true worship (</span><a class="rtBibleRef" data-dcnode-id="952" data-purpose="bible-reference" data-reference="Job 1.20-22" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Job%25201.20-22" rel="noopener" target="_blank"><span data-dcnode-id="953" instrument_node="">Job 1:20-22</span></a><span data-dcnode-id="951" instrument_node="">).</span></li><span data-dcnode-id="949" instrument_node="">
</span><li data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Large losses can cause anxiety attacks and/or lead to discouragement e.g. losing a spouse, health, relative, limb, friend, investment, marriage, child, job, etc.</span></li><span data-dcnode-id="946" instrument_node="">
</span><li data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">The prayer of serenity works well here with the two categories of human trouble.</span></li><span data-dcnode-id="943" instrument_node="">
</span></ol><span data-dcnode-id="941" instrument_node="">
</span></li><span data-dcnode-id="939" instrument_node="">
</span><li data-dcnode-id="908"><em data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Life itself</span></em><span data-dcnode-id="936" instrument_node=""> and in general can sometimes seem quite hopeless and depressing, for it is!
</span><ol data-dcnode-id="910"><span data-dcnode-id="935" instrument_node="">
</span><li data-dcnode-id="921"><span data-dcnode-id="934" instrument_node="">Solomon said that life was vain and a vexation of spirit (</span><a class="rtBibleRef" data-dcnode-id="932" data-purpose="bible-reference" data-reference="Eccles 1.14" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25201.14" rel="noopener" target="_blank"><span data-dcnode-id="933" instrument_node="">Eccl 1:14</span></a><span data-dcnode-id="931" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="929" data-purpose="bible-reference" data-reference="Eccl 2.17" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccl%25202.17" rel="noopener" target="_blank"><span data-dcnode-id="930" instrument_node="">2:17</span></a><span data-dcnode-id="928" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="926" data-purpose="bible-reference" data-reference="Eccl 2.26" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccl%25202.26" rel="noopener" target="_blank"><span data-dcnode-id="927" instrument_node="">26</span></a><span data-dcnode-id="925" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="923" data-purpose="bible-reference" data-reference="Eccl 4.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccl%25204.4" rel="noopener" target="_blank"><span data-dcnode-id="924" instrument_node="">4:4</span></a><span data-dcnode-id="922" instrument_node="">).</span></li><span data-dcnode-id="920" instrument_node="">
</span><li data-dcnode-id="915"><span data-dcnode-id="919" instrument_node="">Paul said that we were made subject to this vanity against our wills (</span><a class="rtBibleRef" data-dcnode-id="917" data-purpose="bible-reference" data-reference="Rom 8.18-23" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rom%25208.18-23" rel="noopener" target="_blank"><span data-dcnode-id="918" instrument_node="">Rom 8:18-23</span></a><span data-dcnode-id="916" instrument_node="">).</span></li><span data-dcnode-id="914" instrument_node="">
</span><li data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Set your affection on things above, for too much horizontal hope will deceive you.</span></li><span data-dcnode-id="911" instrument_node="">
</span></ol><span data-dcnode-id="909" instrument_node="">
</span></li><span data-dcnode-id="907" instrument_node="">
</span><li data-dcnode-id="864"><em data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Devil oppression</span></em><span data-dcnode-id="904" instrument_node=""> can ruin a man’s spirit (</span><a class="rtBibleRef" data-dcnode-id="902" data-purpose="bible-reference" data-reference="1 Sam 16.14" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Sam%252016.14" rel="noopener" target="_blank"><span data-dcnode-id="903" instrument_node="">I Sam 16:14</span></a><span data-dcnode-id="901" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="899" data-purpose="bible-reference" data-reference="I Sam 16.23" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/I%2520Sam%252016.23" rel="noopener" target="_blank"><span data-dcnode-id="900" instrument_node="">23</span></a><span data-dcnode-id="898" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="896" data-purpose="bible-reference" data-reference="I Sam 18.10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/I%2520Sam%252018.10" rel="noopener" target="_blank"><span data-dcnode-id="897" instrument_node="">18:10</span></a><span data-dcnode-id="895" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="893" data-purpose="bible-reference" data-reference="I Sam 19.9" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/I%2520Sam%252019.9" rel="noopener" target="_blank"><span data-dcnode-id="894" instrument_node="">19:9</span></a><span data-dcnode-id="892" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="890" data-purpose="bible-reference" data-reference="Mark 5.1-5" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Mark%25205.1-5" rel="noopener" target="_blank"><span data-dcnode-id="891" instrument_node="">Mark 5:1-5</span></a><span data-dcnode-id="889" instrument_node="">).
</span><ol data-dcnode-id="866"><span data-dcnode-id="888" instrument_node="">
</span><li data-dcnode-id="880"><span data-dcnode-id="887" instrument_node="">What can you do about this? Walk in the Spirit’s greatness (</span><a class="rtBibleRef" data-dcnode-id="885" data-purpose="bible-reference" data-reference="Eph 5.18" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eph%25205.18" rel="noopener" target="_blank"><span data-dcnode-id="886" instrument_node="">Eph 5:18</span></a><span data-dcnode-id="884" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="882" data-purpose="bible-reference" data-reference="1 John 4.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520John%25204.4" rel="noopener" target="_blank"><span data-dcnode-id="883" instrument_node="">I John 4:4</span></a><span data-dcnode-id="881" instrument_node="">).</span></li><span data-dcnode-id="879" instrument_node="">
</span><li data-dcnode-id="871"><span data-dcnode-id="878" instrument_node="">Do not give the devil a place in your life by bitterness (</span><a class="rtBibleRef" data-dcnode-id="876" data-purpose="bible-reference" data-reference="2 Cor 2.10-11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Cor%25202.10-11" rel="noopener" target="_blank"><span data-dcnode-id="877" instrument_node="">II Co 2:10-11</span></a><span data-dcnode-id="875" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="873" data-purpose="bible-reference" data-reference="Eph 4.26-27" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eph%25204.26-27" rel="noopener" target="_blank"><span data-dcnode-id="874" instrument_node="">Ep 4:26-27</span></a><span data-dcnode-id="872" instrument_node="">).</span></li><span data-dcnode-id="870" instrument_node="">
</span><li data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Pursuit of Jesus Christ will destroy Him by passion and zeal for his Conqueror.</span></li><span data-dcnode-id="867" instrument_node="">
</span></ol><span data-dcnode-id="865" instrument_node="">
</span></li><span data-dcnode-id="863" instrument_node="">
</span><li data-dcnode-id="835"><em data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Family folly</span></em><span data-dcnode-id="860" instrument_node=""> is a heavy burden for men to bear (</span><a class="rtBibleRef" data-dcnode-id="858" data-purpose="bible-reference" data-reference="Gen 26.35" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Gen%252026.35" rel="noopener" target="_blank"><span data-dcnode-id="859" instrument_node="">Ge 26:35</span></a><span data-dcnode-id="857" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="855" data-purpose="bible-reference" data-reference="1 Sam 2.24" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Sam%25202.24" rel="noopener" target="_blank"><span data-dcnode-id="856" instrument_node="">I Sam 2:24</span></a><span data-dcnode-id="854" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="852" data-purpose="bible-reference" data-reference="Prov 10.1" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252010.1" rel="noopener" target="_blank"><span data-dcnode-id="853" instrument_node="">Pr 10:1</span></a><span data-dcnode-id="851" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="849" data-purpose="bible-reference" data-reference="Pr 17.25" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Pr%252017.25" rel="noopener" target="_blank"><span data-dcnode-id="850" instrument_node="">17:25</span></a><span data-dcnode-id="848" instrument_node="">).
</span><ol data-dcnode-id="837"><span data-dcnode-id="847" instrument_node="">
</span><li data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">An important protection or remedy is to train them properly when they are young.</span></li><span data-dcnode-id="844" instrument_node="">
</span><li data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Another means is to keep your priorities and passions on God and not your family.</span></li><span data-dcnode-id="841" instrument_node="">
</span><li data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Remember the bad families of great men and let every man bear his own burden.</span></li><span data-dcnode-id="838" instrument_node="">
</span></ol><span data-dcnode-id="836" instrument_node="">
</span></li><span data-dcnode-id="834" instrument_node="">
</span><li data-dcnode-id="815"><em data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Wisdom</span></em><span data-dcnode-id="831" instrument_node=""> actually becomes a source of depression without faith in God (</span><a class="rtBibleRef" data-dcnode-id="829" data-purpose="bible-reference" data-reference="Eccles 1.14" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25201.14" rel="noopener" target="_blank"><span data-dcnode-id="830" instrument_node="">Eccl 1:14</span></a><span data-dcnode-id="828" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="826" data-purpose="bible-reference" data-reference="Eccl 1.18" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccl%25201.18" rel="noopener" target="_blank"><span data-dcnode-id="827" instrument_node="">18</span></a><span data-dcnode-id="825" instrument_node="">).
</span><ol data-dcnode-id="817"><span data-dcnode-id="824" instrument_node="">
</span><li data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Therefore, recognize that common events bother you because of God’s gift to you.</span></li><span data-dcnode-id="821" instrument_node="">
</span><li data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Be thankful that you can see what the world cannot see and rejoice in His wisdom.</span></li><span data-dcnode-id="818" instrument_node="">
</span></ol><span data-dcnode-id="816" instrument_node="">
</span></li><span data-dcnode-id="814" instrument_node="">
</span><li data-dcnode-id="789"><em data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Talking to yourself</span></em><span data-dcnode-id="811" instrument_node=""> too much. You can talk yourself into depression, anger, envy, etc.
</span><ol data-dcnode-id="791"><span data-dcnode-id="810" instrument_node="">
</span><li data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">A wicked indulgence is day dreaming, introspection, verbalizing your thoughts, time alone, melancholy music, and other habits that lead to downward thinking.</span></li><span data-dcnode-id="807" instrument_node="">
</span><li data-dcnode-id="793"><span data-dcnode-id="806" instrument_node="">David talked to himself (</span><a class="rtBibleRef" data-dcnode-id="804" data-purpose="bible-reference" data-reference="Ps 42.5" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252042.5" rel="noopener" target="_blank"><span data-dcnode-id="805" instrument_node="">Ps 42:5</span></a><span data-dcnode-id="803" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="801" data-purpose="bible-reference" data-reference="Ps 42.11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252042.11" rel="noopener" target="_blank"><span data-dcnode-id="802" instrument_node="">11</span></a><span data-dcnode-id="800" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="798" data-purpose="bible-reference" data-reference="Ps 43.5" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252043.5" rel="noopener" target="_blank"><span data-dcnode-id="799" instrument_node="">43:5</span></a><span data-dcnode-id="797" instrument_node="">), but he ended trusting God (</span><a class="rtBibleRef" data-dcnode-id="795" data-purpose="bible-reference" data-reference="1 Sam 30.6" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Sam%252030.6" rel="noopener" target="_blank"><span data-dcnode-id="796" instrument_node="">I Sam 30:6</span></a><span data-dcnode-id="794" instrument_node="">).</span></li><span data-dcnode-id="792" instrument_node="">
</span></ol><span data-dcnode-id="790" instrument_node="">
</span></li><span data-dcnode-id="788" instrument_node="">
</span><li data-dcnode-id="760"><em data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">The feelings</span></em><span data-dcnode-id="785" instrument_node=""> of depression will come, due to sinful emotions, but how will you react?
</span><ol data-dcnode-id="762"><span data-dcnode-id="784" instrument_node="">
</span><li data-dcnode-id="779"><span data-dcnode-id="783" instrument_node="">They are the feelings of our infirmity, but you can choose to rise above (</span><a class="rtBibleRef" data-dcnode-id="781" data-purpose="bible-reference" data-reference="Ps 77.10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252077.10" rel="noopener" target="_blank"><span data-dcnode-id="782" instrument_node="">Ps 77:10</span></a><span data-dcnode-id="780" instrument_node="">).</span></li><span data-dcnode-id="778" instrument_node="">
</span><li data-dcnode-id="773"><span data-dcnode-id="777" instrument_node="">Paul would not allow the difficulties of his life and spirit to rule him (</span><a class="rtBibleRef" data-dcnode-id="775" data-purpose="bible-reference" data-reference="2 Cor 4.8-9" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Cor%25204.8-9" rel="noopener" target="_blank"><span data-dcnode-id="776" instrument_node="">II Cor 4:8-9</span></a><span data-dcnode-id="774" instrument_node="">).</span></li><span data-dcnode-id="772" instrument_node="">
</span><li data-dcnode-id="764"><span data-dcnode-id="771" instrument_node="">He gloried in his infirmities and told us to do the same (</span><a class="rtBibleRef" data-dcnode-id="769" data-purpose="bible-reference" data-reference="2 Cor 12.9-10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Cor%252012.9-10" rel="noopener" target="_blank"><span data-dcnode-id="770" instrument_node="">II Co 12:9-10</span></a><span data-dcnode-id="768" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="766" data-purpose="bible-reference" data-reference="Rom 5.3-5" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rom%25205.3-5" rel="noopener" target="_blank"><span data-dcnode-id="767" instrument_node="">Rom 5:3-5</span></a><span data-dcnode-id="765" instrument_node="">).</span></li><span data-dcnode-id="763" instrument_node="">
</span></ol><span data-dcnode-id="761" instrument_node="">
</span></li><span data-dcnode-id="759" instrument_node="">
</span><li data-dcnode-id="737"><em data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Thinking your circumstances</span></em><span data-dcnode-id="756" instrument_node="">, temptations, or trials are worse than others is heresy.
</span><ol data-dcnode-id="739"><span data-dcnode-id="755" instrument_node="">
</span><li data-dcnode-id="750"><span data-dcnode-id="754" instrument_node="">The temptations of life are common among men though not apparent (</span><a class="rtBibleRef" data-dcnode-id="752" data-purpose="bible-reference" data-reference="1 Cor 10.13" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Cor%252010.13" rel="noopener" target="_blank"><span data-dcnode-id="753" instrument_node="">I Cor 10:13</span></a><span data-dcnode-id="751" instrument_node="">).</span></li><span data-dcnode-id="749" instrument_node="">
</span><li data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Do not let some self-pitying spirit of defeat try to take you down by appearances.</span></li><span data-dcnode-id="746" instrument_node="">
</span><li data-dcnode-id="741"><span data-dcnode-id="745" instrument_node="">You cannot see the hearts of other men, so forget what you can see (</span><a class="rtBibleRef" data-dcnode-id="743" data-purpose="bible-reference" data-reference="Prov 14.10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252014.10" rel="noopener" target="_blank"><span data-dcnode-id="744" instrument_node="">Prov 14:10</span></a><span data-dcnode-id="742" instrument_node="">).</span></li><span data-dcnode-id="740" instrument_node="">
</span></ol><span data-dcnode-id="738" instrument_node="">
</span></li><span data-dcnode-id="736" instrument_node="">
</span><li data-dcnode-id="723"><em data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">If I choose</span></em><span data-dcnode-id="733" instrument_node=""> to be happy without feeling it, I am a hypocrite, deceiver, Pharisee, etc.
</span><ol data-dcnode-id="725"><span data-dcnode-id="732" instrument_node="">
</span><li data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Such thinking is the product of a mind that is unscrewed from the reality of faith.</span></li><span data-dcnode-id="729" instrument_node="">
</span><li data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Abraham and all great men did things that were based only on faith, not feelings.</span></li><span data-dcnode-id="726" instrument_node="">
</span></ol><span data-dcnode-id="724" instrument_node="">
</span></li><span data-dcnode-id="722" instrument_node="">
</span><li data-dcnode-id="685"><em data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Unrealistic expectations</span></em><span data-dcnode-id="719" instrument_node=""> will discourage and depress the idealistic and foolish person.
</span><ol data-dcnode-id="687"><span data-dcnode-id="718" instrument_node="">
</span><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Setting goals too high is your insane plan to guarantee failure and then depression.</span></li><span data-dcnode-id="715" instrument_node="">
</span><li data-dcnode-id="707"><span data-dcnode-id="714" instrument_node="">Disappointment in accomplishments comes by having goals too high (</span><a class="rtBibleRef" data-dcnode-id="712" data-purpose="bible-reference" data-reference="Prov 13.12" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252013.12" rel="noopener" target="_blank"><span data-dcnode-id="713" instrument_node="">Pr 13:12</span></a><span data-dcnode-id="711" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="709" data-purpose="bible-reference" data-reference="Pr 13.19" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Pr%252013.19" rel="noopener" target="_blank"><span data-dcnode-id="710" instrument_node="">19</span></a><span data-dcnode-id="708" instrument_node="">).</span></li><span data-dcnode-id="706" instrument_node="">
</span><li data-dcnode-id="701"><span data-dcnode-id="705" instrument_node="">The pride of the perfectionist (not principle) rejects mercy and trust (</span><a class="rtBibleRef" data-dcnode-id="703" data-purpose="bible-reference" data-reference="Ps 127.1-2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%2520127.1-2" rel="noopener" target="_blank"><span data-dcnode-id="704" instrument_node="">Ps 127:1-2</span></a><span data-dcnode-id="702" instrument_node="">).</span></li><span data-dcnode-id="700" instrument_node="">
</span><li data-dcnode-id="695"><span data-dcnode-id="699" instrument_node="">Foolish comparisons to others more gifted will cost your reward (</span><a class="rtBibleRef" data-dcnode-id="697" data-purpose="bible-reference" data-reference="Matt 25.14-30" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Matt%252025.14-30" rel="noopener" target="_blank"><span data-dcnode-id="698" instrument_node="">Matt 25:14-30</span></a><span data-dcnode-id="696" instrument_node="">).</span></li><span data-dcnode-id="694" instrument_node="">
</span><li data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Goals too high cannot be kept, will not motivate like lower ones, and force failure.</span></li><span data-dcnode-id="691" instrument_node="">
</span><li data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">This enemy is (a) being too set on a goal/hope, (b) expecting honor and not getting it, (c) putting everything into something, (d) a woman craving a child, (e) parents putting all into children, (f) hoping a lover will return, (g) joining a “perfect” church to find sinners, (h) expecting the pastor to make the difference, and so on.</span></li><span data-dcnode-id="688" instrument_node="">
</span></ol><span data-dcnode-id="686" instrument_node="">
</span></li><span data-dcnode-id="684" instrument_node="">
</span><li data-dcnode-id="659"><em data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Dilemma between alternatives</span></em><span data-dcnode-id="681" instrument_node=""> can hurt those having difficulty making easy decisions.
</span><ol data-dcnode-id="661"><span data-dcnode-id="680" instrument_node="">
</span><li data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">The difficulty is perfectionism, undisciplined mind, or an unmerciful spirit to self.</span></li><span data-dcnode-id="677" instrument_node="">
</span><li data-dcnode-id="672"><span data-dcnode-id="676" instrument_node="">Paul was perplexed at times with big choices, but he did not despair (</span><a class="rtBibleRef" data-dcnode-id="674" data-purpose="bible-reference" data-reference="2 Cor 4.8" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Cor%25204.8" rel="noopener" target="_blank"><span data-dcnode-id="675" instrument_node="">II Cor 4:8</span></a><span data-dcnode-id="673" instrument_node="">).</span></li><span data-dcnode-id="671" instrument_node="">
</span><li data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">We are not perfect; our decisions are of little importance; mercy to self is noble.</span></li><span data-dcnode-id="668" instrument_node="">
</span><li data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">A helpful guide is to ask, what if the worst were to happen, what is the total effect?</span></li><span data-dcnode-id="665" instrument_node="">
</span><li data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">A useful reminder is that most of your choices can be undone with little or no cost.</span></li><span data-dcnode-id="662" instrument_node="">
</span></ol><span data-dcnode-id="660" instrument_node="">
</span></li><span data-dcnode-id="658" instrument_node="">
</span><li data-dcnode-id="654"><em data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Learned conduct</span></em><span data-dcnode-id="655" instrument_node=""> of parents that could not or did not rule their spirits from depression.</span></li><span data-dcnode-id="653" instrument_node="">
</span><li data-dcnode-id="616"><em data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">A wrong perspective</span></em><span data-dcnode-id="650" instrument_node=""> of life considered long enough will eventually bring depression.
</span><ol data-dcnode-id="618"><span data-dcnode-id="649" instrument_node="">
</span><li data-dcnode-id="644"><span data-dcnode-id="648" instrument_node="">Asaph fretted because of sinners and not considering the future (</span><a class="rtBibleRef" data-dcnode-id="646" data-purpose="bible-reference" data-reference="Ps 73.1-24" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252073.1-24" rel="noopener" target="_blank"><span data-dcnode-id="647" instrument_node="">Psalm 73:1-24</span></a><span data-dcnode-id="645" instrument_node="">).</span></li><span data-dcnode-id="643" instrument_node="">
</span><li data-dcnode-id="635"><span data-dcnode-id="642" instrument_node="">Such fretting is ignorant folly, and God warned about it (</span><a class="rtBibleRef" data-dcnode-id="640" data-purpose="bible-reference" data-reference="Ps 37.1-11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252037.1-11" rel="noopener" target="_blank"><span data-dcnode-id="641" instrument_node="">Ps 37:1-11</span></a><span data-dcnode-id="639" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="637" data-purpose="bible-reference" data-reference="Prov 24.19-20" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252024.19-20" rel="noopener" target="_blank"><span data-dcnode-id="638" instrument_node="">Pr 24:19-20</span></a><span data-dcnode-id="636" instrument_node="">).</span></li><span data-dcnode-id="634" instrument_node="">
</span><li data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">An emphasis on the negative rather than the positive is an innate ‘gift’ of some.</span></li><span data-dcnode-id="631" instrument_node="">
</span><li data-dcnode-id="626"><span data-dcnode-id="630" instrument_node="">Even Solomon despaired when he considered the evil of life too much (</span><a class="rtBibleRef" data-dcnode-id="628" data-purpose="bible-reference" data-reference="Eccles 2.20" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25202.20" rel="noopener" target="_blank"><span data-dcnode-id="629" instrument_node="">Ec 2:20</span></a><span data-dcnode-id="627" instrument_node="">).</span></li><span data-dcnode-id="625" instrument_node="">
</span><li data-dcnode-id="620"><span data-dcnode-id="624" instrument_node="">This sin is corrected by lifting and extending the time frame of analysis (</span><a class="rtBibleRef" data-dcnode-id="622" data-purpose="bible-reference" data-reference="Col 3.1-4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Col%25203.1-4" rel="noopener" target="_blank"><span data-dcnode-id="623" instrument_node="">Co 3:1-4</span></a><span data-dcnode-id="621" instrument_node="">).</span></li><span data-dcnode-id="619" instrument_node="">
</span></ol><span data-dcnode-id="617" instrument_node="">
</span></li><span data-dcnode-id="615" instrument_node="">
</span><li data-dcnode-id="584"><em data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Too much dwelling</span></em><span data-dcnode-id="612" instrument_node=""> on the past rather than the present and future is foolish self-pity.
</span><ol data-dcnode-id="586"><span data-dcnode-id="611" instrument_node="">
</span><li data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Of course, these self-pitying, self-righteous introverts call this self-examination.</span></li><span data-dcnode-id="608" instrument_node="">
</span><li data-dcnode-id="600"><span data-dcnode-id="607" instrument_node="">God forgives and forgets, and you must learn to do the same (</span><a class="rtBibleRef" data-dcnode-id="605" data-purpose="bible-reference" data-reference="Ezek 18.21-22" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ezek%252018.21-22" rel="noopener" target="_blank"><span data-dcnode-id="606" instrument_node="">Eze 18:21-22</span></a><span data-dcnode-id="604" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="602" data-purpose="bible-reference" data-reference="Eze 18.27-28" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eze%252018.27-28" rel="noopener" target="_blank"><span data-dcnode-id="603" instrument_node="">27-28</span></a><span data-dcnode-id="601" instrument_node="">).</span></li><span data-dcnode-id="599" instrument_node="">
</span><li data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Considering, fretting, or worrying about the past is a destructive waste of time.</span></li><span data-dcnode-id="596" instrument_node="">
</span><li data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Whatever effect your past has on you right now, change it! You can change things.</span></li><span data-dcnode-id="593" instrument_node="">
</span><li data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">“What am I going to do?” is of much greater importance than “What have I done?”</span></li><span data-dcnode-id="590" instrument_node="">
</span><li data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">“What am I going to make happen?” is better than “What has happened to me?”</span></li><span data-dcnode-id="587" instrument_node="">
</span></ol><span data-dcnode-id="585" instrument_node="">
</span></li><span data-dcnode-id="583" instrument_node="">
</span><li data-dcnode-id="564"><em data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Excess concern for others</span></em><span data-dcnode-id="580" instrument_node=""> and their problems is another “good” cause of depression.
</span><ol data-dcnode-id="566"><span data-dcnode-id="579" instrument_node="">
</span><li data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Of course, there are those that have no real and proactive concern for any others.</span></li><span data-dcnode-id="576" instrument_node="">
</span><li data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">This sin can be a desire to be God that drives men to want to save the human race.</span></li><span data-dcnode-id="573" instrument_node="">
</span><li data-dcnode-id="568"><span data-dcnode-id="572" instrument_node="">You must learn to let others ‘bear their own burden’ and skin their knees (</span><a class="rtBibleRef" data-dcnode-id="570" data-purpose="bible-reference" data-reference="Gal 6.5" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Gal%25206.5" rel="noopener" target="_blank"><span data-dcnode-id="571" instrument_node="">Gal 6:5</span></a><span data-dcnode-id="569" instrument_node="">).</span></li><span data-dcnode-id="567" instrument_node="">
</span></ol><span data-dcnode-id="565" instrument_node="">
</span></li><span data-dcnode-id="563" instrument_node="">
</span></ol><span data-dcnode-id="561" instrument_node="">
</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="559" data-fontsize="15.4" data-lineheight="21.56px" style="--fontSize:15.4; line-height: 1.4; --minFontSize:15.4;"><span data-dcnode-id="560" instrument_node="">Happiness Examination/Suggestions</span></h3><span data-dcnode-id="558" instrument_node="">
</span><ol data-dcnode-id="439" style="list-style-type: upper-alpha;"><span data-dcnode-id="557" instrument_node="">
</span><li data-dcnode-id="554"><em data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">How can you regain or increase this joy in the Lord? Confess your sin, and be happy!</span></em></li><span data-dcnode-id="553" instrument_node="">
</span><li data-dcnode-id="550"><em data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">This comes by reading, meditating, and musing on the Lord Jesus Christ Himself.</span></em></li><span data-dcnode-id="549" instrument_node="">
</span><li data-dcnode-id="546"><em data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">His relationship with God, purpose in life, and hope of glory should instruct you.</span></em></li><span data-dcnode-id="545" instrument_node="">
</span><li data-dcnode-id="539"><em data-dcnode-id="540"><span data-dcnode-id="544" instrument_node="">Eliphaz instructed Job to acquaint himself with God for good blessing (</span><a class="rtBibleRef" data-dcnode-id="542" data-purpose="bible-reference" data-reference="Job 22.21" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Job%252022.21" rel="noopener" target="_blank"><span data-dcnode-id="543" instrument_node="">Job 22:21</span></a><span data-dcnode-id="541" instrument_node="">).</span></em></li><span data-dcnode-id="538" instrument_node="">
</span><li data-dcnode-id="532"><em data-dcnode-id="533"><span data-dcnode-id="537" instrument_node="">David went to the sanctuary and remembered and meditated on God (</span><a class="rtBibleRef" data-dcnode-id="535" data-purpose="bible-reference" data-reference="Ps 63.1-6" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252063.1-6" rel="noopener" target="_blank"><span data-dcnode-id="536" instrument_node="">Ps 63:1-6</span></a><span data-dcnode-id="534" instrument_node="">).</span></em></li><span data-dcnode-id="531" instrument_node="">
</span><li data-dcnode-id="522"><em data-dcnode-id="523"><span data-dcnode-id="530" instrument_node="">Asaph also went to the sanctuary and corrected his perspective (</span><a class="rtBibleRef" data-dcnode-id="528" data-purpose="bible-reference" data-reference="Ps 73.17" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252073.17" rel="noopener" target="_blank"><span data-dcnode-id="529" instrument_node="">Ps 73:17</span></a><span data-dcnode-id="527" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="525" data-purpose="bible-reference" data-reference="Ps 73.25-26" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252073.25-26" rel="noopener" target="_blank"><span data-dcnode-id="526" instrument_node="">25-26</span></a><span data-dcnode-id="524" instrument_node="">).</span></em></li><span data-dcnode-id="521" instrument_node="">
</span><li data-dcnode-id="515"><em data-dcnode-id="516"><span data-dcnode-id="520" instrument_node="">We must take the time and remove the impediments to calm meditation (</span><a class="rtBibleRef" data-dcnode-id="518" data-purpose="bible-reference" data-reference="Ps 46.10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252046.10" rel="noopener" target="_blank"><span data-dcnode-id="519" instrument_node="">Ps 46:10</span></a><span data-dcnode-id="517" instrument_node="">).</span></em></li><span data-dcnode-id="514" instrument_node="">
</span><li data-dcnode-id="508"><em data-dcnode-id="509"><span data-dcnode-id="513" instrument_node="">We can benefit by being around other spiritually minded worshippers (</span><a class="rtBibleRef" data-dcnode-id="511" data-purpose="bible-reference" data-reference="Ps 34.1-2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252034.1-2" rel="noopener" target="_blank"><span data-dcnode-id="512" instrument_node="">Ps 34:1-2</span></a><span data-dcnode-id="510" instrument_node="">).</span></em></li><span data-dcnode-id="507" instrument_node="">
</span><li data-dcnode-id="504"><em data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Obviously here, since it is a command, there needs to be clear and full confession.</span></em></li><span data-dcnode-id="503" instrument_node="">
</span><li data-dcnode-id="500"><em data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Contemplation on the One making the command and the command itself will help.</span></em></li><span data-dcnode-id="499" instrument_node="">
</span><li data-dcnode-id="496"><em data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">The strongest man is the man that can rule his spirit and make this choice for joy.</span></em></li><span data-dcnode-id="495" instrument_node="">
</span><li data-dcnode-id="486"><em data-dcnode-id="487"><span data-dcnode-id="494" instrument_node="">Sins and worldly inputs grieve and quench the Holy Spirit (</span><a class="rtBibleRef" data-dcnode-id="492" data-purpose="bible-reference" data-reference="Eph 4.30" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eph%25204.30" rel="noopener" target="_blank"><span data-dcnode-id="493" instrument_node="">Eph 4:30</span></a><span data-dcnode-id="491" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="489" data-purpose="bible-reference" data-reference="1 Thess 5.19" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Thess%25205.19" rel="noopener" target="_blank"><span data-dcnode-id="490" instrument_node="">I Thes 5:19</span></a><span data-dcnode-id="488" instrument_node="">).</span></em></li><span data-dcnode-id="485" instrument_node="">
</span><li data-dcnode-id="482"><em data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Spiritual inputs and feeding on Jesus Christ and His word will bring joy in power.</span></em></li><span data-dcnode-id="481" instrument_node="">
</span><li data-dcnode-id="478"><em data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">How much are you like Joshua in the tabernacle or the two going to Emmaus?</span></em></li><span data-dcnode-id="477" instrument_node="">
</span><li data-dcnode-id="474"><em data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">We plan, prepare, and participate in feasts, just as He commanded us to fear Him.</span></em></li><span data-dcnode-id="473" instrument_node="">
</span><li data-dcnode-id="470"><em data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">You must slow life enough to taste and see that the Lord is good in many ways.</span></em></li><span data-dcnode-id="469" instrument_node="">
</span><li data-dcnode-id="466"><em data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">As David and Peter wrote, you cannot realize the benefit without obeying the Lord.</span></em></li><span data-dcnode-id="465" instrument_node="">
</span><li data-dcnode-id="462"><em data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Measure all world events by God’s commandments and see their folly and pain.</span></em></li><span data-dcnode-id="461" instrument_node="">
</span><li data-dcnode-id="458"><em data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Each of His commandments has divine wisdom: see it; if blind, believe it anyway.</span></em></li><span data-dcnode-id="457" instrument_node="">
</span><li data-dcnode-id="448"><em data-dcnode-id="449"><span data-dcnode-id="456" instrument_node="">We read, meditate, and comfort one another with the future (</span><a class="rtBibleRef" data-dcnode-id="454" data-purpose="bible-reference" data-reference="1 Thess 4.18" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Thess%25204.18" rel="noopener" target="_blank"><span data-dcnode-id="455" instrument_node="">I Thess 4:18</span></a><span data-dcnode-id="453" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="451" data-purpose="bible-reference" data-reference="I Thess 5.11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/I%2520Thess%25205.11" rel="noopener" target="_blank"><span data-dcnode-id="452" instrument_node="">5:11</span></a><span data-dcnode-id="450" instrument_node="">).</span></em></li><span data-dcnode-id="447" instrument_node="">
</span><li data-dcnode-id="441"><em data-dcnode-id="442"><span data-dcnode-id="446" instrument_node="">We set our affection above, for we know our lives are hid with Christ (</span><a class="rtBibleRef" data-dcnode-id="444" data-purpose="bible-reference" data-reference="Col 3.1-4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Col%25203.1-4" rel="noopener" target="_blank"><span data-dcnode-id="445" instrument_node="">Col 3:1-4</span></a><span data-dcnode-id="443" instrument_node="">).</span></em></li><span data-dcnode-id="440" instrument_node="">
</span></ol><span data-dcnode-id="438" instrument_node="">
</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="436" data-fontsize="15.4" data-lineheight="21.56px" style="--fontSize:15.4; line-height: 1.4; --minFontSize:15.4;"><span data-dcnode-id="437" instrument_node="">Conclusion:</span></h3><span data-dcnode-id="435" instrument_node="">
</span><ol data-dcnode-id="379" style="list-style-type: upper-alpha;"><span data-dcnode-id="434" instrument_node="">
</span><li data-dcnode-id="420"><span data-dcnode-id="433" instrument_node="">There is false joy, which should hardly be considered here, for it cannot work or last to satisfy any.
</span><ol data-dcnode-id="422"><span data-dcnode-id="432" instrument_node="">
</span><li data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">It is the joy of the hypocrite, which is so short, because God will not allow hypocrites to succeed.</span></li><span data-dcnode-id="429" instrument_node="">
</span><li data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">It is the joy of sin for a season, always a very short season, and comes back to bite many ways.</span></li><span data-dcnode-id="426" instrument_node="">
</span><li data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">It is the joy of earthly things only, which the man trying the most called vain and vexing of spirit.</span></li><span data-dcnode-id="423" instrument_node="">
</span></ol><span data-dcnode-id="421" instrument_node="">
</span></li><span data-dcnode-id="419" instrument_node="">
</span><li data-dcnode-id="402"><span data-dcnode-id="418" instrument_node="">Happiness and joy are choices that you make every day – they are truly not results of circumstances.
</span><ol data-dcnode-id="404"><span data-dcnode-id="417" instrument_node="">
</span><li data-dcnode-id="412"><span data-dcnode-id="416" instrument_node="">Consider that Jesus taught for those persecuted to rejoice and be exceeding glad (</span><a class="rtBibleRef" data-dcnode-id="414" data-purpose="bible-reference" data-reference="Matt 5.10-12" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Matt%25205.10-12" rel="noopener" target="_blank"><span data-dcnode-id="415" instrument_node="">Matt 5:10-12</span></a><span data-dcnode-id="413" instrument_node="">).</span></li><span data-dcnode-id="411" instrument_node="">
</span><li data-dcnode-id="406"><span data-dcnode-id="410" instrument_node="">Consider that James taught for those in divers temptations to count the event all joy (</span><a class="rtBibleRef" data-dcnode-id="408" data-purpose="bible-reference" data-reference="James 1.2-4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/James%25201.2-4" rel="noopener" target="_blank"><span data-dcnode-id="409" instrument_node="">Jas 1:2-4</span></a><span data-dcnode-id="407" instrument_node="">).</span></li><span data-dcnode-id="405" instrument_node="">
</span></ol><span data-dcnode-id="403" instrument_node="">
</span></li><span data-dcnode-id="401" instrument_node="">
</span><li data-dcnode-id="396"><span data-dcnode-id="400" instrument_node="">The Lord delivered His people and us from worse than Babylon, and in light of His favor, we should continue asking grace and go forth with precious seed expecting an eventual harvest (</span><a class="rtBibleRef" data-dcnode-id="398" data-purpose="bible-reference" data-reference="Ps 126.1-6" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%2520126.1-6" rel="noopener" target="_blank"><span data-dcnode-id="399" instrument_node="">Ps 126:1-6</span></a><span data-dcnode-id="397" instrument_node="">).</span></li><span data-dcnode-id="395" instrument_node="">
</span><li data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">There is much more about happiness in the Bible if every occurrence of the concept were examined.</span></li><span data-dcnode-id="392" instrument_node="">
</span><li data-dcnode-id="384"><span data-dcnode-id="391" instrument_node="">Learn the choruses, </span><em data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Cheer Up, Ye Saints of God</span></em><span data-dcnode-id="388" instrument_node=""> … and </span><em data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">I’m So Happy and Here’s the Reason Why</span></em><span data-dcnode-id="385" instrument_node="">.</span></li><span data-dcnode-id="383" instrument_node="">
</span><li data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">What are your favorite verses about happiness and joy? Select 3-10 and memorize some of them.</span></li><span data-dcnode-id="380" instrument_node="">
</span></ol><span data-dcnode-id="378" instrument_node="">
