</span></ol><span data-dcnode-id="3069" instrument_node="">
</span></li><span data-dcnode-id="3067" instrument_node="">
</span><li data-dcnode-id="3050"><span data-dcnode-id="3066" instrument_node="">A wounded spirit tears you down from the inside (</span><a class="rtBibleRef" data-dcnode-id="3064" data-purpose="bible-reference" data-reference="Prov 14.30" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252014.30" rel="noopener" target="_blank"><span data-dcnode-id="3065" instrument_node="">Pr 14:30</span></a><span data-dcnode-id="3063" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3061" data-purpose="bible-reference" data-reference="Pr 15.13" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Pr%252015.13" rel="noopener" target="_blank"><span data-dcnode-id="3062" instrument_node="">15:13</span></a><span data-dcnode-id="3060" instrument_node="">,</span><a class="rtBibleRef" data-dcnode-id="3058" data-purpose="bible-reference" data-reference="Pr 15.15" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Pr%252015.15" rel="noopener" target="_blank"><span data-dcnode-id="3059" instrument_node="">15</span></a><span data-dcnode-id="3057" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3055" data-purpose="bible-reference" data-reference="Pr 17.22" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Pr%252017.22" rel="noopener" target="_blank"><span data-dcnode-id="3056" instrument_node="">17:22</span></a><span data-dcnode-id="3054" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3052" data-purpose="bible-reference" data-reference="Pr 18.14" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Pr%252018.14" rel="noopener" target="_blank"><span data-dcnode-id="3053" instrument_node="">18:14</span></a><span data-dcnode-id="3051" instrument_node="">).</span></li><span data-dcnode-id="3049" instrument_node="">
</span><li data-dcnode-id="3032"><span data-dcnode-id="3048" instrument_node="">Bible examples of depression in good and bad men include Jacob (</span><a class="rtBibleRef" data-dcnode-id="3046" data-purpose="bible-reference" data-reference="Gen 37.35" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Gen%252037.35" rel="noopener" target="_blank"><span data-dcnode-id="3047" instrument_node="">Gen 37:35</span></a><span data-dcnode-id="3045" instrument_node="">); Hannah (</span><a class="rtBibleRef" data-dcnode-id="3043" data-purpose="bible-reference" data-reference="1 Sam 1.8" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Sam%25201.8" rel="noopener" target="_blank"><span data-dcnode-id="3044" instrument_node="">I Sam 1:8</span></a><span data-dcnode-id="3042" instrument_node="">); Amnon (</span><a class="rtBibleRef" data-dcnode-id="3040" data-purpose="bible-reference" data-reference="2 Sam 13.1-2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Sam%252013.1-2" rel="noopener" target="_blank"><span data-dcnode-id="3041" instrument_node="">II Sa 13:1-2</span></a><span data-dcnode-id="3039" instrument_node="">); Ahab (</span><a class="rtBibleRef" data-dcnode-id="3037" data-purpose="bible-reference" data-reference="1 Kings 21.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Kings%252021.4" rel="noopener" target="_blank"><span data-dcnode-id="3038" instrument_node="">I Kgs 21:4</span></a><span data-dcnode-id="3036" instrument_node="">); Elijah (</span><a class="rtBibleRef" data-dcnode-id="3034" data-purpose="bible-reference" data-reference="1 Kings 19.1-4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Kings%252019.1-4" rel="noopener" target="_blank"><span data-dcnode-id="3035" instrument_node="">I Kgs 19:1-4</span></a><span data-dcnode-id="3033" instrument_node="">).</span></li><span data-dcnode-id="3031" instrument_node="">
</span></ol><span data-dcnode-id="3029" instrument_node="">
</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="3027" data-fontsize="15.4" data-lineheight="21.56px" style="--fontSize:15.4; line-height: 1.4; --minFontSize:15.4;"><span data-dcnode-id="3028" instrument_node="">Happiness Helpers</span></h3><span data-dcnode-id="3026" instrument_node="">
</span><ol data-dcnode-id="1788" style="list-style-type: upper-alpha;"><span data-dcnode-id="3025" instrument_node="">
</span><li data-dcnode-id="2931"><span data-dcnode-id="3024" instrument_node="">The first and foremost helper is </span><em data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">God Himself</span></em><span data-dcnode-id="3021" instrument_node="">, Who is happy and can make you happy!
</span><ol data-dcnode-id="2933"><span data-dcnode-id="3020" instrument_node="">
</span><li data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">To the degree you compromise your relationship with Him is the degree you hurt.</span></li><span data-dcnode-id="3017" instrument_node="">
</span><li data-dcnode-id="3006"><span data-dcnode-id="3016" instrument_node="">He is a great king, and He deserves and expects your best (</span><a class="rtBibleRef" data-dcnode-id="3014" data-purpose="bible-reference" data-reference="Mal 1.14" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Mal%25201.14" rel="noopener" target="_blank"><span data-dcnode-id="3015" instrument_node="">Mal 1:14</span></a><span data-dcnode-id="3013" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3011" data-purpose="bible-reference" data-reference="Rev 2.4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rev%25202.4" rel="noopener" target="_blank"><span data-dcnode-id="3012" instrument_node="">Re 2:4</span></a><span data-dcnode-id="3010" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="3008" data-purpose="bible-reference" data-reference="Re 3.16" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Re%25203.16" rel="noopener" target="_blank"><span data-dcnode-id="3009" instrument_node="">3:16</span></a><span data-dcnode-id="3007" instrument_node="">).</span></li><span data-dcnode-id="3005" instrument_node="">
</span><li data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">In your flesh you will never appreciate this point, yet it is by far the most essential.</span></li><span data-dcnode-id="3002" instrument_node="">
</span><li data-dcnode-id="2997"><span data-dcnode-id="3001" instrument_node="">The Bible is an </span><em data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">if … then</span></em><span data-dcnode-id="2998" instrument_node=""> handbook for God’s blessings in this life and eternal life.</span></li><span data-dcnode-id="2996" instrument_node="">
</span><li data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">Your fellowship with God includes your relationship to His word, worship, people.</span></li><span data-dcnode-id="2993" instrument_node="">
</span><li data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">In the material above is plenty of reminders how fellowship with God is happiness.</span></li><span data-dcnode-id="2990" instrument_node="">
</span><li data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">Much has been preached and written on this basic point here and many other times.</span></li><span data-dcnode-id="2987" instrument_node="">
</span><li data-dcnode-id="2983"><span data-dcnode-id="2986" instrument_node="">See points above: </span><em data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">Knowing God … Obeying God’s Word … Knowing the Gospel.</span></em></li><span data-dcnode-id="2982" instrument_node="">
</span><li data-dcnode-id="2968"><span data-dcnode-id="2981" instrument_node="">Obedience is your life of blessing (</span><a class="rtBibleRef" data-dcnode-id="2979" data-purpose="bible-reference" data-reference="Deut 32.46-47" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Deut%252032.46-47" rel="noopener" target="_blank"><span data-dcnode-id="2980" instrument_node="">De 32:46-47</span></a><span data-dcnode-id="2978" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2976" data-purpose="bible-reference" data-reference="Ps 34.12-16" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252034.12-16" rel="noopener" target="_blank"><span data-dcnode-id="2977" instrument_node="">Ps 34:12-16</span></a><span data-dcnode-id="2975" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2973" data-purpose="bible-reference" data-reference="Ps 84.11" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252084.11" rel="noopener" target="_blank"><span data-dcnode-id="2974" instrument_node="">84:11</span></a><span data-dcnode-id="2972" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2970" data-purpose="bible-reference" data-reference="Mal 3.10-12" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Mal%25203.10-12" rel="noopener" target="_blank"><span data-dcnode-id="2971" instrument_node="">Mal 3:10-12</span></a><span data-dcnode-id="2969" instrument_node="">).</span></li><span data-dcnode-id="2967" instrument_node="">
</span><li data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">Self-examination is a command and necessity; consider your ways to turn to Him.</span></li><span data-dcnode-id="2964" instrument_node="">
</span><li data-dcnode-id="2956"><span data-dcnode-id="2963" instrument_node="">Confess sins, or you hurt you and beg God to chasten (</span><a class="rtBibleRef" data-dcnode-id="2961" data-purpose="bible-reference" data-reference="Job 33.27-28" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Job%252033.27-28" rel="noopener" target="_blank"><span data-dcnode-id="2962" instrument_node="">Job 33:27-28</span></a><span data-dcnode-id="2960" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2958" data-purpose="bible-reference" data-reference="1 Thess 5.19" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Thess%25205.19" rel="noopener" target="_blank"><span data-dcnode-id="2959" instrument_node="">I Thess 5:19</span></a><span data-dcnode-id="2957" instrument_node="">).</span></li><span data-dcnode-id="2955" instrument_node="">
</span><li data-dcnode-id="2950"><span data-dcnode-id="2954" instrument_node="">Do the first works after you remember and repent from where you were (</span><a class="rtBibleRef" data-dcnode-id="2952" data-purpose="bible-reference" data-reference="Rev 2.5" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rev%25202.5" rel="noopener" target="_blank"><span data-dcnode-id="2953" instrument_node="">Rev 2:5</span></a><span data-dcnode-id="2951" instrument_node="">).</span></li><span data-dcnode-id="2949" instrument_node="">
</span><li data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">God sent His Son as His greatest gift to you and any life that is not Christ-centered will cost you the greatest source of joy and God’s disfavor for neglecting His Son.</span></li><span data-dcnode-id="2946" instrument_node="">
</span><li data-dcnode-id="2941"><span data-dcnode-id="2945" instrument_node="">God gives joy, peace, and hope in believing by Holy Ghost power (</span><a class="rtBibleRef" data-dcnode-id="2943" data-purpose="bible-reference" data-reference="Rom 15.13" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rom%252015.13" rel="noopener" target="_blank"><span data-dcnode-id="2944" instrument_node="">Ro 15:13</span></a><span data-dcnode-id="2942" instrument_node="">), for He is the God of hope, mercy, and all comfort, and He is also the God of great joy.</span></li><span data-dcnode-id="2940" instrument_node="">
</span><li data-dcnode-id="2935"><span data-dcnode-id="2939" instrument_node="">For maxing your </span><a data-dcnode-id="2937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letgodbetrue.com/sermons/index/year-2012/walking-with-god/"><span data-dcnode-id="2938" instrument_node="">walk with God</span></a><span data-dcnode-id="2936" instrument_node="">&nbsp;.</span></li><span data-dcnode-id="2934" instrument_node="">
</span></ol><span data-dcnode-id="2932" instrument_node="">
</span></li><span data-dcnode-id="2930" instrument_node="">
</span><li data-dcnode-id="2868"><span data-dcnode-id="2929" instrument_node="">You must choose to </span><em data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">rule your own spirit</span></em><span data-dcnode-id="2926" instrument_node="">, for it will try to take you down, so grow up!
</span><ol data-dcnode-id="2870"><span data-dcnode-id="2925" instrument_node="">
</span><li data-dcnode-id="2920"><span data-dcnode-id="2924" instrument_node="">A man’s spirit can sustain him, even natural men, but you must rule it (</span><a class="rtBibleRef" data-dcnode-id="2922" data-purpose="bible-reference" data-reference="Prov 18.14" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252018.14" rel="noopener" target="_blank"><span data-dcnode-id="2923" instrument_node="">Pr 18:14</span></a><span data-dcnode-id="2921" instrument_node="">).</span></li><span data-dcnode-id="2919" instrument_node="">
</span><li data-dcnode-id="2914"><span data-dcnode-id="2918" instrument_node="">Recall the point above, </span><em data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">Happiness Is a Choice</span></em><span data-dcnode-id="2915" instrument_node="">, and do not believe anything else.</span></li><span data-dcnode-id="2913" instrument_node="">
</span><li data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">You must rule your spirit against negative thinking just like against any other sin.</span></li><span data-dcnode-id="2910" instrument_node="">
</span><li data-dcnode-id="2905"><span data-dcnode-id="2909" instrument_node="">Keeping a heart (spirit) with all diligence is more thoughts than actions (</span><a class="rtBibleRef" data-dcnode-id="2907" data-purpose="bible-reference" data-reference="Prov 4.23" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%25204.23" rel="noopener" target="_blank"><span data-dcnode-id="2908" instrument_node="">Pr 4:23</span></a><span data-dcnode-id="2906" instrument_node="">).</span></li><span data-dcnode-id="2904" instrument_node="">
</span><li data-dcnode-id="2896"><span data-dcnode-id="2903" instrument_node="">The man who chooses to rule his spirit like this is a great man (</span><a class="rtBibleRef" data-dcnode-id="2901" data-purpose="bible-reference" data-reference="Prov 16.32" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252016.32" rel="noopener" target="_blank"><span data-dcnode-id="2902" instrument_node="">Prov 16:32</span></a><span data-dcnode-id="2900" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2898" data-purpose="bible-reference" data-reference="Prov 25.28" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252025.28" rel="noopener" target="_blank"><span data-dcnode-id="2899" instrument_node="">25:28</span></a><span data-dcnode-id="2897" instrument_node="">).</span></li><span data-dcnode-id="2895" instrument_node="">
</span><li data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">Great men have made this choice in both testaments, because God commanded it.</span></li><span data-dcnode-id="2892" instrument_node="">
</span><li data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">Job made a conscious choice to look at the big disasters in his life by faith in God.</span></li><span data-dcnode-id="2889" instrument_node="">
</span><li data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">David encouraged himself in God when everything and everyone was against him.</span></li><span data-dcnode-id="2886" instrument_node="">
</span><li data-dcnode-id="2881"><span data-dcnode-id="2885" instrument_node="">Paul’s spirit followed a good law in his mind and also sin in his flesh (</span><a class="rtBibleRef" data-dcnode-id="2883" data-purpose="bible-reference" data-reference="Rom 7.22-25" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rom%25207.22-25" rel="noopener" target="_blank"><span data-dcnode-id="2884" instrument_node="">Ro 7:22-25</span></a><span data-dcnode-id="2882" instrument_node="">).</span></li><span data-dcnode-id="2880" instrument_node="">
</span><li data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">Life is a series of choices, and you choose every day with all kinds of responses to a wide variety of situations, and ruling your spirit for joy is managing your life.</span></li><span data-dcnode-id="2877" instrument_node="">
</span><li data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">Don’t wait until you feel like being happy, choose to be happy and then act upon it.</span></li><span data-dcnode-id="2874" instrument_node="">
</span><li data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">If the world’s fools can propose, “Don’t worry, be happy,” we can do it better.</span></li><span data-dcnode-id="2871" instrument_node="">
</span></ol><span data-dcnode-id="2869" instrument_node="">
</span></li><span data-dcnode-id="2867" instrument_node="">
</span><li data-dcnode-id="2827"><em data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">Honoring parents</span></em><span data-dcnode-id="2864" instrument_node=""> is one of the simplest ways to enhance your life by God’s blessing.
</span><ol data-dcnode-id="2829"><span data-dcnode-id="2863" instrument_node="">
</span><li data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">The point is so basic, simple, and well-known that you are tempted to disregard it.</span></li><span data-dcnode-id="2860" instrument_node="">
</span><li data-dcnode-id="2855"><span data-dcnode-id="2859" instrument_node="">The first commandment with promise – in the Ten – is honor parents (</span><a class="rtBibleRef" data-dcnode-id="2857" data-purpose="bible-reference" data-reference="Eph 6.2-3" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eph%25206.2-3" rel="noopener" target="_blank"><span data-dcnode-id="2858" instrument_node="">Eph 6:2-3</span></a><span data-dcnode-id="2856" instrument_node="">).</span></li><span data-dcnode-id="2854" instrument_node="">
</span><li data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">If God promises your life to go well, the result will be joyful, successful living.</span></li><span data-dcnode-id="2851" instrument_node="">
</span><li data-dcnode-id="2843"><span data-dcnode-id="2850" instrument_node="">You can only walk with God by honoring parents’ right (</span><a class="rtBibleRef" data-dcnode-id="2848" data-purpose="bible-reference" data-reference="Mal 4.5-6" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Mal%25204.5-6" rel="noopener" target="_blank"><span data-dcnode-id="2849" instrument_node="">Mal 4:5-6</span></a><span data-dcnode-id="2847" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2845" data-purpose="bible-reference" data-reference="Luke 1.17" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Luke%25201.17" rel="noopener" target="_blank"><span data-dcnode-id="2846" instrument_node="">Luke 1:17</span></a><span data-dcnode-id="2844" instrument_node="">).</span></li><span data-dcnode-id="2842" instrument_node="">
</span><li data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">Parents can be a two-edged sword – you lose directly and God will judge as well.</span></li><span data-dcnode-id="2839" instrument_node="">
</span><li data-dcnode-id="2831"><span data-dcnode-id="2838" instrument_node="">Judgment for dishonoring parents is severe and repeated (</span><a class="rtBibleRef" data-dcnode-id="2836" data-purpose="bible-reference" data-reference="Deut 27.16" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Deut%252027.16" rel="noopener" target="_blank"><span data-dcnode-id="2837" instrument_node="">Deut 27:16</span></a><span data-dcnode-id="2835" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2833" data-purpose="bible-reference" data-reference="Prov 30.17" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252030.17" rel="noopener" target="_blank"><span data-dcnode-id="2834" instrument_node="">Prov 30:17</span></a><span data-dcnode-id="2832" instrument_node="">).</span></li><span data-dcnode-id="2830" instrument_node="">
</span></ol><span data-dcnode-id="2828" instrument_node="">
</span></li><span data-dcnode-id="2826" instrument_node="">
</span><li data-dcnode-id="2735"><em data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">Another helper</span></em><span data-dcnode-id="2823" instrument_node=""> is children of God that are happy in the Lord and ready to help you.
</span><ol data-dcnode-id="2737"><span data-dcnode-id="2822" instrument_node="">

</span><li data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">God’s goal for marriage is to end loneliness (the man) and insecurity (the woman).</span></li><span data-dcnode-id="2651" instrument_node="">

</span><li data-dcnode-id="2640"><span data-dcnode-id="2647" instrument_node="">A husband and wife should live joyfully as a gift from God (</span><a class="rtBibleRef" data-dcnode-id="2645" data-purpose="bible-reference" data-reference="Eccles 9.9" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25209.9" rel="noopener" target="_blank"><span data-dcnode-id="2646" instrument_node="">Eccl 9:9</span></a><span data-dcnode-id="2644" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2642" data-purpose="bible-reference" data-reference="Prov 5.18-19" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%25205.18-19" rel="noopener" target="_blank"><span data-dcnode-id="2643" instrument_node="">Pr 5:18-19</span></a><span data-dcnode-id="2641" instrument_node="">).</span></li><span data-dcnode-id="2639" instrument_node="">

</span><li data-dcnode-id="2628"><span data-dcnode-id="2632" instrument_node="">There is a need beyond year one, for husbands must nourish wives (</span><a class="rtBibleRef" data-dcnode-id="2630" data-purpose="bible-reference" data-reference="Eph 5.28-29" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eph%25205.28-29" rel="noopener" target="_blank"><span data-dcnode-id="2631" instrument_node="">Eph 5:28-29</span></a><span data-dcnode-id="2629" instrument_node="">).</span></li><span data-dcnode-id="2627" instrument_node="">

</span><li data-dcnode-id="2619"><span data-dcnode-id="2623" instrument_node="">Treachery by a husband causes tears in a wife, and God sees every one (</span><a class="rtBibleRef" data-dcnode-id="2621" data-purpose="bible-reference" data-reference="Mal 2.13" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Mal%25202.13" rel="noopener" target="_blank"><span data-dcnode-id="2622" instrument_node="">Mal 2:13</span></a><span data-dcnode-id="2620" instrument_node="">).</span></li><span data-dcnode-id="2618" instrument_node="">

</span><li data-dcnode-id="2578"><span data-dcnode-id="2582" instrument_node="">God gave you </span><a class="rtBibleRef" data-dcnode-id="2580" data-purpose="bible-reference" data-reference="Isa 55.6-9" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Isa%252055.6-9" rel="noopener" target="_blank"><span data-dcnode-id="2581" instrument_node="">Isaiah 55:6-9</span></a><span data-dcnode-id="2579" instrument_node=""> to tell you that you cannot image His gracious pardon.</span></li><span data-dcnode-id="2577" instrument_node="">
</span><li data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">Past sins grieve some; present ones discourage others; future ones cause forfeiture.</span></li><span data-dcnode-id="2574" instrument_node="">
</span><li data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">They are gone! Forget them! God does not remember them! Why do you deny it?</span></li><span data-dcnode-id="2571" instrument_node="">
</span><li data-dcnode-id="2566"><span data-dcnode-id="2570" instrument_node="">It is God’s faithfulness and justice that forgives, not your faithfulness (</span><a class="rtBibleRef" data-dcnode-id="2568" data-purpose="bible-reference" data-reference="1 John 1.9" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520John%25201.9" rel="noopener" target="_blank"><span data-dcnode-id="2569" instrument_node="">I John 1:9</span></a><span data-dcnode-id="2567" instrument_node="">).</span></li><span data-dcnode-id="2565" instrument_node="">
</span><li data-dcnode-id="2557"><span data-dcnode-id="2564" instrument_node="">There is light and prosperity right ahead of you; rejoice (</span><a class="rtBibleRef" data-dcnode-id="2562" data-purpose="bible-reference" data-reference="Job 33.27-28" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Job%252033.27-28" rel="noopener" target="_blank"><span data-dcnode-id="2563" instrument_node="">Job 33:27-28</span></a><span data-dcnode-id="2561" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2559" data-purpose="bible-reference" data-reference="Prov 28.13" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252028.13" rel="noopener" target="_blank"><span data-dcnode-id="2560" instrument_node="">Pr 28:13</span></a><span data-dcnode-id="2558" instrument_node="">)!</span></li><span data-dcnode-id="2556" instrument_node="">
</span><li data-dcnode-id="2548"><span data-dcnode-id="2555" instrument_node="">David was God’s favorite before and after heinous crimes (</span><a class="rtBibleRef" data-dcnode-id="2553" data-purpose="bible-reference" data-reference="1 Kings 15.3-5" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Kings%252015.3-5" rel="noopener" target="_blank"><span data-dcnode-id="2554" instrument_node="">I Kgs 15:3-5</span></a><span data-dcnode-id="2552" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2550" data-purpose="bible-reference" data-reference="Matt 1.1" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Matt%25201.1" rel="noopener" target="_blank"><span data-dcnode-id="2551" instrument_node="">Matt 1:1</span></a><span data-dcnode-id="2549" instrument_node="">).</span></li><span data-dcnode-id="2547" instrument_node="">
</span><li data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">Grief, no joy, over past sins either denies God’s truthfulness or the merits of Christ.</span></li><span data-dcnode-id="2544" instrument_node="">
</span></ol><span data-dcnode-id="2542" instrument_node="">
</span></li><span data-dcnode-id="2540" instrument_node="">
</span><li data-dcnode-id="2503"><em data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">Gifts</span></em><span data-dcnode-id="2537" instrument_node=""> make people happy, but they require initiative, planning, cost, effort (</span><a class="rtBibleRef" data-dcnode-id="2535" data-purpose="bible-reference" data-reference="Prov 17.8" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252017.8" rel="noopener" target="_blank"><span data-dcnode-id="2536" instrument_node="">Pr 17:8</span></a><span data-dcnode-id="2534" instrument_node="">).
</span><ol data-dcnode-id="2505"><span data-dcnode-id="2533" instrument_node="">
</span><li data-dcnode-id="2525"><span data-dcnode-id="2532" instrument_node="">Solomon described the virtues of private gifts to move others (</span><a class="rtBibleRef" data-dcnode-id="2530" data-purpose="bible-reference" data-reference="Prov 18.16" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252018.16" rel="noopener" target="_blank"><span data-dcnode-id="2531" instrument_node="">Prov 18:16</span></a><span data-dcnode-id="2529" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2527" data-purpose="bible-reference" data-reference="Prov 21.14" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252021.14" rel="noopener" target="_blank"><span data-dcnode-id="2528" instrument_node="">21:14</span></a><span data-dcnode-id="2526" instrument_node="">).</span></li><span data-dcnode-id="2524" instrument_node="">
</span><li data-dcnode-id="2519"><span data-dcnode-id="2523" instrument_node="">God gives gifts to us far better than we given even to our children (</span><a class="rtBibleRef" data-dcnode-id="2521" data-purpose="bible-reference" data-reference="Luke 11.13" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Luke%252011.13" rel="noopener" target="_blank"><span data-dcnode-id="2522" instrument_node="">Luke 11:13</span></a><span data-dcnode-id="2520" instrument_node="">)</span></li><span data-dcnode-id="2518" instrument_node="">
</span><li data-dcnode-id="2513"><span data-dcnode-id="2517" instrument_node="">Every good and perfect gift comes down from our unchanging Father (</span><a class="rtBibleRef" data-dcnode-id="2515" data-purpose="bible-reference" data-reference="James 1.17" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/James%25201.17" rel="noopener" target="_blank"><span data-dcnode-id="2516" instrument_node="">Jas 1:17</span></a><span data-dcnode-id="2514" instrument_node="">).</span></li><span data-dcnode-id="2512" instrument_node="">
</span><li data-dcnode-id="2507"><span data-dcnode-id="2511" instrument_node="">Forget getting – it is not nearly as good as advertised; giving is better (</span><a class="rtBibleRef" data-dcnode-id="2509" data-purpose="bible-reference" data-reference="Acts 20.35" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252020.35" rel="noopener" target="_blank"><span data-dcnode-id="2510" instrument_node="">Acts 20:35</span></a><span data-dcnode-id="2508" instrument_node="">).</span></li><span data-dcnode-id="2506" instrument_node="">
</span></ol><span data-dcnode-id="2504" instrument_node="">
</span></li><span data-dcnode-id="2502" instrument_node="">
</span><li data-dcnode-id="2460"><span data-dcnode-id="2501" instrument_node="">There is a place for </span><em data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">mirth feasts</span></em><span data-dcnode-id="2498" instrument_node=""> both publicly and privately to celebrate happiness.
</span><ol data-dcnode-id="2462"><span data-dcnode-id="2497" instrument_node="">
</span><li data-dcnode-id="2492"><span data-dcnode-id="2496" instrument_node="">A special mirth feast was for the joy of understanding Bible preaching (</span><a class="rtBibleRef" data-dcnode-id="2494" data-purpose="bible-reference" data-reference="Neh 8.10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Neh%25208.10" rel="noopener" target="_blank"><span data-dcnode-id="2495" instrument_node="">Neh 8:10</span></a><span data-dcnode-id="2493" instrument_node="">).</span></li><span data-dcnode-id="2491" instrument_node="">
</span><li data-dcnode-id="2486"><span data-dcnode-id="2490" instrument_node="">A good meal, private or public, around Christian gladness is contagious (</span><a class="rtBibleRef" data-dcnode-id="2488" data-purpose="bible-reference" data-reference="Acts 2.46" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%25202.46" rel="noopener" target="_blank"><span data-dcnode-id="2489" instrument_node="">Ac 2:46</span></a><span data-dcnode-id="2487" instrument_node="">).</span></li><span data-dcnode-id="2485" instrument_node="">
</span><li data-dcnode-id="2480"><span data-dcnode-id="2484" instrument_node="">Our God gives food and gladness even to reprobates in His goodness (</span><a class="rtBibleRef" data-dcnode-id="2482" data-purpose="bible-reference" data-reference="Acts 14.17" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252014.17" rel="noopener" target="_blank"><span data-dcnode-id="2483" instrument_node="">Acts 14:17</span></a><span data-dcnode-id="2481" instrument_node="">).</span></li><span data-dcnode-id="2479" instrument_node="">
</span><li data-dcnode-id="2474"><span data-dcnode-id="2478" instrument_node="">The apostolic churches had feasts of charity that were not communion (</span><a class="rtBibleRef" data-dcnode-id="2476" data-purpose="bible-reference" data-reference="Jude 1.12" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Jude%25201.12" rel="noopener" target="_blank"><span data-dcnode-id="2477" instrument_node="">Jude 1:12</span></a><span data-dcnode-id="2475" instrument_node="">).</span></li><span data-dcnode-id="2473" instrument_node="">
</span><li data-dcnode-id="2469"><a data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letgodbetrue.com/sermons/index/year-2008/cause-for-mirth/"><span data-dcnode-id="2472" instrument_node="">Mirth feasts</span></a><span data-dcnode-id="2470" instrument_node=""> (the Bible basis for them).</span></li><span data-dcnode-id="2468" instrument_node="">
</span><li data-dcnode-id="2464"><a data-dcnode-id="2466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letgodbetrue.com/sermons/index/year-2013/a-time-for-mirth/"><span data-dcnode-id="2467" instrument_node="">Mirth feasts</span></a><span data-dcnode-id="2465" instrument_node=""> (U.S. Thanksgiving Day).&nbsp;</span></li><span data-dcnode-id="2463" instrument_node="">
</span></ol><span data-dcnode-id="2461" instrument_node="">
</span></li><span data-dcnode-id="2459" instrument_node="">
</span><li data-dcnode-id="2431"><em data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">True joy results from getting outside yourself</span></em><span data-dcnode-id="2456" instrument_node=""> to love God and others (</span><a class="rtBibleRef" data-dcnode-id="2454" data-purpose="bible-reference" data-reference="Matt 22.37-40" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Matt%252022.37-40" rel="noopener" target="_blank"><span data-dcnode-id="2455" instrument_node="">Matt 22:37-40</span></a><span data-dcnode-id="2453" instrument_node="">), which is remembered by using JOY as an acronym – Jesus, others, and only then you.
</span><ol data-dcnode-id="2433"><span data-dcnode-id="2452" instrument_node="">
</span><li data-dcnode-id="2444"><span data-dcnode-id="2451" instrument_node="">It is more blessed to give than receive – learn it and prove it (</span><a class="rtBibleRef" data-dcnode-id="2449" data-purpose="bible-reference" data-reference="Acts 20.35" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252020.35" rel="noopener" target="_blank"><span data-dcnode-id="2450" instrument_node="">Ac 20:35</span></a><span data-dcnode-id="2448" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2446" data-purpose="bible-reference" data-reference="Prov 14.21" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252014.21" rel="noopener" target="_blank"><span data-dcnode-id="2447" instrument_node="">Pr 14:21</span></a><span data-dcnode-id="2445" instrument_node="">).</span></li><span data-dcnode-id="2443" instrument_node="">
</span><li data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">This rule is incredibly elementary and simple, but it will work. Get over yourself!</span></li><span data-dcnode-id="2440" instrument_node="">
</span><li data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">Jesus and Paul give us incredible examples of those happily serving others always.</span></li><span data-dcnode-id="2437" instrument_node="">
</span><li data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">By not doing so, you turn inward and focus on your circumstances to your ruin.</span></li><span data-dcnode-id="2434" instrument_node="">
</span></ol><span data-dcnode-id="2432" instrument_node="">
</span></li><span data-dcnode-id="2430" instrument_node="">
</span><li data-dcnode-id="2381"><em data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">Keep your perspective grounded</span></em><span data-dcnode-id="2427" instrument_node=""> on God’s word that explains all of life around us.
</span><ol data-dcnode-id="2383"><span data-dcnode-id="2426" instrument_node="">
</span><li data-dcnode-id="2418"><span data-dcnode-id="2425" instrument_node="">The difficult trials of life are for your perfection – rejoice! (</span><a class="rtBibleRef" data-dcnode-id="2423" data-purpose="bible-reference" data-reference="James 1.2-4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/James%25201.2-4" rel="noopener" target="_blank"><span data-dcnode-id="2424" instrument_node="">Jas 1:2-4</span></a><span data-dcnode-id="2422" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2420" data-purpose="bible-reference" data-reference="Rom 5.3-5" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rom%25205.3-5" rel="noopener" target="_blank"><span data-dcnode-id="2421" instrument_node="">Rom 5:3-5</span></a><span data-dcnode-id="2419" instrument_node="">).</span></li><span data-dcnode-id="2417" instrument_node="">
</span><li data-dcnode-id="2412"><span data-dcnode-id="2416" instrument_node="">If you are persecuted for being righteous, you should also rejoice (</span><a class="rtBibleRef" data-dcnode-id="2414" data-purpose="bible-reference" data-reference="Luke 6.22-23" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Luke%25206.22-23" rel="noopener" target="_blank"><span data-dcnode-id="2415" instrument_node="">Luke 6:22-23</span></a><span data-dcnode-id="2413" instrument_node="">).</span></li><span data-dcnode-id="2411" instrument_node="">
</span><li data-dcnode-id="2400"><span data-dcnode-id="2410" instrument_node="">There is reward coming to trump all earthly pain (</span><a class="rtBibleRef" data-dcnode-id="2408" data-purpose="bible-reference" data-reference="Rom 8.18" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rom%25208.18" rel="noopener" target="_blank"><span data-dcnode-id="2409" instrument_node="">Ro 8:18</span></a><span data-dcnode-id="2407" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2405" data-purpose="bible-reference" data-reference="2 Cor 4.17" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Cor%25204.17" rel="noopener" target="_blank"><span data-dcnode-id="2406" instrument_node="">II Co 4:17</span></a><span data-dcnode-id="2404" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2402" data-purpose="bible-reference" data-reference="Heb 12.1-4" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Heb%252012.1-4" rel="noopener" target="_blank"><span data-dcnode-id="2403" instrument_node="">He 12:1-4</span></a><span data-dcnode-id="2401" instrument_node="">).</span></li><span data-dcnode-id="2399" instrument_node="">
</span><li data-dcnode-id="2394"><span data-dcnode-id="2398" instrument_node="">Death and the final judgment totally reverse all things that you perceive (</span><a class="rtBibleRef" data-dcnode-id="2396" data-purpose="bible-reference" data-reference="Prov 10.28" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252010.28" rel="noopener" target="_blank"><span data-dcnode-id="2397" instrument_node="">Pr 10:28</span></a><span data-dcnode-id="2395" instrument_node="">).</span></li><span data-dcnode-id="2393" instrument_node="">
</span><li data-dcnode-id="2385"><span data-dcnode-id="2392" instrument_node="">All the wrath of man, no matter how high, is under His rule (</span><a class="rtBibleRef" data-dcnode-id="2390" data-purpose="bible-reference" data-reference="Ps 76.10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252076.10" rel="noopener" target="_blank"><span data-dcnode-id="2391" instrument_node="">Ps 76:10</span></a><span data-dcnode-id="2389" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2387" data-purpose="bible-reference" data-reference="Eccles 5.8" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25205.8" rel="noopener" target="_blank"><span data-dcnode-id="2388" instrument_node="">Eccl 5:8</span></a><span data-dcnode-id="2386" instrument_node="">).</span></li><span data-dcnode-id="2384" instrument_node="">
</span></ol><span data-dcnode-id="2382" instrument_node="">
</span></li><span data-dcnode-id="2380" instrument_node="">
</span><li data-dcnode-id="2340"><em data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">Contentment</span></em><span data-dcnode-id="2377" instrument_node=""> with what you have is a fabulous servant to joy and success (</span><a class="rtBibleRef" data-dcnode-id="2375" data-purpose="bible-reference" data-reference="1 Tim 6.6" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Tim%25206.6" rel="noopener" target="_blank"><span data-dcnode-id="2376" instrument_node="">I Tim 6:6</span></a><span data-dcnode-id="2374" instrument_node="">).
</span><ol data-dcnode-id="2342"><span data-dcnode-id="2373" instrument_node="">
</span><li data-dcnode-id="2368"><span data-dcnode-id="2372" instrument_node="">Discontentment by desires brings joy-destroying vanity and vexation (</span><a class="rtBibleRef" data-dcnode-id="2370" data-purpose="bible-reference" data-reference="Eccles 6.7-9" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25206.7-9" rel="noopener" target="_blank"><span data-dcnode-id="2371" instrument_node="">Eccl 6:7-9</span></a><span data-dcnode-id="2369" instrument_node="">).</span></li><span data-dcnode-id="2367" instrument_node="">
</span><li data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">Covetousness is a sin, and it is lose-lose; contentment is a virtue, and it is win-win.</span></li><span data-dcnode-id="2364" instrument_node="">
</span><li data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">You lose joy in the things you have for the pain of wanting what you do not have.</span></li><span data-dcnode-id="2361" instrument_node="">
</span><li data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Or you can enjoy the things you have and have no pain by wanting the impossible.</span></li><span data-dcnode-id="2358" instrument_node="">
</span><li data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">Change your goals, because frustration is caused by not achieving the wrong goals!</span></li><span data-dcnode-id="2355" instrument_node="">
</span><li data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">A covetous man though rich is poor in mind; the content man though poor is rich.</span></li><span data-dcnode-id="2352" instrument_node="">
</span><li data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">Think Ahab (Naboth’s vineyard) and Amnon (Tamar) and the ruin of their lives.</span></li><span data-dcnode-id="2349" instrument_node="">
</span><li data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Are you content? Your body, looks, job, house, money, spouse, car, toys, etc.?</span></li><span data-dcnode-id="2346" instrument_node="">
</span><li data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Some things you should not be content with … underachieving, overspending, etc.</span></li><span data-dcnode-id="2343" instrument_node="">
</span></ol><span data-dcnode-id="2341" instrument_node="">
</span></li><span data-dcnode-id="2339" instrument_node="">

="noopener" target="_blank"><span data-dcnode-id="2308" instrument_node="">4:9-12</span></a><span data-dcnode-id="2306" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2304" data-purpose="bible-reference" data-reference="Matt 12.7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Matt%252012.7" rel="noopener" target="_blank"><span data-dcnode-id="2305" instrument_node="">Mat 12:7</span></a><span data-dcnode-id="2303" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2301" data-purpose="bible-reference" data-reference="Acts 20.35" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Acts%252020.35" rel="noopener" target="_blank"><span data-dcnode-id="2302" instrument_node="">Acts 20:35</span></a><span data-dcnode-id="2300" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2298" data-purpose="bible-reference" data-reference="1 Cor 12.31" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Cor%252012.31" rel="noopener" target="_blank"><span data-dcnode-id="2299" instrument_node="">I Cor 12:31</span></a><span data-dcnode-id="2297" instrument_node="">).
</span><ol data-dcnode-id="2273"><span data-dcnode-id="2296" instrument_node="">
</span><li data-dcnode-id="2291"><span data-dcnode-id="2295" instrument_node="">Do not let the world’s goals destroy your life by measuring by them (</span><a class="rtBibleRef" data-dcnode-id="2293" data-purpose="bible-reference" data-reference="1 Tim 6.6-10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Tim%25206.6-10" rel="noopener" target="_blank"><span data-dcnode-id="2294" instrument_node="">I Ti 6:6-10</span></a><span data-dcnode-id="2292" instrument_node="">).</span></li><span data-dcnode-id="2290" instrument_node="">
</span><li data-dcnode-id="2285"><span data-dcnode-id="2289" instrument_node="">Lose your life for His sake, and you will find it for perfect fulfillment (</span><a class="rtBibleRef" data-dcnode-id="2287" data-purpose="bible-reference" data-reference="Matt 16.25" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Matt%252016.25" rel="noopener" target="_blank"><span data-dcnode-id="2288" instrument_node="">Matt 16:25</span></a><span data-dcnode-id="2286" instrument_node="">).</span></li><span data-dcnode-id="2284" instrument_node="">
</span><li data-dcnode-id="2280"><span data-dcnode-id="2283" instrument_node="">Explanation of God’s </span><a data-dcnode-id="2281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letgodbetrue.com/sermons/index/year-2006/godly-priorities/"><span data-dcnode-id="2282" instrument_node="">priorities for living.</span></a></li><span data-dcnode-id="2279" instrument_node="">
</span><li data-dcnode-id="2275"><span data-dcnode-id="2278" instrument_node="">Extensive list of </span><a data-dcnode-id="2276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letgodbetrue.com/sermons/index/year-2013/priorities-and-choices/"><span data-dcnode-id="2277" instrument_node="">God’s priorities</span></a></li><span data-dcnode-id="2274" instrument_node="">
</span></ol><span data-dcnode-id="2272" instrument_node="">
</span></li><span data-dcnode-id="2270" instrument_node="">
</span><li data-dcnode-id="2251"><em data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">Giving thanks</span></em><span data-dcnode-id="2267" instrument_node=""> for all things is God’s will for your life, which brings joy (</span><a class="rtBibleRef" data-dcnode-id="2265" data-purpose="bible-reference" data-reference="1 Thess 5.18" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Thess%25205.18" rel="noopener" target="_blank"><span data-dcnode-id="2266" instrument_node="">I Thes 5:18</span></a><span data-dcnode-id="2264" instrument_node="">).
</span><ol data-dcnode-id="2253"><span data-dcnode-id="2263" instrument_node="">
</span><li data-dcnode-id="2258"><span data-dcnode-id="2262" instrument_node="">Instead of the foolish jesting and folly of today’s hyenas, give thanks (</span><a class="rtBibleRef" data-dcnode-id="2260" data-purpose="bible-reference" data-reference="Eph 5.3-5" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eph%25205.3-5" rel="noopener" target="_blank"><span data-dcnode-id="2261" instrument_node="">Eph 5:3-5</span></a><span data-dcnode-id="2259" instrument_node="">).</span></li><span data-dcnode-id="2257" instrument_node="">
</span><li data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">Count your many blessings; it will surprise you what the Lord has already done!</span></li><span data-dcnode-id="2254" instrument_node="">
</span></ol><span data-dcnode-id="2252" instrument_node="">
</span></li><span data-dcnode-id="2250" instrument_node="">
</span><li data-dcnode-id="2225"><em data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">Get enough sleep</span></em><span data-dcnode-id="2247" instrument_node="">; this point is so simple and obvious, but some are yet God-rejecters.
</span><ol data-dcnode-id="2227"><span data-dcnode-id="2246" instrument_node="">
</span><li data-dcnode-id="2241"><span data-dcnode-id="2245" instrument_node="">How do you reject God by sacrificing sleep? You think your part key (</span><a class="rtBibleRef" data-dcnode-id="2243" data-purpose="bible-reference" data-reference="Ps 127.1-2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%2520127.1-2" rel="noopener" target="_blank"><span data-dcnode-id="2244" instrument_node="">Ps 127:1-2</span></a><span data-dcnode-id="2242" instrument_node="">).</span></li><span data-dcnode-id="2240" instrument_node="">
</span><li data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">Sleep deprivation clearly causes many mental, emotional, psychological issues.</span></li><span data-dcnode-id="2237" instrument_node="">
</span><li data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">Like other issues, there are those who already sleep too much, costing joy by sloth.</span></li><span data-dcnode-id="2234" instrument_node="">
</span><li data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">Tiredness alters your perspective, energy, productivity, spirit, enthusiasm for life.</span></li><span data-dcnode-id="2231" instrument_node="">
</span><li data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">Women generally require more, so wise husbands will make sure they get enough.</span></li><span data-dcnode-id="2228" instrument_node="">
</span></ol><span data-dcnode-id="2226" instrument_node="">
</span></li><span data-dcnode-id="2224" instrument_node="">
</span><li data-dcnode-id="2184"><em data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Simply your life</span></em><span data-dcnode-id="2221" instrument_node="">, for complicating it leads to temptations, depression, and destruction.
</span><ol data-dcnode-id="2186"><span data-dcnode-id="2220" instrument_node="">
</span><li data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">When life is too complicated, you can easily be overwhelmed and lose joy of life.</span></li><span data-dcnode-id="2217" instrument_node="">
</span><li data-dcnode-id="2212"><span data-dcnode-id="2216" instrument_node="">Corinth had some unusual circumstances, but he did warn carefully (</span><a class="rtBibleRef" data-dcnode-id="2214" data-purpose="bible-reference" data-reference="1 Cor 7.29-31" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Cor%25207.29-31" rel="noopener" target="_blank"><span data-dcnode-id="2215" instrument_node="">I Co 7:29-31</span></a><span data-dcnode-id="2213" instrument_node="">).</span></li><span data-dcnode-id="2211" instrument_node="">
</span><li data-dcnode-id="2206"><span data-dcnode-id="2210" instrument_node="">He took this general rule so far as to warn against even marriage (</span><a class="rtBibleRef" data-dcnode-id="2208" data-purpose="bible-reference" data-reference="1 Cor 7.32-35" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Cor%25207.32-35" rel="noopener" target="_blank"><span data-dcnode-id="2209" instrument_node="">I Cor 7:32-35</span></a><span data-dcnode-id="2207" instrument_node="">).</span></li><span data-dcnode-id="2205" instrument_node="">
</span><li data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">How many children will you have and why? Do you think you can replenish earth?</span></li><span data-dcnode-id="2202" instrument_node="">
</span><li data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">You can complicate with schooling, yard, house, job, another job, kid sports, etc.</span></li><span data-dcnode-id="2199" instrument_node="">
</span><li data-dcnode-id="2191"><span data-dcnode-id="2198" instrument_node="">One of the devil’s devices in this generation is excess activity (</span><a class="rtBibleRef" data-dcnode-id="2196" data-purpose="bible-reference" data-reference="Eph 5.16" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eph%25205.16" rel="noopener" target="_blank"><span data-dcnode-id="2197" instrument_node="">Ep 5:16</span></a><span data-dcnode-id="2195" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2193" data-purpose="bible-reference" data-reference="Luke 21.34" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Luke%252021.34" rel="noopener" target="_blank"><span data-dcnode-id="2194" instrument_node="">Lu 21:34</span></a><span data-dcnode-id="2192" instrument_node="">).</span></li><span data-dcnode-id="2190" instrument_node="">
</span><li data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">Stress has consequences that alter you emotionally, spiritually, or even physically.</span></li><span data-dcnode-id="2187" instrument_node="">
</span></ol><span data-dcnode-id="2185" instrument_node="">
</span></li><span data-dcnode-id="2183" instrument_node="">
</span><li data-dcnode-id="2161"><em data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">Take time to smell the roses</span></em><span data-dcnode-id="2180" instrument_node="">, because life is too short to always be rushing/worrying.
</span><ol data-dcnode-id="2163"><span data-dcnode-id="2179" instrument_node="">
</span><li data-dcnode-id="2171"><span data-dcnode-id="2178" instrument_node="">Taste and see that the Lord is good, though true by all senses (</span><a class="rtBibleRef" data-dcnode-id="2176" data-purpose="bible-reference" data-reference="Ps 34.8" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252034.8" rel="noopener" target="_blank"><span data-dcnode-id="2177" instrument_node="">Ps 34:8</span></a><span data-dcnode-id="2175" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2173" data-purpose="bible-reference" data-reference="Eccles 9.4-10" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25209.4-10" rel="noopener" target="_blank"><span data-dcnode-id="2174" instrument_node="">Ec 9:4-10</span></a><span data-dcnode-id="2172" instrument_node="">).</span></li><span data-dcnode-id="2170" instrument_node="">
</span><li data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">Our Father has given five senses and objects for each one that brings great delight.</span></li><span data-dcnode-id="2167" instrument_node="">
</span><li data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">To be in a hurry or with financial or other ambition to miss them will deprive you.</span></li><span data-dcnode-id="2164" instrument_node="">
</span></ol><span data-dcnode-id="2162" instrument_node="">
</span></li><span data-dcnode-id="2160" instrument_node="">
</span><li data-dcnode-id="2111"><em data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Worrying</span></em><span data-dcnode-id="2157" instrument_node=""> is painful, profitless, distracting, stupid, tempting, tiring, and very wasteful.
</span><ol data-dcnode-id="2113"><span data-dcnode-id="2156" instrument_node="">
</span><li data-dcnode-id="2148"><span data-dcnode-id="2155" instrument_node="">Stop living by foolish feelings and start living by faith in God (</span><a class="rtBibleRef" data-dcnode-id="2153" data-purpose="bible-reference" data-reference="2 Cor 5.7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Cor%25205.7" rel="noopener" target="_blank"><span data-dcnode-id="2154" instrument_node="">II Co 5:7</span></a><span data-dcnode-id="2152" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="2150" data-purpose="bible-reference" data-reference="Heb 11.6" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Heb%252011.6" rel="noopener" target="_blank"><span data-dcnode-id="2151" instrument_node="">He 11:6</span></a><span data-dcnode-id="2149" instrument_node="">).</span></li><span data-dcnode-id="2147" instrument_node="">
</span><li data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">Worrying never accomplished anything positive, but it can destroy your happiness.</span></li><span data-dcnode-id="2144" instrument_node="">
</span><li data-dcnode-id="2139"><span data-dcnode-id="2143" instrument_node="">Jesus blasted worry as foolish in light of His powerful providence (</span><a class="rtBibleRef" data-dcnode-id="2141" data-purpose="bible-reference" data-reference="Matt 6.31-34" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Matt%25206.31-34" rel="noopener" target="_blank"><span data-dcnode-id="2142" instrument_node="">Matt 6:31-34</span></a><span data-dcnode-id="2140" instrument_node="">).</span></li><span data-dcnode-id="2138" instrument_node="">
</span><li data-dcnode-id="2133"><span data-dcnode-id="2137" instrument_node="">Paul blasted worry by defining a care-free life through careless prayer (</span><a class="rtBibleRef" data-dcnode-id="2135" data-purpose="bible-reference" data-reference="Phil 4.6-7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Phil%25204.6-7" rel="noopener" target="_blank"><span data-dcnode-id="2136" instrument_node="">Phil 4:6-7</span></a><span data-dcnode-id="2134" instrument_node="">).</span></li><span data-dcnode-id="2132" instrument_node="">
</span><li data-dcnode-id="2127"><span data-dcnode-id="2131" instrument_node="">David said, do your reasonable best, trust Him for the rest, go to bed (</span><a class="rtBibleRef" data-dcnode-id="2129" data-purpose="bible-reference" data-reference="Ps 127.1-2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%2520127.1-2" rel="noopener" target="_blank"><span data-dcnode-id="2130" instrument_node="">Ps 127:1-2</span></a><span data-dcnode-id="2128" instrument_node="">).</span></li><span data-dcnode-id="2126" instrument_node="">
</span><li data-dcnode-id="2121"><span data-dcnode-id="2125" instrument_node="">Cast your cares upon God, for He cares for you and is the One to help (</span><a class="rtBibleRef" data-dcnode-id="2123" data-purpose="bible-reference" data-reference="1 Pet 5.7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/1%2520Pet%25205.7" rel="noopener" target="_blank"><span data-dcnode-id="2124" instrument_node="">I Peter 5:7</span></a><span data-dcnode-id="2122" instrument_node="">).</span></li><span data-dcnode-id="2120" instrument_node="">
</span><li data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Don’t be the stupid man burying his talent; His yoke is easy and His burden light.</span></li><span data-dcnode-id="2117" instrument_node="">
</span><li data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">Thinking about something does not get it done, does not motivate, distracts, etc.</span></li><span data-dcnode-id="2114" instrument_node="">
</span></ol><span data-dcnode-id="2112" instrument_node="">
</span></li><span data-dcnode-id="2110" instrument_node="">

</span></ol><span data-dcnode-id="1815" instrument_node="">
</span></li><span data-dcnode-id="1813" instrument_node="">
</span><li data-dcnode-id="1800"><em data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">Pray for it</span></em><span data-dcnode-id="1810" instrument_node="">, like David after God’s chastening had removed it (</span><a class="rtBibleRef" data-dcnode-id="1808" data-purpose="bible-reference" data-reference="Ps 51.12" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252051.12" rel="noopener" target="_blank"><span data-dcnode-id="1809" instrument_node="">Ps 51:12</span></a><span data-dcnode-id="1807" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="1805" data-purpose="bible-reference" data-reference="Ps 85.6" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252085.6" rel="noopener" target="_blank"><span data-dcnode-id="1806" instrument_node="">85:6</span></a><span data-dcnode-id="1804" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="1802" data-purpose="bible-reference" data-reference="Ps 13.5" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Ps%252013.5" rel="noopener" target="_blank"><span data-dcnode-id="1803" instrument_node="">13:5</span></a><span data-dcnode-id="1801" instrument_node="">).</span></li><span data-dcnode-id="1799" instrument_node="">

</span><ol data-dcnode-id="1567" style="list-style-type: upper-alpha;"><span data-dcnode-id="1783" instrument_node="">
</span><li data-dcnode-id="1763"><span data-dcnode-id="1782" instrument_node="">Some </span><em data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">physiological</span></em><span data-dcnode-id="1779" instrument_node=""> reasons: hormones, improper diet, hypoglycemia, birth control pills, diabetes, chemical imbalance, tiredness, insomnia, physical inactivity, etc.
</span><ol data-dcnode-id="1765"><span data-dcnode-id="1778" instrument_node="">
</span><li data-dcnode-id="1773"><span data-dcnode-id="1777" instrument_node="">These can be overcome, even if you need mood-altering chemicals (</span><a class="rtBibleRef" data-dcnode-id="1775" data-purpose="bible-reference" data-reference="Prov 31.6-7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Prov%252031.6-7" rel="noopener" target="_blank"><span data-dcnode-id="1776" instrument_node="">Prov 31:6-7</span></a><span data-dcnode-id="1774" instrument_node="">).</span></li><span data-dcnode-id="1772" instrument_node="">
</span><li data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">If you have a physical problem, then take care of it using the means God has given.</span></li><span data-dcnode-id="1769" instrument_node="">
</span><li data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">These are physical causes of depressed thinking, and they are resolved physically.</span></li><span data-dcnode-id="1766" instrument_node="">

</span></li><span data-dcnode-id="1762" instrument_node="">
</span><li data-dcnode-id="1751"><span data-dcnode-id="1761" instrument_node="">Some </span><em data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">environmental</span></em><span data-dcnode-id="1758" instrument_node=""> reasons: humidity, temperature (</span><a class="rtBibleRef" data-dcnode-id="1756" data-purpose="bible-reference" data-reference="Jonah 4.8" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Jonah%25204.8" rel="noopener" target="_blank"><span data-dcnode-id="1757" instrument_node="">Jonah 4:8</span></a><span data-dcnode-id="1755" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="1753" data-purpose="bible-reference" data-reference="Rev 16.8-9" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Rev%252016.8-9" rel="noopener" target="_blank"><span data-dcnode-id="1754" instrument_node="">Rev 16:8-9</span></a><span data-dcnode-id="1752" instrument_node="">), darkness, rain, etc. These excuses are infantile and unbelieving; they can be corrected.</span></li><span data-dcnode-id="1750" instrument_node="">
</span><li data-dcnode-id="1745"><span data-dcnode-id="1749" instrument_node="">Some </span><em data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">emotional</span></em><span data-dcnode-id="1746" instrument_node=""> reasons: anger, worry, resentment, jealousy, guilt, stress, hopeless, etc. These excuses are a choice, since they should be able to truly rule a child of God.</span></li><span data-dcnode-id="1744" instrument_node="">
</span><li data-dcnode-id="1715"><span data-dcnode-id="1743" instrument_node="">Some </span><em data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">circumstantial</span></em><span data-dcnode-id="1740" instrument_node=""> reasons: money, health, mechanical issues, relationships, sin, etc.
</span><ol data-dcnode-id="1717"><span data-dcnode-id="1739" instrument_node="">
</span><li data-dcnode-id="1731"><span data-dcnode-id="1738" instrument_node="">All men are destined for trouble, so trouble should not surprise us (</span><a class="rtBibleRef" data-dcnode-id="1736" data-purpose="bible-reference" data-reference="Job 5.7" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Job%25205.7" rel="noopener" target="_blank"><span data-dcnode-id="1737" instrument_node="">Job 5:7</span></a><span data-dcnode-id="1735" instrument_node="">; </span><a class="rtBibleRef" data-dcnode-id="1733" data-purpose="bible-reference" data-reference="Job 14.1" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Job%252014.1" rel="noopener" target="_blank"><span data-dcnode-id="1734" instrument_node="">14:1</span></a><span data-dcnode-id="1732" instrument_node="">).</span></li><span data-dcnode-id="1730" instrument_node="">
</span><li data-dcnode-id="1725"><span data-dcnode-id="1729" instrument_node="">Faith does not measure God, life, truth, or anything by circumstances (</span><a class="rtBibleRef" data-dcnode-id="1727" data-purpose="bible-reference" data-reference="Eccles 9.1-2" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/Eccles%25209.1-2" rel="noopener" target="_blank"><span data-dcnode-id="1728" instrument_node="">Eccl 9:1-2</span></a><span data-dcnode-id="1726" instrument_node="">).</span></li><span data-dcnode-id="1724" instrument_node="">
</span><li data-dcnode-id="1719"><span data-dcnode-id="1723" instrument_node="">What should Paul have concluded by his set of circumstances (</span><a class="rtBibleRef" data-dcnode-id="1721" data-purpose="bible-reference" data-reference="2 Cor 11.24-33" data-version="kjv1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biblia.com/bible/kjv1900/2%2520Cor%252011.24-33" rel="noopener" target="_blank"><span data-dcnode-id="1722" instrument_node="">II Cor 11:24-33</span></a><span data-dcnode-id="1720" instrument_node="">).</span></li><span data-dcnode-id="1718" instrument_node="">
</span></ol><span data-dcnode-id="1716" instrument_node="">
</span></li><span data-dcnode-id="1714" instrument_node="">
</span><li data-dcnode-id="1700"><span data-dcnode-id="1713" instrument_node="">Some </span><em data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">temperamental</span></em><span data-dcnode-id="1710" instrument_node=""> reasons: some will argue they are predisposed to unhappiness.
</span><ol data-dcnode-id="1702"><span data-dcnode-id="1709" instrument_node="">
</span><li data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">While temperamental makeup is more or less optimistic, you cannot excuse sin.</span></li><span data-dcnode-id="1706" instrument_node="">
</span><li data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">The melancholy is vulnerable due to introversion, perfectionism, idealism, etc.</span></li><span data-dcnode-id="1703" instrument_node="">
</span></ol><span data-dcnode-id="1701" instrument_node="">
</span></li><span data-dcnode-id="1699" instrument_node="">
