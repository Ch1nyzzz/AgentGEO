</span><h1 class="entry-title" data-dcnode-id="916" itemprop="headline"><span data-dcnode-id="917" instrument_node="">Happiness Is A Choice: Here’s How You Choose It</span></h1><div class="entry-meta" data-dcnode-id="900"><span data-dcnode-id="915" instrument_node="">By </span><span class="posted-by vcard author" data-dcnode-id="907" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span data-dcnode-id="914" instrument_node=""> </span><a class="url fn n" data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theenemyofaverage.com/author/admin/" itemprop="url" rel="author" title="View all posts by Justin Gasparovic"><span data-dcnode-id="913" instrument_node="">
</span><span class="author-name" data-dcnode-id="911" itemprop="name"><span data-dcnode-id="912" instrument_node="">Justin Gasparovic</span></span><span data-dcnode-id="910" instrument_node="">
</span></a><span data-dcnode-id="908" instrument_node="">
</span></span><span data-dcnode-id="906" instrument_node="">

		 / </span><span class="posted-on" data-dcnode-id="901"><span class="published" data-dcnode-id="904" itemprop="datePublished"><span data-dcnode-id="905" instrument_node=""> June 27, 2021</span></span><span class="updated" data-dcnode-id="902" itemprop="dateModified"><span data-dcnode-id="903" instrument_node=""> July 27, 2021</span></span></span></div><span data-dcnode-id="899" instrument_node=""> </span></div><span data-dcnode-id="897" instrument_node="">
</span></header><span data-dcnode-id="894" instrument_node="">
</span><div class="entry-content clear" data-dcnode-id="383" itemprop="text"><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" style="font-weight: 400;"><span data-dcnode-id="892" instrument_node="">It’s not idealistic to say that happiness is a choice.&nbsp;</span></span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" style="font-weight: 400;"><span data-dcnode-id="888" instrument_node="">If you can choose how much money you make, the quality of your friends, whether or not you pursue a career you’re passionate about, then who’s to say that you can’t choose to be happy?</span></span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="883" style="font-weight: 400;"><span data-dcnode-id="884" instrument_node="">You have control over so much in your life that it’s ludicrous to assume that you can’t choose to be happy – </span></span><b data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">that is of course assuming you’re using the right definition of happiness.</span></b></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" style="font-weight: 400;"><span data-dcnode-id="878" instrument_node="">Most people conflate happiness to mean something that it’s not, which is why people tend to call B.S. on the phrase, “happiness is a choice.”</span></span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="873" style="font-weight: 400;"><span data-dcnode-id="874" instrument_node="">In this article, we’ll dissect happiness from the inside out – you’ll learn what happiness actually is (an illusion), and then we’ll talk about </span></span><a data-dcnode-id="870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theenemyofaverage.com/keys-to-happiness/"><span data-dcnode-id="871" style="font-weight: 400;"><span data-dcnode-id="872" instrument_node="">actionable ways to find inner peace </span></span></a><span data-dcnode-id="868" style="font-weight: 400;"><span data-dcnode-id="869" instrument_node="">and increase your overall well-being.</span></span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">&nbsp;</span></p><span data-dcnode-id="863" instrument_node="">
</span><h2 data-dcnode-id="860"><b data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">What is Happiness Really?</span></b></h2><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" style="font-weight: 400;"><span data-dcnode-id="858" instrument_node="">When you go to your happy place, you might picture yourself taking a boat out to the Amalfi Coast in Italy, or fitting back into your old jeans, or landing that promotion you’ve been gunning for.</span></span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="850" style="font-weight: 400;"><span data-dcnode-id="854" instrument_node="">But here’s the thing – those feelings of achievement that you’re after aren’t the same as happiness. Conflating happiness with achievement is a sure-fire way to self-sabotage your own journey to </span><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theenemyofaverage.com/how-to-feel-alive/"><span data-dcnode-id="853" instrument_node="">feeling more alive.</span></a><span data-dcnode-id="851" instrument_node="">.</span></span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" style="font-weight: 400;"><span data-dcnode-id="847" instrument_node="">If you’re pursuing happiness, what you’re really pursuing is a sense of meaning in your life. Have you ever had those moments where you’re not necessarily happy, but it just feels like you’re on the right path? That right there is the secret to living a meaningful life.</span></span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="841"><b data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">A meaningful life is built around doing the right thing whether it makes you happy or not.&nbsp;</span></b></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" style="font-weight: 400;"><span data-dcnode-id="839" instrument_node="">The paradox is that many of the actions that helps us </span><a data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theenemyofaverage.com/how-to-reinvent-yourself/"><span data-dcnode-id="838" instrument_node="">reinvent who we are</span></a><span data-dcnode-id="836" instrument_node=""> make us stressed, unhappy, and uncomfortable in the moment.&nbsp;</span></span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" style="font-weight: 400;"><span data-dcnode-id="832" instrument_node="">It’s not as if you roll out of bed in the morning and say, “I can’t wait to eat vegetables, go to the gym, and then work for 10 hours today!”</span></span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="826"><b data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">But these are the activities that give your life meaning at the expense of feeling happy.</span></b></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" style="font-weight: 400;"><span data-dcnode-id="824" instrument_node="">I don’t feel happy when I’m in the middle of a grueling set of lifting weights at the gym – but I do feel pretty satisfied when I look in the mirror and don’t see a scrawny, thin skinned dude staring back at me.</span></span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" style="font-weight: 400;"><span data-dcnode-id="820" instrument_node="">I don’t even feel particularly happy writing this blog post right now. One of my friends literally just texted me and asked if I wanted to go golfing, which for a brief moment made me want to close my computer and start putting on my golf shoes.</span></span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" style="font-weight: 400;"><span data-dcnode-id="816" instrument_node="">And even if that didn’t happen, there’s a million other things I could be doing with my time that would be more fun. However, I’m choosing to skip out on these activities to write this blog post because it needs to get done – </span><b data-dcnode-id="811"><span data-dcnode-id="815" instrument_node="">and at least for today, I’ve decided to </span><a data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theenemyofaverage.com/how-to-prioritize-your-life/"><span data-dcnode-id="814" instrument_node="">prioritize meaning</span></a><span data-dcnode-id="812" instrument_node=""> over happiness.</span></b></span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="806" style="font-weight: 400;"><span data-dcnode-id="807" instrument_node="">If all you did every day was chase happiness, you’d be like an instant gratification monkey just chasing quick dopamine hits all day – </span></span><b data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">eating junk food, watching TV, playing video games, etc. </span></b><span data-dcnode-id="802" style="font-weight: 400;"><span data-dcnode-id="803" instrument_node="">None of these activities move you closer to your goals, but they trigger the release of dopamine, which is the neurotransmitter responsible for making you feel positive emotions.</span></span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="798" style="font-weight: 400;"><span data-dcnode-id="799" instrument_node="">So the main lesson here is that you need to make a distinction between meaning and happiness – </span></span><b data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">and understand that chasing the feeling of happiness is an illusion, because feelings come and go.</span></b></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">&nbsp;</span></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="786" style="text-align: center;"><span data-dcnode-id="790" instrument_node="">&nbsp;&nbsp;</span><img alt="picture of a man conquering happiness" class="alignnone wp-image-2433 entered lazyloaded" data-dcnode-id="789" data-lazy-sizes="(max-width: 342px) 100vw, 342px" data-lazy-src="https://theenemyofaverage.com/wp-content/uploads/2021/06/man-choosing-happiness-300x200.jpg" data-lazy-srcset="https://theenemyofaverage.com/wp-content/uploads/2021/06/man-choosing-happiness-300x200.jpg 300w, https://theenemyofaverage.com/wp-content/uploads/2021/06/man-choosing-happiness-1024x682.jpg 1024w, https://theenemyofaverage.com/wp-content/uploads/2021/06/man-choosing-happiness-768x512.jpg 768w, https://theenemyofaverage.com/wp-content/uploads/2021/06/man-choosing-happiness.jpg 1280w" data-ll-status="loaded" height="228" sizes="(max-width: 342px) 100vw, 342px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theenemyofaverage.com/wp-content/uploads/2021/06/man-choosing-happiness-300x200.jpg&amp;raw" srcset="https://theenemyofaverage.com/wp-content/uploads/2021/06/man-choosing-happiness-300x200.jpg 300w, https://theenemyofaverage.com/wp-content/uploads/2021/06/man-choosing-happiness-1024x682.jpg 1024w, https://theenemyofaverage.com/wp-content/uploads/2021/06/man-choosing-happiness-768x512.jpg 768w, https://theenemyofaverage.com/wp-content/uploads/2021/06/man-choosing-happiness.jpg 1280w" width="342"><noscript data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">&lt;img class="alignnone wp-image-2433 " src="https://theenemyofaverage.com/wp-content/uploads/2021/06/man-choosing-happiness-300x200.jpg" alt="picture of a man conquering happiness" width="342" height="228" srcset="https://theenemyofaverage.com/wp-content/uploads/2021/06/man-choosing-happiness-300x200.jpg 300w, https://theenemyofaverage.com/wp-content/uploads/2021/06/man-choosing-happiness-1024x682.jpg 1024w, https://theenemyofaverage.com/wp-content/uploads/2021/06/man-choosing-happiness-768x512.jpg 768w, https://theenemyofaverage.com/wp-content/uploads/2021/06/man-choosing-happiness.jpg 1280w" sizes="(max-width: 342px) 100vw, 342px" /&gt;</span></noscript></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">&nbsp;</span></p><span data-dcnode-id="782" instrument_node="">
</span><h2 data-dcnode-id="779"><b data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Is Happiness A Choice Or A Result?</span></b></h2><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" style="font-weight: 400;"><span data-dcnode-id="777" instrument_node="">Many people tend to believe that there is happiness to be found in achieving goals and getting more “stuff,” but research tells us a different story.</span></span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="772" style="font-weight: 400;"><span data-dcnode-id="773" instrument_node="">In happiness research, there is something called </span></span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/set-point-theory"><span data-dcnode-id="770" style="font-weight: 400;"><span data-dcnode-id="771" instrument_node="">set-point theory</span></span></a><span data-dcnode-id="767" style="font-weight: 400;"><span data-dcnode-id="768" instrument_node="">. It states that an increase in someone’s happiness due to an external life event, such as buying a new car or getting a promotion, will return to it’s baseline over time.&nbsp;</span></span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" style="font-weight: 400;"><span data-dcnode-id="764" instrument_node="">This tells us that our goal should be to enjoy the journey, not the destination. Whereas most people go through life chasing things that they believe will make them happy, the true joy lies in the pursuit of those things.</span></span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="758"><b data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">If you can’t find joy in the journey, you’re not going to find it in the destination.&nbsp;</span></b></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="755" style="font-weight: 400;"><span data-dcnode-id="756" instrument_node="">Consider this about the destination too – </span></span><i data-dcnode-id="752"><span data-dcnode-id="753" style="font-weight: 400;"><span data-dcnode-id="754" instrument_node="">it’s always changing.</span></span></i></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" style="font-weight: 400;"><span data-dcnode-id="749" instrument_node="">We’ve evolved to be creatures that are hard-wired to aim at specific targets. Once you achieve a goal, you might feel satisfied for a day, week, or even a month. But once that feeling subsides, your mindset shifts to the next target, and then the whole process starts over again.</span></span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="742"><i data-dcnode-id="743"><span data-dcnode-id="744" style="font-weight: 400;"><span data-dcnode-id="745" instrument_node="">Do you see the rat-race that unfolds when you believe that happiness is a result?&nbsp;</span></span></i></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="739" style="font-weight: 400;"><span data-dcnode-id="740" instrument_node="">It’s incredibly important to remove the illusion that there’s any one result or outcome that will bring us lasting happiness. Believing that happiness is a choice is about </span></span><b data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">embracing the joy that lies in small, everyday moments</span></b><span data-dcnode-id="735" style="font-weight: 400;"><span data-dcnode-id="736" instrument_node="">.</span></span></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" style="font-weight: 400;"><span data-dcnode-id="732" instrument_node="">You can choose to be grateful for having a steady income and a loving family even though you haven’t hit your goal of making six figures per year.</span></span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" style="font-weight: 400;"><span data-dcnode-id="728" instrument_node="">You can choose to perform an act of kindness for someone else, without caring about whether or not they reciprocate and positively impact the results of your life.</span></span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" style="font-weight: 400;"><span data-dcnode-id="724" instrument_node="">You can choose to be appreciative of everything that you have, while still striving and building positive momentum towards your goals.</span></span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" style="font-weight: 400;"><span data-dcnode-id="720" instrument_node="">It’s the act of believing that happiness is a choice as opposed to a result that often leads to this momentum in the first place. Because if you focus on what’s missing from your life constantly, you’ll still </span><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theenemyofaverage.com/how-to-get-unstuck/"><span data-dcnode-id="719" instrument_node="">feel stuck</span></a><span data-dcnode-id="717" instrument_node=""> no matter what you get or what you accomplish.</span></span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">&nbsp;</span></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="707"><img alt="ralph warston - happiness is a choice" class="size-medium wp-image-2428 aligncenter entered lazyloaded" data-dcnode-id="710" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://theenemyofaverage.com/wp-content/uploads/2021/06/Happiness-is-a-choice-quote-300x300.png" data-lazy-srcset="https://theenemyofaverage.com/wp-content/uploads/2021/06/Happiness-is-a-choice-quote-300x300.png 300w, https://theenemyofaverage.com/wp-content/uploads/2021/06/Happiness-is-a-choice-quote-1024x1024.png 1024w, https://theenemyofaverage.com/wp-content/uploads/2021/06/Happiness-is-a-choice-quote-150x150.png 150w, https://theenemyofaverage.com/wp-content/uploads/2021/06/Happiness-is-a-choice-quote-768x768.png 768w, https://theenemyofaverage.com/wp-content/uploads/2021/06/Happiness-is-a-choice-quote.png 1080w" data-ll-status="loaded" height="300" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theenemyofaverage.com/wp-content/uploads/2021/06/Happiness-is-a-choice-quote-300x300.png&amp;raw" srcset="https://theenemyofaverage.com/wp-content/uploads/2021/06/Happiness-is-a-choice-quote-300x300.png 300w, https://theenemyofaverage.com/wp-content/uploads/2021/06/Happiness-is-a-choice-quote-1024x1024.png 1024w, https://theenemyofaverage.com/wp-content/uploads/2021/06/Happiness-is-a-choice-quote-150x150.png 150w, https://theenemyofaverage.com/wp-content/uploads/2021/06/Happiness-is-a-choice-quote-768x768.png 768w, https://theenemyofaverage.com/wp-content/uploads/2021/06/Happiness-is-a-choice-quote.png 1080w" width="300"><noscript data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">&lt;img class="size-medium wp-image-2428 aligncenter" src="https://theenemyofaverage.com/wp-content/uploads/2021/06/Happiness-is-a-choice-quote-300x300.png" alt="ralph warston - happiness is a choice" width="300" height="300" srcset="https://theenemyofaverage.com/wp-content/uploads/2021/06/Happiness-is-a-choice-quote-300x300.png 300w, https://theenemyofaverage.com/wp-content/uploads/2021/06/Happiness-is-a-choice-quote-1024x1024.png 1024w, https://theenemyofaverage.com/wp-content/uploads/2021/06/Happiness-is-a-choice-quote-150x150.png 150w, https://theenemyofaverage.com/wp-content/uploads/2021/06/Happiness-is-a-choice-quote-768x768.png 768w, https://theenemyofaverage.com/wp-content/uploads/2021/06/Happiness-is-a-choice-quote.png 1080w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">&nbsp;</span></p><span data-dcnode-id="703" instrument_node="">
</span><h2 data-dcnode-id="700"><b data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">What Does Happiness is a Choice Mean?</span></b></h2><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" style="font-weight: 400;"><span data-dcnode-id="698" instrument_node="">At this point, some of you might be saying…</span></span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="691"><i data-dcnode-id="692"><span data-dcnode-id="693" style="font-weight: 400;"><span data-dcnode-id="694" instrument_node="">“Alright that sounds good and all, but I still don’t understand how can I be happy and fulfilled if I’m not where I want to be yet?”</span></span></i></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" style="font-weight: 400;"><span data-dcnode-id="689" instrument_node="">At this point, I’ll make some concessions and say that this mindset isn’t entirely applicable to every single person on the planet.&nbsp;</span></span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" style="font-weight: 400;"><span data-dcnode-id="685" instrument_node="">I’m a realist – if you have crippling depression because your parents struggled with depression, and their parents struggled with depression, telling you that “happiness is a choice” may make you want to punch a hole through your wall.</span></span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="680" style="font-weight: 400;"><span data-dcnode-id="681" instrument_node="">I understand full well that we’re not all born with the same brain chemistry, and that we all have varying degrees of pain and trauma to overcome.</span></span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="675"><b data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Being happy comes easier for some people than it does for others, and that’s a fact.</span></b></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" style="font-weight: 400;"><span data-dcnode-id="673" instrument_node="">But I’d pose these two questions as a response:</span></span></p><span data-dcnode-id="670" instrument_node="">
</span><ul data-dcnode-id="658"><span data-dcnode-id="669" instrument_node="">
</span><li data-dcnode-id="665"><i data-dcnode-id="666"><span data-dcnode-id="667" style="font-weight: 400;"><span data-dcnode-id="668" instrument_node="">Has anyone ever overcome your struggles and went on to live a meaningful life?</span></span></i></li><span data-dcnode-id="664" instrument_node="">
</span><li data-dcnode-id="660"><i data-dcnode-id="661"><span data-dcnode-id="662" style="font-weight: 400;"><span data-dcnode-id="663" instrument_node="">If you don’t believe that happiness is a choice, then what’s the alternative?</span></span></i></li><span data-dcnode-id="659" instrument_node="">
</span></ul><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" style="font-weight: 400;"><span data-dcnode-id="656" instrument_node="">I don’t know what you’re struggling with at this very moment, but here’s what I do know – </span><b data-dcnode-id="651"><span data-dcnode-id="655" instrument_node="">someone in this world has experienced your same </span><a data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theenemyofaverage.com/struggles-in-life/"><span data-dcnode-id="654" instrument_node="">struggles in life</span></a><span data-dcnode-id="652" instrument_node=""> and found a way out.</span></b><b data-dcnode-id="648"><br data-dcnode-id="650"><span data-dcnode-id="649" instrument_node="">
</span></b><span data-dcnode-id="646" style="font-weight: 400;"><span data-dcnode-id="647" instrument_node="">The world is filled with people who have raised themselves out from the pit of depression and anxiety and conquered their demons, so why can’t you?</span></span></span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="641" style="font-weight: 400;"><span data-dcnode-id="642" instrument_node="">You have the power to make things worse, but you also have the power to </span></span><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theenemyofaverage.com/how-to-change-your-life/"><span data-dcnode-id="639" style="font-weight: 400;"><span data-dcnode-id="640" instrument_node="">change your life for the better </span></span></a><span data-dcnode-id="636" style="font-weight: 400;"><span data-dcnode-id="637" instrument_node="">– and the latter choice is far more rewarding.</span></span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="632" style="font-weight: 400;"><span data-dcnode-id="633" instrument_node="">Isn’t that what life is all about? Isn’t that really the only option you have? To actually take baby steps forward and </span></span><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theenemyofaverage.com/how-to-form-new-habits/"><span data-dcnode-id="630" style="font-weight: 400;"><span data-dcnode-id="631" instrument_node="">start making small changes</span></span></a><span data-dcnode-id="627" style="font-weight: 400;"><span data-dcnode-id="628" instrument_node=""> that have a huge impact on your life.</span></span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" style="font-weight: 400;"><span data-dcnode-id="624" instrument_node="">And if you don’t choose to adopt that mindset, then what’s the alternative? To sit and wallow in self-pity and internalize the belief that none of the choices you make can increase your level of happiness?&nbsp;</span></span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="618"><b data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">That’s a pretty miserable way to go through the one chance that you’ve been given in life, considering you have 100% control over your daily actions.</span></b></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" style="font-weight: 400;"><span data-dcnode-id="616" instrument_node="">Happiness isn’t something that you feel, it’s something that you do. And in the next section of this article I’m going to talk about three daily actions you can put into practice that are scientifically proven to make you happier.</span></span></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">&nbsp;</span></p><span data-dcnode-id="610" instrument_node="">
</span><h2 data-dcnode-id="607"><b data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">3 Ways to Choose Happiness</span></b></h2><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" style="font-weight: 400;"><span data-dcnode-id="605" instrument_node="">Now that you know that happiness is a choice, let’s talk about how to make that choice on a day to day basis.</span></span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" style="font-weight: 400;"><span data-dcnode-id="601" instrument_node="">Happiness isn’t something that can be measured empirically, but life satisfaction is typically the measurement that researchers use to determine how happy someone is. Life satisfaction is simply a favorable attitude towards one’s life circumstances.</span></span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" style="font-weight: 400;"><span data-dcnode-id="597" instrument_node="">By studying people who have high levels of life satisfaction, researchers have been able to discover distinct </span><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theenemyofaverage.com/characteristics-of-happy-people/"><span data-dcnode-id="596" instrument_node="">characteristics that happy people exhibit.</span></a><span data-dcnode-id="594" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" style="font-weight: 400;"><span data-dcnode-id="590" instrument_node="">Here are those distinct characteristics – along with small baby step habits you can implement to actually develop these characteristics.</span></span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">&nbsp;</span></p><span data-dcnode-id="584" instrument_node="">
</span><h3 data-dcnode-id="581"><b data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">#1: Focus on Your Personal Relationships</span></b></h3><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" style="font-weight: 400;"><span data-dcnode-id="579" instrument_node="">Your relationships are the number one predictor of how </span><a data-dcnode-id="577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theenemyofaverage.com/create-your-own-happiness/"><span data-dcnode-id="578" instrument_node="">happy you are in life</span></a><span data-dcnode-id="576" instrument_node="">.</span></span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="571" style="font-weight: 400;"><span data-dcnode-id="572" instrument_node="">Happy people tend to have </span></span><b data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">more friends, more high-quality social relationships, and stronger social support networks</span></b><span data-dcnode-id="567" style="font-weight: 400;"><span data-dcnode-id="568" instrument_node=""> than less happy people.</span></span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="563" style="font-weight: 400;"><span data-dcnode-id="564" instrument_node="">The key here is to focus on two key things – </span></span><b data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">strengthening your existing relationships &amp; forming new ones.</span></b></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" style="font-weight: 400;"><span data-dcnode-id="558" instrument_node="">Many people focus on one while overlooking the other, and unhappy people tend to do a lousy job of both. Both aspects are necessary in order to deepen your social support system.</span></span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="546"><b data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">It’s also important to focus on quality rather than quantity. </span></b><span data-dcnode-id="548" style="font-weight: <a href=;"><span data-dcnode-id="552" instrument_node="">400;”&gt;Learn </span><a data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theenemyofaverage.com/how-to-make-friends-after-college/"><span data-dcnode-id="551" instrument_node="">how to make friends with people</span></a><span data-dcnode-id="549" instrument_node=""> who lift your spirit, and spend less time with people who drag you down by constantly complaining about their problems and blame other people for their failures</span></span><span data-dcnode-id="547" instrument_node="">.</span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" style="font-weight: 400;"><span data-dcnode-id="544" instrument_node="">You don’t have to cut these people out of your life completely, although that certainly wouldn’t hurt, but at the very least you need to distance yourself from the negative energy they bring into your life.</span></span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="539" style="font-weight: 400;"><span data-dcnode-id="540" instrument_node="">Who you spend time with greatly influences how you see the world, so a good rule of thumb is to try to </span></span><b data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">increase the hours you spend with people who are positive and upbeat while subtracting the hours you spend with people who aren’t. </span></b><span data-dcnode-id="535" style="font-weight: 400;"><span data-dcnode-id="536" instrument_node="">There’s a good chance that the former mindset will start to rub off on you because human beings are naturally wired to seek approval.</span></span></p><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" style="font-weight: 400;"><span data-dcnode-id="532" instrument_node="">When you hang out with positive people, your natural survival instincts will kick in and you’ll start to behave in ways that align with your new tribe’s core values.</span></span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="524"><b data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Daily Habit For Strengthening Existing Relationships </span></b><span data-dcnode-id="525" style="font-weight: 400;"><span data-dcnode-id="526" instrument_node="">– Text one friend from your contacts every single day to check in on them</span></span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="518"><b data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Daily Habit For Forming New Relationships</span></b><span data-dcnode-id="519" style="font-weight: 400;"><span data-dcnode-id="520" instrument_node=""> – Simply walk outside every day and start saying hello to people. Once you’re comfortable with that, transition into having brief conversations, and then longer conversations, giving compliments, etc.</span></span></p><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">&nbsp;</span></p><span data-dcnode-id="514" instrument_node="">
</span><h3 data-dcnode-id="511"><b data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">#2 – Practice Gratitude</span></b></h3><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="508" style="font-weight: 400;"><span data-dcnode-id="509" instrument_node="">When I stumbled upon the concept of gratitude, I was a little skeptical.</span></span></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" style="font-weight: 400;"><span data-dcnode-id="505" instrument_node="">You mean to tell me that simply saying three things I’m grateful for will make me happier on a daily basis? That’s gotta be total bull.</span></span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="500" style="font-weight: 400;"><span data-dcnode-id="501" instrument_node="">But the research was definitive – </span></span><b data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">practicing gratitude on a daily basis has a measurable impact on your overall well-being.</span></b></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" style="font-weight: 400;"><span data-dcnode-id="495" instrument_node="">It’s not so much about the act itself, the true power of gratitude lies in the mindset that you start to adopt as a result of making it a daily practice.</span></span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" style="font-weight: 400;"><span data-dcnode-id="491" instrument_node="">You’re not going to become a happy-go-lucky person who thinks the world is full of sunshine and rainbows, but you will start to find joy in those small moments each day that are easy to overlook.</span></span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" style="font-weight: 400;"><span data-dcnode-id="487" instrument_node="">Waking up with a roof over your head. Your kids hugging you when they get home from school. Grabbing coffee with a friend during their lunch break.</span></span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="482" style="font-weight: 400;"><span data-dcnode-id="483" instrument_node="">All of these moments should be treasured and appreciated because you never know how many of them you have left.</span></span></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="475"><b data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Daily Habit to Practice Gratitude</span></b><span data-dcnode-id="476" style="font-weight: 400;"><span data-dcnode-id="477" instrument_node=""> – Every morning, write down three things you’re grateful for every morning OR write down 1-2 positive things that happened to you over the past 24 hours.</span></span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">&nbsp;</span></p><span data-dcnode-id="471" instrument_node="">
</span><h3 data-dcnode-id="468"><b data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">#3 To Be Happy, Be Brave.</span></b></h3><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" style="font-weight: 400;"><span data-dcnode-id="466" instrument_node="">One of the biggest changes that I’ve made in my life over the past year is getting out of my </span><a data-dcnode-id="464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theenemyofaverage.com/comfort-zone-quotes/"><span data-dcnode-id="465" instrument_node="">comfort zone</span></a><span data-dcnode-id="463" instrument_node=""> more often.</span></span></p><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="458" style="font-weight: 400;"><span data-dcnode-id="459" instrument_node="">Many of us let fear run our lives and choose to avoid actions that make us feel uncomfortable. But if I’ve learned anything over the past year, it’s that you have no idea how much of life you’re missing out on when you play it safe.</span></span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="453"><b data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">I’ll just say it – regret is an absolute bitch.</span></b></p><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="449"><span data-dcnode-id="450" style="font-weight: 400;"><span data-dcnode-id="451" instrument_node="">Approaching a man/woman you’re attracted to. Letting someone know you care about them. Having a difficult conversation with a friend/parent. These are all difficult things that take bravery, and certainly don’t make you feel happy in the moment.</span></span></p><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="446" style="font-weight: 400;"><span data-dcnode-id="447" instrument_node="">But the pain of showing some courage doesn’t even compare to the long-term pain of avoiding those opportunities to get uncomfortable.</span></span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="441"><b data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Research shows that people who take risks and embrace their fears have greater self-confidence, more friends, and a more positive self-image.</span></b></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" style="font-weight: 400;"><span data-dcnode-id="439" instrument_node="">Many of these things are not actions you’re going to win medals for, but if you add them all up at the end of your life they make the difference between a life well-lived and a life spent in quiet desperation.</span></span></p><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="426"><b data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Daily Habit to Step Into Bravery</span></b><span data-dcnode-id="432" style="font-weight: 400;"><span data-dcnode-id="433" instrument_node=""> – Make a </span></span><a data-dcnode-id="429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theenemyofaverage.com/comfort-zone-challenges-that-will-change-your-life/"><span data-dcnode-id="430" style="font-weight: 400;"><span data-dcnode-id="431" instrument_node="">list of comfort zone challenges</span></span></a><span data-dcnode-id="427" style="font-weight: 400;"><span data-dcnode-id="428" instrument_node=""> and score each challenge on a scale from 1-10 depending on how afraid you are of it.</span></span></p><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">&nbsp;</span></p><span data-dcnode-id="422" instrument_node="">
</span><h2 data-dcnode-id="419"><b data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Final Note on Why Happiness is a Choice</span></b></h2><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="416" style="font-weight: 400;"><span data-dcnode-id="417" instrument_node="">It doesn’t really matter what we’re talking about: happiness, wealth, self-esteem – </span></span><b data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">you choose the level of satisfaction you feel in each of these areas.</span></b></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="410" style="font-weight: 400;"><span data-dcnode-id="411" instrument_node="">It’s true that attaining happiness is harder for some, but at the end of the day every single one of us has one thing in common – </span></span><b data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">we all have a choice.&nbsp;</span></b></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" style="font-weight: 400;"><span data-dcnode-id="405" instrument_node="">And trust me, there are people out there who have made the best out of the circumstances that you’re complaining about.</span></span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="400" style="font-weight: 400;"><span data-dcnode-id="401" instrument_node="">The only difference between you and them is that they decided to pursue meaning in spite of those circumstances, and you’re letting them sway you towards actions that don’t serve you.</span></span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="396" style="font-weight: 400;"><span data-dcnode-id="397" instrument_node="">You can’t always control how you feel, which is why the idea of “making it” and achieving a permanent state of happiness is a total myth.&nbsp;</span></span></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="389"><b data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">However, you can control how you act.</span></b><span data-dcnode-id="390" style="font-weight: 400;"><span data-dcnode-id="391" instrument_node=""> And when you change how you act, you will change how you feel naturally.</span></span></p><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" style="font-weight: 400;"><span data-dcnode-id="387" instrument_node="">As you start to develop a stronger social support system, embrace bravery, and practice gratitude, you’ll be well on your way to living a more meaningful life.</span></span></p><span data-dcnode-id="384" instrument_node="">
</span></div><span data-dcnode-id="381" instrument_node="">
</span></div><span data-dcnode-id="379" instrument_node="">

</span><a data-dcnode-id="297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theenemyofaverage.com/keystone-habits/" rel="bookmark noopener noreferrer" target="_self"><span data-dcnode-id="298" instrument_node="">Keystone Habits: The Quickest Way to Change Your Life</span></a><span data-dcnode-id="296" instrument_node="">
