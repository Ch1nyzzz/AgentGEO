</span><article class="post-8489 post type-post status-publish format-standard has-post-thumbnail hentry category-internal-happiness category-learn-how-to-be-happy mv-content-wrapper" data-dcnode-id="872" id="post-8489" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="1461" instrument_node="">
</span><div class="inside-article" data-dcnode-id="874"><span data-dcnode-id="1460" instrument_node="">
</span><header aria-label="Content" class="entry-header" data-dcnode-id="1427"><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1444" style="margin-top: 40px;"><span data-dcnode-id="1458" instrument_node="">
You are here:
</span><span data-dcnode-id="1445"><span data-dcnode-id="1446"><a data-dcnode-id="1456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trackinghappiness.com/"><span data-dcnode-id="1457" instrument_node="">Home</span></a><span data-dcnode-id="1455" instrument_node=""> » </span><span data-dcnode-id="1447"><a data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trackinghappiness.com/happy-blog/"><span data-dcnode-id="1454" instrument_node="">How To Be Happy</span></a><span data-dcnode-id="1452" instrument_node=""> » </span><span data-dcnode-id="1449"><a data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trackinghappiness.com/internal-happiness/"><span data-dcnode-id="1451" instrument_node="">Internal Happiness</span></a></span><span data-dcnode-id="1448" instrument_node="">
</span></span></span></span></p><h1 class="entry-title" data-dcnode-id="1442" itemprop="headline"><span data-dcnode-id="1443" instrument_node="">Why Happiness is not Always a Choice (+5 Tips on Dealing With it)</span></h1><div class="custom-post-meta" data-dcnode-id="1431"><span data-dcnode-id="1441" instrument_node="">
</span><span class="author-name" data-dcnode-id="1437"><span data-dcnode-id="1440" instrument_node="">By </span><a data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trackinghappiness.com/author/andrea/"><span data-dcnode-id="1439" instrument_node="">Andrea</span></a></span><br data-dcnode-id="1436"><span data-dcnode-id="1435" instrument_node="">
</span><span class="entry-date" data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Published October 28, 2021 - Updated October 31, 2021</span></span><span data-dcnode-id="1432" instrument_node="">
</span></div><span data-dcnode-id="1430" instrument_node="">
</span><hr data-dcnode-id="1429"><span data-dcnode-id="1428" instrument_node=""> </span></header><span data-dcnode-id="1426" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1041" itemprop="text"><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Chances are, you’ve come across at least one print art in your life with some version of the words: ‘happy thoughts only.’ Although these phrases are well-intentioned, they mistakenly suggest that we always have control over our happiness. As much as I wish this was true, it’s simply not the case.&nbsp;</span></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Happiness is determined by a vast range of complex internal and external factors. A happy life is reasonably achievable for most of us, but for some, happiness is significantly more difficult to obtain. There are factors beyond our control that impede happiness such as socioeconomic status, genetics, and mental illness. However, just because you’re not able to choose happiness right now doesn’t mean that you never will. With the right perspective, resources, and support, happiness can be within reach.&nbsp;</span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">In this article, I’ll explore the various factors that unfairly hinder happiness for some people and the strategies to help you cope with these circumstances.</span></p><span data-dcnode-id="1416" instrument_node="">
</span><div class="no_bullets contracted" data-dcnode-id="1378" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="1408"><span data-dcnode-id="1415" instrument_node="">Contents</span><span data-dcnode-id="1414" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="1409"><span data-dcnode-id="1413" instrument_node="">[</span><a data-dcnode-id="1411" href="#"><span data-dcnode-id="1412" instrument_node="">show</span></a><span data-dcnode-id="1410" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="1379" style="display: none;"><li data-dcnode-id="1405"><a data-dcnode-id="1406" href="#Can_happiness_be_hereditarynbsp"><span data-dcnode-id="1407" instrument_node="">Can happiness be hereditary?&nbsp;</span></a></li><li data-dcnode-id="1402"><a data-dcnode-id="1403" href="#Factors_beyond_our_control_that_deter_happinessnbsp"><span data-dcnode-id="1404" instrument_node="">Factors beyond our control that deter happiness&nbsp;</span></a></li><li data-dcnode-id="1383"><a data-dcnode-id="1400" href="#Tips_on_how_to_deal_with_itnbsp"><span data-dcnode-id="1401" instrument_node="">Tips on how to deal with it&nbsp;</span></a><ul data-dcnode-id="1384"><li data-dcnode-id="1397"><a data-dcnode-id="1398" href="#1_Practice_gratitude_dailynbsp"><span data-dcnode-id="1399" instrument_node="">1. Practice gratitude daily&nbsp;</span></a></li><li data-dcnode-id="1394"><a data-dcnode-id="1395" href="#2_Create_a_self-care_routinenbsp"><span data-dcnode-id="1396" instrument_node="">2. Create a self-care routine&nbsp;</span></a></li><li data-dcnode-id="1391"><a data-dcnode-id="1392" href="#3_Assess_your_relationshipsnbsp"><span data-dcnode-id="1393" instrument_node="">3. Assess your relationships&nbsp;</span></a></li><li data-dcnode-id="1388"><a data-dcnode-id="1389" href="#4_Embrace_yin_and_yangnbsp"><span data-dcnode-id="1390" instrument_node="">4. Embrace yin and yang&nbsp;</span></a></li><li data-dcnode-id="1385"><a data-dcnode-id="1386" href="#5_Seek_professional_helpnbsp"><span data-dcnode-id="1387" instrument_node="">5. Seek professional help&nbsp;</span></a></li></ul></li><li data-dcnode-id="1380"><a data-dcnode-id="1381" href="#Closing_words"><span data-dcnode-id="1382" instrument_node="">Closing words</span></a></li></ul></div><span data-dcnode-id="1377" instrument_node="">
</span><p class="HTBH-Callout" data-dcnode-id="1369"><span data-dcnode-id="1376" instrument_node="">What is happiness exactly? What is there to learn about happiness? This article is a part of </span><a data-dcnode-id="1374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trackinghappiness.com/happy-blog/"><span data-dcnode-id="1375" instrument_node="">the most in-depth guide on how to be happy</span></a><span data-dcnode-id="1373" instrument_node="">, which answers these questions in the first section: </span><a data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trackinghappiness.com/what-is-happiness/"><span data-dcnode-id="1372" instrument_node="">What Is Happiness</span></a><span data-dcnode-id="1370" instrument_node="">?</span></p><span data-dcnode-id="1368" instrument_node="">
</span><h2 data-dcnode-id="1365"><span data-dcnode-id="1366" id="Can_happiness_be_hereditarynbsp"><span data-dcnode-id="1367" instrument_node="">Can happiness be hereditary?&nbsp;</span></span></h2><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">Although happiness is a choice for the most part, it turns out some humans are born with a greater disposition for happiness.&nbsp;</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1360" instrument_node="">Your genetics may not guarantee happiness, but they do determine your personality to some extent. A </span><a data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//citeseerx.ist.psu.edu/viewdoc/download%3Fdoi%3D10.1.1.319.8008%26rep%3Drep1%26type%3Dpdf"><span data-dcnode-id="1359" instrument_node="">study</span></a><span data-dcnode-id="1357" instrument_node=""> on the genetics of personality discovered that some people are born with personalities capable of creating an ‘affective reserve.’ These people are able to use this reserve of happiness to cope better with life’s difficulties.&nbsp;</span></p><span data-dcnode-id="1355" instrument_node="">
</span><h2 data-dcnode-id="1352"><span data-dcnode-id="1353" id="Factors_beyond_our_control_that_deter_happinessnbsp"><span data-dcnode-id="1354" instrument_node="">Factors beyond our control that deter happiness&nbsp;</span></span></h2><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">While happiness is attainable for most of us, it’s a lot more difficult for some people. Some are at a disadvantage, while others are simply not wired for it.&nbsp;</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1347" instrument_node="">It’s significantly easier for those with greater access to resources to choose happiness. A </span><a data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Dalia-Susniene/publication/228696715_The_concepts_of_quality_of_life_and_happiness_-_Correlation_and_differences/links/02e7e534c09d2ed37a000000/The-concepts-of-quality-of-life-and-happiness-Correlation-and-differences.pdf"><span data-dcnode-id="1346" instrument_node="">study</span></a><span data-dcnode-id="1344" instrument_node=""> suggests a correlation between quality of life and life satisfaction. People who lack security, financial stability, and spiritual harmony report lower levels of happiness.</span></p><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1341" instrument_node="">Another </span><a data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.sagepub.com/doi/10.1177/1745691613507583"><span data-dcnode-id="1340" instrument_node="">study</span></a><span data-dcnode-id="1338" instrument_node=""> found happiness to be higher among people with access to financial resources and social support. Those who are better off financially experience higher levels of life satisfaction. When you have access to support such as therapy, it becomes easier to determine and overcome the factors in the way of your happiness.</span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1335" instrument_node="">While access to therapy does help, it’s significantly more challenging for those with mental illness to choose happiness. According to one </span><a data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//papers.ssrn.com/sol3/papers.cfm%3Fabstract_id%3D2336397"><span data-dcnode-id="1334" instrument_node="">study</span></a><span data-dcnode-id="1332" instrument_node="">, mental health is the strongest indicator of happiness. Those who suffer from a mental illness are less likely to be happy than those who don’t.&nbsp;</span></p><span data-dcnode-id="1330" instrument_node="">
</span><h2 data-dcnode-id="1327"><span data-dcnode-id="1328" id="Tips_on_how_to_deal_with_itnbsp"><span data-dcnode-id="1329" instrument_node="">Tips on how to deal with it&nbsp;</span></span></h2><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">As much as we wish we could simply wake up and choose happiness, that’s not always possible. Regardless of whatever circumstance in your life is preventing you from being happy, here 5 tips to help you deal with it.&nbsp;</span></p><span data-dcnode-id="1323" instrument_node="">
</span><h3 data-dcnode-id="1320"><span data-dcnode-id="1321" id="1_Practice_gratitude_dailynbsp"><span data-dcnode-id="1322" instrument_node="">1. Practice gratitude daily&nbsp;</span></span></h3><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1318" instrument_node="">There’s a reason why every self-help book seems to contain a chapter on gratitude. Gratitude is consistently </span><a data-dcnode-id="1316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trackinghappiness.com/how-does-gratitude-make-us-happier-with-actual-examples/"><span data-dcnode-id="1317" instrument_node="">linked with greater happiness</span></a><span data-dcnode-id="1315" instrument_node="">. Those who are more grateful tend to experience more positive emotions and blissful moments. It also helps people cope better with difficult situations and negative emotions.&nbsp;</span></p><span data-dcnode-id="1313" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1308"><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">I don’t have to chase extraordinary moments to find happiness – it’s right in front of me if I’m paying attention and practicing gratitude.</span></p><cite data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Brené Brown </span></cite></blockquote><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1306" instrument_node="">Gratitude teaches you to </span><a data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.harvard.edu/healthbeat/giving-thanks-can-make-you-happier"><span data-dcnode-id="1305" instrument_node="">acknowledge the good</span></a><span data-dcnode-id="1303" instrument_node=""> things that come your way. It trains your mind to notice goodness even in the most unexpected places. From the kind stranger who held the door open for you at the coffee shop to the way the sky looks at sunset, gratitude allows you to appreciate what you typically overlook. This makes it easier to find moments of joy in the mundane.&nbsp;</span></p><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">The practice of being thankful for something at least once a day can dramatically shift your life perspective. To start a gratitude practice, take a few moments before bed each night to reflect on the day’s events. Try your best to name at least one thing you’re grateful for. The more you can name, the better. It’s also a good idea to write them down in a journal. This way, you can look back and read about all the good things that have happened to you.&nbsp;</span></p><span data-dcnode-id="1298" instrument_node="">
</span><h3 data-dcnode-id="1295"><span data-dcnode-id="1296" id="2_Create_a_self-care_routinenbsp"><span data-dcnode-id="1297" instrument_node="">2. Create a self-care routine&nbsp;</span></span></h3><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">When you feel at your worst, your self-care often suffers. Ironically, this is when you need self-care the most. This is why it’s essential to create a self-care routine that eventually becomes a habit.&nbsp;</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">You might not be able to choose happiness, but you can choose to take care of yourself. A self-care routine is a powerful antidote to life’s biggest stressors. True self-care, the type that goes beyond bubble baths and a tub of ice cream, isn’t always easy. It means showing up for yourself even when you don’t feel like it.&nbsp;&nbsp;</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">If you’re interested in building a self-care routine, here are a few ideas to consider including in your daily routine:&nbsp;</span></p><span data-dcnode-id="1285" instrument_node="">
</span><ul data-dcnode-id="1262"><li data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Sleep for at least 7 hours.&nbsp;</span></li><li data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Make the bed in the morning.&nbsp;</span></li><li data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Meditate.&nbsp;</span></li><li data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Go for a walk.&nbsp;</span></li><li data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Prepare nutritious meals for yourself.&nbsp;</span></li><li data-dcnode-id="1272"><a data-dcnode-id="1273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trackinghappiness.com/how-much-does-exercising-make-you-happier/"><span data-dcnode-id="1274" instrument_node="">Exercise.&nbsp;</span></a></li><li data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Drink at least 8 cups of water.&nbsp;</span></li><li data-dcnode-id="1267"><a data-dcnode-id="1268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trackinghappiness.com/how-to-self-care-journal/"><span data-dcnode-id="1269" instrument_node="">Journal.&nbsp;</span></a></li><li data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Read a book before bed.&nbsp;</span></li><li data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Practice gratitude.&nbsp;</span></li></ul><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">When you invest the time and energy into taking care of your well-being, you give yourself your best chance of being happy.&nbsp;</span></p><span data-dcnode-id="1258" instrument_node="">
</span><h3 data-dcnode-id="1255"><span data-dcnode-id="1256" id="3_Assess_your_relationshipsnbsp"><span data-dcnode-id="1257" instrument_node="">3. Assess your relationships&nbsp;</span></span></h3><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1253" instrument_node="">Numerous </span><a data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4579537/"><span data-dcnode-id="1252" instrument_node="">studies</span></a><span data-dcnode-id="1250" instrument_node=""> have shown that the quality of your relationships influences your happiness. The </span><a data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.adultdevelopmentstudy.org/"><span data-dcnode-id="1249" instrument_node="">longest study on happiness</span></a><span data-dcnode-id="1247" instrument_node=""> ever conducted found that people who are satisfied in their relationships live longer and happier lives. Therefore, it’s crucial to invest time and effort into the relationships that matter most to you.&nbsp;</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">On the other hand, if you’re in an unhealthy relationship, it’s possible that might be contributing to your lack of happiness. Your relationships are meant to support and uplift you, not drain your energy or make you feel small.&nbsp;</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">To assess the health of your relationships, ask yourself the following questions:&nbsp;</span></p><span data-dcnode-id="1239" instrument_node="">
</span><ul data-dcnode-id="1228"><li data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Can I be fully myself around this person?&nbsp;</span></li><li data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Can I communicate with them openly about anything?&nbsp;</span></li><li data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Do I trust this person to be honest with me? Can I be honest with them?&nbsp;</span></li><li data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Does my chest feel lighter or heavier when I’m with them?&nbsp;</span></li><li data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Do they respect my boundaries?&nbsp;</span></li></ul><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">It’s important to examine your relationships and identify those that are unhealthy. Remember that it’s okay to walk away from relationships that no longer serve you.&nbsp;</span></p><span data-dcnode-id="1224" instrument_node="">
</span><h3 data-dcnode-id="1221"><span data-dcnode-id="1222" id="4_Embrace_yin_and_yangnbsp"><span data-dcnode-id="1223" instrument_node="">4. Embrace yin and yang&nbsp;</span></span></h3><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1219" instrument_node="">The complex </span><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ed.ted.com/lessons/the-hidden-meanings-of-yin-and-yang-john-bellaimey"><span data-dcnode-id="1218" instrument_node="">philosophy of yin and yang</span></a><span data-dcnode-id="1216" instrument_node=""> or yin-yang has been around for over a thousand years. It’s a beautiful concept with roots in Taoism that essentially explains the balance that permeates all aspects of life. According to this philosophy, seemingly opposite forces such as light and dark are actually deeply interconnected.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">This means that without pain and sorrow, we wouldn’t be able to fully experience happiness. The worst moments of your life make your best ones all the more meaningful. Yin-yang suggests that pain and suffering are necessary human experiences that allow happiness to be possible.&nbsp;</span></p><span data-dcnode-id="1211" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1206"><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">The wound is the place where the Light enters you.</span></p><cite data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Rumi</span></cite></blockquote><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">So if you’re going through dark days, keep going. If yin-yang is right, brighter days are bound to come soon. You might not be able to choose happiness today, but someday, you will. Life will balance itself out.&nbsp;</span></p><span data-dcnode-id="1202" instrument_node="">
</span><h3 data-dcnode-id="1199"><span data-dcnode-id="1200" id="5_Seek_professional_helpnbsp"><span data-dcnode-id="1201" instrument_node="">5. Seek professional help&nbsp;</span></span></h3><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Happiness is often not a choice for anyone suffering from mental illness. If anxiety or depression is preventing you from experiencing happiness, consider seeking professional help. Your mental illness is not your fault, and you are certainly not alone. But it can be tough to remember this without the proper support.&nbsp;</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">It’s possible that a chemical imbalance in your brain is the barrier between you and happiness. A therapist can prescribe medication to help you regulate your mood and gain back control over your life. You may not be able to choose happiness while suffering from a mental illness, but you can make the brave choice to go to therapy.</span></p><span data-dcnode-id="1192" instrument_node="">

</span><h2 data-dcnode-id="1080"><span data-dcnode-id="1081" id="Closing_words"><span data-dcnode-id="1082" instrument_node="">Closing words</span></span></h2><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Even though happiness is not always a choice, that doesn’t mean you shouldn’t try to improve your life. Learning how to deal with negativity, connecting with people on a regular basis, volunteering and improving your habits can all help you become a happier person. Happiness might not always be a choice, but loving yourself and improving your life can be.</span></p><span data-dcnode-id="1076" instrument_node="">

</span><h4 data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Andrea Araya</span></h4><span data-dcnode-id="1060" instrument_node="">
