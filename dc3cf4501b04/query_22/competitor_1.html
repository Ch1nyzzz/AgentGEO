</span><h1 class="entry-title" data-dcnode-id="4447" itemprop="headline"><span data-dcnode-id="4448" instrument_node="">Happiness is a Choice, So Choose It!</span></h1><div class="entry-meta" data-dcnode-id="4436"><span data-dcnode-id="4446" instrument_node="">By </span><span class="posted-by vcard author" data-dcnode-id="4438" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span data-dcnode-id="4445" instrument_node=""> </span><a class="url fn n" data-dcnode-id="4440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//possibilitychange.com/author/mariana-ashley/" itemprop="url" rel="author" title="View all posts by Mariana Ashley"><span data-dcnode-id="4444" instrument_node="">
</span><span class="author-name" data-dcnode-id="4442" itemprop="name"><span data-dcnode-id="4443" instrument_node="">Mariana Ashley</span></span><span data-dcnode-id="4441" instrument_node="">
</span></a><span data-dcnode-id="4439" instrument_node="">
</span></span><span data-dcnode-id="4437" instrument_node="">
</span></div><span data-dcnode-id="4435" instrument_node=""> </span></div><span data-dcnode-id="4433" instrument_node="">
</span><div class="post-thumb-img-content post-thumb" data-dcnode-id="4429"><img alt="happiness is a choice" class="attachment-large size-large wp-post-image lazyloaded" data-dcnode-id="4432" data-sizes="(max-width: 590px) 100vw, 590px" data-src="https://s10721.pcdn.co/wp-content/uploads/2012/03/happiness-is-a-choice-e1332132285224.jpg" data-srcset="https://s10721.pcdn.co/wp-content/uploads/2012/03/happiness-is-a-choice-e1332132285224.jpg 590w, https://s10721.pcdn.co/wp-content/uploads/2012/03/happiness-is-a-choice-e1332132285224-300x200.jpg 300w" height="393" itemprop="image" loading="lazy" sizes="(max-width: 590px) 100vw, 590px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s10721.pcdn.co/wp-content/uploads/2012/03/happiness-is-a-choice-e1332132285224.jpg&amp;raw" srcset="https://s10721.pcdn.co/wp-content/uploads/2012/03/happiness-is-a-choice-e1332132285224.jpg 590w, https://s10721.pcdn.co/wp-content/uploads/2012/03/happiness-is-a-choice-e1332132285224-300x200.jpg 300w" width="590"><noscript data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">&lt;img width="590" height="393" src="https://s10721.pcdn.co/wp-content/uploads/2012/03/happiness-is-a-choice-e1332132285224.jpg" class="attachment-large size-large wp-post-image" alt="happiness is a choice" itemprop="image" loading="lazy" srcset="https://s10721.pcdn.co/wp-content/uploads/2012/03/happiness-is-a-choice-e1332132285224.jpg 590w, https://s10721.pcdn.co/wp-content/uploads/2012/03/happiness-is-a-choice-e1332132285224-300x200.jpg 300w" sizes="(max-width: 590px) 100vw, 590px" /&gt;</span></noscript></div><span data-dcnode-id="4428" instrument_node="">
</span></header><span data-dcnode-id="4425" instrument_node="">
</span><div class="entry-content clear" data-dcnode-id="4269" itemprop="text"><span data-dcnode-id="4424" instrument_node="">
</span><p data-dcnode-id="4422"><span data-dcnode-id="4423" instrument_node="">There are some people who seem to think that happiness is the result of all the right wheels turning at just the right time. You’re walking down the street, find twenty dollars, get a compliment from a stranger, meet the perfect guy or girl (and don’t totally make a fool of yourself), go to your favorite store and get 50% off, etc., etc.</span></p><span data-dcnode-id="4421" instrument_node="">
</span><p data-dcnode-id="4419"><span data-dcnode-id="4420" instrument_node="">It’s easy to be happy when everything seems to be going your way, but I think that defining happiness that way reduces it to a by-product of luck, or an accident, which it is not. In fact, I might even argue that luck is a byproduct of happiness if I was in a particularly feisty mood.</span></p><span data-dcnode-id="4418" instrument_node="">
</span><h3 data-dcnode-id="4412"><strong data-dcnode-id="4413"><span data-dcnode-id="4417" instrument_node="">Happiness doesn’t just </span><em data-dcnode-id="4415"><span data-dcnode-id="4416" instrument_node="">happen</span></em><span data-dcnode-id="4414" instrument_node="">.</span></strong></h3><span data-dcnode-id="4411" instrument_node="">
</span><p data-dcnode-id="4406"><span data-dcnode-id="4410" instrument_node="">Some days are good, but there are probably more days that are just mediocre or plain bad, and it’s on those days that the true nature of happiness is revealed. Have you ever met someone who </span><a data-dcnode-id="4408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//possibilitychange.com/ways-to-be-more-positive/" title="ways to be positive"><span data-dcnode-id="4409" instrument_node="">stayed positive</span></a><span data-dcnode-id="4407" instrument_node="">, even when they’re having a bad day, and everything that can go wrong seems to be going wrong? If you’re having a bad day, too, just being near someone like that can be uplifting (although for others it is annoying, but that usually just stems from jealousy).</span></p><span data-dcnode-id="4405" instrument_node="">
</span><p data-dcnode-id="4400"><span data-dcnode-id="4404" instrument_node="">People who are able to smile even through the worst of times have learned a very important lesson, the same lesson I stated above: Happiness doesn’t just </span><em data-dcnode-id="4402"><span data-dcnode-id="4403" instrument_node="">happen</span></em><span data-dcnode-id="4401" instrument_node="">.</span></p><span data-dcnode-id="4399" instrument_node="">
</span><h3 data-dcnode-id="4396"><strong data-dcnode-id="4397"><span data-dcnode-id="4398" instrument_node="">Happiness is a choice.</span></strong></h3><span data-dcnode-id="4395" instrument_node="">
</span><p data-dcnode-id="4390"><span data-dcnode-id="4394" instrument_node="">That’s right, a choice. Not an accident, not a charitable gift from the universe. Of course, it’s nice to receive those gifts, and easy to&nbsp;</span><a data-dcnode-id="4392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//possibilitychange.com/happiness-within-yourself/" title="be happy with yourself"><span data-dcnode-id="4393" instrument_node="">be happy</span></a><span data-dcnode-id="4391" instrument_node=""> when you do, but happiness is about choosing to see the adventure in every moment, choosing to understand that there will always be a light after the dark, that there is always good in every situation and every person, no matter how grim things may seem.</span></p><span data-dcnode-id="4389" instrument_node="">
</span><p data-dcnode-id="4387"><span data-dcnode-id="4388" instrument_node="">That’s the key to happiness: choosing it. It’s not an easy choice all the time, and it very well may be the last thing you want to do sometimes. When grief strikes, or when you just can’t seem to catch a break, sometimes you just want to sulk and stay upset, perpetuate the sadness. It’s a natural response, but it isn’t a required behavior, it’s a choice. And choosing to be happy will make you a better, stronger, wiser, more longsuffering person.</span></p><span data-dcnode-id="4386" instrument_node="">
</span><p data-dcnode-id="4381"><span data-dcnode-id="4385" instrument_node="">We always have the choice to be happy. Learning to change our attitude is frustrating, but worth it in the end. When we </span><a data-dcnode-id="4383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//possibilitychange.com/10-wise-choices-to-skyrocket-your-happiness/" title="choose to be happy"><span data-dcnode-id="4384" instrument_node="">choose to be happy</span></a><span data-dcnode-id="4382" instrument_node="">, things tend to work in our favor, and luck seems to be on our side; and even if things don’t happen the way you want them to, if you choose to be happy, you can accept situations for what they are and make the most of life, no matter the hand it deals you.</span></p><span data-dcnode-id="4380" instrument_node="">
</span><p data-dcnode-id="4375"><span data-dcnode-id="4376" style="font-size: xx-small;"><span data-dcnode-id="4379" instrument_node="">Photo by </span><a data-dcnode-id="4377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.flickr.com/photos/jackbatchelor/6148131185/"><span data-dcnode-id="4378" instrument_node="">Jack Batchelor</span></a></span></p><span data-dcnode-id="4374" instrument_node="">
</span><img alt="happiness is a choice" class="ss-hidden-pin-image lazyload" data-dcnode-id="4373" data-pin-description="Happiness is a Choice, So Choose It! via @possibilitychange" data-pin-media="https://s10721.pcdn.co/wp-content/uploads/2012/03/happiness-is-a-choice-e1332132285224.jpg" data-pin-url="https://possibilitychange.com/happiness-is-a-choice/" data-src="https://s10721.pcdn.co/wp-content/uploads/2012/03/happiness-is-a-choice-e1332132285224.jpg" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="><noscript data-dcnode-id="4371"><span data-dcnode-id="4372" instrument_node="">&lt;img src="https://s10721.pcdn.co/wp-content/uploads/2012/03/happiness-is-a-choice-e1332132285224.jpg" class="ss-hidden-pin-image" alt="happiness is a choice" data-pin-url="https://possibilitychange.com/happiness-is-a-choice/" data-pin-media="https://s10721.pcdn.co/wp-content/uploads/2012/03/happiness-is-a-choice-e1332132285224.jpg" data-pin-description="Happiness is a Choice, So Choose It! via @possibilitychange"/&gt;</span></noscript><span data-dcnode-id="4370" instrument_node=""> </span><div class="ss-inline-share-wrapper ss-hover-animation-fade ss-with-counter-border ss-inline-total-counter-left ss-left-inline-content ss-small-icons ss-with-spacing ss-rounded-icons" data-dcnode-id="4272"><span data-dcnode-id="4369" instrument_node="">

</span><p data-dcnode-id="3937"><span data-dcnode-id="3938" instrument_node="">Mariana – beautifully written and expressed – you make some amazing points – YES happiness is a choice and sometimes I feel as if people rather stay in their roles of being victim, martyr instead of choosing happiness.  Don’t understand but that’s the games people play.</span></p><span data-dcnode-id="3936" instrument_node="">
</span><p data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">As for myself I choose “happiness”….even in the midst of a painful divorce, I moved myself to California and decided to start living and be happy!  What a difference that made – I could have complained, cried, whined and on and on – not that I didn’t at times but overall it was the happiness of my new adventure that made it all worth while.</span></p><span data-dcnode-id="3933" instrument_node="">

</span><section class="ast-comment-content comment" data-dcnode-id="3863"><span data-dcnode-id="3880" instrument_node="">
</span><p data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">I’ve always remained and reminded myself to stay in the state of compassion and bliss. I simply just ignore everything that puts me into distress. Not that there are not situations and I am all happy that they are, or how would I know that the state of that happiness is incomparable.?!</span></p><span data-dcnode-id="3877" instrument_node="">
</span><p data-dcnode-id="3875"><span data-dcnode-id="3876" instrument_node="">All I know is that happiness is not for the lousy souls. It is for the courageous, the care takers, the ignorant, the selfless, the focused, the decisive and the vigorous. You can’t be happy without being these. You’ve to be you first and then let go &amp; Breathe.</span></p><span data-dcnode-id="3874" instrument_node="">
</span><p data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">That’s when you find true happiness. That’s when you are said to have chosen happiness. Great post Mariana!</span></p><span data-dcnode-id="3871" instrument_node="">

</span><section class="ast-comment-content comment" data-dcnode-id="3749"><span data-dcnode-id="3766" instrument_node="">
</span><p data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">I agree Happiness is a conscious choice, a personal choice to either be happy or miserable and it isn’t the responsibility of another to make a person feel “happy.” (there are exceptions of course) I also believe that whatever trials and tribulations a person crosses on their life journey could mold a person to become stronger because life isn’t a walk in the park. A person in their lifetime will face some obstacles, one time or another and will need to adjust or change accordingly. However, not many people have that mindset. Unfortunately, some people may stay stuck; becoming bitter, angry &amp; depressed and repetitively continuing the vicious cycle that brought them their original unhappy state of mind. I know a few people who fall in this category. I tried to reach out to help them but my happiness &amp; success made them lash out in jealousy. So, by personal choice I cut them out of my life. It was the best decision I ever made and I am happier today for doing so because it’s suffocating being in the same vicinity of such miserable people. It is better to be surrounded by happy people to be happy. </span></p><span data-dcnode-id="3763" instrument_node="">
</span><p data-dcnode-id="3761"><span data-dcnode-id="3762" instrument_node="">I shared your blog on my facebook and twitter. </span></p><span data-dcnode-id="3760" instrument_node="">
</span><p data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">Have a great day.</span></p><span data-dcnode-id="3757" instrument_node="">

</span><section class="ast-comment-content comment" data-dcnode-id="3484"><span data-dcnode-id="3507" instrument_node="">
</span><p data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">i agree with parts of this article, but i think if people ignored “feelings” and walked around all the time like everything is great (ignoring their feelings), i think they will explode at some point.</span></p><span data-dcnode-id="3504" instrument_node="">
</span><p data-dcnode-id="3502"><span data-dcnode-id="3503" instrument_node="">life is simple, if your happy, great keep doing what your doing, if your not happy then change your life, to put yourself in a better place to be happy.</span></p><span data-dcnode-id="3501" instrument_node="">
</span><p data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">example: if someone is cheating or not treating you right, don’t ignore it. do something about it. of course this wouldnt make someone happy to be in this situation. its ok to feel unhappiness. you get through it bad feelings and all, and change things so that your not in this position again. thus in the future you can be happy. dont focus on being unhappy, thats just stupid. focus on changing things to be happier, but dont forget to feel the feelings that come along in life, and in this situation.</span></p><span data-dcnode-id="3498" instrument_node="">
</span><p data-dcnode-id="3496"><span data-dcnode-id="3497" instrument_node="">you cant force yourself to be happy all the time, its not logical. it stops you from feeling “feelings”. feelings are important to growth as a person, all of them are. happiness, sadness, regret, madness, love, hate, and all the others. i think people should feel them as they come along in their life, and deal with them. not sweep them under the rug, as this article suggests. </span></p><span data-dcnode-id="3495" instrument_node="">
</span><p data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">just dont let a certain “one” feeling run your life, thats stupid too…</span></p><span data-dcnode-id="3492" instrument_node="">
</span><div class="ast-comment-edit-reply-wrap" data-dcnode-id="3486"><span data-dcnode-id="3491" instrument_node="">

</span><section class="ast-comment-content comment" data-dcnode-id="3220"><span data-dcnode-id="3243" instrument_node="">
</span><p data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">I am well known for the fact that I ALWAYS choose happiness. But one day, I had a very, very bad day. One thing after another went wrong. Nothing seemed to work out. I cried, I threw a hissy fit, I fell into hysterical, if-I-don’t-laugh-right-now-I’ll-have-a-nervous-breakdown laughter, and then cried some more. It was one heck of a day.</span></p><span data-dcnode-id="3240" instrument_node="">
</span><p data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">I couldn’t seem to choose happiness that day. I tried, but it didn’t work. And the coworkers who told me how they always depended on me to cheer up their day only made me feel worse.</span></p><span data-dcnode-id="3237" instrument_node="">
</span><p data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">But I was laughing about the whole thing by the next day.</span></p><span data-dcnode-id="3234" instrument_node="">
</span><p data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">To me, that is the meaning of choosing happiness. Sometimes, you’re going to get angry. Sometimes, things are going to go so wrong you cry. But you get up and get back on the horse anyway.</span></p><span data-dcnode-id="3231" instrument_node="">
</span><p data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">Because why would you want to choose to be miserable?</span></p><span data-dcnode-id="3228" instrument_node="">
</span><div class="ast-comment-edit-reply-wrap" data-dcnode-id="3222"><span data-dcnode-id="3227" instrument_node="">

</span><section class="ast-comment-content comment" data-dcnode-id="2994"><span data-dcnode-id="3020" instrument_node="">
</span><p data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">Happiness is a fleeting emotion. It comes and goes.</span></p><span data-dcnode-id="3017" instrument_node="">
</span><p data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">I believe what this article is really talking about (especially towards the end) is acceptance. Presence of the mind. Appreciation.</span></p><span data-dcnode-id="3014" instrument_node="">
</span><p data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">From this perspective, I’ve learned to have deep appreciation for my experiences, good or bad. It’s been tough building a brand, for instance, but it matters not what I “feel” along this process. Behind this is a soothing, sublime feeling that tells me whatever I’m doing is the right thing.</span></p><span data-dcnode-id="3011" instrument_node="">
</span><p data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">Because I’m the one doing it.</span></p><span data-dcnode-id="3008" instrument_node="">
</span><p data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">Thanks for this article.</span></p><span data-dcnode-id="3005" instrument_node="">
</span><p data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">– Danny</span></p><span data-dcnode-id="3002" instrument_node="">

</span><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Every day we make choices in our lives. But the most important choice is to be happy and always look for ways to make others around us happy too. That’s what I think of happiness. I think positive attitude in life is the key to being happy. I think people should not live in the past and should look for ways to improve who they are. No matter where a person comes from or how successful or rich, having happiness in life is priceless and the most cherish able thing that a person can have. The most important thing is to choose happiness and pass it to everyone else that is around you to make life more beautiful and enjoyable. Never wait for happiness instead choose it and keep it.</span></p><span data-dcnode-id="1798" instrument_node="">

</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Happiness is a state of mind and you have to make yourself happy. You should never place the fate of your happiness in people or things. Happy people are just like us. They have problems, bills, disappointment, stress, and drama in their lives too. The truth is you can either choose to be happy or surrender your happiness to the troubles in your life. On every given day, if you should search you’ll find reasons to be sad, but the reverse is also true, on every given day, you can find a reason to be happy. My happiness is my priority. I choose to be happy.</span></p><span data-dcnode-id="1330" instrument_node="">

le="height: 229.297px; background-image: url(&quot;https://scontent-iad3-2.cdninstagram.com/v/t51.2885-15/275934576_1002899697292426_2515913043851280339_n.jpg?_nc_cat=107&amp;ccb=1-5&amp;_nc_sid=8ae9d6&amp;_nc_ohc=MPI-xMwwSvoAX9N7wy5&amp;_nc_ht=scontent-iad3-2.cdninstagram.com&amp;edm=AM6HXa8EAAAA&amp;oh=00_AT8VgP0t1XM1rSDkzltM81IKBsQ3wVli3M-uEXcQXSgj4A&amp;oe=626A3348&quot;); background-size: cover; background-position: center center; background-repeat: no-repeat;" target="_blank"><span data-dcnode-id="1187" instrument_node="">
</span><span class="sbi-screenreader" data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">"Personally, I struggle with change. Even good cha</span></span><span data-dcnode-id="1184" instrument_node="">
</span><img alt="&quot;Personally, I struggle with change. Even good change can be tricky for me to deal with. For example, about six months ago I left my job to focus on my site, PositivelyPresent.com, full time. I initiated this change—and was thrilled about it—but it was still a struggle to get used to the idea that I would be in control of my own business.

I would be making my own hours, writing on my own schedule. It was a great change—but I found it hard to adapt at times. I was used to the routine of my corporate job and suddenly I was alone in my apartment all day, expected to take care of all aspects of my newborn company, and it was overwhelming.

Even though I love my routines—and tend to shy away from change—changing my own career path has taught me to think differently about change. It’s shown me that change—even change I’ve initiated—can be unpredictable. It’s shown me that I can’t always control change—but I can control the way I think about it.&quot;

This excerpt is from &quot;5 Ways to Change Your Mind About Change&quot; by Dani DiPirro. Visit the Possibility Change website to read the full story!

</span><img alt="&quot;From the outside, you may have thought I was just a college kid having fun. It’s normal to screw around and not know what you want to do with your life. But honestly, I was not happy. I had no interest in college, all I wanted to do was party and I did not care about my health.
