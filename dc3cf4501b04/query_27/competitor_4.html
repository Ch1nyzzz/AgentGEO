</span><h2 data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Leading with Feeling: Nine Strategies of Emotionally  Intelligent Leadership</span></h2><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="840"><strong data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">By: </span></strong><a data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/cherniss.htm"><span data-dcnode-id="845" instrument_node="">Dr. Cary Cherniss</span></a><span data-dcnode-id="843" instrument_node=""> </span><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">and Dr. Cornelia W. Roche</span></strong></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="838" instrument_node="">For many decades, the conventional wisdom was that emotion has no place in the work world, and the ideal leader is one who approaches problems rationally and unemotionally. However, the reality is that emotion is inevitable when a group of people come together for an extended period of time to work on challenging tasks, and if used effectively, a leader's moods and emotions can be a plus rather than a minus.</span><br data-dcnode-id="837"><span data-dcnode-id="836" instrument_node="">
</span><br data-dcnode-id="835"><span data-dcnode-id="834" instrument_node="">
                      This book describes how 25 outstanding leaders used emotional intelligence to deal with critical challenges and opportunities. Featuring commentary from the leaders themselves describing how they handled each situation, it helps managers better understand not just what emotional intelligence is, or how to measure it, or how it is linked to bottom-line results: it also shows how real leaders used their emotional intelligence to deal with real situations. The book distills the leaders' experiences into nine strategies that can help any leader or potential leader to be more effective. Each chapter concludes with activities that help readers to apply immediately each of those strategies.</span></p></td></tr><tr data-dcnode-id="659"><td colspan="2" data-dcnode-id="661"><h4 data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Guidelines for Best Practice</span></h4><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="824" instrument_node="">These guidelines are based on an   exhaustive review of the research literature in training and development,   counseling and psychotherapy, and behavior change. The guidelines are additive   and synergistic; to be effective, social and emotional learning experiences need   not adhere to all of these guidelines, but the chances for success increase with   each one that is followed. </span><a data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/reports/guidelines.html"><span data-dcnode-id="823" instrument_node="">Read More»</span></a><a data-dcnode-id="821" href="#"></a><span data-dcnode-id="820" instrument_node=""> If you are interested in reading the full technical report on emotional intelligence in the workplace published by the Consortium on Research on Emotional Intelligence in Organizations, click </span><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/reports/technical_report.html"><span data-dcnode-id="819" instrument_node="">here</span></a><span data-dcnode-id="817" instrument_node=""> to download your free copy.</span></p><span data-dcnode-id="815" instrument_node="">
</span><h4 data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">The Business Case for Emotional Intelligence</span></h4><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="811" instrument_node="">The following 19 points build a case   for how emotional intelligence contributes to the bottom line in any work   organization. Based on data from a variety of sources, it can be a valuable tool   for HR practitioners and managers who need to make the case in their own   organizations. The Consortium also invites submissions of other research for the   Business Case. All submissions will be reviewed to determine their   suitability. </span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/reports/business_case_for_ei.html"><span data-dcnode-id="810" instrument_node="">Read more»</span></a><a data-dcnode-id="808" href="#"></a></p><span data-dcnode-id="806" instrument_node="">
</span><h4 data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Research Digest</span></h4><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">This section of the EI Consortium web site is intended to keep you updated   with the latest research findings. We will be summarizing the latest research in   the area of emotional intelligence in the workplace by providing you with   abstracts of the latest articles from the literature.  We will be   highlighting a different area from the scholarly literature on emotional   intelligence. If you want research updates sent to you automatically, just sign   up for our monthly newsletter.</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="794"><strong data-dcnode-id="795"><span data-dcnode-id="799" instrument_node="">Allen, J.S, Stevenson,  R.M., O’Boyle, E.H., Seibert, S. (2021). What matters more for entrepreneurship  success? A meta-analysis comparing general mental ability and emotional  intelligence in entrepreneurial settings. </span><em data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Strategic Entrepreneurship  Journal, 15, </span></em><span data-dcnode-id="796" instrument_node="">352–376.</span></strong></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Using meta-analysis, the  authors investigated the extent to which General Mental Ability (GMA) and  Emotional Intelligence (EI) predict entrepreneurial success, as measured by  financial success, firm growth, firm size, or subjective success. This  metanalysis leveraged findings from 40 studies that were conducted among 65,826  business owners and that included data on either GMA and/or EI. The results  revealed that both GMA and EI matter for success, but that the size of the  relationship is more than twice as large for EI. The findings imply that EI  based training might also help leaders develop skills for entrepreneurial  success such as networking, coaching, and adaptability.&nbsp;The main  limitation of the study is its inability to account for the interaction between  GMA and EI. It is possible that GMA has a stronger relationship to  entrepreneurial success when EI is high. Individuals  with high levels of cognitive resources perform better when experiencing less  stress, suggesting EI could aid in the utilization of high cognitive ability.</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="784"><strong data-dcnode-id="785"><span data-dcnode-id="789" instrument_node="">Grobelny, J., Radke, P.,  Paniotova-Maczka, D. (2021). Emotional intelligence and job performance: A  meta-analysis. </span><em data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">International Journal of Work Organisation and Emotion,  12(1),</span></em><span data-dcnode-id="786" instrument_node=""> 1-47.</span></strong></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">This study employed a  meta-analytic method to investigate the relationship between EI and job  performance. Results showed a moderate correlation between EI and performance  for both ability and trait models of EI. EI correlates most strongly with job performance measured by  complex ratings (i.e., summary of several detailed ratings from multiple  sources) which suggests that EI is associated with a wide range of behaviors  and outcomes that build employee performance. Bankers, policemen and production  workers are among groups in which the relation between EI and job performance  is the strongest. The authors state that the meaningful relation between EI and  performance support its use for recruitment purposes.</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="775"><strong data-dcnode-id="776"><span data-dcnode-id="779" instrument_node="">Blickle, G., Kranefeld,  I., Wihler, A., Kückelhaus, B.P., &amp; Menges, J.I. (2021). It works without  words: A nonlinguistic ability test of perceiving emotions with job-related  consequences. </span><em data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">European Journal of Psychological Assessment.</span></em></strong></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Emotion recognition  ability can be important for job performance, leadership, and career  success.&nbsp;The purpose of this study was to develop and validate the  Face-Based Emotion Matching Test (FEMT), a nonlinguistic objective test based  on a set of images featuring different emotions. Participants were shown a set  of pair images (e.g., surprise vs. fear, anger vs. neutral) and were asked to  assess whether the two images featured: the same emotion, somewhat the same  emotion, somewhat different emotions, or different emotions. The instrument  showed validity with psychological constructs (emotional intelligence - MSCEIT,  Big Five personality traits) as well as a relationship with social astuteness  and adaptive performance in the workplace. This measure can help researchers  develop a more comprehensive understanding of the perception of emotions in  others.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="766"><strong data-dcnode-id="767"><span data-dcnode-id="770" instrument_node="">Miao C, Humphrey RH, Qian S.                        Emotional intelligence and servant leadership: A metaanalytic review. Business Ethics: A Eur Rev . 2021;00:1– 13.</span><a data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1111/beer.12332"><span data-dcnode-id="769" instrument_node=""> https://doi.org/10.1111/beer.12332</span></a></strong></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="764" instrument_node="">Servant leadership is an effective leadership style that focuses on ethics and morality. Emotional intelligence (EI) is also associated with effective leadership and ethical behavior; thus, there has been a surge in studies that assessed the link between EI and servant leadership. Nevertheless, the empirical landscape of this relationship is mixed and fragmented. We undertook a meta‐analysis to clarify this literature and found that (a) EI has a significant positive relationship with servant leadership (</span><em data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">ρ</span></em><span data-dcnode-id="761" instrument_node="">̅̂&nbsp;=&nbsp;.57); (b) the relationship between EI and servant leadership is stronger in studies having a lower percentage of well‐educated subjects, in low power distance cultures, and in high institutional collectivism cultures; and (c) We were unable to find sufficient evidence to support moderating effects of the relationship between EI and servant leadership for gender (male‐dominated and female‐dominated studies), age (between young and old subjects), for self‐report versus follower‐report of servant leadership, and across different scales of servant leadership. </span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="754"><strong data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Michinov, E., &amp; Michinon. N. (2020).  When emotional intelligence predicts team performance: Further validation of  the short version of the Workgroup Emotional Intelligence Profile. Current  Psychology.</span></strong><br data-dcnode-id="756"><span data-dcnode-id="755" instrument_node="">
                        The purpose of this research was to extend  the validation of the short version of the Workgroup Emotional Intelligence  Profile (WEIP-S), notably by examining its predictive validity for team  performance. Six studies were conducted to achieve this objective. The results  indicate that the WEIP-S has a four-factor structure and can be reliably  measured with 16 items. Moreover, it can be used as a predictive measure of  team performance: groups with higher average levels of EI performed better than  those with lower levels. The results confirm that team EI&nbsp; can influence performance and cognitive  processes such as the ability to identify the expertise of each team member and  solve challenges. The authors state that the WEIPS may be used in education and  stress prevention programs because it provides a way of learning how to  regulate one's own emotions and those of others when working in teams.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="744"><strong data-dcnode-id="746"><span data-dcnode-id="752" instrument_node="">Miao, C., Humphrey, R. H., &amp; Qian, S. (2017). A  meta-analysis of emotional intelligence effects on job satisfaction mediated by  job resources, and a test of moderators. </span><em data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Personality and Individual Differences.</span></em><span data-dcnode-id="749" instrument_node=""> </span><em data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">116, 281–288.</span></em></strong><em data-dcnode-id="745"></em></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">This paper examines whether job resources act as a mediator in the emotional intelligence (EI)—job satisfaction relationship, and examines possible moderators, including gender, age, tenure, and job level. We conducted a meta-analysis to explore these relationships. The meta-analysis demonstrated that: First, EI is positively related to job resources (k =15,N = 4151; overall EI: ^ρ= 0.27; ability EI: ^ρ= 0.24; self-report EI: ^ρ= 0.27; mixed EI: ^ρ= 0.28). Second, job resources mediate the relationship between EI and job satisfaction. Third, the relationship be-tween EI and job satisfaction does not differ across gender, age, and tenure, meaning that regardless of whether an employee is male or female, young or old, or having short or long tenure, they equally beneﬁt from EI. The moderator effect of job level is only signiﬁcant for self-report EI—job satisfaction and this relationship is stronger in non-managerial jobs than in managerial jobs. Yet, the moderator effect of job level is not signiﬁcant for ability EI—job satisfaction and mixed EI—job satisfaction meta-analytic distributions. These results indicate that EI aids employees by helping them obtain job resources, and that both job resources and EI have practical implications in terms of employee job satisfaction.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="734"><strong data-dcnode-id="735"><span data-dcnode-id="739" instrument_node="">Miao, C., Humphrey, R. H., &amp; Qian, S.  (2017). Are the emotionally intelligent good citizens or counterproductive? A 
                        meta-analysis of emotional intelligence and its relationships with
                        organizational citizenship behavior and counterproductive work behavior. </span><em data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Personality and Individual Differences</span></em><span data-dcnode-id="736" instrument_node="">, 116, 144-156.</span></strong></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">This research project examines whether emotional intelligence (EI) is related to organizational citizenship behavior
                        (OCB) and counterproductive work behavior (CWB). A key question concerns the degree to which EI is related
                        to OCB and CWB after controlling for other established predictors. The study uses meta-analytical
                        summaries of existing research (for EI-OCB, k=68, N = 16,386; for EI-CWB, k= 17, N = 3914). It uses meta-analytical
                        controls to obtain the best estimates of effect sizes, incremental validity, and relative importance.
                        This meta-analysis found that EI is positively associated with OCB and negatively related to CWB. When controlling
                        for ability measures of EI, the Big Five personality measures, general self-efficacy, cognitive intelligence, and
                        self-rated performance, both self-report measures of EI and mixed competency measures of EI show incremental
                        validity and relative importance in predicting OCB and CWB. An analysis of self-report EI found that the effects of
                        EI on OCB and CWB are stronger in health care and service industries than in industries where emotional labor
                        demands are lower. The results imply that organizations can increase OCB and reduce CWB by recruiting employees
                        high in EI and by training employees in emotional competencies.</span></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="723"><strong data-dcnode-id="725"><span data-dcnode-id="729" instrument_node="">Miao, C., Humphrey, R. H., &amp; Qian, S.  (2016). Leader emotional intelligence and subordinate job satisfaction: A 
                        meta-analysis of main, mediator, and moderator effects. </span><em data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Personality and Individual Differences</span></em><span data-dcnode-id="726" instrument_node="">, 102, 13–24</span></strong><span data-dcnode-id="724" instrument_node="">. </span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Based on a meta-analysis, leaders' emotional intelligence (EI) positively relates to subordinates' job satisfaction. . All three EI streams (ability, self-report, mixed) exhibit signiﬁcant incremental validity and relative importance (RW) in the presence of personality and cognitive ability in predicting subordinates' job satisfaction. Leaders' EI demonstrates signiﬁcant incremental validity and RW in the presence of subordinates' EI in predicting subordinates' job satisfaction. Subordinates' EI positively relates to leaders' EI and mediates the relationship between leaders' EI and subordinates' job satisfaction. Modera-tor analyses indicate that (1) ability EI has a lower association with subordinates' job satisfaction than self-report EI and mixed EI; and (2) leaders' EI more positively relates to subordinates' job satisfaction in low in-group col-lectivistic or low humane oriented cultures.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="711"><strong data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Momm, T., Blickle, G., Liu, Y., Wihler, A., Kholin, M., &amp; Menges, J. I. (2015). It pays to have an eye for emotions: Emotion recognition ability indirectly predicts annual income.</span></strong><span data-dcnode-id="716" instrument_node=""> </span><strong data-dcnode-id="712"><em data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Journal of Organizational Behavior, 36,</span></em><span data-dcnode-id="713" instrument_node="">&nbsp;147-163</span></strong></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">This study examines how the emotion recognition ability relates to annual income. Participants were 142 employees working in various jobs and organizations in Germany. Emotion recognition was assessed with the Diagnostic Analysis of Nonverbal Accuracy 2, a self-report measure which asks participants to identify facial and vocal emotional expressions. Results revealed that the relationship between emotion recognition ability and annual income is mediated by political and interpersonal skills. This means that the better people are at recognizing emotions, the better they handle the politics in organizations and the interpersonal aspects of work life, and thus the more they earn in their jobs. The findings imply that emotional abilities enable people to be more successful at work.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="698"><strong data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Parke, M.R., Seo, M.G., &amp; Sherf, E.N. (2015). Regulating and facilitating: The role of emotional intelligence in maintaining and using positive affect for creativity.</span></strong><span data-dcnode-id="704" instrument_node=""> </span><strong data-dcnode-id="700"><em data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Journal of Applied Psychology, 100(3),</span></em><span data-dcnode-id="701" instrument_node="">&nbsp;917-93</span></strong><span data-dcnode-id="699" instrument_node="">4.</span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">This study examined how two facets of EI - emotion regulation and emotion facilitation - can shape employee creativity, an important element to driving innovation at work. The study used a multimethod (MSCEIT, experience sampling, survey) and multisource (archival, self-reported, supervisor-reported) research design of early career managers in the U.S. across a wide range of jobs. The study found that emotion regulation ability enables employees to maintain higher positive affect (e.g., excitement and enthusiasm) while emotion facilitation ability enables employees to use their positive affect to enhance their creativity, as measured by their supervisors. A sample item for creativity was: "This person comes up with new and practical ideas to improve performance." The findings indicate that EI is an important variable to consider when hiring knowledge workers to produce creativity in jobs. Because EI tests exist, organizations could include these tests with other personality measures for screening purposes. Employees can also be trained to increase their abilities at managing their emotional states and responses to work requirements.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="688"><strong data-dcnode-id="689"><span data-dcnode-id="693" instrument_node="">Koveshnikov, A., Wechtler, H., &amp; Dejoux, C. (2014). Cross-cultural adjustment of expatriates: The role of emotional intelligence and gender.&nbsp;</span><em data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Journal of World Business, 49,</span></em><span data-dcnode-id="690" instrument_node="">&nbsp;362-371.</span></strong></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">The study examines the role of EI in cross-cultural adjustment of expatriates on international assignments. Participants were 269 expatriates from a French company working in 133 countries. The independent variable, EI, was measured using SSEIT, a self-report instrument measuring appraisal, expression, regulation and utilization of emotion. The dependent variable, cross-cultural adjustment, was measured from the point of view of the expatriate based on three factors (general adjustment, interaction adjustment, and work adjustment). Cultural similarity and prior international experience were used as control variables. The results revealed a significant and positive relationship between EI and expatriates' cultural adjustment after controlling for cultural similarity and international experience. This finding suggests that it may be beneficial for organizations to leverage EI as a factor when selecting employees to go on expensive international assignments.</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="676"><strong data-dcnode-id="677"><span data-dcnode-id="683" instrument_node="">Mahon, E.G., Taylor, S.N., &amp; Boyatzis, R.E. (2014). Antecedents  of organizational engagement: exploring vision, mood and perceived  organizational support with emotional intelligence as a moderator. </span><em data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Frontiers in Psychology</span></em><span data-dcnode-id="680" instrument_node="">.&nbsp; Link to full-text article: </span><a data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//journal.frontiersin.org/Journal/10.3389/fpsyg.2014.01322/abstract"><span data-dcnode-id="679" instrument_node="">http://journal.frontiersin.org/Journal/10.3389/fpsyg.2014.01322/abstract</span></a></strong></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">As organizational leaders worry about the appalling low percentage of people who feel engaged in their work, academics are trying to understand what causes an increase in engagement. We collected survey data from 231 team members from two organizations. We examined the impact of team members’ emotional intelligence (EI) and their perception of shared personal vision, shared positive mood, and perceived organizational support (POS) on the members’ degree of organizational engagement. We found shared vision, shared mood, and POS have a direct, positive association with engagement. In addition, shared vision and POS interact with EI to positively influence engagement. Besides highlighting the importance of shared personal vision, positive mood, and POS, our study contributes to the emergent understanding of EI by revealing EI’s amplifying effect on shared vision and POS in relation to engagement. We conclude by discussing the research and practical implications of this study.</span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="662"><strong data-dcnode-id="665"><span data-dcnode-id="671" instrument_node="">O'Boyle, E. H., Jr., R. H. Humphrey, et  al. (2011). The relation between emotional intelligence and job  performance: A meta-analysis. </span><em data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Journal of Organizational Behavior,</span></em><span data-dcnode-id="668" instrument_node=""> 32(5),  788-818.</span><br data-dcnode-id="667"><span data-dcnode-id="666" instrument_node="">
</span></strong><br data-dcnode-id="664"><span data-dcnode-id="663" instrument_node="">
                      This  meta-analysis builds upon a previous meta-analysis by (1) including 65 per cent  more studies that have over twice the sample size to estimate the relationships  between emotional intelligence (EI) and job performance; (2) using more current  meta-analytical studies for estimates of relationships among personality  variables and for cognitive ability and job performance; (3) using the  three-stream approach for classifying EI research; (4) performing tests for  differences among streams of EI research and their relationships with  personality and cognitive intelligence; (5) using latest statistical procedures  such as dominance analysis; and (6) testing for publication bias. We classified  EI studies into three streams: (1) ability-based models that use objective test  items; (2) self-report or peer-report measures based on the four-branch model  of EI; and (3) ''mixed models'' of emotional competencies. The three streams  have corrected correlations ranging from 0.24 to 0.30 with job performance. The  three streams correlated differently with cognitive ability and with  neuroticism, extroversion, openness, agreeableness, and conscientiousness.  Streams 2 and 3 have the largest incremental validity beyond cognitive ability  and the Five Factor Model (FFM). Dominance analysis demonstrated that all three  streams of EI exhibited substantial relative importance in the presence of FFM  and intelligence when predicting job performance. Publication bias had  negligible influence on observed effect sizes. The results support the overall  validity of EI.</span></p></td></tr></tbody></table><span data-dcnode-id="654" instrument_node="">
</span><br data-dcnode-id="653"></td></tr></tbody></table><span data-dcnode-id="647" instrument_node="">

</span><p data-dcnode-id="570"><strong data-dcnode-id="579"><a data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gsapp.rutgers.edu/programs/organizational-psychology"><span data-dcnode-id="581" instrument_node="">Rutgers University - Graduate School of Applied and Professional Psychology</span></a></strong><span data-dcnode-id="578" instrument_node=""> </span><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gsapp.rutgers.edu/programs/organizational-psychology"><strong data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">(GSAPP)</span></strong></a><span data-dcnode-id="574" instrument_node=""> is now offering a doctoral program in Organizational Psychology and is accepting applications for students. The Consortium for Research on Emotional Intelligence in Organizations is headquartered within Rutgers, providing students the opportunity to conduct research and collaborate with leading experts in the field of emotional intelligence. Click </span><a data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gsapp.rutgers.edu/programs/organizational-psychology"><span data-dcnode-id="573" instrument_node="">here</span></a><span data-dcnode-id="571" instrument_node=""> for additional information.</span></p><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="564"><strong data-dcnode-id="565"><em data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">NEW</span></em><span data-dcnode-id="566" instrument_node=""> Research Fellowship</span></strong></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="556"><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.t2pri.org/research-fellowship/"><span data-dcnode-id="562" instrument_node="">think2perform Research  Institute’s Research Fellowship program</span></a><span data-dcnode-id="560" instrument_node=""> invites proposals from doctoral  candidates, post-docs and junior faculty pursuing self-defined research focused  on moral intelligence, purpose, and/or emotional intelligence. Click </span><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.t2pri.org/research-fellowship/"><span data-dcnode-id="559" instrument_node="">here</span></a><span data-dcnode-id="557" instrument_node=""> for more information. </span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="549"><strong data-dcnode-id="550"><span data-dcnode-id="554" instrument_node="">Listen to Consortium member</span><a data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/wolfe.html"><span data-dcnode-id="553" instrument_node=""> Chuck Wolfe</span></a><span data-dcnode-id="551" instrument_node=""> interview some of the thought leaders in emotional intelligence.</span></strong></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="545"><strong data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Harvard Alumni Panel - Why is interest in Emotional Intelligence Soaring?</span></strong></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="527"><span data-dcnode-id="543" instrument_node="">Consortium member </span><a data-dcnode-id="541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/wolfe.html"><span data-dcnode-id="542" instrument_node="">Chuck Wolfe</span></a><span data-dcnode-id="540" instrument_node=""> hosts a panel of world class leaders in the field of emotional intelligence (EI) to talk about why interest in EI is soaring. Panel members include EI Consortium members </span><a data-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/boyatzis.htm"><span data-dcnode-id="539" instrument_node="">Dr. Richard Boyatzis</span></a><span data-dcnode-id="537" instrument_node="">, </span><a data-dcnode-id="535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/cherniss.htm"><span data-dcnode-id="536" instrument_node="">Dr. Cary Cherniss</span></a><span data-dcnode-id="534" instrument_node=""> and </span><a data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/riess.html"><span data-dcnode-id="533" instrument_node="">Dr. Helen Riess</span></a><span data-dcnode-id="531" instrument_node="">. Click </span><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dk6KfyKRrf-U%26t%3D16s"><span data-dcnode-id="530" instrument_node="">here</span></a><span data-dcnode-id="528" instrument_node=""> to view the panel discussion.</span></p><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="523"><strong data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Interview with Dr. Cary Cherniss and Dr. Cornelia Roche</span></strong></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="521" instrument_node="">Host, </span><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/wolfe.html"><span data-dcnode-id="520" instrument_node="">Chuck Wolfe</span></a><span data-dcnode-id="518" instrument_node=""> interviews Drs. </span><a data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/cherniss.htm"><span data-dcnode-id="517" instrument_node="">Cary Cherniss</span></a><span data-dcnode-id="515" instrument_node=""> and Cornelia Roche about their new book </span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/exec/obidos/ASIN/0190698942/consortiuforrese"><span data-dcnode-id="514" instrument_node="">Leading with Feeling: Nine Strategies of Emotionally Intelligent Leadership</span></a><span data-dcnode-id="512" instrument_node="">. The authors share powerful stories of cases involving outstanding leaders using strategies that can be learned that demonstrate effective use of emotional intelligence. Click </span><a data-dcnode-id="510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D2WjIQGQn6CA"><span data-dcnode-id="511" instrument_node="">here</span></a><span data-dcnode-id="509" instrument_node=""> to see the interview.</span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="504"><strong data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Interview with Dr. Rick Aberman</span></strong></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="502" instrument_node="">See </span><a data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/wolfe.html"><span data-dcnode-id="501" instrument_node="">Chuck Wolfe</span></a><span data-dcnode-id="499" instrument_node=""> interview Consortium member and sports psychologist </span><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/aberman.html"><span data-dcnode-id="498" instrument_node="">Dr. Rick Aberman</span></a><span data-dcnode-id="496" instrument_node=""> on peak performance and dealing with the pandemic. The interview is filled with insights, humorous anecdotes, and strategies for achieving peak performance in athletics and in life. Click </span><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dry_TrLIB34U%26list%3DPLI1Fd3wzCAP5fhcbczVLFSpHAyDayemPN%26index%3D7%26t%3D1242s"><span data-dcnode-id="495" instrument_node="">here</span></a><span data-dcnode-id="493" instrument_node=""> to see the interview.</span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="488"><strong data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Interview with Dr. David Caruso</span></strong></p><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="474"><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/wolfe.html"><span data-dcnode-id="486" instrument_node="">Chuck Wolfe</span></a><span data-dcnode-id="484" instrument_node=""> interviews Consortium member </span><a data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/caruso.htm"><span data-dcnode-id="483" instrument_node="">David  Caruso</span></a><span data-dcnode-id="481" instrument_node=""> talking about their work together, the ability model of emotional  intelligence, and insights into how to use emotional intelligence to address  staying emotionally and mentally healthy during times of crisis and  uncertainty. Click&nbsp;</span><a data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DsFmSuW9eBAY%26list%3DPLI1Fd3wzCAP5fhcbczVLFSpHAyDayemPN%26index%3D7"><span data-dcnode-id="480" instrument_node="">here</span></a><a data-dcnode-id="478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.prx.org/stories/287075"></a><a data-dcnode-id="476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//exchange.prx.org/pieces/261038"><span data-dcnode-id="477" instrument_node="">&nbsp;</span></a><span data-dcnode-id="475" instrument_node="">to listen to the interview.</span></p><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="470"><strong data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Interview with Dr. Richard Boyazis</span></strong></p><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="453"><span data-dcnode-id="468" instrument_node="">How can you help someone to change? </span><a data-dcnode-id="466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/boyatzis.htm"><span data-dcnode-id="467" instrument_node="">Richard Boyatzis </span></a><span data-dcnode-id="465" instrument_node="">is an expert in multiple areas including emotional intelligence. Richard and his coauthors, Melvin Smith, and </span><a data-dcnode-id="463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/oosten.html"><span data-dcnode-id="464" instrument_node="">Ellen Van Oosten</span></a><span data-dcnode-id="462" instrument_node="">, have discovered that helping people connect to their positive vision of themselves or an inspiring dream or goal they've long held is key to creating changes that last. In their book </span><a data-dcnode-id="460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/exec/obidos/ASIN/1633696561/consortiuforrese"><span data-dcnode-id="461" instrument_node="">Helping People Change</span></a><span data-dcnode-id="459" instrument_node=""> the authors share real stories and research that shows choosing a compassionate over a compliance coaching approach is a far more engaging and successful way to Helping People Change. Click&nbsp;</span><a data-dcnode-id="457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//beta.prx.org/stories/287075"><span data-dcnode-id="458" instrument_node="">here</span></a><a data-dcnode-id="455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//exchange.prx.org/pieces/261038"><span data-dcnode-id="456" instrument_node="">&nbsp;</span></a><span data-dcnode-id="454" instrument_node="">to listen to the interview.</span></p><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="449"><strong data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Interview with Dr. Marc Brackett</span></strong></p><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="441"><a data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/brackett.html"><span data-dcnode-id="447" instrument_node="">Marc Brackett</span></a><span data-dcnode-id="445" instrument_node="">, Director of the Yale Center for  Emotional Intelligence, has written a wonderful book about feelings. I worked  with Marc when he was first crafting his world class social and emotional  learning program, RULER. Our interview highlights how Marc has achieved his own  and his Uncle's vision for encouraging each of us to understand and manage our  feelings. My conversation with Marc is inspiring, humorous, and engaging at  times. Click </span><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//exchange.prx.org/pieces/298959"><span data-dcnode-id="444" instrument_node="">here</span></a><span data-dcnode-id="442" instrument_node=""> to listen  to the interview. </span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="437"><strong data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Interview with Dr. Helen Riess</span></strong></p><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="429"><a data-dcnode-id="434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/riess.html"><span data-dcnode-id="435" instrument_node="">Helen Riess</span></a><span data-dcnode-id="433" instrument_node=""> is a world class expert on empathy. She is an associate  clinical professor of psychiatry at Harvard Medical School and director of the  Empathy and Relational Science Program at Mass General Hospital. Helen  discusses  her new book and shares insights, learnings and techniques  such as the powerful seven-step process for understanding and increasing  empathy. She relates information and cases whereby she uses empathy to make a  meaningful difference in areas such as parenting and leading.  Click </span><a data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//exchange.prx.org/pieces/261038"><span data-dcnode-id="432" instrument_node="">here</span></a><span data-dcnode-id="430" instrument_node=""> to listen to the interview.</span></p><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="425"><strong data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Interview with Dr. Maurice Elias</span></strong></p><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="416"><span data-dcnode-id="423" instrument_node="">The show is about the </span><a data-dcnode-id="421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/exec/obidos/ASIN/0874419425/consortiuforrese"><span data-dcnode-id="422" instrument_node="">Joys and Oys of Parenting</span></a><span data-dcnode-id="420" instrument_node="">, a book written by a respected colleague, Dr. Maurice Elias, an expert in parenting and emotional and social intelligence. Dr. Elias wrote a book tying Judaism and emotional intelligence together to help parents with the challenging, compelling task of raising emotionally healthy children. And while there are fascinating links to Judaism the book is really for everybody. Click </span><a data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//soundcloud.com/wpkn895/the-emotion-roadmap-joys-and-oys-of-parenting-a-book-written-by-dr-maurice-elias"><span data-dcnode-id="419" instrument_node="">here</span></a><span data-dcnode-id="417" instrument_node=""> to listen to the interview.</span></p><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="412"><strong data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Interview with Geetu Bharwaney</span></strong></p><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="410" instrument_node="">Challenges abound and life is stressful for many. So how do  we cope? </span><a data-dcnode-id="408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/wolfe.html"><span data-dcnode-id="409" instrument_node="">Chuck Wolfe</span></a><span data-dcnode-id="407" instrument_node=""> interviews </span><a data-dcnode-id="405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/bharwaney.htm"><span data-dcnode-id="406" instrument_node="">Geetu Bharwaney</span></a><span data-dcnode-id="404" instrument_node=""> about her book, </span><a data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/exec/obidos/ASIN/B00XPTNG5Y/consortiuforrese"><span data-dcnode-id="403" instrument_node="">Emotional  Resilience</span></a><span data-dcnode-id="401" instrument_node="">. Geetu offers research, insights, and most importantly practical  tips for helping people bounce back from adversity. Click </span><a data-dcnode-id="399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prx.org/pieces/183782-emotional-resilience-how-to-survive-and-thrive-i"><span data-dcnode-id="400" instrument_node="">here</span></a><span data-dcnode-id="398" instrument_node=""> to listen to the interview.</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="393"><strong data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Interview with Dr. Daniel Goleman</span></strong></p><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="391" instrument_node="">Listen to an interview by with </span><a data-dcnode-id="389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/goleman.htm"><span data-dcnode-id="390" instrument_node="">Dr. Goleman</span></a><span data-dcnode-id="388" instrument_node=""> on his new book </span><a data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/exec/obidos/ASIN/0062114867/consortiuforrese"><span data-dcnode-id="387" instrument_node="">Focus: The Hidden Driver of Excellence</span></a><span data-dcnode-id="385" instrument_node="">. In the book Dan helps readers to understand the importance and power of the  ability to focus one's attention, will power, and cognitive control in creating  life success. Click </span><a data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//exchange.prx.org/pieces/115625-the-power-of-focus-a-conversation-with-dan-golema"><span data-dcnode-id="384" instrument_node="">here</span></a><span data-dcnode-id="382" instrument_node=""> to listen to the interview.</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="377"><strong data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Interview with Dr. John Mayer</span></strong></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="375" instrument_node="">How Personal Intelligence Shapes Our Lives: A Conversation with John D. Mayer. From picking a life partner, to choosing a career,  Jack explains how personal intelligence has a major impact on our ability to  make successful decisions. Click </span><a data-dcnode-id="373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prx.org/series/32235-the-emotion-roadmap-take-the-wheel-control-how"><span data-dcnode-id="374" instrument_node="">here</span></a><span data-dcnode-id="372" instrument_node=""> to listen to the interview. </span></p><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="367"><strong data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Interview with Dr. Cary Cherniss</span></strong></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="358"><span data-dcnode-id="365" instrument_node="">Click </span><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prx.org/pieces/101373-emotional-intelligence-and-burnout-an-interview-w"><span data-dcnode-id="364" instrument_node="">HERE</span></a><span data-dcnode-id="362" instrument_node=""> to listen to an interview with </span><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/cherniss.htm"><span data-dcnode-id="361" instrument_node="">Dr. Cary Cherniss</span></a><span data-dcnode-id="359" instrument_node=""> co-chair of the EI Consortium. Dr. Cherniss discusses the issue of emotional intelligence and workplace burnout.</span></p><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="354"><strong data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Interview with Dr. Marc Brackett</span></strong></p><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="352" instrument_node="">Click </span><a data-dcnode-id="350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prx.org/pieces/91799-center-for-emotional-intelligence-at-yale-university"><span data-dcnode-id="351" instrument_node="">HERE</span></a><span data-dcnode-id="349" instrument_node=""> to listen to an interview with </span><a data-dcnode-id="347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eiconsortium.org/members/brackett.html"><span data-dcnode-id="348" instrument_node="">Dr. Marc Brackett</span></a><span data-dcnode-id="346" instrument_node="">, the newly appointed leader of the Center of Emotional Intelligence which will begin operation at Yale University in April, 2013. In this interview Dr. Brackett shares his vision for the new center.</span></p><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="341"><strong data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">New Coaching Certification From Dr. Daniel Goleman</span></strong></p><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="332"><span data-dcnode-id="339" instrument_node="">After writing about Emotional Intelligence for years, Daniel  Goleman is pleased to announce the release of his&nbsp;</span><a data-dcnode-id="337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//golemanei.com/" target="_blank"><span data-dcnode-id="338" instrument_node="">Emotional  Intelligence Coaching Certification Program</span></a><span data-dcnode-id="336" instrument_node="">. The program is  in-depth, akin to a professional degree, and is intended for coaches or those  interested in coaching for Emotional Intelligence. It&nbsp;draws upon  evidence-based behavioral change theory, positive psychology, unconscious bias,  compassion training, neuroscience, Mindfulness-Based Stress Reduction (MBSR) Techniques,  and Emotional &amp; Social Intelligence. Students will be trained in these  concepts and applications, as well as in a defined coaching philosophy they  will practice with clients.&nbsp;Applications for the first cohort are now open  and will be accepted on a rolling basis. Click </span><a data-dcnode-id="334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//golemanei.com/"><span data-dcnode-id="335" instrument_node="">here</span></a><span data-dcnode-id="333" instrument_node=""> for more information.</span></p><span data-dcnode-id="331" instrument_node="">
</span><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">&nbsp;</span></p><span data-dcnode-id="328" instrument_node="">
