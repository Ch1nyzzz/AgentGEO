</span><div class="td-post-featured-image" data-dcnode-id="1146"><img alt="" class="entry-thumb lazyautosizes lazyloaded" data-dcnode-id="1149" data-sizes="auto" data-src="https://www.readunwritten.com/wp-content/uploads/2021/12/eq-696x398.jpg" data-srcset="https://www.readunwritten.com/wp-content/uploads/2021/12/eq-696x398.jpg 696w, https://www.readunwritten.com/wp-content/uploads/2021/12/eq-300x171.jpg 300w, https://www.readunwritten.com/wp-content/uploads/2021/12/eq.jpg 700w" decoding="async" height="398" sizes="640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.readunwritten.com/wp-content/uploads/2021/12/eq-696x398.jpg&amp;raw" srcset="https://www.readunwritten.com/wp-content/uploads/2021/12/eq-696x398.jpg 696w, https://www.readunwritten.com/wp-content/uploads/2021/12/eq-300x171.jpg 300w, https://www.readunwritten.com/wp-content/uploads/2021/12/eq.jpg 700w" title="eq" width="696"><noscript data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">&lt;img width="696" height="398" class="entry-thumb" src="https://www.readunwritten.com/wp-content/uploads/2021/12/eq-696x398.jpg" srcset="https://www.readunwritten.com/wp-content/uploads/2021/12/eq-696x398.jpg 696w, https://www.readunwritten.com/wp-content/uploads/2021/12/eq-300x171.jpg 300w, https://www.readunwritten.com/wp-content/uploads/2021/12/eq.jpg 700w" sizes="(max-width: 696px) 100vw, 696px" alt="" title="eq" data-eio="l" /&gt;</span></noscript></div><span data-dcnode-id="1145" instrument_node="">
</span><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Emotional intelligence, AKA “EQ,” is a newer term in our society. You may or may not have taken an emotional intelligence test (or even be aware of what that is), but the term is one men and women interested in improving friendships and relationships of all kinds should know more about.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><h2 data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">What is emotional intelligence?</span></h2><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1136" instrument_node="">According to&nbsp;</span><a data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apa.org/topics/intelligence/index.aspx" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1135" instrument_node="">the American Psychological Association’s definition</span></a><span data-dcnode-id="1133" instrument_node="">,&nbsp;“Intelligence refers to intellectual functioning. Intelligence quotients, or IQ tests, compare your performance with other people your age who take the same test. These tests don’t measure all kinds of intelligence, however. For example, such tests can’t identify differences in social intelligence, the expertise people bring to their interactions with others.”</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1130" instrument_node="">Emotional intelligence, on the other hand,&nbsp;</span><a data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emotional_intelligence" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1129" instrument_node="">is defined as follows</span></a><span data-dcnode-id="1127" instrument_node="">: “Emotional intelligence (EI), Emotional leadership (EL), Emotional quotient (EQ) and Emotional Intelligence Quotient (EIQ) is the capability of individuals to recognize their own emotions and those of others, discern between different feelings and label them appropriately, use emotional information to guide thinking and behavior, and manage and/or adjust emotions to adapt to environments or achieve one’s goal(s).”</span></p><span data-dcnode-id="1125" instrument_node="">
</span><figure class="wp-block-embed is-type-rich is-provider-embed-handler wp-block-embed-embed-handler wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="1120"><div class="wp-block-embed__wrapper" data-dcnode-id="1121"><span data-dcnode-id="1124" instrument_node="">
</span><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lazyloaded" data-dcnode-id="1123" data-src="https://www.youtube.com/embed/D6_J7FfgWVc?feature=oembed" frameborder="0" height="392" title="6 Steps to Improve Your Emotional Intelligence | Ramona Hacker | TEDxTUM" width="696"></iframe><span data-dcnode-id="1122" instrument_node="">
</span></div></figure><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1118" instrument_node="">The term&nbsp;</span><a data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adventureassoc.com/emotional-intelligence-a-history-and-definition/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1117" instrument_node="">first appeared in a 1964 paper by Michael Beldoch</span></a><span data-dcnode-id="1115" instrument_node="">, and became popular following the publication of Daniel Goleman’s 1995 book,&nbsp;</span><a data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B002ROKQNS" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Emotional Intelligence: Why It Can Matter More Than IQ</span></em></a><span data-dcnode-id="1111" instrument_node="">.</span></p><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Essentially, your EQ is your “emotional IQ.” Your EQ affects every aspect of your life, from your basic human emotions to the way you relate with others. This is because the extent to which you know how to read people, including yourself, defines the extent to which you will have peace, love, joy, or chaos in your life.</span></p><span data-dcnode-id="1106" instrument_node="">
</span><h3 data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">There are 5 main qualities of emotional intelligence.</span></h3><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1102" instrument_node="">According to Goleman&nbsp;</span><a data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//athena.ecs.csus.edu/~buckley/CSc233/What-makes-a-Leader-HBR.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1101" instrument_node="">in a 1998 article</span></a><span data-dcnode-id="1099" instrument_node="">, emotional intelligence is made up of five distinct components.</span></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1094"><strong data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">1. Self-Awareness</span></strong></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Goleman explains that self-awareness is the “ability to recognize and understand your moods, emotions, and drives,” not only how they affect you but how they affect others as well. Signs of high self-awareness include “self-confidence,&nbsp;realistic self-assessment, and a self-deprecating sense of humor.”</span></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1087"><strong data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">2. Self-Regulation.&nbsp;</span></strong></p><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Goleman defines self-regulation as “The ability to control or redirect disruptive impulses and moods” and “The propensity to suspend judgment —&nbsp;to think before acting.” Signs of self-regulation to look for in yourself include&nbsp;“Trustworthiness and integrity, comfort with ambiguity, and openness to change.”</span></p><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1080"><strong data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">3. Motivation</span></strong></p><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Motivation is “A passion to work for reasons that go beyond money or status and a&nbsp;propensity to pursue goals with energy and persistence,” according to Goleman. Key signs of motivation include a “Strong drive to achieve,&nbsp;optimism (even in the face of failure), and organizational commitment.”</span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1073"><strong data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">4. Empathy</span></strong></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">According to Goleman, empathy is “The ability to understand the emotional makeup of other people,” and subsequently&nbsp;“Skill in treating people according to their emotional reactions.”</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1066"><strong data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">5. Social Skill</span></strong></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Lastly, social skills are a huge part of emotional intelligence.&nbsp;</span></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">If you want to find out your emotional intelligence quotient, there are a number of ways to do this, including reading articles or taking an EQ test.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">There are a number of different tests online to find out your EQ. Some are free and some you have to pay for. Some are short and some are longer.&nbsp;</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1053"><strong data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Here are three EQ tests with free report options you can try:</span></strong></p><span data-dcnode-id="1052" instrument_node="">
</span><ul data-dcnode-id="1042"><li data-dcnode-id="1049"><a data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologytoday.com/ca/tests/personality/emotional-intelligence-test" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1051" instrument_node="">Psychology Today’s Emotional Intelligence Test</span></a></li><li data-dcnode-id="1046"><a data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//testyourself.psychtests.com/testid/3979" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1048" instrument_node="">Psychtests Emotional Intelligence Test</span></a></li><li data-dcnode-id="1043"><a data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//globalleadershipfoundation.com/geit/eitest.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1045" instrument_node="">Global Leadership Foundation</span></a></li></ul><span data-dcnode-id="1041" instrument_node="">
</span><h2 data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Understanding your own EQ is critical.</span></h2><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">It affects everything you do in life, as well as all of your relationships.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">If you have a poor EQ, your emotions may get in the way of your relationships. This could mean the loss of connection with family members, friends, loved ones, or even jobs. If you have an average EQ, your life may run smoothly most of the time, but emotional issues are likely to crop up every once in a while.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">And if you have an excellent EQ, life is likely to be intentional and exceptional for you. You accept, value, and acknowledge your emotions while keeping them in perspective. You are also able to help others control their emotions through the manner in which you interact with them.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Your EQ is important because your emotions are a valuable part of who you are at your core. Enjoy your emotions, keep them in perspective and allow them to help others.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><h2 data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Emotional intelligence develops in childhood.</span></h2><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">If you grew up in a fairly healthy emotional environment, you’re likely to have a fairly healthy EQ. If you don’t experience much in the way of emotions, you may have been so traumatized by past experiences that your unconscious mind shut down your emotional capacity. In such instances, you may generally go about life feeling frozen or numb.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">As a child, you may have heard phrases such as:</span></p><span data-dcnode-id="1017" instrument_node="">
</span><ul data-dcnode-id="1007"><li data-dcnode-id="1014"><em data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">“Don’t cry. It’s not that bad.”</span></em></li><li data-dcnode-id="1011"><em data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">“You’re too big a boy for that kind of thing now.”</span></em></li><li data-dcnode-id="1008"><em data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">“Just do as you are told and stop whining about it.”</span></em></li></ul><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">These words hurt! And they can have significant negative effects on your emotional well-being.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">If you grew up being told such things, as an adult, you may be prone to over-sensitivity, feeling as though other people’s behaviors are a direct reflection of their perceptions of you, reading more into words and encounters than actually exists.</span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Without emotional awareness, it’s difficult to harness your emotions to your advantage to do whatever it is you want to accomplish.</span></p><span data-dcnode-id="997" instrument_node="">
</span><h3 data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">If you have a lower EQ, it can be tough to get moving when you don’t want to do something.</span></h3><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">For example, if you don’t want to cut the grass, you’ll probably find every excuse not to do it. Someone with a higher EQ, though, would recognize that mowing the lawn needs to be done. So why not make it fun? This ability to find playfulness or humor in even the most disagreeable tasks makes it easier to get on with them.</span></p><span data-dcnode-id="991" instrument_node="">
</span><h3 data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Unfortunately, few of us are offered emotional intelligence training in school. Some of the learning comes along the way of development as we grow.</span></h3><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">If you had parents that taught you emotional management, you were very fortunate — you learned some very valuable lessons. For most of us, we did not learn to manage our emotions.</span></p><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">The baby who cries continually learns that their needs are not important because their caregiver is not helping regulate them, emotionally. The child who is told to say, “I am sorry” when they are still angry is being told to shut down their emotions. And the teen who is told to ignore their feelings does not learn emotional control.</span></p><span data-dcnode-id="982" instrument_node="">
</span><h3 data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Fortunately, you can learn how to improve your emotional intelligence.</span></h3><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Essentially, it comes down to learning how to control your emotions.</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">It’s important to be clear that this doesn’t mean there are any emotions you should never feel. Or that you should shut your feelings down completely. Being emotionally intelligent means being able to manage your emotions in a manner that is appropriate to the moment in which you are having them.</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Managing your emotions means knowing when it’s appropriate to express them fully and when it’s better to keep them in check until later, and then doing so. You may need to learn mindfulness exercises such as breathing deeply from your diaphragm to calm yourself in the meantime.</span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Managing your emotions also means being able to help other people manage their own. Examples of this include speaking to others in a respectful manner, and asserting clear boundaries when someone refuses to show you the same respect in return.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="959"><em data-dcnode-id="960"><span data-dcnode-id="966" instrument_node="">Originally written by </span><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yourtango.com/experts/audrey-tait"><span data-dcnode-id="965" instrument_node="">Audrey Tait</span></a><span data-dcnode-id="963" instrument_node=""> on </span><a data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yourtango.com/experts/audrey-tait/what-is-emotional-intelligence-quotient-why-how-to-take-eq-test"><span data-dcnode-id="962" instrument_node="">YourTango</span></a></em></p><span data-dcnode-id="958" instrument_node="">
