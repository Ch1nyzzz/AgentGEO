</span></p><h3 data-dcnode-id="6736"><span class="mw-headline" data-dcnode-id="6744" id="EI_as_a_form_of_knowledge"><span data-dcnode-id="6745" instrument_node="">EI as a form of knowledge</span></span><span class="mw-editsection" data-dcnode-id="6737"><span class="mw-editsection-bracket" data-dcnode-id="6742"><span data-dcnode-id="6743" instrument_node="">[</span></span><a data-dcnode-id="6740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D25" title="Edit section: EI as a form of knowledge"><span data-dcnode-id="6741" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6738"><span data-dcnode-id="6739" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6735" instrument_node="">
</span><p data-dcnode-id="6729"><span data-dcnode-id="6734" instrument_node="">Further criticism has been leveled by Brody (2004),</span><sup class="reference" data-dcnode-id="6731" id="cite_ref-123"><a data-dcnode-id="6732" href="#cite_note-123"><span data-dcnode-id="6733" instrument_node="">[123]</span></a></sup><span data-dcnode-id="6730" instrument_node=""> who claimed that unlike tests of cognitive ability, the MSCEIT "tests knowledge of emotions but not necessarily the ability to perform tasks that are related to the knowledge that is assessed". The main argument is that even though someone knows how he or she should behave in an emotionally laden situation, it doesn't necessarily follow that the person could actually carry out the reported behavior.
</span></p><span data-dcnode-id="6728" instrument_node="">
</span><h3 data-dcnode-id="6718"><span class="mw-headline" data-dcnode-id="6726" id="NICHD_pushes_for_consensus"><span data-dcnode-id="6727" instrument_node="">NICHD pushes for consensus</span></span><span class="mw-editsection" data-dcnode-id="6719"><span class="mw-editsection-bracket" data-dcnode-id="6724"><span data-dcnode-id="6725" instrument_node="">[</span></span><a data-dcnode-id="6722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D26" title="Edit section: NICHD pushes for consensus"><span data-dcnode-id="6723" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6720"><span data-dcnode-id="6721" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6717" instrument_node="">
</span><p data-dcnode-id="6705"><span data-dcnode-id="6716" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="6714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Institute_of_Child_Health_and_Human_Development" title="National Institute of Child Health and Human Development"><span data-dcnode-id="6715" instrument_node="">National Institute of Child Health and Human Development</span></a><span data-dcnode-id="6713" instrument_node=""> has recognized that because there are divisions about the topic of emotional intelligence, the mental health community needs to agree on some guidelines to describe good mental health and positive mental living conditions. In their section, "Positive Psychology and the Concept of Health", they explain. "Currently there are six competing models of positive health, which are based on concepts such as being above normal, character strengths and core virtues, developmental maturity, social-emotional intelligence, subjective well-being, and </span><a data-dcnode-id="6711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychological_resilience" title="Psychological resilience"><span data-dcnode-id="6712" instrument_node="">resilience</span></a><span data-dcnode-id="6710" instrument_node="">. But these concepts define health in philosophical rather than empirical terms. Dr. [Lawrence] Becker suggested the need for a consensus on the concept of positive psychological health...".</span><sup class="reference" data-dcnode-id="6707" id="cite_ref-124"><a data-dcnode-id="6708" href="#cite_note-124"><span data-dcnode-id="6709" instrument_node="">[124]</span></a></sup><span data-dcnode-id="6706" instrument_node="">
</span></p><span data-dcnode-id="6704" instrument_node="">
