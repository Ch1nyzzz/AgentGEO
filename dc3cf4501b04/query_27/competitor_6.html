</span><p data-dcnode-id="8580"><b data-dcnode-id="8610"><span data-dcnode-id="8611" instrument_node="">Emotional intelligence</span></b><span data-dcnode-id="8609" instrument_node=""> (</span><b data-dcnode-id="8607"><span data-dcnode-id="8608" instrument_node="">EI</span></b><span data-dcnode-id="8606" instrument_node="">) is most often defined as the ability to perceive, use, understand, manage, and handle emotions. People with high emotional intelligence can </span><a data-dcnode-id="8604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emotion_recognition" title="Emotion recognition"><span data-dcnode-id="8605" instrument_node="">recognize</span></a><span data-dcnode-id="8603" instrument_node=""> their own </span><a class="mw-redirect" data-dcnode-id="8601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emotions" title="Emotions"><span data-dcnode-id="8602" instrument_node="">emotions</span></a><span data-dcnode-id="8600" instrument_node=""> and those of others, use emotional information to guide thinking and behavior, discern between different feelings and label them appropriately, and adjust emotions to adapt to environments.</span><sup class="reference" data-dcnode-id="8597" id="cite_ref-A_Dictionary_of_Psychology_1-0"><a data-dcnode-id="8598" href="#cite_note-A_Dictionary_of_Psychology-1"><span data-dcnode-id="8599" instrument_node="">[1]</span></a></sup><span data-dcnode-id="8596" instrument_node=""> Although the term first appeared in 1964,</span><sup class="reference" data-dcnode-id="8593" id="cite_ref-2"><a data-dcnode-id="8594" href="#cite_note-2"><span data-dcnode-id="8595" instrument_node="">[2]</span></a></sup><span data-dcnode-id="8592" instrument_node=""> it gained popularity in the 1995 best-selling book </span><i data-dcnode-id="8589"><a data-dcnode-id="8590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emotional_Intelligence" title="Emotional Intelligence"><span data-dcnode-id="8591" instrument_node="">Emotional Intelligence</span></a></i><span data-dcnode-id="8588" instrument_node="">, written by science journalist </span><a data-dcnode-id="8586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daniel_Goleman" title="Daniel Goleman"><span data-dcnode-id="8587" instrument_node="">Daniel Goleman</span></a><span data-dcnode-id="8585" instrument_node="">. Goleman defined EI as the array of skills and characteristics that drive leadership performance.</span><sup class="reference" data-dcnode-id="8582" id="cite_ref-hbr98_3-0"><a data-dcnode-id="8583" href="#cite_note-hbr98-3"><span data-dcnode-id="8584" instrument_node="">[3]</span></a></sup><span data-dcnode-id="8581" instrument_node="">
</span></p><p data-dcnode-id="8523"><span data-dcnode-id="8579" instrument_node="">Various models have been developed to measure EI. The </span><i data-dcnode-id="8577"><span data-dcnode-id="8578" instrument_node="">trait model</span></i><span data-dcnode-id="8576" instrument_node="">, developed by </span><a data-dcnode-id="8574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Konstantinos_V._Petrides" title="Konstantinos V. Petrides"><span data-dcnode-id="8575" instrument_node="">Konstantinos V. Petrides</span></a><span data-dcnode-id="8573" instrument_node=""> in 2001, focuses on self reporting of behavioral dispositions and perceived abilities.</span><sup class="reference" data-dcnode-id="8570" id="cite_ref-4"><a data-dcnode-id="8571" href="#cite_note-4"><span data-dcnode-id="8572" instrument_node="">[4]</span></a></sup><span data-dcnode-id="8569" instrument_node=""> The </span><i data-dcnode-id="8567"><span data-dcnode-id="8568" instrument_node="">ability model</span></i><span data-dcnode-id="8566" instrument_node="">, developed by </span><a data-dcnode-id="8564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Salovey" title="Peter Salovey"><span data-dcnode-id="8565" instrument_node="">Peter Salovey</span></a><span data-dcnode-id="8563" instrument_node=""> and </span><a data-dcnode-id="8561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_D._Mayer" title="John D. Mayer"><span data-dcnode-id="8562" instrument_node="">John Mayer</span></a><span data-dcnode-id="8560" instrument_node=""> in 2004, focuses on the individual's ability to process emotional information and use it to navigate the </span><a data-dcnode-id="8558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_environment" title="Social environment"><span data-dcnode-id="8559" instrument_node="">social environment</span></a><span data-dcnode-id="8557" instrument_node="">.</span><sup class="reference" data-dcnode-id="8554" id="cite_ref-Emotional_Intelligence:_Theory,_Findings,_and_Implications_5-0"><a data-dcnode-id="8555" href="#cite_note-Emotional_Intelligence:_Theory,_Findings,_and_Implications-5"><span data-dcnode-id="8556" instrument_node="">[5]</span></a></sup><span data-dcnode-id="8553" instrument_node=""> Goleman's original model may now be considered a </span><i data-dcnode-id="8551"><span data-dcnode-id="8552" instrument_node="">mixed model</span></i><span data-dcnode-id="8550" instrument_node=""> that combines what has since been modeled separately as </span><i data-dcnode-id="8548"><span data-dcnode-id="8549" instrument_node="">ability EI</span></i><span data-dcnode-id="8547" instrument_node=""> and </span><i data-dcnode-id="8545"><span data-dcnode-id="8546" instrument_node="">trait EI</span></i><span data-dcnode-id="8544" instrument_node="">. More recent research has focused on </span><a data-dcnode-id="8542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emotion_recognition" title="Emotion recognition"><span data-dcnode-id="8543" instrument_node="">emotion recognition</span></a><span data-dcnode-id="8541" instrument_node="">, which refers to the attribution of emotional states based on observations of visual and auditory nonverbal cues.</span><sup class="reference" data-dcnode-id="8538" id="cite_ref-6"><a data-dcnode-id="8539" href="#cite_note-6"><span data-dcnode-id="8540" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="8535" id="cite_ref-7"><a data-dcnode-id="8536" href="#cite_note-7"><span data-dcnode-id="8537" instrument_node="">[7]</span></a></sup><span data-dcnode-id="8534" instrument_node=""> In addition, </span><a data-dcnode-id="8532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neurology" title="Neurology"><span data-dcnode-id="8533" instrument_node="">neurological</span></a><span data-dcnode-id="8531" instrument_node=""> studies have sought to characterize the neural mechanisms of emotional intelligence.</span><sup class="reference" data-dcnode-id="8528" id="cite_ref-8"><a data-dcnode-id="8529" href="#cite_note-8"><span data-dcnode-id="8530" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="8525" id="cite_ref-9"><a data-dcnode-id="8526" href="#cite_note-9"><span data-dcnode-id="8527" instrument_node="">[9]</span></a></sup><span data-dcnode-id="8524" instrument_node="">
</span></p><p data-dcnode-id="8506"><span data-dcnode-id="8522" instrument_node="">Studies have shown that people with high EI have greater </span><a data-dcnode-id="8520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mental_health" title="Mental health"><span data-dcnode-id="8521" instrument_node="">mental health</span></a><span data-dcnode-id="8519" instrument_node="">, </span><a data-dcnode-id="8517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Job_performance" title="Job performance"><span data-dcnode-id="8518" instrument_node="">job performance</span></a><span data-dcnode-id="8516" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="8514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leadership_skills" title="Leadership skills"><span data-dcnode-id="8515" instrument_node="">leadership skills</span></a><span data-dcnode-id="8513" instrument_node="">, although no </span><a class="mw-redirect" data-dcnode-id="8511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Causal_relationships" title="Causal relationships"><span data-dcnode-id="8512" instrument_node="">causal relationships</span></a><span data-dcnode-id="8510" instrument_node=""> have been shown. EI is typically associated with </span><a data-dcnode-id="8508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empathy" title="Empathy"><span data-dcnode-id="8509" instrument_node="">empathy</span></a><span data-dcnode-id="8507" instrument_node=""> because it involves an individual connecting their personal experiences with those of others. Since its popularization in recent decades, methods of developing EI have become widely sought by individuals seeking to become more effective leaders.
</span></p><p data-dcnode-id="8475"><span data-dcnode-id="8505" instrument_node="">Criticisms have centered on whether EI is a real </span><a data-dcnode-id="8503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intelligence" title="Intelligence"><span data-dcnode-id="8504" instrument_node="">intelligence</span></a><span data-dcnode-id="8502" instrument_node="">, and whether it has </span><a data-dcnode-id="8500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Incremental_validity" title="Incremental validity"><span data-dcnode-id="8501" instrument_node="">incremental validity</span></a><span data-dcnode-id="8499" instrument_node=""> over </span><a class="mw-redirect" data-dcnode-id="8497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/IQ" title="IQ"><span data-dcnode-id="8498" instrument_node="">IQ</span></a><span data-dcnode-id="8496" instrument_node=""> and the </span><a data-dcnode-id="8494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big_Five_personality_traits" title="Big Five personality traits"><span data-dcnode-id="8495" instrument_node="">Big Five personality traits</span></a><span data-dcnode-id="8493" instrument_node="">.</span><sup class="reference" data-dcnode-id="8490" id="cite_ref-10"><a data-dcnode-id="8491" href="#cite_note-10"><span data-dcnode-id="8492" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="8487" id="cite_ref-11"><a data-dcnode-id="8488" href="#cite_note-11"><span data-dcnode-id="8489" instrument_node="">[11]</span></a></sup><span data-dcnode-id="8486" instrument_node=""> However, meta-analyses have found that certain measures of EI have some validity even when controlling for IQ and personality.</span><sup class="reference" data-dcnode-id="8483" id="cite_ref-ReferenceB_12-0"><a data-dcnode-id="8484" href="#cite_note-ReferenceB-12"><span data-dcnode-id="8485" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="8480" id="cite_ref-:0_13-0"><a data-dcnode-id="8481" href="#cite_note-:0-13"><span data-dcnode-id="8482" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="8477" id="cite_ref-ReferenceC_14-0"><a data-dcnode-id="8478" href="#cite_note-ReferenceC-14"><span data-dcnode-id="8479" instrument_node="">[14]</span></a></sup><span data-dcnode-id="8476" instrument_node="">
</span></p><span data-dcnode-id="8474" instrument_node="">

</span><h2 data-dcnode-id="8200"><span class="mw-headline" data-dcnode-id="8208" id="History"><span data-dcnode-id="8209" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="8201"><span class="mw-editsection-bracket" data-dcnode-id="8206"><span data-dcnode-id="8207" instrument_node="">[</span></span><a data-dcnode-id="8204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D1" title="Edit section: History"><span data-dcnode-id="8205" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8202"><span data-dcnode-id="8203" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8199" instrument_node="">
</span><p data-dcnode-id="8173"><span data-dcnode-id="8198" instrument_node="">The concept of Emotional Strength was first introduced by </span><a data-dcnode-id="8196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abraham_Maslow" title="Abraham Maslow"><span data-dcnode-id="8197" instrument_node="">Abraham Maslow</span></a><span data-dcnode-id="8195" instrument_node=""> in the 1950s.</span><sup class="reference" data-dcnode-id="8192" id="cite_ref-15"><a data-dcnode-id="8193" href="#cite_note-15"><span data-dcnode-id="8194" instrument_node="">[15]</span></a></sup><span data-dcnode-id="8191" instrument_node=""> The term "emotional intelligence" seems first to have appeared in a 1964 paper by Michael Beldoch,</span><sup class="reference" data-dcnode-id="8188" id="cite_ref-16"><a data-dcnode-id="8189" href="#cite_note-16"><span data-dcnode-id="8190" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="8185" id="cite_ref-17"><a data-dcnode-id="8186" href="#cite_note-17"><span data-dcnode-id="8187" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8184" instrument_node=""> and in the 1966 paper by B. Leuner entitled </span><i data-dcnode-id="8182"><span data-dcnode-id="8183" instrument_node="">Emotional intelligence and emancipation</span></i><span data-dcnode-id="8181" instrument_node=""> which appeared in the psychotherapeutic journal: </span><i data-dcnode-id="8179"><span data-dcnode-id="8180" instrument_node="">Practice of child psychology and child psychiatry</span></i><span data-dcnode-id="8178" instrument_node="">.</span><sup class="reference" data-dcnode-id="8175" id="cite_ref-18"><a data-dcnode-id="8176" href="#cite_note-18"><span data-dcnode-id="8177" instrument_node="">[18]</span></a></sup><span data-dcnode-id="8174" instrument_node="">
</span></p><p data-dcnode-id="8146"><span data-dcnode-id="8172" instrument_node="">In 1983, </span><a data-dcnode-id="8170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Howard_Gardner" title="Howard Gardner"><span data-dcnode-id="8171" instrument_node="">Howard Gardner</span></a><span data-dcnode-id="8169" instrument_node="">'s </span><i data-dcnode-id="8167"><span data-dcnode-id="8168" instrument_node="">Frames of Mind: The Theory of Multiple Intelligences</span></i><sup class="reference" data-dcnode-id="8164" id="cite_ref-19"><a data-dcnode-id="8165" href="#cite_note-19"><span data-dcnode-id="8166" instrument_node="">[19]</span></a></sup><span data-dcnode-id="8163" instrument_node=""> introduced the idea that traditional types of intelligence, such as </span><a class="mw-redirect" data-dcnode-id="8161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/IQ" title="IQ"><span data-dcnode-id="8162" instrument_node="">IQ</span></a><span data-dcnode-id="8160" instrument_node="">, fail to fully explain cognitive ability. He introduced the idea of </span><a class="mw-redirect" data-dcnode-id="8158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multiple_intelligences" title="Multiple intelligences"><span data-dcnode-id="8159" instrument_node="">multiple intelligences</span></a><span data-dcnode-id="8157" instrument_node=""> which included both </span><i data-dcnode-id="8155"><span data-dcnode-id="8156" instrument_node="">interpersonal intelligence</span></i><span data-dcnode-id="8154" instrument_node=""> (the capacity to understand the intentions, motivations and desires of other people) and </span><i data-dcnode-id="8152"><span data-dcnode-id="8153" instrument_node="">intrapersonal intelligence</span></i><span data-dcnode-id="8151" instrument_node=""> (the capacity to understand oneself, to appreciate one's feelings, fears and motivations).</span><sup class="reference" data-dcnode-id="8148" id="cite_ref-20"><a data-dcnode-id="8149" href="#cite_note-20"><span data-dcnode-id="8150" instrument_node="">[20]</span></a></sup><span data-dcnode-id="8147" instrument_node="">
</span></p><p data-dcnode-id="8137"><span data-dcnode-id="8145" instrument_node="">The first published use of the term 'EQ' (Emotional Quotient) is an article by Keith Beasley in 1987 in the </span><a data-dcnode-id="8143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mensa_International" title="Mensa International"><span data-dcnode-id="8144" instrument_node="">British Mensa</span></a><span data-dcnode-id="8142" instrument_node=""> magazine.</span><sup class="reference" data-dcnode-id="8139" id="cite_ref-21"><a data-dcnode-id="8140" href="#cite_note-21"><span data-dcnode-id="8141" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8138" instrument_node="">
</span></p><p data-dcnode-id="8125"><span data-dcnode-id="8136" instrument_node="">In 1989 </span><a data-dcnode-id="8134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stanley_Greenspan" title="Stanley Greenspan"><span data-dcnode-id="8135" instrument_node="">Stanley Greenspan</span></a><span data-dcnode-id="8133" instrument_node=""> put forward a model to describe EI, followed by another by </span><a data-dcnode-id="8131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Salovey" title="Peter Salovey"><span data-dcnode-id="8132" instrument_node="">Peter Salovey</span></a><span data-dcnode-id="8130" instrument_node=""> and John Mayer published in the following year.</span><sup class="reference" data-dcnode-id="8127" id="cite_ref-22"><a data-dcnode-id="8128" href="#cite_note-22"><span data-dcnode-id="8129" instrument_node="">[22]</span></a></sup><span data-dcnode-id="8126" instrument_node="">
</span></p><p data-dcnode-id="8099"><span data-dcnode-id="8124" instrument_node="">However, the term became widely known with the publication of Goleman's book: </span><i data-dcnode-id="8122"><span data-dcnode-id="8123" instrument_node="">Emotional Intelligence – Why it can matter more than IQ</span></i><span data-dcnode-id="8121" instrument_node=""> (1995).</span><sup class="reference" data-dcnode-id="8118" id="cite_ref-Goleman_1995_23-0"><a data-dcnode-id="8119" href="#cite_note-Goleman_1995-23"><span data-dcnode-id="8120" instrument_node="">[23]</span></a></sup><span data-dcnode-id="8117" instrument_node=""> It is to this book's best-selling status that the term can attribute its popularity.</span><sup class="reference" data-dcnode-id="8114" id="cite_ref-24"><a data-dcnode-id="8115" href="#cite_note-24"><span data-dcnode-id="8116" instrument_node="">[24]</span></a></sup><span data-dcnode-id="8113" instrument_node=""> Goleman has followed up with several similar publications that reinforce use of the term.</span><sup class="reference" data-dcnode-id="8110" id="cite_ref-Goleman_1998_25-0"><a data-dcnode-id="8111" href="#cite_note-Goleman_1998-25"><span data-dcnode-id="8112" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="8107" id="cite_ref-26"><a data-dcnode-id="8108" href="#cite_note-26"><span data-dcnode-id="8109" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="8104" id="cite_ref-27"><a data-dcnode-id="8105" href="#cite_note-27"><span data-dcnode-id="8106" instrument_node="">[27]</span></a></sup><sup class="reference" data-dcnode-id="8101" id="cite_ref-28"><a data-dcnode-id="8102" href="#cite_note-28"><span data-dcnode-id="8103" instrument_node="">[28]</span></a></sup><span data-dcnode-id="8100" instrument_node="">
</span></p><p data-dcnode-id="8089"><span data-dcnode-id="8098" instrument_node="">Late in 1998, Goleman's Harvard Business Review article entitled "What Makes a Leader?"</span><sup class="reference" data-dcnode-id="8095" id="cite_ref-hbr98_3-1"><a data-dcnode-id="8096" href="#cite_note-hbr98-3"><span data-dcnode-id="8097" instrument_node="">[3]</span></a></sup><span data-dcnode-id="8094" instrument_node=""> caught the attention of senior management at Johnson &amp; Johnson's Consumer Companies (JJCC). The article spoke to the importance of Emotional Intelligence (EI) in leadership success, and cited several studies that demonstrated that EI is often the distinguishing factor between great leaders and average leaders. JJCC funded a study which concluded that there was a strong relationship between superior performing leaders and emotional competence, supporting theorist's suggestions that the social, emotional and relational competency set commonly referred to as Emotional Intelligence, is a distinguishing factor in leadership performance.</span><sup class="reference" data-dcnode-id="8091" id="cite_ref-29"><a data-dcnode-id="8092" href="#cite_note-29"><span data-dcnode-id="8093" instrument_node="">[29]</span></a></sup><span data-dcnode-id="8090" instrument_node="">
</span></p><p data-dcnode-id="8079"><span data-dcnode-id="8088" instrument_node="">Tests measuring EI have not replaced IQ tests as a standard metric of intelligence,</span><sup class="reference" data-dcnode-id="8085" id="cite_ref-30"><a data-dcnode-id="8086" href="#cite_note-30"><span data-dcnode-id="8087" instrument_node="">[30]</span></a></sup><span data-dcnode-id="8084" instrument_node=""> and Emotional Intelligence has received criticism regarding its role in leadership and business success.</span><sup class="reference" data-dcnode-id="8081" id="cite_ref-31"><a data-dcnode-id="8082" href="#cite_note-31"><span data-dcnode-id="8083" instrument_node="">[31]</span></a></sup><span data-dcnode-id="8080" instrument_node="">
</span></p><span data-dcnode-id="8078" instrument_node="">
</span><h2 data-dcnode-id="8068"><span class="mw-headline" data-dcnode-id="8076" id="Definitions"><span data-dcnode-id="8077" instrument_node="">Definitions</span></span><span class="mw-editsection" data-dcnode-id="8069"><span class="mw-editsection-bracket" data-dcnode-id="8074"><span data-dcnode-id="8075" instrument_node="">[</span></span><a data-dcnode-id="8072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D2" title="Edit section: Definitions"><span data-dcnode-id="8073" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8070"><span data-dcnode-id="8071" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8067" instrument_node="">
</span><p data-dcnode-id="8057"><span data-dcnode-id="8066" instrument_node="">Emotional intelligence has been defined, by Peter Salovey and John Mayer, as "the ability to monitor one's own and other people's emotions, to discriminate between different emotions and label them appropriately, and to use emotional information to guide thinking and behavior". This definition was later broken down and refined into four proposed abilities: perceiving, using, understanding, and managing emotions. These abilities are distinct yet related.</span><sup class="reference" data-dcnode-id="8063" id="cite_ref-A_Dictionary_of_Psychology_1-1"><a data-dcnode-id="8064" href="#cite_note-A_Dictionary_of_Psychology-1"><span data-dcnode-id="8065" instrument_node="">[1]</span></a></sup><span data-dcnode-id="8062" instrument_node=""> Emotional intelligence also reflects abilities to join intelligence, empathy and emotions to enhance thought and understanding of interpersonal dynamics.</span><sup class="reference" data-dcnode-id="8059" id="cite_ref-Mayer_2008_32-0"><a data-dcnode-id="8060" href="#cite_note-Mayer_2008-32"><span data-dcnode-id="8061" instrument_node="">[32]</span></a></sup><span data-dcnode-id="8058" instrument_node=""> However, substantial disagreement exists regarding the definition of EI, with respect to both terminology and operationalizations. Currently, there are three main models of EI:
</span></p><span data-dcnode-id="8056" instrument_node="">
</span><ol data-dcnode-id="8041"><li data-dcnode-id="8054"><span data-dcnode-id="8055" instrument_node="">Ability model</span></li><span data-dcnode-id="8053" instrument_node="">
</span><li data-dcnode-id="8045"><span data-dcnode-id="8052" instrument_node="">Mixed model (usually subsumed under trait EI)</span><sup class="reference" data-dcnode-id="8049" id="cite_ref-Kluemper,_D.H._2008_33-0"><a data-dcnode-id="8050" href="#cite_note-Kluemper,_D.H._2008-33"><span data-dcnode-id="8051" instrument_node="">[33]</span></a></sup><sup class="reference" data-dcnode-id="8046" id="cite_ref-Martins_2010_34-0"><a data-dcnode-id="8047" href="#cite_note-Martins_2010-34"><span data-dcnode-id="8048" instrument_node="">[34]</span></a></sup></li><span data-dcnode-id="8044" instrument_node="">
</span><li data-dcnode-id="8042"><span data-dcnode-id="8043" instrument_node="">Trait model</span></li></ol><span data-dcnode-id="8040" instrument_node="">
</span><p data-dcnode-id="8038"><span data-dcnode-id="8039" instrument_node="">Different models of EI have led to the development of various instruments for the assessment of the construct. While some of these measures may overlap, most researchers agree that they tap different constructs.
</span></p><p data-dcnode-id="8017"><span data-dcnode-id="8037" instrument_node="">Specific ability models address the ways in which emotions facilitate thought and understanding. For example, emotions may interact with thinking and allow people to be better decision makers.</span><sup class="reference" data-dcnode-id="8034" id="cite_ref-Mayer_2008_32-1"><a data-dcnode-id="8035" href="#cite_note-Mayer_2008-32"><span data-dcnode-id="8036" instrument_node="">[32]</span></a></sup><span data-dcnode-id="8033" instrument_node=""> A person who is more responsive emotionally to crucial issues will attend to the more crucial aspects of his or her life.</span><sup class="reference" data-dcnode-id="8030" id="cite_ref-Mayer_2008_32-2"><a data-dcnode-id="8031" href="#cite_note-Mayer_2008-32"><span data-dcnode-id="8032" instrument_node="">[32]</span></a></sup><span data-dcnode-id="8029" instrument_node=""> Aspects of emotional facilitation factor is to also know how to include or exclude emotions from thought depending on context and situation.</span><sup class="reference" data-dcnode-id="8026" id="cite_ref-Mayer_2008_32-3"><a data-dcnode-id="8027" href="#cite_note-Mayer_2008-32"><span data-dcnode-id="8028" instrument_node="">[32]</span></a></sup><span data-dcnode-id="8025" instrument_node=""> This is also related to </span><a data-dcnode-id="8023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emotional_reasoning" title="Emotional reasoning"><span data-dcnode-id="8024" instrument_node="">emotional reasoning</span></a><span data-dcnode-id="8022" instrument_node=""> and understanding in response to the people, environment and circumstances one encounters in his or her day-to-day life.</span><sup class="reference" data-dcnode-id="8019" id="cite_ref-Mayer_2008_32-4"><a data-dcnode-id="8020" href="#cite_note-Mayer_2008-32"><span data-dcnode-id="8021" instrument_node="">[32]</span></a></sup><span data-dcnode-id="8018" instrument_node="">
</span></p><span data-dcnode-id="8016" instrument_node="">
</span><h2 data-dcnode-id="8006"><span class="mw-headline" data-dcnode-id="8014" id="Ability_model"><span data-dcnode-id="8015" instrument_node="">Ability model</span></span><span class="mw-editsection" data-dcnode-id="8007"><span class="mw-editsection-bracket" data-dcnode-id="8012"><span data-dcnode-id="8013" instrument_node="">[</span></span><a data-dcnode-id="8010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D3" title="Edit section: Ability model"><span data-dcnode-id="8011" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8008"><span data-dcnode-id="8009" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8005" instrument_node="">
</span><p data-dcnode-id="7992"><span data-dcnode-id="8004" instrument_node="">Salovey and Mayer's conception of EI strives to define EI within the confines of the standard criteria for a new intelligence.</span><sup class="reference" data-dcnode-id="8001" id="cite_ref-35"><a data-dcnode-id="8002" href="#cite_note-35"><span data-dcnode-id="8003" instrument_node="">[35]</span></a></sup><sup class="reference" data-dcnode-id="7998" id="cite_ref-36"><a data-dcnode-id="7999" href="#cite_note-36"><span data-dcnode-id="8000" instrument_node="">[36]</span></a></sup><span data-dcnode-id="7997" instrument_node=""> Following their continuing research, their initial definition of EI was revised to "The ability to perceive emotion, integrate emotion to facilitate thought, understand emotions and to regulate emotions to promote personal growth." However, after pursuing further research, their definition of EI evolved into "the capacity to reason about emotions, and of emotions, to enhance thinking. It includes the abilities to accurately perceive emotions, to access and generate emotions so as to assist thought, to understand emotions and emotional knowledge, and to reflectively regulate emotions so as to promote emotional and intellectual growth."</span><sup class="reference" data-dcnode-id="7994" id="cite_ref-Emotional_Intelligence:_Theory,_Findings,_and_Implications_5-1"><a data-dcnode-id="7995" href="#cite_note-Emotional_Intelligence:_Theory,_Findings,_and_Implications-5"><span data-dcnode-id="7996" instrument_node="">[5]</span></a></sup><span data-dcnode-id="7993" instrument_node="">
</span></p><p data-dcnode-id="7983"><span data-dcnode-id="7991" instrument_node="">The ability-based model views emotions as useful sources of information that help one to make sense of and navigate the social environment.</span><sup class="reference" data-dcnode-id="7988" id="cite_ref-37"><a data-dcnode-id="7989" href="#cite_note-37"><span data-dcnode-id="7990" instrument_node="">[37]</span></a></sup><sup class="reference" data-dcnode-id="7985" id="cite_ref-grewal_38-0"><a data-dcnode-id="7986" href="#cite_note-grewal-38"><span data-dcnode-id="7987" instrument_node="">[38]</span></a></sup><span data-dcnode-id="7984" instrument_node=""> The model proposes that individuals vary in their ability to process information of an emotional nature and in their ability to relate emotional processing to a wider cognition. This ability is seen to manifest itself in certain adaptive behaviors. The model claims that EI includes four types of abilities:
</span></p><span data-dcnode-id="7982" instrument_node="">
</span><ol data-dcnode-id="7967"><li data-dcnode-id="7980"><span data-dcnode-id="7981" instrument_node="">Perceiving emotions – the ability to detect and decipher emotions in faces, pictures, voices, and cultural artifacts—including the ability to identify one's own emotions. Perceiving emotions represents a basic aspect of emotional intelligence, as it makes all other processing of emotional information possible.</span></li><span data-dcnode-id="7979" instrument_node="">
</span><li data-dcnode-id="7974"><span data-dcnode-id="7978" instrument_node="">Using emotions – the ability to harness emotions to facilitate various cognitive activities, such as thinking and problem-solving. The emotionally intelligent person can capitalize fully upon his or her changing </span><a data-dcnode-id="7976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mood_%28psychology%29" title="Mood (psychology)"><span data-dcnode-id="7977" instrument_node="">moods</span></a><span data-dcnode-id="7975" instrument_node=""> in order to best fit the task at hand.</span></li><span data-dcnode-id="7973" instrument_node="">
</span><li data-dcnode-id="7971"><span data-dcnode-id="7972" instrument_node="">Understanding emotions – the ability to comprehend emotion language and to appreciate complicated relationships among emotions. For example, understanding emotions encompasses the ability to be sensitive to slight variations between emotions, and the ability to recognize and describe how emotions evolve over time.</span></li><span data-dcnode-id="7970" instrument_node="">
</span><li data-dcnode-id="7968"><span data-dcnode-id="7969" instrument_node="">Managing emotions – the ability to regulate emotions in both ourselves and in others. Therefore, the emotionally intelligent person can harness emotions, even negative ones, and manage them to achieve intended goals.</span></li></ol><span data-dcnode-id="7966" instrument_node="">
</span><p data-dcnode-id="7953"><span data-dcnode-id="7965" instrument_node="">The ability EI model has been criticized in the research for lacking face and predictive validity in the workplace.</span><sup class="reference" data-dcnode-id="7962" id="cite_ref-39"><a data-dcnode-id="7963" href="#cite_note-39"><span data-dcnode-id="7964" instrument_node="">[39]</span></a></sup><span data-dcnode-id="7961" instrument_node=""> However, in terms of </span><a data-dcnode-id="7959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Construct_validity" title="Construct validity"><span data-dcnode-id="7960" instrument_node="">construct validity</span></a><span data-dcnode-id="7958" instrument_node="">, ability EI tests have great advantage over self-report scales of EI because they compare individual maximal performance to standard performance scales and do not rely on individuals' endorsement of descriptive statements about themselves.</span><sup class="reference" data-dcnode-id="7955" id="cite_ref-40"><a data-dcnode-id="7956" href="#cite_note-40"><span data-dcnode-id="7957" instrument_node="">[40]</span></a></sup><span data-dcnode-id="7954" instrument_node="">
</span></p><span data-dcnode-id="7952" instrument_node="">
</span><h3 data-dcnode-id="7942"><span class="mw-headline" data-dcnode-id="7950" id="Measurement"><span data-dcnode-id="7951" instrument_node="">Measurement</span></span><span class="mw-editsection" data-dcnode-id="7943"><span class="mw-editsection-bracket" data-dcnode-id="7948"><span data-dcnode-id="7949" instrument_node="">[</span></span><a data-dcnode-id="7946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D4" title="Edit section: Measurement"><span data-dcnode-id="7947" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7944"><span data-dcnode-id="7945" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7941" instrument_node="">
</span><p data-dcnode-id="7926"><span data-dcnode-id="7940" instrument_node="">The current measure of Mayer and Salovey's model of EI, the </span><a data-dcnode-id="7938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mayer-Salovey-Caruso_Emotional_Intelligence_Test" title="Mayer-Salovey-Caruso Emotional Intelligence Test"><span data-dcnode-id="7939" instrument_node="">Mayer-Salovey-Caruso Emotional Intelligence Test</span></a><span data-dcnode-id="7937" instrument_node=""> (MSCEIT), is based on a series of emotion-based problem-solving items.</span><sup class="reference" data-dcnode-id="7934" id="cite_ref-grewal_38-1"><a data-dcnode-id="7935" href="#cite_note-grewal-38"><span data-dcnode-id="7936" instrument_node="">[38]</span></a></sup><sup class="reference" data-dcnode-id="7931" id="cite_ref-41"><a data-dcnode-id="7932" href="#cite_note-41"><span data-dcnode-id="7933" instrument_node="">[41]</span></a></sup><span data-dcnode-id="7930" instrument_node=""> Consistent with the model's claim of EI as a type of intelligence, the test is modeled on ability-based </span><a class="mw-redirect" data-dcnode-id="7928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/IQ_tests" title="IQ tests"><span data-dcnode-id="7929" instrument_node="">IQ tests</span></a><span data-dcnode-id="7927" instrument_node="">. By testing a person's abilities on each of the four branches of emotional intelligence, it generates scores for each of the branches as well as a total score.
</span></p><p data-dcnode-id="7911"><span data-dcnode-id="7925" instrument_node="">Central to the four-branch model is the idea that EI requires attunement to </span><a class="mw-redirect" data-dcnode-id="7923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_norms" title="Social norms"><span data-dcnode-id="7924" instrument_node="">social norms</span></a><span data-dcnode-id="7922" instrument_node="">. Therefore, the MSCEIT is </span><a class="mw-redirect" data-dcnode-id="7920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consensus_based_assessment" title="Consensus based assessment"><span data-dcnode-id="7921" instrument_node="">scored in a consensus fashion</span></a><span data-dcnode-id="7919" instrument_node="">, with higher scores indicating higher overlap between an individual's answers and those provided by a worldwide sample of respondents. The MSCEIT can also be expert-scored so that the amount of overlap is calculated between an individual's answers and those provided by a group of 21 </span><a data-dcnode-id="7917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emotion" title="Emotion"><span data-dcnode-id="7918" instrument_node="">emotion researchers</span></a><span data-dcnode-id="7916" instrument_node="">.</span><sup class="reference" data-dcnode-id="7913" id="cite_ref-grewal_38-2"><a data-dcnode-id="7914" href="#cite_note-grewal-38"><span data-dcnode-id="7915" instrument_node="">[38]</span></a></sup><span data-dcnode-id="7912" instrument_node="">
</span></p><p data-dcnode-id="7905"><span data-dcnode-id="7910" instrument_node="">Although promoted as an ability test, the MSCEIT test is unlike standard IQ tests in that its items do not have objectively correct responses. Among other challenges, the consensus scoring criterion means that it is impossible to create items (questions) that only a minority of respondents can solve, because, by definition, responses are deemed emotionally "intelligent" only if the majority of the sample has endorsed them. This and other similar problems have led some cognitive ability experts to question the definition of EI as a genuine intelligence.</span><sup class="reference" data-dcnode-id="7907" id="cite_ref-42"><a data-dcnode-id="7908" href="#cite_note-42"><span data-dcnode-id="7909" instrument_node="">[42]</span></a></sup><span data-dcnode-id="7906" instrument_node="">
</span></p><p data-dcnode-id="7896"><span data-dcnode-id="7904" instrument_node="">In a study by Føllesdal,</span><sup class="reference" data-dcnode-id="7901" id="cite_ref-43"><a data-dcnode-id="7902" href="#cite_note-43"><span data-dcnode-id="7903" instrument_node="">[43]</span></a></sup><span data-dcnode-id="7900" instrument_node=""> the MSCEIT test results of 111 business leaders were compared with how their employees described their leader. It was found that there were no correlations between a leader's test results and how he or she was rated by the employees, with regard to </span><a data-dcnode-id="7898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empathy" title="Empathy"><span data-dcnode-id="7899" instrument_node="">empathy</span></a><span data-dcnode-id="7897" instrument_node="">, ability to motivate, and leader effectiveness. Føllesdal also criticized the Canadian company Multi-Health Systems, which administers the test. The test contains 141 questions but it was found after publishing the test that 19 of these did not give the expected answers. This has led Multi-Health Systems to remove answers to these 19 questions before scoring but without stating this officially.
</span></p><span data-dcnode-id="7895" instrument_node="">
</span><h3 data-dcnode-id="7885"><span class="mw-headline" data-dcnode-id="7893" id="Other_measurements"><span data-dcnode-id="7894" instrument_node="">Other measurements</span></span><span class="mw-editsection" data-dcnode-id="7886"><span class="mw-editsection-bracket" data-dcnode-id="7891"><span data-dcnode-id="7892" instrument_node="">[</span></span><a data-dcnode-id="7889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D5" title="Edit section: Other measurements"><span data-dcnode-id="7890" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7887"><span data-dcnode-id="7888" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7884" instrument_node="">
</span><p data-dcnode-id="7882"><span data-dcnode-id="7883" instrument_node="">Various other specific measures have also been used to assess ability in emotional intelligence. These measures include:
</span></p><span data-dcnode-id="7881" instrument_node="">
</span><ol data-dcnode-id="7853"><li data-dcnode-id="7875"><span data-dcnode-id="7880" instrument_node="">Diagnostic Analysis of Non-verbal Accuracy (DANVA)</span><sup class="reference" data-dcnode-id="7877" id="cite_ref-44"><a data-dcnode-id="7878" href="#cite_note-44"><span data-dcnode-id="7879" instrument_node="">[44]</span></a></sup><span data-dcnode-id="7876" instrument_node="">– The Adult Facial version includes 24 photographs of equal amount of happy, sad, angry, and fearful facial expressions of both high and low intensities which are balanced by gender. The tasks of the participants is to answer which of the four emotions is present in the given stimuli.</span></li><span data-dcnode-id="7874" instrument_node="">
</span><li data-dcnode-id="7868"><span data-dcnode-id="7873" instrument_node="">Japanese and Caucasian Brief Affect Recognition Test (JACBART)</span><sup class="reference" data-dcnode-id="7870" id="cite_ref-45"><a data-dcnode-id="7871" href="#cite_note-45"><span data-dcnode-id="7872" instrument_node="">[45]</span></a></sup><span data-dcnode-id="7869" instrument_node="">– Participants try to identify 56 faces of Caucasian and Japanese individuals expressing seven emotions such happiness, contempt, disgust, sadness, anger, surprise, and fear, which may also trail off for 0.2 seconds to a different emotion.</span></li><span data-dcnode-id="7867" instrument_node="">
</span><li data-dcnode-id="7861"><span data-dcnode-id="7866" instrument_node="">Situational Test of Emotional Understanding (STEU)</span><sup class="reference" data-dcnode-id="7863" id="cite_ref-:6_46-0"><a data-dcnode-id="7864" href="#cite_note-:6-46"><span data-dcnode-id="7865" instrument_node="">[46]</span></a></sup><span data-dcnode-id="7862" instrument_node="">  – Test-takers complete 42 multiple-choice items assessing whether they understand which of five emotions a person would be experiencing in a given situation. There is also a brief version (STEU-B) consisting of 19 items.</span></li><span data-dcnode-id="7860" instrument_node="">
</span><li data-dcnode-id="7854"><span data-dcnode-id="7859" instrument_node="">Situational Test of Emotion Management (STEM)</span><sup class="reference" data-dcnode-id="7856" id="cite_ref-:6_46-1"><a data-dcnode-id="7857" href="#cite_note-:6-46"><span data-dcnode-id="7858" instrument_node="">[46]</span></a></sup><span data-dcnode-id="7855" instrument_node=""> – Test-takers complete 44 multiple-choice items where they select which of four possible responses is the most effective action to manage emotions in a specified situation. There is also a brief version (STEM-B) consisting of 18 items.</span></li></ol><span data-dcnode-id="7852" instrument_node="">
</span><h2 data-dcnode-id="7842"><span class="mw-headline" data-dcnode-id="7850" id="Mixed_model"><span data-dcnode-id="7851" instrument_node="">Mixed model</span></span><span class="mw-editsection" data-dcnode-id="7843"><span class="mw-editsection-bracket" data-dcnode-id="7848"><span data-dcnode-id="7849" instrument_node="">[</span></span><a data-dcnode-id="7846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D6" title="Edit section: Mixed model"><span data-dcnode-id="7847" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7844"><span data-dcnode-id="7845" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7841" instrument_node="">
</span><p data-dcnode-id="7835"><span data-dcnode-id="7840" instrument_node="">The model introduced by Daniel Goleman</span><sup class="reference" data-dcnode-id="7837" id="cite_ref-Goleman_1998_25-1"><a data-dcnode-id="7838" href="#cite_note-Goleman_1998-25"><span data-dcnode-id="7839" instrument_node="">[25]</span></a></sup><span data-dcnode-id="7836" instrument_node=""> focuses on EI as a wide array of competencies and skills that drive leadership performance. Goleman's model outlines five main EI constructs (for more details see "What Makes A Leader" by Daniel Goleman, best of Harvard Business Review 1998):
</span></p><span data-dcnode-id="7834" instrument_node="">
</span><ol data-dcnode-id="7806"><li data-dcnode-id="7827"><a data-dcnode-id="7832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-awareness" title="Self-awareness"><span data-dcnode-id="7833" instrument_node="">Self-awareness</span></a><span data-dcnode-id="7831" instrument_node=""> – the ability to know one's emotions, strengths, weaknesses, drives, values and goals and recognize their impact on others while using </span><a class="mw-redirect" data-dcnode-id="7829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gut_feeling" title="Gut feeling"><span data-dcnode-id="7830" instrument_node="">gut feelings</span></a><span data-dcnode-id="7828" instrument_node=""> to guide decisions.</span></li><span data-dcnode-id="7826" instrument_node="">
</span><li data-dcnode-id="7822"><a data-dcnode-id="7824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emotional_self-regulation" title="Emotional self-regulation"><span data-dcnode-id="7825" instrument_node="">Self-regulation</span></a><span data-dcnode-id="7823" instrument_node=""> – involves controlling or redirecting one's disruptive emotions and impulses and adapting to changing circumstances.</span></li><span data-dcnode-id="7821" instrument_node="">
</span><li data-dcnode-id="7817"><a class="mw-redirect" data-dcnode-id="7819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_skill" title="Social skill"><span data-dcnode-id="7820" instrument_node="">Social skill</span></a><span data-dcnode-id="7818" instrument_node=""> – managing relationships to get along with others</span></li><span data-dcnode-id="7816" instrument_node="">
</span><li data-dcnode-id="7812"><a data-dcnode-id="7814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empathy" title="Empathy"><span data-dcnode-id="7815" instrument_node="">Empathy</span></a><span data-dcnode-id="7813" instrument_node=""> – considering other people's feelings especially when making decisions</span></li><span data-dcnode-id="7811" instrument_node="">
</span><li data-dcnode-id="7807"><a data-dcnode-id="7809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Motivation" title="Motivation"><span data-dcnode-id="7810" instrument_node="">Motivation</span></a><span data-dcnode-id="7808" instrument_node=""> – being aware of what motivates them.</span></li></ol><span data-dcnode-id="7805" instrument_node="">
</span><p data-dcnode-id="7789"><span data-dcnode-id="7804" instrument_node="">Goleman includes a set of </span><a data-dcnode-id="7802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emotional_competence" title="Emotional competence"><span data-dcnode-id="7803" instrument_node="">emotional competencies</span></a><span data-dcnode-id="7801" instrument_node=""> within each construct of EI. Emotional competencies are not innate talents, but rather learned capabilities that must be worked on and can be developed to achieve outstanding performance. Goleman posits that individuals are born with a general emotional intelligence that determines their potential for learning emotional competencies.</span><sup class="reference" data-dcnode-id="7798" id="cite_ref-boy_47-0"><a data-dcnode-id="7799" href="#cite_note-boy-47"><span data-dcnode-id="7800" instrument_node="">[47]</span></a></sup><span data-dcnode-id="7797" instrument_node=""> Goleman's model of EI has been criticized in the research literature as mere "</span><a class="mw-redirect" data-dcnode-id="7795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pop_psychology" title="Pop psychology"><span data-dcnode-id="7796" instrument_node="">pop psychology</span></a><span data-dcnode-id="7794" instrument_node="">".</span><sup class="reference" data-dcnode-id="7791" id="cite_ref-Mayer_2008_32-5"><a data-dcnode-id="7792" href="#cite_note-Mayer_2008-32"><span data-dcnode-id="7793" instrument_node="">[32]</span></a></sup><span data-dcnode-id="7790" instrument_node="">
</span></p><span data-dcnode-id="7788" instrument_node="">
</span><h3 data-dcnode-id="7778"><span class="mw-headline" data-dcnode-id="7786" id="Measurement_2"><span data-dcnode-id="7787" instrument_node="">Measurement</span></span><span class="mw-editsection" data-dcnode-id="7779"><span class="mw-editsection-bracket" data-dcnode-id="7784"><span data-dcnode-id="7785" instrument_node="">[</span></span><a data-dcnode-id="7782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D7" title="Edit section: Measurement"><span data-dcnode-id="7783" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7780"><span data-dcnode-id="7781" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7777" instrument_node="">
</span><p data-dcnode-id="7775"><span data-dcnode-id="7776" instrument_node="">Two measurement tools are based on the Goleman model:
</span></p><span data-dcnode-id="7774" instrument_node="">
</span><ol data-dcnode-id="7760"><li data-dcnode-id="7769"><span data-dcnode-id="7773" instrument_node="">The Emotional Competence Inventory (ECI), which was created in 1999, and the Emotional and Social Competence Inventory (ESCI), a newer edition of the ECI was developed in 2007. The Emotional and Social Competence – University Edition (ESCI-U) is also available. These tools developed by Goleman and </span><a data-dcnode-id="7771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Boyatzis" title="Richard Boyatzis"><span data-dcnode-id="7772" instrument_node="">Boyatzis</span></a><span data-dcnode-id="7770" instrument_node=""> provide a behavioral measure of the Emotional and Social Competencies.</span></li><span data-dcnode-id="7768" instrument_node="">
</span><li data-dcnode-id="7761"><a data-dcnode-id="7766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Emotional_Intelligence_Appraisal" title="The Emotional Intelligence Appraisal"><span data-dcnode-id="7767" instrument_node="">The Emotional Intelligence Appraisal</span></a><span data-dcnode-id="7765" instrument_node="">, which was created in 2001 and which can be taken as a self-report or 360-degree assessment.</span><sup class="reference" data-dcnode-id="7762" id="cite_ref-48"><a data-dcnode-id="7763" href="#cite_note-48"><span data-dcnode-id="7764" instrument_node="">[48]</span></a></sup></li></ol><span data-dcnode-id="7759" instrument_node="">
</span><h2 data-dcnode-id="7749"><span class="mw-headline" data-dcnode-id="7757" id="Trait_model"><span data-dcnode-id="7758" instrument_node="">Trait model</span></span><span class="mw-editsection" data-dcnode-id="7750"><span class="mw-editsection-bracket" data-dcnode-id="7755"><span data-dcnode-id="7756" instrument_node="">[</span></span><a data-dcnode-id="7753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D8" title="Edit section: Trait model"><span data-dcnode-id="7754" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7751"><span data-dcnode-id="7752" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7748" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="7742" role="note"><span data-dcnode-id="7745" instrument_node="">See also: </span><a data-dcnode-id="7743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trait_theory" title="Trait theory"><span data-dcnode-id="7744" instrument_node="">Trait theory</span></a></div><span data-dcnode-id="7741" instrument_node="">
</span><p data-dcnode-id="7710"><a data-dcnode-id="7739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Konstantinos_V._Petrides" title="Konstantinos V. Petrides"><span data-dcnode-id="7740" instrument_node="">Konstantinos V. Petrides</span></a><span data-dcnode-id="7738" instrument_node=""> ("K. V. Petrides") proposed a conceptual distinction between the ability based model and a </span><a data-dcnode-id="7736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phenotypic_trait" title="Phenotypic trait"><span data-dcnode-id="7737" instrument_node="">trait</span></a><span data-dcnode-id="7735" instrument_node=""> based model of EI and has been developing the latter over many years in numerous publications.</span><sup class="reference" data-dcnode-id="7732" id="cite_ref-pet2000_49-0"><a data-dcnode-id="7733" href="#cite_note-pet2000-49"><span data-dcnode-id="7734" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="7729" id="cite_ref-petrides07_50-0"><a data-dcnode-id="7730" href="#cite_note-petrides07-50"><span data-dcnode-id="7731" instrument_node="">[50]</span></a></sup><span data-dcnode-id="7728" instrument_node=""> Trait EI is "a constellation of emotional self-perceptions located at the lower levels of personality."</span><sup class="reference" data-dcnode-id="7725" id="cite_ref-petrides07_50-1"><a data-dcnode-id="7726" href="#cite_note-petrides07-50"><span data-dcnode-id="7727" instrument_node="">[50]</span></a></sup><span data-dcnode-id="7724" instrument_node=""> In layman's terms, trait EI refers to an individual's self-perceptions of their emotional abilities. This definition of EI encompasses behavioral dispositions and self-perceived abilities and is measured by </span><a data-dcnode-id="7722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-report_inventory" title="Self-report inventory"><span data-dcnode-id="7723" instrument_node="">self report</span></a><span data-dcnode-id="7721" instrument_node="">, as opposed to the ability based model which refers to actual abilities, which have proven highly resistant to scientific measurement. Trait EI should be investigated within a </span><a data-dcnode-id="7719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Personality_psychology" title="Personality psychology"><span data-dcnode-id="7720" instrument_node="">personality</span></a><span data-dcnode-id="7718" instrument_node=""> framework.</span><sup class="reference" data-dcnode-id="7715" id="cite_ref-51"><a data-dcnode-id="7716" href="#cite_note-51"><span data-dcnode-id="7717" instrument_node="">[51]</span></a></sup><span data-dcnode-id="7714" instrument_node=""> An alternative label for the same construct is trait emotional </span><a data-dcnode-id="7712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-efficacy" title="Self-efficacy"><span data-dcnode-id="7713" instrument_node="">self-efficacy</span></a><span data-dcnode-id="7711" instrument_node="">.
</span></p><p data-dcnode-id="7701"><span data-dcnode-id="7709" instrument_node="">The trait EI model is general and subsumes the Goleman model discussed above. The conceptualization of EI as a personality trait leads to a construct that lies outside the </span><a class="mw-redirect" data-dcnode-id="7707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taxonomy_%28general%29" title="Taxonomy (general)"><span data-dcnode-id="7708" instrument_node="">taxonomy</span></a><span data-dcnode-id="7706" instrument_node=""> of human cognitive ability. This is an important distinction in as much as it bears directly on the operationalization of the construct and the theories and hypotheses that are formulated about it.</span><sup class="reference" data-dcnode-id="7703" id="cite_ref-pet2000_49-1"><a data-dcnode-id="7704" href="#cite_note-pet2000-49"><span data-dcnode-id="7705" instrument_node="">[49]</span></a></sup><span data-dcnode-id="7702" instrument_node="">
</span></p><span data-dcnode-id="7700" instrument_node="">
</span><h3 data-dcnode-id="7690"><span class="mw-headline" data-dcnode-id="7698" id="Measurement_3"><span data-dcnode-id="7699" instrument_node="">Measurement</span></span><span class="mw-editsection" data-dcnode-id="7691"><span class="mw-editsection-bracket" data-dcnode-id="7696"><span data-dcnode-id="7697" instrument_node="">[</span></span><a data-dcnode-id="7694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D9" title="Edit section: Measurement"><span data-dcnode-id="7695" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7692"><span data-dcnode-id="7693" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7689" instrument_node="">
</span><p data-dcnode-id="7660"><span data-dcnode-id="7688" instrument_node="">There are many self-report measures of EI,</span><sup class="reference" data-dcnode-id="7685" id="cite_ref-52"><a data-dcnode-id="7686" href="#cite_note-52"><span data-dcnode-id="7687" instrument_node="">[52]</span></a></sup><span data-dcnode-id="7684" instrument_node=""> including the EQ-i, the Swinburne University Emotional Intelligence Test (SUEIT), and the Schutte EI model. None of these assess intelligence, abilities, or skills (as their authors often claim), but rather, they are limited measures of trait emotional intelligence.</span><sup class="reference" data-dcnode-id="7681" id="cite_ref-petrides07_50-2"><a data-dcnode-id="7682" href="#cite_note-petrides07-50"><span data-dcnode-id="7683" instrument_node="">[50]</span></a></sup><span data-dcnode-id="7680" instrument_node=""> The most widely used and widely researched measure of self-report or self-schema (as it is currently referred to) emotional intelligence is the EQ-i 2.0.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7673" style="white-space:nowrap;"><span data-dcnode-id="7679" instrument_node="">[</span><i data-dcnode-id="7675"><a data-dcnode-id="7676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7677" title="No sources are provided for this claim (June 2021)"><span data-dcnode-id="7678" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7674" instrument_node="">]</span></sup><span data-dcnode-id="7672" instrument_node=""> Originally known as the </span><a data-dcnode-id="7670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reuven_Bar-On" title="Reuven Bar-On"><span data-dcnode-id="7671" instrument_node="">BarOn</span></a><span data-dcnode-id="7669" instrument_node=""> EQ-i, it was the first self-report measure of emotional intelligence available, the only measure predating Goleman's best-selling book.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7662" style="white-space:nowrap;"><span data-dcnode-id="7668" instrument_node="">[</span><i data-dcnode-id="7664"><a data-dcnode-id="7665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7666" title="No sources are provided for this claim (May 2020)"><span data-dcnode-id="7667" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7663" instrument_node="">]</span></sup><span data-dcnode-id="7661" instrument_node="">
</span></p><p data-dcnode-id="7626"><span data-dcnode-id="7659" instrument_node="">The Trait Emotional Intelligence Questionnaire (TEIQue) provides an operationalization for the model of </span><a data-dcnode-id="7657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Konstantinos_V._Petrides" title="Konstantinos V. Petrides"><span data-dcnode-id="7658" instrument_node="">Konstantinos V. Petrides</span></a><span data-dcnode-id="7656" instrument_node=""> and colleagues, that conceptualizes EI in terms of personality.</span><sup class="reference" data-dcnode-id="7653" id="cite_ref-53"><a data-dcnode-id="7654" href="#cite_note-53"><span data-dcnode-id="7655" instrument_node="">[53]</span></a></sup><span data-dcnode-id="7652" instrument_node=""> The test encompasses 15 subscales organized under four factors: </span><a data-dcnode-id="7650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quality_of_life" title="Quality of life"><span data-dcnode-id="7651" instrument_node="">well-being</span></a><span data-dcnode-id="7649" instrument_node="">, </span><a data-dcnode-id="7647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-control" title="Self-control"><span data-dcnode-id="7648" instrument_node="">self-control</span></a><span data-dcnode-id="7646" instrument_node="">, </span><a data-dcnode-id="7644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emotionality" title="Emotionality"><span data-dcnode-id="7645" instrument_node="">emotionality</span></a><span data-dcnode-id="7643" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="7641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sociability" title="Sociability"><span data-dcnode-id="7642" instrument_node="">sociability</span></a><span data-dcnode-id="7640" instrument_node="">. The </span><a data-dcnode-id="7638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychometrics" title="Psychometrics"><span data-dcnode-id="7639" instrument_node="">psychometric</span></a><span data-dcnode-id="7637" instrument_node=""> properties of the TEIQue were investigated in a study on a French-speaking population, where it was reported that TEIQue scores were globally </span><a class="mw-redirect" data-dcnode-id="7635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Normally_distributed" title="Normally distributed"><span data-dcnode-id="7636" instrument_node="">normally distributed</span></a><span data-dcnode-id="7634" instrument_node=""> and </span><a data-dcnode-id="7632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reliability_%28statistics%29" title="Reliability (statistics)"><span data-dcnode-id="7633" instrument_node="">reliable</span></a><span data-dcnode-id="7631" instrument_node="">.</span><sup class="reference" data-dcnode-id="7628" id="cite_ref-Mikolajczak07_54-0"><a data-dcnode-id="7629" href="#cite_note-Mikolajczak07-54"><span data-dcnode-id="7630" instrument_node="">[54]</span></a></sup><span data-dcnode-id="7627" instrument_node="">
</span></p><p data-dcnode-id="7589"><span data-dcnode-id="7625" instrument_node="">The researchers also found TEIQue scores were unrelated to nonverbal reasoning (</span><a data-dcnode-id="7623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raven%2527s_Progressive_Matrices" title="Raven's Progressive Matrices"><span data-dcnode-id="7624" instrument_node="">Raven's matrices</span></a><span data-dcnode-id="7622" instrument_node="">), which they interpreted as support for the personality trait view of EI (as opposed to a form of intelligence). As expected, TEIQue scores were positively related to some of the </span><a data-dcnode-id="7620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big_Five_personality_traits" title="Big Five personality traits"><span data-dcnode-id="7621" instrument_node="">Big Five personality traits</span></a><span data-dcnode-id="7619" instrument_node=""> (</span><a class="mw-redirect" data-dcnode-id="7617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extraversion" title="Extraversion"><span data-dcnode-id="7618" instrument_node="">extraversion</span></a><span data-dcnode-id="7616" instrument_node="">, </span><a data-dcnode-id="7614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agreeableness" title="Agreeableness"><span data-dcnode-id="7615" instrument_node="">agreeableness</span></a><span data-dcnode-id="7613" instrument_node="">, </span><a data-dcnode-id="7611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Openness_to_experience" title="Openness to experience"><span data-dcnode-id="7612" instrument_node="">openness</span></a><span data-dcnode-id="7610" instrument_node="">, </span><a data-dcnode-id="7608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conscientiousness" title="Conscientiousness"><span data-dcnode-id="7609" instrument_node="">conscientiousness</span></a><span data-dcnode-id="7607" instrument_node="">) as well as inversely related to others (</span><a data-dcnode-id="7605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexithymia" title="Alexithymia"><span data-dcnode-id="7606" instrument_node="">alexithymia</span></a><span data-dcnode-id="7604" instrument_node="">, </span><a data-dcnode-id="7602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neuroticism" title="Neuroticism"><span data-dcnode-id="7603" instrument_node="">neuroticism</span></a><span data-dcnode-id="7601" instrument_node="">). A number of quantitative genetic studies have been carried out within the trait EI model, which have revealed significant genetic effects and heritabilities for all trait EI scores.</span><sup class="reference" data-dcnode-id="7598" id="cite_ref-55"><a data-dcnode-id="7599" href="#cite_note-55"><span data-dcnode-id="7600" instrument_node="">[55]</span></a></sup><span data-dcnode-id="7597" instrument_node=""> Two recent studies (one a meta-analysis) involving direct comparisons of multiple EI tests yielded very favorable results for the TEIQue.</span><sup class="reference" data-dcnode-id="7594" id="cite_ref-Martins_2010_34-1"><a data-dcnode-id="7595" href="#cite_note-Martins_2010-34"><span data-dcnode-id="7596" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="7591" id="cite_ref-56"><a data-dcnode-id="7592" href="#cite_note-56"><span data-dcnode-id="7593" instrument_node="">[56]</span></a></sup><span data-dcnode-id="7590" instrument_node="">
</span></p><p data-dcnode-id="7574"><span data-dcnode-id="7588" instrument_node="">The Big Five Personality Traits theory gives a simple blueprint to understand others and improving relationships by knowing why people tend to behave the way they do. You can also use this theory to help better understand yourself and how to get along with others better than ever before. The Big Five Model, is also known as the Five Factor Model, is the most widely accepted personality theory held by psychologist today. The theory states that personality can boil down to five factors, known as the acronym CANOE or OCEAN (conscientiousness, agreeableness, neuroticism, openness, extraversion). Unlike other trait theories that sort individuals into binary categories (introvert or extrovert), the Big Five Model asserts that each personality trait is a spectrum. Therefore, individuals are ranked on a scale between two extreme ends.</span><sup class="reference" data-dcnode-id="7585" id="cite_ref-57"><a data-dcnode-id="7586" href="#cite_note-57"><span data-dcnode-id="7587" instrument_node="">[57]</span></a></sup><sup class="reference" data-dcnode-id="7582" id="cite_ref-58"><a data-dcnode-id="7583" href="#cite_note-58"><span data-dcnode-id="7584" instrument_node="">[58]</span></a></sup><sup class="reference" data-dcnode-id="7579" id="cite_ref-59"><a data-dcnode-id="7580" href="#cite_note-59"><span data-dcnode-id="7581" instrument_node="">[59]</span></a></sup><sup class="reference" data-dcnode-id="7576" id="cite_ref-60"><a data-dcnode-id="7577" href="#cite_note-60"><span data-dcnode-id="7578" instrument_node="">[60]</span></a></sup><span data-dcnode-id="7575" instrument_node="">
</span></p><span data-dcnode-id="7573" instrument_node="">
</span><h2 data-dcnode-id="7563"><span class="mw-headline" data-dcnode-id="7571" id="General_effects"><span data-dcnode-id="7572" instrument_node="">General effects</span></span><span class="mw-editsection" data-dcnode-id="7564"><span class="mw-editsection-bracket" data-dcnode-id="7569"><span data-dcnode-id="7570" instrument_node="">[</span></span><a data-dcnode-id="7567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D10" title="Edit section: General effects"><span data-dcnode-id="7568" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7565"><span data-dcnode-id="7566" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7562" instrument_node="">
</span><p data-dcnode-id="7553"><span data-dcnode-id="7561" instrument_node="">A review published in the </span><i data-dcnode-id="7559"><span data-dcnode-id="7560" instrument_node="">Annual Review of Psychology</span></i><span data-dcnode-id="7558" instrument_node=""> in 2008 found that higher emotional intelligence is positively correlated with:</span><sup class="reference" data-dcnode-id="7555" id="cite_ref-Mayer_2008_32-6"><a data-dcnode-id="7556" href="#cite_note-Mayer_2008-32"><span data-dcnode-id="7557" instrument_node="">[32]</span></a></sup><span data-dcnode-id="7554" instrument_node="">
</span></p><span data-dcnode-id="7552" instrument_node="">
</span><ol data-dcnode-id="7524"><li data-dcnode-id="7550"><span data-dcnode-id="7551" instrument_node="">Better social relations for children – Among children and teens, emotional intelligence positively correlates with good social interactions, relationships and negatively correlates with deviance from social norms, anti-social behavior measured both in and out of school as reported by children themselves, their own family members as well as their teachers.</span></li><span data-dcnode-id="7549" instrument_node="">
</span><li data-dcnode-id="7547"><span data-dcnode-id="7548" instrument_node="">Better social relations for adults – High emotional intelligence among adults is correlated with better self-perception of social ability and more successful interpersonal relationships with less interpersonal aggression and problems.</span></li><span data-dcnode-id="7546" instrument_node="">
</span><li data-dcnode-id="7544"><span data-dcnode-id="7545" instrument_node="">Highly emotionally intelligent individuals are perceived more positively by others – Other individuals perceive those with high EI to be more pleasant, socially skilled and empathic to be around.</span></li><span data-dcnode-id="7543" instrument_node="">
</span><li data-dcnode-id="7537"><span data-dcnode-id="7542" instrument_node="">Better academic achievement</span><sup class="reference" data-dcnode-id="7539" id="cite_ref-:7_61-0"><a data-dcnode-id="7540" href="#cite_note-:7-61"><span data-dcnode-id="7541" instrument_node="">[61]</span></a></sup><span data-dcnode-id="7538" instrument_node=""> – Emotional intelligence is correlated with greater achievement in academics as reported by teachers but generally not higher grades once the factor of IQ is taken into account.</span></li><span data-dcnode-id="7536" instrument_node="">
</span><li data-dcnode-id="7531"><span data-dcnode-id="7535" instrument_node="">Better social dynamics at work as well as better </span><a data-dcnode-id="7533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Negotiation" title="Negotiation"><span data-dcnode-id="7534" instrument_node="">negotiating</span></a><span data-dcnode-id="7532" instrument_node=""> ability.</span></li><span data-dcnode-id="7530" instrument_node="">
</span><li data-dcnode-id="7525"><span data-dcnode-id="7529" instrument_node="">Better well-being - Emotional intelligence is positively correlated with higher </span><a data-dcnode-id="7527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Life_satisfaction" title="Life satisfaction"><span data-dcnode-id="7528" instrument_node="">life satisfaction</span></a><span data-dcnode-id="7526" instrument_node="">, self-esteem and lower levels of insecurity or depression. It is also negatively correlated with poor health choices and behavior.</span></li></ol><span data-dcnode-id="7523" instrument_node="">
</span><p data-dcnode-id="7511"><span data-dcnode-id="7522" instrument_node="">Emotionally intelligent individuals are more likely to have a better understanding of themselves and to make conscious decisions based on emotion and rationale combined. Overall, it leads a person to </span><a data-dcnode-id="7520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-actualization" title="Self-actualization"><span data-dcnode-id="7521" instrument_node="">self-actualization</span></a><span data-dcnode-id="7519" instrument_node="">.</span><sup class="reference" data-dcnode-id="7516" id="cite_ref-Self-compassion_62-0"><a data-dcnode-id="7517" href="#cite_note-Self-compassion-62"><span data-dcnode-id="7518" instrument_node="">[62]</span></a></sup><sup class="reference" data-dcnode-id="7513" id="cite_ref-Bratton_2011_63-0"><a data-dcnode-id="7514" href="#cite_note-Bratton_2011-63"><span data-dcnode-id="7515" instrument_node="">[63]</span></a></sup><span data-dcnode-id="7512" instrument_node="">
</span></p><p data-dcnode-id="7491"><span data-dcnode-id="7510" instrument_node="">In recent years the relevance and importance of emotional intelligence in contexts of business leadership, commercial negotiation and dispute resolution has been increasingly recognized, and professional qualifications and continuous professional development have incorporated aspects of understanding emotions and developing greater insight into emotional interactions.</span><sup class="reference" data-dcnode-id="7507" id="cite_ref-64"><a data-dcnode-id="7508" href="#cite_note-64"><span data-dcnode-id="7509" instrument_node="">[64]</span></a></sup><sup class="reference" data-dcnode-id="7504" id="cite_ref-65"><a data-dcnode-id="7505" href="#cite_note-65"><span data-dcnode-id="7506" instrument_node="">[65]</span></a></sup><sup class="reference" data-dcnode-id="7501" id="cite_ref-66"><a data-dcnode-id="7502" href="#cite_note-66"><span data-dcnode-id="7503" instrument_node="">[66]</span></a></sup><span data-dcnode-id="7500" instrument_node=""> Especially in the globalizied world, the ability to be a global leader is becoming more important than ever. A high EQ will allow business leaders to interact with various different cultures, and they must be comfortable in these diverse cultural environments, especially with a high chance of having a diverse team and organization. EQ has become an essential part of leading an organization.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7493" style="white-space:nowrap;"><span data-dcnode-id="7499" instrument_node="">[</span><i data-dcnode-id="7495"><a data-dcnode-id="7496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7497" title="This claim needs references to reliable sources. (April 2022)"><span data-dcnode-id="7498" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7494" instrument_node="">]</span></sup><span data-dcnode-id="7492" instrument_node="">
</span></p><span data-dcnode-id="7490" instrument_node="">
</span><h2 data-dcnode-id="7480"><span class="mw-headline" data-dcnode-id="7488" id="Interactions_with_other_phenomena"><span data-dcnode-id="7489" instrument_node="">Interactions with other phenomena</span></span><span class="mw-editsection" data-dcnode-id="7481"><span class="mw-editsection-bracket" data-dcnode-id="7486"><span data-dcnode-id="7487" instrument_node="">[</span></span><a data-dcnode-id="7484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D11" title="Edit section: Interactions with other phenomena"><span data-dcnode-id="7485" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7482"><span data-dcnode-id="7483" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7479" instrument_node="">
