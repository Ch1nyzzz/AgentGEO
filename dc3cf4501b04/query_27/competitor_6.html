</span><h3 data-dcnode-id="7469"><span class="mw-headline" data-dcnode-id="7477" id="Bullying"><span data-dcnode-id="7478" instrument_node="">Bullying</span></span><span class="mw-editsection" data-dcnode-id="7470"><span class="mw-editsection-bracket" data-dcnode-id="7475"><span data-dcnode-id="7476" instrument_node="">[</span></span><a data-dcnode-id="7473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D12" title="Edit section: Bullying"><span data-dcnode-id="7474" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7471"><span data-dcnode-id="7472" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7468" instrument_node="">
</span><link data-dcnode-id="7467" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7463" role="note"><span data-dcnode-id="7466" instrument_node="">Main article: </span><a data-dcnode-id="7464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bullying_and_emotional_intelligence" title="Bullying and emotional intelligence"><span data-dcnode-id="7465" instrument_node="">Bullying and emotional intelligence</span></a></div><span data-dcnode-id="7462" instrument_node="">
</span><p data-dcnode-id="7426"><a data-dcnode-id="7460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bullying" title="Bullying"><span data-dcnode-id="7461" instrument_node="">Bullying</span></a><span data-dcnode-id="7459" instrument_node=""> is </span><a class="mw-redirect" data-dcnode-id="7457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abusive" title="Abusive"><span data-dcnode-id="7458" instrument_node="">abusive</span></a><span data-dcnode-id="7456" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="7454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_interaction" title="Social interaction"><span data-dcnode-id="7455" instrument_node="">social interaction</span></a><span data-dcnode-id="7453" instrument_node=""> between peers which can include </span><a data-dcnode-id="7451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aggression" title="Aggression"><span data-dcnode-id="7452" instrument_node="">aggression</span></a><span data-dcnode-id="7450" instrument_node="">, </span><a data-dcnode-id="7448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harassment" title="Harassment"><span data-dcnode-id="7449" instrument_node="">harassment</span></a><span data-dcnode-id="7447" instrument_node="">, and </span><a data-dcnode-id="7445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Violence" title="Violence"><span data-dcnode-id="7446" instrument_node="">violence</span></a><span data-dcnode-id="7444" instrument_node="">. Bullying is typically repetitive and enacted by those who are in a position of </span><a data-dcnode-id="7442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abusive_power_and_control" title="Abusive power and control"><span data-dcnode-id="7443" instrument_node="">power</span></a><span data-dcnode-id="7441" instrument_node=""> over the victim. A growing body of research illustrates a significant relationship between bullying and emotional intelligence.</span><sup class="reference" data-dcnode-id="7438" id="cite_ref-67"><a data-dcnode-id="7439" href="#cite_note-67"><span data-dcnode-id="7440" instrument_node="">[67]</span></a></sup><sup class="reference" data-dcnode-id="7435" id="cite_ref-68"><a data-dcnode-id="7436" href="#cite_note-68"><span data-dcnode-id="7437" instrument_node="">[68]</span></a></sup><sup class="reference" data-dcnode-id="7432" id="cite_ref-69"><a data-dcnode-id="7433" href="#cite_note-69"><span data-dcnode-id="7434" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7431" instrument_node=""> They also have shown that emotional intelligence is a key factor in the analysis of cases of cybervictimization,</span><sup class="reference" data-dcnode-id="7428" id="cite_ref-70"><a data-dcnode-id="7429" href="#cite_note-70"><span data-dcnode-id="7430" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7427" instrument_node=""> by demonstrating a relevant impact on health and social adaptation.
</span></p><p data-dcnode-id="7409"><span data-dcnode-id="7425" instrument_node="">Emotional intelligence (EI) is a set of abilities related to the understanding, use and management of emotion as it relates to one's self and others. Mayer et al., (2008) defines the dimensions of overall EI as: "accurately perceiving emotion, using emotions to facilitate thought, understanding emotion, and managing emotion".</span><sup class="reference" data-dcnode-id="7422" id="cite_ref-71"><a data-dcnode-id="7423" href="#cite_note-71"><span data-dcnode-id="7424" instrument_node="">[71]</span></a></sup><span data-dcnode-id="7421" instrument_node=""> The concept combines emotional and intellectual processes.</span><sup class="reference" data-dcnode-id="7418" id="cite_ref-Tolegenova_72-0"><a data-dcnode-id="7419" href="#cite_note-Tolegenova-72"><span data-dcnode-id="7420" instrument_node="">[72]</span></a></sup><span data-dcnode-id="7417" instrument_node=""> Lower emotional intelligence appears to be related to involvement in bullying, as the bully and/or the victim of bullying. EI seems to play an important role in both bullying behavior and </span><a class="mw-redirect" data-dcnode-id="7415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victimization" title="Victimization"><span data-dcnode-id="7416" instrument_node="">victimization</span></a><span data-dcnode-id="7414" instrument_node=""> in bullying; given that EI is illustrated to be malleable, EI education could greatly improve bullying prevention and intervention initiatives.</span><sup class="reference" data-dcnode-id="7411" id="cite_ref-73"><a data-dcnode-id="7412" href="#cite_note-73"><span data-dcnode-id="7413" instrument_node="">[73]</span></a></sup><span data-dcnode-id="7410" instrument_node="">
</span></p><span data-dcnode-id="7408" instrument_node="">
</span><h3 data-dcnode-id="7398"><span class="mw-headline" data-dcnode-id="7406" id="Job_performance"><span data-dcnode-id="7407" instrument_node="">Job performance</span></span><span class="mw-editsection" data-dcnode-id="7399"><span class="mw-editsection-bracket" data-dcnode-id="7404"><span data-dcnode-id="7405" instrument_node="">[</span></span><a data-dcnode-id="7402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D13" title="Edit section: Job performance"><span data-dcnode-id="7403" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7400"><span data-dcnode-id="7401" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7397" instrument_node="">
</span><link data-dcnode-id="7396" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7392" role="note"><span data-dcnode-id="7395" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="7393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Job_performance_and_emotional_intelligence" title="Job performance and emotional intelligence"><span data-dcnode-id="7394" instrument_node="">Job performance and emotional intelligence</span></a></div><span data-dcnode-id="7391" instrument_node="">
</span><p data-dcnode-id="7370"><span data-dcnode-id="7390" instrument_node="">The most recent meta-analysis of emotional intelligence and job performance showed correlations of r=.20 (for job performance &amp; ability EI) and r=.29 (for job performance and mixed EI).</span><sup class="reference" data-dcnode-id="7387" id="cite_ref-ReferenceC_14-1"><a data-dcnode-id="7388" href="#cite_note-ReferenceC-14"><span data-dcnode-id="7389" instrument_node="">[14]</span></a></sup><span data-dcnode-id="7386" instrument_node=""> Earlier research on EI and </span><a data-dcnode-id="7384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Job_performance" title="Job performance"><span data-dcnode-id="7385" instrument_node="">job performance</span></a><span data-dcnode-id="7383" instrument_node=""> had shown mixed results: a positive relation has been found in some of the studies, while in others there was no relation or an inconsistent one.</span><sup class="reference" data-dcnode-id="7380" id="cite_ref-ReferenceC_14-2"><a data-dcnode-id="7381" href="#cite_note-ReferenceC-14"><span data-dcnode-id="7382" instrument_node="">[14]</span></a></sup><span data-dcnode-id="7379" instrument_node=""> This led researchers Cote and Miners (2006)</span><sup class="reference" data-dcnode-id="7376" id="cite_ref-Côté_2006_74-0"><a data-dcnode-id="7377" href="#cite_note-C%C3%B4t%C3%A9_2006-74"><span data-dcnode-id="7378" instrument_node="">[74]</span></a></sup><span data-dcnode-id="7375" instrument_node=""> to offer a compensatory model between EI and IQ, that posits that the association between EI and job performance becomes more positive as cognitive intelligence decreases, an idea first proposed in the context of academic performance (Petrides, Frederickson, &amp; Furnham, 2004). The results of the former study supported the compensatory model: employees with low IQ get higher task performance and organizational citizenship behavior directed at the organization, the higher their EI. It has also been observed that there is no significant link between emotional intelligence and work attitude-behavior.</span><sup class="reference" data-dcnode-id="7372" id="cite_ref-75"><a data-dcnode-id="7373" href="#cite_note-75"><span data-dcnode-id="7374" instrument_node="">[75]</span></a></sup><span data-dcnode-id="7371" instrument_node="">
</span></p><p data-dcnode-id="7356"><span data-dcnode-id="7369" instrument_node="">A more recent study suggests that EI is not necessarily a universally positive trait.</span><sup class="reference" data-dcnode-id="7366" id="cite_ref-Emotional_intelligence,_teamwork_ef_76-0"><a data-dcnode-id="7367" href="#cite_note-Emotional_intelligence,_teamwork_ef-76"><span data-dcnode-id="7368" instrument_node="">[76]</span></a></sup><span data-dcnode-id="7365" instrument_node=""> They found a negative correlation between EI and managerial work demands; while under low levels of managerial work demands, they found a negative relationship between EI and teamwork effectiveness. An explanation for this may suggest gender differences in EI, as women tend to score higher levels than men.</span><sup class="reference" data-dcnode-id="7362" id="cite_ref-ReferenceB_12-1"><a data-dcnode-id="7363" href="#cite_note-ReferenceB-12"><span data-dcnode-id="7364" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7361" instrument_node=""> This furthers the idea that job context plays a role in the relationships between EI, teamwork effectiveness, and job performance. Another find was discussed in a study that assessed a possible link between EI and entrepreneurial behaviors and success.</span><sup class="reference" data-dcnode-id="7358" id="cite_ref-77"><a data-dcnode-id="7359" href="#cite_note-77"><span data-dcnode-id="7360" instrument_node="">[77]</span></a></sup><span data-dcnode-id="7357" instrument_node="">
</span></p><p data-dcnode-id="7332"><span data-dcnode-id="7355" instrument_node="">Although studies between emotional intelligence (EI) and job performance have shown mixed results of high and low correlations, EI is an undeniably better predictor than most of the hiring methods commonly used in companies, such as </span><a class="mw-redirect" data-dcnode-id="7353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recommendation_letter" title="Recommendation letter"><span data-dcnode-id="7354" instrument_node="">letter of references</span></a><span data-dcnode-id="7352" instrument_node="">, </span><a data-dcnode-id="7350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cover_letter" title="Cover letter"><span data-dcnode-id="7351" instrument_node="">cover letter</span></a><span data-dcnode-id="7349" instrument_node="">, among others. By 2008, 147 companies and consulting firms in U.S had developed programmes that involved EI for training and hiring employees.</span><sup class="reference" data-dcnode-id="7346" id="cite_ref-ReferenceC_14-3"><a data-dcnode-id="7347" href="#cite_note-ReferenceC-14"><span data-dcnode-id="7348" instrument_node="">[14]</span></a></sup><span data-dcnode-id="7345" instrument_node=""> Van Rooy and Viswesvaran (2004)</span><sup class="reference" data-dcnode-id="7342" id="cite_ref-:1_78-0"><a data-dcnode-id="7343" href="#cite_note-:1-78"><span data-dcnode-id="7344" instrument_node="">[78]</span></a></sup><span data-dcnode-id="7341" instrument_node=""> showed that EI correlated significantly with different domains in performance, ranging from .24 for job performance to .10 for academic performance. These findings may contribute to organizations in different ways. For instance, employees high on EI would be more aware of their own emotions and from others, which in turn, could lead companies to better profits and less unnecessary expenses. This is especially important for expatriate managers, who have to deal with mixed emotions and feelings, while adapting to a new working culture.</span><sup class="reference" data-dcnode-id="7338" id="cite_ref-:1_78-1"><a data-dcnode-id="7339" href="#cite_note-:1-78"><span data-dcnode-id="7340" instrument_node="">[78]</span></a></sup><span data-dcnode-id="7337" instrument_node=""> Moreover, employees high in EI show more confidence in their roles, which allow them to face demanding tasks positively.</span><sup class="reference" data-dcnode-id="7334" id="cite_ref-:2_79-0"><a data-dcnode-id="7335" href="#cite_note-:2-79"><span data-dcnode-id="7336" instrument_node="">[79]</span></a></sup><span data-dcnode-id="7333" instrument_node="">
</span></p><p data-dcnode-id="7306"><span data-dcnode-id="7331" instrument_node="">According to a popular science book by the journalist Daniel Goleman, emotional intelligence accounts for more career success than IQ.</span><sup class="reference" data-dcnode-id="7328" id="cite_ref-80"><a data-dcnode-id="7329" href="#cite_note-80"><span data-dcnode-id="7330" instrument_node="">[80]</span></a></sup><span data-dcnode-id="7327" instrument_node=""> Similarly, other studies argued that employees high on EI perform substantially better than employees low in EI. This is measured by self-reports and different work performance indicators, such as wages, promotions and salary increase.</span><sup class="reference" data-dcnode-id="7324" id="cite_ref-:3_81-0"><a data-dcnode-id="7325" href="#cite_note-:3-81"><span data-dcnode-id="7326" instrument_node="">[81]</span></a></sup><span data-dcnode-id="7323" instrument_node=""> According to Lopes and his colleagues (2006),</span><sup class="reference" data-dcnode-id="7320" id="cite_ref-:4_82-0"><a data-dcnode-id="7321" href="#cite_note-:4-82"><span data-dcnode-id="7322" instrument_node="">[82]</span></a></sup><span data-dcnode-id="7319" instrument_node=""> EI contributes to develop strong and positive relationships with co-workers and perform efficiently in work teams. This benefits performance of workers by providing emotional support and instrumental resources needed to succeed in their roles.</span><sup class="reference" data-dcnode-id="7316" id="cite_ref-83"><a data-dcnode-id="7317" href="#cite_note-83"><span data-dcnode-id="7318" instrument_node="">[83]</span></a></sup><span data-dcnode-id="7315" instrument_node=""> Also, emotionally intelligent employees have better resources to cope with stressing situations and demanding tasks, which enable them to outperform in those situations.</span><sup class="reference" data-dcnode-id="7312" id="cite_ref-:4_82-1"><a data-dcnode-id="7313" href="#cite_note-:4-82"><span data-dcnode-id="7314" instrument_node="">[82]</span></a></sup><span data-dcnode-id="7311" instrument_node=""> For instance, Law et al. (2004)</span><sup class="reference" data-dcnode-id="7308" id="cite_ref-:3_81-1"><a data-dcnode-id="7309" href="#cite_note-:3-81"><span data-dcnode-id="7310" instrument_node="">[81]</span></a></sup><span data-dcnode-id="7307" instrument_node=""> found that EI was the best predictor of job performance beyond general cognitive ability among IT scientists in computer company in China.
</span></p><p data-dcnode-id="7265"><span data-dcnode-id="7305" instrument_node="">In the job performance – emotional intelligence correlation is important to consider the effects of </span><a data-dcnode-id="7303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Managing_up_and_managing_down" title="Managing up and managing down"><span data-dcnode-id="7304" instrument_node="">managing up</span></a><span data-dcnode-id="7302" instrument_node="">, which refers to the good and positive relationship between the employee and his/her supervisor.</span><sup class="reference" data-dcnode-id="7299" id="cite_ref-84"><a data-dcnode-id="7300" href="#cite_note-84"><span data-dcnode-id="7301" instrument_node="">[84]</span></a></sup><span data-dcnode-id="7298" instrument_node=""> Previous research found that quality of this relationship could interfere in the results of the subjective rating of job performance evaluation.</span><sup class="reference" data-dcnode-id="7295" id="cite_ref-85"><a data-dcnode-id="7296" href="#cite_note-85"><span data-dcnode-id="7297" instrument_node="">[85]</span></a></sup><span data-dcnode-id="7294" instrument_node=""> Emotionally intelligent employees devote more of their working time on managing their relationship with supervisors. Hence, the likelihood of obtaining better results on performance evaluation is greater for employees high in EI than for employees with low EI.</span><sup class="reference" data-dcnode-id="7291" id="cite_ref-:2_79-1"><a data-dcnode-id="7292" href="#cite_note-:2-79"><span data-dcnode-id="7293" instrument_node="">[79]</span></a></sup><span data-dcnode-id="7290" instrument_node="">  Based on theoretical and methodological approaches, EI measures are categorized in three main streams: (1) stream 1: ability-based measures (e.g. MSCEIT), (2) stream 2: self-reports of abilities measures (e.g. SREIT, SUEIT and WLEIS) and (3) stream 3: mixed-models (e.g. AES, ECI, EI questionnaire, EIS, EQ-I and GENOS), which include measures of EI and traditional social skills.</span><sup class="reference" data-dcnode-id="7287" id="cite_ref-86"><a data-dcnode-id="7288" href="#cite_note-86"><span data-dcnode-id="7289" instrument_node="">[86]</span></a></sup><span data-dcnode-id="7286" instrument_node=""> O'Boyle Jr. and his colleagues (2011)</span><sup class="reference" data-dcnode-id="7283" id="cite_ref-:0_13-1"><a data-dcnode-id="7284" href="#cite_note-:0-13"><span data-dcnode-id="7285" instrument_node="">[13]</span></a></sup><span data-dcnode-id="7282" instrument_node=""> found that the three EI streams together had a positive correlation of 0.28 with job performance. Similarly, each of EI streams independently obtained a positive correlation of 0.24, 0.30 and 0.28, respectively. Stream 2 and 3 showed an incremental validity for predicting job performance over and above personality (</span><a data-dcnode-id="7280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big_Five_personality_traits" title="Big Five personality traits"><span data-dcnode-id="7281" instrument_node="">Five Factor model</span></a><span data-dcnode-id="7279" instrument_node="">) and </span><a data-dcnode-id="7277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/G_factor_%28psychometrics%29" title="G factor (psychometrics)"><span data-dcnode-id="7278" instrument_node="">general cognitive ability</span></a><span data-dcnode-id="7276" instrument_node="">. Both, stream 2 and 3 were the second most important predictor of job performance below </span><a data-dcnode-id="7274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/G_factor_%28psychometrics%29" title="G factor (psychometrics)"><span data-dcnode-id="7275" instrument_node="">general cognitive ability.</span></a><span data-dcnode-id="7273" instrument_node=""> Stream 2 explained 13.6% of the total variance; whereas stream 3, explained 13.2%. In order to examine the reliability of these findings, a publication bias analysis was developed. Results indicated that studies on EI-job performance correlation prior to 2010 do not present substantial evidences to suggest the presence of </span><a data-dcnode-id="7271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Publication_bias" title="Publication bias"><span data-dcnode-id="7272" instrument_node="">publication bias</span></a><span data-dcnode-id="7270" instrument_node="">. Noting that O'Boyle Jr. et al. (2011) had included self-rated performance and academic performance in their meta-analysis, Joseph, Jin, Newman, &amp; O'Boyle (2015) collaborated to update the meta-analysis to focus specifically on job performance; using measures of job performance, these authors showed r=.20 (for job performance &amp; ability EI) and r=.29 (for job performance and mixed EI).</span><sup class="reference" data-dcnode-id="7267" id="cite_ref-ReferenceC_14-4"><a data-dcnode-id="7268" href="#cite_note-ReferenceC-14"><span data-dcnode-id="7269" instrument_node="">[14]</span></a></sup><span data-dcnode-id="7266" instrument_node="">
</span></p><p data-dcnode-id="7231"><span data-dcnode-id="7264" instrument_node="">The Consortium for Research on Emotional Intelligence in Organizations argues that there is a </span><a data-dcnode-id="7262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Business_case" title="Business case"><span data-dcnode-id="7263" instrument_node="">business case</span></a><span data-dcnode-id="7261" instrument_node=""> in favour of emotional intelligence </span><sup class="reference" data-dcnode-id="7258" id="cite_ref-87"><a data-dcnode-id="7259" href="#cite_note-87"><span data-dcnode-id="7260" instrument_node="">[87]</span></a></sup><span data-dcnode-id="7257" instrument_node=""> but, despite the validity of previous findings, some researchers still question whether EI – job performance correlation makes a real impact on business strategies. Critics argue that the popularity of EI studies is due to media advertising, rather than objective scientific findings.</span><sup class="reference" data-dcnode-id="7254" id="cite_ref-Côté_2006_74-1"><a data-dcnode-id="7255" href="#cite_note-C%C3%B4t%C3%A9_2006-74"><span data-dcnode-id="7256" instrument_node="">[74]</span></a></sup><span data-dcnode-id="7253" instrument_node=""> Also, it is mentioned that the relationship between job performance and EI is not as strong as suggested. This relationship requires the presence of other constructs to raise important outcomes. For instance, previous studies found that EI is positively associated with teamwork effectiveness under job contexts of high managerial work demands, which improves job performance. This is due to the activation of strong emotions during the performance on this job context. In this scenario, emotionally intelligent individuals show a better set of resources to succeed in their roles. However, individuals with high EI show a similar level of performance than non-emotionally intelligent employees under different job contexts.</span><sup class="reference" data-dcnode-id="7250" id="cite_ref-Emotional_intelligence,_teamwork_ef_76-1"><a data-dcnode-id="7251" href="#cite_note-Emotional_intelligence,_teamwork_ef-76"><span data-dcnode-id="7252" instrument_node="">[76]</span></a></sup><span data-dcnode-id="7249" instrument_node=""> Moreover, Joseph and Newman (2010)</span><sup class="reference" data-dcnode-id="7246" id="cite_ref-ReferenceB_12-2"><a data-dcnode-id="7247" href="#cite_note-ReferenceB-12"><span data-dcnode-id="7248" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7245" instrument_node=""> suggested that emotional perception and emotional regulation components of EI highly contribute to job performance under job contexts of high emotional demands. Moon and Hur (2011)</span><sup class="reference" data-dcnode-id="7242" id="cite_ref-88"><a data-dcnode-id="7243" href="#cite_note-88"><span data-dcnode-id="7244" instrument_node="">[88]</span></a></sup><span data-dcnode-id="7241" instrument_node=""> found that </span><a data-dcnode-id="7239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emotional_exhaustion" title="Emotional exhaustion"><span data-dcnode-id="7240" instrument_node="">emotional exhaustion</span></a><span data-dcnode-id="7238" instrument_node=""> ("burn-out") significantly influences the job performance – EI relationship. </span><a data-dcnode-id="7236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emotional_exhaustion" title="Emotional exhaustion"><span data-dcnode-id="7237" instrument_node="">Emotional exhaustion</span></a><span data-dcnode-id="7235" instrument_node=""> showed a negative association with two components of EI (optimism and social skills). This association impacted negatively to job performance, as well. Hence, job performance – EI relationship is stronger under contexts of high emotional exhaustion or burn-out; in other words, employees with high levels of optimism and social skills possess better resources to outperform when facing high </span><a data-dcnode-id="7233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emotional_exhaustion" title="Emotional exhaustion"><span data-dcnode-id="7234" instrument_node="">emotional exhaustion</span></a><span data-dcnode-id="7232" instrument_node=""> contexts.
</span></p><span data-dcnode-id="7230" instrument_node="">
</span><h3 data-dcnode-id="7220"><span class="mw-headline" data-dcnode-id="7228" id="Leadership"><span data-dcnode-id="7229" instrument_node="">Leadership</span></span><span class="mw-editsection" data-dcnode-id="7221"><span class="mw-editsection-bracket" data-dcnode-id="7226"><span data-dcnode-id="7227" instrument_node="">[</span></span><a data-dcnode-id="7224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D14" title="Edit section: Leadership"><span data-dcnode-id="7225" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7222"><span data-dcnode-id="7223" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7219" instrument_node="">
</span><p data-dcnode-id="7213"><span data-dcnode-id="7218" instrument_node="">There are several studies that attempt to study the relationship between EI and leadership. Although EI does play a positive role when it comes to leadership effectiveness, what actually makes a leader effective is what he/she does with his role, rather than his interpersonal skills and abilities. Although in the past a good or effective leader was the one who gave orders and controlled the overall performance of the organization, almost everything is different nowadays: leaders are now expected to motivate and create a sense of belongingness that will make employees feel comfortable, thus, making them work more effectively.</span><sup class="reference" data-dcnode-id="7215" id="cite_ref-89"><a data-dcnode-id="7216" href="#cite_note-89"><span data-dcnode-id="7217" instrument_node="">[89]</span></a></sup><span data-dcnode-id="7214" instrument_node="">
</span></p><p data-dcnode-id="7203"><span data-dcnode-id="7212" instrument_node="">However, this does not mean that actions are more important than emotional intelligence. Leaders still need to grow emotionally in order to handle different problems of stress, and lack of life balance, among other things.</span><sup class="reference" data-dcnode-id="7209" id="cite_ref-90"><a data-dcnode-id="7210" href="#cite_note-90"><span data-dcnode-id="7211" instrument_node="">[90]</span></a></sup><span data-dcnode-id="7208" instrument_node=""> A proper way to grow emotionally, for instance, is developing a sense of empathy since empathy is a key factor when it comes to emotional intelligence. In a study conducted to analyze the relationship between School Counselors' EI and leadership skills, it was concluded that several participants were good leaders because their emotional intelligence was developed in counselor preparations, where empathy is taught.</span><sup class="reference" data-dcnode-id="7205" id="cite_ref-91"><a data-dcnode-id="7206" href="#cite_note-91"><span data-dcnode-id="7207" instrument_node="">[91]</span></a></sup><span data-dcnode-id="7204" instrument_node="">
</span></p><span data-dcnode-id="7202" instrument_node="">
</span><h3 data-dcnode-id="7192"><span class="mw-headline" data-dcnode-id="7200" id="Health"><span data-dcnode-id="7201" instrument_node="">Health</span></span><span class="mw-editsection" data-dcnode-id="7193"><span class="mw-editsection-bracket" data-dcnode-id="7198"><span data-dcnode-id="7199" instrument_node="">[</span></span><a data-dcnode-id="7196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D15" title="Edit section: Health"><span data-dcnode-id="7197" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7194"><span data-dcnode-id="7195" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7191" instrument_node="">
</span><p data-dcnode-id="7181"><span data-dcnode-id="7190" instrument_node="">A 2007 meta-analysis of 44 effect sizes by Schutte found that emotional intelligence was associated with better mental and physical health. Particularly, trait EI had the stronger association with mental and physical health.</span><sup class="reference" data-dcnode-id="7187" id="cite_ref-92"><a data-dcnode-id="7188" href="#cite_note-92"><span data-dcnode-id="7189" instrument_node="">[92]</span></a></sup><span data-dcnode-id="7186" instrument_node=""> This was replicated again in 2010 by researcher Alexandra Martin who found trait EI as a strong predictor for health after conducting a meta-analysis based on 105 effect sizes and 19,815 participants. This meta-analysis also indicated that this line of research reached enough sufficiency and stability in concluding EI as a positive predictor for health.</span><sup class="reference" data-dcnode-id="7183" id="cite_ref-Martins_2010_34-2"><a data-dcnode-id="7184" href="#cite_note-Martins_2010-34"><span data-dcnode-id="7185" instrument_node="">[34]</span></a></sup><span data-dcnode-id="7182" instrument_node="">
</span></p><p data-dcnode-id="7175"><span data-dcnode-id="7180" instrument_node="">An earlier study by Mayer and Salovey argued that high EI can increase one's own well-being because of its role in enhancing relationships.</span><sup class="reference" data-dcnode-id="7177" id="cite_ref-93"><a data-dcnode-id="7178" href="#cite_note-93"><span data-dcnode-id="7179" instrument_node="">[93]</span></a></sup><span data-dcnode-id="7176" instrument_node="">
</span></p><span data-dcnode-id="7174" instrument_node="">
</span><h3 data-dcnode-id="7164"><span class="mw-headline" data-dcnode-id="7172" id="Self-esteem_and_drug_dependence"><span data-dcnode-id="7173" instrument_node="">Self-esteem and drug dependence</span></span><span class="mw-editsection" data-dcnode-id="7165"><span class="mw-editsection-bracket" data-dcnode-id="7170"><span data-dcnode-id="7171" instrument_node="">[</span></span><a data-dcnode-id="7168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D16" title="Edit section: Self-esteem and drug dependence"><span data-dcnode-id="7169" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7166"><span data-dcnode-id="7167" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7163" instrument_node="">
</span><p data-dcnode-id="7151"><span data-dcnode-id="7162" instrument_node="">A 2012 study in India cross-examined emotional intelligence, </span><a data-dcnode-id="7160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-esteem" title="Self-esteem"><span data-dcnode-id="7161" instrument_node="">self-esteem</span></a><span data-dcnode-id="7159" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="7157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marijuana" title="Marijuana"><span data-dcnode-id="7158" instrument_node="">marijuana</span></a><span data-dcnode-id="7156" instrument_node=""> dependence.</span><sup class="reference" data-dcnode-id="7153" id="cite_ref-94"><a data-dcnode-id="7154" href="#cite_note-94"><span data-dcnode-id="7155" instrument_node="">[94]</span></a></sup><span data-dcnode-id="7152" instrument_node=""> Out of a sample of 200, 100 of whom were dependent on cannabis and the other 100 emotionally healthy, the dependent group scored exceptionally low on EI when compared to the control group. They also found that the dependent group also scored low on self-esteem when compared to the control.
</span></p><p data-dcnode-id="7139"><span data-dcnode-id="7150" instrument_node="">Another study in 2010 examined whether or not low levels of EI had a relationship with the degree of </span><a data-dcnode-id="7148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Substance_dependence" title="Substance dependence"><span data-dcnode-id="7149" instrument_node="">drug</span></a><span data-dcnode-id="7147" instrument_node=""> and </span><a data-dcnode-id="7145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alcoholism" title="Alcoholism"><span data-dcnode-id="7146" instrument_node="">alcohol</span></a><span data-dcnode-id="7144" instrument_node=""> addiction in Australia.</span><sup class="reference" data-dcnode-id="7141" id="cite_ref-95"><a data-dcnode-id="7142" href="#cite_note-95"><span data-dcnode-id="7143" instrument_node="">[95]</span></a></sup><span data-dcnode-id="7140" instrument_node=""> In the assessment of 103 residents in a drug rehabilitation center, they examined their EI along with other psychosocial factors in a one-month interval of treatment. They found that participants' EI scores improved as their levels of addiction lessened as part of their treatment.
</span></p><span data-dcnode-id="7138" instrument_node="">
</span><h3 data-dcnode-id="7128"><span class="mw-headline" data-dcnode-id="7136" id="Academic_performance"><span data-dcnode-id="7137" instrument_node="">Academic performance</span></span><span class="mw-editsection" data-dcnode-id="7129"><span class="mw-editsection-bracket" data-dcnode-id="7134"><span data-dcnode-id="7135" instrument_node="">[</span></span><a data-dcnode-id="7132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D17" title="Edit section: Academic performance"><span data-dcnode-id="7133" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7130"><span data-dcnode-id="7131" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7127" instrument_node="">
</span><p data-dcnode-id="7121"><span data-dcnode-id="7126" instrument_node="">A 2020 meta-analysis showed that students with higher emotional intelligence show higher academic performance at school.</span><sup class="reference" data-dcnode-id="7123" id="cite_ref-:7_61-1"><a data-dcnode-id="7124" href="#cite_note-:7-61"><span data-dcnode-id="7125" instrument_node="">[61]</span></a></sup><span data-dcnode-id="7122" instrument_node=""> This was a large summary of over 1,246 effects from 158 different studies, with a sample size of 42,529. Students with higher emotional intelligence had better scores on standardized tests and achieved higher grades. The effect was significantly larger for humanities than for science/maths areas of study, and significantly larger for ability emotional intelligence (measured with objective tasks), than for rating scales of emotional intelligence. The association of emotional intelligence with higher academic achievement was still significant even after considering the effect of students' Big Five personality and intelligence.
</span></p><p data-dcnode-id="7119"><span data-dcnode-id="7120" instrument_node="">There are three possible reasons why greater emotional intelligence might predict stronger academic performance. First, emotionally intelligent students are able to regulate their emotions at school—they are able to control their anxiety surrounding tests and assessment, and their boredom when material is not intrinsically interesting. This means their emotions to not impede their test scores or their ability to learn. Second, emotionally intelligent students are able to build better social relationships with other students and with instructors. This means that they have sources of help when needed—other students and teachers are more willing to help them when they get stuck. Third, some of the abilities of emotional intelligence (understanding emotions, for example) overlap with academic content, particularly in the humanities. That is, analyzing universal themes in literature or the social forces underpinning historic events require a knowledge of human emotions.
</span></p><span data-dcnode-id="7118" instrument_node="">
</span><h2 data-dcnode-id="7108"><span class="mw-headline" data-dcnode-id="7116" id="Criticisms"><span data-dcnode-id="7117" instrument_node="">Criticisms</span></span><span class="mw-editsection" data-dcnode-id="7109"><span class="mw-editsection-bracket" data-dcnode-id="7114"><span data-dcnode-id="7115" instrument_node="">[</span></span><a data-dcnode-id="7112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D18" title="Edit section: Criticisms"><span data-dcnode-id="7113" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7110"><span data-dcnode-id="7111" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7107" instrument_node="">
</span><p data-dcnode-id="7095"><span data-dcnode-id="7106" instrument_node="">EI, and Goleman's original 1995 analysis, have been criticized by some writers within the </span><a data-dcnode-id="7104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scientific_community" title="Scientific community"><span data-dcnode-id="7105" instrument_node="">scientific community</span></a><span data-dcnode-id="7103" instrument_node="">:</span><sup class="reference" data-dcnode-id="7100" id="cite_ref-96"><a data-dcnode-id="7101" href="#cite_note-96"><span data-dcnode-id="7102" instrument_node="">[96]</span></a></sup><sup class="reference" data-dcnode-id="7097" id="cite_ref-97"><a data-dcnode-id="7098" href="#cite_note-97"><span data-dcnode-id="7099" instrument_node="">[97]</span></a></sup><span data-dcnode-id="7096" instrument_node="">
</span></p><span data-dcnode-id="7094" instrument_node="">
</span><h3 data-dcnode-id="7084"><span class="mw-headline" data-dcnode-id="7092" id="Predictive_power"><span data-dcnode-id="7093" instrument_node="">Predictive power</span></span><span class="mw-editsection" data-dcnode-id="7085"><span class="mw-editsection-bracket" data-dcnode-id="7090"><span data-dcnode-id="7091" instrument_node="">[</span></span><a data-dcnode-id="7088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D19" title="Edit section: Predictive power"><span data-dcnode-id="7089" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7086"><span data-dcnode-id="7087" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7083" instrument_node="">
</span><p data-dcnode-id="7069"><span data-dcnode-id="7082" instrument_node="">Landy distinguishes between the "commercial" and "academic" discussion of EI, basing this distinction on the alleged predictive power of EI as seen by each of the two.</span><sup class="reference" data-dcnode-id="7079" id="cite_ref-landy_98-0"><a data-dcnode-id="7080" href="#cite_note-landy-98"><span data-dcnode-id="7081" instrument_node="">[98]</span></a></sup><span data-dcnode-id="7078" instrument_node=""> According to Landy, the former makes expansive claims on the applied value of EI, while the latter is trying to warn users against these claims. As an example, Goleman (1998) asserts that "the most effective leaders are alike in one crucial way: they all have a high degree of what has come to be known as emotional intelligence. ...emotional intelligence is the sine qua non of leadership." In contrast, Mayer (1999) cautions "the popular literature's implication—that highly emotionally intelligent people possess an unqualified advantage in life—appears overly enthusiastic at present and unsubstantiated by reasonable scientific standards." Landy further reinforces this argument by noting that the data upon which these claims are based are held in "proprietary databases", which means they are unavailable to independent researchers for reanalysis, replication, or verification.</span><sup class="reference" data-dcnode-id="7075" id="cite_ref-landy_98-1"><a data-dcnode-id="7076" href="#cite_note-landy-98"><span data-dcnode-id="7077" instrument_node="">[98]</span></a></sup><span data-dcnode-id="7074" instrument_node=""> Furthermore, Murensky (2000) states it is difficult to create objective measures of emotional intelligence and demonstrate its influence on leadership as many scales are self-report measures.</span><sup class="reference" data-dcnode-id="7071" id="cite_ref-99"><a data-dcnode-id="7072" href="#cite_note-99"><span data-dcnode-id="7073" instrument_node="">[99]</span></a></sup><span data-dcnode-id="7070" instrument_node="">
</span></p><p data-dcnode-id="7043"><span data-dcnode-id="7068" instrument_node="">In a 2009 academic exchange, </span><a data-dcnode-id="7066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Antonakis" title="John Antonakis"><span data-dcnode-id="7067" instrument_node="">John Antonakis</span></a><span data-dcnode-id="7065" instrument_node=""> and Ashkanasy/Dasborough mostly agreed that researchers testing whether EI matters for leadership have not done so using robust research designs; therefore, currently there is no strong evidence showing that EI predicts leadership outcomes when accounting for personality and IQ.</span><sup class="reference" data-dcnode-id="7062" id="cite_ref-100"><a data-dcnode-id="7063" href="#cite_note-100"><span data-dcnode-id="7064" instrument_node="">[100]</span></a></sup><span data-dcnode-id="7061" instrument_node=""> Antonakis argued that EI might not be needed for leadership effectiveness (he referred to this as the "curse of emotion" phenomenon, because leaders who are too sensitive to their and others' emotional states might have difficulty making decisions that would result in </span><a data-dcnode-id="7059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emotional_labor" title="Emotional labor"><span data-dcnode-id="7060" instrument_node="">emotional labor</span></a><span data-dcnode-id="7058" instrument_node=""> for the leader or followers). A 2010 meta-analysis seems to support the Antonakis position: In fact, Harms and Credé found that overall (and using data free from problems of common source and common methods), EI measures correlated only </span><a class="mw-redirect" data-dcnode-id="7056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pearson_product-moment_correlation_coefficient" title="Pearson product-moment correlation coefficient"><span data-dcnode-id="7057" instrument_node="">ρ</span></a><span data-dcnode-id="7055" instrument_node=""> = 0.11 with measures of </span><a data-dcnode-id="7053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transformational_leadership" title="Transformational leadership"><span data-dcnode-id="7054" instrument_node="">transformational leadership</span></a><span data-dcnode-id="7052" instrument_node="">.</span><sup class="reference" data-dcnode-id="7049" id="cite_ref-101"><a data-dcnode-id="7050" href="#cite_note-101"><span data-dcnode-id="7051" instrument_node="">[101]</span></a></sup><span data-dcnode-id="7048" instrument_node=""> Barling, Slater, and Kelloway (2000) also support Harms and Crede's position on transformational leadership.</span><sup class="reference" data-dcnode-id="7045" id="cite_ref-Barling_2000_102-0"><a data-dcnode-id="7046" href="#cite_note-Barling_2000-102"><span data-dcnode-id="7047" instrument_node="">[102]</span></a></sup><span data-dcnode-id="7044" instrument_node="">
</span></p><p data-dcnode-id="7020"><span data-dcnode-id="7042" instrument_node="">Ability-measures of EI fared worst (i.e., </span><a class="mw-redirect" data-dcnode-id="7040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pearson_product-moment_correlation_coefficient" title="Pearson product-moment correlation coefficient"><span data-dcnode-id="7041" instrument_node="">ρ</span></a><span data-dcnode-id="7039" instrument_node=""> = 0.04); the WLEIS (Wong-Law measure) did a bit better (ρ = 0.08), and the </span><a data-dcnode-id="7037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reuven_Bar-On" title="Reuven Bar-On"><span data-dcnode-id="7038" instrument_node="">Bar-On</span></a><sup class="reference" data-dcnode-id="7034" id="cite_ref-baron06_103-0"><a data-dcnode-id="7035" href="#cite_note-baron06-103"><span data-dcnode-id="7036" instrument_node="">[103]</span></a></sup><span data-dcnode-id="7033" instrument_node=""> measure slightly better (ρ = 0.18). However, the validity of these estimates does not include the effects of IQ or the big five personality, which correlate both with EI measures and leadership.</span><sup class="reference" data-dcnode-id="7030" id="cite_ref-leadership_ei_104-0"><a data-dcnode-id="7031" href="#cite_note-leadership_ei-104"><span data-dcnode-id="7032" instrument_node="">[104]</span></a></sup><span data-dcnode-id="7029" instrument_node=""> In a subsequent paper analyzing the impact of EI on both job performance and leadership, Harms and Credé</span><sup class="reference" data-dcnode-id="7026" id="cite_ref-105"><a data-dcnode-id="7027" href="#cite_note-105"><span data-dcnode-id="7028" instrument_node="">[105]</span></a></sup><span data-dcnode-id="7025" instrument_node=""> found that the meta-analytic validity estimates for EI dropped to zero when Big Five traits and IQ were controlled for. Joseph and Newman meta-analytically showed the same result for Ability EI.</span><sup class="reference" data-dcnode-id="7022" id="cite_ref-ReferenceB_12-3"><a data-dcnode-id="7023" href="#cite_note-ReferenceB-12"><span data-dcnode-id="7024" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7021" instrument_node="">
</span></p><p data-dcnode-id="7006"><span data-dcnode-id="7019" instrument_node="">However, self-reported and Trait EI measures retain a fair amount of predictive validity for job performance after controlling Big Five traits and IQ.</span><sup class="reference" data-dcnode-id="7016" id="cite_ref-ReferenceB_12-4"><a data-dcnode-id="7017" href="#cite_note-ReferenceB-12"><span data-dcnode-id="7018" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7015" instrument_node=""> Newman, Joseph, and MacCann</span><sup class="reference" data-dcnode-id="7012" id="cite_ref-106"><a data-dcnode-id="7013" href="#cite_note-106"><span data-dcnode-id="7014" instrument_node="">[106]</span></a></sup><span data-dcnode-id="7011" instrument_node=""> contend that the greater predictive validity of Trait EI measures is due to their inclusion of content related to achievement motivation, self efficacy, and self-rated performance. Meta-analytic evidence confirms that self-reported emotional intelligence predicting job performance is due to mixed EI and trait EI measures' tapping into self-efficacy and self-rated performance, in addition to the domains of Neuroticism, Extraversion, Conscientiousness, and IQ. As such, the predictive ability of mixed EI to job performance drops to nil when controlling for these factors.</span><sup class="reference" data-dcnode-id="7008" id="cite_ref-ReferenceC_14-5"><a data-dcnode-id="7009" href="#cite_note-ReferenceC-14"><span data-dcnode-id="7010" instrument_node="">[14]</span></a></sup><span data-dcnode-id="7007" instrument_node="">
</span></p><p data-dcnode-id="6996"><span data-dcnode-id="7005" instrument_node="">Rosete and Ciarrochi (2005) also explored the predictive ability of EI and job performance.</span><sup class="reference" data-dcnode-id="7002" id="cite_ref-107"><a data-dcnode-id="7003" href="#cite_note-107"><span data-dcnode-id="7004" instrument_node="">[107]</span></a></sup><span data-dcnode-id="7001" instrument_node=""> They concluded that higher EI was associated with higher leadership effectiveness regarding achievement of organizational goals. Their study shows EI may serve an identifying tool in understanding who is (or is not) likely to deal effectively with colleagues. Furthermore, there exists the ability to develop and enhance leadership qualities through the advancement of one's emotional intelligence. Groves, McEnrue, and Shen (2008) found EI can be deliberately developed, specifically facilitating thinking with emotions (FT) and monitoring and regulation of emotions (RE) in the workplace.</span><sup class="reference" data-dcnode-id="6998" id="cite_ref-108"><a data-dcnode-id="6999" href="#cite_note-108"><span data-dcnode-id="7000" instrument_node="">[108]</span></a></sup><span data-dcnode-id="6997" instrument_node="">
</span></p><span data-dcnode-id="6995" instrument_node="">
</span><h3 data-dcnode-id="6985"><span class="mw-headline" data-dcnode-id="6993" id="Correlations_with_personality"><span data-dcnode-id="6994" instrument_node="">Correlations with personality</span></span><span class="mw-editsection" data-dcnode-id="6986"><span class="mw-editsection-bracket" data-dcnode-id="6991"><span data-dcnode-id="6992" instrument_node="">[</span></span><a data-dcnode-id="6989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D20" title="Edit section: Correlations with personality"><span data-dcnode-id="6990" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6987"><span data-dcnode-id="6988" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6984" instrument_node="">
</span><p data-dcnode-id="6963"><span data-dcnode-id="6983" instrument_node="">Similarly, other researchers have raised concerns about the extent to which self-report EI measures </span><a data-dcnode-id="6981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Correlation" title="Correlation"><span data-dcnode-id="6982" instrument_node="">correlate</span></a><span data-dcnode-id="6980" instrument_node=""> with established personality dimensions. Generally, self-report EI measures and personality measures have been said to converge because they both purport to measure personality traits.</span><sup class="reference" data-dcnode-id="6977" id="cite_ref-petrides07_50-3"><a data-dcnode-id="6978" href="#cite_note-petrides07-50"><span data-dcnode-id="6979" instrument_node="">[50]</span></a></sup><span data-dcnode-id="6976" instrument_node=""> Specifically, there appear to be two dimensions of the </span><a data-dcnode-id="6974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big_Five_personality_traits" title="Big Five personality traits"><span data-dcnode-id="6975" instrument_node="">Big Five</span></a><span data-dcnode-id="6973" instrument_node=""> that stand out as most related to self-report EI&nbsp;– </span><a data-dcnode-id="6971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neuroticism" title="Neuroticism"><span data-dcnode-id="6972" instrument_node="">neuroticism</span></a><span data-dcnode-id="6970" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extraversion" title="Extraversion"><span data-dcnode-id="6969" instrument_node="">extraversion</span></a><span data-dcnode-id="6967" instrument_node="">. In particular, neuroticism has been said to relate to negative emotionality and </span><a class="mw-redirect" data-dcnode-id="6965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anxiety_%28mood%29" title="Anxiety (mood)"><span data-dcnode-id="6966" instrument_node="">anxiety</span></a><span data-dcnode-id="6964" instrument_node="">. Consistently, individuals scoring high on neuroticism are likely to score low on self-report EI measures.
</span></p><p data-dcnode-id="6949"><span data-dcnode-id="6962" instrument_node="">Studies have examined the multivariate effects of personality and intelligence on EI and also attempted to correct estimates for measurement error. For example, a study by Schulte, Ree, Carretta (2004),</span><sup class="reference" data-dcnode-id="6959" id="cite_ref-109"><a data-dcnode-id="6960" href="#cite_note-109"><span data-dcnode-id="6961" instrument_node="">[109]</span></a></sup><span data-dcnode-id="6958" instrument_node=""> showed that general intelligence (measured with the Wonderlic Personnel Test), agreeableness (measured by the NEO-PI), as well as gender could reliably be used to predict the measure of EI ability. They gave a multiple correlation (R) of .81 with the MSCEIT (perfect prediction would be 1). This result has been replicated by Fiori and Antonakis (2011),;</span><sup class="reference" data-dcnode-id="6955" id="cite_ref-110"><a data-dcnode-id="6956" href="#cite_note-110"><span data-dcnode-id="6957" instrument_node="">[110]</span></a></sup><span data-dcnode-id="6954" instrument_node=""> they found a multiple R of .76 using Cattell's "Culture Fair" intelligence test and the Big Five Inventory (BFI); significant covariates were intelligence (standardized beta = .39), agreeableness (standardized beta = .54), and openness (standardized beta = .46). Antonakis and Dietz (2011a),</span><sup class="reference" data-dcnode-id="6951" id="cite_ref-111"><a data-dcnode-id="6952" href="#cite_note-111"><span data-dcnode-id="6953" instrument_node="">[111]</span></a></sup><span data-dcnode-id="6950" instrument_node=""> who investigated the Ability Emotional Intelligence Measure found similar results (Multiple R = .69), with significant predictors being intelligence, standardized beta = .69 (using the Swaps Test and a Wechsler scales subtest, the 40-item General Knowledge Task) and empathy, standardized beta = .26 (using the Questionnaire Measure of Empathic Tendency). Antonakis and Dietz (2011b) also show how including or excluding important controls variables can fundamentally change results.
</span></p><p data-dcnode-id="6937"><span data-dcnode-id="6948" instrument_node="">Interpretations of the correlations between EI questionnaires and personality have been varied, but a prominent view in the scientific literature is the Trait EI view, which re-interprets EI as a collection of personality traits.</span><sup class="reference" data-dcnode-id="6945" id="cite_ref-Mikolajczak07_54-1"><a data-dcnode-id="6946" href="#cite_note-Mikolajczak07-54"><span data-dcnode-id="6947" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="6942" id="cite_ref-Smith08_112-0"><a data-dcnode-id="6943" href="#cite_note-Smith08-112"><span data-dcnode-id="6944" instrument_node="">[112]</span></a></sup><sup class="reference" data-dcnode-id="6939" id="cite_ref-Austin08_113-0"><a data-dcnode-id="6940" href="#cite_note-Austin08-113"><span data-dcnode-id="6941" instrument_node="">[113]</span></a></sup><span data-dcnode-id="6938" instrument_node="">
</span></p><p data-dcnode-id="6927"><span data-dcnode-id="6936" instrument_node="">A 2011 meta-analysis classified EI studies into three streams: "(1) ability‐based models that use objective test items; (2) self‐report or peer‐report measures based on the four‐branch model of EI; and (3) "mixed models" of emotional competencies." It found that these "three streams have corrected correlations ranging from 0.24 to 0.30 with job performance. The three streams correlated differently with cognitive ability and with neuroticism, extraversion, openness, agreeableness, and conscientiousness. Streams 2 and 3 have the largest incremental validity beyond cognitive ability and the Five Factor Model (FFM)." The meta-analysis concluded that "all three streams of EI exhibited substantial relative importance in the presence of FFM and intelligence when predicting job performance."</span><sup class="reference" data-dcnode-id="6933" id="cite_ref-:0_13-2"><a data-dcnode-id="6934" href="#cite_note-:0-13"><span data-dcnode-id="6935" instrument_node="">[13]</span></a></sup><span data-dcnode-id="6932" instrument_node=""> A follow-up meta-analysis in 2015 further substantiated these findings, and addressed concerns about "the questionable construct validity of mixed EI measures" by arguing that "mixed EI instruments assess a combination of ability EI and self-perceptions, in addition to personality and cognitive ability."</span><sup class="reference" data-dcnode-id="6929" id="cite_ref-ReferenceC_14-6"><a data-dcnode-id="6930" href="#cite_note-ReferenceC-14"><span data-dcnode-id="6931" instrument_node="">[14]</span></a></sup><span data-dcnode-id="6928" instrument_node="">
</span></p><p data-dcnode-id="6908"><span data-dcnode-id="6926" instrument_node="">A 2017 </span><a data-dcnode-id="6924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Meta-analysis" title="Meta-analysis"><span data-dcnode-id="6925" instrument_node="">meta-analysis</span></a><span data-dcnode-id="6923" instrument_node=""> of 142 data sources found that a very large overlap between the </span><a data-dcnode-id="6921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hierarchical_structure_of_the_Big_Five" title="Hierarchical structure of the Big Five"><span data-dcnode-id="6922" instrument_node="">general factor of personality</span></a><span data-dcnode-id="6920" instrument_node=""> and trait EI. The overlap was so large they concluded that "The findings suggest that the </span><a data-dcnode-id="6918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hierarchical_structure_of_the_Big_Five" title="Hierarchical structure of the Big Five"><span data-dcnode-id="6919" instrument_node="">general factor of personality</span></a><span data-dcnode-id="6917" instrument_node=""> is very similar, perhaps even synonymous, to trait IE."</span><sup class="reference" data-dcnode-id="6914" id="cite_ref-:5_114-0"><a data-dcnode-id="6915" href="#cite_note-:5-114"><span data-dcnode-id="6916" instrument_node="">[114]</span></a></sup><span data-dcnode-id="6913" instrument_node=""> However, the overlap between the general factor of personality and ability EI was more moderate, with a correlation of about 0.28.</span><sup class="reference" data-dcnode-id="6910" id="cite_ref-:5_114-1"><a data-dcnode-id="6911" href="#cite_note-:5-114"><span data-dcnode-id="6912" instrument_node="">[114]</span></a></sup><span data-dcnode-id="6909" instrument_node="">
</span></p><p data-dcnode-id="6887"><span data-dcnode-id="6907" instrument_node="">In 2021, two separate review papers examined the relationship between emotional intelligence and the </span><a data-dcnode-id="6905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dark_triad" title="Dark triad"><span data-dcnode-id="6906" instrument_node="">dark triad</span></a><span data-dcnode-id="6904" instrument_node=""> of personality traits (</span><a data-dcnode-id="6902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Narcissism" title="Narcissism"><span data-dcnode-id="6903" instrument_node="">narcissism</span></a><span data-dcnode-id="6901" instrument_node="">, </span><a data-dcnode-id="6899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Machiavellianism_%28psychology%29" title="Machiavellianism (psychology)"><span data-dcnode-id="6900" instrument_node="">Machiavellianism</span></a><span data-dcnode-id="6898" instrument_node="">, and </span><a data-dcnode-id="6896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychopathy" title="Psychopathy"><span data-dcnode-id="6897" instrument_node="">psychopathy</span></a><span data-dcnode-id="6895" instrument_node="">).</span><sup class="reference" data-dcnode-id="6892" id="cite_ref-115"><a data-dcnode-id="6893" href="#cite_note-115"><span data-dcnode-id="6894" instrument_node="">[115]</span></a></sup><sup class="reference" data-dcnode-id="6889" id="cite_ref-116"><a data-dcnode-id="6890" href="#cite_note-116"><span data-dcnode-id="6891" instrument_node="">[116]</span></a></sup><span data-dcnode-id="6888" instrument_node=""> This research found that emotional intelligence showed negative associations with all three dark triad domains of personality. Of the four ability branches of emotional intelligence, the largest effects were for emotion management (versus emotion perception, use, or understanding) and for psychopathy (versus narcissism or Machiavellianism). The two different facets of narcissism showed different relationships with emotional intelligence. Vulnerable narcissism (characterized by anxiety and fragile self-esteem) was associated with lower emotional intelligence. However, grandiose narcissism (characterized by self-confidence, dominance and an inflated sense of ego) related to higher levels of emotional intelligence. This indicates that not all 'dark' personalities lack emotional intelligence.
</span></p><p data-dcnode-id="6881"><span data-dcnode-id="6886" instrument_node="">A 2021 meta-analysis showed that emotional intelligence was positively associated with secure attachment in adults, but negatively associated with insecure attachment styles such as anxious attachment and avoidant attachment.</span><sup class="reference" data-dcnode-id="6883" id="cite_ref-117"><a data-dcnode-id="6884" href="#cite_note-117"><span data-dcnode-id="6885" instrument_node="">[117]</span></a></sup><span data-dcnode-id="6882" instrument_node=""> The associations with anxious attachment and avoidant attachment were significant for both ability EI and for rating scales of EI. However, only rating scales of EI showed a significantly positive association with secure attachment. The authors suggest that the early development of attachment styles may facilitate (or hinder) the development of emotional abilities and traits involved in EI.
</span></p><span data-dcnode-id="6880" instrument_node="">
</span><h3 data-dcnode-id="6870"><span class="mw-headline" data-dcnode-id="6878" id="Socially_desirable_responding"><span data-dcnode-id="6879" instrument_node="">Socially desirable responding</span></span><span class="mw-editsection" data-dcnode-id="6871"><span class="mw-editsection-bracket" data-dcnode-id="6876"><span data-dcnode-id="6877" instrument_node="">[</span></span><a data-dcnode-id="6874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D21" title="Edit section: Socially desirable responding"><span data-dcnode-id="6875" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6872"><span data-dcnode-id="6873" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6869" instrument_node="">
</span><p data-dcnode-id="6859"><span data-dcnode-id="6868" instrument_node="">Socially desirable responding (SDR), or "faking good", is defined as a response pattern in which test-takers systematically represent themselves with an excessive positive bias (Paulhus, 2002). This bias has long been known to contaminate responses on personality inventories (Holtgraves, 2004; McFarland &amp; Ryan, 2000; Peebles &amp; Moore, 1998; Nichols &amp; Greene, 1997; Zerbe &amp; Paulhus, 1987), acting as a mediator of the relationships between self-report measures (Nichols &amp; Greene, 1997; Gangster et al., 1983).</span><sup class="noprint Inline-Template" data-dcnode-id="6861" style="white-space:nowrap;"><span data-dcnode-id="6867" instrument_node="">[</span><i data-dcnode-id="6863"><a data-dcnode-id="6864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources%23What_information_to_include" title="Wikipedia:Citing sources"><span data-dcnode-id="6865" title="A complete citation is needed. (July 2012)"><span data-dcnode-id="6866" instrument_node="">full citation needed</span></span></a></i><span data-dcnode-id="6862" instrument_node="">]</span></sup><span data-dcnode-id="6860" instrument_node="">
</span></p><p data-dcnode-id="6857"><span data-dcnode-id="6858" instrument_node="">It has been suggested that responding in a desirable way is a response set, which is a situational and temporary response pattern (Pauls &amp; Crost, 2004; Paulhus, 1991). This is contrasted with a response style, which is a more long-term trait-like quality. Considering the contexts some self-report EI inventories are used in (e.g., employment settings), the problems of response sets in high-stakes scenarios become clear (Paulhus &amp; Reid, 2001).
</span></p><p data-dcnode-id="6855"><span data-dcnode-id="6856" instrument_node="">There are a few methods to prevent socially desirable responding on behavior inventories. Some researchers believe it is necessary to warn test-takers not to fake good before taking a personality test (e.g., McFarland, 2003). Some inventories use validity scales in order to determine the likelihood or consistency of the responses across all items.
</span></p><span data-dcnode-id="6854" instrument_node="">
</span><h3 data-dcnode-id="6844"><span class="mw-headline" data-dcnode-id="6852" id="EI_as_behavior_rather_than_intelligence"><span data-dcnode-id="6853" instrument_node="">EI as behavior rather than intelligence</span></span><span class="mw-editsection" data-dcnode-id="6845"><span class="mw-editsection-bracket" data-dcnode-id="6850"><span data-dcnode-id="6851" instrument_node="">[</span></span><a data-dcnode-id="6848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D22" title="Edit section: EI as behavior rather than intelligence"><span data-dcnode-id="6849" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6846"><span data-dcnode-id="6847" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6843" instrument_node="">
</span><p data-dcnode-id="6834"><span data-dcnode-id="6842" instrument_node="">Goleman's early work has been criticized for assuming from the beginning that EI is a type of intelligence or </span><a class="mw-redirect" data-dcnode-id="6840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_ability" title="Cognitive ability"><span data-dcnode-id="6841" instrument_node="">cognitive ability</span></a><span data-dcnode-id="6839" instrument_node="">. Eysenck (2000)</span><sup class="reference" data-dcnode-id="6836" id="cite_ref-auto_118-0"><a data-dcnode-id="6837" href="#cite_note-auto-118"><span data-dcnode-id="6838" instrument_node="">[118]</span></a></sup><span data-dcnode-id="6835" instrument_node=""> writes that Goleman's description of EI contains unsubstantiated assumptions about intelligence in general and that it even runs contrary to what researchers have come to expect when studying types of intelligence:
</span></p><span data-dcnode-id="6833" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="6828"><p data-dcnode-id="6829"><span data-dcnode-id="6830" instrument_node="">"[Goleman] exemplifies more clearly than most the fundamental absurdity of the tendency to class almost any type of behavior as an 'intelligence'... If these five 'abilities' define 'emotional intelligence', we would expect some evidence that they are highly correlated; Goleman admits that they might be quite uncorrelated, and in any case, if we cannot measure them, how do we know they are related? So the whole theory is built on quicksand: there is no sound scientific basis."</span></p></blockquote><span data-dcnode-id="6827" instrument_node="">
</span><p data-dcnode-id="6818"><span data-dcnode-id="6826" instrument_node="">Similarly, Locke (2005)</span><sup class="reference" data-dcnode-id="6823" id="cite_ref-locke_119-0"><a data-dcnode-id="6824" href="#cite_note-locke-119"><span data-dcnode-id="6825" instrument_node="">[119]</span></a></sup><span data-dcnode-id="6822" instrument_node=""> claims that the concept of EI is in itself a misinterpretation of the intelligence construct, and he offers an alternative interpretation: it is not another form or type of intelligence, but intelligence—the ability to grasp </span><a class="mw-redirect" data-dcnode-id="6820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abstractions" title="Abstractions"><span data-dcnode-id="6821" instrument_node="">abstractions</span></a><span data-dcnode-id="6819" instrument_node="">—applied to a particular life domain: emotions. He suggests the concept should be re-labeled and referred to as a skill.
</span></p><p data-dcnode-id="6809"><span data-dcnode-id="6817" instrument_node="">The essence of this criticism is that scientific inquiry depends on valid and consistent construct utilization and that before the introduction of the term EI, psychologists had established theoretical distinctions between factors such as abilities and achievements, skills and habits, attitudes and values, and personality traits and emotional states.</span><sup class="reference" data-dcnode-id="6814" id="cite_ref-everydaypsychology_120-0"><a data-dcnode-id="6815" href="#cite_note-everydaypsychology-120"><span data-dcnode-id="6816" instrument_node="">[120]</span></a></sup><span data-dcnode-id="6813" instrument_node=""> Thus, some scholars believe that the term </span><i data-dcnode-id="6811"><span data-dcnode-id="6812" instrument_node="">EI</span></i><span data-dcnode-id="6810" instrument_node=""> merges and conflates such accepted concepts and definitions.
</span></p><span data-dcnode-id="6808" instrument_node="">
</span><h3 data-dcnode-id="6798"><span class="mw-headline" data-dcnode-id="6806" id="EI_as_skill_rather_than_moral_quality"><span data-dcnode-id="6807" instrument_node="">EI as skill rather than moral quality</span></span><span class="mw-editsection" data-dcnode-id="6799"><span class="mw-editsection-bracket" data-dcnode-id="6804"><span data-dcnode-id="6805" instrument_node="">[</span></span><a data-dcnode-id="6802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D23" title="Edit section: EI as skill rather than moral quality"><span data-dcnode-id="6803" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6800"><span data-dcnode-id="6801" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6797" instrument_node="">
</span><p data-dcnode-id="6785"><a data-dcnode-id="6795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adam_Grant" title="Adam Grant"><span data-dcnode-id="6796" instrument_node="">Adam Grant</span></a><span data-dcnode-id="6794" instrument_node=""> warned of the common but mistaken perception of EI as a desirable moral quality rather than a skill.</span><sup class="reference" data-dcnode-id="6791" id="cite_ref-TheAtlantic20140102_121-0"><a data-dcnode-id="6792" href="#cite_note-TheAtlantic20140102-121"><span data-dcnode-id="6793" instrument_node="">[121]</span></a></sup><span data-dcnode-id="6790" instrument_node=""> Grant asserted that a well-developed EI is not only an instrumental tool for accomplishing goals, but can function as a weapon for manipulating others by robbing them of their capacity to reason.</span><sup class="reference" data-dcnode-id="6787" id="cite_ref-TheAtlantic20140102_121-1"><a data-dcnode-id="6788" href="#cite_note-TheAtlantic20140102-121"><span data-dcnode-id="6789" instrument_node="">[121]</span></a></sup><span data-dcnode-id="6786" instrument_node="">
</span></p><span data-dcnode-id="6784" instrument_node="">
</span><h3 data-dcnode-id="6774"><span class="mw-headline" data-dcnode-id="6782" id="EI_as_a_measure_of_conformity"><span data-dcnode-id="6783" instrument_node="">EI as a measure of conformity</span></span><span class="mw-editsection" data-dcnode-id="6775"><span class="mw-editsection-bracket" data-dcnode-id="6780"><span data-dcnode-id="6781" instrument_node="">[</span></span><a data-dcnode-id="6778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEmotional_intelligence%26action%3Dedit%26section%3D24" title="Edit section: EI as a measure of conformity"><span data-dcnode-id="6779" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6776"><span data-dcnode-id="6777" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6773" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6752"><div class="thumbinner" data-dcnode-id="6753" style="width:222px;"><a class="image" data-dcnode-id="6771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATom_Reed_speaks_at_NAVAIR%25E2%2580%2599s_%25E2%2580%259CMentoring_at_the_Speed_of_Life%25E2%2580%259D_event.jpg"><img alt="" class="thumbimage" data-dcnode-id="6772" data-file-height="1200" data-file-width="1800" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f8/Tom_Reed_speaks_at_NAVAIR%25E2%2580%2599s_%25E2%2580%259CMentoring_at_the_Speed_of_Life%25E2%2580%259D_event.jpg/220px-Tom_Reed_speaks_at_NAVAIR%25E2%2580%2599s_%25E2%2580%259CMentoring_at_the_Speed_of_Life%25E2%2580%259D_event.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f8/Tom_Reed_speaks_at_NAVAIR%E2%80%99s_%E2%80%9CMentoring_at_the_Speed_of_Life%E2%80%9D_event.jpg/330px-Tom_Reed_speaks_at_NAVAIR%E2%80%99s_%E2%80%9CMentoring_at_the_Speed_of_Life%E2%80%9D_event.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f8/Tom_Reed_speaks_at_NAVAIR%E2%80%99s_%E2%80%9CMentoring_at_the_Speed_of_Life%E2%80%9D_event.jpg/440px-Tom_Reed_speaks_at_NAVAIR%E2%80%99s_%E2%80%9CMentoring_at_the_Speed_of_Life%E2%80%9D_event.jpg 2x" width="220"></a><span data-dcnode-id="6770" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6754"><div class="magnify" data-dcnode-id="6768"><a class="internal" data-dcnode-id="6769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATom_Reed_speaks_at_NAVAIR%25E2%2580%2599s_%25E2%2580%259CMentoring_at_the_Speed_of_Life%25E2%2580%259D_event.jpg" title="Enlarge"></a></div><span data-dcnode-id="6767" instrument_node="">Tom Reed describes four stages of emotional intelligence: </span><a data-dcnode-id="6765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-awareness" title="Self-awareness"><span data-dcnode-id="6766" instrument_node="">self-awareness</span></a><span data-dcnode-id="6764" instrument_node="">, </span><a data-dcnode-id="6762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_consciousness" title="Social consciousness"><span data-dcnode-id="6763" instrument_node="">social consciousness</span></a><span data-dcnode-id="6761" instrument_node="">, </span><a data-dcnode-id="6759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-care" title="Self-care"><span data-dcnode-id="6760" instrument_node="">self-care</span></a><span data-dcnode-id="6758" instrument_node=""> and relationship management, as part of </span><a class="mw-redirect" data-dcnode-id="6756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NAVAIR" title="NAVAIR"><span data-dcnode-id="6757" instrument_node="">NAVAIR</span></a><span data-dcnode-id="6755" instrument_node="">'s "Mentoring at the Speed of Life" event</span></div></div></div><p data-dcnode-id="6746"><span data-dcnode-id="6751" instrument_node="">One criticism of the works of Mayer and Salovey comes from a study by Roberts et al. (2001),</span><sup class="reference" data-dcnode-id="6748" id="cite_ref-122"><a data-dcnode-id="6749" href="#cite_note-122"><span data-dcnode-id="6750" instrument_node="">[122]</span></a></sup><span data-dcnode-id="6747" instrument_node=""> which suggests that the EI, as measured by the MSCEIT, may only be measuring conformity. This argument is rooted in the MSCEIT's use of consensus-based assessment, and in the fact that scores on the MSCEIT are negatively distributed (meaning that its scores differentiate between people with low EI better than people with high EI).
