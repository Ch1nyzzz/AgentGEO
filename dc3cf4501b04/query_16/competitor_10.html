</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="3748" id="firstHeading"><span data-dcnode-id="3749" instrument_node="">Optimism bias</span></h1><span data-dcnode-id="3747" instrument_node="">
</span><div class="vector-body" data-dcnode-id="462" id="bodyContent"><span data-dcnode-id="3746" instrument_node="">
</span><div class="noprint" data-dcnode-id="3744" id="siteSub"><span data-dcnode-id="3745" instrument_node="">From Wikipedia, the free encyclopedia</span></div><span data-dcnode-id="3743" instrument_node="">
</span><div data-dcnode-id="3742" id="contentSub"></div><span data-dcnode-id="3741" instrument_node="">
</span><div data-dcnode-id="3740" id="contentSub2"></div><span data-dcnode-id="3739" instrument_node="">
</span><div data-dcnode-id="3738" id="jump-to-nav"></div><span data-dcnode-id="3737" instrument_node="">
</span><a class="mw-jump-link" data-dcnode-id="3735" href="#mw-head"><span data-dcnode-id="3736" instrument_node="">Jump to navigation</span></a><span data-dcnode-id="3734" instrument_node="">
</span><a class="mw-jump-link" data-dcnode-id="3732" href="#searchInput"><span data-dcnode-id="3733" instrument_node="">Jump to search</span></a><span data-dcnode-id="3731" instrument_node="">
</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="486" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="495"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="3729" style="display:none"><span data-dcnode-id="3730" instrument_node="">Type of cognitive bias</span></div><span data-dcnode-id="3728" instrument_node="">
</span><p data-dcnode-id="3712"><b data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">Optimism bias</span></b><span data-dcnode-id="3725" instrument_node=""> (or the </span><b data-dcnode-id="3723"><span data-dcnode-id="3724" instrument_node="">optimistic bias</span></b><span data-dcnode-id="3722" instrument_node="">) is a </span><a data-dcnode-id="3720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_bias" title="Cognitive bias"><span data-dcnode-id="3721" instrument_node="">cognitive bias</span></a><span data-dcnode-id="3719" instrument_node=""> that causes someone to believe that they themselves are less likely to experience a negative event. It is also known as </span><b data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">unrealistic optimism</span></b><span data-dcnode-id="3716" instrument_node=""> or </span><b data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">comparative optimism.</span></b><span data-dcnode-id="3713" instrument_node="">
</span></p><p data-dcnode-id="3702"><span data-dcnode-id="3711" instrument_node="">Optimism bias is common and transcends gender, ethnicity, nationality, and age.</span><sup class="reference" data-dcnode-id="3708" id="cite_ref-Neural_1-0"><a data-dcnode-id="3709" href="#cite_note-Neural-1"><span data-dcnode-id="3710" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3707" instrument_node=""> Optimistic biases are even reported in non-human animals such as rats and birds.</span><sup class="reference" data-dcnode-id="3704" id="cite_ref-:1_2-0"><a data-dcnode-id="3705" href="#cite_note-:1-2"><span data-dcnode-id="3706" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3703" instrument_node="">
</span></p><p data-dcnode-id="3684"><span data-dcnode-id="3701" instrument_node="">Four factors can cause a person to be optimistically biased: their desired end state, their cognitive mechanisms, the information they have about themselves versus others, and overall mood.</span><sup class="reference" data-dcnode-id="3698" id="cite_ref-shepperd2002_3-0"><a data-dcnode-id="3699" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3700" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3697" instrument_node=""> The optimistic bias is seen in a number of situations. For example: people believing that they are less at risk of being a crime victim,</span><sup class="reference" data-dcnode-id="3694" id="cite_ref-4"><a data-dcnode-id="3695" href="#cite_note-4"><span data-dcnode-id="3696" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3693" instrument_node=""> smokers believing that they are less likely to contract lung cancer or disease than other smokers, first-time bungee jumpers believing that they are less at risk of an injury than other jumpers,</span><sup class="reference" data-dcnode-id="3690" id="cite_ref-weinstein1996_5-0"><a data-dcnode-id="3691" href="#cite_note-weinstein1996-5"><span data-dcnode-id="3692" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3689" instrument_node=""> or traders who think they are less exposed to potential losses in the markets.</span><sup class="reference" data-dcnode-id="3686" id="cite_ref-6"><a data-dcnode-id="3687" href="#cite_note-6"><span data-dcnode-id="3688" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3685" instrument_node="">
</span></p><p data-dcnode-id="3667"><span data-dcnode-id="3683" instrument_node="">Although the optimism bias occurs for both positive events (such as believing oneself to be more financially successful than others) and negative events (such as being less likely to have a drinking problem), there is more research and evidence suggesting that the bias is stronger for negative events (the </span><b data-dcnode-id="3680"><a class="mw-redirect" data-dcnode-id="3681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Valence_effect" title="Valence effect"><span data-dcnode-id="3682" instrument_node="">valence effect</span></a></b><span data-dcnode-id="3679" instrument_node="">).</span><sup class="reference" data-dcnode-id="3676" id="cite_ref-shepperd2002_3-1"><a data-dcnode-id="3677" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3678" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="3673" id="cite_ref-gouveia2001_7-0"><a data-dcnode-id="3674" href="#cite_note-gouveia2001-7"><span data-dcnode-id="3675" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3672" instrument_node=""> Different consequences result from these two types of events: positive events often lead to feelings of well being and self-esteem, while negative events lead to consequences involving more risk, such as engaging in risky behaviors and not taking precautionary measures for safety.</span><sup class="reference" data-dcnode-id="3669" id="cite_ref-shepperd2002_3-2"><a data-dcnode-id="3670" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3671" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3668" instrument_node="">
</span></p><span data-dcnode-id="3666" instrument_node="">
</span><div aria-labelledby="mw-toc-heading" class="toc" data-dcnode-id="3431" id="toc" role="navigation"><input class="toctogglecheckbox" data-dcnode-id="3665" id="toctogglecheckbox" role="button" style="display:none" type="checkbox"><div class="toctitle" data-dcnode-id="3660" dir="ltr" lang="en"><h2 data-dcnode-id="3663" id="mw-toc-heading"><span data-dcnode-id="3664" instrument_node="">Contents</span></h2><span class="toctogglespan" data-dcnode-id="3661"><label class="toctogglelabel" data-dcnode-id="3662" for="toctogglecheckbox"></label></span></div><span data-dcnode-id="3659" instrument_node="">

</span><h2 data-dcnode-id="3420"><span class="mw-headline" data-dcnode-id="3428" id="Factors"><span data-dcnode-id="3429" instrument_node="">Factors</span></span><span class="mw-editsection" data-dcnode-id="3421"><span class="mw-editsection-bracket" data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">[</span></span><a data-dcnode-id="3424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D1" title="Edit section: Factors"><span data-dcnode-id="3425" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3419" instrument_node="">
</span><p data-dcnode-id="3407"><span data-dcnode-id="3418" instrument_node="">The factors leading to the optimistic bias can be categorized into four different groups: desired end states of comparative judgment, </span><a class="mw-redirect" data-dcnode-id="3416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive" title="Cognitive"><span data-dcnode-id="3417" instrument_node="">cognitive</span></a><span data-dcnode-id="3415" instrument_node=""> mechanisms, information about the self versus a target, and underlying </span><a data-dcnode-id="3413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Affect_%28psychology%29" title="Affect (psychology)"><span data-dcnode-id="3414" instrument_node="">affect</span></a><span data-dcnode-id="3412" instrument_node="">.</span><sup class="reference" data-dcnode-id="3409" id="cite_ref-shepperd2002_3-3"><a data-dcnode-id="3410" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3411" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3408" instrument_node=""> These are explained more in detail below.
</span></p><span data-dcnode-id="3406" instrument_node="">
</span><h3 data-dcnode-id="3396"><span class="mw-headline" data-dcnode-id="3404" id="Measuring"><span data-dcnode-id="3405" instrument_node="">Measuring</span></span><span class="mw-editsection" data-dcnode-id="3397"><span class="mw-editsection-bracket" data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">[</span></span><a data-dcnode-id="3400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D2" title="Edit section: Measuring"><span data-dcnode-id="3401" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3395" instrument_node="">
</span><p data-dcnode-id="3365"><span data-dcnode-id="3394" instrument_node="">Optimism bias is typically measured through two determinants of </span><a data-dcnode-id="3392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Risk" title="Risk"><span data-dcnode-id="3393" instrument_node="">risk</span></a><span data-dcnode-id="3391" instrument_node="">: absolute risk, where individuals are asked to estimate their likelihood of experiencing a negative event compared to their actual chance of experiencing a negative event (comparison against self), and comparative risk, where individuals are asked to estimate the likelihood of experiencing a negative event (their personal risk estimate) compared to others of the same age and sex (a target risk estimate).</span><sup class="reference" data-dcnode-id="3388" id="cite_ref-gouveia2001_7-1"><a data-dcnode-id="3389" href="#cite_note-gouveia2001-7"><span data-dcnode-id="3390" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="3385" id="cite_ref-helweg-larsen2001_8-0"><a data-dcnode-id="3386" href="#cite_note-helweg-larsen2001-8"><span data-dcnode-id="3387" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3384" instrument_node=""> Problems can occur when trying to measure absolute risk because it is extremely difficult to determine the actual risk statistic for a person.</span><sup class="reference" data-dcnode-id="3381" id="cite_ref-helweg-larsen2001_8-1"><a data-dcnode-id="3382" href="#cite_note-helweg-larsen2001-8"><span data-dcnode-id="3383" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="3378" id="cite_ref-klein2002_9-0"><a data-dcnode-id="3379" href="#cite_note-klein2002-9"><span data-dcnode-id="3380" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3377" instrument_node=""> Therefore, the optimistic bias is primarily measured in comparative risk forms, where people compare themselves against others, through direct and indirect comparisons.</span><sup class="reference" data-dcnode-id="3374" id="cite_ref-weinstein1996_5-1"><a data-dcnode-id="3375" href="#cite_note-weinstein1996-5"><span data-dcnode-id="3376" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3373" instrument_node=""> Direct comparisons ask whether an individual's own risk of experiencing an event is less than, greater than, or equal to someone else's risk, while indirect comparisons ask individuals to provide separate estimates of their own risk of experiencing an event and others' risk of experiencing the same event.</span><sup class="reference" data-dcnode-id="3370" id="cite_ref-helweg-larsen2001_8-2"><a data-dcnode-id="3371" href="#cite_note-helweg-larsen2001-8"><span data-dcnode-id="3372" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="3367" id="cite_ref-radcliffe2002_10-0"><a data-dcnode-id="3368" href="#cite_note-radcliffe2002-10"><span data-dcnode-id="3369" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3366" instrument_node="">
</span></p><p data-dcnode-id="3344"><span data-dcnode-id="3364" instrument_node="">After obtaining scores, researchers are able to use the information to determine if there is a difference in the average risk estimate of the individual compared to the average risk estimate of their peers. Generally, in negative events, the mean risk of an individual appears lower than the risk estimate of others.</span><sup class="reference" data-dcnode-id="3361" id="cite_ref-helweg-larsen2001_8-3"><a data-dcnode-id="3362" href="#cite_note-helweg-larsen2001-8"><span data-dcnode-id="3363" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3360" instrument_node=""> This is then used to demonstrate the bias' effect. The optimistic bias can only be defined at a group level, because at an individual level the positive assessment could be true.</span><sup class="reference" data-dcnode-id="3357" id="cite_ref-gouveia2001_7-2"><a data-dcnode-id="3358" href="#cite_note-gouveia2001-7"><span data-dcnode-id="3359" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3356" instrument_node=""> Likewise, difficulties can arise in measurement procedures, as it is difficult to determine when someone is being optimistic, realistic, or pessimistic.</span><sup class="reference" data-dcnode-id="3353" id="cite_ref-helweg-larsen2001_8-4"><a data-dcnode-id="3354" href="#cite_note-helweg-larsen2001-8"><span data-dcnode-id="3355" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="3350" id="cite_ref-radcliffe2002_10-1"><a data-dcnode-id="3351" href="#cite_note-radcliffe2002-10"><span data-dcnode-id="3352" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3349" instrument_node=""> Research suggests that the bias comes from an overestimate of group risks rather than underestimating one's own risk.</span><sup class="reference" data-dcnode-id="3346" id="cite_ref-helweg-larsen2001_8-5"><a data-dcnode-id="3347" href="#cite_note-helweg-larsen2001-8"><span data-dcnode-id="3348" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3345" instrument_node="">
</span></p><p data-dcnode-id="3338"><span data-dcnode-id="3343" instrument_node="">An example: participants assigned a higher probability to picking a card that had a smiling face on its reverse side than one which had a frowning face.</span><sup class="reference" data-dcnode-id="3340" id="cite_ref-11"><a data-dcnode-id="3341" href="#cite_note-11"><span data-dcnode-id="3342" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3339" instrument_node="">
</span></p><span data-dcnode-id="3337" instrument_node="">
</span><h3 data-dcnode-id="3327"><span class="mw-headline" data-dcnode-id="3335" id="Cognitive_mechanisms"><span data-dcnode-id="3336" instrument_node="">Cognitive mechanisms</span></span><span class="mw-editsection" data-dcnode-id="3328"><span class="mw-editsection-bracket" data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">[</span></span><a data-dcnode-id="3331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D3" title="Edit section: Cognitive mechanisms"><span data-dcnode-id="3332" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3326" instrument_node="">
</span><p data-dcnode-id="3320"><span data-dcnode-id="3325" instrument_node="">The optimistic bias is possibly also influenced by three cognitive mechanisms that guide judgments and decision-making processes: the representativeness heuristic, singular target focus, and interpersonal distance.</span><sup class="reference" data-dcnode-id="3322" id="cite_ref-shepperd2002_3-4"><a data-dcnode-id="3323" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3324" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3321" instrument_node="">
</span></p><span data-dcnode-id="3319" instrument_node="">
</span><h4 data-dcnode-id="3309"><span class="mw-headline" data-dcnode-id="3317" id="Representativeness_heuristic"><span data-dcnode-id="3318" instrument_node="">Representativeness heuristic</span></span><span class="mw-editsection" data-dcnode-id="3310"><span class="mw-editsection-bracket" data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">[</span></span><a data-dcnode-id="3313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D4" title="Edit section: Representativeness heuristic"><span data-dcnode-id="3314" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3308" instrument_node="">
</span><p data-dcnode-id="3283"><span data-dcnode-id="3307" instrument_node="">The estimates of likelihood associated with the optimistic bias are based on how closely an event matches a person's overall idea of the specific event.</span><sup class="reference" data-dcnode-id="3304" id="cite_ref-shepperd2002_3-5"><a data-dcnode-id="3305" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3306" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3303" instrument_node=""> Some researchers suggest that the </span><a data-dcnode-id="3301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Representativeness_heuristic" title="Representativeness heuristic"><span data-dcnode-id="3302" instrument_node="">representativeness heuristic</span></a><span data-dcnode-id="3300" instrument_node=""> is a reason for the optimistic bias: individuals tend to think in stereotypical categories rather than about their actual targets when making comparisons.</span><sup class="reference" data-dcnode-id="3297" id="cite_ref-weinstein1980_12-0"><a data-dcnode-id="3298" href="#cite_note-weinstein1980-12"><span data-dcnode-id="3299" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3296" instrument_node=""> For example, when drivers are asked to think about a car accident, they are more likely to associate a bad driver, rather than just the average driver.</span><sup class="reference" data-dcnode-id="3293" id="cite_ref-shepperd2002_3-6"><a data-dcnode-id="3294" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3295" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3292" instrument_node=""> Individuals compare themselves with the negative elements that come to mind, rather than an overall accurate comparison between them and another driver. Additionally, when individuals were asked to compare themselves towards friends, they chose more vulnerable friends based on the events they were looking at.</span><sup class="reference" data-dcnode-id="3289" id="cite_ref-perloff1986_13-0"><a data-dcnode-id="3290" href="#cite_note-perloff1986-13"><span data-dcnode-id="3291" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3288" instrument_node=""> Individuals generally chose a specific friend based on whether they resemble a given example, rather than just an average friend.</span><sup class="reference" data-dcnode-id="3285" id="cite_ref-perloff1986_13-1"><a data-dcnode-id="3286" href="#cite_note-perloff1986-13"><span data-dcnode-id="3287" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3284" instrument_node=""> People find examples that relate directly to what they are asked, resulting in representativeness heuristics.
</span></p><span data-dcnode-id="3282" instrument_node="">
</span><h4 data-dcnode-id="3272"><span class="mw-headline" data-dcnode-id="3280" id="Singular_target_focus"><span data-dcnode-id="3281" instrument_node="">Singular target focus</span></span><span class="mw-editsection" data-dcnode-id="3273"><span class="mw-editsection-bracket" data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">[</span></span><a data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D5" title="Edit section: Singular target focus"><span data-dcnode-id="3277" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3271" instrument_node="">
</span><p data-dcnode-id="3265"><span data-dcnode-id="3270" instrument_node="">One of the difficulties of the optimistic bias is that people know more about themselves than they do about others. While individuals know how to think about themselves as a single person, they still think of others as a generalized group, which leads to biased estimates and inabilities to sufficiently understand their target or comparison group. Likewise, when making judgments and comparisons about their risk compared to others, people generally ignore the average person, but primarily focus on their own feelings and experiences.</span><sup class="reference" data-dcnode-id="3267" id="cite_ref-shepperd2002_3-7"><a data-dcnode-id="3268" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3269" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3266" instrument_node="">
</span></p><span data-dcnode-id="3264" instrument_node="">
</span><h4 data-dcnode-id="3254"><span class="mw-headline" data-dcnode-id="3262" id="Interpersonal_distance"><span data-dcnode-id="3263" instrument_node="">Interpersonal distance</span></span><span class="mw-editsection" data-dcnode-id="3255"><span class="mw-editsection-bracket" data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">[</span></span><a data-dcnode-id="3258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D6" title="Edit section: Interpersonal distance"><span data-dcnode-id="3259" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3253" instrument_node="">
</span><p data-dcnode-id="3231"><span data-dcnode-id="3252" instrument_node="">Perceived risk differences occur depending on how far or close a compared target is to an individual making a risk estimate.</span><sup class="reference" data-dcnode-id="3249" id="cite_ref-shepperd2002_3-8"><a data-dcnode-id="3250" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3251" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3248" instrument_node=""> The greater the perceived distance between the self and the comparison target, the greater the perceived difference in risk. When one brings the comparison target closer to the individual, risk estimates appear closer together than if the comparison target was someone more distant to the participant.</span><sup class="reference" data-dcnode-id="3245" id="cite_ref-shepperd2002_3-9"><a data-dcnode-id="3246" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3247" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3244" instrument_node=""> There is support for perceived social distance in determining the optimistic bias.</span><sup class="reference" data-dcnode-id="3241" id="cite_ref-harris2000_14-0"><a data-dcnode-id="3242" href="#cite_note-harris2000-14"><span data-dcnode-id="3243" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3240" instrument_node=""> Through looking at comparisons of personal and target risk between the in-group level contributes to more perceived similarities than when individuals think about outer-group comparisons which lead to greater perceived differences.</span><sup class="reference" data-dcnode-id="3237" id="cite_ref-harris2000_14-1"><a data-dcnode-id="3238" href="#cite_note-harris2000-14"><span data-dcnode-id="3239" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3236" instrument_node=""> In one study, researchers manipulated the social context of the comparison group, where participants made judgements for two different comparison targets: the typical student at their university and a typical student at another university. Their findings showed that not only did people work with the closer comparison first, but also had closer ratings to themselves than the "more different" group.</span><sup class="reference" data-dcnode-id="3233" id="cite_ref-harris2000_14-2"><a data-dcnode-id="3234" href="#cite_note-harris2000-14"><span data-dcnode-id="3235" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3232" instrument_node="">
</span></p><p data-dcnode-id="3225"><span data-dcnode-id="3230" instrument_node="">Studies have also noticed that people demonstrate more optimistic bias when making comparisons when the other is a vague individual, but biases are reduced when the other is a familiar person, such as a friend or family member. This also is determined due to the information they have about the individuals closest to them, but not having the same information about other people.</span><sup class="reference" data-dcnode-id="3227" id="cite_ref-gouveia2001_7-3"><a data-dcnode-id="3228" href="#cite_note-gouveia2001-7"><span data-dcnode-id="3229" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3226" instrument_node="">
</span></p><span data-dcnode-id="3224" instrument_node="">
</span><h2 data-dcnode-id="3214"><span class="mw-headline" data-dcnode-id="3222" id="Desired_end_states_of_comparative_judgment"><span data-dcnode-id="3223" instrument_node="">Desired end states of comparative judgment</span></span><span class="mw-editsection" data-dcnode-id="3215"><span class="mw-editsection-bracket" data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">[</span></span><a data-dcnode-id="3218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D7" title="Edit section: Desired end states of comparative judgment"><span data-dcnode-id="3219" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3213" instrument_node="">
</span><p data-dcnode-id="3201"><span data-dcnode-id="3212" instrument_node="">Many explanations for the optimistic bias come from the goals that people want and outcomes they wish to see.</span><sup class="reference" data-dcnode-id="3209" id="cite_ref-shepperd2002_3-10"><a data-dcnode-id="3210" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3211" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3208" instrument_node=""> People tend to view their risks as less than others because they believe that this is what other people want to see. These explanations include </span><a data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-enhancement" title="Self-enhancement"><span data-dcnode-id="3207" instrument_node="">self-enhancement</span></a><span data-dcnode-id="3205" instrument_node="">, self-presentation, and </span><a data-dcnode-id="3203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perceived_control" title="Perceived control"><span data-dcnode-id="3204" instrument_node="">perceived control</span></a><span data-dcnode-id="3202" instrument_node="">.
</span></p><span data-dcnode-id="3200" instrument_node="">
</span><h3 data-dcnode-id="3190"><span class="mw-headline" data-dcnode-id="3198" id="Self-enhancement"><span data-dcnode-id="3199" instrument_node="">Self-enhancement</span></span><span class="mw-editsection" data-dcnode-id="3191"><span class="mw-editsection-bracket" data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">[</span></span><a data-dcnode-id="3194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D8" title="Edit section: Self-enhancement"><span data-dcnode-id="3195" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3189" instrument_node="">
</span><p data-dcnode-id="3171"><span data-dcnode-id="3188" instrument_node="">Self-enhancement suggests that optimistic predictions are satisfying and that it feels good to think that positive events will happen.</span><sup class="reference" data-dcnode-id="3185" id="cite_ref-shepperd2002_3-11"><a data-dcnode-id="3186" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3187" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3184" instrument_node=""> People can control their anxiety and other negative emotions if they believe they are better off than others.</span><sup class="reference" data-dcnode-id="3181" id="cite_ref-shepperd2002_3-12"><a data-dcnode-id="3182" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3183" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3180" instrument_node=""> People tend to focus on finding information that supports what they want to see happen, rather than what will happen to them.</span><sup class="reference" data-dcnode-id="3177" id="cite_ref-shepperd2002_3-13"><a data-dcnode-id="3178" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3179" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3176" instrument_node=""> With regards to the optimistic bias, individuals will perceive events more favorably, because that is what they would like the outcome to be. This also suggests that people might lower their risks compared to others to make themselves look better than average: they are less at risk than others and therefore better.</span><sup class="reference" data-dcnode-id="3173" id="cite_ref-shepperd2002_3-14"><a data-dcnode-id="3174" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3175" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3172" instrument_node="">
</span></p><span data-dcnode-id="3170" instrument_node="">
</span><h3 data-dcnode-id="3160"><span class="mw-headline" data-dcnode-id="3168" id="Self-presentation"><span data-dcnode-id="3169" instrument_node="">Self-presentation</span></span><span class="mw-editsection" data-dcnode-id="3161"><span class="mw-editsection-bracket" data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">[</span></span><a data-dcnode-id="3164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D9" title="Edit section: Self-presentation"><span data-dcnode-id="3165" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3159" instrument_node="">
</span><p data-dcnode-id="3149"><span data-dcnode-id="3158" instrument_node="">Studies suggest that people attempt to establish and maintain a desired personal image in social situations. People are motivated to present themselves towards others in a good light, and some researchers suggest that the optimistic bias is a representative of self-presentational processes: people want to appear better off than others. However, this is not through conscious effort. In a study where participants believed their driving skills would be either tested in either real-life or driving simulations, people who believed they were to be tested had less optimistic bias and were more modest about their skills than individuals who would not be tested.</span><sup class="reference" data-dcnode-id="3155" id="cite_ref-15"><a data-dcnode-id="3156" href="#cite_note-15"><span data-dcnode-id="3157" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3154" instrument_node=""> Studies also suggest that individuals who present themselves in a pessimistic and more negative light are generally less accepted by the rest of society.</span><sup class="reference" data-dcnode-id="3151" id="cite_ref-16"><a data-dcnode-id="3152" href="#cite_note-16"><span data-dcnode-id="3153" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3150" instrument_node=""> This might contribute to overly optimistic attitudes.
</span></p><span data-dcnode-id="3148" instrument_node="">
</span><h3 data-dcnode-id="3137"><span data-dcnode-id="3147" id="Personal_control.2Fperceived_control"></span><span class="mw-headline" data-dcnode-id="3145" id="Personal_control/perceived_control"><span data-dcnode-id="3146" instrument_node="">Personal control/perceived control</span></span><span class="mw-editsection" data-dcnode-id="3138"><span class="mw-editsection-bracket" data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">[</span></span><a data-dcnode-id="3141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D10" title="Edit section: Personal control/perceived control"><span data-dcnode-id="3142" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3136" instrument_node="">
</span><p data-dcnode-id="3099"><span data-dcnode-id="3135" instrument_node="">People tend to be more optimistically biased when they believe they have more control over events than others.</span><sup class="reference" data-dcnode-id="3132" id="cite_ref-shepperd2002_3-15"><a data-dcnode-id="3133" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3134" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="3129" id="cite_ref-klein2002_9-1"><a data-dcnode-id="3130" href="#cite_note-klein2002-9"><span data-dcnode-id="3131" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="3126" id="cite_ref-harris1996_17-0"><a data-dcnode-id="3127" href="#cite_note-harris1996-17"><span data-dcnode-id="3128" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3125" instrument_node=""> For example, people are more likely to think that they will not be harmed in a car accident if they are driving the vehicle.</span><sup class="reference" data-dcnode-id="3122" id="cite_ref-harris1996_17-1"><a data-dcnode-id="3123" href="#cite_note-harris1996-17"><span data-dcnode-id="3124" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3121" instrument_node=""> Another example is that if someone believes that they have a lot of control over becoming infected with HIV, they are more likely to view their risk of contracting the disease to be low.</span><sup class="reference" data-dcnode-id="3118" id="cite_ref-helweg-larsen2001_8-6"><a data-dcnode-id="3119" href="#cite_note-helweg-larsen2001-8"><span data-dcnode-id="3120" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3117" instrument_node=""> Studies have suggested that the greater </span><a data-dcnode-id="3115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perceived_control" title="Perceived control"><span data-dcnode-id="3116" instrument_node="">perceived control</span></a><span data-dcnode-id="3114" instrument_node=""> someone has, the greater their optimistic bias.</span><sup class="reference" data-dcnode-id="3111" id="cite_ref-harris1996_17-2"><a data-dcnode-id="3112" href="#cite_note-harris1996-17"><span data-dcnode-id="3113" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="3108" id="cite_ref-weinstein1980_12-1"><a data-dcnode-id="3109" href="#cite_note-weinstein1980-12"><span data-dcnode-id="3110" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3107" instrument_node=""> Stemming from this, control is a stronger factor when it comes to personal risk assessments, but not when assessing others.</span><sup class="reference" data-dcnode-id="3104" id="cite_ref-klein2002_9-2"><a data-dcnode-id="3105" href="#cite_note-klein2002-9"><span data-dcnode-id="3106" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="3101" id="cite_ref-harris1996_17-3"><a data-dcnode-id="3102" href="#cite_note-harris1996-17"><span data-dcnode-id="3103" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3100" instrument_node="">
</span></p><p data-dcnode-id="3078"><span data-dcnode-id="3098" instrument_node="">A meta-analysis reviewing the relationship between the optimistic bias and </span><a data-dcnode-id="3096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perceived_control" title="Perceived control"><span data-dcnode-id="3097" instrument_node="">perceived control</span></a><span data-dcnode-id="3095" instrument_node=""> found that a number of moderators contribute to this relationship.</span><sup class="reference" data-dcnode-id="3092" id="cite_ref-klein2002_9-3"><a data-dcnode-id="3093" href="#cite_note-klein2002-9"><span data-dcnode-id="3094" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3091" instrument_node=""> In previous research, participants from the United States generally had higher levels of optimistic bias relating to perceived control than those of other nationalities. Students also showed larger levels of the optimistic bias than non-students.</span><sup class="reference" data-dcnode-id="3088" id="cite_ref-klein2002_9-4"><a data-dcnode-id="3089" href="#cite_note-klein2002-9"><span data-dcnode-id="3090" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3087" instrument_node=""> The format of the study also demonstrated differences in the relationship between perceived control and the optimistic bias: direct methods of measurement suggested greater perceived control and greater optimistic bias as compared to indirect measures of the bias.</span><sup class="reference" data-dcnode-id="3084" id="cite_ref-klein2002_9-5"><a data-dcnode-id="3085" href="#cite_note-klein2002-9"><span data-dcnode-id="3086" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3083" instrument_node=""> The optimistic bias is strongest in situations where an individual needs to rely heavily on direct action and responsibility of situations.</span><sup class="reference" data-dcnode-id="3080" id="cite_ref-klein2002_9-6"><a data-dcnode-id="3081" href="#cite_note-klein2002-9"><span data-dcnode-id="3082" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3079" instrument_node="">
</span></p><p data-dcnode-id="3058"><span data-dcnode-id="3077" instrument_node="">An opposite factor of </span><a data-dcnode-id="3075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perceived_control" title="Perceived control"><span data-dcnode-id="3076" instrument_node="">perceived control</span></a><span data-dcnode-id="3074" instrument_node=""> is that of prior experience.</span><sup class="reference" data-dcnode-id="3071" id="cite_ref-helweg-larsen2001_8-7"><a data-dcnode-id="3072" href="#cite_note-helweg-larsen2001-8"><span data-dcnode-id="3073" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3070" instrument_node=""> Prior experience is typically associated with less optimistic bias, which some studies suggest is from either a decrease in the perception of personal control, or make it easier for individuals to imagine themselves at risk.</span><sup class="reference" data-dcnode-id="3067" id="cite_ref-helweg-larsen2001_8-8"><a data-dcnode-id="3068" href="#cite_note-helweg-larsen2001-8"><span data-dcnode-id="3069" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="3064" id="cite_ref-weinstein1980_12-2"><a data-dcnode-id="3065" href="#cite_note-weinstein1980-12"><span data-dcnode-id="3066" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3063" instrument_node=""> Prior experience suggests that events may be less controllable than previously believed.</span><sup class="reference" data-dcnode-id="3060" id="cite_ref-helweg-larsen2001_8-9"><a data-dcnode-id="3061" href="#cite_note-helweg-larsen2001-8"><span data-dcnode-id="3062" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3059" instrument_node="">
</span></p><span data-dcnode-id="3057" instrument_node="">
</span><h2 data-dcnode-id="3047"><span class="mw-headline" data-dcnode-id="3055" id="Information_about_self_versus_target"><span data-dcnode-id="3056" instrument_node="">Information about self versus target</span></span><span class="mw-editsection" data-dcnode-id="3048"><span class="mw-editsection-bracket" data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">[</span></span><a data-dcnode-id="3051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D11" title="Edit section: Information about self versus target"><span data-dcnode-id="3052" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3046" instrument_node="">
</span><p data-dcnode-id="3036"><span data-dcnode-id="3045" instrument_node="">Individuals know a lot more about themselves than they do about others.</span><sup class="reference" data-dcnode-id="3042" id="cite_ref-shepperd2002_3-16"><a data-dcnode-id="3043" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3044" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3041" instrument_node=""> Because information about others is less available, information about the self versus others leads people to make specific conclusions about their own risk, but results in them having a harder time making conclusions about the risks of others. This leads to differences in judgments and conclusions about self-risks compared to the risks of others, leading to larger gaps in the optimistic bias.</span><sup class="reference" data-dcnode-id="3038" id="cite_ref-shepperd2002_3-17"><a data-dcnode-id="3039" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3040" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3037" instrument_node="">
</span></p><span data-dcnode-id="3035" instrument_node="">
</span><h3 data-dcnode-id="3025"><span class="mw-headline" data-dcnode-id="3033" id="Person-positivity_bias"><span data-dcnode-id="3034" instrument_node="">Person-positivity bias</span></span><span class="mw-editsection" data-dcnode-id="3026"><span class="mw-editsection-bracket" data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">[</span></span><a data-dcnode-id="3029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D12" title="Edit section: Person-positivity bias"><span data-dcnode-id="3030" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3024" instrument_node="">
</span><p data-dcnode-id="3015"><span data-dcnode-id="3023" instrument_node="">Person-</span><a class="mw-redirect" data-dcnode-id="3021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Positivity_bias" title="Positivity bias"><span data-dcnode-id="3022" instrument_node="">positivity bias</span></a><span data-dcnode-id="3020" instrument_node=""> is the tendency to evaluate an object more favorably the more the object resembles an individual human being. Generally, the more a comparison target resembles a specific person, the more familiar it will be. However, groups of people are considered to be more abstract concepts, which leads to less favorable judgments. With regards to the optimistic bias, when people compare themselves to an average person, whether someone of the same sex or age, the target continues to be viewed as less human and less personified, which will result in less favorable comparisons between the self and others.</span><sup class="reference" data-dcnode-id="3017" id="cite_ref-shepperd2002_3-18"><a data-dcnode-id="3018" href="#cite_note-shepperd2002-3"><span data-dcnode-id="3019" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3016" instrument_node="">
</span></p><span data-dcnode-id="3014" instrument_node="">
</span><h3 data-dcnode-id="3004"><span class="mw-headline" data-dcnode-id="3012" id="Egocentric_thinking"><span data-dcnode-id="3013" instrument_node="">Egocentric thinking</span></span><span class="mw-editsection" data-dcnode-id="3005"><span class="mw-editsection-bracket" data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">[</span></span><a data-dcnode-id="3008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D13" title="Edit section: Egocentric thinking"><span data-dcnode-id="3009" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3003" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="2997" role="note"><span data-dcnode-id="3000" instrument_node="">Main article: </span><a data-dcnode-id="2998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Egotism" title="Egotism"><span data-dcnode-id="2999" instrument_node="">Egotism</span></a></div><span data-dcnode-id="2996" instrument_node="">
</span><p data-dcnode-id="2986"><span data-dcnode-id="2995" instrument_node="">"Egocentric thinking" refers to how individuals know more of their own personal information and risk that they can use to form judgments and make decisions. One difficulty, though, is that people have a large amount of knowledge about themselves, but no knowledge about others. Therefore, when making decisions, people have to use other information available to them, such as population data, in order to learn more about their comparison group.</span><sup class="reference" data-dcnode-id="2992" id="cite_ref-shepperd2002_3-19"><a data-dcnode-id="2993" href="#cite_note-shepperd2002-3"><span data-dcnode-id="2994" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2991" instrument_node=""> This can relate to an optimism bias because while people are using the available information they have about themselves, they have more difficulty understanding correct information about others.</span><sup class="reference" data-dcnode-id="2988" id="cite_ref-shepperd2002_3-20"><a data-dcnode-id="2989" href="#cite_note-shepperd2002-3"><span data-dcnode-id="2990" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2987" instrument_node="">
</span></p><p data-dcnode-id="2980"><span data-dcnode-id="2985" instrument_node="">It is also possible that someone can escape egocentric thinking. In one study, researchers had one group of participants list all factors that influenced their chances of experiencing a variety of events, and then a second group read the list. Those who read the list showed less optimistic bias in their own reports. It's possible that greater knowledge about others and their perceptions of their chances of risk bring the comparison group closer to the participant.</span><sup class="reference" data-dcnode-id="2982" id="cite_ref-weinstein1980_12-3"><a data-dcnode-id="2983" href="#cite_note-weinstein1980-12"><span data-dcnode-id="2984" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2981" instrument_node="">
</span></p><span data-dcnode-id="2979" instrument_node="">
</span><h3 data-dcnode-id="2968"><span data-dcnode-id="2978" id="Underestimating_average_person.27s_control"></span><span class="mw-headline" data-dcnode-id="2976" id="Underestimating_average_person's_control"><span data-dcnode-id="2977" instrument_node="">Underestimating average person's control</span></span><span class="mw-editsection" data-dcnode-id="2969"><span class="mw-editsection-bracket" data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">[</span></span><a data-dcnode-id="2972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D14" title="Edit section: Underestimating average person's control"><span data-dcnode-id="2973" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2967" instrument_node="">
</span><p data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">Also regarding egocentric thinking, it is possible that individuals underestimate the amount of control the average person has. This is explained in two different ways:
</span></p><span data-dcnode-id="2964" instrument_node="">
</span><ol data-dcnode-id="2955"><li data-dcnode-id="2959"><span data-dcnode-id="2963" instrument_node="">People underestimate the control that others have in their lives.</span><sup class="reference" data-dcnode-id="2960" id="cite_ref-weinstein1980_12-4"><a data-dcnode-id="2961" href="#cite_note-weinstein1980-12"><span data-dcnode-id="2962" instrument_node="">[12]</span></a></sup></li><span data-dcnode-id="2958" instrument_node="">
</span><li data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">People completely overlook that others have control over their own outcomes.</span></li></ol><span data-dcnode-id="2954" instrument_node="">
</span><p data-dcnode-id="2948"><span data-dcnode-id="2953" instrument_node="">For example, many smokers believe that they are taking all necessary precautionary measures so that they won't get lung cancer, such as smoking only once a day, or using filtered cigarettes, and believe that others are not taking the same precautionary measures. However, it is likely that many other smokers are doing the same things and taking those same precautions.</span><sup class="reference" data-dcnode-id="2950" id="cite_ref-shepperd2002_3-21"><a data-dcnode-id="2951" href="#cite_note-shepperd2002-3"><span data-dcnode-id="2952" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2949" instrument_node="">
</span></p><span data-dcnode-id="2947" instrument_node="">
</span><h3 data-dcnode-id="2937"><span class="mw-headline" data-dcnode-id="2945" id="Underlying_affect"><span data-dcnode-id="2946" instrument_node="">Underlying affect</span></span><span class="mw-editsection" data-dcnode-id="2938"><span class="mw-editsection-bracket" data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">[</span></span><a data-dcnode-id="2941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D15" title="Edit section: Underlying affect"><span data-dcnode-id="2942" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2936" instrument_node="">
</span><p data-dcnode-id="2915"><span data-dcnode-id="2935" instrument_node="">The last factor of optimistic bias is that of underlying </span><a data-dcnode-id="2933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Affect_%28psychology%29" title="Affect (psychology)"><span data-dcnode-id="2934" instrument_node="">affect</span></a><span data-dcnode-id="2932" instrument_node=""> and affect experience. Research has found that people show less optimistic bias when experiencing a negative mood, and more optimistic bias when in a positive mood.</span><sup class="reference" data-dcnode-id="2929" id="cite_ref-helweg-larsen2001_8-10"><a data-dcnode-id="2930" href="#cite_note-helweg-larsen2001-8"><span data-dcnode-id="2931" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2928" instrument_node=""> Sad moods reflect greater memories of negative events, which lead to more negative judgments, while positive moods promote happy memories and more positive feelings.</span><sup class="reference" data-dcnode-id="2925" id="cite_ref-shepperd2002_3-22"><a data-dcnode-id="2926" href="#cite_note-shepperd2002-3"><span data-dcnode-id="2927" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2924" instrument_node=""> This suggests that overall negative moods, including depression, result in increased personal risk estimates but less optimistic bias overall.</span><sup class="reference" data-dcnode-id="2921" id="cite_ref-helweg-larsen2001_8-11"><a data-dcnode-id="2922" href="#cite_note-helweg-larsen2001-8"><span data-dcnode-id="2923" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2920" instrument_node=""> Anxiety also leads to less optimistic bias, continuing to suggest that overall positive experiences and positive attitudes lead to more optimistic bias in events.</span><sup class="reference" data-dcnode-id="2917" id="cite_ref-helweg-larsen2001_8-12"><a data-dcnode-id="2918" href="#cite_note-helweg-larsen2001-8"><span data-dcnode-id="2919" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2916" instrument_node="">
</span></p><span data-dcnode-id="2914" instrument_node="">
</span><h2 data-dcnode-id="2904"><span class="mw-headline" data-dcnode-id="2912" id="Health_consequences"><span data-dcnode-id="2913" instrument_node="">Health consequences</span></span><span class="mw-editsection" data-dcnode-id="2905"><span class="mw-editsection-bracket" data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">[</span></span><a data-dcnode-id="2908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D16" title="Edit section: Health consequences"><span data-dcnode-id="2909" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2903" instrument_node="">
</span><p data-dcnode-id="2893"><span data-dcnode-id="2902" instrument_node="">In health, the optimistic bias tends to prevent individuals from taking on preventative measures for good health.</span><sup class="reference" data-dcnode-id="2899" id="cite_ref-bandb2010_18-0"><a data-dcnode-id="2900" href="#cite_note-bandb2010-18"><span data-dcnode-id="2901" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2898" instrument_node=""> For example, people who underestimate their comparative risk of heart disease know less about heart disease, and even after reading an article with more information, are still less concerned about risk of heart disease.</span><sup class="reference" data-dcnode-id="2895" id="cite_ref-radcliffe2002_10-2"><a data-dcnode-id="2896" href="#cite_note-radcliffe2002-10"><span data-dcnode-id="2897" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2894" instrument_node=""> Because the optimistic bias can be a strong force in decision-making, it is important to look at how risk perception is determined and how this will result in preventative behaviors. Therefore, researchers need to be aware of the optimistic bias and the ways it can prevent people from taking precautionary measures in life choices.
</span></p><p data-dcnode-id="2887"><span data-dcnode-id="2892" instrument_node="">Risk perceptions are particularly important for individual behaviors, such as exercise, diet, and even sunscreen use.</span><sup class="reference" data-dcnode-id="2889" id="cite_ref-brewer2007_19-0"><a data-dcnode-id="2890" href="#cite_note-brewer2007-19"><span data-dcnode-id="2891" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2888" instrument_node="">
</span></p><p data-dcnode-id="2873"><span data-dcnode-id="2886" instrument_node="">A large portion of risk prevention focuses on adolescents. Especially with health risk perception, adolescence is associated with an increased frequency of risky health-related behaviors such as smoking, drugs, and unsafe sex.</span><sup class="reference" data-dcnode-id="2883" id="cite_ref-:1_2-1"><a data-dcnode-id="2884" href="#cite_note-:1-2"><span data-dcnode-id="2885" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2882" instrument_node=""> While adolescents are aware of the risk, this awareness does not change behavior habits.</span><sup class="reference" data-dcnode-id="2879" id="cite_ref-20"><a data-dcnode-id="2880" href="#cite_note-20"><span data-dcnode-id="2881" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2878" instrument_node=""> Adolescents with strong positive optimistic bias toward risky behaviors had an overall increase in the optimistic bias with age.</span><sup class="reference" data-dcnode-id="2875" id="cite_ref-bandb2010_18-1"><a data-dcnode-id="2876" href="#cite_note-bandb2010-18"><span data-dcnode-id="2877" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2874" instrument_node="">
</span></p><p data-dcnode-id="2867"><span data-dcnode-id="2872" instrument_node="">However, unconditional risk questions in cross-sectional studies are used consistently, leading to problems, as they ask about the likelihood of an action occurring, but does not determine if there is an outcome, or compare events that haven't happened to events that have.</span><sup class="reference" data-dcnode-id="2869" id="cite_ref-brewer2007_19-1"><a data-dcnode-id="2870" href="#cite_note-brewer2007-19"><span data-dcnode-id="2871" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2868" instrument_node=""> 
many times there are methodological problems in these tests. 
</span></p><p data-dcnode-id="2861"><span data-dcnode-id="2866" instrument_node="">Concerning vaccines, perceptions of those who have not been vaccinated are compared to the perceptions of people who have been. Other problems which arise include the failure to know a person's perception of a risk.</span><sup class="reference" data-dcnode-id="2863" id="cite_ref-brewer2007_19-2"><a data-dcnode-id="2864" href="#cite_note-brewer2007-19"><span data-dcnode-id="2865" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2862" instrument_node=""> Knowing this information will be helpful for continued research on optimistic bias and preventative behaviors.
</span></p><span data-dcnode-id="2860" instrument_node="">
</span><h2 data-dcnode-id="2850"><span class="mw-headline" data-dcnode-id="2858" id="Neurosciences"><span data-dcnode-id="2859" instrument_node="">Neurosciences</span></span><span class="mw-editsection" data-dcnode-id="2851"><span class="mw-editsection-bracket" data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">[</span></span><a data-dcnode-id="2854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D17" title="Edit section: Neurosciences"><span data-dcnode-id="2855" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2849" instrument_node="">
</span><p data-dcnode-id="2843"><span data-dcnode-id="2848" instrument_node="">Functional neuroimaging suggests a key role for the rostral Anterior Cingulate Cortex (ACC) in modulating both emotional processing and autobiographical retrieval. It is part of brain network showing extensive correlation between rostral ACC and amygdala during imagining of future positive events and restricted correlation during imagining of future negative events. Based on these data, it is suggested that the rostral ACC has a crucial part to play in creating positive images of the future and ultimately, in ensuring and maintaining the optimism bias.</span><sup class="reference" data-dcnode-id="2845" id="cite_ref-Neural_1-1"><a data-dcnode-id="2846" href="#cite_note-Neural-1"><span data-dcnode-id="2847" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2844" instrument_node="">
</span></p><span data-dcnode-id="2842" instrument_node="">
</span><h2 data-dcnode-id="2831"><span data-dcnode-id="2841" id="Policy.2C_planning.2C_and_management"></span><span class="mw-headline" data-dcnode-id="2839" id="Policy,_planning,_and_management"><span data-dcnode-id="2840" instrument_node="">Policy, planning, and management</span></span><span class="mw-editsection" data-dcnode-id="2832"><span class="mw-editsection-bracket" data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">[</span></span><a data-dcnode-id="2835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D18" title="Edit section: Policy, planning, and management"><span data-dcnode-id="2836" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2830" instrument_node="">
</span><p data-dcnode-id="2805"><span data-dcnode-id="2829" instrument_node="">Optimism bias influences decisions and forecasts in policy, planning, and management, e.g., the costs and completion times of planned decisions tend to be underestimated and the benefits overestimated due to optimism bias. The term </span><a data-dcnode-id="2827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planning_fallacy" title="Planning fallacy"><span data-dcnode-id="2828" instrument_node="">planning fallacy</span></a><span data-dcnode-id="2826" instrument_node=""> for this effect was first proposed by </span><a data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daniel_Kahneman" title="Daniel Kahneman"><span data-dcnode-id="2825" instrument_node="">Daniel Kahneman</span></a><span data-dcnode-id="2823" instrument_node=""> and </span><a data-dcnode-id="2821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amos_Tversky" title="Amos Tversky"><span data-dcnode-id="2822" instrument_node="">Amos Tversky</span></a><span data-dcnode-id="2820" instrument_node="">.</span><sup class="reference" data-dcnode-id="2817" id="cite_ref-PezzoLitman2006_21-0"><a data-dcnode-id="2818" href="#cite_note-PezzoLitman2006-21"><span data-dcnode-id="2819" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="2814" id="cite_ref-22"><a data-dcnode-id="2815" href="#cite_note-22"><span data-dcnode-id="2816" instrument_node="">[22]</span></a></sup><span data-dcnode-id="2813" instrument_node=""> There is a growing body of evidence proving that optimism bias represents one of the biggest single causes of risk for </span><a data-dcnode-id="2811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Megaproject" title="Megaproject"><span data-dcnode-id="2812" instrument_node="">megaproject</span></a><span data-dcnode-id="2810" instrument_node=""> overspend.</span><sup class="reference" data-dcnode-id="2807" id="cite_ref-Bent_Flyvbjerg_23-0"><a data-dcnode-id="2808" href="#cite_note-Bent_Flyvbjerg-23"><span data-dcnode-id="2809" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2806" instrument_node="">
</span></p><span data-dcnode-id="2804" instrument_node="">
</span><h2 data-dcnode-id="2794"><span class="mw-headline" data-dcnode-id="2802" id="Valence_effect"><span data-dcnode-id="2803" instrument_node="">Valence effect</span></span><span class="mw-editsection" data-dcnode-id="2795"><span class="mw-editsection-bracket" data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">[</span></span><a data-dcnode-id="2798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D19" title="Edit section: Valence effect"><span data-dcnode-id="2799" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2793" instrument_node="">
</span><p data-dcnode-id="2778"><b data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">Valence effect</span></b><span data-dcnode-id="2790" instrument_node=""> is used to allude to the effect of </span><a data-dcnode-id="2788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Valence_%28psychology%29" title="Valence (psychology)"><span data-dcnode-id="2789" instrument_node="">valence</span></a><span data-dcnode-id="2787" instrument_node=""> on unrealistic optimism.</span><sup class="reference" data-dcnode-id="2784" id="cite_ref-24"><a data-dcnode-id="2785" href="#cite_note-24"><span data-dcnode-id="2786" instrument_node="">[24]</span></a></sup><span data-dcnode-id="2783" instrument_node=""> It has been studied by Ron S. Gold and his team since 2003.</span><sup class="reference" data-dcnode-id="2780" id="cite_ref-25"><a data-dcnode-id="2781" href="#cite_note-25"><span data-dcnode-id="2782" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2779" instrument_node=""> They frame questions for the same event in different ways: "some participants were given information about the conditions that promote a given health-related event, such as developing heart disease, and were asked to rate the comparative likelihood that they would experience the event. Other participants were given matched information about the conditions that prevent the same event and were asked to rate the comparative likelihood that they would avoid the event". They have generally found that unrealistic optimism was greater for negative than positive valence.
</span></p><p data-dcnode-id="2758"><span data-dcnode-id="2777" instrument_node="">Valence effects, which is also considered a form of cognitive bias,</span><sup class="reference" data-dcnode-id="2774" id="cite_ref-26"><a data-dcnode-id="2775" href="#cite_note-26"><span data-dcnode-id="2776" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="2771" id="cite_ref-:0_27-0"><a data-dcnode-id="2772" href="#cite_note-:0-27"><span data-dcnode-id="2773" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2770" instrument_node=""> have several real-world implications. For instance, it can lead to the overestimation of a company's future earnings by investors and this could contribute to a tendency for it to becoming overpriced.</span><sup class="reference" data-dcnode-id="2767" id="cite_ref-:0_27-1"><a data-dcnode-id="2768" href="#cite_note-:0-27"><span data-dcnode-id="2769" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2766" instrument_node=""> In terms of achieving organizational objectives, it could encourage people to produce unrealistic schedules helping drive a so-called </span><a data-dcnode-id="2764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planning_fallacy" title="Planning fallacy"><span data-dcnode-id="2765" instrument_node="">planning fallacy</span></a><span data-dcnode-id="2763" instrument_node="">, which often result in making poor decisions and project abandonment.</span><sup class="reference" data-dcnode-id="2760" id="cite_ref-28"><a data-dcnode-id="2761" href="#cite_note-28"><span data-dcnode-id="2762" instrument_node="">[28]</span></a></sup><span data-dcnode-id="2759" instrument_node="">
</span></p><span data-dcnode-id="2757" instrument_node="">
</span><h2 data-dcnode-id="2747"><span class="mw-headline" data-dcnode-id="2755" id="Attempts_to_alter_and_eliminate"><span data-dcnode-id="2756" instrument_node="">Attempts to alter and eliminate</span></span><span class="mw-editsection" data-dcnode-id="2748"><span class="mw-editsection-bracket" data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">[</span></span><a data-dcnode-id="2751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D20" title="Edit section: Attempts to alter and eliminate"><span data-dcnode-id="2752" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2746" instrument_node="">
</span><p data-dcnode-id="2732"><span data-dcnode-id="2745" instrument_node="">Studies have shown that it is very difficult to eliminate the optimistic bias. Some commentators believe that trying to reduce it may encourage people to adapt to health-protective behaviors. However, research has suggested that it cannot be reduced, and that efforts to reduce it tend to lead to even more optimistically biased results.</span><sup class="reference" data-dcnode-id="2742" id="cite_ref-weinsteinklein1995_29-0"><a data-dcnode-id="2743" href="#cite_note-weinsteinklein1995-29"><span data-dcnode-id="2744" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2741" instrument_node=""> In a research study of four different tests to reduce the optimistic bias, through lists of risk factors, participants perceiving themselves as inferior to others, participants asked to think of high-risk individuals, and giving attributes of why they were at risk, all increased the bias rather than decreased it.</span><sup class="reference" data-dcnode-id="2738" id="cite_ref-weinsteinklein1995_29-1"><a data-dcnode-id="2739" href="#cite_note-weinsteinklein1995-29"><span data-dcnode-id="2740" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2737" instrument_node=""> Other studies have tried to reduce the bias through reducing distance, but overall it still remains.</span><sup class="reference" data-dcnode-id="2734" id="cite_ref-harris2000_14-3"><a data-dcnode-id="2735" href="#cite_note-harris2000-14"><span data-dcnode-id="2736" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2733" instrument_node="">
</span></p><p data-dcnode-id="2724"><span data-dcnode-id="2731" instrument_node="">This seemingly paradoxical situation – in which an attempt to reduce bias can sometimes actually increase it – may be related to the insight behind the semi-jocular and </span><a data-dcnode-id="2729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recursion" title="Recursion"><span data-dcnode-id="2730" instrument_node="">recursively</span></a><span data-dcnode-id="2728" instrument_node=""> worded "</span><a data-dcnode-id="2726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hofstadter%2527s_law" title="Hofstadter's law"><span data-dcnode-id="2727" instrument_node="">Hofstadter's law</span></a><span data-dcnode-id="2725" instrument_node="">", which states that:
</span></p><span data-dcnode-id="2723" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="2715"><p data-dcnode-id="2716"><span data-dcnode-id="2720" instrument_node="">It always takes longer than you expect, even when you take into account </span><a data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hofstadter%2527s_law" title="Hofstadter's law"><span data-dcnode-id="2719" instrument_node="">Hofstadter's law</span></a><span data-dcnode-id="2717" instrument_node="">.</span></p></blockquote><span data-dcnode-id="2714" instrument_node="">
</span><p data-dcnode-id="2704"><span data-dcnode-id="2713" instrument_node="">Although research has suggested that it is very difficult to eliminate the bias, some factors may help in closing the gap of the optimistic bias between an individual and their target risk group. First, by placing the comparison group closer to the individual, the optimistic bias can be reduced: studies found that when individuals were asked to make comparisons between themselves and close friends, there was almost no difference in the likelihood of an event occurring.</span><sup class="reference" data-dcnode-id="2710" id="cite_ref-perloff1986_13-2"><a data-dcnode-id="2711" href="#cite_note-perloff1986-13"><span data-dcnode-id="2712" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2709" instrument_node=""> Additionally, actually experiencing an event leads to a decrease in the optimistic bias.</span><sup class="reference" data-dcnode-id="2706" id="cite_ref-helweg-larsen2001_8-13"><a data-dcnode-id="2707" href="#cite_note-helweg-larsen2001-8"><span data-dcnode-id="2708" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2705" instrument_node=""> While this only applies to events with prior experience, knowing the previously unknown will result in less optimism of it not occurring.
</span></p><span data-dcnode-id="2703" instrument_node="">
</span><h2 data-dcnode-id="2693"><span class="mw-headline" data-dcnode-id="2701" id="Pessimism_bias"><span data-dcnode-id="2702" instrument_node="">Pessimism bias</span></span><span class="mw-editsection" data-dcnode-id="2694"><span class="mw-editsection-bracket" data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">[</span></span><a data-dcnode-id="2697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptimism_bias%26action%3Dedit%26section%3D21" title="Edit section: Pessimism bias"><span data-dcnode-id="2698" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2692" instrument_node="">
</span><p data-dcnode-id="2682"><span data-dcnode-id="2691" instrument_node="">The opposite of optimism bias is pessimism bias (or pessimistic bias), because the principles of the optimistic bias continue to be in effect in situations where individuals regard themselves as worse off than others.</span><sup class="reference" data-dcnode-id="2688" id="cite_ref-shepperd2002_3-23"><a data-dcnode-id="2689" href="#cite_note-shepperd2002-3"><span data-dcnode-id="2690" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2687" instrument_node=""> Optimism may occur from either a distortion of personal estimates, representing personal optimism, or a distortion for others, representing personal pessimism.</span><sup class="reference" data-dcnode-id="2684" id="cite_ref-shepperd2002_3-24"><a data-dcnode-id="2685" href="#cite_note-shepperd2002-3"><span data-dcnode-id="2686" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2683" instrument_node="">
</span></p><p data-dcnode-id="2675"><b data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">Pessimism bias</span></b><span data-dcnode-id="2679" instrument_node=""> is an effect in which people </span><a class="mw-redirect" data-dcnode-id="2677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exaggerate" title="Exaggerate"><span data-dcnode-id="2678" instrument_node="">exaggerate</span></a><span data-dcnode-id="2676" instrument_node=""> the likelihood that negative things will happen to them. It contrasts with optimism bias.
</span></p><p data-dcnode-id="2656"><span data-dcnode-id="2674" instrument_node="">People with </span><a class="mw-redirect" data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychological_depression" title="Psychological depression"><span data-dcnode-id="2673" instrument_node="">depression</span></a><span data-dcnode-id="2671" instrument_node=""> are particularly likely to exhibit pessimism bias.</span><sup class="reference" data-dcnode-id="2668" id="cite_ref-SharotRiccardi2007_30-0"><a data-dcnode-id="2669" href="#cite_note-SharotRiccardi2007-30"><span data-dcnode-id="2670" instrument_node="">[30]</span></a></sup><sup class="reference" data-dcnode-id="2665" id="cite_ref-31"><a data-dcnode-id="2666" href="#cite_note-31"><span data-dcnode-id="2667" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2664" instrument_node=""> Surveys of smokers have found that their ratings of their risk of </span><a class="mw-redirect" data-dcnode-id="2662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heart_disease" title="Heart disease"><span data-dcnode-id="2663" instrument_node="">heart disease</span></a><span data-dcnode-id="2661" instrument_node=""> showed a small but significant pessimism bias; however, the literature as a whole is inconclusive.</span><sup class="reference" data-dcnode-id="2658" id="cite_ref-sutton_32-0"><a data-dcnode-id="2659" href="#cite_note-sutton-32"><span data-dcnode-id="2660" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2657" instrument_node="">
</span></p><span data-dcnode-id="2655" instrument_node="">
