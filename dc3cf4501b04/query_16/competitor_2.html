</span><article class="post-19777 post type-post status-publish format-standard has-post-thumbnail hentry category-blog category-coping-with-chronic-illness tag-chronic-illness tag-coping tag-depression tag-emotional-wellbeing tag-happiness tag-love-and-friendships tag-psychology" data-dcnode-id="854" id="post-19777" itemscope="itemscope" itemtype="http://schema.org/CreativeWork"><span data-dcnode-id="1129" instrument_node="">
</span><div class="inside-article" data-dcnode-id="857"><span data-dcnode-id="1128" instrument_node="">
</span><div class="featured-image page-header-image-single jpibfi_container" data-dcnode-id="1123"><span data-dcnode-id="1127" instrument_node="">
</span><input class="jpibfi" data-dcnode-id="1126" type="hidden"><img alt="The Difference Between Genuine Optimism and Toxic Positivity | The Health Sessions" class="attachment-full size-full" data-dcnode-id="1125" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Difference Between Genuine Optimism and Toxic Positivity (And Why It Matters)" data-jpibfi-post-url="https://thehealthsessions.com/toxic-positivity/" data-jpibfi-src="https://thehealthsessions.com/wp-content/uploads/Positivity-pexels-photo-1236678-e1552476955435.jpg" height="427" itemprop="image" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehealthsessions.com/wp-content/uploads/Positivity-pexels-photo-1236678-e1552476955435.jpg&amp;raw" width="640"><span data-dcnode-id="1124" instrument_node="">
</span></div><span data-dcnode-id="1122" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1113"><span data-dcnode-id="1121" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1119" itemprop="headline"><span data-dcnode-id="1120" instrument_node="">The Difference Between Genuine Optimism and Toxic Positivity (And Why It Matters)</span></h1><span data-dcnode-id="1118" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">
</span></div><span data-dcnode-id="1114" instrument_node="">
</span></header><span data-dcnode-id="1111" instrument_node="">
</span><div class="entry-content jpibfi_container" data-dcnode-id="880" itemprop="text"><span data-dcnode-id="1110" instrument_node="">
</span><div class="mailmunch-forms-before-post" data-dcnode-id="1109" style="display: none !important;"></div><input class="jpibfi" data-dcnode-id="1108" type="hidden"><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">When’s the last time someone told you to “just be positive” after sharing your struggles?</span></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">There’s a tricky relationship between positive thinking, health and happiness.&nbsp;Over the past decade, experts have promoted positivity as a simple but highly effective tool to lead a happier and healthier life.</span></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">And rightfully so. Positivity has been linked to lower levels of stress, stronger immunity, better cardiovascular health, increased feelings of physical and emotional wellbeing, and even a longer lifespan. Cultivating positive feelings like joy, hope and inspiration also builds good mental habits such as attention, resilience and optimism, which in turn buffer the potential negative effects of stressful times.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1095"><strong data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">But anyone’s who’s ever been seriously sick knows there’s another side to positive thinking and health.&nbsp;</span></strong><span data-dcnode-id="1096" id="more-19777"></span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1093" instrument_node="">Because the positivity culture puts a lot of responsibility on a person’s shoulders. If you can feel healthier and happier by thinking positively, the reverse surely must also be true: the reason you’re still not better is because you’re not positive enough. Thanks to ‘</span><em data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">The Secret’</span></em><span data-dcnode-id="1090" instrument_node=""> and it’s Law of Attraction, there’s even a popular belief that you just need to send the right thoughts out into the Universe and the Universe will answer your prayers.</span></p><span data-dcnode-id="1088" instrument_node="">
</span><blockquote data-dcnode-id="1085"><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Even if your problem is largely outside of your control, the underlying message seems to be, “If only you’d thinking positively/eat right/follow this program, then you wouldn’t feel sad and sick.”</span></p></blockquote><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1083" instrument_node="">This kind of toxic positivity completely overlooks the severity of some situations. Sure, if someone’s down over a ruined meal or failed work assignment, you can tell them to just cheer up. But when someone is diagnosed with chronic illness or lost a loved one, it’s normal to go through </span><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehealthsessions.com/5-key-ways-to-support-a-loved-one-with-a-chronic-disease/"><span data-dcnode-id="1082" instrument_node="">stages of grief</span></a><span data-dcnode-id="1080" instrument_node=""> – sometimes more than once. Clinical depression and anxiety are medical conditions that cannot be cured by positive thinking and lifestyle changes alone.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">In these cases, smilingly telling someone “don’t worry, you’ll get through it” or “think happy thoughts” doesn’t help – it hurts. Toxic positivity strips someone away of the validation they deserve and leaves them feeling ‘guilty’. Guilty for ‘contributing to their problems’, for ‘not being strong enough’ to get better by themselves. Instead of searching for ways to deal with the situation, people may start to doubt themselves, at a time when they need their confidence the most.</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">The thing is, most of the time those hollow phrases are actually well-meant advice. People often don’t know what to say, and they (we!) have a hard time really putting themselves and ourselves in someone else’s shoes. So we project our own somewhat similar situation onto others. “Oh, that time when I was ill, I just pushed the pain and all those negative thoughts away.”</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1071" instrument_node="">But in our hurry to help our struggling friend, we stop listening to</span><em data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node=""> their </span></em><span data-dcnode-id="1068" instrument_node="">story. Everyone has their own journey to go through. You can’t fast-forward to better times without going through the process of feeling overwhelmed, venting your emotions, organizing your thoughts and experimenting with different </span><a data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehealthsessions.com/how-to-stop-ruminating/"><span data-dcnode-id="1067" instrument_node="">coping strategies</span></a><span data-dcnode-id="1065" instrument_node="">.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1060"><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">If the standard positivity isn’t the best way to help, what can you do or say to convey genuine optimism?&nbsp;</span></strong></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><img alt="The Difference Between Genuine Optimism and Toxic Positivity (And Why It Matters) | The Health Sessions" class="aligncenter size-full wp-image-19822" data-dcnode-id="1058" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Difference Between Genuine Optimism and Toxic Positivity (And Why It Matters)" data-jpibfi-post-url="https://thehealthsessions.com/toxic-positivity/" data-jpibfi-src="https://thehealthsessions.com/wp-content/uploads/positivity-pexels-photo-884977-e1552477185392.jpg" height="427" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehealthsessions.com/wp-content/uploads/positivity-pexels-photo-884977-e1552477185392.jpg&amp;raw" width="640"></p><div class="mailmunch-forms-in-post-middle" data-dcnode-id="1056" style="display: none !important;"></div><span data-dcnode-id="1055" instrument_node="">
</span><h2 data-dcnode-id="1052" style="text-align: center;"><b data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">How to Convey Genuine Positivity Instead of Toxic Positivity&nbsp;</span></b></h2><span data-dcnode-id="1051" instrument_node="">
</span><h3 data-dcnode-id="1045"><strong data-dcnode-id="1046"><span data-dcnode-id="1050" instrument_node="">1. If </span><em data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">you</span></em><span data-dcnode-id="1047" instrument_node=""> are the one struggling</span></strong></h3><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">First, let’s get this clear:</span></p><span data-dcnode-id="1041" instrument_node="">
</span><blockquote data-dcnode-id="1038"><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">You’re not to blame for everything that happens to you, and you’re not solely responsible for the solution. It’s ok to ask for help.</span></p></blockquote><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">If you’re going through tough times and the emotional rollercoaster that comes along with it, here are some strategies to cope better and rebuild …..</span></p><span data-dcnode-id="1034" instrument_node="">
</span><ul data-dcnode-id="970"><span data-dcnode-id="1033" instrument_node="">
</span><li data-dcnode-id="1024"><strong data-dcnode-id="1029"><a data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologytoday.com/us/blog/insight-therapy/201009/emotional-acceptance-why-feeling-bad-is-good"><span data-dcnode-id="1032" instrument_node="">Don’t push negative feelings away.</span></a><span data-dcnode-id="1030" instrument_node=""> </span></strong><span data-dcnode-id="1028" instrument_node="">It’s perfectly normal to feel sad, angry, frustrated and hopeless when hardship strikes. Avoiding hurtful emotions works kind of like a boomerang – they come back when you least expect it to hit you in the face. Even positivity expert </span><a data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2Fb5LXD"><span data-dcnode-id="1027" instrument_node="">Barbara Fredrickson</span></a><span data-dcnode-id="1025" instrument_node=""> says that negative feelings are a normal part of life. What matters is the overall balance between the negative and positive emotions. Instead of pushing your sadness away, the trick is to find a way to deal better with it, so you don’t get stuck into a negative spiral.</span></li><span data-dcnode-id="1023" instrument_node="">
</span><li data-dcnode-id="1019"><strong data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Don’t fully identify with your problem or diagnosis.</span></strong><span data-dcnode-id="1020" instrument_node=""> Even though chronic illness or tragic life events can have a huge impact on your everyday life, you’re also still you.</span></li><span data-dcnode-id="1018" instrument_node="">
</span><li data-dcnode-id="1008"><strong data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Learn the difference between the things you can and cannot change.</span></strong><span data-dcnode-id="1015" instrument_node="">&nbsp;There’s often something that can be done to improve your situation. Gather your courage and</span><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.skillsyouneed.com/ips/problem-solving.html"><span data-dcnode-id="1014" instrument_node=""> problem solving skills,</span></a><span data-dcnode-id="1012" instrument_node=""> make a list of possible solutions and start working on it. But, as much as the modern world hates to admit it, not everything is within our control. Not every illness can be cured, not every relationship can pass the test of time, not every problem can be solved overnight. Learning how to accept the things you cannot change is not an easy nor a quick process, but here are some </span><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehealthsessions.com/how-to-accept-your-chronic-illness/"><span data-dcnode-id="1011" instrument_node="">psychological tips</span></a><span data-dcnode-id="1009" instrument_node=""> that might help.</span></li><span data-dcnode-id="1007" instrument_node="">
</span><li data-dcnode-id="997"><strong data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Identify and correct cognitive thinking errors.</span></strong><span data-dcnode-id="1004" instrument_node="">&nbsp;It’s completely normal to have negative thoughts once in a while, but sometimes, you can develop </span><a data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehealthsessions.com/changing-negative-thoughts/"><span data-dcnode-id="1003" instrument_node="">negative thinking patterns</span></a><span data-dcnode-id="1001" instrument_node=""> that aren’t helpful. For example, you might take things too personally or immediately expect the worst case scenario when something doesn’t go as planned. We all make these cognitive errors, but they can be especially persistent when you’re depressed, anxious, stressed or sick. If that’s the case, </span><a data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehealthsessions.com/changing-negative-thoughts/"><span data-dcnode-id="1000" instrument_node="">challenge your thoughts.</span></a><span data-dcnode-id="998" instrument_node=""> Is what you’re thinking true? Could there be a more helpful alternative thought?</span></li><span data-dcnode-id="996" instrument_node="">
</span><li data-dcnode-id="986"><span data-dcnode-id="995" instrument_node="">With all the above in mind, it is possible to </span><strong data-dcnode-id="991"><a data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//buffer.com/resources/how-to-rewire-your-brains-for-positivity-and-happiness"><span data-dcnode-id="994" instrument_node="">train your mind</span></a><span data-dcnode-id="992" instrument_node=""> to see things more positively</span></strong><span data-dcnode-id="990" instrument_node="">.&nbsp;You don’t need to see the world through rose-colored glasses, but I try believe that </span><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehealthsessions.com/find-good-in-every-day/"><span data-dcnode-id="989" instrument_node="">savoring the little good things in life</span></a><span data-dcnode-id="987" instrument_node=""> makes it easier to get through the big bad ones.</span></li><span data-dcnode-id="985" instrument_node="">
</span><li data-dcnode-id="977"><span data-dcnode-id="984" instrument_node="">When you don’t feel heard and understood by your family and friends, try to </span><strong data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">express your emotions in a constructive way.</span></strong><span data-dcnode-id="981" instrument_node="">&nbsp;Maybe you could put your thought on to paper by </span><a data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehealthsessions.com/health-benefits-of-journaling/"><span data-dcnode-id="980" instrument_node="">journaling</span></a><span data-dcnode-id="978" instrument_node=""> or find an (online) support group with people who are going through the same problem as you are.</span></li><span data-dcnode-id="976" instrument_node="">
</span><li data-dcnode-id="972"><strong data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Seek professional help if you need it.</span></strong><span data-dcnode-id="973" instrument_node="">&nbsp;When you feel hopeless, deeply depressed, panicked or burnt out, please contact your doctor or reach out to a loved one to get you the help you need. Don’t struggle on your own. Always remember it’s a sign of strength to know when to ask for help to better deal with your problems.</span></li><span data-dcnode-id="971" instrument_node="">
</span></ul><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="967"><img alt="The Difference Between Genuine Optimism and Toxic Positivity (And Why It Matters) | The Health Sessions" class="aligncenter size-full wp-image-19823" data-dcnode-id="968" data-jpibfi-post-excerpt="" data-jpibfi-post-title="The Difference Between Genuine Optimism and Toxic Positivity (And Why It Matters)" data-jpibfi-post-url="https://thehealthsessions.com/toxic-positivity/" data-jpibfi-src="https://thehealthsessions.com/wp-content/uploads/Positivity-pexels-photo-193821-e1552477291522.jpg" height="427" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehealthsessions.com/wp-content/uploads/Positivity-pexels-photo-193821-e1552477291522.jpg&amp;raw" width="640"></p><span data-dcnode-id="966" instrument_node="">
</span><h3 data-dcnode-id="963"><strong data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">2. What to say when your family member or friend is struggling&nbsp;</span></strong></h3><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">When a loved one shares their struggles with you, there are two important things to remember:</span></p><span data-dcnode-id="959" instrument_node="">
</span><ol data-dcnode-id="951"><span data-dcnode-id="958" instrument_node="">
</span><li data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Just like going through a divorce or losing your job, having a chronic illness or mental health disorder can turn your life upside down. Problems are real and it’s normal for people to feel sad, angry, frustrated and helpless.</span></li><span data-dcnode-id="955" instrument_node="">
</span><li data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">We all just want to be heard and understood. More than anything, people just want to get their problems off their chest. Sometimes just talking things through helps clear your mind and gives you the boost you need to tackle your problems (again).</span></li><span data-dcnode-id="952" instrument_node="">
</span></ol><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="949" instrument_node="">That’s why my number one advice is: </span><strong data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">swallow your instinctive response to give advice or offer tips</span></strong><span data-dcnode-id="946" instrument_node=""> – unless your friend specially asks for it. Here are some ideas for what you can say instead:</span></p><span data-dcnode-id="944" instrument_node="">
</span><ul data-dcnode-id="915"><span data-dcnode-id="943" instrument_node="">
</span><li data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">“I’m sorry to hear what you’re going through. How can I help?”</span></li><span data-dcnode-id="940" instrument_node="">
</span><li data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">“I know you’re going through a tough time. But I also know you’re strong. I believe in you.”</span></li><span data-dcnode-id="937" instrument_node="">
</span><li data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">“It’s normal to feel overwhelmed and confused in your situation. We’ll make sense of thing later. Today, let’s just focus on taking the first step.”</span></li><span data-dcnode-id="934" instrument_node="">
</span><li data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">“I don’t know what to say, but I’m here for you.”</span></li><span data-dcnode-id="931" instrument_node="">
</span><li data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">“It’s never fun to feel down. Is there anything you can do today that will make you feel a little better?”</span></li><span data-dcnode-id="928" instrument_node="">
</span><li data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">“You’re not wrong for feeling the way you do, and no one blames you for it.”</span></li><span data-dcnode-id="925" instrument_node="">
</span><li data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">“I know it’s difficult, but you’re doing a great job handling this.”</span></li><span data-dcnode-id="922" instrument_node="">
</span><li data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">“That sucks. What can I do to help?”</span></li><span data-dcnode-id="919" instrument_node="">
</span><li data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">“When you’ve done all you could, sometimes giving up is the right thing to do. How would you like things to turn out? Is there any other way that you can make that happen?”</span></li><span data-dcnode-id="916" instrument_node="">
</span></ul><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="911"><strong data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Basically, anything that validates your friends feelings and offers some comfort and support.&nbsp;</span></strong></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">With that in mind, you can easily put a truly positive spin to any well-meaning words.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="904"><strong data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Has positivity ever had a&nbsp;negative effect on you? Which words would you rather have heard?&nbsp;</span></strong></p><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="900"><em data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">If you enjoyed reading this post, you might also like:</span></em></p><span data-dcnode-id="899" instrument_node="">

</span><li data-dcnode-id="891"><a data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehealthsessions.com/coping-box/"><span data-dcnode-id="893" instrument_node="">Why You Need a Coping Box (and How to Create Your Own)</span></a></li><span data-dcnode-id="890" instrument_node="">
</span><li data-dcnode-id="887"><a data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehealthsessions.com/how-to-accept-your-chronic-illness/"><span data-dcnode-id="889" instrument_node="">How to Learn to Accept Your Chronic Illness &nbsp;</span></a></li><span data-dcnode-id="886" instrument_node="">
