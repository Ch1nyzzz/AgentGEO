instrument_node=""> </span><li class="menu-item menu-item-type-post_type menu-item-object-post menu-item-137605" data-dcnode-id="1032" id="menu-item-137605"><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everydaypower.com/lil-peep-quotes/"><span data-dcnode-id="1034" instrument_node="">Lil Peep Quotes</span></a></li><span data-dcnode-id="1031" instrument_node=""> </span><li class="menu-item menu-item-type-post_type menu-item-object-post menu-item-137606" data-dcnode-id="1028" id="menu-item-137606"><a data-dcnode-id="1029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everydaypower.com/beyonce-quotes-from-songs/"><span data-dcnode-id="1030" instrument_node="">Beyonce Quotes</span></a></li><span data-dcnode-id="1027" instrument_node=""> </span><li class="menu-item menu-item-type-post_type menu-item-object-post menu-item-137607" data-dcnode-id="1024" id="menu-item-137607"><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everydaypower.com/bts-quotes/"><span data-dcnode-id="1026" instrument_node="">BTS Quotes</span></a></li><span data-dcnode-id="1023" instrument_node=""> </span><li class="menu-item menu-item-type-post_type menu-item-object-post menu-item-137608" data-dcnode-id="1020" id="menu-item-137608"><a data-dcnode-id="1021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everydaypower.com/best-carl-jung-quotes/"><span data-dcnode-id="1022" instrument_node="">Carl Jung Quotes</span></a></li></ul></li><li class="menu-item menu-item-type-custom menu-item-object-custom menu-item-134448" data-dcnode-id="1015" id="menu-item-134448"><a data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everydaypower.com/sitemaps/"><span data-dcnode-id="1017" instrument_node="">Everything</span></a></li></ul></div><span data-dcnode-id="1012" instrument_node=""> </span></div><span da 983" instrument_node=""> </span><meta content="April 4, 2022" data-dcnode-id="982" itemprop="dateModified"><span data-dcnode-id="981" instrument_node=""> </span><meta data-dcnode-id="980" itemid="https://everydaypower.com/positivity-quotes/" itemprop="mainEntityOfPage" itemscope="" itemtype="https://schema.org/WebPage"><span data-dcnode-id="979" instrument_node=""> </span><div class="mvp-main-box" data-dcnode-id="122"><span data-dcnode-id="978" instrument_node=""> </span><div data-dcnode-id="124" id="mvp-post-main"><span data-dcnode-id="977" instrument_node=""> </span><div data-dcnode-id="126" id="mvp-post-content"><span data-dcnode-id="976" instrument_node=""> </span><div class="mvp-post-container-center" data-dcnode-id="968"><span data-dcnode-id="975" instrument_node=""> </span><header data-dcnode-id="970" id="mvp-post-head"><span data-dcnode-id="974" instrument_node=""> </span><h1 class="mvp-post-title entry-title" data-dcnode-id="972" itemprop="headline"><span data-dcnode-id="973" instrument_node="">Positivity Quotes Showing the Power of Optimism</span></h1><span data-dcnode-id="971" instrument_node=""> </span></header><span data-dcnode-id="969" instrument_node=""> </span></div><span data-dcnode-id="967" instrument_node=""> </span><div data-dcnode-id="128" id="article-columns"><span data-dcnode-id="966" instrument_node=""> </span><div data-dcnode-id="146" id="mvp-content-wrap"><span data-dcnode-id="965" instrument_node=""> </span><div data-dcnode-id="439" id="mvp-content-body-top"><span data-dcnode-id="964" instrument_node=""> </span><div data-dcnode-id="578" id="mvp-content-main"><span data-dcnode-id="963" instrument_node=""> </span><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Need help focusing on the positives instead of the negatives? Our positivity quotes are just what you need to look on the bright side of life!</span></p><h2 data-dcnode-id="958" id="h-how-could-a-positive-mindset-help-you"><strong data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">How could a positive mindset help you?&nbsp;</span></strong></h2><p data-dcnode-id="953"><span data-dcnode-id="957" instrument_node="">In a world that focuses on the negative, positive thinking is a skill that requires daily practice. My daily practice consists of combating negative thinking, mindfulness exercises, and reading </span><a data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everydaypower.com/short-inspirational-quotes/"><span data-dcnode-id="956" instrument_node="">inspirational quotes</span></a><span data-dcnode-id="954" instrument_node="">.</span></p><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Reading quotes, like the ones featured below, helps me put situations into perspective and reduce self-inflicted stress. Below, I have compiled 50 quotes about optimism, humor, and more to encourage you to stay positive.&nbsp;</span></p><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Get ready to get inspired; take a look at the quotes below!</span></p><h2 data-dcnode-id="946" id="h-inspirational-positivity-quotes"><strong data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Inspirational positivity quotes</span></strong></h2><p data-dcnode-id="942"><span data-dcnode-id="945" instrument_node="">1. “Keep your face to the sunshine and you cannot see a shadow.”&nbsp;</span><strong data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">– Helen Keller</span></strong></p><p data-dcnode-id="938"><span data-dcnode-id="941" instrument_node="">2. “The joy of life comes from our encounters with new experiences, and hence there is no greater joy than to have an endlessly changing horizon, for each day to have a new and different sun.”&nbsp;</span><strong data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">– Christopher McCandless</span></strong></p><p data-dcnode-id="934"><span data-dcnode-id="937" instrument_node="">3. “Trust in dreams, for in them is hidden the gate to eternity.”</span><strong data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">&nbsp;– Khalil Gibran</span></strong></p><p data-dcnode-id="930"><span data-dcnode-id="933" instrument_node="">4. “My dear friend, clear your mind of can’t.”&nbsp;</span><strong data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">– Samuel Johnson</span></strong></p><p data-dcnode-id="926"><span data-dcnode-id="929" instrument_node="">5. “Believe that life is worth living and your belief will help create the fact.”&nbsp;</span><strong data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">– William James</span></strong></p><p data-dcnode-id="922"><span data-dcnode-id="925" instrument_node="">6. “Positive anything is better than negative nothing.”&nbsp;</span><strong data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">– Elbert Hubbard</span></strong></p><p data-dcnode-id="918"><span data-dcnode-id="921" instrument_node="">7. “You’ve done it before and you can do it now. See the positive possibilities. Redirect the substantial energy of your frustration and turn it into positive, effective, unstoppable determination.”&nbsp;</span><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">– Ralph Marston</span></strong></p><p data-dcnode-id="913"><span data-dcnode-id="917" instrument_node="">If you’re enjoying these quotes, make sure to read our collection of </span><a data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everydaypower.com/positive-energy-quotes/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="916" instrument_node="">positive energy quotes</span></a><span data-dcnode-id="914" instrument_node=""> about the power of good vibes.</span></p><p data-dcnode-id="909"><span data-dcnode-id="912" instrument_node="">8. “There are powers inside of you which, if you could discover and use, would make of you everything you ever dreamed or imagined you could become.”&nbsp;</span><strong data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">– Orison Swett Marden</span></strong></p><p data-dcnode-id="905"><span data-dcnode-id="908" instrument_node="">9. “Few things in the world are more powerful than a positive push. A smile. A world of optimism and hope. A ‘you can do it’ when things are tough.”&nbsp;</span><strong data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">– Richard M. DeVos</span></strong></p><p data-dcnode-id="901"><span data-dcnode-id="904" instrument_node="">10. “Dream small dreams. If you make them too big, you get overwhelmed and you don’t do anything. If you make small goals and accomplish them, it gives you the confidence to go on to higher goals.”&nbsp;</span><strong data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">– John H. Johnson</span></strong></p><p data-dcnode-id="897"><span data-dcnode-id="900" instrument_node="">11. “Live life to the fullest, and focus on the positive.”&nbsp;</span><strong data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">– Matt Cameron</span></strong></p><h2 data-dcnode-id="894" id="h-positivity-quotes-about-optimism"><strong data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Positivity quotes about optimism</span></strong></h2><p data-dcnode-id="890"><span data-dcnode-id="893" instrument_node="">12.&nbsp;“One of the things I learned the hard way was that it doesn’t pay to get discouraged. Keeping busy and making optimism a way of life can restore your faith in yourself.”&nbsp;</span><strong data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">– Lucille Ball</span></strong></p><p data-dcnode-id="886"><span data-dcnode-id="889" instrument_node="">13.&nbsp;“Optimism – the doctrine or belief that everything is beautiful, including what is ugly.”&nbsp;</span><strong data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">– Ambrose Bierce</span></strong></p><p data-dcnode-id="882"><span data-dcnode-id="885" instrument_node="">14.&nbsp;“Optimism doesn’t wait on facts. It deals with prospects. Pessimism is a waste of time.”&nbsp;</span><strong data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">– Norman Cousins</span></strong></p><p data-dcnode-id="878"><span data-dcnode-id="881" instrument_node="">15.&nbsp;“Building a practice of gratitude is the best way I know to create an optimistic approach to life. Start each day by lying in bed for five minutes and mentally acknowledging what you are grateful for.”&nbsp;</span><strong data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">– Silken Laumann</span></strong></p><div data-dcnode-id="868" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="u7638389079583a50e56eaafb7ae2a787" data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everydaypower.com/instagram-bio-quotes/" rel="dofollow" target="_blank"><div data-dcnode-id="870" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Related</span></span><span data-dcnode-id="873" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Instagram Bio Quotes That Define The Real You</span></span></div></a></div><p data-dcnode-id="864"><span data-dcnode-id="867" instrument_node="">16.&nbsp;“The optimist lives on the peninsula of infinite possibilities; the pessimist is stranded on the island of perpetual indecision.”&nbsp;</span><strong data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">– William Arthur Ward</span></strong></p><p data-dcnode-id="860"><span data-dcnode-id="863" instrument_node="">17.&nbsp;“It is the hopeful, buoyant, cheerful attitude of mind that wins. Optimism is a success builder; pessimism an achievement killer.”&nbsp;</span><strong data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">– Orison Swett Marden</span></strong></p><p data-dcnode-id="856"><span data-dcnode-id="859" instrument_node="">18.&nbsp;“Optimism can be relearnt.”&nbsp;</span><strong data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">– Marian Keyes</span></strong></p><p data-dcnode-id="852"><span data-dcnode-id="855" instrument_node="">19.&nbsp;“The biggest emotion in creation is the bridge to optimism.”&nbsp;</span><strong data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">– Brian May</span></strong></p><p data-dcnode-id="848"><span data-dcnode-id="851" instrument_node="">20.&nbsp;“The predominant quality of successful people is optimism. Your level of optimism is the very best predictor of how happy, healthy, wealthy, and long-lived you will be.”&nbsp;</span><strong data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">– Brian Tracy</span></strong></p><p data-dcnode-id="844"><span data-dcnode-id="847" instrument_node="">21.&nbsp;“There is only one optimist. He has been here since man has been on this earth, and that is man himself. If we hadn’t had such a magnificent optimism to carry us through all these things, we wouldn’t be here. We have survived it on our optimism.”&nbsp;</span><strong data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">– Edward Steichen</span></strong></p><p data-dcnode-id="840"><span data-dcnode-id="843" instrument_node="">22.&nbsp;“Optimism is a strategy for making a better future. Because unless you believe that the future can be better, you are unlikely to step up and take responsibility for making it so.”&nbsp;</span><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">– Noam Chomsky</span></strong></p><p data-dcnode-id="836"><span data-dcnode-id="839" instrument_node="">23.&nbsp;“Worry does not empty tomorrow of its sorrow. It empties today of its strength.”&nbsp;</span><strong data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">– Corrie Ten Boom</span></strong></p><p data-dcnode-id="832"><span data-dcnode-id="835" instrument_node="">24.&nbsp;“Optimism is essential to achievement and it is also the foundation of courage and true progress.”&nbsp;</span><strong data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">– Nicholas M. Butler</span></strong></p><p data-dcnode-id="828"><span data-dcnode-id="831" instrument_node="">25.&nbsp;“It’s not that optimism solves all of life’s problems; it is just that it can sometimes make the difference between coping and collapsing.”&nbsp;</span><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">– Lucy MacDonald</span></strong></p><p data-dcnode-id="824"><span data-dcnode-id="827" instrument_node="">26.&nbsp;“Optimism is joyful searching; pessimism is a prison of fear and a clutching at illusionary safety.”</span><strong data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">&nbsp;– Kathleen A. Brehony</span></strong></p><p data-dcnode-id="820"><span data-dcnode-id="823" instrument_node="">27.&nbsp;“Optimism inspires, energizes, and brings out our best. It points the mind toward possibilities and helps us think creatively past problems.”&nbsp;</span><strong data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">– Price Pritchett</span></strong></p><p data-dcnode-id="815"><span data-dcnode-id="819" instrument_node=""> If you’re enjoying this article, be sure to also check out these amazing </span><a data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everydaypower.com/angel-quotes/"><span data-dcnode-id="818" instrument_node="">Angel quotes</span></a><span data-dcnode-id="816" instrument_node=""> to bring out the good in you. </span></p><h2 data-dcnode-id="812" id="h-positivity-quotes-to-get-through-rough-times"><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Positivity quotes to get through rough times</span></strong></h2><p data-dcnode-id="808"><span data-dcnode-id="811" instrument_node="">28.&nbsp;“You’re going to go through tough times – that’s life. But I say, ‘Nothing happens to you, it happens for you.’ See the positive in negative events.”&nbsp;</span><strong data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">– Joel Osteen</span></strong></p><p data-dcnode-id="804"><span data-dcnode-id="807" instrument_node="">29.&nbsp;“The best thing to do when you find yourself in a hurting or vulnerable place is to surround yourself with the strongest, finest, most positive people you know.”&nbsp;</span><strong data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">– Kristin Armstrong</span></strong></p><p data-dcnode-id="800"><span data-dcnode-id="803" instrument_node="">30.&nbsp;“It is only in our darkest hours that we may discover the true strength of the brilliant light within ourselves that can never, ever, be dimmed.”&nbsp;</span><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">– Doe Zantamata</span></strong></p><p data-dcnode-id="794"><span data-dcnode-id="799" instrument_node="">31.&nbsp;“The greatest glory in living lies not in never failing, but in rising every time we fail.”&nbsp;</span><strong data-dcnode-id="795"><span data-dcnode-id="798" instrument_node="">– </span><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everydaypower.com/nelson-mandela-quotes/"><span data-dcnode-id="797" instrument_node="">Nelson Mandela</span></a></strong></p><p data-dcnode-id="790"><span data-dcnode-id="793" instrument_node="">32.&nbsp;“The greater the difficulty, the more glory in surmounting it. Skillful pilots gain their reputation from storms and tempests.”&nbsp;</span><strong data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">– Epictetus</span></strong></p><p data-dcnode-id="784"><span data-dcnode-id="789" instrument_node="">33.&nbsp;“The best way to get rid of the pain is to feel the pain. And when you feel the pain and go beyond it, you’ll see there’s a very intense love that is wanting to awaken itself.”&nbsp;</span><strong data-dcnode-id="785"><span data-dcnode-id="788" instrument_node="">– </span><a data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everydaypower.com/deepak-chopra-quotes/"><span data-dcnode-id="787" instrument_node="">Deepak Chopra</span></a></strong></p><p data-dcnode-id="780"><span data-dcnode-id="783" instrument_node="">34.&nbsp;“Although the world is full of suffering, it is also full of the overcoming of it.”&nbsp;</span><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">— Helen Keller</span></strong></p><div data-dcnode-id="770" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="u4c38f4fb47e588714ffa13ce44c948e2" data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everydaypower.com/school-quotes/" rel="dofollow" target="_blank"><div data-dcnode-id="772" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Related</span></span><span data-dcnode-id="775" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">School Quotes To Get The Motivation You Need For Learning</span></span></div></a></div><p data-dcnode-id="766"><span data-dcnode-id="769" instrument_node="">35.&nbsp;“The oak fought the wind and was broken, the willow bent when it must and survived.”&nbsp;</span><strong data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">— Robert Jordan</span></strong></p><p data-dcnode-id="762"><span data-dcnode-id="765" instrument_node="">36.&nbsp;“No one escapes pain, fear, and suffering. Yet from pain can come wisdom, from fear can come courage, from suffering can come strength – if we have the virtue of resilience.”&nbsp;</span><strong data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">— Eric Greitens</span></strong></p><p data-dcnode-id="758"><span data-dcnode-id="761" instrument_node="">37.&nbsp;“If your heart is broken, make art with the pieces.”&nbsp;</span><strong data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">— Shane Koyczan</span></strong></p><p data-dcnode-id="754"><span data-dcnode-id="757" instrument_node="">38.&nbsp;“Difficulties are meant to rouse, not discourage. The human spirit is to grow strong by conflict.”&nbsp;</span><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">— William Ellery Channing</span></strong></p><h2 data-dcnode-id="751" id="h-positivity-quotes-about-humor"><strong data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Positivity quotes about humor</span></strong></h2><p data-dcnode-id="747"><span data-dcnode-id="750" instrument_node="">39.&nbsp;“A good laugh is sunshine in the house.”&nbsp;</span><strong data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">– William Makepeace Thackeray</span></strong></p><p data-dcnode-id="743"><span data-dcnode-id="746" instrument_node="">40.&nbsp;“It’s your outlook on life that counts. If you take yourself lightly and don’t take yourself too seriously, pretty soon you can find the humor in our everyday lives. And sometimes it can be a lifesaver.”&nbsp;</span><strong data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">– Betty White</span></strong></p><p data-dcnode-id="739"><span data-dcnode-id="742" instrument_node="">41.&nbsp;“Your attitude is like a box of crayons that color your world. Constantly color your picture gray, and your picture will always be bleak. Try adding some bright colors to the picture by including humor, and your picture begins to lighten up.”&nbsp;</span><strong data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">– Allen Klein</span></strong></p><p data-dcnode-id="735"><span data-dcnode-id="738" instrument_node="">42.&nbsp;“I love people who make me laugh. I honestly think it’s the thing I like most, to laugh. It cures a multitude of ills. It’s probably the most important thing in a person.”&nbsp;</span><strong data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">– Audrey Hepburn</span></strong></p><p data-dcnode-id="731"><span data-dcnode-id="734" instrument_node="">43.&nbsp;“When humor goes, there goes civilization.”&nbsp;</span><strong data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">– Erma Bombeck</span></strong></p><p data-dcnode-id="725"><span data-dcnode-id="730" instrument_node="">44.&nbsp;“From there to here, and here to there, funny things are everywhere.”&nbsp;</span><strong data-dcnode-id="726"><span data-dcnode-id="729" instrument_node="">– </span><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everydaypower.com/dr-seuss-quotes/"><span data-dcnode-id="728" instrument_node="">Dr. Seuss</span></a></strong></p><p data-dcnode-id="721"><span data-dcnode-id="724" instrument_node="">45.&nbsp;“Humor has bailed me out of more tight situations than I can think of. If you go with your instincts and keep your humor, creativity follows. With luck, success comes, too.”&nbsp;</span><strong data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">– Jimmy Buffett</span></strong></p><p data-dcnode-id="717"><span data-dcnode-id="720" instrument_node="">46.&nbsp;“A person without a sense of humor is like a wagon without springs. It’s jolted by every pebble on the road.”&nbsp;</span><strong data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">– Henry Ward Beecher</span></strong></p><p data-dcnode-id="713"><span data-dcnode-id="716" instrument_node="">47.&nbsp;“Honest good humor is the oil and wine of a merry meeting, and there is no jovial companionship equal to that where the jokes are rather small and laughter abundant.”</span><strong data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">&nbsp;– Washington Irving</span></strong></p><p data-dcnode-id="709"><span data-dcnode-id="712" instrument_node="">48.&nbsp;“I have seen what a laugh can do. It can transform almost unbearable tears into something bearable, even hopeful.”&nbsp;</span><strong data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">– Bob Hope</span></strong></p><p data-dcnode-id="705"><span data-dcnode-id="708" instrument_node="">49.&nbsp;“Humor is perhaps a sense of intellectual perspective: an awareness that some things are really important, others not; and that the two kinds are most oddly jumbled in everyday affairs.”&nbsp;</span><strong data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">– Christopher Morley</span></strong></p><p data-dcnode-id="701"><span data-dcnode-id="704" instrument_node="">50.&nbsp;“Comedy, we may say, is society protecting itself – with a smile.”&nbsp;</span><strong data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">– J. B. Priestley</span></strong></p><h2 data-dcnode-id="696" id="h-more-positivity-quotes-and-sayings"><span data-dcnode-id="700" instrument_node="">More </span><strong data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">positivity quotes</span></strong><span data-dcnode-id="697" instrument_node=""> and sayings</span></h2><p data-dcnode-id="691"><span data-dcnode-id="695" instrument_node="">51. “Dwell on the beauty of life. Watch the stars, and see yourself running with them.” – </span><strong data-dcnode-id="692"><a data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everydaypower.com/marcus-aurelius-quotes/"><span data-dcnode-id="694" instrument_node="">Marcus Aurelius</span></a></strong></p><p data-dcnode-id="687"><span data-dcnode-id="690" instrument_node="">52. “Every day may not be good… but there’s something good in every day.” – </span><strong data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Alice Morse Earle</span></strong></p><p data-dcnode-id="683"><span data-dcnode-id="686" instrument_node="">53. “The POSITIVE THINKER sees the INVISIBLE, feels the INTANGIBLE, and achieves the IMPOSSIBLE.” – </span><strong data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Winston Churchill</span></strong></p><p data-dcnode-id="679"><span data-dcnode-id="682" instrument_node="">54. “Sorrow looks back, Worry looks around, Faith looks up.” – </span><strong data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Ralph Waldo Emerson</span></strong></p><p data-dcnode-id="674"><span data-dcnode-id="678" instrument_node="">55. “Always turn a negative situation into a positive situation.” – </span><strong data-dcnode-id="675"><a data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everydaypower.com/michael-jordan-quotes/"><span data-dcnode-id="677" instrument_node="">Michael Jordan</span></a></strong></p><div data-dcnode-id="664" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="u4ddfbf2dcce1a0df2512cae878cff9eb" data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everydaypower.com/friendship-quotes/" rel="dofollow" target="_blank"><div data-dcnode-id="666" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Related</span></span><span data-dcnode-id="669" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Best Friendship Quotes On The Power Of Real Friends</span></span></div></a></div><p data-dcnode-id="660"><span data-dcnode-id="663" instrument_node="">56. “The more we make an effort to keep our thoughts positive, the more pleasurable our journey in life will be.” – </span><strong data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">James Van Praagh</span></strong></p><p data-dcnode-id="656"><span data-dcnode-id="659" instrument_node="">57. “If you have positive energy you will always attract positive outcomes.” – </span><strong data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Steve Backley</span></strong></p><p data-dcnode-id="652"><span data-dcnode-id="655" instrument_node="">58. “To succeed, you need to find something to hold on to, something to motivate you, something to inspire you.” – </span><strong data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Tony Dorsett</span></strong></p><p data-dcnode-id="648"><span data-dcnode-id="651" instrument_node="">59. “Choosing to be positive and having a grateful attitude is going to determine how you’re going to live your life.” – </span><strong data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Joel Osteen</span></strong></p><p data-dcnode-id="644"><span data-dcnode-id="647" instrument_node="">60. “Enjoy life. Have fun. Be kind. Have worth. Have friends. Be honest. Laugh. Die with dignity. Make the most of it. It’s all we’ve got.” – </span><strong data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Ricky Gervais</span></strong></p><h2 data-dcnode-id="642" id="h-positivity-quotes-for-when-you-re-feeling-down"><span data-dcnode-id="643" instrument_node="">Positivity quotes for when you’re feeling down</span></h2><p data-dcnode-id="638"><span data-dcnode-id="641" instrument_node="">61. “When your back is to the wall and you are facing fear head on, the only way is forward and through it.” ―&nbsp;</span><strong data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Stephen Richards</span></strong></p><p data-dcnode-id="634"><span data-dcnode-id="637" instrument_node="">62. “There are three types of people in this world. Firstly, there are people who make things happen. Then there are people who watch things happen. Lastly, there are people who ask, what happened? Which do you want to be?” ―&nbsp;</span><strong data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Steve Backley</span></strong></p><p data-dcnode-id="630"><span data-dcnode-id="633" instrument_node="">63. “I know I’m pure; it’s enough for this life.” ―&nbsp;</span><strong data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Sonal Takalkar</span></strong></p><p data-dcnode-id="626"><span data-dcnode-id="629" instrument_node="">64. “Rebels are the ones that truly change the world, they don’t accept the status quo and have the courage to do something about it.” ―&nbsp;</span><strong data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Eduardo Clemente</span></strong></p><p data-dcnode-id="622"><span data-dcnode-id="625" instrument_node="">65. “In all that we do in life, we should never expect perfection as an outcome; however, we should expect excellence. Perfection is myth, while excellence is a standard.” ―&nbsp;</span><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Mailka J. Stevely</span></strong></p><p data-dcnode-id="618"><span data-dcnode-id="621" instrument_node="">66. “Keep following your intuition and never forget that you are not doing this alone, you are constantly guided and all your needs will be constantly provided.” ―&nbsp;</span><strong data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Thabiso Makekele</span></strong></p><p data-dcnode-id="614"><span data-dcnode-id="617" instrument_node="">67. “When you accept everything happily, you will always find the things that make you happy.” ―&nbsp;</span><strong data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Anuj Jasani</span></strong></p><p data-dcnode-id="610"><span data-dcnode-id="613" instrument_node="">68. “Learn to shift your energy into creating what you want instead of worrying about controlling what you cannot.” ―&nbsp;</span><strong data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Dee Waldeck</span></strong></p><p data-dcnode-id="606"><span data-dcnode-id="609" instrument_node="">69. “If you want to be something, be it, do not fret over what others are thinking” ―&nbsp;</span><strong data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Clarissa Pattern</span></strong></p><p data-dcnode-id="602"><span data-dcnode-id="605" instrument_node="">70. “Of all the choices you make each day none is more important than the choice of a positive attitude.” ―&nbsp;</span><strong data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Germany Kent</span></strong></p><h2 data-dcnode-id="599" id="h-what-makes-you-laugh"><strong data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">What makes you laugh?&nbsp;</span></strong></h2><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Making time for what makes you laugh is an essential part of having a positive mindset. As writer William Makepeace Thackeray once said, “A good laugh is sunshine in the house.” </span></p><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">I highly recommend keeping a list of things that make you laugh, whether it’s memes, music, movies, or TV shows. When you are feeling down, use this list to revitalize your mood.</span></p><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Make sure that your list is easily accessible so you can get to it quickly when you need it. For example, I keep my collection of funny things in a folder on my computer.&nbsp;</span></p><p data-dcnode-id="588"><span data-dcnode-id="592" instrument_node="">Which of these </span><a data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mayoclinic.org/healthy-lifestyle/stress-management/in-depth/positive-thinking/art-20043950" rel="noopener" target="_blank"><span data-dcnode-id="591" instrument_node="">positivity quotes and sayings</span></a><span data-dcnode-id="589" instrument_node=""> is your favorite? Planning on sharing one with a friend? Put your thoughts below!</span></p><span data-dcnode-id="587" instrument_node=""> </span><span data-dcnode-id="584" instrument_node=""> </span><span data-dcnode-id="582" instrument_node=""> </span><span data-dcnode-id="579" instrument_node=""> </span></div><span data-dcnode-id="577" instrument_node=""> </span><p data-dcnode-id="559" id="breadcrumbs"><span data-dcnode-id="560"><span data-dcnode-id="561"><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everydaypower.com/"><span data-dcnode-id="576" instrument_node="">Everyday Power</span></a><span data-dcnode-id="574" instrument_node=""> </span><span aria-hidden="true" class="bcsep" data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">►</span></span><span data-dcnode-id="571" instrument_node=""> </span><span data-dcnode-id="562"><a data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//everydaypower.com/category/inspirational-quotes/"><span data-dcnode-id="570" instrument_node="">Inspirational Quotes</span></a><span data-dcnode-id="568" instrument_node=""> </span><span aria-hidden="true" class="bcsep" data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">►</span></span><span data-dcnode-id="565" instrument_node=""> </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Positivity Quotes Showing the Power of Optimism</span></span></span></span></span></p><span data-dcnode-id="558" instrument_node=""> </span><div class="mvp-author-info-wrap" data-dcnode-id="532"><span data-dcnode-id="557" instrument_node=""> </span><div class="mvp-author-info-thumb" data-dcnode-id="553"><span data-dcnode-id="556" instrument_node=""> </span><img alt="Nia Simone McLeod" class="avatar avatar-46 photo" data-dcnode-id="555" height="46" loading="lazy" src="https://chatnoir-web
