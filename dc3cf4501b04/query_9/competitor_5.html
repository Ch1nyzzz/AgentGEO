</span><h1 class="post-title" data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">What Is Skin Positivity?</span></h1><span data-dcnode-id="1148" instrument_node="">
</span><div class="post-meta" data-dcnode-id="1134"><span data-dcnode-id="1147" instrument_node="">
							by </span><span class="post-author" data-dcnode-id="1144"><a data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//happiful.com/author/becky/"><span data-dcnode-id="1146" instrument_node="">Becky Wright</span></a></span><span data-dcnode-id="1143" instrument_node=""> on </span><time class="published" data-dcnode-id="1141" datetime="2020-04-17"><span data-dcnode-id="1142" instrument_node="">17 April 2020</span></time><span data-dcnode-id="1140" instrument_node=""> </span><span class="reading-time" data-dcnode-id="1136"><span data-dcnode-id="1139" instrument_node="">Read in </span><span class="eta" data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">4 min</span></span></span><span data-dcnode-id="1135" instrument_node="">
</span></div><span data-dcnode-id="1132" instrument_node="">
</span><a class="scroll-down square light" data-dcnode-id="1128" href="#"><i aria-hidden="true" class="fas fa-chevron-down" data-dcnode-id="1131"></i><span class="screen-reader-text" data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Scroll Down</span></span></a><span data-dcnode-id="1127" instrument_node="">

</span><div class="post-content inner" data-dcnode-id="695"><span data-dcnode-id="1117" instrument_node="">
</span><h2 data-dcnode-id="1114" id="theresagrowingsocialmovementthatschampioningskininallitsblemishednakednessitsencouragingpeopletorethinkandcutouttheshamethatcancomefromhavinglessthanperfectskin"><span data-dcnode-id="1115" instrument_node="">There’s a growing social movement that’s championing skin in all its blemished nakedness. It’s encouraging people to rethink and cut out the shame that can come from having less-than-perfect skin</span></h2><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">In a social media-driven world that prioritises perfection on screen, many of us can feel pressured to hold ourselves to conventional beauty standards. Thanks to the powers that be – makeup, lighting and photo-editing tools – it’s possible to erase any visible sign of ‘imperfection’.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">However, for people struggling with skin conditions, this culture leaves little room for their sense of self-worth. It can, understandably, affect the way you feel about how you look.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><h3 data-dcnode-id="1105" id="thelinkbetweenappearanceandmentalhealth"><span data-dcnode-id="1106" instrument_node="">The link between appearance and mental health</span></h3><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Each year, 13 million people in the UK visit their GP with a skin complaint. Yet, despite the huge number of people affected, there’s a culture of shame around skin conditions, particularly acne. Although teenagers can (and do) face stigma of their own, there are different social factors at play when you have skin problems later in life.</span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">The impact on our wellbeing is vastly underestimated. In a recent survey by the British Skin Foundation, nine out of 10 dermatologists agreed that not enough importance is placed on the psychological effects of skin conditions.</span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">However, thanks to a growing social media movement, there’s an alternative outlet that can help you to feel comfortable and confident in your own skin. Step forward skin positivity.</span></p><span data-dcnode-id="1095" instrument_node="">

</span><p data-dcnode-id="987"><span data-dcnode-id="991" instrument_node="">The movement took off in 2015 when vlogger Em Ford posted a video called </span><a data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DWWTRwj9t-vU" target="_blank"><span data-dcnode-id="990" instrument_node="">You Look Disgusting</span></a><span data-dcnode-id="988" instrument_node=""> online. It revealed all the daily trolling comments she received about her acne. Five years later, the video has had more than 32 million views.</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">The movement has gained so much traction that it’s now going beyond acne. It’s sticking two fingers up to the stigma, abuse, and embarrassment that can stem from a myriad of skin conditions – rosacea, eczema and dermatitis, to name a few.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">To find out more, I spoke to Sarah Perkins, a skin positivity vlogger and creator of Skinstory – a journal that helps you to track patterns between your skin, and potential triggers.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="979" instrument_node="">“It’s almost impossible to go through life without experiencing some form of </span><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhs.uk/live-well/healthy-body/common-skin-conditions/" target="_blank"><span data-dcnode-id="978" instrument_node="">skin condition</span></a><span data-dcnode-id="976" instrument_node="">,” says Sarah. “And, thanks to the shame that comes with a visible skin condition, it’s more than just a physical condition. It affects your emotional wellbeing and confidence, too.</span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">“Social media plays a huge part in this movement, and the more people that post their bare-faced selfies, the wider this message is spread.” And it really is a growing movement – at the time of writing, there are more than 50,000 posts tagged with #skinpositivity on Instagram.</span></p><span data-dcnode-id="971" instrument_node="">
</span><h3 data-dcnode-id="969" id="morethanahashtag"><span data-dcnode-id="970" instrument_node="">More than a hashtag</span></h3><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Scrolling through these posts, I’m blown away by the amount of support that’s present. It’s more than just a hashtag, it’s a community. “Social media allows you to connect with others going through a similar time with their skin,” says Sarah. “It’s taught me that my old insecurities about my skin are shared by so many.”</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="964" instrument_node="">One frequent topic in the captions and comments is </span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhs.uk/conditions/acne/" target="_blank"><span data-dcnode-id="963" instrument_node="">acne</span></a><span data-dcnode-id="961" instrument_node=""> medication. It seems that this is also a place for people to learn from one another. When I ask Sarah about this, she tells me that, for a while, there seemed to be two camps: those who only believed in the natural approach, and those that went for medication. There was something of a divide in the community.</span></p><span data-dcnode-id="959" instrument_node="">

</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">“But, from speaking to thousands of others online, it’s clear that no two people have the same experience with their skin. And, for me, a combination of the two (and a serious dose of self-love) has been a game-changer,” says Sarah.</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="753" instrument_node="">I think that’s the crux of the movement: </span><a data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//happiful.com/how-to-build-a-healthy-body-image/"><span data-dcnode-id="752" instrument_node="">self-love</span></a><span data-dcnode-id="750" instrument_node="">. Skin positivity isn’t about changing the appearance of your skin, it’s about changing the way you see your skin. Because your happiness shouldn’t rely on how good your skin is looking each day.</span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">This isn’t a movement reserved for the realms of social media, though. Nor is it solely for people living with skin conditions. “To me, skin positivity is for anyone. Our attitude towards others with skin conditions needs to change, and that can be done by everyone,” says Sarah.</span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="744" instrument_node="">Perhaps the biggest influencer of </span><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.counselling-directory.org.uk/memberarticles/love-the-skin-you-are-in" target="_blank"><span data-dcnode-id="743" instrument_node="">skin positivity</span></a><span data-dcnode-id="741" instrument_node=""> is the beauty industry – brands that can choose imagery showing ‘real’, unedited skin. Certainly, in the last few years, real skin has become more visible in advertising campaigns. Brands such as Urban Decay and ASOS have committed to using unretouched images to promote their products and, this year, Mattel unveiled a new Barbie doll with vitiligo, in a bid to broaden the diversity of its range. But there’s still a long way to go.</span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Until the rest of the world catches up with these trailblazers, the onus is on us to champion examples of skin positivity. So, try to buy from brands that promote diversity, and call-out those that aren’t doing enough.</span></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="735" instrument_node="">And, if there’s one thing I’ve learnt from this movement that I want you to take away, it’s this: to love yourself, no matter what your skin is doing today. The most important thing is that your </span><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.counselling-directory.org.uk/esteem.html" target="_blank"><span data-dcnode-id="734" instrument_node="">self-worth</span></a><span data-dcnode-id="732" instrument_node=""> is not at the mercy of your skin.</span></p><span data-dcnode-id="730" instrument_node="">
</span><hr data-dcnode-id="729"><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="725"><strong data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Feel inspired by following:</span></strong></p><span data-dcnode-id="724" instrument_node="">
