</span><h2 class="phrase" data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">Mental Health</span></h2><div class="wikiContent" data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">Read this detailed teaching wiki to help sensitively approach the question 'What is mental health?' with children, both in the classroom and at home.</span></div><div class="extraData" data-dcnode-id="1701"><h2 data-dcnode-id="2637"><strong data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">What is mental health? What does mental health mean?</span></strong></h2><span data-dcnode-id="2636" instrument_node="">
</span><p data-dcnode-id="2631"><span data-dcnode-id="2635" instrument_node="">The </span><strong data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">definition of mental health</span></strong><span data-dcnode-id="2632" instrument_node=""> in the national ‘No Health without Mental Health’ policy is this: mental health is a positive state of mind and body, feeling safe and able to cope, with a sense of connection with people, communities and the wider environment.</span></p><span data-dcnode-id="2630" instrument_node="">
</span><p data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">Mental health is an individual's level of psychological wellbeing, which can affect a person's mood and their thoughts, and can sometimes dictate their behaviour. Everybody has mental health, and it can be better, worse or fluctuate depending on the individual and their current life circumstances. Levels of mental health are also influenced by the conditions people are born into, grow up in, live and work in.</span></p><span data-dcnode-id="2627" instrument_node="">
</span><p data-dcnode-id="2623"><strong data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">Mental health includes our emotional, psychological, and social wellbeing</span></strong><span data-dcnode-id="2624" instrument_node="">. It affects how we think, feel, and act. It also helps determine how we handle stress, relate to others, and make choices. Mental health is important at every stage of life, from childhood and adolescence through adulthood.</span></p><span data-dcnode-id="2622" instrument_node="">
</span><p data-dcnode-id="2621"></p><span data-dcnode-id="2620" instrument_node="">
</span><p data-dcnode-id="2617"><a data-dcnode-id="2618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.twinkl.co.uk/resource/talking-about-mental-health-with-another-adult-t-tp-2550431" title="Talking About Mental Health With Another Adult"><img alt="Talking About Mental Health With Another Adult" data-dcnode-id="2619" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.twinkl.co.uk/tw1n/image/private/t_630/image_repo/3b/44/t-tp-2550431-talking-about-mental-health-with-another-adult_ver_2.jpg&amp;raw" width="630"></a></p><span data-dcnode-id="2616" instrument_node="">
</span><p data-dcnode-id="2615"></p><span data-dcnode-id="2614" instrument_node="">
</span><h2 data-dcnode-id="2611"><strong data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">What does it mean to have good mental health?</span></strong></h2><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">Mental health really means the state of your emotional wellbeing, which affects how you think, feel and behave. Having good mental health means more than just not having a mental health disorder; it means that you are able to make the most of your life, reach your potential and cope with the ups and downs of life. Mental health is just as important as physical health for living a happy, healthy and well-rounded life.</span></p><span data-dcnode-id="2607" instrument_node="">
</span><p data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">The World Health Organisation (WHO) defines good mental health as allowing someone to:</span></p><span data-dcnode-id="2604" instrument_node="">
</span><ul data-dcnode-id="2590"><span data-dcnode-id="2603" instrument_node="">
</span><li data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">Realise their abilities</span></li><span data-dcnode-id="2600" instrument_node="">
</span><li data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">Cope with the normal stresses of life</span></li><span data-dcnode-id="2597" instrument_node="">
</span><li data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">Work productively</span></li><span data-dcnode-id="2594" instrument_node="">
</span><li data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">Make a contribution to their community</span></li><span data-dcnode-id="2591" instrument_node="">
</span></ul><span data-dcnode-id="2589" instrument_node="">
</span><p data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">Having good mental health is vital for both individuals and communities to thrive. This is because it allows us to connect with ourselves and others, earn a living and enjoy life.</span></p><span data-dcnode-id="2586" instrument_node="">
</span><p data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">There are a lot of things that can affect our mental health, but one of the main things is stress. This stress can be caused by many things, such as; our jobs, relationships, physical health and perceptions of ourselves.</span></p><span data-dcnode-id="2583" instrument_node="">
</span><p data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">Other factors, such as difficult life experiences, can really affect our mental health and cause more serious issues. For example, poor mental health is associated with job losses, relationship problems, stressful work conditions, gender discrimination and many more factors. It is important we have access to help and support for our mental health when we need it.</span></p><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">More research into mental health is being conducted and it is becoming more important than ever to ensure that you are looking after your mental wellbeing in the same way you would take care of your physical health.</span></p><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2576"></p><span data-dcnode-id="2575" instrument_node="">
</span><h2 data-dcnode-id="2572"><strong data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">What is the difference between mental health and mental wellbeing?</span></strong></h2><span data-dcnode-id="2571" instrument_node="">
</span><p data-dcnode-id="2568"><span data-dcnode-id="2569" style="font-weight: 400;"><span data-dcnode-id="2570" instrument_node="">Now we've answered the question 'what does mental health mean?', let's address the difference between mental health and mental wellbeing. Mental wellbeing concerns your thoughts and feelings, and how you manage the ups and downs of daily life. </span></span></p><span data-dcnode-id="2567" instrument_node="">
</span><p data-dcnode-id="2561"><span data-dcnode-id="2562" style="font-weight: 400;"><span data-dcnode-id="2566" instrument_node="">While mental wellbeing is not the same thing as mental health, the two things do influence one another. </span><em data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">Prolonged periods of low mental wellbeing can cause mental health conditions like anxiety and depression to develop</span></em><span data-dcnode-id="2563" instrument_node="">. </span></span></p><span data-dcnode-id="2560" instrument_node="">
</span><p data-dcnode-id="2557"><span data-dcnode-id="2558" style="font-weight: 400;"><span data-dcnode-id="2559" instrument_node="">People who suffer from mental health conditions may experience low mental wellbeing frequently, although there will still be periods when they can maintain good mental wellbeing.</span></span></p><span data-dcnode-id="2556" instrument_node="">
</span><p data-dcnode-id="2552"><a data-dcnode-id="2553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.twinkl.co.uk/resource/staff-wellbeing-balance-for-wellbeing-t-tp-2549708" title="Balance for Wellbeing"><span data-dcnode-id="2554" style="font-weight: 400;"><img alt="Balance for Wellbeing" data-dcnode-id="2555" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.twinkl.co.uk/tw1n/image/private/t_630/image_repo/fe/0d/t-tp-2549708-staff-wellbeing-balance-for-wellbeing-_ver_5.jpg&amp;raw" width="630"></span></a></p><span data-dcnode-id="2551" instrument_node="">
</span><h2 data-dcnode-id="2548"><strong data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">What are the characteristics of good mental wellbeing?</span></strong></h2><span data-dcnode-id="2547" instrument_node="">
</span><p data-dcnode-id="2544"><span data-dcnode-id="2545" style="font-weight: 400;"><span data-dcnode-id="2546" instrument_node="">It’s important to clarify that good mental wellbeing does not mean the absence of negative thoughts and emotions. Feelings like anger, sadness, overwhelm and a range of other emotions may all still arise, but good mental wellbeing means you’re able to understand and deal with the feelings. Having good mental wellbeing means you:</span></span></p><span data-dcnode-id="2543" instrument_node="">
</span><ul data-dcnode-id="2517"><span data-dcnode-id="2542" instrument_node="">
</span><li data-dcnode-id="2539" style="font-weight: 400;"><span data-dcnode-id="2540" style="font-weight: 400;"><span data-dcnode-id="2541" instrument_node="">are confident in yourself;</span></span></li><span data-dcnode-id="2538" instrument_node="">
</span><li data-dcnode-id="2535" style="font-weight: 400;"><span data-dcnode-id="2536" style="font-weight: 400;"><span data-dcnode-id="2537" instrument_node="">build and maintain positive relationships with others;</span></span></li><span data-dcnode-id="2534" instrument_node="">
</span><li data-dcnode-id="2531" style="font-weight: 400;"><span data-dcnode-id="2532" style="font-weight: 400;"><span data-dcnode-id="2533" instrument_node="">have a sense of meaning and purpose;</span></span></li><span data-dcnode-id="2530" instrument_node="">
</span><li data-dcnode-id="2527" style="font-weight: 400;"><span data-dcnode-id="2528" style="font-weight: 400;"><span data-dcnode-id="2529" instrument_node="">live and work productively;</span></span></li><span data-dcnode-id="2526" instrument_node="">
</span><li data-dcnode-id="2523" style="font-weight: 400;"><span data-dcnode-id="2524" style="font-weight: 400;"><span data-dcnode-id="2525" instrument_node="">manage the stresses of daily life;</span></span></li><span data-dcnode-id="2522" instrument_node="">
</span><li data-dcnode-id="2519" style="font-weight: 400;"><span data-dcnode-id="2520" style="font-weight: 400;"><span data-dcnode-id="2521" instrument_node="">cope with change.</span></span></li><span data-dcnode-id="2518" instrument_node="">
</span></ul><span data-dcnode-id="2516" instrument_node="">
</span><p data-dcnode-id="2512"><a data-dcnode-id="2513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.twinkl.co.uk/resource/supporting-your-self-esteem-and-confidence-information-for-staff-t-tp-2550436" title="Supporting Your Self-Esteem and Confidence"><span data-dcnode-id="2514" style="font-weight: 400;"><img alt="Supporting Your Self-Esteem and Confidence" data-dcnode-id="2515" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.twinkl.co.uk/tw1n/image/private/t_630/image_repo/8f/72/t-tp-2550436-supporting-your-self-esteem-and-confidence-information-for-staff_ver_2.jpg&amp;raw" width="630"></span></a></p><span data-dcnode-id="2511" instrument_node="">
</span><h2 data-dcnode-id="2508"><strong data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">What can affect mental wellbeing?</span></strong></h2><span data-dcnode-id="2507" instrument_node="">
</span><p data-dcnode-id="2504"><span data-dcnode-id="2505" style="font-weight: 400;"><span data-dcnode-id="2506" instrument_node="">Mental wellbeing is often impacted by events that are out of our control, for example:</span></span></p><span data-dcnode-id="2503" instrument_node="">
</span><ul data-dcnode-id="2477"><span data-dcnode-id="2502" instrument_node="">
</span><li data-dcnode-id="2499" style="font-weight: 400;"><span data-dcnode-id="2500" style="font-weight: 400;"><span data-dcnode-id="2501" instrument_node="">Loss.</span></span></li><span data-dcnode-id="2498" instrument_node="">
</span><li data-dcnode-id="2495" style="font-weight: 400;"><span data-dcnode-id="2496" style="font-weight: 400;"><span data-dcnode-id="2497" instrument_node="">Trauma.</span></span></li><span data-dcnode-id="2494" instrument_node="">
</span><li data-dcnode-id="2491" style="font-weight: 400;"><span data-dcnode-id="2492" style="font-weight: 400;"><span data-dcnode-id="2493" instrument_node="">Social disadvantages.</span></span></li><span data-dcnode-id="2490" instrument_node="">
</span><li data-dcnode-id="2487" style="font-weight: 400;"><span data-dcnode-id="2488" style="font-weight: 400;"><span data-dcnode-id="2489" instrument_node="">Health conditions.</span></span></li><span data-dcnode-id="2486" instrument_node="">
</span><li data-dcnode-id="2483" style="font-weight: 400;"><span data-dcnode-id="2484" style="font-weight: 400;"><span data-dcnode-id="2485" instrument_node="">Stress.</span></span></li><span data-dcnode-id="2482" instrument_node="">
</span><li data-dcnode-id="2479" style="font-weight: 400;"><span data-dcnode-id="2480" style="font-weight: 400;"><span data-dcnode-id="2481" instrument_node="">Discrimination.</span></span></li><span data-dcnode-id="2478" instrument_node="">
</span></ul><span data-dcnode-id="2476" instrument_node="">
</span><p data-dcnode-id="2473"><span data-dcnode-id="2474" style="font-weight: 400;"><span data-dcnode-id="2475" instrument_node="">How we respond to such events can affect our mental wellbeing. Our habits may not be conducive to good mental wellbeing; for example, withdrawing instead of seeking support and fearing the worst rather than remaining open to different possibilities can both have a negative impact on wellbeing. Developing good habits will improve mental wellbeing so that we are better prepared to face challenges when they arise.</span></span></p><span data-dcnode-id="2472" instrument_node="">
</span><h2 data-dcnode-id="2469"><strong data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">How can you improve mental wellbeing?</span></strong></h2><span data-dcnode-id="2468" instrument_node="">
</span><h4 data-dcnode-id="2465"><strong data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">Connect with other people</span></strong></h4><span data-dcnode-id="2464" instrument_node="">
</span><p data-dcnode-id="2461"><span data-dcnode-id="2462" style="font-weight: 400;"><span data-dcnode-id="2463" instrument_node="">Relationships with others impact our mental wellbeing. They can contribute to feelings of self-worth, provide emotional support and allow us to share positive experiences with others.</span></span></p><span data-dcnode-id="2460" instrument_node="">
</span><p data-dcnode-id="2457"><span data-dcnode-id="2458" style="font-weight: 400;"><span data-dcnode-id="2459" instrument_node="">To build stronger relationships, try and take time out of your day to be with friends and family. Interactions on social media do not always substitute for meaningful relationships, so try and get into the habit of meeting friends in person if it’s safe to do so.</span></span></p><span data-dcnode-id="2456" instrument_node="">
</span><h4 data-dcnode-id="2453"><strong data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Exercise</span></strong></h4><span data-dcnode-id="2452" instrument_node="">
</span><p data-dcnode-id="2449"><span data-dcnode-id="2450" style="font-weight: 400;"><span data-dcnode-id="2451" instrument_node="">Being physically active improves mental wellbeing by increasing self-esteem, helping you to achieve goals and making chemical changes in the brain which promote good moods. Finding a way to be active with friends is a good way to improve mental wellbeing.</span></span></p><span data-dcnode-id="2448" instrument_node="">
</span><h4 data-dcnode-id="2445"><strong data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Learn a new skill</span></strong></h4><span data-dcnode-id="2444" instrument_node="">
</span><p data-dcnode-id="2441"><span data-dcnode-id="2442" style="font-weight: 400;"><span data-dcnode-id="2443" instrument_node="">Learning something new also raises self-esteem, while promoting a sense of purpose. Think of different hobbies you’d like to try and use online resources to support you. Don’t put any pressure on yourself to be good at the activity and make sure it’s something you enjoy.</span></span></p><span data-dcnode-id="2440" instrument_node="">
</span><h4 data-dcnode-id="2437"><strong data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">Be kind and give to others</span></strong></h4><span data-dcnode-id="2436" instrument_node="">
</span><p data-dcnode-id="2433"><span data-dcnode-id="2434" style="font-weight: 400;"><span data-dcnode-id="2435" instrument_node="">Kindness creates positive feelings and helps you connect with other people. Even small acts of kindness like spending time with people who need company and offering to help others can improve mental wellbeing.</span></span></p><span data-dcnode-id="2432" instrument_node="">
</span><h4 data-dcnode-id="2429"><strong data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">Be present in the moment (mindfulness)</span></strong></h4><span data-dcnode-id="2428" instrument_node="">
</span><p data-dcnode-id="2425"><span data-dcnode-id="2426" style="font-weight: 400;"><span data-dcnode-id="2427" instrument_node="">Paying attention to the present moment makes life richer and more exciting. Plus, with your mind less likely to wander towards negative thoughts, it’ll improve your mental wellbeing and help you understand yourself better.</span></span></p><span data-dcnode-id="2424" instrument_node="">
</span><p data-dcnode-id="2416"><span data-dcnode-id="2422" style="font-weight: 400;"><span data-dcnode-id="2423" instrument_node="">Find out more about mindfulness with this </span></span><a data-dcnode-id="2419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.twinkl.co.uk/teaching-wiki/mindfulness"><span data-dcnode-id="2420" style="font-weight: 400;"><span data-dcnode-id="2421" instrument_node="">Mindfulness Teaching Wiki</span></span></a><span data-dcnode-id="2417" style="font-weight: 400;"><span data-dcnode-id="2418" instrument_node="">.</span></span></p><span data-dcnode-id="2415" instrument_node="">
</span><p data-dcnode-id="2411"><a data-dcnode-id="2412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.twinkl.co.uk/resource/the-five-ways-to-wellbeing-t-tp-2550434" title="The Five Ways to Wellbeing"><span data-dcnode-id="2413" style="font-weight: 400;"><img alt="The Five Ways to Wellbeing" data-dcnode-id="2414" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.twinkl.co.uk/tw1n/image/private/t_630/image_repo/a1/dc/t-tp-2550434-the-five-ways-to-wellbeing-_ver_2.jpg&amp;raw" width="630"></span></a></p><span data-dcnode-id="2410" instrument_node="">
</span><h2 data-dcnode-id="2407"><strong data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">What is emotional wellbeing?</span></strong></h2><span data-dcnode-id="2406" instrument_node="">
</span><p data-dcnode-id="2403"><span data-dcnode-id="2404" style="font-weight: 400;"><span data-dcnode-id="2405" instrument_node="">Emotional wellbeing refers to a person’s emotional experience. It concerns how we think, feel and relate to ourselves and others. People who are emotionally healthy can manage their own thoughts, feelings, behaviours, keeping problems in perspective and coping with challenges. Emotional wellbeing doesn’t mean a person is happy all the time, but rather they’re aware of their emotions and can manage negative feelings.</span></span></p><span data-dcnode-id="2402" instrument_node="">
</span><h2 data-dcnode-id="2399"><strong data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">Tips to improve emotional wellbeing:</span></strong></h2><span data-dcnode-id="2398" instrument_node="">
</span><ul data-dcnode-id="2368"><span data-dcnode-id="2397" instrument_node="">
</span><li data-dcnode-id="2394" style="font-weight: 400;"><span data-dcnode-id="2395" style="font-weight: 400;"><span data-dcnode-id="2396" instrument_node="">Try and be aware of your emotions and reactions.</span></span></li><span data-dcnode-id="2393" instrument_node="">
</span><li data-dcnode-id="2390" style="font-weight: 400;"><span data-dcnode-id="2391" style="font-weight: 400;"><span data-dcnode-id="2392" instrument_node="">Express feelings in appropriate ways rather than holding onto them or reacting angrily.</span></span></li><span data-dcnode-id="2389" instrument_node="">
</span><li data-dcnode-id="2386" style="font-weight: 400;"><span data-dcnode-id="2387" style="font-weight: 400;"><span data-dcnode-id="2388" instrument_node="">Give yourself time to think before acting.</span></span></li><span data-dcnode-id="2385" instrument_node="">
</span><li data-dcnode-id="2382" style="font-weight: 400;"><span data-dcnode-id="2383" style="font-weight: 400;"><span data-dcnode-id="2384" instrument_node="">Use techniques like breathing and meditation to manage stress.</span></span></li><span data-dcnode-id="2381" instrument_node="">
</span><li data-dcnode-id="2378" style="font-weight: 400;"><span data-dcnode-id="2379" style="font-weight: 400;"><span data-dcnode-id="2380" instrument_node="">Focus on the positive things in your life and don’t push yourself too hard.</span></span></li><span data-dcnode-id="2377" instrument_node="">
</span><li data-dcnode-id="2374" style="font-weight: 400;"><span data-dcnode-id="2375" style="font-weight: 400;"><span data-dcnode-id="2376" instrument_node="">Exercise regularly and look after your physical health.</span></span></li><span data-dcnode-id="2373" instrument_node="">
</span><li data-dcnode-id="2370" style="font-weight: 400;"><span data-dcnode-id="2371" style="font-weight: 400;"><span data-dcnode-id="2372" instrument_node="">Connect with others.</span></span></li><span data-dcnode-id="2369" instrument_node="">
</span></ul><span data-dcnode-id="2367" instrument_node="">
</span><h2 data-dcnode-id="2364"><strong data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">What are the benefits of positive mental health?</span></strong></h2><span data-dcnode-id="2363" instrument_node="">
</span><p data-dcnode-id="2358"><span data-dcnode-id="2362" instrument_node="">By having </span><strong data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">positive mental health</span></strong><span data-dcnode-id="2359" instrument_node="">, you can lead a much happier life by being more productive, more positive towards yourself and to others and enjoy increased levels of motivations for doing whatever it is that you love to do</span></p><span data-dcnode-id="2357" instrument_node="">
</span><p data-dcnode-id="2354"><a data-dcnode-id="2355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.twinkl.co.uk/resource/t2-p-254-an-introduction-to-mental-health-powerpoint" title="An Introduction to Mental Health PowerPoint"><img alt="what is mental health?" data-dcnode-id="2356" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.twinkl.co.uk/tw1n/image/private/t_630/image_repo/64/d8/t2-p-254-an-introduction-to-mental-health-powerpoint_ver_2.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" width="630"></a></p><span data-dcnode-id="2353" instrument_node="">
</span><h2 data-dcnode-id="2350"><strong data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Our beliefs and mental health</span></strong></h2><span data-dcnode-id="2349" instrument_node="">
</span><p data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Mental health simply means how we feel and think, as well as the health of our thought patterns and behaviours. Underlying beliefs can affect our mental health. These may be beliefs we're not consciously aware of. We all have beliefs about ourselves, our lives and the world, which influence the way we live our lives and how we feel inside. These may be beliefs we picked up from our parents or carers, or from the world around us.</span></p><span data-dcnode-id="2346" instrument_node="">
</span><p data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">For example, if you have a belief that you're not good enough because you didn't do as well as your siblings in school and adults around you told you that you had to work harder, this will impact you in your daily life as an adult. You may be anxious and believe you're not doing well enough in your job, so you have sleepless nights to catch up. Although you may think this is to do a good job and impress your boss, or even prove you're good enough to your boss, it's actually driven by your deep inner belief that you're not good enough. Ultimately, the person in this scenario is trying to prove he is good enough to himself.</span></p><span data-dcnode-id="2343" instrument_node="">
</span><p data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">But, there is good news! When we become aware of these negative beliefs, we can work to reprogram them. Changing deep beliefs requires us to repeat affirmations to ourselves and feel the positive emotions associated with these. For example, we can say to ourselves "I am more than good enough! I'm amazing!" in the mirror each morning, afternoon and evening and feel this love in our hearts. This will wire in a new positive belief and transform the way you think about yourself. Our mental health will benefit massively from transforming our beliefs to positive, self-supporting ones. Our confidence and happiness are bound to increase as we live the great life we've designed for ourselves.</span></p><span data-dcnode-id="2340" instrument_node="">
</span><h2 data-dcnode-id="2337"><strong data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">Why should we teach about mental health?</span></strong></h2><span data-dcnode-id="2336" instrument_node="">
</span><p data-dcnode-id="2331"><span data-dcnode-id="2335" instrument_node="">With mental health being such a prominent issue in the 21st century, it's becoming more and more important to make children aware of their own mental health. Not only will this make them aware of the </span><em data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">importance of practising mindfulness</span></em><span data-dcnode-id="2332" instrument_node=""> and looking after their own mental health in general, but it will also make them understand just how their actions can affect others and their wellbeing.</span></p><span data-dcnode-id="2330" instrument_node="">
</span><p data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">There are many topics that fall under the subject of mental health, for example:</span></p><span data-dcnode-id="2327" instrument_node="">
</span><ul data-dcnode-id="2309"><span data-dcnode-id="2326" instrument_node="">
</span><li data-dcnode-id="2323"><strong data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">Mindfulness.</span></strong></li><span data-dcnode-id="2322" instrument_node="">
</span><li data-dcnode-id="2319"><strong data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Emotions.</span></strong></li><span data-dcnode-id="2318" instrument_node="">
</span><li data-dcnode-id="2315"><strong data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">Self-esteem.</span></strong></li><span data-dcnode-id="2314" instrument_node="">
</span><li data-dcnode-id="2311"><strong data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">Acts of kindness.</span></strong></li><span data-dcnode-id="2310" instrument_node="">
</span></ul><span data-dcnode-id="2308" instrument_node="">
</span><p data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">Teaching about mental health will help children understand and take notice of any warning signs that themselves, or someone they might know, may be struggling with their mental health. It will also teach them techniques they can use to help cope with any decrease in mental health, and give them advice on how to interact with others who may be in a period of poor mental health.</span></p><span data-dcnode-id="2305" instrument_node="">
</span><p data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">Equipping children at an early age about signs such as social withdrawal, will give ourselves and the kids the tools to help one another.</span></p><span data-dcnode-id="2302" instrument_node="">
</span><h2 data-dcnode-id="2299"><strong data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">What are the effects of poor mental health?</span></strong></h2><span data-dcnode-id="2298" instrument_node="">
</span><p data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">Mental health issues can affect a person's ability to participate in activities that will positively influence their physical health and so on can often follow the other.</span></p><span data-dcnode-id="2295" instrument_node="">
</span><p data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">It's also important to show children how issues affecting a person's mental health can manifest in a number of different ways, such as eating disorders, anxiety, depression and, in more extreme cases, self-harm and suicidal thoughts.</span></p><span data-dcnode-id="2292" instrument_node="">
</span><p data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">As our kids are exposed to social media and other technologies along with television and magazines, it is important to ensure that they are not comparing themselves to others, especially when it comes to body image.</span></p><span data-dcnode-id="2289" instrument_node="">

p-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1800" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="1795"><use class="ytp-svg-shadow" data-dcnode-id="1797" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1798" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1796" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=Y246PRSXNsQ" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></p><span data-dcnode-id="1780" instrument_node="">
</span><h2 data-dcnode-id="1777"><strong data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">How to teach about mental health in the classroom</span></strong></h2><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Approaching a serious matter such as mental health in the classroom can be difficult, especially with KS1 &amp; KS2 classes. Twinkl's specially designed resources are meant to make the introduction of mental health a positive and inoffensive thing.</span></p><span data-dcnode-id="1773" instrument_node="">
</span><p data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">Good mental health will assist with the kids being able to express themselves more clearly, by offering a safe space where they are free to discuss their innermost thoughts and feelings without judgement and instead with love and support.</span></p><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">It may be difficult for a child to open up about a specific worry or troubling thought in front of the whole class, be sure to offer them the opportunity to discuss problems with you one on one so that they can feel more comfortable.</span></p><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">A good way of introducing this topic might be on World Mental Health Week, where you can prepare an hour a day for the whole week that focusses on a different aspect of mental health. This will create a positive first impression of this vital topic and will allow for discussions and encourage whole-class engagement.</span></p><span data-dcnode-id="1764" instrument_node="">
</span><p data-dcnode-id="1761"><a data-dcnode-id="1762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/resource/mind-talking-about-your-mental-health-assembly-pack-t-tp-2550432" title="Talking About Your Mental Health Assembly Pack"><img alt="Talking About Your Mental Health Assembly" data-dcnode-id="1763" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.twinkl.co.uk/tw1n/image/private/t_630/image_repo/e4/fe/t-tp-2550432-mind-talking-about-your-mental-health-assembly-pack_ver_3.jpg&amp;raw" width="630"></a></p><span data-dcnode-id="1760" instrument_node="">
</span><h2 data-dcnode-id="1757"><strong data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">How to teach about mental health at home</span></strong></h2><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Much like in the classroom, it can be intimidating trying to introduce your child to such a serious topic. This doesn't have to be the case.</span></p><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Be as natural and relaxed as possible when explaining what mental health is - help to show your child that it's not something to be afraid of. It's natural and affects everyone in different ways and in different times. Let them know that you're there to answer any questions they might have or are there just to listen to their worries.</span></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1747"><a data-dcnode-id="1748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/resource/talking-to-your-child-about-their-mental-health-t-tp-2550433" title="Talking To Your Child About Mental Health"><img alt="Talking to your Child about Mental Health" data-dcnode-id="1749" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.twinkl.co.uk/tw1n/image/private/t_630/image_repo/5f/88/t-tp-2550433-talking-to-your-child-about-their-mental-health_ver_2.jpg&amp;raw" width="630"></a></p><span data-dcnode-id="1746" instrument_node="">
</span><h2 data-dcnode-id="1743"><strong data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">What is mindfulness?</span></strong></h2><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1741" instrument_node="">Introduce your kids to </span><a data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/blog/mental-health-awareness-week-2021-teaching-ideas-and-activities"><span data-dcnode-id="1740" instrument_node="">Mental Health Awareness Week</span></a><span data-dcnode-id="1738" instrument_node="">! You can use our mindfulness and mental health resources such as our colouring pages or brain break cards to help them relax and take time to understand their thoughts and feelings and why it is that they feel that way.</span></p><span data-dcnode-id="1736" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Use soothing music around the home to bring the level of energy down if the house is feeling chaotic, encourage the kids to take a moment to be calm and reflect and breathe deeply.</span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Children have been found to actively worry about their parents, whether they are happy and whether they have enough money, by allowing more honest and open conversations to take place, we may be able to help our children feel a little less stressed or anxious.</span></p><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1727"><a data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/resource/positivity-colouring-pack-t-tp-2549451" rel="noopener" target="_blank"><img alt="" data-dcnode-id="1729" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.twinkl.co.uk/tw1n/image/private/t_630/image_repo/a7/9e/t-tp-2549451-positivity-colouring-pack_ver_2.jpg&amp;raw" width="630"></a></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1723"><em data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">This teaching wiki is provided for informational and educational purposes only. It is intended to offer general information and should not be taken as professional advice on mental health. As information on mental health is complex and a developing area, we do not warrant that the information provided is correct. You should not rely on the material included within this resource and we do not accept any responsibility if you do. You should undertake proper and relevant training before teaching on mental health. These resources are intended to support you once you have received such training. It is up to you to contact a suitably qualified health professional if you are concerned about your mental health and it is up to you to advise your students to contact a suitably qualified health professional if they are concerned about their mental health. By using this resource, you acknowledge that you are responsible for the safety of those participating or involved with using this resource, including staff, students, parents and children. It is up to you to follow your school or organisation’s relevant policies and procedures (including those relating to safeguarding) should your use of this resource raise anything covered by those policies, and to amend the activities/information in this resource accordingly when used.</span></em></p><span data-dcnode-id="1722" instrument_node="">
</span><h2 data-dcnode-id="1719"><strong data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Teaching Mental Health Awareness in Schools Twinkl Video:</span></strong></h2><span data-dcnode-id="1718" instrument_node="">
