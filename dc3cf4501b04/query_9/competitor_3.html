56"><span data-dcnode-id="1458" instrument_node="">Let’s take a closer look at toxic positivity, why it’s harmful and how to move toward genuine positivity.</span><br data-dcnode-id="1457"></p></div><div class="auto-toc-wrapper" data-dcnode-id="1401"><div class="blog-toc-wrapper" data-dcnode-id="1402" id="auto-toc-wrapper"><div class="w-embed" data-dcnode-id="1452"></div><div class="toc-heading" data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Table of contents</span></div><span data-dcnode-id="1449" instrument_node="">

      Taking leave of toxic positivity
    </span></a></div></div><div class="blog-rich-text w-richtext" data-dcnode-id="1128"><h2 data-dcnode-id="1399" id="toc-section-1"><span data-dcnode-id="1400" instrument_node="">Is toxic positivity harmful? What the research says</span></h2><ul data-dcnode-id="1362" role="list"><li data-dcnode-id="1394"><span data-dcnode-id="1398" instrument_node="">People with higher levels of optimism tend to live longer. [</span><a data-dcnode-id="1396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.harvard.edu/blog/if-you-are-happy-and-you-know-it-you-may-live-longer-2019101618020" target="_blank"><span data-dcnode-id="1397" instrument_node="">1</span></a><span data-dcnode-id="1395" instrument_node="">]</span></li><li data-dcnode-id="1386"><span data-dcnode-id="1393" instrument_node="">Thought suppression, particularly around thoughts that might induce negative emotions, is linked to a suppressed immune system</span><strong data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">.</span></strong><span data-dcnode-id="1390" instrument_node=""> In one study, participants who suppressed thoughts about emotional topics showed a decrease in lymphocytes (white blood cells in the immune system). [</span><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//psycnet.apa.org/doiLanding%3Fdoi%3D10.1037%252F0022-3514.75.5.1264" target="_blank"><span data-dcnode-id="1389" instrument_node="">2</span></a><span data-dcnode-id="1387" instrument_node="">]</span></li><li data-dcnode-id="1381"><span data-dcnode-id="1385" instrument_node="">Accepting negative thoughts and emotions is linked to better psychological health, such as higher life satisfaction and lower depressive symptoms. In a 2017 research article discussing the results of three different studies, the research authors concluded, "Overall, these results suggest that individuals who accept rather than judge their mental experiences may attain better psychological health, in part because acceptance helps them experience less negative emotion in response to stressors." [</span><a data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/28703602/" target="_blank"><span data-dcnode-id="1384" instrument_node="">3</span></a><span data-dcnode-id="1382" instrument_node="">]&nbsp;</span></li><li data-dcnode-id="1376"><span data-dcnode-id="1380" instrument_node="">Suppressing negative emotions and amplifying positive ones in front of their kids made parents feel less authentic and less emotionally well. [</span><a data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedaily.com/releases/2016/02/160223132539.htm" target="_blank"><span data-dcnode-id="1379" instrument_node="">4</span></a><span data-dcnode-id="1377" instrument_node="">]</span></li><li data-dcnode-id="1371"><span data-dcnode-id="1375" instrument_node="">And here's an extremely relevant study given the current COVID-19 pandemic: In 2018, during the Zika outbreak, Penn State researchers found that pregnant women who suppressed their fears about the outbreak had higher levels of fear later, prompting a vicious cycle of emotional suppression. [</span><a data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedaily.com/releases/2018/07/180710153800.htm" target="_blank"><span data-dcnode-id="1374" instrument_node="">5</span></a><span data-dcnode-id="1372" instrument_node="">]</span></li><li data-dcnode-id="1363"><span data-dcnode-id="1370" instrument_node="">Forcing yourself to hide negative emotions may lead to </span><em data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">more </span></em><span data-dcnode-id="1367" instrument_node="">negative emotions. In one study, people who tried to disguise their feelings of disgust ended up thinking more negatively because they weren’t allowed to express themselves. The study authors wrote, “Previous research had already revealed that people who often suppress their emotions tend to be less healthy.“ [</span><a data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedaily.com/releases/2009/03/090312093916.htm" target="_blank"><span data-dcnode-id="1366" instrument_node="">6</span></a><span data-dcnode-id="1364" instrument_node="">]</span></li></ul><h2 data-dcnode-id="1360" id="toc-section-2"><span data-dcnode-id="1361" instrument_node="">What is toxic positivity?</span></h2><p data-dcnode-id="1357"><span data-dcnode-id="1359" instrument_node="">More than just looking on the bright side of things, toxic positivity specifically denies the reality of the situation. It is a refusal to accept negative events or emotions that are very real. Quite simply, it’s a form of emotional suppression (bottling up the “bad” feelings), a tactic that has been proven by research to be dangerous to your health.&nbsp;</span><br data-dcnode-id="1358"></p><p data-dcnode-id="1348"><span data-dcnode-id="1356" instrument_node="">“</span><strong data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Toxic positivity involves ignoring your painful emotions and skipping right over to always trying to be positive</span></strong><span data-dcnode-id="1353" instrument_node="">,” explains licensed psychologist </span><a data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drpeggydelong.com/" target="_blank"><span data-dcnode-id="1352" instrument_node="">Peggy DeLong, Psy.D</span></a><span data-dcnode-id="1350" instrument_node="">. “It can be toxic because we cannot be truly happy if we ignore painful or uncomfortable feelings, thoughts and experiences.”</span><br data-dcnode-id="1349"></p><p data-dcnode-id="1339"><span data-dcnode-id="1347" instrument_node="">But wait—isn’t being positive linked to better health outcomes? Yes, but there is a distinction to make between </span><em data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">toxic</span></em><span data-dcnode-id="1344" instrument_node=""> positivity and </span><em data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">healthy</span></em><span data-dcnode-id="1341" instrument_node=""> positivity.</span><br data-dcnode-id="1340"></p><p data-dcnode-id="1330"><span data-dcnode-id="1338" instrument_node="">“</span><strong data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">The difference between toxic and healthy positivity is that toxic positivity is about the other person's need for you to feel better,</span></strong><span data-dcnode-id="1335" instrument_node="">” explains psychotherapist </span><a data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aprilbennettcounseling.com/" target="_blank"><span data-dcnode-id="1334" instrument_node="">April Bennett, Ed.S, LPC</span></a><span data-dcnode-id="1332" instrument_node="">. “It's essentially reactive against us instead of embracing. It also disregards the message that suffering brings, which is always important and needs to be respected.”</span><br data-dcnode-id="1331"></p><p data-dcnode-id="1325"><span data-dcnode-id="1329" instrument_node="">Healthy positivity, on the other hand, “does not exclude suffering or disturbance, but instead integrates it and finds a home for it,” Bennett says. “Healthy positivity believes in our ability to be balanced—not as an achievement, but as a state that is always there for us, which when we return to it feels like remembering. Healthy positivity trusts our capacity to heal without excluding any parts of ourselves. … </span><strong data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">The root of toxic positivity is our own discomfort with suffering, our own or someone else's</span></strong><span data-dcnode-id="1326" instrument_node="">.”&nbsp;</span></p><h2 data-dcnode-id="1323" id="toc-section-3"><span data-dcnode-id="1324" instrument_node="">What are toxic positivity examples?</span></h2><p data-dcnode-id="1320"><span data-dcnode-id="1322" instrument_node="">Toxic positivity commonly comes up during discussions about grief, a topic that can be uncomfortable for others to hear about, causing them to resort to toxic positivity. I asked therapists and coaches to share some examples.</span><br data-dcnode-id="1321"></p><p data-dcnode-id="1317"><span data-dcnode-id="1319" instrument_node="">“Toxic positivity can happen after someone has experienced the death of a loved one,” says DeLong. “Well-meaning friends may say, ‘be happy for the memories,’ ‘focus on the good times,’ ‘at least she lived a long life,’ etc. These statements do not validate the grief, the emotional pain that comes naturally when a loved one dies. Feeling grief is necessary for healing. This is toxic positivity because it does not support the person in feeling the pain, which is necessary for healing.”</span><br data-dcnode-id="1318"></p><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">“My grief clients frequently report that people are always telling them ‘everything happens for a reason,’” Bennett shares. “What an awful thing to say to someone who is suffering. It tells them not to feel and not to make anyone else uncomfortable with their feeling. Much better to say, ‘I know nothing makes sense or feels good right now, and everything seems meaningless. I'm here for you, and I want to hear about it.’ That statement actually creates meaning in that moment, out of connection.”</span></p><p data-dcnode-id="1309"><span data-dcnode-id="1314" instrument_node="">“As a personal example, I had spent years denying my own emotional truths by masking them with toxic positivity,” says Joyce Bao, a purpose strategist and life transformation coach. “Instead of admitting some of my negative emotions, such as shame, guilt, fear, I would project an image of positivity and cheerfulness. After years of denying my truths, I ended up burning out at work because I did not want to be vulnerable, to share my truths - that I was struggling, overwhelmed and needed help. Now, standing in my truth is my </span><a data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fingerprintforsuccess.com/blog/personal-power" target="_blank"><span data-dcnode-id="1313" instrument_node="">personal power</span></a><span data-dcnode-id="1311" instrument_node="">, and my mission is to help other women own their truth as well!”&nbsp;</span><br data-dcnode-id="1310"></p><p data-dcnode-id="1303"><span data-dcnode-id="1308" instrument_node="">“For many years, I felt guilty about struggling with a failing relationship,” says life coach </span><a data-dcnode-id="1306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.clairepearsoncoaching.com/" target="_blank"><span data-dcnode-id="1307" instrument_node="">Claire Pearson</span></a><span data-dcnode-id="1305" instrument_node="">. “I was unable to allow myself to feel the hardship because I would always tell myself, ‘it could be worse.’ This is toxic positivity. The truth is, it could have been worse. But that does not change the fact that a relationship I entered into with full hopes of a lifetime love, of raising children together, and having a partner later in life was lost. And I needed to grieve that. I needed to be angry about it.”&nbsp;</span><br data-dcnode-id="1304"></p><p data-dcnode-id="1297"><span data-dcnode-id="1302" instrument_node="">“This came up a lot in the COVID-19 pandemic,” says licensed psychologist </span><a data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vicipsychcare.com/" target="_blank"><span data-dcnode-id="1301" instrument_node="">Nicole Lacherza-Drew, Psy.D.</span></a><span data-dcnode-id="1299" instrument_node=""> “There were suddenly these social media posts saying that if you didn’t come out of the pandemic doing great things, there was something wrong with you. If you didn’t come out of the stay-at-home situation learning a new skill or if you weren’t constantly being positive about being ‘safe’ at home instead of ‘stuck’ at home, you were doing something wrong.&nbsp;</span><br data-dcnode-id="1298"></p><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">For the COVID-19 pandemic, people were just trying to survive. Many of us got thrown into situations we never imagined and were being told different things. At the end of the day, the pandemic and staying at home during lockdown was detrimental and really sucked for some people, and that’s okay.”&nbsp;</span></p><h2 data-dcnode-id="1293" id="toc-section-4"><span data-dcnode-id="1294" instrument_node="">When does positivity turn toxic?</span></h2><p data-dcnode-id="1290"><span data-dcnode-id="1292" instrument_node="">Positivity turns toxic when someone:</span><br data-dcnode-id="1291"></p><ul data-dcnode-id="1277" role="list"><li data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Denies something that is real, whether it’s a negative situation or a negative emotion</span></li><li data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Encourages emotional suppression (e.g., “Don't be so negative! Just focus on the positive.”)</span></li><li data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Refuses to address a problem</span></li><li data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Dismisses or minimizes one’s emotions, pain or concerns</span></li><li data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Shames one’s self or others for feeling certain emotions</span></li><li data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Insinuates that “negative thinking” caused a bad outcome</span></li></ul><h2 data-dcnode-id="1275" id="toc-section-5"><span data-dcnode-id="1276" instrument_node="">Where does toxic positivity come from?</span></h2><h3 data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Fear of judgment</span></h3><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Toxic positivity originates from our fear of negative feelings or fear of judgment because of them. For example, we might turn to toxic positivity when we don’t want to be a “downer” to our friends and family. We may fear that, by showing our vulnerability, our loved ones will judge us, so we put on a happy face instead, believing it’ll be easier for them to accept.</span></p><h3 data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Fear of negative emotions</span></h3><p data-dcnode-id="1266"><span data-dcnode-id="1268" instrument_node="">Toxic positivity can also come from our own fear of accepting negative emotions or situations.</span><br data-dcnode-id="1267"></p><p data-dcnode-id="1261"><span data-dcnode-id="1265" instrument_node="">“Our biggest fear when we lean into difficult thoughts and emotions is, if we go there, we are going to stay and get stuck there,” explains licensed clinical mental health counselor </span><a data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.innersolutionscounseling.com/new-page-1" target="_blank"><span data-dcnode-id="1264" instrument_node="">Windy Ezzell, MA</span></a><span data-dcnode-id="1262" instrument_node="">. “This is anxiety and fear lying to us, making us forget our process is real and valid. When our thoughts and emotions are honored and felt, it makes room for clarity, hope and gratitude. This allows us to move through and grow into connection, compassion and trust with ourselves and our tribe. Healthy positivity gives permission for the deep dive to unpack all the feels and then the productive reframe.”&nbsp;</span></p><h2 data-dcnode-id="1259" id="toc-section-6"><span data-dcnode-id="1260" instrument_node="">What is toxic positivity on social media?</span></h2><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Toxic positivity on social media often shows up as an Instagram-perfect photo with a cheerful caption and a hashtag like #GoodVibesOnly or #PositiveVibes to top it off. Many influencers think vulnerability and “negative” emotions will be bad for their brand,&nbsp; so they often only show the good things, leading followers to erroneously believe that this version of perfection is attainable. It doesn’t validate the very real suffering that other people go through, which in turn, may cause them to suppress those negative feelings and try to appear happy and cheerful to others.</span></p><h2 data-dcnode-id="1255" id="toc-section-7"><span data-dcnode-id="1256" instrument_node="">How to be sympathetic but not toxic positivity: Why empathy is the antidote</span></h2><p data-dcnode-id="1249"><span data-dcnode-id="1254" instrument_node="">Okay, so we now know that toxic positivity isn’t helpful and can be downright harmful. So let’s say a friend comes to you with something painful; how can you support them without being toxic positive? I asked some therapists for their best advice, and in the process, discovered toxic positivity’s surprising antidote: </span><a data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fingerprintforsuccess.com/blog/how-to-be-more-empathetic" target="_blank"><span data-dcnode-id="1253" instrument_node="">empathy</span></a><span data-dcnode-id="1251" instrument_node="">.</span><br data-dcnode-id="1250"></p><p data-dcnode-id="1237"><span data-dcnode-id="1248" instrument_node="">At first, I thought the cure to toxic positivity would be healthy positivity (being optimistic and focusing on the good </span><em data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">after</span></em><span data-dcnode-id="1245" instrument_node=""> you’ve processed the bad). But I realized through these therapists’ answers that if toxic positivity is essentially saying, “I don’t want you to feel those negative emotions because they make me uncomfortable,” then empathy is the opposite: “I am here to hold space for </span><em data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">any</span></em><span data-dcnode-id="1242" instrument_node=""> and </span><em data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">all</span></em><span data-dcnode-id="1239" instrument_node=""> emotions that you feel right now.”</span><br data-dcnode-id="1238"></p><p data-dcnode-id="1234"><span data-dcnode-id="1236" instrument_node="">Here’s what some of these therapists had to share:</span><br data-dcnode-id="1235"></p><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">“Assure that you are empathising with them and that you are assisting them in openly expressing their feelings and emotions. Validate their emotions and reassure them that whatever they are experiencing is normal and that there is nothing wrong with feeling down and unpleasant. Help them by listening to their problems and not giving them strange advice that may force them to suppress their emotions.”</span></p><p data-dcnode-id="1226"><span data-dcnode-id="1231" instrument_node="">- </span><a data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellbeingscounselling.ca/" target="_blank"><span data-dcnode-id="1230" instrument_node="">Pareen Sehat, MC</span></a><span data-dcnode-id="1228" instrument_node="">, registered clinical counselor.&nbsp;</span><br data-dcnode-id="1227"></p><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">“Empathy. It takes immense vulnerability to open up to someone, to ask for help or to share their emotions. Leaning into someone’s experience and being mindful of how we respond can be a good start. Asking questions about their experience can help in accessing empathy or sympathy for a friend. Questions like ‘what is that like for you?’ or ‘that’s a lot, how are you handling all of this?’ express interest in the person, show that you care about them and don’t dismiss their experience.”&nbsp;</span></p><p data-dcnode-id="1218"><span data-dcnode-id="1223" instrument_node="">- </span><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.erindtherapy.com/" target="_blank"><span data-dcnode-id="1222" instrument_node="">Erin Dierickx</span></a><span data-dcnode-id="1220" instrument_node="">, licensed marriage and family therapist associate&nbsp;</span><br data-dcnode-id="1219"></p><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">“This one is super easy: listen to them. If you are empathic with their experience, you will be in touch with all their fears. Ask more about the worries, and let them talk as much as they need. … But once a person feels heard, ask if they might have other ideas about how that thing might work out. Is there a way it won’t go that wrong? You aren’t telling them your ideas; you’re asking them to come up with their own ideas. If they have been able to experience your empathy with their pain, they will be more able to generate other possibilities for things getting better. And they will love you more.”&nbsp;</span></p><p data-dcnode-id="1211"><span data-dcnode-id="1215" instrument_node="">- </span><a data-dcnode-id="1213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//culvercitypsychotherapy.com/" target="_blank"><span data-dcnode-id="1214" instrument_node="">Jill Lummus, Psy.D.</span></a><span data-dcnode-id="1212" instrument_node="">, clinical psychologist</span></p><h2 data-dcnode-id="1209" id="toc-section-8"><span data-dcnode-id="1210" instrument_node="">How to start thinking positively—without resorting to toxic positivity</span></h2><h3 data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">1. Realize that negative emotions are not bad.</span></h3><p data-dcnode-id="1201"><span data-dcnode-id="1206" instrument_node="">Years ago, when I was going through a dark period and was blaming myself for not </span><em data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">feeling</span></em><span data-dcnode-id="1203" instrument_node=""> a certain way, a wise person told me, “Emotions are morally neutral.” So instead of feeling bad that I was feeling bad, he encouraged me to allow myself to experience the emotions so I wouldn’t be so afraid of them. This allowed me to process them and grow from the experience.</span><br data-dcnode-id="1202"></p><p data-dcnode-id="1196"><span data-dcnode-id="1200" instrument_node="">As we saw from the research earlier, suppressing emotions </span><em data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">does not work</span></em><span data-dcnode-id="1197" instrument_node="">. Often, they will come back stronger. So the first step in being genuinely positive is to understand that negative emotions are not bad and be willing to accept them when they show up.</span></p><h3 data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">2. Enlist outside help.</span></h3><p data-dcnode-id="1188"><span data-dcnode-id="1193" instrument_node="">From friends to mentors to coaches to therapists, there’s an entire team out there waiting to support you if you’re ready to build it. </span><a data-dcnode-id="1191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fingerprintforsuccess.com/blog/what-is-life-coaching" target="_blank"><span data-dcnode-id="1192" instrument_node="">Coaching</span></a><span data-dcnode-id="1190" instrument_node="">, in particular, can help you define a desired outcome (such as becoming more optimistic) and, through insightful questions and accountability, help you achieve it.</span><br data-dcnode-id="1189"></p><p data-dcnode-id="1185"><span data-dcnode-id="1187" instrument_node="">A therapist is a licensed mental health professional who can help you talk through the emotions, identify why you resort to toxic positivity, apply different treatment modalities and diagnose mental illness if present. They can also help you cope with the harm inflicted by others’ toxic positivity. Therapy is a safe space that allows you to just be.</span><br data-dcnode-id="1186"></p><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">“One of the best things about therapy is that the client gets to feel as hopeless or worried or sad as they need to,” says Lummus. “Therapists don’t tell them not to have those feelings.”</span></p><h3 data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">3. Surround yourself with empathetic people.</span></h3><p data-dcnode-id="1173"><span data-dcnode-id="1180" instrument_node="">If you’re not the one using toxic positivity, and instead, are the one </span><em data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">experiencing </span></em><span data-dcnode-id="1177" instrument_node="">toxic positivity from the people in your life—it’s time to surround yourself with empathetic people. Empathetic friends will not force you to feel anything or call you a downer for being sad. They will journey with you through this </span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fingerprintforsuccess.com/blog/resilience-training" target="_blank"><span data-dcnode-id="1176" instrument_node="">tough time</span></a><span data-dcnode-id="1174" instrument_node="">.</span></p><h3 data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">4. Honor the times when you don’t have the emotional capacity to be positive.</span></h3><p data-dcnode-id="1165"><span data-dcnode-id="1170" instrument_node="">While positive thinking may have helped many cope with the </span><a data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fingerprintforsuccess.com/blog/mindfulness-exercises" target="_blank"><span data-dcnode-id="1169" instrument_node="">stress of the pandemic</span></a><span data-dcnode-id="1167" instrument_node=""> these past 17 months, for some, that wasn’t an option or wasn’t enough. Many lost loved ones, lost their livelihoods or struggled with the loneliness of isolation and only had the energy to do what they needed to survive. It’s okay if you don’t have the capacity to be cheerful or positive. And if you don’t, learning how to give yourself the grace and space to just feel the feelings and get through another day is enough.</span><br data-dcnode-id="1166"></p><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Remember, positivity is only toxic when it forces you to bypass negative emotions. Don’t skip over the hard stuff; this is where you will grow and be able to move toward genuine positivity.</span></p><h3 data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">5. Move toward goal orientation.</span></h3><p data-dcnode-id="1158"><span data-dcnode-id="1160" instrument_node="">In our 20+ years of motivation research, we’ve found that people lean toward one of the two: goal-oriented or problem-solving. Someone who is goal-oriented focuses on a target, a specific outcome they want to achieve. Someone who is a problem solver anticipates potential pitfalls and does what they can to avoid those negative consequences. As such, a problem solver may be seen as negative, when in reality, it’s their strategy for tackling challenges.&nbsp;</span><br data-dcnode-id="1159"></p><p data-dcnode-id="1152"><span data-dcnode-id="1157" instrument_node="">Our </span><a data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prnewswire.com/news-releases/covid-one-year-on-americans-are-more-productive-working-from-home-canva-study-reveals-301238113.html" target="_blank"><span data-dcnode-id="1156" instrument_node="">latest research</span></a><span data-dcnode-id="1154" instrument_node=""> from the past year shows that the majority of Americans (60%) focused on problem-solving instead of goals during the pandemic. This makes sense given that many of us were in sheer survival mode as problem after problem popped up. While this helped many of us get through tough times, it’s not really conducive to positive thinking.</span><br data-dcnode-id="1153"></p><p data-dcnode-id="1147"><span data-dcnode-id="1151" instrument_node="">One way to become more optimistic is to join our </span><a data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fingerprintforsuccess.com/coaching/goal-catcher" target="_blank"><span data-dcnode-id="1150" instrument_node="">goal catcher program</span></a><span data-dcnode-id="1148" instrument_node="">. Through chat-based coaching, you can inspire yourself and others through your achievement of a vision. And the great thing is, because you’ll be focused on achieving a target, you won’t fall into the pit of toxic positivity by being overly concerned with “staying positive.”</span></p><h2 data-dcnode-id="1145" id="toc-section-9"><span data-dcnode-id="1146" instrument_node="">Taking leave of toxic positivity</span></h2><p data-dcnode-id="1139"><span data-dcnode-id="1144" instrument_node="">Whether you’ve exhibited toxic positivity or experienced it from others, realize that it’s not a sign of bad intentions, but rather, a misunderstanding of what it means to be an emotionally well person. Often, we erroneously believe that appearing positive, no matter the cost, is what we’re </span><em data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">supposed</span></em><span data-dcnode-id="1141" instrument_node=""> to do. But it’s not.&nbsp;</span><br data-dcnode-id="1140"></p><p data-dcnode-id="1134"><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fingerprintforsuccess.com/blog/psychological-well-being" target="_blank"><span data-dcnode-id="1138" instrument_node="">Emotional well-being</span></a><span data-dcnode-id="1136" instrument_node=""> means becoming comfortable with our feelings, even the painful ones, and allowing others to feel what they need to at that moment. Then, and only then, can we begin to exhibit genuine, healthy positivity.</span><br data-dcnode-id="1135"></p><h4 data-dcnode-id="1129"><span data-dcnode-id="1133" instrument_node="">Overcome toxic positivity with </span><a data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//app.fingerprintforsuccess.com/sign-up%3Fprogram%3Dwellbeing" target="_blank"><span data-dcnode-id="1132" instrument_node="">wellbeing coaching</span></a><span data-dcnode-id="1130" instrument_node=""> —get started for free now.</span></h4></div><div class="block mb60 mt45" data-dcnode-id="1113"><div class="section-intro align-left mb14" data-dcnode-id="1125"><h2 class="small-heading _24" data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Rapidly improve your work and life with fast AI coaching.</span></h2></div><div class="blog-rich-text w-richtext" data-dcnode-id="1121"><p data-dcnode-id="1122"><span data-dcnode-id="1124" instrument_node="">Our programs were designed by world-renown coaches, and sessions only take 5-15 minutes. Get started for free with personalized program now by chatting in the box below:</span><br data-dcnode-id="1123"></p></div><div class="center-flex" data-dcnode-id="1114"><div class="marlee-embed-wrapper" data-dcnode-id="1115" id="start"><a class="button w-button" data-dcnode-id="1119" href="#" id="start-coaching"><span data-dcnode-id="1120" instrument_node="">Start personal coaching for free</span></a><div class="w-embed w-script" data-dcnode-id="1116"></div></di
