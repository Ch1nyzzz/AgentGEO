</span><div class="comp structured-content article-content expert-content right-rail__offset lock-journey health-sc-page mntl-sc-page mntl-block" data-bind-scroll-on-start="true" data-dcnode-id="1312" data-sc-ad-label-height="24" data-sc-ad-track-spacing="100" data-sc-breakpoint="50em" data-sc-content-positions="[400, 1400, 1400, 1700, 2000, 2200, 2400, 2600, 2800]" data-sc-load-immediate="4" data-sc-max-track-height="600" data-sc-min-track-height="250" data-sc-sticky-offset="60" id="health-sc-page_1-0"><span data-dcnode-id="2051" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2049" id="mntl-sc-block_1-0"><span data-dcnode-id="2050" instrument_node="">
Body positivity refers to the assertion that all people deserve to have a positive body image, regardless of how society and popular culture view ideal shape, size, and appearance.
</span></p><span data-dcnode-id="2048" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2047" id="mntl-sc-block_1-0-1"></div><span data-dcnode-id="2046" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2044" id="mntl-sc-block_1-0-2"><span data-dcnode-id="2045" instrument_node="">
Some of the goals of the body positivity movement include:
</span></p><span data-dcnode-id="2043" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2042" id="mntl-sc-block_1-0-3"></div><span data-dcnode-id="2041" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2030" id="mntl-sc-block_1-0-4"><span data-dcnode-id="2040" instrument_node="">
</span><li data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Challenging how society views the body</span></li><li data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">Promoting the acceptance of all bodies</span></li><li data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">Helping people build confidence and acceptance of their own bodies</span></li><li data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">Addressing unrealistic body standards</span></li><span data-dcnode-id="2031" instrument_node="">
</span></ul><span data-dcnode-id="2029" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2028" id="mntl-sc-block_1-0-5"></div><span data-dcnode-id="2027" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2025" id="mntl-sc-block_1-0-6"><span data-dcnode-id="2026" instrument_node="">
Body positivity is not just about challenging how society views people based upon their physical size and shape, however. It also recognizes that judgments are often made based on race, gender, sexuality, and disability.&nbsp;
</span></p><span data-dcnode-id="2024" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2023" id="mntl-sc-block_1-0-7"></div><span data-dcnode-id="2022" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2020" id="mntl-sc-block_1-0-8"><span data-dcnode-id="2021" instrument_node="">
Body positivity also aims to help people understand how popular media messages contribute to the relationship that people have with their bodies, including how they feel about food, exercise, clothing, health, identity, and self-care.
</span></p><span data-dcnode-id="2019" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2011" id="mntl-sc-block_1-0-9"><div class="comp mntl-native" data-dcnode-id="2012" data-right-rail-index="1" id="mntl-native_1-0" style="--native-ad-height: auto"><span data-dcnode-id="2018" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad" data-dcnode-id="2014" id="mntl-native__adunit_1-0"><span data-dcnode-id="2017" instrument_node="">
</span><div class="wrapper" data-dcnode-id="2016" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="2015" instrument_node="">
</span></div><span data-dcnode-id="2013" instrument_node="">
</span></div></div><span data-dcnode-id="2010" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2008" id="mntl-sc-block_1-0-10"><span data-dcnode-id="2009" instrument_node="">
By better understanding the effect that such influences have, the hope is that people can develop a healthier and more realistic relationship with their bodies.
</span></p><span data-dcnode-id="2007" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2006" id="mntl-sc-block_1-0-11"></div><span data-dcnode-id="2005" instrument_node="">

</span><div class="window__info-description" data-dcnode-id="1855" dir="auto"><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1857"><span data-dcnode-id="1869" instrument_node="">Iskra Lawrence is a British model who has been included in campaigns for major brands without her photos being retouched (something that is quite rare in the modeling industry). She was included in BBC’s </span><em data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">100 Women,</span></em><span data-dcnode-id="1866" instrument_node=""> and she is a brand ambassador for the National Eating Disorders Association. She’s also a frequent guest author to many publications including </span><em data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">SELF</span></em><span data-dcnode-id="1863" instrument_node=""> Magazine and </span><em data-dcnode-id="1860"><span data-dcnode-id="1862" instrument_node="">TIME.</span><br data-dcnode-id="1861"/></em><br data-dcnode-id="1859"/><span data-dcnode-id="1858" instrument_node="">Some of the things Iskra talks about in this episode are strategies for feeling better about your appearance, tips for being less focused on how you look, and her advice for anyone who is dealing with body image issues.</span></p><span data-dcnode-id="1856" instrument_node="">
</span></div><span data-dcnode-id="1854" instrument_node="">

</span><strong data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Follow Now</span></strong><span data-dcnode-id="1686" instrument_node="">: </span><a data-component="link" data-dcnode-id="1684" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//podcasts.apple.com/us/podcast/the-verywell-mind-podcast-with-amy-morin/id1529983509" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1685" instrument_node="">Apple Podcasts</span></a><span data-dcnode-id="1683" instrument_node=""> / </span><a data-component="link" data-dcnode-id="1681" data-ordinal="2" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//open.spotify.com/show/2WGnJfJon5RKU9bXBUSWHU" rel="noopener" target="_blank"><span data-dcnode-id="1682" instrument_node="">Spotify</span></a><span data-dcnode-id="1680" instrument_node=""> / </span><a data-component="link" data-dcnode-id="1678" data-ordinal="3" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//podcasts.google.com/feed/aHR0cHM6Ly9mZWVkcy5idXp6c3Byb3V0LmNvbS8xMzA3NDQ5LnJzcw" rel="noopener" target="_blank"><span data-dcnode-id="1679" instrument_node="">Google Podcasts</span></a><span data-dcnode-id="1677" instrument_node=""> / </span><a data-component="link" data-dcnode-id="1675" data-ordinal="4" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//feeds.buzzsprout.com/1307449.rss" rel="noopener" target="_blank"><span data-dcnode-id="1676" instrument_node="">RSS</span></a><br data-dcnode-id="1674"><span data-dcnode-id="1673" instrument_node="">
</span></p><span data-dcnode-id="1671" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1670" id="mntl-sc-block_1-0-18"></div><span data-dcnode-id="1669" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1668" id="toc-brief-history"></span><span data-dcnode-id="1667" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1662" id="mntl-sc-block_1-0-19"><span data-dcnode-id="1666" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node=""> Brief History </span></span><span data-dcnode-id="1663" instrument_node=""> </span></h2><span data-dcnode-id="1661" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1659" id="mntl-sc-block_1-0-20"><span data-dcnode-id="1660" instrument_node="">
Body positivity has its roots in the fat acceptance movement of the late 1960s. Fat acceptance focuses on ending the culture of fat-shaming and discrimination against people based upon their size or body weight. The National Association to Advance Fat Acceptance was first established in 1969 and continues to work to change how people talk about weight.
</span></p><span data-dcnode-id="1658" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1657" id="mntl-sc-block_1-0-21"></div><span data-dcnode-id="1656" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1654" id="mntl-sc-block_1-0-22"><span data-dcnode-id="1655" instrument_node="">
The term "body positive" emerged in 1996 when a psychotherapist and an individual who had been through treatment for an eating disorder founded the website thebodypositive.org. The site offers resources and educational materials designed to help people feel good about their bodies by taking the focus off of losing weight through unhealthy diet and exercise efforts.
</span></p><span data-dcnode-id="1653" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1652" id="mntl-sc-block_1-0-23"></div><span data-dcnode-id="1651" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1649" id="mntl-sc-block_1-0-24"><span data-dcnode-id="1650" instrument_node="">
The body positivity movement in its current form began to emerge around 2012, initially focusing on challenging unrealistic feminine beauty standards. As the movement grew in popularity, the original focus on acceptance of weight began to shift toward a message that “all bodies are beautiful.”&nbsp;
</span></p><span data-dcnode-id="1648" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1647" id="mntl-sc-block_1-0-25"></div><span data-dcnode-id="1646" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1644" id="mntl-sc-block_1-0-26"><span data-dcnode-id="1645" instrument_node="">
While body positivity has become increasingly popular, people continue to be confused about exactly what it means. Part of the reason why body positivity is so misunderstood is due to the fact that there are so many different definitions for what the movement means.
</span></p><span data-dcnode-id="1643" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1642" id="mntl-sc-block_1-0-27"></div><span data-dcnode-id="1641" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1639" id="mntl-sc-block_1-0-28"><span data-dcnode-id="1640" instrument_node="">
&nbsp;Depending on who you ask, body positivity can mean:
</span></p><span data-dcnode-id="1638" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1637" id="mntl-sc-block_1-0-29"></div><span data-dcnode-id="1636" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1625" id="mntl-sc-block_1-0-30"><span data-dcnode-id="1635" instrument_node="">
</span><li data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Appreciating your body in spite of flaws</span></li><li data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Feeling confident about your body</span></li><li data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Loving yourself</span></li><li data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Accepting your body’s shape and size</span></li><span data-dcnode-id="1626" instrument_node="">
</span></ul><span data-dcnode-id="1624" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1623" id="mntl-sc-block_1-0-31"></div><span data-dcnode-id="1622" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1620" id="mntl-sc-block_1-0-32"><span data-dcnode-id="1621" instrument_node="">
Body positivity also means enjoying the body you have and not beating yourself up over changes that happen naturally due to aging, pregnancy, or lifestyle choices.
</span></p><span data-dcnode-id="1619" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1618" id="mntl-sc-block_1-0-33"></div><span data-dcnode-id="1617" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1615" id="mntl-sc-block_1-0-34"><span data-dcnode-id="1616" instrument_node="">
Instagram played a pivotal role in the rise of the body positivity movement. In recent years, a number of magazines and companies have incorporated efforts to be more body positive in their publications and marketing efforts. Some magazines have stopped airbrushing models, while companies including Dove and Aerie have developed marketing campaigns incorporating body positivity messages.
</span></p><span data-dcnode-id="1614" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1613" id="mntl-sc-block_1-0-35"></div><span data-dcnode-id="1612" instrument_node="">
</span><div class="comp related-link mntl-sc-block mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1606" id="mntl-sc-block_1-0-37"><span data-dcnode-id="1611" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link" data-dcnode-id="1608" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/media-influence-on-disordered-eating-1138266" id="mntl-sc-block-featuredlink__link_1-0"><span class="link__wrapper" data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Is the Media to Blame for Causing Eating Disorders?</span></span></a><span data-dcnode-id="1607" instrument_node="">
</span></div><span data-dcnode-id="1605" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1604" id="mntl-sc-block_1-0-38"></div><span data-dcnode-id="1603" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1602" id="toc-reasons-for-body-positivity"></span><span data-dcnode-id="1601" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1596" id="mntl-sc-block_1-0-39"><span data-dcnode-id="1600" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node=""> Reasons for Body Positivity </span></span><span data-dcnode-id="1597" instrument_node=""> </span></h2><span data-dcnode-id="1595" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1593" id="mntl-sc-block_1-0-40"><span data-dcnode-id="1594" instrument_node="">
One of the major goals of body positivity is to address some of the ways that body image influences mental health and well-being. Having a healthy body image plays a role in how people feel about their appearance and even how they judge their self-worth. Research suggests that having a negative body image is associated with an increased risk for some mental conditions including depression and eating disorders.
</span></p><span data-dcnode-id="1592" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1591" id="mntl-sc-block_1-0-41"></div><span data-dcnode-id="1590" instrument_node="">
</span><div class="comp theme-takeaway mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1580" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-43"><span data-dcnode-id="1589" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1582" id="mntl-sc-block-callout-body_1-0-1"><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1587" instrument_node="">One study found that even brief exposure to media messages portraying an "ideal physique" was linked to increased body image concerns and increased eating disorder symptoms.&nbsp;</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1585" data-id="#citation-1"><span data-dcnode-id="1586" instrument_node="">1</span></span><span data-dcnode-id="1584" instrument_node="">﻿</span></p></div><span data-dcnode-id="1581" instrument_node="">
</span></div><span data-dcnode-id="1579" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1574" id="mntl-sc-block_1-0-44"><span data-dcnode-id="1578" instrument_node="">
</span><a data-component="link" data-dcnode-id="1576" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/body-image-and-eating-disorders-4149424"><span data-dcnode-id="1577" instrument_node="">Body image</span></a><span data-dcnode-id="1575" instrument_node=""> refers to a person's subjective perception of their own body—which may be different from how their body actually appears. Feelings, thoughts, and behaviors related to body image can have a major impact on your mental health and how you treat yourself.
</span></p><span data-dcnode-id="1573" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1572" id="mntl-sc-block_1-0-45"></div><span data-dcnode-id="1571" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1566" id="mntl-sc-block_1-0-46"><span data-dcnode-id="1570" instrument_node="">
The formation of body image starts early in life. Unfortunately, even young children may suffer from body dissatisfaction. A report published by Common Sense Media found that more than 50% of girls and nearly 33% of boys between the ages of 6 and 8 felt that their ideal body weight was less than their current weight. Results also revealed that 25% of kids had tried some type of dieting behavior by the age of seven.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1568" data-id="#citation-2"><span data-dcnode-id="1569" instrument_node="">2</span></span><span data-dcnode-id="1567" instrument_node="">
</span></p><span data-dcnode-id="1565" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1564" id="mntl-sc-block_1-0-47"></div><span data-dcnode-id="1563" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1561" id="mntl-sc-block_1-0-48"><span data-dcnode-id="1562" instrument_node="">
Problems that can emerge as a result of poor body image include:
</span></p><span data-dcnode-id="1560" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1559" id="mntl-sc-block_1-0-49"></div><span data-dcnode-id="1558" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1530" id="mntl-sc-block_1-0-50"><span data-dcnode-id="1557" instrument_node="">
</span><li data-dcnode-id="1551"><strong data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Depression:</span></strong><span data-dcnode-id="1554" instrument_node=""> Women experience depression at much higher rates than men do, and some researchers believe that body dissatisfaction may play an important role in explaining this gender difference in depression rates.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1552" data-id="#citation-3"><span data-dcnode-id="1553" instrument_node="">3</span></span></li><span data-dcnode-id="1550" instrument_node="">
</span><li data-dcnode-id="1543"><strong data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Low self-esteem:</span></strong><span data-dcnode-id="1547" instrument_node=""> Research has found that body dissatisfaction is associated with poor self-esteem in adolescents regardless of their gender, age, weight, race, ethnicity, and socioeconomic status.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1545" data-id="#citation-4"><span data-dcnode-id="1546" instrument_node="">4</span></span><span data-dcnode-id="1544" instrument_node="">&nbsp;</span></li><span data-dcnode-id="1542" instrument_node="">
</span><li data-dcnode-id="1532"><strong data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Eating disorders: </span></strong><span data-dcnode-id="1539" instrument_node="">Research also </span><a data-component="link" data-dcnode-id="1537" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1080/10640266.2018.1499335" rel="noopener" target="_blank"><span data-dcnode-id="1538" instrument_node="">indicates</span></a><span data-dcnode-id="1536" instrument_node=""> that body dissatisfaction is linked to disordered eating, particularly among adolescent girls.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1534" data-id="#citation-5"><span data-dcnode-id="1535" instrument_node="">5</span></span><span data-dcnode-id="1533" instrument_node="">&nbsp;</span></li><span data-dcnode-id="1531" instrument_node="">
</span></ul><span data-dcnode-id="1529" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1528" id="mntl-sc-block_1-0-51"></div><span data-dcnode-id="1527" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1519" id="mntl-sc-block_1-0-52"><span data-dcnode-id="1526" instrument_node="">
Research has consistently shown that exposure to depictions of the "thin ideal" are associated with both behavioral and emotional symptoms related to disordered eating.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1524" data-id="#citation-6"><span data-dcnode-id="1525" instrument_node="">6</span></span><span data-dcnode-id="1523" instrument_node=""> It is not just exposure to these images that pose a danger; it is the development of beliefs that beauty, success, and esteem are determined by thinness. Studies have also found that when people internalize these ideas, they are more likely to experience body dissatisfaction and engage in unnecessary dieting.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1521" data-id="#citation-7"><span data-dcnode-id="1522" instrument_node="">7</span></span><span data-dcnode-id="1520" instrument_node="">
</span></p><span data-dcnode-id="1518" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1517" id="mntl-sc-block_1-0-53"></div><span data-dcnode-id="1516" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1514" id="mntl-sc-block_1-0-54"><span data-dcnode-id="1515" instrument_node="">
Body positivity strives to address these issues by helping people recognize the influences that contribute to poor body image. The hope is that people will then be able to adjust their body expectations and feel more positive and accepting of their own bodies. Such acceptance may then help combat the toll that poor body image has on mental and physical health.
</span></p><span data-dcnode-id="1513" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1512" id="mntl-sc-block_1-0-55"></div><span data-dcnode-id="1511" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1510" id="toc-criticisms"></span><span data-dcnode-id="1509" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1504" id="mntl-sc-block_1-0-56"><span data-dcnode-id="1508" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node=""> Criticisms </span></span><span data-dcnode-id="1505" instrument_node=""> </span></h2><span data-dcnode-id="1503" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1501" id="mntl-sc-block_1-0-57"><span data-dcnode-id="1502" instrument_node="">
While the body positivity message is intended to help people feel better about themselves, it isn’t without its problems and critics.&nbsp;
</span></p><span data-dcnode-id="1500" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1499" id="mntl-sc-block_1-0-58"></div><span data-dcnode-id="1498" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1496" id="mntl-sc-block_1-0-59"><span data-dcnode-id="1497" instrument_node="">
For example, one problem is the idea that body positivity implies that people should do whatever they think they need to do in order to feel positive about how they look. Unfortunately, the popular messages that people are bombarded with include the idea that thinner, fitter people are happier, healthier, and more beautiful. This idealization of thinness can then contribute to people engaging in unhealthy actions—including excessive exercise or extreme diets—under the guise of feeling "body positive."
</span></p><span data-dcnode-id="1495" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1494" id="mntl-sc-block_1-0-60"></div><span data-dcnode-id="1493" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1491" id="mntl-sc-block_1-0-61"><span data-dcnode-id="1492" instrument_node="">
Another criticism of body positivity is that it can be non-inclusive. Depictions of body positivity messages tend to exclude people of color as well as those who are disabled, LGBTQ, and non-binary.
</span></p><span data-dcnode-id="1490" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1489" id="mntl-sc-block_1-0-62"></div><span data-dcnode-id="1488" instrument_node="">
</span><div class="comp theme-takeaway mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1481" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-64"><span data-dcnode-id="1487" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1483" id="mntl-sc-block-callout-body_1-0-2"><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">The body images often portrayed in body-positive messages often still conform to a specific beauty ideal; many people simply don’t feel included in body positivity.&nbsp;</span></p></div><span data-dcnode-id="1482" instrument_node="">
</span></div><span data-dcnode-id="1480" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1472" id="mntl-sc-block_1-0-65"><span data-dcnode-id="1479" instrument_node="">
Actress Jameela Jamil, who stars on the tv series </span><em data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">The Good Place</span></em><span data-dcnode-id="1476" instrument_node="">, is often described as one of the faces of the body positivity movement, which she suggests is miscategorization. In an </span><a data-component="link" data-dcnode-id="1474" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/accounts/login/" rel="noopener" target="_blank"><span data-dcnode-id="1475" instrument_node="">Instagram post</span></a><span data-dcnode-id="1473" instrument_node="">, Jamil explained that body positivity is essential for people who are "not believed by doctors, who are abused in the street, and who can't find clothing in their size."&nbsp;
</span></p><span data-dcnode-id="1471" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1470" id="mntl-sc-block_1-0-66"></div><span data-dcnode-id="1469" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1467" id="mntl-sc-block_1-0-67"><span data-dcnode-id="1468" instrument_node="">
However, she also recognizes that the movement isn't right for everyone and that many people feel shut out of the body positivity conversation.&nbsp;
</span></p><span data-dcnode-id="1466" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1465" id="mntl-sc-block_1-0-68"></div><span data-dcnode-id="1464" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1462" id="mntl-sc-block_1-0-69"><span data-dcnode-id="1463" instrument_node="">
Instead, Jamil suggests that she advocates for body liberation or even body neutrality. This approach involves taking your body out of the center of your self-image. She has the privilege of taking such a stance, she notes, because she is not persecuted because of her size. Other people, those who the body positivity movement is specifically aimed at, simply do not have that luxury.
</span></p><span data-dcnode-id="1461" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1460" id="mntl-sc-block_1-0-70"></div><span data-dcnode-id="1459" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1457" id="mntl-sc-block_1-0-71"><span data-dcnode-id="1458" instrument_node="">
Another criticism of the body positivity trend is that it makes the appearance of the body one of the most important elements of a person’s self-perception. It neglects all of the other elements of a person’s identity that are more important than how a person looks. In this aspect, Jamil’s stance, suggesting that people should stop making the body the determinant of self-worth and self-perception, might be a healthier, more inclusive approach.
</span></p><span data-dcnode-id="1456" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1455" id="mntl-sc-block_1-0-72"></div><span data-dcnode-id="1454" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1453" id="toc-what-you-can-do"></span><span data-dcnode-id="1452" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1447" id="mntl-sc-block_1-0-73"><span data-dcnode-id="1451" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node=""> What You Can Do </span></span><span data-dcnode-id="1448" instrument_node=""> </span></h2><span data-dcnode-id="1446" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1444" id="mntl-sc-block_1-0-74"><span data-dcnode-id="1445" instrument_node="">
Body positivity is designed to foster acceptance and love of your body, but it can be a struggle that adds another element of pressure and impossible standards to live up to. The body positivity message is that you should change how you feel about your body, but can also be just one more demand.&nbsp;
</span></p><span data-dcnode-id="1443" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1442" id="mntl-sc-block_1-0-75"></div><span data-dcnode-id="1441" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1439" id="mntl-sc-block_1-0-76"><span data-dcnode-id="1440" instrument_node="">
Simply telling people to accept themselves and be resilient in the face of the bombardment of images promoting the thin ideal can be damaging. Telling people to ignore the dominant beauty ideal isn’t realistic. It can create more pressure for a person who is already feeling anxious, negative, and devalued.&nbsp;Popular culture tells people that they are flawed—but then demands that they have a positive attitude about it. Not feeling positive about your body can then lead to shame and guilt.&nbsp;
</span></p><span data-dcnode-id="1438" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1437" id="mntl-sc-block_1-0-77"></div><span data-dcnode-id="1436" instrument_node="">
</span><div class="comp theme-takeaway mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1420" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-79"><span data-dcnode-id="1435" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1422" id="mntl-sc-block-callout-body_1-0-3"><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1433" instrument_node="">Research </span><a data-component="link" data-dcnode-id="1431" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1111/j.1467-9280.2009.02370.x" rel="noopener" target="_blank"><span data-dcnode-id="1432" instrument_node="">has even found</span></a><span data-dcnode-id="1430" instrument_node=""> that when people with low </span><a data-component="link" data-dcnode-id="1428" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/what-is-self-esteem-2795868"><span data-dcnode-id="1429" instrument_node="">self-esteem</span></a><span data-dcnode-id="1427" instrument_node=""> repeat positive affirmations that they don't actually believe in, the results tend to backfire, leaving people feeling even worse about themselves than they did before.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1425" data-id="#citation-8"><span data-dcnode-id="1426" instrument_node="">8</span></span><span data-dcnode-id="1424" instrument_node="">﻿</span></p></div><span data-dcnode-id="1421" instrument_node="">
</span></div><span data-dcnode-id="1419" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1414" id="mntl-sc-block_1-0-80"><span data-dcnode-id="1418" instrument_node="">
This does not mean that you shouldn't say nice things or think positive thoughts about yourself. But simply covering up negative thinking with positive messages may be harmful. A better approach would be to work on </span><a data-component="link" data-dcnode-id="1416" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/how-to-change-negative-thinking-3024843"><span data-dcnode-id="1417" instrument_node="">replacing negative thought patterns</span></a><span data-dcnode-id="1415" instrument_node=""> with more realistic ones.
</span></p><span data-dcnode-id="1413" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1412" id="mntl-sc-block_1-0-81"></div><span data-dcnode-id="1411" instrument_node="">
</span><div class="comp related-link mntl-sc-block mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1405" id="mntl-sc-block_1-0-83"><span data-dcnode-id="1410" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link" data-dcnode-id="1407" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/when-to-fake-happiness-for-stress-relief-4068437" id="mntl-sc-block-featuredlink__link_1-0-1"><span class="link__wrapper" data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Faking Positivity Can Sometimes Be Harmful</span></span></a><span data-dcnode-id="1406" instrument_node="">
</span></div><span data-dcnode-id="1404" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1403" id="mntl-sc-block_1-0-84"></div><span data-dcnode-id="1402" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1400" id="mntl-sc-block_1-0-85"><span data-dcnode-id="1401" instrument_node="">
So what can you do to maintain a healthy body image? Whether or not the body positivity movement speaks to you, there are ideas from this approach that may help you feel better about your body and less obsessed with chasing “perfection.”
</span></p><span data-dcnode-id="1399" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1398" id="mntl-sc-block_1-0-86"></div><span data-dcnode-id="1397" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1392" id="mntl-sc-block_1-0-88"><span data-dcnode-id="1396" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node=""> Adopt Body Neutrality </span></span><span data-dcnode-id="1393" instrument_node=""> </span></h3><span data-dcnode-id="1391" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1389" id="mntl-sc-block_1-0-89"><span data-dcnode-id="1390" instrument_node="">
It’s ok to admit that you don’t necessarily love everything about your body. It’s ok to feel neutral or even indifferent about your body. Your worth and value do not lie in your shape or your size or in any other aspect of your appearance. Body image does play a part in self-concept, but it isn’t everything.
</span></p><span data-dcnode-id="1388" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1387" id="mntl-sc-block_1-0-90"></div><span data-dcnode-id="1386" instrument_node="">
</span><div class="comp theme-takeaway mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1379" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-92"><span data-dcnode-id="1385" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1381" id="mntl-sc-block-callout-body_1-0-4"><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Focus on taking the mental spotlight off your body and try to base your self-perceptions on other parts of yourself.</span></p></div><span data-dcnode-id="1380" instrument_node="">
</span></div><span data-dcnode-id="1378" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1376" id="mntl-sc-block_1-0-93"><span data-dcnode-id="1377" instrument_node="">
None of these things are easy. They take continual effort and, in most cases, it’s not something you can perfectly achieve. There will be moments when you feel weak, when you dislike aspects of yourself, and when you compare yourself to others. The key is to keep trying to find new ways to avoid the negative thought patterns that contribute to poor body image.
</span></p><span data-dcnode-id="1375" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1374" id="mntl-sc-block_1-0-94"></div><span data-dcnode-id="1373" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1368" id="mntl-sc-block_1-0-96"><span data-dcnode-id="1372" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node=""> Try Health-Focused Self-Care </span></span><span data-dcnode-id="1369" instrument_node=""> </span></h3><span data-dcnode-id="1367" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1362" id="mntl-sc-block_1-0-97"><span data-dcnode-id="1366" instrument_node="">
</span><a data-component="link" data-dcnode-id="1364" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/self-care-strategies-overall-stress-reduction-3144729"><span data-dcnode-id="1365" instrument_node="">Self-care</span></a><span data-dcnode-id="1363" instrument_node=""> can sometimes masquerade as a way to change or control your appearance, but self-care should focus on doing things that make you feel good about the body you have now. Show respect for your body. Eat healthy meals because it fuels your mind and body. Exercise because it helps you feel strong and energized, not because you're trying to change or control your body.
</span></p><span data-dcnode-id="1361" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1360" id="mntl-sc-block_1-0-98"></div><span data-dcnode-id="1359" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1357" id="mntl-sc-block_1-0-99"><span data-dcnode-id="1358" instrument_node="">
Wear and buy clothes for the body you have now—not for some planned future version of yourself. You might be holding on to your “thin clothes” because you plan to eventually lose weight, but such habits can make it hard to feel good about yourself today. Look for things that make you feel comfortable and good about how you look. Purge your closet of clothes that don't fit your current physique. Your body may change in size and shape in the future, but that doesn’t mean that you shouldn’t be able to look at feel good about yourself in the here and now.
</span></p><span data-dcnode-id="1356" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1355" id="mntl-sc-block_1-0-100"></div><span data-dcnode-id="1354" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1352" id="mntl-sc-block_1-0-101"><span data-dcnode-id="1353" instrument_node="">
Purge your social media feeds of accounts that don’t make you feel good about yourself. If you find yourself constantly comparing yourself to others, you’re less likely to feel good about yourself. Follow accounts that spark your interests and that leave you with positive feelings. On Instagram in particular, many accounts are focused only on portraying perfection or an idealized image of the body.
</span></p><span data-dcnode-id="1351" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1350" id="mntl-sc-block_1-0-102"></div><span data-dcnode-id="1349" instrument_node="">
</span><div class="comp theme-takeaway mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1342" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-104"><span data-dcnode-id="1348" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1344" id="mntl-sc-block-callout-body_1-0-5"><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Try following body positive accounts that are inclusive of all body types, shapes, colors, genders, and abilities.</span></p></div><span data-dcnode-id="1343" instrument_node="">
</span></div><span data-dcnode-id="1341" instrument_node="">
</span><div class="comp related-link mntl-sc-block mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1335" id="mntl-sc-block_1-0-106"><span data-dcnode-id="1340" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link" data-dcnode-id="1337" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/body-positive-influencers-4165953" id="mntl-sc-block-featuredlink__link_1-0-2"><span class="link__wrapper" data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Body Positive Influencers You Should Follow</span></span></a><span data-dcnode-id="1336" instrument_node="">
</span></div><span data-dcnode-id="1334" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1333" id="mntl-sc-block_1-0-107"></div><span data-dcnode-id="1332" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1331" id="toc-a-word-from-verywell"></span><span data-dcnode-id="1330" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1325" id="mntl-sc-block_1-0-108"><span data-dcnode-id="1329" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node=""> A Word From Verywell </span></span><span data-dcnode-id="1326" instrument_node=""> </span></h2><span data-dcnode-id="1324" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1319" id="mntl-sc-block_1-0-109"><span data-dcnode-id="1323" instrument_node="">
Recent research presented at the American Psychological Association’s 2016 annual conference indicates that body dissatisfaction may be on the decline.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1321" data-id="#citation-9"><span data-dcnode-id="1322" instrument_node="">9</span></span><span data-dcnode-id="1320" instrument_node="">﻿ In the meta-analysis, researchers looked at over 250 studies involving more than 100,000 participants over a 31 year time period.&nbsp;While women consistently report more body dissatisfaction than men, the results indicated that this dissatisfaction has declined in recent years.&nbsp;
</span></p><span data-dcnode-id="1318" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1317" id="mntl-sc-block_1-0-110"></div><span data-dcnode-id="1316" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1314" id="mntl-sc-block_1-0-111"><span data-dcnode-id="1315" instrument_node="">
&nbsp;These findings are a positive sign that may suggest that the body acceptance and body positivity movements are having an effect on how women and girls view themselves. While it may be an uphill battle, increasing the representation of all body types in popular media may help combat poor body image.
</span></p><span data-dcnode-id="1313" instrument_node="">
</span></div><span data-dcnode-id="1311" instrument_node="">
