</span></div><span data-dcnode-id="1207" instrument_node=""> </span><div class="article-content" data-dcnode-id="1008"><span data-dcnode-id="1206" instrument_node="">
</span><div class="bialty-container" data-dcnode-id="1010"><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">We all have the desire to live happy lives. However, the effort and personal work we have to do to attain this desire can be challenging for us.</span></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Is happiness a choice? Yes. But being happy requires more than just making the choice that “I choose to be happy”. Sustaining happiness in your life takes commitment, courage, a deep understanding of who you are and knowing your purpose in life; and this does not happen overnight. It is a life long journey.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">By choosing to embrace happiness into your life, you are taking responsibility for your own contentment.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><blockquote data-dcnode-id="1194"><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">“Participate joyfully in the sorrows of the world. We cannot cure the world of sorrows, but we can choose to live in joy.” — Joseph Campbell</span></p></blockquote><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">When you live a happy life, you have more resilience; your confidence and self-belief flourishes. And this enables you to successfully navigate your way through the curve balls (the tough times) that life throws at you.</span></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Some of us are born smiling and some of us are not. We all have a Happiness Set Point that determines our overall well-being. Our happiness in life oscillates depending on what life events we are facing at the time. Our happiness can be significantly be diminished when we face traumatic events in life.</span></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1186" instrument_node="">The good news is that although our general mood levels and well-being are partially determined by factors like genetics and upbringing, we can control our happiness. Yes, </span><strong data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">a good portion of our happiness is within our control</span></strong><span data-dcnode-id="1183" instrument_node="">. </span></p><div class="ad-wrap-transparent article-top-ad container-fluid d-md-none" data-dcnode-id="1169"><span data-dcnode-id="1181" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1178" instrument_node="">
</span><div class="lazyload-ad incontent-inline-rect" data-dcnode-id="1174" data-id="lifehack_m_ATF2_ap" id="lifehack_m_ATF2_ap"><span data-dcnode-id="1177" instrument_node="">
</span><br data-dcnode-id="1176"><span data-dcnode-id="1175" instrument_node="">
</span></div><span data-dcnode-id="1173" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1170" instrument_node="">
</span></div><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">The 5 strategies below are actions you can adopt so you can live a flourishing and resilient life where you are able to face those “tough times” in life from a position of strength and of course happiness.</span></p><span data-dcnode-id="1165" instrument_node="">
</span><h2 data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">1. Determine What Happiness Means to You</span></h2><span data-dcnode-id="1162" instrument_node="">
</span><blockquote data-dcnode-id="1159"><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">“The greatest discovery of any generation is that a human can alter his life by altering his attitude.” — William James- psychologist.</span></p></blockquote><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">The first step in the journey to having a happy life is to determine what is important to you and what you value in life that brings you joy and happiness.</span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">You don’t have to have all the answers, however you do need a sense of who you are and how you want to live your life.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Happiness can only come into your life when you like who you are, and you are choosing to be the best YOU can be. Until you have attained that state of belief in you, living a happy life will be at times in your life completely out of reach.</span></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Yehuda Berg describes how the words that we use can either empower us or destroy us. Be aware of what words you are choosing to use to describe who you are:</span></p><span data-dcnode-id="1146" instrument_node="">
</span><blockquote data-dcnode-id="1142"><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">“Words are singularly the most powerful force available to humanity. We can choose to use this force constructively with words of encouragement, or destructively using words of despair. Words have energy and power with the ability to help, to heal, to hinder, to hurt, to harm, to humiliate and to humble”. — Yehuda Berg</span></p><div class="convertflow-article-in-content cf-2355-area-14952" data-dcnode-id="1143"></div></blockquote><span data-dcnode-id="1141" instrument_node="">
</span><h2 data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">2. Understand How Happiness Works for You</span></h2><span data-dcnode-id="1138" instrument_node="">
</span><blockquote data-dcnode-id="1135"><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">“Happiness is not a feeling it’s an action. In order to feel happy you have to do happy.” — Ben C. Fletcher D.Phil., Oxon</span></p></blockquote><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">We all have very different personalities and this means that for some of us, we find it easier to be happy. A lot of research has been conducted on the relationship between happiness and different personalities and it is very complex.</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">There is, however, one aspect of happiness that most researchers agree with and that is, the level of happiness in a persons life depends on their vision of what a “good life is”. Once a person works this out, then it is easier for them to identify what they can do to bring happiness to their life.</span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Happiness is a consequence of what we do and how we behave. Trying to make yourself think happier is not going to work; taking action and doing something different in a more a positive way is more likely to bring happiness into your life.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><h2 data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">3. Choose to Be Around the Right People</span></h2><span data-dcnode-id="1122" instrument_node="">
</span><blockquote data-dcnode-id="1119"><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">“The people you surround yourself with influence your behaviors, so choose friends who have healthy habits.” — Dan Buettner</span></p></blockquote><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1117" instrument_node="">Surround yourself with the people who reflect the person you want to be. Having </span><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/816223/positive-relationship"><span data-dcnode-id="1116" instrument_node="">positive and healthy relationships</span></a><span data-dcnode-id="1114" instrument_node=""> in life is the key to living a happy life. You do not want to spend any time with people who suck the happiness out of you.</span></p><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Positive and healthy relationships are where you find the support and strength to face those tough times in life. If you don’t have positive relationships in your life, the chances of having happiness in your life are not that great. </span></p><div class="ad-wrap-transparent article-top-ad container-fluid d-md-none" data-dcnode-id="1097"><span data-dcnode-id="1109" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1106" instrument_node="">
</span><div class="lazyload-ad incontent-inline-rect" data-dcnode-id="1102" data-id="lifehack_m_BTF1_ap" id="lifehack_m_BTF1_ap"><span data-dcnode-id="1105" instrument_node="">
</span><br data-dcnode-id="1104"><span data-dcnode-id="1103" instrument_node="">
</span></div><span data-dcnode-id="1101" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1098" instrument_node="">
</span></div><span data-dcnode-id="1096" instrument_node="">
</span><h2 data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">4. Commit to Helping Others</span></h2><span data-dcnode-id="1093" instrument_node="">
</span><blockquote data-dcnode-id="1090"><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">“The purpose of life is not to be happy. It is to be useful, to be honorable, to be compassionate, to have it make some difference that you have lived and lived well.” ― Ralph Waldo Emerson</span></p></blockquote><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1085"><a data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/810855/how-to-get-motivated"><span data-dcnode-id="1088" instrument_node="">Having a sense of purpose</span></a><span data-dcnode-id="1086" instrument_node=""> is important to having happiness in your life. In essence, the greater sense of purpose we feel, the happier we become.</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Helping others, acts of kindness, compassion and service to others increase our wellbeing and sustains happiness in our life.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><h2 data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">5. Choose to Take Care of Your Mind, Body, and Spirit</span></h2><span data-dcnode-id="1078" instrument_node="">
</span><blockquote data-dcnode-id="1074"><p data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">“Self-care is a deliberate choice to gift yourself with people, places, things, events, and opportunities that recharge our personal battery and promote whole health—body, mind, and spirit.” – Laurie Buchanan, PhD</span></p><div class="cf-2355-area-21490" data-dcnode-id="1075"></div></blockquote><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">A commitment to being the best person you can be is important to sustaining happiness in your life. Taking care of your body, mind and over wellbeing is crucial to you being the happiest person you can be.</span></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">If you don’t have a consistent type of physical activity in your life, then your mental energy, your emotional energy and your spiritual energy are depleted — in fact they are in the negative.</span></p><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Your ability to deal with the tough times in your life is seriously compromised when you do not have the physical and emotion stamina to manage these setbacks. </span></p><div class="ad-wrap-transparent article-top-ad container-fluid d-md-none" data-dcnode-id="1055"><span data-dcnode-id="1064" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1061" instrument_node="">
</span><div class="pg-lazy incontent-inline-rect" data-dcnode-id="1060" data-gpt-parent="lifehack_m_BTF2_ap"></div><span data-dcnode-id="1059" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1056" instrument_node="">
</span></div><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1053" instrument_node="">Practice these </span><a class="gs-title" data-ctorig="https://www.lifehack.org/834747/self-care" data-cturl="https://www.google.com/url?client=internal-uds-cse&amp;cx=partner-pub-9079061040234685:riohha-12jb&amp;q=https://www.lifehack.org/834747/self-care&amp;sa=U&amp;ved=2ahUKEwiJt9Di56LkAhVE7GEKHcW4BKgQFjABegQIDhAC&amp;usg=AOvVaw0VhtiQqmydnmz_qimfmEoS" data-dcnode-id="1051" dir="ltr" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/834747/self-care" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1052" instrument_node="">30 Self-Care Habits for a Strong and Healthy Mind, Body and Spirit.</span></a></p><span data-dcnode-id="1049" instrument_node="">
</span><h2 data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Final Thoughts</span></h2><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Living a happy resilient life is within your reach.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Having a solid foundation built on the premise of living a happy life is the key ingredient to successfully navigating your way through the tough times in life.</span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">The above 5 strategies will help you on your journey to maintaining happiness in your life.</span></p><span data-dcnode-id="1037" instrument_node="">
</span><h2 data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">More About Staying Happy</span></h2><span data-dcnode-id="1034" instrument_node="">
