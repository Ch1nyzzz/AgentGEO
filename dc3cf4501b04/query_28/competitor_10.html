</span><div class="site-inner" data-dcnode-id="18"><div class="content-sidebar-wrap" data-dcnode-id="19"><main class="content" data-dcnode-id="273"><article aria-label="How to Keep Faith in Tough Times" class="post-142 post type-post status-publish format-standard has-post-thumbnail category-keeping-faith category-popular-posts entry" data-dcnode-id="3651" itemscope="" itemtype="https://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="3776"><h1 class="entry-title" data-dcnode-id="3791" itemprop="headline"><span data-dcnode-id="3792" instrument_node="">How to Keep Faith in Tough Times</span></h1><span data-dcnode-id="3790" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="3777"><time class="entry-time" data-dcnode-id="3788" datetime="2010-05-10T15:37:11-04:00" itemprop="datePublished"><span data-dcnode-id="3789" instrument_node="">May 10, 2010</span></time><span data-dcnode-id="3787" instrument_node=""> By </span><span class="entry-author" data-dcnode-id="3783" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="entry-author-link" data-dcnode-id="3784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goingbyfaith.com/author/admin/" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="3785" itemprop="name"><span data-dcnode-id="3786" instrument_node="">Jen</span></span></a></span><span data-dcnode-id="3782" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="3779"><a data-dcnode-id="3780" href="#comments"><span data-dcnode-id="3781" instrument_node="">88 Comments</span></a></span><span data-dcnode-id="3778" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="3662" itemprop="text"><p data-dcnode-id="3773"><a data-dcnode-id="3774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goingbyfaith.com/wp-content/uploads/2010/05/Keeping-Faith-in-tough-times.jpg"><img alt="keeping faith in tough times" class="aligncenter wp-image-2487" data-dcnode-id="3775" height="465" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goingbyfaith.com/wp-content/uploads/2010/05/Keeping-Faith-in-tough-times.jpg&amp;raw" srcset="https://www.goingbyfaith.com/wp-content/uploads/2010/05/Keeping-Faith-in-tough-times.jpg 540w, https://www.goingbyfaith.com/wp-content/uploads/2010/05/Keeping-Faith-in-tough-times-300x199.jpg 300w" width="700"></a></p><span data-dcnode-id="3772" instrument_node="">
</span><p data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">In good times it’s easy to talk about faith. It’s easy to see why we believe and encourage others to “keep the faith” when they’re feeling down. But what about periods of prolonged suffering or surprise attacks?</span></p><span data-dcnode-id="3769" instrument_node="">
</span><p data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">How do we keep the faith in tough times?</span></p><span data-dcnode-id="3766" instrument_node="">
</span><p data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">I pondered this question just yesterday. After a long stint of peace and tranquility, yesterday proved challenging with flaring emotions, less-than-graceful communication and the temptation to — yet again — go over details.</span></p><span data-dcnode-id="3763" instrument_node="">
</span><p data-dcnode-id="3758"><span data-dcnode-id="3762" instrument_node="">Even with all the reading,</span><a data-dcnode-id="3760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goingbyfaith.com/%3Fp%3D68"><span data-dcnode-id="3761" instrument_node=""> all the praying </span></a><span data-dcnode-id="3759" instrument_node="">and all the practice of trying to stay peaceful, yesterday was overwhelming, and I found myself begging God to drop me a line.</span></p><span data-dcnode-id="3757" instrument_node="">
</span><p data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">Nothing happened.</span></p><span data-dcnode-id="3754" instrument_node="">
</span><p data-dcnode-id="3749"><span data-dcnode-id="3753" instrument_node="">I prayed over and over for Him to bring relief and change the scene. Nothing. I felt discouraged, depressed… and impatient. Why wasn’t He answering my prayers? Why wasn’t He showing Himself? And then I remembered something: We grow in our faith, and it takes time. </span><a data-dcnode-id="3751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goingbyfaith.com/when-you-dont-want-the-lesson-but-its-already-there/" target="_blank"><span data-dcnode-id="3752" instrument_node="">The struggle strengthens us</span></a><span data-dcnode-id="3750" instrument_node="">.</span></p><span data-dcnode-id="3748" instrument_node="">
</span><h2 data-dcnode-id="3745"><strong data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">Keeping Faith</span></strong></h2><span data-dcnode-id="3744" instrument_node="">
</span><p data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">Our faith isn’t always tested in the good times; our faith is tested during trials and times of challenge.</span></p><span data-dcnode-id="3741" instrument_node="">
</span><p data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">When we ask, “Where are you, God?” and hear crickets chirping, that’s when we’re left to decide. Will we believe anyway–cultivating a more mature faith? Or will we decide He’s not there, falling back on all the voices we’ve heard in the past?</span></p><span data-dcnode-id="3738" instrument_node="">
</span><p data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">Sometimes we can see the temptation at work in these moments; sometimes we can’t. We take forward steps and backward steps (and side steps and missteps), but we’re growing when our number of forward steps become greater.</span></p><span data-dcnode-id="3735" instrument_node="">
</span><p data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">Taking that forward step is your faith in action.</span></p><span data-dcnode-id="3732" instrument_node="">
</span><h2 data-dcnode-id="3729"><strong data-dcnode-id="3730"><span data-dcnode-id="3731" instrument_node="">3 Ways to Keep the Faith Right Now</span></strong></h2><span data-dcnode-id="3728" instrument_node="">
</span><p data-dcnode-id="3717"><em data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">1. Lean Into the Faith You Have</span></em><br data-dcnode-id="3725"><span data-dcnode-id="3724" instrument_node="">
Choose to remain faithful when there is no visible finish line and no feeling of relief. </span><a data-dcnode-id="3722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goingbyfaith.com/keeping-faith-in-god-6-ways-to-lean-in-deeper/" target="_blank"><span data-dcnode-id="3723" instrument_node="">Lean into it</span></a><span data-dcnode-id="3721" instrument_node=""> and bear through the discomfort that comes from trusting in what you cannot see. It’s not taking a risk–it’s strengthening your faith. Are you </span><a data-dcnode-id="3719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goingbyfaith.com/can-we-trust-god/"><span data-dcnode-id="3720" instrument_node="">struggling with trusting God</span></a><span data-dcnode-id="3718" instrument_node="">?</span></p><span data-dcnode-id="3716" instrument_node="">
</span><p data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">Think of a yoga stretch or new skill; getting to the next level requires a time of discomfort while pushing forward. You will feel (and eventually see) the difference. “This calls for patient endurance on the part of the saints who obey God’s commandments and remain faithful to Jesus.” (Revelation 14:12)</span></p><span data-dcnode-id="3713" instrument_node="">
</span><p data-dcnode-id="3708"><em data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">2. Pray for Strength and Guidance</span></em><br data-dcnode-id="3710"><span data-dcnode-id="3709" instrument_node="">
During the discomfort, pray that God guides your steps and keeps you strong. Temptation will sway in and out to mislead and falsely appease you, but pray right through it. “Watch and pray, so that you will not fall into temptation. The spirit is willing, but the body is weak.” (Matthew 26:41)</span></p><span data-dcnode-id="3707" instrument_node="">
</span><p data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">And if you fall for it… which we all do at times… start again. Keep choosing God over and over and over.</span></p><span data-dcnode-id="3704" instrument_node="">
</span><p data-dcnode-id="3696"><em data-dcnode-id="3702"><span data-dcnode-id="3703" instrument_node="">3. Remain Planted in Good Soil</span></em><br data-dcnode-id="3701"><span data-dcnode-id="3700" instrument_node="">
When you feel the struggle heavy on your back, bury yourself in more good soil. Surround yourself with loving friends, pop into a church before starting the day, read the Bible, put some encouraging messages where you can see them, attend a service, </span><a data-dcnode-id="3698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cornerstonesf.org/%23message" target="_blank"><span data-dcnode-id="3699" instrument_node="">watch an online sermon</span></a><span data-dcnode-id="3697" instrument_node="">, ask someone you love to pray with you or meditate on positive thoughts. As my husband tells me, stay in the Word. The tough times will hit us, but we are living for something bigger.</span></p><span data-dcnode-id="3695" instrument_node="">
</span><p data-dcnode-id="3693"><span data-dcnode-id="3694" instrument_node="">“But the seed on good soil stands for those with a noble and good heart, who hear the word, retain it, and by persevering produce a crop.” (Luke 8:15)</span></p><span data-dcnode-id="3692" instrument_node="">
</span><p data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">Blessings to you this week!</span></p><span data-dcnode-id="3689" instrument_node="">
</span><p data-dcnode-id="3686"><strong data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">What’s the hardest part about keeping faith in tough times for you?</span></strong></p><span data-dcnode-id="3685" instrument_node="">
</span><p data-dcnode-id="3681"><span data-dcnode-id="3684" instrument_node="">You might also like </span><a data-dcnode-id="3682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goingbyfaith.com/keeping-faith-in-trials-temptation-and-tough-times/"><span data-dcnode-id="3683" instrument_node="">Keeping Faith in Trials, Temptations and Hard Times</span></a></p><span data-dcnode-id="3680" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="3184"><time class="comment-time" data-dcnode-id="3185" datetime="2013-01-12T19:51:59-04:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="3186" href="#comment-1647" itemprop="url"><span data-dcnode-id="3187" instrument_node="">January 12, 2013 at 7:51 pm</span></a></time></p><span data-dcnode-id="3183" instrument_node=""> </span></header><span data-dcnode-id="3181" instrument_node="">
</span><div class="comment-content" data-dcnode-id="3176" itemprop="text"><span data-dcnode-id="3180" instrument_node="">
</span><p data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">I’ve been goingg trough a rough time. I to have been cryingg outt to the Lord. It seems He’s not listening at all but I know He’s there. I’m so scared that my marraige is over. My wife who is a Christian asked me to leave and dumb me left, and after almost two months I’ve received a separation agreement to sign. What am I to do. Get a lawyer and fight or give her what she wants. I need wisdom from God so badly but I can’t seem to hear Him and what He requires of me. I love her and think she’s making a big mistake. She says God told her to do it so we can grow closer to Him. She’s not crazy, and I know she ‘s seeking God but feel the enimy has tricked her with his lies. I try to talk the truth to her to no avail. Please can someone pray. My wifes name is Judy</span></p><span data-dcnode-id="3177" instrument_node="">
</span></div><span data-dcnode-id="3175" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="3161" height="96" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/2da7cc207d284882b3991496be153ef8%3Fs%3D96%26d%3Didenticon%26r%3Dpg&amp;raw" srcset="https://secure.gravatar.com/avatar/2da7cc207d284882b3991496be153ef8?s=192&amp;d=identicon&amp;r=pg 2x" width="96"><span class="comment-author-name" data-dcnode-id="3158" itemprop="name"><a class="comment-author-link" data-dcnode-id="3159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//goingbyfaith.com/" itemprop="url" rel="external nofollow"><span data-dcnode-id="3160" instrument_node="">Jennifer Johns</span></a></span><span data-dcnode-id="3157" instrument_node=""> </span><span class="says" data-dcnode-id="3155"><span data-dcnode-id="3156" instrument_node="">says</span></span><span data-dcnode-id="3154" instrument_node=""> </span></p><span data-dcnode-id="3152" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="3148"><time class="comment-time" data-dcnode-id="3149" datetime="2013-01-13T17:09:48-04:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="3150" href="#comment-1648" itemprop="url"><span data-dcnode-id="3151" instrument_node="">January 13, 2013 at 5:09 pm</span></a></time></p><span data-dcnode-id="3147" instrument_node=""> </span></header><span data-dcnode-id="3145" instrument_node="">
</span><div class="comment-content" data-dcnode-id="3124" itemprop="text"><span data-dcnode-id="3144" instrument_node="">
</span><p data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">@Vicky — Thank you for sharing this. I’ve heard of people going through extremely trying times and growing closer to God in the process. Refinement? Spiritual warfare? God bless you sister. You’ll be in our prayers. We read a book called “The Life You’re Fighting For” by James Robison, and it might be applicable, though I’m not sure.</span></p><span data-dcnode-id="3141" instrument_node="">
</span><p data-dcnode-id="3137"><span data-dcnode-id="3140" instrument_node="">@Tom — I’m sorry to hear about the current situation with you and Judy. First and foremost, we are praying for you both, that the Lord will direct your paths according to His perfect will and bless you both with merciful and forgiving hearts, filled with His wisdom and love. Something that comes to mind personally is to seek counsel from your pastor and guidance from godly men you know and trust. Also, my husband and I attended Weekend to Remember recently and it was unbelievable. Many couples go as a last resort before divorce; others go to strengthen already thriving marriage. Testimony: </span><a data-dcnode-id="3138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.familylife.com/events/featured-events/weekend-to-remember/tell-me-more/testimonials%23.UPNMWvKb2bU" rel="nofollow ugc"><span data-dcnode-id="3139" instrument_node="">http://www.familylife.com/events/featured-events/weekend-to-remember/tell-me-more/testimonials#.UPNMWvKb2bU</span></a></p><span data-dcnode-id="3136" instrument_node="">
</span><p data-dcnode-id="3132"><span data-dcnode-id="3135" instrument_node="">Here are bible verses about seeking counsel:</span><br data-dcnode-id="3134"><span data-dcnode-id="3133" instrument_node="">
James 1:5, “If any of you lacks wisdom, he should ask God, who gives generously to all without finding fault, and it will be given to him.” With that said, sometimes He uses other people to help you in this process.</span></p><span data-dcnode-id="3131" instrument_node="">
</span><p data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">A wise man will hear and increase in learning, and a man of understanding will acquire wise counsel. (Proverbs 1:5)</span></p><span data-dcnode-id="3128" instrument_node="">
</span><p data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">The naive believes everything, but the prudent man considers his steps. (Proverbs 14:15)</span></p><span data-dcnode-id="3125" instrument_node="">
</span></div><span data-dcnode-id="3123" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="3097"><time class="comment-time" data-dcnode-id="3098" datetime="2013-01-29T21:10:00-04:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="3099" href="#comment-1686" itemprop="url"><span data-dcnode-id="3100" instrument_node="">January 29, 2013 at 9:10 pm</span></a></time></p><span data-dcnode-id="3096" instrument_node=""> </span></header><span data-dcnode-id="3094" instrument_node="">
</span><div class="comment-content" data-dcnode-id="3089" itemprop="text"><span data-dcnode-id="3093" instrument_node="">
</span><p data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">Jen, I haven’t been having anywhere near a life threatening problem. Just a little emotional situation and a daughter in college who is becoming more independent and making her own choices. Not to mention it’s that time in my life where my hormones are outta whack. But still, with a lot of changes going on in my life I have been finding it harder and harder to trust that God has my best interests in mind. Sometimes it feels like He is just punishing me because I have been bad or something.  I feel God trying to stretch me in new directions to help me to grow in my faith and understanding, and this article I think is Him telling me that that’s what He is doing. It seems to be a recurring theme in all my Bible study as of late. Thank you for doing His work. We all need to hear it. I hope I see it’s truth soon. Lord bless you.</span></p><span data-dcnode-id="3090" instrument_node="">

</span><p data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">I’m praying for you even today Darla, for God’s peace and comfort to fill your heart. He course corrects His children when we need it (when it’s for our good), but God doesn’t punish us. He’s a loving father who has our best interests in His heart. </span></p><span data-dcnode-id="3056" instrument_node="">
</span><p data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">Jeremiah 29:11 says, “For I know the plans I have for you,” declares the LORD, “plans to prosper you and not to harm you, plans to give you hope and a future.”</span></p><span data-dcnode-id="3053" instrument_node="">

</span><p data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">Hello brothers and sisters. My name is Steven and I’m going through a hard time. I’m 20 years old and I have been with the same girl for almost 4 years. I have had previous girlfriends but I have never been as serious or felt this type of connection I have with this girl I’m with now. We are currently on break and I have been praying daily. I’m afraid of losing her and I think her problem is that she is dwelling on her past with her previous boyfriends that have done he wrong. I honestly think it’s the enemy trying to make me lose faith. Y’all know how the enemy works. When you have a good thing he will try and take it away. I’m just asking for prayer to bring us back together as boyfriend and girlfriend and have a stronger relationship. My girlfriend name is Lakayla. Thank you guys.</span></p><span data-dcnode-id="2788" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="2084"><time class="comment-time" data-dcnode-id="2085" datetime="2014-08-30T07:42:08-04:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="2086" href="#comment-12961" itemprop="url"><span data-dcnode-id="2087" instrument_node="">August 30, 2014 at 7:42 am</span></a></time></p><span data-dcnode-id="2083" instrument_node=""> </span></header><span data-dcnode-id="2081" instrument_node="">
</span><div class="comment-content" data-dcnode-id="2052" itemprop="text"><span data-dcnode-id="2080" instrument_node="">
</span><p data-dcnode-id="2054"><span data-dcnode-id="2079" instrument_node="">In good times or bad, I’ve always had a problem with PERSEVERANCE.</span><br data-dcnode-id="2078"><span data-dcnode-id="2077" instrument_node="">
Same cycle for years at a time:   going to Church, pray all the time, intense belief in God, and finally prayed for perseverance, which I didn’t seem to have answered……</span><br data-dcnode-id="2076"><span data-dcnode-id="2075" instrument_node="">
….because for one reason or another, I would stop going to Church, praying, and occasionally questioned the existence of God.</span><br data-dcnode-id="2074"><span data-dcnode-id="2073" instrument_node="">
.</span><br data-dcnode-id="2072"><span data-dcnode-id="2071" instrument_node="">
Well, once more, for the past few years, I have been enduring a lot of emotional pain and hardship….along with my continuous physical pain (which I accepted years ago).</span><br data-dcnode-id="2070"><span data-dcnode-id="2069" instrument_node="">
Initially, I was not going to Church, but I firmly believed in God, and I prayed.</span><br data-dcnode-id="2068"><span data-dcnode-id="2067" instrument_node="">
A lot of times it seems that God does not even hear me.</span><br data-dcnode-id="2066"><span data-dcnode-id="2065" instrument_node="">
Yet there are answers, but not in the way  that”I” want answers.</span><br data-dcnode-id="2064"><span data-dcnode-id="2063" instrument_node="">
And since patience is not my strongest virtue, nothing is answered quick enough for me.</span><br data-dcnode-id="2062"><span data-dcnode-id="2061" instrument_node="">
.</span><br data-dcnode-id="2060"><span data-dcnode-id="2059" instrument_node="">
However, I have to believe that God….in His way, in His time…is allowing my trials for the past few years in order to FIRMLY teach me and to instill perseverance AND patience for always.</span><br data-dcnode-id="2058"><span data-dcnode-id="2057" instrument_node="">
.</span><br data-dcnode-id="2056"><span data-dcnode-id="2055" instrument_node="">
BTW, this is a wonderful site!  Very in touch with issues and solutions…..and a very decent site.</span></p><span data-dcnode-id="2053" instrument_node="">
</span></div><span data-dcnode-id="2051" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="1684"><time class="comment-time" data-dcnode-id="1685" datetime="2015-06-24T04:47:15-04:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="1686" href="#comment-76277" itemprop="url"><span data-dcnode-id="1687" instrument_node="">June 24, 2015 at 4:47 am</span></a></time></p><span data-dcnode-id="1683" instrument_node=""> </span></header><span data-dcnode-id="1681" instrument_node="">
</span><div class="comment-content" data-dcnode-id="1676" itemprop="text"><span data-dcnode-id="1680" instrument_node="">
</span><p data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">I am a staunch Catholic, born and bred and by choice to remain so. My life has been indented with an overwhelming and inordinate amount of suffering that still persists. The pain of this relentless suffering is affecting the quality of my life and I have, sadly lost all faith in God and am ashamedly feeling hatred towards him. I perceive God to be synonymous with suffering and fail to comprehend how this negative aspect of faith to be purposeful. I, therefore as of today wish to retreat from my faith and ” go solo ” . I feel God should do everything in his power to assist this despair and hatred I am feeling towards him…… not vice versa. Sarah Grant.</span></p><span data-dcnode-id="1677" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="1663" height="96" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/7d9f9eb9358f554166de712c3b053692%3Fs%3D96%26d%3Didenticon%26r%3Dpg&amp;raw" srcset="https://secure.gravatar.com/avatar/7d9f9eb9358f554166de712c3b053692?s=192&amp;d=identicon&amp;r=pg 2x" width="96"><span class="comment-author-name" data-dcnode-id="1661" itemprop="name"><span data-dcnode-id="1662" instrument_node="">Julietta</span></span><span data-dcnode-id="1660" instrument_node=""> </span><span class="says" data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">says</span></span><span data-dcnode-id="1657" instrument_node=""> </span></p><span data-dcnode-id="1655" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="1651"><time class="comment-time" data-dcnode-id="1652" datetime="2020-08-07T01:04:23-04:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="1653" href="#comment-179886" itemprop="url"><span data-dcnode-id="1654" instrument_node="">August 7, 2020 at 1:04 am</span></a></time></p><span data-dcnode-id="1650" instrument_node=""> </span></header><span data-dcnode-id="1648" instrument_node="">
</span><div class="comment-content" data-dcnode-id="1643" itemprop="text"><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">I don’t know if you’ll see this comment, but i hope you have regained faith in God.  He loves you. Sometimes we endure suffering as a Christian l, and it seems like God is not there for us. But He is. Through every trial in our lives, He is there. He loves us dearly, more than we can ever imagine. When we face difficult trials, we must remain bested in His Word. When it gets too hard to stand, kneel. I too am a Catholic, and enduring hardships at the moment. Sometimes it is too much effort for me to worship, but i make myself do it, and trust me you feel way better after. Ask God for the strength to keep going, and please email me if you ever need anyone to talk to. We all need to be here for one another. I will pray for you.</span></p><span data-dcnode-id="1644" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="1379"><time class="comment-time" data-dcnode-id="1380" datetime="2016-05-15T16:36:29-04:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="1381" href="#comment-98316" itemprop="url"><span data-dcnode-id="1382" instrument_node="">May 15, 2016 at 4:36 pm</span></a></time></p><span data-dcnode-id="1378" instrument_node=""> </span></header><span data-dcnode-id="1376" instrument_node="">
</span><div class="comment-content" data-dcnode-id="1371" itemprop="text"><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">I recently have been going through tough times. Lost my job. Same day I lost my job, my lady friend indicated she no longer wanted to be with me. Finances are very tough. Have fallen into, which I believe is deep depression. Everyone is indicating economy is getting better but jobs are difficult to attain. Highly educated individual but can’t seem to obtain a viable offer.  I try to pray and ask for his help but nothing is happening. I don’t know if I’m praying incorrectly or if I am. I’ll be honest, I’ve even questioned is God really listening. And if he is listening, why is he not answering prayers. I know it’s wrong for me to have those thoughts. But I’m very frustrated. I’ve been looking up scriptures and some healing words, but still frustrated. I know God says ask and you shall receive. Ask for forgiveness and he will. I’m not just asking for myself but for my two children as well. Thank you all. God bless.</span></p><span data-dcnode-id="1372" instrument_node="">
</span></div><span data-dcnode-id="1370" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="1345"><time class="comment-time" data-dcnode-id="1346" datetime="2016-08-07T19:40:29-04:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="1347" href="#comment-100300" itemprop="url"><span data-dcnode-id="1348" instrument_node="">August 7, 2016 at 7:40 pm</span></a></time></p><span data-dcnode-id="1344" instrument_node=""> </span></header><span data-dcnode-id="1342" instrument_node="">

</span><p data-dcnode-id="1337"><span data-dcnode-id="1340" instrument_node="">Hi Randall, thanks for reaching out. God bless you.</span><br data-dcnode-id="1339"><span data-dcnode-id="1338" instrument_node="">
It’s great that you’re seeking God for your needs and for your children; He knows your heart and He hears our prayers. It says in 1 John 5:14 “And this is the confidence that we have toward him, that if we ask anything according to his will he hears us. ” </span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">You’re not the only one who has asked if God is hearing your prayers… a number of people on this post alone have commented that as well as in other posts on this blog. Sometimes we feel like God isn’t hearing us or delivering, but He already knows our future. He knows what’s ahead when we trust in Him, even when we can’t see or understand. That’s our faith in action. Literally stepping out even when we cannot see where the next step will lead. “Seek the Kingdom of God above all else, and live righteously, and he will give you everything you need.” (matt 6:33)</span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">How are things going? I’ll be praying for you.</span></p><span data-dcnode-id="1330" instrument_node="">

</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Thanks for reaching out Eddie. Absolutely you and your wife are in my prayers, and I ask that all who read this continue to lift you up in prayer. </span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">The first thing I thought when I read your comment was “Weekend to Remember”… it’s a program by Family Life focused completely on marriage. They have it in different cities / different dates. My husband and I went four years ago. Some people are on the brink of divorce and they go and come back renewed. We’ve heard so many amazing testimonies. I don’t know if that’s something you or your wife would ever consider, but there are other programs like this out there, even your church… are you able to counsel with a pastor or elder in ministry of marriage? Praying for you guys. God bless you.</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1172"><a data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.familylife.com/weekendtoremember" rel="nofollow ugc"><span data-dcnode-id="1175" instrument_node="">http://www.familylife.com/weekendtoremember</span></a><span data-dcnode-id="1173" instrument_node="">  (if helpful)</span></p><span data-dcnode-id="1171" instrument_node="">

</span><p data-dcnode-id="1094"><span data-dcnode-id="1098" instrument_node="">I do see your comment! Hello Love </span><img alt="🙂" class="emoji" data-dcnode-id="1097" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f642.svg&amp;raw"><br data-dcnode-id="1096"><span data-dcnode-id="1095" instrument_node="">

</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="984" height="96" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/2da7cc207d284882b3991496be153ef8%3Fs%3D96%26d%3Didenticon%26r%3Dpg&amp;raw" srcset="https://secure.gravatar.com/avatar/2da7cc207d284882b3991496be153ef8?s=192&amp;d=identicon&amp;r=pg 2x" width="96"><span class="comment-author-name" data-dcnode-id="981" itemprop="name"><a class="comment-author-link" data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//goingbyfaith.com/" itemprop="url" rel="external nofollow"><span data-dcnode-id="983" instrument_node="">Jenn Johns</span></a></span><span data-dcnode-id="980" instrument_node=""> </span><span class="says" data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">says</span></span><span data-dcnode-id="977" instrument_node=""> </span></p><span data-dcnode-id="975" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="971"><time class="comment-time" data-dcnode-id="972" datetime="2016-07-23T07:42:42-04:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="973" href="#comment-99985" itemprop="url"><span data-dcnode-id="974" instrument_node="">July 23, 2016 at 7:42 am</span></a></time></p><span data-dcnode-id="970" instrument_node=""> </span></header><span data-dcnode-id="968" instrument_node="">
</span><div class="comment-content" data-dcnode-id="946" itemprop="text"><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Wow, what a blessing to read your comments. I was inactive for a few years on the blog, but day this reminds me of how much I LOVE being back… we are real people. We are brothers and sisters in Christ. We all have trials, all of us. We all struggle. The important thing is what do we do next? Where do we turn your eyes? </span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">“I lift my eyes up to the hills, where does my help come from? My help comes from the Lord, the maker of heaven and earth” (Psalm 121:1-2)</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">First, I want you to know that I have read and reread these comments and am praying for each one of you–whether the comment was from 2010 or a few days ago. </span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">For the question of “how to do I keep faith?” … it’s your freewill choice. Faith is believing in what we cannot see. When I have temptations to doubt, I think about all the ways God has shown himself over and over again, including when I was broken and he gave me a real life. I think about these things and remember them in detail. I tell my children and remember how I was so amazed… God is real. This is not just something you believe to believe… he is alive.</span></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="954" instrument_node="">But I also pray for faith. I pray for increased faith often, not just in hard times, but in all times. There is so much I could say here, maybe this needs its own post </span><img alt="🙂" class="emoji" data-dcnode-id="953" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f642.svg&amp;raw"><span data-dcnode-id="952" instrument_node=""> Meantime, I encourage you to literally “go by faith”… take a step out to God, even when you don’t see Him there, trust that He is there, trust what you cannot see because that is your faith in action. He will bless you for it. </span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Remember when Thomas didn’t believe that Jesus really appeared to the other apostles while he was gone? And then Jesus appears to Thomas, right there in front of everyone, and Thomas says, “My Lord my God!” What does Jesus say? He says:  “Because you have seen me, you have believed; blessed are those who have not seen and yet have believed.” John 20:29</span></p><span data-dcnode-id="947" instrument_node="">
</span></div><span data-dcnode-id="945" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="942"><a aria-label="Reply to Jenn Johns" class="comment-reply-link" data-belowelement="article-comment-99985" data-commentid="99985" data-dcnode-id="943" data-postid="142" data-replyto="Reply to Jenn Johns" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goingbyfaith.com/how-to-keep-faith-in-tough-times/%3Freplytocom%3D99985%23respond" rel="nofollow"><span data-dcnode-id="944" instrument_node="">Reply</span></a></div><span data-dcnode-id="941" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="919"><time class="comment-time" data-dcnode-id="920" datetime="2016-08-27T01:07:37-04:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="921" href="#comment-100723" itemprop="url"><span data-dcnode-id="922" instrument_node="">August 27, 2016 at 1:07 am</span></a></time></p><span data-dcnode-id="918" instrument_node=""> </span></header><span data-dcnode-id="916" instrument_node="">

</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Hello friends, thanks for the encouraging message. Please pray for me. My story is way too long to write it all down but in summary I needs God’s favour and grace to overcome 20 years of baggage and pain. I became a Christian when I was a teenager and a year later or so fell in deep love with another woman. At the time l hadn’t even heard about woman loving another woman, it came as a huge surprise. Of course I wasn’t loved back or shown any empathy and it was the beginning of my 20 years of pain and rejection. I never practiced or loved again. In different circumstances  l have felt so betrayed and pushed away especially from believers and ended up a loner for many years. I keep praying to God to show me the way but I need help in this journey but as a result of betrayal and heavy stuff I have gone through l donno how to trust anyone to talk things through cos all I get is judgement and people making me think God is punishing me. Please pray for me. Mimi</span></p><span data-dcnode-id="912" instrument_node="">
</span></div><span data-dcnode-id="910" instrument_node="">

</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Hello Mimi, thanks for reaching out! Yes, I will pray for you that God shows you the way and guides you on your journey. Also praying for loving Christian friends to enter your life who can understand you and your past hurts. For me that was a huge comfort and support as I began following Christ with my life. You have my prayers sister, God bless you.</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">“Do not be afraid. I will save you. I have called you by name—you are mine. When you pass through deep waters, I will be with you; your troubles will not overwhelm you. When you pass through fire, you will not be burned; the hard trials that come will not hurt you. For I am the Lord, your God. … because you are precious to me and because I love you and give you honor, do not be afraid—I am with you!” Isaiah 43:1-5</span></p><span data-dcnode-id="875" instrument_node="">

</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">My son’s world was torn apart when the single father of his four only friends died unexpectedly. The kids all have been moved away and relationships have not resumed. The girl he loves has been deceptive and unfaithful with another person who called himself a friend. This has happened 5 times before with friends doing things to take away a girl he liked. He feels cursed by God rather than loved. I see what he has been going through. Yes, it could always be worse, but knowing that doesn’t cause a person to love God more. He feels God is against him even when he is doing all he knows to do to obey God. It hurts. He feels betrayed, and I am out of answers.</span></p><span data-dcnode-id="764" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="474"><time class="comment-time" data-dcnode-id="475" datetime="2018-04-25T09:54:39-04:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="476" href="#comment-119355" itemprop="url"><span data-dcnode-id="477" instrument_node="">April 25, 2018 at 9:54 am</span></a></time></p><span data-dcnode-id="473" instrument_node=""> </span></header><span data-dcnode-id="471" instrument_node="">
</span><div class="comment-content" data-dcnode-id="461" itemprop="text"><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">I feel like if I am battling against my own daughter at times. I am a strong believer in Christ but there are time that I have no answers for what the enemy puts us thru.  This all started when my grandson Alex was diagnosed with a brain tumor at the age of 5.  Lets just say that he came out fine from the surgery ( Thank you Jesus). As time went by he started having a lot of complications after his surgery so it came to shock for everyone that his tumor had grown again. He has to go thru surgery again and of course my daughter is preparing herself for the worse. I cannot give her any words of encouragement or faith for that matter. She resentment God for this. I know that in our times of trials he is testing our faith and yes I do sway away at times and question him ” WHY” but I catch myself and focus my eyes back to him. Please lift her and my grandson up in prayer and if you can please give me some kind of words to say to her….SPEAK LIFE TO HER DEAD BONES. </span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="466" instrument_node="">                                                                                                                                                        Thank you</span><br data-dcnode-id="465"><span data-dcnode-id="464" instrument_node="">
