    </span></h1></div><div class="post-author-list" data-dcnode-id="1113"><div class="post-author" data-dcnode-id="1114"><a class="rm-stats-tracked" data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brit.co/u/julia_malacoff"><div class="post-author__avatar image" data-dcnode-id="1118" style="background-image: url(&quot;https://www.brit.co/media-library/eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpbWFnZSI6Imh0dHBzOi8vYXNzZXRzLnJibC5tcy8yMjA2MzIwNS9vcmlnaW4uanBnIiwiZXhwaXJlc19hdCI6MTcxMTQyMDQyMH0.hpNuCNGZII5Ekcvgsc_g50l7l9ohlbuGTnSg38f9afU/image.jpg?width=210&quot;)"></div></a><a class="post-author__name rm-stats-tracked" data-dcnode-id="1115" data-type="text" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brit.co/u/julia_malacoff"><span data-dcnode-id="1116" instrument_node="">Julia Malacoff</span></a></div></div><span class="post-date" data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Mar 07, 2022</span></span><div class="widget__shares share-panel" data-dcnode-id="1092"><a aria-label="Share on Facebook" class="share share-popup share-fb rm-stats-tracked" data-dcnode-id="1108" data-track-share="Facebook" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fwww.brit.co%252Fhow-to-stay-positive-during-tough-times%252F%253Fxrs%253DRebelMouse_fb%2526ts%253D1648489791" rel="noopener noreferrer"><i aria-hidden="true" class="icons-share fb fa fa-facebook" data-dcnode-id="1109"></i></a><a aria-label="Save to Pinterest" class="share share-pinterest share-popup rm-stats-tracked" data-dcnode-id="1105" data-track-share="Pinterest" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%253A%252F%252Fwww.brit.co%252Fhow-to-stay-positive-during-tough-times%252F%26media%3Dhttps%253A//www.brit.co/media-library/eyJhbGciOiJIUzI1NiIsInR5c el="Share via Email" class="share share-popup share-email" data-dcnode-id="1094" data-track-share="Email" href="mailto:?subject=7%20Ways%20to%20Stay%20Positive%20Even%20During%20the%20Toughest%20Times&amp;body=https://www.brit.co/how-to-stay-positive-during-tough-times/" rel="noopener noreferrer"><i aria-hidden="true" class="icons-share em fa fa-envelope" data-dcnode-id="1095"></i></a></div><div class="like-button loaded rm-preact tool_tip_added" data-dcnode-id="1086" data-post-likes="0"><a aria-label="Like post" class="like-btn like" data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brit.co/login"><i class="heart fa fa-heart-o" data-dcnode-id="1091"></i></a><div class="tool-tip" data-dcnode-id="1087"><div class="tool-tip--inner" data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Save your faves — add the posts and recipes you love to your B+C profile!</span></div></div></div></div><div class="widget__head" data-dcnode-id="1081"><picture data-dcnode-id="1082"><source data-dcnode-id="1084" srcset="https://www.brit.co/media-library/woman-smiling-and-journaling.jpg?id=29493262&amp;width=1200&amp;quality=90&amp;coordinates=0%2C0%2C0%2C0&amp;height=1800 3x, https://www.brit.co/media-library/woman-smiling-and-journaling.jpg?id=29493262&amp;width=1200&amp;quality=90&amp;coordinates=0%2C0%2C0%2C0&amp;height=1800 2x, https://www.brit.co/media-library/woman-smiling-and-journaling.jpg?id=29493262&amp;width=1200&amp;quality=90&amp;coordinates=0%2C0%2C0%2C0&amp;height=1800 1x"><img alt="woman smiling and journaling" aria-label="woman smiling and journaling" class="rm-lazyloadable-image" data-dcnode-id="1083" height="1800" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brit.co/media-library/woman-smiling-and-journaling.jpg%3Fid%3D29493262%26width%3D1200%26quality%3D90%26coordinates%3D0%252C0%252C0%252C0%26height%3D1800&amp;raw" style="object-fit: cover;" width="1200"></picture></div><div class="widget__body clearfix sm-mt-1" data-dcnode-id="903"><span class="js-scroll-trigger" data-dcnode-id="1080" data-target="body" data-toggle-class="with-floating-shares" data-triggers="render-rebelbar"></span><div data-dcnode-id="1079" id="utm_campaign"></div><div class="body js-expandable clearfix js-listicle-body js-update-url css-listicle-body-2639443420" data-authors="Julia Malacoff" data-dcnode-id="924" data-elid="2639443420" data-headline="7 Ways to Stay Positive Even During the Toughest Times" data-post-url="https://www.brit.co/how-to-stay-positive-during-tough-times/"><div class="body-description" data-dcnode-id="925"><p data-dcnode-id="1058"><span data-dcnode-id="1078" instrument_node="">A lot of people pride themselves on being optimists, and TBH, if you can</span><strong data-dcnode-id="1075"><a class="rm-stats-tracked" data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brit.co/how-to-stay-positive-when-you-hit-a-workout-plateau/" target="_blank"><span data-dcnode-id="1077" instrument_node="">stay positive</span></a></strong><span data-dcnode-id="1074" instrument_node="">with everything that’s going on in the world today, major props to you. For most people who consider themselves the glass-half-full type, it’s a lifestyle. They try to look at everything that comes their way, from </span><a class="rm-stats-tracked" data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brit.co/how-defensiveness-is-killing-your-relationship-how-to-fix-it/" target="_blank"><strong data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">relationship troubles</span></strong></a><span data-dcnode-id="1070" instrument_node=""> to </span><a class="rm-stats-tracked" data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brit.co/what-to-do-when-you-make-a-huge-mistake-at-work/" target="_blank"><strong data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">work mistakes</span></strong></a><span data-dcnode-id="1066" instrument_node="">, with a positive spin. But a recent </span><a class="rm-stats-tracked" data-dcnode-id="1063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//onlinelibrary.wiley.com/wol1/doi/10.1111/jopy.12289/abstract" target="_blank"><strong data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">study</span></strong></a><span data-dcnode-id="1062" instrument_node=""> investigated whether optimists still stay more positive than pessimists when things get </span><em data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">really</span></em><span data-dcnode-id="1059" instrument_node=""> tough, and what they found was pretty surprising.</span></p><p class="shortcode-media shortcode-media-rebelmouse-image" data-dcnode-id="1056"><img alt="woman listening to music" class="rm-shortcode rm-lazyloadable-image" data-dcnode-id="1057" data-rm-shortcode-id="ea44a996a154cab5dee428248f01542f" data-rm-shortcode-name="rebelmouse-image" height="1200" id="c8de3" lazy-loadable="true" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brit.co/media-library/woman-listening-to-music.jpg%3Fid%3D29493273%26width%3D584%26quality%3D80&amp;raw" width="1800"></p><p data-dcnode-id="1054"><br data-dcnode-id="1055"></p><hr data-dcnode-id="1053"><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Scientists analyzed nine previous studies to see how both optimists and pessimists brace themselves for receiving important and potentially negative news, like medical test results. They found that even though people who identify as optimists tend to be more positive in general, they too start assuming the worst as the moment of truth about something important nears. It’s easy to understand this instinct, since some people tend to believe that preparing yourself for the worst will ultimately make it less shocking if it happens. On the other hand, some people would rather stay positive whenever possible, since it’s easier to fight off stress and anxiety when you have a sunny outlook. Here, we’ve gathered some of our favorite expert tips for staying optimistic when you’re dealing with some super hard stuff.</span></p><p data-dcnode-id="1050"></p><div class="htlad-contentbanner advertisement" data-ad-class="htlad-contentbanner" data-dcnode-id="1049" data-targeting="{&quot;post_id&quot;:&quot;2639443420&quot;}"></div><p data-dcnode-id="1048"></p><p class="shortcode-media shortcode-media-rebelmouse-image" data-dcnode-id="1046"><img alt="three friends smiling together" class="rm-shortcode rm-lazyloadable-image" data-dcnode-id="1047" data-rm-shortcode-id="65c523a5bcd39a137fee656185f88853" data-rm-shortcode-name="rebelmouse-image" height="1200" id="1da06" lazy-loadable="true" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brit.co/media-library/three-friends-smiling-together.jpg%3Fid%3D29493285%26width%3D584%26quality%3D80&amp;raw" width="1800"></p><h3 data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">How To Stay Positive</span></h3><p data-dcnode-id="1034"><strong data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">1.</span></strong><strong data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Learn to reframe negativity.</span></strong><span data-dcnode-id="1039" instrument_node=""> “The trick to positivity is not avoiding pessimism,” says </span><a class="rm-stats-tracked" data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//impactadhd.com/our-team/about-elaine/" target="_blank"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Elaine Taylor-Klaus</span></strong></a><span data-dcnode-id="1035" instrument_node="">, a certified professional coach. “It’s really about how quickly you can redirect your focus from negative to positive. Critical thinkers are going to see problems to be solved, but the ability to ‘reframe’ the conversation is the really important skill for people to practice.” She recommends getting into the habit of acknowledging negative thoughts and then asking, “What else is possible here?” This can guide you back into a positive mindset more quickly.</span></p><p data-dcnode-id="1033"></p><div class="htlad-Teads_1x1 advertisement" data-ad-class="htlad-Teads_1x1" data-dcnode-id="1032" data-targeting="{&quot;post_id&quot;:&quot;2639443420&quot;}"></div><p data-dcnode-id="1031"></p><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">“Bottom line: Negativity happens,” she says. “Positivity is a choice, and the quicker you learn to reframe, the more time you’ll spend in a positive space. Then, over time, the more likely you are to turn directly to a positive interpretation of events.”</span></p><p data-dcnode-id="1017"><strong data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">2. </span></strong><strong data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Ask yourself if this will matter a month or year from now. </span></strong><span data-dcnode-id="1024" instrument_node="">Sometimes things seem crucial AF in the moment, but might be inconsequential even just a few days after that. Just think about high school drama. “When we can leave the past behind and even know in the present moment that this feeling won’t last, it can help to remind us that time heals and life goes on,” explains</span><strong data-dcnode-id="1023"></strong><a class="rm-stats-tracked" data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sharonstokes.ca/" target="_blank"><strong data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Sharon Stokes</span></strong></a><span data-dcnode-id="1019" instrument_node="">, life-fulfillment coach.</span><u data-dcnode-id="1018"></u></p><p data-dcnode-id="1002"><strong data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">3.</span></strong><strong data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Give back.</span></strong><span data-dcnode-id="1012" instrument_node=""> Volunteering is an amazing way to change your entire perspective, says</span><strong data-dcnode-id="1011"></strong><a class="rm-stats-tracked" data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//lyssamenard.com/" target="_blank"><strong data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Lyssa Menard</span></strong></a><span data-dcnode-id="1007" instrument_node="">, a clinical health psychologist, founder of </span><strong data-dcnode-id="1004"><a class="rm-stats-tracked" data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.yourchangedoc.com/" target="_blank"><span data-dcnode-id="1006" instrument_node="">Strategies for Change</span></a></strong><span data-dcnode-id="1003" instrument_node="">and assistant professor at Northwestern University’s medical school. “There are many organizations that don’t require an ongoing commitment, so sign up for an event that’s meaningful. Research shows that giving to others is one of the quickest routes toward happiness. While happiness and positivity are different, they’re correlated,” Lyssa says.</span></p><p data-dcnode-id="1001"></p><div class="htlad-contentbanner advertisement" data-ad-class="htlad-contentbanner" data-dcnode-id="1000" data-targeting="{&quot;post_id&quot;:&quot;2639443420&quot;}"></div><p data-dcnode-id="999"></p><p data-dcnode-id="989"><strong data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">4. </span></strong><strong data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Role play to be more objective. </span></strong><span data-dcnode-id="994" instrument_node="">Playing a little mind trick on yourself can work wonders, says Lori Scherwin of </span><a class="rm-stats-tracked" data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.strategizethat.com/" target="_blank"><strong data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Strategize That</span></strong></a><span data-dcnode-id="990" instrument_node="">, a career coaching service. “We’re often better at helping others than ourselves,” she notes. “Make the situation more objective and less personal to you. For example, consider if it were anyone else in the situation (like your best friend, partner or colleague). How would you see the same ‘problem?’ What advice might you give them to get out of it?” she asks. This will help you shift from being super hard on yourself to more objective, and most likely, more positive.</span></p><p data-dcnode-id="988"></p><div class="htlad-contentbanner advertisement" data-ad-class="htlad-contentbanner" data-dcnode-id="987" data-targeting="{&quot;post_id&quot;:&quot;2639443420&quot;}"></div><p data-dcnode-id="986"></p><p class="shortcode-media shortcode-media-rebelmouse-image" data-dcnode-id="984"><img alt="woman walking outside" class="rm-shortcode rm-lazyloadable-image" data-dcnode-id="985" data-rm-shortcode-id="7200b2abc0a8ee4c92fcc856f0b17a5d" data-rm-shortcode-name="rebelmouse-image" height="1800" id="3a1e3" lazy-loadable="true" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brit.co/media-library/woman-walking-outside.jpg%3Fid%3D29493293%26width%3D584%26quality%3D80&amp;raw" width="1393"></p><p data-dcnode-id="974"><strong data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">5. </span></strong><strong data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Make changes to things that are within your control.</span></strong><span data-dcnode-id="979" instrument_node=""> Spending time worrying about something that you can’t change isn’t really worth the effort. Instead, “Focus on areas where you have agency,” suggests </span><a class="rm-stats-tracked" data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hollyburton.ca/" target="_blank"><strong data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Holly Burton</span></strong></a><span data-dcnode-id="975" instrument_node="">, a career coach for women in male-dominated industries. “You may be stuck in a role you don’t love at work, but you could probably work a few extra hours a week and take on a project that interests you. You could also schedule some proactive meetings with your boss to make an action plan to develop the skills you need to make a lateral move,” she says. In most situations, whether they’re career-related or not, it’s possible to take actions to make things better for yourself.</span></p><p data-dcnode-id="968"><strong data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">6. </span></strong><strong data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Practice radical acceptance. </span></strong><span data-dcnode-id="969" instrument_node="">Some professional coaches suggest trying out the idea of radical acceptance, which is basically accepting the things you cannot change, even if they’re not right or you don’t agree with them.</span></p><p data-dcnode-id="967"></p><div class="htlad-contentbanner advertisement" data-ad-class="htlad-contentbanner" data-dcnode-id="966" data-targeting="{&quot;post_id&quot;:&quot;2639443420&quot;}"></div><p data-dcnode-id="965"></p><p data-dcnode-id="959"><strong data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">7.</span></strong><strong data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Try this gratitude challenge. </span></strong><span data-dcnode-id="960" instrument_node="">First, journal about one event each day for seven days that made you feel happy and/or thankful and include the specifics of why it made you feel that way, going deep into the details. Second, send one random thank you email or text to someone each day, either personally or professionally. This message should include what they did and why it’s worthy of the shout out. Detailed gratitude journals are proven to improve your life satisfaction, so try to stick to a gratitude practice, even in the good times!</span></p><p data-dcnode-id="951"><strong data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">What do you do when you’re trying to stay optimistic? Have you tried any of these techniques? Tell us about it </span></strong><a class="rm-stats-tracked" data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/BritandCo" target="_blank"><strong data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">@BritandCo</span></strong></a><strong data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">!</span></strong></p><p data-dcnode-id="948"><em data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">This article has been updated.</span></em></p><div class="around-the-web" data-dcnode-id="926"><div class="from-your-site__headline" data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">From Your Site Articles</span></div><ul class="around-the-web__list" data-dcnode-id="927"><li class="from-your-site__item" data-dcnode-id="943"><a class="from-your-site__link rm-stats-tracked" data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brit.co/positive-vibes-gifts/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="945" instrument_node="">16 ​Positive Thinking​ Products for Everyday Self Care - Brit + Co ›</span></a></li><li class="from-your-site__item" data-dcnode-id="940"><a class="from-your-site__link rm-stats-tracked" data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brit.co/impor
