</span><img class="img-fluid" data-dcnode-id="888" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/blogs/15557/images/HFLyBShRueEOo0wBW8MQ_Copy_of_Gratitude_quotes.jpg&amp;raw"><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">It's easy to focus on the negative when going through a divorce. In honor of this season of Thanksgiving, let's focus on the positive. Here are 30 quotes about gratitude to help you.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="881"><a data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greatlakesdfs.com/divorce-recovery-guide"><img data-dcnode-id="883" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/xXlM02xsTe2w8RKOkJMS_gldfs-blog-callout-graphic_3_.jpg&amp;raw"></a></p><span data-dcnode-id="880" instrument_node="">
</span><h2 data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">30 Quotes About Gratitude</span></h2><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="874" style="text-align: center;"><em data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">"Being thankful is not always experienced as a natural state of existence, we must work at it, akin to a type of strength training for the heart." -&nbsp;Larissa Gomez&nbsp;</span></em></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="870" style="text-align: center;"><em data-dcnode-id="871"><img data-dcnode-id="872" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/xyBz4iFCRky1W5o8mItA_1.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="866" style="text-align: center;"><em data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">"Gratitude helps you to grow and expand; gratitude brings joy and laughter into your life and into the lives of all those around you." - Eileen Caddy</span></em></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="862" style="text-align: center;"><em data-dcnode-id="863"><img data-dcnode-id="864" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/x9LLj4pQEyizRczFa4jh_7.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859" style="text-align: center;"><span data-dcnode-id="860" instrument_node="">"I don't have to chase extraordinary moments to find happiness - it's right in front of me if I'm paying attention and practicing gratitude." - Brene Brown</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="855" style="text-align: center;"><em data-dcnode-id="856"><img data-dcnode-id="857" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/3Sjoi12OTeK2zQCLPSQ8_19.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="851" style="text-align: center;"><em data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">"The root of joy is gratefulness." -&nbsp;David Steindl-Rast</span></em></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="847" style="text-align: center;"><em data-dcnode-id="848"><img data-dcnode-id="849" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/VY7Nbw2RuvGKbOOts6Ap_4.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="843" style="text-align: center;"><em data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">"Gratitude makes sense of our past, brings peace for today, and creates a vision for tomorrow." - Melody Beattie</span></em></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="839" style="text-align: center;"><em data-dcnode-id="840"><img data-dcnode-id="841" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/L1qmGOH9RkQhk0ve8gkw_22.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="835" style="text-align: center;"><em data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">"Gratitude turns what we have into enough."&nbsp;</span></em></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="831" style="text-align: center;"><em data-dcnode-id="832"><img data-dcnode-id="833" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/Hfjjbn7zQnqJGZcyY3Ak_10.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="827" style="text-align: center;"><em data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">"When I started counting my blessings, my whole life turned around." - Willie Nelson</span></em></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="823" style="text-align: center;"><em data-dcnode-id="824"><img data-dcnode-id="825" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/nzgCm6RKRXuGOerIZidO_25.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="819" style="text-align: center;"><em data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">"I looked around and thought about my life. I felt grateful. I noticed every detail. That is the key to time travel. You can only move if you are actually in the moment. You have to be where you are to get to where you need to go." - Amy Poehler</span></em></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="815" style="text-align: center;"><em data-dcnode-id="816"><img data-dcnode-id="817" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/U3OW00zIRfiq58f8hNGx_13.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="808" style="text-align: center;"><em data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">"I would maintain that thanks are the highest form of </span></em><span data-dcnode-id="811" instrument_node="">thought,</span><em data-dcnode-id="809"><span data-dcnode-id="810" instrument_node=""> and that gratitude is happiness doubled by wonder." - Gilbert K. Chesterton</span></em></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="804" style="text-align: center;"><em data-dcnode-id="805"><img data-dcnode-id="806" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/EJklsdleTeWXuW5ggLG3_28.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="800" style="text-align: center;"><em data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">"If you concentrate on finding whatever is good in every situation, you will discover that your life will suddenly be filled with gratitude, a feeling that nurtures the soul."</span></em></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="796" style="text-align: center;"><em data-dcnode-id="797"><img data-dcnode-id="798" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/uNC9Zw8zRLSr87MDp3XS_16.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="792" style="text-align: center;"><em data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">"He is a wise man who does not grieve for the things which he has not, but rejoices for those which he has." - Epictetus</span></em></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="788" style="text-align: center;"><em data-dcnode-id="789"><img data-dcnode-id="790" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/tK8Q3qQFT4afgnXtHwHG_2.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="784" style="text-align: center;"><em data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">"There is a calmness to a life lived in gratitude, a quiet joy." - Ralph H. Blum</span></em></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="780" style="text-align: center;"><em data-dcnode-id="781"><img data-dcnode-id="782" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/nSlQTiMqQIe7aNDkxhpT_5.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="776" style="text-align: center;"><em data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">"Develop an attitude of gratitude and give thanks for everything that happens to you, knowing that every step forward is a step toward achieving something bigger and better than your current situation." - Brian Tracy</span></em></p><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="772" style="text-align: center;"><em data-dcnode-id="773"><img data-dcnode-id="774" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/FYRIWOeQToSG2AufZXLr_20.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="768" style="text-align: center;"><em data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">"Gratitude will shift you to a higher frequency, and you will attract much better things." - Rhonda Byrne</span></em></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="764" style="text-align: center;"><em data-dcnode-id="765"><img data-dcnode-id="766" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/C5RHxn0BSumy1K3kM4e9_8.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="760" style="text-align: center;"><em data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">" 'Thank you' is the best prayer that anyone could say. I say that one a lot. Thank you expresses extreme gratitude, humility, understanding." - Alice Walker</span></em></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="756" style="text-align: center;"><em data-dcnode-id="757"><img data-dcnode-id="758" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/4bWwBIrAQHeVxvdjvBcv_23.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="752" style="text-align: center;"><em data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">"At times, our own light goes out and is rekindled by a spark from another person. Each of us has cause to think with deep gratitude of those who have lighted the flame within us." - Albert Schweitzer</span></em></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="748" style="text-align: center;"><em data-dcnode-id="749"><img data-dcnode-id="750" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/VFCWhTcTqmffkbqWfNWQ_11.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="744" style="text-align: center;"><em data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">"Learn to be thankful for what you already have,&nbsp;while you pursue all that you want." Jim Rohn</span></em></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="740" style="text-align: center;"><em data-dcnode-id="741"><img data-dcnode-id="742" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/EDrguKS7WSc2PMyAaMwz_26.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="736" style="text-align: center;"><em data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">"Gratitude is an antidote to negative emotions, a neutralizer of envy, hostility, worry, and irritation. It is savoring; it is not taking things for granted; it is present-oriented." - Sonia Lyubomirsky</span></em></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="732" style="text-align: center;"><em data-dcnode-id="733"><img data-dcnode-id="734" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/bwWlQCRnmu6CQYNvOkzA_14.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="728" style="text-align: center;"><em data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">"The roots of all goodness lie in the soil of appreciation for goodness." Dalai Lama</span></em></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="724" style="text-align: center;"><em data-dcnode-id="725"><img data-dcnode-id="726" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/6zqjcayAQIabPCt37nt5_29.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="720" style="text-align: center;"><em data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">"Today I choose to live with gratitude for the love that fills my heart, the peace that rests within my spirit, and the voice of hope that says all things are possible." - Rabbi Harold Kushner</span></em></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="716" style="text-align: center;"><em data-dcnode-id="717"><img data-dcnode-id="718" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/H7uFogoeTkeGI95V1bLL_17.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="712" style="text-align: center;"><em data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">"Gratitude unlocks the fullness of life. It turns what we have into enough, and more. It turns denial into acceptance, chaos to order, confusion to clarity. It can turn a meal into a feast, a house into a home, a stranger into a friend." - Melanie Beattie</span></em></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="707" style="text-align: center;"><em data-dcnode-id="708"><img data-dcnode-id="710" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/deavMsBZTSeqxF5JIxHv_3.jpg&amp;raw" width="300"><span data-dcnode-id="709" instrument_node="">&nbsp;</span></em></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="703" style="text-align: center;"><em data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">"We often take for granted the very things that most deserve our gratitude." - Cynthia Ozick</span></em></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="699" style="text-align: center;"><em data-dcnode-id="700"><img data-dcnode-id="701" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/TOeAx9xsTBm8d7npC3Ui_9.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="695" style="text-align: center;"><em data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">"When you view your world with an attitude of gratitude, you are training yourself to focus on the good in life." - Paul J. Meyer</span></em></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="691" style="text-align: center;"><em data-dcnode-id="692"><img data-dcnode-id="693" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/MyEosoaoTAmVaSx25DmK_21.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="687" style="text-align: center;"><em data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">"The more grateful I am, the more beauty I see." - Mary Davis</span></em></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="683" style="text-align: center;"><em data-dcnode-id="684"><img data-dcnode-id="685" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/AtbsCOgcR2uND9XsKB6Q_6.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="679" style="text-align: center;"><em data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">"Gratitude is the healthiest of all human emotions. The more you express gratitude for what you have, the more likely you will have even more to express gratitude for." - Zig Ziglar</span></em></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="675" style="text-align: center;"><em data-dcnode-id="676"><img data-dcnode-id="677" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/M4Pt4psYRKCM70e6ywgU_24.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="668" style="text-align: center;"><em data-dcnode-id="669"><span data-dcnode-id="673" instrument_node="">"When you are grateful, fear disappears and abundance appears." -&nbsp;</span><a data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/TonyRobbins" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="672" instrument_node="">Tony Robbins</span></a><span data-dcnode-id="670" instrument_node=""> </span></em></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="664" style="text-align: center;"><em data-dcnode-id="665"><img data-dcnode-id="666" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/O6N3kH1vTJ6iTXiK8Hnb_12.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="660" style="text-align: center;"><em data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">"Feeling gratitude and not expressing it is like wrapping a present and not giving it." - William Arthur Ward</span></em></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="656" style="text-align: center;"><em data-dcnode-id="657"><img data-dcnode-id="658" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/fAksTmEDSube1DcSh4BZ_27.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="652" style="text-align: center;"><em data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">"Nothing is more honorable than a grateful heart." - Lucius Annaeus Seneca</span></em></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="648" style="text-align: center;"><em data-dcnode-id="649"><img data-dcnode-id="650" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/adJfmpQkTO6olfxdpj3F_15.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="644" style="text-align: center;"><em data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">"Be thankful for what you have; you'll end up having more. If you concentrate on what you don't have, you will never, ever have enough." - Oprah Winfrey</span></em></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="640" style="text-align: center;"><em data-dcnode-id="641"><img data-dcnode-id="642" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/cj7sqjwlTlalaki0zgYA_30.jpg&amp;raw" width="300"></em></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="636" style="text-align: center;"><em data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">"We can only be said to be alive in those moments when our hearts are conscious of our treasures." - Thornton Wilder</span></em></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="632"><em data-dcnode-id="633"><img data-dcnode-id="634" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kajabi-storefronts-production.global.ssl.fastly.net/kajabi-storefronts-production/blogs/15557/images/EluXj1v4REKofP3MusOq_18.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" width="300"></em></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">&nbsp;</span></p><span data-dcnode-id="628" instrument_node="">
</span><hr data-dcnode-id="627"><span data-dcnode-id="626" instrument_node="">
</span><h2 data-dcnode-id="623"><span data-dcnode-id="624" style="font-weight: 400;"><span data-dcnode-id="625" instrument_node="">Here’s how we can help you...</span></span></h2><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" style="font-weight: 400;"><span data-dcnode-id="621" instrument_node="">We get that divorce can feel really hard and leave you with a lot of questions about how to handle your finances. After all, this is the reason Leah Hadley founded Great Lakes Divorce Financial Solutions in the first place.&nbsp;</span></span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" style="font-weight: 400;"><span data-dcnode-id="617" instrument_node="">After her divorce, she found herself stressed and overwhelmed about how to navigate life on her own with three kids and a new financial situation.</span></span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="612" style="font-weight: 400;"><span data-dcnode-id="613" instrument_node="">Helping families overcome this challenge is why we do what we do.&nbsp;</span></span></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" style="font-weight: 400;"><span data-dcnode-id="609" instrument_node="">Whether you’ve never had to manage money before, or you’re a master at investing, we are here to support you as your financial expert before, during, and after your divorce.&nbsp;</span></span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" style="font-weight: 400;"><span data-dcnode-id="605" instrument_node="">What our clients love most about working with us is that we’re able to help them avoid costly financial mistakes and achieve the financial stability they need to plan for the future.</span></span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="600" style="font-weight: 400;"><span data-dcnode-id="601" instrument_node="">We are here to help you with that, too.&nbsp;</span></span><a data-dcnode-id="597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greatlakesdfs.com/about/"><span data-dcnode-id="598" style="font-weight: 400;"><span data-dcnode-id="599" instrument_node="">Learn more about our guidance no matter where you are in the divorce process</span></span></a><span data-dcnode-id="595" style="font-weight: 400;"><span data-dcnode-id="596" instrument_node="">.</span></span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="591" style="font-weight: 400;"><span data-dcnode-id="592" instrument_node="">Then,&nbsp;</span></span><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greatlakesdfs.com/contact/"><span data-dcnode-id="589" style="font-weight: 400;"><span data-dcnode-id="590" instrument_node="">schedule a complimentary consultation</span></span></a><span data-dcnode-id="586" style="font-weight: 400;"><span data-dcnode-id="587" instrument_node="">&nbsp;to explore how we can support you.</span></span></p><span data-dcnode-id="584" instrument_node="">
