</span><span data-dcnode-id="1336" instrument_node="">
</span></div></div><div class="primary-cli cli cli-text" data-dcnode-id="1330"><p data-dcnode-id="1331"><strong data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Does it help to be optimistic?</span></strong></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1327"><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">I believe the answer is YES.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1323"><p data-dcnode-id="1324"><strong data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Here's why: Being optimistic allows us to get up and try again.</span></strong></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1320"><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Like most of us, I've been on both sides of the fence. Sometimes pessimistic, other times optimistic. And even the middle path of a realist who often struggles with trying to be hopeful in the face of brutal facts.</span></p></div><div class="cli cli-advertisement advertisement-holder" data-dcnode-id="1311"><div class="advertisement__label" data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Advertisement</span></div><div class="advertisement" data-dcnode-id="1312"><div class="ad-entry_paragraph_3 ad-spot--gam ad-spot--gam-inline-2" data-dcnode-id="1317" id="ad-inline-2-1"></div><span data-dcnode-id="1316" instrument_node="">
</span><span data-dcnode-id="1313" instrument_node="">
</span></div></div><div class="primary-cli cli cli-text" data-dcnode-id="1308"><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">In all of those experiences I've had, I have realized that being an optimist has helped me more than being a pessimist because optimism leads to hope.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1304"><p data-dcnode-id="1305"><strong data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">And hope has always given me the impetus for action. For going on. For moving forward.</span></strong></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1301"><p data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Despite how bad the situation was, having optimistic thoughts allowed me to persevere through the adversity I was facing, which either made me stronger or helped me achieve some level of success to overcome the problem.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1296"><p data-dcnode-id="1297"><em data-dcnode-id="1298"><strong data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">"Optimism gives us breadcrumbs of hope. Whether they lead to a rainbow is not the point. What matters is that we are given enough crumbs to keep going." -Martin Seligman</span></strong></em></p></div><div class="cli cli-advertisement advertisement-holder" data-dcnode-id="1287"><div class="advertisement__label" data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Advertisement</span></div><div class="advertisement" data-dcnode-id="1288"><div class="ad-repeating_dynamic_display ad-spot--gam ad-spot--gam-inline-infinite" data-dcnode-id="1293" id="ad-inline-infinite-1"></div><span data-dcnode-id="1292" instrument_node="">
</span><span data-dcnode-id="1289" instrument_node="">
</span></div></div><div class="primary-cli cli cli-text" data-dcnode-id="1284"><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Charles Kenny in Bloomberg magazine wrote recently about, The Economic Power of Positive Thinking. He points to research that suggests that "optimistic people tend to work harder, get paid more, get elected to office more often and win at sports more regularly. They even live longer. The effect of optimism spills over into business decisions."</span></p></div><div class="js-newsletter-container" data-dcnode-id="1261" data-rapid="marko-sec" id="newsletter-bottom"><section aria-label="Newsletter subscription" class="newsletter newsletter--initial newsletter--logged-out js-cet-subunit" data-dcnode-id="1262"><div class="newsletter__contents" data-dcnode-id="1263"><div class="newsletter__prompts" data-dcnode-id="1277"><div class="newsletter__info" data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Newsletter Sign Up</span></div><h2 class="newsletter__cta" data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">An essential daily guide to achieving the good life</span></h2><div class="newsletter__description" data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Subscribe to our lifestyle email.</span></div></div><form class="newsletter__input" data-dcnode-id="1273"><input aria-describedby="newsletter-error" aria-label="Enter your email address" autocomplete="email" class="newsletter__input__text" data-dcnode-id="1276" name="email_address" placeholder="address@email.com" type="email" value=""><input aria-label="Subscribe" class="newsletter__input__submit js-cet-item" data-dcnode-id="1275" type="submit" value="SUBSCRIBE"><div class="newsletter__error" data-dcnode-id="1274" id="newsletter-error"></div></form><div aria-hidden="true" class="newsletter__success" data-dcnode-id="1264"><div class="newsletter__success__1" data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Successfully Subscribed!</span></div><div class="newsletter__success__2" data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Realness delivered to your inbox</span></div><div class="newsletter__success__checkmark" data-dcnode-id="1265"><svg data-dcnode-id="1266" height="30px" version="1.1" viewBox="0 0 30 30" width="30px"><g data-dcnode-id="1267" fill="none" fill-rule="evenodd" id="Page-1" stroke="none" stroke-width="1"><path d="M20.8802625,10.013175 L12.8342625,18.019425 L9.8867625,15.032175 C9.5282625,14.63355 8.8907625,14.63355 8.4925125,15.032175 C8.0942625,15.390675 8.0942625,16.0278 8.4925125,16.42605 L12.1570125,20.130675 C12.3561375,20.289675 12.5950125,20.4093 12.8740125,20.4093 C13.1530125,20.4093 13.3918875,20.3298 13.5910125,20.130675 L22.3540125,11.407425 C22.7522625,11.048925 22.7522625,10.411425 22.3540125,10.013175 C21.9557625,9.614925 21.3182625,9.614925 20.8802625,10.013175" data-dcnode-id="1268" fill="#FFFFFF" id="Fill-1"></path></g></svg></div></div></div></section></div><div class="primary-cli cli cli-text" data-dcnode-id="1258"><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">I don't think he's suggesting that we will find riches simply by being optimistic during tough times.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1255"><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">What I do think he is saying is that we get a better shot at it than the pessimists, "Self deception is precisely what makes them more willing to take risks and invest in a better future, while the pessimists slouch toward self-fulfilling failure."</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1251"><p data-dcnode-id="1252"><strong data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">"Everyone has good ideas about new opportunities. It's those who keep at it through all those obstacles, all that negative environment, all those defeats will be the ones who will succeed. And to be able to forge ahead through that requires robust optimism and resiliency." -Ritesh Veera, advisor to entrepreneurs</span></strong></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1247"><p data-dcnode-id="1248"><strong data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">How do we stay optimistic during tough times of turbulence, change and uncertainty?</span></strong></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1243"><p data-dcnode-id="1244"><strong data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Here are 4 ways how we can stay optimistic during tough times:</span></strong></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1239"><p data-dcnode-id="1240"><strong data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">1. Identify Heroes of Optimism</span></strong></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1236"><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">All around us there are stories of people who have managed to overcome tough times through an optimistic mindset.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1233"><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Heroes of optimism are everywhere. In books, on the radio, on YouTube, in homes next door to yours, in your family tree and in your workplace.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1230"><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">From our friends and colleagues to athletes to people of faith to survivors of concentration camps, our world is full of people who have found that spark of inspiration and hope in the dark cave of adversity. They've done it. They have been able to stay optimistic during tough times. So can we.</span></p></div><div class="cli cli-advertisement advertisement-holder" data-dcnode-id="1221"><div class="advertisement__label" data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Advertisement</span></div><div class="advertisement" data-dcnode-id="1222"><div class="ad-repeating_dynamic_display ad-spot--gam ad-spot--gam-inline-infinite" data-dcnode-id="1227" id="ad-inline-infinite-2"></div><span data-dcnode-id="1226" instrument_node="">
</span><span data-dcnode-id="1223" instrument_node="">
</span></div></div><div class="primary-cli cli cli-text" data-dcnode-id="1218"><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Some years ago, when my wife and I learned that we couldn't have kids, we were devastated. It's emotionally difficult to stay optimistic when we're presented with such facts.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1215"><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Fortunately, we live in times of profound scientific advances and in close proximity to where we can connect with others who faced similar challenges. Living in NYC at the time, we found other couples who were able to conceive with modern advances in medicine and so did we.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1212"><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">We were fortunate to have kids and got through those tough times. If we weren't optimistic or at least somewhat positive, would we have kids today? I don't know. But what I do know is that being optimistic during those tough times by having others to look to helped us move forward and try.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1208"><p data-dcnode-id="1209"><strong data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">2. Change the Internal Dialogue in Your Head</span></strong></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1205"><p data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">It's not about repeating positive affirmations to ourselves.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1202"><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">It's deeper. It's about giving ourselves a chance not to slip down the spiral of self doubt and pessimism.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1198"><p data-dcnode-id="1199"><strong data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Don't give into the often default dialogue of pessimism.</span></strong></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1195"><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">I believe that in order for us to stay optimistic during tough times, we have to learn to move from thoughts of impossibility to thoughts of practical possibility. And we cannot get to those helpful thoughts when all we think about is how bad our situation is. Without an optimistic approach, we can get stuck.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1191"><p data-dcnode-id="1192"><strong data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">How do we shift to optimistic thinking when faced with tough times?</span></strong></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1188"><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">One of the best books I've ever read is "Learned Optimism: How to Change Your Mind and Your Life" by Dr. Martin Seligman, a renowned psychologist.</span></p></div><div class="cli cli-advertisement advertisement-holder" data-dcnode-id="1179"><div class="advertisement__label" data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Advertisement</span></div><div class="advertisement" data-dcnode-id="1180"><div class="ad-repeating_dynamic_display ad-spot--gam ad-spot--gam-inline-infinite" data-dcnode-id="1185" id="ad-inline-infinite-3"></div><span data-dcnode-id="1184" instrument_node="">
</span><span data-dcnode-id="1181" instrument_node="">
</span></div></div><div class="primary-cli cli cli-text" data-dcnode-id="1176"><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">In his book, Dr. Seligman suggests from his research that we can go from a state of helplessness to a state of optimism where we feel like we have some level of control. It is possible to learn optimism. And make it useful for us when we face adversity.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1173"><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">What happens to many of us when we do face tough times is that our way of explaining our misfortune to ourself reinforces learned helplessness. But if we can change our "explanatory style" we can shift from feeling helpless and hopeless about our situation to moving past it, getting over it faster and persevering on.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1169"><p data-dcnode-id="1170"><strong data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">In Seligman's book, he cites three crucial dimensions to changing the dialogue in our head: Permanent, Pervasive and Personalization.</span></strong></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1166"><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">It's not PERMANENT: When adversity strikes, don't think your bad time will be last forever.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1163"><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">It's not PERVASIVE: Don't think that it happens all the time.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1160"><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Don't PERSONALIZE it: Can't take all of the blame</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1157"><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Instead of blaming yourself for a character flaw you think you have that has always been around, give yourself a break and shifting from 'Always' and 'Never' to 'Sometimes' and 'Lately'. Those who fall into the dark cave of helplessness tend to explain tough times as: "I'm all washed up" which is permanent and personalized instead of "Tough day today" which is not personalized and is temporary.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1153"><p data-dcnode-id="1154"><strong data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">When adversity strikes, it helps if we use an explanatory style or inner dialogue that doesn't give us such heavy responsibility for making bad things happen to ourselves.</span></strong></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1150"><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">"People who give up early believe the causes of the bad events that happened to them are permanent: the bad event will persist, will always be there to affect their lives. People who resist helplessness (or are optimistic) believe the causes of bad events are temporary."</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1146"><p data-dcnode-id="1147"><strong data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">"Optimism matters because it produces persistence. Permanent explanations for bad events produce long lasting helplessness and temporary explanations produce resilience." -Martin Seligman</span></strong></p></div><div class="cli cli-advertisement advertisement-holder" data-dcnode-id="1137"><div class="advertisement__label" data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Advertisement</span></div><div class="advertisement" data-dcnode-id="1138"><div class="ad-repeating_dynamic_display ad-spot--gam ad-spot--gam-inline-infinite" data-dcnode-id="1143" id="ad-inline-infinite-4"></div><span data-dcnode-id="1142" instrument_node="">
</span><span data-dcnode-id="1139" instrument_node="">
</span></div></div><div class="primary-cli cli cli-text" data-dcnode-id="1134"><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Drinking the optimistic Kool-Aid?</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1131"><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Now in some respects, Seligman is suggesting that optimistic people distort reality in a self serving direction.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1128"><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">"If tough times happen, you did it to me, it'll be over soon and it's only this situation. If good times happen, then I did it; it's going to last forever and it's going to help me in many situations. "</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1125"><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">So should we become delusional with our own grandeur?</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1122"><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">In some sense, Seligman is suggesting yes.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1119"><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">"Without optimistic moments, we would never accomplish anything difficult and intimidating, we would never even attempt the just barely possible. Mount Everest would remain unscaled, the four minute mile unrun; the jet plane and the computer would be blueprints sitting some financial vice presidents' wastebasket."</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1116"><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">What should we do?</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1113"><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">How do we effectively change this internal dialogue to help us stay optimistic during tough times practically speaking?</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1110"><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Dr. Seligman give us a tool: ABCDE</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1107"><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">EXERCISE: Get out a sheet of paper and try it. It helps to do it a few times and then your mind will tend to follow the tool automatically. This exercise helps us tune into the perpetual dialogue that takes place in our mind and record it...so we can modify it.</span></p></div><div class="cli cli-advertisement advertisement-holder" data-dcnode-id="1098"><div class="advertisement__label" data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Advertisement</span></div><div class="advertisement" data-dcnode-id="1099"><div class="ad-repeating_dynamic_display ad-spot--gam ad-spot--gam-inline-infinite" data-dcnode-id="1104" id="ad-inline-infinite-5"></div><span data-dcnode-id="1103" instrument_node="">
</span><span data-dcnode-id="1100" instrument_node="">
</span></div></div><div class="primary-cli cli cli-text" data-dcnode-id="1095"><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">ADVERSITY happens: Name it. Describe it on a piece of paper.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1092"><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">BELIEF: How do you interpret the tough time? Thoughts not feelings are then written.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1089"><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">CONSEQUENCES: Record your feelings; sad, let down, disappointed, etc.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1086"><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">DISPUTE &amp; DISTRACT: Use logic and reason to argue with yourself about how you're blowing this adversity out of proportion.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1083"><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">ENERGIZATION: Get excited about moving forward and what you'll do about it</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1080"><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">I did this exercise a few times and I have to say, it works. But you've got to write it out not just think about it in the mind.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1076"><p data-dcnode-id="1077"><strong data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Some of Dr. Seligman's other tips for disputing the inner dialogue to an optimistic one:</span></strong></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1073"><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">A. Interrupt the negative pattern but distracting yourself physically. Get up and move around. Seligman cites examples people often use: ring a loud bell, snap a rubber band on your wrist or go for a walk.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1070"><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">B. Draw your attention elsewhere. Concentrate - really focus your mind and action towards something else. Some of us vaccuum and clean. Others go for a run or play a competitive sport.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1067"><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">C. Schedule a later time for thinking it over. Delay it so as to reduce the potency of the sting.</span></p></div><div class="cli cli-advertisement advertisement-holder" data-dcnode-id="1058"><div class="advertisement__label" data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Advertisement</span></div><div class="advertisement" data-dcnode-id="1059"><div class="ad-repeating_dynamic_display ad-spot--gam ad-spot--gam-inline-infinite" data-dcnode-id="1064" id="ad-inline-infinite-6"></div><span data-dcnode-id="1063" instrument_node="">
</span><span data-dcnode-id="1060" instrument_node="">
</span></div></div><div class="primary-cli cli cli-text" data-dcnode-id="1055"><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">D. Write down the troublesome thoughts the moment they occur so as to dispose of them from your mind. "If you write down and set a time to think about them, they no longer have any purpose and purposelessness lessens their strength."</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1052"><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">E. Dispute the negative and pessimistic dialogue with Evidence. "Go on the attack" Seligman tells us. Negative beliefs usually lack evidence so go after them using logic and reason and proof to argue with ourselves. Point to facts not how you interpret them with heavy emotion.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1049"><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">F. Dispute the dialogue with Alternatives. Let go of the one negative belief that is making you feel stuck. Instead, find other causes for the adversity and what you can do about it.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1046"><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">G. Dispute the dialogue with Implications. What does this adversity really mean to me? Really? Is it the end of humanity as we know it? Just because you didn't get that promotion doesn't mean your career is over!</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1043"><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">H. Dispute the dialogue with Usefulness. What good will this negative belief do for me if I spend all day thinking about it? Is this inner dialogue I am having useful to me right now? Usually the answer is no.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1039"><p data-dcnode-id="1040"><strong data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">What I found to be the most useful is to: DISPUTE my explanatory dialogue with evidence. Forcing myself to act as my own defense attorney shifted my thinking almost immediately. </span></strong></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1035"><p data-dcnode-id="1036"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">3. Reinforce the Optimistic Inner Dialogue with Outside Voices</span></strong></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1032"><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Gathering around the tribal fire was a way for our ancestors to share the heavy burdens of life. It can serve a similar purpose in our modern times. Having a community of friends, colleagues or family members to speak with face to face can be powerful.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1029"><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Become social. Talk to people. Attend a seminar or conference in your field of interest. Go to a meetup. Find others who are optimistic and talk to them. Sometimes their voices can feel more credible than our own. Even if it's only a video on YouTube, complementing your own optimistic dialogue with other optimistic voices can help you stay the course during tough times.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1026"><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Socialization helps us feel less alone.</span></p></div><div class="cli cli-advertisement advertisement-holder" data-dcnode-id="1017"><div class="advertisement__label" data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Advertisement</span></div><div class="advertisement" data-dcnode-id="1018"><div class="ad-repeating_dynamic_display ad-spot--gam ad-spot--gam-inline-infinite" data-dcnode-id="1023" id="ad-inline-infinite-7"></div><span data-dcnode-id="1022" instrument_node="">
</span><span data-dcnode-id="1019" instrument_node="">
</span></div></div><div class="primary-cli cli cli-text" data-dcnode-id="1012"><p data-dcnode-id="1013"><span data-dcnode-id="1016" instrument_node="">From alcoholics anonymus to support groups for caregiving and cancer, the problems may not go away but joining groups or social circles help to calm us, inform us and make us feel better.</span><strong data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node=""> The power of different voices singing from the same sheet, sharing the same journey and providing support can help to reinforce our new optimistic dialgoue so that we can weather the tough times.</span></strong></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1009"><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">I do four things: 1) Read optimistic books and blogs 2) Speak with optimistic friends or colleagues 3) Turn off / ignore the news 4) Go to an event or forum where I can learn and meet new people</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1004"><p data-dcnode-id="1005"><strong data-dcnode-id="1006"><br data-dcnode-id="1008"><span data-dcnode-id="1007" instrument_node=""> 4. Move the Body - Exercise, Do Yoga, Go for a Walk, Run</span></strong></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1001"><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Sitting around overthinking about the adversity we face doesn't do us any good.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="998"><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">When we move our body, blood starts flowing to an important area: the brain! Providing much needed nutrients, we feel energized to a point where new ideas start popping up replacing negative thoughts.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="995"><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">What we gain from exercising our body is two things. First, we get much needed nutrients and energy, reducing our stress and boosting our levels of happiness and creativity. Second, we begin to realize the consequence of taking action.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="989"><p data-dcnode-id="990"><span data-dcnode-id="994" instrument_node="">Action leads us to feeling less helpless and more in control. </span><strong data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">This is key: to feeling like our actions matter. Good or bad...action creates consequences.</span></strong><span data-dcnode-id="991" instrument_node=""> Consequences which can signal to our brain that we are not helpless, reinforcing our optimistic dialogue during tough times.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="986"><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">I know this is a long article but I wanted to share as much as I have learned on how to stay optimistic during tough times. Especially the piece from Dr. Seligman's book which took me a long time to finish and which I base and credit so much of what I learned in this post.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="982"><p data-dcnode-id="983"><strong data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Let me summarize:</span></strong></p></div><div class="primary-cli cli cli-text" data-dcnode-id="979"><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">I believe in order for us stay optimistic during tough times, we must be proactive about who we look to for hope, how we explain adversity to ourselves and whom we interact with. </span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="976"><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Remember:</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="973"><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Tough times don't last. Tough people do. Most of us are tougher than we think.</span></p></div></section></section><section class="entry__extra js-extra-content-list" data-dcnode-id="969" data-rapid="marko-sec" id="entry-extra"><section class="entry__content-list js-entry-content js-cet-subunit" data-dcnode-id="970"></section></section><section data-dcnode-id="951" data-rapid="marko-sec" id="entry-footer"><section class="entry__corrections js-cet-subunit" data-dcnode-id="966"><button data-dcnode-id="967" data-vars-item-name="SUGGEST_A_CORRECTION" data-vars-item-type="text" data-vars-target-content-id="mailto:corrections@huffingtonpost.com?subject=Correction%3A%20How%20to%20Stay%20Optimistic%20During%20Tough%20Times&amp;body=https%3A%2F%2Fwww.huffpost.com%2Fentry%2Fhow-to-stay-optimistic-du_b_7655138" data-vars-target-content-type="url" data-vars-type="web_external_link" data-vars-unit-name="7655138" data-vars-unit-type="buzz_body"><span data-dcnode-id="968" instrument_node="">Suggest a correction</span></button></section><section class="entry__tags js-cet-subunit control" data-dcnode-id="952" id="bottomTags"><div aria-label="Read more in the following topics" class="entry__tags__more hideTopics" data-dcnode-id="963"><span aria-hidden="true" data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">More:</span></span></div><span class="firstTopics" data-dcnode-id="958" id="firstTopics"><a class="entry__tag js-entry-link cet-internal-link" data-dcnode-id="961" data-vars-item-name="healthy living" data-vars-item-type="text" data-vars-position-in-subunit="0" data-vars-subunit-name="tags" data-vars-subunit-type="package" data-vars-target-content-id="https://www.huffpost.com/life/topic/healthy-living" data-vars-target-content-type="feed" data-vars-type="web_internal_link" data-vars-unit-name="5b9ee32ce4b03a1dcc9edfb1" data-vars-unit-type="buzz_body" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.huffpost.com/life/topic/
