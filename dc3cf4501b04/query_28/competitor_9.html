</span><article class="post-25726 post type-post status-publish format-standard has-post-thumbnail hentry category-happiness" data-dcnode-id="1192" id="post-25726"><span data-dcnode-id="2425" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1194"><span data-dcnode-id="2424" instrument_node="">
</span><p data-dcnode-id="2420"><img alt="Search for happiness" class="wp-image-25733 size-medium alignright lazyloaded" data-dcnode-id="2423" data-src="https://positivepsychology.com/wp-content/uploads/search-for-happiness-e1616002231782-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/search-for-happiness-e1616002231782-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/search-for-happiness-e1616002231782.jpg 600w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/wp-content/uploads/search-for-happiness-e1616002231782-300x150.jpg&amp;raw" srcset="https://positivepsychology.com/wp-content/uploads/search-for-happiness-e1616002231782-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/search-for-happiness-e1616002231782.jpg 600w" title="How To Be Happy" width="300"><noscript data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">&lt;img class="wp-image-25733 size-medium alignright lazyload" title="How To Be Happy" src="https://positivepsychology.com/wp-content/uploads/search-for-happiness-e1616002231782-300x150.jpg" alt="Search for happiness" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/search-for-happiness-e1616002231782-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/search-for-happiness-e1616002231782.jpg 600w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></p><span data-dcnode-id="2419" instrument_node="">
</span><p data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">What does it mean to be truly happy?</span></p><span data-dcnode-id="2416" instrument_node="">
</span><p data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">There are many philosophical schools of thought regarding the concept of happiness and its cultivation.</span></p><span data-dcnode-id="2413" instrument_node="">
</span><p data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">For instance, the pursuit of enduring happiness is at the core of many mindfulness practices, which often emphasize gratitude and seeking contentment in the present moment.</span></p><span data-dcnode-id="2410" instrument_node="">
</span><p data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">Other models of happiness suggest the importance of living in congruence with our values and in ways that satisfy our basic human needs. Some research even shows that whether we are happy or not can, in part, be boiled down to our genetics.</span></p><span data-dcnode-id="2407" instrument_node="">
</span><p data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">In what follows, we’ll walk you through several conceptualizations of happiness, show you how to measure each, and give you a wide range of strategies for cultivating whichever form of happiness you seek in your own life.</span></p><span data-dcnode-id="2404" instrument_node="">
</span><p data-dcnode-id="2399"><span data-dcnode-id="2403" instrument_node="">Before you continue, we thought you might like to </span><a data-dcnode-id="2401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tools.positivepsychology.com/ebook" rel="noopener" target="_blank"><span data-dcnode-id="2402" instrument_node="">download our three Positive Psychology Exercises for free</span></a><span data-dcnode-id="2400" instrument_node="">. These science-based exercises will explore fundamental aspects of positive psychology including strengths, values, and self-compassion, and will give you the tools to enhance the wellbeing of your clients, students, or employees.</span></p><span data-dcnode-id="2398" instrument_node="">
</span><div data-dcnode-id="2358" id="inhoud"><span data-dcnode-id="2397" instrument_node="">
</span><h2 data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">This Article Contains:</span></h2><span data-dcnode-id="2394" instrument_node="">
</span><ul data-dcnode-id="2360"><span data-dcnode-id="2393" instrument_node="">
</span><li data-dcnode-id="2390"><a data-dcnode-id="2391" href="#where-is-happiness"><span data-dcnode-id="2392" instrument_node="">What is Happiness?</span></a></li><span data-dcnode-id="2389" instrument_node="">
</span><li data-dcnode-id="2386"><a data-dcnode-id="2387" href="#secret-recipe-happiness"><span data-dcnode-id="2388" instrument_node="">How to Measure Happiness</span></a></li><span data-dcnode-id="2385" instrument_node="">
</span><li data-dcnode-id="2382"><a data-dcnode-id="2383" href="#happiness-taught-improved"><span data-dcnode-id="2384" instrument_node="">What is True Happiness?</span></a></li><span data-dcnode-id="2381" instrument_node="">
</span><li data-dcnode-id="2378"><a data-dcnode-id="2379" href="#what-makes-people-happy"><span data-dcnode-id="2380" instrument_node="">The Wrong Way to Search for Happiness</span></a></li><span data-dcnode-id="2377" instrument_node="">
</span><li data-dcnode-id="2374"><a data-dcnode-id="2375" href="#measuring-happiness"><span data-dcnode-id="2376" instrument_node="">7 Ways to Find Happiness</span></a></li><span data-dcnode-id="2373" instrument_node="">
</span><li data-dcnode-id="2370"><a data-dcnode-id="2371" href="#goal-setting-happiness"><span data-dcnode-id="2372" instrument_node="">3 Tips to Form Habits for Happiness</span></a></li><span data-dcnode-id="2369" instrument_node="">
</span><li data-dcnode-id="2366"><a data-dcnode-id="2367" href="#happiness-takeaway"><span data-dcnode-id="2368" instrument_node="">A Take-Home Message</span></a></li><span data-dcnode-id="2365" instrument_node="">
</span><li data-dcnode-id="2362"><a data-dcnode-id="2363" href="#references"><span data-dcnode-id="2364" instrument_node="">References</span></a></li><span data-dcnode-id="2361" instrument_node="">
</span></ul><span data-dcnode-id="2359" instrument_node="">
</span></div><span data-dcnode-id="2357" instrument_node="">
</span><p data-dcnode-id="2355"><a data-dcnode-id="2356" name="where-is-happiness"></a></p><span data-dcnode-id="2354" instrument_node="">
</span><h2 data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">What is Happiness?</span></h2><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">Defining happiness is no small task, but philosophers and researchers have drilled the notion down to two key conceptualizations.</span></p><span data-dcnode-id="2348" instrument_node="">
</span><p data-dcnode-id="2340"><span data-dcnode-id="2347" instrument_node="">These conceptualizations are known as </span><em data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">hedonia</span></em><span data-dcnode-id="2344" instrument_node=""> and </span><em data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">eudaimonia</span></em><span data-dcnode-id="2341" instrument_node="">, and together, they represent two long-running traditions in the study of happiness that stem as far back as the times of ancient philosophers (Ryan &amp; Deci, 2001).</span></p><span data-dcnode-id="2339" instrument_node="">
</span><p data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2336" instrument_node="">
</span><h3 data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">Happiness as hedonia</span></h3><span data-dcnode-id="2333" instrument_node="">
</span><p data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">The hedonic perspective of happiness argues that life’s goal is to experience the maximum amount of pleasure and the minimum amount of pain. According to this tradition, how happy we are can be boiled down to the sum of one’s total hedonic moments (Ryan &amp; Deci, 2001).</span></p><span data-dcnode-id="2330" instrument_node="">
</span><p data-dcnode-id="2325"><span data-dcnode-id="2329" instrument_node="">When it comes to measuring hedonic happiness, modern psychologists tend to use assessments of </span><a data-dcnode-id="2327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/subjective-well-being/"><span data-dcnode-id="2328" instrument_node="">Subjective Wellbeing</span></a><span data-dcnode-id="2326" instrument_node=""> (see How to Measure Happiness below; Diener &amp; Lucas, 1999).</span></p><span data-dcnode-id="2324" instrument_node="">
</span><p data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">In the past, philosophers of hedonism adopted a fairly narrow view of pleasure and pain related to bodily sensations, appetites, and self-interests. Examples of such forms of hedonia include eating tasty food, enjoying sex, and being free of physical discomfort.</span></p><span data-dcnode-id="2321" instrument_node="">
</span><p data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">Today, psychologists adopting the hedonic view take an interest in both the pleasures of the body and mind in the broader study of wellbeing (Kahneman, 1999).</span></p><span data-dcnode-id="2318" instrument_node="">
</span><p data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">This broader, more psychological conceptualization of hedonic pleasure argues that happiness can flow from behaviors that promote mental stimulation, stress relief, feelings of social connectedness, positive mood, and more (Arnold &amp; Reynolds, 2003).</span></p><span data-dcnode-id="2315" instrument_node="">
</span><p data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">This expanded conceptualization has resulted in the broadening of the study of hedonic pleasure to fields such as economics. For instance, hedonic conceptualizations of happiness are used to understand how shoppers make decisions between purchases, estimating how much pleasure or utility they stand to gain by choosing one product over another (Babin, Darden &amp; Griffin, 1994).</span></p><span data-dcnode-id="2312" instrument_node="">
</span><p data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2309" instrument_node="">
</span><h3 data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Happiness as eudaimonia</span></h3><span data-dcnode-id="2306" instrument_node="">
</span><p data-dcnode-id="2298"><span data-dcnode-id="2305" instrument_node="">The </span><a data-dcnode-id="2303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/eudaimonia/"><span data-dcnode-id="2304" instrument_node="">eudaimonic</span></a><span data-dcnode-id="2302" instrument_node=""> perspective of happiness presents an alternative to the hedonic view, arguing that true happiness is found when one behaves virtuously. Pursuing eudaimonia, therefore, is about </span><em data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">doing what is worth doing</span></em><span data-dcnode-id="2299" instrument_node="">.</span></p><span data-dcnode-id="2297" instrument_node="">
</span><p data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">In line with this, we can think about the eudaimonic perspective as being about reaching one’s true potential and living in congruence with one’s values and true self. It also involves developing one’s talents and strengthening relationships with those for whom we care. By living in this way, one should feel deeply engaged and fully alive (Waterman, 1993).</span></p><span data-dcnode-id="2294" instrument_node="">
</span><p data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">When it comes to measuring eudaimonic happiness, most researchers tend to use Ryff and Keyes’ (1995) multidimensional scales of psychological wellbeing (see How to Measure Happiness below).</span></p><span data-dcnode-id="2291" instrument_node="">
</span><p data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">According to the eudaimonic perspective, that which feels pleasurable is not always conducive to wellbeing. Likewise, that which is worth doing does not always feel pleasurable in the present moment.</span></p><span data-dcnode-id="2288" instrument_node="">
</span><p data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">For instance, volunteering for a cause one feels passionate about may not always feel pleasurable in the hedonic sense. It may involve spending long hours sweating in the sun, getting dirty, or dealing with challenging people or situations. Nonetheless, such pursuits may feed into our eudaimonic happiness as we live in unity with our values.</span></p><span data-dcnode-id="2285" instrument_node="">
</span><p data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">Interestingly, many traditional philosophers who championed the eudaimonic perspective denounced hedonic views of happiness, declaring them vulgar and overly self-centered. For instance, Aristotle considered hedonic happiness to make humans slavish followers of frivolous desires.</span></p><span data-dcnode-id="2282" instrument_node="">
</span><p data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2279" instrument_node="">
</span><h3 data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">Spiritual conceptualizations of happiness</span></h3><span data-dcnode-id="2276" instrument_node="">
</span><p data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">Today, we can consider a third perspective of happiness which lies in the practice of mindfulness.</span></p><span data-dcnode-id="2273" instrument_node="">
</span><p data-dcnode-id="2268"><span data-dcnode-id="2272" instrument_node="">Whereas the previous two perspectives consider happiness as something that must be sought, growing schools of thought argue that happiness in the form of contentment or </span><a data-dcnode-id="2270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/inner-peace-happiness/"><span data-dcnode-id="2271" instrument_node="">inner peace</span></a><span data-dcnode-id="2269" instrument_node=""> are primarily available to us at any given moment, regardless of what we are doing.</span></p><span data-dcnode-id="2267" instrument_node="">
</span><p data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">Consider the following quote from neuroscientist and mindfulness practitioner Sam Harris (2014):</span></p><span data-dcnode-id="2264" instrument_node="">
</span><blockquote data-dcnode-id="2258"><p data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Most of us spend our time seeking happiness and security without acknowledging the underlying purpose of our search. Each of us is looking for a path back to the present: We are trying to find good enough reasons to be satisfied now.</span></p><span data-dcnode-id="2261" instrument_node="">
</span><p data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Acknowledging that this is the structure of the game we are playing allows us to play it differently. How we pay attention to the present moment largely determines the character of our experience and, therefore, the quality of our lives.</span></p></blockquote><span data-dcnode-id="2257" instrument_node="">
</span><p data-dcnode-id="2255" style="text-align: right;"><span data-dcnode-id="2256" instrument_node="">– Sam Harris, Waking Up, p. 3</span></p><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Mindfulness-based perspectives on happiness and contentment have traditionally been a feature of eastern religions. These traditions hold the view that there exists a source of psychological wellbeing that is not dependent on gratifying one’s desires (hedonia) or pursuing an integrated, self-actualized sense of self (eudaimonia).</span></p><span data-dcnode-id="2251" instrument_node="">
</span><p data-dcnode-id="2243"><span data-dcnode-id="2250" instrument_node="">Rather, happiness can be achieved by cultivating </span><a data-dcnode-id="2248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/present-moment/"><span data-dcnode-id="2249" instrument_node="">present-moment</span></a><span data-dcnode-id="2247" instrument_node=""> awareness and </span><a data-dcnode-id="2245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/self-transcendence/"><span data-dcnode-id="2246" instrument_node="">self-transcendence</span></a><span data-dcnode-id="2244" instrument_node="">. In other words, these arguments suggest that it is possible to give up the search for happiness and commit oneself to finding contentment in what is happening right now.</span></p><span data-dcnode-id="2242" instrument_node="">
</span><p data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">A rapidly growing body of psychological and neuroscientific evidence has emerged to support these claims (Hanson, 2009), pointing us toward another avenue for cultivating sustainable happiness.</span></p><span data-dcnode-id="2239" instrument_node="">
</span><p data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">Overall, happiness is likely to look different for different people. As an individual or practitioner, you may find the most value in considering how all three of these conceptualizations factor into you or your client’s life as a first step toward cultivating enduring happiness.</span></p><span data-dcnode-id="2236" instrument_node="">
</span><p data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2233" instrument_node="">
</span><p data-dcnode-id="2231"><a data-dcnode-id="2232" name="secret-recipe-happiness"></a></p><span data-dcnode-id="2230" instrument_node="">
</span><h2 data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">How to Measure Happiness</span></h2><span data-dcnode-id="2227" instrument_node="">
</span><p data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Now that we have identified a few conceptualizations in which to ground our understanding of happiness, let’s consider how we might measure each.</span></p><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">As noted, hedonic conceptualizations of happiness are often measured using assessments of subjective wellbeing (Diener &amp; Lucas, 1999). Subjective wellbeing regards a person’s cognitive and affective evaluations of his or her life (Diener, 2000).</span></p><span data-dcnode-id="2221" instrument_node="">
</span><p data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">You can read more about measures of subjective well-being in our other dedicated articles. In these, we explore several commonly accepted measures of hedonic happiness. These include:</span></p><span data-dcnode-id="2218" instrument_node="">
</span><ul data-dcnode-id="2198"><span data-dcnode-id="2217" instrument_node="">
</span><li data-dcnode-id="2212"><span data-dcnode-id="2216" instrument_node="">The </span><a data-dcnode-id="2214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/positive-and-negative-affect-schedule-panas/"><span data-dcnode-id="2215" instrument_node="">Positive and Negative Affect Schedule</span></a><span data-dcnode-id="2213" instrument_node=""> (Watson, Clark &amp; Tellegen, 1988);</span></li><span data-dcnode-id="2211" instrument_node="">
</span><li data-dcnode-id="2206"><span data-dcnode-id="2210" instrument_node="">The </span><a data-dcnode-id="2208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/life-satisfaction-scales/"><span data-dcnode-id="2209" instrument_node="">Satisfaction with Life Scale</span></a><span data-dcnode-id="2207" instrument_node=""> (Diener, Emmons, Larsen &amp; Griffin, 1985); and</span></li><span data-dcnode-id="2205" instrument_node="">
</span><li data-dcnode-id="2200"><span data-dcnode-id="2204" instrument_node="">The </span><a data-dcnode-id="2202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/measure-happiness-tests-surveys/"><span data-dcnode-id="2203" instrument_node="">Global Happiness Scale</span></a><span data-dcnode-id="2201" instrument_node=""> (Lyubomirsky &amp; Lepper, 1999)</span></li><span data-dcnode-id="2199" instrument_node="">
</span></ul><span data-dcnode-id="2197" instrument_node="">
</span><p data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">When it comes to assessing eudaimonic happiness, most scholars apply Ryff and Keyes’ (1995) multidimensional measure of psychological wellbeing (PWB).</span></p><span data-dcnode-id="2194" instrument_node="">
</span><p data-dcnode-id="2189"><span data-dcnode-id="2193" instrument_node="">The creators’ development of the measure was spurred by their observation that previous studies had treated happiness as synonymous with a balance between </span><a data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/positive-negative-affect/"><span data-dcnode-id="2192" instrument_node="">positive and negative affect</span></a><span data-dcnode-id="2190" instrument_node=""> or overall satisfaction with one’s life.</span></p><span data-dcnode-id="2188" instrument_node="">
</span><p data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">They argued that these approaches were too data-driven and not rooted in theory or lived experience. Therefore, these scholars designed and validated a measure based on responses from a representative sample of telephone interviews (Ryff &amp; Keyes, 1995).</span></p><span data-dcnode-id="2185" instrument_node="">
</span><p data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">This measure assesses eudaimonic happiness according to six sub-dimensions:</span></p><span data-dcnode-id="2182" instrument_node="">
</span><ol data-dcnode-id="2134"><span data-dcnode-id="2181" instrument_node="">
</span><li data-dcnode-id="2174"><em data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Autonomy</span></em><br data-dcnode-id="2178"><span data-dcnode-id="2177" instrument_node="">
The ability to resist social pressures, regulate behavior from within, and evaluate oneself based on personal standards.</span><br data-dcnode-id="2176"><br data-dcnode-id="2175"></li><span data-dcnode-id="2173" instrument_node="">
</span><li data-dcnode-id="2166"><em data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">Environmental mastery</span></em><br data-dcnode-id="2170"><span data-dcnode-id="2169" instrument_node="">
Feelings of mastery and competence in a variety of situations, the ability to take advantage of opportunities, and the ability to craft one’s environment to suit one’s needs and values.</span><br data-dcnode-id="2168"><br data-dcnode-id="2167"></li><span data-dcnode-id="2165" instrument_node="">
</span><li data-dcnode-id="2158"><em data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Personal growth</span></em><br data-dcnode-id="2162"><span data-dcnode-id="2161" instrument_node="">
Feelings of ongoing development, the realization of one’s potential, and observing oneself changing in ways that signify acquired knowledge and increased effectiveness.</span><br data-dcnode-id="2160"><br data-dcnode-id="2159"></li><span data-dcnode-id="2157" instrument_node="">
</span><li data-dcnode-id="2150"><em data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Positive relations with others</span></em><br data-dcnode-id="2154"><span data-dcnode-id="2153" instrument_node="">
Possessing warm, trusting relationships with others characterized by give and take, and the capacity for intimacy and empathy.</span><br data-dcnode-id="2152"><br data-dcnode-id="2151"></li><span data-dcnode-id="2149" instrument_node="">
</span><li data-dcnode-id="2142"><em data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Purpose in life</span></em><br data-dcnode-id="2146"><span data-dcnode-id="2145" instrument_node="">
Having goals and a sense of meaning and belief that gives life purpose.</span><br data-dcnode-id="2144"><br data-dcnode-id="2143"></li><span data-dcnode-id="2141" instrument_node="">
</span><li data-dcnode-id="2136"><em data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Self-acceptance</span></em><br data-dcnode-id="2138"><span data-dcnode-id="2137" instrument_node="">
Possessing a positive attitude toward oneself, including both one’s good and bad qualities.</span></li><span data-dcnode-id="2135" instrument_node="">
</span></ol><span data-dcnode-id="2133" instrument_node="">
</span><p data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Two versions of this scale are available. The first is the original 42-item measure (Ryff, 1989a; 1989b), and there is also a shortened 18-item version (Ryff &amp; Keyes, 1995).</span></p><span data-dcnode-id="2130" instrument_node="">
</span><p data-dcnode-id="2125"><span data-dcnode-id="2129" instrument_node="">You can find the items for both of these scales, as well as scale anchors and scoring information on Stanford University’s </span><a data-dcnode-id="2127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sparqtools.org/mobility-measure/psychological-wellbeing-scale/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2128" instrument_node="">website</span></a><span data-dcnode-id="2126" instrument_node="">.</span></p><span data-dcnode-id="2124" instrument_node="">
</span><p data-dcnode-id="2119"><span data-dcnode-id="2123" instrument_node="">For another useful tool that attempts to reconcile the hedonic and eudaimonic perspectives of happiness, take a look at Hervás and Vázquez’s (2013) </span><a data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hqlo.biomedcentral.com/articles/10.1186/1477-7525-11-66" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2122" instrument_node="">Pemberton Happiness Index</span></a><span data-dcnode-id="2120" instrument_node=""> (PHI).</span></p><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Upon recognizing that existing assessments of happiness measured either hedonic or eudaimonic conceptualizations of happiness, these scholars sought to design and validate a brief, comprehensive measure that assessed both.</span></p><span data-dcnode-id="2115" instrument_node="">
</span><p data-dcnode-id="2107"><span data-dcnode-id="2114" instrument_node="">The final 21-item scale also has the advantage of capturing both </span><em data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">remembered</span></em><span data-dcnode-id="2111" instrument_node=""> and </span><em data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">experienced</span></em><span data-dcnode-id="2108" instrument_node=""> wellbeing (Kahneman &amp; Riis, 2005).</span></p><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">The former relies on participants’ memory and judgment about their overall lives, using items like, “I feel able to solve the majority of my daily problems.” In contrast, the latter assesses real-time affective states and feelings about the previous day, using items like, “I learned something interesting.”</span></p><span data-dcnode-id="2103" instrument_node="">
</span><p data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">As for assessing happiness flowing from conceptualizations in mindfulness, many researchers have administered short scales that capture momentary changes in emotions via diary study.</span></p><span data-dcnode-id="2100" instrument_node="">
</span><p data-dcnode-id="2095"><span data-dcnode-id="2099" instrument_node="">The purpose of a diary study is to assess fluctuations in states (e.g., moods, thoughts, etc.) throughout a given day. This type of study design, sometimes called a </span><em data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">within-person design</span></em><span data-dcnode-id="2096" instrument_node="">, runs contrary to many studies in psychology, which typically compare differences between people.</span></p><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2089"><span data-dcnode-id="2093" instrument_node="">As an example, Diener and colleagues (2010) designed the 12-item </span><a data-dcnode-id="2091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//labs.psychology.illinois.edu/~ediener/SPANE.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2092" instrument_node="">Scale of Positive and Negative Experience</span></a><span data-dcnode-id="2090" instrument_node=""> (SPANE), which was designed to be quickly administered and assess the full range of emotions and feelings a person may experience. The scale, therefore, contains both general and specific emotional terms, such as “pleasant” and “sad.”</span></p><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Thanks to its brevity, this scale can easily be administered multiple times a day. Therefore, it has been applied in diary studies assessing fluctuations in mindfulness throughout a day. For instance, Ding and colleagues (2019) used the scale in a study examining the link between state mindfulness and present-moment emotions.</span></p><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">The results indicated that state mindfulness was positively related to positive emotions, like happiness and contentment, and negatively related to negative emotions, like depression and boredom.</span></p><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2077"><span data-dcnode-id="2081" instrument_node="">These authors also found that present-moment rumination, which involves fixation on negative thoughts, partially mediated this effect. In other words, maintaining a mindful state of awareness appears to block </span><a data-dcnode-id="2079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/mindful-thinking/"><span data-dcnode-id="2080" instrument_node="">ruminative thought</span></a><span data-dcnode-id="2078" instrument_node=""> partially, helping us to enjoy more positive emotions throughout any given day.</span></p><span data-dcnode-id="2076" instrument_node="">
</span><p data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">In sum, it’s clear psychologists have done much of the heavy lifting when it comes to developing measures of happiness.</span></p><span data-dcnode-id="2073" instrument_node="">
</span><p data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">As a practitioner looking to assess your clients’ happiness, you should use the information above as a guide to ensure the content validity of your chosen measure. That is, take care to select a scale that has been shown to effectively assess the conceptualization of happiness (e.g., hedonic, eudaimonic) that you apply in your practice.</span></p><span data-dcnode-id="2070" instrument_node="">
</span><p data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2067" instrument_node="">
</span><h3 data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">Neurological measures of happiness</span></h3><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">You may have noticed that the measures of happiness discussed so far have all been self-report in nature. That is, each relies on participants providing information about their own subjective sense of their happiness.</span></p><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">But is there a more objective way to measure happiness?</span></p><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">To answer this question, philosophers and psychologists have been turning to neuroscience to better understand what happiness looks like in the brain.</span></p><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">This research has involved the use of sophisticated technologies, such as PET and fMRI scans, and EEG measures of electrical activity in the brain to identify how happiness manifests physiologically. (Murphy, Nimmo-Smith &amp; Lawrence, 2003; Phan, Wager, Taylor &amp; Liberzon, 2002; Lindquist, Wager, Kober, Bliss-Moreau &amp; Barrett, 2012)</span></p><span data-dcnode-id="2052" instrument_node="">
</span><p data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">We also see a growing wealth of research on how neurotransmitters like dopamine and serotonin play into our day-to-day experience of happiness. We will consider these more closely in the later sections as levers for strengthening our overall happiness.</span></p><span data-dcnode-id="2049" instrument_node="">
</span><p data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2046" instrument_node="">
</span><p data-dcnode-id="2044"><a data-dcnode-id="2045" name="happiness-taught-improved"></a></p><span data-dcnode-id="2043" instrument_node="">
</span><h2 data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">What is True Happiness?</span></h2><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2035"><img alt="What is true happiness" class="alignright size-medium wp-image-134966 lazyload" data-dcnode-id="2039" data-src="https://positivepsychology.com/wp-content/uploads/2019/03/What-is-true-happiness-300x150.jpg" data-srcset="https://positivepsychology.com/wp-content/uploads/2019/03/What-is-true-happiness-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2019/03/What-is-true-happiness-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2019/03/What-is-true-happiness.jpg 800w" height="150" sizes="(max-width: 300px) 100vw, 300px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="300"><noscript data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">&lt;img class="alignright size-medium wp-image-134966 lazyload" src="https://positivepsychology.com/wp-content/uploads/2019/03/What-is-true-happiness-300x150.jpg" alt="What is true happiness" width="300" height="150" srcset="https://positivepsychology.com/wp-content/uploads/2019/03/What-is-true-happiness-300x150.jpg 300w, https://positivepsychology.com/wp-content/uploads/2019/03/What-is-true-happiness-768x384.jpg 768w, https://positivepsychology.com/wp-content/uploads/2019/03/What-is-true-happiness.jpg 800w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="2036" instrument_node="">To recap, we now have three conceptualizations of happiness: hedonia, eudaimonia, and contentment rooted in mindfulness.</span></p><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">We also have two ways to measure each form of happiness: self-reports and various physiological indicators in the brain.</span></p><span data-dcnode-id="2031" instrument_node="">
</span><p data-dcnode-id="2027"><span data-dcnode-id="2030" instrument_node="">But the question remains: </span><em data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Is there a secret to finding true happiness?</span></em></p><span data-dcnode-id="2026" instrument_node="">
</span><p data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">What has hopefully become apparent is that this question is somewhat of a trick question because there is no agreed-upon understanding of what constitutes ‘true’ happiness.</span></p><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">Think about it.</span></p><span data-dcnode-id="2020" instrument_node="">
</span><p data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">Imagine racing to your favorite Mexican restaurant and arriving at the ordering counter moments before the restaurant is about to close. The server takes your order, and a few minutes later, you’re handed your favorite taco.</span></p><span data-dcnode-id="2017" instrument_node="">
</span><p data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">What action would a scholar of each ‘happiness philosophy’ recommend at this moment when you receive your meal?</span></p><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">To a believer of hedonism, happiness would likely represent the moment you bite into the taco and delight in its flavors on your tongue.</span></p><span data-dcnode-id="2011" instrument_node="">
</span><p data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">To philosophers of the eudaimonic perspective, happiness would more likely involve the ritual of eating with someone you care about, thereby strengthening your connection with that person. It could also mean reaching your potential as a budding cook by learning to create a similarly tasty dish or giving the taco to someone hungry and in need.</span></p><span data-dcnode-id="2008" instrument_node="">
</span><p data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Finally, followers of the mindfulness-based perspective would argue that contentment can be found in any or all of the above actions but that it is the quality of your attention, paid to your intentions, sensations, emotions, and interactions with others, that would dictate the happiness you derived from whatever you chose to do with the taco.</span></p><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">In sum, these examples indicate that searching for one ‘true’ source of happiness may be feeding into a fallacy. Rather, there appear to be several pathways to pursuing different sources of happiness.</span></p><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">The remainder of this article will outline scientifically evidenced pathways to cultivating each of these three forms of happiness.</span></p><span data-dcnode-id="1999" instrument_node="">
</span><p data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">But before setting off on your search, heed one warning…</span></p><span data-dcnode-id="1996" instrument_node="">
</span><p data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1993" instrument_node="">
</span><p data-dcnode-id="1991"><a data-dcnode-id="1992" name="what-makes-people-happy"></a></p><span data-dcnode-id="1990" instrument_node="">
</span><h2 data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">The Wrong Way to Search for Happiness</span></h2><span data-dcnode-id="1987" instrument_node="">
</span><p data-dcnode-id="1979"><span data-dcnode-id="1986" instrument_node="">While scientists do not agree on how </span><em data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">best</span></em><span data-dcnode-id="1983" instrument_node=""> to search for happiness, evidence from multiple standpoints highlights one wrong way to search for it, and that is when one does so at the expense of enjoying life </span><em data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">right now</span></em><span data-dcnode-id="1980" instrument_node="">.</span></p><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">There are at least three critical bodies of theory, thinking, and research that point to why sacrificing life’s present joy’s chasing happiness is likely to make us paradoxically more miserable.</span></p><span data-dcnode-id="1975" instrument_node="">
</span><p data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">We have already touched on the first perspective, which is based on the philosophy of mindfulness.</span></p><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">This perspective encourages us to give up the search for happiness entirely, harness our attention, and discover that contentment that can exist in stillness, no matter what we yearn for or have yet to achieve (Harris, 2014).</span></p><span data-dcnode-id="1969" instrument_node="">
</span><p data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">According to this perspective, by failing to acknowledge that contentment is available to us at any given moment, we will remain dissatisfied. This is because even if we achieve all our goals and get everything we want, some newer, shinier source of happiness will always arise for us to chase.</span></p><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">In other words, the grass will always appear greener somewhere else, meaning it is important to look for happiness wherever we are presently standing.</span></p><span data-dcnode-id="1963" instrument_node="">
</span><p data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">The second body of thinking lies in empirical findings from the psychology of expectancies and goal-pursuit.</span></p><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1955"><span data-dcnode-id="1959" instrument_node="">One study in the journal, </span><em data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Emotion</span></em><span data-dcnode-id="1956" instrument_node=""> (Mauss, Tamir, Anderson &amp; Savino, 2011), found that those who reported valuing happiness highly experienced greater disappointment and ultimately less happiness when circumstances that should have made them happy failed to meet their expectations. In other words, the findings paradoxically suggest that the more we desire happiness, the less likely we are to experience it.</span></p><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">Likewise, there is evidence that placing too much importance on achieving challenging goals in the distant future may also be a recipe for misery.</span></p><span data-dcnode-id="1951" instrument_node="">
</span><p data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">One study found that students who perceived they made poor progress toward their ambitious life goals tended to exhibit significant depressive symptoms two years later (Salmela-Aro &amp; Nurmi, 1996). Moreover, the study evidenced a downward spiral of depressive symptoms; disappointed students proceeded to derive less enjoyment from their goal pursuits, thereby worsening their symptoms.</span></p><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1943"><span data-dcnode-id="1947" instrument_node="">Together, these findings highlight the danger of hanging all our hopes for being happy on the realization of </span><a data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/affective-forecasting/"><span data-dcnode-id="1946" instrument_node="">future events</span></a><span data-dcnode-id="1944" instrument_node="">.</span></p><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1941" instrument_node="">A third reason why chasing happiness may be a mistake relates to a process known as hedonic adaptation (or the </span><a data-dcnode-id="1939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/hedonic-treadmill/"><span data-dcnode-id="1940" instrument_node="">hedonic treadmill</span></a><span data-dcnode-id="1938" instrument_node="">). Hedonic adaptation is the observed tendency of humans to quickly adapt to a baseline level of happiness, regardless of significant life events (Brickman &amp; Campbell, 1971).</span></p><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">Indeed, it has been shown that even if one wins a major lottery, the happiness that person derives from day-to-day activities in life will eventually return to baseline (Brickman, Coates &amp; Janoff-Bulman, 1978).</span></p><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">This finding highlights that we should not overestimate the effect that significant life events will have on our long-term happiness, serving as yet another reason to call off the search for happiness (Grant, 2013).</span></p><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">In sum, it is important to recognize that happiness is not somewhere off in the distance. There is always something to be gained by pausing to reflect on our reasons to be happy right now, such as by practicing gratitude.</span></p><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">We will explore this and several other strategies to find hedonic, eudaimonic, and present-moment happiness in the remaining sections.</span></p><span data-dcnode-id="1924" instrument_node="">
</span><p data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1921" instrument_node="">
</span><p data-dcnode-id="1919"><a data-dcnode-id="1920" name="measuring-happiness"></a></p><span data-dcnode-id="1918" instrument_node="">
</span><h2 data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">7 Ways to Find Happiness</span></h2><span data-dcnode-id="1915" instrument_node="">
</span><p data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">You now understand a key pitfall to avoid in your search for happiness. Next, let’s consider eight different sources of happiness you can leverage today to find joy in your own life.</span></p><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1909" instrument_node="">
</span><h3 data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Finding happiness through neurotransmitters</span></h3><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">The first effective way to boost hedonic happiness is to engage in healthy behaviors that directly target neurotransmitters associated with pleasure.</span></p><span data-dcnode-id="1903" instrument_node="">
</span><p data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">While there are many neurotransmitters that affect our happiness, there are a few key ones worth focusing on: dopamine, serotonin, oxytocin, and endorphins.</span></p><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1899" instrument_node="">Dopamine, otherwise known as the “feel-good” hormone, is a key feature of the brain’s reward system and associated with pleasure. Dopamine can be triggered in many ways, including through </span><a data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/exercise-neurological-benefits/"><span data-dcnode-id="1898" instrument_node="">exercise</span></a><span data-dcnode-id="1896" instrument_node="">, a healthy diet, sufficient sleep, listening to music, meditating, and ensuring you get a little sunlight each day (Breuning, 2015; Hansen, Stevens &amp; Coast, 2001).</span></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Next is serotonin. This hormone plays an essential role in stabilizing our mood and can be triggered in many of the same ways as dopamine, such as by getting consistent sleep, exercise, and ensuring you maintain a balanced diet (Breuning, 2015; Roman, Walstra, Luiten &amp; Meerlo, 2005).</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Third is oxytocin, which is the hormone associated with love, bonding, and close connection. This hormone is boosted primarily through physical touch and closeness with others, meaning that hugs, cuddling, and even simply spending time with others can significantly increase our happiness (Breuning, 2015; Uvnäs-Moberg, Handlin &amp; Petersson, 2015).</span></p><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1887" instrument_node="">The final neurotransmitters to consider are endorphins, which reduce physical pain and act as your body’s natural reward system. To increase this hormone, try engaging in behaviors that are ‘good’ for you, such as exercising or demonstrating sincere </span><a data-dcnode-id="1885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/random-acts-kindness/"><span data-dcnode-id="1886" instrument_node="">acts of kindness</span></a><span data-dcnode-id="1884" instrument_node=""> (Breuning, 2015). Studies have also shown that consuming cocoa, such as that in dark chocolate, can trigger endorphins in the brain (Ottley, 2000).</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">This was just a brief snapshot into the neurochemical bases of happiness.</span></p><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1873"><span data-dcnode-id="1878" instrument_node="">To learn more and gain a range of practical tips to naturally boost your neurochemical happiness, take a look at Dr. Loretta Breuning’s book, </span><a data-dcnode-id="1875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Habits-Happy-Brain-Serotonin-Endorphin-ebook/dp/B0178M3LNA/" rel="noopener noreferrer" target="_blank"><em data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">Habits of a Happy Brain</span></em></a><span data-dcnode-id="1874" instrument_node="">.</span></p><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1869" instrument_node="">
</span><h3 data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Finding happiness through real goods</span></h3><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1865" instrument_node="">A next important step in the search for happiness is to work toward securing the basic necessities for wellbeing and development, or what Aristotle called </span><em data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">real goods</span></em><span data-dcnode-id="1862" instrument_node="">.</span></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">Real goods satisfy the natural needs of our bodies, such as our needs for warmth and sustenance. Examples of such real goods include food, clothing, health, shelter, and safety (Moss, 2012).</span></p><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1852"><span data-dcnode-id="1856" instrument_node="">We might liken this conceptualization to that of the lower levels of </span><a data-dcnode-id="1854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/abraham-maslow/"><span data-dcnode-id="1855" instrument_node="">Maslow’s hierarchy</span></a><span data-dcnode-id="1853" instrument_node="">, which argues that humans must satisfy basic physiological and safety-related needs before pursuing higher-order needs like esteem and self-actualization.</span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">However, real goods also include “goods of the soul,” such as love, arts, music, and literature (Joseph, 2019). These goods clearly tap into the higher levels of Maslow’s hierarchy, and without them, it may be challenging to achieve eudaimonic happiness.</span></p><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">For instance, without a secure shelter in which to gain adequate rest, we would likely lack the energy to develop a new talent, such as painting. Nor would we gain this talent without exposure to sources of inspiration, such as other artists’ work or cultural influences.</span></p><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">In sum, Aristotle’s principles regarding real goods highlight two courses of action for improving happiness.</span></p><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">First, take steps toward securing the basics for your health and wellbeing. This means eating well, engaging in regular exercise, securing a stable income, and getting plenty of sleep.</span></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1838" instrument_node="">Secondly, immerse yourself in environments that will bring out your best. For example, surround yourself with good company, knowledge, and cultures. In practice, this may mean stepping outside your </span><a data-dcnode-id="1836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/comfort-zone/"><span data-dcnode-id="1837" instrument_node="">comfort zone</span></a><span data-dcnode-id="1835" instrument_node=""> by meeting new people, learning new skills, or visiting new places.</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1830" instrument_node="">
</span><h3 data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Finding happiness through gratitude</span></h3><span data-dcnode-id="1827" instrument_node="">
</span><p data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">Many studies stemming from the eudaimonic and mindfulness-based perspectives point to the practice of gratitude as a key source of happiness.</span></p><span data-dcnode-id="1824" instrument_node="">
</span><div class="tg-wrap" data-dcnode-id="1196"><span data-dcnode-id="1823" instrument_node="">
</span><p data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">Gratitude can be defined as “the appreciation of what is valuable and meaningful to oneself… [representing] a general state of thankfulness and/or appreciation” (Sansone &amp; Sansone, 2010, p. 18).</span></p><span data-dcnode-id="1820" instrument_node="">
</span><p data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">Two simple ways to practice gratitude include taking a moment at the end of the day to reflect on an occurrence for which you were grateful and sending a thoughtful message of appreciation to someone you care about.</span></p><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">For more ideas, take a look at some of our dedicated articles on this topic:</span></p><span data-dcnode-id="1814" instrument_node="">
</span><ul data-dcnode-id="1796"><span data-dcnode-id="1813" instrument_node="">
</span><li data-dcnode-id="1810"><a data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/gratitude-exercises/"><span data-dcnode-id="1812" instrument_node="">13 Most Popular Gratitude Exercises &amp; Activities</span></a></li><span data-dcnode-id="1809" instrument_node="">
</span><li data-dcnode-id="1806"><a data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/gratitude-messages-letters-lists/"><span data-dcnode-id="1808" instrument_node="">41+ Gratitude Messages, Letters and Lists</span></a></li><span data-dcnode-id="1805" instrument_node="">
</span><li data-dcnode-id="1802"><a data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/how-to-express-gratitude/"><span data-dcnode-id="1804" instrument_node="">How To Express Gratitude to Others (19 Ideas + Gifts &amp; Challenges)</span></a></li><span data-dcnode-id="1801" instrument_node="">
</span><li data-dcnode-id="1798"><a data-dcnode-id="1799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/gratitude-journal/"><span data-dcnode-id="1800" instrument_node="">Gratitude Journal: A Collection of 66 Templates, Ideas, and Apps for Your Diary</span></a></li><span data-dcnode-id="1797" instrument_node="">
</span></ul><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1792" instrument_node="">
</span><h3 data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Finding happiness through flow</span></h3><span data-dcnode-id="1789" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Another way to achieve happiness is to take part in activities that bring about the experience of flow, otherwise known as the feeling of “being in the zone.”</span></p><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1781"><span data-dcnode-id="1785" instrument_node="">In an interview, </span><a data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/mihaly-csikszentmihalyi-father-of-flow/"><span data-dcnode-id="1784" instrument_node="">Mihaly Csikszentmihalyi</span></a><span data-dcnode-id="1782" instrument_node="">, the researcher credited with having popularized the concept of flow, explained that those in a state of flow are:</span></p><span data-dcnode-id="1780" instrument_node="">
</span><blockquote data-dcnode-id="1777"><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">…completely involved in an activity for its own sake. The ego falls away. Time flies. Every action, movement, and thought follows inevitably from the previous one, like playing jazz. Your whole being is involved, and you’re using your skills to the utmost.</span></p></blockquote><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1774" style="text-align: right;"><span data-dcnode-id="1775" instrument_node="">(Geirland, 1996)</span></p><span data-dcnode-id="1773" instrument_node="">
</span><p data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">Examples of just a few activities that can generate flow include games, sports, dancing, cooking, gardening, work, driving, and artistic pursuits (Csikszentmihalyi, 1990).</span></p><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Most followers of the eudaimonic perspective would view the flow experience as an indicator of eudaimonia. This is because flow experiences entail an optimal level of challenge, enabling us to develop our talents to their fullest (Csikszentmihalyi, 1990).</span></p><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">For more ideas on how to cultivate flow in your life, look at our dedicated articles on the topic:</span></p><span data-dcnode-id="1764" instrument_node="">
</span><ul data-dcnode-id="1746"><span data-dcnode-id="1763" instrument_node="">
</span><li data-dcnode-id="1760"><a data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/theory-psychology-flow/"><span data-dcnode-id="1762" instrument_node="">The Psychology and Theory Behind Flow</span></a></li><span data-dcnode-id="1759" instrument_node="">
</span><li data-dcnode-id="1756"><a data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/flow-activities/"><span data-dcnode-id="1758" instrument_node="">11 Activities and Exercises to Induce a Flow State (+ 6 Examples)</span></a></li><span data-dcnode-id="1755" instrument_node="">
</span><li data-dcnode-id="1752"><a data-dcnode-id="1753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/what-is-flow/"><span data-dcnode-id="1754" instrument_node="">What is Flow in Psychology? Definition and 10+ Activities to Induce Flow</span></a></li><span data-dcnode-id="1751" instrument_node="">
</span><li data-dcnode-id="1748"><a data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/flow-at-work/"><span data-dcnode-id="1750" instrument_node="">Flow at Work: The Science of Engagement and Optimal Performance</span></a></li><span data-dcnode-id="1747" instrument_node="">
</span></ul><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1742" instrument_node="">
</span><h3 data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">Finding happiness by living into our values</span></h3><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Several studies have found that making intentional efforts to live in congruence with our values can bolster our happiness or at least buffer against unhappiness (Brown, 2018; Veage et al., 2014).</span></p><span data-dcnode-id="1736" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">For clarity, we can define values as “stable, general beliefs about what is desirable” (Feather, 1992, p. 111). Examples of values include fairness, creativity, and freedom.</span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Understanding our values is critical to achieving eudaimonic happiness because the eudaimonic perspective of happiness encourages us to engage in what is worth doing (Boniwell, 2008). In order to know what is worth doing, we must understand which actions generate valued outcomes, and we can only know this by looking closely at our core values.</span></p><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">Scientists and practitioners have developed a range of useful exercises to help individuals discover their core values. You can learn more about these in several of our other articles:</span></p><span data-dcnode-id="1727" instrument_node="">
</span><ul data-dcnode-id="1713"><span data-dcnode-id="1726" instrument_node="">
</span><li data-dcnode-id="1723"><a data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/values-worksheets/"><span data-dcnode-id="1725" instrument_node="">25 Values Worksheets to Enrich Your Clients’ Lives With More Meaning</span></a></li><span data-dcnode-id="1722" instrument_node="">
</span><li data-dcnode-id="1719"><a data-dcnode-id="1720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/values-questionnaire/"><span data-dcnode-id="1721" instrument_node="">The 3 Best Questionnaires for Measuring Values</span></a></li><span data-dcnode-id="1718" instrument_node="">
</span><li data-dcnode-id="1715"><a data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/values-clarification/"><span data-dcnode-id="1717" instrument_node="">Values Clarification: How Reflection On Core Values Is Used In CBT</span></a></li><span data-dcnode-id="1714" instrument_node="">
</span></ul><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Once you are clear on your core values, you can take steps to behave in a way that is congruent with these values, helping you live a happier life.</span></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">For instance, if you discover that one of your core values is growth, you might then consider the different ways to enact this value in day-to-day life. This could involve registering for a night class or pursuing new intellectual pursuits through reading.</span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Research also shows that the alignment between our values and professional pursuits plays an important role in determining our overall happiness (Chatman, 1989; Kristof-Brown, Zimmerman &amp; Johnson, 2005).</span></p><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1698"><span data-dcnode-id="1702" instrument_node="">Based on this, we see the emergence of research on </span><a data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/job-crafting/"><span data-dcnode-id="1701" instrument_node="">job crafting</span></a><span data-dcnode-id="1699" instrument_node="">, which involves altering one’s work to better align it with our preferences (Zhang &amp; Parker, 2019), and that on hiring practices that facilitate good person-job fit (Sekiguchi, 2004).</span></p><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">Therefore, organizational leaders and HR professionals may wish to dig further into some of these concepts to strengthen the happiness of their staff.</span></p><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1691" instrument_node="">
</span><h3 data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Finding happiness through needs satisfaction</span></h3><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">One prominent theory of happiness posits that to be happy, we must engage in behaviors that satisfy our three core human needs (Ryan &amp; Deci, 2008):</span></p><span data-dcnode-id="1685" instrument_node="">
</span><ul data-dcnode-id="1674"><span data-dcnode-id="1684" instrument_node="">
</span><li data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">the need for competence (feeling effective);</span></li><span data-dcnode-id="1681" instrument_node="">
</span><li data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">the need for autonomy (the feeling of being the origin of one’s behavior); and</span></li><span data-dcnode-id="1678" instrument_node="">
</span><li data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">the need for psychological relatedness (feeling cared for and understood by other people).</span></li><span data-dcnode-id="1675" instrument_node="">
</span></ul><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Overall, the satisfaction of these needs represents an avenue for achieving happiness that falls under the eudaimonic conceptualization. This is because need satisfaction promotes long-term wellness rather than just temporary pleasure (Boniwell, 2008).</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">For a simple assessment to determine your overall satisfaction of core needs within your life, consider completing the 21-item Basic Needs Satisfaction in General Scale (BNSG-S; Gagné, 2003).</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Upon completing the assessment, one can calculate their total score for each core need and identify an area for growth as a first step toward fostering greater eudaimonic happiness.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">For instance, if you discover that your lowest-scoring need is competence, you might consider whether you can engage in work or hobbies that better utilize your skills, enabling you to derive a greater sense of competence from daily activities.</span></p><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1660" instrument_node="">Again, this was just a brief snapshot into the science of needs satisfaction as a mechanism for achieving happiness. To learn more, look at our dedicated article on </span><a data-dcnode-id="1658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/self-determination-skills-activities/"><span data-dcnode-id="1659" instrument_node="">self-determination</span></a><span data-dcnode-id="1657" instrument_node="">.</span></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1652" instrument_node="">
</span><h3 data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Finding happiness through mindfulness</span></h3><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Finally, and at the core of the mindfulness-based approach to finding happiness is the practice of mindfulness itself.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Mindfulness is typically defined as the practice of bringing one’s attention to the internal and external experiences occurring in the present moment, such as sensations, sights, thoughts, and emotions (Baer, 2003; Kabat-Zinn, 1994).</span></p><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Mindfulness has existed for centuries and was first popularized among eastern traditions. The practice functions to better understand feelings and motivations, train the capacity for attention and relaxation, and free one’s mind from overidentification with negative thoughts and emotions (Fronsdal, 2004; 2006; Harris, 2014).</span></p><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1632"><span data-dcnode-id="1639" instrument_node="">Often, regular meditation will lie at the core of mindfulness practice. However, other approaches to developing mindfulness can include </span><a data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/journaling-for-mindfulness/"><span data-dcnode-id="1638" instrument_node="">journaling</span></a><span data-dcnode-id="1636" instrument_node=""> and </span><a data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/mindfulness-yoga/"><span data-dcnode-id="1635" instrument_node="">yoga</span></a><span data-dcnode-id="1633" instrument_node="">.</span></p><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">No matter how you practice mindfulness, the aim is typically for the practice’s benefits to spill over into your experience of day-to-day consciousness, enabling you to return to states of mindful awareness throughout your day and not be at the whim of negative thoughts and emotions.</span></p><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">If you’re interested in cultivating greater happiness through mindfulness, we have a range of articles throughout our blog to help you learn more:</span></p><span data-dcnode-id="1625" instrument_node="">
</span><ul data-dcnode-id="1607"><span data-dcnode-id="1624" instrument_node="">
</span><li data-dcnode-id="1621"><a data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//positivepsychology.com/mindfulness-meditation/"><span data-dcnode-id="1623" instrument_node="">Mindfulness Meditation Videos, Exercises, Books and Courses (+PDF)</span></a></li><span data-dcnode-id="1620" instrument_node="">
